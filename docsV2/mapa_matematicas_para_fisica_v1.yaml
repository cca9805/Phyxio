        orden: 684000
        titulo: Condiciones iniciales y de contorno
        objetivo: Entender qué datos hacen única una solución física.
        aparece_en_fisica: [ondas, calor, mecanica, fluidos]
      - id: sistemas-de-ecuaciones-diferenciales
        orden: 685000
        titulo: Sistemas de ecuaciones diferenciales
        objetivo: Resolver variables acopladas mediante sistemas dinámicos.
        aparece_en_fisica: [osciladores_acoplados, poblaciones, mecanica_analitica]
      - id: estabilidad-y-retratos-de-fase
        orden: 686000
        titulo: Estabilidad y retratos de fase
        objetivo: Leer equilibrio, estabilidad y evolución cualitativa sin resolver todo.
        aparece_en_fisica: [oscilaciones, dinamica_no_lineal, control]
      - id: ecuaciones-en-derivadas-parciales-basicas
        orden: 687000
        titulo: Ecuaciones en derivadas parciales básicas
        objetivo: Reconocer ecuaciones de ondas, calor, Laplace y continuidad.
        aparece_en_fisica: [ondas, calor, campos, fluidos]

  - id: algebra-lineal-y-tensores
    orden: 690000
    titulo: Álgebra lineal y tensores
    titulo_en: Linear Algebra and Tensors
    objetivo: Usar matrices, transformaciones, autovalores y tensores para sistemas acoplados y geometría física.
    niveles: [UNIVERSIDAD]
    leafs:
      - id: matrices-y-transformaciones-lineales
        orden: 691000
        titulo: Matrices y transformaciones lineales
        objetivo: Representar transformaciones de vectores y sistemas lineales.
        aparece_en_fisica: [rotacion, circuitos, oscilaciones, mecanica_cuantica]
      - id: determinantes-y-jacobianos
        orden: 692000
        titulo: Determinantes y jacobianos
        objetivo: Interpretar cambios de volumen, orientación y cambio de variables.
        aparece_en_fisica: [coordenadas, integrales, fluidos, estadistica]
      - id: autovalores-y-autovectores
        orden: 693000
        titulo: Autovalores y autovectores
        objetivo: Encontrar modos propios, ejes principales y estados característicos.
        aparece_en_fisica: [oscilaciones, rotacion, cuantica, estabilidad]
      - id: diagonalizacion-y-modos-normales
        orden: 694000
        titulo: Diagonalización y modos normales
        objetivo: Desacoplar sistemas lineales y leer modos independientes.
        aparece_en_fisica: [osciladores_acoplados, solidos, cuantica]
      - id: tensores-basicos
        orden: 695000
        titulo: Tensores básicos
        objetivo: Entender cantidades con varias direcciones como inercia, deformación o tensiones.
        aparece_en_fisica: [rotacion_3d, elasticidad, fluidos, relatividad]
      - id: producto-interno-y-normas
        orden: 696000
        titulo: Producto interno y normas
        objetivo: Medir tamaño, ángulo, energía cuadrática y ortogonalidad en espacios vectoriales.
        aparece_en_fisica: [cuantica, modos, señales, energia]

  - id: numeros-complejos-fourier-y-ondas
    orden: 700000
    titulo: Números complejos, Fourier y ondas
    titulo_en: Complex Numbers, Fourier, and Waves
    objetivo: Representar oscilaciones, fases, ondas, señales y modos mediante herramientas complejas y espectrales.
    niveles: [BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: numeros-complejos-para-fisica
        orden: 701000
        titulo: Números complejos para física
        objetivo: Usar forma rectangular, polar y exponencial para amplitud y fase.
        aparece_en_fisica: [ondas, circuitos, cuantica]
      - id: fase-y-fasores
        orden: 702000
        titulo: Fase y fasores
        objetivo: Representar oscilaciones sinusoidales como vectores rotantes.
        aparece_en_fisica: [ondas, corriente_alterna, oscilaciones]
      - id: senales-periodicas-y-superposicion
        orden: 703000
        titulo: Señales periódicas y superposición
        objetivo: Entender suma de ondas, interferencia y descomposición en componentes.
        aparece_en_fisica: [ondas, sonido, optica, señales]
      - id: series-de-fourier
        orden: 704000
        titulo: Series de Fourier
        objetivo: Descomponer funciones periódicas en modos sinusoidales.
        aparece_en_fisica: [ondas, calor, señales, vibraciones]
      - id: transformada-de-fourier-basica
        orden: 705000
        titulo: Transformada de Fourier básica
        objetivo: Pasar entre dominio temporal/espacial y dominio de frecuencias.
        aparece_en_fisica: [ondas, cuantica, señales, optica]
      - id: delta-de-dirac-y-distribuciones
        orden: 706000
        titulo: Delta de Dirac y distribuciones
        objetivo: Modelar fuentes puntuales, impulsos y densidades idealizadas.
        aparece_en_fisica: [campos, cuantica, señales, mecanica]

  - id: probabilidad-estadistica-y-datos
    orden: 710000
    titulo: Probabilidad, estadística y datos
    titulo_en: Probability, Statistics, and Data
    objetivo: Tratar medidas, incertidumbre, distribuciones, ajuste y lectura experimental.
    niveles: [BACHILLERATO, UNIVERSIDAD]
