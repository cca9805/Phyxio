        aparece_en_fisica: [trabajo, desplazamiento, carga, masa, energia]
      - id: area-bajo-la-curva
        orden: 662000
        titulo: Área bajo la curva
        objetivo: Interpretar áreas con unidades físicas y signo.
        aparece_en_fisica: [cinematica, trabajo, impulso]
      - id: integrales-en-problemas-de-fisica
        orden: 663000
        titulo: Integrales en problemas de física
        objetivo: Elegir variable de integración, límites y elemento diferencial.
        aparece_en_fisica: [mecanica, electricidad, fluidos]
      - id: cambio-de-variable-en-integrales
        orden: 664000
        titulo: Cambio de variable en integrales
        objetivo: Sustituir variables conservando límites, diferencial y significado.
        aparece_en_fisica: [campos, distribuciones, termodinamica]
      - id: integracion-por-partes-en-fisica
        orden: 665000
        titulo: Integración por partes en física
        objetivo: Transformar integrales donde una magnitud y su cambio aparecen acoplados.
        aparece_en_fisica: [ondas, mecanica_analitica, campos]
      - id: distribuciones-continuas
        orden: 666000
        titulo: Distribuciones continuas
        objetivo: Pasar de sumas discretas a densidades lineales, superficiales y volumétricas.
        aparece_en_fisica: [centro_de_masas, momento_inercia, carga, fluidos]
      - id: integrales-impropias-y-convergencia
        orden: 667000
        titulo: Integrales impropias y convergencia
        objetivo: Decidir si una acumulación infinita tiene valor finito o diverge.
        aparece_en_fisica: [campos, ondas, distribuciones, estadistica]

  - id: calculo-vectorial-y-campos
    orden: 670000
    titulo: Cálculo vectorial y campos
    titulo_en: Vector Calculus and Fields
    objetivo: Operar con campos escalares y vectoriales mediante gradiente, divergencia, rotacional e integrales geométricas.
    niveles: [UNIVERSIDAD]
    leafs:
      - id: campos-escalares-y-vectoriales
        orden: 671000
        titulo: Campos escalares y vectoriales
        objetivo: Distinguir valores escalares y vectoriales definidos en el espacio.
        aparece_en_fisica: [gravitacion, electromagnetismo, fluidos, temperatura]
      - id: gradiente
        orden: 672000
        titulo: Gradiente
        objetivo: Leer dirección de máximo aumento y relación con fuerzas conservativas.
        aparece_en_fisica: [potencial, campos, termodinamica]
      - id: divergencia
        orden: 673000
        titulo: Divergencia
        objetivo: Medir fuentes, sumideros y expansión local de un campo.
        aparece_en_fisica: [fluidos, electrostatica, continuidad]
      - id: rotacional
        orden: 674000
        titulo: Rotacional
        objetivo: Medir giro local, circulación y estructura vorticial.
        aparece_en_fisica: [fluidos, magnetismo, ondas]
      - id: laplaciano
        orden: 675000
        titulo: Laplaciano
        objetivo: Medir curvatura espacial, difusión y equilibrio de campos.
        aparece_en_fisica: [calor, ondas, electrostatica, fluidos]
      - id: integrales-de-linea
        orden: 676000
        titulo: Integrales de línea
        objetivo: Acumular una magnitud a lo largo de una trayectoria.
        aparece_en_fisica: [trabajo, circulacion, potencial]
      - id: integrales-de-superficie-y-flujo
        orden: 677000
        titulo: Integrales de superficie y flujo
        objetivo: Acumular componente normal a través de una superficie.
        aparece_en_fisica: [gauss, flujo, fluidos, electromagnetismo]
      - id: teoremas-integrales-de-campo
        orden: 678000
        titulo: Teoremas integrales de campo
        objetivo: Conectar derivadas locales con integrales globales.
        aparece_en_fisica: [gauss, stokes, conservacion, electromagnetismo, fluidos]

  - id: ecuaciones-diferenciales
    orden: 680000
    titulo: Ecuaciones diferenciales
    titulo_en: Differential Equations
    objetivo: Plantear y resolver relaciones donde una magnitud depende de sus cambios.
    niveles: [UNIVERSIDAD]
    leafs:
      - id: que-es-una-ecuacion-diferencial
        orden: 681000
        titulo: Qué es una ecuación diferencial
        objetivo: Entender una ley física como relación entre una magnitud y sus derivadas.
        aparece_en_fisica: [mecanica, ondas, calor, circuitos]
      - id: ecuaciones-de-primer-orden
        orden: 682000
        titulo: Ecuaciones de primer orden
        objetivo: Resolver crecimiento, decaimiento, rozamiento lineal y relajación.
