      - id: regla-de-la-cadena-en-fisica
        orden: 654000
        titulo: Regla de la cadena en física
        objetivo: Derivar variables dependientes y reconocer cambios encadenados.
        aparece_en_fisica: [energia, oscilaciones, termodinamica, campos]
      - id: derivacion-implicita-y-parametrica
        orden: 655000
        titulo: Derivación implícita y paramétrica
        objetivo: Derivar relaciones no despejadas o curvas descritas por parámetros.
        aparece_en_fisica: [trayectorias, ligaduras, orbitas]
      - id: maximos-minimos-y-estabilidad
        orden: 656000
        titulo: Máximos, mínimos y estabilidad
        objetivo: Usar derivadas para encontrar equilibrio, estabilidad y condiciones extremas.
        aparece_en_fisica: [energia, potenciales, mecanica_analitica]
      - id: derivadas-parciales-basicas
        orden: 657000
        titulo: Derivadas parciales básicas
        objetivo: Medir cambio respecto a una variable manteniendo otras constantes.
        aparece_en_fisica: [termodinamica, fluidos, campos, ondas]

  - id: calculo-integral
