version: 1
id: matematicas-para-fisica
titulo: Matemáticas para física
titulo_en: Mathematics for Physics
descripcion: Mapa didáctico de las herramientas matemáticas necesarias para operar con física desde nivel escolar hasta avanzado.
description_en: Didactic map of the mathematical tools needed to work with physics from school level to advanced level.
principio_didactico: >
  Este mapa no organiza matemáticas puras por formalismo interno, sino por utilidad física:
  estimar, despejar, leer gráficas, proyectar, derivar, integrar, modelar, aproximar,
  resolver ecuaciones y validar resultados.

orden_global:
  - algebra-para-fisica
  - funciones-y-graficas
  - trigonometria-y-geometria
  - vectores-matematicos
  - calculo-diferencial
  - calculo-integral
  - calculo-vectorial-y-campos
  - ecuaciones-diferenciales
  - algebra-lineal-y-tensores
  - numeros-complejos-fourier-y-ondas
  - probabilidad-estadistica-y-datos
  - metodos-numericos-y-computacionales

bloques:
  - id: algebra-para-fisica
    orden: 610000
    titulo: Álgebra para física
    titulo_en: Algebra for Physics
    objetivo: Transformar expresiones, estimar escalas y controlar unidades sin perder significado físico.
    niveles: [ESO, BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: despeje-de-formulas
        orden: 611000
        titulo: Despeje de fórmulas
        objetivo: Aislar incógnitas sin romper unidades, signos ni dependencias.
        aparece_en_fisica: [cinematica, dinamica, energia, electricidad, fluidos]
      - id: notacion-cientifica-y-prefijos
        orden: 612000
        titulo: Notación científica y prefijos SI
        objetivo: Manejar escalas grandes y pequeñas con prefijos, potencias de diez y coherencia dimensional.
        aparece_en_fisica: [todas]
      - id: orden-de-magnitud
        orden: 613000
        titulo: Orden de magnitud
        objetivo: Estimar resultados y detectar respuestas imposibles antes de hacer cálculo fino.
        aparece_en_fisica: [todas]
      - id: proporcionalidad-y-escala
        orden: 614000
        titulo: Proporcionalidad y escala
        objetivo: Reconocer relaciones directas, inversas, cuadráticas, cúbicas y de potencia.
        aparece_en_fisica: [gravitacion, campos, ondas, fluidos, energia]
      - id: analisis-dimensional
        orden: 615000
        titulo: Análisis dimensional
        objetivo: Comprobar dimensiones, construir escalas y detectar fórmulas mal formadas.
        aparece_en_fisica: [todas]
      - id: cifras-significativas-e-incertidumbre
        orden: 616000
        titulo: Cifras significativas e incertidumbre
        objetivo: Redondear, propagar incertidumbres básicas y no prometer precisión falsa.
        aparece_en_fisica: [laboratorio, medicion, datos]
      - id: sistemas-de-ecuaciones-para-fisica
        orden: 617000
        titulo: Sistemas de ecuaciones para física
        objetivo: Resolver varias incógnitas físicas acopladas con sustitución, eliminación y matrices simples.
        aparece_en_fisica: [circuitos, equilibrio, colisiones, estatica, fluidos]
      - id: logaritmos-y-exponenciales
        orden: 618000
        titulo: Logaritmos y exponenciales
        objetivo: Entender crecimiento, decaimiento, escalas logarítmicas y linealización.
        aparece_en_fisica: [radiactividad, amortiguamiento, ondas, termodinamica, electronica]

  - id: funciones-y-graficas
    orden: 620000
    titulo: Funciones y gráficas
    titulo_en: Functions and Graphs
    objetivo: "Leer una relación física antes de calcular: ejes, pendiente, área, curvatura, límites y tendencias."
    niveles: [ESO, BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: lectura-de-graficas
        orden: 621000
        titulo: Lectura de gráficas
        objetivo: Interpretar ejes, unidades, escalas, tendencia, cortes y zonas relevantes.
        aparece_en_fisica: [cinematica, energia, ondas, laboratorio]
      - id: pendiente-y-area
        orden: 622000
        titulo: Pendiente y área
        objetivo: Asociar pendiente con tasa de cambio y área con acumulación.
        aparece_en_fisica: [cinematica, trabajo, impulso, carga, flujo]
      - id: tipos-de-funciones-comunes
        orden: 623000
        titulo: Tipos de funciones comunes
        objetivo: Reconocer funciones lineales, cuadráticas, inversas, exponenciales, logarítmicas y sinusoidales.
        aparece_en_fisica: [movimiento, campos, ondas, decaimiento, oscilaciones]
      - id: linealizacion-y-ajuste
        orden: 624000
        titulo: Linealización y ajuste
        objetivo: Transformar datos para obtener pendientes físicas e interpretar parámetros ajustados.
        aparece_en_fisica: [laboratorio, gases, resortes, decaimiento, campos]
      - id: escalas-logaritmicas
        orden: 625000
        titulo: Escalas logarítmicas
        objetivo: Leer órdenes de magnitud, leyes de potencia y escalas como decibelios o pH.
        aparece_en_fisica: [ondas, sonido, electromagnetismo, datos]
      - id: maximos-minimos-y-puntos-criticos
        orden: 626000
        titulo: Máximos, mínimos y puntos críticos
        objetivo: Interpretar extremos como equilibrio, estabilidad, umbral o condición óptima.
        aparece_en_fisica: [energia, potenciales, optimizacion, estabilidad]

  - id: trigonometria-y-geometria
    orden: 630000
    titulo: Trigonometría y geometría
    titulo_en: Trigonometry and Geometry
    objetivo: Traducir ángulos, direcciones, componentes, distancias y geometrías a relaciones calculables.
    niveles: [ESO, BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: angulos-y-direcciones
        orden: 631000
        titulo: Ángulos y direcciones
        objetivo: Fijar referencia angular, sentido positivo, cuadrantes y signos.
        aparece_en_fisica: [vectores, tiro_parabolico, rotacion, ondas]
      - id: funciones-trigonometricas
        orden: 632000
        titulo: Funciones trigonométricas
        objetivo: Usar seno, coseno y tangente como relaciones entre ángulo, proyección y razón geométrica.
        aparece_en_fisica: [componentes, oscilaciones, ondas, rotacion]
      - id: proyecciones-y-componentes
        orden: 633000
        titulo: Proyecciones y componentes
        objetivo: Convertir una magnitud dirigida en componentes sobre ejes.
        aparece_en_fisica: [fuerzas, velocidad, campos, planos_inclinados]
      - id: radianes-y-movimiento-angular
        orden: 634000
        titulo: Radianes y movimiento angular
        objetivo: Entender el radián como longitud de arco relativa y usarlo en rotación y oscilaciones.
        aparece_en_fisica: [rotacion, oscilaciones, ondas]
      - id: triangulos-y-relaciones-geometricas
        orden: 635000
        titulo: Triángulos y relaciones geométricas
        objetivo: Usar Pitágoras, semejanza y geometría básica en problemas físicos.
        aparece_en_fisica: [mecanica, optica, campos, equilibrio]
      - id: coordenadas-polares-basicas
        orden: 636000
        titulo: Coordenadas polares básicas
        objetivo: Describir posición con radio y ángulo cuando la simetría radial simplifica el problema.
        aparece_en_fisica: [rotacion, gravitacion, campos, ondas]

  - id: vectores-matematicos
    orden: 640000
    titulo: Vectores y geometría vectorial
    titulo_en: Mathematical Vectors
    objetivo: Operar con magnitudes dirigidas, componentes, productos y bases.
    niveles: [ESO, BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: concepto-de-vector
        orden: 641000
        titulo: Concepto de vector
        objetivo: Distinguir módulo, dirección, sentido, punto de aplicación y componente.
        aparece_en_fisica: [fuerzas, velocidad, aceleracion, campos]
      - id: operaciones-con-vectores
        orden: 642000
        titulo: Operaciones con vectores
        objetivo: Sumar, restar, escalar y descomponer vectores con significado geométrico.
        aparece_en_fisica: [dinamica, estatica, campos]
      - id: vectores-unitarios-y-bases
        orden: 643000
        titulo: Vectores unitarios y bases
        objetivo: Expresar vectores mediante bases cartesianas, polares o adaptadas al problema.
        aparece_en_fisica: [mecanica, electromagnetismo, fluidos]
      - id: producto-escalar
        orden: 644000
        titulo: Producto escalar
        objetivo: Medir alineación, proyección, trabajo y componentes paralelas.
        aparece_en_fisica: [trabajo, potencia, flujo, proyecciones]
      - id: producto-vectorial
        orden: 645000
        titulo: Producto vectorial
        objetivo: Medir perpendicularidad orientada, área vectorial, torque y momento angular.
        aparece_en_fisica: [rotacion, magnetismo, momento_angular]
      - id: cambio-de-base-y-componentes
        orden: 646000
        titulo: Cambio de base y componentes
        objetivo: Reescribir vectores en sistemas de ejes más convenientes.
        aparece_en_fisica: [planos_inclinados, rotacion, marcos_no_inerciales]
      - id: campos-vectoriales-basicos
        orden: 647000
        titulo: Campos vectoriales básicos
        objetivo: Entender un vector asociado a cada punto del espacio.
        aparece_en_fisica: [gravitacion, electricidad, magnetismo, fluidos]

  - id: calculo-diferencial
    orden: 650000
    titulo: Cálculo diferencial para física
    titulo_en: Differential Calculus for Physics
    objetivo: Interpretar derivadas como cambio local, sensibilidad, velocidad, aceleración y estabilidad.
    niveles: [BACHILLERATO, UNIVERSIDAD]
    leafs:
      - id: derivada-como-tasa-de-cambio
        orden: 651000
        titulo: Derivada como tasa de cambio
        objetivo: Entender la derivada como cambio instantáneo respecto a una variable.
        aparece_en_fisica: [cinematica, crecimiento, transferencia]
      - id: derivadas-de-funciones-comunes
        orden: 652000
        titulo: Derivadas de funciones comunes
        objetivo: Derivar potencias, exponenciales, logaritmos y trigonométricas con uso físico.
        aparece_en_fisica: [oscilaciones, ondas, campos, decaimiento]
      - id: interpretacion-fisica-de-la-derivada
        orden: 653000
        titulo: Interpretación física de la derivada
        objetivo: Leer una derivada como velocidad, aceleración, fuerza, gradiente o sensibilidad.
