<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#0f172a" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)" />

  <text x="60" y="60" font-size="34" fill="#0f172a" font-weight="700">
    Elementos de una onda sinusoidal
  </text>

  <rect x="50" y="90" width="1100" height="300" rx="14" fill="#ffffff" fill-opacity="0.65" stroke="#93c5fd" stroke-width="2" />
  <text x="80" y="130" font-size="24" fill="#1e3a8a" font-weight="700">Perfil espacial y(x) en un instante fijo</text>

  <line x1="90" y1="250" x2="1110" y2="250" stroke="#334155" stroke-width="2" />
  <text x="1120" y="255" font-size="20" fill="#334155">x</text>

  <path d="M 100 250 C 140 170, 220 170, 260 250 C 300 330, 380 330, 420 250 C 460 170, 540 170, 580 250 C 620 330, 700 330, 740 250 C 780 170, 860 170, 900 250 C 940 330, 1020 330, 1060 250"
        fill="none" stroke="url(#waveGrad)" stroke-width="5" />

  <line x1="170" y1="170" x2="170" y2="250" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8 6" />
  <text x="182" y="214" font-size="21" fill="#166534" font-weight="700">A (amplitud)</text>

  <line x1="170" y1="148" x2="490" y2="148" stroke="#ea580c" stroke-width="2.4" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <text x="285" y="138" font-size="21" fill="#9a3412" font-weight="700">lambda (longitud de onda)</text>

  <circle cx="170" cy="170" r="6" fill="#1d4ed8" />
  <text x="146" y="160" font-size="18" fill="#0f172a">cresta</text>
  <circle cx="330" cy="330" r="6" fill="#1d4ed8" />
  <text x="345" y="347" font-size="18" fill="#0f172a">valle</text>

  <line x1="100" y1="250" x2="100" y2="170" stroke="#0f172a" stroke-width="1.6" />
  <line x1="100" y1="250" x2="100" y2="330" stroke="#0f172a" stroke-width="1.6" />
  <text x="66" y="245" font-size="20" fill="#0f172a">y</text>

  <rect x="50" y="420" width="1100" height="250" rx="14" fill="#ffffff" fill-opacity="0.65" stroke="#93c5fd" stroke-width="2" />
  <text x="80" y="460" font-size="24" fill="#1e3a8a" font-weight="700">Perfil temporal y(t) en una posicion fija</text>

  <line x1="90" y1="560" x2="1110" y2="560" stroke="#334155" stroke-width="2" />
  <text x="1120" y="565" font-size="20" fill="#334155">t</text>

  <path d="M 100 560 C 150 500, 210 500, 260 560 C 310 620, 370 620, 420 560 C 470 500, 530 500, 580 560 C 630 620, 690 620, 740 560 C 790 500, 850 500, 900 560"
        fill="none" stroke="#0ea5e9" stroke-width="5" />

  <line x1="100" y1="520" x2="260" y2="520" stroke="#ea580c" stroke-width="2.4" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <text x="150" y="508" font-size="21" fill="#9a3412" font-weight="700">T (periodo)</text>

  <text x="360" y="520" font-size="22" fill="#0f172a" font-weight="700">f = 1/T</text>
  <text x="560" y="520" font-size="22" fill="#0f172a" font-weight="700">v = lambda * f</text>

  <text x="80" y="700" font-size="19" fill="#334155">
    Idea clave: amplitud mide energia relativa, lambda mide escala espacial, periodo/frecuencia miden escala temporal.
  </text>
</svg>
