<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Area positiva y negativa bajo una curva</title>
  <desc id="desc">Curva que cruza el eje horizontal con region positiva y region negativa sombreadas.</desc>
  <rect width="760" height="420" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif" fill="#111827">
    <text x="38" y="44" font-size="24" font-weight="700">Area con signo: acumulacion en un intervalo</text>
    <text x="42" y="388" font-size="14" fill="#475569">Por encima del eje suma positivo; por debajo suma negativo.</text>
  </g>
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="70" y1="240" x2="700" y2="240"/>
    <line x1="70" y1="340" x2="70" y2="80"/>
  </g>
  <path d="M96 238 C150 130, 245 110, 330 188 C396 248, 452 338, 552 302 C612 280, 650 208, 680 152" fill="none" stroke="#2563eb" stroke-width="5"/>
  <path d="M96 238 C150 130, 245 110, 330 188 C360 215, 378 235, 392 240 L96 240 Z" fill="#bbf7d0" opacity="0.85"/>
  <path d="M392 240 C414 278, 456 336, 552 302 C588 290, 620 250, 645 204 L645 240 Z" fill="#fecaca" opacity="0.85"/>
  <path d="M645 240 C657 210, 670 174, 680 152 L680 240 Z" fill="#bbf7d0" opacity="0.85"/>
  <g font-family="Inter, Arial, sans-serif" font-size="17">
    <rect x="145" y="92" width="186" height="34" rx="8" fill="#dcfce7"/>
    <text x="161" y="115" fill="#166534">area positiva</text>
    <rect x="430" y="318" width="188" height="34" rx="8" fill="#fee2e2"/>
    <text x="446" y="341" fill="#991b1b">area negativa</text>
    <rect x="426" y="90" width="260" height="62" rx="8" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="442" y="115" fill="#075985">Unidad del area:</text>
    <text x="442" y="139" fill="#075985">unidad vertical x unidad horizontal</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#475569" font-size="16">
    <text x="705" y="245">x</text>
    <text x="58" y="72">y</text>
  </g>
</svg>
