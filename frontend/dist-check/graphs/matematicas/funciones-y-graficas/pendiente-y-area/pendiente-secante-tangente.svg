<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Pendiente como subida dividida entre avance</title>
  <desc id="desc">Grafica con recta secante, triangulo de subida y avance, y tangente local en una curva.</desc>
  <rect width="760" height="420" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif" fill="#111827">
    <text x="38" y="44" font-size="24" font-weight="700">Pendiente = cambio vertical / cambio horizontal</text>
    <text x="42" y="388" font-size="14" fill="#475569">La pendiente mide una tasa: cuanto cambia y por cada unidad de x.</text>
  </g>
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="70" y1="340" x2="700" y2="340"/>
    <line x1="70" y1="340" x2="70" y2="80"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#475569" font-size="16">
    <text x="705" y="345">x</text>
    <text x="58" y="72">y</text>
  </g>
  <path d="M92 318 C180 292, 240 258, 312 226 C405 184, 506 148, 676 106" fill="none" stroke="#2563eb" stroke-width="5"/>
  <line x1="170" y1="282" x2="550" y2="144" stroke="#0f172a" stroke-width="3"/>
  <circle cx="170" cy="282" r="7" fill="#0f172a"/>
  <circle cx="550" cy="144" r="7" fill="#0f172a"/>
  <line x1="170" y1="282" x2="550" y2="282" stroke="#16a34a" stroke-width="4"/>
  <line x1="550" y1="282" x2="550" y2="144" stroke="#dc2626" stroke-width="4"/>
  <path d="M180 292 L170 282 L184 275" fill="none" stroke="#0f172a" stroke-width="3"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="300" y="292" width="122" height="30" rx="6" fill="#dcfce7"/>
    <text x="320" y="313" font-size="17" fill="#166534">avance: Delta x</text>
    <rect x="562" y="198" width="124" height="30" rx="6" fill="#fee2e2"/>
    <text x="577" y="219" font-size="17" fill="#991b1b">subida: Delta y</text>
    <rect x="216" y="98" width="190" height="54" rx="8" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="232" y="121" font-size="17" fill="#075985">Pendiente media</text>
    <text x="232" y="143" font-size="17" fill="#075985">m = Delta y / Delta x</text>
  </g>
  <line x1="462" y1="160" x2="640" y2="96" stroke="#f97316" stroke-width="4" stroke-dasharray="8 8"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="520" y="58" width="178" height="34" rx="8" fill="#ffedd5"/>
    <text x="536" y="80" font-size="16" fill="#9a3412">Tangente: pendiente local</text>
  </g>
</svg>
