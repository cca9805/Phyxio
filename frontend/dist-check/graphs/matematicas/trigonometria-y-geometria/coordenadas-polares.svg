<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">Coordenadas polares basicas</title>
  <desc id="desc">Punto descrito por radio r y angulo theta, con proyecciones x igual r cos theta e y igual r sin theta.</desc>
  <rect width="720" height="430" fill="#f8fafc"/>
  <g transform="translate(350 235)">
    <line x1="-250" y1="0" x2="250" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <line x1="0" y1="150" x2="0" y2="-170" stroke="#94a3b8" stroke-width="2"/>
    <path d="M 0 0 L 165 -105" stroke="#2563eb" stroke-width="5"/>
    <line x1="165" y1="-105" x2="165" y2="0" stroke="#ef4444" stroke-width="4" stroke-dasharray="8 8"/>
    <line x1="0" y1="0" x2="165" y2="0" stroke="#16a34a" stroke-width="4" stroke-dasharray="8 8"/>
    <circle cx="165" cy="-105" r="8" fill="#0f172a"/>
    <path d="M 58 0 A 58 58 0 0 0 49 -31" fill="none" stroke="#0f172a" stroke-width="3"/>
    <text x="82" y="-65" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#2563eb">r</text>
    <text x="70" y="-12" font-family="Inter, Arial, sans-serif" font-size="22" fill="#0f172a">theta</text>
    <text x="82" y="32" font-family="Inter, Arial, sans-serif" font-size="20" fill="#16a34a">x = r cos theta</text>
    <text x="178" y="-48" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ef4444">y = r sin theta</text>
    <text x="178" y="-116" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a">P(r, theta)</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="50" y="58" font-size="30" font-weight="700">Polares</text>
    <text x="50" y="100" font-size="20">Radio: distancia al origen</text>
    <text x="50" y="132" font-size="20">Angulo: direccion desde el eje x</text>
    <text x="50" y="164" font-size="20">Utiles con simetria circular</text>
  </g>
</svg>
