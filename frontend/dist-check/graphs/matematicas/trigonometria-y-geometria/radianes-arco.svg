<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">Radianes como longitud de arco relativa</title>
  <desc id="desc">Un radio, un arco y un angulo central muestran que theta en radianes es s dividido entre r.</desc>
  <rect width="720" height="430" fill="#f8fafc"/>
  <g transform="translate(330 250)">
    <circle r="150" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <path d="M 150 0 A 150 150 0 0 0 75 -129.9" fill="none" stroke="#ef4444" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="150" y2="0" stroke="#2563eb" stroke-width="5"/>
    <line x1="0" y1="0" x2="75" y2="-129.9" stroke="#2563eb" stroke-width="5"/>
    <path d="M 54 0 A 54 54 0 0 0 27 -46.8" fill="none" stroke="#0f172a" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#0f172a"/>
    <text x="78" y="-20" font-family="Inter, Arial, sans-serif" font-size="22" fill="#2563eb">r</text>
    <text x="30" y="-72" font-family="Inter, Arial, sans-serif" font-size="22" fill="#0f172a">theta</text>
    <text x="120" y="-88" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ef4444">arco s</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="52" y="70" font-size="30" font-weight="700">Radián</text>
    <text x="52" y="112" font-size="22">theta = s / r</text>
    <text x="52" y="152" font-size="18">Si s = r, entonces theta = 1 rad.</text>
    <text x="52" y="190" font-size="18">Una vuelta completa mide 2 pi rad.</text>
    <text x="52" y="228" font-size="18">180 grados = pi rad.</text>
  </g>
  <g transform="translate(510 300)" font-family="Inter, Arial, sans-serif">
    <rect x="0" y="0" width="150" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="18" y="30" font-size="17" fill="#075985">En rotacion:</text>
    <text x="18" y="55" font-size="17" fill="#075985">s = r theta</text>
  </g>
</svg>
