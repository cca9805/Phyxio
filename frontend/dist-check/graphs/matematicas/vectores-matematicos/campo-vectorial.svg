<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" role="img" aria-labelledby="title desc">
  <title id="title">Basic vector field</title>
  <desc id="desc">A grid of arrows with different directions and lengths, representing a vector assigned to each point.</desc>
  <defs>
    <marker id="arrow-field" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="780" height="430" fill="#ffffff"/>
  <text x="58" y="48" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Campo vectorial: un vector en cada punto</text>
  <g transform="translate(92 92)" stroke="#e2e8f0" stroke-width="1">
    <path d="M0 0 H600 M0 60 H600 M0 120 H600 M0 180 H600 M0 240 H600 M0 300 H600"/>
    <path d="M0 0 V300 M100 0 V300 M200 0 V300 M300 0 V300 M400 0 V300 M500 0 V300 M600 0 V300"/>
  </g>
