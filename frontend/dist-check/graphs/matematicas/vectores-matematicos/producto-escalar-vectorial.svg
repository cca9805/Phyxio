<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Dot product and cross product</title>
  <desc id="desc">Left panel shows projection for the dot product. Right panel shows a perpendicular vector for the cross product.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/></marker>
  </defs>
  <rect width="900" height="450" fill="#ffffff"/>
  <line x1="450" y1="45" x2="450" y2="405" stroke="#e2e8f0" stroke-width="2"/>

  <text x="92" y="55" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">Producto escalar</text>
  <g transform="translate(80 330)">
    <line x1="0" y1="0" x2="310" y2="0" stroke="#16a34a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-green)"/>
    <line x1="0" y1="0" x2="225" y2="-150" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="225" y1="-150" x2="225" y2="0" stroke="#f97316" stroke-width="4" stroke-dasharray="8 7"/>
    <line x1="0" y1="0" x2="225" y2="0" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <path d="M65 0 A65 65 0 0 1 55 -36" fill="none" stroke="#7c3aed" stroke-width="4"/>
    <text x="82" y="-17" font-family="Inter, Arial, sans-serif" font-size="20" fill="#7c3aed">theta</text>
    <text x="118" y="-94" font-family="Inter, Arial, sans-serif" font-size="23" fill="#1d4ed8">A</text>
    <text x="286" y="28" font-family="Inter, Arial, sans-serif" font-size="23" fill="#15803d">B</text>
    <text x="73" y="38" font-family="Inter, Arial, sans-serif" font-size="21" fill="#c2410c">proyeccion de A sobre B</text>
    <text x="18" y="-210" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">A dot B = |A| |B| cos theta</text>
  </g>

  <text x="535" y="55" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">Producto vectorial</text>
  <g transform="translate(535 330)">
    <line x1="0" y1="0" x2="250" y2="0" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="0" y1="0" x2="95" y2="-135" stroke="#16a34a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-green)"/>
    <line x1="0" y1="0" x2="0" y2="-230" stroke="#dc2626" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-red)"/>
    <path d="M70 -2 A70 70 0 0 1 42 -58" fill="none" stroke="#7c3aed" stroke-width="4"/>
    <text x="75" y="-34" font-family="Inter, Arial, sans-serif" font-size="20" fill="#7c3aed">theta</text>
    <text x="105" y="31" font-family="Inter, Arial, sans-serif" font-size="23" fill="#1d4ed8">A</text>
    <text x="98" y="-94" font-family="Inter, Arial, sans-serif" font-size="23" fill="#15803d">B</text>
    <text x="17" y="-190" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#b91c1c">A x B</text>
    <text x="35" y="-245" font-family="Inter, Arial, sans-serif" font-size="22" fill="#334155">perpendicular al plano</text>
  </g>
</svg>
