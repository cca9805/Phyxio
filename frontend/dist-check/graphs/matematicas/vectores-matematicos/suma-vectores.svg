<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" role="img" aria-labelledby="title desc">
  <title id="title">Vector addition by head-to-tail and parallelogram</title>
  <desc id="desc">Two panels show vector addition: on the left by head-to-tail placement and on the right by the parallelogram rule.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/></marker>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <line x1="410" y1="40" x2="410" y2="390" stroke="#e2e8f0" stroke-width="2"/>
  <text x="95" y="55" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Punta-cola</text>
  <text x="500" y="55" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Paralelogramo</text>

  <g transform="translate(85 305)">
    <line x1="0" y1="0" x2="175" y2="-120" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="175" y1="-120" x2="300" y2="-40" stroke="#16a34a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-green)"/>
    <line x1="0" y1="0" x2="300" y2="-40" stroke="#dc2626" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-red)"/>
    <text x="70" y="-83" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1d4ed8">A</text>
    <text x="234" y="-95" font-family="Inter, Arial, sans-serif" font-size="22" fill="#15803d">B</text>
    <text x="138" y="12" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">R = A + B</text>
  </g>

  <g transform="translate(500 305)">
    <line x1="0" y1="0" x2="190" y2="-35" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="0" y1="0" x2="100" y2="-155" stroke="#16a34a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-green)"/>
    <line x1="190" y1="-35" x2="290" y2="-190" stroke="#16a34a" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arrow-green)"/>
    <line x1="100" y1="-155" x2="290" y2="-190" stroke="#2563eb" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arrow-blue)"/>
    <line x1="0" y1="0" x2="290" y2="-190" stroke="#dc2626" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-red)"/>
    <text x="83" y="-13" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1d4ed8">A</text>
    <text x="43" y="-92" font-family="Inter, Arial, sans-serif" font-size="22" fill="#15803d">B</text>
    <text x="135" y="-116" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">R</text>
  </g>
</svg>
