<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Vector with magnitude, direction, sense, and components</title>
  <desc id="desc">A vector arrow from the origin to a point, with horizontal and vertical component projections and labels for magnitude, direction, and sense.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="760" height="430" fill="#ffffff"/>
  <g transform="translate(95 335)">
    <line x1="0" y1="0" x2="560" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <line x1="0" y1="0" x2="0" y2="-255" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="573" y="6" font-family="Inter, Arial, sans-serif" font-size="19" fill="#334155">x</text>
    <text x="-7" y="-272" font-family="Inter, Arial, sans-serif" font-size="19" fill="#334155">y</text>

    <line x1="0" y1="0" x2="390" y2="-210" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="390" y1="0" x2="390" y2="-210" stroke="#f97316" stroke-width="4" stroke-dasharray="10 8"/>
    <line x1="0" y1="-210" x2="390" y2="-210" stroke="#f97316" stroke-width="4" stroke-dasharray="10 8"/>
    <line x1="0" y1="0" x2="390" y2="0" stroke="#16a34a" stroke-width="6" marker-end="url(#arrow-gray)"/>
    <line x1="390" y1="0" x2="390" y2="-210" stroke="#dc2626" stroke-width="6" marker-end="url(#arrow-gray)"/>

    <path d="M72 0 A72 72 0 0 1 63 -34" fill="none" stroke="#7c3aed" stroke-width="4"/>
    <text x="83" y="-18" font-family="Inter, Arial, sans-serif" font-size="20" fill="#7c3aed">theta</text>

    <text x="198" y="-129" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#1d4ed8">A</text>
    <text x="175" y="35" font-family="Inter, Arial, sans-serif" font-size="23" fill="#15803d">A_x</text>
    <text x="408" y="-98" font-family="Inter, Arial, sans-serif" font-size="23" fill="#b91c1c">A_y</text>
    <text x="431" y="-226" font-family="Inter, Arial, sans-serif" font-size="19" fill="#334155">punta = sentido</text>
    <text x="225" y="-238" font-family="Inter, Arial, sans-serif" font-size="19" fill="#334155">longitud = modulo</text>
    <text x="-10" y="27" font-family="Inter, Arial, sans-serif" font-size="19" fill="#334155">origen</text>
  </g>
</svg>
