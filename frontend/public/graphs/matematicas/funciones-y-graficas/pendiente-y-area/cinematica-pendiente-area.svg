<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Pendiente y area en graficas de cinematica</title>
  <desc id="desc">Dos paneles comparan pendiente en posicion-tiempo y area en velocidad-tiempo.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif" fill="#111827">
    <text x="38" y="44" font-size="25" font-weight="700">La pregunta decide: pendiente o area</text>
  </g>
  <g transform="translate(45 78)">
    <rect x="0" y="0" width="385" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="22" y="34" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Grafica x-t</text>
    <line x1="55" y1="250" x2="340" y2="250" stroke="#94a3b8" stroke-width="2"/>
    <line x1="55" y1="250" x2="55" y2="60" stroke="#94a3b8" stroke-width="2"/>
    <line x1="90" y1="222" x2="304" y2="92" stroke="#2563eb" stroke-width="5"/>
    <line x1="115" y1="207" x2="250" y2="207" stroke="#16a34a" stroke-width="4"/>
    <line x1="250" y1="207" x2="250" y2="125" stroke="#dc2626" stroke-width="4"/>
    <text x="258" y="170" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">Delta x</text>
    <text x="154" y="230" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">Delta t</text>
    <rect x="78" y="56" width="250" height="44" rx="8" fill="#dbeafe"/>
    <text x="94" y="83" font-family="Inter, Arial, sans-serif" font-size="17" fill="#1e40af">pendiente = velocidad</text>
    <text x="333" y="270" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">t</text>
    <text x="42" y="56" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">x</text>
  </g>
  <g transform="translate(470 78)">
    <rect x="0" y="0" width="385" height="310" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="22" y="34" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Grafica v-t</text>
    <line x1="55" y1="250" x2="340" y2="250" stroke="#94a3b8" stroke-width="2"/>
    <line x1="55" y1="250" x2="55" y2="60" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="82,250 82,110 210,110 306,190 306,250" fill="#bbf7d0" opacity="0.9"/>
    <polyline points="82,110 210,110 306,190" fill="none" stroke="#2563eb" stroke-width="5"/>
    <line x1="82" y1="250" x2="306" y2="250" stroke="#16a34a" stroke-width="4"/>
    <rect x="84" y="58" width="250" height="44" rx="8" fill="#dcfce7"/>
    <text x="100" y="85" font-family="Inter, Arial, sans-serif" font-size="17" fill="#166534">area = desplazamiento</text>
    <text x="333" y="270" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">t</text>
    <text x="42" y="56" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">v</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">
    <text x="75" y="426">x-t: dividir unidades produce m/s.</text>
    <text x="500" y="426">v-t: multiplicar unidades produce m.</text>
  </g>
</svg>
