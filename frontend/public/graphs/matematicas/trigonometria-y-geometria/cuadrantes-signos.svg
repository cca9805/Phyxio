<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Signos de seno, coseno y tangente por cuadrante</title>
  <desc id="desc">Circunferencia unidad con ejes, cuadrantes y signos de seno, coseno y tangente.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243047"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:2}
      .axis{stroke:#243047;stroke-width:3;marker-end:url(#arrow)}
      .grid{stroke:#d8e0ec;stroke-width:1.4}
      .circle{fill:#f8fbff;stroke:#334155;stroke-width:3}
      .rad{stroke:#2563eb;stroke-width:5;stroke-linecap:round}
      .arc{fill:none;stroke:#f97316;stroke-width:4}
      .txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#1e293b;font-size:24px}
      .small{font-size:18px}
      .tiny{font-size:15px}
      .head{font-size:28px;font-weight:700}
      .q{font-size:22px;font-weight:700}
      .pos{fill:#15803d;font-weight:700}
      .neg{fill:#b91c1c;font-weight:700}
      .zero{fill:#64748b;font-weight:700}
      .softBlue{fill:#dbeafe}
      .softGreen{fill:#dcfce7}
      .softRed{fill:#fee2e2}
      .softYellow{fill:#fef9c3}
    </style>
  </defs>
  <rect class="bg" width="960" height="560"/>
  <rect class="panel" x="28" y="28" width="904" height="504" rx="18"/>
  <text class="txt head" x="58" y="76">Signos por cuadrante en la circunferencia unidad</text>
  <text class="txt small" x="58" y="108">cos(theta) es la coordenada horizontal; sin(theta) es la coordenada vertical.</text>

  <g transform="translate(290 302)">
    <line class="grid" x1="-190" y1="-190" x2="190" y2="190"/>
    <line class="grid" x1="-190" y1="190" x2="190" y2="-190"/>
    <circle class="circle" cx="0" cy="0" r="162"/>
    <line class="axis" x1="-205" y1="0" x2="210" y2="0"/>
    <line class="axis" x1="0" y1="205" x2="0" y2="-210"/>
    <text class="txt small" x="218" y="8">x = cos</text>
    <text class="txt small" x="12" y="-216">y = sin</text>

    <path class="arc" d="M 70 0 A 70 70 0 0 0 49.5 -49.5"/>
    <line class="rad" x1="0" y1="0" x2="116" y2="-116"/>
    <circle cx="116" cy="-116" r="7" fill="#2563eb"/>
    <line x1="116" y1="-116" x2="116" y2="0" stroke="#16a34a" stroke-width="4" stroke-dasharray="7 6"/>
    <line x1="116" y1="-116" x2="0" y2="-116" stroke="#dc2626" stroke-width="4" stroke-dasharray="7 6"/>
    <text class="txt tiny" x="79" y="-16">theta</text>
    <text class="txt tiny pos" x="123" y="-54">sin +</text>
    <text class="txt tiny pos" x="39" y="-126">cos +</text>

    <text class="txt q pos" x="70" y="-118">I</text>
    <text class="txt q" x="-112" y="-118">II</text>
    <text class="txt q" x="-122" y="126">III</text>
    <text class="txt q" x="80" y="126">IV</text>
    <text class="txt tiny" x="129" y="-158">30, 45, 60 deg</text>
    <text class="txt tiny" x="-192" y="-166">150 deg: sin +, cos -</text>
    <text class="txt tiny" x="-198" y="182">210 deg: sin -, cos -</text>
    <text class="txt tiny" x="88" y="182">330 deg: sin -, cos +</text>
  </g>

  <g transform="translate(575 150)">
    <rect x="0" y="0" width="310" height="300" rx="14" fill="#f8fafc" stroke="#d8e0ec" stroke-width="2"/>
    <text class="txt q" x="24" y="42">Tabla de signos</text>
    <g class="txt small">
      <text x="28" y="86">Cuadrante</text><text x="150" y="86">sin</text><text x="205" y="86">cos</text><text x="260" y="86">tan</text>
      <line x1="20" y1="100" x2="292" y2="100" stroke="#cbd5e1" stroke-width="2"/>
      <text x="48" y="135">I</text><text class="pos" x="155" y="135">+</text><text class="pos" x="210" y="135">+</text><text class="pos" x="265" y="135">+</text>
      <text x="44" y="175">II</text><text class="pos" x="155" y="175">+</text><text class="neg" x="211" y="175">-</text><text class="neg" x="266" y="175">-</text>
      <text x="40" y="215">III</text><text class="neg" x="156" y="215">-</text><text class="neg" x="211" y="215">-</text><text class="pos" x="265" y="215">+</text>
      <text x="42" y="255">IV</text><text class="neg" x="156" y="255">-</text><text class="pos" x="210" y="255">+</text><text class="neg" x="266" y="255">-</text>
    </g>
  </g>
</svg>
