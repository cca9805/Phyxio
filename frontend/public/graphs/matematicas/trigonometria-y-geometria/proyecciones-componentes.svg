<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Proyecciones y componentes de una magnitud dirigida</title>
  <desc id="desc">Vector A con componentes Ax y Ay, y tabla de componentes para angulos notables.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="axisArrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243047"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#d8e0ec;stroke-width:2}.axis{stroke:#243047;stroke-width:3;marker-end:url(#axisArrow)}.vec{stroke:#2563eb;stroke-width:7;marker-end:url(#arrow);stroke-linecap:round}.xcomp{stroke:#16a34a;stroke-width:7;stroke-linecap:round}.ycomp{stroke:#dc2626;stroke-width:7;stroke-linecap:round}.dash{stroke-dasharray:8 7}.arc{fill:none;stroke:#f97316;stroke-width:4}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#1e293b;font-size:23px}.head{font-size:30px;font-weight:700}.small{font-size:18px}.tiny{font-size:15px}.label{font-size:22px;font-weight:700}.green{fill:#15803d}.red{fill:#b91c1c}.blue{fill:#1d4ed8}.orange{fill:#c2410c}.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="960" height="560"/>
  <rect class="panel" x="28" y="28" width="904" height="504" rx="18"/>
  <text class="txt head" x="58" y="78">Proyecciones: la sombra de una flecha sobre los ejes</text>
  <text class="txt small" x="58" y="110">Si theta se mide desde x: Ax = A cos(theta), Ay = A sin(theta).</text>

  <g transform="translate(92 132)">
    <line class="axis" x1="0" y1="330" x2="430" y2="330"/>
    <line class="axis" x1="0" y1="330" x2="0" y2="10"/>
    <line class="vec" x1="0" y1="330" x2="325" y2="110"/>
    <line class="xcomp" x1="0" y1="330" x2="325" y2="330"/>
    <line class="ycomp" x1="325" y1="330" x2="325" y2="110"/>
    <line class="dash" x1="325" y1="110" x2="0" y2="110" stroke="#94a3b8" stroke-width="3"/>
    <path class="arc" d="M 85 330 A 85 85 0 0 0 70 282"/>
    <text class="txt orange" x="92" y="294">theta</text>
    <text class="txt blue" x="180" y="180">A</text>
    <text class="txt green" x="140" y="367">Ax = A cos(theta)</text>
    <text class="txt red" x="338" y="232">Ay = A sin(theta)</text>
    <text class="txt small" x="438" y="338">x</text>
    <text class="txt small" x="-10" y="-3">y</text>
  </g>

  <g transform="translate(575 150)">
    <rect class="box" x="0" y="0" width="315" height="300" rx="14"/>
    <text class="txt label" x="22" y="42">Valores utiles</text>
    <text class="txt tiny" x="22" y="75">Angulo desde x en cuadrante I</text>
    <g class="txt small">
      <text x="26" y="112">theta</text><text x="108" y="112">Ax</text><text x="225" y="112">Ay</text>
      <line x1="20" y1="126" x2="292" y2="126" stroke="#cbd5e1" stroke-width="2"/>
      <text x="30" y="158">0</text><text x="105" y="158">A</text><text x="226" y="158">0</text>
      <text x="24" y="190">30</text><text x="83" y="190">A sqrt(3)/2</text><text x="218" y="190">A/2</text>
      <text x="24" y="222">45</text><text x="83" y="222">A sqrt(2)/2</text><text x="198" y="222">A sqrt(2)/2</text>
      <text x="24" y="254">60</text><text x="102" y="254">A/2</text><text x="198" y="254">A sqrt(3)/2</text>
      <text x="24" y="286">90</text><text x="106" y="286">0</text><text x="225" y="286">A</text>
    </g>
  </g>
</svg>
