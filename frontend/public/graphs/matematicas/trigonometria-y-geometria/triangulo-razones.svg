<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Triangulo rectangulo y razones trigonometricas</title>
  <desc id="desc">Triangulo rectangulo con hipotenusa, cateto opuesto, cateto adyacente y formulas de seno, coseno y tangente.</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#d8e0ec;stroke-width:2}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#1e293b;font-size:23px}.head{font-size:30px;font-weight:700}.small{font-size:18px}.label{font-size:22px;font-weight:700}.tri{fill:#eff6ff;stroke:#1e3a8a;stroke-width:4;stroke-linejoin:round}.adj{stroke:#16a34a;stroke-width:8;stroke-linecap:round}.opp{stroke:#dc2626;stroke-width:8;stroke-linecap:round}.hyp{stroke:#2563eb;stroke-width:8;stroke-linecap:round}.arc{fill:none;stroke:#f97316;stroke-width:4}.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.green{fill:#15803d}.red{fill:#b91c1c}.blue{fill:#1d4ed8}.orange{fill:#c2410c}
    </style>
  </defs>
  <rect class="bg" width="960" height="560"/>
  <rect class="panel" x="28" y="28" width="904" height="504" rx="18"/>
  <text class="txt head" x="58" y="78">Razones trigonometricas en un triangulo rectangulo</text>
  <text class="txt small" x="58" y="110">El angulo theta decide que cateto es opuesto y cual es adyacente.</text>

  <g transform="translate(88 128)">
    <polygon class="tri" points="40,330 470,330 470,72"/>
    <line class="adj" x1="48" y1="330" x2="462" y2="330"/>
    <line class="opp" x1="470" y1="322" x2="470" y2="80"/>
    <line class="hyp" x1="46" y1="324" x2="464" y2="78"/>
    <path class="arc" d="M 112 330 A 72 72 0 0 0 102 294"/>
    <text class="txt orange" x="118" y="304">theta</text>
    <text class="txt label green" x="190" y="370">cateto adyacente</text>
    <text class="txt label red" x="492" y="210">cateto opuesto</text>
    <text class="txt label blue" x="210" y="166">hipotenusa</text>
    <path d="M 438 330 L 438 298 L 470 298" fill="none" stroke="#475569" stroke-width="3"/>
  </g>

  <g transform="translate(610 150)">
    <rect class="box" x="0" y="0" width="275" height="258" rx="16"/>
    <text class="txt label" x="24" y="44">Definiciones</text>
    <text class="txt small" x="24" y="88">sin(theta) = opuesto / hipotenusa</text>
    <text class="txt small" x="24" y="128">cos(theta) = adyacente / hipotenusa</text>
    <text class="txt small" x="24" y="168">tan(theta) = opuesto / adyacente</text>
    <line x1="24" y1="195" x2="248" y2="195" stroke="#cbd5e1" stroke-width="2"/>
    <text class="txt small" x="24" y="230">Si theta cambia de referencia,</text>
    <text class="txt small" x="24" y="254">opuesto y adyacente cambian.</text>
  </g>
</svg>
