<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Triangulos notables 30-60-90 y 45-45-90</title>
  <desc id="desc">Dos triangulos rectangulos que explican los valores exactos de seno, coseno y tangente para 30, 45 y 60 grados.</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#d8e0ec;stroke-width:2}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#1e293b;font-size:23px}.head{font-size:30px;font-weight:700}.small{font-size:18px}.label{font-size:22px;font-weight:700}.tri1{fill:#eff6ff;stroke:#1d4ed8;stroke-width:4}.tri2{fill:#f0fdf4;stroke:#15803d;stroke-width:4}.side{font-weight:700}.blue{fill:#1d4ed8}.green{fill:#15803d}.orange{fill:#c2410c}.box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
  </style>
  <rect class="bg" width="960" height="560"/>
  <rect class="panel" x="28" y="28" width="904" height="504" rx="18"/>
  <text class="txt head" x="58" y="78">Triangulos notables: valores exactos sin calculadora</text>
  <text class="txt small" x="58" y="110">Estos dos triangulos sostienen la tabla de 30 deg, 45 deg y 60 deg.</text>

  <g transform="translate(78 155)">
    <text class="txt label blue" x="0" y="-24">30-60-90</text>
    <polygon class="tri1" points="35,275 355,275 355,90"/>
    <path d="M 327 275 L 327 247 L 355 247" fill="none" stroke="#475569" stroke-width="3"/>
    <text class="txt small orange" x="73" y="250">30 deg</text>
    <text class="txt small orange" x="315" y="124">60 deg</text>
    <text class="txt side" x="186" y="315">sqrt(3)</text>
    <text class="txt side" x="375" y="190">1</text>
    <text class="txt side" x="164" y="156">2</text>
    <rect class="box" x="15" y="330" width="380" height="96" rx="12"/>
    <text class="txt small" x="34" y="365">sin(30 deg)=1/2</text>
    <text class="txt small" x="34" y="395">cos(30 deg)=sqrt(3)/2</text>
  </g>

  <g transform="translate(545 155)">
    <text class="txt label green" x="0" y="-24">45-45-90</text>
    <polygon class="tri2" points="35,275 315,275 315,-5"/>
    <path d="M 287 275 L 287 247 L 315 247" fill="none" stroke="#475569" stroke-width="3"/>
    <text class="txt small orange" x="74" y="248">45 deg</text>
    <text class="txt small orange" x="272" y="38">45 deg</text>
    <text class="txt side" x="166" y="315">1</text>
    <text class="txt side" x="335" y="142">1</text>
    <text class="txt side" x="146" y="120">sqrt(2)</text>
    <rect class="box" x="10" y="330" width="380" height="96" rx="12"/>
    <text class="txt small" x="29" y="365">sin(45 deg)=sqrt(2)/2</text>
    <text class="txt small" x="29" y="395">tan(45 deg)=1</text>
  </g>
</svg>
