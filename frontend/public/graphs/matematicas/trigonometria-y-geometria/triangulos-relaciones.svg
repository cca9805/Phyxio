<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-labelledby="title desc">
  <title id="title">Triangulos, Pitagoras y semejanza</title>
  <desc id="desc">Dos triangulos rectangulos semejantes muestran catetos proporcionales, hipotenusa y relacion de Pitagoras.</desc>
  <rect width="760" height="440" fill="#f8fafc"/>
  <g transform="translate(90 285)" font-family="Inter, Arial, sans-serif">
    <polygon points="0,0 260,0 260,-160" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
    <rect x="238" y="-22" width="22" height="22" fill="none" stroke="#1d4ed8" stroke-width="3"/>
    <text x="125" y="30" font-size="20" fill="#1d4ed8">cateto a</text>
    <text x="272" y="-76" font-size="20" fill="#1d4ed8">cateto b</text>
    <text x="94" y="-95" font-size="20" fill="#0f172a">hipotenusa c</text>
    <text x="26" y="-12" font-size="24" font-weight="700" fill="#dc2626">theta</text>
    <path d="M 40 0 A 40 40 0 0 0 33 -24" fill="none" stroke="#dc2626" stroke-width="3"/>
  </g>
  <g transform="translate(465 285)" font-family="Inter, Arial, sans-serif">
    <polygon points="0,0 150,0 150,-92" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <rect x="132" y="-18" width="18" height="18" fill="none" stroke="#16a34a" stroke-width="3"/>
    <text x="42" y="30" font-size="18" fill="#166534">k a</text>
    <text x="162" y="-42" font-size="18" fill="#166534">k b</text>
    <text x="42" y="-56" font-size="18" fill="#0f172a">k c</text>
    <text x="18" y="-10" font-size="22" font-weight="700" fill="#dc2626">theta</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="52" y="58" font-size="30" font-weight="700">Relaciones geometricas</text>
    <text x="52" y="100" font-size="20">Pitagoras: a^2 + b^2 = c^2</text>
    <text x="52" y="132" font-size="20">Semejanza: mismo angulo -> mismas razones</text>
    <text x="52" y="164" font-size="20">Escala: lados multiplicados por k, angulos iguales</text>
  </g>
  <g transform="translate(502 78)" font-family="Inter, Arial, sans-serif">
    <rect x="0" y="0" width="205" height="94" rx="8" fill="#fff7ed" stroke="#ea580c"/>
    <text x="18" y="30" font-size="18" fill="#9a3412">sin(theta)=b/c</text>
    <text x="18" y="56" font-size="18" fill="#9a3412">cos(theta)=a/c</text>
    <text x="18" y="82" font-size="18" fill="#9a3412">tan(theta)=b/a</text>
  </g>
</svg>
