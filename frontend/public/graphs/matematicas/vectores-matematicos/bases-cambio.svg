<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" role="img" aria-labelledby="title desc">
  <title id="title">Same vector in two bases</title>
  <desc id="desc">The same vector is projected on fixed axes and on a rotated basis, showing that components change while the vector remains the same.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
  </defs>
  <rect width="820" height="450" fill="#ffffff"/>
  <g transform="translate(130 340)">
    <line x1="-40" y1="0" x2="560" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <line x1="0" y1="35" x2="0" y2="-275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="570" y="7" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">x</text>
    <text x="-8" y="-292" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">y</text>

    <line x1="-35" y1="17" x2="535" y2="-190" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <line x1="-20" y1="190" x2="130" y2="-225" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="545" y="-190" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6d28d9">u</text>
    <text x="132" y="-238" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6d28d9">v</text>

    <line x1="0" y1="0" x2="380" y2="-155" stroke="#2563eb" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="380" y1="0" x2="380" y2="-155" stroke="#f97316" stroke-width="4" stroke-dasharray="8 7"/>
    <line x1="0" y1="-155" x2="380" y2="-155" stroke="#f97316" stroke-width="4" stroke-dasharray="8 7"/>

    <line x1="0" y1="0" x2="262" y2="-95" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
    <line x1="262" y1="-95" x2="380" y2="-155" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 6"/>

    <text x="205" y="-116" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#1d4ed8">A</text>
    <text x="165" y="35" font-family="Inter, Arial, sans-serif" font-size="22" fill="#c2410c">componentes en x,y</text>
    <text x="225" y="-65" font-family="Inter, Arial, sans-serif" font-size="22" fill="#6d28d9">componentes en u,v</text>
    <text x="250" y="-250" font-family="Inter, Arial, sans-serif" font-size="23" fill="#0f172a">mismo vector, coordenadas distintas</text>
  </g>
</svg>
