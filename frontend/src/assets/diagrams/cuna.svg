<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Patrón para madera -->
    <pattern id="wood" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#8B4513"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="#654321" stroke-width="0.5"/>
    </pattern>
    
    <!-- Marcador de flecha -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF4444" />
    </marker>
    
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22C55E" />
    </marker>
    
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6" />
    </marker>
  </defs>
  
  <style>
    .wedge { fill: #A0522D; stroke: #654321; stroke-width: 2; }
    .wood-block { fill: url(#wood); stroke: #654321; stroke-width: 2; }
    .force-arrow { stroke-width: 3; }
    .dimension-line { stroke: #F97316; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .label { font-family: Arial, sans-serif; font-size: 16px; fill: #1F2937; font-weight: bold; }
    .label-small { font-family: Arial, sans-serif; font-size: 14px; fill: #1F2937; }
    .label-light { font-family: Arial, sans-serif; font-size: 14px; fill: #9CA3AF; }
    .formula-box { fill: #F0FDF4; stroke: #22C55E; stroke-width: 2; rx: 8; }
    .angle-arc { fill: none; stroke: #F97316; stroke-width: 2; }
    .note-box { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; rx: 8; }
  </style>
  
  <!-- Título -->
  <text x="300" y="25" class="label-light" text-anchor="middle" font-size="18">La Cuña - Plano Inclinado Móvil</text>
  
  <!-- Bloques de madera (objeto a separar) -->
  <rect x="220" y="180" width="80" height="100" class="wood-block"/>
  <rect x="300" y="180" width="80" height="100" class="wood-block"/>
  
  <!-- Cuña (triángulo) -->
  <polygon points="260,300 300,180 340,300" class="wedge"/>
  
  <!-- Líneas de separación (efecto de apertura) -->
  <line x1="295" y1="180" x2="285" y2="160" stroke="#FF4444" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="305" y1="180" x2="315" y2="160" stroke="#FF4444" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Fuerza aplicada (Fe hacia abajo) -->
  <line x1="300" y1="120" x2="300" y2="170" class="force-arrow" stroke="#22C55E" marker-end="url(#arrowhead-green)"/>
  <text x="320" y="145" class="label-light" fill="#6B7280">🟢 Fₑ</text>
  
  <!-- Fuerzas de separación (Fr hacia los lados) -->
  <line x1="260" y1="240" x2="200" y2="240" class="force-arrow" stroke="#3B82F6" marker-end="url(#arrowhead-blue)"/>
  <text x="170" y="235" class="label-light" fill="#6B7280">🔴 Fᵣ</text>
  
  <line x1="340" y1="240" x2="400" y2="240" class="force-arrow" stroke="#3B82F6" marker-end="url(#arrowhead-blue)"/>
  <text x="405" y="235" class="label-light" fill="#6B7280">🔴 Fᵣ</text>
  
  <!-- Dimensión de espesor (t) -->
  <line x1="260" y1="310" x2="340" y2="310" class="dimension-line"/>
  <line x1="260" y1="305" x2="260" y2="315" stroke="#F97316" stroke-width="1.5"/>
  <line x1="340" y1="305" x2="340" y2="315" stroke="#F97316" stroke-width="1.5"/>
  <text x="300" y="330" class="label-light" text-anchor="middle" fill="#9CA3AF">📏 t (espesor)</text>
  
  <!-- Dimensión de longitud (L) -->
  <line x1="250" y1="190" x2="250" y2="300" class="dimension-line"/>
  <line x1="245" y1="190" x2="255" y2="190" stroke="#F97316" stroke-width="1.5"/>
  <line x1="245" y1="300" x2="255" y2="300" stroke="#F97316" stroke-width="1.5"/>
  <text x="235" y="245" class="label-small" text-anchor="middle" fill="#F97316" transform="rotate(-90 235 245)">📐 L (longitud)</text>
  
  <!-- Ángulo de la cuña (α) -->
  <path d="M 300 280 Q 310 285 315 290" class="angle-arc"/>
  <text x="320" y="285" class="label-small" fill="#F97316">α</text>
  
  <!-- Caja de fórmula principal -->
  <rect x="20" y="55" width="180" height="75" class="formula-box"/>
  <text x="110" y="78" class="label" text-anchor="middle" font-size="14">Ventaja Mecánica:</text>
  <text x="110" y="101" class="label" text-anchor="middle" font-size="16">VM = L / t</text>
  <text x="110" y="120" class="label-small" text-anchor="middle" fill="#059669" font-size="12">Menor ángulo → Mayor VM</text>
  
  <!-- Caja de nota -->
  <rect x="410" y="55" width="175" height="95" class="note-box"/>
  <text x="497.5" y="78" class="label" text-anchor="middle" font-size="14">Aplicaciones:</text>
  <text x="497.5" y="98" class="label-small" text-anchor="middle" font-size="11">🪓 Hacha: α = 25-35°</text>
  <text x="497.5" y="114" class="label-small" text-anchor="middle" font-size="11">🔪 Cuchillo: α = 15-20°</text>
  <text x="497.5" y="130" class="label-small" text-anchor="middle" font-size="11">🔨 Cincel: α = 20-30°</text>
  <text x="497.5" y="146" class="label-small" text-anchor="middle" font-size="11">🚜 Bulldozer</text>
  
  <!-- Relación de fuerzas -->
  <rect x="180" y="350" width="240" height="35" class="formula-box"/>
  <text x="300" y="372" class="label" text-anchor="middle" font-size="14">Fᵣ = Fₑ × (L / t) = Fₑ × VM</text>
  
  <!-- Emoji decorativo -->
  <text x="300" y="195" font-size="20" text-anchor="middle">🪓</text>
</svg>
