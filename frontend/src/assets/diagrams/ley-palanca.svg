<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .lever-bar { fill: #8B4513; stroke: #654321; stroke-width: 2; }
      .fulcrum { fill: #696969; stroke: #2F4F4F; stroke-width: 2; }
      .force-effort { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .force-resistance { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .distance-line { stroke: #FF9800; stroke-width: 2; stroke-dasharray: 5,5; }
      .measurement-line { stroke: #333; stroke-width: 1; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-force-effort { fill: #2E7D32; }
      .text-force-resistance { fill: #C62828; }
      .text-distance { fill: #F57C00; }
      .text-fulcrum { fill: #2F4F4F; }
      .equation { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1976D2; }
    </style>
  </defs>

  <!-- Título -->
  <text x="300" y="25" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Ley de la Palanca
  </text>

  <!-- Barra de la palanca -->
  <rect x="100" y="140" width="400" height="8" rx="4" class="lever-bar"/>

  <!-- Fulcro (triángulo) - 🔵 azul -->
  <polygon points="290,148 310,148 300,170" style="fill: #2196F3; stroke: #1565C0; stroke-width: 2;"/>
  
  <!-- Etiqueta del fulcro -->
  <text x="300" y="185" text-anchor="middle" class="text-label" style="fill: #1565C0;">🔵 Fulcro (F)</text>

  <!-- Fuerza de esfuerzo (Fe) - flecha verde hacia abajo 🟢 -->
  <g class="force-effort">
    <polygon points="145,100 155,100 150,130" />
    <rect x="147" y="95" width="6" height="15" rx="3"/>
  </g>
  <text x="150" y="85" text-anchor="middle" class="text-label text-force-effort">🟢 F_e</text>
  <text x="150" y="70" text-anchor="middle" class="text-label text-force-effort" style="font-size: 12px;">Esfuerzo/Potencia</text>

  <!-- Fuerza de resistencia (Fr) - flecha roja hacia abajo 🔴 -->
  <g class="force-resistance">
    <polygon points="445,100 455,100 450,130" />
    <rect x="447" y="95" width="6" height="15" rx="3"/>
  </g>
  <text x="450" y="85" text-anchor="middle" class="text-label text-force-resistance">🔴 F_r</text>
  <text x="450" y="70" text-anchor="middle" class="text-label text-force-resistance" style="font-size: 12px;">Resistencia/Carga</text>

  <!-- Líneas de medida para distancias -->
  <!-- Distancia de (brazo de esfuerzo) 📏 -->
  <line x1="150" y1="200" x2="300" y2="200" class="distance-line"/>
  <line x1="150" y1="195" x2="150" y2="205" class="measurement-line"/>
  <line x1="300" y1="195" x2="300" y2="205" class="measurement-line"/>
  <text x="225" y="215" text-anchor="middle" class="text-label text-distance">📏 d_e</text>
  <text x="225" y="230" text-anchor="middle" class="text-label text-distance" style="font-size: 11px;">Brazo de potencia</text>

  <!-- Distancia dr (brazo de resistencia) 📐 -->
  <line x1="300" y1="220" x2="450" y2="220" class="distance-line"/>
  <line x1="300" y1="215" x2="300" y2="225" class="measurement-line"/>
  <line x1="450" y1="215" x2="450" y2="225" class="measurement-line"/>
  <text x="375" y="235" text-anchor="middle" class="text-label text-distance">📐 d_r</text>
  <text x="375" y="250" text-anchor="middle" class="text-label text-distance" style="font-size: 11px;">Brazo de resistencia</text>

  <!-- Ecuación de la Ley de la Palanca -->
  <rect x="180" y="260" width="240" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="300" y="280" text-anchor="middle" class="equation">F_e × d_e = F_r × d_r</text>

  <!-- Indicadores de dirección del movimiento -->
  <g stroke="#9C27B0" stroke-width="2" fill="none">
    <!-- Arco de movimiento lado izquierdo -->
    <path d="M 130 120 Q 140 110 150 120" marker-end="url(#arrowhead)"/>
    <!-- Arco de movimiento lado derecho -->
    <path d="M 470 120 Q 460 110 450 120" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Definición de punta de flecha -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
    </marker>
  </defs>

</svg>
