<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .lever-bar { fill: #8B4513; stroke: #654321; stroke-width: 2; }
      .fulcrum { fill: #2196F3; stroke: #1565C0; stroke-width: 2; }
      .force-effort { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .force-resistance { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-force-effort { fill: #2E7D32; }
      .text-force-resistance { fill: #C62828; }
      .text-fulcrum { fill: #1565C0; }
    </style>
  </defs>

  <!-- Título -->
  <text x="300" y="25" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Palanca de 1er Género
  </text>
  <text x="300" y="45" text-anchor="middle" style="font-family: Arial; font-size: 13px; fill: #666;">
    Fulcro en el centro
  </text>

  <!-- Barra de la palanca -->
  <rect x="100" y="130" width="400" height="8" rx="4" class="lever-bar"/>

  <!-- Fulcro (triángulo) - centro -->
  <polygon points="290,138 310,138 300,160" class="fulcrum"/>
  <text x="300" y="180" text-anchor="middle" class="text-label text-fulcrum" style="font-size: 16px;">🔵</text>
  <text x="315" y="180" text-anchor="start" class="text-label text-fulcrum">F</text>

  <!-- Fuerza de esfuerzo (Fe) - izquierda -->
  <g class="force-effort">
    <polygon points="145,90 155,90 150,120" />
    <rect x="147" y="85" width="6" height="15" rx="3"/>
  </g>
  <text x="150" y="75" text-anchor="middle" class="text-label text-force-effort">🟢 Fe</text>

  <!-- Fuerza de resistencia (Fr) - derecha -->
  <g class="force-resistance">
    <polygon points="445,90 455,90 450,120" />
    <rect x="447" y="85" width="6" height="15" rx="3"/>
  </g>
  <text x="450" y="75" text-anchor="middle" class="text-label text-force-resistance">🔴 Fr</text>

  <!-- Líneas de medida para distancias -->
  <line x1="150" y1="190" x2="300" y2="190" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="225" y="205" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #F57C00;">📏 d_e</text>
  
  <line x1="300" y1="190" x2="450" y2="190" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="375" y="205" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #F57C00;">📐 d_r</text>

  <!-- Diagrama de posición -->
  <rect x="150" y="215" width="300" height="35" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="300" y="237" text-anchor="middle" style="font-family: monospace; font-size: 16px; font-weight: bold; fill: #2E7D32;">
    Fe — [FULCRO] — Fr
  </text>
</svg>
