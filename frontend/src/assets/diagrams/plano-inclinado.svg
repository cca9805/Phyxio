<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .ramp { fill: #BCAAA4; stroke: #6D4C41; stroke-width: 3; }
      .ground { fill: #8D6E63; stroke: #5D4037; stroke-width: 2; }
      .object { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .force-arrow { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .force-weight { fill: #2196F3; stroke: #1565C0; stroke-width: 2; }
      .dimension-line { stroke: #FF9800; stroke-width: 2; stroke-dasharray: 5,5; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    </style>
    
    <!-- Patrón de líneas para el suelo -->
    <pattern id="groundPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <line x1="0" y1="10" x2="10" y2="0" stroke="#5D4037" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Título -->
  <text x="250" y="30" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Plano Inclinado
  </text>
  <text x="250" y="50" text-anchor="middle" style="font-family: Arial; font-size: 13px; fill: #666;">
    Reduce esfuerzo aumentando distancia
  </text>

  <!-- Suelo horizontal -->
  <rect x="50" y="300" width="400" height="30" class="ground"/>
  <rect x="50" y="300" width="400" height="30" fill="url(#groundPattern)" opacity="0.3"/>

  <!-- Plano inclinado (rampa) -->
  <polygon points="100,300 400,150 400,300" class="ramp"/>
  
  <!-- Objeto (caja) en la rampa -->
  <g transform="translate(220, 200) rotate(-26.5)">
    <rect x="-25" y="-25" width="50" height="50" rx="5" class="object"/>
    <text x="0" y="8" text-anchor="middle" style="fill: white; font-size: 24px; font-weight: bold;">📦</text>
  </g>

  <!-- Flecha de fuerza aplicada (Fe) - paralela al plano -->
  <g transform="translate(220, 200) rotate(-26.5)">
    <polygon points="25,0 60,0 55,8" class="force-arrow"/>
    <rect x="20" y="-3" width="10" height="6" rx="2" class="force-arrow"/>
  </g>
  <text x="295" y="195" text-anchor="start" class="text-label" style="fill: #2E7D32;">🟢 Fe</text>

  <!-- Flecha de peso (mg) - vertical hacia abajo -->
  <g class="force-weight">
    <polygon points="245,220 255,220 250,260"/>
    <rect x="247" y="215" width="6" height="10" rx="2"/>
  </g>
  <text x="265" y="245" text-anchor="start" class="text-label" style="fill: #1565C0;">mg</text>

  <!-- Línea de altura (h) -->
  <line x1="410" y1="150" x2="410" y2="300" class="dimension-line"/>
  <line x1="405" y1="150" x2="415" y2="150" stroke="#FF9800" stroke-width="2"/>
  <line x1="405" y1="300" x2="415" y2="300" stroke="#FF9800" stroke-width="2"/>
  <text x="430" y="230" text-anchor="start" class="text-label" style="fill: #F57C00;">h</text>
  <text x="430" y="250" text-anchor="start" style="font-family: Arial; font-size: 11px; fill: #F57C00;">altura</text>

  <!-- Línea de longitud (L) -->
  <line x1="100" y1="310" x2="400" y2="310" class="dimension-line"/>
  <line x1="100" y1="305" x2="100" y2="315" stroke="#FF9800" stroke-width="2"/>
  <line x1="400" y1="305" x2="400" y2="315" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" class="text-label" style="fill: #F57C00;">L</text>
  <text x="250" y="345" text-anchor="middle" style="font-family: Arial; font-size: 11px; fill: #F57C00;">longitud rampa</text>

  <!-- Ángulo -->
  <path d="M 120 300 Q 130 295, 140 285" stroke="#9C27B0" stroke-width="2" fill="none"/>
  <text x="145" y="295" text-anchor="start" style="font-family: Arial; font-size: 12px; fill: #9C27B0; font-style: italic;">θ</text>

  <!-- Fórmulas -->
  <rect x="50" y="355" width="200" height="35" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="150" y="373" text-anchor="middle" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #2E7D32;">
    Fe = (m·g·h) / L
  </text>
  <text x="150" y="387" text-anchor="middle" style="font-family: Arial; font-size: 11px; fill: #2E7D32;">
    VM = L / h
  </text>

  <!-- Nota -->
  <rect x="270" y="355" width="180" height="35" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="360" y="373" text-anchor="middle" style="font-family: Arial; font-size: 11px; fill: #E65100;">
    Mayor L → Menor Fe
  </text>
  <text x="360" y="387" text-anchor="middle" style="font-family: Arial; font-size: 11px; fill: #E65100;">
    (pero más distancia)
  </text>
</svg>
