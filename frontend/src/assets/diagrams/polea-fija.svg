<svg width="400" height="450" viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .pulley-disk { fill: #90A4AE; stroke: #546E7A; stroke-width: 3; }
      .pulley-center { fill: #37474F; stroke: #263238; stroke-width: 2; }
      .rope { stroke: #8D6E63; stroke-width: 4; fill: none; }
      .weight { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .force-arrow { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .support { stroke: #424242; stroke-width: 4; fill: none; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <!-- Título -->
  <text x="200" y="30" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Polea Fija
  </text>
  <text x="200" y="50" text-anchor="middle" style="font-family: Arial; font-size: 13px; fill: #666;">
    Cambia dirección - VM = 1
  </text>

  <!-- Soporte superior (fijo) -->
  <line x1="150" y1="80" x2="250" y2="80" class="support"/>
  <line x1="200" y1="80" x2="200" y2="100" class="support"/>

  <!-- Polea fija -->
  <circle cx="200" cy="140" r="35" class="pulley-disk"/>
  <circle cx="200" cy="140" r="8" class="pulley-center"/>
  
  <!-- Cuerda -->
  <path d="M 165 140 Q 165 155, 165 320" class="rope"/>
  <path d="M 235 140 Q 235 155, 235 380" class="rope"/>

  <!-- Carga (Fr) - izquierda -->
  <rect x="140" y="320" width="50" height="50" rx="5" class="weight"/>
  <text x="165" y="350" text-anchor="middle" style="fill: white; font-size: 20px; font-weight: bold;">📦</text>
  <text x="165" y="385" text-anchor="middle" class="text-label" style="fill: #C62828;">Fr</text>

  <!-- Flecha de fuerza (Fe) - derecha -->
  <g class="force-arrow">
    <polygon points="230,380 240,380 235,410"/>
    <rect x="232" y="375" width="6" height="15" rx="3"/>
  </g>
  <text x="235" y="365" text-anchor="middle" class="text-label" style="fill: #2E7D32;">Fe</text>

  <!-- Ecuación -->
  <rect x="100" y="420" width="200" height="25" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="200" y="438" text-anchor="middle" style="font-family: Arial; font-size: 14px; font-weight: bold; fill: #E65100;">
    Fe = Fr (No ahorra fuerza)
  </text>
</svg>
