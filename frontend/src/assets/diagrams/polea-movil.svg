<svg width="400" height="450" viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .pulley-disk { fill: #90A4AE; stroke: #546E7A; stroke-width: 3; }
      .pulley-center { fill: #37474F; stroke: #263238; stroke-width: 2; }
      .rope { stroke: #8D6E63; stroke-width: 4; fill: none; }
      .weight { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .force-arrow { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .support { stroke: #424242; stroke-width: 4; fill: none; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <!-- Título -->
  <text x="200" y="30" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Polea Móvil
  </text>
  <text x="200" y="50" text-anchor="middle" style="font-family: Arial; font-size: 13px; fill: #666;">
    Reduce esfuerzo - VM = 2
  </text>

  <!-- Soporte superior (fijo) -->
  <line x1="100" y1="80" x2="300" y2="80" class="support"/>
  
  <!-- Punto fijo izquierdo -->
  <circle cx="120" cy="80" r="6" fill="#424242"/>
  
  <!-- Cuerda: extremo fijo -> polea móvil -> arriba -->
  <line x1="120" y1="80" x2="120" y2="200" class="rope"/>
  <path d="M 120 200 Q 155 200, 180 215" class="rope"/>
  <path d="M 220 215 Q 245 200, 280 200" class="rope"/>
  <line x1="280" y1="200" x2="280" y2="80" class="rope"/>

  <!-- Polea móvil (se mueve con la carga) -->
  <circle cx="200" cy="230" r="35" class="pulley-disk"/>
  <circle cx="200" cy="230" r="8" class="pulley-center"/>

  <!-- Carga colgando de la polea móvil -->
  <line x1="200" y1="265" x2="200" y2="310" class="rope"/>
  <rect x="175" y="310" width="50" height="50" rx="5" class="weight"/>
  <text x="200" y="340" text-anchor="middle" style="fill: white; font-size: 20px; font-weight: bold;">📦</text>
  <text x="200" y="375" text-anchor="middle" class="text-label" style="fill: #C62828;">Fr</text>

  <!-- Flecha de fuerza (Fe) - tirando hacia arriba -->
  <g class="force-arrow">
    <polygon points="275,120 285,120 280,90"/>
    <rect x="277" y="110" width="6" height="15" rx="3"/>
  </g>
  <text x="280" y="140" text-anchor="middle" class="text-label" style="fill: #2E7D32;">Fe</text>

  <!-- Etiquetas de los tramos -->
  <text x="110" y="140" text-anchor="end" style="font-family: Arial; font-size: 11px; fill: #666; font-style: italic;">
    Fijo
  </text>
  <text x="290" y="140" text-anchor="start" style="font-family: Arial; font-size: 11px; fill: #666; font-style: italic;">
    Móvil
  </text>

  <!-- Ecuación -->
  <rect x="75" y="405" width="250" height="30" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="200" y="425" text-anchor="middle" style="font-family: Arial; font-size: 14px; font-weight: bold; fill: #2E7D32;">
    Fe = Fr / 2 (Mitad del esfuerzo)
  </text>
</svg>
