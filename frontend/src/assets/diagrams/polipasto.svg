<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Definiciones de estilos -->
  <defs>
    <style>
      .pulley-disk { fill: #90A4AE; stroke: #546E7A; stroke-width: 2.5; }
      .pulley-center { fill: #37474F; stroke: #263238; stroke-width: 1.5; }
      .rope { stroke: #8D6E63; stroke-width: 3.5; fill: none; }
      .weight { fill: #F44336; stroke: #C62828; stroke-width: 2; }
      .force-arrow { fill: #4CAF50; stroke: #2E7D32; stroke-width: 2; }
      .support { stroke: #424242; stroke-width: 4; fill: none; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    </style>
  </defs>

  <!-- Título -->
  <text x="200" y="30" text-anchor="middle" class="text-label" style="font-size: 18px; fill: #1976D2;">
    Polipasto (Sistema de Poleas)
  </text>
  <text x="200" y="50" text-anchor="middle" style="font-family: Arial; font-size: 13px; fill: #666;">
    VM = n (número de tramos que sostienen la carga)
  </text>

  <!-- Soporte superior (fijo) -->
  <line x1="80" y1="80" x2="320" y2="80" class="support"/>
  
  <!-- Punto fijo izquierdo -->
  <circle cx="100" cy="80" r="5" fill="#424242"/>

  <!-- Polea fija 1 (izquierda superior) -->
  <circle cx="150" cy="115" r="25" class="pulley-disk"/>
  <circle cx="150" cy="115" r="6" class="pulley-center"/>
  <line x1="150" y1="80" x2="150" y2="90" class="support"/>

  <!-- Polea fija 2 (derecha superior) -->
  <circle cx="250" cy="115" r="25" class="pulley-disk"/>
  <circle cx="250" cy="115" r="6" class="pulley-center"/>
  <line x1="250" y1="80" x2="250" y2="90" class="support"/>

  <!-- Polea móvil 1 (izquierda inferior) -->
  <circle cx="150" cy="240" r="25" class="pulley-disk"/>
  <circle cx="150" cy="240" r="6" class="pulley-center"/>

  <!-- Polea móvil 2 (derecha inferior) -->
  <circle cx="250" cy="240" r="25" class="pulley-disk"/>
  <circle cx="250" cy="240" r="6" class="pulley-center"/>

  <!-- Cuerda completa del polipasto (4 tramos) -->
  <!-- Tramo 1: Fijo -> polea móvil 1 -->
  <line x1="100" y1="80" x2="100" y2="240" class="rope"/>
  <path d="M 100 240 Q 120 240, 125 240" class="rope"/>
  
  <!-- Tramo 2: polea móvil 1 -> polea fija 1 -> polea móvil 2 -->
  <path d="M 125 220 Q 125 180, 130 150" class="rope"/>
  <path d="M 130 150 Q 140 120, 150 95" class="rope"/>
  <path d="M 150 95 Q 160 120, 170 150" class="rope"/>
  <path d="M 170 150 Q 175 180, 175 220" class="rope"/>
  
  <!-- Tramo 3: polea móvil 2 -> polea fija 2 -->
  <path d="M 225 220 Q 225 180, 230 150" class="rope"/>
  <path d="M 230 150 Q 240 120, 250 95" class="rope"/>
  <path d="M 250 95 Q 260 120, 270 150" class="rope"/>
  <path d="M 270 150 Q 275 165, 275 180" class="rope"/>
  
  <!-- Tramo 4: salida para tirar -->
  <line x1="275" y1="180" x2="300" y2="180" class="rope"/>
  <line x1="300" y1="180" x2="300" y2="80" class="rope"/>

  <!-- Barra de soporte para las poleas móviles -->
  <line x1="130" y1="265" x2="270" y2="265" stroke="#546E7A" stroke-width="3"/>

  <!-- Carga colgando -->
  <line x1="200" y1="265" x2="200" y2="320" class="rope"/>
  <rect x="175" y="320" width="50" height="50" rx="5" class="weight"/>
  <text x="200" y="350" text-anchor="middle" style="fill: white; font-size: 20px; font-weight: bold;">📦</text>
  <text x="200" y="385" text-anchor="middle" class="text-label" style="fill: #C62828;">Fr</text>

  <!-- Flecha de fuerza (Fe) -->
  <g class="force-arrow">
    <polygon points="295,120 305,120 300,90"/>
    <rect x="297" y="110" width="6" height="15" rx="3"/>
  </g>
  <text x="300" y="140" text-anchor="middle" class="text-label" style="fill: #2E7D32;">Fe</text>

  <!-- Etiquetas de tramos -->
  <text x="90" y="160" text-anchor="end" style="font-family: Arial; font-size: 10px; fill: #E65100; font-weight: bold;">
    1
  </text>
  <text x="140" y="180" text-anchor="middle" style="font-family: Arial; font-size: 10px; fill: #E65100; font-weight: bold;">
    2
  </text>
  <text x="210" y="180" text-anchor="middle" style="font-family: Arial; font-size: 10px; fill: #E65100; font-weight: bold;">
    3
  </text>
  <text x="290" y="130" text-anchor="start" style="font-family: Arial; font-size: 10px; fill: #E65100; font-weight: bold;">
    4
  </text>

  <!-- Ecuación -->
  <rect x="50" y="410" width="300" height="35" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="200" y="425" text-anchor="middle" style="font-family: Arial; font-size: 13px; font-weight: bold; fill: #2E7D32;">
    VM = 4 (4 tramos)
  </text>
  <text x="200" y="442" text-anchor="middle" style="font-family: Arial; font-size: 12px; fill: #2E7D32;">
    Fe = Fr / 4 (Cuarto del esfuerzo)
  </text>

  <!-- Nota -->
  <text x="200" y="475" text-anchor="middle" style="font-family: Arial; font-size: 11px; fill: #666; font-style: italic;">
    Más tramos = Mayor VM = Menos esfuerzo
  </text>
</svg>
