<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Patrón para rueda -->
    <pattern id="spokes" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <line x1="50" y1="0" x2="50" y2="100" stroke="#94A3B8" stroke-width="2"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#94A3B8" stroke-width="2"/>
    </pattern>
    
    <!-- Marcador de flecha -->
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22C55E" />
    </marker>
    
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444" />
    </marker>
    
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6" />
    </marker>
  </defs>
  
  <style>
    .wheel { fill: #E2E8F0; stroke: #475569; stroke-width: 3; }
    .axle { fill: #64748B; stroke: #334155; stroke-width: 2; }
    .rope { fill: none; stroke: #D97706; stroke-width: 2; }
    .force-arrow { stroke-width: 3; }
    .dimension-line { stroke: #F97316; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .label { font-family: Arial, sans-serif; font-size: 16px; fill: #1F2937; font-weight: bold; }
    .label-small { font-family: Arial, sans-serif; font-size: 14px; fill: #1F2937; }
    .label-light { font-family: Arial, sans-serif; font-size: 14px; fill: #9CA3AF; }
    .formula-box { fill: #F0FDF4; stroke: #22C55E; stroke-width: 2; rx: 8; }
    .note-box { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; rx: 8; }
    .spoke { stroke: #94A3B8; stroke-width: 2; }
  </style>
  
  <!-- Título -->
  <text x="300" y="25" class="label-light" text-anchor="middle" font-size="18">Rueda y Eje - Palanca Rotatoria</text>
  
  <!-- Rueda grande -->
  <circle cx="410" cy="210" r="120" class="wheel"/>
  
  <!-- Radios de la rueda (8 radios) -->
  <line x1="410" y1="210" x2="530" y2="210" class="spoke"/>
  <line x1="410" y1="210" x2="495" y2="295" class="spoke"/>
  <line x1="410" y1="210" x2="410" y2="330" class="spoke"/>
  <line x1="410" y1="210" x2="325" y2="295" class="spoke"/>
  <line x1="410" y1="210" x2="290" y2="210" class="spoke"/>
  <line x1="410" y1="210" x2="325" y2="125" class="spoke"/>
  <line x1="410" y1="210" x2="410" y2="90" class="spoke"/>
  <line x1="410" y1="210" x2="495" y2="125" class="spoke"/>
  
  <!-- Eje central (cilindro) -->
  <circle cx="410" cy="210" r="35" class="axle"/>
  <circle cx="410" cy="210" r="5" fill="#334155"/>
  
  <!-- Cuerda enrollada en el eje -->
  <path d="M 410 175 Q 400 180 405 185 Q 410 190 400 195" class="rope"/>
  <line x1="400" y1="195" x2="400" y2="380" class="rope"/>
  
  <!-- Peso colgando -->
  <rect x="380" y="380" width="40" height="40" fill="#94A3B8" stroke="#475569" stroke-width="2" rx="4"/>
  <text x="400" y="405" class="label-small" text-anchor="middle" font-size="20">📦</text>
  
  <!-- Fuerza aplicada en la rueda (Fe tangencial) -->
  <path d="M 520 170 Q 535 185 525 205" class="force-arrow" stroke="#22C55E" marker-end="url(#arrowhead-green)"/>
  <text x="545" y="180" class="label-light" fill="#6B7280">🟢 Fₑ</text>
  
  <!-- Fuerza en el eje (Fr hacia abajo) -->
  <line x1="440" y1="325" x2="440" y2="365" class="force-arrow" stroke="#EF4444" marker-end="url(#arrowhead-red)"/>
  <text x="450" y="355" class="label-light" fill="#6B7280">🔴 Fᵣ</text>
  
  <!-- Radio de la rueda (R) -->
  <line x1="410" y1="210" x2="525" y2="210" class="dimension-line"/>
  <line x1="410" y1="205" x2="410" y2="215" stroke="#F97316" stroke-width="1.5"/>
  <line x1="525" y1="205" x2="525" y2="215" stroke="#F97316" stroke-width="1.5"/>
  <text x="467" y="200" class="label-light" text-anchor="middle" fill="#9CA3AF">📏 R (radio rueda)</text>
  
  <!-- Radio del eje (r) -->
  <line x1="410" y1="210" x2="440" y2="210" class="dimension-line"/>
  <line x1="410" y1="205" x2="410" y2="215" stroke="#F97316" stroke-width="1.5"/>
  <line x1="440" y1="205" x2="440" y2="215" stroke="#F97316" stroke-width="1.5"/>
  <text x="425" y="228" class="label-light" text-anchor="middle" fill="#9CA3AF" font-size="11">📐 r</text>
  
  <!-- Flecha de rotación -->
  <path d="M 470 150 A 60 60 0 0 1 470 270" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="490" y="210" class="label-light" fill="#3B82F6" font-size="18">↻</text>
  
  <!-- Caja de fórmula principal -->
  <rect x="20" y="50" width="230" height="90" class="formula-box"/>
  <text x="135" y="75" class="label" text-anchor="middle" font-size="14">Ventaja Mecánica:</text>
  <text x="135" y="100" class="label" text-anchor="middle" font-size="16">VM = R / r</text>
  <text x="135" y="125" class="label-small" text-anchor="middle" fill="#059669" font-size="12">Mayor R o menor r → Mayor VM</text>
  
  <!-- Caja de aplicaciones -->
  <rect x="30" y="155" width="200" height="155" class="note-box"/>
  <text x="130" y="180" class="label" text-anchor="middle" font-size="14">Aplicaciones:</text>
  <text x="130" y="205" class="label-small" text-anchor="middle" font-size="11">🪣 Pozo con manivela</text>
  <text x="130" y="225" class="label-small" text-anchor="middle" font-size="11">VM ≈ 3</text>
  <text x="130" y="248" class="label-small" text-anchor="middle" font-size="11">🎣 Carrete de pesca</text>
  <text x="130" y="268" class="label-small" text-anchor="middle" font-size="11">VM ≈ 5</text>
  <text x="130" y="288" class="label-small" text-anchor="middle" font-size="11">🚗 Volante de coche</text>
  <text x="130" y="305" class="label-small" text-anchor="middle" font-size="11">VM ≈ 8.3</text>
  
  <!-- Relación de fuerzas -->
  <rect x="30" y="325" width="200" height="35" class="formula-box"/>
  <text x="130" y="347" class="label" text-anchor="middle" font-size="14">Fᵣ = Fₑ × (R / r)</text>
  
  <!-- Emoji decorativo -->
  <text x="410" y="218" font-size="24" text-anchor="middle">⚙️</text>
</svg>
