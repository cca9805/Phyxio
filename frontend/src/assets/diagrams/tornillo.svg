<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Patrón para rosca -->
    <pattern id="thread" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="5" x2="10" y2="5" stroke="#555" stroke-width="1"/>
    </pattern>
    
    <!-- Marcador de flecha -->
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22C55E" />
    </marker>
    
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6" />
    </marker>
    
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444" />
    </marker>
  </defs>
  
  <style>
    .screw-body { fill: #94A3B8; stroke: #475569; stroke-width: 2; }
    .screw-thread { fill: none; stroke: #334155; stroke-width: 2; }
    .handle { fill: #64748B; stroke: #334155; stroke-width: 2; }
    .force-arrow { stroke-width: 3; }
    .dimension-line { stroke: #F97316; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .label { font-family: Arial, sans-serif; font-size: 16px; fill: #1F2937; font-weight: bold; }
    .label-small { font-family: Arial, sans-serif; font-size: 14px; fill: #1F2937; }
    .label-light { font-family: Arial, sans-serif; font-size: 14px; fill: #9CA3AF; }
    .formula-box { fill: #F0FDF4; stroke: #22C55E; stroke-width: 2; rx: 8; }
    .note-box { fill: #FEF3C7; stroke: #F59E0B; stroke-width: 2; rx: 8; }
    .spiral { fill: none; stroke: #EF4444; stroke-width: 2; stroke-dasharray: 4,2; }
  </style>
  
  <!-- Título -->
  <text x="300" y="25" class="label-light" text-anchor="middle" font-size="18">El Tornillo - Plano Inclinado Enrollado</text>
  
  <!-- Cuerpo del tornillo (cilindro vertical) -->
  <rect x="270" y="150" width="60" height="200" class="screw-body"/>
  <ellipse cx="300" cy="150" rx="30" ry="8" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
  <ellipse cx="300" cy="350" rx="30" ry="8" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
  
  <!-- Rosca del tornillo (líneas helicoidales) -->
  <path d="M 270 170 Q 300 175 330 170" class="screw-thread"/>
  <path d="M 270 190 Q 300 195 330 190" class="screw-thread"/>
  <path d="M 270 210 Q 300 215 330 210" class="screw-thread"/>
  <path d="M 270 230 Q 300 235 330 230" class="screw-thread"/>
  <path d="M 270 250 Q 300 255 330 250" class="screw-thread"/>
  <path d="M 270 270 Q 300 275 330 270" class="screw-thread"/>
  <path d="M 270 290 Q 300 295 330 290" class="screw-thread"/>
  <path d="M 270 310 Q 300 315 330 310" class="screw-thread"/>
  <path d="M 270 330 Q 300 335 330 330" class="screw-thread"/>
  
  <!-- Manija/brazo superior -->
  <rect x="200" y="125" width="200" height="15" rx="7" class="handle"/>
  <circle cx="200" cy="132.5" r="10" fill="#64748B" stroke="#334155" stroke-width="2"/>
  <circle cx="400" cy="132.5" r="10" fill="#64748B" stroke="#334155" stroke-width="2"/>
  
  <!-- Fuerza aplicada en el brazo (tangencial) -->
  <path d="M 410 95 Q 425 110 415 130" class="force-arrow" stroke="#22C55E" marker-end="url(#arrowhead-green)"/>
  <text x="435" y="105" class="label-light" fill="#6B7280">🟢 Fₑ</text>
  
  <!-- Fuerza axial resultante (hacia abajo) -->
  <line x1="300" y1="370" x2="300" y2="420" class="force-arrow" stroke="#EF4444" marker-end="url(#arrowhead-red)"/>
  <text x="310" y="400" class="label-light" fill="#6B7280">🔴 Fᵣ</text>
  
  <!-- Radio del brazo (r) -->
  <line x1="300" y1="132.5" x2="390" y2="132.5" class="dimension-line"/>
  <line x1="300" y1="127.5" x2="300" y2="137.5" stroke="#F97316" stroke-width="1.5"/>
  <line x1="390" y1="127.5" x2="390" y2="137.5" stroke="#F97316" stroke-width="1.5"/>
  <text x="345" y="120" class="label-light" text-anchor="middle" fill="#9CA3AF">📏 r (radio brazo)</text>
  
  <!-- Paso de rosca (p) -->
  <line x1="340" y1="210" x2="340" y2="230" class="dimension-line"/>
  <line x1="335" y1="210" x2="345" y2="210" stroke="#F97316" stroke-width="1.5"/>
  <line x1="335" y1="230" x2="345" y2="230" stroke="#F97316" stroke-width="1.5"/>
  <text x="365" y="222" class="label-light" fill="#9CA3AF">📐 p</text>
  <text x="355" y="238" class="label-light" fill="#9CA3AF" font-size="11">(paso)</text>
  
  <!-- Representación espiral desenrollada -->
  <line x1="450" y1="200" x2="560" y2="200" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="450" y1="240" x2="560" y2="240" stroke="#E5E7EB" stroke-width="1"/>
  <path d="M 450 200 L 560 240" class="spiral"/>
  <text x="505" y="215" class="label-light" fill="#9CA3AF" font-size="11" transform="rotate(-20 505 215)">2πr</text>
  <text x="565" y="248" class="label-light" fill="#9CA3AF" font-size="11">p</text>
  <text x="505" y="260" class="label-light" fill="#9CA3AF" font-size="10" text-anchor="middle">Plano inclinado</text>
  <text x="505" y="273" class="label-light" fill="#9CA3AF" font-size="10" text-anchor="middle">desenrollado</text>
  
  <!-- Caja de fórmula principal -->
  <rect x="20" y="60" width="200" height="90" class="formula-box"/>
  <text x="120" y="85" class="label" text-anchor="middle" font-size="14">Ventaja Mecánica:</text>
  <text x="120" y="110" class="label" text-anchor="middle" font-size="16">VM = 2πr / p</text>
  <text x="120" y="135" class="label-small" text-anchor="middle" fill="#059669" font-size="12">Mayor radio → Mayor VM</text>
  
  <!-- Caja de aplicaciones -->
  <rect x="20" y="180" width="200" height="155" class="note-box"/>
  <text x="120" y="205" class="label" text-anchor="middle" font-size="14">Aplicaciones:</text>
  <text x="120" y="230" class="label-small" text-anchor="middle" font-size="11">🔩 Tornillo carpintería</text>
  <text x="120" y="250" class="label-small" text-anchor="middle" font-size="11">VM ≈ 157</text>
  <text x="120" y="273" class="label-small" text-anchor="middle" font-size="11">🚗 Gato de coche</text>
  <text x="120" y="293" class="label-small" text-anchor="middle" font-size="11">VM ≈ 251</text>
  <text x="120" y="313" class="label-small" text-anchor="middle" font-size="11">🏭 Prensa hidráulica</text>
  <text x="120" y="330" class="label-small" text-anchor="middle" font-size="11">VM ≈ 471</text>
  
  <!-- Relación de fuerzas -->
  <rect x="180" y="410" width="240" height="35" class="formula-box"/>
  <text x="300" y="432" class="label" text-anchor="middle" font-size="14">Fᵣ = Fₑ × (2πr / p)</text>
  
  <!-- Emoji decorativo -->
  <text x="300" y="165" font-size="18" text-anchor="middle">🔩</text>
</svg>
