<svg width="500" height="520" viewBox="0 0 500 520"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="atomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="50%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff1e00"/>
    </linearGradient>

    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Plataforma -->
  <g id="platform" filter="url(#softGlow)">
    <ellipse cx="250" cy="430" rx="95" ry="24"
             fill="url(#platformGrad)"/>
    <ellipse cx="250" cy="425" rx="70" ry="10"
             fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- ÓRBITAS -->
  <g id="orbits" stroke="url(#atomGrad)" stroke-width="5" fill="none" opacity="0.95"
     filter="url(#softGlow)">
    <ellipse cx="250" cy="230" rx="155" ry="60" transform="rotate(-22 250 230)"/>
    <ellipse cx="250" cy="230" rx="155" ry="60" transform="rotate(22 250 230)"/>
    <ellipse cx="250" cy="230" rx="115" ry="45" transform="rotate(90 250 230)"/>
  </g>

  <!-- NÚCLEO / CARA -->
  <g id="core" filter="url(#softGlow)">
    <!-- Esfera -->
    <circle cx="250" cy="230" r="90"
            fill="rgba(255,120,0,0.22)"
            stroke="url(#atomGrad)" stroke-width="6"/>

    <!-- Brillo superior -->
    <ellipse cx="230" cy="195" rx="55" ry="28"
             fill="rgba(255,255,255,0.25)"/>

    <!-- Gafas -->
    <g id="glasses" stroke="#1f1308" stroke-width="6" fill="none">
      <rect x="205" y="205" width="40" height="32" rx="8" ry="8"/>
      <rect x="255" y="205" width="40" height="32" rx="8" ry="8"/>
      <line x1="245" y1="221" x2="255" y2="221"/>
      <line x1="205" y1="221" x2="192" y2="217"/>
      <line x1="295" y1="221" x2="308" y2="217"/>
    </g>

    <!-- Ojos -->
    <g id="eyes">
      <circle cx="225" cy="221" r="8" fill="#ffffff"/>
      <circle cx="275" cy="221" r="8" fill="#ffffff"/>
      <circle cx="227" cy="219" r="3.5" fill="#ffb347"/>
      <circle cx="277" cy="219" r="3.5" fill="#ffb347"/>
      <circle cx="229" cy="217" r="2" fill="#ffffff"/>
      <circle cx="279" cy="217" r="2" fill="#ffffff"/>
    </g>

    <!-- Boca -->
    <path d="M225 248 Q250 265 275 248"
          stroke="#1f1308" stroke-width="5"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- BRAZOS -->
  <g id="arms" stroke="url(#atomGrad)" stroke-width="8"
     stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <!-- Brazo derecho apoyado -->
    <path d="M210 270 Q190 295 185 320"/>

    <!-- Brazo izquierdo sujetando pizarra -->
    <path id="leftArm"
          d="M290 260 Q325 250 345 245"/>

    <!-- Mano izquierda -->
    <g id="leftHand">
      <circle cx="345" cy="245" r="13"
              fill="rgba(255,120,0,0.3)"
              stroke="url(#atomGrad)" stroke-width="5"/>
    </g>
  </g>

  <!-- PIZARRA E = mc² -->
  <g id="board" transform="translate(310,190)" filter="url(#softGlow)">
    <rect x="-5" y="-5" width="110" height="80" rx="8" ry="8"
          fill="#111111" stroke="#ffb347" stroke-width="4"/>
    <text x="50" y="45" text-anchor="middle"
          font-family="system-ui, sans-serif"
          font-size="26" fill="#ffd94a"
          font-weight="600">
      E = mc²
    </text>
  </g>

  <!-- Partículas -->
  <g id="particles" fill="#ffb347" opacity="0.9">
    <circle cx="135" cy="150" r="3"/>
    <circle cx="365" cy="135" r="3"/>
    <circle cx="390" cy="250" r="2.5"/>
    <circle cx="120" cy="260" r="2.5"/>
    <circle cx="280" cy="330" r="2.5"/>
  </g>

  <!-- Texto Phyxio IA -->
  <text x="250" y="495" text-anchor="middle"
        font-family="system-ui, sans-serif"
        font-size="40" fill="#ff6a00"
        font-weight="700">
    Phyxio IA
  </text>
</svg>
