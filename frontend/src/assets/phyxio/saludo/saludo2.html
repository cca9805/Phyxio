<svg width="400" height="400" viewBox="0 0 400 400"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo transparente (no dibujamos nada) -->

  <!-- Definiciones -->
  <defs>
    <!-- Degradado holográfico naranja-rojo -->
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="50%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff1e00"/>
    </linearGradient>

    <!-- Glow suave -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Plataforma de luz -->
  <ellipse cx="200" cy="330" rx="70" ry="18"
           fill="url(#holo)" fill-opacity="0.35" filter="url(#glow)"/>

  <!-- Anillos orbitales -->
    <g id="orbits" stroke="url(#holo)" stroke-width="3" fill="none" opacity="0.9">
    <ellipse cx="200" cy="210" rx="110" ry="40" transform="rotate(-10 200 210)"/>
    <ellipse cx="200" cy="210" rx="80" ry="30" transform="rotate(15 200 210)"/>
    <ellipse cx="200" cy="210" rx="50" ry="18" transform="rotate(30 200 210)"/>
    </g>

  <!-- Cuerpo completo -->
  <g id="phyxio" filter="url(#glow)" stroke="url(#holo)" stroke-width="4"
     fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Cabeza -->
    <circle cx="200" cy="130" r="55" fill="rgba(255,90,0,0.18)"/>
    <!-- Orejas -->
    <path d="M165 95 L150 65 L175 80 Z" fill="rgba(255,90,0,0.25)"/>
    <path d="M235 95 L250 65 L225 80 Z" fill="rgba(255,90,0,0.25)"/>

    <!-- Ojos -->
    <circle cx="185" cy="125" r="10" fill="#ffb347"/>
    <circle cx="215" cy="125" r="10" fill="#ffb347"/>
    <circle cx="188" cy="122" r="4" fill="#ffffff"/>
    <circle cx="218" cy="122" r="4" fill="#ffffff"/>

    <!-- Boca -->
    <path d="M185 145 Q200 155 215 145" stroke="#ffb347" stroke-width="3"/>

    <!-- Núcleo atómico -->
    <circle cx="200" cy="205" r="16" fill="#ff3b1a"/>
    <circle cx="200" cy="205" r="26" stroke="#ffb347" stroke-width="2" fill="none"/>
    <ellipse cx="200" cy="205" rx="26" ry="10" transform="rotate(25 200 205)"/>
    <ellipse cx="200" cy="205" rx="26" ry="10" transform="rotate(-25 200 205)"/>

    <!-- Torso -->
    <path d="M175 165 Q200 190 225 165 L235 230 Q200 255 165 230 Z"
          fill="rgba(255,90,0,0.15)"/>

    <!-- Brazo izquierdo en la cadera -->
    <path d="M170 185 L145 210 L155 225" />

    <!-- Brazo derecho levantado (saludo) -->
    <!-- Brazo derecho un poco más bajo -->
    <path id="rightArmFrame2"
        d="M230 185 L252 165 L265 145" />

    <!-- Mano derecha acompañando el movimiento -->
    <g id="rightHandFrame2">
    <circle cx="265" cy="145" r="10" fill="rgba(255,90,0,0.2)"/>
    <path d="M265 135 L265 127" />
    <path d="M270 138 L276 132" />
    <path d="M260 138 L254 132" />
    </g>

    <!-- Piernas -->
    <path d="M185 255 L180 300" />
    <path d="M215 255 L220 300" />
  </g>

  <!-- Partículas -->
  <g fill="#ffb347" opacity="0.8">
    <circle cx="130" cy="120" r="2"/>
    <circle cx="260" cy="90" r="2.5"/>
    <circle cx="280" cy="200" r="2"/>
    <circle cx="140" cy="230" r="1.8"/>
    <circle cx="220" cy="270" r="2"/>
  </g>
</svg>
