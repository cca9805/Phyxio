  - id: x2
    symbol: x_2
    nombre: posicion_x_2
    unidad_si: m
    descripcion: Posicion en x del cuerpo 2.
  - id: x3
    symbol: x_3
    nombre: posicion_x_3
    unidad_si: m
    descripcion: Posicion en x del cuerpo 3.
  - id: y1
    symbol: y_1
    nombre: posicion_y_1
    unidad_si: m
