version: 1
topic:
  id: colisiones-elasticas
  title: Colisiones elásticas
variables:
  - id: m1
    symbol: m_1
    nombre: masa 1
    unidad_si: kg
    descripcion: Masa del cuerpo 1.
  - id: m2
    symbol: m_2
    nombre: masa 2
    unidad_si: kg
    descripcion: Masa del cuerpo 2.
  - id: v1i
    symbol: v_{1i}
    nombre: velocidad inicial 1
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 1.
  - id: v2i
    symbol: v_{2i}
    nombre: velocidad inicial 2
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 2.
  - id: v1f
    symbol: v_{1f}
    nombre: velocidad final 1
    unidad_si: m/s
    descripcion: Velocidad final del cuerpo 1.
  - id: v2f
    symbol: v_{2f}
    nombre: velocidad final 2
    unidad_si: m/s
    descripcion: Velocidad final del cuerpo 2.
  - id: Ki
    symbol: K_i
    nombre: energía cinética inicial total
    unidad_si: J
    descripcion: Energia cinética total antes del choque.
  - id: Kf
    symbol: K_f
    nombre: energía cinética final total
    unidad_si: J
    descripcion: Energia cinética total despues del choque.
formulas:
  - id: momento_1d
    title: Conservación del momento lineal
    equation: m1*v1i + m2*v2i = m1*v1f + m2*v2f
    latex: m_1v_{1i}+m_2v_{2i}=m_1v_{1f}+m_2v_{2f}
    rearrangements:
      - target: v1f
        equation: v1f = (m1*v1i + m2*v2i - m2*v2f)/m1
        latex: v_{1f}=\frac{m_1v_{1i}+m_2v_{2i}-m_2v_{2f}}{m_1}
      - target: v2f
        equation: v2f = (m1*v1i + m2*v2i - m1*v1f)/m2
        latex: v_{2f}=\frac{m_1v_{1i}+m_2v_{2i}-m_1v_{1f}}{m_2}
    constraints:
      - expr: m1 > 0
        message: m1 debe ser mayor que 0.
      - expr: m2 > 0
        message: m2 debe ser mayor que 0.
  - id: v1f_elastica_1d
    title: Velocidad final del cuerpo 1 (choque elástico 1D)
    equation: v1f = ((m1-m2)/(m1+m2))*v1i + ((2*m2)/(m1+m2))*v2i
    latex: v_{1f}=\frac{m_1-m_2}{m_1+m_2}v_{1i}+\frac{2m_2}{m_1+m_2}v_{2i}
    rearrangements:
      - target: v1f
        equation: v1f = ((m1-m2)/(m1+m2))*v1i + ((2*m2)/(m1+m2))*v2i
        latex: v_{1f}=\frac{m_1-m_2}{m_1+m_2}v_{1i}+\frac{2m_2}{m_1+m_2}v_{2i}
    constraints:
      - expr: m1 + m2 > 0
        message: m1 + m2 debe ser mayor que 0.
  - id: v2f_elastica_1d
    title: Velocidad final del cuerpo 2 (choque elástico 1D)
    equation: v2f = ((2*m1)/(m1+m2))*v1i + ((m2-m1)/(m1+m2))*v2i
    latex: v_{2f}=\frac{2m_1}{m_1+m_2}v_{1i}+\frac{m_2-m_1}{m_1+m_2}v_{2i}
    rearrangements:
      - target: v2f
        equation: v2f = ((2*m1)/(m1+m2))*v1i + ((m2-m1)/(m1+m2))*v2i
        latex: v_{2f}=\frac{2m_1}{m_1+m_2}v_{1i}+\frac{m_2-m_1}{m_1+m_2}v_{2i}
    constraints:
      - expr: m1 + m2 > 0
        message: m1 + m2 debe ser mayor que 0.
  - id: ki_total
    title: Energia cinética inicial total
    equation: Ki = 0.5*m1*v1i*v1i + 0.5*m2*v2i*v2i
    latex: K_i=\frac{1}{2}m_1v_{1i}^2+\frac{1}{2}m_2v_{2i}^2
    rearrangements:
      - target: Ki
        equation: Ki = 0.5*m1*v1i*v1i + 0.5*m2*v2i*v2i
        latex: K_i=\frac{1}{2}m_1v_{1i}^2+\frac{1}{2}m_2v_{2i}^2
  - id: kf_total
    title: Energia cinética final total
    equation: Kf = 0.5*m1*v1f*v1f + 0.5*m2*v2f*v2f
    latex: K_f=\frac{1}{2}m_1v_{1f}^2+\frac{1}{2}m_2v_{2f}^2
    rearrangements:
      - target: Kf
        equation: Kf = 0.5*m1*v1f*v1f + 0.5*m2*v2f*v2f
        latex: K_f=\frac{1}{2}m_1v_{1f}^2+\frac{1}{2}m_2v_{2f}^2
  - id: velocidad_relativa_conceptual
    title: Relacion de velocidades relativas (conceptual)
    equation: v1i - v2i = -(v1f - v2f)
    latex: v_{1i}-v_{2i}=-(v_{1f}-v_{2f})
    calculable: false
    motivo_no_calculable: Relacion de cierre conceptual del modelo elástico 1D, no un despeje unico en todos los escenarios.
  - id: energia_conservada_conceptual
    title: Conservación de energía cinética (conceptual)
    equation: Ki = Kf
    latex: K_i=K_f
    calculable: false
    motivo_no_calculable: Condicion global de modelo para validar el choque elástico ideal.
ui:
  default_formula: v1f_elastica_1d
  groups:
    - title: Formulas calculables
      items:
        - momento_1d
        - v1f_elastica_1d
        - v2f_elastica_1d
        - ki_total
        - kf_total
    - title: Formulas conceptuales
      items:
        - velocidad_relativa_conceptual
        - energia_conservada_conceptual
