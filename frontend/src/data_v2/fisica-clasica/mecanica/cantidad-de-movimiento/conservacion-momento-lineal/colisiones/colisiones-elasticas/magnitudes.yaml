    unidad_si: m/s
    descripcion: Velocidad del cuerpo 1 antes del choque.
  - id: v2i
    symbol: v_{2i}
    nombre: velocidad_inicial_2
    unidad_si: m/s
    descripcion: Velocidad del cuerpo 2 antes del choque.
  - id: v1f
    symbol: v_{1f}
    nombre: velocidad_final_1
    unidad_si: m/s
    descripcion: Velocidad del cuerpo 1 despues del choque.
  - id: v2f
    symbol: v_{2f}
    nombre: velocidad_final_2
    unidad_si: m/s
    descripcion: Velocidad del cuerpo 2 despues del choque.
  - id: p
    symbol: p
    nombre: momento_lineal
    unidad_si: kg*m/s
    descripcion: Cantidad de movimiento lineal.
  - id: Ki
    symbol: K_i
    nombre: energia_cinetica_inicial_total
    unidad_si: J
    descripcion: Energia cinética total inicial.
  - id: Kf
    symbol: K_f
    nombre: energia_cinetica_final_total
