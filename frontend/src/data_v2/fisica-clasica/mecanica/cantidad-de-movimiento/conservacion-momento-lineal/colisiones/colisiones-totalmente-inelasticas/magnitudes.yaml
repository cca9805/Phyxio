version: 1
magnitudes:
  - id: m1
    symbol: m_1
    nombre: masa_1
    unidad_si: kg
    descripcion: Masa del cuerpo 1.
  - id: m2
    symbol: m_2
    nombre: masa_2
    unidad_si: kg
    descripcion: Masa del cuerpo 2.
  - id: v1i
    symbol: v_{1i}
    nombre: velocidad_inicial_1
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 1.
  - id: v2i
    symbol: v_{2i}
    nombre: velocidad_inicial_2
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 2.
  - id: vf
    symbol: v_f
    nombre: velocidad_final_comun
    unidad_si: m/s
    descripcion: Velocidad comun despues del choque.
  - id: p
    symbol: p
    nombre: momento_lineal
    unidad_si: kg*m/s
    descripcion: Cantidad de movimiento lineal total.
  - id: Ki
    symbol: K_i
    nombre: energia_cinetica_inicial_total
    unidad_si: J
    descripcion: Energia cinética total inicial.
  - id: Kf
    symbol: K_f
    nombre: energia_cinetica_final_total
    unidad_si: J
    descripcion: Energia cinética total final.
  - id: DeltaK
    symbol: \Delta K
    nombre: energia_disipada
    unidad_si: J
    descripcion: Energia cinética perdida en el canal traslacional.
