objetivos:
  - Delimitar correctamente el sistema para aplicar conservación del momento.
  - Resolver problemas 1D y por componentes usando suma de momentos inicial y final.
  - Evaluar cuando debe incorporarse impulso externo.
suposiciones:
  - Fuerza externa neta pequena en el intervalo analizado.
  - Sistema cerrado en masa para el modelo basico.
