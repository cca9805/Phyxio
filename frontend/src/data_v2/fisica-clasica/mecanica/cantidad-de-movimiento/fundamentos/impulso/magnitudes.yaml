version: 1
magnitudes:
  - id: J
    symbol: J
    nombre: impulso
    unidad_si: N*s
    descripcion: Cambio total de momento lineal durante el intervalo.
  - id: F
    symbol: F
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Fuerza neta aplicada.
  - id: dt
    symbol: \Delta t
    nombre: intervalo_tiempo
    unidad_si: s
    descripcion: Tiempo de accion de la fuerza.
  - id: Fmed
    symbol: F_{med}
    nombre: fuerza_media
    unidad_si: N
    descripcion: Fuerza media equivalente en el intervalo.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo.
  - id: v0
    symbol: v_0
    nombre: velocidad_inicial
    unidad_si: m/s
    descripcion: Velocidad inicial.
  - id: vF
    symbol: v_f
    nombre: velocidad_final
    unidad_si: m/s
    descripcion: Velocidad final.
  - id: pi
    symbol: p_i
    nombre: momento_inicial
    unidad_si: kg*m/s
    descripcion: Momento lineal inicial.
  - id: pf
    symbol: p_f
    nombre: momento_final
    unidad_si: kg*m/s
    descripcion: Momento lineal final.
  - id: DeltaP
    symbol: \Delta p
    nombre: cambio_momento
    unidad_si: kg*m/s
    descripcion: Diferencia entre momento final e inicial.
