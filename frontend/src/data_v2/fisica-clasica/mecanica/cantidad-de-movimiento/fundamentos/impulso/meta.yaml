objetivos:
  - Definir impulso en su forma integral y en su forma de fuerza media.
  - Aplicar J = F*dt cuando la fuerza es aproximadamente constante.
  - Resolver cambios de momento con el teorema impulso-momento.
  - Interpretar fisicamente el area bajo la curva F-t.
suposiciones:
  - Analisis 1D en la mayoria de ejercicios base.
  - Fuerza media representativa cuando no es constante.
