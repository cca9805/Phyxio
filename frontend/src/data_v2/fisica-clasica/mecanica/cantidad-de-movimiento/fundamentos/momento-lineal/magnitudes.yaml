version: 1
magnitudes:
  - id: p
    symbol: p
    nombre: momento_lineal
    unidad_si: kg*m/s
    descripcion: Cantidad de movimiento lineal del cuerpo.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa inercial.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad lineal.
  - id: v0
    symbol: v_0
    nombre: velocidad_inicial
    unidad_si: m/s
    descripcion: Velocidad al inicio del intervalo.
  - id: a
    symbol: a
    nombre: aceleración
    unidad_si: m/s^2
    descripcion: Variacion temporal de la velocidad.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de evolucion.
  - id: px
    symbol: p_x
    nombre: momento_x
    unidad_si: kg*m/s
    descripcion: Componente x del momento lineal.
  - id: py
    symbol: p_y
    nombre: momento_y
    unidad_si: kg*m/s
    descripcion: Componente y del momento lineal.
  - id: vx
    symbol: v_x
    nombre: velocidad_x
    unidad_si: m/s
    descripcion: Componente x de la velocidad.
  - id: vy
    symbol: v_y
    nombre: velocidad_y
    unidad_si: m/s
    descripcion: Componente y de la velocidad.
  - id: pi
    symbol: p_i
    nombre: momento_inicial
    unidad_si: kg*m/s
    descripcion: Momento al inicio.
  - id: pf
    symbol: p_f
    nombre: momento_final
    unidad_si: kg*m/s
    descripcion: Momento al final.
  - id: DeltaP
    symbol: \Delta p
    nombre: cambio_momento
    unidad_si: kg*m/s
    descripcion: Diferencia entre momento final e inicial.
  - id: Fnet
    symbol: F_{net}
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Fuerza neta media del sistema.
  - id: DeltaT
    symbol: \Delta t
    nombre: intervalo_tiempo
    unidad_si: s
    descripcion: Duracion del intervalo analizado.
