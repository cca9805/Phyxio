objetivos:
  - Definir y calcular el momento lineal en 1D y por componentes.
  - Interpretar módulo, direccion y sentido del vector momento.
  - Relacionar cambios de momento con interacciones mecanicas reales.
  - Preparar el enlace con impulso y conservación del momento total.
