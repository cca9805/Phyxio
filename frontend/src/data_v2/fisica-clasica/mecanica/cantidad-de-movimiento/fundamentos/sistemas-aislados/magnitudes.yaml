version: 1
magnitudes:
  - id: m1
    symbol: m_1
    nombre: masa_1
    unidad_si: kg
    descripcion: Masa del cuerpo 1.
  - id: m2
    symbol: m_2
    nombre: masa_2
    unidad_si: kg
    descripcion: Masa del cuerpo 2.
  - id: v1i
    symbol: v_{1i}
    nombre: velocidad_inicial_1
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 1.
  - id: v2i
    symbol: v_{2i}
    nombre: velocidad_inicial_2
    unidad_si: m/s
    descripcion: Velocidad inicial del cuerpo 2.
  - id: v1f
    symbol: v_{1f}
    nombre: velocidad_final_1
    unidad_si: m/s
    descripcion: Velocidad final del cuerpo 1.
  - id: v2f
    symbol: v_{2f}
    nombre: velocidad_final_2
    unidad_si: m/s
    descripcion: Velocidad final del cuerpo 2.
  - id: pTotI
    symbol: p_{tot,i}
    nombre: momento_total_inicial
    unidad_si: kg*m/s
    descripcion: Momento lineal total inicial.
  - id: pTotF
    symbol: p_{tot,f}
    nombre: momento_total_final
    unidad_si: kg*m/s
    descripcion: Momento lineal total final.
  - id: DeltaPtot
    symbol: \Delta p_{tot}
    nombre: cambio_momento_total
    unidad_si: kg*m/s
    descripcion: Cambio del momento total del sistema.
  - id: Jext
    symbol: J_{ext}
    nombre: impulso_externo
    unidad_si: N*s
    descripcion: Impulso externo neto sobre el sistema.
