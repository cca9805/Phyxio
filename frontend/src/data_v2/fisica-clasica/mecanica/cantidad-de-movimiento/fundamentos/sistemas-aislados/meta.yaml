descripcion_corta: >
  Un sistema aislado tiene fuerza externa neta despreciable, por lo que el
  momento lineal total se conserva durante la interacción.
tags:
  - sistemas-aislados
  - conservacion-momento
  - cantidad-de-movimiento
  - colisiones
objetivos:
  - Delimitar correctamente el sistema para aplicar conservación del momento.
  - Evaluar cuando la hipotesis de aislamiento es razonable.
  - Resolver interacciones internas y choques con momento total constante.
  - Incorporar impulso externo cuando el aislamiento no es valido.
suposiciones:
  - Fuerza externa neta aproximada a cero en el intervalo analizado.
  - Sistema cerrado en masa para el modelo basico.
