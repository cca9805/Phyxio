version: 1
magnitudes:
  - id: L
    symbol: L
    nombre: momento_angular
    unidad_si: kg*m^2/s
    descripcion: Momento angular respecto al eje elegido.
  - id: Ii
    symbol: I_i
    nombre: inercia_inicial
    unidad_si: kg*m^2
    descripcion: Momento de inercia inicial.
  - id: If
    symbol: I_f
    nombre: inercia_final
    unidad_si: kg*m^2
    descripcion: Momento de inercia final.
  - id: omegai
    symbol: \omega_i
    nombre: velocidad_angular_inicial
    unidad_si: rad/s
    descripcion: Velocidad angular inicial.
  - id: omegaf
    symbol: \omega_f
    nombre: velocidad_angular_final
    unidad_si: rad/s
    descripcion: Velocidad angular final.
  - id: tau
    symbol: \tau
    nombre: torque_externo_neto
    unidad_si: N*m
    descripcion: Suma de torques externos.
  - id: DeltaL
    symbol: \Delta L
    nombre: cambio_momento_angular
    unidad_si: kg*m^2/s
    descripcion: Variacion del momento angular.
  - id: DeltaT
    symbol: \Delta t
    nombre: intervalo_tiempo
    unidad_si: s
    descripcion: Tiempo del proceso.
