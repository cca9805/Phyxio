version: 1
magnitudes:
  - id: L
    symbol: \vec L
    nombre: momento_angular
    unidad_si: kg*m^2/s
    descripcion: Momento angular respecto a un origen o eje.
  - id: r
    symbol: \vec r
    nombre: vector_posicion
    unidad_si: m
    descripcion: Vector desde el origen de referencia hasta la partícula.
  - id: p
    symbol: \vec p
    nombre: momento_lineal
    unidad_si: kg*m/s
    descripcion: Cantidad de movimiento lineal.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa de la partícula o cuerpo.
  - id: v
    symbol: \vec v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad lineal de la partícula.
  - id: theta
    symbol: \theta
    nombre: angulo_r_p
    unidad_si: rad
    descripcion: Angulo entre r y p.
  - id: I
    symbol: I
    nombre: momento_inercia
    unidad_si: kg*m^2
    descripcion: Momento de inercia respecto al eje considerado.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular de giro.
  - id: tau
    symbol: \tau
    nombre: torque
    unidad_si: N*m
    descripcion: Momento de fuerzas externo.
