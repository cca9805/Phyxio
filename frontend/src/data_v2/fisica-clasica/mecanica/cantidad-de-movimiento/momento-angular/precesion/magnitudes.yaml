version: 1
magnitudes:
  - id: tau
    symbol: \tau
    nombre: torque_externo
    unidad_si: N*m
    descripcion: Torque externo neto aplicado al sistema.
  - id: L
    symbol: L
    nombre: momento_angular
    unidad_si: kg*m^2/s
    descripcion: Momento angular del giro propio.
  - id: Omegap
    symbol: \Omega_p
    nombre: velocidad_angular_precesion
    unidad_si: rad/s
    descripcion: Velocidad angular de precesion.
  - id: Tp
    symbol: T_p
    nombre: periodo_precesion
    unidad_si: s
    descripcion: Periodo asociado a la precesion.
  - id: M
    symbol: M
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo en precesion.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad.
  - id: d
    symbol: d
    nombre: brazo_gravitatorio
    unidad_si: m
    descripcion: Distancia del punto de apoyo al centro de masas.
  - id: I
    symbol: I
    nombre: momento_inercia
    unidad_si: kg*m^2
    descripcion: Momento de inercia respecto al eje de spin.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular_spin
    unidad_si: rad/s
    descripcion: Velocidad angular del giro propio.
