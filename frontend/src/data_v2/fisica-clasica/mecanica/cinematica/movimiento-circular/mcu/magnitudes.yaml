version: 1

magnitudes:
  - id: R
    symbol: R
    nombre: "radio"
    unidad_si: "m"
    descripcion: "Distancia del móvil al centro de la circunferencia."

  - id: theta
    symbol: "\\theta"
    nombre: "posición angular"
    unidad_si: "rad"
    descripcion: "Ángulo medido desde una dirección de referencia."

  - id: theta0
    symbol: "\\theta_0"
    nombre: "posición angular inicial"
    unidad_si: "rad"
    descripcion: "Ángulo en t = 0."

  - id: omega
    symbol: "\\omega"
    nombre: "velocidad angular"
    unidad_si: "rad/s"
    descripcion: "Derivada de θ respecto al tiempo. En MCU es constante."

  - id: T
    symbol: T
    nombre: "periodo"
    unidad_si: "s"
    descripcion: "Tiempo de una vuelta completa."

  - id: f
    symbol: f
    nombre: "frecuencia"
    unidad_si: "Hz"
    descripcion: "Vueltas por segundo. f = 1/T."

  - id: t
    symbol: t
    nombre: "tiempo"
    unidad_si: "s"
    descripcion: "Tiempo transcurrido."

  - id: v
    symbol: v
    nombre: "rapidez lineal"
    unidad_si: "m/s"
    descripcion: "Módulo de la velocidad tangencial: v = ωR."

  - id: ac
    symbol: "a_c"
    nombre: "aceleración centrípeta"
    unidad_si: "m/s^2"
    descripcion: "Aceleración hacia el centro: a_c = v^2/R = ω^2 R."

  - id: s
    symbol: s
    nombre: "arco recorrido"
    unidad_si: "m"
    descripcion: "Longitud recorrida sobre la circunferencia: s = R·Δθ."

  - id: dtheta
    symbol: "\\Delta\\theta"
    nombre: "desplazamiento angular"
    unidad_si: "rad"
    descripcion: "Cambio de ángulo: Δθ = θ − θ0."
