version: 1

magnitudes:
  - id: R
    symbol: R
    nombre: "radio"
    unidad_si: "m"
    descripcion: "Radio de la trayectoria circular (constante)."

  - id: theta
    symbol: "\\theta"
    nombre: "posición angular"
    unidad_si: "rad"
    descripcion: "Ángulo respecto a una referencia."

  - id: theta0
    symbol: "\\theta_0"
    nombre: "posición angular inicial"
    unidad_si: "rad"
    descripcion: "Ángulo en t = 0."

  - id: omega
    symbol: "\\omega"
    nombre: "velocidad angular"
    unidad_si: "rad/s"
    descripcion: "Derivada de θ. En MCUA varía con el tiempo."

  - id: omega0
    symbol: "\\omega_0"
    nombre: "velocidad angular inicial"
    unidad_si: "rad/s"
    descripcion: "Velocidad angular en t = 0."

  - id: alpha
    symbol: "\\alpha"
    nombre: "aceleración angular"
    unidad_si: "rad/s^2"
    descripcion: "Constante en MCUA."

  - id: t
    symbol: t
    nombre: "tiempo"
    unidad_si: "s"
    descripcion: "Tiempo transcurrido."

  - id: v
    symbol: v
    nombre: "rapidez lineal"
    unidad_si: "m/s"
    descripcion: "Rapidez tangencial: v = ωR."

  - id: at
    symbol: "a_t"
    nombre: "aceleración tangencial"
    unidad_si: "m/s^2"
    descripcion: "Cambia el módulo de v: a_t = αR."

  - id: ac
    symbol: "a_c"
    nombre: "aceleración centrípeta"
    unidad_si: "m/s^2"
    descripcion: "Dirigida al centro: a_c = ω^2 R."

  - id: dtheta
    symbol: "\\Delta\\theta"
    nombre: "desplazamiento angular"
    unidad_si: "rad"
    descripcion: "Δθ = θ − θ0."
