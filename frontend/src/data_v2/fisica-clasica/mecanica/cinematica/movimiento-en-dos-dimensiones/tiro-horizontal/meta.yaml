objetivos:
  - Comprender la independencia de los movimientos horizontal y vertical.
  - Aplicar las ecuaciones de MRU y caída libre a un movimiento bidimensional.
  - Calcular tiempo de caída, alcance horizontal y velocidad de impacto.
  - Interpretar el movimiento mediante gráficos y esquemas.
suposiciones:
  - Lanzamiento con velocidad inicial solo horizontal (v0y = 0).
  - Sin rozamiento con el aire.
  - Gravedad constante y vertical hacia abajo.
  - Ejes: x horizontal, y vertical (positivo hacia arriba), con y0 como altura inicial.
