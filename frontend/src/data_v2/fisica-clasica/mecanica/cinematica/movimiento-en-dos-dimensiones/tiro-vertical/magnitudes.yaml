version: 1

magnitudes:
  - id: y
    symbol: y
    nombre: "posición vertical"
    unidad_si: "m"
  - id: y0
    symbol: "y_0"
    nombre: "posición inicial"
    unidad_si: "m"
  - id: v
    symbol: v
    nombre: "velocidad vertical"
    unidad_si: "m/s"
  - id: v0
    symbol: "v_0"
    nombre: "velocidad inicial"
    unidad_si: "m/s"
  - id: a
    symbol: a
    nombre: "aceleración vertical"
    unidad_si: "m/s^2"
  - id: g
    symbol: g
    nombre: "gravedad"
    unidad_si: "m/s^2"
  - id: t
    symbol: t
    nombre: "tiempo"
    unidad_si: "s"
  - id: dy
    symbol: "\\Delta y"
    nombre: "desplazamiento vertical"
    unidad_si: "m"
  - id: tMax
    symbol: "t_{\\max}"
    nombre: "tiempo hasta altura máxima"
    unidad_si: "s"
  - id: yMax
    symbol: "y_{\\max}"
    nombre: "altura máxima"
    unidad_si: "m"
