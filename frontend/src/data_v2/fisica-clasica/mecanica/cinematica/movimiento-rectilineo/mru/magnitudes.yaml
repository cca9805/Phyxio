version: 1

magnitudes:
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Posición sobre el eje x.

  - id: x0
    symbol: x_0
    nombre: posicion_inicial
    unidad_si: m
    descripcion: Posición en t = 0.

  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad constante (con signo).

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo transcurrido desde t = 0 (normalmente t >= 0).

  - id: dx
    symbol: "\\Delta x"
    nombre: desplazamiento
    unidad_si: m
    descripcion: Cambio de posición (x - x0).

  - id: dt
    symbol: "\\Delta t"
    nombre: intervalo_tiempo
    unidad_si: s
    descripcion: Tiempo transcurrido (debe ser distinto de 0 para v = dx/dt).
