objetivos:
  - Identificar cuándo un movimiento es MRU a partir de datos o gráficas.
  - Usar la ecuación horaria x(t) = x0 + v·t para calcular posición, tiempo o velocidad.
  - Interpretar la pendiente en una gráfica x–t como la velocidad.
  - Diferenciar rapidez media y velocidad (signo y dirección) en 1D.
  - Resolver problemas típicos de encuentros y adelantos en MRU.
suposiciones:
  - Movimiento unidimensional (eje x) y trayectoria rectilínea.
  - Velocidad constante (aceleración nula).
  - Sistema de referencia inercial y eje bien definido.
  - Unidades coherentes (SI recomendado).
