version: 1

magnitudes:
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Posición sobre el eje x.

  - id: x0
    symbol: x_0
    nombre: posicion_inicial
    unidad_si: m
    descripcion: Posición en t = 0.

  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad en un instante.

  - id: v0
    symbol: v_0
    nombre: velocidad_inicial
    unidad_si: m/s
    descripcion: Velocidad en t = 0.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleración constante.

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo transcurrido desde t = 0.

  - id: dx
    symbol: "\\Delta x"
    nombre: desplazamiento
    unidad_si: m
    descripcion: Cambio de posición (x - x0).
