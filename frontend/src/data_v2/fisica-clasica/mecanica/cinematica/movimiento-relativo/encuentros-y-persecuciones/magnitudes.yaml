version: 1

magnitudes:
  - id: xA0
    symbol: "x_{A0}"
    nombre: "posición inicial de A"
    unidad_si: "m"
  - id: xB0
    symbol: "x_{B0}"
    nombre: "posición inicial de B"
    unidad_si: "m"
  - id: vA
    symbol: "v_A"
    nombre: "velocidad de A (MRU)"
    unidad_si: "m/s"
  - id: vB
    symbol: "v_B"
    nombre: "velocidad de B (MRU)"
    unidad_si: "m/s"
  - id: aA
    symbol: "a_A"
    nombre: "aceleración de A (MRUA)"
    unidad_si: "m/s^2"
  - id: aB
    symbol: "a_B"
    nombre: "aceleración de B (MRUA)"
    unidad_si: "m/s^2"
  - id: dt
    symbol: "\\Delta t"
    nombre: "retraso de salida de B"
    unidad_si: "s"
  - id: t
    symbol: t
    nombre: "tiempo desde que sale A"
    unidad_si: "s"
  - id: xMeet
    symbol: "x_*"
    nombre: "posición de encuentro"
    unidad_si: "m"
