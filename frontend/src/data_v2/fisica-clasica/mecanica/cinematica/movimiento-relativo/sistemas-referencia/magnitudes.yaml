version: 1

magnitudes:
  - id: x
    symbol: x
    nombre: posicion_en_S
    unidad_si: m
    descripcion: Posición medida en el sistema S (marco “fijo” o de referencia principal).

  - id: xp
    symbol: x'
    nombre: posicion_en_S_prima
    unidad_si: m
    descripcion: Posición medida en el sistema S' (marco móvil).

  - id: x0
    symbol: x_0
    nombre: posicion_origen_S_prima
    unidad_si: m
    descripcion: Posición del origen de S' respecto a S en el instante t=0.

  - id: v
    symbol: v
    nombre: velocidad_en_S
    unidad_si: m/s
    descripcion: Velocidad del móvil medida en S.

  - id: vp
    symbol: v'
    nombre: velocidad_en_S_prima
    unidad_si: m/s
    descripcion: Velocidad del móvil medida en S'.

  - id: v0
    symbol: v_0
    nombre: velocidad_de_S_prima
    unidad_si: m/s
    descripcion: Velocidad del sistema S' respecto a S (constante en el modelo galileano básico).

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo del experimento (en cinemática clásica, se toma igual en ambos marcos).
