objetivos:
  - Entender qué define un sistema de referencia (origen, ejes, reloj y observador).
  - Distinguir magnitudes medidas en dos sistemas y su notación.
  - Aplicar transformaciones galileanas 1D (posición y velocidad) con movimiento relativo constante.
  - Interpretar correctamente “depende del sistema” sin confundirlo con “no es real”.
suposiciones:
  - Movimiento relativo entre marcos constante (modelo galileano básico).
  - Ejes paralelos y sin rotación del marco móvil (caso 1D o ejes alineados).
  - Se desprecia la relatividad especial (v << c).
  - Unidades coherentes (SI recomendado).
