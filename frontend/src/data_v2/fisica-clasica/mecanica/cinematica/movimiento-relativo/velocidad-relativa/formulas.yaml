version: 1
topic:
  id: velocidad-relativa
  title: Velocidad relativa
variables:
  - id: vAB
    symbol: v_{A/B}
    nombre: velocidad de A respecto B
    unidad_si: m/s
    descripcion: Velocidad de A respecto B.
  - id: vBC
    symbol: v_{B/C}
    nombre: velocidad de B respecto C
    unidad_si: m/s
    descripcion: Velocidad de B respecto C.
  - id: vAC
    symbol: v_{A/C}
    nombre: velocidad de A respecto C
    unidad_si: m/s
    descripcion: Velocidad de A respecto C.
formulas:
  - id: composicion_1d
    title: Composición de velocidades (1D)
    equation: vAC = vAB + vBC
    latex: v_{A/C} = v_{A/B} + v_{B/C}
    rearrangements:
      - target: vAC
        equation: vAC = vAB + vBC
        latex: v_{A/C} = v_{A/B} + v_{B/C}
      - target: vAB
        equation: vAB = vAC - vBC
        latex: v_{A/B} = v_{A/C} - v_{B/C}
      - target: vBC
        equation: vBC = vAC - vAB
        latex: v_{B/C} = v_{A/C} - v_{A/B}
    status: calculable
  - id: anti_simetria
    title: Antisimetría (conceptual)
    equation: vAB = -vBA
    latex: v_{A/B} = -v_{B/A}
    motivo_no_calculable: |
      Propiedad de definición (cambio de observador). No es un cálculo numérico independiente: depende de la convención de signos.
    status: descriptive
  - id: vectorial_general
    title: Forma vectorial (conceptual)
    equation: v = vp + v0
    latex: \vec v_{A/C} = \vec v_{A/B} + \vec v_{B/C}
    motivo_no_calculable: |
      En 2D/3D requiere trabajar por componentes. Este Tema se limita a 1D para calculadora.
    status: descriptive
ui:
  default_formula: composicion_1d
  groups:
    - title: Velocidad relativa (calculable)
      items:
        - composicion_1d
