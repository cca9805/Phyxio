  - id: vBC
    symbol: v_{B/C}
    nombre: velocidad_de_B_respecto_C
    unidad_si: m/s
    descripcion: Velocidad de B medida por un observador solidario con C (1D, con signo).

  - id: vAC
    symbol: v_{A/C}
    nombre: velocidad_de_A_respecto_C
    unidad_si: m/s
    descripcion: Velocidad de A medida por un observador solidario con C (1D, con signo).

  - id: vA
