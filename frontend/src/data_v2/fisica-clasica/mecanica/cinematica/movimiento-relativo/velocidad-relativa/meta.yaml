objetivos:
  - Entender el significado de v_{A/B} y su interpretación con signos.
  - Aplicar composición de velocidades en 1D: v_{A/C} = v_{A/B} + v_{B/C}.
  - Resolver casos típicos: persona en tren, cinta transportadora, río con corriente (1D).
  - Identificar errores de signo y elección de ejes.
suposiciones:
  - Movimiento relativo entre marcos constante (galileano).
  - Problemas 1D (ejes alineados). Para 2D se usarán vectores por componentes.
  - v << c (no relatividad especial).
