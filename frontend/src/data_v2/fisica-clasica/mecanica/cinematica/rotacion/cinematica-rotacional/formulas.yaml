version: 1
topic:
  id: cinematica-rotacional
  title: Cinemática rotacional
variables:
  - id: theta
    symbol: \theta
    unidad_si: rad
    descripcion: ''
  - id: theta0
    symbol: \theta_0
    unidad_si: rad
    descripcion: ''
  - id: dtheta
    symbol: \Delta\theta
    unidad_si: rad
    descripcion: ''
  - id: omega
    symbol: \omega
    unidad_si: rad/s
    descripcion: ''
  - id: omega0
    symbol: \omega_0
    unidad_si: rad/s
    descripcion: ''
  - id: alpha
    symbol: \alpha
    unidad_si: rad/s^2
    descripcion: ''
  - id: t
    symbol: t
    unidad_si: s
    descripcion: ''
  - id: dt
    symbol: \Delta t
    unidad_si: s
    descripcion: ''
formulas:
  - id: desplazamiento_angular
    title: Desplazamiento angular
    equation: dtheta = theta - theta0
    latex: \Delta\theta = \theta - \theta_0
    calculable: true
    rearrangements:
      - target: dtheta
        equation: dtheta = theta - theta0
        latex: \Delta\theta = \theta - \theta_0
      - target: theta
        equation: theta = dtheta + theta0
        latex: \theta = \Delta\theta + \theta_0
      - target: theta0
        equation: theta0 = theta - dtheta
        latex: \theta_0 = \theta - \Delta\theta
  - id: velocidad_angular_media
    title: Velocidad angular media
    equation: omega = dtheta / dt
    latex: \omega = \frac{\Delta\theta}{\Delta t}
    calculable: true
    rearrangements:
      - target: omega
        equation: omega = dtheta / dt
        latex: \omega = \frac{\Delta\theta}{\Delta t}
      - target: dtheta
        equation: dtheta = omega * dt
        latex: \Delta\theta = \omega\,\Delta t
      - target: dt
        equation: dt = dtheta / omega
        latex: \Delta t = \frac{\Delta\theta}{\omega}
  - id: velocidad_angular
    title: Velocidad angular (α constante)
    equation: omega = omega0 + alpha * t
    latex: \omega = \omega_0 + \alpha t
    calculable: true
    rearrangements:
      - target: omega
        equation: omega = omega0 + alpha * t
        latex: \omega = \omega_0 + \alpha t
      - target: omega0
        equation: omega0 = omega - alpha * t
        latex: \omega_0 = \omega - \alpha t
      - target: alpha
        equation: alpha = (omega - omega0) / t
        latex: \alpha = \frac{\omega - \omega_0}{t}
  - id: posicion_angular
    title: Posición angular (α constante)
    equation: theta = theta0 + omega0 * t + 0.5 * alpha * t^2
    latex: \theta = \theta_0 + \omega_0 t + \tfrac{1}{2}\alpha t^2
    calculable: true
    rearrangements:
      - target: theta
        equation: theta = theta0 + omega0 * t + 0.5 * alpha * t^2
        latex: \theta = \theta_0 + \omega_0 t + \tfrac{1}{2}\alpha t^2
      - target: theta0
        equation: theta0 = theta - omega0 * t - 0.5 * alpha * t^2
        latex: \theta_0 = \theta - \omega_0 t - \tfrac{1}{2}\alpha t^2
  - id: definicion_velocidad_angular
    title: Definición de velocidad angular
    equation: omega = dtheta / dt
    latex: \omega = \frac{d\theta}{dt}
    calculable: false
    motivo_no_calculable: |
      Definición diferencial. Requiere conocer la función θ(t) o realizar integración simbólica.
  - id: definicion_aceleracion_angular
    title: Definición de aceleración angular
    equation: alpha = domega / dt
    latex: \alpha = \frac{d\omega}{dt}
    calculable: false
    motivo_no_calculable: |
      Definición diferencial. No permite cálculo algebraico directo.
  - id: posicion_angular_general
    title: Posición angular (caso general)
    equation: theta = theta0 + ∫ omega(t) dt
    latex: \theta = \theta_0 + \int \omega(t)\,dt
    calculable: false
    motivo_no_calculable: Expresión integral. Requiere conocer ω(t) e integrar analíticamente o mediante métodos numéricos.
ui:
  default_formula: desplazamiento_angular
