version: 1

magnitudes:
  - id: theta
    symbol: "\\theta"
    nombre: posicion_angular
    unidad_si: rad
    descripcion: Orientación angular respecto a un origen.

  - id: theta0
    symbol: "\\theta_0"
    nombre: posicion_angular_inicial
    unidad_si: rad
    descripcion: Posición angular en el instante inicial.

  - id: dtheta
    symbol: "\\Delta\\theta"
    nombre: desplazamiento_angular
    unidad_si: rad
    descripcion: Cambio de posición angular.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Ritmo de cambio de la posición angular.

  - id: omega0
    symbol: "\\omega_0"
    nombre: velocidad_angular_inicial
    unidad_si: rad/s
    descripcion: Velocidad angular inicial.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Ritmo de cambio de la velocidad angular.

  - id: t
    symbol: "t"
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.

  - id: dt
    symbol: "\\Delta t"
    nombre: intervalo_tiempo
    unidad_si: s
    descripcion: Diferencia de tiempos.
