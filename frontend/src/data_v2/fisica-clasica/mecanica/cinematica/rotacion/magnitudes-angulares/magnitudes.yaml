version: 1
magnitudes:
- id: theta
  symbol: \theta
  nombre: posicion_angular
  unidad_si: rad
  descripcion: Orientación angular respecto a un origen elegido.
- id: theta0
  symbol: \theta_0
  nombre: posicion_angular_inicial
  unidad_si: rad
  descripcion: Posición angular en el instante inicial.
- id: dtheta
  symbol: \Delta\theta
  nombre: desplazamiento_angular
  unidad_si: rad
  descripcion: Variación de la posición angular (θ_f − θ_i).
- id: omega
  symbol: \omega
  nombre: velocidad_angular
  unidad_si: rad/s
  descripcion: Ritmo de cambio de la posición angular.
- id: domega
  symbol: \Delta\omega
  nombre: variacion_velocidad_angular
  unidad_si: rad/s
  descripcion: Cambio de velocidad angular entre dos instantes.
- id: alpha
  symbol: \alpha
  nombre: aceleracion_angular
  unidad_si: rad/s^2
  descripcion: Ritmo de cambio de la velocidad angular.
- id: t
  symbol: t
  nombre: tiempo
  unidad_si: s
  descripcion: Tiempo transcurrido.
- id: dt
  symbol: \Delta t
  nombre: intervalo_tiempo
  unidad_si: s
  descripcion: Diferencia de tiempos (t_f − t_i).
- id: omega0
  symbol: \omega_0
  nombre: velocidad_angular_inicial
  unidad_si: rad/s
  descripcion: Velocidad angular inicial.
