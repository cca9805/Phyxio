objetivos:
  - Definir y distinguir θ, Δθ, ω y α, con sus unidades en el SI.
  - Calcular velocidades y aceleraciones angulares medias a partir de datos.
  - Interpretar el signo de ω y α según el sentido de giro elegido.
  - Evitar errores frecuentes: grados vs radianes, posición vs desplazamiento.
conceptos_clave:
  - Radián como unidad natural de ángulo.
  - Sentido positivo de giro y convenio de signos.
  - Magnitudes comunes a todo el sólido rígido (para un eje fijo).
  - Derivadas temporales: ω = dθ/dt y α = dω/dt.
