version: 1
topic:
  id: relacion-lineal-angular
  title: Relación lineal–angular
variables:
  - id: r
    symbol: r
    unidad_si: m
    descripcion: ''
  - id: s
    symbol: s
    unidad_si: m
    descripcion: ''
  - id: theta
    symbol: \theta
    unidad_si: rad
    descripcion: ''
  - id: omega
    symbol: \omega
    unidad_si: rad/s
    descripcion: ''
  - id: alpha
    symbol: \alpha
    unidad_si: rad/s^2
    descripcion: ''
  - id: vt
    symbol: v_t
    unidad_si: m/s
    descripcion: ''
  - id: at
    symbol: a_t
    unidad_si: m/s^2
    descripcion: ''
  - id: an
    symbol: a_n
    unidad_si: m/s^2
    descripcion: ''
formulas:
  - id: arco
    title: Longitud de arco
    equation: s = r*theta
    latex: s = r\,\theta
    calculable: true
    rearrangements:
      - target: s
        equation: s = r*theta
        latex: s = r\,\theta
      - target: r
        equation: r = s/theta
        latex: r = \frac{s}{\theta}
      - target: theta
        equation: theta = s/r
        latex: \theta = \frac{s}{r}
  - id: velocidad_tangencial
    title: Velocidad tangencial
    equation: vt = omega*r
    latex: v_t = \omega\,r
    calculable: true
    rearrangements:
      - target: vt
        equation: vt = omega*r
        latex: v_t = \omega\,r
      - target: omega
        equation: omega = vt/r
        latex: \omega = \frac{v_t}{r}
      - target: r
        equation: r = vt/omega
        latex: r = \frac{v_t}{\omega}
  - id: aceleracion_tangencial
    title: Aceleración tangencial
    equation: at = alpha*r
    latex: a_t = \alpha\,r
    calculable: true
    rearrangements:
      - target: at
        equation: at = alpha*r
        latex: a_t = \alpha\,r
      - target: alpha
        equation: alpha = at/r
        latex: \alpha = \frac{a_t}{r}
      - target: r
        equation: r = at/alpha
        latex: r = \frac{a_t}{\alpha}
  - id: aceleracion_normal
    title: Aceleración normal (centrípeta)
    equation: an = omega^2*r
    latex: a_n = \omega^2\,r
    calculable: true
    rearrangements:
      - target: an
        equation: an = omega^2*r
        latex: a_n = \omega^2\,r
      - target: r
        equation: r = an/(omega^2)
        latex: r = \frac{a_n}{\omega^2}
      - target: omega
        equation: omega = sqrt(an/r)
        latex: \omega = \sqrt{\frac{a_n}{r}}
  - id: aceleracion_normal_con_v
    title: Aceleración normal (con v_t)
    equation: an = vt^2/r
    latex: a_n = \frac{v_t^2}{r}
    calculable: true
    rearrangements:
      - target: an
        equation: an = vt^2/r
        latex: a_n = \frac{v_t^2}{r}
      - target: vt
        equation: vt = sqrt(an*r)
        latex: v_t = \sqrt{a_n\,r}
      - target: r
        equation: r = vt^2/an
        latex: r = \frac{v_t^2}{a_n}
  - id: velocidad_vectorial
    title: Velocidad vectorial
    equation: v = omega × r
    latex: \vec v = \vec\omega \times \vec r
    calculable: false
    motivo_no_calculable: |
      Relación vectorial con producto vectorial. Requiere componentes y dirección del eje; el motor actual es escalar/algebraico.
  - id: aceleracion_vectorial
    title: Aceleración vectorial
    equation: a = alpha × r + omega × (omega × r)
    latex: \vec a = \vec\alpha \times \vec r + \vec\omega \times (\vec\omega \times \vec r)
    calculable: false
    motivo_no_calculable: |
      Ecuación vectorial con doble producto vectorial. No es un despeje escalar directo sin representar vectores.
  - id: arco_con_integral
    title: Arco (caso general)
    equation: s = ∫ v_t dt
    latex: s = \int v_t\,dt
    calculable: false
    motivo_no_calculable: Expresión integral. Requiere conocer v_t(t) y realizar integración analítica o numérica.
ui:
  default_formula: arco
