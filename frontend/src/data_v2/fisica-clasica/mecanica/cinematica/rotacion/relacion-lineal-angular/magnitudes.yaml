version: 1

magnitudes:
  - id: r
    symbol: r
    nombre: radio
    unidad_si: m
    descripcion: Distancia al eje de giro.

  - id: s
    symbol: s
    nombre: longitud_arco
    unidad_si: m
    descripcion: Longitud recorrida sobre la circunferencia.

  - id: theta
    symbol: "\\theta"
    nombre: posicion_angular
    unidad_si: rad
    descripcion: Ángulo (en radianes).

  - id: dtheta
    symbol: "\\Delta\\theta"
    nombre: desplazamiento_angular
    unidad_si: rad
    descripcion: Variación angular.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Ritmo de cambio angular.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Ritmo de cambio de ω.

  - id: vt
    symbol: v_t
    nombre: velocidad_tangencial
    unidad_si: m/s
    descripcion: Velocidad lineal tangencial del punto.

  - id: at
    symbol: a_t
    nombre: aceleracion_tangencial
    unidad_si: m/s^2
    descripcion: Aceleración lineal tangencial.

  - id: an
    symbol: a_n
    nombre: aceleracion_normal
    unidad_si: m/s^2
    descripcion: Aceleración normal (centrípeta).
