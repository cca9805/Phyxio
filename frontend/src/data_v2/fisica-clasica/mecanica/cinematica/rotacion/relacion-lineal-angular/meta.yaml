objetivos:
  - Convertir entre arco s y ángulo θ usando s = r·θ.
  - Relacionar v con ω y a_t con α en un giro alrededor de un eje fijo.
  - Distinguir aceleración tangencial y normal (centrípeta).
  - Interpretar cuándo una fórmula es vectorial/descriptiva y por qué no es calculable en el motor.
conceptos_clave:
  - Radián como unidad natural: s = r·θ.
  - v_t = ω·r (tangencial).
  - a_t = α·r (tangencial).
  - a_n = ω²·r (normal, centrípeta).
  - Vectorial: v = ω×r y a = α×r + ω×(ω×r).
