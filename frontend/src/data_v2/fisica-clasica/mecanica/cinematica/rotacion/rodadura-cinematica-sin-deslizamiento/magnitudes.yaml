version: 1

magnitudes:
  - id: R
    symbol: R
    nombre: radio
    unidad_si: m
    descripcion: Radio de la rueda/cilindro.

  - id: x
    symbol: x
    nombre: desplazamiento_lineal
    unidad_si: m
    descripcion: Avance del centro de masas sobre el suelo.

  - id: s
    symbol: s
    nombre: longitud_arco
    unidad_si: m
    descripcion: Longitud recorrida por el borde sobre el suelo (en rodadura pura coincide con x).

  - id: theta
    symbol: "\\theta"
    nombre: posicion_angular
    unidad_si: rad
    descripcion: Ángulo girado.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Aceleración angular.

  - id: vcm
    symbol: v_{cm}
    nombre: velocidad_centro_masas
    unidad_si: m/s
    descripcion: Velocidad de traslación del centro de masas.

  - id: acm
    symbol: a_{cm}
    nombre: aceleracion_centro_masas
    unidad_si: m/s^2
    descripcion: Aceleración lineal del centro de masas.

  - id: vtop
    symbol: v_{arriba}
    nombre: velocidad_punto_superior
    unidad_si: m/s
    descripcion: Velocidad del punto superior del borde respecto al suelo (rodadura pura).

  - id: vcontact
    symbol: v_{contacto}
    nombre: velocidad_punto_contacto
    unidad_si: m/s
    descripcion: Velocidad del punto de contacto respecto al suelo (rodadura pura 0).

  - id: vslip
    symbol: v_{slip}
    nombre: velocidad_deslizamiento
    unidad_si: m/s
    descripcion: Velocidad relativa en el contacto (si no hay rodadura pura).
