objetivos:
  - Entender la condición “sin deslizamiento” y qué significa físicamente.
  - Usar v_cm = ωR y a_cm = αR para convertir traslación↔rotación.
  - Analizar velocidades de puntos de la rueda: contacto (0), centro (v), parte superior (2v).
  - Distinguir rodadura pura de deslizamiento (slip) y saber qué ecuación deja de valer.
conceptos_clave:
  - Condición de no deslizamiento: v_contacto = 0 (instantáneo).
  - v_cm = ωR y x = Rθ (si rueda sobre línea recta).
  - Velocidad de un punto: v = v_cm + ω×r (vectorial).
  - Para rodadura pura: v_arriba = 2v_cm y v_abajo = 0.
