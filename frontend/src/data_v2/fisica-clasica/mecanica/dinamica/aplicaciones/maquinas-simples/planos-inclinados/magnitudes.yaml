version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Cantidad de materia del bloque.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Intensidad local del campo gravitatorio.
  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Inclinacion del plano respecto a horizontal.
  - id: W_par
    symbol: W_{\parallel}
    nombre: componente_paralela_del_peso
    unidad_si: N
    descripcion: Componente del peso que tiende a deslizar el bloque.
  - id: W_perp
    symbol: W_{\perp}
    nombre: componente_perpendicular_del_peso
    unidad_si: N
    descripcion: Componente del peso que comprime el bloque contra el plano.
  - id: N
    symbol: N
    nombre: normal
    unidad_si: N
    descripcion: Reaccion del plano sobre el bloque.
  - id: mu
    symbol: \mu
    nombre: coeficiente_rozamiento
    unidad_si: "1"
    descripcion: Parametro de contacto que controla la intensidad del rozamiento.
  - id: f
    symbol: f
    nombre: fuerza_rozamiento
    unidad_si: N
    descripcion: Fuerza opuesta al movimiento relativo.
  - id: F_net
    symbol: F_{net}
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Resultado de fuerzas sobre el eje del plano.
  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Variacion temporal de la velocidad del bloque.
