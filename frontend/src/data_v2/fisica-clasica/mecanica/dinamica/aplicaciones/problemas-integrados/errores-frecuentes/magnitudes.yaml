version: 1

magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo analizado.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad.

  - id: theta
    symbol: "\\theta"
    nombre: angulo
    unidad_si: rad
    descripcion: Angulo del sistema respecto al eje de referencia.

  - id: mu
    symbol: "\\mu"
    nombre: coeficiente_de_rozamiento
    unidad_si: "1"
    descripcion: Coeficiente de rozamiento usado en el modelo.

  - id: F
    symbol: F
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza externa aplicada.

  - id: F_net
    symbol: "F_{net}"
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Fuerza resultante en el eje de movimiento.

  - id: a_ok
    symbol: "a_{ok}"
    nombre: aceleracion_correcta
    unidad_si: m/s^2
    descripcion: Resultado con modelo correcto.

  - id: a_err
    symbol: "a_{err}"
    nombre: aceleracion_erronea
    unidad_si: m/s^2
    descripcion: Resultado con un error tipico.

  - id: e_abs
    symbol: "e_{abs}"
    nombre: error_absoluto
    unidad_si: m/s^2
    descripcion: Diferencia absoluta entre resultado correcto y erroneo.

  - id: e_rel
    symbol: "e_{rel}"
    nombre: error_relativo
    unidad_si: "1"
    descripcion: Error relativo respecto al valor correcto.
