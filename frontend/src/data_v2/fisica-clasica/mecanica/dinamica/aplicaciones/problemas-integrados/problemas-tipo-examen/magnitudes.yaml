version: 1

magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo principal del problema.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad.

  - id: theta
    symbol: "\\theta"
    nombre: angulo
    unidad_si: rad
    descripcion: Angulo del plano inclinado o de aplicacion de la fuerza.

  - id: mu
    symbol: "\\mu"
    nombre: coeficiente_de_rozamiento
    unidad_si: "1"
    descripcion: Coeficiente de rozamiento del contacto.

  - id: F
    symbol: F
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza externa aplicada sobre el sistema.

  - id: N
    symbol: N
    nombre: normal
    unidad_si: N
    descripcion: Reaccion normal del plano.

  - id: f
    symbol: f
    nombre: fuerza_de_rozamiento
    unidad_si: N
    descripcion: Fuerza de rozamiento en el eje tangencial.

  - id: F_par
    symbol: "F_{\\parallel}"
    nombre: componente_paralela_del_peso
    unidad_si: N
    descripcion: Componente del peso paralela al plano.

  - id: F_net
    symbol: "F_{net}"
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Resultante en el eje del movimiento.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion lineal del sistema.

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de evolucion.

  - id: v0
    symbol: "v_0"
    nombre: velocidad_inicial
    unidad_si: m/s
    descripcion: Velocidad inicial en el eje de estudio.

  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad en el instante considerado.

  - id: x0
    symbol: "x_0"
    nombre: posicion_inicial
    unidad_si: m
    descripcion: Posicion inicial.

  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Posicion final o desplazamiento segun contexto.

  - id: W
    symbol: W
    nombre: trabajo
    unidad_si: J
    descripcion: Trabajo mecanico asociado al proceso.
