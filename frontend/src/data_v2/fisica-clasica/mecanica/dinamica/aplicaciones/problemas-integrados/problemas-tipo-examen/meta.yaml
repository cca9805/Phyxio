objetivos:
  - Traducir enunciados a un modelo fisico con ejes y fuerzas.
  - Plantear sistema de ecuaciones de Newton de forma ordenada.
  - Resolver magnitudes objetivo y validar unidades y signos.
  - Estimar sensibilidad ante cambios de parametros.
  - Evitar errores tipicos de examen bajo tiempo limitado.

suposiciones:
  - Sistemas mecanicos clasicos en regimen no relativista.
  - Modelos ideales o semi-ideales segun datos del enunciado.
  - Se explicita cuando hay rozamiento, poleas o rodadura.

