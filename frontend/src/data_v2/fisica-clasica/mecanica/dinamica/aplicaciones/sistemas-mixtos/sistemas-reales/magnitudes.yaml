version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Inercia lineal del conjunto movil.
  - id: F_ap
    symbol: F_{ap}
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza total de entrada al sistema.
  - id: F_loss
    symbol: F_{loss}
    nombre: fuerza_de_perdidas
    unidad_si: N
    descripcion: Perdidas mecanicas agregadas por friccion y resistencias.
  - id: F_loss_max
    symbol: F_{loss,max}
    nombre: perdida_maxima
    unidad_si: N
    descripcion: Valor maximo usado para analisis parametricos.
  - id: F_net
    symbol: F_{net}
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Fuerza util disponible para acelerar.
  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion real del sistema con perdidas.
  - id: P_in
    symbol: P_{in}
    nombre: potencia_entrada
    unidad_si: W
    descripcion: Potencia suministrada por la fuente.
  - id: P_out
    symbol: P_{out}
    nombre: potencia_salida
    unidad_si: W
    descripcion: Potencia util entregada.
  - id: eta
    symbol: \eta
    nombre: eficiencia
    unidad_si: "1"
    descripcion: Fraccion de entrada convertida en salida util.
