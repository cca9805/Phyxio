version: 1
topic:
  id: traslacion-y-rotacion
  title: Traslacion Y Rotacion
variables:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo rigido.
  - id: R
    symbol: R
    nombre: radio
    unidad_si: m
    descripcion: Radio caracteristico del cuerpo.
  - id: I
    symbol: I
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Inercia rotacional respecto al eje de giro.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular instantanea.
  - id: v
    symbol: v
    nombre: velocidad_lineal
    unidad_si: m/s
    descripcion: Velocidad del centro de masas.
  - id: Kt
    symbol: K_t
    nombre: energia_traslacional
    unidad_si: J
    descripcion: Energia cinetica de traslacion.
  - id: Kr
    symbol: K_r
    nombre: energia_rotacional
    unidad_si: J
    descripcion: Energia cinetica de rotacion.
  - id: K
    symbol: K
    nombre: energia_total
    unidad_si: J
    descripcion: Suma de energias cineticas.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Aceleracion angular.
  - id: a
    symbol: a
    nombre: aceleracion_lineal
    unidad_si: m/s^2
    descripcion: Aceleracion lineal del centro de masas.
formulas:
  - id: acoplamiento_velocidad
    title: Relacion lineal-angular
    equation: v = omega*R
    latex: v=\omega R
    rearrangements:
      - target: v
        equation: v = omega*R
        latex: v=\omega R
      - target: omega
        equation: omega = v/R
        latex: \omega=\frac{v}{R}
      - target: R
        equation: R = v/omega
        latex: R=\frac{v}{\omega}
    constraints:
      - expr: R > 0
        message: R debe ser positivo.
  - id: acoplamiento_aceleracion
    title: Relacion de aceleraciones
    equation: a = alpha*R
    latex: a=\alpha R
    rearrangements:
      - target: a
        equation: a = alpha*R
        latex: a=\alpha R
      - target: alpha
        equation: alpha = a/R
        latex: \alpha=\frac{a}{R}
      - target: R
        equation: R = a/alpha
        latex: R=\frac{a}{\alpha}
  - id: energia_traslacional
    title: Energia cinetica traslacional
    equation: Kt = 0.5*m*v^2
    latex: K_t=\frac{1}{2}mv^2
    rearrangements:
      - target: Kt
        equation: Kt = 0.5*m*v^2
        latex: K_t=\frac{1}{2}mv^2
      - target: m
        equation: m = 2*Kt/(v^2)
        latex: m=\frac{2K_t}{v^2}
      - target: v
        equation: v = sqrt(2*Kt/m)
        latex: v=\sqrt{\frac{2K_t}{m}}
  - id: energia_rotacional
    title: Energia cinetica rotacional
    equation: Kr = 0.5*I*omega^2
    latex: K_r=\frac{1}{2}I\omega^2
    rearrangements:
      - target: Kr
        equation: Kr = 0.5*I*omega^2
        latex: K_r=\frac{1}{2}I\omega^2
      - target: I
        equation: I = 2*Kr/(omega^2)
        latex: I=\frac{2K_r}{\omega^2}
      - target: omega
        equation: omega = sqrt(2*Kr/I)
        latex: \omega=\sqrt{\frac{2K_r}{I}}
  - id: energia_total
    title: Energia total
    equation: K = Kt + Kr
    latex: K=K_t+K_r
    rearrangements:
      - target: K
        equation: K = Kt + Kr
        latex: K=K_t+K_r
      - target: Kt
        equation: Kt = K - Kr
        latex: K_t=K-K_r
      - target: Kr
        equation: Kr = K - Kt
        latex: K_r=K-K_t
  - id: dinamica_conceptual
    title: Ecuaciones de dinamica acoplada (conceptual)
    equation: F_net = m*a
    latex: F_{net}=ma,\quad \tau_{net}=I\alpha
    calculable: false
    motivo_no_calculable: Requiere conocer fuerzas y torques concretos del sistema para cerrar el modelo en un caso particular.
ui:
  default_formula: acoplamiento_velocidad
  groups:
    - title: Calculables
      items:
        - acoplamiento_velocidad
        - acoplamiento_aceleracion
        - energia_traslacional
        - energia_rotacional
        - energia_total
    - title: Conceptuales
      items:
        - dinamica_conceptual
