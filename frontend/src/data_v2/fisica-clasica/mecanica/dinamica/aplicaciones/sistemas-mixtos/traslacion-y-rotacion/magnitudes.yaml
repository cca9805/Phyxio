version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Inercia lineal del cuerpo.
  - id: R
    symbol: R
    nombre: radio
    unidad_si: m
    descripcion: Escala geometrica de acoplamiento lineal-angular.
  - id: I
    symbol: I
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Resistencia al cambio de estado de giro.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Ritmo de rotacion del cuerpo.
  - id: v
    symbol: v
    nombre: velocidad_lineal
    unidad_si: m/s
    descripcion: Rapidez de traslacion del centro de masas.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Tasa de cambio de la velocidad angular.
  - id: a
    symbol: a
    nombre: aceleracion_lineal
    unidad_si: m/s^2
    descripcion: Tasa de cambio de la velocidad lineal.
  - id: Kt
    symbol: K_t
    nombre: energia_traslacional
    unidad_si: J
    descripcion: Energia cinetica por movimiento lineal.
  - id: Kr
    symbol: K_r
    nombre: energia_rotacional
    unidad_si: J
    descripcion: Energia cinetica por giro.
  - id: K
    symbol: K
    nombre: energia_total
    unidad_si: J
    descripcion: Energia cinetica total del sistema mixto.
