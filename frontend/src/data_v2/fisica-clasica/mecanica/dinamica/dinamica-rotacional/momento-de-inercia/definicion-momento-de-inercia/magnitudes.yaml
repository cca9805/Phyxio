version: 1
magnitudes:
  - id: I
    symbol: I
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Resistencia rotacional respecto a un eje concreto.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa total o masa puntual del sistema.
  - id: r
    symbol: r
    nombre: distancia_al_eje
    unidad_si: m
    descripcion: Distancia perpendicular de la masa al eje.
  - id: tau
    symbol: \tau
    nombre: torque_neto
    unidad_si: N*m
    descripcion: Causa dinamica del cambio de estado angular.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Respuesta angular bajo torque neto.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Rapidez de giro instantanea.
  - id: Krot
    symbol: K_{rot}
    nombre: energia_cinetica_rotacional
    unidad_si: J
    descripcion: Energia asociada al movimiento de rotacion.
