version: 1
magnitudes:
  - id: I
    symbol: I
    nombre: momento_eje_desplazado
    unidad_si: kg*m^2
    descripcion: Momento de inercia respecto al eje desplazado.
  - id: Icm
    symbol: I_{cm}
    nombre: momento_centro_de_masas
    unidad_si: kg*m^2
    descripcion: Momento respecto al eje por centro de masas.
  - id: m
    symbol: m
    nombre: masa_total
    unidad_si: kg
    descripcion: Masa total.
  - id: d
    symbol: d
    nombre: distancia_entre_ejes
    unidad_si: m
    descripcion: Separacion perpendicular de ejes.
  - id: tau
    symbol: \tau
    nombre: torque_neto
    unidad_si: N*m
    descripcion: Torque neto aplicado sobre el eje desplazado.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Respuesta angular del sistema.
