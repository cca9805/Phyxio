version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_lineal
    unidad_si: m/s
    descripcion: Velocidad del centro de masas.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular del cuerpo.
  - id: R
    symbol: R
    nombre: radio
    unidad_si: m
    descripcion: Radio efectivo de rodadura.
  - id: v_contacto
    symbol: v_{contacto}
    nombre: velocidad_punto_contacto
    unidad_si: m/s
    descripcion: Velocidad del punto de contacto respecto al suelo.
  - id: a
    symbol: a
    nombre: aceleracion_lineal
    unidad_si: m/s^2
    descripcion: Aceleracion del centro de masas.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Aceleracion angular.
  - id: delta
    symbol: \Delta
    nombre: desviacion_rodadura
    unidad_si: m/s
    descripcion: Diferencia entre v y omega por R.
