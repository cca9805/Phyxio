version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_lineal
    unidad_si: m/s
    descripcion: Velocidad del centro de masas.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular.
  - id: R
    symbol: R
    nombre: radio
    unidad_si: m
    descripcion: Radio efectivo de rodadura.
  - id: delta
    symbol: \Delta
    nombre: desviacion_rodadura
    unidad_si: m/s
    descripcion: Diferencia entre dato lineal y modelo omega por R.
  - id: n
    symbol: n
    nombre: velocidad_rpm
    unidad_si: rpm
    descripcion: Velocidad de giro expresada en revoluciones por minuto.
