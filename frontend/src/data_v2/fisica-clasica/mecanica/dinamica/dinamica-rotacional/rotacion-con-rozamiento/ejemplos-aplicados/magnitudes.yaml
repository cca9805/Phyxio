version: 1

magnitudes:
  - id: tau_ap
    symbol: "\\tau_{ap}"
    nombre: torque_aplicado
    unidad_si: N*m
    descripcion: Torque motor o impulsor.

  - id: tau_roz
    symbol: "\\tau_{roz}"
    nombre: torque_resistente
    unidad_si: N*m
    descripcion: Torque que se opone al giro.

  - id: sum_tau
    symbol: "\\sum\\tau"
    nombre: torque_neto
    unidad_si: N*m
    descripcion: Resultado algebraico de torques respecto al eje.

  - id: I
    symbol: "I"
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Inercia rotacional del sistema.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Tasa de cambio de velocidad angular.

  - id: omega0
    symbol: "\\omega_0"
    nombre: velocidad_angular_inicial
    unidad_si: rad/s
    descripcion: Velocidad angular al inicio del intervalo.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular en el instante analizado.

  - id: t
    symbol: "t"
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de evolucion.

  - id: t_stop
    symbol: "t_{parada}"
    nombre: tiempo_de_parada
    unidad_si: s
    descripcion: Tiempo necesario para alcanzar omega igual a cero en frenado.

  - id: P
    symbol: "P"
    nombre: potencia_rotacional
    unidad_si: W
    descripcion: Potencia mecanica asociada a torque y velocidad angular.
