descripcion_corta: >
  Aplicacion guiada de la dinamica rotacional con torque resistente. Se modela
  torque neto, aceleracion angular y evolucion temporal de la velocidad angular,
  con interpretacion fisica de aceleracion, frenado y regimen.

tags:
  - rotacion
  - rozamiento
  - torque-neto
  - aceleracion-angular
  - ejemplos

objetivos:
  - Plantear torque neto separando aporte motor y aporte resistente.
  - Resolver alpha con signos consistentes.
  - Calcular evolucion de omega en casos de alpha aproximadamente constante.
  - Interpretar cuando el sistema acelera, frena o entra en regimen.
  - Validar resultados por unidades y orden de magnitud.

suposiciones:
  - Eje fijo y cuerpo rigido.
  - Los torques se expresan respecto al mismo eje.
  - En modelos basicos, tau_roz se aproxima constante por tramos.
  - Convencion de signo explicita y mantenida.

