version: 1

magnitudes:
  - id: tau
    symbol: "\\tau"
    nombre: torque
    unidad_si: N*m
    descripcion: Causa dinamica del cambio de estado de giro.

  - id: I
    symbol: "I"
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Resistencia inercial al cambio de velocidad angular.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Respuesta angular ante torque neto.

  - id: F
    symbol: "F"
    nombre: fuerza
    unidad_si: N
    descripcion: Causa dinamica en traslacion.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Resistencia inercial traslacional.

  - id: a
    symbol: "a"
    nombre: aceleracion_lineal
    unidad_si: m/s^2
    descripcion: Respuesta lineal ante fuerza neta.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Tasa de cambio angular temporal.

  - id: v
    symbol: "v"
    nombre: velocidad_lineal
    unidad_si: m/s
    descripcion: Rapidez lineal asociada al movimiento.

  - id: r
    symbol: "r"
    nombre: radio
    unidad_si: m
    descripcion: Distancia al eje en movimiento circular.

  - id: at
    symbol: "a_t"
    nombre: aceleracion_tangencial
    unidad_si: m/s^2
    descripcion: Componente tangencial de aceleracion lineal.
