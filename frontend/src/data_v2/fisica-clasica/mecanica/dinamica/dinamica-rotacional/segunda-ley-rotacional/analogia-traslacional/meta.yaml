descripcion_corta: >
  Puente conceptual entre la dinamica lineal y la dinamica angular: F igual m por a
  frente a tau igual I por alpha. Este subtema evita memorizar formulas aisladas y
  entrena lectura fisica por analogia estructural.

tags:
  - dinamica
  - rotacion
  - analogia
  - newton
  - torque

objetivos:
  - Mapear correctamente magnitudes lineales y angulares equivalentes.
  - Interpretar por que I juega el papel de "masa rotacional".
  - Entender limites de la analogia y evitar extrapolaciones incorrectas.
  - Transferir criterio de resolucion desde F igual m por a a tau igual I por alpha.

suposiciones:
  - Sistema de referencia inercial.
  - Eje de analisis bien definido.
  - Modelos de cuerpo rigido en regimen clasico.

