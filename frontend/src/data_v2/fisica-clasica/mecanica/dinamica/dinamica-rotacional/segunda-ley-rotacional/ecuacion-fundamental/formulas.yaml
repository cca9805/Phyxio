version: 1
topic:
  id: ecuacion-fundamental
  title: Ecuacion fundamental de la dinamica rotacional

variables:
  - id: sum_tau
    symbol: \sum\tau
    nombre: torque_neto
    unidad_si: N*m
    descripcion: Torque neto respecto al eje.
  - id: I
    symbol: I
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Momento de inercia respecto al mismo eje.
  - id: alpha
    symbol: \alpha
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Aceleracion angular.
  - id: tau1
    symbol: \tau_1
    nombre: torque_1
    unidad_si: N*m
    descripcion: Primera contribucion de torque.
  - id: tau2
    symbol: \tau_2
    nombre: torque_2
    unidad_si: N*m
    descripcion: Segunda contribucion de torque.
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.

formulas:
  - id: ecuacion_fundamental_rotacional
    title: Ecuacion fundamental
    equation: sum_tau = I*alpha
    latex: \sum\tau = I\,\alpha
    rearrangements:
      - target: sum_tau
        equation: sum_tau = I*alpha
        latex: \sum\tau = I\,\alpha
      - target: I
        equation: I = sum_tau/alpha
        latex: I = \frac{\sum\tau}{\alpha}
      - target: alpha
        equation: alpha = sum_tau/I
        latex: \alpha = \frac{\sum\tau}{I}
    constraints:
      - expr: I > 0
        message: I debe ser positiva.
      - expr: alpha != 0
        message: Si despejas I, alpha no puede ser 0.
    notes:
      - Torque e inercia deben referirse al mismo eje.
    status: calculable

  - id: torque_neto_dos_aportes
    title: Torque neto con dos contribuciones
    equation: sum_tau = tau1 + tau2
    latex: \sum\tau = \tau_1 + \tau_2
    rearrangements:
      - target: sum_tau
        equation: sum_tau = tau1 + tau2
        latex: \sum\tau = \tau_1 + \tau_2
      - target: tau1
        equation: tau1 = sum_tau - tau2
        latex: \tau_1 = \sum\tau - \tau_2
      - target: tau2
        equation: tau2 = sum_tau - tau1
        latex: \tau_2 = \sum\tau - \tau_1
    status: calculable

  - id: evolucion_omega_con_alpha_constante
    title: Evolucion de velocidad angular (alpha constante)
    equation: omega = alpha*t
    latex: \omega = \omega_0 + \alpha t
    status: conceptual
    notes:
      - En esta vista no se calcula por falta de variable omega_0 en la lista operativa.
      - Se incluye como enlace con cinematica angular.

  - id: condicion_equilibrio_rotacional
    title: Condicion de equilibrio rotacional
    equation: sum_tau = 0
    latex: \sum\tau = 0
    status: conceptual
    notes:
      - Formula de criterio fisico para identificar alpha nula.

ui:
  default_formula: ecuacion_fundamental_rotacional
  groups:
    - title: Calculables
      items:
        - ecuacion_fundamental_rotacional
        - torque_neto_dos_aportes
    - title: Conceptuales
      items:
        - evolucion_omega_con_alpha_constante
        - condicion_equilibrio_rotacional
