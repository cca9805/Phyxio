version: 1

magnitudes:
  - id: sum_tau
    symbol: "\\sum\\tau"
    nombre: torque_neto
    unidad_si: N*m
    descripcion: Suma algebraica de torques respecto al eje elegido.

  - id: I
    symbol: "I"
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Resistencia inercial al cambio de estado de giro.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Respuesta angular frente al torque neto.

  - id: tau1
    symbol: "\\tau_1"
    nombre: torque_1
    unidad_si: N*m
    descripcion: Primera contribucion de torque.

  - id: tau2
    symbol: "\\tau_2"
    nombre: torque_2
    unidad_si: N*m
    descripcion: Segunda contribucion de torque.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular instantanea.

  - id: L
    symbol: "L"
    nombre: momento_angular
    unidad_si: kg*m^2/s
    descripcion: Momento angular del sistema.

  - id: t
    symbol: "t"
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de evolucion del sistema.
