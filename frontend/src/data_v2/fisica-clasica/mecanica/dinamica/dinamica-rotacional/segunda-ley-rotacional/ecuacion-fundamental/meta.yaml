objetivos:
  - Plantear correctamente sumatoria de torques con signos consistentes.
  - Resolver alpha, I o torque neto por despeje operativo.
  - Identificar casos de equilibrio rotacional y movimiento con omega constante.
  - Evitar errores de eje al combinar torque e inercia.

suposiciones:
  - Eje de referencia fijo y explicitamente definido.
  - Cuerpo rigido o modelo equivalente con I conocida o calculable.
  - Regimen clasico sin efectos relativistas.

