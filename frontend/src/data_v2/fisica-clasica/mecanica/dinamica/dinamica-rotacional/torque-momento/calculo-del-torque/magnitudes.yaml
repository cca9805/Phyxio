version: 1

magnitudes:
  - id: tau
    symbol: "\\tau"
    nombre: torque
    unidad_si: N*m
    descripcion: Momento de una fuerza respecto al eje analizado.

  - id: F
    symbol: "F"
    nombre: fuerza
    unidad_si: N
    descripcion: Fuerza aplicada.

  - id: d
    symbol: "d"
    nombre: brazo_perpendicular
    unidad_si: m
    descripcion: Distancia perpendicular a la linea de accion.

  - id: r
    symbol: "r"
    nombre: distancia_al_eje
    unidad_si: m
    descripcion: Distancia del eje al punto de aplicacion.

  - id: theta
    symbol: "\\theta"
    nombre: angulo_entre_r_y_F
    unidad_si: rad
    descripcion: Angulo entre r y F para la forma angular.

  - id: rx
    symbol: "r_x"
    nombre: componente_x_de_r
    unidad_si: m
    descripcion: Componente x del vector posicion.

  - id: ry
    symbol: "r_y"
    nombre: componente_y_de_r
    unidad_si: m
    descripcion: Componente y del vector posicion.

  - id: Fx
    symbol: "F_x"
    nombre: componente_x_de_F
    unidad_si: N
    descripcion: Componente x de la fuerza.

  - id: Fy
    symbol: "F_y"
    nombre: componente_y_de_F
    unidad_si: N
    descripcion: Componente y de la fuerza.

  - id: tauz
    symbol: "\\tau_z"
    nombre: torque_en_z
    unidad_si: N*m
    descripcion: Componente perpendicular al plano en 2D.
