descripcion_corta: >
  Metodo operativo para calcular torques por brazo perpendicular, por angulo y por
  componentes en 2D. Incluye criterio de signo, chequeo de unidades y seleccion de
  ecuacion segun el tipo de datos del problema.

tags:
  - torque
  - momento
  - calculo
  - componentes
  - dinamica-rotacional

objetivos:
  - Elegir la forma correcta de calculo de torque segun los datos disponibles.
  - Resolver despejes de tau, F, d, r, theta y componentes.
  - Aplicar criterio de signo en problemas con varias fuerzas.
  - Validar resultados con unidades y orden de magnitud.

suposiciones:
  - Se define eje de referencia y convencion de signo antes del calculo.
  - En trigonometria se trabaja en radianes.
  - En 2D se interpreta tau_z como perpendicular al plano.

