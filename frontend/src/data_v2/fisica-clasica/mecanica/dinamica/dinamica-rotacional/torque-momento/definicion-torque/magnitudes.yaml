version: 1

magnitudes:
  - id: tau
    symbol: "\\tau"
    nombre: torque
    unidad_si: N*m
    descripcion: Momento de una fuerza respecto a un eje o punto.

  - id: F
    symbol: "F"
    nombre: fuerza
    unidad_si: N
    descripcion: Fuerza aplicada.

  - id: d
    symbol: "d"
    nombre: brazo_perpendicular
    unidad_si: m
    descripcion: Distancia perpendicular entre el eje y la linea de accion.

  - id: r
    symbol: "r"
    nombre: distancia_al_eje
    unidad_si: m
    descripcion: Distancia entre eje y punto de aplicacion.

  - id: theta
    symbol: "\\theta"
    nombre: angulo_entre_r_y_F
    unidad_si: rad
    descripcion: Angulo entre vector posicion y fuerza.

  - id: tauz
    symbol: "\\tau_z"
    nombre: torque_en_z
    unidad_si: N*m
    descripcion: Componente de torque perpendicular al plano en problemas 2D.

  - id: I
    symbol: "I"
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Resistencia al cambio de estado de giro.

  - id: alpha
    symbol: "\\alpha"
    nombre: aceleracion_angular
    unidad_si: rad/s^2
    descripcion: Tasa de cambio de velocidad angular.
