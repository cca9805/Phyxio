descripcion_corta: >
  El torque cuantifica el efecto de giro de una fuerza respecto a un eje o punto.
  Este subtema fija la base conceptual, vectorial y fisica para interpretar correctamente
  cuando una fuerza produce rotacion y cuando no.

tags:
  - torque
  - momento
  - dinamica-rotacional
  - fuerzas
  - vectorial

objetivos:
  - Entender que el torque mide efecto rotacional, no fuerza adicional.
  - Diferenciar vector torque, modulo y signo en 2D.
  - Relacionar las expresiones tau = F*d y tau = r*F*sin(theta).
  - Identificar rapidamente fuerzas con torque nulo.
  - Preparar la base para el calculo operativo de torques.

suposiciones:
  - Se define explicitamente el eje o punto de referencia.
  - Se usa convencion de signo consistente (2D) o regla de la mano derecha (3D).
  - Se idealizan fuerzas y cuerpos para construir el modelo inicial.

