version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del bloque.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad.
  - id: theta
    symbol: \theta
    nombre: angulo_inclinacion
    unidad_si: rad
    descripcion: Angulo del plano.
  - id: N
    symbol: N
    nombre: normal
    unidad_si: N
    descripcion: Reaccion perpendicular del plano.
  - id: mu_s
    symbol: \mu_s
    nombre: coeficiente_estatico
    unidad_si: "-"
    descripcion: Coeficiente de rozamiento estatico.
  - id: mu_k
    symbol: \mu_k
    nombre: coeficiente_cinetico
    unidad_si: "-"
    descripcion: Coeficiente de rozamiento cinetico.
  - id: fs_max
    symbol: f_{s,\max}
    nombre: rozamiento_estatico_maximo
    unidad_si: N
    descripcion: Valor maximo de friccion estatica.
  - id: fk
    symbol: f_k
    nombre: rozamiento_cinetico
    unidad_si: N
    descripcion: Friccion durante deslizamiento.
  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion sobre el eje del plano.
