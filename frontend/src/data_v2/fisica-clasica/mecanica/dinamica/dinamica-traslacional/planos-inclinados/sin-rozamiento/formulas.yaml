version: 1
topic:
  id: sin-rozamiento
  title: Sin Rozamiento
variables:
  - id: m
    symbol: m
    name: masa
    si_unit: kg
  - id: g
    symbol: g
    name: gravedad
    si_unit: m/s^2
  - id: theta
    symbol: \theta
    name: angulo
    si_unit: rad
  - id: a
    symbol: a
    name: aceleracion
    si_unit: m/s^2
  - id: N
    symbol: N
    name: normal
    si_unit: N
  - id: Ppar
    symbol: P_{\parallel}
    name: componente_paralela_peso
    si_unit: N
  - id: Pperp
    symbol: P_{\perp}
    name: componente_perpendicular_peso
    si_unit: N
formulas:
  - id: componente_paralela
    title: Componente paralela del peso
    equation: Ppar = m*g*sin(theta)
    latex: P_{\parallel}=mg\sin\theta
    rearrangements:
      - target: Ppar
        equation: Ppar = m*g*sin(theta)
        latex: P_{\parallel}=mg\sin\theta

  - id: componente_perpendicular
    title: Componente perpendicular del peso
    equation: Pperp = m*g*cos(theta)
    latex: P_{\perp}=mg\cos\theta
    rearrangements:
      - target: Pperp
        equation: Pperp = m*g*cos(theta)
        latex: P_{\perp}=mg\cos\theta

  - id: normal
    title: Equilibrio perpendicular al plano
    equation: N = m*g*cos(theta)
    latex: N=mg\cos\theta
    rearrangements:
      - target: N
        equation: N = m*g*cos(theta)
        latex: N=mg\cos\theta
      - target: theta
        equation: theta = acos(N/(m*g))
        latex: \theta=\arccos\left(\frac{N}{mg}\right)

  - id: aceleracion
    title: Aceleracion sobre el plano
    equation: a = g*sin(theta)
    latex: a=g\sin\theta
    rearrangements:
      - target: a
        equation: a = g*sin(theta)
        latex: a=g\sin\theta
      - target: theta
        equation: theta = asin(a/g)
        latex: \theta=\arcsin\left(\frac{a}{g}\right)

ui:
  default_formula: aceleracion
  groups:
    - title: Descomposicion y dinamica (calculables)
      items:
        - componente_paralela
        - componente_perpendicular
        - normal
        - aceleracion
