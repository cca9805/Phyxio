version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo en estudio.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad local.

  - id: N
    symbol: N
    nombre: normal
    unidad_si: N
    descripcion: Reaccion normal ejercida por la superficie de contacto.

  - id: F
    symbol: F
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza externa aplicada en el eje dinamico analizado.

  - id: f_s
    symbol: f_s
    nombre: rozamiento_estatico
    unidad_si: N
    descripcion: Friccion estatica que evita el deslizamiento relativo.

  - id: f_s_max
    symbol: f_s_max
    nombre: maximo_rozamiento_estatico
    unidad_si: N
    descripcion: Valor limite del rozamiento estatico antes del arranque.

  - id: f_k
    symbol: f_k
    nombre: rozamiento_cinetico
    unidad_si: N
    descripcion: Friccion cuando existe deslizamiento relativo.

  - id: mu_s
    symbol: \mu_s
    nombre: coeficiente_rozamiento_estatico
    unidad_si: "-"
    descripcion: Parametro adimensional de friccion estatica del par de materiales.

  - id: mu_k
    symbol: \mu_k
    nombre: coeficiente_rozamiento_cinetico
    unidad_si: "-"
    descripcion: Parametro adimensional de friccion cinetica del par de materiales.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion lineal en el eje de movimiento.

  - id: theta
    symbol: \theta
    nombre: angulo_plano
    unidad_si: rad
    descripcion: Inclinacion del plano respecto a la horizontal.

  - id: F_min
    symbol: F_min
    nombre: fuerza_minima_arranque
    unidad_si: N
    descripcion: Fuerza minima necesaria para superar el umbral estatico.

  - id: sumF
    symbol: \sum F
    nombre: suma_fuerzas_eje
    unidad_si: N
    descripcion: Resultante de fuerzas proyectadas en el eje de estudio.

  - id: delta
    symbol: \Delta
    nombre: residuo_newton
    unidad_si: N
    descripcion: Diferencia entre la resultante modelada y el termino inercial ma.
