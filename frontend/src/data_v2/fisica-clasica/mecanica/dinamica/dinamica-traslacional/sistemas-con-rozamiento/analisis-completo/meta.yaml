objetivos:
  - Diferenciar con criterio cuando aplicar rozamiento estatico y cuando cinetico.
  - Resolver sistemas traslacionales con una secuencia estable de pasos.
  - Detectar incoherencias de signo y de hipotesis antes de cerrar resultados.
  - Interpretar el valor de la aceleracion y la fuerza de friccion en contexto real.
suposiciones:
  - Contacto seco con coeficientes de friccion constantes.
  - Superficies rigidas y cuerpos tratados como punto material.
  - Movimiento principalmente unidimensional tras proyectar en ejes.
