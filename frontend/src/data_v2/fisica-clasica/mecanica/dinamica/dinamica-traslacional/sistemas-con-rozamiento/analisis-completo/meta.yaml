descripcion: >
  Metodo integral para resolver sistemas con rozamiento: identificacion del
  regimen estatico o cinetico, planteamiento de DCL, ecuaciones de Newton,
  validacion de hipotesis y lectura fisica del resultado.
descripcion_corta: >
  Procedimiento completo para resolver dinamica con friccion sin errores de signo ni de modelo.
