version: 1
magnitudes:
  - id: m1
    symbol: m_1
    nombre: masa_1
    unidad_si: kg
    descripcion: Masa del primer cuerpo del sistema acoplado.

  - id: m2
    symbol: m_2
    nombre: masa_2
    unidad_si: kg
    descripcion: Masa del segundo cuerpo del sistema acoplado.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad local.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Modulo de aceleracion comun impuesto por la cuerda ideal.

  - id: T
    symbol: T
    nombre: tension
    unidad_si: N
    descripcion: Fuerza interna transmitida por la cuerda.

  - id: F_ext
    symbol: F_ext
    nombre: fuerza_externa_neta
    unidad_si: N
    descripcion: Diferencia de pesos que impulsa el movimiento del conjunto.

  - id: m_tot
    symbol: m_tot
    nombre: masa_total
    unidad_si: kg
    descripcion: Suma de masas del sistema acoplado.
