version: 1
topic:
  id: poleas-compuestas
  title: Poleas Compuestas
variables:
  - id: W
    symbol: W
    name: peso_carga
    si_unit: N
  - id: n
    symbol: n
    name: numero_tramos_soporte
    si_unit: "1"
  - id: F
    symbol: F
    name: fuerza_ideal
    si_unit: N
  - id: T
    symbol: T
    name: tension_ideal
    si_unit: N
  - id: dx_pull
    symbol: \Delta x_{pull}
    name: desplazamiento_tiro
    si_unit: m
  - id: dx_load
    symbol: \Delta x_{load}
    name: desplazamiento_carga
    si_unit: m
  - id: eta
    symbol: \eta
    name: rendimiento
    si_unit: "1"
  - id: F_real
    symbol: F_real
    name: fuerza_real
    si_unit: N
formulas:
  - id: fuerza_ideal
    title: Fuerza ideal de izado
    equation: F = W/n
    latex: F=\frac{W}{n}
    rearrangements:
      - target: F
        equation: F = W/n
        latex: F=\frac{W}{n}
      - target: W
        equation: W = F*n
        latex: W=Fn
      - target: n
        equation: n = W/F
        latex: n=\frac{W}{F}

  - id: tension_ideal
    title: Tension ideal por tramo
    equation: T = W/n
    latex: T=\frac{W}{n}
    rearrangements:
      - target: T
        equation: T = W/n
        latex: T=\frac{W}{n}

  - id: recorrido_polipasto
    title: Relacion de recorridos
    equation: dx_pull = n*dx_load
    latex: \Delta x_{pull}=n\Delta x_{load}
    rearrangements:
      - target: dx_pull
        equation: dx_pull = n*dx_load
        latex: \Delta x_{pull}=n\Delta x_{load}
      - target: dx_load
        equation: dx_load = dx_pull/n
        latex: \Delta x_{load}=\frac{\Delta x_{pull}}{n}

  - id: trabajo_ideal
    title: Balance de trabajo ideal
    equation: F*dx_pull = W*dx_load
    latex: F\Delta x_{pull}=W\Delta x_{load}
    rearrangements:
      - target: F
        equation: F = W*dx_load/dx_pull
        latex: F=\frac{W\Delta x_{load}}{\Delta x_{pull}}

  - id: fuerza_real_rendimiento
    title: Fuerza real con rendimiento
    equation: F_real = W/(eta*n)
    latex: F_{real}=\frac{W}{\eta n}
    rearrangements:
      - target: F_real
        equation: F_real = W/(eta*n)
        latex: F_{real}=\frac{W}{\eta n}
      - target: eta
        equation: eta = W/(n*F_real)
        latex: \eta=\frac{W}{nF_{real}}

  - id: conteo_tramos_conceptual
    title: Conteo de tramos activos (conceptual)
    equation: n = numero_de_tramos_que_sostienen_la_carga
    latex: n=\text{tramos activos de soporte}
    calculable: false
    motivo_no_calculable: Requiere lectura geometrica del montaje concreto, no un despeje algebraico directo.

ui:
  default_formula: fuerza_ideal
  groups:
    - title: Modelo ideal (calculables)
      items:
        - fuerza_ideal
        - tension_ideal
        - recorrido_polipasto
        - trabajo_ideal
    - title: Modelo corregido (calculables)
      items:
        - fuerza_real_rendimiento
    - title: Interpretacion
      items:
        - conteo_tramos_conceptual
