version: 1
magnitudes:
  - id: W
    symbol: W
    nombre: peso_carga
    unidad_si: N
    descripcion: Peso total de la carga levantada.

  - id: n
    symbol: n
    nombre: numero_tramos_soporte
    unidad_si: "-"
    descripcion: Tramos de cuerda que sostienen directamente la carga.

  - id: F
    symbol: F
    nombre: fuerza_ideal
    unidad_si: N
    descripcion: Fuerza teorica requerida en modelo ideal.

  - id: T
    symbol: T
    nombre: tension_ideal
    unidad_si: N
    descripcion: Tension por tramo en modelo ideal.

  - id: dx_pull
    symbol: \Delta x_{pull}
    nombre: desplazamiento_tiro
    unidad_si: m
    descripcion: Recorrido del extremo libre al tirar.

  - id: dx_load
    symbol: \Delta x_{load}
    nombre: desplazamiento_carga
    unidad_si: m
    descripcion: Elevacion vertical de la carga.

  - id: eta
    symbol: \eta
    nombre: rendimiento
    unidad_si: "-"
    descripcion: Eficiencia global del sistema real de poleas.

  - id: F_real
    symbol: F_real
    nombre: fuerza_real
    unidad_si: N
    descripcion: Fuerza requerida cuando se consideran perdidas mecanicas.
