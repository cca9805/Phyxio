version: 1
magnitudes:
  - id: W
    symbol: W
    nombre: peso_carga
    unidad_si: N
    descripcion: Peso total de la carga elevada.

  - id: F
    symbol: F
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza ejercida en el extremo libre de la cuerda.

  - id: T
    symbol: T
    nombre: tension
    unidad_si: N
    descripcion: Tension ideal en cada tramo continuo de cuerda.

  - id: n
    symbol: n
    nombre: numero_tramos_soporte
    unidad_si: "-"
    descripcion: Tramos de cuerda que sostienen directamente la carga.

  - id: dx_pull
    symbol: \Delta x_{pull}
    nombre: desplazamiento_tiro
    unidad_si: m
    descripcion: Distancia recorrida por el extremo del que se tira.

  - id: dx_load
    symbol: \Delta x_{load}
    nombre: desplazamiento_carga
    unidad_si: m
    descripcion: Distancia vertical recorrida por la carga.

  - id: v_pull
    symbol: v_{pull}
    nombre: velocidad_tiro
    unidad_si: m/s
    descripcion: Velocidad del extremo libre de la cuerda.

  - id: v_load
    symbol: v_{load}
    nombre: velocidad_carga
    unidad_si: m/s
    descripcion: Velocidad vertical de la carga.

  - id: a_pull
    symbol: a_{pull}
    nombre: aceleracion_tiro
    unidad_si: m/s^2
    descripcion: Aceleracion del extremo libre.

  - id: a_load
    symbol: a_{load}
    nombre: aceleracion_carga
    unidad_si: m/s^2
    descripcion: Aceleracion vertical de la carga.
