version: 1
topic:
  id: bloque-colgante
  title: Bloque Colgante
variables:
  - id: m
    symbol: m
    name: masa
    si_unit: kg
  - id: g
    symbol: g
    name: gravedad
    si_unit: m/s^2
  - id: T
    symbol: T
    name: tension
    si_unit: N
  - id: a
    symbol: a
    name: aceleracion
    si_unit: m/s^2
  - id: W
    symbol: W
    name: peso
    si_unit: N
formulas:
  - id: segunda_ley_vertical
    title: Segunda ley (convencion abajo positiva)
    equation: m*g - T = m*a
    latex: mg-T=ma
    rearrangements:
      - target: T
        equation: T = m*(g-a)
        latex: T=m(g-a)
      - target: a
        equation: a = g - T/m
        latex: a=g-\frac{T}{m}
      - target: m
        equation: m = T/(g-a)
        latex: m=\frac{T}{g-a}

  - id: equilibrio
    title: Equilibrio vertical
    equation: T = m*g
    latex: T=mg
    rearrangements:
      - target: T
        equation: T = m*g
        latex: T=mg
      - target: m
        equation: m = T/g
        latex: m=\frac{T}{g}

  - id: peso
    title: Definicion de peso
    equation: W = m*g
    latex: W=mg
    rearrangements:
      - target: W
        equation: W = m*g
        latex: W=mg

ui:
  default_formula: segunda_ley_vertical
  groups:
    - title: Relaciones dinamicas (calculables)
      items:
        - segunda_ley_vertical
        - equilibrio
        - peso
