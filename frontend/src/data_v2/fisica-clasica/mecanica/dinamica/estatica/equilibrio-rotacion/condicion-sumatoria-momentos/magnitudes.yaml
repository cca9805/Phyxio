version: 1

magnitudes:
  - id: M
    symbol: M
    nombre: momento
    unidad_si: N*m
    descripcion: Efecto de giro de una fuerza respecto a un eje.

  - id: F
    symbol: F
    nombre: fuerza
    unidad_si: N
    descripcion: Intensidad de la fuerza aplicada.

  - id: d
    symbol: d
    nombre: brazo
    unidad_si: m
    descripcion: Distancia perpendicular desde el eje a la linea de accion.

  - id: P
    symbol: P
    nombre: potencia
    unidad_si: N
    descripcion: Fuerza de esfuerzo en maquinas simples.

  - id: R
    symbol: R
    nombre: resistencia
    unidad_si: N
    descripcion: Carga o fuerza que se quiere equilibrar.

  - id: dP
    symbol: d_P
    nombre: brazo_potencia
    unidad_si: m
    descripcion: Brazo correspondiente a la potencia.

  - id: dR
    symbol: d_R
    nombre: brazo_resistencia
    unidad_si: m
    descripcion: Brazo correspondiente a la resistencia.

  - id: M1
    symbol: M_1
    nombre: momento_1
    unidad_si: N*m
    descripcion: Primer momento considerado en el balance.

  - id: M2
    symbol: M_2
    nombre: momento_2
    unidad_si: N*m
    descripcion: Segundo momento considerado en el balance.