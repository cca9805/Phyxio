version: 1

magnitudes:
  - id: M
    symbol: M
    nombre: momento
    unidad_si: N*m
    descripcion: Medida del efecto de giro de una fuerza.

  - id: F
    symbol: F
    nombre: fuerza
    unidad_si: N
    descripcion: Intensidad de la fuerza aplicada.

  - id: d
    symbol: d
    nombre: brazo_de_palanca
    unidad_si: m
    descripcion: Distancia perpendicular desde el eje a la linea de accion.

  - id: r
    symbol: r
    nombre: distancia_radial
    unidad_si: m
    descripcion: Distancia del eje al punto de aplicacion de la fuerza.

  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Angulo entre el vector radial y la fuerza.