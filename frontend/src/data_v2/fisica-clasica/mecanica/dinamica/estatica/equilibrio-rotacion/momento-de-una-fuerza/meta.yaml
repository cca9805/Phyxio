descripcion_corta: >
  Estudia el efecto de giro de una fuerza respecto a un punto o eje,
  incluyendo brazo de palanca, signo y criterio geometrico de calculo.

tags:
  - estatica
  - rotacion
  - momento
  - torque
  - brazo-de-palanca

objetivos:
  - Entender por que una fuerza produce o no produce giro.
  - Calcular momento con forma escalar y con forma trigonometrica.
  - Aplicar un convenio de signos consistente.
  - Interpretar resultados en problemas reales de palancas y apoyos.

suposiciones:
  - Cuerpo rigido ideal.
  - Eje de referencia fijo durante el analisis.
  - Regimen estatico o cuasiestatico para la interpretacion de equilibrio.

