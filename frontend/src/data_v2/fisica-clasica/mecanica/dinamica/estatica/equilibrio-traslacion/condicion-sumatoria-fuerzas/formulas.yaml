formulas:
- id: equilibrio_vectorial
  title: Equilibrio traslacional (vectorial)
  equation: sumF = 0
  latex: \sum \vec{F} = \vec{0}
  calculable: false
  motivo_no_calculable: Ecuación vectorial de referencia. Use las componentes para cálculos.
- id: equilibrio_componentes
  title: Equilibrio por componentes
  equation: sumFx = 0; sumFy = 0
  latex: \sum F_x = 0,\quad \sum F_y = 0
  calculable: false
  motivo_no_calculable: Condiciones de equilibrio. Use las fórmulas de componentes individuales.
- id: componente_x_fuerza
  title: Componente X de una fuerza
  equation: Fx = F * cos(theta)
  latex: F_x = F \cos(\theta)
  variables:
  - F
  - theta
  rearrangements:
  - target: Fx
    equation: Fx = F * cos(theta)
    latex: F_x = F \cos(\theta)
  - target: F
    equation: F = Fx / cos(theta)
    latex: F = \frac{F_x}{\cos(\theta)}
  - target: theta
    equation: theta = acos(Fx / F)
    latex: \theta = \arccos\left(\frac{F_x}{F}\right)
- id: componente_y_fuerza
  title: Componente Y de una fuerza
  equation: Fy = F * sin(theta)
  latex: F_y = F \sin(\theta)
  variables:
  - F
  - theta
  rearrangements:
  - target: Fy
    equation: Fy = F * sin(theta)
    latex: F_y = F \sin(\theta)
  - target: F
    equation: F = Fy / sin(theta)
    latex: F = \frac{F_y}{\sin(\theta)}
  - target: theta
    equation: theta = asin(Fy / F)
    latex: \theta = \arcsin\left(\frac{F_y}{F}\right)
- id: resultante_componentes
  title: Resultante a partir de componentes
  equation: R = sqrt(Fx^2 + Fy^2)
  latex: R = \sqrt{F_x^2 + F_y^2}
  variables:
  - Fx
  - Fy
  rearrangements:
  - target: R
    equation: R = sqrt(Fx^2 + Fy^2)
    latex: R = \sqrt{F_x^2 + F_y^2}
- id: angulo_resultante
  title: Ángulo de la resultante
  equation: theta = atan2(Fy, Fx)
  latex: \theta = \arctan\left(\frac{F_y}{F_x}\right)
  variables:
  - Fx
  - Fy
  rearrangements:
  - target: theta
    equation: theta = atan2(Fy, Fx)
    latex: \theta = \arctan\left(\frac{F_y}{F_x}\right)
- id: suma_componentes_x
  title: Suma de componentes X
  equation: sumFx = F1x + F2x
  latex: \sum F_x = F_{1x} + F_{2x}
  variables:
  - F1x
  - F2x
  rearrangements:
  - target: sumFx
    equation: sumFx = F1x + F2x
    latex: \sum F_x = F_{1x} + F_{2x}
- id: suma_componentes_y
  title: Suma de componentes Y
  equation: sumFy = F1y + F2y
  latex: \sum F_y = F_{1y} + F_{2y}
  variables:
  - F1y
  - F2y
  rearrangements:
  - target: sumFy
    equation: sumFy = F1y + F2y
    latex: \sum F_y = F_{1y} + F_{2y}
- id: fuerza_equilibrante_x
  title: Componente X de fuerza equilibrante
  equation: F3x = -(F1x + F2x)
  latex: F_{3x} = -(F_{1x} + F_{2x})
  variables:
  - F1x
  - F2x
  rearrangements:
  - target: F3x
    equation: F3x = -(F1x + F2x)
    latex: F_{3x} = -(F_{1x} + F_{2x})
- id: fuerza_equilibrante_y
  title: Componente Y de fuerza equilibrante
  equation: F3y = -(F1y + F2y)
  latex: F_{3y} = -(F_{1y} + F_{2y})
  variables:
  - F1y
  - F2y
  rearrangements:
  - target: F3y
    equation: F3y = -(F1y + F2y)
    latex: F_{3y} = -(F_{1y} + F_{2y})
- id: modulo_fuerza_equilibrante
  title: Módulo de la fuerza equilibrante
  equation: F3 = sqrt(F3x^2 + F3y^2)
  latex: F_3 = \sqrt{F_{3x}^2 + F_{3y}^2}
  variables:
  - F3x
  - F3y
  rearrangements:
  - target: F3
    equation: F3 = sqrt(F3x^2 + F3y^2)
    latex: F_3 = \sqrt{F_{3x}^2 + F_{3y}^2}
