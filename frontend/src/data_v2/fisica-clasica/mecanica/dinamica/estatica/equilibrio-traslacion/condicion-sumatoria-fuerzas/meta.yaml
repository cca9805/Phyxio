descripcion_corta: >
  Equilibrio traslacional: la suma vectorial de fuerzas debe ser cero.
  Condiciones escalares: sumatoria Fx = 0 y sumatoria Fy = 0.
  Interpretacion geometrica y resolucion.

tags:
  - estatica
  - equilibrio
  - traslacion
  - sumatoria
  - fuerzas
  - dcl

objetivos:
  - Comprender el criterio sumatoria F = 0 como condicion de equilibrio traslacional.
  - Pasar de sumatoria F = 0 a las ecuaciones sumatoria Fx = 0 y sumatoria Fy = 0.
  - Resolver fuerzas desconocidas usando componentes y signos.
  - Interpretar el equilibrio como poligono de fuerzas cerrado.

suposiciones:
  - Sistema de referencia inercial.
  - Cuerpo en reposo o con velocidad constante (a = 0).
  - Fuerzas consideradas concurrentes (para este tema basico).

tiempo_estimado_min: 55

