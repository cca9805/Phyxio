version: 1

magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Cantidad de materia del cuerpo.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Intensidad del campo gravitatorio local.

  - id: P
    symbol: P
    nombre: peso
    unidad_si: N
    descripcion: Fuerza gravitatoria, P = m g.

  - id: N
    symbol: N
    nombre: normal
    unidad_si: N
    descripcion: Reaccion perpendicular entre superficies en contacto.

  - id: T
    symbol: T
    nombre: tension
    unidad_si: N
    descripcion: Fuerza transmitida por una cuerda ideal.

  - id: F
    symbol: F
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza externa impuesta sobre el cuerpo.

  - id: fx
    symbol: F_x
    nombre: componente_x
    unidad_si: N
    descripcion: Componente horizontal de una fuerza.

  - id: fy
    symbol: F_y
    nombre: componente_y
    unidad_si: N
    descripcion: Componente vertical de una fuerza.

  - id: mu_s
    symbol: \mu_s
    nombre: coeficiente_rozamiento_estatico
    unidad_si: ""
    descripcion: Parametro adimensional del contacto en reposo.

  - id: mu_k
    symbol: \mu_k
    nombre: coeficiente_rozamiento_cinetico
    unidad_si: ""
    descripcion: Parametro adimensional del contacto con deslizamiento.

  - id: fs
    symbol: f_s
    nombre: rozamiento_estatico
    unidad_si: N
    descripcion: Fuerza de rozamiento ajustable hasta su valor maximo.

  - id: fk
    symbol: f_k
    nombre: rozamiento_cinetico
    unidad_si: N
    descripcion: Fuerza de rozamiento durante el deslizamiento.

  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Angulo de inclinacion o direccion de fuerza.