objetivos:
  - Identificar todas las fuerzas externas relevantes en un sistema en equilibrio.
  - Plantear sumatorias por ejes con signos coherentes.
  - Resolver fuerzas desconocidas en casos tipicos de traslacion.
  - Verificar si una solucion es fisicamente posible.

suposiciones:
  - Sistema de referencia inercial.
  - Cuerpo modelado como particula o solido sin rotacion apreciable.
  - Campo gravitatorio uniforme (g constante).
  - En contacto seco, el rozamiento se modela con leyes de Coulomb.

