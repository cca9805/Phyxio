version: 1

magnitudes:
  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa del objeto.

  - id: r
    symbol: "r"
    nombre: radio
    unidad_si: m
    descripcion: Radio de la trayectoria.

  - id: v
    symbol: "v"
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad tangencial.

  - id: ac
    symbol: "a_c"
    nombre: aceleracion_centripeta
    unidad_si: m/s^2
    descripcion: Aceleración dirigida hacia el centro.

  - id: Fc
    symbol: "F_c"
    nombre: fuerza_centripeta
    unidad_si: N
    descripcion: Componente radial de la fuerza resultante.
