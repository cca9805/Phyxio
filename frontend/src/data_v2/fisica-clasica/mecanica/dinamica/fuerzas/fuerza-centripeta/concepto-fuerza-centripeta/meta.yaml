descripcion_corta: >
  La fuerza centrípeta no es una fuerza nueva, sino el nombre de la componente radial
  de la fuerza resultante necesaria para curvar la trayectoria.

tags:
  - dinamica
  - fuerzas
  - centripeta
  - movimiento-circular
  - dcl

objetivos:
  - Entender que la centrípeta no es un agente independiente.
  - Relacionar a_c = v^2/r con la segunda ley de Newton.
  - Identificar qué fuerzas reales aportan la componente centrípeta.
  - Evitar la confusión con la fuerza centrífuga.

suposiciones:
  - Sistema de referencia inercial.
  - Movimiento circular o curvado con radio bien definido.
  - Fuerzas reales idealizadas.

tiempo_estimado_min: 65

