version: 1

magnitudes:
  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa del objeto.

  - id: r
    symbol: "r"
    nombre: radio
    unidad_si: m
    descripcion: Radio de la trayectoria (o curvatura local).

  - id: v
    symbol: "v"
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad tangencial.

  - id: ac
    symbol: "a_c"
    nombre: aceleracion_centripeta
    unidad_si: m/s^2
    descripcion: Aceleración hacia el centro - a_c = v^2/r.

  - id: Fc
    symbol: "F_c"
    nombre: fuerza_centripeta
    unidad_si: N
    descripcion: Componente radial de la resultante - F_c = m a_c.

  - id: T
    symbol: "T"
    nombre: tension
    unidad_si: N
    descripcion: Tensión en una cuerda (si aplica).

  - id: N
    symbol: "N"
    nombre: normal
    unidad_si: N
    descripcion: Reacción normal (si aplica).

  - id: fr
    symbol: "f"
    nombre: rozamiento
    unidad_si: N
    descripcion: Fuerza de rozamiento (estático/dinámico según caso).

  - id: g
    symbol: "g"
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleración gravitatoria.

  - id: Fg
    symbol: "F_g"
    nombre: peso
    unidad_si: N
    descripcion: Peso - Fg = m g.
