descripcion_corta: >
  Ejemplos clásicos donde aparece la condición radial ΣF_rad = m v^2/r:
  cuerda (tensión), curva plana (rozamiento), loop vertical (tensión+peso),
  órbita (gravitatoria). Se enfatiza “qué fuerza real aporta la centrípeta”.

tags:
  - dinamica
  - fuerzas
  - centripeta
  - movimiento-circular
  - ejemplos
  - dcl

objetivos:
  - Reconocer en cada situación qué fuerzas reales aportan la componente centrípeta.
  - Plantear correctamente ΣF_rad = m v^2/r con signos.
  - Evitar añadir una “fuerza centrípeta” como fuerza extra en el DCL.
  - Comparar cómo influyen m, r y v (dependencia v^2).

suposiciones:
  - Sistema de referencia inercial.
  - Movimiento circular (o localmente circular) con radio r en el instante.
  - Modelo ideal (cuerdas sin masa, rozamiento Coulomb, etc.).

tiempo_estimado_min: 60

