version: 1

magnitudes:
  - id: F
    symbol: "\\vec F"
    nombre: fuerza
    unidad_si: N
    descripcion: Fuerza (vector). En muelles suele ser restauradora.

  - id: Fel
    symbol: "\\vec F_{el}"
    nombre: fuerza_elastica
    unidad_si: N
    descripcion: Fuerza elástica ejercida por el muelle sobre el cuerpo.

  - id: Fm
    symbol: "F"
    nombre: fuerza_modulo
    unidad_si: N
    descripcion: Módulo de la fuerza elástica (si se trabaja en 1D).

  - id: k
    symbol: "k"
    nombre: constante_elastica
    unidad_si: N/m
    descripcion: Constante elástica del muelle (rigidez).

  - id: x
    symbol: "x"
    nombre: elongacion
    unidad_si: m
    descripcion: Elongación o compresión respecto a la posición natural (x=0).

  - id: x0
    symbol: "x_0"
    nombre: posicion_equilibrio
    unidad_si: m
    descripcion: Posición de equilibrio (según el contexto).

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo.

  - id: g
    symbol: "g"
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleración gravitatoria.

  - id: Eel
    symbol: "U_{el}"
    nombre: energia_potencial_elastica
    unidad_si: J
    descripcion: Energía potencial elástica almacenada en el muelle.
