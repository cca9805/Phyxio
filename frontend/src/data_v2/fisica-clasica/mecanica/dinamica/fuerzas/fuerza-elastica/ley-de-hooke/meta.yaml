descripcion_corta: >
  La Ley de Hooke modela la fuerza de un muelle ideal en el régimen elástico lineal:
  F = -k x. Aprende a interpretar el signo, calcular k y la deformación, y conectar
  con equilibrio y movimiento.

tags:
  - dinamica
  - fuerzas
  - fuerza-elastica
  - muelle
  - hooke
  - dcl

objetivos:
  - Usar la ley F = -k x con signos y convención de eje correctos.
  - Calcular k, x y F con despejes seguros.
  - Distinguir régimen elástico lineal de deformación no lineal.
  - Aplicar el modelo en equilibrio (por ejemplo peso-muelle).
  - Evitar errores típicos de signo y de “módulo vs vector”.

suposiciones:
  - Muelle ideal, masa despreciable.
  - Régimen elástico lineal (Hooke válido).
  - Deformaciones pequeñas respecto a la longitud característica.
  - Sistema de referencia inercial (salvo que se indique).

tiempo_estimado_min: 60

