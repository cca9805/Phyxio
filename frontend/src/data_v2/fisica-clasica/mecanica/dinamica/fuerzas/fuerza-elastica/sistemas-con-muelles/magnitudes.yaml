version: 1

magnitudes:
  - id: F
    symbol: "F"
    nombre: fuerza
    unidad_si: N
    descripcion: Fuerza aplicada (módulo en 1D).

  - id: x
    symbol: "x"
    nombre: elongacion_total
    unidad_si: m
    descripcion: Elongación total del conjunto.

  - id: x1
    symbol: "x_1"
    nombre: elongacion_muelle_1
    unidad_si: m
    descripcion: Elongación del muelle 1.

  - id: x2
    symbol: "x_2"
    nombre: elongacion_muelle_2
    unidad_si: m
    descripcion: Elongación del muelle 2.

  - id: k1
    symbol: "k_1"
    nombre: constante_elastica_1
    unidad_si: N/m
    descripcion: Constante elástica del muelle 1.

  - id: k2
    symbol: "k_2"
    nombre: constante_elastica_2
    unidad_si: N/m
    descripcion: Constante elástica del muelle 2.

  - id: keq
    symbol: "k_{eq}"
    nombre: constante_equivalente
    unidad_si: N/m
    descripcion: Constante equivalente del sistema.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa colgante (si se aplica a equilibrio vertical).

  - id: g
    symbol: "g"
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleración de la gravedad.
