descripcion_corta: >
  Sistemas con varios muelles: conexión en serie y en paralelo, constante equivalente,
  reparto de fuerzas y deformaciones, y aplicación a equilibrio y movimiento 1D.

tags:
  - dinamica
  - fuerzas
  - fuerza-elastica
  - muelles
  - hooke
  - serie
  - paralelo
  - equivalente

objetivos:
  - Calcular la constante equivalente en serie y en paralelo.
  - Determinar el reparto de elongaciones (serie) y fuerzas (paralelo).
  - Aplicar F = k_eq x en problemas 1D.
  - Detectar errores típicos de “sumar k” donde no toca.
  - Conectar el sistema equivalente con equilibrio vertical (mg).

suposiciones:
  - Muelles ideales y lineales (Hooke válido).
  - Conexiones ideales (sin masas ni pérdidas en acoples).
  - Movimiento 1D, deformaciones pequeñas.
  - Sistema de referencia inercial (salvo indicación).

tiempo_estimado_min: 70

graficos:
  - Coord
  - Svg
