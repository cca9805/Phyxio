version: 1

magnitudes:
  - id: N
    symbol: "\\vec N"
    nombre: normal
    unidad_si: N
    descripcion: Fuerza de contacto ejercida por la superficie, perpendicular a ella.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo.

  - id: g
    symbol: "g"
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Módulo de la aceleración gravitatoria local.

  - id: theta
    symbol: "\\theta"
    nombre: angulo_plano
    unidad_si: rad
    descripcion: Ángulo de inclinación del plano respecto a la horizontal.

  - id: P
    symbol: "\\vec P"
    nombre: peso
    unidad_si: N
    descripcion: Fuerza gravitatoria. Cerca de la Tierra, \\(\\vec P = m\\vec g\\).
