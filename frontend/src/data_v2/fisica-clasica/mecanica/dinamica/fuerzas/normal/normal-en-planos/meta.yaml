descripcion_corta: >
  La fuerza normal es una fuerza de contacto perpendicular a la superficie.
  En un plano horizontal suele valer N=mg; en un plano inclinado N=mg·cos(theta)
  si no hay aceleración perpendicular al plano.

tags:
  - dinamica
  - fuerzas
  - normal
  - plano-inclinado
  - contacto
  - dcl

objetivos:
  - Identificar la normal como fuerza de contacto perpendicular a la superficie.
  - Dibujar correctamente el DCL en plano horizontal e inclinado.
  - Calcular N en casos típicos sin aceleración perpendicular.
  - Evitar confundir normal con peso.
  - Conectar con rozamiento (que depende de N).

tiempo_estimado_min: 55

graficos:
  - Coord
  - Dcl
