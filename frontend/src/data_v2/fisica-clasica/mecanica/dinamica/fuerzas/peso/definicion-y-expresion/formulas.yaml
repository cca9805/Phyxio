version: 1
topic:
  id: definicion-y-expresion
  title: 'Peso: definición y expresión'
variables:
- id: P
  symbol: \vec P
  nombre: peso
  unidad_si: N
  descripcion: Peso.
- id: m
  symbol: m
  nombre: masa
  unidad_si: kg
  descripcion: Masa.
- id: g
  symbol: \vec g
  nombre: aceleración de la gravedad
  unidad_si: m/s^2
  descripcion: Aceleración de la gravedad.
formulas:
- id: peso_vectorial
  title: Expresión vectorial del peso
  equation: P = m*g
  latex: \vec P = m\vec g
  status: calculable
  rearrangements:
  - target: P
    equation: P = m*g
    latex: \vec P = m\vec g
  - target: m
    equation: m = P/g
    latex: m = \frac{P}{g}
    constraints:
    - expr: g != 0
      message: g no puede ser cero.
- id: modulo_peso
  title: Módulo del peso cerca de la Tierra
  equation: P = m*g
  latex: P = mg
  status: calculable
- id: valor_g
  title: Valor de la gravedad terrestre
  equation: g = 9.81 m/s^2
  latex: g \approx 9.81\,\mathrm{m/s^2}
  status: descriptive
  motivo_no_calculable: 'Es un valor experimental medio cerca de la superficie terrestre.

    '
ui:
  default_formula: peso_vectorial
  groups:
  - title: Definición
    items:
    - peso_vectorial
    - modulo_peso
  - title: Constantes
    items:
    - valor_g
