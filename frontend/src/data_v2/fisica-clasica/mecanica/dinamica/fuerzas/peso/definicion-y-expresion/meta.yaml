descripcion_corta: >
  El peso es la fuerza gravitatoria que ejerce un cuerpo masivo (como la Tierra)
  sobre un objeto. Se expresa como P = m g y actúa siempre en dirección vertical.

tags:
  - dinamica
  - fuerzas
  - peso
  - gravedad

objetivos:
  - Definir correctamente el peso como fuerza gravitatoria.
  - Identificar quién ejerce el peso sobre un cuerpo.
  - Expresar el peso vectorialmente.
  - Comprender de qué depende el peso.
  - Diferenciar peso y masa.

