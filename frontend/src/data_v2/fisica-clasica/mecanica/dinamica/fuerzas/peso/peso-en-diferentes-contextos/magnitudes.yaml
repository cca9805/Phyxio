version: 1

magnitudes:
  - id: P
    symbol: "\\vec P"
    nombre: peso
    unidad_si: N
    descripcion: Fuerza gravitatoria ejercida sobre el cuerpo.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Medida de la inercia del cuerpo.

  - id: g
    symbol: "\\vec g"
    nombre: aceleracion_gravitatoria
    unidad_si: m/s^2
    descripcion: Aceleracion del campo gravitatorio local.

  - id: g0
    symbol: "g_0"
    nombre: gravedad_referencia
    unidad_si: m/s^2
    descripcion: Valor de gravedad de referencia cerca de la superficie.

  - id: h
    symbol: "h"
    nombre: altura
    unidad_si: m
    descripcion: Altura respecto a la superficie de referencia.

  - id: R
    symbol: "R"
    nombre: radio_planetario
    unidad_si: m
    descripcion: Radio del cuerpo celeste.
