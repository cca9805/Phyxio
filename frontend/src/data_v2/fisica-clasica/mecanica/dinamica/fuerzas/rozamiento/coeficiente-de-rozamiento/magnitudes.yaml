version: 1

magnitudes:
  - id: mu_s
    symbol: "\\mu_s"
    nombre: coeficiente_rozamiento_estatico
    unidad_si: "-"
    descripcion: Coeficiente adimensional asociado al rozamiento estático.

  - id: mu_k
    symbol: "\\mu_k"
    nombre: coeficiente_rozamiento_dinamico
    unidad_si: "-"
    descripcion: Coeficiente adimensional asociado al rozamiento dinámico (cinético).

  - id: fs
    symbol: "f_s"
    nombre: rozamiento_estatico
    unidad_si: N
    descripcion: Módulo de la fuerza de rozamiento estático (se ajusta hasta un máximo).

  - id: fs_max
    symbol: "f_{s,\\max}"
    nombre: rozamiento_estatico_maximo
    unidad_si: N
    descripcion: Valor máximo del rozamiento estático justo antes de deslizar.

  - id: fk
    symbol: "f_k"
    nombre: rozamiento_dinamico
    unidad_si: N
    descripcion: Módulo del rozamiento dinámico cuando hay deslizamiento.

  - id: N
    symbol: "N"
    nombre: normal
    unidad_si: N
    descripcion: Módulo de la normal entre superficies.

  - id: theta
    symbol: "\\theta"
    nombre: angulo_plano
    unidad_si: rad
    descripcion: Ángulo del plano inclinado (para el método del ángulo crítico).

  - id: theta_c
    symbol: "\\theta_c"
    nombre: angulo_critico
    unidad_si: rad
    descripcion: Ángulo crítico al que comienza a deslizar (para estimar μ_s).
