descripcion_corta: >
  El coeficiente de rozamiento (estático y dinámico) relaciona el rozamiento con la normal.
  Se puede estimar a partir de medidas de fuerzas o con un plano inclinado (ángulo crítico).

tags:
  - dinamica
  - fuerzas
  - rozamiento
  - coeficiente
  - plano-inclinado
  - experimental

objetivos:
  - Calcular μ_s y μ_k a partir de fuerzas medidas (f y N).
  - Interpretar μ como parámetro del par de materiales y el estado de la superficie.
  - Estimar μ_s con el ángulo crítico en un plano inclinado.
  - Evitar errores típicos (usar μ sin saber si es estático o dinámico).

tiempo_estimado_min: 55

