version: 1

magnitudes:
  - id: fk
    symbol: "\\vec f_k"
    nombre: rozamiento_dinamico
    unidad_si: N
    descripcion: Fuerza de rozamiento dinámico (cinético) durante el deslizamiento.

  - id: mu_k
    symbol: "\\mu_k"
    nombre: coeficiente_rozamiento_dinamico
    unidad_si: "-"
    descripcion: Coeficiente adimensional de rozamiento dinámico.

  - id: N
    symbol: "N"
    nombre: normal
    unidad_si: N
    descripcion: Fuerza normal ejercida por la superficie.

  - id: v_rel
    symbol: "\\vec v_{rel}"
    nombre: velocidad_relativa
    unidad_si: m/s
    descripcion: Velocidad relativa entre superficies en contacto (dirección del deslizamiento).
