version: 1

magnitudes:
  - id: fs
    symbol: "\\vec f_s"
    nombre: rozamiento_estatico
    unidad_si: N
    descripcion: Fuerza de rozamiento estático entre dos superficies en contacto.

  - id: fs_max
    symbol: "f_{s,\\max}"
    nombre: rozamiento_estatico_maximo
    unidad_si: N
    descripcion: Valor máximo que puede alcanzar el rozamiento estático.

  - id: mu_s
    symbol: "\\mu_s"
    nombre: coeficiente_rozamiento_estatico
    unidad_si: "-"
    descripcion: Coeficiente adimensional de rozamiento estático.

  - id: N
    symbol: "N"
    nombre: normal
    unidad_si: N
    descripcion: Fuerza normal ejercida por la superficie.

  - id: F
    symbol: "\\vec F"
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza externa aplicada al cuerpo.
