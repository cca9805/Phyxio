version: 1

magnitudes:
  - id: T
    symbol: T
    nombre: tension
    unidad_si: N
    descripcion: Fuerza transmitida a lo largo de la cuerda o cable.

  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo considerado.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion gravitatoria.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion del sistema.

  - id: P
    symbol: P
    nombre: peso
    unidad_si: N
    descripcion: Fuerza gravitatoria (P = m*g).

  - id: m1
    symbol: m_1
    nombre: masa_1
    unidad_si: kg
    descripcion: Masa 1 en sistemas de dos masas.

  - id: m2
    symbol: m_2
    nombre: masa_2
    unidad_si: kg
    descripcion: Masa 2 en sistemas de dos masas.

  - id: lambda
    symbol: "\\lambda"
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud del cable.

  - id: y
    symbol: y
    nombre: posicion_en_cable
    unidad_si: m
    descripcion: Coordenada a lo largo del cable.

  - id: dT
    symbol: dT
    nombre: variacion_tension
    unidad_si: N
    descripcion: Incremento de tension entre dos puntos cercanos.

  - id: dy
    symbol: dy
    nombre: variacion_posicion
    unidad_si: m
    descripcion: Incremento de posicion entre dos puntos cercanos.
