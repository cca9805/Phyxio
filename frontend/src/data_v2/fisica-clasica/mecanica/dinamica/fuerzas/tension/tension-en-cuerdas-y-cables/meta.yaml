descripcion_corta: >
  Estudio de la tensión como fuerza transmitida por cuerdas y cables ideales.
  Análisis en equilibrio y en movimiento, descomposición en componentes
  y aplicación sistemática de las leyes de Newton.

tags:
  - dinamica
  - fuerzas
  - tension
  - cuerdas
  - cables
  - poleas
  - dcl

objetivos:
  - Identificar correctamente la tensión en diagramas de cuerpo libre.
  - Calcular la tensión en cuerdas verticales con o sin aceleración.
  - Analizar sistemas con varias masas unidas por cuerdas ideales.
  - Descomponer una tensión en componentes cartesianas.
  - Evitar errores comunes al confundir tensión con peso.

suposiciones:
  - Cuerda ideal (masa despreciable).
  - Cuerda inextensible.
  - Poleas ideales (sin rozamiento ni inercia).
  - Campo gravitatorio uniforme.
  - Sistema de referencia inercial.

tiempo_estimado_min: 60

