version: 1

magnitudes:
  - id: F
    symbol: "\\vec F"
    nombre: fuerza
    unidad_si: N
    descripcion: Vector fuerza.

  - id: Fx
    symbol: "F_x"
    nombre: componente_x
    unidad_si: N
    descripcion: Proyección de la fuerza sobre el eje x.

  - id: Fy
    symbol: "F_y"
    nombre: componente_y
    unidad_si: N
    descripcion: Proyección de la fuerza sobre el eje y.

  - id: Fpar
    symbol: "F_{\\parallel}"
    nombre: componente_paralela
    unidad_si: N
    descripcion: Proyección sobre un eje paralelo al plano o trayectoria.

  - id: Fperp
    symbol: "F_{\\perp}"
    nombre: componente_perpendicular
    unidad_si: N
    descripcion: Proyección sobre el eje perpendicular al plano.

  - id: theta
    symbol: "\\theta"
    nombre: angulo
    unidad_si: rad
    descripcion: Ángulo medido desde el eje de referencia.

  - id: Fm
    symbol: "F"
    nombre: modulo_fuerza
    unidad_si: N
    descripcion: Módulo (valor) del vector fuerza.
