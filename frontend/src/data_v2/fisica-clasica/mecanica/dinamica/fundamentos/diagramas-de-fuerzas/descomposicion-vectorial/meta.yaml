id: descomposicion-vectorial
nombre: Descomposición vectorial (componentes)

area: fisica-clasica
bloque: mecanica
subbloque: dinamica

ruta_relativa: fisica-clasica/mecanica/dinamica/fundamentos/diagramas-de-fuerzas/descomposicion-vectorial

orden: 212133
dificultad: 2

niveles:
  - ESO
  - Bachillerato
  - Universidad

prerequisitos:
  - fisica-clasica/fundamentos/vectores
  - fisica-clasica/mecanica/dinamica/fundamentos/diagramas-de-cuerpo-libre

descripcion_corta: >
  Técnica para proyectar vectores en ejes elegidos. Permite convertir ecuaciones vectoriales
  (como ΣF = m a) en ecuaciones escalares resolubles.

tags:
  - dinamica
  - vectores
  - descomposicion
  - componentes
  - proyecciones
  - ejes

objetivos:
  - Descomponer un vector en componentes en ejes cartesianos y ejes inclinados.
  - Elegir ejes convenientes (paralelo/perpendicular a un plano).
  - Evitar errores de signo y de uso de seno/coseno.
  - Convertir ΣF = m a en ecuaciones por componentes.
  - Interpretar el resultado físicamente.

tiempo_estimado_min: 60

graficos:
  - Dcl
  - Svg
