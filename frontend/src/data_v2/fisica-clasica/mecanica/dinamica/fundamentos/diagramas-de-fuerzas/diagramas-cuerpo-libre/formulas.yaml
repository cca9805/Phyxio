version: 1
topic:
  id: diagramas-cuerpo-libre
  title: Diagramas de Cuerpo Libre (DCL)
variables:
- id: m
  symbol: m
  nombre: masa
  unidad_si: kg
  descripcion: Masa.
- id: a
  symbol: \vec a
  nombre: aceleracion
  unidad_si: m/s^2
  descripcion: Aceleracion.
- id: Fnet
  symbol: \sum \vec F
  nombre: fuerza resultante
  unidad_si: N
  descripcion: Fuerza resultante.
- id: Fx
  symbol: F_x
  nombre: componente x de la fuerza
  unidad_si: N
  descripcion: Componente x de la fuerza.
- id: Fy
  symbol: F_y
  nombre: componente y de la fuerza
  unidad_si: N
  descripcion: Componente y de la fuerza.
- id: ax
  symbol: a_x
  nombre: aceleracion en x
  unidad_si: m/s^2
  descripcion: Aceleracion en x.
- id: ay
  symbol: a_y
  nombre: aceleracion en y
  unidad_si: m/s^2
  descripcion: Aceleracion en y.
formulas:
- id: newton_vectorial
  title: Segunda ley de Newton (vectorial)
  equation: Fnet = m*a
  latex: \sum \vec F = m\vec a
  motivo_no_calculable: 'Es una ecuacion vectorial general. Para resolver hay que proyectar en ejes.

    '
  status: descriptive
- id: newton_x
  title: Segunda ley (eje x)
  equation: Fx = m*ax
  latex: \sum F_x = m a_x
  rearrangements:
  - target: ax
    equation: ax = Fx/m
    latex: a_x = \frac{\sum F_x}{m}
  - target: Fx
    equation: Fx = m*ax
    latex: \sum F_x = m a_x
  status: calculable
- id: newton_y
  title: Segunda ley (eje y)
  equation: Fy = m*ay
  latex: \sum F_y = m a_y
  rearrangements:
  - target: ay
    equation: ay = Fy/m
    latex: a_y = \frac{\sum F_y}{m}
  - target: Fy
    equation: Fy = m*ay
    latex: \sum F_y = m a_y
  status: calculable
- id: reglas_dcl
  title: Reglas del DCL
  equation: DCL = cuerpo aislado + fuerzas reales + ejes
  latex: '\text{DCL: aislar el cuerpo, dibujar fuerzas reales y elegir ejes}'
  motivo_no_calculable: 'Es un procedimiento metodologico, no una ecuacion numerica.

    '
  status: descriptive
ui:
  default_formula: reglas_dcl
  groups:
  - title: Metodo
    items:
    - reglas_dcl
  - title: Ecuaciones de Newton
    items:
    - newton_vectorial
    - newton_x
    - newton_y
