version: 1

magnitudes:
  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Inercia del cuerpo analizado.

  - id: a
    symbol: "\\vec a"
    nombre: aceleracion_vectorial
    unidad_si: m/s^2
    descripcion: Aceleracion del cuerpo respecto al sistema de referencia elegido.

  - id: ax
    symbol: "a_x"
    nombre: aceleracion_x
    unidad_si: m/s^2
    descripcion: Componente de la aceleracion en el eje x.

  - id: ay
    symbol: "a_y"
    nombre: aceleracion_y
    unidad_si: m/s^2
    descripcion: Componente de la aceleracion en el eje y.

  - id: Fnet
    symbol: "\\sum \\vec F"
    nombre: fuerza_resultante
    unidad_si: N
    descripcion: Suma vectorial de todas las fuerzas reales sobre el cuerpo.

  - id: Fx
    symbol: "F_x"
    nombre: componente_x_fuerza
    unidad_si: N
    descripcion: Componente de la fuerza total en el eje x.

  - id: Fy
    symbol: "F_y"
    nombre: componente_y_fuerza
    unidad_si: N
    descripcion: Componente de la fuerza total en el eje y.
