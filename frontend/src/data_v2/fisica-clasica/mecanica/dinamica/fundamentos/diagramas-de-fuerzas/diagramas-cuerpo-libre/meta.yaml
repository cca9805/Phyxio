  - diagramas-de-cuerpo-libre
  - fuerzas
  - metodo
  - newton

objetivos:
  - Aplicar el método completo de DCL paso a paso.
  - Elegir correctamente el sistema de referencia y los ejes.
  - Traducir un DCL en ecuaciones ΣF = m a.
  - Evitar errores típicos de mezcla de cuerpos y fuerzas inexistentes.
  - Preparar problemas resolubles de dinámica.

