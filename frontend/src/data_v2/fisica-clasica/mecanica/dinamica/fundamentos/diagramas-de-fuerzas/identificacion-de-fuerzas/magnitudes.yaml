version: 1

magnitudes:
  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Inercia del cuerpo (aparece en sumF = m*a).

  - id: g
    symbol: "g"
    nombre: aceleracion_gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion de la gravedad.

  - id: P
    symbol: "\\vec P"
    nombre: peso
    unidad_si: N
    descripcion: Fuerza gravitatoria sobre el cuerpo.

  - id: N
    symbol: "\\vec N"
    nombre: fuerza_normal
    unidad_si: N
    descripcion: Fuerza de contacto perpendicular a la superficie.

  - id: T
    symbol: "\\vec T"
    nombre: tension
    unidad_si: N
    descripcion: Fuerza transmitida por una cuerda o cable ideal.

  - id: f
    symbol: "\\vec f"
    nombre: fuerza_rozamiento
    unidad_si: N
    descripcion: Fuerza de contacto tangencial (estatico o cinetico).

  - id: fs
    symbol: "f_s"
    nombre: rozamiento_estatico
    unidad_si: N
    descripcion: Magnitud del rozamiento estatico.

  - id: fk
    symbol: "f_k"
    nombre: rozamiento_cinetico
    unidad_si: N
    descripcion: Magnitud del rozamiento cinetico.

  - id: mu
    symbol: "\\mu"
    nombre: coeficiente_rozamiento
    unidad_si: "-"
    descripcion: Coeficiente de rozamiento (adimensional).

  - id: k
    symbol: "k"
    nombre: constante_elastica
    unidad_si: N/m
    descripcion: Constante de un muelle ideal.

  - id: x
    symbol: "x"
    nombre: deformacion
    unidad_si: m
    descripcion: Estiramiento o compresion del muelle respecto al equilibrio.

  - id: Fel
    symbol: "F_{el}"
    nombre: fuerza_elastica
    unidad_si: N
    descripcion: Fuerza elastica del muelle en modulo.

  - id: Fnet
    symbol: "\\sum \\vec F"
    nombre: fuerza_resultante
    unidad_si: N
    descripcion: Suma vectorial de fuerzas reales sobre el cuerpo.

  - id: a
    symbol: "\\vec a"
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleracion del cuerpo en el marco elegido.
