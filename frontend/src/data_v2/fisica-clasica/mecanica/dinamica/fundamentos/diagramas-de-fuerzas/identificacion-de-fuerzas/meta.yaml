descripcion_corta: >
  Un diagrama de cuerpo libre (DCL) es el “inventario” de fuerzas reales que actúan
  sobre un cuerpo aislado. Aprender a identificarlas correctamente es la base para
  aplicar ΣF = m a sin confundir acción–reacción ni mezclar cuerpos.

tags:
  - dinamica
  - dcl
  - diagrama-de-fuerzas
  - fuerzas
  - identificacion
  - accion-reaccion

objetivos:
  - Dibujar DCL correctos: elegir cuerpo, aislarlo, listar fuerzas reales.
  - Identificar fuerzas típicas: peso, normal, tensión, rozamiento, elástica, empuje, resistencia.
  - No confundir pares acción–reacción con fuerzas del mismo cuerpo.
  - Elegir ejes convenientes y descomponer fuerzas cuando procede.
  - Detectar fuerzas inexistentes (errores de “fuerza en la dirección del movimiento”, etc.).

tiempo_estimado_min: 70

graficos:
