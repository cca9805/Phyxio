formulas:
- id: inercia_equilibrio_x
  title: Equilibrio dinámico en x (ΣF=0 → a=0)
  equation: Fx = 0
  latex: F_x = 0
  rearrangements:
  - target: Fx
    equation: Fx = 0
    latex: F_x = 0
  status: calculable
- id: inercia_equilibrio_y
  title: Equilibrio dinámico en y (ΣF=0 → a=0)
  equation: Fy = 0
  latex: F_y = 0
  rearrangements:
  - target: Fy
    equation: Fy = 0
    latex: F_y = 0
  status: calculable
- id: inercia_aceleracion_cero_x
  title: Si Fx=0 entonces ax=0 (en marco inercial)
  equation: ax = 0
  latex: a_x = 0
  rearrangements:
  - target: ax
    equation: ax = 0
    latex: a_x = 0
  status: calculable
- id: inercia_velocidad_constante
  title: Si a=0 entonces v es constante (1D en x)
  equation: vx = const
  latex: v_x = \text{cte}
  motivo_no_calculable: '"cte†describe una propiedad del movimiento (no es una ecuación de cálculo numérico). Para
    calcular x(t) necesitas fijar el valor de la constante (v0) y una condición inicial.

    '
  status: descriptive
- id: mru_posicion
  title: 'MRU (consecuencia si a=0): x(t)'
  equation: x = x0 + vx*t
  latex: x = x_0 + v_x t
  motivo_no_calculable: 'Aquí no definimos x0 como variable del Tema para evitar solapamiento con cinemática. Se muestra
    por completitud conceptual (consecuencia de a=0).

    '
  status: descriptive
ui:
  default_formula: inercia_equilibrio_x
  groups:
  - title: Condición de inercia (calculable)
