version: 1

magnitudes:
  - id: Fnet
    symbol: "\\sum \\vec F"
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Suma vectorial de todas las fuerzas externas que actúan sobre el cuerpo.

  - id: Fx
    symbol: "F_x"
    nombre: componente_x_de_la_fuerza_neta
    unidad_si: N
    descripcion: Componente en x de la fuerza neta.

  - id: Fy
    symbol: "F_y"
    nombre: componente_y_de_la_fuerza_neta
    unidad_si: N
    descripcion: Componente en y de la fuerza neta.

  - id: a
    symbol: "\\vec a"
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleración del cuerpo (vector). En un marco inercial, depende de la fuerza neta.

  - id: ax
    symbol: "a_x"
    nombre: componente_x_de_la_aceleracion
    unidad_si: m/s^2
    descripcion: Componente en x de la aceleración.

  - id: ay
    symbol: "a_y"
    nombre: componente_y_de_la_aceleracion
    unidad_si: m/s^2
    descripcion: Componente en y de la aceleración.

  - id: v
    symbol: "\\vec v"
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad del cuerpo (vector). Si a=0 en un marco inercial, v es constante.

  - id: vx
    symbol: "v_x"
    nombre: componente_x_de_la_velocidad
    unidad_si: m/s
    descripcion: Componente en x de la velocidad.

  - id: vy
    symbol: "v_y"
    nombre: componente_y_de_la_velocidad
    unidad_si: m/s
    descripcion: Componente en y de la velocidad.

  - id: x
    symbol: "x"
    nombre: posicion
    unidad_si: m
    descripcion: Posición en 1D (o coordenada x). Si v es constante, x(t) es lineal.

  - id: t
    symbol: "t"
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
