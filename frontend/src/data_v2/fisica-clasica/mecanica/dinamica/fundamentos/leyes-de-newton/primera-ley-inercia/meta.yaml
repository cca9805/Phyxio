descripcion_corta: >
  Un cuerpo mantiene su estado de reposo o de movimiento rectilíneo uniforme si la
  fuerza neta sobre él es nula. Introduce el concepto de marco inercial y el papel de
  la fuerza resultante.

tags:
  - dinamica
  - leyes-de-newton
  - primera-ley
  - inercia
  - fuerza-resultante
  - equilibrio
  - marco-inercial

objetivos:
  - Interpretar la Primera Ley como condición sobre la fuerza neta (ΣF = 0).
  - Relacionar ΣF = 0 con a = 0 y con MRU (v constante) en un marco inercial.
  - Distinguir entre "no hay fuerzas" y "la suma de fuerzas es cero".
  - Identificar marcos inerciales y no inerciales en situaciones típicas.
  - Resolver casos de equilibrio simple (1D/2D) como aplicación directa.

suposiciones:
  - Mecánica clásica (v << c).
  - Cuerpo tratado como partícula o sólido rígido sin rotación (en este Tema).
  - Se trabaja en un marco de referencia inercial.
  - Fuerzas y aceleración se tratan como magnitudes vectoriales (por componentes cuando proceda).
  - Unidades coherentes (SI recomendado).

