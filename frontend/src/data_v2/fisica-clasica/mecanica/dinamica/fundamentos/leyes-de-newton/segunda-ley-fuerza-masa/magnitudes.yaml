version: 1
magnitudes:
- id: m
  symbol: m
  nombre: masa
  unidad_si: kg
  descripcion: Medida de la inercia del cuerpo. Relaciona fuerza neta y aceleración en la 2ª ley.
- id: Fnet
  symbol: \sum \vec F
  nombre: fuerza_neta
  unidad_si: N
  descripcion: Suma vectorial de todas las fuerzas externas que actúan sobre el cuerpo.
- id: Fx
  symbol: F_x
  nombre: componente_x_de_la_fuerza_neta
  unidad_si: N
  descripcion: Componente x de la fuerza neta.
- id: Fy
  symbol: F_y
  nombre: componente_y_de_la_fuerza_neta
  unidad_si: N
  descripcion: Componente y de la fuerza neta.
- id: a
  symbol: \vec a
  nombre: aceleracion
  unidad_si: m/s^2
  descripcion: Aceleración del cuerpo (vector) producida por la fuerza neta.
- id: ax
  symbol: a_x
  nombre: componente_x_de_la_aceleracion
  unidad_si: m/s^2
  descripcion: Componente x de la aceleración.
- id: ay
  symbol: a_y
  nombre: componente_y_de_la_aceleracion
  unidad_si: m/s^2
  descripcion: Componente y de la aceleración.
- id: g
  symbol: g
  nombre: aceleracion_gravedad
  unidad_si: m/s^2
  descripcion: Aceleración de la gravedad. Se usa en ejemplos típicos con peso (P = m g).
- id: a_x
  symbol: a_x
  nombre: alias_de_ax_compatibilidad_sustitucin
  unidad_si: m/s^2
  descripcion: Alias de ax (compatibilidad sustitución).
