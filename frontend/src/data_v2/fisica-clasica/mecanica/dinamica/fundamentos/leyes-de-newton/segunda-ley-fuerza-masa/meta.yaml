descripcion_corta: >
  La fuerza neta produce aceleración: ΣF = m·a. Relaciona dinámica y cinemática,
  permite calcular aceleraciones y fuerzas en sistemas mecánicos simples.

tags:
  - dinamica
  - leyes-de-newton
  - segunda-ley
  - fuerza
  - masa
  - aceleracion
  - fuerza-resultante

objetivos:
  - Aplicar ΣF = m·a en 1D y por componentes en 2D.
  - Diferenciar fuerza neta de fuerzas individuales.
  - Calcular aceleración a partir de fuerzas y masa.
  - Calcular fuerza neta necesaria para una aceleración dada.
  - Resolver casos típicos (bloque en horizontal con fuerza aplicada, peso+normal, etc.) como base para temas posteriores.

suposiciones:
  - Marco de referencia inercial.
  - Masa constante (no sistemas de masa variable).
  - Movimiento no relativista (v << c).
  - El cuerpo se modela como partícula (sin rotación) en este Tema.

