version: 1
topic:
  id: tercera-ley-accion-reaccion
  title: Tercera Ley de Newton (Acción–Reacción)
variables:
- id: FAB
  symbol: \vec F_{A\to B}
  nombre: fuerza de A sobre B
  unidad_si: N
  descripcion: Fuerza de A sobre B.
- id: FBA
  symbol: \vec F_{B\to A}
  nombre: fuerza de B sobre A
  unidad_si: N
  descripcion: Fuerza de B sobre A.
- id: FAx
  symbol: F_{A\to B,x}
  nombre: componente x de la fuerza A→B
  unidad_si: N
  descripcion: Componente x de la fuerza A→B.
- id: FBx
  symbol: F_{B\to A,x}
  nombre: componente x de la fuerza B→A
  unidad_si: N
  descripcion: Componente x de la fuerza B→A.
formulas:
- id: accion_reaccion_vector
  title: Acción–reacción (forma vectorial)
  equation: FBA = -FAB
  latex: \vec F_{B\to A} = -\vec F_{A\to B}
  motivo_no_calculable: 'Es una relación conceptual entre dos fuerzas de interacción. No “calcula” un movimiento por sí sola:
    sirve para identificar pares entre cuerpos distintos.

    '
  status: descriptive
- id: accion_reaccion_x
  title: Acción–reacción por componente (x)
  equation: FBx = -FAx
  latex: F_{B\to A,x} = -F_{A\to B,x}
  rearrangements:
  - target: FBx
    equation: FBx = -FAx
    latex: F_{B\to A,x} = -F_{A\to B,x}
  - target: FAx
    equation: FAx = -FBx
    latex: F_{A\to B,x} = -F_{B\to A,x}
  status: calculable
- id: accion_reaccion_normales
  title: 'Normal: superficie ↔ objeto (conceptual)'
  equation: N_superficie_sobre_objeto = -N_objeto_sobre_superficie
  latex: \vec N_{sup\to obj} = -\vec N_{obj\to sup}
  motivo_no_calculable: 'Identifica el par acción–reacción de la normal. Para obtener el valor de N se necesita además equilibrio/dinámica
    del objeto (2ª ley).

    '
  status: descriptive
- id: accion_reaccion_tension
  title: 'Tensión: cuerda ↔ objeto (conceptual)'
  equation: T_cuerda_sobre_objeto = -T_objeto_sobre_cuerda
  latex: \vec T_{c\to o} = -\vec T_{o\to c}
  motivo_no_calculable: 'Identifica el par acción–reacción de la tensión. El valor de T se halla con la 2ª ley.

    '
  status: descriptive
- id: accion_reaccion_gravedad
  title: 'Gravedad: Tierra ↔ objeto (conceptual)'
  equation: F_Tierra_sobre_objeto = -F_objeto_sobre_Tierra
  latex: \vec F_{T\to o} = -\vec F_{o\to T}
  motivo_no_calculable: 'Par acción–reacción gravitatorio. No se “cancela” dentro del diagrama de un solo cuerpo.

    '
  status: descriptive
ui:
  default_formula: accion_reaccion_vector
  groups:
  - title: Acción–reacción
    items:
    - accion_reaccion_vector
    - accion_reaccion_x
    - accion_reaccion_normales
    - accion_reaccion_tension
    - accion_reaccion_gravedad
