version: 1

magnitudes:
  - id: FAB
    symbol: "\\vec F_{A\\to B}"
    nombre: fuerza_de_A_sobre_B
    unidad_si: N
    descripcion: Fuerza que ejerce el cuerpo A sobre el cuerpo B (vector).

  - id: FBA
    symbol: "\\vec F_{B\\to A}"
    nombre: fuerza_de_B_sobre_A
    unidad_si: N
    descripcion: Fuerza que ejerce el cuerpo B sobre el cuerpo A (vector).

  - id: FAx
    symbol: "F_{A\\to B,x}"
    nombre: componente_x_de_fuerza_de_A_sobre_B
    unidad_si: N
    descripcion: Componente x de la fuerza que A ejerce sobre B.

  - id: FBx
    symbol: "F_{B\\to A,x}"
    nombre: componente_x_de_fuerza_de_B_sobre_A
    unidad_si: N
    descripcion: Componente x de la fuerza que B ejerce sobre A.

  - id: N
    symbol: "N"
    nombre: fuerza_normal
    unidad_si: N
    descripcion: Fuerza de contacto perpendicular a la superficie (en un par acción–reacción).

  - id: T
    symbol: "T"
    nombre: tension
    unidad_si: N
    descripcion: Fuerza transmitida por una cuerda/cable ideal (en pares acción–reacción).

  - id: f
    symbol: "f"
    nombre: fuerza_rozamiento
    unidad_si: N
    descripcion: Fuerza de contacto tangencial (estática o cinética). Tiene su par acción–reacción.

  - id: G
    symbol: "\\vec F_g"
    nombre: fuerza_gravitatoria
    unidad_si: N
    descripcion: Fuerza gravitatoria entre dos masas (acción–reacción a distancia).
