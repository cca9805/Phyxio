descripcion_corta: >
  Si un cuerpo A ejerce una fuerza sobre B, entonces B ejerce sobre A una fuerza
  igual en módulo y opuesta en dirección. Las fuerzas de acción-reacción actúan sobre
  cuerpos distintos, por eso no se cancelan en el mismo diagrama de fuerzas.

