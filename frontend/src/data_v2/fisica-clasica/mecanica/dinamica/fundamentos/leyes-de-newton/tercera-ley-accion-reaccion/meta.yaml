  - dinamica
  - leyes-de-newton
  - tercera-ley
  - accion-reaccion
  - pares-de-fuerzas
  - interaccion

objetivos:
  - Identificar correctamente pares de acción–reacción en interacciones (contacto y a distancia).
  - Entender que actúan sobre cuerpos distintos y no se cancelan en un solo cuerpo.
  - Diferenciar acción–reacción de fuerzas equilibradas (ΣF=0 en un mismo cuerpo).
  - Aplicar la 3ª ley en situaciones típicas: empujes, normal, tensión, fricción, gravedad.
  - Evitar errores comunes de “una fuerza vence a la otra” dentro del par.

suposiciones:
  - Mecánica clásica y marcos inerciales.
  - Fuerzas como vectores.
  - Se trabaja con pares idealizados (sin deformaciones complejas).

