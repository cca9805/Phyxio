formulas:
- id: primera_ley
  title: Primera ley de Newton (criterio inercial)
  equation: Fnet = 0 => v = cte
  latex: \sum \vec F = 0 \Rightarrow \vec v = \text{cte}
  motivo_no_calculable: 'Es una condición definitoria del sistema de referencia, no una ecuación de cálculo.

    '
  status: descriptive
- id: segunda_ley
  title: Segunda ley en sistemas inerciales
  equation: Fnet = m a
  latex: \sum \vec F = m \vec a
  rearrangements:
  - target: a
    equation: a = Fnet / m
    latex: \vec a = \frac{\sum \vec F}{m}
  - target: Fnet
    equation: Fnet = m a
    latex: \sum \vec F = m \vec a
  status: calculable
