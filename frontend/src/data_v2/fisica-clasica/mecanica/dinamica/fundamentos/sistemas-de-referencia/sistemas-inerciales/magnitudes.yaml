version: 1

magnitudes:
  - id: v
    symbol: "v"
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad medida respecto a un sistema de referencia.

  - id: a
    symbol: "a"
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleración medida en un sistema de referencia.

  - id: Fnet
    symbol: "\\sum \\vec F"
    nombre: fuerza_resultante
    unidad_si: N
    descripcion: Suma vectorial de todas las fuerzas reales aplicadas.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Medida de la inercia de un cuerpo.
