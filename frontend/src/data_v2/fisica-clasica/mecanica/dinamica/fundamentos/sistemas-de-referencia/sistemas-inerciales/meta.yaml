descripcion_corta: >
  Un sistema de referencia inercial es aquel en el que se cumplen las leyes de Newton
  sin necesidad de introducir fuerzas ficticias. Son marcos no acelerados.

tags:
  - dinamica
  - sistemas-de-referencia
  - inerciales
  - leyes-de-newton

objetivos:
  - Comprender qué es un sistema de referencia.
  - Identificar cuándo un sistema es inercial.
  - Relacionar la 1ª ley de Newton con la definición de sistema inercial.
  - Entender por qué las leyes de Newton fallan en sistemas no inerciales.

