version: 1

magnitudes:
  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Medida de la inercia del cuerpo.

  - id: a
    symbol: "\\vec a"
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleración medida desde el sistema de referencia elegido.

  - id: aref
    symbol: "\\vec a_{ref}"
    nombre: aceleracion_del_sistema_de_referencia
    unidad_si: m/s^2
    descripcion: Aceleración del marco no inercial respecto a un marco inercial.

  - id: Fnet
    symbol: "\\sum \\vec F"
    nombre: fuerza_neta_real
    unidad_si: N
    descripcion: Suma vectorial de fuerzas reales (interacciones).

  - id: Ff
    symbol: "\\vec F_f"
    nombre: fuerza_ficticia
    unidad_si: N
    descripcion: Fuerza introducida para poder aplicar Newton en un marco no inercial.

  - id: g
    symbol: "g"
    nombre: aceleracion_gravedad
    unidad_si: m/s^2
    descripcion: Aceleración de la gravedad (para ejemplos tipo ascensor).

  - id: N
    symbol: "N"
    nombre: fuerza_normal
    unidad_si: N
    descripcion: Fuerza normal (contacto) típica en ejemplos de marcos acelerados.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Velocidad angular del marco rotante (extensión conceptual).

  - id: r
    symbol: "r"
    nombre: radio
    unidad_si: m
    descripcion: Distancia al eje de giro (extensión conceptual).

  - id: vrel
    symbol: "\\vec v_{rel}"
    nombre: velocidad_relativa
    unidad_si: m/s
    descripcion: Velocidad medida en el marco rotante (extensión conceptual).
