descripcion_corta: >
  Un sistema no inercial está acelerado (traslación o rotación). En él, las leyes de Newton
  no se aplican en su forma simple, salvo que se introduzcan fuerzas ficticias.

tags:
  - dinamica
  - sistemas-de-referencia
  - no-inerciales
  - fuerzas-ficticias
  - aceleracion
  - corioliss
  - centrifuga

objetivos:
  - Entender qué hace que un sistema sea no inercial.
  - Saber por qué "aparecen fuerzas" sin interacción real.
  - Introducir fuerzas ficticias para recuperar ΣF = m a en el marco no inercial.
  - Distinguir traslación acelerada y rotación (centrífuga/Coriolis) a nivel conceptual.

suposiciones:
  - Mecánica clásica (v << c).
  - Se trabaja principalmente con marcos de traslación acelerada (calculable).
  - Rotación se presenta como extensión conceptual (no calculable aquí si falta contexto vectorial completo).

tiempo_estimado_min: 60

graficos:
