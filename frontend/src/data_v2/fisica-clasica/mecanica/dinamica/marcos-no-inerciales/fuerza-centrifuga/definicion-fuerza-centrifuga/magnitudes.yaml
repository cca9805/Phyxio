version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa del cuerpo que se observa en el marco rotatorio."
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: "Velocidad angular del sistema de referencia en rotacion."
  - id: r
    symbol: r
    nombre: radio
    unidad_si: m
    descripcion: "Distancia radial al eje de giro."
  - id: v
    symbol: v
    nombre: velocidad_tangencial
    unidad_si: m/s
    descripcion: "Rapidez tangencial asociada a la trayectoria circular."
  - id: a_cf
    symbol: a_{cf}
    nombre: aceleracion_centrifuga
    unidad_si: m/s^2
    descripcion: "Aceleracion aparente hacia afuera en marco rotatorio."
  - id: F_cf
    symbol: F_{cf}
    nombre: fuerza_centrifuga
    unidad_si: N
    descripcion: "Termino inercial radial en marco no inercial de rotacion."
