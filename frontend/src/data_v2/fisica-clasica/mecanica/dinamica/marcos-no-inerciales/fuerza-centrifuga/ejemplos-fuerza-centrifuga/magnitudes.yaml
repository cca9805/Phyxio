version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa asociada al ejemplo de rotacion."
  - id: omega
    symbol: \omega
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: "Velocidad angular usada en el caso principal."
  - id: r
    symbol: r
    nombre: radio
    unidad_si: m
    descripcion: "Distancia al eje del movimiento circular."
  - id: v
    symbol: v
    nombre: velocidad_tangencial
    unidad_si: m/s
    descripcion: "Rapidez lineal sobre la trayectoria circular."
  - id: rpm
    symbol: rpm
    nombre: revoluciones_por_minuto
    unidad_si: 1/min
    descripcion: "Frecuencia de giro de equipos y plataformas."
  - id: F_cf
    symbol: F_{cf}
    nombre: fuerza_centrifuga
    unidad_si: N
    descripcion: "Magnitud del efecto centrifugo en el ejemplo planteado."
  - id: omega1
    symbol: \omega_1
    nombre: velocidad_angular_inicial
    unidad_si: rad/s
    descripcion: "Velocidad angular del escenario de referencia."
  - id: omega2
    symbol: \omega_2
    nombre: velocidad_angular_final
    unidad_si: rad/s
    descripcion: "Velocidad angular del escenario comparado."
  - id: ratio
    symbol: R
    nombre: razon_de_fuerzas
    unidad_si: "1"
    descripcion: "Factor de cambio entre fuerzas centrifugas de dos escenarios."
