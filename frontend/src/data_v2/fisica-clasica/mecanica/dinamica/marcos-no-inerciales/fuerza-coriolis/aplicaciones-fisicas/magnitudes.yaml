version: 1
magnitudes:
  - id: omega
    symbol: \Omega
    nombre: velocidad_angular_del_marco
    unidad_si: rad/s
    descripcion: "Velocidad angular del marco rotatorio (por ejemplo, la Tierra)."
  - id: v_rel
    symbol: v_{rel}
    nombre: velocidad_relativa
    unidad_si: m/s
    descripcion: "Velocidad del movil respecto al marco de referencia."
  - id: alpha
    symbol: \alpha
    nombre: angulo_entre_omega_y_v
    unidad_si: rad
    descripcion: "Angulo local entre direccion de rotacion y movimiento."
  - id: a_cor
    symbol: a_{cor}
    nombre: aceleracion_coriolis
    unidad_si: m/s^2
    descripcion: "Aceleracion lateral que produce desviacion de trayectoria."
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa del sistema, necesaria para pasar de aceleracion a fuerza."
  - id: F_cor
    symbol: F_{cor}
    nombre: fuerza_coriolis
    unidad_si: N
    descripcion: "Fuerza equivalente asociada al termino de Coriolis."
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: "Tiempo de evolucion para estimar desviacion acumulada."
  - id: y
    symbol: y
    nombre: desvio_lateral
    unidad_si: m
    descripcion: "Desplazamiento lateral aproximado debido a Coriolis."
