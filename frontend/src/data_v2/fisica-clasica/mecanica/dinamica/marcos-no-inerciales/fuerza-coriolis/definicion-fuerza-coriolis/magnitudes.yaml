version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa del movil analizado."
  - id: omega
    symbol: \Omega
    nombre: velocidad_angular_del_marco
    unidad_si: rad/s
    descripcion: "Velocidad angular del marco de referencia rotatorio."
  - id: v_rel
    symbol: v_{rel}
    nombre: velocidad_relativa
    unidad_si: m/s
    descripcion: "Velocidad del movil respecto al marco que rota."
  - id: alpha
    symbol: \alpha
    nombre: angulo_entre_omega_y_v
    unidad_si: rad
    descripcion: "Angulo entre el eje de rotacion y la velocidad relativa."
  - id: a_cor
    symbol: a_{cor}
    nombre: aceleracion_coriolis
    unidad_si: m/s^2
    descripcion: "Aceleracion lateral asociada al efecto Coriolis."
  - id: F_cor
    symbol: F_{cor}
    nombre: fuerza_coriolis
    unidad_si: N
    descripcion: "Modulo del termino de Coriolis en la ecuacion dinamica."
