version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa del cuerpo. Escala linealmente la fuerza ficticia."
  - id: a_marco
    symbol: a_{marco}
    nombre: aceleracion_del_marco
    unidad_si: m/s^2
    descripcion: "Aceleracion del sistema de referencia no inercial."
  - id: F_fict
    symbol: F_{fict}
    nombre: fuerza_ficticia
    unidad_si: N
    descripcion: "Termino inercial que compensa el uso de un marco acelerado."
  - id: F_real
    symbol: F_{real}
    nombre: fuerza_real_resultante
    unidad_si: N
    descripcion: "Suma de fuerzas de interaccion reales proyectadas en el eje de estudio."
  - id: a_rel
    symbol: a_{rel}
    nombre: aceleracion_relativa
    unidad_si: m/s^2
    descripcion: "Aceleracion observada dentro del marco no inercial."
  - id: a_in
    symbol: a_{in}
    nombre: aceleracion_inercial
    unidad_si: m/s^2
    descripcion: "Aceleracion del mismo cuerpo en un marco inercial."
