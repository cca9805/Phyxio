version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: "Masa del objeto en estudio."
  - id: a_in
    symbol: a_{in}
    nombre: aceleracion_inercial
    unidad_si: m/s^2
    descripcion: "Aceleracion observada desde un marco inercial."
  - id: a_rel
    symbol: a_{rel}
    nombre: aceleracion_relativa
    unidad_si: m/s^2
    descripcion: "Aceleracion observada desde el marco no inercial."
  - id: a_marco
    symbol: a_{marco}
    nombre: aceleracion_del_marco
    unidad_si: m/s^2
    descripcion: "Aceleracion del propio sistema de referencia."
  - id: F_real
    symbol: F_{real}
    nombre: fuerza_real_resultante
    unidad_si: N
    descripcion: "Suma de interacciones fisicas reales en el eje analizado."
  - id: F_fict
    symbol: F_{fict}
    nombre: fuerza_ficticia
    unidad_si: N
    descripcion: "Termino inercial de correccion al usar marco acelerado."
