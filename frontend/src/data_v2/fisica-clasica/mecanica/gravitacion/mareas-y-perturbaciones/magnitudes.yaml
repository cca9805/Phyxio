version: 1
magnitudes:
  - id: G
    symbol: G
    nombre: constante_gravitacion
    unidad_si: N*m^2/kg^2
    descripcion: Constante universal de gravitación.
  - id: M
    symbol: M
    nombre: masa_perturbadora
    unidad_si: kg
    descripcion: Masa del cuerpo perturbador.
  - id: R
    symbol: R
    nombre: radio_cuerpo_afectado
    unidad_si: m
