version: 1
topic:
  id: leyes-de-kepler
  title: Leyes de Kepler
variables:
  - id: G
    symbol: G
    nombre: constante de gravitación
    unidad_si: N*m^2/kg^2
    descripcion: Constante universal de gravitación.
  - id: M
    symbol: M
    nombre: masa central
    unidad_si: kg
    descripcion: Masa del cuerpo central.
  - id: mu
    symbol: \mu
    nombre: parametro gravitatorio
    unidad_si: m^3/s^2
    descripcion: Parámetro gravitatorio, mu = GM.
  - id: a
    symbol: a
    nombre: semieje mayor
    unidad_si: m
    descripcion: Semieje mayor orbital.
  - id: b
    symbol: b
    nombre: semieje menor
    unidad_si: m
    descripcion: Semieje menor orbital.
  - id: e
    symbol: e
    nombre: excentricidad
    unidad_si: 1
    descripcion: Excentricidad de la órbita.
  - id: r
    symbol: r
    nombre: radio instantaneo
    unidad_si: m
    descripcion: Distancia al foco.
  - id: theta
    symbol: \theta
    nombre: anomalia verdadera
    unidad_si: rad
    descripcion: Posición angular orbital.
  - id: T
    symbol: T
    nombre: periodo orbital
    unidad_si: s
    descripcion: Período orbital.
  - id: T1
    symbol: T_1
    nombre: periodo 1
    unidad_si: s
    descripcion: Período de órbita 1.
  - id: T2
    symbol: T_2
    nombre: periodo 2
    unidad_si: s
    descripcion: Período de órbita 2.
  - id: a1
    symbol: a_1
    nombre: semieje 1
    unidad_si: m
    descripcion: Semieje mayor de órbita 1.
  - id: a2
    symbol: a_2
    nombre: semieje 2
    unidad_si: m
    descripcion: Semieje mayor de órbita 2.
formulas:
  - id: primera_ley_polar
    title: Ecuación polar de la elipse
    equation: r = a*(1 - e^2)/(1 + e*cos(theta))
    latex: r(\theta)=\frac{a(1-e^2)}{1+e\cos\theta}
    rearrangements:
      - target: r
        equation: r = a*(1 - e^2)/(1 + e*cos(theta))
        latex: r(\theta)=\frac{a(1-e^2)}{1+e\cos\theta}
      - target: a
        equation: a = r*(1 + e*cos(theta))/(1 - e^2)
        latex: a=\frac{r(1+e\cos\theta)}{1-e^2}
    constraints:
      - expr: a > 0
        message: a debe ser mayor que 0.
      - expr: e >= 0
        message: e debe ser no negativa.
      - expr: e < 1
        message: Para elipse ligada, e debe ser menor que 1.

  - id: tercera_ley_absoluta
    title: Tercera ley de Kepler (forma absoluta)
    equation: T = 2*pi*sqrt(a^3/(G*M))
    latex: T=2\pi\sqrt{\frac{a^3}{GM}}
    rearrangements:
      - target: T
        equation: T = 2*pi*sqrt(a^3/(G*M))
        latex: T=2\pi\sqrt{\frac{a^3}{GM}}
      - target: a
        equation: a = (G*M*T^2/(4*pi^2))^(1/3)
        latex: a=\sqrt[3]{\frac{GMT^2}{4\pi^2}}
      - target: M
        equation: M = 4*pi^2*a^3/(G*T^2)
        latex: M=\frac{4\pi^2a^3}{GT^2}
    constraints:
      - expr: a > 0
        message: a debe ser mayor que 0.
      - expr: T > 0
        message: T debe ser mayor que 0.
      - expr: M > 0
        message: M debe ser mayor que 0.

  - id: tercera_ley_comparativa
    title: Tercera ley (comparación misma masa central)
    equation: T2 = T1*(a2/a1)^(3/2)
    latex: T_2=T_1\left(\frac{a_2}{a_1}\right)^{3/2}
    rearrangements:
      - target: T2
        equation: T2 = T1*(a2/a1)^(3/2)
        latex: T_2=T_1\left(\frac{a_2}{a_1}\right)^{3/2}
      - target: a2
        equation: a2 = a1*(T2/T1)^(2/3)
        latex: a_2=a_1\left(\frac{T_2}{T_1}\right)^{2/3}
    constraints:
      - expr: a1 > 0
        message: a1 debe ser mayor que 0.
      - expr: a2 > 0
        message: a2 debe ser mayor que 0.
      - expr: T1 > 0
        message: T1 debe ser mayor que 0.
      - expr: T2 > 0
        message: T2 debe ser mayor que 0.

  - id: velocidad_areal_conceptual
    title: Segunda ley de Kepler (conceptual)
    equation: dA_dt = cte
    latex: \frac{dA}{dt}=\text{cte}
    calculable: false
    motivo_no_calculable: Es ley de conservación areal; requiere geometría temporal para cálculo explícito.

  - id: relacion_momento_angular_conceptual
    title: Relación con momento angular (conceptual)
    equation: dA_dt = L/(2*m)
    latex: \frac{dA}{dt}=\frac{L}{2m}
    calculable: false
    motivo_no_calculable: Requiere variables dinámicas adicionales no definidas en este nivel de entrada.

ui:
  default_formula: tercera_ley_absoluta
  groups:
    - title: Formulas calculables
      items:
        - primera_ley_polar
        - tercera_ley_absoluta
        - tercera_ley_comparativa
    - title: Formulas conceptuales
      items:
        - velocidad_areal_conceptual
        - relacion_momento_angular_conceptual
