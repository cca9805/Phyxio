    descripcion: Semieje mayor orbital.
  - id: b
    symbol: b
    nombre: semieje_menor
    unidad_si: m
    descripcion: Semieje menor orbital.
  - id: e
    symbol: e
    nombre: excentricidad
    unidad_si: 1
    descripcion: Parámetro adimensional de forma orbital.
  - id: r
    symbol: r
    nombre: radio_instantaneo
    unidad_si: m
    descripcion: Distancia instantánea al foco.
