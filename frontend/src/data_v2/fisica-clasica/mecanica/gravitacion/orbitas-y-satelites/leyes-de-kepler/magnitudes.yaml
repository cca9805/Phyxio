  - id: a1
    symbol: a_1
    nombre: semieje_1
    unidad_si: m
    descripcion: Semieje mayor de órbita 1.
  - id: a2
    symbol: a_2
    nombre: semieje_2
    unidad_si: m
    descripcion: Semieje mayor de órbita 2.
  - id: A
    symbol: A
    nombre: area_barrida
    unidad_si: m^2
    descripcion: Área barrida por el radio vector orbital.
  - id: dA_dt
    symbol: dA/dt
    nombre: velocidad_areal
    unidad_si: m^2/s
