    symbol: G
    nombre: constante_gravitacion
    unidad_si: N*m^2/kg^2
    descripcion: Constante universal de gravitación.
  - id: M
    symbol: M
    nombre: masa_central
    unidad_si: kg
    descripcion: Masa del cuerpo central.
  - id: mu
    symbol: \mu
    nombre: parametro_gravitatorio
    unidad_si: m^3/s^2
    descripcion: Parámetro gravitatorio estándar, mu = GM.
