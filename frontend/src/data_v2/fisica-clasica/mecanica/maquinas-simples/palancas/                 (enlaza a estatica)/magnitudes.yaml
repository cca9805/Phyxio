version: 1
magnitudes:
  - id: P
    symbol: P
    nombre: fuerza_aplicada
    unidad_si: N
    descripcion: Fuerza que aplica el operador.
  - id: R
    symbol: R
    nombre: fuerza_resistente
    unidad_si: N
    descripcion: Carga o resistencia que se desea mover.
  - id: bP
    symbol: b_P
    nombre: brazo_de_potencia
    unidad_si: m
    descripcion: Distancia perpendicular desde la linea de accion de P al fulcro.
  - id: bR
    symbol: b_R
    nombre: brazo_de_resistencia
    unidad_si: m
    descripcion: Distancia perpendicular desde la linea de accion de R al fulcro.
  - id: tauP
    symbol: \tau_P
    nombre: momento_de_potencia
    unidad_si: N*m
    descripcion: Momento creado por la fuerza P.
  - id: tauR
    symbol: \tau_R
    nombre: momento_de_resistencia
    unidad_si: N*m
    descripcion: Momento creado por la fuerza R.
  - id: VM
    symbol: VM
    nombre: ventaja_mecanica_ideal
    unidad_si: '1'
    descripcion: Relacion ideal entre la carga y la fuerza aplicada.
  - id: eta
    symbol: \eta
    nombre: rendimiento
    unidad_si: '1'
    descripcion: Eficiencia real del sistema; toma valores entre 0 y 1.
  - id: VMreal
    symbol: VM_{real}
    nombre: ventaja_mecanica_real
    unidad_si: '1'
    descripcion: Ventaja mecanica efectiva con perdidas.
