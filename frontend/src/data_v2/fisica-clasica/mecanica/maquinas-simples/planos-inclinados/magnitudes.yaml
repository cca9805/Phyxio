version: 1
magnitudes:
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Cantidad de materia del cuerpo.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion gravitatoria local.
  - id: theta
    symbol: \theta
    nombre: angulo_del_plano
    unidad_si: rad
    descripcion: Inclinacion del plano respecto a la horizontal.
  - id: N
    symbol: N
    nombre: fuerza_normal
    unidad_si: N
    descripcion: Reaccion perpendicular de la superficie.
  - id: mu
    symbol: \mu
    nombre: coeficiente_de_rozamiento
    unidad_si: '1'
    descripcion: Parametro adimensional de friccion.
  - id: f
    symbol: f
    nombre: fuerza_de_rozamiento
    unidad_si: N
    descripcion: Fuerza de contacto tangencial opuesta al movimiento relativo.
  - id: Wpar
    symbol: W_{\parallel}
    nombre: componente_paralela_del_peso
    unidad_si: N
    descripcion: Componente del peso en direccion del plano.
  - id: Wperp
    symbol: W_{\perp}
    nombre: componente_perpendicular_del_peso
    unidad_si: N
    descripcion: Componente del peso normal al plano.
  - id: Fnet
    symbol: F_{net}
    nombre: fuerza_neta
    unidad_si: N
    descripcion: Fuerza resultante sobre el eje del movimiento.
  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Tasa de cambio de la velocidad sobre la rampa.
  - id: Fmin
    symbol: F_{min}
    nombre: fuerza_minima_de_subida
    unidad_si: N
    descripcion: Fuerza minima para subir a velocidad constante.
