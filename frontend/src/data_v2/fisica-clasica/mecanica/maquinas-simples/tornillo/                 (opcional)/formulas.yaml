version: 1
topic:
  id: tornillo
  title: Tornillo
variables:
  - id: R
    symbol: R
    nombre: carga_axial
    unidad_si: N
    descripcion: Fuerza resistente axial.
  - id: F
    symbol: F
    nombre: fuerza_tangencial
    unidad_si: N
    descripcion: Fuerza aplicada en el mango o periferia.
  - id: r
    symbol: r
    nombre: radio_efectivo
    unidad_si: m
    descripcion: Distancia al eje donde se aplica la fuerza.
  - id: p
    symbol: p
    nombre: paso_de_rosca
    unidad_si: m
    descripcion: Avance axial por vuelta.
  - id: eta
    symbol: \eta
    nombre: rendimiento
    unidad_si: '1'
    descripcion: Eficiencia global del sistema roscado.
  - id: VM
    symbol: VM
    nombre: ventaja_mecanica
    unidad_si: '1'
    descripcion: Multiplicacion de fuerza axial respecto a fuerza aplicada.
  - id: tau
    symbol: \tau
    nombre: torque
    unidad_si: N*m
    descripcion: Momento de fuerza aplicado al tornillo.
formulas:
  - id: ventaja_mecanica_ideal
    title: Ventaja mecanica ideal
    equation: VM = (2*pi*r)/p
    latex: VM=\frac{2\pi r}{p}
    rearrangements:
      - target: VM
        equation: VM = (2*pi*r)/p
        latex: VM=\frac{2\pi r}{p}
      - target: r
        equation: r = (VM*p)/(2*pi)
        latex: r=\frac{VM\,p}{2\pi}
      - target: p
        equation: p = (2*pi*r)/VM
        latex: p=\frac{2\pi r}{VM}
    constraints:
      - expr: p > 0
        message: p debe ser mayor que 0.
  - id: fuerza_ideal
    title: Fuerza ideal de accionamiento
    equation: F = (R*p)/(2*pi*r)
    latex: F=\frac{R\,p}{2\pi r}
    rearrangements:
      - target: F
        equation: F = (R*p)/(2*pi*r)
        latex: F=\frac{R\,p}{2\pi r}
      - target: R
        equation: R = (2*pi*r*F)/p
        latex: R=\frac{2\pi rF}{p}
      - target: p
        equation: p = (2*pi*r*F)/R
        latex: p=\frac{2\pi rF}{R}
      - target: r
        equation: r = (R*p)/(2*pi*F)
        latex: r=\frac{R\,p}{2\pi F}
    constraints:
      - expr: r > 0
        message: r debe ser mayor que 0.
  - id: fuerza_real
    title: Fuerza real de accionamiento
    equation: F = (R*p)/(2*pi*r*eta)
    latex: F=\frac{R\,p}{2\pi r\,\eta}
    rearrangements:
      - target: F
        equation: F = (R*p)/(2*pi*r*eta)
        latex: F=\frac{R\,p}{2\pi r\,\eta}
      - target: eta
        equation: eta = (R*p)/(2*pi*r*F)
        latex: \eta=\frac{R\,p}{2\pi rF}
      - target: R
        equation: R = (2*pi*r*eta*F)/p
        latex: R=\frac{2\pi r\eta F}{p}
    constraints:
      - expr: eta > 0
        message: eta debe ser mayor que 0.
      - expr: eta <= 1
        message: eta debe ser menor o igual que 1.
  - id: torque
    title: Torque aplicado
    equation: tau = F*r
    latex: \tau=Fr
    rearrangements:
      - target: tau
        equation: tau = F*r
        latex: \tau=Fr
      - target: F
        equation: F = tau/r
        latex: F=\frac{\tau}{r}
      - target: r
        equation: r = tau/F
        latex: r=\frac{\tau}{F}
    constraints:
      - expr: r > 0
        message: r debe ser mayor que 0.
  - id: trabajo_por_vuelta
    title: Trabajo por vuelta (conceptual)
    equation: F*(2*pi*r) = R*p
    latex: F(2\pi r)=R\,p
    calculable: false
    motivo_no_calculable: Es una igualdad energetica por vuelta. Se usa para justificar formulas, no como solucion directa sin contexto de giro y avance.
ui:
  default_formula: fuerza_real
  groups:
    - title: Geometria y ventaja
      items:
        - ventaja_mecanica_ideal
    - title: Fuerza y torque
      items:
        - fuerza_ideal
        - fuerza_real
        - torque
    - title: Relacion conceptual
      items:
        - trabajo_por_vuelta
