version: 1
magnitudes:
  - id: R
    symbol: R
    nombre: carga_axial
    unidad_si: N
    descripcion: Resistencia axial que se quiere vencer.
  - id: F
    symbol: F
    nombre: fuerza_tangencial
    unidad_si: N
    descripcion: Fuerza aplicada al brazo o mango.
  - id: r
    symbol: r
    nombre: radio_efectivo
    unidad_si: m
    descripcion: Distancia desde el eje a la linea de accion de F.
  - id: p
    symbol: p
    nombre: paso_de_rosca
    unidad_si: m
    descripcion: Avance axial por vuelta completa.
  - id: eta
    symbol: \eta
    nombre: rendimiento
    unidad_si: '1'
    descripcion: Eficiencia del tornillo en condiciones reales.
  - id: VM
    symbol: VM
    nombre: ventaja_mecanica
    unidad_si: '1'
    descripcion: Relacion entre carga axial y fuerza de accionamiento.
  - id: tau
    symbol: \tau
    nombre: torque
    unidad_si: N*m
    descripcion: Momento aplicado alrededor del eje.
