    nombre: masa
    unidad_si: kg
    descripcion: Masa de la bobina.
  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Desviacion angular.
  - id: tau
    symbol: \tau
    nombre: torque
    unidad_si: N*m
    descripcion: Momento restaurador.
