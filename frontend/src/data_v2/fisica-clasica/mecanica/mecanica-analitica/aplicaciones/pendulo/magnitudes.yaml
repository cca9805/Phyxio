    nombre: longitud
    unidad_si: m
    descripcion: Longitud efectiva del pendulo.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion local de gravedad.
  - id: omega
    symbol: \omega
