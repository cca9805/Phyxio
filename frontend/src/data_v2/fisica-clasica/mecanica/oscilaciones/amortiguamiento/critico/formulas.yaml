version: 1
topic:
  id: critico
  title: Amortiguamiento crítico
variables:
  - id: omega0
    symbol: \omega_0
    nombre: pulsacion natural
    unidad_si: rad/s
    descripcion: Pulsacion natural.
  - id: x
    symbol: x
    nombre: desplazamiento
    unidad_si: m
    descripcion: Desplazamiento.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: tau
    symbol: \tau
    nombre: tiempo caracteristico
    unidad_si: s
    descripcion: Tiempo caracteristico.
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: Amplitud de oscilación.
  - id: gamma
    symbol: \gamma
    nombre: coeficiente de amortiguamiento
    unidad_si: 1/s
    descripcion: Coeficiente lineal de amortiguamiento.
formulas:
  - id: solucion_critica
    title: Solucion critica simplificada
    equation: x = A*(1 + omega0*t)*exp(-omega0*t)
    latex: x=A(1+\omega_0t)e^{-\omega_0t}
    rearrangements:
      - target: x
        equation: x = A*(1 + omega0*t)*exp(-omega0*t)
        latex: x=A(1+\omega_0t)e^{-\omega_0t}
    constraints:
      - expr: omega0 > 0
        message: omega0 debe ser mayor que 0.
  - id: tiempo_caracteristico
    title: Tiempo caracteristico
    equation: tau = 1/omega0
    latex: \tau=\frac{1}{\omega_0}
    rearrangements:
      - target: tau
        equation: tau = 1/omega0
        latex: \tau=\frac{1}{\omega_0}
      - target: omega0
        equation: omega0 = 1/tau
        latex: \omega_0=\frac{1}{\tau}
    constraints:
      - expr: omega0 > 0
        message: omega0 debe ser mayor que 0.
      - expr: tau > 0
        message: tau debe ser mayor que 0.
  - id: condicion_critica
    title: Condición de régimen crítico (conceptual)
    equation: gamma = omega0
    latex: \gamma=\omega_0
    calculable: false
    motivo_no_calculable: Es una condición de diseño para transición entre oscilatorio y no oscilatorio.
ui:
  default_formula: solucion_critica
  groups:
    - title: Fórmulas calculables
      items:
        - solucion_critica
        - tiempo_caracteristico
    - title: Fórmulas conceptuales
      items:
        - condicion_critica
