version: 1
topic:
  id: subamortiguado
  title: Régimen subamortiguado
variables:
  - id: A
    symbol: A
    nombre: amplitud inicial
    unidad_si: m
    descripcion: Amplitud inicial.
  - id: gamma
    symbol: \gamma
    nombre: coeficiente de amortiguamiento
    unidad_si: 1/s
    descripcion: Coeficiente de amortiguamiento.
  - id: omega0
    symbol: \omega_0
    nombre: pulsacion natural
    unidad_si: rad/s
    descripcion: Pulsacion natural.
  - id: omega_d
    symbol: \omega_d
    nombre: pulsacion amortiguada
    unidad_si: rad/s
    descripcion: Pulsacion amortiguada.
  - id: x
    symbol: x
    nombre: desplazamiento
    unidad_si: m
    descripcion: Desplazamiento.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: phi
    symbol: \varphi
    nombre: fase inicial
    unidad_si: rad
    descripcion: Fase inicial.
  - id: x_env
    symbol: x_{env}
    nombre: envolvente
    unidad_si: m
    descripcion: Envolvente exponencial de amplitud.
formulas:
  - id: pulsacion_amortiguada
    title: Pulsacion amortiguada
    equation: omega_d = sqrt(omega0^2 - gamma^2)
    latex: \omega_d=\sqrt{\omega_0^2-\gamma^2}
    rearrangements:
      - target: omega_d
        equation: omega_d = sqrt(omega0^2 - gamma^2)
        latex: \omega_d=\sqrt{\omega_0^2-\gamma^2}
      - target: omega0
        equation: omega0 = sqrt(omega_d^2 + gamma^2)
        latex: \omega_0=\sqrt{\omega_d^2+\gamma^2}
    constraints:
      - expr: gamma > 0
        message: gamma debe ser mayor que 0.
      - expr: omega0 > 0
        message: omega0 debe ser mayor que 0.
      - expr: omega_d > 0
        message: omega_d debe ser mayor que 0.
      - expr: omega0 > gamma
        message: Para régimen subamortiguado debe cumplirse omega0 > gamma.
  - id: solucion_subamortiguada
    title: Solucion temporal
    equation: x = A*exp(-gamma*t)*cos(omega_d*t + phi)
    latex: x=Ae^{-\gamma t}\cos(\omega_d t+\varphi)
    rearrangements:
      - target: x
        equation: x = A*exp(-gamma*t)*cos(omega_d*t + phi)
        latex: x=Ae^{-\gamma t}\cos(\omega_d t+\varphi)
    constraints:
      - expr: A > 0
        message: A debe ser mayor que 0.
      - expr: gamma > 0
        message: gamma debe ser mayor que 0.
      - expr: omega_d > 0
        message: omega_d debe ser mayor que 0.
  - id: envolvente
    title: Envolvente
    equation: x_env = A*exp(-gamma*t)
    latex: x_{env}=Ae^{-\gamma t}
    rearrangements:
      - target: x_env
        equation: x_env = A*exp(-gamma*t)
        latex: x_{env}=Ae^{-\gamma t}
    constraints:
      - expr: A > 0
        message: A debe ser mayor que 0.
      - expr: gamma > 0
        message: gamma debe ser mayor que 0.
  - id: condicion_subamortiguado
    title: Condición de régimen subamortiguado (conceptual)
    equation: gamma < omega0
    latex: \gamma<\omega_0
    calculable: false
    motivo_no_calculable: Es un criterio de clasificación del régimen dinámico.
ui:
  default_formula: solucion_subamortiguada
  groups:
    - title: Fórmulas calculables
      items:
        - pulsacion_amortiguada
        - solucion_subamortiguada
        - envolvente
    - title: Fórmulas conceptuales
      items:
        - condicion_subamortiguado
