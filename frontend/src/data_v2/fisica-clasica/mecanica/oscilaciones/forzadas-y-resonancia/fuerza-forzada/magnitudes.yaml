version: 1
magnitudes:
  - id: F0
    symbol: F_0
    nombre: amplitud_fuerza
    unidad_si: "N"
    descripcion: Intensidad de excitacion periodica.
  - id: omega_f
    symbol: \omega_f
    nombre: pulsacion_forzada
    unidad_si: rad/s
    descripcion: Frecuencia angular de la fuerza externa.
  - id: X
    symbol: X
    nombre: amplitud_estacionaria
    unidad_si: m
    descripcion: Amplitud de la respuesta en regimen permanente.
  - id: delta
    symbol: \delta
    nombre: desfase
    unidad_si: rad
    descripcion: Retraso de la respuesta respecto al forzado.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa.
  - id: k
    symbol: k
    nombre: constante_elastica
    unidad_si: N/m
    descripcion: Constante elastica.
  - id: b
    symbol: b
    nombre: amortiguamiento_viscoso
    unidad_si: N*s/m
    descripcion: Amortiguamiento viscoso.
  - id: x
    symbol: x
    nombre: desplazamiento
    unidad_si: m
    descripcion: Desplazamiento.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: x_dd
    symbol: \ddot x
    nombre: aceleración
    unidad_si: m/s^2
    descripcion: Segunda derivada temporal de x.
  - id: x_d
    symbol: \dot x
    nombre: velocidad
    unidad_si: m/s
    descripcion: Primera derivada temporal de x.
