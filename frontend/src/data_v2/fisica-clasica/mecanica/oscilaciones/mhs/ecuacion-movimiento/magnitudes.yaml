version: 1
magnitudes:
  - id: x
    symbol: x
    nombre: desplazamiento
    unidad_si: m
    descripcion: Posicion respecto al equilibrio.
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: Maximo desplazamiento absoluto.
  - id: omega
    symbol: \omega
    nombre: pulsacion
    unidad_si: rad/s
    descripcion: Velocidad angular de oscilacion.
  - id: phi
    symbol: \varphi
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Fase en t=0.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Derivada temporal de x.
  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Derivada temporal de v.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: x_dd
    symbol: \ddot x
    nombre: aceleración
    unidad_si: m/s^2
    descripcion: Segunda derivada temporal de x.
