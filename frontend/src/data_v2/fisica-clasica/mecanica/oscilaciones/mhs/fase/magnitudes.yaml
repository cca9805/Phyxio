version: 1
magnitudes:
  - id: phi
    symbol: \varphi
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Estado angular en el origen temporal.
  - id: delta_phi
    symbol: \Delta\varphi
    nombre: desfase
    unidad_si: rad
    descripcion: Diferencia de fase entre oscilaciones.
  - id: omega
    symbol: \omega
    nombre: pulsacion
    unidad_si: rad/s
    descripcion: Tasa de avance de fase.
  - id: x
    symbol: x
    nombre: desplazamiento
    unidad_si: m
    descripcion: Variable de posicion.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Derivada temporal de x.
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: Amplitud.
  - id: phi_t
    symbol: \varphi_t
    nombre: fase_instantánea
    unidad_si: rad
    descripcion: Fase evaluada en un instante de tiempo.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: phi2
    symbol: \varphi_2
    nombre: fase_2
    unidad_si: rad
    descripcion: Fase del oscilador 2.
  - id: phi1
    symbol: \varphi_1
    nombre: fase_1
    unidad_si: rad
    descripcion: Fase del oscilador 1.
