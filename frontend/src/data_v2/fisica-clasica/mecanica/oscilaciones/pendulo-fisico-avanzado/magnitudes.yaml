version: 1
magnitudes:
  - id: I_O
    symbol: I_O
    nombre: momento_inercia_eje
    unidad_si: kg*m^2
    descripcion: Inercia rotacional respecto al eje real de giro.
  - id: I_cm
    symbol: I_{CM}
    nombre: momento_inercia_cm
    unidad_si: kg*m^2
    descripcion: Inercia respecto al centro de masas.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo rígido.
  - id: d
    symbol: d
    nombre: brazo_gravitatorio
    unidad_si: m
    descripcion: Distancia eje-centro de masas.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleración gravitatoria local.
  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Desplazamiento angular respecto al equilibrio.
  - id: omega0
    symbol: \omega_0
    nombre: pulsacion_natural
    unidad_si: rad/s
    descripcion: Frecuencia angular en aproximación lineal.
  - id: T0
    symbol: T_0
    nombre: periodo_lineal
    unidad_si: s
    descripcion: Periodo para oscilaciones pequeñas.
  - id: leq
    symbol: \ell_{eq}
    nombre: longitud_equivalente
    unidad_si: m
    descripcion: Longitud del péndulo simple equivalente.
  - id: theta_dd
    symbol: \ddot\theta
    nombre: aceleración_angular
    unidad_si: rad/s^2
    descripcion: Segunda derivada temporal de theta.
  - id: E
    symbol: E
    nombre: energía
    unidad_si: J
    descripcion: Energía mecánica.
  - id: theta_dot
    symbol: \dot\theta
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Primera derivada temporal de theta.
