version: 1
magnitudes:
  - id: I
    symbol: I
    nombre: momento_inercia
    unidad_si: kg*m^2
    descripcion: Inercia rotacional del cuerpo respecto al eje.
  - id: m
    symbol: m
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo rígido.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleración gravitatoria local.
  - id: d
    symbol: d
    nombre: brazo_gravitatorio
    unidad_si: m
    descripcion: Distancia eje-centro de masas.
  - id: omega0
    symbol: \omega_0
    nombre: pulsacion_natural
    unidad_si: rad/s
    descripcion: Frecuencia angular natural en aproximación lineal.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Duración de una oscilación completa.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Oscilaciones por segundo.
  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Separación angular respecto al equilibrio.
  - id: theta_dd
    symbol: \ddot\theta
    nombre: aceleración_angular
    unidad_si: rad/s^2
    descripcion: Segunda derivada temporal de theta.
