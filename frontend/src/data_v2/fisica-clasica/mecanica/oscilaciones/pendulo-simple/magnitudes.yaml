version: 1
magnitudes:
  - id: L
    symbol: L
    nombre: longitud
    unidad_si: m
    descripcion: Longitud del hilo o varilla ligera.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion local de gravedad.
  - id: theta
    symbol: \theta
    nombre: desplazamiento_angular
    unidad_si: rad
    descripcion: Angulo respecto a la vertical.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de oscilacion completa.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Inversa del periodo.
  - id: omega0
    symbol: \omega_0
    nombre: pulsacion_natural
    unidad_si: rad/s
    descripcion: Pulsacion natural.
  - id: theta0
    symbol: \theta_0
    nombre: amplitud_angular
    unidad_si: rad
    descripcion: Amplitud angular inicial.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo.
  - id: phi
    symbol: \varphi
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Fase inicial.
  - id: theta_dd
    symbol: \ddot\theta
    nombre: aceleración_angular
    unidad_si: rad/s^2
    descripcion: Segunda derivada temporal de theta.
