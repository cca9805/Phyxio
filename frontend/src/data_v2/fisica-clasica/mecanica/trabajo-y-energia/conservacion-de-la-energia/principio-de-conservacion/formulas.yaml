version: 1
topic:
  id: principio-de-conservacion
  title: Principio de conservacion de la energia
variables:
- id: Em
  symbol: E_m
  nombre: energia mecanica
  unidad_si: J
  descripcion: Energia mecanica.
- id: Ki
  symbol: K_i
  nombre: energia cinetica inicial
  unidad_si: J
  descripcion: Energia cinetica inicial.
- id: Kf
  symbol: K_f
  nombre: energia cinetica final
  unidad_si: J
  descripcion: Energia cinetica final.
- id: Ui
  symbol: U_i
  nombre: energia potencial inicial
  unidad_si: J
  descripcion: Energia potencial inicial.
- id: Uf
  symbol: U_f
  nombre: energia potencial final
  unidad_si: J
  descripcion: Energia potencial final.
- id: Wnc
  symbol: W_{nc}
  nombre: trabajo no conservativo
  unidad_si: J
  descripcion: Trabajo no conservativo.
formulas:
- id: conservacion_mecanica
  title: Conservacion de energia mecanica
  equation: Ki + Ui = Kf + Uf
  latex: K_i+U_i = K_f+U_f
  rearrangements:
  - target: Kf
    equation: Kf = Ki + Ui - Uf
    latex: K_f = K_i + U_i - U_f
  - target: Uf
    equation: Uf = Ki + Ui - Kf
    latex: U_f = K_i + U_i - K_f
- id: energia_mecanica_total
  title: Energia mecanica total
  equation: Em = K + U
  latex: E_m=K+U
  rearrangements:
  - target: Em
    equation: Em = K + U
    latex: E_m=K+U
- id: balance_con_no_conservativas
  title: Balance con trabajo no conservativo
  equation: Wnc = (Kf + Uf) - (Ki + Ui)
  latex: W_{nc}=(K_f+U_f)-(K_i+U_i)
  rearrangements:
  - target: Wnc
    equation: Wnc = (Kf + Uf) - (Ki + Ui)
    latex: W_{nc}=(K_f+U_f)-(K_i+U_i)
  - target: Kf
    equation: Kf = Ki + Ui + Wnc - Uf
    latex: K_f=K_i+U_i+W_{nc}-U_f
ui:
  default_formula: conservacion_mecanica
  groups:
  - title: Basicas
    items:
    - conservacion_mecanica
    - energia_mecanica_total
    - balance_con_no_conservativas
