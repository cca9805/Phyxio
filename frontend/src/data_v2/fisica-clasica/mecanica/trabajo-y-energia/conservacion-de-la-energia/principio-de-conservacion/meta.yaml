objetivos:
  - Aplicar Em_i = Em_f en sistemas ideales.
  - Resolver variables de estado (v, h, x) con balances de energia.
  - Identificar condiciones de validez del modelo conservativo.
  - Interpretar conversiones entre energia cinetica y potencial.

suposiciones:
  - Ausencia de rozamiento y otras perdidas disipativas.
  - Campo gravitatorio uniforme para U_g = mgh cuando proceda.
  - Resorte lineal ideal para U_e = 1/2 kx^2 cuando proceda.

