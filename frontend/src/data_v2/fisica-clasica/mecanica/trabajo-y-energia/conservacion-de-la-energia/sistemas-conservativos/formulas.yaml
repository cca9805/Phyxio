formulas:
- id: trabajo_conservativo
  title: Trabajo de fuerza conservativa
  equation: Wc = -dU
  latex: W_c = -\Delta U
  rearrangements:
  - target: Wc
    equation: Wc = -dU
    latex: W_c = -\Delta U
  - target: dU
    equation: dU = -Wc
    latex: \Delta U = -W_c
- id: conservacion_energia_mecanica
  title: Conservacion mecanica
  equation: Em = K + U
  latex: E_m=K+U=\text{cte}
  motivo_no_calculable: Es relacion estructural del modelo; para calculo se usan estados inicial/final.
  status: descriptive
- id: estados_conservativos
  title: Estados inicial y final en sistema conservativo
  equation: Ki + Ui = Kf + Uf
  latex: K_i+U_i=K_f+U_f
  rearrangements:
  - target: Kf
    equation: Kf = Ki + Ui - Uf
    latex: K_f=K_i+U_i-U_f
  - target: Uf
    equation: Uf = Ki + Ui - Kf
    latex: U_f=K_i+U_i-K_f
- id: extension_no_conservativa
  title: Extension con fuerzas no conservativas
  equation: Wnc = (Kf + Uf) - (Ki + Ui)
  latex: W_{nc}=(K_f+U_f)-(K_i+U_i)
  rearrangements:
  - target: Wnc
    equation: Wnc = (Kf + Uf) - (Ki + Ui)
    latex: W_{nc}=(K_f+U_f)-(K_i+U_i)
ui:
  default_formula: estados_conservativos
  groups:
  - title: Basicas
    items:
    - trabajo_conservativo
    - conservacion_energia_mecanica
    - estados_conservativos
    - extension_no_conservativa
