objetivos:
  - Distinguir fuerzas conservativas y no conservativas.
  - Verificar independencia de trayectoria del trabajo conservativo.
  - Aplicar Em = K + U en escenarios gravitatorios y elastico-gravitatorios.
  - Interpretar diagramas de conversion energetica en movimiento.

suposiciones:
  - Fuerzas conservativas dominantes en el modelo principal.
  - Sin disipacion significativa salvo cuando se explicite.
  - Variables definidas en SI.

