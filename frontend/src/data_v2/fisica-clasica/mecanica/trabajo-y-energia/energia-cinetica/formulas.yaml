formulas:
- id: energia_cinetica_basica
  title: Energia cinetica traslacional
  equation: K = 0.5*m*v^2
  latex: K=\frac{1}{2}mv^2
  rearrangements:
  - target: K
    equation: K = 0.5*m*v^2
    latex: K=\frac{1}{2}mv^2
  - target: m
    equation: m = 2*K/(v^2)
    latex: m=\frac{2K}{v^2}
  - target: v
    equation: v = sqrt(2*K/m)
    latex: v=\sqrt{\frac{2K}{m}}
  constraints:
  - expr: m > 0
    message: m debe ser mayor que 0.
  - expr: v >= 0
    message: v no puede ser negativa en modulo.
- id: variacion_energia_cinetica
  title: Cambio de energia cinetica
  equation: dK = Kf - Ki
  latex: \Delta K = K_f-K_i
  rearrangements:
  - target: dK
    equation: dK = Kf - Ki
    latex: \Delta K = K_f-K_i
  - target: Kf
    equation: Kf = Ki + dK
    latex: K_f = K_i + \Delta K
  - target: Ki
    equation: Ki = Kf - dK
    latex: K_i = K_f - \Delta K
- id: teorema_trabajo_energia
  title: Teorema trabajo-energia
  equation: Wnet = dK
  latex: W_{neto}=\Delta K
  rearrangements:
  - target: Wnet
    equation: Wnet = dK
    latex: W_{neto}=\Delta K
  - target: dK
    equation: dK = Wnet
    latex: \Delta K=W_{neto}
ui:
  default_formula: energia_cinetica_basica
  groups:
  - title: Basicas
    items:
    - energia_cinetica_basica
    - variacion_energia_cinetica
    - teorema_trabajo_energia
