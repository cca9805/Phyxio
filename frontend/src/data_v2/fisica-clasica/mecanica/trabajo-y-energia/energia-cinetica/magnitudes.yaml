version: 1

magnitudes:
  - id: K
    symbol: "K"
    nombre: energia_cinetica
    unidad_si: J
    descripcion: Energia asociada al movimiento traslacional.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Cantidad de materia del cuerpo.

  - id: v
    symbol: "v"
    nombre: rapidez
    unidad_si: m/s
    descripcion: Modulo de la velocidad.

  - id: Ki
    symbol: "K_i"
    nombre: energia_cinetica_inicial
    unidad_si: J
    descripcion: Energia cinetica en el estado inicial.

  - id: Kf
    symbol: "K_f"
    nombre: energia_cinetica_final
    unidad_si: J
    descripcion: Energia cinetica en el estado final.

  - id: dK
    symbol: "\\Delta K"
    nombre: variacion_energia_cinetica
    unidad_si: J
    descripcion: Diferencia entre energia cinetica final e inicial.

  - id: Wnet
    symbol: "W_{neto}"
    nombre: trabajo_neto
    unidad_si: J
    descripcion: Suma de trabajos de todas las fuerzas externas.
