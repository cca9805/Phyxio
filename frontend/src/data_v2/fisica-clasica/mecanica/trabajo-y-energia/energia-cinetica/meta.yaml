objetivos:
  - Comprender el significado fisico de K = 1/2 m v^2.
  - Analizar como cambia K al duplicar masa o velocidad.
  - Relacionar trabajo neto con variacion de energia cinetica.
  - Resolver calculos directos e inversos con unidades SI.

suposiciones:
  - Movimiento traslacional no relativista.
  - Masa constante.
  - Unidades coherentes en SI.

