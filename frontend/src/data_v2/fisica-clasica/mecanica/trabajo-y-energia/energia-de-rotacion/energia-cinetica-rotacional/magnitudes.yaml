version: 1

magnitudes:
  - id: Erot
    symbol: "E_{rot}"
    nombre: energia_cinetica_rotacional
    unidad_si: J
    descripcion: Energia asociada al movimiento de rotacion.

  - id: I
    symbol: "I"
    nombre: momento_de_inercia
    unidad_si: kg*m^2
    descripcion: Inercia rotacional respecto al eje.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Rapidez angular del cuerpo.

  - id: Eroti
    symbol: "E_{rot,i}"
    nombre: energia_rotacional_inicial
    unidad_si: J
    descripcion: Energia rotacional en el estado inicial.

  - id: Erotf
    symbol: "E_{rot,f}"
    nombre: energia_rotacional_final
    unidad_si: J
    descripcion: Energia rotacional en el estado final.

  - id: Wrot
    symbol: "W_{rot}"
    nombre: trabajo_rotacional
    unidad_si: J
    descripcion: Trabajo neto de torques externos.