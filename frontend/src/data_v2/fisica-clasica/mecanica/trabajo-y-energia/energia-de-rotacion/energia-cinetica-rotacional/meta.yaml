  - energia-rotacional
  - momento-de-inercia
  - velocidad-angular
  - trabajo-energia
  - mecanica

objetivos:
  - Comprender el significado fisico de E_rot = 1/2 I omega^2.
  - Analizar el efecto de I y omega sobre la energia de giro.
  - Relacionar variacion de energia rotacional con trabajo de torque.
  - Resolver calculos directos e inversos en SI.

suposiciones:
  - Cuerpo rigido con eje definido.
  - Momento de inercia constante respecto al eje analizado.
  - Regimen no relativista y unidades SI.

