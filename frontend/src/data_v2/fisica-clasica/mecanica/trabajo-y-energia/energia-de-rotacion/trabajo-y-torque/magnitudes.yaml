version: 1

magnitudes:
  - id: W
    symbol: "W"
    nombre: trabajo_rotacional
    unidad_si: J
    descripcion: Trabajo realizado por el torque en un giro.

  - id: tau
    symbol: "\\tau"
    nombre: torque
    unidad_si: N*m
    descripcion: Momento de fuerza respecto al eje.

  - id: theta
    symbol: "\\theta"
    nombre: desplazamiento_angular
    unidad_si: rad
    descripcion: Variacion angular recorrida.

  - id: P
    symbol: "P"
    nombre: potencia_angular
    unidad_si: W
    descripcion: Tasa temporal de trabajo rotacional.

  - id: omega
    symbol: "\\omega"
    nombre: velocidad_angular
    unidad_si: rad/s
    descripcion: Rapidez angular instantanea.