descripcion_corta: >
  El trabajo en rotacion se obtiene con la integral del torque respecto al angulo,
  y la potencia angular instantanea es P = tau * omega.

tags:
  - torque
  - trabajo-rotacional
  - potencia-angular
  - energia-rotacional
  - rotacion

objetivos:
  - Aplicar W = integral(tau dtheta) en casos de torque constante y variable.
  - Relacionar potencia angular con torque y velocidad angular.
  - Resolver balances energeticos en sistemas rotacionales.
  - Interpretar el signo de tau, omega y P en aceleracion/frenado.

suposiciones:
  - Movimiento alrededor de un eje definido.
  - Convencion de signos consistente para torque y giro.
  - Unidades SI.

