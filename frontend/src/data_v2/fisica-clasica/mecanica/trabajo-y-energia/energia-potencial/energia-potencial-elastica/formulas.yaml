version: 1
topic:
  id: energia-potencial-elastica
  title: Energia potencial elastica
variables:
- id: Ue
  symbol: U_e
  nombre: energia potencial elastica
  unidad_si: J
  descripcion: Energia potencial elastica.
- id: k
  symbol: k
  nombre: constante elastica
  unidad_si: N/m
  descripcion: Constante elastica.
- id: x
  symbol: x
  nombre: deformacion
  unidad_si: m
  descripcion: Deformacion.
- id: xi
  symbol: x_i
  nombre: deformacion inicial
  unidad_si: m
  descripcion: Deformacion inicial.
- id: xf
  symbol: x_f
  nombre: deformacion final
  unidad_si: m
  descripcion: Deformacion final.
- id: dUe
  symbol: \Delta U_e
  nombre: variacion de energia potencial elastica
  unidad_si: J
  descripcion: Variacion de energia potencial elastica.
- id: We
  symbol: W_e
  nombre: trabajo de la fuerza elastica
  unidad_si: J
  descripcion: Trabajo de la fuerza elastica.
formulas:
- id: potencial_elastico_basico
  title: Energia potencial elastica
  equation: Ue = 0.5*k*x^2
  latex: U_e = \frac{1}{2}kx^2
  rearrangements:
  - target: Ue
    equation: Ue = 0.5*k*x^2
    latex: U_e = \frac{1}{2}kx^2
  - target: k
    equation: k = 2*Ue/(x^2)
    latex: k = \frac{2U_e}{x^2}
  - target: x
    equation: x = sqrt(2*Ue/k)
    latex: x = \sqrt{\frac{2U_e}{k}}
- id: variacion_potencial_elastico
  title: Variacion entre dos deformaciones
  equation: dUe = 0.5*k*(xf^2 - xi^2)
  latex: \Delta U_e = \frac{k}{2}(x_f^2-x_i^2)
  rearrangements:
  - target: dUe
    equation: dUe = 0.5*k*(xf^2 - xi^2)
    latex: \Delta U_e = \frac{k}{2}(x_f^2-x_i^2)
  - target: xf
    equation: xf = sqrt(xi^2 + 2*dUe/k)
    latex: x_f=\sqrt{x_i^2+\frac{2\Delta U_e}{k}}
- id: trabajo_fuerza_elastica
  title: Trabajo de la fuerza elastica
  equation: We = -dUe
  latex: W_e = -\Delta U_e
  rearrangements:
  - target: We
    equation: We = -dUe
    latex: W_e = -\Delta U_e
  - target: dUe
    equation: dUe = -We
    latex: \Delta U_e = -W_e
ui:
  default_formula: potencial_elastico_basico
  groups:
  - title: Basicas
    items:
    - potencial_elastico_basico
    - variacion_potencial_elastico
    - trabajo_fuerza_elastica
