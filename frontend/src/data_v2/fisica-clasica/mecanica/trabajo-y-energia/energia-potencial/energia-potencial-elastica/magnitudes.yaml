version: 1

magnitudes:
  - id: Ue
    symbol: "U_e"
    nombre: energia_potencial_elastica
    unidad_si: J
    descripcion: Energia almacenada por deformacion elastica.

  - id: k
    symbol: "k"
    nombre: constante_elastica
    unidad_si: N/m
    descripcion: Rigidez del resorte en ley de Hooke.

  - id: x
    symbol: "x"
    nombre: deformacion
    unidad_si: m
    descripcion: Distancia respecto de la longitud natural.

  - id: xi
    symbol: "x_i"
    nombre: deformacion_inicial
    unidad_si: m
    descripcion: Deformacion en estado inicial.

  - id: xf
    symbol: "x_f"
    nombre: deformacion_final
    unidad_si: m
    descripcion: Deformacion en estado final.

  - id: dUe
    symbol: "\\Delta U_e"
    nombre: variacion_energia_potencial_elastica
    unidad_si: J
    descripcion: Cambio de energia potencial elastica entre dos estados.

  - id: We
    symbol: "W_e"
    nombre: trabajo_fuerza_elastica
    unidad_si: J
    descripcion: Trabajo realizado por la fuerza del resorte.
