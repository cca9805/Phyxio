descripcion_corta: >
  Energia almacenada en deformaciones elasticas lineales. En el modelo de Hooke:
  U_e = 1/2 k x^2, con x medido desde la longitud natural.

tags:
  - energia-potencial-elastica
  - hooke
  - resorte
  - trabajo
  - energia

objetivos:
  - Aplicar U_e = 1/2 kx^2 en compresion/extension.
  - Relacionar trabajo del resorte con variaciones de U_e.
  - Identificar correctamente la deformacion x.
  - Analizar intercambio K <-> U_e en sistemas masa-resorte.

suposiciones:
  - Regimen elastico lineal (ley de Hooke valida).
  - Deformaciones dentro del limite elastico.
  - Resorte ideal sin disipacion.

