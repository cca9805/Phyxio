formulas:
- id: potencial_gravitatorio_superficie
  title: Energia potencial gravitatoria (campo uniforme)
  equation: Ug = m*g*h
  latex: U_g = mgh
  rearrangements:
  - target: Ug
    equation: Ug = m*g*h
    latex: U_g = mgh
  - target: m
    equation: m = Ug/(g*h)
    latex: m = \frac{U_g}{gh}
  - target: h
    equation: h = Ug/(m*g)
    latex: h = \frac{U_g}{mg}
- id: variacion_potencial_gravitatorio
  title: Variacion de energia potencial
  equation: dUg = m*g*(hf-hi)
  latex: \Delta U_g = mg(h_f-h_i)=mg\Delta h
  rearrangements:
  - target: dUg
    equation: dUg = m*g*(hf-hi)
    latex: \Delta U_g = mg(h_f-h_i)
  - target: hf
    equation: hf = hi + dUg/(m*g)
    latex: h_f = h_i + \frac{\Delta U_g}{mg}
  - target: hi
    equation: hi = hf - dUg/(m*g)
    latex: h_i = h_f - \frac{\Delta U_g}{mg}
- id: trabajo_gravitatorio
  title: Trabajo de la gravedad
  equation: Wg = -dUg
  latex: W_g = -\Delta U_g
  rearrangements:
  - target: Wg
    equation: Wg = -dUg
    latex: W_g = -\Delta U_g
  - target: dUg
    equation: dUg = -Wg
    latex: \Delta U_g = -W_g
