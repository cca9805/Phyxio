objetivos:
- Entender por que la energia potencial depende del nivel de referencia.
- Aplicar U_g = mgh y Delta U_g = mg Delta h.
- Relacionar cambios de altura con trabajo de la gravedad.
- Integrar este concepto en balances de energia mecanica.
