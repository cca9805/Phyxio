version: 1

magnitudes:
  - id: fr
    symbol: "f_r"
    nombre: fuerza_rozamiento
    unidad_si: N
    descripcion: Fuerza tangencial que se opone al movimiento relativo.

  - id: mu
    symbol: "\\mu"
    nombre: coeficiente_rozamiento
    unidad_si: "1"
    descripcion: Parametro adimensional de contacto entre superficies.

  - id: N
    symbol: "N"
    nombre: fuerza_normal
    unidad_si: N
    descripcion: Reaccion normal de la superficie.

  - id: d
    symbol: "d"
    nombre: desplazamiento
    unidad_si: m
    descripcion: Distancia recorrida en la direccion de analisis.

  - id: Wr
    symbol: "W_r"
    nombre: trabajo_rozamiento
    unidad_si: J
    descripcion: Trabajo realizado por la fuerza de rozamiento.

  - id: Edis
    symbol: "E_{dis}"
    nombre: energia_disipada
    unidad_si: J
    descripcion: Energia mecanica transformada en energia interna.

  - id: m
    symbol: "m"
    nombre: masa
    unidad_si: kg
    descripcion: Masa del cuerpo.

  - id: g
    symbol: "g"
    nombre: aceleracion_gravitatoria
    unidad_si: m/s^2
    descripcion: Aceleracion del campo gravitatorio local.