objetivos:
  - Modelar fuerza de rozamiento en contacto seco con f = mu N.
  - Calcular trabajo de rozamiento y su signo fisico.
  - Relacionar trabajo de rozamiento con energia disipada.
  - Interpretar diagramas de energia con perdidas.

suposiciones:
  - Coeficiente de rozamiento constante en el recorrido.
  - Sin cambios de fase ni deformaciones macroscopicas permanentes.
  - Modelo de particula y unidades SI.

