descripcion_corta: >
  El trabajo total de las fuerzas no conservativas es igual a la variacion de energia mecanica
  del sistema: W_nc = Delta E_m.

tags:
  - trabajo-no-conservativo
  - balance-energetico
  - energia-mecanica
  - disipacion
  - rozamiento

objetivos:
  - Aplicar W_nc = Delta(K+U) en problemas reales.
  - Distinguir situaciones con ganancia o perdida de energia mecanica.
  - Combinar analisis de fuerzas y analisis energetico.
  - Resolver despejes directos de energia final, inicial o trabajo no conservativo.

suposiciones:
  - Sistema mecanico modelado como particula o cuerpo rigido simple.
  - Fuerzas conservativas representables mediante potencial.
  - Trabajo no conservativo agregado en un termino equivalente W_nc.

