version: 1
topic:
  id: potencia
  title: Potencia mecanica
variables:
- id: P
  symbol: P
  nombre: potencia
  unidad_si: W
  descripcion: Potencia.
- id: W
  symbol: W
  nombre: trabajo
  unidad_si: J
  descripcion: Trabajo.
- id: t
  symbol: t
  nombre: tiempo
  unidad_si: s
  descripcion: Tiempo.
- id: F
  symbol: F
  nombre: fuerza
  unidad_si: N
  descripcion: Fuerza.
- id: v
  symbol: v
  nombre: rapidez
  unidad_si: m/s
  descripcion: Rapidez.
- id: theta
  symbol: \theta
  nombre: angulo entre fuerza y velocidad
  unidad_si: rad
  descripcion: Angulo entre fuerza y velocidad.
formulas:
- id: potencia_media
  title: Potencia media
  equation: P = W/t
  latex: P = \frac{W}{t}
  rearrangements:
  - target: P
    equation: P = W/t
    latex: P = \frac{W}{t}
  - target: W
    equation: W = P*t
    latex: W = Pt
  - target: t
    equation: t = W/P
    latex: t = \frac{W}{P}
  constraints:
  - expr: t > 0
    message: t debe ser mayor que 0.
- id: potencia_instantanea_mecanica
  title: Potencia instantanea mecanica
  equation: P = F*v*cos(theta)
  latex: P = Fv\cos\theta
  rearrangements:
  - target: P
    equation: P = F*v*cos(theta)
    latex: P = Fv\cos\theta
  - target: F
    equation: F = P/(v*cos(theta))
    latex: F = \frac{P}{v\cos\theta}
  - target: v
    equation: v = P/(F*cos(theta))
    latex: v = \frac{P}{F\cos\theta}
- id: potencia_definicion_diferencial
  title: Definicion diferencial
  equation: P = dW/dt
  latex: P=\frac{dW}{dt}
  motivo_no_calculable: Relacion de definicion para procesos variables continuos.
  status: descriptive
ui:
  default_formula: potencia_media
  groups:
  - title: Basicas
    items:
    - potencia_media
    - potencia_instantanea_mecanica
    - potencia_definicion_diferencial
