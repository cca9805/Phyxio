version: 1

magnitudes:
  - id: P
    symbol: "P"
    nombre: potencia
    unidad_si: W
    descripcion: Tasa de transferencia de energia o de realizacion de trabajo.

  - id: W
    symbol: "W"
    nombre: trabajo
    unidad_si: J
    descripcion: Energia transferida por una fuerza.

  - id: t
    symbol: "t"
    nombre: tiempo
    unidad_si: s
    descripcion: Intervalo temporal del proceso.

  - id: F
    symbol: "F"
    nombre: fuerza
    unidad_si: N
    descripcion: Modulo de la fuerza aplicada.

  - id: v
    symbol: "v"
    nombre: rapidez
    unidad_si: m/s
    descripcion: Rapidez instantanea del cuerpo.

  - id: theta
    symbol: "\\theta"
    nombre: angulo_fuerza_velocidad
    unidad_si: rad
    descripcion: Angulo entre fuerza y velocidad.
