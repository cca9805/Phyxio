version: 1

magnitudes:
  - id: W
    symbol: "W"
    nombre: trabajo
    unidad_si: J
    descripcion: Trabajo realizado por una fuerza variable.

  - id: F
    symbol: "F(x)"
    nombre: fuerza_variable
    unidad_si: N
    descripcion: Fuerza como funcion de la posicion.

  - id: x
    symbol: "x"
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial unidimensional.

  - id: x1
    symbol: "x_1"
    nombre: posicion_inicial
    unidad_si: m
    descripcion: Limite inferior de integracion.

  - id: x2
    symbol: "x_2"
    nombre: posicion_final
    unidad_si: m
    descripcion: Limite superior de integracion.

  - id: k
    symbol: "k"
    nombre: constante_elastica
    unidad_si: N/m
    descripcion: Constante del resorte en ley de Hooke.

  - id: Fmed
    symbol: "F_{med}"
    nombre: fuerza_media
    unidad_si: N
    descripcion: Fuerza promedio para aproximar trabajo en un intervalo.
