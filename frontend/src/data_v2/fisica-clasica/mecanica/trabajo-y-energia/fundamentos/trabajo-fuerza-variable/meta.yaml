descripcion_corta: >
  Cuando la fuerza cambia con la posicion, el trabajo se obtiene como area bajo la
  curva F(x) o mediante integral definida entre dos posiciones.

tags:
  - trabajo
  - fuerza-variable
  - integral
  - area-bajo-la-curva
  - energia

objetivos:
  - Interpretar geometricamente el trabajo como area en una grafica F-x.
  - Calcular trabajo con integrales en modelos sencillos F(x).
  - Aplicar el caso elastico lineal de Hooke.
  - Estimar trabajo con fuerza media cuando no hay expresion exacta.

suposiciones:
  - Movimiento 1D sobre el eje x.
  - Fuerza expresable como funcion F(x) en el intervalo de interes.
  - Unidades coherentes en SI.

