objetivos:
  - Interpretar el signo del trabajo segun el angulo fuerza-desplazamiento.
  - Calcular trabajo en 1D y 2D con fuerza constante.
  - Diferenciar trabajo positivo, negativo y nulo.
  - Relacionar trabajo neto con cambio de energia cinetica.

suposiciones:
  - Fuerza constante en modulo y direccion para la formula basica.
  - Desplazamiento definido sobre trayectoria rectilinea del modelo.
  - Unidades coherentes en SI.

