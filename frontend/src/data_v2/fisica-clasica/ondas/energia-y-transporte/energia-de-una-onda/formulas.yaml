version: 1
topic:
  id: energia-de-una-onda
  title: Energia De Una Onda
variables:
  - id: E
    symbol: E
    name: energia
    si_unit: J
  - id: k
    symbol: k
    name: constante_proporcionalidad
    si_unit: J/m^2
  - id: A
    symbol: A
    name: amplitud
    si_unit: m
  - id: m
    symbol: m
    name: masa_efectiva
    si_unit: kg
  - id: omega
    symbol: \omega
    name: frecuencia_angular
    si_unit: rad/s
formulas:
  - id: energia
    title: Energia de onda
    equation: E = k*A^2
    latex: E=kA^2
    rearrangements:
      - target: E
        equation: E = k*A^2
        latex: E=kA^2
      - target: A
        equation: A = sqrt(E/k)
        latex: A=\sqrt{\frac{E}{k}}
      - target: k
        equation: k = E/(A^2)
        latex: k=\frac{E}{A^2}
  - id: energia_oscilador
    title: Modelo oscilatorio
    equation: E = 0.5*m*omega^2*A^2
    latex: E=\frac{1}{2}m\omega^2A^2
    rearrangements:
      - target: E
        equation: E = 0.5*m*omega^2*A^2
        latex: E=\frac{1}{2}m\omega^2A^2
      - target: A
        equation: A = sqrt((2*E)/(m*omega^2))
        latex: A=\sqrt{\frac{2E}{m\omega^2}}
ui:
  default_formula: energia
  groups:
    - title: Calculables
      items:
        - energia
        - energia_oscilador
