version: 1
magnitudes:
  - id: E
    symbol: E
    nombre: energia
    unidad_si: J
    descripcion: 'Energia (J): cantidad transferida o almacenada asociada a la perturbacion ondulatoria.'
  - id: k
    symbol: k
    nombre: constante_proporcionalidad
    unidad_si: J/m^2
    descripcion: 'Numero de onda (J/m^2): tasa de cambio espacial de fase; crece cuando lambda disminuye.'
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: 'Amplitud (m): maxima separacion respecto al equilibrio. A mayor amplitud, mayor energia transportada en regimen lineal.'
  - id: m
    symbol: m
    nombre: masa_efectiva
    unidad_si: kg
    descripcion: 'Masa efectiva (kg): magnitud del tema Energia De Una Onda. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: el bloque energia y transporte estudia cuanto fluye, a que ritmo y con que intensidad en una onda.'
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: 'Frecuencia angular (rad/s): tasa temporal angular de oscilacion; se relaciona con f mediante 2pi.'
