version: 1
magnitudes:
  - id: P
    symbol: P
    nombre: potencia
    unidad_si: W
    descripcion: 'Potencia (W): ritmo de transferencia energetica por unidad de tiempo.'
  - id: E
    symbol: E
    nombre: energia
    unidad_si: J
    descripcion: 'Energia (J): cantidad transferida o almacenada asociada a la perturbacion ondulatoria.'
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: 'Tiempo (s): magnitud del tema Flujo De Energia. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: el bloque energia y transporte estudia cuanto fluye, a que ritmo y con que intensidad en una onda.'
  - id: I
    symbol: I
    nombre: intensidad
    unidad_si: W/m^2
    descripcion: 'Intensidad (W/m^2): potencia por unidad de area efectiva de propagacion.'
  - id: Aarea
    symbol: A
    nombre: area
    unidad_si: m^2
    descripcion: 'Area (m^2): magnitud del tema Flujo De Energia. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: el bloque energia y transporte estudia cuanto fluye, a que ritmo y con que intensidad en una onda.'
