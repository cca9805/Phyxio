version: 1
topic:
  id: intensidad-ondulatoria
  title: Intensidad Ondulatoria
variables:
  - id: I
    symbol: I
    name: intensidad
    si_unit: W/m^2
  - id: P
    symbol: P
    name: potencia
    si_unit: W
  - id: Aarea
    symbol: A
    name: area
    si_unit: m^2
  - id: r
    symbol: r
    name: distancia
    si_unit: m
  - id: beta
    symbol: \beta
    name: nivel_sonoro
    si_unit: dB
  - id: I0
    symbol: I_0
    name: intensidad_referencia
    si_unit: W/m^2
formulas:
  - id: I
    title: Intensidad ondulatoria
    equation: I = P/Aarea
    latex: I=\frac{P}{A}
    rearrangements:
      - target: I
        equation: I = P/Aarea
        latex: I=\frac{P}{A}
      - target: P
        equation: P = I*Aarea
        latex: P=IA
      - target: Aarea
        equation: Aarea = P/I
        latex: A=\frac{P}{I}
  - id: intensidad_esferica
    title: Fuente puntual isotropa
    equation: I = P/(4*pi*r^2)
    latex: I=\frac{P}{4\pi r^2}
    rearrangements:
      - target: I
        equation: I = P/(4*pi*r^2)
        latex: I=\frac{P}{4\pi r^2}
  - id: nivel_sonoro
    title: Nivel sonoro
    equation: beta = 10*log10(I/I0)
    latex: \beta=10\log_{10}\left(\frac{I}{I_0}\right)
    rearrangements:
      - target: beta
        equation: beta = 10*log10(I/I0)
        latex: \beta=10\log_{10}\left(\frac{I}{I_0}\right)
ui:
  default_formula: I
  groups:
    - title: Calculables
      items:
        - I
        - intensidad_esferica
        - nivel_sonoro
