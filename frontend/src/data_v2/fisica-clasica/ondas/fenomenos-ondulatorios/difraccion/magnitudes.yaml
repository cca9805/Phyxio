version: 1
magnitudes:
  - id: a
    symbol: a
    nombre: abertura
    unidad_si: m
    descripcion: Ancho de rendija o apertura efectiva.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Longitud de onda de la senal incidente.
  - id: m
    symbol: m
    nombre: orden_minimo
    unidad_si: '1'
    descripcion: Entero positivo del minimo de difraccion.
  - id: theta
    symbol: \theta
    nombre: angulo
    unidad_si: rad
    descripcion: Angulo de observacion respecto al eje central.
  - id: sin_theta
    symbol: \sin\theta
    nombre: seno_angulo
    unidad_si: '1'
    descripcion: Seno del angulo de observacion.
  - id: L
    symbol: L
    nombre: distancia_pantalla
    unidad_si: m
    descripcion: Distancia entre abertura y pantalla de observacion.
  - id: y_m
    symbol: y_m
    nombre: posicion_minimo
    unidad_si: m
    descripcion: Posicion del minimo de orden m en pantalla.
  - id: w0
    symbol: w_0
    nombre: ancho_maximo_central
    unidad_si: m
    descripcion: Anchura aproximada del maximo central.
  - id: D
    symbol: D
    nombre: diametro_apertura
    unidad_si: m
    descripcion: Diametro de apertura circular.
  - id: theta_R
    symbol: \theta_R
    nombre: angulo_rayleigh
    unidad_si: rad
    descripcion: Limite angular de resolucion por criterio de Rayleigh.
