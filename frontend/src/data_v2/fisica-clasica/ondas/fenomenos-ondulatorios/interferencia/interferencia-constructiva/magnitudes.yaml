version: 1
magnitudes:
  - id: delta
    symbol: \Delta
    nombre: diferencia_camino
    unidad_si: m
    descripcion: Diferencia de camino entre las dos ondas que interfieren.
  - id: m
    symbol: m
    nombre: orden_constructivo
    unidad_si: '1'
    descripcion: Entero que identifica el maximo constructivo.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Longitud de onda comun en el medio analizado.
  - id: delta_phi
    symbol: \Delta\phi
    nombre: desfase
    unidad_si: rad
    descripcion: Diferencia de fase entre ambas ondas.
  - id: A1
    symbol: A_1
    nombre: amplitud_1
    unidad_si: m
    descripcion: Amplitud de la onda 1.
  - id: A2
    symbol: A_2
    nombre: amplitud_2
    unidad_si: m
    descripcion: Amplitud de la onda 2.
  - id: Ares
    symbol: A_{res}
    nombre: amplitud_resultante
    unidad_si: m
    descripcion: Amplitud total resultante en el punto de interferencia.
  - id: I
    symbol: I
    nombre: intensidad
    unidad_si: W/m^2
    descripcion: Intensidad local proporcional al cuadrado de la amplitud resultante.
