version: 1
magnitudes:
  - id: theta_i
    symbol: \theta_i
    nombre: angulo_incidencia
    unidad_si: rad
    descripcion: Angulo de incidencia medido respecto a la normal.
  - id: theta_r
    symbol: \theta_r
    nombre: angulo_reflexion
    unidad_si: rad
    descripcion: Angulo de reflexion medido respecto a la normal.
  - id: phi_i
    symbol: \phi_i
    nombre: fase_incidente
    unidad_si: rad
    descripcion: Fase de la onda incidente.
  - id: phi_r
    symbol: \phi_r
    nombre: fase_reflejada
    unidad_si: rad
    descripcion: Fase de la onda reflejada.
  - id: Z1
    symbol: Z_1
    nombre: impedancia_medio_1
    unidad_si: kg/(m^2*s)
    descripcion: Impedancia del medio incidente.
  - id: Z2
    symbol: Z_2
    nombre: impedancia_medio_2
    unidad_si: kg/(m^2*s)
    descripcion: Impedancia del medio reflejante/transmisor.
  - id: R_A
    symbol: R_A
    nombre: reflexion_amplitud
    unidad_si: '1'
    descripcion: Coeficiente de reflexion de amplitud en incidencia normal.
  - id: R_I
    symbol: R_I
    nombre: reflexion_intensidad
    unidad_si: '1'
    descripcion: Fraccion de intensidad reflejada.
  - id: T_I
    symbol: T_I
    nombre: transmision_intensidad
    unidad_si: '1'
    descripcion: Fraccion de intensidad transmitida.
