version: 1
magnitudes:
  - id: n1
    symbol: n_1
    nombre: indice_1
    unidad_si: '1'
    descripcion: Indice efectivo del medio incidente.
  - id: n2
    symbol: n_2
    nombre: indice_2
    unidad_si: '1'
    descripcion: Indice efectivo del medio refractado.
  - id: theta1
    symbol: \theta_1
    nombre: angulo_incidencia
    unidad_si: rad
    descripcion: Angulo de incidencia respecto a la normal.
  - id: theta2
    symbol: \theta_2
    nombre: angulo_refraccion
    unidad_si: rad
    descripcion: Angulo de refraccion respecto a la normal.
  - id: theta_c
    symbol: \theta_c
    nombre: angulo_critico
    unidad_si: rad
    descripcion: Angulo limite para reflexion interna total cuando n1>n2.
  - id: sin_theta1
    symbol: \sin\theta_1
    nombre: seno_incidencia
    unidad_si: '1'
    descripcion: Seno del angulo de incidencia.
  - id: sin_theta2
    symbol: \sin\theta_2
    nombre: seno_refraccion
    unidad_si: '1'
    descripcion: Seno del angulo de refraccion.
  - id: v1
    symbol: v_1
    nombre: velocidad_medio_1
    unidad_si: m/s
    descripcion: Velocidad de propagacion en medio 1.
  - id: v2
    symbol: v_2
    nombre: velocidad_medio_2
    unidad_si: m/s
    descripcion: Velocidad de propagacion en medio 2.
  - id: lambda1
    symbol: \lambda_1
    nombre: longitud_onda_1
    unidad_si: m
    descripcion: Longitud de onda en medio 1.
  - id: lambda2
    symbol: \lambda_2
    nombre: longitud_onda_2
    unidad_si: m
    descripcion: Longitud de onda en medio 2.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Frecuencia de la onda, conservada en la interfaz.
