version: 1
magnitudes:
  - id: y
    symbol: y
    nombre: desplazamiento_total
    unidad_si: m
    descripcion: Valor total de la variable de campo tras sumar contribuciones.
  - id: y1
    symbol: y_1
    nombre: contribucion_1
    unidad_si: m
    descripcion: Valor de la primera onda en el mismo punto y tiempo.
  - id: y2
    symbol: y_2
    nombre: contribucion_2
    unidad_si: m
    descripcion: Valor de la segunda onda en el mismo punto y tiempo.
  - id: A1
    symbol: A_1
    nombre: amplitud_1
    unidad_si: m
    descripcion: Amplitud de la primera onda.
  - id: A2
    symbol: A_2
    nombre: amplitud_2
    unidad_si: m
    descripcion: Amplitud de la segunda onda.
  - id: Ares
    symbol: A_{res}
    nombre: amplitud_resultante
    unidad_si: m
    descripcion: Amplitud equivalente de la suma para dos ondas armonicas coherentes.
