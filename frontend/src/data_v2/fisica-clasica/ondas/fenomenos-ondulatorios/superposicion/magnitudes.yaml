  - id: f2
    symbol: f_2
    nombre: frecuencia_2
    unidad_si: Hz
    descripcion: Frecuencia de la segunda onda.
  - id: f_beat
    symbol: f_{beat}
    nombre: frecuencia_batido
    unidad_si: Hz
    descripcion: Frecuencia de la envolvente de batido.
  - id: m
    symbol: m
    nombre: orden_entero
    unidad_si: '1'
    descripcion: Entero usado en condiciones de maximos/minimos de interferencia.
