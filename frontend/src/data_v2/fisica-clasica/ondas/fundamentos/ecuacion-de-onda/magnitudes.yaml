version: 1
magnitudes:
  - id: y
    symbol: y
    nombre: desplazamiento
    unidad_si: m
    descripcion: Elongacion local del medio respecto al equilibrio.
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: Valor maximo de desplazamiento local.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial del punto evaluado.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Instante temporal de evaluacion.
  - id: phi
    symbol: \phi
    nombre: fase_instantanea
    unidad_si: rad
    descripcion: Estado angular de la oscilacion en x,t.
  - id: phi0
    symbol: \phi_0
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Condicion inicial de fase.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Variacion angular espacial. Se cumple k=2*pi/lambda.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Variacion angular temporal. Se cumple omega=2*pi*f.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial de un ciclo en fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: v
    symbol: v
    nombre: velocidad_fase
    unidad_si: m/s
    descripcion: Velocidad de propagacion de fase en el medio.
  - id: delta_phi
    symbol: \Delta\phi
    nombre: desfase
    unidad_si: rad
    descripcion: Diferencia de fase entre puntos o instantes.
