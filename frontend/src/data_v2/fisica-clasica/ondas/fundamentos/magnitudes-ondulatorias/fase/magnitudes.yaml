version: 1
magnitudes:
  - id: phi
    symbol: \phi
    nombre: fase_instantanea
    unidad_si: rad
    descripcion: Estado angular de la oscilacion en un punto y un instante.
  - id: phi0
    symbol: \phi_0
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Desfase inicial de referencia en t=0 y x=0.
  - id: delta_phi
    symbol: \Delta\phi
    nombre: desfase
    unidad_si: rad
    descripcion: Diferencia de fase entre dos puntos o dos instantes.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Variacion angular temporal. Se cumple omega=2*pi*f.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Variacion angular espacial. Se cumple k=2*pi/lambda.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial del punto evaluado.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Instante temporal de evaluacion.
  - id: delta_x
    symbol: \Delta x
    nombre: separacion_espacial
    unidad_si: m
    descripcion: Distancia espacial entre dos puntos para calcular desfase.
  - id: delta_t
    symbol: \Delta t
    nombre: separacion_temporal
    unidad_si: s
    descripcion: Diferencia de tiempo entre dos observaciones.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial de un ciclo en fase.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: n
    symbol: n
    nombre: indice_entero
    unidad_si: '1'
    descripcion: Entero usado en condiciones de interferencia constructiva o destructiva.
