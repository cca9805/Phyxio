formulas:
  - id: f
    title: Frecuencia
    equation: f = 1/T
    latex: f=\frac{1}{T}
    rearrangements:
      - target: T
        equation: T = 1/f
        latex: T=\frac{1}{f}
      - target: f
        equation: f = 1/T
        latex: f=\frac{1}{T}
  - id: T
    title: Periodo
    equation: T = 1/f
    latex: T=\frac{1}{f}
    rearrangements:
      - target: T
        equation: T = 1/f
        latex: T=\frac{1}{f}
      - target: f
        equation: f = 1/T
        latex: f=\frac{1}{T}
  - id: omega
    title: Frecuencia angular
    equation: omega = 2*pi*f
    latex: \omega=2\pi f
    rearrangements:
      - target: omega
        equation: omega = 2*pi*f
        latex: \omega=2\pi f
      - target: f
        equation: f = omega/(2*pi)
        latex: f=\frac{\omega}{2\pi}
  - id: conteo_ciclos
    title: Conteo de ciclos
    equation: N = f*t
    latex: N=ft
    rearrangements:
      - target: 'N'
        equation: N = f*t
        latex: N=ft
      - target: f
        equation: f = N/t
        latex: f=\frac{N}{t}
      - target: t
        equation: t = N/f
        latex: t=\frac{N}{f}
  - id: inversa_f_T_conceptual
    title: Relacion inversa f-T (conceptual)
    equation: f*T = 1
    latex: fT=1
    calculable: false
    motivo_no_calculable: Relacion conceptual de proporcionalidad inversa usada para interpretacion fisica.
ui:
