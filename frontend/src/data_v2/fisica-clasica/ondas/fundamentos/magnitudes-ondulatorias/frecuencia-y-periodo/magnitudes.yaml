version: 1
magnitudes:
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: 'Frecuencia (Hz): numero de ciclos por segundo. Determina el ritmo temporal del proceso ondulatorio.'
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: 'Periodo (s): tiempo de un ciclo completo; es el inverso de la frecuencia.'
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: 'Frecuencia angular (rad/s): tasa temporal angular de oscilacion; se relaciona con f mediante 2pi.'
  - id: 'N'
    symbol: 'N'
    nombre: numero_ciclos
    unidad_si: '1'
    descripcion: 'Numero ciclos (1): magnitud del tema Frecuencia Y Periodo. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: frecuencia y periodo describen el mismo ritmo desde dos perspectivas inversas.'
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: 'Tiempo (s): magnitud del tema Frecuencia Y Periodo. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: frecuencia y periodo describen el mismo ritmo desde dos perspectivas inversas.'
