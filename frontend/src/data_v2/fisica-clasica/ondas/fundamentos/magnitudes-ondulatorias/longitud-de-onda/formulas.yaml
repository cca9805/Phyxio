formulas:
  - id: lambda
    title: Longitud de onda
    equation: lambda = v/f
    latex: \lambda=\frac{v}{f}
    rearrangements:
      - target: lambda
        equation: lambda = v/f
        latex: \lambda=\frac{v}{f}
      - target: v
        equation: v = lambda*f
        latex: v=\lambda f
      - target: f
        equation: f = v/lambda
        latex: f=\frac{v}{\lambda}
  - id: lambda_periodo
    title: Relacion con periodo
    equation: lambda = v*T
    latex: \lambda=vT
    rearrangements:
      - target: lambda
        equation: lambda = v*T
        latex: \lambda=vT
      - target: T
        equation: T = lambda/v
        latex: T=\frac{\lambda}{v}
  - id: numero_onda
    title: Numero de onda
    equation: k = 2*pi/lambda
    latex: k=\frac{2\pi}{\lambda}
    rearrangements:
      - target: k
        equation: k = 2*pi/lambda
        latex: k=\frac{2\pi}{\lambda}
      - target: lambda
        equation: lambda = 2*pi/k
        latex: \lambda=\frac{2\pi}{k}
  - id: definicion_lambda_conceptual
    title: Definicion de longitud de onda (conceptual)
    equation: lambda = distancia_entre_puntos_en_fase
    latex: \lambda=\Delta x_{\text{fase}}
    calculable: false
    motivo_no_calculable: Requiere identificacion geometrica de puntos en fase en el grafico o experimento.
