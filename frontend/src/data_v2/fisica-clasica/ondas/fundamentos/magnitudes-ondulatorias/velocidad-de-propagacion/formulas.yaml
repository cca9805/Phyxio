version: 1
topic:
  id: velocidad-de-propagacion
  title: Velocidad De Propagacion
variables:
  - id: v
    symbol: v
    name: velocidad_propagacion
    si_unit: m/s
  - id: lambda
    symbol: \lambda
    name: longitud_onda
    si_unit: m
  - id: f
    symbol: f
    name: frecuencia
    si_unit: Hz
  - id: T
    symbol: T
    name: periodo
    si_unit: s
  - id: omega
    symbol: \omega
    name: frecuencia_angular
    si_unit: rad/s
  - id: k
    symbol: k
    name: numero_onda
    si_unit: rad/m
  - id: F_t
    symbol: F_t
    name: tension
    si_unit: N
  - id: mu_l
    symbol: \mu_l
    name: densidad_lineal
    si_unit: kg/m
  - id: B
    symbol: B
    name: modulo_volumetrico
    si_unit: Pa
  - id: rho
    symbol: \rho
    name: densidad
    si_unit: kg/m^3
  - id: c
    symbol: c
    name: velocidad_luz_vacio
    si_unit: m/s
  - id: n
    symbol: n
    name: indice_refraccion
    si_unit: '1'
  - id: mu
    symbol: \mu
    name: permeabilidad_medio
    si_unit: H/m
  - id: epsilon
    symbol: \varepsilon
    name: permitividad_medio
    si_unit: F/m
formulas:
  - id: v_lambda_f
    title: Relacion basica de propagacion
    equation: v = lambda*f
    latex: v=\lambda f
    rearrangements:
      - target: v
        equation: v = lambda*f
        latex: v=\lambda f
      - target: lambda
        equation: lambda = v/f
        latex: \lambda=\frac{v}{f}
      - target: f
        equation: f = v/lambda
        latex: f=\frac{v}{\lambda}
  - id: v_lambda_T
    title: Relacion con periodo
    equation: v = lambda/T
    latex: v=\frac{\lambda}{T}
    rearrangements:
      - target: v
        equation: v = lambda/T
        latex: v=\frac{\lambda}{T}
      - target: lambda
        equation: lambda = v*T
        latex: \lambda=vT
      - target: T
        equation: T = lambda/v
        latex: T=\frac{\lambda}{v}
  - id: v_omega_k
    title: Velocidad de fase
    equation: v = omega/k
    latex: v=\frac{\omega}{k}
    rearrangements:
      - target: v
        equation: v = omega/k
        latex: v=\frac{\omega}{k}
      - target: omega
        equation: omega = v*k
        latex: \omega=vk
      - target: k
        equation: k = omega/v
        latex: k=\frac{\omega}{v}
  - id: v_cuerda
    title: Velocidad en cuerda tensa
    equation: v = sqrt(F_t/mu_l)
    latex: v=\sqrt{\frac{F_t}{\mu_l}}
    rearrangements:
      - target: v
        equation: v = sqrt(F_t/mu_l)
        latex: v=\sqrt{\frac{F_t}{\mu_l}}
      - target: F_t
        equation: F_t = mu_l*v^2
        latex: F_t=\mu_l v^2
      - target: mu_l
        equation: mu_l = F_t/v^2
        latex: \mu_l=\frac{F_t}{v^2}
  - id: v_fluido
    title: Velocidad en fluido compresible
    equation: v = sqrt(B/rho)
    latex: v=\sqrt{\frac{B}{\rho}}
    rearrangements:
      - target: v
        equation: v = sqrt(B/rho)
        latex: v=\sqrt{\frac{B}{\rho}}
      - target: B
        equation: B = rho*v^2
        latex: B=\rho v^2
      - target: rho
        equation: rho = B/v^2
        latex: \rho=\frac{B}{v^2}
  - id: v_em_indice
    title: Velocidad en medio optico
    equation: v = c/n
    latex: v=\frac{c}{n}
    rearrangements:
      - target: v
        equation: v = c/n
        latex: v=\frac{c}{n}
      - target: n
        equation: n = c/v
        latex: n=\frac{c}{v}
      - target: c
        equation: c = v*n
        latex: c=vn
  - id: v_em_general
    title: Velocidad EM general en medio lineal
    equation: v = 1/sqrt(mu*epsilon)
    latex: v=\frac{1}{\sqrt{\mu\varepsilon}}
    rearrangements:
      - target: v
        equation: v = 1/sqrt(mu*epsilon)
        latex: v=\frac{1}{\sqrt{\mu\varepsilon}}
  - id: criterio_amplitud
    title: Criterio lineal amplitud-velocidad
    equation: v_independiente_de_A
    latex: v\ \text{independiente de}\ A\ \text{(regimen lineal)}
    calculable: false
    motivo_no_calculable: Regla conceptual de validez del modelo lineal.
ui:
  default_formula: v_lambda_f
  groups:
    - title: Relaciones generales
      items:
        - v_lambda_f
        - v_lambda_T
        - v_omega_k
    - title: Velocidad segun medio
      items:
        - v_cuerda
        - v_fluido
        - v_em_indice
        - v_em_general
    - title: Conceptuales
      items:
        - criterio_amplitud
