version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Rapidez de avance del patron ondulatorio en el medio.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial de un ciclo en fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Ciclos por segundo fijados por la fuente.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo por ciclo completo. Se cumple T=1/f.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Ritmo angular temporal. Se cumple omega=2*pi*f.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Ritmo angular espacial. Se cumple k=2*pi/lambda.
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: N
    descripcion: Tension de la cuerda en modelos transversales ideales.
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud de cuerda.
  - id: B
    symbol: B
    nombre: modulo_volumetrico
    unidad_si: Pa
    descripcion: Resistencia del fluido a compresion volumetrica.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del medio.
  - id: c
    symbol: c
    nombre: velocidad_luz_vacio
    unidad_si: m/s
    descripcion: Velocidad de referencia de ondas electromagneticas en vacio.
  - id: n
    symbol: n
    nombre: indice_refraccion
    unidad_si: '1'
    descripcion: Relacion entre c y v en un medio optico.
  - id: mu
    symbol: \mu
    nombre: permeabilidad_medio
    unidad_si: H/m
    descripcion: Parametro electromagnetico del medio.
  - id: epsilon
    symbol: \varepsilon
    nombre: permitividad_medio
    unidad_si: F/m
    descripcion: Parametro electromagnetico del medio.
