version: 1
topic:
  id: electromagneticas
  title: Electromagneticas
variables:
  - id: v
    symbol: v
    name: velocidad
    si_unit: m/s
  - id: lambda
    symbol: \lambda
    name: longitud_onda
    si_unit: m
  - id: f
    symbol: f
    name: frecuencia
    si_unit: Hz
  - id: T
    symbol: T
    name: periodo
    si_unit: s
  - id: c
    symbol: c
    name: velocidad_luz
    si_unit: m/s
  - id: n
    symbol: n
    name: indice_refraccion
    si_unit: '1'
  - id: epsilon0
    symbol: \varepsilon_0
    name: permitividad_vacio
    si_unit: F/m
  - id: mu0
    symbol: \mu_0
    name: permeabilidad_vacio
    si_unit: H/m
  - id: E
    symbol: E
    name: campo_electrico
    si_unit: V/m
  - id: B
    symbol: B
    name: campo_magnetico
    si_unit: T
formulas:
  - id: onda_base
    title: Relacion fundamental
    equation: v = lambda*f
    latex: v=\lambda f
    rearrangements:
      - target: v
        equation: v = lambda*f
        latex: v=\lambda f
      - target: lambda
        equation: lambda = v/f
        latex: \lambda=\frac{v}{f}
      - target: f
        equation: f = v/lambda
        latex: f=\frac{v}{\lambda}
  - id: periodo
    title: Periodo
    equation: T = 1/f
    latex: T=\frac{1}{f}
    rearrangements:
      - target: T
        equation: T = 1/f
        latex: T=\frac{1}{f}
      - target: f
        equation: f = 1/T
        latex: f=\frac{1}{T}
  - id: c_vacio
    title: Velocidad en vacio
    equation: c = 1/sqrt(epsilon0*mu0)
    latex: c=\frac{1}{\sqrt{\varepsilon_0\mu_0}}
    rearrangements:
      - target: c
        equation: c = 1/sqrt(epsilon0*mu0)
        latex: c=\frac{1}{\sqrt{\varepsilon_0\mu_0}}
  - id: relacion_campos
    title: Relacion E-B
    equation: E = c*B
    latex: E=cB
    rearrangements:
      - target: E
        equation: E = c*B
        latex: E=cB
      - target: B
        equation: B = E/c
        latex: B=\frac{E}{c}
  - id: velocidad_medio
    title: Velocidad en medio material
    equation: v = c/n
    latex: v=\frac{c}{n}
    rearrangements:
      - target: v
        equation: v = c/n
        latex: v=\frac{c}{n}
      - target: n
        equation: n = c/v
        latex: n=\frac{c}{v}
      - target: c
        equation: c = v*n
        latex: c=vn
ui:
  default_formula: onda_base
  groups:
    - title: Calculables
      items:
        - onda_base
        - periodo
        - c_vacio
        - relacion_campos
        - velocidad_medio
