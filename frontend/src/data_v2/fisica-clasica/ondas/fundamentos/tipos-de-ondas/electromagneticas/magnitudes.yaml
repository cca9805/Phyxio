version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: 'Velocidad de propagacion (m/s): rapidez con la que avanza el patron de onda en el medio.'
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: 'Longitud de onda (m): distancia entre puntos consecutivos en fase. Permite leer escala espacial del fenomeno.'
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: 'Frecuencia (Hz): numero de ciclos por segundo. Determina el ritmo temporal del proceso ondulatorio.'
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: 'Periodo (s): tiempo de un ciclo completo; es el inverso de la frecuencia.'
  - id: c
    symbol: c
    nombre: velocidad_luz
    unidad_si: m/s
    descripcion: 'Velocidad de la luz (m/s): referencia de propagacion electromagnetica en vacio; en medios se reduce segun el indice.'
  - id: 'n'
    symbol: 'n'
    nombre: indice_refraccion
    unidad_si: '1'
    descripcion: 'Orden modal (1): indice discreto de modo o armonico permitido por condiciones de frontera.'
  - id: epsilon0
    symbol: \varepsilon_0
    nombre: permitividad_vacio
    unidad_si: F/m
    descripcion: 'Permitividad vacio (F/m): magnitud del tema Electromagneticas. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: las ondas electromagneticas se propagan por campos electricos y magneticos acoplados.'
  - id: mu0
    symbol: \mu_0
    nombre: permeabilidad_vacio
    unidad_si: H/m
    descripcion: 'Permeabilidad vacio (H/m): magnitud del tema Electromagneticas. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: las ondas electromagneticas se propagan por campos electricos y magneticos acoplados.'
  - id: E
    symbol: E
    nombre: campo_electrico
    unidad_si: V/m
    descripcion: 'Energia (V/m): cantidad transferida o almacenada asociada a la perturbacion ondulatoria.'
  - id: B
    symbol: B
    nombre: campo_magnetico
    unidad_si: T
    descripcion: 'Modulo de compresion (T): mide resistencia a la compresion volumetrica y controla velocidad en fluidos.'
