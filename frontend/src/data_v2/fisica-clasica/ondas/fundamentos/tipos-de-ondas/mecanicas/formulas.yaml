version: 1
topic:
  id: mecanicas
  title: Mecanicas
variables:
  - id: v
    symbol: v
    name: velocidad
    si_unit: m/s
  - id: lambda
    symbol: \lambda
    name: longitud_onda
    si_unit: m
  - id: f
    symbol: f
    name: frecuencia
    si_unit: Hz
  - id: T
    symbol: T
    name: periodo
    si_unit: s
  - id: B
    symbol: B
    name: modulo_compresion
    si_unit: Pa
  - id: rho
    symbol: \rho
    name: densidad
    si_unit: kg/m^3
  - id: F_t
    symbol: F_t
    name: tension
    si_unit: 'N'
  - id: mu_l
    symbol: \mu_l
    name: densidad_lineal
    si_unit: kg/m
formulas:
  - id: onda_base
    title: Relacion fundamental
    equation: v = lambda*f
    latex: v=\lambda f
    rearrangements:
      - target: v
        equation: v = lambda*f
        latex: v=\lambda f
      - target: lambda
        equation: lambda = v/f
        latex: \lambda=\frac{v}{f}
      - target: f
        equation: f = v/lambda
        latex: f=\frac{v}{\lambda}
  - id: periodo
    title: Periodo
    equation: T = 1/f
    latex: T=\frac{1}{f}
    rearrangements:
      - target: T
        equation: T = 1/f
        latex: T=\frac{1}{f}
      - target: f
        equation: f = 1/T
        latex: f=\frac{1}{T}
  - id: cuerda
    title: Velocidad en cuerda
    equation: v = sqrt(F_t/mu_l)
    latex: v=\sqrt{\frac{F_t}{\mu_l}}
    rearrangements:
      - target: v
        equation: v = sqrt(F_t/mu_l)
        latex: v=\sqrt{\frac{F_t}{\mu_l}}
  - id: fluido
    title: Velocidad en fluido
    equation: v = sqrt(B/rho)
    latex: v=\sqrt{\frac{B}{\rho}}
    rearrangements:
      - target: v
        equation: v = sqrt(B/rho)
        latex: v=\sqrt{\frac{B}{\rho}}
ui:
  default_formula: onda_base
  groups:
    - title: Calculables
      items:
        - onda_base
        - periodo
        - cuerda
        - fluido
