version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: 'Velocidad de propagacion (m/s): rapidez con la que avanza el patron de onda en el medio.'
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: 'Longitud de onda (m): distancia entre puntos consecutivos en fase. Permite leer escala espacial del fenomeno.'
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: 'Frecuencia (Hz): numero de ciclos por segundo. Determina el ritmo temporal del proceso ondulatorio.'
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: 'Periodo (s): tiempo de un ciclo completo; es el inverso de la frecuencia.'
  - id: B
    symbol: B
    nombre: modulo_compresion
    unidad_si: Pa
    descripcion: 'Modulo de compresion (Pa): mide resistencia a la compresion volumetrica y controla velocidad en fluidos.'
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: 'Densidad (kg/m^3): masa por volumen del medio. Referencias utiles: aire ~1.2 kg/m^3, agua ~1000 kg/m^3.'
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: 'N'
    descripcion: 'Tension (N): magnitud del tema Mecanicas. Debe introducirse en SI y verificarse con contexto fisico. Se interpreta junto con: las ondas mecanicas requieren medio material y su velocidad depende de propiedades del medio.'
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: 'Densidad lineal (kg/m): masa por longitud de cuerda. Se expresa en kg/m y suele ser decimal (no entero).'
