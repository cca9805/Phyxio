version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_generica
    unidad_si: m/s
    descripcion: 'Velocidad generica de propagacion usada para la relacion comun v=lambda*f.'
  - id: v_em
    symbol: v_{EM}
    nombre: velocidad_em_medio
    unidad_si: m/s
    descripcion: 'Velocidad de onda electromagnetica en un medio material.'
  - id: v_mec
    symbol: v_{mec}
    nombre: velocidad_mecanica
    unidad_si: m/s
    descripcion: 'Velocidad de onda mecanica determinada por propiedades elasticas e inerciales del medio.'
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda_generica
    unidad_si: m
    descripcion: 'Longitud de onda generica: distancia entre puntos consecutivos en fase.'
  - id: lambda0
    symbol: \lambda_0
    nombre: longitud_onda_vacio
    unidad_si: m
    descripcion: 'Longitud de onda electromagnetica en vacio.'
  - id: lambda_m
    symbol: \lambda_m
    nombre: longitud_onda_en_medio
    unidad_si: m
    descripcion: 'Longitud de onda electromagnetica dentro de un medio con indice n.'
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: 'Frecuencia: ciclos por segundo. En comparaciones de cambio de medio ideal, la fija la fuente.'
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: 'Periodo: tiempo de un ciclo; inversa de la frecuencia.'
  - id: c
    symbol: c
    nombre: velocidad_luz_vacio
    unidad_si: m/s
    descripcion: 'Velocidad de la luz en vacio, constante de referencia para ondas electromagneticas.'
  - id: n
    symbol: n
    nombre: indice_refraccion
    unidad_si: '1'
    descripcion: 'Indice de refraccion del medio. Se define como c/v_EM.'
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: N
    descripcion: 'Tension en cuerda. Mayor tension implica mayor velocidad mecanica en cuerda.'
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: 'Densidad lineal de masa en cuerda (kg/m). Suele ser decimal y debe expresarse en SI.'
  - id: B
    symbol: B
    nombre: modulo_volumetrico
    unidad_si: Pa
    descripcion: 'Modulo volumetrico del fluido: mide resistencia a la compresion.'
  - id: rho
    symbol: \rho
    nombre: densidad_volumica
    unidad_si: kg/m^3
    descripcion: 'Densidad del medio en volumen. Influye en la inercia de propagacion mecanica.'
  - id: E
    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: 'Modulo de Young del solido para aproximaciones longitudinales en barras.'
