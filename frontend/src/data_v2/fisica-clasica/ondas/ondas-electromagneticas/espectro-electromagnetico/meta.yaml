objetivos:
  - Comprender la organizacion del espectro electromagnetico como continuidad fisica de bandas.
  - Aplicar conversiones entre frecuencia, longitud de onda y energia de foton en SI y eV.
  - Interpretar resultados numericos en terminos de banda y aplicacion tecnica.
  - Detectar errores de unidades y de modelo al pasar entre vacio y medio.
suposiciones:
  - Propagacion EM clasica dentro de su dominio de validez.
  - Bandas tratadas como rangos aproximados de uso fisico-tecnologico.
  - Medios simples en aproximacion lineal cuando se usa indice de refraccion.
