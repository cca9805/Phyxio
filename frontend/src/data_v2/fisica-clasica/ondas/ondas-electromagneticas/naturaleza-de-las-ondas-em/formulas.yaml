version: 1
topic:
  id: naturaleza-de-las-ondas-em
  title: Naturaleza De Las Ondas Em
variables:
  - id: c
    symbol: c
    name: velocidad_luz_vacio
    si_unit: m/s
  - id: v
    symbol: v
    name: velocidad_en_medio
    si_unit: m/s
  - id: lambda
    symbol: \lambda
    name: longitud_onda
    si_unit: m
  - id: f
    symbol: f
    name: frecuencia
    si_unit: Hz
  - id: T
    symbol: T
    name: periodo
    si_unit: s
  - id: omega
    symbol: \omega
    name: frecuencia_angular
    si_unit: rad/s
  - id: k
    symbol: k
    name: numero_onda
    si_unit: rad/m
  - id: epsilon0
    symbol: \varepsilon_0
    name: permitividad_vacio
    si_unit: F/m
  - id: mu0
    symbol: \mu_0
    name: permeabilidad_vacio
    si_unit: H/m
  - id: E
    symbol: E
    name: campo_electrico
    si_unit: V/m
  - id: B
    symbol: B
    name: campo_magnetico
    si_unit: T
  - id: n
    symbol: n
