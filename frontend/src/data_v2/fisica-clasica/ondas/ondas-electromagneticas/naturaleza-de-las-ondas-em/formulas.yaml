formulas:
  - id: onda_base
    title: Relacion de propagacion
    equation: v = lambda*f
    latex: v=\lambda f
    rearrangements:
      - target: v
        equation: v = lambda*f
        latex: v=\lambda f
      - target: lambda
        equation: lambda = v/f
        latex: \lambda=\frac{v}{f}
      - target: f
        equation: f = v/lambda
        latex: f=\frac{v}{\lambda}

  - id: periodo
    title: Periodo
    equation: T = 1/f
    latex: T=\frac{1}{f}
    rearrangements:
      - target: T
        equation: T = 1/f
        latex: T=\frac{1}{f}
      - target: f
        equation: f = 1/T
        latex: f=\frac{1}{T}

  - id: frecuencia_angular
    title: Frecuencia angular
    equation: omega = 2*pi*f
    latex: \omega=2\pi f
    rearrangements:
      - target: omega
        equation: omega = 2*pi*f
        latex: \omega=2\pi f
      - target: f
        equation: f = omega/(2*pi)
        latex: f=\frac{\omega}{2\pi}

  - id: numero_onda
    title: Numero de onda
    equation: k = 2*pi/lambda
    latex: k=\frac{2\pi}{\lambda}
    rearrangements:
      - target: k
        equation: k = 2*pi/lambda
        latex: k=\frac{2\pi}{\lambda}
      - target: lambda
        equation: lambda = 2*pi/k
        latex: \lambda=\frac{2\pi}{k}

  - id: velocidad_vacio
    title: Velocidad de la luz en vacio
    equation: c = 1/sqrt(epsilon0*mu0)
    latex: c=\frac{1}{\sqrt{\varepsilon_0\mu_0}}
    rearrangements:
      - target: c
        equation: c = 1/sqrt(epsilon0*mu0)
        latex: c=\frac{1}{\sqrt{\varepsilon_0\mu_0}}
      - target: epsilon0
        equation: epsilon0 = 1/(mu0*c^2)
        latex: \varepsilon_0=\frac{1}{\mu_0c^2}
      - target: mu0
        equation: mu0 = 1/(epsilon0*c^2)
        latex: \mu_0=\frac{1}{\varepsilon_0c^2}

  - id: relacion_campos_vacio
    title: Relacion entre amplitudes de campo (vacio)
    equation: E = c*B
    latex: E=cB
    rearrangements:
      - target: E
        equation: E = c*B
        latex: E=cB
      - target: B
        equation: B = E/c
        latex: B=\frac{E}{c}
      - target: c
        equation: c = E/B
        latex: c=\frac{E}{B}

  - id: velocidad_en_medio
    title: Velocidad en medio con indice
    equation: v = c/n
    latex: v=\frac{c}{n}
    rearrangements:
      - target: v
        equation: v = c/n
        latex: v=\frac{c}{n}
      - target: n
        equation: n = c/v
        latex: n=\frac{c}{v}
      - target: c
        equation: c = n*v
        latex: c=nv

  - id: poynting_conceptual
    title: Flujo de energia electromagnetica (conceptual)
    equation: S = S
    latex: \mathbf{S}=\frac{1}{\mu_0}(\mathbf{E}\times\mathbf{B})
    calculable: false
    motivo_no_calculable: Requiere informacion vectorial completa (direccion y fase), fuera del despeje escalar basico.

ui:
  default_formula: onda_base
  groups:
    - title: Relaciones ondulatorias (calculables)
      items:
        - onda_base
        - periodo
        - frecuencia_angular
        - numero_onda
    - title: Vacio y medio (calculables)
      items:
        - velocidad_vacio
        - velocidad_en_medio
        - relacion_campos_vacio
    - title: Formula conceptual (no calculable)
      items:
        - poynting_conceptual
