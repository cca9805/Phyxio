version: 1
magnitudes:
  - id: c
    symbol: c
    nombre: velocidad_luz_vacio
    unidad_si: m/s
    descripcion: Velocidad de propagacion electromagnetica en vacio.
  - id: v
    symbol: v
    nombre: velocidad_en_medio
    unidad_si: m/s
    descripcion: Velocidad de propagacion de la onda EM en un medio dado.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia entre puntos en fase de la onda.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de oscilaciones por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de una oscilacion completa.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Ritmo angular temporal de la oscilacion.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Ritmo angular espacial de la fase.
  - id: epsilon0
    symbol: \varepsilon_0
    nombre: permitividad_vacio
    unidad_si: F/m
    descripcion: Constante electromagnetica del vacio asociada al campo electrico.
  - id: mu0
    symbol: \mu_0
    nombre: permeabilidad_vacio
    unidad_si: H/m
    descripcion: Constante electromagnetica del vacio asociada al campo magnetico.
  - id: E
    symbol: E
    nombre: campo_electrico
    unidad_si: V/m
    descripcion: Amplitud del campo electrico de la onda.
  - id: B
    symbol: B
    nombre: campo_magnetico
    unidad_si: T
    descripcion: Amplitud del campo magnetico de la onda.
  - id: n
    symbol: n
    nombre: indice_refraccion
    unidad_si: '1'
    descripcion: Cociente entre c y v en el medio.
  - id: S
    symbol: S
    nombre: flujo_energia
    unidad_si: W/m^2
    descripcion: Modulo del flujo de energia electromagnetica (Poynting).
