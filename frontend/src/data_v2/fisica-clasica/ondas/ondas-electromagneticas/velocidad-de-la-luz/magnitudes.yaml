version: 1
magnitudes:
  - id: c
    symbol: c
    nombre: velocidad_luz_vacio
    unidad_si: m/s
    descripcion: 'Velocidad de la luz en vacio (m/s): valor de referencia universal para ondas electromagneticas.'
  - id: v
    symbol: v
    nombre: velocidad_en_medio
    unidad_si: m/s
    descripcion: 'Velocidad de propagacion en un medio material: se relaciona con c mediante el indice n.'
  - id: n
    symbol: n
    nombre: indice_refraccion
    unidad_si: '1'
    descripcion: 'Indice de refraccion: razon c/v. Mayor n implica menor velocidad de propagacion en el medio.'
  - id: lambda0
    symbol: \lambda_0
    nombre: longitud_onda_vacio
    unidad_si: m
    descripcion: 'Longitud de onda en vacio: distancia entre puntos consecutivos en fase antes de entrar en un medio.'
  - id: lambdam
    symbol: \lambda_m
    nombre: longitud_onda_medio
    unidad_si: m
    descripcion: 'Longitud de onda en el medio: disminuye cuando n aumenta, manteniendo fija la frecuencia.'
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda_generica
    unidad_si: m
    descripcion: 'Longitud de onda generica en el contexto del problema.'
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: 'Frecuencia de la fuente (Hz): en interfaces ideales no cambia al pasar de medio.'
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: 'Periodo (s): tiempo de un ciclo completo; inversa de la frecuencia.'
  - id: d
    symbol: d
    nombre: distancia
    unidad_si: m
    descripcion: 'Distancia de propagacion o distancia a objetivo en esquemas de tiempo de vuelo.'
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: 'Tiempo de propagacion medido entre emision y deteccion.'
  - id: epsilon0
    symbol: \varepsilon_0
    nombre: permitividad_vacio
    unidad_si: F/m
    descripcion: 'Constante electrica del vacio usada en la expresion teorica de c.'
  - id: mu0
    symbol: \mu_0
    nombre: permeabilidad_vacio
    unidad_si: H/m
    descripcion: 'Constante magnetica del vacio usada en la expresion teorica de c.'
