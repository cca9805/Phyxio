version: 1
magnitudes:
  - id: n
    symbol: n
    nombre: modo
    unidad_si: '1'
    descripcion: Entero que identifica el modo permitido por frontera.
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud efectiva del sistema resonante.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad de onda en el medio.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda del modo n.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia del modo n.
  - id: k_n
    symbol: k_n
    nombre: numero_onda_modal
    unidad_si: rad/m
    descripcion: Numero de onda asociado al modo n.
  - id: omega_n
    symbol: \omega_n
    nombre: frecuencia_angular_modal
    unidad_si: rad/s
    descripcion: Frecuencia angular del modo n.
  - id: tipo_frontera
    symbol: frontera
    nombre: condicion_frontera
    unidad_si: '1'
    descripcion: Tipo de frontera (fija-fija, abierta-cerrada, etc.) que define la familia modal.
