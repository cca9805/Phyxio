version: 1
magnitudes:
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: N
    descripcion: Fuerza axial que mantiene la cuerda tensada y actua como origen de la fuerza restauradora transversal.
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud de la cuerda; mide su inercia lineal frente a la oscilacion.
  - id: L
    symbol: L
    nombre: longitud_vibrante
    unidad_si: m
    descripcion: Distancia efectiva entre apoyos fijos que participa en la formacion de modos.
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Rapidez de avance de la perturbacion transversal en la cuerda.
  - id: n
    symbol: n
    nombre: indice_modal
    unidad_si: '1'
    descripcion: Numero entero positivo que identifica cada modo permitido por la frontera fija-fija.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia asociada al modo n de la cuerda.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia del primer modo permitido, base del espectro armonico.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda correspondiente al modo n en una cuerda de longitud L.
  - id: d_nn
    symbol: d_{NN}
    nombre: distancia_entre_nodos
    unidad_si: m
    descripcion: Separacion espacial entre nodos consecutivos en un modo estacionario.
  - id: d_na
    symbol: d_{NA}
    nombre: distancia_nodo_antinodo
    unidad_si: m
    descripcion: Distancia entre un nodo y su antinodo adyacente.
  - id: A
    symbol: A
    nombre: amplitud
    unidad_si: m
    descripcion: Amplitud maxima local del modo estacionario; en regimen lineal no fija la frecuencia modal.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Ritmo angular espacial de la fase, ligado a la longitud de onda por k igual a 2pi sobre lambda.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Ritmo angular temporal de oscilacion de un modo.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial sobre la cuerda donde se evalua el desplazamiento.
  - id: y
    symbol: y
    nombre: desplazamiento_transversal
    unidad_si: m
    descripcion: Desplazamiento transversal local de un punto de la cuerda respecto al equilibrio.
