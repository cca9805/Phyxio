objetivos:
  - Comprender como la tension, la densidad lineal y la longitud fijan la velocidad y el espectro modal de una cuerda.
  - Aplicar velocidad en cuerda, condicion modal y relacion armonica con unidades SI y criterio fisico.
  - Relacionar calculos numericos con patron espacial de nodos y antinodos en graficas.
  - Detectar errores de modelo, frontera y unidades antes de cerrar la resolucion.
suposiciones:
  - Cuerda esbelta con tension aproximadamente uniforme.
  - Extremos efectivamente fijos en el modelo base.
  - Regimen lineal de pequena amplitud.
