version: 1
magnitudes:
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud efectiva de la columna de aire que fija posiciones nodales y frecuencias permitidas.
  - id: v
    symbol: v
    nombre: velocidad_sonido
    unidad_si: m/s
    descripcion: Velocidad de propagacion del sonido en el medio dentro del tubo.
  - id: n
    symbol: n
    nombre: indice_modal
    unidad_si: '1'
    descripcion: Entero positivo que identifica el modo permitido por la condicion de frontera.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda correspondiente al modo n en la columna de aire.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia resonante del modo n para el tipo de tubo considerado.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia del primer modo permitido por la frontera del tubo.
  - id: Tc
    symbol: T_c
    nombre: temperatura_celsius
    unidad_si: degC
    descripcion: Temperatura del aire usada para estimar la velocidad del sonido con una aproximacion lineal.
  - id: p_prima
    symbol: p'
    nombre: presion_acustica
    unidad_si: Pa
    descripcion: Variacion de presion alrededor del equilibrio; determina nodos y antinodos de presion.
  - id: u
    symbol: u
    nombre: velocidad_particula
    unidad_si: m/s
    descripcion: Velocidad oscilatoria local de particulas de aire en la onda sonora.
