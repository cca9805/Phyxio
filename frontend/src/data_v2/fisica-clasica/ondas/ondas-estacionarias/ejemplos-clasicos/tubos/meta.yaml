objetivos:
  - Comprender como las condiciones de frontera en tubos determinan modos y frecuencias resonantes permitidas.
  - Aplicar formulas de tubo abierto-abierto y abierto-cerrado con unidades SI y criterio fisico.
  - Relacionar resultados de calculadora con patrones espaciales en graficas.
  - Detectar errores de frontera, unidades y seleccion modal antes de cerrar la resolucion.
