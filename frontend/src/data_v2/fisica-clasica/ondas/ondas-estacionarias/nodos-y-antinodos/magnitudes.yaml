version: 1
magnitudes:
  - id: n
    symbol: n
    nombre: modo
    unidad_si: '1'
    descripcion: Entero que identifica el modo estacionario.
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud efectiva del sistema estacionario.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad de propagacion en el medio.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda asociada al modo n.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia del modo n.
  - id: d_nn
    symbol: d_{NN}
    nombre: distancia_entre_nodos
    unidad_si: m
    descripcion: Separacion entre nodos consecutivos.
  - id: d_na
    symbol: d_{NA}
    nombre: distancia_nodo_antinodo
    unidad_si: m
    descripcion: Separacion entre nodo y antinodo consecutivos.
  - id: x_Np
    symbol: x_{N,p}
    nombre: posicion_nodo
    unidad_si: m
    descripcion: Posicion del nodo de indice p.
  - id: x_Ap
    symbol: x_{A,p}
    nombre: posicion_antinodo
    unidad_si: m
    descripcion: Posicion del antinodo de indice p.
  - id: p
    symbol: p
    nombre: indice_espacial
    unidad_si: '1'
    descripcion: Entero de enumeracion espacial de nodos y antinodos.
