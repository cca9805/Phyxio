version: 1
magnitudes:
  - id: n
    symbol: n
    nombre: modo
    unidad_si: '1'
    descripcion: Indice modal entero permitido por frontera.
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud efectiva del sistema resonante.
  - id: v
    symbol: v
    nombre: velocidad
    unidad_si: m/s
    descripcion: Velocidad de onda en el medio.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda del modo n.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia propia del modo n.
  - id: f_exc
    symbol: f_{exc}
    nombre: frecuencia_excitacion
    unidad_si: Hz
    descripcion: Frecuencia de excitacion aplicada al sistema.
  - id: f0
    symbol: f_0
    nombre: frecuencia_pico
    unidad_si: Hz
    descripcion: Frecuencia del maximo de respuesta.
  - id: Delta_f
    symbol: \Delta f
    nombre: ancho_banda
    unidad_si: Hz
    descripcion: Ancho de banda de media potencia alrededor de f0.
  - id: Q
    symbol: Q
    nombre: factor_calidad
    unidad_si: '1'
    descripcion: Medida de selectividad del pico resonante.
  - id: zeta
    symbol: \zeta
    nombre: amortiguamiento_equivalente
    unidad_si: '1'
    descripcion: Amortiguamiento adimensional aproximado del modo.
