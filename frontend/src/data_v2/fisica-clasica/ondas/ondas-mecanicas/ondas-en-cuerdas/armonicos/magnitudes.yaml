version: 1
magnitudes:
  - id: fn
    symbol: f_n
    nombre: frecuencia_armonica_n
    unidad_si: Hz
    descripcion: Frecuencia del modo armonico n.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia del primer modo permitido.
  - id: n
    symbol: n
    nombre: numero_armonico
    unidad_si: '1'
    descripcion: Indice modal entero positivo.
  - id: v
    symbol: v
    nombre: velocidad_propagacion_cuerda
    unidad_si: m/s
    descripcion: Velocidad de la onda viajera en la cuerda.
  - id: L
    symbol: L
    nombre: longitud_vibrante
    unidad_si: m
    descripcion: Longitud efectiva entre extremos fijos.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_armonica_n
    unidad_si: m
    descripcion: Longitud de onda asociada al modo n.
  - id: F_t
    symbol: F_t
    nombre: tension_cuerda
    unidad_si: N
    descripcion: Tension mecanica de la cuerda.
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud de la cuerda.
  - id: r_n
    symbol: r_n
    nombre: razon_armonica
    unidad_si: '1'
    descripcion: Cociente entre frecuencia armonica y fundamental.
  - id: k_n
    symbol: k_n
    nombre: numero_onda_armonica_n
    unidad_si: rad/m
    descripcion: Numero de onda modal del armonico n.
  - id: omega_n
    symbol: \omega_n
    nombre: frecuencia_angular_armonica_n
    unidad_si: rad/s
    descripcion: Frecuencia angular del modo n.
  - id: A_n
    symbol: A_n
    nombre: amplitud_armonica_n
    unidad_si: m
    descripcion: Amplitud del armonico n en sintesis modal.
  - id: phi_n
    symbol: \phi_n
    nombre: fase_armonica_n
    unidad_si: rad
    descripcion: Fase inicial del armonico n.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial sobre la cuerda.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Instante temporal de evaluacion.
  - id: y
    symbol: y
    nombre: desplazamiento_transversal
    unidad_si: m
    descripcion: Desplazamiento local de la cuerda.
