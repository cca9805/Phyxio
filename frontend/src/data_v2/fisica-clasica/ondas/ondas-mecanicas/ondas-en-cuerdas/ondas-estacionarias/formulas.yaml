version: 1
topic:
  id: ondas-estacionarias
  title: Ondas Estacionarias En Cuerdas
variables:
  - id: fn
    symbol: f_n
    name: frecuencia_modo
    si_unit: Hz
  - id: f1
    symbol: f_1
    name: frecuencia_fundamental
    si_unit: Hz
  - id: n
    symbol: n
    name: modo
    si_unit: '1'
  - id: v
    symbol: v
    name: velocidad_propagacion
    si_unit: m/s
  - id: L
    symbol: L
    name: longitud_cuerda
    si_unit: m
  - id: lambda_n
    symbol: \lambda_n
    name: longitud_onda_modal
    si_unit: m
  - id: k_n
    symbol: k_n
    name: numero_onda_modal
    si_unit: rad/m
  - id: omega_n
    symbol: \omega_n
    name: frecuencia_angular_modal
    si_unit: rad/s
  - id: F_t
    symbol: F_t
    name: tension
    si_unit: N
  - id: mu_l
    symbol: \mu_l
    name: densidad_lineal
    si_unit: kg/m
  - id: A
    symbol: A
    name: amplitud_viajera
    si_unit: m
  - id: x
    symbol: x
    name: posicion
    si_unit: m
  - id: t
    symbol: t
    name: tiempo
    si_unit: s
  - id: phi_0
    symbol: \phi_0
    name: fase_inicial
    si_unit: rad
  - id: y
    symbol: y
    name: desplazamiento_transversal
    si_unit: m
formulas:
  - id: frecuencia_modal
    title: Frecuencia modal en cuerda fija-fija
    equation: fn = n*v/(2*L)
    latex: f_n=\frac{nv}{2L}
    rearrangements:
      - target: fn
        equation: fn = n*v/(2*L)
        latex: f_n=\frac{nv}{2L}
      - target: v
        equation: v = 2*L*fn/n
        latex: v=\frac{2Lf_n}{n}
      - target: L
        equation: L = n*v/(2*fn)
        latex: L=\frac{nv}{2f_n}
      - target: n
        equation: n = 2*L*fn/v
        latex: n=\frac{2Lf_n}{v}

  - id: longitud_onda_modal
    title: Longitud de onda del modo n
    equation: lambda_n = 2*L/n
    latex: \lambda_n=\frac{2L}{n}
    rearrangements:
      - target: lambda_n
        equation: lambda_n = 2*L/n
        latex: \lambda_n=\frac{2L}{n}
      - target: L
        equation: L = n*lambda_n/2
        latex: L=\frac{n\lambda_n}{2}
      - target: n
        equation: n = 2*L/lambda_n
        latex: n=\frac{2L}{\lambda_n}

  - id: fundamental
    title: Frecuencia fundamental
    equation: f1 = v/(2*L)
    latex: f_1=\frac{v}{2L}
    rearrangements:
      - target: f1
        equation: f1 = v/(2*L)
        latex: f_1=\frac{v}{2L}
      - target: v
        equation: v = 2*L*f1
        latex: v=2Lf_1
      - target: L
        equation: L = v/(2*f1)
        latex: L=\frac{v}{2f_1}

  - id: armonicos
    title: Relacion armonica
    equation: fn = n*f1
    latex: f_n=nf_1
    rearrangements:
      - target: fn
        equation: fn = n*f1
        latex: f_n=nf_1
      - target: f1
        equation: f1 = fn/n
        latex: f_1=\frac{f_n}{n}
      - target: n
        equation: n = fn/f1
        latex: n=\frac{f_n}{f_1}

  - id: velocidad_cuerda
    title: Velocidad de propagacion en cuerda tensa
    equation: v = sqrt(F_t/mu_l)
    latex: v=\sqrt{\frac{F_t}{\mu_l}}
    rearrangements:
      - target: v
        equation: v = sqrt(F_t/mu_l)
        latex: v=\sqrt{\frac{F_t}{\mu_l}}
      - target: F_t
        equation: F_t = mu_l*v^2
        latex: F_t=\mu_l v^2
      - target: mu_l
        equation: mu_l = F_t/v^2
        latex: \mu_l=\frac{F_t}{v^2}

  - id: frecuencia_modal_con_medio
    title: Frecuencia modal segun tension y densidad lineal
    equation: fn = (n/(2*L))*sqrt(F_t/mu_l)
    latex: f_n=\frac{n}{2L}\sqrt{\frac{F_t}{\mu_l}}
    rearrangements:
      - target: fn
        equation: fn = (n/(2*L))*sqrt(F_t/mu_l)
        latex: f_n=\frac{n}{2L}\sqrt{\frac{F_t}{\mu_l}}

  - id: numero_onda_modal
    title: Numero de onda modal
    equation: k_n = n*pi/L
    latex: k_n=\frac{n\pi}{L}
    rearrangements:
      - target: k_n
        equation: k_n = n*pi/L
        latex: k_n=\frac{n\pi}{L}
      - target: n
        equation: n = k_n*L/pi
        latex: n=\frac{k_nL}{\pi}
      - target: L
        equation: L = n*pi/k_n
        latex: L=\frac{n\pi}{k_n}

  - id: frecuencia_angular_modal
    title: Frecuencia angular modal
    equation: omega_n = 2*pi*fn
    latex: \omega_n=2\pi f_n
    rearrangements:
      - target: omega_n
        equation: omega_n = 2*pi*fn
        latex: \omega_n=2\pi f_n
      - target: fn
        equation: fn = omega_n/(2*pi)
        latex: f_n=\frac{\omega_n}{2\pi}

  - id: perfil_estacionario
    title: Perfil espacial-temporal del modo n
    equation: y = 2*A*sin(n*pi*x/L)*cos(omega_n*t + phi_0)
    latex: y_n(x,t)=2A\sin\!\left(\frac{n\pi x}{L}\right)\cos(\omega_n t+\phi_0)
    calculable: false
    motivo_no_calculable: Depende simultaneamente de x y t; es formula de perfil, no salida escalar unica.

  - id: criterio_lineal_amplitud
    title: Criterio lineal amplitud-velocidad
    equation: v_independiente_de_A
    latex: v\ \text{independiente de}\ A\ \text{(regimen lineal)}
    calculable: false
    motivo_no_calculable: Regla conceptual de validez del modelo.
ui:
  default_formula: frecuencia_modal
  groups:
    - title: Modos y armonicos (calculables)
      items:
        - frecuencia_modal
        - longitud_onda_modal
        - fundamental
        - armonicos
    - title: Medio y conversiones (calculables)
      items:
        - velocidad_cuerda
        - frecuencia_modal_con_medio
        - numero_onda_modal
        - frecuencia_angular_modal
    - title: Modelo teorico
      items:
        - perfil_estacionario
        - criterio_lineal_amplitud
