version: 1
magnitudes:
  - id: fn
    symbol: f_n
    nombre: frecuencia_modo_n
    unidad_si: Hz
    descripcion: Frecuencia asociada al modo n permitido.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia del primer modo de vibracion (n=1).
  - id: n
    symbol: n
    nombre: numero_modo
    unidad_si: '1'
    descripcion: Entero positivo que etiqueta el modo estacionario.
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Velocidad de onda viajera en la cuerda.
  - id: L
    symbol: L
    nombre: longitud_cuerda
    unidad_si: m
    descripcion: Longitud vibrante entre extremos fijos.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modo_n
    unidad_si: m
    descripcion: Longitud de onda del modo n en cuerda fija-fija.
  - id: k_n
    symbol: k_n
    nombre: numero_onda_modo_n
    unidad_si: rad/m
    descripcion: Numero de onda del modo n. k_n=n*pi/L.
  - id: omega_n
    symbol: \omega_n
    nombre: frecuencia_angular_modo_n
    unidad_si: rad/s
    descripcion: Frecuencia angular del modo n. omega_n=2*pi*fn.
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: N
    descripcion: Tension efectiva de la cuerda.
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud de la cuerda.
  - id: A
    symbol: A
    nombre: amplitud_viajera
    unidad_si: m
    descripcion: Amplitud de cada onda viajera que compone la estacionaria.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial en la cuerda.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Instante temporal de observacion.
  - id: phi_0
    symbol: \phi_0
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Fase inicial del modo.
  - id: y
    symbol: y
    nombre: desplazamiento_transversal
    unidad_si: m
    descripcion: Desplazamiento local de la cuerda en x,t.
