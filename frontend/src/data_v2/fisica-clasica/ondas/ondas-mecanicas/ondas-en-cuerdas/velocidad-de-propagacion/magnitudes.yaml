version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Rapidez de avance de la perturbacion en la cuerda.
  - id: F_t
    symbol: F_t
    nombre: tension
    unidad_si: N
    descripcion: Fuerza de tension efectiva en la cuerda.
  - id: mu_l
    symbol: \mu_l
    nombre: densidad_lineal
    unidad_si: kg/m
    descripcion: Masa por unidad de longitud de la cuerda.
  - id: m
    symbol: m
    nombre: masa_tramo
    unidad_si: kg
    descripcion: Masa del tramo usado para calcular mu_l.
  - id: L
    symbol: L
    nombre: longitud_tramo
    unidad_si: m
    descripcion: Longitud efectiva del tramo vibrante.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial de un ciclo en la cuerda.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Ciclos por segundo de la oscilacion.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo por ciclo. T=1/f.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Primer modo de vibracion con extremos fijos.
  - id: n
    symbol: n
    nombre: numero_armonico
    unidad_si: '1'
    descripcion: Indice entero del modo armonico.
  - id: fn
    symbol: f_n
    nombre: frecuencia_armonico_n
    unidad_si: Hz
    descripcion: Frecuencia del modo n de la cuerda.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_armonico_n
    unidad_si: m
    descripcion: Longitud de onda asociada al modo n.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Ritmo espacial de fase. k=2*pi/lambda.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Ritmo temporal angular. omega=2*pi*f.
