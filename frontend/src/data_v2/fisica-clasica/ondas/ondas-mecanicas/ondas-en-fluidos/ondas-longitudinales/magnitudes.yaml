version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_fase
    unidad_si: m/s
    descripcion: Velocidad de propagacion de fase en el fluido.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre compresiones equivalentes.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Ciclos por segundo de la oscilacion.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular de la onda.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia temporal angular de la onda.
  - id: B
    symbol: B
    nombre: modulo_compresion
    unidad_si: Pa
    descripcion: Rigidez volumetrica efectiva del fluido.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del fluido.
  - id: Z
    symbol: Z
    nombre: impedancia_acustica
    unidad_si: Pa*s/m
    descripcion: Relacion entre amplitud de presion y velocidad de particula.
  - id: p_hat
    symbol: \hat{p}
    nombre: amplitud_presion
    unidad_si: Pa
    descripcion: Amplitud de la oscilacion de presion.
  - id: u_hat
    symbol: \hat{u}
    nombre: amplitud_velocidad_particula
    unidad_si: m/s
    descripcion: Amplitud de velocidad oscilatoria de particulas del fluido.
  - id: I
    symbol: I
    nombre: intensidad_media
    unidad_si: W/m^2
    descripcion: Flujo promedio de energia acustica por unidad de area.
  - id: p
    symbol: p
    nombre: presion_instante
    unidad_si: Pa
    descripcion: Valor instantaneo de presion en un punto del medio.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial de evaluacion.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Instante temporal de evaluacion.
  - id: phi_0
    symbol: \phi_0
    nombre: fase_inicial
    unidad_si: rad
    descripcion: Fase inicial de la onda armonica.
