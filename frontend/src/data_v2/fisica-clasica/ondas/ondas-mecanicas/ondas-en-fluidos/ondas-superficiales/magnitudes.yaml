version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_fase
    unidad_si: m/s
    descripcion: Velocidad de propagacion de fase de la onda superficial.
  - id: v_g
    symbol: v_g
    nombre: velocidad_grupo
    unidad_si: m/s
    descripcion: Velocidad de transporte de energia del paquete de ondas.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia entre dos crestas consecutivas.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo por ciclo. T=1/f.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Numero de onda espacial. k=2*pi/lambda.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia angular temporal. omega=2*pi*f.
  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Aceleracion gravitatoria local.
  - id: h
    symbol: h
    nombre: profundidad
    unidad_si: m
    descripcion: Profundidad del fluido bajo la onda.
  - id: kh
    symbol: kh
    nombre: parametro_regimen
    unidad_si: '1'
    descripcion: Producto adimensional que clasifica el regimen profundo/somero.
  - id: sigma
    symbol: \sigma
    nombre: tension_superficial
    unidad_si: N/m
    descripcion: Fuerza por unidad de longitud asociada a la interfase fluido-aire.
  - id: rho
    symbol: \rho
    nombre: densidad_fluido
    unidad_si: kg/m^3
    descripcion: Densidad del fluido donde se propaga la onda.
