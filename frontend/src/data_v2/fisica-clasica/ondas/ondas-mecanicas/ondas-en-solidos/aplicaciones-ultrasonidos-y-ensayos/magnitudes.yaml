version: 1
magnitudes:
  - id: e
    symbol: e
    nombre: espesor
    unidad_si: m
    descripcion: Espesor o profundidad equivalente estimada por tiempo de vuelo.
  - id: v
    symbol: v
    nombre: velocidad_ultrasonica
    unidad_si: m/s
    descripcion: Velocidad de propagacion de la onda ultrasonica en el material.
  - id: t
    symbol: t
    nombre: tiempo_vuelo
    unidad_si: s
    descripcion: Tiempo de vuelo total medido en pulso-eco (ida y vuelta).
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Densidad volumetrica del medio.
  - id: Z
    symbol: Z
    nombre: impedancia
    unidad_si: kg/(m^2*s)
    descripcion: Impedancia acustica mecanica del medio.
  - id: Z1
    symbol: Z_1
    nombre: impedancia_medio_1
    unidad_si: kg/(m^2*s)
    descripcion: Impedancia del medio incidente.
  - id: Z2
    symbol: Z_2
    nombre: impedancia_medio_2
    unidad_si: kg/(m^2*s)
    descripcion: Impedancia del medio de transmision.
  - id: R_A
    symbol: R_A
    nombre: reflexion_amplitud
    unidad_si: '1'
    descripcion: Coeficiente de reflexion en amplitud para incidencia normal.
  - id: R_I
    symbol: R_I
    nombre: reflexion_intensidad
    unidad_si: '1'
    descripcion: Fraccion de intensidad reflejada en la interfaz.
  - id: T_I
    symbol: T_I
    nombre: transmision_intensidad
    unidad_si: '1'
    descripcion: Fraccion de intensidad transmitida en la interfaz.
  - id: A0
    symbol: A_0
    nombre: amplitud_referencia
    unidad_si: '1'
    descripcion: Amplitud de referencia en el punto inicial.
  - id: Ax
    symbol: A_x
    nombre: amplitud_x
    unidad_si: '1'
    descripcion: Amplitud medida tras recorrer una distancia x.
  - id: A_dB
    symbol: A_{dB}
    nombre: perdida_db
    unidad_si: dB
    descripcion: Perdida de amplitud total expresada en decibelios.
  - id: alpha_dB
    symbol: \alpha_{dB}
    nombre: atenuacion_db_m
    unidad_si: dB/m
    descripcion: Atenuacion media por unidad de longitud.
  - id: alpha_Np
    symbol: \alpha_{Np}
    nombre: atenuacion_np_m
    unidad_si: Np/m
    descripcion: Atenuacion media por unidad de longitud en neper.
  - id: x
    symbol: x
    nombre: distancia
    unidad_si: m
    descripcion: Distancia efectiva recorrida por la onda.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Frecuencia de trabajo del transductor.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Longitud de onda asociada a la frecuencia de ensayo.
