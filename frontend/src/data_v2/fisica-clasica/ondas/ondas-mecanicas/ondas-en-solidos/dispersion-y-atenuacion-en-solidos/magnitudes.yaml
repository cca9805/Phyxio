version: 1
magnitudes:
  - id: vp
    symbol: v_p
    nombre: velocidad_fase
    unidad_si: m/s
    descripcion: Velocidad de avance de fase de un componente espectral.
  - id: vg
    symbol: v_g
    nombre: velocidad_grupo
    unidad_si: m/s
    descripcion: Velocidad de transporte de envolvente y energia del pulso.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia temporal angular.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular.
  - id: ratioA
    symbol: r_A
    nombre: ratio_amplitud
    unidad_si: '1'
    descripcion: Cociente entre amplitud medida a distancia y amplitud inicial.
  - id: Ax
    symbol: A_x
    nombre: amplitud_x
    unidad_si: '1'
    descripcion: Amplitud medida tras propagacion una distancia x.
  - id: A0
    symbol: A_0
    nombre: amplitud_0
    unidad_si: '1'
    descripcion: Amplitud de referencia al inicio de propagacion.
  - id: alpha_Np
    symbol: \alpha_{Np}
    nombre: atenuacion_neper_m
    unidad_si: Np/m
    descripcion: Coeficiente exponencial de atenuacion por unidad de longitud.
  - id: alpha_dB
    symbol: \alpha_{dB}
    nombre: atenuacion_db_m
    unidad_si: dB/m
    descripcion: Atenuacion media expresada en decibelios por metro.
  - id: atten_dB
    symbol: A_{dB}
    nombre: perdida_db
    unidad_si: dB
    descripcion: Perdida total de amplitud en decibelios entre dos puntos.
  - id: x
    symbol: x
    nombre: distancia
    unidad_si: m
    descripcion: Distancia de propagacion entre mediciones.
