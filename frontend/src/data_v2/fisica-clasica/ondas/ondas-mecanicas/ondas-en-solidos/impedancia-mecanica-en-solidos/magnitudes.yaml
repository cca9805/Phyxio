version: 1
magnitudes:
  - id: Z
    symbol: Z
    nombre: impedancia_mecanica
    unidad_si: Pa*s/m
    descripcion: Relacion dinamica entre amplitud de presion/esfuerzo y velocidad de particula.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del medio.
  - id: v
    symbol: v
    nombre: velocidad_onda
    unidad_si: m/s
    descripcion: Velocidad de propagacion del modo ondulatorio analizado.
  - id: p_hat
    symbol: \hat p
    nombre: amplitud_presion
    unidad_si: Pa
    descripcion: Amplitud de presion o esfuerzo dinamico asociado a la onda.
  - id: u_hat
    symbol: \hat u
    nombre: amplitud_velocidad_particula
    unidad_si: m/s
    descripcion: Amplitud de velocidad oscilatoria de las particulas del medio.
  - id: I
    symbol: I
    nombre: intensidad_media
    unidad_si: W/m^2
    descripcion: Flujo medio de energia por unidad de area.
  - id: P
    symbol: P
    nombre: potencia
    unidad_si: W
    descripcion: Potencia transportada por la onda a traves de un area dada.
  - id: A
    symbol: A
    nombre: area_transmision
    unidad_si: m^2
    descripcion: Area efectiva por la que se transmite energia.
