version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Velocidad de avance de fase de la onda.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial de repeticion del patron.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: vL
    symbol: v_L
    nombre: velocidad_longitudinal
    unidad_si: m/s
    descripcion: Velocidad de onda longitudinal en el solido.
  - id: vT
    symbol: v_T
    nombre: velocidad_transversal
    unidad_si: m/s
    descripcion: Velocidad de onda de corte en el solido.
  - id: K
    symbol: K
    nombre: modulo_compresion
    unidad_si: Pa
    descripcion: Rigidez volumetrica efectiva ante compresion.
  - id: G
    symbol: G
    nombre: modulo_corte
    unidad_si: Pa
    descripcion: Rigidez ante deformaciones de corte.
  - id: E
    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: Rigidez axial uniaxial del material.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del solido.
  - id: nu
    symbol: \nu
    nombre: coeficiente_poisson
    unidad_si: '1'
    descripcion: Acoplamiento entre deformacion axial y transversal.
  - id: ZL
    symbol: Z_L
    nombre: impedancia_longitudinal
    unidad_si: kg/(m^2*s)
    descripcion: Producto densidad por velocidad longitudinal.
  - id: ZT
    symbol: Z_T
    nombre: impedancia_transversal
    unidad_si: kg/(m^2*s)
    descripcion: Producto densidad por velocidad transversal.
