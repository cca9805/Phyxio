version: 1
magnitudes:
  - id: E
    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: Rigidez elastica axial del material.
  - id: I
    symbol: I
    nombre: segundo_momento_area
    unidad_si: m^4
    descripcion: Propiedad geometrica de seccion que controla rigidez flexional junto con E.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del material.
  - id: A
    symbol: A
    nombre: area_seccion
    unidad_si: m^2
    descripcion: Area de seccion transversal de la viga.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular de la onda flexional.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia temporal angular de la onda.
  - id: vp
    symbol: v_p
    nombre: velocidad_fase
    unidad_si: m/s
    descripcion: Velocidad de avance de fase para un componente espectral.
  - id: vg
    symbol: v_g
    nombre: velocidad_grupo
    unidad_si: m/s
    descripcion: Velocidad de transporte de envolvente y energia.
  - id: L
    symbol: L
    nombre: longitud_viga
    unidad_si: m
    descripcion: Longitud efectiva entre apoyos o condiciones de frontera.
  - id: n
    symbol: n
    nombre: indice_modal
    unidad_si: '1'
    descripcion: Entero positivo que define el modo.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia propia del modo n para la frontera dada.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre puntos en fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo asociado a un ciclo completo.
