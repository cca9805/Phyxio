version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_axial
    unidad_si: m/s
    descripcion: Velocidad de propagacion longitudinal en la barra.
  - id: E
    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: Rigidez axial del material de la barra.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del material.
  - id: n
    symbol: n
    nombre: indice_modal
    unidad_si: '1'
    descripcion: Entero positivo que identifica el modo de vibracion.
  - id: L
    symbol: L
    nombre: longitud_vibrante
    unidad_si: m
    descripcion: Longitud efectiva que participa en la vibracion axial.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia del modo n segun frontera y propiedades del medio.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda espacial asociada al modo n.
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia del primer modo permitido por la frontera.
  - id: k_n
    symbol: k_n
    nombre: numero_onda_modal
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular del modo n.
  - id: omega_n
    symbol: \omega_n
    nombre: frecuencia_angular_modal
    unidad_si: rad/s
    descripcion: Frecuencia angular del modo n.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Frecuencia de oscilacion asociada al modo analizado.
