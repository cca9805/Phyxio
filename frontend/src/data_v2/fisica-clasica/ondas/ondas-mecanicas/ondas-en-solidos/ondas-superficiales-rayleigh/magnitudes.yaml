version: 1
magnitudes:
  - id: vS
    symbol: v_S
    nombre: velocidad_corte
    unidad_si: m/s
    descripcion: Velocidad de onda de corte en el volumen del material.
  - id: vR
    symbol: v_R
    nombre: velocidad_rayleigh
    unidad_si: m/s
    descripcion: Velocidad de onda Rayleigh en superficie.
  - id: nu
    symbol: \nu
    nombre: coeficiente_poisson
    unidad_si: '1'
    descripcion: Parametro elastico que modula el factor Rayleigh.
  - id: cR
    symbol: c_R
    nombre: factor_rayleigh
    unidad_si: '1'
    descripcion: Factor adimensional tal que vR ~= cR*vS.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Longitud de onda superficial en direccion de propagacion.
  - id: zp
    symbol: z_p
    nombre: profundidad_penetracion
    unidad_si: m
    descripcion: Escala caracteristica de penetracion de amplitud en profundidad.
  - id: G
    symbol: G
    nombre: modulo_corte
    unidad_si: Pa
    descripcion: Rigidez del material frente a deformacion cortante.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del medio.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular de la onda Rayleigh.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia temporal angular.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
