version: 1
magnitudes:
  - id: vS
    symbol: v_S
    nombre: velocidad_corte
    unidad_si: m/s
    descripcion: Velocidad de propagacion de la onda transversal de corte.
  - id: G
    symbol: G
    nombre: modulo_corte
    unidad_si: Pa
    descripcion: Rigidez del material frente a deformacion cortante.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del material.
  - id: tau
    symbol: \tau
    nombre: esfuerzo_cortante
    unidad_si: Pa
    descripcion: Esfuerzo tangencial asociado a la deformacion de corte.
  - id: gamma
    symbol: \gamma
    nombre: deformacion_cortante
    unidad_si: '1'
    descripcion: Deformacion angular adimensional en el estado de corte.
  - id: n
    symbol: n
    nombre: indice_modal
    unidad_si: '1'
    descripcion: Entero positivo que identifica el modo.
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud vibrante efectiva del sistema.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia correspondiente al modo n.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_modal
    unidad_si: m
    descripcion: Longitud de onda del modo n.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia entre puntos en fase para una onda de corte.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Frecuencia espacial angular.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Frecuencia temporal angular.
