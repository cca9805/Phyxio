version: 1
magnitudes:
  - id: sigma
    symbol: \sigma
    nombre: esfuerzo_normal
    unidad_si: Pa
    descripcion: Fuerza normal por unidad de area en el material.
  - id: epsilon
    symbol: \epsilon
    nombre: deformacion_uniaxial
    unidad_si: '1'
    descripcion: Deformacion relativa longitudinal (adimensional).
  - id: E
    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: Rigidez axial lineal del material.
  - id: G
    symbol: G
    nombre: modulo_corte
    unidad_si: Pa
    descripcion: Rigidez frente a deformacion de corte.
  - id: K
    symbol: K
    nombre: modulo_volumetrico
    unidad_si: Pa
    descripcion: Rigidez frente a compresion volumetrica.
  - id: nu
    symbol: \nu
    nombre: coeficiente_poisson
    unidad_si: '1'
    descripcion: Relacion entre deformacion transversal y longitudinal.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del material.
  - id: vL
    symbol: v_L
    nombre: velocidad_longitudinal
    unidad_si: m/s
    descripcion: Velocidad de propagacion de onda longitudinal.
  - id: vT
    symbol: v_T
    nombre: velocidad_transversal
    unidad_si: m/s
    descripcion: Velocidad de propagacion de onda de corte.
  - id: ZL
    symbol: Z_L
    nombre: impedancia_longitudinal
    unidad_si: kg/(m^2*s)
    descripcion: Producto densidad por velocidad longitudinal.
  - id: ZT
    symbol: Z_T
    nombre: impedancia_transversal
    unidad_si: kg/(m^2*s)
    descripcion: Producto densidad por velocidad transversal.
