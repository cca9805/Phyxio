  - id: Q
    symbol: Q
    nombre: factor_calidad
    unidad_si: '1'
    descripcion: Medida de agudeza de resonancia y bajas perdidas.
  - id: zeta
    symbol: \zeta
    nombre: razon_amortiguamiento
    unidad_si: '1'
    descripcion: Amortiguamiento equivalente del modo dominante.
