    symbol: f_2
    nombre: frecuencia_media_potencia_superior
    unidad_si: Hz
    descripcion: Frecuencia superior al nivel de media potencia (-3 dB).
  - id: Delta_f
    symbol: \Delta f
    nombre: ancho_banda
    unidad_si: Hz
