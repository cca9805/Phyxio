  - id: n
    symbol: n
    nombre: numero_modo
    unidad_si: '1'
    descripcion: Indice modal entero positivo.
  - id: fn
    symbol: f_n
    nombre: frecuencia_modal
    unidad_si: Hz
    descripcion: Frecuencia del modo n.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_modal
    unidad_si: m
    descripcion: Longitud de onda del modo n.
