    symbol: E
    nombre: modulo_young
    unidad_si: Pa
    descripcion: Rigidez elastica axial del material de la barra.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Inercia volumetrica del material.
  - id: v
    symbol: v
    nombre: velocidad_axial
    unidad_si: m/s
    descripcion: Velocidad de propagacion longitudinal en la barra.
  - id: L
    symbol: L
    nombre: longitud_efectiva
