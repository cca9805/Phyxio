version: 1
magnitudes:
  - id: vL
    symbol: v_L
    nombre: velocidad_longitudinal
    unidad_si: m/s
    descripcion: Velocidad de onda longitudinal en el volumen del solido.
  - id: vT
    symbol: v_T
    nombre: velocidad_transversal
    unidad_si: m/s
    descripcion: Velocidad de onda de corte en el volumen del solido.
  - id: vR
    symbol: v_R
    nombre: velocidad_rayleigh
    unidad_si: m/s
    descripcion: Velocidad de onda superficial Rayleigh.
  - id: nu
    symbol: \nu
    nombre: coeficiente_poisson
    unidad_si: '1'
    descripcion: Parametro elastico que relaciona deformaciones longitudinal y transversal.
  - id: cR
    symbol: c_R
    nombre: factor_rayleigh
    unidad_si: '1'
    descripcion: Factor adimensional aproximado para estimar v_R a partir de v_T.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre puntos en fase del mismo modo ondulatorio.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo de la onda.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo correspondiente a un ciclo completo.
  - id: K
    symbol: K
    nombre: modulo_volumetrico
    unidad_si: Pa
    descripcion: Rigidez efectiva frente a compresion volumetrica.
  - id: G
    symbol: G
    nombre: modulo_corte
    unidad_si: Pa
    descripcion: Rigidez frente a deformacion cortante.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del material.
