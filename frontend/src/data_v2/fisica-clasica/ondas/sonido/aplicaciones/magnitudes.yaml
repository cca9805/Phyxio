version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Velocidad de propagacion del sonido en el medio.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre puntos en fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Frecuencia de oscilacion de la señal sonora.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de un ciclo completo.
  - id: d
    symbol: d
    nombre: distancia
    unidad_si: m
    descripcion: Distancia estimada en problemas de tiempo de vuelo o eco.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de propagacion en trayectos de ida.
  - id: t_echo
    symbol: t_{echo}
    nombre: tiempo_eco
    unidad_si: s
    descripcion: Tiempo de ida-vuelta de una señal reflejada.
  - id: P
    symbol: P
    nombre: potencia_sonora
    unidad_si: W
    descripcion: Potencia acustica emitida por la fuente.
  - id: I
    symbol: I
    nombre: intensidad
    unidad_si: W/m^2
    descripcion: Flujo de potencia por unidad de area.
  - id: r
    symbol: r
    nombre: distancia_fuente
    unidad_si: m
    descripcion: Distancia fuente-observador en modelo puntual.
  - id: I0
    symbol: I_0
    nombre: intensidad_referencia
    unidad_si: W/m^2
    descripcion: Referencia de intensidad usada para escala en dB.
  - id: beta
    symbol: \beta
    nombre: nivel_sonoro
    unidad_si: dB
    descripcion: Nivel sonoro logaritmico relativo a I0.
  - id: f0
    symbol: f_0
    nombre: frecuencia_fuente
    unidad_si: Hz
    descripcion: Frecuencia emitida por la fuente en problemas Doppler.
  - id: fobs
    symbol: f_{obs}
    nombre: frecuencia_observada
    unidad_si: Hz
    descripcion: Frecuencia medida por el observador en Doppler.
  - id: vo
    symbol: v_o
    nombre: velocidad_observador
    unidad_si: m/s
    descripcion: Velocidad del observador respecto al medio.
  - id: vs
    symbol: v_s
    nombre: velocidad_fuente
    unidad_si: m/s
    descripcion: Velocidad de la fuente respecto al medio.
  - id: delta_f
    symbol: \Delta f
    nombre: corrimiento_frecuencia
    unidad_si: Hz
    descripcion: Diferencia entre frecuencia observada y emitida.
