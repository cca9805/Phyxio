version: 1
magnitudes:
  - id: f0
    symbol: f_0
    nombre: frecuencia_fuente
    unidad_si: Hz
    descripcion: Frecuencia propia emitida por la fuente sonora.
  - id: fobs
    symbol: f_{obs}
    nombre: frecuencia_observada
    unidad_si: Hz
    descripcion: Frecuencia registrada por el observador tras el corrimiento Doppler.
  - id: v
    symbol: v
    nombre: velocidad_onda
    unidad_si: m/s
    descripcion: Velocidad de propagacion del sonido en el medio.
  - id: vo
    symbol: v_o
    nombre: velocidad_observador
    unidad_si: m/s
    descripcion: Velocidad del observador respecto al medio.
  - id: vs
    symbol: v_s
    nombre: velocidad_fuente
    unidad_si: m/s
    descripcion: Velocidad de la fuente respecto al medio.
  - id: delta_f
    symbol: \Delta f
    nombre: corrimiento_frecuencia
    unidad_si: Hz
    descripcion: Diferencia entre frecuencia observada y emitida (fobs - f0).
  - id: beta
    symbol: \beta
    nombre: beta_relativista
    unidad_si: '1'
    descripcion: Cociente adimensional u/c en formulacion relativista conceptual.
  - id: c
    symbol: c
    nombre: velocidad_luz
    unidad_si: m/s
    descripcion: Velocidad de la luz usada solo en la formula relativista conceptual.
  - id: u
    symbol: u
    nombre: velocidad_relativa
    unidad_si: m/s
    descripcion: Velocidad relativa fuente-observador en contexto relativista conceptual.
  - id: z
    symbol: z
    nombre: corrimiento_relativo
    unidad_si: '1'
    descripcion: Corrimiento fraccional de frecuencia o longitud de onda para comparaciones.
