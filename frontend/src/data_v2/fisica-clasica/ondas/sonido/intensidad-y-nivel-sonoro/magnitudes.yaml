version: 1
magnitudes:
  - id: I
    symbol: I
    nombre: intensidad
    unidad_si: W/m^2
    descripcion: Potencia acustica transportada por unidad de area.
  - id: P
    symbol: P
    nombre: potencia_sonora
    unidad_si: W
    descripcion: Potencia total emitida por la fuente sonora.
  - id: A
    symbol: A
    nombre: area
    unidad_si: m^2
    descripcion: Superficie sobre la que se distribuye la potencia sonora.
  - id: r
    symbol: r
    nombre: distancia
    unidad_si: m
    descripcion: Distancia desde la fuente al punto de medida.
  - id: I0
    symbol: I_0
    nombre: intensidad_referencia
    unidad_si: W/m^2
    descripcion: Intensidad de referencia para definir nivel sonoro (habitualmente 1e-12 W/m^2 en aire).
  - id: beta
    symbol: \beta
    nombre: nivel_sonoro
    unidad_si: dB
    descripcion: Nivel sonoro en escala logaritmica relativo a I0.
  - id: delta_beta
    symbol: \Delta\beta
    nombre: diferencia_nivel
    unidad_si: dB
    descripcion: Diferencia de nivel entre dos estados o dos posiciones.
  - id: I1
    symbol: I_1
    nombre: intensidad_1
    unidad_si: W/m^2
    descripcion: Intensidad de referencia inicial para comparaciones de nivel.
  - id: I2
    symbol: I_2
    nombre: intensidad_2
    unidad_si: W/m^2
    descripcion: Intensidad final para comparaciones de nivel.
