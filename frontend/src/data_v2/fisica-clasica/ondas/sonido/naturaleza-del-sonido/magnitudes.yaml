version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_propagacion
    unidad_si: m/s
    descripcion: Rapidez de avance de la perturbacion sonora en el medio.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre puntos equivalentes de fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de oscilaciones por segundo fijado por la fuente.
  - id: T
    symbol: T
    nombre: periodo
    unidad_si: s
    descripcion: Tiempo de una oscilacion completa, inverso de la frecuencia.
  - id: omega
    symbol: \omega
    nombre: frecuencia_angular
    unidad_si: rad/s
    descripcion: Ritmo angular temporal de la oscilacion sonora.
  - id: k
    symbol: k
    nombre: numero_onda
    unidad_si: rad/m
    descripcion: Ritmo angular espacial de cambio de fase.
  - id: B
    symbol: B
    nombre: modulo_compresion
    unidad_si: Pa
    descripcion: Resistencia del medio a la compresion volumetrica.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del medio de propagacion.
  - id: Tc
    symbol: T_c
    nombre: temperatura_celsius
    unidad_si: degC
    descripcion: Temperatura del aire usada para aproximar velocidad del sonido.
  - id: p_prima
    symbol: p'
    nombre: presion_acustica
    unidad_si: Pa
    descripcion: Variacion de presion respecto al equilibrio debida a la onda sonora.
  - id: u
    symbol: u
    nombre: velocidad_particula
    unidad_si: m/s
    descripcion: Velocidad oscilatoria local de las particulas del medio.
  - id: Z
    symbol: Z
    nombre: impedancia_acustica
    unidad_si: Pa*s/m
    descripcion: Relacion entre presion acustica y velocidad de particula en onda plana.
  - id: x
    symbol: x
    nombre: posicion
    unidad_si: m
    descripcion: Coordenada espacial a lo largo de la propagacion.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Variable temporal de evolucion de la onda sonora.
