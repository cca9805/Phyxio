objetivos:
  - Comprender el mecanismo fisico de propagacion del sonido en medios materiales.
  - Aplicar relaciones ondulatorias y ecuaciones del medio con unidades SI y lectura fisica correcta.
  - Distinguir variables de propagacion y variables locales acusticas en problemas reales.
  - Detectar errores de modelo, medio y unidades antes de validar resultados.
suposiciones:
