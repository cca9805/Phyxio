version: 1
magnitudes:
  - id: f1
    symbol: f_1
    nombre: frecuencia_fundamental
    unidad_si: Hz
    descripcion: Frecuencia base que determina la altura tonal principal.
  - id: fn
    symbol: f_n
    nombre: frecuencia_armonica
    unidad_si: Hz
    descripcion: Frecuencia del armonico n en la descomposicion espectral.
  - id: n
    symbol: n
    nombre: indice_armonico
    unidad_si: '1'
    descripcion: Numero entero positivo que identifica el armonico.
  - id: An
    symbol: A_n
    nombre: amplitud_armonico
    unidad_si: '1'
    descripcion: Amplitud relativa del armonico n en el espectro.
  - id: A1
    symbol: A_1
    nombre: amplitud_fundamental
    unidad_si: '1'
    descripcion: Amplitud de la componente fundamental.
  - id: rn
    symbol: r_n
    nombre: razon_armonica
    unidad_si: '1'
    descripcion: Relacion de amplitud entre armonico n y fundamental (A_n/A_1).
  - id: v
    symbol: v
    nombre: velocidad_sonido
    unidad_si: m/s
    descripcion: Velocidad de propagacion usada para estimar fundamentales en resonadores.
  - id: L
    symbol: L
    nombre: longitud_efectiva
    unidad_si: m
    descripcion: Longitud efectiva del sistema resonante.
  - id: lambda_n
    symbol: \lambda_n
    nombre: longitud_onda_armonica
    unidad_si: m
    descripcion: Longitud de onda asociada al armonico n.
  - id: fa
    symbol: f_a
    nombre: frecuencia_referencia
    unidad_si: Hz
    descripcion: Frecuencia base para comparacion perceptiva.
  - id: fb
    symbol: f_b
    nombre: frecuencia_comparada
    unidad_si: Hz
    descripcion: Frecuencia objetivo para comparar diferencia de altura.
  - id: delta_c
    symbol: \Delta c
    nombre: diferencia_cents
    unidad_si: cent
    descripcion: Diferencia de altura en cents entre dos frecuencias.
  - id: A_t
    symbol: A(t)
    nombre: envolvente_temporal
    unidad_si: '1'
    descripcion: Evolucion temporal de amplitud que contribuye al timbre.
  - id: alpha
    symbol: \alpha
    nombre: coeficiente_decaimiento
    unidad_si: 1/s
    descripcion: Parametro de decaimiento en modelos exponenciales de envolvente.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Variable temporal para describir envolvente o señal.
