version: 1
magnitudes:
  - id: v
    symbol: v
    nombre: velocidad_sonido
    unidad_si: m/s
    descripcion: Rapidez de propagacion de la perturbacion sonora en el medio.
  - id: lambda
    symbol: \lambda
    nombre: longitud_onda
    unidad_si: m
    descripcion: Distancia espacial entre puntos equivalentes de fase.
  - id: f
    symbol: f
    nombre: frecuencia
    unidad_si: Hz
    descripcion: Numero de ciclos por segundo emitidos por la fuente.
  - id: Tc
    symbol: T_c
    nombre: temperatura_celsius
    unidad_si: degC
    descripcion: Temperatura del aire en Celsius para aproximacion lineal de velocidad.
  - id: TK
    symbol: T_K
    nombre: temperatura_kelvin
    unidad_si: K
    descripcion: Temperatura absoluta usada en modelo termodinamico de gas ideal.
  - id: gamma
    symbol: \gamma
    nombre: coeficiente_adiabatico
    unidad_si: '1'
    descripcion: Cociente de capacidades calorificas del gas en proceso adiabatico.
  - id: R
    symbol: R
    nombre: constante_gases
    unidad_si: J/(mol*K)
    descripcion: Constante universal de los gases ideales.
  - id: M
    symbol: M
    nombre: masa_molar
    unidad_si: kg/mol
    descripcion: Masa molar del gas considerado.
  - id: B
    symbol: B
    nombre: modulo_compresion
    unidad_si: Pa
    descripcion: Rigidez volumetrica efectiva del medio frente a compresion.
  - id: rho
    symbol: \rho
    nombre: densidad
    unidad_si: kg/m^3
    descripcion: Masa por unidad de volumen del medio.
  - id: p0
    symbol: p_0
    nombre: presion_equilibrio
    unidad_si: Pa
    descripcion: Presion de equilibrio del medio previa al paso de la onda.
  - id: d
    symbol: d
    nombre: distancia
    unidad_si: m
    descripcion: Distancia recorrida por la onda sonora.
  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo de propagacion o tiempo de vuelo medido.
