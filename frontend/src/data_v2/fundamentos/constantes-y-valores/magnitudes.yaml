version: 1

magnitudes:
  - id: gravedad
    nombre: Aceleración de la gravedad
    simbolo: g
    unidad_si: metro por segundo cuadrado
    simbolo_unidad_si: m/s²
    tipo: constante
    descripcion: Valor medio de la aceleración gravitatoria en la superficie terrestre.

  - id: velocidad_luz
    nombre: Velocidad de la luz en el vacío
    simbolo: c
    unidad_si: metro por segundo
    simbolo_unidad_si: m/s
    tipo: constante
    descripcion: Velocidad máxima de propagación de la información en el vacío.

  - id: gravitacion
    nombre: Constante de gravitación universal
    simbolo: G
    unidad_si: newton metro cuadrado por kilogramo cuadrado
    simbolo_unidad_si: N·m²/kg²
    tipo: constante
    descripcion: Constante que aparece en la ley de gravitación universal.
