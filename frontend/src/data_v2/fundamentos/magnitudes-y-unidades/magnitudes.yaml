version: 1

magnitudes:
  - id: longitud
    nombre: Longitud
    simbolo: l
    unidad_si: metro
    simbolo_unidad_si: m
    tipo: fundamental
    descripcion: Medida de la extensión espacial de un objeto o distancia entre dos puntos.

  - id: masa
    nombre: Masa
    simbolo: m
    unidad_si: kilogramo
    simbolo_unidad_si: kg
    tipo: fundamental
    descripcion: Cantidad de materia de un cuerpo.

  - id: tiempo
    nombre: Tiempo
    simbolo: t
    unidad_si: segundo
    simbolo_unidad_si: s
    tipo: fundamental
    descripcion: Medida de la duración de los fenómenos.

  - id: temperatura
    nombre: Temperatura
    simbolo: T
    unidad_si: kelvin
    simbolo_unidad_si: K
    tipo: fundamental
    descripcion: Medida del estado térmico de un sistema.

  - id: velocidad
    nombre: Velocidad
    simbolo: v
    unidad_si: metro por segundo
    simbolo_unidad_si: m/s
    tipo: derivada
    descripcion: Relación entre el desplazamiento y el tiempo empleado.
