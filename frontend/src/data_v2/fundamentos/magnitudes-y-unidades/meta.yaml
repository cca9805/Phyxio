descripcion_corta: >
  Introducción a las magnitudes físicas, las unidades de medida y los sistemas
  de unidades utilizados para cuantificar fenómenos físicos.
tags:
  - magnitudes
  - unidades
  - sistema-internacional
  - medicion
  - fundamentos
objetivos:
  - Comprender qué es una magnitud física y por qué es necesaria su medición.
  - Distinguir entre magnitudes fundamentales y derivadas.
  - Identificar las unidades del Sistema Internacional.
  - Interpretar correctamente valores físicos con sus unidades.
  - Desarrollar rigor en el uso de unidades en cálculos físicos.
suposiciones:
  - Las magnitudes se expresan siempre mediante un valor numérico y una unidad.
  - Toda medición física está sujeta a un sistema de unidades.
  - El lenguaje matemático es una herramienta básica para describir la realidad física.
