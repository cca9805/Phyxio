version: 1

magnitudes:
  - id: desplazamiento
    nombre: Desplazamiento
    simbolo: r
    unidad_si: metro
    simbolo_unidad_si: m
    tipo: vectorial
    descripcion: Vector que indica el cambio de posición entre dos puntos.

  - id: velocidad
    nombre: Velocidad
    simbolo: v
    unidad_si: metro por segundo
    simbolo_unidad_si: m/s
    tipo: vectorial
    descripcion: Variación del desplazamiento respecto al tiempo.

  - id: fuerza
    nombre: Fuerza
    simbolo: F
    unidad_si: newton
    simbolo_unidad_si: N
    tipo: vectorial
    descripcion: Interacción capaz de modificar el estado de movimiento de un cuerpo.
