version: 1

id: mcu
nombre: "Movimiento Circular Uniforme (MCU)"
area: fisica-clasica
bloque: mecanica
subbloque: cinematica

ruta_relativa: fisica-clasica/mecanica/cinematica/mcu
orden: 751000
dificultad: 3
tiempo_estimado_min: 50

niveles:
  - Bachillerato
  - Universidad

descripcion_corta: >
  Movimiento en trayectoria circular con velocidad angular constante. El ángulo crece linealmente
  y existe aceleración centrípeta dirigida al centro.

tags:
  - cinemática
  - movimiento-circular
  - mcu
  - velocidad-angular
  - aceleracion-centripeta

prerequisitos:
  - mru
  - trigonometria-basica
  - radianes

objetivos:
  - "Relacionar magnitudes angulares (θ, ω) con lineales (s, v)."
  - "Calcular periodo y frecuencia a partir de ω o T."
  - "Entender y calcular aceleración centrípeta."
  - "Interpretar gráficas θ(t), ω(t) y a_c(t)."

suposiciones:
  - "Radio constante y trayectoria circular."
  - "ω constante (no hay aceleración angular)."
  - "Sistema de referencia inercial."
  - "Unidades coherentes (SI)."

competencias_lomloe:
  - STEM
  - razonamiento_cientifico
  - modelizacion
  - resolucion_problemas
  - interpretacion_graficas
