version: 1

id: mcua
nombre: "Movimiento Circular Uniformemente Acelerado (MCUA)"
area: fisica-clasica
bloque: mecanica
subbloque: cinematica

ruta_relativa: fisica-clasica/mecanica/cinematica/mcua
orden: 752000
dificultad: 4
tiempo_estimado_min: 60

niveles:
  - Bachillerato
  - Universidad

descripcion_corta: >
  Movimiento circular con aceleración angular constante. La velocidad angular cambia linealmente
  con el tiempo y el ángulo incluye un término cuadrático.

tags:
  - cinemática
  - movimiento-circular
  - mcua
  - aceleracion-angular
  - dinamica-rotacional-intro

prerequisitos:
  - mcu
  - mrua
  - trigonometria-basica
  - radianes

objetivos:
  - "Aplicar ecuaciones angulares análogas al MRUA: ω(t), θ(t) y relación sin tiempo."
  - "Relacionar magnitudes angulares y lineales con radio constante."
  - "Distinguir aceleración tangencial y centrípeta."
  - "Interpretar gráficas θ(t), ω(t), α(t), a_t(t) y a_c(t)."

suposiciones:
  - "Radio constante y trayectoria circular."
  - "Aceleración angular α constante."
  - "Sistema de referencia inercial."
  - "Unidades coherentes (SI)."

competencias_lomloe:
  - STEM
  - razonamiento_cientifico
  - modelizacion
  - resolucion_problemas
  - interpretacion_graficas
