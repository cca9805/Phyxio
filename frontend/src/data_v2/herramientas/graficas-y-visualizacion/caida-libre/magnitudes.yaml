version: 1

magnitudes:
  - id: y
    symbol: y
    nombre: posicion_vertical
    unidad_si: m
    descripcion: Posición del cuerpo medida sobre el eje vertical.

  - id: y0
    symbol: "y_0"
    nombre: posicion_inicial
    unidad_si: m
    descripcion: Posición vertical inicial del cuerpo en el instante t = 0.

  - id: v
    symbol: v
    nombre: velocidad_vertical
    unidad_si: m/s
    descripcion: Velocidad del cuerpo en la dirección vertical.

  - id: v0
    symbol: "v_0"
    nombre: velocidad_inicial
    unidad_si: m/s
    descripcion: Velocidad vertical inicial del cuerpo.

  - id: a
    symbol: a
    nombre: aceleracion
    unidad_si: m/s^2
    descripcion: Aceleración del movimiento vertical.

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Magnitud de la aceleración de la gravedad terrestre.

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo transcurrido desde el inicio del movimiento.

  - id: dy
    symbol: "\\Delta y"
    nombre: desplazamiento_vertical
    unidad_si: m
    descripcion: Diferencia entre la posición final y la inicial en el eje vertical.

  - id: h
    symbol: h
    nombre: altura
    unidad_si: m
    descripcion: Altura

  - id: tMax
    symbol: "t_{\\max}"
    nombre: "tiempo hasta altura máxima"
    unidad_si: "s"