  - ESO
  - Bachillerato

prerequisitos:
  - fisica-clasica/fundamentos/magnitudes-fisicas
  - fisica-clasica/fundamentos/unidades-y-conversiones
  - fisica-clasica/fundamentos/sistemas-referencia
  - fisica-clasica/fundamentos/vectores
