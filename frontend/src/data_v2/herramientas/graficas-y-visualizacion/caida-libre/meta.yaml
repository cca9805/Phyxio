descripcion_corta: >
  Movimiento rectilíneo vertical con aceleración constante debida a la gravedad,
  despreciando el rozamiento con el aire.

tags:
  - cinematica
  - movimiento-vertical
  - caida-libre
  - gravedad
  - aceleracion-constante
  - mrua

objetivos:
  - Reconocer cuándo un movimiento corresponde a una caída libre.
  - Aplicar las ecuaciones del MRUA al movimiento vertical.
  - Calcular posición, velocidad y tiempo en caídas y lanzamientos verticales.
  - Interpretar correctamente el signo de la aceleración de la gravedad.
  - Resolver problemas de caída y lanzamiento vertical con y sin velocidad inicial.

suposiciones:
  - Movimiento unidimensional en el eje vertical.
  - Aceleración constante e igual a la gravedad.
  - Se desprecia el rozamiento con el aire.
  - Campo gravitatorio uniforme cerca de la superficie terrestre.
  - Sistema de referencia inercial con eje y definido.

competencias_lomloe:
  - STEM
  - razonamiento_cientifico
  - modelizacion
  - resolucion_problemas
  - interpretacion_graficas

tiempo_estimado_min: 45
