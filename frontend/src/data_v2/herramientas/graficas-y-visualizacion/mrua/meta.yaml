version: 1

id: mrua
nombre: Movimiento Rectilíneo Uniformemente Acelerado (MRUA)

area: fisica-clasica
bloque: mecanica
subbloque: cinematica

ruta_relativa: fisica-clasica/mecanica/cinematica/mrua

orden: 1040
dificultad: 3

niveles:
  - ESO
  - Bachillerato

prerequisitos:
  - fisica-clasica/mecanica/cinematica/mru
  - fisica-clasica/fundamentos/magnitudes-fisicas
  - fisica-clasica/fundamentos/unidades-y-conversiones
  - fisica-clasica/fundamentos/graficas-y-modelado

descripcion_corta: >
  Movimiento en línea recta con aceleración constante. La velocidad cambia linealmente con el tiempo.

tags:
  - cinematica
  - movimiento
  - rectilineo
  - aceleracion-constante
  - graficas

objetivos:
  - Reconocer MRUA en situaciones reales y en gráficas v–t.
  - Usar las ecuaciones del MRUA para calcular posición, velocidad, tiempo o aceleración.
  - Interpretar el área bajo la curva v–t como desplazamiento.
  - Resolver problemas típicos de frenado y arranque con aceleración constante.

suposiciones:
  - Trayectoria rectilínea (1D).
  - Aceleración constante.
  - Sistema de referencia inercial.
  - Unidades coherentes (SI recomendado).

competencias_lomloe:
  - STEM
  - razonamiento_cientifico
  - modelizacion
  - resolucion_problemas
  - interpretacion_graficas

tiempo_estimado_min: 60

