version: 1

magnitudes:
  - id: x
    symbol: x
    nombre: posicion_horizontal
    unidad_si: m
    descripcion: Posición horizontal del proyectil.

  - id: x0
    symbol: x_0
    nombre: posicion_horizontal_inicial
    unidad_si: m
    descripcion: Posición horizontal en t = 0.

  - id: y
    symbol: y
    nombre: posicion_vertical
    unidad_si: m
    descripcion: Posición vertical del proyectil (altura si y>0).

  - id: y0
    symbol: y_0
    nombre: altura_inicial
    unidad_si: m
    descripcion: Posición vertical en t = 0 (altura inicial).

  - id: v0
    symbol: v_0
    nombre: velocidad_inicial_horizontal
    unidad_si: m/s
    descripcion: Velocidad horizontal inicial (constante si no hay rozamiento).

  - id: vx
    symbol: v_x
    nombre: velocidad_horizontal
    unidad_si: m/s
    descripcion: Componente horizontal de la velocidad (vx = v0).

  - id: vy
    symbol: v_y
    nombre: velocidad_vertical
    unidad_si: m/s
    descripcion: Componente vertical de la velocidad (vy = -g t si v0y=0).

  - id: t
    symbol: t
    nombre: tiempo
    unidad_si: s
    descripcion: Tiempo transcurrido desde el lanzamiento (t >= 0).

  - id: g
    symbol: g
    nombre: gravedad
    unidad_si: m/s^2
    descripcion: Módulo de la aceleración de la gravedad (aprox. 9,8 m/s^2).

  - id: R
    symbol: R
    nombre: alcance
    unidad_si: m
    descripcion: Distancia horizontal recorrida hasta impactar (cuando y=0).

  - id: v
    symbol: v
    nombre: velocidad_total
    unidad_si: m/s
    descripcion: Módulo de la velocidad (v = sqrt(vx^2 + vy^2)).
