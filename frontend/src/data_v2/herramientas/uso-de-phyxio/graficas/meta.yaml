version: 1

id: tiro-horizontal
nombre: Tiro horizontal

area: fisica-clasica
bloque: mecanica
subbloque: cinematica

ruta_relativa: fisica-clasica/mecanica/cinematica/tiro-horizontal

orden: 722000
dificultad: 3

niveles:
  - ESO
  - Bachillerato

prerequisitos:
  - mru
  - mrua
  - caida-libre

descripcion_corta: >
  Movimiento de un cuerpo lanzado horizontalmente desde una cierta altura,
  resultado de la combinación de un MRU en el eje horizontal y una caída libre
  en el eje vertical.

tags:
  - tiro-horizontal
  - proyectiles
  - movimiento-2d
  - gravedad
  - cinematica

objetivos:
  - Comprender la independencia de los movimientos horizontal y vertical.
  - Aplicar las ecuaciones de MRU y caída libre a un movimiento bidimensional.
  - Calcular tiempo de caída, alcance horizontal y velocidad de impacto.
  - Interpretar el movimiento mediante gráficos y esquemas.


suposiciones:
  - Lanzamiento con velocidad inicial solo horizontal (v0y = 0).
  - Sin rozamiento con el aire.
  - Gravedad constante y vertical hacia abajo.
  - Ejes: x horizontal, y vertical (positivo hacia arriba), con y0 como altura inicial.

competencias_lomloe:
  - STEM
  - razonamiento_cientifico
  - modelizacion
  - resolucion_problemas
  - interpretacion_graficas

tiempo_estimado_min: 60
