version: 1

magnitudes:
  - id: x
    symbol: x
    nombre: "posición horizontal"
    unidad_si: "m"
    descripcion: "Coordenada horizontal del proyectil."

  - id: y
    symbol: y
    nombre: "posición vertical"
    unidad_si: "m"
    descripcion: "Coordenada vertical del proyectil."

  - id: x0
    symbol: "x_0"
    nombre: "posición horizontal inicial"
    unidad_si: "m"
    descripcion: "Posición horizontal en el instante t = 0."

  - id: y0
    symbol: "y_0"
    nombre: "posición vertical inicial"
    unidad_si: "m"
    descripcion: "Altura inicial del lanzamiento en t = 0."

  - id: t
    symbol: t
    nombre: "tiempo"
    unidad_si: "s"
    descripcion: "Tiempo transcurrido desde el lanzamiento."

  - id: v0
    symbol: "v_0"
    nombre: "velocidad inicial"
    unidad_si: "m/s"
    descripcion: "Módulo de la velocidad de lanzamiento."

  - id: theta
    symbol: "\\theta"
    nombre: "ángulo de lanzamiento"
    unidad_si: "rad"
    descripcion: "Ángulo de la velocidad inicial respecto a la horizontal. (En práctica, a menudo se introduce en grados.)"

  - id: vx0
    symbol: "v_{x0}"
    nombre: "componente horizontal inicial"
    unidad_si: "m/s"
    descripcion: "Componente horizontal de la velocidad inicial: vx0 = v0 cos(theta)."

  - id: vy0
    symbol: "v_{y0}"
    nombre: "componente vertical inicial"
    unidad_si: "m/s"
    descripcion: "Componente vertical de la velocidad inicial: vy0 = v0 sin(theta)."

  - id: vx
    symbol: "v_x"
    nombre: "velocidad horizontal"
    unidad_si: "m/s"
    descripcion: "Velocidad horizontal (constante): vx = vx0."

  - id: vy
    symbol: "v_y"
    nombre: "velocidad vertical"
    unidad_si: "m/s"
    descripcion: "Velocidad vertical en el instante t: vy = vy0 - g t."

  - id: g
    symbol: g
    nombre: "aceleración de la gravedad"
    unidad_si: "m/s^2"
    descripcion: "Magnitud de la gravedad (positiva). La aceleración vertical es a_y = -g si y positivo hacia arriba."

  - id: R
    symbol: R
    nombre: "alcance"
    unidad_si: "m"
    descripcion: "Desplazamiento horizontal total hasta el impacto (cuando y = 0 en el caso y0 = 0)."

  - id: hMax
    symbol: "h_{\\max}"
    nombre: "altura máxima"
    unidad_si: "m"
    descripcion: "Altura máxima alcanzada (en lanzamiento hacia arriba)."

  - id: tVuelo
    symbol: "t_{\\text{vuelo}}"
    nombre: "tiempo de vuelo"
    unidad_si: "s"
    descripcion: "Tiempo total hasta volver al suelo (caso y0 = 0) o hasta impactar (caso general)."
