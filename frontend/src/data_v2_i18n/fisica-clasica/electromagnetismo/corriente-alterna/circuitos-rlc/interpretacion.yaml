    graph_inline: false
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: false
  preferred_type: none
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - impedancia_rlc
  - corriente_total
  - desfase_rlc
  - potencia_activa
  - potencia_reactiva
  - potencia_aparente
  magnitudes:
  - impedancia_total
  - resistencia_serie
  - reactancia_inductiva
  - reactancia_capacitiva
  - corriente_rms
  - tension_rms
  - phi
  - potencia_activa
  - potencia_reactiva
  - potencia_aparente
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: false
global_context:
  enabled: true
  physical_domain:
    es: electromagnetismo
    en: ''
  axis_convention:
    es: El signo depende de la convención de ejes.
    en: Sign depends on axes.
  standard_assumptions:
  - es: Interpretado bajo el modelo físico.
    en: Interpreted under the physical model.
  standard_warnings:
  - es: Revisa unidades y signo.
    en: Check units and sign.
graph_binding:
  enabled: false
  type: none
  channels: []
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: false
  primary_variable: impedancia_total
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  impedancia_total:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de impedancia_total
      en: Result of impedancia_total
    summary_rules:
    - id: z_summary
      when: 'true'
      status: info
      text:
        es: Z resume la oposicion total de la rama RLC y controla directamente la corriente eficaz.
        en: Z summarizes total opposition of the RLC branch and directly controls effective current.
    physical_reading_rules:
    - id: z_reading
      when: 'true'
      status: info
      text:
        es: Si Z se acerca a R, la carga esta cerca de compensacion reactiva y la corriente puede crecer para una misma tension.
        en: If Z approaches R, the load is close to reactive compensation and current may grow for the same voltage.
    coherence_rules:
    - id: z_coherence
      when: 'true'
      status: ok
      text:
        es: Z no debe ser menor que R en el modelo serie lineal del leaf.
        en: Z must not be smaller than R in the linear series model of the leaf.
    model_validity_rules:
    - id: z_validity
      when: 'true'
      status: ok
      text:
        es: La lectura de Z es valida si Xl y Xc fueron calculadas a una misma frecuencia y con elementos lineales.
        en: Z reading is valid if Xl and Xc were computed at the same frequency and with linear elements.
    graph_rules:
    - id: z_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Z se interpreta como modulo asociado al desequilibrio reactivo Xl menos Xc.
        en: In Coord, Z is interpreted as magnitude associated with reactive imbalance Xl minus Xc.
    likely_errors:
    - id: z_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[impedancia_total]] con una lectura aislada es un error frecuente: Error comun: sumar R, Xl y Xc de
          forma escalar sin respetar la cuadratura.'
        en: 'Common mistake: adding R, Xl, and Xc as scalars without respecting quadrature.'
    next_step_rules:
    - id: z_next
      when: 'true'
      status: info
      text:
        es: Usa Z para contrastar si la corriente prevista es aceptable para fuente y cableado.
        en: Use Z to contrast whether predicted current is acceptable for source and wiring.
    physical_intuition:
    - id: impedancia_total_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[impedancia_total]] describe el estado dinámico.
        en: Intuitively, [[impedancia_total]] describes the dynamic state.
    limiting_cases:
    - id: impedancia_total_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[impedancia_total]].
        en: Check limiting cases of [[impedancia_total]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  corriente_rms:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_rms
      en: Result of corriente_rms
    summary_rules:
    - id: i_summary
      when: 'true'
      status: info
      text:
        es: I es la demanda eficaz total que la fuente debe entregar al circuito serie.
        en: I is the total effective demand that the source must deliver to the series circuit.
    physical_reading_rules:
    - id: i_reading
      when: 'true'
      status: info
      text:
        es: Una I alta no implica automaticamente gran potencia util si el desfase sigue siendo importante.
        en: High current does not automatically imply large useful power if phase shift remains important.
    coherence_rules:
    - id: i_coherence
      when: 'true'
      status: ok
      text:
        es: Si Z baja a tension fija, I debe subir de forma coherente.
        en: If Z decreases at fixed voltage, current must rise coherently.
    model_validity_rules:
    - id: i_validity
      when: 'true'
      status: ok
      text:
        es: La lectura es valida solo si V y Z estan en RMS y el circuito ya esta en estacionario sinusoidal.
        en: Reading is valid only if V and Z are RMS and the circuit is already in sinusoidal steady state.
    graph_rules:
    - id: i_graph
      when: 'true'
      status: info
      text:
        es: En una lectura estructural, I responde de forma inversa al modulo de Z.
        en: In structural reading, current responds inversely to impedance magnitude.
    likely_errors:
    - id: i_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_rms]] con una lectura aislada es un error frecuente: Error frecuente: usar tension pico
          con corriente RMS y distorsionar el resultado.'
        en: 'A common mistake is to interpret [[corriente_rms]] in isolation: Frequent error: using peak voltage with RMS
          current and distorting the result.'
    next_step_rules:
    - id: i_next
      when: 'true'
      status: info
      text:
        es: Contrasta si la corriente calculada obliga a redimensionar conductores o protecciones.
        en: Check whether computed current forces cable or protection resizing.
    physical_intuition:
    - id: corriente_rms_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[corriente_rms]] describe el estado dinámico.
        en: Intuitively, [[corriente_rms]] describes the dynamic state.
    limiting_cases:
    - id: corriente_rms_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[corriente_rms]].
        en: Check limiting cases of [[corriente_rms]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  phi:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de phi
      en: Result of phi
    summary_rules:
    - id: phi_summary
      when: 'true'
      status: info
      text:
        es: Phi traduce el equilibrio entre respuesta inductiva y capacitiva del circuito.
        en: Phase shift translates balance between inductive and capacitive response.
    physical_reading_rules:
    - id: phi_reading
      when: 'true'
      status: info
      text:
        es: Phi positiva indica dominio inductivo; phi negativa indica dominio capacitivo; phi cercana a cero indica compensacion.
        en: Positive phase shift indicates inductive dominance; negative shift indicates capacitive dominance; near-zero shift
          indicates compensation.
    coherence_rules:
    - id: phi_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de phi debe coincidir con el signo de Xl menos Xc en la convencion del leaf.
        en: Phase sign must match the sign of Xl minus Xc in the leaf convention.
    model_validity_rules:
    - id: phi_validity
      when: 'true'
      status: ok
      text:
        es: La interpretacion de phi requiere una sola frecuencia de trabajo y una convencion de signos consistente.
        en: Interpreting phase shift requires one operating frequency and a consistent sign convention.
    graph_rules:
    - id: phi_graph
      when: 'true'
      status: info
      text:
        es: Graficamente, phi se vincula al cambio de caracter del circuito al cruzar la compensacion reactiva.
        en: Graphically, phase shift is linked to the character change when reactive compensation is crossed.
    likely_errors:
    - id: phi_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[phi]] con una lectura aislada es un error frecuente: Error comun: quedarse con el modulo del angulo
          y perder el signo fisico del regimen.'
        en: 'Common mistake: keeping only the angle magnitude and losing the physical sign of the regime.'
    next_step_rules:
    - id: phi_next
      when: 'true'
      status: info
      text:
        es: Usa phi para decidir si conviene compensar la carga.
        en: Use phase shift to decide whether the load should be compensated.
    physical_intuition:
    - id: phi_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[phi]] describe el estado dinámico.
        en: Intuitively, [[phi]] describes the dynamic state.
    limiting_cases:
    - id: phi_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[phi]].
        en: Check limiting cases of [[phi]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencia_activa:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de potencia_activa
      en: Result of potencia_activa
    summary_rules:
    - id: p_summary
      when: 'true'
      status: info
      text:
        es: P mide la parte de la demanda electrica que realmente se transforma en transferencia media neta.
        en: Active power measures the part of electrical demand that truly becomes net average transfer.
    physical_reading_rules:
    - id: p_reading
      when: 'true'
      status: info
      text:
        es: Si P es modesta pero I es alta, el problema operativo suele ser bajo factor de potencia.
        en: If active power is modest but current is high, the operational issue is usually poor power factor.
    coherence_rules:
    - id: p_coherence
      when: 'true'
      status: ok
      text:
        es: P debe ser menor o igual que S para este modelo pasivo.
        en: Active power must be less than or equal to apparent power in this passive model.
    model_validity_rules:
    - id: p_validity
      when: 'true'
      status: ok
      text:
        es: La lectura es valida si V, I y phi proceden del mismo estado estacionario.
        en: Reading is valid if V, I, and phase shift come from the same steady state.
    graph_rules:
    - id: p_graph
      when: 'true'
      status: info
      text:
        es: Estructuralmente, P es la proyeccion util de la demanda total del circuito.
        en: Structurally, active power is the useful projection of total circuit demand.
    likely_errors:
    - id: p_error
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir P con la potencia total exigida a la fuente.'
        en: 'A common mistake is to interpret [[potencia_activa]] in isolation: Frequent error: confusing active power with
          total power demanded from the source.'
    next_step_rules:
    - id: p_next
      when: 'true'
      status: info
      text:
        es: Compara P con S para valorar si la instalacion necesita correccion del factor de potencia.
        en: Compare active and apparent power to assess whether power-factor correction is needed.
    physical_intuition:
    - id: potencia_activa_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_activa]] describe el estado dinámico.
        en: Intuitively, [[potencia_activa]] describes the dynamic state.
    limiting_cases:
    - id: potencia_activa_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_activa]].
        en: Check limiting cases of [[potencia_activa]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencia_reactiva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de potencia_reactiva
      en: Result of potencia_reactiva
    summary_rules:
    - id: q_summary
      when: 'true'
      status: info
      text:
        es: Q cuantifica el intercambio alterno de energia asociado al desfase del circuito.
        en: Reactive power quantifies the alternating energy exchange associated with phase shift.
    physical_reading_rules:
    - id: q_reading
      when: 'true'
      status: info
      text:
        es: Q positiva describe dominio inductivo; Q negativa describe dominio capacitivo.
        en: Positive reactive power describes inductive dominance; negative reactive power describes capacitive dominance.
    coherence_rules:
    - id: q_coherence
      when: 'true'
      status: ok
      text:
        es: Si phi se aproxima a cero, Q debe reducirse de forma marcada.
        en: If phase shift approaches zero, reactive power should decrease sharply.
    model_validity_rules:
    - id: q_validity
      when: 'true'
      status: ok
      text:
        es: La interpretacion del signo de Q depende de mantener la convencion declarada para phi.
        en: Interpreting the sign of reactive power depends on preserving the declared convention for phase shift.
    graph_rules:
    - id: q_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Q indica de que lado del equilibrio reactivo opera el circuito.
        en: In Coord, reactive power indicates on which side of reactive balance the circuit operates.
    likely_errors:
    - id: q_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[potencia_reactiva]] con una lectura aislada es un error frecuente: Error comun: llamar desperdicio
          a toda potencia reactiva sin analizar su papel dinamico.'
        en: 'Common mistake: calling all reactive power waste without analyzing its dynamic role.'
    next_step_rules:
    - id: q_next
      when: 'true'
      status: info
      text:
        es: Usa Q para decidir si conviene compensar con elementos reactivos adicionales.
        en: Use reactive power to decide whether additional reactive elements are convenient.
    physical_intuition:
    - id: potencia_reactiva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_reactiva]] describe el estado dinámico.
        en: Intuitively, [[potencia_reactiva]] describes the dynamic state.
    limiting_cases:
    - id: potencia_reactiva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_reactiva]].
        en: Check limiting cases of [[potencia_reactiva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencia_aparente:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de potencia_aparente
      en: Result of potencia_aparente
    summary_rules:
    - id: s_summary
      when: 'true'
      status: info
      text:
        es: S fija la demanda total que ve la fuente aunque una parte no se convierta en potencia activa.
        en: Apparent power sets total demand seen by the source even if part of it does not become active power.
    physical_reading_rules:
    - id: s_reading
      when: 'true'
      status: info
      text:
        es: S gobierna dimensionado electrico de generadores, inversores, transformadores y conductores.
        en: Apparent power governs electrical sizing of generators, inverters, transformers, and conductors.
    coherence_rules:
    - id: s_coherence
      when: 'true'
      status: ok
      text:
        es: S debe ser mayor o igual que P en este leaf.
        en: Apparent power must be greater than or equal to active power in this leaf.
    model_validity_rules:
    - id: s_validity
      when: 'true'
      status: ok
      text:
        es: La lectura de S es valida si se preserva la definicion RMS de V e I.
        en: Apparent-power reading is valid if RMS definition of V and I is preserved.
    graph_rules:
    - id: s_graph
      when: 'true'
      status: info
      text:
        es: En lectura estructural, S es el techo de demanda total sobre el que se proyectan P y Q.
        en: In structural reading, apparent power is the total-demand ceiling onto which active and reactive power project.
    likely_errors:
    - id: s_error
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: dimensionar una fuente solo con P y olvidar el peso de S.'
        en: 'Frequent error: sizing a source only with active power and forgetting apparent power.'
    next_step_rules:
    - id: s_next
      when: 'true'
      status: info
      text:
        es: Cruza S con limites de fuente y proteccion para evaluar margen de operacion.
        en: Cross apparent power with source and protection limits to evaluate operating margin.
    physical_intuition:
    - id: potencia_aparente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_aparente]] describe el estado dinámico.
        en: Intuitively, [[potencia_aparente]] describes the dynamic state.
    limiting_cases:
    - id: potencia_aparente_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_aparente]].
        en: Check limiting cases of [[potencia_aparente]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
