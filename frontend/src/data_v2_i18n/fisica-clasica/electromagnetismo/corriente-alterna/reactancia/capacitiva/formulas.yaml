  symbol: X_C
  name:
    es: reactancia capacitiva
    en: Capacitive Reactance
  si_unit: ohm
- id: omega
  symbol: \omega
  name:
    es: frecuencia angular
    en: Angular Frequency
  si_unit: rad/s
- id: capacitancia
  symbol: capacitancia
  name:
    es: capacitancia
    en: Capacitance
  si_unit: F
- id: frecuencia
