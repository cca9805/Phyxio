  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  reactancia_capacitiva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de reactancia_capacitiva
      en: Result of reactancia_capacitiva
    summary_rules:
    - id: xc_summary
      when: 'true'
      status: info
      text:
        es: Xc resume la oposición capacitiva dependiente de frecuencia.
        en: Capacitive reactance summarizes frequency-dependent opposition.
    physical_reading_rules:
    - id: xc_read
      when: 'true'
      status: info
      text:
        es: Si sube frecuencia o capacitancia, Xc disminuye y la rama admite más corriente.
        en: If frequency or capacitance rises, reactance drops and branch current rises.
    coherence_rules:
    - id: xc_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantenerse positiva y coherente con valores de omega y C.
        en: It must stay positive and coherent with angular frequency and capacitance values.
    model_validity_rules:
    - id: xc_val
      when: 'true'
      status: ok
      text:
        es: Válida en capacitor ideal y régimen sinusoidal estacionario.
        en: Valid in ideal capacitor and sinusoidal steady regime.
    graph_rules:
    - id: xc_graph
      when: 'true'
      status: info
      text:
        es: La curva Xc contra frecuencia es decreciente no lineal.
        en: Reactance versus frequency curve is nonlinearly decreasing.
    likely_errors:
    - id: xc_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[reactancia_capacitiva]] con una lectura aislada es un error frecuente: Error común: tratar Xc como
          resistencia constante.'
        en: 'Common mistake: treating reactance as constant resistance.'
    next_step_rules:
    - id: xc_next
      when: 'true'
      status: info
      text:
        es: Usa Xc para estimar corriente de rama y exigencia de línea.
        en: Use reactance to estimate branch current and line demand.
    physical_intuition:
    - id: reactancia_capacitiva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[reactancia_capacitiva]] describe el estado dinámico.
        en: Intuitively, [[reactancia_capacitiva]] describes the dynamic state.
    limiting_cases:
    - id: reactancia_capacitiva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[reactancia_capacitiva]].
        en: Check limiting cases of [[reactancia_capacitiva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  capacitancia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de capacitancia
      en: Result of capacitancia
    summary_rules:
    - id: c_summary
      when: 'true'
      status: info
      text:
        es: C cuantifica la capacidad de almacenamiento de carga del capacitor.
        en: Capacitance quantifies charge-storage capability of the capacitor.
    physical_reading_rules:
    - id: c_read
      when: 'true'
      status: info
      text:
        es: A mayor C, menor Xc para una frecuencia dada.
        en: Larger capacitance yields lower reactance at fixed frequency.
    coherence_rules:
    - id: c_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantenerse positiva y en unidades de faradio.
        en: It must stay positive and expressed in farads.
    model_validity_rules:
    - id: c_val
      when: 'true'
      status: ok
      text:
        es: Se asume componente lineal en el rango operativo de interés.
        en: Linear-component behavior is assumed in the operating range of interest.
    graph_rules:
    - id: c_graph
      when: 'true'
      status: info
      text:
        es: Desplaza verticalmente la curva Xc(f) al variar el parámetro.
        en: It vertically shifts the reactance-frequency curve when parameter changes.
    likely_errors:
    - id: c_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[capacitancia]] con una lectura aislada es un error frecuente: Error común: no convertir microfaradios
          a faradios.'
        en: 'Common mistake: not converting microfarads to farads.'
    next_step_rules:
    - id: c_next
      when: 'true'
      status: info
      text:
        es: Revisa consistencia de unidades antes de sustituir en fórmulas.
        en: Check unit consistency before substitution in formulas.
    physical_intuition:
    - id: capacitancia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[capacitancia]] describe el estado dinámico.
        en: Intuitively, [[capacitancia]] describes the dynamic state.
    limiting_cases:
    - id: capacitancia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[capacitancia]].
        en: Check limiting cases of [[capacitancia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  omega:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de omega
      en: Result of omega
    summary_rules:
    - id: om_summary
      when: 'true'
      status: info
      text:
        es: omega fija la escala angular del fenómeno alterno.
        en: Angular frequency sets the angular scale of the alternating phenomenon.
    physical_reading_rules:
    - id: om_read
      when: 'true'
      status: info
      text:
        es: Al aumentar omega, el capacitor se opone menos al paso de corriente alterna.
        en: As angular frequency rises, the capacitor opposes alternating current less.
    coherence_rules:
    - id: om_coh
      when: 'true'
      status: ok
      text:
        es: Debe relacionarse linealmente con f mediante 2pi.
        en: It must be linearly related to frequency through 2pi.
    model_validity_rules:
    - id: om_val
      when: 'true'
      status: ok
      text:
        es: Requiere periodicidad bien definida en la señal.
        en: Requires well-defined periodicity in the signal.
    graph_rules:
    - id: om_graph
      when: 'true'
      status: info
      text:
        es: Controla compresión temporal de ciclos y pendiente efectiva en Xc(f).
        en: It controls cycle compression and effective slope in reactance-frequency behavior.
    likely_errors:
    - id: om_err
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir f en Hz con omega en rad/s.'
        en: 'A common mistake is to interpret [[omega]] in isolation: Frequent error: confusing frequency in Hz with angular
          frequency in rad/s.'
    next_step_rules:
    - id: om_next
      when: 'true'
      status: info
      text:
        es: Verifica conversión antes de calcular reactancia.
        en: Verify conversion before calculating reactance.
    physical_intuition:
    - id: omega_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[omega]] describe el estado dinámico.
        en: Intuitively, [[omega]] describes the dynamic state.
    limiting_cases:
    - id: omega_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[omega]].
        en: Check limiting cases of [[omega]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  corriente_capacitiva_eficaz:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_capacitiva_eficaz
      en: Result of corriente_capacitiva_eficaz
    summary_rules:
    - id: ic_summary
      when: 'true'
      status: info
      text:
        es: Ic mide la corriente eficaz que exige la rama capacitiva.
        en: RMS capacitive current measures branch current demand.
    physical_reading_rules:
    - id: ic_read
      when: 'true'
      status: info
      text:
        es: A tensión fija, disminuciones de Xc elevan Ic y pueden exigir mayor capacidad de conducción.
        en: At fixed voltage, lower reactance raises current and may require higher conduction capacity.
    coherence_rules:
    - id: ic_coh
      when: 'true'
      status: ok
      text:
        es: Debe crecer con V y decrecer con Xc.
        en: It must increase with voltage and decrease with reactance.
    model_validity_rules:
    - id: ic_val
      when: 'true'
      status: ok
      text:
        es: Interpretación válida cuando V e Ic se expresan en RMS coherente.
        en: Interpretation is valid when voltage and current are coherently expressed as RMS.
    graph_rules:
    - id: ic_graph
      when: 'true'
      status: info
      text:
        es: Permite identificar zonas de posible sobrecorriente por frecuencia alta.
        en: It helps identify potential overcurrent regions at high frequency.
    likely_errors:
    - id: ic_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_capacitiva_eficaz]] con una lectura aislada es un error frecuente: Error típico: usar tensión
          pico con fórmula RMS de corriente.'
        en: 'Typical mistake: using peak voltage with RMS current formula.'
    next_step_rules:
    - id: ic_next
      when: 'true'
      status: info
      text:
        es: Contrasta Ic calculada con límite térmico de cableado y protección.
        en: Contrast computed current with thermal limits of wiring and protection.
    physical_intuition:
    - id: corriente_capacitiva_eficaz_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[corriente_capacitiva_eficaz]] describe el estado dinámico.
        en: Intuitively, [[corriente_capacitiva_eficaz]] describes the dynamic state.
    limiting_cases:
    - id: corriente_capacitiva_eficaz_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[corriente_capacitiva_eficaz]].
        en: Check limiting cases of [[corriente_capacitiva_eficaz]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencia_reactiva_capacitiva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de potencia_reactiva_capacitiva
      en: Result of potencia_reactiva_capacitiva
    summary_rules:
    - id: qc_summary
      when: 'true'
      status: info
      text:
        es: Qc representa magnitud del intercambio reactivo de la rama capacitiva.
        en: Capacitive reactive power represents reactive exchange magnitude in the branch.
    physical_reading_rules:
    - id: qc_read
      when: 'true'
      status: info
      text:
        es: No equivale a potencia activa neta, sino a energía intercambiada por ciclo.
        en: It is not net active power, but cycle-by-cycle exchanged energy effect.
    coherence_rules:
    - id: qc_coh
      when: 'true'
      status: ok
      text:
        es: Debe crecer cuando aumentan V o Ic en régimen comparable.
        en: It must grow when voltage or current rise under comparable regime.
    model_validity_rules:
    - id: qc_val
      when: 'true'
      status: ok
      text:
        es: Requiere convención explícita de signo para lectura completa de red.
        en: It requires explicit sign convention for full network interpretation.
    graph_rules:
    - id: qc_graph
      when: 'true'
      status: info
      text:
        es: Útil para estimar impacto de bancos capacitivos en compensación.
        en: Useful to estimate impact of capacitor banks in compensation tasks.
    likely_errors:
    - id: qc_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[potencia_reactiva_capacitiva]] con una lectura aislada es un error frecuente: Error común: interpretar
          Qc como consumo activo.'
        en: 'Common mistake: interpreting reactive power as active consumption.'
    next_step_rules:
    - id: qc_next
      when: 'true'
      status: info
      text:
        es: Integra Qc con el balance reactivo total del sistema.
        en: Integrate reactive power with total system reactive balance.
    physical_intuition:
    - id: potencia_reactiva_capacitiva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_reactiva_capacitiva]] describe el estado dinámico.
        en: Intuitively, [[potencia_reactiva_capacitiva]] describes the dynamic state.
    limiting_cases:
    - id: potencia_reactiva_capacitiva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_reactiva_capacitiva]].
        en: Check limiting cases of [[potencia_reactiva_capacitiva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
