version: 5
magnitudes:
- id: reactancia_capacitiva
  symbol: X_C
  nombre:
    es: reactancia capacitiva
    en: Capacitive Reactance
  unidad_si: ohm
  descripcion:
    es: Oposición al paso de corriente alterna debida al capacitor, dependiente de frecuencia.
    en: Opposition to alternating current caused by the capacitor, frequency-dependent.
  dimension: ML^2T^{-3}I^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in:
  - reactancia_capacitiva
  - corriente_capacitiva
  - reactiva_capacitiva
  common_mistake: Tratarla como resistencia disipativa constante.
  typical_range: Disminuye al aumentar frecuencia o capacitancia.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud positiva de oposición.
      en: Used as a positive opposition magnitude.
  zero_behavior:
    allowed: false
    meaning:
      es: En modelo ideal no puede anularse para frecuencia finita.
      en: In ideal model it cannot vanish at finite frequency.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, inf)
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for:
    - corriente-alterna
  graph_binding:
    channels:
    - reactancia
  pedagogical_notes:
    es: Usa [[reactancia_capacitiva]] para leer el papel fisico de reactancia capacitiva y comprobar unidad, signo y rango.
    en: Use [[reactancia_capacitiva]] to read the physical role of reactancia capacitiva and check unit, sign and range.
- id: omega
  symbol: \omega
  nombre:
    es: frecuencia angular
    en: Angular Frequency
  unidad_si: rad/s
  descripcion:
    es: Rapidez angular de oscilación asociada a la señal alterna.
    en: Angular oscillation rate associated with the AC signal.
  dimension: T^{-1}
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - reactancia_capacitiva
  - omega_f
  common_mistake: Sustituir omega por f sin factor 2pi.
  typical_range: No negativa en señales periódicas estándar.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se interpreta como tasa positiva.
      en: Interpreted as a positive rate.
  zero_behavior:
    allowed: true
    meaning:
      es: Con omega nula no hay alternancia periódica efectiva.
      en: With zero angular frequency there is no effective periodic alternation.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for: []
  graph_binding:
    channels:
    - frecuencia
  pedagogical_notes:
    es: Usa [[omega]] para leer el papel fisico de frecuencia angular y comprobar unidad, signo y rango.
    en: Use [[omega]] to read the physical role of frecuencia angular and check unit, sign and range.
- id: capacitancia
  symbol: capacitancia
  nombre:
    es: capacitancia
    en: Capacitance
  unidad_si: F
  descripcion:
    es: Capacidad del capacitor para almacenar carga por unidad de tensión.
    en: Ability of the capacitor to store charge per unit voltage.
  dimension: M^{-1}L^{-2}T^{4}I^{2}
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - reactancia_capacitiva
  common_mistake: No convertir microfaradios a faradios.
  typical_range: Positiva y definida por diseño del componente.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se considera no negativa en componentes pasivos.
      en: Considered non-negative in passive components.
  zero_behavior:
    allowed: false
    meaning:
      es: Cero eliminaría el comportamiento capacitivo.
      en: Zero would remove capacitive behavior.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, inf)
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for: []
  graph_binding:
    channels:
    - parametro
  pedagogical_notes:
    es: Usa [[capacitancia]] para leer el papel fisico de capacitancia y comprobar unidad, signo y rango.
    en: Use [[capacitancia]] to read the physical role of capacitancia and check unit, sign and range.
- id: frecuencia
  symbol: frecuencia
  nombre:
    es: frecuencia
    en: Frequency
  unidad_si: Hz
  descripcion:
    es: Número de ciclos por segundo de la señal de excitación.
    en: Number of cycles per second of the excitation signal.
  dimension: T^{-1}
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - omega_f
  common_mistake: Mezclar Hz y rad/s en la misma sustitución.
  typical_range: No negativa en régimen periódico.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud de tasa temporal.
      en: Used as a temporal-rate magnitude.
  zero_behavior:
    allowed: true
    meaning:
      es: En cero el capacitor ideal se aproxima a circuito abierto.
      en: At zero, the ideal capacitor approaches open circuit behavior.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for: []
  graph_binding:
    channels:
    - frecuencia
  pedagogical_notes:
    es: Usa [[frecuencia]] para leer el papel fisico de frecuencia y comprobar unidad, signo y rango.
    en: Use [[frecuencia]] to read the physical role of frecuencia and check unit, sign and range.
- id: tension_eficaz
  symbol: tension_eficaz
  nombre:
    es: tension eficaz
    en: RMS Voltage
  unidad_si: tension_eficaz
  descripcion:
    es: Tensión eficaz aplicada a la rama capacitiva.
    en: RMS voltage applied to the capacitive branch.
  dimension: ML^2T^{-3}I^{-1}
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - corriente_capacitiva
  - reactiva_capacitiva
  common_mistake: Mezclar tensión pico con corriente RMS.
  typical_range: Positiva como magnitud eficaz de entrada.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud RMS no negativa.
      en: Used as a non-negative RMS magnitude.
  zero_behavior:
    allowed: true
    meaning:
      es: Si es cero no hay corriente capacitiva forzada.
      en: If zero there is no forced capacitive current.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for: []
    secondary_for:
    - reactancia-capacitiva
  graph_binding:
    channels:
    - excitacion
  pedagogical_notes:
    es: Usa [[tension_eficaz]] para leer el papel fisico de tension eficaz y comprobar unidad, signo y rango.
    en: Use [[tension_eficaz]] to read the physical role of tension eficaz and check unit, sign and range.
- id: corriente_capacitiva_eficaz
  symbol: I_C
  nombre:
    es: corriente capacitiva eficaz
    en: RMS Capacitive Current
  unidad_si: A
  descripcion:
    es: Corriente eficaz que circula por la rama capacitiva en AC.
    en: RMS current flowing through the capacitive branch in AC.
  dimension: I
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in:
  - corriente_capacitiva
  - reactiva_capacitiva
  common_mistake: Omitir dependencia con frecuencia al estimarla.
  typical_range: Crece al disminuir reactancia capacitiva.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se reporta como valor eficaz positivo.
      en: Reported as a positive RMS value.
  zero_behavior:
    allowed: true
    meaning:
      es: Puede ser cero por falta de excitación.
      en: Can be zero with no excitation.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for: []
  graph_binding:
    channels:
    - corriente
  pedagogical_notes:
    es: Usa [[corriente_capacitiva_eficaz]] para leer el papel fisico de corriente capacitiva eficaz y comprobar unidad, signo
      y rango.
    en: Use [[corriente_capacitiva_eficaz]] to read the physical role of corriente capacitiva eficaz and check unit, sign
      and range.
- id: potencia_reactiva_capacitiva
  symbol: Q_C
  nombre:
    es: potencia reactiva capacitiva
    en: Capacitive Reactive Power
  unidad_si: var
  descripcion:
    es: Magnitud de intercambio reactivo asociado a la rama capacitiva.
    en: Magnitude of reactive exchange associated with the capacitive branch.
  dimension: ML^2T^{-3}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in:
  - reactiva_capacitiva
  common_mistake: Interpretarla como consumo activo neto.
  typical_range: Proporcional a tensión y corriente de rama.
  sign_behavior:
    has_sign: false
    meaning:
      es: En este leaf se usa como magnitud positiva; el signo se discute aparte.
      en: In this leaf it is treated as positive magnitude; sign is discussed separately.
  zero_behavior:
    allowed: true
    meaning:
      es: Se anula sin excitación o sin corriente de rama.
      en: It vanishes without excitation or branch current.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - reactancia-capacitiva
    secondary_for:
    - potencia-reactiva
  graph_binding:
    channels:
    - potencia
  pedagogical_notes:
    es: Usa [[potencia_reactiva_capacitiva]] para leer el papel fisico de potencia reactiva capacitiva y comprobar unidad,
      signo y rango.
    en: Use [[potencia_reactiva_capacitiva]] to read the physical role of potencia reactiva capacitiva and check unit, sign
      and range.
