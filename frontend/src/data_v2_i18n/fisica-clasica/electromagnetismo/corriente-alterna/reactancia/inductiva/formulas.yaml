- id: reactancia_inductiva
  symbol: X_L
  name:
    es: reactancia inductiva
    en: Inductive Reactance
  si_unit: ohm
- id: omega
  symbol: \omega
  name:
    es: frecuencia angular
    en: Angular Frequency
  si_unit: rad/s
- id: inductancia
  symbol: inductancia
  name:
    es: inductancia
    en: Inductance
  si_unit: H
- id: frecuencia
  symbol: frecuencia
  name:
    es: frecuencia
    en: Frequency
  si_unit: Hz
- id: tension_eficaz
  symbol: tension_eficaz
  name:
    es: tension eficaz
    en: RMS Voltage
  si_unit: tension_eficaz
