  - tension_eficaz
  - corriente_inductiva_eficaz
  - potencia_reactiva_inductiva
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: false
global_context:
  enabled: true
  physical_domain:
    es: electromagnetismo
    en: ''
  axis_convention:
    es: El signo depende de la convención de ejes.
    en: Sign depends on axes.
  standard_assumptions:
  - es: Interpretado bajo el modelo físico.
    en: Interpreted under the physical model.
  standard_warnings:
  - es: Revisa unidades y signo.
    en: Check units and sign.
graph_binding:
  enabled: false
  type: none
  channels: []
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: false
  primary_variable: reactancia_inductiva
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  reactancia_inductiva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de reactancia_inductiva
      en: Result of reactancia_inductiva
    summary_rules:
    - id: xl_summary
      when: 'true'
      status: info
      text:
        es: Xl resume la oposición inductiva dependiente de frecuencia.
        en: Inductive reactance summarizes frequency-dependent opposition.
    physical_reading_rules:
    - id: xl_read
      when: 'true'
      status: info
      text:
        es: Si sube frecuencia o inductancia, Xl aumenta y la rama admite menos corriente.
        en: If frequency or inductance rises, reactance increases and branch current decreases.
    coherence_rules:
    - id: xl_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantenerse no negativa y coherente con omega y L.
        en: It must remain non-negative and coherent with angular frequency and inductance.
    model_validity_rules:
    - id: xl_val
      when: 'true'
      status: ok
      text:
        es: Válida en inductor ideal y régimen sinusoidal estacionario.
        en: Valid in ideal inductor and sinusoidal steady regime.
    graph_rules:
    - id: xl_graph
      when: 'true'
      status: info
      text:
        es: La curva Xl contra frecuencia es creciente casi lineal.
        en: Reactance versus frequency curve is increasing and near linear.
    likely_errors:
    - id: xl_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[reactancia_inductiva]] con una lectura aislada es un error frecuente: Error común: tratar Xl como
          resistencia activa constante.'
        en: 'Common mistake: treating inductive reactance as constant active resistance.'
    next_step_rules:
    - id: xl_next
      when: 'true'
      status: info
      text:
        es: Usa Xl para estimar corriente de rama y exigencia de línea.
        en: Use reactance to estimate branch current and line demand.
    physical_intuition:
    - id: reactancia_inductiva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[reactancia_inductiva]] describe el estado dinámico.
        en: Intuitively, [[reactancia_inductiva]] describes the dynamic state.
    limiting_cases:
    - id: reactancia_inductiva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[reactancia_inductiva]].
        en: Check limiting cases of [[reactancia_inductiva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  omega:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de omega
      en: Result of omega
    summary_rules:
    - id: om_summary
      when: 'true'
      status: info
      text:
        es: omega fija la escala angular del fenómeno alterno.
        en: Angular frequency sets the angular scale of the alternating phenomenon.
    physical_reading_rules:
    - id: om_read
      when: 'true'
      status: info
      text:
        es: Al aumentar omega, el inductor se opone más al paso de corriente alterna.
        en: As angular frequency rises, the inductor opposes alternating current more.
    coherence_rules:
    - id: om_coh
      when: 'true'
      status: ok
      text:
        es: Debe relacionarse linealmente con f mediante 2pi.
        en: It must be linearly related to frequency through 2pi.
    model_validity_rules:
    - id: om_val
      when: 'true'
      status: ok
      text:
        es: Requiere periodicidad bien definida en la señal.
        en: Requires well-defined periodicity in the signal.
    graph_rules:
    - id: om_graph
      when: 'true'
      status: info
      text:
        es: Controla pendiente efectiva en Xl(f).
        en: It controls effective slope in reactance-frequency behavior.
    likely_errors:
    - id: om_err
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir f en Hz con omega en rad/s.'
        en: 'A common mistake is to interpret [[omega]] in isolation: Frequent error: confusing frequency in Hz with angular
          frequency in rad/s.'
    next_step_rules:
    - id: om_next
      when: 'true'
      status: info
      text:
        es: Verifica conversión antes de calcular reactancia.
        en: Verify conversion before calculating reactance.
    physical_intuition:
    - id: omega_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[omega]] describe el estado dinámico.
        en: Intuitively, [[omega]] describes the dynamic state.
    limiting_cases:
    - id: omega_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[omega]].
        en: Check limiting cases of [[omega]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  inductancia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de inductancia
      en: Result of inductancia
    summary_rules:
    - id: l_summary
      when: 'true'
      status: info
      text:
        es: L cuantifica capacidad de almacenamiento magnético de la bobina.
        en: Inductance quantifies magnetic-storage capability of the coil.
    physical_reading_rules:
    - id: l_read
      when: 'true'
      status: info
      text:
        es: A mayor L, mayor Xl para una frecuencia dada.
        en: Larger inductance yields larger reactance at fixed frequency.
    coherence_rules:
    - id: l_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantenerse no negativa y en unidades de henrio.
        en: It must remain non-negative and expressed in henries.
    model_validity_rules:
    - id: l_val
      when: 'true'
      status: ok
      text:
        es: Se asume componente lineal antes de saturación magnética relevante.
        en: Linear behavior is assumed before significant magnetic saturation.
    graph_rules:
    - id: l_graph
      when: 'true'
      status: info
      text:
        es: Escala verticalmente la curva Xl(f) al variar el parámetro.
        en: It vertically scales the reactance-frequency curve when parameter changes.
    likely_errors:
    - id: l_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[inductancia]] con una lectura aislada es un error frecuente: Error común: no convertir milihenrios
          a henrios.'
        en: 'Common mistake: not converting millihenries to henries.'
    next_step_rules:
    - id: l_next
      when: 'true'
      status: info
      text:
        es: Revisa consistencia de unidades antes de sustituir en fórmulas.
        en: Check unit consistency before substitution in formulas.
    physical_intuition:
    - id: inductancia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[inductancia]] describe el estado dinámico.
        en: Intuitively, [[inductancia]] describes the dynamic state.
    limiting_cases:
    - id: inductancia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[inductancia]].
        en: Check limiting cases of [[inductancia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  corriente_inductiva_eficaz:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_inductiva_eficaz
      en: Result of corriente_inductiva_eficaz
    summary_rules:
    - id: il_summary
      when: 'true'
      status: info
      text:
        es: Il mide la corriente eficaz que exige la rama inductiva.
        en: RMS inductive current measures branch current demand.
    physical_reading_rules:
    - id: il_read
      when: 'true'
      status: info
      text:
        es: A tensión fija, incrementos de Xl reducen Il y alivian exigencia de conducción.
        en: At fixed voltage, higher reactance lowers current and eases conduction demand.
    coherence_rules:
    - id: il_coh
      when: 'true'
      status: ok
      text:
        es: Debe crecer con V y decrecer con Xl.
        en: It must increase with voltage and decrease with reactance.
    model_validity_rules:
    - id: il_val
      when: 'true'
      status: ok
      text:
        es: Interpretación válida cuando V e Il se expresan en RMS coherente.
        en: Interpretation is valid when voltage and current are coherently expressed as RMS.
    graph_rules:
    - id: il_graph
      when: 'true'
      status: info
      text:
        es: Permite identificar zonas de sobrecorriente por caída de oposición efectiva.
        en: It helps identify overcurrent regions due to reduced effective opposition.
    likely_errors:
    - id: il_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_inductiva_eficaz]] con una lectura aislada es un error frecuente: Error típico: usar tensión
          pico con fórmula RMS de corriente.'
        en: 'Typical mistake: using peak voltage with RMS current formula.'
    next_step_rules:
    - id: il_next
      when: 'true'
      status: info
      text:
        es: Contrasta Il calculada con límite térmico de bobina y protección.
        en: Contrast computed current with thermal limits of coil and protection.
    physical_intuition:
    - id: corriente_inductiva_eficaz_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[corriente_inductiva_eficaz]] describe el estado dinámico.
        en: Intuitively, [[corriente_inductiva_eficaz]] describes the dynamic state.
    limiting_cases:
    - id: corriente_inductiva_eficaz_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[corriente_inductiva_eficaz]].
        en: Check limiting cases of [[corriente_inductiva_eficaz]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencia_reactiva_inductiva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de potencia_reactiva_inductiva
      en: Result of potencia_reactiva_inductiva
    summary_rules:
    - id: ql_summary
      when: 'true'
      status: info
      text:
        es: Ql representa magnitud del intercambio reactivo de la rama inductiva.
        en: Inductive reactive power represents reactive exchange magnitude in the branch.
    physical_reading_rules:
    - id: ql_read
      when: 'true'
      status: info
      text:
        es: No equivale a potencia activa neta, sino a energía intercambiada por ciclo.
        en: It is not net active power, but cycle-by-cycle exchanged energy effect.
    coherence_rules:
    - id: ql_coh
      when: 'true'
      status: ok
      text:
        es: Debe crecer cuando aumentan V o Il en régimen comparable.
        en: It must grow when voltage or current rise under comparable regime.
    model_validity_rules:
    - id: ql_val
      when: 'true'
      status: ok
      text:
        es: Requiere convención explícita de signo para lectura completa de red.
        en: It requires explicit sign convention for full network interpretation.
    graph_rules:
    - id: ql_graph
      when: 'true'
      status: info
      text:
        es: Útil para estimar impacto de cargas inductivas en demanda reactiva.
        en: Useful to estimate impact of inductive loads on reactive demand.
    likely_errors:
    - id: ql_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[potencia_reactiva_inductiva]] con una lectura aislada es un error frecuente: Error común: interpretar
          Ql como consumo activo.'
        en: 'Common mistake: interpreting reactive power as active consumption.'
    next_step_rules:
    - id: ql_next
      when: 'true'
      status: info
      text:
        es: Integra Ql con el balance reactivo total del sistema.
        en: Integrate reactive power with total system reactive balance.
    physical_intuition:
    - id: potencia_reactiva_inductiva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_reactiva_inductiva]] describe el estado dinámico.
        en: Intuitively, [[potencia_reactiva_inductiva]] describes the dynamic state.
    limiting_cases:
    - id: potencia_reactiva_inductiva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_reactiva_inductiva]].
        en: Check limiting cases of [[potencia_reactiva_inductiva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
