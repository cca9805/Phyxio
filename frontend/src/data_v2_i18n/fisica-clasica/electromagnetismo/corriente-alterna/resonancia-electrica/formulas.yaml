version: 5
topic:
  id: resonancia-electrica
  title:
    es: Resonancia electrica
    en: Electrical Resonance
variables:
- id: omega0
  symbol: \omega_0
  name:
    es: frecuencia angular resonante
    en: Resonant Angular Frequency
  si_unit: rad/s
- id: f0
  symbol: f_0
  name:
    es: frecuencia resonante
    en: Resonant Frequency
  si_unit: Hz
- id: inductancia
  symbol: inductancia
  name:
    es: inductancia
    en: Inductance
  si_unit: H
- id: capacitancia
  symbol: capacitancia
  name:
    es: capacitancia
    en: Capacitance
  si_unit: F
- id: resistencia_total_serie
  symbol: resistencia_total_serie
  name:
    es: resistencia total serie
    en: Total Series Resistance
  si_unit: ohm
- id: factor_de_calidad
  symbol: factor_de_calidad
  name:
    es: factor de calidad
    en: Quality Factor
  si_unit: '-'
- id: ancho_de_banda
  symbol: ancho_de_banda
  name:
    es: ancho de banda
    en: Bandwidth
  si_unit: Hz
