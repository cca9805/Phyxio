version: 5.0.0
id: resonancia-electrica
leaf_id: resonancia-electrica
nombre:
  es: Resonancia electrica
  en: Electrical Resonance
scope:
  area: fisica-clasica
  bloque: electromagnetismo
  subbloque: corriente-alterna
  parent_id: corriente-alterna
  ruta_relativa: fisica-clasica/electromagnetismo/corriente-alterna/resonancia-electrica
  orden: 294400
output_contract:
  sections: &id001
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
  inline_mode:
    max_sections: 2
    priority:
    - summary
    - likely_errors
  extended_mode:
    show_all: true
result_blocks:
  summary:
    enabled: true
    order: 1
    title:
      es: Summary
      en: Summary
  physical_reading:
    enabled: true
    order: 2
    title:
      es: Physical reading
      en: Physical reading
  coherence:
    enabled: true
    order: 3
    title:
      es: Coherence
      en: Coherence
  model_validity:
    enabled: true
    order: 4
    title:
      es: Model validity
      en: Model validity
  graph_reading:
    enabled: false
    order: 5
    title:
      es: Graph reading
      en: Graph reading
  likely_errors:
    enabled: true
    order: 6
    title:
      es: Likely errors
      en: Likely errors
  next_step:
    enabled: true
    order: 7
    title:
      es: Next step
      en: Next step
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: false
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: false
  preferred_type: none
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - omega_resonancia
  - frecuencia_resonancia
  - factor_calidad
  - ancho_banda
  - corriente_resonancia
  magnitudes:
  - omega0
  - f0
  - inductancia
  - capacitancia
  - resistencia_total_serie
  - factor_de_calidad
  - ancho_de_banda
  - tension_eficaz
  - corriente_resonante
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: false
global_context:
  enabled: true
  physical_domain:
    es: electromagnetismo
    en: ''
  axis_convention:
    es: El signo depende de la convención de ejes.
    en: Sign depends on axes.
  standard_assumptions:
  - es: Interpretado bajo el modelo físico.
    en: Interpreted under the physical model.
  standard_warnings:
  - es: Revisa unidades y signo.
    en: Check units and sign.
graph_binding:
  enabled: false
  type: none
  channels: []
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: false
  primary_variable: omega0
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  omega0:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de omega0
      en: Result of omega0
    summary_rules:
    - id: omega0_summary
      when: 'true'
      status: info
      text:
        es: omega0 fija la escala angular de la resonancia.
        en: Resonant angular frequency sets angular scale of resonance.
    physical_reading_rules:
    - id: omega0_read
      when: 'true'
      status: info
      text:
        es: Cambios en L y C desplazan omega0 en sentido inverso al producto LC.
        en: Changes in inductance and capacitance shift angular frequency inversely with LC product.
    coherence_rules:
    - id: omega0_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser positiva y consistente con f0.
        en: It must be positive and consistent with resonant frequency.
    model_validity_rules:
    - id: omega0_val
      when: 'true'
      status: ok
      text:
        es: Aplica en modelo lineal con parámetros equivalentes estables.
        en: Applies in linear model with stable equivalent parameters.
    graph_rules:
    - id: omega0_graph
      when: 'true'
      status: info
      text:
        es: Define la posición angular del pico de respuesta.
        en: Defines angular position of response peak.
    likely_errors:
    - id: omega0_err
      when: 'true'
      status: warning
      text:
        es: 'Error común: confundir escala angular con hertz.'
        en: 'Common mistake: confusing angular scale with hertz.'
    next_step_rules:
    - id: omega0_next
      when: 'true'
      status: info
      text:
        es: Convierte omega0 a f0 para decisión operativa.
        en: Convert resonant angular frequency to hertz for operating decision.
    physical_intuition:
    - id: omega0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[omega0]] describe el estado dinámico.
        en: Intuitively, [[omega0]] describes the dynamic state.
    limiting_cases:
    - id: omega0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[omega0]].
        en: Check limiting cases of [[omega0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  inductancia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de inductancia
      en: Result of inductancia
    summary_rules:
    - id: l_summary
      when: 'true'
      status: info
      text:
        es: L participa en la ubicación de resonancia y en la selectividad.
        en: Inductance participates in resonance placement and selectivity.
    physical_reading_rules:
    - id: l_read
      when: 'true'
      status: info
      text:
        es: Al aumentar L con C fija, f0 disminuye.
        en: Increasing inductance at fixed capacitance lowers resonant frequency.
    coherence_rules:
    - id: l_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantenerse positiva para resonancia física.
        en: It must remain positive for physical resonance.
    model_validity_rules:
    - id: l_val
      when: 'true'
      status: ok
      text:
        es: Requiere valor efectivo representativo en frecuencia de operación.
        en: Requires effective value representative at operating frequency.
    graph_rules:
    - id: l_graph
      when: 'true'
      status: info
      text:
        es: Su cambio desplaza horizontalmente la curva de respuesta.
        en: Its variation shifts response curve horizontally.
    likely_errors:
    - id: l_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[inductancia]] con una lectura aislada es un error frecuente: Error común: usar mH como H sin conversión.'
        en: 'Common mistake: using mH as H without conversion.'
    next_step_rules:
    - id: l_next
      when: 'true'
      status: info
      text:
        es: Ajusta L cuando necesites mover la sintonía central.
        en: Tune inductance when central tuning position must shift.
    physical_intuition:
    - id: inductancia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[inductancia]] describe el estado dinámico.
        en: Intuitively, [[inductancia]] describes the dynamic state.
    limiting_cases:
    - id: inductancia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[inductancia]].
        en: Check limiting cases of [[inductancia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  capacitancia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de capacitancia
      en: Result of capacitancia
    summary_rules:
    - id: c_summary
      when: 'true'
      status: info
      text:
        es: C gobierna junto a L la posición de resonancia.
        en: Capacitance governs resonance position together with inductance.
    physical_reading_rules:
    - id: c_read
      when: 'true'
      status: info
      text:
        es: A mayor C con L fija, menor frecuencia resonante.
        en: Higher capacitance at fixed inductance lowers resonant frequency.
    coherence_rules:
    - id: c_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser positiva y coherente con tipo de componente.
        en: It must be positive and coherent with component type.
    model_validity_rules:
    - id: c_val
      when: 'true'
      status: ok
      text:
        es: Puede variar por temperatura y tolerancia en operación real.
        en: It may vary with temperature and tolerance in real operation.
    graph_rules:
    - id: c_graph
      when: 'true'
      status: info
      text:
        es: Modifica la posición del pico de frecuencia.
        en: Modifies position of frequency peak.
    likely_errors:
    - id: c_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[capacitancia]] con una lectura aislada es un error frecuente: Error común: usar microfaradios como
          faradios.'
        en: 'Common mistake: using microfarads as farads.'
    next_step_rules:
    - id: c_next
      when: 'true'
      status: info
      text:
        es: Ajusta C para compensar deriva de sintonía.
        en: Adjust capacitance to compensate tuning drift.
    physical_intuition:
    - id: capacitancia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[capacitancia]] describe el estado dinámico.
        en: Intuitively, [[capacitancia]] describes the dynamic state.
    limiting_cases:
    - id: capacitancia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[capacitancia]].
        en: Check limiting cases of [[capacitancia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  f0:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de f0
      en: Result of f0
    summary_rules:
    - id: f0_summary
      when: 'true'
      status: info
      text:
        es: f0 ubica la sintonía central del resonador.
        en: Resonant frequency sets central tuning point of resonator.
    physical_reading_rules:
    - id: f0_read
      when: 'true'
      status: info
      text:
        es: Cambios en L o C desplazan la frecuencia de resonancia.
        en: Changes in inductance or capacitance shift resonant frequency.
    coherence_rules:
    - id: f0_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser positiva y consistente con omega0.
        en: It must be positive and consistent with resonant angular frequency.
    model_validity_rules:
    - id: f0_val
      when: 'true'
      status: ok
      text:
        es: Válida en régimen sinusoidal con parámetros cercanos a lineales.
        en: Valid in sinusoidal regime with near-linear parameters.
    graph_rules:
    - id: f0_graph
      when: 'true'
      status: info
      text:
        es: Corresponde al centro del pico de respuesta frecuencial.
        en: Corresponds to center of frequency-response peak.
    likely_errors:
    - id: f0_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[f0]] con una lectura aislada es un error frecuente: Error común: omitir conversión entre omega0 y
          f0.'
        en: 'Common mistake: omitting conversion between angular and ordinary frequency.'
    next_step_rules:
    - id: f0_next
      when: 'true'
      status: info
      text:
        es: Usa f0 junto a Q para estimar selectividad operativa.
        en: Use resonant frequency with quality factor to estimate practical selectivity.
    physical_intuition:
    - id: f0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[f0]] describe el estado dinámico.
        en: Intuitively, [[f0]] describes the dynamic state.
    limiting_cases:
    - id: f0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[f0]].
        en: Check limiting cases of [[f0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  factor_de_calidad:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de factor_de_calidad
      en: Result of factor_de_calidad
    summary_rules:
    - id: q_summary
      when: 'true'
      status: info
      text:
        es: Q resume compromiso entre selectividad y amortiguamiento.
        en: Quality factor summarizes tradeoff between selectivity and damping.
    physical_reading_rules:
    - id: q_read
      when: 'true'
      status: info
      text:
        es: Q alta implica pico más agudo y mayor sensibilidad a tolerancias.
        en: High quality factor means sharper peak and higher tolerance sensitivity.
    coherence_rules:
    - id: q_coh
      when: 'true'
      status: ok
      text:
        es: Debe aumentar cuando R disminuye con L y omega0 fijas.
        en: It should increase when resistance decreases at fixed inductance and angular frequency.
    model_validity_rules:
    - id: q_val
      when: 'true'
      status: ok
      text:
        es: Interpretación correcta requiere R efectiva representativa de pérdidas reales.
        en: Correct interpretation requires effective resistance representative of real losses.
    graph_rules:
    - id: q_graph
      when: 'true'
      status: info
      text:
        es: Determina anchura del lóbulo principal en la curva de respuesta.
        en: Determines width of main lobe in response curve.
    likely_errors:
    - id: q_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[factor_de_calidad]] con una lectura aislada es un error frecuente: Error frecuente: interpretar Q
          como eficiencia energética.'
        en: 'A common mistake is to interpret [[factor_de_calidad]] in isolation: Frequent error: interpreting quality factor
          as energy efficiency.'
    next_step_rules:
    - id: q_next
      when: 'true'
      status: info
      text:
        es: Conecta Q con BW para verificar especificación de filtro.
        en: Connect quality factor with bandwidth to verify filter specification.
    physical_intuition:
    - id: factor_de_calidad_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[factor_de_calidad]] describe el estado dinámico.
        en: Intuitively, [[factor_de_calidad]] describes the dynamic state.
    limiting_cases:
    - id: factor_de_calidad_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[factor_de_calidad]].
        en: Check limiting cases of [[factor_de_calidad]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  resistencia_total_serie:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de resistencia_total_serie
      en: Result of resistencia_total_serie
    summary_rules:
    - id: r_summary
      when: 'true'
      status: info
      text:
        es: R controla amortiguamiento, selectividad y corriente resonante.
        en: Resistance controls damping, selectivity, and resonant current.
    physical_reading_rules:
    - id: r_read
      when: 'true'
      status: info
      text:
        es: Si R sube, normalmente Q baja y BW aumenta.
        en: If resistance rises, quality factor usually drops and bandwidth rises.
    coherence_rules:
    - id: r_coh
      when: 'true'
      status: ok
      text:
        es: Debe incluir pérdidas efectivas y no solo valor nominal.
        en: It should include effective losses, not only nominal value.
    model_validity_rules:
    - id: r_val
      when: 'true'
      status: ok
      text:
        es: En operación real puede cambiar por carga y temperatura.
        en: In real operation it may change with load and temperature.
    graph_rules:
    - id: r_graph
      when: 'true'
      status: info
      text:
        es: Cambia altura y anchura del pico de respuesta.
        en: Changes height and width of response peak.
    likely_errors:
    - id: r_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[resistencia_total_serie]] con una lectura aislada es un error frecuente: Error común: subestimar
          R efectiva en el montaje real.'
        en: 'Common mistake: underestimating effective resistance in real assembly.'
    next_step_rules:
    - id: r_next
      when: 'true'
      status: info
      text:
        es: Ajusta amortiguamiento cuando cambie requisito de selectividad.
        en: Adjust damping when selectivity requirement changes.
    physical_intuition:
    - id: resistencia_total_serie_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[resistencia_total_serie]] describe el estado dinámico.
        en: Intuitively, [[resistencia_total_serie]] describes the dynamic state.
    limiting_cases:
    - id: resistencia_total_serie_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[resistencia_total_serie]].
        en: Check limiting cases of [[resistencia_total_serie]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  ancho_de_banda:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de ancho_de_banda
      en: Result of ancho_de_banda
    summary_rules:
    - id: bw_summary
      when: 'true'
      status: info
      text:
        es: BW cuantifica el rango útil alrededor de resonancia.
        en: Bandwidth quantifies usable range around resonance.
    physical_reading_rules:
    - id: bw_read
      when: 'true'
      status: info
      text:
        es: Si Q aumenta, el ancho de banda tiende a reducirse.
        en: If quality factor rises, bandwidth tends to shrink.
    coherence_rules:
    - id: bw_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantener consistencia con f0 y Q.
        en: It must remain consistent with resonant frequency and quality factor.
    model_validity_rules:
    - id: bw_val
      when: 'true'
      status: ok
      text:
        es: Relación BW=f0/Q es aproximada y depende del régimen de amortiguamiento.
        en: Bandwidth relation is approximate and depends on damping regime.
    graph_rules:
    - id: bw_graph
      when: 'true'
      status: info
      text:
        es: Se observa como separación entre frecuencias de semipotencia.
        en: It is observed as separation between half-power frequencies.
    likely_errors:
    - id: bw_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[ancho_de_banda]] con una lectura aislada es un error frecuente: Error típico: tratar BW como constante
          al cambiar R.'
        en: 'Typical mistake: treating bandwidth as constant when resistance changes.'
    next_step_rules:
    - id: bw_next
      when: 'true'
      status: info
      text:
        es: Verifica BW frente a requerimiento de selectividad del sistema.
        en: Check bandwidth against system selectivity requirement.
    physical_intuition:
    - id: ancho_de_banda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[ancho_de_banda]] describe el estado dinámico.
        en: Intuitively, [[ancho_de_banda]] describes the dynamic state.
    limiting_cases:
    - id: ancho_de_banda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[ancho_de_banda]].
        en: Check limiting cases of [[ancho_de_banda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  corriente_resonante:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_resonante
      en: Result of corriente_resonante
    summary_rules:
    - id: ires_summary
      when: 'true'
      status: info
      text:
        es: Ires estima la corriente de rama en condición resonante serie.
        en: Resonant current estimates branch current under series resonance condition.
    physical_reading_rules:
    - id: ires_read
      when: 'true'
      status: info
      text:
        es: Con R baja, la corriente resonante puede crecer y exigir protección adicional.
        en: With low resistance, resonant current can grow and require additional protection.
    coherence_rules:
    - id: ires_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser coherente con V y R en condiciones RMS.
        en: It must be coherent with voltage and resistance in RMS conditions.
    model_validity_rules:
    - id: ires_val
      when: 'true'
      status: ok
      text:
        es: Esta estimación aplica en rama serie cercana al punto resonante.
        en: This estimate applies to series branch near resonant point.
    graph_rules:
    - id: ires_graph
      when: 'true'
      status: info
      text:
        es: Marca altura del pico de respuesta de corriente.
        en: Marks height of current-response peak.
    likely_errors:
    - id: ires_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_resonante]] con una lectura aislada es un error frecuente: Error común: no contrastar Ires
          con límite térmico real.'
        en: 'Common mistake: not checking resonant current against real thermal limit.'
    next_step_rules:
    - id: ires_next
      when: 'true'
      status: info
      text:
        es: Integra Ires con estrategia de protección y margen térmico.
        en: Integrate resonant current with protection strategy and thermal margin.
    physical_intuition:
    - id: corriente_resonante_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[corriente_resonante]] describe el estado dinámico.
        en: Intuitively, [[corriente_resonante]] describes the dynamic state.
    limiting_cases:
    - id: corriente_resonante_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[corriente_resonante]].
        en: Check limiting cases of [[corriente_resonante]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  tension_eficaz:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de tension_eficaz
      en: Result of tension_eficaz
    summary_rules:
    - id: v_summary
      when: 'true'
      status: info
      text:
        es: V define nivel de excitación que impulsa la respuesta resonante.
        en: RMS voltage defines excitation level driving resonant response.
    physical_reading_rules:
    - id: v_read
      when: 'true'
      status: info
      text:
        es: Con R fija, aumentar V eleva Ires proporcionalmente.
        en: At fixed resistance, increasing RMS voltage raises resonant current proportionally.
    coherence_rules:
    - id: v_coh
      when: 'true'
      status: ok
      text:
        es: Debe compararse en la misma convención RMS.
        en: It must be compared under the same RMS convention.
    model_validity_rules:
    - id: v_val
      when: 'true'
      status: ok
      text:
        es: Interpretación válida con fuente periódica estable.
        en: Interpretation is valid with stable periodic source.
    graph_rules:
    - id: v_graph
      when: 'true'
      status: info
      text:
        es: Influye en escala vertical de respuesta de corriente.
        en: Influences vertical scale of current response.
