    coherence_rules:
    - id: vs_coh
      when: 'true'
      status: ok
      text:
        es: Debe cerrar KVL con mismo sentido de recorrido en todos los términos.
        en: It must close KVL with same traversal direction in all terms.
    model_validity_rules:
    - id: vs_val
      when: 'true'
      status: ok
      text:
        es: Interpretación robusta en circuito DC lumped con parámetros estables.
        en: Interpretation is robust in lumped DC circuit with stable parameters.
    graph_rules:
    - id: vs_graph
      when: 'true'
