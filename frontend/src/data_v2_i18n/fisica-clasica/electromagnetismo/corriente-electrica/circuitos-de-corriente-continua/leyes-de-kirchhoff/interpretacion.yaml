      en: Result of caida_de_tension
    summary_rules:
    - id: v_summary
      when: 'true'
      status: info
      text:
        es: V representa caída local compatible con corriente de tramo y resistencia.
        en: Voltage drop represents local fall compatible with segment current and resistance.
    physical_reading_rules:
    - id: v_read
      when: 'true'
      status: info
      text:
        es: Permite auditar qué elemento concentra mayor diferencia de potencial.
        en: It helps audit which element concentrates largest potential difference.
    coherence_rules:
    - id: v_coh
      when: 'true'
      status: ok
      text:
        es: Debe mantener consistencia con I y R del mismo tramo físico.
        en: It must remain consistent with current and resistance of same segment.
    model_validity_rules:
    - id: v_val
      when: 'true'
      status: ok
      text:
        es: Válida para tramo óhmico lineal sin cambios térmicos dominantes.
