targets:
  corriente_de_rama_3:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_de_rama_3
      en: Result of corriente_de_rama_3
    summary_rules:
    - id: i3_summary
      when: 'true'
      status: info
      text:
        es: I3 representa corriente cerrada por balance de carga en nodo.
        en: Branch current 3 represents current closed by node charge balance.
    physical_reading_rules:
    - id: i3_read
      when: 'true'
      status: info
      text:
        es: Su signo confirma si el sentido real coincide con la referencia elegida.
        en: Its sign confirms whether real direction matches chosen reference.
    coherence_rules:
    - id: i3_coh
      when: 'true'
      status: ok
      text:
        es: Debe satisfacer ecuación nodal junto con I1 e I2.
        en: It must satisfy nodal equation with branch currents 1 and 2.
    model_validity_rules:
    - id: i3_val
      when: 'true'
      status: ok
      text:
        es: Válida si el nodo está correctamente definido y sin ramas omitidas.
        en: Valid if node is correctly defined and no branch is omitted.
    graph_rules:
    - id: i3_graph
      when: 'true'
      status: info
      text:
        es: Se interpreta como cierre de flujo de carga en diagrama nodal.
        en: It is interpreted as charge-flow closure in nodal diagram.
    likely_errors:
    - id: i3_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_de_rama_3]] con una lectura aislada es un error frecuente: Error común: invertir signo
          de una rama sin ajustar el resto del balance.'
        en: 'Common mistake: flipping one branch sign without updating full balance.'
    next_step_rules:
    - id: i3_next
      when: 'true'
      status: info
      text:
        es: Verifica continuidad del balance en nodos adicionales de la red.
        en: Verify closure continuity in additional network nodes.
    physical_intuition:
    - id: corriente_de_rama_3_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[corriente_de_rama_3]] describe el estado dinámico.
        en: Intuitively, [[corriente_de_rama_3]] describes the dynamic state.
    limiting_cases:
    - id: corriente_de_rama_3_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[corriente_de_rama_3]].
        en: Check limiting cases of [[corriente_de_rama_3]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  corriente_de_rama_1:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_de_rama_1
      en: Result of corriente_de_rama_1
    summary_rules:
    - id: i1_summary
      when: 'true'
      status: info
      text:
        es: I1 es una corriente de rama que participa en el cierre nodal.
        en: I1 is a branch current that participates in nodal closure.
    physical_reading_rules:
    - id: i1_read
      when: 'true'
      status: info
      text:
        es: Su magnitud indica aporte de una rama al reparto total de corriente.
        en: Its magnitude indicates one branch contribution to total current split.
    coherence_rules:
    - id: i1_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser coherente con I2 e I3 en la ecuacion de nodo.
        en: It must be coherent with I2 and I3 in the node equation.
    model_validity_rules:
    - id: i1_val
      when: 'true'
      status: ok
      text:
        es: Valida en regimen estacionario y conexion de rama bien definida.
        en: Valid in steady operation with well-defined branch connection.
    graph_rules:
    - id: i1_graph
      when: 'true'
      status: info
      text:
        es: Se visualiza como flujo en una rama del nodo principal.
        en: It is visualized as flow in one branch of the main node.
    likely_errors:
    - id: i1_err
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[corriente_de_rama_1]] con una lectura aislada es un error frecuente: Error comun: medir I1 con referencia
          opuesta a la usada en el modelo.'
        en: 'A common mistake is to interpret [[corriente_de_rama_1]] in isolation: Common error: measuring I1 with opposite
          reference to the model.'
    next_step_rules:
    - id: i1_next
      when: 'true'
      status: info
      text:
        es: Confirmar referencia de sentido antes de comparar con I3.
        en: Confirm direction reference before comparing against I3.
