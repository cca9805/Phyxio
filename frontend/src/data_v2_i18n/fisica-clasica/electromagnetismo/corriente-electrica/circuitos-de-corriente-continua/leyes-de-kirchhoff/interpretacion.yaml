      when: 'true'
      status: info
      text:
        es: Vs es excitación de malla que se reparte en caídas resistivas.
        en: Source voltage is loop excitation distributed into resistive drops.
    physical_reading_rules:
    - id: vs_read
      when: 'true'
      status: info
      text:
        es: Determina escala de corriente de malla junto con resistencia total del lazo.
