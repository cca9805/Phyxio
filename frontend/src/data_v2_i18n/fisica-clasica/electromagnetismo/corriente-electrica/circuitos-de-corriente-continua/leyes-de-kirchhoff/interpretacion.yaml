        en: 'A common mistake is to interpret [[corriente_de_malla]] in isolation: Common error: using incorrect total resistance
          when estimating I.'
    next_step_rules:
    - id: i_next
      when: 'true'
      status: info
      text:
        es: Verificar tendencia de I ante cambios esperados de resistencia equivalente.
        en: Verify current trend under expected equivalent-resistance changes.
