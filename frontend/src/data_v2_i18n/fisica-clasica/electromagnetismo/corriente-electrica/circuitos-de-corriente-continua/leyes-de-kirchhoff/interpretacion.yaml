  corriente_de_rama_2:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de corriente_de_rama_2
      en: Result of corriente_de_rama_2
    summary_rules:
    - id: i2_summary
      when: 'true'
      status: info
      text:
        es: I2 completa el reparto de corriente en el nodo junto con I1 e I3.
        en: I2 completes node current split together with I1 and I3.
    physical_reading_rules:
    - id: i2_read
      when: 'true'
      status: info
      text:
        es: Permite evaluar desbalance de carga entre ramas paralelas.
        en: It helps evaluate load imbalance between parallel branches.
    coherence_rules:
    - id: i2_coh
      when: 'true'
      status: ok
      text:
        es: Debe cerrar el balance nodal con convencion de signos consistente.
        en: It must close nodal balance with consistent sign convention.
    model_validity_rules:
    - id: i2_val
      when: 'true'
      status: ok
      text:
        es: Valida cuando la rama no presenta no linealidad dominante.
        en: Valid when branch does not show dominant nonlinearity.
    graph_rules:
    - id: i2_graph
      when: 'true'
      status: info
      text:
        es: Se interpreta como contribucion de la segunda rama del nodo.
