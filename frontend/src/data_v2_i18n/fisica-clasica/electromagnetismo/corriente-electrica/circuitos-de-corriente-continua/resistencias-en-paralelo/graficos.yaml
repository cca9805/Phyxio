version: "1.0"
leaf: "resistencias-en-paralelo"

coord:
  title:
    es: Gráfica Coord · Resistencias en Paralelo
    en: Coord Graph · Resistors in Parallel
  xAxis:
    es: tensión V (V)
    en: voltage V (V)
  yAxis:
    es: intensidad total I (A)
    en: total current I (A)
  xMagnitude: V
  yMagnitude: I
  relation:
    es: "I = V/R_eq, 1/R_eq = Σ1/Rᵢ. En paralelo: misma tensión, corrientes se suman. R_eq < R_mín."
    en: "I = V/R_eq, 1/R_eq = Σ1/Rᵢ. In parallel: same voltage, currents add. R_eq < R_min."
  physicalReading:
    es: Recta de pendiente 1/R_eq. Mayor número de ramas → pendiente mayor (menor R_eq).
    en: Line with slope 1/R_eq. More branches → larger slope (smaller R_eq).
  slopeMeaning:
    es: "Pendiente = 1/R_eq = G_eq (S): conductancia equivalente."
    en: "Slope = 1/R_eq = G_eq (S): equivalent conductance."
  interceptMeaning:
    es: "I(0) = 0: sin tensión no hay corriente."
    en: "I(0) = 0: no voltage means no current."
  curvatureMeaning:
    es: Lineal (resistencias óhmicas en paralelo).
    en: Linear (ohmic resistors in parallel).
  signMeaning:
    es: "I > 0 en el sentido convencional."
    en: "I > 0 in the conventional direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: V ≥ 0 para DC. R_eq = R/N para N resistencias iguales.
    en: V ≥ 0 for DC. R_eq = R/N for N equal resistances.
  modelConnection:
    es: Ley de Ohm + regla de corrientes de Kirchhoff.
    en: "Ohm's law + Kirchhoff's current rule."
  formulaConnection:
    es: Conecta con 1/R_eq = Σ1/Rᵢ, I_total = ΣIᵢ, V igual en cada rama.
    en: Connects to 1/R_eq = Σ1/Rᵢ, I_total = ΣIᵢ, V equal in each branch.
  readingFocus:
    es: leer la pendiente 1/R_eq y verificar que la tensión es la misma en todas las ramas.
    en: read the slope 1/R_eq and verify that voltage is equal across all branches.
  agentHints:
    es:
      - R_eq < R_mínima del conjunto.
      - "Dos iguales en paralelo: R_eq = R/2."
      - "En paralelo: G se suman; en serie: R se suman."
    en:
      - R_eq < minimum R in the set.
      - "Two equal in parallel: R_eq = R/2."
      - "In parallel: G adds; in series: R adds."
  commonMistakes:
    es:
      - Pensar que R_eq = ΣRᵢ (fórmula de serie).
      - Olvidar que en paralelo V es común.
      - Confundir los terminales de conexión.
    en:
      - Thinking R_eq = ΣRᵢ (series formula).
      - Forgetting that in parallel V is common.
      - Confusing the connection terminals.
