version: "1.0"
leaf: "resistencias-en-serie"

coord:
  title:
    es: Gráfica Coord · Resistencias en Serie
    en: Coord Graph · Resistors in Series
  xAxis:
    es: intensidad de corriente I (A)
    en: current intensity I (A)
  yAxis:
    es: tensión total V (V)
    en: total voltage V (V)
  xMagnitude: I
  yMagnitude: V
  relation:
    es: "V = I·R_eq, R_eq = ΣRᵢ. En serie: misma corriente, tensiones se suman. R_eq > R_máx."
    en: "V = I·R_eq, R_eq = ΣRᵢ. In series: same current, voltages add. R_eq > R_max."
  physicalReading:
    es: Recta de pendiente R_eq. Mayor número de resistencias → pendiente mayor.
    en: Line with slope R_eq. More resistors → larger slope.
  slopeMeaning:
    es: "Pendiente = R_eq = ΣRᵢ (Ω): resistencia equivalente de la serie."
    en: "Slope = R_eq = ΣRᵢ (Ω): equivalent series resistance."
  interceptMeaning:
    es: "V(0) = 0: sin corriente no hay caída de tensión."
    en: "V(0) = 0: no current means no voltage drop."
  curvatureMeaning:
    es: Lineal (resistencias óhmicas en serie).
    en: Linear (ohmic resistors in series).
  signMeaning:
    es: "V > 0 en el sentido de la corriente convencional."
    en: "V > 0 in the conventional current direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: I ≥ 0 para DC. R_eq = NR para N resistencias iguales.
    en: I ≥ 0 for DC. R_eq = NR for N equal resistances.
  modelConnection:
    es: Ley de Ohm + regla de tensiones de Kirchhoff.
    en: "Ohm's law + Kirchhoff's voltage rule."
  formulaConnection:
    es: Conecta con R_eq = ΣRᵢ, V_total = ΣVᵢ, I igual en todas.
    en: Connects to R_eq = ΣRᵢ, V_total = ΣVᵢ, I equal throughout.
  readingFocus:
    es: leer la pendiente R_eq y verificar que la corriente es la misma en todas las resistencias.
    en: read the slope R_eq and verify that current is the same through all resistors.
  agentHints:
    es:
      - "R_eq > R_máxima del conjunto."
      - "N iguales en serie: R_eq = N·R."
      - "Divisor de tensión: V_i = V·Rᵢ/R_eq."
    en:
      - "R_eq > maximum R in the set."
      - "N equal in series: R_eq = N·R."
      - "Voltage divider: V_i = V·Rᵢ/R_eq."
  commonMistakes:
    es:
      - Usar la fórmula de paralelo en vez de serie.
      - Pensar que la corriente se divide en serie.
      - Olvidar la ley de tensiones de Kirchhoff.
    en:
      - Using the parallel formula instead of series.
      - Thinking current divides in series.
      - "Forgetting Kirchhoff's voltage law."
