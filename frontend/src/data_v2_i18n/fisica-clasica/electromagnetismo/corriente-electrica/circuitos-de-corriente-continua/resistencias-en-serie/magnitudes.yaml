version: 1
magnitudes:
- id: resistencia_equivalente
  symbol: R_{eq}
  nombre:
    es: resistencia equivalente
    en: equivalent resistance
  descripcion:
    es: Resistencia total equivalente de una asociacion en serie.
    en: Total equivalent resistance of a series association.
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Confundir la resistencia equivalente de serie con la de paralelo.
  typical_range: 1 ohm a 100 kohm en ejercicios introductorios.
  sign_behavior:
    has_sign: false
    meaning:
      es: La resistencia electrica de componentes pasivos se modela no negativa.
      en: Electrical resistance of passive components is modeled as non-negative.
  zero_behavior:
    allowed: false
    meaning:
      es: Req igual a cero no es compatible con resistores ideales en serie.
      en: Req equal to zero is not compatible with ideal resistors in series.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, 100000]
  interpretation_role:
    primary_for:
    - resistencias-en-serie
    secondary_for: []
  graph_binding:
    channels:
    - pendiente_i_v
  pedagogical_notes:
    es: Usa [[resistencia_equivalente]] para leer el papel fisico de resistencia equivalente y comprobar unidad, signo y rango.
    en: Use [[resistencia_equivalente]] to read the physical role of resistencia equivalente and check unit, sign and range.
- id: resistencia_uno
  symbol: R_1
  nombre:
    es: resistencia uno
    en: resistor one
  descripcion:
    es: Valor de la primera resistencia del circuito en serie.
    en: Value of the first resistor in the series circuit.
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Mezclar unidades de ohm y kiloohm sin convertir.
  typical_range: 10 ohm a 10 kohm.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se toma positiva en componentes pasivos lineales.
      en: It is taken as positive in passive linear components.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa un puente ideal y cambia la topologia fisica.
      en: Zero represents an ideal wire and changes physical topology.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 100000
  interpretation_role:
    primary_for: []
    secondary_for:
    - resistencias-en-serie
  graph_binding:
    channels:
    - parametro_modelo
  pedagogical_notes:
    es: Usa [[resistencia_uno]] para leer el papel fisico de resistencia uno y comprobar unidad, signo y rango.
    en: Use [[resistencia_uno]] to read the physical role of resistencia uno and check unit, sign and range.
- id: resistencia_dos
  symbol: R_2
  nombre:
    es: resistencia dos
    en: resistor two
  descripcion:
    es: Valor de la segunda resistencia del circuito en serie.
    en: Value of the second resistor in the series circuit.
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Tratar R2 como si cambiara la corriente localmente en serie.
  typical_range: 10 ohm a 10 kohm.
  sign_behavior:
    has_sign: false
    meaning:
      es: Resistencia pasiva positiva en el modelo elemental.
      en: Positive passive resistance in the elementary model.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero implica cortocircuito ideal en esa rama.
      en: Zero implies an ideal short in that element.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 100000
  interpretation_role:
    primary_for: []
    secondary_for:
    - resistencias-en-serie
  graph_binding:
    channels:
    - parametro_modelo
  pedagogical_notes:
    es: Usa [[resistencia_dos]] para leer el papel fisico de resistencia dos y comprobar unidad, signo y rango.
    en: Use [[resistencia_dos]] to read the physical role of resistencia dos and check unit, sign and range.
- id: resistencia_tres
  symbol: R_3
  nombre:
    es: resistencia tres
    en: resistor three
  descripcion:
    es: Valor de la tercera resistencia del circuito en serie.
    en: Value of the third resistor in the series circuit.
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Omitir R3 al sumar Req en arreglos de tres elementos.
  typical_range: 10 ohm a 10 kohm.
  sign_behavior:
    has_sign: false
    meaning:
      es: Valor no negativo para resistores pasivos.
      en: Non-negative value for passive resistors.
  zero_behavior:
    allowed: true
    meaning:
      es: Un cero ideal elimina caida en ese elemento.
      en: An ideal zero removes voltage drop on that element.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 100000
  interpretation_role:
    primary_for: []
    secondary_for:
    - resistencias-en-serie
  graph_binding:
    channels:
    - parametro_modelo
  pedagogical_notes:
    es: Usa [[resistencia_tres]] para leer el papel fisico de resistencia tres y comprobar unidad, signo y rango.
    en: Use [[resistencia_tres]] to read the physical role of resistencia tres and check unit, sign and range.
- id: tension_total
  symbol: V_t
  nombre:
    es: tension total
    en: total voltage
  descripcion:
    es: Diferencia de potencial aplicada por la fuente al conjunto en serie.
    en: Potential difference supplied to the full series chain.
  unidad_si: V
  dimension: M L^2 T^-3 I^-1
  is_vector: false
  components: null
  category: state
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Usar Vt como si fuera caida en cada resistor.
  typical_range: 1 V a 48 V en contextos didacticos.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la orientacion de referencia de potencial.
      en: Sign depends on chosen potential reference orientation.
  zero_behavior:
    allowed: true
    meaning:
      es: Vt cero implica ausencia de excitacion externa en DC ideal.
      en: Zero Vt implies no external excitation in ideal DC.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval:
    - -100
    - 100
  interpretation_role:
    primary_for:
    - resistencias-en-serie
    secondary_for: []
  graph_binding:
    channels:
    - condicion_borde
  pedagogical_notes:
    es: Usa [[tension_total]] para leer el papel fisico de tension total y comprobar unidad, signo y rango.
    en: Use [[tension_total]] to read the physical role of tension total and check unit, sign and range.
- id: corriente
  symbol: I
  nombre:
    es: corriente
    en: current
  descripcion:
    es: Corriente comun que circula por todos los resistores en serie.
    en: Common current flowing through all resistors in series.
  unidad_si: A
  dimension: I
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Pensar que la corriente se divide en elementos en serie.
  typical_range: 1 mA a 2 A en ejercicios de introduccion.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo expresa el sentido elegido de circulacion.
      en: The sign represents chosen flow orientation.
  zero_behavior:
    allowed: true
    meaning:
      es: Corriente nula corresponde a circuito abierto o fuente nula.
      en: Zero current corresponds to open circuit or null source.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval:
    - -10
    - 10
  interpretation_role:
    primary_for:
    - resistencias-en-serie
    secondary_for: []
  graph_binding:
    channels:
    - magnitud_objetivo
  pedagogical_notes:
    es: Usa [[corriente]] para leer el papel fisico de corriente y comprobar unidad, signo y rango.
    en: Use [[corriente]] to read the physical role of corriente and check unit, sign and range.
- id: caida_de_tension
  symbol: V_i
  nombre:
    es: caida de tension
    en: voltage drop
  descripcion:
    es: Caida de potencial en un resistor individual de la serie.
    en: Potential drop on one resistor in the series chain.
  unidad_si: V
  dimension: M L^2 T^-3 I^-1
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: No respetar la proporcionalidad de Vi con Ri en serie.
  typical_range: 0 V a 48 V.
  sign_behavior:
    has_sign: true
    meaning:
      es: Depende del sentido de recorrido en la ley de mallas.
      en: Depends on traversal direction in loop equations.
  zero_behavior:
    allowed: true
    meaning:
      es: Puede ser cero si Ri es nula o I es nula.
      en: It can be zero when Ri is zero or I is zero.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval:
    - -100
    - 100
  interpretation_role:
    primary_for:
    - resistencias-en-serie
    secondary_for: []
  graph_binding:
    channels:
    - lectura_malla
  pedagogical_notes:
    es: Usa [[caida_de_tension]] para leer el papel fisico de caida de tension y comprobar unidad, signo y rango.
    en: Use [[caida_de_tension]] to read the physical role of caida de tension and check unit, sign and range.
- id: resistencia_generica
  symbol: R_i
  nombre:
    es: resistencia generica
    en: generic resistance
  descripcion:
    es: Parametro generico de un elemento resistivo cualquiera dentro de la serie.
    en: Generic parameter for any resistive element within the series chain.
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - resistencias-en-serie
  common_mistake: Sustituir Ri por Req al aplicar una formula de caida individual.
  typical_range: 1 ohm a 100 kohm.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se modela positiva en elementos pasivos.
      en: It is modeled as positive for passive elements.
  zero_behavior:
    allowed: true
    meaning:
      es: Un valor cero representa puente ideal y altera el reparto.
      en: A zero value represents an ideal bridge and alters distribution.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 100000
  interpretation_role:
    primary_for: []
    secondary_for:
    - resistencias-en-serie
  graph_binding:
    channels:
    - parametro_generico
  pedagogical_notes:
    es: Usa [[resistencia_generica]] para leer el papel fisico de resistencia generica y comprobar unidad, signo y rango.
    en: Use [[resistencia_generica]] to read the physical role of resistencia generica and check unit, sign and range.
