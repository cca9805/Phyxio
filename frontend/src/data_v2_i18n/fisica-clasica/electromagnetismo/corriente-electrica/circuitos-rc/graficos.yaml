version: "1.0"
leaf: "circuitos-rc"

coord:
  title:
    es: Gráfica Coord · Circuitos RC
    en: Coord Graph · RC Circuits
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: carga Q(t) (C) o tensión V(t) (V)
    en: charge Q(t) (C) or voltage V(t) (V)
  xMagnitude: t
  yMagnitude: Q
  relation:
    es: "Carga: Q(t) = Cε(1 − e^(−t/τ)), τ = RC. Descarga: Q(t) = Q₀e^(−t/τ). Exponencial con constante de tiempo τ = RC."
    en: "Charging: Q(t) = Cε(1 − e^(−t/τ)), τ = RC. Discharging: Q(t) = Q₀e^(−t/τ). Exponential with time constant τ = RC."
  physicalReading:
    es: "τ = RC: tiempo para alcanzar el 63.2% de la carga máxima (o el 36.8% en descarga). En t = 5τ: carga ≈ 99%."
    en: "τ = RC: time to reach 63.2% of maximum charge (or 36.8% in discharge). At t = 5τ: charge ≈ 99%."
  slopeMeaning:
    es: Pendiente inicial = ε/R (corriente máxima). Pendiente de descarga inicial = −Q₀/(RC).
    en: Initial slope = ε/R (maximum current). Initial discharge slope = −Q₀/(RC).
  interceptMeaning:
    es: Q(0) = 0 en carga; Q(0) = Q₀ en descarga.
    en: Q(0) = 0 on charge; Q(0) = Q₀ on discharge.
  curvatureMeaning:
    es: Exponencial creciente (carga) o decreciente (descarga). La curvatura mide la rapidez del proceso.
    en: Growing exponential (charge) or decaying (discharge). Curvature measures the rate of the process.
  signMeaning:
    es: Q ≥ 0 en carga. La corriente I = dQ/dt decrece exponencialmente.
    en: Q ≥ 0 on charge. Current I = dQ/dt decays exponentially.
  areaMeaning:
    es: El área bajo I(t) = Q almacenada.
    en: Area under I(t) = charge stored.
  domainMeaning:
    es: t ≥ 0. El condensador actúa como filtro paso-bajo para señales de CA.
    en: t ≥ 0. The capacitor acts as a low-pass filter for AC signals.
  modelConnection:
    es: Se interpreta bajo el modelo de circuito RC de primer orden.
    en: Interpreted under the first-order RC circuit model.
  formulaConnection:
    es: Conecta con Q(t) = Cε(1−e^(−t/RC)), I(t) = (ε/R)e^(−t/RC), τ = RC.
    en: Connects to Q(t) = Cε(1−e^(−t/RC)), I(t) = (ε/R)e^(−t/RC), τ = RC.
  readingFocus:
    es: leer τ = RC del gráfico exponencial y determinar si el condensador se carga o descarga.
    en: read τ = RC from the exponential graph and determine whether the capacitor charges or discharges.
  agentHints:
    es:
      - "En t = τ: Q = 63.2% de Q_max."
      - "En t = 5τ: prácticamente en estado estacionario."
      - Mayor R o C → proceso más lento (mayor τ).
    en:
      - "At t = τ: Q = 63.2% of Q_max."
      - "At t = 5τ: practically at steady state."
      - Larger R or C → slower process (larger τ).
  commonMistakes:
    es:
      - Confundir τ con el tiempo de carga completa.
      - Olvidar que I decrece aunque Q aumenta.
      - Usar τ = RC para circuitos RL (τ_RL = L/R).
    en:
      - Confusing τ with the full charging time.
      - Forgetting that I decreases even though Q increases.
      - Using τ = RC for RL circuits (τ_RL = L/R).
