version: "1.0"
leaf: "intensidad-de-corriente"

coord:
  title:
    es: Gráfica Coord · Intensidad de Corriente
    en: Coord Graph · Electric Current Intensity
  xAxis:
    es: tensión V (V)
    en: voltage V (V)
  yAxis:
    es: intensidad de corriente I (A)
    en: current intensity I (A)
  xMagnitude: V
  yMagnitude: I
  relation:
    es: "Ley de Ohm: I = V/R. Recta de pendiente 1/R (conductancia G = 1/R). Para dispositivos no óhmicos (diodo, transistor): curva no lineal."
    en: "Ohm's law: I = V/R. Line with slope 1/R (conductance G = 1/R). For non-ohmic devices (diode, transistor): non-linear curve."
  physicalReading:
    es: Pendiente = G = 1/R. Mayor pendiente → menor resistencia. El diodo solo conduce en un sentido.
    en: Slope = G = 1/R. Larger slope → smaller resistance. The diode only conducts in one direction.
  slopeMeaning:
    es: "Pendiente = 1/R = G (S): conductancia del dispositivo."
    en: "Slope = 1/R = G (S): device conductance."
  interceptMeaning:
    es: I(0) = 0 para dispositivos óhmicos (recta por el origen).
    en: I(0) = 0 for ohmic devices (line through origin).
  curvatureMeaning:
    es: Lineal para conductores óhmicos. No lineal para semiconductores.
    en: Linear for ohmic conductors. Non-linear for semiconductors.
  signMeaning:
    es: "I > 0: corriente en el sentido convencional. I < 0: corriente inversa."
    en: "I > 0: current in conventional direction. I < 0: reverse current."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para el rango de V donde el material es óhmico.
    en: Valid for the range of V where the material is ohmic.
  modelConnection:
    es: Se interpreta bajo la ley de Ohm y el modelo de conductor metálico.
    en: "Interpreted under Ohm's law and the metallic conductor model."
  formulaConnection:
    es: Conecta con I = V/R, P = IV = V²/R = I²R, y las leyes de Kirchhoff.
    en: "Connects to I = V/R, P = IV = V²/R = I²R, and Kirchhoff's laws."
  readingFocus:
    es: leer la pendiente 1/R para obtener la resistencia; identificar la linealidad o no del dispositivo.
    en: read the slope 1/R to obtain resistance; identify whether the device is ohmic or not.
  agentHints:
    es:
      - "Pendiente = 1/R: mayor pendiente → menor R."
      - "Diodo: curva exponencial con umbral ~0.7 V."
      - La ley de Ohm solo aplica a materiales óhmicos.
    en:
      - "Slope = 1/R: larger slope → smaller R."
      - "Diode: exponential curve with threshold ~0.7 V."
      - "Ohm's law only applies to ohmic materials."
  commonMistakes:
    es:
      - Aplicar la ley de Ohm a diodos o transistores.
      - Confundir pendiente (1/R) con la resistencia R.
      - Olvidar que R = ρL/A depende de la geometría.
    en:
      - "Applying Ohm's law to diodes or transistors."
      - Confusing slope (1/R) with resistance R.
      - Forgetting that R = ρL/A depends on geometry.
