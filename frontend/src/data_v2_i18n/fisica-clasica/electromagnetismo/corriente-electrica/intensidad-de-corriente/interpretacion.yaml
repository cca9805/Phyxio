targets:
  intensidad_de_corriente:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de intensidad_de_corriente
      en: Result of intensidad_de_corriente
    summary_rules:
    - id: i_summary
      when: 'true'
      status: info
      text:
        es: La intensidad resume la tasa de transporte neto de carga en el intervalo observado.
        en: Current summarizes net charge transport rate over the observed interval.
    physical_reading_rules:
    - id: i_physical
      when: 'true'
      status: info
      text:
        es: Una I alta puede ser admisible o riesgosa segun el area de conduccion y el regimen termico.
        en: High I may be acceptable or risky depending on conduction area and thermal regime.
    coherence_rules:
    - id: i_coherence
      when: 'true'
      status: ok
      text:
        es: Debe ser consistente con la relacion entre carga transportada y tiempo.
        en: It must be consistent with the relation between transported charge and time.
    model_validity_rules:
    - id: i_validity
      when: 'true'
      status: ok
      text:
        es: La lectura media requiere intervalo temporal representativo del fenomeno real.
        en: Average interpretation requires a time interval representative of the real phenomenon.
    graph_rules:
    - id: i_graph
      when: 'true'
      status: info
      text:
        es: En una curva q-t, la pendiente media del tramo corresponde a I.
        en: In a q-t curve, the segment average slope corresponds to I.
    likely_errors:
    - id: i_warn
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[intensidad_de_corriente]] con una lectura aislada es un error frecuente: Error frecuente: tratar
          intensidad media de un intervalo como valor instantaneo universal.'
        en: 'A common mistake is to interpret [[intensidad_de_corriente]] in isolation: Common error: treating interval-average
          current as universal instantaneous value.'
    next_step_rules:
    - id: i_next
      when: 'true'
      status: info
      text:
        es: Contrasta I con limites de diseno termico y con la seccion disponible.
        en: Compare I with thermal design limits and available area.
    physical_intuition:
    - id: intensidad_de_corriente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[intensidad_de_corriente]] describe el estado dinámico.
        en: Intuitively, [[intensidad_de_corriente]] describes the dynamic state.
    limiting_cases:
    - id: intensidad_de_corriente_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[intensidad_de_corriente]].
        en: Check limiting cases of [[intensidad_de_corriente]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  carga_electrica_transportada:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de carga_electrica_transportada
      en: Result of carga_electrica_transportada
    summary_rules:
    - id: q_summary
      when: 'true'
      status: info
      text:
        es: q representa carga acumulada transportada durante una ventana temporal definida.
        en: q represents accumulated transported charge over a defined time window.
    physical_reading_rules:
    - id: q_physical
      when: 'true'
      status: info
      text:
        es: Una misma q puede corresponder a corrientes muy distintas segun el intervalo usado.
        en: The same q can correspond to very different currents depending on interval length.
    coherence_rules:
    - id: q_coherence
      when: 'true'
      status: ok
      text:
        es: Debe concordar con el producto de intensidad media por tiempo de observacion.
        en: It must agree with average current times observation time.
    model_validity_rules:
    - id: q_validity
      when: t > 0
      status: ok
      text:
        es: La interpretacion requiere intervalo temporal positivo y bien delimitado.
        en: Interpretation requires a positive, well-delimited time interval.
    graph_rules:
    - id: q_graph
      when: 'true'
      status: info
      text:
        es: El area bajo I(t) en el intervalo entrega q transportada.
        en: Area under I(t) over the interval gives transported q.
    likely_errors:
    - id: q_warn
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[carga_electrica_transportada]] con una lectura aislada es un error frecuente: Error frecuente: reportar
          q sin indicar intervalo temporal asociado.'
        en: 'A common mistake is to interpret [[carga_electrica_transportada]] in isolation: Common error: reporting q without
          indicating associated time interval.'
    next_step_rules:
    - id: q_next
      when: 'true'
      status: info
      text:
        es: Acompana q con t para sostener una lectura fisica util de I.
        en: Pair q with t to support a physically useful reading of I.
    physical_intuition:
    - id: carga_electrica_transportada_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[carga_electrica_transportada]] describe el estado dinámico.
        en: Intuitively, [[carga_electrica_transportada]] describes the dynamic state.
    limiting_cases:
    - id: carga_electrica_transportada_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[carga_electrica_transportada]].
        en: Check limiting cases of [[carga_electrica_transportada]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  tiempo:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de tiempo
      en: Result of tiempo
    summary_rules:
    - id: t_summary
      when: 'true'
      status: info
      text:
        es: El tiempo fija la escala de promediado para interpretar flujo de carga.
        en: Time sets averaging scale for charge-flow interpretation.
    physical_reading_rules:
    - id: t_physical
      when: 'true'
      status: info
      text:
        es: Ventanas cortas y largas pueden describir comportamientos distintos de la misma senal.
        en: Short and long windows may describe different behaviors of the same signal.
    coherence_rules:
    - id: t_coherence
      when: t >= 0
      status: ok
      text:
        es: Se toma no negativo respecto al instante inicial de referencia.
        en: It is taken non-negative relative to initial reference instant.
    model_validity_rules:
    - id: t_validity
      when: 'true'
      status: ok
      text:
        es: La validez del promedio depende de no mezclar regimenes fisicos incompatibles en la misma ventana.
        en: Average validity depends on not mixing incompatible physical regimes in one window.
    graph_rules:
    - id: t_graph
      when: 'true'
      status: info
      text:
        es: Cambiar la escala temporal del eje modifica la lectura de pendiente y de ruido.
        en: Changing time-axis scale modifies slope and noise interpretation.
    likely_errors:
    - id: t_warn
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir milisegundos con segundos al calcular I o q.'
        en: 'A common mistake is to interpret [[tiempo]] in isolation: Common error: mixing milliseconds and seconds when
          computing I or q.'
    next_step_rules:
    - id: t_next
      when: 'true'
      status: info
      text:
        es: Establece una convencion unica de unidades temporales al inicio del problema.
        en: Set a single time-unit convention at problem start.
    physical_intuition:
    - id: tiempo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[tiempo]] describe el estado dinámico.
        en: Intuitively, [[tiempo]] describes the dynamic state.
    limiting_cases:
    - id: tiempo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[tiempo]].
        en: Check limiting cases of [[tiempo]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  densidad_de_corriente:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de densidad_de_corriente
      en: Result of densidad_de_corriente
    summary_rules:
    - id: j_summary
      when: 'true'
      status: info
      text:
        es: La densidad de corriente expresa cuanta intensidad circula por unidad de area efectiva.
        en: Current density expresses how much current flows per unit effective area.
    physical_reading_rules:
    - id: j_physical
      when: 'true'
      status: info
      text:
        es: J elevada suele asociarse a mayor calentamiento local y a exigencia material.
        en: High J usually implies larger local heating and material stress.
    coherence_rules:
    - id: j_coherence
      when: A > 0
      status: ok
      text:
        es: Si el area es positiva, J debe derivar de I normalizada por esa area.
        en: If area is positive, J must derive from I normalized by that area.
    model_validity_rules:
    - id: j_validity
      when: 'true'
      status: ok
      text:
        es: Requiere estimar area de conduccion real, no solo geometria nominal.
        en: It requires estimating real conduction area, not only nominal geometry.
    graph_rules:
    - id: j_graph
      when: 'true'
      status: info
      text:
        es: Comparar J entre dos disenos permite detectar sobrecarga local incluso con I similar.
        en: Comparing J across two designs reveals local overload even with similar I.
    likely_errors:
    - id: j_warn
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[densidad_de_corriente]] con una lectura aislada es un error frecuente: Error frecuente: usar area
          geometrica total cuando solo parte de la seccion conduce.'
        en: 'A common mistake is to interpret [[densidad_de_corriente]] in isolation: Common error: using total geometric
          area when only part of the section conducts.'
    next_step_rules:
    - id: j_next
      when: 'true'
      status: info
      text:
        es: Verifica si J calculada es compatible con limites del material y disipacion.
        en: Verify whether computed J is compatible with material and dissipation limits.
    physical_intuition:
    - id: densidad_de_corriente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[densidad_de_corriente]] describe el estado dinámico.
        en: Intuitively, [[densidad_de_corriente]] describes the dynamic state.
    limiting_cases:
    - id: densidad_de_corriente_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[densidad_de_corriente]].
        en: Check limiting cases of [[densidad_de_corriente]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  area_de_seccion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de area_de_seccion
      en: Result of area_de_seccion
    summary_rules:
    - id: a_summary
      when: 'true'
      status: info
      text:
        es: El area de seccion gobierna la normalizacion de I para estimar J.
        en: Cross-sectional area controls I normalization to estimate J.
    physical_reading_rules:
    - id: a_physical
      when: 'true'
      status: info
      text:
        es: Reducir area a igual I incrementa esfuerzo local y sensibilidad termica.
        en: Reducing area at fixed I increases local stress and thermal sensitivity.
    coherence_rules:
    - id: a_coherence
      when: A > 0
      status: ok
      text:
        es: Debe permanecer positiva y coherente con la geometria efectiva.
        en: It must stay positive and consistent with effective geometry.
    model_validity_rules:
    - id: a_validity
      when: 'true'
      status: ok
      text:
        es: En conductores no uniformes conviene usar area efectiva y no solo nominal.
        en: For nonuniform conductors, effective rather than nominal area is preferred.
    graph_rules:
    - id: a_graph
      when: 'true'
      status: info
      text:
        es: A aparece como parametro de escala al comparar J entre disenos.
        en: A appears as a scale parameter when comparing J across designs.
    likely_errors:
    - id: a_warn
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: olvidar convertir mm^2 a m^2 antes de calcular J.'
        en: 'Common error: forgetting to convert mm^2 to m^2 before computing J.'
    next_step_rules:
    - id: a_next
      when: 'true'
      status: info
      text:
        es: Reporta siempre A junto con la unidad para evitar ambiguedad.
        en: Always report A with units to avoid ambiguity.
    physical_intuition:
    - id: area_de_seccion_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[area_de_seccion]] describe el estado dinámico.
        en: Intuitively, [[area_de_seccion]] describes the dynamic state.
    limiting_cases:
    - id: area_de_seccion_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[area_de_seccion]].
        en: Check limiting cases of [[area_de_seccion]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  velocidad_de_deriva:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de velocidad_de_deriva
      en: Result of velocidad_de_deriva
    summary_rules:
    - id: v_summary
      when: 'true'
      status: info
      text:
        es: v de deriva captura el movimiento neto promedio de portadores.
        en: Drift v captures average net carrier motion.
    physical_reading_rules:
    - id: v_physical
      when: 'true'
      status: info
      text:
        es: Puede ser pequena incluso cuando I macroscopica es apreciable.
        en: It can be small even when macroscopic I is significant.
    coherence_rules:
    - id: v_coherence
      when: 'true'
      status: ok
      text:
        es: Debe ser coherente con n, q y A al reconstruir I.
        en: It must be coherent with n, q, and A when reconstructing I.
    model_validity_rules:
    - id: v_validity
      when: 'true'
      status: ok
      text:
        es: Es una velocidad media efectiva, no la velocidad termica instantanea.
        en: It is an effective average velocity, not thermal instantaneous speed.
    graph_rules:
    - id: v_graph
      when: 'true'
      status: info
      text:
        es: En el modelo de portadores, v cambia linealmente la prediccion de I si n y A se mantienen.
        en: In carrier model, v linearly changes predicted I when n and A stay fixed.
    likely_errors:
    - id: v_warn
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_de_deriva]] con una lectura aislada es un error frecuente: Error frecuente: usar v de deriva
          y velocidad termica como si fueran equivalentes.'
        en: 'A common mistake is to interpret [[velocidad_de_deriva]] in isolation: Common error: treating drift velocity
          and thermal velocity as equivalent.'
    next_step_rules:
    - id: v_next
      when: 'true'
      status: info
      text:
        es: Explica siempre el significado fisico de v al presentar calculos microscopicos.
        en: Always explain physical meaning of v when presenting microscopic calculations.
    physical_intuition:
    - id: velocidad_de_deriva_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_deriva]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_deriva]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_deriva_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_deriva]].
        en: Check limiting cases of [[velocidad_de_deriva]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
