formulas:
- id: potencia_base
  equation: P = V * I
  title:
    es: Potencia electrica instantanea
    en: Instantaneous electric power
  latex: P = V I
  variables:
  - potencia_electrica
  - tension_electrica
  - corriente_electrica
  rearrangements: []
  category: definicion_operativa
  relation_type: algebraica
  physical_meaning:
    es: Relaciona tasa de transferencia de energia con diferencia de potencial y flujo de carga en el mismo elemento y en
      el mismo instante.
    en: Relates energy-transfer rate to potential difference and charge flow in the same element at the same instant.
  constraints:
    es:
    - V e I deben corresponder al mismo elemento.
    - Signo dependiente de la convencion de potencia absorbida o entregada.
    en:
    - V and I must correspond to the same element.
    - Sign depends on absorbed or delivered power convention.
  validity:
    es: Valida en DC y para analisis instantaneo en AC, siempre con convencion de signo consistente.
    en: Valid in DC and for instantaneous AC analysis with consistent sign convention.
  dimension_check: '[W] = [V][A]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - causalidad
  - disipacion
  - transferencia
  result_semantics:
    target: potencia_electrica
    behavior:
      es: Si aumenta V o I con la otra variable fija, aumenta el valor absoluto de P.
      en: If V or I increases with the other fixed, the absolute value of P increases.
    sign_rule:
      es: P mayor que 0 sugiere absorcion de energia bajo convencion pasiva; P menor que 0 sugiere entrega.
      en: P greater than 0 suggests energy absorption under passive convention; P less than 0 suggests delivery.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks:
    es:
    - Verificar coherencia entre medicion de V e I en el mismo elemento.
    - Revisar saturacion de sensores en picos de corriente.
    en:
    - Verify V and I are measured on the same element.
    - Check sensor saturation during current peaks.
  coherence_checks:
    es:
    - Contrastar P con potencia nominal y margen termico.
    - Confirmar orden de magnitud frente al contexto experimental.
    en:
    - Contrast P with rated power and thermal margin.
    - Confirm order of magnitude for the experimental context.
  graph_implications:
    es: En grafica P(t), el area bajo la curva en un intervalo representa energia neta transferida.
    en: In a P(t) graph, area under the curve over an interval is net transferred energy.
  pedagogical_triggers:
    es:
    - Diferenciar potencia y energia antes de sustituir valores.
    - Explicitar convencion de signo al interpretar resultados.
    en:
    - Distinguish power and energy before substituting values.
    - State sign convention explicitly when interpreting results.
- id: potencia_resistiva_corriente
  equation: P = I^2 * R
  title:
    es: Potencia resistiva en funcion de corriente
    en: Resistive power from current
  latex: P = I^2 R
  variables:
  - potencia_electrica
  - corriente_electrica
  - resistencia_electrica
  rearrangements: []
  category: derivada_ohmica
  relation_type: algebraica_no_lineal
  physical_meaning:
    es: Cuantifica disipacion por efecto Joule cuando la carga se modela como resistencia efectiva.
    en: Quantifies Joule dissipation when the load is modeled as an effective resistance.
  constraints:
    es:
    - Requiere comportamiento resistivo dominante.
    - R debe evaluarse al regimen termico de trabajo.
    en:
    - Requires dominant resistive behavior.
    - R must be evaluated at operating thermal regime.
  validity:
    es: Apropiada para elementos ohmicos o resistencia efectiva bien definida.
    en: Appropriate for ohmic elements or well-defined effective resistance.
  dimension_check: '[W] = [A]^2[ohm]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - modelos
  - ejemplos
  interpretation_tags:
  - joule
  - calentamiento
  - seguridad
  result_semantics:
    target: potencia_electrica
    behavior:
      es: A corriente doble y R fija, la potencia se cuadruplica.
      en: With doubled current and fixed R, power quadruples.
    sign_rule:
      es: Si R es positiva, el modelo produce P no negativa en disipacion resistiva ideal.
      en: If R is positive, the model yields non-negative P in ideal resistive dissipation.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks:
    es:
    - Verificar que la carga no sea predominantemente reactiva.
    - Confirmar que el aumento termico no altere R fuera del rango aceptado.
    en:
    - Verify the load is not predominantly reactive.
    - Confirm thermal rise does not shift R outside accepted range.
  coherence_checks:
    es:
    - Comparar con P igual a V por I usando mediciones independientes.
    - Revisar si la potencia supera placa nominal.
    en:
    - Compare with P equals V times I using independent measurements.
    - Check whether power exceeds nameplate rating.
  graph_implications:
    es: Curvas P(I) son parabolicas para R constante.
    en: P(I) curves are parabolic for constant R.
  pedagogical_triggers:
    es:
    - Advertir crecimiento cuadratico de P con I.
    - Relacionar resultado con riesgo de sobrecalentamiento.
    en:
    - Warn about quadratic growth of P with I.
    - Relate result to overheating risk.
- id: potencia_resistiva_tension
  equation: P = V^2 / R
  title:
    es: Potencia resistiva en funcion de tension
    en: Resistive power from voltage
  latex: P = V^2 / R
  variables:
  - potencia_electrica
  - tension_electrica
  - resistencia_electrica
  rearrangements: []
  category: derivada_ohmica
  relation_type: algebraica_no_lineal
  physical_meaning:
    es: Expresa la disipacion resistiva cuando se conoce la tension aplicada y la resistencia efectiva.
    en: Expresses resistive dissipation when applied voltage and effective resistance are known.
  constraints:
    es:
    - Requiere R mayor que 0 y comportamiento resistivo del elemento.
    - V debe corresponder al elemento donde se evalua R.
    en:
    - Requires R greater than 0 and resistive behavior.
    - V must correspond to the element where R is evaluated.
  validity:
    es: Util en diseno de resistencias y calefactores bajo condiciones cuasi estacionarias.
    en: Useful for resistor and heater design under quasi-steady conditions.
  dimension_check: '[W] = [V]^2/[ohm]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - modelos
  - aplicaciones
  interpretation_tags:
  - diseno
  - margen
  - eficiencia
  result_semantics:
    target: potencia_electrica
    behavior:
      es: A tension doble y R fija, la potencia se cuadruplica.
      en: With doubled voltage and fixed R, power quadruples.
    sign_rule:
      es: Con R positiva, la potencia disipada es no negativa.
      en: With positive R, dissipated power is non-negative.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks:
    es:
    - Revisar tolerancia de R y su deriva termica.
    - Confirmar que V sea valor eficaz si se trabaja con AC sinusoidal.
    en:
    - Check R tolerance and thermal drift.
    - Confirm V is RMS value for sinusoidal AC use.
  coherence_checks:
    es:
    - Verificar consistencia con medicion de corriente.
    - Contrastar con limites de aislamiento y temperatura.
    en:
    - Verify consistency with current measurement.
    - Contrast with insulation and temperature limits.
  graph_implications:
    es: Curvas P(V) son parabolicas para R constante.
    en: P(V) curves are parabolic for constant R.
  pedagogical_triggers:
    es:
    - Evitar extrapolar fuera del rango de validez termica.
    - Subrayar sensibilidad cuadratica ante variaciones de V.
    en:
    - Avoid extrapolating beyond thermal validity range.
    - Emphasize quadratic sensitivity to V variations.
- id: energia_desde_potencia
  equation: E = P * t
  title:
    es: Energia a partir de potencia constante
    en: Energy from constant power
  latex: E = P t
  variables:
  - energia_electrica
  - potencia_electrica
  - tiempo
  rearrangements: []
  category: acumulacion_temporal
  relation_type: algebraica
  physical_meaning:
    es: Convierte una tasa de transferencia energetica en energia acumulada durante un intervalo temporal.
    en: Converts an energy transfer rate into accumulated energy over a time interval.
  constraints:
    es:
    - Requiere P aproximadamente constante o interpretada como valor medio.
    - t debe expresarse en unidad consistente con SI para obtener E en joule.
    en:
    - Requires approximately constant P or an interpreted average value.
    - t must be in SI-consistent units to obtain E in joules.
  validity:
    es: Valida para intervalos donde la variacion de P sea despreciable o ya promediada.
    en: Valid over intervals where P variation is negligible or already averaged.
  dimension_check: '[J] = [W][s]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - consumo
  - costo
  - acumulacion
  result_semantics:
    target: energia_electrica
    behavior:
      es: A potencia fija, E crece linealmente con t.
      en: At fixed power, E grows linearly with t.
    sign_rule:
      es: El signo de E sigue el signo de P bajo convencion coherente.
      en: E sign follows P sign under a consistent convention.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks:
    es:
    - Convertir minutos u horas a segundos antes de calcular en SI.
    - Confirmar que P representa valor medio en el intervalo.
    en:
    - Convert minutes or hours to seconds before SI calculation.
    - Confirm P represents interval average value.
  coherence_checks:
    es:
    - Comparar E con lectura de contador energetico cuando sea posible.
    - Validar orden de magnitud frente a consumo esperado.
    en:
    - Compare E with meter readings when available.
    - Validate order of magnitude against expected consumption.
  graph_implications:
    es: Si P es constante, E(t) es una recta de pendiente P.
    en: If P is constant, E(t) is a straight line with slope P.
  pedagogical_triggers:
    es:
    - Diferenciar claramente W de Wh y J.
    - Interpretar energia como area bajo curva P(t).
    en:
    - Clearly distinguish W from Wh and J.
    - Interpret energy as area under the P(t) curve.
