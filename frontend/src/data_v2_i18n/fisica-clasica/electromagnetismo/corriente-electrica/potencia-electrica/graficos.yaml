version: "1.0"
leaf: "potencia-electrica"

coord:
  title:
    es: Gráfica Coord · Potencia Eléctrica
    en: Coord Graph · Electric Power
  xAxis:
    es: intensidad de corriente I (A)
    en: current intensity I (A)
  yAxis:
    es: potencia eléctrica P (W)
    en: electric power P (W)
  xMagnitude: I
  yMagnitude: P
  relation:
    es: "P = I²R: parábola cuadrática (para R constante). También P = IV = V²/R. La potencia es la rapidez de disipación de energía."
    en: "P = I²R: quadratic parabola (for constant R). Also P = IV = V²/R. Power is the rate of energy dissipation."
  physicalReading:
    es: "Parábola de apertura = R. A doble corriente: cuatro veces más potencia disipada. La energía disipada en tiempo t es E = Pt."
    en: "Parabola with opening R. Double current: four times more power dissipated. Energy dissipated in time t is E = Pt."
  slopeMeaning:
    es: "Pendiente dP/dI = 2IR: proporcional a I y a R."
    en: "Slope dP/dI = 2IR: proportional to I and R."
  interceptMeaning:
    es: "P(0) = 0: sin corriente no hay disipación."
    en: "P(0) = 0: no current means no dissipation."
  curvatureMeaning:
    es: "Parábola cuadrática: la potencia crece rápidamente con I."
    en: "Quadratic parabola: power grows rapidly with I."
  signMeaning:
    es: "P > 0: disipación de energía (resistencia). P puede ser negativa para generadores."
    en: "P > 0: energy dissipation (resistor). P can be negative for generators."
  areaMeaning:
    es: El área bajo P(t) = energía total disipada.
    en: Area under P(t) = total energy dissipated.
  domainMeaning:
    es: "I ≥ 0 para DC. Para AC: P_media = V_ef·I_ef·cos(φ) (potencia activa)."
    en: "I ≥ 0 for DC. For AC: P_avg = V_rms·I_rms·cos(φ) (active power)."
  modelConnection:
    es: Se interpreta bajo el modelo de disipación óhmica y la ley de Joule.
    en: "Interpreted under the ohmic dissipation model and Joule's law."
  formulaConnection:
    es: "Conecta con P = I²R = IV = V²/R, E = Pt, y para AC: P = V_ef·I_ef·cos(φ)."
    en: "Connects to P = I²R = IV = V²/R, E = Pt, and for AC: P = V_rms·I_rms·cos(φ)."
  readingFocus:
    es: leer P a una I dada y verificar la proporcionalidad cuadrática; calcular la energía como área.
    en: read P at a given I and verify quadratic proportionality; compute energy as area.
  agentHints:
    es:
      - "P = I²R: doblar I cuadruplica P."
      - "Energía E = P·t (en julios o kWh: 1 kWh = 3.6 MJ)."
      - "Para AC: usar valores eficaces (RMS) en la misma fórmula."
    en:
      - "P = I²R: doubling I quadruples P."
      - "Energy E = P·t (in joules or kWh: 1 kWh = 3.6 MJ)."
      - "For AC: use RMS values in the same formula."
  commonMistakes:
    es:
      - Pensar que P ∝ I (es P ∝ I²).
      - Olvidar que para AC se usan valores eficaces.
      - Confundir potencia (W) con energía (J).
    en:
      - Thinking P ∝ I (it is P ∝ I²).
      - Forgetting that for AC RMS values are used.
      - Confusing power (W) with energy (J).
