formulas:
- id: ley_ohm
  title:
    es: Ley de Ohm
    en: Ohm's Law
  equation: V = I * R
  latex: V = I R
  category: structural
  relation_type: constitutive_relation
  physical_meaning:
    es: Establece la proporcionalidad entre la tensión aplicada y la corriente resultante en elementos lineales.
    en: Establishes proportionality between applied voltage and resulting current in linear elements.
  constraints: Material óhmico y temperatura constante.
  validity:
    es: Válida en materiales conductores lineales y régimen estacionario.
    en: Valid in linear conducting materials and steady state.
  dimension_check: V = [A] * [ohm] = [V]
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - analisis_circuitos
  interpretation_tags:
  - linealidad
  - conduccion
  result_semantics:
    target: tension
    kind: magnitude
    sign_meaning:
      es: Sentido del potencial relativo.
      en: Sense of relative potential.
    absolute_value_meaning:
      es: Diferencia de potencial neta.
      en: Net potential difference.
  rearrangements:
  - target: intensidad
    latex: I = \frac{V}{R}
    equation: I = frac(V)(R)
  - target: resistencia
    latex: R = \frac{V}{I}
    equation: R = frac(V)(I)
  domain_checks:
  - es: Verificar si I supera el límite térmico del conductor.
    en: Check if I exceeds the conductor's thermal limit.
  coherence_checks:
  - es: V e I deben tener el mismo signo si R es pasiva.
    en: V and I must have the same sign if R is passive.
  graph_implications:
    es: Pendiente constante en plano V-I.
    en: Constant slope in V-I plane.
  pedagogical_triggers:
    es: ¿Qué sucede si duplicamos la tensión?
    en: What happens if we double the voltage?
- id: resistencia_geometrica
  title:
    es: Resistencia geométrica
    en: Geometric Resistance
  equation: R = rho * L / A
  latex: R = \frac{\rho L}{A}
  category: structural
  relation_type: constitutive_relation
  physical_meaning:
    es: Relaciona la oposición al flujo con la resistividad del material y sus dimensiones físicas.
    en: Relates opposition to flow with material resistivity and physical dimensions.
  constraints: Sección transversal uniforme y material homogéneo.
  validity:
    es: Válida para conductores de sección constante en DC.
    en: Valid for constant cross-section conductors in DC.
  dimension_check: '[ohm] = [ohm*m] * [m] / [m^2]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - diseño_cables
  interpretation_tags:
  - geometria
  - material
  result_semantics:
    target: resistencia
    kind: property
    sign_meaning:
      es: Siempre positiva para materiales reales.
      en: Always positive for real materials.
    absolute_value_meaning:
      es: Oposición total del objeto.
      en: Total opposition of the object.
  rearrangements:
  - target: rho
    latex: \rho = \frac{R A}{L}
    equation: rho = frac(R A)(L)
  - target: area
    latex: A = \frac{\rho L}{R}
    equation: A = frac(rho L)(R)
  - target: longitud
    latex: L = \frac{R A}{\rho}
    equation: L = frac(R A)(rho)
  domain_checks:
  - es: L y A deben ser mayores que cero.
    en: L and A must be greater than zero.
  coherence_checks:
  - es: R debe ser positiva.
    en: R must be positive.
  graph_implications:
    es: Relación lineal con L e inversa con A.
    en: Linear relationship with L and inverse with A.
  pedagogical_triggers:
    es: ¿Cómo influye el grosor del cable en la resistencia?
    en: How does cable thickness influence resistance?
- id: definicion_conductancia
  title:
    es: Conductancia
    en: Conductance
  equation: G = 1 / R
  latex: G = \frac{1}{R}
  category: structural
  relation_type: definition
  physical_meaning:
    es: Cuantifica la facilidad de paso de la corriente eléctrica.
    en: Quantifies the ease of passage of electric current.
  constraints: R distinto de cero.
  validity:
    es: Definición general para cualquier elemento resistivo.
    en: General definition for any resistive element.
  dimension_check: '[S] = 1 / [ohm]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - analisis_admitancias
  interpretation_tags:
  - facilidad
  - flujo
  result_semantics:
    target: conductancia
    kind: magnitude
    sign_meaning:
      es: Siempre positiva.
      en: Always positive.
    absolute_value_meaning:
      es: Facilidad neta de conducción.
      en: Net ease of conduction.
  rearrangements: []
  domain_checks:
  - es: G debe ser positiva.
    en: G must be positive.
  coherence_checks:
  - es: G y R son recíprocos.
    en: G and R are reciprocals.
  graph_implications:
    es: Pendiente en el gráfico I-V.
    en: Slope in the I-V graph.
  pedagogical_triggers:
    es: ¿Es más fácil o más difícil conducir cuando G es grande?
    en: Is it easier or harder to conduct when G is large?
