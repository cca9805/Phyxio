version: "1.0"
leaf: "resistencia-y-ley-de-ohm"

coord:
  title:
    es: Gráfica Coord · Resistencia y Ley de Ohm
    en: "Coord Graph · Resistance and Ohm's Law"
  xAxis:
    es: intensidad de corriente I (A)
    en: current intensity I (A)
  yAxis:
    es: tensión V (V)
    en: voltage V (V)
  xMagnitude: I
  yMagnitude: V
  relation:
    es: "V = IR: relación lineal de pendiente R (Ω). La resistencia R = ρL/A depende del material (ρ), la longitud (L) y la sección (A)."
    en: "V = IR: linear relationship with slope R (Ω). Resistance R = ρL/A depends on material (ρ), length (L), and cross-section (A)."
  physicalReading:
    es: Recta de pendiente R. Mayor pendiente → mayor resistencia. La recta pasa por el origen para conductores ideales.
    en: Line with slope R. Larger slope → larger resistance. The line passes through the origin for ideal conductors.
  slopeMeaning:
    es: "Pendiente = R (Ω): resistencia del conductor. Medible como el cociente V/I."
    en: "Slope = R (Ω): resistance of the conductor. Measurable as V/I ratio."
  interceptMeaning:
    es: "V(0) = 0: sin corriente no hay caída de tensión en el conductor."
    en: "V(0) = 0: no current means no voltage drop in the conductor."
  curvatureMeaning:
    es: Lineal para conductores óhmicos. La pendiente aumenta con la temperatura (R aumenta).
    en: Linear for ohmic conductors. Slope increases with temperature (R increases).
  signMeaning:
    es: "V > 0 en el sentido de la caída de tensión. V < 0: el elemento genera tensión (generador)."
    en: "V > 0 in the direction of voltage drop. V < 0: element generates voltage (generator)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido en el rango óhmico. R aumenta con la temperatura en metales.
    en: Valid in the ohmic range. R increases with temperature in metals.
  modelConnection:
    es: Se interpreta bajo la ley de Ohm y el modelo de resistividad del conductor.
    en: "Interpreted under Ohm's law and the conductor resistivity model."
  formulaConnection:
    es: Conecta con V = IR, R = ρL/A, P = V²/R, y las leyes de Kirchhoff.
    en: "Connects to V = IR, R = ρL/A, P = V²/R, and Kirchhoff's laws."
  readingFocus:
    es: leer la pendiente R = V/I y verificar la linealidad del conductor.
    en: read the slope R = V/I and verify the linearity of the conductor.
  agentHints:
    es:
      - "Pendiente = R: medir con voltímetro/amperímetro."
      - "R aumenta con T en metales: R(T) = R₀(1 + αΔT)."
      - La conductancia G = 1/R = I/V.
    en:
      - "Slope = R: measure with voltmeter/ammeter."
      - "R increases with T in metals: R(T) = R₀(1 + αΔT)."
      - Conductance G = 1/R = I/V.
  commonMistakes:
    es:
      - Pensar que la ley de Ohm es universal (no se aplica a diodos).
      - Confundir R = V/I (pendiente) con dV/dI (resistencia dinámica).
      - Olvidar la dependencia de R con la temperatura.
    en:
      - "Thinking Ohm's law is universal (does not apply to diodes)."
      - Confusing R = V/I (slope) with dV/dI (dynamic resistance).
      - "Forgetting R's dependence on temperature."
