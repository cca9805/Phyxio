version: "1.0"
leaf: "ecuacion-de-onda-electromagnetica"

coord:
  title:
    es: Gráfica Coord · Ecuación de Onda EM
    en: Coord Graph · Electromagnetic Wave Equation
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: campo E (V/m) o B (T)
    en: field E (V/m) or B (T)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "E(x,t) = E₀sin(kx − ωt). Onda transversal: E ⊥ B ⊥ k. Velocidad c = λf = ω/k = 1/√(ε₀μ₀)."
    en: "E(x,t) = E₀sin(kx − ωt). Transverse wave: E ⊥ B ⊥ k. Speed c = λf = ω/k = 1/√(ε₀μ₀)."
  physicalReading:
    es: Onda sinusoidal de amplitud E₀, longitud de onda λ = 2π/k, periodo T = 2π/ω.
    en: Sinusoidal wave of amplitude E₀, wavelength λ = 2π/k, period T = 2π/ω.
  slopeMeaning:
    es: La pendiente ∂E/∂x = E₀k·cos(kx−ωt). Relacionada con ∂B/∂t por las ecuaciones de Maxwell.
    en: "Slope ∂E/∂x = E₀k·cos(kx−ωt). Related to ∂B/∂t by Maxwell's equations."
  interceptMeaning:
    es: Amplitud E₀ en x = 0, t = 0 si la fase inicial es π/2.
    en: Amplitude E₀ at x = 0, t = 0 if initial phase is π/2.
  curvatureMeaning:
    es: "Onda plana: curvatura sinusoidal constante."
    en: "Plane wave: constant sinusoidal curvature."
  signMeaning:
    es: "E cambia de signo: el campo oscila simétricamente respecto a cero."
    en: "E changes sign: the field oscillates symmetrically about zero."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para ondas planas en medios homogéneos. c ≈ 3×10⁸ m/s en el vacío.
    en: Valid for plane waves in homogeneous media. c ≈ 3×10⁸ m/s in vacuum.
  modelConnection:
    es: Solución de las ecuaciones de Maxwell en el vacío.
    en: "Solution of Maxwell's equations in vacuum."
  formulaConnection:
    es: Conecta con E = E₀sin(kx−ωt), B = B₀sin(kx−ωt), c = E/B, y S = E×H (Poynting).
    en: Connects to E = E₀sin(kx−ωt), B = B₀sin(kx−ωt), c = E/B, and S = E×H (Poynting).
  readingFocus:
    es: leer amplitud E₀, longitud de onda λ y periodo T; verificar c = λ/T.
    en: read amplitude E₀, wavelength λ and period T; verify c = λ/T.
  agentHints:
    es:
      - E₀/B₀ = c.
      - c = 1/√(ε₀μ₀) ≈ 3×10⁸ m/s.
      - Irradiancia I = ε₀cE₀²/2 = S_media.
    en:
      - E₀/B₀ = c.
      - c = 1/√(ε₀μ₀) ≈ 3×10⁸ m/s.
      - Irradiance I = ε₀cE₀²/2 = S_avg.
  commonMistakes:
    es:
      - Pensar que la velocidad de la onda EM depende del medio (c = c₀/n en medios).
      - Olvidar que E y B están en fase para ondas planas.
      - Confundir amplitud con irradiancia.
    en:
      - Thinking EM wave speed is independent of the medium (c = c₀/n in media).
      - Forgetting that E and B are in phase for plane waves.
      - Confusing amplitude with irradiance.

svg:
  title:
    es: Escena SVG · Onda Electromagnética
    en: SVG Scene · Electromagnetic Wave
  sceneId: em_wave
  sceneLabel:
    es: Propagación de una onda EM plana
    en: Propagation of a plane EM wave
  objects:
    es:
      - vector E
      - vector B
      - dirección de propagación k
      - frente de onda
    en:
      - vector E
      - vector B
      - propagation direction k
      - wavefront
  mainObject:
    es: onda electromagnética plana
    en: plane electromagnetic wave
  referenceFrame:
    es: sistema de coordenadas 3D (x, y, z)
    en: 3D coordinate system (x, y, z)
  geometry:
    es: E ⊥ B ⊥ k. La onda se propaga en la dirección k = E×B.
    en: E ⊥ B ⊥ k. The wave propagates in the direction k = E×B.
  interactions:
    es: "Las ecuaciones de Maxwell acoplan E y B: ∂E/∂t genera B y viceversa."
    en: "Maxwell's equations couple E and B: ∂E/∂t generates B and vice versa."
  modelElements:
    es:
      - campo E oscilante
      - campo B perpendicular
      - vector de Poynting S = E×H
    en:
      - oscillating E field
      - perpendicular B field
      - Poynting vector S = E×H
  visualCues:
    es:
      - E y B son perpendiculares entre sí y a k.
      - E₀/B₀ = c.
      - S apunta en la dirección de propagación.
    en:
      - E and B are perpendicular to each other and to k.
      - E₀/B₀ = c.
      - S points in the propagation direction.
  scaleMeaning:
    es: Las amplitudes son proporcionales a E₀ y B₀ = E₀/c.
    en: Amplitudes are proportional to E₀ and B₀ = E₀/c.
  relation:
    es: E ⊥ B ⊥ k. c = E₀/B₀.
    en: E ⊥ B ⊥ k. c = E₀/B₀.
  physicalReading:
    es: Visualizar la orientación relativa de E, B y k para comprender la polarización y la propagación.
    en: Visualise the relative orientation of E, B, and k to understand polarisation and propagation.
  modelConnection:
    es: Ecuaciones de Maxwell en el vacío.
    en: "Maxwell's equations in vacuum."
  formulaConnection:
    es: Conecta con E = cB, S = (1/μ₀)E×B, I = S_media = ε₀cE₀²/2.
    en: Connects to E = cB, S = (1/μ₀)E×B, I = S_avg = ε₀cE₀²/2.
  readingFocus:
    es: identificar la dirección de E, B y k y verificar que son mutuamente perpendiculares.
    en: identify the direction of E, B, and k and verify they are mutually perpendicular.
  agentHints:
    es:
      - k = dirección de propagación = E×B.
      - La polarización es la dirección de E.
      - I = ε₀cE₀²/2.
    en:
      - k = propagation direction = E×B.
      - Polarisation is the direction of E.
      - I = ε₀cE₀²/2.
  commonMistakes:
    es:
      - Pensar que E y B están en cuadratura de fase (están en fase).
      - Confundir la dirección de S con la de E.
      - Olvidar E₀/B₀ = c.
    en:
      - Thinking E and B are in phase quadrature (they are in phase).
      - Confusing the direction of S with E.
      - Forgetting E₀/B₀ = c.
