version: "1.0"
leaf: "formulacion-diferencial"

coord:
  title:
    es: Gráfica Coord · Formulación Diferencial de Maxwell
    en: "Coord Graph · Maxwell's Differential Formulation"
  xAxis:
    es: coordenada espacial x (m)
    en: spatial coordinate x (m)
  yAxis:
    es: campo E (V/m) o B (T)
    en: field E (V/m) or B (T)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "Ecuaciones de Maxwell diferenciales: ∇·E = ρ/ε₀, ∇·B = 0, ∇×E = −∂B/∂t, ∇×B = μ₀J + μ₀ε₀∂E/∂t. Relaciones locales punto a punto."
    en: "Maxwell's differential equations: ∇·E = ρ/ε₀, ∇·B = 0, ∇×E = −∂B/∂t, ∇×B = μ₀J + μ₀ε₀∂E/∂t. Local point-by-point relations."
  physicalReading:
    es: La formulación diferencial relaciona las fuentes locales (ρ, J) con los campos locales (E, B) en cada punto del espacio.
    en: The differential formulation relates local sources (ρ, J) with local fields (E, B) at each point in space.
  slopeMeaning:
    es: La pendiente ∂E/∂x es proporcional a −∂B/∂t (ley de Faraday diferencial).
    en: "Slope ∂E/∂x is proportional to −∂B/∂t (differential Faraday's law)."
  interceptMeaning:
    es: El valor en x = 0 depende de las condiciones de contorno.
    en: Value at x = 0 depends on boundary conditions.
  curvatureMeaning:
    es: "La curvatura ∂²E/∂x² aparece en la ecuación de onda: ∂²E/∂x² = μ₀ε₀∂²E/∂t²."
    en: "Curvature ∂²E/∂x² appears in the wave equation: ∂²E/∂x² = μ₀ε₀∂²E/∂t²."
  signMeaning:
    es: El signo de ∇·E indica la presencia y signo de cargas fuente.
    en: The sign of ∇·E indicates the presence and sign of source charges.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido en medios continuos. Condiciones de contorno en interfaces.
    en: Valid in continuous media. Boundary conditions at interfaces.
  modelConnection:
    es: Formulación diferencial de las ecuaciones de Maxwell.
    en: "Differential formulation of Maxwell's equations."
  formulaConnection:
    es: Conecta con ∇·E = ρ/ε₀, ∇×B = μ₀J + μ₀ε₀∂E/∂t, y la ecuación de onda EM.
    en: Connects to ∇·E = ρ/ε₀, ∇×B = μ₀J + μ₀ε₀∂E/∂t, and the EM wave equation.
  readingFocus:
    es: leer las derivadas parciales de los campos para identificar la presencia de fuentes o la propagación de ondas.
    en: read the partial derivatives of the fields to identify the presence of sources or wave propagation.
  agentHints:
    es:
      - "∇·B = 0: no existen monopolos magnéticos."
      - La corriente de desplazamiento μ₀ε₀∂E/∂t predice las ondas EM.
      - "En el vacío sin fuentes: ∇²E = μ₀ε₀∂²E/∂t²."
    en:
      - "∇·B = 0: no magnetic monopoles exist."
      - Displacement current μ₀ε₀∂E/∂t predicts EM waves.
      - "In vacuum without sources: ∇²E = μ₀ε₀∂²E/∂t²."
  commonMistakes:
    es:
      - Confundir la forma diferencial con la integral de Maxwell.
      - Olvidar la corriente de desplazamiento en la ley de Ampère-Maxwell.
      - No aplicar las condiciones de contorno en interfaces.
    en:
      - "Confusing the differential form with Maxwell's integral form."
      - Forgetting the displacement current in Ampère-Maxwell law.
      - Not applying boundary conditions at interfaces.
