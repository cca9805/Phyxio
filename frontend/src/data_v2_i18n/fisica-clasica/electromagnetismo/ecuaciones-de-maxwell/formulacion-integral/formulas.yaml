version: 1
ui:
  default_formula: gauss_e
formulas:
- id: gauss_e
  title:
    es: Ley de Gauss para la electricidad
    en: Gauss's Law for electricity
  equation: \Phi_E = q_enc / epsilon0
  latex: \Phi_E = \frac{q_{enc}}{\epsilon_0}
  category: fundamental
  relation_type: balance
  physical_meaning:
    es: Relaciona el flujo eléctrico neto a través de una superficie cerrada con la carga total encerrada en su interior.
    en: Relates the net electric flux through a closed surface to the total enclosed charge inside.
  constraints:
  - vacío
  - superficie cerrada
  validity:
    es: Válida para cualquier superficie cerrada en el vacío.
    en: Valid for any closed surface in vacuum.
  dimension_check: V·m = C / (F/m)
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - fuente
  - flujo
  - electrostática
  result_semantics:
    target: flujo_electrico
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks: []
  coherence_checks: []
  graph_implications:
  - líneas salientes
  pedagogical_triggers:
  - ¿Qué indica un flujo positivo?
  - ¿Cómo se relaciona con la carga encerrada?
  rearrangements:
  - id: q_enc_from_gauss
    target: q_enc
    equation: q_enc = \Phi_E * epsilon0
    latex: q_{enc} = \Phi_E * \epsilon_0
- id: gauss_b
  title:
    es: Ley de Gauss para el magnetismo
    en: Gauss's Law for magnetism
  equation: \Phi_B = 0
  latex: \Phi_B = 0
  category: fundamental
  relation_type: restricción
  physical_meaning:
    es: Establece que el flujo magnético neto en una superficie cerrada es siempre cero; no existen monopolos magnéticos.
    en: Establishes that net magnetic flux on a closed surface is always zero; magnetic monopoles do not exist.
  constraints:
  - universal
  - superficie cerrada
  validity:
    es: Válida universalmente según el modelo clásico.
    en: Universally valid according to the classical model.
  dimension_check: Wb = 0
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - restricción
  - flujo
  - no-monopolos
  result_semantics:
    target: flujo_magnetico
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks: []
  coherence_checks: []
  graph_implications:
  - líneas cerradas
  pedagogical_triggers:
  - ¿Por qué el flujo es siempre cero?
  - ¿Qué implica sobre las fuentes del magnetismo?
  rearrangements: []
- id: faraday
  title:
    es: Ley de Faraday-Lenz
    en: Faraday-Lenz Law
  equation: emf = -d\Phi_B/dt
  latex: E_{emf} = -\frac{d\Phi_B}{dt}
  category: fundamental
  relation_type: inducción
  physical_meaning:
    es: Un flujo magnético que varía en el tiempo genera una fuerza electromotriz inducida en un camino cerrado.
    en: A time-varying magnetic flux generates an induced electromotive force in a closed path.
  constraints:
  - vacío
  - camino cerrado
  validity:
    es: Base de la inducción electromagnética.
    en: Basis of electromagnetic induction.
  dimension_check: V = Wb/s
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - inducción
  - dinámica
  - lenz
  result_semantics:
    target: emf
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks: []
  coherence_checks: []
  graph_implications:
  - circulación eléctrica
  pedagogical_triggers:
  - ¿Qué significa el signo negativo?
  - ¿Cómo se genera energía inalámbrica?
  rearrangements: []
- id: ampere_maxwell
  title:
    es: Ley de Ampère-Maxwell
    en: Ampère-Maxwell Law
  equation: \oint \mathbf{B}* d\mathbf{l} = mu0 * (I_{enc} + epsilon0 * d\Phi_E/dt)
  latex: \oint \mathbf{B}* d\mathbf{l} = \mu_0 ( I_{enc} + \epsilon_0 \frac{d\Phi_E}{dt} )
  category: fundamental
  relation_type: generación
  physical_meaning:
    es: La circulación magnética es generada por corrientes reales y por la variación temporal del flujo eléctrico.
    en: Magnetic circulation is generated by real currents and by the time variation of electric flux.
  constraints:
  - vacío
  - camino cerrado
  validity:
    es: Incluye el término de Maxwell para la propagación de ondas.
    en: Includes Maxwell's term for wave propagation.
  dimension_check: T·m = (H/m) * (A + (F/m)*(V·m/s))
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - corrientes
  - desplazamiento
  - dinámica
  result_semantics:
    target: circulacion_magnetica
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  domain_checks: []
  coherence_checks: []
  graph_implications:
  - circulación magnética
  pedagogical_triggers:
