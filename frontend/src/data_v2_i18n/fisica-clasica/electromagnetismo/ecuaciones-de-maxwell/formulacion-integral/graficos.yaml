version: "1.0"
leaf: "formulacion-integral"

coord:
  title:
    es: Gráfica Coord · Formulación Integral de Maxwell
    en: "Coord Graph · Maxwell's Integral Formulation"
  xAxis:
    es: parámetro de integración (área, longitud, tiempo)
    en: integration parameter (area, length, time)
  yAxis:
    es: flujo Φ (Wb) o circulación ∮E·dl (V)
    en: flux Φ (Wb) or circulation ∮E·dl (V)
  xMagnitude: t
  yMagnitude: Phi
  relation:
    es: "Gauss E: ∮E·dA = Q_enc/ε₀. Gauss B: ∮B·dA = 0. Faraday: ∮E·dl = −dΦ_B/dt. Ampère-Maxwell: ∮B·dl = μ₀(I + ε₀dΦ_E/dt)."
    en: "Gauss E: ∮E·dA = Q_enc/ε₀. Gauss B: ∮B·dA = 0. Faraday: ∮E·dl = −dΦ_B/dt. Ampère-Maxwell: ∮B·dl = μ₀(I + ε₀dΦ_E/dt)."
  physicalReading:
    es: Las formas integrales relacionan valores globales del campo con fuentes globales encerradas en superficies o circuitos.
    en: The integral forms relate global field values with global sources enclosed within surfaces or circuits.
  slopeMeaning:
    es: La pendiente dΦ_B/dt determina la FEM inducida por la ley de Faraday.
    en: "Slope dΦ_B/dt determines the induced EMF by Faraday's law."
  interceptMeaning:
    es: Φ(0) = 0 si no hay flujo inicial.
    en: Φ(0) = 0 if there is no initial flux.
  curvatureMeaning:
    es: La variación temporal de Φ se relaciona con el campo E circulante.
    en: Temporal variation of Φ is related to the circulating E field.
  signMeaning:
    es: El signo de ∮E·dl determina el sentido de la corriente inducida (ley de Lenz).
    en: "The sign of ∮E·dl determines the direction of the induced current (Lenz's law)."
  areaMeaning:
    es: Sin interpretación directa general.
    en: No general direct interpretation.
  domainMeaning:
    es: Válido para superficies y contornos cerrados arbitrarios.
    en: Valid for arbitrary closed surfaces and contours.
  modelConnection:
    es: Formulación integral de las ecuaciones de Maxwell.
    en: "Integral formulation of Maxwell's equations."
  formulaConnection:
    es: Conecta con las cuatro ecuaciones de Maxwell en forma integral.
    en: "Connects to the four Maxwell's equations in integral form."
  readingFocus:
    es: leer el flujo Φ_B y su variación temporal para calcular la FEM inducida.
    en: read the flux Φ_B and its temporal variation to compute the induced EMF.
  agentHints:
    es:
      - La ley de Gauss permite calcular E para distribuciones de alta simetría.
      - "Faraday: FEM = −dΦ_B/dt."
      - "Ampère-Maxwell: incluye la corriente de desplazamiento."
    en:
      - "Gauss's law allows computing E for high-symmetry distributions."
      - "Faraday: EMF = −dΦ_B/dt."
      - "Ampère-Maxwell: includes displacement current."
  commonMistakes:
    es:
      - Aplicar la ley de Gauss sin verificar la simetría.
      - Olvidar el signo negativo en la ley de Faraday.
      - No incluir la corriente de desplazamiento en Ampère-Maxwell.
    en:
      - "Applying Gauss's law without verifying symmetry."
      - "Forgetting the negative sign in Faraday's law."
      - Not including displacement current in Ampère-Maxwell.
