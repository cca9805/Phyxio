version: "1.0"
leaf: "interpretacion-fisica"

coord:
  title:
    es: Gráfica Coord · Interpretación Física de Maxwell
    en: Coord Graph · Physical Interpretation of Maxwell
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: campo E (V/m) o B (T)
    en: field E (V/m) or B (T)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: Las ecuaciones de Maxwell unificaron la electricidad, el magnetismo y la óptica. Predicen ondas EM a velocidad c = 1/√(ε₀μ₀) ≈ 3×10⁸ m/s.
    en: "Maxwell's equations unified electricity, magnetism, and optics. They predict EM waves at speed c = 1/√(ε₀μ₀) ≈ 3×10⁸ m/s."
  physicalReading:
    es: "La interpretación física conecta cada ecuación con un fenómeno: Gauss ↔ cargas, Faraday ↔ inducción, Ampère-Maxwell ↔ corrientes y ondas."
    en: "Physical interpretation connects each equation with a phenomenon: Gauss ↔ charges, Faraday ↔ induction, Ampère-Maxwell ↔ currents and waves."
  slopeMeaning:
    es: La variación espacial de E genera B variante en el tiempo y viceversa.
    en: Spatial variation of E generates time-varying B and vice versa.
  interceptMeaning:
    es: Los valores de campo en los bordes determinan las condiciones de contorno.
    en: Field values at the boundaries determine the boundary conditions.
  curvatureMeaning:
    es: La curvatura del campo refleja la presencia de fuentes o la propagación ondulatoria.
    en: Field curvature reflects the presence of sources or wave propagation.
  signMeaning:
    es: El signo del campo determina la dirección de las fuerzas sobre las cargas.
    en: Field sign determines the direction of forces on charges.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido en el régimen clásico (no cuántico). c = 1/√(ε₀μ₀) en el vacío.
    en: Valid in the classical (non-quantum) regime. c = 1/√(ε₀μ₀) in vacuum.
  modelConnection:
    es: Interpretación física de las cuatro ecuaciones de Maxwell.
    en: "Physical interpretation of the four Maxwell's equations."
  formulaConnection:
    es: Conecta con las cuatro ecuaciones de Maxwell y la fuerza de Lorentz.
    en: "Connects to the four Maxwell's equations and the Lorentz force."
  readingFocus:
    es: identificar qué ley de Maxwell aplica a cada fenómeno y extraer la relación campo-fuente.
    en: identify which Maxwell law applies to each phenomenon and extract the field-source relation.
  agentHints:
    es:
      - "Gauss E: simetría → E simple. Gauss B: no monopolos."
      - "Faraday: variación de Φ_B → FEM. Ampère-Maxwell: corriente + desplazamiento → B."
      - "c = 1/√(ε₀μ₀): predicción brillante de Maxwell."
    en:
      - "Gauss E: symmetry → simple E. Gauss B: no monopoles."
      - "Faraday: variation of Φ_B → EMF. Ampère-Maxwell: current + displacement → B."
      - "c = 1/√(ε₀μ₀): Maxwell's brilliant prediction."
  commonMistakes:
    es:
      - Olvidar la corriente de desplazamiento.
      - Aplicar Gauss sin simetría.
      - No relacionar c = 1/√(ε₀μ₀) con la velocidad de la luz.
    en:
      - Forgetting the displacement current.
      - Applying Gauss without symmetry.
      - Not relating c = 1/√(ε₀μ₀) to the speed of light.

svg:
  title:
    es: Escena SVG · Interpretación Física de Maxwell
    en: SVG Scene · Physical Interpretation of Maxwell
  sceneId: maxwell_interpretation
  sceneLabel:
    es: Visualización de las ecuaciones de Maxwell
    en: "Visualisation of Maxwell's equations"
  objects:
    es:
      - líneas de campo E
      - líneas de campo B
      - fuentes ρ y J
      - onda EM
    en:
      - E field lines
      - B field lines
      - sources ρ and J
      - EM wave
  mainObject:
    es: campo electromagnético
    en: electromagnetic field
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Las líneas de E salen de cargas +; las de B son cerradas. Una onda EM tiene E ⊥ B ⊥ k.
    en: E lines originate from + charges; B lines are closed. An EM wave has E ⊥ B ⊥ k.
  interactions:
    es: "Gauss: divergencia de E/B. Faraday/Ampère: rotacional de E/B."
    en: "Gauss: divergence of E/B. Faraday/Ampère: curl of E/B."
  modelElements:
    es:
      - ∇·E = ρ/ε₀
      - ∇·B = 0
      - ∇×E = −∂B/∂t
      - ∇×B = μ₀J + μ₀ε₀∂E/∂t
    en:
      - ∇·E = ρ/ε₀
      - ∇·B = 0
      - ∇×E = −∂B/∂t
      - ∇×B = μ₀J + μ₀ε₀∂E/∂t
  visualCues:
    es:
      - "Líneas de E: terminan en cargas −."
      - "Líneas de B: siempre cerradas."
      - "Onda EM: E ⊥ B ⊥ dirección de propagación."
    en:
      - "E lines: end at − charges."
      - "B lines: always closed."
      - "EM wave: E ⊥ B ⊥ propagation direction."
  scaleMeaning:
    es: La densidad de líneas de campo es proporcional a la intensidad del campo.
    en: Field line density is proportional to field intensity.
  relation:
    es: "Cuatro ecuaciones de Maxwell: Gauss (×2), Faraday, Ampère-Maxwell."
    en: "Four Maxwell equations: Gauss (×2), Faraday, Ampère-Maxwell."
  physicalReading:
    es: Identificar la ecuación de Maxwell que describe cada configuración visual.
    en: Identify the Maxwell equation describing each visual configuration.
  modelConnection:
    es: Teoría electromagnética clásica de Maxwell.
    en: "Maxwell's classical electromagnetic theory."
  formulaConnection:
    es: Conecta con las cuatro ecuaciones de Maxwell en forma diferencial e integral.
    en: "Connects to the four Maxwell's equations in differential and integral form."
  readingFocus:
    es: identificar las fuentes (ρ, J) y el tipo de campo (con/sin divergencia o rotacional).
    en: identify the sources (ρ, J) and the field type (with/without divergence or curl).
  agentHints:
    es:
      - "E con divergencia: hay cargas. B sin divergencia: no hay monopolos."
      - "E con rotacional: hay B variable. B con rotacional: hay corriente o E variable."
      - Las ondas EM se propagan sin fuentes.
    en:
      - "E with divergence: charges present. B with zero divergence: no monopoles."
      - "E with curl: time-varying B present. B with curl: current or time-varying E present."
      - EM waves propagate without sources.
  commonMistakes:
    es:
      - Olvidar que las líneas de B son siempre cerradas.
      - Confundir la fuente de E (cargas) con la de B (corrientes).
      - Olvidar la corriente de desplazamiento.
    en:
      - Forgetting that B lines are always closed.
      - Confusing the source of E (charges) with B (currents).
      - Forgetting the displacement current.
