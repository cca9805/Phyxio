    - id: E_phys
      when: always
      status: info
      text:
        es: Representa la perturbación del espacio que interactúa con la polaridad de la materia.
        en: Represents the space disturbance interacting with matter polarity.
    coherence_rules:
    - id: E_coh
      when: always
      status: ok
      text:
        es: Acoplado ortogonalmente a [[B]] en propagación libre.
