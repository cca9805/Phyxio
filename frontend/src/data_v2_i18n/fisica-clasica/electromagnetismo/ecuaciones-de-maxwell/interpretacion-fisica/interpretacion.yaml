      text:
        es: La permeabilidad [[mu0]] describe la elasticidad magnética del vacío.
        en: Permeability [[mu0]] describes the magnetic elasticity of vacuum.
    physical_reading_rules:
    - id: mu0_phys
      when: always
      status: info
      text:
        es: Capacidad del vacío para sostener y propagar flujos magnéticos.
        en: Capacity of vacuum to sustain and propagate magnetic fluxes.
    coherence_rules:
