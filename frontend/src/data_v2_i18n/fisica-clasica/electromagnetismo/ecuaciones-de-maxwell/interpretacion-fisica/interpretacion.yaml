targets:
  velocidad_de_la_luz_en_el_vacio:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de velocidad_de_la_luz_en_el_vacio
      en: Result of velocidad_de_la_luz_en_el_vacio
    summary_rules:
    - id: c_sum
      when: always
      status: info
      text:
        es: La velocidad de la luz [[c]] indica la constante de acoplamiento fundamental y el límite de velocidad del universo.
        en: The speed of light [[c]] indicates the fundamental coupling constant and the speed limit of the universe.
    physical_reading_rules:
    - id: c_phys
      when: always
      status: info
      text:
        es: Este valor significa que la información no puede viajar instantáneamente porque surge de las propiedades elásticas
          intrínsecas del vacío ([[epsilon0]] y [[mu0]]).
        en: This value means that information cannot travel instantaneously because it arises from the intrinsic elastic properties
          of vacuum ([[epsilon0]] and [[mu0]]).
    coherence_rules:
    - id: c_coh
      when: always
      status: ok
      text:
        es: Invariante en todos los marcos de referencia inerciales según la relatividad.
        en: Invariant in all inertial reference frames according to relativity.
    model_validity_rules:
    - id: c_val
      when: always
      status: ok
      text:
        es: Válido universalmente para el vacío; asume que el medio es lineal y no dispersivo para mantener [[c]] constante.
        en: Universally valid for vacuum; assumes the medium is linear and non-dispersive to keep [[c]] constant.
    graph_rules:
    - id: c_graph
      when: always
      status: info
      text:
        es: Se visualiza como la pendiente del cono de luz en diagramas espacio-temporales.
        en: It is visualized as the slope of the light cone in space-time diagrams.
    likely_errors:
    - id: c_err
      when: always
      status: warning
      text:
        es: Confundir la velocidad en medios materiales con la constante universal [[c]] al olvidar el índice de refracción.
        en: Confusing the speed in material media with the universal constant [[c]] by forgetting the refractive index.
    next_step_rules:
    - id: c_next
      when: always
      status: info
      text:
        es: Usar [[c]] para convertir distancias astronómicas en tiempos de viaje.
        en: Use [[c]] to convert astronomical distances into travel times.
    physical_intuition:
    - id: velocidad_de_la_luz_en_el_vacio_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_la_luz_en_el_vacio]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_la_luz_en_el_vacio]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_la_luz_en_el_vacio_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_la_luz_en_el_vacio]].
        en: Check limiting cases of [[velocidad_de_la_luz_en_el_vacio]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  epsilon0:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de epsilon0
      en: Result of epsilon0
    summary_rules:
    - id: epsilon0_sum
      when: always
      status: info
      text:
        es: La permitividad [[epsilon0]] describe la elasticidad eléctrica del vacío.
        en: Permittivity [[epsilon0]] describes the electric elasticity of vacuum.
    physical_reading_rules:
    - id: epsilon0_phys
      when: always
      status: info
      text:
        es: Facilidad con la que el vacío permite la formación de líneas de campo eléctrico.
        en: Ease with which vacuum allows the formation of electric field lines.
    coherence_rules:
    - id: epsilon0_coh
      when: always
      status: ok
      text:
        es: Define la velocidad de propagación junto con [[mu0]].
        en: Defines the propagation speed together with [[mu0]].
    model_validity_rules:
    - id: epsilon0_val
      when: always
      status: ok
      text:
        es: Constante fundamental en el SI.
        en: Fundamental constant in SI.
    graph_rules:
    - id: epsilon0_graph
      when: always
      status: info
      text:
        es: Factor de escala en la densidad de líneas de campo.
        en: Scaling factor in field line density.
    likely_errors:
    - id: epsilon0_err
      when: always
      status: warning
      text:
        es: Utilizarla para calcular campos en medios materiales sin considerar la permitividad relativa.
        en: Using it to calculate fields in material media without considering relative permittivity.
    next_step_rules:
    - id: epsilon0_next
      when: always
      status: info
      text:
