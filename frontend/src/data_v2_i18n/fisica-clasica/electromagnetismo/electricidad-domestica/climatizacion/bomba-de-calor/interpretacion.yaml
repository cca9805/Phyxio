    - id: q_ambiente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_ambiente]] describe el estado dinámico.
        en: Intuitively, [[q_ambiente]] describes the dynamic state.
    limiting_cases:
