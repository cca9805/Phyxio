    magnitude_type: scalar
    semantic_role:
      es: Resultado de q_ambiente
      en: Result of q_ambiente
    summary_rules:
    - id: calor_gratis
      when: 'true'
      status: success
      text:
        es: El [[q_ambiente]] es la energía capturada del entorno. Significa el componente renovable y gratuito del sistema.
        en: The [[q_ambiente]] is the energy captured from the environment. It means the renewable and free component of the
