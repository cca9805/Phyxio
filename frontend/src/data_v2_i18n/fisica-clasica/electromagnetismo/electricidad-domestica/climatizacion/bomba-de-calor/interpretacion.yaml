  ahorro:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de ahorro
      en: Result of ahorro
    summary_rules:
    - id: ahorro_efecto
      when: 'true'
      status: success
      text:
        es: El [[ahorro]] indica la reducción de consumo frente a sistemas convencionales. Es coherente con un [[cop]] > 1.
        en: The [[ahorro]] indicates the reduction in consumption compared to conventional systems. It is coherent with a
          [[cop]] > 1.
    physical_reading_rules:
    - id: lectura_ahorro
      when: 'true'
      status: info
      text:
        es: Físicamente representa el calor ambiental gratuito. Esto implica un beneficio neto.
        en: Physically represents the free ambient heat. This implies a net benefit.
    coherence_rules:
    - id: coh_ahorro
      when: 'true'
      status: info
      text:
