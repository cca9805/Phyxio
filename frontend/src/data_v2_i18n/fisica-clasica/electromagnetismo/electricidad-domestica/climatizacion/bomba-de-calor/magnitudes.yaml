version: 1
magnitudes:
- id: cop
  symbol: COP
  simbolo: COP
  nombre:
    es: coeficiente de rendimiento
    en: coefficient of performance
  descripcion:
    es: Relación entre el calor útil entregado por el equipo y el trabajo eléctrico consumido.
    en: Ratio between the useful heat delivered by the equipment and the electric work consumed.
  unidad_si: '-'
  unidad: '-'
  dimension: '1'
  is_vector: false
  tipo: escalar
  components: null
  category: derived
  physical_role: efficiency
  used_in:
  - Bomba de calor
  common_mistake: Confundirlo con eficiencia < 1.
  typical_range: 2.5 - 5.5
  precision: 2
  canonical_id: eficiencia
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Imposible.
      en: Impossible.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 1.0
    - 7.0
  interpretation_role:
    primary_for:
    - Bomba de calor
    secondary_for: []
  graph_binding:
    channels:
    - cop_slider
  pedagogical_notes:
    es: Usa [[cop]] para leer el papel fisico de coeficiente de rendimiento y comprobar unidad, signo y rango.
    en: Use [[cop]] to read the physical role of coeficiente de rendimiento and check unit, sign and range.
