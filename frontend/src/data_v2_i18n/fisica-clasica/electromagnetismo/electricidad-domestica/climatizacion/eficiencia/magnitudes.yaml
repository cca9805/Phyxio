version: 2
magnitudes:
- id: demanda_termica_estacional
  symbol: Q_{est}
  nombre:
    es: demanda térmica estacional
    en: seasonal thermal demand
  unidad_si: kWh
  dimension: L^2 M T^{-2}
  descripcion:
    es: Energía térmica total que requiere la vivienda en una temporada completa.
    en: Total thermal energy required by the home in a full season.
  is_vector: false
  components: []
  category: energy
  physical_role:
    es: magnitud física
    en: physical quantity
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  common_mistake:
    es: Confundir con la potencia de pico del equipo.
    en: Confusing with the peak power of the equipment.
  typical_range:
  - 1000
  - 20000
  sign_behavior: strictly_positive
  zero_behavior: no_demand
  value_nature: scalar
  interpretation_role: input
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[demanda_termica_estacional]] para leer el papel fisico de demanda térmica estacional y comprobar unidad, signo
      y rango.
    en: Use [[demanda_termica_estacional]] to read the physical role of demanda térmica estacional and check unit, sign and
      range.
- id: rendimiento_estacional_scop
  symbol: SCOP
  nombre:
    es: rendimiento estacional (SCOP)
    en: seasonal performance (SCOP)
  unidad_si: '-'
  dimension: '1'
  descripcion:
    es: Coeficiente de rendimiento estacional medio (Seasonal Coefficient of Performance).
    en: Average seasonal coefficient of performance.
  is_vector: false
  components: []
  category: performance
  physical_role:
    es: magnitud física
    en: physical quantity
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  - graficos
  common_mistake:
    es: Creer que es constante en cualquier clima.
    en: Believing it is constant in any climate.
  typical_range:
  - 1
  - 6
  sign_behavior: strictly_positive
  zero_behavior: impossible
  value_nature: scalar
  interpretation_role: star_magnitude
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[rendimiento_estacional_scop]] para leer el papel fisico de rendimiento estacional (SCOP) y comprobar unidad,
      signo y rango.
    en: Use [[rendimiento_estacional_scop]] to read the physical role of rendimiento estacional (SCOP) and check unit, sign
      and range.
- id: consumo_electrico_estacional
  symbol: E_{est}
  nombre:
    es: consumo eléctrico estacional
    en: seasonal electric consumption
  unidad_si: kWh
  dimension: L^2 M T^{-2}
  descripcion:
    es: Energía eléctrica total consumida por el sistema de climatización en la temporada.
    en: Total electrical energy consumed by the climate control system in the season.
  is_vector: false
  components: []
  category: energy
  physical_role:
    es: magnitud física
    en: physical quantity
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  - graficos
  common_mistake:
    es: No incluir consumos auxiliares del sistema.
    en: Not including auxiliary system consumptions.
  typical_range:
  - 200
  - 10000
  sign_behavior: strictly_positive
  zero_behavior: zero_consumption
  value_nature: scalar
  interpretation_role: output
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[consumo_electrico_estacional]] para leer el papel fisico de consumo eléctrico estacional y comprobar unidad,
      signo y rango.
    en: Use [[consumo_electrico_estacional]] to read the physical role of consumo eléctrico estacional and check unit, sign
      and range.
- id: precio_medio
  symbol: p_{medio}
  nombre:
    es: precio medio de la energía
    en: average energy price
  unidad_si: EUR/kWh
  dimension: M L^2 T^{-2} Q^{-1} ...
  descripcion:
    es: Tarifa unitaria media aplicada al consumo eléctrico facturado.
    en: Average unit rate applied to the billed electrical consumption.
  is_vector: false
  components: []
  category: economics
  physical_role:
    es: variable de contorno
    en: boundary variable
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  common_mistake:
    es: Ignorar la parte fija de la factura (potencia).
    en: Ignoring the fixed part of the bill (power).
  typical_range:
  - 0.1
  - 0.5
  sign_behavior: strictly_positive
  zero_behavior: free_energy
  value_nature: scalar
  interpretation_role: context
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[precio_medio]] para leer el papel fisico de precio medio de la energía y comprobar unidad, signo y rango.
    en: Use [[precio_medio]] to read the physical role of precio medio de la energía and check unit, sign and range.
- id: coste_economico_estacional
  symbol: C_{est}
  nombre:
    es: coste económico estacional
    en: seasonal economic cost
  unidad_si: EUR
  dimension: M
  descripcion:
    es: Gasto monetario total asociado al consumo de climatización en la temporada.
    en: Total monetary expense associated with climatization consumption in the season.
  is_vector: false
  components: []
  category: economics
  physical_role:
    es: magnitud física
    en: physical quantity
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  common_mistake:
    es: Pensar que duplicar SCOP siempre reduce factura a la mitad (si sube el precio).
    en: Thinking doubling SCOP always halves the bill (if prices rise).
  typical_range:
  - 100
  - 3000
  sign_behavior: strictly_positive
  zero_behavior: zero_cost
  value_nature: scalar
  interpretation_role: output
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[coste_economico_estacional]] para leer el papel fisico de coste económico estacional y comprobar unidad, signo
      y rango.
    en: Use [[coste_economico_estacional]] to read the physical role of coste económico estacional and check unit, sign and
      range.
- id: ahorro_energetico_porcentual
  symbol: \Delta E_{\%}
  nombre:
    es: ahorro energético porcentual
    en: percentage energy savings
  unidad_si: '%'
  dimension: '1'
  descripcion:
    es: Reducción relativa del consumo eléctrico respecto al escenario base.
    en: Relative reduction in electrical consumption compared to the base scenario.
  is_vector: false
  components: []
  category: performance
  physical_role:
    es: indicador de eficiencia
    en: efficiency indicator
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  common_mistake:
    es: Restar porcentajes de mejora en lugar de aplicar el modelo compuesto.
    en: Subtracting improvement percentages instead of applying the composite model.
  typical_range:
  - 0
  - 90
  sign_behavior: positive_for_savings
  zero_behavior: no_savings
  value_nature: scalar
  interpretation_role: output
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[ahorro_energetico_porcentual]] para leer el papel fisico de ahorro energético porcentual y comprobar unidad,
      signo y rango.
    en: Use [[ahorro_energetico_porcentual]] to read the physical role of ahorro energético porcentual and check unit, sign
      and range.
- id: consumo_escenario_base
  symbol: E_{base}
  nombre:
    es: consumo escenario base
    en: base scenario consumption
  unidad_si: kWh
  dimension: L^2 M T^{-2}
  descripcion:
    es: Consumo eléctrico del sistema de referencia antes de la mejora.
    en: Electrical consumption of the reference system before improvement.
  is_vector: false
  components: []
  category: energy
  physical_role:
    es: referencia
    en: reference
  used_in:
  - ejemplos
  common_mistake:
    es: Usar datos de un año excepcionalmente cálido.
    en: Using data from an exceptionally warm year.
  typical_range:
  - 500
  - 15000
  sign_behavior: strictly_positive
  zero_behavior: no_base
  value_nature: scalar
  interpretation_role: reference
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[consumo_escenario_base]] para leer el papel fisico de consumo escenario base y comprobar unidad, signo y rango.
    en: Use [[consumo_escenario_base]] to read the physical role of consumo escenario base and check unit, sign and range.
- id: consumo_escenario_nuevo
  symbol: E_{nuevo}
  nombre:
    es: consumo escenario nuevo
    en: new scenario consumption
  unidad_si: kWh
  dimension: L^2 M T^{-2}
  descripcion:
    es: Consumo eléctrico del sistema optimizado tras la mejora técnica.
    en: Electrical consumption of the optimized system after technical improvement.
  is_vector: false
  components: []
  category: energy
  physical_role:
    es: resultado proyectado
    en: projected result
  used_in:
  - ejemplos
  common_mistake:
    es: No considerar el efecto rebote.
    en: Not considering the rebound effect.
  typical_range:
  - 100
  - 5000
  sign_behavior: strictly_positive
  zero_behavior: zero_consumption
  value_nature: scalar
  interpretation_role: result
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[consumo_escenario_nuevo]] para leer el papel fisico de consumo escenario nuevo y comprobar unidad, signo y rango.
    en: Use [[consumo_escenario_nuevo]] to read the physical role of consumo escenario nuevo and check unit, sign and range.
- id: base
  symbol: \text{base}
  nombre:
    es: etiqueta base
    en: base label
  unidad_si: '-'
  dimension: '1'
  descripcion:
    es: Subíndice o identificador de referencia para el escenario inicial.
    en: Subscript or reference identifier for the initial scenario.
  is_vector: false
  components: []
  category: metadata
  physical_role:
    es: etiqueta
    en: label
  used_in:
  - ejemplos
  common_mistake:
    es: ninguno
    en: none
  typical_range:
  - 0
  - 1
  sign_behavior: none
  zero_behavior: none
  value_nature: scalar
  interpretation_role: label
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[base]] para leer el papel fisico de etiqueta base y comprobar unidad, signo y rango.
    en: Use [[base]] to read the physical role of etiqueta base and check unit, sign and range.
- id: nuevo
  symbol: \text{nuevo}
  nombre:
    es: etiqueta nuevo
    en: new label
  unidad_si: '-'
  dimension: '1'
  descripcion:
    es: Subíndice o identificador para el escenario propuesto tras la mejora.
    en: Subscript or identifier for the proposed scenario after improvement.
  is_vector: false
  components: []
  category: metadata
  physical_role:
    es: etiqueta
    en: label
  used_in:
  - ejemplos
  common_mistake:
    es: ninguno
    en: none
  typical_range:
  - 0
  - 1
  sign_behavior: none
  zero_behavior: none
  value_nature: scalar
  interpretation_role: label
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Usa [[nuevo]] para leer el papel fisico de etiqueta nuevo y comprobar unidad, signo y rango.
    en: Use [[nuevo]] to read the physical role of etiqueta nuevo and check unit, sign and range.
