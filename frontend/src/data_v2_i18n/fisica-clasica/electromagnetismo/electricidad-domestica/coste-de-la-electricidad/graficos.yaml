version: "1.0"
leaf: "coste-de-la-electricidad"

coord:
  title:
    es: Gráfica Coord · Coste de la Electricidad
    en: Coord Graph · Electricity Cost
  xAxis:
    es: tiempo t (h)
    en: time t (h)
  yAxis:
    es: coste acumulado C (€)
    en: accumulated cost C (€)
  xMagnitude: t
  yMagnitude: C
  relation:
    es: C = P·t·precio_kWh / 1000. Recta de pendiente P·precio/1000. Energía consumida E = P·t (kWh).
    en: C = P·t·price_kWh / 1000. Line with slope P·price/1000. Energy consumed E = P·t (kWh).
  physicalReading:
    es: "Recta: mayor pendiente para mayor potencia o mayor precio. Energía en kWh = P(W)·t(h)/1000."
    en: "Line: steeper slope for larger power or higher price. Energy in kWh = P(W)·t(h)/1000."
  slopeMeaning:
    es: "Pendiente = P·precio/1000 (€/h): coste por hora de funcionamiento del aparato."
    en: "Slope = P·price/1000 (€/h): cost per hour of device operation."
  interceptMeaning:
    es: "C(0) = 0: sin tiempo de uso, sin coste."
    en: "C(0) = 0: no usage time, no cost."
  curvatureMeaning:
    es: "Lineal: coste proporcional al tiempo y a la potencia."
    en: "Linear: cost proportional to time and power."
  signMeaning:
    es: C ≥ 0 siempre.
    en: C ≥ 0 always.
  areaMeaning:
    es: Sin interpretación directa (el gráfico ya es el coste acumulado).
    en: No direct interpretation (the graph is already accumulated cost).
  domainMeaning:
    es: t ≥ 0. El precio varía con la tarifa (horas punta/valle).
    en: t ≥ 0. Price varies with the tariff (peak/off-peak hours).
  modelConnection:
    es: "Se interpreta bajo la relación potencia-energía-coste: E = P·t, C = E·precio_kWh."
    en: "Interpreted under the power-energy-cost relationship: E = P·t, C = E·price_kWh."
  formulaConnection:
    es: Conecta con E = P·t (kWh), C = E·precio_kWh, y P = I²R = IV.
    en: Connects to E = P·t (kWh), C = E·price_kWh, and P = I²R = IV.
  readingFocus:
    es: leer la pendiente para obtener el coste por hora y comparar aparatos de distinta potencia.
    en: read the slope to obtain the cost per hour and compare devices of different power.
  agentHints:
    es:
      - 1 kWh = 3.6 MJ. Un aparato de 1000 W consume 1 kWh en 1 hora.
      - Mayor potencia o mayor precio → recta más empinada.
      - Aparatos en modo espera también consumen (potencia de standby).
    en:
      - 1 kWh = 3.6 MJ. A 1000 W device consumes 1 kWh in 1 hour.
      - Larger power or higher price → steeper line.
      - Standby devices also consume power.
  commonMistakes:
    es:
      - Confundir potencia (W) con energía (kWh).
      - Olvidar dividir por 1000 para convertir W a kW.
      - No tener en cuenta la variación del precio con la tarifa.
    en:
      - Confusing power (W) with energy (kWh).
      - Forgetting to divide by 1000 to convert W to kW.
      - Not accounting for price variation with the tariff.
