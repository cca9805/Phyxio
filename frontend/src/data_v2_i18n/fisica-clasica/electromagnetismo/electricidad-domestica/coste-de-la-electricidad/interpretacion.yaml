targets:
  coste_de_energia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de coste_de_energia
      en: Result of coste_de_energia
    summary_rules:
    - id: C_energia_desglose
      when: 'true'
      status: info
      text:
        es: El [[coste_de_energia]] es el unico componente de la factura controlable mediante habitos de consumo
          o desplazamiento horario. Representa la fraccion variable del [[coste_total_de_la_factura]].
        en: '[[coste_de_energia]] is the only bill component controllable through consumption habits or time-shifting.
          It represents the variable fraction of [[coste_total_de_la_factura]].'
    physical_reading_rules:
    - id: C_energia_lectura
      when: 'true'
      status: info
      text:
        es: El [[coste_de_energia]] pondera cada bloque de [[energia_por_periodo_tarifario]] por su [[precio
          de la energia por franja|precio_i]]. Un precio de punta doble al de valle implica que cada kWh en punta tiene el
          doble de impacto economico.
        en: '[[coste_de_energia]] weights each [[energia_por_periodo_tarifario]] block by its [[energy price per tariff
          band|precio_i]]. A peak price twice the off-peak means each kWh at peak has double the economic impact.'
    coherence_rules:
    - id: C_energia_coherencia
      when: 'true'
      status: error
      text:
        es: El [[coste_de_energia]] debe ser positivo si hay consumo registrado. Un valor nulo con consumo no nulo
          indica un error en los [[precios de la energia por franja|precio_i]].
        en: '[[coste_de_energia]] must be positive if there is recorded consumption. A zero value with non-zero consumption
          indicates an error in [[energy price per tariff band|precio_i]] values.'
    model_validity_rules:
    - id: C_energia_validez
      when: 'true'
      status: info
      text:
        es: El calculo de [[coste_de_energia]] es valido cuando los [[precios de la energia por franja|precio_i]]
          son fijos y conocidos para cada franja. En tarifas dinamicas hourly, el precio varia cada hora y el modelo por franjas
          es una aproximacion.
        en: The [[coste_de_energia]] calculation is valid when [[energy price per tariff band|precio_i]] values are fixed
          and known for each band. In dynamic hourly tariffs, the price varies each hour and the band model is an approximation.
    graph_rules:
    - id: C_energia_grafico
      when: 'true'
      status: info
      text:
        es: En el grafico de barras apiladas, el [[coste_de_energia]] es la barra superior variable cuya altura
          cambia con el consumo y los precios de franja.
        en: In the stacked bar chart, [[coste_de_energia]] is the variable upper bar whose height changes with consumption
          and band prices.
    likely_errors:
    - id: C_energia_error
      when: 'true'
      status: error
      text:
        es: 'Error frecuente: calcular el [[coste_de_energia]] con un precio medio unico ignorando la discriminacion
          horaria. Esto sobreestima el coste si el consumo esta concentrado en valle y lo subestima si esta concentrado en
          punta.'
        en: 'Frequent error: calculating [[coste_de_energia]] with a single average price while ignoring time-of-use
          pricing. This overestimates cost if consumption is concentrated in off-peak and underestimates it if concentrated
          in peak.'
    next_step_rules:
    - id: C_energia_siguiente
      when: 'true'
      status: tip
      text:
        es: Con el [[coste_de_energia]] calculado por franjas, identifica que franja concentra mayor gasto. Si punta
          representa mas del 40% del [[coste_de_energia]], evalua si hay cargas flexibles desplazables a valle.
        en: With [[coste_de_energia]] calculated by band, identify which band concentrates the most spending. If peak
          represents more than 40% of [[coste_de_energia]], evaluate whether there are flexible loads that can be shifted
          to off-peak.
    physical_intuition:
    - id: coste_de_energia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[coste_de_energia]] describe el estado dinámico.
        en: Intuitively, [[coste_de_energia]] describes the dynamic state.
    limiting_cases:
    - id: coste_de_energia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[coste_de_energia]].
        en: Check limiting cases of [[coste_de_energia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  coste_de_potencia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de coste_de_potencia
      en: Result of coste_de_potencia
    summary_rules:
    - id: C_potencia_fijo
      when: 'true'
      status: info
      text:
        es: 'El [[coste_de_potencia]] es el termino fijo de la factura: persiste aunque el consumo sea cero. Solo
          se reduce bajando la [[potencia_contratada]], y solo es seguro hacerlo si los picos reales de demanda
          lo permiten.'
        en: '[[coste_de_potencia]] is the fixed term of the bill: it persists even if consumption is zero. It can only
          be reduced by lowering [[potencia_contratada]], and only if real demand peaks allow it.'
    physical_reading_rules:
    - id: C_potencia_lectura
      when: 'true'
      status: info
      text:
        es: 'El [[coste_de_potencia]] representa el coste de tener disponible la [[potencia_contratada]]
          en cualquier momento. Es proporcional a los [[dias del periodo de facturacion|dias]]: un mes de 31 dias cuesta un
          3,3% mas que uno de 30.'
        en: '[[coste_de_potencia]] represents the cost of having [[potencia_contratada]] available at any time.
          It is proportional to [[billing period days|dias]]: a 31-day month costs 3.3% more than a 30-day month.'
    coherence_rules:
    - id: C_potencia_coherencia
      when: 'true'
      status: error
      text:
        es: El [[coste_de_potencia]] debe ser positivo y coherente con la [[potencia_contratada]],
          la [[tarifa de potencia|tarifa_potencia]] y los [[dias del periodo de facturacion|dias]]. Un valor nulo indica datos
          incorrectos.
        en: '[[coste_de_potencia]] must be positive and consistent with [[potencia_contratada]], [[power tariff|tarifa_potencia]],
          and [[billing period days|dias]]. A zero value indicates incorrect data.'
    model_validity_rules:
    - id: C_potencia_validez
      when: 'true'
      status: info
      text:
        es: El modelo de [[coste_de_potencia]] es valido para contratos con tarifa de potencia regulada. En contratos
          de potencia variable o con penalizacion por picos, el modelo requiere extension.
        en: The [[coste_de_potencia]] model is valid for contracts with regulated power tariffs. In variable power contracts
          or peak-penalty contracts, the model requires extension.
    graph_rules:
    - id: C_potencia_grafico
      when: 'true'
      status: info
      text:
        es: En el grafico de barras apiladas, el [[coste_de_potencia]] es la barra base de altura constante que
          no cambia con el consumo.
        en: In the stacked bar chart, [[coste_de_potencia]] is the base bar of constant height that does not change with
          consumption.
    likely_errors:
    - id: C_potencia_error
      when: 'true'
      status: error
      text:
        es: 'Error frecuente: creer que el [[coste_de_potencia]] desaparece si no se consume electricidad. En realidad
          persiste siempre mientras el contrato este activo y la [[potencia_contratada]] no se modifique.'
        en: 'Frequent error: believing [[coste_de_potencia]] disappears if no electricity is consumed. In reality it always
          persists while the contract is active and [[potencia_contratada]] is not modified.'
    next_step_rules:
    - id: C_potencia_siguiente
      when: 'true'
      status: tip
      text:
        es: Si el [[coste_de_potencia]] representa mas del 30% del [[coste_total_de_la_factura]], registra
          los picos de demanda simultanea durante un mes completo para evaluar si es posible bajar la [[potencia_contratada]]
          de forma segura.
        en: If [[coste_de_potencia]] represents more than 30% of [[coste_total_de_la_factura]], record simultaneous demand
          peaks for a full month to evaluate whether it is safe to lower [[potencia_contratada]].
    physical_intuition:
    - id: coste_de_potencia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[coste_de_potencia]] describe el estado dinámico.
        en: Intuitively, [[coste_de_potencia]] describes the dynamic state.
    limiting_cases:
    - id: coste_de_potencia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[coste_de_potencia]].
        en: Check limiting cases of [[coste_de_potencia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  coste_total_de_la_factura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de coste_total_de_la_factura
      en: Result of coste_total_de_la_factura
    summary_rules:
    - id: C_total_desglose
      when: 'true'
      status: info
      text:
        es: El [[coste_total_de_la_factura]] depende de tres componentes independientes. El [[coste_de_energia]]
          es el unico reducible mediante habitos; el [[coste_de_potencia]] y los [[costes_adicionales_y_peajes]]
          persisten aunque el consumo sea cero.
        en: '[[coste_total_de_la_factura]] depends on three independent components. [[coste_de_energia]] is the only one
          reducible through habits; [[coste_de_potencia]] and [[costes_adicionales_y_peajes]] persist even if
          consumption is zero.'
    - id: C_total_rango_alto
      when: result > 200
      status: warning
      text:
        es: El [[coste_total_de_la_factura]] supera los 200 EUR. Verifica que los [[dias del periodo de facturacion|dias]]
          y la [[potencia_contratada]] son correctos.
        en: '[[coste_total_de_la_factura]] exceeds 200 EUR. Verify [[billing period days|dias]] and [[potencia_contratada]]
          are correct.'
    physical_reading_rules:
    - id: C_total_lectura
      when: 'true'
      status: info
      text:
        es: El [[coste_total_de_la_factura]] cuantifica el coste real del servicio electrico. La fraccion correspondiente
          al [[coste_de_potencia]] representa el coste minimo inevitable, independientemente del uso.
        en: '[[coste_total_de_la_factura]] quantifies the real cost of the electricity service. The fraction corresponding to
          [[coste_de_potencia]] represents the unavoidable minimum cost, regardless of usage.'
    coherence_rules:
    - id: C_total_menor_potencia
      when: 'true'
      status: error
      text:
        es: El [[coste_total_de_la_factura]] debe ser mayor que el [[coste_de_potencia]] aislado. Si no
          lo es, revisa los valores de [[coste_de_energia]] y [[costes_adicionales_y_peajes]].
        en: '[[coste_total_de_la_factura]] must be greater than [[coste_de_potencia]] alone. If not, check [[coste_de_energia]]
          and [[costes_adicionales_y_peajes]] values.'
    model_validity_rules:
    - id: C_total_validez_dias
      when: 'true'
      status: info
      text:
        es: El modelo es valido cuando los [[dias del periodo de facturacion|dias]] son conocidos y fijos. Si se comparan
          dos periodos con distinto numero de dias, normalizar por dia antes de comparar [[coste_total_de_la_factura]].
        en: The model is valid when [[billing period days|dias]] are known and fixed. If comparing two periods with different
          days, normalize per day before comparing [[coste_total_de_la_factura]].
    graph_rules:
    - id: C_total_grafico
      when: 'true'
      status: info
      text:
        es: En el grafico de barras apiladas del [[coste_total_de_la_factura]], la barra de [[coste_de_potencia]]
          representa el suelo de la factura; su altura no cambia aunque el consumo caiga a cero.
        en: In the stacked bar chart of [[coste_total_de_la_factura]], the [[coste_de_potencia]] bar represents the bill
          floor; its height does not change even if consumption falls to zero.
    likely_errors:
    - id: C_total_error_proporcional
      when: 'true'
      status: error
      text:
        es: 'Error conceptual frecuente: asumir que el [[coste_total_de_la_factura]] es proporcional al consumo. Una
          reduccion del 30% del consumo no reduce el [[coste_total_de_la_factura]] un 30% si el termino fijo representa
          el 35% de la factura.'
        en: 'Frequent conceptual error: assuming [[coste_total_de_la_factura]] is proportional to consumption. A 30% consumption
          reduction does not reduce [[coste_total_de_la_factura]] by 30% if the fixed term represents 35% of the bill.'
    next_step_rules:
    - id: C_total_siguiente
      when: 'true'
      status: tip
      text:
        es: Con el [[coste_total_de_la_factura]] calculado, identifica que porcentaje representa cada componente.
          Si el [[coste_de_potencia]] supera el 30%, evalua si la [[potencia_contratada]] esta sobredimensionada.
        en: With [[coste_total_de_la_factura]] calculated, identify what percentage each component represents. If [[coste_de_potencia]]
          exceeds 30%, evaluate whether [[potencia_contratada]] is oversized.
    physical_intuition:
    - id: coste_total_de_la_factura_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[coste_total_de_la_factura]] describe el estado dinámico.
        en: Intuitively, [[coste_total_de_la_factura]] describes the dynamic state.
    limiting_cases:
    - id: coste_total_de_la_factura_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[coste_total_de_la_factura]].
        en: Check limiting cases of [[coste_total_de_la_factura]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  ahorro_porcentual:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de ahorro_porcentual
      en: Result of ahorro_porcentual
    summary_rules:
    - id: Ahorro_pct_valido
      when: 'true'
      status: info
      text:
        es: El [[ahorro_porcentual]] positivo indica que la medida ha reducido el [[coste_total_de_la_factura]].
          Solo es interpretable si el [[coste_del_escenario_de_referencia]] y el [[coste_del_escenario_nuevo]]
          son comparables en servicio, dias y condiciones climaticas.
        en: Positive [[ahorro_porcentual]] indicates the measure has reduced [[coste_total_de_la_factura]]. It is
          only interpretable if [[coste_del_escenario_de_referencia]] and [[coste_del_escenario_nuevo]] are comparable in service,
          days, and climatic conditions.
    - id: Ahorro_pct_negativo
      when: 'true'
      status: warning
      text:
        es: Un [[ahorro_porcentual]] nulo o negativo indica que la medida no ha reducido el [[coste_total_de_la_factura]]. Verifica que los periodos son comparables.
        en: Zero or negative [[ahorro_porcentual]] indicates the measure has not reduced [[coste_total_de_la_factura]].
          Verify that compared periods are equivalent.
    physical_reading_rules:
    - id: Ahorro_pct_lectura
      when: 'true'
      status: info
      text:
        es: El [[ahorro_porcentual]] expresa que fraccion del [[coste_del_escenario_de_referencia]] se ha
          eliminado. Un valor del 15% significa que por cada 100 EUR de factura base, ahora se pagan 85 EUR en condiciones
          equivalentes.
        en: '[[ahorro_porcentual]] expresses what fraction of [[coste_del_escenario_de_referencia]] has been eliminated.
          A value of 15% means for every 100 EUR of base bill, 85 EUR are now paid under equivalent conditions.'
    coherence_rules:
    - id: Ahorro_pct_base_positivo
      when: 'true'
      status: error
      text:
        es: El [[coste_del_escenario_de_referencia]] debe ser positivo para calcular el [[ahorro_porcentual]].
          Un coste de referencia nulo o negativo es fisicamente imposible.
        en: '[[coste_del_escenario_de_referencia]] must be positive to calculate [[ahorro_porcentual]]. A zero or
          negative reference cost is physically impossible.'
    model_validity_rules:
    - id: Ahorro_pct_validez
      when: 'true'
      status: info
      text:
        es: El [[ahorro_porcentual]] solo tiene significado fisico cuando [[coste_del_escenario_de_referencia]]
          y [[coste_del_escenario_nuevo]] corresponden al mismo nivel de servicio, mismos [[dias del periodo de facturacion|dias]]
          y condiciones climaticas equivalentes.
        en: '[[ahorro_porcentual]] only has physical meaning when [[coste_del_escenario_de_referencia]] and [[coste_del_escenario_nuevo]] correspond to the same service level, same [[billing period days|dias]], and equivalent
          climatic conditions.'
    graph_rules:
    - id: Ahorro_pct_grafico
      when: 'true'
      status: info
      text:
        es: En el grafico comparativo de facturas, el [[ahorro_porcentual]] corresponde a la diferencia relativa
          entre las barras de [[coste_del_escenario_de_referencia]] y [[coste_del_escenario_nuevo]].
        en: In the bill comparison chart, [[ahorro_porcentual]] corresponds to the relative difference between
          [[coste_del_escenario_de_referencia]] and [[coste_del_escenario_nuevo]] bars.
    likely_errors:
    - id: Ahorro_pct_error_consumo
      when: 'true'
      status: error
      text:
        es: 'Error frecuente: calcular el [[ahorro_porcentual]] sobre el consumo en kWh en lugar de sobre el [[coste_total_de_la_factura]] en EUR. El ahorro en kWh ignora el termino fijo y sobreestima el ahorro economico
          real.'
        en: 'Frequent error: calculating [[ahorro_porcentual]] on kWh consumption instead of [[coste_total_de_la_factura]]
          in EUR. Savings in kWh ignores the fixed term and overestimates real economic savings.'
    next_step_rules:
    - id: Ahorro_pct_siguiente
      when: 'true'
      status: tip
      text:
        es: Un [[ahorro_porcentual]] inferior al 5% esta dentro del margen de error del modelo simplificado cuando
          los periodos no son perfectamente homogeneos. Confirma la tendencia en al menos dos periodos equivalentes.
        en: '[[ahorro_porcentual]] below 5% is within the error margin of the simplified model when periods are
          not perfectly homogeneous. Confirm the trend over at least two equivalent periods.'
    physical_intuition:
    - id: ahorro_porcentual_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[ahorro_porcentual]] describe el estado dinámico.
        en: Intuitively, [[ahorro_porcentual]] describes the dynamic state.
    limiting_cases:
    - id: ahorro_porcentual_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[ahorro_porcentual]].
        en: Check limiting cases of [[ahorro_porcentual]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
