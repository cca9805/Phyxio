version: 2
topic:
  id: interruptores
  titulo:
    es: Interruptores
    en: Switches
formulas:
- id: corriente
  target: corriente_de_maniobra
  titulo:
    es: Corriente de maniobra
    en: Switching current
  title:
    es: Corriente de maniobra
    en: Switching current
  equation: I = P / V
  latex: I = P / V
  category: definicion
  relation_type: definicion
  motivo_no_calculable: ''
  used_in:
  - interruptores
  rearrangements:
  - equation: P = I * V
    latex: P = I \* V
  - equation: V = P / I
    latex: V = \\frac{P}{I}
  physical_meaning:
    es: La corriente que el interruptor debe conducir es la potencia de la carga dividida entre la tension. A mayor potencia
      o menor tension, mayor corriente y mayor perdida resistiva.
    en: The current the switch must conduct is load power divided by voltage. Higher power or lower voltage means higher current
      and higher resistive loss.
  constraints:
  - V > 0
  - carga resistiva con factor de potencia unitario
  validity:
    es: Regimen permanente, carga resistiva pura, factor de potencia igual a 1.
    en: Steady state, purely resistive load, power factor equal to 1.
  dimension_check: W/V = A
  calculable: true
  interpretation_tags:
  - corriente_maniobra
  - dimensionamiento
  domain_checks:
  - condition: I > 0
    consequence:
      es: La corriente de maniobra es el parametro base para calcular P_on.
      en: The switching current is the base parameter for calculating P_on.
  coherence_checks:
  - check: P / V = I
    note:
      es: Coherencia dimensional W/V = A verificada.
      en: Dimensional coherence W/V = A verified.
  graph_implications:
  - type: linear
    x: potencia_de_la_carga
    y: corriente_de_maniobra
    note: I crece linealmente con P a V fija.
  pedagogical_triggers:
  - trigger: I > 10
    note:
      es: Con I > 10 A, verificar que el interruptor este disenado para esa corriente.
      en: With I > 10 A, verify the switch is rated for that current.
  result_semantics:
    target: corriente_de_maniobra
    direction: proportional_to_P
    inverse_to: tension_de_alimentacion
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
- id: perdida_on
  target: perdida_resistiva_en_on
  operands:
  - corriente_de_maniobra
  - resistencia_en_estado_on
  titulo:
    es: Perdida resistiva en estado ON
    en: Resistive loss in ON state
  title:
    es: Perdida resistiva en estado ON
    en: Resistive loss in ON state
  equation: P_on = I^2 * R_on
  latex: P_on = I^2 * R_on
  category: ley_joule
  relation_type: ley_fisica
  motivo_no_calculable: ''
  used_in:
  - interruptores
  rearrangements:
  - equation: R_on = P_on / I^2
    latex: R_{on} = \\frac{P_{on}}{I^2}
  - equation: I = sqrt(P_on / R_on)
    latex: I = \\sqrt{\\frac{P_{on}}{R_{on}}}
  physical_meaning:
    es: La potencia disipada en los contactos crece con el cuadrado de la corriente. Duplicar la corriente cuadruplica la
      perdida. Esta dependencia cuadratica hace que los interruptores de alta corriente sean especialmente sensibles a la
      calidad del contacto.
    en: Power dissipated in contacts grows with the square of current. Doubling current quadruples the loss. This quadratic
      dependence makes high-current switches especially sensitive to contact quality.
  constraints:
  - I >= 0
  - R_on >= 0
  validity:
    es: Regimen permanente, contacto ohmico puro. No valido para arcos ni contactos intermitentes.
    en: Steady state, purely ohmic contact. Not valid for arcs or intermittent contacts.
  dimension_check: A^2 * ohm = W
  calculable: true
  interpretation_tags:
  - riesgo_termico
  - joule_localizado
  domain_checks:
  - condition: P_on > 5
    consequence:
      es: P_on > 5 W indica disipacion elevada; inspeccionar el contacto.
      en: P_on > 5 W indicates high dissipation; inspect the contact.
  coherence_checks:
  - check: A^2 * ohm = W
    note:
      es: Coherencia dimensional verificada.
      en: Dimensional coherence verified.
  graph_implications:
  - type: parabolic
    x: corriente_de_maniobra
    y: perdida_resistiva_en_on
    note: P_on crece como I^2 a R_on fija.
  pedagogical_triggers:
  - trigger: P_on > 1
    note:
      es: Con P_on > 1 W, el calentamiento del contacto es apreciable en uso continuo.
      en: With P_on > 1 W, contact heating is noticeable in continuous use.
  result_semantics:
    target: perdida_resistiva_en_on
    direction: quadratic_in_I
    proportional_to: resistencia_en_estado_on
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
- id: energia_on
  target: energia_disipada_en_conduccion
  titulo:
    es: Energia disipada durante la conduccion
    en: Energy dissipated during conduction
  title:
    es: Energia disipada durante la conduccion
    en: Energy dissipated during conduction
  equation: E_on = P_on * t_on
  latex: E_on = P_on * t_on
  category: energia_acumulada
  relation_type: definicion
  motivo_no_calculable: ''
  used_in:
  - interruptores
  rearrangements:
  - equation: t_on = E_on / P_on
    latex: t_{on} = \\frac{E_{on}}{P_{on}}
  - equation: P_on = E_on / t_on
    latex: P_{on} = \\frac{E_{on}}{t_{on}}
  physical_meaning:
    es: La energia total disipada en el interruptor es el producto de la potencia de perdida por el tiempo de conduccion.
      En interruptores de uso continuo, esta energia puede ser significativa a lo largo de dias o semanas.
    en: Total energy dissipated in the switch is the product of loss power and conduction time. In continuously used switches,
      this energy can be significant over days or weeks.
  constraints:
  - P_on >= 0
  - t_on >= 0
  validity:
    es: Valido cuando P_on es aproximadamente constante durante t_on.
    en: Valid when P_on is approximately constant during t_on.
  dimension_check: W * s = J
  calculable: true
  interpretation_tags:
  - energia_acumulada
  - analisis_temporal
  domain_checks:
  - condition: E_on > 3600
    consequence:
      es: E_on > 1 Wh indica disipacion acumulada relevante en el periodo.
      en: E_on > 1 Wh indicates relevant accumulated dissipation in the period.
  coherence_checks:
  - check: W * s = J
    note:
      es: Coherencia dimensional verificada.
      en: Dimensional coherence verified.
  graph_implications:
  - type: linear
    x: t_on
    y: energia_disipada_en_conduccion
    note: E_on crece linealmente con t_on a P_on fija.
  pedagogical_triggers:
  - trigger: t_on > 3600
    note:
      es: Con t_on > 1 hora, calcular E_on para estimar el coste energetico de las perdidas.
      en: With t_on > 1 hour, calculate E_on to estimate the energy cost of losses.
  result_semantics:
    target: energia_disipada_en_conduccion
    direction: proportional_to_P_on
    proportional_to: t_on
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
ui:
  default_formula: corriente
  groups:
  - title:
      es: Ecuaciones base
      en: Base equations
    items:
