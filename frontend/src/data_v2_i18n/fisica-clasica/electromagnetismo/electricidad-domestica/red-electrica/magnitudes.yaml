version: 1
magnitudes:
- id: tension_de_red
  symbol: V
  nombre:
    es: Tensión de red
    en: Network voltage
  descripcion:
    es: Tensión nominal de suministro de la red (230 V en Europa). Actúa como fuente de tensión constante.
    en: Nominal supply voltage of the network (230 V in Europe). Acts as a constant voltage source.
  unidad_si: V
  dimension: M L^2 T^-3 I^-1
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - magnitudes.yaml
  - formulas.yaml
  - interpretacion.yaml
  - teoria.md
  - teoria.en.md
  - ejemplos.md
  - ejemplos.en.md
  - aplicaciones.md
  - aplicaciones.en.md
  common_mistake:
    es: Usar V con una interpretación que no corresponde al modelo declarado.
    en: Using V with an interpretation that does not match the declared model.
  typical_range:
    es: Depende del contexto físico y de las condiciones del modelo.
    en: Depends on the physical context and on the model assumptions.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convención elegida cuando procede.
      en: The sign depends on the chosen convention when relevant.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa ausencia o umbral nulo de esta magnitud dentro del modelo.
      en: A zero value represents absence or a null threshold of this quantity within the model.
  value_nature: scalar
  interpretation_role: core
  graph_binding:
    enabled: false
    channels:
    - none
  pedagogical_notes:
    es: Debe conectarse con la pregunta física central y no tratarse como símbolo decorativo.
    en: It must be connected to the central physical question, not treated as a decorative symbol.
- id: frecuencia_de_red
  symbol: f
  nombre:
    es: Frecuencia de red
    en: Network frequency
  descripcion:
    es: Frecuencia de la corriente alterna (50 Hz en Europa). Caracteriza el suministro pero no interviene en cálculos del
      modelo resistivo.
    en: AC frequency (50 Hz in Europe). Characterises the supply but does not participate in resistive model calculations.
