pregunta_fisica_central:
  es: ¿Cómo distribuye la red eléctrica doméstica la energía entre los receptores y qué limita la potencia total que puede
    suministrar sin riesgo?
  en: How does the household electrical network distribute energy among loads, and what limits the total power it can safely
    supply?
idea_fisica_dominante:
  es: 'La red doméstica es una fuente de tensión alterna prácticamente constante (230 V / 50 Hz). Cada receptor conectado
    en paralelo extrae una corriente proporcional a su potencia. La suma de esas corrientes es la corriente total de línea,
    que no puede superar el calibre del magnetotérmico sin activar la protección. La tensión no cambia al añadir receptores;
    lo que cambia es la corriente total.

    '
  en: 'The household network is a nearly constant AC voltage source (230 V / 50 Hz). Each load connected in parallel draws
    a current proportional to its power. The sum of those currents is the total line current, which cannot exceed the MCB
    rating without triggering protection. Voltage does not change when loads are added; what changes is the total current.

    '
magnitud_dominante: corriente_total_de_linea
representacion_dominante: none
nucleo_operativo:
  magnitudes_nucleo:
  - tension_de_red
  - corriente_total_de_linea
  - potencia_total_conectada
  - corriente_maxima_del_circuito
  - margen_uso
  formulas_nucleo:
  - corriente_total
  - potencia_total
  - margen_capacidad
  error_conceptual_dominante:
    es: 'Creer que la tensión de la red disminuye cuando se conectan más receptores. La red doméstica actúa como fuente de
      tensión constante: al añadir receptores en paralelo la tensión permanece en 230 V y lo que aumenta es la corriente total,
      no la tensión.

      '
    en: 'Believing that network voltage decreases when more loads are connected. The household network acts as a constant
      voltage source: when loads are added in parallel, voltage remains at 230 V and what increases is the total current,
      not the voltage.

      '
  criterio_de_aplicabilidad:
    es: Válido para receptores resistivos (factor de potencia = 1) conectados en paralelo a la misma fase de una instalación
      doméstica europea estándar (230 V / 50 Hz) con impedancia de línea despreciable y sin desequilibrio de fases.
    en: Valid for resistive loads (power factor = 1) connected in parallel to the same phase of a standard European household
      installation (230 V / 50 Hz) with negligible line impedance and no phase imbalance.
  criterio_de_fallo_del_modelo:
    es: El modelo falla cuando la impedancia del cableado no es despreciable (líneas largas o de sección insuficiente), cuando
      los receptores son inductivos o capacitivos (factor de potencia distinto de 1), o cuando la tensión real difiere significativamente
      de 230 V por caída en la línea.
    en: The model fails when wiring impedance is not negligible (long runs or insufficient cross-section), when loads are
      inductive or capacitive (power factor different from 1), or when actual voltage differs significantly from 230 V due
      to line drop.
