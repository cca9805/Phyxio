  error_conceptual_dominante:
    es: 'Confundir precaución con "miedo" en lugar de método técnico. Creer que la ausencia de fallos visibles

      implica ausencia de riesgo, ignorando señales tempranas como calentamiento anormal o disparos ocasionales.

      '
    en: 'Confusing precaution with "fear" instead of a technical method. Believing that absence of visible failures

      means absence of risk, ignoring early signals like abnormal heating or occasional tripping.

      '
  criterio_de_aplicabilidad:
    es: 'El método es aplicable a instalaciones domésticas con observación sistemática, datos de uso por zonas

      y objetivo de reducir riesgo operativo mediante mantenimiento preventivo.

      '
    en: 'The method applies to residential installations with systematic observation, usage data by zones,

      and objective of reducing operational risk through preventive maintenance.

      '
  criterio_de_fallo_del_modelo:
    es: 'El modelo falla cuando se prioriza por impresión subjetiva en vez de indicadores medibles,

      o cuando se interviene sin verificación posterior en condiciones reales de carga.

      '
    en: 'The model fails when prioritizing by subjective impression instead of measurable indicators,

      or when intervening without posterior verification under real load conditions.

      '
