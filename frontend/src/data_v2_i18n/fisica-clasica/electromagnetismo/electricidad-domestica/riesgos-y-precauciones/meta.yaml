pregunta_fisica_central:
  es: ¿Cómo se evalúa y prioriza un riesgo eléctrico doméstico antes de que se manifieste como fallo?
  en: How is a domestic electrical risk evaluated and prioritized before it manifests as a failure?
idea_fisica_dominante:
  es: 'El riesgo eléctrico crece por acumulación de pequeñas desviaciones. El método prioriza intervenciones

    cuantificando potencia térmica [[P_joule]] = [[I]]²·[[R]], energía acumulada

    [[E_joule]] = [[P_joule]]·[[t]], e incremento térmico [[DeltaT]] = [[P_joule]]·[[R_th]].

    La precaución eficaz interviene en etapas tempranas (temperatura anómala), no esperando al fallo manifiesto.

    '
  en: 'Electrical risk grows through accumulation of small deviations. The method prioritizes interventions

    by quantifying thermal power [[P_joule]] = [[I]]²·[[R]], accumulated energy

    [[E_joule]] = [[P_joule]]·[[t]], and thermal rise [[DeltaT]] = [[P_joule]]·[[R_th]].

    Effective precaution intervenes at early stages (anomalous temperature), not waiting for manifest failure.

    '
