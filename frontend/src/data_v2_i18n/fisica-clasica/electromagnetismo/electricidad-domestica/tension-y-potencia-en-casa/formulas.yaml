version: v5
formulas:
- id: potencia_base
  title:
    es: Potencia eléctrica instantánea
    en: Instantaneous electric power
  equation: P = V * I
  latex: P = V I
  rearrangements:
  - target: potencia_electrica
    equation: P = V * I
    latex: P = V I
    constraints: []
  - target: intensidad_de_corriente
    equation: I = P / V
    latex: I = \frac{P}{V}
    constraints:
    - expr: V > 0
      message:
        es: La tensión debe ser positiva para extraer la corriente.
        en: Voltage must be positive to extract current.
  - target: tension_electrica
    equation: V = P / I
    latex: V = \frac{P}{I}
    constraints:
    - expr: I > 0
      message:
        es: La corriente debe ser positiva para extraer la tensión.
        en: Current must be positive to extract voltage.
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: 'La potencia eléctrica instantánea es el producto de la tensión aplicada por la corriente que circula.

      Esta es la relación fundamental que conecta las tres magnitudes básicas del análisis eléctrico.

      '
    en: 'Instantaneous electric power is the product of applied voltage by flowing current.

      This is the fundamental relationship connecting the three basic magnitudes of electrical analysis.

      '
  constraints:
  - expr: V >= 0
    message:
      es: La tensión debe ser no negativa.
      en: Voltage must be non-negative.
  - expr: I >= 0
    message:
      es: La corriente debe ser no negativa.
      en: Current must be non-negative.
  validity:
    es: Válida para cualquier régimen de corriente continua o alterna (usando valores eficaces).
    en: Valid for any DC or AC regime (using RMS values).
  dimension_check: M L^2 T^-3 = (M L^2 T^-3 I^-1) * I = M L^2 T^-3
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - potencia_electrica
  - tension_electrica
  - intensidad_de_corriente
  - potencia-electrica
  result_semantics:
    target: potencia_electrica
    kind: scalar
    sign_meaning:
      es: Potencia positiva indica consumo de energía eléctrica; potencia negativa indicaría generación
      en: Positive power indicates electrical energy consumption; negative power would indicate generation
    absolute_value_meaning:
      es: Magnitud del flujo de energía eléctrica transferida por unidad de tiempo
      en: Magnitude of electric energy flow per unit time
  domain_checks:
  - expr: P < 10000
    message:
      es: Potencia superior a 10 kW es inusual en un único equipo doméstico (verificar unidades).
      en: Power above 10 kW is unusual for a single domestic appliance (verify units).
  coherence_checks:
  - expr: P >= 0
    message:
      es: La potencia debe ser positiva o cero.
      en: Power must be positive or zero.
  graph_implications:
  - A potencia crece linealmente con la corriente a tensión constante.
  pedagogical_triggers:
  - when: value_too_high
    message:
      es: Una potencia elevada implica alta corriente; verificar límite del cable.
      en: High power implies high current; verify cable limit.
- id: corriente_por_resistencia
  title:
    es: Corriente por ley de Ohm
    en: Current by Ohm's law
  equation: I = V / R
  latex: I = \frac{V}{R}
  rearrangements:
  - target: intensidad_de_corriente
    equation: I = V / R
    latex: I = \frac{V}{R}
    constraints:
    - expr: R > 0
      message:
        es: La resistencia debe ser positiva para calcular la corriente.
        en: Resistance must be positive to calculate current.
  - target: tension_electrica
    equation: V = I * R
    latex: V = I R
    constraints: []
  - target: resistencia_electrica
    equation: R = V / I
    latex: R = \frac{V}{I}
    constraints:
    - expr: I > 0
      message:
        es: La corriente debe ser positiva para extraer la resistencia.
        en: Current must be positive to extract resistance.
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: 'La corriente que circula por un conductor es directamente proporcional a la tensión aplicada

      e inversamente proporcional a la resistencia del circuito (Ley de Ohm).

      '
    en: 'The current flowing through a conductor is directly proportional to applied voltage

      and inversely proportional to circuit resistance (Ohm''s Law).

      '
  constraints:
  - expr: V >= 0
    message:
      es: La tensión debe ser no negativa.
      en: Voltage must be non-negative.
  - expr: R > 0
    message:
      es: La resistencia debe ser positiva.
      en: Resistance must be positive.
  validity:
    es: Válida para resistencias óhmicas lineales. No aplica a componentes no lineales (diodos, etc.).
    en: Valid for linear ohmic resistances. Not applicable to nonlinear components (diodes, etc.).
  dimension_check: I = (M L^2 T^-3 I^-1) / (M L^2 T^-3 I^-2) = I
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - intensidad_de_corriente
  - tension_electrica
  - resistencia_electrica
  - ley-de-ohm
  result_semantics:
    target: intensidad_de_corriente
    kind: scalar
    sign_meaning:
      es: Corriente positiva indica flujo en el sentido convencional; negativa indica sentido opuesto
      en: Positive current indicates flow in conventional direction; negative indicates opposite direction
    absolute_value_meaning:
      es: Magnitud del flujo de carga eléctrica por unidad de tiempo a través del conductor
      en: Magnitude of electric charge flow per unit time through the conductor
  domain_checks:
  - expr: I < 100
    message:
      es: Corriente superior a 100 A es inusual en instalación doméstica (posible fallo).
      en: Current above 100 A is unusual in domestic installation (possible fault).
  coherence_checks:
  - expr: I >= 0
    message:
      es: La corriente debe ser positiva o cero.
      en: Current must be positive or zero.
  graph_implications:
  - La corriente decrece hiperbólicamente al aumentar la resistencia.
  pedagogical_triggers:
  - when: value_too_high
    message:
      es: Corriente muy alta indica resistencia baja; posible cortocircuito.
      en: Very high current indicates low resistance; possible short circuit.
- id: potencia_resistiva
  title:
    es: Potencia en función de resistencia
    en: Power as function of resistance
  equation: P = V^2 / R
  latex: P = \frac{V^2}{R}
  rearrangements:
  - target: potencia_electrica
    equation: P = V^2 / R
    latex: P = \frac{V^2}{R}
    constraints:
    - expr: R > 0
      message:
        es: La resistencia debe ser positiva.
        en: Resistance must be positive.
  - target: resistencia_electrica
    equation: R = V^2 / P
    latex: R = \frac{V^2}{P}
    constraints:
    - expr: P > 0
      message:
        es: La potencia debe ser positiva para extraer la resistencia.
        en: Power must be positive to extract resistance.
  category: derived
  relation_type: derived
  physical_meaning:
    es: 'La potencia disipada puede calcularse directamente de la tensión y la resistencia,

      sin necesidad de calcular primero la corriente. Muestra que a tensión fija,

      menor resistencia implica mayor potencia (y mayor peligro).

      '
    en: 'Dissipated power can be calculated directly from voltage and resistance,

      without first calculating current. Shows that at fixed voltage,

      lower resistance implies higher power (and greater danger).

      '
  constraints:
  - expr: V >= 0
    message:
      es: La tensión debe ser no negativa.
      en: Voltage must be non-negative.
  - expr: R > 0
    message:
      es: La resistencia debe ser positiva.
      en: Resistance must be positive.
  validity:
    es: Válida para resistencias óhmicas a tensión constante.
    en: Valid for ohmic resistances at constant voltage.
  dimension_check: M L^2 T^-3 = (M L^2 T^-3 I^-1)^2 / (M L^2 T^-3 I^-2) = M L^2 T^-3
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - potencia_electrica
  - tension_electrica
  - resistencia_electrica
  result_semantics:
    target: potencia_electrica
    kind: scalar
    sign_meaning:
      es: Siempre positiva en resistencias (disipación); negativa no tiene sentido físico en este contexto
      en: Always positive in resistances (dissipation); negative has no physical meaning in this context
    absolute_value_meaning:
      es: Tasa de conversión de energía eléctrica en calor por efecto Joule
      en: Rate of conversion of electrical energy into heat by Joule effect
  domain_checks:
  - expr: P < 10000
    message:
      es: Potencia muy alta a tensión doméstica indica resistencia anormalmente baja.
      en: Very high power at domestic voltage indicates abnormally low resistance.
  coherence_checks:
  - expr: P >= 0
    message:
      es: La potencia debe ser positiva o cero.
      en: Power must be positive or zero.
  graph_implications:
  - La potencia decrece hiperbólicamente al aumentar la resistencia.
  pedagogical_triggers:
  - when: value_too_high
    message:
      es: Resistencia muy baja genera potencia peligrosa; revisar conexiones.
      en: Very low resistance generates dangerous power; check connections.
- id: energia
  title:
    es: Energía eléctrica consumida
    en: Electric energy consumed
  equation: E_{kWh} = P_{kW} * t_h
  latex: E_{kWh} = P_{kW} t_h
  rearrangements:
  - target: energia_consumida
    equation: E_{kWh} = P_{kW} * t_h
    latex: E_{kWh} = P_{kW} t_h
    constraints: []
  - target: potencia_en_kilovatios
    equation: P_{kW} = E_{kWh} / t_h
    latex: P_{kWh} = \frac{E_{kWh}}{t_h}
    constraints:
    - expr: t_h > 0
      message:
        es: El tiempo debe ser positivo para extraer la potencia.
        en: Time must be positive to extract power.
  - target: t_h
    equation: t_h = E_{kWh} / P_{kW}
    latex: t_h = \frac{E_{kWh}}{P_{kWh}}
    constraints:
    - expr: P_{kW} > 0
      message:
        es: La potencia debe ser positiva para extraer el tiempo.
        en: Power must be positive to extract time.
  category: derived
  relation_type: definition
  physical_meaning:
    es: 'La energía consumida es el producto de la potencia (en kW) por el tiempo de uso (en horas).

      Resulta en kWh, la unidad de facturación eléctrica.

      '
    en: 'Energy consumed is the product of power (in kW) by usage time (in hours).

      Results in kWh, the electrical billing unit.

      '
  constraints:
  - expr: P_{kW} >= 0
    message:
      es: La potencia debe ser no negativa.
      en: Power must be non-negative.
  - expr: t_h >= 0
    message:
      es: El tiempo debe ser no negativo.
      en: Time must be non-negative.
  validity:
    es: Válida cuando la potencia se mantiene aproximadamente constante durante el intervalo.
    en: Valid when power remains approximately constant during the interval.
  dimension_check: M L^2 T^-2 = (M L^2 T^-3) * T = M L^2 T^-2
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - energia_consumida
  - potencia_en_kilovatios
  - t_h
  - energia
  result_semantics:
    target: energia_consumida
    kind: accumulated
    sign_meaning:
      es: Siempre positiva (energía consumida); representa acumulación temporal de potencia
      en: Always positive (energy consumed); represents temporal accumulation of power
    absolute_value_meaning:
      es: Cantidad total de energía eléctrica transferida durante el período de tiempo considerado
      en: Total amount of electrical energy transferred during the considered time period
  domain_checks:
  - expr: E_{kWh} < 10000
    message:
      es: Energía muy alta sugiere error de unidades o período excesivo.
      en: Very high energy suggests unit error or excessive period.
  coherence_checks:
  - expr: E_{kWh} >= 0
    message:
      es: La energía debe ser positiva o cero.
      en: Energy must be positive or zero.
  graph_implications:
  - La energía crece linealmente con el tiempo a potencia constante.
  pedagogical_triggers:
  - when: result_outside_expected_range
    message:
      es: Verificar que P esté en kW (no W) y t en horas (no minutos).
      en: Verify that P is in kW (not W) and t is in hours (not minutes).
ui:
  default_formula: potencia_base
  groups:
  - title:
      es: Ecuaciones base
      en: Base equations
    items:
    - potencia_base
    - corriente_por_resistencia
    - potencia_resistiva
    - energia
