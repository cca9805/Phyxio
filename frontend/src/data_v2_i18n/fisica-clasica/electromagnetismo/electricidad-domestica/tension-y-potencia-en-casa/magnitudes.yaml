version: v5
magnitudes:
- id: tension_electrica
  symbol: V
  nombre:
    es: Tensión eléctrica
    en: Electric voltage
  unidad_si: V
  dimension: M L^2 T^-3 I^-1
  descripcion:
    es: Diferencia de potencial eléctrico entre dos puntos; el "empuje" que mueve la corriente.
    en: Electric potential difference between two points; the "push" that moves current.
  is_vector: false
  components: null
  category: fundamental
  physical_role: context_magnitude
  used_in:
  - formulas.yaml
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  common_mistake:
    es: Confundir tensión con corriente o pensar que mayor tensión implica siempre mayor peligro sin considerar la energía.
    en: Confusing voltage with current or thinking higher voltage always means greater danger without considering energy.
  typical_range:
    min: 0
    max: 500
    unit: tension_electrica
    context: domestic installations (nominal 230V in Europe)
  sign_behavior:
    has_sign: false
    meaning:
      es: La tensión es siempre no negativa en este contexto; el signo no aplica.
      en: Voltage is always non-negative in this context; sign does not apply.
  zero_behavior:
    allowed: true
    meaning:
      es: Tensión cero indica cortocircuito o ausencia de conexión a la red.
      en: Zero voltage indicates short circuit or no grid connection.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 500
  interpretation_role:
    primary_for: circuit_analysis
    secondary_for: safety_assessment
  graph_binding:
    channels:
    - x_axis_constant
    - y_axis_input
  pedagogical_notes:
    es: La tensión es la causa (el empuje), no el efecto. A tensión fija, la corriente depende de la resistencia.
    en: Voltage is the cause (the push), not the effect. At fixed voltage, current depends on resistance.
- id: intensidad_de_corriente
  symbol: I
  nombre:
    es: Intensidad de corriente
    en: Current intensity
  unidad_si: A
  dimension: I
  descripcion:
    es: Flujo de carga eléctrica por unidad de tiempo; la magnitud que transportan los cables.
    en: Flow of electric charge per unit time; the magnitude carried by cables.
  is_vector: false
  components: null
  category: fundamental
  physical_role: primary_magnitude
  used_in:
  - formulas.yaml
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  common_mistake:
    es: Usar corrientes calculadas sin comparar con el límite del cable o la protección asociada.
    en: Using calculated currents without comparing against cable limit or associated protection.
  typical_range:
    min: 0
    max: 100
    unit: A
    context: domestic circuits (0-32A typical)
  sign_behavior:
    has_sign: true
    meaning:
      es: Signo positivo indica flujo en sentido convencional; negativo induye sentido opuesto. En continua doméstica siempre
        es positivo.
      en: Positive sign indicates flow in conventional direction; negative indicates opposite direction. In domestic DC always
        positive.
  zero_behavior:
    allowed: true
    meaning:
      es: Corriente cero indica circuito abierto o ausencia de carga.
      en: Zero current indicates open circuit or no load.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval:
    - 0
    - 100
  interpretation_role:
    primary_for: safety_limits
    secondary_for: power_calculation
  graph_binding:
    channels:
    - y_axis_output
    - color_coding
  pedagogical_notes:
    es: La corriente es el efecto, no la causa. El peligro real viene de I alta, no de V alta directamente.
    en: Current is the effect, not the cause. Real danger comes from high I, not directly from high V.
- id: potencia_electrica
  symbol: P
  nombre:
    es: Potencia eléctrica
    en: Electric power
  unidad_si: W
  dimension: M L^2 T^-3
  descripcion:
    es: Ritmo de consumo o transformación de energía eléctrica; magnitud dominante del leaf.
    en: Rate of consumption or transformation of electrical energy; dominant magnitude of the leaf.
  is_vector: false
  components: null
  category: fundamental
  physical_role: primary_magnitude
  used_in:
  - formulas.yaml
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  common_mistake:
    es: Confundir potencia instantánea con energía acumulada, o usar kW y W sin conversión en cálculos.
    en: Confusing instantaneous power with accumulated energy, or using kW and W without conversion in calculations.
  typical_range:
    min: 0
    max: 10000
    unit: W
    context: domestic appliances (10W to 3000W typical)
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva indica consumo (carga), negativa indicaría generación (no aplica en doméstica pura).
      en: Positive indicates consumption (load), negative would indicate generation (not applicable in pure domestic).
  zero_behavior:
    allowed: true
    meaning:
      es: Potencia cero indica equipo apagado o en standby.
      en: Zero power indicates equipment off or in standby.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0
    - 10000
  interpretation_role:
    primary_for: consumption_assessment
    secondary_for: cost_estimation
  graph_binding:
    channels:
    - y_axis_output
    - label_annotation
  pedagogical_notes:
    es: P=V·I conecta causa (V) y efecto (I). Es la magnitud que se paga en la factura indirectamente (como energía).
    en: P=V·I connects cause (V) and effect (I). It is the magnitude paid for indirectly in the bill (as energy).
- id: resistencia_electrica
  symbol: R
  nombre:
    es: Resistencia eléctrica
    en: Electric resistance
  unidad_si: ohm
  dimension: M L^2 T^-3 I^-2
  descripcion:
    es: Oposición al paso de corriente eléctrica; determina cuánta corriente circulará a tensión dada.
    en: Opposition to the passage of electric current; determines how much current will flow at given voltage.
  is_vector: false
  components: null
  category: fundamental
  physical_role: context_magnitude
  used_in:
  - formulas.yaml
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  common_mistake:
    es: Pensar que mayor resistencia implica mayor peligro, cuando en doméstica sucede lo contrario.
    en: Thinking higher resistance implies greater danger, when in domestic settings the opposite is true.
  typical_range:
    min: 0.001
    max: 1000000
    unit: ohm
    context: heating elements (10-100 ohm) to insulation (>1 Mohm)
  sign_behavior:
    has_sign: false
    meaning:
      es: La resistencia es intrínsecamente positiva. Valores negativos no tienen sentido físico.
      en: Resistance is intrinsically positive. Negative values have no physical meaning.
  zero_behavior:
    allowed: false
    meaning:
      es: Resistencia cero implica cortocircuito ideal (peligro extremo).
      en: Zero resistance implies ideal short circuit (extreme danger).
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval:
    - 0.001
    - 1000000
  interpretation_role:
    primary_for: safety_assessment
    secondary_for: power_calculation
  graph_binding:
    channels:
    - x_axis_variable
    - color_coding
  pedagogical_notes:
    es: R baja = I alta = peligro. R alta = I baja = seguro. La inversa de la intuición común.
    en: Low R = high I = danger. High R = low I = safe. Counter to common intuition.
- id: energia_consumida
  symbol: E_{kWh}
  nombre:
    es: Energía consumida
    en: Energy consumed
  unidad_si: kWh
  dimension: M L^2 T^-2
  descripcion:
    es: Energía eléctrica acumulada durante un período de tiempo; lo que se paga en la factura.
    en: Electrical energy accumulated during a period of time; what is paid for in the bill.
  is_vector: false
  components: null
  category: derived
  physical_role: secondary_magnitude
  used_in:
  - formulas.yaml
  - teoria.md
  - ejemplos.md
  common_mistake:
    es: Confundir kWh (energía) con kW (potencia), o pensar que un aparato de alta potencia siempre consume más energía total.
    en: Confusing kWh (energy) with kW (power), or thinking a high-power appliance always consumes more total energy.
  typical_range:
    min: 0
    max: 10000
    unit: kWh
    context: monthly billing (100-500 kWh typical household)
  sign_behavior:
    has_sign: false
    meaning:
      es: La energía consumida es siempre positiva. Representa acumulación escalar.
      en: Consumed energy is always positive. Represents scalar accumulation.
  zero_behavior:
    allowed: true
    meaning:
      es: Energía cero indica no uso o período nulo.
      en: Zero energy indicates no usage or zero time period.
  value_nature:
    kind: accumulated
    nonnegative_only: true
    expected_interval:
    - 0
    - 10000
  interpretation_role:
    primary_for: cost_estimation
    secondary_for: consumption_tracking
  graph_binding:
    channels:
    - area_under_curve
    - label_annotation
  pedagogical_notes:
    es: E_kWh = P_kW × t_h. La unidad de la factura. Integral de potencia sobre tiempo.
    en: E_kWh = P_kW × t_h. The billing unit. Integral of power over time.
- id: potencia_en_kilovatios
  symbol: P_{kW}
  nombre:
    es: Potencia en kilovatios
    en: Power in kilowatts
  unidad_si: kW
  dimension: M L^2 T^-3
  descripcion:
    es: Potencia expresada en kW para facilitar cálculos de energía en kWh.
    en: Power expressed in kW to facilitate energy calculations in kWh.
  is_vector: false
  components: null
  category: parameter
  physical_role: auxiliary_magnitude
  used_in:
  - formulas.yaml
  - ejemplos.md
  common_mistake:
    es: Usar P en kW y V en V sin convertir unidades consistentemente.
    en: Using P in kW and V in V without converting units consistently.
  typical_range:
    min: 0
    max: 10
    unit: kW
    context: conversion parameter for energy calculations
  sign_behavior:
    has_sign: false
    meaning:
      es: Parámetro de conversión; hereda el signo de P pero usado siempre en valor absoluto.
      en: Conversion parameter; inherits sign from P but always used in absolute value.
  zero_behavior:
    allowed: true
    meaning:
      es: P_kW cero indica ausencia de consumo.
      en: Zero P_kW indicates no consumption.
  value_nature:
    kind: parameter
    nonnegative_only: true
    expected_interval:
    - 0
    - 10
  interpretation_role:
    primary_for: unit_conversion
    secondary_for: null
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Solo existe para evitar conversiones constantes W→kW. No es una magnitud física nueva.
    en: Only exists to avoid constant W→kW conversions. Not a new physical magnitude.
- id: t_h
  symbol: t_h
  nombre:
    es: Tiempo de uso
    en: Usage time
  unidad_si: h
  dimension: T
  descripcion:
    es: Duración del funcionamiento del equipo, típicamente expresada en horas para cálculos de energía.
    en: Duration of equipment operation, typically expressed in hours for energy calculations.
  is_vector: false
  components: null
  category: parameter
  physical_role: auxiliary_magnitude
  used_in:
  - formulas.yaml
  - ejemplos.md
  common_mistake:
    es: Olvidar convertir entre minutos y horas cuando se calcula energía en kWh.
    en: Forgetting to convert between minutes and hours when calculating energy in kWh.
  typical_range:
    min: 0
    max: 8760
    unit: h
    context: time parameter for energy accumulation
  sign_behavior:
    has_sign: false
    meaning:
      es: El tiempo transcurre siempre hacia adelante; es un parámetro unidireccional.
      en: Time always moves forward; it is a unidirectional parameter.
  zero_behavior:
    allowed: true
    meaning:
      es: Tiempo cero indica instantáneo o no uso.
      en: Zero time indicates instantaneous or no usage.
  value_nature:
    kind: parameter
    nonnegative_only: true
    expected_interval:
    - 0
    - 8760
  interpretation_role:
    primary_for: duration_calculation
    secondary_for: null
  graph_binding:
    channels:
    - x_axis_variable
  pedagogical_notes:
    es: Parámetro temporal auxiliar. No confundir con variable de estado del sistema.
    en: Auxiliary time parameter. Do not confuse with system state variable.
