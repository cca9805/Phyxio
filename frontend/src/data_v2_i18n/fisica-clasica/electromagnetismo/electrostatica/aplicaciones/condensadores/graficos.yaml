version: "1.0"
leaf: "condensadores"

coord:
  title:
    es: Gráfica Coord · Condensadores
    en: Coord Graph · Capacitors
  xAxis:
    es: tensión V (V)
    en: voltage V (V)
  yAxis:
    es: carga Q (C)
    en: charge Q (C)
  xMagnitude: V
  yMagnitude: Q
  relation:
    es: "Q = C·V: relación lineal, pendiente = C (F). Área bajo la recta Q-V = energía almacenada E = ½CV²."
    en: "Q = C·V: linear relationship, slope = C (F). Area under the Q-V line = stored energy E = ½CV²."
  physicalReading:
    es: "Recta de pendiente C: mayor C → mayor carga para igual tensión. Un dieléctrico con ε_r multiplica C por ε_r."
    en: "Line with slope C: larger C → more charge for same voltage. A dielectric with ε_r multiplies C by ε_r."
  slopeMeaning:
    es: "Pendiente = C (F): la capacidad del condensador, medible experimentalmente."
    en: "Slope = C (F): the capacitance, measurable experimentally."
  interceptMeaning:
    es: "La recta pasa por el origen: sin tensión no hay carga almacenada."
    en: "The line passes through the origin: without voltage there is no stored charge."
  curvatureMeaning:
    es: Lineal (condensador ideal). No linealidad indica saturación del dieléctrico.
    en: Linear (ideal capacitor). Non-linearity indicates dielectric saturation.
  signMeaning:
    es: "Q > 0 para V > 0 (placa positiva con carga positiva)."
    en: "Q > 0 for V > 0 (positive plate with positive charge)."
  areaMeaning:
    es: Área bajo Q vs V = energía almacenada E = ½QV = ½CV².
    en: Area under Q vs V = stored energy E = ½QV = ½CV².
  domainMeaning:
    es: "0 ≤ V ≤ V_ruptura. Para V > V_ruptura el dieléctrico se destruye."
    en: "0 ≤ V ≤ V_breakdown. For V > V_breakdown the dielectric is destroyed."
  modelConnection:
    es: "Se interpreta bajo el modelo de placas planas paralelas: C = ε₀ε_r·A/d."
    en: "Interpreted under the parallel-plate model: C = ε₀ε_r·A/d."
  formulaConnection:
    es: Conecta con Q = CV, E = ½CV², C_serie = 1/(Σ1/Cᵢ), C_paralelo = ΣCᵢ.
    en: Connects to Q = CV, E = ½CV², C_series = 1/(Σ1/Cᵢ), C_parallel = ΣCᵢ.
  readingFocus:
    es: leer la pendiente C y el área triangular como energía; comparar condensadores por pendiente relativa.
    en: read the slope C and the triangular area as energy; compare capacitors by relative slope.
  agentHints:
    es:
      - "En serie: 1/C_eq = Σ1/Cᵢ; en paralelo: C_eq = ΣCᵢ."
      - "Dieléctrico: C se multiplica por ε_r y E entre placas se divide por ε_r."
      - Energía = área del triángulo = ½QV.
    en:
      - "In series: 1/C_eq = Σ1/Cᵢ; in parallel: C_eq = ΣCᵢ."
      - "Dielectric: C multiplied by ε_r, E between plates divided by ε_r."
      - Energy = triangle area = ½QV.
  commonMistakes:
    es:
      - Usar la fórmula serie cuando están en paralelo.
      - Calcular E = QV en vez de E = ½QV.
      - Olvidar la tensión de ruptura del dieléctrico.
    en:
      - Using series formula when in parallel.
      - Computing E = QV instead of E = ½QV.
      - Forgetting the breakdown voltage of the dielectric.
