version: "1.0"
leaf: "dielectricos"

coord:
  title:
    es: Gráfica Coord · Dieléctricos
    en: Coord Graph · Dielectrics
  xAxis:
    es: campo eléctrico externo E₀ (N/C)
    en: external electric field E₀ (N/C)
  yAxis:
    es: polarización P (C/m²)
    en: polarisation P (C/m²)
  xMagnitude: E0
  yMagnitude: P
  relation:
    es: "P = ε₀χ_eE: la polarización es lineal con el campo para dieléctricos lineales. El campo neto se reduce: E = E₀/ε_r."
    en: "P = ε₀χ_eE: polarisation is linear with field for linear dielectrics. Net field reduced: E = E₀/ε_r."
  physicalReading:
    es: Pendiente = ε₀χ_e. Dieléctrico con ε_r mayor → polarización mayor y menor campo neto.
    en: Slope = ε₀χ_e. Dielectric with larger ε_r → higher polarisation and smaller net field.
  slopeMeaning:
    es: "Pendiente = ε₀χ_e = ε₀(ε_r−1): susceptibilidad eléctrica del material."
    en: "Slope = ε₀χ_e = ε₀(ε_r−1): electric susceptibility of the material."
  interceptMeaning:
    es: "La recta pasa por el origen: sin campo externo no hay polarización."
    en: "The line passes through the origin: without external field there is no polarisation."
  curvatureMeaning:
    es: Lineal (dieléctrico lineal isotrópico). No linealidad indica saturación o efectos ferroeléctricos.
    en: Linear (linear isotropic dielectric). Non-linearity indicates saturation or ferroelectric effects.
  signMeaning:
    es: "P > 0: dipolo orientado a favor del campo externo. P opone el campo interno al externo."
    en: "P > 0: dipole oriented along external field. P opposes internal field to external."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido en régimen lineal. Para campos intensos aparece saturación.
    en: Valid in linear regime. Saturation appears for strong fields.
  modelConnection:
    es: "Se interpreta bajo el modelo de dieléctrico lineal: D = ε₀ε_r·E."
    en: "Interpreted under the linear dielectric model: D = ε₀ε_r·E."
  formulaConnection:
    es: Conecta con P = ε₀χ_eE, D = ε₀ε_rE, C = ε₀ε_r·A/d.
    en: Connects to P = ε₀χ_eE, D = ε₀ε_rE, C = ε₀ε_r·A/d.
  readingFocus:
    es: leer la pendiente ε₀χ_e, comparar materiales por ε_r y verificar la linealidad.
    en: read slope ε₀χ_e, compare materials by ε_r, and verify linearity.
  agentHints:
    es:
      - "ε_r = 5: capacidad 5 veces mayor que en el vacío."
      - Los ferroeléctricos tienen histeresis en el ciclo P-E.
      - D es continuo en interfaces; E puede ser discontinuo.
    en:
      - "ε_r = 5: capacitance 5 times greater than in vacuum."
      - Ferroelectrics have hysteresis in the P-E cycle.
      - D is continuous across interfaces; E can be discontinuous.
  commonMistakes:
    es:
      - Confundir ε_r (relativo) con ε₀ (permitividad del vacío).
      - Pensar que P anula el campo total.
      - Usar el modelo lineal fuera de su rango.
    en:
      - Confusing ε_r (relative) with ε₀ (vacuum permittivity).
      - Thinking P cancels the total field.
      - Using the linear model outside its range.
