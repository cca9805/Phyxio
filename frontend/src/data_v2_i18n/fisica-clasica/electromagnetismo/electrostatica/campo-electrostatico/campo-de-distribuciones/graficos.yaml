version: "1.0"
leaf: "campo-de-distribuciones"

coord:
  title:
    es: Gráfica Coord · Campo de Distribuciones de Carga
    en: Coord Graph · Field of Charge Distributions
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo eléctrico E (N/C)
    en: electric field E (N/C)
  xMagnitude: r
  yMagnitude: E
  relation:
    es: "Cada geometría genera una ley de campo distinta: E ∝ 1/r² (esférica), E ∝ 1/r (cilíndrica), E = cte (planar)."
    en: "Each geometry generates a different field law: E ∝ 1/r² (spherical), E ∝ 1/r (cylindrical), E = const (planar)."
  physicalReading:
    es: "La forma de la curva E(r) identifica la geometría: hipérbola cuadrática (esférica), hipérbola simple (cilíndrica), constante (planar)."
    en: "The shape of E(r) identifies the geometry: quadratic hyperbola (spherical), simple hyperbola (cylindrical), constant (planar)."
  slopeMeaning:
    es: "Pendiente logarítmica: −2 para esférica, −1 para cilíndrica, 0 para planar."
    en: "Logarithmic slope: −2 for spherical, −1 for cylindrical, 0 for planar."
  interceptMeaning:
    es: El nivel de E a distancia de referencia depende de la densidad de carga y la geometría.
    en: The E level at a reference distance depends on charge density and geometry.
  curvatureMeaning:
    es: La curvatura distingue el tipo de distribución; identificarla es clave para elegir la fórmula correcta.
    en: Curvature distinguishes the distribution type; identifying it is key to choosing the correct formula.
  signMeaning:
    es: "E > 0 para distribución positiva; E < 0 para negativa."
    en: "E > 0 for positive distribution; E < 0 for negative."
  areaMeaning:
    es: Sin interpretación directa general.
    en: No general direct interpretation.
  domainMeaning:
    es: "r > 0. Los modelos de distribución infinita son idealizaciones válidas lejos de los bordes."
    en: "r > 0. Infinite distribution models are valid idealisations far from the edges."
  modelConnection:
    es: Se aplica la ley de Gauss o la integral de Coulomb según la geometría.
    en: "Gauss's law or the Coulomb integral is applied depending on the geometry."
  formulaConnection:
    es: Conecta con E = kQ/r² (esférica), E = λ/(2πε₀r) (cilíndrica), E = σ/(2ε₀) (planar).
    en: Connects to E = kQ/r² (spherical), E = λ/(2πε₀r) (cylindrical), E = σ/(2ε₀) (planar).
  readingFocus:
    es: identificar la forma de la curva E(r) para deducir la geometría de la distribución.
    en: identify the shape of the E(r) curve to deduce the distribution geometry.
  agentHints:
    es:
      - "En escala log-log: pendiente −2 (esférica), −1 (cilíndrica), 0 (planar)."
      - Un plano infinito uniformemente cargado genera campo constante.
      - La superposición suma vectorialmente los campos individuales.
    en:
      - "On a log-log scale: slope −2 (spherical), −1 (cylindrical), 0 (planar)."
      - An infinite uniformly charged plane generates a constant field.
      - Superposition sums individual fields vectorially.
  commonMistakes:
    es:
      - Usar E = kQ/r² para una distribución cilíndrica.
      - Ignorar que los modelos infinitos son aproximaciones.
      - No identificar la geometría antes de elegir la fórmula.
    en:
      - Using E = kQ/r² for a cylindrical distribution.
      - Ignoring that infinite models are approximations.
      - Not identifying the geometry before choosing the formula.
