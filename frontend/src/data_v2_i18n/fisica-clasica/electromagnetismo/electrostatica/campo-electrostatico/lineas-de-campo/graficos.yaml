version: "1.0"
leaf: "lineas-de-campo"

coord:
  title:
    es: Gráfica Coord · Líneas de Campo Eléctrico
    en: Coord Graph · Electric Field Lines
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo eléctrico E (N/C)
    en: electric field E (N/C)
  xMagnitude: r
  yMagnitude: E
  relation:
    es: La densidad de líneas de campo es proporcional a E. Las líneas salen de cargas positivas, llegan a negativas y nunca se cruzan.
    en: The density of field lines is proportional to E. Lines originate at positive charges, terminate at negative charges, and never cross.
  physicalReading:
    es: La curva E(r) cuantifica la intensidad del campo. Líneas más densas → mayor E.
    en: The E(r) curve quantifies field intensity. Denser lines → stronger E.
  slopeMeaning:
    es: "Pendiente negativa: E decrece con r. La forma depende de la geometría de la distribución."
    en: "Negative slope: E decreases with r. Shape depends on distribution geometry."
  interceptMeaning:
    es: E(0) = 0 en el centro de distribuciones simétricas. E → ∞ para r → 0 en carga puntual.
    en: E(0) = 0 at the centre of symmetric distributions. E → ∞ for r → 0 in a point charge.
  curvatureMeaning:
    es: "La curvatura de E(r) identifica la ley de campo: 1/r² (esférica), 1/r (cilíndrica), cte (planar)."
    en: "Curvature of E(r) identifies the field law: 1/r² (spherical), 1/r (cylindrical), constant (planar)."
  signMeaning:
    es: "E > 0 en la dirección positiva de referencia; E < 0 en la opuesta."
    en: "E > 0 in the positive reference direction; E < 0 in the opposite."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "r > 0. Las líneas son continuas salvo en las cargas (fuentes y sumideros)."
    en: "r > 0. Lines are continuous except at charges (sources and sinks)."
  modelConnection:
    es: Se interpreta bajo el modelo de campo eléctrico estático y el principio de superposición.
    en: Interpreted under the static electric field model and the superposition principle.
  formulaConnection:
    es: Conecta con E = F/q₀, ΦE = Q_enc/ε₀, y E = −∇V.
    en: Connects to E = F/q₀, ΦE = Q_enc/ε₀, and E = −∇V.
  readingFocus:
    es: identificar dirección, densidad y curvatura de las líneas para deducir distribución e intensidad de campo.
    en: identify direction, density, and curvature of lines to deduce distribution and field intensity.
  agentHints:
    es:
      - "Las líneas nunca se cruzan: cruzarse implicaría dos direcciones de E en un punto."
      - Líneas más juntas → campo más intenso.
      - Las superficies equipotenciales son perpendiculares a las líneas de campo.
    en:
      - "Lines never cross: crossing would imply two E directions at one point."
      - Closer lines → stronger field.
      - Equipotential surfaces are perpendicular to field lines.
  commonMistakes:
    es:
      - Pensar que las líneas son trayectorias de cargas (solo lo son partiendo del reposo).
      - Confundir líneas eléctricas (abiertas) con líneas magnéticas (cerradas).
      - Olvidar que las líneas salen de + y entran en −.
    en:
      - Thinking lines are charge trajectories (only from rest).
      - Confusing electric lines (open) with magnetic lines (closed).
      - Forgetting that lines exit from + and enter into −.
