        es: ''
        en: ''
      common_sign_errors: []
  q_fuente:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de q_fuente
      en: Result of q_fuente
    summary_rules:
    - id: q_fuente_summary_positive
      when: result > 0
      status: ok
      text:
        es: '[[q_fuente]] positiva: las líneas de campo salen de la carga. El flujo [[phi_E]] a través de cualquier superficie
          cerrada que la encierre es positivo. El número de líneas es proporcional al valor de [[q_fuente]].'
        en: 'Positive [[q_fuente]]: field lines exit the charge. Flux [[phi_E]] through any closed surface enclosing it is
          positive. The number of lines is proportional to the value of [[q_fuente]].'
    - id: q_fuente_summary_negative
      when: result < 0
      status: ok
      text:
        es: '[[q_fuente]] negativa: las líneas de campo entran en la carga. El flujo [[phi_E]] a través de cualquier superficie
          cerrada que la encierre es negativo.'
        en: 'Negative [[q_fuente]]: field lines enter the charge. Flux [[phi_E]] through any closed surface enclosing it is
          negative.'
    - id: q_fuente_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_fuente]] es el origen de las líneas de campo [[rho_lineas]]: mayor valor absoluto implica más líneas y mayor
          [[phi_E]] total a través de cualquier superficie cerrada.'
        en: '[[q_fuente]] is the origin of field lines [[rho_lineas]]: larger absolute value implies more lines and larger
          total [[phi_E]] through any closed surface.'
    physical_reading_rules:
    - id: q_fuente_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[q_fuente]] se obtiene de [[phi_E]] multiplicado por la permitividad del vacío. Físicamente indica cuántas líneas
          de campo emanan de la fuente o convergen hacia ella.'
        en: '[[q_fuente]] is obtained from [[phi_E]] multiplied by the permittivity of free space. Physically it indicates
          how many field lines emanate from or converge to the source.'
    coherence_rules:
    - id: q_fuente_coherence_default
      when: 'true'
      status: ok
      text:
        es: El signo de [[q_fuente]] debe coincidir con el signo del flujo neto [[phi_E]] a través de una superficie cerrada
          que la encierre. Si difieren, hay un error en la orientación de la normal o en la identificación de la carga.
        en: The sign of [[q_fuente]] must match the sign of the net flux [[phi_E]] through a closed surface enclosing it.
          If they differ, there is an orientation error in the normal or an error in charge identification.
    model_validity_rules:
    - id: q_fuente_validity_default
      when: 'true'
      status: ok
      text:
        es: La relación de Gauss es válida solo en electrostática. En presencia de dieléctricos, la permitividad efectiva
          sustituye a la del vacío y [[q_fuente]] calculada con epsilon_0 puro sobreestima la carga real libre.
        en: Gauss's relation is valid only in electrostatics. In the presence of dielectrics, the effective permittivity replaces
          that of free space and [[q_fuente]] computed with pure epsilon_0 overestimates the actual free charge.
    graph_rules:
    - id: q_fuente_graph_default
      when: 'true'
      status: ok
      text:
        es: En el diagrama de campo, [[q_fuente]] se reconoce como el foco de nacimiento (positiva) o terminación (negativa)
          de las líneas de campo [[rho_lineas]]. El número de líneas asignadas es proporcional a su valor absoluto.
        en: In the field diagram, [[q_fuente]] is recognised as the focus of origination (positive) or termination (negative)
          of field lines [[rho_lineas]]. The number of lines assigned is proportional to its absolute value.
    likely_errors:
    - id: q_fuente_error_lineas
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[q_fuente]] con una lectura aislada es un error frecuente: Error habitual: asignar el mismo número
          de líneas a cargas de distinto valor absoluto. Si [[q_fuente]] es el doble, le corresponden el doble de líneas;
          de lo contrario la densidad [[rho_lineas]] no representa correctamente [[E]].'
        en: 'A common mistake is to interpret [[q_fuente]] in isolation: Common error: assigning the same number of lines
          to charges of different absolute value. If [[q_fuente]] doubles, it gets twice as many lines; otherwise [[rho_lineas]]
          does not correctly represent [[E]].'
    next_step_rules:
    - id: q_fuente_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[q_fuente]] determinada, el siguiente paso es calcular [[phi_E]] total y usar la ley de Gauss para obtener
          [[E]] en superficies de alta simetría sin integrar contribuciones diferenciales.
        en: With [[q_fuente]] determined, the next step is to compute total [[phi_E]] and use Gauss's law to obtain [[E]]
          on high-symmetry surfaces without integrating differential contributions.
    physical_intuition:
    - id: q_fuente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_fuente]] describe el estado dinámico.
        en: Intuitively, [[q_fuente]] describes the dynamic state.
    limiting_cases:
    - id: q_fuente_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_fuente]].
        en: Check limiting cases of [[q_fuente]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
