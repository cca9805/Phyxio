version: "1.0"
leaf: "ley-de-coulomb"

coord:
  title:
    es: Gráfica Coord · Ley de Coulomb
    en: "Coord Graph · Coulomb's Law"
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: fuerza eléctrica F (N)
    en: electric force F (N)
  xMagnitude: r
  yMagnitude: F
  relation:
    es: "F = kq₁q₂/r²: fuerza inversamente proporcional al cuadrado de la distancia. F > 0 (repulsión) para cargas del mismo signo; F < 0 (atracción) para signos opuestos."
    en: "F = kq₁q₂/r²: force inversely proportional to the square of the distance. F > 0 (repulsion) for same-sign charges; F < 0 (attraction) for opposite signs."
  physicalReading:
    es: "Curva hiperbólica cuadrática: al doblar r la fuerza se reduce a 1/4. La ley tiene la misma forma que la gravitación."
    en: "Quadratic hyperbolic curve: doubling r reduces force to 1/4. The law has the same form as gravitation."
  slopeMeaning:
    es: "Pendiente negativa: la fuerza disminuye más rápido a distancias cortas (derivada = −2kq₁q₂/r³)."
    en: "Negative slope: force decreases faster at short distances (derivative = −2kq₁q₂/r³)."
  interceptMeaning:
    es: F → ∞ cuando r → 0 (singularidad puntual). No hay cruce físico con el eje r.
    en: F → ∞ as r → 0 (point singularity). No physical crossing with the r-axis.
  curvatureMeaning:
    es: "Hipérbola 1/r²: decaimiento más rápido que 1/r (potencial) y 1 (constante)."
    en: "Hyperbola 1/r²: faster decay than 1/r (potential) and 1 (constant)."
  signMeaning:
    es: "F > 0: repulsión. F < 0: atracción. El signo depende del producto q₁·q₂."
    en: "F > 0: repulsion. F < 0: attraction. Sign depends on the product q₁·q₂."
  areaMeaning:
    es: El área bajo F vs r entre r₁ y r₂ es el trabajo W = kq₁q₂(1/r₁ − 1/r₂).
    en: Area under F vs r between r₁ and r₂ is the work W = kq₁q₂(1/r₁ − 1/r₂).
  domainMeaning:
    es: "r > 0. El modelo puntual falla para r comparable al tamaño de las partículas."
    en: "r > 0. The point model fails for r comparable to particle size."
  modelConnection:
    es: "Se interpreta bajo el modelo de cargas puntuales en el vacío. En medio material: k → k/ε_r."
    en: "Interpreted under the point-charge model in vacuum. In material medium: k → k/ε_r."
  formulaConnection:
    es: Conecta con F = kq₁q₂/r², E = kq/r², U = kq₁q₂/r y la superposición vectorial de fuerzas.
    en: Connects to F = kq₁q₂/r², E = kq/r², U = kq₁q₂/r, and vector superposition of forces.
  readingFocus:
    es: leer la dependencia 1/r², identificar el signo (atracción/repulsión) y calcular el trabajo como área.
    en: read the 1/r² dependence, identify the sign (attraction/repulsion), and compute work as area.
  agentHints:
    es:
      - "Al doblar r: F÷4. Al triplicar r: F÷9."
      - k ≈ 9×10⁹ N·m²/C² en el vacío.
      - La superposición se aplica sumando vectorialmente las fuerzas individuales.
    en:
      - "Doubling r: F÷4. Tripling r: F÷9."
      - k ≈ 9×10⁹ N·m²/C² in vacuum.
      - Superposition applies by vectorially summing individual forces.
  commonMistakes:
    es:
      - Confundir 1/r² con 1/r.
      - Ignorar el signo del producto q₁q₂.
      - Usar la fórmula para objetos extendidos sin verificar la condición puntual.
    en:
      - Confusing 1/r² with 1/r.
      - Ignoring the sign of the product q₁q₂.
      - Using the formula for extended objects without checking the point-charge condition.
