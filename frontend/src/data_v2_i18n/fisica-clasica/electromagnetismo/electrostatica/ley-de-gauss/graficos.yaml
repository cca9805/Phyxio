version: "1.0"
leaf: "ley-de-gauss"

coord:
  title:
    es: Gráfica Coord · Ley de Gauss
    en: "Coord Graph · Gauss's Law"
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo eléctrico E (N/C)
    en: electric field E (N/C)
  xMagnitude: r
  yMagnitude: E
  relation:
    es: "ΦE = Q_enc/ε₀. Para esfera cargada: E = kQ/r² (r > R) y E = kQr/R³ (r < R, distribución uniforme)."
    en: "ΦE = Q_enc/ε₀. For charged sphere: E = kQ/r² (r > R) and E = kQr/R³ (r < R, uniform distribution)."
  physicalReading:
    es: "E(r) crece linealmente dentro (r < R) y cae como 1/r² fuera (r > R). El máximo está en r = R."
    en: "E(r) grows linearly inside (r < R) and falls as 1/r² outside (r > R). Maximum is at r = R."
  slopeMeaning:
    es: "Pendiente positiva para r < R (distribución volumétrica); negativa para r > R (decaimiento 1/r²)."
    en: "Positive slope for r < R (volume distribution); negative for r > R (1/r² decay)."
  interceptMeaning:
    es: "E(0) = 0 para distribución esférica uniforme (cancelación por simetría). En conductores: E = 0 interior."
    en: "E(0) = 0 for uniform spherical distribution (cancellation by symmetry). In conductors: E = 0 inside."
  curvatureMeaning:
    es: "Lineal para r < R; hiperbólica 1/r² para r > R. Discontinuidad solo si hay carga superficial."
    en: "Linear for r < R; hyperbolic 1/r² for r > R. Discontinuity only if surface charge exists."
  signMeaning:
    es: "E > 0 para Q > 0 (campo apunta hacia afuera). E < 0 para Q < 0."
    en: "E > 0 for Q > 0 (field points outward). E < 0 for Q < 0."
  areaMeaning:
    es: Sin interpretación directa del área.
    en: No direct interpretation of the area.
  domainMeaning:
    es: r ≥ 0. El campo es continuo salvo en superficies con densidad superficial de carga.
    en: r ≥ 0. Field is continuous except at surfaces with surface charge density.
  modelConnection:
    es: Se interpreta bajo la ley de Gauss aplicada a distribuciones simétricas (esférica, cilíndrica, planar).
    en: "Interpreted under Gauss's law applied to symmetric distributions (spherical, cylindrical, planar)."
  formulaConnection:
    es: Conecta con ΦE = Q_enc/ε₀, E = kQ/r² (exterior) y condiciones de contorno de E.
    en: Connects to ΦE = Q_enc/ε₀, E = kQ/r² (exterior), and boundary conditions for E.
  readingFocus:
    es: identificar la región (interior/exterior), leer E(r) y verificar la transición en r = R.
    en: identify the region (interior/exterior), read E(r), and verify the transition at r = R.
  agentHints:
    es:
      - La ley de Gauss solo es práctica con alta simetría.
      - En el interior de un conductor E = 0.
      - Para esfera conductora toda la carga va a la superficie.
    en:
      - "Gauss's law is only practical with high symmetry."
      - Inside a conductor E = 0.
      - For a conducting sphere all charge goes to the surface.
  commonMistakes:
    es:
      - Aplicar ley de Gauss sin verificar simetría.
      - Confundir Q_enc (solo la carga interior) con la carga total.
      - Confundir flujo ΦE con campo E.
    en:
      - "Applying Gauss's law without verifying symmetry."
      - Confusing Q_enc (only interior charge) with total charge.
      - Confusing flux ΦE with field E.
