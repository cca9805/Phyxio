version: "1.0"
leaf: "diferencia-de-potencial"

coord:
  title:
    es: Gráfica Coord · Diferencia de Potencial
    en: Coord Graph · Electric Potential Difference
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: potencial eléctrico V (V)
    en: electric potential V (V)
  xMagnitude: r
  yMagnitude: V
  relation:
    es: "V = kq/r: potencial hiperbólico 1/r. ΔV = V_B − V_A = kq(1/r_B − 1/r_A). El trabajo para mover una carga es W = q·ΔV."
    en: "V = kq/r: hyperbolic potential 1/r. ΔV = V_B − V_A = kq(1/r_B − 1/r_A). Work to move a charge is W = q·ΔV."
  physicalReading:
    es: "V(r) cae como 1/r (más suave que E ∝ 1/r²). V > 0 para q > 0; V < 0 para q < 0."
    en: "V(r) falls as 1/r (gentler than E ∝ 1/r²). V > 0 for q > 0; V < 0 for q < 0."
  slopeMeaning:
    es: "Pendiente dV/dr = −E_r: el campo eléctrico es el gradiente negativo del potencial."
    en: "Slope dV/dr = −E_r: electric field is the negative gradient of the potential."
  interceptMeaning:
    es: V → 0 para r → ∞ (referencia convencional). V → ∞ para r → 0.
    en: V → 0 for r → ∞ (conventional reference). V → ∞ for r → 0.
  curvatureMeaning:
    es: Hipérbola 1/r, más suave que la de la fuerza 1/r².
    en: Hyperbola 1/r, gentler than the force 1/r².
  signMeaning:
    es: "V > 0 para q > 0; V < 0 para q < 0. ΔV > 0 indica subida de potencial."
    en: "V > 0 for q > 0; V < 0 for q < 0. ΔV > 0 means rising potential."
  areaMeaning:
    es: Sin interpretación directa para el área bajo V vs r.
    en: No direct interpretation for area under V vs r.
  domainMeaning:
    es: "r > 0. Referencia V = 0 en r = ∞."
    en: "r > 0. Reference V = 0 at r = ∞."
  modelConnection:
    es: Se interpreta bajo la electrostática de Coulomb. V es escalar; se superpone algebraicamente.
    en: Interpreted under Coulomb electrostatics. V is a scalar; it superposes algebraically.
  formulaConnection:
    es: Conecta con V = kq/r, ΔV = V_B − V_A, W = q·ΔV, y E = −dV/dr.
    en: Connects to V = kq/r, ΔV = V_B − V_A, W = q·ΔV, and E = −dV/dr.
  readingFocus:
    es: leer V en dos puntos, calcular ΔV y el trabajo W = q·ΔV.
    en: read V at two points, compute ΔV, and work W = q·ΔV.
  agentHints:
    es:
      - Las cargas + se mueven de alto a bajo potencial (espontáneamente).
      - Las superficies equipotenciales son perpendiculares a las líneas de campo.
      - ΔV no depende del camino (campo conservativo).
    en:
      - Positive charges move from high to low potential (spontaneously).
      - Equipotential surfaces are perpendicular to field lines.
      - ΔV does not depend on the path (conservative field).
  commonMistakes:
    es:
      - Confundir V (escalar) con E (vector).
      - Pensar que ΔV = 0 implica E = 0.
      - Usar V = kq/r para distribuciones extendidas sin integrar.
    en:
      - Confusing V (scalar) with E (vector).
      - Thinking ΔV = 0 implies E = 0.
      - Using V = kq/r for extended distributions without integrating.
