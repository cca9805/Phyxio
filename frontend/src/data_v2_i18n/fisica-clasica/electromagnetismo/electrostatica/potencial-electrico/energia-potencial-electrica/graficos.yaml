version: "1.0"
leaf: "energia-potencial-electrica"

coord:
  title:
    es: Gráfica Coord · Energía Potencial Eléctrica
    en: Coord Graph · Electric Potential Energy
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: energía potencial U (J)
    en: potential energy U (J)
  xMagnitude: r
  yMagnitude: U
  relation:
    es: "U = kq₁q₂/r: curva 1/r. U > 0 (repulsión) para cargas del mismo signo; U < 0 (atracción) para signos opuestos. W = −ΔU."
    en: "U = kq₁q₂/r: 1/r curve. U > 0 (repulsion) for same-sign charges; U < 0 (attraction) for opposite signs. W = −ΔU."
  physicalReading:
    es: U(r) cae como 1/r. U → 0 para r → ∞ (referencia). La fuerza es el gradiente negativo de U.
    en: U(r) falls as 1/r. U → 0 for r → ∞ (reference). Force is the negative gradient of U.
  slopeMeaning:
    es: "Pendiente −dU/dr = F_r: la componente radial de la fuerza."
    en: "Slope −dU/dr = F_r: the radial force component."
  interceptMeaning:
    es: U → 0 para r → ∞. U → ±∞ para r → 0.
    en: U → 0 for r → ∞. U → ±∞ for r → 0.
  curvatureMeaning:
    es: Hipérbola 1/r, idéntica al potencial V escalada por q.
    en: Hyperbola 1/r, identical to potential V scaled by q.
  signMeaning:
    es: "U > 0: repulsión (mismo signo). U < 0: atracción (signos opuestos)."
    en: "U > 0: repulsion (same sign). U < 0: attraction (opposite signs)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "r > 0. Para N cargas: U_total = Σ kq_iq_j/r_ij."
    en: "r > 0. For N charges: U_total = Σ kq_iq_j/r_ij."
  modelConnection:
    es: Se interpreta bajo la interacción de Coulomb y la conservación de la energía mecánica.
    en: Interpreted under Coulomb interaction and conservation of mechanical energy.
  formulaConnection:
    es: Conecta con U = kq₁q₂/r, W = −ΔU = q·ΔV, y U = qV.
    en: Connects to U = kq₁q₂/r, W = −ΔU = q·ΔV, and U = qV.
  readingFocus:
    es: leer U en dos posiciones, calcular ΔU y verificar E_cin + U = cte.
    en: read U at two positions, compute ΔU, and verify E_kin + U = const.
  agentHints:
    es:
      - "Energía cinética ganada al acercar cargas opuestas = |ΔU|."
      - W = −ΔU (positivo cuando el sistema pierde energía potencial).
      - U_total = suma sobre pares.
    en:
      - "Kinetic energy gained bringing opposite charges together = |ΔU|."
      - W = −ΔU (positive when system loses potential energy).
      - U_total = sum over pairs.
  commonMistakes:
    es:
      - "Confundir U (energía) con V (potencial): U = qV."
      - Usar W = ΔU en vez de W = −ΔU.
      - Olvidar que la referencia U = 0 está en r = ∞.
    en:
      - "Confusing U (energy) with V (potential): U = qV."
      - Using W = ΔU instead of W = −ΔU.
      - Forgetting that U = 0 reference is at r = ∞.
