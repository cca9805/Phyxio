version: "1.0"
leaf: "campo-electrico"

coord:
  title:
    es: Gráfica Coord · Campo Eléctrico
    en: Coord Graph · Electric Field
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo eléctrico E (N/C)
    en: electric field E (N/C)
  xMagnitude: r
  yMagnitude: E
  relation:
    es: "E = kq/r²: campo eléctrico de una carga puntual, fuerza por unidad de carga positiva. Hipérbola cuadrática."
    en: "E = kq/r²: electric field of a point charge, force per unit positive charge. Quadratic hyperbola."
  physicalReading:
    es: "E(r) cae como 1/r². Doblar r reduce E a 1/4. E > 0 para q > 0 (campo apunta hacia afuera)."
    en: "E(r) falls as 1/r². Doubling r reduces E to 1/4. E > 0 for q > 0 (field points outward)."
  slopeMeaning:
    es: "Pendiente −dE/dr = 2kq/r³: rapidez de decaimiento del campo."
    en: "Slope −dE/dr = 2kq/r³: rate of field decay with distance."
  interceptMeaning:
    es: E → ∞ para r → 0 (singularidad puntual). E → 0 para r → ∞.
    en: E → ∞ for r → 0 (point singularity). E → 0 for r → ∞.
  curvatureMeaning:
    es: "Hipérbola 1/r²: misma ley que la gravitación."
    en: "Hyperbola 1/r²: same law as gravitation."
  signMeaning:
    es: "E > 0 para q > 0 (campo divergente). E < 0 para q < 0 (campo convergente)."
    en: "E > 0 for q > 0 (divergent field). E < 0 for q < 0 (convergent field)."
  areaMeaning:
    es: "Área bajo E vs r entre dos puntos = −ΔV: la diferencia de potencial."
    en: "Area under E vs r between two points = −ΔV: the potential difference."
  domainMeaning:
    es: "r > 0. Para distribuciones extendidas usar la integral de Coulomb o la ley de Gauss."
    en: "r > 0. For extended distributions use the Coulomb integral or Gauss's law."
  modelConnection:
    es: "Se interpreta bajo la electrostática de Coulomb: E = F/q₀."
    en: "Interpreted under Coulomb electrostatics: E = F/q₀."
  formulaConnection:
    es: Conecta con E = kq/r², F = qE, V = kq/r, y ΦE = Q_enc/ε₀.
    en: Connects to E = kq/r², F = qE, V = kq/r, and ΦE = Q_enc/ε₀.
  readingFocus:
    es: leer E(r), identificar la ley 1/r² y calcular trabajo o ΔV como área.
    en: read E(r), identify the 1/r² law, and compute work or ΔV as area.
  agentHints:
    es:
      - "Superposición: E_total = ΣE_i (suma vectorial)."
      - "E apunta de alto a bajo potencial: E = −∇V."
      - "En conductor en equilibrio: E = 0 interior."
    en:
      - "Superposition: E_total = ΣE_i (vector sum)."
      - "E points from high to low potential: E = −∇V."
      - "In conductor at equilibrium: E = 0 inside."
  commonMistakes:
    es:
      - Confundir E (vector) con V (escalar).
      - Usar E = kq/r en lugar de E = kq/r².
      - Olvidar la superposición vectorial.
    en:
      - Confusing E (vector) with V (scalar).
      - Using E = kq/r instead of E = kq/r².
      - Forgetting vector superposition.
