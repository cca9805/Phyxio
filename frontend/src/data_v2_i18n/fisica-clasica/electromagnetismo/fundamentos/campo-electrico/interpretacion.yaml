  q_fuente:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: Carga puntual que genera el campo eléctrico evaluado.
      en: Point charge generating the evaluated electric field.
    summary_rules:
    - id: qf_summary_positive
      when: q_fuente > 0
      status: ok
      text:
        es: '[[q_fuente]] positiva: el campo generado apunta radialmente hacia afuera desde la carga, lo que indica una fuente
          de líneas de campo.'
        en: 'Positive [[q_fuente]]: the generated field points radially outward from the charge, indicating a field-line source.'
    - id: qf_summary_negative
      when: q_fuente < 0
      status: ok
      text:
        es: '[[q_fuente]] negativa: el campo generado apunta radialmente hacia adentro, lo que indica un sumidero de líneas
          de campo.'
        en: 'Negative [[q_fuente]]: the generated field points radially inward, indicating a field-line sink.'
    - id: qf_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_fuente]] describe y determina la distribución radial del campo eléctrico: mayor módulo de [[q_fuente]] aumenta
          proporcionalmente la intensidad de [[E]].'
        en: '[[q_fuente]] describes and determines the radial field distribution: larger magnitude of [[q_fuente]] proportionally
          increases [[E]].'
    physical_reading_rules:
    - id: qf_reading_default
      when: 'true'
      status: ok
      text:
        es: 'La magnitud de [[q_fuente]] escala linealmente con [[E]]: duplicar la carga fuente duplica el campo en todo punto.
          El signo determina si las líneas de campo salen o entran.'
        en: 'The magnitude of [[q_fuente]] scales linearly with [[E]]: doubling the source charge doubles the field everywhere.
          The sign determines whether field lines exit or enter.'
    coherence_rules:
    - id: qf_coherence_zero
      when: q_fuente == 0
      status: error
      text:
        es: '[[q_fuente]] nula no genera campo eléctrico. Revisar los datos de entrada.'
        en: Zero [[q_fuente]] generates no electric field. Check input data.
    - id: qf_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[q_fuente]] no nula: campo bien definido.'
        en: 'Non-zero [[q_fuente]]: field well defined.'
    model_validity_rules:
    - id: qf_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de carga puntual es válido cuando el tamaño físico de la carga fuente es despreciable frente a [[r]].
          Para objetos extendidos usar integración o la ley de Gauss.
        en: The point-charge model is valid when the physical size of the source charge is negligible compared to [[r]]. For
          extended objects use integration or Gauss's law.
    graph_rules:
    - id: qf_graph_default
      when: 'true'
      status: ok
      text:
        es: 'En la gráfica E vs r, [[q_fuente]] escala verticalmente la curva: aumentarla sube toda la hipérbola; reducirla
          la baja.'
        en: 'On the E vs r graph, [[q_fuente]] scales the curve vertically: increasing it raises the entire hyperbola; decreasing
          it lowers it.'
    likely_errors:
    - id: qf_error_sign
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[q_fuente]] con una lectura aislada es un error frecuente: Error frecuente: ignorar el signo de [[q_fuente]]
          al determinar la dirección del campo, asumiendo que el campo siempre apunta hacia afuera.'
        en: 'Common mistake: ignoring the sign of [[q_fuente]] when determining field direction, assuming the field always
          points outward.'
    next_step_rules:
    - id: qf_next_default
      when: 'true'
      status: ok
      text:
        es: 'Explorar el principio de superposición: si existen múltiples cargas fuente, calcular el campo de cada una y sumar
          vectorialmente.'
        en: 'Explore the superposition principle: if multiple source charges exist, compute each field and add vectorially.'
    physical_intuition:
    - id: q_fuente_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_fuente]] describe el estado dinámico.
        en: Intuitively, [[q_fuente]] describes the dynamic state.
    limiting_cases:
    - id: q_fuente_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_fuente]].
        en: Check limiting cases of [[q_fuente]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
