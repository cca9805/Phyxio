  q_0:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: Carga de prueba usada para definir o medir el campo en el punto.
      en: Test charge used to define or measure the field at the point.
    summary_rules:
    - id: q0_summary_small
      when: q_0 < 1e-12
      status: ok
      text:
        es: '[[q_0]] es suficientemente pequeña para ser una carga de prueba ideal; la perturbación sobre las cargas fuente
          es despreciable.'
        en: '[[q_0]] is small enough to serve as an ideal test charge; the disturbance on source charges is negligible.'
    - id: q0_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_0]] resume el valor de la carga de prueba introducida. Su signo indica si la fuerza resultante sigue o se
          opone a [[E]].'
        en: '[[q_0]] summarizes the test charge value entered. Its sign indicates whether the resulting force follows or opposes
          [[E]].'
    physical_reading_rules:
    - id: q0_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[q_0]] positiva indica que la fuerza sobre ella es paralela a [[E]]; [[q_0]] negativa indica fuerza antiparalela.'
        en: Positive [[q_0]] means the force on it is parallel to [[E]]; negative [[q_0]] means the force is antiparallel.
    coherence_rules:
    - id: q0_coherence_zero
      when: q_0 == 0
      status: error
      text:
        es: '[[q_0]] no puede ser cero: la definición divide entre [[q_0]] y resulta indeterminada.'
        en: '[[q_0]] cannot be zero: the definition divides by [[q_0]] and becomes undefined.'
    - id: q0_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[q_0]] no nula: definición del campo bien establecida.'
        en: 'Non-zero [[q_0]]: field definition well established.'
    model_validity_rules:
    - id: q0_validity_large
      when: q_0 > 1e-9
      status: warning
      text:
        es: '[[q_0]] mayor de 1 nC puede alterar la distribución de cargas fuente. El campo medido podría diferir del campo
          sin carga de prueba.'
        en: '[[q_0]] larger than 1 nC may alter the source charge distribution. The measured field could differ from the field
          without the test charge.'
    - id: q0_validity_default
      when: 'true'
      status: ok
      text:
        es: En el límite q_0 → 0, el campo definido es una propiedad pura del espacio generado por las cargas fuente.
        en: In the limit q_0 → 0, the defined field is a pure property of the space generated by the source charges.
    graph_rules:
    - id: q0_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[q_0]] no aparece directamente en la gráfica E vs r; su efecto se ve en [[F_e]] = E · q_0.'
        en: '[[q_0]] does not appear directly on the E vs r graph; its effect shows in [[F_e]] = E · q_0.'
    likely_errors:
    - id: q0_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[q_0]] con una lectura aislada es un error frecuente: Error frecuente: dejar [[q_0]] con el valor
          de la carga de interés real en lugar de usar la definición operativa con carga de prueba tendiente a cero.'
        en: 'Common mistake: setting [[q_0]] to the real charge of interest instead of using the operational definition with
          test charge tending to zero.'
    next_step_rules:
    - id: q0_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[q_0]] para calcular [[F_e]] sobre la carga real de interés. Si [[q_0]] es la carga real del problema, continuar
          con dinámica.
        en: Use [[q_0]] to compute [[F_e]] on the actual charge of interest. If [[q_0]] is the real charge of the problem,
          continue with dynamics.
    physical_intuition:
    - id: q_0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_0]] describe el estado dinámico.
        en: Intuitively, [[q_0]] describes the dynamic state.
    limiting_cases:
    - id: q_0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_0]].
        en: Check limiting cases of [[q_0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
