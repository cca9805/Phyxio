version: "1.0"
leaf: "campo-magnetico"

coord:
  title:
    es: Gráfica Coord · Campo Magnético
    en: Coord Graph · Magnetic Field
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo magnético B (T)
    en: magnetic field B (T)
  xMagnitude: r
  yMagnitude: B
  relation:
    es: "Para un hilo recto: B = μ₀I/(2πr), decaimiento 1/r. Para un solenoide: B = μ₀nI (constante en el interior). Para una espira: B depende de la geometría."
    en: "For a straight wire: B = μ₀I/(2πr), 1/r decay. For a solenoid: B = μ₀nI (constant inside). For a loop: B depends on geometry."
  physicalReading:
    es: B(r) decrece como 1/r para hilos infinitos. El campo es uniforme dentro de un solenoide ideal.
    en: B(r) decreases as 1/r for infinite wires. The field is uniform inside an ideal solenoid.
  slopeMeaning:
    es: Pendiente negativa para fuentes tipo hilo (−μ₀I/(2πr²)). Cero dentro de solenoides (campo uniforme).
    en: Negative slope for wire-type sources (−μ₀I/(2πr²)). Zero inside solenoids (uniform field).
  interceptMeaning:
    es: B → ∞ para r → 0 en hilo infinito (singularidad lineal). B(0) = μ₀nI para solenoides.
    en: B → ∞ for r → 0 in infinite wire (linear singularity). B(0) = μ₀nI for solenoids.
  curvatureMeaning:
    es: Hipérbola 1/r para hilos; constante para solenoides; curvatura compleja para espiras.
    en: Hyperbola 1/r for wires; constant for solenoids; complex curvature for loops.
  signMeaning:
    es: La dirección de B se determina por la regla de la mano derecha. El signo depende del sentido de la corriente.
    en: Direction of B is determined by the right-hand rule. Sign depends on current direction.
  areaMeaning:
    es: Sin interpretación directa del área.
    en: No direct interpretation of the area.
  domainMeaning:
    es: "r > 0 para fuentes tipo hilo. El modelo de hilo infinito falla cerca de los extremos del conductor."
    en: "r > 0 for wire-type sources. The infinite wire model fails near conductor ends."
  modelConnection:
    es: Se interpreta bajo la ley de Biot-Savart o la ley de Ampère para distribuciones simétricas.
    en: "Interpreted under the Biot-Savart law or Ampère's law for symmetric distributions."
  formulaConnection:
    es: Conecta con B = μ₀I/(2πr) (hilo), B = μ₀nI (solenoide), y ∮B·dl = μ₀I_enc.
    en: Connects to B = μ₀I/(2πr) (wire), B = μ₀nI (solenoid), and ∮B·dl = μ₀I_enc.
  readingFocus:
    es: identificar la fuente (hilo, espira, solenoide), leer B(r) y aplicar la ley correcta.
    en: identify the source (wire, loop, solenoid), read B(r), and apply the correct law.
  agentHints:
    es:
      - Regla de la mano derecha para la dirección de B.
      - Dentro de un solenoide B es uniforme; fuera es casi nulo.
      - Las líneas de B son siempre cerradas (no hay monoplos magnéticos).
    en:
      - Right-hand rule for B direction.
      - Inside a solenoid B is uniform; outside it is nearly zero.
      - B field lines are always closed (no magnetic monopoles).
  commonMistakes:
    es:
      - Confundir la ley para hilo (1/r) con la de campo eléctrico (1/r²).
      - Olvidar que B es un vector y que su dirección es perpendicular a I.
      - Aplicar B = μ₀nI fuera del solenoide.
    en:
      - Confusing the wire law (1/r) with the electric field law (1/r²).
      - Forgetting that B is a vector and its direction is perpendicular to I.
      - Applying B = μ₀nI outside the solenoid.
