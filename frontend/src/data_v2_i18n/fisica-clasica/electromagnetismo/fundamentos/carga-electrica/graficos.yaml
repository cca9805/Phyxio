version: "1.0"
leaf: "carga-electrica"

coord:
  title:
    es: Gráfica Coord · Carga Eléctrica
    en: Coord Graph · Electric Charge
  xAxis:
    es: número de electrones N
    en: number of electrons N
  yAxis:
    es: carga eléctrica Q (C)
    en: electric charge Q (C)
  xMagnitude: N
  yMagnitude: Q
  relation:
    es: "Q = N·e: la carga está cuantizada en múltiplos del electrón (e = 1.6×10⁻¹⁹ C). Recta de pendiente e."
    en: "Q = N·e: charge is quantised in multiples of the electron (e = 1.6×10⁻¹⁹ C). Line with slope e."
  physicalReading:
    es: Recta discreta de pendiente e. La cuantización implica que Q no puede tomar valores continuos.
    en: Discrete line with slope e. Quantisation means Q cannot take continuous values.
  slopeMeaning:
    es: "Pendiente = e = 1.6×10⁻¹⁹ C: carga elemental del electrón."
    en: "Slope = e = 1.6×10⁻¹⁹ C: elementary charge of the electron."
  interceptMeaning:
    es: "Q(0) = 0: sin electrones, carga neta nula."
    en: "Q(0) = 0: no electrons, zero net charge."
  curvatureMeaning:
    es: Relación lineal discreta. No hay curvatura.
    en: Discrete linear relationship. No curvature.
  signMeaning:
    es: "Q > 0: déficit de electrones (catión). Q < 0: exceso de electrones (anión)."
    en: "Q > 0: electron deficit (cation). Q < 0: electron excess (anion)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: N ∈ ℤ. La carga mínima observable es e (o e/3 para quarks, no aislables).
    en: N ∈ ℤ. The minimum observable charge is e (or e/3 for quarks, not isolable).
  modelConnection:
    es: Se interpreta bajo la cuantización de la carga y la conservación de la carga total.
    en: Interpreted under charge quantisation and conservation of total charge.
  formulaConnection:
    es: Conecta con Q = Ne, F = kq₁q₂/r², y la ley de Coulomb.
    en: "Connects to Q = Ne, F = kq₁q₂/r², and Coulomb's law."
  readingFocus:
    es: leer la carga Q, verificar que es múltiplo de e y determinar el signo.
    en: read charge Q, verify it is a multiple of e, and determine the sign.
  agentHints:
    es:
      - "e = 1.6×10⁻¹⁹ C: carga elemental."
      - "Conservación de la carga: Q_total antes = Q_total después."
      - Los quarks tienen carga e/3 o 2e/3 pero no se aíslan.
    en:
      - "e = 1.6×10⁻¹⁹ C: elementary charge."
      - "Charge conservation: Q_total before = Q_total after."
      - Quarks have charge e/3 or 2e/3 but are not isolated.
  commonMistakes:
    es:
      - Pensar que la carga es continua.
      - Olvidar la conservación de la carga.
      - Confundir el signo de la carga con el signo de la fuerza.
    en:
      - Thinking charge is continuous.
      - Forgetting charge conservation.
      - Confusing the sign of the charge with the sign of the force.
