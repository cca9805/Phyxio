  q_neta:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: Balance neto de cargas en el sistema; determina el campo eléctrico generado a grandes distancias.
      en: Net charge balance of the system; determines the electric field generated at large distances.
    summary_rules:
    - id: q_neta_summary_positive
      when: q_neta > 0
      status: ok
      text:
        es: '[[q_neta]] positiva indica que el sistema tiene más carga positiva que negativa. A grandes distancias el sistema
          se comporta como una carga puntual positiva de ese valor.'
        en: Positive [[q_neta]] indicates the system has more positive than negative charge. At large distances the system
          behaves as a positive point charge of that value.
    - id: q_neta_summary_negative
      when: q_neta < 0
      status: ok
      text:
        es: '[[q_neta]] negativa indica exceso de carga negativa en el sistema. Resume el desequilibrio de cargas y depende
          de la suma algebraica de [[q_pos]] y [[q_neg]].'
        en: Negative [[q_neta]] indicates excess negative charge in the system. It summarizes the charge imbalance and depends
          on the algebraic sum of [[q_pos]] and [[q_neg]].
    - id: q_neta_summary_zero
      when: q_neta == 0
      status: ok
      text:
        es: '[[q_neta]] nula indica sistema eléctricamente neutro. Las cargas positivas y negativas se compensan exactamente;
          el campo eléctrico neto a grandes distancias es nulo.'
        en: Zero [[q_neta]] indicates an electrically neutral system. Positive and negative charges exactly cancel; the net
          electric field at large distances is zero.
    - id: q_neta_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neta]] resume el balance eléctrico del sistema. Su conservación indica que la carga no se crea ni se destruye
          en sistemas aislados.'
        en: '[[q_neta]] summarizes the electrical balance of the system. Its conservation indicates that charge is neither
          created nor destroyed in isolated systems.'
    physical_reading_rules:
    - id: q_neta_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neta]] mide el desequilibrio eléctrico global del sistema. Para sistemas con distribución interna compleja,
          [[q_neta]] determina solo el campo a larga distancia; el campo cercano puede ser muy diferente.'
        en: '[[q_neta]] measures the global electrical imbalance of the system. For systems with complex internal distribution,
          [[q_neta]] determines only the far-field; the near field can be very different.'
    coherence_rules:
    - id: q_neta_coherence_conservation
      when: 'true'
      status: ok
      text:
        es: Verificar que [[q_neta]] del sistema final coincide con [[q_neta]] del sistema inicial si no ha habido intercambio
          con el exterior. La conservación de la carga es una ley exacta.
        en: Verify that [[q_neta]] of the final system equals [[q_neta]] of the initial system if there has been no exchange
          with the exterior. Charge conservation is an exact law.
    model_validity_rules:
    - id: q_neta_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de carga neta como suma algebraica es exactamente válido. Solo el enfoque puntual deja de ser válido
          cuando las distancias son comparables al tamaño del sistema.
        en: The net charge as algebraic sum model is exactly valid. Only the point charge approximation fails when distances
          are comparable to the system size.
    graph_rules:
    - id: q_neta_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neta]] en la gráfica q vs n cae sobre la misma recta que [[q]] individual; su posición sobre el eje vertical
          confirma si el sistema está cargado o neutro.'
        en: '[[q_neta]] on the q vs n graph falls on the same line as individual [[q]]; its position on the vertical axis
          confirms whether the system is charged or neutral.'
    likely_errors:
    - id: q_neta_error_modules
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[q_neta]] con una lectura aislada es un error frecuente: Error frecuente: sumar los módulos de [[q_pos]]
          y [[q_neg]] en lugar de hacer la suma algebraica. Si hay 5 µC positivos y 3 µC negativos, la carga neta es 2 µC,
          no 8 µC.'
        en: 'A common mistake is to interpret [[q_neta]] in isolation: Common error: adding the magnitudes of [[q_pos]] and
          [[q_neg]] instead of the algebraic sum. If there are 5 µC positive and 3 µC negative, the net charge is 2 µC, not
          8 µC.'
    next_step_rules:
    - id: q_neta_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[q_neta]] calculada, verificar conservación respecto al estado inicial y usar el resultado para calcular
          el campo eléctrico o la fuerza coulombiana del sistema.
        en: With [[q_neta]] calculated, verify conservation relative to the initial state and use the result to compute the
          electric field or Coulomb force of the system.
    physical_intuition:
    - id: q_neta_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_neta]] describe el estado dinámico.
        en: Intuitively, [[q_neta]] describes the dynamic state.
    limiting_cases:
    - id: q_neta_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_neta]].
        en: Check limiting cases of [[q_neta]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  q_pos:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Componente positiva de la carga del sistema; contribución de los protones al balance eléctrico.
      en: Positive charge component of the system; proton contribution to the electrical balance.
    summary_rules:
    - id: q_pos_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_pos]] indica la carga positiva total del sistema. En electrostática ordinaria, [[q_pos]] permanece prácticamente
          constante ya que los protones no se transfieren; lo que varía es [[q_neg]].'
        en: '[[q_pos]] indicates the total positive charge of the system. In ordinary electrostatics, [[q_pos]] remains practically
          constant since protons are not transferred; what varies is [[q_neg]].'
    physical_reading_rules:
    - id: q_pos_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[q_pos]] mide la contribución de protones a la carga total. En procesos de electrización macroscópica, [[q_pos]]
          no cambia: solo se transfieren electrones entre objetos.'
        en: '[[q_pos]] measures the proton contribution to the total charge. In macroscopic electrification processes, [[q_pos]]
          does not change: only electrons are transferred between objects.'
    coherence_rules:
    - id: q_pos_coherence_nonneg
      when: q_pos < 0
      status: error
      text:
        es: '[[q_pos]] no puede ser negativa por definición. Revisar la asignación de signos en el problema.'
        en: '[[q_pos]] cannot be negative by definition. Review sign assignments in the problem.'
    - id: q_pos_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[q_pos]] no negativa, coherente con la definición de carga positiva total.'
        en: Non-negative [[q_pos]], consistent with the definition of total positive charge.
    model_validity_rules:
    - id: q_pos_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de carga positiva como suma de protones es válido en toda electrostática clásica. Falla en física nuclear
          donde los protones pueden transformarse en otras partículas.
        en: The model of positive charge as proton sum is valid throughout classical electrostatics. It fails in nuclear physics
          where protons can transform into other particles.
    graph_rules:
    - id: q_pos_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[q_pos]] contribuye al punto de la gráfica q_neta vs n desplazando el origen hacia valores positivos.'
        en: '[[q_pos]] contributes to the q_neta vs n graph by shifting the origin toward positive values.'
    likely_errors:
    - id: q_pos_error_sign
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[q_pos]] con una lectura aislada es un error frecuente: Error frecuente: asignar signo negativo a
          [[q_pos]] pensando que es la carga de los electrones positrones. Recordar que [[q_pos]] es siempre no negativa.'
        en: 'A common mistake is to interpret [[q_pos]] in isolation: Common error: assigning a negative sign to [[q_pos]]
          thinking it represents positron charge. Remember that [[q_pos]] is always non-negative.'
    next_step_rules:
    - id: q_pos_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[q_pos]] junto con [[q_neg]] para calcular [[q_neta]] y determinar el estado eléctrico final del sistema
          tras un proceso de electrización.
        en: Use [[q_pos]] together with [[q_neg]] to calculate [[q_neta]] and determine the final electrical state of the
          system after an electrification process.
    physical_intuition:
    - id: q_pos_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_pos]] describe el estado dinámico.
        en: Intuitively, [[q_pos]] describes the dynamic state.
    limiting_cases:
    - id: q_pos_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_pos]].
        en: Check limiting cases of [[q_pos]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  q_neg:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: Componente negativa de la carga del sistema; contribución de los electrones al balance eléctrico.
      en: Negative charge component of the system; electron contribution to the electrical balance.
    summary_rules:
    - id: q_neg_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neg]] indica la carga negativa total del sistema, siempre no positiva. En procesos de electrización ordinarios,
          [[q_neg]] es la magnitud que cambia porque los electrones son los portadores transferibles.'
        en: '[[q_neg]] indicates the total negative charge of the system, always non-positive. In ordinary electrification,
          [[q_neg]] is the quantity that changes because electrons are the transferable carriers.'
    physical_reading_rules:
    - id: q_neg_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neg]] mide cuánta carga de electrones contiene el sistema. Su valor se vuelve más negativo cuando el objeto
          gana electrones y menos negativo cuando los pierde.'
        en: '[[q_neg]] measures how much electron charge the system contains. Its value becomes more negative when the object
          gains electrons and less negative when it loses them.'
    coherence_rules:
    - id: q_neg_coherence_nonpos
      when: q_neg > 0
      status: error
      text:
        es: '[[q_neg]] no puede ser positiva por definición. Revisar la asignación de signos: la carga negativa total siempre
          es no positiva.'
        en: '[[q_neg]] cannot be positive by definition. Review sign assignments: total negative charge is always non-positive.'
    - id: q_neg_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neg]] no positiva, coherente con su definición como carga de electrones del sistema.'
        en: Non-positive [[q_neg]], consistent with its definition as the electron charge of the system.
    model_validity_rules:
    - id: q_neg_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de [[q_neg]] como suma de cargas de electrones es válido en toda electrostática clásica. En plasmas
          y física cuántica pueden aparecer antipartículas positivas que complican este esquema.
        en: The model of [[q_neg]] as sum of electron charges is valid throughout classical electrostatics. In plasmas and
          quantum physics, positive antiparticles may appear and complicate this scheme.
    graph_rules:
    - id: q_neg_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[q_neg]] contribuye al punto de la gráfica q_neta vs n desplazando la carga total hacia valores negativos.'
        en: '[[q_neg]] contributes to the q_neta vs n graph by shifting the total charge toward negative values.'
    likely_errors:
    - id: q_neg_error_magnitude
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: trabajar con el módulo de [[q_neg]] y olvidar el signo al sumar con [[q_pos]]. La suma algebraica
          correcta produce un resultado diferente del que da la suma de módulos.'
        en: 'Common error: working with the magnitude of [[q_neg]] and forgetting the sign when adding with [[q_pos]]. The
          correct algebraic sum produces a different result than the sum of magnitudes.'
    next_step_rules:
    - id: q_neg_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[q_neg]] junto con [[q_pos]] para calcular [[q_neta]]. Si [[q_neg]] aumentó en módulo respecto al estado
          inicial, el objeto ha ganado electrones por esa diferencia dividida por [[e]].
        en: Use [[q_neg]] together with [[q_pos]] to calculate [[q_neta]]. If [[q_neg]] increased in magnitude relative to
          the initial state, the object gained electrons equal to that difference divided by [[e]].
    physical_intuition:
    - id: q_neg_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[q_neg]] describe el estado dinámico.
        en: Intuitively, [[q_neg]] describes the dynamic state.
    limiting_cases:
    - id: q_neg_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[q_neg]].
        en: Check limiting cases of [[q_neg]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
