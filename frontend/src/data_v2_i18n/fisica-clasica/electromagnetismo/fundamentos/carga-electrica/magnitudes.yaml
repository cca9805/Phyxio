magnitudes:
- id: carga_electrica
  symbol: q
  nombre:
    es: Carga eléctrica
    en: Electric charge
  descripcion:
    es: Propiedad intrínseca de la materia que determina la intensidad de la interacción electromagnética. Puede ser positiva
      (protones) o negativa (electrones). Se mide en culombios (C).
    en: Intrinsic property of matter that determines the strength of the electromagnetic interaction. Can be positive (protons)
      or negative (electrons). Measured in coulombs (C).
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - ley de Coulomb
  - fuerza de Lorentz
  - ley de Gauss
  - cuantización de la carga
  common_mistake: 'Confundir la carga con la corriente eléctrica: la corriente es la tasa de flujo de carga, no la carga misma.
    Usar la carga cuando se pide la corriente y viceversa es el error más frecuente en problemas de circuitos.'
  typical_range: 1.602×10⁻¹⁹ C (un protón) hasta microcoulombios (µC) para objetos cotidianos electrizados; hasta coulombios
    en condensadores y rayos
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica exceso de protones respecto a electrones; negativo indica exceso de electrones. El signo determina
        el sentido de la fuerza coulombiana (atracción o repulsión).
      en: Positive indicates proton excess relative to electrons; negative indicates electron excess. The sign determines
        the direction of the Coulomb force (attraction or repulsion).
  zero_behavior:
    allowed: true
    meaning:
      es: 'Carga cero indica objeto eléctricamente neutro: mismo número de protones y electrones. Un objeto neutro no ejerce
        ni experimenta fuerza coulombiana neta a gran distancia.'
      en: 'Zero charge indicates an electrically neutral object: equal numbers of protons and electrons. A neutral object
        exerts and experiences no net Coulomb force at large distances.'
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - determinar si un objeto interactúa electromagnéticamente
    - calcular la fuerza de Coulomb entre objetos cargados
    - calcular la fuerza de Lorentz sobre partículas en campos
    secondary_for:
    - determinar la polaridad de la interacción
  graph_binding:
    channels:
    - 'eje vertical q en gráfica q vs n: cada punto es q = n·e'
  pedagogical_notes:
    es: 'La carga eléctrica es la magnitud central del electromagnetismo. Su cuantización (solo múltiplos de e) es un hecho
      empírico sin explicación completa en el modelo estándar, pero verificado con precisión extraordinaria. Insistir en que
      el signo no es convencional arbitrario: refleja la naturaleza de las interacciones.'
    en: 'Electric charge is the central quantity of electromagnetism. Its quantization (only multiples of e) is an empirical
      fact without full explanation in the standard model, yet verified with extraordinary precision. Stress that the sign
      is not an arbitrary convention: it reflects the nature of interactions.'
- id: carga_elemental
  symbol: e
  nombre:
    es: Carga elemental
    en: Elementary charge
  descripcion:
    es: Cantidad mínima de carga eléctrica observable en partículas libres, igual a la carga del protón. Toda carga observable
      es múltiplo entero de este valor.
    en: Minimum observable electric charge in free particles, equal to the proton charge. All observable charge is an integer
      multiple of this value.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: constant
  physical_role: fundamental_constant
  used_in:
  - cuantización de la carga
  - masa del electrón
  - constante de estructura fina
  common_mistake: Usar el valor de la carga del electrón (-1.602×10⁻¹⁹ C) en lugar del valor positivo de la carga elemental
    e. En la fórmula q = n·e, e siempre es positivo; el signo de la carga queda en n.
  typical_range: 1.602176634×10⁻¹⁹ C (valor exacto en el SI desde 2019)
  sign_behavior:
    has_sign: false
    meaning:
      es: Por definición siempre positiva; equivale a la carga del protón. El electrón tiene carga -e.
      en: By definition always positive; equals the proton charge. The electron has charge -e.
  zero_behavior:
    allowed: false
    meaning:
      es: La carga elemental nunca es cero; es una constante fundamental de la naturaleza.
      en: The elementary charge is never zero; it is a fundamental constant of nature.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1.602176634×10⁻¹⁹ C (constante exacta)
  interpretation_role:
    primary_for:
    - escalar la cuantización de la carga en unidades SI
    secondary_for:
    - conectar física atómica con electromagnetismo clásico
  graph_binding:
    channels:
    - pendiente de la recta q vs n; su valor numérico es e
  pedagogical_notes:
    es: La carga elemental es una constante fundamental fija en el SI desde 2019; su valor exacto define el culombio. En problemas
      numéricos se usa e = 1.602×10⁻¹⁹ C. No confundir con la constante matemática e de Euler.
    en: The elementary charge is a fundamental constant fixed in the SI since 2019; its exact value defines the coulomb. In
      numerical problems use e = 1.602×10⁻¹⁹ C. Do not confuse with Euler's mathematical constant e.
- id: numero_de_cargas_elementales
  symbol: n
  nombre:
    es: Número de cargas elementales
    en: Number of elementary charges
  descripcion:
    es: Número entero que indica cuántas cargas elementales (e) contiene o ha ganado/perdido un objeto. Positivo para déficit
      de electrones, negativo para exceso de electrones.
    en: Integer number indicating how many elementary charges (e) an object contains or has gained/lost. Positive for electron
      deficit, negative for electron excess.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: parameter
  physical_role: integer_count
  used_in:
  - cuantización de la carga
  - conteo de electrones transferidos en electrización
  common_mistake: Tratar n como una variable continua y obtener valores fraccionarios. La cuantización de la carga exige que
    n sea entero exacto; un resultado como n = 2.5 indica error de cálculo o datos inconsistentes.
  typical_range: 1 a 10¹² en objetos ordinarios electrizados; hasta 10²⁰ en sistemas macroscópicos
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica más protones que electrones (objeto con carga positiva); negativo indica más electrones (objeto
        con carga negativa); cero indica neutralidad.
      en: Positive indicates more protons than electrons (positively charged object); negative indicates more electrons (negatively
        charged); zero indicates neutrality.
  zero_behavior:
    allowed: true
    meaning:
      es: n igual a cero corresponde a un objeto neutro. Es el estado más frecuente en la materia ordinaria.
      en: n equal to zero corresponds to a neutral object. This is the most common state of ordinary matter.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: entero, any
  interpretation_role:
    primary_for:
    - contar el déficit o exceso de electrones
    - determinar el estado de electrización de un objeto
    secondary_for:
    - conectar carga macroscópica con estructura atómica
  graph_binding:
    channels:
    - eje horizontal n en gráfica q vs n
  pedagogical_notes:
    es: El hecho de que n sea entero es la manifestación directa de la cuantización de la carga. En el experimento de la gota
      de Millikan, precisamente se determinó e midiendo que las cargas medidas eran siempre múltiplos de un valor mínimo.
    en: The fact that n is an integer is the direct manifestation of charge quantization. In Millikan's oil drop experiment,
      e was determined precisely by measuring that all measured charges were always multiples of a minimum value.
- id: q_neta
  symbol: q_{neta}
  nombre:
    es: Carga neta del sistema
    en: Net charge of the system
  descripcion:
    es: Suma algebraica de todas las cargas eléctricas de los componentes de un sistema. Refleja el balance entre cargas positivas
      y negativas totales.
    en: Algebraic sum of all electric charges of a system's components. Reflects the balance between total positive and negative
      charges.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - conservación de la carga eléctrica
  - análisis de sistemas cargados
  - verificación de reacciones nucleares y atómicas
  common_mistake: Sumar los módulos de las cargas en lugar de hacer la suma algebraica. Si un objeto tiene +3 µC y otro -1
    µC, la carga neta es +2 µC, no +4 µC.
  typical_range: Cero (materia neutra); hasta coulombios en sistemas muy cargados como rayos o condensadores de alta energía
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica que el sistema tiene más carga positiva que negativa; negativo, lo contrario; cero indica neutralidad
        eléctrica del sistema.
      en: Positive means the system has more positive than negative charge; negative means the opposite; zero indicates electrical
        neutrality of the system.
  zero_behavior:
    allowed: true
    meaning:
      es: Carga neta cero indica neutralidad macroscópica. Es el estado de la inmensa mayoría de los objetos materiales cotidianos.
      en: Zero net charge indicates macroscopic neutrality. This is the state of the vast majority of everyday material objects.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - determinar si un sistema ejerce campo eléctrico neto a grandes distancias
    - verificar conservación de carga en procesos
    secondary_for:
    - estimar la polaridad de interacciones coulombianas entre sistemas
  graph_binding:
    channels:
    - eje vertical q_neta en gráfica q_neta vs n
  pedagogical_notes:
    es: La carga neta es la magnitud experimentalmente accesible para objetos macroscópicos. Un objeto de carga neta cero
      puede tener distribuciones internas de carga no nulas (dipolo eléctrico), lo que genera campos a corta distancia aunque
      no a larga.
    en: Net charge is the experimentally accessible quantity for macroscopic objects. A net-zero object can still have internal
      non-zero charge distributions (electric dipole), generating fields at short range even though not at long range.
- id: q_pos
  symbol: q_{pos}
  nombre:
    es: Carga positiva total
    en: Total positive charge
  descripcion:
    es: Suma de todas las cargas positivas de un sistema, siempre mayor o igual a cero. Representa la contribución de protones
      al balance de carga.
    en: Sum of all positive charges in a system, always greater than or equal to zero. Represents the proton contribution
      to the charge balance.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: parameter
  physical_role: charge_component
  used_in:
  - cálculo de carga neta del sistema
  - análisis de transferencia de cargas
  common_mistake: Asignar signo negativo a q_pos por error. Por definición, la carga positiva total es siempre no negativa;
    los protones no desaparecen en procesos de electrización ordinarios.
  typical_range: 0 a varios culombios dependiendo del sistema
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre no negativa; equivale a la carga de todos los protones del sistema sumada.
      en: Always non-negative; equals the charge of all protons in the system summed.
  zero_behavior:
    allowed: true
    meaning:
      es: q_pos igual a cero solo en sistemas sin protones (como electrones libres o nubes de electrones).
      en: q_pos equal to zero only in systems with no protons (e.g. free electron clouds).
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - componer la carga neta junto con q_neg
    secondary_for: []
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: En electrostática de conductores, q_pos se mantiene prácticamente constante durante la electrización (los protones
      están ligados al núcleo); lo que cambia es q_neg por ganancia o pérdida de electrones.
    en: In conductor electrostatics, q_pos remains practically constant during electrification (protons are bound to the nucleus);
      what changes is q_neg through electron gain or loss.
- id: q_neg
  symbol: q_{neg}
  nombre:
    es: Carga negativa total
    en: Total negative charge
  descripcion:
    es: Suma de todas las cargas negativas de un sistema, siempre menor o igual a cero. Representa la contribución de electrones
      al balance de carga.
    en: Sum of all negative charges in a system, always less than or equal to zero. Represents the electron contribution to
      the charge balance.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: parameter
  physical_role: charge_component
  used_in:
  - cálculo de carga neta del sistema
  - análisis de electrización por transferencia de electrones
  common_mistake: Escribir q_neg con valor positivo. El convenio es que q_neg lleva signo negativo incorporado (o es negativa
    o cero), para que la suma algebraica q_pos + q_neg dé directamente la carga neta.
  typical_range: Varios culombios negativos a 0
  sign_behavior:
    has_sign: true
    meaning:
      es: Siempre negativa o nula. Su módulo mide cuánta carga de electrones hay en el sistema.
      en: Always negative or zero. Its magnitude measures how much electron charge is in the system.
  zero_behavior:
    allowed: true
    meaning:
      es: q_neg igual a cero solo en sistemas sin electrones (imposible en materia ordinaria, solo en física de altas energías).
      en: q_neg equal to zero only in systems with no electrons (impossible in ordinary matter, only in high-energy physics).
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: <= 0
  interpretation_role:
    primary_for:
    - componer la carga neta junto con q_pos
    secondary_for: []
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: En problemas de electrización, q_neg cambia cuando el objeto gana o pierde electrones. Un conductor que gana n electrones
      tiene q_neg que se vuelve más negativo en n·e culombios.
    en: In electrification problems, q_neg changes when the object gains or loses electrons. A conductor gaining n electrons
      has q_neg becoming more negative by n·e coulombs.
