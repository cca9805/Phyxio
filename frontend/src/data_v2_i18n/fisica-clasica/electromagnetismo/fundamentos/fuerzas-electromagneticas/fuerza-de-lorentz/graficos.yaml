version: "1.0"
leaf: "fuerza-de-lorentz"

coord:
  title:
    es: Gráfica Coord · Fuerza de Lorentz
    en: Coord Graph · Lorentz Force
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza de Lorentz F (N)
    en: Lorentz force F (N)
  xMagnitude: v
  yMagnitude: F
  relation:
    es: "F = q(E + v×B). Componente magnética: F_B = qvB·sin(θ). Proporcional a v para campo E fijo."
    en: F = q(E + v×B). Magnetic component F_B = qvB·sin(θ). Proportional to v for fixed field E.
  physicalReading:
    es: Recta de pendiente qB·sin(θ) desplazada en qE (componente eléctrica). La componente magnética no realiza trabajo.
    en: Line with slope qB·sin(θ) shifted by qE (electric component). The magnetic component does no work.
  slopeMeaning:
    es: "Pendiente = qB·sin(θ): sensibilidad de la fuerza magnética a la velocidad."
    en: "Slope = qB·sin(θ): sensitivity of magnetic force to velocity."
  interceptMeaning:
    es: "F(0) = qE: fuerza puramente eléctrica cuando v = 0."
    en: "F(0) = qE: purely electric force when v = 0."
  curvatureMeaning:
    es: Lineal en v (para E, B, θ constantes).
    en: Linear in v (for constant E, B, θ).
  signMeaning:
    es: El signo depende del signo de q, de E y de v×B.
    en: Sign depends on the sign of q, E, and v×B.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: v ≥ 0. A velocidades relativistas se usa F = q(E + v×B) con la mecánica relativista.
    en: v ≥ 0. At relativistic speeds use F = q(E + v×B) with relativistic mechanics.
  modelConnection:
    es: "Fuerza de Lorentz: unificación de las fuerzas eléctrica y magnética."
    en: "Lorentz force: unification of electric and magnetic forces."
  formulaConnection:
    es: "Conecta con F = q(E + v×B), r = mv/(qB), selector de velocidades: E/B."
    en: "Connects to F = q(E + v×B), r = mv/(qB), velocity selector: E/B."
  readingFocus:
    es: leer la componente eléctrica (intercepto) y la magnética (pendiente); identificar el selector de velocidades cuando F = 0.
    en: read the electric component (intercept) and magnetic (slope); identify the velocity selector when F = 0.
  agentHints:
    es:
      - "Selector de velocidades: E/B = v (F = 0 cuando qE = qvB)."
      - La componente magnética no realiza trabajo (⊥ a v).
      - "Ciclotrón: r = mv/(qB)."
    en:
      - "Velocity selector: E/B = v (F = 0 when qE = qvB)."
      - Magnetic component does no work (⊥ to v).
      - "Cyclotron: r = mv/(qB)."
  commonMistakes:
    es:
      - Olvidar la componente eléctrica cuando v = 0.
      - Pensar que la fuerza magnética realiza trabajo.
      - No aplicar el producto vectorial correctamente.
    en:
      - Forgetting the electric component when v = 0.
      - Thinking the magnetic force does work.
      - Not applying the cross product correctly.
