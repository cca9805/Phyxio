        es: El resultado [[F_L]] indica la magnitud física principal.
        en: The result [[F_L]] indicates the main physical quantity.
    physical_reading_rules:
    - id: F_L_physical_reading_base
      when: 'true'
      status: info
      text:
        es: El valor de [[F_L]] indica la fuerza electromagnética neta que actúa sobre la carga; su dirección depende del signo de la carga y del sentido de los campos.
