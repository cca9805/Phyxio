version: "1.0"
leaf: "fuerza-electrica"

coord:
  title:
    es: Gráfica Coord · Fuerza Eléctrica
    en: Coord Graph · Electric Force
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: fuerza eléctrica F (N)
    en: electric force F (N)
  xMagnitude: r
  yMagnitude: F
  relation:
    es: "F = kq₁q₂/r²: ley de Coulomb. Hipérbola 1/r². F > 0 (repulsión) para q₁q₂ > 0; F < 0 (atracción) para q₁q₂ < 0."
    en: "F = kq₁q₂/r²: Coulomb's law. Hyperbola 1/r². F > 0 (repulsion) for q₁q₂ > 0; F < 0 (attraction) for q₁q₂ < 0."
  physicalReading:
    es: "Al doblar r: F se reduce a 1/4. La ley tiene la misma forma que la gravitación."
    en: "Doubling r: F reduced to 1/4. The law has the same form as gravitation."
  slopeMeaning:
    es: "Pendiente = −2kq₁q₂/r³ < 0 para r > 0: decaimiento acelerado."
    en: "Slope = −2kq₁q₂/r³ < 0 for r > 0: accelerated decay."
  interceptMeaning:
    es: F → ∞ para r → 0 (singularidad puntual). F → 0 para r → ∞.
    en: F → ∞ for r → 0 (point singularity). F → 0 for r → ∞.
  curvatureMeaning:
    es: "Hipérbola 1/r²: decaimiento más rápido que 1/r."
    en: "Hyperbola 1/r²: faster decay than 1/r."
  signMeaning:
    es: "F > 0: repulsión. F < 0: atracción. Signo depende del producto q₁q₂."
    en: "F > 0: repulsion. F < 0: attraction. Sign depends on q₁q₂."
  areaMeaning:
    es: "Área bajo F vs r = W = kq₁q₂(1/r₁ − 1/r₂): trabajo realizado."
    en: "Area under F vs r = W = kq₁q₂(1/r₁ − 1/r₂): work done."
  domainMeaning:
    es: "r > 0. Válido para cargas puntuales o distribuciones esféricas fuera."
    en: "r > 0. Valid for point charges or spherical distributions outside."
  modelConnection:
    es: Ley de Coulomb para cargas puntuales en el vacío.
    en: "Coulomb's law for point charges in vacuum."
  formulaConnection:
    es: Conecta con F = kq₁q₂/r², E = kq/r², U = kq₁q₂/r.
    en: Connects to F = kq₁q₂/r², E = kq/r², U = kq₁q₂/r.
  readingFocus:
    es: leer la dependencia 1/r², identificar el signo y calcular el trabajo como área.
    en: read the 1/r² dependence, identify the sign, and compute work as area.
  agentHints:
    es:
      - Doblar r → F÷4. Triplicar r → F÷9.
      - k ≈ 9×10⁹ N·m²/C² en el vacío.
      - "Superposición: F_total = ΣF_i (suma vectorial)."
    en:
      - Double r → F÷4. Triple r → F÷9.
      - k ≈ 9×10⁹ N·m²/C² in vacuum.
      - "Superposition: F_total = ΣF_i (vector sum)."
  commonMistakes:
    es:
      - Confundir 1/r² con 1/r.
      - Olvidar el signo del producto q₁q₂.
      - Aplicar la fórmula puntual a distribuciones extendidas sin justificación.
    en:
      - Confusing 1/r² with 1/r.
      - Forgetting the sign of q₁q₂.
      - Applying the point formula to extended distributions without justification.
