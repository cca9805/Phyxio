magnitudes:
- id: fuerza_electrica_de_coulomb
  symbol: F_C
  nombre:
    es: Fuerza eléctrica de Coulomb
    en: Coulomb electric force
  descripcion:
    es: Magnitud de la fuerza que ejerce una carga puntual sobre otra en el vacío.
    en: Magnitude of the force exerted by one point charge on another in vacuum.
  unidad_si: N
  dimension: '[M L T^-2]'
  is_vector: true
  components:
  - F_C_x
  - F_C_y
  - F_C_z
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - ley de Coulomb
  - campo eléctrico de carga puntual
  - equilibrio de cargas
  - selector de partículas
  common_mistake: Confundir la proporcionalidad 1/r con la dependencia cuadrática inversa 1/r^2; duplicar r no divide la fuerza
    entre dos, la divide entre cuatro.
  typical_range: 10^-12 N (electrón-protón en átomo de hidrógeno) a varios N (cargas macroscópicas cargadas por fricción)
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica repulsión (cargas del mismo signo); negativo indica atracción (cargas de signo opuesto). En la fórmula
        escalar se trabaja con el módulo y la dirección se deduce del signo del producto de cargas.
      en: Positive means repulsion (same-sign charges); negative means attraction (opposite-sign charges). In the scalar formula
        the magnitude is used and the direction is inferred from the sign of the charge product.
  zero_behavior:
    allowed: true
    meaning:
      es: Ocurre cuando alguna de las dos cargas es nula o cuando la distancia tiende a infinito. En la práctica, si r tiende
        a infinito la fuerza se anula; si q1 o q2 es cero no hay interacción eléctrica.
      en: Occurs when either charge is zero or when the distance tends to infinity. Practically, if r tends to infinity the
        force vanishes; if q1 or q2 is zero there is no electric interaction.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any real number; sign encodes attraction/repulsion
  interpretation_role:
    primary_for:
    - lectura del módulo de la fuerza entre cargas puntuales
    - determinación del sentido atractivo o repulsivo
    secondary_for:
    - cálculo del campo eléctrico producido por carga puntual
    - equilibrio electrostático
  graph_binding:
    channels:
    - y_axis_main
  pedagogical_notes:
    es: La dependencia con r^2 (no con r) es el núcleo conceptual del leaf. Cualquier ejercicio debe verificar que el alumno
      la aplica correctamente y no la confunde con una dependencia lineal o con r.
    en: The r^2 (not r) dependence is the conceptual core of the leaf. Any exercise should verify that the student applies
      it correctly and does not confuse it with a linear or 1/r dependence.
- id: k_e
  symbol: k_e
  nombre:
    es: Constante de Coulomb
    en: Coulomb's constant
  descripcion:
    es: Constante de proporcionalidad de la ley de Coulomb en el vacío; relacionada con la permitividad del vacío.
    en: Proportionality constant of Coulomb's law in vacuum; related to the permittivity of free space.
  unidad_si: N·m²·C^-2
  dimension: '[M L^3 T^-4 I^-2]'
  is_vector: false
  components: []
  category: constant
  physical_role: parameter
  used_in:
  - ley de Coulomb
  - campo eléctrico de carga puntual
  common_mistake: Usar el valor numérico de la constante con unidades equivocadas o confundirla con la permitividad del vacío
    directamente. El valor estándar es aproximadamente 8.99×10^9 N·m²·C^-2.
  typical_range: 8.988×10^9 N·m²·C^-2 (constante universal en el vacío)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva; el signo de la fuerza resultante proviene del producto de las cargas, no de la constante.
      en: Always positive; the sign of the resulting force comes from the charge product, not from the constant.
  zero_behavior:
    allowed: false
    meaning:
      es: No puede ser cero; es una constante fundamental del universo.
      en: Cannot be zero; it is a fundamental constant of the universe.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 8.988×10^9 N·m²·C^-2 (exact in vacuum)
  interpretation_role:
    primary_for:
    - escala absoluta de la fuerza de Coulomb
    secondary_for:
    - comparación con permitividad relativa en medios materiales
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: La constante k_e es el factor de escala que convierte el producto de cargas dividido por r^2 en newtons. Su gran valor
      (10^9) explica por qué fuerzas entre cargas pequeñas son ya apreciables en el laboratorio.
    en: The constant k_e is the scale factor that converts the charge product divided by r^2 into newtons. Its large value
      (10^9) explains why forces between small charges are already measurable in the laboratory.
- id: q1
  symbol: q_1
  nombre:
    es: Primera carga eléctrica
    en: First electric charge
  descripcion:
    es: Carga eléctrica de la primera partícula puntual que interviene en la interacción de Coulomb.
    en: Electric charge of the first point particle involved in the Coulomb interaction.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - ley de Coulomb
  - cálculo de la fuerza eléctrica
  common_mistake: Olvidar las unidades (usar microcoulombios sin convertir a culombios) o ignorar el signo al determinar si
    la fuerza es atractiva o repulsiva.
  typical_range: ±1.6×10^-19 C (carga elemental) a ±10^-6 C (cargas de laboratorio por fricción)
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si la carga es positiva (protón, ión positivo); negativo si es negativa (electrón, ión negativo). El signo
        determina si la fuerza sobre q2 es atractiva o repulsiva.
      en: Positive for a positive charge (proton, positive ion); negative for a negative charge (electron, negative ion).
        The sign determines whether the force on q2 is attractive or repulsive.
  zero_behavior:
    allowed: true
    meaning:
      es: Si la primera carga es nula no existe interacción eléctrica; la fuerza de Coulomb es exactamente cero.
      en: If the first charge is zero there is no electric interaction; the Coulomb force is exactly zero.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any real number; typically ±1.6×10^-19 C to ±10^-3 C
  interpretation_role:
    primary_for:
    - determinación de la magnitud de la fuerza de Coulomb
    - determinación del sentido de la fuerza (atracción o repulsión)
    secondary_for:
    - cálculo del campo eléctrico creado por la primera carga
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: El alumno debe distinguir q1 como parámetro de entrada de la ley de Coulomb de la carga de prueba que define el campo.
      La confusión entre carga fuente y carga de prueba es uno de los errores conceptuales más frecuentes en electrostática.
    en: The student must distinguish q1 as an input parameter of Coulomb's law from the test charge that defines the field.
      The confusion between source charge and test charge is one of the most common conceptual errors in electrostatics.
- id: q2
  symbol: q_2
  nombre:
    es: Segunda carga eléctrica
    en: Second electric charge
  descripcion:
    es: Carga eléctrica de la segunda partícula puntual que interviene en la interacción de Coulomb.
    en: Electric charge of the second point particle involved in the Coulomb interaction.
  unidad_si: C
  dimension: '[I T]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - ley de Coulomb
  - cálculo de la fuerza eléctrica
  common_mistake: Confundir q2 con la carga de prueba infinitesimal del campo eléctrico; en Coulomb, ambas cargas son finitas
    y se afectan mutuamente de igual manera (tercera ley de Newton).
  typical_range: ±1.6×10^-19 C (carga elemental) a ±10^-6 C (cargas de laboratorio por fricción)
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo para carga positiva y negativo para carga negativa. Combinado con el signo de q1, determina el carácter
        atractivo o repulsivo de la interacción.
      en: Positive for positive charge and negative for negative charge. Combined with the sign of q1, it determines the attractive
        or repulsive nature of the interaction.
  zero_behavior:
    allowed: true
    meaning:
      es: Si q2 es nula, la fuerza sobre ella es cero y no hay interacción. La carga q1 sigue creando campo, pero no ejerce
        fuerza sobre ninguna carga.
      en: If q2 is zero, the force on it is zero and there is no interaction. The charge q1 still creates a field but exerts
        no force on any charge.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any real number; typically ±1.6×10^-19 C to ±10^-3 C
  interpretation_role:
    primary_for:
    - determinación de la magnitud de la fuerza de Coulomb
    - determinación del sentido de la fuerza sobre la segunda partícula
    secondary_for: []
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: 'La ley de Coulomb es simétrica: la fuerza que q1 ejerce sobre q2 es igual en módulo a la que q2 ejerce sobre q1 (tercera
      ley de Newton), aunque de sentido contrario. Esto es un punto clave en la lectura de resultados.'
    en: 'Coulomb''s law is symmetric: the force that q1 exerts on q2 equals in magnitude the force that q2 exerts on q1 (Newton''s
      third law), though opposite in direction. This is a key point when reading results.'
- id: distancia_entre_cargas
  symbol: r
  nombre:
    es: Distancia entre cargas
    en: Distance between charges
  descripcion:
    es: Distancia que separa los centros de las dos cargas puntuales en la ley de Coulomb.
    en: Distance separating the centres of the two point charges in Coulomb's law.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
  - ley de Coulomb
  - campo eléctrico de carga puntual
  - dependencia radial de la fuerza
  common_mistake: Elevar r a la primera potencia en lugar de al cuadrado; también confundir r con el radio de una esfera cargada,
    que solo se usa cuando la carga está distribuida en la superficie.
  typical_range: 10^-15 m (escala nuclear) a varios metros (escala de laboratorio); en el modelo puntual, r > 0 siempre
  sign_behavior:
    has_sign: false
    meaning:
      es: La distancia es siempre no negativa; un valor de r negativo carece de sentido físico en este modelo.
      en: Distance is always non-negative; a negative r value has no physical meaning in this model.
  zero_behavior:
    allowed: false
    meaning:
      es: r igual a cero implicaría fuerza infinita, lo que señala el límite de validez del modelo de carga puntual. A distancias
        nucleares intervienen otras fuerzas no contempladas por Coulomb.
      en: r equal to zero would imply infinite force, marking the validity limit of the point-charge model. At nuclear distances
        other forces not covered by Coulomb's law come into play.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: r > 0 (strictly positive); typical lab values 10^-3 m to 1 m
  interpretation_role:
    primary_for:
    - lectura de la dependencia cuadrática inversa de la fuerza
    - detección de errores de escala en el resultado
    secondary_for:
    - comparación con radios atómicos o moleculares
  graph_binding:
    channels:
    - x_axis_main
  pedagogical_notes:
    es: El cuadrado en r^2 implica que duplicar la distancia reduce la fuerza a una cuarta parte, no a la mitad. Este comportamiento
      cuadrático es el eje central del leaf y debe reforzarse en cada sección.
    en: The square in r^2 means that doubling the distance reduces the force to one quarter, not one half. This quadratic
      behaviour is the central axis of the leaf and should be reinforced in every section.
- id: campo_electrico_de_carga_puntual
  symbol: E_C
  nombre:
    es: Campo eléctrico de carga puntual
    en: Electric field of point charge
  descripcion:
    es: Intensidad del campo eléctrico creado por una carga puntual q1 a distancia r.
    en: Magnitude of the electric field created by a point charge q1 at distance r.
  unidad_si: N/C
  dimension: '[M L T^-3 I^-1]'
  is_vector: true
  components:
  - E_C_x
  - E_C_y
  - E_C_z
  category: derived
  physical_role: derived
  used_in:
  - campo eléctrico de carga puntual
  - fuerza sobre carga de prueba
  common_mistake: Confundir el campo eléctrico (independiente de q2) con la fuerza de Coulomb (que sí depende de q2). El campo
    existe aunque no haya segunda carga; la fuerza requiere ambas cargas.
  typical_range: 10^11 N/C en la superficie del protón hasta 10^6 N/C en campos de laboratorio de alta tensión
  sign_behavior:
    has_sign: true
    meaning:
      es: 'El signo depende del signo de q1: campo positivo si q1 es positiva (apunta hacia fuera de la carga fuente), negativo
        si q1 es negativa.'
      en: 'The sign depends on the sign of q1: positive field if q1 is positive (points away from the source charge), negative
        if q1 is negative.'
  zero_behavior:
    allowed: true
    meaning:
      es: El campo es nulo en el infinito o cuando q1 es cero. En un punto entre dos cargas iguales y opuestas el campo puede
        también cancelarse.
      en: The field is zero at infinity or when q1 is zero. At a point between two equal and opposite charges the field can
        also cancel.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any real number; magnitude typically 10^2 to 10^11 N/C
  interpretation_role:
    primary_for:
    - lectura del campo eléctrico creado por una sola carga puntual
    - relación entre campo y fuerza sobre carga de prueba
    secondary_for:
    - principio de superposición
  graph_binding:
    channels:
    - y_axis_secondary
  pedagogical_notes:
    es: El campo eléctrico E_C es la razón de la fuerza de Coulomb entre la carga de prueba q2. Comprenderlo como magnitud
      de campo (independiente de q2) es esencial para la transición al concepto de campo eléctrico.
    en: The electric field E_C is the Coulomb force per unit test charge q2. Understanding it as a field quantity (independent
      of q2) is essential for the transition to the concept of electric field.
