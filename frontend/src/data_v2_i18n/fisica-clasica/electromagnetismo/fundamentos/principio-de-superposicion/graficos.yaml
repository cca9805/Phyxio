version: "1.0"
leaf: "principio-de-superposicion"

coord:
  title:
    es: Gráfica Coord · Principio de Superposición
    en: Coord Graph · Superposition Principle
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: campo o fuerza resultante (N/C o N)
    en: resultant field or force (N/C or N)
  xMagnitude: x
  yMagnitude: F_total
  relation:
    es: F_total = ΣF_i (suma vectorial). E_total = ΣE_i. V_total = ΣV_i (suma escalar). La superposición es exacta para campos clásicos lineales.
    en: F_total = ΣF_i (vector sum). E_total = ΣE_i. V_total = ΣV_i (scalar sum). Superposition is exact for classical linear fields.
  physicalReading:
    es: La resultante puede ser mayor, menor o cero según la dirección de los campos individuales. El potencial se suma algebraicamente.
    en: The resultant can be larger, smaller, or zero depending on the direction of individual fields. Potential sums algebraically.
  slopeMeaning:
    es: La pendiente de F_total depende de la distribución de cargas fuente.
    en: The slope of F_total depends on the distribution of source charges.
  interceptMeaning:
    es: El punto de campo nulo (F = 0) ocurre donde las contribuciones se cancelan.
    en: The zero-field point (F = 0) occurs where contributions cancel.
  curvatureMeaning:
    es: La curvatura de la resultante refleja la suma de las curvaturas individuales.
    en: The curvature of the resultant reflects the sum of individual curvatures.
  signMeaning:
    es: El signo de la resultante depende de la dirección dominante.
    en: The sign of the resultant depends on the dominant direction.
  areaMeaning:
    es: Sin interpretación directa general.
    en: No general direct interpretation.
  domainMeaning:
    es: Válido en el régimen clásico lineal (electrostática, magnetostática).
    en: Valid in the classical linear regime (electrostatics, magnetostatics).
  modelConnection:
    es: Principio de superposición lineal de campos electromagnéticos clásicos.
    en: Linear superposition principle of classical electromagnetic fields.
  formulaConnection:
    es: Conecta con F = kΣq_iq_0/r_i², E = kΣq_i/r_i², V = kΣq_i/r_i.
    en: Connects to F = kΣq_iq_0/r_i², E = kΣq_i/r_i², V = kΣq_i/r_i.
  readingFocus:
    es: sumar vectorialmente los campos individuales para obtener la resultante y localizar los puntos de campo nulo.
    en: sum individual fields vectorially to obtain the resultant and locate zero-field points.
  agentHints:
    es:
      - El potencial V se suma algebraicamente (escalar); el campo E, vectorialmente.
      - El punto de campo nulo para dos cargas iguales y del mismo signo está en el punto medio.
      - "Para campos paralelos: |F_total| = |F₁| + |F₂|; antiparalelos: |F_total| = ||F₁| − |F₂||."
    en:
      - Potential V sums algebraically (scalar); field E, vectorially.
      - The zero-field point for two equal same-sign charges is at the midpoint.
      - "For parallel fields: |F_total| = |F₁| + |F₂|; antiparallel: |F_total| = ||F₁| − |F₂||."
  commonMistakes:
    es:
      - Sumar módulos en lugar de vectores.
      - Olvidar que el potencial sí se suma algebraicamente.
      - No identificar los puntos de campo nulo.
    en:
      - Summing magnitudes instead of vectors.
      - Forgetting that potential sums algebraically.
      - Not identifying zero-field points.
