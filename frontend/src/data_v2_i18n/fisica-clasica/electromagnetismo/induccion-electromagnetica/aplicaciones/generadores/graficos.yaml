version: "1.0"
leaf: "generadores"

coord:
  title:
    es: Gráfica Coord · Generadores Eléctricos
    en: Coord Graph · Electric Generators
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: FEM generada ε (V)
    en: generated EMF ε (V)
  xMagnitude: t
  yMagnitude: epsilon
  relation:
    es: ε(t) = NBAω·sin(ωt) = ε_max·sin(ωt). Derivada de Φ_B = NBA·cos(ωt). La rotación mecánica genera una FEM sinusoidal (corriente alterna).
    en: ε(t) = NBAω·sin(ωt) = ε_max·sin(ωt). Derivative of Φ_B = NBA·cos(ωt). Mechanical rotation generates a sinusoidal EMF (alternating current).
  physicalReading:
    es: ε_max = NBAω. Mayor velocidad angular ω o mayor N, B, A → mayor ε_max. La FEM es sinusoidal con frecuencia f = ω/(2π).
    en: ε_max = NBAω. Higher angular speed ω or larger N, B, A → larger ε_max. The EMF is sinusoidal with frequency f = ω/(2π).
  slopeMeaning:
    es: "dε/dt = NBAω²·cos(ωt): máxima en los cruces por cero de ε."
    en: "dε/dt = NBAω²·cos(ωt): maximum at zero crossings of ε."
  interceptMeaning:
    es: ε(0) = 0 si Φ_B es máximo en t = 0 (bobina paralela a B).
    en: ε(0) = 0 if Φ_B is maximum at t = 0 (coil parallel to B).
  curvatureMeaning:
    es: Sinusoidal con amplitud ε_max = NBAω.
    en: Sinusoidal with amplitude ε_max = NBAω.
  signMeaning:
    es: "ε cambia de signo: corriente alterna (CA)."
    en: "ε changes sign: alternating current (AC)."
  areaMeaning:
    es: Área bajo ε(t) = ΔΦ_B (variación del flujo).
    en: Area under ε(t) = ΔΦ_B (flux variation).
  domainMeaning:
    es: t ≥ 0. f = 50 Hz (Europa) o 60 Hz (EEUU).
    en: t ≥ 0. f = 50 Hz (Europe) or 60 Hz (USA).
  modelConnection:
    es: "Generador eléctrico: conversión de energía mecánica en eléctrica mediante inducción."
    en: "Electric generator: conversion of mechanical energy to electrical via induction."
  formulaConnection:
    es: Conecta con ε = NBAω·sin(ωt), Φ_B = NBA·cos(ωt), ε_ef = ε_max/√2.
    en: Connects to ε = NBAω·sin(ωt), Φ_B = NBA·cos(ωt), ε_rms = ε_max/√2.
  readingFocus:
    es: leer ε_max y ω; calcular la frecuencia y el valor eficaz ε_ef = ε_max/√2.
    en: read ε_max and ω; compute the frequency and RMS value ε_rms = ε_max/√2.
  agentHints:
    es:
      - ε_max = NBAω.
      - f = ω/(2π); T = 1/f.
      - "Valor eficaz (RMS): ε_ef = ε_max/√2 ≈ 0.707·ε_max."
    en:
      - ε_max = NBAω.
      - f = ω/(2π); T = 1/f.
      - "RMS value: ε_rms = ε_max/√2 ≈ 0.707·ε_max."
  commonMistakes:
    es:
      - Confundir ε_max con el valor eficaz.
      - Olvidar que ω = 2πf.
      - No multiplicar por N el número de espiras.
    en:
      - Confusing ε_max with the RMS value.
      - Forgetting that ω = 2πf.
      - Not multiplying by N the number of turns.
