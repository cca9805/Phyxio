version: "1.0"
leaf: "motores"

coord:
  title:
    es: Gráfica Coord · Motores Eléctricos
    en: Coord Graph · Electric Motors
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: par motor τ (N·m) o potencia P (W)
    en: motor torque τ (N·m) or power P (W)
  xMagnitude: omega
  yMagnitude: tau
  relation:
    es: τ = NIAB·sin(θ). P = τ·ω. El motor convierte energía eléctrica en mecánica. La FEM contraelectromotriz ε_c = NBAω se opone a la corriente.
    en: τ = NIAB·sin(θ). P = τ·ω. The motor converts electrical energy to mechanical. The back-EMF ε_c = NBAω opposes the current.
  physicalReading:
    es: El par máximo es τ_max = NIAB (para θ = 90°). A mayor ω, mayor FEM contraelectromotriz y menor corriente.
    en: Maximum torque τ_max = NIAB (at θ = 90°). Higher ω → larger back-EMF and smaller current.
  slopeMeaning:
    es: "dP/dω = τ: la pendiente de P(ω) es el par."
    en: "dP/dω = τ: the slope of P(ω) is the torque."
  interceptMeaning:
    es: "P(0) = 0: sin velocidad, sin potencia mecánica."
    en: "P(0) = 0: no speed, no mechanical power."
  curvatureMeaning:
    es: "P = τ·ω: lineal si τ es constante."
    en: "P = τ·ω: linear if τ is constant."
  signMeaning:
    es: "P > 0: el motor realiza trabajo. P < 0: el motor actúa como freno regenerativo."
    en: "P > 0: motor does work. P < 0: motor acts as regenerative brake."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω ≥ 0. La eficiencia η = P_mec/P_elec < 1.
    en: ω ≥ 0. Efficiency η = P_mec/P_elec < 1.
  modelConnection:
    es: "Motor eléctrico: conversión de energía eléctrica en mecánica mediante la fuerza de Lorentz."
    en: "Electric motor: conversion of electrical energy to mechanical via Lorentz force."
  formulaConnection:
    es: Conecta con τ = NIAB·sin(θ), P = τ·ω, ε_c = NBAω, y η = P_mec/P_elec.
    en: Connects to τ = NIAB·sin(θ), P = τ·ω, ε_c = NBAω, and η = P_mec/P_elec.
  readingFocus:
    es: leer el par τ y la velocidad ω; calcular la potencia mecánica P = τ·ω y la eficiencia.
    en: read torque τ and angular velocity ω; compute mechanical power P = τ·ω and efficiency.
  agentHints:
    es:
      - τ_max = NIAB (θ = 90°).
      - "FEM contraelectromotriz: ε_c = NBAω."
      - "Potencia mecánica: P = τ·ω = ε_c·I."
    en:
      - τ_max = NIAB (θ = 90°).
      - "Back-EMF: ε_c = NBAω."
      - "Mechanical power: P = τ·ω = ε_c·I."
  commonMistakes:
    es:
      - Olvidar la FEM contraelectromotriz.
      - Confundir τ máximo con τ en cualquier posición.
      - No calcular la eficiencia.
    en:
      - Forgetting the back-EMF.
      - Confusing maximum τ with τ at any position.
      - Not computing efficiency.
