version: "1.0"
leaf: "transformadores"

coord:
  title:
    es: Gráfica Coord · Transformadores
    en: Coord Graph · Transformers
  xAxis:
    es: número de espiras secundarias N₂
    en: number of secondary turns N₂
  yAxis:
    es: tensión secundaria V₂ (V)
    en: secondary voltage V₂ (V)
  xMagnitude: N2
  yMagnitude: V2
  relation:
    es: "V₂/V₁ = N₂/N₁. I₂/I₁ = N₁/N₂. Para transformador ideal: P₁ = P₂ (sin pérdidas). N₂/N₁: relación de transformación."
    en: "V₂/V₁ = N₂/N₁. I₂/I₁ = N₁/N₂. Ideal transformer: P₁ = P₂ (no losses). N₂/N₁: transformation ratio."
  physicalReading:
    es: "Recta de pendiente V₁/N₁: mayor N₂ → mayor V₂ (transformador elevador). Menor N₂ → menor V₂ (reductor)."
    en: "Line with slope V₁/N₁: larger N₂ → larger V₂ (step-up transformer). Smaller N₂ → smaller V₂ (step-down)."
  slopeMeaning:
    es: "Pendiente = V₁/N₁: tensión por espira en el primario."
    en: "Slope = V₁/N₁: voltage per turn in the primary."
  interceptMeaning:
    es: "V₂(0) = 0: sin espiras secundarias, sin tensión secundaria."
    en: "V₂(0) = 0: no secondary turns, no secondary voltage."
  curvatureMeaning:
    es: "Lineal: V₂ ∝ N₂."
    en: "Linear: V₂ ∝ N₂."
  signMeaning:
    es: "V₂ > V₁ si N₂ > N₁ (elevador). V₂ < V₁ si N₂ < N₁ (reductor)."
    en: "V₂ > V₁ if N₂ > N₁ (step-up). V₂ < V₁ if N₂ < N₁ (step-down)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "N₂ > 0. Eficiencia real η < 1 (pérdidas en el hierro y en el cobre)."
    en: "N₂ > 0. Real efficiency η < 1 (iron and copper losses)."
  modelConnection:
    es: "Transformador ideal: inductancia mutua con k = 1 y sin pérdidas."
    en: "Ideal transformer: mutual inductance with k = 1 and no losses."
  formulaConnection:
    es: Conecta con V₂/V₁ = N₂/N₁ = I₁/I₂, P₁ = P₂ (ideal), y la inducción mutua.
    en: Connects to V₂/V₁ = N₂/N₁ = I₁/I₂, P₁ = P₂ (ideal), and mutual induction.
  readingFocus:
    es: leer la relación N₂/N₁ para determinar si es elevador o reductor y calcular V₂ = V₁·N₂/N₁.
    en: read the ratio N₂/N₁ to determine step-up or step-down and compute V₂ = V₁·N₂/N₁.
  agentHints:
    es:
      - "Elevador: N₂ > N₁ → V₂ > V₁."
      - "Reductor: N₂ < N₁ → V₂ < V₁."
      - I₁/I₂ = N₂/N₁ (conservación de potencia).
    en:
      - "Step-up: N₂ > N₁ → V₂ > V₁."
      - "Step-down: N₂ < N₁ → V₂ < V₁."
      - I₁/I₂ = N₂/N₁ (power conservation).
  commonMistakes:
    es:
      - Invertir la relación V₂/V₁ = N₂/N₁.
      - Olvidar que I₁/I₂ = N₂/N₁ (inverso de V).
      - Aplicar la fórmula del transformador ideal a transformadores reales sin corregir las pérdidas.
    en:
      - Inverting the ratio V₂/V₁ = N₂/N₁.
      - Forgetting that I₁/I₂ = N₂/N₁ (inverse of V).
      - Applying the ideal transformer formula to real transformers without correcting for losses.
