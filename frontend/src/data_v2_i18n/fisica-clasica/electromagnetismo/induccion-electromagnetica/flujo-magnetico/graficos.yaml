version: "1.0"
leaf: "flujo-magnetico"

coord:
  title:
    es: Gráfica Coord · Flujo Magnético
    en: Coord Graph · Magnetic Flux
  xAxis:
    es: ángulo θ (°) entre B y la normal a la superficie
    en: angle θ (°) between B and the surface normal
  yAxis:
    es: flujo magnético Φ_B (Wb)
    en: magnetic flux Φ_B (Wb)
  xMagnitude: theta
  yMagnitude: Phi_B
  relation:
    es: "Φ_B = B·A·cos(θ). Máximo para θ = 0° (B ⊥ superficie). Nulo para θ = 90° (B ∥ superficie). Ley de Gauss magnética: ∮B·dA = 0."
    en: "Φ_B = B·A·cos(θ). Maximum for θ = 0° (B ⊥ surface). Zero for θ = 90° (B ∥ surface). Magnetic Gauss law: ∮B·dA = 0."
  physicalReading:
    es: Curva cosenoidal. Φ_B es máximo cuando B es perpendicular a la superficie y cero cuando es paralelo.
    en: Cosine curve. Φ_B is maximum when B is perpendicular to the surface and zero when parallel.
  slopeMeaning:
    es: "dΦ_B/dθ = −B·A·sin(θ): cero en θ = 0° y máximo en θ = 90°."
    en: "dΦ_B/dθ = −B·A·sin(θ): zero at θ = 0° and maximum at θ = 90°."
  interceptMeaning:
    es: "Φ_B(0°) = B·A: flujo máximo."
    en: "Φ_B(0°) = B·A: maximum flux."
  curvatureMeaning:
    es: "Cosenoidal: máximo en θ = 0°, nulo en θ = 90°."
    en: "Cosinusoidal: maximum at θ = 0°, zero at θ = 90°."
  signMeaning:
    es: Φ_B puede ser negativo si B apunta en sentido contrario a la normal.
    en: Φ_B can be negative if B points opposite to the surface normal.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0° ≤ θ ≤ 180°. 1 Wb = 1 T·m².
    en: 0° ≤ θ ≤ 180°. 1 Wb = 1 T·m².
  modelConnection:
    es: Flujo magnético y ley de Gauss para el campo B.
    en: "Magnetic flux and Gauss's law for field B."
  formulaConnection:
    es: Conecta con Φ_B = B·A·cos(θ), ε = −dΦ_B/dt, y la ley de Gauss B.
    en: "Connects to Φ_B = B·A·cos(θ), ε = −dΦ_B/dt, and Gauss's law for B."
  readingFocus:
    es: leer el máximo Φ_B = BA y el ángulo θ que lo produce; identificar el cero de flujo.
    en: read the maximum Φ_B = BA and the angle θ producing it; identify the zero-flux angle.
  agentHints:
    es:
      - "Φ_B = BA·cos(θ): máximo para θ = 0°."
      - "∮B·dA = 0: no existen monopolos magnéticos."
      - 1 Wb = 1 V·s = 1 T·m².
    en:
      - "Φ_B = BA·cos(θ): maximum for θ = 0°."
      - "∮B·dA = 0: no magnetic monopoles."
      - 1 Wb = 1 V·s = 1 T·m².
  commonMistakes:
    es:
      - Confundir el ángulo θ con el ángulo del campo respecto a la superficie (usar θ con la normal).
      - Olvidar el coseno (usar sin en lugar de cos).
      - No distinguir flujo a través de una superficie de la circulación.
    en:
      - Confusing θ with the angle of the field to the surface (use θ with the normal).
      - Forgetting the cosine (using sin instead of cos).
      - Not distinguishing flux through a surface from circulation.
