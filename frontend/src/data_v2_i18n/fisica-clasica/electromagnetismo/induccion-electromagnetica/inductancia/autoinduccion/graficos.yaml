version: "1.0"
leaf: "autoinduccion"

coord:
  title:
    es: Gráfica Coord · Autoinducción
    en: Coord Graph · Self-Induction
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: corriente I (A) o FEM autoinducida ε_L (V)
    en: current I (A) or self-induced EMF ε_L (V)
  xMagnitude: t
  yMagnitude: I
  relation:
    es: "ε_L = −L·dI/dt. En un circuito RL: I(t) = (ε/R)(1 − e^(−t/τ_L)), τ_L = L/R. La bobina se opone a los cambios de corriente."
    en: "ε_L = −L·dI/dt. In an RL circuit: I(t) = (ε/R)(1 − e^(−t/τ_L)), τ_L = L/R. The inductor opposes current changes."
  physicalReading:
    es: "τ_L = L/R: constante de tiempo del circuito RL. En t = τ_L: I = 63.2% de I_max. Energía almacenada: E_L = LI²/2."
    en: "τ_L = L/R: RL circuit time constant. At t = τ_L: I = 63.2% of I_max. Stored energy: E_L = LI²/2."
  slopeMeaning:
    es: Pendiente inicial = ε/L (corriente máxima de crecimiento).
    en: Initial slope = ε/L (maximum current growth rate).
  interceptMeaning:
    es: I(0) = 0 en circuito RL al conectar.
    en: I(0) = 0 in RL circuit upon connection.
  curvatureMeaning:
    es: Exponencial de crecimiento con constante τ_L = L/R.
    en: Growing exponential with constant τ_L = L/R.
  signMeaning:
    es: "ε_L < 0 si I aumenta (frena el aumento). ε_L > 0 si I decrece (mantiene la corriente)."
    en: "ε_L < 0 if I increases (opposes increase). ε_L > 0 if I decreases (sustains current)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "t ≥ 0. L (H) depende de la geometría de la bobina: L = μ₀N²A/l."
    en: "t ≥ 0. L (H) depends on coil geometry: L = μ₀N²A/l."
  modelConnection:
    es: "Autoinducción: la bobina actúa como 'inercia eléctrica' (análogo a la masa)."
    en: "Self-induction: the inductor acts as 'electrical inertia' (analogous to mass)."
  formulaConnection:
    es: Conecta con ε_L = −L·dI/dt, E_L = LI²/2, τ_L = L/R, y los circuitos RL.
    en: Connects to ε_L = −L·dI/dt, E_L = LI²/2, τ_L = L/R, and RL circuits.
  readingFocus:
    es: leer τ_L = L/R del exponencial y calcular la energía almacenada E_L = LI²/2.
    en: read τ_L = L/R from the exponential and compute stored energy E_L = LI²/2.
  agentHints:
    es:
      - τ_L = L/R (análogo a τ_RC = RC).
      - E_L = LI²/2 (análogo a E_C = CV²/2).
      - La bobina se comporta como circuito abierto en DC estacionario.
    en:
      - τ_L = L/R (analogous to τ_RC = RC).
      - E_L = LI²/2 (analogous to E_C = CV²/2).
      - The inductor behaves as an open circuit in steady DC.
  commonMistakes:
    es:
      - Confundir τ_L = L/R con τ_RC = RC.
      - Olvidar que la bobina se opone a cambios (no bloquea la corriente estacionaria).
      - No calcular la energía almacenada E_L = LI²/2.
    en:
      - Confusing τ_L = L/R with τ_RC = RC.
      - Forgetting that the inductor opposes changes (does not block steady current).
      - Not computing stored energy E_L = LI²/2.
