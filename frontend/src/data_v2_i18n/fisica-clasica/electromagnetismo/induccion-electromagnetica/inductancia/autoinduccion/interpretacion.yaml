      text:
        es: El resultado [[L]] indica la magnitud física principal.
        en: The result [[L]] indicates the main physical quantity.
    physical_reading_rules:
    - id: L_physical_reading_base
      when: 'true'
      status: info
      text:
        es: La inductancia propia [[L]] indica la inercia electromagnética de la bobina; un valor mayor significa mayor oposición ante variaciones de corriente.
