version: "1.0"
leaf: "inductancia-mutua"

coord:
  title:
    es: Gráfica Coord · Inductancia Mutua
    en: Coord Graph · Mutual Inductance
  xAxis:
    es: corriente I₁ (A)
    en: current I₁ (A)
  yAxis:
    es: flujo mutuo Φ₂₁ (Wb) o FEM inducida ε₂ (V)
    en: mutual flux Φ₂₁ (Wb) or induced EMF ε₂ (V)
  xMagnitude: I1
  yMagnitude: Phi_21
  relation:
    es: "Φ₂₁ = M·I₁. ε₂ = −M·dI₁/dt. M (H): inductancia mutua, simétrica: M₁₂ = M₂₁. Mide la 'comunicación magnética' entre dos bobinas."
    en: "Φ₂₁ = M·I₁. ε₂ = −M·dI₁/dt. M (H): mutual inductance, symmetric: M₁₂ = M₂₁. Measures the 'magnetic coupling' between two coils."
  physicalReading:
    es: Recta Φ₂₁ vs I₁ de pendiente M. Mayor M → mayor acoplamiento. M ≤ √(L₁L₂) (factor de acoplamiento k = M/√(L₁L₂) ≤ 1).
    en: Line Φ₂₁ vs I₁ with slope M. Larger M → stronger coupling. M ≤ √(L₁L₂) (coupling factor k = M/√(L₁L₂) ≤ 1).
  slopeMeaning:
    es: "Pendiente = M (H): inductancia mutua."
    en: "Slope = M (H): mutual inductance."
  interceptMeaning:
    es: "Φ₂₁(0) = 0: sin corriente en la bobina 1, sin flujo mutuo."
    en: "Φ₂₁(0) = 0: no current in coil 1, no mutual flux."
  curvatureMeaning:
    es: Lineal (para M constante).
    en: Linear (for constant M).
  signMeaning:
    es: El signo de ε₂ depende de la orientación relativa de las bobinas.
    en: The sign of ε₂ depends on the relative orientation of the coils.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0 ≤ M ≤ √(L₁L₂). M depende de la geometría y la distancia.
    en: 0 ≤ M ≤ √(L₁L₂). M depends on geometry and distance.
  modelConnection:
    es: Inductancia mutua y acoplamiento magnético entre bobinas.
    en: Mutual inductance and magnetic coupling between coils.
  formulaConnection:
    es: Conecta con ε₂ = −M·dI₁/dt, Φ₂₁ = M·I₁, k = M/√(L₁L₂), y transformadores.
    en: Connects to ε₂ = −M·dI₁/dt, Φ₂₁ = M·I₁, k = M/√(L₁L₂), and transformers.
  readingFocus:
    es: leer la pendiente M y calcular la FEM inducida en la bobina 2 para una dI₁/dt dada.
    en: read the slope M and compute the induced EMF in coil 2 for a given dI₁/dt.
  agentHints:
    es:
      - "M simétrica: M₁₂ = M₂₁."
      - "k = 1: acoplamiento perfecto (transformador ideal)."
      - "Bobinas ortogonales: M ≈ 0."
    en:
      - "M is symmetric: M₁₂ = M₂₁."
      - "k = 1: perfect coupling (ideal transformer)."
      - "Orthogonal coils: M ≈ 0."
  commonMistakes:
    es:
      - Confundir M con L (autoinductancia).
      - Olvidar el signo de ε₂ (depende de la orientación).
      - No verificar k ≤ 1.
    en:
      - Confusing M with L (self-inductance).
      - Forgetting the sign of ε₂ (depends on orientation).
      - Not verifying k ≤ 1.
