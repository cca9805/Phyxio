version: "1.0"
leaf: "ley-de-faraday"

coord:
  title:
    es: Gráfica Coord · Ley de Faraday
    en: "Coord Graph · Faraday's Law"
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: flujo magnético Φ_B (Wb) o FEM ε (V)
    en: magnetic flux Φ_B (Wb) or EMF ε (V)
  xMagnitude: t
  yMagnitude: Phi_B
  relation:
    es: ε = −dΦ_B/dt. La FEM inducida es la derivada temporal negativa del flujo magnético. El flujo Φ_B = B·A·cos(θ).
    en: ε = −dΦ_B/dt. The induced EMF is the negative time derivative of the magnetic flux. Flux Φ_B = B·A·cos(θ).
  physicalReading:
    es: Cuando Φ_B varía rápidamente → ε grande. ε es proporcional a la pendiente de Φ_B(t). El signo negativo es la ley de Lenz.
    en: "When Φ_B varies rapidly → large ε. ε is proportional to the slope of Φ_B(t). The negative sign is Lenz's law."
  slopeMeaning:
    es: "Pendiente = dΦ_B/dt: flujo por unidad de tiempo. La FEM inducida ε = −pendiente."
    en: "Slope = dΦ_B/dt: flux per unit time. Induced EMF ε = −slope."
  interceptMeaning:
    es: Φ_B(0) = valor inicial del flujo. ε = 0 cuando Φ_B = constante.
    en: Φ_B(0) = initial flux value. ε = 0 when Φ_B = constant.
  curvatureMeaning:
    es: La curvatura de Φ_B(t) indica variación de la FEM en el tiempo.
    en: Curvature of Φ_B(t) indicates variation of EMF over time.
  signMeaning:
    es: ε < 0 cuando Φ_B aumenta (la corriente inducida se opone al aumento, ley de Lenz).
    en: "ε < 0 when Φ_B increases (induced current opposes increase, Lenz's law)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0. Válido para circuitos cerrados en campos magnéticos variables.
    en: t ≥ 0. Valid for closed circuits in varying magnetic fields.
  modelConnection:
    es: Ley de Faraday-Neumann-Lenz de la inducción electromagnética.
    en: Faraday-Neumann-Lenz law of electromagnetic induction.
  formulaConnection:
    es: Conecta con ε = −dΦ_B/dt, Φ_B = NBA·cos(ωt) (generador), y la ley de Lenz.
    en: "Connects to ε = −dΦ_B/dt, Φ_B = NBA·cos(ωt) (generator), and Lenz's law."
  readingFocus:
    es: leer la pendiente de Φ_B(t) para calcular la FEM inducida; identificar el signo con la ley de Lenz.
    en: "read the slope of Φ_B(t) to compute the induced EMF; identify the sign using Lenz's law."
  agentHints:
    es:
      - ε = −N·dΦ_B/dt para una bobina de N espiras.
      - "Generador: Φ_B = NBA·cos(ωt) → ε = NBAω·sin(ωt)."
      - "Transformador: ε₂/ε₁ = N₂/N₁."
    en:
      - ε = −N·dΦ_B/dt for a coil of N turns.
      - "Generator: Φ_B = NBA·cos(ωt) → ε = NBAω·sin(ωt)."
      - "Transformer: ε₂/ε₁ = N₂/N₁."
  commonMistakes:
    es:
      - Olvidar el signo negativo (ley de Lenz).
      - No multiplicar por N para una bobina.
      - Confundir flujo Φ_B con el campo B.
    en:
      - "Forgetting the negative sign (Lenz's law)."
      - Not multiplying by N for a coil.
      - Confusing flux Φ_B with field B.
