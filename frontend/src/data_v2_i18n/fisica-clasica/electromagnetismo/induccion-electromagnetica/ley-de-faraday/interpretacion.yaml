targets:
  epsilon_ind:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: respuesta electrica inducida por cambio de flujo
      en: electrical response induced by flux change
    summary_rules:
    - id: eps_summary
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_ind]] mide la fem inducida por el cambio de flujo enlazado.'
        en: '[[epsilon_ind]] measures the emf induced by linked-flux change.'
    physical_reading_rules:
    - id: eps_reading
      when: 'true'
      status: ok
      text:
        es: Mayor modulo de [[epsilon_ind]] indica cambio de flujo mas rapido, mas espiras o ambos.
        en: Larger [[epsilon_ind]] magnitude indicates faster flux change, more turns, or both.
    coherence_rules:
    - id: eps_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de [[epsilon_ind]] debe oponerse al cambio indicado por [[DeltaPhi_B]].
        en: The sign of [[epsilon_ind]] must oppose the change indicated by [[DeltaPhi_B]].
    model_validity_rules:
    - id: eps_validity
      when: 'true'
      status: ok
      text:
        es: La lectura media supone que el cambio puede resumirse durante [[Deltat]].
        en: The average reading assumes the change can be summarized during [[Deltat]].
    graph_rules:
    - id: eps_graph
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_ind]] se grafica contra [[r_Phi]] con pendiente controlada por [[N]].'
        en: '[[epsilon_ind]] is graphed against [[r_Phi]] with slope controlled by [[N]].'
    likely_errors:
    - id: eps_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[epsilon_ind]] con una lectura aislada es un error frecuente: Error tipico: predecir fem con flujo
          constante.'
        en: 'A common mistake is to interpret [[epsilon_ind]] in isolation: Typical error: predicting emf from constant flux.'
    next_step_rules:
    - id: eps_next
      when: 'true'
      status: ok
      text:
        es: Comprueba [[DeltaPhi_B]], [[Deltat]] y [[N]] antes de interpretar polaridad.
        en: Check [[DeltaPhi_B]], [[Deltat]], and [[N]] before interpreting polarity.
    physical_intuition:
    - id: epsilon_ind_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[epsilon_ind]] describe el estado dinámico.
        en: Intuitively, [[epsilon_ind]] describes the dynamic state.
    limiting_cases:
    - id: epsilon_ind_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[epsilon_ind]].
        en: Check limiting cases of [[epsilon_ind]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
