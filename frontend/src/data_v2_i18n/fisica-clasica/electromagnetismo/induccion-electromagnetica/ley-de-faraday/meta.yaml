idea_fisica_dominante:
  es: Una fem inducida aparece cuando cambia el flujo magnetico enlazado por un circuito.
  en: Induced emf appears when the magnetic flux linked by a circuit changes.
pregunta_fisica_central:
  es: ¿Como determina la rapidez de cambio del flujo magnetico la fem inducida en un circuito?
  en: How does the rate of change of magnetic flux determine the emf induced in a circuit?
error_conceptual_dominante:
  es: Creer que basta con tener flujo magnetico, cuando la induccion requiere cambio de flujo enlazado.
  en: Believing magnetic flux alone is enough, when induction requires linked flux change.
criterio_de_aplicabilidad:
  es: Aplica si puede identificarse un circuito y un flujo magnetico enlazado que cambia en el tiempo.
  en: It applies if a circuit and a linked magnetic flux changing in time can be identified.
criterio_de_fallo_del_modelo:
  es: Falla como estimacion simple si hay geometria cambiante compleja, campos no uniformes sin integracion o transitorios
    radiativos.
  en: It fails as a simple estimate with complex changing geometry, nonuniform fields without integration, or radiative transients.
