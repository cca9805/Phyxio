version: "1.0"
leaf: "ley-de-lenz"

coord:
  title:
    es: Gráfica Coord · Ley de Lenz
    en: "Coord Graph · Lenz's Law"
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: flujo Φ_B inducido o corriente inducida I (A)
    en: induced flux Φ_B or induced current I (A)
  xMagnitude: t
  yMagnitude: I_ind
  relation:
    es: La ley de Lenz establece que la corriente inducida crea un campo magnético que se opone a la variación del flujo que la origina. Es el signo negativo en ε = −dΦ_B/dt.
    en: "Lenz's law states that the induced current creates a magnetic field opposing the flux change that caused it. It is the negative sign in ε = −dΦ_B/dt."
  physicalReading:
    es: "Cuando Φ_B externo aumenta: la corriente inducida genera Φ_B opuesto (que frena el aumento). Es una manifestación de la conservación de la energía."
    en: "When external Φ_B increases: induced current generates opposing Φ_B (slowing the increase). It is a manifestation of energy conservation."
  slopeMeaning:
    es: La pendiente de Φ_B determina el signo y la magnitud de la corriente inducida.
    en: The slope of Φ_B determines the sign and magnitude of the induced current.
  interceptMeaning:
    es: I_ind = 0 cuando dΦ_B/dt = 0 (flujo constante).
    en: I_ind = 0 when dΦ_B/dt = 0 (constant flux).
  curvatureMeaning:
    es: La variación de la pendiente de Φ_B produce variación en I_ind.
    en: Variation in the slope of Φ_B produces variation in I_ind.
  signMeaning:
    es: El signo de I_ind es opuesto al que produciría un aumento del flujo (conservación de energía).
    en: The sign of I_ind opposes what would cause an increase in flux (energy conservation).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0. Aplica a cualquier circuito cerrado en un campo magnético variable.
    en: t ≥ 0. Applies to any closed circuit in a varying magnetic field.
  modelConnection:
    es: "Ley de Lenz: consecuencia de la conservación de la energía en inducción EM."
    en: "Lenz's law: consequence of energy conservation in EM induction."
  formulaConnection:
    es: Conecta con ε = −dΦ_B/dt, I_ind = ε/R, y la regla de la mano derecha.
    en: Connects to ε = −dΦ_B/dt, I_ind = ε/R, and the right-hand rule.
  readingFocus:
    es: determinar el sentido de la corriente inducida que se opone a la variación del flujo externo.
    en: determine the direction of the induced current opposing the external flux change.
  agentHints:
    es:
      - "Regla nemotécnica: la inducción se 'resiste' al cambio (como la inercia)."
      - "Frenado magnético: I_ind genera una fuerza opuesta al movimiento."
      - Los trenes de levitación magnética usan la ley de Lenz.
    en:
      - "Mnemonic: induction 'resists' change (like inertia)."
      - "Magnetic braking: I_ind generates a force opposing motion."
      - "Magnetic levitation trains use Lenz's law."
  commonMistakes:
    es:
      - Invertir el signo de la corriente inducida.
      - Pensar que la inducción cancela completamente el flujo (solo se opone al cambio).
      - No aplicar la regla de la mano derecha correctamente.
    en:
      - Inverting the sign of the induced current.
      - Thinking induction completely cancels the flux (it only opposes the change).
      - Not applying the right-hand rule correctly.
