targets:
  epsilon_ind:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: fem cuya polaridad expresa Lenz
      en: emf whose polarity expresses Lenz
    summary_rules:
    - id: eps_summary
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_ind]] debe leerse con signo porque representa polaridad inducida.'
        en: '[[epsilon_ind]] must be read with sign because it represents induced polarity.'
    physical_reading_rules:
    - id: eps_reading
      when: 'true'
      status: ok
      text:
        es: Su signo se opone al cambio de flujo, no necesariamente al flujo existente.
        en: Its sign opposes flux change, not necessarily existing flux.
    coherence_rules:
    - id: eps_coherence
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_ind]] y [[r_Phi]] deben tener signos opuestos en la convencion elegida.'
        en: '[[epsilon_ind]] and [[r_Phi]] must have opposite signs in the chosen convention.'
    model_validity_rules:
    - id: eps_validity
      when: 'true'
      status: ok
      text:
        es: La polaridad solo es interpretable si normal y sentido de corriente estan definidos.
        en: Polarity is interpretable only if normal and current direction are defined.
    graph_rules:
    - id: eps_graph
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[epsilon_ind]] baja cuando [[r_Phi]] sube si [[N]] es positivo.
        en: In the graph, [[epsilon_ind]] decreases when [[r_Phi]] increases if [[N]] is positive.
    likely_errors:
    - id: eps_error
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[epsilon_ind]] con una lectura aislada es un error frecuente: Error tipico: dar solo el modulo y perder
          la polaridad.'
        en: 'A common mistake is to interpret [[epsilon_ind]] in isolation: Typical error: giving only magnitude and losing
          polarity.'
    next_step_rules:
    - id: eps_next
      when: 'true'
      status: ok
      text:
        es: Interpreta que corriente inducida produciria esa polaridad.
        en: Interpret what induced current would produce that polarity.
    physical_intuition:
    - id: epsilon_ind_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[epsilon_ind]] describe el estado dinámico.
        en: Intuitively, [[epsilon_ind]] describes the dynamic state.
    limiting_cases:
    - id: epsilon_ind_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[epsilon_ind]].
        en: Check limiting cases of [[epsilon_ind]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
