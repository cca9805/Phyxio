magnitudes:
- id: epsilon_ind
  symbol: \varepsilon_{ind}
  nombre:
    es: fem inducida
    en: induced emf
  descripcion:
    es: Fem cuya polaridad se orienta segun la oposicion de Lenz.
    en: Emf whose polarity is oriented according to Lenz opposition.
  unidad_si: V
  dimension: '[M L^2 T^-3 I^-1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - ley_lenz_faraday
  - polaridad_inducida
  common_mistake: Leer solo el modulo y perder la polaridad inducida.
  typical_range: 1e-6 V a 1e5 V segun rapidez de cambio
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica polaridad opuesta al cambio de flujo.
      en: The sign indicates polarity opposed to flux change.
  zero_behavior:
    allowed: true
    meaning:
      es: Es nula si no hay cambio de flujo enlazado.
      en: It is zero if there is no linked flux change.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - polaridad_inducida
    secondary_for:
    - lectura_de_lenz
  graph_binding:
    channels:
    - y_axis
    - warning_color
  pedagogical_notes:
    es: epsilon_ind debe interpretarse con signo, no solo como voltaje positivo.
    en: epsilon_ind must be interpreted with sign, not only as positive voltage.
- id: cambio_de_flujo_magnetico
  symbol: \Delta \Phi_B
  nombre:
    es: cambio de flujo magnetico
    en: magnetic flux change
  descripcion:
    es: Variacion del flujo magnetico enlazado que activa la oposicion inducida.
    en: Variation of linked magnetic flux activating induced opposition.
  unidad_si: Wb
  dimension: '[M L^2 T^-2 I^-1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - ley_lenz_faraday
  - tasa_cambio_flujo
  common_mistake: Oponer la induccion al flujo presente, no al cambio de flujo.
  typical_range: -10 Wb a 10 Wb en estimaciones introductorias
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la normal elegida para la superficie.
      en: The sign depends on the chosen surface normal.
  zero_behavior:
    allowed: true
    meaning:
      es: Cambio nulo implica ausencia de polaridad inducida media.
      en: Zero change implies absence of average induced polarity.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - causa_del_signo
    secondary_for:
    - flujo_enlazado
  graph_binding:
    channels:
    - delta_marker
  pedagogical_notes:
    es: DeltaPhi_B fija que debe ser contrarrestado por la fem inducida.
    en: DeltaPhi_B sets what must be counteracted by the induced emf.
- id: intervalo_de_tiempo
  symbol: \Delta t
  nombre:
    es: intervalo de tiempo
    en: time interval
  descripcion:
    es: Duracion durante la cual ocurre el cambio de flujo.
    en: Duration over which flux change occurs.
  unidad_si: s
  dimension: '[T]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - ley_lenz_faraday
  - tasa_cambio_flujo
  common_mistake: Olvidar que cambios mas rapidos producen fem mayor.
  typical_range: 1e-9 s a 10 s en transitorios electromagneticos
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como duracion positiva.
      en: It is used as a positive duration.
  zero_behavior:
    allowed: false
    meaning:
      es: Intervalo nulo hace indefinida la rapidez media.
      en: Zero interval makes the average rate undefined.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - rapidez_de_cambio
    secondary_for:
    - escala_de_fem
  graph_binding:
    channels:
    - time_scale
  pedagogical_notes:
    es: Deltat controla el modulo de la fem, no la idea de oposicion.
    en: Deltat controls emf magnitude, not the idea of opposition.
- id: rapidez_media_de_cambio_de_flujo
  symbol: r_\Phi
  nombre:
    es: rapidez media de cambio de flujo
    en: average flux-change rate
  descripcion:
    es: Cambio de flujo por unidad de tiempo con signo segun la normal.
    en: Flux change per unit time with sign set by the normal.
  unidad_si: Wb/s
  dimension: '[M L^2 T^-3 I^-1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - ley_lenz_tasa
  common_mistake: Olvidar que su signo decide la polaridad inducida.
  typical_range: 1e-6 Wb/s a 1e5 Wb/s segun dispositivo
  sign_behavior:
    has_sign: true
    meaning:
      es: Signo positivo indica aumento de flujo respecto a la normal.
      en: Positive sign indicates flux increase relative to the normal.
  zero_behavior:
    allowed: true
    meaning:
      es: Rapidez nula implica fem media nula.
      en: Zero rate implies zero average emf.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - pendiente_de_flujo
    secondary_for:
    - grafico
  graph_binding:
    channels:
    - x_axis
  pedagogical_notes:
    es: r_Phi resume el signo y rapidez del cambio que Lenz contrarresta.
    en: r_Phi summarizes the sign and rate of change that Lenz counteracts.
- id: numero_de_espiras
  symbol: N
  nombre:
    es: numero de espiras
    en: number of turns
  descripcion:
    es: Cantidad de vueltas que suman la fem inducida.
    en: Number of turns adding induced emf.
  unidad_si: '1'
  dimension: dimensionless
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - ley_lenz_faraday
  - ley_lenz_tasa
  common_mistake: Confundir mas espiras con cambio de sentido; solo amplifican modulo.
  typical_range: 1 a 100000 en bobinas reales
  sign_behavior:
    has_sign: false
    meaning:
      es: Es un conteo positivo.
      en: It is a positive count.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin espiras no hay bobina enlazada.
      en: Without turns there is no linked coil.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - amplificacion
    secondary_for:
    - diseño_de_bobinas
  graph_binding:
    channels:
    - parameter_control
  pedagogical_notes:
    es: N amplifica la fem, pero el sentido lo fija el signo del cambio de flujo.
    en: N amplifies emf, but direction is set by the sign of flux change.
- id: s_flujo
  symbol: s_{\Phi}
  nombre:
    es: signo del cambio de flujo
    en: sign of flux change
  descripcion:
    es: Indicador adimensional del sentido de aumento o disminucion del flujo.
    en: Dimensionless indicator of the direction of flux increase or decrease.
  unidad_si: '1'
  dimension: dimensionless
  is_vector: false
  components: []
  category: conceptual
  physical_role: core_physical_quantity
  used_in:
  - regla_signos_lenz
  common_mistake: Asignar signo sin fijar normal de superficie.
  typical_range: -1 a 1 como signo conceptual
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica aumento respecto a la normal elegida.
      en: Positive indicates increase relative to the chosen normal.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa ausencia de cambio.
      en: Zero represents no change.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: '[-1, 1]'
  interpretation_role:
    primary_for:
    - sentido_del_cambio
    secondary_for:
    - polaridad
  graph_binding:
    channels:
    - sign_marker
  pedagogical_notes:
    es: s_flujo no es una nueva fuerza; codifica el sentido del cambio.
    en: s_flujo is not a new force; it encodes the direction of change.
- id: s_ind
  symbol: s_{ind}
  nombre:
    es: signo inducido
    en: induced sign
  descripcion:
    es: Indicador adimensional de la polaridad inducida opuesta al cambio.
    en: Dimensionless indicator of induced polarity opposed to change.
  unidad_si: '1'
  dimension: dimensionless
  is_vector: false
  components: []
  category: conceptual
  physical_role: core_physical_quantity
  used_in:
  - regla_signos_lenz
  common_mistake: Hacerlo igual al signo del cambio de flujo.
  typical_range: -1 a 1 como signo conceptual
  sign_behavior:
    has_sign: true
    meaning:
      es: Su signo se toma opuesto al cambio que lo produce.
      en: Its sign is taken opposite to the change that produces it.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa ausencia de polaridad inducida media.
      en: Zero represents absence of average induced polarity.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: '[-1, 1]'
  interpretation_role:
    primary_for:
    - polaridad_de_lenz
    secondary_for:
    - corriente_inducida
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: s_ind resume que la induccion se opone al cambio, no al campo existente.
    en: s_ind summarizes that induction opposes change, not the existing field.
- id: flujo_magnetico
  symbol: \Phi_B
  nombre:
    es: flujo magnetico
    en: magnetic flux
  descripcion:
    es: Estado de flujo enlazado cuya variacion activa la ley de Lenz.
    en: Linked flux state whose variation activates Lenz's law.
  unidad_si: Wb
  dimension: '[M L^2 T^-2 I^-1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - cambio_de_flujo
  common_mistake: Oponer la corriente inducida al valor de Phi_B y no a su variacion.
  typical_range: 1e-9 Wb a 10 Wb segun sistema
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la normal elegida.
      en: The sign depends on the chosen normal.
  zero_behavior:
    allowed: true
    meaning:
      es: Puede anularse aunque despues cambie.
      en: It may vanish even if it later changes.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - estado_magnetico
    secondary_for:
    - comparacion_de_estados
  graph_binding:
    channels:
    - state_marker
  pedagogical_notes:
    es: Phi_B es estado; Lenz actua ante el cambio de ese estado.
    en: Phi_B is state; Lenz acts against the change of that state.
