- id: fuerza_lorentz_magnetica
  title:
    es: Fuerza de Lorentz magnética
    en: Magnetic Lorentz force
  equation: F_m = q * v * B * sin_theta
  latex: F_m = |q| \, v \, B \, \sin\theta
  rearrangements:
  - target: fuerza_magnetica
    equation: F_m = q * v * B * sin_theta
    latex: F_m = |q| \, v \, B \, \sin\theta
  - target: campo_magnetico
    equation: B = F_m / (q * v * sin_theta)
    latex: B = \frac{F_m}{|q| \, v \, \sin\theta}
  - target: velocidad_de_la_carga
    equation: v = F_m / (q * B * sin_theta)
    latex: v = \frac{F_m}{|q| \, B \, \sin\theta}
  - target: carga_electrica
    equation: q = F_m / (v * B * sin_theta)
    latex: q = \frac{F_m}{v \, B \, \sin\theta}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Módulo de la fuerza que ejerce el campo magnético B sobre una carga q que se mueve con velocidad v formando un ángulo
      θ con B. La fuerza es siempre perpendicular al plano formado por v y B.
    en: Magnitude of the force that magnetic field B exerts on a charge q moving with velocity v at angle θ to B. The force
      is always perpendicular to the plane formed by v and B.
  constraints:
  - v no nula (carga en movimiento)
  - 'ángulo θ entre v y B: 0 ≤ θ ≤ 180°'
  - campo magnético uniforme o evaluado localmente
  validity:
    es: Válida en electrodinámica clásica para velocidades muy inferiores a la luz (v << c). Para velocidades relativistas
      se corrige la masa con el factor de Lorentz.
    en: Valid in classical electrodynamics for velocities much less than light (v << c). For relativistic speeds the mass
      is corrected with the Lorentz factor.
  dimension_check: '[C]·[m/s]·[T] = [C]·[m/s]·[kg/(A·s²)] = [N] ✓'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - movimiento circular de cargas
  - selector de velocidades de Wien
  - espectrómetro de masas
  interpretation_tags:
  - fuerza_perpendicular
  - no_realiza_trabajo
  - dependencia_angular
  result_semantics:
    target: fuerza_magnetica
    kind: scalar_unsigned
    sign_meaning:
      es: El módulo de F_m es positivo; la dirección se determina por el producto vectorial q(v × B).
      en: The magnitude of F_m is positive; the direction is determined by the cross product q(v × B).
    absolute_value_meaning:
      es: Intensidad de la fuerza magnética en newtons; máxima cuando v es perpendicular a B.
      en: Magnetic force strength in newtons; maximum when v is perpendicular to B.
  domain_checks:
  - F_m >= 0
  - v >= 0
  - B >= 0
  - 0 <= theta <= 180
  coherence_checks:
  - Si theta = 0° o theta = 180°, F_m debe ser cero independientemente de v y B.
  - Si theta = 90°, F_m es máximo y vale abs(q)·v·B.
  graph_implications:
  - En la gráfica B vs r, este valor indica la intensidad del campo que produce la fuerza calculada.
  pedagogical_triggers:
  - Si el resultado es mayor que el peso de la partícula en un campo débil, revisar la consistencia de las unidades.
- id: campo_hilo_recto
  title:
    es: Campo magnético de hilo recto infinito
    en: Magnetic field of an infinite straight wire
  equation: B = mu_0 * I / (2 * pi * r)
  latex: B = \frac{\mu_0 \, I}{2\pi \, r}
  rearrangements:
  - target: campo_magnetico
    equation: B = mu_0 * I / (2 * pi * r)
    latex: B = \frac{\mu_0 \, I}{2\pi \, r}
  - target: distancia_al_hilo_conductor
    equation: r = mu_0 * I / (2 * pi * B)
    latex: r = \frac{\mu_0 \, I}{2\pi \, B}
  - target: intensidad_de_corriente
    equation: I = 2 * pi * r * B / mu_0
    latex: I = \frac{2\pi \, r \, B}{\mu_0}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Campo magnético generado por un hilo recto de longitud infinita que conduce una corriente I, evaluado a distancia
      perpendicular r. El campo es circular alrededor del hilo y su intensidad decrece con 1/r.
    en: Magnetic field generated by an infinite straight wire carrying current I, evaluated at perpendicular distance r. The
      field is circular around the wire and its strength decreases as 1/r.
  constraints:
  - Hilo recto de longitud infinita (o muy larga comparada con r)
  - Vacío o medio lineal homogéneo
  - r > radio del conductor
  - Corriente estacionaria
  validity:
    es: Válida para r muy menor que la longitud del hilo. Para hilos de longitud finita se debe usar la ley de Biot-Savart
      con integración. En medios materiales reemplazar mu_0 por mu_0·mu_r.
    en: Valid for r much smaller than the wire length. For finite wires, Biot-Savart law with integration must be used. In
      material media replace mu_0 with mu_0·mu_r.
  dimension_check: '[T·m·A⁻¹·A·m⁻¹] = [T] ✓'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - fuerza entre hilos paralelos
  - diseño de electroimanes
  - campo en tornoides y solenoides (aproximacion)
  interpretation_tags:
  - dependencia_inversa_lineal
  - campo_circular
  - hilo_recto
  result_semantics:
    target: campo_magnetico
    kind: scalar_unsigned
    sign_meaning:
      es: B es el módulo del campo; la dirección es circular alrededor del hilo, dada por la regla de la mano derecha respecto
        al sentido de I.
      en: B is the field magnitude; the direction is circular around the wire, given by the right-hand rule with respect to
        the direction of I.
    absolute_value_meaning:
      es: Intensidad del campo magnético en teslas a distancia r del hilo que conduce la corriente I.
      en: Magnetic field strength in teslas at distance r from the wire carrying current I.
  domain_checks:
  - r > 0
  - B >= 0
  - I != 0
  - mu_0 > 0
  coherence_checks:
  - Si r se duplica, B debe reducirse a la mitad. Verificar ratio B(r)/B(2r) ≈ 2.
  - Para I negativa la magnitud de B es la misma; solo cambia el sentido de circulación del campo.
  graph_implications:
  - En la gráfica B vs r, la curva es hiperbólica (1/r). Incrementar r desplaza el punto hacia abajo de forma menos abrupta
    que en el caso eléctrico (1/r²).
  pedagogical_triggers:
  - Si el alumno obtiene un campo que crece con r, revisar si confundió r en numerador y denominador.
  - Si el resultado es del orden del campo terrestre (5×10⁻⁵ T) para una corriente doméstica de 1 A a 1 m, el resultado es
    correcto.
