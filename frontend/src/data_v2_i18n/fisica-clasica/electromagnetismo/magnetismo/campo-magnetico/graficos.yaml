version: '1.0'
leaf: campo-magnetico
coord:
  title:
    es: Grafica Coord - Campo magnetico
    en: Coord Graph - Magnetic Field
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo magnetico B (T)
    en: magnetic field B (T)
  xMagnitude: distancia_al_hilo_conductor
  yMagnitude: campo_magnetico
  relation:
    es: Para un hilo recto ideal, B = mu_0 I / (2 pi r). El campo aumenta con la corriente y disminuye como 1/r al alejarse
      del conductor.
    en: For an ideal straight wire, B = mu_0 I / (2 pi r). The field increases with current and decreases as 1/r with distance
      from the conductor.
  physicalReading:
    es: La curva muestra que la corriente crea el campo y que la distancia debilita su efecto; duplicar r reduce B aproximadamente
      a la mitad si I permanece constante.
    en: The curve shows that current creates the field and distance weakens its effect; doubling r approximately halves B
      when I remains constant.
  slopeMeaning:
    es: La pendiente es negativa porque cada incremento de distancia reduce el campo; cerca del conductor el cambio es mas
      intenso que lejos de el.
    en: The slope is negative because each increase in distance reduces the field; near the conductor the change is stronger
      than far from it.
  interceptMeaning:
    es: El modelo ideal no debe extrapolarse hasta r = 0, porque el conductor tiene radio finito y la aproximacion de hilo
      infinitamente delgado deja de ser valida.
    en: The ideal model should not be extrapolated to r = 0 because the conductor has finite radius and the infinitely thin
      wire approximation stops being valid.
  curvatureMeaning:
    es: La curvatura hiperbolica indica una dependencia inversa con la distancia, distinta de la dependencia 1/r^2 propia
      de campos radiales puntuales.
    en: The hyperbolic curvature indicates an inverse dependence on distance, unlike the 1/r^2 dependence of point radial
      fields.
  signMeaning:
    es: El signo o sentido de B depende del sentido de la corriente y se interpreta con la regla de la mano derecha.
    en: The sign or direction of B depends on current direction and is read with the right-hand rule.
  areaMeaning:
    es: El area bajo la curva no es la lectura principal; el foco didactico es la dependencia local B(r).
    en: The area under the curve is not the main reading; the didactic focus is the local dependence B(r).
  domainMeaning:
    es: El dominio fisico exige r mayor que el radio del conductor y puntos alejados de extremos donde el hilo ya no parece
      infinito.
    en: The physical domain requires r greater than the conductor radius and points far from ends where the wire no longer
      behaves as infinite.
  modelConnection:
    es: El grafico conecta la ley de Biot-Savart y la ley de Ampere en la geometria simetrica de un hilo recto largo.
    en: The graph connects the Biot-Savart law and Ampere's law in the symmetric geometry of a long straight wire.
  formulaConnection:
    es: Se lee junto con la formula B = mu_0 I / (2 pi r), manteniendo I constante para estudiar la variacion con r.
    en: It is read with B = mu_0 I / (2 pi r), keeping I constant to study variation with r.
  readingFocus:
    es: Identificar la fuente de corriente, leer la distancia al conductor y decidir si el modelo de hilo recto largo es aplicable.
    en: Identify the current source, read the distance from the conductor, and decide whether the long straight-wire model
      applies.
  agentHints:
    es:
    - Verifica que la corriente se mantenga fija antes de comparar puntos de la curva.
    - Recuerda que una ley 1/r no cae tan rapido como una ley 1/r^2.
    - Usa la regla de la mano derecha para separar modulo y direccion del campo.
    en:
    - Check that current is fixed before comparing points on the curve.
    - Remember that a 1/r law falls more slowly than a 1/r^2 law.
    - Use the right-hand rule to separate field magnitude and direction.
  commonMistakes:
    es:
    - Confundir el campo magnetico del hilo con un campo radial 1/r^2.
    - Extrapolar la grafica hasta r = 0 como si el hilo no tuviera grosor.
    - Interpretar el area bajo B(r) como una magnitud fisica principal del leaf.
    en:
    - Confusing the magnetic field of a wire with a 1/r^2 radial field.
    - Extrapolating the graph to r = 0 as if the wire had no thickness.
    - Interpreting the area under B(r) as a main physical quantity of the leaf.
  id: campo-magnetico-Coord
  graphId: campo-magnetico-Coord
  type: Coord
  graphType: Coord
  recommendedTab: graficas
  curveProfile:
    type: inverse
    expectedShape:
      es: [[campo_magnetico]] decrece de forma hiperbolica al aumentar [[distancia_al_hilo_conductor]].
      en: [[campo_magnetico]] decreases hyperbolically as [[distancia_al_hilo_conductor]] increases.
    keyPoints:
    - x: 0.05
      y: 1
      label:
        es: Cerca del hilo
        en: Near the wire
    - x: 0.1
      y: 0.5
      label:
        es: Distancia doble
        en: Double distance
  dataRange:
    xMin: 0.01
    xMax: 1
    yMin: 0
    yMax: 1
    autoScale: true
    sampleCount: 80
