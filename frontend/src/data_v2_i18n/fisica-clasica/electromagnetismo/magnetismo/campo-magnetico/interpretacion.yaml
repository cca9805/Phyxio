  fuerza_magnetica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de F_m
      en: Result of F_m
    summary_rules:
    - id: F_m_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[F_m]] indica la magnitud física principal.
        en: The result [[F_m]] indicates the main physical quantity.
    physical_reading_rules:
    - id: F_m_physical_reading_base
      when: 'true'
      status: info
      text:
        es: La [[fuerza_magnetica]] depende de la parte de [[velocidad_de_la_carga]] perpendicular a [[campo_magnetico]];
          aumenta con [[carga_electrica]], velocidad y campo, pero se anula si el movimiento es paralelo al campo.
        en: The [[fuerza_magnetica]] depends on the part of [[velocidad_de_la_carga]] perpendicular to [[campo_magnetico]];
          it grows with [[carga_electrica]], speed, and field, but becomes zero if the motion is parallel to the field.
    coherence_rules:
    - id: F_m_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba la coherencia dimensional de [[F_m]].
        en: Check the dimensional consistency of [[F_m]]
    model_validity_rules:
    - id: F_m_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[F_m]] solo dentro de la validez del modelo.
        en: Interpret [[F_m]] only within the validity of the model.
    graph_rules:
    - id: F_m_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[F_m]] con la lectura gráfica.
        en: Relate [[F_m]] to the graph.
    likely_errors:
    - id: F_m_likely_error_base
      when: 'true'
