      when: 'true'
      status: info
      text:
        es: La [[intensidad_de_corriente]] es la fuente macroscopica del [[campo_magnetico]] en un conductor; si aumenta la
          corriente, aumenta proporcionalmente el campo en el modelo de hilo recto.
        en: The [[intensidad_de_corriente]] is the macroscopic source of the [[campo_magnetico]] in a conductor; increasing
