      when: 'true'
      status: info
      text:
        es: La [[distancia_al_hilo_conductor]] controla la caida espacial del [[campo_magnetico]] de un hilo recto; al duplicar
          la distancia, el campo ideal se reduce aproximadamente a la mitad.
        en: The [[distancia_al_hilo_conductor]] controls the spatial decay of the [[campo_magnetico]] around a straight wire;
