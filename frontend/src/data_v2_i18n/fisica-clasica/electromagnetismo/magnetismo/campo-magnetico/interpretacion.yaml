      text:
        es: Confundir [[F_m]] con una lectura aislada es un error frecuente; debe interpretarse con el modelo, las unidades
          y el rango físico.
        en: A common mistake is to interpret [[F_m]] in isolation; it must be read with the model, units, and physical range.
