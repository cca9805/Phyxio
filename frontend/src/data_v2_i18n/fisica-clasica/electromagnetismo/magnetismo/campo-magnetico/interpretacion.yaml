        en: The result [[B]] indicates the main physical quantity.
    physical_reading_rules:
    - id: B_physical_reading_base
      when: 'true'
      status: info
      text:
        es: El [[campo_magnetico]] mide la capacidad del entorno para desviar cargas en movimiento; en un hilo recto aumenta
          con [[intensidad_de_corriente]] y disminuye al alejarse del conductor.
        en: The [[campo_magnetico]] measures how strongly the environment can deflect moving charges; around a straight wire
          it increases with [[intensidad_de_corriente]] and decreases with distance from the conductor.
