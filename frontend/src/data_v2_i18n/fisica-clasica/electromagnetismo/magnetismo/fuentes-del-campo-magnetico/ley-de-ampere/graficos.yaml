version: "1.0"
leaf: "ley-de-ampere"

coord:
  title:
    es: Gráfica Coord · Ley de Ampère
    en: "Coord Graph · Ampère's Law"
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo magnético B (T)
    en: magnetic field B (T)
  xMagnitude: r
  yMagnitude: B
  relation:
    es: "∮B·dl = μ₀I_enc. Para un hilo: B·(2πr) = μ₀I → B = μ₀I/(2πr). La ley de Ampère permite calcular B con alta simetría."
    en: "∮B·dl = μ₀I_enc. For a wire: B·(2πr) = μ₀I → B = μ₀I/(2πr). Ampère's law allows computing B with high symmetry."
  physicalReading:
    es: "B(r) cae como 1/r para r > R (fuera del conductor) y crece linealmente para r < R (dentro de un conductor macizo)."
    en: "B(r) falls as 1/r for r > R (outside) and grows linearly for r < R (inside a solid conductor)."
  slopeMeaning:
    es: "Pendiente positiva para r < R (corriente distribuida); negativa para r > R."
    en: "Positive slope for r < R (distributed current); negative for r > R."
  interceptMeaning:
    es: B(0) = 0 dentro de un conductor macizo (cancelación por simetría).
    en: B(0) = 0 inside a solid conductor (cancellation by symmetry).
  curvatureMeaning:
    es: "Lineal para r < R; hipérbola 1/r para r > R. Máximo en r = R."
    en: "Linear for r < R; hyperbola 1/r for r > R. Maximum at r = R."
  signMeaning:
    es: "B > 0 para I en el sentido convencional positivo (regla de la mano derecha)."
    en: "B > 0 for I in the positive conventional direction (right-hand rule)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: r ≥ 0. La ley de Ampère se aplica con la misma restricción de simetría que la ley de Gauss.
    en: "r ≥ 0. Ampère's law applies with the same symmetry restriction as Gauss's law."
  modelConnection:
    es: Se interpreta bajo la ley de Ampère en magnetostática. En electrodinámica se añade la corriente de desplazamiento.
    en: "Interpreted under Ampère's law in magnetostatics. In electrodynamics the displacement current is added."
  formulaConnection:
    es: Conecta con ∮B·dl = μ₀I_enc, B = μ₀I/(2πr) (hilo), B = μ₀nI (solenoide).
    en: Connects to ∮B·dl = μ₀I_enc, B = μ₀I/(2πr) (wire), B = μ₀nI (solenoid).
  readingFocus:
    es: identificar la región (dentro/fuera del conductor), leer B(r) y verificar la transición en r = R.
    en: identify the region (inside/outside conductor), read B(r), and verify transition at r = R.
  agentHints:
    es:
      - Misma lógica que la ley de Gauss para E, pero para B.
      - En r = R está el máximo de B para un conductor macizo.
      - La ley de Ampère generalizada incluye la corriente de desplazamiento de Maxwell.
    en:
      - "Same logic as Gauss's law for E, but for B."
      - At r = R is the maximum B for a solid conductor.
      - "Generalised Ampère's law includes Maxwell's displacement current."
  commonMistakes:
    es:
      - Aplicar la ley sin verificar simetría cilíndrica.
      - Olvidar que dentro del conductor B ≠ 0 (a diferencia del conductor eléctrico para E).
      - Confundir I_enc (solo la corriente interior al lazo ampéreano) con la corriente total.
    en:
      - Applying the law without verifying cylindrical symmetry.
      - Forgetting that inside the conductor B ≠ 0 (unlike the electric conductor for E).
      - Confusing I_enc (only the current enclosed by the Amperian loop) with total current.
