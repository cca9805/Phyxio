targets:
  circulacion_magnetica:
    enabled: true
    magnitude_type: scalar_signed
    semantic_role:
      es: Circulacion magnetica generada por la corriente encerrada.
      en: Magnetic circulation generated by enclosed current.
    summary_rules:
    - id: cb_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[C_B]] indica la circulacion magnetica neta asociada a [[I_enc]] en una curva cerrada orientada.'
        en: '[[C_B]] indicates the net magnetic circulation associated with [[I_enc]] on an oriented closed curve.'
    physical_reading_rules:
    - id: cb_physical_default
      when: 'true'
      status: ok
      text:
        es: Si [[I_enc]] aumenta, la circulacion aumenta en la misma proporcion dentro del modelo magnetostatico.
        en: If [[I_enc]] increases, circulation increases in the same proportion within the magnetostatic model.
    coherence_rules:
    - id: cb_coherence_zero
      when: C_B == 0
      status: ok
      text:
        es: Un valor nulo es coherente si la corriente neta encerrada se cancela.
        en: A zero value is coherent if the net enclosed current cancels.
    - id: cb_coherence_default
      when: 'true'
      status: ok
      text:
        es: El signo debe coincidir con la orientacion elegida para la curva.
        en: The sign must match the chosen orientation for the curve.
    model_validity_rules:
    - id: cb_validity_default
      when: 'true'
      status: ok
      text:
        es: La lectura es valida para corrientes estacionarias; con campos variables se requiere la correccion de Maxwell.
        en: The reading is valid for steady currents; time-varying fields require Maxwell's correction.
    graph_rules:
    - id: cb_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[C_B]] debe leerse como propiedad de la vuelta completa, no de un punto.
        en: In the graph, [[C_B]] must be read as a property of the complete loop, not of one point.
    likely_errors:
    - id: cb_error_nearby_current
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[circulacion_magnetica]] con una lectura aislada es un error frecuente: Error tipico: sumar corriente
          cercana que no atraviesa la superficie encerrada.'
        en: 'Typical mistake: adding nearby current that does not cross the enclosed surface.'
    next_step_rules:
    - id: cb_next_default
      when: 'true'
      status: ok
      text:
        es: El siguiente paso es revisar que curva cerrada se eligio y que corriente cruza su superficie.
        en: The next step is to review which closed curve was chosen and which current crosses its surface.
    physical_intuition:
    - id: circulacion_magnetica_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[circulacion_magnetica]] describe el estado dinámico.
        en: Intuitively, [[circulacion_magnetica]] describes the dynamic state.
    limiting_cases:
    - id: circulacion_magnetica_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[circulacion_magnetica]].
        en: Check limiting cases of [[circulacion_magnetica]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  campo_magnetico:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Modulo del campo magnetico alrededor de un hilo recto largo.
      en: Magnitude of the magnetic field around a long straight wire.
    summary_rules:
    - id: b_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[B]] describe el campo del hilo y depende directamente de [[I]] e inversamente de [[r]].'
        en: '[[B]] describes the wire field and depends directly on [[I]] and inversely on [[r]].'
    physical_reading_rules:
    - id: b_physical_default
      when: 'true'
      status: ok
      text:
        es: Una corriente mayor refuerza el campo, mientras que alejarse del hilo reparte la circulacion sobre una curva mayor.
        en: A larger current strengthens the field, while moving away from the wire spreads circulation over a larger curve.
    coherence_rules:
    - id: b_coherence_negative
      when: B < 0
      status: error
      text:
        es: El modulo [[B]] no debe ser negativo; el sentido se interpreta aparte con la regla de la mano derecha.
        en: The magnitude [[B]] must not be negative; direction is interpreted separately with the right-hand rule.
    - id: b_coherence_default
      when: 'true'
      status: ok
      text:
        es: Para un hilo largo, duplicar [[r]] debe reducir el campo a la mitad si [[I]] no cambia.
        en: For a long wire, doubling [[r]] should halve the field if [[I]] does not change.
    model_validity_rules:
    - id: b_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo exige hilo muy largo, punto exterior al conductor y simetria cilindrica.
        en: The model requires a very long wire, a point outside the conductor, and cylindrical symmetry.
    graph_rules:
    - id: b_graph_default
      when: 'true'
      status: ok
      text:
        es: La curva [[B]] frente a [[r]] debe descender y acercarse al eje horizontal para radios grandes.
        en: The [[B]] versus [[r]] curve should decrease and approach the horizontal axis at large radii.
    likely_errors:
    - id: b_error_radius
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[campo_magnetico]] con una lectura aislada es un error frecuente: Error tipico: introducir el diametro
          o una distancia oblicua como si fuera [[r]].'
        en: 'Typical mistake: entering diameter or an oblique distance as if it were [[r]].'
    next_step_rules:
    - id: b_next_default
      when: 'true'
      status: ok
      text:
        es: Compara el resultado con el orden de microteslas o militeslas esperado para el montaje.
        en: Compare the result with the microtesla or millitesla scale expected for the setup.
    physical_intuition:
    - id: campo_magnetico_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[campo_magnetico]] describe el estado dinámico.
        en: Intuitively, [[campo_magnetico]] describes the dynamic state.
    limiting_cases:
    - id: campo_magnetico_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[campo_magnetico]].
        en: Check limiting cases of [[campo_magnetico]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  campo_de_solenoide_largo:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Campo interior ideal de un solenoide largo.
      en: Ideal internal field of a long solenoid.
    summary_rules:
    - id: bsol_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[B_sol]] indica el campo interior y depende de la densidad de espiras [[n]] y de la corriente [[I]].'
        en: '[[B_sol]] indicates the internal field and depends on turn density [[n]] and current [[I]].'
    physical_reading_rules:
    - id: bsol_physical_default
      when: 'true'
      status: ok
      text:
        es: Mas espiras por longitud refuerzan el campo interior porque sus contribuciones se alinean dentro del solenoide.
        en: More turns per length reinforce the internal field because their contributions align inside the solenoid.
    coherence_rules:
    - id: bsol_coherence_negative
      when: B_sol < 0
      status: error
      text:
        es: El modulo [[B_sol]] no debe ser negativo; el sentido se decide con la orientacion de las espiras.
        en: The magnitude [[B_sol]] must not be negative; direction is decided by turn orientation.
    - id: bsol_coherence_default
      when: 'true'
      status: ok
      text:
        es: En el modelo lineal, aumentar [[n]] o [[I]] aumenta el campo interior.
        en: In the linear model, increasing [[n]] or [[I]] increases the internal field.
    model_validity_rules:
    - id: bsol_validity_default
      when: 'true'
      status: ok
      text:
        es: La formula es fiable lejos de los bordes y falla en solenoides cortos o materiales saturados.
        en: The formula is reliable far from the ends and fails in short solenoids or saturated materials.
    graph_rules:
    - id: bsol_graph_default
      when: 'true'
      status: ok
      text:
        es: La lectura grafica debe asociar mas densidad de espiras con mayor campo interior uniforme.
        en: The graph reading should associate higher turn density with stronger uniform internal field.
    likely_errors:
    - id: bsol_error_turns
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[campo_de_solenoide_largo]] con una lectura aislada es un error frecuente: Error tipico: usar el numero
          total de espiras en lugar de [[n]] como espiras por metro.'
        en: 'Typical mistake: using total turns instead of [[n]] as turns per metre.'
    next_step_rules:
    - id: bsol_next_default
      when: 'true'
      status: ok
      text:
        es: Revisa si el punto estudiado esta realmente en la region central donde el campo es casi uniforme.
        en: Check whether the studied point is really in the central region where the field is nearly uniform.
    physical_intuition:
    - id: campo_de_solenoide_largo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[campo_de_solenoide_largo]] describe el estado dinámico.
        en: Intuitively, [[campo_de_solenoide_largo]] describes the dynamic state.
    limiting_cases:
    - id: campo_de_solenoide_largo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[campo_de_solenoide_largo]].
        en: Check limiting cases of [[campo_de_solenoide_largo]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
