version: "1.0"
leaf: "ley-de-biot-savart"

coord:
  title:
    es: Gráfica Coord · Ley de Biot-Savart
    en: Coord Graph · Biot-Savart Law
  xAxis:
    es: distancia r (m)
    en: distance r (m)
  yAxis:
    es: campo magnético B (T)
    en: magnetic field B (T)
  xMagnitude: r
  yMagnitude: B
  relation:
    es: "dB = (μ₀/4π)·I·dl×r̂/r²: contribución diferencial al campo magnético de un elemento de corriente. Para un hilo recto finito: B ∝ 1/r·sin(θ)."
    en: "dB = (μ₀/4π)·I·dl×r̂/r²: differential contribution to B from a current element. For a finite straight wire: B ∝ 1/r·sin(θ)."
  physicalReading:
    es: La ley de Biot-Savart generaliza la obtención de B para cualquier distribución de corriente. Para un hilo infinito reproduce B = μ₀I/(2πr).
    en: The Biot-Savart law generalises B calculation for any current distribution. For an infinite wire it reproduces B = μ₀I/(2πr).
  slopeMeaning:
    es: La pendiente de B(r) depende de la geometría específica de la distribución de corriente.
    en: The slope of B(r) depends on the specific geometry of the current distribution.
  interceptMeaning:
    es: "B → ∞ para r → 0 en un hilo infinito. Para espiras: B en el centro es finito."
    en: "B → ∞ for r → 0 in an infinite wire. For loops: B at the centre is finite."
  curvatureMeaning:
    es: Variable según la geometría. La integral sobre toda la distribución determina la forma de B(r).
    en: Variable depending on geometry. Integration over the full distribution determines the shape of B(r).
  signMeaning:
    es: La dirección de dB está dada por dl×r̂ (regla de la mano derecha).
    en: The direction of dB is given by dl×r̂ (right-hand rule).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "r > 0. La ley es universal pero requiere integración para geometrías complejas."
    en: "r > 0. The law is universal but requires integration for complex geometries."
  modelConnection:
    es: Ley de Biot-Savart para distribuciones de corriente estáticas (magnetostática).
    en: Biot-Savart law for static current distributions (magnetostatics).
  formulaConnection:
    es: Conecta con dB = (μ₀/4π)·I·dl×r̂/r², y la superposición vectorial de los dB.
    en: Connects to dB = (μ₀/4π)·I·dl×r̂/r², and the vector superposition of the dB contributions.
  readingFocus:
    es: identificar la geometría de la distribución de corriente antes de integrar.
    en: identify the geometry of the current distribution before integrating.
  agentHints:
    es:
      - La ley de Biot-Savart es más general que la ley de Ampère (no requiere simetría).
      - Para un hilo infinito ambas leyes dan el mismo resultado.
      - La superposición permite calcular B de geometrías compuestas.
    en:
      - "Biot-Savart law is more general than Ampère's law (no symmetry required)."
      - For an infinite wire both laws give the same result.
      - Superposition allows computing B for composite geometries.
  commonMistakes:
    es:
      - Aplicar la ley de Ampère cuando no hay simetría.
      - Olvidar el producto vectorial dl×r̂.
      - No integrar sobre toda la distribución.
    en:
      - "Applying Ampère's law when there is no symmetry."
      - Forgetting the cross product dl×r̂.
      - Not integrating over the full distribution.
