version: "1.0"
leaf: "sobre-cargas-en-movimiento"

coord:
  title:
    es: Gráfica Coord · Fuerza Magnética sobre Cargas en Movimiento
    en: Coord Graph · Magnetic Force on Moving Charges
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza magnética F (N)
    en: magnetic force F (N)
  xMagnitude: v
  yMagnitude: F
  relation:
    es: "F = qv×B: la fuerza magnética es perpendicular a v y a B. F = qvB·sin(θ), donde θ es el ángulo entre v y B."
    en: "F = qv×B: magnetic force is perpendicular to both v and B. F = qvB·sin(θ), where θ is the angle between v and B."
  physicalReading:
    es: "F es proporcional a v (recta de pendiente qB·sin(θ)). Si v ∥ B: F = 0. La fuerza magnética no realiza trabajo."
    en: "F is proportional to v (line with slope qB·sin(θ)). If v ∥ B: F = 0. Magnetic force does no work."
  slopeMeaning:
    es: "Pendiente = qB·sin(θ): mayor B o mayor θ → mayor fuerza para la misma velocidad."
    en: "Slope = qB·sin(θ): larger B or larger θ → larger force for the same velocity."
  interceptMeaning:
    es: "F(0) = 0: sin velocidad no hay fuerza magnética."
    en: "F(0) = 0: without velocity there is no magnetic force."
  curvatureMeaning:
    es: Lineal en v (para B y θ constantes).
    en: Linear in v (for constant B and θ).
  signMeaning:
    es: "El signo depende del signo de q y del sentido de v×B. Carga negativa: fuerza invertida."
    en: "Sign depends on the sign of q and the direction of v×B. Negative charge: reversed force."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "v > 0. A velocidades relativistas se usa la fuerza de Lorentz completa: F = q(E + v×B)."
    en: "v > 0. At relativistic speeds use the full Lorentz force: F = q(E + v×B)."
  modelConnection:
    es: "Se interpreta bajo la fuerza de Lorentz: F = q(E + v×B)."
    en: "Interpreted under the Lorentz force: F = q(E + v×B)."
  formulaConnection:
    es: Conecta con F = qvB·sin(θ), F = q(E + v×B), r = mv/(qB) (movimiento circular).
    en: Connects to F = qvB·sin(θ), F = q(E + v×B), r = mv/(qB) (circular motion).
  readingFocus:
    es: leer la proporcionalidad F vs v, identificar el ángulo θ y determinar la dirección de la fuerza por v×B.
    en: read the F vs v proportionality, identify angle θ, and determine force direction via v×B.
  agentHints:
    es:
      - "La fuerza magnética no realiza trabajo: el módulo de v no cambia."
      - "Movimiento circular: r = mv/(qB) (selector de velocidades, ciclotrón)."
      - "Para v ∥ B: F = 0."
    en:
      - "Magnetic force does no work: |v| does not change."
      - "Circular motion: r = mv/(qB) (velocity selector, cyclotron)."
      - "For v ∥ B: F = 0."
  commonMistakes:
    es:
      - Pensar que la fuerza magnética acelera la carga (solo la deflecta).
      - Olvidar que la dirección de F cambia para cargas negativas.
      - Confundir F = qvB·sin(θ) con F = qvB·cos(θ).
    en:
      - Thinking magnetic force accelerates the charge (it only deflects it).
      - Forgetting that F direction changes for negative charges.
      - Confusing F = qvB·sin(θ) with F = qvB·cos(θ).

svg:
  title:
    es: Escena SVG · Fuerza Magnética sobre Cargas en Movimiento
    en: SVG Scene · Magnetic Force on Moving Charges
  sceneId: lorentz_force_moving_charge
  sceneLabel:
    es: Carga en movimiento en campo magnético
    en: Moving charge in magnetic field
  objects:
    es:
      - carga eléctrica q
      - vector velocidad v
      - campo magnético B
      - fuerza de Lorentz F
    en:
      - electric charge q
      - velocity vector v
      - magnetic field B
      - Lorentz force F
  mainObject:
    es: carga eléctrica en movimiento
    en: moving electric charge
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: Trayectoria circular en el plano perpendicular a B; trayectoria helicoidal si hay componente paralela a B.
    en: Circular trajectory in the plane perpendicular to B; helical trajectory if there is a component parallel to B.
  interactions:
    es: "La fuerza de Lorentz F = qv×B es perpendicular a v: deflecta la carga sin cambiar su rapidez."
    en: "The Lorentz force F = qv×B is perpendicular to v: it deflects the charge without changing its speed."
  modelElements:
    es:
      - vector v (velocidad inicial)
      - campo B (uniforme)
      - fuerza F (perpendicular a v y a B)
      - radio de la trayectoria circular r = mv/(qB)
    en:
      - v vector (initial velocity)
      - B field (uniform)
      - F force (perpendicular to v and B)
      - circular trajectory radius r = mv/(qB)
  visualCues:
    es:
      - La fuerza F es siempre perpendicular a v (cambia dirección, no módulo).
      - La trayectoria circular indica movimiento uniforme con fuerza centrípeta magnética.
      - Para q < 0 la fuerza se invierte.
    en:
      - F is always perpendicular to v (changes direction, not magnitude).
      - Circular trajectory indicates uniform motion with magnetic centripetal force.
      - For q < 0 force is reversed.
  scaleMeaning:
    es: Escena cualitativa. El radio r = mv/(qB) es cuantitativo.
    en: Qualitative scene. Radius r = mv/(qB) is quantitative.
  relation:
    es: La fuerza de Lorentz curva la trayectoria de la carga sin realizar trabajo.
    en: The Lorentz force curves the charge trajectory without doing work.
  physicalReading:
    es: Una carga q moviéndose con velocidad v en un campo B experimenta una fuerza F = qv×B perpendicular al plano vB.
    en: A charge q moving with velocity v in a field B experiences a force F = qv×B perpendicular to the vB plane.
  modelConnection:
    es: "Se interpreta bajo la fuerza de Lorentz. Aplicaciones: ciclotrón, selector de velocidades, espectrómetro de masas."
    en: "Interpreted under the Lorentz force. Applications: cyclotron, velocity selector, mass spectrometer."
  formulaConnection:
    es: Conecta con F = qv×B, r = mv/(qB), y T = 2πm/(qB) (periodo).
    en: Connects to F = qv×B, r = mv/(qB), and T = 2πm/(qB) (period).
  readingFocus:
    es: identificar la dirección de v, B y F usando la regla de la mano derecha; leer el radio r como indicador de mv/(qB).
    en: identify the directions of v, B, and F using the right-hand rule; read radius r as an indicator of mv/(qB).
  agentHints:
    es:
      - "La fuerza magnética no realiza trabajo: la rapidez v se conserva."
      - "r = mv/(qB): mayor m o v → mayor r; mayor q o B → menor r."
      - La trayectoria helicoidal aparece cuando v tiene componente paralela a B.
    en:
      - "Magnetic force does no work: speed v is conserved."
      - "r = mv/(qB): larger m or v → larger r; larger q or B → smaller r."
      - Helical trajectory appears when v has a component parallel to B.
  commonMistakes:
    es:
      - Pensar que F cambia la rapidez de la carga.
      - Olvidar invertir F para q < 0.
      - Confundir trayectoria circular con aceleración en la dirección de F.
    en:
      - Thinking F changes the charge speed.
      - Forgetting to invert F for q < 0.
      - Confusing circular trajectory with acceleration in the F direction.
