version: "1.0"
leaf: "sobre-conductores"

coord:
  title:
    es: Gráfica Coord · Fuerza Magnética sobre Conductores
    en: Coord Graph · Magnetic Force on Conductors
  xAxis:
    es: longitud del conductor L (m)
    en: conductor length L (m)
  yAxis:
    es: fuerza magnética F (N)
    en: magnetic force F (N)
  xMagnitude: L
  yMagnitude: F
  relation:
    es: "F = IL×B → F = ILB·sin(θ): fuerza sobre un conductor de longitud L con corriente I en un campo B. Proporcional a L."
    en: "F = IL×B → F = ILB·sin(θ): force on a conductor of length L carrying current I in field B. Proportional to L."
  physicalReading:
    es: Recta de pendiente IB·sin(θ). Mayor L, I o B → mayor fuerza. La dirección está dada por IL×B.
    en: Line with slope IB·sin(θ). Larger L, I or B → larger force. Direction given by IL×B.
  slopeMeaning:
    es: "Pendiente = IB·sin(θ): permite medir IB·sin(θ) experimentalmente."
    en: "Slope = IB·sin(θ): allows measuring IB·sin(θ) experimentally."
  interceptMeaning:
    es: "F(0) = 0: conductor de longitud cero no experimenta fuerza."
    en: "F(0) = 0: zero-length conductor experiences no force."
  curvatureMeaning:
    es: Lineal en L (y en I, si L y B son fijos).
    en: Linear in L (and in I, if L and B are fixed).
  signMeaning:
    es: El signo depende del sentido de la corriente I y del campo B (regla de la mano derecha).
    en: Sign depends on current I direction and field B (right-hand rule).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "L > 0. Válido para campos uniformes a lo largo del conductor."
    en: "L > 0. Valid for uniform fields along the conductor."
  modelConnection:
    es: "Se interpreta bajo la fuerza de Lorentz sobre las cargas en movimiento dentro del conductor: F = qv_d×B → F = IL×B."
    en: "Interpreted under the Lorentz force on moving charges inside the conductor: F = qv_d×B → F = IL×B."
  formulaConnection:
    es: "Conecta con F = IL×B, F = ILB·sin(θ), y la fuerza entre dos hilos paralelos: F/L = μ₀I₁I₂/(2πd)."
    en: "Connects to F = IL×B, F = ILB·sin(θ), and force between two parallel wires: F/L = μ₀I₁I₂/(2πd)."
  readingFocus:
    es: leer la proporcionalidad F vs L, identificar θ y determinar la dirección de la fuerza por IL×B.
    en: read the F vs L proportionality, identify θ, and determine force direction via IL×B.
  agentHints:
    es:
      - Dos hilos paralelos con corrientes en el mismo sentido se atraen; en sentidos opuestos se repelen.
      - La dirección de F se determina con IL×B (regla de la mano derecha).
      - El motor eléctrico funciona por esta fuerza sobre conductores en un campo magnético.
    en:
      - Two parallel wires with currents in the same direction attract; opposite directions repel.
      - Direction of F determined by IL×B (right-hand rule).
      - The electric motor works through this force on conductors in a magnetic field.
  commonMistakes:
    es:
      - Confundir F = ILB con F = ILB·sin(θ).
      - Olvidar que la dirección de F depende del sentido de la corriente.
      - No aplicar la regla de la mano derecha correctamente.
    en:
      - Confusing F = ILB with F = ILB·sin(θ).
      - Forgetting that F direction depends on current direction.
      - Not applying the right-hand rule correctly.
