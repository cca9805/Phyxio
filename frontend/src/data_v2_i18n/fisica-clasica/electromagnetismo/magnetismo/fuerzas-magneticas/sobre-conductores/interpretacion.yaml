targets:
  fuerza_magnetica_sobre_el_conductor:
    enabled: true
    magnitude_type: force
    semantic_role:
      es: Mide el empuje magnetico total sobre el tramo conductor.
      en: Measures the total magnetic push on the conductor segment.
    summary_rules:
    - id: fb_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[F_B]] indica la fuerza total sobre el conductor: aumenta con [[I]], [[L]], [[B]] y [[s_theta]].'
        en: '[[F_B]] indicates total force on the conductor: it increases with [[I]], [[L]], [[B]], and [[s_theta]].'
    physical_reading_rules:
    - id: fb_reading_default
      when: 'true'
      status: ok
      text:
        es: Una [[F_B]] mayor significa mayor accion mecanica lateral sobre el tramo, no una fuerza paralela a la corriente.
        en: A larger [[F_B]] means stronger lateral mechanical action on the segment, not a force parallel to current.
    coherence_rules:
    - id: fb_coherence_zero
      when: F_B == 0 || I == 0 || L == 0 || B == 0 || s_theta == 0
      status: warning
      text:
        es: Resultado nulo coherente si no hay corriente, campo, longitud efectiva o componente perpendicular.
        en: A zero result is coherent if current, field, effective length, or perpendicular component is absent.
    - id: fb_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[F_B]] debe ser no negativa cuando se calcula como modulo de fuerza.'
        en: '[[F_B]] must be nonnegative when calculated as a force magnitude.'
    model_validity_rules:
    - id: fb_validity_default
      when: 'true'
      status: ok
      text:
        es: La lectura vale si el tramo es recto, el campo es uniforme y la longitud usada esta dentro de la zona magnetica.
        en: The reading holds if the segment is straight, the field is uniform, and the length used lies inside the magnetic
          region.
    graph_rules:
    - id: fb_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico Coord, [[F_B]] crece linealmente con [[I]] si [[L]], [[B]] y [[s_theta]] permanecen fijos.
        en: In the Coord graph, [[F_B]] grows linearly with [[I]] if [[L]], [[B]], and [[s_theta]] remain fixed.
    likely_errors:
    - id: fb_error_direction
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[fuerza_magnetica_sobre_el_conductor]] con una lectura aislada es un error frecuente: Error tipico:
          dibujar [[F_B]] paralela al cable en vez de perpendicular al plano definido por corriente y campo.'
        en: 'Typical mistake: drawing [[F_B]] parallel to the wire instead of perpendicular to the plane defined by current
          and field.'
    next_step_rules:
    - id: fb_next_default
      when: 'true'
      status: ok
      text:
        es: Tras calcular [[F_B]], revisa el sentido de [[I]] y la orientacion de [[B]] para decidir hacia donde se mueve
          el conductor.
        en: After calculating [[F_B]], check the direction of [[I]] and orientation of [[B]] to decide where the conductor
          moves.
    physical_intuition:
    - id: fuerza_magnetica_sobre_el_conductor_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[fuerza_magnetica_sobre_el_conductor]] describe el estado dinámico.
        en: Intuitively, [[fuerza_magnetica_sobre_el_conductor]] describes the dynamic state.
    limiting_cases:
    - id: fuerza_magnetica_sobre_el_conductor_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[fuerza_magnetica_sobre_el_conductor]].
        en: Check limiting cases of [[fuerza_magnetica_sobre_el_conductor]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  fuerza_magnetica_por_unidad_de_longitud:
    enabled: true
    magnitude_type: linear_force_density
    semantic_role:
      es: Mide la fuerza magnetica distribuida por unidad de longitud.
      en: Measures magnetic force distributed per unit length.
    summary_rules:
    - id: fl_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[f_L]] resume la carga mecanica lineal: depende de [[I]], [[B]] y [[s_theta]], sin incluir [[L]].'
        en: '[[f_L]] summarizes linear mechanical load: it depends on [[I]], [[B]], and [[s_theta]], without including [[L]].'
    physical_reading_rules:
    - id: fl_reading_default
      when: 'true'
      status: ok
      text:
        es: Un [[f_L]] alto indica que cada metro de conductor soporta una fuerza magnetica intensa.
        en: A high [[f_L]] indicates that each metre of conductor carries a strong magnetic force.
    coherence_rules:
    - id: fl_coherence_zero
      when: f_L == 0 || I == 0 || B == 0 || s_theta == 0
      status: warning
      text:
        es: La fuerza por longitud se anula si falta corriente, campo o orientacion perpendicular.
        en: Force per length vanishes if current, field, or perpendicular orientation is absent.
    - id: fl_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[f_L]] debe ser no negativa cuando se interpreta como modulo distribuido.'
        en: '[[f_L]] must be nonnegative when interpreted as a distributed magnitude.'
    model_validity_rules:
    - id: fl_validity_default
      when: 'true'
      status: ok
      text:
        es: La lectura por unidad de longitud es fiable si corriente y campo son aproximadamente uniformes sobre el tramo.
        en: The per-length reading is reliable if current and field are approximately uniform along the segment.
    graph_rules:
    - id: fl_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[f_L]] se interpreta como pendiente normalizada respecto a la longitud efectiva.'
        en: '[[f_L]] is interpreted as slope normalized with respect to effective length.'
    likely_errors:
    - id: fl_error_total
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[fuerza_magnetica_por_unidad_de_longitud]] con una lectura aislada es un error frecuente: Error frecuente:
          usar [[f_L]] como si ya fuera la fuerza total [[F_B]].'
        en: 'A common mistake is to interpret [[fuerza_magnetica_por_unidad_de_longitud]] in isolation: Frequent error: using
          [[f_L]] as if it were already the total force [[F_B]].'
    next_step_rules:
    - id: fl_next_default
      when: 'true'
      status: ok
      text:
        es: Multiplica mentalmente la lectura por la longitud efectiva para estimar la accion mecanica total.
        en: Mentally scale the reading by effective length to estimate total mechanical action.
    physical_intuition:
    - id: fuerza_magnetica_por_unidad_de_longitud_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[fuerza_magnetica_por_unidad_de_longitud]] describe el estado dinámico.
        en: Intuitively, [[fuerza_magnetica_por_unidad_de_longitud]] describes the dynamic state.
    limiting_cases:
    - id: fuerza_magnetica_por_unidad_de_longitud_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[fuerza_magnetica_por_unidad_de_longitud]].
        en: Check limiting cases of [[fuerza_magnetica_por_unidad_de_longitud]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
