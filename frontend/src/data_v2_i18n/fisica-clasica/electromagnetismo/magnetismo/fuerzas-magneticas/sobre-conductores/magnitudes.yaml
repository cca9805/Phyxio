magnitudes:
- id: fuerza_magnetica_sobre_el_conductor
  symbol: F_B
  nombre:
    es: fuerza magnetica sobre el conductor
    en: magnetic force on the conductor
  descripcion:
    es: Modulo de la fuerza magnetica resultante sobre un tramo conductor con corriente.
    en: Magnitude of the resulting magnetic force on a current-carrying conductor segment.
  unidad_si: N
  dimension: '[M L T^-2]'
  is_vector: true
  components:
  - F_{B,x}
  - F_{B,y}
  - F_{B,z}
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - fuerza_conductor_recto
  common_mistake: Dibujar la fuerza paralela a la corriente o al campo sin aplicar la orientacion perpendicular.
  typical_range: 10^-3 N a 10 N en conductores de laboratorio; mayor en maquinas electricas de potencia.
  sign_behavior:
    has_sign: false
    meaning:
      es: El modulo es no negativo; el sentido vectorial depende del sentido de la corriente y de la orientacion del campo.
      en: The magnitude is nonnegative; vector direction depends on current direction and field orientation.
  zero_behavior:
    allowed: true
    meaning:
      es: Valor nulo indica corriente nula, campo nulo, longitud efectiva nula o conductor paralelo al campo.
      en: A zero value indicates zero current, zero field, zero effective length, or conductor parallel to the field.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - empuje magnetico
    - accion mecanica sobre conductor
    secondary_for:
    - diseno de motores
  graph_binding:
    channels:
    - y_axis
    - force_arrow
  pedagogical_notes:
    es: '[[F_B]] debe leerse como fuerza colectiva sobre muchas cargas moviles dentro del conductor.'
    en: '[[F_B]] should be read as a collective force on many moving charges inside the conductor.'
- id: intensidad_de_corriente
  symbol: I
  nombre:
    es: intensidad de corriente
    en: electric current
  descripcion:
    es: Corriente que atraviesa el tramo conductor situado en el campo magnetico.
    en: Current through the conductor segment placed in the magnetic field.
  unidad_si: A
  dimension: '[I]'
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
  - fuerza_conductor_recto
  - fuerza_por_unidad_longitud
  common_mistake: Usar el sentido de movimiento de electrones como si fuera siempre el sentido convencional de la corriente.
  typical_range: 0.1 A a 20 A en practicas y circuitos de baja potencia.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo o sentido de [[I]] fija la orientacion de la fuerza mediante la regla de la mano derecha.
      en: The sign or direction of [[I]] sets force orientation through the right-hand rule.
  zero_behavior:
    allowed: true
    meaning:
      es: Sin corriente no hay fuerza magnetica neta sobre el tramo recto ideal.
      en: With no current there is no net magnetic force on the ideal straight segment.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - control de fuerza
    secondary_for:
    - sentido de accion
  graph_binding:
    channels:
    - x_axis
    - slider
  pedagogical_notes:
    es: En este leaf [[I]] representa la suma organizada de muchas cargas moviles.
    en: In this leaf [[I]] represents the organized sum of many moving charges.
- id: longitud_efectiva
  symbol: L
  nombre:
    es: longitud efectiva
    en: effective length
  descripcion:
    es: Longitud del tramo conductor que se encuentra dentro del campo magnetico.
    en: Length of the conductor segment that lies inside the magnetic field.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: dimension
  physical_role: core_physical_quantity
  used_in:
  - fuerza_conductor_recto
  common_mistake: Usar toda la longitud del cable aunque solo una parte este dentro del campo.
  typical_range: 1 cm a 1 m en montajes didacticos; mayor en maquinas electricas.
  sign_behavior:
    has_sign: false
    meaning:
      es: La longitud efectiva es positiva; el sentido se describe con la orientacion del conductor.
      en: Effective length is positive; direction is described by conductor orientation.
  zero_behavior:
    allowed: true
    meaning:
      es: Longitud efectiva nula indica que ningun tramo util atraviesa la region de campo.
      en: Zero effective length means no useful segment crosses the field region.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - escala de fuerza total
    secondary_for:
    - diseno geometrico
  graph_binding:
    channels:
    - slope_control
  pedagogical_notes:
    es: '[[L]] evita confundir fuerza local por longitud con fuerza total sobre un tramo real.'
    en: '[[L]] avoids confusing local force per length with total force on a real segment.'
- id: campo_magnetico
  symbol: B
  nombre:
    es: campo magnetico
    en: magnetic field
  descripcion:
    es: Modulo del campo magnetico externo aplicado al conductor.
    en: Magnitude of the external magnetic field applied to the conductor.
  unidad_si: T
  dimension: '[M T^-2 I^-1]'
  is_vector: true
  components:
  - B_x
  - B_y
  - B_z
  category: state
  physical_role: core_physical_quantity
  used_in:
  - fuerza_conductor_recto
  - fuerza_por_unidad_longitud
  common_mistake: Suponer que el campo empuja en su propia direccion.
  typical_range: 10^-6 T en campos ambientales; 0.01 T a varios teslas en imanes tecnicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: El modulo no tiene signo; la orientacion del vector campo decide el sentido de la fuerza.
      en: The magnitude has no sign; field vector orientation decides force direction.
  zero_behavior:
    allowed: true
    meaning:
      es: Con [[B]] nulo desaparece la fuerza magnetica sobre el conductor ideal.
      en: With zero [[B]], magnetic force on the ideal conductor vanishes.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - intensidad magnetica aplicada
    secondary_for:
    - control de pendiente grafica
  graph_binding:
    channels:
    - slope_control
    - field_marker
  pedagogical_notes:
    es: '[[B]] fija un eje geometrico; no debe confundirse con una fuerza ya calculada.'
    en: '[[B]] sets a geometric axis; it must not be confused with an already computed force.'
- id: s_theta
  symbol: sin_theta
  nombre:
    es: factor angular
    en: angular factor
  descripcion:
    es: Seno del angulo entre el conductor orientado por la corriente y el campo magnetico.
    en: Sine of the angle between the current-oriented conductor and the magnetic field.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - fuerza_conductor_recto
  - fuerza_por_unidad_longitud
  common_mistake: Tomarlo siempre como uno aunque el conductor este inclinado respecto al campo.
  typical_range: 0 a 1 segun la orientacion relativa.
  sign_behavior:
    has_sign: false
    meaning:
      es: Como factor de modulo, mide eficacia perpendicular y no sentido de fuerza.
      en: As a magnitude factor, it measures perpendicular effectiveness rather than force direction.
  zero_behavior:
    allowed: true
    meaning:
      es: Valor cero indica conductor paralelo al campo y fuerza magnetica nula.
      en: Zero indicates conductor parallel to the field and zero magnetic force.
  value_nature:
    kind: ratio
    nonnegative_only: true
    expected_interval: '[0, 1]'
  interpretation_role:
    primary_for:
    - geometria de acoplamiento
    secondary_for:
    - deteccion de fuerza nula
  graph_binding:
    channels:
    - angle_control
  pedagogical_notes:
    es: '[[s_theta]] explica por que girar un conductor cambia la fuerza sin cambiar corriente ni campo.'
    en: '[[s_theta]] explains why rotating a conductor changes force without changing current or field.'
- id: fuerza_magnetica_por_unidad_de_longitud
  symbol: f_L
  nombre:
    es: fuerza magnetica por unidad de longitud
    en: magnetic force per unit length
  descripcion:
    es: Fuerza magnetica distribuida por cada metro efectivo de conductor.
    en: Magnetic force distributed over each effective metre of conductor.
  unidad_si: N*m^-1
  dimension: '[M T^-2]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - fuerza_por_unidad_longitud
  common_mistake: Confundir [[f_L]] con [[F_B]] total y olvidar multiplicar por la longitud efectiva.
  typical_range: 10^-3 N*m^-1 a 10 N*m^-1 en montajes de laboratorio y actuadores pequenos.
  sign_behavior:
    has_sign: false
    meaning:
      es: El modulo por longitud es no negativo; el sentido se hereda de la fuerza vectorial.
      en: The per-length magnitude is nonnegative; direction is inherited from the vector force.
  zero_behavior:
    allowed: true
    meaning:
      es: Valor nulo indica ausencia de corriente, campo o componente perpendicular.
      en: Zero indicates absence of current, field, or perpendicular component.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - densidad lineal de fuerza
    secondary_for:
    - comparacion entre conductores
  graph_binding:
    channels:
    - normalized_output
  pedagogical_notes:
    es: '[[f_L]] permite comparar conductores de longitudes distintas sin mezclar geometria total.'
    en: '[[f_L]] allows comparison of conductors with different lengths without mixing total geometry.'
