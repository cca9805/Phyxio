version: "1.0"
leaf: "materiales-magneticos"

coord:
  title:
    es: Gráfica Coord · Materiales Magnéticos
    en: Coord Graph · Magnetic Materials
  xAxis:
    es: campo magnético aplicado H (A/m)
    en: applied magnetic field H (A/m)
  yAxis:
    es: magnetización M (A/m)
    en: magnetisation M (A/m)
  xMagnitude: H
  yMagnitude: M
  relation:
    es: "M = χ_m·H: paramagnéticos/diamagnéticos son lineales. Ferromagnéticos muestran histeresis (ciclo M-H con remanencia y coercitividad)."
    en: "M = χ_m·H: para/diamagnetics are linear. Ferromagnetics show hysteresis (M-H loop with remanence and coercivity)."
  physicalReading:
    es: La linealidad (paramagnéticos y diamagnéticos) o el ciclo de histeresis (ferromagnéticos) determinan el comportamiento magnético del material.
    en: Linearity (paramagnetics and diamagnetics) or the hysteresis loop (ferromagnetics) determines the magnetic behaviour of the material.
  slopeMeaning:
    es: "Pendiente = χ_m (susceptibilidad magnética). χ_m > 0: paramagnético; χ_m < 0: diamagnético; χ_m >> 1: ferromagnético."
    en: "Slope = χ_m (magnetic susceptibility). χ_m > 0: paramagnetic; χ_m < 0: diamagnetic; χ_m >> 1: ferromagnetic."
  interceptMeaning:
    es: "Para ferromagnéticos: remanencia M_r ≠ 0 cuando H = 0. Para los otros: M = 0 cuando H = 0."
    en: "For ferromagnetics: remanence M_r ≠ 0 when H = 0. For others: M = 0 when H = 0."
  curvatureMeaning:
    es: Lineal para para y diamagnéticos. Curva sigmoidal con saturación para ferromagnéticos.
    en: Linear for para and diamagnetics. Sigmoidal curve with saturation for ferromagnetics.
  signMeaning:
    es: "χ_m > 0: magnetización paralela al campo (paramagnético). χ_m < 0: magnetización antiparalela (diamagnético)."
    en: "χ_m > 0: magnetisation parallel to field (paramagnetic). χ_m < 0: magnetisation antiparallel (diamagnetic)."
  areaMeaning:
    es: El área del ciclo de histeresis es la energía disipada por unidad de volumen en cada ciclo.
    en: The area of the hysteresis loop is the energy dissipated per unit volume per cycle.
  domainMeaning:
    es: Válido hasta la saturación M_s. El ciclo de histeresis implica que el estado depende del historial del campo.
    en: Valid up to saturation M_s. Hysteresis loop implies state depends on field history.
  modelConnection:
    es: Se interpreta bajo el modelo de respuesta magnética lineal o el modelo de dominios de Weiss para ferromagnéticos.
    en: Interpreted under the linear magnetic response model or Weiss domain model for ferromagnetics.
  formulaConnection:
    es: Conecta con B = μ₀(H+M) = μ₀μ_rH, M = χ_mH, y μ_r = 1+χ_m.
    en: Connects to B = μ₀(H+M) = μ₀μ_rH, M = χ_mH, and μ_r = 1+χ_m.
  readingFocus:
    es: identificar el tipo de material (diamagnético/paramagnético/ferromagnético) por la forma de la curva M-H.
    en: identify the material type (diamagnetic/paramagnetic/ferromagnetic) by the shape of the M-H curve.
  agentHints:
    es:
      - Área del ciclo de histeresis = energía disipada por ciclo.
      - "Temperatura de Curie: los ferromagnéticos se vuelven paramagnéticos por encima de ella."
      - "Materiales blandos: ciclo estrecho (bajo pérdidas); duros: ciclo ancho (imanes permanentes)."
    en:
      - Hysteresis loop area = energy dissipated per cycle.
      - "Curie temperature: ferromagnetics become paramagnetic above it."
      - "Soft materials: narrow loop (low losses); hard: wide loop (permanent magnets)."
  commonMistakes:
    es:
      - "Confundir H y B: H se aplica externamente; B incluye la respuesta del material."
      - Olvidar que la histeresis implica dependencia del historial.
      - Usar un modelo lineal para materiales ferromagnéticos.
    en:
      - "Confusing H and B: H is applied externally; B includes material response."
      - Forgetting that hysteresis implies history dependence.
      - Using a linear model for ferromagnetic materials.
