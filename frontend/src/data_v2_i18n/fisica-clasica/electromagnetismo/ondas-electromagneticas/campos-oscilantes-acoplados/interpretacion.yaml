      when: 'true'
      status: info
      text:
        es: La intensidad media define el promedio del flujo neto de energía transportada y depende directamente del cuadrado
          de la amplitud eléctrica.
        en: The mean intensity defines the average net energy flux carried and depends directly on the square of the electric
