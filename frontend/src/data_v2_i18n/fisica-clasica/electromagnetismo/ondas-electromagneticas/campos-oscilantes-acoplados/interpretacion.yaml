    - id: physical_i
      when: 'true'
      status: info
      text:
        es: La intensidad es proporcional al cuadrado de la amplitud eléctrica, demostrando el comportamiento no lineal de
          la energía respecto al campo.
        en: The intensity is proportional to the square of the electric amplitude, demonstrating the non-linear behavior of
          energy with respect to the field.
    coherence_rules:
    - id: coherence_i_0
      when: result < 0
      status: error
      text:
        es: 'ERROR: La intensidad media de transporte de energía no puede ser negativa.'
        en: 'ERROR: The mean intensity of energy transport cannot be negative.'
    - id: coherence_i_1
      when: 'true'
      status: info
      text:
        es: Intensidad física coherente y no negativa.
        en: Coherent and non-negative physical intensity.
    model_validity_rules:
    - id: validity_i_0
      when: result > 1e12
      status: info
      text:
