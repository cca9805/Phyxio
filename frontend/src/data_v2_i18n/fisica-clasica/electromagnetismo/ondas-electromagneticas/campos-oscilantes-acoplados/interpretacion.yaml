targets:
  velocidad_de_la_luz_en_el_vacio:
    enabled: true
    magnitude_type: velocidad_vacio
    semantic_role:
      es: Velocidad de propagación en el vacío
      en: Speed of propagation in vacuum
    summary_rules:
    - id: summary_c
      when: 'true'
      status: info
      text:
        es: La velocidad de propagación c es la constante fundamental de la luz en el vacío e indica el límite de velocidad
          cósmica.
        en: The speed of propagation c is the fundamental constant of light in vacuum and indicates the cosmic speed limit.
    physical_reading_rules:
    - id: physical_c
      when: 'true'
      status: info
      text:
        es: La velocidad límite c indica que la perturbación electromagnética se propaga de manera autoinducida.
        en: The limit speed c indicates that the electromagnetic disturbance propagates in a self-induced manner.
    coherence_rules:
    - id: coherence_c_0
      when: result < 0
      status: error
      text:
        es: 'ERROR: La velocidad no puede ser negativa en este modelo.'
        en: 'ERROR: Speed cannot be negative in this model.'
    - id: coherence_c_1
      when: 'true'
      status: info
      text:
        es: La velocidad es estrictamente positiva y coincide con la constante universal.
        en: The speed is strictly positive and matches the universal constant.
    model_validity_rules:
    - id: validity_c
      when: 'true'
      status: info
      text:
        es: Este valor de c solo es válido en el vacío absoluto; en medios dieléctricos disminuye según el índice de refracción.
        en: This value of c is only valid in absolute vacuum; in dielectric media it decreases according to the refractive
          index.
    graph_rules:
    - id: graph_c
      when: 'true'
      status: info
      text:
        es: En el gráfico, c determina la tasa de avance temporal de los frentes de onda.
        en: In the graph, c determines the rate of temporal advance of the wavefronts.
    likely_errors:
    - id: error_c
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_de_la_luz_en_el_vacio]] con una lectura aislada es un error frecuente: Cuidado con asumir
          que la velocidad c cambia si varía la frecuencia o la amplitud.'
        en: 'A common mistake is to interpret [[velocidad_de_la_luz_en_el_vacio]] in isolation: Beware of assuming that the
          speed c changes if frequency or amplitude varies.'
    next_step_rules:
    - id: next_c
      when: 'true'
      status: info
      text:
        es: Explora cómo cambia la velocidad de propagación al entrar en un medio dieléctrico real.
        en: Explore how the propagation speed changes when entering a real dielectric medium.
    physical_intuition:
    - id: velocidad_de_la_luz_en_el_vacio_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_la_luz_en_el_vacio]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_la_luz_en_el_vacio]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_la_luz_en_el_vacio_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_la_luz_en_el_vacio]].
        en: Check limiting cases of [[velocidad_de_la_luz_en_el_vacio]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  mu0:
    enabled: true
    magnitude_type: permeabilidad
    semantic_role:
      es: Permeabilidad magnética del vacío
      en: Vacuum magnetic permeability
    summary_rules:
    - id: summary_mu0
      when: 'true'
      status: info
      text:
        es: La constante mu0 mide la oposición del vacío a la formación de campos magnéticos.
        en: The constant mu0 measures the vacuum's opposition to the formation of magnetic fields.
    physical_reading_rules:
    - id: physical_mu0
      when: 'true'
      status: info
      text:
        es: La permeabilidad magnética del vacío influye inversamente en la velocidad de propagación de la onda.
        en: The vacuum magnetic permeability inversely influences the propagation speed of the wave.
    coherence_rules:
    - id: coherence_mu0_0
      when: result <= 0
      status: error
      text:
        es: 'ERROR: La permeabilidad magnética debe ser estrictamente positiva.'
        en: 'ERROR: The magnetic permeability must be strictly positive.'
    - id: coherence_mu0_1
      when: 'true'
      status: info
      text:
        es: Permeabilidad magnética físicamente admisible.
        en: Physically admissible magnetic permeability.
    model_validity_rules:
    - id: validity_mu0
      when: 'true'
      status: info
      text:
        es: Esta constante es universal y fija en el vacío de acuerdo con el Sistema Internacional.
        en: This constant is universal and fixed in vacuum according to the International System.
    graph_rules:
    - id: graph_mu0
      when: 'true'
      status: info
      text:
        es: No aplica - sin gráficos.
        en: N/A - no graphs.
    likely_errors:
    - id: error_mu0
      when: 'true'
      status: warning
      text:
        es: Confundir la permeabilidad del vacío con la permeabilidad magnética de materiales ferromagnéticos.
        en: 'A common mistake is to interpret [[mu0]] in isolation: Confusing vacuum permeability with the magnetic permeability
          of ferromagnetic materials.'
    next_step_rules:
    - id: next_mu0
      when: 'true'
      status: info
      text:
        es: Investiga cómo la permeabilidad relativa de un medio material altera la impedancia característica.
        en: Investigate how the relative permeability of a material medium alters the characteristic impedance.
    physical_intuition:
    - id: mu0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[mu0]] describe el estado dinámico.
        en: Intuitively, [[mu0]] describes the dynamic state.
    limiting_cases:
    - id: mu0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[mu0]].
        en: Check limiting cases of [[mu0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  epsilon0:
    enabled: true
    magnitude_type: permitividad
    semantic_role:
      es: Permitividad eléctrica del vacío
      en: Vacuum electric permittivity
    summary_rules:
    - id: summary_epsilon0
      when: 'true'
      status: info
      text:
        es: La constante epsilon0 mide la permitividad del vacío ante campos eléctricos.
        en: The constant epsilon0 measures the vacuum's permittivity to electric fields.
    physical_reading_rules:
    - id: physical_epsilon0
      when: 'true'
      status: info
      text:
        es: La permitividad eléctrica del vacío define la capacitancia intrínseca del espacio libre y limita la velocidad
          de la luz.
        en: The vacuum electric permittivity defines the intrinsic capacitance of free space and limits the speed of light.
    coherence_rules:
    - id: coherence_epsilon0_0
      when: result <= 0
      status: error
      text:
        es: 'ERROR: La permitividad eléctrica debe ser estrictamente positiva.'
        en: 'ERROR: The electric permittivity must be strictly positive.'
    - id: coherence_epsilon0_1
      when: 'true'
      status: info
      text:
        es: Permitividad eléctrica físicamente admisible.
        en: Physically admissible electric permittivity.
    model_validity_rules:
    - id: validity_epsilon0
      when: 'true'
      status: info
      text:
        es: Esta permitividad es constante en el vacío pero se incrementa por la polarización en cualquier medio material.
        en: This permittivity is constant in vacuum but increases due to polarization in any material medium.
    graph_rules:
    - id: graph_epsilon0
      when: 'true'
      status: info
      text:
        es: No aplica - sin gráficos.
        en: N/A - no graphs.
    likely_errors:
    - id: error_epsilon0
      when: 'true'
      status: warning
      text:
        es: Olvidar que epsilon0 define la escala de la fuerza electrostática en la ley de Coulomb.
        en: Forgetting that epsilon0 defines the scale of the electrostatic force in Coulomb's law.
    next_step_rules:
    - id: next_epsilon0
      when: 'true'
      status: info
      text:
        es: Compara este comportamiento con la polarización dieléctrica de materiales aislantes.
        en: Compare this behavior with the dielectric polarization of insulating materials.
    physical_intuition:
    - id: epsilon0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[epsilon0]] describe el estado dinámico.
        en: Intuitively, [[epsilon0]] describes the dynamic state.
    limiting_cases:
    - id: epsilon0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[epsilon0]].
        en: Check limiting cases of [[epsilon0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  amplitud_del_campo_electrico:
    enabled: true
    magnitude_type: amplitud_electrica
    semantic_role:
      es: Amplitud del campo eléctrico
      en: Electric field amplitude
    summary_rules:
    - id: summary_e0
      when: 'true'
      status: info
      text:
        es: La amplitud eléctrica define la intensidad máxima de oscilación del campo eléctrico y describe la fuerza del frente
          de onda.
        en: The electric amplitude defines the maximum intensity of the electric field oscillation and describes the strength
          of the wavefront.
    physical_reading_rules:
    - id: physical_e0
      when: 'true'
      status: info
      text:
        es: Una mayor amplitud E0 implica que la onda electromagnética transporta más flujo energético.
        en: A larger amplitude E0 implies that the electromagnetic wave carries more energy flux.
    coherence_rules:
    - id: coherence_e0_0
      when: result < 0
      status: error
      text:
        es: 'ERROR: La amplitud no puede ser negativa.'
        en: 'ERROR: Amplitude cannot be negative.'
    - id: coherence_e0_1
      when: 'true'
      status: info
      text:
        es: Amplitud eléctrica coherente y no negativa.
        en: Coherent and non-negative electric amplitude.
    model_validity_rules:
    - id: validity_e0_0
      when: result > 1e6
      status: warning
      text:
        es: 'Cuidado: Amplitudes extremas pueden causar ruptura dieléctrica en medios reales.'
        en: 'Warning: Extreme amplitudes can cause dielectric breakdown in real media.'
    - id: validity_e0_1
      when: 'true'
      status: info
      text:
        es: Modelo de onda lineal aplicable para amplitudes ordinarias.
        en: Linear wave model applicable for ordinary amplitudes.
    graph_rules:
    - id: graph_e0
      when: 'true'
      status: info
      text:
        es: En el gráfico del acoplamiento, E0 se representa como la altura máxima del vector del campo eléctrico y.
        en: In the coupling graph, E0 is represented as the maximum height of the electric field y-vector.
    likely_errors:
    - id: error_e0
      when: 'true'
      status: warning
      text:
        es: Confundir la amplitud del campo eléctrico con el valor eficaz de la tensión de una red cableada.
        en: 'A common mistake is to interpret [[amplitud_del_campo_electrico]] in isolation: Confusing electric field amplitude
          with the root-mean-square voltage of a wired grid.'
    next_step_rules:
    - id: next_e0
      when: 'true'
      status: info
      text:
        es: Calcula la intensidad media asociada para ver la potencia por unidad de área.
        en: Calculate the associated mean intensity to see the power per unit area.
    physical_intuition:
    - id: amplitud_del_campo_electrico_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[amplitud_del_campo_electrico]] describe el estado dinámico.
        en: Intuitively, [[amplitud_del_campo_electrico]] describes the dynamic state.
    limiting_cases:
    - id: amplitud_del_campo_electrico_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[amplitud_del_campo_electrico]].
        en: Check limiting cases of [[amplitud_del_campo_electrico]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  amplitud_del_campo_magnetico:
    enabled: true
    magnitude_type: amplitud_magnetica
    semantic_role:
      es: Amplitud del campo magnético
      en: Magnetic field amplitude
    summary_rules:
    - id: summary_b0
      when: 'true'
      status: info
      text:
        es: La amplitud magnética define la intensidad máxima de oscilación del campo magnético.
        en: The magnetic amplitude defines the maximum intensity of the magnetic field oscillation.
    physical_reading_rules:
    - id: physical_b0
      when: 'true'
      status: info
      text:
        es: La amplitud magnética B0 es proporcional a E0 dividida por la velocidad de la luz c.
        en: The magnetic amplitude B0 is proportional to E0 divided by the speed of light c.
    coherence_rules:
    - id: coherence_b0_0
      when: result < 0
      status: error
      text:
        es: 'ERROR: La amplitud del campo magnético no puede ser negativa.'
        en: 'ERROR: Magnetic field amplitude cannot be negative.'
    - id: coherence_b0_1
      when: 'true'
      status: info
      text:
        es: Amplitud magnética dentro de rangos coherentes.
        en: Magnetic amplitude within coherent ranges.
    model_validity_rules:
    - id: validity_b0
      when: 'true'
      status: info
      text:
        es: La relación E0/B0 = c se mantiene rigurosamente en el vacío para cualquier frecuencia.
        en: The relation E0/B0 = c is rigorously maintained in vacuum for any frequency.
    graph_rules:
    - id: graph_b0
      when: 'true'
      status: info
      text:
        es: En el gráfico tridimensional, B0 es la amplitud máxima del vector magnético oscilando en el eje z.
        en: In the 3D graph, B0 is the maximum amplitude of the magnetic vector oscillating along the z-axis.
    likely_errors:
    - id: error_b0
      when: 'true'
      status: warning
      text:
        es: Suponer que los campos eléctrico y magnético transportan cantidades desiguales de energía debido a la diferencia
          numérica entre E0 y B0.
        en: 'A common mistake is to interpret [[amplitud_del_campo_magnetico]] in isolation: Assuming that electric and magnetic
          fields carry unequal energy amounts due to the numerical difference between E0 and B0.'
    next_step_rules:
    - id: next_b0
      when: 'true'
      status: info
      text:
        es: Compara la disipación e interacción del campo magnético en medios con permeabilidad magnética distinta.
        en: Compare magnetic field dissipation and interaction in media with different magnetic permeability.
    physical_intuition:
    - id: amplitud_del_campo_magnetico_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[amplitud_del_campo_magnetico]] describe el estado dinámico.
        en: Intuitively, [[amplitud_del_campo_magnetico]] describes the dynamic state.
    limiting_cases:
    - id: amplitud_del_campo_magnetico_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[amplitud_del_campo_magnetico]].
        en: Check limiting cases of [[amplitud_del_campo_magnetico]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda:
    enabled: true
    magnitude_type: longitud_onda
    semantic_role:
      es: Longitud de onda de la oscilación
      en: Wavelength of the oscillation
    summary_rules:
    - id: summary_lambda
      when: 'true'
      status: info
      text:
        es: La longitud de onda define la escala espacial de repetición periódica de la perturbación.
        en: The wavelength defines the spatial scale of periodic repetition of the disturbance.
    physical_reading_rules:
    - id: physical_lambda
      when: 'true'
      status: info
      text:
        es: Una menor longitud de onda corresponde a frecuencias más altas y mayor energía por fotón.
        en: A shorter wavelength corresponds to higher frequencies and higher energy per photon.
    coherence_rules:
    - id: coherence_lambda_0
      when: result <= 0
      status: error
      text:
        es: 'ERROR: La longitud de onda debe ser estrictamente positiva.'
        en: 'ERROR: Wavelength must be strictly positive.'
    - id: coherence_lambda_1
      when: 'true'
      status: info
      text:
        es: Longitud de onda espacialmente coherente.
        en: Spatially coherent wavelength.
    model_validity_rules:
    - id: validity_lambda_0
      when: result < 1e-12
      status: info
      text:
        es: A longitudes extremadamente cortas (rayos gamma), los efectos cuánticos del fotón dominan el modelo clásico de
          onda.
        en: At extremely short wavelengths (gamma rays), quantum photon effects dominate the classical wave model.
    - id: validity_lambda_1
      when: 'true'
      status: info
      text:
        es: Modelo clásico de onda plana plenamente válido.
        en: Classical plane wave model fully valid.
    graph_rules:
    - id: graph_lambda
      when: 'true'
      status: info
      text:
        es: En el gráfico, representa la distancia real medida sobre el eje de propagación entre dos crestas sucesivas.
        en: In the graph, it represents the real distance measured along the propagation axis between two successive crests.
    likely_errors:
    - id: error_lambda
      when: 'true'
      status: warning
      text:
        es: Olvidar que la longitud de onda varía cuando la radiación cambia de medio de propagación.
        en: Forgetting that wavelength changes when radiation transitions between propagation media.
    next_step_rules:
    - id: next_lambda
      when: 'true'
      status: info
      text:
        es: Consulta el espectro electromagnético para clasificar esta longitud de onda en su banda correspondiente.
        en: Consult the electromagnetic spectrum to classify this wavelength in its corresponding band.
    physical_intuition:
    - id: lambda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda]] describe el estado dinámico.
        en: Intuitively, [[lambda]] describes the dynamic state.
    limiting_cases:
    - id: lambda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda]].
        en: Check limiting cases of [[lambda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  frecuencia:
    enabled: true
    magnitude_type: frecuencia
    semantic_role:
      es: Frecuencia de oscilación
      en: Oscillation frequency
    summary_rules:
    - id: summary_f
      when: 'true'
      status: info
      text:
        es: La frecuencia determina la tasa de oscilación temporal del dipolo emisor original.
        en: The frequency determines the temporal oscillation rate of the original emitting dipole.
    physical_reading_rules:
    - id: physical_f
      when: 'true'
      status: info
      text:
        es: La frecuencia f se mantiene constante e invariable incluso si la onda cambia de medio material.
        en: The frequency f remains constant and invariant even if the wave changes material media.
    coherence_rules:
    - id: coherence_f_0
      when: result <= 0
      status: error
      text:
        es: 'ERROR: La frecuencia debe ser estrictamente positiva.'
        en: 'ERROR: Frequency must be strictly positive.'
    - id: coherence_f_1
      when: 'true'
      status: info
      text:
        es: Frecuencia temporalmente coherente.
        en: Temporally coherent frequency.
    model_validity_rules:
    - id: validity_f
      when: 'true'
      status: info
      text:
        es: La frecuencia clásica es ilimitada, pero en física cuántica se asocia de forma directa con la energía de Planck.
        en: Classical frequency is unlimited, but in quantum physics it directly links with Planck's energy.
    graph_rules:
    - id: graph_f
      when: 'true'
      status: info
      text:
        es: En el gráfico, f define el número de oscilaciones que cruzan cualquier punto fijo del espacio cada segundo.
        en: In the graph, f defines the number of oscillations crossing any fixed point of space every second.
    likely_errors:
    - id: error_f
      when: 'true'
      status: warning
      text:
        es: Creer erróneamente que la frecuencia de la onda electromagnética cambia al refractarse.
        en: Wrongly believing that the frequency of the electromagnetic wave changes upon refraction.
    next_step_rules:
    - id: next_f
      when: 'true'
      status: info
      text:
        es: Analiza el espectro electromagnético para identificar si es una onda de radio, microondas o luz visible.
        en: Analyze the electromagnetic spectrum to identify if it is a radio wave, microwave, or visible light.
    physical_intuition:
