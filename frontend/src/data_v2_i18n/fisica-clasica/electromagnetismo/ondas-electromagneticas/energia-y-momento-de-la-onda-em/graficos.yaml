version: "1.0"
leaf: "energia-y-momento-de-la-onda-em"

coord:
  title:
    es: Gráfica Coord · Energía y Momento de la Onda EM
    en: Coord Graph · EM Wave Energy and Momentum
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: densidad de energía u (J/m³) o vector de Poynting S (W/m²)
    en: energy density u (J/m³) or Poynting vector S (W/m²)
  xMagnitude: x
  yMagnitude: S
  relation:
    es: u = ε₀E² = B²/μ₀ (para onda plana). S = u·c = E×H. Irradiancia I = S_media = ε₀cE₀²/2.
    en: u = ε₀E² = B²/μ₀ (for plane wave). S = u·c = E×H. Irradiance I = S_avg = ε₀cE₀²/2.
  physicalReading:
    es: S oscila con el cuadrado del campo. La irradiancia es el promedio temporal de S.
    en: S oscillates as the square of the field. Irradiance is the time average of S.
  slopeMeaning:
    es: "∂S/∂x = −∂u/∂t: relación de continuidad energética."
    en: "∂S/∂x = −∂u/∂t: energy continuity relation."
  interceptMeaning:
    es: S ≥ 0 para una onda propagándose en una dirección.
    en: S ≥ 0 for a wave propagating in one direction.
  curvatureMeaning:
    es: Oscilación sinusoidal al cuadrado (sin²).
    en: Sinusoidal squared oscillation (sin²).
  signMeaning:
    es: S ≥ 0 indica la dirección de flujo de energía.
    en: S ≥ 0 indicates the direction of energy flow.
  areaMeaning:
    es: Área bajo S(t) = energía por unidad de área (fluencia).
    en: Area under S(t) = energy per unit area (fluence).
  domainMeaning:
    es: Válido para ondas planas. p = S/c (presión de radiación).
    en: Valid for plane waves. p = S/c (radiation pressure).
  modelConnection:
    es: Vector de Poynting y densidad de energía de las ondas EM.
    en: Poynting vector and energy density of EM waves.
  formulaConnection:
    es: Conecta con S = E×H, u = ε₀E², I = ε₀cE₀²/2, p = I/c (presión).
    en: Connects to S = E×H, u = ε₀E², I = ε₀cE₀²/2, p = I/c (pressure).
  readingFocus:
    es: leer la irradiancia I como el promedio temporal de S y calcular la presión de radiación.
    en: read irradiance I as the time average of S and compute radiation pressure.
  agentHints:
    es:
      - I = ε₀cE₀²/2.
      - Presión de radiación p = I/c.
      - El Sol irradia ≈ 1360 W/m² sobre la Tierra (constante solar).
    en:
      - I = ε₀cE₀²/2.
      - Radiation pressure p = I/c.
      - The Sun irradiates ≈ 1360 W/m² on Earth (solar constant).
  commonMistakes:
    es:
      - Confundir S instantáneo con la irradiancia I (promedio temporal).
      - Olvidar el factor 1/2 en I = ε₀cE₀²/2.
      - Confundir densidad de energía u con irradiancia I.
    en:
      - Confusing instantaneous S with irradiance I (time average).
      - Forgetting the factor 1/2 in I = ε₀cE₀²/2.
      - Confusing energy density u with irradiance I.

svg:
  title:
    es: Escena SVG · Energía y Momento Onda EM
    en: SVG Scene · EM Wave Energy and Momentum
  sceneId: em_energy
  sceneLabel:
    es: Flujo de energía y presión de radiación
    en: Energy flux and radiation pressure
  objects:
    es:
      - vector de Poynting S
      - superficie irradiada
      - presión de radiación p
    en:
      - Poynting vector S
      - irradiated surface
      - radiation pressure p
  mainObject:
    es: onda EM plana incidiendo en una superficie
    en: plane EM wave incident on a surface
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: S perpendicular a la superficie. I = S_media. p = I/c.
    en: S perpendicular to the surface. I = S_avg. p = I/c.
  interactions:
    es: La onda transfiere energía (I) y momento (p = I/c) a la superficie.
    en: The wave transfers energy (I) and momentum (p = I/c) to the surface.
  modelElements:
    es:
      - S = E×H
      - I = ε₀cE₀²/2
      - p = I/c (absorción) o p = 2I/c (reflexión)
    en:
      - S = E×H
      - I = ε₀cE₀²/2
      - p = I/c (absorption) or p = 2I/c (reflection)
  visualCues:
    es:
      - S apunta en la dirección de propagación.
      - "Presión de radiación: doble para reflexión total."
      - "Irradiancia solar: ≈ 1360 W/m²."
    en:
      - S points in the propagation direction.
      - "Radiation pressure: double for total reflection."
      - "Solar irradiance: ≈ 1360 W/m²."
  scaleMeaning:
    es: Las flechas de S son proporcionales a la irradiancia.
    en: S arrows are proportional to irradiance.
  relation:
    es: S = E×H. I = S_media = ε₀cE₀²/2. p = I/c.
    en: S = E×H. I = S_avg = ε₀cE₀²/2. p = I/c.
  physicalReading:
    es: Visualizar el flujo de energía S y la presión de radiación que ejerce sobre la superficie.
    en: Visualise the energy flux S and the radiation pressure exerted on the surface.
  modelConnection:
    es: Vector de Poynting y presión de radiación.
    en: Poynting vector and radiation pressure.
  formulaConnection:
    es: Conecta con S = E×H, I = ε₀cE₀²/2, p = I/c o 2I/c.
    en: Connects to S = E×H, I = ε₀cE₀²/2, p = I/c or 2I/c.
  readingFocus:
    es: identificar la dirección de S y calcular la presión de radiación sobre la superficie.
    en: identify the direction of S and compute the radiation pressure on the surface.
  agentHints:
    es:
      - "Absorción total: p = I/c; reflexión total: p = 2I/c."
      - Las velas solares usan la presión de radiación.
      - I_solar ≈ 1360 W/m².
    en:
      - "Total absorption: p = I/c; total reflection: p = 2I/c."
      - Solar sails use radiation pressure.
      - I_solar ≈ 1360 W/m².
  commonMistakes:
    es:
      - Confundir I (irradiancia) con S (instantáneo).
      - Olvidar el factor 2 en reflexión.
      - Pensar que la presión de radiación es despreciable siempre.
    en:
      - Confusing I (irradiance) with S (instantaneous).
      - Forgetting the factor 2 in reflection.
      - Thinking radiation pressure is always negligible.
