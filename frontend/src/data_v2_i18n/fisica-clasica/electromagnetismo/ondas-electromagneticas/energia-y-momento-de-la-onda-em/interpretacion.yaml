      status: ok
      text:
        es: '[[c]] multiplica [[u_EM]] para obtener [[S_med]] y divide energia para leer momento o presion.'
        en: '[[c]] multiplies [[u_EM]] to obtain [[S_med]] and divides energy to read momentum or pressure.'
