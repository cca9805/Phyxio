        en: 'A common mistake is to interpret [[campo_electrico_eficaz]] in isolation: Typical error: mixing rms value and
          peak amplitude without checking the energy average.'
    next_step_rules:
    - id: e0_next_default
      when: 'true'
      status: ok
      text:
        es: Usa [[E0]] para obtener [[u_EM]] y despues interpretar [[S_med]].
        en: Use [[E0]] to obtain [[u_EM]] and then interpret [[S_med]].
    physical_intuition:
    - id: campo_electrico_eficaz_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[campo_electrico_eficaz]] describe el estado dinámico.
