version: "1.0"
leaf: "espectro-electromagnetico"

coord:
  title:
    es: Gráfica Coord · Espectro Electromagnético
    en: Coord Graph · Electromagnetic Spectrum
  xAxis:
    es: frecuencia f (Hz) o longitud de onda λ (m)
    en: frequency f (Hz) or wavelength λ (m)
  yAxis:
    es: energía del fotón E (eV) o intensidad relativa
    en: photon energy E (eV) or relative intensity
  xMagnitude: f
  yMagnitude: E_photon
  relation:
    es: "E = hf = hc/λ. A mayor frecuencia → mayor energía del fotón. Espectro: radio, microondas, infrarrojo, visible, UV, rayos X, gamma."
    en: "E = hf = hc/λ. Higher frequency → higher photon energy. Spectrum: radio, microwave, infrared, visible, UV, X-ray, gamma."
  physicalReading:
    es: Relación lineal E = hf. El espectro visible cubre 380–780 nm. Cada región tiene aplicaciones específicas.
    en: Linear relationship E = hf. Visible spectrum covers 380–780 nm. Each region has specific applications.
  slopeMeaning:
    es: Pendiente = h = 6.63×10⁻³⁴ J·s (constante de Planck).
    en: "Slope = h = 6.63×10⁻³⁴ J·s (Planck's constant)."
  interceptMeaning:
    es: "E(0) = 0: sin frecuencia no hay energía de fotón."
    en: "E(0) = 0: no frequency means no photon energy."
  curvatureMeaning:
    es: "Lineal: E ∝ f."
    en: "Linear: E ∝ f."
  signMeaning:
    es: E ≥ 0 siempre.
    en: E ≥ 0 always.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "f > 0. λ = c/f."
    en: "f > 0. λ = c/f."
  modelConnection:
    es: Cuantización de la energía electromagnética (Planck-Einstein).
    en: Quantisation of electromagnetic energy (Planck-Einstein).
  formulaConnection:
    es: Conecta con E = hf = hc/λ, λ = c/f, y las regiones del espectro.
    en: Connects to E = hf = hc/λ, λ = c/f, and the spectral regions.
  readingFocus:
    es: identificar la región espectral, leer la energía del fotón y su aplicación.
    en: identify the spectral region, read the photon energy, and its application.
  agentHints:
    es:
      - "Visible: 380–780 nm (≈ 1.6–3.3 eV)."
      - h = 6.63×10⁻³⁴ J·s = 4.14×10⁻¹⁵ eV·s.
      - "Rayos gamma: f > 10²⁰ Hz; radio: f < 10⁹ Hz."
    en:
      - "Visible: 380–780 nm (≈ 1.6–3.3 eV)."
      - h = 6.63×10⁻³⁴ J·s = 4.14×10⁻¹⁵ eV·s.
      - "Gamma rays: f > 10²⁰ Hz; radio: f < 10⁹ Hz."
  commonMistakes:
    es:
      - "Confundir λ y f (son inversamente proporcionales: λ = c/f)."
      - Olvidar que E = hf (cuántica), no la energía de la onda clásica.
      - Pensar que la velocidad de la onda EM varía con f (c es constante en el vacío).
    en:
      - "Confusing λ and f (they are inversely proportional: λ = c/f)."
      - Forgetting that E = hf (quantum), not classical wave energy.
      - Thinking EM wave speed varies with f (c is constant in vacuum).
