version: 5
topic:
  id: espectro-electromagnetico
  title:
    es: Espectro electromagnetico
    en: Electromagnetic Spectrum
magnitudes:
- id: lambda
  symbol: \lambda
  nombre:
    es: longitud de onda
    en: wavelength
  descripcion:
    es: Distancia espacial entre dos puntos equivalentes de la onda electromagnetica.
    en: Spatial distance between two equivalent points of the electromagnetic wave.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - relacion_dispersion_espectral
  common_mistake:
    es: Pensar que una longitud de onda mayor implica siempre mas energia.
    en: Thinking that a longer wavelength always means more energy.
  typical_range: 1e-15 a 1e6 m en el espectro electromagnetico completo
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una distancia positiva entre crestas equivalentes.
      en: It is a positive distance between equivalent crests.
  zero_behavior:
    allowed: false
    meaning:
      es: Una longitud de onda nula no representa una onda fisica clasica.
      en: Zero wavelength does not represent a classical physical wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: lambda > 0
  interpretation_role:
    primary_for:
    - escala_espacial
    - region_espectral
    secondary_for:
    - comparacion_con_f
  graph_binding:
    channels:
    - x_wavelength
  pedagogical_notes:
    es: '[[lambda]] ayuda a ubicar visualmente la region espectral, pero debe leerse junto con [[f]].'
    en: '[[lambda]] helps visually locate the spectral region, but it must be read with [[f]].'
- id: frecuencia
  symbol: f
  nombre:
    es: frecuencia
    en: frequency
  descripcion:
    es: Numero de oscilaciones electromagneticas por segundo.
    en: Number of electromagnetic oscillations per second.
  unidad_si: Hz
  dimension: '[T^-1]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - relacion_dispersion_espectral
  - energia_foton
  common_mistake:
    es: Confundir frecuencia con velocidad de propagacion.
    en: Confusing frequency with propagation speed.
  typical_range: 1e3 a 1e25 Hz segun region del espectro
  sign_behavior:
    has_sign: false
    meaning:
      es: Es un ritmo de oscilacion no negativo.
      en: It is a nonnegative oscillation rate.
  zero_behavior:
    allowed: false
    meaning:
      es: Frecuencia nula no describe radiacion electromagnetica oscilante.
      en: Zero frequency does not describe oscillating electromagnetic radiation.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: f > 0
  interpretation_role:
    primary_for:
    - orden_espectral
    - energia_por_foton
    secondary_for:
    - comparacion_con_lambda
  graph_binding:
    channels:
    - x_frequency
    - star_value
  pedagogical_notes:
    es: '[[f]] es la magnitud dominante porque ordena energia, region y efecto fisico.'
    en: '[[f]] is dominant because it orders energy, region, and physical effect.'
- id: velocidad_de_la_luz_en_el_vacio
  symbol: c
  nombre:
    es: velocidad de la luz en el vacio
    en: speed of light in vacuum
  descripcion:
    es: Velocidad de propagacion comun que vincula frecuencia y longitud de onda en el vacio.
    en: Common propagation speed linking frequency and wavelength in vacuum.
  unidad_si: m/s
  dimension: '[L T^-1]'
  is_vector: false
  components: []
  category: constant
  physical_role: core_physical_quantity
  used_in:
  - relacion_dispersion_espectral
  common_mistake:
    es: Creer que colores distintos viajan a distinta velocidad en el vacio.
    en: Believing that different colors travel at different speeds in vacuum.
  typical_range: 2.99792458e8 m/s en el vacio
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una rapidez positiva de propagacion.
      en: It is a positive propagation speed.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin propagacion no hay onda electromagnetica viajera.
      en: Without propagation there is no travelling electromagnetic wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: c > 0
  interpretation_role:
    primary_for:
    - relacion_lambda_f
    secondary_for:
    - control_dimensional
  graph_binding:
    channels:
    - dispersion_slope
  pedagogical_notes:
    es: '[[c]] no decide la region espectral; conecta [[lambda]] y [[f]].'
    en: '[[c]] does not choose the spectral region; it connects [[lambda]] and [[f]].'
- id: constante_de_planck
  symbol: h
  nombre:
    es: constante de Planck
    en: Planck constant
  descripcion:
    es: Constante que convierte frecuencia en energia de un foton.
    en: Constant converting frequency into photon energy.
  unidad_si: J s
  dimension: '[M L^2 T^-1]'
  is_vector: false
  components: []
  category: constant
  physical_role: core_physical_quantity
  used_in:
  - energia_foton
  common_mistake:
    es: Usarla para energia total de un haz sin contar cuantos fotones hay.
    en: Using it for total beam energy without counting how many photons there are.
  typical_range: 6.62607015e-34 J s
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una constante positiva.
      en: It is a positive constant.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin esta constante desaparece la escala cuantica de energia fotonica.
      en: Without this constant the quantum scale of photon energy disappears.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: h > 0
  interpretation_role:
    primary_for:
    - energia_fotonica
    secondary_for:
    - puente_clasico_cuantico
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: '[[h]] marca que el espectro tambien organiza energia por foton, no solo ondas clasicas.'
    en: '[[h]] marks that the spectrum organizes photon energy, not only classical waves.'
- id: energia_de_un_foton
  symbol: E_{foton}
  nombre:
    es: energia de un foton
    en: photon energy
  descripcion:
    es: Energia asociada a un foton individual de frecuencia dada.
    en: Energy associated with a single photon of a given frequency.
  unidad_si: J
  dimension: '[M L^2 T^-2]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - energia_foton
  common_mistake:
    es: Confundir energia por foton con intensidad total de una fuente.
    en: Confusing energy per photon with total source intensity.
  typical_range: 1e-30 a 1e-8 J por foton segun region espectral
  sign_behavior:
    has_sign: false
    meaning:
      es: Es energia positiva de una excitacion electromagnetica.
      en: It is positive energy of an electromagnetic excitation.
  zero_behavior:
    allowed: false
    meaning:
      es: Un foton de energia nula no pertenece al espectro fisico usual.
      en: A zero-energy photon is outside the usual physical spectrum.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: E_foton > 0
  interpretation_role:
    primary_for:
    - interaccion_materia
    - region_ionizante
    secondary_for:
    - comparacion_con_f
  graph_binding:
    channels:
    - y_photon_energy
  pedagogical_notes:
    es: '[[E_foton]] permite entender por que rayos X y radio no interactuan igual con la materia.'
    en: '[[E_foton]] explains why X rays and radio waves do not interact with matter in the same way.'
