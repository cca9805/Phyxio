version: "1.0"
leaf: "propagacion-en-medios"

coord:
  title:
    es: Gráfica Coord · Propagación en Medios
    en: Coord Graph · Propagation in Media
  xAxis:
    es: índice de refracción n
    en: refractive index n
  yAxis:
    es: velocidad de fase v = c/n (m/s)
    en: phase velocity v = c/n (m/s)
  xMagnitude: n
  yMagnitude: v
  relation:
    es: "v = c/n. Hipérbola 1/n. En medios dispersivos: n = n(f), la velocidad de grupo difiere de la de fase."
    en: "v = c/n. Hyperbola 1/n. In dispersive media: n = n(f), group velocity differs from phase velocity."
  physicalReading:
    es: "Al aumentar n: la onda se ralentiza. La longitud de onda λ_medio = λ₀/n disminuye; f no cambia."
    en: "Increasing n: the wave slows down. Wavelength λ_medium = λ₀/n decreases; f does not change."
  slopeMeaning:
    es: "dv/dn = −c/n² < 0: la velocidad cae al aumentar n."
    en: "dv/dn = −c/n² < 0: velocity decreases as n increases."
  interceptMeaning:
    es: "v(1) = c: en el vacío (n = 1) la velocidad es c."
    en: "v(1) = c: in vacuum (n = 1) the velocity is c."
  curvatureMeaning:
    es: "Hipérbola 1/n: decaimiento rápido para n pequeño."
    en: "Hyperbola 1/n: rapid decay for small n."
  signMeaning:
    es: "v > 0 siempre."
    en: "v > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "n ≥ 1. Para materiales con n < 1 (metamateriales): v > c (velocidad de fase, no de señal)."
    en: "n ≥ 1. For materials with n < 1 (metamaterials): v > c (phase velocity, not signal velocity)."
  modelConnection:
    es: "Propagación de ondas EM en medios dieléctricos: v = c/n = 1/√(εμ)."
    en: "Propagation of EM waves in dielectric media: v = c/n = 1/√(εμ)."
  formulaConnection:
    es: Conecta con v = c/n, n = c/v, λ_medio = λ₀/n, y la ley de Snell.
    en: "Connects to v = c/n, n = c/v, λ_medium = λ₀/n, and Snell's law."
  readingFocus:
    es: leer v = c/n para el medio dado y comparar con la velocidad en el vacío.
    en: read v = c/n for the given medium and compare with the speed in vacuum.
  agentHints:
    es:
      - f no cambia al cambiar de medio; cambia λ.
      - n(vidrio) ≈ 1.5 → v ≈ 2×10⁸ m/s.
      - "Dispersión: n(λ) causa separación de colores (prisma, arcoíris)."
    en:
      - f does not change when entering a medium; λ changes.
      - n(glass) ≈ 1.5 → v ≈ 2×10⁸ m/s.
      - "Dispersion: n(λ) causes colour separation (prism, rainbow)."
  commonMistakes:
    es:
      - Pensar que f cambia al entrar en un medio.
      - Olvidar que λ_medio = λ₀/n.
      - Confundir velocidad de fase con velocidad de grupo en medios dispersivos.
    en:
      - Thinking f changes when entering a medium.
      - Forgetting that λ_medium = λ₀/n.
      - Confusing phase velocity with group velocity in dispersive media.

svg:
  title:
    es: Escena SVG · Propagación en Medios
    en: SVG Scene · Propagation in Media
  sceneId: em_propagation
  sceneLabel:
    es: Onda EM al pasar de un medio a otro
    en: EM wave passing from one medium to another
  objects:
    es:
      - onda incidente
      - onda refractada
      - onda reflejada
      - interfaz n₁/n₂
    en:
      - incident wave
      - refracted wave
      - reflected wave
      - interface n₁/n₂
  mainObject:
    es: interfaz entre dos medios dieléctricos
    en: interface between two dielectric media
  referenceFrame:
    es: plano de incidencia
    en: plane of incidence
  geometry:
    es: n₁sinθ₁ = n₂sinθ₂. v₁/v₂ = n₂/n₁.
    en: n₁sinθ₁ = n₂sinθ₂. v₁/v₂ = n₂/n₁.
  interactions:
    es: "Al cambiar de medio: f constante, λ = λ₀/n, v = c/n cambia."
    en: "Changing medium: f constant, λ = λ₀/n, v = c/n changes."
  modelElements:
    es:
      - índice n₁
      - índice n₂
      - θ₁ (incidencia)
      - θ₂ (refracción)
      - "θ_c (crítico si n₁ > n₂)"
    en:
      - index n₁
      - index n₂
      - θ₁ (incidence)
      - θ₂ (refraction)
      - "θ_c (critical if n₁ > n₂)"
  visualCues:
    es:
      - "n₂ > n₁: onda se ralentiza, λ disminuye."
      - "Reflexión total para θ₁ > θ_c."
      - "Dispersión: componentes de distintas λ se desvían diferente."
    en:
      - "n₂ > n₁: wave slows, λ decreases."
      - "Total reflection for θ₁ > θ_c."
      - "Dispersion: different λ components deviate differently."
  scaleMeaning:
    es: Las longitudes de onda son proporcionales a 1/n.
    en: Wavelengths are proportional to 1/n.
  relation:
    es: v = c/n; λ_medio = λ₀/n; n₁sinθ₁ = n₂sinθ₂.
    en: v = c/n; λ_medium = λ₀/n; n₁sinθ₁ = n₂sinθ₂.
  physicalReading:
    es: Visualizar cómo cambia λ al entrar en el nuevo medio mientras f se mantiene constante.
    en: Visualise how λ changes entering the new medium while f stays constant.
  modelConnection:
    es: Ondas EM en medios dieléctricos. Ley de Snell.
    en: "EM waves in dielectric media. Snell's law."
  formulaConnection:
    es: Conecta con v = c/n, λ = λ₀/n, n₁sinθ₁ = n₂sinθ₂.
    en: Connects to v = c/n, λ = λ₀/n, n₁sinθ₁ = n₂sinθ₂.
  readingFocus:
    es: identificar cómo cambia λ al pasar de un medio a otro y verificar la ley de Snell.
    en: "identify how λ changes passing from one medium to another and verify Snell's law."
  agentHints:
    es:
      - f constante; λ cambia.
      - "n₂ > n₁: λ₂ < λ₁."
      - "Dispersión: n(λ) → colores separados."
    en:
      - f constant; λ changes.
      - "n₂ > n₁: λ₂ < λ₁."
      - "Dispersion: n(λ) → separated colours."
  commonMistakes:
    es:
      - Pensar que f cambia.
      - Confundir λ_medio y λ₀.
      - "Olvidar que θ_c requiere n₁ > n₂."
    en:
      - Thinking f changes.
      - Confusing λ_medium and λ₀.
      - "Forgetting that θ_c requires n₁ > n₂."
