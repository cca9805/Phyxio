targets:
  v_m:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: velocidad de fase dentro del medio
      en: phase speed inside the medium
    summary_rules:
    - id: vm_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_m]] indica la rapidez de fase dentro del medio y disminuye cuando aumenta [[n]].'
        en: '[[v_m]] indicates phase speed inside the medium and decreases when [[n]] increases.'
    physical_reading_rules:
    - id: vm_reading_default
      when: 'true'
      status: ok
      text:
        es: Una [[v_m]] menor significa mayor retardo de fase y menor longitud de onda para la misma frecuencia.
        en: A smaller [[v_m]] means greater phase delay and shorter wavelength for the same frequency.
    coherence_rules:
    - id: vm_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[v_m]] debe ser positiva y no superar [[c]] en un medio ordinario de indice mayor que uno.'
        en: '[[v_m]] must be positive and not exceed [[c]] in an ordinary medium with index above one.'
    model_validity_rules:
    - id: vm_validity_default
      when: 'true'
      status: ok
      text:
        es: La lectura vale para onda monocromatica; para pulsos o dispersion fuerte conviene cambiar de modelo.
        en: The reading is valid for a monochromatic wave; for pulses or strong dispersion, switch model.
    graph_rules:
    - id: vm_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[v_m]] baja al mover [[n]] hacia valores mayores.
        en: On the graph, [[v_m]] falls as [[n]] moves toward larger values.
    likely_errors:
    - id: vm_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[v_m]] con una lectura aislada es un error frecuente: Error tipico: usar [[c]] como si fuera la velocidad
          real dentro del material.'
        en: 'Typical mistake: using [[c]] as if it were the real speed inside the material.'
    next_step_rules:
    - id: vm_next_default
      when: 'true'
      status: ok
      text:
        es: Despues de [[v_m]], revisa [[lambda_m]] para interpretar fase, interferencia o guiado.
        en: After [[v_m]], check [[lambda_m]] to interpret phase, interference, or guiding.
    physical_intuition:
    - id: v_m_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_m]] describe el estado dinámico.
        en: Intuitively, [[v_m]] describes the dynamic state.
    limiting_cases:
    - id: v_m_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_m]].
        en: Check limiting cases of [[v_m]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  velocidad_de_la_luz_en_el_vacio:
    enabled: true
    magnitude_type: scalar_constant
    semantic_role:
      es: referencia de velocidad en vacio
      en: vacuum speed reference
    summary_rules:
    - id: c_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[c]] resume la referencia de vacio y describe el valor limite frente al medio.'
        en: '[[c]] summarizes the vacuum reference and describes the limiting value compared with the medium.'
    physical_reading_rules:
    - id: c_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[c]] no es la velocidad material salvo que [[n]] sea practicamente uno.'
        en: '[[c]] is not the material speed unless [[n]] is practically one.'
    coherence_rules:
    - id: c_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[c]] debe permanecer positiva y actuar como referencia para comparar [[v_m]].'
        en: '[[c]] must remain positive and act as the reference for comparing [[v_m]].'
    model_validity_rules:
    - id: c_validity_default
      when: 'true'
      status: ok
      text:
        es: Usar [[c]] directamente solo es valido para vacio o aire como aproximacion muy cercana.
        en: Using [[c]] directly is valid only for vacuum or air as a very close approximation.
    graph_rules:
    - id: c_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[c]] funciona como referencia superior para medios ordinarios.
        en: On the graph, [[c]] acts as the upper reference for ordinary media.
    likely_errors:
    - id: c_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: olvidar que el material obliga a sustituir la velocidad por [[v_m]].'
        en: 'Frequent error: forgetting that the material requires replacing speed by [[v_m]].'
    next_step_rules:
    - id: c_next_default
      when: 'true'
      status: ok
      text:
        es: Compara [[c]] con [[v_m]] para estimar cuanto retarda el medio.
        en: Compare [[c]] with [[v_m]] to estimate how much the medium delays propagation.
    physical_intuition:
    - id: velocidad_de_la_luz_en_el_vacio_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_la_luz_en_el_vacio]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_la_luz_en_el_vacio]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_la_luz_en_el_vacio_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_la_luz_en_el_vacio]].
        en: Check limiting cases of [[velocidad_de_la_luz_en_el_vacio]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  indice_de_refraccion_efectivo:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: indice efectivo del medio
      en: effective index of the medium
    summary_rules:
    - id: n_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[n]] indica cuanto domina el medio sobre la propagacion y describe la reduccion de [[v_m]].'
        en: '[[n]] indicates how strongly the medium controls propagation and describes the reduction of [[v_m]].'
    physical_reading_rules:
    - id: n_reading_default
      when: 'true'
      status: ok
      text:
        es: Un [[n]] mayor significa mas retardo de fase y menor [[lambda_m]] para la misma frecuencia.
        en: A larger [[n]] means more phase delay and smaller [[lambda_m]] for the same frequency.
    coherence_rules:
    - id: n_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[n]] debe ser positivo en el regimen ordinario tratado por el leaf.'
        en: '[[n]] must be positive in the ordinary regime treated by the leaf.'
    model_validity_rules:
    - id: n_validity_default
      when: 'true'
      status: ok
      text:
        es: El indice efectivo vale si la dispersion y la absorcion no dominan el problema.
        en: The effective index is valid if dispersion and absorption do not dominate the problem.
    graph_rules:
    - id: n_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[n]] es el control horizontal del grafico y desplaza la curva de propagacion.'
        en: '[[n]] is the horizontal control of the graph and shifts the propagation curve.'
    likely_errors:
    - id: n_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[indice_de_refraccion_efectivo]] con una lectura aislada es un error frecuente: Error tipico: usar
          un indice tabulado sin comprobar frecuencia ni material.'
        en: 'Typical mistake: using a tabulated index without checking frequency or material.'
    next_step_rules:
    - id: n_next_default
      when: 'true'
      status: ok
      text:
        es: A partir de [[n]], calcula [[v_m]] o [[lambda_m]] segun la pregunta fisica.
        en: From [[n]], compute [[v_m]] or [[lambda_m]] depending on the physical question.
    physical_intuition:
    - id: indice_de_refraccion_efectivo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[indice_de_refraccion_efectivo]] describe el estado dinámico.
        en: Intuitively, [[indice_de_refraccion_efectivo]] describes the dynamic state.
    limiting_cases:
    - id: indice_de_refraccion_efectivo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[indice_de_refraccion_efectivo]].
        en: Check limiting cases of [[indice_de_refraccion_efectivo]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  epsilon_r:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: respuesta electrica efectiva
      en: effective electric response
    summary_rules:
    - id: er_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_r]] describe la respuesta electrica del medio y aumenta la contribucion al indice efectivo.'
        en: '[[epsilon_r]] describes the electric response of the medium and increases the contribution to effective index.'
    physical_reading_rules:
    - id: er_reading_default
      when: 'true'
      status: ok
      text:
        es: Una [[epsilon_r]] mayor suele indicar mas polarizacion electrica y mayor retraso de fase.
        en: A larger [[epsilon_r]] usually indicates more electric polarization and greater phase delay.
    coherence_rules:
    - id: er_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[epsilon_r]] debe ser positiva en el modelo ordinario sin perdidas dominantes.'
        en: '[[epsilon_r]] must be positive in the ordinary model without dominant losses.'
    model_validity_rules:
    - id: er_validity_default
      when: 'true'
      status: ok
      text:
        es: No uses [[epsilon_r]] estatica si la onda esta en otra region espectral.
        en: Do not use static [[epsilon_r]] if the wave is in another spectral region.
    graph_rules:
    - id: er_graph_default
      when: 'true'
      status: ok
      text:
        es: En lectura grafica, [[epsilon_r]] modifica [[n]] y por tanto desplaza [[v_m]].
        en: In graph reading, [[epsilon_r]] modifies [[n]] and therefore shifts [[v_m]].
    likely_errors:
    - id: er_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir respuesta electrica con indice medido directamente.'
        en: 'A common mistake is to interpret [[epsilon_r]] in isolation: Frequent error: confusing electric response with
          directly measured index.'
    next_step_rules:
    - id: er_next_default
      when: 'true'
      status: ok
      text:
        es: Combina [[epsilon_r]] con [[mu_r]] antes de interpretar [[n]].
        en: Combine [[epsilon_r]] with [[mu_r]] before interpreting [[n]].
    physical_intuition:
    - id: epsilon_r_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[epsilon_r]] describe el estado dinámico.
        en: Intuitively, [[epsilon_r]] describes the dynamic state.
    limiting_cases:
    - id: epsilon_r_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[epsilon_r]].
        en: Check limiting cases of [[epsilon_r]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  mu_r:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: respuesta magnetica efectiva
      en: effective magnetic response
    summary_rules:
    - id: mur_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[mu_r]] indica la respuesta magnetica efectiva y depende del tipo de material.'
        en: '[[mu_r]] indicates the effective magnetic response and depends on material type.'
    physical_reading_rules:
    - id: mur_reading_default
      when: 'true'
      status: ok
      text:
        es: En muchos dielectricos opticos [[mu_r]] esta cerca de uno, pero en otros medios puede importar.
        en: In many optical dielectrics [[mu_r]] is close to one, but in other media it may matter.
    coherence_rules:
    - id: mur_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[mu_r]] debe ser positiva en el regimen ordinario usado aqui.'
        en: '[[mu_r]] must be positive in the ordinary regime used here.'
    model_validity_rules:
    - id: mur_validity_default
      when: 'true'
      status: ok
      text:
        es: Si el material es magnetico o metamaterial, revisa si el modelo simple sigue valiendo.
        en: If the material is magnetic or a metamaterial, check whether the simple model still holds.
    graph_rules:
    - id: mur_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[mu_r]] participa en el indice y cambia indirectamente la curva de [[v_m]].'
        en: '[[mu_r]] participates in index and indirectly changes the [[v_m]] curve.'
    likely_errors:
    - id: mur_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[mu_r]] con una lectura aislada es un error frecuente: Error tipico: borrar [[mu_r]] por costumbre
          sin justificar el rango optico.'
        en: 'Typical mistake: removing [[mu_r]] by habit without justifying the optical range.'
    next_step_rules:
    - id: mur_next_default
      when: 'true'
      status: ok
      text:
        es: Comprueba si [[mu_r]] puede aproximarse a uno antes de simplificar.
        en: Check whether [[mu_r]] can be approximated by one before simplifying.
    physical_intuition:
    - id: mu_r_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[mu_r]] describe el estado dinámico.
        en: Intuitively, [[mu_r]] describes the dynamic state.
    limiting_cases:
    - id: mu_r_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[mu_r]].
        en: Check limiting cases of [[mu_r]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda_m:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: longitud de onda dentro del medio
      en: wavelength inside the medium
    summary_rules:
    - id: lm_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_m]] describe la escala espacial real dentro del medio y disminuye cuando aumenta [[n]].'
        en: '[[lambda_m]] describes the real spatial scale inside the medium and decreases when [[n]] increases.'
    physical_reading_rules:
    - id: lm_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_m]] controla fase, interferencia y resonancia dentro del material.'
        en: '[[lambda_m]] controls phase, interference, and resonance inside the material.'
    coherence_rules:
    - id: lm_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_m]] debe ser positiva y menor que [[lambda0]] si [[n]] es mayor que uno.'
        en: '[[lambda_m]] must be positive and smaller than [[lambda0]] if [[n]] is greater than one.'
    model_validity_rules:
    - id: lm_validity_default
      when: 'true'
      status: ok
      text:
        es: La lectura vale con frecuencia conservada y un indice efectivo estable.
        en: The reading is valid with conserved frequency and a stable effective index.
    graph_rules:
    - id: lm_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[lambda_m]] acompana la caida de [[v_m]] cuando aumenta [[n]].
        en: On the graph, [[lambda_m]] follows the drop in [[v_m]] when [[n]] increases.
    likely_errors:
    - id: lm_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[lambda_m]] con una lectura aislada es un error frecuente: Error frecuente: usar [[lambda0]] como
          si fuera la longitud de onda dentro del material.'
        en: 'A common mistake is to interpret [[lambda_m]] in isolation: Frequent error: using [[lambda0]] as if it were the
          wavelength inside the material.'
    next_step_rules:
    - id: lm_next_default
      when: 'true'
      status: ok
      text:
        es: Usa [[lambda_m]] para analizar fase acumulada, interferencia o guiado.
        en: Use [[lambda_m]] to analyze accumulated phase, interference, or guiding.
    physical_intuition:
    - id: lambda_m_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda_m]] describe el estado dinámico.
        en: Intuitively, [[lambda_m]] describes the dynamic state.
    limiting_cases:
    - id: lambda_m_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda_m]].
        en: Check limiting cases of [[lambda_m]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda0:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: longitud de onda de referencia en vacio
      en: reference vacuum wavelength
    summary_rules:
    - id: l0_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda0]] indica la escala de vacio y describe la referencia antes de entrar al medio.'
        en: '[[lambda0]] indicates the vacuum scale and describes the reference before entering the medium.'
    physical_reading_rules:
    - id: l0_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda0]] identifica la radiacion antes de corregir su escala espacial por [[n]].'
        en: '[[lambda0]] identifies radiation before correcting its spatial scale by [[n]].'
    coherence_rules:
    - id: l0_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda0]] debe ser positiva y coherente con la region espectral indicada.'
        en: '[[lambda0]] must be positive and coherent with the stated spectral region.'
    model_validity_rules:
    - id: l0_validity_default
      when: 'true'
      status: ok
      text:
        es: Debe quedar claro si el dato medido corresponde a vacio o al interior del medio.
        en: It must be clear whether the measured datum belongs to vacuum or inside the medium.
    graph_rules:
    - id: l0_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[lambda0]] funciona como escala de referencia frente a [[lambda_m]].
        en: On the graph, [[lambda0]] acts as reference scale compared with [[lambda_m]].
    likely_errors:
    - id: l0_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[lambda0]] con una lectura aislada es un error frecuente: Error tipico: no distinguir longitud de
          onda de vacio y longitud de onda material.'
        en: 'Typical mistake: not distinguishing vacuum wavelength from material wavelength.'
    next_step_rules:
    - id: l0_next_default
      when: 'true'
      status: ok
      text:
        es: Convierte [[lambda0]] en [[lambda_m]] antes de estudiar fase dentro del material.
        en: Convert [[lambda0]] into [[lambda_m]] before studying phase inside the material.
    physical_intuition:
    - id: lambda0_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda0]] describe el estado dinámico.
        en: Intuitively, [[lambda0]] describes the dynamic state.
    limiting_cases:
    - id: lambda0_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda0]].
        en: Check limiting cases of [[lambda0]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
