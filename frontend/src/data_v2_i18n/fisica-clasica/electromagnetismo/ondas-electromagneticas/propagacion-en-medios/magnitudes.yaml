version: 5
topic:
  id: propagacion-en-medios
  title:
    es: Propagacion en medios
    en: Propagation in Media
magnitudes:
- id: velocidad_de_la_luz_en_el_vacio
  symbol: c
  nombre:
    es: velocidad de la luz en el vacio
    en: speed of light in vacuum
  descripcion:
    es: Velocidad de referencia de una onda electromagnetica en el vacio.
    en: Reference speed of an electromagnetic wave in vacuum.
  unidad_si: m/s
  dimension: '[L T^-1]'
  is_vector: false
  components: []
  category: constant
  physical_role: core_physical_quantity
  used_in:
  - velocidad_en_medio
  - longitud_onda_en_medio
  common_mistake:
    es: Usar [[c]] como velocidad dentro de cualquier material sin corregir por [[n]].
    en: Using [[c]] as the speed inside any material without correcting by [[n]].
  typical_range: 2.99792458e8 m/s en el vacio
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una rapidez positiva de propagacion en vacio.
      en: It is a positive propagation speed in vacuum.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin velocidad de referencia no hay propagacion electromagnetica clasica.
      en: Without reference speed there is no classical electromagnetic propagation.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: c > 0
  interpretation_role:
    primary_for:
    - referencia_vacio
    secondary_for:
    - comparacion_con_v_m
  graph_binding:
    channels:
    - reference_speed
  pedagogical_notes:
    es: '[[c]] es la referencia, pero la magnitud fisica que cambia en el medio es [[v_m]].'
    en: '[[c]] is the reference, but the physical quantity that changes in the medium is [[v_m]].'
- id: indice_de_refraccion_efectivo
  symbol: n
  nombre:
    es: indice de refraccion efectivo
    en: effective refractive index
  descripcion:
    es: Factor adimensional que compara la propagacion en el medio con la propagacion en vacio.
    en: Dimensionless factor comparing propagation in the medium with propagation in vacuum.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: material_parameter
  physical_role: core_physical_quantity
  used_in:
  - velocidad_en_medio
  - indice_medio_em
  - longitud_onda_en_medio
  common_mistake:
    es: Tratar [[n]] como una constante universal en lugar de una propiedad del medio y de la frecuencia.
    en: Treating [[n]] as a universal constant instead of a property of medium and frequency.
  typical_range: 1 a 4 en muchos medios transparentes usuales
  sign_behavior:
    has_sign: false
    meaning:
      es: En medios ordinarios se toma positivo.
      en: In ordinary media it is taken as positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Un indice nulo no describe propagacion ordinaria.
      en: Zero index does not describe ordinary propagation.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: n > 0
  interpretation_role:
    primary_for:
    - ralentizacion
    - refraccion
    secondary_for:
    - lambda_m
  graph_binding:
    channels:
    - x_index
    - star_value
  pedagogical_notes:
    es: '[[n]] resume cuanto se reduce [[v_m]] y cuanto se acorta [[lambda_m]] frente al vacio.'
    en: '[[n]] summarizes how much [[v_m]] is reduced and how much [[lambda_m]] is shortened compared with vacuum.'
- id: v_m
  symbol: v_m
  nombre:
    es: velocidad de propagacion en el medio
    en: propagation speed in the medium
  descripcion:
    es: Rapidez de fase de la onda electromagnetica dentro del medio material.
    en: Phase speed of the electromagnetic wave inside the material medium.
  unidad_si: m/s
  dimension: '[L T^-1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - velocidad_en_medio
  common_mistake:
    es: Pensar que al entrar en el medio cambia la frecuencia de la onda.
    en: Thinking that the wave frequency changes when entering the medium.
  typical_range: 0.25c a c en muchos medios ordinarios
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una rapidez positiva en la direccion de propagacion.
      en: It is a positive speed in the propagation direction.
  zero_behavior:
    allowed: false
    meaning:
      es: Velocidad nula no representa una onda viajera ordinaria.
      en: Zero speed does not represent an ordinary travelling wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: v_m > 0
  interpretation_role:
    primary_for:
    - propagacion_material
    secondary_for:
    - retardo
  graph_binding:
    channels:
    - y_speed
  pedagogical_notes:
    es: '[[v_m]] disminuye cuando [[n]] aumenta en un medio ordinario.'
    en: '[[v_m]] decreases when [[n]] increases in an ordinary medium.'
- id: lambda0
  symbol: \lambda_0
  nombre:
    es: longitud de onda en el vacio
    en: vacuum wavelength
  descripcion:
    es: Longitud de onda que tendria la radiacion en el vacio para la misma frecuencia.
    en: Wavelength that the radiation would have in vacuum for the same frequency.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - longitud_onda_en_medio
  common_mistake:
    es: Confundir [[lambda0]] con la longitud de onda real dentro del material.
    en: Confusing [[lambda0]] with the actual wavelength inside the material.
  typical_range: depende de la region espectral
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una escala espacial positiva.
      en: It is a positive spatial scale.
  zero_behavior:
    allowed: false
    meaning:
      es: Longitud de onda nula no representa una onda clasica ordinaria.
      en: Zero wavelength does not represent an ordinary classical wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: lambda0 > 0
  interpretation_role:
    primary_for:
    - referencia_vacio
    secondary_for:
    - comparacion_con_lambda_m
  graph_binding:
    channels:
    - reference_wavelength
  pedagogical_notes:
    es: '[[lambda0]] es la escala de referencia antes de corregir por el indice [[n]].'
    en: '[[lambda0]] is the reference scale before correcting by index [[n]].'
- id: lambda_m
  symbol: \lambda_m
  nombre:
    es: longitud de onda en el medio
    en: wavelength in the medium
  descripcion:
    es: Distancia espacial entre crestas equivalentes dentro del medio material.
    en: Spatial distance between equivalent crests inside the material medium.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - longitud_onda_en_medio
  common_mistake:
    es: Creer que [[lambda_m]] permanece igual al entrar en el medio aunque cambie la velocidad.
    en: Believing that [[lambda_m]] stays unchanged on entering the medium even when speed changes.
  typical_range: lambda0/n en medios ordinarios
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una distancia positiva entre puntos de igual fase.
      en: It is a positive distance between equal-phase points.
  zero_behavior:
    allowed: false
    meaning:
      es: Longitud de onda nula no describe propagacion ordinaria.
      en: Zero wavelength does not describe ordinary propagation.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: lambda_m > 0
  interpretation_role:
    primary_for:
    - escala_en_medio
    secondary_for:
    - frentes_de_onda
  graph_binding:
    channels:
    - secondary_y
  pedagogical_notes:
    es: '[[lambda_m]] cambia en el medio porque cambia [[v_m]], aunque la frecuencia quede fijada por la fuente.'
    en: '[[lambda_m]] changes in the medium because [[v_m]] changes, although frequency is fixed by the source.'
- id: epsilon_r
  symbol: \varepsilon_r
  nombre:
    es: permitividad relativa efectiva
    en: effective relative permittivity
  descripcion:
    es: Parametro material que mide la respuesta electrica efectiva del medio.
    en: Material parameter measuring the effective electric response of the medium.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: material_parameter
  physical_role: core_physical_quantity
  used_in:
  - indice_medio_em
  common_mistake:
    es: Usar [[epsilon_r]] estatica para cualquier frecuencia sin comprobar dispersion.
    en: Using static [[epsilon_r]] at any frequency without checking dispersion.
  typical_range: cerca de 1 en aire, mayor en dielectricos
  sign_behavior:
    has_sign: false
    meaning:
      es: En medios ordinarios transparentes se toma positiva.
      en: In ordinary transparent media it is taken as positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Valor nulo no describe un medio ordinario transparente.
      en: Zero value does not describe an ordinary transparent medium.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: epsilon_r > 0
  interpretation_role:
    primary_for:
    - respuesta_electrica
    secondary_for:
    - indice
  graph_binding:
    channels:
    - material_control
  pedagogical_notes:
    es: '[[epsilon_r]] contribuye a [[n]] junto con [[mu_r]] en el modelo electromagnetico efectivo.'
    en: '[[epsilon_r]] contributes to [[n]] together with [[mu_r]] in the effective electromagnetic model.'
- id: mu_r
  symbol: \mu_r
  nombre:
    es: permeabilidad relativa efectiva
    en: effective relative permeability
  descripcion:
    es: Parametro material que mide la respuesta magnetica efectiva del medio.
    en: Material parameter measuring the effective magnetic response of the medium.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: material_parameter
  physical_role: core_physical_quantity
  used_in:
  - indice_medio_em
  common_mistake:
    es: Suponer siempre [[mu_r]] exactamente igual a uno sin revisar el tipo de material.
    en: Assuming [[mu_r]] is always exactly one without checking the material type.
  typical_range: aproximadamente 1 en muchos dielectricos opticos
  sign_behavior:
    has_sign: false
    meaning:
      es: En medios ordinarios se toma positiva.
      en: In ordinary media it is taken as positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Valor nulo no describe respuesta magnetica ordinaria.
      en: Zero value does not describe ordinary magnetic response.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: mu_r > 0
  interpretation_role:
    primary_for:
    - respuesta_magnetica
    secondary_for:
    - indice
  graph_binding:
    channels:
    - material_control
  pedagogical_notes:
    es: '[[mu_r]] suele ser cercana a uno en optica, pero pertenece al modelo fisico de propagacion.'
    en: '[[mu_r]] is often close to one in optics, but it belongs to the physical propagation model.'
