version: "1.0"
leaf: "coherencia"

coord:
  title:
    es: Gráfica Coord · Coherencia Óptica
    en: Coord Graph · Optical Coherence
  xAxis:
    es: diferencia de camino óptico δ (m)
    en: optical path difference δ (m)
  yAxis:
    es: "grado de coherencia |γ|"
    en: "degree of coherence |γ|"
  xMagnitude: delta
  yMagnitude: gamma
  relation:
    es: "|γ(δ)|: función de coherencia. |γ| = 1 (coherente, franjas perfectas); |γ| = 0 (incoherente, sin franjas)."
    en: "|γ(δ)|: coherence function. |γ| = 1 (coherent, perfect fringes); |γ| = 0 (incoherent, no fringes)."
  physicalReading:
    es: "|γ| cae de 1 a 0 al aumentar δ. La longitud de coherencia l_c = λ²/Δλ marca el límite."
    en: "|γ| falls from 1 to 0 as δ increases. The coherence length l_c = λ²/Δλ marks the limit."
  slopeMeaning:
    es: "Pendiente negativa: pérdida de coherencia con la diferencia de camino."
    en: "Negative slope: coherence loss with increasing path difference."
  interceptMeaning:
    es: "|γ|(0) = 1: coherencia perfecta sin diferencia de camino."
    en: "|γ|(0) = 1: perfect coherence with no path difference."
  curvatureMeaning:
    es: Caída gaussiana o sinc² según el espectro de la fuente.
    en: Gaussian or sinc² decay depending on source spectrum.
  signMeaning:
    es: "|γ| ∈ [0,1]. Visibilidad de franjas V = |γ|."
    en: "|γ| ∈ [0,1]. Fringe visibility V = |γ|."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "δ ≥ 0. l_c = λ²/Δλ (láser: metros; luz blanca: μm)."
    en: "δ ≥ 0. l_c = λ²/Δλ (laser: metres; white light: μm)."
  modelConnection:
    es: "Óptica de coherencia: coherencia temporal y espacial."
    en: "Optical coherence: temporal and spatial coherence."
  formulaConnection:
    es: "Conecta con γ, l_c = cτ_c, y V = |γ|."
    en: "Connects to γ, l_c = cτ_c, and V = |γ|."
  readingFocus:
    es: "leer |γ| para determinar la visibilidad de las franjas de interferencia."
    en: "read |γ| to determine fringe visibility in interference."
  agentHints:
    es:
      - "V = |γ| > 0.88: franjas muy visibles."
      - "Coherencia temporal: monocromaticidad. Espacial: tamaño de la fuente."
      - "Láser: l_c >> 1 m."
    en:
      - "V = |γ| > 0.88: highly visible fringes."
      - "Temporal coherence: monochromaticity. Spatial: source size."
      - "Laser: l_c >> 1 m."
  commonMistakes:
    es:
      - Confundir coherencia temporal con espacial.
      - Pensar que incoherencia = sin interferencia posible.
      - "Olvidar V = |γ|."
    en:
      - Confusing temporal with spatial coherence.
      - Thinking incoherence = no interference possible.
      - "Forgetting V = |γ|."
