version: "1.0"
leaf: "difraccion-de-la-luz"

coord:
  title:
    es: Gráfica Coord · Difracción de la Luz
    en: Coord Graph · Diffraction of Light
  xAxis:
    es: posición y en pantalla (m)
    en: screen position y (m)
  yAxis:
    es: intensidad I (W/m²)
    en: intensity I (W/m²)
  xMagnitude: y
  yMagnitude: I
  relation:
    es: "Ranura simple (Fraunhofer): I = I₀·sinc²(πa·sinθ/λ). Mínimos en a·sinθ = mλ (m ≠ 0)."
    en: "Single slit (Fraunhofer): I = I₀·sinc²(πa·sinθ/λ). Minima at a·sinθ = mλ (m ≠ 0)."
  physicalReading:
    es: "Máximo central ancho para a pequeño. Secundarios ≈ 4.7% del principal."
    en: "Wide central maximum for small a. Secondary maxima ≈ 4.7% of the main."
  slopeMeaning:
    es: "Patrón oscilatorio sinc²: no hay pendiente constante."
    en: "Oscillatory sinc² pattern: no constant slope."
  interceptMeaning:
    es: Mínimos en y_m = mλL/a (m ≠ 0).
    en: Minima at y_m = mλL/a (m ≠ 0).
  curvatureMeaning:
    es: "sinc²: máximo central y secundarios de intensidad decreciente."
    en: "sinc²: central maximum and decreasing secondary maxima."
  signMeaning:
    es: I ≥ 0; patrón simétrico.
    en: I ≥ 0; symmetric pattern.
  areaMeaning:
    es: Área ∝ intensidad total transmitida.
    en: Area ∝ total transmitted intensity.
  domainMeaning:
    es: "Campo lejano: L >> a²/λ (Fraunhofer)."
    en: "Far field: L >> a²/λ (Fraunhofer)."
  modelConnection:
    es: Difracción de Fraunhofer para ranura simple.
    en: Fraunhofer diffraction for a single slit.
  formulaConnection:
    es: "Conecta con I = I₀sinc²(β/2), y_min = mλL/a, Rayleigh: Δθ_R = 1.22λ/D."
    en: "Connects to I = I₀sinc²(β/2), y_min = mλL/a, Rayleigh: Δθ_R = 1.22λ/D."
  readingFocus:
    es: leer anchura del máximo central y posición de mínimos.
    en: read central maximum width and minima positions.
  agentHints:
    es:
      - Mayor λ o menor a → máximo central más ancho.
      - "Rayleigh: Δθ_R = 1.22λ/D."
      - "Secundarios: ≈ 4.7%, 1.7%, ..."
    en:
      - Larger λ or smaller a → wider central maximum.
      - "Rayleigh: Δθ_R = 1.22λ/D."
      - "Secondaries: ≈ 4.7%, 1.7%, ..."
  commonMistakes:
    es:
      - Confundir difracción (una apertura) con interferencia (varias fuentes).
      - Pensar que secundarios = principal en intensidad.
      - Ignorar el requisito Fraunhofer.
    en:
      - Confusing diffraction (one aperture) with interference (multiple sources).
      - Thinking secondaries = main in intensity.
      - Ignoring the Fraunhofer requirement.
