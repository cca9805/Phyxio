version: "1.0"
leaf: "interferencia-de-la-luz"

coord:
  title:
    es: Gráfica Coord · Interferencia de la Luz
    en: Coord Graph · Interference of Light
  xAxis:
    es: posición y en pantalla (m)
    en: screen position y (m)
  yAxis:
    es: intensidad I (W/m²)
    en: intensity I (W/m²)
  xMagnitude: y
  yMagnitude: I
  relation:
    es: "Doble ranura (Young): I = 4I₀cos²(πdy/(λL)). Franjas brillantes en y_m = mλL/d."
    en: "Double slit (Young): I = 4I₀cos²(πdy/(λL)). Bright fringes at y_m = mλL/d."
  physicalReading:
    es: Patrón cos² periódico. Separación de franjas Δy = λL/d. Mayor d → franjas más juntas.
    en: Periodic cos² pattern. Fringe separation Δy = λL/d. Larger d → closer fringes.
  slopeMeaning:
    es: Patrón cos² periódico; no hay pendiente constante.
    en: Periodic cos² pattern; no constant slope.
  interceptMeaning:
    es: Franja central brillante en y = 0 (diferencia de camino nula).
    en: Central bright fringe at y = 0 (zero path difference).
  curvatureMeaning:
    es: "cos²: patrón periódico para fuentes coherentes."
    en: "cos²: periodic pattern for coherent sources."
  signMeaning:
    es: I ≥ 0; simétrico. Promedio I = 2I₀.
    en: I ≥ 0; symmetric. Average I = 2I₀.
  areaMeaning:
    es: "Área promedio = 2I₀: energía conservada."
    en: "Average area = 2I₀: energy conserved."
  domainMeaning:
    es: Fuentes coherentes. V = (I_max−I_min)/(I_max+I_min) = 1 para coherencia perfecta.
    en: Coherent sources. V = (I_max−I_min)/(I_max+I_min) = 1 for perfect coherence.
  modelConnection:
    es: Superposición de ondas coherentes. Principio de Huygens-Fresnel.
    en: Superposition of coherent waves. Huygens-Fresnel principle.
  formulaConnection:
    es: Conecta con I = 4I₀cos²(δ/2), δ = 2πd·sinθ/λ, y_m = mλL/d.
    en: Connects to I = 4I₀cos²(δ/2), δ = 2πd·sinθ/λ, y_m = mλL/d.
  readingFocus:
    es: leer Δy para calcular λ = Δy·d/L; visibilidad para estimar coherencia.
    en: read Δy to compute λ = Δy·d/L; visibility to estimate coherence.
  agentHints:
    es:
      - Mayor d → franjas más juntas. Mayor λL → franjas más separadas.
      - I_max = 4I₀ (constructiva); I_min = 0 (destructiva).
      - La difracción modula la envolvente del patrón.
    en:
      - Larger d → closer fringes. Larger λL → wider fringes.
      - I_max = 4I₀ (constructive); I_min = 0 (destructive).
      - Diffraction modulates the pattern envelope.
  commonMistakes:
    es:
      - Confundir d (separación ranuras) con a (anchura ranura).
      - Pensar que I_max = I₀.
      - Ignorar la modulación por difracción.
    en:
      - Confusing d (slit separation) with a (slit width).
      - Thinking I_max = I₀.
      - Ignoring diffraction modulation.
