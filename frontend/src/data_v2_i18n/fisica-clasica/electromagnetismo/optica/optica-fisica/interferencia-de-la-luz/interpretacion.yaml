  distancia_a_la_pantalla:
    enabled: true
    magnitude_type: parameter
    semantic_role:
      es: Distancia desde las rendijas hasta la pantalla de observacion
      en: Distance from slits to observation screen
    summary_rules:
    - id: L_summary
      when: 'true'
      status: ok
      text:
        es: La distancia a la pantalla es [[L]] m.
        en: The screen distance is [[L]] m.
    physical_reading_rules:
    - id: L_reading
      when: 'true'
      status: ok
      text:
        es: 'La distancia [[L]] actua como factor de amplificacion: mayor L produce franjas mas separadas en la pantalla.'
        en: 'The distance [[L]] acts as an amplification factor: larger L produces more widely spaced fringes on the screen.'
    coherence_rules:
    - id: L_coherence
      when: L > 0
      status: ok
      text:
        es: Valor positivo, consistente con una distancia fisica.
        en: Positive value, consistent with a physical distance.
    model_validity_rules:
    - id: L_validity
      when: L > d * 100
      status: ok
      text:
        es: La distancia a la pantalla es mucho mayor que la separacion entre rendijas, validando la aproximacion de campo
          lejano.
        en: Screen distance is much larger than slit separation, validating the far-field approximation.
    graph_rules:
    - id: L_graph
      when: 'true'
      status: ok
      text:
        es: Mayor [[L]] estira el patron en el grafico, separando mas los maximos sin cambiar su numero.
        en: Larger [[L]] stretches the pattern in the graph, spacing maxima further apart without changing their number.
    likely_errors:
    - id: L_error_units
      when: L < 0.01
      status: warning
      text:
        es: 'Confundir [[distancia_a_la_pantalla]] con una lectura aislada es un error frecuente: Distancia a pantalla muy
          pequena. Verifica que no estes usando centimetros sin convertir a metros.'
        en: 'A common mistake is to interpret [[distancia_a_la_pantalla]] in isolation: Screen distance very small. Verify
          you are not using centimetres without converting to metres.'
    next_step_rules:
    - id: L_next_step
      when: 'true'
      status: ok
      text:
        es: Con L conocida, junto con d y lambda, calcula la separacion entre franjas o la posicion de cualquier orden.
        en: With L known, together with d and lambda, calculate fringe spacing or the position of any order.
    physical_intuition:
    - id: distancia_a_la_pantalla_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[distancia_a_la_pantalla]] describe el estado dinámico.
        en: Intuitively, [[distancia_a_la_pantalla]] describes the dynamic state.
    limiting_cases:
    - id: distancia_a_la_pantalla_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[distancia_a_la_pantalla]].
        en: Check limiting cases of [[distancia_a_la_pantalla]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  separacion_entre_franjas_consecutivas:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Separacion entre franjas consecutivas del patron
      en: Spacing between consecutive fringes of the pattern
    summary_rules:
    - id: dy_summary_value
      when: 'true'
      status: ok
      text:
        es: La separacion entre franjas consecutivas es [[Delta_y]] m, lo que indica la escala caracteristica del patron de
          interferencia.
        en: The spacing between consecutive fringes is [[Delta_y]] m, indicating the characteristic scale of the interference
          pattern.
    physical_reading_rules:
    - id: dy_reading_interpretation
      when: 'true'
      status: ok
      text:
        es: Esta separacion es constante en toda la pantalla (aproximadamente) y resulta del cociente entre la longitud de
          onda y la separacion entre rendijas, escalado por la distancia a la pantalla.
        en: This spacing is constant across the screen (approximately) and results from the ratio of wavelength to slit separation,
          scaled by the screen distance.
    coherence_rules:
    - id: dy_coherence_positive
      when: Delta_y > 0
      status: ok
      text:
        es: La separacion es positiva, como debe ser para una distancia fisica.
        en: The spacing is positive, as it should be for a physical distance.
    - id: dy_coherence_millimeters
      when: Delta_y > 0.001 and Delta_y < 0.01
      status: ok
      text:
        es: La separacion esta en el rango de milimetros, tipico para experimentos de doble rendija con laser.
        en: The spacing is in the millimeter range, typical for double-slit experiments with laser.
    model_validity_rules:
    - id: dy_validity_constant
      when: 'true'
      status: ok
      text:
        es: La separacion entre franjas es aproximadamente constante solo cerca del centro del patron (aproximacion de angulos
          pequenos).
        en: Fringe spacing is approximately constant only near the center of the pattern (small angle approximation).
    graph_rules:
    - id: dy_graph_spacing
      when: 'true'
      status: ok
      text:
        es: En el grafico de intensidad vs posicion, la separacion entre picos consecutivos corresponde a Delta_y.
        en: In the intensity vs position graph, the separation between consecutive peaks corresponds to Delta_y.
    likely_errors:
    - id: dy_error_small
      when: Delta_y < 1e-6
      status: warning
      text:
        es: 'Confundir [[separacion_entre_franjas_consecutivas]] con una lectura aislada es un error frecuente: Separacion
          muy pequena. Verifica que d no sea demasiado grande o L demasiado pequena.'
        en: 'A common mistake is to interpret [[separacion_entre_franjas_consecutivas]] in isolation: Very small spacing.
          Verify that d is not too large or L too small.'
    next_step_rules:
    - id: dy_step_medir_lambda
      when: 'true'
      status: ok
      text:
        es: Mide experimentalmente Delta_y y conociendo d y L, puedes calcular la longitud de onda desconocida usando [[lambda]]
          = Delta_y * d / L.
        en: Measure Delta_y experimentally and knowing d and L, you can calculate the unknown wavelength using [[lambda]]
          = Delta_y * d / L.
    physical_intuition:
    - id: separacion_entre_franjas_consecutivas_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[separacion_entre_franjas_consecutivas]] describe el estado dinámico.
        en: Intuitively, [[separacion_entre_franjas_consecutivas]] describes the dynamic state.
    limiting_cases:
    - id: separacion_entre_franjas_consecutivas_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[separacion_entre_franjas_consecutivas]].
        en: Check limiting cases of [[separacion_entre_franjas_consecutivas]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
