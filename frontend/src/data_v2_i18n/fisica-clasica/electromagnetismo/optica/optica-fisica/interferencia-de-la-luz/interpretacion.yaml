targets:
  delta:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Diferencia de camino optico entre los dos haces
      en: Optical path difference between the two beams
    summary_rules:
    - id: delta_summary
      when: 'true'
      status: ok
      text:
        es: La diferencia de camino optico es [[delta]] m, determinando el tipo de interferencia en ese punto.
        en: The optical path difference is [[delta]] m, determining the type of interference at that point.
    physical_reading_rules:
    - id: delta_reading
      when: 'true'
      status: ok
      text:
        es: El valor de [[delta]] representa la distancia adicional que recorre un haz respecto al otro. Si es multiplo entero
          de [[lambda]], hay maximo; si es semientero, hay minimo.
        en: The value of [[delta]] represents the additional distance one beam travels relative to the other. If it is an
          integer multiple of [[lambda]], there is a maximum; if half-integer, a minimum.
    coherence_rules:
    - id: delta_coherence
      when: abs(delta) <= d
      status: ok
      text:
        es: La diferencia de camino no supera la separacion entre rendijas, como es fisicamente esperado.
        en: Path difference does not exceed slit separation, as physically expected.
    model_validity_rules:
    - id: delta_validity_small_angle
      when: abs(delta) < d * 0.1
      status: ok
      text:
        es: La diferencia de camino es pequena frente a d, la aproximacion de angulos pequenos es excelente.
        en: Path difference is small compared to d, the small angle approximation is excellent.
    graph_rules:
    - id: delta_graph_fringe
      when: 'true'
      status: ok
      text:
        es: En el grafico de intensidad, [[delta]] determina la fase relativa entre los haces y por tanto la posicion en el
          patron.
        en: In the intensity graph, [[delta]] determines the relative phase between beams and therefore the position in the
          pattern.
    likely_errors:
    - id: delta_error_large
      when: abs(delta) > d
      status: error
      text:
        es: 'Confundir [[delta]] con una lectura aislada es un error frecuente: La diferencia de camino supera la separacion
          entre rendijas. Revisa el angulo theta.'
        en: 'A common mistake is to interpret [[delta]] in isolation: Path difference exceeds slit separation. Check angle
          theta.'
    next_step_rules:
    - id: delta_next_step
      when: 'true'
      status: ok
      text:
        es: Compara delta con multiplos de lambda para determinar si el punto corresponde a un maximo o minimo.
        en: Compare delta with multiples of lambda to determine whether the point corresponds to a maximum or minimum.
    physical_intuition:
    - id: delta_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[delta]] describe el estado dinámico.
        en: Intuitively, [[delta]] describes the dynamic state.
    limiting_cases:
    - id: delta_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[delta]].
        en: Check limiting cases of [[delta]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  separacion_entre_rendijas:
    enabled: true
    magnitude_type: parameter
    semantic_role:
      es: Separacion entre rendijas del experimento
      en: Slit separation of the experiment
    summary_rules:
    - id: d_summary
      when: 'true'
      status: ok
      text:
        es: La separacion entre rendijas es [[d]] m.
        en: The slit separation is [[d]] m.
    physical_reading_rules:
    - id: d_reading
      when: 'true'
      status: ok
      text:
        es: La separacion [[d]] controla la escala angular del patron. A menor d, mayor separacion entre franjas.
        en: The separation [[d]] controls the angular scale of the pattern. Smaller d means larger fringe spacing.
    coherence_rules:
    - id: d_coherence
      when: d > 0
      status: ok
      text:
        es: Valor positivo, consistente con una distancia fisica.
        en: Positive value, consistent with a physical distance.
    model_validity_rules:
    - id: d_validity
      when: d > lambda
      status: ok
      text:
        es: La separacion entre rendijas es mayor que la longitud de onda, condicion necesaria para observar multiples franjas.
        en: Slit separation is greater than wavelength, necessary condition to observe multiple fringes.
    graph_rules:
    - id: d_graph
      when: 'true'
      status: ok
      text:
        es: Aumentar [[d]] comprime el patron de franjas en el grafico, reduciendo la separacion entre maximos.
        en: Increasing [[d]] compresses the fringe pattern in the graph, reducing the spacing between maxima.
    likely_errors:
    - id: d_error_units
      when: d > 0.01
      status: warning
      text:
        es: 'Confundir [[separacion_entre_rendijas]] con una lectura aislada es un error frecuente: Separacion entre rendijas
          mayor a 1 cm. Verifica que no estes usando milimetros sin convertir a metros.'
        en: 'A common mistake is to interpret [[separacion_entre_rendijas]] in isolation: Slit separation greater than 1 cm.
          Verify you are not using millimetres without converting to metres.'
    next_step_rules:
    - id: d_next_step
      when: 'true'
      status: ok
      text:
        es: Con d conocida, calcula la separacion entre franjas como lambda por L dividido por d.
        en: With d known, calculate fringe spacing as lambda times L divided by d.
    physical_intuition:
    - id: separacion_entre_rendijas_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[separacion_entre_rendijas]] describe el estado dinámico.
        en: Intuitively, [[separacion_entre_rendijas]] describes the dynamic state.
    limiting_cases:
    - id: separacion_entre_rendijas_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[separacion_entre_rendijas]].
        en: Check limiting cases of [[separacion_entre_rendijas]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  theta:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Angulo de observacion respecto a la direccion central
      en: Observation angle relative to the central direction
    summary_rules:
    - id: theta_summary
      when: 'true'
      status: ok
      text:
        es: El angulo de observacion es [[theta]] rad.
        en: The observation angle is [[theta]] rad.
    physical_reading_rules:
    - id: theta_reading
      when: 'true'
      status: ok
      text:
        es: El angulo [[theta]] indica la direccion de observacion respecto al eje central. Cada orden m corresponde a un
          angulo especifico.
        en: The angle [[theta]] indicates the observation direction relative to the central axis. Each order m corresponds
          to a specific angle.
    coherence_rules:
    - id: theta_coherence
      when: abs(theta) < 1.57
      status: ok
      text:
        es: Angulo dentro del rango fisico valido.
        en: Angle within valid physical range.
    model_validity_rules:
    - id: theta_validity
      when: abs(theta) < 0.1
      status: ok
      text:
        es: La aproximacion de angulos pequenos es valida para este angulo.
        en: The small angle approximation is valid for this angle.
    graph_rules:
    - id: theta_graph
      when: 'true'
      status: ok
      text:
        es: El angulo [[theta]] corresponde a la posicion horizontal en el grafico de intensidad angular.
        en: The angle [[theta]] corresponds to the horizontal position in the angular intensity graph.
    likely_errors:
    - id: theta_error_degrees
      when: abs(theta) > 1
      status: error
      text:
        es: 'Confundir [[theta]] con una lectura aislada es un error frecuente: Angulo muy grande. Verifica que estas usando
          radianes y no grados.'
        en: 'A common mistake is to interpret [[theta]] in isolation: Very large angle. Verify you are using radians, not
          degrees.'
    next_step_rules:
    - id: theta_next_step
      when: 'true'
      status: ok
      text:
        es: Usa theta para calcular la diferencia de camino como d multiplicado por sin(theta).
        en: Use theta to calculate the path difference as d multiplied by sin(theta).
    physical_intuition:
    - id: theta_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[theta]] describe el estado dinámico.
        en: Intuitively, [[theta]] describes the dynamic state.
    limiting_cases:
    - id: theta_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[theta]].
        en: Check limiting cases of [[theta]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  orden_de_la_franja:
    enabled: true
    magnitude_type: parameter
    semantic_role:
      es: Orden de la franja en el patron de interferencia
      en: Order of the fringe in the interference pattern
    summary_rules:
    - id: m_summary_central
      when: m == 0
      status: ok
      text:
        es: El orden m=0 corresponde al maximo central donde la diferencia de camino es cero y las ondas llegan en fase.
        en: Order m=0 corresponds to the central maximum where path difference is zero and waves arrive in phase.
    - id: m_summary_lateral
      when: m != 0
      status: ok
      text:
        es: El orden [[m]] indica que la diferencia de camino contiene exactamente [[abs(m)]] longitudes de onda completas,
          produciendo un maximo de interferencia constructiva.
        en: Order [[m]] indicates that the path difference contains exactly [[abs(m)]] complete wavelengths, producing a maximum
          of constructive interference.
    physical_reading_rules:
    - id: m_reading_interpretation
      when: 'true'
      status: ok
      text:
        es: El orden m describe cuantos enteros de longitud de onda caben en la diferencia de camino optico. Cada entero adicional
          corresponde al siguiente maximo de intensidad.
        en: Order m describes how many integer wavelengths fit in the optical path difference. Each additional integer corresponds
          to the next intensity maximum.
    coherence_rules:
    - id: m_coherence_integer
      when: abs(m - round(m)) < 0.001
      status: ok
      text:
        es: El valor es consistente con un orden entero, requerido para maximos de interferencia.
        en: The value is consistent with an integer order, required for interference maxima.
    - id: m_coherence_noninteger
      when: abs(m - round(m)) >= 0.001
      status: warning
      text:
        es: El orden m no es un entero exacto. Esto sugiere que el punto calculado no coincide exactamente con un maximo.
        en: Order m is not an exact integer. This suggests the calculated point does not exactly coincide with a maximum.
    model_validity_rules:
    - id: m_validity_range
      when: abs(m) <= 10
      status: ok
      text:
        es: El orden esta dentro del rango tipicamente observable en experimentos de laboratorio.
        en: The order is within the range typically observable in laboratory experiments.
    - id: m_validity_extreme
      when: abs(m) > 10
      status: warning
      text:
        es: Ordenes muy altos pueden no ser visibles debido a la difraccion por el ancho finito de las rendijas.
        en: Very high orders may not be visible due to diffraction from the finite slit width.
    graph_rules:
    - id: m_graph_label
      when: 'true'
      status: ok
      text:
        es: En el patron de interferencia, los maximos estan etiquetados por su orden m, simetricamente distribuidos alrededor
          del centro (m=0).
        en: In the interference pattern, maxima are labeled by their order m, symmetrically distributed around the center
          (m=0).
    likely_errors:
    - id: m_error_zero
      when: m == 0 and abs([[y_m]]) > 0.001
      status: error
      text:
        es: 'Confundir [[orden_de_la_franja]] con una lectura aislada es un error frecuente: Inconsistencia: si m=0, la posicion
          y_m deberia ser cero (maximo central).'
        en: 'A common mistake is to interpret [[orden_de_la_franja]] in isolation: Inconsistency: if m=0, position y_m should
          be zero (central maximum).'
    - id: m_error_sign
      when: m * [[y_m]] < 0
      status: warning
      text:
        es: 'Confundir [[orden_de_la_franja]] con una lectura aislada es un error frecuente: El signo de m y el signo de la
          posicion y_m deberian coincidir para mantener la consistencia fisica.'
        en: 'A common mistake is to interpret [[orden_de_la_franja]] in isolation: The sign of m and the sign of position
          y_m should match for physical consistency.'
    next_step_rules:
    - id: m_step_siguiente_orden
      when: 'true'
      status: ok
      text:
        es: Calcula las posiciones de los ordenes adyacentes (m+1 y m-1) para determinar la separacion entre franjas.
        en: Calculate positions of adjacent orders (m+1 and m-1) to determine fringe spacing.
    physical_intuition:
    - id: orden_de_la_franja_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[orden_de_la_franja]] describe el estado dinámico.
        en: Intuitively, [[orden_de_la_franja]] describes the dynamic state.
    limiting_cases:
    - id: orden_de_la_franja_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[orden_de_la_franja]].
        en: Check limiting cases of [[orden_de_la_franja]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda:
    enabled: true
    magnitude_type: parameter
    semantic_role:
      es: Longitud de onda de la fuente luminosa
      en: Wavelength of the light source
    summary_rules:
    - id: lambda_summary
      when: 'true'
      status: ok
      text:
        es: La longitud de onda es [[lambda]] m.
        en: The wavelength is [[lambda]] m.
    physical_reading_rules:
    - id: lambda_reading
      when: 'true'
      status: ok
      text:
        es: La longitud de onda [[lambda]] determina el color de la luz y la escala del patron de interferencia.
        en: The wavelength [[lambda]] determines the colour of light and the scale of the interference pattern.
    coherence_rules:
    - id: lambda_coherence
      when: lambda > 0
      status: ok
      text:
        es: Valor positivo, consistente con una longitud de onda fisica.
        en: Positive value, consistent with a physical wavelength.
    model_validity_rules:
    - id: lambda_validity
      when: lambda > 3e-7 and lambda < 8e-7
      status: ok
      text:
        es: La longitud de onda esta en el rango visible, consistente con un experimento optico estandar.
        en: Wavelength is in the visible range, consistent with a standard optical experiment.
    graph_rules:
    - id: lambda_graph
      when: 'true'
      status: ok
      text:
        es: Mayor [[lambda]] produce franjas mas separadas en el grafico. La separacion entre maximos es proporcional a lambda.
        en: Larger [[lambda]] produces more widely spaced fringes in the graph. The separation between maxima is proportional
          to lambda.
    likely_errors:
    - id: lambda_error_nm
      when: lambda > 1e-3
      status: error
      text:
        es: 'Confundir [[lambda]] con una lectura aislada es un error frecuente: Longitud de onda muy grande. Posible error:
          usar nm sin convertir a metros (dividir entre 1e9).'
        en: 'A common mistake is to interpret [[lambda]] in isolation: Wavelength too large. Possible error: using nm without
          converting to metres (divide by 1e9).'
    next_step_rules:
    - id: lambda_next_step
      when: 'true'
      status: ok
      text:
        es: Con lambda conocida, calcula la separacion entre franjas o la posicion del maximo deseado.
        en: With lambda known, calculate the fringe spacing or the position of the desired maximum.
    physical_intuition:
    - id: lambda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda]] describe el estado dinámico.
        en: Intuitively, [[lambda]] describes the dynamic state.
    limiting_cases:
    - id: lambda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda]].
        en: Check limiting cases of [[lambda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  y_m:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Posicion de la franja de orden m en el patron de interferencia
      en: Position of fringe of order m in the interference pattern
    summary_rules:
    - id: ym_summary_positive
      when: y_m > 0
      status: ok
      text:
        es: La franja de orden [[m]] se encuentra a [[y_m]] m del centro del patron, indicando una posicion lateral positiva
          en la pantalla.
        en: The fringe of order [[m]] is located at [[y_m]] m from the pattern center, indicating a positive lateral position
          on the screen.
    - id: ym_summary_negative
      when: y_m < 0
      status: ok
      text:
        es: La franja de orden [[m]] se encuentra a [[abs(y_m)]] m del centro del patron, en el lado opuesto del maximo central.
        en: The fringe of order [[m]] is located at [[abs(y_m)]] m from the pattern center, on the opposite side of the central
          maximum.
    - id: ym_summary_central
      when: y_m == 0
      status: ok
      text:
        es: La posicion cero corresponde al maximo central (m=0) donde la diferencia de camino es nula y la interferencia
          es constructiva.
        en: Zero position corresponds to the central maximum (m=0) where path difference is zero and interference is constructive.
    physical_reading_rules:
    - id: ym_reading_scale
      when: 'true'
      status: ok
      text:
        es: La posicion [[y_m]] m resulta de la interferencia constructiva cuando la diferencia de camino contiene exactamente
          [[m]] longitudes de onda. La escala del patron depende del cociente [[lambda]]/[[d]].
        en: The position [[y_m]] m results from constructive interference when the path difference contains exactly [[m]]
          wavelengths. The pattern scale depends on the ratio [[lambda]]/[[d]].
    coherence_rules:
    - id: ym_coherence_range
      when: abs(y_m) < 0.5
      status: ok
      text:
        es: El valor esta dentro del rango esperado para experimentos de doble rendija tipicos (menos de 50 cm del centro).
        en: The value is within the expected range for typical double-slit experiments (less than 50 cm from center).
    - id: ym_coherence_warning
      when: abs(y_m) > 0.5
      status: warning
      text:
        es: La posicion es muy grande. Verifica que estas usando metros y no centimetros, o que los parametros L, d y lambda
          sean realistas.
        en: The position is very large. Verify you are using meters not centimeters, or that parameters L, d, and lambda are
          realistic.
    model_validity_rules:
    - id: ym_validity_small_angle
      when: abs(y_m) / [[L]] < 0.1
      status: ok
      text:
        es: La aproximacion de angulos pequenos es valida. El angulo theta es menor a 0.1 radianes.
        en: The small angle approximation is valid. The angle theta is less than 0.1 radians.
    - id: ym_validity_large_angle
      when: abs(y_m) / [[L]] >= 0.1
      status: warning
      text:
        es: Para esta posicion, la aproximacion de angulos pequenos comienza a perder precision. Considera usar la formula
          exacta con tangente.
        en: For this position, the small angle approximation begins to lose precision. Consider using the exact formula with
          tangent.
    graph_rules:
    - id: ym_graph_position
      when: 'true'
      status: ok
      text:
        es: En el grafico, la franja de orden [[m]] aparece a la posicion [[y_m]] m, correspondiendo a un maximo de intensidad.
        en: In the graph, the fringe of order [[m]] appears at position [[y_m]] m, corresponding to an intensity maximum.
    likely_errors:
    - id: ym_error_units
      when: abs(y_m) > 1
      status: error
      text:
        es: El valor parece excesivamente grande. Un error frecuente es olvidar convertir d o lambda de milimetros o nanometros
          a metros antes de sustituir en la formula.
        en: The value seems excessively large. A common mistake is to forget converting d or lambda from millimetres or nanometres
          to metres before substituting into the formula.
    - id: ym_error_order
      when: abs(m) > 20
      status: warning
      text:
        es: El orden m es muy alto. Un error habitual es confundir el numero de franjas visibles con el orden maximo posible;
          en la practica, la difraccion limita los ordenes observables.
        en: The order m is very high. A common mistake is to confuse the number of visible fringes with the maximum possible
          order; in practice, diffraction limits observable orders.
    next_step_rules:
    - id: ym_step_verificar_orden
      when: 'true'
      status: ok
      text:
        es: Verifica que el orden m sea consistente con las franjas observadas. Recuerda que m=0 es el maximo central.
        en: Verify that order m is consistent with observed fringes. Remember m=0 is the central maximum.
    - id: ym_step_calcular_separacion
      when: abs(y_m) > 0.01
      status: ok
      text:
