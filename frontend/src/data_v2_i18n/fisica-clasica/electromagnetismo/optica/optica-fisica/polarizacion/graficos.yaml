version: "1.0"
leaf: "polarizacion"

coord:
  title:
    es: Gráfica Coord · Polarización de la Luz
    en: Coord Graph · Polarisation of Light
  xAxis:
    es: ángulo del analizador θ (°)
    en: analyser angle θ (°)
  yAxis:
    es: intensidad transmitida I (W/m²)
    en: transmitted intensity I (W/m²)
  xMagnitude: theta
  yMagnitude: I
  relation:
    es: "Ley de Malus: I = I₀cos²(θ). Máxima en θ = 0°; nula en θ = 90°."
    en: "Malus's law: I = I₀cos²(θ). Maximum at θ = 0°; zero at θ = 90°."
  physicalReading:
    es: "Curva cos²: I_max cuando polarizador y analizador alineados; I = 0 cuando cruzados."
    en: "cos² curve: I_max when polariser and analyser aligned; I = 0 when crossed."
  slopeMeaning:
    es: Máxima variación en θ = 45° (dI/dθ = −I₀sin(2θ) máximo).
    en: Maximum variation at θ = 45° (dI/dθ = −I₀sin(2θ) maximum).
  interceptMeaning:
    es: I(0°) = I₀; I(90°) = 0.
    en: I(0°) = I₀; I(90°) = 0.
  curvatureMeaning:
    es: "cos²: periodo π (180°), simétrica."
    en: "cos²: period π (180°), symmetric."
  signMeaning:
    es: I ≥ 0 siempre.
    en: I ≥ 0 always.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "0° ≤ θ ≤ 360°. Para luz natural: I = I₀/2 tras primer polarizador."
    en: "0° ≤ θ ≤ 360°. For natural light: I = I₀/2 after first polariser."
  modelConnection:
    es: Ley de Malus. Onda transversal electromagnética.
    en: "Malus's law. Transverse electromagnetic wave."
  formulaConnection:
    es: Conecta con I = I₀cos²θ, θ_Brewster = arctan(n₂/n₁), y birrefringencia.
    en: Connects to I = I₀cos²θ, θ_Brewster = arctan(n₂/n₁), and birefringence.
  readingFocus:
    es: leer I a 0°, 45° y 90° para verificar la ley de Malus y la extinción.
    en: "read I at 0°, 45°, and 90° to verify Malus's law and extinction."
  agentHints:
    es:
      - Luz natural → I₀/2 tras polarizador.
      - "Tercer polarizador a 45° entre dos cruzados: permite pasar luz."
      - "Brewster: reflexión totalmente polarizada."
    en:
      - Natural light → I₀/2 after polariser.
      - "Third polariser at 45° between two crossed: allows light through."
      - "Brewster: totally polarised reflection."
  commonMistakes:
    es:
      - Aplicar Malus a luz no polarizada sin pasar antes por el polarizador.
      - Confundir polarización por reflexión con la de absorción.
      - Olvidar que a 45° I = I₀/2 (correcto).
    en:
      - Applying Malus to unpolarised light without first passing through a polariser.
      - Confusing polarisation by reflection with absorption.
      - Forgetting that at 45° I = I₀/2 (correct).
