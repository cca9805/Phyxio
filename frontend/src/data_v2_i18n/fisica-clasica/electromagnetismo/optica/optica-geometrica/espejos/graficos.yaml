version: "1.0"
leaf: "espejos"

svg:
  title:
    es: Escena SVG · Espejos
    en: SVG Scene · Mirrors
  sceneId: mirror_optics
  sceneLabel:
    es: Formación de imagen en espejos
    en: Image formation in mirrors
  objects:
    es:
      - espejo
      - objeto
      - imagen
      - rayos de luz
      - foco F
    en:
      - mirror
      - object
      - image
      - light rays
      - focus F
  mainObject:
    es: espejo (plano, cóncavo o convexo)
    en: mirror (flat, concave, or convex)
  referenceFrame:
    es: geometría de rayos paraxiales
    en: paraxial ray geometry
  geometry:
    es: Eje óptico, foco F, centro C = 2F. 1/p + 1/q = 1/f = 2/R.
    en: Optical axis, focus F, centre C = 2F. 1/p + 1/q = 1/f = 2/R.
  interactions:
    es: "Reflexión especular θ_i = θ_r. Para espejos curvos: 1/p + 1/q = 2/R."
    en: "Specular reflection θ_i = θ_r. For curved mirrors: 1/p + 1/q = 2/R."
  modelElements:
    es:
      - rayo paralelo al eje → foco
      - rayo por el centro C → regresa
      - rayo por el foco → paralelo al eje
    en:
      - ray parallel to axis → focus
      - ray through C → returns
      - ray through focus → parallel to axis
  visualCues:
    es:
      - "Imagen real: rayos convergen delante del espejo."
      - "Imagen virtual: detrás del espejo."
      - "Espejo convexo: imagen siempre virtual, derecha, reducida."
    en:
      - "Real image: rays converge in front of the mirror."
      - "Virtual image: behind the mirror."
      - "Convex mirror: always virtual, upright, reduced."
  scaleMeaning:
    es: Escena cualitativa. p, q, f cuantitativos.
    en: Qualitative scene. p, q, f quantitative.
  relation:
    es: 1/p + 1/q = 1/f = 2/R. Ampliación m = −q/p.
    en: 1/p + 1/q = 1/f = 2/R. Magnification m = −q/p.
  physicalReading:
    es: Trazar los 3 rayos principales para encontrar posición y tamaño de la imagen.
    en: Trace the 3 principal rays to find image position and size.
  modelConnection:
    es: Óptica geométrica paraxial.
    en: Paraxial geometric optics.
  formulaConnection:
    es: Conecta con 1/p + 1/q = 1/f, m = −q/p, f = R/2.
    en: Connects to 1/p + 1/q = 1/f, m = −q/p, f = R/2.
  readingFocus:
    es: identificar el tipo de espejo y la posición del objeto respecto al foco.
    en: identify the mirror type and the object position relative to the focus.
  agentHints:
    es:
      - "Espejo plano: imagen virtual, derecha, igual tamaño."
      - "Cóncavo p > f: imagen real, invertida."
      - "Convexo: siempre virtual, derecha, reducida."
    en:
      - "Flat mirror: virtual, upright, same size."
      - "Concave p > f: real, inverted."
      - "Convex: always virtual, upright, reduced."
  commonMistakes:
    es:
      - Confundir imagen real y virtual.
      - Olvidar f = R/2.
      - Errores de signo en q.
    en:
      - Confusing real and virtual image.
      - Forgetting f = R/2.
      - Sign errors in q.
