version: "1.0"
leaf: "instrumentos-opticos"

coord:
  title:
    es: Gráfica Coord · Instrumentos Ópticos
    en: Coord Graph · Optical Instruments
  xAxis:
    es: distancia objeto p (m)
    en: object distance p (m)
  yAxis:
    es: ampliación angular M
    en: angular magnification M
  xMagnitude: p
  yMagnitude: M
  relation:
    es: "Lupa: M = 1 + D/f (D = 25 cm, distancia de visión). Microscopio: M = (L/f_obj)·(D/f_oc). Telescopio: M = −f_obj/f_oc."
    en: "Magnifying glass: M = 1 + D/f (D = 25 cm, near point). Microscope: M = (L/f_obj)·(D/f_oc). Telescope: M = −f_obj/f_oc."
  physicalReading:
    es: La ampliación depende de las distancias focales de los sistemas de lentes. Mayor M → objetos más pequeños visibles.
    en: Magnification depends on the focal lengths of the lens systems. Larger M → smaller objects visible.
  slopeMeaning:
    es: La pendiente de M(p) varía con el tipo de instrumento.
    en: The slope of M(p) varies with the instrument type.
  interceptMeaning:
    es: "En p = f (objeto en el foco): imagen en el infinito para la lupa. M → ∞ teórico."
    en: "At p = f (object at focus): image at infinity for a magnifying glass. M → ∞ theoretically."
  curvatureMeaning:
    es: Hiperbólica para la lupa (M ∝ 1/p cerca del foco); lineal para otros modos.
    en: Hyperbolic for a magnifying glass (M ∝ 1/p near focus); linear for other modes.
  signMeaning:
    es: "M > 0: imagen derecha. M < 0: imagen invertida (microscopio, telescopio astronómico)."
    en: "M > 0: upright image. M < 0: inverted image (microscope, astronomical telescope)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "p > 0. Los modelos de lentes delgadas son válidos en el régimen paraxial."
    en: "p > 0. Thin lens models are valid in the paraxial regime."
  modelConnection:
    es: Se interpreta bajo la óptica geométrica paraxial y la combinación de lentes.
    en: Interpreted under paraxial geometric optics and lens combination.
  formulaConnection:
    es: Conecta con M_lupa = 1 + D/f, M_micro = (L/f_obj)(D/f_oc), M_telescopio = −f_obj/f_oc.
    en: Connects to M_magnifier = 1 + D/f, M_microscope = (L/f_obj)(D/f_oc), M_telescope = −f_obj/f_oc.
  readingFocus:
    es: identificar el instrumento, leer M y verificar la dependencia con f.
    en: identify the instrument, read M, and verify the dependence on f.
  agentHints:
    es:
      - "Lupa: M máxima con la menor f posible."
      - "Microscopio: M_total = M_obj × M_oc."
      - "Telescopio: f_obj grande + f_oc pequeña → M grande."
    en:
      - "Magnifying glass: maximum M with smallest f."
      - "Microscope: M_total = M_obj × M_oc."
      - "Telescope: large f_obj + small f_oc → large M."
  commonMistakes:
    es:
      - Usar la misma fórmula para todos los instrumentos.
      - Olvidar que M = −f_obj/f_oc para el telescopio (imagen invertida).
      - No considerar las aberraciones en instrumentos reales.
    en:
      - Using the same formula for all instruments.
      - Forgetting M = −f_obj/f_oc for the telescope (inverted image).
      - Not considering aberrations in real instruments.
