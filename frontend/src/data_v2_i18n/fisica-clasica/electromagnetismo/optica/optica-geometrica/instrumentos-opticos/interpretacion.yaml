  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - ecuacion_lente_delgada
  - aumento_angular_lupa
  - aumento_microscopio
  magnitudes:
  - distancia_focal
  - d_o
  - d_i
  - aumento_angular
  - d_pp
  - f_lupa
  - f_obj
  - f_oc
  - longitud_del_tubo
  - aumento_total_del_microscopio
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: electromagnetismo
    en: ''
  axis_convention:
    es: El signo depende de la convención de ejes.
    en: Sign depends on axes.
  standard_assumptions:
  - es: Interpretado bajo el modelo físico.
    en: Interpreted under the physical model.
  standard_warnings:
  - es: Revisa unidades y signo.
    en: Check units and sign.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: true
  primary_variable: d_i
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  d_i:
    enabled: true
    magnitude_type: distance
    semantic_role:
      es: Distancia entre la lente y la imagen formada.
      en: Distance between the lens and the image formed.
    summary_rules:
    - id: di_summary_real
      when: d_i > 0
      status: ok
      text:
        es: '[[d_i]] es positiva, lo que indica imagen real al lado opuesto de la lente. Este resultado depende de la relacion
          entre [[d_o]] y [[f]].'
        en: '[[d_i]] is positive, indicating a real image on the far side of the lens. This result depends on the relationship
          between [[d_o]] and [[f]].'
    - id: di_summary_virtual
      when: d_i < 0
      status: ok
      text:
        es: '[[d_i]] es negativa, lo que indica imagen virtual del mismo lado que el objeto. Esto resume el comportamiento
          de la lupa.'
        en: '[[d_i]] is negative, indicating a virtual image on the same side as the object. This summarises the magnifier
          behaviour.'
    - id: di_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[d_i]] indica la posicion de la imagen respecto a la lente y depende de [[d_o]] y [[f]].'
        en: '[[d_i]] indicates the image position relative to the lens and depends on [[d_o]] and [[f]].'
    physical_reading_rules:
    - id: di_phys_convergente
      when: d_o > f and f > 0
      status: ok
      text:
        es: El objeto esta mas alla del foco de una lente convergente, por lo que la imagen real se forma al otro lado. Al
          aumentar [[d_o]], [[d_i]] disminuye y se acerca al foco imagen.
        en: The object is beyond the focus of a converging lens, so the real image forms on the far side. As [[d_o]] increases,
          [[d_i]] decreases and approaches the image focus.
    - id: di_phys_default
      when: 'true'
      status: ok
      text:
        es: La imagen se forma donde los rayos refractados convergen o parecen diverger. La posicion depende de la relacion
          entre [[d_o]] y [[f]].
        en: The image forms where refracted rays converge or appear to diverge. The position depends on the relationship between
          [[d_o]] and [[f]].
    coherence_rules:
    - id: di_coh_sign
      when: d_i > 0 and d_o < f and f > 0
      status: warning
      text:
        es: El objeto esta entre la lente convergente y el foco pero la imagen resulta positiva; revisar los datos introducidos.
        en: The object is between the converging lens and the focus but the image is positive; check the input data.
    - id: di_coh_default
      when: 'true'
      status: ok
      text:
        es: El signo de [[d_i]] es coherente con la posicion del objeto respecto al foco.
        en: The sign of [[d_i]] is consistent with the object position relative to the focus.
    model_validity_rules:
    - id: di_model_paraxial
      when: 'true'
      status: ok
      text:
        es: El resultado es valido mientras los rayos formen angulos pequenos con el eje optico y la lente sea delgada.
        en: The result is valid as long as rays form small angles with the optical axis and the lens is thin.
    graph_rules:
    - id: di_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[d_i]] aparece como la posicion horizontal de la imagen; un cambio de signo indica que la imagen
          pasa de real a virtual.
        en: On the graph, [[d_i]] appears as the horizontal image position; a sign change indicates the image switches from
          real to virtual.
    likely_errors:
    - id: di_error_sign
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: olvidar el signo de [[d_i]]. Si la imagen es virtual, [[d_i]] debe ser negativa.'
        en: 'Common error: forgetting the sign of [[d_i]]. If the image is virtual, [[d_i]] must be negative.'
    next_step_rules:
    - id: di_next_default
      when: 'true'
      status: ok
      text:
        es: Calcular ahora el aumento angular [[M_angular]] usando la focal y la distancia del punto proximo.
        en: Now calculate the angular magnification [[M_angular]] using the focal length and the near-point distance.
    physical_intuition:
    - id: d_i_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[d_i]] describe el estado dinámico.
        en: Intuitively, [[d_i]] describes the dynamic state.
    limiting_cases:
    - id: d_i_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[d_i]].
        en: Check limiting cases of [[d_i]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  d_o:
    enabled: true
    magnitude_type: distance
    semantic_role:
      es: Distancia entre el objeto y la lente.
      en: Distance between the object and the lens.
    summary_rules:
    - id: do_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[d_o]] indica la posicion del objeto frente a la lente y depende del montaje del instrumento.'
        en: '[[d_o]] indicates the object position in front of the lens and depends on the instrument setup.'
    physical_reading_rules:
    - id: do_phys_default
      when: 'true'
      status: ok
      text:
        es: La distancia del objeto determina si la imagen sera real o virtual segun su relacion con [[f]].
        en: The object distance determines whether the image will be real or virtual according to its relationship with [[f]].
    coherence_rules:
    - id: do_coh_default
      when: 'true'
      status: ok
      text:
        es: '[[d_o]] debe ser positiva para un objeto real situado delante de la lente.'
        en: '[[d_o]] must be positive for a real object in front of the lens.'
    model_validity_rules:
    - id: do_model_default
      when: 'true'
      status: ok
      text:
        es: Valido en la aproximacion de lente delgada con rayos paraxiales.
        en: Valid in the thin-lens approximation with paraxial rays.
    graph_rules:
    - id: do_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[d_o]] se representa como la distancia horizontal entre el objeto y la lente.
        en: On the graph, [[d_o]] is shown as the horizontal distance between the object and the lens.
    likely_errors:
    - id: do_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[d_o]] con una lectura aislada es un error frecuente: Error frecuente: medir [[d_o]] desde el foco
          en vez de desde el centro de la lente.'
        en: 'A common mistake is to interpret [[d_o]] in isolation: Common error: measuring [[d_o]] from the focus instead
          of from the lens centre.'
    next_step_rules:
    - id: do_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[d_o]] y [[f]] conocidos, calcular [[d_i]] mediante la ecuacion de la lente delgada.
        en: With [[d_o]] and [[f]] known, calculate [[d_i]] using the thin lens equation.
    physical_intuition:
    - id: d_o_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[d_o]] describe el estado dinámico.
        en: Intuitively, [[d_o]] describes the dynamic state.
    limiting_cases:
    - id: d_o_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[d_o]].
        en: Check limiting cases of [[d_o]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  distancia_focal:
    enabled: true
    magnitude_type: distance
    semantic_role:
      es: Distancia focal de la lente.
      en: Focal length of the lens.
    summary_rules:
    - id: f_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[f]] indica la potencia optica de la lente y depende de la curvatura de sus superficies y del indice de refraccion.'
        en: '[[f]] indicates the optical power of the lens and depends on the curvature of its surfaces and the refractive
          index.'
    physical_reading_rules:
    - id: f_phys_default
      when: 'true'
      status: ok
      text:
        es: Una focal corta significa mayor capacidad de convergencia y, en instrumentos, mayor aumento potencial.
        en: A short focal length means greater convergence ability and, in instruments, higher potential magnification.
    coherence_rules:
    - id: f_coh_default
      when: 'true'
      status: ok
      text:
        es: '[[f]] positiva indica lente convergente; negativa, divergente.'
        en: Positive [[f]] indicates a converging lens; negative, a diverging lens.
    model_validity_rules:
    - id: f_model_default
      when: 'true'
      status: ok
      text:
        es: Valida para lentes delgadas; en lentes gruesas usar la distancia focal efectiva.
        en: Valid for thin lenses; for thick lenses use the effective focal length.
    graph_rules:
    - id: f_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[f]] marca la posicion del foco principal sobre el eje optico.
        en: On the graph, [[f]] marks the principal focus position on the optical axis.
    likely_errors:
    - id: f_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir la focal del objetivo con la del ocular en un instrumento de dos lentes.'
        en: 'A common mistake is to interpret [[distancia_focal]] in isolation: Common error: confusing the objective focal
          length with the eyepiece focal length in a two-lens instrument.'
    next_step_rules:
    - id: f_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[f]] junto con [[d_o]] para determinar [[d_i]] y luego el aumento.
        en: Use [[f]] together with [[d_o]] to determine [[d_i]] and then the magnification.
    physical_intuition:
    - id: distancia_focal_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[distancia_focal]] describe el estado dinámico.
        en: Intuitively, [[distancia_focal]] describes the dynamic state.
    limiting_cases:
    - id: distancia_focal_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[distancia_focal]].
        en: Check limiting cases of [[distancia_focal]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  aumento_angular:
    enabled: true
    magnitude_type: ratio
    semantic_role:
      es: Aumento angular del instrumento optico.
      en: Angular magnification of the optical instrument.
    summary_rules:
    - id: ma_summary_positive
      when: M_angular > 1
      status: ok
      text:
        es: '[[M_angular]] es mayor que 1, lo que indica que el instrumento amplifica la imagen respecto a la vision a simple
          vista. Este resultado depende de la relacion entre [[d_pp]] y la focal.'
        en: '[[M_angular]] is greater than 1, indicating the instrument magnifies the image compared to unaided vision. This
          result depends on the relationship between [[d_pp]] and the focal length.'
    - id: ma_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[M_angular]] resume el factor de ampliacion angular del instrumento e indica cuantas veces mayor es el angulo
          subtendido.'
        en: '[[M_angular]] summarises the angular magnification factor of the instrument and indicates how many times the
          subtended angle increases.'
    physical_reading_rules:
    - id: ma_phys_lupa
      when: M_angular > 1 and M_angular < 30
      status: ok
      text:
        es: El aumento angular se encuentra en el rango tipico de una lupa simple. Al disminuir la focal, [[M_angular]] aumenta
          proporcionalmente.
        en: The angular magnification is in the typical range of a simple magnifier. As the focal length decreases, [[M_angular]]
          increases proportionally.
    - id: ma_phys_default
      when: 'true'
      status: ok
      text:
        es: '[[M_angular]] cuantifica la ampliacion angular del instrumento.'
        en: '[[M_angular]] quantifies the angular magnification of the instrument.'
    coherence_rules:
    - id: ma_coh_below1
      when: M_angular < 1
      status: warning
      text:
        es: Un aumento angular menor que 1 indicaria que el instrumento reduce la imagen; revisar la focal introducida.
        en: An angular magnification below 1 would indicate the instrument reduces the image; check the entered focal length.
    - id: ma_coh_default
      when: 'true'
      status: ok
      text:
        es: El valor de [[M_angular]] es coherente con los parametros introducidos.
        en: The value of [[M_angular]] is consistent with the entered parameters.
    model_validity_rules:
    - id: ma_model_default
      when: 'true'
      status: ok
      text:
        es: Valido con ojo relajado enfocando al infinito y lente delgada paraxial.
        en: Valid with the relaxed eye focusing at infinity and paraxial thin lens.
    graph_rules:
    - id: ma_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[M_angular]] aparece en el eje vertical y decrece hiperbolicamente al aumentar la focal.
        en: On the graph, [[M_angular]] appears on the vertical axis and decreases hyperbolically as the focal length increases.
    likely_errors:
    - id: ma_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir aumento angular con aumento lateral; el primero compara angulos, el segundo tamanos.'
        en: 'A common mistake is to interpret [[aumento_angular]] in isolation: Common error: confusing angular magnification
          with lateral magnification; the former compares angles, the latter sizes.'
    next_step_rules:
    - id: ma_next_default
      when: 'true'
      status: ok
      text:
        es: Comparar el aumento obtenido con los valores tipicos del instrumento; si se trata de un microscopio, calcular
          [[M_micro]].
        en: Compare the obtained magnification with typical instrument values; if it is a microscope, calculate [[M_micro]].
    physical_intuition:
    - id: aumento_angular_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[aumento_angular]] describe el estado dinámico.
        en: Intuitively, [[aumento_angular]] describes the dynamic state.
    limiting_cases:
    - id: aumento_angular_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[aumento_angular]].
        en: Check limiting cases of [[aumento_angular]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  f_lupa:
    enabled: true
    magnitude_type: distance
    semantic_role:
      es: Distancia focal de la lente usada como lupa.
      en: Focal length of the lens used as a magnifying glass.
    summary_rules:
    - id: flupa_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[f_lupa]] indica la potencia de la lupa y depende de la curvatura de la lente convergente.'
        en: '[[f_lupa]] indicates the magnifier power and depends on the curvature of the converging lens.'
    physical_reading_rules:
    - id: flupa_phys_default
      when: 'true'
      status: ok
      text:
        es: A menor [[f_lupa]], mayor aumento angular; la relacion es inversamente proporcional.
        en: The shorter [[f_lupa]], the higher the angular magnification; the relationship is inversely proportional.
    coherence_rules:
    - id: flupa_coh_default
      when: 'true'
      status: ok
      text:
        es: '[[f_lupa]] debe ser positiva para una lente convergente.'
        en: '[[f_lupa]] must be positive for a converging lens.'
    model_validity_rules:
    - id: flupa_model_default
      when: 'true'
      status: ok
      text:
        es: Valida para lentes delgadas en aproximacion paraxial.
        en: Valid for thin lenses in paraxial approximation.
    graph_rules:
    - id: flupa_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[f_lupa]] aparece en el eje horizontal; su disminucion eleva la curva de aumento.
        en: On the graph, [[f_lupa]] appears on the horizontal axis; its decrease raises the magnification curve.
    likely_errors:
    - id: flupa_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[f_lupa]] con una lectura aislada es un error frecuente: Error frecuente: usar la focal del ocular
          del microscopio como [[f_lupa]] en la formula de la lupa simple.'
        en: 'A common mistake is to interpret [[f_lupa]] in isolation: Common error: using the microscope eyepiece focal length
          as [[f_lupa]] in the simple magnifier formula.'
    next_step_rules:
    - id: flupa_next_default
      when: 'true'
      status: ok
      text:
        es: Calcular [[M_angular]] dividiendo [[d_pp]] entre [[f_lupa]].
        en: Calculate [[M_angular]] by dividing [[d_pp]] by [[f_lupa]].
    physical_intuition:
    - id: f_lupa_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[f_lupa]] describe el estado dinámico.
        en: Intuitively, [[f_lupa]] describes the dynamic state.
    limiting_cases:
    - id: f_lupa_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[f_lupa]].
        en: Check limiting cases of [[f_lupa]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  aumento_total_del_microscopio:
    enabled: true
    magnitude_type: ratio
    semantic_role:
      es: Aumento total del microscopio compuesto.
      en: Total magnification of the compound microscope.
    summary_rules:
    - id: mmicro_summary_high
      when: M_micro > 100
      status: ok
      text:
        es: '[[M_micro]] supera 100 aumentos, lo que indica un microscopio con buena capacidad de resolucion. Este resultado
          depende de [[f_obj]], [[f_oc]] y [[L]].'
        en: '[[M_micro]] exceeds 100 times, indicating a microscope with good resolving ability. This result depends on [[f_obj]],
          [[f_oc]] and [[L]].'
    - id: mmicro_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[M_micro]] indica el aumento total del microscopio y depende del producto de los aumentos del objetivo y del
          ocular.'
        en: '[[M_micro]] indicates the total microscope magnification and depends on the product of the objective and eyepiece
          magnifications.'
    physical_reading_rules:
    - id: mmicro_phys_default
      when: 'true'
      status: ok
      text:
        es: El aumento total es el producto del aumento lateral del objetivo (proporcional a [[L]] dividido entre [[f_obj]])
          por el aumento angular del ocular (proporcional a [[d_pp]] dividido entre [[f_oc]]).
        en: The total magnification is the product of the objective lateral magnification (proportional to [[L]] divided by
          [[f_obj]]) and the eyepiece angular magnification (proportional to [[d_pp]] divided by [[f_oc]]).
    coherence_rules:
    - id: mmicro_coh_low
      when: M_micro < 10
      status: warning
      text:
        es: Un aumento total menor que 10 es atipico para un microscopio compuesto; revisar las focales y la longitud del
          tubo.
        en: A total magnification below 10 is atypical for a compound microscope; check the focal lengths and tube length.
    - id: mmicro_coh_default
      when: 'true'
      status: ok
      text:
        es: El valor de [[M_micro]] es coherente con los parametros introducidos.
        en: The value of [[M_micro]] is consistent with the entered parameters.
    model_validity_rules:
    - id: mmicro_model_default
      when: 'true'
      status: ok
      text:
        es: Valido para microscopios con lentes delgadas y longitud de tubo estandar de aproximadamente 0.16 m.
        en: Valid for microscopes with thin lenses and standard tube length of approximately 0.16 m.
    graph_rules:
    - id: mmicro_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[M_micro]] crece linealmente con [[L]] y decrece hiperbolicamente con las focales.
        en: On the graph, [[M_micro]] grows linearly with [[L]] and decreases hyperbolically with the focal lengths.
    likely_errors:
    - id: mmicro_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[aumento_total_del_microscopio]] con una lectura aislada es un error frecuente: Error frecuente: sumar
          los aumentos del objetivo y del ocular en lugar de multiplicarlos.'
        en: 'A common mistake is to interpret [[aumento_total_del_microscopio]] in isolation: Common error: adding the objective
          and eyepiece magnifications instead of multiplying them.'
    next_step_rules:
    - id: mmicro_next_default
      when: 'true'
      status: ok
      text:
        es: Comparar [[M_micro]] con el poder de resolucion del microscopio y considerar los limites de difraccion.
