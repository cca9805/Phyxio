version: "1.0"
leaf: "lentes"

svg:
  title:
    es: Escena SVG · Lentes
    en: SVG Scene · Lenses
  sceneId: lens_optics
  sceneLabel:
    es: Formación de imagen en lentes delgadas
    en: Image formation in thin lenses
  objects:
    es:
      - lente
      - objeto
      - imagen
      - rayos de luz
      - "focos F y F'"
    en:
      - lens
      - object
      - image
      - light rays
      - "focal points F and F'"
  mainObject:
    es: lente delgada (convergente o divergente)
    en: thin lens (converging or diverging)
  referenceFrame:
    es: geometría de rayos paraxiales
    en: paraxial ray geometry
  geometry:
    es: "Eje óptico, focos F y F', distancia focal f. 1/p + 1/q = 1/f."
    en: "Optical axis, focal points F and F', focal length f. 1/p + 1/q = 1/f."
  interactions:
    es: "Refracción. Ecuación del fabricante: 1/f = (n−1)(1/R₁ − 1/R₂)."
    en: "Refraction. Lensmaker's equation: 1/f = (n−1)(1/R₁ − 1/R₂)."
  modelElements:
    es:
      - "rayo paralelo → foco F'"
      - rayo por el centro óptico → sin desvío
      - rayo por F → paralelo al eje
    en:
      - "ray parallel → focus F'"
      - ray through optical centre → no deviation
      - ray through F → parallel to axis
  visualCues:
    es:
      - "Convergente f > 0: imagen real e invertida si p > f."
      - "Divergente f < 0: imagen virtual, derecha, reducida."
      - Potencia D = 1/f (dioptrías).
    en:
      - "Converging f > 0: real and inverted image if p > f."
      - "Diverging f < 0: virtual, upright, reduced."
      - Power D = 1/f (dioptres).
  scaleMeaning:
    es: Escena cualitativa. p, q, f cuantitativos.
    en: Qualitative scene. p, q, f quantitative.
  relation:
    es: 1/p + 1/q = 1/f. Ampliación m = −q/p.
    en: 1/p + 1/q = 1/f. Magnification m = −q/p.
  physicalReading:
    es: Trazar los 3 rayos principales para encontrar posición y tamaño de la imagen.
    en: Trace the 3 principal rays to find image position and size.
  modelConnection:
    es: Óptica geométrica paraxial. Ecuación del fabricante de lentes.
    en: "Paraxial geometric optics. Lensmaker's equation."
  formulaConnection:
    es: Conecta con 1/p + 1/q = 1/f, m = −q/p, D = 1/f.
    en: Connects to 1/p + 1/q = 1/f, m = −q/p, D = 1/f.
  readingFocus:
    es: identificar tipo de lente, posición del objeto respecto al foco y tipo de imagen.
    en: identify lens type, object position relative to focus, and image type.
  agentHints:
    es:
      - "Convergente p < f: lupa (imagen virtual, ampliada)."
      - "Lentes en contacto: D_eq = D₁ + D₂."
      - "m > 0: imagen derecha; m < 0: invertida."
    en:
      - "Converging p < f: magnifying glass (virtual, enlarged)."
      - "Lenses in contact: D_eq = D₁ + D₂."
      - "m > 0: upright; m < 0: inverted."
  commonMistakes:
    es:
      - "Confundir f > 0 (convergente) con f < 0 (divergente)."
      - Errores de signo en q.
      - Usar ecuación de espejos en vez de lentes.
    en:
      - "Confusing f > 0 (converging) with f < 0 (diverging)."
      - Sign errors in q.
      - Using mirror equation instead of lens equation.
