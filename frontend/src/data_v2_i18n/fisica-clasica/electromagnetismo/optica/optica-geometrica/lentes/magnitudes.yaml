magnitudes:
- id: distancia_focal
  symbol: f
  nombre:
    es: Distancia focal
    en: Focal length
  descripcion:
    es: Distancia entre el centro optico de la lente y el foco, donde convergen los rayos paralelos al eje.
    en: Distance between the optical centre of the lens and the focus, where rays parallel to the axis converge.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - ecuacion de la lente delgada
  - ecuacion del fabricante de lentes
  - calculo de aumento
  common_mistake: 'Confundir signo de f: positivo para convergente, negativo para divergente.'
  typical_range: 0.01 m a 2 m en lentes de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo para lente convergente; negativo para lente divergente.
      en: Positive for converging lens; negative for diverging lens.
  zero_behavior:
    allowed: false
    meaning:
      es: Focal nula implicaria potencia optica infinita, fisicamente imposible.
      en: Zero focal length would imply infinite optical power, physically impossible.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: 0.01 a 2 m en modulo
  interpretation_role:
    primary_for:
    - tipo de lente
    - posicion de imagen
    secondary_for:
    - aumento lateral
  graph_binding:
    channels:
    - parametro_lente
  pedagogical_notes:
    es: La focal define el comportamiento de la lente. Un cambio de signo cambia completamente la naturaleza de la imagen.
    en: The focal length defines the lens behaviour. A sign change completely alters the nature of the image.
- id: d_o
  symbol: d_o
  nombre:
    es: Distancia del objeto
    en: Object distance
  descripcion:
    es: Distancia desde el objeto hasta el centro optico de la lente, medida sobre el eje optico.
    en: Distance from the object to the optical centre of the lens, measured along the optical axis.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
  - ecuacion de la lente delgada
  - calculo de aumento lateral
  common_mistake: Olvidar que d_o se toma positivo para objetos reales (frente a la lente).
  typical_range: 0.05 m a 10 m en situaciones didacticas
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo para objeto real (frente a la lente); negativo para objeto virtual.
      en: Positive for real object (in front of the lens); negative for virtual object.
  zero_behavior:
    allowed: false
    meaning:
      es: Objeto a distancia cero estaria en el plano de la lente, sin imagen definida.
      en: Object at zero distance would be in the lens plane, with no defined image.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: 0.05 a 10 m
  interpretation_role:
    primary_for:
    - posicion del objeto
    secondary_for:
    - tipo de imagen
  graph_binding:
    channels:
    - posicion_objeto
  pedagogical_notes:
    es: La posicion del objeto respecto al foco determina si la imagen es real o virtual.
    en: The object position relative to the focus determines whether the image is real or virtual.
- id: d_i
  symbol: d_i
  nombre:
    es: Distancia de la imagen
    en: Image distance
  descripcion:
    es: Distancia desde el centro optico de la lente hasta la imagen, medida sobre el eje optico.
    en: Distance from the optical centre of the lens to the image, measured along the optical axis.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - ecuacion de la lente delgada
  - calculo de aumento lateral
  common_mistake: Interpretar d_i negativo como error numerico cuando indica imagen virtual.
  typical_range: 0.05 m a 10 m en modulo
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica imagen real (lado opuesto al objeto); negativo indica imagen virtual (mismo lado que el objeto).
      en: Positive indicates real image (opposite side from the object); negative indicates virtual image (same side as the
        object).
  zero_behavior:
    allowed: false
    meaning:
      es: d_i nulo implicaria imagen en el plano de la lente, situacion no alcanzable con objeto finito.
      en: Zero d_i would imply the image at the lens plane, not achievable with a finite object.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: -10 a 10 m
  interpretation_role:
    primary_for:
    - posicion de imagen
    - tipo de imagen
    secondary_for:
    - aumento lateral
  graph_binding:
    channels:
    - posicion_imagen
  pedagogical_notes:
    es: 'El signo de d_i clasifica la imagen: positivo es real (proyectable); negativo es virtual (solo visible a traves de
      la lente).'
    en: 'The sign of d_i classifies the image: positive is real (projectable); negative is virtual (only visible through the
      lens).'
- id: aumento_lateral
  symbol: m
  nombre:
    es: Aumento lateral
    en: Lateral magnification
  descripcion:
    es: Cociente entre la altura de la imagen y la del objeto; indica tamano relativo y orientacion.
    en: Ratio of image height to object height; indicates relative size and orientation.
  unidad_si: adimensional
  dimension: '[1]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - tamano de imagen
  - orientacion de imagen
  - diseno optico
  common_mistake: Confundir aumento lateral (cociente de alturas) con aumento angular (cociente de angulos).
  typical_range: -10 a 10
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica imagen derecha; negativo indica imagen invertida.
      en: Positive indicates upright image; negative indicates inverted image.
  zero_behavior:
    allowed: false
    meaning:
      es: Aumento nulo significaria imagen de tamano cero, no realizable con objeto finito.
      en: Zero magnification would mean zero-size image, not achievable with a finite object.
  value_nature:
    kind: ratio
    nonnegative_only: false
    expected_interval: -10 a 10
  interpretation_role:
    primary_for:
    - tamano de imagen
    - orientacion de imagen
    secondary_for:
    - tipo de imagen
  graph_binding:
    channels:
    - tamano_flecha_imagen
  pedagogical_notes:
    es: El signo de m informa la orientacion y su modulo el tamano. Un m de menos 2 significa imagen invertida y el doble
      de grande.
    en: The sign of m tells the orientation and its magnitude tells the size. An m of minus 2 means inverted image twice as
      large.
- id: indice_de_refraccion_de_la_lente
  symbol: n
  nombre:
    es: Indice de refraccion de la lente
    en: Refractive index of the lens
  descripcion:
    es: Relacion entre la velocidad de la luz en el vacio y en el material de la lente.
    en: Ratio of the speed of light in vacuum to that in the lens material.
  unidad_si: adimensional
  dimension: '[1]'
  is_vector: false
  components: []
  category: parameter
  physical_role: material_property
  used_in:
  - ecuacion del fabricante de lentes
  - diseno de lentes
  common_mistake: Usar n menor que 1 para vidrio cuando debe ser mayor que 1.
  typical_range: 1.4 a 1.9 para vidrios opticos comunes
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo; no tiene significado de signo.
      en: Always positive; no sign meaning.
  zero_behavior:
    allowed: false
    meaning:
      es: n nulo no existe fisicamente; el minimo es 1 (vacio).
      en: Zero n does not exist physically; the minimum is 1 (vacuum).
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1.4 a 1.9
  interpretation_role:
    primary_for:
    - material de la lente
    secondary_for:
    - distancia focal
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: El indice conecta geometria con poder optico. Mayor n permite focales mas cortas con radios mayores.
    en: The refractive index connects geometry with optical power. Higher n allows shorter focal lengths with larger radii.
- id: radio_de_curvatura_de_la_primera_superficie
  symbol: R_1
  nombre:
    es: Radio de curvatura de la primera superficie
    en: Radius of curvature of the first surface
  descripcion:
    es: Radio de la esfera que describe la primera superficie de la lente (mas cercana al objeto).
    en: Radius of the sphere describing the first lens surface (closest to the object).
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: parameter
  physical_role: geometric_parameter
  used_in:
  - ecuacion del fabricante de lentes
  common_mistake: 'Olvidar la convencion de signos: R positivo si el centro de curvatura esta del lado de la imagen.'
  typical_range: 0.02 m a 2 m en modulo
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el centro de curvatura esta a la derecha de la superficie; negativo si esta a la izquierda.
      en: Positive if the centre of curvature is to the right of the surface; negative if to the left.
  zero_behavior:
    allowed: false
    meaning:
      es: R1 nulo implicaria curvatura infinita; una superficie plana se modela con R1 tendiendo a infinito.
      en: Zero R1 would imply infinite curvature; a flat surface is modelled with R1 tending to infinity.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: 0.02 a 2 m en modulo
  interpretation_role:
    primary_for:
    - geometria de la lente
    secondary_for:
    - distancia focal
  graph_binding:
    channels:
    - forma_lente
  pedagogical_notes:
    es: El signo de R1 junto con R2 determina el tipo de lente. Para biconvexa, R1 es positivo y R2 negativo.
    en: The sign of R1 together with R2 determines the lens type. For biconvex, R1 is positive and R2 negative.
- id: radio_de_curvatura_de_la_segunda_superficie
  symbol: R_2
  nombre:
    es: Radio de curvatura de la segunda superficie
    en: Radius of curvature of the second surface
  descripcion:
    es: Radio de la esfera que describe la segunda superficie de la lente (mas cercana a la imagen).
    en: Radius of the sphere describing the second lens surface (closest to the image).
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: parameter
  physical_role: geometric_parameter
  used_in:
  - ecuacion del fabricante de lentes
  common_mistake: Asignar a R2 el mismo signo que R1 para una lente biconvexa cuando tienen signos opuestos.
  typical_range: 0.02 m a 2 m en modulo
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el centro de curvatura esta a la derecha de la superficie; negativo si esta a la izquierda.
      en: Positive if the centre of curvature is to the right of the surface; negative if to the left.
  zero_behavior:
    allowed: false
    meaning:
      es: R2 nulo implicaria curvatura infinita; una superficie plana se modela con R2 tendiendo a infinito.
      en: Zero R2 would imply infinite curvature; a flat surface is modelled with R2 tending to infinity.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: 0.02 a 2 m en modulo
  interpretation_role:
    primary_for:
    - geometria de la lente
    secondary_for:
    - distancia focal
  graph_binding:
    channels:
    - forma_lente
  pedagogical_notes:
    es: En una lente biconvexa R2 es negativo porque su centro de curvatura queda del lado del objeto. Invertir este signo
      es un error muy frecuente.
    en: In a biconvex lens R2 is negative because its centre of curvature lies on the object side. Inverting this sign is
      a very common error.
