version: "1.0"
leaf: "reflexion"

svg:
  title:
    es: Escena SVG · Reflexión de la Luz
    en: SVG Scene · Reflection of Light
  sceneId: reflection_optics
  sceneLabel:
    es: Reflexión especular en una superficie
    en: Specular reflection at a surface
  objects:
    es:
      - rayo incidente
      - rayo reflejado
      - normal a la superficie
      - superficie reflectante
    en:
      - incident ray
      - reflected ray
      - surface normal
      - reflecting surface
  mainObject:
    es: superficie reflectante
    en: reflecting surface
  referenceFrame:
    es: plano de incidencia
    en: plane of incidence
  geometry:
    es: "θ_i y θ_r medidos desde la normal. Ley: θ_i = θ_r."
    en: "θ_i and θ_r measured from the normal. Law: θ_i = θ_r."
  interactions:
    es: "Reflexión especular: θ_i = θ_r. Reflexión total interna si θ_i > θ_c = arcsin(n₂/n₁)."
    en: "Specular reflection: θ_i = θ_r. Total internal reflection if θ_i > θ_c = arcsin(n₂/n₁)."
  modelElements:
    es:
      - ángulo de incidencia θ_i
      - ángulo de reflexión θ_r = θ_i
      - normal
      - plano de incidencia
    en:
      - angle of incidence θ_i
      - angle of reflection θ_r = θ_i
      - normal
      - plane of incidence
  visualCues:
    es:
      - Ángulos desde la normal, no desde la superficie.
      - Rayo reflejado en el plano de incidencia.
      - "Reflexión total: solo de más denso a menos denso."
    en:
      - Angles from the normal, not from the surface.
      - Reflected ray in the plane of incidence.
      - "Total reflection: only from denser to less dense."
  scaleMeaning:
    es: Escena cualitativa. Ángulos cuantitativos.
    en: Qualitative scene. Angles quantitative.
  relation:
    es: "θ_r = θ_i. Reflexión total para θ_i > θ_c."
    en: "θ_r = θ_i. Total reflection for θ_i > θ_c."
  physicalReading:
    es: El ángulo de reflexión iguala al de incidencia. El rayo se mantiene en el plano de incidencia.
    en: Reflection angle equals incidence angle. Ray stays in the plane of incidence.
  modelConnection:
    es: Óptica geométrica (ley de reflexión) y principio de Fermat.
    en: "Geometric optics (law of reflection) and Fermat's principle."
  formulaConnection:
    es: Conecta con θ_r = θ_i, θ_c = arcsin(n₂/n₁), ecuación de espejos.
    en: Connects to θ_r = θ_i, θ_c = arcsin(n₂/n₁), mirror equation.
  readingFocus:
    es: identificar la normal, medir ángulos y verificar θ_i = θ_r.
    en: identify the normal, measure angles, and verify θ_i = θ_r.
  agentHints:
    es:
      - Ángulos siempre desde la normal.
      - "Reflexión total: n₁ > n₂ y θ_i > θ_c."
      - "Fibra óptica: reflexión total interna."
    en:
      - Angles always from the normal.
      - "Total reflection: n₁ > n₂ and θ_i > θ_c."
      - "Optical fibre: total internal reflection."
  commonMistakes:
    es:
      - Medir ángulos desde la superficie.
      - "Olvidar n₁ > n₂ para reflexión total."
      - Confundir especular con difusa.
    en:
      - Measuring angles from the surface.
      - "Forgetting n₁ > n₂ for total reflection."
      - Confusing specular with diffuse.
