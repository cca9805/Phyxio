version: "1.0"
leaf: "indice-de-refraccion"

svg:
  title:
    es: Escena SVG · Índice de Refracción
    en: SVG Scene · Index of Refraction
  sceneId: refraction_optics
  sceneLabel:
    es: Refracción de la luz en una interfaz
    en: Refraction of light at an interface
  objects:
    es:
      - rayo incidente
      - rayo refractado
      - rayo reflejado
      - normal
      - interfaz n₁/n₂
    en:
      - incident ray
      - refracted ray
      - reflected ray
      - normal
      - interface n₁/n₂
  mainObject:
    es: interfaz entre dos medios ópticos
    en: interface between two optical media
  referenceFrame:
    es: plano de incidencia
    en: plane of incidence
  geometry:
    es: θ₁ (incidencia) y θ₂ (refracción) desde la normal. n₁sinθ₁ = n₂sinθ₂.
    en: θ₁ (incidence) and θ₂ (refraction) from the normal. n₁sinθ₁ = n₂sinθ₂.
  interactions:
    es: "Para n₂ > n₁: θ₂ < θ₁ (rayo se acerca a la normal). Para n₂ < n₁: θ₂ > θ₁."
    en: "For n₂ > n₁: θ₂ < θ₁ (ray bends towards normal). For n₂ < n₁: θ₂ > θ₁."
  modelElements:
    es:
      - n₁, n₂
      - θ₁ (incidencia)
      - θ₂ (refracción)
      - "θ_c si n₁ > n₂"
    en:
      - n₁, n₂
      - θ₁ (incidence)
      - θ₂ (refraction)
      - "θ_c if n₁ > n₂"
  visualCues:
    es:
      - Rayo se acerca a la normal al entrar en medio más denso.
      - "θ_c solo existe cuando n₁ > n₂."
      - "Dispersión: n(λ) separa colores."
    en:
      - Ray bends toward normal entering denser medium.
      - "θ_c only exists when n₁ > n₂."
      - "Dispersion: n(λ) separates colours."
  scaleMeaning:
    es: Escena cualitativa. Ángulos e índices cuantitativos.
    en: Qualitative scene. Angles and indices quantitative.
  relation:
    es: n₁sinθ₁ = n₂sinθ₂. n = c/v.
    en: n₁sinθ₁ = n₂sinθ₂. n = c/v.
  physicalReading:
    es: La ley de Snell predice la dirección del rayo refractado.
    en: "Snell's law predicts the direction of the refracted ray."
  modelConnection:
    es: Óptica geométrica (ley de Snell) y dispersión n(λ).
    en: "Geometric optics (Snell's law) and dispersion n(λ)."
  formulaConnection:
    es: Conecta con n₁sinθ₁ = n₂sinθ₂, n = c/v, θ_c = arcsin(n₂/n₁).
    en: Connects to n₁sinθ₁ = n₂sinθ₂, n = c/v, θ_c = arcsin(n₂/n₁).
  readingFocus:
    es: identificar n₁, n₂, θ₁ y calcular θ₂ con Snell.
    en: identify n₁, n₂, θ₁ and compute θ₂ with Snell.
  agentHints:
    es:
      - n₁sinθ₁ = n₂sinθ₂ conserva la componente tangencial del vector de onda.
      - "Dispersión: arcoíris y prisma."
      - "θ_c solo si n₁ > n₂."
    en:
      - n₁sinθ₁ = n₂sinθ₂ conserves the tangential component of the wave vector.
      - "Dispersion: rainbow and prism."
      - "θ_c only if n₁ > n₂."
  commonMistakes:
    es:
      - Medir θ desde la superficie.
      - "Olvidar que θ_c solo existe cuando n₁ > n₂."
      - Confundir refracción con reflexión.
    en:
      - Measuring θ from the surface.
      - "Forgetting θ_c only exists when n₁ > n₂."
      - Confusing refraction with reflection.
