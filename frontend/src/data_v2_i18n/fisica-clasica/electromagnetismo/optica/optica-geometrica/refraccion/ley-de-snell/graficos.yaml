version: "1.0"
leaf: "ley-de-snell"

coord:
  title:
    es: Gráfica Coord · Ley de Snell
    en: "Coord Graph · Snell's Law"
  xAxis:
    es: sin(θ₁) — seno del ángulo de incidencia
    en: sin(θ₁) — sine of the incidence angle
  yAxis:
    es: sin(θ₂) — seno del ángulo de refracción
    en: sin(θ₂) — sine of the refraction angle
  xMagnitude: sin_theta1
  yMagnitude: sin_theta2
  relation:
    es: "n₁sin(θ₁) = n₂sin(θ₂) → sin(θ₂) = (n₁/n₂)·sin(θ₁): recta de pendiente n₁/n₂."
    en: "n₁sin(θ₁) = n₂sin(θ₂) → sin(θ₂) = (n₁/n₂)·sin(θ₁): line with slope n₁/n₂."
  physicalReading:
    es: "Recta por el origen de pendiente n₁/n₂. Pendiente < 1 si n₂ > n₁."
    en: "Line through the origin with slope n₁/n₂. Slope < 1 if n₂ > n₁."
  slopeMeaning:
    es: "Pendiente = n₁/n₂: permite medir n₂ si n₁ es conocido."
    en: "Slope = n₁/n₂: allows measuring n₂ if n₁ is known."
  interceptMeaning:
    es: La recta pasa por el origen (θ₁ = 0 → θ₂ = 0).
    en: The line passes through the origin (θ₁ = 0 → θ₂ = 0).
  curvatureMeaning:
    es: "Lineal: sin(θ₂) = (n₁/n₂)sin(θ₁). Sin curvatura."
    en: "Linear: sin(θ₂) = (n₁/n₂)sin(θ₁). No curvature."
  signMeaning:
    es: "sin(θ) > 0 para 0° < θ < 90°."
    en: "sin(θ) > 0 for 0° < θ < 90°."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "0 ≤ sin(θ₁) ≤ 1. Si n₁ > n₂: reflexión total para sin(θ₁) > n₂/n₁."
    en: "0 ≤ sin(θ₁) ≤ 1. If n₁ > n₂: total reflection for sin(θ₁) > n₂/n₁."
  modelConnection:
    es: Óptica geométrica. Ley de Snell-Descartes.
    en: Geometric optics. Snell-Descartes law.
  formulaConnection:
    es: Conecta con n₁sinθ₁ = n₂sinθ₂, n = c/v, θ_c = arcsin(n₂/n₁).
    en: Connects to n₁sinθ₁ = n₂sinθ₂, n = c/v, θ_c = arcsin(n₂/n₁).
  readingFocus:
    es: leer la pendiente n₁/n₂ para calcular el índice de refracción.
    en: read the slope n₁/n₂ to compute the refractive index.
  agentHints:
    es:
      - "Graficar sin vs sin: la linealidad es la ventaja."
      - "Reflexión total: la recta supera sin(θ₂) = 1."
      - "Dispersión: distintas λ dan distintas pendientes."
    en:
      - "Graphing sin vs sin: linearity is the advantage."
      - "Total reflection: line exceeds sin(θ₂) = 1."
      - "Dispersion: different λ give different slopes."
  commonMistakes:
    es:
      - Graficar θ₂ vs θ₁ (no es lineal).
      - Olvidar sin(θ₂) ≤ 1.
      - Confundir n₁/n₂ con n₂/n₁.
    en:
      - Graphing θ₂ vs θ₁ (not linear).
      - Forgetting sin(θ₂) ≤ 1.
      - Confusing n₁/n₂ with n₂/n₁.
