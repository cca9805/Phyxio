formulas:
- id: ley_palanca
  title:
    es: Ley de la Palanca (Equilibrio de Momentos)
    en: Law of the Lever (Torque Equilibrium)
  equation: P * bP = R * bR
  latex: P \cdot b_P = R \cdot b_R
  rearrangements:
  - equation: P = (R * bR) / bP
    latex: P = \frac{R \cdot b_R}{b_P}
  - equation: bP = (R * bR) / P
    latex: b_P = \frac{R \cdot b_R}{P}
  category: mecanica/estatica
  relation_type: balance
  physical_meaning:
    es: Establece que para que una palanca esté en equilibrio, el momento generado por la potencia debe ser igual al generado por la resistencia.
    en: States that for a lever to be in equilibrium, the torque generated by the effort must be equal to the torque generated by the resistance.
  constraints: No hay aceleración angular.
  validity:
    es: Válida para sólidos rígidos en equilibrio estático rotacional.
    en: Valid for rigid bodies in static rotational equilibrium.
  dimension_check: L^2MT^-2 (Torque)
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [estatica, equilibrio, maquinas-simples]
  result_semantics: Representa la condición de inmovilidad rotacional.
  domain_checks: bP > 0, bR > 0
  coherence_checks: P y R deben ser fuerzas; bP y bR distancias.
  graph_implications: Define la pendiente de la relación entre fuerzas.
  pedagogical_triggers: "¿Qué pasa si mueves el punto de apoyo?"

- id: ventaja_mecanica_geometria
  title:
    es: Ventaja Mecánica Ideal (Geométrica)
    en: Ideal Mechanical Advantage (Geometric)
  equation: VM = bP / bR
  latex: VM = \frac{b_P}{b_R}
  rearrangements:
  - equation: bP = VM * bR
    latex: b_P = VM \cdot b_R
  category: mecanica/aplicaciones
  relation_type: gain_factor
  physical_meaning:
    es: Factor por el cual la máquina amplifica la fuerza de entrada debido a su diseño geométrico.
    en: Factor by which the machine amplifies the input force due to its geometric design.
  constraints: Modelo ideal sin rozamiento.
  validity:
    es: Válida siempre que los brazos se midan desde el fulcro.
    en: Valid as long as arms are measured from the fulcrum.
  dimension_check: "1" # adimensional
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [rendimiento, geometria, diseño]
  result_semantics: VM > 1 implica ahorro de fuerza.
  domain_checks: bR != 0
  coherence_checks: Siempre positiva.
  graph_implications: Determina la escala del eje de fuerzas.
  pedagogical_triggers: "Relación inversa entre brazo y fuerza."

- id: ventaja_mecanica_fuerzas
  title:
    es: Ventaja Mecánica Ideal (Fuerzas)
    en: Ideal Mechanical Advantage (Forces)
  equation: VM = R / P
  latex: VM = \frac{R}{P}
  rearrangements:
  - equation: R = P * VM
    latex: R = P \cdot VM
  category: mecanica/aplicaciones
  relation_type: gain_factor
  physical_meaning:
    es: Define la ventaja mecánica como la relación entre la carga vencida y el esfuerzo realizado.
    en: Defines mechanical advantage as the ratio between the load overcome and the effort exerted.
  constraints: Equilibrio estático.
  validity:
    es: Equivalente a la geométrica en ausencia de rozamiento.
    en: Equivalent to the geometric one in the absence of friction.
  dimension_check: "1"
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [fuerzas, balance, rendimiento]
  result_semantics: Proporción de carga/esfuerzo.
  domain_checks: P > 0
  coherence_checks: Consistente con la ley de la palanca.
  graph_implications: Pendiente de la recta R vs P.
  pedagogical_triggers: "¿Es real esta ventaja en una máquina con fricción?"

- id: rendimiento_palanca
  title:
    es: Rendimiento Mecánico (Eficiencia)
    en: Mechanical Efficiency
  equation: eta = VMreal / VM
  latex: \eta = \frac{VM_{real}}{VM}
  rearrangements:
  - equation: VMreal = VM * eta
    latex: VM_{real} = VM \cdot \eta
  category: mecanica/termodinamica
  relation_type: loss_correction
  physical_meaning:
    es: Mide cuánta de la ventaja geométrica se pierde por rozamiento y deformación.
    en: Measures how much of the geometric advantage is lost due to friction and deformation.
  constraints: Segunda ley de la termodinámica (eta <= 1).
  validity:
    es: Válida para máquinas reales con pérdidas energéticas.
    en: Valid for real machines with energy losses.
  dimension_check: "1"
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [eficiencia, perdidas, ingenieria]
  result_semantics: Valor entre 0 y 1.
  domain_checks: VM > 0
  coherence_checks: Siempre eta <= 1.
  graph_implications: Reduce la pendiente efectiva en gráficos reales.
  pedagogical_triggers: "¿Por qué el rendimiento nunca es 100%?"

- id: conservacion_trabajo
  title:
    es: Conservación del Trabajo (Regla de Oro)
    en: Conservation of Work (Golden Rule)
  equation: P * sP = R * sR
  latex: P \cdot s_P = R \cdot s_R
  rearrangements:
  - equation: sP = (R * sR) / P
    latex: s_P = \frac{R \cdot s_R}{P}
  category: mecanica/energia
  relation_type: conservation
  physical_meaning:
    es: En una máquina ideal, el trabajo realizado por la potencia es igual al trabajo realizado sobre la resistencia.
    en: In an ideal machine, the work done by the effort is equal to the work done on the resistance.
  constraints: No hay disipación de calor.
  validity:
    es: Fundamental para entender el intercambio de fuerza por distancia.
    en: Fundamental for understanding the exchange of force for distance.
  dimension_check: L^2MT^-2 (Work/Energy)
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [trabajo, energia, conservacion]
  result_semantics: Igualdad de energías en ambos extremos.
  domain_checks: P > 0, R > 0
  coherence_checks: Dimensiones de Joule (J).
  graph_implications: Relación entre arcos de desplazamiento.
  pedagogical_triggers: "Si ahorras fuerza, ¿qué sucede con el desplazamiento?"

- id: torque_potencia
  title:
    es: Momento de la Potencia
    en: Effort Torque
  equation: tauP = P * bP
  latex: \tau_P = P \cdot b_P
  rearrangements:
  - equation: P = tauP / bP
    latex: P = \frac{\tau_P}{b_P}
  - equation: bP = tauP / P
    latex: b_P = \frac{\tau_P}{P}
  category: mecanica/dinamica
  relation_type: definition
  physical_meaning:
    es: Cuantifica la tendencia de giro generada por la fuerza de entrada respecto al fulcro.
    en: Quantifies the rotational tendency generated by the input force with respect to the fulcrum.
  constraints: ""
  validity:
    es: Válida para cualquier configuración de palanca.
    en: Valid for any lever configuration.
  dimension_check: L^2MT^-2
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [torque, dinamica, rotacion]
  result_semantics: Representa el efecto rotacional de la potencia.
  domain_checks: P >= 0, bP >= 0
  coherence_checks: Consistente con la ley de momentos.
  graph_implications: Define la magnitud de la flecha de rotación.
  pedagogical_triggers: "¿Cómo influye el ángulo de aplicación?"

- id: torque_resistencia
  title:
    es: Momento de la Resistencia
    en: Resistance Torque
  equation: tauR = R * bR
  latex: \tau_R = R \cdot b_R
  rearrangements:
  - equation: R = tauR / bR
    latex: R = \frac{\tau_R}{b_R}
  - equation: bR = tauR / R
    latex: b_R = \frac{\tau_R}{R}
  category: mecanica/dinamica
  relation_type: definition
  physical_meaning:
    es: Cuantifica la tendencia de giro generada por la carga a vencer respecto al fulcro.
    en: Quantifies the rotational tendency generated by the load to be overcome with respect to the fulcrum.
  constraints: ""
  validity:
    es: Válida para cualquier configuración de palanca.
    en: Valid for any lever configuration.
  dimension_check: L^2MT^-2
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [torque, dinamica, carga]
  result_semantics: Representa la oposición rotacional de la resistencia.
  domain_checks: R >= 0, bR >= 0
  coherence_checks: Se equilibra con tauP en reposo.
  graph_implications: Define el par resistente del sistema.
  pedagogical_triggers: "¿Qué ocurre si la resistencia se aleja del fulcro?"

- id: ventaja_mecanica_cinematica
  title:
    es: Ventaja Mecánica (Cinemática)
    en: Mechanical Advantage (Kinematic)
  equation: VM = sP / sR
  latex: VM = \frac{s_P}{s_R}
  rearrangements:
  - equation: sP = VM * sR
    latex: s_P = VM \cdot s_R
  - equation: sR = sP / VM
    latex: s_R = \frac{s_P}{VM}
  category: mecanica/cinematica
  relation_type: gain_factor
  physical_meaning:
    es: Relaciona la distancia recorrida por la mano frente a la distancia recorrida por la carga.
    en: Relates the distance traveled by the hand versus the distance traveled by the load.
  constraints: Modelo ideal (sP y sR son arcos o desplazamientos lineales).
  validity:
    es: Equivalente a la ventaja geométrica en una palanca ideal.
    en: Equivalent to the geometric advantage in an ideal lever.
  dimension_check: "1"
  calculable: true
  motivo_no_calculable: ""
  used_in: [fisica-clasica/mecanica/aplicaciones/maquinas-simples/palanca]
  interpretation_tags: [cinematica, desplazamiento, regla_de_oro]
  result_semantics: Si VM > 1, sP debe ser mayor que sR.
  domain_checks: sR > 0
  coherence_checks: Siempre positiva.
  graph_implications: Determina la escala de los arcos de movimiento en el Svg.
  pedagogical_triggers: "¿Por qué debemos mover más la mano para levantar poco el objeto?"
