version: "1.0"
leaf: "palanca"

svg:
  title:
    es: Escena SVG - Palanca
    en: SVG Scene - Lever
  sceneId: palanca_scene
  sceneLabel:
    es: Palanca en equilibrio con fulcro, potencia y resistencia
    en: Lever in equilibrium with fulcrum, effort, and load
  objects:
    es:
      - barra rigida
      - fulcro
      - potencia P
      - resistencia R
      - brazos bP y bR
    en:
      - rigid bar
      - fulcrum
      - effort P
      - load R
      - arms bP and bR
  mainObject:
    es: palanca como maquina simple
    en: lever as a simple machine
  referenceFrame:
    es: laboratorio inercial con eje de giro en el fulcro
    en: inertial laboratory with rotation axis at the fulcrum
  geometry:
    es: La escena muestra una barra rigida apoyada en un fulcro. La potencia y la resistencia actuan a distancias perpendiculares distintas respecto al eje.
    en: The scene shows a rigid bar supported at a fulcrum. Effort and load act at different perpendicular distances from the axis.
  interactions:
    es: La potencia y la resistencia generan momentos opuestos. El equilibrio exige que el momento de potencia compense el momento de resistencia.
    en: Effort and load generate opposite torques. Equilibrium requires the effort torque to balance the load torque.
  modelElements:
    es:
      - equilibrio de momentos
      - brazo de potencia
      - brazo de resistencia
      - ventaja mecanica
    en:
      - torque equilibrium
      - effort arm
      - load arm
      - mechanical advantage
  visualCues:
    es:
      - El fulcro fija el punto respecto al que se calculan los momentos.
      - Un brazo de potencia mayor reduce la fuerza necesaria.
      - La palanca cambia fuerza por recorrido, no crea energia.
    en:
      - The fulcrum fixes the point about which torques are computed.
      - A longer effort arm reduces the required force.
      - A lever trades force for displacement; it does not create energy.
  scaleMeaning:
    es: Las longitudes dibujadas representan los brazos perpendiculares bP y bR.
    en: Drawn lengths represent the perpendicular arms bP and bR.
  relation:
    es: La escena representa la ley de la palanca P*bP = R*bR y la ventaja mecanica VM = bP/bR.
    en: The scene represents the lever law P*bP = R*bR and the mechanical advantage MA = bP/bR.
  physicalReading:
    es: Leer que aumentar bP o reducir bR aumenta la ventaja mecanica y disminuye la potencia necesaria para una misma resistencia.
    en: Read that increasing bP or reducing bR increases mechanical advantage and lowers the effort needed for the same load.
  modelConnection:
    es: Se interpreta como un solido rigido ideal en equilibrio rotacional.
    en: It is interpreted as an ideal rigid body in rotational equilibrium.
  formulaConnection:
    es: Conecta con ley_palanca, ventaja_mecanica_geometria y rendimiento_palanca.
    en: Connects with lever law, geometric mechanical advantage, and lever efficiency.
  readingFocus:
    es: identificar fulcro, potencia, resistencia y brazos antes de calcular momentos.
    en: identify fulcrum, effort, load, and arms before calculating torques.
  agentHints:
    es:
      - La distancia relevante es perpendicular a la linea de accion de la fuerza.
      - La ventaja mecanica ideal depende de la geometria; el rendimiento corrige perdidas.
      - Si la barra tiene peso apreciable, su momento tambien debe incluirse.
    en:
      - The relevant distance is perpendicular to the force line of action.
      - Ideal mechanical advantage depends on geometry; efficiency accounts for losses.
      - If the bar has appreciable weight, its torque must also be included.
  commonMistakes:
    es:
      - Medir el brazo desde el extremo de la barra en vez de desde el fulcro.
      - Confundir masa con peso al calcular la resistencia.
      - Creer que una palanca ahorra energia.
    en:
      - Measuring the arm from the end of the bar instead of from the fulcrum.
      - Confusing mass with weight when computing the load.
      - Believing that a lever saves energy.
