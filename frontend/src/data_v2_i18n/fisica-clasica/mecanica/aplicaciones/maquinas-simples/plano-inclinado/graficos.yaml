version: "1.0"
leaf: "plano-inclinado"

dcl:
  title:
    es: DCL · Plano Inclinado
    en: FBD · Inclined Plane
  forces:
    es:
      - W = m·g (peso, vertical hacia abajo)
      - N = m·g·cosθ (normal, perpendicular al plano)
      - f_r = μ_c·N (rozamiento, paralela al plano opuesta al movimiento)
    en:
      - W = m·g (weight, vertically downward)
      - N = m·g·cosθ (normal, perpendicular to the plane)
      - f_r = μ_c·N (friction, parallel to the plane opposing motion)
  object:
    es: bloque sobre plano inclinado un ángulo θ
    en: block on a plane inclined at angle θ
  freeBodyCondition:
    es: El DCL tiene los ejes alineados con el plano (∥ y ⊥). El peso se descompone en W_∥ = m·g·senθ y W_⊥ = m·g·cosθ.
    en: The FBD has axes aligned with the plane (∥ and ⊥). Weight is decomposed into W_∥ = m·g·sinθ and W_⊥ = m·g·cosθ.
  equilibriumCondition:
    es: "En dirección ⊥: N = m·g·cosθ. En dirección ∥: a = g(senθ − μ_c·cosθ)."
    en: "In the ⊥ direction: N = m·g·cosθ. In the ∥ direction: a = g(sinθ − μ_c·cosθ)."
  netForce:
    es: ΣF_∥ = m·g·senθ − f_r = m·a.
    en: ΣF_∥ = m·g·sinθ − f_r = m·a.
  accelerationDirection:
    es: A lo largo del plano, en dirección hacia abajo si senθ > μ_c·cosθ.
    en: Along the plane, downward if sinθ > μ_c·cosθ.
  referenceFrameChoice:
    es: Ejes alineados con el plano: eje x paralelo al plano (positivo hacia abajo del plano), eje y perpendicular.
    en: Axes aligned with the plane: x-axis parallel to the plane (positive downward along it), y-axis perpendicular.
  forceTypes:
    es:
      - W = m·g (vertical)
      - N (perpendicular al plano)
      - f_r = μ_c·N (paralela al plano)
    en:
      - W = m·g (vertical)
      - N (perpendicular to the plane)
      - f_r = μ_c·N (parallel to the plane)
  signConvention:
    es: Positivo hacia abajo por el plano en x. Positivo alejando del plano en y.
    en: Positive downward along the plane in x. Positive away from the plane in y.
  commonMistakes:
    es:
      - No descomponer el peso con los ejes del plano.
      - Confundir N = m·g·cosθ con N = m·g.
      - Dibujar el rozamiento en la dirección del movimiento en lugar de opuesta.
    en:
      - Not decomposing the weight using the plane's axes.
      - Confusing N = m·g·cosθ with N = m·g.
      - Drawing the friction force in the direction of motion instead of opposing it.
  agentHints:
    es:
      - Con los ejes alineados al plano, la ecuación en y da N directamente sin resolver sistema.
      - La fuerza de rozamiento siempre se opone al movimiento relativo.
      - El ángulo θ del plano es el mismo que el ángulo entre el peso y la normal.
    en:
      - With axes aligned to the plane, the y-equation gives N directly without solving a system.
      - Friction always opposes relative motion.
      - The plane angle θ equals the angle between weight and the normal.
  relation:
    es: El DCL del plano inclinado con ejes alineados al plano muestra la descomposición del peso en componentes paralela y perpendicular al plano.
    en: The inclined plane FBD with plane-aligned axes shows the decomposition of weight into components parallel and perpendicular to the plane.
  physicalReading:
    es: Leer el ángulo θ para calcular W_∥ = m·g·senθ, N = m·g·cosθ y la aceleración resultante.
    en: Read angle θ to compute W_∥ = m·g·sinθ, N = m·g·cosθ, and the resulting acceleration.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton con ejes alineados al plano.
    en: Interpreted under Newton's second law with axes aligned to the plane.
  formulaConnection:
    es: Conecta con a = g(senθ − μ_c·cosθ), N = m·g·cosθ y f_r = μ_c·N.
    en: Connects to a = g(sinθ − μ_c·cosθ), N = m·g·cosθ and f_r = μ_c·N.
  readingFocus:
    es: identificar el ángulo θ, las fuerzas que actúan y verificar la descomposición del peso.
    en: identify angle θ, the acting forces, and verify the weight decomposition.

svg:
  title:
    es: Escena SVG · Plano Inclinado
    en: SVG Scene · Inclined Plane
  sceneId: plano_inclinado_scene
  sceneLabel:
    es: Bloque sobre plano inclinado con peso, normal y rozamiento
    en: Block on inclined plane with weight, normal, and friction
  objects:
    es:
      - plano inclinado θ
      - bloque
      - W (peso)
      - N (normal)
      - f_r (rozamiento)
    en:
      - inclined plane θ
      - block
      - W (weight)
      - N (normal)
      - f_r (friction)
  mainObject:
    es: bloque sobre plano inclinado
    en: block on inclined plane
  referenceFrame:
    es: ejes alineados con el plano: x paralelo, y perpendicular
    en: axes aligned with the plane: x parallel, y perpendicular
  geometry:
    es: La escena muestra el plano inclinado con el bloque, el ángulo θ, el peso vertical y sus componentes paralela y perpendicular al plano.
    en: The scene shows the inclined plane with the block, angle θ, the vertical weight, and its components parallel and perpendicular to the plane.
  interactions:
    es: El peso actúa verticalmente, la normal perpendicularmente al plano y el rozamiento paralelo al plano (hacia arriba).
    en: Weight acts vertically, the normal perpendicularly to the plane, and friction parallel to the plane (upward).
  modelElements:
    es:
      - W vertical
      - N perpendicular al plano
      - f_r paralela al plano
      - W_∥ = m·g·senθ
      - W_⊥ = m·g·cosθ
    en:
      - W vertical
      - N perpendicular to the plane
      - f_r parallel to the plane
      - W_∥ = m·g·sinθ
      - W_⊥ = m·g·cosθ
  visualCues:
    es:
      - El ángulo θ del plano es el mismo que el ángulo entre W y N.
      - La normal es perpendicular a la superficie del plano, no vertical.
      - El rozamiento apunta hacia arriba del plano (se opone al movimiento de bajada).
    en:
      - The plane angle θ equals the angle between W and N.
      - The normal is perpendicular to the plane surface, not vertical.
      - Friction points up the plane (opposing downward motion).
  scaleMeaning:
    es: Las flechas son proporcionales a las magnitudes de las fuerzas.
    en: Arrows are proportional to the magnitudes of the forces.
  relation:
    es: La escena ilustra la descomposición del peso en componentes paralela y perpendicular al plano, y la normal y rozamiento que actúan sobre el bloque.
    en: The scene illustrates the decomposition of weight into components parallel and perpendicular to the plane, along with the normal and friction acting on the block.
  physicalReading:
    es: Leer el ángulo θ para calcular W_∥ = m·g·senθ, N = m·g·cosθ y la aceleración resultante.
    en: Read angle θ to compute W_∥ = m·g·sinθ, N = m·g·cosθ, and the resulting acceleration.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton con ejes alineados al plano.
    en: Interpreted under Newton's second law with axes aligned to the plane.
  formulaConnection:
    es: Conecta con a = g(senθ − μ_c·cosθ), N = m·g·cosθ y f_r = μ_c·N.
    en: Connects to a = g(sinθ − μ_c·cosθ), N = m·g·cosθ and f_r = μ_c·N.
  readingFocus:
    es: identificar el ángulo θ, las fuerzas que actúan y verificar la descomposición del peso.
    en: identify angle θ, the acting forces, and verify the weight decomposition.
  agentHints:
    es:
      - Los ejes alineados con el plano eliminan la necesidad de descomponer N y f_r.
      - Solo el peso W se descompone: W_∥ = m·g·senθ y W_⊥ = m·g·cosθ.
      - El plano inclinado es una máquina simple: permite subir cargas con menos fuerza recorriendo mayor distancia.
    en:
      - Axes aligned with the plane eliminate the need to decompose N and f_r.
      - Only weight W is decomposed: W_∥ = m·g·sinθ and W_⊥ = m·g·cosθ.
      - The inclined plane is a simple machine: it allows lifting loads with less force over a greater distance.
  commonMistakes:
    es:
      - Descomponer N en lugar del peso.
      - Usar N = m·g en lugar de N = m·g·cosθ.
      - Dibujar el rozamiento hacia abajo cuando el bloque sube el plano.
    en:
      - Decomposing N instead of the weight.
      - Using N = m·g instead of N = m·g·cosθ.
      - Drawing friction downward when the block moves up the plane.
