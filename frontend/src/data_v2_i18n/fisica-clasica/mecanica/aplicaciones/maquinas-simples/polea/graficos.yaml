version: "1.0"
leaf: "polea"

svg:
  title:
    es: Escena SVG · Polea
    en: SVG Scene · Pulley
  sceneId: polea_scene
  sceneLabel:
    es: Polea con cuerda, carga y fuerza de esfuerzo
    en: Pulley with rope, load, and effort force
  objects:
    es:
      - polea
      - cuerda
      - carga W
      - fuerza de esfuerzo F_e
    en:
      - pulley
      - rope
      - load W
      - effort force F_e
  mainObject:
    es: polea con sistema de carga
    en: pulley with load system
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory
  geometry:
    es: La escena muestra la polea con la cuerda y las fuerzas en sus extremos.
    en: The scene shows the pulley with the rope and forces at its ends.
  interactions:
    es: La tensión es la misma en toda la cuerda ideal.
    en: Tension is the same throughout the ideal rope.
  modelElements:
    es:
      - T (igual en ambos lados)
      - W (carga)
      - F_e (esfuerzo)
    en:
      - T (equal on both sides)
      - W (load)
      - F_e (effort)
  visualCues:
    es:
      - Si la polea es fija, ambos extremos tienen la misma tensión.
      - Si la polea es móvil, dos segmentos soportan W y el esfuerzo es T = W/2.
      - La dirección del esfuerzo puede ser cualquier dirección conveniente.
    en:
      - If the pulley is fixed, both rope ends have the same tension.
      - If the pulley is movable, two segments support W and effort is T = W/2.
      - The direction of effort can be any convenient direction.
  scaleMeaning:
    es: Proporcional a las fuerzas.
    en: Proportional to the forces.
  relation:
    es: La escena ilustra el funcionamiento básico de una polea como máquina simple.
    en: The scene illustrates the basic operation of a pulley as a simple machine.
  physicalReading:
    es: Identificar la carga, el esfuerzo y la tensión para aplicar el equilibrio o la segunda ley.
    en: Identify the load, effort, and tension to apply equilibrium or Newton's second law.
  modelConnection:
    es: Se interpreta bajo el equilibrio o dinámica de la polea con la segunda ley de Newton.
    en: Interpreted under pulley equilibrium or dynamics using Newton's second law.
  formulaConnection:
    es: Conecta con ΣF = 0 (equilibrio) o ΣF = m·a (dinámica).
    en: Connects to ΣF = 0 (equilibrium) or ΣF = m·a (dynamics).
  readingFocus:
    es: identificar el tipo de polea, la carga y el esfuerzo para calcular la tensión en la cuerda.
    en: identify the pulley type, load, and effort to compute the rope tension.
  agentHints:
    es:
      - La polea cambia la dirección de la fuerza (fija) o multiplica la fuerza (móvil).
      - Sin masa de polea ni fricción, T es uniforme en la cuerda.
      - Con masa de polea, se necesita la ecuación rotacional.
    en:
      - The pulley changes the direction of force (fixed) or multiplies it (movable).
      - Without pulley mass or friction, T is uniform throughout the rope.
      - With a massive pulley, the rotational equation of motion is needed.
  commonMistakes:
    es:
      - Olvidar que la polea ideal transmite la tensión sin pérdidas.
      - Confundir la polea como amplificador de fuerza sin considerar el desplazamiento.
      - No incluir el peso de la polea móvil en la carga total.
    en:
      - Forgetting that an ideal pulley transmits tension without losses.
      - Treating the pulley as a force amplifier without considering displacement.
      - Not including the weight of the movable pulley in the total load.
