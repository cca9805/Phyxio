version: "1.0"
leaf: "rueda-y-eje"

svg:
  title:
    es: Escena SVG · Rueda y Eje
    en: SVG Scene · Wheel and Axle
  sceneId: rueda_eje_scene
  sceneLabel:
    es: Rueda grande y eje pequeño con fuerzas de esfuerzo y carga
    en: Large wheel and small axle with effort and load forces
  objects:
    es:
      - rueda (radio R)
      - eje (radio r)
      - F_esfuerzo sobre la rueda
      - F_carga sobre el eje
    en:
      - wheel (radius R)
      - axle (radius r)
      - F_effort on the wheel
      - F_load on the axle
  mainObject:
    es: sistema rueda y eje
    en: wheel and axle system
  referenceFrame:
    es: laboratorio inercial con eje de rotación horizontal
    en: inertial laboratory with horizontal rotation axis
  geometry:
    es: La escena muestra la rueda grande y el eje pequeño coaxiales. El esfuerzo se aplica en la periferia de la rueda y la carga en la periferia del eje.
    en: The scene shows the large wheel and small axle as coaxial components. Effort is applied at the wheel's periphery and load is collected at the axle's periphery.
  interactions:
    es: El torque del esfuerzo sobre la rueda (τ_R = F_e·R) equilibra el torque de la carga sobre el eje (τ_r = F_c·r).
    en: The effort torque on the wheel (τ_R = F_e·R) balances the load torque on the axle (τ_r = F_c·r).
  modelElements:
    es:
      - radio R de la rueda
      - radio r del eje
      - F_e (esfuerzo)
      - F_c (carga)
    en:
      - wheel radius R
      - axle radius r
      - F_e (effort)
      - F_c (load)
  visualCues:
    es:
      - La rueda es notablemente más grande que el eje: esto visualiza la ventaja mecánica.
      - El esfuerzo se aplica en la periferia de la rueda; la carga se recoge en el eje.
      - VM = R/r: si R = 5r, el esfuerzo es 5 veces menor que la carga.
    en:
      - The wheel is notably larger than the axle: this visualises the mechanical advantage.
      - Effort is applied at the wheel's periphery; load is collected at the axle.
      - MA = R/r: if R = 5r, the effort is 5 times less than the load.
  scaleMeaning:
    es: Las proporciones de radios son indicativas de la ventaja mecánica.
    en: Radius proportions are indicative of the mechanical advantage.
  relation:
    es: La escena ilustra cómo la diferencia de radios rueda-eje genera una ventaja mecánica por equilibrio de torques.
    en: The scene illustrates how the wheel-to-axle radius difference generates mechanical advantage through torque balance.
  physicalReading:
    es: Leer la proporción de radios R/r para calcular la ventaja mecánica del sistema.
    en: Read the radius ratio R/r to compute the mechanical advantage of the system.
  modelConnection:
    es: Se interpreta bajo el equilibrio de torques: F_e·R = F_c·r.
    en: Interpreted under torque balance: F_e·R = F_c·r.
  formulaConnection:
    es: Conecta con VM = R/r, F_e = F_c·r/R y τ_e = τ_c.
    en: Connects to MA = R/r, F_e = F_c·r/R, and τ_e = τ_c.
  readingFocus:
    es: identificar los radios R y r en la escena para calcular VM = R/r.
    en: identify radii R and r in the scene to compute MA = R/r.
  agentHints:
    es:
      - Si la rueda gira un ángulo θ, el eje también gira el mismo ángulo.
      - La distancia recorrida por el esfuerzo (R·θ) es VM veces la recorrida por la carga (r·θ).
      - El trabajo del esfuerzo iguala el trabajo de la carga (sin pérdidas).
    en:
      - If the wheel rotates by angle θ, the axle also rotates by the same angle.
      - Effort travel distance (R·θ) is MA times the load travel distance (r·θ).
      - Effort work equals load work (no losses).
  commonMistakes:
    es:
      - Invertir R y r al calcular VM.
      - No relacionar el desplazamiento angular de rueda y eje (son iguales).
      - Confundir la rueda y eje con una polea compuesta.
    en:
      - Inverting R and r when computing MA.
      - Not relating the angular displacement of wheel and axle (they are equal).
      - Confusing the wheel and axle with a compound pulley.
