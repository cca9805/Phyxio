version: "1.0"
leaf: "tipos-de-palancas"

svg:
  title:
    es: Escena SVG · Tipos de Palancas
    en: SVG Scene · Types of Levers
  sceneId: tipos_palancas_scene
  sceneLabel:
    es: Palancas de primer, segundo y tercer género con fulcro, esfuerzo y carga
    en: First-, second-, and third-class levers with fulcrum, effort, and load
  objects:
    es:
      - palanca (barra rígida)
      - fulcro (punto de apoyo)
      - fuerza de esfuerzo
      - carga
    en:
      - lever (rigid bar)
      - fulcrum (pivot point)
      - effort force
      - load
  mainObject:
    es: palanca con fulcro, esfuerzo y carga en distintas posiciones
    en: lever with fulcrum, effort, and load in different positions
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory
  geometry:
    es: "La escena muestra los tres tipos: 1º género (fulcro entre esfuerzo y carga), 2º género (carga entre fulcro y esfuerzo), 3º género (esfuerzo entre fulcro y carga)."
    en: "The scene shows all three classes: 1st class (fulcrum between effort and load), 2nd class (load between fulcrum and effort), 3rd class (effort between fulcrum and load)."
  interactions:
    es: "El equilibrio de torques determina la relación entre esfuerzo y carga: F_e·d_e = F_c·d_c."
    en: "Torque balance determines the effort-to-load relationship: F_e·d_e = F_c·d_c."
  modelElements:
    es:
      - fulcro (punto de giro)
      - brazo de esfuerzo d_e
      - brazo de carga d_c
      - F_e y F_c
    en:
      - fulcrum (pivot point)
      - effort arm d_e
      - load arm d_c
      - F_e and F_c
  visualCues:
    es:
      - "1º género: fulcro en el centro (tijeras, balanza). VM = d_e/d_c."
      - "2º género: carga en el centro (carretilla). VM > 1 siempre."
      - "3º género: esfuerzo en el centro (antebrazo). VM < 1 pero mayor velocidad de la carga."
    en:
      - "1st class: fulcrum in the centre (scissors, balance). MA = d_e/d_c."
      - "2nd class: load in the centre (wheelbarrow). MA > 1 always."
      - "3rd class: effort in the centre (forearm). MA < 1 but greater load speed."
  scaleMeaning:
    es: Las longitudes de los brazos son proporcionales a los brazos de palanca reales.
    en: Arm lengths are proportional to the actual moment arms.
  relation:
    es: La escena ilustra los tres tipos de palancas y cómo la posición relativa del fulcro, carga y esfuerzo determina la ventaja mecánica.
    en: The scene illustrates the three lever classes and how the relative position of fulcrum, load, and effort determines the mechanical advantage.
  physicalReading:
    es: Identificar el tipo de palanca por la posición del fulcro y calcular la ventaja mecánica VM = d_e/d_c.
    en: Identify the lever class by the fulcrum position and compute the mechanical advantage MA = d_e/d_c.
  modelConnection:
    es: "Se interpreta bajo el equilibrio de torques: F_e·d_e = F_c·d_c."
    en: "Interpreted under torque balance: F_e·d_e = F_c·d_c."
  formulaConnection:
    es: Conecta con VM = d_e/d_c y F_e = F_c·d_c/d_e.
    en: Connects to MA = d_e/d_c and F_e = F_c·d_c/d_e.
  readingFocus:
    es: identificar el tipo de palanca, leer los brazos de esfuerzo y carga, y calcular la ventaja mecánica.
    en: identify the lever class, read the effort and load arms, and compute the mechanical advantage.
  agentHints:
    es:
      - "El tipo de palanca no determina si VM > 1 o VM < 1: solo la proporción de brazos."
      - Las palancas de 3º género tienen VM < 1 pero ofrecen mayor velocidad y desplazamiento.
      - "Las palancas de 2º género siempre tienen VM > 1 (la carga está siempre más cerca del fulcro)."
    en:
      - "The lever class does not determine whether MA > 1 or MA < 1: only the arm ratio does."
      - 3rd-class levers have MA < 1 but offer greater speed and displacement.
      - "2nd-class levers always have MA > 1 (the load is always closer to the fulcrum)."
  commonMistakes:
    es:
      - Confundir el tipo de palanca por la posición del fulcro.
      - "Creer que las palancas de 3º género son ineficientes: tienen mayor velocidad de salida."
      - No distinguir entre brazo de esfuerzo y brazo de carga al calcular VM.
    en:
      - Confusing the lever class by misidentifying the fulcrum position.
      - "Believing 3rd-class levers are inefficient: they have greater output speed."
      - Not distinguishing between the effort arm and the load arm when computing MA.
