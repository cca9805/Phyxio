version: "1.0"
leaf: "tornillo"

coord:
  title:
    es: Gráfica Coord · Tornillo
    en: Coord Graph · Screw
  xAxis:
    es: paso de rosca p (m)
    en: thread pitch p (m)
  yAxis:
    es: ventaja mecánica ideal VMI = 2πr/p
    en: ideal mechanical advantage IMA = 2πr/p
  xMagnitude: p
  yMagnitude: ventaja_mecanica
  relation:
    es: La ventaja mecánica ideal del tornillo es VMI = 2πr/p. Crece hiperbólicamente al disminuir el paso de rosca.
    en: The ideal mechanical advantage of the screw is IMA = 2πr/p. It grows hyperbolically as the thread pitch decreases.
  physicalReading:
    es: A menor paso p, mayor ventaja mecánica y menor esfuerzo necesario para una carga dada.
    en: With a smaller pitch p, there is higher mechanical advantage and less required effort for a given load.
  slopeMeaning:
    es: No es lineal, la pendiente varía hiperbólicamente con 1/p².
    en: Not linear, the slope varies hyperbolically with 1/p².
  interceptMeaning:
    es: No pasa por el origen; tiende a infinito a medida que p se aproxima a cero.
    en: Does not pass through the origin; tends to infinity as p approaches zero.
  curvatureMeaning:
    es: La curva es hiperbólica debido a la relación de inversa proporcionalidad con p.
    en: The curve is hyperbolic due to the inverse proportionality relation with p.
  signMeaning:
    es: Valores siempre positivos. El esfuerzo produce fuerza axial positiva.
    en: Always positive values. Effort produces positive axial force.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para paso p > 0 y radio de acción r > 0.
    en: Valid for pitch p > 0 and action radius r > 0.
  modelConnection:
    es: Se interpreta bajo el modelo de plano inclinado helicoidal.
    en: Interpreted under the helical inclined plane model.
  formulaConnection:
    es: Conecta con VMI = 2πr/p y F_ideal = R·p/(2πr).
    en: Connects to IMA = 2πr/p and F_ideal = R·p/(2πr).
  readingFocus:
    es: leer el paso de rosca p para deducir la ventaja mecánica ideal y la reducción de fuerza.
    en: read the thread pitch p to deduce the ideal mechanical advantage and force reduction.
  agentHints:
    es:
      - El tornillo es un plano inclinado enrollado sobre un cilindro.
      - Al reducir p se aumenta la fuerza axial, pero se requiere dar más vueltas.
      - La ventaja real es menor que la ideal debido a la fricción en las roscas.
    en:
      - The screw is an inclined plane wrapped around a cylinder.
      - Reducing p increases axial force but requires more turns.
      - Actual advantage is less than ideal due to friction in the threads.
  commonMistakes:
    es:
      - Confundir el avance por vuelta con el ángulo de rotación.
      - Ignorar la fricción que reduce drásticamente el rendimiento real.
      - Confundir el radio del cilindro del tornillo con el brazo de palanca r de esfuerzo.
    en:
      - Confusing advance per turn with rotation angle.
      - Ignoring friction which drastically reduces actual efficiency.
      - Confusing the screw cylinder radius with the effort lever arm r.

svg:
  title:
    es: Escena SVG · Tornillo
    en: SVG Scene · Screw
  sceneId: tornillo_scene
  sceneLabel:
    es: Tornillo con paso p y radio r bajo fuerza de esfuerzo y carga axial
    en: Screw with pitch p and radius r under effort force and axial load
  objects:
    es:
      - tornillo cilíndrico
      - paso de rosca p
      - radio de acción r
      - esfuerzo aplicado
      - carga axial
    en:
      - cylindrical screw
      - thread pitch p
      - action radius r
      - applied effort
      - axial load
  mainObject:
    es: sistema de tornillo
    en: screw system
  referenceFrame:
    es: laboratorio inercial con eje vertical
    en: inertial laboratory with vertical axis
  geometry:
    es: La escena muestra la rosca helicoidal con paso p y el radio de aplicación r.
    en: The scene shows the helical thread with pitch p and application radius r.
  interactions:
    es: El torque aplicado produce una fuerza axial de salida multiplicada.
    en: The applied torque produces a multiplied output axial force.
  modelElements:
    es:
      - paso de rosca p
      - radio de giro r
      - esfuerzo F
      - carga axial R
    en:
      - thread pitch p
      - turning radius r
      - effort F
      - axial load R
  visualCues:
    es:
      - La inclinación del filete de rosca es proporcional al paso.
      - El radio r se indica en el brazo del esfuerzo.
      - Las flechas de fuerza muestran la dirección del esfuerzo y la carga axial resultante.
    en:
      - The thread helix inclination is proportional to the pitch.
      - Radius r is shown on the effort arm.
      - Force arrows show the direction of effort and the resulting axial load.
  scaleMeaning:
    es: Las dimensiones espaciales corresponden a la geometría del tornillo.
    en: Spatial dimensions correspond to the screw geometry.
  relation:
    es: La escena ilustra cómo el tornillo actúa como un plano inclinado helicoidal.
    en: The scene illustrates how the screw acts as a helical inclined plane.
  physicalReading:
    es: Identificar el paso p y el radio r para deducir la ventaja mecánica ideal.
    en: Identify the pitch p and radius r to deduce the ideal mechanical advantage.
  modelConnection:
    es: Se interpreta bajo el equilibrio dinámico o cuasiestático del sistema roscado.
    en: Interpreted under the dynamic or quasi-static equilibrium of the threaded system.
  formulaConnection:
    es: Conecta con F = R·p/(2πr·eta).
    en: Connects to F = R·p/(2πr·eta).
  readingFocus:
    es: identificar el paso p y el brazo de palanca r en la rosca.
    en: identify the pitch p and lever arm r on the thread.
  agentHints:
    es:
      - El tornillo tiene una altísima ventaja mecánica a costa de una gran fricción.
      - El paso es la distancia que avanza el tornillo en una revolución.
      - La eficiencia real de un tornillo de rosca métrica común es baja (menor al 50%).
    en:
      - The screw has a very high mechanical advantage at the cost of high friction.
      - The pitch is the distance the screw advances in one revolution.
      - The actual efficiency of a common metric thread screw is low (below 50%).
  commonMistakes:
    es:
      - Olvidar que el tornillo es autoblocante debido al rozamiento.
      - No relacionar el avance axial con el paso de la rosca.
      - Confundir el paso con el número de hilos por unidad de longitud.
    en:
      - Forgetting that the screw is self-locking due to friction.
      - Not relating the axial advance to the thread pitch.
      - Confusing pitch with the number of threads per unit length.
