version: "1.0"
leaf: "ventaja-mecanica"

coord:
  title:
    es: Gráfica Coord · Ventaja Mecánica
    en: Coord Graph · Mechanical Advantage
  xAxis:
    es: brazo de esfuerzo d_e (m)
    en: effort arm d_e (m)
  yAxis:
    es: ventaja mecánica VM = d_e/d_c
    en: mechanical advantage MA = d_e/d_c
  xMagnitude: d_e
  yMagnitude: VM
  relation:
    es: La ventaja mecánica de una máquina simple es VM = F_carga/F_esfuerzo = d_e/d_c. Crece linealmente con el brazo de esfuerzo para brazo de carga constante.
    en: The mechanical advantage of a simple machine is MA = F_load/F_effort = d_e/d_c. It grows linearly with the effort arm for a fixed load arm.
  physicalReading:
    es: "A mayor VM, menor esfuerzo necesario pero mayor desplazamiento de esfuerzo. La energía total se conserva: VM no amplífica energía."
    en: "Higher MA means less effort required but greater effort displacement. Total energy is conserved: MA does not amplify energy."
  slopeMeaning:
    es: "La pendiente de VM vs d_e es 1/d_c: para un brazo de carga fijo, la VM aumenta linealmente con d_e."
    en: "The slope of MA vs d_e is 1/d_c: for a fixed load arm, MA increases linearly with d_e."
  interceptMeaning:
    es: Si d_e = 0 (esfuerzo en el fulcro), VM = 0 (imposible mover la carga).
    en: If d_e = 0 (effort at the fulcrum), MA = 0 (impossible to move the load).
  curvatureMeaning:
    es: La relación es lineal para d_c constante.
    en: The relationship is linear for constant d_c.
  signMeaning:
    es: "VM ≥ 0 siempre. VM > 1 indica ventaja mecánica; VM < 1 indica ventaja de velocidad."
    en: "MA ≥ 0 always. MA > 1 indicates mechanical advantage; MA < 1 indicates velocity advantage."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Válido para VM > 0 (máquinas simples ideales sin fricción)."
    en: "Valid for MA > 0 (ideal simple machines without friction)."
  modelConnection:
    es: "Se interpreta bajo el principio de trabajo: F_e·d_e = F_c·d_c (sin pérdidas)."
    en: "Interpreted under the work principle: F_e·d_e = F_c·d_c (no losses)."
  formulaConnection:
    es: Conecta con VM = d_e/d_c = F_c/F_e y F_e·d_e = F_c·d_c.
    en: Connects to MA = d_e/d_c = F_c/F_e and F_e·d_e = F_c·d_c.
  readingFocus:
    es: leer la relación de brazos d_e/d_c para calcular VM y deducir la reducción de esfuerzo.
    en: read the arm ratio d_e/d_c to compute MA and deduce the effort reduction.
  agentHints:
    es:
      - "VM > 1: menor esfuerzo pero mayor desplazamiento (palanca, polea, plano inclinado)."
      - "VM < 1: mayor esfuerzo pero menor desplazamiento, con ventaja de velocidad."
      - La eficiencia real η = VM_real/VM_ideal < 1 por la fricción.
    en:
      - "MA > 1: less effort but greater displacement (lever, pulley, inclined plane)."
      - "MA < 1: more effort but less displacement, with velocity advantage."
      - Real efficiency η = MA_real/MA_ideal < 1 due to friction.
  commonMistakes:
    es:
      - Creer que VM amplífica la energía (viola la conservación).
      - Confundir VM con el rendimiento.
      - Olvidar que a mayor VM, el esfuerzo debe recorrer una mayor distancia.
    en:
      - Believing MA amplifies energy (violates conservation).
      - Confusing MA with efficiency.
      - Forgetting that a higher MA requires the effort to travel a greater distance.
