- id: dm_linear
  title:
    es: "Elemento de masa lineal"
    en: "Linear mass element"
  equation: "dm = lambda * dL"
  latex: 'dm = \lambda\,dL'
  rearrangements:
    - target: dm
      equation: "dm = lambda * dL"
      latex: 'dm = \lambda\,dL'
  category: auxiliary
  relation_type: constitutive_relation
  physical_meaning:
    es: "Relaciona el elemento de masa con la densidad lineal de una barra, hilo o arco delgado."
    en: "Relates the mass element to the linear density of a thin rod, wire, or arc."
  constraints:
    - expr: "true"
      message:
        es: "El diferencial geom?trico debe corresponder a la dimensi?n real del cuerpo."
        en: "The geometric differential must match the body's actual dimension."
  validity:
    es: "V?lida cuando el cuerpo se modela con esta dimensi?n geom?trica dominante."
    en: "Valid when the body is modeled with this dominant geometric dimension."
  dimension_check: "M"
  calculable: false
  motivo_no_calculable:
    es: "Es una relaci?n diferencial que se usa dentro de integrales, no un c?lculo cerrado por s? solo."
    en: "It is a differential relation used inside integrals, not a closed calculation by itself."
  used_in:
    - theory
    - examples
    - interpretation
  interpretation_tags:
    - mass_element
    - linear_density
  result_semantics:
    target: dm
    kind: differential_mass
    sign_meaning:
      es: "Un elemento de masa f?sico no debe ser negativo en una distribuci?n material ordinaria."
      en: "A physical mass element should not be negative in an ordinary material distribution."
    absolute_value_meaning:
      es: "Cantidad infinitesimal de masa asociada a un elemento geom?trico."
      en: "Infinitesimal amount of mass associated with a geometric element."
  domain_checks:
    - expr: "true"
      message:
        es: "Comprueba que la densidad y el diferencial usan unidades compatibles."
        en: "Check that density and differential use compatible units."
  coherence_checks:
    - expr: "true"
      severity: ok
      message:
        es: "El producto densidad por diferencial debe tener dimensi?n de masa."
        en: "Density times differential must have mass dimension."
  graph_implications:
    - es: "El gr?fico debe indicar si el cuerpo se trata como barra, l?mina o s?lido."
      en: "The graph should indicate whether the body is treated as a rod, lamina, or solid."
  pedagogical_triggers:
    - detect_when: "true"
      message:
        es: "No sustituyas la masa total donde debe aparecer el elemento diferencial dm."
        en: "Do not substitute total mass where the differential element dm must appear."

