- id: M
  title:
    es: "Masa total continua"
    en: "Continuous total mass"
  equation: "M = integral(dm)"
  latex: 'M = \int dm'
  rearrangements:
    - target: M
      equation: "M = integral(dm)"
      latex: 'M = \int dm'
  category: structural
  relation_type: integral_relation
  physical_meaning:
    es: "Suma continua de todos los elementos diferenciales de masa del cuerpo extendido."
    en: "Continuous sum of all differential mass elements in the extended body."
  constraints:
    - expr: "M > 0"
      message:
        es: "La masa total del cuerpo extendido debe ser positiva y finita."
        en: "The total mass of the extended body must be positive and finite."
  validity:
    es: "V?lida para distribuciones continuas de masa con densidad integrable y dominio geom?trico bien definido."
    en: "Valid for continuous mass distributions with integrable density and a well-defined geometric domain."
  dimension_check: "M"
  calculable: false
  motivo_no_calculable:
    es: "Requiere especificar funci?n de densidad, dominio de integraci?n y parametrizaci?n geom?trica."
    en: "Requires specifying a density function, integration domain, and geometric parametrization."
  used_in:
    - theory
    - examples
    - interpretation
  interpretation_tags:
    - continuous_distribution
    - extended_body
    - integral_center_of_mass
  result_semantics:
    target: M
    kind: mass
    sign_meaning:
      es: "El signo indica posici?n respecto al origen y al sentido positivo elegido."
      en: "The sign indicates position relative to the origin and chosen positive direction."
    absolute_value_meaning:
      es: "El valor absoluto mide distancia o cantidad acumulada seg?n la magnitud objetivo."
      en: "The absolute value measures distance or accumulated amount according to the target quantity."
  domain_checks:
    - expr: "M > 0"
      message:
        es: "Sin masa total positiva no existe un centro de masas f?sico."
        en: "Without positive total mass there is no physical center of mass."
  coherence_checks:
    - expr: "true"
      severity: ok
      message:
        es: "El resultado debe compararse con simetr?as, l?mites geom?tricos y zonas de mayor densidad."
        en: "The result must be compared with symmetries, geometric bounds, and denser regions."
  graph_implications:
    - es: "El gr?fico debe mostrar el desplazamiento del centro de masas hacia la regi?n que m?s aporta al primer momento de masa."
      en: "The graph should show the center of mass shifting toward the region that contributes most to the first mass moment."
  pedagogical_triggers:
    - detect_when: "true"
      message:
        es: "Antes de integrar, identifica el diferencial de masa y las simetr?as que anulan componentes."
        en: "Before integrating, identify the mass differential and the symmetries that cancel components."

