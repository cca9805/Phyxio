- id: superposition_negative_mass
  title:
    es: "Superposición de masa negativa (Huecos)"
    en: "Negative mass superposition (Holes)"
  equation: "xcm = (M_total*x_total - m_hole*x_hole)/(M_total - m_hole)"
  latex: "x_{cm} = \\frac{M_{total}x_{total} - m_{hole}x_{hole}}{M_{total} - m_{hole}}"
  rearrangements:
    - target: xcm
      equation: "xcm = (M_total*x_total - m_hole*x_hole)/(M_total - m_hole)"
      latex: "x_{cm} = \\frac{M_{total}x_{total} - m_{hole}x_{hole}}{M_{total} - m_{hole}}"
  category: derived
  relation_type: average_relation
  physical_meaning:
    es: "Cálculo del centro de masas para un objeto con partes faltantes (huecos) tratando el vacío como una masa negativa."
    en: "Calculation of the center of mass for an object with missing parts (holes) by treating the vacuum as negative mass."
  validity:
    es: "Válida cuando el objeto puede descomponerse en formas geométricas simples conocidas."
    en: "Valid when the object can be decomposed into known simple geometric shapes."
  dimension_check: "L"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - interpretation
  interpretation_tags:
    - hole_correction
    - superposition_principle
  constraints:
    - expr: "M_total > m_hole"
      message:
        es: "La masa del hueco no puede ser mayor que la masa total original."
        en: "The hole's mass cannot be greater than the original total mass."
  result_semantics:
    target: xcm
    kind: coordinate
    sign_meaning:
      es: "Posición del baricentro corregido por la ausencia de materia."
      en: "Barycenter position corrected for the absence of matter."
    absolute_value_meaning:
      es: "Distancia del centro de masas real al origen tras restar el hueco."
      en: "Real center of mass distance to the origin after subtracting the hole."
  domain_checks:
    - expr: "M_total > m_hole"
      message:
        es: "La masa del hueco no puede ser mayor que la masa total del objeto original."
        en: "The hole's mass cannot be greater than the original object's total mass."
  coherence_checks:
    - expr: "true"
      severity: ok
      message:
        es: "El CM resultante debe alejarse de la posición del hueco."
        en: "The resulting CM must move away from the hole's position."
  graph_implications:
    - es: "Muestra el desplazamiento del marcador CM en sentido opuesto al centro del hueco."
      en: "Shows the CM marker shifting in the opposite direction to the hole's center."
  pedagogical_triggers:
    - detect_when: "true"
      message:
        es: "Recuerda: restar una masa equivale a sumar una masa negativa en la posición del centro del hueco."
        en: "Remember: subtracting a mass is equivalent to adding a negative mass at the hole's center position."
