version: '1.0'
leaf: centro-de-masas-en-cuerpos-extendidos
coord:
  id: centro-de-masas-en-cuerpos-extendidos-Coord
  graphId: centro-de-masas-en-cuerpos-extendidos-Coord
  title:
    es: Gráfica Coord · Centro de Masas en Cuerpos Extendidos
    en: Coord Graph · Center of Mass in Extended Bodies
  xAxis:
    es: coordenada de integración x (m)
    en: integration coordinate x (m)
  yAxis:
    es: posición del centro de masas x_cm (m)
    en: center-of-mass position x_cm (m)
  xMagnitude: x
  yMagnitude: x_cm
  relation:
    es: 'Para un cuerpo extendido con densidad no uniforme, el centro de masas se
      obtiene integrando la distribución de masa: x_cm = (1/M)·∫x·dm.'
    en: 'For an extended body with non-uniform density, the center of mass is obtained
      by integrating the mass distribution: x_cm = (1/M)·∫x·dm.'
  physicalReading:
    es: 'La posición del centro de masas refleja el equilibrio de la distribución
      de masa: para densidad uniforme coincide con el centroide; para densidad variable
      se desplaza hacia las zonas más densas.'
    en: 'The center-of-mass position reflects the mass distribution equilibrium: for
      uniform density it coincides with the centroid; for variable density it shifts
      toward the denser regions.'
  slopeMeaning:
    es: No hay una pendiente directa aplicable; la integración da un valor único de
      x_cm para cada distribución de densidad.
    en: No direct slope is applicable; integration gives a unique x_cm value for each
      density distribution.
  interceptMeaning:
    es: El resultado de la integral es x_cm; el valor depende del origen elegido para
      las coordenadas.
    en: The integral result is x_cm; the value depends on the chosen coordinate origin.
  curvatureMeaning:
    es: 'La posición del centro de masas depende de la forma de ρ(x): para densidad
      lineal, la integral es cuadrática.'
    en: 'The center-of-mass position depends on the shape of ρ(x): for linear density,
      the integral is quadratic.'
  signMeaning:
    es: El signo indica en qué lado del origen está el centro de masas según la distribución
      elegida.
    en: The sign indicates on which side of the origin the center of mass lies according
      to the chosen distribution.
  areaMeaning:
    es: El área bajo la curva ρ(x) dividida por la densidad media da la posición x_cm
      ponderada.
    en: The area under the ρ(x) curve divided by the mean density gives the mass-weighted
      x_cm position.
  domainMeaning:
    es: Válido para la extensión real del cuerpo. Fuera de él la densidad es cero.
    en: Valid over the actual extent of the body. Outside it the density is zero.
  modelConnection:
    es: Se interpreta bajo el cálculo integral del centro de masas para distribuciones
      continuas de masa.
    en: Interpreted within the integral calculus of center of mass for continuous
      mass distributions.
  formulaConnection:
    es: Conecta con x_cm = (1/M)·∫x·ρ(x)dV y con los teoremas de Pappus para cuerpos
      con simetría.
    en: Connects to x_cm = (1/M)·∫x·ρ(x)dV and the Pappus theorems for symmetric bodies.
  readingFocus:
    es: identificar la distribución de densidad y deducir cualitativamente hacia qué
      zona se desplaza el centro de masas antes de integrar.
    en: identify the density distribution and qualitatively deduce toward which region
      the center of mass shifts before integrating.
  agentHints:
    es:
    - 'Para densidad uniforme, x_cm es el centroide geométrico: coincide con el centro
      geométrico.'
    - Para densidad mayor en un extremo, el centro de masas se desplaza hacia ese
      extremo.
    - La simetría del cuerpo puede simplificar enormemente el cálculo.
    en:
    - 'For uniform density, x_cm is the geometric centroid: it coincides with the
      geometric center.'
    - For greater density at one end, the center of mass shifts toward that end.
    - Body symmetry can greatly simplify the calculation.
  commonMistakes:
    es:
    - Usar la fórmula discreta Σ(m_i·x_i)/M sin justificación para cuerpos extendidos.
    - Confundir centroide geométrico con centro de masas para densidades no uniformes.
    - Olvidar el diferencial de volumen o área en la integral.
    en:
    - Using the discrete formula Σ(m_i·x_i)/M without justification for extended bodies.
    - Confusing geometric centroid with center of mass for non-uniform densities.
    - Forgetting the volume or area differential in the integral.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: centro-de-masas-en-cuerpos-extendidos-Svg
  graphId: centro-de-masas-en-cuerpos-extendidos-Svg
  title:
    es: Escena SVG · Centro de Masas en Cuerpos Extendidos
    en: SVG Scene · Center of Mass in Extended Bodies
  sceneId: cm_cuerpos_extendidos
  sceneLabel:
    es: Cuerpo extendido con distribución de masa y centro de masas marcado
    en: Extended body with mass distribution and center of mass marked
  objects:
    es:
    - cuerpo extendido con forma definida
    - punto del centro de masas
    - indicadores de densidad relativa
    en:
    - extended body with defined shape
    - center-of-mass point
    - relative density indicators
  mainObject:
    es: cuerpo extendido
    en: extended body
  referenceFrame:
    es: sistema de coordenadas fijo al laboratorio
    en: coordinate system fixed to the laboratory
  geometry:
    es: La escena muestra un cuerpo con forma irregular o con gradiente de densidad,
      y marca el punto del centro de masas resultante de la distribución de masa.
    en: The scene shows a body with irregular shape or density gradient, marking the
      center-of-mass point resulting from the mass distribution.
  interactions:
    es: No se representan fuerzas; la escena es geométrica y destaca el efecto de
      la distribución de masa sobre la posición del centro de masas.
    en: No forces are depicted; the scene is geometric and highlights the effect of
      mass distribution on the center-of-mass position.
  modelElements:
    es:
    - forma del cuerpo
    - gradiente de densidad si procede
    - punto x_cm, y_cm calculado por integración
    en:
    - body shape
    - density gradient if applicable
    - center-of-mass point x_cm, y_cm from integration
  visualCues:
    es:
    - El centro de masas puede estar fuera del material del cuerpo si tiene forma
      hueca.
    - Para densidad uniforme, el centro de masas coincide con el centroide geométrico.
    - Una densidad mayor en un extremo desplaza el centro de masas hacia ese extremo.
    en:
    - The center of mass can lie outside the body's material if it has a hollow shape.
    - For uniform density, the center of mass coincides with the geometric centroid.
    - Greater density at one end shifts the center of mass toward that end.
  scaleMeaning:
    es: 'La escena es cualitativa: ilustra la posición relativa del centro de masas
      respecto al cuerpo.'
    en: 'The scene is qualitative: it illustrates the relative position of the center
      of mass with respect to the body.'
  relation:
    es: La escena conecta la forma y distribución de masa del cuerpo con la posición
      de su centro de masas, resultado de la integral de distribución.
    en: The scene connects the body's shape and mass distribution with the position
      of its center of mass, which results from the distribution integral.
  physicalReading:
    es: Identificar las zonas de mayor densidad o masa del cuerpo y deducir cualitativamente
      hacia dónde se desplaza el centro de masas.
    en: Identify the regions of greatest density or mass in the body and qualitatively
      deduce the direction of center-of-mass shift.
  modelConnection:
    es: Se interpreta bajo el modelo de cuerpo extendido con distribución continua
      de masa.
    en: Interpreted within the extended-body model with continuous mass distribution.
  formulaConnection:
    es: Conecta con r_cm = (1/M)·∫r·dm y con el principio de acción sobre el centro
      de masas.
    en: Connects to r_cm = (1/M)·∫r·dm and the principle of action on the center of
      mass.
  readingFocus:
    es: identificar la zona más masiva del cuerpo y verificar que el centro de masas
      está desplazado hacia ella.
    en: identify the most massive region of the body and verify that the center of
      mass is shifted toward it.
  agentHints:
    es:
    - Para un aro circular uniforme, el centro de masas está en el centro del aro,
      fuera del material.
    - La gravedad actúa como si toda la masa estuviera concentrada en el centro de
      masas.
    - Cuerpos con forma en L o T tienen el centro de masas fuera del material en la
      esquina.
    en:
    - For a uniform circular ring, the center of mass is at the ring's center, outside
      the material.
    - Gravity acts as if all mass were concentrated at the center of mass.
    - L-shaped or T-shaped bodies have the center of mass outside the material at
      the corner.
  commonMistakes:
    es:
    - Asumir que el centro de masas siempre está dentro del material del cuerpo.
    - Calcular el centroide geométrico y usarlo directamente como centro de masas
      sin verificar la distribución de densidad.
    - Olvidar que el centro de masas puede estar en el aire para cuerpos huecos.
    en:
    - Assuming the center of mass always lies within the body's material.
    - Computing the geometric centroid and using it directly as center of mass without
      checking the density distribution.
    - Forgetting that the center of mass can be in empty space for hollow bodies.
  recommendedTab: graficas
