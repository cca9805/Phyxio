      en: "Kinetic energy has no directional sign and cannot be negative."
    absolute_value_meaning:
      es: "Energía total asociada al movimiento observado desde el laboratorio."
      en: "Total energy associated with motion observed from the laboratory."
  domain_checks:
    - expr: "K_lab >= 0"
      message:
        es: "La energía cinética total debe ser positiva o nula."
