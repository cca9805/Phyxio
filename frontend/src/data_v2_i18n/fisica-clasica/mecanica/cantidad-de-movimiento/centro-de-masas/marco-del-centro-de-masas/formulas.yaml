- id: M_sum
  title:
    es: "Masa total del sistema (2 cuerpos)"
    en: "Total system mass (2 bodies)"
  equation: "M = m1 + m2"
  latex: "M = m_1 + m_2"
  rearrangements:
    - target: M
      equation: "M = m1 + m2"
      latex: "M = m_1 + m_2"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Inercia traslacional total del sistema de dos partículas."
    en: "Total translational inertia of the two-particle system."
  constraints: []
  validity:
    es: "Válida para cualquier par de partículas en un sistema aislado."
    en: "Valid for any pair of particles in an isolated system."
  dimension_check: "M"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - total_mass
  result_semantics:
    target: M
    kind: mass
    sign_meaning:
      es: "La masa es siempre positiva."
      en: "Mass is always positive."
    absolute_value_meaning:
      es: "Cantidad total de materia en el sistema."
      en: "Total amount of matter in the system."
  domain_checks:
    - expr: "m1 >= 0 && m2 >= 0"
      message:
        es: "Las masas no pueden ser negativas."
        en: "Masses cannot be negative."
  coherence_checks: []
  graph_implications:
    es: "Determina la escala de los vectores en representaciones inerciales."
    en: "Determines the scale of vectors in inertial representations."
  pedagogical_triggers:
    es: "Úsala al inicio para simplificar cualquier problema de sistemas."
    en: "Use it at the beginning to simplify any system problem."

- id: vcm_formula
  title:
    es: "Velocidad del centro de masas (2 cuerpos)"
    en: "Center-of-mass velocity (2 bodies)"
  equation: "vcm = (m1*v1 + m2*v2)/M"
  latex: "v_{cm} = \\frac{m_1 v_1 + m_2 v_2}{M}"
  rearrangements:
    - target: vcm
      equation: "vcm = (m1*v1 + m2*v2)/M"
      latex: "v_{cm} = \\frac{m_1 v_1 + m_2 v_2}{M}"
  category: fundamental
  relation_type: average_relation
  physical_meaning:
    es: "Velocidad del observador inercial que define el marco de momento cero."
    en: "Velocity of the inertial observer defining the zero-momentum frame."
  constraints:
    - expr: "M > 0"
      message:
        es: "La masa total debe ser positiva para definir la velocidad del CM."
        en: "Total mass must be positive to define the CM velocity."
  validity:
    es: "Válida para sistemas de dos partículas en mecánica clásica."
    en: "Valid for two-particle systems in classical mechanics."
  dimension_check: "L T^-1"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - collective_motion
    - frame_velocity
  result_semantics:
    target: vcm
    kind: velocity
    sign_meaning:
      es: "Dirección de la traslación global del sistema."
      en: "Direction of the system's global translation."
    absolute_value_meaning:
      es: "Rapidez del punto de inercia media."
      en: "Speed of the average inertia point."
  domain_checks:
    - expr: "M > 0"
      message:
        es: "La masa total debe ser positiva."
        en: "Total mass must be positive."
  coherence_checks:
    - expr: "vcm >= min(v1, v2) && vcm <= max(v1, v2)"
      message:
        es: "La velocidad del CM debe estar entre los valores de las partículas."
        en: "CM velocity must be between the particle values."
  graph_implications:
    es: "Representa el vector de arrastre de todo el marco de referencia."
    en: "Represents the drift vector of the entire reference frame."
  pedagogical_triggers:
    es: "Es el primer paso para realizar un cambio de coordenadas al marco CM."
    en: "It is the first step to perform a coordinate change to the CM frame."

- id: total_momentum_sum
  title:
    es: "Momento lineal total como suma de partículas"
    en: "Total linear momentum as particle sum"
  equation: "ptot = m1*v1 + m2*v2"
  latex: "P_{tot} = m_1 v_1 + m_2 v_2"
  rearrangements:
    - target: ptot
      equation: "ptot = m1*v1 + m2*v2"
      latex: "P_{tot} = m_1 v_1 + m_2 v_2"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Suma vectorial del momento de las partículas medida en el laboratorio."
    en: "Vector sum of the particles' momenta measured in the laboratory."
  constraints: []
  validity:
    es: "Válida para dos partículas clásicas cuando se trabaja sobre un mismo eje o componente vectorial."
    en: "Valid for two classical particles when working along one axis or one vector component."
  dimension_check: "M L T^-1"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - system_momentum
    - particle_sum
  result_semantics:
    target: ptot
    kind: momentum
    sign_meaning:
      es: "El signo indica el sentido del momento lineal neto del sistema."
      en: "The sign indicates the direction of the system's net linear momentum."
    absolute_value_meaning:
      es: "Cantidad total de movimiento traslacional vista desde el laboratorio."
      en: "Total amount of translational motion seen from the laboratory."
  domain_checks:
    - expr: "m1 > 0 && m2 > 0"
      message:
        es: "Las masas de las partículas deben ser positivas."
        en: "Particle masses must be positive."
  coherence_checks:
    - expr: "abs(ptot - M*vcm) < 1e-9"
      message:
        es: "El momento calculado por suma debe coincidir con M por vcm."
        en: "Momentum computed by summation must match M times vcm."
  graph_implications:
    es: "Da el vector de momento de laboratorio que desaparece al pasar al marco CM."
    en: "Gives the laboratory momentum vector that disappears when moving to the CM frame."
  pedagogical_triggers:
    es: "Úsala para comprobar que el cambio de marco no ha perdido momento lineal."
    en: "Use it to check that the frame change has not lost linear momentum."

- id: relative_velocity
  title:
    es: "Velocidad relativa entre dos partículas"
    en: "Relative velocity between two particles"
  equation: "v_rel = v1 - v2"
  latex: "v_{rel} = v_1 - v_2"
  rearrangements:
    - target: v_rel
      equation: "v_rel = v1 - v2"
      latex: "v_{rel} = v_1 - v_2"
  category: fundamental
  relation_type: transformation
  physical_meaning:
    es: "Movimiento de una partícula respecto a la otra, independiente de la traslación común del sistema."
    en: "Motion of one particle relative to the other, independent of the system's common translation."
  constraints: []
  validity:
    es: "Válida en cinemática clásica galileana para velocidades muy inferiores a la de la luz."
    en: "Valid in classical Galilean kinematics for speeds much smaller than the speed of light."
  dimension_check: "L T^-1"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - relative_motion
    - galilean_invariant
  result_semantics:
    target: v_rel
    kind: velocity
    sign_meaning:
      es: "El signo depende del orden elegido para restar las velocidades."
      en: "The sign depends on the chosen order for subtracting velocities."
    absolute_value_meaning:
      es: "Rapidez de acercamiento o separación entre las dos partículas."
      en: "Approach or separation speed between the two particles."
  domain_checks: []
  coherence_checks:
    - expr: "abs(v_rel - (v1 - v2)) < 1e-9"
      message:
        es: "La velocidad relativa debe ser la diferencia galileana entre velocidades."
        en: "Relative velocity must be the Galilean difference between velocities."
  graph_implications:
    es: "Controla la longitud de los vectores internos y la energía disponible en el marco CM."
    en: "Controls the length of internal vectors and the energy available in the CM frame."
  pedagogical_triggers:
    es: "Úsala para separar acercamiento interno de arrastre global."
    en: "Use it to separate internal approach from global drift."

- id: velocity_transformation
  title:
    es: "Transformación de velocidad de Galileo"
    en: "Galilean velocity transformation"
  equation: "u_i = v_i - vcm"
  latex: "u_i = v_i - v_{cm}"
  rearrangements:
    - target: u_i
      equation: "u_i = v_i - vcm"
      latex: "u_i = v_i - v_{cm}"
    - target: v_i
      equation: "v_i = u_i + vcm"
      latex: "v_i = u_i + v_{cm}"
  category: fundamental
  relation_type: transformation
  physical_meaning:
    es: "Velocidad de una partícula medida desde el marco del centro de masas."
    en: "Velocity of a particle as measured from the center-of-mass frame."
  constraints: []
  validity:
    es: "Válida para transformaciones entre marcos de referencia inerciales clásicos."
    en: "Valid for transformations between classical inertial reference frames."
  dimension_check: "L T^-1"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - relative_velocity
    - internal_motion
  result_semantics:
    target: u_i
    kind: velocity
    sign_meaning:
      es: "Movimiento relativo al baricentro (acercamiento o alejamiento)."
      en: "Motion relative to the barycenter (approach or recession)."
    absolute_value_meaning:
      es: "Rapidez medida por un observador en el CM."
      en: "Speed measured by an observer at the CM."
  domain_checks: []
  coherence_checks:
    - expr: "abs(u_i) <= abs(v_i) + abs(vcm)"
      message:
        es: "Consistencia cinemática galileana."
        en: "Galilean kinematic consistency."
  graph_implications:
    es: "Genera los vectores de velocidad que se ven en la pestaña 'Marco CM'."
    en: "Generates the velocity vectors seen in the 'CM Frame' tab."
  pedagogical_triggers:
    es: "Úsala para 'quitar' el movimiento de conjunto y ver solo la interacción."
    en: "Use it to 'remove' collective motion and see only the interaction."

- id: u_balance
  title:
    es: "Condición de Momento Cero"
    en: "Zero Momentum Condition"
  equation: "p_cm_total = 0"
  latex: "\\sum_i m_i u_i = 0"
  rearrangements: []
  category: structural
  relation_type: constitutive_relation
  physical_meaning:
    es: "En el marco CM, el momento lineal total es idénticamente nulo por definición."
    en: "In the CM frame, the total linear momentum is identically zero by definition."
  constraints: []
  validity:
    es: "Define físicamente la naturaleza del marco de reposo del baricentro."
    en: "Physically defines the nature of the barycenter rest frame."
  dimension_check: "M L T^-1"
  calculable: false
  motivo_no_calculable: "Es una condición de equilibrio dinámico, no una fórmula de cálculo de variable."
  used_in:
    - theory
  interpretation_tags:
    - zero_momentum
    - balance_point
  result_semantics:
    target: p_cm_total
    kind: momentum
    sign_meaning:
      es: "El momento neto en el CM es siempre cero."
      en: "Net momentum in the CM is always zero."
    absolute_value_meaning:
      es: "Balance perfecto de la cantidad de movimiento interna."
      en: "Perfect balance of internal momentum."
  domain_checks: []
  coherence_checks: []
  graph_implications:
    es: "Obliga a que los vectores de momento en el marco CM sean opuestos y sumen cero."
    en: "Forces momentum vectors in the CM frame to be opposite and sum to zero."
  pedagogical_triggers:
    es: "Sirve como prueba de que el cambio de marco se ha hecho correctamente."
    en: "Serves as proof that the frame change has been done correctly."

- id: reduced_mass_formula
  title:
    es: "Masa reducida (2 cuerpos)"
    en: "Reduced mass (2 bodies)"
  equation: "mu = (m1 * m2) / M"
  latex: "\\mu = \\frac{m_1 m_2}{M}"
  rearrangements:
    - target: mu
      equation: "mu = (m1 * m2) / M"
      latex: "\\mu = \\frac{m_1 m_2}{M}"
  category: derived
  relation_type: definition
  physical_meaning:
    es: "Masa equivalente que simplifica el problema de dos cuerpos a uno solo en el marco CM."
    en: "Equivalent mass simplifying the two-body problem to a single one in the CM frame."
  constraints:
    - expr: "M > 0"
      message:
        es: "Requiere masa total positiva."
        en: "Requires positive total mass."
  validity:
    es: "Especialmente útil en gravitación y colisiones de dos cuerpos."
    en: "Especially useful in gravitation and two-body collisions."
  dimension_check: "M"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - equivalent_mass
    - two_body_system
  result_semantics:
    target: mu
    kind: mass
    sign_meaning:
      es: "Magnitud siempre positiva."
      en: "Always positive magnitude."
    absolute_value_meaning:
      es: "Inercia efectiva del movimiento relativo."
      en: "Effective inertia of relative motion."
  domain_checks:
    - expr: "m1 > 0 && m2 > 0"
      message:
        es: "Ambas masas deben ser positivas."
        en: "Both masses must be positive."
  coherence_checks:
    - expr: "mu <= m1 && mu <= m2"
      message:
        es: "La masa reducida nunca supera a la menor de las masas individuales."
        en: "Reduced mass never exceeds the smaller of the individual masses."
  graph_implications:
    es: "Escala la respuesta dinámica en el estudio de órbitas y colisiones."
    en: "Scales the dynamic response in the study of orbits and collisions."
  pedagogical_triggers:
    es: "Úsala cuando quieras tratar el sistema como una sola partícula 'virtual'."
    en: "Use it when you want to treat the system as a single 'virtual' particle."

- id: konig_energy
  title:
    es: "Primer Teorema de König"
    en: "Konig's First Theorem"
  equation: "K_lab = K_cm + 0.5 * M * vcm^2"
  latex: "K_{lab} = K_{cm} + \\frac{1}{2} M v_{cm}^2"
  rearrangements:
    - target: K_lab
      equation: "K_lab = K_cm + 0.5 * M * vcm^2"
      latex: "K_{lab} = K_{cm} + \\frac{1}{2} M v_{cm}^2"
    - target: K_cm
      equation: "K_cm = K_lab - 0.5 * M * vcm^2"
      latex: "K_{cm} = K_{lab} - \\frac{1}{2} M v_{cm}^2"
  category: fundamental
  relation_type: energy_relation
  physical_meaning:
    es: "Partición de la energía cinética en una componente traslacional global y una interna."
    en: "Partition of kinetic energy into a global translational and an internal component."
  constraints: []
  validity:
    es: "Universal para cualquier sistema de partículas."
    en: "Universal for any particle system."
  dimension_check: "M L^2 T^-2"
  calculable: true
  motivo_no_calculable: ""
  used_in:
    - theory
    - examples
    - calculator
  interpretation_tags:
    - energy_partition
    - agitation_energy
  result_semantics:
    target: K_lab
    kind: energy
    sign_meaning:
      es: "La energía cinética es siempre no negativa."
      en: "Kinetic energy is always non-negative."
    absolute_value_meaning:
      es: "Escalar que representa la capacidad de realizar trabajo."
      en: "Scalar representing the capacity to perform work."
  domain_checks: []
  coherence_checks:
    - expr: "K_lab >= K_cm"
      message:
        es: "La energía total no puede ser menor que la energía interna."
        en: "Total energy cannot be less than internal energy."
  graph_implications:
    es: "Permite visualizar visualmente el 'ahorro' energético del marco CM."
    en: "Allows visually depicting the energy 'savings' of the CM frame."
  pedagogical_triggers:
    es: "Fundamental para entender por qué los aceleradores de partículas usan haces opuestos."
    en: "Fundamental to understand why particle accelerators use opposing beams."

