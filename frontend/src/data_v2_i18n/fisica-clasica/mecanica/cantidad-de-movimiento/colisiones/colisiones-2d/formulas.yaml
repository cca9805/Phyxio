- id: x_solve_v1fx
  title:
    es: Despeje de velocidad final en X
    en: Solve for final velocity in X
  equation: "v1fx = (m1*v1ix + m2*v2ix - m2*v2fx)/m1"
  latex: 'v_{1fx} = \frac{m_1 v_{1ix} + m_2 v_{2ix} - m_2 v_{2fx}}{m_1}'
  category: derived
  relation_type: solution
  physical_meaning:
    es: Aislamiento algebraico de la componente horizontal.
    en: Algebraic isolation of the horizontal component.
  constraints: Basado en la conservacion del momento en X.
  validity:
    es: Valido siempre que se conserve el momento en el eje.
    en: Valid as long as momentum is conserved on the axis.
  motivo_no_calculable: null
  dimension_check: "[L T^-1]"
  calculable: true
  used_in: ["colisiones-2d"]
