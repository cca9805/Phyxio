    en: Initial kinetic energy of the system
  equation: "Ki = 0.5*m1*v1i*v1i + 0.5*m2*v2i*v2i"
  latex: 'K_i = \frac{1}{2}m_1 v_{1i}^2 + \frac{1}{2}m_2 v_{2i}^2'
  category: derived
  relation_type: definition
  physical_meaning:
    es: Presupuesto energetico antes del impacto.
    en: Energy budget before impact.
  constraints: Suma escalar de las energias individuales.
  validity:
