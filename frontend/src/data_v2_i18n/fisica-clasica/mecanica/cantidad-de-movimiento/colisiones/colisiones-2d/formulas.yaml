version: 1
formulas:
- id: vec
  title:
    es: Conservacion vectorial del momento
    en: Vector momentum conservation
  equation: "m1*v1i + m2*v2i = m1*v1f + m2*v2f"
  latex: 'm_1 \vec{v}_{1i} + m_2 \vec{v}_{2i} = m_1 \vec{v}_{1f} + m_2 \vec{v}_{2f}'
  category: fundamental
  relation_type: conservation_law
  physical_meaning:
    es: El momento lineal total del sistema permanece constante en ausencia de fuerzas externas.
    en: The total linear momentum of the system remains constant in the absence of external forces.
  constraints: Solo valido en sistemas aislados.
  validity:
    es: Valido para cualquier tipo de choque (elastico o inelastico).
    en: Valid for any type of collision (elastic or inelastic).
  motivo_no_calculable: Es una ley de balance, no una formula de calculo directo.
  dimension_check: "[M L T^-1]"
  calculable: false
  used_in: ["colisiones-2d"]
  interpretation_tags: ["momentum", "vector", "conservation"]
  result_semantics:
    target: "v1f"
    meaning: "Velocidad vectorial resultante tras la interaccion."
  rearrangements: []
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: x
  title:
    es: Balance horizontal (X)
    en: Horizontal balance (X)
  equation: "m1*v1ix + m2*v2ix = m1*v1fx + m2*v2fx"
  latex: 'm_1 v_{1ix} + m_2 v_{2ix} = m_1 v_{1fx} + m_2 v_{2fx}'
  category: fundamental
  relation_type: conservation_law
  physical_meaning:
    es: Proyeccion de la conservacion del momento en el eje horizontal.
    en: Projection of momentum conservation on the horizontal axis.
  constraints: Requiere un sistema de referencia cartesiano estable.
  validity:
    es: Valido si no hay impulsos externos en la direccion X.
    en: Valid if there are no external impulses in the X direction.
  motivo_no_calculable: Requiere despeje de una de las variables.
  dimension_check: "[M L T^-1]"
  calculable: false
  used_in: ["colisiones-2d"]
  interpretation_tags: ["axis_x", "projection"]
  result_semantics:
    target: "v1fx"
    meaning: "Componente horizontal de la velocidad final."
  rearrangements: []
