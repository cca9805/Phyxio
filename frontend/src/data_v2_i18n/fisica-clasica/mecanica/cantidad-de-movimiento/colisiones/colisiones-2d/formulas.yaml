- id: K
  title:
    es: Conservacion de la energia (Elastico)
    en: Energy conservation (Elastic)
  equation: "0.5*m1*v1i*v1i + 0.5*m2*v2i*v2i = 0.5*m1*v1f*v1f + 0.5*m2*v2f*v2f"
  latex: '\frac{1}{2}m_1 v_{1i}^2 + \frac{1}{2}m_2 v_{2i}^2 = \frac{1}{2}m_1 v_{1f}^2 + \frac{1}{2}m_2 v_{2f}^2'
  category: fundamental
  relation_type: conservation_law
  physical_meaning:
    es: En choques elasticos, la energia cinetica total no se degrada en calor.
    en: In elastic collisions, total kinetic energy is not degraded into heat.
  constraints: Solo aplica a colisiones perfectamente elasticas.
  validity:
    es: Valido si no hay deformaciones permanentes.
    en: Valid if there are no permanent deformations.
  motivo_no_calculable: Es una condicion de contorno.
  dimension_check: "[M L^2 T^-2]"
  calculable: false
  used_in: ["colisiones-2d"]
  interpretation_tags: ["energy", "elastic"]
  result_semantics:
    target: "Kf"
    meaning: "Energia cinetica total final."
  rearrangements: []
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: energy_loss
  title:
    es: Variacion de energia cinetica
    en: Kinetic energy change
  equation: "DeltaK = Kf - Ki"
  latex: '\Delta K = K_f - K_i'
  category: derived
  relation_type: balance
  physical_meaning:
    es: Cuantifica la energia disipada durante el impacto.
    en: Quantifies the energy dissipated during impact.
  constraints: Siempre menor o igual a cero en sistemas pasivos.
  validity:
    es: Universal para cualquier tipo de choque macroscopico.
    en: Universal for any type of macroscopic collision.
  motivo_no_calculable: null
  dimension_check: "[M L^2 T^-2]"
  calculable: true
  used_in: ["colisiones-2d"]
  interpretation_tags: ["dissipation", "work-energy"]
  result_semantics:
    target: "DeltaK"
    meaning: "Perdida neta de energia."
