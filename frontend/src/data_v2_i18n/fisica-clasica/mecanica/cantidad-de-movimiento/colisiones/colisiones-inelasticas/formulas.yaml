- id: v_perfectly_inelastic
  title: { es: Velocidad final (Choque totalmente inelástico), en: Final velocity (Totally inelastic collision) }
  equation: v1f = (m1*v1i + m2*v2i)/(m1 + m2)
  latex: 'v_{1f} = \frac{m_1 v_{1i} + m_2 v_{2i}}{m_1 + m_2}'
  rearrangements:
  - { target: v1f, equation: v1f = (m1*v1i + m2*v2i)/(m1 + m2), latex: 'v_{1f} = \frac{m_1 v_{1i} + m_2 v_{2i}}{m_1 + m_2}', constraints: ['m1+m2 > 0'] }
  category: fundamental
  relation_type: physical_law
  physical_meaning: { es: Ambos cuerpos se mueven juntos tras el impacto., en: Both bodies move together after impact. }
  constraints: m1 + m2 > 0
  validity: { es: Solo válida si e = 0., en: Only valid if e = 0. }
  dimension_check: { es: m/s, en: m/s }
  calculable: true
  motivo_no_calculable: null
  used_in: [theory, examples, calculator]
  interpretation_tags: [perfectly_inelastic]
  result_semantics: { target: v1f, score: 5 }
