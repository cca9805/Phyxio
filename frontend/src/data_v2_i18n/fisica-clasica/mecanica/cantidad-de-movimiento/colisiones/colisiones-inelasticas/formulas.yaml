version: 1
formulas:
- id: p
  title: { es: Conservación del momento lineal, en: Linear momentum conservation }
  equation: m1*v1i + m2*v2i = m1*v1f + m2*v2f
  latex: 'm_1 v_{1i} + m_2 v_{2i} = m_1 v_{1f} + m_2 v_{2f}'
  rearrangements:
  - { target: v1f, equation: v1f = (m1*v1i + m2*v2i - m2*v2f)/m1, latex: 'v_{1f} = \frac{m_1 v_{1i} + m_2 v_{2i} - m_2 v_{2f}}{m_1}', constraints: ['m1 > 0'] }
  - { target: v2f, equation: v2f = (m1*v1i + m2*v2i - m1*v1f)/m2, latex: 'v_{2f} = \frac{m_1 v_{1i} + m_2 v_{2i} - m_1 v_{1f}}{m_2}', constraints: ['m2 > 0'] }
  category: fundamental
  relation_type: physical_law
  physical_meaning: { es: La cantidad de movimiento total del sistema se mantiene constante durante el choque., en: The total momentum of the system remains constant during the collision. }
  constraints: Solo aplicable a sistemas aislados.
  validity: { es: Válida para cualquier tipo de choque en ausencia de fuerzas externas., en: Valid for any type of collision in the absence of external forces. }
  dimension_check: { es: kg*m/s, en: kg*m/s }
  calculable: true
  motivo_no_calculable: null
  used_in: [theory, examples, calculator]
  interpretation_tags: [momentum_conservation]
  result_semantics: { target: v1f, score: 5 }
  domain_checks:
  - { expr: 'true', message: { es: El balance de momento debe cumplirse siempre., en: Momentum balance must always hold. } }
  coherence_checks:
  - { expr: 'true', severity: ok, message: { es: Coherente., en: Coherent. } }
  graph_implications:
  - { channel: momentum, message: { es: Refleja la conservación., en: Reflects conservation. } }
  pedagogical_triggers:
  - { detect_when: check, message: { es: Revisa el balance., en: Check the balance. } }

- id: e_definition
  title: { es: Coeficiente de restitución, en: Coefficient of restitution }
  equation: e = (v2f - v1f)/(v1i - v2i)
  latex: 'e = \frac{v_{2f} - v_{1f}}{v_{1i} - v_{2i}}'
  rearrangements:
  - { target: e, equation: e = (v2f - v1f)/(v1i - v2i), latex: 'e = \frac{v_{2f} - v_{1f}}{v_{1i} - v_{2i}}', constraints: ['v1i != v2i'] }
  category: fundamental
  relation_type: definition
  physical_meaning: { es: Parámetro que mide el grado de inelasticidad de la colisión., en: Parameter that measures the degree of inelasticity of the collision. }
  constraints: v1i != v2i
  validity: { es: Válida para choques 1D., en: Valid for 1D collisions. }
  dimension_check: { es: "1", en: "1" }
  calculable: true
  motivo_no_calculable: null
  used_in: [theory, examples, calculator]
  interpretation_tags: [restitution]
  result_semantics: { target: e, score: 5 }
  domain_checks:
  - { expr: 'true', message: { es: Dominio válido., en: Valid domain. } }
  coherence_checks:
  - { expr: 'true', severity: ok, message: { es: Coherente., en: Coherent. } }
  graph_implications:
  - { channel: restitution, message: { es: Refleja la elasticidad., en: Reflects elasticity. } }
  pedagogical_triggers:
  - { detect_when: check, message: { es: Revisa e., en: Check e. } }

- id: v1f_inelastic
  title: { es: Velocidad final del cuerpo 1, en: Final velocity of body 1 }
  equation: v1f = (m1*v1i + m2*v2i - m2*e*(v1i - v2i))/(m1 + m2)
  latex: 'v_{1f} = \frac{m_1 v_{1i} + m_2 v_{2i} - m_2 e (v_{1i} - v_{2i})}{m_1 + m_2}'
  rearrangements:
  - { target: v1f, equation: v1f = (m1*v1i + m2*v2i - m2*e*(v1i - v2i))/(m1 + m2), latex: 'v_{1f} = \frac{m_1 v_{1i} + m_2 v_{2i} - m_2 e (v_{1i} - v_{2i})}{m_1 + m_2}', constraints: ['m1+m2 > 0'] }
  category: derived
  relation_type: constitutive_relation
  physical_meaning: { es: Solución para la velocidad final del primer cuerpo., en: Solution for the final velocity of the first body. }
  constraints: m1 + m2 > 0
  validity: { es: Válida para choques inelásticos., en: Valid for inelastic collisions. }
  dimension_check: { es: m/s, en: m/s }
  calculable: true
  motivo_no_calculable: null
  used_in: [theory, examples, calculator]
  interpretation_tags: [final_velocity]
  result_semantics: { target: v1f, score: 5 }
  domain_checks:
  - { expr: 'true', message: { es: Válido., en: Valid. } }
  coherence_checks:
  - { expr: 'true', severity: ok, message: { es: Coherente., en: Coherent. } }
  graph_implications:
  - { channel: velocity, message: { es: Muestra v1f., en: Shows v1f. } }
  pedagogical_triggers:
  - { detect_when: check, message: { es: Revisa v1f., en: Check v1f. } }

