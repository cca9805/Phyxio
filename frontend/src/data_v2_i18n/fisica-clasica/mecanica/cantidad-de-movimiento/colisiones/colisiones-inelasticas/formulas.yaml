- id: ki_system
  title: { es: Energía cinética inicial del sistema, en: Initial kinetic energy of the system }
  equation: Ki = 0.5*m1*v1i^2 + 0.5*m2*v2i^2
  latex: 'K_i = \frac{1}{2} m_1 v_{1i}^2 + \frac{1}{2} m_2 v_{2i}^2'
