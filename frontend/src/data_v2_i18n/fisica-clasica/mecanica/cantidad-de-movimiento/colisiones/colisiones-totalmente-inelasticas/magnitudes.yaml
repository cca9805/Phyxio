version: 1
magnitudes:
- id: m1
  symbol: m_1
  nombre: { es: masa del primer cuerpo, en: mass of the first body }
  descripcion: { es: Masa inercial del primer objeto que participa en el choque., en: Inertial mass of the first object involved in the collision. }
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Ignorar que la masa total tras el choque es la suma m1 + m2.
  typical_range: 0.1 - 1000 kg
  sign_behavior: { has_sign: false, meaning: Escalar positivo. }
  zero_behavior: { allowed: false, meaning: Masa nula no permitida en este modelo. }
  value_nature: { kind: scalar, nonnegative_only: true }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [mass] }
  pedagogical_notes: { es: "Representa el proyectil o cuerpo incidente.", en: "Represents the projectile or incident body." }

- id: m2
  symbol: m_2
  nombre: { es: masa del segundo cuerpo, en: mass of the second body }
  descripcion: { es: Masa inercial del segundo objeto que participa en el choque., en: Inertial mass of the second object involved in the collision. }
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: No sumar m2 a la masa final del conjunto.
  typical_range: 0.1 - 1000 kg
  sign_behavior: { has_sign: false, meaning: Escalar positivo. }
  zero_behavior: { allowed: false, meaning: El blanco debe tener masa para interactuar. }
  value_nature: { kind: scalar, nonnegative_only: true }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [mass] }
  pedagogical_notes: { es: "Representa el blanco o cuerpo impactado.", en: "Represents the target or impacted body." }

- id: v1i
  symbol: v_{1i}
  nombre: { es: velocidad inicial del primer cuerpo, en: initial velocity of the first body }
  descripcion: { es: Velocidad del primer objeto antes del contacto., en: Velocity of the first object before contact. }
  unidad_si: m/s
  dimension: L T^-1
  is_vector: true
  components: [x]
  category: fundamental
  physical_role: state_variable
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Olvidar el signo si los cuerpos se mueven en sentidos opuestos.
  typical_range: -100 - 100 m/s
  sign_behavior: { has_sign: true, meaning: Dirección del movimiento respecto al eje X. }
  zero_behavior: { allowed: true, meaning: Cuerpo inicialmente en reposo. }
  value_nature: { kind: vector_component, nonnegative_only: false }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [velocity] }
  pedagogical_notes: { es: "Velocidad de aproximación.", en: "Approach velocity." }

- id: v2i
  symbol: v_{2i}
  nombre: { es: velocidad inicial del segundo cuerpo, en: initial velocity of the second body }
  descripcion: { es: Velocidad del segundo objeto antes del contacto., en: Velocity of the second object before contact. }
  unidad_si: m/s
  dimension: L T^-1
  is_vector: true
  components: [x]
  category: fundamental
  physical_role: state_variable
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Ignorar que v2i suele ser cero en muchos problemas típicos.
  typical_range: -100 - 100 m/s
  sign_behavior: { has_sign: true, meaning: Dirección del movimiento respecto al eje X. }
  zero_behavior: { allowed: true, meaning: Blanco en reposo (caso más común). }
  value_nature: { kind: vector_component, nonnegative_only: false }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [velocity] }
  pedagogical_notes: { es: "Suele representar el estado del blanco.", en: "Usually represents the state of the target." }

- id: vf
  symbol: v_f
  nombre: { es: velocidad final común, en: common final velocity }
  descripcion: { es: Velocidad del conjunto formado por ambos cuerpos tras quedar pegados., en: Velocity of the assembly formed by both bodies after sticking together. }
  unidad_si: m/s
  dimension: L T^-1
  is_vector: true
  components: [x]
  category: derived
  physical_role: state_variable
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Asumir que la velocidad es cero tras el choque si no se conserva el momento.
  typical_range: -100 - 100 m/s
  sign_behavior: { has_sign: true, meaning: Dirección del movimiento del conjunto unido. }
  zero_behavior: { allowed: true, meaning: Detención total (solo si el momento total era cero). }
  value_nature: { kind: vector_component, nonnegative_only: false }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [velocity] }
  pedagogical_notes: { es: "Velocidad de traslación del sistema tras la disipación máxima.", en: "Translational velocity of the system after maximum dissipation." }

- id: Ki
  symbol: K_i
  nombre: { es: energía cinética inicial, en: initial kinetic energy }
  descripcion: { es: Energía total de movimiento del sistema antes del impacto., en: Total kinetic energy of the system before impact. }
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: No sumar las energías cinéticas de ambos cuerpos.
  typical_range: 0 - 10^6 J
  sign_behavior: { has_sign: false, meaning: Escalar siempre no negativo. }
  zero_behavior: { allowed: true, meaning: Sistema en reposo total. }
  value_nature: { kind: scalar, nonnegative_only: true }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [energy] }
  pedagogical_notes: { es: "Energía total 'disponible' para el sistema.", en: "Total 'available' energy for the system." }

- id: Kf
  symbol: K_f
  nombre: { es: energía cinética final, en: final kinetic energy }
  descripcion: { es: Energía de movimiento que sobrevive tras el impacto., en: Kinetic energy that survives after impact. }
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Creer que se conserva igual que el momento.
  typical_range: 0 - 10^6 J
  sign_behavior: { has_sign: false, meaning: Escalar siempre no negativo. }
  zero_behavior: { allowed: true, meaning: Detención tras el choque. }
  value_nature: { kind: scalar, nonnegative_only: true }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [energy] }
  pedagogical_notes: { es: "Energía mínima necesaria para conservar el momento.", en: "Minimum energy required to conserve momentum." }

- id: DeltaK
  symbol: \Delta K
  nombre: { es: variación de energía cinética, en: variation of kinetic energy }
  descripcion: { es: Cantidad de energía mecánica que se transforma en calor o deformación., en: Amount of mechanical energy transformed into heat or deformation. }
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Olvidar que el signo negativo indica pérdida de energía.
  typical_range: -10^6 - 0 J
  sign_behavior: { has_sign: true, meaning: Negativo indica energía degradada. }
  zero_behavior: { allowed: true, meaning: Solo si las velocidades relativas iniciales eran nulas. }
  value_nature: { kind: scalar, nonnegative_only: false }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [energy] }
  pedagogical_notes: { es: "Representa el trabajo de las fuerzas de deformación plástica.", en: "Represents the work of plastic deformation forces." }

- id: p
  symbol: p
  nombre: { es: momento lineal total, en: total linear momentum }
  descripcion: { es: Cantidad de movimiento total del sistema, magnitud que se conserva., en: Total linear momentum of the system, a conserved quantity. }
  unidad_si: kg*m/s
  dimension: M L T^-1
  is_vector: true
  components: [x]
  category: fundamental
  physical_role: physical_law
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: No considerar que p es vectorial.
  typical_range: -1000 - 1000 kg*m/s
  sign_behavior: { has_sign: true, meaning: Dirección del flujo de masa. }
  zero_behavior: { allowed: true, meaning: Centro de masas en reposo. }
  value_nature: { kind: vector_component, nonnegative_only: false }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [momentum] }
  pedagogical_notes: { es: "Anclaje principal de la resolución.", en: "Primary anchor for the solution." }

- id: loss_fraction
  symbol: \xi
  nombre: { es: fracción de energía disipada, en: dissipated energy fraction }
  descripcion: { es: Razón entre la energía perdida y la energía inicial total., en: Ratio between lost energy and total initial energy. }
  unidad_si: "1"
  dimension: "1"
  is_vector: false
  components: null
  category: derived
  physical_role: physical_property
  used_in: ["colisiones-totalmente-inelasticas"]
  common_mistake: Confundir con el coeficiente de restitución (que aquí es 0).
  typical_range: 0 - 1
  sign_behavior: { has_sign: false, meaning: Escalar positivo. }
  zero_behavior: { allowed: true, meaning: Sin pérdida (caso trivial). }
  value_nature: { kind: scalar, nonnegative_only: true }
  interpretation_role: { primary_for: ["colisiones-totalmente-inelasticas"] }
  graph_binding: { channels: [energy] }
  pedagogical_notes: { es: "Indica qué porcentaje de la energía se 'perdió'.", en: "Indicates what percentage of energy was 'lost'." }
