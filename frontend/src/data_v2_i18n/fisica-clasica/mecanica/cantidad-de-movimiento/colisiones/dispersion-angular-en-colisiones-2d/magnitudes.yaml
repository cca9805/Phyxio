version: 2
magnitudes:

- id: m1
  symbol: m_1
  nombre: { es: masa del cuerpo 1, en: mass of body 1 }
  descripcion: { es: Masa del proyectil o cuerpo incidente., en: Mass of the projectile or incident body. }
  unidad_si: kg
  dimension: M
  category: fundamental
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [mass] }
  common_mistake: { es: Confundir con la masa del blanco m2., en: Confuse with target mass m2. }
  typical_range: 0.1 - 100 kg
  sign_behavior: { has_sign: false, meaning: { es: Escalar siempre positivo., en: Always positive scalar. } }
  zero_behavior: { allowed: false, meaning: { es: El cuerpo debe tener masa., en: Body must have mass. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Identificar claramente cuál es el proyectil incidente., en: Clearly identify the incident projectile. }

- id: m2
  symbol: m_2
  nombre: { es: masa del cuerpo 2, en: mass of body 2 }
  descripcion: { es: Masa del blanco o cuerpo inicialmente en reposo., en: Mass of the target or body initially at rest. }
  unidad_si: kg
  dimension: M
  category: fundamental
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [mass] }
  common_mistake: { es: Olvidar que m2 puede ser distinta a m1., en: Forget that m2 can be different from m1. }
  typical_range: 0.1 - 100 kg
  sign_behavior: { has_sign: false, meaning: { es: Escalar siempre positivo., en: Always positive scalar. } }
  zero_behavior: { allowed: false, meaning: { es: El blanco debe tener masa., en: Target must have mass. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Usualmente se asume en reposo antes del impacto., en: Usually assumed at rest before impact. }

- id: v1i
  symbol: v_{1i}
  nombre: { es: velocidad inicial del cuerpo 1, en: initial velocity of body 1 }
  descripcion: { es: Rapidez del proyectil antes del impacto., en: Speed of the projectile before impact. }
  unidad_si: m/s
  dimension: L T⁻¹
  category: fundamental
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: true
  components: [x]
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [velocity] }
  common_mistake: { es: Confundir rapidez inicial con componente X., en: Confuse initial speed with X component. }
  typical_range: 1 - 500 m/s
  sign_behavior: { has_sign: false, meaning: { es: Módulo de la velocidad., en: Velocity magnitude. } }
  zero_behavior: { allowed: false, meaning: { es: El proyectil debe estar moviéndose., en: Projectile must be moving. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Se define el eje X paralelo a este vector., en: X-axis is defined parallel to this vector. }

- id: v1f
  symbol: v_{1f}
  nombre: { es: velocidad final del cuerpo 1, en: final velocity of body 1 }
  descripcion: { es: Rapidez del primer cuerpo tras la dispersión., en: Speed of the first body after scattering. }
  unidad_si: m/s
  dimension: L T⁻¹
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: true
  components: [x, y]
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [velocity] }
  common_mistake: { es: Asumir que v1f siempre es igual a v1i., en: Assume v1f is always equal to v1i. }
  typical_range: 0 - 500 m/s
  sign_behavior: { has_sign: false, meaning: { es: Rapidez final., en: Final speed. } }
  zero_behavior: { allowed: true, meaning: { es: Detención total tras el impacto., en: Total stop after impact. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Depende fuertemente del ángulo de desviación., en: Strongly depends on deviation angle. }

- id: v2f
  symbol: v_{2f}
  nombre: { es: velocidad final del cuerpo 2, en: final velocity of body 2 }
  descripcion: { es: Rapidez del segundo cuerpo tras la dispersión., en: Speed of the second body after scattering. }
  unidad_si: m/s
  dimension: L T⁻¹
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: true
  components: [x, y]
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [velocity] }
  common_mistake: { es: Ignorar que v2f depende de v1i y v1f., en: Ignore that v2f depends on v1i and v1f. }
  typical_range: 0 - 500 m/s
  sign_behavior: { has_sign: false, meaning: { es: Rapidez de retroceso., en: Recoil speed. } }
  zero_behavior: { allowed: true, meaning: { es: El blanco no se mueve., en: Target does not move. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Calculada mediante el balance vectorial., en: Calculated via vector balance. }

- id: theta1
  symbol: \theta_1
  nombre: { es: ángulo de dispersión 1, en: scattering angle 1 }
  descripcion: { es: Ángulo de desviación del primer cuerpo respecto al eje incidente., en: Deviation angle of the first body relative to the incident axis. }
  unidad_si: rad
  dimension: "1"
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [angle] }
  common_mistake: { es: Medir desde el eje vertical en lugar del horizontal., en: Measure from vertical instead of horizontal axis. }
  typical_range: 0 - 3.14 rad
  sign_behavior: { has_sign: false, meaning: { es: Ángulo de desviación positivo., en: Positive deviation angle. } }
  zero_behavior: { allowed: true, meaning: { es: Choque frontal 1D., en: 1D head-on collision. } }
  value_nature: { kind: scalar, expected_interval: "[0, pi]" }
  pedagogical_notes: { es: Se asume por encima del eje X por convención., en: Assumed above X-axis by convention. }

- id: theta2
  symbol: \theta_2
  nombre: { es: ángulo de dispersión 2, en: scattering angle 2 }
  descripcion: { es: Ángulo de desviación del segundo cuerpo respecto al eje incidente., en: Deviation angle of the second body relative to the incident axis. }
  unidad_si: rad
  dimension: "1"
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [angle] }
  common_mistake: { es: Olvidar que theta2 suele estar en el lado opuesto de theta1., en: Forget that theta2 is usually on the opposite side of theta1. }
  typical_range: 0 - 3.14 rad
  sign_behavior: { has_sign: false, meaning: { es: Ángulo de retroceso positivo., en: Positive recoil angle. } }
  zero_behavior: { allowed: true, meaning: { es: Blanco retrocede en línea recta., en: Target recoils in a straight line. } }
  value_nature: { kind: scalar, expected_interval: "[0, pi]" }
  pedagogical_notes: { es: Define la dirección de compensación del momento vertical., en: Defines vertical momentum compensation direction. }

- id: Ki
  symbol: K_i
  nombre: { es: energía cinética inicial, en: initial kinetic energy }
  descripcion: { es: Energía mecánica inicial del sistema., en: Initial mechanical energy of the system. }
  unidad_si: J
  dimension: M L² T⁻²
  category: fundamental
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [energy] }
  common_mistake: { es: No elevar la velocidad al cuadrado., en: Not squaring the velocity. }
  typical_range: 0.1 - 1000 J
  sign_behavior: { has_sign: false, meaning: { es: Siempre positivo., en: Always positive. } }
  zero_behavior: { allowed: false, meaning: { es: El sistema debe tener energía., en: System must have energy. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Energía disponible para la dispersión., en: Energy available for scattering. }

- id: Kf
  symbol: K_f
  nombre: { es: energía cinética final, en: final kinetic energy }
  descripcion: { es: Energía mecánica total después del impacto., en: Total mechanical energy after impact. }
  unidad_si: J
  dimension: M L² T⁻²
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [energy] }
  common_mistake: { es: Olvidar sumar las energías de ambos cuerpos., en: Forget to sum energies of both bodies. }
  typical_range: 0 - 1000 J
  sign_behavior: { has_sign: false, meaning: { es: Siempre positivo., en: Always positive. } }
  zero_behavior: { allowed: true, meaning: { es: Reposo total post-choque., en: Total post-collision rest. } }
  value_nature: { kind: scalar, nonnegative_only: true }
  pedagogical_notes: { es: Se compara con Ki para ver si es elástico., en: Compared with Ki to check if elastic. }

- id: theta_total
  symbol: \theta_{total}
  nombre: { es: ángulo de apertura total, en: total opening angle }
  descripcion: { es: Suma de los ángulos de dispersión de ambos cuerpos., en: Sum of the scattering angles of both bodies. }
  unidad_si: rad
  dimension: "1"
  category: derived
  physical_role: physical_quantity
  used_in: [dispersion-angular-en-colisiones-2d]
  is_vector: false
  components: null
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [angle] }
  common_mistake: { es: Restar los ángulos en lugar de sumarlos., en: Subtract angles instead of adding them. }
  typical_range: 0 - 3.14 rad
  sign_behavior: { has_sign: false, meaning: { es: Magnitud del abanico de salida., en: Magnitude of the exit fan. } }
  zero_behavior: { allowed: true, meaning: { es: Colisión 1D., en: 1D collision. } }
  value_nature: { kind: scalar, expected_interval: "[0, pi]" }
  pedagogical_notes: { es: En choques elásticos de masas iguales es de 90°., en: In equal mass elastic collisions it's 90°. }

- id: p
  symbol: p
  nombre: { es: momento lineal total, en: total linear momentum }
  descripcion: { es: "Cantidad de movimiento total del sistema, magnitud que se conserva.", en: "Total linear momentum of the system, a conserved quantity." }
  unidad_si: kg*m/s
  dimension: M L T^-1
  is_vector: true
  components: [x, y]
  category: fundamental
  physical_role: physical_law
  used_in: ["dispersion-angular-en-colisiones-2d"]
  common_mistake: { es: No considerar que p es vectorial., en: Not considering that p is vectorial. }
  typical_range: -1000 - 1000 kg*m/s
  sign_behavior: { has_sign: true, meaning: { es: Dirección del flujo de masa., en: Direction of mass flow. } }
  zero_behavior: { allowed: true, meaning: { es: Centro de masas en reposo., en: Center of mass at rest. } }
  value_nature: { kind: vector_component, nonnegative_only: false }
  interpretation_role: { primary_for: ["dispersion-angular-en-colisiones-2d"] }
  graph_binding: { channels: [momentum] }
  pedagogical_notes: { es: "Anclaje principal de la resolución.", en: "Primary anchor for the solution." }
