    constraints: [ { expr: m1 > 0 } ]
  constraints: []
  validity:
    es: Válida para un sistema de dos partículas tras la interacción.
    en: Valid for a two-particle system after interaction.
  dimension_check: { es: M L T^-1, en: M L T^-1 }
  calculable: true
  motivo_no_calculable: null
  used_in: [ theory ]
