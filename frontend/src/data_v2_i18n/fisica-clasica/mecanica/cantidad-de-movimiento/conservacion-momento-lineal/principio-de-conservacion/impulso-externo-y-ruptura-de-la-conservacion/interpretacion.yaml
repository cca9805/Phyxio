nombre:
  es: Interpretacion de Impulso externo y ruptura de la conservacion
  en: Interpretation of External Impulse and Breakdown of Conservation
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cantidad-de-movimiento
  parent_id: principio-de-conservacion
  ruta_relativa: fisica-clasica/mecanica/cantidad-de-movimiento/conservacion-momento-lineal/principio-de-conservacion/impulso-externo-y-ruptura-de-la-conservacion
dependencies:
  formulas:
  - J
  - DeltaP_ext
  - DeltaP
  - P
  - cond
  - pi
  - cons_principle
  - general_1d_balance
  - inelastic_collision
  - recoil_law
  - ruptura_conservacion
  magnitudes:
  - P
  - F_ext
  - J
  - t
  - DeltaP
  - Pfinal
  - Pinitial
  - v1f
  - v1i
  - v2f
  - vf
  - m1
  - m2
  - v2i
  - m
  - v
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  J:
    summary_rules:
    - id: J_summary
      when: 'true'
      status: info
      text:
        es: J resume una lectura fisica relevante del leaf.
        en: J summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: J_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que J sea coherente con unidades y contexto.
        en: Check that J is coherent with units and context.
    physical_reading_rules:
    - id: J_physical
      when: 'true'
      status: info
      text:
        es: Si el impulso externo J aumenta, por tanto la variacion del momento lineal total es mayor, lo que indica que la fuerza externa actua durante mas tiempo o con mayor intensidad. Un impulso negativo significa que la fuerza se opone al movimiento, porque J y el cambio de momento tienen el mismo signo.
        en: If the external impulse J increases, therefore the change in total linear momentum is larger, which indicates that the external force acts for longer or with greater intensity. A negative impulse means the force opposes motion, because J and the momentum change have the same sign.
    model_validity_rules:
    - id: J_validity
      when: 'true'
      status: ok
      text:
        es: J solo es interpretable dentro del modelo elegido.
        en: J is interpretable only inside the chosen model.
    graph_rules:
    - id: J_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de J.
        en: The graph must reflect the role of J visually.
    likely_errors:
    - id: J_warn
      when: 'true'
      status: warning
      text:
        es: No confundas J con otra magnitud cercana del problema.
        en: Do not confuse J with another nearby quantity in the problem.
    next_step_rules:
    - id: J_next
      when: 'true'
      status: info
      text:
        es: Usa J para enlazar con el siguiente paso de interpretacion.
        en: Use J to connect with the next interpretation step.
  F_ext:
    summary_rules:
    - id: F_ext_summary
      when: 'true'
      status: info
      text:
        es: F_ext resume una lectura fisica relevante del leaf.
        en: F_ext summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: F_ext_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que F_ext sea coherente con unidades y contexto.
        en: Check that F_ext is coherent with units and context.
    physical_reading_rules:
    - id: F_ext_physical
      when: 'true'
      status: info
      text:
        es: La lectura de F_ext debe conectarse con el fenomeno fisico descrito.
        en: The reading of F_ext must connect with the described physical phenomenon.
    model_validity_rules:
    - id: F_ext_validity
      when: 'true'
      status: ok
      text:
        es: F_ext solo es interpretable dentro del modelo elegido.
        en: F_ext is interpretable only inside the chosen model.
    graph_rules:
    - id: F_ext_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de F_ext.
        en: The graph must reflect the role of F_ext visually.
    likely_errors:
    - id: F_ext_warn
      when: 'true'
      status: warning
      text:
        es: No confundas F_ext con otra magnitud cercana del problema.
        en: Do not confuse F_ext with another nearby quantity in the problem.
    next_step_rules:
    - id: F_ext_next
      when: 'true'
      status: info
      text:
        es: Usa F_ext para enlazar con el siguiente paso de interpretacion.
        en: Use F_ext to connect with the next interpretation step.
