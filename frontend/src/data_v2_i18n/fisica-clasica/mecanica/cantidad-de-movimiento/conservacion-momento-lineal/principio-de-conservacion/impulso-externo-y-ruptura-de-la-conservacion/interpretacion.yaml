      when: 'true'
      status: info
      text:
        es: Usa P para enlazar con el siguiente paso de interpretacion.
        en: Use P to connect with the next interpretation step.
  DeltaP:
    summary_rules:
    - id: DeltaP_summary
      when: 'true'
      status: info
      text:
        es: DeltaP representa la variacion total del momento lineal del sistema debido al impulso externo.
        en: DeltaP represents the total change in linear momentum of the system due to external impulse.
    coherence_rules:
    - id: DeltaP_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que DeltaP sea coherente con unidades y contexto.
        en: Check that DeltaP is coherent with units and context.
    physical_reading_rules:
    - id: DeltaP_physical
      when: 'true'
      status: info
      text:
        es: DeltaP es positivo si el impulso externo acelera el sistema y negativo si lo frena. Cuantifica exactamente cuanto se ha roto la conservacion.
        en: DeltaP is positive if the external impulse accelerates the system and negative if it decelerates it. It quantifies exactly how much conservation has been broken.
    model_validity_rules:
    - id: DeltaP_validity
      when: 'true'
      status: ok
      text:
        es: DeltaP solo es interpretable dentro del modelo elegido.
        en: DeltaP is interpretable only inside the chosen model.
    graph_rules:
    - id: DeltaP_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de DeltaP.
        en: The graph must reflect the role of DeltaP visually.
    likely_errors:
    - id: DeltaP_warn
      when: 'true'
      status: warning
      text:
        es: No confundas DeltaP con el impulso J. Ambos son iguales numericamente pero DeltaP es el resultado mientras J es la causa.
        en: Do not confuse DeltaP with impulse J. They are numerically equal but DeltaP is the result while J is the cause.
    next_step_rules:
    - id: DeltaP_next
      when: 'true'
      status: info
      text:
        es: Usa DeltaP para conectar con el calculo del estado final del sistema.
        en: Use DeltaP to connect with the calculation of the final state of the system.
  Pfinal:
    summary_rules:
    - id: Pfinal_summary
      when: 'true'
      status: info
      text:
        es: Pfinal es el momento lineal del sistema tras recibir el impulso externo. Es la suma de Pinitial y J.
        en: Pfinal is the linear momentum of the system after receiving the external impulse. It equals Pinitial plus J.
    coherence_rules:
    - id: Pfinal_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que Pfinal sea coherente con unidades y contexto.
        en: Check that Pfinal is coherent with units and context.
    physical_reading_rules:
    - id: Pfinal_physical
      when: 'true'
      status: info
      text:
        es: Pfinal refleja el nuevo estado dinamico del sistema despues de que la fuerza externa haya actuado durante el tiempo t.
        en: Pfinal reflects the new dynamic state of the system after the external force has acted for time t.
    model_validity_rules:
    - id: Pfinal_validity
      when: 'true'
      status: ok
      text:
        es: Pfinal solo es interpretable dentro del modelo elegido.
        en: Pfinal is interpretable only inside the chosen model.
    graph_rules:
    - id: Pfinal_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de Pfinal.
        en: The graph must reflect the role of Pfinal visually.
    likely_errors:
    - id: Pfinal_warn
      when: 'true'
      status: warning
      text:
        es: No confundas Pfinal con Pinitial. Pfinal incorpora el efecto del impulso externo.
        en: Do not confuse Pfinal with Pinitial. Pfinal incorporates the effect of the external impulse.
    next_step_rules:
    - id: Pfinal_next
      when: 'true'
      status: info
      text:
        es: Usa Pfinal para obtener la velocidad final dividiendo por la masa del sistema.
        en: Use Pfinal to obtain the final velocity by dividing by the system mass.
  Pinitial:
    summary_rules:
    - id: Pinitial_summary
      when: 'true'
      status: info
      text:
        es: Pinitial es el momento lineal del sistema antes de que actue el impulso externo.
        en: Pinitial is the linear momentum of the system before the external impulse acts.
    coherence_rules:
    - id: Pinitial_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que Pinitial sea coherente con unidades y contexto.
        en: Check that Pinitial is coherent with units and context.
    physical_reading_rules:
    - id: Pinitial_physical
      when: 'true'
      status: info
      text:
        es: Pinitial es el punto de partida del balance impulso-momento. Si Pinitial es cero el sistema parte del reposo.
        en: Pinitial is the starting point of the impulse-momentum balance. If Pinitial is zero the system starts from rest.
    model_validity_rules:
    - id: Pinitial_validity
      when: 'true'
      status: ok
      text:
        es: Pinitial solo es interpretable dentro del modelo elegido.
        en: Pinitial is interpretable only inside the chosen model.
    graph_rules:
    - id: Pinitial_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de Pinitial.
        en: The graph must reflect the role of Pinitial visually.
    likely_errors:
    - id: Pinitial_warn
      when: 'true'
      status: warning
      text:
        es: No confundas Pinitial con Pfinal. La conservacion se rompe precisamente porque estos dos valores difieren.
        en: Do not confuse Pinitial with Pfinal. Conservation breaks precisely because these two values differ.
    next_step_rules:
    - id: Pinitial_next
      when: 'true'
      status: info
      text:
        es: Usa Pinitial como condicion inicial del balance impulso-momento.
        en: Use Pinitial as the initial condition of the impulse-momentum balance.
  v1f:
    summary_rules:
    - id: v1f_summary
      when: 'true'
      status: info
      text:
        es: v1f es la velocidad final del primer cuerpo tras recibir el impulso externo. Se obtiene dividiendo Pfinal entre m1.
        en: v1f is the final velocity of the first body after receiving the external impulse. It is obtained by dividing Pfinal by m1.
    coherence_rules:
    - id: v1f_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que v1f sea coherente con unidades y contexto.
        en: Check that v1f is coherent with units and context.
    physical_reading_rules:
    - id: v1f_physical
      when: 'true'
      status: info
      text:
        es: v1f es el resultado cinematico del teorema impulso-momento. Un impulso negativo reduce v1f respecto a v1i; uno positivo la aumenta.
        en: v1f is the kinematic result of the impulse-momentum theorem. A negative impulse reduces v1f relative to v1i; a positive one increases it.
    model_validity_rules:
    - id: v1f_validity
      when: 'true'
      status: ok
      text:
        es: v1f solo es interpretable dentro del modelo elegido.
        en: v1f is interpretable only inside the chosen model.
    graph_rules:
    - id: v1f_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de v1f.
        en: The graph must reflect the role of v1f visually.
    likely_errors:
    - id: v1f_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v1f con v1i. v1f es la velocidad tras el impulso; v1i es la velocidad antes.
        en: Do not confuse v1f with v1i. v1f is the velocity after the impulse; v1i is the velocity before.
    next_step_rules:
    - id: v1f_next
      when: 'true'
      status: info
      text:
        es: Usa v1f para verificar el resultado, este debe ser consistente con el signo y magnitud del impulso recibido.
        en: Use v1f to verify the result, it must be consistent with the sign and magnitude of the impulse received.
  v1i:
    summary_rules:
    - id: v1i_summary
      when: 'true'
      status: info
      text:
        es: v1i es la velocidad inicial del primer cuerpo antes de que actue el impulso externo.
        en: v1i is the initial velocity of the first body before the external impulse acts.
    coherence_rules:
    - id: v1i_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que v1i sea coherente con unidades y contexto.
        en: Check that v1i is coherent with units and context.
    physical_reading_rules:
    - id: v1i_physical
      when: 'true'
      status: info
      text:
        es: v1i define el estado cinetico inicial del sistema. Junto con la masa m1, determina Pinitial.
        en: v1i defines the initial kinetic state of the system. Together with mass m1, it determines Pinitial.
    model_validity_rules:
    - id: v1i_validity
      when: 'true'
      status: ok
      text:
        es: v1i solo es interpretable dentro del modelo elegido.
        en: v1i is interpretable only inside the chosen model.
    graph_rules:
    - id: v1i_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de v1i.
        en: The graph must reflect the role of v1i visually.
    likely_errors:
    - id: v1i_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v1i con v1f. La diferencia entre ellas es precisamente la evidencia de la ruptura de la conservacion.
        en: Do not confuse v1i with v1f. The difference between them is precisely the evidence of the breakdown of conservation.
    next_step_rules:
    - id: v1i_next
      when: 'true'
      status: info
      text:
        es: Usa v1i para calcular Pinitial y como punto de partida del balance impulso-momento.
        en: Use v1i to calculate Pinitial and as starting point of the impulse-momentum balance.
  v2f:
    summary_rules:
    - id: v2f_summary
      when: 'true'
      status: info
      text:
        es: v2f es la velocidad final del segundo cuerpo en una colision de dos cuerpos con impulso externo.
        en: v2f is the final velocity of the second body in a two-body collision with external impulse.
    coherence_rules:
    - id: v2f_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que v2f sea coherente con unidades y contexto.
        en: Check that v2f is coherent with units and context.
    physical_reading_rules:
    - id: v2f_physical
      when: 'true'
      status: info
      text:
        es: v2f representa el estado cinetico final del segundo cuerpo. En colisiones con impulso externo, la suma m1*v1f + m2*v2f no es igual a m1*v1i + m2*v2i sino que difiere en J.
        en: v2f represents the final kinetic state of the second body. In collisions with external impulse, the sum m1*v1f + m2*v2f is not equal to m1*v1i + m2*v2i but differs by J.
    model_validity_rules:
    - id: v2f_validity
      when: 'true'
      status: ok
      text:
        es: v2f solo es interpretable dentro del modelo elegido.
        en: v2f is interpretable only inside the chosen model.
    graph_rules:
    - id: v2f_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de v2f.
        en: The graph must reflect the role of v2f visually.
    likely_errors:
    - id: v2f_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v2f con vf (velocidad final de masa combinada). v2f es para colisiones entre dos cuerpos distintos.
        en: Do not confuse v2f with vf (final velocity of combined mass). v2f is for collisions between two separate bodies.
    next_step_rules:
    - id: v2f_next
      when: 'true'
      status: info
      text:
        es: Usa v2f junto con v1f para verificar el balance de momentos del sistema de dos cuerpos.
        en: Use v2f together with v1f to verify the momentum balance of the two-body system.
  vf:
    summary_rules:
    - id: vf_summary
      when: 'true'
      status: info
      text:
        es: vf es la velocidad final de la masa combinada en una colision perfectamente inelastica con impulso externo.
        en: vf is the final velocity of the combined mass in a perfectly inelastic collision with external impulse.
    coherence_rules:
    - id: vf_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que vf sea coherente con unidades y contexto.
        en: Check that vf is coherent with units and context.
    physical_reading_rules:
    - id: vf_physical
      when: 'true'
      status: info
      text:
        es: vf es el estado cinetico final del sistema fusionado. Si existe impulso externo J, entonces (m1+m2)*vf = Pinitial + J.
        en: vf is the final kinetic state of the fused system. If external impulse J exists, then (m1+m2)*vf = Pinitial + J.
    model_validity_rules:
    - id: vf_validity
      when: 'true'
      status: ok
      text:
        es: vf solo es interpretable dentro del modelo elegido.
        en: vf is interpretable only inside the chosen model.
    graph_rules:
    - id: vf_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de vf.
        en: The graph must reflect the role of vf visually.
    likely_errors:
    - id: vf_warn
      when: 'true'
      status: warning
      text:
        es: No confundas vf con v1f. vf es la velocidad de la masa combinada tras la fusion; v1f es la velocidad de un solo cuerpo.
        en: Do not confuse vf with v1f. vf is the velocity of the combined mass after fusion; v1f is the velocity of a single body.
    next_step_rules:
    - id: vf_next
      when: 'true'
      status: info
      text:
        es: Usa vf para conectar con la interpretacion energetica, la energia cinetica tras la fusion es siempre menor que la inicial por la disipacion inelastica.
        en: Use vf to connect with the energetic interpretation, kinetic energy after fusion is always less than initial due to inelastic dissipation.
  m2:
    summary_rules:
    - id: m2_summary
      when: 'true'
      status: info
      text:
        es: m2 es la masa del segundo cuerpo en una interacción de dos partículas.
        en: m2 is the mass of the second body in a two-particle interaction.
    coherence_rules:
    - id: m2_coherence
      when: 'true'
      status: ok
      text:
        es: m2 debe ser positivo. Comprueba que no se confunda con m1.
        en: m2 must be positive. Check it is not confused with m1.
    physical_reading_rules:
    - id: m2_physical
      when: 'true'
      status: info
      text:
        es: El cociente m1/m2 determina la relación entre las velocidades de retroceso en una explosión desde el reposo.
        en: The ratio m1/m2 determines the relationship between recoil velocities in an explosion from rest.
    model_validity_rules:
    - id: m2_validity
      when: 'true'
      status: ok
      text:
        es: m2 es un parámetro del modelo; su valor es fijo durante la interacción.
        en: m2 is a model parameter; its value is fixed during the interaction.
    graph_rules:
    - id: m2_graph
      when: 'true'
      status: info
      text:
        es: m2 no aparece directamente en la gráfica P(t) pero escala los momentos parciales.
        en: m2 does not appear directly in the P(t) graph but scales the partial momenta.
    likely_errors:
    - id: m2_warn
      when: 'true'
      status: warning
      text:
        es: Cuidado con intercambiar m1 y m2. Los roles son asimétricos en la ley de retroceso.
        en: Be careful not to swap m1 and m2. Their roles are asymmetric in the recoil law.
    next_step_rules:
    - id: m2_next
      when: 'true'
      status: info
      text:
        es: Usa m2 junto con v2f para calcular el momento final del segundo cuerpo.
        en: Use m2 together with v2f to calculate the final momentum of the second body.
  v2i:
    summary_rules:
    - id: v2i_summary
      when: 'true'
      status: info
      text:
        es: v2i es la velocidad inicial del segundo cuerpo antes de la interacción.
        en: v2i is the initial velocity of the second body before the interaction.
    coherence_rules:
    - id: v2i_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que v2i tenga el signo correcto según el eje positivo elegido.
        en: Check that v2i has the correct sign according to the chosen positive axis.
    physical_reading_rules:
    - id: v2i_physical
      when: 'true'
      status: info
      text:
        es: En muchos problemas v2i = 0 (blanco en reposo), lo que simplifica el balance de momento lineal a m1*v1i = Pinitial.
        en: In many problems v2i = 0 (target at rest), which simplifies the momentum balance to m1*v1i = Pinitial.
    model_validity_rules:
    - id: v2i_validity
      when: 'true'
      status: ok
      text:
        es: v2i es condición inicial del modelo; debe estar definida antes de aplicar el balance.
        en: v2i is an initial condition of the model; it must be defined before applying the balance.
    graph_rules:
    - id: v2i_graph
      when: 'true'
      status: info
      text:
        es: v2i determina la contribución del segundo cuerpo al Pinitial en la gráfica P(t).
        en: v2i determines the contribution of the second body to Pinitial in the P(t) graph.
    likely_errors:
    - id: v2i_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v2i con v2f. v2i es el estado antes de la interacción; v2f es el estado después.
        en: Do not confuse v2i with v2f. v2i is the state before the interaction; v2f is the state after.
    next_step_rules:
    - id: v2i_next
      when: 'true'
      status: info
      text:
        es: Usa v2i para calcular Pinitial = m1*v1i + m2*v2i antes de aplicar el balance de impulso.
        en: Use v2i to calculate Pinitial = m1*v1i + m2*v2i before applying the impulse balance.
  m:
    summary_rules:
    - id: m_summary
      when: 'true'
      status: info
      text:
        es: m es la masa genérica de la definición fundamental P = m·v.
        en: m is the generic mass in the fundamental definition P = m·v.
    coherence_rules:
    - id: m_coherence
      when: 'true'
      status: ok
      text:
        es: m debe ser siempre positivo y constante en mecánica clásica no relativista.
        en: m must always be positive and constant in non-relativistic classical mechanics.
    physical_reading_rules:
    - id: m_physical
      when: 'true'
      status: info
      text:
        es: En problemas con más de un cuerpo, m se sustituye por m1 o m2 según corresponda al cuerpo de interés.
        en: In problems with more than one body, m is replaced by m1 or m2 depending on the body of interest.
    model_validity_rules:
    - id: m_validity
      when: 'true'
      status: ok
      text:
        es: m es constante durante la interacción en el modelo clásico.
        en: m is constant during the interaction in the classical model.
    graph_rules:
    - id: m_graph
      when: 'true'
      status: info
      text:
        es: m escala la relación entre velocidad y momento en la gráfica P vs v.
        en: m scales the relationship between velocity and momentum in the P vs v graph.
    likely_errors:
    - id: m_warn
      when: 'true'
      status: warning
      text:
        es: En sistemas de varios cuerpos, no uses m genérico. Especifica siempre m1 o m2.
        en: In multi-body systems, do not use generic m. Always specify m1 or m2.
    next_step_rules:
    - id: m_next
      when: 'true'
      status: info
      text:
        es: Usa m para calcular P = m·v como punto de partida antes de aplicar el principio de conservación o el balance de impulso.
        en: Use m to calculate P = m·v as a starting point before applying the conservation principle or impulse balance.
  v:
    summary_rules:
    - id: v_summary
      when: 'true'
      status: info
      text:
        es: v es la velocidad genérica de la definición fundamental P = m·v.
        en: v is the generic velocity in the fundamental definition P = m·v.
    coherence_rules:
    - id: v_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de v debe ser coherente con el eje positivo definido en el problema.
        en: The sign of v must be consistent with the positive axis defined in the problem.
    physical_reading_rules:
    - id: v_physical
      when: 'true'
      status: info
      text:
        es: En problemas concretos, v se sustituye por v1i, v1f, v2i o v2f según el cuerpo y el instante.
        en: In specific problems, v is replaced by v1i, v1f, v2i or v2f depending on the body and instant.
    model_validity_rules:
    - id: v_validity
      when: 'true'
      status: ok
      text:
        es: v es un parámetro cinemático; su valor depende del instante y del cuerpo considerado.
        en: v is a kinematic parameter; its value depends on the instant and body considered.
    graph_rules:
    - id: v_graph
      when: 'true'
      status: info
      text:
        es: En la gráfica P(t), v es la pendiente de la posición respecto al tiempo para masa constante.
        en: In the P(t) graph, v is the slope of position with respect to time for constant mass.
    likely_errors:
    - id: v_warn
      when: 'true'
      status: warning
      text:
        es: No uses v genérico en problemas de dos cuerpos. Especifica siempre si es v1i, v1f, v2i o v2f.
        en: Do not use generic v in two-body problems. Always specify whether it is v1i, v1f, v2i or v2f.
    next_step_rules:
    - id: v_next
      when: 'true'
      status: info
      text:
        es: Usa v para calcular P = m·v y luego identificar si la conservación se cumple o se rompe por el impulso externo J.
        en: Use v to calculate P = m·v and then identify whether conservation holds or is broken by external impulse J.
