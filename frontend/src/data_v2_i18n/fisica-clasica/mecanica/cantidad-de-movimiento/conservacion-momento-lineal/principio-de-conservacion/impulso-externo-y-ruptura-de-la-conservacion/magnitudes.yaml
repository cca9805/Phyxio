- id: DeltaP
  symbol: \Delta P
  nombre:
    es: variación del momento lineal
    en: change in linear momentum
  descripcion:
    es: Diferencia entre el momento lineal final e inicial del sistema.
    en: Difference between the final and initial linear momentum of the system.
  unidad_si: kg*m/s
  dimension: MLT^{-1}
  is_vector: true
  components:
  - DeltaP_x
  - DeltaP_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Confundir DeltaP con el momento total P; DeltaP mide el cambio, no el estado.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica si el sistema ha ganado o perdido cantidad de movimiento.
      en: The sign indicates whether the system has gained or lost momentum.
  zero_behavior:
    allowed: true
    meaning:
      es: DeltaP = 0 implica que el momento se ha conservado.
      en: DeltaP = 0 implies momentum was conserved.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: DeltaP es la huella cuantitativa del impulso externo sobre el sistema.
- id: Pinitial
  symbol: P_i
  nombre:
    es: momento lineal inicial
    en: initial linear momentum
  descripcion:
    es: Momento lineal total del sistema antes de la interacción.
    en: Total linear momentum of the system before the interaction.
  unidad_si: kg*m/s
  dimension: MLT^{-1}
  is_vector: true
  components:
  - Pi_x
  - Pi_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Confundir el momento inicial de una sola partícula con el momento total del sistema.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo sigue la convención de referencia elegida.
      en: The sign follows the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Sistema inicialmente en reposo.
      en: System initially at rest.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Pinitial es el punto de partida del balance de momento.
- id: Pfinal
  symbol: P_f
  nombre:
    es: momento lineal final
    en: final linear momentum
  descripcion:
    es: Momento lineal total del sistema después de la interacción.
    en: Total linear momentum of the system after the interaction.
  unidad_si: kg*m/s
  dimension: MLT^{-1}
  is_vector: true
  components:
  - Pf_x
  - Pf_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: En conservación, Pfinal debe igualarse a Pinitial; no calcularlos por separado.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo sigue la convención de referencia elegida.
      en: The sign follows the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Sistema que queda en reposo después de la interacción.
      en: System that ends at rest after the interaction.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Pfinal es el resultado del balance de momento después del proceso.
- id: m1
  symbol: m_1
  nombre:
    es: masa del cuerpo 1
    en: mass of body 1
  descripcion:
    es: Masa del primer cuerpo o partícula del sistema.
    en: Mass of the first body or particle in the system.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Confundir la masa con el peso; la masa es escalar e invariante.
  typical_range: '> 0'
  sign_behavior:
    has_sign: false
    meaning:
      es: La masa es siempre positiva.
      en: Mass is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una masa nula no tiene sentido físico en mecánica clásica.
      en: Zero mass has no physical meaning in classical mechanics.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '(0, +inf)'
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: m1 es un parámetro fijo que escala la velocidad para dar el momento.
- id: v1i
  symbol: v_{1i}
  nombre:
    es: velocidad inicial del cuerpo 1
    en: initial velocity of body 1
  descripcion:
    es: Velocidad inicial del primer cuerpo antes de la interacción.
    en: Initial velocity of the first body before the interaction.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - v1i_x
  - v1i_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Olvidar el signo de la velocidad inicial en colisiones con cuerpos que se aproximan.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección del movimiento.
      en: The sign indicates the direction of motion.
  zero_behavior:
    allowed: true
    meaning:
      es: Cuerpo 1 inicialmente en reposo.
      en: Body 1 initially at rest.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: v1i es la condición inicial que determina el momento de entrada del cuerpo 1.
- id: v1f
  symbol: v_{1f}
  nombre:
    es: velocidad final del cuerpo 1
    en: final velocity of body 1
  descripcion:
    es: Velocidad del primer cuerpo después de la interacción.
    en: Velocity of the first body after the interaction.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - v1f_x
  - v1f_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Asumir que la velocidad final del cuerpo 1 es igual a la inicial sin verificar.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección del movimiento final.
      en: The sign indicates the direction of final motion.
  zero_behavior:
    allowed: true
    meaning:
      es: Cuerpo 1 queda en reposo tras la interacción.
      en: Body 1 stops after the interaction.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: v1f es la incógnita clave en problemas de colisiones elásticas.
- id: v2f
  symbol: v_{2f}
  nombre:
    es: velocidad final del cuerpo 2
    en: final velocity of body 2
  descripcion:
    es: Velocidad del segundo cuerpo después de la interacción.
    en: Velocity of the second body after the interaction.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - v2f_x
  - v2f_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: En retroceso, olvidar que v2f debe tener signo opuesto a v1f.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección del movimiento final del segundo cuerpo.
      en: The sign indicates the direction of final motion of the second body.
  zero_behavior:
    allowed: true
    meaning:
      es: Cuerpo 2 queda en reposo tras la interacción.
      en: Body 2 stops after the interaction.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: v2f en retroceso debe tener dirección opuesta a v1f.
- id: vf
  symbol: v_f
  nombre:
    es: velocidad final conjunta
    en: joint final velocity
  descripcion:
    es: Velocidad común de los cuerpos acoplados tras una colisión perfectamente inelástica.
    en: Common velocity of coupled bodies after a perfectly inelastic collision.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - vf_x
  - vf_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: No usar la masa total (m1+m2) al calcular la velocidad final conjunta.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo sigue la dirección del momento total antes de la colisión.
      en: The sign follows the direction of total momentum before the collision.
  zero_behavior:
    allowed: true
    meaning:
      es: Ambos cuerpos quedan en reposo si los momentos se cancelan exactamente.
      en: Both bodies stop if momenta cancel exactly.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: vf es resultado del acoplamiento total de masas en colisión inelástica.
- id: m2
  symbol: m_2
  nombre:
    es: masa del segundo cuerpo
    en: mass of second body
  descripcion:
    es: Masa del segundo cuerpo que interviene en la interacción de dos partículas.
    en: Mass of the second body involved in the two-particle interaction.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Intercambiar m1 y m2 al aplicar la ley de retroceso o el balance general.
  typical_range: Depende del contexto físico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: La masa es siempre positiva.
      en: Mass is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una masa nula no tiene sentido físico en este modelo.
      en: Zero mass has no physical meaning in this model.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: m2 aparece en el balance general y en la ley de retroceso como parámetro conocido.
- id: v2i
  symbol: v_{2i}
  nombre:
    es: velocidad inicial del segundo cuerpo
    en: initial velocity of second body
  descripcion:
    es: Velocidad del segundo cuerpo antes de la interacción o colisión.
    en: Velocity of the second body before the interaction or collision.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - v2i_x
  - v2i_y
  category: parameter
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Confundir v2i con v2f. v2i es el estado inicial; v2f es el estado tras la interacción.
  typical_range: Depende del contexto físico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección de movimiento según el eje positivo elegido.
      en: The sign indicates the direction of motion according to the chosen positive axis.
  zero_behavior:
    allowed: true
    meaning:
      es: El segundo cuerpo puede estar inicialmente en reposo.
      en: The second body can be initially at rest.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: En muchos problemas v2i = 0 (blanco en reposo), lo que simplifica el balance de momento.
- id: m
  symbol: m
  nombre:
    es: masa genérica
    en: generic mass
  descripcion:
    es: Masa de un cuerpo genérico usada en la definición fundamental del momento lineal.
    en: Mass of a generic body used in the fundamental definition of linear momentum.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: parameter
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: No especificar a qué cuerpo corresponde m cuando hay más de uno en el sistema.
  typical_range: Depende del contexto físico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: La masa es siempre positiva.
      en: Mass is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una masa nula no tiene sentido físico.
      en: Zero mass has no physical meaning.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: m es el parámetro de la definición P = m·v. En sistemas de varios cuerpos se sustituye por m1 o m2 según corresponda.
- id: v
  symbol: v
  nombre:
    es: velocidad genérica
    en: generic velocity
  descripcion:
    es: Velocidad de un cuerpo genérico usada en la definición fundamental del momento lineal.
    en: Velocity of a generic body used in the fundamental definition of linear momentum.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: true
  components:
  - v_x
  - v_y
  category: parameter
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Usar v genérico sin especificar si es velocidad inicial o final.
  typical_range: Depende del contexto físico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección según el eje elegido.
      en: The sign indicates the direction along the chosen axis.
  zero_behavior:
    allowed: true
    meaning:
      es: El cuerpo puede estar en reposo.
      en: The body can be at rest.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: v es la variable cinemática que multiplica a m en la definición del momento. En problemas concretos se especifica como v1i, v1f, v2i, etc.
