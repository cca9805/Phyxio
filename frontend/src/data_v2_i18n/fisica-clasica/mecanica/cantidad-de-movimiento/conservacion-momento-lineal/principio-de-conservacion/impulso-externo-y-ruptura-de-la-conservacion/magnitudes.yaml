version: 1
magnitudes:
- id: P
  symbol: P
  nombre:
    es: momento lineal total
    en: total linear momentum
  descripcion:
    es: Momento lineal total asociado a este subtema.
    en: Total linear momentum associated with this topic.
  unidad_si: kg*m/s
  dimension: '1'
  is_vector: true
  components:
  - P_x
  - P_y
  category: derived
  physical_role: gravitational_force
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Confundir P con otra magnitud cercana dentro de impulso externo y ruptura de la conservacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar P con una definicion estable antes de sustituir valores.
- id: F_ext
  symbol: F_{ext}
  nombre:
    es: fuerza externa neta
    en: net external force
  descripcion:
    es: Fuerza externa neta que actúa sobre el sistema; su valor no nulo rompe la conservación del momento.
    en: Net external force acting on the system; a non-zero value breaks momentum conservation.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - F_ext_x
  - F_ext_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - impulso-externo-y-ruptura-de-la-conservacion
  common_mistake: Ignorar que F_ext es un vector y sumar módulos en lugar de componentes con signo.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección de la fuerza en el eje de referencia.
      en: The sign indicates the direction of the force along the reference axis.
  zero_behavior:
    allowed: true
    meaning:
      es: F_ext = 0 es la condición necesaria para la conservación del momento.
      en: F_ext = 0 is the necessary condition for momentum conservation.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - impulso-externo-y-ruptura-de-la-conservacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Identificar todas las fuerzas externas antes de decidir si el sistema está aislado.
