  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: impulso_momento_masa_velocidad
  title:
    es: Impulso como cambio de momento y cambio de velocidad
    en: Impulse as momentum change and velocity change
  equation: J = DeltaP = m * (vF - v0)
  latex: J=\Delta p=m(v_f-v_0)
  rearrangements:
  - target: J
    equation: J = m * (vF - v0)
    latex: J=m(v_f-v_0)
    constraints:
    - expr: m > 0
      message:
        es: m debe ser positiva.
        en: m must be positive.
  - target: DeltaP
    equation: DeltaP = m * (vF - v0)
    latex: \Delta p=m(v_f-v_0)
    constraints:
    - expr: m > 0
      message:
        es: m debe ser positiva.
        en: m must be positive.
  - target: vF
    equation: vF = v0 + J / m
    latex: v_f=v_0+\frac{J}{m}
    constraints:
    - expr: m > 0
      message:
        es: m debe ser positiva.
        en: m must be positive.
  category: fundamental
  relation_type: theorem
  physical_meaning:
    es: Para masa constante, el impulso neto coincide con el cambio de momento y con
      la masa por el cambio de velocidad.
    en: For constant mass, net impulse equals momentum change and mass times velocity
      change.
  constraints:
  - expr: m > 0
    message:
      es: m debe ser positiva.
      en: m must be positive.
  validity:
    es: Válida para masa constante y velocidades medidas en el mismo eje del impulso.
    en: Valid for constant mass and velocities measured along the same axis as the
      impulse.
  dimension_check:
    es: '[J] = [DeltaP] = [m(vf - v0)] = M L T^-1'
    en: '[J] = [DeltaP] = [m(vf - v0)] = M L T^-1'
