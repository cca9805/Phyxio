- id: teorema_impulso_momento
  title:
    es: Teorema impulso-momento
    en: Impulse-momentum theorem
  equation: J = p_final - p_inicial
  latex: J=p_f-p_i
  rearrangements:
  - target: J
    equation: J = p_final - p_inicial
    latex: J=p_f-p_i
    constraints: []
  - target: p_final
    equation: p_final = p_inicial + J
    latex: p_f=p_i+J
    constraints: []
  - target: p_inicial
    equation: p_inicial = p_final - J
    latex: p_i=p_f-J
    constraints: []
  category: fundamental
  relation_type: theorem
  physical_meaning:
    es: El impulso neto es igual al cambio de cantidad de movimiento.
    en: Net impulse equals the change in momentum.
  constraints:
  - expr: 'true'
    message:
      es: Aplicar en mecánica clásica con sistema y eje definidos.
      en: Apply in classical mechanics with defined system and axis.
  validity:
    es: Válida para la cantidad de movimiento del sistema considerado.
    en: Valid for the momentum of the chosen system.
  dimension_check:
    es: '[J] = M L T^-1; [p_final - p_inicial] = M L T^-1'
    en: '[J] = M L T^-1; [p_final - p_inicial] = M L T^-1'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - theory
  - examples
  - calculator
  interpretation_tags:
  - impulso
  - momento
  - teorema_impulso_momento
  result_semantics:
    target: J
    meaning: Cambio neto de cantidad de movimiento.
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: cambio_momento
  title:
    es: Cambio de cantidad de movimiento
    en: Momentum change
  equation: DeltaP = p_final - p_inicial
  latex: \Delta p=p_f-p_i
  rearrangements:
  - target: DeltaP
    equation: DeltaP = p_final - p_inicial
    latex: \Delta p=p_f-p_i
    constraints: []
  - target: p_final
    equation: p_final = p_inicial + DeltaP
    latex: p_f=p_i+\Delta p
    constraints: []
  - target: p_inicial
    equation: p_inicial = p_final - DeltaP
    latex: p_i=p_f-\Delta p
    constraints: []
  category: derived
  relation_type: definition
  physical_meaning:
    es: Define el cambio de momento como diferencia entre momento final e inicial.
    en: Defines momentum change as final momentum minus initial momentum.
  constraints:
  - expr: 'true'
    message:
      es: El momento inicial y final deben referirse al mismo sistema y eje.
      en: Initial and final momentum must refer to the same system and axis.
  validity:
    es: General para comparar dos estados del mismo sistema.
    en: General for comparing two states of the same system.
  dimension_check:
    es: '[DeltaP] = [p_final - p_inicial] = M L T^-1'
    en: '[DeltaP] = [p_final - p_inicial] = M L T^-1'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - theory
  - examples
  - calculator
  interpretation_tags:
  - momento
  - cambio_momento
  result_semantics:
    target: DeltaP
    meaning: Variación de la cantidad de movimiento entre dos estados.
