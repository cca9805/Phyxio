version: 1
formulas:
- id: impulso_integral
  title:
    es: Definición general de impulso
    en: General definition of impulse
  equation: J = integral(F(t), t1, t2)
  latex: \vec{J}=\int_{t_1}^{t_2}\vec{F}(t)\,dt
  rearrangements: []
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: El impulso es la acumulación temporal de la fuerza neta durante una interacción.
    en: Impulse is the time accumulation of net force during an interaction.
  constraints:
  - expr: dt > 0
    message:
      es: El intervalo temporal debe ser positivo.
      en: The time interval must be positive.
  validity:
    es: General para fuerzas variables en el tiempo dentro de mecánica clásica.
    en: General for time-varying forces within classical mechanics.
  dimension_check:
    es: '[J] = [F dt] = M L T^-2 · T = M L T^-1'
    en: '[J] = [F dt] = M L T^-2 · T = M L T^-1'
  calculable: false
  motivo_no_calculable: Requiere conocer la función F(t) o el área bajo la curva fuerza-tiempo.
  used_in:
  - theory
  - examples
  interpretation_tags:
  - impulso
  - integral
  - fuerza_variable
  - area_bajo_curva
  result_semantics:
    target: J
    meaning: Impulso total acumulado durante el intervalo de interacción.
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: impulso_area_curva
  title:
    es: Impulso como área bajo la curva fuerza-tiempo
    en: Impulse as area under the force-time curve
  equation: J = area_F_t
  latex: J = \text{Area}(F, t)
  rearrangements: []
  category: derived
  relation_type: graphical_interpretation
  physical_meaning:
    es: El impulso es el área algebraica bajo la gráfica fuerza-tiempo.
    en: Impulse is the signed area under the force-time graph.
  constraints:
  - expr: 'true'
    message:
      es: La gráfica debe representar fuerza neta frente a tiempo en el mismo eje
        de análisis.
      en: The graph must represent net force versus time along the same analysis axis.
  validity:
    es: Válida para interpretar gráficas fuerza-tiempo.
    en: Valid for interpreting force-time graphs.
  dimension_check:
    es: '[área] = [F][t] = M L T^-2 · T = M L T^-1'
    en: '[area] = [F][t] = M L T^-2 · T = M L T^-1'
  calculable: false
  motivo_no_calculable: Requiere datos gráficos o una función F(t).
  used_in:
  - theory
  - examples
  - graphs
  interpretation_tags:
  - impulso
  - grafica
  - area_bajo_curva
  result_semantics:
    target: J
    meaning: Área algebraica que representa el impulso acumulado.
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: impulso_fuerza_media
  title:
    es: Impulso como fuerza media por tiempo
    en: Impulse as average force times time
  equation: J = Fmed * dt
  latex: J=F_{med}\Delta t
  rearrangements:
  - target: J
    equation: J = Fmed * dt
    latex: J=F_{med}\Delta t
    constraints:
    - expr: dt > 0
      message:
        es: dt debe ser positivo.
        en: dt must be positive.
  - target: Fmed
    equation: Fmed = J / dt
    latex: F_{med}=\frac{J}{\Delta t}
    constraints:
    - expr: dt > 0
      message:
        es: dt debe ser positivo para calcular la fuerza media.
        en: dt must be positive to compute average force.
  - target: dt
    equation: dt = J / Fmed
    latex: \Delta t=\frac{J}{F_{med}}
    constraints:
    - expr: Fmed != 0
      message:
        es: Fmed no puede ser cero si se despeja dt.
        en: Fmed cannot be zero when solving for dt.
  category: fundamental
  relation_type: average_relation
  physical_meaning:
    es: Relaciona el impulso con una fuerza media equivalente durante un intervalo
      de tiempo.
    en: Relates impulse to an equivalent average force over a time interval.
  constraints:
  - expr: dt > 0
    message:
      es: dt debe ser positivo.
      en: dt must be positive.
  validity:
    es: Válida cuando se usa fuerza media o fuerza constante.
    en: Valid when average or constant force is used.
  dimension_check:
    es: '[J] = [Fmed dt] = M L T^-2 · T = M L T^-1'
    en: '[J] = [Fmed dt] = M L T^-2 · T = M L T^-1'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - theory
  - examples
  - calculator
  interpretation_tags:
  - impulso
  - fuerza_media
  - tiempo_contacto
  result_semantics:
    target: J
    meaning: Impulso equivalente producido por una fuerza media durante un intervalo.
  domain_checks: []
  coherence_checks: []
  graph_implications: []
  pedagogical_triggers: []
- id: fuerza_media_cambio_momento
  title:
    es: Fuerza media como cambio de momento por tiempo
    en: Average force as momentum change over time
  equation: Fmed = DeltaP / dt
  latex: F_{med}=\frac{\Delta p}{\Delta t}
  rearrangements:
  - target: Fmed
    equation: Fmed = DeltaP / dt
    latex: F_{med}=\frac{\Delta p}{\Delta t}
    constraints:
    - expr: dt > 0
      message:
        es: dt debe ser positivo para calcular la fuerza media.
        en: dt must be positive to compute average force.
  - target: DeltaP
    equation: DeltaP = Fmed * dt
    latex: \Delta p=F_{med}\Delta t
    constraints:
    - expr: dt > 0
      message:
        es: dt debe ser positivo.
        en: dt must be positive.
  - target: dt
    equation: dt = DeltaP / Fmed
    latex: \Delta t=\frac{\Delta p}{F_{med}}
    constraints:
    - expr: Fmed != 0
      message:
        es: Fmed no puede ser cero si se despeja dt.
        en: Fmed cannot be zero when solving for dt.
  category: derived
  relation_type: average_relation
  physical_meaning:
    es: Relaciona la fuerza media neta con el cambio de cantidad de movimiento durante
      el intervalo.
    en: Relates net average force to momentum change over the interval.
  constraints:
  - expr: dt > 0
    message:
      es: dt debe ser positivo.
      en: dt must be positive.
  validity:
    es: Válida cuando el cambio de momento y el intervalo temporal se refieren al
      mismo sistema y eje.
    en: Valid when momentum change and time interval refer to the same system and
      axis.
  dimension_check:
    es: '[Fmed] = [DeltaP/dt] = M L T^-1 / T = M L T^-2'
    en: '[Fmed] = [DeltaP/dt] = M L T^-1 / T = M L T^-2'
  calculable: true
