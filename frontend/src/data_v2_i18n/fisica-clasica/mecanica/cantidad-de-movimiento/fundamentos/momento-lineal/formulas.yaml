version: 1
ui:
  default_formula: momentum_definition
formulas:
  - id: momentum_definition
    title:
      es: Definición de momento lineal
      en: Definition of linear momentum
    equation: p = m * v
    latex: \vec{p} = m \vec{v}
    rearrangements:
      - target: p
        equation: p = m * v
        latex: \vec{p} = m \vec{v}
      - target: m
        equation: m = p / v
        latex: m = \frac{p}{v}
      - target: v
        equation: v = p / m
        latex: \vec{v} = \frac{\vec{p}}{m}
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: El momento lineal cuantifica la cantidad de movimiento de un cuerpo como el producto de su masa por su velocidad.
      en: Linear momentum quantifies a body's quantity of motion as the product of its mass and velocity.
    constraints:
      - expr: m > 0
        message:
          es: La masa debe ser una cantidad positiva.
          en: Mass must be a positive quantity.
    validity:
      es: Válida para partículas puntuales en el régimen de mecánica clásica no relativista.
      en: Valid for point particles within the non-relativistic classical mechanics regime.
    dimension_check:
      es: "[p] = [m][v] = M L T⁻¹"
      en: "[p] = [m][v] = M L T⁻¹"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - inercia_dinamica
      - estado_movimiento
    result_semantics:
      target: p
      meaning: Cantidad de movimiento acumulada por la partícula.
    domain_checks:
      - when: v > 3e7
        status: warning
        text_es: "Atención: La velocidad es cercana a la de la luz; se requieren correcciones relativistas."
        text_en: "Warning: Velocity is close to light speed; relativistic corrections are required."
    coherence_checks:
      - when: p != m * v
        status: error
        text_es: Inconsistencia matemática entre masa, velocidad y momento.
        text_en: Mathematical inconsistency between mass, velocity, and momentum.
    graph_implications:
      - text_es: El vector momento debe aparecer alineado con el vector velocidad.
        text_en: The momentum vector must appear aligned with the velocity vector.
    pedagogical_triggers:
      - when: p < 0
        text_es: "Recuerda: El signo negativo indica sentido opuesto al eje, no una magnitud negativa."
        text_en: "Remember: The negative sign indicates opposite direction to the axis, not a negative magnitude."

  - id: momentum_x
    title:
      es: Componente horizontal del momento
      en: Horizontal momentum component
    equation: px = m * vx
    latex: p_x = m v_x
    rearrangements:
      - target: px
        equation: px = m * vx
        latex: p_x = m v_x
      - target: m
        equation: m = px / vx
        latex: m = \frac{p_x}{v_x}
      - target: vx
        equation: vx = px / m
        latex: v_x = \frac{p_x}{m}
    category: derived
    relation_type: component_form
    physical_meaning:
      es: Proyección del transporte de inercia sobre el eje horizontal.
      en: Projection of inertia transport onto the horizontal axis.
    constraints:
      - expr: m > 0
        message:
          es: La masa debe ser positiva.
          en: Mass must be positive.
    validity:
      es: Válida en sistemas de coordenadas cartesianas.
      en: Valid in Cartesian coordinate systems.
    dimension_check:
      es: "[px] = M L T⁻¹"
      en: "[px] = M L T⁻¹"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - proyeccion_eje
      - balance_x
    result_semantics:
      target: px
      meaning: Componente escalar del momento en el eje X.
    domain_checks: []
    coherence_checks: []
    graph_implications:
      - text_es: Se representa sobre el eje de abscisas.
        text_en: Represented on the abscissa axis.
    pedagogical_triggers: []

  - id: momentum_y
    title:
      es: Componente vertical del momento
      en: Vertical momentum component
    equation: py = m * vy
    latex: p_y = m v_y
    rearrangements:
      - target: py
        equation: py = m * vy
        latex: p_y = m v_y
      - target: m
        equation: m = py / vy
        latex: m = \frac{p_y}{v_y}
      - target: vy
        equation: vy = py / m
        latex: v_y = \frac{p_y}{m}
    category: derived
    relation_type: component_form
    physical_meaning:
      es: Proyección del transporte de inercia sobre el eje vertical.
      en: Projection of inertia transport onto the vertical axis.
    constraints:
      - expr: m > 0
        message:
          es: La masa debe ser positiva.
          en: Mass must be positive.
    validity:
      es: Válida en sistemas de coordenadas cartesianas.
      en: Valid in Cartesian coordinate systems.
    dimension_check:
      es: "[py] = M L T⁻¹"
      en: "[py] = M L T⁻¹"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - proyeccion_eje
      - balance_y
    result_semantics:
      target: py
      meaning: Componente escalar del momento en el eje Y.
    domain_checks: []
    coherence_checks: []
    graph_implications:
      - text_es: Se representa sobre el eje de ordenadas.
        text_en: Represented on the ordinate axis.
    pedagogical_triggers: []

  - id: momentum_magnitude
    title:
      es: Módulo del momento lineal
      en: Magnitude of linear momentum
    equation: p = sqrt(px^2 + py^2)
    latex: p = \sqrt{p_x^2 + p_y^2}
    rearrangements:
      - target: p
        equation: p = sqrt(px^2 + py^2)
        latex: p = \sqrt{p_x^2 + p_y^2}
    category: derived
    relation_type: geometric_interpretation
    physical_meaning:
      es: Valor absoluto de la cantidad de movimiento total sin considerar dirección.
      en: Absolute value of the total quantity of motion without considering direction.
    constraints: []
    validity:
      es: Siempre válida para vectores en dos dimensiones.
      en: Always valid for two-dimensional vectors.
    dimension_check:
      es: "[p] = sqrt((M L T⁻¹)² + (M L T⁻¹)²) = M L T⁻¹"
      en: "[p] = sqrt((M L T⁻¹)² + (M L T⁻¹)²) = M L T⁻¹"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - modulo_vectorial
      - rapidez_dinamica
    result_semantics:
      target: p
      meaning: Magnitud escalar del vector momento total.
    domain_checks: []
    coherence_checks:
      - when: p < 0
        status: error
        text_es: Un módulo vectorial no puede ser negativo.
        text_en: A vector magnitude cannot be negative.
    graph_implications:
      - text_es: Corresponde a la longitud de la flecha del vector p.
        text_en: Corresponds to the length of the momentum vector arrow.
    pedagogical_triggers: []

  - id: momentum_change
    title:
      es: Variación de momento lineal
      en: Momentum change
    equation: DeltaP = Pfinal - Pinicial
    latex: \Delta \vec{p} = \vec{p}_f - \vec{p}_i
    rearrangements:
      - target: DeltaP
        equation: DeltaP = Pfinal - Pinicial
        latex: \Delta \vec{p} = \vec{p}_f - \vec{p}_i
      - target: Pfinal
        equation: Pfinal = Pinicial + DeltaP
        latex: \vec{p}_f = \vec{p}_i + \Delta \vec{p}
      - target: Pinicial
        equation: Pinicial = Pfinal - DeltaP
        latex: \vec{p}_i = \vec{p}_f - \Delta \vec{p}
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: Representa la transferencia neta de movimiento (impulso) recibida por el sistema.
      en: Represents the net motion transfer (impulse) received by the system.
    constraints: []
    validity:
      es: Válida para cualquier interacción que modifique el estado de movimiento.
      en: Valid for any interaction that modifies the motion state.
    dimension_check:
      es: "[Δp] = M L T⁻¹"
      en: "[Δp] = M L T⁻¹"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - balance_dinamico
      - impulso_recibido
    result_semantics:
      target: DeltaP
      meaning: Cambio neto en el estado de movimiento.
    domain_checks: []
    coherence_checks: []
    graph_implications:
      - text_es: Se representa como el vector que une la punta de pi con la punta de pf.
        text_en: Represented as the vector connecting the tip of pi to the tip of pf.
    pedagogical_triggers:
      - when: DeltaP == 0
        text_es: El momento se ha conservado; la fuerza neta externa es nula.
        text_en: Momentum has been conserved; net external force is zero.

  - id: average_force_definition
    title:
      es: Fuerza neta media
      en: Average net force
    equation: Fnet = DeltaP / DeltaT
    latex: \vec{F}_{net} = \frac{\Delta \vec{p}}{\Delta t}
    rearrangements:
      - target: Fnet
        equation: Fnet = DeltaP / DeltaT
        latex: \vec{F}_{net} = \frac{\Delta \vec{p}}{\Delta t}
      - target: DeltaP
        equation: DeltaP = Fnet * DeltaT
        latex: \Delta \vec{p} = \vec{F}_{net} \Delta t
      - target: DeltaT
        equation: DeltaT = DeltaP / Fnet
        latex: \Delta t = \frac{\Delta p}{F_{net}}
    category: fundamental
    relation_type: average_relation
    physical_meaning:
      es: Expresa la fuerza constante que produciría el mismo cambio de momento en un tiempo dado.
      en: Expresses the constant force that would produce the same momentum change in a given time.
    constraints:
      - expr: DeltaT > 0
        message:
          es: El intervalo de tiempo debe ser positivo.
          en: The time interval must be positive.
    validity:
      es: Válida para interacciones impulsivas (choques, impactos) de duración finita.
      en: Valid for impulsive interactions (collisions, impacts) of finite duration.
    dimension_check:
      es: "[F] = M L T⁻¹ / T = M L T⁻²"
      en: "[F] = M L T⁻¹ / T = M L T⁻²"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - causa_dinamica
      - impacto
    result_semantics:
      target: Fnet
      meaning: Esfuerzo medio realizado sobre el sistema.
    domain_checks: []
    coherence_checks:
      - when: Fnet * DeltaT != DeltaP
        status: error
        text_es: Inconsistencia entre fuerza, tiempo e impulso.
        text_en: Inconsistency between force, time, and impulse.
    graph_implications:
      - text_es: Corresponde a la pendiente de la recta secante en el gráfico p vs t.
        text_en: Corresponds to the slope of the secant line in the p vs t graph.
    pedagogical_triggers:
      - when: DeltaT < 0.01
        text_es: Impacto extremadamente breve; espera fuerzas muy elevadas.
        text_en: Extremely brief impact; expect very high forces.

  - id: instantaneous_force
    title:
      es: Segunda Ley de Newton (Instantánea)
      en: Newton's Second Law (Instantaneous)
    equation: F = dp / dt
    latex: \vec{F} = \frac{d\vec{p}}{dt}
    rearrangements: []
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: Define la fuerza como la rapidez de cambio del momento lineal en cada instante.
      en: Defines force as the rate of change of linear momentum at each instant.
    constraints: []
    validity:
      es: Forma general de la dinámica clásica.
      en: General form of classical dynamics.
    dimension_check:
      es: "[F] = M L T⁻²"
      en: "[F] = M L T⁻²"
    calculable: false
    motivo_no_calculable: Requiere cálculo diferencial o funciones p(t).
    used_in:
      - theory
    interpretation_tags:
      - dinamica_instantanea
    result_semantics:
      target: F
      meaning: Fuerza neta aplicada en un instante preciso.
    domain_checks: []
    coherence_checks: []
    graph_implications:
      - text_es: Representa la pendiente de la recta tangente en la gráfica p-t.
        text_en: Represents the slope of the tangent line in the p-t graph.
    pedagogical_triggers: []

  - id: kinetic_energy_momentum
    title:
      es: Energía cinética por momento
      en: Kinetic energy from momentum
    equation: K = p^2 / (2 * m)
    latex: K = \frac{p^2}{2m}
    rearrangements:
      - target: K
        equation: K = p^2 / (2 * m)
        latex: K = \frac{p^2}{2m}
      - target: p
        equation: p = sqrt(2 * m * K)
        latex: p = \sqrt{2mK}
      - target: m
        equation: m = p^2 / (2 * K)
        latex: m = \frac{p^2}{2K}
    category: conceptual
    relation_type: constitutive_relation
    physical_meaning:
      es: Vincula la inercia dinámica (momento) con la capacidad de realizar trabajo (energía).
      en: Links dynamic inertia (momentum) with the capacity to perform work (energy).
    constraints:
      - expr: m > 0
        message:
          es: La masa debe ser positiva.
          en: Mass must be positive.
    validity:
      es: Válida para cuerpos rígidos o partículas sin considerar energía interna.
      en: Valid for rigid bodies or particles without considering internal energy.
    dimension_check:
      es: "[K] = (M L T⁻¹)² / M = M L² T⁻²"
      en: "[K] = (M L T⁻¹)² / M = M L² T⁻²"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - theory
      - examples
      - calculator
    interpretation_tags:
      - balance_energetico
      - relacion_p_k
    result_semantics:
      target: K
      meaning: Energía asociada al movimiento traslacional.
    domain_checks: []
    coherence_checks:
      - when: K < 0
        status: error
        text_es: La energía cinética no puede ser negativa en mecánica clásica.
        text_en: Kinetic energy cannot be negative in classical mechanics.
    graph_implications: []
    pedagogical_triggers:
      - when: "true"
        text_es: "Nota: p es vectorial y K es escalar. p se conserva en choques, K no siempre."
        text_en: "Note: p is vectorial and K is scalar. p is always conserved in collisions, K is not always."
