          en: "Very brief impulsive interaction; expect high forces."
      - id: dt_read_default
        when: "true"
        status: info
        text:
          es: "Tiempo durante el cual la fuerza neta modifica el sistema."
          en: "Time during which net force modifies the system."
    coherence_rules:
      - id: dt_coh_neg
        when: 'result <= 0'
        status: error
        text:
          es: "El intervalo de tiempo debe ser positivo."
          en: "Time interval must be positive."
      - id: dt_coh_default
        when: "true"
        status: ok
        text:
          es: "Duración físicamente consistente."
          en: "Physically consistent duration."
    model_validity_rules:
      - id: dt_val_default
