version: 2
id: interpretacion-balance-de-momento-con-flujo-de-masa
leaf_id: balance-de-momento-con-flujo-de-masa
nombre:
  es: Interpretación del Balance de Masa Variable
  en: Interpretation of Variable Mass Balance
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cantidad-de-movimiento
  parent_id: sistemas-de-masa-variable
  ruta_relativa: fisica-clasica/mecanica/cantidad-de-movimiento/sistemas-de-masa-variable/balance-de-momento-con-flujo-de-masa
dependencies:
  formulas:
  - balance
  - thrust
  - tsiolkovsky
  magnitudes:
  - Fext
  - u
  - mdot
  - m
  - dvdt
  - Ft
  - Delta_v
  - m0
  - mf
  - ve
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Estado Dinámico del Sistema Abierto
      en: Open System Dynamic State
  physical_reading:
    title:
      es: Análisis de Fuerzas y Empuje
      en: Force and Thrust Analysis
  coherence:
    title:
      es: Verificación de Leyes de Newton
      en: Newton's Laws Verification
  model_validity:
    title:
      es: Auditoría de Flujo Continuo
      en: Continuous Flow Audit
  graph_reading:
    title:
      es: Diagnóstico de la Curva de Aceleración
      en: Acceleration Curve Diagnosis
  likely_errors:
    title:
      es: Prevención de Sesgos en Sistemas Abiertos
      en: Open Systems Bias Prevention
  next_step:
    title:
      es: Integración y Trayectoria
      en: Integration and Trajectory
targets:
  dvdt:
    summary_rules:
    - id: dvdt_summary_flow
      when: 'true'
      status: info
      text:
        es: "La aceleración instantánea [[dvdt]] resulta de la competencia entre las fuerzas externas y el empuje generado por el flujo de masa. En estos sistemas, la aceleración suele aumentar en el tiempo si el empuje es constante debido a que la masa total disminuye."
        en: "Instantaneous acceleration [[dvdt]] results from the competition between external forces and thrust generated by mass flow. In these systems, acceleration typically increases over time if thrust is constant because total mass decreases."
    physical_reading_rules:
    - id: dvdt_thrust_dominated
      when: 'abs(u * mdot) > abs(Fext)'
      status: success
      text:
        es: "Movimiento dominado por el flujo: La fuerza reactiva interna es el principal motor del cambio de velocidad, superando a la gravedad o fricción externa."
        en: "Flow-dominated motion: The internal reactive force is the primary driver of velocity change, exceeding gravity or external friction."
    coherence_rules:
    - id: dvdt_newton_recovery
      when: 'mdot == 0'
      status: ok
      text:
        es: "Recuperación de Newton: Al no haber flujo de masa, el sistema se comporta como una partícula puntual de masa constante (F = ma)."
        en: "Newton recovery: With no mass flow, the system behaves as a point particle of constant mass (F = ma)."
    model_validity_rules:
    - id: dvdt_model_limit
      when: 'true'
      status: ok
      text:
        es: "Asume que la masa se añade o expulsa de forma continua y sin efectos rotacionales significativos."
        en: "Assumes mass is added or expelled continuously and without significant rotational effects."
    graph_rules:
    - id: dvdt_graph_slope
      when: 'true'
      status: info
      text:
        es: "En un gráfico v(t), representa la pendiente instantánea; si m disminuye, esta pendiente tiende a curvarse hacia arriba."
        en: "In a v(t) graph, it represents the instantaneous slope; if m decreases, this slope tends to curve upwards."
    likely_errors:
    - id: error_dvdt_const
      when: 'mdot != 0'
      status: warning
      text:
        es: "Error de aceleración constante: No asumas que la aceleración será uniforme. El cambio en la masa total [[m]] hace que el sistema sea intrínsecamente no uniforme."
        en: "Constant acceleration error: Do not assume acceleration will be uniform. The change in total mass [[m]] makes the system inherently non-uniform."
    next_step_rules:
    - id: dvdt_next_integration
      when: 'true'
      status: tip
      text:
        es: "Integra dv/dt para obtener la ecuación de velocidad de Tsiolkovski si las fuerzas externas son nulas."
        en: "Integrate dv/dt to obtain Tsiolkovsky's velocity equation if external forces are zero."

  Ft:
    summary_rules:
    - id: Ft_summary_flow
      when: 'true'
      status: info
      text:
        es: "El empuje [[Ft]] es una fuerza 'aparente' que surge al aplicar la conservación del momento a un sistema donde la frontera cambia de masa."
        en: "Thrust [[Ft]] is an 'apparent' force that arises when applying momentum conservation to a system where the boundary changes mass."
    physical_reading_rules:
    - id: Ft_direction
      when: 'u * mdot > 0'
      status: success
      text:
        es: "Propulsión positiva: El chorro de materia está acelerando el vehículo en la dirección deseada."
        en: "Positive propulsion: The matter jet is accelerating the vehicle in the desired direction."
    coherence_rules:
    - id: Ft_coherence_units
      when: 'true'
      status: ok
      text:
        es: "Magnitud consistente con la tasa de transferencia de momento del flujo (kg/s * m/s = Newton)."
        en: "Magnitude consistent with the flow's momentum transfer rate (kg/s * m/s = Newton)."
    model_validity_rules:
    - id: Ft_model_ideal
      when: 'true'
      status: ok
      text:
        es: "Válida si la velocidad de eyección u se mide respecto al vehículo principal."
        en: "Valid if ejection velocity u is measured relative to the main vehicle."
    graph_rules:
    - id: Ft_graph_vector
      when: 'true'
      status: info
      text:
        es: "Gráficamente, Ft se suma vectorialmente a Fext para dar la fuerza resultante total."
        en: "Graphically, Ft is vectorially added to Fext to give the total resultant force."
    likely_errors:
    - id: error_Ft_signs
      when: 'true'
      status: danger
      text:
        es: "Cuidado con los signos: u y mdot deben definirse con cuidado. Si se expulsa masa (mdot negativo) hacia atrás (u negativo), el empuje es positivo hacia adelante."
        en: "Watch the signs: u and mdot must be defined carefully. If mass is expelled (negative mdot) backwards (negative u), thrust is positive forwards."
    next_step_rules:
    - id: Ft_next_energy
      when: 'true'
      status: tip
      text:
        es: "Calcula la potencia de chorro asociada usando P = 1/2 * mdot * u^2 para evaluar la eficiencia energética."
        en: "Calculate the associated jet power using P = 1/2 * mdot * u^2 to evaluate energy efficiency."

  Fext:
    summary_rules:
    - id: Fext_summary
      when: 'true'
      status: info
      text:
        es: "La fuerza externa neta [[Fext]] es la acción mecánica del entorno sobre el sistema. Cuando [[Fext]] = 0 y hay flujo de masa, el empuje [[Ft]] es la única causa del cambio de velocidad."
        en: "The net external force [[Fext]] is the mechanical action of the surroundings on the system. When [[Fext]] = 0 and there is mass flow, thrust [[Ft]] is the only cause of velocity change."
    physical_reading_rules:
    - id: Fext_reading
      when: 'Fext == 0'
      status: info
      text:
        es: "Sin fuerza externa neta: el único motor del cambio de velocidad es el empuje [[Ft]] por flujo de masa. Este es el caso del cohete en el vacío."
        en: "No net external force: the only driver of velocity change is mass-flow thrust [[Ft]]. This is the rocket-in-vacuum case."
    coherence_rules:
    - id: Fext_coherence
      when: 'true'
      status: ok
      text:
        es: "[[Fext]] y [[Ft]] se miden en las mismas unidades (N) y se suman vectorialmente en el balance."
        en: "[[Fext]] and [[Ft]] are measured in the same units (N) and added vectorially in the balance."
    model_validity_rules:
    - id: Fext_validity
      when: 'true'
      status: ok
      text:
        es: "Incluir solo fuerzas externas al sistema elegido; las interacciones internas (reacciones entre la masa que entra y el cuerpo) ya están capturadas por el término de flujo."
        en: "Include only forces external to the chosen system; internal interactions (between entering mass and the body) are already captured by the flow term."
    graph_rules:
    - id: Fext_graph
      when: 'true'
      status: info
      text:
        es: "En un diagrama de cuerpo libre, [[Fext]] aparece como flecha externa; [[Ft]] = [[u]]·[[mdot]] se suma algebraicamente a ella."
        en: "In a free-body diagram, [[Fext]] appears as an external arrow; [[Ft]] = [[u]]·[[mdot]] is added algebraically to it."
    likely_errors:
    - id: error_Fext_sign
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: olvidar el signo de [[Fext]] o confundirla con la fuerza de empuje [[Ft]]. Son términos distintos en la ecuación de balance."
        en: "Common error: forgetting the sign of [[Fext]] or confusing it with thrust [[Ft]]. They are distinct terms in the balance equation."
    next_step_rules:
    - id: Fext_next
      when: 'true'
      status: tip
      text:
        es: "Si [[Fext]] es la incógnita, despeja usando la forma {{ f:balance }} con [[dvdt]] conocido o igual a cero."
        en: "If [[Fext]] is the unknown, isolate it using {{ f:balance }} with [[dvdt]] known or equal to zero."

  mdot:
    summary_rules:
    - id: mdot_summary
      when: 'true'
      status: info
      text:
        es: "El caudal másico [[mdot]] cuantifica cuánta masa cruza la frontera por segundo. Junto con [[u]] determina la fuerza de empuje [[Ft]] = [[u]]·[[mdot]]."
        en: "The mass-flow rate [[mdot]] quantifies how much mass crosses the boundary per second. Together with [[u]] it determines thrust [[Ft]] = [[u]]·[[mdot]]."
    physical_reading_rules:
    - id: mdot_reading
      when: 'mdot < 0'
      status: info
      text:
        es: "Caudal negativo: el sistema está perdiendo masa (cohete expulsando combustible). El empuje resultante impulsa al sistema en dirección opuesta a [[u]]."
        en: "Negative flow rate: the system is losing mass (rocket expelling fuel). The resulting thrust propels the system in the direction opposite to [[u]]."
    coherence_rules:
    - id: mdot_coherence
      when: 'true'
      status: ok
      text:
        es: "[[mdot]] en kg/s y [[u]] en m/s producen [[Ft]] en N, coherente con el balance."
        en: "[[mdot]] in kg/s and [[u]] in m/s produce [[Ft]] in N, consistent with the balance."
    model_validity_rules:
    - id: mdot_validity
      when: 'true'
      status: ok
      text:
        es: "El modelo asume flujo continuo y uniforme. Si [[mdot]] es discontinuo (pulsos), la ecuación requiere promediado temporal."
        en: "The model assumes continuous, uniform flow. If [[mdot]] is discontinuous (pulses), the equation requires time-averaging."
    graph_rules:
    - id: mdot_graph
      when: 'true'
      status: info
      text:
        es: "Un aumento de [[mdot]] eleva [[Ft]] linealmente si [[u]] es constante."
        en: "An increase in [[mdot]] raises [[Ft]] linearly if [[u]] is constant."
    likely_errors:
    - id: error_mdot_sign
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: tratar [[mdot]] siempre como positivo. Para un cohete [[mdot]] < 0 y el empuje es positivo solo si [[u]] también es negativo (gases expulsados hacia atrás)."
        en: "Common error: treating [[mdot]] as always positive. For a rocket [[mdot]] < 0 and thrust is positive only if [[u]] is also negative (gases ejected backward)."
    next_step_rules:
    - id: mdot_next
      when: 'true'
      status: tip
      text:
        es: "Para despejar [[mdot]] de la ecuación de empuje usa {{ f:thrust }}; para despejarla del balance completo usa {{ f:balance }}."
        en: "To isolate [[mdot]] from the thrust equation use {{ f:thrust }}; to isolate it from the full balance use {{ f:balance }}."

  u:
    summary_rules:
    - id: u_summary
      when: 'true'
      status: info
      text:
        es: "La velocidad relativa [[u]] es la velocidad del flujo medida en el marco de referencia del sistema. Determina la dirección y magnitud de la fuerza de empuje [[Ft]]."
        en: "The relative velocity [[u]] is the flow speed measured in the system's reference frame. It determines the direction and magnitude of thrust [[Ft]]."
    physical_reading_rules:
    - id: u_reading
      when: 'u == 0'
      status: info
      text:
        es: "[[u]] = 0: el flujo no ejerce empuje. El balance se reduce a la segunda ley de Newton clásica para la masa instantánea."
        en: "[[u]] = 0: the flow exerts no thrust. The balance reduces to the classical Newton's second law for the instantaneous mass."
    coherence_rules:
    - id: u_coherence
      when: 'true'
      status: ok
      text:
        es: "[[u]] debe medirse siempre respecto al sistema; [[u]] en el marco del laboratorio es incorrecto."
        en: "[[u]] must always be measured relative to the system; [[u]] in the lab frame is incorrect."
    model_validity_rules:
    - id: u_validity
      when: 'true'
      status: ok
      text:
        es: "El modelo asume [[u]] constante. Si cambia con el tiempo, la integración del balance se complica y la ecuación de Tsiolkovsky deja de ser directamente aplicable."
        en: "The model assumes constant [[u]]. If it changes with time, integrating the balance becomes complex and the Tsiolkovsky equation is no longer directly applicable."
    graph_rules:
    - id: u_graph
      when: 'true'
      status: info
      text:
        es: "El signo de [[u]] determina la dirección del empuje: [[u]] negativo (flujo expulsado hacia atrás) con [[mdot]] negativo produce [[Ft]] positivo."
        en: "The sign of [[u]] determines thrust direction: negative [[u]] (flow ejected backward) with negative [[mdot]] gives positive [[Ft]]."
    likely_errors:
    - id: error_u_frame
      when: 'true'
      status: danger
      text:
        es: "Error crítico: medir [[u]] respecto al laboratorio en lugar de respecto al sistema. Esto da un valor erróneo del empuje [[Ft]]."
        en: "Critical error: measuring [[u]] relative to the lab instead of relative to the system. This gives a wrong value for thrust [[Ft]]."
    next_step_rules:
    - id: u_next
      when: 'true'
      status: tip
      text:
        es: "Para despejar [[u]] de la fuerza de empuje usa {{ f:thrust }}; para despejarla del balance general usa {{ f:balance }}."
        en: "To isolate [[u]] from the thrust equation use {{ f:thrust }}; to isolate it from the general balance use {{ f:balance }}."

  Delta_v:
    summary_rules:
    - id: Delta_v_summary
      when: 'true'
      status: info
      text:
        es: "El [[Delta_v]] es la ganancia total de velocidad del cohete tras consumir combustible de [[m0]] a [[mf]] con velocidad de exhaust [[ve]]. Es la métrica central en misión espacial."
        en: "[[Delta_v]] is the total velocity gain of the rocket after burning fuel from [[m0]] to [[mf]] with exhaust velocity [[ve]]. It is the central metric in space mission design."
    physical_reading_rules:
    - id: Delta_v_reading
      when: 'Delta_v > 0'
      status: success
      text:
        es: "Ganancia de velocidad positiva: el cohete acelera en la dirección elegida como positiva. A mayor razón de masas [[m0]]/[[mf]], mayor [[Delta_v]]."
        en: "Positive velocity gain: the rocket accelerates in the chosen positive direction. The higher the mass ratio [[m0]]/[[mf]], the larger [[Delta_v]]."
    coherence_rules:
    - id: Delta_v_coherence
      when: 'true'
      status: ok
      text:
        es: "[[Delta_v]] en m/s es consistente con [[ve]] en m/s y el argumento adimensional del logaritmo."
        en: "[[Delta_v]] in m/s is consistent with [[ve]] in m/s and the dimensionless argument of the logarithm."
    model_validity_rules:
    - id: Delta_v_validity
      when: 'true'
      status: ok
      text:
        es: "Válido solo cuando [[Fext]] = 0 y [[ve]] es constante. Con gravedad o arrastre, [[Delta_v]] sobreestima la ganancia real."
        en: "Valid only when [[Fext]] = 0 and [[ve]] is constant. With gravity or drag, [[Delta_v]] overestimates the real gain."
    graph_rules:
    - id: Delta_v_graph
      when: 'true'
      status: info
      text:
        es: "[[Delta_v]] crece logarítmicamente con [[m0]]/[[mf]]. Duplicar la razón de masas eleva [[Delta_v]] en ln(2)·[[ve]]."
        en: "[[Delta_v]] grows logarithmically with [[m0]]/[[mf]]. Doubling the mass ratio increases [[Delta_v]] by ln(2)·[[ve]]."
    likely_errors:
    - id: error_Delta_v
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: confundir [[Delta_v]] con la velocidad final absoluta. [[Delta_v]] es solo el cambio relativo al estado inicial."
        en: "Common error: confusing [[Delta_v]] with the final absolute speed. [[Delta_v]] is only the change relative to the initial state."
    next_step_rules:
    - id: Delta_v_next
      when: 'true'
      status: tip
      text:
        es: "Para calcular [[Delta_v]] conociendo [[m0]], [[mf]] y [[ve]], usa directamente {{ f:tsiolkovsky }}."
        en: "To compute [[Delta_v]] given [[m0]], [[mf]], and [[ve]], use {{ f:tsiolkovsky }} directly."

  ve:
    summary_rules:
    - id: ve_summary
      when: 'true'
      status: info
      text:
        es: "La velocidad de exhaust [[ve]] determina cuán eficientemente el cohete convierte masa de combustible en velocidad. Cuanto mayor sea [[ve]], mayor es [[Delta_v]] por kg de combustible."
        en: "Exhaust velocity [[ve]] determines how efficiently the rocket converts fuel mass into speed. The higher [[ve]], the greater [[Delta_v]] per kg of fuel."
    physical_reading_rules:
    - id: ve_reading
      when: 've > 4000'
      status: success
      text:
        es: "Velocidad de exhaust alta (>4000 m/s): motor químico de alto rendimiento. Los propulsores iónicos pueden superar 30 000 m/s."
        en: "High exhaust velocity (>4000 m/s): high-performance chemical engine. Ion thrusters can exceed 30 000 m/s."
    coherence_rules:
    - id: ve_coherence
      when: 'true'
      status: ok
      text:
        es: "[[ve]] es la magnitud positiva de [[u]] en la formulación de Tsiolkovsky. Son el mismo fenómeno expresado con distinta convención de signo."
        en: "[[ve]] is the positive magnitude of [[u]] in the Tsiolkovsky formulation. They represent the same phenomenon with a different sign convention."
    model_validity_rules:
    - id: ve_validity
      when: 'true'
      status: ok
      text:
        es: "[[ve]] constante es la hipótesis de Tsiolkovsky. Si varía con el tiempo, el [[Delta_v]] debe integrarse numéricamente."
        en: "Constant [[ve]] is Tsiolkovsky's hypothesis. If it varies with time, [[Delta_v]] must be integrated numerically."
    graph_rules:
    - id: ve_graph
      when: 'true'
      status: info
      text:
        es: "En una gráfica [[Delta_v]] vs razón de masas, [[ve]] es la pendiente logarítmica: mayor [[ve]] sube toda la curva."
        en: "In a [[Delta_v]] vs mass-ratio graph, [[ve]] is the logarithmic slope: higher [[ve]] shifts the entire curve up."
    likely_errors:
    - id: error_ve
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: confundir [[ve]] (positivo, magnitud) con [[u]] (puede ser negativo según convención). En Tsiolkovsky [[ve]] siempre es positivo."
        en: "Common error: confusing [[ve]] (positive magnitude) with [[u]] (which can be negative by convention). In Tsiolkovsky [[ve]] is always positive."
    next_step_rules:
    - id: ve_next
      when: 'true'
      status: tip
      text:
        es: "Para despejar [[ve]] de la ecuación de Tsiolkovsky usa {{ f:tsiolkovsky }} con [[Delta_v]], [[m0]] y [[mf]] conocidos."
        en: "To isolate [[ve]] from the Tsiolkovsky equation use {{ f:tsiolkovsky }} with [[Delta_v]], [[m0]], and [[mf]] known."

  m0:
    summary_rules:
    - id: m0_summary
      when: 'true'
      status: info
      text:
        es: "La masa inicial [[m0]] incluye la masa estructural más todo el combustible. Su razón con [[mf]] determina [[Delta_v]] mediante {{ f:tsiolkovsky }}."
        en: "Initial mass [[m0]] includes structural mass plus all the fuel. Its ratio with [[mf]] determines [[Delta_v]] through {{ f:tsiolkovsky }}."
    physical_reading_rules:
    - id: m0_reading
      when: 'true'
      status: info
      text:
        es: "Una razón [[m0]]/[[mf]] alta implica mucho combustible respecto a la masa seca; eso da mayor [[Delta_v]] pero también mayor coste de lanzamiento."
        en: "A high [[m0]]/[[mf]] ratio implies much fuel relative to dry mass; that yields higher [[Delta_v]] but also higher launch cost."
    coherence_rules:
    - id: m0_coherence
      when: 'true'
      status: ok
      text:
        es: "Siempre [[m0]] > [[mf]] para un cohete activo. Si [[m0]] = [[mf]], no hay combustible y [[Delta_v]] = 0."
        en: "Always [[m0]] > [[mf]] for an active rocket. If [[m0]] = [[mf]], there is no fuel and [[Delta_v]] = 0."
    model_validity_rules:
    - id: m0_validity
      when: 'true'
      status: ok
      text:
        es: "[[m0]] debe tomarse al inicio de la maniobra analizada, no al inicio de la misión completa."
        en: "[[m0]] must be taken at the start of the analyzed maneuver, not at the start of the full mission."
    graph_rules:
    - id: m0_graph
      when: 'true'
      status: info
      text:
        es: "En la ecuación de Tsiolkovsky, [[m0]] aparece en el numerador del logaritmo; aumentarla eleva [[Delta_v]] si [[mf]] es fijo."
        en: "In the Tsiolkovsky equation, [[m0]] appears in the numerator of the logarithm; increasing it raises [[Delta_v]] if [[mf]] is fixed."
    likely_errors:
    - id: error_m0
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: tomar [[m0]] como solo la masa estructural, olvidando incluir la masa de combustible."
        en: "Common error: taking [[m0]] as only the structural mass, forgetting to include the fuel mass."
    next_step_rules:
    - id: m0_next
      when: 'true'
      status: tip
      text:
        es: "Para despejar [[m0]] de la ecuación de Tsiolkovsky usa {{ f:tsiolkovsky }} con [[Delta_v]], [[mf]] y [[ve]] conocidos."
        en: "To isolate [[m0]] from the Tsiolkovsky equation use {{ f:tsiolkovsky }} with [[Delta_v]], [[mf]], and [[ve]] known."

  mf:
    summary_rules:
    - id: mf_summary
      when: 'true'
      status: info
      text:
        es: "La masa final [[mf]] es la masa del cohete tras la quema de combustible. Con [[m0]] y [[ve]], determina [[Delta_v]] por {{ f:tsiolkovsky }}."
        en: "Final mass [[mf]] is the rocket mass after fuel burn. Together with [[m0]] and [[ve]], it determines [[Delta_v]] via {{ f:tsiolkovsky }}."
    physical_reading_rules:
    - id: mf_reading
      when: 'true'
      status: info
      text:
        es: "Reducir [[mf]] (masa seca) mejora [[Delta_v]] para la misma carga de combustible. Por eso la ingeniería de cohetes busca estructuras ultraligeras."
        en: "Reducing [[mf]] (dry mass) improves [[Delta_v]] for the same fuel load. That is why rocket engineering seeks ultra-light structures."
    coherence_rules:
    - id: mf_coherence
      when: 'true'
      status: ok
      text:
        es: "Siempre [[mf]] < [[m0]] para un cohete activo. [[mf]] = masa estructural + carga útil."
        en: "Always [[mf]] < [[m0]] for an active rocket. [[mf]] = structural mass + payload."
    model_validity_rules:
    - id: mf_validity
      when: 'true'
      status: ok
      text:
        es: "[[mf]] debe medirse al final de la maniobra analizada. Si quedan reservas de combustible, [[mf]] incluye ese combustible no quemado."
        en: "[[mf]] must be measured at the end of the analyzed maneuver. If fuel reserves remain, [[mf]] includes that unburned fuel."
    graph_rules:
    - id: mf_graph
      when: 'true'
      status: info
      text:
        es: "Disminuir [[mf]] aumenta [[Delta_v]] logarítmicamente; los rendimientos decrecientes hacen que cada reducción adicional sea más cara."
        en: "Decreasing [[mf]] increases [[Delta_v]] logarithmically; diminishing returns make each additional reduction more expensive."
    likely_errors:
    - id: error_mf
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: confundir [[mf]] con la masa de combustible. [[mf]] es la masa total restante, no el combustible consumido."
        en: "Common error: confusing [[mf]] with the fuel mass. [[mf]] is the total remaining mass, not the consumed fuel."
    next_step_rules:
    - id: mf_next
      when: 'true'
      status: tip
      text:
        es: "Para despejar [[mf]] de la ecuación de Tsiolkovsky usa {{ f:tsiolkovsky }} con [[Delta_v]], [[m0]] y [[ve]] conocidos."
        en: "To isolate [[mf]] from the Tsiolkovsky equation use {{ f:tsiolkovsky }} with [[Delta_v]], [[m0]], and [[ve]] known."
