  symbol: m
  nombre:
    es: masa
    en: mass
  descripcion:
    es: Masa del sistema o cuerpo considerado.
    en: Mass of the considered body or system.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir m con otra magnitud cercana dentro de balance de momento con flujo de masa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
- id: v
  symbol: v
  nombre:
    es: velocidad
    en: velocity
  descripcion:
    es: Velocidad del sistema de masa variable proyectada sobre el eje de análisis.
    en: Velocity of the variable-mass system projected onto the analysis axis.
  unidad_si: m/s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir v con u; v es la velocidad del sistema respecto a un referencial inercial, u es la velocidad relativa del flujo respecto al sistema.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección respecto al eje positivo elegido.
      en: The sign indicates the direction relative to the chosen positive axis.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar v con una definicion estable antes de sustituir valores.
- id: Fext
  symbol: F_{ext}
  nombre:
    es: fuerza externa neta
    en: net external force
  descripcion:
    es: Suma vectorial de todas las fuerzas externas que actúan sobre el sistema abierto (excluye el empuje por flujo de masa, que ya está capturado en el término u·ṁ).
    en: Vector sum of all external forces acting on the open system (excludes thrust from mass flow, which is already captured in the u·ṁ term).
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Incluir el empuje por flujo de masa dentro de Fext; ese término se contabiliza por separado como u·mdot en la ecuación de balance.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección respecto al eje positivo elegido; puede ser negativo si la fuerza se opone al movimiento.
      en: The sign indicates the direction relative to the chosen positive axis; can be negative if the force opposes motion.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar Fext con una definicion estable antes de sustituir valores.
- id: u
  symbol: u
  nombre:
    es: velocidad relativa del flujo
    en: relative flow velocity
  descripcion:
    es: Velocidad de la masa que cruza la frontera del sistema, medida relativa al sistema. Para un cohete que expulsa gases hacia atrás, u es negativa (si el eje positivo apunta en la dirección de movimiento). Su magnitud coincide con ve de la ecuación de Tsiolkovsky (ve = |u|).
    en: Velocity of the mass crossing the system boundary, measured relative to the system. For a rocket ejecting gases rearward, u is negative (if the positive axis points in the direction of motion). Its magnitude equals the exhaust velocity ve from the Tsiolkovsky equation (ve = |u|).
  unidad_si: m/s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir u (velocidad relativa vectorial del flujo) con ve (magnitud escalar positiva). Para un cohete, u < 0 y ve = |u| > 0.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Negativa si la masa sale en dirección opuesta al eje positivo (caso cohete típico); positiva si la masa entra en la dirección positiva.
      en: Negative if mass exits opposite to the positive axis (typical rocket case); positive if mass enters in the positive direction.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar u con una definicion estable antes de sustituir valores.
- id: mdot
  symbol: \dot m
  nombre:
    es: caudal masico
    en: mass-flow rate
  descripcion:
    es: Tasa de flujo de masa.
    en: Mass-flow rate.
  unidad_si: kg/s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir mdot con otra magnitud cercana dentro de balance de momento con flujo de masa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar mdot con una definicion estable antes de sustituir valores.
- id: dPdt
  symbol: dP/dt
  nombre:
    es: derivada temporal del momento
    en: time derivative of momentum
  descripcion:
    es: Tasa de cambio del momento lineal del sistema; equivale a la suma de fuerzas externas más el transporte de momento por flujo de masa.
    en: Rate of change of the system's linear momentum; equals the sum of external forces plus the momentum transport by mass flow.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir dPdt con m*dvdt; en sistemas de masa variable dPdt ≠ m*dvdt porque dm/dt ≠ 0.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el momento del sistema aumenta; negativo si disminuye.
      en: Positive if the system momentum increases; negative if it decreases.
  zero_behavior:
    allowed: true
    meaning:
      es: En régimen estacionario el momento del sistema no cambia en el instante considerado.
      en: In the steady regime the system momentum does not change at the considered instant.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar dPdt con una definicion estable antes de sustituir valores.
- id: dvdt
  symbol: dv/dt
  nombre:
    es: aceleración del sistema
    en: system acceleration
  descripcion:
    es: Derivada temporal de la velocidad del sistema de masa variable.
    en: Time derivative of the velocity of the variable-mass system.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir dvdt con dPdt; dvdt ≠ dPdt/m cuando la masa varía con el tiempo.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si el sistema acelera en la dirección positiva elegida.
      en: Positive if the system accelerates in the chosen positive direction.
  zero_behavior:
    allowed: true
    meaning:
      es: Velocidad constante (no necesariamente en reposo).
      en: Constant velocity (not necessarily at rest).
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: dvdt es la aceleración instantánea; distinta de dPdt/m cuando m varía.
- id: Ft
  symbol: F_t
  nombre:
    es: fuerza de empuje
    en: thrust force
  descripcion:
    es: Fuerza reactiva debida a la eyección o acumulación de masa.
    en: Reactive force due to mass ejection or accumulation.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir Ft con Fext; el empuje es la fuerza interna por flujo de masa, no la fuerza externa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la dirección del flujo relativo respecto al sistema.
      en: Sign depends on the direction of relative flow with respect to the system.
  zero_behavior:
    allowed: true
    meaning:
      es: Sin flujo de masa, el empuje es nulo.
      en: Without mass flow, thrust is zero.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar Ft con una definicion estable antes de sustituir valores.
- id: ve
  symbol: v_e
  nombre:
    es: velocidad de exhaust efectiva
    en: effective exhaust velocity
  descripcion:
    es: Velocidad de los gases expulsados relativa al cohete, tomada como magnitud positiva en la ecuación de Tsiolkovsky.
    en: Speed of ejected gases relative to the rocket, taken as a positive magnitude in the Tsiolkovsky equation.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir ve (magnitud positiva) con u (velocidad relativa vectorial, negativa para un cohete).
  typical_range: 1000–5000 m/s para propulsión química; hasta 80 000 m/s para propulsión iónica.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva; la dirección está implícita en la formulación de Tsiolkovsky.
      en: Always positive; direction is implicit in the Tsiolkovsky formulation.
  zero_behavior:
    allowed: false
    meaning:
      es: Una velocidad de exhaust nula no tiene sentido físico.
      en: A zero exhaust velocity has no physical meaning.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: 1000–80000 m/s
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Para cohetes químicos típicos, ve ≈ 2500–4500 m/s (Isp ≈ 250–460 s).
- id: m0
  symbol: m_0
  nombre:
    es: masa inicial
    en: initial mass
  descripcion:
    es: Masa total del cohete al inicio de la maniobra (incluye combustible).
    en: Total rocket mass at the start of the maneuver (includes fuel).
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Incluir solo la masa estructural y olvidar la masa de combustible.
  typical_range: Depende del tamaño del cohete.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una masa inicial nula no tiene sentido físico.
      en: A zero initial mass has no physical meaning.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: m0 = masa estructural + masa de combustible. La razón m0/mf es la razón de masas del cohete.
- id: mf
  symbol: m_f
  nombre:
    es: masa final
    en: final mass
  descripcion:
    es: Masa del cohete al finalizar la maniobra (sin el combustible consumido).
    en: Rocket mass at the end of the maneuver (without the consumed fuel).
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir mf con la masa de combustible; mf es la masa total remanente.
  typical_range: Depende del tamaño del cohete.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una masa final nula no tiene sentido físico.
      en: A zero final mass has no physical meaning.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: mf = m0 - masa de combustible quemado. Siempre mf < m0 para un cohete activo.
- id: Delta_v
  symbol: \Delta v
  nombre:
    es: incremento de velocidad (delta-v)
    en: velocity increment (delta-v)
  descripcion:
    es: Ganancia total de velocidad del cohete al consumir combustible desde m0 hasta mf, en ausencia de fuerzas externas.
    en: Total velocity gain of the rocket when consuming fuel from m0 to mf, in the absence of external forces.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - balance-de-momento-con-flujo-de-masa
  common_mistake: Confundir delta-v con la velocidad final; delta-v es el cambio de velocidad relativo al estado inicial.
  typical_range: 100–12 000 m/s para maniobras orbitales.
  sign_behavior:
    has_sign: false
    meaning:
      es: En la ecuación de Tsiolkovsky, Delta_v es la magnitud del cambio de velocidad.
      en: In the Tsiolkovsky equation, Delta_v is the magnitude of the velocity change.
  zero_behavior:
    allowed: true
    meaning:
      es: Sin combustión, no hay cambio de velocidad.
      en: Without combustion, there is no velocity change.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: 0–12000 m/s
  interpretation_role:
    primary_for:
    - balance-de-momento-con-flujo-de-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: El delta-v es la métrica fundamental en ingeniería astronáutica para caracterizar maniobras.
