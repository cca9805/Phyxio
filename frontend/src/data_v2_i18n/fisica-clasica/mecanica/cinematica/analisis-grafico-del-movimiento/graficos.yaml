version: "1.0"
leaf: "analisis-grafico-del-movimiento"

coord:
  title:
    es: Gráfica Coord · Análisis Gráfico del Movimiento
    en: Coord Graph · Graphical Motion Analysis
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x(t) (m) o velocidad v(t) (m/s)
    en: position x(t) (m) or velocity v(t) (m/s)
  xMagnitude: t
  yMagnitude: x o v
  relation:
    es: "El análisis gráfico permite extraer las magnitudes cinemáticas directamente del diagrama sin ecuaciones: la pendiente de x(t) da v y el área bajo v(t) da Δx."
    en: "Graphical analysis allows extracting kinematic quantities directly from the diagram without equations: the slope of x(t) gives v and the area under v(t) gives Δx."
  physicalReading:
    es: Leer la pendiente puntual de la curva como la velocidad instantánea, y la pendiente media entre dos puntos como la velocidad media.
    en: Read the pointwise slope of the curve as instantaneous velocity, and the average slope between two points as average velocity.
  slopeMeaning:
    es: "En x(t): la pendiente en un punto es la velocidad instantánea; en v(t): la pendiente es la aceleración instantánea."
    en: "In x(t): slope at a point is instantaneous velocity; in v(t): slope is instantaneous acceleration."
  interceptMeaning:
    es: El punto donde la curva corta el eje y es la condición inicial del movimiento.
    en: The point where the curve meets the y-axis is the initial condition of the motion.
  curvatureMeaning:
    es: Una curvatura positiva en x(t) indica aceleración positiva; negativa indica deceleración o aceleración negativa.
    en: Positive curvature in x(t) indicates positive acceleration; negative curvature indicates deceleration or negative acceleration.
  signMeaning:
    es: Una pendiente positiva indica movimiento en sentido positivo del eje; una pendiente negativa indica retroceso.
    en: A positive slope indicates motion in the positive axis direction; a negative slope indicates backward motion.
  areaMeaning:
    es: El área bajo la curva v(t) entre dos instantes es el desplazamiento en ese intervalo.
    en: The area under v(t) between two instants is the displacement in that interval.
  domainMeaning:
    es: Válido en el intervalo de tiempo representado en el eje x. Extrapolaciones fuera de ese rango no son fiables.
    en: Valid in the time interval shown on the x-axis. Extrapolations beyond that range are not reliable.
  modelConnection:
    es: "Se interpreta bajo el análisis gráfico clásico de cinemática: derivación geométrica e integración por áreas."
    en: "Interpreted within classical kinematic graphical analysis: geometric differentiation and area integration."
  formulaConnection:
    es: Conecta con v_media = Δx/Δt, v_inst = lim(Δt→0) Δx/Δt, y Δx = ∫v dt.
    en: Connects to v_avg = Δx/Δt, v_inst = lim(Δt→0) Δx/Δt, and Δx = ∫v dt.
  readingFocus:
    es: leer la pendiente en el punto de interés para obtener la velocidad instantánea y estimar el área bajo la curva para obtener el desplazamiento.
    en: read the slope at the point of interest to obtain instantaneous velocity and estimate the area under the curve to obtain displacement.
  agentHints:
    es:
      - Trazar una tangente en el punto de interés permite estimar la velocidad instantánea gráficamente.
      - La pendiente media entre dos puntos es la velocidad media en ese intervalo.
      - El área bajo v(t) se puede estimar contando cuadrículas del papel milimetrado.
    en:
      - Drawing a tangent at the point of interest allows graphical estimation of instantaneous velocity.
      - The average slope between two points is the average velocity over that interval.
      - The area under v(t) can be estimated by counting grid squares on graph paper.
  commonMistakes:
    es:
      - Leer la altura de la curva en lugar de la pendiente para obtener la velocidad.
      - "Confundir el área bajo x(t) con desplazamiento: solo el área bajo v(t) tiene ese significado."
      - Ignorar el signo de la pendiente al determinar el sentido de la velocidad.
    en:
      - Reading the height of the curve instead of its slope to obtain velocity.
      - "Confusing the area under x(t) with displacement: only the area under v(t) carries that meaning."
      - Ignoring the sign of the slope when determining the direction of velocity.
