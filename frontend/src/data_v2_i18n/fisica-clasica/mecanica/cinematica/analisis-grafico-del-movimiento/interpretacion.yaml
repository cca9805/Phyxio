result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  velocidad:
    summary_rules:
    - id: velocidad_summary
      when: 'true'
      status: info
      text:
        es: La velocidad instantanea se obtiene como la pendiente de la tangente al grafico x-t en el instante considerado; su valor indica la rapidez y el sentido del movimiento.
        en: The instantaneous velocity is obtained as the slope of the tangent to the x-t graph at the considered instant; its value indicates the speed and direction of motion.
    coherence_rules:
    - id: velocidad_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de la velocidad debe coincidir con la pendiente (ascendente = positiva, descendente = negativa) y sus unidades deben ser m/s.
        en: The sign of the velocity must match the slope (ascending = positive, descending = negative) and its units must be m/s.
    physical_reading_rules:
    - id: velocidad_physical
      when: 'true'
      status: info
      text:
        es: Una pendiente mayor en x-t indica que el movil avanza mas rapido porque recorre mas distancia en el mismo intervalo de tiempo.
        en: A steeper slope on x-t indicates the object moves faster because it covers more distance in the same time interval.
    model_validity_rules:
    - id: velocidad_validity
      when: 'true'
      status: ok
      text:
        es: La velocidad leida como pendiente solo es valida si el grafico x-t es suficientemente suave; un salto vertical implicaria velocidad infinita, lo cual senala un error en los datos.
        en: The velocity read as a slope is valid only if the x-t graph is sufficiently smooth; a vertical jump would imply infinite velocity, signalling a data error.
    graph_rules:
    - id: velocidad_graph
      when: 'true'
      status: info
      text:
        es: En el grafico x-t, traza la tangente en el punto de interes; su inclinacion respecto al eje t es la velocidad en ese instante.
        en: On the x-t graph, draw the tangent at the point of interest; its inclination relative to the t-axis is the velocity at that instant.
    likely_errors:
    - id: velocidad_warn
      when: 'true'
      status: warning
      text:
        es: No confundas la altura del punto en x-t (que es la posicion) con la pendiente (que es la velocidad). Leer la ordenada como velocidad es un error frecuente.
        en: Do not confuse the height of a point on x-t (which is the position) with the slope (which is the velocity). Reading the ordinate as velocity is a common mistake.
    next_step_rules:
    - id: velocidad_next
      when: 'true'
      status: info
      text:
        es: Con la velocidad obtenida, puedes construir el grafico v-t punto a punto y luego calcular desplazamientos como areas.
        en: With the velocity obtained, you can build the v-t graph point by point and then calculate displacements as areas.
  velocidad_media:
    summary_rules:
    - id: velocidad_media_summary
      when: 'true'
      status: info
      text:
        es: La velocidad media es el cociente entre el desplazamiento total y el intervalo de tiempo; describe el ritmo medio de avance a lo largo del tramo analizado.
        en: The average velocity is the ratio of total displacement to time interval; it describes the mean rate of advance over the analysed segment.
    coherence_rules:
    - id: velocidad_media_coherence
      when: 'true'
      status: ok
      text:
        es: La velocidad media debe estar entre el valor minimo y el maximo de v en el intervalo. Si cae fuera, hay un error aritmetico.
        en: The average velocity must lie between the minimum and maximum values of v in the interval. If it falls outside, there is an arithmetic error.
    physical_reading_rules:
    - id: velocidad_media_physical
      when: 'true'
      status: info
      text:
        es: Una velocidad media cercana al valor de crucero indica que las fases de aceleracion y frenado son breves en comparacion con el tramo a velocidad constante; si es mucho menor, las fases transitorias dominan.
        en: An average velocity close to cruising speed indicates that the acceleration and braking phases are brief compared to the constant-speed segment; if much lower, the transient phases dominate.
    model_validity_rules:
    - id: velocidad_media_validity
      when: 'true'
      status: ok
      text:
        es: El calculo de velocidad media supone que el grafico cubre todo el intervalo de interes sin datos faltantes; si hay huecos temporales, el resultado es una estimacion parcial.
        en: The average-velocity calculation assumes the graph covers the entire interval of interest without missing data; if there are time gaps, the result is a partial estimate.
    graph_rules:
    - id: velocidad_media_graph
      when: 'true'
      status: info
      text:
        es: Graficamente, la velocidad media equivale a la altura de un rectangulo con la misma base temporal y la misma area que la region bajo v-t.
        en: Graphically, the average velocity equals the height of a rectangle with the same time base and the same area as the region under v-t.
    likely_errors:
    - id: velocidad_media_warn
      when: 'true'
      status: warning
      text:
        es: No promedies velocidades de tramos de distinta duracion sin ponderar por tiempo. La media aritmetica de velocidades solo coincide con la velocidad media si todos los tramos duran lo mismo.
        en: Do not average velocities of segments with different durations without weighting by time. The arithmetic mean of velocities equals the average velocity only if all segments last the same time.
    next_step_rules:
    - id: velocidad_media_next
      when: 'true'
      status: info
      text:
        es: Compara la velocidad media con la velocidad instantanea en distintos puntos para identificar donde el movil iba mas rapido o mas lento que el promedio.
        en: Compare the average velocity with the instantaneous velocity at different points to identify where the object was faster or slower than the average.
  desplazamiento:
    summary_rules:
    - id: desplazamiento_summary
      when: 'true'
      status: info
      text:
        es: El desplazamiento se obtiene como el area con signo bajo la curva v-t entre los instantes inicial y final.
        en: The displacement is obtained as the signed area under the v-t curve between the initial and final instants.
    coherence_rules:
    - id: desplazamiento_coherence
      when: 'true'
      status: ok
      text:
        es: El desplazamiento debe tener unidades de metros y su signo debe ser coherente con la direccion predominante de la velocidad en el intervalo.
        en: The displacement must have units of metres and its sign must be consistent with the predominant direction of velocity in the interval.
    physical_reading_rules:
    - id: desplazamiento_physical
      when: 'true'
      status: info
      text:
        es: Un desplazamiento grande indica que el movil mantuvo velocidades altas durante un tiempo prolongado, porque el area bajo v-t crece tanto con la altura (velocidad) como con la base (duracion).
        en: A large displacement indicates the object maintained high velocities for a long time, because the area under v-t grows with both height (velocity) and base (duration).
    model_validity_rules:
    - id: desplazamiento_validity
      when: 'true'
      status: ok
      text:
        es: El calculo del area como suma de trapecios es exacto cuando los tramos son lineales; si la curva v-t es curva, el resultado es una aproximacion que mejora al subdividir en mas tramos.
        en: The area calculation as a sum of trapezoids is exact when the segments are linear; if the v-t curve is curved, the result is an approximation that improves with finer subdivision.
    graph_rules:
    - id: desplazamiento_graph
      when: 'true'
      status: info
      text:
        es: Colorea el area entre la curva v-t y el eje t; las regiones sobre el eje son desplazamiento positivo y las regiones bajo el eje son desplazamiento negativo.
        en: Shade the area between the v-t curve and the t-axis; regions above the axis are positive displacement and regions below are negative displacement.
    likely_errors:
    - id: desplazamiento_warn
      when: 'true'
      status: warning
      text:
        es: No confundas desplazamiento (area neta con signo) con distancia total recorrida (suma de valores absolutos). Si v-t cruza el eje, ambas cantidades difieren.
        en: Do not confuse displacement (net signed area) with total distance travelled (sum of absolute values). If v-t crosses the axis, the two quantities differ.
    next_step_rules:
    - id: desplazamiento_next
      when: 'true'
      status: info
      text:
        es: Con el desplazamiento y el intervalo de tiempo, calcula la velocidad media para obtener una vision global del movimiento.
        en: With the displacement and time interval, calculate the average velocity to obtain a global view of the motion.
  intervalo_tiempo:
    summary_rules:
    - id: intervalo_tiempo_summary
      when: 'true'
      status: info
      text:
        es: El intervalo de tiempo es la base horizontal del tramo analizado en cualquier grafico cinematico.
        en: The time interval is the horizontal base of the analysed segment on any kinematic graph.
    coherence_rules:
    - id: intervalo_tiempo_coherence
      when: 'true'
      status: ok
      text:
        es: Los intervalos de cada fase deben sumar el intervalo total; si no coinciden, se ha omitido o duplicado un tramo.
        en: The intervals of each phase must add up to the total interval; if they do not match, a segment has been omitted or duplicated.
    physical_reading_rules:
    - id: intervalo_tiempo_physical
      when: 'true'
      status: info
      text:
        es: Un intervalo de tiempo mas largo en una fase de velocidad constante produce un desplazamiento proporcionalmente mayor, porque el area del rectangulo crece linealmente con la base.
        en: A longer time interval in a constant-velocity phase produces a proportionally larger displacement, because the area of the rectangle grows linearly with the base.
    model_validity_rules:
    - id: intervalo_tiempo_validity
      when: 'true'
      status: ok
      text:
        es: El modelo supone que las transiciones entre fases son instantaneas; si el cambio real es gradual, parte del intervalo de transicion queda mal asignado al tramo contiguo.
        en: The model assumes that transitions between phases are instantaneous; if the actual change is gradual, part of the transition interval is misassigned to the adjacent segment.
    graph_rules:
    - id: intervalo_tiempo_graph
      when: 'true'
      status: info
      text:
        es: En el grafico, el intervalo de tiempo se lee directamente del eje horizontal como la distancia entre los extremos del tramo.
        en: On the graph, the time interval is read directly from the horizontal axis as the distance between the segment endpoints.
    likely_errors:
    - id: intervalo_tiempo_warn
      when: 'true'
      status: warning
      text:
        es: No confundas el instante de tiempo (lectura absoluta del eje) con el intervalo de tiempo (diferencia entre dos instantes).
        en: Do not confuse the time instant (absolute axis reading) with the time interval (difference between two instants).
    next_step_rules:
    - id: intervalo_tiempo_next
      when: 'true'
      status: info
      text:
        es: Verifica que la suma de todos los intervalos parciales coincida con el intervalo total del grafico como control de consistencia.
        en: Verify that the sum of all partial intervals matches the total graph interval as a consistency check.
  aceleracion:
    summary_rules:
    - id: aceleracion_summary
      when: 'true'
      status: info
      text:
        es: La aceleracion instantanea se obtiene como la pendiente de la tangente al grafico v-t en el instante considerado.
        en: The instantaneous acceleration is obtained as the slope of the tangent to the v-t graph at the considered instant.
    coherence_rules:
    - id: aceleracion_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de la aceleracion debe coincidir con la subida o bajada de la curva v-t, y sus unidades deben ser m/s^2.
        en: The sign of the acceleration must match the rise or fall of the v-t curve, and its units must be m/s^2.
    physical_reading_rules:
    - id: aceleracion_physical
      when: 'true'
      status: info
      text:
        es: Una aceleracion positiva indica que la velocidad crece porque la fuerza neta actua en la direccion del movimiento; una aceleracion negativa indica que la velocidad disminuye porque la fuerza neta se opone al movimiento.
        en: A positive acceleration indicates that velocity increases because the net force acts in the direction of motion; a negative acceleration indicates that velocity decreases because the net force opposes the motion.
    model_validity_rules:
    - id: aceleracion_validity
      when: 'true'
      status: ok
      text:
        es: La lectura de aceleracion como pendiente constante es valida solo si el tramo v-t es recto; si la curva tiene curvatura, la aceleracion varia y la pendiente media no coincide con la instantanea.
        en: Reading acceleration as a constant slope is valid only if the v-t segment is straight; if the curve is curved, the acceleration varies and the average slope does not match the instantaneous one.
    graph_rules:
    - id: aceleracion_graph
      when: 'true'
      status: info
      text:
        es: En el grafico v-t, la pendiente del segmento recto es la aceleracion; si la curva no es recta, traza la tangente en el punto de interes.
        en: On the v-t graph, the slope of the straight segment is the acceleration; if the curve is not straight, draw the tangent at the point of interest.
    likely_errors:
    - id: aceleracion_warn
      when: 'true'
      status: warning
      text:
        es: No confundas una pendiente pronunciada en x-t (que indica velocidad alta) con aceleracion. La aceleracion se lee de la pendiente de v-t, no de x-t.
        en: Do not confuse a steep slope on x-t (which indicates high velocity) with acceleration. Acceleration is read from the slope of v-t, not x-t.
    next_step_rules:
    - id: aceleracion_next
      when: 'true'
      status: info
      text:
        es: Con la aceleracion conocida, puedes construir el grafico a-t y calcular el cambio de velocidad en otros intervalos como area bajo a-t.
        en: With the acceleration known, you can build the a-t graph and calculate the velocity change in other intervals as the area under a-t.
  cambio_velocidad:
    summary_rules:
    - id: cambio_velocidad_summary
      when: 'true'
      status: info
      text:
        es: El cambio de velocidad se obtiene como el area bajo la curva a-t entre los instantes inicial y final.
        en: The velocity change is obtained as the area under the a-t curve between the initial and final instants.
    coherence_rules:
    - id: cambio_velocidad_coherence
      when: 'true'
      status: ok
      text:
        es: El cambio de velocidad debe tener unidades de m/s y su signo debe ser coherente con el signo predominante de la aceleracion en ese intervalo.
        en: The velocity change must have units of m/s and its sign must be consistent with the predominant sign of the acceleration in that interval.
    physical_reading_rules:
    - id: cambio_velocidad_physical
      when: 'true'
      status: info
      text:
        es: Un cambio de velocidad grande indica que la aceleracion fue intensa o que actuo durante mucho tiempo, porque el area bajo a-t depende tanto de la magnitud de la aceleracion como de la duracion.
        en: A large velocity change indicates that the acceleration was intense or lasted a long time, because the area under a-t depends on both the magnitude of the acceleration and the duration.
    model_validity_rules:
    - id: cambio_velocidad_validity
      when: 'true'
      status: ok
      text:
        es: Si la aceleracion no es constante, el area rectangular es solo una aproximacion; subdivide el tramo o usa la integral exacta para mayor precision.
        en: If the acceleration is not constant, the rectangular area is only an approximation; subdivide the segment or use the exact integral for greater precision.
    graph_rules:
    - id: cambio_velocidad_graph
      when: 'true'
      status: info
      text:
        es: En el grafico a-t, el area entre la curva y el eje t mide directamente cuantos m/s gano o perdio el movil en ese intervalo.
        en: On the a-t graph, the area between the curve and the t-axis directly measures how many m/s the object gained or lost in that interval.
    likely_errors:
    - id: cambio_velocidad_warn
      when: 'true'
      status: warning
      text:
        es: No confundas el cambio de velocidad (area bajo a-t) con la velocidad final. La velocidad final es la velocidad inicial mas el cambio de velocidad.
        en: Do not confuse the velocity change (area under a-t) with the final velocity. The final velocity is the initial velocity plus the velocity change.
    next_step_rules:
    - id: cambio_velocidad_next
      when: 'true'
      status: info
      text:
        es: Suma el cambio de velocidad a la velocidad inicial para obtener la velocidad final y luego verifica con la lectura directa del grafico v-t.
        en: Add the velocity change to the initial velocity to get the final velocity, then verify against the direct reading from the v-t graph.
  aceleracion_media:
    summary_rules:
    - id: aceleracion_media_summary
      when: 'true'
      status: info
      text:
        es: La aceleracion media es el cociente entre el cambio de velocidad y el intervalo de tiempo; describe el ritmo medio de cambio de velocidad a lo largo del tramo analizado.
        en: The average acceleration is the ratio of velocity change to time interval; it describes the mean rate of velocity change over the analysed segment.
    coherence_rules:
    - id: aceleracion_media_coherence
      when: 'true'
      status: ok
      text:
        es: La aceleracion media debe estar entre el valor minimo y el maximo de a en el intervalo. Si cae fuera, hay un error aritmetico.
        en: The average acceleration must lie between the minimum and maximum values of a in the interval. If it falls outside, there is an arithmetic error.
    physical_reading_rules:
    - id: aceleracion_media_physical
      when: 'true'
      status: info
      text:
        es: Una aceleracion media cercana al valor instantaneo en todo el tramo indica que la aceleracion fue practicamente constante; si difieren mucho, el movimiento tiene variaciones bruscas internas.
        en: An average acceleration close to the instantaneous value throughout the segment indicates that the acceleration was nearly constant; large differences signal abrupt internal variations.
    model_validity_rules:
    - id: aceleracion_media_validity
      when: 'true'
      status: ok
      text:
        es: El calculo de aceleracion media supone que el grafico cubre todo el intervalo de interes sin datos faltantes; si hay huecos temporales, el resultado es una estimacion parcial.
        en: The average-acceleration calculation assumes the graph covers the entire interval of interest without missing data; if there are time gaps, the result is a partial estimate.
    graph_rules:
    - id: aceleracion_media_graph
      when: 'true'
      status: info
      text:
        es: Graficamente, la aceleracion media equivale a la pendiente de la recta que une los puntos (t_i, v_i) y (t_f, v_f) en la grafica v-t.
        en: Graphically, the average acceleration equals the slope of the line connecting the points (t_i, v_i) and (t_f, v_f) on the v-t graph.
    likely_errors:
    - id: aceleracion_media_warn
      when: 'true'
      status: warning
      text:
        es: No promedies aceleraciones de tramos de distinta duracion sin ponderar por tiempo. La media aritmetica de aceleraciones solo coincide con la aceleracion media si todos los tramos duran lo mismo.
        en: Do not average accelerations of segments with different durations without weighting by time. The arithmetic mean of accelerations equals the average acceleration only if all segments last the same time.
    next_step_rules:
    - id: aceleracion_media_next
      when: 'true'
      status: info
      text:
        es: Compara la aceleracion media con la aceleracion instantanea en distintos puntos para identificar donde el movil se estaba acelerando mas o menos que el promedio.
        en: Compare the average acceleration with the instantaneous acceleration at different points to identify where the object was accelerating more or less than the average.
