leaf_id: analisis-grafico-del-movimiento
nombre:
  es: Interpretacion de Analisis grafico del movimiento
  en: Interpretation of Graphical Analysis of Motion
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cinematica
  parent_id: cinematica
  ruta_relativa: fisica-clasica/mecanica/cinematica/analisis-grafico-del-movimiento
dependencies:
  formulas:
  - velocidad_inst_pendiente_x_t
  - velocidad_media_intervalo
  - desplazamiento_area_v_t
  - aceleracion_inst_pendiente_v_t
  - aceleracion_media_intervalo
  - cambio_velocidad_area_a_t
  magnitudes:
  - tiempo
  - intervalo_tiempo
  - posicion
  - posicion_inicial
  - posicion_final
  - desplazamiento
  - velocidad
  - velocidad_inicial
  - velocidad_final
