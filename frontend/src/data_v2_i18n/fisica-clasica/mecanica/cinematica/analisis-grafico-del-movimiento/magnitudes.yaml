version: 1
magnitudes:
- id: tiempo
  symbol: t
  nombre:
    es: tiempo
    en: time
  descripcion:
    es: Variable independiente que ordena cronológicamente los eventos del movimiento.
    en: Independent variable that chronologically orders the events of motion.
  unidad_si: s
  dimension: T
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Suponer que el tiempo siempre empieza en cero; el origen temporal es una elección de referencia, no un hecho físico.
  typical_range: "Desde fracciones de segundo en caída libre hasta minutos en recorridos urbanos: 0.1 s – 600 s."
  sign_behavior:
    has_sign: false
    meaning:
      es: El tiempo transcurrido es siempre no negativo; solo los intervalos pueden tener signo si se invierte el orden de los instantes.
      en: Elapsed time is always non-negative; only intervals can carry a sign if the order of instants is reversed.
  zero_behavior:
    allowed: true
    meaning:
      es: El instante t = 0 marca el origen temporal elegido; no implica ausencia de movimiento.
      en: The instant t = 0 marks the chosen time origin; it does not imply absence of motion.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0, 600]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - eje_horizontal_x_t
    - eje_horizontal_v_t
    - eje_horizontal_a_t
  pedagogical_notes: El tiempo es el eje horizontal en las tres gráficas cinemáticas; confundirlo con una magnitud vertical es un error frecuente de lectura gráfica.

- id: intervalo_tiempo
  symbol: \Delta t
  nombre:
    es: intervalo de tiempo
    en: time interval
  descripcion:
    es: Diferencia entre dos instantes temporales que delimita un tramo del movimiento.
    en: Difference between two time instants that bounds a segment of motion.
  unidad_si: s
  dimension: T
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir el intervalo de tiempo con un instante concreto; el intervalo es una duración, no un momento.
  typical_range: "De 1 s a 60 s en problemas cinemáticos escolares."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo cuando el instante final es posterior al inicial; negativo solo si se invierte la convención cronológica.
      en: Positive when the final instant is after the initial one; negative only if the chronological convention is reversed.
  zero_behavior:
    allowed: false
    meaning:
      es: Un intervalo nulo impide calcular velocidades medias (división entre cero).
      en: A zero interval prevents computing average velocities (division by zero).
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "(0, 120]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - base_area_v_t
    - base_area_a_t
  pedagogical_notes: En la gráfica v-t, el intervalo de tiempo es la base horizontal del rectángulo o trapecio cuya área da el desplazamiento.

- id: posicion
  symbol: x
  nombre:
    es: posición
    en: position
  descripcion:
    es: Coordenada espacial del móvil respecto a un origen elegido sobre el eje de movimiento.
    en: Spatial coordinate of the object relative to a chosen origin on the axis of motion.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: state
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir la posición (coordenada con signo) con la distancia recorrida (siempre positiva).
  typical_range: "Desde metros en laboratorio hasta kilómetros en tráfico: -1000 m a +1000 m."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo a un lado del origen, negativo al lado opuesto, según la convención de ejes elegida.
      en: Positive on one side of the origin, negative on the other, depending on the chosen axis convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil pasa por el origen de coordenadas; no significa que esté en reposo.
      en: The object passes through the coordinate origin; it does not mean it is at rest.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-1000, 1000]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - eje_vertical_x_t
  pedagogical_notes: La altura de la curva en el gráfico x-t indica dónde está el móvil, no cuánto se ha movido; la pendiente indica la velocidad.

- id: posicion_inicial
  symbol: x_i
  nombre:
    es: posición inicial
    en: initial position
  descripcion:
    es: Posición del móvil en el instante inicial del intervalo analizado.
    en: Position of the object at the initial instant of the analysed interval.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Asumir que la posición inicial siempre vale cero; depende del origen elegido.
  typical_range: "Variable según el problema; a menudo 0 m por elección de referencia."
  sign_behavior:
    has_sign: true
    meaning:
      es: Puede ser positiva, negativa o cero dependiendo de la posición del origen.
      en: Can be positive, negative or zero depending on the origin location.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil arranca exactamente en el origen de coordenadas.
      en: The object starts exactly at the coordinate origin.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-500, 500]"
  interpretation_role:
    primary_for: []
    secondary_for:
    - analisis-grafico-del-movimiento
  graph_binding:
    channels:
    - ordenada_inicio_x_t
  pedagogical_notes: En la gráfica x-t, la posición inicial es la ordenada donde la curva comienza (intersección con el eje vertical en el instante inicial).

- id: posicion_final
  symbol: x_f
  nombre:
    es: posición final
    en: final position
  descripcion:
    es: Posición del móvil al final del intervalo analizado.
    en: Position of the object at the end of the analysed interval.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Creer que la posición final siempre es mayor que la inicial; si el móvil retrocede, puede ser menor.
  typical_range: "Variable según el problema."
  sign_behavior:
    has_sign: true
    meaning:
      es: Puede ser positiva o negativa según la convención de ejes.
      en: Can be positive or negative depending on the axis convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil termina exactamente en el origen de coordenadas.
      en: The object ends exactly at the coordinate origin.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-500, 500]"
  interpretation_role:
    primary_for: []
    secondary_for:
    - analisis-grafico-del-movimiento
  graph_binding:
    channels:
    - ordenada_fin_x_t
  pedagogical_notes: En la gráfica x-t, la posición final es la ordenada donde termina la curva en el instante final del intervalo; leer la diferencia visual entre inicio y fin da directamente el desplazamiento.

- id: desplazamiento
  symbol: \Delta x
  nombre:
    es: desplazamiento
    en: displacement
  descripcion:
    es: Cambio neto de posición entre dos instantes; equivale al área con signo bajo la curva v-t.
    en: Net change in position between two instants; equals the signed area under the v-t curve.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir desplazamiento con distancia recorrida; el desplazamiento puede ser negativo o cero aunque el objeto se haya movido.
  typical_range: "De -500 m a +500 m en cinemática escolar."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el móvil avanza en el sentido positivo del eje; negativo si retrocede.
      en: Positive if the object advances in the positive axis direction; negative if it moves backwards.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil vuelve a su posición de partida; se ha movido pero el cambio neto es cero.
      en: The object returns to its starting position; it has moved but the net change is zero.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-500, 500]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - area_bajo_v_t
  pedagogical_notes: El desplazamiento es el área con signo bajo la curva v-t; las áreas por encima del eje son positivas y las de debajo, negativas.

- id: velocidad
  symbol: v
  nombre:
    es: velocidad
    en: velocity
  descripcion:
    es: Tasa de cambio temporal de la posición; coincide con la pendiente de la tangente a la curva x-t.
    en: Time rate of change of position; equals the slope of the tangent to the x-t curve.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir velocidad (con signo, indica dirección) con rapidez (módulo, siempre positiva).
  typical_range: "De -30 m/s a +30 m/s en tráfico urbano y laboratorio."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el móvil se desplaza en el sentido positivo del eje; negativo si va en sentido contrario.
      en: Positive if the object moves in the positive axis direction; negative if it moves in the opposite direction.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil está momentáneamente en reposo o cambiando de sentido (punto de retorno).
      en: The object is momentarily at rest or reversing direction (turning point).
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-30, 30]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - eje_vertical_v_t
    - pendiente_x_t
  pedagogical_notes: La velocidad aparece como la altura de la curva en v-t y como la pendiente de la curva en x-t; confundir estos dos roles gráficos es el error de lectura más común.

- id: velocidad_inicial
  symbol: v_0
  nombre:
    es: velocidad inicial
    en: initial velocity
  descripcion:
    es: Velocidad del móvil en el instante inicial del intervalo estudiado.
    en: Velocity of the object at the initial instant of the studied interval.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Suponer que la velocidad inicial siempre es cero; solo es cero cuando el móvil parte del reposo.
  typical_range: "De 0 a 30 m/s en problemas cinemáticos típicos."
  sign_behavior:
    has_sign: true
    meaning:
      es: Indica el sentido del movimiento en el instante inicial respecto al eje elegido.
      en: Indicates the direction of motion at the initial instant with respect to the chosen axis.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil parte del reposo.
      en: The object starts from rest.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-30, 30]"
  interpretation_role:
    primary_for: []
    secondary_for:
    - analisis-grafico-del-movimiento
  graph_binding:
    channels:
    - ordenada_inicio_v_t
  pedagogical_notes: En la gráfica v-t, la velocidad inicial es la ordenada donde arranca la curva en t inicial.

- id: velocidad_final
  symbol: v_f
  nombre:
    es: velocidad final
    en: final velocity
  descripcion:
    es: Velocidad del móvil al final del intervalo estudiado.
    en: Velocity of the object at the end of the studied interval.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: parameter
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Creer que la velocidad final es siempre la máxima; si el objeto frena, la velocidad final puede ser menor que la inicial.
  typical_range: "De 0 a 30 m/s."
  sign_behavior:
    has_sign: true
    meaning:
      es: Indica el sentido del movimiento en el instante final.
      en: Indicates the direction of motion at the final instant.
  zero_behavior:
    allowed: true
    meaning:
      es: El móvil se detiene al final del intervalo.
      en: The object comes to rest at the end of the interval.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-30, 30]"
  interpretation_role:
    primary_for: []
    secondary_for:
    - analisis-grafico-del-movimiento
  graph_binding:
    channels:
    - ordenada_fin_v_t
  pedagogical_notes: En la gráfica v-t, la velocidad final es la ordenada donde termina la curva; la diferencia visual entre inicio y fin mide el cambio de velocidad.

- id: velocidad_media
  symbol: v_{\mathrm{med}}
  nombre:
    es: velocidad media
    en: average velocity
  descripcion:
    es: Cociente entre el desplazamiento total y el intervalo de tiempo; corresponde a la pendiente de la secante en el gráfico x-t.
    en: Ratio of total displacement to time interval; corresponds to the secant slope on the x-t graph.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir velocidad media con la media aritmética de velocidades; solo coinciden si la aceleración es constante.
  typical_range: "De -20 m/s a +20 m/s."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si el desplazamiento neto es en sentido positivo; negativa en caso contrario.
      en: Positive if the net displacement is in the positive direction; negative otherwise.
  zero_behavior:
    allowed: true
    meaning:
      es: El desplazamiento neto es cero, aunque el objeto se haya movido de ida y vuelta.
      en: The net displacement is zero, even though the object may have moved back and forth.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-20, 20]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - pendiente_secante_x_t
  pedagogical_notes: Gráficamente, la velocidad media es la pendiente de la recta que une los puntos inicial y final de la curva x-t en el intervalo considerado.

- id: aceleracion
  symbol: a
  nombre:
    es: aceleración
    en: acceleration
  descripcion:
    es: Tasa de cambio temporal de la velocidad; coincide con la pendiente de la tangente a la curva v-t.
    en: Time rate of change of velocity; equals the slope of the tangent to the v-t curve.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Creer que aceleración negativa significa frenar; puede significar acelerar en sentido negativo del eje.
  typical_range: "De -10 m/s² a +10 m/s² en contextos terrestres habituales."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si la velocidad crece en el sentido positivo del eje; negativa si la velocidad disminuye o si crece en sentido negativo.
      en: Positive if velocity increases in the positive axis direction; negative if velocity decreases or increases in the negative direction.
  zero_behavior:
    allowed: true
    meaning:
      es: La velocidad no cambia en ese instante; el movimiento es (momentáneamente) uniforme.
      en: Velocity does not change at that instant; the motion is (momentarily) uniform.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-10, 10]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - eje_vertical_a_t
    - pendiente_v_t
  pedagogical_notes: La aceleración aparece como la altura de la curva en a-t y como la pendiente de la curva en v-t; la confusión entre estos dos roles produce errores graves de lectura.

- id: aceleracion_media
  symbol: a_{\mathrm{med}}
  nombre:
    es: aceleración media
    en: average acceleration
  descripcion:
    es: Cociente entre el cambio de velocidad y el intervalo de tiempo; corresponde a la pendiente de la secante en el gráfico v-t.
    en: Ratio of velocity change to time interval; corresponds to the secant slope on the v-t graph.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir aceleración media con la media aritmética de aceleraciones; solo coinciden si la variación de aceleración es lineal con el tiempo.
  typical_range: "De -10 m/s² a +10 m/s² en cinemática terrestre habitual."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si la velocidad neta aumentó en el intervalo; negativa si disminuyó.
      en: Positive if the net velocity increased in the interval; negative if it decreased.
  zero_behavior:
    allowed: true
    meaning:
      es: El cambio neto de velocidad es nulo; el móvil tiene la misma velocidad al inicio y al final del intervalo.
      en: The net velocity change is zero; the object has the same velocity at the start and end of the interval.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-20, 20]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - pendiente_secante_v_t
  pedagogical_notes: La aceleración media es la pendiente de la secante en v-t; no describe lo que ocurre en cada instante, sino el efecto global del intervalo.

- id: cambio_velocidad
  symbol: \Delta v
  nombre:
    es: cambio de velocidad
    en: change in velocity
  descripcion:
    es: Diferencia entre la velocidad final y la inicial en un intervalo; equivale al área con signo bajo la curva a-t.
    en: Difference between final and initial velocity over an interval; equals the signed area under the a-t curve.
  unidad_si: m/s
  dimension: LT^{-1}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - analisis-grafico-del-movimiento
  common_mistake: Confundir el cambio de velocidad con la velocidad final; el cambio es una diferencia, no un valor absoluto.
  typical_range: "De -20 m/s a +20 m/s."
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si la velocidad aumentó, negativo si disminuyó durante el intervalo.
      en: Positive if velocity increased, negative if it decreased during the interval.
  zero_behavior:
    allowed: true
    meaning:
      es: La velocidad no cambió durante el intervalo; la aceleración media fue cero.
      en: Velocity did not change during the interval; the average acceleration was zero.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: "[-20, 20]"
  interpretation_role:
    primary_for:
    - analisis-grafico-del-movimiento
    secondary_for: []
  graph_binding:
    channels:
    - area_bajo_a_t
  pedagogical_notes: El cambio de velocidad es el área con signo bajo la curva a-t; es el resultado de integrar gráficamente la aceleración.
