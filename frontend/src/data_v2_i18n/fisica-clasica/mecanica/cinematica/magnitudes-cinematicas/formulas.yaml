version: 1
formulas:
  - id: velocidad_media
    title:
      es: Velocidad media
      en: Average velocity
    equation: velocidad_media = desplazamiento / intervalo_tiempo
    latex: v_{med} = \frac{\Delta x}{\Delta t}
    rearrangements:
      - target: velocidad_media
        equation: velocidad_media = desplazamiento / intervalo_tiempo
        latex: v_{med} = \frac{\Delta x}{\Delta t}
        constraints: []
      - target: desplazamiento
        equation: desplazamiento = velocidad_media * intervalo_tiempo
        latex: \Delta x = v_{med}\,\Delta t
        constraints: []
      - target: intervalo_tiempo
        equation: intervalo_tiempo = desplazamiento / velocidad_media
        latex: \Delta t = \frac{\Delta x}{v_{med}}
        constraints: []
    category: fundamental
    relation_type: average_relation
    physical_meaning:
      es: Relaciona el cambio neto de posición con el tiempo transcurrido y resume el movimiento completo en una sola tasa promedio.
      en: It relates the net change in position to elapsed time and summarizes the whole motion in a single average rate.
    constraints:
      - Movimiento descrito en una dimensión o proyectado sobre un eje.
      - Intervalo de tiempo no nulo.
    validity:
      es: Válida para cualquier movimiento clásico cuando se comparan una posición inicial y otra final dentro de un intervalo temporal definido.
      en: Valid for any classical motion when an initial and a final position are compared over a defined time interval.
    dimension_check:
      es: Ambos lados tienen dimensión de velocidad, [L T^-1].
      en: Both sides have the dimension of velocity, [L T^-1].
    calculable: true
    motivo_no_calculable: null
    used_in:
      - teoria
      - ejemplos
      - aplicaciones
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: velocidad_media
      meaning: Resulta util para interpretar velocidad_media en el contexto del leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que los datos pertenezcan al dominio del modelo.
          en: Check that the data belong to the model domain.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el resultado tenga sentido fisico.
          en: Check that the result makes physical sense.
    graph_implications:
      - La grafica debe reflejar cambios coherentes con la formula.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: rapidez_media
    title:
      es: Rapidez media
      en: Average speed
    equation: rapidez_media = distancia / intervalo_tiempo
    latex: v_{esc,med} = \frac{s}{\Delta t}
    rearrangements:
      - target: rapidez_media
        equation: rapidez_media = distancia / intervalo_tiempo
        latex: v_{esc,med} = \frac{s}{\Delta t}
        constraints: []
      - target: distancia
        equation: distancia = rapidez_media * intervalo_tiempo
        latex: s = v_{esc,med}\,\Delta t
        constraints: []
      - target: intervalo_tiempo
        equation: intervalo_tiempo = distancia / rapidez_media
        latex: \Delta t = \frac{s}{v_{esc,med}}
        constraints: []
    category: derived
    relation_type: average_relation
    physical_meaning:
      es: Mide cuánta trayectoria total se recorre por unidad de tiempo sin distinguir dirección ni sentido.
      en: It measures how much total path is covered per unit time without distinguishing direction.
    constraints:
      - Distancia total conocida.
      - Intervalo temporal no nulo.
    validity:
      es: Válida para cualquier trayectoria clásica siempre que se conozca la longitud total recorrida.
      en: Valid for any classical trajectory as long as the total path length is known.
    dimension_check:
      es: Ambos lados tienen dimensión [L T^-1].
      en: Both sides have dimension [L T^-1].
    calculable: true
    motivo_no_calculable: null
    used_in:
      - teoria
      - ejemplos
      - aplicaciones
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: rapidez_media
      meaning: Resulta util para interpretar rapidez_media en el contexto del leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que los datos pertenezcan al dominio del modelo.
          en: Check that the data belong to the model domain.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el resultado tenga sentido fisico.
          en: Check that the result makes physical sense.
    graph_implications:
      - La grafica debe reflejar cambios coherentes con la formula.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: velocidad_instantanea
    title:
      es: Velocidad instantánea
      en: Instantaneous velocity
    equation: velocidad = derivative(posicion, tiempo)
    latex: v = \frac{dx}{dt}
    rearrangements: []
    category: conceptual
    relation_type: differential_relation
    physical_meaning:
      es: Define la tasa instantánea de cambio de la posición y representa cómo evoluciona el estado del movimiento en un instante concreto.
      en: It defines the instantaneous rate of change of position and represents how the state of motion evolves at a given instant.
    constraints:
      - La función posición debe ser continua y derivable en el instante analizado.
    validity:
      es: Válida en mecánica clásica cuando la trayectoria puede modelarse mediante una función de posición diferenciable respecto del tiempo.
      en: Valid in classical mechanics when the trajectory can be modeled by a position function differentiable with respect to time.
    dimension_check:
      es: d[L]/d[T] = [L T^-1].
      en: d[L]/d[T] = [L T^-1].
    calculable: false
    motivo_no_calculable:
      es: Es una definición diferencial; para cálculo numérico directo requiere una ley temporal concreta o un proceso de aproximación.
      en: It is a differential definition; direct numerical calculation requires a specific time law or an approximation process.
    used_in:
      - teoria
      - modelos
      - ejemplos
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: velocidad
      meaning: Resulta util para interpretar velocidad en el contexto del leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que los datos pertenezcan al dominio del modelo.
          en: Check that the data belong to the model domain.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el resultado tenga sentido fisico.
          en: Check that the result makes physical sense.
    graph_implications:
      - La grafica debe reflejar cambios coherentes con la formula.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: aceleracion_media
    title:
      es: Aceleración media
      en: Average acceleration
    equation: aceleracion_media = cambio_velocidad / intervalo_tiempo
    latex: a_{med} = \frac{\Delta v}{\Delta t}
    rearrangements:
      - target: aceleracion_media
        equation: aceleracion_media = cambio_velocidad / intervalo_tiempo
        latex: a_{med} = \frac{\Delta v}{\Delta t}
        constraints: []
      - target: cambio_velocidad
        equation: cambio_velocidad = aceleracion_media * intervalo_tiempo
        latex: \Delta v = a_{med}\,\Delta t
        constraints: []
      - target: intervalo_tiempo
        equation: intervalo_tiempo = cambio_velocidad / aceleracion_media
        latex: \Delta t = \frac{\Delta v}{a_{med}}
        constraints: []
    category: fundamental
    relation_type: average_relation
    physical_meaning:
      es: Expresa cuánto cambia la velocidad por unidad de tiempo en un intervalo dado y cuantifica la intensidad promedio del cambio de movimiento.
      en: It expresses how much velocity changes per unit time over a given interval and quantifies the average intensity of motion change.
    constraints:
      - Intervalo temporal no nulo.
      - Cambio de velocidad definido.
    validity:
      es: Válida en cualquier movimiento clásico cuando se comparan dos velocidades separadas por un intervalo de tiempo.
      en: Valid in any classical motion when two velocities separated by a time interval are compared.
    dimension_check:
      es: "[L T^-1]/[T] = [L T^-2]."
      en: "[L T^-1]/[T] = [L T^-2]."
    calculable: true
    motivo_no_calculable: null
    used_in:
      - teoria
      - ejemplos
      - aplicaciones
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: aceleracion_media
      meaning: Resulta util para interpretar aceleracion_media en el contexto del leaf.
    domain_checks:
