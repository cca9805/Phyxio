    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: aceleracion_instantanea
    title:
      es: Aceleración instantánea
      en: Instantaneous acceleration
    equation: aceleracion = derivative(velocidad, tiempo)
    latex: a = \frac{dv}{dt}
    rearrangements: []
    category: conceptual
    relation_type: differential_relation
    physical_meaning:
      es: Define la tasa instantánea de cambio de la velocidad y permite distinguir entre movimientos con cambio de rapidez, de dirección o de ambos.
      en: It defines the instantaneous rate of change of velocity and allows one to distinguish motions with changing speed, direction, or both.
    constraints:
      - La velocidad debe ser derivable respecto del tiempo.
    validity:
      es: Válida en modelos clásicos con velocidad diferenciable; es esencial en trayectorias curvilíneas y movimientos no uniformes.
      en: Valid in classical models with differentiable velocity; it is essential in curvilinear trajectories and non-uniform motion.
    dimension_check:
      es: d[L T^-1]/d[T] = [L T^-2].
      en: d[L T^-1]/d[T] = [L T^-2].
    calculable: false
    motivo_no_calculable:
      es: Requiere una ley temporal explícita de la velocidad o un límite de diferencias finitas suficientemente preciso.
      en: It requires an explicit time law for velocity or a sufficiently accurate finite-difference limit.
    used_in:
      - teoria
      - modelos
      - ejemplos
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: aceleracion
      meaning: Resulta util para interpretar aceleracion en el contexto del leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que los datos pertenezcan al dominio del modelo.
          en: Check that the data belong to the model domain.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el resultado tenga sentido fisico.
          en: Check that the result makes physical sense.
    graph_implications:
      - La grafica debe reflejar cambios coherentes con la formula.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: aceleracion_como_segunda_derivada
    title:
      es: Aceleración como segunda derivada de la posición
      en: Acceleration as second derivative of position
    equation: aceleracion = derivative(derivative(posicion, tiempo), tiempo)
    latex: a = \frac{d^2x}{dt^2}
    rearrangements: []
    category: structural
    relation_type: differential_relation
    physical_meaning:
      es: Muestra que la aceleración está codificada en la curvatura temporal de la función posición y conecta directamente la geometría temporal del movimiento con su dinámica cinemática.
      en: It shows that acceleration is encoded in the time curvature of the position function and directly connects the temporal geometry of motion with its kinematic dynamics.
    constraints:
      - La función posición debe ser dos veces derivable.
    validity:
      es: Válida en modelos clásicos con trayectoria suficientemente suave; no se aplica de forma literal en discontinuidades idealizadas.
      en: Valid in classical models with sufficiently smooth trajectories; it does not apply literally at idealized discontinuities.
    dimension_check:
      es: d²[L]/d[T²] = [L T^-2].
      en: d²[L]/d[T²] = [L T^-2].
    calculable: false
    motivo_no_calculable:
      es: Es una relación estructural que necesita una función explícita x(t) o una reconstrucción analítica de la trayectoria.
      en: It is a structural relation that requires an explicit x(t) function or an analytical reconstruction of the trajectory.
    used_in:
      - teoria
      - modelos
      - aplicaciones
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: aceleracion
      meaning: Resulta util para interpretar aceleracion en el contexto del leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que los datos pertenezcan al dominio del modelo.
          en: Check that the data belong to the model domain.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el resultado tenga sentido fisico.
          en: Check that the result makes physical sense.
    graph_implications:
      - La grafica debe reflejar cambios coherentes con la formula.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Comprueba signos, unidades y significado del resultado.
          en: Check signs, units, and meaning of the result.
  - id: definicion_desplazamiento
    title:
      es: Definicion de desplazamiento
      en: Displacement definition
    equation: desplazamiento = posicion_final - posicion_inicial
    latex: \Delta x = x_f - x_i
    rearrangements: []
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: Define el desplazamiento como cambio algebraico de posicion entre el estado inicial y el final.
      en: Defines displacement as the signed change in position between the initial and final states.
    constraints:
      - misma referencia espacial
      - misma convencion de signos
    validity:
      es: Valida para movimiento unidimensional o para una componente de la posicion vectorial.
      en: Valid for one-dimensional motion or for one component of vector position.
    dimension_check: "[L] = [L] - [L] = [L]"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - teoria
      - ejemplos
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: desplazamiento
      meaning: Indica cuanto cambia la posicion con signo, no la longitud total recorrida.
    domain_checks:
      - expr: "true"
        message:
          es: Comprueba que las posiciones se midan desde el mismo origen.
          en: Check that positions are measured from the same origin.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que el signo del desplazamiento siga la convencion elegida.
          en: Check that displacement sign follows the chosen convention.
    graph_implications:
      - En una grafica x-t corresponde al cambio vertical entre posicion inicial y final.
    pedagogical_triggers:
      - when: "true"
        message:
          es: No confundas desplazamiento con distancia recorrida.
          en: Do not confuse displacement with distance traveled.
  - id: definicion_cambio_velocidad
    title:
      es: Definicion de cambio de velocidad
      en: Change in velocity definition
    equation: cambio_velocidad = velocidad_final - velocidad_inicial
    latex: \Delta v = v_f - v_i
    rearrangements: []
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: Define el cambio de velocidad como diferencia algebraica entre la velocidad final y la inicial.
      en: Defines change in velocity as the signed difference between final and initial velocity.
    constraints:
      - misma referencia
      - misma convencion de signos
    validity:
      es: Valida para movimiento unidimensional o para una componente de la velocidad vectorial.
      en: Valid for one-dimensional motion or for one component of vector velocity.
    dimension_check: "[L T^-1] = [L T^-1] - [L T^-1]"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - teoria
      - ejemplos
    interpretation_tags:
      - magnitudes-cinematicas
    result_semantics:
      target: cambio_velocidad
      meaning: Indica como cambia la velocidad y conserva el signo del eje elegido.
    domain_checks:
      - expr: "true"
        message:
          es: Comprueba que ambas velocidades pertenezcan al mismo eje y referencia.
          en: Check that both velocities belong to the same axis and reference frame.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa si el cambio implica acelerar, frenar o invertir el sentido.
          en: Check whether the change means speeding up, slowing down, or reversing direction.
    graph_implications:
      - En una grafica v-t corresponde al cambio vertical entre velocidad inicial y final.
    pedagogical_triggers:
      - when: "true"
        message:
          es: No uses rapidez final menos rapidez inicial si el problema requiere velocidad con signo.
          en: Do not use final speed minus initial speed when signed velocity is required.
