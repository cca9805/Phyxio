version: "1.0"
leaf: "magnitudes-cinematicas"

coord:
  title:
    es: Gráfica Coord · Magnitudes Cinemáticas
    en: Coord Graph · Kinematic Quantities
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x (m), velocidad v (m/s) o aceleración a (m/s²)
    en: position x (m), velocity v (m/s), or acceleration a (m/s²)
  xMagnitude: t
  yMagnitude: x, v o a
  relation:
    es: "Las tres magnitudes cinemáticas —posición, velocidad y aceleración— están relacionadas por derivación e integración: v = dx/dt y a = dv/dt. La gráfica muestra cuál de las tres se representa en función del tiempo."
    en: "The three kinematic quantities —position, velocity, and acceleration— are related by differentiation and integration: v = dx/dt and a = dv/dt. The graph shows which of the three is plotted as a function of time."
  physicalReading:
    es: La pendiente de x(t) es v, la pendiente de v(t) es a. El área bajo v(t) es el desplazamiento y el área bajo a(t) es la variación de velocidad.
    en: The slope of x(t) is v, the slope of v(t) is a. The area under v(t) is displacement and the area under a(t) is the change in velocity.
  slopeMeaning:
    es: Pendiente de x(t) = velocidad; pendiente de v(t) = aceleración; pendiente de a(t) = tirón (jerk).
    en: Slope of x(t) = velocity; slope of v(t) = acceleration; slope of a(t) = jerk.
  interceptMeaning:
    es: "El corte con el eje vertical es la condición inicial: posición, velocidad o aceleración en t = 0."
    en: "The vertical intercept is the initial condition: position, velocity, or acceleration at t = 0."
  curvatureMeaning:
    es: Una curva en x(t) indica velocidad variable; una curva en v(t) indica aceleración variable.
    en: Curvature in x(t) indicates variable velocity; curvature in v(t) indicates variable acceleration.
  signMeaning:
    es: "El signo de la magnitud indica sentido: negativo significa movimiento, velocidad o aceleración en sentido contrario al eje positivo elegido."
    en: "The sign of the quantity indicates direction: negative means motion, velocity, or acceleration opposite to the chosen positive axis."
  areaMeaning:
    es: Área bajo v(t) = desplazamiento Δx; área bajo a(t) = variación de velocidad Δv.
    en: Area under v(t) = displacement Δx; area under a(t) = change in velocity Δv.
  domainMeaning:
    es: El eje temporal empieza en t = 0 (inicio del movimiento analizado). El dominio se limita al intervalo de validez del movimiento.
    en: The time axis starts at t = 0 (start of the analyzed motion). The domain is limited to the interval where the motion model is valid.
  modelConnection:
    es: "Se interpreta bajo la cinemática clásica: el conjunto x(t), v(t), a(t) describe completamente el estado del movimiento de una partícula."
    en: "Interpreted within classical kinematics: the set x(t), v(t), a(t) completely describes the state of a particle's motion."
  formulaConnection:
    es: Conecta con v = dx/dt, a = dv/dt, x = ∫v dt y v = ∫a dt.
    en: Connects to v = dx/dt, a = dv/dt, x = ∫v dt, and v = ∫a dt.
  readingFocus:
    es: identificar primero qué magnitud se representa en el eje y, luego leer pendiente y área para deducir las magnitudes relacionadas.
    en: first identify which quantity is on the y-axis, then read slope and area to deduce related quantities.
  agentHints:
    es:
      - Si la curva es x(t), su pendiente es la velocidad en ese instante.
      - Si la curva es v(t), el área bajo ella es el desplazamiento en ese intervalo.
      - "Distinguir posición de desplazamiento: la posición puede ser negativa, el desplazamiento es la diferencia entre dos posiciones."
    en:
      - If the curve is x(t), its slope is the instantaneous velocity.
      - If the curve is v(t), the area under it is the displacement in that interval.
      - "Distinguish position from displacement: position can be negative; displacement is the difference between two positions."
  commonMistakes:
    es:
      - "Confundir posición con desplazamiento: la posición x(t) puede ser negativa, el desplazamiento Δx = x_f − x_i puede ser positivo o negativo."
      - Leer la velocidad como el valor de y en lugar de como la pendiente de x(t).
      - Olvidar que el área bajo v(t) es desplazamiento, no distancia recorrida.
    en:
      - "Confusing position with displacement: x(t) can be negative; Δx = x_f − x_i can be positive or negative."
      - Reading velocity as the y-value instead of the slope of x(t).
      - Forgetting that the area under v(t) is displacement, not distance traveled.
