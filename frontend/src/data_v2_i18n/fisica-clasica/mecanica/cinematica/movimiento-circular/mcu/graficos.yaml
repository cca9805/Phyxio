version: "1.0"
leaf: "mcu"

coord:
  title:
    es: Gráfica Coord · MCU
    en: Coord Graph · Uniform Circular Motion
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ (rad) o posición angular
    en: angle θ (rad) or angular position
  xMagnitude: t
  yMagnitude: θ
  relation:
    es: "En el movimiento circular uniforme el ángulo crece linealmente con el tiempo: θ(t) = θ₀ + ω·t. La velocidad angular ω es constante y la gráfica θ(t) es una recta."
    en: "In uniform circular motion the angle grows linearly with time: θ(t) = θ₀ + ω·t. Angular velocity ω is constant and the θ(t) graph is a straight line."
  physicalReading:
    es: La pendiente de θ(t) es la velocidad angular ω. La recta avanza indefinidamente, pero el movimiento circular repite cada T = 2π/ω.
    en: The slope of θ(t) is angular velocity ω. The line extends indefinitely, but the circular motion repeats every T = 2π/ω.
  slopeMeaning:
    es: La pendiente es ω, la velocidad angular en rad/s. Una pendiente mayor indica un giro más rápido.
    en: The slope is ω, the angular velocity in rad/s. A steeper slope indicates faster rotation.
  interceptMeaning:
    es: El corte con el eje y es θ₀, el ángulo inicial del objeto en t = 0.
    en: The y-intercept is θ₀, the initial angle of the object at t = 0.
  curvatureMeaning:
    es: "La gráfica debe ser perfectamente recta en MCU: cualquier curvatura indicaría variación de la velocidad angular (MCUA)."
    en: "The graph must be perfectly straight in UCM: any curvature would indicate angular velocity variation (UACM)."
  signMeaning:
    es: "El signo de ω indica el sentido de giro: positivo para sentido antihorario, negativo para sentido horario (por convención)."
    en: "The sign of ω indicates the direction of rotation: positive for counterclockwise, negative for clockwise (by convention)."
  areaMeaning:
    es: El área bajo la curva ω(t) —un rectángulo— es la variación angular Δθ en ese intervalo.
    en: The area under ω(t) —a rectangle— is the angular displacement Δθ in that interval.
  domainMeaning:
    es: El ángulo crece sin límite en la gráfica aunque el movimiento sea periódico. Para las magnitudes de posición (x, y), el movimiento es periódico con período T.
    en: The angle grows without bound in the graph even though the circular motion is periodic. For position quantities (x, y), the motion is periodic with period T.
  modelConnection:
    es: "Se interpreta bajo el MCU: radio constante y velocidad angular constante. La aceleración es centrípeta, no tangencial."
    en: "Interpreted within UCM: constant radius and constant angular velocity. Acceleration is centripetal, not tangential."
  formulaConnection:
    es: Conecta con θ(t) = θ₀ + ωt, T = 2π/ω, f = 1/T y a_c = ω²r.
    en: Connects to θ(t) = θ₀ + ωt, T = 2π/ω, f = 1/T, and a_c = ω²r.
  readingFocus:
    es: leer la pendiente como velocidad angular, calcular el período como θ = 2π dividido la pendiente, e identificar el ángulo inicial en el corte con el eje y.
    en: read the slope as angular velocity, compute the period as 2π divided by the slope, and identify the initial angle at the y-intercept.
  agentHints:
    es:
      - "La pendiente de θ(t) es ω: cuanto mayor, más rápido gira."
      - El período T es el tiempo en completar 2π rad de variación angular.
      - "En MCU, la velocidad lineal es v = ω·r: a mayor radio, mayor velocidad lineal con el mismo ω."
    en:
      - "The slope of θ(t) is ω: the steeper it is, the faster the rotation."
      - Period T is the time to complete 2π rad of angular displacement.
      - "In UCM, linear speed is v = ω·r: larger radius gives greater linear speed at the same ω."
  commonMistakes:
    es:
      - Confundir la velocidad angular ω (rad/s) con la frecuencia f (Hz) o la velocidad lineal v (m/s).
      - Olvidar que la aceleración centrípeta en MCU es perpendicular a la velocidad, no nula.
      - "Confundir el período con la frecuencia: T = 1/f."
    en:
      - Confusing angular velocity ω (rad/s) with frequency f (Hz) or linear speed v (m/s).
      - Forgetting that centripetal acceleration in UCM is perpendicular to velocity, not zero.
      - "Confusing period with frequency: T = 1/f."

svg:
  title:
    es: Escena SVG · MCU
    en: SVG Scene · Uniform Circular Motion
  sceneId: mcu_scene
  sceneLabel:
    es: Objeto en movimiento circular uniforme con vectores de velocidad y aceleración
    en: Object in uniform circular motion with velocity and acceleration vectors
  objects:
    es:
      - objeto sobre la circunferencia
      - vector velocidad tangencial
      - vector aceleración centrípeta
      - radio
      - centro
    en:
      - object on the circumference
      - tangential velocity vector
      - centripetal acceleration vector
      - radius
      - center
  mainObject:
    es: objeto en MCU
    en: object in UCM
  referenceFrame:
    es: plano del movimiento circular con el centro en el origen
    en: plane of circular motion with center at the origin
  geometry:
    es: La escena muestra el objeto en distintas posiciones de la circunferencia con su vector velocidad siempre tangente y el vector aceleración centrípeta siempre apuntando al centro.
    en: The scene shows the object at different positions on the circumference with its velocity vector always tangent and the centripetal acceleration vector always pointing toward the center.
  interactions:
    es: La fuerza centrípeta (tensión, gravitación, normal u otra) apunta al centro y mantiene el radio constante sin realizar trabajo.
    en: The centripetal force (tension, gravity, normal force, or other) points toward the center and keeps the radius constant without doing work.
  modelElements:
    es:
      - vector velocidad v = ωr (tangente)
      - vector aceleración a_c = ω²r (radial hacia el centro)
      - radio r constante
    en:
      - velocity vector v = ωr (tangential)
      - centripetal acceleration vector a_c = ω²r (radial toward center)
      - constant radius r
  visualCues:
    es:
      - El vector velocidad es siempre perpendicular al radio en el punto de la circunferencia.
      - El vector aceleración centrípeta siempre apunta hacia el centro, independientemente de la posición.
      - "En MCU no hay componente tangencial de aceleración: el módulo de la velocidad no cambia."
    en:
      - The velocity vector is always perpendicular to the radius at every point on the circumference.
      - The centripetal acceleration vector always points toward the center, regardless of position.
      - In UCM there is no tangential acceleration component; the speed does not change.
  scaleMeaning:
    es: Los vectores son cualitativos. La longitud del vector velocidad es constante porque el módulo v = ωr es constante.
    en: Vectors are qualitative. The length of the velocity vector is constant because the speed v = ωr is constant.
  relation:
    es: "La escena ilustra que en MCU la dirección de la velocidad cambia continuamente aunque su módulo es constante: por eso hay aceleración centrípeta."
    en: "The scene illustrates that in UCM the direction of velocity changes continuously even though its magnitude is constant: this is why there is centripetal acceleration."
  physicalReading:
    es: Verificar que el vector velocidad es tangente a la circunferencia y que el vector aceleración apunta al centro en cada posición.
    en: Verify that the velocity vector is tangent to the circumference and that the acceleration vector points toward the center at every position.
  modelConnection:
    es: "Se interpreta bajo el MCU: velocidad tangencial constante, aceleración centrípeta y radio fijo."
    en: "Interpreted within UCM: constant tangential speed, centripetal acceleration, and fixed radius."
  formulaConnection:
    es: Conecta con v = ωr, a_c = v²/r = ω²r y F_c = m·a_c.
    en: Connects to v = ωr, a_c = v²/r = ω²r, and F_c = m·a_c.
  readingFocus:
    es: identificar que el vector velocidad es tangente y el de aceleración centrípeta es radial hacia el centro, y verificar que son perpendiculares entre sí.
    en: identify that the velocity vector is tangential and the centripetal acceleration vector is radial toward the center, and verify they are perpendicular to each other.
  agentHints:
    es:
      - Velocidad y aceleración centrípeta son siempre perpendiculares en MCU.
      - La fuerza centrípeta no realiza trabajo porque es perpendicular al desplazamiento.
      - Cambiar el sentido de giro invierte el vector velocidad pero no el de aceleración centrípeta (sigue hacia el centro).
    en:
      - Velocity and centripetal acceleration are always perpendicular in UCM.
      - Centripetal force does no work because it is perpendicular to displacement.
      - Reversing the direction of rotation inverts the velocity vector but not the centripetal acceleration (it still points toward the center).
  commonMistakes:
    es:
      - Dibujar el vector aceleración centrípeta en sentido contrario al centro (fuerza centrífuga).
      - Pensar que en MCU no hay aceleración porque la velocidad no cambia de módulo.
      - Confundir la fuerza centrípeta con una fuerza adicional en lugar de con la resultante de fuerzas.
    en:
      - Drawing the centripetal acceleration vector away from the center (centrifugal force).
      - Thinking there is no acceleration in UCM because speed does not change.
      - Confusing centripetal force with an additional force rather than the resultant of forces.
