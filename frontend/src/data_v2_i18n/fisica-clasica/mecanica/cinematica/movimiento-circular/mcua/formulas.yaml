- id: mcua_a_total
  title:
    es: Aceleracion total en MCUA
    en: Total acceleration in UACM
  equation: a = sqrt(a_t^2 + a_c^2)
  latex: a = \sqrt{a_t^2 + a_c^2}
  rearrangements:
  - target: a
    equation: a = sqrt(a_t^2 + a_c^2)
    latex: a = \sqrt{a_t^2 + a_c^2}
    constraints: []
  category: derived
  relation_type: geometric_interpretation
  physical_meaning:
    es: En MCUA el vector aceleracion tiene dos componentes perpendiculares entre si. La tangencial at cambia la rapidez y la centripeta ac cambia la direccion. El modulo total se obtiene por Pitagoras.
    en: In UACM the acceleration vector has two mutually perpendicular components. The tangential at changes speed and the centripetal ac changes direction. The total magnitude follows from Pythagoras.
  constraints:
  - at = alpha * R
  - ac = omega^2 * R
  validity:
    es: Valida en cualquier instante del MCUA para un punto del circulo de radio R.
    en: Valid at any instant of UACM for a point on the circle of radius R.
  dimension_check: L T^-2 = sqrt((L T^-2)^2 + (L T^-2)^2)
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - mcua
  result_semantics:
    target: a
    meaning: Resulta util para calcular la aceleracion total del movil en cualquier instante del MCUA.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La aceleracion total es maxima al inicio del movimiento si at domina y minima cuando el movil es casi circular.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: mcua_omega_med
  title:
    es: Definición de velocidad angular media
    en: Average angular velocity definition
  equation: omega_med = (omega + omega_0)/2
  latex: \omega_{\text{med}} = \frac{\omega + \omega_0}{2}
  rearrangements:
  - target: omega_med
    equation: omega_med = (omega + omega_0)/2
    latex: \omega_{\text{med}} = \frac{\omega + \omega_0}{2}
    constraints: []
  - target: omega
    equation: omega = 2*omega_med - omega_0
    latex: \omega = 2\omega_{\text{med}} - \omega_0
    constraints: []
  - target: omega_0
    equation: omega_0 = 2*omega_med - omega
    latex: \omega_0 = 2\omega_{\text{med}} - \omega
    constraints: []
  category: fundamental
  relation_type: average_relation
  physical_meaning:
    es: En MCUA, la velocidad media es exactamente el promedio de las velocidades extremas del intervalo.
    en: In UACM, the average velocity is exactly the average of the extreme velocities of the interval.
  constraints: []
  validity:
    es: Válida exclusivamente para movimientos con aceleración angular constante.
    en: Valid exclusively for motions with constant angular acceleration.
  dimension_check: T^-1 = (T^-1 + T^-1)
  calculable: true
  motivo_no_calculable: null
