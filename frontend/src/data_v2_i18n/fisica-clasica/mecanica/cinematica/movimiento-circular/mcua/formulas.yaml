    es: Aceleración centrípeta
    en: Centripetal acceleration
  equation: a_c = omega^2*R
  latex: a_c = \omega^2 R
  rearrangements:
  - target: a_c
    equation: a_c = omega^2*R
    latex: a_c = \omega^2 R
    constraints: []
  - target: omega
    equation: omega = sqrt(a_c/R)
    latex: \omega = \sqrt{\frac{a_c}{R}}
    constraints: []
  - target: R
    equation: R = a_c/(omega^2)
    latex: R = \frac{a_c}{\omega^2}
    constraints: []
