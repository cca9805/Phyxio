version: 1
formulas:
- id: mcua_omega_t
  title:
    es: Velocidad angular en función del tiempo
    en: Angular velocity as function of time
  equation: omega = omega_0 + alpha*t
  latex: \omega = \omega_0 + \alpha t
  rearrangements:
  - target: omega
    equation: omega = omega_0 + alpha*t
    latex: \omega = \omega_0 + \alpha t
    constraints: []
  - target: omega_0
    equation: omega_0 = omega - alpha*t
    latex: \omega_0 = \omega - \alpha t
    constraints: []
  - target: alpha
    equation: alpha = (omega - omega_0)/t
    latex: \alpha = \frac{\omega - \omega_0}{t}
    constraints: []
  - target: t
    equation: t = (omega - omega_0)/alpha
    latex: t = \frac{\omega - \omega_0}{\alpha}
    constraints: []
  category: fundamental
  relation_type: differential_relation
  physical_meaning:
    es: Integra una aceleración angular constante en una velocidad angular que crece o decrece linealmente.
    en: Integrates constant angular acceleration into a linearly increasing or decreasing angular velocity.
  constraints:
  - expr: t != 0
    message:
      es: t no puede ser cero si despejas alpha o omega_0.
      en: t cannot be zero when solving for alpha or omega_0.
  validity:
    es: Válida en intervalos con aceleración angular constante aproximada.
    en: Valid in intervals where angular acceleration is approximately constant.
  dimension_check: T^-1 = T^-1 + (T^-2)(T)
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - mcua
  result_semantics:
    target: omega
    meaning: Resulta util para interpretar omega en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: mcua_theta_t
  title:
    es: Posición angular en función del tiempo
    en: Angular position as function of time
  equation: theta = theta_0 + omega_0*t + 0.5*alpha*t^2
  latex: \theta = \theta_0 + \omega_0 t + \frac{1}{2}\alpha t^2
  rearrangements:
  - target: theta
    equation: theta = theta_0 + omega_0*t + 0.5*alpha*t^2
    latex: \theta = \theta_0 + \omega_0 t + \frac{1}{2}\alpha t^2
    constraints: []
  - target: theta_0
    equation: theta_0 = theta - omega_0*t - 0.5*alpha*t^2
    latex: \theta_0 = \theta - \omega_0 t - \frac{1}{2}\alpha t^2
    constraints: []
  - target: omega_0
    equation: omega_0 = (theta - theta_0 - 0.5*alpha*t^2)/t
    latex: \omega_0 = \frac{\theta - \theta_0 - \frac{1}{2}\alpha t^2}{t}
    constraints: []
  - target: alpha
    equation: alpha = 2*(theta - theta_0 - omega_0*t)/(t^2)
    latex: \alpha = \frac{2(\theta - \theta_0 - \omega_0 t)}{t^2}
    constraints: []
  - target: t
    equation: t = sqrt(2*(theta - theta_0)/alpha + (omega_0^2)/(alpha^2)) - (omega_0/alpha)
    latex: t = \sqrt{\frac{2(\theta - \theta_0)}{\alpha} + \left(\frac{\omega_0}{\alpha}\right)^2} - \frac{\omega_0}{\alpha}
    constraints: []
  category: fundamental
  relation_type: differential_relation
  physical_meaning:
    es: 'Integra dos contribuciones: la parte proporcional al estado inicial y el término cuadrático de la aceleración.'
    en: 'Integrates two contributions: the initial-state term and the quadratic acceleration contribution.'
  constraints:
  - expr: t != 0
    message:
      es: t no puede ser cero si despejas omega_0 o alpha.
      en: t cannot be zero when solving for omega_0 or alpha.
  validity:
    es: Válida cuando \(\alpha\) y \(R\) son aproximadamente constantes.
    en: Valid when \(\alpha\) and \(R\) are approximately constant.
  dimension_check: 1 = 1 + (T^-1)(T) + (T^-2)(T^2)
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - mcua
  result_semantics:
    target: theta
    meaning: Resulta util para interpretar theta en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: mcua_sin_t
  title:
    es: Relación sin tiempo entre velocidades y desplazamiento angular
    en: Time-free relation between angular speeds and angular displacement
  equation: omega^2 = omega_0^2 + 2*alpha*(theta - theta_0)
  latex: \omega^2 = \omega_0^2 + 2\alpha\left(\theta - \theta_0\right)
  rearrangements:
  - target: omega
    equation: omega = sqrt(omega_0^2 + 2*alpha*(theta - theta_0))
    latex: \omega = \sqrt{\omega_0^2 + 2\alpha\left(\theta - \theta_0\right)}
    constraints: []
  - target: omega_0
    equation: omega_0 = sqrt(omega^2 - 2*alpha*(theta - theta_0))
    latex: \omega_0 = \sqrt{\omega^2 - 2\alpha\left(\theta - \theta_0\right)}
    constraints: []
  - target: alpha
    equation: alpha = (omega^2 - omega_0^2)/(2*(theta - theta_0))
    latex: \alpha = \frac{\omega^2 - \omega_0^2}{2\left(\theta - \theta_0\right)}
    constraints: []
  - target: delta_theta
    equation: delta_theta = (omega^2 - omega_0^2)/(2*alpha)
    latex: \Delta\theta = \frac{\omega^2 - \omega_0^2}{2\alpha}
    constraints: []
  category: derived
  relation_type: structural
  physical_meaning:
    es: Relaciona estados angulares inicial y final sin necesidad del tiempo explícito.
    en: Relates initial and final angular states without explicit time.
  constraints:
  - expr: alpha != 0
    message:
      es: alpha no puede ser cero para este despeje.
      en: alpha cannot be zero for this rearrangement.
  - expr: theta != theta_0
    message:
      es: theta y theta_0 no pueden ser idénticos si despejas alpha.
      en: theta and theta_0 must not be equal when solving for alpha.
  validity:
    es: Válida cuando el movimiento presenta \(\alpha\) constante dentro del intervalo.
    en: Valid when the motion has constant alpha over the interval.
  dimension_check: (T^-1)^2 = (T^-1)^2 + (T^-2)(1)
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - mcua
  result_semantics:
    target: omega
    meaning: Resulta util para interpretar omega en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: mcua_dtheta
  title:
    es: Desplazamiento angular
    en: Angular displacement
  equation: delta_theta = theta - theta_0
  latex: \Delta\theta = \theta - \theta_0
  rearrangements:
  - target: delta_theta
    equation: delta_theta = theta - theta_0
    latex: \Delta\theta = \theta - \theta_0
    constraints: []
  - target: theta
    equation: theta = delta_theta + theta_0
    latex: \theta = \Delta\theta + \theta_0
    constraints: []
  - target: theta_0
    equation: theta_0 = theta - delta_theta
    latex: \theta_0 = \theta - \Delta\theta
    constraints: []
  category: derived
  relation_type: geometric_interpretation
  physical_meaning:
    es: Convierte dos estados angulares en desplazamiento angular del movimiento circular.
    en: Converts two angular states into displacement during a time interval.
  constraints:
  - expr: 1
    message:
      es: Relación siempre válida por definición del desplazamiento angular.
      en: Relation is always valid by definition of angular displacement.
  validity:
    es: Válida siempre para el movimiento circular.
    en: Always valid for circular motion.
  dimension_check: 1 = 1 - 1
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - mcua
  result_semantics:
    target: delta_theta
    meaning: Resulta util para interpretar delta_theta en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
