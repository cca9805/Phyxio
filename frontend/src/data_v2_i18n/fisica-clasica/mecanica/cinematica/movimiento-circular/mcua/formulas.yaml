- id: mcua_v_omega
  title:
    es: Velocidad lineal y velocidad angular
    en: Linear speed and angular speed
  equation: v = omega*R
  latex: v = \omega R
  rearrangements:
  - target: v
    equation: v = omega*R
    latex: v = \omega R
    constraints: []
  - target: omega
    equation: omega = v/R
    latex: \omega = \frac{v}{R}
    constraints: []
  - target: R
    equation: R = v/omega
    latex: R = \frac{v}{\omega}
    constraints: []
  category: derived
  relation_type: geometric_interpretation
  physical_meaning:
    es: Conecta la tasa angular del giro con rapidez tangencial observable.
    en: Connects angular rate with observable tangential speed.
  constraints:
  - expr: R > 0
    message:
      es: R debe ser positivo.
      en: R must be positive.
  - expr: omega != 0
