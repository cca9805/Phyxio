- id: mcua_delta_t_theta
  title:
    es: Velocidad angular media
    en: Average angular speed
  equation: delta_theta = omega_med * delta_t
  latex: \Delta\theta = \omega_{\mathrm{med}} \Delta t
  rearrangements:
  - target: omega_med
    equation: omega_med = delta_theta/delta_t
    latex: \omega_{\mathrm{med}} = \frac{\Delta\theta}{\Delta t}
    constraints: []
  - target: delta_theta
    equation: delta_theta = omega_med*delta_t
    latex: \Delta\theta = \omega_{\mathrm{med}} \Delta t
    constraints: []
  - target: delta_t
    equation: delta_t = delta_theta/omega_med
    latex: \Delta t = \frac{\Delta\theta}{\omega_{\mathrm{med}}}
    constraints: []
  category: derived
  relation_type: average_relation
  physical_meaning:
    es: Relación de promedio angular útil cuando se conoce cambio global sobre un intervalo.
    en: Average angular-speed relation useful when only interval change is known.
  constraints:
  - expr: delta_t > 0
    message:
      es: El intervalo de tiempo debe ser positivo.
      en: The time interval must be positive.
  - expr: omega_med != 0
    message:
      es: omega_med no puede ser cero si despejas delta_t.
      en: omega_med cannot be zero when solving for delta_t.
  validity:
    es: Útil para intervalos completos o medición promedio; no reemplaza detalles instantáneos.
    en: Useful for complete intervals or averaged data; does not replace instantaneous description.
  dimension_check: 1 = (T^-1)(T)
