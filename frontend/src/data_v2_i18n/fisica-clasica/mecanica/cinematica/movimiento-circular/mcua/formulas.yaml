- id: mcua_longitud_arco
  title:
    es: Longitud de arco en MCUA
    en: Arc length in UACM
  equation: s = delta_theta*R
  latex: s = \Delta\theta R
  rearrangements:
  - target: s
    equation: s = delta_theta*R
    latex: s = \Delta\theta R
    constraints: []
  - target: delta_theta
    equation: delta_theta = s/R
    latex: \Delta\theta = \frac{s}{R}
    constraints: []
  - target: R
    equation: R = s/delta_theta
    latex: R = \frac{s}{\Delta\theta}
    constraints: []
  category: derived
  relation_type: geometric_interpretation
  physical_meaning:
    es: Traduce el ángulo barrido en metros reales recorridos sobre la circunferencia.
    en: Translates the swept angle into real meters traveled on the circumference.
  constraints:
  - expr: R > 0
    message:
      es: El radio debe ser positivo.
      en: The radius must be positive.
  - expr: delta_theta != 0
    message:
      es: El desplazamiento debe ser no nulo para despejar el radio.
      en: Displacement must be non-zero to solve for the radius.
  validity:
    es: Válida para cualquier tramo de trayectoria circular.
    en: Valid for any segment of circular trajectory.
  dimension_check: L = (1)L
