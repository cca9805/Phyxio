version: "1.0"
leaf: "mcua"

coord:
  title:
    es: Gráfica Coord · MCUA
    en: Coord Graph · Uniformly Accelerated Circular Motion
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  xMagnitude: t
  yMagnitude: ω
  relation:
    es: "En el movimiento circular uniformemente acelerado, la velocidad angular crece linealmente: ω(t) = ω₀ + α·t. La pendiente es la aceleración angular constante α."
    en: "In uniformly accelerated circular motion, angular velocity grows linearly: ω(t) = ω₀ + α·t. The slope is the constant angular acceleration α."
  physicalReading:
    es: La gráfica ω(t) es una recta cuya pendiente es la aceleración angular. El área bajo la curva es la variación angular Δθ.
    en: The ω(t) graph is a straight line whose slope is angular acceleration. The area under the curve is the angular displacement Δθ.
  slopeMeaning:
    es: La pendiente es la aceleración angular α (rad/s²). Positiva si el giro se acelera, negativa si decelera.
    en: The slope is angular acceleration α (rad/s²). Positive if rotation speeds up, negative if it slows down.
  interceptMeaning:
    es: El corte con el eje y es la velocidad angular inicial ω₀.
    en: The y-intercept is the initial angular velocity ω₀.
  curvatureMeaning:
    es: La gráfica ω(t) es recta (aceleración constante). La gráfica θ(t) es una parábola, análoga al MRUA traslacional.
    en: The ω(t) graph is straight (constant acceleration). The θ(t) graph is a parabola, analogous to translational UARM.
  signMeaning:
    es: "Velocidad angular positiva: giro antihorario. Negativa: giro horario. El cambio de signo indica inversión del sentido de giro."
    en: "Positive angular velocity: counterclockwise rotation. Negative: clockwise. Sign change indicates reversal of rotation direction."
  areaMeaning:
    es: Área bajo ω(t) en un intervalo es Δθ, la variación angular en ese periodo.
    en: Area under ω(t) over an interval is Δθ, the angular displacement in that period.
  domainMeaning:
    es: Válido para el intervalo en que α es constante. En la práctica, α puede variar con la carga o la fricción.
    en: Valid for the interval where α is constant. In practice, α may vary with load or friction.
  modelConnection:
    es: "Es el análogo rotacional del MRUA traslacional: α = τ/I (torque constante dividido momento de inercia)."
    en: "It is the rotational analogue of translational UARM: α = τ/I (constant torque divided by moment of inertia)."
  formulaConnection:
    es: Conecta con ω(t) = ω₀ + αt, θ(t) = θ₀ + ω₀t + ½αt² y ω² = ω₀² + 2αΔθ.
    en: Connects to ω(t) = ω₀ + αt, θ(t) = θ₀ + ω₀t + ½αt², and ω² = ω₀² + 2αΔθ.
  readingFocus:
    es: leer la pendiente de ω(t) como aceleración angular, el área bajo la curva como variación angular y el signo como sentido de giro.
    en: read the slope of ω(t) as angular acceleration, the area under the curve as angular displacement, and the sign as rotation direction.
  agentHints:
    es:
      - Todo lo que aplica al MRUA traslacional (x, v, a) tiene un análogo rotacional (θ, ω, α).
      - La aceleración angular α tiene componente centrípeta (constante en MCUA) y componente tangencial (= αr).
      - El frenado de una rueda es MCUA con α < 0.
    en:
      - Everything that applies to translational UARM (x, v, a) has a rotational analogue (θ, ω, α).
      - Angular acceleration α has a centripetal component (varies in UACM) and a tangential component (= αr).
      - Braking a wheel is UACM with α < 0.
  commonMistakes:
    es:
      - Confundir la aceleración angular α (rad/s²) con la aceleración centrípeta (m/s²).
      - Aplicar las ecuaciones del MCU (α = 0) en un movimiento circular con aceleración.
      - Olvidar que en MCUA hay tanto aceleración centrípeta como aceleración tangencial.
    en:
      - Confusing angular acceleration α (rad/s²) with centripetal acceleration (m/s²).
      - Applying UCM equations (α = 0) to a circular motion with acceleration.
      - Forgetting that in UACM there is both centripetal and tangential acceleration.

svg:
  title:
    es: Escena SVG · MCUA
    en: SVG Scene · Uniformly Accelerated Circular Motion
  sceneId: mcua_scene
  sceneLabel:
    es: Objeto en movimiento circular con aceleración angular, con componentes centrípeta y tangencial
    en: Object in circular motion with angular acceleration, with centripetal and tangential components
  objects:
    es:
      - objeto sobre la circunferencia
      - vector velocidad tangencial
      - vector aceleración centrípeta
      - vector aceleración tangencial
      - aceleración total
    en:
      - object on the circumference
      - tangential velocity vector
      - centripetal acceleration vector
      - tangential acceleration vector
      - total acceleration
  mainObject:
    es: objeto en MCUA
    en: object in UACM
  referenceFrame:
    es: plano del movimiento circular con el centro en el origen
    en: plane of circular motion with center at the origin
  geometry:
    es: "La escena muestra el objeto con dos componentes de aceleración: la centrípeta (radial hacia el centro, responsable del cambio de dirección) y la tangencial (en la dirección del movimiento, responsable del cambio de velocidad)."
    en: "The scene shows the object with two acceleration components: centripetal (radial toward center, responsible for direction change) and tangential (along the motion direction, responsible for speed change)."
  interactions:
    es: Un torque neto produce la aceleración angular. La fuerza resultante sobre el objeto tiene componente radial (centrípeta) y tangencial.
    en: A net torque produces angular acceleration. The resultant force on the object has radial (centripetal) and tangential components.
  modelElements:
    es:
      - vector a_c (radial)
      - vector a_t (tangencial)
      - vector a_total (suma vectorial)
      - radio r
    en:
      - vector a_c (radial)
      - vector a_t (tangential)
      - vector a_total (vector sum)
      - radius r
  visualCues:
    es:
      - "La aceleración tangencial es paralela a la velocidad: si mismo sentido, el objeto se acelera; si sentido opuesto, decelera."
      - La aceleración centrípeta siempre apunta al centro.
      - La aceleración total es la suma vectorial de ambas componentes y no apunta ni al centro ni a la tangente.
    en:
      - "Tangential acceleration is parallel to velocity: same direction means speeding up; opposite direction means slowing down."
      - Centripetal acceleration always points toward the center.
      - Total acceleration is the vector sum of both components and points neither toward the center nor along the tangent.
  scaleMeaning:
    es: "Los vectores son cualitativos: ilustran la descomposición de la aceleración en sus componentes."
    en: "Vectors are qualitative: they illustrate the decomposition of acceleration into its components."
  relation:
    es: La escena ilustra que en MCUA el objeto tiene simultáneamente aceleración centrípeta (cambia la dirección) y tangencial (cambia el módulo de la velocidad).
    en: The scene illustrates that in UACM the object has simultaneous centripetal (direction change) and tangential (speed change) acceleration.
  physicalReading:
    es: Identificar las dos componentes de aceleración y deducir si el objeto se está acelerando o frenando a partir del sentido de la aceleración tangencial.
    en: Identify the two acceleration components and deduce whether the object is speeding up or slowing down from the direction of tangential acceleration.
  modelConnection:
    es: "Se interpreta bajo el MCUA: aceleración angular constante con componentes radial y tangencial."
    en: "Interpreted within UACM: constant angular acceleration with radial and tangential components."
  formulaConnection:
    es: Conecta con a_c = ω²r, a_t = αr y a_total = √(a_c² + a_t²).
    en: Connects to a_c = ω²r, a_t = αr, and a_total = √(a_c² + a_t²).
  readingFocus:
    es: identificar las dos componentes de aceleración e interpretar si la tangencial aumenta o disminuye el módulo de la velocidad.
    en: identify the two acceleration components and interpret whether the tangential one increases or decreases the speed.
  agentHints:
    es:
      - Si la aceleración tangencial apunta en el mismo sentido que la velocidad, el objeto se acelera; si es opuesta, decelera.
      - La aceleración centrípeta existe en cualquier movimiento circular, sea MCU o MCUA.
      - La aceleración total en MCUA siempre tiene componente radial y puede tener componente tangencial.
    en:
      - If tangential acceleration points in the same direction as velocity, the object speeds up; if opposite, it slows down.
      - Centripetal acceleration exists in any circular motion, whether UCM or UACM.
      - Total acceleration in UACM always has a radial component and may have a tangential component.
  commonMistakes:
    es:
      - Ignorar la componente centrípeta y considerar solo la tangencial en el MCUA.
      - Pensar que la aceleración total en MCUA apunta al centro.
      - Confundir aceleración tangencial con velocidad tangencial.
    en:
      - Ignoring the centripetal component and considering only the tangential one in UACM.
      - Thinking the total acceleration in UACM points toward the center.
      - Confusing tangential acceleration with tangential velocity.
