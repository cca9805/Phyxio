version: 1
magnitudes:
  - id: R
    symbol: 'R'
    nombre:
      es: radio de giro
      en: turning radius
    descripcion:
      es: Distancia constante desde el centro de la circunferencia hasta el objeto en movimiento.
      en: Constant distance from the center of the circle to the moving object.
    unidad_si: m
    dimension: L
    is_vector: false
    components: null
    category: geometric
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "En el MCUA, aunque la velocidad cambie, el radio[[R]]permanece constante."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Magnitud de la distancia al centro.
        en: Magnitude of the distance to the center.
    zero_behavior:
      allowed: false
      meaning:
        es: Un radio nulo no permite un movimiento circular.
        en: A null radius does not allow circular motion.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es el factor de conversión entre magnitudes angulares y lineales.
  - id: theta
    symbol: '\theta'
    nombre:
      es: posición angular
      en: angular position
    descripcion:
      es: Ángulo que determina la ubicación del móvil en un instante dado.
      en: Angle that determines the object's location at a given instant.
    unidad_si: rad
    dimension: '1'
    is_vector: false
    components: null
    category: geometric
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "En el MCUA, la posición angular[[theta]]crece de forma cuadrática con el tiempo."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Sentido antihorario (+) o horario (-).
        en: Counter-clockwise (+) or clockwise (-).
    zero_behavior:
      allowed: true
      meaning:
        es: Punto de referencia angular inicial.
        en: Initial angular reference point.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Se mide siempre en radianes para las ecuaciones cinemáticas.
  - id: omega
    symbol: '\omega'
    nombre:
      es: velocidad angular
      en: angular velocity
    descripcion:
      es: Ritmo al que cambia la posición angular en cada instante.
      en: Rate at which the angular position changes at each instant.
    unidad_si: rad/s
    dimension: T^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: En el MCUA la[[omega]]no es constante; aumenta o disminuye linealmente.
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Sentido de la rotación instantánea.
        en: Direction of instantaneous rotation.
    zero_behavior:
      allowed: true
      meaning:
        es: El objeto está en reposo angular momentáneo.
        en: The object is at momentary angular rest.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Su variación está gobernada por la aceleración angular[[alpha]].
  - id: alpha
    symbol: '\alpha'
    nombre:
      es: aceleración angular
      en: angular acceleration
    descripcion:
      es: Tasa de cambio constante de la velocidad angular.
      en: Constant rate of change of angular velocity.
    unidad_si: rad/s^2
    dimension: T^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Si la[[alpha]]y la[[omega]]tienen el mismo signo, el giro se acelera; si son opuestos, se frena."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Indica si la rotación se vuelve más rápida o más lenta.
        en: Indicates if the rotation is becoming faster or slower.
    zero_behavior:
      allowed: true
      meaning:
        es: Si es cero, el movimiento vuelve a ser un MCU.
        en: If zero, the motion returns to being a UCM.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Define la "intensidad" con la que cambia el ritmo de giro.
  - id: a_t
    symbol: 'a_t'
    nombre:
      es: aceleración tangencial
      en: tangential acceleration
    descripcion:
      es: Aceleración responsable de cambiar el módulo de la velocidad lineal (rapidez).
      en: Acceleration responsible for changing the magnitude of linear velocity (speed).
    unidad_si: m/s^2
    dimension: LT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "No confundas la tangencial[[a_t]](cambia la rapidez) con la centrípeta[[a_c]](cambia la dirección)."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Aumenta (+) o disminuye (-) la rapidez tangencial.
        en: Increases (+) or decreases (-) tangential speed.
    zero_behavior:
      allowed: true
      meaning:
        es: Rapidez tangencial constante.
        en: Constant tangential speed.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es el producto de la aceleración angular[[alpha]]por el radio[[R]].
  - id: a_c
    symbol: 'a_c'
    nombre:
      es: aceleración centrípeta
      en: centripetal acceleration
    descripcion:
      es: Aceleración dirigida hacia el centro, responsable de mantener la curvatura.
      en: Inward-directed acceleration, responsible for maintaining curvature.
    unidad_si: m/s^2
    dimension: LT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: En el MCUA la[[a_c]]no es constante porque la velocidad[[v]]está cambiando.
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Magnitud de la aceleración normal.
        en: Magnitude of the normal acceleration.
    zero_behavior:
      allowed: true
      meaning:
        es: Trayectoria rectilínea o reposo momentáneo.
        en: Rectilinear path or momentary rest.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Crece cuadráticamente con la velocidad angular[[omega]].
  - id: a
    symbol: 'a'
    nombre:
      es: aceleración total
      en: total acceleration
    descripcion:
      es: Módulo resultante de combinar la aceleración tangencial y la centrípeta.
      en: Resultant magnitude of combining tangential and centripetal acceleration.
    unidad_si: m/s^2
    dimension: LT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Se calcula mediante Pitágoras, ya que[[a_t]]y[[a_c]]son perpendiculares."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Módulo de la aceleración neta.
        en: Magnitude of net acceleration.
    zero_behavior:
      allowed: true
      meaning:
        es: Repeso absoluto o movimiento rectilíneo uniforme.
        en: Absolute rest or uniform rectilinear motion.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es la aceleración real que experimenta el punto del objeto.
  - id: t
    symbol: 't'
    nombre:
      es: tiempo
      en: time
    descripcion:
      es: Instante cronológico de la observación.
      en: Chronological instant of observation.
    unidad_si: s
    dimension: T
    is_vector: false
    components: null
    category: basic
    physical_role: coordinate
    used_in:
      - mcua
    common_mistake: "No confundas el instante[[t]]con la duración del intervalo[[dt]]."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: El tiempo siempre fluye hacia adelante.
        en: Time always flows forward.
    zero_behavior:
      allowed: true
      meaning:
        es: Origen cronológico del experimento.
        en: Chronological origin of the experiment.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Variable independiente en la mayoría de gráficas de evolución.
  - id: delta_t
    symbol: '\Delta t'
    nombre:
      es: intervalo de tiempo
      en: time interval
    descripcion:
      es: Duración o transcurso entre dos instantes.
      en: Duration or lapse between two instants.
    unidad_si: s
    dimension: T
    is_vector: false
    components: null
    category: basic
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Olvidar que las variaciones de velocidad ocurren 'durante' un[[delta_t]]."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Los intervalos son duraciones positivas.
        en: Intervals are positive durations.
    zero_behavior:
      allowed: false
      meaning:
        es: Un intervalo nulo implica que no ha transcurrido tiempo.
        en: A null interval implies no time has passed.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Factor clave para integrar la aceleración.
  - id: theta_0
    symbol: '\theta_0'
    nombre:
      es: posición angular inicial
      en: initial angular position
    descripcion:
      es: Ángulo en el que se encuentra el objeto al inicio del estudio (t=0).
      en: Angle where the object is at the beginning of the study (t=0).
    unidad_si: rad
    dimension: '1'
    is_vector: false
    components: null
    category: geometric
    physical_role: parameter
    used_in:
      - mcua
    common_mistake: "Ignorar la[[theta_0]]desplaza toda la trayectoria angular."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Orientación inicial respecto al eje de referencia.
        en: Initial orientation relative to the reference axis.
    zero_behavior:
      allowed: true
      meaning:
        es: El objeto empieza en el origen de ángulos.
        en: The object starts at the angle origin.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es la "constante de integración" de la velocidad.
  - id: omega_0
    symbol: '\omega_0'
    nombre:
      es: velocidad angular inicial
      en: initial angular velocity
    descripcion:
      es: Ritmo de giro en el instante en que comienza a actuar la aceleración angular.
      en: Rotation rate at the instant angular acceleration starts acting.
    unidad_si: rad/s
    dimension: T^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: parameter
    used_in:
      - mcua
    common_mistake: "En el frenado, la[[omega_0]]es alta y disminuye hasta cero."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Sentido del giro inicial.
        en: Initial rotation direction.
    zero_behavior:
      allowed: true
      meaning:
        es: El objeto parte del reposo angular.
        en: The object starts from angular rest.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Determina la pendiente inicial de la gráfica theta-t.
  - id: delta_theta
    symbol: '\Delta \theta'
    nombre:
      es: desplazamiento angular
      en: angular displacement
    descripcion:
      es: Ángulo neto barrido por el móvil durante un intervalo.
      en: Net angle swept by the object during an interval.
    unidad_si: rad
    dimension: '1'
    is_vector: false
    components: null
    category: geometric
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Confundir[[delta_theta]]con la posición final[[theta]]."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Indica el balance de giro acumulado.
        en: Indicates the accumulated rotation balance.
    zero_behavior:
      allowed: true
      meaning:
        es: El objeto vuelve a la posición angular de partida.
        en: The object returns to the starting angular position.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es el área bajo la curva en una gráfica omega-t.
  - id: v
    symbol: 'v'
    nombre:
      es: rapidez tangencial
      en: tangential speed
    descripcion:
      es: Magnitud de la velocidad lineal en el borde de la trayectoria.
      en: Magnitude of the linear velocity at the path's edge.
    unidad_si: m/s
    dimension: LT^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "En el MCUA, la rapidez[[v]]cambia proporcionalmente a la[[omega]]."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Rapidez escalar del movimiento.
        en: Scalar speed of the motion.
    zero_behavior:
      allowed: true
      meaning:
        es: Reposo lineal momentáneo.
        en: Momentary linear rest.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Permite conectar el giro con distancias reales en el suelo.
  - id: s
    symbol: 's'
    nombre:
      es: longitud de arco
      en: arc length
    descripcion:
      es: Distancia física recorrida sobre la trayectoria curva.
      en: Physical distance traveled over the curved path.
    unidad_si: m
    dimension: L
    is_vector: false
    components: null
    category: geometric
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "No confundas el arco[[s]]con el desplazamiento lineal recto."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Distancia acumulada sobre la circunferencia.
        en: Accumulated distance over the circle.
    zero_behavior:
      allowed: true
      meaning:
        es: El objeto no se ha movido del sitio.
        en: The object has not moved from the spot.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es el producto del radio[[R]]por el ángulo[[delta_theta]].
  - id: N
    symbol: 'N'
    nombre:
      es: número de vueltas
      en: number of revolutions
    descripcion:
      es: Conteo de ciclos completos o parciales realizados.
      en: Count of complete or partial cycles performed.
    unidad_si: '1'
    dimension: '1'
    is_vector: false
    components: null
    category: basic
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Olvidar que una vuelta equivale a 2*pi radianes."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: false
      meaning:
        es: Cantidad de rotaciones acumuladas.
        en: Amount of accumulated rotations.
    zero_behavior:
      allowed: true
      meaning:
        es: No se ha completado ninguna fracción de vuelta.
        en: No fraction of a turn has been completed.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Magnitud muy intuitiva para el alumno.
  - id: omega_med
    symbol: '\omega_{\text{med}}'
    nombre:
      es: velocidad angular media
      en: average angular velocity
    descripcion:
      es: Promedio aritmético de la velocidad inicial y final en un tramo acelerado.
      en: Arithmetic average of initial and final velocity in an accelerated segment.
    unidad_si: rad/s
    dimension: T^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - mcua
    common_mistake: "Solo es válida para tramos con aceleración[[alpha]]constante."
    typical_range: Context-dependent.
    sign_behavior:
      has_sign: true
      meaning:
        es: Sentido del giro promedio.
        en: Average rotation direction.
    zero_behavior:
      allowed: true
      meaning:
        es: El giro neto promedio es nulo.
        en: The average net rotation is zero.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - mcua
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Permite simplificar cálculos de posición sin usar integrales.
