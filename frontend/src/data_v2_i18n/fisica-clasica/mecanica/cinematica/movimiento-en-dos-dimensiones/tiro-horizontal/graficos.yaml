version: "1.0"
leaf: "tiro-horizontal"

coord:
  title:
    es: Gráfica Coord · Tiro Horizontal
    en: Coord Graph · Horizontal Projectile Motion
  xAxis:
    es: posición horizontal x (m)
    en: horizontal position x (m)
  yAxis:
    es: altura y (m)
    en: height y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: En el tiro horizontal, la componente horizontal es MRU (x = v₀·t) y la vertical es MRUA (y = y₀ − ½gt²). La trayectoria y(x) es una parábola con vértice en el punto de lanzamiento.
    en: In horizontal projectile motion, the horizontal component is URM (x = v₀·t) and the vertical is UARM (y = y₀ − ½gt²). The trajectory y(x) is a parabola with vertex at the launch point.
  physicalReading:
    es: La trayectoria es siempre una parábola cóncava hacia abajo. La curvatura inicial es pequeña (la gravedad tarda en actuar) y crece con la caída.
    en: The trajectory is always a downward-concave parabola. Initial curvature is small (gravity takes time to act) and increases with the fall.
  slopeMeaning:
    es: "La pendiente de la trayectoria y(x) en cada punto es dy/dx = v_y/v_x = −gt/v₀, que aumenta en magnitud con el tiempo: el ángulo de caída crece."
    en: "The slope of the trajectory y(x) at each point is dy/dx = v_y/v_x = −gt/v₀, which grows in magnitude with time: the fall angle increases."
  interceptMeaning:
    es: El corte con el eje y es la altura de lanzamiento y₀. La trayectoria empieza horizontalmente (pendiente cero) en ese punto.
    en: The y-intercept is the launch height y₀. The trajectory starts horizontally (zero slope) at that point.
  curvatureMeaning:
    es: "La curvatura de la parábola es proporcional a g/v₀²: mayor gravedad o menor velocidad horizontal produce trayectorias más curvadas."
    en: "The parabola's curvature is proportional to g/v₀²: greater gravity or smaller horizontal speed produces more curved trajectories."
  signMeaning:
    es: "La posición vertical y disminuye siempre: el objeto solo puede caer en el tiro horizontal, nunca subir."
    en: "Vertical position y always decreases: in horizontal projection the object can only fall, never rise."
  areaMeaning:
    es: Sin interpretación directa en el diagrama y(x).
    en: No direct interpretation in the y(x) diagram.
  domainMeaning:
    es: Válido para 0 ≤ x ≤ alcance, desde el punto de lanzamiento hasta el impacto con el suelo.
    en: Valid for 0 ≤ x ≤ range, from the launch point to ground impact.
  modelConnection:
    es: "Se interpreta descomponiendo el movimiento en dos componentes independientes: MRU horizontal y MRUA vertical."
    en: "Interpreted by decomposing the motion into two independent components: horizontal URM and vertical UARM."
  formulaConnection:
    es: "Conecta con x = v₀·t, y = y₀ − ½gt² y eliminando t: y = y₀ − (g/(2v₀²))x²."
    en: "Connects to x = v₀·t, y = y₀ − ½gt² and eliminating t: y = y₀ − (g/(2v₀²))x²."
  readingFocus:
    es: leer la posición de impacto como el alcance horizontal, la pendiente en el punto de impacto como el ángulo final y la curvatura como función de g y v₀.
    en: read the impact position as horizontal range, the slope at impact as the final angle, and curvature as a function of g and v₀.
  agentHints:
    es:
      - La trayectoria del tiro horizontal es siempre una parábola con vértice en el punto de lanzamiento.
      - La velocidad horizontal v₀ no cambia durante todo el vuelo (sin resistencia del aire).
      - "El tiempo de vuelo depende solo de la altura de lanzamiento: t = √(2y₀/g)."
    en:
      - The trajectory of horizontal projection is always a parabola with vertex at the launch point.
      - Horizontal velocity v₀ does not change throughout the flight (without air resistance).
      - "Flight time depends only on launch height: t = √(2y₀/g)."
  commonMistakes:
    es:
      - Creer que la componente horizontal se ve afectada por la gravedad.
      - Confundir alcance horizontal con el tiempo de vuelo.
      - Olvidar que la velocidad al impacto tiene componentes tanto horizontales como verticales.
    en:
      - Believing the horizontal component is affected by gravity.
      - Confusing horizontal range with flight time.
      - Forgetting that impact velocity has both horizontal and vertical components.

svg:
  title:
    es: Escena SVG · Tiro Horizontal
    en: SVG Scene · Horizontal Projectile Motion
  sceneId: tiro_horizontal_scene
  sceneLabel:
    es: Proyectil lanzado horizontalmente desde una altura
    en: Projectile launched horizontally from a height
  objects:
    es:
      - proyectil
      - trayectoria parabólica
      - vector velocidad horizontal v₀
      - vector velocidad vertical v_y(t)
      - vector velocidad total
    en:
      - projectile
      - parabolic trajectory
      - horizontal velocity vector v₀
      - vertical velocity vector v_y(t)
      - total velocity vector
  mainObject:
    es: proyectil en tiro horizontal
    en: projectile in horizontal projection
  referenceFrame:
    es: sistema de referencia con origen en el punto de lanzamiento, x horizontal y y vertical
    en: reference frame with origin at the launch point, x horizontal and y vertical
  geometry:
    es: La escena muestra el proyectil en distintos instantes con sus vectores de velocidad. La componente horizontal v_x es constante; la vertical v_y crece en módulo hacia abajo.
    en: The scene shows the projectile at different instants with its velocity vectors. The horizontal component v_x is constant; the vertical v_y grows in magnitude downward.
  interactions:
    es: Solo actúa la gravedad verticalmente. No hay fuerza horizontal (resistencia del aire despreciada).
    en: Only gravity acts vertically. There is no horizontal force (air resistance neglected).
  modelElements:
    es:
      - vector v_x = v₀ (constante)
      - vector v_y = −gt (creciente)
      - trayectoria parabólica
      - altura inicial y₀
    en:
      - vector v_x = v₀ (constant)
      - vector v_y = −gt (growing)
      - parabolic trajectory
      - initial height y₀
  visualCues:
    es:
      - La componente horizontal del vector velocidad tiene la misma longitud en todos los instantes.
      - La componente vertical crece progresivamente hacia abajo.
      - El vector velocidad total gira progresivamente hacia abajo a medida que cae el proyectil.
    en:
      - The horizontal component of the velocity vector has the same length at all instants.
      - The vertical component grows progressively downward.
      - The total velocity vector rotates progressively downward as the projectile falls.
  scaleMeaning:
    es: Los vectores son proporcionales a sus magnitudes. La rotación progresiva del vector velocidad ilustra el aumento del ángulo de caída.
    en: Vectors are proportional to their magnitudes. The progressive rotation of the velocity vector illustrates the increasing fall angle.
  relation:
    es: "La escena ilustra la independencia de las componentes horizontal y vertical: la gravedad solo afecta al movimiento vertical."
    en: "The scene illustrates the independence of horizontal and vertical components: gravity only affects vertical motion."
  physicalReading:
    es: Leer la constancia del vector horizontal y el crecimiento del vector vertical para deducir la descomposición del movimiento proyectil.
    en: Read the constancy of the horizontal vector and the growth of the vertical vector to deduce the decomposition of projectile motion.
  modelConnection:
    es: "Se interpreta bajo el modelo de movimiento proyectil: MRU horizontal + MRUA vertical."
    en: "Interpreted within the projectile motion model: horizontal URM + vertical UARM."
  formulaConnection:
    es: Conecta con v_x = v₀, v_y = −gt y v_total = √(v₀² + (gt)²).
    en: Connects to v_x = v₀, v_y = −gt, and v_total = √(v₀² + (gt)²).
  readingFocus:
    es: verificar visualmente que el vector horizontal es constante y que el vector vertical aumenta linealmente con el tiempo.
    en: visually verify that the horizontal vector is constant and the vertical vector increases linearly with time.
  agentHints:
    es:
      - La componente horizontal de la velocidad es constante durante todo el vuelo.
      - El ángulo del vector velocidad total con la horizontal aumenta progresivamente hasta el impacto.
      - La trayectoria proyectada sobre el eje horizontal es una recta; proyectada sobre el eje vertical es una parábola.
    en:
      - The horizontal component of velocity is constant throughout the flight.
      - The angle of the total velocity vector with the horizontal increases progressively until impact.
      - The trajectory projected onto the horizontal axis is a straight line; projected onto the vertical axis it is a parabola.
  commonMistakes:
    es:
      - Dibujar el vector velocidad horizontal decreciendo con el tiempo.
      - Pensar que el proyectil tiene velocidad vertical inicial.
      - Ignorar que el vector velocidad al impactar no es horizontal.
    en:
      - Drawing the horizontal velocity vector decreasing with time.
      - Thinking the projectile has an initial vertical velocity.
      - Ignoring that the velocity vector at impact is not horizontal.
