version: "1.0"
leaf: "tiro-parabolico"

coord:
  title:
    es: Gráfica Coord · Tiro Parabólico
    en: Coord Graph · Projectile Motion
  xAxis:
    es: posición horizontal x (m)
    en: horizontal position x (m)
  yAxis:
    es: altura y (m)
    en: height y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: En el tiro parabólico el objeto se lanza con velocidad v₀ y ángulo θ. La trayectoria y(x) es una parábola simétrica cuyo vértice es la altura máxima, y el alcance máximo se logra con θ = 45°.
    en: In projectile motion the object is launched with speed v₀ and angle θ. The trajectory y(x) is a symmetric parabola whose vertex is maximum height, and maximum range is achieved at θ = 45°.
  physicalReading:
    es: La parábola sube hasta el vértice (donde v_y = 0) y baja simétricamente. La pendiente en el lanzamiento es tan(θ) y en el impacto es −tan(θ) (si el terreno es horizontal).
    en: The parabola rises to the vertex (where v_y = 0) and descends symmetrically. Slope at launch is tan(θ) and at impact is −tan(θ) (on horizontal ground).
  slopeMeaning:
    es: La pendiente de y(x) en cada punto es v_y/v_x. En el lanzamiento es +tan(θ), en el vértice es 0 y en el impacto es −tan(θ).
    en: The slope of y(x) at each point is v_y/v_x. At launch it is +tan(θ), at the vertex it is 0, and at impact it is −tan(θ).
  interceptMeaning:
    es: El corte con el eje x en el punto de lanzamiento indica la posición inicial. El segundo corte es el alcance horizontal R.
    en: The x-axis crossing at the launch point indicates the initial position. The second crossing is the horizontal range R.
  curvatureMeaning:
    es: "La curvatura de la parábola es −g/v₀²cos²(θ): mayor gravedad o menor velocidad horizontal produce trayectorias más cerradas."
    en: "The parabola's curvature is −g/v₀²cos²(θ): greater gravity or smaller horizontal speed produces tighter trajectories."
  signMeaning:
    es: La componente vertical es positiva al subir y negativa al bajar. La horizontal siempre es positiva si el proyectil avanza en +x.
    en: The vertical component is positive while rising and negative while falling. The horizontal is always positive if the projectile moves in +x.
  areaMeaning:
    es: Sin interpretación directa en el diagrama y(x).
    en: No direct interpretation in the y(x) diagram.
  domainMeaning:
    es: Válido desde el punto de lanzamiento hasta el impacto, siempre que se desprecie la resistencia del aire y el campo gravitatorio sea uniforme.
    en: Valid from the launch point to impact, provided air resistance is neglected and the gravitational field is uniform.
  modelConnection:
    es: Se interpreta descomponiendo el movimiento en v_x = v₀cosθ (MRU) y v_y = v₀senθ − gt (MRUA).
    en: Interpreted by decomposing motion into v_x = v₀cosθ (URM) and v_y = v₀sinθ − gt (UARM).
  formulaConnection:
    es: Conecta con y(x) = x·tanθ − (g/(2v₀²cos²θ))·x², H = v₀²sen²θ/(2g) y R = v₀²sen(2θ)/g.
    en: Connects to y(x) = x·tanθ − (g/(2v₀²cos²θ))·x², H = v₀²sin²θ/(2g), and R = v₀²sin(2θ)/g.
  readingFocus:
    es: leer el vértice como la altura máxima, el segundo corte con el eje x como el alcance y la pendiente inicial como el ángulo de lanzamiento.
    en: read the vertex as maximum height, the second x-axis crossing as range, and the initial slope as the launch angle.
  agentHints:
    es:
      - El alcance máximo se logra con θ = 45° en terreno horizontal.
      - Los ángulos complementarios (por ejemplo, 30° y 60°) producen el mismo alcance.
      - La altura máxima aumenta con el cuadrado de la velocidad inicial y con el cuadrado del seno del ángulo.
    en:
      - Maximum range is achieved at θ = 45° on horizontal ground.
      - Complementary angles (e.g., 30° and 60°) produce the same range.
      - Maximum height increases with the square of initial speed and the square of the sine of the angle.
  commonMistakes:
    es:
      - Creer que el máximo alcance siempre es con 45° cuando el terreno de llegada tiene altura distinta al lanzamiento.
      - Olvidar que la velocidad horizontal es constante durante todo el vuelo.
      - Aplicar la simetría de la parábola cuando el punto de impacto no tiene la misma altura que el de lanzamiento.
    en:
      - Believing maximum range is always at 45° when landing height differs from launch height.
      - Forgetting that horizontal velocity is constant throughout the flight.
      - Applying parabola symmetry when the impact point is not at the same height as the launch point.

svg:
  title:
    es: Escena SVG · Tiro Parabólico
    en: SVG Scene · Projectile Motion
  sceneId: tiro_parabolico_scene
  sceneLabel:
    es: Proyectil lanzado con velocidad v₀ y ángulo θ, con trayectoria parabólica
    en: Projectile launched with speed v₀ and angle θ, with parabolic trajectory
  objects:
    es:
      - proyectil
      - trayectoria parabólica
      - vector v₀ con ángulo θ
      - altura máxima H
      - alcance R
      - vectores de velocidad en distintos instantes
    en:
      - projectile
      - parabolic trajectory
      - vector v₀ at angle θ
      - maximum height H
      - range R
      - velocity vectors at different instants
  mainObject:
    es: proyectil en tiro parabólico
    en: projectile in parabolic motion
  referenceFrame:
    es: sistema de referencia con origen en el punto de lanzamiento
    en: reference frame with origin at the launch point
  geometry:
    es: La escena muestra la trayectoria parabólica completa con los vectores de velocidad en varios instantes. El vector velocidad es tangente a la trayectoria en cada punto.
    en: The scene shows the complete parabolic trajectory with velocity vectors at several instants. The velocity vector is tangent to the trajectory at each point.
  interactions:
    es: Solo actúa la gravedad verticalmente. La componente horizontal de velocidad es constante y la vertical cambia con aceleración g.
    en: Only gravity acts vertically. The horizontal velocity component is constant and the vertical changes with acceleration g.
  modelElements:
    es:
      - vector v_x = v₀cosθ (constante)
      - vector v_y (variable)
      - altura máxima H
      - alcance horizontal R
      - ángulo de lanzamiento θ
    en:
      - vector v_x = v₀cosθ (constant)
      - vector v_y (variable)
      - maximum height H
      - horizontal range R
      - launch angle θ
  visualCues:
    es:
      - "El vector velocidad es tangente a la trayectoria en cada punto: en el vértice es horizontal."
      - La simetría de la parábola implica que la velocidad al impacto tiene el mismo módulo que al lanzamiento.
      - El vector velocidad horizontal tiene la misma longitud en todos los puntos de la trayectoria.
    en:
      - "The velocity vector is tangent to the trajectory at each point: at the vertex it is horizontal."
      - Parabola symmetry implies that impact speed equals launch speed in magnitude.
      - The horizontal velocity vector has the same length at all points of the trajectory.
  scaleMeaning:
    es: Los vectores son proporcionales. La longitud del vector velocidad total disminuye al subir y aumenta al bajar.
    en: Vectors are proportional. The length of the total velocity vector decreases while rising and increases while falling.
  relation:
    es: La escena ilustra la independencia de las componentes horizontal y vertical del movimiento proyectil, y la simetría de la trayectoria parabólica.
    en: The scene illustrates the independence of horizontal and vertical components of projectile motion, and the symmetry of the parabolic trajectory.
  physicalReading:
    es: Leer el ángulo de lanzamiento, la altura máxima en el vértice y el alcance en el segundo punto de intersección con el suelo.
    en: Read the launch angle, maximum height at the vertex, and range at the second ground intersection.
  modelConnection:
    es: "Se interpreta bajo el modelo de movimiento proyectil: descomposición en dos MRUA/MRU independientes."
    en: "Interpreted within the projectile motion model: decomposition into two independent UARM/URM components."
  formulaConnection:
    es: Conecta con R = v₀²sen(2θ)/g, H = v₀²sen²θ/(2g) y t_vuelo = 2v₀senθ/g.
    en: Connects to R = v₀²sin(2θ)/g, H = v₀²sin²θ/(2g), and t_flight = 2v₀sinθ/g.
  readingFocus:
    es: identificar el vértice (altura máxima), el alcance (segundo corte con el suelo) y el ángulo del vector velocidad inicial respecto a la horizontal.
    en: identify the vertex (maximum height), the range (second ground crossing), and the angle of the initial velocity vector with the horizontal.
  agentHints:
    es:
      - "El vector velocidad en el vértice es horizontal: la componente vertical es cero en ese punto."
      - La trayectoria es simétrica respecto al vértice si el suelo de lanzamiento e impacto están a la misma altura.
      - Los ángulos complementarios dan el mismo alcance pero diferentes alturas máximas.
    en:
      - "The velocity vector at the vertex is horizontal: the vertical component is zero at that point."
      - The trajectory is symmetric about the vertex if launch and landing heights are equal.
      - Complementary angles give the same range but different maximum heights.
  commonMistakes:
    es:
      - Pensar que la velocidad es cero en el vértice (solo es cero v_y, no v_x).
      - Olvidar que la simetría solo se aplica si el suelo de impacto tiene la misma altura que el de lanzamiento.
      - Dibujar el vector velocidad perpendicular a la trayectoria en lugar de tangente.
    en:
      - Thinking speed is zero at the vertex (only v_y is zero, not v_x).
      - Forgetting that symmetry only applies if impact ground is at the same height as the launch ground.
      - Drawing the velocity vector perpendicular to the trajectory instead of tangent.
