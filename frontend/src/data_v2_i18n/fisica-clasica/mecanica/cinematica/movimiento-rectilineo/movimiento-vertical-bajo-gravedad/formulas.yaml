version: 1
formulas:
- id: caida_libre_posicion
  title:
    es: Ecuación horaria de la posición vertical
    en: Vertical position-time equation
  equation: y = y0 + v0*t - 0.5*g*t^2
  latex: y = y_0 + v_0 t - \frac{1}{2} g t^2
  rearrangements:
  - target: v0
    latex: v_0 = \frac{y - y_0 + \frac{1}{2} g t^2}{t}
    equation: v0 = (y - y0 + 0.5*g*t^2)/t
    constraints: []
  - target: y0
    latex: y_0 = y - v_0 t + \frac{1}{2} g t^2
    equation: y0 = y - v0*t + 0.5*g*t^2
    constraints: []
  category: fundamental
  relation_type: constitutive_relation
  physical_meaning:
    es: Modela la trayectoria parabólica vertical bajo la influencia de la gravedad.
    en: Models the vertical parabolic trajectory under the influence of gravity.
  constraints:
  - ausencia de resistencia del aire
  - g constante y orientada hacia abajo
  validity:
    es: Válido cerca de la superficie terrestre para objetos con baja densidad de arrastre.
    en: Valid near the Earth's surface for objects with low drag density.
  dimension_check: '[L] = [L] + [L/T][T] - [L/T^2][T^2] = [L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Cálculo de altura máxima
  - Predicción de tiempo de impacto
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: v0
    meaning: Resulta util para interpretar v0 en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: caida_libre_velocidad
  title:
    es: Ecuación de velocidad vertical
    en: Vertical velocity-time equation
  equation: v = v0 - g*t
  latex: v = v_0 - g t
  rearrangements:
  - target: t
    latex: t = \frac{v_0 - v}{g}
    equation: t = (v0 - v)/g
    constraints: []
  - target: v0
    latex: v_0 = v + g t
    equation: v0 = v + g*t
    constraints: []
  category: fundamental
  relation_type: differential_relation
  physical_meaning:
    es: Describe la reducción o aumento lineal de la velocidad debido a la gravedad.
    en: Describes the linear reduction or increase of velocity due to gravity.
  constraints:
  - movimiento puramente vertical
  validity:
    es: Régimen cinemático estándar de caída libre.
    en: Standard free-fall kinematic regime.
  dimension_check: '[L/T] = [L/T] - [L/T^2][T] = [L/T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Determinación de velocidad de impacto
  - Cálculo de tiempo de vuelo
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: t
    meaning: Resulta util para interpretar t en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: caida_libre_torricelli
  title:
    es: Ecuación de Torricelli vertical
    en: Vertical Torricelli's equation
  equation: v^2 = v0^2 - 2*g*(y - y0)
  latex: v^2 = v_0^2 - 2 g (y - y_0)
  rearrangements:
  - target: v
    latex: v = \pm \sqrt{v_0^2 - 2 g (y - y_0)}
    equation: v = sqrt(v0^2 - 2*g*(y - y0))
    constraints: []
  - target: y
    latex: y = y_0 + \frac{v_0^2 - v^2}{2g}
    equation: y = y0 + (v0^2 - v^2)/(2*g)
    constraints: []
  category: derived
  relation_type: integral_relation
  physical_meaning:
    es: Relaciona el cambio de velocidad con el desplazamiento sin depender del tiempo.
    en: Relates velocity change with displacement without depending on time.
  constraints:
  - g != 0
  validity:
    es: Útil en problemas donde se desconoce la duración del evento.
    en: Useful in problems where the duration of the event is unknown.
  dimension_check: '[L^2/T^2] = [L^2/T^2] - [L/T^2][L] = [L^2/T^2]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Cálculo de altura máxima despejando cuando v = 0
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: v
    meaning: Resulta util para interpretar v en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: caida_libre_tiempo_vuelo
  title:
    es: Tiempo de impacto (desde altura y sin v0)
    en: Impact time (from height without v0)
  equation: t = sqrt(2*h/g)
  latex: t = \sqrt{\frac{2h}{g}}
  rearrangements:
  - target: h
    latex: h = \frac{1}{2} g t^2
    equation: h = 0.5*g*t^2
    constraints: []
  category: auxiliary
  relation_type: geometric_interpretation
  physical_meaning:
    es: Determina la duración de una caída libre pura desde una altura h.
    en: Determines the duration of a pure free fall from a height h.
  constraints:
  - v0 = 0
  - objeto se suelta desde el reposo
  validity:
    es: Casos de caída libre pura sin impulso inicial.
    en: Pure free-fall cases without initial impulse.
  dimension_check: '[T] = sqrt([L]/[L/T^2]) = [T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Estimación rápida de profundidad de pozos o edificios
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: h
    meaning: Resulta util para interpretar h en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: caida_libre_tiempo_subida
  title:
    es: Tiempo para alcanzar la altura maxima en lanzamiento vertical
    en: Time to reach maximum height in vertical launch
  equation: t_sub = v0 / g
  latex: t_{sub} = \frac{v_0}{g}
  rearrangements:
  - target: t_sub
    equation: t_sub = v0 / g
    latex: t_{sub} = \frac{v_0}{g}
    constraints: []
  - target: v0
    equation: v0 = g * t_sub
    latex: v_0 = g\,t_{sub}
    constraints: []
  category: derived
  relation_type: integral_relation
  physical_meaning:
    es: En el punto mas alto la velocidad es cero. Despejando t de v = v0 - g*t = 0 se obtiene el instante en que el movil deja de subir.
    en: At the highest point the velocity is zero. Solving v = v0 - g*t = 0 gives the instant when the body stops rising.
  constraints:
  - v0 > 0 (lanzamiento hacia arriba)
  - g > 0
  validity:
    es: Valida para lanzamientos verticales ascendentes bajo el modelo ideal.
    en: Valid for upward vertical launches under the ideal model.
  dimension_check: '[T] = [L T^-1] / [L T^-2] = [T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Calculo de la altura maxima en lanzamientos verticales
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: t_sub
    meaning: Resulta util para determinar cuando ocurre el apice y calcular la altura maxima.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que v0 > 0 para que el tiempo de subida sea positivo.
      en: Check that v0 > 0 so the rise time is positive.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - En la grafica v vs t el instante t_sub es donde la recta cruza el eje horizontal.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: El tiempo total de subida y bajada sobre el mismo punto es 2*t_sub si se lanza y aterriza a la misma altura.
      en: The total rise-and-fall time back to the same height is 2*t_sub when launch and landing height are equal.
- id: caida_libre_altura_maxima
  title:
    es: Altura maxima en lanzamiento vertical
    en: Maximum height in vertical launch
  equation: h_max = v0^2 / (2*g)
  latex: h_{max} = \frac{v_0^2}{2g}
  rearrangements:
  - target: h_max
    equation: h_max = v0^2 / (2*g)
    latex: h_{max} = \frac{v_0^2}{2g}
    constraints: []
  - target: v0
    equation: v0 = sqrt(2*g*h_max)
    latex: v_0 = \sqrt{2g\,h_{max}}
    constraints: []
  category: derived
  relation_type: integral_relation
  physical_meaning:
    es: Se obtiene evaluando y(t_sub). Expresa la distancia vertical maxima recorrida por encima del punto de lanzamiento.
    en: Obtained by evaluating y(t_sub). It expresses the maximum vertical distance traveled above the launch point.
  constraints:
  - v0 > 0 (lanzamiento hacia arriba)
  - g > 0
  - posicion inicial tomada como referencia (y0 = 0)
  validity:
    es: Valida bajo el modelo ideal para lanzamiento vertical con velocidad inicial positiva.
    en: Valid under the ideal model for vertical launch with positive initial velocity.
  dimension_check: '[L] = [L^2 T^-2] / [L T^-2] = [L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Determinacion de la cota maxima en lanzamientos verticales
  interpretation_tags:
  - movimiento-vertical-bajo-gravedad
  result_semantics:
    target: h_max
    meaning: Resulta util para calcular la altura maxima directamente sin calcular t_sub previamente.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que v0 > 0 para que h_max sea positivo.
      en: Check that v0 > 0 so h_max is positive.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - En la grafica y vs t h_max corresponde al maximo de la parabola.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba que no confundes h_max (altura sobre el punto de lanzamiento) con la altura total sobre el suelo si y0 > 0.
      en: Check you are not confusing h_max (height above launch point) with total height above ground if y0 > 0.
