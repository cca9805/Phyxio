version: "1.0"
leaf: "movimiento-vertical-bajo-gravedad"

coord:
  title:
    es: Gráfica Coord · Movimiento Vertical bajo Gravedad
    en: Coord Graph · Vertical Motion under Gravity
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: altura y (m) o velocidad vertical v_y (m/s)
    en: height y (m) or vertical velocity v_y (m/s)
  xMagnitude: t
  yMagnitude: y o v_y
  relation:
    es: Bajo la acción exclusiva de la gravedad, el objeto sube y baja con aceleración constante g hacia abajo. La altura y(t) es una parábola cóncava y la velocidad v_y(t) es una recta decreciente.
    en: Under gravity alone, the object rises and falls with constant downward acceleration g. Height y(t) is a downward-concave parabola and vertical velocity v_y(t) is a decreasing straight line.
  physicalReading:
    es: La gráfica y(t) tiene el vértice en la altura máxima, donde v_y = 0. La gráfica v_y(t) cruza el eje temporal en ese mismo instante.
    en: The y(t) graph has its vertex at maximum height, where v_y = 0. The v_y(t) graph crosses the time axis at that same instant.
  slopeMeaning:
    es: "En y(t): la pendiente es v_y. En el punto máximo la pendiente es cero. En v_y(t): la pendiente constante es −g = −9.8 m/s²."
    en: "In y(t): slope is v_y. At the maximum point slope is zero. In v_y(t): constant slope is −g = −9.8 m/s²."
  interceptMeaning:
    es: "En y(t): el corte con el eje y es la altura inicial y₀. En v_y(t): el corte es la velocidad inicial v₀ (positiva si el objeto sube, negativa si cae)."
    en: "In y(t): the y-intercept is initial height y₀. In v_y(t): the y-intercept is initial velocity v₀ (positive if rising, negative if falling)."
  curvatureMeaning:
    es: "La parábola de y(t) es siempre cóncava hacia abajo (a = −g < 0): el objeto desacelera al subir y acelera al caer."
    en: "The y(t) parabola is always concave down (a = −g < 0): the object decelerates while rising and accelerates while falling."
  signMeaning:
    es: "Velocidad positiva: el objeto asciende. Velocidad negativa: el objeto desciende. El cambio de signo marca el punto máximo."
    en: "Positive velocity: the object ascends. Negative velocity: the object descends. The sign change marks the maximum height."
  areaMeaning:
    es: Área bajo v_y(t) entre dos instantes es el desplazamiento vertical en ese intervalo. El área total desde el lanzamiento hasta el impacto es cero si el objeto vuelve al mismo nivel.
    en: Area under v_y(t) between two instants is the vertical displacement in that interval. Total area from launch to impact is zero if the object returns to the same level.
  domainMeaning:
    es: Válido mientras se desprecia la resistencia del aire. Para caídas largas, la resistencia no es despreciable.
    en: Valid while air resistance is neglected. For long falls, air resistance is not negligible.
  modelConnection:
    es: "Se interpreta bajo el MRUA con a = −g: la gravedad es la única fuerza y actúa siempre hacia abajo."
    en: "Interpreted under UARM with a = −g: gravity is the only force and always acts downward."
  formulaConnection:
    es: Conecta con y(t) = y₀ + v₀·t − ½·g·t² y v_y(t) = v₀ − g·t.
    en: Connects to y(t) = y₀ + v₀·t − ½·g·t² and v_y(t) = v₀ − g·t.
  readingFocus:
    es: leer el vértice de la parábola como la altura máxima, el corte con el eje x como el tiempo de vuelo y la pendiente de v_y(t) como −g.
    en: read the parabola vertex as maximum height, the x-axis crossing as flight time, and the slope of v_y(t) as −g.
  agentHints:
    es:
      - "El vértice de la parábola y(t) es la altura máxima: ocurre cuando v_y = 0."
      - El tiempo de subida es igual al tiempo de bajada si el nivel de salida y llegada es el mismo.
      - La velocidad al impactar con el suelo es igual en módulo a la velocidad de lanzamiento (en ausencia de resistencia).
    en:
      - "The vertex of the y(t) parabola is the maximum height: it occurs when v_y = 0."
      - Rise time equals fall time when launch and landing levels are the same.
      - Impact speed equals launch speed in magnitude (in the absence of air resistance).
  commonMistakes:
    es:
      - Tomar g como positivo y olvidar el signo negativo de la aceleración al subir.
      - Pensar que la aceleración es cero en el punto máximo porque la velocidad es cero.
      - Confundir altura máxima con el instante en que la velocidad es máxima.
    en:
      - Taking g as positive and forgetting the negative sign of acceleration during ascent.
      - Thinking acceleration is zero at the maximum point because velocity is zero.
      - Confusing maximum height with the instant of maximum speed.

svg:
  title:
    es: Escena SVG · Movimiento Vertical bajo Gravedad
    en: SVG Scene · Vertical Motion under Gravity
  sceneId: movimiento_vertical_gravedad
  sceneLabel:
    es: Objeto en caída libre o lanzamiento vertical
    en: Object in free fall or vertical launch
  objects:
    es:
      - objeto en movimiento
      - vector velocidad
      - vector aceleración (gravedad)
      - posición inicial y final
    en:
      - object in motion
      - velocity vector
      - acceleration vector (gravity)
      - initial and final positions
  mainObject:
    es: objeto en movimiento vertical
    en: object in vertical motion
  referenceFrame:
    es: eje vertical con positivo hacia arriba
    en: vertical axis with positive direction upward
  geometry:
    es: "La escena muestra el objeto en distintos instantes de su trayectoria vertical: subida (vector velocidad hacia arriba, aceleración hacia abajo), punto máximo (velocidad cero, aceleración hacia abajo) y caída."
    en: "The scene shows the object at different instants of its vertical trajectory: ascent (velocity vector upward, acceleration downward), maximum point (zero velocity, acceleration downward), and descent."
  interactions:
    es: La gravedad actúa constantemente hacia abajo con módulo g, independientemente del sentido del movimiento.
    en: Gravity acts constantly downward with magnitude g, regardless of the direction of motion.
  modelElements:
    es:
      - vector v_y en cada instante
      - vector g constante hacia abajo
      - posición máxima marcada
    en:
      - v_y vector at each instant
      - constant g vector pointing downward
      - marked maximum position
  visualCues:
    es:
      - En el punto máximo el vector velocidad es cero pero el de aceleración sigue apuntando hacia abajo.
      - La longitud del vector velocidad disminuye al subir y aumenta al bajar.
      - "Los vectores de aceleración son idénticos en todos los instantes: g hacia abajo."
    en:
      - At the maximum point the velocity vector is zero but the acceleration vector still points downward.
      - The length of the velocity vector decreases during ascent and increases during descent.
      - "Acceleration vectors are identical at all instants: g downward."
  scaleMeaning:
    es: "Los vectores son cualitativos: ilustran dirección y sentido, no valores exactos."
    en: "Vectors are qualitative: they illustrate direction and sense, not exact values."
  relation:
    es: La escena ilustra cómo la gravedad desacelera al objeto al subir y lo acelera al bajar, manteniendo siempre la misma dirección de la aceleración.
    en: The scene illustrates how gravity decelerates the object while rising and accelerates it while falling, always maintaining the same direction of acceleration.
  physicalReading:
    es: Leer la dirección del vector velocidad para saber si el objeto sube o baja, y verificar que el vector aceleración siempre apunta hacia abajo.
    en: Read the direction of the velocity vector to determine if the object is rising or falling, and verify that the acceleration vector always points downward.
  modelConnection:
    es: Se interpreta bajo el modelo de caída libre con a = −g constante.
    en: Interpreted within the free-fall model with a = −g constant.
  formulaConnection:
    es: Conecta con y(t) = y₀ + v₀t − ½gt² y v_y = v₀ − gt.
    en: Connects to y(t) = y₀ + v₀t − ½gt² and v_y = v₀ − gt.
  readingFocus:
    es: identificar la dirección del vector velocidad y verificar que la aceleración siempre apunta hacia abajo independientemente del sentido del movimiento.
    en: identify the direction of the velocity vector and verify that acceleration always points downward regardless of the direction of motion.
  agentHints:
    es:
      - El vector aceleración no cambia de dirección en ningún momento del movimiento.
      - En el punto máximo, el objeto está instantáneamente en reposo pero no en equilibrio.
      - "La trayectoria es vertical recta: no hay componente horizontal del movimiento."
    en:
      - The acceleration vector does not change direction at any point during the motion.
      - At the maximum point, the object is instantaneously at rest but not in equilibrium.
      - "The trajectory is a vertical straight line: there is no horizontal component of motion."
  commonMistakes:
    es:
      - Dibujar el vector aceleración hacia arriba cuando el objeto sube.
      - Pensar que en el punto máximo la aceleración es cero porque la velocidad es cero.
      - Confundir caída libre (solo gravedad) con caída con resistencia del aire.
    en:
      - Drawing the acceleration vector upward when the object is rising.
      - Thinking acceleration is zero at the maximum point because velocity is zero.
      - Confusing free fall (gravity only) with fall with air resistance.
