magnitudes:
- id: y
  symbol: y
  nombre:
    es: posición vertical
    en: vertical position
  descripcion:
    es: Coordenada medida sobre un eje vertical orientado, típicamente con origen en el suelo.
    en: Coordinate measured along a vertical oriented axis, typically with origin at the ground.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - movimiento-vertical-bajo-gravedad
  common_mistake: Confundir y con otra magnitud cercana dentro de movimiento vertical bajo gravedad.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - movimiento-vertical-bajo-gravedad
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar y con una definicion estable antes de sustituir valores.
