- id: t_sub
  symbol: 't_{sub}'
  nombre:
    es: tiempo de subida
    en: time to rise
  descripcion:
    es: Tiempo que tarda un objeto lanzado hacia arriba en alcanzar su altura máxima.
    en: Time it takes for an object thrown upwards to reach its maximum height.
  unidad_si: s
  dimension: T
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - movimiento-vertical-bajo-gravedad
  common_mistake: Olvidar que el t_sub es solo la mitad del tiempo de vuelo total si regresa al mismo nivel.
  typical_range: Context-dependent.
  sign_behavior:
    has_sign: false
    meaning:
      es: Duración siempre positiva.
      en: Always positive duration.
  zero_behavior:
    allowed: true
    meaning:
      es: Si v0=0, el tiempo de subida es cero.
      en: If v0=0, the time to rise is zero.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - movimiento-vertical-bajo-gravedad
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: En el instante t_sub, la velocidad se anula por completo.
