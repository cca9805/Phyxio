version: "1.0"
leaf: "mru"

coord:
  title:
    es: Gráfica Coord · MRU
    en: Coord Graph · Uniform Rectilinear Motion
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x (m)
    en: position x (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: "En el movimiento rectilíneo uniforme la posición crece linealmente con el tiempo: x(t) = x₀ + v·t. La gráfica es una recta cuya pendiente es la velocidad constante del móvil."
    en: "In uniform rectilinear motion, position grows linearly with time: x(t) = x₀ + v·t. The graph is a straight line whose slope is the constant velocity of the body."
  physicalReading:
    es: "La pendiente de la recta es la velocidad: positiva si el móvil avanza en el sentido positivo, negativa si retrocede. La ordenada en el origen es la posición inicial."
    en: "The slope of the line is velocity: positive if the body moves in the positive direction, negative if it moves backward. The y-intercept is the initial position."
  slopeMeaning:
    es: La pendiente es la velocidad constante v. Rectas paralelas representan móviles con la misma velocidad; rectas que se cruzan representan un encuentro.
    en: The slope is the constant velocity v. Parallel lines represent bodies with the same velocity; intersecting lines represent a meeting point.
  interceptMeaning:
    es: La ordenada en el origen es la posición inicial x₀ del móvil en t = 0.
    en: The y-intercept is the initial position x₀ of the body at t = 0.
  curvatureMeaning:
    es: La curva debe ser perfectamente recta en MRU. Cualquier curvatura indica aceleración y el movimiento ya no es MRU.
    en: The curve must be perfectly straight in URM. Any curvature indicates acceleration and the motion is no longer uniform.
  signMeaning:
    es: "Pendiente positiva: móvil avanza en sentido +x. Pendiente negativa: móvil retrocede. Pendiente cero: móvil en reposo."
    en: "Positive slope: body moves in the +x direction. Negative slope: body moves backward. Zero slope: body at rest."
  areaMeaning:
    es: El área bajo la curva v(t) —que sería un rectángulo— es el desplazamiento Δx = v·Δt.
    en: The area under v(t) —a rectangle— is the displacement Δx = v·Δt.
  domainMeaning:
    es: "Válido mientras no actúe ninguna fuerza neta sobre el móvil. El MRU es una idealización: en la práctica siempre hay rozamiento o gravedad."
    en: "Valid as long as no net force acts on the body. URM is an idealization: in practice there is always friction or gravity."
  modelConnection:
    es: "Se interpreta bajo el primer principio de Newton: sin fuerza neta, el móvil mantiene velocidad constante."
    en: "Interpreted under Newton's first law: without net force, the body maintains constant velocity."
  formulaConnection:
    es: Conecta con x(t) = x₀ + v·t y con v = Δx/Δt = constante.
    en: Connects to x(t) = x₀ + v·t and v = Δx/Δt = constant.
  readingFocus:
    es: leer la pendiente como velocidad constante e identificar el corte con el eje vertical como la posición inicial.
    en: read the slope as constant velocity and identify the vertical intercept as the initial position.
  agentHints:
    es:
      - "En el diagrama x-t del MRU, la recta es la representación más sencilla posible: pendiente constante."
      - Dos rectas que se intersectan representan el instante y lugar del encuentro entre dos móviles.
      - Una recta horizontal (v = 0) representa un móvil en reposo.
    en:
      - "In the x-t diagram of URM, the line is the simplest possible representation: constant slope."
      - Two intersecting lines represent the instant and place of meeting between two bodies.
      - A horizontal line (v = 0) represents a body at rest.
  commonMistakes:
    es:
      - Confundir la altura de la recta (posición) con la pendiente (velocidad).
      - Creer que una recta con mayor pendiente implica mayor posición, en lugar de mayor velocidad.
      - Olvidar que dos rectas paralelas representan móviles que nunca se encuentran.
    en:
      - Confusing the height of the line (position) with its slope (velocity).
      - Believing that a steeper line implies greater position rather than greater velocity.
      - Forgetting that two parallel lines represent bodies that never meet.
