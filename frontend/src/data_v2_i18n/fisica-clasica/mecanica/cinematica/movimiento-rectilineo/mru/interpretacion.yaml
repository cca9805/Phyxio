version: 2
id: interpretacion-mru
leaf_id: mru
nombre:
  es: Interpretacion de Mru
  en: Interpretation of Uniform Rectilinear Motion
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cinematica
  parent_id: movimiento-rectilineo
  ruta_relativa: fisica-clasica/mecanica/cinematica/movimiento-rectilineo/mru
dependencies:
  formulas:
  - mru_posicion
  - mru_velocidad_media
  magnitudes:
  - x
  - x0
  - v
  - t
  - dx
  - dt
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  v:
    summary_rules:
    - id: v_summary
      when: 'true'
      status: info
      text:
        es: v resume una lectura fisica relevante del leaf.
        en: v summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: v_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que v sea coherente con unidades y contexto.
        en: Check that v is coherent with units and context.
    physical_reading_rules:
    - id: v_physical
      when: 'true'
      status: info
      text:
        es: La lectura de v debe mostrar qué cambio físico produce, qué magnitudes lo causan y por qué modifica el comportamiento del sistema.
        en: The reading of v must show which physical change it produces, which magnitudes cause it, and why it modifies the system's behavior.
    model_validity_rules:
    - id: v_validity
      when: 'true'
      status: ok
      text:
        es: v solo es interpretable dentro del modelo elegido.
        en: v is interpretable only inside the chosen model.
    graph_rules:
    - id: v_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de v.
        en: The graph must reflect the role of v visually.
    likely_errors:
    - id: v_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v con otra magnitud cercana del problema.
        en: Do not confuse v with another nearby quantity in the problem.
    next_step_rules:
    - id: v_next
      when: 'true'
      status: info
      text:
        es: Usa v para enlazar con el siguiente paso de interpretacion.
        en: Use v to connect with the next interpretation step.
