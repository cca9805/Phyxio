    - id: dt_summary
      when: 'true'
      status: info
      text:
        es: dt resume una lectura fisica relevante del intervalo temporal.
        en: dt summarizes a relevant physical reading of the time interval.
    coherence_rules:
    - id: dt_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que el intervalo de tiempo dt sea positivo y coherente.
        en: Check that the time interval dt is positive and coherent.
    physical_reading_rules:
    - id: dt_physical
      when: 'true'
      status: info
      text:
        es: La lectura de dt muestra la duracion necesaria para completar el desplazamiento a la velocidad dada.
        en: The reading of dt shows the duration needed to complete the displacement at the given velocity.
    model_validity_rules:
    - id: dt_validity
      when: 'true'
      status: ok
      text:
        es: dt solo es valido si la velocidad se mantiene constante en el tramo.
        en: dt is only valid if the velocity remains constant during the segment.
    graph_rules:
    - id: dt_graph
      when: 'true'
      status: info
      text:
        es: En la grafica, dt corresponde a la extension horizontal del tramo analizado.
        en: In the graph, dt corresponds to the horizontal extension of the analyzed segment.
    likely_errors:
    - id: dt_warn
      when: 'true'
      status: warning
      text:
        es: No confundas el intervalo dt con el instante de tiempo t.
        en: Do not confuse the time interval dt with the time instant t.
    next_step_rules:
    - id: dt_next
      when: 'true'
      status: info
      text:
        es: Usa dt para verificar la cronologia del movimiento.
        en: Use dt to verify the movement's chronology.
