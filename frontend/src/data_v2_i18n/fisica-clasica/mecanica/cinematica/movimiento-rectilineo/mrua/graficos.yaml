version: "1.0"
leaf: "mrua"

coord:
  title:
    es: Gráfica Coord · MRUA
    en: Coord Graph · Uniformly Accelerated Rectilinear Motion
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x (m) o velocidad v (m/s)
    en: position x (m) or velocity v (m/s)
  xMagnitude: t
  yMagnitude: x o v
  relation:
    es: En el movimiento rectilíneo uniformemente acelerado, la posición sigue una parábola x(t) = x₀ + v₀·t + ½·a·t² y la velocidad es lineal v(t) = v₀ + a·t.
    en: In uniformly accelerated rectilinear motion, position follows a parabola x(t) = x₀ + v₀·t + ½·a·t² and velocity is linear v(t) = v₀ + a·t.
  physicalReading:
    es: "En la gráfica x(t) la curvatura indica la aceleración. En v(t) la pendiente es la aceleración constante. La concavidad hacia arriba implica a > 0; hacia abajo a < 0."
    en: "In x(t) curvature indicates acceleration. In v(t) the slope is constant acceleration. Concave up implies a > 0; concave down implies a < 0."
  slopeMeaning:
    es: "En x(t): la pendiente en cada punto es la velocidad instantánea, que aumenta linealmente. En v(t): la pendiente constante es la aceleración."
    en: "In x(t): slope at each point is instantaneous velocity, which increases linearly. In v(t): constant slope is acceleration."
  interceptMeaning:
    es: "En x(t): el corte con el eje y es x₀. En v(t): el corte con el eje y es v₀, la velocidad inicial."
    en: "In x(t): the y-intercept is x₀. In v(t): the y-intercept is v₀, the initial velocity."
  curvatureMeaning:
    es: "La parábola en x(t) tiene curvatura constante igual a la aceleración: cóncava hacia arriba si a > 0, cóncava hacia abajo si a < 0."
    en: "The parabola in x(t) has constant curvature equal to acceleration: concave up if a > 0, concave down if a < 0."
  signMeaning:
    es: El signo de v(t) indica el sentido del movimiento. El móvil cambia de sentido cuando v = 0 (vértice de la parábola en x(t)).
    en: The sign of v(t) indicates the direction of motion. The body reverses direction when v = 0 (vertex of the parabola in x(t)).
  areaMeaning:
    es: Área bajo v(t) entre t₁ y t₂ es el desplazamiento Δx en ese intervalo. El área del trapèzoide bajo v(t) lineal es (v₀ + v_f)·Δt/2.
    en: Area under v(t) between t₁ and t₂ is displacement Δx. The trapezoid area under linear v(t) is (v₀ + v_f)·Δt/2.
  domainMeaning:
    es: Válido para el intervalo en que la aceleración es constante. Si la aceleración cambia, la parábola se rompe en tramos.
    en: Valid for the interval where acceleration is constant. If acceleration changes, the parabola breaks into segments.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton con fuerza constante: a = F/m = constante implica MRUA."
    en: "Interpreted under Newton's second law with constant force: a = F/m = constant implies UARM."
  formulaConnection:
    es: Conecta con x(t) = x₀ + v₀·t + ½·a·t², v(t) = v₀ + a·t y v² = v₀² + 2·a·Δx.
    en: Connects to x(t) = x₀ + v₀·t + ½·a·t², v(t) = v₀ + a·t, and v² = v₀² + 2·a·Δx.
  readingFocus:
    es: leer la concavidad de x(t) como signo de la aceleración, el vértice como punto de velocidad cero y la pendiente de v(t) como la aceleración.
    en: read the concavity of x(t) as the sign of acceleration, the vertex as the zero-velocity point, and the slope of v(t) as acceleration.
  agentHints:
    es:
      - "El vértice de la parábola x(t) es el instante donde la velocidad es cero: el móvil cambia de sentido."
      - La gráfica v(t) del MRUA es siempre una recta con pendiente = aceleración.
      - La gráfica a(t) del MRUA es una línea horizontal (aceleración constante).
    en:
      - "The vertex of the x(t) parabola is the instant where velocity is zero: the body reverses direction."
      - The v(t) graph of UARM is always a straight line with slope = acceleration.
      - The a(t) graph of UARM is a horizontal line (constant acceleration).
  commonMistakes:
    es:
      - Confundir la concavidad de x(t) con la dirección del movimiento en lugar de con el signo de la aceleración.
      - Usar las ecuaciones del MRU (x = v·t) en lugar de las del MRUA cuando hay aceleración.
      - Olvidar que el móvil puede continuar moviéndose después de pasar por velocidad cero si la aceleración no es nula.
    en:
      - Confusing the concavity of x(t) with the direction of motion instead of the sign of acceleration.
      - Using URM equations (x = v·t) instead of UARM equations when there is acceleration.
      - Forgetting that the body can keep moving after passing through zero velocity if acceleration is nonzero.
