version: "1.0"
leaf: "encuentros-y-persecuciones"

coord:
  title:
    es: Gráfica Coord · Encuentros y Persecuciones
    en: Coord Graph · Meetings and Pursuits
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición de los móviles x (m)
    en: position of the bodies x (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: "El encuentro entre dos móviles ocurre cuando sus posiciones son iguales en el mismo instante: x_A(t) = x_B(t). En el diagrama x-t, el encuentro es la intersección de las curvas."
    en: "Two bodies meet when their positions are equal at the same instant: x_A(t) = x_B(t). In the x-t diagram, the meeting is the intersection of the curves."
  physicalReading:
    es: "Cada curva representa la trayectoria x(t) de un móvil. La intersección de dos curvas es el punto de encuentro: el instante en que están en el mismo lugar."
    en: "Each curve represents the trajectory x(t) of a body. The intersection of two curves is the meeting point: the instant when they are in the same place."
  slopeMeaning:
    es: La pendiente de cada curva es la velocidad del móvil correspondiente. El móvil con mayor pendiente es más rápido.
    en: The slope of each curve is the velocity of the corresponding body. The body with steeper slope is faster.
  interceptMeaning:
    es: El corte con el eje y es la posición inicial de cada móvil en t = 0.
    en: The y-intercept is the initial position of each body at t = 0.
  curvatureMeaning:
    es: Una curva parabólica indica MRUA (móvil con aceleración). Una recta indica MRU.
    en: A parabolic curve indicates UARM (body with acceleration). A straight line indicates URM.
  signMeaning:
    es: "Pendiente positiva: avanza en +x. Negativa: retrocede. Si las pendientes tienen signos opuestos, los móviles se acercan entre sí."
    en: "Positive slope: moves in +x. Negative slope: moves backward. Opposite slopes mean the bodies are approaching each other."
  areaMeaning:
    es: Sin interpretación directa específica en este diagrama posicional.
    en: No specific direct interpretation in this positional diagram.
  domainMeaning:
    es: Válido desde t = 0 hasta el instante de encuentro o mientras el modelo del movimiento sea válido.
    en: Valid from t = 0 until the meeting instant or while the motion model is valid.
  modelConnection:
    es: Se interpreta por resolución gráfica de la ecuación x_A(t) = x_B(t) y también algebraicamente igualando las ecuaciones de movimiento.
    en: Interpreted by graphical solution of x_A(t) = x_B(t) and algebraically by equating the equations of motion.
  formulaConnection:
    es: Conecta con x_A(t) = x_B(t) y con las ecuaciones de MRU o MRUA de cada móvil.
    en: Connects to x_A(t) = x_B(t) and the URM or UARM equations of each body.
  readingFocus:
    es: leer el instante de intersección como el momento del encuentro y la pendiente relativa para determinar qué móvil es más rápido.
    en: read the intersection instant as the meeting moment and the relative slopes to determine which body is faster.
  agentHints:
    es:
      - El encuentro es la intersección gráfica de las curvas x(t) de ambos móviles.
      - Si las curvas no se intersectan, los móviles nunca se encuentran.
      - En la persecución, el alcance ocurre cuando el perseguidor iguala la posición del perseguido y además tiene mayor velocidad.
    en:
      - The meeting is the graphical intersection of the x(t) curves of both bodies.
      - If the curves do not intersect, the bodies never meet.
      - In a pursuit, the overtake occurs when the pursuer equals the position of the target and also has greater velocity.
  commonMistakes:
    es:
      - Confundir el momento en que las velocidades son iguales con el momento del encuentro.
      - Ignorar las posiciones iniciales al plantear la ecuación de encuentro.
      - Olvidar que en persecución el alcanzador debe superar la posición, no solo igualarla.
    en:
      - Confusing the moment when velocities are equal with the meeting moment.
      - Ignoring initial positions when setting up the meeting equation.
      - Forgetting that in a pursuit the chaser must surpass the position, not just match it.

svg:
  title:
    es: Escena SVG · Encuentros y Persecuciones
    en: SVG Scene · Meetings and Pursuits
  sceneId: encuentros_persecuciones_scene
  sceneLabel:
    es: Dos móviles que se acercan, encuentran o persiguen
    en: Two bodies approaching, meeting, or in pursuit
  objects:
    es:
      - móvil A
      - móvil B
      - posiciones iniciales
      - punto de encuentro
      - vectores de velocidad
    en:
      - body A
      - body B
      - initial positions
      - meeting point
      - velocity vectors
  mainObject:
    es: par de móviles en dinámica de encuentro
    en: pair of bodies in a meeting or pursuit scenario
  referenceFrame:
    es: eje horizontal con el mismo origen para ambos móviles
    en: horizontal axis with the same origin for both bodies
  geometry:
    es: La escena muestra los dos móviles en sus posiciones iniciales con sus vectores de velocidad. Se indica el punto de encuentro y las distancias iniciales.
    en: The scene shows the two bodies at their initial positions with their velocity vectors. The meeting point and initial distances are indicated.
  interactions:
    es: "Los móviles no interactúan físicamente (no hay colisión): el encuentro es una coincidencia de posiciones en el mismo instante."
    en: "The bodies do not interact physically (no collision): the meeting is a coincidence of positions at the same instant."
  modelElements:
    es:
      - posición inicial de A y B
      - vectores de velocidad de A y B
      - punto de encuentro x_enc
      - instante de encuentro t_enc
    en:
      - initial position of A and B
      - velocity vectors of A and B
      - meeting point x_enc
      - meeting instant t_enc
  visualCues:
    es:
      - Si los vectores de velocidad apuntan hacia el mismo punto de encuentro, los móviles se aproximan.
      - El móvil más rápido o más cercano alcanza el punto de encuentro antes.
      - En persecución, el perseguidor parte detrás y necesita mayor velocidad para alcanzar al perseguido.
    en:
      - If velocity vectors point toward the same meeting point, the bodies are approaching.
      - The faster or closer body reaches the meeting point first.
      - In a pursuit, the pursuer starts behind and needs greater speed to catch up.
  scaleMeaning:
    es: Las posiciones son proporcionales a las distancias reales. Los vectores de velocidad son cualitativos.
    en: Positions are proportional to real distances. Velocity vectors are qualitative.
  relation:
    es: "La escena ilustra las condiciones iniciales del problema de encuentro: posiciones y velocidades de partida que determinan si hay encuentro y cuándo."
    en: "The scene illustrates the initial conditions of the meeting problem: starting positions and velocities that determine whether a meeting occurs and when."
  physicalReading:
    es: "Leer las posiciones iniciales y vectores de velocidad para plantear la ecuación de encuentro: x_A(t) = x_B(t)."
    en: "Read the initial positions and velocity vectors to set up the meeting equation: x_A(t) = x_B(t)."
  modelConnection:
    es: Se interpreta igualando las ecuaciones de movimiento de cada móvil.
    en: Interpreted by equating the equations of motion of each body.
  formulaConnection:
    es: Conecta con x_A(t) = x_A0 + v_A·t y x_B(t) = x_B0 + v_B·t (para MRU), igualando ambas.
    en: Connects to x_A(t) = x_A0 + v_A·t and x_B(t) = x_B0 + v_B·t (for URM), equating both.
  readingFocus:
    es: identificar la separación inicial, los sentidos de velocidad y deducir si el encuentro es posible.
    en: identify the initial separation, the velocity directions, and deduce whether a meeting is possible.
  agentHints:
    es:
      - Si los móviles se mueven en sentidos contrarios y se aproximan, el encuentro es seguro si están en el mismo eje.
      - Si ambos móviles se mueven en el mismo sentido, el alcance es posible solo si el de atrás va más rápido.
      - La posición de encuentro se calcula sustituyendo t_enc en cualquiera de las dos ecuaciones.
    en:
      - If the bodies move in opposite directions and are approaching, the meeting is guaranteed if they are on the same axis.
      - If both bodies move in the same direction, the overtake is only possible if the one behind is faster.
      - The meeting position is calculated by substituting t_enc into either equation.
  commonMistakes:
    es:
      - Olvidar que el encuentro requiere misma posición y mismo instante.
      - No distinguir entre encuentro (se cruzan) y persecución (el rápido alcanza al lento).
      - Ignorar la posición inicial en la ecuación de movimiento.
    en:
      - Forgetting that a meeting requires the same position at the same instant.
      - Not distinguishing between meeting (they cross) and pursuit (the faster catches the slower).
      - Ignoring the initial position in the equation of motion.
