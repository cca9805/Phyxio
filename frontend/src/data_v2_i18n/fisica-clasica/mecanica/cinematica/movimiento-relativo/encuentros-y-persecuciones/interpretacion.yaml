version: 2
id: interpretacion-encuentros-y-persecuciones
leaf_id: encuentros-y-persecuciones
nombre:
  es: Interpretacion de Encuentros y persecuciones
  en: Interpretation of Pursuit and Interception Problems
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cinematica
  parent_id: movimiento-relativo
  ruta_relativa: fisica-clasica/mecanica/cinematica/movimiento-relativo/encuentros-y-persecuciones
dependencies:
  formulas:
  - condicion_encuentro
  - tiempo_encuentro_mru_mru
  - encuentro_retrasado
  - encuentro_mrua
  - separacion_inicial
  - velocidad_relativa_encuentro
  - posicion_encuentro_mru
  - tiempo_encuentro_mru_mru_expandido
  magnitudes:
  - t_e
  - x_e
  - d_0
  - v_rel
  - dt
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  t_e:
    summary_rules:
    - id: t_e_summary
      when: 'true'
      status: info
      text:
        es: t_e resume una lectura fisica relevante del leaf.
        en: t_e summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: t_e_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que t_e sea coherente con unidades y contexto.
        en: Check that t_e is coherent with units and context.
    physical_reading_rules:
    - id: t_e_physical
      when: 'true'
      status: info
      text:
        es: La lectura de t_e debe mostrar qué cambio físico produce, qué magnitudes lo causan y por qué modifica el comportamiento del sistema.
        en: The reading of t_e must show which physical change it produces, which magnitudes cause it, and why it modifies the system's behavior.
    model_validity_rules:
    - id: t_e_validity
      when: 'true'
      status: ok
      text:
        es: t_e solo es interpretable dentro del modelo elegido.
        en: t_e is interpretable only inside the chosen model.
    graph_rules:
    - id: t_e_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de t_e.
        en: The graph must reflect the role of t_e visually.
    likely_errors:
    - id: t_e_warn
      when: 'true'
      status: warning
      text:
        es: No confundas t_e con otra magnitud cercana del problema.
        en: Do not confuse t_e with another nearby quantity in the problem.
    next_step_rules:
    - id: t_e_next
      when: 'true'
      status: info
      text:
        es: Usa t_e para enlazar con el siguiente paso de interpretacion.
        en: Use t_e to connect with the next interpretation step.
  d_0:
    summary_rules:
    - id: d_0_summary
      when: 'true'
      status: info
      text:
        es: d_0 representa la separacion inicial entre los moviles y fija la ventaja espacial de partida.
        en: d_0 represents the initial separation between the moving bodies and sets the initial spatial advantage.
    coherence_rules:
    - id: d_0_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que d_0 se interprete como separacion entre moviles y no como desplazamiento de uno solo.
        en: Check that d_0 is interpreted as separation between the bodies and not as the displacement of only one of them.
    physical_reading_rules:
    - id: d_0_physical
      when: 'true'
      status: info
      text:
        es: La lectura de d_0 debe indicar cuanta distancia inicial debe compensarse antes de que pueda producirse el encuentro.
        en: The reading of d_0 must indicate how much initial distance must be compensated before an encounter can take place.
    model_validity_rules:
    - id: d_0_validity
      when: 'true'
      status: ok
      text:
        es: d_0 solo tiene sentido si ambos moviles estan descritos en el mismo eje y con la misma referencia espacial.
        en: d_0 is meaningful only if both bodies are described on the same axis and with the same spatial reference.
    graph_rules:
    - id: d_0_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe mostrar visualmente la separacion inicial entre trayectorias.
        en: The graph should visually display the initial separation between trajectories.
    likely_errors:
    - id: d_0_warn
      when: 'true'
      status: warning
      text:
        es: No confundas d_0 con una posicion absoluta ni con el desplazamiento total del problema.
        en: Do not confuse d_0 with an absolute position or with the total displacement of the problem.
    next_step_rules:
    - id: d_0_next
      when: 'true'
      status: info
      text:
        es: Usa d_0 para decidir si la velocidad relativa basta para cerrar la separacion.
        en: Use d_0 to decide whether the relative velocity is sufficient to close the gap.

  v_rel:
    summary_rules:
    - id: v_rel_summary
      when: 'true'
      status: info
      text:
        es: v_rel resume si la distancia entre los moviles disminuye, se conserva o aumenta.
        en: v_rel summarizes whether the distance between the bodies decreases, remains constant, or increases.
    coherence_rules:
    - id: v_rel_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que el signo de v_rel sea coherente con la convencion elegida y con la idea de aproximacion o alejamiento.
        en: Check that the sign of v_rel is consistent with the chosen convention and with the idea of approach or separation.
    physical_reading_rules:
    - id: v_rel_physical
      when: 'true'
      status: info
      text:
        es: La lectura de v_rel debe explicar quien gana distancia y a que ritmo cambia la separacion.
        en: The reading of v_rel must explain which body gains distance and at what rate the separation changes.
    model_validity_rules:
    - id: v_rel_validity
      when: 'true'
      status: ok
      text:
        es: v_rel solo es interpretable si las velocidades se comparan en el mismo eje y en el mismo sistema de referencia.
        en: v_rel is interpretable only if velocities are compared on the same axis and in the same reference frame.
    graph_rules:
    - id: v_rel_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar si las trayectorias convergen o divergen segun el valor de v_rel.
        en: The graph should show whether the trajectories converge or diverge according to the value of v_rel.
    likely_errors:
    - id: v_rel_warn
      when: 'true'
      status: warning
      text:
        es: No confundas v_rel con la velocidad de uno de los moviles considerada por separado.
        en: Do not confuse v_rel with the velocity of one body taken separately.
    next_step_rules:
    - id: v_rel_next
      when: 'true'
      status: info
      text:
        es: Usa v_rel para decidir si el encuentro es posible y para estimar t_e.
        en: Use v_rel to decide whether the encounter is possible and to estimate t_e.

  x_e:
    summary_rules:
    - id: x_e_summary
      when: 'true'
      status: info
      text:
        es: x_e representa la posicion efectiva donde ambos moviles coinciden.
        en: x_e represents the effective position at which both moving bodies coincide.
    coherence_rules:
    - id: x_e_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que x_e se obtenga sustituyendo el mismo instante de encuentro en ecuaciones horarias compatibles.
        en: Check that x_e is obtained by substituting the same encounter time into compatible time equations.
    physical_reading_rules:
    - id: x_e_physical
      when: 'true'
      status: info
      text:
        es: La lectura de x_e debe indicar donde ocurre realmente la coincidencia y si ese lugar tiene sentido en el contexto fisico del problema.
        en: The reading of x_e must indicate where the coincidence actually occurs and whether that location makes sense in the physical context of the problem.
    model_validity_rules:
    - id: x_e_validity
      when: 'true'
      status: ok
      text:
        es: x_e solo es interpretable si el instante t_e obtenido pertenece al dominio fisico del modelo.
        en: x_e is interpretable only if the obtained time t_e belongs to the physical domain of the model.
    graph_rules:
    - id: x_e_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe marcar el punto espacial en el que las trayectorias se cruzan.
        en: The graph should mark the spatial point at which the trajectories intersect.
    likely_errors:
    - id: x_e_warn
      when: 'true'
      status: warning
      text:
        es: No confundas x_e con la posicion final de uno de los moviles fuera del instante de encuentro.
        en: Do not confuse x_e with the final position of one of the bodies outside the encounter instant.
    next_step_rules:
    - id: x_e_next
      when: 'true'
      status: info
      text:
        es: Usa x_e para interpretar si el lugar de encuentro es util, seguro o fisicamente accesible.
        en: Use x_e to interpret whether the encounter location is useful, safe, or physically accessible.