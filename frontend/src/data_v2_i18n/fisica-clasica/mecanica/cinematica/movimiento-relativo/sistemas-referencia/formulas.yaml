version: 1
formulas:
  - id: trans_galileo_pos
    title:
      es: Transformacion galileana de posicion
      en: Galilean position transformation
    equation: x = x_prime + x0 + v_f*t
    latex: x = x' + x_0 + v_f\, t
    rearrangements: []
    category: fundamental
    relation_type: constitutive_relation
    physical_meaning:
      es: Relaciona el vector de posición[[r_vec]]medido desde un marco[[frame_sigma]]con la posición del mismo móvil en un marco que se desplaza con velocidad[[v_frame]].
      en: Relates the position vector[[r_vec]]measured from one reference frame[[frame_sigma]]to the position of the same body in a frame moving with velocity[[v_frame]].
    constraints:
      - movimiento relativo uniforme entre marcos
      - ejes paralelos y orígenes definidos
      - tiempo clásico común[[t_global]]
    validity:
      es: Válida en mecánica clásica para marcos inerciales o aproximadamente inerciales.
      en: Valid in classical mechanics for inertial or approximately inertial frames.
    dimension_check: "[L] = [L] + [L/T][T] = [L]"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - Cambio de observador entre andén, vagón, cinta o cámara móvil.
    interpretation_tags:
      - sistemas-referencia
      - frame_sigma
      - r_vec
      - v_frame
    result_semantics:
      target: r_vec
      meaning: Sirve para interpretar cómo cambia la descripción del movimiento al cambiar de marco.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que la velocidad relativa entre marcos sea constante durante el intervalo analizado.
          en: Check that the relative velocity between frames remains constant over the analyzed interval.
    coherence_checks:
      - expr: "true"
        message:
          es: Comprueba que el vector de posición, la velocidad del marco y el tiempo clásico usan la misma convención de signos y el mismo eje.
          en: Check that the position vector, the frame velocity, and the classical time use the same sign convention and axis.
    graph_implications:
      - El gráfico debe mostrar que cambiar el marco[[frame_sigma]]desplaza la descripción sin cambiar el evento físico.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Si cambia el observador, revisa primero el origen y el signo antes de comparar posiciones o velocidades.
          en: If the observer changes, review origin and sign before comparing positions or velocities.
  - id: invarianza_distancia
    title:
      es: Invarianza clásica de la distancia
      en: Classical distance invariance
    equation: Delta_x = Delta_x_prime
    latex: \Delta x = \Delta x'
    rearrangements: []
    category: structural
    relation_type: identity
    physical_meaning:
      es: En mecánica clásica, dos marcos inerciales describen la misma separación espacial si comparan simultáneamente los mismos puntos.
      en: In classical mechanics, two inertial frames describe the same spatial separation when they compare the same points simultaneously.
    constraints:
      - simultaneidad clásica
      - misma configuración geométrica
    validity:
      es: Propia del marco galileano; deja de ser exacta fuera del régimen clásico.
      en: Proper to the Galilean framework; it ceases to be exact outside the classical regime.
    dimension_check: "[L] = [L]"
    calculable: false
    motivo_no_calculable: null
    used_in:
      - Comparación de distancias entre observadores inerciales.
    interpretation_tags:
      - sistemas-referencia
      - frame_sigma
    result_semantics:
      target: O
      meaning: Ayuda a distinguir entre cambio de descripción y cambio real del objeto medido.
    domain_checks:
      - expr: "true"
        message:
          es: Asegura que la comparación de distancias se hace para los mismos eventos y con la misma simultaneidad clásica.
          en: Ensure that distance comparison is made for the same events and with the same classical simultaneity.
    coherence_checks:
      - expr: "true"
        message:
          es: Revisa que no se comparen segmentos tomados en instantes distintos como si fueran el mismo intervalo.
          en: Check that segments taken at different instants are not compared as if they were the same interval.
    graph_implications:
      - El gráfico debe dejar claro que el cambio de origen no deforma la distancia entre dos puntos medidos a la vez.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Si la distancia cambia al pasar de un marco a otro, revisa si has mezclado eventos o tiempos distintos.
          en: If distance changes when moving from one frame to another, review whether different events or times were mixed.
  - id: invarianza_tiempo
    title:
      es: Invarianza del tiempo clásico
      en: Invariance of classical time
    equation: Delta_t = Delta_t_prime
    latex: \Delta t = \Delta t'
    rearrangements: []
    category: structural
    relation_type: identity
    physical_meaning:
      es: En el marco galileano, todos los observadores comparten el mismo parámetro temporal[[t_global]]aunque no compartan origen espacial.
      en: In the Galilean framework, all observers share the same temporal parameter[[t_global]]even if they do not share the same spatial origin.
    constraints:
      - relojes sincronizados en el régimen clásico
    validity:
      es: Válida solo en mecánica clásica no relativista.
      en: Valid only in non-relativistic classical mechanics.
    dimension_check: "[T] = [T]"
    calculable: false
    motivo_no_calculable: null
    used_in:
      - Comparación de cronómetros entre observadores clásicos.
    interpretation_tags:
      - sistemas-referencia
      - t_global
    result_semantics:
      target: O
      meaning: Permite comparar descripciones sin introducir una dilatación temporal ajena al leaf.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que el problema sigue en el dominio clásico donde todos comparten el mismo tiempo.
          en: Check that the problem remains in the classical domain where all observers share the same time.
    coherence_checks:
      - expr: "true"
        message:
          es: Comprueba que el mismo instante se usa en ambos marcos antes de comparar posiciones o velocidades.
          en: Check that the same instant is used in both frames before comparing positions or velocities.
    graph_implications:
      - El gráfico debe mostrar un único reloj común para los dos marcos comparados.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Si parece necesario cambiar el tiempo al cambiar de observador, probablemente has salido del modelo galileano.
          en: If changing the observer seems to require changing time itself, you have probably left the Galilean model.
  - id: trans_galileo_vel
    title:
      es: Transformación galileana de velocidad
      en: Galilean velocity transformation
    equation: v = v_prime + v_frame
    latex: v = v' + v_f \quad (\Sigma)
    rearrangements:
      - target: v_prime
        equation: v_prime = v - v_frame
        latex: v' = v - v_f
        constraints: []
      - target: v_frame
        equation: v_frame = v - v_prime
        latex: v_f = v - v'
        constraints: []
    category: fundamental
    relation_type: constitutive_relation
    physical_meaning:
      es: Relaciona la velocidad medida en un marco con la velocidad medida en otro que se traslada uniformemente.
      en: Relates the velocity measured in one frame to the velocity measured in another frame moving uniformly.
    constraints:
      - movimiento relativo uniforme entre marcos
      - ejes paralelos
      - tiempo clásico común
    validity:
      es: Válida en mecánica clásica no relativista para marcos inerciales o aproximadamente inerciales.
      en: Valid in non-relativistic classical mechanics for inertial or approximately inertial frames.
    dimension_check: "[L/T] = [L/T] + [L/T]"
    calculable: true
    motivo_no_calculable: null
    used_in:
      - Traducción galileana entre observadores.
    interpretation_tags:
      - sistemas-referencia
      - v_frame
    result_semantics:
      target: v
      meaning: Permite traducir velocidades entre observadores sin cambiar el evento físico descrito.
    domain_checks:
      - expr: "true"
        message:
          es: Verifica que la velocidad relativa entre marcos sea constante.
          en: Check that the relative velocity between frames is constant.
    coherence_checks:
      - expr: "true"
        message:
          es: Comprueba que la velocidad del móvil, la velocidad relativa y la del marco usan la misma convención de signos.
          en: Check that the body's velocity, relative velocity, and frame velocity use the same sign convention.

    graph_implications:
      - En una grafica velocidad-tiempo, cambiar de marco desplaza verticalmente las velocidades por v_frame.
    pedagogical_triggers:
      - when: "true"
        message:
          es: Antes de sumar velocidades, identifica que velocidad pertenece al objeto y cual al marco.
          en: Before adding velocities, identify which velocity belongs to the body and which belongs to the frame.
