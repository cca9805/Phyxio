version: "1.0"
leaf: "sistemas-referencia"

coord:
  title:
    es: Gráfica Coord · Sistemas de Referencia
    en: Coord Graph · Reference Frames
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x (m) medida desde distintos observadores
    en: position x (m) measured from different observers
  xMagnitude: t
  yMagnitude: x
  relation:
    es: "La posición y velocidad de un objeto dependen del sistema de referencia elegido. La transformación de Galileo conecta las medidas de dos observadores con velocidad relativa V: x' = x − V·t."
    en: "The position and velocity of an object depend on the chosen reference frame. The Galilean transformation connects the measurements of two observers with relative velocity V: x' = x − V·t."
  physicalReading:
    es: "La gráfica superpone las descripciones del mismo movimiento desde dos marcos: las pendientes de las rectas difieren en V, la velocidad relativa entre los observadores."
    en: "The graph superimposes descriptions of the same motion from two frames: the slopes of the lines differ by V, the relative velocity between observers."
  slopeMeaning:
    es: La diferencia de pendientes entre las dos rectas es la velocidad relativa V entre los dos sistemas de referencia.
    en: The difference in slopes between the two lines is the relative velocity V between the two reference frames.
  interceptMeaning:
    es: Los cortes con el eje y son las posiciones iniciales del objeto medidas desde cada observador. Si los orígenes coinciden en t = 0, los cortes son iguales.
    en: The y-intercepts are the initial positions of the object measured from each observer. If origins coincide at t = 0, the intercepts are equal.
  curvatureMeaning:
    es: Las curvaturas son las mismas en ambos marcos si la aceleración relativa entre marcos es cero (marcos no acelerados entre sí).
    en: Curvatures are the same in both frames if the relative acceleration between frames is zero (non-accelerating frames with respect to each other).
  signMeaning:
    es: Una posición positiva en un marco puede ser negativa en otro según la dirección de V.
    en: A positive position in one frame may be negative in another depending on the direction of V.
  areaMeaning:
    es: Sin interpretación directa específica de este leaf.
    en: No specific direct interpretation for this leaf.
  domainMeaning:
    es: Válido para marcos de referencia inerciales (no acelerados entre sí) y velocidades no relativistas.
    en: Valid for inertial reference frames (non-accelerating relative to each other) and non-relativistic velocities.
  modelConnection:
    es: "Se interpreta bajo la transformación de Galileo clásica: x' = x − Vt, v' = v − V, a' = a."
    en: "Interpreted within the classical Galilean transformation: x' = x − Vt, v' = v − V, a' = a."
  formulaConnection:
    es: "Conecta con x' = x − Vt y v' = v − V (transformación de Galileo)."
    en: "Connects to x' = x − Vt and v' = v − V (Galilean transformation)."
  readingFocus:
    es: leer la diferencia de pendientes como velocidad relativa entre marcos y verificar que la aceleración (curvatura) es la misma en ambos.
    en: read the difference in slopes as relative velocity between frames and verify that the acceleration (curvature) is the same in both.
  agentHints:
    es:
      - "La aceleración es invariante bajo la transformación de Galileo: ambos marcos miden el mismo valor."
      - "La velocidad no es invariante: depende del marco elegido."
      - Elegir bien el sistema de referencia simplifica enormemente el problema (por ejemplo, el marco del CM en colisiones).
    en:
      - "Acceleration is invariant under the Galilean transformation: both frames measure the same value."
      - "Velocity is not invariant: it depends on the chosen frame."
      - Choosing the right reference frame greatly simplifies the problem (e.g., the CM frame in collisions).
  commonMistakes:
    es:
      - Creer que la posición es una propiedad absoluta del objeto y no de su relación con el observador.
      - Olvidar que cambiar de sistema de referencia cambia la velocidad pero no la aceleración (en marcos inerciales).
      - Aplicar la transformación de Galileo en situaciones donde la velocidad relativa es comparable a la de la luz.
    en:
      - Believing position is an absolute property of the object rather than relative to the observer.
      - Forgetting that changing reference frames changes velocity but not acceleration (in inertial frames).
      - Applying the Galilean transformation when relative velocity is comparable to the speed of light.

svg:
  title:
    es: Escena SVG · Sistemas de Referencia
    en: SVG Scene · Reference Frames
  sceneId: sistemas_referencia_scene
  sceneLabel:
    es: Mismo objeto descrito desde dos sistemas de referencia distintos
    en: Same object described from two different reference frames
  objects:
    es:
      - objeto en movimiento
      - observador A (laboratorio)
      - observador B (móvil)
      - vector velocidad relativa V
    en:
      - moving object
      - observer A (laboratory)
      - observer B (moving)
      - relative velocity vector V
  mainObject:
    es: objeto cuya descripción depende del marco elegido
    en: object whose description depends on the chosen frame
  referenceFrame:
    es: dos marcos inerciales con velocidad relativa V
    en: two inertial frames with relative velocity V
  geometry:
    es: "La escena muestra el mismo objeto descrito desde dos marcos: el observador A está fijo en el laboratorio y el observador B se mueve con velocidad V respecto a A. Cada uno describe posiciones y velocidades distintas."
    en: "The scene shows the same object described from two frames: observer A is fixed in the laboratory and observer B moves with velocity V with respect to A. Each describes different positions and velocities."
  interactions:
    es: No hay fuerzas nuevas al cambiar de marco (marcos inerciales). Solo cambia la descripción cinemática.
    en: No new forces arise when changing frames (inertial frames). Only the kinematic description changes.
  modelElements:
    es:
      - vector velocidad del objeto medida por A
      - vector velocidad del objeto medida por B
      - vector velocidad relativa V entre marcos
    en:
      - object velocity vector measured by A
      - object velocity vector measured by B
      - relative velocity vector V between frames
  visualCues:
    es:
      - La velocidad del objeto según B es la velocidad según A menos la velocidad de B respecto a A.
      - Si el objeto está en reposo para A, B lo ve moverse con velocidad −V.
      - El objeto puede estar en reposo en un marco y en movimiento en otro.
    en:
      - "The object's velocity according to B is the velocity according to A minus B's velocity with respect to A."
      - If the object is at rest for A, B sees it moving with velocity −V.
      - The object can be at rest in one frame and in motion in another.
  scaleMeaning:
    es: "Los vectores son cualitativos: ilustran la transformación de velocidades entre marcos."
    en: "Vectors are qualitative: they illustrate the velocity transformation between frames."
  relation:
    es: La escena ilustra que posición y velocidad son cantidades relativas al observador, mientras que la aceleración es invariante entre marcos inerciales.
    en: The scene illustrates that position and velocity are relative to the observer, while acceleration is invariant between inertial frames.
  physicalReading:
    es: Leer los vectores de velocidad desde cada observador y verificar que difieren en el vector V de velocidad relativa entre marcos.
    en: Read the velocity vectors from each observer and verify they differ by the relative velocity vector V between frames.
  modelConnection:
    es: Se interpreta bajo la transformación de Galileo entre marcos de referencia inerciales.
    en: Interpreted within the Galilean transformation between inertial reference frames.
  formulaConnection:
    es: Conecta con v_B = v_A − V y x_B = x_A − Vt.
    en: Connects to v_B = v_A − V and x_B = x_A − Vt.
  readingFocus:
    es: identificar cuál es el observador de referencia y cómo cambia la velocidad del objeto al cambiar de marco.
    en: "identify which is the reference observer and how the object's velocity changes when switching frames."
  agentHints:
    es:
      - Elegir el marco de referencia correctamente puede simplificar enormemente un problema de mecánica.
      - En marcos no inerciales (acelerados) hay que introducir fuerzas ficticias.
      - La física (aceleraciones, fuerzas) es la misma en todos los marcos inerciales.
    en:
      - Choosing the right reference frame can greatly simplify a mechanics problem.
      - In non-inertial (accelerating) frames, fictitious forces must be introduced.
      - The physics (accelerations, forces) is the same in all inertial frames.
  commonMistakes:
    es:
      - Mezclar medidas de distintos observadores en la misma ecuación sin transformar.
      - Confundir un marco inercial con un marco acelerado.
      - Creer que la velocidad del objeto es una propiedad absoluta independiente del marco.
    en:
      - Mixing measurements from different observers in the same equation without transforming.
      - Confusing an inertial frame with an accelerating frame.
      - "Believing the object's velocity is an absolute property independent of the frame."
