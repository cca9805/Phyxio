version: 2
id: interpretacion-sistemas-referencia
leaf_id: sistemas-referencia
nombre:
  es: Interpretacion de Sistemas referencia
  en: Interpretation of Reference Frames
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cinematica
  parent_id: movimiento-relativo
  ruta_relativa: fisica-clasica/mecanica/cinematica/movimiento-relativo/sistemas-referencia
dependencies:
  formulas:
    - trans_galileo_pos
    - invarianza_distancia
    - invarianza_tiempo
    - trans_galileo_vel
  magnitudes:
    - O
    - frame_sigma
    - r_vec
    - v_frame
    - t_global
    - v
    - v_prime
output_contract:
  sections:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  O:
    summary_rules:
      - id: O_summary
        when: "true"
        status: info
        text:
          es: El origen[[O]]fija el punto de referencia desde el que se miden las posiciones.
          en: The origin[[O]]sets the reference point from which positions are measured.
    coherence_rules:
      - id: O_coherence_rule
        when: "true"
        status: ok
        text:
          es: Comprueba que el origen[[O]]pertenece al marco declarado antes de leer cualquier posici?n.
          en: Check that the origin[[O]]belongs to the declared frame before reading any position.
    coherence_checks:
      - id: O_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que el origen[[O]]sea coherente con el sistema de coordenadas elegido.
          en: Check that the origin[[O]]is coherent with the chosen coordinate system.
    physical_reading_rules:
      - id: O_physical
        when: "true"
        status: info
        text:
          es: El origen[[O]]permite distinguir qué parte de la posición se debe a la ubicación del observador.
          en: The origin[[O]]allows distinguishing which part of the position is due to the observer's location.
    model_validity_rules:
      - id: O_validity
        when: "true"
        status: ok
        text:
          es: El origen[[O]]debe permanecer fijo respecto a su marco[[frame_sigma]].
          en: The origin[[O]]must remain fixed relative to its frame[[frame_sigma]].
    graph_rules:
      - id: O_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe mostrar claramente el punto de origen[[O]].
          en: The graph must clearly show the origin point[[O]].
    likely_errors:
      - id: O_warn
        when: "true"
        status: warning
        text:
          es: No confundas el origen[[O]]de un marco con el de otro marco en movimiento.
          en: Do not confuse the origin[[O]]of one frame with that of another moving frame.
    next_step_rules:
      - id: O_next
        when: "true"
        status: info
        text:
          es: Una vez fijado el origen[[O]], procede a leer el vector de posición[[r_vec]].
          en: Once the origin[[O]]is fixed, proceed to read the position vector[[r_vec]].
  frame_sigma:
    summary_rules:
      - id: frame_sigma_summary
        when: "true"
        status: info
        text:
          es: El marco de referencia[[frame_sigma]]fija desde qué observador se describe la escena.
          en: The reference frame[[frame_sigma]]fixes from which observer the scene is described.
    coherence_rules:
      - id: frame_sigma_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que orígenes, signos y velocidades pertenecen al mismo marco[[frame_sigma]]declarado.
          en: Check that origins, signs, and velocities belong to the same declared frame[[frame_sigma]].
    physical_reading_rules:
      - id: frame_sigma_physical
        when: "true"
        status: info
        text:
          es: Cambiar el marco[[frame_sigma]]cambia la descripción del movimiento sin cambiar el evento físico.
          en: Changing the frame[[frame_sigma]]changes the motion description without changing the physical event.
    model_validity_rules:
      - id: frame_sigma_validity
        when: "true"
        status: ok
        text:
          es: El marco[[frame_sigma]]es interpretable mientras la comparación entre marcos siga siendo galileana.
          en: The frame[[frame_sigma]]is interpretable while the comparison between frames remains Galilean.
    graph_rules:
      - id: frame_sigma_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe dejar claro qué observador está leyendo la trayectoria.
          en: The graph should make clear which observer is reading the trajectory.
    likely_errors:
      - id: frame_sigma_warn
        when: "true"
        status: warning
        text:
          es: No mezcles coordenadas de dos marcos[[frame_sigma]]distintos como si pertenecieran al mismo observador.
          en: Do not mix coordinates from two different frames[[frame_sigma]]as if they belonged to the same observer.
    next_step_rules:
      - id: frame_sigma_next
        when: "true"
        status: info
        text:
          es: Declara el marco[[frame_sigma]]antes de interpretar posiciones o velocidades.
          en: Declare the frame[[frame_sigma]]before interpreting positions or velocities.
  r_vec:
    summary_rules:
      - id: r_vec_summary
        when: "true"
        status: info
        text:
          es: El vector de posición[[r_vec]]resume la ubicación medida desde el origen del marco elegido.
          en: The position vector[[r_vec]]summarizes the location measured from the chosen frame's origin.
    coherence_rules:
      - id: r_vec_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que el vector[[r_vec]]se mide desde el origen correcto y con el signo declarado.
          en: Check that the vector[[r_vec]]is measured from the correct origin and with the declared sign.
    physical_reading_rules:
      - id: r_vec_physical
        when: "true"
        status: info
        text:
          es: El vector[[r_vec]]cambia cuando cambia el observador porque cambia el origen desde el que se mide.
          en: The vector[[r_vec]]changes when the observer changes because the measuring origin changes.
    model_validity_rules:
      - id: r_vec_validity
        when: "true"
        status: ok
        text:
          es: El vector[[r_vec]]solo es comparable entre marcos si el cambio de referencia está bien declarado.
          en: The vector[[r_vec]]is comparable across frames only if the reference change is clearly declared.
    graph_rules:
      - id: r_vec_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe mostrar desde qué origen se está leyendo la posición.
          en: The graph should show from which origin the position is being read.
    likely_errors:
      - id: r_vec_warn
        when: "true"
        status: warning
        text:
          es: No interpretes el vector[[r_vec]]como una posición absoluta independiente del marco.
          en: Do not interpret the vector[[r_vec]]as an absolute frame-independent position.
    next_step_rules:
      - id: r_vec_next
        when: "true"
        status: info
        text:
          es: Traduce el vector[[r_vec]]al nuevo marco solo después de fijar observador y origen.
          en: Translate the vector[[r_vec]]to the new frame only after fixing observer and origin.
  v_frame:
    summary_rules:
      - id: v_frame_summary
        when: "true"
        status: info
        text:
          es: La velocidad del marco[[v_frame]]recoge el movimiento del marco móvil respecto al marco de comparación.
          en: The frame velocity[[v_frame]]captures the motion of the moving frame relative to the comparison frame.
    coherence_rules:
      - id: v_frame_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que la velocidad[[v_frame]]no se confunde con la velocidad propia del móvil observado.
          en: Check that the velocity[[v_frame]]is not confused with the observed body's own velocity.
    physical_reading_rules:
      - id: v_frame_physical
        when: "true"
        status: info
        text:
          es: La velocidad[[v_frame]]explica la parte del cambio de descripción debida al movimiento del observador.
          en: The velocity[[v_frame]]explains the part of the description change caused by the observer's motion.
    model_validity_rules:
      - id: v_frame_validity
        when: "true"
        status: ok
        text:
          es: La velocidad[[v_frame]]se interpreta de forma simple mientras la velocidad relativa entre marcos sea constante.
          en: The velocity[[v_frame]]is simply interpreted while the relative speed between frames remains constant.
    graph_rules:
      - id: v_frame_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe distinguir la velocidad[[v_frame]]de la velocidad interna del móvil.
          en: The graph should distinguish the velocity[[v_frame]]from the body's internal velocity.
    likely_errors:
      - id: v_frame_warn
        when: "true"
        status: warning
        text:
          es: No sumes la velocidad[[v_frame]]sin decidir antes a qué observador pertenece cada velocidad.
          en: Do not add the velocity[[v_frame]]before deciding which observer each velocity belongs to.
    next_step_rules:
      - id: v_frame_next
        when: "true"
        status: info
        text:
          es: Usa la velocidad[[v_frame]]para traducir la descripción, no para redefinir el movimiento interno.
          en: Use the velocity[[v_frame]]to translate the description, not to redefine the internal motion.
  v:
    summary_rules:
      - id: v_summary
        when: "true"
        status: info
        text:
          es: La velocidad[[v]]resume el ritmo de cambio de posición medido desde el marco fijo.
          en: The velocity[[v]]summarizes the rate of position change measured from the fixed frame.
    coherence_rules:
      - id: v_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que la velocidad[[v]]sea coherente con unidades, signos y contexto.
          en: Check that the velocity[[v]]is coherent with units, signs, and context.
    physical_reading_rules:
      - id: v_physical
        when: "true"
        status: info
        text:
          es: La lectura de la velocidad[[v]]debe explicar qué representa respecto al observador fijo.
          en: The reading of the velocity[[v]]must explain what it represents relative to the fixed observer.
    model_validity_rules:
      - id: v_validity
        when: "true"
        status: ok
        text:
          es: La velocidad[[v]]solo es interpretable dentro del modelo galileano declarado.
          en: The velocity[[v]]is interpretable only inside the declared Galilean model.
    graph_rules:
      - id: v_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe reflejar visualmente el valor de la velocidad[[v]].
          en: The graph must visually reflect the value of the velocity[[v]].
    likely_errors:
      - id: v_warn
        when: "true"
        status: warning
        text:
          es: No confundas la velocidad[[v]]con la velocidad relativa del marco.
          en: Do not confuse the velocity[[v]]with the frame's relative velocity.
    next_step_rules:
      - id: v_next
        when: "true"
        status: info
        text:
          es: Usa la velocidad[[v]]para enlazar con el siguiente paso de interpretación cinemática.
          en: Use the velocity[[v]]to connect with the next kinematic interpretation step.
  v_prime:
    summary_rules:
      - id: v_prime_summary
        when: "true"
        status: info
        text:
          es: La velocidad[[v_prime]]resume el movimiento del objeto visto desde el marco móvil.
          en: The velocity[[v_prime]]summarizes the object's motion as seen from the moving frame.
    coherence_rules:
      - id: v_prime_coherence
        when: "true"
        status: ok
        text:
          es: Comprueba que la velocidad[[v_prime]]sea coherente con el movimiento interno del sistema.
          en: Check that the velocity[[v_prime]]is coherent with the system's internal motion.
    physical_reading_rules:
      - id: v_prime_physical
        when: "true"
        status: info
        text:
          es: La velocidad[[v_prime]]permite evaluar el comportamiento del móvil ignorando el desplazamiento del marco.
          en: The velocity[[v_prime]]allows evaluating the body's behavior ignoring the frame's displacement.
    model_validity_rules:
      - id: v_prime_validity
        when: "true"
        status: ok
        text:
          es: La velocidad[[v_prime]]solo es válida si el marco móvil no acelera.
          en: The velocity[[v_prime]]is only valid if the moving frame does not accelerate.
    graph_rules:
      - id: v_prime_graph
        when: "true"
        status: info
        text:
          es: La gráfica debe mostrar la velocidad[[v_prime]]respecto a los ejes móviles.
          en: The graph must show the velocity[[v_prime]]relative to the moving axes.
    likely_errors:
      - id: v_prime_warn
        when: "true"
        status: warning
        text:
          es: No confundas la velocidad[[v_prime]]con la velocidad total observada desde tierra.
          en: Do not confuse the velocity[[v_prime]]with the total velocity observed from the ground.
    next_step_rules:
      - id: v_prime_next
        when: "true"
        status: info
        text:
          es: Usa la velocidad[[v_prime]]para calcular la evolución temporal dentro del marco relativo.
          en: Use the velocity[[v_prime]]to compute the temporal evolution within the relative frame.

