version: 1
magnitudes:
  - id: O
    symbol: O
    nombre:
      es: origen del sistema de referencia
      en: origin of the reference system
    descripcion:
      es: Punto geométrico fijo respecto al observador que sirve como referencia para medir posiciones (coordenada cero).
      en: Fixed geometric point relative to the observer that serves as a reference for measuring positions (zero coordinate).
    unidad_si: "1"
    dimension: "1"
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundas el origen[[O]]con el centro de masas u otra magnitud de posición absoluta.
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: false
      meaning:
        es: El origen no tiene signo; define el punto cero de la escala.
        en: The origin has no sign; it defines the zero point of the scale.
    zero_behavior:
      allowed: true
      meaning:
        es: El valor cero del origen es la referencia para todas las demás posiciones.
        en: The zero value of the origin is the reference for all other positions.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Fija el origen[[O]]siempre al principio del problema para evitar confusiones de signos.
  - id: frame_sigma
    symbol: '\Sigma'
    nombre:
      es: marco de referencia
      en: reference frame
    descripcion:
      es: Conjunto de puntos del espacio cuya distancia mutua es constante en el tiempo, asociado a un estado de movimiento.
      en: Set of space points whose mutual distance is constant over time, associated with a state of motion.
    unidad_si: "1"
    dimension: "1"
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundas el marco de referencia[[frame_sigma]]con un simple punto de origen.
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: false
      meaning:
        es: El marco[[frame_sigma]]no tiene signo; es el escenario de la descripción.
        en: The frame[[frame_sigma]]has no sign; it is the description's setting.
    zero_behavior:
      allowed: true
      meaning:
        es: Un marco[[frame_sigma]]no toma valores numéricos en sí mismo.
        en: A frame[[frame_sigma]]does not take numerical values itself.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: El marco[[frame_sigma]]debe declararse antes de definir cualquier vector de posición.
  - id: r_vec
    symbol: '\overrightarrow{r}'
    nombre:
      es: vector de posición
      en: position vector
    descripcion:
      es: Vector que une el origen del sistema de referencia con la posición instantánea de la partícula.
      en: Vector connecting the origin of the reference system with the particle's instantaneous position.
    unidad_si: m
    dimension: L
    is_vector: true
    components:
      - r_vec_x
      - r_vec_y
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundir el vector[[r_vec]]con la distancia recorrida o el desplazamiento.
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: true
      meaning:
        es: El signo de las componentes de[[r_vec]]indica hacia qué lado del origen está el móvil.
        en: The sign of[[r_vec]]components indicates which side of the origin the body is on.
    zero_behavior:
      allowed: true
      meaning:
        es: El valor cero significa que el móvil está exactamente sobre el origen[[O]].
        en: Zero value means the body is exactly at the origin[[O]].
    value_nature:
      kind: vector_projection
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Recuerda que[[r_vec]]cambia si cambias de origen[[O]]aunque el objeto no se mueva.
  - id: v_frame
    symbol: '\overrightarrow{v}_f'
    nombre:
      es: velocidad del marco móvil
      en: frame velocity
    descripcion:
      es: Velocidad a la que se desplaza un sistema de referencia respecto a otro considerado "fijo".
      en: Velocity at which one reference system moves relative to another considered "fixed."
    unidad_si: m/s
    dimension: L T^-1
    is_vector: true
    components:
      - v_frame_x
      - v_frame_y
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundas la velocidad del marco[[v_frame]]con la velocidad interna del móvil.
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: true
      meaning:
        es: El signo indica el sentido del desplazamiento del marco móvil respecto al fijo.
        en: The sign indicates the moving frame's direction relative to the fixed one.
    zero_behavior:
      allowed: true
      meaning:
        es: Si la velocidad[[v_frame]]es cero, ambos marcos están en reposo relativo.
        en: If the velocity[[v_frame]]is zero, both frames are at relative rest.
    value_nature:
      kind: vector_projection
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Usa[[v_frame]]solo para traducir descripciones entre marcos galileanos.
  - id: t_global
    symbol: t
    nombre:
      es: tiempo universal clásico
      en: classical universal time
    descripcion:
      es: Parámetro escalar que fluye de forma idéntica para todos los observadores en mecánica clásica.
      en: Scalar parameter that flows identically for all observers in classical mechanics.
    unidad_si: s
    dimension: "1"
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No creas que el tiempo[[t_global]]cambia al cambiar de observador en este modelo.
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: false
      meaning:
        es: El tiempo clásico suele tomarse como positivo y creciente.
        en: Classical time is usually taken as positive and increasing.
    zero_behavior:
      allowed: true
      meaning:
        es: El tiempo[[t_global]]igual a cero define el instante de inicio de la cronología común.
        en: Time[[t_global]]equals zero defines the start of the common chronology.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: El[[t_global]]es la única magnitud que no cambia al aplicar una transformación de Galileo.
  - id: v
    symbol: v
    nombre:
      es: velocidad en el marco de referencia
      en: velocity in the reference frame
    descripcion:
      es: Velocidad del móvil medida desde el marco de referencia principal.
      en: Velocity of the body measured from the main reference frame.
    unidad_si: m/s
    dimension: L T^-1
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundas la velocidad observada[[v]]con la velocidad interna[[v_prime]].
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: true
      meaning:
        es: El signo indica sentido respecto a la convención elegida en el marco fijo.
        en: The sign indicates direction under the fixed frame convention.
    zero_behavior:
      allowed: true
      meaning:
        es: El valor cero significa que el móvil está en reposo respecto al marco fijo.
        en: Zero value means the body is at rest relative to the fixed frame.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: La velocidad[[v]]es el resultado de sumar la velocidad interna y la del marco móvil.
  - id: v_prime
    symbol: v'
    nombre:
      es: velocidad en el marco móvil
      en: velocity in the moving frame
    descripcion:
      es: Velocidad del móvil medida desde el marco que se traslada respecto al principal.
      en: Velocity of the body measured from the frame moving relative to the main one.
    unidad_si: m/s
    dimension: L T^-1
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - sistemas-referencia
    common_mistake: No confundas la velocidad relativa[[v_prime]]con la velocidad absoluta[[v]].
    typical_range: Depende del contexto físico del problema.
    sign_behavior:
      has_sign: true
      meaning:
        es: El signo indica sentido respecto a los ejes del marco móvil[[frame_sigma]].
        en: The sign indicates direction under the moving frame's axes[[frame_sigma]].
    zero_behavior:
      allowed: true
      meaning:
        es: El valor cero significa que el móvil está en reposo para el observador móvil.
        en: Zero value means the body is at rest for the moving observer.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - sistemas-referencia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Usa[[v_prime]]para describir el movimiento como si el marco móvil estuviera en reposo.

