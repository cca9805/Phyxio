version: 1
formulas:
- id: composicion_velocidades
  title:
    es: Composicion galileana de velocidades
    en: Galilean velocity composition
  equation: v_abs = v_rel + v_frame
  latex: "\\vec{v}_{A/O} = \\vec{v}_{A/B} + \\vec{v}_{B/O}"
  rearrangements: []
  category: fundamental
  relation_type: constitutive_relation
  physical_meaning:
    es: La velocidad de A respecto al observador base O se obtiene sumando la velocidad de A respecto al observador movil B y la velocidad del propio observador B respecto a O.
    en: The velocity of A relative to the base observer O is obtained by adding the velocity of A relative to the moving observer B and the velocity of observer B relative to O.
  constraints:
  - mismo observador base O para todas las velocidades de la ecuacion
  - marcos inerciales o aproximadamente inerciales
  - regimen clasico no relativista
  validity:
    es: Valida cuando la composicion de velocidades puede tratarse con transformaciones galileanas.
    en: Valid when velocity composition can be treated with Galilean transformations.
  dimension_check: '[L/T] = [L/T] + [L/T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Cintas moviles, barcos en rios, aviones con viento y camaras montadas en vehiculos.
  interpretation_tags:
  - velocidad-relativa
  - v_abs
  - v_rel
  - v_frame
  result_semantics:
    target: v_abs
    meaning: Permite reconstruir la velocidad observada desde el marco base a partir de la velocidad relativa y de la velocidad del marco movil.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que las tres velocidades pertenezcan al mismo problema y al mismo observador base O.
      en: Check that the three velocities belong to the same problem and to the same base observer O.
  coherence_checks:
  - expr: 'true'
    message:
      es: Comprueba que no se suman modulos si el problema exige una composicion vectorial componente a componente.
      en: Check that magnitudes are not added as scalars when the problem requires vector composition component by component.
  graph_implications:
  - La grafica debe mostrar como v_abs cambia al combinar la velocidad propia del movil con la del marco.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Si dudas entre sumar o restar, primero identifica quien es A, quien es B y quien actua como observador base O.
      en: If you are unsure whether to add or subtract, first identify who A is, who B is, and who acts as the base observer O.
- id: definicion_vel_rel
  title:
    es: Definicion de velocidad relativa
    en: Definition of relative velocity
  equation: v_rel = v_abs - v_frame
  latex: "\\vec{v}_{A/B} = \\vec{v}_{A/O} - \\vec{v}_{B/O}"
  rearrangements: []
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La velocidad relativa es la velocidad de A medida desde el mismo observador base menos la velocidad del observador B medida desde ese mismo base.
    en: Relative velocity is the velocity of A measured from the same base observer minus the velocity of observer B measured from that same base.
  constraints:
  - v_abs y v_frame deben medirse desde el mismo observador base O
  - los ejes deben estar alineados o expresados en componentes compatibles
  validity:
    es: Base de la lectura cinematica cuando se cambia de observador en mecanica clasica.
    en: Basis of kinematic reading when changing observers in classical mechanics.
  dimension_check: '[L/T] = [L/T] - [L/T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Elegir el marco donde una persecucion, una colision o una maniobra se ve mas simple.
  interpretation_tags:
  - velocidad-relativa
  - v_rel
  - v_abs
  - v_frame
  result_semantics:
    target: v_rel
    meaning: Aclara que v_rel no es una velocidad absoluta nueva, sino una comparacion entre dos descripciones del mismo movimiento.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que ambas velocidades esten referidas al mismo observador base antes de restarlas.
      en: Check that both velocities are referred to the same base observer before subtracting them.
  coherence_checks:
  - expr: 'true'
    message:
      es: "Revisa signos y sentidos: cambiar el observador cambia la interpretacion de la resta."
      en: "Review signs and directions: changing the observer changes the interpretation of the subtraction."
  graph_implications:
  - La grafica debe dejar ver que v_rel mide la velocidad observada desde el marco movil y no desde el suelo.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Si v_rel sale cero, pregunta si hay reposo mutuo entre A y B aunque ambos se muevan respecto a O.
      en: If v_rel comes out as zero, ask whether there is mutual rest between A and B even if both move with respect to O.
- id: inversion_relativa
  title:
    es: Inversion de la velocidad relativa
    en: Relative velocity inversion
  equation: v_AB = -v_BA
  latex: "\\vec{v}_{A/B} = -\\vec{v}_{B/A}"
  rearrangements: []
  category: structural
  relation_type: identity
  physical_meaning:
    es: Intercambiar observador y observado invierte el signo o la direccion de la velocidad relativa.
    en: Swapping observer and observed reverses the sign or direction of the relative velocity.
  constraints:
  - misma pareja de moviles observada desde roles opuestos
  validity:
    es: Siempre valida mientras se compare la misma pareja de cuerpos.
    en: Always valid as long as the same pair of bodies is compared.
  dimension_check: '[L/T] = [L/T]'
  calculable: false
  motivo_no_calculable: null
  used_in:
  - Comprobacion de signos en adelantamientos, encuentros y reposo mutuo.
  interpretation_tags:
  - velocidad-relativa
  - v_rel
  result_semantics:
    target: v_rel
    meaning: Recuerda que la misma comparacion cambia de signo al cambiar quien observa.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que no hayas cambiado tambien el eje o el marco base al invertir la perspectiva.
      en: Check that you have not also changed the axis or the base frame when inverting the perspective.
  coherence_checks:
  - expr: 'true'
    message:
      es: Comprueba que la inversion cambia el signo, no el modulo por arte de magia.
      en: Check that inversion changes the sign, not the magnitude by magic.
  graph_implications:
  - La grafica debe permitir leer la misma velocidad relativa con signo opuesto al intercambiar observador y observado.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Si dos observadores se ven casi quietos entre si, sus velocidades relativas deben salir iguales en modulo y opuestas en signo.
      en: If two observers see each other as nearly at rest, their relative velocities must have equal magnitude and opposite sign.
- id: despeje_v_frame
  title:
    es: Despeje de la velocidad del marco
    en: Solving for frame velocity
  equation: v_frame = v_abs - v_rel
  latex: "\\vec{v}_{B/O} = \\vec{v}_{A/O} - \\vec{v}_{A/B}"
  rearrangements: []
  category: structural
  relation_type: derived_relation
  physical_meaning:
    es: Permite identificar la velocidad del marco movil cuando se conocen la velocidad observada desde O y la velocidad relativa medida dentro del marco B.
    en: It identifies the velocity of the moving frame when the velocity observed from O and the relative velocity measured within frame B are known.
  constraints:
  - mismo observador base O
  - mismo movil A en ambos terminos
  validity:
    es: Valida como despeje algebraico de la composicion galileana.
    en: Valid as an algebraic rearrangement of Galilean composition.
  dimension_check: '[L/T] = [L/T] - [L/T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - Estimar la velocidad de una cinta, vagon o plataforma a partir de una medicion local y una global.
  interpretation_tags:
  - velocidad-relativa
  - v_frame
  - v_abs
  - v_rel
  result_semantics:
    target: v_frame
    meaning: Hace visible la parte del movimiento que pertenece al marco u observador intermedio.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que v_abs y v_rel correspondan al mismo movil A antes de despejar v_frame.
      en: Check that v_abs and v_rel correspond to the same body A before solving for v_frame.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que v_frame no se interprete como velocidad propia del movil, sino como velocidad del marco B.
      en: Check that v_frame is not interpreted as the body's own velocity but as the velocity of frame B.
  graph_implications:
  - La grafica debe distinguir la contribucion del marco de la contribucion del movil observado.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Si el despeje de v_frame parece absurdo, revisa si has confundido observador base con observador movil.
      en: If the solved value of v_frame looks absurd, review whether you have confused the base observer with the moving observer.
