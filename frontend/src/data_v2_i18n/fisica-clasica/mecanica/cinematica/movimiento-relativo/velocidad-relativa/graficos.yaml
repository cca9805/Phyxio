version: "1.0"
leaf: "velocidad-relativa"

coord:
  title:
    es: Gráfica Coord · Velocidad Relativa
    en: Coord Graph · Relative Velocity
  xAxis:
    es: velocidad de B respecto al suelo v_B (m/s)
    en: velocity of B with respect to the ground v_B (m/s)
  yAxis:
    es: "velocidad de A respecto a B, v_{A/B} (m/s)"
    en: "velocity of A with respect to B, v_{A/B} (m/s)"
  xMagnitude: v_B
  yMagnitude: "v_{A/B}"
  relation:
    es: "La velocidad de A respecto a B es v_{A/B} = v_A − v_B. La gráfica muestra que la velocidad relativa disminuye linealmente al aumentar la velocidad del observador B."
    en: "The velocity of A with respect to B is v_{A/B} = v_A − v_B. The graph shows that relative velocity decreases linearly as observer B's velocity increases."
  physicalReading:
    es: "La pendiente es −1: al aumentar v_B en 1 m/s, la velocidad relativa de A respecto a B disminuye en 1 m/s. El corte con el eje y es v_A, la velocidad de A en el laboratorio."
    en: "The slope is −1: increasing v_B by 1 m/s decreases the relative velocity of A with respect to B by 1 m/s. The y-intercept is v_A, A's laboratory velocity."
  slopeMeaning:
    es: "La pendiente es siempre −1: la transformación galileana de velocidades es una resta, no una escala."
    en: "The slope is always −1: the Galilean velocity transformation is a subtraction, not a rescaling."
  interceptMeaning:
    es: "El corte con el eje y es v_A: cuando B está en reposo (v_B = 0), A tiene velocidad v_{A/B} = v_A desde el laboratorio."
    en: "The y-intercept is v_A: when B is at rest (v_B = 0), A has velocity v_{A/B} = v_A in the laboratory frame."
  curvatureMeaning:
    es: La relación es estrictamente lineal para velocidades no relativistas.
    en: The relationship is strictly linear for non-relativistic velocities.
  signMeaning:
    es: "Si v_{A/B} < 0, A se mueve en sentido contrario respecto a B. Si v_{A/B} = 0, A está en reposo respecto a B."
    en: "If v_{A/B} < 0, A moves in the opposite direction with respect to B. If v_{A/B} = 0, A is at rest with respect to B."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para velocidades mucho menores que la velocidad de la luz. Para velocidades relativistas, la transformación ya no es aditiva.
    en: Valid for velocities much smaller than the speed of light. For relativistic velocities, the transformation is no longer additive.
  modelConnection:
    es: Se interpreta bajo la transformación galileana de velocidades para marcos de referencia inerciales.
    en: Interpreted within the Galilean velocity transformation for inertial reference frames.
  formulaConnection:
    es: "Conecta con v_{A/B} = v_A − v_B y con la composición vectorial de velocidades en 2D."
    en: "Connects to v_{A/B} = v_A − v_B and the vector composition of velocities in 2D."
  readingFocus:
    es: leer la pendiente como −1 y el intercepto como v_A, e identificar para qué valor de v_B la velocidad relativa es cero (A y B van a la misma velocidad).
    en: read the slope as −1 and the intercept as v_A, and identify the value of v_B for which relative velocity is zero (A and B have the same speed).
  agentHints:
    es:
      - La velocidad relativa es cero cuando A y B tienen la misma velocidad respecto al laboratorio.
      - Si A y B se mueven en sentidos opuestos, la velocidad relativa entre ellos es mayor que cualquiera de las dos velocidades individuales.
      - En 2D, la velocidad relativa se obtiene por composición vectorial, no por resta escalar.
    en:
      - Relative velocity is zero when A and B have the same velocity with respect to the laboratory.
      - If A and B move in opposite directions, the relative velocity between them is greater than either individual velocity.
      - In 2D, relative velocity is obtained by vector composition, not scalar subtraction.
  commonMistakes:
    es:
      - "Confundir velocidad relativa con velocidad absoluta: son conceptos distintos."
      - "Aplicar la fórmula escalar v_{A/B} = v_A − v_B cuando los vectores no son colineales."
      - Olvidar que la velocidad relativa de A respecto a B es opuesta a la de B respecto a A.
    en:
      - "Confusing relative velocity with absolute velocity: they are distinct concepts."
      - "Applying the scalar formula v_{A/B} = v_A − v_B when the vectors are not collinear."
      - Forgetting that the velocity of A with respect to B is opposite to that of B with respect to A.

svg:
  title:
    es: Escena SVG · Velocidad Relativa
    en: SVG Scene · Relative Velocity
  sceneId: velocidad_relativa_scene
  sceneLabel:
    es: Dos móviles con velocidades distintas y velocidad relativa entre ellos
    en: Two bodies with different velocities and relative velocity between them
  objects:
    es:
      - móvil A
      - móvil B
      - vector v_A
      - vector v_B
      - "vector v_{A/B}"
    en:
      - body A
      - body B
      - vector v_A
      - vector v_B
      - "vector v_{A/B}"
  mainObject:
    es: par de móviles con velocidades relativas
    en: pair of bodies with relative velocities
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: "La escena muestra dos móviles con sus vectores de velocidad respecto al laboratorio y el vector de velocidad relativa entre ellos, que es la diferencia vectorial v_{A/B} = v_A − v_B."
    en: "The scene shows two bodies with their velocity vectors with respect to the laboratory and the relative velocity vector between them, which is the vector difference v_{A/B} = v_A − v_B."
  interactions:
    es: "No hay fuerzas entre los móviles: la escena es puramente cinemática."
    en: "There are no forces between the bodies: the scene is purely kinematic."
  modelElements:
    es:
      - vector v_A (velocidad de A en el laboratorio)
      - vector v_B (velocidad de B en el laboratorio)
      - "vector v_{A/B} = v_A − v_B"
    en:
      - vector v_A (velocity of A in the laboratory)
      - vector v_B (velocity of B in the laboratory)
      - "vector v_{A/B} = v_A − v_B"
  visualCues:
    es:
      - "El vector v_{A/B} es la diferencia vectorial: se dibuja restando el vector v_B del v_A."
      - "Si A y B tienen la misma velocidad, v_{A/B} = 0: están en reposo relativo."
      - Si los vectores son opuestos, el módulo de la velocidad relativa es la suma de los módulos.
    en:
      - "The vector v_{A/B} is the vector difference: drawn by subtracting vector v_B from v_A."
      - "If A and B have the same velocity, v_{A/B} = 0: they are in relative rest."
      - If the vectors are opposite, the magnitude of relative velocity is the sum of the magnitudes.
  scaleMeaning:
    es: Los vectores son proporcionales a las velocidades. La diferencia vectorial se visualiza como el triángulo de velocidades.
    en: Vectors are proportional to velocities. The vector difference is visualized as the velocity triangle.
  relation:
    es: La escena ilustra que la velocidad relativa es una cantidad vectorial que depende de los vectores de velocidad de ambos móviles.
    en: The scene illustrates that relative velocity is a vector quantity that depends on the velocity vectors of both bodies.
  physicalReading:
    es: Identificar los vectores v_A y v_B, construir la diferencia vectorial y leer la dirección y módulo de la velocidad relativa.
    en: Identify vectors v_A and v_B, construct the vector difference, and read the direction and magnitude of the relative velocity.
  modelConnection:
    es: "Se interpreta bajo la transformación galileana de velocidades: v_{A/B} = v_A − v_B."
    en: "Interpreted within the Galilean velocity transformation: v_{A/B} = v_A − v_B."
  formulaConnection:
    es: "Conecta con v_{A/B} = v_A − v_B y con su inversa v_{B/A} = −v_{A/B}."
    en: "Connects to v_{A/B} = v_A − v_B and its inverse v_{B/A} = −v_{A/B}."
  readingFocus:
    es: construir visualmente la diferencia vectorial de velocidades e interpretar el resultado como la velocidad de A vista desde B.
    en: visually construct the vector velocity difference and interpret the result as the velocity of A as seen from B.
  agentHints:
    es:
      - La velocidad relativa se construye gráficamente restando el vector v_B del vector v_A.
      - "En problemas de encuentro, el móvil que persigue debe tener mayor velocidad que el perseguido: v_{A/B} > 0 en la dirección de persecución."
      - La velocidad relativa en 2D (por ejemplo, barco y río) requiere composición vectorial.
    en:
      - Relative velocity is constructed graphically by subtracting vector v_B from vector v_A.
      - "In pursuit problems, the chaser must have greater velocity than the target: v_{A/B} > 0 in the pursuit direction."
      - Relative velocity in 2D (e.g., boat and river) requires vector composition.
  commonMistakes:
    es:
      - Usar resta escalar cuando los vectores de velocidad no son colineales.
      - "Confundir v_{A/B} con v_{B/A}: son opuestos."
      - Ignorar la componente perpendicular en problemas de velocidad relativa en 2D.
    en:
      - Using scalar subtraction when velocity vectors are not collinear.
      - "Confusing v_{A/B} with v_{B/A}: they are opposite."
      - Ignoring the perpendicular component in 2D relative velocity problems.
