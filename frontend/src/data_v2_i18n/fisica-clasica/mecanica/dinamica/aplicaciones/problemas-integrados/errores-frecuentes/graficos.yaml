version: "1.0"
leaf: "errores-frecuentes"

coord:
  title:
    es: Gráfica Coord · Errores Frecuentes en Dinámica
    en: Coord Graph · Common Errors in Dynamics
  xAxis:
    es: fuerza aplicada F (N)
    en: applied force F (N)
  yAxis:
    es: aceleración a (m/s²)
    en: acceleration a (m/s²)
  xMagnitude: F
  yMagnitude: a
  relation:
    es: "La gráfica contrasta la respuesta correcta (ΣF = m·a) con errores típicos: confundir fuerza con aceleración, olvidar el rozamiento o la normal, o aplicar la segunda ley sin usar la fuerza neta."
    en: "The graph contrasts the correct result (ΣF = m·a) with typical errors: confusing force with acceleration, forgetting friction or normal, or applying the second law without using net force."
  physicalReading:
    es: La curva correcta es una recta con pendiente 1/m. Los errores comunes producen rectas con pendientes o interceptos incorrectos.
    en: The correct curve is a straight line with slope 1/m. Common errors produce lines with incorrect slopes or intercepts.
  slopeMeaning:
    es: La pendiente correcta es 1/m. Una pendiente diferente indica un error en la identificación de la masa o de las fuerzas.
    en: The correct slope is 1/m. A different slope indicates an error in identifying mass or forces.
  interceptMeaning:
    es: Si hay rozamiento, el intercepto correcto es la fuerza umbral μmg. Un intercepto nulo sugiere que se ignoró el rozamiento.
    en: With friction, the correct intercept is the threshold force μmg. A zero intercept suggests friction was ignored.
  curvatureMeaning:
    es: La relación debe ser lineal. Una curvatura indica que se confundió la fuerza con otra magnitud no proporcional.
    en: The relationship must be linear. Curvature indicates the force was confused with a non-proportional quantity.
  signMeaning:
    es: Una pendiente negativa indica que se asignó mal el signo de la aceleración o la dirección de la fuerza.
    en: A negative slope indicates the sign of acceleration or force direction was incorrectly assigned.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: El rango de fuerzas debe ser el rango experimental real. Extrapolar más allá puede ocultar errores.
    en: The force range must be the real experimental range. Extrapolating beyond it can hide errors.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton aplicada correctamente.
    en: "Interpreted under Newton's second law correctly applied."
  formulaConnection:
    es: Conecta con ΣF = m·a aplicada al DCL correcto del sistema.
    en: Connects to ΣF = m·a applied to the correct FBD of the system.
  readingFocus:
    es: comparar la pendiente observada con 1/m y el intercepto con la fuerza de rozamiento real para detectar errores sistemáticos.
    en: compare the observed slope with 1/m and the intercept with the actual friction force to detect systematic errors.
  agentHints:
    es:
      - Si la gráfica no pasa por el origen con pendiente 1/m, buscar fuerzas omitidas en el DCL.
      - Un intercepto negativo puede indicar que se omitió el rozamiento estático.
      - Una curvatura inesperada puede indicar masa variable o fuerza que depende de la velocidad.
    en:
      - If the graph does not pass through the origin with slope 1/m, look for forces omitted from the FBD.
      - A negative intercept may indicate that static friction was omitted.
      - Unexpected curvature may indicate variable mass or a velocity-dependent force.
  commonMistakes:
    es:
      - Usar la fuerza aplicada en lugar de la fuerza NETA.
      - Ignorar el peso o la normal en la ecuación de la segunda ley.
      - Confundir la aceleración con la velocidad al interpretar la gráfica.
    en:
      - Using the applied force instead of the NET force.
      - Ignoring weight or normal in the second law equation.
      - Confusing acceleration with velocity when interpreting the graph.
