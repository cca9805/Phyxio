version: 2
id: interpretacion-errores-frecuentes
leaf_id: errores-frecuentes
nombre:
  es: Interpretación de errores frecuentes en dinámica
  en: Interpretation of common errors in dynamics
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: problemas-integrados
  ruta_relativa: fisica-clasica/mecanica/dinamica/aplicaciones/problemas-integrados/errores-frecuentes
dependencies:
  formulas:
  - ley_newton_sistemas
  - relacion_rozamiento_maximo
  - proyeccion_normal_plano
  - fuerza_motriz_plano
  magnitudes:
  - fuerza_erronea
  - signo_aceleracion
  - componente_normal_erronea
  - F_ext_net
  - aceleracion_sistema
  - coeficiente_rozamiento_estatico
  - fuerza_rozamiento_maximo
  - masa_total
  - aceleracion_gravedad
  - angulo_plano
  - masa_cuerpo
  - fuerza_motriz
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen físico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura física
      en: Physical reading
  coherence:
    title:
      es: Coherencia y consistencia
      en: Coherence and consistency
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura gráfica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  aceleracion_sistema:
    summary_rules:
    - id: a_sum
      when: 'true'
      status: info
      text:
        es: La [[aceleracion_sistema]] define la respuesta dinámica global.
        en: The [[aceleracion_sistema]] defines the global dynamic response.
    physical_reading_rules:
    - id: a_phys
      when: 'true'
      status: info
      text:
        es: Representa el cambio de velocidad por unidad de tiempo del sistema vinculado.
        en: Represents the change in velocity per unit of time of the linked system.
    coherence_rules:
    - id: a_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser menor que la [[aceleracion_gravedad]] si no hay motores externos.
        en: Must be less than [[aceleracion_gravedad]] if there are no external motors.
    model_validity_rules:
    - id: a_val
      when: 'true'
      status: ok
      text:
        es: Válido para sistemas donde la cuerda permanece tensa.
        en: Valid for systems where the string remains taut.
    graph_rules:
    - id: a_graph
      when: 'true'
      status: info
      text:
        es: Corresponde a la pendiente de la gráfica de velocidad.
        en: Corresponds to the slope of the velocity graph.
    likely_errors:
    - id: a_err
      when: 'true'
      status: warning
      text:
        es: El error más común es olvidar la inercia de la [[masa_total]].
        en: The most common error is forgetting the inertia of [[masa_total]].
    next_step_rules:
    - id: a_next
      when: 'true'
      status: info
      text:
        es: Procede a calcular las tensiones internas con la aceleración obtenida.
        en: Proceed to calculate internal tensions with the obtained acceleration.
  fuerza_rozamiento_maximo:
    summary_rules:
    - id: fr_sum
      when: 'true'
      status: info
      text:
        es: La [[fuerza_rozamiento_maximo]] es el límite de adherencia estática.
        en: The [[fuerza_rozamiento_maximo]] is the limit of static adhesion.
    physical_reading_rules:
    - id: fr_phys
      when: 'true'
      status: info
      text:
        es: Es la resistencia que el suelo ofrece antes de permitir el deslizamiento.
        en: Is the resistance the ground offers before allowing sliding.
    coherence_rules:
    - id: fr_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser proporcional a la [[componente_normal_erronea]].
        en: Must be proportional to [[componente_normal_erronea]].
    model_validity_rules:
    - id: fr_val
      when: 'true'
      status: ok
      text:
        es: Válido bajo el modelo de fricción de Coulomb.
        en: Valid under the Coulomb friction model.
    graph_rules:
    - id: fr_graph
      when: 'true'
      status: info
      text:
        es: Se visualiza como un umbral de fuerza en el eje de ordenadas.
        en: Visualized as a force threshold on the ordinate axis.
    likely_errors:
    - id: fr_err
      when: 'true'
      status: warning
      text:
        es: Usar el coeficiente dinámico en lugar del [[coeficiente_rozamiento_estatico]].
        en: Using the kinetic coefficient instead of [[coeficiente_rozamiento_estatico]].
    next_step_rules:
    - id: fr_next
      when: 'true'
      status: info
      text:
        es: Compara este valor con la [[fuerza_motriz]] para decidir si hay movimiento.
        en: Compare this value with [[fuerza_motriz]] to decide if there is motion.
  angulo_plano:
    summary_rules:
    - id: ang_sum
      when: 'true'
      status: info
      text:
        es: El [[angulo_plano]] determina la inclinación de la superficie.
        en: The [[angulo_plano]] determines the surface inclination.
    physical_reading_rules:
    - id: ang_phys
      when: 'true'
      status: info
      text:
        es: Modifica la distribución del peso en componentes normal y tangencial.
        en: Modifies the weight distribution into normal and tangential components.
    coherence_rules:
    - id: ang_coh
      when: 'true'
      status: ok
      text:
        es: Valores elevados favorecen el deslizamiento.
        en: High values favor sliding.
    model_validity_rules:
    - id: ang_val
      when: 'true'
      status: ok
      text:
        es: Válido para ángulos entre cero y noventa grados.
        en: Valid for angles between zero and ninety degrees.
    graph_rules:
    - id: ang_graph
      when: 'true'
      status: info
      text:
        es: Afecta a la magnitud de los vectores proyectados en el diagrama.
        en: Affects the magnitude of the projected vectors in the diagram.
    likely_errors:
    - id: ang_err
      when: 'true'
      status: warning
      text:
        es: Confundir seno con coseno al proyectar fuerzas sobre el plano.
        en: Confusing sine with cosine when projecting forces onto the plane.
    next_step_rules:
    - id: ang_next
      when: 'true'
      status: info
      text:
        es: Utiliza el ángulo para calcular la normal mediante {{f:proyeccion_normal_plano}}.
        en: Use the angle to calculate the normal using {{f:proyeccion_normal_plano}}.
  fuerza_motriz:
    summary_rules:
    - id: fm_sum
      when: 'true'
      status: info
      text:
        es: La [[fuerza_motriz]] es la causa del inicio del movimiento.
        en: The [[fuerza_motriz]] is the cause of the start of motion.
    physical_reading_rules:
    - id: fm_phys
      when: 'true'
      status: info
      text:
        es: Es la suma de componentes externas que favorecen el avance del sistema.
        en: It is the sum of external components that favor the system's advancement.
    coherence_rules:
    - id: fm_coh
      when: 'true'
      status: ok
      text:
        es: Debe superar la [[fuerza_rozamiento_maximo]] para generar aceleración.
        en: Must exceed [[fuerza_rozamiento_maximo]] to generate acceleration.
    model_validity_rules:
    - id: fm_val
      when: 'true'
      status: ok
      text:
        es: Válido si se consideran todas las fuerzas externas activas.
        en: Valid if all active external forces are considered.
    graph_rules:
    - id: fm_graph
      when: 'true'
      status: info
      text:
        es: Se representa como el vector resultante impulsor en el DCL.
        en: Represented as the driving resulting vector in the FBD.
    likely_errors:
    - id: fm_err
      when: 'true'
      status: warning
      text:
        es: Olvidar componentes del peso en planos inclinados.
        en: Forgetting weight components on inclined planes.
    next_step_rules:
    - id: fm_next
      when: 'true'
      status: info
      text:
        es: Aplica la {{f:ley_newton_sistemas}} para hallar la aceleración real.
        en: Apply {{f:ley_newton_sistemas}} to find the actual acceleration.
  componente_normal_erronea:
    summary_rules:
    - id: n_sum
      when: 'true'
      status: info
      text:
        es: La [[componente_normal_erronea]] es la reacción perpendicular de la superficie.
        en: The [[componente_normal_erronea]] is the surface perpendicular reaction.
    physical_reading_rules:
    - id: n_phys
      when: 'true'
      status: info
      text:
        es: Indica cuánto se comprimen las superficies en contacto.
        en: Indicates how much the contacting surfaces are compressed.
    coherence_rules:
    - id: n_coh
      when: 'true'
      status: ok
      text:
        es: Debe anularse con las fuerzas perpendiculares al plano.
        en: Must cancel out with forces perpendicular to the plane.
    model_validity_rules:
    - id: n_val
      when: 'true'
      status: ok
      text:
        es: Válida mientras haya contacto físico entre cuerpo y plano.
        en: Valid as long as there is physical contact between body and plane.
    graph_rules:
    - id: n_graph
      when: 'true'
      status: info
      text:
        es: Vector normal al plano de deslizamiento en la representación Coord.
        en: Vector normal to the sliding plane in the Coord representation.
    likely_errors:
    - id: n_err
      when: 'true'
      status: warning
      text:
        es: Asumir que siempre es igual al peso sin considerar la inclinación.
        en: Assuming it's always equal to weight without considering inclination.
    next_step_rules:
    - id: n_next
      when: 'true'
      status: info
      text:
        es: Usa este valor para determinar la [[fuerza_rozamiento_maximo]].
        en: Use this value to determine [[fuerza_rozamiento_maximo]].
  fuerza_erronea:
    summary_rules:
    - id: fe_sum
      when: 'true'
      status: info
      text:
        es: La [[fuerza_erronea]] es un vector inexistente añadido por error.
        en: The [[fuerza_erronea]] is a non-existent vector added by mistake.
    physical_reading_rules:
    - id: fe_phys
      when: 'true'
      status: warning
      text:
        es: Representa una interpretación física incorrecta de las interacciones.
        en: Represents an incorrect physical interpretation of interactions.
    coherence_rules:
    - id: fe_coh
      when: 'true'
      status: warning
      text:
        es: Su presencia hace que la [[F_ext_net]] no coincida con el movimiento real.
        en: Its presence causes [[F_ext_net]] to not match the actual movement.
    model_validity_rules:
    - id: fe_val
      when: 'true'
      status: warning
      text:
        es: El modelo deja de ser válido si se incluyen fuerzas sin agente real.
        en: The model is no longer valid if forces without a real agent are included.
    graph_rules:
    - id: fe_graph
      when: 'true'
      status: info
      text:
        es: Aparece como un vector espurio en el diagrama de cuerpo libre.
        en: Appears as a spurious vector in the free body diagram.
    likely_errors:
    - id: fe_err
      when: 'true'
      status: warning
      text:
        es: Incluir fuerzas internas como la tensión en el análisis global.
        en: Including internal forces like tension in the global analysis.
    next_step_rules:
    - id: fe_next
      when: 'true'
      status: info
      text:
        es: Elimina esta fuerza y redefine el sistema para recuperar la consistencia.
        en: Eliminate this force and redefine the system to regain consistency.
  masa_total:
    summary_rules:
    - id: mt_sum
      when: 'true'
      status: info
      text:
        es: La [[masa_total]] es la inercia combinada del sistema.
        en: The [[masa_total]] is the combined system inertia.
    physical_reading_rules:
    - id: mt_phys
      when: 'true'
      status: info
      text:
        es: Representa la resistencia total al cambio de estado de movimiento.
        en: Represents the total resistance to change in the state of motion.
    coherence_rules:
    - id: mt_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser la suma de todas las masas individuales del sistema vinculado.
        en: Must be the sum of all individual masses of the linked system.
    model_validity_rules:
    - id: mt_val
      when: 'true'
      status: ok
      text:
        es: Válida para cuerpos vinculados rígidamente o por hilos ideales.
        en: Valid for bodies linked rigidly or by ideal strings.
    graph_rules:
    - id: mt_graph
      when: 'true'
      status: info
      text:
        es: Determina la escala de la aceleración ante una fuerza neta dada.
        en: Determines the acceleration scale given a net force.
    likely_errors:
    - id: mt_err
      when: 'true'
      status: warning
      text:
        es: Olvidar sumar alguno de los cuerpos al aplicar Newton.
        en: Forgetting to add one of the bodies when applying Newton.
    next_step_rules:
    - id: mt_next
      when: 'true'
      status: info
      text:
        es: Verifica que has incluido cada [[masa_cuerpo]] en el denominador.
        en: Verify that you included each [[masa_cuerpo]] in the denominator.
  coeficiente_rozamiento_estatico:
    summary_rules:
    - id: mu_sum
      when: 'true'
      status: info
      text:
        es: El [[coeficiente_rozamiento_estatico]] define la rugosidad de contacto.
        en: The [[coeficiente_rozamiento_estatico]] defines the contact roughness.
    physical_reading_rules:
    - id: mu_phys
      when: 'true'
      status: info
      text:
        es: Parámetro adimensional que cuantifica la adherencia entre materiales.
        en: Dimensionless parameter quantifying adhesion between materials.
    coherence_rules:
    - id: mu_coh
      when: 'true'
      status: ok
      text:
        es: Generalmente es mayor que el coeficiente cinético.
        en: It is generally greater than the kinetic coefficient.
    model_validity_rules:
    - id: mu_val
      when: 'true'
      status: ok
      text:
        es: Válido para superficies sólidas en reposo relativo.
        en: Valid for solid surfaces in relative rest.
    graph_rules:
    - id: mu_graph
      when: 'true'
      status: info
      text:
        es: Define la pendiente del límite de fricción en gráficas de fuerza.
        en: Defines the friction limit slope in force graphs.
    likely_errors:
    - id: mu_err
      when: 'true'
      status: warning
      text:
        es: Usar valores mayores a 2.0 es poco frecuente en materiales comunes.
        en: Using values greater than 2.0 is rare in common materials.
    next_step_rules:
    - id: mu_next
      when: 'true'
      status: info
      text:
        es: Úsalo junto a la normal para hallar la [[fuerza_rozamiento_maximo]].
        en: Use it together with the normal to find [[fuerza_rozamiento_maximo]].
  signo_aceleracion:
    summary_rules:
    - id: sign_sum
      when: 'true'
      status: info
      text:
        es: El [[signo_aceleracion]] indica el sentido real del avance.
        en: The [[signo_aceleracion]] indicates the actual advance direction.
    physical_reading_rules:
    - id: sign_phys
      when: 'true'
      status: info
      text:
        es: Define si el sistema acelera a favor o en contra del eje elegido.
        en: Defines if the system accelerates with or against the chosen axis.
    coherence_rules:
    - id: sign_coh
      when: 'true'
      status: ok
      text:
        es: Un signo negativo suele obligar a revisar la dirección de las fuerzas.
        en: A negative sign usually forces a review of the force directions.
    model_validity_rules:
    - id: sign_val
      when: 'true'
      status: ok
      text:
        es: Válido mientras la convención de ejes sea consistente.
        en: Valid as long as the axis convention is consistent.
    graph_rules:
    - id: sign_graph
      when: 'true'
      status: info
      text:
        es: Determina si el vector aceleración apunta en sentido positivo o negativo.
        en: Determines if the acceleration vector points in the positive or negative direction.
    likely_errors:
    - id: sign_err
      when: 'true'
      status: warning
      text:
        es: Mezclar sentidos positivos entre cuerpos vinculados.
        en: Mixing positive directions between linked bodies.
    next_step_rules:
    - id: sign_next
      when: 'true'
      status: info
      text:
        es: Asegúrate de que el [[signo_aceleracion]] es coherente con la [[fuerza_motriz]].
        en: Ensure that [[signo_aceleracion]] is consistent with [[fuerza_motriz]].
  F_ext_net:
    summary_rules:
    - id: fnet_sum
      when: 'true'
      status: info
      text:
        es: La [[F_ext_net]] es el motor dinámico del conjunto.
        en: The [[F_ext_net]] is the dynamic motor of the assembly.
    physical_reading_rules:
    - id: fnet_phys
      when: 'true'
      status: info
      text:
        es: Suma vectorial de todas las interacciones con el entorno.
        en: Vector sum of all interactions with the environment.
    coherence_rules:
    - id: fnet_coh
      when: 'true'
      status: ok
      text:
        es: No debe incluir tensiones si se analiza el sistema como un todo.
        en: Must not include tensions if the system is analyzed as a whole.
    model_validity_rules:
    - id: fnet_val
      when: 'true'
      status: ok
      text:
        es: Válida para sistemas cerrados bajo leyes de Newton.
        en: Valid for closed systems under Newton's laws.
    graph_rules:
    - id: fnet_graph
      when: 'true'
      status: info
      text:
        es: Resultante de todos los vectores de fuerza externa en el origen.
        en: Resultant of all external force vectors at the origin.
    likely_errors:
    - id: fnet_err
      when: 'true'
      status: warning
      text:
        es: Omitir fuerzas de oposición como el rozamiento.
        en: Omitting opposing forces such as friction.
    next_step_rules:
    - id: fnet_next
      when: 'true'
      status: info
      text:
        es: Divide este valor por la [[masa_total]] para obtener la aceleración.
        en: Divide this value by [[masa_total]] to obtain acceleration.
  aceleracion_gravedad:
    summary_rules:
    - id: g_sum
      when: 'true'
      status: info
      text:
        es: La [[aceleracion_gravedad]] es la constante de campo terrestre.
        en: The [[aceleracion_gravedad]] is the Earth's field constant.
    physical_reading_rules:
    - id: g_phys
      when: 'true'
      status: info
      text:
        es: Determina la intensidad del peso de cada [[masa_cuerpo]].
        en: Determines the weight intensity of each [[masa_cuerpo]].
    coherence_rules:
    - id: g_coh
      when: 'true'
      status: ok
      text:
        es: Valor estándar aproximado de 9.81 m/s² en la superficie.
        en: Approximate standard value of 9.81 m/s² on the surface.
    model_validity_rules:
    - id: g_val
      when: 'true'
      status: ok
      text:
        es: Válida para alturas despreciables frente al radio terrestre.
        en: Valid for negligible heights compared to the Earth's radius.
    graph_rules:
    - id: g_graph
      when: 'true'
      status: info
      text:
        es: Vector vertical descendente que define la dirección del peso.
        en: Vertical downward vector defining the weight direction.
    likely_errors:
    - id: g_err
      when: 'true'
      status: warning
      text:
        es: Usar valores distintos a 9.8 o 9.81 sin justificación.
        en: Using values other than 9.8 or 9.81 without justification.
    next_step_rules:
    - id: g_next
      when: 'true'
      status: info
      text:
        es: Utilízala para calcular la [[fuerza_motriz]] en componentes verticales.
        en: Use it to calculate [[fuerza_motriz]] in vertical components.
  masa_cuerpo:
    summary_rules:
    - id: mc_sum
      when: 'true'
      status: info
      text:
        es: La [[masa_cuerpo]] es la propiedad inercial de un objeto individual.
        en: The [[masa_cuerpo]] is the inertial property of an individual object.
    physical_reading_rules:
    - id: mc_phys
      when: 'true'
      status: info
      text:
        es: Cantidad de materia que determina la respuesta a una fuerza.
        en: Amount of matter determining the response to a force.
    coherence_rules:
    - id: mc_coh
      when: 'true'
      status: ok
      text:
        es: Debe ser un valor estrictamente positivo.
        en: Must be a strictly positive value.
    model_validity_rules:
    - id: mc_val
      when: 'true'
      status: ok
      text:
        es: Válida para el modelo de partícula puntual o sólido rígido.
        en: Valid for the point particle or rigid body model.
    graph_rules:
    - id: mc_graph
      when: 'true'
      status: info
      text:
        es: Representada visualmente por el tamaño o densidad del objeto.
        en: Visually represented by the object's size or density.
    likely_errors:
    - id: mc_err
      when: 'true'
      status: warning
      text:
        es: Confundir la masa con el peso (fuerza gravitatoria).
        en: Confusing mass with weight (gravitational force).
    next_step_rules:
    - id: mc_next
      when: 'true'
      status: info
      text:
        es: Suma todas las masas para obtener la [[masa_total]] del sistema.
        en: Add all masses to obtain the [[masa_total]] of the system.
