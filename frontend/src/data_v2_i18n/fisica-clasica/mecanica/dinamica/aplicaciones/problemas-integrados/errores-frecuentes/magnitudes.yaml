version: 1
magnitudes:
- id: fuerza_erronea
  symbol: F_{err}
  nombre:
    es: Fuerza mal interpretada
    en: Misinterpreted force
  descripcion:
    es: Fuerza inexistente o mal dibujada que invalida el Diagrama de Cuerpo Libre.
    en: Non-existent or poorly drawn force that invalidates the Free Body Diagram.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Incluir fuerzas de inercia en sistemas no inerciales o tensiones en el sistema completo.
  typical_range: 0 - 1000 N
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva como magnitud de error.
      en: Always positive as an error magnitude.
  zero_behavior:
    allowed: true
    meaning:
      es: Indica que no hay fuerzas espúreas en el diagrama.
      en: Indicates no spurious forces in the diagram.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Es la diferencia entre la fuerza neta real y la supuesta por el alumno.
- id: signo_aceleracion
  symbol: \text{sgn}(a)
  nombre:
    es: Signo de la aceleración
    en: Acceleration sign
  descripcion:
    es: Sentido del vector aceleración respecto al sistema de referencia elegido.
    en: Direction of the acceleration vector relative to the chosen reference system.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Mezclar criterios de signos entre cuerpos vinculados.
  typical_range: -1, 0, 1
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica si el movimiento coincide con el eje positivo.
      en: The sign indicates if the motion matches the positive axis.
  zero_behavior:
    allowed: true
    meaning:
      es: Sistema en equilibrio o reposo.
      en: System in equilibrium or at rest.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: [-1, 1]
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Un signo negativo inesperado suele indicar una inconsistencia en los ejes.
- id: componente_normal_erronea
  symbol: N_{err}
  nombre:
    es: Normal mal calculada
    en: Miscalculated Normal
  descripcion:
    es: Valor de la fuerza normal obtenido por memorización sin realizar el sumatorio de fuerzas perpendicular al plano.
    en: Normal force value obtained by memorization without performing the force summation perpendicular to the plane.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Asumir N = mg en planos inclinados o bajo fuerzas verticales externas.
  typical_range: 0 - 5000 N
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud de la fuerza de contacto.
      en: Magnitude of the contact force.
  zero_behavior:
    allowed: true
    meaning:
      es: Pérdida de contacto con la superficie.
      en: Loss of contact with the surface.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Debe obtenerse siempre del sumatorio de fuerzas en el eje perpendicular al movimiento.
- id: F_ext_net
  symbol: \sum F_{ext}
  nombre:
    es: Fuerza neta externa
    en: Net external force
  descripcion:
    es: Resultante de todas las fuerzas externas aplicadas sobre el sistema completo.
    en: Resultant of all external forces applied to the entire system.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Incluir fuerzas internas como la tensión en el sumatorio global.
  typical_range: 0 - 10000 N
  sign_behavior:
    has_sign: true
    meaning:
      es: Define la dirección de la aceleración resultante.
      en: Defines the direction of the resulting acceleration.
  zero_behavior:
    allowed: true
    meaning:
      es: El sistema está en equilibrio traslacional.
      en: The system is in translational equilibrium.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Es la fuerza que efectivamente produce la aceleración del centro de masas del sistema.
- id: aceleracion_sistema
  symbol: a_{sys}
  nombre:
    es: Aceleración del sistema
    en: System acceleration
  descripcion:
    es: Aceleración común de todos los cuerpos vinculados del sistema.
    en: Common acceleration of all linked bodies in the system.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Calcular valores superiores a g para sistemas impulsados solo por gravedad.
  typical_range: 0 - 20 m/s^2
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica la dirección del cambio de velocidad.
      en: The sign indicates the direction of velocity change.
  zero_behavior:
    allowed: true
    meaning:
      es: Velocidad constante o reposo.
      en: Constant velocity or rest.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: [0, 9.8]
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Debe ser verificada mediante el chequeo de consistencia global.
- id: coeficiente_rozamiento_estatico
  symbol: \mu_s
  nombre:
    es: Coeficiente de rozamiento estático
    en: Static friction coefficient
  descripcion:
    es: Parámetro adimensional que cuantifica la oposición al inicio del deslizamiento entre dos superficies.
    en: Dimensionless parameter quantifying the opposition to the start of sliding between two surfaces.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Usar el coeficiente cinético para verificar si el sistema arranca.
  typical_range: 0.01 - 1.5
  sign_behavior:
    has_sign: false
    meaning:
      es: Propiedad escalar positiva.
      en: Positive scalar property.
  zero_behavior:
    allowed: true
    meaning:
      es: Superficie ideal sin rozamiento.
      en: Ideal frictionless surface.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: [0.1, 1.0]
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Determina el umbral máximo de fuerza de rozamiento antes del movimiento.
- id: fuerza_rozamiento_maximo
  symbol: f_{s,max}
  nombre:
    es: Fuerza de rozamiento estático máxima
    en: Maximum static friction force
  descripcion:
    es: Valor límite del rozamiento estático antes de que se inicie el movimiento.
    en: Limit value of static friction before motion begins.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: No verificar si la fuerza motriz supera este valor antes de suponer movimiento.
  typical_range: 0 - 5000 N
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud de la fuerza de oposición.
      en: Magnitude of the opposing force.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay tendencia al movimiento o no hay normal.
      en: No tendency to move or no normal force.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Si la fuerza motriz es menor que este valor, el sistema permanece en reposo.
- id: masa_total
  symbol: M_{tot}
  nombre:
    es: Masa total del sistema
    en: Total system mass
  descripcion:
    es: Suma de las masas de todos los cuerpos que componen el sistema dinámico.
    en: Sum of the masses of all bodies composing the dynamic system.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Olvidar incluir alguno de los cuerpos vinculados en el denominador de Newton.
  typical_range: 0 - 1000 kg
  sign_behavior:
    has_sign: false
    meaning:
      es: Propiedad intrínseca siempre positiva.
      en: Always positive intrinsic property.
  zero_behavior:
    allowed: false
    meaning:
      es: Un sistema físico real debe tener masa no nula.
      en: A real physical system must have non-zero mass.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Representa la inercia total del conjunto de cuerpos vinculados.
- id: aceleracion_gravedad
  symbol: g
  nombre:
    es: Aceleración de la gravedad
    en: Acceleration due to gravity
  descripcion:
    es: Aceleración constante que experimentan los cuerpos en caída libre cerca de la superficie terrestre.
    en: Constant acceleration experienced by bodies in free fall near the Earth's surface.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_constant
  used_in:
  - errores-frecuentes
  common_mistake: Confundir su valor con el peso del cuerpo.
  typical_range: 9.8 - 9.81 m/s^2
  sign_behavior:
    has_sign: true
    meaning:
      es: Generalmente negativa si el eje vertical apunta hacia arriba.
      en: Generally negative if the vertical axis points upward.
  zero_behavior:
    allowed: false
    meaning:
      es: En la Tierra, la gravedad no es nula.
      en: On Earth, gravity is not zero.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: [9.78, 9.83]
  interpretation_role:
    primary_for: []
    secondary_for:
    - errores-frecuentes
  graph_binding:
    channels: []
  pedagogical_notes: Valor estándar aproximado de 9.8 m/s².
- id: angulo_plano
  symbol: \theta
  nombre:
    es: Ángulo de inclinación
    en: Inclination angle
  descripcion:
    es: Ángulo que forma el plano inclinado con la horizontal.
    en: Angle formed by the inclined plane with the horizontal.
  unidad_si: rad
  dimension: '1'
  is_vector: false
  components: null
  category: fundamental
  physical_role: geometric_parameter
  used_in:
  - errores-frecuentes
  common_mistake: Usar el seno en lugar del coseno para proyectar la normal.
  typical_range: 0 - pi/2 rad
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud angular positiva.
      en: Positive angular magnitude.
  zero_behavior:
    allowed: true
    meaning:
      es: El plano es horizontal.
      en: The plane is horizontal.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: [0, 1.57]
  interpretation_role:
    primary_for: []
    secondary_for:
    - errores-frecuentes
  graph_binding:
    channels: []
  pedagogical_notes: Determina la descomposición del peso en componentes paralela y perpendicular.
- id: masa_cuerpo
  symbol: m
  nombre:
    es: Masa del cuerpo
    en: Body mass
  descripcion:
    es: Masa individual de uno de los bloques del sistema.
    en: Individual mass of one of the blocks in the system.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: Olvidar que la normal depende de la masa de este cuerpo específico.
  typical_range: 0 - 100 kg
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud escalar positiva.
      en: Positive scalar magnitude.
  zero_behavior:
    allowed: false
    meaning:
      es: Un cuerpo real debe tener masa.
      en: A real body must have mass.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for: []
    secondary_for:
    - errores-frecuentes
  graph_binding:
    channels: []
  pedagogical_notes: Se usa para calcular fuerzas individuales (peso, normal).
- id: fuerza_motriz
  symbol: F_{mot}
  nombre:
    es: Fuerza motriz
    en: Driving force
  descripcion:
    es: Componente de las fuerzas externas que tiende a iniciar o mantener el movimiento del sistema.
    en: Component of external forces that tends to initiate or maintain system motion.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - errores-frecuentes
  common_mistake: No incluir la componente del peso en planos inclinados como fuerza motriz.
  typical_range: 0 - 5000 N
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud de la fuerza impulsora.
      en: Magnitude of the driving force.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay fuerzas externas intentando mover el sistema.
      en: No external forces trying to move the system.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - errores-frecuentes
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Debe compararse con el umbral de rozamiento estático.

