version: "1.0"
leaf: "problemas-tipo-examen"

coord:
  title:
    es: Gráfica Coord · Problemas Tipo Examen
    en: Coord Graph · Exam-Type Problems
  xAxis:
    es: magnitud relevante para el problema (F, m, a, θ, etc.)
    en: relevant quantity for the problem (F, m, a, θ, etc.)
  yAxis:
    es: magnitud resultante del sistema
    en: resultant quantity of the system
  xMagnitude: varía según el enunciado
  yMagnitude: varía según el enunciado
  relation:
    es: "Estos problemas aplican las leyes de Newton en combinaciones típicas de examen: bloque sobre plano inclinado, sistema Atówood, bloque con rozamiento, etc. La gráfica ilustra la relación funcional entre la variable de control y la respuesta buscada."
    en: "These problems apply Newton's laws in typical exam combinations: block on inclined plane, Atwood machine, block with friction, etc. The graph illustrates the functional relationship between the control variable and the sought answer."
  physicalReading:
    es: Leer la tendencia y la pendiente para identificar la ley física subyacente y verificar la coherencia del resultado.
    en: Read the trend and slope to identify the underlying physical law and verify the consistency of the result.
  slopeMeaning:
    es: "La pendiente depende del tipo de problema: puede ser 1/m, μ, senθ u otra combinación de parámetros del sistema."
    en: "The slope depends on the problem type: it may be 1/m, μ, sinθ, or another combination of system parameters."
  interceptMeaning:
    es: El intercepto indica el valor de la variable dependiente cuando el parámetro de control es cero (por ejemplo, aceleración inicial sin fuerza aplicada).
    en: The intercept indicates the dependent variable value when the control parameter is zero (e.g., initial acceleration with no applied force).
  curvatureMeaning:
    es: Una relación lineal implica proporcionalidad directa. Una curva indica una dependencia no lineal (por ejemplo, fuerza elástica cuadrática).
    en: A linear relationship implies direct proportionality. A curve indicates non-linear dependence (e.g., quadratic elastic force).
  signMeaning:
    es: El signo de la pendiente indica si la variable dependiente crece o decrece al aumentar el parámetro de control.
    en: The sign of the slope indicates whether the dependent variable grows or decreases as the control parameter increases.
  areaMeaning:
    es: Dependiente del tipo de problema.
    en: Depends on the problem type.
  domainMeaning:
    es: "Válido para el rango físico del problema: masas positivas, ángulos entre 0° y 90°, fuerzas en dirección correcta."
    en: "Valid for the physical range of the problem: positive masses, angles between 0° and 90°, forces in the correct direction."
  modelConnection:
    es: Se interpreta bajo las leyes de Newton aplicadas al DCL correcto del sistema.
    en: "Interpreted under Newton's laws applied to the correct FBD of the system."
  formulaConnection:
    es: Conecta con las ecuaciones de Newton proyectadas en cada eje para el sistema específico del problema.
    en: "Connects to Newton's equations projected on each axis for the specific system of the problem."
  readingFocus:
    es: identificar el tipo de problema, trazar el DCL, proyectar sobre los ejes y leer la gráfica para verificar la respuesta.
    en: identify the problem type, draw the FBD, project onto axes, and read the graph to verify the answer.
  agentHints:
    es:
      - "La metodología siempre es la misma: DCL, proyección en ejes, ΣF = m·a por eje."
      - Identificar cuántas incógnitas hay y cuántas ecuaciones se pueden plantear antes de resolver.
      - Verificar las unidades y el signo del resultado como comprobación final.
    en:
      - "The methodology is always the same: FBD, axis projections, ΣF = m·a per axis."
      - Identify how many unknowns there are and how many equations can be written before solving.
      - Verify units and the sign of the result as a final check.
  commonMistakes:
    es:
      - No trazar el DCL antes de plantear las ecuaciones.
      - Proyectar las fuerzas sobre ejes no alineados con el movimiento.
      - Olvidar que los sistemas con varias masas requieren un DCL por cada masa.
    en:
      - Not drawing the FBD before setting up the equations.
      - Projecting forces onto axes not aligned with the motion.
      - Forgetting that systems with multiple masses require one FBD per mass.

svg:
  title:
    es: Escena SVG · Problemas Tipo Examen
    en: SVG Scene · Exam-Type Problems
  sceneId: problemas_examen_scene
  sceneLabel:
    es: Configuración típica de examen con cuerpos, fuerzas y restricciones
    en: Typical exam configuration with bodies, forces, and constraints
  objects:
    es:
      - masas del sistema
      - cuerdas y poleas
      - plano inclinado
      - fuerzas externas
    en:
      - system masses
      - ropes and pulleys
      - inclined plane
      - external forces
  mainObject:
    es: sistema de cuerpos en problemática típica
    en: system of bodies in a typical problem setup
  referenceFrame:
    es: laboratorio inercial con ejes alineados con el movimiento
    en: inertial laboratory with axes aligned with the motion
  geometry:
    es: "La escena muestra la configuración geométrica del sistema: plano inclinado, poleas, cuerdas, masas colgantes, etc."
    en: "The scene shows the geometric configuration of the system: inclined plane, pulleys, ropes, hanging masses, etc."
  interactions:
    es: Hay fuerzas de contacto (normal, rozamiento, tensión) y gravitacionales (peso). Las cuerdas transmiten tensión y las poleas cambian su dirección.
    en: There are contact forces (normal, friction, tension) and gravitational forces (weight). Ropes transmit tension and pulleys change its direction.
  modelElements:
    es:
      - fuerzas sobre cada masa
      - restricciones de ligadura (cuerda inextensible)
      - direcciones del movimiento
    en:
      - forces on each mass
      - constraint equations (inextensible rope)
      - directions of motion
  visualCues:
    es:
      - Identificar en la escena cuántos cuerpos hay y qué fuerzas actúan sobre cada uno.
      - Las cuerdas ideales transmiten la misma tensión en todo su recorrido.
      - Las poleas ideales solo cambian la dirección de la tensión, no su magnitud.
    en:
      - Identify in the scene how many bodies there are and what forces act on each one.
      - Ideal ropes transmit the same tension throughout their length.
      - Ideal pulleys only change the direction of tension, not its magnitude.
  scaleMeaning:
    es: Proporcional a las magnitudes. Las masas y longitudes son indicativas.
    en: Proportional to magnitudes. Masses and lengths are indicative.
  relation:
    es: La escena resume el enunciado del problema en formato visual, facilitando la identificación de fuerzas y la elección del sistema de coordenadas.
    en: The scene summarises the problem statement visually, facilitating force identification and coordinate system choice.
  physicalReading:
    es: Identificar todos los cuerpos, sus posibles movimientos y las fuerzas que actúan sobre cada uno para trazar los DCL.
    en: Identify all bodies, their possible motions, and the forces acting on each to draw the FBDs.
  modelConnection:
    es: Se resuelve aplicando las leyes de Newton a cada cuerpo del sistema.
    en: "Solved by applying Newton's laws to each body of the system."
  formulaConnection:
    es: Conecta con ΣF_i = m_i·a_i para cada cuerpo i, más las ecuaciones de ligadura (longitud de cuerda constante).
    en: Connects to ΣF_i = m_i·a_i for each body i, plus the constraint equations (constant rope length).
  readingFocus:
    es: Identificar los cuerpos, las fuerzas y las restricciones antes de trazar los DCL individuales.
    en: Identify the bodies, forces, and constraints before drawing the individual FBDs.
  agentHints:
    es:
      - Definir un sistema de coordenados común o uno por cuerpo, coherente con el sentido del movimiento.
      - La ecuación de ligadura (cuerda inextensible) aporta una ecuación adicional.
      - Verificar que el número de ecuaciones iguala el número de incógnitas.
    en:
      - Define a common coordinate system or one per body, consistent with the direction of motion.
      - The constraint equation (inextensible rope) provides an additional equation.
      - Verify that the number of equations equals the number of unknowns.
  commonMistakes:
    es:
      - Trazar un solo DCL para todo el sistema en lugar de uno por cuerpo.
      - Ignorar la ecuación de ligadura al resolver sistemas con cuerda.
      - Cambiar el sentido positivo entre distintos cuerpos del sistema.
    en:
      - Drawing a single FBD for the whole system instead of one per body.
      - Ignoring the constraint equation when solving rope systems.
      - Changing the positive direction between different bodies of the system.
