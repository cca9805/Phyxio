version: 1
magnitudes:
  - id: masa_1
    symbol: m_1
    nombre:
      es: Masa del bloque sobre el plano
      en: Mass of the block on the incline
    descripcion:
      es: Masa del cuerpo que se desplaza sobre el plano inclinado rugoso.
      en: Mass of the body moving on the rough incline.
    unidad_si: kg
    dimension: M
    is_vector: false
    components: null
    category: fundamental
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Confundir la masa del bloque sobre el plano con la masa colgante al proyectar fuerzas.
    typical_range: Entre 0.1 kg y 50 kg.
    sign_behavior:
      has_sign: false
      meaning:
        es: La masa es siempre no negativa.
        en: Mass is always non-negative.
    zero_behavior:
      allowed: false
      meaning:
        es: Un valor nulo anula el problema físico.
        en: A zero value removes the physical problem.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: [0.1, 50]
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Nombrar masa_1 antes de dibujar el DCL evita errores de identificación.
  - id: masa_2
    symbol: m_2
    nombre:
      es: Masa colgante
      en: Hanging mass
    descripcion:
      es: Masa del cuerpo suspendido que tira del sistema mediante la cuerda.
      en: Mass of the suspended body that pulls the system through the rope.
    unidad_si: kg
    dimension: M
    is_vector: false
    components: null
    category: fundamental
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Tratar masa_2 como fuerza motriz sin multiplicarla por g.
    typical_range: Entre 0.1 kg y 50 kg.
    sign_behavior:
      has_sign: false
      meaning:
        es: La masa es siempre no negativa.
        en: Mass is always non-negative.
    zero_behavior:
      allowed: false
      meaning:
        es: Si masa_2 vale cero, el sistema deja de ser el acoplado que describe el leaf.
        en: If masa_2 is zero, the coupled system described by the leaf disappears.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: [0.1, 50]
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: masa_2 es la causa impulsora gravitatoria del sistema.
  - id: tension_cuerda
    symbol: T
    nombre:
      es: Tensión de la cuerda
      en: Rope tension
    descripcion:
      es: Fuerza interna transmitida por la cuerda ideal entre ambos cuerpos.
      en: Internal force transmitted by the ideal rope between both bodies.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Suponer tensiones distintas cuando la cuerda y la polea se modelan ideales.
    typical_range: Del orden del peso de uno de los cuerpos.
    sign_behavior:
      has_sign: false
      meaning:
        es: Se interpreta como módulo positivo sobre la cuerda ideal.
        en: It is interpreted as a positive magnitude on the ideal rope.
    zero_behavior:
      allowed: true
      meaning:
        es: Tensión nula indica cuerda floja.
        en: Zero tension indicates a slack rope.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Sirve para comprobar coherencia entre el análisis global e individual.
  - id: aceleracion_sistema
    symbol: a
    nombre:
      es: Aceleración del sistema
      en: System acceleration
    descripcion:
      es: Aceleración común impuesta por el vínculo a los dos cuerpos del sistema.
      en: Common acceleration imposed by the constraint on the two bodies of the system.
    unidad_si: m/s^2
    dimension: LT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Olvidar que su signo depende del sentido positivo elegido.
    typical_range: [0, 9.8]
    sign_behavior:
      has_sign: true
      meaning:
        es: El signo indica si el movimiento coincide con el sentido supuesto.
        en: The sign indicates if motion matches the assumed direction.
    zero_behavior:
      allowed: true
      meaning:
        es: Valor cero indica equilibrio o compensación de fuerzas.
        en: A zero value indicates equilibrium or force compensation.
    value_nature:
      kind: scalar
      nonnegative_only: false
      expected_interval: [-9.8, 9.8]
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Resume el balance neto de fuerzas del sistema.
  - id: coeficiente_rozamiento
    symbol: \mu_d
    nombre:
      es: Coeficiente de rozamiento dinámico
      en: Dynamic friction coefficient
    descripcion:
      es: Parámetro que cuantifica la oposición al deslizamiento relativo.
      en: Parameter quantifying the opposition to relative sliding.
    unidad_si: "1"
    dimension: "1"
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Confundirlo con una fuerza o darle unidades.
    typical_range: [0, 1]
    sign_behavior:
      has_sign: false
      meaning:
        es: Escalar positivo.
        en: Positive scalar.
    zero_behavior:
      allowed: true
      meaning:
        es: Superficie ideal sin rozamiento.
        en: Ideal frictionless surface.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: [0, 1]
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Modula la fuerza de contacto, no la reemplaza.
  - id: fuerza_normal
    symbol: N
    nombre:
      es: Fuerza normal
      en: Normal force
    descripcion:
      es: Fuerza de contacto perpendicular al plano inclinado ejercida sobre masa_1.
      en: Contact force perpendicular to the incline exerted on masa_1.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Igualarla siempre al peso sin proyectar en el plano.
    typical_range: 0 - 1000 N.
    sign_behavior:
      has_sign: false
      meaning:
        es: Módulo positivo de reacción.
        en: Positive reaction magnitude.
    zero_behavior:
      allowed: true
      meaning:
        es: Pérdida de contacto con el plano.
        en: Loss of contact with the plane.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Es la base para el cálculo de la fuerza de rozamiento.
  - id: fuerza_rozamiento
    symbol: f_r
    nombre:
      es: Fuerza de rozamiento
      en: Friction force
    descripcion:
      es: Fuerza tangencial que se opone al deslizamiento de masa_1.
      en: Tangential force opposing the sliding of masa_1.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Ponerla siempre en el mismo sentido sin mirar el deslizamiento.
    typical_range: 0 - 500 N.
    sign_behavior:
      has_sign: false
      meaning:
        es: Módulo de la fuerza de oposición.
        en: Opposing force magnitude.
    zero_behavior:
      allowed: true
      meaning:
        es: No hay rozamiento efectivo.
        en: No effective friction.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Su sentido se decide por oposición al movimiento relativo supuesto.
  - id: angulo_plano
    symbol: \theta
    nombre:
      es: Ángulo del plano
      en: Plane angle
    descripcion:
      es: Inclinación del plano respecto a la horizontal.
      en: Inclination of the plane with respect to the horizontal.
    unidad_si: rad
    dimension: "1"
    is_vector: false
    components: null
    category: fundamental
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Usar grados en funciones que esperan radianes o viceversa.
    typical_range: [0, 1.57]
    sign_behavior:
      has_sign: false
    zero_behavior:
      allowed: true
      meaning:
        es: Plano horizontal.
        en: Horizontal plane.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: [0, 1.57]
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
    graph_binding:
      channels: []
    pedagogical_notes: Determina la descomposición del peso.
  - id: aceleracion_gravedad
    symbol: g
    nombre:
      es: Gravedad terrestre
      en: Earth gravity
    descripcion:
      es: Aceleración de caída libre cerca de la superficie.
      en: Free-fall acceleration near the surface.
    unidad_si: m/s^2
    dimension: LT^{-2}
    is_vector: false
    components: null
    category: fundamental
    physical_role: physical_constant
    used_in:
      - problemas-tipo-examen
    common_mistake: Olvidar que es una constante y tratarla como variable.
    typical_range: [9.8, 9.81]
    sign_behavior:
      has_sign: false
    zero_behavior:
      allowed: false
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: [9.8, 9.81]
    interpretation_role:
      primary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Valor estándar aproximado de 9.8 m/s^2.
  - id: componente_tangencial_peso
    symbol: P_x
    nombre:
      es: Componente tangencial del peso
      en: Tangential weight component
    descripcion:
      es: Proyección del peso paralela a la superficie del plano.
      en: Weight projection parallel to the surface of the plane.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - problemas-tipo-examen
    common_mistake: Usar el coseno en lugar del seno.
    typical_range: 0 - 500 N.
    sign_behavior:
      has_sign: false
    zero_behavior:
      allowed: true
      meaning:
        es: No hay componente impulsora por gravedad (plano horizontal).
        en: No gravity driving component (horizontal plane).
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - problemas-tipo-examen
    graph_binding:
      channels: []
    pedagogical_notes: Es la fuerza motriz o de oposición que nace de la gravedad en la rampa.
