version: "1.0"
leaf: "sistemas-reales"

coord:
  title:
    es: Gráfica Coord · Sistemas Reales
    en: Coord Graph · Real Systems
  xAxis:
    es: parámetro del sistema (tiempo, fuerza o posición)
    en: system parameter (time, force, or position)
  yAxis:
    es: magnitud resultante (aceleración, velocidad o desplazamiento)
    en: resultant quantity (acceleration, velocity, or displacement)
  xMagnitude: varía según el caso
  yMagnitude: varía según el caso
  relation:
    es: Los sistemas reales incluyen efectos como rozamiento, masas de poleas no despreciables, cuerdas elásticas, etc. La gráfica muestra cómo las idealizaciones se desvian del comportamiento real.
    en: Real systems include effects such as friction, non-negligible pulley masses, elastic ropes, etc. The graph shows how idealizations deviate from real behaviour.
  physicalReading:
    es: Comparar la curva real con la curva ideal para cuantificar el efecto de fricción, masa de polea o elasticidad de la cuerda.
    en: Compare the real curve with the ideal curve to quantify the effect of friction, pulley mass, or rope elasticity.
  slopeMeaning:
    es: La pendiente en el sistema real es menor que en el ideal por las fuerzas disipativas o las masas adicionales.
    en: The slope in the real system is smaller than the ideal due to dissipative forces or additional masses.
  interceptMeaning:
    es: Un intercepto no nulo en la curva real indica la presencia de fuerzas de umbral (rozamiento estático).
    en: A non-zero intercept in the real curve indicates threshold forces (static friction).
  curvatureMeaning:
    es: Una curvatura que no existe en el modelo ideal indica efectos dinámicos adicionales (masa de cuerda, elasticidad).
    en: Curvature absent in the ideal model indicates additional dynamic effects (rope mass, elasticity).
  signMeaning:
    es: Las desviaciones del signo esperado indican efectos no modelados.
    en: Deviations from the expected sign indicate unmodelled effects.
  areaMeaning:
    es: El área bajo la curva de aceleración real vs tiempo da la velocidad real, que será menor que la ideal por las pérdidas.
    en: The area under the real acceleration vs time curve gives the real velocity, which will be smaller than the ideal due to losses.
  domainMeaning:
    es: Válido para el rango de operación real del sistema, incluyendo saturación por rozamiento o límites elásticos.
    en: Valid for the real operating range of the system, including saturation by friction or elastic limits.
  modelConnection:
    es: Se interpreta comparando el modelo ideal (sin fricción, masas de poleas nulas) con el modelo real.
    en: Interpreted by comparing the ideal model (no friction, massless pulleys) with the real model.
  formulaConnection:
    es: "Conecta con ΣF = m·a incluyendo todos los efectos reales: μN, masa de polea, elasticidad de cuerda."
    en: "Connects to ΣF = m·a including all real effects: μN, pulley mass, rope elasticity."
  readingFocus:
    es: comparar la curva real con la ideal y cuantificar la discrepancia atribuida a los efectos no modelados.
    en: compare the real curve with the ideal and quantify the discrepancy attributed to unmodelled effects.
  agentHints:
    es:
      - "Los sistemas reales siempre tienen más parámetros que los modelos ideales: identificarlos es clave."
      - Una diferencia sistemática entre real e ideal indica un efecto que el modelo ideal no contempla.
      - El rozamiento siempre reduce la aceleración respecto al caso ideal.
    en:
      - "Real systems always have more parameters than ideal models: identifying them is key."
      - A systematic difference between real and ideal indicates an effect not captured by the ideal model.
      - Friction always reduces acceleration compared to the ideal case.
  commonMistakes:
    es:
      - Usar el modelo ideal cuando el enunciado indica rozamiento o masa de polea.
      - Ignorar la masa de la cuerda en sistemas donde no es despreciable.
      - Confundir rozamiento cinético con estático al analizar el movimiento.
    en:
      - Using the ideal model when the problem states friction or pulley mass.
      - Ignoring rope mass in systems where it is not negligible.
      - Confusing kinetic friction with static friction when analysing motion.

svg:
  title:
    es: Escena SVG · Sistemas Reales
    en: SVG Scene · Real Systems
  sceneId: sistemas_reales_scene
  sceneLabel:
    es: Sistema mecánico real con fricción, masa de poleas y cuerdas elásticas
    en: Real mechanical system with friction, pulley mass, and elastic ropes
  objects:
    es:
      - masas del sistema
      - poleas con masa
      - cuerdas con elasticidad
      - superficies con rozamiento
    en:
      - system masses
      - pulleys with mass
      - elastic ropes
      - rough surfaces
  mainObject:
    es: sistema mecánico con efectos reales no despreciables
    en: mechanical system with non-negligible real effects
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory
  geometry:
    es: "La escena muestra el sistema con todos los elementos reales: poleas con eje fricción, cuerdas con masa, superficies rugosas."
    en: "The scene shows the system with all real elements: pulleys with axle friction, ropes with mass, rough surfaces."
  interactions:
    es: Rozamiento, tensión variable a lo largo de la cuerda, torsion de poleas con momento de inercia.
    en: Friction, variable tension along the rope, torsion in pulleys with moment of inertia.
  modelElements:
    es:
      - fuerzas de rozamiento
      - tensión no uniforme si la cuerda tiene masa
      - torque en poleas con momento de inercia
    en:
      - friction forces
      - non-uniform tension if rope has mass
      - torque in pulleys with moment of inertia
  visualCues:
    es:
      - La fricción en la polea reduce la transmisión de tensión.
      - Una cuerda con masa tiene tensión variable a lo largo de su longitud.
      - Las poleas con masa requieren la ecuación rotacional T = I·α además de ΣF = m·a.
    en:
      - Friction in the pulley reduces tension transmission.
      - A rope with mass has variable tension along its length.
      - Pulleys with mass require the rotational equation τ = I·α in addition to ΣF = m·a.
  scaleMeaning:
    es: Las proporciones son indicativas. Los efectos reales se exageran para hacerlos visibles.
    en: Proportions are indicative. Real effects are exaggerated to make them visible.
  relation:
    es: La escena ilustra los elementos no ideales del sistema que deben incluirse en el modelo para obtener resultados precisos.
    en: The scene illustrates the non-ideal elements of the system that must be included in the model for accurate results.
  physicalReading:
    es: Identificar los elementos no ideales y deducir qué ecuaciones adicionales requieren.
    en: Identify the non-ideal elements and deduce what additional equations they require.
  modelConnection:
    es: Se interpreta añadiendo los efectos reales al modelo de Newton clásico.
    en: Interpreted by adding real effects to the classical Newton model.
  formulaConnection:
    es: Conecta con ΣF = m·a para traslación y Στ = I·α para rotación de poleas.
    en: Connects to ΣF = m·a for translation and Στ = I·α for pulley rotation.
  readingFocus:
    es: identificar cada elemento no ideal y su efecto sobre las ecuaciones del sistema.
    en: identify each non-ideal element and its effect on the system equations.
  agentHints:
    es:
      - La masa de la polea se trata con la ecuación rotacional de Newton.
      - Una cuerda con masa requiere dividirla en segmentos para analizar la tensión variable.
      - El rozamiento en la polea reduce la tensión en el lado que se eleva respecto al lado que desciende.
    en:
      - "Pulley mass is handled with Newton's rotational equation."
      - A rope with mass must be divided into segments to analyse variable tension.
      - Pulley friction reduces tension on the rising side compared to the descending side.
  commonMistakes:
    es:
      - Tratar la polea como ideal cuando el enunciado da su momento de inercia.
      - Ignorar la masa de la cuerda en sistemas verticales con cuerdas largas.
      - No corregir la ecuación de ligadura cuando la cuerda tiene elasticidad.
    en:
      - Treating the pulley as ideal when the problem gives its moment of inertia.
      - Ignoring rope mass in vertical systems with long ropes.
      - Not correcting the constraint equation when the rope is elastic.
