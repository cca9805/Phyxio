version: "1.0"
leaf: "traslacion-y-rotacion"

coord:
  title:
    es: Gráfica Coord · Traslación y Rotación
    en: Coord Graph · Translation and Rotation
  xAxis:
    es: torque τ (N·m) o aceleración lineal a (m/s²)
    en: torque τ (N·m) or linear acceleration a (m/s²)
  yAxis:
    es: aceleración angular α (rad/s²) o aceleración lineal a (m/s²)
    en: angular acceleration α (rad/s²) or linear acceleration a (m/s²)
  xMagnitude: τ o a
  yMagnitude: α o a
  relation:
    es: Un cuerpo rígido en rodadura combina traslación del CM (ΣF = m·a) y rotación alrededor del CM (Στ = I·α), vinculadas por a = r·α para rodadura sin deslizamiento.
    en: A rigid body rolling combines translation of the CM (ΣF = m·a) and rotation about the CM (Στ = I·α), linked by a = r·α for rolling without slipping.
  physicalReading:
    es: La pendiente en α vs τ es 1/I (momento de inercia inverso). La pendiente en a vs F es 1/m_efectiva (masa efectiva que incluye el momento de inercia).
    en: The slope in α vs τ is 1/I (inverse moment of inertia). The slope in a vs F is 1/m_effective (effective mass including moment of inertia).
  slopeMeaning:
    es: Pendiente en α vs τ = 1/I. En rodadura, la aceleración lineal es menor que en deslizamiento porque parte de la energía va a la rotación.
    en: Slope in α vs τ = 1/I. In rolling, the linear acceleration is smaller than in sliding because part of the energy goes to rotation.
  interceptMeaning:
    es: Sin rozamiento de rodadura, los interceptos son nulos. Con rozamiento, hay umbrales no nulos.
    en: Without rolling friction, intercepts are zero. With friction, there are non-zero thresholds.
  curvatureMeaning:
    es: La relación es lineal para cuerpos rígidos ideales.
    en: The relationship is linear for ideal rigid bodies.
  signMeaning:
    es: Un torque positivo produce aceleración angular positiva (antihoraria). La consistencia de signos entre traslación y rotación debe mantenerse.
    en: A positive torque produces positive angular acceleration (counter-clockwise). Sign consistency between translation and rotation must be maintained.
  areaMeaning:
    es: Área bajo α(t) es la variación de velocidad angular; área bajo a(t) es la variación de velocidad lineal.
    en: Area under α(t) is the change in angular velocity; area under a(t) is the change in linear velocity.
  domainMeaning:
    es: Válido para cuerpos rígidos en rodadura sin deslizamiento. Si hay deslizamiento, la condición a = r·α no se cumple.
    en: Valid for rigid bodies rolling without slipping. If slipping occurs, the condition a = r·α does not hold.
  modelConnection:
    es: "Se interpreta bajo la dinámica del cuerpo rígido: ΣF = m·a (traslación) y Στ = I·α (rotación), con ligadura de rodadura."
    en: "Interpreted under rigid body dynamics: ΣF = m·a (translation) and Στ = I·α (rotation), with rolling constraint."
  formulaConnection:
    es: Conecta con ΣF = m·a, Στ = I·α y a = r·α (condición de rodadura sin deslizamiento).
    en: Connects to ΣF = m·a, Στ = I·α, and a = r·α (rolling without slipping condition).
  readingFocus:
    es: leer la pendiente como 1/I en el gráfico rotacional y verificar la consistencia entre la aceleración lineal y angular mediante a = r·α.
    en: read the slope as 1/I in the rotational graph and verify consistency between linear and angular acceleration via a = r·α.
  agentHints:
    es:
      - En rodadura, la aceleración lineal del CM es menor que si el cuerpo deslizara, porque parte del torque acelera la rotación.
      - "El momento de inercia I depende de la distribución de masa: esfera, cilindro, aro tienen distintos valores."
      - "La condición de rodadura sin deslizamiento es a = r·α: las velocidades lineal y angular están vinculadas."
    en:
      - "In rolling, the CM's linear acceleration is smaller than in sliding because part of the torque accelerates rotation."
      - "Moment of inertia I depends on mass distribution: sphere, cylinder, and hoop have different values."
      - "The rolling-without-slipping condition is a = r·α: linear and angular velocities are linked."
  commonMistakes:
    es:
      - Aplicar solo la ecuación de traslación e ignorar la ecuación rotacional en rodadura.
      - Usar el mismo I para todos los cuerpos rígidos independientemente de su forma.
      - Olvidar la condición de ligadura a = r·α al resolver el sistema de ecuaciones.
    en:
      - Applying only the translational equation and ignoring the rotational equation in rolling.
      - Using the same I for all rigid bodies regardless of their shape.
      - Forgetting the constraint condition a = r·α when solving the system of equations.
