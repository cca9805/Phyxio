version: 2
id: interpretacion-traslacion-y-rotacion
leaf_id: traslacion-y-rotacion
nombre:
  es: Interpretacion de Traslacion y rotacion
  en: Interpretation of Translation and Rotation
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: sistemas-mixtos
  ruta_relativa: fisica-clasica/mecanica/dinamica/aplicaciones/sistemas-mixtos/traslacion-y-rotacion
dependencies:
  formulas:
  - segunda_ley_rotacion
  - vinculo_traslacion_rotacion
  - energia_cinetica_total
  magnitudes:
  - m
  - I
  - R
  - v
  - omega
  - a
  - alpha
  - tau_net
  - Kt
  - Kr
  - K
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  alpha:
    summary_rules:
    - id: alpha_summary
      when: 'true'
      status: info
      text:
        es: alpha resume una lectura fisica relevante del leaf.
        en: alpha summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: alpha_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que alpha sea coherente con unidades y contexto.
        en: Check that alpha is coherent with units and context.
    physical_reading_rules:
    - id: alpha_physical
      when: 'true'
      status: info
      text:
        es: "Un alpha grande indica que tau_net supera ampliamente la resistencia inercial I: el cuerpo rota con una aceleracion angular apreciable. Un alpha pequeño revela que I amortigua el efecto del torque, bien porque la masa esta distribuida lejos del eje, bien porque tau_net es debil. Reducir I (concentrando masa cerca del eje) aumenta alpha proporcionalmente para el mismo torque aplicado."
        en: "A large alpha indicates that tau_net substantially exceeds the inertial resistance I: the body develops appreciable angular acceleration. A small alpha reveals that I dampens the torque effect, either because mass is distributed far from the axis or because tau_net is weak. Reducing I by concentrating mass near the axis increases alpha proportionally for the same applied torque."
    model_validity_rules:
    - id: alpha_validity
      when: 'true'
      status: ok
      text:
        es: alpha solo es interpretable dentro del modelo elegido.
        en: alpha is interpretable only inside the chosen model.
    graph_rules:
    - id: alpha_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de alpha.
        en: The graph must reflect the role of alpha visually.
    likely_errors:
    - id: alpha_warn
      when: 'true'
      status: warning
      text:
        es: No confundas alpha con otra magnitud cercana del problema.
        en: Do not confuse alpha with another nearby quantity in the problem.
    next_step_rules:
    - id: alpha_next
      when: 'true'
      status: info
      text:
        es: Usa alpha para enlazar con el siguiente paso de interpretacion.
        en: Use alpha to connect with the next interpretation step.
