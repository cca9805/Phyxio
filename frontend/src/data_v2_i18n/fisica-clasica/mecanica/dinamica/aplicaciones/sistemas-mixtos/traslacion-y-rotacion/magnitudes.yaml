version: 1
magnitudes:
- id: m
  symbol: m
  nombre:
    es: Masa traslacional
    en: Translational mass
  descripcion:
    es: Masa del cuerpo que realiza el movimiento de traslación pura (bloque o carga).
    en: Mass of the body performing pure translational motion (block or load).
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - traslacion-y-rotacion
  common_mistake: Confundir m con otra magnitud cercana dentro de traslacion y rotacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - traslacion-y-rotacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
