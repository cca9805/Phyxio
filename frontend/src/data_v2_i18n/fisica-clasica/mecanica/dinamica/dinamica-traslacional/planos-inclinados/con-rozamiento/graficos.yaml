version: "1.0"
leaf: "con-rozamiento"

coord:
  title:
    es: Gráfica Coord · Dinámica con Rozamiento
    en: Coord Graph · Dynamics with Friction
  xAxis:
    es: distancia recorrida x (m)
    en: distance travelled x (m)
  yAxis:
    es: energía cinética E_k (J) o velocidad v (m/s)
    en: kinetic energy E_k (J) or velocity v (m/s)
  xMagnitude: x
  yMagnitude: E_k o v
  relation:
    es: "El rozamiento cinético disipa energía mecánica: E_k decrece linealmente con la distancia recorrida. La energía disipada por el rozamiento es W_f = μ_c·m·g·d."
    en: "Kinetic friction dissipates mechanical energy: E_k decreases linearly with distance travelled. Energy dissipated by friction is W_f = μ_k·m·g·d."
  physicalReading:
    es: E_k disminuye linealmente con d a ritmo de μ_c·m·g por metro. El bloque se detiene cuando E_k = 0.
    en: E_k decreases linearly with d at a rate of μ_k·m·g per metre. The block stops when E_k = 0.
  slopeMeaning:
    es: "La pendiente de E_k vs d es −μ_c·m·g: mayor coeficiente de rozamiento o mayor masa implica pérdida más rápida."
    en: "The slope of E_k vs d is −μ_k·m·g: a larger friction coefficient or greater mass implies faster energy loss."
  interceptMeaning:
    es: "E_k(0) = E_k inicial del sistema: determina hasta dónde llegará el bloque."
    en: "E_k(0) = initial kinetic energy of the system: determines how far the block will travel."
  curvatureMeaning:
    es: La relación E_k vs d es lineal si μ_c y N son constantes. Si N varía (plano inclinado), hay curvatura.
    en: The E_k vs d relationship is linear if μ_k and N are constant. If N varies (inclined plane), there is curvature.
  signMeaning:
    es: La energía perdida es positiva (el trabajo del rozamiento es negativo). La aceleración causada por el rozamiento es negativa.
    en: Energy lost is positive (friction work is negative). Acceleration due to friction is negative.
  areaMeaning:
    es: Sin interpretación directa adicional al ya representado en E_k vs d.
    en: No additional direct interpretation beyond what is already represented in E_k vs d.
  domainMeaning:
    es: Válido hasta que el bloque se detenga (E_k = 0). No aplica retroalimentación de movimiento.
    en: Valid until the block stops (E_k = 0). No motion feedback applies.
  modelConnection:
    es: "Se interpreta bajo el teorema trabajo-energía: ΔE_k = W_neto = W_F + W_f."
    en: "Interpreted under the work-energy theorem: ΔE_k = W_net = W_F + W_f."
  formulaConnection:
    es: Conecta con W_f = −μ_c·N·d y ΔE_k = W_F − μ_c·N·d.
    en: Connects to W_f = −μ_k·N·d and ΔE_k = W_F − μ_k·N·d.
  readingFocus:
    es: leer la pendiente como −μ_c·m·g para obtener el coeficiente de rozamiento, y el intercepto como E_k inicial.
    en: read the slope as −μ_k·m·g to obtain the friction coefficient, and the intercept as the initial E_k.
  agentHints:
    es:
      - La distancia de frenado es d = E_k0 / (μ_c·m·g).
      - "El rozamiento siempre disipa energía: el trabajo del rozamiento siempre es negativo."
      - Si hay fuerza aplicada y rozamiento, la energía cinética puede crecer o decrecer dependiendo del balance.
    en:
      - Stopping distance is d = E_k0 / (μ_k·m·g).
      - "Friction always dissipates energy: friction work is always negative."
      - If there is an applied force and friction, kinetic energy may grow or decrease depending on the balance.
  commonMistakes:
    es:
      - Confundir el trabajo del rozamiento (negativo) con la energía potencial (que puede ser positiva o negativa).
      - Olvidar que el rozamiento depende de la normal, no del peso, en planos inclinados.
      - Confundir rozamiento estático y cinético al calcular la distancia de frenado.
    en:
      - Confusing friction work (negative) with potential energy (which can be positive or negative).
      - Forgetting that friction depends on the normal force, not weight, on inclined planes.
      - Confusing static and kinetic friction when computing stopping distance.

dcl:
  title:
    es: DCL · Dinámica con Rozamiento
    en: FBD · Dynamics with Friction
  forces:
    es:
      - F_aplicada
      - W = m·g (peso)
      - N (normal)
      - f_c = μ_c·N (rozamiento cinético, opuesto al movimiento)
    en:
      - F_applied
      - W = m·g (weight)
      - N (normal)
      - f_k = μ_k·N (kinetic friction, opposing motion)
  object:
    es: bloque deslizándose sobre superficie rugosa
    en: block sliding on a rough surface
  freeBodyCondition:
    es: El DCL incluye el rozamiento cinético como fuerza opuesta al movimiento con magnitud μ_c·N.
    en: The FBD includes kinetic friction as a force opposing motion with magnitude μ_k·N.
  equilibriumCondition:
    es: Si F_aplicada = f_c, la aceleración es cero y el bloque se mueve a velocidad constante.
    en: If F_applied = f_k, acceleration is zero and the block moves at constant velocity.
  netForce:
    es: ΣF_x = F_aplicada − f_c = m·a. La fuerza de rozamiento reduce la aceleración.
    en: ΣF_x = F_applied − f_k = m·a. Friction reduces the net acceleration.
  accelerationDirection:
    es: "La aceleración tiene el sentido de la fuerza neta: positivo si F_aplicada > f_c."
    en: "Acceleration has the direction of the net force: positive if F_applied > f_k."
  referenceFrameChoice:
    es: Eje +x en la dirección del movimiento. El rozamiento apunta en sentido −x.
    en: +x axis in the direction of motion. Friction points in the −x direction.
  forceTypes:
    es:
      - F_aplicada
      - W = m·g
      - N = m·g
      - f_c = μ_c·m·g
    en:
      - F_applied
      - W = m·g
      - N = m·g
      - f_k = μ_k·m·g
  signConvention:
    es: f_c negativa en la ecuación de Newton porque se opone al movimiento (en sentido −x).
    en: "f_k is negative in Newton's equation because it opposes motion (in the −x direction)."
  commonMistakes:
    es:
      - Usar μ_e (estático) en lugar de μ_c (cinético) para el bloque en movimiento.
      - No incluir el rozamiento en el DCL porque la fuerza es pequeña.
      - Dibujar el rozamiento en la misma dirección que el movimiento.
    en:
      - Using μ_s (static) instead of μ_k (kinetic) for the block already in motion.
      - Not including friction in the FBD because the force is small.
      - Drawing friction in the same direction as the motion.
  agentHints:
    es:
      - El rozamiento cinético siempre se opone al sentido del movimiento actual.
      - En reposo, el rozamiento estático puede tomar cualquier valor hasta su máximo μ_e·N.
      - La normal sobre superficie horizontal es N = m·g si no hay componente vertical de F.
    en:
      - Kinetic friction always opposes the current direction of motion.
      - At rest, static friction can take any value up to its maximum μ_s·N.
      - The normal force on a horizontal surface is N = m·g with no vertical component of F.
  relation:
    es: El DCL con rozamiento muestra la fuerza disipativa cinética opuesta al movimiento, reduciendo la aceleración neta del sistema.
    en: The FBD with friction shows the kinetic dissipative force opposing motion, reducing the net acceleration of the system.
  readingFocus:
    es: identificar la dirección del movimiento, añadir la fuerza de rozamiento en sentido opuesto y calcular ΣF_x = m·a.
    en: identify the direction of motion, add friction in the opposite direction, and compute ΣF_x = m·a.
