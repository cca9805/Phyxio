version: "1.0"
leaf: "sin-rozamiento"

coord:
  title:
    es: Gráfica Coord · Dinámica sin Rozamiento
    en: Coord Graph · Frictionless Dynamics
  xAxis:
    es: fuerza aplicada F (N)
    en: applied force F (N)
  yAxis:
    es: aceleración a (m/s²)
    en: acceleration a (m/s²)
  xMagnitude: F
  yMagnitude: a
  relation:
    es: "Sin rozamiento, la relación entre fuerza neta y aceleración es a = F/m: una recta que pasa por el origen con pendiente 1/m. No hay pérdidas energéticas por fricción."
    en: "Without friction, the net force-acceleration relationship is a = F/m: a line through the origin with slope 1/m. No energy is lost to friction."
  physicalReading:
    es: Toda la fuerza aplicada se traduce en aceleración. La pendiente es 1/m.
    en: All applied force translates into acceleration. The slope is 1/m.
  slopeMeaning:
    es: "La pendiente 1/m es la inversa de la masa: permite medir m experimentalmente."
    en: "The slope 1/m is the inverse of the mass: it allows experimental determination of m."
  interceptMeaning:
    es: "La recta pasa por el origen: sin rozamiento, cualquier fuerza no nula produce aceleración."
    en: "The line passes through the origin: without friction, any non-zero force produces acceleration."
  curvatureMeaning:
    es: La relación es perfectamente lineal en ausencia de fricción.
    en: The relationship is perfectly linear in the absence of friction.
  signMeaning:
    es: Aceleración positiva si F apunta en +x. Negativa si F apunta en −x.
    en: Positive acceleration if F points in +x. Negative if F points in −x.
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Modelo idealizado. En la práctica, siempre hay fricción residual.
    en: Idealised model. In practice, there is always residual friction.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton sin término de rozamiento: a = F/m."
    en: "Interpreted under Newton's second law without a friction term: a = F/m."
  formulaConnection:
    es: Conecta con a = F/m (caso especial de a = (F − f)/m con f = 0).
    en: Connects to a = F/m (special case of a = (F − f)/m with f = 0).
  readingFocus:
    es: leer la pendiente como 1/m y confirmar que la recta pasa por el origen para verificar la ausencia de rozamiento.
    en: read the slope as 1/m and confirm the line passes through the origin to verify the absence of friction.
  agentHints:
    es:
      - Sin rozamiento, la recta a vs F pasa exactamente por el origen.
      - "Comparar con el caso con rozamiento: el intercepto en x mide la fuerza de rozamiento."
      - Este modelo es la base de los problemas ideales; el rozamiento se añade como corrección.
    en:
      - Without friction, the a vs F line passes exactly through the origin.
      - "Compare with the friction case: the x-intercept measures the friction force."
      - This model is the basis for ideal problems; friction is added as a correction.
  commonMistakes:
    es:
      - Creer que sin rozamiento no hay aceleración (confundir con equilibrio).
      - No identificar que la pendiente da la masa del sistema.
      - Extrapolar el modelo sin rozamiento a situaciones donde el rozamiento es significativo.
    en:
      - Believing that without friction there is no acceleration (confusing it with equilibrium).
      - "Not identifying that the slope gives the system's mass."
      - Extrapolating the frictionless model to situations where friction is significant.

dcl:
  title:
    es: DCL · Dinámica sin Rozamiento
    en: FBD · Frictionless Dynamics
  forces:
    es:
      - F_aplicada
      - W = m·g (peso)
      - N (normal, sin componente de rozamiento)
    en:
      - F_applied
      - W = m·g (weight)
      - N (normal, no friction component)
  object:
    es: bloque sobre superficie ideal sin fricción
    en: block on an ideal frictionless surface
  freeBodyCondition:
    es: El DCL solo incluye fuerzas reales sin el término de rozamiento.
    en: The FBD includes only real forces with no friction term.
  equilibriumCondition:
    es: Si F_aplicada = 0, el bloque sigue en reposo o en MRU (primera ley).
    en: If F_applied = 0, the block remains at rest or in uniform motion (first law).
  netForce:
    es: ΣF_x = F_aplicada = m·a. Sin rozamiento, toda la fuerza aplicada produce aceleración.
    en: ΣF_x = F_applied = m·a. Without friction, all applied force produces acceleration.
  accelerationDirection:
    es: La aceleración tiene la dirección y sentido de F_aplicada.
    en: Acceleration has the direction and sense of F_applied.
  referenceFrameChoice:
    es: Eje +x en la dirección del movimiento. Sin rozamiento, la normal no tiene componente horizontal.
    en: +x axis in the direction of motion. Without friction, the normal has no horizontal component.
  forceTypes:
    es:
      - F_aplicada
      - W = m·g
      - N = m·g
    en:
      - F_applied
      - W = m·g
      - N = m·g
  signConvention:
    es: F_aplicada positiva en el sentido del movimiento; negativa en sentido contrario.
    en: F_applied is positive in the direction of motion; negative in the opposite direction.
  commonMistakes:
    es:
      - Incluir un término de rozamiento aunque el enunciado diga superficie lisa.
      - Creer que la normal tiene efecto en la aceleración horizontal sin rozamiento.
      - Confundir el modelo ideal sin fricción con el caso real.
    en:
      - Including a friction term even when the problem states a frictionless surface.
      - Believing the normal force affects horizontal acceleration in the absence of friction.
      - Confusing the ideal frictionless model with the real case.
  agentHints:
    es:
      - Sin rozamiento, la normal y el peso se cancelan en y, y solo F_aplicada actúa en x.
      - La aceleración en x es a = F/m directamente.
      - Este modelo se usa como punto de partida y luego se añade rozamiento si es necesario.
    en:
      - Without friction, normal and weight cancel in y, and only F_applied acts in x.
      - Acceleration in x is a = F/m directly.
      - This model is used as a starting point; friction is added later if needed.
  relation:
    es: El DCL sin rozamiento muestra solo fuerzas reales sin fricción, resultando en que toda la fuerza aplicada produce aceleración directamente.
    en: The frictionless FBD shows only real forces with no friction, so all applied force directly produces acceleration.
  readingFocus:
    es: verificar que no hay término de rozamiento y aplicar a = F_neta/m directamente.
    en: verify there is no friction term and apply a = F_net/m directly.
