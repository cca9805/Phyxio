version: "1.0"
leaf: "analisis-completo"

coord:
  title:
    es: Gráfica Coord · Análisis Completo de Fuerzas
    en: Coord Graph · Complete Force Analysis
  xAxis:
    es: tiempo t (s) o fuerza aplicada F (N)
    en: time t (s) or applied force F (N)
  yAxis:
    es: aceleración a (m/s²) o velocidad v (m/s)
    en: acceleration a (m/s²) or velocity v (m/s)
  xMagnitude: t o F
  yMagnitude: a o v
  relation:
    es: "El análisis completo integra el DCL con la cinemática: del DCL se obtiene la aceleración, de la aceleración se obtiene la velocidad y la posición como funciones del tiempo."
    en: "The complete analysis integrates the FBD with kinematics: the FBD yields acceleration, from which velocity and position are obtained as functions of time."
  physicalReading:
    es: La pendiente de v(t) es la aceleración. El área bajo v(t) es el desplazamiento. La aceleración constante implica v(t) lineal y x(t) parabólica.
    en: The slope of v(t) is acceleration. The area under v(t) is displacement. Constant acceleration implies v(t) linear and x(t) parabolic.
  slopeMeaning:
    es: Pendiente de v(t) = a (aceleración del sistema obtenida del DCL).
    en: Slope of v(t) = a (system acceleration obtained from the FBD).
  interceptMeaning:
    es: "El valor inicial de v(t) es la velocidad en t = 0: condición inicial del sistema."
    en: "The initial value of v(t) is the velocity at t = 0: initial condition of the system."
  curvatureMeaning:
    es: Si a es constante, v(t) es lineal. Si a varía (fuerza variable), v(t) es curva.
    en: If a is constant, v(t) is linear. If a varies (variable force), v(t) is curved.
  signMeaning:
    es: "Velocidad positiva: movimiento en sentido +x. Negativa: movimiento en sentido opuesto."
    en: "Positive velocity: motion in the +x direction. Negative: motion in the opposite direction."
  areaMeaning:
    es: Área bajo v(t) es el desplazamiento Δx del sistema en ese intervalo.
    en: Area under v(t) is the displacement Δx of the system over that interval.
  domainMeaning:
    es: Válido mientras las condiciones del sistema (fuerzas, masa) permanezcan constantes.
    en: Valid while the system conditions (forces, mass) remain constant.
  modelConnection:
    es: El análisis completo es el puente entre dinámica (leyes de Newton) y cinemática (ecuaciones del movimiento).
    en: "The complete analysis is the bridge between dynamics (Newton's laws) and kinematics (equations of motion)."
  formulaConnection:
    es: Conecta con a = ΣF/m (del DCL) y con v(t) = v_0 + a·t, x(t) = x_0 + v_0·t + ½·a·t².
    en: Connects to a = ΣF/m (from the FBD) and v(t) = v_0 + a·t, x(t) = x_0 + v_0·t + ½·a·t².
  readingFocus:
    es: leer la aceleración del DCL, graficarla como pendiente de v(t) y verificar la consistencia con la posición.
    en: read the acceleration from the FBD, plot it as the slope of v(t), and verify consistency with position.
  agentHints:
    es:
      - "El análisis completo sigue tres pasos: DCL → aceleración → cinemática."
      - Verificar siempre las unidades al pasar de dinámica a cinemática.
      - Si la fuerza cambia con el tiempo, la aceleración también cambia y hay que integrar numericamente.
    en:
      - "The complete analysis follows three steps: FBD → acceleration → kinematics."
      - Always verify units when moving from dynamics to kinematics.
      - If force changes with time, acceleration also changes and numerical integration is required.
  commonMistakes:
    es:
      - Calcular la aceleración sin completar el DCL (falta de fuerzas).
      - Confundir la aceleración instantánea con la aceleración media.
      - Olvidar las condiciones iniciales al integrar la aceleración.
    en:
      - Computing acceleration without completing the FBD (missing forces).
      - Confusing instantaneous acceleration with average acceleration.
      - Forgetting initial conditions when integrating acceleration.
