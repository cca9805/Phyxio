version: "1.0"
leaf: "dos-masas-unidas-por-cuerda"

coord:
  title:
    es: Gráfica Coord · Dos Masas Unidas por Cuerda
    en: Coord Graph · Two Masses Connected by a Rope
  xAxis:
    es: diferencia de masas (m_2 − m_1) (kg)
    en: mass difference (m_2 − m_1) (kg)
  yAxis:
    es: aceleración del sistema a (m/s²) o tensión T (N)
    en: system acceleration a (m/s²) or tension T (N)
  xMagnitude: m_2 − m_1
  yMagnitude: a o T
  relation:
    es: En el sistema Atówood, a = (m_2 − m_1)·g / (m_1 + m_2) y T = 2·m_1·m_2·g / (m_1 + m_2). La aceleración crece linealmente con la diferencia de masas.
    en: In the Atwood machine, a = (m_2 − m_1)·g / (m_1 + m_2) and T = 2·m_1·m_2·g / (m_1 + m_2). Acceleration grows linearly with the mass difference.
  physicalReading:
    es: Si m_1 = m_2, a = 0 (equilibrio). A medida que las masas difieren, la aceleración aumenta proporcional a la diferencia.
    en: If m_1 = m_2, a = 0 (equilibrium). As masses differ, acceleration increases proportionally to the difference.
  slopeMeaning:
    es: "Pendiente de a vs (m_2 − m_1) = g/(m_1 + m_2): permite medir g experimentalmente si se conoce la suma de masas."
    en: "Slope of a vs (m_2 − m_1) = g/(m_1 + m_2): allows experimental measurement of g if the sum of masses is known."
  interceptMeaning:
    es: "Cuando m_1 = m_2 (diferencia = 0), a = 0: el sistema está en equilibrio."
    en: "When m_1 = m_2 (difference = 0), a = 0: the system is in equilibrium."
  curvatureMeaning:
    es: La relación es lineal si la suma de masas es constante y la diferencia varía.
    en: The relationship is linear if the sum of masses is constant and the difference varies.
  signMeaning:
    es: "Aceleración positiva si m_2 > m_1 (m_2 desciende). Negativa si m_1 > m_2."
    en: "Positive acceleration if m_2 > m_1 (m_2 descends). Negative if m_1 > m_2."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para masas positivas y cuerda ideal (no elástica, sin masa).
    en: Valid for positive masses and an ideal rope (inextensible, massless).
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton aplicada a cada masa y a la ecuación de ligadura (cuerda inextensible).
    en: "Interpreted under Newton's second law applied to each mass and the constraint equation (inextensible rope)."
  formulaConnection:
    es: Conecta con a = (m_2 − m_1)·g/(m_1 + m_2) y T = 2·m_1·m_2·g/(m_1 + m_2).
    en: Connects to a = (m_2 − m_1)·g/(m_1 + m_2) and T = 2·m_1·m_2·g/(m_1 + m_2).
  readingFocus:
    es: leer la pendiente para determinar g/(m_1 + m_2) y verificar que a = 0 cuando las masas son iguales.
    en: read the slope to determine g/(m_1 + m_2) and verify that a = 0 when the masses are equal.
  agentHints:
    es:
      - La máquina Atówood permite medir g con aceleraciones pequeñas y controladas.
      - La tensión es la misma en ambos lados de la polea ideal (sin masa ni fricción).
      - Las dos masas tienen la misma aceleración en módulo por la condición de ligadura.
    en:
      - The Atwood machine allows measurement of g with small, controlled accelerations.
      - Tension is the same on both sides of the ideal pulley (massless and frictionless).
      - Both masses have the same acceleration magnitude due to the constraint equation.
  commonMistakes:
    es:
      - Usar el peso de una sola masa en lugar de la diferencia de pesos para calcular la aceleración.
      - Olvidar que la tensión es única en toda la cuerda (polea ideal).
      - "No aplicar la ligadura: ambas masas tienen la misma magnitud de aceleración."
    en:
      - Using the weight of a single mass instead of the weight difference to compute acceleration.
      - Forgetting that tension is unique throughout the rope (ideal pulley).
      - "Not applying the constraint: both masses have the same acceleration magnitude."

svg:
  title:
    es: Escena SVG · Dos Masas Unidas por Cuerda (Máquina Atówood)
    en: SVG Scene · Two Masses Connected by a Rope (Atwood Machine)
  sceneId: atwood_scene
  sceneLabel:
    es: Máquina Atówood con dos masas conectadas por cuerda sobre polea
    en: Atwood machine with two masses connected by a rope over a pulley
  objects:
    es:
      - masa m_1
      - masa m_2
      - cuerda
      - polea ideal
      - flechas de peso y tensión
    en:
      - mass m_1
      - mass m_2
      - rope
      - ideal pulley
      - weight and tension arrows
  mainObject:
    es: par de masas conectadas por cuerda sobre polea
    en: pair of masses connected by a rope over a pulley
  referenceFrame:
    es: laboratorio inercial con eje +y hacia arriba para una masa y hacia abajo para la otra
    en: inertial laboratory with +y axis upward for one mass and downward for the other
  geometry:
    es: La escena muestra las dos masas colgando de los lados opuestos de la polea. La cuerda es inextensible y la polea es ideal.
    en: The scene shows the two masses hanging from opposite sides of the pulley. The rope is inextensible and the pulley is ideal.
  interactions:
    es: El peso de cada masa actua hacia abajo. La tensión es la misma en ambos lados y actua hacia arriba para cada masa.
    en: The weight of each mass acts downward. Tension is the same on both sides and acts upward on each mass.
  modelElements:
    es:
      - W_1 = m_1·g
      - W_2 = m_2·g
      - T (misma en ambos lados)
      - polea ideal sin masa ni fricción
    en:
      - W_1 = m_1·g
      - W_2 = m_2·g
      - T (same on both sides)
      - "ideal pulley: massless and frictionless"
  visualCues:
    es:
      - Las flechas de tensión apuntan hacia arriba en ambas masas.
      - Las flechas de peso apuntan hacia abajo.
      - "Si m_2 > m_1, la flecha de peso de m_2 es más larga."
    en:
      - Tension arrows point upward on both masses.
      - Weight arrows point downward.
      - "If m_2 > m_1, the weight arrow of m_2 is longer."
  scaleMeaning:
    es: Las longitudes de las flechas de peso son proporcionales a las masas (y por tanto a los pesos).
    en: Weight arrow lengths are proportional to masses (and thus to weights).
  relation:
    es: La escena ilustra la máquina Atówood con sus fuerzas y restricción de ligadura (cuerda inextensible).
    en: The scene illustrates the Atwood machine with its forces and constraint (inextensible rope).
  physicalReading:
    es: Identificar qué masa es mayor para deducir el sentido del movimiento y trazar los DCL individuales.
    en: Identify which mass is greater to deduce the direction of motion and draw the individual FBDs.
  modelConnection:
    es: Se resuelve con la segunda ley de Newton para cada masa y la ecuación de ligadura.
    en: "Solved with Newton's second law for each mass and the constraint equation."
  formulaConnection:
    es: Conecta con m_2·g − T = m_2·a (para m_2) y T − m_1·g = m_1·a (para m_1).
    en: Connects to m_2·g − T = m_2·a (for m_2) and T − m_1·g = m_1·a (for m_1).
  readingFocus:
    es: identificar las masas, la dirección del movimiento y trazar un DCL por masa antes de resolver.
    en: identify the masses, the direction of motion, and draw one FBD per mass before solving.
  agentHints:
    es:
      - El sistema se mueve en dirección de la masa mayor.
      - La tensión es igual en toda la cuerda para polea ideal.
      - La aceleración es la misma en módulo para ambas masas (condición de ligadura).
    en:
      - The system moves in the direction of the greater mass.
      - Tension is uniform throughout the rope for an ideal pulley.
      - Both masses have the same acceleration magnitude (constraint condition).
  commonMistakes:
    es:
      - Poner la tensión distinta en cada lado de la polea.
      - No coordinar el sentido positivo entre los dos DCL (si m_2 baja, m_1 sube).
      - Ignorar la ecuación de ligadura y tratar las aceleraciones como independientes.
    en:
      - Assigning different tensions on each side of the ideal pulley.
      - Not coordinating the positive direction between the two FBDs (if m_2 descends, m_1 ascends).
      - Ignoring the constraint equation and treating accelerations as independent.
