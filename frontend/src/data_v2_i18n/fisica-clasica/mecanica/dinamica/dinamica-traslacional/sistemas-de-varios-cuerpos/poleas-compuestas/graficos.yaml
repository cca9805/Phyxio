version: "1.0"
leaf: "poleas-compuestas"

coord:
  title:
    es: Gráfica Coord · Poleas Compuestas
    en: Coord Graph · Compound Pulleys
  xAxis:
    es: número de segmentos de cuerda n
    en: number of rope segments n
  yAxis:
    es: ventaja mecánica VM o fuerza necesaria F_esfuerzo (N)
    en: mechanical advantage MA or required effort force F_e (N)
  xMagnitude: n
  yMagnitude: VM o F_esfuerzo
  relation:
    es: En poleas compuestas ideales, VM = n (número de segmentos que soportan la carga). La fuerza de esfuerzo F_e = W/n, por lo que a mayor número de poleas, menor esfuerzo necesario.
    en: In ideal compound pulleys, MA = n (number of rope segments supporting the load). Effort force F_e = W/n, so more pulley segments means less effort required.
  physicalReading:
    es: La ventaja mecánica crece linealmente con el número de segmentos de cuerda. Doblar segmentos reduce el esfuerzo a la mitad.
    en: Mechanical advantage grows linearly with the number of rope segments. Doubling segments halves the effort.
  slopeMeaning:
    es: "No aplica directamente: la VM es un número entero. El esfuerzo F_e = W/VM disminuye hiperbólicamente con VM."
    en: "Not directly applicable: MA is an integer. Effort F_e = W/MA decreases hyperbolically with MA."
  interceptMeaning:
    es: Con n = 1 (sin ventaja), F_e = W. Con poleas, F_e < W.
    en: With n = 1 (no advantage), F_e = W. With pulleys, F_e < W.
  curvatureMeaning:
    es: F_e vs n es hiperbólica (F_e = W/n). VM vs n es lineal.
    en: F_e vs n is hyperbolic (F_e = W/n). MA vs n is linear.
  signMeaning:
    es: Todas las fuerzas son positivas (tracción). No hay signos negativos.
    en: All forces are positive (tension). No negative signs.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para n entero ≥ 1. Poleas ideales (sin masa ni fricción).
    en: Valid for integer n ≥ 1. Ideal pulleys (massless and frictionless).
  modelConnection:
    es: "Se interpreta bajo el principio de la máquina simple: menor fuerza a mayor distancia recorrida."
    en: "Interpreted under the simple machine principle: less force over a greater distance."
  formulaConnection:
    es: Conecta con VM = n, F_e = W/n y d_esfuerzo = n·d_carga (el esfuerzo recorre n veces la distancia de la carga).
    en: Connects to MA = n, F_e = W/n, and d_effort = n·d_load (effort travels n times the load distance).
  readingFocus:
    es: leer el número de segmentos para determinar la ventaja mecánica y el esfuerzo necesario.
    en: read the number of segments to determine the mechanical advantage and required effort.
  agentHints:
    es:
      - Cada segmento adicional de cuerda reduce el esfuerzo en un factor 1/n.
      - "La ventaja mecánica no genera energía: si F disminuye, la distancia recorrida aumenta proporcionalmente."
      - Poleas fijas solo cambian la dirección; poleas móviles multiplican la fuerza.
    en:
      - Each additional rope segment reduces effort by a factor of 1/n.
      - "Mechanical advantage does not generate energy: if F decreases, distance increases proportionally."
      - Fixed pulleys only change direction; movable pulleys multiply force.
  commonMistakes:
    es:
      - Contar mal los segmentos de cuerda que soportan la carga.
      - Creer que la polea amplifica la energía (viola la conservación).
      - Ignorar el peso de la polea móvil cuando no es despreciable.
    en:
      - Miscounting the rope segments that support the load.
      - Believing the pulley amplifies energy (violates conservation).
      - Ignoring the weight of the movable pulley when it is not negligible.

svg:
  title:
    es: Escena SVG · Poleas Compuestas
    en: SVG Scene · Compound Pulleys
  sceneId: poleas_compuestas_scene
  sceneLabel:
    es: Sistema de poleas compuestas con carga y segmentos de cuerda
    en: Compound pulley system with load and rope segments
  objects:
    es:
      - poleas fijas
      - poleas móviles
      - cuerda
      - carga W
      - fuerza de esfuerzo F_e
    en:
      - fixed pulleys
      - movable pulleys
      - rope
      - load W
      - effort force F_e
  mainObject:
    es: sistema de poleas compuestas
    en: compound pulley system
  referenceFrame:
    es: laboratorio inercial con dirección vertical
    en: inertial laboratory with vertical direction
  geometry:
    es: La escena muestra las poleas fijas y móviles con los segmentos de cuerda que soportan la carga. Cada segmento paralelo contribuye a la ventaja mecánica.
    en: The scene shows fixed and movable pulleys with the rope segments supporting the load. Each parallel segment contributes to the mechanical advantage.
  interactions:
    es: "La tensión T es la misma en toda la cuerda (ideal). n segmentos soportan la carga: W = n·T."
    en: "Tension T is uniform throughout the rope (ideal). n segments support the load: W = n·T."
  modelElements:
    es:
      - n segmentos de cuerda
      - carga W = n·T
      - F_esfuerzo = T = W/n
    en:
      - n rope segments
      - load W = n·T
      - F_effort = T = W/n
  visualCues:
    es:
      - "Contar los segmentos de cuerda que salen de la polea móvil: ese es n."
      - Todas las secciones de cuerda tienen la misma tensión T (polea ideal).
      - La polea fija solo cambia la dirección; la móvil aporta ventaja mecánica.
    en:
      - "Count the rope segments leaving the movable pulley: that is n."
      - All rope sections have the same tension T (ideal pulley).
      - The fixed pulley only changes direction; the movable pulley provides mechanical advantage.
  scaleMeaning:
    es: Indicativo. Las longitudes de cuerda son proporcionales a la geometría del sistema.
    en: Indicative. Rope lengths are proportional to the system geometry.
  relation:
    es: La escena muestra cómo las poleas compuestas distribuyen la carga en n segmentos, reduciendo el esfuerzo necesario en un factor n.
    en: The scene shows how compound pulleys distribute the load over n segments, reducing required effort by a factor of n.
  physicalReading:
    es: Contar n para determinar VM y calcular F_e = W/n.
    en: Count n to determine MA and compute F_e = W/n.
  modelConnection:
    es: Se interpreta bajo el principio de la máquina simple con poleas móviles.
    en: Interpreted under the simple machine principle with movable pulleys.
  formulaConnection:
    es: Conecta con VM = n, F_e = W/n y d_e = n·d_c.
    en: Connects to MA = n, F_e = W/n, and d_e = n·d_c.
  readingFocus:
    es: contar los segmentos de cuerda que soportan la carga para determinar la ventaja mecánica.
    en: count the rope segments supporting the load to determine the mechanical advantage.
  agentHints:
    es:
      - "Las poleas fijas no aportan ventaja: solo cambian la dirección del esfuerzo."
      - Las poleas móviles aportan factor 2 de ventaja mecánica cada una.
      - "El sistema de poleas conserva la energía: F·d = constante."
    en:
      - "Fixed pulleys provide no mechanical advantage: they only change the direction of effort."
      - Each movable pulley contributes a factor of 2 to the mechanical advantage.
      - "The pulley system conserves energy: F·d = constant."
  commonMistakes:
    es:
      - Contar también los segmentos que van al punto fijo (no soportan la carga).
      - Olvidar incluir el peso de la propia polea móvil como parte de la carga.
      - Confundir poleas fijas y móviles al contar.
    en:
      - Also counting segments going to the fixed point (they do not support the load).
      - Forgetting to include the weight of the movable pulley itself as part of the load.
      - Confusing fixed and movable pulleys when counting.
