version: 2
id: interpretacion-poleas-compuestas
leaf_id: poleas-compuestas
nombre:
  es: Interpretacion de Poleas compuestas
  en: Interpretation of Compound Pulleys
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: sistemas-de-varios-cuerpos
  ruta_relativa: fisica-clasica/mecanica/dinamica/dinamica-traslacional/sistemas-de-varios-cuerpos/poleas-compuestas
dependencies:
  formulas:
  - fuerza_ideal_poleas_compuestas
  - fuerza_real_poleas_compuestas
  magnitudes:
  - W
  - nSel
  - eta
  - F_ideal
  - F_real
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  F_ideal:
    summary_rules:
    - id: F_ideal_summary
      when: 'true'
      status: info
      text:
        es: F_ideal resume una lectura fisica relevante del leaf.
        en: F_ideal summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: F_ideal_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que F_ideal sea coherente con unidades y contexto.
        en: Check that F_ideal is coherent with units and context.
    physical_reading_rules:
    - id: F_ideal_physical
      when: 'true'
      status: info
      text:
        es: "F_ideal indica la fuerza teórica mínima porque W se reparte entre nSel tramos; por tanto F_ideal disminuye cuando nSel aumenta."
        en: "F_ideal indicates the minimum theoretical force because W is shared among nSel segments; therefore F_ideal decreases when nSel increases."
    model_validity_rules:
    - id: F_ideal_validity
      when: 'true'
      status: ok
      text:
        es: F_ideal solo es interpretable dentro del modelo elegido.
        en: F_ideal is interpretable only inside the chosen model.
    graph_rules:
    - id: F_ideal_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de F_ideal.
        en: The graph must reflect the role of F_ideal visually.
    likely_errors:
    - id: F_ideal_warn
      when: 'true'
      status: warning
      text:
        es: No confundas F_ideal con otra magnitud cercana del problema.
        en: Do not confuse F_ideal with another nearby quantity in the problem.
    next_step_rules:
    - id: F_ideal_next
      when: 'true'
      status: info
      text:
        es: Usa F_ideal para enlazar con el siguiente paso de interpretacion.
        en: Use F_ideal to connect with the next interpretation step.
