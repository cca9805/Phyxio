version: 1
magnitudes:
- id: W
  symbol: W
  nombre:
    es: peso de la carga
    en: load weight
  descripcion:
    es: Fuerza gravitatoria total asociada a la carga que el sistema de poleas debe
      sostener o elevar.
    en: Total gravitational force associated with the load that the pulley system
      must support or lift.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - poleas-compuestas
  common_mistake: Confundir W con otra magnitud cercana dentro de poleas compuestas.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - poleas-compuestas
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar W con una definicion estable antes de sustituir valores.
