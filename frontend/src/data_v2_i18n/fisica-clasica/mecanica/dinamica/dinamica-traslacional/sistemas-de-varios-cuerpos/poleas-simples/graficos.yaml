version: "1.0"
leaf: "poleas-simples"

coord:
  title:
    es: Gráfica Coord · Poleas Simples
    en: Coord Graph · Simple Pulleys
  xAxis:
    es: fuerza de esfuerzo F_e (N)
    en: effort force F_e (N)
  yAxis:
    es: carga soportada W (N)
    en: supported load W (N)
  xMagnitude: F_e
  yMagnitude: W
  relation:
    es: "Una polea simple fija tiene VM = 1: F_e = W pero cambia la dirección. Una polea simple móvil tiene VM = 2: F_e = W/2 pero el esfuerzo recorre el doble de distancia."
    en: "A simple fixed pulley has MA = 1: F_e = W but direction changes. A simple movable pulley has MA = 2: F_e = W/2 but effort travels twice the distance."
  physicalReading:
    es: "Para polea fija: la recta W vs F_e tiene pendiente 1 (sin ventaja mecánica). Para polea móvil: pendiente 2 (la carga es el doble del esfuerzo)."
    en: "Fixed pulley: W vs F_e line has slope 1 (no mechanical advantage). Movable pulley: slope 2 (load is twice the effort)."
  slopeMeaning:
    es: "La pendiente es la ventaja mecánica: 1 para polea fija, 2 para polea móvil."
    en: "The slope is the mechanical advantage: 1 for a fixed pulley, 2 for a movable pulley."
  interceptMeaning:
    es: En polea ideal, la recta pasa por el origen. Sin fricción, no hay umbral mínimo.
    en: For an ideal pulley, the line passes through the origin. Without friction, there is no minimum threshold.
  curvatureMeaning:
    es: La relación es lineal para poleas ideales.
    en: The relationship is linear for ideal pulleys.
  signMeaning:
    es: Fuerzas siempre positivas. La tensión es la misma en toda la cuerda.
    en: Forces always positive. Tension is the same throughout the rope.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para cargas en el rango de operación y poleas ideales.
    en: Valid for loads within the operating range and ideal pulleys.
  modelConnection:
    es: "Se interpreta bajo el principio de máquinas simples: VM = d_esfuerzo/d_carga."
    en: "Interpreted under the simple machine principle: MA = d_effort/d_load."
  formulaConnection:
    es: Conecta con VM = W/F_e y T = F_e (misma en toda la cuerda).
    en: Connects to MA = W/F_e and T = F_e (uniform throughout the rope).
  readingFocus:
    es: leer la pendiente para identificar el tipo de polea y la ventaja mecánica del sistema.
    en: read the slope to identify the pulley type and the mechanical advantage of the system.
  agentHints:
    es:
      - La polea fija solo cambia la dirección del esfuerzo (VM = 1).
      - "La polea móvil aporta VM = 2: esfuerzo a la mitad, distancia al doble."
      - La tensión es la misma en toda la cuerda (polea ideal sin masa ni fricción).
    en:
      - The fixed pulley only changes the direction of effort (MA = 1).
      - "The movable pulley gives MA = 2: half the effort, twice the distance."
      - "Tension is the same throughout the rope (ideal pulley: massless and frictionless)."
  commonMistakes:
    es:
      - Creer que la polea fija reduce el esfuerzo (solo cambia la dirección).
      - Confundir la ventaja mecánica con el rendimiento.
      - Olvidar que al reducir el esfuerzo, la distancia recorrida se multiplica.
    en:
      - Believing the fixed pulley reduces effort (it only changes direction).
      - Confusing mechanical advantage with efficiency.
      - Forgetting that reducing effort multiplies the distance travelled.

svg:
  title:
    es: Escena SVG · Poleas Simples
    en: SVG Scene · Simple Pulleys
  sceneId: poleas_simples_scene
  sceneLabel:
    es: Polea simple fija y móvil con carga y esfuerzo
    en: Simple fixed and movable pulley with load and effort
  objects:
    es:
      - polea fija o móvil
      - cuerda
      - carga W
      - fuerza de esfuerzo F_e
    en:
      - fixed or movable pulley
      - rope
      - load W
      - effort force F_e
  mainObject:
    es: sistema de polea simple
    en: simple pulley system
  referenceFrame:
    es: laboratorio inercial con dirección vertical
    en: inertial laboratory with vertical direction
  geometry:
    es: La escena muestra la polea con la cuerda, la carga en un extremo y el esfuerzo en el otro. Para polea móvil, la polea cuelga de la cuerda soportando la carga.
    en: The scene shows the pulley with the rope, the load at one end, and the effort at the other. For a movable pulley, the pulley hangs from the rope supporting the load.
  interactions:
    es: La tensión es la misma en toda la cuerda. La polea transmite la fuerza cambiando su dirección.
    en: Tension is the same throughout the rope. The pulley transmits force by changing its direction.
  modelElements:
    es:
      - T = F_e (misma en toda la cuerda)
      - W soportada por n·T
    en:
      - T = F_e (uniform throughout the rope)
      - W supported by n·T
  visualCues:
    es:
      - "Polea fija: los dos extremos de la cuerda son F_e y W. T = F_e = W (VM = 1)."
      - "Polea móvil: la polea cuelga de dos segmentos de cuerda. W = 2·T = 2·F_e (VM = 2)."
      - La dirección del esfuerzo cambia según la orientación de la polea.
    en:
      - "Fixed pulley: both rope ends are F_e and W. T = F_e = W (MA = 1)."
      - "Movable pulley: hangs from two rope segments. W = 2·T = 2·F_e (MA = 2)."
      - The direction of effort changes with the orientation of the pulley.
  scaleMeaning:
    es: Indicativo. Las flechas muestran las fuerzas en cada extremo de la cuerda.
    en: Indicative. Arrows show forces at each end of the rope.
  relation:
    es: La escena ilustra el funcionamiento de poleas simples como máquinas que cambian la dirección y/o la magnitud del esfuerzo.
    en: The scene illustrates how simple pulleys work as machines that change the direction and/or magnitude of effort.
  physicalReading:
    es: Identificar si la polea es fija o móvil para determinar la ventaja mecánica.
    en: Identify whether the pulley is fixed or movable to determine the mechanical advantage.
  modelConnection:
    es: "Se interpreta bajo el principio de trabajo de máquinas simples: F_e·d_e = W·d_c."
    en: "Interpreted under the work principle of simple machines: F_e·d_e = W·d_c."
  formulaConnection:
    es: Conecta con VM = n (segmentos), F_e = W/VM y d_e = VM·d_c.
    en: Connects to MA = n (segments), F_e = W/MA, and d_e = MA·d_c.
  readingFocus:
    es: identificar el tipo de polea y el número de segmentos que soportan la carga para calcular la ventaja mecánica.
    en: identify the pulley type and the number of segments supporting the load to compute the mechanical advantage.
  agentHints:
    es:
      - "Polea fija: VM = 1, solo cambia la dirección."
      - "Polea móvil: VM = 2, reduce el esfuerzo a la mitad."
      - Combinando poleas fijas y móviles se obtiene VM mayor.
    en:
      - "Fixed pulley: MA = 1, changes direction only."
      - "Movable pulley: MA = 2, halves the effort."
      - Combining fixed and movable pulleys achieves higher MA.
  commonMistakes:
    es:
      - Creer que la polea fija reduce la fuerza necesaria.
      - No tener en cuenta el peso de la propia polea móvil.
      - Confundir el número de poleas con la ventaja mecánica.
    en:
      - Believing the fixed pulley reduces the required force.
      - Not accounting for the weight of the movable pulley itself.
      - Confusing the number of pulleys with the mechanical advantage.
