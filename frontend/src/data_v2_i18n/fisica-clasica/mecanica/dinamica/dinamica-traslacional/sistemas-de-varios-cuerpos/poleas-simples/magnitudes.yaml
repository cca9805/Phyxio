version: 2
magnitudes:
  - id: W
    symbol: W
    nombre:
      es: peso de la carga
      en: load weight
    descripcion:
      es: Fuerza peso total que el sistema debe sostener o elevar.
      en: Total weight force that the system must support or lift.
    unidad_si: N
    dimension: MLT^-2
    is_vector: false
    category: parameter
    physical_role: parameter
    used_in:
      - fuerza_ideal_poleas
    components:
      scalar: true
      x: false
      y: false
      tangential: false
      radial: false
    common_mistake:
      es: Confundir el peso con la masa y escribir el dato en kilogramos en vez de en newton.
      en: Confusing weight with mass and writing the datum in kilograms instead of newtons.
    typical_range:
      es: En problemas introductorios suele ir desde decenas hasta algunos miles de newton.
      en: In introductory problems it usually ranges from tens to a few thousand newtons.
    sign_behavior:
      es: En este leaf se usa como magnitud positiva; la dirección física está implícita en el modelo.
      en: In this leaf it is used as a positive magnitude; the physical direction is implicit in the model.
    zero_behavior:
      es: Si W vale cero, desaparece la carga y el problema pierde interés físico.
      en: If W is zero, the load disappears and the problem loses physical meaning.
    value_nature:
      es: Magnitud escalar derivada de la interacción gravitatoria.
      en: Scalar quantity derived from the gravitational interaction.
    interpretation_role:
      es: Representa la exigencia mecánica total que el polipasto debe compensar.
      en: It represents the total mechanical demand that the pulley block must compensate.
    graph_binding:
      es: Fija la escala vertical de fuerzas en gráficos y comparaciones.
      en: It sets the vertical force scale in graphs and comparisons.
    pedagogical_notes:
      es: Conviene recordar que el sistema reparte el peso entre tramos, no entre masas.
      en: It is useful to remember that the system shares weight among segments, not among masses.

  - id: nSel
    symbol: n
    nombre:
      es: número de tramos activos
      en: number of supporting segments
    descripcion:
      es: Número de segmentos de cuerda que sostienen directamente la carga en el modelo ideal.
      en: Number of rope segments directly supporting the load in the ideal model.
    unidad_si: '1'
    dimension: '1'
    is_vector: false
    category: parameter
    physical_role: parameter
    used_in:
      - fuerza_ideal_poleas
      - traccion_cable_poleas
    components:
      scalar: true
      x: false
      y: false
      tangential: false
      radial: false
    common_mistake:
      es: Contar segmentos que redirigen la cuerda pero no sostienen realmente la carga.
      en: Counting segments that redirect the rope but do not actually support the load.
    typical_range:
      es: En montaje didáctico suele tomar valores enteros pequeños, entre 1 y 6.
      en: In educational setups it usually takes small integer values, between 1 and 6.
    sign_behavior:
      es: Debe ser positivo y entero dentro de la lectura física del sistema.
      en: It must be positive and integer within the physical reading of the system.
    zero_behavior:
      es: Un valor nulo no tiene sentido porque implicaría ausencia total de sostén por cuerda.
      en: A zero value is meaningless because it would imply no rope support at all.
    value_nature:
      es: Magnitud discreta y adimensional.
      en: Discrete and dimensionless quantity.
    interpretation_role:
      es: Controla simultáneamente la ventaja mecánica y el intercambio con el recorrido de cuerda.
      en: It controls both the mechanical advantage and the trade-off with rope travel.
    graph_binding:
      es: Modifica la pendiente o la curvatura aparente de relaciones idealizadas entre variables.
      en: It changes the slope or apparent curvature of idealized relationships between variables.
    pedagogical_notes:
      es: Es la variable estructural más importante del leaf.
      en: It is the most important structural variable in the leaf.

  - id: dx_load
    symbol: dx_load
    nombre:
      es: desplazamiento de la carga
      en: load displacement
    descripcion:
      es: Distancia vertical recorrida por la carga durante la maniobra.
      en: Vertical distance traveled by the load during the maneuver.
    unidad_si: m
    dimension: L
    is_vector: false
    category: parameter
    physical_role: parameter
    used_in:
      - traccion_cable_poleas
    components:
      scalar: true
      x: false
      y: true
      tangential: false
      radial: false
    common_mistake:
      es: Pensar que coincide siempre con la cuerda tirada por el operador.
      en: Thinking that it is always equal to the rope pulled by the operator.
    typical_range:
      es: En ejercicios habituales va desde unos centímetros hasta algunos metros.
      en: In standard exercises it goes from a few centimeters to a few meters.
    sign_behavior:
      es: En este leaf se interpreta como magnitud positiva asociada al ascenso deseado.
      en: In this leaf it is interpreted as a positive magnitude associated with the desired rise.
    zero_behavior:
      es: Si vale cero, la carga no cambia de posición.
      en: If it is zero, the load does not change position.
    value_nature:
      es: Magnitud cinemática escalar.
      en: Scalar kinematic quantity.
    interpretation_role:
      es: Mide el efecto útil del sistema sobre la carga.
      en: It measures the useful effect of the system on the load.
    graph_binding:
      es: Actúa como variable de entrada en relaciones geométricas de recorrido.
      en: It acts as an input variable in geometric travel relations.
    pedagogical_notes:
      es: Es útil compararla siempre con dx_pull para entender el precio geométrico de la ventaja mecánica.
      en: It is useful to compare it with dx_pull to understand the geometric price of mechanical advantage.

  - id: F
    symbol: F
    nombre:
      es: fuerza aplicada
      en: applied force
    descripcion:
      es: Fuerza ideal que ejerce el operador sobre el extremo libre de la cuerda.
      en: Ideal force exerted by the operator on the free end of the rope.
    unidad_si: N
    dimension: MLT^-2
    is_vector: false
    category: derived
    physical_role: dependent
    used_in:
      - fuerza_ideal_poleas
    components:
      scalar: true
      x: false
      y: false
      tangential: false
      radial: false
    common_mistake:
      es: Suponer que siempre coincide con el peso o que puede hacerse arbitrariamente pequeña sin consecuencias.
      en: Assuming that it always equals the weight or that it can become arbitrarily small without consequences.
    typical_range:
      es: Suele ser menor o igual que W en el modelo ideal con nSel mayor o igual que 1.
      en: It is usually less than or equal to W in the ideal model with nSel greater than or equal to 1.
    sign_behavior:
      es: Se usa como magnitud positiva de esfuerzo aplicado.
      en: It is used as a positive magnitude of applied effort.
    zero_behavior:
      es: Solo puede anularse si la carga también desaparece en el modelo ideal.
      en: It can vanish only if the load also disappears in the ideal model.
    value_nature:
      es: Magnitud mecánica derivada del reparto de tensión.
      en: Mechanical quantity derived from tension sharing.
    interpretation_role:
      es: Representa el esfuerzo que debe aportar el operador.
      en: It represents the effort that the operator must provide.
    graph_binding:
      es: Es la salida principal en gráficos de ventaja mecánica.
      en: It is the main output in mechanical-advantage graphs.
    pedagogical_notes:
      es: Debe leerse siempre junto con nSel para evitar interpretaciones aisladas.
      en: It should always be read together with nSel to avoid isolated interpretations.

  - id: dx_pull
    symbol: dx_pull
    nombre:
      es: desplazamiento de cuerda tirada
      en: pulled rope displacement
    descripcion:
      es: Longitud de cuerda que el operador debe recoger para producir el ascenso de la carga.
      en: Rope length that the operator must pull to produce the rise of the load.
    unidad_si: m
    dimension: L
    is_vector: false
    category: derived
    physical_role: dependent
    used_in:
      - traccion_cable_poleas
    components:
      scalar: true
      x: false
      y: true
      tangential: false
      radial: false
    common_mistake:
      es: Creer que la polea reduce fuerza sin aumentar esta distancia.
      en: Believing that the pulley reduces force without increasing this distance.
    typical_range:
      es: Suele ser igual o mayor que dx_load en todos los montajes ideales relevantes.
      en: It is usually equal to or greater than dx_load in all relevant ideal setups.
    sign_behavior:
      es: Se toma positiva como longitud de cuerda recogida.
      en: It is taken as positive as the length of rope pulled.
    zero_behavior:
      es: Si vale cero, el operador no tira cuerda y la carga no asciende.
      en: If it is zero, the operator pulls no rope and the load does not rise.
    value_nature:
      es: Magnitud cinemática derivada de una restricción geométrica.
      en: Kinematic quantity derived from a geometric constraint.
    interpretation_role:
      es: Mide el coste cinemático de reducir la fuerza requerida.
      en: It measures the kinematic cost of reducing the required force.
    graph_binding:
      es: Es la salida principal en gráficos de intercambio entre fuerza y recorrido.
      en: It is the main output in graphs of the trade-off between force and travel.
    pedagogical_notes:
      es: Es la clave para conectar poleas simples con trabajo y energía.
      en: It is the key to connect simple pulleys with work and energy.

