version: "1.0"
leaf: "bloque-colgante"

coord:
  title:
    es: Gráfica Coord · Bloque Colgante
    en: Coord Graph · Hanging Block
  xAxis:
    es: masa colgante m (kg)
    en: hanging mass m (kg)
  yAxis:
    es: tensión T (N) o aceleración a (m/s²)
    en: tension T (N) or acceleration a (m/s²)
  xMagnitude: m
  yMagnitude: T o a
  relation:
    es: En un bloque colgante ideal, la tensión T = m·(g − a). Si el bloque está en reposo, T = m·g. Si desciende con aceleración a, T < m·g.
    en: In an ideal hanging block, tension T = m·(g − a). If the block is at rest, T = m·g. If descending with acceleration a, T < m·g.
  physicalReading:
    es: La tensión crece linealmente con la masa. La aceleración depende del desequilibrio de fuerzas en el sistema.
    en: Tension grows linearly with mass. Acceleration depends on the force imbalance in the system.
  slopeMeaning:
    es: "Pendiente de T vs m = g − a: cuando mayor es la aceleración, menor es la pendiente."
    en: "Slope of T vs m = g − a: the greater the acceleration, the smaller the slope."
  interceptMeaning:
    es: Si m = 0, T = 0. La recta pasa por el origen en el caso ideal.
    en: If m = 0, T = 0. The line passes through the origin in the ideal case.
  curvatureMeaning:
    es: La relación es lineal para masa constante y aceleración constante.
    en: The relationship is linear for constant mass and constant acceleration.
  signMeaning:
    es: Tensión siempre positiva (traccion). La aceleración es positiva si el bloque desciende en el sentido positivo elegido.
    en: Tension is always positive (tension). Acceleration is positive if the block descends in the chosen positive direction.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para masas positivas. T = 0 si la cuerda está sin tensar.
    en: Valid for positive masses. T = 0 if the rope is slack.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton aplicada al bloque: ΣF = m·g − T = m·a."
    en: "Interpreted under Newton's second law applied to the block: ΣF = m·g − T = m·a."
  formulaConnection:
    es: Conecta con T = m·(g − a) y a = g cuando no hay tensión (caída libre).
    en: Connects to T = m·(g − a) and a = g when there is no tension (free fall).
  readingFocus:
    es: leer la tensión para la masa dada e identificar si la aceleración neta es cero (equilbrio) o no nula.
    en: read the tension for the given mass and identify whether the net acceleration is zero (equilibrium) or non-zero.
  agentHints:
    es:
      - En reposo, T = m·g exactamente.
      - "Si el sistema acelera hacia abajo, T < m·g; si acelera hacia arriba, T > m·g."
      - El bloque colgante es un subsistema del sistema Atówood o de poleas.
    en:
      - At rest, T = m·g exactly.
      - "If the system accelerates downward, T < m·g; upward, T > m·g."
      - The hanging block is a subsystem of the Atwood machine or pulley system.
  commonMistakes:
    es:
      - Confundir el peso m·g con la tensión cuando el bloque acelera.
      - Olvidar que la tensión de la cuerda es la misma en todo su recorrido (cuerda ideal).
      - No aplicar la ecuación del bloque colganente junto con la del bloque horizontal en sistemas con polea.
    en:
      - Confusing weight m·g with tension when the block accelerates.
      - Forgetting that rope tension is the same throughout its length (ideal rope).
      - Not applying the hanging block equation together with the horizontal block equation in pulley systems.
