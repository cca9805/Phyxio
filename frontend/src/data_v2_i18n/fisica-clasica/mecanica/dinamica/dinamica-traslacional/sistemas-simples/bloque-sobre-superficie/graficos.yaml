version: "1.0"
leaf: "bloque-sobre-superficie"

coord:
  title:
    es: Gráfica Coord · Bloque Sobre Superficie
    en: Coord Graph · Block on Surface
  xAxis:
    es: fuerza aplicada F (N)
    en: applied force F (N)
  yAxis:
    es: aceleración a (m/s²)
    en: acceleration a (m/s²)
  xMagnitude: F
  yMagnitude: a
  relation:
    es: Para un bloque sobre superficie horizontal con rozamiento, a = (F − μ_c·m·g)/m. La gráfica a vs F es una recta con pendiente 1/m e intercepto en el eje x igual a μ_c·m·g.
    en: For a block on a horizontal surface with friction, a = (F − μ_k·m·g)/m. The a vs F graph is a straight line with slope 1/m and x-intercept μ_k·m·g.
  physicalReading:
    es: "El bloque no se mueve para F < μ_e·m·g (rozamiento estático). Para F > umbral, acelera con pendiente 1/m."
    en: The block does not move for F < μ_s·m·g (static friction). For F above the threshold, it accelerates with slope 1/m.
  slopeMeaning:
    es: "La pendiente es 1/m: determina experimentalmente la masa del bloque."
    en: "The slope is 1/m: it experimentally determines the block's mass."
  interceptMeaning:
    es: El corte con el eje x es la fuerza mínima para vencer el rozamiento estático (μ_e·m·g).
    en: The x-intercept is the minimum force to overcome static friction (μ_s·m·g).
  curvatureMeaning:
    es: La relación es lineal para superficie plana y rozamiento cinético constante.
    en: The relationship is linear for a flat surface and constant kinetic friction.
  signMeaning:
    es: "Aceleración positiva: el bloque se acelera en la dirección de F. Si F < f_rozamiento, a = 0."
    en: "Positive acceleration: the block accelerates in the direction of F. If F < friction force, a = 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Válido para F > μ_e·m·g (umbral dinámico) y para superficie plana y horizontal."
    en: "Valid for F > μ_s·m·g (dynamic threshold) and for a flat horizontal surface."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton con rozamiento: ΣF_x = F − f_r = m·a."
    en: "Interpreted under Newton's second law with friction: ΣF_x = F − f = m·a."
  formulaConnection:
    es: Conecta con a = (F − μ_c·N)/m = (F − μ_c·m·g)/m en superficie horizontal.
    en: Connects to a = (F − μ_k·N)/m = (F − μ_k·m·g)/m on a horizontal surface.
  readingFocus:
    es: leer el intercepto como la fuerza de rozamiento estático y la pendiente como 1/m.
    en: read the intercept as the static friction force and the slope as 1/m.
  agentHints:
    es:
      - La normal sobre superficie horizontal es N = m·g (sin componente vertical de F aplicada).
      - Si F tiene componente vertical, la normal cambia y con ella la fuerza de rozamiento.
      - El umbral de movimiento está dado por F ≥ μ_e·m·g.
    en:
      - The normal force on a horizontal surface is N = m·g (with no vertical component of F).
      - If F has a vertical component, the normal force changes and so does the friction force.
      - The motion threshold is given by F ≥ μ_s·m·g.
  commonMistakes:
    es:
      - Usar μ_e (estático) en lugar de μ_c (cinético) una vez que el bloque ya se mueve.
      - Ignorar que la normal cambia si la fuerza aplicada tiene componente vertical.
      - No incluir el rozamiento en la ecuación aunque la superficie no sea lisa.
    en:
      - Using μ_s (static) instead of μ_k (kinetic) once the block is already moving.
      - Ignoring that the normal force changes when the applied force has a vertical component.
      - Not including friction in the equation even when the surface is not frictionless.
