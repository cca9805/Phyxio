version: "1.0"
leaf: "centro-de-masas-en-cuerpos-extendidos"

coord:
  title:
    es: Gráfica Coord · CM en Cuerpos Extendidos
    en: Coord Graph · CM in Extended Bodies
  xAxis:
    es: posición x a lo largo del cuerpo (m)
    en: position x along the body (m)
  yAxis:
    es: densidad lineal λ(x) o masa dm
    en: linear density λ(x) or mass element dm
  xMagnitude: x
  yMagnitude: λ o dm
  relation:
    es: "El CM de un cuerpo extendido se obtiene integrando x·dm sobre todo el cuerpo: x_CM = (1/M)·∫x·dm. La distribución de masa λ(x) determina si el CM coincide con el centro geométrico."
    en: "The CM of an extended body is obtained by integrating x·dm over the entire body: x_CM = (1/M)·∫x·dm. The mass distribution λ(x) determines whether the CM coincides with the geometric centre."
  physicalReading:
    es: Si la densidad es uniforme, x_CM coincide con el centro geométrico. Si λ crece hacia un extremo, el CM se desplaza hacia ese extremo.
    en: If density is uniform, x_CM coincides with the geometric centre. If λ increases toward one end, the CM shifts toward that end.
  slopeMeaning:
    es: "La pendiente de λ(x) indica cómo varía la distribución de masa: uniforme (constante), lineal o variable."
    en: "The slope of λ(x) indicates how mass distribution varies: uniform (constant), linear, or variable."
  interceptMeaning:
    es: El valor de λ en x = 0 es la densidad en el extremo de referencia.
    en: The value of λ at x = 0 is the density at the reference end.
  curvatureMeaning:
    es: Una distribución no uniforme desplaza el CM del centro geométrico.
    en: A non-uniform distribution shifts the CM from the geometric centre.
  signMeaning:
    es: La posición del CM puede ser cualquier valor dentro del cuerpo. Si la forma es irregular, el CM puede estar fuera de la materia.
    en: The CM position can be any value within the body. For irregular shapes, the CM may lie outside the material.
  areaMeaning:
    es: Área bajo λ(x) es la masa total M del cuerpo.
    en: Area under λ(x) is the total mass M of the body.
  domainMeaning:
    es: Válido para todo el dominio del cuerpo extendido.
    en: Valid for the entire domain of the extended body.
  modelConnection:
    es: "Se interpreta bajo la definición de CM: x_CM = ∫x·dm / M."
    en: "Interpreted under the CM definition: x_CM = ∫x·dm / M."
  formulaConnection:
    es: Conecta con x_CM = (1/M)∫x·λ(x)dx para distribución lineal.
    en: Connects to x_CM = (1/M)∫x·λ(x)dx for linear distribution.
  readingFocus:
    es: leer cómo varía λ(x) para deducir si el CM está desplazado respecto al centro geométrico.
    en: read how λ(x) varies to deduce whether the CM is shifted from the geometric centre.
  agentHints:
    es:
      - Para un cuerpo uniforme, x_CM = L/2 (centro geométrico).
      - Si se quita material de un lado, el CM se desplaza hacia el lado más denso.
      - El CM de un sistema compuesto puede calcularse como la media ponderada de los CM de cada parte.
    en:
      - For a uniform body, x_CM = L/2 (geometric centre).
      - If material is removed from one side, the CM shifts toward the denser side.
      - The CM of a composite system can be computed as the mass-weighted average of the CMs of each part.
  commonMistakes:
    es:
      - Suponer que el CM siempre está en el centro geométrico independientemente de la distribución de masa.
      - Olvidar dividir por la masa total al calcular x_CM.
      - No considerar que el CM puede estar fuera del cuerpo para formas cóncavas.
    en:
      - Assuming the CM is always at the geometric centre regardless of mass distribution.
      - Forgetting to divide by total mass when computing x_CM.
      - Not considering that the CM can lie outside the body for concave shapes.

svg:
  title:
    es: Escena SVG · CM en Cuerpos Extendidos
    en: SVG Scene · CM in Extended Bodies
  sceneId: cm_extendido_scene
  sceneLabel:
    es: Cuerpo extendido con distribución de masa y punto CM
    en: Extended body with mass distribution and CM point
  objects:
    es:
      - cuerpo extendido
      - distribución de masa dm
      - punto CM
    en:
      - extended body
      - mass distribution dm
      - CM point
  mainObject:
    es: cuerpo extendido con distribución de masa no uniforme
    en: extended body with non-uniform mass distribution
  referenceFrame:
    es: sistema de referencia con origen en un extremo del cuerpo
    en: reference frame with origin at one end of the body
  geometry:
    es: La escena muestra el cuerpo extendido con gradiente de densidad (sombreado) y el punto CM marcado en su posición.
    en: The scene shows the extended body with a density gradient (shading) and the CM point marked at its position.
  interactions:
    es: La gravedad actúa sobre cada elemento de masa dm. El cuerpo se comporta dinámicamente como si toda la masa estuviera en el CM.
    en: Gravity acts on each mass element dm. The body behaves dynamically as if all its mass were concentrated at the CM.
  modelElements:
    es:
      - distribución λ(x)
      - elemento de masa dm = λ·dx
      - posición x_CM
    en:
      - distribution λ(x)
      - mass element dm = λ·dx
      - position x_CM
  visualCues:
    es:
      - El sombreado más intenso indica mayor densidad lineal.
      - El CM se desplaza hacia la zona de mayor densidad.
      - Para un cuerpo uniforme (sombreado uniforme), el CM está en el centro geométrico.
    en:
      - Darker shading indicates greater linear density.
      - The CM shifts toward the region of higher density.
      - For a uniform body (uniform shading), the CM is at the geometric centre.
  scaleMeaning:
    es: Proporcional. La intensidad del sombreado indica la densidad relativa.
    en: Proportional. Shading intensity indicates relative density.
  relation:
    es: La escena ilustra que el CM de un cuerpo extendido depende de cómo está distribuida la masa, no solo de la forma geométrica.
    en: The scene illustrates that the CM of an extended body depends on how mass is distributed, not only on the geometric shape.
  physicalReading:
    es: Identificar la zona de mayor densidad para deducir hacia dónde se desplaza el CM respecto al centro geométrico.
    en: Identify the region of highest density to deduce how the CM shifts from the geometric centre.
  modelConnection:
    es: Se interpreta bajo x_CM = ∫x·dm / M.
    en: Interpreted under x_CM = ∫x·dm / M.
  formulaConnection:
    es: Conecta con x_CM = (1/M)∫x·λ(x)dx y M = ∫λ(x)dx.
    en: Connects to x_CM = (1/M)∫x·λ(x)dx and M = ∫λ(x)dx.
  readingFocus:
    es: identificar la distribución de densidad y deducir la posición del CM.
    en: identify the density distribution and deduce the CM position.
  agentHints:
    es:
      - El cuerpo rota alrededor del CM bajo la acción de un torque externo.
      - Si el cuerpo está suspendido por el CM, queda en equilibrio en cualquier orientación.
      - Para cuerpos simétricos con densidad uniforme, el CM coincide con el centro de simetría.
    en:
      - The body rotates about the CM under an external torque.
      - If the body is suspended from the CM, it remains in equilibrium in any orientation.
      - For symmetric bodies with uniform density, the CM coincides with the centre of symmetry.
  commonMistakes:
    es:
      - Colocar el CM en el centro geométrico sin verificar la distribución de masa.
      - Olvidar que el CM puede estar fuera del cuerpo (anillo, herradura).
      - No actualizar la posición del CM al quitar o añadir masa al cuerpo.
    en:
      - Placing the CM at the geometric centre without checking the mass distribution.
      - Forgetting that the CM can lie outside the body (ring, horseshoe).
      - Not updating the CM position when mass is added to or removed from the body.
