version: "1.0"
leaf: "centro-de-masas-en-sistemas-discretos"

coord:
  title:
    es: Gráfica Coord · CM en Sistemas Discretos
    en: Coord Graph · CM in Discrete Systems
  xAxis:
    es: posición x_i de cada masa (m)
    en: position x_i of each mass (m)
  yAxis:
    es: masa m_i (kg)
    en: mass m_i (kg)
  xMagnitude: x_i
  yMagnitude: m_i
  relation:
    es: El CM de un sistema discreto es x_CM = Σ(m_i·x_i) / Σm_i. La posición del CM es la media ponderada de las posiciones por las masas.
    en: The CM of a discrete system is x_CM = Σ(m_i·x_i) / Σm_i. The CM position is the mass-weighted average of the positions.
  physicalReading:
    es: El CM está más cerca de la masa mayor. Si una masa es mucho mayor que las demás, el CM coincide casi con su posición.
    en: The CM is closer to the larger mass. If one mass is much greater than the others, the CM nearly coincides with its position.
  slopeMeaning:
    es: No aplica directamente. El CM es un punto, no una pendiente.
    en: Not directly applicable. The CM is a point, not a slope.
  interceptMeaning:
    es: No aplica. El CM depende de todas las masas y posiciones del sistema.
    en: Not applicable. The CM depends on all masses and positions of the system.
  curvatureMeaning:
    es: No aplica para sistemas discretos (suma finita de masas puntuales).
    en: Not applicable for discrete systems (finite sum of point masses).
  signMeaning:
    es: La posición del CM puede ser positiva o negativa dependiendo del origen elegido.
    en: The CM position can be positive or negative depending on the chosen origin.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para el conjunto de masas del sistema en la configuración dada.
    en: Valid for the set of system masses in the given configuration.
  modelConnection:
    es: "Se interpreta bajo la definición de CM: x_CM = Σ(m_i·x_i) / M_total."
    en: "Interpreted under the CM definition: x_CM = Σ(m_i·x_i) / M_total."
  formulaConnection:
    es: Conecta con x_CM = Σ(m_i·x_i) / Σm_i.
    en: Connects to x_CM = Σ(m_i·x_i) / Σm_i.
  readingFocus:
    es: leer las posiciones y masas de cada partícula para calcular el CM como media ponderada.
    en: read the positions and masses of each particle to compute the CM as a weighted average.
  agentHints:
    es:
      - Si el sistema tiene dos masas iguales, el CM está exactamente en el punto medio.
      - El CM se desplaza cuando se mueven las masas o cambian sus valores.
      - Para el movimiento del CM del sistema, se usa F_ext = M·a_CM.
    en:
      - If the system has two equal masses, the CM is exactly at the midpoint.
      - The CM shifts when masses move or their values change.
      - "For the motion of the system's CM, use F_ext = M·a_CM."
  commonMistakes:
    es:
      - Calcular el promedio de posiciones sin ponderar por las masas.
      - Olvidar incluir todas las masas del sistema.
      - Confundir el CM con el centroide geométrico (que no tiene en cuenta las masas).
    en:
      - Computing the average of positions without weighting by mass.
      - Forgetting to include all masses of the system.
      - Confusing the CM with the geometric centroid (which does not account for masses).

svg:
  title:
    es: Escena SVG · CM en Sistemas Discretos
    en: SVG Scene · CM in Discrete Systems
  sceneId: cm_discreto_scene
  sceneLabel:
    es: Sistema de masas puntuales con punto CM marcado
    en: System of point masses with CM point marked
  objects:
    es:
      - masas puntuales m_1, m_2, ...
      - punto CM
      - eje de referencia
    en:
      - point masses m_1, m_2, ...
      - CM point
      - reference axis
  mainObject:
    es: sistema de masas puntuales con CM
    en: system of point masses with CM
  referenceFrame:
    es: eje x con origen en un punto de referencia
    en: x-axis with origin at a reference point
  geometry:
    es: La escena muestra las masas como puntos de tamaño proporcional a su masa, distribuidas a lo largo del eje. El CM se marca como punto de equilibrio.
    en: The scene shows the masses as dots whose size is proportional to their mass, distributed along the axis. The CM is marked as the balance point.
  interactions:
    es: Las masas interactúan gravitacionalmente entre sí, pero para el CM solo importan las fuerzas externas.
    en: The masses interact gravitationally with each other, but only external forces matter for the CM motion.
  modelElements:
    es:
      - masas m_i en posiciones x_i
      - punto CM = Σ(m_i·x_i)/M
    en:
      - masses m_i at positions x_i
      - CM point = Σ(m_i·x_i)/M
  visualCues:
    es:
      - El tamaño de cada masa puntual es proporcional a m_i.
      - "El CM se marca con un símbolo especial: es el punto de \"equilibrio\" del sistema."
      - Si se aplica una fuerza en el CM, el sistema traslada sin rotar.
    en:
      - The size of each point mass dot is proportional to m_i.
      - "The CM is marked with a special symbol: it is the system's \"balance\" point."
      - If a force is applied at the CM, the system translates without rotating.
  scaleMeaning:
    es: El tamaño de los círculos es proporcional a las masas.
    en: Circle sizes are proportional to the masses.
  relation:
    es: La escena ilustra cómo el CM es la media ponderada por las masas de las posiciones de todas las partículas del sistema.
    en: The scene illustrates how the CM is the mass-weighted average of the positions of all particles in the system.
  physicalReading:
    es: Identificar dónde están las masas mayores para deducir hacia dónde se desplaza el CM.
    en: Identify where the larger masses are to deduce in which direction the CM shifts.
  modelConnection:
    es: Se interpreta bajo x_CM = Σ(m_i·x_i) / M.
    en: Interpreted under x_CM = Σ(m_i·x_i) / M.
  formulaConnection:
    es: Conecta con x_CM = Σ(m_i·x_i) / Σm_i y v_CM = Σ(m_i·v_i) / M.
    en: Connects to x_CM = Σ(m_i·x_i) / Σm_i and v_CM = Σ(m_i·v_i) / M.
  readingFocus:
    es: identificar las masas y sus posiciones para calcular el CM como media ponderada.
    en: identify the masses and their positions to compute the CM as a weighted average.
  agentHints:
    es:
      - El CM puede estar fuera de cualquier masa del sistema.
      - En ausencia de fuerzas externas, el CM se mueve a velocidad constante (primera ley aplicada al sistema).
      - En una colisión, el CM del sistema no cambia su velocidad si no hay fuerzas externas.
    en:
      - "The CM can lie outside any of the system's masses."
      - In the absence of external forces, the CM moves at constant velocity (first law applied to the system).
      - "In a collision, the system's CM does not change its velocity if there are no external forces."
  commonMistakes:
    es:
      - Calcular el punto medio geométrico en lugar del CM ponderado por masas.
      - No actualizar el CM si una de las masas cambia de posición.
      - Confundir la velocidad del CM con la velocidad de alguna de las masas individuales.
    en:
      - Computing the geometric midpoint instead of the mass-weighted CM.
      - Not updating the CM when one of the masses changes position.
      - Confusing the CM velocity with the velocity of any individual mass.
