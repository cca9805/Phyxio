version: "1.0"
leaf: "definicion-centro-de-masas"

coord:
  title:
    es: Gráfica Coord · Definición de Centro de Masas
    en: Coord Graph · Definition of Centre of Mass
  xAxis:
    es: posición x_i de cada masa (m)
    en: position x_i of each mass (m)
  yAxis:
    es: masa m_i (kg)
    en: mass m_i (kg)
  xMagnitude: x_i
  yMagnitude: m_i
  relation:
    es: "El CM es el punto de aplicación de la fuerza resultante equivalente al sistema: x_CM = Σ(m_i·x_i) / M. Es el punto de equilibrio del sistema bajo la gravedad."
    en: "The CM is the point of application of the equivalent resultant force on the system: x_CM = Σ(m_i·x_i) / M. It is the system's balance point under gravity."
  physicalReading:
    es: El CM se desplaza hacia las masas más grandes. Para masas iguales, coincide con el punto medio.
    en: The CM shifts toward the larger masses. For equal masses, it coincides with the midpoint.
  slopeMeaning:
    es: No aplica directamente; el CM es un punto de equilibrio ponderado.
    en: Not directly applicable; the CM is a weighted balance point.
  interceptMeaning:
    es: El CM para posiciones x_i = 0 es x_CM = 0 (todas las masas en el origen).
    en: For positions x_i = 0, x_CM = 0 (all masses at the origin).
  curvatureMeaning:
    es: "La relación es lineal para sistemas de dos masas: x_CM crece linealmente con la posición de la masa mayor."
    en: "The relationship is linear for two-mass systems: x_CM grows linearly with the position of the larger mass."
  signMeaning:
    es: El CM tiene la misma unidad que las posiciones y puede ser positivo o negativo.
    en: The CM has the same units as positions and can be positive or negative.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para cualquier distribución de masas.
    en: Valid for any mass distribution.
  modelConnection:
    es: "Se interpreta bajo la definición de CM: punto tal que F_ext = M·a_CM."
    en: "Interpreted under the CM definition: the point such that F_ext = M·a_CM."
  formulaConnection:
    es: Conecta con x_CM = Σ(m_i·x_i) / Σm_i.
    en: Connects to x_CM = Σ(m_i·x_i) / Σm_i.
  readingFocus:
    es: calcular x_CM como media ponderada de posiciones por masas y verificar que está entre las masas extremas del sistema.
    en: compute x_CM as the mass-weighted average of positions and verify that it lies between the extreme masses of the system.
  agentHints:
    es:
      - El CM siempre está dentro del triángulo formado por las masas para sistemas planos.
      - En un sistema aislado, el CM se mueve a velocidad constante (conservación del momento lineal).
      - El CM es único para cada sistema y no depende del sistema de referencia elegido (solo su valor numérico cambia).
    en:
      - The CM always lies within the triangle formed by the masses for planar systems.
      - In an isolated system, the CM moves at constant velocity (conservation of linear momentum).
      - The CM is unique for each system and does not depend on the chosen reference frame (only its numerical value changes).
  commonMistakes:
    es:
      - Calcular el promedio de posiciones sin ponderar por las masas.
      - Confundir el CM con el centro geométrico.
      - Olvidar que el CM puede estar fuera del cuerpo en sistemas cóncavos o de forma irregular.
    en:
      - Computing the average of positions without weighting by mass.
      - Confusing the CM with the geometric centre.
      - Forgetting that the CM can lie outside the body for concave or irregular systems.

svg:
  title:
    es: Escena SVG · Definición de Centro de Masas
    en: SVG Scene · Definition of Centre of Mass
  sceneId: cm_definicion_scene
  sceneLabel:
    es: Sistema de masas con punto CM marcado y vectores de posición
    en: Mass system with CM point marked and position vectors
  objects:
    es:
      - masas m_1, m_2, ...
      - vectores r_i desde el origen
      - punto CM con vector r_CM
    en:
      - masses m_1, m_2, ...
      - position vectors r_i from the origin
      - CM point with vector r_CM
  mainObject:
    es: sistema de masas con definición vectorial del CM
    en: mass system with vectorial definition of the CM
  referenceFrame:
    es: sistema de referencia con origen O arbitrario
    en: reference frame with arbitrary origin O
  geometry:
    es: La escena muestra las masas con sus vectores de posición desde O y el punto CM con su vector r_CM = Σ(m_i·r_i)/M.
    en: The scene shows the masses with their position vectors from O and the CM point with its vector r_CM = Σ(m_i·r_i)/M.
  interactions:
    es: El CM es el punto desde el cual el momento dipolar de masa del sistema es nulo.
    en: The CM is the point from which the mass dipole moment of the system is zero.
  modelElements:
    es:
      - vectores r_i
      - masas m_i (proporcionales al tamaño del círculo)
      - r_CM = Σ(m_i·r_i)/M
    en:
      - position vectors r_i
      - masses m_i (proportional to circle size)
      - r_CM = Σ(m_i·r_i)/M
  visualCues:
    es:
      - El punto CM está más cerca de las masas mayores.
      - Si se suspende el cuerpo por el CM, queda en equilibrio horizontal.
      - El vector r_CM apunta hacia la masa mayor del sistema.
    en:
      - The CM point is closer to the larger masses.
      - If the body is suspended from the CM, it remains in horizontal equilibrium.
      - The vector r_CM points toward the largest mass in the system.
  scaleMeaning:
    es: El tamaño de los círculos es proporcional a las masas.
    en: Circle sizes are proportional to the masses.
  relation:
    es: La escena ilustra la definición vectorial del CM como media ponderada de los vectores de posición por las masas.
    en: The scene illustrates the vectorial definition of the CM as the mass-weighted average of the position vectors.
  physicalReading:
    es: Identificar las masas mayores para deducir hacia dónde apunta r_CM.
    en: Identify the larger masses to deduce the direction of r_CM.
  modelConnection:
    es: Se interpreta bajo r_CM = Σ(m_i·r_i) / M.
    en: Interpreted under r_CM = Σ(m_i·r_i) / M.
  formulaConnection:
    es: Conecta con r_CM = Σ(m_i·r_i) / Σm_i y F_ext = M·a_CM.
    en: Connects to r_CM = Σ(m_i·r_i) / Σm_i and F_ext = M·a_CM.
  readingFocus:
    es: localizar el punto CM en la escena e identificar que está entre las masas, más cerca de las mayores.
    en: locate the CM point in the scene and identify that it lies between the masses, closer to the larger ones.
  agentHints:
    es:
      - El CM no depende del origen de coordenadas elegido (su posición relativa a las masas es invariante).
      - Para un sistema aislado, v_CM es constante (conservación del momento lineal del sistema).
      - El CM es el punto de apoyo que equilibra el sistema bajo la gravedad.
    en:
      - The CM does not depend on the chosen coordinate origin (its relative position to the masses is invariant).
      - For an isolated system, v_CM is constant (conservation of linear momentum).
      - The CM is the support point that balances the system under gravity.
  commonMistakes:
    es:
      - Marcar el CM en el punto medio geométrico sin ponderar por las masas.
      - Confundir r_CM con la posición del CM respecto a una de las masas.
      - Olvidar que el CM puede estar fuera del cuerpo en configuraciones especiales.
    en:
      - Marking the CM at the geometric midpoint without weighting by mass.
      - Confusing r_CM with the CM position relative to one of the masses.
      - Forgetting that the CM can lie outside the body in special configurations.
