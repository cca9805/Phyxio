version: "1.0"
leaf: "condicion-sumatoria-momentos"

coord:
  title:
    es: Gráfica Coord · Condición Στ = 0
    en: Coord Graph · Condition Στ = 0
  xAxis:
    es: brazo de palanca d_i (m)
    en: moment arm d_i (m)
  yAxis:
    es: torque τ_i = F_i·d_i (N·m)
    en: torque τ_i = F_i·d_i (N·m)
  xMagnitude: d_i
  yMagnitude: τ_i
  relation:
    es: "Para equilibrio estático rotacional, la suma de todos los torques respecto a cualquier eje es cero: Στ = 0. Los torques horarios se cancelan con los antihorarios."
    en: "For rotational static equilibrium, the sum of all torques about any axis is zero: Στ = 0. Clockwise torques cancel counter-clockwise ones."
  physicalReading:
    es: "La suma algebraica de torques es cero: el cuerpo no acelera angularmente. Los torques con brazo mayor pesan más aunque la fuerza sea menor."
    en: "The algebraic sum of torques is zero: the body has no angular acceleration. Torques with a larger arm have greater effect even if the force is smaller."
  slopeMeaning:
    es: "La pendiente de τ vs d es la fuerza F: mayor fuerza implica mayor torque para el mismo brazo."
    en: "The slope of τ vs d is the force F: a larger force implies greater torque for the same arm."
  interceptMeaning:
    es: Si d = 0 (fuerza aplicada en el eje de giro), el torque es cero independientemente de la fuerza.
    en: If d = 0 (force applied at the pivot), the torque is zero regardless of the force.
  curvatureMeaning:
    es: La relación τ = F·d es lineal para fuerza perpendicular constante.
    en: The relationship τ = F·d is linear for a constant perpendicular force.
  signMeaning:
    es: Torque antihorario positivo; torque horario negativo (convenio estándar).
    en: Counter-clockwise torque positive; clockwise torque negative (standard convention).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para cuerpos rígidos en equilibrio rotacional alrededor del eje elegido.
    en: Valid for rigid bodies in rotational equilibrium about the chosen axis.
  modelConnection:
    es: "Se interpreta bajo la segunda condición de equilibrio: Στ = 0 respecto a cualquier punto."
    en: "Interpreted under the second equilibrium condition: Στ = 0 about any point."
  formulaConnection:
    es: Conecta con τ_i = F_i·d_i·senθ_i y Στ = 0.
    en: Connects to τ_i = F_i·d_i·sinθ_i and Στ = 0.
  readingFocus:
    es: calcular los torques de cada fuerza respecto al eje elegido, asignar signos y verificar que la suma es cero.
    en: compute the torques of each force about the chosen axis, assign signs, and verify that the sum is zero.
  agentHints:
    es:
      - Elegir el punto de torques en un punto de aplicación de fuerza desconocida elimina esa incógnita de la ecuación.
      - El brazo de palanca es la distancia perpendicular del eje a la línea de acción de la fuerza.
      - La condición Στ = 0 debe cumplirse respecto a CUALQUIER punto, no solo al CM.
    en:
      - Choosing the pivot at a point where an unknown force acts eliminates that unknown from the torque equation.
      - The moment arm is the perpendicular distance from the axis to the line of action of the force.
      - The condition Στ = 0 must hold about ANY point, not only the CM.
  commonMistakes:
    es:
      - Calcular el torque con la distancia al punto de aplicación en lugar del brazo perpendicular.
      - Olvidar que el brazo de palanca es la distancia perpendicular, no la distancia directa.
      - Calcular Στ solo respecto a un punto y concluir que está en equilibrio sin verificar ΣF = 0.
    en:
      - Computing the torque with the distance to the point of application instead of the perpendicular arm.
      - Forgetting that the moment arm is the perpendicular distance, not the direct distance.
      - Computing Στ about only one point and concluding equilibrium without verifying ΣF = 0.
