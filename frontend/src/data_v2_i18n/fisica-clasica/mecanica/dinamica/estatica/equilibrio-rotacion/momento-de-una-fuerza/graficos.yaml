version: "1.0"
leaf: "momento-de-una-fuerza"

coord:
  title:
    es: Gráfica Coord · Momento de una Fuerza
    en: Coord Graph · Moment of a Force
  xAxis:
    es: ángulo θ entre la fuerza y el vector posición (grados)
    en: angle θ between the force and the position vector (degrees)
  yAxis:
    es: torque τ = F·r·senθ (N·m)
    en: torque τ = F·r·sinθ (N·m)
  xMagnitude: θ
  yMagnitude: τ
  relation:
    es: "El torque varía sinusoidalmente con el ángulo: τ = F·r·senθ. El máximo se alcanza a θ = 90° (fuerza perpendicular al brazo) y es cero cuando θ = 0° o 180°."
    en: "Torque varies sinusoidally with angle: τ = F·r·sinθ. The maximum occurs at θ = 90° (force perpendicular to the arm) and is zero at θ = 0° or 180°."
  physicalReading:
    es: "A θ = 90°, toda la fuerza contribuye al giro: τ_max = F·r. A θ = 0° o 180°, la fuerza está alineada con el brazo y no produce giro."
    en: "At θ = 90°, all of the force contributes to rotation: τ_max = F·r. At θ = 0° or 180°, the force is aligned with the arm and produces no rotation."
  slopeMeaning:
    es: "La pendiente de τ vs θ es F·r·cosθ: máxima tasa de cambio a θ = 0°."
    en: "The slope of τ vs θ is F·r·cosθ: maximum rate of change at θ = 0°."
  interceptMeaning:
    es: "En θ = 0°, τ = 0: la fuerza paralela al brazo no produce torque."
    en: "At θ = 0°, τ = 0: a force parallel to the arm produces no torque."
  curvatureMeaning:
    es: La curva es sinusoidal con máximo en 90° y cero en 0° y 180°.
    en: The curve is sinusoidal with a maximum at 90° and zero at 0° and 180°.
  signMeaning:
    es: Torque positivo (antihorario) para 0° < θ < 180°. Negativo (horario) para 180° < θ < 360°.
    en: Positive torque (counter-clockwise) for 0° < θ < 180°. Negative (clockwise) for 180° < θ < 360°.
  areaMeaning:
    es: Sin interpretación directa en este contexto.
    en: No direct interpretation in this context.
  domainMeaning:
    es: Válido para 0° ≤ θ ≤ 360° con r y F constantes.
    en: Valid for 0° ≤ θ ≤ 360° with constant r and F.
  modelConnection:
    es: "Se interpreta bajo la definición de torque como producto vectorial: τ = r × F."
    en: "Interpreted under the torque definition as a cross product: τ = r × F."
  formulaConnection:
    es: Conecta con τ = r·F·senθ = F·d (donde d = r·senθ es el brazo de palanca).
    en: Connects to τ = r·F·sinθ = F·d (where d = r·sinθ is the moment arm).
  readingFocus:
    es: "leer el ángulo de aplicación para determinar la eficiencia del torque: máxima a 90°, nula a 0° y 180°."
    en: "read the application angle to determine torque efficiency: maximum at 90°, zero at 0° and 180°."
  agentHints:
    es:
      - Para maximizar el torque con la misma fuerza, aplicarla perpendicularmente al brazo (θ = 90°).
      - El brazo de palanca d = r·senθ es siempre menor o igual que r.
      - El sentido del torque (horario/antihorario) depende del sentido de la fuerza y la dirección del brazo.
    en:
      - To maximise torque with the same force, apply it perpendicularly to the arm (θ = 90°).
      - The moment arm d = r·sinθ is always less than or equal to r.
      - The sense of the torque (clockwise/counter-clockwise) depends on the direction of the force and the arm.
  commonMistakes:
    es:
      - Usar la distancia directa al eje en lugar del brazo perpendicular.
      - Olvidar que una fuerza que pasa por el eje de giro tiene torque cero.
      - Confundir el signo del torque al cambiar el sentido de la fuerza.
    en:
      - Using the direct distance to the axis instead of the perpendicular arm.
      - Forgetting that a force passing through the rotation axis has zero torque.
      - Confusing the sign of the torque when reversing the direction of the force.
