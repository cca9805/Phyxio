version: "1.0"
leaf: "condicion-sumatoria-fuerzas"

coord:
  title:
    es: Gráfica Coord · Condición ΣF = 0
    en: Coord Graph · Condition ΣF = 0
  xAxis:
    es: fuerza individual F_i (N)
    en: individual force F_i (N)
  yAxis:
    es: componente en x o en y de cada fuerza (N)
    en: x or y component of each force (N)
  xMagnitude: F_i
  yMagnitude: F_x o F_y
  relation:
    es: "Para equilibrio estático traslacional, la suma de todas las fuerzas en cada dirección debe ser cero: ΣF_x = 0 y ΣF_y = 0. La gráfica muestra cómo las componentes se cancelan."
    en: "For translational static equilibrium, the sum of all forces in each direction must be zero: ΣF_x = 0 and ΣF_y = 0. The graph shows how the components cancel."
  physicalReading:
    es: La suma algebraica de componentes en cada eje es cero. Las fuerzas en sentido positivo deben igualar las fuerzas en sentido negativo.
    en: The algebraic sum of components on each axis is zero. Forces in the positive direction must equal those in the negative direction.
  slopeMeaning:
    es: "No aplica directamente: es una condición de suma, no una relación funcional."
    en: "Not directly applicable: this is a summation condition, not a functional relationship."
  interceptMeaning:
    es: La intersección de las barras en la gráfica de componentes indica el equilibrio (suma = 0).
    en: The intersection of bars in the component graph indicates equilibrium (sum = 0).
  curvatureMeaning:
    es: No aplica para sumas de fuerzas.
    en: Not applicable for force sums.
  signMeaning:
    es: Fuerzas positivas en el sentido del eje positivo; negativas en el sentido contrario.
    en: Forces positive in the direction of the positive axis; negative in the opposite direction.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para cuerpos rídos en equilibrio estático o dinámico con a = 0.
    en: Valid for rigid bodies in static or dynamic equilibrium with a = 0.
  modelConnection:
    es: "Se interpreta bajo la primera condición de equilibrio: ΣF = 0."
    en: "Interpreted under the first equilibrium condition: ΣF = 0."
  formulaConnection:
    es: Conecta con ΣF_x = 0 y ΣF_y = 0 para equilibrio traslacional.
    en: Connects to ΣF_x = 0 and ΣF_y = 0 for translational equilibrium.
  readingFocus:
    es: proyectar todas las fuerzas sobre x e y, sumar algebraicamente y verificar que la suma es cero en cada eje.
    en: project all forces onto x and y, sum algebraically, and verify that the sum is zero on each axis.
  agentHints:
    es:
      - "La condición ΣF = 0 es necesaria para equilibrio traslacional pero no suficiente: también se necesita Στ = 0."
      - En equilibrio, la fuerza resultante es cero pero las fuerzas individuales pueden ser muy grandes.
      - Para un sistema en equilibrio con tres fuerzas, forman un triángulo cerrado de fuerzas.
    en:
      - "The condition ΣF = 0 is necessary but not sufficient for translational equilibrium: Στ = 0 is also required."
      - In equilibrium, the resultant force is zero but individual forces can be very large.
      - For a system in equilibrium with three forces, they form a closed force triangle.
  commonMistakes:
    es:
      - Aplicar solo la condición de fuerzas sin verificar la condición de momentos.
      - Olvidar proyectar todas las fuerzas sobre ambos ejes.
      - Confundir la condición de equilibrio (ΣF = 0) con la ausencia de fuerzas.
    en:
      - Applying only the force condition without verifying the moment condition.
      - Forgetting to project all forces onto both axes.
      - Confusing the equilibrium condition (ΣF = 0) with the absence of forces.

dcl:
  title:
    es: DCL · Condición ΣF = 0
    en: FBD · Condition ΣF = 0
  forces:
    es:
      - "F_1, F_2, ..., F_n: fuerzas que deben cancelarse vectorialmente"
    en:
      - "F_1, F_2, ..., F_n: forces that must cancel vectorially"
  object:
    es: cuerpo rígido en equilibrio estático traslacional
    en: rigid body in translational static equilibrium
  freeBodyCondition:
    es: El DCL muestra todas las fuerzas cuya suma vectorial es cero.
    en: The FBD shows all forces whose vector sum is zero.
  equilibriumCondition:
    es: "ΣF_x = 0 y ΣF_y = 0: condición necesaria para equilibrio traslacional."
    en: "ΣF_x = 0 and ΣF_y = 0: necessary condition for translational equilibrium."
  netForce:
    es: "La fuerza resultante es cero: el cuerpo no acelera traslacionalmente."
    en: "The resultant force is zero: the body does not accelerate translationally."
  accelerationDirection:
    es: No hay aceleración traslacional. El cuerpo está en reposo o en MRU.
    en: No translational acceleration. The body is at rest or in uniform motion.
  referenceFrameChoice:
    es: Elegir los ejes alineados con la mayoría de las fuerzas para simplificar la proyección.
    en: Choose axes aligned with the majority of forces to simplify projection.
  forceTypes:
    es:
      - Peso W
      - Normal N
      - Tensión T
      - Rozamiento f
      - Otras fuerzas externas
    en:
      - Weight W
      - Normal N
      - Tension T
      - Friction f
      - Other external forces
  signConvention:
    es: Positivo en la dirección del eje. Negativo en sentido contrario.
    en: Positive in the axis direction. Negative in the opposite direction.
  commonMistakes:
    es:
      - No proyectar correctamente las fuerzas inclinadas sobre los ejes.
      - Confundir la condición ΣF = 0 con la ausencia de fuerzas.
      - Olvidar alguna fuerza del DCL al hacer la suma.
    en:
      - Not correctly projecting inclined forces onto the axes.
      - Confusing the condition ΣF = 0 with the absence of forces.
      - Forgetting a force from the FBD when summing.
  agentHints:
    es:
      - Proyectar primero sobre el eje con menos fuerzas incógnitas.
      - En equilibrio, las fuerzas se cancelan por pares pero no necesariamente de dos en dos.
      - Verificar que se tienen suficientes ecuaciones para las incógnitas del problema.
    en:
      - Project first onto the axis with fewer unknown forces.
      - In equilibrium, forces cancel but not necessarily in pairs of two.
      - Verify that there are enough equations for the unknowns of the problem.
  relation:
    es: El DCL para ΣF = 0 muestra todas las fuerzas que se cancelan vectorialmente para que el cuerpo esté en equilibrio traslacional.
    en: The FBD for ΣF = 0 shows all forces that cancel vectorially so that the body is in translational equilibrium.
  readingFocus:
    es: proyectar todas las fuerzas sobre x e y y verificar que la suma algebraica en cada eje es cero.
    en: project all forces onto x and y and verify that the algebraic sum on each axis is zero.
