version: "1.0"
leaf: "ejemplos-de-equilibrio"

dcl:
  title:
    es: DCL · Ejemplos de Equilibrio
    en: FBD · Equilibrium Examples
  forces:
    es:
      - W (peso)
      - N (normal o reacción del soporte)
      - T (tensión de cables)
      - R (reacción en apoyos)
    en:
      - W (weight)
      - N (normal or support reaction)
      - T (cable tension)
      - R (reaction at supports)
  object:
    es: cuerpo rígido en equilibrio estático (ΣF = 0 y Στ = 0)
    en: rigid body in static equilibrium (ΣF = 0 and Στ = 0)
  freeBodyCondition:
    es: El DCL muestra todas las fuerzas y sus puntos de aplicación para aplicar las dos condiciones de equilibrio.
    en: The FBD shows all forces and their points of application to apply both equilibrium conditions.
  equilibriumCondition:
    es: ΣF_x = 0, ΣF_y = 0 y Στ = 0 respecto a cualquier punto.
    en: ΣF_x = 0, ΣF_y = 0, and Στ = 0 about any point.
  netForce:
    es: "La fuerza resultante es cero: no hay aceleración traslacional."
    en: "The resultant force is zero: there is no translational acceleration."
  accelerationDirection:
    es: No hay aceleración traslacional ni angular.
    en: No translational or angular acceleration.
  referenceFrameChoice:
    es: Elegir el punto de torques en uno donde actúe una fuerza desconocida para eliminarla de la ecuación de momentos.
    en: Choose the torque pivot where an unknown force acts to eliminate it from the moment equation.
  forceTypes:
    es:
      - W = m·g (peso, aplicado en el CM)
      - N (normal, perpendicular a la superficie)
      - T (tensión, a lo largo del cable)
      - R (reacción en articulaciones)
    en:
      - W = m·g (weight, applied at the CM)
      - N (normal, perpendicular to the surface)
      - T (tension, along the cable)
      - R (reaction at joints)
  signConvention:
    es: Torques antihorarios positivos; horarios negativos.
    en: Counter-clockwise torques positive; clockwise negative.
  commonMistakes:
    es:
      - Aplicar solo ΣF = 0 sin verificar Στ = 0 (necesario para equilibrio completo).
      - No identificar correctamente el punto de aplicación del peso (siempre el CM).
      - Calcular el brazo de palanca como distancia directa al punto y no como distancia perpendicular.
    en:
      - Applying only ΣF = 0 without verifying Στ = 0 (required for complete equilibrium).
      - Not correctly identifying the point of application of weight (always the CM).
      - Computing the moment arm as the direct distance to the point instead of the perpendicular distance.
  agentHints:
    es:
      - "Los ejemplos típicos incluyen: barra apoyada, cuerpo sobre soporte inclinado, cuerpo colgado de cables."
      - Elegir el punto de torques donde actúa la fuerza incógnita elimina esa incógnita de Στ = 0.
      - Para equilibrio estático, el sistema tiene tantas ecuaciones (ΣF_x = 0, ΣF_y = 0, Στ = 0) como incógnitas máximo.
    en:
      - "Typical examples include: supported beam, body on inclined support, body suspended by cables."
      - Choosing the torque pivot where the unknown force acts eliminates that unknown from Στ = 0.
      - For static equilibrium, the system provides at most three equations (ΣF_x = 0, ΣF_y = 0, Στ = 0) for three unknowns.
  relation:
    es: El DCL de equilibrio muestra todas las fuerzas con sus puntos de aplicación, necesarios para aplicar tanto ΣF = 0 como Στ = 0.
    en: The equilibrium FBD shows all forces with their points of application, required to apply both ΣF = 0 and Στ = 0.
  readingFocus:
    es: identificar todas las fuerzas, sus puntos de aplicación y calcular torques respecto al punto elegido para verificar el equilibrio.
    en: identify all forces, their points of application, and compute torques about the chosen pivot to verify equilibrium.

svg:
  title:
    es: Escena SVG · Ejemplos de Equilibrio
    en: SVG Scene · Equilibrium Examples
  sceneId: equilibrio_scene
  sceneLabel:
    es: Cuerpo rígido en equilibrio estático con fuerzas y torques
    en: Rigid body in static equilibrium with forces and torques
  objects:
    es:
      - cuerpo rígido
      - fuerzas externas
      - puntos de apoyo
      - cables o soportes
    en:
      - rigid body
      - external forces
      - support points
      - cables or supports
  mainObject:
    es: cuerpo rígido en equilibrio estático
    en: rigid body in static equilibrium
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory
  geometry:
    es: La escena muestra el cuerpo con todas las fuerzas y sus puntos de aplicación. Los puntos de apoyo, el CM y las reacciones están claramente indicados.
    en: The scene shows the body with all forces and their points of application. Support points, the CM, and reactions are clearly indicated.
  interactions:
    es: El peso actúa en el CM; las reacciones actúan en los puntos de apoyo; las tensiones en los puntos de anclaje de los cables.
    en: Weight acts at the CM; reactions act at support points; tensions act at cable anchor points.
  modelElements:
    es:
      - W en el CM
      - N en los apoyos
      - T en los cables
      - brazos de palanca de cada fuerza
    en:
      - W at the CM
      - N at supports
      - T at cables
      - moment arms of each force
  visualCues:
    es:
      - El peso siempre apunta verticalmente hacia abajo desde el CM.
      - Los cables solo pueden traccionar, no empujar.
      - Los brazos de palanca son las distancias perpendiculares al punto de torques.
    en:
      - Weight always points vertically downward from the CM.
      - Cables can only pull, not push.
      - Moment arms are the perpendicular distances from the torque pivot.
  scaleMeaning:
    es: Las flechas son proporcionales a las magnitudes de las fuerzas.
    en: Arrows are proportional to the magnitudes of the forces.
  relation:
    es: La escena ilustra un ejemplo concreto de equilibrio estático con todas las fuerzas que cumplen ΣF = 0 y Στ = 0.
    en: The scene illustrates a concrete static equilibrium example with all forces satisfying ΣF = 0 and Στ = 0.
  physicalReading:
    es: Identificar fuerzas, puntos de aplicación y brazos de palanca para plantear las ecuaciones de equilibrio.
    en: Identify forces, points of application, and moment arms to set up the equilibrium equations.
  modelConnection:
    es: "Se interpreta bajo las condiciones de equilibrio: ΣF = 0 y Στ = 0."
    en: "Interpreted under the equilibrium conditions: ΣF = 0 and Στ = 0."
  formulaConnection:
    es: Conecta con ΣF_x = 0, ΣF_y = 0 y Στ = 0 respecto al punto elegido.
    en: Connects to ΣF_x = 0, ΣF_y = 0, and Στ = 0 about the chosen pivot.
  readingFocus:
    es: identificar el tipo de ejemplo, las fuerzas que actúan y elegir el punto de torques más conveniente.
    en: identify the example type, the acting forces, and choose the most convenient torque pivot.
  agentHints:
    es:
      - "Para la barra apoyada en dos soportes: elegir torques en un soporte elimina su reacción desconocida."
      - "Para el cuerpo colgado de cables: las tensiones forman el vector resultante opuesto al peso."
      - El equilibrio estático requiere verificar AMBAS condiciones (ΣF = 0 y Στ = 0).
    en:
      - "For a beam on two supports: choosing the pivot at one support eliminates its unknown reaction."
      - "For a body suspended by cables: the tensions form the resultant vector opposite to the weight."
      - Static equilibrium requires verifying BOTH conditions (ΣF = 0 and Στ = 0).
  commonMistakes:
    es:
      - Verificar solo ΣF = 0 sin comprobar Στ = 0.
      - No identificar el CM como punto de aplicación del peso.
      - Confundir el brazo de palanca con la distancia directa al punto de apoyo.
    en:
      - Verifying only ΣF = 0 without checking Στ = 0.
      - Not identifying the CM as the point of application of weight.
      - Confusing the moment arm with the direct distance to the support point.
