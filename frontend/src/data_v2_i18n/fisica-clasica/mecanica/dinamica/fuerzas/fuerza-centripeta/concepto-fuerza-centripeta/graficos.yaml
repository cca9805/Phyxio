version: "1.0"
leaf: "concepto-fuerza-centripeta"

coord:
  title:
    es: Gráfica Coord · Fuerza Centrípeta
    en: Coord Graph · Centripetal Force
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza centrípeta F_c (N)
    en: centripetal force F_c (N)
  xMagnitude: v
  yMagnitude: F_c
  relation:
    es: "F_c = mv²/r: la fuerza centrípeta crece cuadráticamente con la velocidad para radio y masa fijos. Siempre apunta hacia el centro de la trayectoria circular."
    en: "F_c = mv²/r: centripetal force grows quadratically with speed for fixed radius and mass. It always points toward the centre of the circular trajectory."
  physicalReading:
    es: Al duplicar la velocidad, la fuerza centrípeta se cuadruplica (para r y m fijos). Al duplicar el radio para la misma velocidad, F_c se reduce a la mitad.
    en: Doubling speed quadruples the centripetal force (for fixed r and m). Doubling the radius at the same speed halves F_c.
  slopeMeaning:
    es: La pendiente de F_c vs v² es m/r. Permite determinar m/r experimentalmente midiendo F_c a distintas v.
    en: The slope of F_c vs v² is m/r. Allows determining m/r experimentally by measuring F_c at different v.
  interceptMeaning:
    es: "F_c = 0 cuando v = 0: sin movimiento circular no hay fuerza centrípeta requerida."
    en: "F_c = 0 at v = 0: without circular motion no centripetal force is required."
  curvatureMeaning:
    es: La curva F_c vs v es una parábola (cóncava hacia arriba). F_c vs v² es una recta.
    en: The F_c vs v curve is a parabola (concave upward). F_c vs v² is a straight line.
  signMeaning:
    es: "F_c es siempre positiva (hacia el centro). No existe 'fuerza centrífuga' real en el marco inercial."
    en: "F_c is always positive (toward the centre). There is no real 'centrifugal force' in the inertial frame."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para movimiento circular uniforme. Para movimiento circular no uniforme, hay componente tangencial adicional.
    en: Valid for uniform circular motion. For non-uniform circular motion there is an additional tangential component.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton en dirección radial: ΣF_r = m·a_c = mv²/r."
    en: "Interpreted under Newton's second law in the radial direction: ΣF_r = m·a_c = mv²/r."
  formulaConnection:
    es: Conecta con F_c = mv²/r = mω²r y a_c = v²/r = ω²r.
    en: Connects to F_c = mv²/r = mω²r and a_c = v²/r = ω²r.
  readingFocus:
    es: "leer la dependencia cuadrática con v y el efecto inverso del radio: v_max = √(F_c·r/m) para la curva."
    en: "read the quadratic dependence on v and the inverse effect of radius: v_max = √(F_c·r/m) for the curve."
  agentHints:
    es:
      - "La fuerza centrípeta no es un tipo de fuerza: es la resultante de fuerzas reales (tensión, normal, etc.) en dirección radial."
      - "En el marco inercial solo existe F_c (hacia el centro). La 'fuerza centrífuga' aparece solo en marcos no inerciales."
      - "Para MCU: F_c = mv²/r. Para MCNU hay que añadir la componente tangencial F_t = m·a_t."
    en:
      - "Centripetal force is not a type of force: it is the resultant of real forces (tension, normal, etc.) in the radial direction."
      - "In the inertial frame only F_c exists (toward the centre). 'Centrifugal force' appears only in non-inertial frames."
      - "For UCM: F_c = mv²/r. For non-UCM the tangential component F_t = m·a_t must be added."
  commonMistakes:
    es:
      - Tratar la fuerza centrípeta como una fuerza independiente en el DCL.
      - Confundir fuerza centrípeta (real, hacia el centro) con fuerza centrífuga (ficticia, hacia fuera).
      - "Olvidar que F_c es provista por fuerzas reales: la tensión del hilo, la normal de la curva, etc."
    en:
      - Treating centripetal force as an independent force in the FBD.
      - Confusing centripetal force (real, toward centre) with centrifugal force (fictitious, outward).
      - "Forgetting that F_c is provided by real forces: string tension, curve normal force, etc."

dcl:
  title:
    es: DCL · Fuerza Centrípeta
    en: FBD · Centripetal Force
  xAxis:
    es: eje radial (hacia el centro)
    en: radial axis (toward the centre)
  yAxis:
    es: eje tangencial (dirección del movimiento)
    en: tangential axis (direction of motion)
  forces:
    es:
      - "F_c (fuerza real que provee la aceleración centrípeta: tensión T, normal N o su componente radial)"
      - W = m·g (peso, si aplica verticalmente)
      - N (normal, si aplica)
    en:
      - "F_c (real force providing centripetal acceleration: tension T, normal N, or their radial component)"
      - W = m·g (weight, if vertically relevant)
      - N (normal, if applicable)
  object:
    es: objeto en movimiento circular (péndulo, satélite, coche en curva, objeto en loop)
    en: object in circular motion (pendulum, satellite, car on curve, object in loop)
  freeBodyCondition:
    es: El DCL muestra todas las fuerzas reales. La componente radial neta ΣF_r provee la aceleración centrípeta.
    en: The FBD shows all real forces. The net radial component ΣF_r provides the centripetal acceleration.
  equilibriumCondition:
    es: "En MCU: ΣF_r = mv²/r (no hay equilibrio radial real; el objeto acelera hacia el centro continuamente)."
    en: "In UCM: ΣF_r = mv²/r (no real radial equilibrium; the object continually accelerates toward the centre)."
  netForce:
    es: ΣF_r = mv²/r hacia el centro. ΣF_t = 0 para MCU; ΣF_t = m·a_t para MCNU.
    en: ΣF_r = mv²/r toward the centre. ΣF_t = 0 for UCM; ΣF_t = m·a_t for non-UCM.
  accelerationDirection:
    es: La aceleración centrípeta apunta siempre hacia el centro de la trayectoria.
    en: Centripetal acceleration always points toward the centre of the trajectory.
  referenceFrameChoice:
    es: Ejes radial (hacia el centro positivo) y tangencial (en la dirección del movimiento).
    en: Radial axis (positive toward centre) and tangential axis (in the direction of motion).
  forceTypes:
    es:
      - T (tensión del hilo, hacia el centro)
      - N (normal de la pista, hacia el centro en el caso interior)
      - W = mg (peso, componente radial si la trayectoria no es horizontal)
      - f (rozamiento, componente radial si aplica)
    en:
      - T (string tension, toward centre)
      - N (track normal, toward centre for interior case)
      - W = mg (weight, radial component if trajectory is not horizontal)
      - f (friction, radial component if applicable)
  signConvention:
    es: "Componente radial positiva: hacia el centro. La fuerza centrípeta neta siempre es positiva (centrípeta)."
    en: "Positive radial component: toward the centre. The net centripetal force is always positive (centripetal)."
  relation:
    es: El DCL muestra las fuerzas reales cuya componente radial neta ΣF_r = mv²/r provee la aceleración centrípeta.
    en: The FBD shows the real forces whose net radial component ΣF_r = mv²/r provides the centripetal acceleration.
  readingFocus:
    es: identificar qué fuerza o componente de fuerza apunta hacia el centro y verificar ΣF_r = mv²/r.
    en: identify which force or force component points toward the centre and verify ΣF_r = mv²/r.
  agentHints:
    es:
      - "La fuerza centrípeta es siempre una fuerza real (o su componente): nunca una fuerza nueva independiente."
      - "En un péndulo: T − mg·cosθ = mv²/r. En una curva plana: f = mv²/r. En loop en la cima: T + mg = mv²/r."
      - "La 'fuerza centrífuga' (hacia fuera) solo aparece en el marco no inercial que gira con el objeto."
    en:
      - "Centripetal force is always a real force (or its component): never a new independent force."
      - "For a pendulum: T − mg·cosθ = mv²/r. On a flat curve: f = mv²/r. At the top of a loop: T + mg = mv²/r."
      - "'Centrifugal force' (outward) appears only in the non-inertial frame rotating with the object."
  commonMistakes:
    es:
      - "Añadir una flecha 'fuerza centrípeta' adicional en el DCL además de las fuerzas reales."
      - Confundir la dirección centrípeta (hacia el centro) con la dirección tangencial (del movimiento).
      - Aplicar ΣF_r = mv²/r con el radio equivocado (usar el radio de la trayectoria, no la distancia al eje).
    en:
      - "Adding an extra 'centripetal force' arrow in the FBD on top of the real forces."
      - Confusing the centripetal direction (toward centre) with the tangential direction (of motion).
      - Applying ΣF_r = mv²/r with the wrong radius (use the trajectory radius, not the distance to an axis).

svg:
  title:
    es: Escena SVG · Fuerza Centrípeta
    en: SVG Scene · Centripetal Force
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: fuerza_centripeta_scene
  sceneLabel:
    es: Objeto en trayectoria circular con vector de fuerza centrípeta hacia el centro
    en: Object on circular trajectory with centripetal force vector toward the centre
  objects:
    es:
      - objeto en la trayectoria circular
      - vector F_c (hacia el centro)
      - vector v (tangente a la trayectoria)
      - centro de la trayectoria
      - radio r
    en:
      - object on circular trajectory
      - vector F_c (toward centre)
      - vector v (tangent to trajectory)
      - centre of trajectory
      - radius r
  mainObject:
    es: objeto en movimiento circular uniforme
    en: object in uniform circular motion
  referenceFrame:
    es: marco inercial de laboratorio
    en: inertial laboratory frame
  geometry:
    es: La escena muestra el objeto sobre la trayectoria circular, con el vector de velocidad tangente y el vector de fuerza centrípeta apuntando radialmente hacia el centro.
    en: The scene shows the object on the circular trajectory, with the tangential velocity vector and the centripetal force vector pointing radially toward the centre.
  interactions:
    es: La fuerza centrípeta es provista por una fuerza real (tensión, normal o rozamiento). No existe como fuerza independiente.
    en: The centripetal force is provided by a real force (tension, normal, or friction). It does not exist as an independent force.
  modelElements:
    es:
      - trayectoria circular
      - vector v tangente
      - vector F_c radial hacia el centro
      - radio r
      - centro O
    en:
      - circular trajectory
      - tangential vector v
      - radial vector F_c toward centre
      - radius r
      - centre O
  visualCues:
    es:
      - v es siempre perpendicular a F_c (tangente vs radial).
      - F_c apunta hacia el centro en todo punto de la trayectoria.
      - A mayor v, mayor F_c requerida para mantener el mismo radio.
    en:
      - v is always perpendicular to F_c (tangential vs radial).
      - F_c points toward the centre at every point of the trajectory.
      - At greater v, a larger F_c is required to maintain the same radius.
  scaleMeaning:
    es: La longitud de la flecha F_c es proporcional a mv²/r.
    en: The length of the F_c arrow is proportional to mv²/r.
  relation:
    es: "La escena ilustra la geometría del movimiento circular: v perpendicular a F_c, con F_c siempre apuntando hacia el centro."
    en: "The scene illustrates the geometry of circular motion: v perpendicular to F_c, with F_c always pointing toward the centre."
  physicalReading:
    es: Identificar el centro de la trayectoria, la dirección radial y la fuerza real que provee F_c.
    en: Identify the centre of the trajectory, the radial direction, and the real force that provides F_c.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton en dirección radial: ΣF_r = mv²/r."
    en: "Interpreted under Newton's second law in the radial direction: ΣF_r = mv²/r."
  formulaConnection:
    es: Conecta con F_c = mv²/r = mω²r y a_c = v²/r.
    en: Connects to F_c = mv²/r = mω²r and a_c = v²/r.
  readingFocus:
    es: identificar la trayectoria circular, el centro, el radio y la fuerza que apunta hacia el centro.
    en: identify the circular trajectory, the centre, the radius, and the force pointing toward the centre.
  agentHints:
    es:
      - "v y F_c son siempre perpendiculares: v es tangente y F_c es radial."
      - "El trabajo de F_c es siempre cero: la fuerza centrípeta no cambia la rapidez, solo la dirección."
      - Cambiar r con la misma v requiere cambiar F_c proporcionalmente (F_c ∝ 1/r).
    en:
      - "v and F_c are always perpendicular: v is tangential and F_c is radial."
      - "The work done by F_c is always zero: centripetal force does not change speed, only direction."
      - Changing r with the same v requires changing F_c proportionally (F_c ∝ 1/r).
  commonMistakes:
    es:
      - Dibujar F_c en la dirección tangencial en lugar de radial.
      - Añadir una flecha centrífuga (hacia fuera) en el marco inercial.
      - Confundir el radio r de la trayectoria con la distancia al origen del sistema de referencia.
    en:
      - Drawing F_c in the tangential direction instead of radial.
      - Adding a centrifugal arrow (outward) in the inertial frame.
      - Confusing the trajectory radius r with the distance to the reference origin.
