version: 1
magnitudes:
- id: m
  symbol: m
  nombre:
    es: masa
    en: mass
  descripcion:
    es: Masa del objeto que describe el movimiento circular.
    en: Mass of the object undergoing circular motion.
  unidad_si: "kg"
  dimension: "M"
  is_vector: false
  components: []
  category: fundamental
  physical_role: inertia
  used_in: [newton_radial, fuerza_centripeta_modulo]
  common_mistake: "Confundir masa con peso."
  typical_range: "0.01 - 1000 kg"
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin masa no hay fuerza centripeta.
      en: Without mass there is no centripetal force.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 1000] kg"
  interpretation_role:
    primary_for: [newton_radial]
    secondary_for: [fuerza_centripeta_modulo]
  graph_binding:
    channels: []
  pedagogical_notes: "Parametro basico del problema circular."
- id: r
  symbol: r
  nombre:
    es: radio
    en: radius
  descripcion:
    es: Radio de la trayectoria circular.
    en: Radius of the circular path.
  unidad_si: "m"
  dimension: "L"
  is_vector: false
  components: []
  category: fundamental
  physical_role: geometric_parameter
  used_in: [aceleracion_centripeta_v, aceleracion_centripeta_omega, relacion_v_omega, fuerza_centripeta_modulo]
  common_mistake: "Usar el diametro en lugar del radio."
  typical_range: "0.01 - 10000 m"
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Radio cero implica un punto sin trayectoria circular.
      en: Zero radius implies a point with no circular path.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 10000] m"
  interpretation_role:
    primary_for: [aceleracion_centripeta_v]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: "Medir siempre desde el centro de curvatura."
- id: v
  symbol: v
  nombre:
    es: rapidez tangencial
    en: tangential speed
  descripcion:
    es: Modulo de la velocidad instantanea del objeto a lo largo de la trayectoria circular.
    en: Magnitude of the instantaneous velocity of the object along the circular path.
  unidad_si: "m/s"
  dimension: "LT^{-1}"
  is_vector: false
  components: []
  category: fundamental
  physical_role: kinematic_variable
  used_in: [aceleracion_centripeta_v, relacion_v_omega, fuerza_centripeta_modulo]
  common_mistake: "Confundir con velocidad angular."
  typical_range: "0.1 - 300 m/s"
  sign_behavior:
    has_sign: false
    meaning:
      es: Modulo siempre positivo.
      en: Magnitude always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Si v es cero no hay movimiento circular.
      en: If v is zero there is no circular motion.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.1, 300] m/s"
  interpretation_role:
    primary_for: [aceleracion_centripeta_v]
    secondary_for: [fuerza_centripeta_modulo]
  graph_binding:
    channels: []
  pedagogical_notes: "Siempre tangente a la trayectoria."
- id: omega
  symbol: \omega
  nombre:
    es: velocidad angular
    en: angular velocity
  descripcion:
    es: Angulo recorrido por unidad de tiempo en el movimiento circular.
    en: Angle swept per unit time in circular motion.
  unidad_si: "rad/s"
  dimension: "T^{-1}"
  is_vector: false
  components: []
  category: fundamental
  physical_role: kinematic_variable
  used_in: [aceleracion_centripeta_omega, relacion_v_omega, relacion_omega_periodo]
  common_mistake: "Olvidar convertir rpm a rad/s."
  typical_range: "0.01 - 1000 rad/s"
  sign_behavior:
    has_sign: false
    meaning:
      es: Modulo siempre positivo.
      en: Magnitude always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin velocidad angular no hay giro.
      en: Without angular velocity there is no rotation.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 1000] rad/s"
  interpretation_role:
    primary_for: [aceleracion_centripeta_omega]
    secondary_for: [relacion_v_omega]
  graph_binding:
    channels: []
  pedagogical_notes: "Expresa cuanto gira el objeto cada segundo."
- id: T
  symbol: T
  nombre:
    es: periodo
    en: period
  descripcion:
    es: Tiempo que tarda el objeto en completar una vuelta completa.
    en: Time the object takes to complete one full revolution.
  unidad_si: "s"
  dimension: "T"
  is_vector: false
  components: []
  category: fundamental
  physical_role: kinematic_variable
  used_in: [relacion_omega_periodo]
  common_mistake: "Confundir periodo con frecuencia."
  typical_range: "0.001 - 86400 s"
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Periodo cero implicaria velocidad infinita.
      en: Zero period would imply infinite speed.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.001, 86400] s"
  interpretation_role:
    primary_for: [relacion_omega_periodo]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: "Inverso de la frecuencia."
- id: ac
  symbol: a_c
  nombre:
    es: aceleracion centripeta
    en: centripetal acceleration
  descripcion:
    es: Aceleracion dirigida hacia el centro de la trayectoria que mantiene el giro.
    en: Acceleration directed toward the centre of the path that maintains the turn.
  unidad_si: "m/s^2"
  dimension: "LT^{-2}"
  is_vector: false
  components: []
  category: derived
  physical_role: centripetal_acceleration
  used_in: [aceleracion_centripeta_v, aceleracion_centripeta_omega, newton_radial]
  common_mistake: "Creer que la aceleracion centripeta cambia la rapidez."
  typical_range: "0.01 - 10000 m/s^2"
  sign_behavior:
    has_sign: false
    meaning:
      es: Modulo siempre positivo, apunta al centro.
      en: Magnitude always positive, points toward the centre.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin aceleracion centripeta la trayectoria seria rectilinea.
      en: Without centripetal acceleration the path would be straight.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 10000] m/s^2"
  interpretation_role:
    primary_for: [aceleracion_centripeta_v, newton_radial]
    secondary_for: [aceleracion_centripeta_omega]
  graph_binding:
    channels: []
  pedagogical_notes: "Siempre radial hacia dentro, nunca tangencial."
- id: Frad
  symbol: F_{rad}
  nombre:
    es: resultante radial
    en: radial resultant
  descripcion:
    es: Suma de todas las fuerzas reales proyectadas sobre el eje radial hacia el centro.
    en: Sum of all real forces projected along the radial axis toward the centre.
  unidad_si: "N"
  dimension: "MLT^{-2}"
  is_vector: false
  components: []
  category: derived
  physical_role: net_radial_force
  used_in: [newton_radial]
  common_mistake: "Anadir fuerza centripeta como fuerza extra en el DCL."
  typical_range: "0.01 - 100000 N"
  sign_behavior:
    has_sign: false
    meaning:
      es: Positivo hacia el centro.
      en: Positive toward the centre.
  zero_behavior:
    allowed: false
    meaning:
      es: Si la resultante es cero no hay movimiento circular.
      en: If the resultant is zero there is no circular motion.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 100000] N"
  interpretation_role:
    primary_for: [newton_radial]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: "Sumar solo fuerzas reales, nunca anadir fuerza centripeta."
- id: Fc
  symbol: F_c
  nombre:
    es: modulo de fuerza centripeta
    en: centripetal force magnitude
  descripcion:
    es: Valor numerico de la fuerza neta necesaria para mantener el giro.
    en: Numerical value of the net force needed to maintain the turn.
  unidad_si: "N"
  dimension: "MLT^{-2}"
  is_vector: false
  components: []
  category: derived
  physical_role: centripetal_force
  used_in: [fuerza_centripeta_modulo]
  common_mistake: "Creer que la fuerza centripeta es una fuerza adicional."
  typical_range: "0.01 - 100000 N"
  sign_behavior:
    has_sign: false
    meaning:
      es: Modulo siempre positivo.
      en: Magnitude always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin fuerza centripeta el objeto saldria por la tangente.
      en: Without centripetal force the object would fly off tangentially.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: "[0.01, 100000] N"
  interpretation_role:
    primary_for: [fuerza_centripeta_modulo]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: "Es el resultado de fuerzas reales, no una fuerza nueva."
- id: pi
  symbol: \pi
  nombre:
    es: numero pi
    en: pi constant
  descripcion:
    es: Constante matematica que relaciona circunferencia y diametro.
    en: Mathematical constant relating circumference and diameter.
  unidad_si: ""
  dimension: "1"
  is_vector: false
  components: []
  category: constant
  physical_role: mathematical_constant
  used_in: [relacion_omega_periodo]
  common_mistake: "Usar valor aproximado inadecuado."
  typical_range: "3.14159"
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Pi no puede ser cero.
      en: Pi cannot be zero.
  value_nature:
    kind: constant
    nonnegative_only: true
    expected_interval: "[3.14159, 3.14159]"
  interpretation_role:
    primary_for: [relacion_omega_periodo]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: "Valor exacto 3.14159265..."