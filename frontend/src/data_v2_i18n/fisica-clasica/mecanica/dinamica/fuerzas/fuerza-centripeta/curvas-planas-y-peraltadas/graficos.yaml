version: "1.0"
leaf: "curvas-planas-y-peraltadas"

coord:
  title:
    es: Gráfica Coord · Curvas Planas y Peraltadas
    en: Coord Graph · Flat and Banked Curves
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza centrípeta requerida F_c (N)
    en: required centripetal force F_c (N)
  xMagnitude: v
  yMagnitude: F_c
  relation:
    es: "En curva plana, la fricción limita F_c ≤ μ_e·mg → v_max = √(μ_e·g·r). En curva peraltada θ sin rozamiento: tanθ = v²/(rg) → v_ideal = √(r·g·tanθ). El peralte permite mayor v_max con menos dependencia de μ."
    en: "On a flat curve, friction limits F_c ≤ μ_e·mg → v_max = √(μ_e·g·r). On a banked curve at θ without friction: tanθ = v²/(rg) → v_ideal = √(r·g·tanθ). Banking allows higher v_max with less dependence on μ."
  physicalReading:
    es: La parábola F_c = mv²/r fija la fuerza requerida. La intersección con la fuerza máxima disponible (μ·mg o N·sinθ) determina v_max.
    en: The parabola F_c = mv²/r fixes the required force. The intersection with the maximum available force (μ·mg or N·sinθ) determines v_max.
  slopeMeaning:
    es: La pendiente de F_c vs v² es m/r. En curva peraltada, la componente radial de N es N·sinθ = m·v²/r.
    en: The slope of F_c vs v² is m/r. On a banked curve, the radial component of N is N·sinθ = m·v²/r.
  interceptMeaning:
    es: "F_c = 0 para v = 0: un vehículo detenido no requiere fuerza centrípeta."
    en: "F_c = 0 at v = 0: a stationary vehicle requires no centripetal force."
  curvatureMeaning:
    es: F_c vs v es parabólica. F_c vs v² es lineal con pendiente m/r.
    en: F_c vs v is parabolic. F_c vs v² is linear with slope m/r.
  signMeaning:
    es: F_c siempre positiva (hacia el interior de la curva).
    en: F_c always positive (toward the inside of the curve).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Para v < v_min (peraltada sin rozamiento) el vehículo resbala hacia el interior; para v > v_max, hacia el exterior."
    en: "For v < v_min (banked without friction) the vehicle slides inward; for v > v_max, outward."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton en dirección radial: ΣF_r = mv²/r."
    en: "Interpreted under Newton's second law in the radial direction: ΣF_r = mv²/r."
  formulaConnection:
    es: Conecta con v_max = √(μ_e·g·r) (plana), v_ideal = √(r·g·tanθ) (peraltada sin μ) y v_max = √(r·g·(tanθ + μ)/(1 − μ·tanθ)) (peraltada con μ).
    en: Connects to v_max = √(μ_e·g·r) (flat), v_ideal = √(r·g·tanθ) (banked without μ), and v_max = √(r·g·(tanθ + μ)/(1 − μ·tanθ)) (banked with μ).
  readingFocus:
    es: leer v_max de la intersección de la parábola con la fuerza disponible, y comparar curva plana vs peraltada.
    en: read v_max from the intersection of the parabola with the available force, and compare flat vs banked curve.
  agentHints:
    es:
      - El peralte transfiere parte de la fuerza centrípeta a la normal N, reduciendo la dependencia del rozamiento.
      - "A v = v_ideal (peraltada), la fricción es cero: la normal provee toda la fuerza centrípeta."
      - En autopistas, el peralte estándar es 5–8°; en pistas de carreras puede superar 30°.
    en:
      - Banking transfers part of the centripetal force to the normal N, reducing friction dependence.
      - "At v = v_ideal (banked), friction is zero: the normal provides all the centripetal force."
      - On highways, standard banking is 5–8°; on racing tracks it can exceed 30°.
  commonMistakes:
    es:
      - Usar N = mg en curva peraltada (N ≠ mg porque hay aceleración vertical implícita).
      - Olvidar que la velocidad ideal de la curva peraltada es v_ideal = √(rgtan θ), no una velocidad máxima.
      - Ignorar que en la curva plana F_c está limitada por la fricción estática máxima.
    en:
      - Using N = mg on a banked curve (N ≠ mg because there is an implied vertical acceleration).
      - Forgetting that the ideal speed for a banked curve is v_ideal = √(rg·tanθ), not a maximum speed.
      - Ignoring that on a flat curve F_c is limited by maximum static friction.

dcl:
  title:
    es: DCL · Curvas Planas y Peraltadas
    en: FBD · Flat and Banked Curves
  xAxis:
    es: eje radial (hacia el interior de la curva)
    en: radial axis (toward the inside of the curve)
  yAxis:
    es: eje vertical
    en: vertical axis
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - N (normal, perpendicular a la calzada)
      - f_r = μ·N (rozamiento radial hacia el interior, en curva plana)
      - N·sinθ (componente radial de N en curva peraltada)
    en:
      - W = m·g (weight, downward)
      - N (normal, perpendicular to road surface)
      - f_r = μ·N (radial friction toward inside, on flat curve)
      - N·sinθ (radial component of N on banked curve)
  object:
    es: vehículo tomando una curva (plana o peraltada)
    en: vehicle negotiating a curve (flat or banked)
  freeBodyCondition:
    es: "Curva plana: W hacia abajo, N hacia arriba, f radial hacia el interior. Curva peraltada: W hacia abajo, N inclinada hacia dentro (componente radial N·sinθ y vertical N·cosθ)."
    en: "Flat curve: W downward, N upward, f radially inward. Banked curve: W downward, N inclined inward (radial component N·sinθ and vertical N·cosθ)."
  equilibriumCondition:
    es: "Vertical: N·cosθ = mg (peraltada) o N = mg (plana). Radial: N·sinθ = mv²/r (peraltada ideal) o f = mv²/r (plana)."
    en: "Vertical: N·cosθ = mg (banked) or N = mg (flat). Radial: N·sinθ = mv²/r (ideal banked) or f = mv²/r (flat)."
  netForce:
    es: "ΣF_r = mv²/r hacia el interior. Para curva plana: f provee toda F_c. Para peraltada ideal: N·sinθ provee toda F_c."
    en: "ΣF_r = mv²/r inward. For flat curve: f provides all F_c. For ideal banked: N·sinθ provides all F_c."
  accelerationDirection:
    es: La aceleración centrípeta apunta hacia el interior de la curva (hacia el centro de la trayectoria circular).
    en: Centripetal acceleration points toward the inside of the curve (toward the centre of the circular trajectory).
  referenceFrameChoice:
    es: "Ejes: vertical (z) y radial (hacia el interior de la curva, positivo)."
    en: "Axes: vertical (z) and radial (positive inward)."
  forceTypes:
    es:
      - W = mg (gravitacional)
      - N (normal, perpendicular a la calzada)
      - f_r (rozamiento radial, disipativa, solo en curva plana o con v ≠ v_ideal)
    en:
      - W = mg (gravitational)
      - N (normal, perpendicular to road)
      - f_r (radial friction, dissipative, only on flat curve or v ≠ v_ideal)
  signConvention:
    es: Positivo hacia el interior de la curva en dirección radial. Positivo hacia arriba en dirección vertical.
    en: Positive inward in the radial direction. Positive upward in the vertical direction.
  relation:
    es: "El DCL muestra las fuerzas que proveen la fuerza centrípeta: rozamiento en curva plana; componente radial de N en curva peraltada."
    en: "The FBD shows the forces providing centripetal force: friction on a flat curve; radial component of N on a banked curve."
  readingFocus:
    es: identificar qué fuerza o componente provee F_c = mv²/r y plantear las ecuaciones radial y vertical.
    en: identify which force or component provides F_c = mv²/r and set up the radial and vertical equations.
  agentHints:
    es:
      - "En curva plana: f_r = mv²/r → v_max = √(μg r). Verificar que f_r ≤ μ_e·N."
      - "En curva peraltada ideal: N·sinθ = mv²/r y N·cosθ = mg → tanθ = v²/(rg)."
      - "En curva peraltada con rozamiento: hay dos límites v_min y v_max con el rozamiento como corrección."
    en:
      - "On flat curve: f_r = mv²/r → v_max = √(μg r). Verify f_r ≤ μ_e·N."
      - "On ideal banked curve: N·sinθ = mv²/r and N·cosθ = mg → tanθ = v²/(rg)."
      - "On banked curve with friction: there are two limits v_min and v_max with friction as correction."
  commonMistakes:
    es:
      - No dibujar las ecuaciones radial y vertical por separado.
      - Usar N = mg en curva peraltada (la componente vertical de N iguala mg, no N misma).
      - Incluir una flecha centrífuga (ficticia) en el DCL del marco inercial.
    en:
      - Not writing separate radial and vertical equations.
      - Using N = mg on a banked curve (the vertical component of N equals mg, not N itself).
      - Including a centrifugal arrow (fictitious) in the FBD for the inertial frame.

svg:
  title:
    es: Escena SVG · Curvas Planas y Peraltadas
    en: SVG Scene · Flat and Banked Curves
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: curvas_peraltadas_scene
  sceneLabel:
    es: Vehículo en curva plana (con rozamiento) y curva peraltada (con N inclinada)
    en: Vehicle on flat curve (with friction) and banked curve (with inclined N)
  objects:
    es:
      - vehículo
      - calzada plana o peraltada
      - vector W (peso)
      - vector N (normal inclinada en peralte)
      - vector f_r (rozamiento radial)
      - ángulo de peralte θ
    en:
      - vehicle
      - flat or banked road surface
      - vector W (weight)
      - vector N (inclined normal on banked)
      - vector f_r (radial friction)
      - banking angle θ
  mainObject:
    es: vehículo en movimiento circular sobre curva plana o peraltada
    en: vehicle in circular motion on flat or banked curve
  referenceFrame:
    es: marco inercial de laboratorio
    en: inertial laboratory frame
  geometry:
    es: "La escena muestra la sección transversal de la calzada con el vehículo. En curva plana: N vertical y f radial. En curva peraltada: N inclinada θ respecto a la vertical."
    en: "The scene shows the road cross-section with the vehicle. On a flat curve: N vertical and f radial. On a banked curve: N inclined θ from the vertical."
  interactions:
    es: "Curva plana: la fricción estática provee toda la fuerza centrípeta. Curva peraltada: la componente radial de N (N·sinθ) provee la fuerza centrípeta a v_ideal."
    en: "Flat curve: static friction provides all centripetal force. Banked curve: the radial component of N (N·sinθ) provides centripetal force at v_ideal."
  modelElements:
    es:
      - sección transversal de la calzada
      - ángulo θ de peralte
      - vectores W, N y f_r
      - flecha F_c hacia el interior de la curva
    en:
      - road cross-section
      - banking angle θ
      - vectors W, N, and f_r
      - F_c arrow toward the inside of the curve
  visualCues:
    es:
      - "En curva plana: N vertical e igual a mg; f horizontal hacia el interior provee F_c."
      - "En curva peraltada: N inclinada con N·sinθ hacia el interior y N·cosθ = mg."
      - "El ángulo θ del peralte determina v_ideal directamente: tanθ = v²/(rg)."
    en:
      - "On flat curve: N vertical and equal to mg; horizontal f inward provides F_c."
      - "On banked curve: N inclined with N·sinθ inward and N·cosθ = mg."
      - "The banking angle θ determines v_ideal directly: tanθ = v²/(rg)."
  scaleMeaning:
    es: Las flechas son proporcionales a las magnitudes de las fuerzas.
    en: Arrows are proportional to force magnitudes.
  relation:
    es: La escena compara geométricamente la curva plana y la peraltada, mostrando cómo el peralte transfiere la función de la fricción a la normal.
    en: The scene geometrically compares the flat and banked curve, showing how banking transfers the friction role to the normal force.
  physicalReading:
    es: Leer el ángulo θ, las fuerzas y sus componentes radiales para calcular v_ideal y v_max.
    en: Read the angle θ, forces, and their radial components to compute v_ideal and v_max.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton: ΣF_r = mv²/r (radial) y ΣF_z = 0 (vertical)."
    en: "Interpreted under Newton's second law: ΣF_r = mv²/r (radial) and ΣF_z = 0 (vertical)."
  formulaConnection:
    es: Conecta con tanθ = v²/(rg) (peraltada ideal), v_max = √(μgr) (plana), y N = mg/cosθ (peraltada).
    en: Connects to tanθ = v²/(rg) (ideal banked), v_max = √(μgr) (flat), and N = mg/cosθ (banked).
  readingFocus:
    es: identificar el ángulo de peralte, las fuerzas radiales y plantear ΣF_r = mv²/r.
    en: identify the banking angle, radial forces, and set up ΣF_r = mv²/r.
  agentHints:
    es:
      - Comparar los dos DCL (plano y peraltado) en la misma escena ayuda a entender la función del peralte.
      - "En la curva peraltada ideal, la fricción es exactamente cero: solo W y N actúan."
      - El peralte es la razón por la que los velódromos tienen curvas muy inclinadas.
    en:
      - Comparing both FBDs (flat and banked) in the same scene helps understand the role of banking.
      - "On the ideal banked curve, friction is exactly zero: only W and N act."
      - Banking is why velodromes have steeply inclined curves.
  commonMistakes:
    es:
      - No descomponer N en sus componentes vertical y radial en la curva peraltada.
      - Dibujar la curva peraltada como si N fuera vertical (como en superficie plana).
      - Olvidar que v_ideal no es v_max sino la velocidad donde no hay rozamiento.
    en:
      - Not decomposing N into its vertical and radial components on the banked curve.
      - Drawing the banked curve with N vertical (as for a flat surface).
      - Forgetting that v_ideal is not v_max but the speed at which there is no friction.
