version: "1.0"
leaf: "ejemplos-tipicos"

coord:
  title:
    es: Gráfica Coord · Ejemplos Típicos
    en: Coord Graph · Typical Examples
  xAxis:
    es: magnitud independiente del ejemplo
    en: independent quantity of the example
  yAxis:
    es: magnitud dependiente del ejemplo
    en: dependent quantity of the example
  xMagnitude: variable independiente
  yMagnitude: variable dependiente
  relation:
    es: "Muestra la relación cuantitativa característica de los ejemplos típicos de la sección: puede ser lineal, cuadrática o exponencial según el fenómeno."
    en: "Shows the characteristic quantitative relationship of the typical examples in this section: may be linear, quadratic, or exponential depending on the phenomenon."
  physicalReading:
    es: "Leer la forma de la curva para identificar la ley física: recta (proporcionalidad directa), parábola (cuadrática), curva exponencial (amortiguamiento o crecimiento)."
    en: "Read the curve shape to identify the physical law: straight line (direct proportionality), parabola (quadratic), exponential curve (damping or growth)."
  slopeMeaning:
    es: "La pendiente identifica la constante de proporcionalidad de la ley: 1/m (Newton), k (Hooke), b (arrastre lineal), etc."
    en: "The slope identifies the proportionality constant of the law: 1/m (Newton), k (Hooke), b (linear drag), etc."
  interceptMeaning:
    es: "El intercepto indica el valor de la magnitud dependiente cuando la independiente es cero: condición de reposo o estado de referencia."
    en: "The intercept indicates the value of the dependent quantity when the independent is zero: rest condition or reference state."
  curvatureMeaning:
    es: Una relación lineal indica ley directamente proporcional. Una curvatura indica dependencia cuadrática, exponencial o inversa.
    en: A linear relationship indicates a directly proportional law. Curvature indicates quadratic, exponential, or inverse dependence.
  signMeaning:
    es: El signo de la magnitud dependiente indica la dirección o sentido del efecto físico analizado.
    en: The sign of the dependent quantity indicates the direction or sense of the analysed physical effect.
  areaMeaning:
    es: El área bajo la curva puede representar trabajo, impulso u otra magnitud acumulada según los ejes elegidos.
    en: The area under the curve can represent work, impulse, or another accumulated quantity depending on the chosen axes.
  domainMeaning:
    es: El dominio válido coincide con el rango físicamente razonable de la magnitud independiente del ejemplo.
    en: The valid domain corresponds to the physically reasonable range of the independent quantity of the example.
  modelConnection:
    es: "Se interpreta bajo la ley física específica del ejemplo: Newton, Hooke, conservación de energía, etc."
    en: "Interpreted under the specific physical law of the example: Newton, Hooke, energy conservation, etc."
  formulaConnection:
    es: "Conecta con la fórmula del ejemplo: a = ΣF/m, F = kx, E_k = ½mv², etc."
    en: "Connects to the example formula: a = ΣF/m, F = kx, E_k = ½mv², etc."
  readingFocus:
    es: leer ejes, pendiente y tendencia para identificar la ley física subyacente y verificar la consistencia del resultado.
    en: read axes, slope, and trend to identify the underlying physical law and verify the consistency of the result.
  agentHints:
    es:
      - Identificar primero la forma general de la curva antes de leer valores numéricos.
      - "La pendiente tiene unidades: verificarlas para confirmar qué constante física representa."
      - Comparar con la gráfica teórica para detectar desviaciones experimentales o errores.
    en:
      - First identify the general curve shape before reading numerical values.
      - "The slope has units: verify them to confirm which physical constant it represents."
      - Compare with the theoretical graph to detect experimental deviations or errors.
  commonMistakes:
    es:
      - Leer solo un punto en lugar de la pendiente global de la curva.
      - Ignorar las unidades de los ejes al interpretar la pendiente.
      - Confundir una relación lineal con una de proporcionalidad inversa cuando la escala es logarítmica.
    en:
      - Reading only a single point instead of the overall slope of the curve.
      - Ignoring axis units when interpreting the slope.
      - Confusing a linear relationship with an inverse one when the scale is logarithmic.
