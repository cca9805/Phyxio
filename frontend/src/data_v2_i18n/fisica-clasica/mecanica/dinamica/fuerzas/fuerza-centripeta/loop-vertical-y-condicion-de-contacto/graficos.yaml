version: "1.0"
leaf: "loop-vertical-y-condicion-de-contacto"

coord:
  title:
    es: Gráfica Coord · Loop Vertical y Condición de Contacto
    en: Coord Graph · Vertical Loop and Contact Condition
  xAxis:
    es: posición angular θ en el loop (grados)
    en: angular position θ in the loop (degrees)
  yAxis:
    es: fuerza normal N (N)
    en: normal force N (N)
  xMagnitude: θ
  yMagnitude: N
  relation:
    es: "N varía con θ: en la base N = m(g + v²/r) (máximo), en la cima N = m(v²/r − g) (mínimo). La condición de contacto N ≥ 0 da v_min en la cima = √(g·r)."
    en: "N varies with θ: at the bottom N = m(g + v²/r) (maximum), at the top N = m(v²/r − g) (minimum). Contact condition N ≥ 0 gives v_min at the top = √(g·r)."
  physicalReading:
    es: "En la base, N > mg (peso aparente aumentado). En la cima, N < mg (peso aparente reducido). Si N = 0, el objeto está a punto de perder contacto: esa v es la mínima para completar el loop."
    en: "At the bottom, N > mg (increased apparent weight). At the top, N < mg (reduced apparent weight). If N = 0, the object is about to lose contact: that v is the minimum to complete the loop."
  slopeMeaning:
    es: "La variación de N con θ depende de la conservación de energía a lo largo del loop: v²(θ) = v_base² − 2gr(1 − cosθ)."
    en: "The variation of N with θ depends on energy conservation along the loop: v²(θ) = v_base² − 2gr(1 − cosθ)."
  interceptMeaning:
    es: "En θ = 0 (base): N_base = m(g + v_base²/r). Es el punto de mayor peso aparente."
    en: "At θ = 0 (bottom): N_base = m(g + v_base²/r). This is the point of greatest apparent weight."
  curvatureMeaning:
    es: N decrece desde la base hasta la cima. Si N = 0 antes de llegar a la cima, el objeto no completa el loop.
    en: N decreases from the base to the top. If N = 0 before reaching the top, the object does not complete the loop.
  signMeaning:
    es: N ≥ 0 siempre (la pista solo empuja, no jala). N = 0 es el límite de pérdida de contacto.
    en: N ≥ 0 always (the track can only push, not pull). N = 0 is the contact-loss threshold.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "θ ∈ [0°, 360°] para una vuelta completa. Para un loop interior: θ = 180° es la cima."
    en: "θ ∈ [0°, 360°] for a full loop. For an interior loop: θ = 180° is the top."
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton en dirección radial (ΣF_r = mv²/r) y la conservación de energía mecánica a lo largo del loop.
    en: "Interpreted under Newton's second law in the radial direction (ΣF_r = mv²/r) and conservation of mechanical energy along the loop."
  formulaConnection:
    es: Conecta con N_cima = m(v_cima²/r − g) ≥ 0, v_min_cima = √(gr) y v_base_min = √(5gr) por conservación de energía.
    en: Connects to N_top = m(v_top²/r − g) ≥ 0, v_min_top = √(gr), and v_base_min = √(5gr) from energy conservation.
  readingFocus:
    es: leer N en la cima para verificar la condición de contacto y calcular v_min = √(gr).
    en: read N at the top to verify the contact condition and compute v_min = √(gr).
  agentHints:
    es:
      - "La velocidad mínima en la cima es v_min = √(gr): deriva de N = 0 (contacto límite)."
      - La velocidad mínima en la base para completar el loop es v_base = √(5gr) (energía mecánica conservada).
      - "En la base, el peso aparente es N/m·g = 1 + v²/(rg): puede ser 6g si v = √(5gr)."
    en:
      - "The minimum speed at the top is v_min = √(gr): derived from N = 0 (limiting contact)."
      - The minimum speed at the base to complete the loop is v_base = √(5gr) (energy conserved).
      - "At the base, the apparent weight is N/m·g = 1 + v²/(rg): can be 6g if v = √(5gr)."
  commonMistakes:
    es:
      - Usar la misma velocidad en la base y la cima (la velocidad disminuye por la subida).
      - Olvidar la condición N ≥ 0 y calcular la velocidad mínima incorrectamente.
      - Ignorar que el peso W siempre apunta hacia abajo independientemente de la posición en el loop.
    en:
      - Using the same speed at the base and the top (speed decreases due to the climb).
      - Forgetting the condition N ≥ 0 and computing the minimum speed incorrectly.
      - Ignoring that weight W always points downward regardless of position in the loop.

dcl:
  title:
    es: DCL · Loop Vertical y Condición de Contacto
    en: FBD · Vertical Loop and Contact Condition
  xAxis:
    es: eje radial (hacia el centro del loop)
    en: radial axis (toward loop centre)
  yAxis:
    es: eje vertical o tangencial
    en: vertical or tangential axis
  forces:
    es:
      - W = m·g (peso, siempre hacia abajo)
      - N (normal de la pista, siempre perpendicular a la pista hacia el centro del loop)
    en:
      - W = m·g (weight, always downward)
      - N (track normal, always perpendicular to the track toward the loop centre)
  object:
    es: objeto (coche, montaña rusa, agua en cubo) en loop vertical de radio r
    en: object (car, roller coaster, water in bucket) in a vertical loop of radius r
  freeBodyCondition:
    es: "En la base: W hacia abajo, N hacia arriba. En la cima: W hacia abajo (hacia el centro), N también hacia abajo (hacia el centro). En los laterales: W hacia abajo, N horizontal hacia el centro."
    en: "At the bottom: W downward, N upward. At the top: W downward (toward centre), N also downward (toward centre). At the sides: W downward, N horizontal toward centre."
  equilibriumCondition:
    es: "No hay equilibrio: ΣF_r = mv²/r (fuerza neta centrípeta). La condición de contacto es N ≥ 0."
    en: "No equilibrium: ΣF_r = mv²/r (net centripetal force). Contact condition is N ≥ 0."
  netForce:
    es: "Cima: N + mg = mv_cima²/r. Base: N − mg = mv_base²/r. N varía con la posición."
    en: "Top: N + mg = mv_top²/r. Bottom: N − mg = mv_bottom²/r. N varies with position."
  accelerationDirection:
    es: La aceleración centrípeta apunta siempre hacia el centro del loop.
    en: Centripetal acceleration always points toward the centre of the loop.
  referenceFrameChoice:
    es: Eje radial positivo hacia el centro del loop en cada posición.
    en: Positive radial axis toward the loop centre at each position.
  forceTypes:
    es:
      - W = mg (gravitacional, constante, hacia abajo)
      - N (normal de contacto, variable, hacia el centro)
    en:
      - W = mg (gravitational, constant, downward)
      - N (contact normal, variable, toward centre)
  signConvention:
    es: Positivo hacia el centro del loop. W contribuye positivamente en la cima y negativamente en la base.
    en: Positive toward the loop centre. W contributes positively at the top and negatively at the bottom.
  relation:
    es: El DCL en distintas posiciones del loop muestra cómo W y N se suman o restan para proveer la fuerza centrípeta.
    en: The FBD at different loop positions shows how W and N add or subtract to provide the centripetal force.
  readingFocus:
    es: aplicar ΣF_r = mv²/r con los signos correctos según la posición (base, lateral, cima).
    en: apply ΣF_r = mv²/r with the correct signs according to position (bottom, side, top).
  agentHints:
    es:
      - "En la cima: N + W = mv²/r → N = mv²/r − mg. Si v < v_min = √(gr), N < 0: el objeto pierde contacto."
      - "En la base: N − W = mv²/r → N = m(g + v²/r): siempre N > mg en la base."
      - "En los laterales: W es tangencial y N es totalmente radial: N = mv²/r."
    en:
      - "At the top: N + W = mv²/r → N = mv²/r − mg. If v < v_min = √(gr), N < 0: object loses contact."
      - "At the bottom: N − W = mv²/r → N = m(g + v²/r): always N > mg at the bottom."
      - "At the sides: W is tangential and N is entirely radial: N = mv²/r."
  commonMistakes:
    es:
      - En la cima, dibujar N hacia arriba en lugar de hacia el centro (hacia abajo en la cima).
      - No cambiar el signo de W en la ecuación radial según la posición.
      - Usar la velocidad de la base en la ecuación de la cima sin aplicar conservación de energía.
    en:
      - At the top, drawing N upward instead of toward the centre (downward at the top).
      - Not changing the sign of W in the radial equation depending on position.
      - Using the base speed in the top equation without applying energy conservation.

svg:
  title:
    es: Escena SVG · Loop Vertical y Condición de Contacto
    en: SVG Scene · Vertical Loop and Contact Condition
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: loop_vertical_scene
  sceneLabel:
    es: Loop vertical con objeto en base, laterales y cima, mostrando W y N en cada posición
    en: Vertical loop with object at bottom, sides, and top, showing W and N at each position
  objects:
    es:
      - pista circular (loop)
      - objeto en distintas posiciones (base, laterales, cima)
      - vector W (constante hacia abajo)
      - vector N (variable, hacia el centro)
    en:
      - circular track (loop)
      - object at different positions (bottom, sides, top)
      - vector W (constant downward)
      - vector N (variable, toward centre)
  mainObject:
    es: objeto en loop vertical completando la vuelta circular
    en: object in a vertical loop completing the circular round
  referenceFrame:
    es: marco inercial de laboratorio
    en: inertial laboratory frame
  geometry:
    es: La escena muestra la sección circular del loop con el objeto en varias posiciones, y en cada posición los vectores W y N con sus sentidos correctos.
    en: The scene shows the circular loop section with the object at several positions, and at each position the vectors W and N with their correct directions.
  interactions:
    es: W siempre apunta hacia abajo. N siempre apunta hacia el centro del loop. En la cima ambas apuntan hacia abajo (hacia el centro).
    en: W always points downward. N always points toward the loop centre. At the top both point downward (toward the centre).
  modelElements:
    es:
      - loop circular de radio r
      - objeto en posición θ
      - vector W = mg constante
      - vector N variable según la posición
      - v_min en la cima = √(gr)
    en:
      - circular loop of radius r
      - object at position θ
      - constant W = mg vector
      - N vector varying with position
      - v_min at top = √(gr)
  visualCues:
    es:
      - "En la base: N es larga (N > mg), W es corta en comparación."
      - "En la cima: N y W apuntan en el mismo sentido (hacia el centro = hacia abajo)."
      - "Si N = 0 en la cima, el peso solo provee la fuerza centrípeta: v_min = √(gr)."
    en:
      - "At the bottom: N is long (N > mg), W is shorter by comparison."
      - "At the top: N and W point in the same direction (toward centre = downward)."
      - "If N = 0 at the top, weight alone provides centripetal force: v_min = √(gr)."
  scaleMeaning:
    es: Las flechas N y W son proporcionales a sus magnitudes en cada posición.
    en: Arrows N and W are proportional to their magnitudes at each position.
  relation:
    es: La escena ilustra cómo W y N varían a lo largo del loop y dónde está la condición crítica de contacto (cima).
    en: The scene illustrates how W and N vary along the loop and where the critical contact condition (top) is located.
  physicalReading:
    es: Identificar la posición en el loop, leer las magnitudes de N y W, y verificar ΣF_r = mv²/r.
    en: Identify the position in the loop, read the magnitudes of N and W, and verify ΣF_r = mv²/r.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton radial y la conservación de energía mecánica.
    en: "Interpreted under radial Newton's second law and mechanical energy conservation."
  formulaConnection:
    es: Conecta con N_cima = m(v_cima²/r − g), v_min_cima = √(gr) y v_base_min = √(5gr).
    en: Connects to N_top = m(v_top²/r − g), v_min_top = √(gr), and v_base_min = √(5gr).
  readingFocus:
    es: identificar la posición más crítica (cima), leer los vectores W y N y verificar la condición N ≥ 0.
    en: identify the most critical position (top), read the W and N vectors, and verify the condition N ≥ 0.
  agentHints:
    es:
      - "Comparar la longitud de N en la base y en la cima es la clave visual: N_base >> N_cima."
      - "En la cima, N y W apuntan en el mismo sentido: ambas proveen fuerza centrípeta."
      - La escena puede usarse para verificar que v_base = √(5gr) garantiza completar el loop (N = 0 en la cima).
    en:
      - "Comparing N length at the base and the top is the key visual: N_base >> N_top."
      - "At the top, N and W point in the same direction: both provide centripetal force."
      - The scene can be used to verify that v_base = √(5gr) guarantees completing the loop (N = 0 at top).
  commonMistakes:
    es:
      - Dibujar N hacia arriba en la cima del loop (N apunta hacia el centro = hacia abajo en la cima).
      - No aplicar conservación de energía al relacionar velocidades en distintas posiciones del loop.
      - Olvidar que la condición N = 0 solo se cumple en la cima, no en la base.
    en:
      - Drawing N upward at the top of the loop (N points toward centre = downward at the top).
      - Not applying energy conservation when relating speeds at different loop positions.
      - Forgetting that N = 0 occurs only at the top, not at the bottom.
