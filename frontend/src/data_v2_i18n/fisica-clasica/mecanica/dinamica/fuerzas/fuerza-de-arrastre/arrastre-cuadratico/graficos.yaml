version: "1.0"
leaf: "arrastre-cuadratico"

coord:
  title:
    es: Gráfica Coord · Arrastre Cuadrático
    en: Coord Graph · Quadratic Drag
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza de arrastre F_D (N)
    en: drag force F_D (N)
  xMagnitude: v
  yMagnitude: F_D
  relation:
    es: "La fuerza de arrastre cuadrático es F_D = ½ρC_D A v²: proporcional al cuadrado de la velocidad. La gráfica F_D vs v es una parábola que crece rápidamente con v."
    en: "Quadratic drag force is F_D = ½ρC_D Av²: proportional to the square of velocity. The F_D vs v graph is a parabola that grows rapidly with v."
  physicalReading:
    es: "Al duplicar la velocidad, la fuerza de arrastre se cuadruplica. Este régimen domina para objetos grandes o rápidos en fluidos poco viscosos (Re >> 1)."
    en: "Doubling velocity quadruples the drag force. This regime dominates for large or fast objects in low-viscosity fluids (Re >> 1)."
  slopeMeaning:
    es: "La pendiente dF_D/dv = ρC_D Av es creciente con v: el arrastre frena cada vez más al aumentar la velocidad."
    en: "The slope dF_D/dv = ρC_D Av increases with v: drag opposes more strongly as velocity grows."
  interceptMeaning:
    es: "Para v = 0, F_D = 0: sin movimiento no hay fuerza de arrastre cuadrático."
    en: "At v = 0, F_D = 0: without motion there is no quadratic drag force."
  curvatureMeaning:
    es: "La curva es cóncava hacia arriba (parábola): la tasa de crecimiento del arrastre es creciente con v."
    en: "The curve is concave upward (parabola): the drag growth rate increases with v."
  signMeaning:
    es: "F_D siempre se opone al movimiento: su signo es opuesto al de la velocidad."
    en: "F_D always opposes motion: its sign is opposite to that of velocity."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: "Válido para Re >> 1 (flujo turbulento). Para Re < 1 se usa el modelo lineal de Stokes."
    en: "Valid for Re >> 1 (turbulent flow). For Re < 1 the linear Stokes model is used instead."
  modelConnection:
    es: "Se interpreta bajo la ecuación de Newton con arrastre cuadrático: m·dv/dt = mg − ½ρC_D Av²."
    en: "Interpreted under Newton's equation with quadratic drag: m·dv/dt = mg − ½ρC_D Av²."
  formulaConnection:
    es: Conecta con F_D = ½ρC_D Av², v_t = √(2mg/(ρC_D A)) y Re = ρvL/μ.
    en: Connects to F_D = ½ρC_D Av², v_t = √(2mg/(ρC_D A)) and Re = ρvL/μ.
  readingFocus:
    es: leer la curvatura parabólica y calcular v_t como la velocidad donde F_D = mg.
    en: read the parabolic curvature and compute v_t as the velocity where F_D = mg.
  agentHints:
    es:
      - "La velocidad terminal cuadrática v_t = √(2mg/(ρC_D A)): mayor masa o menor sección implica mayor v_t."
      - "Para medir C_D experimentalmente: medir F_D a distintas v y calcular la pendiente de F_D vs v²."
      - El régimen cuadrático aplica a pelotas, paracaidistas y vehículos; el lineal aplica a microorganismos.
    en:
      - "Quadratic terminal velocity v_t = √(2mg/(ρC_D A)): greater mass or smaller cross-section implies larger v_t."
      - "To measure C_D experimentally: measure F_D at different v and compute the slope of F_D vs v²."
      - The quadratic regime applies to balls, skydivers, and vehicles; the linear regime applies to microorganisms.
  commonMistakes:
    es:
      - "Usar F_D = bv (lineal) cuando el régimen es cuadrático (Re >> 1)."
      - Olvidar que C_D depende de Re y la forma del cuerpo, no es constante universal.
      - Calcular v_t con la fórmula cuadrática cuando el objeto se mueve a Re < 1.
    en:
      - "Using F_D = bv (linear) when the regime is quadratic (Re >> 1)."
      - Forgetting that C_D depends on Re and body shape, not a universal constant.
      - Computing v_t with the quadratic formula when the object moves at Re < 1.

dcl:
  title:
    es: DCL · Arrastre Cuadrático
    en: FBD · Quadratic Drag
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - F_D = ½ρC_D Av² (arrastre cuadrático, opuesto al movimiento)
    en:
      - W = m·g (weight, downward)
      - F_D = ½ρC_D Av² (quadratic drag, opposing motion)
  object:
    es: "objeto moviéndose en fluido a Re >> 1 (pelota, paracaidista, vehículo)"
    en: "object moving in a fluid at Re >> 1 (ball, skydiver, vehicle)"
  freeBodyCondition:
    es: El DCL muestra W hacia abajo y F_D hacia arriba (opuesto al movimiento de caída). La magnitud de F_D crece con v².
    en: The FBD shows W downward and F_D upward (opposing falling motion). The magnitude of F_D grows with v².
  equilibriumCondition:
    es: "Velocidad terminal: F_D = W → ½ρC_D Av_t² = mg → v_t = √(2mg/(ρC_D A))."
    en: "Terminal velocity: F_D = W → ½ρC_D Av_t² = mg → v_t = √(2mg/(ρC_D A))."
  netForce:
    es: "ΣF = mg − ½ρC_D Av². Para v < v_t: ΣF > 0 (sigue acelerando). Para v = v_t: ΣF = 0."
    en: "ΣF = mg − ½ρC_D Av². For v < v_t: ΣF > 0 (still accelerating). For v = v_t: ΣF = 0."
  accelerationDirection:
    es: La aceleración disminuye conforme v crece, haciéndose cero en v_t. Nunca hay aceleración negativa (v nunca supera v_t).
    en: Acceleration decreases as v increases, becoming zero at v_t. There is never negative acceleration (v never exceeds v_t).
  referenceFrameChoice:
    es: "Eje +y hacia abajo para que W > 0 y F_D < 0."
    en: "+y axis downward so that W > 0 and F_D < 0."
  forceTypes:
    es:
      - W = m·g (gravitacional)
      - F_D = ½ρC_D Av² (arrastre cuadrático, disipativa)
    en:
      - W = m·g (gravitational)
      - F_D = ½ρC_D Av² (quadratic drag, dissipative)
  signConvention:
    es: W positivo (hacia abajo). F_D negativo (se opone al movimiento de caída).
    en: W positive (downward). F_D negative (opposes falling motion).
  relation:
    es: "El DCL con arrastre cuadrático muestra el equilibrio dinámico a velocidad terminal: W = F_D cuadrático."
    en: "The FBD with quadratic drag shows dynamic equilibrium at terminal velocity: W = quadratic F_D."
  readingFocus:
    es: leer W y F_D = ½ρC_D Av², verificar ΣF = 0 en la condición de velocidad terminal.
    en: read W and F_D = ½ρC_D Av², verify ΣF = 0 at the terminal velocity condition.
  agentHints:
    es:
      - La dependencia cuadrática en v hace que pequeñas variaciones de velocidad produzcan grandes cambios en F_D.
      - Comparar el DCL a v = 0 (solo W, a = g), a v = v_t/2 y a v = v_t (F_D = W).
      - El coeficiente C_D puede obtenerse midiendo v_t y conociendo m, A y ρ del fluido.
    en:
      - The quadratic dependence on v means small velocity changes produce large F_D changes.
      - Compare the FBD at v = 0 (W only, a = g), at v = v_t/2, and at v = v_t (F_D = W).
      - C_D can be obtained by measuring v_t and knowing m, A, and ρ of the fluid.
  commonMistakes:
    es:
      - Representar F_D en la misma dirección que el movimiento en lugar de opuesta.
      - "Olvidar que F_D depende de v²: el DCL cambia en cada instante."
      - Confundir la velocidad terminal cuadrática con la lineal.
    en:
      - Drawing F_D in the same direction as motion instead of opposing it.
      - "Forgetting that F_D depends on v²: the FBD changes at each instant."
      - Confusing quadratic terminal velocity with linear terminal velocity.
