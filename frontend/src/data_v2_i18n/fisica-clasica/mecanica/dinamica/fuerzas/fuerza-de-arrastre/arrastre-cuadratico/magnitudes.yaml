version: 1
magnitudes:
  - id: F_d
    symbol: F_d
    nombre:
      es: fuerza de arrastre
      en: Drag force
    descripcion:
      es: Fuerza resistiva ejercida por el fluido.
      en: Resistive force exerted by the fluid.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Pensar que F_d crece linealmente con la velocidad incluso en regimenes claramente inerciales.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: En el leaf se usa su modulo; la direccion real se opone al movimiento.
        en: The leaf uses the magnitude; the actual direction opposes motion.
    zero_behavior:
      allowed: true
      meaning:
        es: Si v es cero, el arrastre cuadratico ideal tambien se anula.
        en: If v is zero, ideal quadratic drag also vanishes.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-cuadratico
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: En este leaf importa leer cuanto castiga la rapidez alta a la fuerza resistiva.
  - id: c
    symbol: c
    nombre:
      es: coeficiente_cuadratico_equivalente
      en: Equivalent quadratic coefficient
    descripcion:
      es: Parametro reducido que resume medio y geometria en la ley cuadratica.
      en: Reduced parameter summarizing medium and geometry in the quadratic law.
    unidad_si: N*s^2/m^2
    dimension: ML^{-1}
    is_vector: false
    components: null
    category: model_parameter
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Tratar c como si no dependiera de la densidad del medio ni del area frontal.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: c debe ser no negativo en un modelo fisico.
        en: c must be nonnegative in a physical model.
    zero_behavior:
      allowed: true
      meaning:
        es: c = 0 equivaldria a ausencia de arrastre.
        en: c = 0 would mean no drag.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-cuadratico
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: c permite trabajar con la ley F_d = c v^2 sin perder el origen fisico del parametro.
  - id: v
    symbol: v
    nombre:
      es: rapidez_relativa
      en: Relative speed
    descripcion:
      es: Rapidez del cuerpo respecto al fluido.
      en: Speed of the body relative to the fluid.
    unidad_si: m/s
    dimension: LT^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Olvidar que el crecimiento cuadratico hace a F_d muy sensible a cambios pequenos de v.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: Aqui se usa la rapidez; el signo se recupera aparte.
        en: The leaf uses speed magnitude; sign is handled separately.
    zero_behavior:
      allowed: true
      meaning:
        es: v = 0 implica F_d = 0 en el modelo ideal.
        en: v = 0 implies F_d = 0 in the ideal model.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-cuadratico
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: En este leaf, duplicar v suele ser la pregunta clave porque cuadruplica F_d.
  - id: rho
    symbol: rho
    nombre:
      es: densidad_del_fluido
      en: Fluid density
    descripcion:
      es: Densidad del medio fluido.
      en: Density of the surrounding fluid.
    unidad_si: kg/m^3
    dimension: ML^{-3}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Mantener rho fija cuando cambia el medio o la altitud de forma apreciable.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: rho debe ser no negativa.
        en: rho must be nonnegative.
    zero_behavior:
      allowed: false
      meaning:
        es: rho = 0 no representa un fluido fisico ordinario.
        en: rho = 0 does not represent an ordinary physical fluid.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for: []
      secondary_for:
        - arrastre-cuadratico
    graph_binding:
      channels: []
    pedagogical_notes: rho ayuda a explicar por que el mismo cuerpo sufre mas arrastre en un medio mas denso.
  - id: C_d
    symbol: C_d
    nombre:
      es: coeficiente_de_arrastre
      en: Drag coefficient
    descripcion:
      es: Parametro adimensional asociado a la forma y al regimen.
      en: Dimensionless parameter associated with shape and regime.
    unidad_si: '1'
    dimension: '1'
    is_vector: false
    components: null
    category: model_parameter
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Tratar C_d como fijo aunque cambie el regimen de flujo.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: C_d se usa como numero no negativo.
        en: C_d is used as a nonnegative number.
    zero_behavior:
      allowed: true
      meaning:
        es: C_d = 0 seria un caso idealizado sin arrastre.
        en: C_d = 0 would be an idealized no-drag case.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for: []
      secondary_for:
        - arrastre-cuadratico
    graph_binding:
      channels: []
    pedagogical_notes: En este leaf, C_d sirve sobre todo para explicar de donde sale c.
  - id: A
    symbol: A
    nombre:
      es: area_frontal
      en: Frontal area
    descripcion:
      es: Area de referencia perpendicular al avance.
      en: Reference area perpendicular to the motion.
    unidad_si: m^2
    dimension: L^2
    is_vector: false
    components: null
    category: geometric
    physical_role: physical_quantity
    used_in:
      - arrastre-cuadratico
    common_mistake: Elegir un area que no corresponde a la orientacion real del cuerpo.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: A debe ser no negativa.
        en: A must be nonnegative.
    zero_behavior:
      allowed: false
      meaning:
        es: A = 0 no representa un frente real al flujo.
        en: A = 0 does not represent a real frontal surface.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for: []
      secondary_for:
        - arrastre-cuadratico
    graph_binding:
      channels: []
    pedagogical_notes: A aparece en el leaf para mostrar que mas frente al flujo implica mayor arrastre.

