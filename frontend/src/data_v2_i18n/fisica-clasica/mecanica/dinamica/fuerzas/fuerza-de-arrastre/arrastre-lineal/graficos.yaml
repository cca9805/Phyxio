version: "1.0"
leaf: "arrastre-lineal"

coord:
  title:
    es: Gráfica Coord · Arrastre Lineal
    en: Coord Graph · Linear Drag
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: fuerza de arrastre F_D (N)
    en: drag force F_D (N)
  xMagnitude: v
  yMagnitude: F_D
  relation:
    es: "El arrastre lineal es F_D = b·v (ley de Stokes): proporcional a la velocidad. La gráfica F_D vs v es una recta que pasa por el origen con pendiente b (coeficiente de arrastre viscoso)."
    en: "Linear drag is F_D = b·v (Stokes law): proportional to velocity. The F_D vs v graph is a straight line through the origin with slope b (viscous drag coefficient)."
  physicalReading:
    es: Al duplicar la velocidad, la fuerza de arrastre se duplica. Este régimen domina para objetos pequeños o lentos en fluidos viscosos (Re < 1).
    en: Doubling velocity doubles the drag force. This regime dominates for small or slow objects in viscous fluids (Re < 1).
  slopeMeaning:
    es: "Pendiente = b (N·s/m): coeficiente de arrastre viscoso. Para esferas: b = 6πηr (Stokes). Mayor b implica mayor frenado."
    en: "Slope = b (N·s/m): viscous drag coefficient. For spheres: b = 6πηr (Stokes). Larger b implies greater braking."
  interceptMeaning:
    es: "F_D = 0 cuando v = 0: sin movimiento no hay arrastre lineal."
    en: "F_D = 0 at v = 0: without motion there is no linear drag."
  curvatureMeaning:
    es: La relación es estrictamente lineal en el régimen de Stokes. Cualquier curvatura indica que se está fuera del régimen lineal.
    en: The relationship is strictly linear in the Stokes regime. Any curvature indicates the linear regime has been exceeded.
  signMeaning:
    es: "F_D es siempre opuesta a v: su signo cambia si el objeto invierte el movimiento."
    en: "F_D always opposes v: its sign changes if the object reverses direction."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Válido para Re < 1 (flujo laminar viscoso). Se aplica a glóbulos rojos, bacterias, partículas de polvo, gotas de lluvia pequeñas.
    en: Valid for Re < 1 (viscous laminar flow). Applies to red blood cells, bacteria, dust particles, small raindrops.
  modelConnection:
    es: "Se interpreta bajo la ley de Stokes: m·dv/dt = mg − bv. La solución es v(t) = v_t(1 − e^(−t/τ)) con τ = m/b."
    en: "Interpreted under Stokes law: m·dv/dt = mg − bv. The solution is v(t) = v_t(1 − e^(−t/τ)) with τ = m/b."
  formulaConnection:
    es: Conecta con F_D = bv, v_t = mg/b, τ = m/b y b = 6πηr (para esferas).
    en: Connects to F_D = bv, v_t = mg/b, τ = m/b, and b = 6πηr (for spheres).
  readingFocus:
    es: leer la pendiente b y calcular v_t = mg/b como la intersección de la recta F_D = bv con la horizontal F_D = mg.
    en: read the slope b and compute v_t = mg/b as the intersection of the line F_D = bv with the horizontal F_D = mg.
  agentHints:
    es:
      - "La constante de tiempo τ = m/b: en t = 5τ el objeto ha alcanzado ~99% de v_t."
      - "Para medir b: graficar F_D vs v y leer la pendiente. Si la recta pasa por el origen, el régimen es lineal."
      - La fórmula b = 6πηr (Stokes) es válida solo para esferas en flujo laminar.
    en:
      - "The time constant τ = m/b: at t = 5τ the object has reached ~99% of v_t."
      - "To measure b: plot F_D vs v and read the slope. If the line passes through the origin, the regime is linear."
      - The formula b = 6πηr (Stokes) is valid only for spheres in laminar flow.
  commonMistakes:
    es:
      - Aplicar F_D = bv a objetos grandes o rápidos donde el régimen es cuadrático.
      - Confundir b (N·s/m) con μ (coeficiente de rozamiento, adimensional).
      - Ignorar que b depende de la viscosidad del fluido η y del tamaño del objeto.
    en:
      - Applying F_D = bv to large or fast objects where the quadratic regime dominates.
      - Confusing b (N·s/m) with μ (friction coefficient, dimensionless).
      - Ignoring that b depends on the fluid viscosity η and the object size.

dcl:
  title:
    es: DCL · Arrastre Lineal
    en: FBD · Linear Drag
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - F_D = b·v (arrastre lineal de Stokes, opuesto al movimiento)
    en:
      - W = m·g (weight, downward)
      - F_D = b·v (linear Stokes drag, opposing motion)
  object:
    es: objeto pequeño cayendo en fluido viscoso a Re < 1 (esfera en aceite, glóbulo en plasma)
    en: small object falling in a viscous fluid at Re < 1 (sphere in oil, blood cell in plasma)
  freeBodyCondition:
    es: El DCL muestra W hacia abajo y F_D = bv hacia arriba. La magnitud de F_D aumenta linealmente con v hasta igualar W.
    en: The FBD shows W downward and F_D = bv upward. The magnitude of F_D increases linearly with v until it equals W.
  equilibriumCondition:
    es: "Velocidad terminal: b·v_t = m·g → v_t = mg/b."
    en: "Terminal velocity: b·v_t = m·g → v_t = mg/b."
  netForce:
    es: "ΣF = mg − bv. Para v < v_t: ΣF > 0. Para v = v_t: ΣF = 0."
    en: "ΣF = mg − bv. For v < v_t: ΣF > 0. For v = v_t: ΣF = 0."
  accelerationDirection:
    es: La aceleración a = g − (b/m)v decrece linealmente con v, siendo cero en v_t.
    en: The acceleration a = g − (b/m)v decreases linearly with v, reaching zero at v_t.
  referenceFrameChoice:
    es: "Eje +y hacia abajo para que W > 0 y F_D < 0."
    en: "+y axis downward so that W > 0 and F_D < 0."
  forceTypes:
    es:
      - W = m·g (gravitacional)
      - F_D = bv (arrastre viscoso lineal, disipativa)
    en:
      - W = m·g (gravitational)
      - F_D = bv (linear viscous drag, dissipative)
  signConvention:
    es: W positivo. F_D negativo (opuesto al movimiento de caída).
    en: W positive. F_D negative (opposing falling motion).
  relation:
    es: El DCL con arrastre lineal muestra que la fuerza de Stokes crece linealmente con v hasta alcanzar el equilibrio dinámico a v_t = mg/b.
    en: The FBD with linear drag shows that the Stokes force grows linearly with v until reaching dynamic equilibrium at v_t = mg/b.
  readingFocus:
    es: leer W y F_D = bv, verificar equilibrio W = bv_t e identificar la constante de tiempo τ = m/b.
    en: read W and F_D = bv, verify equilibrium W = bv_t and identify the time constant τ = m/b.
  agentHints:
    es:
      - "La solución temporal es v(t) = v_t(1 − e^(−t/τ)): exponencial con asíntota v_t."
      - A v = 0 la aceleración es máxima (g). A v = v_t la aceleración es cero.
      - En el DCL a velocidad terminal, las dos flechas (W y F_D) son iguales en módulo.
    en:
      - "The time-domain solution is v(t) = v_t(1 − e^(−t/τ)): exponential with asymptote v_t."
      - At v = 0 the acceleration is maximum (g). At v = v_t the acceleration is zero.
      - In the FBD at terminal velocity, the two arrows (W and F_D) are equal in magnitude.
  commonMistakes:
    es:
      - Dibujar F_D con el mismo sentido que el movimiento.
      - Usar la fórmula cuadrática v_t = √(2mg/(ρC_D A)) en lugar de v_t = mg/b.
      - Olvidar que b tiene unidades N·s/m (no es adimensional).
    en:
      - Drawing F_D in the same direction as motion.
      - Using the quadratic formula v_t = √(2mg/(ρC_D A)) instead of v_t = mg/b.
      - Forgetting that b has units N·s/m (not dimensionless).
