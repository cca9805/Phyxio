version: 1
magnitudes:
  - id: F_d
    symbol: F_d
    nombre:
      es: fuerza de arrastre
      en: Drag force
    descripcion:
      es: Fuerza resistiva ejercida por el fluido sobre el cuerpo.
      en: Resistive force exerted by the fluid on the body.
    unidad_si: N
    dimension: LMT^{-2}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-lineal
    common_mistake: Tratar F_d como una fuerza motriz y no como una resistencia opuesta al movimiento.
    typical_range: Depende del tamano del objeto, del fluido y de la rapidez.
    sign_behavior:
      has_sign: false
      meaning:
        es: En las ecuaciones del leaf suele usarse el modulo; la direccion real se opone a v.
        en: The leaf usually uses the magnitude; the actual direction opposes v.
    zero_behavior:
      allowed: true
      meaning:
        es: Si v es cero, el arrastre lineal ideal tambien se anula.
        en: If v is zero, ideal linear drag also vanishes.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-lineal
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Antes de sustituir, decide si F_d se lee como modulo o como componente con signo.
  - id: b
    symbol: b
    nombre:
      es: coeficiente_lineal_de_arrastre
      en: Linear drag coefficient
    descripcion:
      es: Parametro que mide cuanta resistencia ofrece el fluido por unidad de rapidez.
      en: Parameter measuring how much resistance the fluid offers per unit speed.
    unidad_si: N*s/m
    dimension: MT^{-1}
    is_vector: false
    components: null
    category: model_parameter
    physical_role: physical_quantity
    used_in:
      - arrastre-lineal
    common_mistake: Pensar que b depende solo del cuerpo y no tambien del fluido y del regimen.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: b debe ser no negativo en el modelo fisico.
        en: b must be nonnegative in the physical model.
    zero_behavior:
      allowed: true
      meaning:
        es: b = 0 equivaldria a ausencia de arrastre, fuera del foco del leaf.
        en: b = 0 would mean no drag, outside the leaf's focus.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-lineal
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: b resume viscosidad, tamano efectivo y geometria mientras el modelo siga siendo lineal.
  - id: v
    symbol: v
    nombre:
      es: rapidez_relativa
      en: Relative speed
    descripcion:
      es: Rapidez del cuerpo respecto del fluido circundante.
      en: Speed of the body relative to the surrounding fluid.
    unidad_si: m/s
    dimension: LT^{-1}
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-lineal
    common_mistake: Usar la velocidad respecto al suelo aunque el fluido tambien se mueva.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: Aqui se usa la rapidez; el sentido se recupera aparte en el DCL.
        en: The leaf uses speed magnitude; direction is handled separately in the FBD.
    zero_behavior:
      allowed: true
      meaning:
        es: v = 0 implica F_d = 0 en el modelo lineal ideal.
        en: v = 0 implies F_d = 0 in the ideal linear model.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-lineal
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: Siempre pregunta respecto a que medio se esta midiendo v.
  - id: m
    symbol: m
    nombre:
      es: masa
      en: Mass
    descripcion:
      es: Masa inercial del cuerpo.
      en: Inertial mass of the body.
    unidad_si: kg
    dimension: M
    is_vector: false
    components: null
    category: fundamental
    physical_role: physical_quantity
    used_in:
      - arrastre-lineal
    common_mistake: Olvidar que m no cambia el arrastre instantaneo si b y v ya estan fijados.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: La masa se toma no negativa.
        en: Mass is taken as nonnegative.
    zero_behavior:
      allowed: false
      meaning:
        es: m = 0 no tiene interpretacion fisica en este contexto.
        en: m = 0 has no physical interpretation in this context.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for: []
      secondary_for:
        - arrastre-lineal
    graph_binding:
      channels: []
    pedagogical_notes: m entra sobre todo al discutir escalas temporales y respuesta dinamica.
  - id: tau
    symbol: tau
    nombre:
      es: tiempo_caracteristico
      en: Characteristic time
    descripcion:
      es: Escala temporal asociada a la adaptacion de la velocidad bajo arrastre lineal.
      en: Time scale associated with velocity adjustment under linear drag.
    unidad_si: s
    dimension: T
    is_vector: false
    components: null
    category: derived
    physical_role: physical_quantity
    used_in:
      - arrastre-lineal
    common_mistake: Confundir tau con el tiempo total del movimiento.
    typical_range: Context-dependent
    sign_behavior:
      has_sign: false
      meaning:
        es: tau debe ser positiva si m y b son fisicos.
        en: tau must be positive if m and b are physical.
    zero_behavior:
      allowed: false
      meaning:
        es: tau = 0 implicaria ajuste instantaneo, fuera del modelo ordinario.
        en: tau = 0 would imply instantaneous adjustment, outside the ordinary model.
    value_nature:
      kind: scalar
      nonnegative_only: true
      expected_interval: Context-dependent
    interpretation_role:
      primary_for:
        - arrastre-lineal
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes: tau ayuda a pasar de una lectura estatica del arrastre a una lectura dinamica del modelo.

