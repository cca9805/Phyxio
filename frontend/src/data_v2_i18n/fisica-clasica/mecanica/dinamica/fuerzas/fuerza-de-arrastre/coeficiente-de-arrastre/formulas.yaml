version: 1
formulas:
- id: arrastre_cuadratico_estandar
  title:
    es: Fuerza de arrastre con coeficiente de arrastre
    en: Drag force using drag coefficient
  equation: F_d = 0.5*rho*C_d*A*v^2
  latex: F_d = \frac{1}{2} \rho C_d A v^2
  rearrangements:
  - target: F_d
    equation: F_d = 0.5*rho*C_d*A*v^2
    latex: F_d = \frac{1}{2} \rho C_d A v^2
    constraints:
    - expr: rho >= 0 && C_d >= 0 && A >= 0
      message:
        es: rho >= 0 && C_d >= 0 && A >= 0
        en: rho >= 0 && C_d >= 0 && A >= 0
  - target: C_d
    equation: C_d = 2*F_d/(rho*A*v^2)
    latex: C_d = \frac{2 F_d}{\rho A v^2}
    constraints:
    - expr: rho > 0 && A > 0 && v != 0
      message:
        es: rho > 0 && A > 0 && v != 0
        en: rho > 0 && A > 0 && v != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en coeficiente de arrastre.
    en: Relacion fisica usada en coeficiente de arrastre.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - coeficiente-de-arrastre
  interpretation_tags:
  - coeficiente-de-arrastre
  result_semantics:
    target: F_d
    meaning: Resulta util para interpretar F_d en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, && meaning of the result.
- id: potencia_de_arrastre
  title:
    es: Potencia necesaria para vencer el arrastre
    en: Power needed to overcome drag
  equation: P_d = F_d*v
  latex: P_d = F_d v
  rearrangements:
  - target: P_d
    equation: P_d = F_d*v
    latex: P_d = F_d v
    constraints: []
  - target: F_d
    equation: F_d = P_d/v
    latex: F_d = \frac{P_d}{v}
    constraints:
    - expr: v != 0
      message:
        es: v != 0
        en: v != 0
