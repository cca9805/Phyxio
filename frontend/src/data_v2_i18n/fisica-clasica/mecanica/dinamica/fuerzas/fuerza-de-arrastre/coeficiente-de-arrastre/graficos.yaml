version: "1.0"
leaf: "coeficiente-de-arrastre"

coord:
  title:
    es: Gráfica Coord · Coeficiente de Arrastre
    en: Coord Graph · Drag Coefficient
  xAxis:
    es: número de Reynolds Re
    en: Reynolds number Re
  yAxis:
    es: coeficiente de arrastre C_D
    en: drag coefficient C_D
  xMagnitude: Re
  yMagnitude: C_D
  relation:
    es: "C_D depende de Re y la forma del cuerpo: a Re bajo (< 1) C_D ≈ 24/Re (Stokes); a Re medio hay transición; a Re alto (> 10³) C_D ≈ constante (~0.47 para esfera)."
    en: "C_D depends on Re and body shape: at low Re (< 1) C_D ≈ 24/Re (Stokes); at intermediate Re there is a transition; at high Re (> 10³) C_D ≈ constant (~0.47 for a sphere)."
  physicalReading:
    es: A Re bajo el arrastre es viscoso (C_D alto, proporcional a 1/Re). A Re alto el arrastre es inercial (C_D aproximadamente constante). La crisis de arrastre ocurre cerca de Re ≈ 5×10⁵ (esfera).
    en: At low Re drag is viscous (C_D high, proportional to 1/Re). At high Re drag is inertial (C_D approximately constant). The drag crisis occurs near Re ≈ 5×10⁵ (sphere).
  slopeMeaning:
    es: A Re < 1 la pendiente de C_D vs Re en escala logarítmica es −1 (ley de Stokes C_D = 24/Re).
    en: At Re < 1 the slope of C_D vs Re on a log scale is −1 (Stokes law C_D = 24/Re).
  interceptMeaning:
    es: En la escala logarítmica, el intercepto determina el prefactor de la ley de arrastre en cada régimen.
    en: On the logarithmic scale, the intercept determines the prefactor of the drag law in each regime.
  curvatureMeaning:
    es: "La curva C_D vs Re tiene distintos regímenes: decreciente (Stokes), transición, meseta (turbulento) y caída abrupta (crisis de arrastre)."
    en: "The C_D vs Re curve has distinct regimes: decreasing (Stokes), transition, plateau (turbulent), and abrupt drop (drag crisis)."
  signMeaning:
    es: "C_D es siempre positivo: es una magnitud escalar que multiplica ½ρAv²."
    en: "C_D is always positive: it is a scalar multiplying ½ρAv²."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Re puede variar desde 10⁻³ (bacterias) hasta 10⁷ (aviones). Cada régimen tiene su correlación empírica.
    en: Re can range from 10⁻³ (bacteria) to 10⁷ (aircraft). Each regime has its empirical correlation.
  modelConnection:
    es: Se interpreta bajo la definición de Re = ρvL/μ y la expresión F_D = ½C_D ρAv².
    en: Interpreted under the definition Re = ρvL/μ and the expression F_D = ½C_D ρAv².
  formulaConnection:
    es: "Conecta con F_D = ½C_D ρAv², Re = ρvL/μ y, para esferas: C_D ≈ 24/Re (Re < 1), C_D ≈ 0.47 (Re > 10³)."
    en: "Connects to F_D = ½C_D ρAv², Re = ρvL/μ, and for spheres: C_D ≈ 24/Re (Re < 1), C_D ≈ 0.47 (Re > 10³)."
  readingFocus:
    es: leer el régimen de Re, identificar el valor de C_D en ese régimen y calcular la fuerza de arrastre.
    en: read the Re regime, identify the C_D value in that regime, and compute the drag force.
  agentHints:
    es:
      - "Para calcular Re: Re = ρvL/μ donde L es la longitud característica (diámetro para esfera)."
      - La crisis de arrastre (caída de C_D a Re ≈ 5×10⁵) explica la caída de la pelota de golf con hoyuelos.
      - "C_D es adimensional: solo depende del número de Reynolds y la geometría del cuerpo."
    en:
      - "To compute Re: Re = ρvL/μ where L is the characteristic length (diameter for a sphere)."
      - The drag crisis (C_D drop at Re ≈ 5×10⁵) explains why golf balls have dimples.
      - "C_D is dimensionless: it depends only on the Reynolds number and body geometry."
  commonMistakes:
    es:
      - Usar C_D constante sin verificar en qué régimen de Re se está.
      - Confundir Re (adimensional) con la velocidad v.
      - Ignorar que C_D depende fuertemente de la forma del cuerpo (esfera ≠ cubo ≠ perfil aerodinámico).
    en:
      - Using a constant C_D without verifying the Re regime.
      - Confusing Re (dimensionless) with velocity v.
      - Ignoring that C_D strongly depends on body shape (sphere ≠ cube ≠ aerodynamic profile).

svg:
  title:
    es: Escena SVG · Coeficiente de Arrastre
    en: SVG Scene · Drag Coefficient
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: coeficiente_arrastre_scene
  sceneLabel:
    es: Cuerpo en fluido con líneas de flujo laminar o turbulento según el régimen de Re
    en: Body in fluid with laminar or turbulent flow lines depending on the Re regime
  objects:
    es:
      - cuerpo (esfera, cilindro u otra forma)
      - líneas de flujo alrededor del cuerpo
      - zona de estela (wake) turbulenta
    en:
      - body (sphere, cylinder, or other shape)
      - flow lines around the body
      - turbulent wake zone
  mainObject:
    es: cuerpo en fluido con patrón de flujo que determina C_D
    en: body in fluid with flow pattern that determines C_D
  referenceFrame:
    es: marco del fluido en reposo con el cuerpo moviéndose (o equivalentemente, fluido moviéndose y cuerpo en reposo)
    en: frame with fluid at rest and body moving (or equivalently, fluid moving and body at rest)
  geometry:
    es: La escena muestra el cuerpo con las líneas de flujo adheridas (Re bajo) o separadas con estela turbulenta (Re alto), y las zonas de presión diferencial que generan la fuerza de arrastre.
    en: The scene shows the body with attached flow lines (low Re) or separated lines with a turbulent wake (high Re), and the pressure differential zones generating the drag force.
  interactions:
    es: La diferencia de presión entre la parte delantera y trasera del cuerpo, más la fricción viscosa en la capa límite, generan la fuerza de arrastre total.
    en: The pressure difference between the front and rear of the body, plus viscous friction in the boundary layer, generate the total drag force.
  modelElements:
    es:
      - líneas de flujo (streamlines)
      - zona de separación o estela
      - capa límite (boundary layer)
      - presión dinámica en frente y estela
    en:
      - flow lines (streamlines)
      - separation zone or wake
      - boundary layer
      - dynamic pressure at front and wake
  visualCues:
    es:
      - "Líneas adheridas = flujo laminar (Re bajo): menor arrastre de presión."
      - "Estela turbulenta ancha = Re alto: mayor arrastre de presión."
      - La forma aerodinámica reduce la estela y con ella C_D.
    en:
      - "Attached lines = laminar flow (low Re): lower pressure drag."
      - "Wide turbulent wake = high Re: greater pressure drag."
      - Streamlined shape reduces the wake and thus C_D.
  scaleMeaning:
    es: "El tamaño de la estela es indicativo del arrastre de presión: estela mayor implica mayor C_D."
    en: "The wake size is indicative of pressure drag: a larger wake implies a larger C_D."
  relation:
    es: La escena ilustra cómo la forma del cuerpo y el patrón de flujo determinan visualmente el coeficiente de arrastre C_D.
    en: The scene illustrates how the body shape and flow pattern visually determine the drag coefficient C_D.
  physicalReading:
    es: Identificar si el flujo es laminar (adherido) o turbulento (separado) para estimar el régimen y C_D correspondiente.
    en: Identify whether the flow is laminar (attached) or turbulent (separated) to estimate the regime and corresponding C_D.
  modelConnection:
    es: Se interpreta bajo la teoría de capas límite y arrastre de presión vs arrastre viscoso.
    en: Interpreted under boundary layer theory and pressure drag vs viscous drag.
  formulaConnection:
    es: Conecta con F_D = ½C_D ρAv² y Re = ρvL/μ.
    en: Connects to F_D = ½C_D ρAv² and Re = ρvL/μ.
  readingFocus:
    es: identificar el patrón de flujo, estimar el régimen de Re y asociar la geometría de la estela con el valor de C_D.
    en: identify the flow pattern, estimate the Re regime, and associate the wake geometry with the C_D value.
  agentHints:
    es:
      - Un cuerpo esférico tiene C_D ≈ 0.47 en Re alto; un perfil aerodinámico puede tener C_D < 0.05.
      - La transición laminar-turbulento en la capa límite puede reducir drásticamente C_D (crisis de arrastre).
      - Los hoyuelos de la pelota de golf inducen turbulencia en la capa límite, reduciendo la estela.
    en:
      - A spherical body has C_D ≈ 0.47 at high Re; an aerodynamic profile can have C_D < 0.05.
      - The laminar-turbulent transition in the boundary layer can drastically reduce C_D (drag crisis).
      - Golf ball dimples induce turbulence in the boundary layer, reducing the wake.
  commonMistakes:
    es:
      - Pensar que un cuerpo más grande siempre tiene mayor C_D (C_D es adimensional, no depende del tamaño).
      - Confundir arrastre de presión (wake) con arrastre viscoso (capa límite).
      - Ignorar que C_D depende del régimen de flujo, no solo de la forma.
    en:
      - Thinking a larger body always has a larger C_D (C_D is dimensionless, independent of size).
      - Confusing pressure drag (wake) with viscous drag (boundary layer).
      - Ignoring that C_D depends on the flow regime, not just the shape.
