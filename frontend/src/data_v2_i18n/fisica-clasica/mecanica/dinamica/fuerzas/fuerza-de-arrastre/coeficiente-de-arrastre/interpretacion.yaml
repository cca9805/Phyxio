version: 2
id: interpretacion-coeficiente-de-arrastre
leaf_id: coeficiente-de-arrastre
nombre:
  es: Interpretacion de Coeficiente de arrastre
  en: Interpretation of Drag Coefficient
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: fuerza-de-arrastre
  ruta_relativa: fisica-clasica/mecanica/dinamica/fuerzas/fuerza-de-arrastre/coeficiente-de-arrastre
dependencies:
  formulas:
  - arrastre_cuadratico_estandar
  - potencia_de_arrastre
  magnitudes:
  - F_d
  - C_d
  - rho
  - A
  - v
  - P_d
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  F_d:
    summary_rules:
    - id: F_d_summary
      when: 'true'
      status: info
      text:
        es: F_d resume el costo instantaneo con el que el fluido se opone al avance.
        en: F_d summarizes the instantaneous cost with which the fluid opposes motion.
    coherence_rules:
    - id: F_d_coherence
      when: 'true'
      status: ok
      text:
        es: Si suben rho, C_d, A o v, F_d no deberia bajar dentro del mismo modelo.
        en: If rho, C_d, A, or v rise, F_d should not decrease inside the same model.
    physical_reading_rules:
    - id: F_d_physical
      when: 'true'
      status: info
      text:
        es: Un F_d grande indica que el cuerpo entrega mucho momento al fluido por culpa de su forma y su rapidez.
        en: A large F_d means the body is giving a large amount of momentum to the fluid because of its shape and speed.
    model_validity_rules:
    - id: F_d_validity
      when: 'true'
      status: ok
      text:
        es: Interpreta F_d solo si el area de referencia y el regimen de flujo han sido fijados con claridad.
        en: Interpret F_d only if the reference area and the flow regime have been fixed clearly.
    graph_rules:
    - id: F_d_graph
      when: 'true'
      status: info
      text:
        es: En la grafica, F_d debe crecer cuando la forma penaliza mas o la rapidez aumenta.
        en: In the graph, F_d should grow when the shape penalizes more or speed increases.
    likely_errors:
    - id: F_d_warn
      when: 'true'
      status: warning
      text:
        es: No confundas una reduccion de F_d con una reduccion de peso o masa; aqui el cambio puede venir solo de la forma.
        en: Do not confuse a drop in F_d with a drop in weight or mass; here the change may come only from shape.
    next_step_rules:
    - id: F_d_next
      when: 'true'
      status: info
      text:
        es: Usa F_d para enlazar con P_d si quieres saber el costo energetico de esa configuracion.
        en: Use F_d to connect with P_d if you want the energetic cost of that configuration.
  C_d:
    summary_rules:
    - id: C_d_summary
      when: 'true'
      status: info
      text:
        es: C_d resume cuanto castiga la forma del cuerpo la aparicion de una estela resistente.
        en: C_d summarizes how strongly body shape penalizes the flow by creating a resistant wake.
    coherence_rules:
    - id: C_d_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que un C_d mayor implique mayor F_d si rho, A y v se mantienen.
        en: Check that a larger C_d implies a larger F_d when rho, A, and v are kept fixed.
    physical_reading_rules:
    - id: C_d_physical
      when: 'true'
      status: info
      text:
        es: Un C_d pequeno sugiere una forma que separa menos el flujo; uno grande sugiere una estela mas costosa.
        en: A small C_d suggests a shape that separates the flow less; a large one suggests a costlier wake.
    model_validity_rules:
    - id: C_d_validity
      when: 'true'
      status: ok
      text:
        es: Trata C_d como constante solo si la postura, el Reynolds y el area de referencia no cambian de forma relevante.
        en: Treat C_d as constant only if posture, Reynolds, and reference area do not change significantly.
    graph_rules:
    - id: C_d_graph
      when: 'true'
      status: info
      text:
        es: En el SVG, C_d debe distinguir formas afinadas, intermedias y romas mediante la estela.
        en: In the SVG, C_d should distinguish streamlined, intermediate, and blunt shapes through the wake.
    likely_errors:
    - id: C_d_warn
      when: 'true'
      status: warning
      text:
        es: No reutilices C_d de otra postura o de otro rango de velocidad sin justificarlo.
        en: Do not reuse C_d from another posture or speed range without justification.
    next_step_rules:
    - id: C_d_next
      when: 'true'
      status: info
      text:
        es: Usa C_d para comparar disenos si la pregunta real es que forma conviene.
        en: Use C_d to compare designs if the real question is which shape is preferable.
  P_d:
    summary_rules:
    - id: P_d_summary
      when: 'true'
      status: info
      text:
        es: P_d resume cuanta potencia exige vencer el arrastre a la velocidad considerada.
        en: P_d summarizes how much power is required to overcome drag at the chosen speed.
    coherence_rules:
    - id: P_d_coherence
      when: 'true'
      status: ok
      text:
        es: Si F_d es positiva y v aumenta, P_d no deberia mantenerse casi fija.
        en: If F_d is positive and v increases, P_d should not remain almost fixed.
    physical_reading_rules:
    - id: P_d_physical
      when: 'true'
      status: info
      text:
        es: Una P_d grande revela que la forma no solo produce fuerza, sino un costo energetico muy serio.
        en: A large P_d reveals that the shape is not only producing force, but a serious energetic cost.
    model_validity_rules:
    - id: P_d_validity
      when: 'true'
      status: ok
      text:
        es: Interpreta P_d con cuidado si la velocidad no es casi estacionaria o si cambia mucho el regimen.
        en: Interpret P_d carefully if speed is not nearly steady or if the regime changes strongly.
    graph_rules:
    - id: P_d_graph
      when: 'true'
      status: info
      text:
        es: En Coord, P_d debe crecer aun mas deprisa que F_d cuando v aumenta.
        en: In Coord, P_d should grow even faster than F_d when v increases.
    likely_errors:
    - id: P_d_warn
      when: 'true'
      status: warning
      text:
        es: No cierres el problema con un buen C_d si la potencia sigue siendo incompatible con el objetivo del sistema.
        en: Do not finish the problem with a nice C_d if the power is still incompatible with the system goal.
    next_step_rules:
    - id: P_d_next
      when: 'true'
      status: info
      text:
        es: Usa P_d para decidir si una mejora de forma merece la pena en consumo o rendimiento.
        en: Use P_d to decide whether a shape improvement is worth it in consumption or performance.
