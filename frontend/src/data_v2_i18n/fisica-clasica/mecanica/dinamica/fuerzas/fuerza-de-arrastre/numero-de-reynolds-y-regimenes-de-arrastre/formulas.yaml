version: 1
formulas:
- id: reynolds_viscosidad_dinamica
  title:
    es: Numero de Reynolds con viscosidad dinamica
    en: Reynolds number with dynamic viscosity
  equation: Re = rho*v*L/eta
  latex: Re = \frac{\rho v L}{\eta}
  rearrangements:
  - target: Re
    equation: Re = rho*v*L/eta
    latex: Re = \frac{\rho v L}{\eta}
    constraints:
    - expr: eta != 0
      message:
        es: eta != 0
        en: eta != 0
  - target: v
    equation: v = Re*eta/(rho*L)
    latex: v = \frac{Re \eta}{\rho L}
    constraints:
    - expr: rho != 0 && L != 0
      message:
        es: rho != 0 && L != 0
        en: rho != 0 && L != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en numero de reynolds y regimenes de arrastre.
    en: Relacion fisica usada en numero de reynolds y regimenes de arrastre.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
