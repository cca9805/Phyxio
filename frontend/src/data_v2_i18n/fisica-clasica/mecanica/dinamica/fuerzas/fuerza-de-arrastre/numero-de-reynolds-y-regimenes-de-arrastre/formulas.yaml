  equation: Re = v*L/nu
  latex: Re = \frac{v L}{\nu}
  rearrangements:
  - target: Re
    equation: Re = v*L/nu
    latex: Re = \frac{v L}{\nu}
    constraints:
    - expr: nu != 0
      message:
        es: nu != 0
        en: nu != 0
  - target: nu
    equation: nu = v*L/Re
    latex: \nu = \frac{v L}{Re}
