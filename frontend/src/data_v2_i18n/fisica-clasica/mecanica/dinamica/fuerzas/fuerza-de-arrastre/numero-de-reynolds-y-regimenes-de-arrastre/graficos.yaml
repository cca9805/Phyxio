version: "1.0"
leaf: "numero-de-reynolds-y-regimenes-de-arrastre"

coord:
  title:
    es: Gráfica Coord · Número de Reynolds y Regímenes de Arrastre
    en: Coord Graph · Reynolds Number and Drag Regimes
  xAxis:
    es: número de Reynolds Re
    en: Reynolds number Re
  yAxis:
    es: coeficiente de arrastre C_D
    en: drag coefficient C_D
  xMagnitude: Re
  yMagnitude: C_D
  relation:
    es: "Re = ρvL/μ determina el régimen de flujo y el valor de C_D. Régimen laminar (Re < 2300 en tuberías, Re < ~1 para esferas): C_D ≈ 24/Re. Régimen turbulento (Re > 4000): C_D ≈ constante. Zona de transición entre ambos."
    en: "Re = ρvL/μ determines the flow regime and C_D value. Laminar regime (Re < 2300 in pipes, Re < ~1 for spheres): C_D ≈ 24/Re. Turbulent regime (Re > 4000): C_D ≈ constant. Transition zone in between."
  physicalReading:
    es: "A Re bajo: flujo laminar ordenado, arrastre viscoso dominante, C_D alto. A Re alto: flujo turbulento, arrastre de presión dominante, C_D aproximadamente constante."
    en: "At low Re: ordered laminar flow, viscous drag dominant, C_D high. At high Re: turbulent flow, pressure drag dominant, C_D approximately constant."
  slopeMeaning:
    es: En escala log-log, la pendiente es −1 en el régimen de Stokes (C_D ∝ Re⁻¹) y ≈ 0 en el régimen turbulento.
    en: On a log-log scale, the slope is −1 in the Stokes regime (C_D ∝ Re⁻¹) and ≈ 0 in the turbulent regime.
  interceptMeaning:
    es: El nivel de la meseta turbulenta (C_D ≈ 0.47 para esfera) depende de la geometría del cuerpo.
    en: The plateau level in the turbulent regime (C_D ≈ 0.47 for a sphere) depends on body geometry.
  curvatureMeaning:
    es: La transición de régimen laminar a turbulento ocurre en la zona de curva pronunciada. La crisis de arrastre es la caída abrupta cerca de Re ≈ 5×10⁵.
    en: The transition from laminar to turbulent occurs in the steep curve region. The drag crisis is the abrupt drop near Re ≈ 5×10⁵.
  signMeaning:
    es: C_D y Re son siempre positivos (magnitudes adimensionales).
    en: C_D and Re are always positive (dimensionless quantities).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Re puede cubrir más de 10 órdenes de magnitud: desde bacterias (Re ≈ 10⁻⁵) hasta cohetes (Re ≈ 10⁸)."
    en: "Re can span more than 10 orders of magnitude: from bacteria (Re ≈ 10⁻⁵) to rockets (Re ≈ 10⁸)."
  modelConnection:
    es: "Se interpreta bajo la teoría de similitud hidrodinámica: cuerpos geométricamente similares con igual Re tienen el mismo C_D."
    en: "Interpreted under hydrodynamic similarity theory: geometrically similar bodies with equal Re have the same C_D."
  formulaConnection:
    es: "Conecta con Re = ρvL/μ, F_D = ½C_D ρAv², y las correlaciones: C_D = 24/Re (Stokes), C_D ≈ 0.47 (esfera turbulenta)."
    en: "Connects to Re = ρvL/μ, F_D = ½C_D ρAv², and correlations: C_D = 24/Re (Stokes), C_D ≈ 0.47 (turbulent sphere)."
  readingFocus:
    es: identificar el régimen (laminar, transición, turbulento) a partir de Re y leer el valor correspondiente de C_D.
    en: identify the regime (laminar, transition, turbulent) from Re and read the corresponding C_D value.
  agentHints:
    es:
      - "Re < 1: régimen de Stokes; C_D = 24/Re. F_D = 3πμvd (ley de Stokes para esferas)."
      - "Re > 10³: régimen turbulento; C_D ≈ 0.47 (esfera), 1.05 (cubo), 0.04 (perfil alar)."
      - La similitud de Reynolds permite escalar resultados de túnel de viento a la escala real.
    en:
      - "Re < 1: Stokes regime; C_D = 24/Re. F_D = 3πμvd (Stokes law for spheres)."
      - "Re > 10³: turbulent regime; C_D ≈ 0.47 (sphere), 1.05 (cube), 0.04 (airfoil)."
      - Reynolds similarity allows scaling wind tunnel results to full scale.
  commonMistakes:
    es:
      - Usar la misma C_D constante sin verificar el régimen de Re del problema.
      - Confundir el número de Reynolds de tubería (Re_critico ≈ 2300) con el de objetos en fluido libre.
      - Ignorar que Re depende de la viscosidad cinemática del fluido, que varía con la temperatura.
    en:
      - Using the same constant C_D without verifying the Re regime of the problem.
      - Confusing pipe Reynolds number (Re_critical ≈ 2300) with that of objects in free fluid.
      - Ignoring that Re depends on the kinematic viscosity of the fluid, which varies with temperature.

svg:
  title:
    es: Escena SVG · Número de Reynolds y Regímenes de Arrastre
    en: SVG Scene · Reynolds Number and Drag Regimes
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: reynolds_regimenes_scene
  sceneLabel:
    es: Comparación visual de flujo laminar (Re bajo) vs turbulento (Re alto) alrededor de un cuerpo
    en: Visual comparison of laminar flow (low Re) vs turbulent flow (high Re) around a body
  objects:
    es:
      - cuerpo (esfera o cilindro)
      - líneas de flujo laminares (paralelas y adheridas)
      - líneas de flujo turbulentas (separadas, con estela)
      - zona de recirculación en la estela
    en:
      - body (sphere or cylinder)
      - laminar flow lines (parallel and attached)
      - turbulent flow lines (separated, with wake)
      - recirculation zone in the wake
  mainObject:
    es: cuerpo en fluido con régimen de flujo dependiente de Re
    en: body in fluid with flow regime depending on Re
  referenceFrame:
    es: marco de referencia del laboratorio con el fluido moviéndose
    en: laboratory reference frame with fluid moving
  geometry:
    es: "La escena compara dos casos: flujo laminar (Re bajo) con líneas adheridas y pequeña estela vs flujo turbulento (Re alto) con líneas separadas y gran estela."
    en: "The scene compares two cases: laminar flow (low Re) with attached lines and small wake vs turbulent flow (high Re) with separated lines and large wake."
  interactions:
    es: "A Re bajo: arrastre viscoso (tensión superficial) dominante. A Re alto: arrastre de presión (diferencia entre frente y estela) dominante."
    en: "At low Re: viscous (surface tension) drag dominant. At high Re: pressure drag (difference between front and wake) dominant."
  modelElements:
    es:
      - líneas de corriente (streamlines)
      - capa límite (boundary layer)
      - punto de separación de la capa límite
      - zona de estela turbulenta
    en:
      - streamlines
      - boundary layer
      - boundary layer separation point
      - turbulent wake zone
  visualCues:
    es:
      - Líneas adheridas y simétricas → Re bajo, C_D alto (régimen viscoso).
      - Estela ancha y asimétrica → Re alto, C_D en meseta (régimen turbulento).
      - La separación de la capa límite determina el tamaño de la estela y por tanto C_D.
    en:
      - Attached, symmetric lines → low Re, high C_D (viscous regime).
      - Wide, asymmetric wake → high Re, C_D plateau (turbulent regime).
      - Boundary layer separation determines the wake size and thus C_D.
  scaleMeaning:
    es: El tamaño de la estela es proporcional al arrastre de presión. Estela mayor → mayor C_D.
    en: Wake size is proportional to pressure drag. Larger wake → larger C_D.
  relation:
    es: La escena ilustra cómo el patrón de flujo alrededor del cuerpo determina el régimen de arrastre según el número de Reynolds.
    en: The scene illustrates how the flow pattern around the body determines the drag regime according to the Reynolds number.
  physicalReading:
    es: Identificar si el flujo es laminar (adherido, simétrico) o turbulento (separado, con estela) para estimar el régimen de Re y el valor de C_D.
    en: Identify whether the flow is laminar (attached, symmetric) or turbulent (separated, with wake) to estimate the Re regime and C_D value.
  modelConnection:
    es: Se interpreta bajo la teoría de capa límite y los regímenes de Stokes vs inercial.
    en: Interpreted under boundary layer theory and Stokes vs inertial regimes.
  formulaConnection:
    es: Conecta con Re = ρvL/μ, F_D = ½C_D ρAv², y C_D(Re) de la curva experimental.
    en: Connects to Re = ρvL/μ, F_D = ½C_D ρAv², and C_D(Re) from the experimental curve.
  readingFocus:
    es: identificar el patrón de flujo, estimar el régimen y asociar con el valor de C_D en la curva C_D vs Re.
    en: identify the flow pattern, estimate the regime, and associate with the C_D value on the C_D vs Re curve.
  agentHints:
    es:
      - "Flujo laminar: C_D ∝ 1/Re (régimen Stokes). Flujo turbulento: C_D ≈ constante."
      - La crisis de arrastre (reducción brusca de C_D) ocurre cuando la capa límite transiciona antes de separarse.
      - La turbulencia prematura en la capa límite (hoyuelos del golf) retrasa la separación y reduce la estela.
    en:
      - "Laminar flow: C_D ∝ 1/Re (Stokes regime). Turbulent flow: C_D ≈ constant."
      - The drag crisis (sudden C_D reduction) occurs when the boundary layer transitions before separating.
      - Premature turbulence in the boundary layer (golf dimples) delays separation and reduces the wake.
  commonMistakes:
    es:
      - Confundir la turbulencia en la capa límite (que puede reducir C_D) con la turbulencia en la estela.
      - Pensar que mayor velocidad siempre implica mayor C_D (la crisis de arrastre lo puede reducir).
      - Ignorar que la escena es 2D; en 3D hay efectos adicionales de resistencia inducida.
    en:
      - Confusing turbulence in the boundary layer (which can reduce C_D) with turbulence in the wake.
      - Thinking higher velocity always means higher C_D (the drag crisis can reduce it).
      - Ignoring that the scene is 2D; in 3D there are additional induced drag effects.
