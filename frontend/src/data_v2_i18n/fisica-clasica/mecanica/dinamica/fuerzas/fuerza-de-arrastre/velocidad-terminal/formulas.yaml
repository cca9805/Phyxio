version: 1
formulas:
- id: velocidad_terminal_lineal
  title:
    es: Velocidad terminal con arrastre lineal
    en: Terminal velocity with linear drag
  equation: v_t = m*g/b
  latex: v_t = \frac{m g}{b}
  rearrangements:
  - target: v_t
    equation: v_t = m*g/b
    latex: v_t = \frac{m g}{b}
    constraints:
    - expr: b != 0
      message:
        es: b != 0
        en: b != 0
  - target: b
    equation: b = m*g/v_t
    latex: b = \frac{m g}{v_t}
    constraints:
    - expr: v_t != 0
      message:
        es: v_t != 0
        en: v_t != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en velocidad terminal.
    en: Relacion fisica usada en velocidad terminal.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - velocidad-terminal
  interpretation_tags:
  - velocidad-terminal
  result_semantics:
    target: v_t
    meaning: Resulta util para interpretar v_t en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, && meaning of the result.
- id: velocidad_terminal_cuadratica
  title:
    es: Velocidad terminal con arrastre cuadratico
    en: Terminal velocity with quadratic drag
  equation: v_t = sqrt(2*m*g/(rho*C_d*A))
  latex: v_t = \sqrt{\frac{2 m g}{\rho C_d A}}
  rearrangements:
  - target: v_t
    equation: v_t = sqrt(2*m*g/(rho*C_d*A))
    latex: v_t = \sqrt{\frac{2 m g}{\rho C_d A}}
    constraints:
    - expr: rho > 0 && C_d > 0 && A > 0
      message:
        es: rho > 0 && C_d > 0 && A > 0
        en: rho > 0 && C_d > 0 && A > 0
  - target: C_d
    equation: C_d = 2*m*g/(rho*A*v_t^2)
    latex: C_d = \frac{2 m g}{\rho A v_t^2}
    constraints:
    - expr: rho > 0 && A > 0 && v_t != 0
      message:
        es: rho > 0 && A > 0 && v_t != 0
        en: rho > 0 && A > 0 && v_t != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
