version: "1.0"
leaf: "velocidad-terminal"

coord:
  title:
    es: Gráfica Coord · Velocidad Terminal
    en: Coord Graph · Terminal Velocity
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  xMagnitude: t
  yMagnitude: v
  relation:
    es: "v(t) crece asintóticamente hasta la velocidad terminal v_t donde la fuerza de arrastre iguala el peso: F_D = W. Para arrastre lineal v_t = mg/b; para cuadrático v_t = √(2mg/(ρC_DA))."
    en: "v(t) grows asymptotically to terminal velocity v_t where drag equals weight: F_D = W. For linear drag v_t = mg/b; for quadratic drag v_t = √(2mg/(ρC_DA))."
  physicalReading:
    es: La curva v(t) crece con concavidad decreciente hasta la asíntota v_t. La tasa de crecimiento inicial es g (caída libre). Al acercarse a v_t, la aceleración tiende a cero.
    en: The v(t) curve grows with decreasing concavity to the asymptote v_t. The initial growth rate is g (free fall). As v approaches v_t, acceleration tends to zero.
  slopeMeaning:
    es: "La pendiente dv/dt = g − (b/m)·v (arrastre lineal): decrece desde g hasta cero al alcanzar v_t."
    en: "The slope dv/dt = g − (b/m)·v (linear drag): decreases from g to zero at v_t."
  interceptMeaning:
    es: "v(0) = 0 si el objeto parte del reposo. v(0) > 0 si tiene velocidad inicial."
    en: "v(0) = 0 if the object starts from rest. v(0) > 0 if it has an initial velocity."
  curvatureMeaning:
    es: "La curva es cóncava hacia abajo (arrastre lineal): tasa de crecimiento decreciente. Para arrastre cuadrático la forma es similar pero la asíntota depende de C_D."
    en: "The curve is concave downward (linear drag): decreasing growth rate. For quadratic drag the shape is similar but the asymptote depends on C_D."
  signMeaning:
    es: "v > 0 en dirección de caída. A velocidad terminal, a = 0: ΣF = 0."
    en: "v > 0 in the direction of fall. At terminal velocity, a = 0: ΣF = 0."
  areaMeaning:
    es: Área bajo v(t) = distancia recorrida hasta el tiempo t.
    en: Area under v(t) = distance travelled up to time t.
  domainMeaning:
    es: "Válido para objetos en caída vertical en fluido viscoso. La asíntota v_t depende del régimen (Re): lineal para Re < 1, cuadrático para Re >> 1."
    en: "Valid for objects in vertical fall through a viscous fluid. The asymptote v_t depends on the regime (Re): linear for Re < 1, quadratic for Re >> 1."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton con arrastre: m·dv/dt = mg − F_D(v). La velocidad terminal es la solución estacionaria."
    en: "Interpreted under Newton's second law with drag: m·dv/dt = mg − F_D(v). Terminal velocity is the steady-state solution."
  formulaConnection:
    es: Conecta con v_t = mg/b (arrastre lineal) y v(t) = v_t(1 − e^(−t/τ)) con τ = m/b.
    en: Connects to v_t = mg/b (linear drag) and v(t) = v_t(1 − e^(−t/τ)) with τ = m/b.
  readingFocus:
    es: leer el valor asíntota v_t y la constante de tiempo τ de la aproximación exponencial.
    en: read the asymptotic value v_t and the time constant τ of the exponential approach.
  agentHints:
    es:
      - La velocidad terminal es mayor para objetos densos y de poco área frontal (proyectiles) y menor para objetos ligeros y de gran área (plumas, paracaidistas).
      - "La constante de tiempo τ = m/b indica la rapidez con que se alcanza v_t: en t = 5τ se ha alcanzado ~99%."
      - "A velocidad terminal, la aceleración es exactamente cero: el peso y el arrastre se equilibran."
    en:
      - Terminal velocity is higher for dense, low-frontal-area objects (bullets) and lower for light, large-area objects (feathers, skydivers).
      - "The time constant τ = m/b indicates how quickly v_t is approached: at t = 5τ approximately 99% is reached."
      - "At terminal velocity, acceleration is exactly zero: weight and drag balance."
  commonMistakes:
    es:
      - "Pensar que la velocidad terminal es la velocidad máxima posible en general: solo es máxima en caída libre con arrastre."
      - Confundir τ = m/b (constante de tiempo) con v_t (velocidad terminal).
      - "Usar la fórmula de arrastre lineal cuando el régimen es cuadrático (Re >> 1)."
    en:
      - "Thinking terminal velocity is the highest possible velocity in general: it is only maximum in free fall with drag."
      - Confusing τ = m/b (time constant) with v_t (terminal velocity).
      - "Using the linear drag formula when the regime is quadratic (Re >> 1)."

dcl:
  title:
    es: DCL · Velocidad Terminal
    en: FBD · Terminal Velocity
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - F_D = b·v o F_D = ½c_D·ρ·A·v² (arrastre, hacia arriba)
    en:
      - W = m·g (weight, downward)
      - F_D = b·v or F_D = ½c_D·ρ·A·v² (drag, upward)
  object:
    es: objeto cayendo en fluido (lluvia, paracaidista, esfera en aceite)
    en: object falling through a fluid (raindrop, skydiver, sphere in oil)
  freeBodyCondition:
    es: "A velocidad terminal: F_D = W exactamente. El DCL muestra dos flechas iguales en sentidos opuestos."
    en: "At terminal velocity: F_D = W exactly. The FBD shows two equal arrows in opposite directions."
  equilibriumCondition:
    es: ΣF = W − F_D = 0 → aceleración = 0. El objeto cae a velocidad constante v_t.
    en: ΣF = W − F_D = 0 → acceleration = 0. The object falls at constant velocity v_t.
  netForce:
    es: "A v < v_t: ΣF = W − F_D > 0 (el objeto aún acelera). A v = v_t: ΣF = 0."
    en: "At v < v_t: ΣF = W − F_D > 0 (object still accelerates). At v = v_t: ΣF = 0."
  accelerationDirection:
    es: "Para v < v_t: aceleración hacia abajo (positiva). A v = v_t: a = 0. Nunca se supera v_t en caída libre con arrastre."
    en: "For v < v_t: acceleration downward (positive). At v = v_t: a = 0. Terminal velocity is never exceeded in free fall with drag."
  referenceFrameChoice:
    es: "Eje +y hacia abajo para que W > 0 y F_D < 0 (se opone al movimiento)."
    en: "+y axis downward so that W > 0 and F_D < 0 (opposing motion)."
  forceTypes:
    es:
      - W = m·g (gravitacional)
      - F_D (arrastre viscoso, opuesto al movimiento)
    en:
      - W = m·g (gravitational)
      - F_D (viscous drag, opposing motion)
  signConvention:
    es: W positivo (hacia abajo). F_D negativo (hacia arriba, opuesto al movimiento de caída).
    en: W positive (downward). F_D negative (upward, opposing falling motion).
  relation:
    es: "A velocidad terminal el peso y el arrastre se equilibran exactamente: W = F_D, aceleración = 0."
    en: "At terminal velocity, weight and drag balance exactly: W = F_D, acceleration = 0."
  readingFocus:
    es: verificar que las flechas de W y F_D tienen la misma longitud (equilibrio dinámico) a velocidad terminal.
    en: verify that the W and F_D arrows have the same length (dynamic equilibrium) at terminal velocity.
  agentHints:
    es:
      - "A velocidad terminal el objeto NO está en reposo: se mueve a velocidad constante."
      - "El arrastre aumenta con la velocidad: cuanto más rápido cae, mayor es F_D hasta igualar W."
      - "Comparar el DCL a v < v_t (F_D < W, a > 0) con el DCL a v = v_t (F_D = W, a = 0)."
    en:
      - "At terminal velocity the object is NOT at rest: it moves at constant velocity."
      - "Drag increases with velocity: the faster the fall, the greater F_D until it equals W."
      - "Compare the FBD at v < v_t (F_D < W, a > 0) with the FBD at v = v_t (F_D = W, a = 0)."
  commonMistakes:
    es:
      - Pensar que el objeto está en equilibrio estático a velocidad terminal (está en equilibrio dinámico).
      - No incluir la fuerza de arrastre en el DCL antes de alcanzar v_t.
      - "Confundir la dirección del arrastre: siempre opuesto al movimiento."
    en:
      - Thinking the object is in static equilibrium at terminal velocity (it is in dynamic equilibrium).
      - Not including the drag force in the FBD before reaching v_t.
      - "Confusing the direction of drag: always opposing motion."
