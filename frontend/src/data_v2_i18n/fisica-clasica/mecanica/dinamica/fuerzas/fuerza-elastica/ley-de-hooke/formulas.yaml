version: 1
formulas:
- id: hooke_1d
  title:
    es: Ley de Hooke en 1D
    en: Hooke's Law in 1D
  equation: Fel = -k*x
  latex: Fel = -k x
  rearrangements:
  - target: Fel
    equation: Fel = -k*x
    latex: Fel = -k x
    constraints: []
  - target: k
    equation: k = -Fel/x
    latex: k = -\frac{Fel}{x}
    constraints:
    - expr: x != 0
      message:
        es: x != 0
        en: x != 0
  - target: x
    equation: x = -Fel/k
    latex: x = -\frac{Fel}{k}
    constraints:
    - expr: k != 0
      message:
        es: k != 0
        en: k != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en ley de hooke.
    en: Relacion fisica usada en ley de hooke.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - ley-de-hooke
  interpretation_tags:
  - ley-de-hooke
  result_semantics:
    target: Fel
    meaning: Resulta util para interpretar Fel en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
