- id: energia_potencial_elastica
  title:
    es: Energia potencial elastica
    en: Elastic Potential Energy
  equation: Uel = 0.5*k*x^2
  latex: Uel = \frac{1}{2}k x^2
  rearrangements:
  - target: Uel
    equation: Uel = 0.5*k*x^2
    latex: Uel = \frac{1}{2}k x^2
    constraints: []
  - target: k
    equation: k = 2*Uel/(x^2)
    latex: k = \frac{2Uel}{x^2}
    constraints:
    - expr: x != 0
      message:
        es: x != 0
        en: x != 0
  - target: x
    equation: x = sqrt(2*Uel/k)
    latex: x = \sqrt{\frac{2Uel}{k}}
    constraints:
    - expr: k > 0
      message:
        es: k > 0
        en: k > 0
    - expr: Uel >= 0
      message:
        es: Uel >= 0
        en: Uel >= 0
