version: "1.0"
leaf: "ley-de-hooke"

coord:
  title:
    es: Gráfica Coord · Ley de Hooke
    en: "Coord Graph · Hooke's Law"
  xAxis:
    es: elongación x (m)
    en: extension x (m)
  yAxis:
    es: fuerza elástica F (N)
    en: elastic force F (N)
  xMagnitude: x
  yMagnitude: F
  relation:
    es: "F = −k·x: la fuerza restauradora del muelle es proporcional y opuesta a la elongación. La gráfica F vs x es una recta con pendiente −k que pasa por el origen."
    en: "F = −k·x: the spring restoring force is proportional and opposite to the extension. The F vs x graph is a straight line with slope −k passing through the origin."
  physicalReading:
    es: "La pendiente de F vs x es −k (valor absoluto |k| = constante del muelle). El signo negativo indica que la fuerza se opone a la elongación."
    en: "The slope of F vs x is −k (absolute value |k| = spring constant). The negative sign indicates the force opposes the extension."
  slopeMeaning:
    es: "Pendiente = −k (N/m): determina la rigidez del muelle. Muelle rígido: pendiente pronunciada. Muelle suave: pendiente gradual."
    en: "Slope = −k (N/m): determines the stiffness of the spring. Stiff spring: steep slope. Soft spring: gentle slope."
  interceptMeaning:
    es: "La recta pasa por el origen: si x = 0 (longitud natural), F = 0 (no hay fuerza elástica)."
    en: "The line passes through the origin: at x = 0 (natural length), F = 0 (no elastic force)."
  curvatureMeaning:
    es: La relación es lineal dentro del límite elástico. Para grandes elongaciones, la curva se desvía (comportamiento no lineal, rotura).
    en: The relationship is linear within the elastic limit. For large extensions, the curve deviates (non-linear behaviour, rupture).
  signMeaning:
    es: "F < 0 para x > 0 (elongación): la fuerza apunta hacia la posición de equilibrio. F > 0 para x < 0 (compresión)."
    en: "F < 0 for x > 0 (extension): the force points toward the equilibrium position. F > 0 for x < 0 (compression)."
  areaMeaning:
    es: Área bajo la curva F vs x = energía elástica almacenada U_e = ½kx².
    en: Area under the F vs x curve = stored elastic potential energy U_e = ½kx².
  domainMeaning:
    es: "Válido para |x| < x_max (límite elástico del muelle). Fuera de este rango, el muelle se deforma permanentemente."
    en: "Valid for |x| < x_max (elastic limit of the spring). Beyond this range, the spring is permanently deformed."
  modelConnection:
    es: "Se interpreta bajo la ley de Hooke: la deformación elástica es proporcional a la fuerza aplicada. Fundamento del MAS (movimiento armónico simple)."
    en: "Interpreted under Hooke's law: elastic deformation is proportional to the applied force. Foundation of SHM (simple harmonic motion)."
  formulaConnection:
    es: Conecta con F = −kx, U_e = ½kx², ω = √(k/m) y T = 2π√(m/k) para el oscilador armónico.
    en: Connects to F = −kx, U_e = ½kx², ω = √(k/m) and T = 2π√(m/k) for the harmonic oscillator.
  readingFocus:
    es: leer la pendiente como −k, verificar el paso por el origen y detectar desviaciones del comportamiento lineal.
    en: read the slope as −k, verify the line passes through the origin, and detect deviations from linear behaviour.
  agentHints:
    es:
      - "El área triangular bajo la curva F vs x es la energía elástica: U_e = ½kx²."
      - La constante k se mide experimentalmente como la pendiente (en valor absoluto).
      - "Muelles en serie: 1/k_eq = Σ(1/k_i). Muelles en paralelo: k_eq = Σk_i."
    en:
      - "The triangular area under the F vs x curve is the elastic energy: U_e = ½kx²."
      - The spring constant k is measured experimentally as the slope (absolute value).
      - "Springs in series: 1/k_eq = Σ(1/k_i). Springs in parallel: k_eq = Σk_i."
  commonMistakes:
    es:
      - "Usar F = kx en lugar de F = −kx: olvidar el signo restaurador."
      - Aplicar la ley de Hooke más allá del límite elástico del material.
      - Confundir la elongación x con la longitud total del muelle.
    en:
      - "Using F = kx instead of F = −kx: forgetting the restoring sign."
      - "Applying Hooke's law beyond the elastic limit of the material."
      - Confusing extension x with the total length of the spring.

dcl:
  title:
    es: DCL · Ley de Hooke
    en: "FBD · Hooke's Law"
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - W = m·g (peso de la masa)
      - F_e = k·x (fuerza elástica del muelle, restauradora)
      - N (normal si la masa está sobre superficie horizontal)
    en:
      - W = m·g (weight of the mass)
      - F_e = k·x (elastic restoring force of the spring)
      - N (normal if the mass is on a horizontal surface)
  object:
    es: masa unida al muelle en posición de elongación x
    en: mass attached to the spring at extension x
  freeBodyCondition:
    es: "El DCL muestra la masa con F_e = k·x hacia el equilibrio y W hacia abajo. En equilibrio vertical: F_e = W = mg, con x_eq = mg/k."
    en: "The FBD shows the mass with F_e = k·x toward equilibrium and W downward. At vertical equilibrium: F_e = W = mg, with x_eq = mg/k."
  equilibriumCondition:
    es: "Equilibrio: k·x_eq = m·g → x_eq = mg/k. Fuera del equilibrio: ΣF = −k·(x − x_eq) = m·a."
    en: "Equilibrium: k·x_eq = m·g → x_eq = mg/k. Outside equilibrium: ΣF = −k·(x − x_eq) = m·a."
  netForce:
    es: ΣF = F_e − W = k·x − m·g. En equilibrio ΣF = 0. Fuera de equilibrio la masa oscila.
    en: ΣF = F_e − W = k·x − m·g. At equilibrium ΣF = 0. Away from equilibrium the mass oscillates.
  accelerationDirection:
    es: La aceleración apunta siempre hacia la posición de equilibrio (carácter MAS).
    en: Acceleration always points toward the equilibrium position (SHM character).
  referenceFrameChoice:
    es: Eje +y hacia abajo si la elongación es positiva hacia abajo (cuelgue). O +y hacia la elongación elegida.
    en: +y axis downward if extension is positive downward (hanging spring). Or +y in the chosen extension direction.
  forceTypes:
    es:
      - F_e = k·x (elástica, restauradora)
      - W = m·g (peso)
      - N (normal, si aplica)
    en:
      - F_e = k·x (elastic, restoring)
      - W = m·g (weight)
      - N (normal, if applicable)
  signConvention:
    es: F_e negativa en la dirección de la elongación (se opone al desplazamiento).
    en: F_e is negative in the extension direction (opposes displacement).
  relation:
    es: El DCL del muelle muestra la fuerza elástica restauradora k·x que determina el equilibrio o el MAS.
    en: The spring FBD shows the elastic restoring force k·x that determines equilibrium or SHM.
  readingFocus:
    es: identificar la elongación x, calcular F_e = kx y verificar equilibrio (ΣF = 0) o aceleración (MAS).
    en: identify extension x, compute F_e = kx, and verify equilibrium (ΣF = 0) or acceleration (SHM).
  agentHints:
    es:
      - La posición de equilibrio del muelle cargado es x_eq = mg/k, diferente de la longitud natural.
      - Para analizar el MAS, usar la elongación medida desde el equilibrio, no desde la longitud natural.
      - "La fuerza elástica es siempre restauradora: apunta hacia la posición de equilibrio."
    en:
      - The equilibrium position of the loaded spring is x_eq = mg/k, different from the natural length.
      - For SHM analysis, use the extension measured from equilibrium, not from the natural length.
      - "The elastic force is always restoring: it points toward the equilibrium position."
  commonMistakes:
    es:
      - Medir la elongación desde la longitud natural en lugar de desde la posición de equilibrio para el MAS.
      - No incluir el peso en el DCL del muelle vertical.
      - Dibujar la fuerza elástica en la dirección de la elongación en lugar de opuesta.
    en:
      - Measuring extension from the natural length instead of the equilibrium position for SHM.
      - Not including weight in the vertical spring FBD.
      - Drawing the elastic force in the extension direction instead of opposite to it.
