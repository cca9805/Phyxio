version: 1
magnitudes:
- id: Fel
  symbol: F_{el}
  nombre:
    es: fuerza_elastica
    en: Elastic Force
  descripcion:
    es: Fuerza restauradora del muelle en el eje elegido.
    en: Restoring force exerted by the spring along the chosen axis.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - ley-de-hooke
  common_mistake: Confundir Fel con otra magnitud cercana dentro de ley de hooke.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - ley-de-hooke
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar Fel con una definicion estable antes de sustituir valores.
