      when: "true"
      status: warning
      text:
        es: "No olvidar las unidades de g."
        en: "Do not forget the units of g."
    next_step_rules:
    - id: g_ns1
      when: "true"
      status: info
      text:
        es: "Usa g para el equilibrio vertical."
        en: "Use g for vertical equilibrium."

output_contract:
  version: 1
  sections:
  - summary
  - coherence
  - physical_reading
  - model_validity
  - graph_reading
  - likely_errors
  - next_step

cross_checks:
- pair: [ keq, Fel ]
  condition: "Fel == -keq * x"
  message:
    es: "La fuerza debe cumplir F = -K x."
    en: "The force must satisfy F = -K x."

error_patterns:
- id: serie_sum
  trigger: "keq > k1 and keq > k2"
  message:
    es: "En serie K debe ser menor que cada k individual."
    en: "In series K must be less than each individual k."
