version: 1
formulas:
- id: normal_horizontal_base
  title:
    es: Normal en plano horizontal base
    en: Normal force on a horizontal plane
  equation: N = m*g
  latex: N=mg
  rearrangements:
  - target: N
    equation: N = m*g
    latex: N=mg
    constraints: []
  - target: m
    equation: m = N/g
    latex: m=\frac{N}{g}
    constraints:
    - expr: g != 0
      message:
        es: g != 0
        en: g != 0
  - target: g
    equation: g = N/m
    latex: g=\frac{N}{m}
    constraints:
    - expr: m != 0
      message:
        es: m != 0
        en: m != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en normal en planos.
    en: Relacion fisica usada en normal en planos.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - normal-en-planos
  interpretation_tags:
  - normal-en-planos
  result_semantics:
    target: N
    meaning: Resulta util para interpretar N en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: normal_inclinado_base
