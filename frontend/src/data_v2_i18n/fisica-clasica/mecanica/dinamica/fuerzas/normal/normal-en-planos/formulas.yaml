- id: balance_perpendicular_general
  title:
    es: Balance general perpendicular al plano
    en: General balance perpendicular to the plane
  equation: N + Fextn - m*g*cos(theta) = m*aperp
  latex: N + F_{ext,\perp} - mg\cos\theta = m a_{\perp}
  rearrangements:
  - target: N
    equation: N = m*aperp + m*g*cos(theta) - Fextn
    latex: N = m a_{\perp} + mg\cos\theta - F_{ext,\perp}
    constraints: []
  - target: Fextn
    equation: Fextn = N + m*aperp - m*g*cos(theta)
    latex: F_{ext,\perp} = N + m a_{\perp} - mg\cos\theta
    constraints: []
  - target: aperp
    equation: aperp = (N + Fextn - m*g*cos(theta))/m
    latex: a_{\perp} = \frac{N + F_{ext,\perp} - mg\cos\theta}{m}
    constraints:
    - expr: m != 0
      message:
        es: m != 0
        en: m != 0
  - target: g
    equation: g = (N + Fextn - m*aperp)/(m*cos(theta))
    latex: g = \frac{N + F_{ext,\perp} - m a_{\perp}}{m\cos\theta}
    constraints:
    - expr: m != 0
      message:
        es: m != 0
        en: m != 0
    - expr: cos(theta) != 0
      message:
        es: cos(theta) != 0
        en: cos(theta) != 0
  - target: theta
    equation: theta = arccos(N/(m*g))
    latex: \theta=\arccos\left(\frac{N}{mg}\right)
    constraints:
    - expr: m != 0
      message:
        es: m != 0
        en: m != 0
    - expr: g != 0
      message:
        es: g != 0
        en: g != 0
    - expr: abs(N/(m*g)) <= 1
      message:
        es: "|N/(m*g)| <= 1"
        en: "|N/(m*g)| <= 1"
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en normal en planos.
    en: Relacion fisica usada en normal en planos.
  constraints:
    es: Modelo clasico con ejes adaptados al plano y contacto activo.
    en: Classical model with axes adapted to the plane and an active contact constraint.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable:
    es: Requiere definir fuerzas externas y dinamica concreta del contacto.
    en: Requires the specific external forces and the actual perpendicular dynamics
      of the contact.
  used_in:
  - normal-en-planos
  interpretation_tags:
  - normal-en-planos
  result_semantics:
    target: N
    meaning: Resulta util para interpretar N en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
