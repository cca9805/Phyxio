version: "1.0"
leaf: "normal-en-planos"

coord:
  title:
    es: Gráfica Coord · Normal en Planos
    en: Coord Graph · Normal Force on Planes
  xAxis:
    es: ángulo de inclinación θ (grados)
    en: inclination angle θ (degrees)
  yAxis:
    es: fuerza normal N (N)
    en: normal force N (N)
  xMagnitude: θ
  yMagnitude: N
  relation:
    es: "N = m·g·cosθ: decrece cosénicamente desde N = mg (θ = 0°, plano horizontal) hasta N = 0 (θ = 90°, plano vertical). La curva es un coseno de amplitud mg."
    en: "N = m·g·cosθ: decreases cosinusoidally from N = mg (θ = 0°, horizontal plane) to N = 0 (θ = 90°, vertical plane). The curve is a cosine with amplitude mg."
  physicalReading:
    es: A mayor inclinación, menor fuerza normal y menor rozamiento disponible (f_max = μN = μmg·cosθ). A θ = 90° el cuerpo no tiene apoyo perpendicular.
    en: Greater inclination means smaller normal force and less available friction (f_max = μN = μmg·cosθ). At θ = 90° the body has no perpendicular support.
  slopeMeaning:
    es: "La derivada dN/dθ = −mg·sinθ es negativa y crece en módulo con θ: N disminuye más rápido cerca de 90°."
    en: "The derivative dN/dθ = −mg·sinθ is negative and grows in magnitude with θ: N decreases faster near 90°."
  interceptMeaning:
    es: "En θ = 0°: N = mg. La normal en una superficie horizontal iguala exactamente el peso."
    en: "At θ = 0°: N = mg. The normal on a horizontal surface exactly equals the weight."
  curvatureMeaning:
    es: "La curva es cóncava hacia abajo (coseno): la normal disminuye con curvatura suave al principio y más rápida cerca de 90°."
    en: "The curve is concave downward (cosine): the normal decreases gently at first and more rapidly near 90°."
  signMeaning:
    es: "N ≥ 0 siempre: la superficie solo puede empujar, nunca jalar al cuerpo."
    en: "N ≥ 0 always: the surface can only push, never pull the body."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "θ ∈ [0°, 90°]. Para θ > ángulo de reposo arctan(μ_e), el cuerpo resbala aunque N sea positiva."
    en: "θ ∈ [0°, 90°]. For θ > rest angle arctan(μ_e), the body slides even though N is positive."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton en dirección perpendicular al plano: N = mg·cosθ."
    en: "Interpreted under Newton's second law in the direction perpendicular to the plane: N = mg·cosθ."
  formulaConnection:
    es: Conecta con N = mg·cosθ, f_max = μ·N = μmg·cosθ y ángulo de reposo θ_reposo = arctan(μ_e).
    en: Connects to N = mg·cosθ, f_max = μ·N = μmg·cosθ, and rest angle θ_rest = arctan(μ_e).
  readingFocus:
    es: leer N para el ángulo θ dado y calcular el rozamiento máximo disponible f_max = μN.
    en: read N for the given angle θ and compute the maximum available friction f_max = μN.
  agentHints:
    es:
      - En el plano inclinado, N < mg siempre (excepto θ = 0°). Usar N = mg·cosθ, no N = mg.
      - "El rozamiento cinético es f_c = μ_c·N = μ_c·mg·cosθ: también disminuye con θ."
      - La gráfica N vs θ es útil para ver por qué a mayor inclinación hay menos frenado por rozamiento.
    en:
      - On an inclined plane, N < mg always (except θ = 0°). Use N = mg·cosθ, not N = mg.
      - "Kinetic friction is f_c = μ_c·N = μ_c·mg·cosθ: it also decreases with θ."
      - The N vs θ graph shows why at greater inclination there is less friction braking.
  commonMistakes:
    es:
      - Usar N = mg en el plano inclinado.
      - Confundir cos θ con sin θ en la proyección del peso.
      - Olvidar que f = μN disminuye con θ al calcular la fuerza de rozamiento en el plano.
    en:
      - Using N = mg on the inclined plane.
      - Confusing cosθ with sinθ when projecting weight.
      - Forgetting that f = μN decreases with θ when computing friction on the plane.

dcl:
  title:
    es: DCL · Normal en Planos
    en: FBD · Normal Force on Planes
  xAxis:
    es: eje x paralelo al plano (positivo hacia abajo del plano)
    en: x-axis parallel to plane (positive downward along it)
  yAxis:
    es: eje y perpendicular al plano (positivo alejándose de la superficie)
    en: y-axis perpendicular to plane (positive away from surface)
  forces:
    es:
      - W = m·g (peso, vertical hacia abajo)
      - N = m·g·cosθ (normal, perpendicular al plano)
      - W_∥ = m·g·sinθ (componente paralela del peso)
      - f_r (rozamiento, si aplica)
    en:
      - W = m·g (weight, vertically downward)
      - N = m·g·cosθ (normal, perpendicular to plane)
      - W_∥ = m·g·sinθ (parallel weight component)
      - f_r (friction, if applicable)
  object:
    es: cuerpo sobre plano inclinado un ángulo θ respecto a la horizontal
    en: body on a plane inclined at angle θ from the horizontal
  freeBodyCondition:
    es: "El peso W se descompone en W_∥ = mg·sinθ (paralela al plano) y W_⊥ = mg·cosθ (perpendicular). La normal equilibra W_⊥: N = mg·cosθ."
    en: "Weight W is decomposed into W_∥ = mg·sinθ (parallel to plane) and W_⊥ = mg·cosθ (perpendicular). The normal balances W_⊥: N = mg·cosθ."
  equilibriumCondition:
    es: "Dirección perpendicular: N = mg·cosθ (siempre en equilibrio ⊥ si no hay aceleración fuera del plano)."
    en: "Perpendicular direction: N = mg·cosθ (always in equilibrium ⊥ if no off-plane acceleration)."
  netForce:
    es: "En dirección ⊥: ΣF_⊥ = N − mg·cosθ = 0. En dirección ∥: ΣF_∥ = mg·sinθ − f_r = m·a."
    en: "Perpendicular: ΣF_⊥ = N − mg·cosθ = 0. Parallel: ΣF_∥ = mg·sinθ − f_r = m·a."
  accelerationDirection:
    es: La aceleración es a lo largo del plano (dirección ∥). No hay aceleración en dirección ⊥.
    en: Acceleration is along the plane (parallel direction). There is no acceleration in the perpendicular direction.
  referenceFrameChoice:
    es: "Ejes alineados con el plano: x paralelo (hacia abajo positivo) e y perpendicular (alejándose del plano positivo)."
    en: "Axes aligned with the plane: x parallel (positive downward) and y perpendicular (positive away from surface)."
  forceTypes:
    es:
      - W = mg (gravitacional, vertical)
      - N (normal de contacto, perpendicular al plano)
      - f_r = μN (rozamiento, paralela al plano)
    en:
      - W = mg (gravitational, vertical)
      - N (contact normal, perpendicular to plane)
      - f_r = μN (friction, parallel to plane)
  signConvention:
    es: "Positivo en x: hacia abajo por el plano. Positivo en y: alejándose de la superficie."
    en: "Positive x: down the plane. Positive y: away from the surface."
  relation:
    es: El DCL con ejes alineados al plano muestra que N = mg·cosθ y que el rozamiento máximo disponible es μ·mg·cosθ.
    en: The FBD with axes aligned to the plane shows that N = mg·cosθ and the maximum available friction is μ·mg·cosθ.
  readingFocus:
    es: verificar N = mg·cosθ de la ecuación perpendicular y calcular f_max = μN para el rozamiento disponible.
    en: verify N = mg·cosθ from the perpendicular equation and compute f_max = μN for available friction.
  agentHints:
    es:
      - El ángulo entre W y N es siempre θ (el mismo ángulo de inclinación del plano).
      - "En la dirección ⊥ siempre hay equilibrio: N = mg·cosθ sin excepción."
      - Alinear los ejes con el plano elimina la necesidad de descomponer N y f_r.
    en:
      - The angle between W and N is always θ (the same inclination angle of the plane).
      - "In the perpendicular direction there is always equilibrium: N = mg·cosθ without exception."
      - Aligning axes with the plane eliminates the need to decompose N and f_r.
  commonMistakes:
    es:
      - No alinear los ejes con el plano y descomponer N en lugar de W.
      - Usar N = mg en el plano inclinado.
      - Confundir la componente paralela mg·sinθ con la perpendicular mg·cosθ.
    en:
      - Not aligning axes with the plane and decomposing N instead of W.
      - Using N = mg on the inclined plane.
      - Confusing the parallel component mg·sinθ with the perpendicular one mg·cosθ.
