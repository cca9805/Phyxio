magnitudes:
- id: N
  symbol: N
  nombre:
    es: modulo_normal
    en: Normal force magnitude
  descripcion:
    es: Modulo de la fuerza normal ejercida por la superficie.
    en: Magnitude of the normal force exerted by the surface.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - N_x
  - N_y
  category: derived
  physical_role: contact_force
  used_in:
  - normal-en-planos
  common_mistake: Confundir N con otra magnitud cercana dentro de normal en planos.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - normal-en-planos
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar N con una definicion estable antes de sustituir valores.
