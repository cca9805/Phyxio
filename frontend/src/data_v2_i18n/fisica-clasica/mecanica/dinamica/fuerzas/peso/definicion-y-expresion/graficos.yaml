version: "1.0"
leaf: "definicion-y-expresion"

dcl:
  title:
    es: DCL · Definición y Expresión
    en: FBD · Definition and Expression
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - Fuerzas que aparecen en la expresión analizada (arrastre, rozamiento, muelle, etc.)
      - Peso W = m·g
      - Normal N (si aplica)
      - Tensión T (si aplica)
    en:
      - Forces appearing in the analysed expression (drag, friction, spring, etc.)
      - Weight W = m·g
      - Normal N (if applicable)
      - Tension T (if applicable)
  object:
    es: objeto sobre el que se define y expresa la fuerza o ley física analizada
    en: object on which the force or physical law being defined and expressed acts
  freeBodyCondition:
    es: El DCL muestra las fuerzas que componen la expresión analizada, con sus sentidos y puntos de aplicación correctos.
    en: The FBD shows the forces composing the analysed expression, with their correct directions and points of application.
  equilibriumCondition:
    es: "Si la expresión corresponde a equilibrio: ΣF = 0. Si corresponde a dinámica: ΣF = m·a."
    en: "If the expression corresponds to equilibrium: ΣF = 0. If dynamic: ΣF = m·a."
  netForce:
    es: "La fuerza neta se identifica de la expresión analizada: puede ser cero (estática) o ≠ 0 (dinámica)."
    en: "The net force is identified from the analysed expression: can be zero (statics) or ≠ 0 (dynamics)."
  accelerationDirection:
    es: La dirección de la aceleración coincide con la de la fuerza neta según la expresión analizada.
    en: The direction of acceleration coincides with that of the net force according to the analysed expression.
  referenceFrameChoice:
    es: Eje principal alineado con la dirección de la fuerza o del movimiento de la expresión.
    en: Main axis aligned with the direction of the force or motion in the expression.
  forceTypes:
    es:
      - "Fuerzas de contacto: N, rozamiento, tensión"
      - "Fuerzas a distancia: peso, fuerza elástica"
      - "Fuerzas de fluido: arrastre, empuje"
    en:
      - "Contact forces: N, friction, tension"
      - "Action-at-a-distance forces: weight, elastic force"
      - "Fluid forces: drag, buoyancy"
  signConvention:
    es: "La convención de signos sigue la definición de la expresión: positivo en la dirección del movimiento o aceleración."
    en: "Sign convention follows the definition in the expression: positive in the direction of motion or acceleration."
  relation:
    es: El DCL representa visualmente las fuerzas que componen la expresión física analizada, mostrando sus sentidos y permitiendo deducir la ecuación de movimiento.
    en: The FBD visually represents the forces composing the analysed physical expression, showing their directions and enabling deduction of the equation of motion.
  readingFocus:
    es: leer las fuerzas y sus sentidos para construir la expresión matemática ΣF = m·a (o ΣF = 0) correctamente.
    en: read the forces and their directions to correctly build the mathematical expression ΣF = m·a (or ΣF = 0).
  agentHints:
    es:
      - Identificar primero el objeto de interés y luego dibujar TODAS las fuerzas que actúan sobre él.
      - Comprobar que la expresión matemática se deriva directamente de las flechas del DCL.
      - La longitud de las flechas es proporcional a la magnitud de las fuerzas.
    en:
      - First identify the object of interest, then draw ALL forces acting on it.
      - Verify that the mathematical expression derives directly from the FBD arrows.
      - Arrow lengths are proportional to force magnitudes.
  commonMistakes:
    es:
      - Incluir fuerzas que no actúan sobre el objeto (confundir pares de reacción).
      - Omitir alguna fuerza relevante de la expresión.
      - No alinear los ejes de coordenadas con la dirección principal de la expresión.
    en:
      - Including forces that do not act on the object (confusing reaction pairs).
      - Omitting a relevant force from the expression.
      - Not aligning the coordinate axes with the main direction of the expression.

svg:
  title:
    es: Escena SVG · Definición y Expresión
    en: SVG Scene · Definition and Expression
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: definicion_expresion_scene
  sceneLabel:
    es: Escena con el objeto y las fuerzas que definen la expresión física analizada
    en: Scene showing the object and forces that define the analysed physical expression
  objects:
    es:
      - objeto de interés con todas las fuerzas que definen la expresión
      - vectores de fuerza etiquetados con sus expresiones (F_r = bv, F_e = kx, etc.)
      - ejes de coordenadas alineados con la expresión
    en:
      - object of interest with all forces defining the expression
      - force vectors labelled with their expressions (F_r = bv, F_e = kx, etc.)
      - coordinate axes aligned with the expression
  mainObject:
    es: objeto sobre el que actúan las fuerzas que componen la expresión física
    en: object on which the forces composing the physical expression act
  referenceFrame:
    es: marco inercial con ejes alineados con la dirección principal de la expresión
    en: inertial frame with axes aligned with the main direction of the expression
  geometry:
    es: La escena muestra el objeto, la configuración geométrica (inclinación, curvatura, etc.) y los vectores de fuerza que componen la expresión.
    en: The scene shows the object, geometric configuration (inclination, curvature, etc.) and the force vectors composing the expression.
  interactions:
    es: Todas las fuerzas que aparecen en la expresión analizada, con sus sentidos y puntos de aplicación correctos.
    en: All forces appearing in the analysed expression, with correct directions and points of application.
  modelElements:
    es:
      - Vectores de fuerza con etiquetas de la expresión
      - Geometría del sistema (ángulos, distancias)
      - Eje de coordenadas de referencia
    en:
      - Force vectors with expression labels
      - System geometry (angles, distances)
      - Reference coordinate axis
  visualCues:
    es:
      - Las flechas tienen etiquetas con la expresión matemática de cada fuerza.
      - La geometría de la escena es coherente con la expresión (inclinación, radio de curvatura, etc.).
      - El eje de referencia facilita la lectura de componentes.
    en:
      - Arrows are labelled with the mathematical expression of each force.
      - Scene geometry is consistent with the expression (inclination, radius of curvature, etc.).
      - The reference axis facilitates reading force components.
  scaleMeaning:
    es: Las longitudes de las flechas son proporcionales a las magnitudes de las fuerzas en la configuración representada.
    en: Arrow lengths are proportional to force magnitudes in the represented configuration.
  relation:
    es: La escena ilustra geométricamente la definición y expresión física analizada, mostrando el objeto, la geometría del sistema y las fuerzas involucradas.
    en: The scene geometrically illustrates the definition and analysed physical expression, showing the object, system geometry, and involved forces.
  physicalReading:
    es: Identificar la geometría del sistema (ángulos, distancias, curvaturas) y las fuerzas etiquetadas para construir la expresión matemática.
    en: Identify the system geometry (angles, distances, curvatures) and labelled forces to build the mathematical expression.
  modelConnection:
    es: La escena conecta visualmente la geometría física con la expresión matemática de la ley analizada.
    en: The scene visually connects the physical geometry with the mathematical expression of the analysed law.
  formulaConnection:
    es: "Conecta con la expresión analizada: F_r = b·v, F_e = k·x, F_c = mv²/r, F_g = Gm₁m₂/r², etc."
    en: "Connects to the analysed expression: F_r = b·v, F_e = k·x, F_c = mv²/r, F_g = Gm₁m₂/r², etc."
  readingFocus:
    es: identificar los objetos y su configuración geométrica para dar sentido a la expresión y deducir sus variables.
    en: identify the objects and their geometric configuration to give meaning to the expression and deduce its variables.
  agentHints:
    es:
      - "La geometría de la escena es tan importante como las flechas: ángulos y distancias determinan las magnitudes."
      - Cada etiqueta de fuerza debe corresponder exactamente a un término de la expresión matemática.
      - Verificar que la escena sea coherente con los límites del dominio físico de la expresión.
    en:
      - "Scene geometry is as important as the arrows: angles and distances determine magnitudes."
      - Each force label must correspond exactly to a term in the mathematical expression.
      - Verify that the scene is consistent with the physical domain limits of the expression.
  commonMistakes:
    es:
      - No etiquetar las flechas con las expresiones matemáticas correspondientes.
      - Representar una geometría inconsistente con la expresión (ángulo equivocado, dirección errónea).
      - Omitir la escala o la referencia que permite leer las magnitudes cuantitativas.
    en:
      - Not labelling arrows with the corresponding mathematical expressions.
      - Representing geometry inconsistent with the expression (wrong angle, incorrect direction).
      - Omitting the scale or reference that allows reading quantitative magnitudes.
