version: "1.0"
leaf: "peso-en-diferentes-contextos"

coord:
  title:
    es: Gráfica Coord · Peso en Diferentes Contextos
    en: Coord Graph · Weight in Different Contexts
  xAxis:
    es: aceleración del sistema a (m/s²)
    en: system acceleration a (m/s²)
  yAxis:
    es: peso aparente N (N)
    en: apparent weight N (N)
  xMagnitude: a
  yMagnitude: N
  relation:
    es: "N = m(g + a): lineal con a. Para a = 0: N = mg (peso real). Para a = −g: N = 0 (ingravidez, caída libre). Para a > 0 (ascenso acelerado): N > mg (sobrepeso aparente)."
    en: "N = m(g + a): linear in a. At a = 0: N = mg (real weight). At a = −g: N = 0 (weightlessness, free fall). At a > 0 (accelerated ascent): N > mg (apparent overweight)."
  physicalReading:
    es: La recta N(a) corta el eje vertical en mg y tiene pendiente m. El intercepto horizontal (a = −g) es la condición de caída libre. El peso aparente aumenta o disminuye según el sentido de la aceleración del ascensor.
    en: The line N(a) intersects the vertical axis at mg and has slope m. The horizontal intercept (a = −g) is the free-fall condition. Apparent weight increases or decreases depending on the direction of lift acceleration.
  slopeMeaning:
    es: Pendiente = m (masa). Permite medir la masa experimentalmente variando la aceleración del sistema y midiendo N.
    en: Slope = m (mass). Allows measuring mass experimentally by varying system acceleration and measuring N.
  interceptMeaning:
    es: "En a = 0: N = mg = peso real del objeto. La recta corta el eje N en mg."
    en: "At a = 0: N = mg = real weight of the object. The line intersects the N axis at mg."
  curvatureMeaning:
    es: La relación N vs a es estrictamente lineal (relación directa). No hay curvatura.
    en: The N vs a relationship is strictly linear (direct relationship). There is no curvature.
  signMeaning:
    es: "N > 0: el objeto está en contacto con la superficie. N = 0: ingravidez (caída libre). N < 0: físicamente imposible (la superficie no puede jalar)."
    en: "N > 0: the object is in contact with the surface. N = 0: weightlessness (free fall). N < 0: physically impossible (surface cannot pull)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "a ∈ [−g, +∞). Para a < −g el objeto entraría en caída libre real (N = 0 es el límite físico)."
    en: "a ∈ [−g, +∞). For a < −g the object would be in real free fall (N = 0 is the physical limit)."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton en el sistema ascensor-objeto: N − mg = ma → N = m(g + a)."
    en: "Interpreted under Newton's second law for the lift-object system: N − mg = ma → N = m(g + a)."
  formulaConnection:
    es: Conecta con N = m(g + a), peso aparente = N/m = g + a, e ingravidez cuando a = −g.
    en: Connects to N = m(g + a), apparent weight = N/m = g + a, and weightlessness when a = −g.
  readingFocus:
    es: "leer N para la aceleración a del sistema y distinguir los casos: sobrepeso (a > 0), peso real (a = 0) e ingravidez (a = −g)."
    en: "read N for the system acceleration a and distinguish cases: overweight (a > 0), real weight (a = 0), and weightlessness (a = −g)."
  agentHints:
    es:
      - "En un ascensor que acelera hacia arriba (a > 0): N > mg (te 'pesas' más)."
      - "En un ascensor que desacelera al subir o acelera al bajar (a < 0): N < mg (te 'pesas' menos)."
      - "En caída libre (a = −g): N = 0. El objeto flota: ingravidez aparente."
    en:
      - "In a lift accelerating upward (a > 0): N > mg (you feel heavier)."
      - "In a lift decelerating while rising or accelerating while descending (a < 0): N < mg (you feel lighter)."
      - "In free fall (a = −g): N = 0. The object floats: apparent weightlessness."
  commonMistakes:
    es:
      - Confundir peso real (mg, constante) con peso aparente (N, variable con a).
      - "Pensar que en caída libre el peso desaparece: solo desaparece la fuerza de contacto N, no mg."
      - Usar a = g en lugar de a = −g para la condición de ingravidez.
    en:
      - Confusing real weight (mg, constant) with apparent weight (N, variable with a).
      - "Thinking weight disappears in free fall: only the contact force N vanishes, not mg."
      - Using a = g instead of a = −g for the weightlessness condition.

dcl:
  title:
    es: DCL · Peso en Diferentes Contextos
    en: FBD · Weight in Different Contexts
  xAxis:
    es: eje vertical (positivo hacia arriba)
    en: vertical axis (positive upward)
  yAxis:
    es: eje x (horizontal, sin fuerzas en este caso)
    en: x-axis (horizontal, no forces in this case)
  forces:
    es:
      - W = m·g (peso real, hacia abajo, constante)
      - N (normal del suelo del ascensor, hacia arriba, variable)
    en:
      - W = m·g (real weight, downward, constant)
      - N (normal from lift floor, upward, variable)
  object:
    es: persona u objeto en interior del ascensor o sistema acelerado verticalmente
    en: person or object inside a lift or vertically accelerating system
  freeBodyCondition:
    es: "El DCL muestra W hacia abajo y N hacia arriba. La diferencia N − W = ma determina el caso: N > W (ascenso acelerado), N = W (MRU o reposo), N < W (descenso acelerado), N = 0 (caída libre)."
    en: "The FBD shows W downward and N upward. The difference N − W = ma determines the case: N > W (accelerated ascent), N = W (URM or rest), N < W (accelerated descent), N = 0 (free fall)."
  equilibriumCondition:
    es: "Equilibrio: N = W = mg → a = 0. Condición de ingravidez: N = 0 → a = −g."
    en: "Equilibrium: N = W = mg → a = 0. Weightlessness condition: N = 0 → a = −g."
  netForce:
    es: "ΣF_y = N − mg = m·a. Despejando: N = m(g + a)."
    en: "ΣF_y = N − mg = m·a. Solving: N = m(g + a)."
  accelerationDirection:
    es: "a > 0 (hacia arriba): N > mg. a < 0 (hacia abajo): N < mg. a = −g (caída libre): N = 0."
    en: "a > 0 (upward): N > mg. a < 0 (downward): N < mg. a = −g (free fall): N = 0."
  referenceFrameChoice:
    es: "Eje +y hacia arriba para que N > 0 y W < 0 en la ecuación de movimiento."
    en: "+y axis upward so that N > 0 and W < 0 in the equation of motion."
  forceTypes:
    es:
      - W = mg (gravitacional, constante, hacia abajo)
      - N (normal de contacto, variable según a, hacia arriba)
    en:
      - W = mg (gravitational, constant, downward)
      - N (contact normal, variable with a, upward)
  signConvention:
    es: "Positivo hacia arriba. N − mg = ma: N = m(g + a)."
    en: "Positive upward. N − mg = ma: N = m(g + a)."
  relation:
    es: "El DCL del ascensor muestra que W es constante pero N varía con la aceleración: N = m(g+a). N es el peso aparente medido por una balanza."
    en: "The lift FBD shows that W is constant but N varies with acceleration: N = m(g+a). N is the apparent weight measured by a scale."
  readingFocus:
    es: leer N − mg = ma, identificar el signo de a y calcular el peso aparente N = m(g + a).
    en: read N − mg = ma, identify the sign of a, and compute apparent weight N = m(g + a).
  agentHints:
    es:
      - Una balanza dentro del ascensor mide N (peso aparente), no mg (peso real).
      - "N = 0 no significa que la gravedad desapareció: significa que el contacto se perdió (caída libre)."
      - "La NASA usa aviones en caída parabólica para simular ingravidez: N = 0 durante ~25 segundos."
    en:
      - A scale inside the lift measures N (apparent weight), not mg (real weight).
      - "N = 0 does not mean gravity disappeared: it means contact is lost (free fall)."
      - "NASA uses parabolic-flight aircraft to simulate weightlessness: N = 0 for ~25 seconds."
  commonMistakes:
    es:
      - Plantear N = mg independientemente de la aceleración del ascensor.
      - Confundir la aceleración del ascensor (a) con la aceleración de la gravedad (g).
      - "Omitir el signo de a: a positivo hacia arriba, negativo hacia abajo."
    en:
      - "Setting N = mg regardless of the lift's acceleration."
      - "Confusing the lift's acceleration (a) with gravitational acceleration (g)."
      - "Omitting the sign of a: positive upward, negative downward."
