version: 1
formulas:
- id: fs_max_modelo
  title:
    es: Umbral estatico (modelo principal)
    en: Static Threshold (Main Model)
  equation: fs_max = mu_s*N
  latex: f_{s,\\max} = \\mu_s N
  rearrangements:
  - target: fs_max
    equation: fs_max = mu_s*N
    latex: f_{s,\\max} = \\mu_s N
    constraints: []
  - target: mu_s
    equation: mu_s = fs_max/N
    latex: \\mu_s = \\frac{f_{s,\\max}}{N}
    constraints:
    - expr: N != 0
      message:
        es: N != 0
        en: N != 0
  - target: N
    equation: N = fs_max/mu_s
    latex: N = \\frac{f_{s,\\max}}{\\mu_s}
    constraints:
    - expr: mu_s != 0
      message:
        es: mu_s != 0
        en: mu_s != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en coeficiente de rozamiento.
    en: Relacion fisica usada en coeficiente de rozamiento.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - coeficiente-de-rozamiento
  interpretation_tags:
  - coeficiente-de-rozamiento
  result_semantics:
    target: fs_max
    meaning: Resulta util para interpretar fs_max en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
