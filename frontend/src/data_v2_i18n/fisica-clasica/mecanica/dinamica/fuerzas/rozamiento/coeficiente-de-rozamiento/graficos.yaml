version: "1.0"
leaf: "coeficiente-de-rozamiento"

coord:
  title:
    es: Gráfica Coord · Coeficiente de Rozamiento
    en: Coord Graph · Coefficient of Friction
  xAxis:
    es: fuerza normal N (N)
    en: normal force N (N)
  yAxis:
    es: fuerza de rozamiento f (N)
    en: friction force f (N)
  xMagnitude: N
  yMagnitude: f
  relation:
    es: "La fuerza de rozamiento es proporcional a la normal: f = μ·N. La gráfica f vs N es una recta que pasa por el origen con pendiente μ (estático o cinético según el caso)."
    en: "The friction force is proportional to the normal: f = μ·N. The f vs N graph is a straight line through the origin with slope μ (static or kinetic depending on the case)."
  physicalReading:
    es: "La pendiente es μ (adimensional): μ_e > μ_c siempre. El rozamiento estático puede alcanzar hasta f_max = μ_e·N antes de que el cuerpo se mueva."
    en: "The slope is μ (dimensionless): μ_e > μ_c always. Static friction can reach up to f_max = μ_e·N before the body moves."
  slopeMeaning:
    es: Pendiente = μ. La recta de rozamiento estático tiene pendiente μ_e; la de cinético tiene pendiente μ_c < μ_e.
    en: Slope = μ. The static friction line has slope μ_e; the kinetic friction line has slope μ_c < μ_e.
  interceptMeaning:
    es: "La recta pasa por el origen: sin fuerza normal no hay rozamiento (f = 0 cuando N = 0)."
    en: "The line passes through the origin: without a normal force there is no friction (f = 0 when N = 0)."
  curvatureMeaning:
    es: La relación es lineal para superficies ideales. En superficies rugosas puede haber leve curvatura.
    en: The relationship is linear for ideal surfaces. On rough surfaces there may be slight curvature.
  signMeaning:
    es: El rozamiento es siempre positivo en módulo; su sentido es opuesto al movimiento o al movimiento inminente.
    en: Friction is always positive in magnitude; its direction is opposite to motion or impending motion.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Válido para el rango de fuerzas normales experimentadas en el sistema. Los valores de μ son típicos: madera-madera μ_e ≈ 0.5, caucho-asfalto μ_e ≈ 0.8."
    en: "Valid for the range of normal forces in the system. Typical μ values: wood-wood μ_e ≈ 0.5, rubber-asphalt μ_e ≈ 0.8."
  modelConnection:
    es: "Se interpreta bajo el modelo de Coulomb: el rozamiento es proporcional a la normal e independiente del área de contacto."
    en: "Interpreted under Coulomb's model: friction is proportional to the normal force and independent of contact area."
  formulaConnection:
    es: Conecta con f_e ≤ μ_e·N (estático) y f_c = μ_c·N (cinético).
    en: Connects to f_e ≤ μ_e·N (static) and f_c = μ_c·N (kinetic).
  readingFocus:
    es: leer la pendiente de la recta para obtener μ y distinguir si corresponde al coeficiente estático o cinético.
    en: read the slope of the line to obtain μ and distinguish whether it corresponds to the static or kinetic coefficient.
  agentHints:
    es:
      - "μ_e > μ_c: el rozamiento estático máximo es siempre mayor que el cinético."
      - La pendiente del tramo cinético es μ_c; el tramo estático tiene pendiente efectiva que sube hasta μ_e.
      - "En la gráfica f vs F_aplicada: f sube con F hasta μ_e·N y luego cae y se estabiliza en μ_c·N."
    en:
      - "μ_e > μ_c: maximum static friction is always greater than kinetic."
      - The slope of the kinetic segment is μ_c; the static segment has effective slope rising to μ_e.
      - "In the f vs F_applied graph: f rises with F until μ_e·N, then drops and stabilizes at μ_c·N."
  commonMistakes:
    es:
      - Usar μ_c en situaciones de rozamiento estático.
      - Pensar que el rozamiento depende del área de contacto.
      - Confundir f = μ·N (magnitud) con la ecuación vectorial (que incluye el sentido).
    en:
      - Using μ_c in static friction situations.
      - Thinking friction depends on the contact area.
      - Confusing f = μ·N (magnitude) with the vector equation (which includes direction).

dcl:
  title:
    es: DCL · Coeficiente de Rozamiento
    en: FBD · Coefficient of Friction
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - W = m·g (peso)
      - N (normal, perpendicular a la superficie)
      - f = μ·N (rozamiento, paralelo a la superficie opuesto al movimiento o movimiento inminente)
      - F_aplicada (fuerza externa si aplica)
    en:
      - W = m·g (weight)
      - N (normal, perpendicular to surface)
      - f = μ·N (friction, parallel to surface opposing motion or impending motion)
      - F_applied (external force if applicable)
  object:
    es: cuerpo sobre superficie plana con rozamiento
    en: body on a flat surface with friction
  freeBodyCondition:
    es: El DCL muestra W, N, f y F_aplicada. La relación f = μ·N se verifica mediante la razón f/N.
    en: The FBD shows W, N, f, and F_applied. The relation f = μ·N is verified via the ratio f/N.
  equilibriumCondition:
    es: "En equilibrio: F_aplicada = f = μ_e·N (umbral). En movimiento: ΣF_x = F_aplicada − μ_c·N = m·a."
    en: "At equilibrium: F_applied = f = μ_e·N (threshold). In motion: ΣF_x = F_applied − μ_c·N = m·a."
  netForce:
    es: "En movimiento: ΣF = F_aplicada − μ_c·N. La aceleración es a = (F_aplicada − μ_c·N)/m."
    en: "In motion: ΣF = F_applied − μ_c·N. Acceleration is a = (F_applied − μ_c·N)/m."
  accelerationDirection:
    es: "Si F_aplicada > μ_c·N, hay aceleración en la dirección de F. Si F_aplicada ≤ μ_e·N, el cuerpo no se mueve."
    en: "If F_applied > μ_c·N, there is acceleration in F's direction. If F_applied ≤ μ_e·N, the body does not move."
  referenceFrameChoice:
    es: Ejes x paralelo a la superficie (dirección del movimiento) e y perpendicular.
    en: x-axis parallel to surface (direction of motion) and y perpendicular.
  forceTypes:
    es:
      - W = m·g (gravitacional)
      - N (normal de contacto)
      - f = μ·N (rozamiento, disipativa)
      - F_aplicada (externa)
    en:
      - W = m·g (gravitational)
      - N (contact normal)
      - f = μ·N (friction, dissipative)
      - F_applied (external)
  signConvention:
    es: "f tiene sentido opuesto al movimiento: negativa si el cuerpo se mueve en +x."
    en: "f has the opposite sign to motion: negative if the body moves in +x."
  relation:
    es: El DCL con rozamiento muestra W, N y f = μ·N, permitiendo calcular μ = f/N y la aceleración resultante.
    en: The FBD with friction shows W, N, and f = μ·N, enabling computation of μ = f/N and resulting acceleration.
  readingFocus:
    es: calcular μ = f/N directamente de las magnitudes de las flechas del DCL.
    en: compute μ = f/N directly from the magnitudes of the FBD arrows.
  agentHints:
    es:
      - N = m·g·cosθ en plano inclinado (no m·g). Usar N correcto para calcular f = μ·N.
      - En equilibrio, f se ajusta sola hasta su máximo μ_e·N. No siempre f = μ·N.
      - "Dibujar f antes de conocer su magnitud: siempre paralela a la superficie y opuesta al movimiento."
    en:
      - N = m·g·cosθ on an inclined plane (not m·g). Use the correct N to compute f = μ·N.
      - At equilibrium, f adjusts itself up to its maximum μ_e·N. It is not always f = μ·N.
      - "Draw f before knowing its magnitude: always parallel to the surface and opposing motion."
  commonMistakes:
    es:
      - Usar N = m·g en plano inclinado en lugar de N = m·g·cosθ.
      - Dibujar f en la dirección del movimiento en lugar de opuesta.
      - "Confundir μ_e (estático) con μ_c (cinético): usar el correcto según el estado del cuerpo."
    en:
      - Using N = m·g on an inclined plane instead of N = m·g·cosθ.
      - Drawing f in the direction of motion instead of opposing it.
      - "Confusing μ_e (static) with μ_c (kinetic): use the correct one based on body state."
