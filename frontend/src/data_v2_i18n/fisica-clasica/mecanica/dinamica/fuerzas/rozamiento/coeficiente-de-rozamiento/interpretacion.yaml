version: 2
id: interpretacion-coeficiente-de-rozamiento
leaf_id: coeficiente-de-rozamiento
nombre:
  es: Interpretacion de Coeficiente de rozamiento
  en: Interpretation of Coefficient of Friction
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: rozamiento
  ruta_relativa: fisica-clasica/mecanica/dinamica/fuerzas/rozamiento/coeficiente-de-rozamiento
dependencies:
  formulas:
  - fs_max_modelo
  - fk_modelo
  - mu_s_angulo_critico
  - condicion_estatica
  - comparacion_coeficientes
  magnitudes:
  - mu_s
  - mu_k
  - fs
  - fs_max
  - fk
  - N
  - theta_c
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  fs_max:
    summary_rules:
    - id: fs_max_summary
      when: 'true'
      status: info
      text:
        es: fs_max resume una lectura fisica relevante del leaf.
        en: fs_max summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: fs_max_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que fs_max sea coherente con unidades y contexto.
        en: Check that fs_max is coherent with units and context.
    physical_reading_rules:
    - id: fs_max_physical
      when: 'true'
      status: info
      text:
        es: Si fs_max aumenta, la interfaz puede sostener mayor rozamiento estatico maximo para la misma escena de contacto.
        en: If fs_max increases, the interface can sustain a larger maximum static friction in the same contact scene.
    model_validity_rules:
    - id: fs_max_validity
      when: 'true'
      status: ok
      text:
        es: fs_max solo es interpretable dentro del modelo elegido.
        en: fs_max is interpretable only inside the chosen model.
    graph_rules:
    - id: fs_max_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de fs_max.
        en: The graph must reflect the role of fs_max visually.
    likely_errors:
    - id: fs_max_warn
      when: 'true'
      status: warning
      text:
        es: No confundas fs_max con otra magnitud cercana del problema.
        en: Do not confuse fs_max with another nearby quantity in the problem.
    next_step_rules:
    - id: fs_max_next
      when: 'true'
      status: info
      text:
        es: Usa fs_max para enlazar con el siguiente paso de interpretacion.
        en: Use fs_max to connect with the next interpretation step.
