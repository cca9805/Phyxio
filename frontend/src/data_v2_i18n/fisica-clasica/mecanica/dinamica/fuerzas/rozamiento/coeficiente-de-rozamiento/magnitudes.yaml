version: 1
magnitudes:
- id: mu_s
  symbol: \mu_s
  nombre:
    es: coeficiente_rozamiento_estatico
    en: Static-Friction Coefficient
  descripcion:
    es: Parametro adimensional de adherencia en regimen estatico.
    en: Dimensionless parameter that characterizes adhesion in the static regime.
  unidad_si: '-'
  dimension: '1'
  is_vector: false
  components: null
  category: parameter
  physical_role: model_parameter
  used_in:
  - coeficiente-de-rozamiento
  common_mistake: Confundir mu_s con otra magnitud cercana dentro de coeficiente de
    rozamiento.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - coeficiente-de-rozamiento
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar mu_s con una definicion estable antes de sustituir valores.
