version: 1
formulas:
- id: fk_modelo
  title:
    es: Modelo de rozamiento dinámico
    en: Kinetic-friction model
  equation: fk = mu_k*N
  latex: f_k = \mu_k N
  rearrangements:
  - target: fk
    equation: fk = mu_k*N
    latex: f_k = \mu_k N
    constraints: []
  - target: mu_k
    equation: mu_k = fk/N
    latex: \mu_k = \frac{f_k}{N}
    constraints:
    - expr: N != 0
      message:
        es: N != 0
        en: N != 0
  - target: N
    equation: N = fk/mu_k
    latex: N = \frac{f_k}{\mu_k}
    constraints:
    - expr: mu_k != 0
      message:
        es: mu_k != 0
        en: mu_k != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en rozamiento dinamico.
    en: Relacion fisica usada en rozamiento dinamico.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - rozamiento-dinamico
  interpretation_tags:
  - rozamiento-dinamico
  result_semantics:
    target: fk
    meaning: Resulta util para interpretar fk en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
