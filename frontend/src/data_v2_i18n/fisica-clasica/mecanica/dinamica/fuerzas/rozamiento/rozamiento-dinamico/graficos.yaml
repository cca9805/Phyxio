version: "1.0"
leaf: "rozamiento-dinamico"

coord:
  title:
    es: Gráfica Coord · Rozamiento Dinámico
    en: Coord Graph · Kinetic Friction
  xAxis:
    es: fuerza normal N (N)
    en: normal force N (N)
  yAxis:
    es: fuerza de rozamiento cinético f_c (N)
    en: kinetic friction force f_c (N)
  xMagnitude: N
  yMagnitude: f_c
  relation:
    es: "f_c = μ_c·N: relación lineal con pendiente μ_c. El rozamiento cinético es independiente de la velocidad y del área de contacto."
    en: "f_c = μ_c·N: linear relationship with slope μ_c. Kinetic friction is independent of velocity and contact area."
  physicalReading:
    es: La pendiente de la recta es μ_c. Al doblar N, f_c se dobla. μ_c < μ_e siempre (el rozamiento cinético es menor que el estático máximo).
    en: The slope of the line is μ_c. Doubling N doubles f_c. μ_c < μ_e always (kinetic friction is less than maximum static).
  slopeMeaning:
    es: Pendiente = μ_c (adimensional). Permite determinar μ_c experimentalmente midiendo f_c para diferentes valores de N.
    en: Slope = μ_c (dimensionless). Allows determining μ_c experimentally by measuring f_c for different N values.
  interceptMeaning:
    es: "La recta pasa por el origen: sin fuerza normal no hay rozamiento cinético."
    en: "The line passes through the origin: without a normal force there is no kinetic friction."
  curvatureMeaning:
    es: Relación estrictamente lineal en el modelo de Coulomb. Desviaciones indican dependencia de velocidad o temperatura.
    en: Strictly linear in the Coulomb model. Deviations indicate velocity or temperature dependence.
  signMeaning:
    es: f_c siempre positiva en módulo; su sentido es siempre opuesto al movimiento.
    en: f_c always positive in magnitude; its direction is always opposite to motion.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Válido cuando el cuerpo está en movimiento (v > 0). En reposo se usa μ_e (estático)."
    en: "Valid when the body is moving (v > 0). At rest μ_e (static) is used."
  modelConnection:
    es: "Se interpreta bajo el modelo de Coulomb: f_c = μ_c·N, independiente de v y del área de contacto."
    en: "Interpreted under Coulomb's model: f_c = μ_c·N, independent of v and contact area."
  formulaConnection:
    es: Conecta con f_c = μ_c·N, a = (F_aplicada − μ_c·N)/m y la potencia disipada P = f_c·v.
    en: Connects to f_c = μ_c·N, a = (F_applied − μ_c·N)/m and the dissipated power P = f_c·v.
  readingFocus:
    es: leer la pendiente μ_c y verificar que la recta pasa por el origen.
    en: read the slope μ_c and verify the line passes through the origin.
  agentHints:
    es:
      - "μ_c < μ_e siempre: empezar a mover un objeto requiere más fuerza que mantenerlo en movimiento."
      - "f_c es independiente de la velocidad (modelo de Coulomb): deslizar más rápido no cambia f_c."
      - "Valores típicos: acero sobre acero μ_c ≈ 0.15, caucho sobre asfalto μ_c ≈ 0.7."
    en:
      - "μ_c < μ_e always: starting to move an object requires more force than keeping it moving."
      - "f_c is independent of velocity (Coulomb model): sliding faster does not change f_c."
      - "Typical values: steel on steel μ_c ≈ 0.15, rubber on asphalt μ_c ≈ 0.7."
  commonMistakes:
    es:
      - Usar μ_e en lugar de μ_c cuando el cuerpo ya está en movimiento.
      - Pensar que f_c aumenta con la velocidad (en el modelo de Coulomb es constante).
      - Calcular f_c con N = mg en plano inclinado (debe ser N = mg·cosθ).
    en:
      - Using μ_e instead of μ_c when the body is already moving.
      - Thinking f_c increases with velocity (in the Coulomb model it is constant).
      - Computing f_c with N = mg on an inclined plane (should be N = mg·cosθ).

dcl:
  title:
    es: DCL · Rozamiento Dinámico
    en: FBD · Kinetic Friction
  xAxis:
    es: eje x paralelo a la superficie (positivo en la dirección del movimiento)
    en: x-axis parallel to surface (positive in direction of motion)
  yAxis:
    es: eje y perpendicular a la superficie (positivo alejándose de la superficie)
    en: y-axis perpendicular to surface (positive away from surface)
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - N (normal, perpendicular a la superficie hacia arriba)
      - f_c = μ_c·N (rozamiento cinético, opuesto al movimiento)
      - F_aplicada (fuerza externa si aplica)
    en:
      - W = m·g (weight, downward)
      - N (normal, perpendicular to surface upward)
      - f_c = μ_c·N (kinetic friction, opposing motion)
      - F_applied (external force if applicable)
  object:
    es: cuerpo en movimiento sobre superficie con rozamiento cinético
    en: body moving on a surface with kinetic friction
  freeBodyCondition:
    es: El DCL muestra W, N, f_c opuesta al movimiento y F_aplicada. Como el cuerpo se mueve, se usa μ_c (no μ_e).
    en: The FBD shows W, N, f_c opposing motion, and F_applied. Since the body is moving, μ_c is used (not μ_e).
  equilibriumCondition:
    es: "Si F_aplicada = f_c = μ_c·N, el cuerpo se mueve a velocidad constante (equilibrio dinámico). Si F > f_c, hay aceleración."
    en: "If F_applied = f_c = μ_c·N, the body moves at constant velocity (dynamic equilibrium). If F > f_c, there is acceleration."
  netForce:
    es: ΣF_x = F_aplicada − μ_c·N = m·a. ΣF_y = N − mg = 0 → N = mg.
    en: ΣF_x = F_applied − μ_c·N = m·a. ΣF_y = N − mg = 0 → N = mg.
  accelerationDirection:
    es: "Si F_aplicada > f_c: aceleración en la dirección de F. Si F_aplicada < f_c: desaceleración (el objeto frena)."
    en: "If F_applied > f_c: acceleration in F direction. If F_applied < f_c: deceleration (the object slows down)."
  referenceFrameChoice:
    es: Eje +x en la dirección del movimiento (f_c negativa en +x).
    en: +x axis in the direction of motion (f_c negative in +x).
  forceTypes:
    es:
      - W = mg (gravitacional)
      - N (normal de contacto)
      - f_c = μ_c·N (rozamiento cinético, disipativa)
      - F_aplicada (externa)
    en:
      - W = mg (gravitational)
      - N (contact normal)
      - f_c = μ_c·N (kinetic friction, dissipative)
      - F_applied (external)
  signConvention:
    es: "f_c negativa en la dirección del movimiento (+x): f_c = −μ_c·N·x̂."
    en: "f_c negative in the direction of motion (+x): f_c = −μ_c·N·x̂."
  relation:
    es: El DCL con rozamiento cinético muestra f_c = μ_c·N opuesta al movimiento, permitiendo calcular la aceleración o la fuerza necesaria para MRU.
    en: The FBD with kinetic friction shows f_c = μ_c·N opposing motion, enabling computation of acceleration or force needed for URM.
  readingFocus:
    es: leer f_c = μ_c·N en sentido opuesto al movimiento y calcular a = (F_aplicada − μ_c·N)/m.
    en: read f_c = μ_c·N opposing motion and compute a = (F_applied − μ_c·N)/m.
  agentHints:
    es:
      - "f_c es constante e independiente de v (modelo de Coulomb): el DCL no cambia con la velocidad."
      - "Para MRU: F_aplicada = f_c. Para aceleración: F_aplicada > f_c. Para frenada: F_aplicada < f_c."
      - La energía disipada por rozamiento es W_r = f_c·d = μ_c·N·d.
    en:
      - "f_c is constant and independent of v (Coulomb model): the FBD does not change with velocity."
      - "For URM: F_applied = f_c. For acceleration: F_applied > f_c. For braking: F_applied < f_c."
      - Energy dissipated by friction is W_r = f_c·d = μ_c·N·d.
  commonMistakes:
    es:
      - Dibujar f_c en la misma dirección que el movimiento.
      - Usar μ_e (estático) en lugar de μ_c (cinético) cuando el cuerpo ya se mueve.
      - Olvidar que N = mg·cosθ en plano inclinado, no N = mg.
    en:
      - Drawing f_c in the same direction as motion.
      - Using μ_e (static) instead of μ_c (kinetic) when the body is already moving.
      - Forgetting that N = mg·cosθ on an inclined plane, not N = mg.
