version: 2
id: interpretacion-rozamiento-dinamico
leaf_id: rozamiento-dinamico
nombre:
  es: Interpretacion de Rozamiento dinamico
  en: Interpretation of Kinetic Friction
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: rozamiento
  ruta_relativa: fisica-clasica/mecanica/dinamica/fuerzas/rozamiento/rozamiento-dinamico
dependencies:
  formulas:
  - fk_modelo
  - direccion_fk
  magnitudes:
  - fk
  - mu_k
  - N
  - v_rel
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  fk:
    summary_rules:
    - id: fk_summary
      when: 'true'
      status: info
      text:
        es: fk resume una lectura fisica relevante del leaf.
        en: fk summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: fk_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que fk sea coherente con unidades y contexto.
        en: Check that fk is coherent with units and context.
    physical_reading_rules:
    - id: fk_physical
      when: 'true'
      status: info
      text:
        es: Si fk aumenta, el contacto disipa mas y reduce mas intensamente la fuerza neta disponible durante el deslizamiento.
        en: If fk increases, the contact dissipates more and subtracts more strongly from the net force during sliding.
    model_validity_rules:
    - id: fk_validity
      when: 'true'
      status: ok
      text:
        es: fk solo es interpretable dentro del modelo elegido.
        en: fk is interpretable only inside the chosen model.
    graph_rules:
    - id: fk_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de fk.
        en: The graph must reflect the role of fk visually.
    likely_errors:
    - id: fk_warn
      when: 'true'
      status: warning
      text:
        es: No confundas fk con otra magnitud cercana del problema.
        en: Do not confuse fk with another nearby quantity in the problem.
    next_step_rules:
    - id: fk_next
      when: 'true'
      status: info
      text:
        es: Usa fk para enlazar con el siguiente paso de interpretacion.
        en: Use fk to connect with the next interpretation step.
  mu_k:
    summary_rules:
    - id: mu_k_summary
      when: 'true'
      status: info
      text:
        es: mu_k resume una lectura fisica relevante del leaf.
        en: mu_k summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: mu_k_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que mu_k sea coherente con unidades y contexto.
        en: Check that mu_k is coherent with units and context.
    physical_reading_rules:
    - id: mu_k_physical
      when: 'true'
      status: info
      text:
        es: Un mu_k mayor implica una resistencia tangencial mayor para la misma normal mientras ya existe deslizamiento.
        en: A larger mu_k means a larger tangential resistance for the same normal load once sliding exists.
    model_validity_rules:
    - id: mu_k_validity
      when: 'true'
      status: ok
      text:
        es: mu_k solo es interpretable dentro del modelo elegido.
        en: mu_k is interpretable only inside the chosen model.
    graph_rules:
    - id: mu_k_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de mu_k.
        en: The graph must reflect the role of mu_k visually.
    likely_errors:
    - id: mu_k_warn
      when: 'true'
      status: warning
      text:
        es: No confundas mu_k con otra magnitud cercana del problema.
        en: Do not confuse mu_k with another nearby quantity in the problem.
    next_step_rules:
    - id: mu_k_next
      when: 'true'
      status: info
      text:
        es: Usa mu_k para enlazar con el siguiente paso de interpretacion.
        en: Use mu_k to connect with the next interpretation step.
  N:
    summary_rules:
    - id: N_summary
      when: 'true'
      status: info
      text:
        es: N resume una lectura fisica relevante del leaf.
        en: N summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: N_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que N sea coherente con unidades y contexto.
        en: Check that N is coherent with units and context.
    physical_reading_rules:
    - id: N_physical
      when: 'true'
      status: info
      text:
        es: Si N aumenta, fk tambien aumenta y el contacto roba mas capacidad de aceleracion al sistema.
        en: If N increases, fk also increases and the contact removes more accelerating capability from the system.
    model_validity_rules:
    - id: N_validity
      when: 'true'
      status: ok
      text:
        es: N solo es interpretable dentro del modelo elegido.
        en: N is interpretable only inside the chosen model.
    graph_rules:
    - id: N_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de N.
        en: The graph must reflect the role of N visually.
    likely_errors:
    - id: N_warn
      when: 'true'
      status: warning
      text:
        es: No confundas N con otra magnitud cercana del problema.
        en: Do not confuse N with another nearby quantity in the problem.
    next_step_rules:
    - id: N_next
      when: 'true'
      status: info
      text:
        es: Usa N para enlazar con el siguiente paso de interpretacion.
        en: Use N to connect with the next interpretation step.
