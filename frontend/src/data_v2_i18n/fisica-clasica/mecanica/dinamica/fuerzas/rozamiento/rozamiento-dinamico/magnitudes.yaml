version: 1
magnitudes:
- id: fk
  symbol: \vec f_k
  nombre:
    es: rozamiento_dinamico
    en: Kinetic friction
  descripcion:
    es: Fuerza de rozamiento dinámico (cinético) durante el deslizamiento.
    en: Kinetic-friction force during sliding.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - fk_x
  - fk_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - rozamiento-dinamico
  common_mistake: Confundir fk con otra magnitud cercana dentro de rozamiento dinamico.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - rozamiento-dinamico
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar fk con una definicion estable antes de sustituir valores.
