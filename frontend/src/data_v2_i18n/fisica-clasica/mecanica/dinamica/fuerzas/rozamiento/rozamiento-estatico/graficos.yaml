version: "1.0"
leaf: "rozamiento-estatico"

coord:
  title:
    es: Gráfica Coord · Rozamiento Estático
    en: Coord Graph · Static Friction
  xAxis:
    es: fuerza aplicada F (N)
    en: applied force F (N)
  yAxis:
    es: fuerza de rozamiento estático f_e (N)
    en: static friction force f_e (N)
  xMagnitude: F
  yMagnitude: f_e
  relation:
    es: "f_e = F (equilibrio estático) para F ≤ f_e,max = μ_e·N. Para F > μ_e·N el cuerpo se mueve y f pasa a ser f_c = μ_c·N (menor). La gráfica muestra: rampa lineal de pendiente 1 hasta el pico μ_e·N, luego caída a μ_c·N."
    en: "f_e = F (static equilibrium) for F ≤ f_e,max = μ_e·N. For F > μ_e·N the body moves and f becomes f_c = μ_c·N (smaller). The graph shows: linear ramp of slope 1 up to peak μ_e·N, then drop to μ_c·N."
  physicalReading:
    es: "El pico de la curva es f_e,max = μ_e·N: la fuerza umbral para comenzar el movimiento. Después del pico, el rozamiento cae a μ_c·N y el cuerpo acelera."
    en: "The curve peak is f_e,max = μ_e·N: the threshold force to start motion. After the peak, friction drops to μ_c·N and the body accelerates."
  slopeMeaning:
    es: "Pendiente = 1 en el tramo estático: f_e = F (se adapta exactamente a la fuerza aplicada para mantener el equilibrio)."
    en: "Slope = 1 in the static segment: f_e = F (adapts exactly to the applied force to maintain equilibrium)."
  interceptMeaning:
    es: "La curva pasa por el origen: sin fuerza aplicada no hay rozamiento estático."
    en: "The curve passes through the origin: without applied force there is no static friction."
  curvatureMeaning:
    es: "La transición estático→cinético es una discontinuidad (salto hacia abajo): μ_e > μ_c siempre."
    en: "The static→kinetic transition is a discontinuity (drop): μ_e > μ_c always."
  signMeaning:
    es: f_e siempre se opone a F (movimiento inminente). Su sentido cambia si el sentido de F cambia.
    en: f_e always opposes F (impending motion). Its direction changes if F direction changes.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "El tramo estático cubre 0 ≤ F ≤ μ_e·N. Para F > μ_e·N: régimen cinético."
    en: "The static segment covers 0 ≤ F ≤ μ_e·N. For F > μ_e·N: kinetic regime."
  modelConnection:
    es: "Se interpreta bajo el modelo de Coulomb estático: f_e ≤ μ_e·N, con f_e = F en el tramo de equilibrio."
    en: "Interpreted under the static Coulomb model: f_e ≤ μ_e·N, with f_e = F in the equilibrium segment."
  formulaConnection:
    es: "Conecta con f_e ≤ μ_e·N, f_e = F (equilibrio estático), y la transición a f_c = μ_c·N para F > μ_e·N."
    en: "Connects to f_e ≤ μ_e·N, f_e = F (static equilibrium), and the transition to f_c = μ_c·N for F > μ_e·N."
  readingFocus:
    es: leer f_e,max = μ_e·N (pico de la curva) como umbral de movimiento y μ_c·N como valor cinético posterior.
    en: read f_e,max = μ_e·N (curve peak) as the motion threshold and μ_c·N as the subsequent kinetic value.
  agentHints:
    es:
      - "El rozamiento estático se adapta: f_e = F para cualquier F < μ_e·N. No es constante."
      - El pico μ_e·N es la fuerza mínima necesaria para iniciar el movimiento.
      - La caída del pico al valor cinético μ_c·N explica por qué los objetos aceleran justo al comenzar a moverse.
    en:
      - "Static friction adapts: f_e = F for any F < μ_e·N. It is not constant."
      - The peak μ_e·N is the minimum force required to start motion.
      - The drop from the peak to the kinetic value μ_c·N explains why objects accelerate just as motion begins.
  commonMistakes:
    es:
      - Pensar que f_e = μ_e·N siempre (solo es el valor máximo, no el valor general).
      - No incluir la caída a μ_c·N tras el inicio del movimiento.
      - Usar μ_c (cinético) para calcular la fuerza umbral de inicio del movimiento.
    en:
      - Thinking f_e = μ_e·N always (it is only the maximum value, not the general value).
      - Not including the drop to μ_c·N after motion begins.
      - Using μ_c (kinetic) to compute the motion-start threshold force.

dcl:
  title:
    es: DCL · Rozamiento Estático
    en: FBD · Static Friction
  xAxis:
    es: eje x paralelo a la superficie
    en: x-axis parallel to surface
  yAxis:
    es: eje y perpendicular a la superficie
    en: y-axis perpendicular to surface
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - N (normal, hacia arriba)
      - F_aplicada (fuerza externa horizontal)
      - "f_e (rozamiento estático, opuesto al movimiento inminente, variable: f_e = F para F < μ_e·N)"
    en:
      - W = m·g (weight, downward)
      - N (normal, upward)
      - F_applied (external horizontal force)
      - "f_e (static friction, opposing impending motion, variable: f_e = F for F < μ_e·N)"
  object:
    es: cuerpo en reposo sobre superficie plana con fuerza aplicada
    en: body at rest on a flat surface with applied force
  freeBodyCondition:
    es: "El DCL muestra W, N, F_aplicada y f_e. En equilibrio estático: f_e = F_aplicada (se adapta). La condición límite es f_e = μ_e·N."
    en: "The FBD shows W, N, F_applied, and f_e. In static equilibrium: f_e = F_applied (adapts). The limiting condition is f_e = μ_e·N."
  equilibriumCondition:
    es: ΣF_x = F_aplicada − f_e = 0 → f_e = F_aplicada (mientras F < μ_e·N). ΣF_y = N − mg = 0 → N = mg.
    en: ΣF_x = F_applied − f_e = 0 → f_e = F_applied (while F < μ_e·N). ΣF_y = N − mg = 0 → N = mg.
  netForce:
    es: "ΣF = 0 en equilibrio estático. La fuerza neta es cero: el cuerpo permanece en reposo."
    en: "ΣF = 0 in static equilibrium. The net force is zero: the body remains at rest."
  accelerationDirection:
    es: No hay aceleración en equilibrio estático. El cuerpo está en reposo.
    en: No acceleration in static equilibrium. The body is at rest.
  referenceFrameChoice:
    es: Eje +x en la dirección de F_aplicada (f_e negativa en +x).
    en: +x axis in the direction of F_applied (f_e negative in +x).
  forceTypes:
    es:
      - W = mg (gravitacional)
      - N (normal de contacto)
      - F_aplicada (externa)
      - f_e (rozamiento estático, adaptable)
    en:
      - W = mg (gravitational)
      - N (contact normal)
      - F_applied (external)
      - f_e (static friction, adaptive)
  signConvention:
    es: "f_e negativa en la dirección de F_aplicada: f_e se opone al movimiento inminente."
    en: "f_e negative in the direction of F_applied: f_e opposes impending motion."
  relation:
    es: El DCL en equilibrio estático muestra que f_e = F_aplicada (no es constante μ_e·N), con el límite f_e,max = μ_e·N.
    en: The FBD in static equilibrium shows f_e = F_applied (not the constant μ_e·N), with limit f_e,max = μ_e·N.
  readingFocus:
    es: verificar f_e = F_aplicada (adaptación) y la condición límite f_e ≤ μ_e·N.
    en: verify f_e = F_applied (adaptation) and the limiting condition f_e ≤ μ_e·N.
  agentHints:
    es:
      - "f_e no es μ_e·N en general: solo alcanza μ_e·N en el umbral de movimiento."
      - "Para saber si el cuerpo se mueve: comparar F_aplicada con μ_e·N. Si F > μ_e·N, se mueve."
      - "El DCL de equilibrio estático tiene ΣF = 0: las flechas se cancelan vectorialmente."
    en:
      - "f_e is not μ_e·N in general: it only reaches μ_e·N at the motion threshold."
      - "To determine if the body moves: compare F_applied with μ_e·N. If F > μ_e·N, it moves."
      - "The static equilibrium FBD has ΣF = 0: the arrows cancel vectorially."
  commonMistakes:
    es:
      - Asumir f_e = μ_e·N para cualquier fuerza aplicada (solo válido en el umbral).
      - Usar μ_c en lugar de μ_e para calcular la fuerza umbral de inicio del movimiento.
      - No reconocer que f_e se adapta automáticamente a F_aplicada mientras F < μ_e·N.
    en:
      - Assuming f_e = μ_e·N for any applied force (only valid at the threshold).
      - Using μ_c instead of μ_e to compute the motion-start threshold.
      - Not recognising that f_e adapts automatically to F_applied while F < μ_e·N.
