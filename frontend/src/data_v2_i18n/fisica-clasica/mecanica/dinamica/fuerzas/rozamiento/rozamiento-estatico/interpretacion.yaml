      text:
        es: Si fsmax crece, la interfaz puede sostener mayor demanda antes de perder adherencia porque tambien crece la capacidad del contacto.
        en: If fsmax grows, the interface can sustain a larger tangential demand before adhesion is lost.
    model_validity_rules:
