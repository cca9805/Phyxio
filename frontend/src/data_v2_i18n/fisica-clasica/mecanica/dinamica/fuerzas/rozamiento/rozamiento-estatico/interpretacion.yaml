version: 2
id: interpretacion-rozamiento-estatico
leaf_id: rozamiento-estatico
nombre:
  es: Interpretacion de Rozamiento estatico
  en: Interpretation of Static Friction
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: rozamiento
  ruta_relativa: fisica-clasica/mecanica/dinamica/fuerzas/rozamiento/rozamiento-estatico
dependencies:
  formulas:
  - condicion_estatica
  - umbral_estatico
  - criterio_deslizamiento
  magnitudes:
  - fs
  - fsmax
  - mus
  - N
  - Ft
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  fs:
    summary_rules:
    - id: fs_summary
      when: 'true'
      status: info
      text:
        es: fs resume una lectura fisica relevante del leaf.
        en: fs summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: fs_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que fs sea coherente con unidades y contexto.
        en: Check that fs is coherent with units and context.
    physical_reading_rules:
    - id: fs_physical
      when: 'true'
      status: info
      text:
        es: Si fs aumenta, es porque la demanda tangencial del problema tambien aumenta mientras el contacto sigue sin deslizar.
        en: If fs grows, it is because the tangential demand grows while the contact still remains without sliding.
    model_validity_rules:
    - id: fs_validity
      when: 'true'
      status: ok
      text:
        es: fs solo es interpretable dentro del modelo elegido.
        en: fs is interpretable only inside the chosen model.
    graph_rules:
    - id: fs_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de fs.
        en: The graph must reflect the role of fs visually.
    likely_errors:
    - id: fs_warn
      when: 'true'
      status: warning
      text:
        es: No confundas fs con otra magnitud cercana del problema.
        en: Do not confuse fs with another nearby quantity in the problem.
    next_step_rules:
    - id: fs_next
      when: 'true'
      status: info
      text:
        es: Usa fs para enlazar con el siguiente paso de interpretacion.
        en: Use fs to connect with the next interpretation step.
