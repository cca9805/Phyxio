version: 1
magnitudes:
- id: fs
  symbol: f_s
  nombre:
    es: rozamiento_estatico
    en: Static friction
  descripcion:
    es: Fuerza tangencial de contacto en regimen estatico.
    en: Tangential contact force in the static regime.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - rozamiento-estatico
  common_mistake: Confundir fs con otra magnitud cercana dentro de rozamiento estatico.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - rozamiento-estatico
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar fs con una definicion estable antes de sustituir valores.
