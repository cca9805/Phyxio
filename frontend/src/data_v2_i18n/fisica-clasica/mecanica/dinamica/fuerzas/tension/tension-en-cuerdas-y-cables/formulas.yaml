- id: tension_equilibrio_vertical
  title:
    es: Equilibrio vertical simple
    en: Simple vertical equilibrium
  equation: T = m*g
  latex: T = m g
  rearrangements:
  - target: T
    equation: T = m*g
    latex: T = m g
    constraints: []
  - target: m
    equation: m = T/g
    latex: m = \frac{T}{g}
    constraints:
    - expr: g != 0
      message:
        es: g != 0
        en: g != 0
  - target: g
    equation: g = T/m
    latex: g = \frac{T}{m}
    constraints:
    - expr: m != 0
      message:
        es: m != 0
        en: m != 0
  category: operative
  relation_type: derived_relation
  physical_meaning:
