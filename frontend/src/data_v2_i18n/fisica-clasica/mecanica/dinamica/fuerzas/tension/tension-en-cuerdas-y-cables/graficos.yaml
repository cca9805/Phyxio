version: "1.0"
leaf: "tension-en-cuerdas-y-cables"

coord:
  title:
    es: Gráfica Coord · Tensión en Cuerdas y Cables
    en: Coord Graph · Tension in Ropes and Cables
  xAxis:
    es: masa colgada m (kg)
    en: hanging mass m (kg)
  yAxis:
    es: tensión T (N)
    en: tension T (N)
  xMagnitude: m
  yMagnitude: T
  relation:
    es: "T = m(g + a): lineal con m. Para a = 0 (equilibrio): T = mg. Para a > 0 (aceleración hacia arriba): T > mg. Para a < 0 (aceleración hacia abajo): T < mg. La cuerda ideal (sin masa) transmite T igual en ambos extremos."
    en: "T = m(g + a): linear in m. At a = 0 (equilibrium): T = mg. For a > 0 (upward acceleration): T > mg. For a < 0 (downward acceleration): T < mg. An ideal rope (massless) transmits the same T at both ends."
  physicalReading:
    es: "La pendiente de la recta T vs m es (g + a). En equilibrio la pendiente es g. Si la pendiente > g hay aceleración hacia arriba; si < g, hacia abajo."
    en: "The slope of the T vs m line is (g + a). At equilibrium the slope is g. If slope > g there is upward acceleration; if < g, downward."
  slopeMeaning:
    es: Pendiente = (g + a). Permite determinar la aceleración del sistema midiendo T para distintas masas.
    en: Slope = (g + a). Allows determining the system acceleration by measuring T for different masses.
  interceptMeaning:
    es: "La recta pasa por el origen (T = 0 para m = 0): sin masa colgada no hay tensión."
    en: "The line passes through the origin (T = 0 for m = 0): without a hanging mass there is no tension."
  curvatureMeaning:
    es: La relación T vs m es lineal. No linealidad indicaría efectos como la masa de la cuerda o deformación.
    en: The T vs m relationship is linear. Non-linearity would indicate effects such as rope mass or deformation.
  signMeaning:
    es: "T > 0 siempre: una cuerda solo puede estar en tracción, nunca en compresión."
    en: "T > 0 always: a rope can only be in tension, never in compression."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para cuerdas inextensibles sin masa. Para cables reales, T varía a lo largo de la longitud.
    en: Valid for massless inextensible ropes. For real cables, T varies along the length.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton para la masa: T − mg = ma → T = m(g + a)."
    en: "Interpreted under Newton's second law for the mass: T − mg = ma → T = m(g + a)."
  formulaConnection:
    es: "Conecta con T = mg (equilibrio), T = m(g + a) (dinámica), y la condición T > 0 siempre."
    en: "Connects to T = mg (equilibrium), T = m(g + a) (dynamics), and the condition T > 0 always."
  readingFocus:
    es: "leer la pendiente (g + a) para determinar la aceleración del sistema y verificar T > 0."
    en: "read the slope (g + a) to determine the system acceleration and verify T > 0."
  agentHints:
    es:
      - "En una polea ideal (sin masa, sin rozamiento): T es igual en todos los segmentos de la cuerda."
      - "En la máquina de Atwood: T = 2m_1m_2g/(m_1+m_2) (cuerda ideal, sin rozamiento)."
      - "La cuerda real tiene masa: T no es constante a lo largo, aumenta desde el extremo libre hasta el punto de anclaje."
    en:
      - "In an ideal pulley (massless, frictionless): T is equal in all rope segments."
      - "In an Atwood machine: T = 2m_1m_2g/(m_1+m_2) (ideal rope, frictionless)."
      - "A real rope has mass: T is not constant along its length, increasing from the free end to the anchor point."
  commonMistakes:
    es:
      - Asumir T = mg independientemente de la aceleración del sistema.
      - "Pensar que T puede ser negativa (solo puede ser positiva: tracción)."
      - Usar el mismo T en ambos lados de una polea real con rozamiento.
    en:
      - Assuming T = mg regardless of the system acceleration.
      - "Thinking T can be negative (it can only be positive: tension)."
      - Using the same T on both sides of a real pulley with friction.

dcl:
  title:
    es: DCL · Tensión en Cuerdas y Cables
    en: FBD · Tension in Ropes and Cables
  xAxis:
    es: eje vertical (positivo hacia arriba)
    en: vertical axis (positive upward)
  yAxis:
    es: eje x (horizontal, sin fuerzas en este caso)
    en: x-axis (horizontal, no forces in this case)
  forces:
    es:
      - W = m·g (peso, hacia abajo)
      - T (tensión de la cuerda, hacia arriba en la masa)
    en:
      - W = m·g (weight, downward)
      - T (rope tension, upward on the mass)
  object:
    es: "masa colgada de una cuerda (ideal: sin masa, inextensible)"
    en: "mass hanging from a rope (ideal: massless, inextensible)"
  freeBodyCondition:
    es: El DCL muestra W hacia abajo y T hacia arriba. Para cuerda ideal, T en la masa = T en el punto de anclaje.
    en: The FBD shows W downward and T upward. For an ideal rope, T at the mass equals T at the anchor point.
  equilibriumCondition:
    es: ΣF_y = T − mg = 0 → T = mg (equilibrio estático o MRU).
    en: ΣF_y = T − mg = 0 → T = mg (static equilibrium or URM).
  netForce:
    es: "ΣF_y = T − mg = m·a → T = m(g + a). Para a > 0 (hacia arriba): T > mg."
    en: "ΣF_y = T − mg = m·a → T = m(g + a). For a > 0 (upward): T > mg."
  accelerationDirection:
    es: "a > 0 (hacia arriba): T > mg. a < 0 (hacia abajo): T < mg. a = −g (caída libre): T = 0."
    en: "a > 0 (upward): T > mg. a < 0 (downward): T < mg. a = −g (free fall): T = 0."
  referenceFrameChoice:
    es: "Eje +y hacia arriba para que T > 0 y W < 0 en la ecuación de movimiento."
    en: "+y axis upward so that T > 0 and W < 0 in the equation of motion."
  forceTypes:
    es:
      - W = mg (gravitacional, hacia abajo)
      - T (tensión de contacto a distancia, hacia arriba)
    en:
      - W = mg (gravitational, downward)
      - T (contact-at-distance tension, upward)
  signConvention:
    es: "Positivo hacia arriba. T − mg = ma: T = m(g + a)."
    en: "Positive upward. T − mg = ma: T = m(g + a)."
  relation:
    es: El DCL de la masa colgada muestra T y W. Para cuerda ideal, T se transmite sin pérdidas a través de poleas sin masa ni rozamiento.
    en: The FBD of the hanging mass shows T and W. For an ideal rope, T transmits without loss through massless, frictionless pulleys.
  readingFocus:
    es: "leer T − mg = ma, identificar a y calcular T = m(g + a). Verificar siempre T > 0."
    en: "read T − mg = ma, identify a, and compute T = m(g + a). Always verify T > 0."
  agentHints:
    es:
      - "En una máquina de Atwood ideal: a = (m_1 − m_2)g/(m_1 + m_2) y T = 2m_1m_2g/(m_1 + m_2)."
      - La tensión en una cuerda colgada verticalmente con masa distribuida varía linealmente con la posición.
      - "T = 0 implica cuerda sin tensión (floja): el sistema está en caída libre o la cuerda se ha soltado."
    en:
      - "In an ideal Atwood machine: a = (m_1 − m_2)g/(m_1 + m_2) and T = 2m_1m_2g/(m_1 + m_2)."
      - Tension in a vertically hanging rope with distributed mass varies linearly with position.
      - "T = 0 implies no rope tension (slack): the system is in free fall or the rope has detached."
  commonMistakes:
    es:
      - Plantear T = mg independientemente de la aceleración del sistema.
      - Aplicar el mismo T en ambos lados de una polea con rozamiento.
      - Dibujar T hacia abajo en la masa (la tensión en la masa siempre tira hacia arriba, hacia la cuerda).
    en:
      - Setting T = mg regardless of the system acceleration.
      - Applying the same T on both sides of a pulley with friction.
      - Drawing T downward on the mass (tension on the mass always pulls upward, toward the rope).
