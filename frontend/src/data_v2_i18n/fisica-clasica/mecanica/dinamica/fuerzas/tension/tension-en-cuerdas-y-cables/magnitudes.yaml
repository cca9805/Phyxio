    es: Fuerza de traccion transmitida por cuerda o cable.
    en: Pulling force transmitted by a rope or cable.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - T_x
  - T_y
  category: derived
  physical_role: tension_force
  used_in:
  - tension-en-cuerdas-y-cables
  common_mistake: Confundir T con otra magnitud cercana dentro de tension en cuerdas
    y cables.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - tension-en-cuerdas-y-cables
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar T con una definicion estable antes de sustituir valores.
