version: "1.0"
leaf: "descomposicion-vectorial"

dcl:
  title:
    es: DCL · Descomposición Vectorial
    en: FBD · Vector Decomposition
  forces:
    es:
      - F (fuerza a descomponer)
      - F_x = F·cosθ (componente horizontal)
      - F_y = F·senθ (componente vertical)
    en:
      - F (force to decompose)
      - F_x = F·cosθ (horizontal component)
      - F_y = F·sinθ (vertical component)
  object:
    es: punto de aplicación de la fuerza
    en: point of application of the force
  freeBodyCondition:
    es: Se representa el vector F y sus proyecciones sobre los ejes coordenados elegidos.
    en: The vector F and its projections onto the chosen coordinate axes are represented.
  equilibriumCondition:
    es: "El vector resultante y sus componentes forman un triángulo rectángulo: F² = F_x² + F_y²."
    en: "The resultant vector and its components form a right triangle: F² = F_x² + F_y²."
  netForce:
    es: Las componentes son la proyección de F sobre cada eje. Su suma vectorial reconstruye F.
    en: The components are the projections of F onto each axis. Their vector sum reconstructs F.
  accelerationDirection:
    es: La aceleración resultante tiene la misma dirección y sentido que la fuerza neta.
    en: The resultant acceleration has the same direction and sense as the net force.
  referenceFrameChoice:
    es: Elegir ejes alineados con la dirección del movimiento o con el plano inclinado simplifica la descomposición.
    en: Choosing axes aligned with the direction of motion or with the inclined plane simplifies the decomposition.
  forceTypes:
    es:
      - "F: fuerza aplicada"
      - "F_x: componente paralela al eje x"
      - "F_y: componente paralela al eje y"
    en:
      - "F: applied force"
      - "F_x: component parallel to x-axis"
      - "F_y: component parallel to y-axis"
  signConvention:
    es: "F_x > 0 si apunta en +x, F_y > 0 si apunta en +y."
    en: "F_x > 0 if pointing in +x, F_y > 0 if pointing in +y."
  commonMistakes:
    es:
      - "Intercambiar senθ y cosθ al descomponer: depende del ángulo de referencia elegido."
      - Usar distintos sistemas de referencia para distintas fuerzas en el mismo problema.
      - Olvidar que la componente perpendicular al movimiento no hace trabajo.
    en:
      - "Swapping sinθ and cosθ when decomposing: it depends on the chosen reference angle."
      - Using different reference frames for different forces in the same problem.
      - Forgetting that the component perpendicular to motion does no work.
  agentHints:
    es:
      - El ángulo θ se mide siempre respecto al eje de referencia elegido.
      - Si la fuerza es paralela a un eje, una componente es cero y la otra es F.
      - La magnitud de F se recupera como √(F_x² + F_y²).
    en:
      - Angle θ is always measured with respect to the chosen reference axis.
      - If the force is parallel to one axis, one component is zero and the other equals F.
      - The magnitude of F is recovered as √(F_x² + F_y²).
  relation:
    es: "Muestra la descomposición de una fuerza en sus componentes rectangulares sobre los ejes x e y: F_x = F·cosθ y F_y = F·senθ."
    en: "Shows the decomposition of a force into its rectangular components along the x and y axes: F_x = F·cosθ and F_y = F·sinθ."
  readingFocus:
    es: leer el ángulo de referencia, identificar las componentes y verificar que F² = F_x² + F_y².
    en: read the reference angle, identify the components, and verify that F² = F_x² + F_y².

svg:
  title:
    es: Escena SVG · Descomposición Vectorial
    en: SVG Scene · Vector Decomposition
  sceneId: descomposicion_vectorial_scene
  sceneLabel:
    es: Vector F descompuesto en componentes rectangulares
    en: Vector F decomposed into rectangular components
  objects:
    es:
      - vector F
      - componente F_x
      - componente F_y
      - triángulo de descomposición
      - ejes coordenados
    en:
      - vector F
      - component F_x
      - component F_y
      - decomposition triangle
      - coordinate axes
  mainObject:
    es: fuerza F a descomponer
    en: force F to decompose
  referenceFrame:
    es: ejes cartesianos x-y con origen en el punto de aplicación
    en: Cartesian x-y axes with origin at the point of application
  geometry:
    es: La escena muestra el vector F con su ángulo respecto al eje x, y las proyecciones F_x y F_y que forman el triángulo rectángulo de descomposición.
    en: The scene shows vector F with its angle relative to the x-axis, and projections F_x and F_y forming the right triangle of decomposition.
  interactions:
    es: "No hay dinámica: la escena es puramente geométrica."
    en: "No dynamics: the scene is purely geometric."
  modelElements:
    es:
      - vector F (hipotenusa)
      - F_x = F·cosθ (cateto horizontal)
      - F_y = F·senθ (cateto vertical)
      - ángulo θ
    en:
      - vector F (hypotenuse)
      - F_x = F·cosθ (horizontal leg)
      - F_y = F·sinθ (vertical leg)
      - angle θ
  visualCues:
    es:
      - F_x y F_y son los catetos del triángulo rectángulo cuya hipotenusa es F.
      - El ángulo θ entre F y el eje x determina la proporción entre componentes.
      - Si θ = 0°, F_y = 0 y F_x = F; si θ = 90°, F_x = 0 y F_y = F.
    en:
      - F_x and F_y are the legs of the right triangle whose hypotenuse is F.
      - Angle θ between F and the x-axis determines the proportion between components.
      - If θ = 0°, F_y = 0 and F_x = F; if θ = 90°, F_x = 0 and F_y = F.
  scaleMeaning:
    es: Las longitudes son proporcionales a las magnitudes de F, F_x y F_y.
    en: Lengths are proportional to the magnitudes of F, F_x, and F_y.
  relation:
    es: La escena ilustra visualmente que una fuerza se puede descomponer en dos componentes perpendiculares cuya suma vectorial reconstruye la fuerza original.
    en: The scene visually illustrates that a force can be decomposed into two perpendicular components whose vector sum reconstructs the original force.
  physicalReading:
    es: Leer el ángulo θ para deducir F_x = F·cosθ y F_y = F·senθ.
    en: Read angle θ to deduce F_x = F·cosθ and F_y = F·sinθ.
  modelConnection:
    es: "Se interpreta bajo el cálculo vectorial: proyección ortogonal de un vector sobre los ejes."
    en: "Interpreted within vector calculus: orthogonal projection of a vector onto the axes."
  formulaConnection:
    es: Conecta con F_x = F·cosθ, F_y = F·senθ y F = √(F_x² + F_y²).
    en: Connects to F_x = F·cosθ, F_y = F·sinθ, and F = √(F_x² + F_y²).
  readingFocus:
    es: identificar el ángulo de referencia y leer visualmente las proporciones de las componentes respecto a F.
    en: identify the reference angle and visually read the proportions of the components relative to F.
  agentHints:
    es:
      - El vector F y sus componentes forman siempre un triángulo rectángulo.
      - Cambiar el sistema de ejes no cambia F, solo cambia F_x y F_y.
      - Si los ejes están alineados con la fuerza, la descomposición es trivial.
    en:
      - Vector F and its components always form a right triangle.
      - Changing the axis system does not change F, only F_x and F_y.
      - If the axes are aligned with the force, decomposition is trivial.
  commonMistakes:
    es:
      - Dibujar las componentes no perpendiculares entre sí.
      - Confundir el ángulo de F respecto al eje x con respecto al eje y.
      - Sumar los módulos de las componentes en lugar de sumarlos vectorialmente.
    en:
      - Drawing components that are not perpendicular to each other.
      - Confusing the angle of F with respect to the x-axis vs. the y-axis.
      - Adding the magnitudes of the components instead of adding them vectorially.

coord:
  title:
    es: Gráfica Coord · Descomposición Vectorial
    en: Coord Graph · Vector Decomposition
  xAxis:
    es: ángulo θ (grados o radianes)
    en: angle θ (degrees or radians)
  yAxis:
    es: componente F_x o F_y (N)
    en: component F_x or F_y (N)
  xMagnitude: θ
  yMagnitude: F_x o F_y
  relation:
    es: F_x = F·cosθ varía como el coseno del ángulo y F_y = F·senθ varía como el seno. Las curvas son sinusoidales y están desfasadas 90° entre sí.
    en: F_x = F·cosθ varies as the cosine of the angle and F_y = F·sinθ varies as the sine. The curves are sinusoidal and 90° out of phase.
  physicalReading:
    es: Cuando θ = 0°, F_x es máxima y F_y es cero. Cuando θ = 90°, F_y es máxima y F_x es cero.
    en: At θ = 0°, F_x is maximum and F_y is zero. At θ = 90°, F_y is maximum and F_x is zero.
  slopeMeaning:
    es: La pendiente de F_x(θ) es −F·senθ (negativa para θ en primer cuadrante); la pendiente de F_y(θ) es F·cosθ.
    en: The slope of F_x(θ) is −F·sinθ (negative for θ in the first quadrant); the slope of F_y(θ) is F·cosθ.
  interceptMeaning:
    es: "En θ = 0: F_x = F (máximo) y F_y = 0."
    en: "At θ = 0: F_x = F (maximum) and F_y = 0."
  curvatureMeaning:
    es: Ambas curvas son sinusoidales de amplitud F y período 2π.
    en: Both curves are sinusoidal with amplitude F and period 2π.
  signMeaning:
    es: "Componente positiva: la fuerza apunta en el sentido positivo del eje. Negativa: sentido contrario."
    en: "Positive component: force points in the positive axis direction. Negative: opposite direction."
  areaMeaning:
    es: Sin interpretación directa en este contexto.
    en: No direct interpretation in this context.
  domainMeaning:
    es: El ángulo varía entre 0° y 360°. Los problemas físicos suelen limitarse a 0° a 90°.
    en: Angle varies from 0° to 360°. Physical problems are usually limited to 0° to 90°.
  modelConnection:
    es: "Se interpreta bajo el álgebra vectorial: proyección de F sobre los ejes mediante funciones trigonométricas."
    en: "Interpreted within vector algebra: projection of F onto the axes using trigonometric functions."
  formulaConnection:
    es: Conecta con F_x = F·cosθ y F_y = F·senθ.
    en: Connects to F_x = F·cosθ and F_y = F·sinθ.
  readingFocus:
    es: leer el valor de las componentes para el ángulo de interés e identificar cuándo cada componente es máxima o nula.
    en: read the component values for the angle of interest and identify when each component is maximum or zero.
  agentHints:
    es:
      - F_x y F_y tienen máximos en ángulos desfasados 90°.
      - La suma de los cuadrados de las componentes siempre es F².
      - Para el trabajo, solo importa la componente en la dirección del desplazamiento.
    en:
      - F_x and F_y have maxima at angles 90° apart.
      - The sum of the squares of the components always equals F².
      - For work, only the component in the direction of displacement matters.
  commonMistakes:
    es:
      - Usar sen en lugar de cos para la componente horizontal cuando θ se mide desde el eje x.
      - Olvidar el signo de la componente según el cuadrante en que se encuentra F.
      - Confundir F_x y F_y al cambiar el eje de referencia.
    en:
      - Using sin instead of cos for the horizontal component when θ is measured from the x-axis.
      - Forgetting the sign of the component depending on the quadrant of F.
      - Confusing F_x and F_y when changing the reference axis.
