version: 1
magnitudes:
- id: Fm
  symbol: F
  nombre:
    es: módulo de la fuerza
    en: force magnitude
  descripcion:
    es: Intensidad total del vector fuerza antes de proyectarlo sobre ejes elegidos.
    en: Total magnitude of the force vector before projecting it onto chosen axes.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - descomposicion-vectorial
  common_mistake: Confundir Fm con otra magnitud cercana dentro de descomposicion
    vectorial.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - descomposicion-vectorial
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar Fm con una definicion estable antes de sustituir valores.
