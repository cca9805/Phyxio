version: "1.0"
leaf: "diagramas-cuerpo-libre"

coord:
  title:
    es: Gráfica Coord · Diagramas de Cuerpo Libre
    en: Coord Graph · Free Body Diagrams
  xAxis:
    es: fuerza aplicada F (N)
    en: applied force F (N)
  yAxis:
    es: aceleración del sistema a (m/s²)
    en: system acceleration a (m/s²)
  xMagnitude: F
  yMagnitude: a
  relation:
    es: "La aceleración resultante del cuerpo libre es a = ΣF/m: la gráfica muestra la relación lineal entre la fuerza neta y la aceleración obtenida del DCL."
    en: "The resultant acceleration of the free body is a = ΣF/m: the graph shows the linear relationship between net force and acceleration obtained from the FBD."
  physicalReading:
    es: "La pendiente es 1/m: a mayor masa, menor pendiente para la misma fuerza."
    en: "The slope is 1/m: greater mass means smaller slope for the same force."
  slopeMeaning:
    es: Pendiente = 1/m. Permite determinar la masa del sistema sin mediándola directamente.
    en: Slope = 1/m. Allows determining the system mass without directly measuring it.
  interceptMeaning:
    es: Si hay rozamiento, el corte con el eje x es la fuerza umbral necesaria para que el cuerpo empiece a acelerar.
    en: With friction, the x-intercept is the threshold force required to begin accelerating the body.
  curvatureMeaning:
    es: La relación es lineal si la masa es constante. Una curvatura indicaría masa variable.
    en: The relationship is linear for constant mass. Curvature would indicate variable mass.
  signMeaning:
    es: "Aceleración positiva: fuerza neta en sentido +x. Negativa: fuerza neta opuesta al sentido positivo."
    en: "Positive acceleration: net force in +x direction. Negative: net force opposite to positive direction."
  areaMeaning:
    es: Sin interpretación directa en este diagrama fuerza-aceleración.
    en: No direct interpretation in this force-acceleration diagram.
  domainMeaning:
    es: Válido para el rango de fuerzas aplicadas en el experimento. Extrapolación solo si el sistema no cambia.
    en: Valid for the range of forces applied in the experiment. Extrapolation only if the system does not change.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton aplicada al cuerpo libre identificado en el DCL.
    en: "Interpreted under Newton's second law applied to the free body identified in the FBD."
  formulaConnection:
    es: Conecta con a = ΣF/m, donde ΣF se obtiene del diagrama de cuerpo libre.
    en: Connects to a = ΣF/m, where ΣF is obtained from the free body diagram.
  readingFocus:
    es: leer la pendiente como 1/m y el intercepto como la fuerza de rozamiento estático máximo.
    en: read the slope as 1/m and the intercept as maximum static friction force.
  agentHints:
    es:
      - El DCL debe incluir solo fuerzas reales que actúan sobre el objeto, no fuerzas que el objeto ejerce sobre otros.
      - La aceleración es la del cuerpo considerado, en la dirección de la fuerza neta.
      - Si el objeto está en equilibrio, la gráfica pasa por el origen y la aceleración es cero.
    en:
      - The FBD must include only real forces acting on the object, not forces the object exerts on others.
      - The acceleration is that of the body under analysis, in the direction of the net force.
      - If the object is in equilibrium, the graph passes through the origin and acceleration is zero.
  commonMistakes:
    es:
      - Incluir fuerzas de reacción en el DCL del mismo cuerpo (violación de la 3ª ley).
      - Olvidar el peso o la normal al trazar el DCL.
      - Tomar la resultante como una fuerza adicional en lugar de como el efecto de las fuerzas existentes.
    en:
      - "Including reaction forces in the same body's FBD (violation of Newton's 3rd law)."
      - Forgetting weight or normal force when drawing the FBD.
      - Treating the resultant as an additional force instead of the effect of existing forces.

dcl:
  title:
    es: DCL · Diagrama de Cuerpo Libre
    en: FBD · Free Body Diagram
  forces:
    es:
      - W = mg (peso hacia abajo)
      - N (normal perpendicular a la superficie)
      - F_aplicada (fuerza externa)
      - f_r (rozamiento opuesto al movimiento)
    en:
      - W = mg (weight downward)
      - N (normal perpendicular to surface)
      - F_applied (external force)
      - f_r (friction opposing motion)
  object:
    es: cuerpo sobre el que se aplica el análisis
    en: body under analysis
  freeBodyCondition:
    es: El DCL aísla el objeto y muestra todas las fuerzas reales que actúan sobre él, con sus direcciones y sentidos correctos.
    en: The FBD isolates the object and shows all real forces acting on it, with correct directions and senses.
  equilibriumCondition:
    es: Si ΣF = 0, el cuerpo está en equilibrio o en MRU.
    en: If ΣF = 0, the body is in equilibrium or in uniform rectilinear motion.
  netForce:
    es: La resultante ΣF determina la aceleración a = ΣF/m.
    en: The resultant ΣF determines the acceleration a = ΣF/m.
  accelerationDirection:
    es: La aceleración tiene la misma dirección y sentido que la fuerza resultante.
    en: Acceleration has the same direction and sense as the resultant force.
  referenceFrameChoice:
    es: Elegir un sistema de coordenadas alineado con la dirección del movimiento minimiza las componentes a calcular.
    en: Choosing a coordinate system aligned with the direction of motion minimizes the components to compute.
  forceTypes:
    es:
      - W = mg (gravitacional)
      - N (normal de contacto)
      - F_aplicada (externa)
      - f_r = μ·N (rozamiento)
    en:
      - W = mg (gravitational)
      - N (contact normal)
      - F_applied (external)
      - f_r = μ·N (friction)
  signConvention:
    es: "Fuerzas en sentido positivo del eje: +. Fuerzas en sentido negativo: −."
    en: "Forces in the positive axis direction: +. Forces in the negative direction: −."
  commonMistakes:
    es:
      - Incluir la fuerza que el objeto ejerce sobre otro (confusión con la 3ª ley).
      - Olvidar el peso en el DCL.
      - Dibujar la normal no perpendicular a la superficie de contacto.
    en:
      - "Including the force the object exerts on another (confusion with Newton's 3rd law)."
      - Forgetting weight in the FBD.
      - Drawing the normal not perpendicular to the contact surface.
  agentHints:
    es:
      - Solo se dibujan fuerzas que actúan SOBRE el cuerpo aislado, no las que él ejerce.
      - La normal siempre es perpendicular a la superficie de contacto y no realiza trabajo.
      - El rozamiento dinámico es opuesto al sentido del movimiento; el estático se opone al movimiento inminente.
    en:
      - Only forces acting ON the isolated body are drawn, not the forces it exerts on others.
      - The normal is always perpendicular to the contact surface and does no work.
      - Kinetic friction opposes the direction of motion; static friction opposes impending motion.
  relation:
    es: El DCL representa todas las fuerzas reales que actúan sobre el cuerpo aislado, permitiendo aplicar ΣF = ma para cada eje.
    en: The FBD represents all real forces acting on the isolated body, enabling application of ΣF = ma for each axis.
  readingFocus:
    es: identificar cada fuerza, su dirección y sentido, luego proyectar sobre los ejes para obtener las ecuaciones de Newton.
    en: "identify each force, its direction and sense, then project onto axes to obtain Newton's equations."

svg:
  title:
    es: Escena SVG · Diagrama de Cuerpo Libre
    en: SVG Scene · Free Body Diagram
  sceneId: dcl_scene
  sceneLabel:
    es: Cuerpo sobre superficie con todas las fuerzas que actúan sobre él
    en: Body on surface with all forces acting on it
  objects:
    es:
      - cuerpo
      - flecha peso W
      - flecha normal N
      - flecha fuerza aplicada F
      - flecha rozamiento f_r
    en:
      - body
      - weight arrow W
      - normal arrow N
      - applied force arrow F
      - friction arrow f_r
  mainObject:
    es: cuerpo aislado para el análisis de fuerzas
    en: isolated body for force analysis
  referenceFrame:
    es: sistema de coordenadas con el cuerpo en el origen
    en: coordinate system with the body at the origin
  geometry:
    es: La escena muestra el cuerpo con todas las fuerzas representadas como vectores que emergen de él.
    en: The scene shows the body with all forces represented as vectors emerging from it.
  interactions:
    es: Cada flecha representa una fuerza real de contacto o a distancia que actúa sobre el cuerpo.
    en: Each arrow represents a real contact or action-at-a-distance force acting on the body.
  modelElements:
    es:
      - W = mg hacia abajo
      - N perpendicular a la superficie
      - F_aplicada con ángulo dado
      - f_r opuesta al movimiento
    en:
      - W = mg downward
      - N perpendicular to surface
      - F_applied at given angle
      - f_r opposing motion
  visualCues:
    es:
      - El peso siempre apunta verticalmente hacia abajo.
      - La normal es siempre perpendicular a la superficie de apoyo.
      - El rozamiento se opone al sentido del movimiento o del movimiento inminente.
    en:
      - Weight always points vertically downward.
      - The normal is always perpendicular to the supporting surface.
      - Friction opposes the direction of motion or impending motion.
  scaleMeaning:
    es: Las longitudes de las flechas son proporcionales a las magnitudes de las fuerzas.
    en: Arrow lengths are proportional to force magnitudes.
  relation:
    es: La escena representa el cuerpo libre con todas las fuerzas que actúan sobre él, base para aplicar la segunda ley de Newton.
    en: "The scene represents the free body with all forces acting on it, as the basis for applying Newton's second law."
  physicalReading:
    es: Identificar cada fuerza, su punto de aplicación, dirección y sentido para plantear las ecuaciones de Newton por componentes.
    en: "Identify each force, its point of application, direction and sense to set up Newton's equations by components."
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton: ΣF = ma para cada dirección."
    en: "Interpreted under Newton's second law: ΣF = ma for each direction."
  formulaConnection:
    es: Conecta con ΣF_x = m·a_x y ΣF_y = m·a_y.
    en: Connects to ΣF_x = m·a_x and ΣF_y = m·a_y.
  readingFocus:
    es: verificar que se representan solo fuerzas que actúan sobre el cuerpo y que sus direcciones son físicamente correctas.
    en: verify that only forces acting on the body are represented and that their directions are physically correct.
  agentHints:
    es:
      - La normal sobre superficie horizontal iguala el peso si no hay aceleración vertical.
      - "Si el objeto está en equilibrio, los vectores se cancelan: la suma vectorial de todas las fuerzas es cero."
      - "El DCL es la herramienta fundamental de la dinámica: sin él, es imposible aplicar ΣF = ma correctamente."
    en:
      - The normal on a horizontal surface equals weight if there is no vertical acceleration.
      - "If the object is in equilibrium, vectors cancel: the vector sum of all forces is zero."
      - "The FBD is the fundamental tool of dynamics: without it, correctly applying ΣF = ma is impossible."
  commonMistakes:
    es:
      - Dibujar fuerzas de reacción (por ejemplo, el peso que el cuerpo ejerce sobre la Tierra) en el mismo DCL.
      - Omitir fuerzas que no son visibles (rozamiento, tensión).
      - No indicar la dirección de la aceleración junto al DCL.
    en:
      - Drawing reaction forces (e.g., the weight the body exerts on Earth) in the same FBD.
      - Omitting forces that are not visible (friction, tension).
      - Not indicating the direction of acceleration alongside the FBD.
