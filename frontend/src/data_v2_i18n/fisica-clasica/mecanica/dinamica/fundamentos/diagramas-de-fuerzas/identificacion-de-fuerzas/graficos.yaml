version: "1.0"
leaf: "identificacion-de-fuerzas"

dcl:
  title:
    es: DCL · Identificación de Fuerzas
    en: FBD · Force Identification
  forces:
    es:
      - peso W = mg
      - normal N
      - tensión T
      - rozamiento f
      - fuerza elástica F_k
      - empuje hidrostático E
    en:
      - weight W = mg
      - normal N
      - tension T
      - friction f
      - elastic force F_k
      - buoyancy E
  object:
    es: cuerpo sometido a múltiples fuerzas para clasificar
    en: body subject to multiple forces to classify
  freeBodyCondition:
    es: "El DCL muestra las fuerzas presentes en el problema, clasificadas por tipo: gravitacionales, de contacto, a distancia."
    en: "The FBD shows forces present in the problem, classified by type: gravitational, contact, and action-at-a-distance."
  equilibriumCondition:
    es: En equilibrio, la suma vectorial de todas las fuerzas identificadas es cero.
    en: In equilibrium, the vector sum of all identified forces is zero.
  netForce:
    es: La resultante de todas las fuerzas identificadas determina la aceleración del cuerpo.
    en: "The resultant of all identified forces determines the body's acceleration."
  accelerationDirection:
    es: La dirección de la aceleración coincide con la de la fuerza resultante.
    en: The direction of acceleration coincides with that of the resultant force.
  referenceFrameChoice:
    es: Identificar el tipo de cada fuerza (gravitacional, normal, fricción, tensión) antes de descomponer en ejes.
    en: Identify the type of each force (gravitational, normal, friction, tension) before decomposing into axes.
  forceTypes:
    es:
      - "Gravitacional: W = mg"
      - "Normal: perpendicular a la superficie"
      - "Fricción: paralela a la superficie, opuesta al movimiento"
      - "Tensión: a lo largo de la cuerda"
      - "Elástica: proporcional a la elongación"
    en:
      - "Gravitational: W = mg"
      - "Normal: perpendicular to surface"
      - "Friction: parallel to surface, opposing motion"
      - "Tension: along the rope"
      - "Elastic: proportional to elongation"
  signConvention:
    es: Se asigna + al sentido positivo de cada eje elegido.
    en: + is assigned to the positive direction of each chosen axis.
  commonMistakes:
    es:
      - Olvidar alguna fuerza (frecuentemente el rozamiento o la tensión).
      - "Inventar fuerzas que no existen (como la \"fuerza de movimiento\")."
      - Incluir la aceleración como una fuerza en el DCL.
    en:
      - Forgetting a force (commonly friction or tension).
      - "Inventing forces that do not exist (such as the \"force of motion\")."
      - Including acceleration as a force in the FBD.
  agentHints:
    es:
      - Clasificar primero las fuerzas por tipo ayuda a no omitirlas.
      - "Toda fuerza requiere una causa física identificable: no existe la \"fuerza de movimiento\"."
      - "La aceleración no es una fuerza: es la consecuencia de la fuerza neta."
    en:
      - Classifying forces by type first helps avoid omissions.
      - "Every force requires an identifiable physical cause: there is no \"force of motion\"."
      - "Acceleration is not a force: it is the consequence of the net force."
  relation:
    es: El DCL enumera y clasifica todas las fuerzas que actúan sobre el cuerpo, paso previo e indispensable para aplicar las leyes de Newton.
    en: "The FBD lists and classifies all forces acting on the body, an indispensable preliminary step for applying Newton's laws."
  readingFocus:
    es: identificar el tipo de cada fuerza (gravitacional, de contacto, etc.) y asignar su dirección y sentido correcto antes de plantear ecuaciones.
    en: identify the type of each force (gravitational, contact, etc.) and assign its correct direction and sense before setting up equations.

svg:
  title:
    es: Escena SVG · Identificación de Fuerzas
    en: SVG Scene · Force Identification
  sceneId: identificacion_fuerzas_scene
  sceneLabel:
    es: Escena física con distintas fuerzas rotuladas por tipo
    en: Physical scene with forces labelled by type
  objects:
    es:
      - cuerpo
      - superficie
      - fuerzas etiquetadas por tipo
    en:
      - body
      - surface
      - forces labelled by type
  mainObject:
    es: cuerpo sometido a múltiples fuerzas
    en: body subject to multiple forces
  referenceFrame:
    es: sistema de referencia del laboratorio
    en: laboratory reference frame
  geometry:
    es: "La escena muestra el cuerpo en su entorno con cada fuerza rotulada: W (peso), N (normal), f (rozamiento), T (tensión) o F_k (elástica), según el contexto."
    en: "The scene shows the body in its environment with each force labelled: W (weight), N (normal), f (friction), T (tension) or F_k (elastic), depending on context."
  interactions:
    es: Cada interacción física (gravitatoria, de contacto, elástica, etc.) genera una fuerza visible en la escena.
    en: Each physical interaction (gravitational, contact, elastic, etc.) produces a visible force in the scene.
  modelElements:
    es:
      - etiquetas de cada tipo de fuerza
      - vectores con dirección y sentido correctos
      - superficie o soporte según el contexto
    en:
      - labels for each force type
      - vectors with correct direction and sense
      - surface or support depending on context
  visualCues:
    es:
      - El peso apunta siempre hacia el centro de la Tierra (hacia abajo).
      - La normal es siempre perpendicular a la superficie de contacto.
      - La tensión actúa a lo largo de la cuerda y aleja al objeto del punto de contacto.
    en:
      - Weight always points toward the center of the Earth (downward).
      - The normal is always perpendicular to the contact surface.
      - Tension acts along the rope and pulls the object away from the contact point.
  scaleMeaning:
    es: Las longitudes son proporcionales a las magnitudes. Las etiquetas son más importantes que los tamaños exactos.
    en: Lengths are proportional to magnitudes. Labels are more important than exact sizes.
  relation:
    es: La escena ilustra cómo identificar visualmente cada tipo de fuerza a partir de la situación física descrita.
    en: The scene illustrates how to visually identify each force type from the described physical situation.
  physicalReading:
    es: Leer la etiqueta de cada flecha para clasificar la fuerza y deducir su origen físico.
    en: Read the label of each arrow to classify the force and deduce its physical origin.
  modelConnection:
    es: Se interpreta bajo la taxonomía de fuerzas de la dinámica clásica.
    en: Interpreted within the force taxonomy of classical dynamics.
  formulaConnection:
    es: Conecta con W = mg, N = mg·cosθ (plano inclinado), f = μ·N y T = m(g + a) (acelerado hacia arriba).
    en: Connects to W = mg, N = mg·cosθ (inclined plane), f = μ·N, and T = m(g + a) (accelerating upward).
  readingFocus:
    es: identificar el tipo de fuerza, su origen y su dirección antes de proyectar sobre los ejes del DCL.
    en: identify the force type, its origin, and its direction before projecting onto the FBD axes.
  agentHints:
    es:
      - "Toda fuerza tiene una causa física: si no puedes nombrar la causa, probablemente es una fuerza ficticia."
      - Las fuerzas de contacto solo existen mientras hay contacto físico.
      - El peso existe siempre que haya masa y campo gravitatorio, incluso en el vacío.
    en:
      - "Every force has a physical cause: if you cannot name the cause, it is probably a fictitious force."
      - Contact forces only exist while physical contact is maintained.
      - Weight exists whenever there is mass and a gravitational field, even in vacuum.
  commonMistakes:
    es:
      - Incluir la aceleración como una flecha de fuerza en la escena.
      - No identificar el rozamiento cuando la superficie no es lisa.
      - Confundir tensión (interna a la cuerda) con fuerza aplicada.
    en:
      - Including acceleration as a force arrow in the scene.
      - Not identifying friction when the surface is not smooth.
      - Confusing tension (internal to the rope) with applied force.
