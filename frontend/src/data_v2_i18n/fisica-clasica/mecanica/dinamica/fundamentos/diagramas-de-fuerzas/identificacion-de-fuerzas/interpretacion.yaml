version: 2
id: interpretacion-identificacion-de-fuerzas
leaf_id: identificacion-de-fuerzas
nombre:
  es: Interpretacion de Identificacion de fuerzas
  en: Interpretation of Identifying Forces
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: diagramas-de-fuerzas
  ruta_relativa: fisica-clasica/mecanica/dinamica/fundamentos/diagramas-de-fuerzas/identificacion-de-fuerzas
dependencies:
  formulas:
  - weight_definition
  - friction_limit_static
  - force_existence_logic
  magnitudes:
  - P
  - N
  - f
  - T
  - F_ap
  - system_contact
  - m
  - g
  - mu_s
  - f_s
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  P:
    summary_rules:
    - id: P_summary
      when: 'true'
      status: info
      text:
        es: P resume una lectura fisica relevante del leaf.
        en: P summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: P_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que P sea coherente con unidades y contexto.
        en: Check that P is coherent with units and context.
    physical_reading_rules:
    - id: P_physical
      when: 'true'
      status: info
      text:
        es: "Un valor de P grande indica que la masa del cuerpo es elevada o que el campo gravitatorio es intenso: el cuerpo oprime fuertemente la superficie, lo que produce una normal N grande y por tanto puede soportar un rozamiento estatico mayor antes de deslizar. Un valor de P pequeno reduce N y limita el rozamiento maximo disponible, haciendo al sistema mas sensible a fuerzas horizontales pequenas."
        en: "A large P value indicates that the body's mass is high or the gravitational field is strong: the body presses heavily on the surface, producing a large normal N and therefore supporting greater static friction before slipping. A small P reduces N and limits the maximum available friction, making the system more sensitive to small horizontal forces."
    model_validity_rules:
    - id: P_validity
      when: 'true'
      status: ok
      text:
        es: P solo es interpretable dentro del modelo elegido.
        en: P is interpretable only inside the chosen model.
    graph_rules:
    - id: P_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de P.
        en: The graph must reflect the role of P visually.
    likely_errors:
    - id: P_warn
      when: 'true'
      status: warning
      text:
        es: No confundas P con otra magnitud cercana del problema.
        en: Do not confuse P with another nearby quantity in the problem.
    next_step_rules:
    - id: P_next
      when: 'true'
      status: info
      text:
        es: Usa P para enlazar con el siguiente paso de interpretacion.
        en: Use P to connect with the next interpretation step.
