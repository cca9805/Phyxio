version: 1
magnitudes:
- id: P
  symbol: P
  nombre:
    es: peso
    en: weight
  descripcion:
    es: Fuerza gravitatoria ejercida por la Tierra sobre el cuerpo.
    en: Gravitational force exerted by the Earth on the body.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - P_x
  - P_y
  category: derived
  physical_role: gravitational_force
  used_in:
  - identificacion-de-fuerzas
  common_mistake: Confundir P con otra magnitud cercana dentro de identificacion de
    fuerzas.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - identificacion-de-fuerzas
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar P con una definicion estable antes de sustituir valores.
