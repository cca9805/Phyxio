version: "1.0"
leaf: "primera-ley-inercia"

dcl:
  title:
    es: DCL · Primera Ley de la Inercia
    en: "FBD · Newton's First Law of Inertia"
  forces:
    es:
      - fuerzas externas que se equilibran entre sí
      - W = mg (peso)
      - N (normal)
    en:
      - external forces that balance each other
      - W = mg (weight)
      - N (normal)
  object:
    es: cuerpo en reposo o en movimiento rectilíneo uniforme
    en: body at rest or in uniform rectilinear motion
  freeBodyCondition:
    es: "La suma vectorial de todas las fuerzas es cero: ΣF = 0. El cuerpo no acelera."
    en: "The vector sum of all forces is zero: ΣF = 0. The body does not accelerate."
  equilibriumCondition:
    es: "ΣF = 0 implica a = 0: el cuerpo mantiene su estado de movimiento sin cambios."
    en: "ΣF = 0 implies a = 0: the body maintains its state of motion unchanged."
  netForce:
    es: La fuerza resultante es cero. No hay aceleración.
    en: The resultant force is zero. There is no acceleration.
  accelerationDirection:
    es: "No hay aceleración: el cuerpo está en reposo o en MRU."
    en: "There is no acceleration: the body is at rest or in URM."
  referenceFrameChoice:
    es: En un marco inercial, la primera ley se cumple exactamente sin necesidad de fuerzas ficticias.
    en: In an inertial frame, the first law holds exactly without the need for fictitious forces.
  forceTypes:
    es:
      - W = mg (gravitacional)
      - N (normal de contacto)
      - Otras fuerzas que se cancelan entre sí
    en:
      - W = mg (gravitational)
      - N (contact normal)
      - Other forces that cancel each other
  signConvention:
    es: Se asigna + al sentido positivo. La suma algebraica de componentes en cada eje es cero.
    en: + is assigned to the positive direction. The algebraic sum of components along each axis is zero.
  commonMistakes:
    es:
      - "Confundir equilibrio (a = 0) con reposo: un cuerpo en MRU también cumple la primera ley."
      - Pensar que se necesita una fuerza para mantener el movimiento uniforme.
      - Aplicar la primera ley en marcos no inerciales sin añadir fuerzas ficticias.
    en:
      - "Confusing equilibrium (a = 0) with rest: a body in URM also obeys the first law."
      - Thinking a force is needed to maintain uniform motion.
      - Applying the first law in non-inertial frames without adding fictitious forces.
  agentHints:
    es:
      - "La primera ley define los marcos inerciales: son aquellos en los que un cuerpo libre no acelera."
      - Si el cuerpo está en reposo o en MRU, las fuerzas están en equilibrio aunque no sean cero individualmente.
      - La inercia es la tendencia del cuerpo a resistir cambios en su estado de movimiento.
    en:
      - "The first law defines inertial frames: those in which a free body does not accelerate."
      - If the body is at rest or in URM, forces are in balance even if none is individually zero.
      - "Inertia is a body's tendency to resist changes in its state of motion."
  relation:
    es: "El DCL muestra que la fuerza resultante es cero: el cuerpo mantiene su estado de reposo o MRU por inercia."
    en: "The FBD shows that the resultant force is zero: the body maintains its rest or URM state by inertia."
  readingFocus:
    es: verificar que las fuerzas se cancelan por pares en cada eje, confirmando que no hay aceleración resultante.
    en: verify that forces cancel in pairs along each axis, confirming there is no resultant acceleration.
