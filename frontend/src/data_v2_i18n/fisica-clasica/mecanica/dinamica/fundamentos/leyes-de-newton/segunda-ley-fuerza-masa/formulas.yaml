version: 1
formulas:
- id: segunda_ley_newton
  title:
    es: Segunda ley de Newton
    en: Newton's Second Law
  equation: F_net = m * a
  latex: \vec{F} = m \vec{a}
  rearrangements:
  - target: F_net
    latex: \vec{F} = m \vec{a}
    equation: F_net = m * a
    constraints: []
  - target: a
    latex: \vec{a} = \frac{\vec{F}}{m}
    equation: a = F_net / m
    constraints: []
  - target: m
    latex: m = \frac{||\vec{F}||}{||\vec{a}||}
    equation: m = F_net / a
    constraints: []
  category: dinamica
  relation_type: ley_fisica
  physical_meaning:
    es: La aceleración de un sistema es proporcional a la fuerza neta aplicada e inversamente
      proporcional a su masa.
    en: The acceleration of a system is proportional to the net force applied and
      inversely proportional to its mass.
  constraints:
    es: Sistema con masa constante y fuerzas definidas en un marco inercial.
    en: System with constant mass and forces defined in an inertial frame.
  validity:
    es: Válida en mecánica clásica para velocidades no relativistas.
    en: Valid in classical mechanics for non-relativistic speeds.
  dimension_check:
    lhs: M L T^-2
    rhs: M * L T^-2
    result: correcto
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - dinamica
  - relacion_causal
  - respuesta_del_sistema
  result_semantics:
    target: F_net
    meaning: Resulta util para interpretar F_net en el contexto del leaf.
  domain_checks:
  - condition: m > 0
    message:
      es: La masa debe ser positiva.
      en: Mass must be positive.
  coherence_checks:
  - condition: F_net == 0 and a != 0
    message:
      es: Incoherencia física, fuerza neta nula no puede producir aceleración.
      en: Physical inconsistency, zero net force cannot produce acceleration.
  - condition: abs(a) > 1000
    message:
      es: Aceleración extremadamente alta, revisar valores.
      en: Extremely high acceleration, check values.
  graph_implications:
  - a depende directamente de F_net
  - a inversamente de m
  pedagogical_triggers:
  - detect: F_net == 0
    message:
      es: Estás en equilibrio dinámico o movimiento uniforme.
      en: You are in dynamic equilibrium or uniform motion.
- id: forma_componentes
  title:
    es: Segunda ley en componentes
    en: Second Law in Components
  equation: F_x = m * a_x
  latex: \sum F_x = m a_x
  rearrangements:
  - target: F_x
    latex: \sum F_x = m a_x
    equation: F_x = m * a_x
    constraints: []
  - target: a_x
    latex: a_x = \frac{\sum F_x}{m}
    equation: a_x = F_x / m
    constraints: []
  - target: m
    latex: m = \frac{\sum F_x}{a_x}
    equation: m = F_x / a_x
    constraints: []
  category: dinamica
  relation_type: descomposicion
  physical_meaning:
    es: La dinámica puede analizarse separando cada eje de forma independiente.
    en: Dynamics can be analyzed independently along each axis.
  constraints:
    es: Sistema cartesiano definido correctamente.
    en: Properly defined Cartesian system.
  validity:
    es: Siempre que se mantenga coherencia de ejes.
    en: As long as axis consistency is maintained.
  dimension_check:
    lhs: M L T^-2
    rhs: M * L T^-2
    result: correcto
  calculable: true
  motivo_no_calculable: null
  used_in:
  - problemas_bidimensionales
  interpretation_tags:
  - descomposicion
  - analisis_vectorial
  result_semantics:
    target: F_x
    meaning: Resulta util para interpretar F_x en el contexto del leaf.
  domain_checks:
  - condition: m > 0
    message:
      es: Masa inválida.
      en: Invalid mass.
  coherence_checks:
  - condition: F_x == 0 and a_x != 0
    message:
      es: Incoherencia en el eje x.
      en: Inconsistency along x-axis.
  graph_implications:
  - componentes independientes
  pedagogical_triggers:
  - detect: F_x == 0
    message:
      es: No hay aceleración en el eje x.
      en: No acceleration along x-axis.
