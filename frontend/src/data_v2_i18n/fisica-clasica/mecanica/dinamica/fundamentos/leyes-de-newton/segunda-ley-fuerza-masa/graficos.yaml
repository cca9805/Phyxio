version: "1.0"
leaf: "segunda-ley-fuerza-masa"

coord:
  title:
    es: "Gráfica Coord · Segunda Ley: Fuerza y Masa"
    en: "Coord Graph · Newton's Second Law: Force and Mass"
  xAxis:
    es: fuerza neta ΣF (N)
    en: net force ΣF (N)
  yAxis:
    es: aceleración a (m/s²)
    en: acceleration a (m/s²)
  xMagnitude: ΣF
  yMagnitude: a
  relation:
    es: "La aceleración es directamente proporcional a la fuerza neta e inversamente proporcional a la masa: a = ΣF/m. La gráfica a vs ΣF es una recta con pendiente 1/m."
    en: "Acceleration is directly proportional to net force and inversely proportional to mass: a = ΣF/m. The a vs ΣF graph is a straight line with slope 1/m."
  physicalReading:
    es: La pendiente de la recta es 1/m. Si se dobla la fuerza neta, la aceleración se dobla. Si se dobla la masa, la pendiente se reduce a la mitad.
    en: The slope of the line is 1/m. Doubling the net force doubles acceleration. Doubling the mass halves the slope.
  slopeMeaning:
    es: "La pendiente es 1/m: mayor masa implica menor pendiente, es decir, menos aceleración para la misma fuerza."
    en: "Slope = 1/m: greater mass implies smaller slope, i.e., less acceleration for the same force."
  interceptMeaning:
    es: El corte con el eje x es la fuerza de rozamiento estático máximo (umbral antes de que el cuerpo acelere). En ideal sin rozamiento, la recta pasa por el origen.
    en: The x-intercept is the maximum static friction force (threshold before the body accelerates). Ideally without friction, the line passes through the origin.
  curvatureMeaning:
    es: La relación es lineal. Cualquier curvatura indicaría masa variable o una fuerza que depende de la velocidad.
    en: The relationship is linear. Any curvature would indicate variable mass or a velocity-dependent force.
  signMeaning:
    es: "Aceleración positiva: fuerza neta en sentido positivo. Negativa: fuerza en sentido contrario."
    en: "Positive acceleration: net force in positive direction. Negative: force in opposite direction."
  areaMeaning:
    es: Sin interpretación directa en este diagrama fuerza-aceleración.
    en: No direct interpretation in this force-acceleration diagram.
  domainMeaning:
    es: Válido para el rango de fuerzas del experimento. La masa debe permanecer constante.
    en: Valid for the experimental force range. Mass must remain constant.
  modelConnection:
    es: "Se interpreta bajo la segunda ley de Newton: la aceleración de un cuerpo es proporcional a la fuerza neta y al inv de su masa."
    en: "Interpreted under Newton's second law: a body's acceleration is proportional to net force and inversely proportional to its mass."
  formulaConnection:
    es: Conecta directamente con a = ΣF/m o equivalentemente ΣF = m·a.
    en: Connects directly to a = ΣF/m or equivalently ΣF = m·a.
  readingFocus:
    es: leer la pendiente como 1/m para determinar la masa experimental, y el intercepto como la fuerza umbral si hay rozamiento.
    en: read the slope as 1/m to determine experimental mass, and the intercept as the threshold force if friction is present.
  agentHints:
    es:
      - "La pendiente del gráfico a vs F es 1/m: permite medir la masa experimentalmente sin balanza."
      - "Graficar a vs F para distintas masas da rectas con distintas pendientes: más masa, menor pendiente."
      - La intersección con el eje x indica la fuerza de rozamiento estático máximo.
    en:
      - "The slope of the a vs F graph is 1/m: enables experimental mass measurement without a balance."
      - "Plotting a vs F for different masses gives lines with different slopes: more mass, smaller slope."
      - The x-intercept indicates the maximum static friction force.
  commonMistakes:
    es:
      - Graficar F vs a y esperar una pendiente m (en lugar de 1/m).
      - Olvidar que ΣF es la fuerza NETA, no la fuerza aplicada individualmente.
      - Confundir peso (W = mg) con masa (m) al leer la gráfica.
    en:
      - Plotting F vs a and expecting a slope of m (instead of 1/m).
      - Forgetting that ΣF is the NET force, not an individually applied force.
      - Confusing weight (W = mg) with mass (m) when reading the graph.

dcl:
  title:
    es: "DCL · Segunda Ley: Fuerza y Masa"
    en: "FBD · Newton's Second Law: Force and Mass"
  forces:
    es:
      - F_aplicada (fuerza externa)
      - W = mg (peso)
      - N (normal)
      - f_r = μ·N (rozamiento)
    en:
      - F_applied (external force)
      - W = mg (weight)
      - N (normal)
      - f_r = μ·N (friction)
  object:
    es: cuerpo de masa m sometido a fuerza neta no nula
    en: body of mass m subject to a non-zero net force
  freeBodyCondition:
    es: El DCL muestra todas las fuerzas sobre el cuerpo. La resultante ΣF determina la aceleración.
    en: The FBD shows all forces on the body. The resultant ΣF determines the acceleration.
  equilibriumCondition:
    es: Si ΣF = 0, a = 0. Si ΣF ≠ 0, hay aceleración en la dirección de la resultante.
    en: If ΣF = 0, a = 0. If ΣF ≠ 0, there is acceleration in the direction of the resultant.
  netForce:
    es: ΣF = m·a. La flecha de aceleración se dibuja fuera del DCL, en la dirección de la resultante.
    en: ΣF = m·a. The acceleration arrow is drawn outside the FBD, in the direction of the resultant.
  accelerationDirection:
    es: La aceleración tiene la dirección y sentido de la fuerza neta ΣF.
    en: Acceleration has the direction and sense of the net force ΣF.
  referenceFrameChoice:
    es: Elegir el eje +x en la dirección del movimiento hace que la aceleración sea positiva y simplifica las ecuaciones.
    en: Choosing the +x axis in the direction of motion makes the acceleration positive and simplifies the equations.
  forceTypes:
    es:
      - F_aplicada
      - W = mg
      - N
      - f_r = μ_c·N
    en:
      - F_applied
      - W = mg
      - N
      - f_r = μ_c·N
  signConvention:
    es: El sentido de la aceleración define el eje positivo. Las fuerzas en ese sentido son positivas.
    en: The direction of acceleration defines the positive axis. Forces in that direction are positive.
  commonMistakes:
    es:
      - Dibujar la aceleración como una flecha dentro del DCL (es una consecuencia, no una fuerza).
      - Calcular ΣF sin incluir todas las fuerzas del DCL.
      - Confundir la masa con el peso en la segunda ley.
    en:
      - Drawing acceleration as an arrow inside the FBD (it is a consequence, not a force).
      - Computing ΣF without including all forces in the FBD.
      - Confusing mass with weight in the second law.
  agentHints:
    es:
      - "La segunda ley conecta el DCL con la cinemática: del DCL se obtiene a, de a se obtienen x(t) y v(t)."
      - Si hay varias fuerzas, solo importa su resultante para determinar la aceleración.
      - La dirección de la aceleración siempre coincide con la de la fuerza neta.
    en:
      - "The second law links the FBD to kinematics: from the FBD we get a, from a we get x(t) and v(t)."
      - With multiple forces, only their resultant matters for determining acceleration.
      - The direction of acceleration always coincides with that of the net force.
  relation:
    es: El DCL permite identificar todas las fuerzas para calcular la resultante ΣF y aplicar a = ΣF/m.
    en: The FBD allows identifying all forces to compute the resultant ΣF and apply a = ΣF/m.
  readingFocus:
    es: proyectar todas las fuerzas sobre cada eje, sumar algebraicamente y dividir por m para obtener la aceleración en cada dirección.
    en: project all forces onto each axis, sum algebraically, and divide by m to obtain acceleration in each direction.
