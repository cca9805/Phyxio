targets:
  F_net:
    summary_rules:
    - id: F_net_summary
      when: 'true'
      status: info
      text:
        es: F_net resume una lectura fisica relevante del leaf.
        en: F_net summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: F_net_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que F_net sea coherente con unidades y contexto.
        en: Check that F_net is coherent with units and context.
    physical_reading_rules:
    - id: F_net_physical
      when: 'true'
      status: info
      text:
        es: F_net es la fuerza neta sobre el sistema; por tanto, su magnitud implica que el cuerpo experimenta una aceleracion a = F_net/m. Si F_net aumenta, la aceleracion del cuerpo aumenta causalmente en la misma proporcion; si F_net se anula, el cuerpo mantiene su estado de movimiento.
        en: F_net is the net force on the system; therefore, its magnitude implies that the body experiences an acceleration a = F_net/m. If F_net increases, the body's acceleration increases causally in the same proportion; if F_net vanishes, the body maintains its state of motion.
    model_validity_rules:
    - id: F_net_validity
      when: 'true'
      status: ok
      text:
        es: F_net solo es interpretable dentro del modelo elegido.
        en: F_net is interpretable only inside the chosen model.
    graph_rules:
    - id: F_net_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de F_net.
        en: The graph must reflect the role of F_net visually.
    likely_errors:
    - id: F_net_warn
      when: 'true'
      status: warning
      text:
        es: No confundas F_net con otra magnitud cercana del problema.
        en: Do not confuse F_net with another nearby quantity in the problem.
    next_step_rules:
    - id: F_net_next
      when: 'true'
      status: info
      text:
        es: Usa F_net para enlazar con el siguiente paso de interpretacion.
        en: Use F_net to connect with the next interpretation step.
