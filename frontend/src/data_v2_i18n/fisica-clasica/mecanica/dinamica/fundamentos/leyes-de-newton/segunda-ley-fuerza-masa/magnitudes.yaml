version: 1
magnitudes:
- id: F_net
  symbol: \vec{F}_{\text{net}}
  nombre:
    es: Fuerza neta
    en: Net force
  descripcion:
    es: Suma vectorial de todas las fuerzas externas que actúan sobre el sistema.
    en: Vector sum of all external forces acting on the system.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - F_net_x
  - F_net_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - segunda-ley-fuerza-masa
  common_mistake: Confundir F_net con otra magnitud cercana dentro de segunda ley
    fuerza masa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - segunda-ley-fuerza-masa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_net con una definicion estable antes de sustituir valores.
