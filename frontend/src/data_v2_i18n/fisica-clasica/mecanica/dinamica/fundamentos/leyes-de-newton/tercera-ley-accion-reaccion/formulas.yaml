version: 1
formulas:
- id: tercera_ley_vectorial
  title:
    es: tercera ley en forma vectorial
    en: third law in vector form
  equation: FBA = -FAB
  latex: \vec F_{B\to A} = -\vec F_{A\to B}
  rearrangements:
  - target: FBA
    equation: FBA = -FAB
    latex: \vec F_{B\to A} = -\vec F_{A\to B}
    constraints: []
  - target: FAB
    equation: FAB = -FBA
    latex: \vec F_{A\to B} = -\vec F_{B\to A}
    constraints: []
  category: fundamental
  relation_type: constitutive_relation
  physical_meaning:
    es: Toda interaccion mecanica clasica entre dos sistemas genera un par de fuerzas
      iguales en modulo y opuestas en direccion sobre cuerpos distintos.
    en: Every classical mechanical interaction between two systems generates a pair
      of forces equal in magnitude and opposite in direction on different bodies.
  constraints:
  - expr: 'true'
    message:
      es: Identifica con claridad que cuerpo ejerce la fuerza y sobre que cuerpo actua.
      en: Clearly identify which body exerts the force and on which body it acts.
  validity:
    es: Valida para interacciones clasicas entre dos sistemas cuando el par se describe
      en el mismo instante y con la misma linea de accion.
    en: Valid for classical interactions between two systems when the pair is described
      at the same instant and along the same line of action.
  dimension_check: N = N
  calculable: false
  motivo_no_calculable:
    es: Es una relacion estructural del par de interaccion y no una ecuacion de movimiento
      independiente para un solo cuerpo.
    en: It is a structural relation of the interaction pair and not an independent
      equation of motion for a single body.
  used_in:
  - theory
  - examples
  - interpretation
  interpretation_tags:
  - reciprocity
  - body_separation
  - interaction_pair
  result_semantics:
    target: FBA
    meaning: Resulta util para interpretar FBA en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Usa esta relacion solo si ambas fuerzas describen la misma interaccion y
        no fuerzas distintas del mismo cuerpo.
      en: Use this relation only if both forces describe the same interaction and
        not different forces acting on the same body.
  coherence_checks:
  - expr: 'true'
    severity: ok
    message:
      es: La tercera ley siempre debe leerse con dos diagramas de cuerpo libre separados.
      en: The third law must always be read with two separate free-body diagrams.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - detect_when: 'true'
    message:
      es: Si intentas cancelar accion y reaccion en un solo DCL, estas mezclando cuerpos
        distintos.
      en: If you try to cancel action and reaction inside a single FBD, you are mixing
        different bodies.
- id: tercera_ley_eje_x
  title:
    es: tercera ley por componente x
    en: third law along x
  equation: FBx = -FAx
  latex: F_{B\to A,x} = -F_{A\to B,x}
  rearrangements:
  - target: FBx
    equation: FBx = -FAx
    latex: F_{B\to A,x} = -F_{A\to B,x}
    constraints: []
  - target: FAx
    equation: FAx = -FBx
    latex: F_{A\to B,x} = -F_{B\to A,x}
    constraints: []
  category: derived
  relation_type: constitutive_relation
  physical_meaning:
    es: Sobre un mismo eje, las componentes del par accion-reaccion conservan modulo
      y cambian de signo al intercambiar los cuerpos.
    en: Along a given axis, the components of an action-reaction pair keep the same
      magnitude and change sign when the bodies are exchanged.
  constraints:
  - expr: 'true'
    message:
      es: Mantén el mismo eje y la misma convención de signos al comparar FAx y FBx.
      en: Keep the same axis and sign convention when comparing FAx and FBx.
  validity:
    es: Valida cuando ambas componentes describen el mismo par y se proyectan sobre
      el mismo eje x.
    en: Valid when both components describe the same pair and are projected onto the
      same x axis.
  dimension_check: N = N
  calculable: true
  motivo_no_calculable: null
  used_in:
  - examples
  - calculator
  - interpretation
  interpretation_tags:
  - component_pair
  - sign_consistency
  - free_body_diagram
  result_semantics:
    target: FBx
    meaning: Resulta util para interpretar FBx en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: No uses esta igualdad para comparar fuerzas diferentes que simplemente apuntan
        en sentidos opuestos.
      en: Do not use this equality to compare different forces that merely point in
        opposite directions.
  coherence_checks:
  - expr: abs(FBx + FAx) < 1e-9
    severity: ok
    message:
      es: Las componentes sobre x son coherentes con un par accion-reaccion.
      en: The x components are consistent with an action-reaction pair.
  - expr: abs(FBx + FAx) >= 1e-9
    severity: warning
    message:
      es: Si FBx no es el opuesto de FAx, probablemente mezclaste cuerpos, ejes o
        signos.
      en: If FBx is not the opposite of FAx, the bodies, axes, or signs were probably
        mixed up.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - detect_when: abs(FBx + FAx) >= 1e-9
    message:
      es: Revisa si escribiste ambas fuerzas en el mismo diagrama o si cambiaste el
        signo del eje entre un cuerpo y otro.
      en: Check whether both forces were written in the same diagram or whether the
        axis sign changed between one body and the other.
- id: tercera_ley_eje_y
  title:
    es: tercera ley por componente y
    en: third law along y
  equation: FBy = -FAy
  latex: F_{B\to A,y} = -F_{A\to B,y}
  rearrangements:
  - target: FBy
    equation: FBy = -FAy
    latex: F_{B\to A,y} = -F_{A\to B,y}
    constraints: []
  - target: FAy
    equation: FAy = -FBy
    latex: F_{A\to B,y} = -F_{B\to A,y}
    constraints: []
  category: derived
  relation_type: constitutive_relation
  physical_meaning:
    es: En la proyeccion sobre y, el par mantiene el mismo modulo y sentidos opuestos
      si ambas fuerzas pertenecen a la misma interaccion.
    en: In the y projection, the pair keeps the same magnitude and opposite directions
      if both forces belong to the same interaction.
  constraints:
  - expr: 'true'
    message:
      es: Proyecta el mismo par sobre el mismo eje y antes de comparar signos.
      en: Project the same pair onto the same y axis before comparing signs.
  validity:
    es: Valida en apoyos, cuerdas o contactos inclinados donde la interaccion tenga
      componente sobre y.
    en: Valid in supports, ropes, or inclined contacts where the interaction has a
      y component.
  dimension_check: N = N
  calculable: true
  motivo_no_calculable: null
  used_in:
  - examples
  - calculator
  - interpretation
  interpretation_tags:
  - component_pair
  - support_pair
  - sign_consistency
  result_semantics:
    target: FBy
    meaning: Resulta util para interpretar FBy en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Distingue la componente reciproca de una reaccion de apoyo de otras fuerzas
        verticales como peso o tension externa.
      en: Distinguish the reciprocal component of a support reaction from other vertical
        forces such as weight or external tension.
  coherence_checks:
  - expr: abs(FBy + FAy) < 1e-9
    severity: ok
    message:
      es: Las componentes sobre y son coherentes con la tercera ley.
      en: The y components are consistent with the third law.
  - expr: abs(FBy + FAy) >= 1e-9
    severity: warning
    message:
      es: Si FBy no es el opuesto de FAy, revisa si comparaste fuerzas de naturalezas
        distintas.
      en: If FBy is not the opposite of FAy, check whether forces of different natures
        were compared.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - detect_when: abs(FBy + FAy) >= 1e-9
    message:
      es: Es frecuente confundir la normal sobre un bloque con el peso del bloque;
        no forman un par accion-reaccion.
      en: It is common to confuse the normal force on a block with the block's weight;
        they do not form an action-reaction pair.
- id: par_normal_vectorial
  title:
    es: par normal de contacto
    en: normal contact pair
  equation: Nba = -Nab
  latex: \vec N_{B\to A} = -\vec N_{A\to B}
  rearrangements:
  - target: Nba
    equation: Nba = -Nab
    latex: \vec N_{B\to A} = -\vec N_{A\to B}
    constraints: []
  - target: Nab
    equation: Nab = -Nba
    latex: \vec N_{A\to B} = -\vec N_{B\to A}
    constraints: []
  category: auxiliary
  relation_type: constitutive_relation
  physical_meaning:
    es: La fuerza normal de contacto aparece en pares reciprocos entre las dos superficies
      que interactuan.
    en: The contact normal force appears as reciprocal pairs between the two interacting
      surfaces.
  constraints:
  - expr: 'true'
    message:
      es: Solo identifica el par si ambos vectores pertenecen al mismo contacto y
        no a apoyos diferentes.
      en: Identify the pair only if both vectors belong to the same contact and not
        to different supports.
  validity:
    es: Valida en modelos de contacto clasico donde puede definirse una normal comun
      a ambas superficies.
    en: Valid in classical contact models where a common normal can be defined for
      both surfaces.
  dimension_check: N = N
  calculable: false
  motivo_no_calculable:
    es: La igualdad establece la reciprocidad del contacto, pero el modulo requiere
      el balance dinamico de cada cuerpo.
    en: The equality states contact reciprocity, but the magnitude requires the dynamical
      balance of each body.
  used_in:
  - theory
  - examples
  - interpretation
  interpretation_tags:
  - contact_pair
  - normal_force
  - common_confusion
  result_semantics:
    target: Nba
    meaning: Resulta util para interpretar Nba en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: No confundas Nba con el peso o con una normal ejercida por un tercer cuerpo
        distinto.
      en: Do not confuse Nba with weight or with a normal exerted by a different third
        body.
  coherence_checks:
  - expr: 'true'
    severity: ok
    message:
      es: Este par sirve para separar correctamente las fuerzas de contacto entre
        dos DCL distintos.
      en: This pair helps separate contact forces correctly between two different
        FBDs.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - detect_when: 'true'
    message:
      es: Si llamas reaccion a la normal que actua sobre el mismo bloque que el peso,
        estas comparando fuerzas de distinta naturaleza.
      en: If you call the normal force acting on the same block as weight a reaction
        force, you are comparing forces of different natures.
