version: "1.0"
leaf: "tercera-ley-accion-reaccion"

dcl:
  title:
    es: "DCL · Tercera Ley: Acción y Reacción"
    en: "FBD · Newton's Third Law: Action and Reaction"
  forces:
    es:
      - "F_{A sobre B} (fuerza de A sobre B)"
      - "F_{B sobre A} (reacción de B sobre A)"
    en:
      - "F_{A on B} (force of A on B)"
      - "F_{B on A} (reaction of B on A)"
  object:
    es: par de cuerpos en interacción
    en: pair of bodies in interaction
  freeBodyCondition:
    es: "Se dibujan dos DCL separados: uno para A (con la reacción que B ejerce sobre A) y otro para B (con la acción que A ejerce sobre B)."
    en: "Two separate FBDs are drawn: one for A (with the reaction B exerts on A) and one for B (with the action A exerts on B)."
  equilibriumCondition:
    es: Las fuerzas de acción y reacción son iguales en módulo, opuestas en sentido y actúan sobre cuerpos distintos. No se cancelan en el mismo DCL.
    en: Action and reaction forces are equal in magnitude, opposite in direction, and act on different bodies. They do not cancel within the same FBD.
  netForce:
    es: La fuerza neta de cada cuerpo depende de TODAS las fuerzas sobre ese cuerpo, no solo del par acción-reacción.
    en: The net force on each body depends on ALL forces on that body, not just the action-reaction pair.
  accelerationDirection:
    es: Cuerpos con distinta masa tendrán distintas aceleraciones aunque las fuerzas del par acción-reacción sean iguales.
    en: Bodies with different masses will have different accelerations even if the action-reaction forces are equal.
  referenceFrameChoice:
    es: Se necesita un DCL separado por cada cuerpo del par de interacción.
    en: A separate FBD is needed for each body in the interacting pair.
  forceTypes:
    es:
      - "F_{A sobre B}: acción"
      - "F_{B sobre A}: reacción"
      - Otras fuerzas independientes sobre cada cuerpo
    en:
      - "F_{A on B}: action"
      - "F_{B on A}: reaction"
      - Other independent forces on each body
  signConvention:
    es: Las fuerzas del par acción-reacción tienen signos opuestos si se proyectan sobre el mismo eje.
    en: Action-reaction pair forces have opposite signs when projected onto the same axis.
  commonMistakes:
    es:
      - Incluir la fuerza de reacción en el mismo DCL del cuerpo al que ya se le incluyó la acción.
      - Creer que las fuerzas de acción y reacción se cancelan porque son iguales y opuestas.
      - Confundir el par acción-reacción con el equilibrio de fuerzas en un mismo cuerpo.
    en:
      - Including the reaction force in the same FBD as the body that already has the action force.
      - Believing action and reaction cancel because they are equal and opposite.
      - Confusing the action-reaction pair with force equilibrium in a single body.
  agentHints:
    es:
      - "El par acción-reacción siempre actúa sobre cuerpos DIFERENTES: nunca en el mismo DCL."
      - Aunque las fuerzas son iguales, las aceleraciones pueden ser distintas si las masas son distintas.
      - El par acción-reacción es siempre del mismo tipo de interacción (gravitatoria, de contacto, etc.).
    en:
      - "The action-reaction pair always acts on DIFFERENT bodies: never in the same FBD."
      - Even though forces are equal, accelerations may differ if masses differ.
      - The action-reaction pair always involves the same type of interaction (gravitational, contact, etc.).
  relation:
    es: El DCL doble muestra que la acción de A sobre B y la reacción de B sobre A son iguales y opuestas, pero actúan sobre cuerpos distintos.
    en: The double FBD shows that the action of A on B and the reaction of B on A are equal and opposite, but act on different bodies.
  readingFocus:
    es: dibujar un DCL por cuerpo e identificar en cada uno la fuerza del par acción-reacción más las otras fuerzas independientes.
    en: draw one FBD per body and identify in each the action-reaction pair force plus the other independent forces.

svg:
  title:
    es: "Escena SVG · Tercera Ley: Acción y Reacción"
    en: "SVG Scene · Newton's Third Law: Action and Reaction"
  sceneId: tercera_ley_scene
  sceneLabel:
    es: Par de cuerpos con fuerzas de acción y reacción
    en: Pair of bodies with action and reaction forces
  objects:
    es:
      - cuerpo A
      - cuerpo B
      - "flecha F_{A sobre B}"
      - "flecha F_{B sobre A}"
    en:
      - body A
      - body B
      - "arrow F_{A on B}"
      - "arrow F_{B on A}"
  mainObject:
    es: par de cuerpos en interacción
    en: pair of bodies in interaction
  referenceFrame:
    es: sistema de referencia común para ambos cuerpos
    en: common reference frame for both bodies
  geometry:
    es: La escena muestra dos cuerpos con flechas de igual longitud pero sentidos opuestos, ilustrando el par acción-reacción.
    en: The scene shows two bodies with equal-length arrows in opposite directions, illustrating the action-reaction pair.
  interactions:
    es: Las dos fuerzas del par acción-reacción actúan sobre cuerpos diferentes, son del mismo tipo y tienen el mismo módulo.
    en: The two forces of the action-reaction pair act on different bodies, are of the same type, and have the same magnitude.
  modelElements:
    es:
      - "F_{A sobre B} (flecha sobre B)"
      - "F_{B sobre A} (flecha sobre A)"
      - masas m_A y m_B
    en:
      - "F_{A on B} (arrow on B)"
      - "F_{B on A} (arrow on A)"
      - masses m_A and m_B
  visualCues:
    es:
      - Las flechas son iguales en longitud (mismo módulo) pero opuestas en sentido.
      - Cada flecha está sobre el cuerpo que la RECIBE, no sobre el que la ejerce.
      - Si m_A ≠ m_B, las aceleraciones son distintas aunque las fuerzas sean iguales.
    en:
      - The arrows are equal in length (same magnitude) but opposite in direction.
      - Each arrow is on the body that RECEIVES the force, not the one that exerts it.
      - If m_A ≠ m_B, accelerations differ even though forces are equal.
  scaleMeaning:
    es: "Las flechas son proporcionales en longitud: ilustran que |F_{A sobre B}| = |F_{B sobre A}|."
    en: "Arrows are proportional in length: they illustrate that |F_{A on B}| = |F_{B on A}|."
  relation:
    es: La escena ilustra que toda fuerza tiene una reacción igual y opuesta sobre el cuerpo que la ejerce.
    en: The scene illustrates that every force has an equal and opposite reaction on the body that exerts it.
  physicalReading:
    es: Leer las flechas en cada cuerpo por separado e identificar el par acción-reacción.
    en: Read the arrows on each body separately and identify the action-reaction pair.
  modelConnection:
    es: "Se interpreta bajo la tercera ley de Newton: F_{A/B} = −F_{B/A}."
    en: "Interpreted under Newton's third law: F_{A/B} = −F_{B/A}."
  formulaConnection:
    es: "Conecta con F_{A sobre B} = −F_{B sobre A} y con m_A·a_A = F_neta_A, m_B·a_B = F_neta_B."
    en: "Connects to F_{A on B} = −F_{B on A} and m_A·a_A = F_net_A, m_B·a_B = F_net_B."
  readingFocus:
    es: identificar los dos cuerpos del par, las flechas en cada uno y verificar que son opuestas e iguales en módulo.
    en: identify the two bodies of the pair, the arrows on each, and verify they are opposite and equal in magnitude.
  agentHints:
    es:
      - La fuerza de acción y la de reacción no se cancelan porque están sobre cuerpos distintos.
      - Para saber si el sistema se mueve, hay que ver la fuerza NETA sobre cada cuerpo, no solo el par acción-reacción.
      - "Un ejemplo: cuando caminas, el suelo te empuja hacia adelante (reacción) con la misma fuerza que tú empujas al suelo hacia atrás (acción)."
    en:
      - Action and reaction do not cancel because they act on different bodies.
      - To know if the system moves, look at the NET force on each body, not just the action-reaction pair.
      - "Example: when walking, the ground pushes you forward (reaction) with the same force you push the ground backward (action)."
  commonMistakes:
    es:
      - Pensar que si las fuerzas son iguales y opuestas el objeto no se mueve (olvidan que están sobre cuerpos distintos).
      - Dibujar ambas flechas sobre el mismo cuerpo.
      - Confundir el par acción-reacción con el equilibrio de un único cuerpo.
    en:
      - Thinking equal and opposite forces mean no motion (forgetting they act on different bodies).
      - Drawing both arrows on the same body.
      - Confusing the action-reaction pair with equilibrium in a single body.
