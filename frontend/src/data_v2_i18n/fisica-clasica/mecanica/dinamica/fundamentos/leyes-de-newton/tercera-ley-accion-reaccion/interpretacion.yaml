result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  FBA:
    summary_rules:
    - id: FBA_summary
      when: 'true'
      status: info
      text:
        es: FBA resume una lectura fisica relevante del leaf.
        en: FBA summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: FBA_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que FBA sea coherente con unidades y contexto.
        en: Check that FBA is coherent with units and context.
    physical_reading_rules:
    - id: FBA_physical
      when: 'true'
      status: info
      text:
        es: FBA es la fuerza que B ejerce sobre A; por tanto, su magnitud implica que el cuerpo A experimenta una aceleracion proporcional a FBA/mA. Si FBA aumenta, la aceleracion de A aumenta causalmente en la misma proporcion.
        en: FBA is the force B exerts on A; therefore its magnitude implies that body A experiences an acceleration proportional to FBA/mA. If FBA increases, the acceleration of A increases causally in the same proportion.
    model_validity_rules:
    - id: FBA_validity
      when: 'true'
      status: ok
      text:
        es: FBA solo es interpretable dentro del modelo elegido.
        en: FBA is interpretable only inside the chosen model.
    graph_rules:
    - id: FBA_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de FBA.
        en: The graph must reflect the role of FBA visually.
    likely_errors:
    - id: FBA_warn
      when: 'true'
      status: warning
      text:
        es: No confundas FBA con otra magnitud cercana del problema.
        en: Do not confuse FBA with another nearby quantity in the problem.
    next_step_rules:
    - id: FBA_next
      when: 'true'
      status: info
      text:
        es: Usa FBA para enlazar con el siguiente paso de interpretacion.
        en: Use FBA to connect with the next interpretation step.
