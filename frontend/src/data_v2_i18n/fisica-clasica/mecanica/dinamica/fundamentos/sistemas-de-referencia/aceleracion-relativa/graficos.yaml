version: "1.0"
leaf: "aceleracion-relativa"

dcl:
  title:
    es: DCL · Aceleración Relativa
    en: FBD · Relative Acceleration
  forces:
    es:
      - F_real (fuerzas reales)
      - F_ficticia = −m·A (fuerza inercial si el marco acelera con A)
    en:
      - F_real (real forces)
      - F_fictitious = −m·A (inertial force if the frame accelerates with A)
  object:
    es: objeto observado desde un marco de referencia que puede estar acelerado
    en: object observed from a reference frame that may be accelerating
  freeBodyCondition:
    es: "En marco inercial: solo fuerzas reales. En marco acelerado: fuerzas reales más la fuerza ficticia −m·A."
    en: "In an inertial frame: real forces only. In an accelerating frame: real forces plus the fictitious force −m·A."
  equilibriumCondition:
    es: "La aceleración relativa a' = a − A, donde a es en el inercial y A es la aceleración del marco."
    en: "The relative acceleration a' = a − A, where a is measured in the inertial frame and A is the frame's acceleration."
  netForce:
    es: En el marco acelerado, la fuerza neta aparente incluye la fuerza ficticia −m·A.
    en: In the accelerating frame, the apparent net force includes the fictitious force −m·A.
  accelerationDirection:
    es: La aceleración relativa depende de la aceleración del objeto y la del marco observador.
    en: "The relative acceleration depends on the object's acceleration and that of the observer's frame."
  referenceFrameChoice:
    es: Si el marco no es inercial, se añade la fuerza pseudo-inercial −m·A para aplicar las leyes de Newton en ese marco.
    en: "If the frame is non-inertial, the pseudo-inertial force −m·A is added to apply Newton's laws in that frame."
  forceTypes:
    es:
      - F_reales
      - F_pseudo = −m·A (fuerza ficticia)
    en:
      - F_real
      - F_pseudo = −m·A (fictitious force)
  signConvention:
    es: La fuerza ficticia tiene sentido opuesto a la aceleración del marco.
    en: "The fictitious force has the opposite direction to the frame's acceleration."
  commonMistakes:
    es:
      - Omitir la fuerza ficticia al trabajar en un marco acelerado.
      - Confundir la aceleración del objeto con la aceleración relativa al marco.
      - Aplicar la segunda ley de Newton directamente en un marco no inercial sin añadir fuerzas ficticias.
    en:
      - Omitting the fictitious force when working in an accelerating frame.
      - "Confusing the object's acceleration with the relative acceleration to the frame."
      - "Directly applying Newton's second law in a non-inertial frame without adding fictitious forces."
  agentHints:
    es:
      - En un marco inercial, la aceleración relativa coincide con la absoluta si el marco es el de referencia.
      - "La fuerza ficticia −m·A es lo que \"sientes\" cuando un ascensor acelera hacia arriba (te parece que pesas más)."
      - Las leyes de Newton en forma estándar solo son válidas en marcos inerciales.
    en:
      - In an inertial frame, the relative acceleration equals the absolute one if the frame is the reference.
      - "The fictitious force −m·A is what you \"feel\" when an elevator accelerates upward (you seem to weigh more)."
      - "Newton's laws in standard form are only valid in inertial frames."
  relation:
    es: "El DCL en marco acelerado incluye fuerzas reales y la fuerza ficticia −m·A para poder aplicar ΣF' = m·a' en ese marco."
    en: "The FBD in an accelerating frame includes real forces and the fictitious force −m·A to apply ΣF' = m·a' in that frame."
  readingFocus:
    es: identificar si el marco es inercial o no, añadir la fuerza ficticia si procede y calcular la aceleración relativa.
    en: identify whether the frame is inertial or not, add the fictitious force if applicable, and compute the relative acceleration.
