targets:
  a_rel:
    summary_rules:
    - id: a_rel_summary
      when: 'true'
      status: info
      text:
        es: a_rel resume una lectura fisica relevante del leaf.
        en: a_rel summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: a_rel_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que a_rel sea coherente con unidades y contexto.
        en: Check that a_rel is coherent with units and context.
    physical_reading_rules:
    - id: a_rel_physical
      when: 'true'
      status: info
      text:
        es: a_rel es la aceleración que mide el observador en el marco B sobre la partícula A; por tanto, su magnitud implica que si a_B aumenta, a_rel disminuye causalmente en la misma proporción (a_rel = a_A - a_B). Si a_B se iguala a a_A, la aceleración relativa se anula y A parece estar en reposo dinámico respecto a B.
        en: a_rel is the acceleration that observer in frame B measures for particle A; therefore, its magnitude implies that if a_B increases, a_rel decreases causally in the same proportion (a_rel = a_A - a_B). If a_B equals a_A, the relative acceleration vanishes and A appears dynamically at rest with respect to B.
    model_validity_rules:
    - id: a_rel_validity
      when: 'true'
      status: ok
      text:
        es: a_rel solo es interpretable dentro del modelo elegido.
        en: a_rel is interpretable only inside the chosen model.
    graph_rules:
    - id: a_rel_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de a_rel.
        en: The graph must reflect the role of a_rel visually.
    likely_errors:
    - id: a_rel_warn
      when: 'true'
      status: warning
      text:
        es: No confundas a_rel con otra magnitud cercana del problema.
        en: Do not confuse a_rel with another nearby quantity in the problem.
    next_step_rules:
    - id: a_rel_next
      when: 'true'
      status: info
      text:
        es: Usa a_rel para enlazar con el siguiente paso de interpretacion.
        en: Use a_rel to connect with the next interpretation step.
