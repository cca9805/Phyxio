version: 1
magnitudes:
- id: a_rel
  symbol: \vec{a}_{A/B}
  nombre:
    es: aceleración relativa de A respecto a B
    en: relative acceleration of A with respect to B
  descripcion:
    es: Aceleración con la que el objeto A se mueve visto desde el sistema de referencia
      B. Representa la tasa de cambio de la velocidad relativa.
    en: Acceleration with which object A moves as seen from reference frame B. Represents
      the rate of change of relative velocity.
  unidad_si: m/s²
  dimension: '1'
  is_vector: true
  components:
  - a_rel_x
  - a_rel_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - aceleracion-relativa
  common_mistake: Confundir a_rel con otra magnitud cercana dentro de aceleracion
    relativa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - aceleracion-relativa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_rel con una definicion estable antes de sustituir valores.
- id: a_A
  symbol: \vec{a}_A
  nombre:
    es: aceleración absoluta de A
    en: absolute acceleration of A
  descripcion:
    es: Aceleración del objeto A medida desde un sistema de referencia inercial (usualmente
      el "laboratorio" o sistema fijo).
    en: Acceleration of object A measured from an inertial reference frame (usually
      the "laboratory" or fixed system).
  unidad_si: m/s²
  dimension: '1'
  is_vector: true
  components:
  - a_A_x
  - a_A_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - aceleracion-relativa
  common_mistake: Confundir a_A con otra magnitud cercana dentro de aceleracion relativa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - aceleracion-relativa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_A con una definicion estable antes de sustituir valores.
- id: a_B
  symbol: \vec{a}_B
  nombre:
    es: aceleración absoluta de B
    en: absolute acceleration of B
  descripcion:
    es: Aceleración del sistema de referencia B (observador) medida desde un sistema
      inercial. También llamada aceleración de arrastre.
    en: Acceleration of reference frame B (observer) measured from an inertial system.
      Also called drag acceleration.
  unidad_si: m/s²
  dimension: '1'
  is_vector: true
  components:
  - a_B_x
  - a_B_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - aceleracion-relativa
  common_mistake: Confundir a_B con otra magnitud cercana dentro de aceleracion relativa.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - aceleracion-relativa
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_B con una definicion estable antes de sustituir valores.
- id: t
  symbol: t
  nombre:
    es: tiempo
    en: time
  descripcion:
    es: Parámetro temporal que en mecánica clásica es absoluto e igual para todos
      los sistemas de referencia.
    en: Temporal parameter that in classical mechanics is absolute and equal for all
      reference frames.
  unidad_si: s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
