version: "1.0"
leaf: "sistemas-inerciales"

dcl:
  title:
    es: DCL · Sistemas Inerciales
    en: FBD · Inertial Frames
  forces:
    es:
      - fuerzas reales sin fuerzas ficticias
    en:
      - real forces with no fictitious forces
  object:
    es: objeto en un marco de referencia inercial
    en: object in an inertial reference frame
  freeBodyCondition:
    es: En marco inercial, las leyes de Newton se aplican directamente con solo fuerzas reales.
    en: "In an inertial frame, Newton's laws are applied directly with real forces only."
  equilibriumCondition:
    es: Si ΣF_real = 0, el cuerpo está en equilibrio o MRU en el marco inercial.
    en: If ΣF_real = 0, the body is in equilibrium or URM in the inertial frame.
  netForce:
    es: La fuerza neta es la suma de fuerzas reales. No hay fuerzas ficticias.
    en: The net force is the sum of real forces. There are no fictitious forces.
  accelerationDirection:
    es: La aceleración medida en el marco inercial coincide con la aceleración absoluta.
    en: The acceleration measured in the inertial frame coincides with the absolute acceleration.
  referenceFrameChoice:
    es: Un marco es inercial si un cuerpo libre no acelera en él. El laboratorio se considera aproximadamente inercial.
    en: A frame is inertial if a free body does not accelerate in it. The laboratory is considered approximately inertial.
  forceTypes:
    es:
      - "Solo fuerzas reales: W, N, T, f, F_elástica"
    en:
      - "Real forces only: W, N, T, f, F_elastic"
  signConvention:
    es: "La segunda ley de Newton en su forma estándar: ΣF = m·a."
    en: "Newton's second law in its standard form: ΣF = m·a."
  commonMistakes:
    es:
      - Usar un marco no inercial sin incluir fuerzas ficticias y creer que es inercial.
      - Pensar que la Tierra es un marco perfectamente inercial (hay aceleración centrípeta por rotación).
      - Ignorar que los resultados dependen del marco de referencia elegido.
    en:
      - Using a non-inertial frame without adding fictitious forces while assuming it is inertial.
      - Thinking the Earth is a perfectly inertial frame (it has centripetal acceleration due to rotation).
      - Ignoring that results depend on the chosen reference frame.
  agentHints:
    es:
      - En un marco inercial, ΣF = m·a con fuerzas reales únicamente.
      - Un tren a velocidad constante es un marco inercial; un tren que frena no lo es.
      - Las leyes de Newton tienen la misma forma en todos los marcos inerciales (principio de relatividad de Galileo).
    en:
      - In an inertial frame, ΣF = m·a with real forces only.
      - A train at constant velocity is an inertial frame; a braking train is not.
      - "Newton's laws have the same form in all inertial frames (Galilean principle of relativity)."
  relation:
    es: El DCL en sistema inercial muestra solo fuerzas reales, sin necesidad de fuerzas ficticias.
    en: The FBD in an inertial system shows only real forces, with no need for fictitious forces.
  readingFocus:
    es: identificar todas las fuerzas reales y aplicar ΣF = m·a directamente.
    en: identify all real forces and apply ΣF = m·a directly.

svg:
  title:
    es: Escena SVG · Sistemas Inerciales
    en: SVG Scene · Inertial Frames
  sceneId: sistemas_inerciales_scene
  sceneLabel:
    es: Marco de referencia inercial con objeto y fuerzas reales
    en: Inertial reference frame with object and real forces
  objects:
    es:
      - marco de referencia (laboratorio)
      - objeto
      - fuerzas reales
    en:
      - reference frame (laboratory)
      - object
      - real forces
  mainObject:
    es: objeto en marco inercial
    en: object in inertial frame
  referenceFrame:
    es: marco inercial (laboratorio o tren en MRU)
    en: inertial frame (laboratory or train in URM)
  geometry:
    es: La escena muestra un marco inercial con ejes fijos y el objeto con sus fuerzas reales. No hay fuerzas ficticias.
    en: The scene shows an inertial frame with fixed axes and the object with its real forces. There are no fictitious forces.
  interactions:
    es: Solo actúan fuerzas reales. Las leyes de Newton se aplican en su forma estándar.
    en: "Only real forces act. Newton's laws are applied in their standard form."
  modelElements:
    es:
      - ejes del marco inercial
      - objeto con fuerzas reales
      - vector aceleración a = ΣF/m
    en:
      - inertial frame axes
      - object with real forces
      - acceleration vector a = ΣF/m
  visualCues:
    es:
      - "El marco no acelera: los ejes son fijos o se mueven a velocidad constante."
      - "No hay flechas ficticias: todas las flechas tienen causa física identificable."
      - La aceleración del objeto se calcula directamente de la resultante de fuerzas reales.
    en:
      - "The frame does not accelerate: axes are fixed or move at constant velocity."
      - "No fictitious arrows: all arrows have an identifiable physical cause."
      - "The object's acceleration is computed directly from the resultant of real forces."
  scaleMeaning:
    es: Las flechas son proporcionales a las magnitudes de las fuerzas reales.
    en: Arrows are proportional to the magnitudes of the real forces.
  relation:
    es: La escena ilustra que en un sistema inercial las leyes de Newton se aplican directamente sin modificaciones.
    en: "The scene illustrates that in an inertial system Newton's laws apply directly without modifications."
  physicalReading:
    es: Verificar que el marco no acelera y que todas las fuerzas son reales antes de aplicar ΣF = m·a.
    en: Verify that the frame does not accelerate and that all forces are real before applying ΣF = m·a.
  modelConnection:
    es: Se interpreta bajo las tres leyes de Newton en su formulación estándar para marcos inerciales.
    en: "Interpreted under Newton's three laws in their standard formulation for inertial frames."
  formulaConnection:
    es: Conecta con ΣF = m·a (sin términos adicionales de fuerzas ficticias).
    en: Connects to ΣF = m·a (with no additional fictitious force terms).
  readingFocus:
    es: confirmar que el marco es inercial y aplicar las leyes de Newton con fuerzas reales únicamente.
    en: "confirm that the frame is inertial and apply Newton's laws with real forces only."
  agentHints:
    es:
      - El laboratorio es el marco inercial de referencia en la mayoría de los problemas de física básica.
      - Un marco inercial es aquel en el que la primera ley de Newton se cumple sin añadir fuerzas.
      - Todos los marcos inerciales son equivalentes para describir la física (principio de relatividad).
    en:
      - The laboratory is the standard inertial reference frame for most basic physics problems.
      - "An inertial frame is one in which Newton's first law holds without adding forces."
      - All inertial frames are equivalent for describing physics (principle of relativity).
  commonMistakes:
    es:
      - Considerar inercial un marco que está acelerando.
      - Olvidar que el marco terrestre tiene aceleración centrípeta (aunque suele despreciarse).
      - Confundir marco inercial con marco en reposo.
    en:
      - Treating an accelerating frame as inertial.
      - "Forgetting that the Earth's frame has centripetal acceleration (though usually negligible)."
      - Confusing an inertial frame with a frame at rest.
