version: 1
magnitudes:
- id: F_neta
  symbol: \sum \vec{F}_{ext}
  nombre:
    es: fuerza neta externa
    en: external net force
  descripcion:
    es: Suma vectorial de todas las fuerzas reales que actúan sobre un objeto. En
      un sistema inercial, esta magnitud determina completamente la aceleración del
      cuerpo mediante la segunda ley de Newton.
    en: Vector sum of all real forces acting on an object. In an inertial system,
      this quantity completely determines the body's acceleration through Newton's
      second law.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
  components:
  - F_neta_x
  - F_neta_y
  category: derived
  physical_role: physical_quantity
  used_in:
  - sistemas-inerciales
  common_mistake: Confundir F_neta con otra magnitud cercana dentro de sistemas inerciales.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - sistemas-inerciales
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_neta con una definicion estable antes de sustituir valores.
- id: m
  symbol: m
  nombre:
    es: masa
    en: mass
  descripcion:
    es: Medida de la inercia de un cuerpo. Cuantifica la resistencia del objeto a
      cambiar su estado de movimiento. Es invariante ante transformaciones galileanas
      entre sistemas inerciales.
    en: Measure of a body's inertia. Quantifies the object's resistance to changing
      its state of motion. It is invariant under Galilean transformations between
      inertial systems.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - sistemas-inerciales
  common_mistake: Confundir m con otra magnitud cercana dentro de sistemas inerciales.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - sistemas-inerciales
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
- id: a
  symbol: \vec{a}
  nombre:
    es: aceleración
    en: acceleration
  descripcion:
    es: Tasa de cambio de la velocidad respecto al tiempo. En sistemas inerciales,
      es invariante ante transformaciones galileanas (todos los observadores inerciales
      miden la misma aceleración).
    en: Rate of change of velocity with respect to time. In inertial systems, it is
      invariant under Galilean transformations (all inertial observers measure the
      same acceleration).
  unidad_si: m/s²
  dimension: '1'
  is_vector: true
  components:
  - a_x
  - a_y
  category: derived
  physical_role: frame_effect
  used_in:
  - sistemas-inerciales
  common_mistake: Confundir a con otra magnitud cercana dentro de sistemas inerciales.
  typical_range: Depende del contexto fisico del problema.
