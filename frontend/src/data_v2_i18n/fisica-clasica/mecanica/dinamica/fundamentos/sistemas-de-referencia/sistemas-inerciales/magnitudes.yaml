    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: vector_projection
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - sistemas-inerciales
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a con una definicion estable antes de sustituir valores.
- id: v
  symbol: \vec{v}
  nombre:
    es: velocidad
    en: velocity
  descripcion:
    es: Tasa de cambio de la posición respecto al tiempo. A diferencia de la aceleración,
      la velocidad SÍ cambia entre sistemas inerciales según transformaciones galileanas.
    en: Rate of change of position with respect to time. Unlike acceleration, velocity
      DOES change between inertial systems according to Galilean transformations.
