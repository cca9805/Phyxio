- id: V_rel
  symbol: \vec{V}
  nombre:
    es: velocidad relativa entre sistemas inerciales
    en: relative velocity between inertial systems
  descripcion:
    es: Velocidad constante con la que un sistema inercial S' se mueve respecto a
      otro sistema inercial S. Es el parámetro de las transformaciones de Galileo.
    en: Constant velocity with which an inertial system S' moves relative to another
      inertial system S. It is the parameter of Galilean transformations.
  unidad_si: m/s
  dimension: '1'
  is_vector: true
