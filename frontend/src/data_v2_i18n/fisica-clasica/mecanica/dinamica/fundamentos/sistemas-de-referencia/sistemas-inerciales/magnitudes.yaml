- id: t
  symbol: t
  nombre:
    es: tiempo
    en: time
  descripcion:
    es: Parámetro temporal absoluto en mecánica clásica. Es el mismo para todos los
      sistemas inerciales (invariante galileano).
    en: Absolute temporal parameter in classical mechanics. It is the same for all
      inertial systems (Galilean invariant).
