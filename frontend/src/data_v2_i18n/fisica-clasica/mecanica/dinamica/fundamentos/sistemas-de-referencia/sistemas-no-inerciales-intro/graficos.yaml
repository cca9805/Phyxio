version: "1.0"
leaf: "sistemas-no-inerciales-intro"

dcl:
  title:
    es: DCL · Sistemas No Inerciales (Introducción)
    en: FBD · Non-Inertial Frames (Introduction)
  forces:
    es:
      - F_real
      - F_ficticia = −m·A (en dirección opuesta a la aceleración A del marco)
    en:
      - F_real
      - "F_fictitious = −m·A (opposite to the frame's acceleration A)"
  object:
    es: objeto en un marco de referencia no inercial (acelerado)
    en: object in a non-inertial (accelerating) reference frame
  freeBodyCondition:
    es: El DCL en marco no inercial incluye la fuerza pseudo-inercial −m·A además de las fuerzas reales.
    en: The FBD in a non-inertial frame includes the pseudo-inertial force −m·A in addition to real forces.
  equilibriumCondition:
    es: "En el marco no inercial, ΣF_real + F_ficticia = m·a', donde a' es la aceleración en ese marco."
    en: "In the non-inertial frame, ΣF_real + F_fictitious = m·a', where a' is the acceleration in that frame."
  netForce:
    es: La fuerza neta aparente incluye la fuerza ficticia. El objeto puede parecer acelerar aunque no haya fuerza real neta.
    en: The apparent net force includes the fictitious force. The object may appear to accelerate even with no real net force.
  accelerationDirection:
    es: La fuerza ficticia actúa en dirección opuesta a la aceleración del marco.
    en: "The fictitious force acts opposite to the frame's acceleration."
  referenceFrameChoice:
    es: "Un marco es no inercial si un cuerpo libre acelera en él. Ejemplo: interior de un coche frenando."
    en: "A frame is non-inertial if a free body accelerates in it. Example: interior of a braking car."
  forceTypes:
    es:
      - F_real (todas las de contacto y a distancia)
      - F_ficticia = −m·A (pseudo-inercial)
    en:
      - F_real (all contact and action-at-a-distance forces)
      - F_fictitious = −m·A (pseudo-inertial)
  signConvention:
    es: La fuerza ficticia tiene sentido opuesto a A del marco.
    en: "The fictitious force has the opposite direction to the frame's acceleration A."
  commonMistakes:
    es:
      - Olvidar incluir la fuerza ficticia al analizar el movimiento en el marco no inercial.
      - Confundir la fuerza ficticia con una fuerza real.
      - Creer que las fuerzas ficticias tienen una causa física identificable.
    en:
      - Forgetting to include the fictitious force when analyzing motion in the non-inertial frame.
      - Confusing the fictitious force with a real force.
      - Believing that fictitious forces have an identifiable physical cause.
  agentHints:
    es:
      - La fuerza ficticia es una corrección matemática que permite usar ΣF = m·a en el marco no inercial.
      - "En un ascensor que acelera hacia arriba, sientes tu peso aparente mayor: la fuerza ficticia actúa hacia abajo."
      - Las fuerzas ficticias desaparecen al transformar al marco inercial.
    en:
      - The fictitious force is a mathematical correction that allows ΣF = m·a to be used in the non-inertial frame.
      - "In an upward-accelerating elevator, your apparent weight increases: the fictitious force acts downward."
      - Fictitious forces vanish when transforming back to the inertial frame.
  relation:
    es: "El DCL en sistema no inercial añade la fuerza ficticia −m·A a las fuerzas reales para poder aplicar ΣF' = m·a' en ese marco."
    en: "The FBD in a non-inertial system adds the fictitious force −m·A to real forces to apply ΣF' = m·a' in that frame."
  readingFocus:
    es: identificar la aceleración A del marco, calcular la fuerza ficticia y añadirla al DCL junto a las fuerzas reales.
    en: "identify the frame's acceleration A, compute the fictitious force, and add it to the FBD alongside the real forces."

svg:
  title:
    es: Escena SVG · Sistemas No Inerciales
    en: SVG Scene · Non-Inertial Frames
  sceneId: no_inercial_scene
  sceneLabel:
    es: Marco acelerado con fuerza ficticia sobre el objeto
    en: Accelerating frame with fictitious force on the object
  objects:
    es:
      - marco acelerado (ascensor, coche)
      - objeto
      - fuerzas reales
      - flecha fuerza ficticia
    en:
      - accelerating frame (elevator, car)
      - object
      - real forces
      - fictitious force arrow
  mainObject:
    es: objeto en marco no inercial
    en: object in non-inertial frame
  referenceFrame:
    es: marco acelerado con aceleración A
    en: accelerating frame with acceleration A
  geometry:
    es: La escena muestra el marco acelerando y el objeto con las fuerzas reales más la flecha de la fuerza ficticia en sentido opuesto a A.
    en: The scene shows the accelerating frame and the object with real forces plus the fictitious force arrow in the direction opposite to A.
  interactions:
    es: "La fuerza ficticia −m·A es la \"fuerza aparente\" que siente el observador en el marco no inercial."
    en: "The fictitious force −m·A is the \"apparent force\" perceived by the observer in the non-inertial frame."
  modelElements:
    es:
      - flecha A (aceleración del marco)
      - fuerzas reales
      - flecha F_ficticia = −m·A
    en:
      - "arrow A (frame's acceleration)"
      - real forces
      - arrow F_fictitious = −m·A
  visualCues:
    es:
      - La flecha de la fuerza ficticia apunta en sentido opuesto a la aceleración del marco.
      - "En un ascensor que sube acelerando, la fuerza ficticia apunta hacia abajo: \"pesas más\"."
      - La fuerza ficticia solo existe desde el punto de vista del observador en el marco acelerado.
    en:
      - "The fictitious force arrow points opposite to the frame's acceleration."
      - "In an upward-accelerating elevator, the fictitious force points downward: \"you weigh more\"."
      - The fictitious force only exists from the perspective of the observer inside the accelerating frame.
  scaleMeaning:
    es: "Las longitudes son proporcionales. F_ficticia = m·A: mayor masa o mayor aceleración del marco implica mayor fuerza ficticia."
    en: "Lengths are proportional. F_fictitious = m·A: greater mass or greater frame acceleration implies greater fictitious force."
  relation:
    es: La escena ilustra cómo la aceleración del marco genera una fuerza ficticia opuesta que el observador interno percibe como real.
    en: "The scene illustrates how the frame's acceleration generates an opposing fictitious force that the internal observer perceives as real."
  physicalReading:
    es: Leer la dirección de A del marco y deducir que la fuerza ficticia tiene dirección opuesta con magnitud m·A.
    en: "Read the direction of the frame's A and deduce that the fictitious force has the opposite direction with magnitude m·A."
  modelConnection:
    es: Se interpreta añadiendo la fuerza inercial a las leyes de Newton para sistemas no inerciales.
    en: "Interpreted by adding the inertial force to Newton's laws for non-inertial systems."
  formulaConnection:
    es: "Conecta con F_ficticia = −m·A y con Σ(F_real + F_ficticia) = m·a'."
    en: "Connects to F_fictitious = −m·A and Σ(F_real + F_fictitious) = m·a'."
  readingFocus:
    es: identificar la dirección y magnitud de A del marco para calcular la fuerza ficticia que actúa sobre el objeto en ese marco.
    en: "identify the direction and magnitude of the frame's A to compute the fictitious force acting on the object in that frame."
  agentHints:
    es:
      - "La fuerza ficticia solo la \"ve\" el observador dentro del marco acelerado."
      - "Desde fuera (marco inercial), no existe la fuerza ficticia: el objeto solo tiene fuerzas reales."
      - Los marcos en rotación generan fuerzas ficticias centrífuga y Coriolis.
    en:
      - "The fictitious force is only \"seen\" by the observer inside the accelerating frame."
      - "From outside (inertial frame), there is no fictitious force: the object has only real forces."
      - Rotating frames generate centrifugal and Coriolis fictitious forces.
  commonMistakes:
    es:
      - Incluir la fuerza ficticia al resolver el problema desde un marco inercial.
      - Confundir la fuerza ficticia con la tercera ley de Newton.
      - "Creer que la fuerza ficticia \"existe\" físicamente de forma independiente del marco."
    en:
      - Including the fictitious force when solving the problem from an inertial frame.
      - "Confusing the fictitious force with Newton's third law."
      - "Believing the fictitious force \"exists\" physically independent of the frame."
