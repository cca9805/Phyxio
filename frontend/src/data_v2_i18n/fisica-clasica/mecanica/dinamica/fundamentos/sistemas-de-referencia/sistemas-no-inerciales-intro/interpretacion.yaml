version: 2
id: interpretacion-sistemas-no-inerciales-intro
leaf_id: sistemas-no-inerciales-intro
nombre:
  es: Interpretacion de Sistemas no inerciales intro
  en: Interpretation of Introduction to Non-Inertial Frames
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: sistemas-de-referencia
  ruta_relativa: fisica-clasica/mecanica/dinamica/fundamentos/sistemas-de-referencia/sistemas-no-inerciales-intro
dependencies:
  formulas:
  - criterio_no_inercial
  - fuerza_ficticia_traslacion
  - dinamica_en_no_inercial
  - fuerza_centrifuga
  - fuerza_coriolis
  magnitudes:
  - m
  - a_marco
  - F_ficticia
  - F_real
  - a_rel
  - omega
  - r
  - v_rel
  - F_centrifuga
  - F_coriolis
  - system_classification
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  a_marco:
    summary_rules:
    - id: a_marco_summary
      when: 'true'
      status: info
      text:
        es: a_marco resume una lectura fisica relevante del leaf.
        en: a_marco summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: a_marco_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que a_marco sea coherente con unidades y contexto.
        en: Check that a_marco is coherent with units and context.
    physical_reading_rules:
    - id: a_marco_physical
      when: 'true'
      status: info
      text:
        es: La lectura de a_marco debe conectarse con el fenomeno fisico descrito.
        en: The reading of a_marco must connect with the described physical phenomenon.
    model_validity_rules:
    - id: a_marco_validity
      when: 'true'
      status: ok
      text:
        es: a_marco solo es interpretable dentro del modelo elegido.
        en: a_marco is interpretable only inside the chosen model.
    graph_rules:
    - id: a_marco_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de a_marco.
        en: The graph must reflect the role of a_marco visually.
    likely_errors:
    - id: a_marco_warn
      when: 'true'
      status: warning
      text:
        es: No confundas a_marco con otra magnitud cercana del problema.
        en: Do not confuse a_marco with another nearby quantity in the problem.
    next_step_rules:
    - id: a_marco_next
      when: 'true'
      status: info
      text:
        es: Usa a_marco para enlazar con el siguiente paso de interpretacion.
        en: Use a_marco to connect with the next interpretation step.
