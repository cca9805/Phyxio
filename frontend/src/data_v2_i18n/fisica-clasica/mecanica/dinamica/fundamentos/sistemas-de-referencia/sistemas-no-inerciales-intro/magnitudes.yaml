version: 1
magnitudes:
- id: m
  symbol: m
  nombre:
    es: masa
    en: mass
  descripcion:
    es: Masa del cuerpo analizado dentro del sistema no inercial. La masa es una propiedad
      intrínseca del objeto, independiente del sistema de referencia.
    en: Mass of the body analyzed inside the non-inertial system. Mass is an intrinsic
      property of the object, independent of the reference frame.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - sistemas-no-inerciales-intro
  common_mistake: Confundir m con otra magnitud cercana dentro de sistemas no inerciales
    intro.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - sistemas-no-inerciales-intro
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
