- id: F_ficticia
  symbol: \vec{F}_f
  nombre:
    es: fuerza_ficticia
    en: fictitious_force
  descripcion:
    es: Fuerza ficticia (o inercial) que aparece en sistemas no inerciales con traslación
      acelerada. Se calcula como F_f = -m·a_marco.
    en: Fictitious (or inertial) force appearing in non-inertial systems with accelerated
      translation. Calculated as F_f = -m·a_frame.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: true
