      en: The mass must be positive.
  - expr: r > 0
    message:
      es: El radio debe ser positivo.
      en: The radius must be positive.
  - expr: F_cf > 0
    message:
      es: F_cf debe ser positiva para despejar r.
      en: F_cf must be positive to solve for r.
  validity:
