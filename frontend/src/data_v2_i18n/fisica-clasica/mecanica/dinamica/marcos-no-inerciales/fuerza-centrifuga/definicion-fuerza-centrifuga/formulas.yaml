version: 1
formulas:
- id: fuerza_centrifuga_omega
  title:
    es: Fuerza centrifuga desde omega
    en: Centrifugal Force from Angular Speed
  equation: F_cf = m*omega^2*r
  latex: F_{cf}=m\omega^2 r
  rearrangements:
  - target: F_cf
    equation: F_cf = m*omega^2*r
    latex: F_{cf}=m\omega^2 r
    constraints: []
  - target: m
    equation: m = F_cf/(omega^2*r)
    latex: m=\frac{F_{cf}}{\omega^2 r}
    constraints: []
  - target: omega
    equation: omega = sqrt(F_cf/(m*r))
    latex: \omega=\sqrt{\frac{F_{cf}}{m r}}
    constraints: []
  - target: r
    equation: r = F_cf/(m*omega^2)
    latex: r=\frac{F_{cf}}{m\omega^2}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en definicion fuerza centrifuga.
    en: Relacion fisica usada en definicion fuerza centrifuga.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser positiva.
      en: The mass must be positive.
  - expr: r > 0
    message:
      es: El radio debe ser positivo.
      en: The radius must be positive.
  - expr: omega >= 0
    message:
      es: omega no puede ser negativa en esta calculadora escalar.
      en: omega cannot be negative in this scalar calculator.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - definicion-fuerza-centrifuga
  interpretation_tags:
  - definicion-fuerza-centrifuga
  result_semantics:
    target: F_cf
    meaning: Resulta util para interpretar F_cf en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: fuerza_centrifuga_velocidad
  title:
    es: Fuerza centrifuga desde velocidad tangencial
    en: Centrifugal Force from Tangential Speed
  equation: F_cf = m*v^2/r
  latex: F_{cf}=m\frac{v^2}{r}
  rearrangements:
  - target: F_cf
    equation: F_cf = m*v^2/r
    latex: F_{cf}=m\frac{v^2}{r}
    constraints: []
  - target: m
    equation: m = F_cf*r/(v^2)
    latex: m=\frac{F_{cf}r}{v^2}
    constraints: []
  - target: v
    equation: v = sqrt(F_cf*r/m)
    latex: v=\sqrt{\frac{F_{cf}r}{m}}
    constraints: []
  - target: r
    equation: r = m*v^2/F_cf
    latex: r=\frac{mv^2}{F_{cf}}
    constraints: []
