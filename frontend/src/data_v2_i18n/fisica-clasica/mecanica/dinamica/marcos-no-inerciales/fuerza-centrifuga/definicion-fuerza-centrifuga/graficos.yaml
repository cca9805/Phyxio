version: "1.0"
leaf: "definicion-fuerza-centrifuga"

coord:
  title:
    es: Gráfica Coord · Fuerza Centrífuga
    en: Coord Graph · Centrifugal Force
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: fuerza centrífuga ficticia F_cf (N)
    en: fictitious centrifugal force F_cf (N)
  xMagnitude: ω
  yMagnitude: F_cf
  relation:
    es: "F_cf = mω²r: crece cuadráticamente con ω y apunta radialmente hacia afuera. Solo existe en marcos no inerciales rotantes; en el marco inercial existe la fuerza centrípeta real F_c = mω²r pero apuntando hacia el centro."
    en: "F_cf = mω²r: grows quadratically with ω and points radially outward. Exists only in rotating non-inertial frames; in the inertial frame the real centripetal force F_c = mω²r points toward the centre."
  physicalReading:
    es: "F_cf crece como ω²: duplicar ω cuadruplica la fuerza centrífuga. La curva F_cf vs ω es una parábola con pendiente 2mωr."
    en: "F_cf grows as ω²: doubling ω quadruples the centrifugal force. The F_cf vs ω curve is a parabola with slope 2mωr."
  slopeMeaning:
    es: "La tangente de la parábola en ω es dF_cf/dω = 2mωr: crece linealmente con ω."
    en: "The tangent of the parabola at ω is dF_cf/dω = 2mωr: grows linearly with ω."
  interceptMeaning:
    es: "F_cf(0) = 0: sin rotación no hay fuerza centrífuga."
    en: "F_cf(0) = 0: without rotation there is no centrifugal force."
  curvatureMeaning:
    es: "La curva es parabólica (F ∝ ω²): crecimiento acelerado. Un aumento pequeño de ω a grandes velocidades implica un gran aumento de F_cf."
    en: "The curve is parabolic (F ∝ ω²): accelerated growth. A small increase in ω at high speeds implies a large increase in F_cf."
  signMeaning:
    es: "F_cf > 0: apunta radialmente hacia afuera (alejándose del eje de rotación)."
    en: "F_cf > 0: points radially outward (away from the rotation axis)."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Válido para sistemas con rotación uniforme. Solo observable en el marco rotante (no inercial).
    en: Valid for systems with uniform rotation. Only observable in the rotating (non-inertial) frame.
  modelConnection:
    es: "Se interpreta bajo la mecánica en marcos rotantes: F_cf = mω²r es la fuerza ficticia centrífuga igual y opuesta a la fuerza centrípeta real."
    en: "Interpreted under mechanics in rotating frames: F_cf = mω²r is the fictitious centrifugal force equal and opposite to the real centripetal force."
  formulaConnection:
    es: Conecta con F_c = mv²/r = mω²r (centrípeta real, marco inercial) y F_cf = mω²r (centrífuga ficticia, marco rotante).
    en: Connects to F_c = mv²/r = mω²r (real centripetal, inertial frame) and F_cf = mω²r (fictitious centrifugal, rotating frame).
  readingFocus:
    es: leer F_cf = mω²r, identificar r y m, y distinguir que esta fuerza solo existe en el marco rotante.
    en: read F_cf = mω²r, identify r and m, and recognise that this force only exists in the rotating frame.
  agentHints:
    es:
      - La fuerza centrífuga y la centrípeta tienen la misma magnitud (mω²r) pero existen en marcos distintos.
      - En el marco inercial existe solo la centrípeta (real). En el rotante existe la centrífuga (ficticia).
      - "La fuerza centrífuga explica por qué los objetos 'se van hacia afuera' en un sistema rotante."
    en:
      - Centrifugal and centripetal forces have the same magnitude (mω²r) but exist in different frames.
      - In the inertial frame only the centripetal (real) force exists. In the rotating frame the centrifugal (fictitious) force exists.
      - "Centrifugal force explains why objects 'fly outward' in a rotating system."
  commonMistakes:
    es:
      - Afirmar que la fuerza centrífuga existe en el marco inercial.
      - Confundir fuerza centrífuga (ficticia, hacia afuera) con fuerza centrípeta (real, hacia el centro).
      - Aplicar F_cf = mω²r sin especificar el marco de referencia rotante.
    en:
      - Claiming that centrifugal force exists in the inertial frame.
      - Confusing centrifugal force (fictitious, outward) with centripetal force (real, toward centre).
      - Applying F_cf = mω²r without specifying the rotating reference frame.
