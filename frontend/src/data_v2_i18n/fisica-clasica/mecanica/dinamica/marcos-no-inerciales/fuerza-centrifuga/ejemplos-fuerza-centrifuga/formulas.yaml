- id: factor_por_cambio_omega
  title:
    es: Cambio relativo de fuerza por cambio de omega
    en: Relative Force Change under a Change in Angular Speed
  equation: ratio = (omega2/omega1)^2
  latex: R=\left(\frac{\omega_2}{\omega_1}\right)^2
  rearrangements:
  - target: ratio
    equation: ratio = (omega2/omega1)^2
    latex: R=\left(\frac{\omega_2}{\omega_1}\right)^2
    constraints: []
  - target: omega2
    equation: omega2 = omega1*sqrt(ratio)
    latex: \omega_2=\omega_1\sqrt{R}
    constraints: []
  - target: omega1
    equation: omega1 = omega2/sqrt(ratio)
    latex: \omega_1=\frac{\omega_2}{\sqrt{R}}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en ejemplos fuerza centrifuga.
    en: Relacion fisica usada en ejemplos fuerza centrifuga.
  constraints:
  - expr: omega1 > 0
    message:
      es: omega1 debe ser positiva.
      en: Omega1 must be positive.
  - expr: ratio > 0
    message:
      es: La razon de fuerzas debe ser positiva.
      en: The force ratio must be positive.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
