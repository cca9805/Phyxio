version: "1.0"
leaf: "ejemplos-fuerza-centrifuga"

coord:
  title:
    es: Gráfica Coord · Ejemplos Fuerza Centrífuga
    en: Coord Graph · Centrifugal Force Examples
  xAxis:
    es: velocidad angular ω (rad/s) o radio r (m)
    en: angular velocity ω (rad/s) or radius r (m)
  yAxis:
    es: fuerza centrífuga F_cf (N)
    en: centrifugal force F_cf (N)
  xMagnitude: ω o r
  yMagnitude: F_cf
  relation:
    es: "F_cf = mω²r en sistemas reales: centrifugadoras (separación de mezclas), curvas de carretera (peralte), planetas (forma achatada). La gráfica muestra F_cf vs ω (parábola) o F_cf vs r (recta)."
    en: "F_cf = mω²r in real systems: centrifuges (mixture separation), road curves (banking), planets (oblate shape). The graph shows F_cf vs ω (parabola) or F_cf vs r (straight line)."
  physicalReading:
    es: F_cf vs ω es parabólica (∝ω²). F_cf vs r es lineal (∝r). Identificar el eje para interpretar correctamente la dependencia.
    en: F_cf vs ω is parabolic (∝ω²). F_cf vs r is linear (∝r). Identify the axis to correctly interpret the dependence.
  slopeMeaning:
    es: "Para F_cf vs r (ω fijo): pendiente = mω² (en N/m). Para F_cf vs ω (r fijo): no hay pendiente constante (parabólica)."
    en: "For F_cf vs r (fixed ω): slope = mω² (in N/m). For F_cf vs ω (fixed r): no constant slope (parabolic)."
  interceptMeaning:
    es: "F_cf(0) = 0: sin rotación o sin radio no hay fuerza centrífuga."
    en: "F_cf(0) = 0: without rotation or zero radius there is no centrifugal force."
  curvatureMeaning:
    es: "F_cf vs ω es cóncava hacia arriba (∝ω²): a grandes ω, aumentos pequeños de velocidad generan grandes fuerzas."
    en: "F_cf vs ω is concave upward (∝ω²): at large ω, small velocity increases generate large forces."
  signMeaning:
    es: "F_cf > 0: siempre apunta radialmente hacia afuera (en el marco rotante)."
    en: "F_cf > 0: always points radially outward (in the rotating frame)."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Válido para marcos rotantes. En el marco inercial, la cantidad equivalente es la fuerza centrípeta real.
    en: Valid for rotating frames. In the inertial frame, the equivalent quantity is the real centripetal force.
  modelConnection:
    es: Se interpreta bajo F_cf = mω²r (marco rotante) equivalente a F_c = mv²/r (marco inercial).
    en: Interpreted under F_cf = mω²r (rotating frame) equivalent to F_c = mv²/r (inertial frame).
  formulaConnection:
    es: "Conecta con F_cf = mω²r, v = ωr, y la condición de contacto en el loop: N + F_cf = mg (punto superior)."
    en: "Connects to F_cf = mω²r, v = ωr, and the contact condition in the loop: N + F_cf = mg (top point)."
  readingFocus:
    es: leer F_cf en cada ejemplo, identificar r y ω, y relacionar con la condición de contacto o equilibrio del sistema rotante.
    en: read F_cf in each example, identify r and ω, and relate to the contact condition or equilibrium of the rotating system.
  agentHints:
    es:
      - "Centrifugadora: ω grande → F_cf enorme → separa partículas de diferente densidad."
      - "Curva peraltada: el ángulo del peralte compensa F_cf para que no se necesite rozamiento."
      - La Tierra achatada en los polos se debe a la F_cf de su propia rotación.
    en:
      - "Centrifuge: large ω → enormous F_cf → separates particles of different density."
      - "Banked curve: the banking angle compensates F_cf so that friction is not required."
      - "Earth's polar flattening is due to F_cf from its own rotation."
  commonMistakes:
    es:
      - Confundir F_cf (marco rotante, hacia afuera) con F_c (marco inercial, hacia el centro).
      - No reconocer que F_cf ∝ ω² implica crecimiento muy rápido con la velocidad angular.
      - Aplicar F_cf = mω²r fuera del marco rotante.
    en:
      - Confusing F_cf (rotating frame, outward) with F_c (inertial frame, toward centre).
      - Not recognising that F_cf ∝ ω² implies very fast growth with angular velocity.
      - Applying F_cf = mω²r outside the rotating frame.
