- id: desvio_lateral_aproximado
  title:
    es: Desvio lateral aproximado
    en: Approximate Lateral Drift
  equation: y = 0.5*a_cor*t^2
  latex: y\approx\frac{1}{2}a_{cor}t^2
  rearrangements:
  - target: y
    equation: y = 0.5*a_cor*t^2
    latex: y\approx\frac{1}{2}a_{cor}t^2
    constraints: []
  - target: a_cor
    equation: a_cor = 2*y/(t^2)
    latex: a_{cor}\approx\frac{2y}{t^2}
    constraints: []
  - target: t
    equation: t = sqrt(2*y/a_cor)
    latex: t\approx\sqrt{\frac{2y}{a_{cor}}}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en aplicaciones fisicas.
    en: Relacion fisica usada en aplicaciones fisicas.
  constraints:
  - expr: t >= 0
    message:
      es: El tiempo debe ser no negativo.
      en: The time must be non-negative.
  - expr: a_cor > 0
    message:
      es: a_cor debe ser positiva para despejar t.
      en: a_cor must be positive to solve for t.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
