version: 1
formulas:
- id: aceleracion_coriolis_aplicada
  title:
    es: Aceleracion de Coriolis en aplicaciones
    en: Acceleration of Coriolis in Applications
  equation: a_cor = 2*omega*v_rel*sin(alpha)
  latex: a_{cor}=2\omega v_{rel}\sin\alpha
  rearrangements:
  - target: a_cor
    equation: a_cor = 2*omega*v_rel*sin(alpha)
    latex: a_{cor}=2\omega v_{rel}\sin\alpha
    constraints: []
  - target: omega
    equation: omega = a_cor/(2*v_rel*sin(alpha))
    latex: \omega=\frac{a_{cor}}{2v_{rel}\sin\alpha}
    constraints: []
  - target: v_rel
    equation: v_rel = a_cor/(2*omega*sin(alpha))
    latex: v_{rel}=\frac{a_{cor}}{2\omega\sin\alpha}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en aplicaciones fisicas.
    en: Relacion fisica usada en aplicaciones fisicas.
  constraints: Aplicar solo dentro del modelo descrito.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - aplicaciones-fisicas
  interpretation_tags:
  - aplicaciones-fisicas
  result_semantics:
    target: a_cor
    meaning: Resulta util para interpretar a_cor en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
