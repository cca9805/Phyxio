    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: fuerza_desde_aceleracion
  title:
    es: Fuerza de Coriolis desde aceleracion
    en: Coriolis Force from Acceleration
  equation: F_cor = m*a_cor
  latex: F_{cor}=m\,a_{cor}
  rearrangements:
  - target: F_cor
    equation: F_cor = m*a_cor
    latex: F_{cor}=m\,a_{cor}
    constraints: []
  - target: m
    equation: m = F_cor/a_cor
    latex: m=\frac{F_{cor}}{a_{cor}}
    constraints: []
  - target: a_cor
    equation: a_cor = F_cor/m
    latex: a_{cor}=\frac{F_{cor}}{m}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
