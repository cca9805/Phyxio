version: "1.0"
leaf: "aplicaciones-fisicas"

coord:
  title:
    es: Gráfica Coord · Aplicaciones Físicas
    en: Coord Graph · Physical Applications
  xAxis:
    es: magnitud independiente de la aplicación
    en: independent quantity of the application
  yAxis:
    es: magnitud dependiente de la aplicación
    en: dependent quantity of the application
  xMagnitude: variable de la aplicación
  yMagnitude: resultado de la aplicación
  relation:
    es: "Muestra la relación cuantitativa característica de las aplicaciones físicas de la sección: la forma de la curva (lineal, cuadrática, exponencial) identifica la ley aplicada."
    en: "Shows the characteristic quantitative relationship of the physical applications in this section: the curve shape (linear, quadratic, exponential) identifies the applied law."
  physicalReading:
    es: La pendiente, el intercepto y la curvatura identifican la constante física relevante de la aplicación (k, m, b, c_D, etc.).
    en: The slope, intercept, and curvature identify the relevant physical constant of the application (k, m, b, c_D, etc.).
  slopeMeaning:
    es: "La pendiente es la constante de la ley aplicada: verificar sus unidades para confirmar qué parámetro físico representa."
    en: "The slope is the constant of the applied law: verify its units to confirm which physical parameter it represents."
  interceptMeaning:
    es: El intercepto es la condición inicial o de referencia de la aplicación.
    en: The intercept is the initial or reference condition of the application.
  curvatureMeaning:
    es: La linealidad indica proporcionalidad directa. La curvatura indica dependencias de orden mayor.
    en: Linearity indicates direct proportionality. Curvature indicates higher-order dependencies.
  signMeaning:
    es: El signo de la magnitud dependiente indica la dirección o sentido del efecto en la aplicación real.
    en: The sign of the dependent quantity indicates the direction or sense of the effect in the real application.
  areaMeaning:
    es: El área bajo la curva puede representar energía, trabajo o impulso dependiendo de los ejes elegidos.
    en: The area under the curve can represent energy, work, or impulse depending on the chosen axes.
  domainMeaning:
    es: El dominio válido coincide con el rango físicamente realizable de la aplicación.
    en: The valid domain corresponds to the physically realizable range of the application.
  modelConnection:
    es: Se interpreta bajo la ley física específica de la aplicación (Newton, Hooke, fluidos, etc.).
    en: Interpreted under the specific physical law of the application (Newton, Hooke, fluids, etc.).
  formulaConnection:
    es: "Conecta con la fórmula de la aplicación: F = kx, a = ΣF/m, F_D = bv, F_c = mv²/r, etc."
    en: "Connects to the application formula: F = kx, a = ΣF/m, F_D = bv, F_c = mv²/r, etc."
  readingFocus:
    es: leer ejes, pendiente y tendencia para identificar la ley física aplicada y cuantificar sus parámetros.
    en: read axes, slope, and trend to identify the applied physical law and quantify its parameters.
  agentHints:
    es:
      - Verificar primero las unidades de los ejes para confirmar qué magnitudes se representan.
      - "La forma de la curva es el primer indicador de la ley física: lineal, cuadrática, exponencial, etc."
      - Comparar con la gráfica teórica del fenómeno para validar la aplicación.
    en:
      - First verify axis units to confirm which quantities are being plotted.
      - "The curve shape is the primary indicator of the physical law: linear, quadratic, exponential, etc."
      - Compare with the theoretical graph of the phenomenon to validate the application.
  commonMistakes:
    es:
      - Aplicar la ley teórica fuera de su dominio de validez física.
      - Ignorar las unidades al extraer parámetros de la pendiente o el intercepto.
      - Confundir la relación cuantitativa correcta con una aproximación lineal incorrecta.
    en:
      - Applying the theoretical law outside its physically valid domain.
      - Ignoring units when extracting parameters from the slope or intercept.
      - Confusing the correct quantitative relationship with an incorrect linear approximation.
