version: 2
id: interpretacion-aplicaciones-fisicas
leaf_id: aplicaciones-fisicas
nombre:
  es: Interpretacion de Aplicaciones fisicas
  en: Interpretation of Applications of the Coriolis Force
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: fuerza-coriolis
  ruta_relativa: fisica-clasica/mecanica/dinamica/marcos-no-inerciales/fuerza-coriolis/aplicaciones-fisicas
dependencies:
  formulas:
  - aceleracion_coriolis_aplicada
  - fuerza_desde_aceleracion
  - desvio_lateral_aproximado
  - criterio_relevancia_conceptual
  magnitudes:
  - omega
  - v_rel
  - alpha
  - a_cor
  - m
  - F_cor
  - t
  - y
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  a_cor:
    summary_rules:
    - id: a_cor_summary
      when: 'true'
      status: info
      text:
        es: a_cor resume una lectura fisica relevante del leaf.
        en: a_cor summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: a_cor_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que a_cor sea coherente con unidades y contexto.
        en: Check that a_cor is coherent with units and context.
    physical_reading_rules:
    - id: a_cor_physical
      when: 'true'
      status: info
      text:
        es: a_cor importa porque, si actua durante tiempo suficiente, reorganiza la trayectoria y acaba produciendo un desvio lateral observable.
        en: a_cor matters because, if it acts long enough, it reorganizes the trajectory and ends up producing an observable lateral drift.
    model_validity_rules:
    - id: a_cor_validity
      when: 'true'
      status: ok
      text:
        es: a_cor solo es interpretable dentro del modelo elegido.
        en: a_cor is interpretable only inside the chosen model.
    graph_rules:
    - id: a_cor_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de a_cor.
        en: The graph must reflect the role of a_cor visually.
    likely_errors:
    - id: a_cor_warn
      when: 'true'
      status: warning
      text:
        es: No confundas a_cor con otra magnitud cercana del problema.
        en: Do not confuse a_cor with another nearby quantity in the problem.
    next_step_rules:
    - id: a_cor_next
      when: 'true'
      status: info
      text:
        es: Usa a_cor para enlazar con el siguiente paso de interpretacion.
        en: Use a_cor to connect with the next interpretation step.
