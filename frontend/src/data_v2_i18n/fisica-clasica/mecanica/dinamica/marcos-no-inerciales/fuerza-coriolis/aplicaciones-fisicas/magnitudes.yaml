version: 1
magnitudes:
- id: omega
  symbol: \Omega
  nombre:
    es: velocidad_angular_del_marco
    en: angular_velocity_of_the_frame
  descripcion:
    es: Velocidad angular del marco rotatorio (por ejemplo, la Tierra).
    en: Angular speed of the rotating frame, for example Earth.
  unidad_si: rad/s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - aplicaciones-fisicas
  common_mistake: Confundir omega con otra magnitud cercana dentro de aplicaciones
    fisicas.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - aplicaciones-fisicas
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar omega con una definicion estable antes de sustituir valores.
