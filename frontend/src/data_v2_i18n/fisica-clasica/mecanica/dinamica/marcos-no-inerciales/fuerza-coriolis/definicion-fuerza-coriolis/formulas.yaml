version: 1
formulas:
- id: modulo_fuerza_coriolis
  title:
    es: Modulo de la fuerza de Coriolis
    en: Magnitude of the Coriolis Force
  equation: F_cor = 2*m*omega*v_rel*sin(alpha)
  latex: F_{cor}=2m\omega v_{rel}\sin\alpha
  rearrangements:
  - target: F_cor
    equation: F_cor = 2*m*omega*v_rel*sin(alpha)
    latex: F_{cor}=2m\omega v_{rel}\sin\alpha
    constraints: []
  - target: m
    equation: m = F_cor/(2*omega*v_rel*sin(alpha))
    latex: m=\frac{F_{cor}}{2\omega v_{rel}\sin\alpha}
    constraints: []
  - target: omega
    equation: omega = F_cor/(2*m*v_rel*sin(alpha))
    latex: \omega=\frac{F_{cor}}{2m v_{rel}\sin\alpha}
    constraints: []
  - target: v_rel
    equation: v_rel = F_cor/(2*m*omega*sin(alpha))
    latex: v_{rel}=\frac{F_{cor}}{2m\omega\sin\alpha}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en definicion fuerza coriolis.
    en: Relacion fisica usada en definicion fuerza coriolis.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser positiva.
      en: The mass must be positive.
  - expr: omega >= 0
    message:
      es: omega debe ser no negativa en este modelo escalar.
      en: omega must be non-negative in this scalar model.
  - expr: v_rel >= 0
    message:
      es: v_rel debe ser no negativa en este modelo escalar.
      en: v_rel must be non-negative in this scalar model.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - definicion-fuerza-coriolis
  interpretation_tags:
  - definicion-fuerza-coriolis
  result_semantics:
    target: F_cor
    meaning: Resulta util para interpretar F_cor en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
