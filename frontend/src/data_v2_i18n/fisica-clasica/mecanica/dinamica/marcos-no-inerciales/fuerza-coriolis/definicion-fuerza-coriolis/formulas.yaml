- id: relacion_fuerza_aceleracion
  title:
    es: Relacion entre fuerza y aceleracion de Coriolis
    en: Relation Between Force and Acceleration of Coriolis
  equation: F_cor = m*a_cor
  latex: F_{cor}=m\,a_{cor}
  rearrangements:
  - target: F_cor
    equation: F_cor = m*a_cor
    latex: F_{cor}=m\,a_{cor}
    constraints: []
  - target: m
    equation: m = F_cor/a_cor
    latex: m=\frac{F_{cor}}{a_{cor}}
    constraints: []
  - target: a_cor
    equation: a_cor = F_cor/m
    latex: a_{cor}=\frac{F_{cor}}{m}
    constraints: []
