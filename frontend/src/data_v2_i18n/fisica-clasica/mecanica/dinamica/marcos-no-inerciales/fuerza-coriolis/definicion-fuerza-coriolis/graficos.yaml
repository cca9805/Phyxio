version: "1.0"
leaf: "definicion-fuerza-coriolis"

coord:
  title:
    es: Gráfica Coord · Fuerza de Coriolis
    en: Coord Graph · Coriolis Force
  xAxis:
    es: "velocidad relativa v' (m/s)"
    en: "relative velocity v' (m/s)"
  yAxis:
    es: fuerza de Coriolis F_Cor (N)
    en: Coriolis force F_Cor (N)
  xMagnitude: "v'"
  yMagnitude: F_Cor
  relation:
    es: "F_Cor = 2m·Ω·v'·sinφ (magnitud): proporcional a la velocidad relativa v' y a la velocidad angular Ω. Solo existe en marcos rotantes y es perpendicular a v'."
    en: "F_Cor = 2m·Ω·v'·sinφ (magnitude): proportional to relative velocity v' and angular velocity Ω. Exists only in rotating frames and is perpendicular to v'."
  physicalReading:
    es: "La pendiente de F_Cor vs v' es 2mΩsinφ: a mayor velocidad relativa, mayor desviación de Coriolis. A v' = 0 no hay Coriolis."
    en: "The slope of F_Cor vs v' is 2mΩsinφ: greater relative velocity means greater Coriolis deflection. At v' = 0 there is no Coriolis force."
  slopeMeaning:
    es: "Pendiente = 2mΩsinφ: determina la intensidad de la desviación de Coriolis por unidad de velocidad relativa."
    en: "Slope = 2mΩsinφ: determines the Coriolis deflection intensity per unit of relative velocity."
  interceptMeaning:
    es: "F_Cor(0) = 0: sin movimiento relativo en el marco rotante no hay fuerza de Coriolis."
    en: "F_Cor(0) = 0: without relative motion in the rotating frame there is no Coriolis force."
  curvatureMeaning:
    es: "La relación es lineal con v': duplicar la velocidad relativa duplica la fuerza de Coriolis."
    en: "The relationship is linear with v': doubling the relative velocity doubles the Coriolis force."
  signMeaning:
    es: "La dirección de F_Cor es perpendicular a v' y a Ω: en el hemisferio norte desvía hacia la derecha del movimiento."
    en: "The direction of F_Cor is perpendicular to v' and Ω: in the northern hemisphere it deflects to the right of motion."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Relevante para sistemas con rotación significativa (Tierra, centrifugadoras de alta velocidad). Despreciable a pequeña escala.
    en: Relevant for systems with significant rotation (Earth, high-speed centrifuges). Negligible at small scales.
  modelConnection:
    es: "Se interpreta bajo la mecánica en marcos rotantes: F_Cor = −2m(Ω×v') es la fuerza ficticia de Coriolis."
    en: "Interpreted under mechanics in rotating frames: F_Cor = −2m(Ω×v') is the fictitious Coriolis force."
  formulaConnection:
    es: "Conecta con F_Cor = −2m(Ω×v') y con la desviación de trayectorias en la Tierra (vientos, corrientes oceánicas)."
    en: "Connects to F_Cor = −2m(Ω×v') and the deflection of trajectories on Earth (winds, ocean currents)."
  readingFocus:
    es: "leer la proporcionalidad con v' y la dirección perpendicular dada por el producto vectorial −2m(Ω×v')."
    en: "read the proportionality with v' and the perpendicular direction given by the cross product −2m(Ω×v')."
  agentHints:
    es:
      - "La fuerza de Coriolis no realiza trabajo: siempre es perpendicular a la velocidad relativa."
      - En el hemisferio norte desvía los objetos a la derecha; en el sur, a la izquierda.
      - Los ciclones giran en sentido antihorario en el N y horario en el S por la fuerza de Coriolis.
    en:
      - "The Coriolis force does no work: it is always perpendicular to the relative velocity."
      - In the northern hemisphere it deflects objects to the right; in the southern hemisphere, to the left.
      - Cyclones rotate counterclockwise in the N and clockwise in the S due to the Coriolis force.
  commonMistakes:
    es:
      - Pensar que la fuerza de Coriolis existe en el marco inercial.
      - Afirmar que Coriolis afecta el sentido de giro del agua en el fregadero (demasiado débil a esa escala).
      - "Confundir Coriolis (perpendicular a v') con la fuerza centrífuga (radialmente hacia afuera)."
    en:
      - Thinking the Coriolis force exists in the inertial frame.
      - Claiming Coriolis affects the drain swirl direction in a sink (too weak at that scale).
      - "Confusing Coriolis (perpendicular to v') with centrifugal force (radially outward)."

svg:
  title:
    es: Escena SVG · Fuerza de Coriolis
    en: SVG Scene · Coriolis Force
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: coriolis_scene
  sceneLabel:
    es: Sistema rotante con trayectoria desviada por la fuerza de Coriolis
    en: Rotating system with trajectory deflected by the Coriolis force
  objects:
    es:
      - disco o plataforma rotante (Ω)
      - "objeto con velocidad relativa v'"
      - trayectoria curva (desviación de Coriolis)
      - "vector F_Cor perpendicular a v'"
    en:
      - rotating disk or platform (Ω)
      - "object with relative velocity v'"
      - curved trajectory (Coriolis deflection)
      - "F_Cor vector perpendicular to v'"
  mainObject:
    es: "objeto con velocidad relativa v' en el marco rotante"
    en: "object with relative velocity v' in the rotating frame"
  referenceFrame:
    es: marco de referencia rotante (disco giratorio, sistema Tierra)
    en: rotating reference frame (spinning disk, Earth system)
  geometry:
    es: "La escena muestra la plataforma rotante con Ω y el objeto moviéndose con v'. La trayectoria se curva debido a F_Cor perpendicular a v'."
    en: "The scene shows the rotating platform with Ω and the object moving with v'. The trajectory curves due to F_Cor perpendicular to v'."
  interactions:
    es: "F_Cor = −2m(Ω×v'): perpendicular a la velocidad relativa, curva la trayectoria sin cambiar la rapidez."
    en: "F_Cor = −2m(Ω×v'): perpendicular to the relative velocity, curves the trajectory without changing the speed."
  modelElements:
    es:
      - Ω (velocidad angular del marco)
      - "v' (velocidad del objeto en el marco rotante)"
      - "F_Cor = −2m(Ω×v') (perpendicular a v')"
    en:
      - Ω (angular velocity of the frame)
      - "v' (object velocity in the rotating frame)"
      - "F_Cor = −2m(Ω×v') (perpendicular to v')"
  visualCues:
    es:
      - La trayectoria se curva hacia la derecha (hemisferio norte) o izquierda (hemisferio sur).
      - "F_Cor es siempre perpendicular a v': no cambia la rapidez, solo la dirección."
      - "Cuanto mayor es v', mayor es la curvatura de la trayectoria."
    en:
      - The trajectory curves right (northern hemisphere) or left (southern hemisphere).
      - "F_Cor is always perpendicular to v': it changes direction only, not speed."
      - "The greater v', the greater the curvature of the trajectory."
  scaleMeaning:
    es: "La curvatura de la trayectoria es proporcional a |F_Cor| = 2mΩv'sinφ."
    en: "The curvature of the trajectory is proportional to |F_Cor| = 2mΩv'sinφ."
  relation:
    es: "La escena ilustra la desviación de Coriolis: trayectoria curva en el marco rotante debida a F_Cor perpendicular a v'."
    en: "The scene illustrates Coriolis deflection: curved trajectory in the rotating frame due to F_Cor perpendicular to v'."
  physicalReading:
    es: "Identificar la dirección de Ω y v' para deducir el sentido de la desviación de Coriolis usando la regla de la mano derecha."
    en: "Identify the direction of Ω and v' to deduce the Coriolis deflection direction using the right-hand rule."
  modelConnection:
    es: "Se interpreta bajo la mecánica en marcos rotantes: F_Cor = −2m(Ω×v')."
    en: "Interpreted under mechanics in rotating frames: F_Cor = −2m(Ω×v')."
  formulaConnection:
    es: "Conecta con F_Cor = −2m(Ω×v') y la desviación en la superficie terrestre: F_Cor = 2mΩv'sinφ."
    en: "Connects to F_Cor = −2m(Ω×v') and the deflection on Earth's surface: F_Cor = 2mΩv'sinφ."
  readingFocus:
    es: "identificar la dirección de desviación usando la regla de la mano derecha para Ω×v' y el sistema rotante que genera F_Cor."
    en: "identify the deflection direction using the right-hand rule for Ω×v' and the rotating frame that generates F_Cor."
  agentHints:
    es:
      - "F_Cor no realiza trabajo: la rapidez no cambia, solo la dirección."
      - En la Tierra (Ω = 7.27×10⁻⁵ rad/s), F_Cor es apreciable solo para movimientos de gran escala (océanos, atmósfera).
      - "La regla para la desviación: en el hemisferio norte, el movimiento se desvía a la derecha del vector v'."
    en:
      - "F_Cor does no work: speed does not change, only direction."
      - On Earth (Ω = 7.27×10⁻⁵ rad/s), F_Cor is appreciable only for large-scale motions (oceans, atmosphere).
      - "The rule for deflection: in the northern hemisphere, motion deflects to the right of vector v'."
  commonMistakes:
    es:
      - "Dibujar F_Cor en la misma dirección que v' (debe ser perpendicular)."
      - "Olvidar que F_Cor depende de v' en el marco rotante, no en el inercial."
      - No aplicar la regla de la mano derecha correctamente para determinar el sentido de la desviación.
    en:
      - "Drawing F_Cor in the same direction as v' (it must be perpendicular)."
      - "Forgetting that F_Cor depends on v' in the rotating frame, not the inertial one."
      - Not applying the right-hand rule correctly to determine the deflection direction.
