version: 2
id: interpretacion-definicion-fuerza-coriolis
leaf_id: definicion-fuerza-coriolis
nombre:
  es: Interpretacion de Definicion fuerza coriolis
  en: Interpretation of Definition of the Coriolis Force
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: fuerza-coriolis
  ruta_relativa: fisica-clasica/mecanica/dinamica/marcos-no-inerciales/fuerza-coriolis/definicion-fuerza-coriolis
dependencies:
  formulas:
  - modulo_fuerza_coriolis
  - aceleracion_coriolis
  - relacion_fuerza_aceleracion
  - forma_vectorial_conceptual
  magnitudes:
  - m
  - omega
  - v_rel
  - alpha
  - a_cor
  - F_cor
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  F_cor:
    summary_rules:
    - id: F_cor_summary
      when: 'true'
      status: info
      text:
        es: F_cor resume una lectura fisica relevante del leaf.
        en: F_cor summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: F_cor_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que F_cor sea coherente con unidades y contexto.
        en: Check that F_cor is coherent with units and context.
    physical_reading_rules:
    - id: F_cor_physical
      when: 'true'
      status: info
      text:
        es: F_cor aumenta porque crecen omega, v_rel o sin(alpha), y por tanto indica una desviacion lateral mas intensa dentro del marco rotatorio.
        en: F_cor grows because omega, v_rel, or sin(alpha) grow, and therefore it indicates a stronger lateral deflection inside the rotating frame.
    model_validity_rules:
    - id: F_cor_validity
      when: 'true'
      status: ok
      text:
        es: F_cor solo es interpretable dentro del modelo elegido.
        en: F_cor is interpretable only inside the chosen model.
    graph_rules:
    - id: F_cor_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de F_cor.
        en: The graph must reflect the role of F_cor visually.
    likely_errors:
    - id: F_cor_warn
      when: 'true'
      status: warning
      text:
        es: No confundas F_cor con otra magnitud cercana del problema.
        en: Do not confuse F_cor with another nearby quantity in the problem.
    next_step_rules:
    - id: F_cor_next
      when: 'true'
      status: info
      text:
        es: Usa F_cor para enlazar con el siguiente paso de interpretacion.
        en: Use F_cor to connect with the next interpretation step.
