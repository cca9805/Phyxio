version: 1
formulas:
- id: fuerza_ficticia_traslacional
  title:
    es: Fuerza ficticia traslacional
    en: Translational fictitious force
  equation: F_fict = -m*a_marco
  latex: F_{fict}=-m\,a_{marco}
  rearrangements:
  - target: F_fict
    equation: F_fict = -m*a_marco
    latex: F_{fict}=-m\,a_{marco}
    constraints: []
  - target: a_marco
    equation: a_marco = -F_fict/m
    latex: a_{marco}=-\frac{F_{fict}}{m}
    constraints: []
  - target: m
    equation: m = -F_fict/a_marco
    latex: m=-\frac{F_{fict}}{a_{marco}}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en concepto fuerzas ficticias.
    en: Physical relation used in the concept of fictitious forces.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser positiva.
      en: The mass must be positive.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - concepto-fuerzas-ficticias
  interpretation_tags:
  - concepto-fuerzas-ficticias
  result_semantics:
    target: F_fict
    meaning: Resulta util para interpretar F_fict en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: segunda_ley_marco_no_inercial
  title:
    es: Segunda ley en marco no inercial (1D)
    en: Second law in a non-inertial frame (1D)
  equation: a_rel = (F_res + F_fict)/m
  latex: a_{rel}=\frac{F_{res}+F_{fict}}{m}
  rearrangements:
  - target: a_rel
    equation: a_rel = (F_res + F_fict)/m
    latex: a_{rel}=\frac{F_{res}+F_{fict}}{m}
    constraints: []
  - target: F_res
    equation: F_res = m*a_rel - F_fict
    latex: F_{res}=m\,a_{rel}-F_{fict}
    constraints: []
  - target: F_fict
    equation: F_fict = m*a_rel - F_res
    latex: F_{fict}=m\,a_{rel}-F_{res}
    constraints: []
  - target: m
    equation: m = (F_res + F_fict)/a_rel
    latex: m=\frac{F_{res}+F_{fict}}{a_{rel}}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en concepto fuerzas ficticias.
    en: Physical relation used in the concept of fictitious forces.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser positiva.
      en: The mass must be positive.
  - expr: a_rel != 0
    message:
      es: a_rel no puede ser 0 para despejar m.
      en: a_rel cannot be zero when solving for m.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - concepto-fuerzas-ficticias
  interpretation_tags:
  - concepto-fuerzas-ficticias
  result_semantics:
    target: a_rel
    meaning: Resulta util para interpretar a_rel en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
