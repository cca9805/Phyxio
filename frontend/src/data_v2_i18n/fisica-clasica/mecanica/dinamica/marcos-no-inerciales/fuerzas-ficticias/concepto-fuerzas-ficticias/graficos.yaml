version: "1.0"
leaf: "concepto-fuerzas-ficticias"

coord:
  title:
    es: Gráfica Coord · Fuerzas Ficticias
    en: Coord Graph · Fictitious Forces
  xAxis:
    es: aceleración del sistema a_ref (m/s²)
    en: reference frame acceleration a_ref (m/s²)
  yAxis:
    es: fuerza ficticia F_fict (N)
    en: fictitious force F_fict (N)
  xMagnitude: a_ref
  yMagnitude: F_fict
  relation:
    es: "F_fict = −m·a_ref: crece linealmente con la aceleración del sistema de referencia y no tiene fuente física real (no proviene de interacción alguna con otro cuerpo)."
    en: "F_fict = −m·a_ref: grows linearly with the reference frame's acceleration and has no real physical source (it does not arise from any interaction with another body)."
  physicalReading:
    es: "La pendiente es −m: a mayor masa del objeto, mayor es la fuerza ficticia percibida en el mismo marco acelerado."
    en: "The slope is −m: for greater object mass, the fictitious force perceived in the same accelerated frame is larger."
  slopeMeaning:
    es: "Pendiente = −m (kg): la masa del objeto determina la fuerza ficticia por unidad de aceleración del marco."
    en: "Slope = −m (kg): the object's mass determines the fictitious force per unit of frame acceleration."
  interceptMeaning:
    es: "Si a_ref = 0 (marco inercial), F_fict = 0: no hay fuerzas ficticias en marcos inerciales."
    en: "If a_ref = 0 (inertial frame), F_fict = 0: there are no fictitious forces in inertial frames."
  curvatureMeaning:
    es: La relación es lineal para marcos con aceleración constante. En marcos rotantes aparecen también fuerzas de Coriolis y centrífuga.
    en: The relationship is linear for frames with constant acceleration. In rotating frames, Coriolis and centrifugal forces also appear.
  signMeaning:
    es: "F_fict = −m·a_ref: el signo negativo indica que la fuerza ficticia apunta en sentido opuesto a la aceleración del marco."
    en: "F_fict = −m·a_ref: the negative sign indicates the fictitious force points opposite to the frame's acceleration."
  areaMeaning:
    es: Sin interpretación directa en este diagrama.
    en: No direct interpretation in this diagram.
  domainMeaning:
    es: Válido para marcos de referencia en traslación acelerada. Para marcos rotantes, se añaden centrifuga y Coriolis.
    en: Valid for translationally accelerating reference frames. For rotating frames, centrifugal and Coriolis forces are added.
  modelConnection:
    es: "Se interpreta bajo la mecánica newtoniana en marcos no inerciales: F_real + F_fict = m·a' (aceleración en el marco no inercial)."
    en: "Interpreted under Newtonian mechanics in non-inertial frames: F_real + F_fict = m·a' (acceleration in the non-inertial frame)."
  formulaConnection:
    es: "Conecta con F_fict = −m·a_ref (traslación), F_centrifuga = mω²r y F_Coriolis = −2m(Ω×v')."
    en: "Connects to F_fict = −m·a_ref (translation), F_centrifugal = mω²r and F_Coriolis = −2m(Ω×v')."
  readingFocus:
    es: leer F_fict = −m·a_ref y comprender que su origen es la aceleración del sistema de referencia, no una interacción real.
    en: "read F_fict = −m·a_ref and understand that its origin is the frame's acceleration, not a real interaction."
  agentHints:
    es:
      - "Las fuerzas ficticias solo existen en el marco de referencia no inercial: un observador inercial no las ve."
      - "No tienen par de reacción (tercera ley de Newton): no son fuerzas reales."
      - "El peso aparente en un ascensor = m·(g + a_ascensor): la sensación de mayor o menor peso es una fuerza ficticia."
    en:
      - "Fictitious forces only exist in the non-inertial reference frame: an inertial observer does not see them."
      - "They have no reaction pair (Newton's third law): they are not real forces."
      - "Apparent weight in an elevator = m·(g + a_elevator): the sensation of more or less weight is a fictitious force."
  commonMistakes:
    es:
      - Incluir fuerzas ficticias en el DCL del marco inercial.
      - Pensar que las fuerzas ficticias tienen par de reacción (tercera ley).
      - Confundir la fuerza centrífuga (ficticia) con la fuerza centrípeta (real).
    en:
      - Including fictitious forces in the FBD of the inertial frame.
      - Thinking fictitious forces have a reaction pair (third law).
      - Confusing centrifugal force (fictitious) with centripetal force (real).

dcl:
  title:
    es: DCL · Fuerzas Ficticias
    en: FBD · Fictitious Forces
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - "F_real (fuerzas reales: peso, normal, tensión…)"
      - F_fict = −m·a_ref (fuerza ficticia, opuesta a la aceleración del marco)
    en:
      - "F_real (real forces: weight, normal, tension…)"
      - F_fict = −m·a_ref (fictitious force, opposite to frame acceleration)
  object:
    es: objeto en reposo relativo al marco no inercial acelerado
    en: object at rest relative to the accelerated non-inertial frame
  freeBodyCondition:
    es: "En el marco no inercial: ΣF_real + F_fict = 0 (el objeto parece en equilibrio). En el marco inercial: ΣF_real = m·a."
    en: "In the non-inertial frame: ΣF_real + F_fict = 0 (object appears in equilibrium). In the inertial frame: ΣF_real = m·a."
  equilibriumCondition:
    es: El objeto parece en equilibrio en el marco no inercial porque F_fict compensa la fuerza neta real.
    en: The object appears in equilibrium in the non-inertial frame because F_fict compensates the net real force.
  netForce:
    es: "En el marco inercial: ΣF_real = m·a ≠ 0. En el no inercial: ΣF_aparente = ΣF_real + F_fict = 0."
    en: "In the inertial frame: ΣF_real = m·a ≠ 0. In the non-inertial: ΣF_apparent = ΣF_real + F_fict = 0."
  accelerationDirection:
    es: En el marco inercial, el objeto acelera. En el no inercial parece estacionario gracias a F_fict.
    en: In the inertial frame, the object accelerates. In the non-inertial it appears stationary due to F_fict.
  referenceFrameChoice:
    es: "Se pueden elegir ambos marcos: inercial (sin F_fict, con aceleración) o no inercial (con F_fict, sin aceleración aparente)."
    en: "Either frame can be chosen: inertial (without F_fict, with acceleration) or non-inertial (with F_fict, no apparent acceleration)."
  forceTypes:
    es:
      - F_real (todas las interacciones físicas reales)
      - F_fict = −m·a_ref (solo en marco no inercial)
    en:
      - F_real (all real physical interactions)
      - F_fict = −m·a_ref (only in non-inertial frame)
  signConvention:
    es: F_fict apunta en dirección −a_ref (opuesta a la aceleración del marco de referencia).
    en: "F_fict points in the −a_ref direction (opposite to the reference frame's acceleration)."
  relation:
    es: El DCL en el marco no inercial incluye F_fict = −m·a_ref junto con todas las fuerzas reales, resultando en equilibrio aparente.
    en: The FBD in the non-inertial frame includes F_fict = −m·a_ref alongside all real forces, resulting in apparent equilibrium.
  readingFocus:
    es: distinguir fuerzas reales (con par de reacción) de ficticias (sin par de reacción) e identificar el origen de cada una.
    en: distinguish real forces (with reaction pair) from fictitious ones (no reaction pair) and identify the origin of each.
  agentHints:
    es:
      - "F_fict no tiene par de reacción: distingue fuerzas reales de ficticias por este criterio."
      - "El mismo problema se puede resolver en el marco inercial (sin F_fict) o en el no inercial (con F_fict): ambos dan el mismo resultado físico."
      - "En el ascensor acelerado hacia arriba, F_fict apunta hacia abajo: el peso aparente aumenta."
    en:
      - "F_fict has no reaction pair: use this criterion to distinguish real from fictitious forces."
      - "The same problem can be solved in the inertial frame (no F_fict) or the non-inertial frame (with F_fict): both give the same physical result."
      - "In an elevator accelerating upward, F_fict points downward: apparent weight increases."
  commonMistakes:
    es:
      - Añadir F_fict al DCL del marco inercial.
      - Olvidar que F_fict no tiene par de reacción (tercera ley).
      - Resolver el mismo problema en ambos marcos a la vez, mezclando fuerzas ficticias y reales.
    en:
      - Adding F_fict to the FBD of the inertial frame.
      - Forgetting that F_fict has no reaction pair (third law).
      - Solving the same problem in both frames simultaneously, mixing fictitious and real forces.

svg:
  title:
    es: Escena SVG · Fuerzas Ficticias
    en: SVG Scene · Fictitious Forces
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: fuerzas_ficticias_scene
  sceneLabel:
    es: Marco inercial y no inercial con fuerzas reales y ficticia
    en: Inertial and non-inertial frame with real and fictitious forces
  objects:
    es:
      - objeto en el marco acelerado
      - vector a_ref del marco
      - F_fict = −m·a_ref
      - fuerzas reales (peso, normal, etc.)
    en:
      - object in accelerated frame
      - frame acceleration vector a_ref
      - F_fict = −m·a_ref
      - real forces (weight, normal, etc.)
  mainObject:
    es: objeto cuyo movimiento se analiza en el marco no inercial
    en: object whose motion is analysed in the non-inertial frame
  referenceFrame:
    es: marco de referencia no inercial (por ejemplo, ascensor o vehículo acelerado)
    en: non-inertial reference frame (e.g. elevator or accelerating vehicle)
  geometry:
    es: "La escena muestra los dos marcos superpuestos: inercial (laboratorio) y no inercial (vehículo). En el no inercial aparece F_fict opuesta a a_ref."
    en: "The scene shows the two frames superimposed: inertial (laboratory) and non-inertial (vehicle). In the non-inertial frame F_fict appears opposite to a_ref."
  interactions:
    es: Fuerzas reales presentes en ambos marcos. F_fict solo visible desde el marco no inercial.
    en: Real forces present in both frames. F_fict only visible from the non-inertial frame.
  modelElements:
    es:
      - F_real en el marco inercial
      - F_fict = −m·a_ref solo en el marco no inercial
      - "Equivalencia: F_real = m·a (inercial) ↔ F_real + F_fict = 0 (no inercial)"
    en:
      - F_real in the inertial frame
      - F_fict = −m·a_ref only in the non-inertial frame
      - "Equivalence: F_real = m·a (inertial) ↔ F_real + F_fict = 0 (non-inertial)"
  visualCues:
    es:
      - La flecha de F_fict está dibujada en trazo discontinuo para distinguirla de las reales.
      - La dirección de F_fict es opuesta a la aceleración del marco (a_ref).
      - En el marco inercial no aparece ninguna flecha de fuerza ficticia.
    en:
      - The F_fict arrow is drawn with a dashed line to distinguish it from real forces.
      - The direction of F_fict is opposite to the frame acceleration (a_ref).
      - In the inertial frame, no fictitious force arrow appears.
  scaleMeaning:
    es: Las longitudes de las flechas son proporcionales a las magnitudes de las fuerzas.
    en: Arrow lengths are proportional to force magnitudes.
  relation:
    es: La escena ilustra cómo las fuerzas ficticias aparecen solo en el marco no inercial para compensar la aceleración del marco.
    en: "The scene illustrates how fictitious forces appear only in the non-inertial frame to compensate for the frame's acceleration."
  physicalReading:
    es: Comparar las dos escenas (inercial y no inercial) para entender que la física es la misma pero la descripción cambia según el marco.
    en: Compare the two scenes (inertial and non-inertial) to understand that the physics is the same but the description changes with the frame.
  modelConnection:
    es: "Se interpreta bajo la equivalencia entre marcos: F_real = m·a (inercial) ↔ F_real + F_fict = 0 (no inercial)."
    en: "Interpreted under the frame equivalence: F_real = m·a (inertial) ↔ F_real + F_fict = 0 (non-inertial)."
  formulaConnection:
    es: Conecta con F_fict = −m·a_ref y con la equivalencia de resultados entre marcos.
    en: Connects to F_fict = −m·a_ref and the equivalence of results between frames.
  readingFocus:
    es: identificar el sistema no inercial y localizar la fuerza ficticia opuesta a la aceleración del sistema.
    en: "identify the non-inertial frame and locate the fictitious force opposite to the frame's acceleration."
  agentHints:
    es:
      - La escena inercial no tiene F_fict; la no inercial sí. Ambas son correctas para su marco.
      - "Ejemplos reales: ocupante en frenada brusca (F_fict hacia adelante), astronauta en cohete (F_fict hacia abajo)."
      - El principio de equivalencia de Einstein conecta la fuerza ficticia gravitacional con la gravedad real.
    en:
      - The inertial scene has no F_fict; the non-inertial one does. Both are correct for their frame.
      - "Real examples: passenger during sudden braking (F_fict forward), astronaut in rocket (F_fict downward)."
      - "Einstein's equivalence principle connects the gravitational fictitious force with real gravity."
  commonMistakes:
    es:
      - Dibujar F_fict en la misma dirección que a_ref (debe ser la opuesta).
      - Mostrar F_fict en el marco inercial.
      - No etiquetar F_fict claramente como fuerza ficticia.
    en:
      - Drawing F_fict in the same direction as a_ref (it must be opposite).
      - Showing F_fict in the inertial frame.
      - Not clearly labelling F_fict as a fictitious force.
