targets:
  F_fict:
    summary_rules:
    - id: F_fict_summary
      when: 'true'
      status: info
      text:
        es: F_fict resume una lectura fisica relevante del leaf.
        en: F_fict summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: F_fict_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que F_fict sea coherente con unidades y contexto.
        en: Check that F_fict is coherent with units and context.
    physical_reading_rules:
    - id: F_fict_physical
      when: 'true'
      status: info
      text:
        es: "F_fict no representa una interaccion nueva; representa la correccion que necesita el observador del marco acelerado para explicar por que el cuerpo parece ir en sentido opuesto a a_marco."
        en: "F_fict does not represent a new interaction; it is the correction required by the accelerated observer to explain why the body appears to move opposite to a_marco."
    model_validity_rules:
    - id: F_fict_validity
      when: 'true'
      status: ok
      text:
        es: F_fict solo es interpretable dentro del modelo elegido.
        en: F_fict is interpretable only inside the chosen model.
    graph_rules:
    - id: F_fict_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de F_fict.
        en: The graph must reflect the role of F_fict visually.
    likely_errors:
    - id: F_fict_warn
      when: 'true'
      status: warning
      text:
        es: No confundas F_fict con otra magnitud cercana del problema.
        en: Do not confuse F_fict with another nearby quantity in the problem.
    next_step_rules:
    - id: F_fict_next
      when: 'true'
      status: info
      text:
        es: Usa F_fict para enlazar con el siguiente paso de interpretacion.
        en: Use F_fict to connect with the next interpretation step.
