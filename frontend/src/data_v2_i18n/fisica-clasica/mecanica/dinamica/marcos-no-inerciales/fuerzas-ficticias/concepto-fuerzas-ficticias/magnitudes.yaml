version: 1
magnitudes:
- id: m
  symbol: m
  nombre:
    es: masa
    en: Mass
  descripcion:
    es: Masa del cuerpo. Escala linealmente la fuerza ficticia.
    en: Mass of the body. It scales the fictitious force linearly.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir m con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
- id: a_marco
  symbol: a_{marco}
  nombre:
    es: aceleracion_del_marco
    en: acceleration_of_the_frame
  descripcion:
    es: Aceleracion del sistema de referencia no inercial.
    en: Acceleration of the non-inertial reference frame.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir a_marco con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el sentido de la aceleracion del marco respecto al eje elegido.
      en: Positive or negative depending on the direction of the frame acceleration relative to the chosen axis.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica que el marco es inercial; la fuerza ficticia desaparece.
      en: Zero means the frame is inertial; the fictitious force vanishes.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_marco con una definicion estable antes de sustituir valores.
- id: F_fict
  symbol: F_{fict}
  nombre:
    es: fuerza_ficticia
    en: fictitious_force
  descripcion:
    es: Termino inercial que compensa el uso de un marco acelerado.
    en: Inertial term introduced to compensate for the use of an accelerated frame.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir F_fict con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo es siempre opuesto al de a_marco por definicion (F_fict = -m*a_marco). Un marco que acelera hacia la derecha produce una fuerza ficticia hacia la izquierda.
      en: The sign is always opposite to that of a_marco by definition (F_fict = -m*a_marco). A frame accelerating rightward produces a leftward fictitious force.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero cuando el marco es inercial (a_marco = 0).
      en: Zero when the frame is inertial (a_marco = 0).
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_fict con una definicion estable antes de sustituir valores.
- id: F_res
  symbol: F_{res}
  nombre:
    es: fuerza_real_resultante
    en: resultant_real_force
  descripcion:
    es: Suma de fuerzas de interaccion reales proyectadas en el eje de estudio.
    en: Sum of the real interaction forces projected onto the axis of analysis.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir F_res con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun la proyeccion de las fuerzas reales sobre el eje positivo elegido.
      en: Positive or negative according to the projection of real forces onto the chosen positive axis.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica equilibrio de fuerzas reales; la aceleracion relativa es entonces igual a -a_marco (puro efecto de marco).
      en: Zero indicates equilibrium of real forces; the relative acceleration then equals -a_marco (pure frame effect).
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_res con una definicion estable antes de sustituir valores.
- id: a_rel
  symbol: a_{rel}
  nombre:
    es: aceleracion_relativa
    en: relative_acceleration
  descripcion:
    es: Aceleracion observada dentro del marco no inercial.
    en: Acceleration observed inside the non-inertial frame.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir a_rel con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el eje elegido. Es la aceleracion que mediria un observador dentro del marco acelerado.
      en: Positive or negative along the chosen axis. It is the acceleration measured by an observer inside the accelerated frame.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica que el cuerpo esta en reposo dentro del marco no inercial, aunque puede estar acelerando en el marco inercial.
      en: Zero means the body is at rest within the non-inertial frame, even though it may be accelerating in the inertial frame.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_rel con una definicion estable antes de sustituir valores.
- id: a_in
  symbol: a_{in}
  nombre:
    es: aceleracion_inercial
    en: inertial_acceleration
  descripcion:
    es: Aceleracion del mismo cuerpo en un marco inercial.
    en: Acceleration of the same body measured in an inertial frame.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - concepto-fuerzas-ficticias
  common_mistake: Confundir a_in con otra magnitud cercana dentro de concepto fuerzas
    ficticias.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el eje elegido. Es la aceleracion absoluta, la que aparece en la Segunda Ley de Newton con solo fuerzas reales.
      en: Positive or negative along the chosen axis. It is the absolute acceleration appearing in Newton's Second Law with real forces only.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica que el cuerpo se mueve a velocidad constante en el marco inercial.
      en: Zero means the body moves at constant velocity in the inertial frame.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - concepto-fuerzas-ficticias
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_in con una definicion estable antes de sustituir valores.
