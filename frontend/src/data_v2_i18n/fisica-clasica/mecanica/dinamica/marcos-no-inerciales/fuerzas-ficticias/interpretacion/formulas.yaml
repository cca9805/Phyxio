    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - interpretacion
  interpretation_tags:
  - interpretacion
  result_semantics:
    target: F_res
    meaning: Resulta util para interpretar F_res en el contexto del leaf.
  domain_checks:
