version: 1
formulas:
- id: transformacion_aceleraciones
  title:
    es: Transformacion de aceleraciones
    en: Acceleration transformation
  equation: a_in = a_rel + a_marco
  latex: a_{in}=a_{rel}+a_{marco}
  rearrangements:
  - target: a_in
    equation: a_in = a_rel + a_marco
    latex: a_{in}=a_{rel}+a_{marco}
    constraints: []
  - target: a_rel
    equation: a_rel = a_in - a_marco
    latex: a_{rel}=a_{in}-a_{marco}
    constraints: []
  - target: a_marco
    equation: a_marco = a_in - a_rel
    latex: a_{marco}=a_{in}-a_{rel}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en interpretacion.
    en: Physical relation used in the interpretation of fictitious forces.
  constraints:
  - expr: 'true'
    message:
      es: Aplicar solo dentro del modelo descrito.
      en: Apply only within the described model.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - interpretacion
  interpretation_tags:
  - interpretacion
  result_semantics:
    target: a_in
    meaning: Resulta util para interpretar a_in en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: fuerza_ficticia_interpretacion
  title:
    es: Fuerza ficticia por interpretacion de marco
    en: Fictitious force from frame interpretation
  equation: F_fict = -m*a_marco
  latex: F_{fict}=-m\,a_{marco}
  rearrangements:
  - target: F_fict
    equation: F_fict = -m*a_marco
    latex: F_{fict}=-m\,a_{marco}
    constraints: []
  - target: a_marco
    equation: a_marco = -F_fict/m
    latex: a_{marco}=-\frac{F_{fict}}{m}
    constraints: []
  - target: m
    equation: m = -F_fict/a_marco
    latex: m=-\frac{F_{fict}}{a_{marco}}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
    es: Relacion fisica usada en interpretacion.
    en: Physical relation used in the interpretation of fictitious forces.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser positiva.
      en: The mass must be positive.
  validity:
    es: Valida dentro del dominio de aplicacion del modelo usado.
    en: Valida dentro del dominio de aplicacion del modelo usado.
  dimension_check: Comprobar unidades antes de interpretar.
  calculable: false
  motivo_no_calculable: null
  used_in:
  - interpretacion
  interpretation_tags:
  - interpretacion
  result_semantics:
    target: F_fict
    meaning: Resulta util para interpretar F_fict en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: equivalencia_dinamica
  title:
    es: Balance dinamico en marco no inercial
    en: Dynamical balance in a non-inertial frame
  equation: F_res + F_fict = m*a_rel
  latex: F_{res}+F_{fict}=m\,a_{rel}
  rearrangements:
  - target: F_res
    equation: F_res = m*a_rel - F_fict
    latex: F_{res}=m\,a_{rel}-F_{fict}
    constraints: []
  - target: F_fict
    equation: F_fict = m*a_rel - F_res
    latex: F_{fict}=m\,a_{rel}-F_{res}
    constraints: []
  - target: a_rel
    equation: a_rel = (F_res + F_fict)/m
    latex: a_{rel}=\frac{F_{res}+F_{fict}}{m}
    constraints: []
  category: operative
  relation_type: derived_relation
  physical_meaning:
