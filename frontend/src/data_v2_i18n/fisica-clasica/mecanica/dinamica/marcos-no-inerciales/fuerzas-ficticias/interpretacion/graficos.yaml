version: "1.0"
leaf: "interpretacion"

dcl:
  title:
    es: DCL · Interpretación de Fuerzas Ficticias
    en: FBD · Interpretation of Fictitious Forces
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of the force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of the force diagram
  forces:
    es:
      - F_real (peso, normal, tensión, rozamiento)
      - "F_fict (centrífuga, Coriolis o traslacional: solo en marco no inercial)"
    en:
      - F_real (weight, normal, tension, friction)
      - "F_fict (centrifugal, Coriolis, or translational: only in non-inertial frame)"
  object:
    es: objeto en el sistema no inercial (rotante o acelerado)
    en: object in the non-inertial system (rotating or accelerating)
  freeBodyCondition:
    es: El DCL no inercial añade F_fict a las fuerzas reales. La suma ΣF_real + F_fict permite tratar el sistema como si fuera inercial.
    en: The non-inertial FBD adds F_fict to the real forces. The sum ΣF_real + F_fict allows treating the system as if it were inertial.
  equilibriumCondition:
    es: "Aparente equilibrio en el marco no inercial: ΣF_real + F_fict = 0."
    en: "Apparent equilibrium in the non-inertial frame: ΣF_real + F_fict = 0."
  netForce:
    es: "En el marco inercial: ΣF_real = m·a. En el no inercial: ΣF_aparente = 0 (con F_fict incluida)."
    en: "In the inertial frame: ΣF_real = m·a. In the non-inertial: ΣF_apparent = 0 (with F_fict included)."
  accelerationDirection:
    es: En el marco inercial el objeto acelera. En el marco no inercial parece no acelerado gracias a F_fict.
    en: In the inertial frame the object accelerates. In the non-inertial frame it appears unaccelerated due to F_fict.
  referenceFrameChoice:
    es: "Elegir el marco según la conveniencia del problema: marco inercial (sin F_fict) o no inercial (con F_fict)."
    en: "Choose the frame according to problem convenience: inertial (without F_fict) or non-inertial (with F_fict)."
  forceTypes:
    es:
      - F_real (todas las interacciones físicas reales)
      - F_centrifuga = mω²r (marco rotante)
      - "F_Coriolis = −2m(Ω×v') (marco rotante)"
      - F_traslacional = −m·a_ref (marco en traslación acelerada)
    en:
      - F_real (all real physical interactions)
      - F_centrifugal = mω²r (rotating frame)
      - "F_Coriolis = −2m(Ω×v') (rotating frame)"
      - F_translational = −m·a_ref (translationally accelerating frame)
  signConvention:
    es: F_fict apunta en la dirección opuesta a la aceleración del marco (traslación) o radialmente hacia afuera (rotación).
    en: F_fict points opposite to the frame acceleration (translation) or radially outward (rotation).
  relation:
    es: El DCL de interpretación compara el marco inercial y el no inercial lado a lado para identificar qué fuerzas son reales y cuáles ficticias.
    en: The interpretation FBD compares the inertial and non-inertial frames side by side to identify which forces are real and which are fictitious.
  readingFocus:
    es: comparar el DCL inercial (sin F_fict, con aceleración) y el no inercial (con F_fict, sin aceleración aparente) para identificar las fuerzas ficticias añadidas.
    en: compare the inertial FBD (no F_fict, with acceleration) and the non-inertial FBD (with F_fict, no apparent acceleration) to identify the added fictitious forces.
  agentHints:
    es:
      - "La elección del marco no cambia la física: ambas formulaciones predicen el mismo movimiento observable."
      - El marco no inercial simplifica el análisis cuando el observador está fijo en el sistema acelerado.
      - "Las fuerzas ficticias son proporcionales a la masa: este es el principio de equivalencia de Einstein."
    en:
      - "The choice of frame does not change the physics: both formulations predict the same observable motion."
      - The non-inertial frame simplifies analysis when the observer is fixed in the accelerated system.
      - "Fictitious forces are proportional to mass: this is Einstein's equivalence principle."
  commonMistakes:
    es:
      - Usar fuerzas ficticias en el marco inercial.
      - Resolver el mismo problema en ambos marcos simultáneamente.
      - Olvidar que F_fict no tiene par de reacción (tercera ley de Newton).
    en:
      - Using fictitious forces in the inertial frame.
      - Solving the same problem in both frames simultaneously.
      - "Forgetting that F_fict has no reaction pair (Newton's third law)."

svg:
  title:
    es: Escena SVG · Interpretación de Fuerzas Ficticias
    en: SVG Scene · Interpretation of Fictitious Forces
  xAxis:
    es: posición horizontal de la escena
    en: horizontal position in the scene
  yAxis:
    es: posición vertical de la escena
    en: vertical position in the scene
  sceneId: interpretacion_ficticias_scene
  sceneLabel:
    es: "Comparativa visual: marco inercial vs no inercial con fuerzas ficticias"
    en: "Visual comparison: inertial vs non-inertial frame with fictitious forces"
  objects:
    es:
      - observador inercial (laboratorio)
      - observador no inercial (en el sistema acelerado)
      - objeto analizado
      - fuerzas reales (en ambos marcos)
      - F_fict (solo en marco no inercial)
    en:
      - inertial observer (laboratory)
      - non-inertial observer (in the accelerated system)
      - analysed object
      - real forces (in both frames)
      - F_fict (only in non-inertial frame)
  mainObject:
    es: objeto cuyo movimiento se interpreta desde ambos marcos de referencia
    en: object whose motion is interpreted from both reference frames
  referenceFrame:
    es: "comparativa: marco inercial (laboratorio) y marco no inercial (sistema acelerado)"
    en: "comparison: inertial frame (laboratory) and non-inertial frame (accelerated system)"
  geometry:
    es: "La escena muestra dos paneles: izquierdo con el marco inercial (sin F_fict) y derecho con el marco no inercial (con F_fict). Las fuerzas reales son idénticas en ambos."
    en: "The scene shows two panels: left with the inertial frame (no F_fict) and right with the non-inertial frame (with F_fict). Real forces are identical in both."
  interactions:
    es: "En el marco inercial: F_real = m·a. En el no inercial: F_real + F_fict = 0."
    en: "In the inertial frame: F_real = m·a. In the non-inertial: F_real + F_fict = 0."
  modelElements:
    es:
      - F_real (idéntica en ambos marcos)
      - F_fict = −m·a_ref (solo en marco no inercial)
      - a_ref (aceleración del marco no inercial)
    en:
      - F_real (identical in both frames)
      - F_fict = −m·a_ref (only in non-inertial frame)
      - a_ref (non-inertial frame acceleration)
  visualCues:
    es:
      - Las fuerzas reales se dibujan igual en ambos marcos.
      - F_fict solo aparece en el panel del marco no inercial.
      - El objeto parece acelerado en el inercial y estático en el no inercial.
    en:
      - Real forces are drawn the same in both frames.
      - F_fict only appears in the non-inertial frame panel.
      - The object appears accelerated in the inertial frame and static in the non-inertial one.
  scaleMeaning:
    es: Las flechas tienen la misma escala en ambos marcos para comparar directamente las magnitudes.
    en: Arrows have the same scale in both frames for direct comparison of magnitudes.
  relation:
    es: La escena ilustra visualmente la diferencia entre el marco inercial y el no inercial con las fuerzas ficticias presentes.
    en: The scene visually illustrates the difference between the inertial and non-inertial frames with the fictitious forces present.
  physicalReading:
    es: "Identificar ambos marcos: en el inercial el objeto acelera (F_real ≠ 0); en el no inercial parece estático (F_real + F_fict = 0)."
    en: "Identify both frames: in the inertial the object accelerates (F_real ≠ 0); in the non-inertial it appears static (F_real + F_fict = 0)."
  modelConnection:
    es: "Se interpreta bajo la equivalencia newtoniana entre marcos: ambas descripciones predicen el mismo movimiento observable."
    en: "Interpreted under Newtonian frame equivalence: both descriptions predict the same observable motion."
  formulaConnection:
    es: Conecta con F_real = m·a (marco inercial) y F_real + F_fict = 0 (marco no inercial).
    en: Connects to F_real = m·a (inertial frame) and F_real + F_fict = 0 (non-inertial frame).
  readingFocus:
    es: identificar ambos marcos de referencia y comparar qué fuerzas aparecen en cada uno para entender la naturaleza de las fuerzas ficticias.
    en: identify both reference frames and compare which forces appear in each to understand the nature of fictitious forces.
  agentHints:
    es:
      - La comparativa visual es la mejor herramienta para entender que F_fict es un artefacto del marco, no una fuerza real.
      - "Ambas descripciones son equivalentes: elija la que simplifique más el cálculo."
      - "El principio de equivalencia: no se puede distinguir localmente entre gravedad real y fuerza ficticia gravitacional."
    en:
      - The visual comparison is the best tool to understand that F_fict is a frame artefact, not a real force.
      - "Both descriptions are equivalent: choose the one that simplifies the calculation most."
      - "The equivalence principle: locally, real gravity and the gravitational fictitious force cannot be distinguished."
  commonMistakes:
    es:
      - Añadir F_fict al panel del marco inercial.
      - Pensar que el objeto tiene diferente masa o diferente estado real en cada marco.
      - No etiquetar claramente cuál panel corresponde a cada marco de referencia.
    en:
      - Adding F_fict to the inertial frame panel.
      - Thinking the object has a different mass or real state in each frame.
      - Not clearly labelling which panel corresponds to each reference frame.
