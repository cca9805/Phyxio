version: 2
id: interpretacion-interpretacion
leaf_id: interpretacion
nombre:
  es: Interpretacion de Interpretacion
  en: Interpretation of Interpretation of Fictitious Forces
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: fuerzas-ficticias
  ruta_relativa: fisica-clasica/mecanica/dinamica/marcos-no-inerciales/fuerzas-ficticias/interpretacion
dependencies:
  formulas:
  - transformacion_aceleraciones
  - fuerza_ficticia_interpretacion
  - equivalencia_dinamica
  - criterio_de_marco_conceptual
  magnitudes:
  - m
  - a_in
  - a_rel
  - a_marco
  - F_res
  - F_fict
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  a_in:
    summary_rules:
    - id: a_in_summary
      when: 'true'
      status: info
      text:
        es: a_in resume una lectura fisica relevante del leaf.
        en: a_in summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: a_in_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que a_in sea coherente con unidades y contexto.
        en: Check that a_in is coherent with units and context.
    physical_reading_rules:
    - id: a_in_physical
      when: 'true'
      status: info
      text:
        es: "a_in es la aceleracion que debe quedar asociada solo a fuerzas reales; si aparece mezclada con F_fict, el analisis ha perdido la referencia de marco."
        en: "a_in is the acceleration that must remain associated only with real forces; if it appears mixed with F_fict, the analysis has lost frame consistency."
    model_validity_rules:
    - id: a_in_validity
      when: 'true'
      status: ok
      text:
        es: a_in solo es interpretable dentro del modelo elegido.
        en: a_in is interpretable only inside the chosen model.
    graph_rules:
    - id: a_in_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de a_in.
        en: The graph must reflect the role of a_in visually.
    likely_errors:
    - id: a_in_warn
      when: 'true'
      status: warning
      text:
        es: No confundas a_in con otra magnitud cercana del problema.
        en: Do not confuse a_in with another nearby quantity in the problem.
    next_step_rules:
    - id: a_in_next
      when: 'true'
      status: info
      text:
        es: Usa a_in para enlazar con el siguiente paso de interpretacion.
        en: Use a_in to connect with the next interpretation step.
