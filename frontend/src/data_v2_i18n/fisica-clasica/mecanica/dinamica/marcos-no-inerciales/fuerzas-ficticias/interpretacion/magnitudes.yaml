version: 1
magnitudes:
- id: m
  symbol: m
  nombre:
    es: masa
    en: Mass
  descripcion:
    es: Masa del objeto en estudio.
    en: Mass of the object under study.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir m con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar m con una definicion estable antes de sustituir valores.
- id: a_in
  symbol: a_{in}
  nombre:
    es: aceleracion_inercial
    en: inertial_acceleration
  descripcion:
    es: Aceleracion observada desde un marco inercial.
    en: Acceleration observed from an inertial frame.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir a_in con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el eje elegido. Es la aceleracion absoluta; usarla en el marco no inercial sin correccion es el error de mezcla de marcos mas frecuente.
      en: Positive or negative along the chosen axis. It is the absolute acceleration; using it in the non-inertial frame without correction is the most common mixed-frame error.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero implica que el cuerpo se mueve a velocidad constante en el marco inercial.
      en: Zero means constant velocity in the inertial frame.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_in con una definicion estable antes de sustituir valores.
- id: a_rel
  symbol: a_{rel}
  nombre:
    es: aceleracion_relativa
    en: relative_acceleration
  descripcion:
    es: Aceleracion observada desde el marco no inercial.
    en: Acceleration observed from the non-inertial frame.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir a_rel con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: "Positivo o negativo segun el eje. Criterio de interpretacion clave: si a_rel y a_marco tienen el mismo signo, la fuerza ficticia atenua la aceleracion relativa."
      en: "Positive or negative along the axis. Key interpretation criterion: if a_rel and a_marco share the same sign, the fictitious force attenuates the relative acceleration."
  zero_behavior:
    allowed: true
    meaning:
      es: Cero significa que el cuerpo esta en reposo dentro del marco no inercial, con F_res = -F_fict = m*a_marco.
      en: Zero means the body is at rest in the non-inertial frame, with F_res = -F_fict = m*a_marco.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_rel con una definicion estable antes de sustituir valores.
- id: a_marco
  symbol: a_{marco}
  nombre:
    es: aceleracion_del_marco
    en: acceleration_of_the_frame
  descripcion:
    es: Aceleracion del propio sistema de referencia.
    en: Acceleration of the reference frame itself.
  unidad_si: m/s^2
  dimension: LT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir a_marco con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el eje. Determina directamente el signo y modulo de F_fict; es el parametro que define si el marco es inercial o no.
      en: Positive or negative along the axis. It directly determines the sign and magnitude of F_fict; it is the parameter that defines whether the frame is inertial or not.
  zero_behavior:
    allowed: true
    meaning:
      es: "Cero confirma que el marco es inercial: F_fict = 0 y a_in = a_rel."
      en: "Zero confirms the frame is inertial: F_fict = 0 and a_in = a_rel."
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar a_marco con una definicion estable antes de sustituir valores.
- id: F_res
  symbol: F_{res}
  nombre:
    es: fuerza_real_resultante
    en: resultant_real_force
  descripcion:
    es: Suma de interacciones fisicas reales en el eje analizado.
    en: Sum of the real physical interactions along the analyzed axis.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir F_res con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo o negativo segun el eje. Solo incluye fuerzas que corresponden a interacciones fisicas reales (gravedad, normal, tension, friccion); F_fict NO forma parte de F_res.
      en: Positive or negative along the axis. Includes only forces corresponding to real physical interactions (gravity, normal, tension, friction); F_fict is NOT part of F_res.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero cuando las fuerzas reales se equilibran; en el marco no inercial el cuerpo aun puede tener a_rel = -a_marco.
      en: Zero when real forces balance; in the non-inertial frame the body may still have a_rel = -a_marco.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_res con una definicion estable antes de sustituir valores.
- id: F_fict
  symbol: F_{fict}
  nombre:
    es: fuerza_ficticia
    en: fictitious_force
  descripcion:
    es: Termino inercial de correccion al usar marco acelerado.
    en: Inertial correction term introduced when an accelerated frame is used.
  unidad_si: N
  dimension: LMT^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - interpretacion
  common_mistake: Confundir F_fict con otra magnitud cercana dentro de interpretacion.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: "Signo opuesto al de a_marco por definicion. Criterio de interpretacion: F_fict siempre apunta en la direccion en que el observador del marco no inercial ve que los objetos tienden a moverse cuando no hay fuerzas reales."
      en: "Sign opposite to a_marco by definition. Interpretation criterion: F_fict always points in the direction in which the non-inertial observer sees objects tend to move when no real forces act."
  zero_behavior:
    allowed: true
    meaning:
      es: Cero solo en marco inercial. Si F_fict = 0 pero a_marco != 0, hay un error de modelo.
      en: Zero only in an inertial frame. If F_fict = 0 but a_marco != 0, there is a model error.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - interpretacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar F_fict con una definicion estable antes de sustituir valores.
