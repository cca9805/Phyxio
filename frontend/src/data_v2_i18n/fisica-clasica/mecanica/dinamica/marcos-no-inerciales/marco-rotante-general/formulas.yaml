version: 5
topic:
  id: marco-rotante-general
  title:
    es: Marco rotante general
    en: General Rotating Frame
variables:
- id: a_abs
  symbol: \vec a
  name:
    es: aceleracion absoluta
    en: absolute acceleration
  si_unit: m/s^2
- id: a_rel
  symbol: \vec a_{rel}
  name:
    es: aceleracion relativa
    en: relative acceleration
  si_unit: m/s^2
- id: a_O
  symbol: \vec a_O
  name:
    es: aceleracion del origen
    en: origin acceleration
  si_unit: m/s^2
- id: Omega
  symbol: \vec\Omega
  name:
    es: velocidad angular del marco
    en: frame angular velocity
  si_unit: rad/s
- id: alpha
  symbol: \dot{\vec\Omega}
  name:
    es: aceleracion angular del marco
    en: frame angular acceleration
  si_unit: rad/s^2
- id: r
  symbol: \vec r
  name:
    es: posicion relativa
    en: relative position
  si_unit: m
- id: v_rel
  symbol: \vec v_{rel}
  name:
    es: velocidad relativa
    en: relative velocity
  si_unit: m/s
- id: F_E
  symbol: \vec F_E
  name:
    es: fuerza de Euler
    en: Euler force
  si_unit: N
- id: m
  symbol: m
  name:
    es: masa
    en: mass
  si_unit: kg
formulas:
- id: aceleracion_rotante_general
  title:
    es: Aceleracion en marco rotante
    en: Aceleracion en marco rotante
  equation: a_abs=a_abs
  latex: \vec a=\vec a_O+\vec a_{rel}+2\vec\Omega\times\vec v_{rel}+\vec\Omega\times(\vec\Omega\times\vec r)+\dot{\vec\Omega}\times\vec r
  category: fundamental
  relation_type: model_relation
  physical_meaning:
    es: Relacion nuclear del leaf; vincula magnitudes medibles con una decision fisica sobre regimen, validez o reduccion del modelo.
    en: Core relation of the leaf; it links measurable quantities to a physical decision about regime, validity, or model reduction.
  constraints: []
  validity:
    es: Usar solo si las magnitudes pertenecen al mismo sistema, las unidades son coherentes y las hipotesis del leaf siguen dominando.
    en: Use only when the quantities belong to the same system, units are coherent, and the leaf assumptions still dominate.
  dimension_check: Debe conservar coherencia dimensional con las magnitudes definidas.
  calculable: true
  motivo_no_calculable: null
  used_in:
  - lectura_fisica_del_leaf
  interpretation_tags:
  - mecanica-avanzada
  - modelo
  result_semantics:
    target: a_abs
    meaning: Permite interpretar el regimen fisico del sistema.
  domain_checks:
  - expr: 'true'
    message:
      es: Comprueba que las hipotesis del modelo son aplicables.
      en: Check that model assumptions apply.
  coherence_checks:
  - expr: 'true'
    message:
      es: Verifica signos, unidades y dominio antes de interpretar.
      en: Check signs, units, and domain before interpretation.
  graph_implications: Sin grafico declarado; la lectura se apoya en estructura, unidades y limites.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Explica la lectura fisica antes de operar algebraicamente.
      en: Explain the physical reading before algebraic manipulation.
  rearrangements:
  - target: a_abs
    equation: a_abs=a_abs
    latex: \vec a=\vec a_O+\vec a_{rel}+2\vec\Omega\times\vec v_{rel}+\vec\Omega\times(\vec\Omega\times\vec r)+\dot{\vec\Omega}\times\vec r
