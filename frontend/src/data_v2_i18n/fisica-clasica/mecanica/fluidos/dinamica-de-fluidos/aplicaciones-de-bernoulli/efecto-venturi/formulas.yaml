version: 1
formulas:
- id: continuity_venturi
  title:
    es: Ecuación de continuidad en Venturi
    en: Continuity equation in Venturi
  equation: A_1 * v_1 = A_2 * v_2
  latex: A_1 v_1 = A_2 v_2
  rearrangements:
  - id: v2_from_v1
    equation: v_2 = v_1 * (A_1 / A_2)
    latex: v_2 = v_1 \left(\frac{A_1}{A_2}\right)
  category: conservation_law
  relation_type: proportional
  physical_meaning:
    es: Conservación de la masa en un fluido incompresible; al reducir el área, la velocidad debe aumentar proporcionalmente.
    en: Conservation of mass in an incompressible fluid; when area is reduced, velocity must increase proportionally.
  constraints:
  - Incompressible fluid (rho = const)
  - Steady flow
  validity:
    es: Válida para fluidos donde los efectos de compresibilidad son despreciables (Mach < 0.3).
    en: Valid for fluids where compressibility effects are negligible (Mach < 0.3).
  dimension_check: "[L^2] * [L/T] = [L^3/T] (Caudal)"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - efecto-venturi
  interpretation_tags:
  - mass_conservation
  - flow_rate
  result_semantics:
    es: El resultado es el caudal volumétrico constante en todo el tubo.
    en: The result is the constant volumetric flow rate throughout the tube.
  domain_checks:
    A1: "> 0"
    A2: "> 0"
    v1: ">= 0"
  coherence_checks:
    v2_vs_v1: "v2 > v1 if A2 < A1"
  graph_implications:
    es: Define la pendiente de la relación entre velocidades.
    en: Defines the slope of the relationship between velocities.
  pedagogical_triggers:
    es: ¿Por qué no puede 'amontonarse' el fluido en el estrechamiento?
    en: Why can't the fluid 'pile up' in the constriction?
- id: bernoulli_venturi
  title:
    es: Ecuación de Bernoulli (forma Venturi)
    en: Bernoulli's equation (Venturi form)
  equation: p_1 + 0.5 * rho * v_1^2 = p_2 + 0.5 * rho * v_2^2
  latex: p_1 + \frac{1}{2}\rho v_1^2 = p_2 + \frac{1}{2}\rho v_2^2
  rearrangements: []
  category: energy_balance
  relation_type: quadratic
  physical_meaning:
    es: Conservación de la energía mecánica; el aumento de energía cinética se compensa con una caída de energía de presión.
    en: Conservation of mechanical energy; the increase in kinetic energy is compensated by a drop in pressure energy.
  constraints:
  - Horizontal tube (no z changes)
  - Ideal fluid (no friction)
  validity:
    es: Aplicable cuando las pérdidas por fricción son pequeñas frente a los cambios de presión dinámica.
    en: Applicable when friction losses are small compared to dynamic pressure changes.
  dimension_check: "[Pa] + [kg/m^3] * [m^2/s^2] = [Pa] + [Pa]"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - efecto-venturi
  interpretation_tags:
  - energy_conservation
  - pressure_drop
  result_semantics:
    es: Relaciona la caída de presión con la diferencia de cuadrados de velocidades.
    en: Relates the pressure drop to the difference of squared velocities.
  domain_checks:
    rho: "> 0"
    v2: ">= v1"
  coherence_checks:
    p2_vs_p1: "p2 < p1 if v2 > v1"
  graph_implications:
    es: Genera la parábola de caída de presión respecto a la velocidad.
    en: Generates the pressure drop parabola with respect to velocity.
  pedagogical_triggers:
    es: ¿A dónde va la energía que 'pierde' la presión?
    en: Where does the energy 'lost' by pressure go?
- id: dp_venturi
  title:
    es: Caída de presión de Venturi
    en: Venturi pressure drop
  equation: dp = 0.5 * rho * v_1^2 * ((A1 / A2)^2 - 1)
  latex: \Delta p = \frac{1}{2}\rho v_1^2 \left[ \left(\frac{A_1}{A_2}\right)^2 - 1 \right]
  rearrangements: []
  category: performance_metric
  relation_type: quadratic
  physical_meaning:
    es: Cuantifica la diferencia de presión generada por el estrechamiento en función de la velocidad de entrada.
    en: Quantifies the pressure difference generated by the narrowing as a function of the inlet velocity.
  constraints:
  - Ideal fluid
  - Horizontal flow
  validity:
    es: Válida para dimensionar sensores de caudal basados en presión diferencial.
    en: Valid for sizing flow sensors based on differential pressure.
  dimension_check: "[kg/m^3] * [m^2/s^2] = [Pa]"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - efecto-venturi
  interpretation_tags:
  - flow_measurement
  - suction
  result_semantics:
    es: El resultado es la caída de presión que se mediría en un manómetro.
    en: The result is the pressure drop that would be measured on a manometer.
  domain_checks:
    A1: "> A2"
    v1: "> 0"
  coherence_checks:
    dp_vs_A2: "dp increases when A2 decreases"
  graph_implications:
    es: Define la curva principal mostrada en el gráfico Coord.
    en: Defines the main curve shown in the Coord graph.
  pedagogical_triggers:
    es: ¿Cómo afecta la densidad del fluido a la caída de presión?
    en: How does the fluid density affect the pressure drop?
