version: "1.0"
leaf: "efecto-venturi"

coord:
  title:
    es: Gráfica Coord · Efecto Venturi
    en: Coord Graph · Venturi Effect
  xAxis:
    es: posición x en la tubería (m)
    en: position x in the pipe (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: x
  yMagnitude: p
  relation:
    es: "Venturi: p₁ − p₂ = ½ρ(v₂² − v₁²). En el estrechamiento: v↑, p↓. Q = A₂·√(2Δp/ρ(1−(A₂/A₁)²))."
    en: "Venturi: p₁ − p₂ = ½ρ(v₂² − v₁²). At the throat: v↑, p↓. Q = A₂·√(2Δp/ρ(1−(A₂/A₁)²))."
  physicalReading:
    es: La caída de presión en el estrechamiento es proporcional al cuadrado de la velocidad. Se usa para medir caudales.
    en: The pressure drop at the throat is proportional to the square of velocity. Used to measure flow rates.
  slopeMeaning:
    es: "dp/dx: gradiente de presión. Negativo en la convergencia; positivo en la divergencia."
    en: "dp/dx: pressure gradient. Negative in the convergence; positive in divergence."
  interceptMeaning:
    es: "p₁: presión aguas arriba."
    en: "p₁: upstream pressure."
  curvatureMeaning:
    es: Caída brusca en el estrechamiento y recuperación parcial aguas abajo.
    en: Sharp drop at the throat and partial recovery downstream.
  signMeaning:
    es: "Δp = p₁ − p₂ > 0: la presión cae en el estrechamiento."
    en: "Δp = p₁ − p₂ > 0: pressure drops at the throat."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Flujo incompresible, Re > 4000 (turbulento). Coeficiente de descarga Cd ≈ 0.98."
    en: "Incompressible flow, Re > 4000 (turbulent). Discharge coefficient Cd ≈ 0.98."
  modelConnection:
    es: "Efecto Venturi: aplicación de Bernoulli para medir caudal."
    en: "Venturi effect: application of Bernoulli to measure flow rate."
  formulaConnection:
    es: Δp = ½ρ(v₂² − v₁²), Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²)).
    en: Δp = ½ρ(v₂² − v₁²), Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²)).
  readingFocus:
    es: leer Δp entre aguas arriba y la garganta para calcular Q.
    en: read Δp between upstream and throat to compute Q.
  agentHints:
    es:
      - Δp = p₁ − p₂ = ½ρ(v₂² − v₁²).
      - Q ∝ √Δp.
      - Cd ≈ 0.98 (venturímetro comercial).
    en:
      - Δp = p₁ − p₂ = ½ρ(v₂² − v₁²).
      - Q ∝ √Δp.
      - Cd ≈ 0.98 (commercial venturimeter).
  commonMistakes:
    es:
      - Olvidar la ecuación de continuidad para hallar v₂.
      - No usar Cd en la fórmula real.
      - Aplicar a flujos compresibles.
    en:
      - Forgetting continuity to find v₂.
      - Not using Cd in the real formula.
      - Applying to compressible flows.

svg:
  title:
    es: Escena SVG · Efecto Venturi
    en: SVG Scene · Venturi Effect
  sceneId: efecto_venturi
  sceneLabel:
    es: Tubo Venturi con garganta y manómetros diferencial
    en: Venturi tube with throat and differential manometer
  objects:
    es:
      - sección aguas arriba A₁
      - garganta A₂
      - sección aguas abajo A₃
      - manómetro diferencial Δp
      - flechas de velocidad
    en:
      - upstream section A₁
      - throat A₂
      - downstream section A₃
      - differential manometer Δp
      - velocity arrows
  mainObject:
    es: tubo Venturi
    en: Venturi tube
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Tubería convergente (A₁→A₂) seguida de divergente (A₂→A₃). En la garganta: v máxima, p mínima."
    en: "Converging pipe (A₁→A₂) followed by diverging (A₂→A₃). At throat: maximum v, minimum p."
  interactions:
    es: "Bernoulli: p₁ + ½ρv₁² = p₂ + ½ρv₂². Continuidad: A₁v₁ = A₂v₂."
    en: "Bernoulli: p₁ + ½ρv₁² = p₂ + ½ρv₂². Continuity: A₁v₁ = A₂v₂."
  modelElements:
    es:
      - Δp = ½ρ(v₂² − v₁²)
      - Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²))
      - A₁v₁ = A₂v₂
    en:
      - Δp = ½ρ(v₂² − v₁²)
      - Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²))
      - A₁v₁ = A₂v₂
  visualCues:
    es:
      - "Garganta: flechas largas (v₂ max)."
      - "Manómetro: Δh = Δp/(ρ_man·g)."
      - Recuperación parcial de presión aguas abajo.
    en:
      - "Throat: long arrows (v₂ max)."
      - "Manometer: Δh = Δp/(ρ_man·g)."
      - Partial pressure recovery downstream.
  scaleMeaning:
    es: Longitud de flechas ∝ v.
    en: Arrow length ∝ v.
  relation:
    es: "Venturi: Bernoulli + continuidad para medir Q."
    en: "Venturi: Bernoulli + continuity to measure Q."
  physicalReading:
    es: Leer Δp en el manómetro diferencial para calcular Q mediante la fórmula del venturímetro.
    en: Read Δp on the differential manometer to compute Q using the venturimeter formula.
  modelConnection:
    es: "Medición de caudal: venturímetro."
    en: "Flow measurement: venturimeter."
  formulaConnection:
    es: Δp = ½ρ(v₂² − v₁²), Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²)).
    en: Δp = ½ρ(v₂² − v₁²), Q = Cd·A₂·√(2Δp/ρ(1−(A₂/A₁)²)).
  readingFocus:
    es: leer Δp y calcular Q con la fórmula del venturímetro.
    en: read Δp and compute Q with the venturimeter formula.
  agentHints:
    es:
      - "Garganta: p min, v max."
      - Q ∝ √Δp.
      - Cd corrige pérdidas reales.
    en:
      - "Throat: p min, v max."
      - Q ∝ √Δp.
      - Cd corrects real losses.
  commonMistakes:
    es:
      - Olvidar la continuidad.
      - No usar Cd.
      - Confundir Δp con la presión absoluta.
    en:
      - Forgetting continuity.
      - Not using Cd.
      - Confusing Δp with absolute pressure.
