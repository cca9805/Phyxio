formulas:
- id: sustentacion_general
  title:
    es: Fuerza de sustentación global
    en: Global lift force
  equation: L = 0.5*rho*v^2*S*C_L
  latex: L = \frac{1}{2}\rho v^2 S C_L
  rearrangements:
  - target: L
    equation: L = 0.5*rho*v^2*S*C_L
    latex: L = \frac{1}{2}\rho v^2 S C_L
  category: fundamental
  relation_type: constitutive_relation
  physical_meaning:
    es: Relaciona densidad, velocidad, área y coeficiente con la fuerza de sustentación
      total.
    en: Relates density, speed, area and coefficient to total lift force.
  constraints:
  - flujo estacionario
  - régimen subsonico bajo
  - perfil antes de pérdida
  validity:
    es: Válida como modelo de primer orden si el flujo permanece adherido y los parámetros
      pertenecen al régimen declarado.
    en: Valid as a first-order model if the flow remains attached and the parameters
      lie in the stated regime.
  dimension_check: coherente dimensionalmente
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  - Coord
  - Svg
  - Dcl
  interpretation_tags:
  - sustentacion
  - presion
  - aerodinamica
  result_semantics:
    target: L
    kind: physical_quantity
    sign_meaning:
      es: El signo indica orientación de la resultante según convenio.
      en: The sign indicates the direction of the resultant according to convention.
    absolute_value_meaning:
      es: El valor absoluto mide la intensidad física del efecto.
      en: The absolute value measures the physical intensity of the effect.
  domain_checks:
  - rho > 0
  - v >= 0
  - S > 0
  coherence_checks:
  - L >= 0 si C_L >= 0
  - dp aumenta con contraste de velocidades
  graph_implications:
  - La curva Coord muestra crecimiento cuadrático de L con v.
  - El SVG representa diferencia de presión y flecha de sustentación.
  pedagogical_triggers:
  - Confundir presión menor arriba con explicación única.
  - Aplicar Bernoulli fuera de flujo adherido.
- id: bernoulli_diferencia_presion
  title:
    es: Diferencia de presión por velocidades locales
    en: Pressure difference from local speeds
  equation: dp = 0.5*rho*(v_sup^2-v_inf^2)
  latex: \Delta p = \frac{1}{2}\rho (v_{sup}^2-v_{inf}^2)
  rearrangements:
  - target: dp
    equation: dp = 0.5*rho*(v_sup^2-v_inf^2)
    latex: \Delta p = \frac{1}{2}\rho (v_{sup}^2-v_{inf}^2)
  category: derived
  relation_type: average_relation
  physical_meaning:
    es: Estima el contraste de presión entre extradós e intradós cuando las hipótesis
      de Bernoulli son razonables.
    en: Estimates the pressure contrast between upper and lower surfaces when Bernoulli
      assumptions are reasonable.
  constraints:
  - flujo estacionario
  - régimen subsonico bajo
  - perfil antes de pérdida
  validity:
    es: Válida como modelo de primer orden si el flujo permanece adherido y los parámetros
      pertenecen al régimen declarado.
    en: Valid as a first-order model if the flow remains attached and the parameters
      lie in the stated regime.
  dimension_check: coherente dimensionalmente
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  - Svg
  interpretation_tags:
  - sustentacion
  - presion
  - aerodinamica
  result_semantics:
    target: dp
    kind: physical_quantity
    sign_meaning:
      es: El signo indica orientación de la resultante según convenio.
      en: The sign indicates the direction of the resultant according to convention.
    absolute_value_meaning:
      es: El valor absoluto mide la intensidad física del efecto.
      en: The absolute value measures the physical intensity of the effect.
  domain_checks:
  - rho > 0
  - v >= 0
  - S > 0
  coherence_checks:
  - L >= 0 si C_L >= 0
  - dp aumenta con contraste de velocidades
  graph_implications:
