- id: fuerza_por_presion
  title:
    es: Fuerza por diferencia de presión
    en: Force from pressure difference
  equation: L = dp*S
  latex: L = \Delta p S
  rearrangements:
  - target: L
    equation: L = dp*S
    latex: L = \Delta p S
  category: derived
  relation_type: definition
  physical_meaning:
    es: Conecta una diferencia media de presión con una resultante sobre la superficie
      de referencia.
    en: Connects an average pressure difference with a resultant force over the reference
      area.
