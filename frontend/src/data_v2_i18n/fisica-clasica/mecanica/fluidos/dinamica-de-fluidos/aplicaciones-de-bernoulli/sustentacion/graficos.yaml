version: "1.0"
leaf: "sustentacion"

coord:
  title:
    es: Gráfica Coord · Sustentación
    en: Coord Graph · Lift (Aerodynamic Sustentation)
  xAxis:
    es: ángulo de ataque α (°)
    en: angle of attack α (°)
  yAxis:
    es: coeficiente de sustentación C_L
    en: lift coefficient C_L
  xMagnitude: alpha
  yMagnitude: C_L
  relation:
    es: "C_L ≈ 2π·(α − α₀) (perfil delgado). Sustentación: L = ½ρv²·S·C_L. Pérdida de sustentación (stall) para α > α_stall."
    en: "C_L ≈ 2π·(α − α₀) (thin aerofoil). Lift: L = ½ρv²·S·C_L. Stall for α > α_stall."
  physicalReading:
    es: C_L crece linealmente con α hasta el stall. Sustentación = diferencia de presión entre extradós e intradós.
    en: C_L grows linearly with α until stall. Lift = pressure difference between upper and lower surface.
  slopeMeaning:
    es: "dC_L/dα ≈ 2π/rad (perfil delgado): pendiente de sustentación."
    en: "dC_L/dα ≈ 2π/rad (thin aerofoil): lift slope."
  interceptMeaning:
    es: "α₀: ángulo de ataque de sustentación nula."
    en: "α₀: zero-lift angle of attack."
  curvatureMeaning:
    es: Lineal hasta α_stall; brusca caída en el stall.
    en: Linear until α_stall; sharp drop at stall.
  signMeaning:
    es: "C_L > 0: sustentación positiva (hacia arriba)."
    en: "C_L > 0: positive lift (upward)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: −5° < α < 15° (típico). α_stall ≈ 15°.
    en: −5° < α < 15° (typical). α_stall ≈ 15°.
  modelConnection:
    es: "Sustentación aerodinámica: Bernoulli + circulación (Kutta-Joukowski)."
    en: "Aerodynamic lift: Bernoulli + circulation (Kutta-Joukowski)."
  formulaConnection:
    es: L = ½ρv²·S·C_L, C_L ≈ 2π(α − α₀), D = ½ρv²·S·C_D.
    en: L = ½ρv²·S·C_L, C_L ≈ 2π(α − α₀), D = ½ρv²·S·C_D.
  readingFocus:
    es: leer C_L a un α dado y verificar si está por debajo del stall.
    en: read C_L at a given α and verify it is below stall.
  agentHints:
    es:
      - L = ½ρv²·S·C_L.
      - "Stall: α > α_stall ≈ 15°."
      - "Kutta-Joukowski: L = ρvΓ."
    en:
      - L = ½ρv²·S·C_L.
      - "Stall: α > α_stall ≈ 15°."
      - "Kutta-Joukowski: L = ρvΓ."
  commonMistakes:
    es:
      - Confundir sustentación con flotación.
      - Aplicar más allá del stall.
      - Olvidar la dependencia de v².
    en:
      - Confusing lift with buoyancy.
      - Applying beyond stall.
      - Forgetting v² dependence.

dcl:
  title:
    es: DCL · Sustentación
    en: FBD · Aerodynamic Lift
  forces:
    es:
      - Sustentación L (↑)
      - Peso W (↓)
      - Resistencia D (←)
      - Empuje T (→)
    en:
      - Lift L (↑)
      - Weight W (↓)
      - Drag D (←)
      - Thrust T (→)
  object:
    es: aeronave o perfil alar
    en: aircraft or aerofoil
  relation:
    es: "Vuelo recto: L = W, T = D. L = ½ρv²·S·C_L."
    en: "Straight flight: L = W, T = D. L = ½ρv²·S·C_L."
  readingFocus:
    es: verificar L = W y T = D para vuelo recto y nivelado.
    en: verify L = W and T = D for straight and level flight.
  agentHints:
    es:
      - L = ½ρv²·S·C_L.
      - "Vuelo recto: L = W, T = D."
      - "Stall: C_L cae bruscamente."
    en:
      - L = ½ρv²·S·C_L.
      - "Level flight: L = W, T = D."
      - "Stall: C_L drops sharply."
  commonMistakes:
    es:
      - Confundir L y F_E.
      - Olvidar la resistencia D.
      - No verificar la condición de stall.
    en:
      - Confusing L and F_E.
      - Forgetting drag D.
      - Not checking stall condition.

svg:
  title:
    es: Escena SVG · Sustentación
    en: SVG Scene · Aerodynamic Lift
  sceneId: sustentacion
  sceneLabel:
    es: Perfil alar con distribución de presión y vectores aerodinámicos
    en: Aerofoil with pressure distribution and aerodynamic vectors
  objects:
    es:
      - perfil alar
      - líneas de corriente
      - distribución de presión extradós/intradós
      - vector L (↑)
      - vector D (←)
      - ángulo de ataque α
    en:
      - aerofoil
      - streamlines
      - upper/lower pressure distribution
      - vector L (↑)
      - vector D (←)
      - angle of attack α
  mainObject:
    es: perfil alar en flujo
    en: aerofoil in flow
  referenceFrame:
    es: viento relativo
    en: relative wind
  geometry:
    es: "Extradós: mayor curvatura → mayor v → menor p. Intradós: menor v → mayor p. Diferencia → L."
    en: "Upper surface: higher curvature → higher v → lower p. Lower surface: lower v → higher p. Difference → L."
  interactions:
    es: "L = ½ρv²·S·C_L. Bernoulli: p_inf + ½ρv_inf² = p_ext + ½ρv_ext²."
    en: "L = ½ρv²·S·C_L. Bernoulli: p_inf + ½ρv_inf² = p_ext + ½ρv_ext²."
  modelElements:
    es:
      - L = ½ρv²·S·C_L
      - "Extradós: v↑, p↓"
      - "Intradós: v↓, p↑"
    en:
      - L = ½ρv²·S·C_L
      - "Upper: v↑, p↓"
      - "Lower: v↓, p↑"
  visualCues:
    es:
      - Líneas de corriente más juntas en el extradós.
      - Flecha L hacia arriba.
      - Color rojo → baja presión (extradós).
    en:
      - Closer streamlines on upper surface.
      - L arrow upward.
      - Red colour → low pressure (upper surface).
  scaleMeaning:
    es: Longitud de flechas L y D ∝ magnitud.
    en: Length of L and D arrows ∝ magnitude.
  relation:
    es: Diferencia de presión extradós-intradós → sustentación L.
    en: Pressure difference upper-lower surface → lift L.
  physicalReading:
    es: El extradós tiene mayor v y menor p que el intradós.
    en: The upper surface has higher v and lower p than the lower surface.
  modelConnection:
    es: "Sustentación: Bernoulli + Kutta-Joukowski."
    en: "Lift: Bernoulli + Kutta-Joukowski."
  formulaConnection:
    es: L = ½ρv²·S·C_L, C_L ≈ 2π(α − α₀).
    en: L = ½ρv²·S·C_L, C_L ≈ 2π(α − α₀).
  readingFocus:
    es: identificar extradós (v↑, p↓) e intradós (v↓, p↑) para deducir L.
    en: identify upper surface (v↑, p↓) and lower (v↓, p↑) to deduce L.
  agentHints:
    es:
      - "Extradós: p menor."
      - L = ½ρv²·S·C_L.
      - "Stall cuando α > α_stall."
    en:
      - "Upper surface: lower p."
      - L = ½ρv²·S·C_L.
      - "Stall when α > α_stall."
  commonMistakes:
    es:
      - Confundir L con F_E.
      - Pensar que la velocidad es igual en extradós e intradós.
      - Olvidar α.
    en:
      - Confusing L with F_E.
      - Thinking velocity is equal on both surfaces.
      - Forgetting α.
