version: "1.0"
leaf: "tubo-de-pitot"

coord:
  title:
    es: Gráfica Coord · Tubo de Pitot
    en: Coord Graph · Pitot Tube
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: presión de remanso p_t = p + ½ρv² (Pa)
    en: stagnation pressure p_t = p + ½ρv² (Pa)
  xMagnitude: v
  yMagnitude: p_t
  relation:
    es: "Pitot: p_t = p_s + ½ρv². v = √(2(p_t − p_s)/ρ). Δp = p_t − p_s = ½ρv²."
    en: "Pitot: p_t = p_s + ½ρv². v = √(2(p_t − p_s)/ρ). Δp = p_t − p_s = ½ρv²."
  physicalReading:
    es: Parábola p_t(v) = p_s + ½ρv². La presión de remanso mide la energía cinética del fluido.
    en: Parabola p_t(v) = p_s + ½ρv². Stagnation pressure measures fluid kinetic energy.
  slopeMeaning:
    es: "dp_t/dv = ρv: la presión aumenta más rápido con v."
    en: "dp_t/dv = ρv: pressure increases faster with v."
  interceptMeaning:
    es: "p_t(0) = p_s: presión estática en reposo."
    en: "p_t(0) = p_s: static pressure at rest."
  curvatureMeaning:
    es: "Parábola: p_t ∝ v²."
    en: "Parabola: p_t ∝ v²."
  signMeaning:
    es: "Δp > 0 siempre."
    en: "Δp > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: v ≥ 0. Flujo incompresible (Ma < 0.3).
    en: v ≥ 0. Incompressible flow (Ma < 0.3).
  modelConnection:
    es: "Pitot: medida de velocidad por presión de remanso."
    en: "Pitot: velocity measurement by stagnation pressure."
  formulaConnection:
    es: v = √(2Δp/ρ), Δp = p_t − p_s.
    en: v = √(2Δp/ρ), Δp = p_t − p_s.
  readingFocus:
    es: leer Δp = p_t − p_s y calcular v = √(2Δp/ρ).
    en: read Δp = p_t − p_s and compute v = √(2Δp/ρ).
  agentHints:
    es:
      - v = √(2Δp/ρ).
      - p_t = p_s + ½ρv².
      - "Para Ma > 0.3: corrección compresible."
    en:
      - v = √(2Δp/ρ).
      - p_t = p_s + ½ρv².
      - "For Ma > 0.3: compressible correction."
  commonMistakes:
    es:
      - Usar ρ incorrecto.
      - Aplicar en flujo compresible sin corregir.
      - Confundir p_t y p_s.
    en:
      - Using wrong ρ.
      - Applying in compressible flow without correction.
      - Confusing p_t and p_s.

svg:
  title:
    es: Escena SVG · Tubo de Pitot
    en: SVG Scene · Pitot Tube
  sceneId: tubo_pitot
  sceneLabel:
    es: Tubo de Pitot con toma de presión estática y remanso
    en: Pitot tube with static and stagnation pressure taps
  objects:
    es:
      - tubo de Pitot (toma frontal)
      - toma de presión estática
      - manómetro diferencial Δp
      - fluido con velocidad v
      - punto de remanso
    en:
      - Pitot tube (front inlet)
      - static pressure tap
      - differential manometer Δp
      - fluid with velocity v
      - stagnation point
  mainObject:
    es: tubo de Pitot en flujo
    en: Pitot tube in flow
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Toma frontal: v → 0 en punto de remanso → p_t. Toma lateral: v ≠ 0 → p_s."
    en: "Front inlet: v → 0 at stagnation point → p_t. Side tap: v ≠ 0 → p_s."
  interactions:
    es: "Bernoulli: p_t = p_s + ½ρv². Δp = p_t − p_s = ½ρv²."
    en: "Bernoulli: p_t = p_s + ½ρv². Δp = p_t − p_s = ½ρv²."
  modelElements:
    es:
      - p_t = p_s + ½ρv²
      - v = √(2Δp/ρ)
      - "Punto de remanso: v = 0"
    en:
      - p_t = p_s + ½ρv²
      - v = √(2Δp/ρ)
      - "Stagnation point: v = 0"
  visualCues:
    es:
      - "Toma frontal: flecha de flujo frenado."
      - "Toma lateral: flujo libre."
      - Δh en el manómetro → v.
    en:
      - "Front inlet: stopped flow arrow."
      - "Side tap: free flow."
      - Δh on manometer → v.
  scaleMeaning:
    es: Δh manómetro ∝ v².
    en: Manometer Δh ∝ v².
  relation:
    es: v = √(2Δp/ρ).
    en: v = √(2Δp/ρ).
  physicalReading:
    es: El Pitot convierte la energía cinética en presión estática medible.
    en: The Pitot converts kinetic energy into measurable static pressure.
  modelConnection:
    es: "Medición de velocidad: tubo de Pitot."
    en: "Velocity measurement: Pitot tube."
  formulaConnection:
    es: v = √(2Δp/ρ), Δp = p_t − p_s.
    en: v = √(2Δp/ρ), Δp = p_t − p_s.
  readingFocus:
    es: leer Δp y calcular v = √(2Δp/ρ).
    en: read Δp and compute v = √(2Δp/ρ).
  agentHints:
    es:
      - "Punto de remanso: v = 0."
      - v = √(2Δp/ρ).
      - "Pitot-estático: misma sonda para p_t y p_s."
    en:
      - "Stagnation point: v = 0."
      - v = √(2Δp/ρ).
      - "Pitot-static: same probe for p_t and p_s."
  commonMistakes:
    es:
      - Confundir p_t y p_s.
      - No usar ρ del fluido correcto.
      - "Aplicar en Ma > 0.3 sin corregir."
    en:
      - Confusing p_t and p_s.
      - Not using correct fluid ρ.
      - "Applying at Ma > 0.3 without correction."
