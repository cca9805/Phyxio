version: 5
formulas:
  - id: head
    title:
      es: Carga hidráulica total (Altura de energía)
      en: Total Hydraulic Head (Energy Height)
    equation: H = p / (rho * g) + v^2 / (2 * g) + z
    latex: H = \frac{p}{\rho g} + \frac{v^2}{2g} + z
    category: conservation-laws
    relation_type: definition
    physical_meaning:
      es: Suma de la energía de presión, cinética y potencial por unidad de peso de fluido.
      en: Sum of pressure, kinetic, and potential energy per unit weight of fluid.
    constraints: [ideal-flow, incompressible, steady-state, along-streamline]
    validity:
      es: Válida para fluidos ideales, incompresibles, en régimen estacionario y siguiendo una línea de corriente.
      en: Valid for ideal, incompressible fluids in steady-state flow along a streamline.
    dimension_check: L
    calculable: true
    motivo_no_calculable: ""
    rearrangements: []
    result_semantics: [energy-per-unit-weight]
    used_in: [ecuacion-de-bernoulli]
    interpretation_tags: [conservation, energy, head]
    domain_checks:
      - condition: "rho > 0"
        message:
          es: La densidad debe ser positiva.
          en: Density must be positive.
      - condition: "g > 0"
        message:
          es: La gravedad debe ser positiva.
          en: Gravity must be positive.
    coherence_checks: []
    graph_implications:
      es: Define la línea de energía total (HGL + carga de velocidad).
      en: Defines the total energy line (HGL + velocity head).
    pedagogical_triggers:
      es: Úsala para calcular pérdidas de carga si comparas dos puntos en un fluido real.
      en: Use it to calculate head losses if comparing two points in a real fluid.

  - id: q_dinamica
    title:
      es: Presión Dinámica
      en: Dynamic Pressure
    equation: q = 0.5 * rho * v^2
    latex: q = \frac{1}{2} \rho v^2
    category: fluid-dynamics
    relation_type: definition
    physical_meaning:
      es: Energía cinética por unidad de volumen del fluido en movimiento.
      en: Kinetic energy per unit volume of the moving fluid.
    constraints: []
    validity:
      es: Definición general de la componente dinámica de la presión total.
      en: General definition of the dynamic component of total pressure.
    dimension_check: M L^-1 T^-2
    calculable: true
    motivo_no_calculable: ""
    rearrangements: []
    result_semantics: [pressure]
    used_in: [ecuacion-de-bernoulli]
    interpretation_tags: [pressure, kinetic-energy]
    domain_checks:
      - condition: "rho >= 0"
        message:
          es: La densidad no puede ser negativa.
          en: Density cannot be negative.
    coherence_checks: []
    graph_implications:
      es: Representa el aumento de presión en un punto de estancamiento.
      en: Represents the pressure rise at a stagnation point.
    pedagogical_triggers:
      es: Crucial para entender cómo la velocidad se 'convierte' en presión al frenar el fluido.
      en: Crucial for understanding how velocity 'converts' to pressure when stopping the fluid.
