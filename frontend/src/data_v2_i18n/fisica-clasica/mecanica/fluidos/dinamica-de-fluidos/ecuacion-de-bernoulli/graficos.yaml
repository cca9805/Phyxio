version: "1.0"
leaf: "ecuacion-de-bernoulli"

coord:
  title:
    es: Gráfica Coord · Ecuación de Bernoulli
    en: "Coord Graph · Bernoulli's Equation"
  xAxis:
    es: posición x a lo largo de la línea de corriente (m)
    en: position x along streamline (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: x
  yMagnitude: p
  relation:
    es: p + ½ρv² + ρgh = cte. Mayor v → menor p. Suma de presiones estática, dinámica e hidrostática es la presión total.
    en: p + ½ρv² + ρgh = const. Higher v → lower p. Sum of static, dynamic and hydrostatic pressure is total pressure.
  physicalReading:
    es: "Donde la sección se estrecha (v↑): p↓. Donde se amplía (v↓): p↑."
    en: "Where section narrows (v↑): p↓. Where it widens (v↓): p↑."
  slopeMeaning:
    es: "dp/dx = −ρv·dv/dx − ρg·dz/dx: gradiente de presión."
    en: "dp/dx = −ρv·dv/dx − ρg·dz/dx: pressure gradient."
  interceptMeaning:
    es: p₀ = presión total (punto de remanso, v = 0).
    en: p₀ = total pressure (stagnation point, v = 0).
  curvatureMeaning:
    es: p(x) refleja cambios de sección y cota de la tubería.
    en: p(x) reflects changes in pipe cross-section and elevation.
  signMeaning:
    es: "p < p_atm: succión. p < 0 (abs): no físico."
    en: "p < p_atm: suction. p < 0 (abs): not physical."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Flujo ideal: incompresible, invíscido, estacionario."
    en: "Ideal flow: incompressible, inviscid, steady."
  modelConnection:
    es: "Bernoulli: conservación de energía en fluido ideal."
    en: "Bernoulli: energy conservation in ideal fluid."
  formulaConnection:
    es: "p + ½ρv² + ρgh = cte, Torricelli: v = √(2gh), v = √(2Δp/ρ)."
    en: "p + ½ρv² + ρgh = const, Torricelli: v = √(2gh), v = √(2Δp/ρ)."
  readingFocus:
    es: leer p en dos puntos y aplicar Bernoulli para hallar v o Δh.
    en: read p at two points and apply Bernoulli to find v or Δh.
  agentHints:
    es:
      - "Punto de remanso: v = 0, p = p_total."
      - "Torricelli: v = √(2gh)."
      - "Bernoulli extendido: añadir H_bomba y H_f."
    en:
      - "Stagnation: v = 0, p = p_total."
      - "Torricelli: v = √(2gh)."
      - "Extended Bernoulli: add H_pump and H_f."
  commonMistakes:
    es:
      - Aplicar Bernoulli en flujo viscoso.
      - Olvidar la cota z.
      - Mezclar Pa y m de columna.
    en:
      - Applying Bernoulli in viscous flow.
      - Forgetting elevation z.
      - Mixing Pa and metres of head.

svg:
  title:
    es: Escena SVG · Ecuación de Bernoulli (Venturi)
    en: "SVG Scene · Bernoulli's Equation (Venturi)"
  sceneId: bernoulli
  sceneLabel:
    es: Tubería convergente-divergente con manómetros
    en: Converging-diverging pipe with pressure gauges
  objects:
    es:
      - sección ancha A₁
      - estrechamiento A₂
      - manómetros
      - vectores de velocidad
      - líneas de corriente
    en:
      - wide section A₁
      - throat A₂
      - pressure gauges
      - velocity vectors
      - streamlines
  mainObject:
    es: fluido en tubería Venturi
    en: fluid in Venturi pipe
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "A₂ < A₁ → v₂ > v₁ (continuidad) → p₂ < p₁ (Bernoulli)."
    en: "A₂ < A₁ → v₂ > v₁ (continuity) → p₂ < p₁ (Bernoulli)."
  interactions:
    es: A₁v₁ = A₂v₂; p₁ + ½ρv₁² = p₂ + ½ρv₂².
    en: A₁v₁ = A₂v₂; p₁ + ½ρv₁² = p₂ + ½ρv₂².
  modelElements:
    es:
      - A₁v₁ = A₂v₂
      - p₁ + ½ρv₁² = p₂ + ½ρv₂²
      - Δp = ½ρ(v₂² − v₁²)
    en:
      - A₁v₁ = A₂v₂
      - p₁ + ½ρv₁² = p₂ + ½ρv₂²
      - Δp = ½ρ(v₂² − v₁²)
  visualCues:
    es:
      - "Flechas más largas en A₂ (v₂ > v₁)."
      - Manómetro más bajo en A₂.
      - Líneas de corriente más juntas en A₂.
    en:
      - "Longer arrows at A₂ (v₂ > v₁)."
      - Lower gauge at A₂.
      - Closer streamlines at A₂.
  scaleMeaning:
    es: Longitud de vectores velocidad ∝ v.
    en: Length of velocity vectors ∝ v.
  relation:
    es: Bernoulli + continuidad en tubería Venturi.
    en: Bernoulli + continuity in Venturi pipe.
  physicalReading:
    es: El estrechamiento es la zona de mayor v y menor p.
    en: The throat is the zone of highest v and lowest p.
  modelConnection:
    es: Bernoulli aplicado al efecto Venturi.
    en: Bernoulli applied to the Venturi effect.
  formulaConnection:
    es: A₁v₁ = A₂v₂, p + ½ρv² = cte.
    en: A₁v₁ = A₂v₂, p + ½ρv² = const.
  readingFocus:
    es: leer manómetros en A₁ y A₂ para calcular v mediante Bernoulli.
    en: read gauges at A₁ and A₂ to compute v using Bernoulli.
  agentHints:
    es:
      - Menor sección → mayor v → menor p.
      - Q = A₁v₁ = A₂v₂.
      - Δp = ½ρ(v₂² − v₁²).
    en:
      - Smaller section → higher v → lower p.
      - Q = A₁v₁ = A₂v₂.
      - Δp = ½ρ(v₂² − v₁²).
  commonMistakes:
    es:
      - Olvidar continuidad para hallar v₂.
      - Usar Bernoulli sin flujo laminar.
      - No añadir z si la tubería no es horizontal.
    en:
      - Forgetting continuity to find v₂.
      - Using Bernoulli without laminar flow.
      - Not adding z if pipe is not horizontal.
