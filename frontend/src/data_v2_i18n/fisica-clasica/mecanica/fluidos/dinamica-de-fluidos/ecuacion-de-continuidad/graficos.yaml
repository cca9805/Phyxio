version: "1.0"
leaf: "ecuacion-de-continuidad"

coord:
  title:
    es: Gráfica Coord · Ecuación de Continuidad
    en: Coord Graph · Continuity Equation
  xAxis:
    es: sección transversal A (m²)
    en: cross-sectional area A (m²)
  yAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  xMagnitude: A
  yMagnitude: v
  relation:
    es: Q = A·v = cte (flujo incompresible). A₁v₁ = A₂v₂. Mayor sección → menor velocidad.
    en: Q = A·v = const (incompressible flow). A₁v₁ = A₂v₂. Larger section → lower velocity.
  physicalReading:
    es: Hipérbola v ∝ 1/A. La masa que entra por A₁ es igual a la que sale por A₂ en el mismo tiempo.
    en: Hyperbola v ∝ 1/A. Mass entering at A₁ equals mass leaving at A₂ in the same time.
  slopeMeaning:
    es: "No es lineal. Curvatura hiperbólica: v·A = Q = cte."
    en: "Not linear. Hyperbolic curvature: v·A = Q = const."
  interceptMeaning:
    es: v → ∞ cuando A → 0 (no físico; límite de la incompresibilidad).
    en: v → ∞ as A → 0 (not physical; limit of incompressibility).
  curvatureMeaning:
    es: "Hipérbola rectangular: v·A = Q."
    en: "Rectangular hyperbola: v·A = Q."
  signMeaning:
    es: "v > 0 siempre (flujo unidireccional)."
    en: "v > 0 always (unidirectional flow)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "A > 0, flujo incompresible. Para flujos compresibles: ρ₁A₁v₁ = ρ₂A₂v₂."
    en: "A > 0, incompressible flow. For compressible: ρ₁A₁v₁ = ρ₂A₂v₂."
  modelConnection:
    es: "Ecuación de continuidad: conservación de masa en flujo estacionario."
    en: "Continuity equation: mass conservation in steady flow."
  formulaConnection:
    es: Q = Av = cte, ṁ = ρAv = cte, A₁v₁ = A₂v₂.
    en: Q = Av = const, ṁ = ρAv = const, A₁v₁ = A₂v₂.
  readingFocus:
    es: leer A₁ y A₂ para calcular la relación v₂/v₁ = A₁/A₂.
    en: read A₁ and A₂ to compute v₂/v₁ = A₁/A₂.
  agentHints:
    es:
      - v₂/v₁ = A₁/A₂.
      - Doble sección → mitad de velocidad.
      - "Incompresible: Q = cte; compresible: ρAv = cte."
    en:
      - v₂/v₁ = A₁/A₂.
      - Double section → half velocity.
      - "Incompressible: Q = const; compressible: ρAv = const."
  commonMistakes:
    es:
      - Usar continuidad en flujo compresible sin corregir ρ.
      - Confundir caudal volumétrico Q con caudal másico ṁ.
      - No aplicar continuidad antes de Bernoulli.
    en:
      - Using continuity in compressible flow without correcting ρ.
      - Confusing volume flow rate Q with mass flow rate ṁ.
      - Not applying continuity before Bernoulli.

svg:
  title:
    es: Escena SVG · Ecuación de Continuidad
    en: SVG Scene · Continuity Equation
  sceneId: continuidad
  sceneLabel:
    es: Tubería con cambio de sección
    en: Pipe with section change
  objects:
    es:
      - sección ancha A₁
      - sección estrecha A₂
      - vectores de velocidad v₁ y v₂
      - flechas de caudal Q
    en:
      - wide section A₁
      - narrow section A₂
      - velocity vectors v₁ and v₂
      - flow rate Q arrows
  mainObject:
    es: fluido en tubería convergente
    en: fluid in converging pipe
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "A₁ > A₂ → v₁ < v₂. Q = A₁v₁ = A₂v₂: el caudal se conserva."
    en: "A₁ > A₂ → v₁ < v₂. Q = A₁v₁ = A₂v₂: flow rate is conserved."
  interactions:
    es: "Conservación de masa: ρA₁v₁ = ρA₂v₂ (incompresible: A₁v₁ = A₂v₂)."
    en: "Mass conservation: ρA₁v₁ = ρA₂v₂ (incompressible: A₁v₁ = A₂v₂)."
  modelElements:
    es:
      - Q = Av = cte
      - A₁v₁ = A₂v₂
      - v₂ = v₁·A₁/A₂
    en:
      - Q = Av = const
      - A₁v₁ = A₂v₂
      - v₂ = v₁·A₁/A₂
  visualCues:
    es:
      - "Flechas más largas en A₂ (v₂ > v₁)."
      - Misma cantidad de flujo en ambas secciones.
      - Líneas de corriente más juntas en A₂.
    en:
      - "Longer arrows at A₂ (v₂ > v₁)."
      - Same flow amount in both sections.
      - Closer streamlines at A₂.
  scaleMeaning:
    es: Longitud de flechas ∝ v.
    en: Arrow length ∝ v.
  relation:
    es: "Conservación de masa: Q = A₁v₁ = A₂v₂."
    en: "Mass conservation: Q = A₁v₁ = A₂v₂."
  physicalReading:
    es: La velocidad aumenta donde la sección disminuye.
    en: Velocity increases where the section decreases.
  modelConnection:
    es: "Ecuación de continuidad: conservación de masa."
    en: "Continuity equation: mass conservation."
  formulaConnection:
    es: Q = Av, A₁v₁ = A₂v₂.
    en: Q = Av, A₁v₁ = A₂v₂.
  readingFocus:
    es: leer las secciones A₁ y A₂ y calcular v₂ = v₁·A₁/A₂.
    en: read sections A₁ and A₂ and compute v₂ = v₁·A₁/A₂.
  agentHints:
    es:
      - v ∝ 1/A.
      - Q entra = Q sale.
      - Líneas de corriente más juntas → v mayor.
    en:
      - v ∝ 1/A.
      - Q in = Q out.
      - Closer streamlines → higher v.
  commonMistakes:
    es:
      - Invertir la relación v₂/v₁ = A₁/A₂.
      - Olvidar la continuidad antes de Bernoulli.
      - Usar Q = Av sin verificar incompresibilidad.
    en:
      - Inverting v₂/v₁ = A₁/A₂.
      - Forgetting continuity before Bernoulli.
      - Using Q = Av without checking incompressibility.
