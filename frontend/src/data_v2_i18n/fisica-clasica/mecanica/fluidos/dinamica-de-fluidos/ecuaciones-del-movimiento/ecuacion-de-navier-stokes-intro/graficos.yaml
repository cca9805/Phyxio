version: "1.0"
leaf: "ecuacion-de-navier-stokes-intro"

coord:
  title:
    es: Gráfica Coord · Ecuación de Navier-Stokes (Intro)
    en: Coord Graph · Navier-Stokes Equation (Intro)
  xAxis:
    es: radio r (m)
    en: radius r (m)
  yAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  xMagnitude: r
  yMagnitude: v
  relation:
    es: "Solución N-S para tubería: v(r) = (Δp/4μL)·(R²−r²). Perfil parabólico de Poiseuille."
    en: "N-S solution for pipe: v(r) = (Δp/4μL)·(R²−r²). Poiseuille parabolic profile."
  physicalReading:
    es: El perfil parabólico es la única solución analítica exacta de N-S para tubería cilíndrica.
    en: The parabolic profile is the only exact analytical N-S solution for a cylindrical pipe.
  slopeMeaning:
    es: "dv/dr: tasa de deformación → τ = μ·|dv/dr|."
    en: "dv/dr: strain rate → τ = μ·|dv/dr|."
  interceptMeaning:
    es: v(0) = v_max.
    en: v(0) = v_max.
  curvatureMeaning:
    es: "d²v/dr² = −Δp/(2μL): curvatura constante."
    en: "d²v/dr² = −Δp/(2μL): constant curvature."
  signMeaning:
    es: "v > 0 en dirección del flujo. v(R) = 0."
    en: "v > 0 in flow direction. v(R) = 0."
  areaMeaning:
    es: ∫v·2πr dr = Q.
    en: ∫v·2πr dr = Q.
  domainMeaning:
    es: Re < 2300. Tubería cilíndrica larga.
    en: Re < 2300. Long cylindrical pipe.
  modelConnection:
    es: N-S → Poiseuille para flujo laminar.
    en: N-S → Poiseuille for laminar flow.
  formulaConnection:
    es: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL).
    en: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL).
  readingFocus:
    es: leer el perfil parabólico como solución de N-S.
    en: read the parabolic profile as the N-S solution.
  agentHints:
    es:
      - "Poiseuille: solución exacta N-S (Re < 2300)."
      - v_max = 2·v_med.
      - Q ∝ R⁴.
    en:
      - "Poiseuille: exact N-S solution (Re < 2300)."
      - v_max = 2·v_mean.
      - Q ∝ R⁴.
  commonMistakes:
    es:
      - "Usar Poiseuille en Re > 4000."
      - Confundir v_max y v_med.
      - No aplicar no-slip.
    en:
      - "Using Poiseuille at Re > 4000."
      - Confusing v_max and v_mean.
      - Not applying no-slip.

svg:
  title:
    es: Escena SVG · Ecuación de Navier-Stokes (Intro)
    en: SVG Scene · Navier-Stokes Equation (Intro)
  sceneId: navier_stokes_ecuacion
  sceneLabel:
    es: Tubería con perfil Poiseuille y balance N-S
    en: Pipe with Poiseuille profile and N-S balance
  objects:
    es:
      - tubería cilíndrica
      - perfil parabólico v(r)
      - gradiente ∂p/∂x
      - tensor viscoso
      - eje de simetría
    en:
      - cylindrical pipe
      - parabolic profile v(r)
      - gradient ∂p/∂x
      - viscous tensor
      - symmetry axis
  mainObject:
    es: fluido laminar en tubería (Poiseuille)
    en: laminar fluid in pipe (Poiseuille)
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Sección circular. Perfil parabólico simétrico. v = 0 en r = R.
    en: Circular section. Symmetric parabolic profile. v = 0 at r = R.
  interactions:
    es: ∂p/∂x = μ·(1/r)·d/dr(r·dv/dr) → v(r) parabólico.
    en: ∂p/∂x = μ·(1/r)·d/dr(r·dv/dr) → parabolic v(r).
  modelElements:
    es:
      - v(r) = v_max·(1−(r/R)²)
      - ∂p/∂x = −Δp/L
      - τ(r) = −μ·dv/dr
    en:
      - v(r) = v_max·(1−(r/R)²)
      - ∂p/∂x = −Δp/L
      - τ(r) = −μ·dv/dr
  visualCues:
    es:
      - Parábola simétrica.
      - Flechas máximas en el eje.
      - τ = 0 en el eje; τ_max en la pared.
    en:
      - Symmetric parabola.
      - Maximum arrows at axis.
      - τ = 0 at axis; τ_max at wall.
  scaleMeaning:
    es: Longitud ∝ v(r).
    en: Length ∝ v(r).
  relation:
    es: "Solución N-S: perfil parabólico de Poiseuille."
    en: "N-S solution: Poiseuille parabolic profile."
  physicalReading:
    es: La curvatura de la parábola ∝ gradiente de presión / μ.
    en: The curvature of the parabola ∝ pressure gradient / μ.
  modelConnection:
    es: N-S simplificado → Hagen-Poiseuille.
    en: Simplified N-S → Hagen-Poiseuille.
  formulaConnection:
    es: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL).
    en: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL).
  readingFocus:
    es: identificar el perfil parabólico como solución N-S y estimar v_max.
    en: identify the parabolic profile as N-S solution and estimate v_max.
  agentHints:
    es:
      - Parábola → N-S laminar exacto.
      - v_max = 2·v_med.
      - Curvatura ∝ Δp/μL.
    en:
      - Parabola → exact laminar N-S.
      - v_max = 2·v_mean.
      - Curvature ∝ Δp/μL.
  commonMistakes:
    es:
      - Aplicar en flujo turbulento.
      - No verificar Re < 2300.
      - Confundir curvatura con pendiente.
    en:
      - Applying in turbulent flow.
      - Not verifying Re < 2300.
      - Confusing curvature with slope.
