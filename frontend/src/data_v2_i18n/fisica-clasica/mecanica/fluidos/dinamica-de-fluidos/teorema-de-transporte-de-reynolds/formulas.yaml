    en: control volume
  si_unit: m^3
- id: A
  symbol: A_{CS}
  name:
    es: superficie de control
    en: control surface
  si_unit: m^2
- id: vrel
  symbol: \vec v_{rel}
  name:
    es: velocidad relativa al control
    en: relative velocity to control
  si_unit: m/s
- id: n
  symbol: \vec n
  name:
    es: normal saliente
    en: outward normal
  si_unit: none
- id: mdot
