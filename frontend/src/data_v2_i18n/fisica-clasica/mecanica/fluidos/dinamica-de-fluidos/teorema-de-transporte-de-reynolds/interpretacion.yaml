version: 2
id: interpretacion-teorema-de-transporte-de-reynolds
leaf_id: teorema-de-transporte-de-reynolds
nombre:
  es: Interpretacion de Teorema de transporte de Reynolds
  en: Interpretation of Reynolds Transport Theorem
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: fluidos
  parent_id: dinamica-de-fluidos
  ruta_relativa: fisica-clasica/mecanica/fluidos/dinamica-de-fluidos/teorema-de-transporte-de-reynolds
dependencies:
  formulas:
  - rtt_general
  - balance_masa_control
  - flujo_masico
  - balance_momento_control
  magnitudes:
  - B
  - b
  - rho
  - V
  - A
  - vrel
  - n
  - mdot
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  B:
    summary_rules:
    - id: B_summary
      when: 'true'
      status: info
      text:
        es: '[[B]] indica que mecanismo domina, resume el balance del leaf y depende de que las hipotesis sigan siendo validas.'
        en: '[[B]] indicates which mechanism dominates, summarizes the leaf balance, and depends on the assumptions remaining valid.'
    physical_reading_rules:
    - id: B_physical
      when: 'true'
      status: info
      text:
        es: 'Si [[B]] cambia de escala, cambia el balance causal del modelo: puede desplazar el regimen dominante, mover un punto critico o revelar que la aproximacion ya no representa el sistema real.'
        en: 'If [[B]] changes scale, the causal balance of the model changes: it may shift the dominant regime, move a critical point, or reveal that the approximation no longer represents the real system.'
    coherence_rules:
    - id: B_coherence
      when: 'true'
      status: ok
      text:
        es: '[[B]] es coherente solo si procede del mismo sistema fisico que las demas magnitudes y conserva unidades compatibles.'
        en: '[[B]] is coherent only if it comes from the same physical system as the other quantities and keeps compatible units.'
    model_validity_rules:
    - id: B_validity
      when: 'true'
      status: ok
      text:
        es: El modelo sigue siendo valido mientras el teorema de transporte de reynolds traduce una ley escrita para un sistema material a un volumen de control; si el termino omitido se vuelve comparable, conviene cambiar de descripcion.
        en: The model remains valid while reynolds transport theorem translates a law written for a material system into a control-volume balance; if the omitted term becomes comparable, the description should be changed.
    graph_rules:
    - id: B_graph
      when: 'true'
      status: info
      text:
        es: Sin grafico declarado, [[B]] se lee mediante tendencia, signo, escala y casos limite.
        en: With no declared graph, [[B]] is read through trend, sign, scale, and limiting cases.
    likely_errors:
    - id: B_error
      when: 'true'
      status: warning
      text:
        es: 'Error probable: confundir [[B]] con un dato aislado, olvidar el dominio o suponer que el signo no tiene significado fisico.'
        en: 'Likely mistake: confuse [[B]] with an isolated datum, forget the domain, or assume that the sign has no physical meaning.'
    next_step_rules:
    - id: B_next
      when: 'true'
      status: info
      text:
        es: Despues de calcular, contrasta [[B]] con un caso limite y explica que cambio observable produciria.
        en: After calculating, compare [[B]] with a limiting case and state what observable change it would produce.
