version: 2
id: interpretacion-vorticidad-y-circulacion
leaf_id: vorticidad-y-circulacion
nombre:
  es: Interpretacion de Vorticidad y circulacion
  en: Interpretation of Vorticity and Circulation
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: fluidos
  parent_id: dinamica-de-fluidos
  ruta_relativa: fisica-clasica/mecanica/fluidos/dinamica-de-fluidos/vorticidad-y-circulacion
dependencies:
  formulas:
  - definicion_vorticidad
  - definicion_circulacion
  - teorema_kelvin
  - kutta_joukowski
  magnitudes:
  - omega
  - v
  - Gamma
  - C
  - rho
  - Vinf
  - Lprime
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  omega:
    summary_rules:
    - id: omega_summary
      when: 'true'
      status: info
      text:
        es: '[[omega]] indica que mecanismo domina, resume el balance del leaf y depende de que las hipotesis sigan siendo validas.'
        en: '[[omega]] indicates which mechanism dominates, summarizes the leaf balance, and depends on the assumptions remaining valid.'
    physical_reading_rules:
    - id: omega_physical
      when: 'true'
      status: info
      text:
        es: 'Si [[omega]] cambia de escala, cambia el balance causal del modelo: puede desplazar el regimen dominante, mover un punto critico o revelar que la aproximacion ya no representa el sistema real.'
        en: 'If [[omega]] changes scale, the causal balance of the model changes: it may shift the dominant regime, move a critical point, or reveal that the approximation no longer represents the real system.'
    coherence_rules:
    - id: omega_coherence
      when: 'true'
      status: ok
      text:
        es: '[[omega]] es coherente solo si procede del mismo sistema fisico que las demas magnitudes y conserva unidades compatibles.'
        en: '[[omega]] is coherent only if it comes from the same physical system as the other quantities and keeps compatible units.'
    model_validity_rules:
    - id: omega_validity
      when: 'true'
      status: ok
      text:
        es: El modelo sigue siendo valido mientras la vorticidad mide giro local del fluido y la circulacion resume giro acumulado alrededor de un contorno; si el termino omitido se vuelve comparable, conviene cambiar de descripcion.
        en: The model remains valid while vorticity measures local spin of the fluid and circulation summarizes accumulated swirl around a contour; if the omitted term becomes comparable, the description should be changed.
    graph_rules:
    - id: omega_graph
      when: 'true'
      status: info
      text:
        es: Sin grafico declarado, [[omega]] se lee mediante tendencia, signo, escala y casos limite.
        en: With no declared graph, [[omega]] is read through trend, sign, scale, and limiting cases.
    likely_errors:
    - id: omega_error
      when: 'true'
      status: warning
      text:
        es: 'Error probable: confundir [[omega]] con un dato aislado, olvidar el dominio o suponer que el signo no tiene significado fisico.'
        en: 'Likely mistake: confuse [[omega]] with an isolated datum, forget the domain, or assume that the sign has no physical meaning.'
    next_step_rules:
    - id: omega_next
      when: 'true'
      status: info
      text:
        es: Despues de calcular, contrasta [[omega]] con un caso limite y explica que cambio observable produciria.
        en: After calculating, compare [[omega]] with a limiting case and state what observable change it would produce.
