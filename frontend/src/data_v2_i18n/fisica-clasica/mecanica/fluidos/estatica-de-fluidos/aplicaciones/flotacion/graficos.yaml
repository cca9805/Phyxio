version: "1.0"
leaf: "flotacion"

coord:
  title:
    es: Gráfica Coord · Flotación
    en: Coord Graph · Buoyancy
  xAxis:
    es: volumen sumergido V_s (m³)
    en: submerged volume V_s (m³)
  yAxis:
    es: empuje F_E (N)
    en: buoyancy force F_E (N)
  xMagnitude: V_s
  yMagnitude: F_E
  relation:
    es: "Principio de Arquímedes: F_E = ρ_fluido·g·V_s. Recta de pendiente ρ_f·g. Flotación: F_E = W → ρ_obj·V_total = ρ_fluido·V_s."
    en: "Archimedes' principle: F_E = ρ_fluid·g·V_s. Line with slope ρ_f·g. Floating: F_E = W → ρ_obj·V_total = ρ_fluid·V_s."
  physicalReading:
    es: Pendiente = ρ_fluido·g. El objeto flota cuando F_E = W. Mayor V_s → mayor empuje.
    en: Slope = ρ_fluid·g. Object floats when F_E = W. Larger V_s → greater buoyancy.
  slopeMeaning:
    es: Pendiente = ρ_fluido·g (N/m³).
    en: Slope = ρ_fluid·g (N/m³).
  interceptMeaning:
    es: "F_E(0) = 0: sin volumen sumergido, sin empuje."
    en: "F_E(0) = 0: no submerged volume, no buoyancy."
  curvatureMeaning:
    es: Lineal (ρ y g constantes).
    en: Linear (constant ρ and g).
  signMeaning:
    es: "F_E > 0: empuje hacia arriba."
    en: "F_E > 0: upward buoyancy."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0 ≤ V_s ≤ V_total. ρ_agua = 1000 kg/m³.
    en: 0 ≤ V_s ≤ V_total. ρ_water = 1000 kg/m³.
  modelConnection:
    es: "Principio de Arquímedes: F_E = ρ_f·g·V_s."
    en: "Archimedes' principle: F_E = ρ_f·g·V_s."
  formulaConnection:
    es: "F_E = ρ_f·g·V_s, condición flotación: ρ_obj·g·V_t = ρ_f·g·V_s."
    en: "F_E = ρ_f·g·V_s, float condition: ρ_obj·g·V_t = ρ_f·g·V_s."
  readingFocus:
    es: leer pendiente (= ρ_f·g) y el punto donde F_E = W (flotación).
    en: read slope (= ρ_f·g) and the point where F_E = W (floating).
  agentHints:
    es:
      - "Flota: ρ_obj < ρ_fluido."
      - "Hunde: ρ_obj > ρ_fluido."
      - F_E depende solo de V_s y ρ_fluido.
    en:
      - "Floats: ρ_obj < ρ_fluid."
      - "Sinks: ρ_obj > ρ_fluid."
      - F_E depends only on V_s and ρ_fluid.
  commonMistakes:
    es:
      - Usar V_total en lugar de V_s.
      - Olvidar que F_E no depende de la forma.
      - Confundir masa y densidad.
    en:
      - Using V_total instead of V_s.
      - "Forgetting F_E doesn't depend on shape."
      - Confusing mass and density.

dcl:
  title:
    es: DCL · Flotación
    en: FBD · Buoyancy
  forces:
    es:
      - Peso W = ρ_obj·g·V_t (↓)
      - Empuje F_E = ρ_f·g·V_s (↑)
      - Tensión T (↑) si anclado
    en:
      - Weight W = ρ_obj·g·V_t (↓)
      - Buoyancy F_E = ρ_f·g·V_s (↑)
      - Tension T (↑) if anchored
  object:
    es: cuerpo parcial o totalmente sumergido
    en: partially or fully submerged body
  relation:
    es: "Equilibrio: F_E = W → ρ_obj·V_t = ρ_f·V_s. Hundimiento: W > F_E."
    en: "Equilibrium: F_E = W → ρ_obj·V_t = ρ_f·V_s. Sinking: W > F_E."
  readingFocus:
    es: comparar F_E y W; determinar si el cuerpo flota, se hunde o está en equilibrio.
    en: compare F_E and W; determine if the body floats, sinks or is in equilibrium.
  agentHints:
    es:
      - F_E actúa en el centro de empuje.
      - W actúa en el centro de gravedad.
      - "Estabilidad: B por encima de G."
    en:
      - F_E acts at the centre of buoyancy.
      - W acts at the centre of gravity.
      - "Stability: B above G."
  commonMistakes:
    es:
      - Usar V_total para F_E cuando solo parte está sumergida.
      - Olvidar la tensión del cable.
      - Confundir centro de gravedad y de empuje.
    en:
      - Using V_total for F_E when only part is submerged.
      - Forgetting cable tension.
      - Confusing centre of gravity and buoyancy.

svg:
  title:
    es: Escena SVG · Flotación
    en: SVG Scene · Buoyancy
  sceneId: flotacion
  sceneLabel:
    es: Objeto flotando con vectores W y F_E
    en: Object floating with W and F_E vectors
  objects:
    es:
      - recipiente con fluido
      - objeto sumergido/flotante
      - vector W (↓)
      - vector F_E (↑)
      - línea de flotación
    en:
      - container with fluid
      - submerged/floating object
      - vector W (↓)
      - vector F_E (↑)
      - waterline
  mainObject:
    es: cuerpo en el fluido
    en: body in the fluid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "El objeto está parcialmente sumergido. V_s: parte bajo el nivel del fluido. W actúa en G; F_E actúa en B (centroide del volumen sumergido)."
    en: "The object is partially submerged. V_s: part below the fluid surface. W acts at G; F_E acts at B (centroid of submerged volume)."
  interactions:
    es: F_E = ρ_f·g·V_s (↑); W = ρ_obj·g·V_t (↓). Equilibrio cuando F_E = W.
    en: F_E = ρ_f·g·V_s (↑); W = ρ_obj·g·V_t (↓). Equilibrium when F_E = W.
  modelElements:
    es:
      - F_E = ρ_f·g·V_s
      - W = mg
      - "Flota: F_E = W"
    en:
      - F_E = ρ_f·g·V_s
      - W = mg
      - "Floats: F_E = W"
  visualCues:
    es:
      - Flecha F_E más larga → mayor empuje.
      - "Línea de flotación: nivel del fluido."
      - V_s = volumen bajo la línea.
    en:
      - Longer F_E arrow → greater buoyancy.
      - "Waterline: fluid level."
      - V_s = volume below the line.
  scaleMeaning:
    es: Longitud de flechas W y F_E ∝ magnitud de las fuerzas.
    en: Length of W and F_E arrows ∝ force magnitude.
  relation:
    es: F_E = ρ_f·g·V_s, W = mg.
    en: F_E = ρ_f·g·V_s, W = mg.
  physicalReading:
    es: "Determinar si el cuerpo flota (F_E = W), se hunde (W > F_E) o asciende (F_E > W)."
    en: "Determine if the body floats (F_E = W), sinks (W > F_E) or rises (F_E > W)."
  modelConnection:
    es: Principio de Arquímedes.
    en: "Archimedes' principle."
  formulaConnection:
    es: F_E = ρ_f·g·V_s, W = ρ_obj·g·V_t.
    en: F_E = ρ_f·g·V_s, W = ρ_obj·g·V_t.
  readingFocus:
    es: comparar F_E y W; identificar V_s.
    en: compare F_E and W; identify V_s.
  agentHints:
    es:
      - F_E actúa en el centroide de V_s.
      - W actúa en el CG del cuerpo.
      - "Estabilidad: B sobre G."
    en:
      - F_E acts at centroid of V_s.
      - W acts at body CG.
      - "Stability: B above G."
  commonMistakes:
    es:
      - V_s ≠ V_total salvo si totalmente sumergido.
      - Olvidar la línea de aplicación de F_E.
      - No verificar la condición de flotación.
    en:
      - V_s ≠ V_total unless fully submerged.
      - Forgetting the line of action of F_E.
      - Not checking the float condition.
