version: "1.0"
leaf: "manometros"

coord:
  title:
    es: Gráfica Coord · Manómetros
    en: Coord Graph · Pressure Gauges
  xAxis:
    es: profundidad h (m)
    en: depth h (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: h
  yMagnitude: p
  relation:
    es: "p = p₀ + ρgh. Manómetro tubo en U: Δp = ρ_man·g·Δh."
    en: "p = p₀ + ρgh. U-tube manometer: Δp = ρ_man·g·Δh."
  physicalReading:
    es: Presión crece linealmente con h. La diferencia de nivel Δh en el manómetro indica Δp = ρ_man·g·Δh.
    en: Pressure increases linearly with h. Level difference Δh in the manometer indicates Δp = ρ_man·g·Δh.
  slopeMeaning:
    es: "Pendiente = ρg: gradiente de presión hidrostático."
    en: "Slope = ρg: hydrostatic pressure gradient."
  interceptMeaning:
    es: "p₀: presión en la superficie libre."
    en: "p₀: pressure at free surface."
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "Δp > 0 si p₁ > p₂."
    en: "Δp > 0 if p₁ > p₂."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: h ≥ 0. ρ_Hg ≈ 13600 kg/m³.
    en: h ≥ 0. ρ_Hg ≈ 13600 kg/m³.
  modelConnection:
    es: "Manómetros: instrumentos de presión basados en p = ρgh."
    en: "Manometers: pressure instruments based on p = ρgh."
  formulaConnection:
    es: p = p₀ + ρgh, Δp = ρ_man·g·Δh.
    en: p = p₀ + ρgh, Δp = ρ_man·g·Δh.
  readingFocus:
    es: leer Δh y calcular Δp = ρ_man·g·Δh.
    en: read Δh and compute Δp = ρ_man·g·Δh.
  agentHints:
    es:
      - Δp = ρ_man·g·Δh.
      - Hg amplifica 13.6×.
      - "Manómetro diferencial: mide Δp entre dos puntos."
    en:
      - Δp = ρ_man·g·Δh.
      - Hg amplifies 13.6×.
      - "Differential manometer: measures Δp between two points."
  commonMistakes:
    es:
      - No usar ρ del fluido manométrico.
      - Confundir presión manométrica con absoluta.
      - Error en la referencia de Δh.
    en:
      - Not using manometric fluid ρ.
      - Confusing gauge with absolute pressure.
      - Error in Δh reference.

dcl:
  title:
    es: DCL · Manómetros
    en: FBD · Pressure Gauges
  forces:
    es:
      - Presión p₁ ramal izq (→)
      - Presión p₂ ramal der (←)
      - Peso fluido manométrico W_man (↓)
    en:
      - Pressure p₁ left arm (→)
      - Pressure p₂ right arm (←)
      - Manometric fluid weight W_man (↓)
  object:
    es: columna de fluido en tubo en U
    en: fluid column in U-tube
  relation:
    es: "Equilibrio: p₁ = p₂ + ρ_man·g·Δh."
    en: "Equilibrium: p₁ = p₂ + ρ_man·g·Δh."
  readingFocus:
    es: recorrer el manómetro sumando/restando ρgh para hallar Δp.
    en: traverse the manometer adding/subtracting ρgh to find Δp.
  agentHints:
    es:
      - Usar ρ del fluido manométrico.
      - Δh entre interfases del mismo fluido.
      - Sumar ρgh bajando; restar subiendo.
    en:
      - Use manometric fluid ρ.
      - Δh between interfaces of same fluid.
      - Add ρgh going down; subtract going up.
  commonMistakes:
    es:
      - Mezclar ρ del proceso con ρ del manométrico.
      - No medir Δh entre interfases.
      - Olvidar p₀.
    en:
      - Mixing process and manometric ρ.
      - Not measuring Δh between interfaces.
      - Forgetting p₀.

svg:
  title:
    es: Escena SVG · Manómetros
    en: SVG Scene · Pressure Gauges
  sceneId: manometros
  sceneLabel:
    es: Manómetro de tubo en U con mercurio
    en: U-tube manometer with mercury
  objects:
    es:
      - ramal izquierdo p₁
      - ramal derecho p₂
      - mercurio
      - interfases
      - indicador Δh
    en:
      - left arm p₁
      - right arm p₂
      - mercury
      - interfaces
      - Δh indicator
  mainObject:
    es: manómetro tubo en U
    en: U-tube manometer
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Hg ocupa el fondo. El ramal más alto tiene menor presión. Δh = diferencia de niveles de Hg.
    en: Hg at the bottom. Higher arm has lower pressure. Δh = Hg level difference.
  interactions:
    es: p₁ + ρ_f·g·h₁ = p₂ + ρ_f·g·h₂ + ρ_Hg·g·Δh.
    en: p₁ + ρ_f·g·h₁ = p₂ + ρ_f·g·h₂ + ρ_Hg·g·Δh.
  modelElements:
    es:
      - Δp = ρ_man·g·Δh
      - "Hg: ρ = 13600 kg/m³"
      - Recorrer el manómetro
    en:
      - Δp = ρ_man·g·Δh
      - "Hg: ρ = 13600 kg/m³"
      - Traverse the manometer
  visualCues:
    es:
      - Nivel Hg más alto → menor p.
      - Δh entre las dos interfases.
      - Interfases bien definidas.
    en:
      - Higher Hg level → lower p.
      - Δh between both interfaces.
      - Well-defined interfaces.
  scaleMeaning:
    es: Δh ∝ Δp/(ρ_man·g).
    en: Δh ∝ Δp/(ρ_man·g).
  relation:
    es: Δp = ρ_man·g·Δh.
    en: Δp = ρ_man·g·Δh.
  physicalReading:
    es: Leer Δh entre interfases de Hg para calcular Δp.
    en: Read Δh between Hg interfaces to compute Δp.
  modelConnection:
    es: Manómetro tubo en U.
    en: U-tube manometer.
  formulaConnection:
    es: Δp = ρ_man·g·Δh.
    en: Δp = ρ_man·g·Δh.
  readingFocus:
    es: leer Δh y multiplicar por ρ_man·g.
    en: read Δh and multiply by ρ_man·g.
  agentHints:
    es:
      - Δh entre interfases Hg.
      - ρ_Hg = 13600 kg/m³.
      - "Recorrido: sumar ρgh bajando."
    en:
      - Δh between Hg interfaces.
      - ρ_Hg = 13600 kg/m³.
      - "Traverse: add ρgh going down."
  commonMistakes:
    es:
      - Medir Δh desde el fondo.
      - Usar ρ_agua en lugar de ρ_Hg.
      - Olvidar columnas del fluido de proceso.
    en:
      - Measuring Δh from bottom.
      - Using ρ_water instead of ρ_Hg.
      - Forgetting process fluid columns.
