version: 5
topic:
  id: vasos-comunicantes
  title:
    es: Vasos comunicantes
    en: Communicating Vessels
formulas:
  - id: equilibrio_vasos
    title:
      es: Ley de los Vasos Comunicantes
      en: Communicating Vessels Law
    equation: rho1 * h1 = rho2 * h2
    latex: P_{atm} + \rho_1 \cdot g \cdot h_1 = P_{atm} + \rho_2 \cdot g \cdot h_2
    rearrangements:
      - id: reord_h2
        target: h2
        equation: (rho1 * h1) / rho2
        latex: h_2 = \frac{\rho_1 h_1}{\rho_2}
        descripcion:
          es: Calcula la altura de la segunda columna.
          en: Calculates the height of the second column.
    category: law
    relation_type: equality
    physical_meaning:
      es: En equilibrio, la presión en la base de todas las ramas conectadas debe ser igual.
      en: In equilibrium, the pressure at the base of all connected branches must be equal.
    constraints: fluidos incompresibles, reposo absoluto, conectados por la base
    validity:
      es: Válido para líquidos en reposo. No aplica si hay aceleración lateral.
      en: Valid for liquids at rest. Does not apply if there is lateral acceleration.
    dimension_check: "[M L^-3] * [L T^-2] * [L] = M L^-1 T^-2 (Pascal)"
    calculable: true
    motivo_no_calculable: ""
    used_in: [vasos-comunicantes]
    interpretation_tags: [hidrostatica, equilibrio, densidades]
    result_semantics:
      es: Indica la altura necesaria para compensar la carga de la otra rama.
      en: Indicates the height needed to compensate for the other branch's load.
    domain_checks: [rho1 > 0, rho2 > 0, h1 > 0, h2 > 0]
    coherence_checks: [h2 > h1 si rho2 < rho1]
    graph_implications: vincula los niveles de los meniscos en el SVG
    pedagogical_triggers: paradoja hidrostática, nivelación de superficies
    variables_principales: [rho1, h1, rho2, h2, g, p_atm]
    unidades_coherentes:
      es: Alturas en metros (m) y densidades en kg/m³.
      en: Heights in meters (m) and densities in kg/m³.
    relevancia_didactica: 4
    difficulty_rating: 2
    tags: [estatica, fluidos, equilibrio]
    referencia_teorica: "Principio Fundamental de la Hidrostática"
    mecanismo_resolucion: "Igualación de presiones en la isobara horizontal de base."
    visualizacion_sugerida: "Visores laterales con niveles diferenciales."
    metadata:
      precision_recomendada: 3
      uso_frecuente: true

  - id: relacion_alturas_densidades
    title:
      es: Relación de Proporcionalidad Inversa
      en: Inverse Proportionality Relationship
    equation: h1 / h2 = rho2 / rho1
    latex: \frac{h_1}{h_2} = \frac{\rho_2}{\rho_1}
    rearrangements: []
    category: derivation
    relation_type: ratio
    physical_meaning:
      es: Las alturas de las columnas son inversamente proporcionales a las densidades de los líquidos.
      en: The column heights are inversely proportional to the liquid densities.
    constraints: equilibrio estático, fluidos inmiscibles
    validity:
      es: Válido solo cuando la presión atmosférica se cancela.
      en: Valid only when atmospheric pressure cancels out.
    dimension_check: adimensionado [L/L] = [M L^-3 / M L^-3]
    calculable: false
    motivo_no_calculable: "Es una relación de comparación."
    used_in: [vasos-comunicantes]
    interpretation_tags: [proporcionalidad, densidad, altura]
    result_semantics:
      es: Establece la escala relativa de los niveles de fluido.
      en: Establishes the relative scale of fluid levels.
    domain_checks: [h2 > 0, rho1 > 0]
    coherence_checks: []
    graph_implications: dicta la diferencia de niveles visual en el esquema
    pedagogical_triggers: regla de tres hidrostática
    variables_principales: [h1, h2, rho1, rho2]
    unidades_coherentes:
      es: Coherencia de unidades entre ambos miembros.
      en: Unit coherence between both members.
    relevancia_didactica: 3
    difficulty_rating: 2
    tags: [proporcionalidad, hidrostática]
    referencia_teorica: "Derivación de la ley de vasos comunicantes"
    mecanismo_resolucion: "Simplificación de la igualdad de presiones."
    visualizacion_sugerida: "Gráfico de barras comparativo."
    metadata:
      precision_recomendada: 2
      uso_frecuente: true

ui:
  default_formula: equilibrio_vasos
  groups:
    - title:
        es: Equilibrio Hidrostático
        en: Hydrostatic Equilibrium
      items: [equilibrio_vasos, relacion_alturas_densidades]
