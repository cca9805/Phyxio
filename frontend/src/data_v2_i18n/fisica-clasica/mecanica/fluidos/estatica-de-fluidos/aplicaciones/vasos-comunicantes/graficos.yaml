version: "1.0"
leaf: "vasos-comunicantes"

coord:
  title:
    es: Gráfica Coord · Vasos Comunicantes
    en: Coord Graph · Communicating Vessels
  xAxis:
    es: densidad del fluido ρ (kg/m³)
    en: fluid density ρ (kg/m³)
  yAxis:
    es: altura de columna h (m)
    en: column height h (m)
  xMagnitude: rho
  yMagnitude: h
  relation:
    es: "Vasos comunicantes: ρ₁·h₁ = ρ₂·h₂ (misma presión en la base). h = p₀/(ρg) para un fluido soportado por otro."
    en: "Communicating vessels: ρ₁·h₁ = ρ₂·h₂ (same pressure at base). h = p₀/(ρg) for one fluid supported by another."
  physicalReading:
    es: h ∝ 1/ρ. Fluido más denso tiene columna más baja. Mismo nivel libre si ρ₁ = ρ₂.
    en: h ∝ 1/ρ. Denser fluid has lower column. Same free level if ρ₁ = ρ₂.
  slopeMeaning:
    es: "No lineal: h ∝ 1/ρ (hipérbola)."
    en: "Non-linear: h ∝ 1/ρ (hyperbola)."
  interceptMeaning:
    es: h → 0 cuando ρ → ∞.
    en: h → 0 as ρ → ∞.
  curvatureMeaning:
    es: "Hipérbola rectangular: h·ρ = p₀/g."
    en: "Rectangular hyperbola: h·ρ = p₀/g."
  signMeaning:
    es: "h > 0 siempre."
    en: "h > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "ρ > 0."
    en: "ρ > 0."
  modelConnection:
    es: Principio de vasos comunicantes.
    en: Communicating vessels principle.
  formulaConnection:
    es: ρ₁·h₁ = ρ₂·h₂, p = ρgh.
    en: ρ₁·h₁ = ρ₂·h₂, p = ρgh.
  readingFocus:
    es: leer h₁ y h₂ para calcular ρ₂/ρ₁ = h₁/h₂.
    en: read h₁ and h₂ to compute ρ₂/ρ₁ = h₁/h₂.
  agentHints:
    es:
      - "ρ₁h₁ = ρ₂h₂: misma presión en la base."
      - Mismo fluido → mismo nivel.
      - "Aplicación: densímetros de columna."
    en:
      - "ρ₁h₁ = ρ₂h₂: same pressure at base."
      - Same fluid → same level.
      - "Application: column densimeters."
  commonMistakes:
    es:
      - Creer que el nivel es siempre igual.
      - No verificar que los vasos están conectados.
      - Confundir h con profundidad.
    en:
      - Thinking level is always equal.
      - Not verifying vessels are connected.
      - Confusing h with depth.

svg:
  title:
    es: Escena SVG · Vasos Comunicantes
    en: SVG Scene · Communicating Vessels
  sceneId: vasos_comunicantes
  sceneLabel:
    es: Dos vasos conectados con fluidos de distinta densidad
    en: Two connected vessels with fluids of different density
  objects:
    es:
      - vaso izquierdo (ρ₁, h₁)
      - vaso derecho (ρ₂, h₂)
      - conexión inferior
      - nivel libre de cada fluido
      - indicadores ρ y h
    en:
      - left vessel (ρ₁, h₁)
      - right vessel (ρ₂, h₂)
      - bottom connection
      - free level of each fluid
      - ρ and h indicators
  mainObject:
    es: sistema de vasos comunicantes
    en: communicating vessels system
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Dos vasos conectados por la base. Fluidos diferentes: ρ₁h₁ = ρ₂h₂. Mismo fluido: h₁ = h₂."
    en: "Two vessels connected at the base. Different fluids: ρ₁h₁ = ρ₂h₂. Same fluid: h₁ = h₂."
  interactions:
    es: "Misma presión en la conexión: p_base = ρ₁gh₁ = ρ₂gh₂."
    en: "Same pressure at connection: p_base = ρ₁gh₁ = ρ₂gh₂."
  modelElements:
    es:
      - ρ₁h₁ = ρ₂h₂
      - p_base igual en ambos lados
      - h₁/h₂ = ρ₂/ρ₁
    en:
      - ρ₁h₁ = ρ₂h₂
      - p_base equal on both sides
      - h₁/h₂ = ρ₂/ρ₁
  visualCues:
    es:
      - Vaso con fluido más denso tiene nivel más bajo.
      - "Conexión inferior: misma p."
      - Niveles distintos si ρ₁ ≠ ρ₂.
    en:
      - Vessel with denser fluid has lower level.
      - "Bottom connection: same p."
      - Different levels if ρ₁ ≠ ρ₂.
  scaleMeaning:
    es: Altura h ∝ 1/ρ.
    en: Height h ∝ 1/ρ.
  relation:
    es: ρ₁h₁ = ρ₂h₂.
    en: ρ₁h₁ = ρ₂h₂.
  physicalReading:
    es: El fluido más denso tiene menor altura para igualar la presión en la base.
    en: The denser fluid has lower height to equalise pressure at the base.
  modelConnection:
    es: Vasos comunicantes.
    en: Communicating vessels.
  formulaConnection:
    es: ρ₁h₁ = ρ₂h₂, p = ρgh.
    en: ρ₁h₁ = ρ₂h₂, p = ρgh.
  readingFocus:
    es: leer h₁ y h₂ y calcular ρ₂/ρ₁ = h₁/h₂.
    en: read h₁ and h₂ and compute ρ₂/ρ₁ = h₁/h₂.
  agentHints:
    es:
      - Mayor ρ → menor h.
      - Misma presión en la base.
      - Mismo fluido → mismo nivel.
    en:
      - Higher ρ → lower h.
      - Same pressure at base.
      - Same fluid → same level.
  commonMistakes:
    es:
      - Creer que el nivel es siempre igual.
      - No verificar la conexión.
      - Olvidar que la condición es p₁ = p₂ en la base.
    en:
      - Thinking level is always equal.
      - Not verifying the connection.
      - Forgetting the condition is p₁ = p₂ at the base.
