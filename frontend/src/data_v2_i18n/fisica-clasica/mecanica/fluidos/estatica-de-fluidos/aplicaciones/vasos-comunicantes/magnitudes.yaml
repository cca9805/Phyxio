version: 5
magnitudes:
  - id: h1
    symbol: h_1
    nombre:
      es: Altura rama 1
      en: Branch 1 height
    descripcion:
      es: Altura del nivel del líquido en la primera rama de los vasos.
      en: Liquid level height in the first branch of the vessels.
    unidad_si: m
    dimension: L
    is_vector: false
    components: null
    category: geometrica
    physical_role: variable-independiente
    used_in: [equilibrio_vasos]
    common_mistake:
      es: Medir desde una referencia distinta en cada rama.
      en: Measuring from a different reference in each branch.
    typical_range: [0, 2]
    sign_behavior: siempre-positivo
    zero_behavior: nivel-vacio
    value_nature: extensiva
    interpretation_role: indicador-visual
    graph_binding: svg-vasos.h1
    pedagogical_notes:
      es: En equilibrio con un solo líquido, h1 debe ser igual a h2.
      en: In equilibrium with a single liquid, h1 must equal h2.

  - id: h2
    symbol: h_2
    nombre:
      es: Altura rama 2
      en: Branch 2 height
    descripcion:
      es: Altura del nivel del líquido en la segunda rama de los vasos.
      en: Liquid level height in the second branch of the vessels.
    unidad_si: m
    dimension: L
    is_vector: false
    components: null
    category: geometrica
    physical_role: variable-independiente
    used_in: [equilibrio_vasos]
    common_mistake:
      es: No considerar la diferencia de densidades si hay líquidos inmiscibles.
      en: Not considering the density difference if there are immiscible liquids.
    typical_range: [0, 2]
    sign_behavior: siempre-positivo
    zero_behavior: nivel-vacio
    value_nature: extensiva
    interpretation_role: indicador-visual
    graph_binding: svg-vasos.h2
    pedagogical_notes:
      es: Es la contraparte de h1 en el sistema conectado.
      en: It is the counterpart of h1 in the connected system.

  - id: rho1
    symbol: \rho_1
    nombre:
      es: Densidad líquido 1
      en: Liquid 1 density
    descripcion:
      es: Densidad del fluido contenido en la rama 1.
      en: Density of the fluid contained in branch 1.
    unidad_si: kg/m^3
    dimension: M L^-3
    is_vector: false
    components: null
    category: propiedad-fluido
    physical_role: parametro-sistema
    used_in: [equilibrio_vasos]
    common_mistake:
      es: Confundir las densidades si los líquidos son muy parecidos visualmente.
      en: Confusing densities if liquids look very similar visually.
    typical_range: [700, 14000]
    sign_behavior: siempre-positivo
    zero_behavior: imposible
    value_nature: intensiva
    interpretation_role: condicion-entorno
    graph_binding: svg-vasos.rho1
    pedagogical_notes:
      es: Define la presión hidrostática en la base de la columna 1.
      en: Defines the hydrostatic pressure at the base of column 1.

  - id: rho2
    symbol: \rho_2
    nombre:
      es: Densidad líquido 2
      en: Liquid 2 density
    descripcion:
      es: Densidad del fluido contenido en la rama 2 (si es distinto al 1).
      en: Density of the fluid contained in branch 2 (if different from 1).
    unidad_si: kg/m^3
    dimension: M L^-3
    is_vector: false
    components: null
    category: propiedad-fluido
    physical_role: parametro-sistema
    used_in: [equilibrio_vasos]
    common_mistake:
      es: Usar la misma densidad para ambos cuando hay una interfaz clara.
      en: Using the same density for both when there is a clear interface.
    typical_range: [700, 14000]
    sign_behavior: siempre-positivo
    zero_behavior: imposible
    value_nature: intensiva
    interpretation_role: condicion-entorno
    graph_binding: svg-vasos.rho2
    pedagogical_notes:
      es: Si rho2 > rho1, h2 será menor que h1 para equilibrar presiones.
      en: If rho2 > rho1, h2 will be smaller than h1 to balance pressures.

  - id: p_atm
    symbol: p_{atm}
    nombre:
      es: Presión atmosférica
      en: Atmospheric pressure
    descripcion:
      es: Presión ejercida por la atmósfera sobre las superficies libres.
      en: Pressure exerted by the atmosphere on free surfaces.
    unidad_si: Pa
    dimension: M L^-1 T^-2
    is_vector: false
    components: null
    category: mecanica-fluidos
    physical_role: condicion-contorno
    used_in: [equilibrio_vasos]
    common_mistake:
      es: No cancelarla cuando actúa por igual en todas las ramas abiertas.
      en: Not cancelling it when it acts equally on all open branches.
    typical_range: [100000, 101325]
    sign_behavior: siempre-positivo
    zero_behavior: vacio-absoluto
    value_nature: intensiva
    interpretation_role: referencia-presion
    graph_binding: svg-vasos.patm
    pedagogical_notes:
      es: Es la presión de referencia estándar 101325 Pa.
      en: It is the standard reference pressure 101325 Pa.

  - id: g
    symbol: g
    nombre:
      es: Gravedad
      en: Gravity
    descripcion:
      es: Aceleración de la gravedad terrestre.
      en: Earth's gravitational acceleration.
    unidad_si: m/s^2
    dimension: L T^-2
    is_vector: false
    components: null
    category: constante-fisica
    physical_role: parametro-sistema
    used_in: [equilibrio_vasos]
    common_mistake:
      es: Pensar que influye en el nivel relativo de dos líquidos en equilibrio estático.
      en: Thinking it influences the relative level of two liquids in static equilibrium.
    typical_range: [9.7, 9.9]
    sign_behavior: siempre-positivo
    zero_behavior: microgravedad
    value_nature: intensiva
    interpretation_role: condicion-entorno
    graph_binding: null
    pedagogical_notes:
      es: Se cancela en la ecuación de vasos comunicantes pero es necesaria para la presión absoluta.
      en: Cancels out in the communicating vessels equation but is necessary for absolute pressure.
