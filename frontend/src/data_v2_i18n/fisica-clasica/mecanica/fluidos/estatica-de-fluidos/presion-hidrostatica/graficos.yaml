version: "1.0"
leaf: "presion-hidrostatica"

coord:
  title:
    es: Gráfica Coord · Presión Hidrostática
    en: Coord Graph · Hydrostatic Pressure
  xAxis:
    es: profundidad h (m)
    en: depth h (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: h
  yMagnitude: p
  relation:
    es: p = p_atm + ρgh. El peso de la columna de fluido de altura h genera la presión hidrostática.
    en: p = p_atm + ρgh. The weight of the fluid column of height h generates hydrostatic pressure.
  physicalReading:
    es: Recta de pendiente ρg. p_atm ≈ 101325 Pa en la superficie.
    en: Line with slope ρg. p_atm ≈ 101325 Pa at the surface.
  slopeMeaning:
    es: Pendiente = ρg ≈ 9810 N/m³ (agua).
    en: Slope = ρg ≈ 9810 N/m³ (water).
  interceptMeaning:
    es: p_atm ≈ 101325 Pa.
    en: p_atm ≈ 101325 Pa.
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "p > 0 (absoluta)."
    en: "p > 0 (absolute)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: h ≥ 0. Fluido en reposo, incompresible.
    en: h ≥ 0. Fluid at rest, incompressible.
  modelConnection:
    es: Fundamento de la hidrostática.
    en: Foundation of hydrostatics.
  formulaConnection:
    es: p = p_atm + ρgh, F = p·A.
    en: p = p_atm + ρgh, F = p·A.
  readingFocus:
    es: leer pendiente ρg e intercepto p_atm; calcular p a cualquier h.
    en: read slope ρg and intercept p_atm; compute p at any h.
  agentHints:
    es:
      - ρg_agua ≈ 9810 N/m³.
      - 1 m H₂O ≈ 9810 Pa.
      - p isótropa en el fluido.
    en:
      - ρg_water ≈ 9810 N/m³.
      - 1 m H₂O ≈ 9810 Pa.
      - p isotropic in the fluid.
  commonMistakes:
    es:
      - Olvidar p_atm.
      - Usar ρg incorrecto.
      - Aplicar en fluido en movimiento sin validar.
    en:
      - Forgetting p_atm.
      - Using wrong ρg.
      - Applying in moving fluid without validation.

dcl:
  title:
    es: DCL · Presión Hidrostática
    en: FBD · Hydrostatic Pressure
  forces:
    es:
      - Presión superior p₁·A (↓)
      - Presión inferior p₂·A (↑)
      - Peso del elemento W = ρ·g·A·dh (↓)
    en:
      - Upper pressure p₁·A (↓)
      - Lower pressure p₂·A (↑)
      - Element weight W = ρ·g·A·dh (↓)
  object:
    es: elemento diferencial de fluido de altura dh
    en: differential fluid element of height dh
  relation:
    es: "Equilibrio: p₂·A − p₁·A − ρ·g·A·dh = 0 → dp/dh = ρg."
    en: "Equilibrium: p₂·A − p₁·A − ρ·g·A·dh = 0 → dp/dh = ρg."
  readingFocus:
    es: verificar ΣF = 0 para fluido en reposo.
    en: verify ΣF = 0 for fluid at rest.
  agentHints:
    es:
      - "dp/dh = ρg: ec. fundamental hidrostática."
      - Válido para incompresibles.
      - "Gases: dp/dh = −ρ(h)·g."
    en:
      - "dp/dh = ρg: fundamental hydrostatic eq."
      - Valid for incompressible.
      - "Gases: dp/dh = −ρ(h)·g."
  commonMistakes:
    es:
      - Olvidar el peso del elemento.
      - No aplicar a incompresibles.
      - Invertir signo dp/dh.
    en:
      - Forgetting element weight.
      - Not applying to incompressible.
      - Inverting dp/dh sign.

svg:
  title:
    es: Escena SVG · Presión Hidrostática
    en: SVG Scene · Hydrostatic Pressure
  sceneId: presion_hidrostatica
  sceneLabel:
    es: Diagrama de presiones sobre pared vertical
    en: Pressure diagram on vertical wall
  objects:
    es:
      - superficie libre
      - pared vertical
      - distribución triangular p
      - fuerza F_R
      - centro de presión C_P
    en:
      - free surface
      - vertical wall
      - triangular p distribution
      - force F_R
      - pressure centre C_P
  mainObject:
    es: pared vertical sumergida
    en: submerged vertical wall
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Distribución triangular p(h) = ρgh. F_R actúa en C_P (debajo del centroide).
    en: Triangular distribution p(h) = ρgh. F_R acts at C_P (below centroid).
  interactions:
    es: F_R = ρg·h̄·A; C_P = centroide + I_c/(h̄·A).
    en: F_R = ρg·h̄·A; C_P = centroid + I_c/(h̄·A).
  modelElements:
    es:
      - p(h) = ρgh
      - F_R = ρg·h̄·A
      - y_cp = ȳ + I_c/(ȳ·A)
    en:
      - p(h) = ρgh
      - F_R = ρg·h̄·A
      - y_cp = ȳ + I_c/(ȳ·A)
  visualCues:
    es:
      - Triángulo (p = 0 en superficie, max abajo).
      - F_R en C_P, debajo del centroide.
      - Distribución lineal.
    en:
      - Triangle (p = 0 at surface, max at bottom).
      - F_R at C_P, below centroid.
      - Linear distribution.
  scaleMeaning:
    es: Ancho del triángulo ∝ p(h).
    en: Triangle width ∝ p(h).
  relation:
    es: Distribución triangular → F_R y C_P.
    en: Triangular distribution → F_R and C_P.
  physicalReading:
    es: El diagrama triangular muestra que p ∝ h. F_R = integral de p sobre la superficie.
    en: The triangular diagram shows p ∝ h. F_R = integral of p over the surface.
  modelConnection:
    es: Fuerzas hidrostáticas sobre superficies planas.
    en: Hydrostatic forces on plane surfaces.
  formulaConnection:
    es: p = ρgh, F_R = ρg·h̄·A, C_P = ȳ + I_c/(ȳ·A).
    en: p = ρgh, F_R = ρg·h̄·A, C_P = ȳ + I_c/(ȳ·A).
  readingFocus:
    es: leer distribución triangular, calcular F_R y localizar C_P.
    en: read triangular distribution, compute F_R and locate C_P.
  agentHints:
    es:
      - C_P debajo del centroide.
      - F_R = ρg·h̄·A.
      - "Pared rectangular: C_P a 2H/3."
    en:
      - C_P below centroid.
      - F_R = ρg·h̄·A.
      - "Rectangular wall: C_P at 2H/3."
  commonMistakes:
    es:
      - C_P ≠ centroide.
      - No usar I_c.
      - F_R actúa ⊥ a la superficie.
    en:
      - C_P ≠ centroid.
      - Not using I_c.
      - F_R acts ⊥ to surface.
