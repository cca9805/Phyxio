version: "1.0"
leaf: "principio-de-arquimedes"

coord:
  title:
    es: Gráfica Coord · Principio de Arquímedes
    en: "Coord Graph · Archimedes' Principle"
  xAxis:
    es: volumen sumergido V_s (m³)
    en: submerged volume V_s (m³)
  yAxis:
    es: empuje F_E (N)
    en: buoyancy force F_E (N)
  xMagnitude: V_s
  yMagnitude: F_E
  relation:
    es: F_E = ρ_f·g·V_s. Pendiente = ρ_f·g. El empuje igual al peso del fluido desplazado.
    en: F_E = ρ_f·g·V_s. Slope = ρ_f·g. Buoyancy equals weight of displaced fluid.
  physicalReading:
    es: "Pendiente = ρ_f·g. Flotación: F_E = W → V_s/V_t = ρ_obj/ρ_f."
    en: "Slope = ρ_f·g. Floating: F_E = W → V_s/V_t = ρ_obj/ρ_f."
  slopeMeaning:
    es: "Pendiente = ρ_f·g: peso específico del fluido."
    en: "Slope = ρ_f·g: specific weight of fluid."
  interceptMeaning:
    es: F_E(0) = 0.
    en: F_E(0) = 0.
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "F_E > 0 (↑)."
    en: "F_E > 0 (↑)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0 ≤ V_s ≤ V_t.
    en: 0 ≤ V_s ≤ V_t.
  modelConnection:
    es: Principio de Arquímedes.
    en: "Archimedes' principle."
  formulaConnection:
    es: "F_E = ρ_f·g·V_s, flotación: ρ_obj·V_t = ρ_f·V_s."
    en: "F_E = ρ_f·g·V_s, float: ρ_obj·V_t = ρ_f·V_s."
  readingFocus:
    es: leer pendiente ρ_f·g y el punto donde F_E = W.
    en: read slope ρ_f·g and the point where F_E = W.
  agentHints:
    es:
      - "Flota: ρ_obj < ρ_f."
      - "Hunde: ρ_obj > ρ_f."
      - F_E no depende de la forma.
    en:
      - "Floats: ρ_obj < ρ_f."
      - "Sinks: ρ_obj > ρ_f."
      - F_E independent of shape.
  commonMistakes:
    es:
      - Usar V_t en lugar de V_s.
      - Confundir F_E con W.
      - Pensar que F_E depende de ρ_obj.
    en:
      - Using V_t instead of V_s.
      - Confusing F_E with W.
      - Thinking F_E depends on ρ_obj.

dcl:
  title:
    es: DCL · Principio de Arquímedes
    en: "FBD · Archimedes' Principle"
  forces:
    es:
      - Peso W = ρ_obj·g·V_t (↓)
      - Empuje F_E = ρ_f·g·V_s (↑)
      - Tensión T (↑) si anclado
    en:
      - Weight W = ρ_obj·g·V_t (↓)
      - Buoyancy F_E = ρ_f·g·V_s (↑)
      - Tension T (↑) if tethered
  object:
    es: cuerpo sumergido
    en: submerged body
  relation:
    es: "Flota: F_E = W. Hunde: W > F_E. Anclado: T = W − F_E."
    en: "Floats: F_E = W. Sinks: W > F_E. Tethered: T = W − F_E."
  readingFocus:
    es: comparar F_E y W; calcular T si hay cable.
    en: compare F_E and W; compute T if tethered.
  agentHints:
    es:
      - F_E en B (centroide V_s).
      - W en G (CG del cuerpo).
      - T = W − F_E si anclado.
    en:
      - F_E at B (centroid of V_s).
      - W at G (body CG).
      - T = W − F_E if tethered.
  commonMistakes:
    es:
      - V_t en lugar de V_s para cuerpo parcial.
      - Olvidar T en cuerpo anclado.
      - Confundir G y B.
    en:
      - V_t instead of V_s for partial submersion.
      - Forgetting T for tethered body.
      - Confusing G and B.

svg:
  title:
    es: Escena SVG · Principio de Arquímedes
    en: "SVG Scene · Archimedes' Principle"
  sceneId: arquimedes
  sceneLabel:
    es: Cuerpo sumergido con F_E y W
    en: Submerged body with F_E and W
  objects:
    es:
      - recipiente con fluido
      - cuerpo sumergido
      - vector W (↓)
      - vector F_E (↑)
      - línea de flotación
    en:
      - container with fluid
      - submerged body
      - vector W (↓)
      - vector F_E (↑)
      - waterline
  mainObject:
    es: cuerpo en fluido
    en: body in fluid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Cuerpo sumergido. F_E en B; W en G.
    en: Submerged body. F_E at B; W at G.
  interactions:
    es: F_E = ρ_f·g·V_s (↑); W = mg (↓).
    en: F_E = ρ_f·g·V_s (↑); W = mg (↓).
  modelElements:
    es:
      - F_E = ρ_f·g·V_s
      - W = mg
      - "Flota: F_E ≥ W"
    en:
      - F_E = ρ_f·g·V_s
      - W = mg
      - "Floats: F_E ≥ W"
  visualCues:
    es:
      - F_E larga → ρ_f grande.
      - W larga → objeto pesado.
      - "F_E = W: estático."
    en:
      - Long F_E → large ρ_f.
      - Long W → heavy object.
      - "F_E = W: static."
  scaleMeaning:
    es: Longitud ∝ magnitud.
    en: Length ∝ magnitude.
  relation:
    es: F_E = peso del fluido desplazado.
    en: F_E = weight of displaced fluid.
  physicalReading:
    es: Comparar F_E y W para determinar comportamiento.
    en: Compare F_E and W to determine behaviour.
  modelConnection:
    es: Principio de Arquímedes.
    en: "Archimedes' principle."
  formulaConnection:
    es: F_E = ρ_f·g·V_s, W = ρ_obj·g·V_t.
    en: F_E = ρ_f·g·V_s, W = ρ_obj·g·V_t.
  readingFocus:
    es: comparar F_E y W; deducir flotación o hundimiento.
    en: compare F_E and W; deduce floating or sinking.
  agentHints:
    es:
      - F_E = peso fluido desplazado.
      - ρ_obj < ρ_f → flota.
      - "ρ_obj > ρ_f → hunde."
    en:
      - F_E = weight of displaced fluid.
      - ρ_obj < ρ_f → floats.
      - "ρ_obj > ρ_f → sinks."
  commonMistakes:
    es:
      - F_E no depende de la profundidad.
      - V_s puede ser < V_t.
      - F_E no depende de la forma.
    en:
      - "F_E doesn't depend on depth."
      - V_s can be < V_t.
      - "F_E doesn't depend on shape."
