version: "1.0"
leaf: "principio-de-pascal"

coord:
  title:
    es: Gráfica Coord · Principio de Pascal
    en: "Coord Graph · Pascal's Principle"
  xAxis:
    es: área del émbolo A (m²)
    en: piston area A (m²)
  yAxis:
    es: fuerza F (N)
    en: force F (N)
  xMagnitude: A
  yMagnitude: F
  relation:
    es: "Pascal: F = p·A. Prensa hidráulica: F₂/F₁ = A₂/A₁. La presión se transmite igual en todas las direcciones."
    en: "Pascal: F = p·A. Hydraulic press: F₂/F₁ = A₂/A₁. Pressure transmits equally in all directions."
  physicalReading:
    es: Pendiente = p. F₁ pequeña en A₁ → F₂ = F₁·A₂/A₁ grande en A₂.
    en: Slope = p. Small F₁ on A₁ → large F₂ = F₁·A₂/A₁ on A₂.
  slopeMeaning:
    es: "Pendiente = p (Pa): presión del sistema."
    en: "Slope = p (Pa): system pressure."
  interceptMeaning:
    es: F(0) = 0.
    en: F(0) = 0.
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "F > 0 en dirección de la presión."
    en: "F > 0 in pressure direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "A > 0. Fluido incompresible y estático."
    en: "A > 0. Incompressible static fluid."
  modelConnection:
    es: "Principio de Pascal: base de la hidráulica."
    en: "Pascal's principle: basis of hydraulics."
  formulaConnection:
    es: p = F/A, F₂ = F₁·A₂/A₁, W₁·d₁ = W₂·d₂ (conservación energía).
    en: p = F/A, F₂ = F₁·A₂/A₁, W₁·d₁ = W₂·d₂ (energy conservation).
  readingFocus:
    es: leer p (pendiente) y calcular F₂ = p·A₂.
    en: read p (slope) and compute F₂ = p·A₂.
  agentHints:
    es:
      - F₂/F₁ = A₂/A₁.
      - "Pascal: ∆p se transmite íntegro."
      - "Conservación de energía: F₁·d₁ = F₂·d₂."
    en:
      - F₂/F₁ = A₂/A₁.
      - "Pascal: Δp transmits fully."
      - "Energy conservation: F₁·d₁ = F₂·d₂."
  commonMistakes:
    es:
      - Creer que se multiplica energía.
      - Olvidar que d₂ = d₁·A₁/A₂.
      - No asumir fluido incompresible.
    en:
      - Thinking energy is multiplied.
      - Forgetting d₂ = d₁·A₁/A₂.
      - Not assuming incompressible fluid.

dcl:
  title:
    es: DCL · Principio de Pascal (Prensa Hidráulica)
    en: "FBD · Pascal's Principle (Hydraulic Press)"
  forces:
    es:
      - F₁ = p·A₁ (↓) en émbolo pequeño
      - F₂ = p·A₂ (↑) en émbolo grande
      - Peso de carga W (↓)
    en:
      - F₁ = p·A₁ (↓) on small piston
      - F₂ = p·A₂ (↑) on large piston
      - Load weight W (↓)
  object:
    es: prensa hidráulica con dos émbolos
    en: hydraulic press with two pistons
  relation:
    es: "Equilibrio: F₂ = W → p·A₂ = W → p = F₁/A₁."
    en: "Equilibrium: F₂ = W → p·A₂ = W → p = F₁/A₁."
  readingFocus:
    es: verificar F₁/A₁ = F₂/A₂ = p (misma presión).
    en: verify F₁/A₁ = F₂/A₂ = p (same pressure).
  agentHints:
    es:
      - p = F₁/A₁ = F₂/A₂.
      - F₂/F₁ = A₂/A₁.
      - "Energía conservada: F₁·d₁ = F₂·d₂."
    en:
      - p = F₁/A₁ = F₂/A₂.
      - F₂/F₁ = A₂/A₁.
      - "Energy conserved: F₁·d₁ = F₂·d₂."
  commonMistakes:
    es:
      - Aplicar Pascal en fluidos con diferencia de nivel.
      - Creer que se multiplica la energía.
      - Olvidar la corrección de presión hidrostática si h₁ ≠ h₂.
    en:
      - Applying Pascal with elevation difference.
      - Thinking energy is multiplied.
      - Forgetting hydrostatic correction if h₁ ≠ h₂.

svg:
  title:
    es: Escena SVG · Principio de Pascal
    en: "SVG Scene · Pascal's Principle"
  sceneId: pascal
  sceneLabel:
    es: Prensa hidráulica con dos émbolos
    en: Hydraulic press with two pistons
  objects:
    es:
      - émbolo pequeño A₁
      - émbolo grande A₂
      - fluido incompresible
      - fuerza F₁
      - fuerza F₂ = F₁·A₂/A₁
    en:
      - small piston A₁
      - large piston A₂
      - incompressible fluid
      - force F₁
      - force F₂ = F₁·A₂/A₁
  mainObject:
    es: prensa hidráulica
    en: hydraulic press
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: A₁ ≪ A₂. Misma presión p en ambos émbolos. F₂/F₁ = A₂/A₁.
    en: A₁ ≪ A₂. Same pressure p on both pistons. F₂/F₁ = A₂/A₁.
  interactions:
    es: p = F₁/A₁ = F₂/A₂. F₁·d₁ = F₂·d₂ (conservación energía).
    en: p = F₁/A₁ = F₂/A₂. F₁·d₁ = F₂·d₂ (energy conservation).
  modelElements:
    es:
      - p = F/A
      - F₂ = p·A₂
      - F₁·d₁ = F₂·d₂
    en:
      - p = F/A
      - F₂ = p·A₂
      - F₁·d₁ = F₂·d₂
  visualCues:
    es:
      - F₁ pequeña en A₁.
      - F₂ grande en A₂.
      - Misma presión en el fluido.
    en:
      - Small F₁ on A₁.
      - Large F₂ on A₂.
      - Same pressure in the fluid.
  scaleMeaning:
    es: Longitud de flechas ∝ magnitud de la fuerza.
    en: Arrow length ∝ force magnitude.
  relation:
    es: "Pascal: p = F₁/A₁ = F₂/A₂."
    en: "Pascal: p = F₁/A₁ = F₂/A₂."
  physicalReading:
    es: "F₂/F₁ = A₂/A₁: ventaja mecánica hidráulica."
    en: "F₂/F₁ = A₂/A₁: hydraulic mechanical advantage."
  modelConnection:
    es: "Principio de Pascal: base de la hidráulica."
    en: "Pascal's principle: basis of hydraulics."
  formulaConnection:
    es: p = F/A, F₂ = F₁·A₂/A₁.
    en: p = F/A, F₂ = F₁·A₂/A₁.
  readingFocus:
    es: leer A₁ y A₂ y calcular F₂ = F₁·A₂/A₁.
    en: read A₁ and A₂ and compute F₂ = F₁·A₂/A₁.
  agentHints:
    es:
      - F₂/F₁ = A₂/A₁.
      - Misma presión en todo el fluido.
      - d₂ = d₁·A₁/A₂.
    en:
      - F₂/F₁ = A₂/A₁.
      - Same pressure throughout fluid.
      - d₂ = d₁·A₁/A₂.
  commonMistakes:
    es:
      - Creer que se multiplica la energía.
      - Olvidar la corrección si h₁ ≠ h₂.
      - Usar con fluidos compresibles.
    en:
      - Thinking energy is multiplied.
      - Forgetting correction if h₁ ≠ h₂.
      - Using with compressible fluids.
