version: "1.0"
leaf: "principio-fundamental-de-la-hidrostatica"

coord:
  title:
    es: Gráfica Coord · Principio Fundamental de la Hidrostática
    en: Coord Graph · Fundamental Principle of Hydrostatics
  xAxis:
    es: profundidad h (m)
    en: depth h (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: h
  yMagnitude: p
  relation:
    es: dp/dh = ρg. p = p₀ + ρgh. Dos puntos al mismo nivel en el mismo fluido tienen igual presión.
    en: dp/dh = ρg. p = p₀ + ρgh. Two points at the same level in the same fluid have equal pressure.
  physicalReading:
    es: Pendiente = ρg. La presión crece linealmente con la profundidad.
    en: Slope = ρg. Pressure grows linearly with depth.
  slopeMeaning:
    es: Pendiente = ρg.
    en: Slope = ρg.
  interceptMeaning:
    es: "p₀: presión en la superficie libre."
    en: "p₀: pressure at free surface."
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "p > 0."
    en: "p > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: h ≥ 0.
    en: h ≥ 0.
  modelConnection:
    es: Principio fundamental de la hidrostática.
    en: Fundamental principle of hydrostatics.
  formulaConnection:
    es: p = p₀ + ρgh.
    en: p = p₀ + ρgh.
  readingFocus:
    es: leer pendiente ρg y verificar continuidad de p.
    en: read slope ρg and verify p continuity.
  agentHints:
    es:
      - Mismo nivel → misma p.
      - ρg_agua ≈ 9810 N/m³.
      - Vasos comunicantes.
    en:
      - Same level → same p.
      - ρg_water ≈ 9810 N/m³.
      - Communicating vessels.
  commonMistakes:
    es:
      - Aplicar en fluido en movimiento.
      - Olvidar p₀.
      - No verificar mismo fluido.
    en:
      - Applying in moving fluid.
      - Forgetting p₀.
      - Not verifying same fluid.

dcl:
  title:
    es: DCL · Principio Fundamental de la Hidrostática
    en: FBD · Fundamental Principle of Hydrostatics
  forces:
    es:
      - p₁·A (↓)
      - p₂·A (↑)
      - dW = ρ·g·A·dh (↓)
    en:
      - p₁·A (↓)
      - p₂·A (↑)
      - dW = ρ·g·A·dh (↓)
  object:
    es: elemento diferencial de fluido
    en: differential fluid element
  relation:
    es: ΣF = 0 → dp/dh = ρg.
    en: ΣF = 0 → dp/dh = ρg.
  readingFocus:
    es: verificar ΣF = 0 → dp/dh = ρg.
    en: verify ΣF = 0 → dp/dh = ρg.
  agentHints:
    es:
      - dp/dh = ρg.
      - p aumenta hacia abajo.
      - Mismo nivel → misma p.
    en:
      - dp/dh = ρg.
      - p increases downward.
      - Same level → same p.
  commonMistakes:
    es:
      - Olvidar dW.
      - Invertir signo.
      - Fluidos compresibles sin corregir ρ.
    en:
      - Forgetting dW.
      - Inverting sign.
      - Compressible fluids without correcting ρ.

