version: "1.0"
leaf: "aerodinamica-basica"

coord:
  title:
    es: Gráfica Coord · Aerodinámica Básica
    en: Coord Graph · Basic Aerodynamics
  xAxis:
    es: velocidad del flujo v (m/s)
    en: flow velocity v (m/s)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: v
  yMagnitude: p
  relation:
    es: "Bernoulli: p + ½ρv² + ρgh = cte. A mayor velocidad, menor presión estática."
    en: "Bernoulli: p + ½ρv² + ρgh = const. Higher velocity → lower static pressure."
  physicalReading:
    es: La presión disminuye al aumentar la velocidad en flujo incompresible. Base de la sustentación aerodinámica.
    en: Pressure decreases as velocity increases in incompressible flow. Basis of aerodynamic lift.
  slopeMeaning:
    es: "dp/dv = −ρv: caída de presión con la velocidad."
    en: "dp/dv = −ρv: pressure drop with velocity."
  interceptMeaning:
    es: "p₀: presión de remanso (v = 0)."
    en: "p₀: stagnation pressure (v = 0)."
  curvatureMeaning:
    es: "p ∝ −v²: parábola invertida."
    en: "p ∝ −v²: inverted parabola."
  signMeaning:
    es: "p < p_atm: succión (sustentación, efecto Venturi)."
    en: "p < p_atm: suction (lift, Venturi effect)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: v ≥ 0. Válido para Ma < 0.3 (flujo incompresible).
    en: v ≥ 0. Valid for Ma < 0.3 (incompressible flow).
  modelConnection:
    es: "Aerodinámica básica: Bernoulli aplicado a perfiles aerodinámicos."
    en: "Basic aerodynamics: Bernoulli applied to aerofoils."
  formulaConnection:
    es: p + ½ρv² = cte, L = ½ρv²C_L·A, Re = ρvL/μ.
    en: p + ½ρv² = const, L = ½ρv²C_L·A, Re = ρvL/μ.
  readingFocus:
    es: leer p(v) para identificar zonas de sustentación (p < p_atm).
    en: read p(v) to identify lift zones (p < p_atm).
  agentHints:
    es:
      - "Extradós: v↑, p↓ → sustentación."
      - C_L aumenta con el ángulo de ataque.
      - Re determina régimen laminar/turbulento.
    en:
      - "Upper surface: v↑, p↓ → lift."
      - C_L increases with angle of attack.
      - Re determines laminar/turbulent regime.
  commonMistakes:
    es:
      - "Aplicar Bernoulli en Ma > 0.3."
      - Confundir presión estática con presión total.
      - Ignorar la viscosidad a bajo Re.
    en:
      - "Applying Bernoulli at Ma > 0.3."
      - Confusing static with total pressure.
      - Ignoring viscosity at low Re.

dcl:
  title:
    es: DCL · Aerodinámica Básica
    en: FBD · Basic Aerodynamics
  forces:
    es:
      - Peso W = mg (↓)
      - Sustentación L = ½ρv²C_L·A (↑)
      - Resistencia D = ½ρv²C_D·A (←)
      - Empuje T (→)
    en:
      - Weight W = mg (↓)
      - Lift L = ½ρv²C_L·A (↑)
      - Drag D = ½ρv²C_D·A (←)
      - Thrust T (→)
  object:
    es: perfil aerodinámico
    en: aerofoil
  relation:
    es: "Equilibrio en vuelo nivelado: L = W, T = D."
    en: "Level flight equilibrium: L = W, T = D."
  readingFocus:
    es: identificar L, D, W, T; verificar equilibrio; aplicar L = ½ρv²C_L·A.
    en: identify L, D, W, T; verify equilibrium; apply L = ½ρv²C_L·A.
  agentHints:
    es:
      - "L/D: eficiencia aerodinámica."
      - D = ½ρv²C_D·A.
      - "Entrada en pérdida: ángulo de ataque crítico."
    en:
      - "L/D: aerodynamic efficiency."
      - D = ½ρv²C_D·A.
      - "Stall: critical angle of attack."
  commonMistakes:
    es:
      - Confundir C_L y C_D.
      - Olvidar que L ∝ v².
      - No considerar la resistencia inducida.
    en:
      - Confusing C_L and C_D.
      - Forgetting L ∝ v².
      - Not considering induced drag.

svg:
  title:
    es: Escena SVG · Aerodinámica Básica
    en: SVG Scene · Basic Aerodynamics
  sceneId: aerodinamica_basica
  sceneLabel:
    es: Perfil alar con distribución de presiones
    en: Aerofoil with pressure distribution
  objects:
    es:
      - perfil alar
      - líneas de corriente
      - zona de baja presión (extradós)
      - zona de alta presión (intradós)
      - vectores L y D
    en:
      - aerofoil
      - streamlines
      - low-pressure zone (upper)
      - high-pressure zone (lower)
      - L and D vectors
  mainObject:
    es: perfil aerodinámico
    en: aerofoil
  referenceFrame:
    es: fluido en reposo
    en: rest fluid frame
  geometry:
    es: Líneas de corriente comprimidas sobre el extradós (v↑, p↓); espaciadas en el intradós (v↓, p↑). Diferencia de presión → L.
    en: Streamlines compressed on upper surface (v↑, p↓); spread on lower (v↓, p↑). Pressure difference → L.
  interactions:
    es: "Bernoulli: mayor velocidad → menor presión."
    en: "Bernoulli: higher velocity → lower pressure."
  modelElements:
    es:
      - p + ½ρv² = cte
      - L = ½ρv²C_L·A
      - D = ½ρv²C_D·A
    en:
      - p + ½ρv² = const
      - L = ½ρv²C_L·A
      - D = ½ρv²C_D·A
  visualCues:
    es:
      - Líneas juntas → v↑, p↓.
      - Flecha L ⊥ v.
      - Flecha D opuesta a v.
    en:
      - Close streamlines → v↑, p↓.
      - Arrow L ⊥ v.
      - Arrow D opposite to v.
  scaleMeaning:
    es: Longitud de flechas L y D ∝ magnitud de las fuerzas.
    en: Length of L and D arrows ∝ force magnitude.
  relation:
    es: Distribución de presiones de Bernoulli → sustentación L y resistencia D.
    en: Bernoulli pressure distribution → lift L and drag D.
  physicalReading:
    es: Identificar extradós (baja p) e intradós (alta p) como origen de la sustentación.
    en: Identify upper surface (low p) and lower surface (high p) as origin of lift.
  modelConnection:
    es: Teoría de sustentación de Kutta-Joukowski.
    en: Kutta-Joukowski lift theory.
  formulaConnection:
    es: p + ½ρv² = cte, L = ½ρv²C_L·A.
    en: p + ½ρv² = const, L = ½ρv²C_L·A.
  readingFocus:
    es: identificar zonas de alta y baja presión y el ángulo de ataque.
    en: identify high and low pressure zones and the angle of attack.
  agentHints:
    es:
      - "Extradós: succión."
      - "Intradós: empuje."
      - C_L↑ con ángulo de ataque.
    en:
      - "Upper surface: suction."
      - "Lower surface: push."
      - C_L↑ with angle of attack.
  commonMistakes:
    es:
      - Creer que la sustentación solo se debe a diferencia de caminos.
      - Ignorar el efecto Coanda.
      - Olvidar que D actúa opuesto a v.
    en:
      - Believing lift is solely due to path length.
      - Ignoring Coanda effect.
      - Forgetting D acts opposite to v.
