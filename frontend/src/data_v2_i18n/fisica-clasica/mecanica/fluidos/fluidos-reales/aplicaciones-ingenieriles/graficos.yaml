version: "1.0"
leaf: "aplicaciones-ingenieriles"

coord:
  title:
    es: Gráfica Coord · Aplicaciones Ingenieriles de Fluidos
    en: Coord Graph · Engineering Applications of Fluids
  xAxis:
    es: caudal Q (m³/s)
    en: flow rate Q (m³/s)
  yAxis:
    es: pérdida de presión Δp (Pa) o altura manométrica H (m)
    en: pressure drop Δp (Pa) or head H (m)
  xMagnitude: Q
  yMagnitude: Delta_p
  relation:
    es: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g). Hagen-Poiseuille: Δp = 128μLQ/(πd⁴). Las pérdidas crecen con Q."
    en: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g). Hagen-Poiseuille: Δp = 128μLQ/(πd⁴). Losses grow with Q."
  physicalReading:
    es: Mayor caudal → mayores pérdidas. La curva bomba debe superar las pérdidas del sistema.
    en: Higher Q → greater losses. The pump curve must exceed system losses.
  slopeMeaning:
    es: "dΔp/dQ: resistencia hidráulica del sistema."
    en: "dΔp/dQ: hydraulic resistance of the system."
  interceptMeaning:
    es: "Δp(0) = 0: sin flujo, sin pérdidas."
    en: "Δp(0) = 0: no flow, no losses."
  curvatureMeaning:
    es: "Cuadrática: Δp ∝ Q²."
    en: "Quadratic: Δp ∝ Q²."
  signMeaning:
    es: "Δp > 0: pérdida en el sentido del flujo."
    en: "Δp > 0: loss in flow direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Q ≥ 0. f: factor de fricción de Darcy."
    en: "Q ≥ 0. f: Darcy friction factor."
  modelConnection:
    es: Diseño de redes de tuberías, bombas y sistemas hidráulicos.
    en: Pipe network design, pumps and hydraulic systems.
  formulaConnection:
    es: H_f = f·(L/d)·v²/(2g), Δp = 128μLQ/(πd⁴), curva H-Q de la bomba.
    en: H_f = f·(L/d)·v²/(2g), Δp = 128μLQ/(πd⁴), pump H-Q curve.
  readingFocus:
    es: leer el punto de operación (intersección curva bomba/sistema) y las pérdidas.
    en: read the operating point (pump/system intersection) and losses.
  agentHints:
    es:
      - "Punto de operación: curva bomba ∩ sistema."
      - "Re < 2300: H-P; Re > 4000: D-W."
      - "Cavitación: p < p_vapor."
    en:
      - "Operating point: pump ∩ system curve."
      - "Re < 2300: H-P; Re > 4000: D-W."
      - "Cavitation: p < p_vapor."
  commonMistakes:
    es:
      - Usar Hagen-Poiseuille en flujo turbulento.
      - Olvidar pérdidas menores.
      - No verificar NPSH de la bomba.
    en:
      - Using H-P in turbulent flow.
      - Forgetting minor losses.
      - Not verifying pump NPSH.

svg:
  title:
    es: Escena SVG · Aplicaciones Ingenieriles de Fluidos
    en: SVG Scene · Engineering Applications of Fluids
  sceneId: aplicaciones_ingenieriles
  sceneLabel:
    es: Red de tuberías con bomba y válvula
    en: Pipe network with pump and valve
  objects:
    es:
      - tubería
      - bomba
      - válvula
      - manómetro
      - codo
    en:
      - pipe
      - pump
      - valve
      - pressure gauge
      - elbow
  mainObject:
    es: sistema de tuberías
    en: pipe system
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Flujo de izquierda a derecha. Bomba aumenta presión; válvula la regula; codos generan pérdidas menores.
    en: Flow left to right. Pump increases pressure; valve regulates it; elbows cause minor losses.
  interactions:
    es: "Bernoulli extendido: p₁/ρg + v₁²/(2g) + z₁ + H_bomba = p₂/ρg + v₂²/(2g) + z₂ + H_f."
    en: "Extended Bernoulli: p₁/ρg + v₁²/(2g) + z₁ + H_pump = p₂/ρg + v₂²/(2g) + z₂ + H_f."
  modelElements:
    es:
      - H_f = f·(L/d)·v²/(2g)
      - H_bomba = curva H-Q
      - A₁v₁ = A₂v₂
    en:
      - H_f = f·(L/d)·v²/(2g)
      - H_pump = H-Q curve
      - A₁v₁ = A₂v₂
  visualCues:
    es:
      - Flecha ↑ en bomba (presión sube).
      - "Manómetro: presión en el punto."
      - "Codo: pérdida K_e·v²/(2g)."
    en:
      - Arrow ↑ at pump (pressure rises).
      - "Gauge: pressure at point."
      - "Elbow: loss K_e·v²/(2g)."
  scaleMeaning:
    es: Diámetro de tubería ∝ caudal que transporta.
    en: Pipe diameter ∝ flow rate it carries.
  relation:
    es: Bernoulli extendido + continuidad + pérdidas de carga.
    en: Extended Bernoulli + continuity + head losses.
  physicalReading:
    es: Trazar la línea de energía total y el gradiente hidráulico a lo largo del sistema.
    en: Trace the total energy line and hydraulic gradient along the system.
  modelConnection:
    es: Mecánica de fluidos aplicada a ingeniería hidráulica.
    en: Fluid mechanics applied to hydraulic engineering.
  formulaConnection:
    es: Bernoulli extendido, Darcy-Weisbach, continuidad.
    en: Extended Bernoulli, Darcy-Weisbach, continuity.
  readingFocus:
    es: identificar pérdidas, punto de operación y función de cada componente.
    en: identify losses, operating point and function of each component.
  agentHints:
    es:
      - Línea de energía siempre decrece.
      - "Bomba: la eleva."
      - "Válvula cerrada: Q = 0."
    en:
      - Energy line always decreases.
      - "Pump: raises it."
      - "Closed valve: Q = 0."
  commonMistakes:
    es:
      - Olvidar cota z en Bernoulli.
      - No sumar pérdidas menores.
      - Ignorar cavitación.
    en:
      - Forgetting elevation z in Bernoulli.
      - Not summing minor losses.
      - Ignoring cavitation.
