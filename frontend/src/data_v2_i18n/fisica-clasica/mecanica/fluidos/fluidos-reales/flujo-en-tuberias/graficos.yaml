version: "1.0"
leaf: "flujo-en-tuberias"

coord:
  title:
    es: Gráfica Coord · Flujo en Tuberías
    en: Coord Graph · Pipe Flow
  xAxis:
    es: longitud de tubería L (m)
    en: pipe length L (m)
  yAxis:
    es: pérdida de carga H_f (m)
    en: head loss H_f (m)
  xMagnitude: L
  yMagnitude: H_f
  relation:
    es: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g). Pérdidas crecen linealmente con L. f: factor de fricción (diagrama de Moody)."
    en: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g). Losses grow linearly with L. f: friction factor (Moody diagram)."
  physicalReading:
    es: Recta de pendiente f·v²/(2gd). Mayor rugosidad o mayor Re → mayor f → mayor H_f.
    en: Line with slope f·v²/(2gd). Higher roughness or Re → higher f → higher H_f.
  slopeMeaning:
    es: "Pendiente = f·v²/(2gd): pérdida por metro de tubería."
    en: "Slope = f·v²/(2gd): loss per metre of pipe."
  interceptMeaning:
    es: "H_f(0) = 0: sin longitud, sin pérdidas de fricción."
    en: "H_f(0) = 0: no length, no friction losses."
  curvatureMeaning:
    es: Lineal en L; cuadrático en v.
    en: Linear in L; quadratic in v.
  signMeaning:
    es: "H_f > 0: pérdida de energía en el sentido del flujo."
    en: "H_f > 0: energy loss in flow direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "L ≥ 0. f: laminar: 64/Re; turbulento: diagrama de Moody."
    en: "L ≥ 0. f: laminar: 64/Re; turbulent: Moody diagram."
  modelConnection:
    es: "Pérdidas de carga en tuberías: Darcy-Weisbach."
    en: "Head losses in pipes: Darcy-Weisbach."
  formulaConnection:
    es: "H_f = f·(L/d)·v²/(2g), f_lam = 64/Re, f_turb: Moody."
    en: "H_f = f·(L/d)·v²/(2g), f_lam = 64/Re, f_turb: Moody."
  readingFocus:
    es: leer la pendiente f·v²/(2gd) para calcular H_f en cualquier longitud L.
    en: read slope f·v²/(2gd) to compute H_f at any length L.
  agentHints:
    es:
      - H_f ∝ L·v².
      - f_laminar = 64/Re.
      - "Moody: f = f(Re, ε/d)."
    en:
      - H_f ∝ L·v².
      - f_laminar = 64/Re.
      - "Moody: f = f(Re, ε/d)."
  commonMistakes:
    es:
      - Usar f_laminar en flujo turbulento.
      - Olvidar pérdidas menores (codos, válvulas).
      - Aplicar Bernoulli sin corregir H_f.
    en:
      - Using f_laminar in turbulent flow.
      - Forgetting minor losses (elbows, valves).
      - Applying Bernoulli without correcting H_f.

svg:
  title:
    es: Escena SVG · Flujo en Tuberías
    en: SVG Scene · Pipe Flow
  sceneId: flujo_tuberias
  sceneLabel:
    es: Tubería con línea de energía y gradiente hidráulico
    en: Pipe with energy line and hydraulic gradient
  objects:
    es:
      - tubería horizontal
      - línea de energía total
      - línea piezométrica
      - manómetros
      - perfil de velocidad
    en:
      - horizontal pipe
      - total energy line
      - piezometric line
      - pressure gauges
      - velocity profile
  mainObject:
    es: fluido en tubería con pérdidas
    en: fluid in pipe with losses
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: La línea de energía (EGL) decrece con pendiente H_f/L = f·v²/(2gd). La línea piezométrica (HGL) está f·v²/(2g) por debajo de la EGL.
    en: The energy grade line (EGL) decreases with slope H_f/L = f·v²/(2gd). The piezometric line (HGL) is v²/(2g) below the EGL.
  interactions:
    es: "Bernoulli extendido: EGL₁ − EGL₂ = H_f."
    en: "Extended Bernoulli: EGL₁ − EGL₂ = H_f."
  modelElements:
    es:
      - EGL = p/ρg + v²/(2g) + z
      - HGL = p/ρg + z
      - H_f = f·(L/d)·v²/(2g)
    en:
      - EGL = p/ρg + v²/(2g) + z
      - HGL = p/ρg + z
      - H_f = f·(L/d)·v²/(2g)
  visualCues:
    es:
      - EGL decrece linealmente.
      - HGL paralela a EGL, separada por v²/(2g).
      - "Pérdidas menores: saltos en la EGL."
    en:
      - EGL decreases linearly.
      - HGL parallel to EGL, separated by v²/(2g).
      - "Minor losses: steps in the EGL."
  scaleMeaning:
    es: Pendiente de la EGL = H_f/L = f·v²/(2gd).
    en: EGL slope = H_f/L = f·v²/(2gd).
  relation:
    es: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g)."
    en: "Darcy-Weisbach: H_f = f·(L/d)·v²/(2g)."
  physicalReading:
    es: La pendiente de la EGL indica la tasa de pérdida de carga por unidad de longitud.
    en: The slope of the EGL indicates the head loss rate per unit length.
  modelConnection:
    es: "Flujo en tuberías con pérdidas: Bernoulli extendido."
    en: "Pipe flow with losses: extended Bernoulli."
  formulaConnection:
    es: H_f = f·(L/d)·v²/(2g), EGL, HGL.
    en: H_f = f·(L/d)·v²/(2g), EGL, HGL.
  readingFocus:
    es: leer la pendiente de la EGL para calcular H_f y verificar si la presión es positiva.
    en: read the EGL slope to compute H_f and check if pressure is positive.
  agentHints:
    es:
      - EGL siempre decrece (pérdidas).
      - HGL por debajo de la EGL en v²/(2g).
      - "Si HGL < tubería: presión negativa (cavitación)."
    en:
      - EGL always decreases (losses).
      - HGL below EGL by v²/(2g).
      - "If HGL < pipe: negative pressure (cavitation)."
  commonMistakes:
    es:
      - Confundir EGL y HGL.
      - Olvidar que la EGL cae incluso en tubería horizontal.
      - No sumar pérdidas menores.
    en:
      - Confusing EGL and HGL.
      - Forgetting EGL falls even in horizontal pipe.
      - Not adding minor losses.
