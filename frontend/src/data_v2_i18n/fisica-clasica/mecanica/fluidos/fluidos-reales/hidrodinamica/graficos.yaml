version: "1.0"
leaf: "hidrodinamica"

coord:
  title:
    es: Gráfica Coord · Hidrodinámica
    en: Coord Graph · Hydrodynamics
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: velocidad v (m/s) o presión p (Pa)
    en: velocity v (m/s) or pressure p (Pa)
  xMagnitude: x
  yMagnitude: v
  relation:
    es: "Hidrodinámica: estudio del fluido en movimiento. Bernoulli: p + ½ρv² + ρgh = cte. Continuidad: A₁v₁ = A₂v₂."
    en: "Hydrodynamics: study of fluid in motion. Bernoulli: p + ½ρv² + ρgh = const. Continuity: A₁v₁ = A₂v₂."
  physicalReading:
    es: La velocidad del fluido varía con la sección (continuidad) y con la presión (Bernoulli).
    en: Fluid velocity varies with cross-section (continuity) and pressure (Bernoulli).
  slopeMeaning:
    es: "dv/dx: aceleración convectiva del fluido."
    en: "dv/dx: convective acceleration of the fluid."
  interceptMeaning:
    es: "v₀: velocidad inicial del flujo."
    en: "v₀: initial flow velocity."
  curvatureMeaning:
    es: Curvatura de v(x) refleja la variación de sección de la tubería.
    en: Curvature of v(x) reflects the variation of pipe cross-section.
  signMeaning:
    es: "v > 0: flujo en sentido positivo."
    en: "v > 0: flow in positive direction."
  areaMeaning:
    es: Área bajo v(t) = desplazamiento del fluido.
    en: Area under v(t) = fluid displacement.
  domainMeaning:
    es: "Flujo incompresible, estacionario. Re < 2300: laminar; Re > 4000: turbulento."
    en: "Incompressible, steady flow. Re < 2300: laminar; Re > 4000: turbulent."
  modelConnection:
    es: "Hidrodinámica: Bernoulli + continuidad + ecuaciones de Navier-Stokes simplificadas."
    en: "Hydrodynamics: Bernoulli + continuity + simplified Navier-Stokes equations."
  formulaConnection:
    es: p + ½ρv² + ρgh = cte, Q = Av, Re = ρvd/μ.
    en: p + ½ρv² + ρgh = const, Q = Av, Re = ρvd/μ.
  readingFocus:
    es: leer la distribución v(x) para identificar aceleraciones y variaciones de presión.
    en: read the v(x) distribution to identify accelerations and pressure changes.
  agentHints:
    es:
      - v↑ en sección estrecha.
      - p↓ cuando v↑ (Bernoulli).
      - Re determina el régimen.
    en:
      - v↑ in narrow section.
      - p↓ when v↑ (Bernoulli).
      - Re determines regime.
  commonMistakes:
    es:
      - Aplicar Bernoulli en flujo viscoso.
      - Olvidar la continuidad.
      - No evaluar Re antes de asumir régimen.
    en:
      - Applying Bernoulli in viscous flow.
      - Forgetting continuity.
      - Not evaluating Re before assuming regime.

svg:
  title:
    es: Escena SVG · Hidrodinámica
    en: SVG Scene · Hydrodynamics
  sceneId: hidrodinamica
  sceneLabel:
    es: Líneas de corriente en flujo estacionario
    en: Streamlines in steady flow
  objects:
    es:
      - líneas de corriente
      - vectores de velocidad
      - perfil de velocidad
      - línea de energía
      - gradiente hidráulico
    en:
      - streamlines
      - velocity vectors
      - velocity profile
      - energy line
      - hydraulic gradient
  mainObject:
    es: fluido en movimiento
    en: moving fluid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Líneas de corriente tangentes al vector velocidad. Más juntas → mayor velocidad. La línea de energía decrece en la dirección del flujo.
    en: Streamlines tangent to velocity vector. Closer lines → higher velocity. Energy line decreases in flow direction.
  interactions:
    es: "Bernoulli: la suma p + ½ρv² + ρgh es constante a lo largo de una línea de corriente."
    en: "Bernoulli: the sum p + ½ρv² + ρgh is constant along a streamline."
  modelElements:
    es:
      - p + ½ρv² + ρgh = cte
      - Q = Av = cte
      - Re = ρvd/μ
    en:
      - p + ½ρv² + ρgh = const
      - Q = Av = const
      - Re = ρvd/μ
  visualCues:
    es:
      - Líneas de corriente más juntas → v↑.
      - Línea de energía horizontal en flujo ideal.
      - Gradiente hidráulico = línea piezométrica.
    en:
      - Closer streamlines → v↑.
      - Horizontal energy line in ideal flow.
      - Hydraulic gradient = piezometric line.
  scaleMeaning:
    es: Densidad de líneas de corriente ∝ velocidad del fluido.
    en: Streamline density ∝ fluid velocity.
  relation:
    es: Bernoulli + continuidad en flujo estacionario.
    en: Bernoulli + continuity in steady flow.
  physicalReading:
    es: Identificar zonas de alta y baja velocidad (densidad de líneas de corriente).
    en: Identify high and low velocity zones (streamline density).
  modelConnection:
    es: "Hidrodinámica: flujo estacionario e incompresible."
    en: "Hydrodynamics: steady incompressible flow."
  formulaConnection:
    es: p + ½ρv² + ρgh = cte, Q = Av.
    en: p + ½ρv² + ρgh = const, Q = Av.
  readingFocus:
    es: leer la densidad de líneas de corriente para estimar la velocidad relativa.
    en: read streamline density to estimate relative velocity.
  agentHints:
    es:
      - "Líneas juntas: v↑, p↓."
      - Línea de energía decrece con las pérdidas.
      - Piezométrica = línea de energía − v²/(2g).
    en:
      - "Close lines: v↑, p↓."
      - Energy line decreases with losses.
      - Piezometric = energy line − v²/(2g).
  commonMistakes:
    es:
      - Confundir línea de corriente con trayectoria en flujo no estacionario.
      - Interpretar la separación de líneas sin considerar la escala.
      - Olvidar que la línea de energía cae en flujo real.
    en:
      - Confusing streamline with trajectory in unsteady flow.
      - Interpreting line separation without considering scale.
      - Forgetting energy line falls in real flow.
