version: "1.0"
leaf: "compresibilidad"

coord:
  title:
    es: Gráfica Coord · Compresibilidad de Fluidos
    en: Coord Graph · Fluid Compressibility
  xAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  yAxis:
    es: densidad ρ (kg/m³)
    en: density ρ (kg/m³)
  xMagnitude: p
  yMagnitude: rho
  relation:
    es: "K = −V·dp/dV = ρ·dp/dρ. Gases: ρ ∝ p. Líquidos: K ≫ 1 GPa (casi incompresibles)."
    en: "K = −V·dp/dV = ρ·dp/dρ. Gases: ρ ∝ p. Liquids: K ≫ 1 GPa (nearly incompressible)."
  physicalReading:
    es: "Líquidos: curva casi plana. Gases: pendiente significativa. Mayor K → fluido más rígido."
    en: "Liquids: nearly flat curve. Gases: significant slope. Higher K → stiffer fluid."
  slopeMeaning:
    es: "dρ/dp = ρ/K: mayor pendiente → más compresible."
    en: "dρ/dp = ρ/K: steeper slope → more compressible."
  interceptMeaning:
    es: "ρ(p₀): densidad a presión de referencia."
    en: "ρ(p₀): density at reference pressure."
  curvatureMeaning:
    es: Lineal para gases ideales; plana para líquidos.
    en: Linear for ideal gases; flat for liquids.
  signMeaning:
    es: "ρ > 0, K > 0 siempre."
    en: "ρ > 0, K > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "p > 0. K_agua ≈ 2.2 GPa; K_aire ≈ 1.4p (isentrópico)."
    en: "p > 0. K_water ≈ 2.2 GPa; K_air ≈ 1.4p (isentropic)."
  modelConnection:
    es: "Compresibilidad: determina si se usa flujo compresible (Ma > 0.3) o incompresible."
    en: "Compressibility: determines whether to use compressible (Ma > 0.3) or incompressible flow."
  formulaConnection:
    es: K = −V·dp/dV, c = √(K/ρ), Ma = v/c.
    en: K = −V·dp/dV, c = √(K/ρ), Ma = v/c.
  readingFocus:
    es: leer dρ/dp para estimar K y decidir si el flujo es compresible.
    en: read dρ/dp to estimate K and decide if the flow is compressible.
  agentHints:
    es:
      - "Ma < 0.3: flujo incompresible."
      - c = √(γRT) para gases ideales.
      - K_agua ≈ 2.2 GPa.
    en:
      - "Ma < 0.3: incompressible flow."
      - c = √(γRT) for ideal gases.
      - K_water ≈ 2.2 GPa.
  commonMistakes:
    es:
      - "Usar Bernoulli en Ma > 0.3."
      - Confundir Ma supersónico con subsónico.
      - No corregir ρ a alta velocidad.
    en:
      - "Using Bernoulli at Ma > 0.3."
      - Confusing supersonic with subsonic Ma.
      - Not correcting ρ at high speed.

svg:
  title:
    es: Escena SVG · Compresibilidad de Fluidos
    en: SVG Scene · Fluid Compressibility
  sceneId: compresibilidad
  sceneLabel:
    es: Líquido vs. gas bajo compresión
    en: Liquid vs. gas under compression
  objects:
    es:
      - émbolo
      - líquido (casi incompresible)
      - gas (compresible)
      - indicadores de presión
    en:
      - piston
      - liquid (nearly incompressible)
      - gas (compressible)
      - pressure indicators
  mainObject:
    es: fluido bajo compresión
    en: fluid under compression
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Cilindro con émbolo. Izquierda: líquido; volumen casi constante. Derecha: gas; volumen disminuye apreciablemente."
    en: "Cylinder with piston. Left: liquid; volume nearly constant. Right: gas; volume decreases appreciably."
  interactions:
    es: K_líquido grande → poca compresión. K_gas ≈ γp → gran compresión.
    en: Large K_liquid → small compression. K_gas ≈ γp → large compression.
  modelElements:
    es:
      - K = −V·dp/dV
      - c = √(K/ρ)
      - Ma = v/c
    en:
      - K = −V·dp/dV
      - c = √(K/ρ)
      - Ma = v/c
  visualCues:
    es:
      - "Líquido: volumen casi igual."
      - "Gas: volumen reducido."
      - K_líquido ≫ K_gas.
    en:
      - "Liquid: nearly same volume."
      - "Gas: reduced volume."
      - K_liquid ≫ K_gas.
  scaleMeaning:
    es: Desplazamiento del émbolo ∝ compresibilidad del fluido.
    en: Piston displacement ∝ fluid compressibility.
  relation:
    es: "K = −V·dp/dV: módulo de compresibilidad."
    en: "K = −V·dp/dV: bulk modulus."
  physicalReading:
    es: Comparar deformación volumétrica del líquido vs. gas bajo la misma presión.
    en: Compare volumetric deformation of liquid vs. gas under the same pressure.
  modelConnection:
    es: Compresibilidad como propiedad del fluido.
    en: Compressibility as a fluid property.
  formulaConnection:
    es: K = −V·dp/dV, c = √(K/ρ), Ma = v/c.
    en: K = −V·dp/dV, c = √(K/ρ), Ma = v/c.
  readingFocus:
    es: comparar el cambio de volumen del líquido y el gas bajo la misma fuerza.
    en: compare the volume change of liquid and gas under the same force.
  agentHints:
    es:
      - "Líquido: K grande, casi incompresible."
      - "Gas: K ≈ γp, compresible."
      - "c = √(K/ρ): velocidad del sonido."
    en:
      - "Liquid: large K, nearly incompressible."
      - "Gas: K ≈ γp, compressible."
      - "c = √(K/ρ): speed of sound."
  commonMistakes:
    es:
      - Tratar agua como perfectamente incompresible.
      - No distinguir K isotérmico de isentrópico.
      - Olvidar Ma para decidir régimen.
    en:
      - Treating water as perfectly incompressible.
      - Not distinguishing isothermal from isentropic K.
      - Forgetting Ma to decide regime.
