version: 5
magnitudes:
  - id: beta
    symbol: "\\beta"
    nombre:
      es: "Compresibilidad"
      en: "Compressibility"
    unidad_si: "Pa^{-1}"
    descripcion:
      es: "Medida del cambio relativo de volumen de un fluido por unidad de presión aplicada."
      en: "Measure of the relative change in fluid volume per unit of applied pressure."
    dimension: "M^{-1}LT^2"
    is_vector: false
    components: []
    category: "propiedad-material"
    physical_role: "coeficiente de respuesta"
    used_in: ["fundamentos", "acústica", "hidrodinámica"]
    common_mistake: "Confundirla con el módulo volumétrico (son inversas)."
    typical_range: [1e-11, 1e-9]
    sign_behavior: "Siempre positiva (el signo menos en la fórmula asegura esto ya que dV es negativo)."
    zero_behavior: "Cero implica un fluido perfectamente incompresible."
    value_nature: "continuo"
    interpretation_role: "sensibilidad"
    graph_binding: "pendiente"
    pedagogical_notes: "Explica por qué los líquidos se consideran incompresibles en ingeniería básica."

  - id: B
    symbol: "B"
    nombre:
      es: "Módulo Volumétrico"
      en: "Bulk Modulus"
    unidad_si: "Pa"
    descripcion:
      es: "Resistencia de un fluido a la compresión uniforme."
      en: "Resistance of a fluid to uniform compression."
    dimension: "ML^{-1}T^{-2}"
    is_vector: false
    components: []
    category: "propiedad-material"
    physical_role: "parámetro elástico"
    used_in: ["fundamentos", "elasticidad", "velocidad del sonido"]
    common_mistake: "Olvidar que unidades son Pascales (igual que presión)."
    typical_range: [1e8, 1e10]
    sign_behavior: "Siempre positivo."
    zero_behavior: "No puede ser cero para un fluido real."
    value_nature: "continuo"
    interpretation_role: "rigidez"
    graph_binding: "escala"
    pedagogical_notes: "Magnitud inversa a la compresibilidad."

  - id: V
    symbol: "V"
    nombre:
      es: "Volumen Inicial"
      en: "Initial Volume"
    unidad_si: "m^3"
    descripcion:
      es: "Espacio tridimensional ocupado por la masa de fluido antes de la compresión."
      en: "Three-dimensional space occupied by the fluid mass before compression."
    dimension: "L^3"
    is_vector: false
    components: []
    category: "geometría"
    physical_role: "condición inicial"
    used_in: ["termodinámica", "estática de fluidos"]
    common_mistake: "Confundir con volumen final o cambio de volumen."
    typical_range: [1e-6, 1e2]
    sign_behavior: "Siempre estrictamente positivo."
    zero_behavior: "Nulo implica ausencia de materia."
    value_nature: "extensiva"
    interpretation_role: "referencia"
    graph_binding: "punto-inicio"
    pedagogical_notes: "Variable de referencia para calcular el cambio relativo."

  - id: dV
    symbol: "dV"
    nombre:
      es: "Cambio de Volumen"
      en: "Volume Change"
    unidad_si: "m^3"
    descripcion:
      es: "Variación infinitesimal o incremental del volumen debido a la presión externa."
      en: "Infinitesimal or incremental variation in volume due to external pressure."
    dimension: "L^3"
    is_vector: false
    components: []
    category: "cinemática"
    physical_role: "respuesta"
    used_in: ["termodinámica", "mecánica de medios continuos"]
    common_mistake: "Olvidar el signo (dV es negativo si el volumen disminuye)."
    typical_range: [-1e-2, 0]
    sign_behavior: "Generalmente negativo para compresión."
    zero_behavior: "Indica que no hubo deformación volumétrica."
    value_nature: "diferencial"
    interpretation_role: "deformación"
    graph_binding: "incremento-y"
    pedagogical_notes: "Directamente proporcional a la fuerza aplicada en regímenes elásticos."

  - id: dp
    symbol: "dp"
    nombre:
      es: "Cambio de Presión"
      en: "Pressure Change"
    unidad_si: "Pa"
    descripcion:
      es: "Incremento de presión externa aplicado al volumen de fluido."
      en: "Increase in external pressure applied to the fluid volume."
    dimension: "ML^{-1}T^{-2}"
    is_vector: false
    components: []
    category: "dinámica"
    physical_role: "estímulo"
    used_in: ["fundamentos", "acústica"]
    common_mistake: "Confundir con la presión absoluta."
    typical_range: [1e3, 1e7]
    sign_behavior: "Positivo para compresión."
    zero_behavior: "No hay cambio en el estado tensional del fluido."
    value_nature: "incremental"
    interpretation_role: "carga"
    graph_binding: "incremento-x"
    pedagogical_notes: "Causa física de la deformación volumétrica."
