version: "1.0"
leaf: "concepto-de-fluido"

coord:
  title:
    es: Gráfica Coord · Concepto de Fluido
    en: Coord Graph · Concept of Fluid
  xAxis:
    es: tasa de deformación dv/dy (s⁻¹)
    en: shear strain rate dv/dy (s⁻¹)
  yAxis:
    es: tensión tangencial τ (Pa)
    en: shear stress τ (Pa)
  xMagnitude: dvdy
  yMagnitude: tau
  relation:
    es: "Fluido newtoniano: τ = μ·(dv/dy). La tensión tangencial es proporcional al gradiente de velocidad."
    en: "Newtonian fluid: τ = μ·(dv/dy). Shear stress is proportional to the velocity gradient."
  physicalReading:
    es: Recta de pendiente μ. Un fluido se deforma continuamente ante cualquier τ. μ_agua ≈ 10⁻³ Pa·s; μ_aire ≈ 1.8×10⁻⁵ Pa·s.
    en: Line with slope μ. A fluid deforms continuously under any τ. μ_water ≈ 10⁻³ Pa·s; μ_air ≈ 1.8×10⁻⁵ Pa·s.
  slopeMeaning:
    es: "Pendiente = μ (Pa·s): viscosidad dinámica."
    en: "Slope = μ (Pa·s): dynamic viscosity."
  interceptMeaning:
    es: "τ(0) = 0: sin gradiente, sin tensión (fluido newtoniano)."
    en: "τ(0) = 0: no gradient, no stress (Newtonian fluid)."
  curvatureMeaning:
    es: Lineal para newtonianos. Curvatura → no newtoniano.
    en: Linear for Newtonian fluids. Curvature → non-Newtonian.
  signMeaning:
    es: "τ > 0: resistencia al deslizamiento."
    en: "τ > 0: resistance to sliding."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: dv/dy ≥ 0. Válido para fluidos newtonianos a T constante.
    en: dv/dy ≥ 0. Valid for Newtonian fluids at constant T.
  modelConnection:
    es: "Definición de fluido: deformación continua ante τ. Ley de Newton de la viscosidad."
    en: "Fluid definition: continuous deformation under τ. Newton's law of viscosity."
  formulaConnection:
    es: τ = μ·(dv/dy), ν = μ/ρ, Re = ρvL/μ.
    en: τ = μ·(dv/dy), ν = μ/ρ, Re = ρvL/μ.
  readingFocus:
    es: leer la pendiente μ; verificar si τ vs. dv/dy es lineal (newtoniano) o no.
    en: read slope μ; verify if τ vs. dv/dy is linear (Newtonian) or not.
  agentHints:
    es:
      - μ_agua(20°C) ≈ 10⁻³ Pa·s.
      - "Fluido no newtoniano: curva no lineal."
      - ν = μ/ρ.
    en:
      - μ_water(20°C) ≈ 10⁻³ Pa·s.
      - "Non-Newtonian fluid: nonlinear curve."
      - ν = μ/ρ.
  commonMistakes:
    es:
      - Confundir μ (Pa·s) con ν (m²/s).
      - Tratar no newtoniano como newtoniano.
      - Olvidar que μ depende de T.
    en:
      - Confusing μ (Pa·s) with ν (m²/s).
      - Treating non-Newtonian as Newtonian.
      - Forgetting μ depends on T.

svg:
  title:
    es: Escena SVG · Concepto de Fluido (Couette)
    en: SVG Scene · Concept of Fluid (Couette)
  sceneId: concepto_fluido
  sceneLabel:
    es: Fluido entre dos placas paralelas (Couette)
    en: Fluid between two parallel plates (Couette)
  objects:
    es:
      - placa inferior fija
      - placa superior móvil (v = U)
      - fluido entre placas
      - perfil de velocidad lineal
      - vector τ
    en:
      - fixed lower plate
      - moving upper plate (v = U)
      - fluid between plates
      - linear velocity profile
      - shear stress vector τ
  mainObject:
    es: fluido newtoniano entre placas
    en: Newtonian fluid between plates
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Placa inferior fija (v = 0), placa superior a U. Perfil lineal v(y) = U·y/h.
    en: Fixed lower plate (v = 0), upper plate at U. Linear profile v(y) = U·y/h.
  interactions:
    es: "τ = μ·U/h: constante en el fluido (Couette simple)."
    en: "τ = μ·U/h: constant throughout the fluid (simple Couette)."
  modelElements:
    es:
      - τ = μ·(dv/dy)
      - v(y) = U·y/h
      - F = μ·U·A/h
    en:
      - τ = μ·(dv/dy)
      - v(y) = U·y/h
      - F = μ·U·A/h
  visualCues:
    es:
      - "Perfil: triángulo (0 en y=0, U en y=h)."
      - τ constante.
      - F para mover la placa.
    en:
      - "Profile: triangle (0 at y=0, U at y=h)."
      - τ constant.
      - F to move the plate.
  scaleMeaning:
    es: Inclinación del perfil ∝ dv/dy = τ/μ.
    en: Profile slope ∝ dv/dy = τ/μ.
  relation:
    es: "τ = μ·U/h: viscosidad como resistencia al deslizamiento."
    en: "τ = μ·U/h: viscosity as resistance to sliding."
  physicalReading:
    es: La placa superior arrastra el fluido; la viscosidad transmite el esfuerzo a la placa inferior.
    en: The upper plate drags the fluid; viscosity transmits stress to the lower plate.
  modelConnection:
    es: Definición de fluido y viscosidad.
    en: Fluid definition and viscosity.
  formulaConnection:
    es: τ = μ·(dv/dy), F = μ·A·U/h.
    en: τ = μ·(dv/dy), F = μ·A·U/h.
  readingFocus:
    es: leer el perfil lineal y calcular τ = μ·U/h.
    en: read the linear profile and compute τ = μ·U/h.
  agentHints:
    es:
      - Perfil lineal → Couette.
      - τ = μ·U/h para placas.
      - No lineal → Poiseuille.
    en:
      - Linear profile → Couette.
      - τ = μ·U/h for plates.
      - Non-linear → Poiseuille.
  commonMistakes:
    es:
      - Confundir Couette y Poiseuille.
      - Olvidar condición de no deslizamiento.
      - No distinguir μ de ν.
    en:
      - Confusing Couette and Poiseuille.
      - Forgetting no-slip condition.
      - Not distinguishing μ from ν.
