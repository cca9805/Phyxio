version: "1.0"
leaf: "densidad"

coord:
  title:
    es: Gráfica Coord · Densidad de Fluidos
    en: Coord Graph · Fluid Density
  xAxis:
    es: temperatura T (°C)
    en: temperature T (°C)
  yAxis:
    es: densidad ρ (kg/m³)
    en: density ρ (kg/m³)
  xMagnitude: T
  yMagnitude: rho
  relation:
    es: "ρ_agua(4°C) ≈ 1000 kg/m³ (máximo). Gas ideal: ρ = pM/(RT). Líquidos: ρ ≈ ρ₀(1 − β·ΔT)."
    en: "ρ_water(4°C) ≈ 1000 kg/m³ (maximum). Ideal gas: ρ = pM/(RT). Liquids: ρ ≈ ρ₀(1 − β·ΔT)."
  physicalReading:
    es: "El agua tiene máximo en 4°C. Gases: ρ ∝ 1/T. La densidad determina flotación y presión hidrostática."
    en: "Water has maximum at 4°C. Gases: ρ ∝ 1/T. Density determines buoyancy and hydrostatic pressure."
  slopeMeaning:
    es: "dρ/dT: coeficiente de expansión β = −(1/ρ)·dρ/dT."
    en: "dρ/dT: expansion coefficient β = −(1/ρ)·dρ/dT."
  interceptMeaning:
    es: "ρ(T₀): densidad a temperatura de referencia."
    en: "ρ(T₀): density at reference temperature."
  curvatureMeaning:
    es: "Agua: curva con máximo en 4°C. Gas ideal: hipérbola."
    en: "Water: curve with maximum at 4°C. Ideal gas: hyperbola."
  signMeaning:
    es: "ρ > 0 siempre."
    en: "ρ > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "T > −273.15°C. ρ_Hg ≈ 13600; ρ_agua ≈ 1000; ρ_aire ≈ 1.2 kg/m³."
    en: "T > −273.15°C. ρ_Hg ≈ 13600; ρ_water ≈ 1000; ρ_air ≈ 1.2 kg/m³."
  modelConnection:
    es: "Densidad: propiedad fundamental que controla flotación, presión y caudal másico."
    en: "Density: fundamental property controlling buoyancy, pressure and mass flow rate."
  formulaConnection:
    es: ρ = m/V, p = ρgh, F_arch = ρ_f·g·V_sum, ρ_gas = pM/(RT).
    en: ρ = m/V, p = ρgh, F_arch = ρ_f·g·V_sub, ρ_gas = pM/(RT).
  readingFocus:
    es: leer ρ a la temperatura de trabajo para calcular presión hidrostática y empuje.
    en: read ρ at working temperature to compute hydrostatic pressure and buoyancy.
  agentHints:
    es:
      - ρ_agua max a 4°C.
      - "Gas ideal: ρ = pM/(RT)."
      - "γ = ρg: peso específico."
    en:
      - ρ_water max at 4°C.
      - "Ideal gas: ρ = pM/(RT)."
      - "γ = ρg: specific weight."
  commonMistakes:
    es:
      - Confundir ρ (kg/m³) con γ (N/m³).
      - No corregir ρ_agua por temperatura.
      - No actualizar ρ_gas con la ecuación de estado.
    en:
      - Confusing ρ (kg/m³) with γ (N/m³).
      - Not correcting ρ_water for temperature.
      - Not updating ρ_gas with equation of state.

svg:
  title:
    es: Escena SVG · Densidad de Fluidos
    en: SVG Scene · Fluid Density
  sceneId: densidad
  sceneLabel:
    es: "Estratificación: agua, aceite y mercurio"
    en: "Stratification: water, oil and mercury"
  objects:
    es:
      - capa de mercurio (fondo)
      - capa de agua (centro)
      - capa de aceite (superior)
      - indicadores ρ
    en:
      - mercury layer (bottom)
      - water layer (centre)
      - oil layer (top)
      - ρ indicators
  mainObject:
    es: fluidos estratificados
    en: stratified fluids
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Tres capas inmiscibles: ρ_Hg > ρ_agua > ρ_aceite."
    en: "Three immiscible layers: ρ_Hg > ρ_water > ρ_oil."
  interactions:
    es: El fluido más denso se sitúa en el fondo. F_flot = ρ_fluido·g·V.
    en: Densest fluid sinks to the bottom. F_buoy = ρ_fluid·g·V.
  modelElements:
    es:
      - ρ = m/V
      - Mayor ρ → fondo
      - p = p₀ + ρgh
    en:
      - ρ = m/V
      - Higher ρ → bottom
      - p = p₀ + ρgh
  visualCues:
    es:
      - "Hg: capa inferior más densa."
      - "Aceite: flota sobre agua."
      - Presión crece con h.
    en:
      - "Hg: densest bottom layer."
      - "Oil: floats on water."
      - Pressure increases with h.
  scaleMeaning:
    es: Grosor de capa ∝ 1/ρ (misma masa).
    en: Layer thickness ∝ 1/ρ (same mass).
  relation:
    es: Estratificación por densidad.
    en: Density stratification.
  physicalReading:
    es: Identificar orden de capas e inferir ρ relativas.
    en: Identify layer order and infer relative ρ.
  modelConnection:
    es: Densidad y estratificación de fluidos.
    en: Fluid density and stratification.
  formulaConnection:
    es: ρ = m/V, p = p₀ + ρgh.
    en: ρ = m/V, p = p₀ + ρgh.
  readingFocus:
    es: leer el orden de las capas e identificar la más densa (abajo).
    en: read the layer order and identify the densest (bottom).
  agentHints:
    es:
      - ρ_Hg ≈ 13.6·ρ_agua.
      - Aceite flota sobre agua.
      - p continua en interfaces.
    en:
      - ρ_Hg ≈ 13.6·ρ_water.
      - Oil floats on water.
      - p continuous at interfaces.
  commonMistakes:
    es:
      - Invertir el orden de las capas.
      - Error de ρ en p = ρgh.
      - Olvidar continuidad de p en interfaces.
    en:
      - Inverting layer order.
      - Wrong ρ in p = ρgh.
      - Forgetting p continuity at interfaces.
