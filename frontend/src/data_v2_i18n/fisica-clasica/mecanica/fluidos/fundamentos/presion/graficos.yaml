version: "1.0"
leaf: "presion"

coord:
  title:
    es: Gráfica Coord · Presión
    en: Coord Graph · Pressure
  xAxis:
    es: profundidad h (m)
    en: depth h (m)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: h
  yMagnitude: p
  relation:
    es: p = p₀ + ρgh. La presión aumenta linealmente con la profundidad. Pendiente = ρg.
    en: p = p₀ + ρgh. Pressure increases linearly with depth. Slope = ρg.
  physicalReading:
    es: Cada metro de agua añade ≈ 9810 Pa. La presión actúa isótropa en todas las direcciones.
    en: Each metre of water adds ≈ 9810 Pa. Pressure acts isotropically in all directions.
  slopeMeaning:
    es: "Pendiente = ρg ≈ 9810 N/m³ (agua): gradiente de presión hidrostático."
    en: "Slope = ρg ≈ 9810 N/m³ (water): hydrostatic pressure gradient."
  interceptMeaning:
    es: "p₀: presión en la superficie libre (p_atm o presión impuesta)."
    en: "p₀: pressure at free surface (p_atm or imposed pressure)."
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "p > 0 (absoluta). p_man = p − p_atm puede ser negativa."
    en: "p > 0 (absolute). p_gauge = p − p_atm can be negative."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: h ≥ 0. ρg_agua ≈ 9810 N/m³.
    en: h ≥ 0. ρg_water ≈ 9810 N/m³.
  modelConnection:
    es: "Presión hidrostática: base de la hidrostática."
    en: "Hydrostatic pressure: basis of hydrostatics."
  formulaConnection:
    es: p = p₀ + ρgh, F = p·A.
    en: p = p₀ + ρgh, F = p·A.
  readingFocus:
    es: leer pendiente ρg e intercepto p₀; calcular p a cualquier h.
    en: read slope ρg and intercept p₀; compute p at any h.
  agentHints:
    es:
      - 1 atm ≈ 101325 Pa ≈ 10.33 m H₂O.
      - ρg_agua ≈ 9810 N/m³.
      - Presión isotrópica.
    en:
      - 1 atm ≈ 101325 Pa ≈ 10.33 m H₂O.
      - ρg_water ≈ 9810 N/m³.
      - Isotropic pressure.
  commonMistakes:
    es:
      - Confundir presión absoluta con manométrica.
      - Usar ρg incorrecto.
      - No sumar p₀.
    en:
      - Confusing absolute with gauge pressure.
      - Using wrong ρg.
      - Not adding p₀.

svg:
  title:
    es: Escena SVG · Presión
    en: SVG Scene · Pressure
  sceneId: presion
  sceneLabel:
    es: Recipiente con fluido e indicadores de presión
    en: Container with fluid and pressure indicators
  objects:
    es:
      - recipiente
      - superficie libre
      - indicadores h
      - manómetros
      - flechas isótropas
    en:
      - container
      - free surface
      - depth indicators h
      - pressure gauges
      - isotropic arrows
  mainObject:
    es: fluido en reposo bajo presión hidrostática
    en: fluid at rest under hydrostatic pressure
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: p crece linealmente con h. Flechas apuntan en todas las direcciones (isotropía).
    en: p grows linearly with h. Arrows point in all directions (isotropy).
  interactions:
    es: "Fluido en reposo: ΣF = 0. p actúa ⊥ en todas las superficies."
    en: "Fluid at rest: ΣF = 0. p acts ⊥ on all surfaces."
  modelElements:
    es:
      - p = p₀ + ρgh
      - Isotropía
      - F = p·A
    en:
      - p = p₀ + ρgh
      - Isotropy
      - F = p·A
  visualCues:
    es:
      - Flechas en todas las direcciones a la misma h.
      - Color más intenso → mayor p.
      - Superficie libre = nivel cero.
    en:
      - Arrows in all directions at same h.
      - Darker colour → higher p.
      - Free surface = zero level.
  scaleMeaning:
    es: Longitud de flechas ∝ p.
    en: Arrow length ∝ p.
  relation:
    es: p = p₀ + ρgh.
    en: p = p₀ + ρgh.
  physicalReading:
    es: La presión crece con h y actúa en todas las direcciones.
    en: Pressure grows with h and acts in all directions.
  modelConnection:
    es: Presión hidrostática e isotropía.
    en: Hydrostatic pressure and isotropy.
  formulaConnection:
    es: p = p₀ + ρgh, F = p·A.
    en: p = p₀ + ρgh, F = p·A.
  readingFocus:
    es: leer los indicadores de h y calcular p = p₀ + ρgh.
    en: read depth indicators and compute p = p₀ + ρgh.
  agentHints:
    es:
      - Mayor h → mayor p.
      - Presión isótropa.
      - p actúa ⊥ a cualquier superficie.
    en:
      - Greater h → higher p.
      - Isotropic pressure.
      - p acts ⊥ to any surface.
  commonMistakes:
    es:
      - Pensar que p solo actúa hacia abajo.
      - Olvidar p₀.
      - Confundir p y F.
    en:
      - Thinking p only acts downward.
      - Forgetting p₀.
      - Confusing p and F.
