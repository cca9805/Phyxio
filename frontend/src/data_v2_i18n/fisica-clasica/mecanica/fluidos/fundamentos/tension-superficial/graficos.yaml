version: "1.0"
leaf: "tension-superficial"

coord:
  title:
    es: Gráfica Coord · Tensión Superficial
    en: Coord Graph · Surface Tension
  xAxis:
    es: temperatura T (°C)
    en: temperature T (°C)
  yAxis:
    es: tensión superficial γ (N/m)
    en: surface tension γ (N/m)
  xMagnitude: T
  yMagnitude: gamma
  relation:
    es: "γ disminuye con la temperatura. Agua: γ(20°C) ≈ 0.073 N/m. Presión de Laplace: Δp = 4γ/r (burbuja), Δp = 2γ/r (menisco)."
    en: "γ decreases with temperature. Water: γ(20°C) ≈ 0.073 N/m. Laplace pressure: Δp = 4γ/r (bubble), Δp = 2γ/r (meniscus)."
  physicalReading:
    es: γ decae casi linealmente con T. Mayor γ → mayor presión de Laplace → mayor altura capilar.
    en: γ decreases nearly linearly with T. Higher γ → higher Laplace pressure → higher capillary height.
  slopeMeaning:
    es: "dγ/dT < 0: γ disminuye con T."
    en: "dγ/dT < 0: γ decreases with T."
  interceptMeaning:
    es: γ(0°C) ≈ 0.076 N/m para el agua.
    en: γ(0°C) ≈ 0.076 N/m for water.
  curvatureMeaning:
    es: Casi lineal; ligera curvatura.
    en: Nearly linear; slight curvature.
  signMeaning:
    es: "γ > 0 siempre."
    en: "γ > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0 ≤ T ≤ 100°C (agua). γ → 0 en T_c.
    en: 0 ≤ T ≤ 100°C (water). γ → 0 at T_c.
  modelConnection:
    es: Tensión superficial y capilaridad.
    en: Surface tension and capillarity.
  formulaConnection:
    es: Δp = 2γ/r (menisco), h = 2γ·cosθ/(ρgr) (capilaridad).
    en: Δp = 2γ/r (meniscus), h = 2γ·cosθ/(ρgr) (capillarity).
  readingFocus:
    es: leer γ a la temperatura de trabajo para calcular Δp o h capilar.
    en: read γ at working temperature to compute Δp or capillary height.
  agentHints:
    es:
      - γ_agua(20°C) ≈ 0.073 N/m.
      - Δp = 4γ/r (burbuja de jabón).
      - h_cap = 2γcosθ/(ρgr).
    en:
      - γ_water(20°C) ≈ 0.073 N/m.
      - Δp = 4γ/r (soap bubble).
      - h_cap = 2γcosθ/(ρgr).
  commonMistakes:
    es:
      - Confundir la fórmula de burbuja y menisco.
      - No corregir γ por temperatura.
      - Olvidar el ángulo de contacto θ.
    en:
      - Confusing bubble and meniscus formulas.
      - Not correcting γ for temperature.
      - Forgetting contact angle θ.

svg:
  title:
    es: Escena SVG · Tensión Superficial
    en: SVG Scene · Surface Tension
  sceneId: tension_superficial
  sceneLabel:
    es: Menisco y capilaridad en tubo estrecho
    en: Meniscus and capillarity in a narrow tube
  objects:
    es:
      - tubo capilar
      - menisco cóncavo/convexo
      - altura capilar h
      - ángulo de contacto θ
      - fuerzas γ tangentes
    en:
      - capillary tube
      - concave/convex meniscus
      - capillary height h
      - contact angle θ
      - tangential γ forces
  mainObject:
    es: fluido en tubo capilar
    en: fluid in capillary tube
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Menisco cóncavo (mojante, θ < 90°): h > 0. Menisco convexo (no mojante, θ > 90°): h < 0."
    en: "Concave meniscus (wetting, θ < 90°): h > 0. Convex meniscus (non-wetting, θ > 90°): h < 0."
  interactions:
    es: h = 2γ·cosθ/(ρgr). γ actúa tangencialmente a la superficie del fluido.
    en: h = 2γ·cosθ/(ρgr). γ acts tangentially to the fluid surface.
  modelElements:
    es:
      - h = 2γcosθ/(ρgr)
      - Δp = 2γ/r (menisco)
      - Menisco cóncavo → ascenso
    en:
      - h = 2γcosθ/(ρgr)
      - Δp = 2γ/r (meniscus)
      - Concave meniscus → rise
  visualCues:
    es:
      - "Menisco cóncavo: agua en vidrio."
      - "Menisco convexo: mercurio."
      - "h positivo: líquido mojante."
    en:
      - "Concave meniscus: water in glass."
      - "Convex meniscus: mercury."
      - "Positive h: wetting liquid."
  scaleMeaning:
    es: h ∝ γcosθ/(ρgr).
    en: h ∝ γcosθ/(ρgr).
  relation:
    es: h = 2γcosθ/(ρgr).
    en: h = 2γcosθ/(ρgr).
  physicalReading:
    es: El menisco cóncavo indica líquido mojante (θ < 90°) y ascenso capilar.
    en: Concave meniscus indicates wetting liquid (θ < 90°) and capillary rise.
  modelConnection:
    es: Tensión superficial y capilaridad.
    en: Surface tension and capillarity.
  formulaConnection:
    es: h = 2γcosθ/(ρgr), Δp = 2γ/r.
    en: h = 2γcosθ/(ρgr), Δp = 2γ/r.
  readingFocus:
    es: leer el tipo de menisco y calcular h capilar.
    en: read the meniscus type and compute capillary height.
  agentHints:
    es:
      - "Cóncavo: θ < 90° (agua)."
      - "Convexo: θ > 90° (Hg)."
      - "h ∝ 1/r: tubos más estrechos → mayor ascenso."
    en:
      - "Concave: θ < 90° (water)."
      - "Convex: θ > 90° (Hg)."
      - "h ∝ 1/r: narrower tubes → greater rise."
  commonMistakes:
    es:
      - Invertir θ para mojante y no mojante.
      - Olvidar el cosθ.
      - Confundir r del tubo con r del menisco.
    en:
      - Inverting θ for wetting and non-wetting.
      - Forgetting cosθ.
      - Confusing tube radius r with meniscus radius.
