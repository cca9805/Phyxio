version: "1.0"
leaf: "introduccion-al-sonido"

coord:
  title:
    es: Gráfica Coord · Introducción al Sonido
    en: Coord Graph · Introduction to Sound
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: variación de presión Δp (Pa)
    en: pressure variation Δp (Pa)
  xMagnitude: x
  yMagnitude: Delta_p
  relation:
    es: "Onda sonora: Δp(x,t) = Δp_max·cos(kx − ωt). c = √(B/ρ). Aire: c ≈ 343 m/s (20°C)."
    en: "Sound wave: Δp(x,t) = Δp_max·cos(kx − ωt). c = √(B/ρ). Air: c ≈ 343 m/s (20°C)."
  physicalReading:
    es: Onda longitudinal de presión. Amplitud = Δp_max. λ = 2π/k. T = 2π/ω.
    en: Longitudinal pressure wave. Amplitude = Δp_max. λ = 2π/k. T = 2π/ω.
  slopeMeaning:
    es: "dΔp/dx = −k·Δp_max·sin(kx): gradiente de presión acústico."
    en: "dΔp/dx = −k·Δp_max·sin(kx): acoustic pressure gradient."
  interceptMeaning:
    es: Δp(0,0) = Δp_max.
    en: Δp(0,0) = Δp_max.
  curvatureMeaning:
    es: "Sinusoidal: d²Δp/dx² = −k²·Δp."
    en: "Sinusoidal: d²Δp/dx² = −k²·Δp."
  signMeaning:
    es: "Δp > 0: compresión. Δp < 0: rarefacción."
    en: "Δp > 0: compression. Δp < 0: rarefaction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 20 Hz ≤ f ≤ 20 kHz (sonido audible).
    en: 20 Hz ≤ f ≤ 20 kHz (audible sound).
  modelConnection:
    es: Onda sonora longitudinal en fluidos.
    en: Longitudinal sound wave in fluids.
  formulaConnection:
    es: c = √(B/ρ), I = Δp²/(2ρc), dB = 20·log₁₀(Δp/Δp₀).
    en: c = √(B/ρ), I = Δp²/(2ρc), dB = 20·log₁₀(Δp/Δp₀).
  readingFocus:
    es: leer amplitud, λ y T; identificar zonas de compresión y rarefacción.
    en: read amplitude, λ and T; identify compression and rarefaction zones.
  agentHints:
    es:
      - c_aire ≈ 343 m/s (20°C).
      - λ = c/f.
      - Δp₀ = 20 μPa (umbral audición).
    en:
      - c_air ≈ 343 m/s (20°C).
      - λ = c/f.
      - Δp₀ = 20 μPa (hearing threshold).
  commonMistakes:
    es:
      - Confundir onda longitudinal con transversal.
      - Olvidar que c depende de B y ρ.
      - No distinguir compresión y rarefacción.
    en:
      - Confusing longitudinal with transverse wave.
      - Forgetting c depends on B and ρ.
      - Not distinguishing compression and rarefaction.

svg:
  title:
    es: Escena SVG · Introducción al Sonido
    en: SVG Scene · Introduction to Sound
  sceneId: introduccion_al_sonido
  sceneLabel:
    es: Onda sonora longitudinal con zonas de compresión y rarefacción
    en: Longitudinal sound wave with compression and rarefaction zones
  objects:
    es:
      - fuente sonora
      - zonas de compresión (alta ρ, alta p)
      - zonas de rarefacción (baja ρ, baja p)
      - dirección de propagación
      - moléculas oscilantes
    en:
      - sound source
      - compression zones (high ρ, high p)
      - rarefaction zones (low ρ, low p)
      - propagation direction
      - oscillating molecules
  mainObject:
    es: onda sonora longitudinal en aire
    en: longitudinal sound wave in air
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Moléculas oscilan paralelas a la dirección de propagación. Compresión: alta p. Rarefacción: baja p."
    en: "Molecules oscillate parallel to propagation direction. Compression: high p. Rarefaction: low p."
  interactions:
    es: c = √(B/ρ) = λf. Δp = −B·(∂u/∂x).
    en: c = √(B/ρ) = λf. Δp = −B·(∂u/∂x).
  modelElements:
    es:
      - c = √(B/ρ)
      - Onda longitudinal
      - Compresión/rarefacción
    en:
      - c = √(B/ρ)
      - Longitudinal wave
      - Compression/rarefaction
  visualCues:
    es:
      - "Zonas oscuras: compresión."
      - "Zonas claras: rarefacción."
      - Flechas paralelas a la dirección de propagación.
    en:
      - "Dark zones: compression."
      - "Light zones: rarefaction."
      - Arrows parallel to propagation direction.
  scaleMeaning:
    es: Espaciado de zonas = λ.
    en: Zone spacing = λ.
  relation:
    es: "Onda longitudinal: oscilación ∥ propagación."
    en: "Longitudinal wave: oscillation ∥ propagation."
  physicalReading:
    es: El sonido es una onda longitudinal de presión en el fluido.
    en: Sound is a longitudinal pressure wave in the fluid.
  modelConnection:
    es: Ondas sonoras longitudinales.
    en: Longitudinal sound waves.
  formulaConnection:
    es: c = √(B/ρ), λ = c/f.
    en: c = √(B/ρ), λ = c/f.
  readingFocus:
    es: identificar zonas de compresión y rarefacción y estimar λ.
    en: identify compression and rarefaction zones and estimate λ.
  agentHints:
    es:
      - "Onda longitudinal: oscilación ∥ propagación."
      - c_aire ≈ 343 m/s.
      - λ = c/f.
    en:
      - "Longitudinal wave: oscillation ∥ propagation."
      - c_air ≈ 343 m/s.
      - λ = c/f.
  commonMistakes:
    es:
      - Dibujar oscilaciones ⊥ (eso es transversal).
      - Confundir λ y T.
      - Olvidar que c depende del medio.
    en:
      - "Drawing ⊥ oscillations (that's transverse)."
      - Confusing λ and T.
      - Forgetting c depends on medium.
