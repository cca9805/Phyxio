version: "1.0"
leaf: "ondas-longitudinales"

coord:
  title:
    es: Gráfica Coord · Ondas Longitudinales
    en: Coord Graph · Longitudinal Waves
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: desplazamiento u (m) o Δp (Pa)
    en: displacement u (m) or Δp (Pa)
  xMagnitude: x
  yMagnitude: u
  relation:
    es: "u(x,t) = A·cos(kx − ωt). Onda longitudinal: oscilación ∥ propagación. c = λf = ω/k."
    en: "u(x,t) = A·cos(kx − ωt). Longitudinal wave: oscillation ∥ propagation. c = λf = ω/k."
  physicalReading:
    es: "Amplitud A, λ = 2π/k, T = 2π/ω. Zonas de compresión (u' < 0) y rarefacción (u' > 0)."
    en: "Amplitude A, λ = 2π/k, T = 2π/ω. Compression (u' < 0) and rarefaction (u' > 0) zones."
  slopeMeaning:
    es: "du/dx = −Ak·sin(kx): gradiente de desplazamiento → Δp."
    en: "du/dx = −Ak·sin(kx): displacement gradient → Δp."
  interceptMeaning:
    es: u(0,0) = A.
    en: u(0,0) = A.
  curvatureMeaning:
    es: "Sinusoidal: d²u/dx² = −k²u."
    en: "Sinusoidal: d²u/dx² = −k²u."
  signMeaning:
    es: "u > 0 o < 0 según la fase."
    en: "u > 0 or < 0 depending on phase."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Fluido compresible.
    en: Compressible fluid.
  modelConnection:
    es: Ondas longitudinales en fluidos.
    en: Longitudinal waves in fluids.
  formulaConnection:
    es: c = √(B/ρ), u(x,t) = A·cos(kx − ωt).
    en: c = √(B/ρ), u(x,t) = A·cos(kx − ωt).
  readingFocus:
    es: leer A, λ, T y el tipo de onda (longitudinal).
    en: read A, λ, T and the wave type (longitudinal).
  agentHints:
    es:
      - Oscilación ∥ propagación.
      - c = λf.
      - Δp = −B·(∂u/∂x).
    en:
      - Oscillation ∥ propagation.
      - c = λf.
      - Δp = −B·(∂u/∂x).
  commonMistakes:
    es:
      - Confundir longitudinal con transversal.
      - Olvidar c = √(B/ρ).
      - No identificar compresión y rarefacción.
    en:
      - Confusing longitudinal with transverse.
      - Forgetting c = √(B/ρ).
      - Not identifying compression and rarefaction.

svg:
  title:
    es: Escena SVG · Ondas Longitudinales
    en: SVG Scene · Longitudinal Waves
  sceneId: ondas_longitudinales
  sceneLabel:
    es: Onda longitudinal con compresiones y rarefacciones
    en: Longitudinal wave with compressions and rarefactions
  objects:
    es:
      - moléculas del fluido
      - zonas de compresión
      - zonas de rarefacción
      - dirección de propagación
    en:
      - fluid molecules
      - compression zones
      - rarefaction zones
      - propagation direction
  mainObject:
    es: onda longitudinal en fluido
    en: longitudinal wave in fluid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Oscilación ∥ propagación. Compresión: moléculas juntas. Rarefacción: moléculas separadas."
    en: "Oscillation ∥ propagation. Compression: molecules close. Rarefaction: molecules apart."
  interactions:
    es: c = √(B/ρ). Δp = −B·(∂u/∂x).
    en: c = √(B/ρ). Δp = −B·(∂u/∂x).
  modelElements:
    es:
      - Onda longitudinal
      - c = √(B/ρ)
      - Compresión/rarefacción
    en:
      - Longitudinal wave
      - c = √(B/ρ)
      - Compression/rarefaction
  visualCues:
    es:
      - Moléculas apiladas → compresión.
      - Moléculas separadas → rarefacción.
      - Flechas ∥ a la propagación.
    en:
      - Packed molecules → compression.
      - Spaced molecules → rarefaction.
      - Arrows ∥ to propagation.
  scaleMeaning:
    es: Separación de zonas = λ.
    en: Zone separation = λ.
  relation:
    es: "Onda longitudinal: oscilación ∥ propagación."
    en: "Longitudinal wave: oscillation ∥ propagation."
  physicalReading:
    es: "Compresión: alta p y ρ. Rarefacción: baja p y ρ."
    en: "Compression: high p and ρ. Rarefaction: low p and ρ."
  modelConnection:
    es: Ondas longitudinales.
    en: Longitudinal waves.
  formulaConnection:
    es: c = √(B/ρ), u(x,t) = A·cos(kx − ωt).
    en: c = √(B/ρ), u(x,t) = A·cos(kx − ωt).
  readingFocus:
    es: identificar compresión y rarefacción, medir λ.
    en: identify compression and rarefaction, measure λ.
  agentHints:
    es:
      - "Onda longitudinal: oscilación ∥."
      - c_aire ≈ 343 m/s.
      - λ = c/f.
    en:
      - "Longitudinal wave: oscillation ∥."
      - c_air ≈ 343 m/s.
      - λ = c/f.
  commonMistakes:
    es:
      - "Onda transversal: oscilación ⊥."
      - c no depende de f.
      - No distinguir compresión y rarefacción.
    en:
      - "Transverse wave: oscillation ⊥."
      - "c doesn't depend on f."
      - Not distinguishing compression and rarefaction.
