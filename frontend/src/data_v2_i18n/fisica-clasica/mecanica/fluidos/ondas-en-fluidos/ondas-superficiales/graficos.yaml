version: "1.0"
leaf: "ondas-superficiales"

coord:
  title:
    es: Gráfica Coord · Ondas Superficiales
    en: Coord Graph · Surface Waves
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elevación de la superficie η (m)
    en: surface elevation η (m)
  xMagnitude: x
  yMagnitude: eta
  relation:
    es: "η(x,t) = A·cos(kx − ωt). Aguas profundas: c = √(g/k) = √(gλ/(2π)). Aguas someras: c = √(gh)."
    en: "η(x,t) = A·cos(kx − ωt). Deep water: c = √(g/k) = √(gλ/(2π)). Shallow water: c = √(gh)."
  physicalReading:
    es: "Amplitud A, λ y T. Aguas profundas: c crece con λ (onda dispersiva). Aguas someras: c = √(gh) (no dispersiva)."
    en: "Amplitude A, λ and T. Deep water: c increases with λ (dispersive wave). Shallow water: c = √(gh) (non-dispersive)."
  slopeMeaning:
    es: "dη/dx: pendiente local de la superficie libre."
    en: "dη/dx: local slope of free surface."
  interceptMeaning:
    es: η(0) = A.
    en: η(0) = A.
  curvatureMeaning:
    es: "Sinusoidal: d²η/dx² = −k²η."
    en: "Sinusoidal: d²η/dx² = −k²η."
  signMeaning:
    es: "η > 0: cresta. η < 0: seno."
    en: "η > 0: crest. η < 0: trough."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Profundas: kh ≫ 1. Someras: kh ≪ 1."
    en: "Deep: kh ≫ 1. Shallow: kh ≪ 1."
  modelConnection:
    es: Ondas de gravedad en la superficie libre.
    en: Gravity waves at the free surface.
  formulaConnection:
    es: "c = √(g·tanh(kh)/k), profundas: c = √(g/k), someras: c = √(gh)."
    en: "c = √(g·tanh(kh)/k), deep: c = √(g/k), shallow: c = √(gh)."
  readingFocus:
    es: leer A, λ, T e identificar si es agua profunda o somera.
    en: read A, λ, T and identify deep or shallow water.
  agentHints:
    es:
      - "Profundas (kh > π): c = √(gλ/(2π))."
      - "Someras (kh < π/10): c = √(gh)."
      - Dispersivas en aguas profundas.
    en:
      - "Deep (kh > π): c = √(gλ/(2π))."
      - "Shallow (kh < π/10): c = √(gh)."
      - Dispersive in deep water.
  commonMistakes:
    es:
      - Usar la misma fórmula para profundas y someras.
      - Olvidar que c depende de λ en aguas profundas.
      - Confundir η con u.
    en:
      - Using the same formula for deep and shallow.
      - Forgetting c depends on λ in deep water.
      - Confusing η with u.

svg:
  title:
    es: Escena SVG · Ondas Superficiales
    en: SVG Scene · Surface Waves
  sceneId: ondas_superficiales
  sceneLabel:
    es: Ondas de gravedad en la superficie libre con partículas orbitales
    en: Gravity waves at free surface with orbital particles
  objects:
    es:
      - superficie libre sinusoidal
      - crestas y senos
      - órbitas elípticas de partículas
      - profundidad h
      - longitud de onda λ
    en:
      - sinusoidal free surface
      - crests and troughs
      - elliptical particle orbits
      - depth h
      - wavelength λ
  mainObject:
    es: onda de gravedad superficial
    en: surface gravity wave
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Aguas profundas: órbitas circulares → elípticas al aproximarse al fondo. Someras: órbitas muy planas."
    en: "Deep water: circular orbits → elliptical near bottom. Shallow: very flat orbits."
  interactions:
    es: "c = √(g·tanh(kh)/k). Partículas: órbitas circulares en aguas profundas."
    en: "c = √(g·tanh(kh)/k). Particles: circular orbits in deep water."
  modelElements:
    es:
      - Onda de gravedad superficial
      - Órbitas orbitales
      - c = √(g/k) (profundas)
    en:
      - Surface gravity wave
      - Orbital motion
      - c = √(g/k) (deep)
  visualCues:
    es:
      - "Cresta: η > 0."
      - "Seno: η < 0."
      - Órbitas circulares en profundas; planas en someras.
    en:
      - "Crest: η > 0."
      - "Trough: η < 0."
      - Circular orbits in deep; flat in shallow.
  scaleMeaning:
    es: Amplitud órbitas decae con la profundidad ~exp(−kz).
    en: Orbit amplitude decays with depth ~exp(−kz).
  relation:
    es: "Onda de gravedad: η(x,t) = A·cos(kx − ωt)."
    en: "Gravity wave: η(x,t) = A·cos(kx − ωt)."
  physicalReading:
    es: Partículas describen órbitas circulares (profundas) o elípticas (someras).
    en: Particles describe circular (deep) or elliptical (shallow) orbits.
  modelConnection:
    es: Ondas de gravedad en la superficie libre.
    en: Gravity waves at the free surface.
  formulaConnection:
    es: c = √(g·tanh(kh)/k), η = A·cos(kx − ωt).
    en: c = √(g·tanh(kh)/k), η = A·cos(kx − ωt).
  readingFocus:
    es: leer la forma de la onda y el tipo de órbitas para identificar régimen.
    en: read wave shape and orbit type to identify regime.
  agentHints:
    es:
      - "Profundas: c = √(g/k)."
      - "Someras: c = √(gh)."
      - Órbitas circulares → profundas.
    en:
      - "Deep: c = √(g/k)."
      - "Shallow: c = √(gh)."
      - Circular orbits → deep water.
  commonMistakes:
    es:
      - Confundir profundas y someras.
      - No reconocer la dispersividad.
      - Olvidar el movimiento orbital.
    en:
      - Confusing deep and shallow.
      - Not recognising dispersivity.
      - Forgetting orbital motion.
