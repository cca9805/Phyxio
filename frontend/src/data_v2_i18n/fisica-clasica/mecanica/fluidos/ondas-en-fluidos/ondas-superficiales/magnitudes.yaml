version: 5
magnitudes:
  - id: c
    symbol: c
    nombre:
      es: Velocidad de fase
      en: Phase velocity
    si_unit: m/s
    unidad_si: m/s
    dimension: L/T
    is_vector: false
    components: []
    category: cinematica
    physical_role: velocidad_fase
    used_in: [airy_general, profundas, someras]
    common_mistake: "Confundir con la velocidad de las partículas o la velocidad de grupo."
    sign_behavior: siempre_positivo
    zero_behavior: implica_estatismo
    value_nature: escalar_finito
    interpretation_role: velocidad_ola
    graph_binding: "Velocidad de traslación del perfil de superficie."
    descripcion:
      es: Velocidad a la que se desplaza el perfil de la cresta de la onda.
      en: Speed at which the wave crest profile moves.
    typical_range: [0.1, 200]
    pedagogical_notes:
      es: Es la rapidez con la que avanza la forma de la onda, no la masa del agua.
      en: It is the speed at which the wave shape advances, not the water mass.

  - id: g
    symbol: g
    nombre:
      es: Aceleración de la gravedad
      en: Gravitational acceleration
    si_unit: m/s^2
    unidad_si: m/s^2
    dimension: L/T^2
    is_vector: false
    components: []
    category: dinamica
    physical_role: fuerza_restauradora
    used_in: [airy_general, profundas, someras]
    common_mistake: "Usar un valor diferente a 9.81 sin justificación."
    sign_behavior: siempre_positivo
    zero_behavior: ausencia_de_olas_de_gravedad
    value_nature: constante_local
    interpretation_role: motor_dinamico
    graph_binding: "Intensidad del retorno al equilibrio."
    descripcion:
      es: Fuerza restauradora principal para ondas de gravedad superficiales.
      en: Primary restoring force for surface gravity waves.
    typical_range: [1.6, 25]
    pedagogical_notes:
      es: Actúa devolviendo la superficie elevada a su posición de equilibrio.
      en: It acts by returning the elevated surface to its equilibrium position.

  - id: lambda
    symbol: \lambda
    nombre:
      es: Longitud de onda
      en: Wavelength
    si_unit: m
    unidad_si: m
    dimension: L
    is_vector: false
    components: []
    category: cinematica
    physical_role: escala_espacial
    used_in: [airy_general, profundas]
    common_mistake: "No distinguir entre longitud de onda y profundidad."
    sign_behavior: siempre_positivo
    zero_behavior: fisicamente_imposible
    value_nature: escalar_finito
    interpretation_role: periodicidad
    graph_binding: "Distancia entre dos máximos en la simulación."
    descripcion:
      es: Distancia horizontal entre dos crestas consecutivas.
      en: Horizontal distance between two consecutive crests.
    typical_range: [0.02, 200000]
    pedagogical_notes:
      es: Determina si la onda "siente" el fondo según la profundidad.
      en: Determines if the wave "feels" the bottom depending on the depth.

  - id: h
    symbol: h
    nombre:
      es: Profundidad
      en: Depth
    si_unit: m
    unidad_si: m
    dimension: L
    is_vector: false
    components: []
    category: mecanica_fluidos
    physical_role: condicion_contorno
    used_in: [airy_general, someras]
    common_mistake: "Confundir profundidad con altura de la ola."
    sign_behavior: siempre_positivo
    zero_behavior: ausencia_de_fluido
    value_nature: parametro_escenario
    interpretation_role: limitador_velocidad
    graph_binding: "Distancia al fondo del eje vertical."
    descripcion:
      es: Distancia vertical desde la superficie en reposo hasta el fondo.
      en: Vertical distance from the resting surface to the bottom.
    typical_range: [0.1, 11000]
    pedagogical_notes:
      es: Parámetro crítico que divide los regímenes de aguas someras y profundas.
      en: Critical parameter that divides shallow and deep water regimes.
