version: "1.0"
leaf: "flujo-laminar"

coord:
  title:
    es: Gráfica Coord · Flujo Laminar
    en: Coord Graph · Laminar Flow
  xAxis:
    es: radio r (m) desde el eje de la tubería
    en: radius r (m) from pipe axis
  yAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  xMagnitude: r
  yMagnitude: v
  relation:
    es: "Poiseuille: v(r) = (Δp/4μL)·(R² − r²). Perfil parabólico. v_max = ΔpR²/(4μL) en r = 0. Q = πR⁴Δp/(8μL)."
    en: "Poiseuille: v(r) = (Δp/4μL)·(R² − r²). Parabolic profile. v_max = ΔpR²/(4μL) at r = 0. Q = πR⁴Δp/(8μL)."
  physicalReading:
    es: "Perfil parabólico (Poiseuille). v_max en el eje. Condición de no deslizamiento: v(R) = 0. Re < 2300."
    en: "Parabolic profile (Poiseuille). v_max at axis. No-slip condition: v(R) = 0. Re < 2300."
  slopeMeaning:
    es: "dv/dr = −Δpr/(2μL): tensión tangencial τ = −μ·dv/dr = Δpr/(2L)."
    en: "dv/dr = −Δpr/(2μL): shear stress τ = −μ·dv/dr = Δpr/(2L)."
  interceptMeaning:
    es: "v(0) = v_max: velocidad máxima en el eje."
    en: "v(0) = v_max: maximum velocity at the axis."
  curvatureMeaning:
    es: "Parábola invertida: v ∝ (R² − r²)."
    en: "Inverted parabola: v ∝ (R² − r²)."
  signMeaning:
    es: "v > 0: flujo en sentido positivo. v(R) = 0: no deslizamiento."
    en: "v > 0: flow in positive direction. v(R) = 0: no-slip."
  areaMeaning:
    es: Área bajo v(r)·2πr dr = Q (caudal).
    en: Area under v(r)·2πr dr = Q (flow rate).
  domainMeaning:
    es: 0 ≤ r ≤ R. Válido para Re < 2300.
    en: 0 ≤ r ≤ R. Valid for Re < 2300.
  modelConnection:
    es: Flujo de Hagen-Poiseuille en tubería circular.
    en: Hagen-Poiseuille flow in circular pipe.
  formulaConnection:
    es: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL), τ_w = ΔpR/(2L).
    en: v(r) = (Δp/4μL)·(R²−r²), Q = πR⁴Δp/(8μL), τ_w = ΔpR/(2L).
  readingFocus:
    es: leer v_max y el radio R para calcular Q = ½·v_max·πR².
    en: read v_max and radius R to compute Q = ½·v_max·πR².
  agentHints:
    es:
      - v_med = v_max/2 (flujo laminar en tubería).
      - "Q ∝ R⁴: duplicar R → Q×16."
      - τ_max en la pared r = R.
    en:
      - v_mean = v_max/2 (laminar pipe flow).
      - "Q ∝ R⁴: double R → Q×16."
      - τ_max at wall r = R.
  commonMistakes:
    es:
      - "Usar perfil laminar en flujo turbulento (Re > 4000)."
      - Olvidar la condición de no deslizamiento.
      - Confundir v_max con v_med.
    en:
      - "Using laminar profile in turbulent flow (Re > 4000)."
      - Forgetting the no-slip condition.
      - Confusing v_max with v_mean.

svg:
  title:
    es: Escena SVG · Flujo Laminar
    en: SVG Scene · Laminar Flow
  sceneId: flujo_laminar
  sceneLabel:
    es: Perfil parabólico de velocidad en tubería (Poiseuille)
    en: Parabolic velocity profile in pipe (Poiseuille)
  objects:
    es:
      - tubería circular
      - perfil parabólico v(r)
      - capas de fluido paralelas
      - vector τ en la pared
      - eje de la tubería
    en:
      - circular pipe
      - parabolic profile v(r)
      - parallel fluid layers
      - wall shear vector τ
      - pipe axis
  mainObject:
    es: fluido laminar en tubería
    en: laminar fluid in pipe
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Flujo estratificado en capas paralelas. Perfil parabólico: v(r) = v_max·(1−(r/R)²). v_max en el eje; v = 0 en la pared."
    en: "Stratified flow in parallel layers. Parabolic profile: v(r) = v_max·(1−(r/R)²). v_max at axis; v = 0 at wall."
  interactions:
    es: "Tensión tangencial τ = μ·dv/dr: máxima en la pared. Capas se deslizan sin mezclarse."
    en: "Shear stress τ = μ·dv/dr: maximum at wall. Layers slide without mixing."
  modelElements:
    es:
      - v(r) = v_max·(1−(r/R)²)
      - Q = πR⁴Δp/(8μL)
      - Re < 2300
    en:
      - v(r) = v_max·(1−(r/R)²)
      - Q = πR⁴Δp/(8μL)
      - Re < 2300
  visualCues:
    es:
      - Flecha más larga en el eje (v_max).
      - Flecha = 0 en la pared (no deslizamiento).
      - Capas paralelas sin mezcla.
    en:
      - Longest arrow at axis (v_max).
      - Arrow = 0 at wall (no-slip).
      - Parallel layers without mixing.
  scaleMeaning:
    es: Longitud de flechas ∝ v(r).
    en: Arrow length ∝ v(r).
  relation:
    es: "Perfil de Poiseuille: v(r) ∝ R² − r²."
    en: "Poiseuille profile: v(r) ∝ R² − r²."
  physicalReading:
    es: La longitud de las flechas forma una parábola. La velocidad media es v_max/2.
    en: Arrow lengths form a parabola. Mean velocity is v_max/2.
  modelConnection:
    es: Flujo de Hagen-Poiseuille.
    en: Hagen-Poiseuille flow.
  formulaConnection:
    es: v(r) = v_max·(1−(r/R)²), Q = πR⁴Δp/(8μL).
    en: v(r) = v_max·(1−(r/R)²), Q = πR⁴Δp/(8μL).
  readingFocus:
    es: leer el perfil parabólico e identificar v_max y la condición de no deslizamiento.
    en: read the parabolic profile and identify v_max and the no-slip condition.
  agentHints:
    es:
      - Perfil parabólico → Re < 2300.
      - v_med = v_max/2.
      - τ_max en r = R.
    en:
      - Parabolic profile → Re < 2300.
      - v_mean = v_max/2.
      - τ_max at r = R.
  commonMistakes:
    es:
      - Confundir perfil parabólico (laminar) con perfil plano (turbulento).
      - Olvidar v = 0 en la pared.
      - No verificar Re < 2300.
    en:
      - Confusing parabolic (laminar) with plug (turbulent) profile.
      - Forgetting v = 0 at wall.
      - Not verifying Re < 2300.
