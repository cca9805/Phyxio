version: "1.0"
leaf: "flujo-turbulento"

coord:
  title:
    es: Gráfica Coord · Flujo Turbulento
    en: Coord Graph · Turbulent Flow
  xAxis:
    es: radio r (m) desde el eje
    en: radius r (m) from axis
  yAxis:
    es: velocidad media temporal v̄ (m/s)
    en: time-averaged velocity v̄ (m/s)
  xMagnitude: r
  yMagnitude: v_bar
  relation:
    es: "Perfil turbulento: más plano que el parabólico. v̄(r) ≈ v_max·(1−r/R)^(1/n). Re > 4000. Zona de transición: 2300 < Re < 4000."
    en: "Turbulent profile: flatter than parabolic. v̄(r) ≈ v_max·(1−r/R)^(1/n). Re > 4000. Transition: 2300 < Re < 4000."
  physicalReading:
    es: Perfil más plano que en flujo laminar (mezcla turbulenta iguala velocidades). v_med/v_max ≈ 0.8 (turbulento) vs 0.5 (laminar).
    en: Profile flatter than laminar flow (turbulent mixing equalises velocities). v_mean/v_max ≈ 0.8 (turbulent) vs 0.5 (laminar).
  slopeMeaning:
    es: "dv̄/dr: gradiente de velocidad. Steeper near the wall (sub-capa viscosa)."
    en: "dv̄/dr: velocity gradient. Steeper near the wall (viscous sublayer)."
  interceptMeaning:
    es: "v̄(0) = v_max: velocidad en el eje."
    en: "v̄(0) = v_max: velocity at axis."
  curvatureMeaning:
    es: "Perfil en potencia (1/n): casi plano en el centro."
    en: "Power-law profile (1/n): nearly flat at centre."
  signMeaning:
    es: "v̄ > 0, v̄(R) = 0 (no deslizamiento en la subcapa viscosa)."
    en: "v̄ > 0, v̄(R) = 0 (no-slip in viscous sublayer)."
  areaMeaning:
    es: Área bajo v̄(r)·2πr dr = Q.
    en: Area under v̄(r)·2πr dr = Q.
  domainMeaning:
    es: "0 ≤ r ≤ R. Re > 4000. f: diagrama de Moody."
    en: "0 ≤ r ≤ R. Re > 4000. f: Moody diagram."
  modelConnection:
    es: "Flujo turbulento: mayor transferencia de cantidad de movimiento transversal que en el laminar."
    en: "Turbulent flow: greater transverse momentum transfer than laminar."
  formulaConnection:
    es: "Re = ρvd/μ, H_f = f·(L/d)·v²/(2g), f: diagrama de Moody."
    en: "Re = ρvd/μ, H_f = f·(L/d)·v²/(2g), f: Moody diagram."
  readingFocus:
    es: comparar el perfil con el parabólico; identificar la subcapa viscosa cerca de la pared.
    en: compare the profile with the parabolic; identify the viscous sublayer near the wall.
  agentHints:
    es:
      - "Turbulento: perfil plano, v_med/v_max ≈ 0.8."
      - "Subcapa viscosa: δ_v ≈ 5ν/u*."
      - Usar diagrama de Moody para f.
    en:
      - "Turbulent: flat profile, v_mean/v_max ≈ 0.8."
      - "Viscous sublayer: δ_v ≈ 5ν/u*."
      - Use Moody diagram for f.
  commonMistakes:
    es:
      - Usar Hagen-Poiseuille en flujo turbulento.
      - Olvidar la subcapa viscosa.
      - "No usar el diagrama de Moody para Re > 4000."
    en:
      - Using Hagen-Poiseuille in turbulent flow.
      - Forgetting the viscous sublayer.
      - "Not using the Moody diagram for Re > 4000."

svg:
  title:
    es: Escena SVG · Flujo Turbulento
    en: SVG Scene · Turbulent Flow
  sceneId: flujo_turbulento
  sceneLabel:
    es: Perfil de velocidad turbulento vs laminar
    en: Turbulent vs laminar velocity profile
  objects:
    es:
      - tubería circular
      - perfil plano turbulento
      - perfil parabólico laminar (referencia)
      - remolinos
      - subcapa viscosa
    en:
      - circular pipe
      - flat turbulent profile
      - parabolic laminar profile (reference)
      - eddies
      - viscous sublayer
  mainObject:
    es: fluido turbulento en tubería
    en: turbulent fluid in pipe
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Perfil casi plano en el centro; caída brusca cerca de la pared (subcapa viscosa). Remolinos visibles en la zona central.
    en: Nearly flat profile at centre; sharp drop near wall (viscous sublayer). Eddies visible in the central zone.
  interactions:
    es: Mezcla turbulenta iguala velocidades → perfil más plano. Mayor τ_w que en flujo laminar.
    en: Turbulent mixing equalises velocities → flatter profile. Higher τ_w than laminar flow.
  modelElements:
    es:
      - v̄(r) ≈ v_max·(1−r/R)^(1/n)
      - "Re > 4000"
      - H_f = f·(L/d)·v²/(2g)
    en:
      - v̄(r) ≈ v_max·(1−r/R)^(1/n)
      - "Re > 4000"
      - H_f = f·(L/d)·v²/(2g)
  visualCues:
    es:
      - Perfil plano (turbulento) vs parabólico (laminar).
      - Remolinos en el centro.
      - Subcapa viscosa fina en la pared.
    en:
      - Flat (turbulent) vs parabolic (laminar) profile.
      - Eddies in the centre.
      - Thin viscous sublayer at wall.
  scaleMeaning:
    es: Ancho de la subcapa viscosa ∝ 1/Re^(1/2).
    en: Viscous sublayer width ∝ 1/Re^(1/2).
  relation:
    es: "Perfil turbulento: más plano que Poiseuille."
    en: "Turbulent profile: flatter than Poiseuille."
  physicalReading:
    es: Comparar el perfil turbulento (casi plano) con el laminar (parabólico).
    en: Compare the turbulent (nearly flat) with the laminar (parabolic) profile.
  modelConnection:
    es: Flujo turbulento y subcapa viscosa.
    en: Turbulent flow and viscous sublayer.
  formulaConnection:
    es: Re = ρvd/μ, H_f = f·(L/d)·v²/(2g), diagrama de Moody.
    en: Re = ρvd/μ, H_f = f·(L/d)·v²/(2g), Moody diagram.
  readingFocus:
    es: identificar el perfil plano como turbulento y la subcapa viscosa en la pared.
    en: identify the flat profile as turbulent and the viscous sublayer at the wall.
  agentHints:
    es:
      - "Perfil plano → Re > 4000."
      - Subcapa viscosa → condición de no deslizamiento.
      - Remolinos → mezcla turbulenta.
    en:
      - "Flat profile → Re > 4000."
      - Viscous sublayer → no-slip condition.
      - Eddies → turbulent mixing.
  commonMistakes:
    es:
      - Pensar que v = 0 en toda la pared (no solo en la subcapa viscosa).
      - No calcular Re antes de decidir el régimen.
      - Usar Darcy f para Re < 2300.
    en:
      - Thinking v = 0 throughout the wall (only in viscous sublayer).
      - Not computing Re before deciding regime.
      - Using Darcy f for Re < 2300.
