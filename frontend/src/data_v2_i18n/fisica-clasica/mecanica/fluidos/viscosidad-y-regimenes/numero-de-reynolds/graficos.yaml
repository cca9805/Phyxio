version: "1.0"
leaf: "numero-de-reynolds"

coord:
  title:
    es: Gráfica Coord · Número de Reynolds
    en: Coord Graph · Reynolds Number
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: número de Reynolds Re
    en: Reynolds number Re
  xMagnitude: v
  yMagnitude: Re
  relation:
    es: "Re = ρvD/μ = vD/ν. Laminar: Re < 2300. Transición: 2300 < Re < 4000. Turbulento: Re > 4000."
    en: "Re = ρvD/μ = vD/ν. Laminar: Re < 2300. Transition: 2300 < Re < 4000. Turbulent: Re > 4000."
  physicalReading:
    es: Re = fuerzas inerciales / fuerzas viscosas. Re bajo → viscosidad domina. Re alto → inercia domina.
    en: Re = inertial forces / viscous forces. Low Re → viscosity dominates. High Re → inertia dominates.
  slopeMeaning:
    es: "dRe/dv = ρD/μ: pendiente (constante)."
    en: "dRe/dv = ρD/μ: slope (constant)."
  interceptMeaning:
    es: Re(0) = 0.
    en: Re(0) = 0.
  curvatureMeaning:
    es: Lineal (Re ∝ v).
    en: Linear (Re ∝ v).
  signMeaning:
    es: "Re > 0 siempre."
    en: "Re > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "v ≥ 0. D: diámetro hidráulico. ν = μ/ρ."
    en: "v ≥ 0. D: hydraulic diameter. ν = μ/ρ."
  modelConnection:
    es: "Número de Reynolds: criterio de régimen de flujo."
    en: "Reynolds number: flow regime criterion."
  formulaConnection:
    es: Re = ρvD/μ, f_Darcy = 64/Re (laminar), Moody (turbulento).
    en: Re = ρvD/μ, f_Darcy = 64/Re (laminar), Moody (turbulent).
  readingFocus:
    es: "leer Re y determinar el régimen: laminar, transición o turbulento."
    en: "read Re and determine regime: laminar, transition or turbulent."
  agentHints:
    es:
      - "Re < 2300: laminar."
      - "Re > 4000: turbulento."
      - Re = ρvD/μ = vD/ν.
    en:
      - "Re < 2300: laminar."
      - "Re > 4000: turbulent."
      - Re = ρvD/μ = vD/ν.
  commonMistakes:
    es:
      - Usar D incorrecto (diámetro hidráulico en secciones no circulares).
      - Confundir μ y ν.
      - Aplicar criterio de tubería en flujo externo.
    en:
      - Using wrong D (hydraulic diameter for non-circular sections).
      - Confusing μ and ν.
      - Applying pipe criterion to external flow.

svg:
  title:
    es: Escena SVG · Número de Reynolds
    en: SVG Scene · Reynolds Number
  sceneId: reynolds
  sceneLabel:
    es: Flujo laminar y turbulento en tubería con indicadores Re
    en: Laminar and turbulent flow in pipe with Re indicators
  objects:
    es:
      - tubería
      - líneas de corriente laminares (Re < 2300)
      - "líneas de corriente turbulentas (Re > 4000)"
      - indicador Re
      - frontera de transición
    en:
      - pipe
      - laminar streamlines (Re < 2300)
      - "turbulent streamlines (Re > 4000)"
      - Re indicator
      - transition boundary
  mainObject:
    es: flujo en tubería con distintos Re
    en: pipe flow at different Re
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Re < 2300: líneas de corriente paralelas. Re > 4000: líneas irregulares con vórtices."
    en: "Re < 2300: parallel streamlines. Re > 4000: irregular lines with vortices."
  interactions:
    es: "Re = ρvD/μ. Laminar: τ = μ·dv/dy. Turbulento: tensiones de Reynolds."
    en: "Re = ρvD/μ. Laminar: τ = μ·dv/dy. Turbulent: Reynolds stresses."
  modelElements:
    es:
      - Re = ρvD/μ
      - "Laminar: Re < 2300"
      - "Turbulento: Re > 4000"
    en:
      - Re = ρvD/μ
      - "Laminar: Re < 2300"
      - "Turbulent: Re > 4000"
  visualCues:
    es:
      - Líneas paralelas → laminar.
      - Líneas caóticas → turbulento.
      - "Colorante: recto en laminar; disperso en turbulento."
    en:
      - Parallel lines → laminar.
      - Chaotic lines → turbulent.
      - "Dye: straight in laminar; dispersed in turbulent."
  scaleMeaning:
    es: Grado de caos ∝ Re.
    en: Degree of chaos ∝ Re.
  relation:
    es: "Re = ρvD/μ: criterio de régimen."
    en: "Re = ρvD/μ: regime criterion."
  physicalReading:
    es: "Re bajo: flujo laminar ordenado. Re alto: flujo turbulento caótico."
    en: "Low Re: ordered laminar flow. High Re: chaotic turbulent flow."
  modelConnection:
    es: Número de Reynolds.
    en: Reynolds number.
  formulaConnection:
    es: Re = ρvD/μ, Re_crit ≈ 2300.
    en: Re = ρvD/μ, Re_crit ≈ 2300.
  readingFocus:
    es: identificar el régimen (laminar/turbulento) a partir de la morfología de las líneas de corriente.
    en: identify the regime (laminar/turbulent) from streamline morphology.
  agentHints:
    es:
      - Colorante recto → laminar.
      - Colorante disperso → turbulento.
      - "Transición: 2300 < Re < 4000."
    en:
      - Straight dye → laminar.
      - Dispersed dye → turbulent.
      - "Transition: 2300 < Re < 4000."
  commonMistakes:
    es:
      - Pensar que siempre hay flujo laminar a baja v.
      - Olvidar la influencia de D y ν.
      - Confundir Re_crit de tubería con el de placa plana.
    en:
      - Thinking low v always means laminar.
      - Forgetting influence of D and ν.
      - Confusing pipe Re_crit with flat plate Re_crit.
