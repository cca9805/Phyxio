version: 5
topic:
  id: perdidas-de-carga
  title:
    es: "Pérdidas de Carga"
    en: "Head Loss"
variables:
  - id: hf
    symbol: "h_f"
    nombre:
      es: "Pérdida de carga"
      en: "Head loss"
    unidad_si: "m"
  - id: f
    symbol: "f"
    nombre:
      es: "Factor de fricción"
      en: "Friction factor"
    unidad_si: "1"
  - id: L
    symbol: "L"
    nombre:
      es: "Longitud"
      en: "Length"
    unidad_si: "m"
  - id: D
    symbol: "D"
    nombre:
      es: "Diámetro"
      en: "Diameter"
    unidad_si: "m"
  - id: v
    symbol: "v"
    nombre:
      es: "Velocidad"
      en: "Velocity"
    unidad_si: "m/s"
  - id: g
    symbol: "g"
    nombre:
      es: "Gravedad"
      en: "Gravity"
    unidad_si: "m/s^2"
  - id: dp
    symbol: "\\Delta p"
    nombre:
      es: "Caída de presión"
      en: "Pressure drop"
    unidad_si: "Pa"
  - id: rho
    symbol: "\\rho"
    nombre:
      es: "Densidad"
      en: "Density"
    unidad_si: "kg/m^3"
  - id: Re
