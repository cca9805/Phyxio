version: "1.0"
leaf: "perdidas-de-carga"

coord:
  title:
    es: Gráfica Coord · Pérdidas de Carga
    en: Coord Graph · Head Losses
  xAxis:
    es: caudal Q (m³/s) o velocidad v (m/s)
    en: flow rate Q (m³/s) or velocity v (m/s)
  yAxis:
    es: pérdida de carga h_f (m)
    en: head loss h_f (m)
  xMagnitude: Q
  yMagnitude: h_f
  relation:
    es: "Darcy-Weisbach: h_f = f·(L/D)·v²/(2g). Laminar: f = 64/Re. Turbulento: diagrama de Moody."
    en: "Darcy-Weisbach: h_f = f·(L/D)·v²/(2g). Laminar: f = 64/Re. Turbulent: Moody diagram."
  physicalReading:
    es: "Laminar: h_f ∝ v (lineal). Turbulento: h_f ∝ v² (cuadrático). La pérdida de carga es energía disipada por la viscosidad."
    en: "Laminar: h_f ∝ v (linear). Turbulent: h_f ∝ v² (quadratic). Head loss is energy dissipated by viscosity."
  slopeMeaning:
    es: "Laminar: dh_f/dv = f·L/(D·2g) (constante). Turbulento: dh_f/dv = 2·f·L·v/(D·2g)."
    en: "Laminar: dh_f/dv = f·L/(D·2g) (constant). Turbulent: dh_f/dv = 2·f·L·v/(D·2g)."
  interceptMeaning:
    es: h_f(0) = 0.
    en: h_f(0) = 0.
  curvatureMeaning:
    es: "Laminar: lineal. Turbulento: cuadrático."
    en: "Laminar: linear. Turbulent: quadratic."
  signMeaning:
    es: "h_f > 0 siempre (disipación)."
    en: "h_f > 0 always (dissipation)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "v ≥ 0. Pérdidas menores: K·v²/(2g)."
    en: "v ≥ 0. Minor losses: K·v²/(2g)."
  modelConnection:
    es: Darcy-Weisbach y diagrama de Moody.
    en: Darcy-Weisbach and Moody diagram.
  formulaConnection:
    es: h_f = f·(L/D)·v²/(2g), f = 64/Re (laminar), h_m = K·v²/(2g) (pérdidas menores).
    en: h_f = f·(L/D)·v²/(2g), f = 64/Re (laminar), h_m = K·v²/(2g) (minor losses).
  readingFocus:
    es: leer h_f a un Q dado y calcular el gradiente de presión = ρg·h_f/L.
    en: read h_f at a given Q and compute pressure gradient = ρg·h_f/L.
  agentHints:
    es:
      - "Laminar: h_f ∝ v."
      - "Turbulento: h_f ∝ v²."
      - Diagrama de Moody para f en turbulento.
    en:
      - "Laminar: h_f ∝ v."
      - "Turbulent: h_f ∝ v²."
      - Moody diagram for f in turbulent.
  commonMistakes:
    es:
      - Usar f = 64/Re en régimen turbulento.
      - Olvidar las pérdidas menores K.
      - No convertir h_f a Δp = ρg·h_f.
    en:
      - Using f = 64/Re in turbulent regime.
      - Forgetting minor losses K.
      - Not converting h_f to Δp = ρg·h_f.

svg:
  title:
    es: Escena SVG · Pérdidas de Carga
    en: SVG Scene · Head Losses
  sceneId: perdidas_de_carga
  sceneLabel:
    es: Tubería con gradiente de energía hidráulica y pérdidas
    en: Pipe with hydraulic energy gradient and losses
  objects:
    es:
      - tubería de longitud L
      - línea de energía total (LET)
      - línea piezométrica (LP)
      - pérdidas de carga h_f
      - codos y accesorios (pérdidas menores)
    en:
      - pipe of length L
      - total energy line (TEL)
      - piezometric line (PL)
      - head losses h_f
      - bends and fittings (minor losses)
  mainObject:
    es: flujo en tubería con pérdidas
    en: pipe flow with losses
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "LET cae con pendiente = h_f/L. Pérdidas menores: caída brusca en accesorios."
    en: "TEL falls with slope = h_f/L. Minor losses: sudden drop at fittings."
  interactions:
    es: "Bernoulli con pérdidas: p₁/ρg + v₁²/(2g) + z₁ = p₂/ρg + v₂²/(2g) + z₂ + h_f."
    en: "Bernoulli with losses: p₁/ρg + v₁²/(2g) + z₁ = p₂/ρg + v₂²/(2g) + z₂ + h_f."
  modelElements:
    es:
      - h_f = f·(L/D)·v²/(2g)
      - "LET: pendiente = h_f/L"
      - h_m = K·v²/(2g)
    en:
      - h_f = f·(L/D)·v²/(2g)
      - "TEL: slope = h_f/L"
      - h_m = K·v²/(2g)
  visualCues:
    es:
      - LET cae linealmente (pérdidas continuas).
      - "Caída brusca: pérdidas menores."
      - LP = LET − v²/(2g).
    en:
      - TEL falls linearly (continuous losses).
      - "Sudden drop: minor losses."
      - PL = TEL − v²/(2g).
  scaleMeaning:
    es: Pendiente de la LET = h_f/L.
    en: TEL slope = h_f/L.
  relation:
    es: h_f = f·(L/D)·v²/(2g).
    en: h_f = f·(L/D)·v²/(2g).
  physicalReading:
    es: La LET siempre decrece en la dirección del flujo (segunda ley de la termodinámica).
    en: The TEL always decreases in the flow direction (second law of thermodynamics).
  modelConnection:
    es: Darcy-Weisbach, Bernoulli generalizado.
    en: Darcy-Weisbach, generalised Bernoulli.
  formulaConnection:
    es: "h_f = f·(L/D)·v²/(2g), Bernoulli: E₁ = E₂ + h_f."
    en: "h_f = f·(L/D)·v²/(2g), Bernoulli: E₁ = E₂ + h_f."
  readingFocus:
    es: leer la pendiente de la LET y calcular h_f total.
    en: read the TEL slope and compute total h_f.
  agentHints:
    es:
      - LET siempre decrece.
      - Pendiente LET = h_f/L.
      - "Pérdidas menores: caída puntual."
    en:
      - TEL always decreases.
      - TEL slope = h_f/L.
      - "Minor losses: point drop."
  commonMistakes:
    es:
      - Pensar que la LET puede subir sin bomba.
      - Olvidar pérdidas menores.
      - No sumar pérdidas continuas y menores.
    en:
      - Thinking TEL can rise without a pump.
      - Forgetting minor losses.
      - Not adding continuous and minor losses.
