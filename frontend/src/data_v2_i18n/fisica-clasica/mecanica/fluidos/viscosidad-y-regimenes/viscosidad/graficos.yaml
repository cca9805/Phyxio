version: "1.0"
leaf: "viscosidad"

coord:
  title:
    es: Gráfica Coord · Viscosidad
    en: Coord Graph · Viscosity
  xAxis:
    es: tasa de deformación dv/dy (s⁻¹)
    en: shear rate dv/dy (s⁻¹)
  yAxis:
    es: tensión tangencial τ (Pa)
    en: shear stress τ (Pa)
  xMagnitude: dv_dy
  yMagnitude: tau
  relation:
    es: "Fluido newtoniano: τ = μ·(dv/dy). Recta de pendiente μ (Pa·s). Fluido no newtoniano: τ no lineal."
    en: "Newtonian fluid: τ = μ·(dv/dy). Line with slope μ (Pa·s). Non-Newtonian: τ non-linear."
  physicalReading:
    es: "Pendiente = μ (viscosidad dinámica). Agua: μ(20°C) ≈ 10⁻³ Pa·s. Aceite: μ ≈ 0.1 Pa·s."
    en: "Slope = μ (dynamic viscosity). Water: μ(20°C) ≈ 10⁻³ Pa·s. Oil: μ ≈ 0.1 Pa·s."
  slopeMeaning:
    es: "Pendiente = μ (Pa·s): viscosidad dinámica."
    en: "Slope = μ (Pa·s): dynamic viscosity."
  interceptMeaning:
    es: τ(0) = 0 para fluidos newtonianos.
    en: τ(0) = 0 for Newtonian fluids.
  curvatureMeaning:
    es: "Lineal (newtoniano). No lineal: pseudoplástico (n < 1) o dilatante (n > 1)."
    en: "Linear (Newtonian). Non-linear: pseudoplastic (n < 1) or dilatant (n > 1)."
  signMeaning:
    es: "τ > 0 en el sentido opuesto al flujo."
    en: "τ > 0 opposing flow direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: dv/dy ≥ 0. μ decrece con T en líquidos.
    en: dv/dy ≥ 0. μ decreases with T in liquids.
  modelConnection:
    es: "Ley de Newton de viscosidad: τ = μ·(dv/dy)."
    en: "Newton's law of viscosity: τ = μ·(dv/dy)."
  formulaConnection:
    es: "τ = μ·(dv/dy), Re = ρvD/μ, Poiseuille: Q = πR⁴Δp/(8μL)."
    en: "τ = μ·(dv/dy), Re = ρvD/μ, Poiseuille: Q = πR⁴Δp/(8μL)."
  readingFocus:
    es: leer la pendiente (= μ) y el tipo de fluido (newtoniano vs no newtoniano).
    en: read the slope (= μ) and fluid type (Newtonian vs non-Newtonian).
  agentHints:
    es:
      - μ_agua(20°C) ≈ 10⁻³ Pa·s.
      - μ_aceite ≈ 0.1 Pa·s.
      - μ líquidos decrece con T; μ gases aumenta con T.
    en:
      - μ_water(20°C) ≈ 10⁻³ Pa·s.
      - μ_oil ≈ 0.1 Pa·s.
      - Liquid μ decreases with T; gas μ increases with T.
  commonMistakes:
    es:
      - Confundir μ (dinámica) y ν (cinemática).
      - Aplicar Ley de Newton en fluidos no newtonianos.
      - No corregir μ por temperatura.
    en:
      - Confusing μ (dynamic) and ν (kinematic).
      - "Applying Newton's law to non-Newtonian fluids."
      - Not correcting μ for temperature.

svg:
  title:
    es: Escena SVG · Viscosidad
    en: SVG Scene · Viscosity
  sceneId: viscosidad
  sceneLabel:
    es: Fluido entre dos placas (Couette) con perfil de velocidad lineal
    en: Fluid between two plates (Couette) with linear velocity profile
  objects:
    es:
      - placa inferior (estática)
      - placa superior (v = U)
      - fluido entre placas
      - perfil lineal v(y)
      - fuerza F → τ
    en:
      - bottom plate (static)
      - top plate (v = U)
      - fluid between plates
      - linear profile v(y)
      - force F → τ
  mainObject:
    es: flujo de Couette (placas paralelas)
    en: Couette flow (parallel plates)
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "Placa inferior: v = 0. Placa superior: v = U. Perfil lineal: v(y) = U·y/h. τ = μ·U/h."
    en: "Bottom plate: v = 0. Top plate: v = U. Linear profile: v(y) = U·y/h. τ = μ·U/h."
  interactions:
    es: τ = μ·(dv/dy) = μ·U/h constante.
    en: τ = μ·(dv/dy) = μ·U/h (constant).
  modelElements:
    es:
      - v(y) = U·y/h
      - τ = μ·U/h
      - dv/dy = U/h constante
    en:
      - v(y) = U·y/h
      - τ = μ·U/h
      - dv/dy = U/h constant
  visualCues:
    es:
      - Flechas de velocidad linealmente crecientes.
      - τ constante entre las placas.
      - Placa superior arrastra el fluido.
    en:
      - Velocity arrows linearly increasing.
      - Constant τ between plates.
      - Top plate drags the fluid.
  scaleMeaning:
    es: Longitud de flechas ∝ v(y).
    en: Arrow length ∝ v(y).
  relation:
    es: "Flujo de Couette: τ = μ·(dv/dy)."
    en: "Couette flow: τ = μ·(dv/dy)."
  physicalReading:
    es: El perfil lineal indica flujo newtoniano laminar entre placas.
    en: The linear profile indicates laminar Newtonian flow between plates.
  modelConnection:
    es: Ley de Newton de viscosidad.
    en: "Newton's law of viscosity."
  formulaConnection:
    es: τ = μ·(dv/dy), F = τ·A = μ·(U/h)·A.
    en: τ = μ·(dv/dy), F = τ·A = μ·(U/h)·A.
  readingFocus:
    es: leer el perfil lineal v(y) y calcular τ = μ·U/h.
    en: read the linear profile v(y) and compute τ = μ·U/h.
  agentHints:
    es:
      - Perfil lineal → flujo de Couette.
      - τ = μ·U/h.
      - No deslizamiento en las paredes.
    en:
      - Linear profile → Couette flow.
      - τ = μ·U/h.
      - No-slip at walls.
  commonMistakes:
    es:
      - Pensar que el perfil es parabólico (eso es Poiseuille).
      - Olvidar no-slip.
      - No incluir el área A en la fuerza.
    en:
      - "Thinking the profile is parabolic (that's Poiseuille)."
      - Forgetting no-slip.
      - Not including area A in the force.
