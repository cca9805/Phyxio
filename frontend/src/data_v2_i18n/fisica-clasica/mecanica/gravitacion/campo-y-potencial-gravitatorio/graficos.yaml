version: "1.0"
leaf: "campo-y-potencial-gravitatorio"

coord:
  title:
    es: Gráfica Coord · Campo y Potencial Gravitatorio
    en: Coord Graph · Gravitational Field and Potential
  xAxis:
    es: distancia r (m) al centro de masa
    en: distance r (m) from centre of mass
  yAxis:
    es: campo g (N/kg) o potencial V_g (J/kg)
    en: field g (N/kg) or potential V_g (J/kg)
  xMagnitude: r
  yMagnitude: g
  relation:
    es: g = G·M/r² (campo, ∝ 1/r²). V_g = −G·M/r (potencial, ∝ 1/r). g = −dV_g/dr.
    en: g = G·M/r² (field, ∝ 1/r²). V_g = −G·M/r (potential, ∝ 1/r). g = −dV_g/dr.
  physicalReading:
    es: "Campo g: hipérbola 1/r² (más rápida). Potencial V_g: hipérbola 1/r (más lenta). Ambos negativos (pozos de potencial)."
    en: "Field g: 1/r² hyperbola (faster). Potential V_g: 1/r hyperbola (slower). Both negative (potential wells)."
  slopeMeaning:
    es: "dg/dr = −2G·M/r³ < 0. dV_g/dr = G·M/r² > 0."
    en: "dg/dr = −2G·M/r³ < 0. dV_g/dr = G·M/r² > 0."
  interceptMeaning:
    es: g, V_g → ∞ en r → 0. g, V_g → 0 en r → ∞.
    en: g, V_g → ∞ at r → 0. g, V_g → 0 at r → ∞.
  curvatureMeaning:
    es: "g: curvatura 1/r². V_g: curvatura 1/r."
    en: "g: 1/r² curvature. V_g: 1/r curvature."
  signMeaning:
    es: "g > 0 (módulo), V_g < 0 (pozo)."
    en: "g > 0 (modulus), V_g < 0 (well)."
  areaMeaning:
    es: ∫g·dr = −ΔV_g = −ΔE_p/m.
    en: ∫g·dr = −ΔV_g = −ΔE_p/m.
  domainMeaning:
    es: "r > R (exterior al cuerpo). Interior: g ∝ r."
    en: "r > R (exterior). Interior: g ∝ r."
  modelConnection:
    es: Campo y potencial gravitatorio.
    en: Gravitational field and potential.
  formulaConnection:
    es: g = G·M/r², V_g = −G·M/r, E_p = m·V_g = −G·Mm/r.
    en: g = G·M/r², V_g = −G·M/r, E_p = m·V_g = −G·Mm/r.
  readingFocus:
    es: leer la curva g ∝ 1/r² y V_g ∝ 1/r; relacionar g = −dV_g/dr.
    en: read the g ∝ 1/r² and V_g ∝ 1/r curves; relate g = −dV_g/dr.
  agentHints:
    es:
      - g = G·M/r².
      - V_g = −G·M/r.
      - g = −dV_g/dr.
    en:
      - g = G·M/r².
      - V_g = −G·M/r.
      - g = −dV_g/dr.
  commonMistakes:
    es:
      - Confundir g (campo) con V_g (potencial).
      - Olvidar el signo negativo de V_g.
      - Aplicar fórmulas de superficie (g = 9.8 m/s²) a r ≠ R_T.
    en:
      - Confusing g (field) with V_g (potential).
      - Forgetting the negative sign of V_g.
      - Applying surface formulas (g = 9.8 m/s²) at r ≠ R_T.
