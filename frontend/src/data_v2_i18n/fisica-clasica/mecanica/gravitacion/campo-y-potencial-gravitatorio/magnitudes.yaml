version: 5
magnitudes:
- id: G
  symbol: G
  nombre:
    es: Constante de gravitación universal
    en: Universal gravitation constant
  si_unit: "N*m^2/kg^2"
  unidad_si: "N*m^2/kg^2"
  dimension: M^-1*L^3*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: constante_fundamental
  used_in: [ campo_puntual, potencial_puntual, cambio_energia_potencial ]
  common_mistake: "Usar un valor redondeado incompatible con el nivel de precisión del problema."
  sign_behavior: siempre_positivo
  zero_behavior: sin_interaccion_gravitatoria
  value_nature: constante
  interpretation_role: escala_intensidad_gravitatoria
  graph_binding: "Escala la caída de campo y potencial frente a la distancia radial."
  descripcion:
    es: Constante universal que fija la intensidad de la interacción gravitatoria clásica.
    en: Universal constant setting the intensity of classical gravitational interaction.
  typical_range: [ 6.6743e-11, 6.6743e-11 ]
  pedagogical_notes:
    es: Conviene mantener al menos cuatro cifras significativas en ejercicios universitarios.
    en: It is useful to keep at least four significant digits in university-level exercises.

- id: M
  symbol: M
  nombre:
    es: Masa fuente
    en: Source mass
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: gravitacion
  physical_role: generador_campo
  used_in: [ campo_puntual, potencial_puntual, cambio_energia_potencial ]
  common_mistake: "Confundir masa fuente con masa de prueba en el despeje."
  sign_behavior: siempre_positivo
  zero_behavior: ausencia_fuente
  value_nature: parametro_sistema
  interpretation_role: intensidad_origen
  graph_binding: "Determina la curvatura de las curvas de g y V en el gráfico Coord."
  descripcion:
    es: Masa del cuerpo que genera el campo y el potencial gravitatorio.
    en: Mass of the body that generates gravitational field and potential.
  typical_range: [ 1e+3, 1e+30 ]
  pedagogical_notes:
    es: En problemas planetarios, M suele dominar la escala energética global.
    en: In planetary problems, M usually dominates the global energy scale.

- id: m
  symbol: m
  nombre:
    es: Masa de prueba
    en: Test mass
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: gravitacion
  physical_role: cuerpo_sometido
  used_in: [ energia_desde_potencial, cambio_energia_potencial ]
  common_mistake: "Incluir m en el cálculo de V cuando se pide potencial por unidad de masa."
  sign_behavior: siempre_positivo
  zero_behavior: sin_energia_potencial
  value_nature: parametro_sistema
  interpretation_role: escala_respuesta
  graph_binding: "Afecta la lectura energética sin cambiar la forma espacial de V."
  descripcion:
    es: Masa del objeto que experimenta el campo gravitatorio.
    en: Mass of the object experiencing the gravitational field.
  typical_range: [ 1e-6, 1e+9 ]
  pedagogical_notes:
    es: g y V no dependen de m, pero U y Wg sí dependen linealmente de m.
    en: g and V do not depend on m, but U and Wg depend linearly on m.

- id: r
  symbol: r
  nombre:
    es: Distancia radial
    en: Radial distance
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: coordenada_central
  used_in: [ campo_puntual, potencial_puntual ]
  common_mistake: "Usar altura sobre superficie sin sumar el radio del planeta."
  sign_behavior: siempre_positivo
  zero_behavior: singularidad_modelo
  value_nature: variable
  interpretation_role: escala_espacial
  graph_binding: "Es el eje horizontal principal para lectura de g(r) y V(r)."
  descripcion:
    es: Distancia desde el centro de la masa fuente al punto de análisis.
    en: Distance from source-mass center to the analysis point.
  typical_range: [ 1, 1e+12 ]
  pedagogical_notes:
    es: El modelo puntual deja de ser válido dentro de distribuciones extensas no esféricas.
    en: The point-mass model fails inside extended non-spherical mass distributions.

- id: g
  symbol: g
  nombre:
    es: Campo gravitatorio
    en: Gravitational field
  si_unit: "m/s^2"
  unidad_si: "m/s^2"
  dimension: L*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: intensidad_campo
  used_in: [ campo_puntual ]
  common_mistake: "Tratar g local como constante incluso en variaciones radiales grandes."
  sign_behavior: positivo_en_modulo
  zero_behavior: anulacion_campo
  value_nature: variable
  interpretation_role: aceleracion_local
  graph_binding: "Permite visualizar gradiente radial y zona de variación relevante."
  descripcion:
    es: Magnitud de la aceleración gravitatoria producida por la masa fuente.
    en: Magnitude of gravitational acceleration produced by the source mass.
  typical_range: [ 1e-6, 1e+4 ]
  pedagogical_notes:
    es: Conviene diferenciar entre módulo de g y dirección radial hacia el centro.
    en: It is useful to distinguish g magnitude from radial inward direction.

- id: V
  symbol: V
  nombre:
    es: Potencial gravitatorio
    en: Gravitational potential
  si_unit: "J/kg"
  unidad_si: "J/kg"
  dimension: L^2*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: potencial_escalar
  used_in: [ potencial_puntual, energia_desde_potencial ]
  common_mistake: "Olvidar que con referencia en infinito V es negativo para M positiva."
  sign_behavior: negativo_en_referencia_infinita
  zero_behavior: referencia_infinito
  value_nature: variable
  interpretation_role: energia_por_masa
  graph_binding: "Muestra el pozo gravitatorio y su pendiente asociada al campo."
  descripcion:
    es: Energía potencial por unidad de masa asociada al campo gravitatorio.
    en: Potential energy per unit mass associated with the gravitational field.
  typical_range: [ -1e+9, -1 ]
  pedagogical_notes:
    es: El signo de V depende de la referencia, no de una propiedad misteriosa del sistema.
    en: The sign of V depends on reference choice, not on a mysterious system property.

- id: U
  symbol: U
  nombre:
    es: Energía potencial gravitatoria
    en: Gravitational potential energy
  si_unit: J
  unidad_si: J
  dimension: M*L^2*T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: energia_configuracion
  used_in: [ energia_desde_potencial ]
  common_mistake: "Cambiar el signo de U al mover un cuerpo sin revisar referencia energética."
  sign_behavior: depende_referencia
  zero_behavior: nivel_referencia
  value_nature: variable
  interpretation_role: balance_energetico
  graph_binding: "Permite comparar estados inicial y final de manera cuantitativa."
  descripcion:
    es: Energía asociada a la posición relativa de la masa de prueba en el campo.
    en: Energy associated with the relative position of the test mass in the field.
  typical_range: [ -1e+12, 1e+12 ]
  pedagogical_notes:
    es: U permite resolver cambios de estado sin integrar fuerzas punto a punto.
    en: U allows state-change solutions without integrating forces point by point.

- id: DeltaV
  symbol: \Delta V
  nombre:
    es: Cambio de potencial gravitatorio
    en: Gravitational potential change
  si_unit: "J/kg"
  unidad_si: "J/kg"
  dimension: L^2*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: diferencia_potencial
  used_in: [ potencial_puntual ]
  common_mistake: "Usar DeltaV con orden de radios invertido sin revisar el signo."
  sign_behavior: depende_sentido_desplazamiento
  zero_behavior: mismo_punto
  value_nature: diferencia
  interpretation_role: lectura_energetica_por_masa
  graph_binding: "Conecta la lectura entre dos puntos del gráfico de potencial."
  descripcion:
    es: Variación de potencial entre dos posiciones radiales.
    en: Potential variation between two radial positions.
  typical_range: [ -1e+8, 1e+8 ]
  pedagogical_notes:
    es: Es la forma más directa de estimar trabajo por unidad de masa.
    en: It is the most direct way to estimate work per unit mass.

- id: DeltaU
  symbol: \Delta U
  nombre:
    es: Cambio de energía potencial gravitatoria
    en: Gravitational potential energy change
  si_unit: J
  unidad_si: J
  dimension: M*L^2*T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: transferencia_energetica
  used_in: [ cambio_energia_potencial, trabajo_gravitatorio ]
  common_mistake: "Confundir DeltaU con el trabajo de la gravedad sin aplicar el signo físico."
  sign_behavior: depende_sentido_y_referencia
  zero_behavior: estado_inalterado
  value_nature: diferencia
  interpretation_role: cambio_configuracion
  graph_binding: "Resume la diferencia entre estados energéticos inicial y final."
  descripcion:
    es: Diferencia de energía potencial entre dos radios o estados.
    en: Potential-energy difference between two radii or states.
  typical_range: [ -1e+12, 1e+12 ]
  pedagogical_notes:
    es: Es clave para conectar análisis dinámico con análisis energético.
    en: It is key for connecting dynamical and energetic analysis.

- id: Wg
  symbol: W_g
  nombre:
    es: Trabajo gravitatorio
    en: Gravitational work
  si_unit: J
  unidad_si: J
  dimension: M*L^2*T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: trabajo_fuerza_campo
  used_in: [ trabajo_gravitatorio ]
  common_mistake: "Aplicar Wg con el mismo signo que DeltaU en todos los casos."
  sign_behavior: opuesto_a_deltaU
  zero_behavior: sin_desplazamiento_radial
  value_nature: transferencia
  interpretation_role: intercambio_trabajo_energia
  graph_binding: "Relaciona cambios de posición radial con energía intercambiada."
  descripcion:
    es: Trabajo realizado por la fuerza gravitatoria entre dos estados.
    en: Work done by gravitational force between two states.
  typical_range: [ -1e+12, 1e+12 ]
  pedagogical_notes:
    es: Si Wg es positivo, el campo entrega energía cinética al sistema.
    en: If Wg is positive, the field delivers kinetic energy to the system.

- id: ri
  symbol: r_i
  nombre:
    es: Radio inicial
    en: Initial radius
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: estado_inicial
  used_in: [ cambio_energia_potencial ]
  common_mistake: "Tomar ri desde la superficie y rf desde el centro en el mismo cálculo."
  sign_behavior: siempre_positivo
  zero_behavior: singularidad_modelo
  value_nature: parametro_estado
  interpretation_role: posicion_inicial
  graph_binding: "Marca el punto de partida para lectura de diferencias en g y V."
  descripcion:
    es: Distancia radial del estado inicial.
    en: Radial distance for the initial state.
  typical_range: [ 1, 1e+12 ]
  pedagogical_notes:
    es: Debe medirse con la misma referencia geométrica que rf.
    en: It must be measured with the same geometric reference as rf.

- id: rf
  symbol: r_f
  nombre:
    es: Radio final
    en: Final radius
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: estado_final
  used_in: [ cambio_energia_potencial ]
  common_mistake: "Intercambiar rf y ri al copiar datos del enunciado."
  sign_behavior: siempre_positivo
  zero_behavior: singularidad_modelo
  value_nature: parametro_estado
  interpretation_role: posicion_final
  graph_binding: "Marca el punto final para comparar niveles de campo y potencial."
  descripcion:
    es: Distancia radial del estado final.
    en: Radial distance for the final state.
  typical_range: [ 1, 1e+12 ]
  pedagogical_notes:
    es: El signo de DeltaU depende del orden físico entre ri y rf.
    en: The sign of DeltaU depends on the physical order between ri and rf.

- id: gi
  symbol: g_i
  nombre:
    es: Campo gravitatorio inicial
    en: Initial gravitational field
  si_unit: "m/s^2"
  unidad_si: "m/s^2"
  dimension: L*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: lectura_estado_inicial
  used_in: [ campo_puntual ]
  common_mistake: "Asumir gi igual a gf aunque exista cambio radial apreciable."
  sign_behavior: positivo_en_modulo
  zero_behavior: anulacion_campo
  value_nature: estado
  interpretation_role: condicion_inicial
  graph_binding: "Permite comparar intensidad de campo entre inicio y final."
  descripcion:
    es: Intensidad de campo en el punto inicial del proceso.
    en: Field intensity at the initial point of the process.
  typical_range: [ 1e-6, 1e+4 ]
  pedagogical_notes:
    es: gi es útil para verificar coherencia en aproximaciones de g constante.
    en: gi is useful for checking consistency in constant-g approximations.

- id: gf
  symbol: g_f
  nombre:
    es: Campo gravitatorio final
    en: Final gravitational field
  si_unit: "m/s^2"
  unidad_si: "m/s^2"
  dimension: L*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: lectura_estado_final
  used_in: [ campo_puntual ]
  common_mistake: "Reportar gf sin revisar si el movimiento se aleja o acerca al centro."
  sign_behavior: positivo_en_modulo
  zero_behavior: anulacion_campo
  value_nature: estado
  interpretation_role: condicion_final
  graph_binding: "Cierra la comparación de gradiente entre dos estados radiales."
  descripcion:
    es: Intensidad de campo en el punto final del proceso.
    en: Field intensity at the final point of the process.
  typical_range: [ 1e-6, 1e+4 ]
  pedagogical_notes:
    es: La diferencia entre gi y gf cuantifica cambios de aceleración local.
    en: The difference between gi and gf quantifies local acceleration changes.
