version: "1.0"
leaf: "energia-potencial-gravitatoria"

coord:
  title:
    es: Gráfica Coord · Energía Potencial Gravitatoria
    en: Coord Graph · Gravitational Potential Energy
  xAxis:
    es: distancia r (m) al centro de masa
    en: distance r (m) from centre of mass
  yAxis:
    es: energía potencial gravitatoria E_p (J)
    en: gravitational potential energy E_p (J)
  xMagnitude: r
  yMagnitude: E_p
  relation:
    es: E_p = −G·M·m/r. Hipérbola 1/r negativa. E_p → 0 en r → ∞ (referencia). E_p → −∞ en r → 0.
    en: E_p = −G·M·m/r. Negative 1/r hyperbola. E_p → 0 as r → ∞ (reference). E_p → −∞ as r → 0.
  physicalReading:
    es: "E_p siempre negativa (pozo de potencial). Para escapar: E_cin ≥ |E_p| → v_escape = √(2GM/r)."
    en: "E_p always negative (potential well). To escape: E_kin ≥ |E_p| → v_escape = √(2GM/r)."
  slopeMeaning:
    es: "dE_p/dr = G·M·m/r² > 0: E_p se vuelve menos negativa al alejarse."
    en: "dE_p/dr = G·M·m/r² > 0: E_p becomes less negative with increasing r."
  interceptMeaning:
    es: E_p → 0 en r → ∞.
    en: E_p → 0 at r → ∞.
  curvatureMeaning:
    es: "Hipérbola 1/r: curvatura ∝ 1/r²."
    en: "1/r hyperbola: curvature ∝ 1/r²."
  signMeaning:
    es: E_p < 0 siempre.
    en: E_p < 0 always.
  areaMeaning:
    es: ΔE_p = trabajo realizado por la gravedad (con signo opuesto).
    en: ΔE_p = work done by gravity (opposite sign).
  domainMeaning:
    es: "r > 0. Referencia en r → ∞."
    en: "r > 0. Reference at r → ∞."
  modelConnection:
    es: Energía potencial gravitatoria y velocidad de escape.
    en: Gravitational potential energy and escape velocity.
  formulaConnection:
    es: E_p = −G·Mm/r, v_esc = √(2GM/r), E_total = E_cin + E_p.
    en: E_p = −G·Mm/r, v_esc = √(2GM/r), E_total = E_kin + E_p.
  readingFocus:
    es: leer E_p en un r dado y calcular la energía necesaria para escapar.
    en: read E_p at a given r and compute the energy needed to escape.
  agentHints:
    es:
      - E_p = −G·Mm/r.
      - E_p = 0 en r → ∞.
      - v_esc = √(2GM/R).
    en:
      - E_p = −G·Mm/r.
      - E_p = 0 at r → ∞.
      - v_esc = √(2GM/R).
  commonMistakes:
    es:
      - Usar E_p = mgh para r ≫ R_T.
      - Olvidar que E_p < 0.
      - Tomar r = 0 como referencia en lugar de r → ∞.
    en:
      - Using E_p = mgh for r ≫ R_T.
      - Forgetting E_p < 0.
      - Taking r = 0 as reference instead of r → ∞.
