version: 5
id: energia-potencial-gravitatoria-interp
leaf_id: energia-potencial-gravitatoria
scope: local
nombre:
  es: Lectura de energia potencial gravitatoria
  en: Gravitational potential-energy reading

output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step

result_blocks:
  summary:
    title: { es: Resumen fisico, en: Physical summary }
  physical_reading:
    title: { es: Lectura fisica, en: Physical reading }
  coherence:
    title: { es: Coherencia de datos, en: Data coherence }
  model_validity:
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    title: { es: Lectura del grafico, en: Graph reading }
  likely_errors:
    title: { es: Errores probables, en: Likely errors }
  next_step:
    title: { es: Siguiente paso, en: Next step }

dependencies:
  requires_magnitudes: true
  requires_formulas: true
  supports_graph_binding: true
  magnitudes: [ G, M, m, r, ri, rf, U, Ui, Uf, DeltaU, K, DeltaK, E, Wg, h, g ]
  formulas: [ energia_potencial_general, cambio_energia_potencial, energia_mecanica, conservacion_energia, trabajo_gravitatorio, aproximacion_superficial, condicion_ligadura_conceptual ]

targets:
  U:
    summary_rules:
    - id: u-sign-summary
      when: U < 0
      status: success
      text:
        es: "Con referencia en infinito, energia potencial negativa es coherente para estados ligados."
        en: "With infinity reference, negative potential energy is coherent for bound states."
    physical_reading_rules:
    - id: u-reading
      when: r > 0
      status: info
      text:
        es: "Al aumentar la distancia radial, la energia potencial se vuelve menos negativa."
        en: "As radial distance increases, potential energy becomes less negative."
    coherence_rules:
    - id: u-coh
      when: r > 0 and M > 0 and m > 0
      status: success
      text:
        es: "Los datos de masa y distancia son coherentes para lectura energetica."
        en: "Mass and distance data are coherent for energetic reading."
    model_validity_rules:
    - id: u-validity
      when: r > 0
      status: success
      text:
        es: "Valido para campo central con simetria esferica aproximada."
        en: "Valid for central fields with approximate spherical symmetry."
    graph_rules:
    - id: u-graph
      when: r > 0
      status: info
      text:
        es: "La curva de energia potencial cae con fuerza a radios pequenos."
        en: "Potential-energy curve drops strongly at small radii."
    likely_errors:
    - id: u-reference-sign-confusion
      when: U > 0 and r > 0 and M > 0 and m > 0
      status: error
      text:
        es: "Error conceptual: confundir referencia energetica y asumir energia potencial positiva con referencia en infinito."
        en: "Conceptual error: confusing energy reference and assuming positive potential energy under infinity reference."
    next_step_rules:
    - id: u-next
      when: r > 0
      status: info
      text:
        es: "Comparar energia inicial y final para obtener cambio de energia potencial."
        en: "Compare initial and final energy to obtain potential-energy change."

  DeltaU:
    summary_rules:
    - id: du-summary
      when: ri > 0
      status: success
      text:
        es: "El cambio de energia potencial resume la transferencia entre estados."
        en: "Potential-energy change summarizes transfer between states."
    physical_reading_rules:
    - id: du-physical
      when: rf > ri
      status: info
      text:
        es: "Si el radio final es mayor, el cambio potencial suele ser positivo."
        en: "If final radius is larger, potential change is usually positive."
    coherence_rules:
    - id: du-work-coh
      when: Wg + DeltaU == 0
      status: success
      text:
        es: "Trabajo gravitatorio y cambio potencial conservan coherencia."
        en: "Gravitational work and potential change remain coherent."
    model_validity_rules:
    - id: du-validity
      when: ri > 0 and rf > 0
      status: success
      text:
        es: "Valido cuando ambos radios usan la misma referencia geometrica."
        en: "Valid when both radii use the same geometric reference."
    graph_rules:
    - id: du-graph
      when: ri > 0 and rf > 0
      status: info
      text:
        es: "Se interpreta como diferencia vertical entre dos puntos de la curva."
        en: "It is read as vertical difference between two points on the curve."
    likely_errors:
    - id: du-order-concept
      when: ri == rf
      status: error
      text:
        es: "Error conceptual probable: igualar estados y reportar cambio no nulo rompe la lectura fisica."
        en: "Likely conceptual error: equal states with nonzero change breaks physical interpretation."
    next_step_rules:
    - id: du-next
      when: ri > 0 and rf > 0
      status: info
      text:
        es: "Usar conservacion para inferir cambio de energia cinetica."
        en: "Use conservation to infer kinetic-energy change."

  E:
    summary_rules:
    - id: e-summary
      when: E == E
      status: info
      text:
        es: "La energia mecanica total combina estado cinetico y potencial."
        en: "Total mechanical energy combines kinetic and potential state."
    physical_reading_rules:
    - id: e-bound-reading
      when: E < 0
      status: success
      text:
        es: "Energia total negativa sugiere estado ligado."
        en: "Negative total energy suggests a bound state."
    coherence_rules:
    - id: e-coh
      when: E == K + U
      status: success
      text:
        es: "Balance mecanico total coherente con definicion del modelo."
        en: "Total mechanical balance is coherent with model definition."
    model_validity_rules:
    - id: e-validity
      when: K >= 0
      status: success
      text:
        es: "Lectura valida en regimen clasico sin correcciones extremas."
        en: "Reading is valid in classical regime without extreme corrections."
    graph_rules:
    - id: e-graph
      when: E == E
      status: info
      text:
        es: "Comparar nivel de energia total con la curva potencial orienta la interpretacion."
        en: "Comparing total-energy level with potential curve guides interpretation."
    likely_errors:
    - id: e-sign-error
      when: E > 0
      status: info
      text:
        es: "Energia positiva puede ser valida, pero revisar si se esperaba estado ligado."
        en: "Positive energy can be valid, but verify whether a bound state was expected."
    next_step_rules:
    - id: e-next
      when: E == E
      status: info
      text:
        es: "Contrastar energia total con condiciones iniciales para decidir escape o confinamiento."
        en: "Contrast total energy with initial conditions to decide escape or confinement."

  DeltaK:
    summary_rules:
    - id: dk-summary
      when: DeltaK == DeltaK
      status: info
      text:
        es: "El cambio de energia cinetica refleja respuesta dinamica del proceso."
        en: "Kinetic-energy change reflects process dynamical response."
    physical_reading_rules:
    - id: dk-reading
      when: DeltaK == DeltaK
      status: info
      text:
        es: "En regimen conservativo, su signo debe oponerse al de cambio potencial."
        en: "In conservative regime, its sign should oppose potential change sign."
    coherence_rules:
    - id: dk-coh
      when: DeltaK + DeltaU == 0
      status: success
      text:
        es: "Coherencia entre cambios cinetico y potencial confirmada."
        en: "Coherence between kinetic and potential changes confirmed."
    model_validity_rules:
    - id: dk-valid
      when: DeltaK == DeltaK
      status: success
      text:
        es: "Valido cuando no hay trabajo no conservativo dominante."
        en: "Valid when non-conservative work is not dominant."
    graph_rules:
    - id: dk-graph
      when: DeltaK == DeltaK
      status: info
      text:
        es: "Puede inferirse desde diferencia entre energia total y potencial."
        en: "It can be inferred from difference between total and potential energy."
    likely_errors:
    - id: dk-sign-error
      when: DeltaK == DeltaU
      status: error
      text:
        es: "Error conceptual: cambios cinetico y potencial no deben tener mismo signo en caso conservativo."
        en: "Conceptual error: kinetic and potential changes should not share sign in conservative cases."
    next_step_rules:
    - id: dk-next
      when: DeltaK == DeltaK
      status: info
      text:
        es: "Usar su valor para interpretar aumento o disminucion de rapidez."
        en: "Use its value to interpret speed increase or decrease."

  K:
    summary_rules:
    - id: k-summary
      when: K >= 0
      status: success
      text:
        es: "La energia cinetica es no negativa en mecanica clasica."
        en: "Kinetic energy is nonnegative in classical mechanics."
    physical_reading_rules:
    - id: k-reading
      when: K >= 0
      status: info
      text:
        es: "Su variacion indica respuesta de velocidad del cuerpo de prueba."
        en: "Its variation indicates test-body speed response."
    coherence_rules:
    - id: k-coh
      when: E == K + U
      status: success
      text:
        es: "Coherencia con balance de energia mecanica total."
        en: "Coherence with total mechanical-energy balance."
    model_validity_rules:
    - id: k-valid
      when: K >= 0
      status: success
      text:
        es: "Valido en el marco de energia clasica del leaf."
        en: "Valid within the leaf classical-energy framework."
    graph_rules:
    - id: k-graph
      when: K >= 0
      status: info
      text:
        es: "Se estima como diferencia entre energia total y potencial."
        en: "It is estimated as the difference between total and potential energy."
    likely_errors:
    - id: k-negative
      when: K < 0
      status: error
      text:
        es: "Error conceptual: energia cinetica negativa indica inconsistencia de calculo."
        en: "Conceptual error: negative kinetic energy indicates calculation inconsistency."
    next_step_rules:
    - id: k-next
      when: K >= 0
      status: info
      text:
        es: "Comparar estados para decidir si el sistema acelera o desacelera."
        en: "Compare states to decide whether the system accelerates or decelerates."

  Wg:
    summary_rules:
    - id: wg-summary
      when: Wg == Wg
      status: info
      text:
        es: "El trabajo gravitatorio mide transferencia por accion del campo."
        en: "Gravitational work measures transfer caused by the field."
    physical_reading_rules:
    - id: wg-reading
      when: Wg == Wg
      status: info
      text:
        es: "Su signo indica si gravedad entrega o absorbe energia mecanica."
        en: "Its sign indicates whether gravity delivers or absorbs mechanical energy."
    coherence_rules:
    - id: wg-coh
      when: Wg + DeltaU == 0
      status: success
      text:
        es: "Coherencia entre trabajo y variacion potencial confirmada."
        en: "Work and potential-variation coherence confirmed."
    model_validity_rules:
    - id: wg-valid
      when: Wg == Wg
      status: success
      text:
        es: "Valido en interaccion gravitatoria conservativa."
        en: "Valid in conservative gravitational interaction."
    graph_rules:
    - id: wg-graph
      when: Wg == Wg
      status: info
      text:
        es: "Se infiere desde diferencia vertical de energia potencial entre estados."
        en: "It is inferred from vertical potential-energy difference between states."
    likely_errors:
    - id: wg-sign
      when: Wg == DeltaU
      status: error
      text:
        es: "Error conceptual: mismo signo en trabajo y cambio potencial rompe criterio conservativo."
        en: "Conceptual error: same sign in work and potential change breaks conservative criterion."
    next_step_rules:
    - id: wg-next
      when: Wg == Wg
      status: info
      text:
        es: "Usar su signo para cerrar interpretacion del proceso."
        en: "Use its sign to close process interpretation."

  h:
    summary_rules:
    - id: h-summary
      when: h == h
      status: info
      text:
        es: "La variacion de altura es parametro local de aproximacion."
        en: "Height change is a local approximation parameter."
    physical_reading_rules:
    - id: h-reading
      when: h == h
      status: info
      text:
        es: "Permite estimar cambio energetico en tramos pequenos."
        en: "It enables energy-change estimates for short segments."
    coherence_rules:
    - id: h-coh
      when: h >= 0
      status: success
      text:
        es: "Coherencia geometrica de altura no negativa en magnitud."
        en: "Geometric coherence of nonnegative height magnitude."
    model_validity_rules:
    - id: h-valid
      when: h == h
      status: success
      text:
        es: "Valido en aproximacion local con variacion radial pequena."
        en: "Valid in local approximation with small radial variation."
    graph_rules:
    - id: h-graph
      when: h == h
      status: info
      text:
        es: "Representa desplazamiento local sobre tramo casi lineal de energia."
        en: "Represents local displacement over near-linear energy segment."
    likely_errors:
    - id: h-range
      when: h > r
      status: error
      text:
        es: "Error conceptual: altura comparable o mayor que radio invalida aproximacion local."
        en: "Conceptual error: height comparable to radius invalidates local approximation."
    next_step_rules:
    - id: h-next
      when: h == h
      status: info
      text:
        es: "Si escala crece, migrar a modelo radial con radios absolutos."
        en: "If scale grows, migrate to radial model with absolute radii."

  m:
    summary_rules:
    - id: m-summary
      when: m > 0
      status: success
      text:
        es: "La masa de prueba escala linealmente la energia potencial total."
        en: "Test mass scales total potential energy linearly."
    physical_reading_rules:
    - id: m-reading
      when: m > 0
      status: info
      text:
        es: "Modificar masa altera magnitud energetica sin cambiar forma radial."
        en: "Changing mass alters energy magnitude without changing radial shape."
    coherence_rules:
    - id: m-coh
      when: m > 0
      status: success
      text:
        es: "Coherencia de parametro de prueba positiva confirmada."
        en: "Positive test-parameter coherence confirmed."
    model_validity_rules:
    - id: m-valid
      when: m > 0
      status: success
      text:
        es: "Valido mientras la masa de prueba no modifique la fuente dominante."
        en: "Valid while test mass does not alter dominant source."
    graph_rules:
    - id: m-graph
      when: m > 0
      status: info
      text:
        es: "Escala vertical de energia depende linealmente de la masa de prueba."
        en: "Energy vertical scale depends linearly on test mass."
    likely_errors:
    - id: m-negative
      when: m <= 0
      status: error
      text:
        es: "Error conceptual: masa no positiva invalida lectura fisica del problema."
        en: "Conceptual error: nonpositive mass invalidates physical reading."
    next_step_rules:
    - id: m-next
      when: m > 0
      status: info
      text:
        es: "Usar su valor para evaluar escala de energia en ambos estados."
        en: "Use its value to evaluate energy scale in both states."

  r:
    summary_rules:
    - id: r-summary
      when: r > 0
      status: success
      text:
        es: "La distancia radial positiva define posicion fisica valida."
        en: "Positive radial distance defines a valid physical position."
    physical_reading_rules:
    - id: r-reading
      when: r > 0
      status: info
      text:
        es: "Cambios en radio gobiernan profundidad energetica del sistema."
        en: "Radius changes govern system energetic depth."
    coherence_rules:
    - id: r-coh
      when: r > 0
      status: success
      text:
        es: "Coherencia geometrica del estado radial confirmada."
        en: "Geometric coherence of radial state confirmed."
    model_validity_rules:
    - id: r-valid
      when: r > 0
      status: success
      text:
        es: "Valido en campo central fuera de singularidad idealizada."
        en: "Valid in central field away from idealized singularity."
    graph_rules:
    - id: r-graph
      when: r > 0
      status: info
      text:
        es: "Actua como eje horizontal principal de lectura potencial."
        en: "Acts as main horizontal axis for potential reading."
    likely_errors:
    - id: r-zero
      when: r <= 0
      status: error
      text:
        es: "Error conceptual: radio no positivo no representa estado fisico del modelo."
        en: "Conceptual error: nonpositive radius does not represent a physical model state."
    next_step_rules:
    - id: r-next
      when: r > 0
      status: info
      text:
        es: "Comparar dos radios para inferir direccion del cambio energetico."
        en: "Compare two radii to infer energy-change direction."
