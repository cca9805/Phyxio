version: "1.0"
leaf: "ley-de-gravitacion-universal"

coord:
  title:
    es: Gráfica Coord · Ley de Gravitación Universal
    en: Coord Graph · Law of Universal Gravitation
  xAxis:
    es: distancia r (m) entre centros de masa
    en: distance r (m) between centres of mass
  yAxis:
    es: fuerza gravitatoria F_g (N)
    en: gravitational force F_g (N)
  xMagnitude: r
  yMagnitude: F_g
  relation:
    es: F_g = G·m₁·m₂/r². Hipérbola de orden 2. Siempre atractiva. G = 6.674×10⁻¹¹ N·m²/kg².
    en: F_g = G·m₁·m₂/r². Order-2 hyperbola. Always attractive. G = 6.674×10⁻¹¹ N·m²/kg².
  physicalReading:
    es: "F_g ∝ 1/r²: cuadruplicar r divide la fuerza por 16. F_g siempre negativa (atractiva)."
    en: "F_g ∝ 1/r²: quadrupling r divides force by 16. F_g always negative (attractive)."
  slopeMeaning:
    es: "dF_g/dr = −2G·m₁·m₂/r³ < 0: la fuerza decrece al alejarse."
    en: "dF_g/dr = −2G·m₁·m₂/r³ < 0: force decreases with distance."
  interceptMeaning:
    es: F_g → ∞ cuando r → 0 (singularidad de punto material).
    en: F_g → ∞ as r → 0 (point-mass singularity).
  curvatureMeaning:
    es: "Hipérbola 1/r²: curvatura creciente hacia el origen."
    en: "1/r² hyperbola: curvature increasing towards origin."
  signMeaning:
    es: F_g < 0 en convenio vectorial (atracción).
    en: F_g < 0 in vector convention (attraction).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "r > 0. Válido para cuerpos esféricos o puntuales."
    en: "r > 0. Valid for spherical or point masses."
  modelConnection:
    es: Ley de gravitación universal de Newton.
    en: "Newton's law of universal gravitation."
  formulaConnection:
    es: F_g = G·m₁·m₂/r², g = G·M/r², V_g = −G·M/r.
    en: F_g = G·m₁·m₂/r², g = G·M/r², V_g = −G·M/r.
  readingFocus:
    es: leer la dependencia 1/r² y verificar que la curva es más pronunciada para r pequeño.
    en: read the 1/r² dependence and verify the curve is steeper for small r.
  agentHints:
    es:
      - "F_g ∝ 1/r²: ley inversa cuadrática."
      - G = 6.674×10⁻¹¹ N·m²/kg².
      - F_g siempre atractiva.
    en:
      - "F_g ∝ 1/r²: inverse square law."
      - G = 6.674×10⁻¹¹ N·m²/kg².
      - F_g always attractive.
  commonMistakes:
    es:
      - Confundir F_g (fuerza) con g (campo).
      - Aplicar la ley a distribuciones no esféricas sin integrar.
      - Olvidar que es una fuerza mutua (3ª ley).
    en:
      - Confusing F_g (force) with g (field).
      - Applying to non-spherical distributions without integrating.
      - Forgetting it is a mutual force (3rd law).
