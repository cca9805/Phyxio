version: 5
magnitudes:
- id: F
  symbol: F
  nombre: { es: Fuerza gravitatoria, en: Gravitational force }
  si_unit: N
  unidad_si: N
  dimension: M*L*T^-2
  is_vector: false
  components: []
  category: dinamica
  physical_role: magnitud_interaccion
  used_in: [ ley_newton_gravitacion, variacion_inversa_cuadrado ]
  common_mistake: Tratar F como constante al variar r.
  typical_range: [ 1e-12, 1e+12 ]
  sign_behavior: atractiva_en_modelo
  zero_behavior: sin_interaccion
  value_nature: variable
  interpretation_role: intensidad_interaccion
  graph_binding: Curva F(r) de caida inversa cuadratica.
  descripcion:
    es: Modulo de la fuerza de atraccion entre dos masas.
    en: Magnitude of attractive force between two masses.
  pedagogical_notes:
    es: Su variacion con r es el rasgo distintivo del leaf.
    en: Its variation with r is the leaf's key signature.

- id: G
  symbol: G
  nombre: { es: Constante de gravitacion, en: Gravitation constant }
  si_unit: N*m^2/kg^2
  unidad_si: N*m^2/kg^2
  dimension: M^-1*L^3*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: constante_fundamental
  used_in: [ ley_newton_gravitacion, campo_gravitatorio, aceleracion_gravitatoria ]
  common_mistake: Usar valor redondeado sin control de precision.
  typical_range: [ 6.6743e-11, 6.6743e-11 ]
  sign_behavior: siempre_positivo
  zero_behavior: anulacion_gravitatoria
  value_nature: constante
  interpretation_role: escala_de_interaccion
  graph_binding: Escala vertical de F, g y a.
  descripcion:
    es: Constante universal que fija la intensidad gravitatoria clasica.
    en: Universal constant that sets classical gravitational strength.
  pedagogical_notes:
    es: Mantener unidades SI evita errores sistematicos.
    en: Keeping SI units avoids systematic errors.

- id: m1
  symbol: m_1
  nombre: { es: Masa 1, en: Mass 1 }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: materia
  physical_role: fuente_1
  used_in: [ ley_newton_gravitacion ]
  common_mistake: Intercambiar m1 y m2 sin revisar contexto fisico.
  typical_range: [ 1e-6, 1e+30 ]
  sign_behavior: siempre_positiva
  zero_behavior: sin_fuente
  value_nature: parametro
  interpretation_role: escala_primera_fuente
  graph_binding: Cambia amplitud de F(r).
  descripcion:
    es: Masa del primer cuerpo en interaccion.
    en: Mass of the first interacting body.
  pedagogical_notes:
    es: El producto m1*m2 determina escala de fuerza.
    en: Product m1*m2 sets force scale.

- id: m2
  symbol: m_2
  nombre: { es: Masa 2, en: Mass 2 }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: materia
  physical_role: fuente_2
  used_in: [ ley_newton_gravitacion ]
  common_mistake: Tomar m2 en gramos mientras m1 esta en kilogramos.
  typical_range: [ 1e-6, 1e+30 ]
  sign_behavior: siempre_positiva
  zero_behavior: sin_fuente
  value_nature: parametro
  interpretation_role: escala_segunda_fuente
  graph_binding: Cambia amplitud de F(r).
  descripcion:
    es: Masa del segundo cuerpo en interaccion.
    en: Mass of the second interacting body.
  pedagogical_notes:
    es: El orden de m1 y m2 no altera magnitud de F.
    en: Swapping m1 and m2 does not change F magnitude.

- id: r
  symbol: r
  nombre: { es: Distancia entre centros, en: Center-to-center distance }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: variable_espacial
  used_in: [ ley_newton_gravitacion, campo_gravitatorio, aceleracion_gravitatoria ]
  common_mistake: Usar altura local en vez de distancia entre centros.
  typical_range: [ 1e-3, 1e+12 ]
  sign_behavior: siempre_positiva
  zero_behavior: singularidad_modelo
  value_nature: variable
  interpretation_role: control_decaimiento
  graph_binding: Eje horizontal principal del grafico Coord.
  descripcion:
    es: Distancia radial entre centros de masa.
    en: Radial distance between mass centers.
  pedagogical_notes:
    es: La ley depende de 1/r^2 y por eso la escala importa mucho.
    en: The law depends on 1/r^2, so scale strongly matters.

- id: M
  symbol: M
  nombre: { es: Masa fuente, en: Source mass }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: gravitacion
  physical_role: generador_campo
  used_in: [ campo_gravitatorio, aceleracion_gravitatoria ]
  common_mistake: Confundir M con m de prueba.
  typical_range: [ 1e+3, 1e+30 ]
  sign_behavior: siempre_positiva
  zero_behavior: ausencia_campo
  value_nature: parametro
  interpretation_role: escala_del_campo
  graph_binding: Modifica intensidad de g(r).
  descripcion:
    es: Masa que genera el campo gravitatorio local.
    en: Mass that generates local gravitational field.
  pedagogical_notes:
    es: Debe distinguirse de m en P = m*g.
    en: It must be distinguished from m in P = m*g.

- id: m
  symbol: m
  nombre: { es: Masa de prueba, en: Test mass }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: dinamica
  physical_role: cuerpo_prueba
  used_in: [ peso_desde_campo ]
  common_mistake: Mezclar m de prueba con m1/m2 sin aclarar modelo.
  typical_range: [ 1e-6, 1e+9 ]
  sign_behavior: siempre_positiva
  zero_behavior: sin_peso
  value_nature: parametro
  interpretation_role: escala_peso
  graph_binding: Afecta magnitud de P.
  descripcion:
    es: Masa del cuerpo sobre el que se calcula el peso.
    en: Mass of the body used to compute weight.
  pedagogical_notes:
    es: P crece linealmente con m cuando g es fijo.
    en: P grows linearly with m when g is fixed.

- id: g
  symbol: g
  nombre: { es: Campo gravitatorio, en: Gravitational field }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: intensidad_campo
  used_in: [ campo_gravitatorio, peso_desde_campo ]
  common_mistake: Considerar g estrictamente constante en todos los radios.
  typical_range: [ 1e-6, 1e+4 ]
  sign_behavior: positivo_en_modulo
  zero_behavior: ausencia_campo
  value_nature: variable
  interpretation_role: aceleracion_local
  graph_binding: Curva decreciente en funcion de r.
  descripcion:
    es: Intensidad local de campo gravitatorio.
    en: Local gravitational-field intensity.
  pedagogical_notes:
    es: Relaciona campo y peso sin introducir fuerzas de contacto.
    en: Connects field and weight without contact forces.

- id: P
  symbol: P
  nombre: { es: Peso, en: Weight }
  si_unit: N
  unidad_si: N
  dimension: M*L*T^-2
  is_vector: false
  components: []
  category: dinamica
  physical_role: fuerza_efectiva
  used_in: [ peso_desde_campo ]
  common_mistake: Igualar peso y masa.
  typical_range: [ 1e-6, 1e+9 ]
  sign_behavior: depende_convencion_eje
  zero_behavior: ingravidez_ideal
  value_nature: variable
  interpretation_role: respuesta_del_cuerpo
  graph_binding: Resultado derivado de m y g.
  descripcion:
    es: Fuerza gravitatoria sobre una masa de prueba.
    en: Gravitational force acting on a test mass.
  pedagogical_notes:
    es: No debe confundirse con normal ni con masa.
    en: It should not be confused with normal force or mass.

- id: a
  symbol: a
  nombre: { es: Aceleracion gravitatoria, en: Gravitational acceleration }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L*T^-2
  is_vector: false
  components: []
  category: dinamica
  physical_role: respuesta_cinematica
  used_in: [ aceleracion_gravitatoria ]
  common_mistake: Tratar a como independiente de la distancia.
  typical_range: [ 1e-6, 1e+4 ]
  sign_behavior: positivo_en_modulo
  zero_behavior: ausencia_campo
  value_nature: variable
  interpretation_role: cambio_velocidad
  graph_binding: Misma dependencia radial que g.
  descripcion:
    es: Aceleracion producida por el campo de una masa fuente.
    en: Acceleration produced by a source-mass field.
  pedagogical_notes:
    es: Comparte forma funcional con g en modelo puntual.
    en: Shares functional form with g in point-mass model.

- id: R
  symbol: R
  nombre: { es: Radio del astro, en: Astral body radius }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: escala_referencia
  used_in: [ aceleracion_gravitatoria ]
  common_mistake: Usar R en lugar de r cuando el punto no esta en superficie.
  typical_range: [ 1e+3, 1e+8 ]
  sign_behavior: siempre_positivo
  zero_behavior: invalidez_geometrica
  value_nature: parametro
  interpretation_role: condicion_superficial
  graph_binding: Define punto de lectura superficial.
  descripcion:
    es: Radio caracteristico de la masa fuente.
    en: Characteristic radius of the source body.
  pedagogical_notes:
    es: Solo coincide con r en condiciones superficiales.
    en: It only matches r under surface conditions.

- id: F1
  symbol: F_1
  nombre: { es: Fuerza inicial, en: Initial force }
  si_unit: N
  unidad_si: N
  dimension: M*L*T^-2
  is_vector: false
  components: []
  category: comparacion
  physical_role: estado_inicial
  used_in: [ variacion_inversa_cuadrado ]
  common_mistake: Intercambiar F1 y F2 al aplicar proporcion.
  typical_range: [ 1e-12, 1e+12 ]
  sign_behavior: positiva_en_modulo
  zero_behavior: sin_interaccion
  value_nature: dato
  interpretation_role: referencia_comparativa
  graph_binding: Punto inicial de comparacion radial.
  descripcion:
    es: Fuerza de referencia en una condicion inicial.
    en: Reference force at an initial condition.
  pedagogical_notes:
    es: Permite analizar cambios sin recalcular todo desde cero.
    en: Enables change analysis without full recomputation.

- id: F2
  symbol: F_2
  nombre: { es: Fuerza final, en: Final force }
  si_unit: N
  unidad_si: N
  dimension: M*L*T^-2
  is_vector: false
  components: []
  category: comparacion
  physical_role: estado_final
  used_in: [ variacion_inversa_cuadrado ]
  common_mistake: No verificar coherencia con variacion de distancia.
  typical_range: [ 1e-12, 1e+12 ]
  sign_behavior: positiva_en_modulo
  zero_behavior: sin_interaccion
  value_nature: dato
  interpretation_role: resultado_comparativo
  graph_binding: Punto final de comparacion radial.
  descripcion:
    es: Fuerza en la condicion final del cambio de distancia.
    en: Force in final condition of distance change.
  pedagogical_notes:
    es: Debe leerse junto con r1 y r2.
    en: It should be read alongside r1 and r2.

- id: r1
  symbol: r_1
  nombre: { es: Distancia inicial, en: Initial distance }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: comparacion
  physical_role: estado_inicial
  used_in: [ variacion_inversa_cuadrado ]
  common_mistake: Tomar r1 como diametro o altura local.
  typical_range: [ 1e-3, 1e+12 ]
  sign_behavior: siempre_positiva
  zero_behavior: singularidad_modelo
  value_nature: dato
  interpretation_role: punto_referencia
  graph_binding: Posicion inicial para comparar F.
  descripcion:
    es: Distancia de referencia en condicion inicial.
    en: Reference distance in initial condition.
  pedagogical_notes:
    es: Su valor debe medirse entre centros de masa.
    en: It must be measured between mass centers.

- id: r2
  symbol: r_2
  nombre: { es: Distancia final, en: Final distance }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: comparacion
  physical_role: estado_final
  used_in: [ variacion_inversa_cuadrado ]
  common_mistake: No mantener misma referencia que r1.
  typical_range: [ 1e-3, 1e+12 ]
  sign_behavior: siempre_positiva
  zero_behavior: singularidad_modelo
  value_nature: dato
  interpretation_role: punto_final
  graph_binding: Posicion final para comparar F.
  descripcion:
    es: Distancia de referencia en condicion final.
    en: Reference distance in final condition.
  pedagogical_notes:
    es: Un cambio pequeno en r2 puede alterar mucho F2.
    en: A small change in r2 can strongly alter F2.
