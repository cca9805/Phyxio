version: "1.0"
leaf: "mareas-y-perturbaciones"

coord:
  title:
    es: Gráfica Coord · Mareas y Perturbaciones
    en: Coord Graph · Tides and Orbital Perturbations
  xAxis:
    es: tiempo t (h) o posición angular θ (°)
    en: time t (h) or angular position θ (°)
  yAxis:
    es: fuerza de marea o altura marea (m)
    en: tidal force or tidal height (m)
  xMagnitude: t
  yMagnitude: F_marea
  relation:
    es: "Fuerza de marea: ΔF = 2·G·M·m·r/(d³). ΔF ∝ 1/d³ (cae más rápido que F_g). Dos ciclos de marea por día."
    en: "Tidal force: ΔF = 2·G·M·m·r/(d³). ΔF ∝ 1/d³ (falls faster than F_g). Two tidal cycles per day."
  physicalReading:
    es: "La fuerza de marea es la diferencia de F_g entre los lados del objeto. ΔF ∝ 1/d³: cuerpos cercanos producen mareas mucho mayores."
    en: "Tidal force is the difference in F_g between sides of the object. ΔF ∝ 1/d³: close bodies produce much stronger tides."
  slopeMeaning:
    es: "dΔF/dd = −3·2·G·M·m·r/d⁴ < 0: la fuerza de marea decrece muy rápido con la distancia."
    en: "dΔF/dd = −3·2·G·M·m·r/d⁴ < 0: tidal force decreases very fast with distance."
  interceptMeaning:
    es: ΔF → ∞ para d → 0 (límite de Roche).
    en: ΔF → ∞ as d → 0 (Roche limit).
  curvatureMeaning:
    es: "1/d³: cae mucho más rápido que 1/d²."
    en: "1/d³: falls much faster than 1/d²."
  signMeaning:
    es: "ΔF > 0 siempre (estiramiento)."
    en: "ΔF > 0 always (stretching)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "d > r_Roche."
    en: "d > r_Roche."
  modelConnection:
    es: Fuerza de marea y límite de Roche.
    en: Tidal force and Roche limit.
  formulaConnection:
    es: ΔF = 2G·M·m·r/d³, r_Roche ≈ 2.44·R·(ρ_M/ρ_m)^(1/3).
    en: ΔF = 2G·M·m·r/d³, r_Roche ≈ 2.44·R·(ρ_M/ρ_m)^(1/3).
  readingFocus:
    es: leer el ciclo de mareas y la dependencia 1/d³.
    en: read the tidal cycle and 1/d³ dependence.
  agentHints:
    es:
      - ΔF ∝ 1/d³.
      - Dos ciclos de marea/día.
      - "Luna > Sol para las mareas terrestres."
    en:
      - ΔF ∝ 1/d³.
      - Two tidal cycles/day.
      - "Moon > Sun for Earth's tides."
  commonMistakes:
    es:
      - Confundir F_g con ΔF (marea).
      - Pensar que el Sol produce mareas mayores que la Luna.
      - No reconocer la dependencia 1/d³.
    en:
      - Confusing F_g with ΔF (tide).
      - Thinking the Sun produces stronger tides than the Moon.
      - Not recognising the 1/d³ dependence.
