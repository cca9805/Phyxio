version: "1.0"
leaf: "energia-orbital"

coord:
  title:
    es: Gráfica Coord · Energía Orbital
    en: Coord Graph · Orbital Energy
  xAxis:
    es: radio orbital r (m)
    en: orbital radius r (m)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: r
  yMagnitude: E
  relation:
    es: "E_cin = G·Mm/(2r) > 0. E_p = −G·Mm/r < 0. E_total = −G·Mm/(2r) < 0 (ligado). E_total = E_cin + E_p."
    en: "E_kin = G·Mm/(2r) > 0. E_p = −G·Mm/r < 0. E_total = −G·Mm/(2r) < 0 (bound). E_total = E_kin + E_p."
  physicalReading:
    es: "Las tres curvas convergen: E_p = 2·E_total, E_cin = −E_total (teorema virial). E_total más negativa → órbita más baja y más rápida."
    en: "Three curves converge: E_p = 2·E_total, E_kin = −E_total (virial theorem). More negative E_total → lower, faster orbit."
  slopeMeaning:
    es: "dE_total/dr = G·Mm/(2r²) > 0: E_total menos negativa al aumentar r."
    en: "dE_total/dr = G·Mm/(2r²) > 0: E_total less negative as r increases."
  interceptMeaning:
    es: "E_total → 0 en r → ∞ (órbita parabólica: velocidad de escape exacta)."
    en: "E_total → 0 at r → ∞ (parabolic orbit: exact escape velocity)."
  curvatureMeaning:
    es: Todas las curvas ∝ 1/r.
    en: All curves ∝ 1/r.
  signMeaning:
    es: "E_total < 0: ligado. E_total = 0: parabólica. E_total > 0: hiperbólica."
    en: "E_total < 0: bound. E_total = 0: parabolic. E_total > 0: hyperbolic."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: r ≥ R.
    en: r ≥ R.
  modelConnection:
    es: Energía orbital y teorema virial.
    en: Orbital energy and virial theorem.
  formulaConnection:
    es: E_total = −G·Mm/(2r), E_cin = G·Mm/(2r), E_p = −G·Mm/r.
    en: E_total = −G·Mm/(2r), E_kin = G·Mm/(2r), E_p = −G·Mm/r.
  readingFocus:
    es: leer las tres curvas y verificar E_p = 2·E_total y E_cin = −E_total.
    en: read the three curves and verify E_p = 2·E_total and E_kin = −E_total.
  agentHints:
    es:
      - E_total = −G·Mm/(2r).
      - E_p = 2·E_total.
      - "E_total > 0: hiperbólica (no ligada)."
    en:
      - E_total = −G·Mm/(2r).
      - E_p = 2·E_total.
      - "E_total > 0: hyperbolic (unbound)."
  commonMistakes:
    es:
      - Pensar que E_cin es la energía total.
      - Olvidar el signo negativo de E_p.
      - Confundir r orbital con altitud.
    en:
      - Thinking E_kin is the total energy.
      - Forgetting the negative sign of E_p.
      - Confusing orbital r with altitude.

svg:
  title:
    es: Escena SVG · Energía Orbital
    en: SVG Scene · Orbital Energy
  sceneId: energia_orbital
  sceneLabel:
    es: Órbita elíptica con indicadores de E_cin, E_p y E_total
    en: Elliptical orbit with E_kin, E_p and E_total indicators
  objects:
    es:
      - cuerpo central M (foco)
      - satélite m
      - órbita elíptica
      - semieje mayor a
      - indicadores E_cin, E_p, E_total
    en:
      - central body M (focus)
      - satellite m
      - elliptical orbit
      - semi-major axis a
      - E_kin, E_p, E_total indicators
  mainObject:
    es: satélite en órbita elíptica
    en: satellite in elliptical orbit
  referenceFrame:
    es: laboratorio inercial (foco)
    en: inertial laboratory frame (focus)
  geometry:
    es: "Elipse con foco en M. Perihelio: E_cin máx, E_p mín. Afelio: E_cin mín, E_p máx. E_total = cte."
    en: "Ellipse with focus at M. Perihelion: E_kin max, E_p min. Aphelion: E_kin min, E_p max. E_total = const."
  interactions:
    es: E_total = E_cin + E_p = −G·Mm/(2a) = cte.
    en: E_total = E_kin + E_p = −G·Mm/(2a) = const.
  modelElements:
    es:
      - E_total = −G·Mm/(2a)
      - E_total = cte en la órbita
      - "Perihelio: v máxima"
    en:
      - E_total = −G·Mm/(2a)
      - E_total = const on orbit
      - "Perihelion: v maximum"
  visualCues:
    es:
      - "Perihelio: satélite más cerca → v mayor."
      - "Afelio: satélite más lejos → v menor."
      - E_total = cte (sin disipación).
    en:
      - "Perihelion: satellite closer → higher v."
      - "Aphelion: satellite farther → lower v."
      - E_total = const (no dissipation).
  scaleMeaning:
    es: Semieje mayor a ↔ E_total = −G·Mm/(2a).
    en: Semi-major axis a ↔ E_total = −G·Mm/(2a).
  relation:
    es: E_total = −G·Mm/(2a) = cte.
    en: E_total = −G·Mm/(2a) = const.
  physicalReading:
    es: La energía total es constante; se intercambia entre E_cin y E_p.
    en: Total energy is constant; it is exchanged between E_kin and E_p.
  modelConnection:
    es: Energía orbital y leyes de Kepler.
    en: "Orbital energy and Kepler's laws."
  formulaConnection:
    es: E_total = −G·Mm/(2a), T² ∝ a³.
    en: E_total = −G·Mm/(2a), T² ∝ a³.
  readingFocus:
    es: identificar perihelio y afelio; verificar E_total = cte.
    en: identify perihelion and aphelion; verify E_total = const.
  agentHints:
    es:
      - E_total = cte.
      - "Perihelio: v máx."
      - E_total = −G·Mm/(2a).
    en:
      - E_total = const.
      - "Perihelion: v max."
      - E_total = −G·Mm/(2a).
  commonMistakes:
    es:
      - Pensar que E varía en la órbita (sin disipación).
      - Confundir a con r.
      - Olvidar el signo negativo.
    en:
      - Thinking E varies on the orbit (no dissipation).
      - Confusing a with r.
      - Forgetting the negative sign.
