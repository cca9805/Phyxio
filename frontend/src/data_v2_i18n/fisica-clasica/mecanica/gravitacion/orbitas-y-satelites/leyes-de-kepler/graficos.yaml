version: "1.0"
leaf: "leyes-de-kepler"

coord:
  title:
    es: Gráfica Coord · Leyes de Kepler
    en: "Coord Graph · Kepler's Laws"
  xAxis:
    es: semieje mayor a³ (m³)
    en: semi-major axis a³ (m³)
  yAxis:
    es: periodo al cuadrado T² (s²)
    en: period squared T² (s²)
  xMagnitude: a3
  yMagnitude: T2
  relation:
    es: "3ª ley de Kepler: T² = (4π²/G·M)·a³. Recta de pendiente 4π²/(G·M). Independiente de m."
    en: "Kepler's 3rd law: T² = (4π²/G·M)·a³. Line with slope 4π²/(G·M). Independent of m."
  physicalReading:
    es: "Recta T² vs a³ con pendiente 4π²/(G·M). Solar: T[años]² = a[UA]³. Misma recta para todos los planetas del mismo sistema."
    en: "Line T² vs a³ with slope 4π²/(G·M). Solar: T[yr]² = a[AU]³. Same line for all planets of the same system."
  slopeMeaning:
    es: "Pendiente = 4π²/(G·M): caracteriza al cuerpo central."
    en: "Slope = 4π²/(G·M): characterises the central body."
  interceptMeaning:
    es: T²(0) = 0.
    en: T²(0) = 0.
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: "T² > 0 y a³ > 0."
    en: "T² > 0 and a³ > 0."
  areaMeaning:
    es: "2ª ley: áreas iguales en tiempos iguales → velocidad areolar = cte = L/(2m)."
    en: "2nd law: equal areas in equal times → areal velocity = const = L/(2m)."
  domainMeaning:
    es: "a ≥ R. T > 0."
    en: "a ≥ R. T > 0."
  modelConnection:
    es: 3 leyes de Kepler derivadas de la gravitación universal.
    en: "3 Kepler's laws derived from universal gravitation."
  formulaConnection:
    es: "T² = (4π²/G·M)·a³. 1ª: elipse, 2ª: L = cte, 3ª: T² ∝ a³."
    en: "T² = (4π²/G·M)·a³. 1st: ellipse, 2nd: L = const, 3rd: T² ∝ a³."
  readingFocus:
    es: leer la pendiente 4π²/(G·M) para obtener M del cuerpo central.
    en: read the slope 4π²/(G·M) to obtain M of the central body.
  agentHints:
    es:
      - "T²[años] = a³[UA] (Sistema Solar)."
      - Pendiente ∝ 1/M.
      - Misma recta para todos los satélites del mismo cuerpo central.
    en:
      - "T²[yr] = a³[AU] (Solar System)."
      - Slope ∝ 1/M.
      - Same line for all satellites of the same central body.
  commonMistakes:
    es:
      - Pensar que T depende de m del satélite.
      - Aplicar la ley a sistemas distintos.
      - Confundir a con r (para elipses, a ≠ r salvo en círculo).
    en:
      - Thinking T depends on satellite mass m.
      - Applying the law to different systems.
      - Confusing a with r (for ellipses, a ≠ r except for circles).

svg:
  title:
    es: Escena SVG · Leyes de Kepler
    en: "SVG Scene · Kepler's Laws"
  sceneId: leyes_kepler
  sceneLabel:
    es: Órbita elíptica con las 3 leyes de Kepler ilustradas
    en: "Elliptical orbit illustrating Kepler's 3 laws"
  objects:
    es:
      - elipse orbital
      - foco (cuerpo central)
      - sectores iguales Δt iguales (2ª ley)
      - semieje mayor a
      - semieje menor b
      - perihelio y afelio
    en:
      - orbital ellipse
      - focus (central body)
      - equal sectors equal Δt (2nd law)
      - semi-major axis a
      - semi-minor axis b
      - perihelion and aphelion
  mainObject:
    es: planeta en órbita elíptica
    en: planet in elliptical orbit
  referenceFrame:
    es: foco principal
    en: primary focus
  geometry:
    es: "1ª ley: elipse con el Sol en un foco. 2ª ley: sectores iguales en tiempos iguales. 3ª ley: T² ∝ a³."
    en: "1st law: ellipse with Sun at one focus. 2nd law: equal sectors in equal times. 3rd law: T² ∝ a³."
  interactions:
    es: "1ª: r + r' = 2a. 2ª: dA/dt = L/(2m) = cte. 3ª: T² = (4π²/G·M)·a³."
    en: "1st: r + r' = 2a. 2nd: dA/dt = L/(2m) = const. 3rd: T² = (4π²/G·M)·a³."
  modelElements:
    es:
      - "Elipse: r + r' = 2a"
      - Velocidad areolar = cte
      - T² ∝ a³
    en:
      - "Ellipse: r + r' = 2a"
      - Areal velocity = const
      - T² ∝ a³
  visualCues:
    es:
      - Sectores sombreados iguales (misma Δt).
      - "Perihelio: planeta más rápido."
      - "Foco: cuerpo central."
    en:
      - Equal shaded sectors (same Δt).
      - "Perihelion: planet fastest."
      - "Focus: central body."
  scaleMeaning:
    es: "Excentricidad e: círculo (e = 0) a elipse muy alargada (e → 1)."
    en: "Eccentricity e: circle (e = 0) to highly elongated ellipse (e → 1)."
  relation:
    es: T² = (4π²/G·M)·a³.
    en: T² = (4π²/G·M)·a³.
  physicalReading:
    es: "El planeta barre áreas iguales en tiempos iguales: conserva L."
    en: "Planet sweeps equal areas in equal times: L conserved."
  modelConnection:
    es: Leyes de Kepler → Gravitación universal.
    en: "Kepler's laws → Universal gravitation."
  formulaConnection:
    es: T² = (4π²/G·M)·a³, L = m·r²·ω = cte.
    en: T² = (4π²/G·M)·a³, L = m·r²·ω = const.
  readingFocus:
    es: identificar las 3 leyes y verificar sectores iguales (2ª ley).
    en: identify the 3 laws and verify equal sectors (2nd law).
  agentHints:
    es:
      - "1ª: elipse."
      - "2ª: velocidad areolar = cte."
      - "3ª: T² ∝ a³."
    en:
      - "1st: ellipse."
      - "2nd: areal velocity = const."
      - "3rd: T² ∝ a³."
  commonMistakes:
    es:
      - Pensar que la órbita circular cumple T² ∝ a³ pero la elíptica no (ambas sí).
      - Confundir a con el radio (solo igual en círculo).
      - No reconocer la 2ª ley en los sectores iguales.
    en:
      - Thinking circular orbit obeys T² ∝ a³ but elliptical does not (both do).
      - Confusing a with radius (equal only in circle).
      - Not recognising 2nd law in equal sectors.
