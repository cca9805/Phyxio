version: "1.0"
leaf: "velocidad-orbital"

coord:
  title:
    es: Gráfica Coord · Velocidad Orbital
    en: Coord Graph · Orbital Velocity
  xAxis:
    es: radio orbital r (m)
    en: orbital radius r (m)
  yAxis:
    es: velocidad orbital v_o (m/s)
    en: orbital velocity v_o (m/s)
  xMagnitude: r
  yMagnitude: v_o
  relation:
    es: v_o = √(G·M/r). Hipérbola r^(−1/2). Cuanto mayor el radio, menor la velocidad.
    en: v_o = √(G·M/r). r^(−1/2) hyperbola. Greater radius → lower velocity.
  physicalReading:
    es: "v_o ∝ 1/√r: al cuadruplicar r la velocidad se reduce a la mitad."
    en: "v_o ∝ 1/√r: quadrupling r halves velocity."
  slopeMeaning:
    es: dv_o/dr = −(1/2)√(G·M/r³) < 0.
    en: dv_o/dr = −(1/2)√(G·M/r³) < 0.
  interceptMeaning:
    es: v_o → ∞ en r → 0 (singularidad).
    en: v_o → ∞ at r → 0 (singularity).
  curvatureMeaning:
    es: "r^(−1/2): decae más lento que 1/r."
    en: "r^(−1/2): decays slower than 1/r."
  signMeaning:
    es: "v_o > 0."
    en: "v_o > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: r ≥ R (radio del cuerpo central).
    en: r ≥ R (radius of central body).
  modelConnection:
    es: Equilibrio entre F_g y fuerza centrípeta.
    en: Equilibrium between F_g and centripetal force.
  formulaConnection:
    es: v_o = √(G·M/r), T = 2πr/v_o, T² = (4π²/G·M)·r³ (3ª Kepler).
    en: v_o = √(G·M/r), T = 2πr/v_o, T² = (4π²/G·M)·r³ (Kepler 3rd).
  readingFocus:
    es: leer v_o a un r dado y verificar v_o ∝ 1/√r.
    en: read v_o at a given r and verify v_o ∝ 1/√r.
  agentHints:
    es:
      - v_o = √(G·M/r).
      - v_o ∝ 1/√r.
      - "ISS: r ≈ 6.77×10⁶ m, v_o ≈ 7.7 km/s."
    en:
      - v_o = √(G·M/r).
      - v_o ∝ 1/√r.
      - "ISS: r ≈ 6.77×10⁶ m, v_o ≈ 7.7 km/s."
  commonMistakes:
    es:
      - Confundir v_o con v_escape (v_esc = √2·v_o).
      - No incluir r desde el centro del cuerpo.
      - Aplicar v_o = constante (orbita circular).
    en:
      - Confusing v_o with v_escape (v_esc = √2·v_o).
      - Not including r from centre of body.
      - Applying v_o = constant (circular orbit only).

svg:
  title:
    es: Escena SVG · Velocidad Orbital
    en: SVG Scene · Orbital Velocity
  sceneId: velocidad_orbital
  sceneLabel:
    es: Satélite en órbita circular con vectores v_o y F_g
    en: Satellite in circular orbit with v_o and F_g vectors
  objects:
    es:
      - cuerpo central M
      - satélite m
      - vector v_o (tangente)
      - vector F_g (central)
      - radio r
    en:
      - central body M
      - satellite m
      - vector v_o (tangential)
      - vector F_g (central)
      - radius r
  mainObject:
    es: satélite en órbita circular
    en: satellite in circular orbit
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: "Órbita circular: v_o ⊥ F_g. F_g = m·v_o²/r → v_o = √(G·M/r)."
    en: "Circular orbit: v_o ⊥ F_g. F_g = m·v_o²/r → v_o = √(G·M/r)."
  interactions:
    es: F_g = G·Mm/r² = m·v_o²/r → v_o = √(G·M/r).
    en: F_g = G·Mm/r² = m·v_o²/r → v_o = √(G·M/r).
  modelElements:
    es:
      - v_o = √(G·M/r)
      - "F_g: centrípeta"
      - v_o ⊥ r
    en:
      - v_o = √(G·M/r)
      - "F_g: centripetal"
      - v_o ⊥ r
  visualCues:
    es:
      - Flecha v_o tangente a la órbita.
      - Flecha F_g apuntando al centro.
      - Radio r desde el centro.
    en:
      - v_o arrow tangent to orbit.
      - F_g arrow pointing to centre.
      - Radius r from centre.
  scaleMeaning:
    es: Longitud v_o ∝ 1/√r.
    en: v_o length ∝ 1/√r.
  relation:
    es: F_g = fuerza centrípeta → v_o = √(G·M/r).
    en: F_g = centripetal force → v_o = √(G·M/r).
  physicalReading:
    es: v_o es perpendicular a F_g en órbita circular.
    en: v_o is perpendicular to F_g in circular orbit.
  modelConnection:
    es: Órbita circular y velocidad orbital.
    en: Circular orbit and orbital velocity.
  formulaConnection:
    es: v_o = √(G·M/r), T = 2πr³/²/√(G·M).
    en: v_o = √(G·M/r), T = 2πr³/²/√(G·M).
  readingFocus:
    es: identificar v_o ⊥ F_g y estimar v_o a partir de r.
    en: identify v_o ⊥ F_g and estimate v_o from r.
  agentHints:
    es:
      - v_o ⊥ r.
      - F_g centrípeta.
      - v_esc = √2·v_o.
    en:
      - v_o ⊥ r.
      - F_g centripetal.
      - v_esc = √2·v_o.
  commonMistakes:
    es:
      - Dibujar v_o en la misma dirección que F_g.
      - Olvidar que v_o depende de M, no de m.
      - Confundir período T con v_o.
    en:
      - Drawing v_o in same direction as F_g.
      - Forgetting v_o depends on M, not m.
      - Confusing period T with v_o.
