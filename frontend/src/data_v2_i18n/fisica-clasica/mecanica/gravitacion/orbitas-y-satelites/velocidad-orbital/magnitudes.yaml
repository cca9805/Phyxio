version: 5
magnitudes:
- id: G
  symbol: G
  nombre: { es: Constante de gravitacion, en: Gravitation constant }
  si_unit: N*m^2/kg^2
  unidad_si: N*m^2/kg^2
  dimension: M^-1*L^3*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: constante_fundamental
  used_in: [ velocidad_orbital_circular, velocidad_escape, periodo_orbital, vis_viva ]
  common_mistake: Tratarla como parametro ajustable del problema.
  typical_range: [ 6.6743e-11, 6.6743e-11 ]
  sign_behavior: siempre_positiva
  zero_behavior: sin_interaccion_gravitatoria
  value_nature: constante
  interpretation_role: escala_global
  graph_binding: Fija la escala vertical de velocidades.
  descripcion:
    es: Constante universal que fija intensidad de acoplamiento gravitatorio.
    en: Universal constant setting gravitational coupling strength.
  pedagogical_notes:
    es: Mantener SI evita errores de orden de magnitud.
    en: Keeping SI avoids order-of-magnitude errors.

- id: M
  symbol: M
  nombre: { es: Masa central, en: Central mass }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: gravitacion
  physical_role: fuente_central
  used_in: [ velocidad_orbital_circular, velocidad_escape, periodo_orbital, parametro_gravitacional ]
  common_mistake: Usar masa del satelite en lugar de masa central.
  typical_range: [ 1e+20, 1e+31 ]
  sign_behavior: positiva
  zero_behavior: no_hay_orbita_kepleriana
  value_nature: parametro
  interpretation_role: escala_dinamica
  graph_binding: Aumenta nivel de v_orb y v_escape.
  descripcion:
    es: Masa del cuerpo dominante que genera el campo gravitatorio.
    en: Mass of the dominant body generating the field.
  pedagogical_notes:
    es: En dos cuerpos con gran asimetria, M domina la dinamica orbital.
    en: In strongly asymmetric two-body systems, M dominates orbital dynamics.

- id: r
  symbol: r
  nombre: { es: Radio orbital, en: Orbital radius }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: variable_radial
  used_in: [ velocidad_orbital_circular, velocidad_escape, periodo_orbital, vis_viva ]
  common_mistake: Confundir altura sobre superficie con radio al centro.
  typical_range: [ 1e+5, 1e+12 ]
  sign_behavior: positiva
  zero_behavior: singularidad_modelo
  value_nature: variable
  interpretation_role: control_decaimiento
  graph_binding: Eje horizontal principal del Coord.
  descripcion:
    es: Distancia desde el centro de masa de la fuente al satelite.
    en: Distance from source center of mass to satellite.
  pedagogical_notes:
    es: Pequenos cambios relativos en r alteran mucho la velocidad.
    en: Small relative changes in r strongly affect velocity.

- id: R
  symbol: R
  nombre: { es: Radio del astro, en: Body radius }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: referencia_superficial
  used_in: [ velocidad_escape ]
  common_mistake: Sustituir R por r en orbita alta sin justificacion.
  typical_range: [ 1e+5, 1e+8 ]
  sign_behavior: positiva
  zero_behavior: invalidez_geometrica
  value_nature: parametro
  interpretation_role: referencia_limite
  graph_binding: Punto de lectura superficial.
  descripcion:
    es: Radio fisico de la fuente cuando se evalua superficie.
    en: Physical source radius for surface evaluations.
  pedagogical_notes:
    es: Solo coincide con r en condicion superficial.
    en: It equals r only under surface conditions.

- id: h
  symbol: h
  nombre: { es: Altura orbital, en: Orbital altitude }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: desplazamiento_superficial
  used_in: [ radio_desde_altura ]
  common_mistake: Usar h directamente como si fuera r.
  typical_range: [ 1e+3, 1e+8 ]
  sign_behavior: no_negativa
  zero_behavior: orbita_superficial
  value_nature: dato
  interpretation_role: traduccion_geometrica
  graph_binding: Desplaza posicion radial efectiva.
  descripcion:
    es: Separacion sobre la superficie de la fuente central.
    en: Separation above central-body surface.
  pedagogical_notes:
    es: Debe convertirse a r con R antes del calculo orbital.
    en: Must be converted to r with R before orbital calculation.

- id: v_orb
  symbol: v_orb
  nombre: { es: Velocidad orbital circular, en: Circular orbital velocity }
  si_unit: m/s
  unidad_si: m/s
  dimension: L*T^-1
  is_vector: false
  components: []
  category: dinamica
  physical_role: velocidad_caracteristica
  used_in: [ velocidad_orbital_circular, vis_viva ]
  common_mistake: Suponerla constante para cualquier r.
  typical_range: [ 1e+2, 1e+5 ]
  sign_behavior: positiva_en_modulo
  zero_behavior: sin_orbita
  value_nature: variable
  interpretation_role: estado_orbital
  graph_binding: Curva principal en grafico Coord.
  descripcion:
    es: Velocidad necesaria para mantener orbita circular ideal.
    en: Speed required to maintain an ideal circular orbit.
  pedagogical_notes:
    es: Disminuye con la raiz de r en campo central.
    en: Decreases with square-root dependence on r.

- id: v_escape
  symbol: v_esc
  nombre: { es: Velocidad de escape, en: Escape velocity }
  si_unit: m/s
  unidad_si: m/s
  dimension: L*T^-1
  is_vector: false
  components: []
  category: dinamica
  physical_role: umbral_energetico
  used_in: [ velocidad_escape ]
  common_mistake: Confundirla con velocidad orbital circular.
  typical_range: [ 1e+2, 1e+5 ]
  sign_behavior: positiva_en_modulo
  zero_behavior: no_escape
  value_nature: variable
  interpretation_role: criterio_escape
  graph_binding: Curva superior respecto de v_orb.
  descripcion:
    es: Umbral minimo para abandonar el campo sin propulsion adicional.
    en: Minimum threshold to leave field without extra propulsion.
  pedagogical_notes:
    es: En mismo r, v_escape es sqrt(2) veces v_orb circular.
    en: At same r, v_escape is sqrt(2) times circular v_orb.

- id: T
  symbol: T
  nombre: { es: Periodo orbital, en: Orbital period }
  si_unit: s
  unidad_si: s
  dimension: T
  is_vector: false
  components: []
  category: temporal
  physical_role: escala_temporal
  used_in: [ periodo_orbital ]
  common_mistake: Asumir dependencia lineal con r.
  typical_range: [ 1e+2, 1e+8 ]
  sign_behavior: positiva
  zero_behavior: sin_ciclo_orbital
  value_nature: variable
  interpretation_role: frecuencia_orbital
  graph_binding: Se vincula a lectura de rapidez angular.
  descripcion:
    es: Tiempo para completar una vuelta orbital circular ideal.
    en: Time required for one ideal circular orbital revolution.
  pedagogical_notes:
    es: Escala con potencia tres medios de r.
    en: Scales with three-halves power of r.

- id: a
  symbol: a
  nombre: { es: Radio de semieje mayor, en: Semimajor axis }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: geometria
  physical_role: parametro_orbital
  used_in: [ vis_viva, energia_orbital_especifica ]
  common_mistake: Igualarlo a r en orbitas elipticas arbitrarias.
  typical_range: [ 1e+5, 1e+12 ]
  sign_behavior: positiva
  zero_behavior: sin_orbita_eliptica
  value_nature: parametro
  interpretation_role: escala_eliptica
  graph_binding: Define nivel energetico medio de orbita.
  descripcion:
    es: Semieje mayor que caracteriza tamano de la orbita.
    en: Semimajor axis characterizing orbit size.
  pedagogical_notes:
    es: En circular ideal se cumple a igual a r.
    en: In ideal circular case, a equals r.

- id: mu
  symbol: mu
  nombre: { es: Parametro gravitacional, en: Gravitational parameter }
  si_unit: m^3/s^2
  unidad_si: m^3/s^2
  dimension: L^3*T^-2
  is_vector: false
  components: []
  category: gravitacion
  physical_role: parametro_compacto
  used_in: [ parametro_gravitacional, vis_viva, periodo_orbital ]
  common_mistake: Tratarlo como unidad adimensional.
  typical_range: [ 1e+9, 1e+22 ]
  sign_behavior: positivo
  zero_behavior: sin_campo
  value_nature: parametro
  interpretation_role: simplificacion_modelo
  graph_binding: Compacta GM para curvas orbitales.
  descripcion:
    es: Producto GM usado para simplificar expresiones orbitales.
    en: Product GM used to simplify orbital expressions.
  pedagogical_notes:
    es: Facilita calculo numerico y analisis comparativo.
    en: It streamlines numerical and comparative analysis.

- id: E
  symbol: E
  nombre: { es: Energia orbital especifica, en: Specific orbital energy }
  si_unit: J/kg
  unidad_si: J/kg
  dimension: L^2*T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: clasificador_orbital
  used_in: [ energia_orbital_especifica ]
  common_mistake: Ignorar signo para clasificar orbita ligada o no.
  typical_range: [ -1e+9, 1e+9 ]
  sign_behavior: signo_informativo
  zero_behavior: umbral_escape_parabolico
  value_nature: variable
  interpretation_role: criterio_regimen
  graph_binding: Determina si estado es ligado en lectura integrada.
  descripcion:
    es: Energia por unidad de masa que clasifica regimen orbital.
    en: Energy per unit mass used to classify orbital regime.
  pedagogical_notes:
    es: Signo negativo sugiere orbita ligada en modelo clasico.
    en: Negative sign suggests a bound orbit in classical model.
