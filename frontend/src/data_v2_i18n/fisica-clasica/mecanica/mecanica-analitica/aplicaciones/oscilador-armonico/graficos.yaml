version: "1.0"
leaf: "oscilador-armonico"

coord:
  title:
    es: Gráfica Coord · Oscilador Armónico (Lagrangiano)
    en: Coord Graph · Harmonic Oscillator (Lagrangian)
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición x(t) (m) o energía E (J)
    en: position x(t) (m) or energy E (J)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: "L = (1/2)m·ẋ² − (1/2)k·x². Ec. movimiento: ẍ + ω²x = 0, ω = √(k/m). Solución: x(t) = A·cos(ωt + φ). E = (1/2)kA² = cte."
    en: "L = (1/2)m·ẋ² − (1/2)k·x². Eq. of motion: ẍ + ω²x = 0, ω = √(k/m). Solution: x(t) = A·cos(ωt + φ). E = (1/2)kA² = const."
  physicalReading:
    es: "Oscilación sinusoidal de amplitud A y periodo T = 2π/ω. En espacio de fases: elipse."
    en: "Sinusoidal oscillation of amplitude A and period T = 2π/ω. In phase space: ellipse."
  slopeMeaning:
    es: "dx/dt = ẋ: velocidad."
    en: "dx/dt = ẋ: velocity."
  interceptMeaning:
    es: x(0) = A·cos(φ).
    en: x(0) = A·cos(φ).
  curvatureMeaning:
    es: "ẍ = −ω²x: curvatura ∝ −x."
    en: "ẍ = −ω²x: curvature ∝ −x."
  signMeaning:
    es: "x ∈ [−A, A]. E > 0."
    en: "x ∈ [−A, A]. E > 0."
  areaMeaning:
    es: ∫ẋ dt = Δx.
    en: ∫ẋ dt = Δx.
  domainMeaning:
    es: "t ≥ 0. x ∈ [−A, A]."
    en: "t ≥ 0. x ∈ [−A, A]."
  modelConnection:
    es: Oscilador armónico vía Lagrange.
    en: Harmonic oscillator via Lagrange.
  formulaConnection:
    es: ẍ + ω²x = 0, ω = √(k/m), T = 2π/ω, E = (1/2)kA².
    en: ẍ + ω²x = 0, ω = √(k/m), T = 2π/ω, E = (1/2)kA².
  readingFocus:
    es: leer amplitud A, periodo T y constancia de la energía.
    en: read amplitude A, period T and energy constancy.
  agentHints:
    es:
      - ω = √(k/m).
      - T = 2π/ω.
      - E = (1/2)kA² = cte.
    en:
      - ω = √(k/m).
      - T = 2π/ω.
      - E = (1/2)kA² = const.
  commonMistakes:
    es:
      - Confundir ω con f.
      - Pensar que A depende de ω.
      - Aplicar al amortiguado sin modificar.
    en:
      - Confusing ω with f.
      - Thinking A depends on ω.
      - Applying to damped oscillator without modification.

svg:
  title:
    es: Escena SVG · Oscilador Armónico
    en: SVG Scene · Harmonic Oscillator
  sceneId: oscilador_armonico
  sceneLabel:
    es: Masa-resorte con F = −kx
    en: Mass-spring with F = −kx
  objects:
    es:
      - masa m
      - resorte k
      - x = 0 (equilibrio)
      - F = −kx
      - amplitud A
    en:
      - mass m
      - spring k
      - x = 0 (equilibrium)
      - F = −kx
      - amplitude A
  mainObject:
    es: masa-resorte en oscilación
    en: oscillating mass-spring
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Masa desplazada x del equilibrio; resorte estirado/comprimido.
    en: Mass displaced x from equilibrium; spring stretched/compressed.
  interactions:
    es: F = −kx → ẍ + ω²x = 0 → x(t) = A·cos(ωt + φ).
    en: F = −kx → ẍ + ω²x = 0 → x(t) = A·cos(ωt + φ).
  modelElements:
    es:
      - F = −kx
      - ω = √(k/m)
      - E = (1/2)kA²
    en:
      - F = −kx
      - ω = √(k/m)
      - E = (1/2)kA²
  visualCues:
    es:
      - Flecha F siempre apunta al equilibrio.
      - Amplitud = desplazamiento máximo.
      - Resorte comprimido/extendido según x.
    en:
      - Force arrow always points to equilibrium.
      - Amplitude = maximum displacement.
      - Spring compressed/extended depending on x.
  scaleMeaning:
    es: Longitud del resorte ∝ deformación x.
    en: Spring length ∝ deformation x.
  relation:
    es: x(t) = A·cos(ωt + φ), F = −kx.
    en: x(t) = A·cos(ωt + φ), F = −kx.
  physicalReading:
    es: La fuerza es siempre restauradora.
    en: Force is always restoring.
  modelConnection:
    es: Oscilador armónico simple.
    en: Simple harmonic oscillator.
  formulaConnection:
    es: F = −kx, ω = √(k/m).
    en: F = −kx, ω = √(k/m).
  readingFocus:
    es: identificar x, F = −kx y posición de equilibrio.
    en: identify x, F = −kx and equilibrium position.
  agentHints:
    es:
      - F apunta al equilibrio.
      - ω = √(k/m).
      - E = (1/2)kA².
    en:
      - F points to equilibrium.
      - ω = √(k/m).
      - E = (1/2)kA².
  commonMistakes:
    es:
      - F en la misma dirección que x.
      - A depende de ω (no).
      - Olvidar fase φ.
    en:
      - F in same direction as x.
      - A depends on ω (no).
      - Forgetting phase φ.
