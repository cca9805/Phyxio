version: "1.0"
leaf: "pendulo"

coord:
  title:
    es: Gráfica Coord · Péndulo Simple (Lagrangiano)
    en: Coord Graph · Simple Pendulum (Lagrangian)
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ(t) (rad) o energía E (J)
    en: angle θ(t) (rad) or energy E (J)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: "L = (1/2)m·l²·θ̇² − m·g·l·(1 − cosθ). Ec. movimiento: θ̈ + (g/l)·sinθ = 0. Aprox. pequeño ángulo: θ̈ + ω₀²·θ = 0, ω₀ = √(g/l)."
    en: "L = (1/2)m·l²·θ̇² − m·g·l·(1 − cosθ). Eq. of motion: θ̈ + (g/l)·sinθ = 0. Small angle approx: θ̈ + ω₀²·θ = 0, ω₀ = √(g/l)."
  physicalReading:
    es: "Para θ pequeño: oscilación sinusoidal con T = 2π√(l/g). Para θ grande: T depende de la amplitud (no lineal)."
    en: "For small θ: sinusoidal oscillation with T = 2π√(l/g). For large θ: T depends on amplitude (nonlinear)."
  slopeMeaning:
    es: "dθ/dt = θ̇: velocidad angular."
    en: "dθ/dt = θ̇: angular velocity."
  interceptMeaning:
    es: "θ(0): ángulo inicial."
    en: "θ(0): initial angle."
  curvatureMeaning:
    es: θ̈ = −(g/l)·sinθ.
    en: θ̈ = −(g/l)·sinθ.
  signMeaning:
    es: "θ: cualquier signo (izquierda/derecha)."
    en: "θ: any sign (left/right)."
  areaMeaning:
    es: ∫θ̇ dt = Δθ.
    en: ∫θ̇ dt = Δθ.
  domainMeaning:
    es: "θ ∈ (−π, π]. t ≥ 0."
    en: "θ ∈ (−π, π]. t ≥ 0."
  modelConnection:
    es: Péndulo simple vía Lagrange.
    en: Simple pendulum via Lagrange.
  formulaConnection:
    es: θ̈ + (g/l)·sinθ = 0, T = 2π√(l/g) (θ pequeño).
    en: θ̈ + (g/l)·sinθ = 0, T = 2π√(l/g) (small θ).
  readingFocus:
    es: leer amplitud θ_max, periodo T y verificar la aproximación de pequeño ángulo.
    en: read amplitude θ_max, period T and verify the small angle approximation.
  agentHints:
    es:
      - T = 2π√(l/g) solo para θ pequeño.
      - T no depende de m.
      - "Para θ grande: no armónico."
    en:
      - T = 2π√(l/g) only for small θ.
      - T does not depend on m.
      - "For large θ: not harmonic."
  commonMistakes:
    es:
      - Usar T = 2π√(l/g) para θ grande.
      - Pensar que T depende de m.
      - No distinguir rad de grados.
    en:
      - Using T = 2π√(l/g) for large θ.
      - Thinking T depends on m.
      - Not distinguishing rad from degrees.

svg:
  title:
    es: Escena SVG · Péndulo Simple
    en: SVG Scene · Simple Pendulum
  sceneId: pendulo_simple
  sceneLabel:
    es: Péndulo con θ, l, T = mg y F_c
    en: Pendulum with θ, l, T = mg and F_c
  objects:
    es:
      - hilo de longitud l
      - masa m
      - ángulo θ
      - tensión T
      - peso mg
      - componente tangencial mg·sinθ
    en:
      - string of length l
      - mass m
      - angle θ
      - tension T
      - weight mg
      - tangential component mg·sinθ
  mainObject:
    es: péndulo simple
    en: simple pendulum
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Hilo inextensible de largo l. Masa en extremo inferior. θ medido desde la vertical.
    en: Inextensible string of length l. Mass at lower end. θ measured from vertical.
  interactions:
    es: "Fuerza restauradora: −mg·sinθ ≈ −mg·θ (θ pequeño) → T = 2π√(l/g)."
    en: "Restoring force: −mg·sinθ ≈ −mg·θ (small θ) → T = 2π√(l/g)."
  modelElements:
    es:
      - "θ: ángulo con la vertical"
      - "T: tensión del hilo"
      - "mg·sinθ: componente restauradora"
    en:
      - "θ: angle with vertical"
      - "T: string tension"
      - "mg·sinθ: restoring component"
  visualCues:
    es:
      - Arco de θ indica el ángulo.
      - Flecha mg·sinθ tangente a la trayectoria.
      - Hilo siempre en tensión.
    en:
      - Arc of θ indicates angle.
      - mg·sinθ arrow tangent to trajectory.
      - String always in tension.
  scaleMeaning:
    es: Longitud del hilo l fija T.
    en: String length l fixes T.
  relation:
    es: θ̈ + (g/l)·sinθ = 0.
    en: θ̈ + (g/l)·sinθ = 0.
  physicalReading:
    es: mg·sinθ es la fuerza restauradora; apunta hacia el equilibrio θ = 0.
    en: mg·sinθ is the restoring force; points towards equilibrium θ = 0.
  modelConnection:
    es: Péndulo simple.
    en: Simple pendulum.
  formulaConnection:
    es: T = 2π√(l/g), θ̈ + (g/l)·sinθ = 0.
    en: T = 2π√(l/g), θ̈ + (g/l)·sinθ = 0.
  readingFocus:
    es: identificar θ, l y la componente tangencial mg·sinθ.
    en: identify θ, l and tangential component mg·sinθ.
  agentHints:
    es:
      - T = 2π√(l/g).
      - Restauradora = −mg·sinθ.
      - θ en radianes.
    en:
      - T = 2π√(l/g).
      - Restoring = −mg·sinθ.
      - θ in radians.
  commonMistakes:
    es:
      - T depende de m (no).
      - θ en grados en la fórmula.
      - Tensión ≠ peso.
    en:
      - T depends on m (no).
      - θ in degrees in formula.
      - Tension ≠ weight.
