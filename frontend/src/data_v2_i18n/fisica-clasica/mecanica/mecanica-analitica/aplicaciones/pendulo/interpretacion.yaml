version: 2
id: interpretacion-pendulo
leaf_id: pendulo
nombre:
  es: Interpretacion del pendulo
  en: Pendulum interpretation
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: mecanica-analitica
  parent_id: aplicaciones
  ruta_relativa: fisica-clasica/mecanica/mecanica-analitica/aplicaciones/pendulo
dependencies:
  formulas: [ omega, Tper, tau ]
  magnitudes: [ L, g, theta, m, omega, Tper, tau ]
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title: { es: Resumen fisico, en: Physical summary }
  physical_reading:
    title: { es: Lectura causal, en: Causal reading }
  coherence:
    title: { es: Coherencia del resultado, en: Result coherence }
  model_validity:
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    title: { es: Lectura grafica, en: Graph reading }
  likely_errors:
    title: { es: Errores probables, en: Likely errors }
  next_step:
    title: { es: Siguiente decision, en: Next decision }

targets:
  omega:
    summary_rules:
    - id: omega_summary
      when: "true"
      status: info
      text: { es: "[[omega]] resume el ritmo natural del pendulo y depende de [[g]] y [[L]] en el regimen pequeno angular.", en: "[[omega]] summarizes pendulum natural rhythm and depends on [[g]] and [[L]] in the small-angle regime." }
    physical_reading_rules:
    - id: omega_physical
      when: "true"
      status: info
      text: { es: "Si [[L]] crece, el pendulo tarda mas en recuperar vertical y [[omega]] baja; si [[g]] crece, el retorno es mas intenso y [[omega]] sube.", en: "If [[L]] increases, the pendulum needs more time to recover vertical and [[omega]] decreases; if [[g]] increases, restoring action intensifies and [[omega]] rises." }
    coherence_rules:
    - id: omega_coherence
      when: "true"
      status: ok
      text: { es: "El resultado es coherente si [[omega]] es positiva, cambia con raiz de [[g]] y con raiz inversa de [[L]].", en: "The result is coherent if [[omega]] is positive, changes with square root of [[g]], and with inverse square root of [[L]]." }
    model_validity_rules:
    - id: omega_validity
      when: "true"
      status: ok
      text: { es: "Valido para angulos pequenos, hilo inextensible y perdidas pequenas por ciclo.", en: "Valid for small angles, inextensible string, and small losses per cycle." }
    graph_rules:
    - id: omega_graph
      when: "true"
      status: info
      text: { es: "En Coord, [[omega]] debe reducirse con [[L]] y aumentar con [[g]], manteniendo pendiente no lineal por raiz.", en: "In Coord, [[omega]] should decrease with [[L]] and increase with [[g]], keeping a nonlinear square-root slope." }
    likely_errors:
    - id: omega_error
      when: "true"
      status: warning
      text: { es: "Error conceptual comun: creer que aumentar [[m]] cambia [[omega]] en el pendulo ideal, o mezclar unidades de [[L]] y [[g]] sin conversion.", en: "Common conceptual error: assuming that increasing [[m]] changes [[omega]] in the ideal pendulum, or mixing [[L]] and [[g]] units without conversion." }
    next_step_rules:
    - id: omega_next
      when: "true"
      status: tip
      text: { es: "Tras estimar [[omega]], calcula [[Tper]] para conectar con medicion temporal directa.", en: "After estimating [[omega]], compute [[Tper]] to connect with direct time measurement." }

  Tper:
    summary_rules:
    - id: Tper_summary
      when: "true"
      status: info
      text: { es: "[[Tper]] da el tiempo de ciclo del pendulo en pequenas oscilaciones.", en: "[[Tper]] gives pendulum cycle time under small oscillations." }
    physical_reading_rules:
    - id: Tper_physical
      when: "true"
      status: info
      text: { es: "Un [[Tper]] grande indica retorno lento por [[L]] alta o [[g]] baja.", en: "A large [[Tper]] indicates slow restoration due to high [[L]] or low [[g]]." }
    coherence_rules:
    - id: Tper_coherence
      when: "true"
      status: ok
      text: { es: "[[Tper]] debe ser positivo y su tendencia debe oponerse a la de [[omega]].", en: "[[Tper]] must be positive and its trend must oppose [[omega]] trend." }
    model_validity_rules:
    - id: Tper_validity
      when: "true"
      status: ok
      text: { es: "Si el periodo observado cambia con amplitud grande, la aproximacion lineal deja de ser fiable.", en: "If observed period changes with large amplitude, the linear approximation is no longer reliable." }
    graph_rules:
    - id: Tper_graph
      when: "true"
      status: info
      text: { es: "En el grafico temporal, [[Tper]] es la separacion entre picos equivalentes de [[theta]].", en: "In the time graph, [[Tper]] is the separation between equivalent peaks of [[theta]]." }
    likely_errors:
    - id: Tper_error
      when: "true"
      status: warning
      text: { es: "Error conceptual comun: asumir dependencia lineal entre [[Tper]] y [[L]], o atribuir cambios de periodo a [[m]] en el modelo ideal.", en: "Common conceptual error: assuming linear dependence between [[Tper]] and [[L]], or attributing period changes to [[m]] in the ideal model." }
    next_step_rules:
    - id: Tper_next
      when: "true"
      status: tip
      text: { es: "Comparar [[Tper]] estimado con mediciones repetidas ayuda a detectar no linealidad o rozamiento.", en: "Comparing estimated [[Tper]] with repeated measurements helps detect nonlinearity or damping." }

  tau:
    summary_rules:
    - id: tau_summary
      when: "true"
      status: info
      text: { es: "[[tau]] cuantifica la accion restauradora instantanea y cambia de signo con [[theta]].", en: "[[tau]] quantifies instantaneous restoring action and changes sign with [[theta]]." }
    physical_reading_rules:
    - id: tau_physical
      when: "true"
      status: info
      text: { es: "El signo menos de [[tau]] indica que el sistema empuja siempre hacia la vertical estable.", en: "The minus sign in [[tau]] indicates the system always pushes toward stable vertical direction." }
    coherence_rules:
    - id: tau_coherence
      when: "true"
      status: ok
      text: { es: "La coherencia basica es sign([[tau]]) opuesto a sign([[theta]]).", en: "Basic coherence is sign([[tau]]) opposite to sign([[theta]])." }
    model_validity_rules:
    - id: tau_validity
      when: "true"
      status: ok
      text: { es: "La expresion exacta con seno mantiene validez para angulos moderados sin linealizar.", en: "The exact sine expression remains valid for moderate angles without linearization." }
    graph_rules:
    - id: tau_graph
      when: "true"
      status: info
      text: { es: "En un mapa [[tau]] vs [[theta]], la curva cruza cero en equilibrio y cambia de signo al cruzar vertical.", en: "In a [[tau]] vs [[theta]] map, the curve crosses zero at equilibrium and flips sign when crossing vertical." }
    likely_errors:
    - id: tau_error
      when: "true"
      status: warning
      text: { es: "Error conceptual comun: eliminar el signo negativo o interpretar [[tau]] como cantidad de ciclo en lugar de accion instantanea.", en: "Common conceptual error: dropping the negative sign or interpreting [[tau]] as a cycle quantity instead of instantaneous action." }
    next_step_rules:
    - id: tau_next
      when: "true"
      status: tip
      text: { es: "Con [[tau]] disponible, el siguiente paso es estudiar estabilidad local y energia angular.", en: "With [[tau]] available, the next step is to study local stability and angular energy." }

  L:
    summary_rules:
    - id: L_summary
      when: "true"
      status: info
      text: { es: "[[L]] fija la escala geometrica del pendulo y condiciona su reloj temporal.", en: "[[L]] sets pendulum geometric scale and conditions its temporal clock." }
    physical_reading_rules:
    - id: L_physical
      when: "true"
      status: info
      text: { es: "A mayor [[L]], el arco efectivo crece y el ciclo se hace mas lento.", en: "With larger [[L]], effective arc scale increases and the cycle becomes slower." }
    coherence_rules:
    - id: L_coherence
      when: "true"
      status: ok
      text: { es: "[[L]] debe ser positiva y medirse desde pivote hasta centro de masa efectivo.", en: "[[L]] must be positive and measured from pivot to effective center of mass." }
    model_validity_rules:
    - id: L_validity
      when: "true"
      status: ok
      text: { es: "Si la longitud efectiva cambia durante el ensayo, la lectura temporal pierde validez.", en: "If effective length changes during the run, temporal reading loses validity." }
    graph_rules:
    - id: L_graph
      when: "true"
      status: info
      text: { es: "En Coord, variar [[L]] debe mover la escala de [[omega]] y [[Tper]] con tendencia opuesta.", en: "In Coord, changing [[L]] should move [[omega]] and [[Tper]] scales with opposite trend." }
    likely_errors:
    - id: L_error
      when: "true"
      status: warning
      text: { es: "Error comun: usar longitud de cuerda total sin corregir posicion real del centro de masa.", en: "Common error: using total string length without correcting real center-of-mass position." }
    next_step_rules:
    - id: L_next
      when: "true"
      status: tip
      text: { es: "Refina la medida de [[L]] antes de ajustar cualquier comparacion temporal fina.", en: "Refine [[L]] measurement before any fine temporal comparison." }

  g:
    summary_rules:
    - id: g_summary
      when: "true"
      status: info
      text: { es: "[[g]] expresa la intensidad del campo que genera retorno gravitatorio.", en: "[[g]] expresses field intensity that generates gravitational return." }
    physical_reading_rules:
    - id: g_physical
      when: "true"
      status: info
      text: { es: "A mayor [[g]], el pendulo recupera vertical mas rapido y reduce su periodo.", en: "With larger [[g]], the pendulum recovers vertical faster and reduces period." }
    coherence_rules:
    - id: g_coherence
      when: "true"
      status: ok
      text: { es: "[[g]] debe ser positiva y coherente con el entorno fisico del experimento.", en: "[[g]] must be positive and coherent with experiment physical environment." }
    model_validity_rules:
    - id: g_validity
      when: "true"
      status: ok
      text: { es: "Si el experimento cambia de altitud o entorno, [[g]] efectiva debe actualizarse.", en: "If the experiment changes altitude or environment, effective [[g]] must be updated." }
    graph_rules:
    - id: g_graph
      when: "true"
      status: info
      text: { es: "En Coord, aumentar [[g]] debe elevar [[omega]] y reducir [[Tper]].", en: "In Coord, increasing [[g]] should raise [[omega]] and reduce [[Tper]]." }
    likely_errors:
    - id: g_error
      when: "true"
      status: warning
      text: { es: "Error comun: usar valor de [[g]] por defecto sin justificar condiciones locales.", en: "Common error: using default [[g]] value without justifying local conditions." }
    next_step_rules:
    - id: g_next
      when: "true"
      status: tip
      text: { es: "Contrasta [[g]] asumida con una medicion de referencia para cerrar incertidumbre.", en: "Compare assumed [[g]] with a reference measurement to close uncertainty." }

  m:
    summary_rules:
    - id: m_summary
      when: "true"
      status: info
      text: { es: "[[m]] escala el torque local pero no gobierna el reloj temporal ideal.", en: "[[m]] scales local torque but does not govern ideal temporal clock." }
    physical_reading_rules:
    - id: m_physical
      when: "true"
      status: info
      text: { es: "Incrementar [[m]] aumenta modulo de [[tau]] para el mismo estado angular.", en: "Increasing [[m]] raises [[tau]] magnitude for the same angular state." }
    coherence_rules:
    - id: m_coherence
      when: "true"
      status: ok
      text: { es: "[[m]] debe permanecer positiva y expresada en kg para mantener coherencia dinamica.", en: "[[m]] must remain positive and expressed in kg to keep dynamic coherence." }
    model_validity_rules:
    - id: m_validity
      when: "true"
      status: ok
      text: { es: "Si la masa no puede tratarse como puntual, el modelo simple debe corregirse.", en: "If mass cannot be treated as point-like, the simple model must be corrected." }
    graph_rules:
    - id: m_graph
      when: "true"
      status: info
      text: { es: "La lectura temporal ideal casi no cambia con [[m]], pero el mapa de [[tau]] si se escala.", en: "Ideal temporal reading barely changes with [[m]], but [[tau]] mapping does scale." }
    likely_errors:
    - id: m_error
      when: "true"
      status: warning
      text: { es: "Error comun: usar [[m]] para explicar cambios de periodo que en realidad vienen de [[L]] o de amplitud.", en: "Common error: using [[m]] to explain period changes that actually come from [[L]] or amplitude." }
    next_step_rules:
    - id: m_next
      when: "true"
      status: tip
      text: { es: "Si el objetivo es ajustar tiempo de ciclo, prioriza [[L]] y no [[m]].", en: "If the goal is cycle-time tuning, prioritize [[L]] rather than [[m]]." }
