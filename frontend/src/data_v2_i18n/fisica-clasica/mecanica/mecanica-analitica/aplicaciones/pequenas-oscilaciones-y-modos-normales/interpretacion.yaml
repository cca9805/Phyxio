    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  phi:
    summary_rules:
    - id: phi_summary
      when: 'true'
      status: info
      text:
        es: phi resume una lectura central del leaf.
        en: phi summarizes a central reading of the leaf.
    physical_reading_rules:
    - id: phi_physical
      when: 'true'
      status: info
      text:
        es: phi causa una lectura fisica porque determina que estructura se conserva,
          cambia o se invalida dentro del modelo.
        en: phi causes a physical reading because it determines which structure is
          preserved, changed, or invalidated inside the model.
    coherence_rules:
    - id: phi_coherence
      when: 'true'
      status: ok
      text:
        es: La magnitud es coherente si se mantiene dentro del mismo formalismo.
        en: The quantity is coherent if it stays within the same formalism.
    model_validity_rules:
    - id: phi_validity
      when: 'true'
      status: ok
      text:
        es: La lectura exige las hipotesis de regularidad, suavidad y dominio declaradas.
        en: The reading requires the declared regularity, smoothness, and domain assumptions.
    graph_rules:
    - id: phi_graph
      when: 'true'
      status: info
      text:
        es: Sin grafico declarado, la lectura se apoya en estructura y unidades.
        en: With no declared graph, the reading relies on structure and units.
    likely_errors:
    - id: phi_error
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: aplicar la relacion fuera de su dominio.'
        en: 'Common mistake: applying the relation outside its domain.'
    next_step_rules:
    - id: phi_next
      when: 'true'
      status: info
      text:
        es: Comprueba el dominio antes de pasar al siguiente calculo.
        en: Check the domain before moving to the next calculation.
