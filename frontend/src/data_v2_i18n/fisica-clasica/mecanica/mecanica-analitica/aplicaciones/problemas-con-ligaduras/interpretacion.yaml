version: 2
id: interpretacion-problemas-con-ligaduras
leaf_id: problemas-con-ligaduras
nombre:
  es: Interpretacion de problemas con ligaduras
  en: Interpretation of problems with constraints
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: mecanica-analitica
  parent_id: aplicaciones
  ruta_relativa: fisica-clasica/mecanica/mecanica-analitica/aplicaciones/problemas-con-ligaduras
dependencies:
  formulas: [ a_comun, T ]
  magnitudes: [ m1, m2, g, a, T ]
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title: { es: Resumen fisico, en: Physical summary }
  physical_reading:
    title: { es: Lectura causal, en: Causal reading }
  coherence:
    title: { es: Coherencia del resultado, en: Result coherence }
  model_validity:
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    title: { es: Lectura grafica, en: Graph reading }
  likely_errors:
    title: { es: Errores probables, en: Likely errors }
  next_step:
    title: { es: Siguiente decision, en: Next decision }

targets:
  a:
    summary_rules:
    - id: a_summary
      when: "true"
      status: info
      text: { es: "[[a]] resume la respuesta compartida que la ligadura impone al sistema de dos masas.", en: "[[a]] summarizes the shared response imposed by the constraint in the two-mass system." }
    physical_reading_rules:
    - id: a_physical
      when: "true"
      status: info
      text: { es: "Si crece el contraste entre [[m2]] y [[m1]], aumenta el modulo de [[a]] porque el desbalance supera la inercia total.", en: "If contrast between [[m2]] and [[m1]] increases, [[a]] magnitude increases because imbalance overcomes total inertia." }
    coherence_rules:
    - id: a_coherence
      when: "true"
      status: ok
      text: { es: "La salida es coherente si [[a]] cambia de signo al intercambiar [[m1]] y [[m2]], y vale cero en simetria.", en: "Output is coherent if [[a]] changes sign when [[m1]] and [[m2]] are swapped, and becomes zero at symmetry." }
    model_validity_rules:
    - id: a_validity
      when: "true"
      status: ok
      text: { es: "Valida bajo cuerda inextensible, polea ideal y rozamiento no dominante.", en: "Valid under inextensible rope, ideal pulley, and non-dominant friction." }
    graph_rules:
    - id: a_graph
      when: "true"
      status: info
      text: { es: "En Coord, la curva de [[a]] debe cruzar cero en el punto de masas iguales y crecer en modulo fuera de esa zona.", en: "In Coord, the [[a]] curve should cross zero at equal masses and grow in magnitude away from that point." }
    likely_errors:
    - id: a_error
      when: "true"
      status: warning
      text: { es: "Error conceptual comun: asignar aceleraciones distintas a cuerpos unidos por la misma cuerda ideal.", en: "Common conceptual error: assigning different accelerations to bodies connected by the same ideal rope." }
    next_step_rules:
    - id: a_next
      when: "true"
      status: tip
      text: { es: "Con [[a]] estimada, interpreta evolucion temporal y contrasta con datos de medicion.", en: "With [[a]] estimated, interpret time evolution and compare with measurements." }

  T:
    summary_rules:
    - id: T_summary
      when: "true"
      status: info
      text: { es: "[[T]] cuantifica la fuerza interna que mantiene acopladas ambas ramas del sistema.", en: "[[T]] quantifies the internal force that keeps both branches of the system coupled." }
    physical_reading_rules:
    - id: T_physical
      when: "true"
      status: info
      text: { es: "[[T]] emerge del cierre dinamico; no es una entrada externa libre.", en: "[[T]] emerges from dynamic closure; it is not a free external input." }
    coherence_rules:
    - id: T_coherence
      when: "true"
      status: ok
      text: { es: "La coherencia basica exige [[T]] positiva mientras la cuerda permanezca tensa.", en: "Basic coherence requires positive [[T]] while the rope remains taut." }
    model_validity_rules:
    - id: T_validity
      when: "true"
      status: ok
      text: { es: "Si hay inercia de polea o friccion notable, la tension ideal puede desviarse de forma sistematica.", en: "If pulley inertia or significant friction exists, ideal tension may deviate systematically." }
    graph_rules:
    - id: T_graph
      when: "true"
      status: info
      text: { es: "En el panel grafico, [[T]] debe crecer con la carga efectiva y mantener tendencia suave en el dominio valido.", en: "In the graph panel, [[T]] should grow with effective load and keep smooth trend inside validity domain." }
    likely_errors:
    - id: T_error
      when: "true"
      status: warning
      text: { es: "Error conceptual comun: confundir [[T]] con el peso de una sola masa en cualquier configuracion.", en: "Common conceptual error: confusing [[T]] with the weight of a single mass in every configuration." }
    next_step_rules:
    - id: T_next
      when: "true"
      status: tip
      text: { es: "Comparar [[T]] ideal con sensores ayuda a identificar perdidas no modeladas.", en: "Comparing ideal [[T]] with sensors helps identify unmodeled losses." }

  m1:
    summary_rules:
    - id: m1_summary
      when: "true"
      status: info
      text: { es: "[[m1]] define la inercia de una rama del sistema acoplado.", en: "[[m1]] sets inertia of one branch of the coupled system." }
    physical_reading_rules:
    - id: m1_physical
      when: "true"
      status: info
      text: { es: "Aumentar [[m1]] reduce el desbalance cuando [[m2]] se mantiene fija.", en: "Increasing [[m1]] reduces imbalance when [[m2]] is fixed." }
    coherence_rules:
    - id: m1_coherence
      when: "true"
      status: ok
      text: { es: "[[m1]] debe permanecer positiva y en unidades consistentes.", en: "[[m1]] must remain positive and in consistent units." }
    model_validity_rules:
    - id: m1_validity
      when: "true"
      status: ok
      text: { es: "Cambios bruscos de masa efectiva por accesorios invalidan lectura ideal.", en: "Abrupt effective-mass changes from attachments invalidate ideal reading." }
    graph_rules:
    - id: m1_graph
      when: "true"
      status: info
      text: { es: "Mover [[m1]] en barrido horizontal desplaza el punto de equilibrio de [[a]].", en: "Moving [[m1]] in a horizontal sweep shifts the equilibrium point of [[a]]." }
    likely_errors:
    - id: m1_error
      when: "true"
      status: warning
      text: { es: "Error comun: usar [[m1]] en gramos mientras [[m2]] esta en kilogramos.", en: "Common error: using [[m1]] in grams while [[m2]] is in kilograms." }
    next_step_rules:
    - id: m1_next
      when: "true"
      status: tip
      text: { es: "Normaliza masas al mismo sistema de unidades antes de comparar casos.", en: "Normalize masses to the same unit system before comparing cases." }

  m2:
    summary_rules:
    - id: m2_summary
      when: "true"
      status: info
      text: { es: "[[m2]] fija la inercia de la rama opuesta y participa del desbalance global.", en: "[[m2]] sets inertia of the opposite branch and contributes to global imbalance." }
    physical_reading_rules:
    - id: m2_physical
      when: "true"
      status: info
      text: { es: "Con [[m1]] fija, aumentar [[m2]] eleva la tendencia del sistema a moverse hacia su lado.", en: "With fixed [[m1]], increasing [[m2]] raises tendency to move toward its side." }
    coherence_rules:
    - id: m2_coherence
      when: "true"
      status: ok
      text: { es: "[[m2]] positiva y consistente garantiza lectura estable de signo en [[a]].", en: "Positive and consistent [[m2]] guarantees stable sign reading in [[a]]." }
    model_validity_rules:
    - id: m2_validity
      when: "true"
      status: ok
      text: { es: "Si [[m2]] cambia durante el ensayo, el modelo estacionario requiere reconfiguracion.", en: "If [[m2]] changes during a run, the stationary model requires reconfiguration." }
    graph_rules:
    - id: m2_graph
      when: "true"
      status: info
      text: { es: "El grafico muestra crecimiento de [[a]] al aumentar [[m2]] respecto de [[m1]].", en: "The graph shows growth of [[a]] as [[m2]] increases relative to [[m1]]." }
    likely_errors:
    - id: m2_error
      when: "true"
      status: warning
      text: { es: "Error comun: interpretar el orden de masas sin fijar direccion positiva.", en: "Common error: interpreting mass ordering without defining positive direction." }
    next_step_rules:
    - id: m2_next
      when: "true"
      status: tip
      text: { es: "Documenta convencion de ejes antes de comparar experimentos.", en: "Document axis convention before comparing experiments." }

  g:
    summary_rules:
    - id: g_summary
      when: "true"
      status: info
      text: { es: "[[g]] escala la accion externa comun sobre ambas masas.", en: "[[g]] scales common external action on both masses." }
    physical_reading_rules:
    - id: g_physical
      when: "true"
      status: info
      text: { es: "Si [[g]] aumenta, crecen la aceleracion posible y la tension asociada al mismo contraste de masas.", en: "If [[g]] increases, both possible acceleration and associated tension increase for the same mass contrast." }
    coherence_rules:
    - id: g_coherence
      when: "true"
      status: ok
      text: { es: "[[g]] debe ser positiva y coherente con el entorno del experimento.", en: "[[g]] must be positive and consistent with the experiment environment." }
    model_validity_rules:
    - id: g_validity
      when: "true"
      status: ok
      text: { es: "Cambios de entorno requieren actualizar [[g]] para mantener trazabilidad.", en: "Environment changes require updating [[g]] to keep traceability." }
    graph_rules:
    - id: g_graph
      when: "true"
      status: info
      text: { es: "A igual razon de masas, mayor [[g]] eleva escala vertical de [[a]] y [[T]].", en: "At fixed mass ratio, larger [[g]] raises vertical scale of [[a]] and [[T]]." }
    likely_errors:
    - id: g_error
      when: "true"
      status: warning
      text: { es: "Error comun: tomar [[g]] por defecto sin indicar condiciones locales.", en: "Common error: using default [[g]] without stating local conditions." }
    next_step_rules:
    - id: g_next
      when: "true"
      status: tip
      text: { es: "Registrar valor de [[g]] usado mejora reproducibilidad entre grupos.", en: "Recording the [[g]] value improves reproducibility across groups." }
