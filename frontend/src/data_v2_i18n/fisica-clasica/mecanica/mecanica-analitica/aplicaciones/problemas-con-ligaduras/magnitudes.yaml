version: 5
magnitudes:
- id: m1
  symbol: m_1
  nombre: { es: Masa 1, en: Mass 1 }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: sistema
  physical_role: inercia_lado_1
  used_in: [ a, T ]
  common_mistake: Tratar m1 como fuerza en vez de parametro inercial.
  typical_range: [ 0.01, 1000 ]
  sign_behavior: positiva_por_definicion
  zero_behavior: sistema_degenerado
  value_nature: parametro
  interpretation_role: carga_dinamica_lado_1
  graph_binding: "Aumentar [[m1]] reduce [[a]] cuando [[m2]] permanece fija."
  descripcion: { es: Masa del primer cuerpo acoplado por la ligadura., en: Mass of the first body coupled by the constraint. }
  pedagogical_notes: { es: "Conviene comparar [[m1]] y [[m2]] por diferencia relativa, no solo absoluta.", en: "It is useful to compare [[m1]] and [[m2]] by relative difference, not only absolute value." }

- id: m2
  symbol: m_2
  nombre: { es: Masa 2, en: Mass 2 }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: sistema
  physical_role: inercia_lado_2
  used_in: [ a, T ]
  common_mistake: Asumir que m2 mayor siempre implica respuesta lineal de aceleracion.
  typical_range: [ 0.01, 1000 ]
  sign_behavior: positiva_por_definicion
  zero_behavior: sistema_degenerado
  value_nature: parametro
  interpretation_role: carga_dinamica_lado_2
  graph_binding: "Aumentar [[m2]] incrementa [[a]] en el sentido definido por el lado 2."
  descripcion: { es: Masa del segundo cuerpo acoplado por la ligadura., en: Mass of the second body coupled by the constraint. }
  pedagogical_notes: { es: "Cuando [[m2]] se aproxima a [[m1]], la aceleracion comun [[a]] tiende a valores pequenos.", en: "When [[m2]] approaches [[m1]], common acceleration [[a]] tends to small values." }

- id: g
  symbol: g
  nombre: { es: Gravedad, en: Gravity }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L/T^2
  is_vector: false
  components: []
  category: campo
  physical_role: accion_externa_comun
  used_in: [ a, T ]
  common_mistake: Usar valor de g sin justificar entorno experimental.
  typical_range: [ 1.5, 25 ]
  sign_behavior: positiva_por_convencion
  zero_behavior: sin_impulso_gravitatorio
  value_nature: parametro_entorno
  interpretation_role: escala_forzante
  graph_binding: "[[g]] escala simultaneamente [[a]] y [[T]] en el modelo ideal."
  descripcion: { es: Intensidad del campo gravitatorio en el sistema acoplado., en: Gravitational field intensity in the coupled system. }
  pedagogical_notes: { es: "Cambiar [[g]] altera el ritmo dinamico aun con masas fijas.", en: "Changing [[g]] alters dynamic rhythm even with fixed masses." }

- id: a
  symbol: a
  nombre: { es: Aceleracion comun, en: Common Acceleration }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L/T^2
  is_vector: false
  components: []
  category: dinamica
  physical_role: respuesta_compartida
  used_in: [ a ]
  common_mistake: Ignorar convenio de signo y perder direccion fisica del movimiento.
  typical_range: [ -50, 50 ]
  sign_behavior: depende_de_diferencia_masas
  zero_behavior: equilibrio_dinamico
  value_nature: resultado
  interpretation_role: magnitud_dominante
  graph_binding: "[[a]] resume el efecto global de ligadura y desbalance de masas."
  descripcion: { es: Aceleracion impuesta por la ligadura a ambos cuerpos., en: Acceleration imposed by the constraint on both bodies. }
  pedagogical_notes: { es: "Su valor cambia con la asimetria entre [[m1]] y [[m2]].", en: "Its value changes with asymmetry between [[m1]] and [[m2]]." }

- id: T
  symbol: T
  nombre: { es: Tension interna, en: Internal Tension }
  si_unit: N
  unidad_si: N
  dimension: M*L/T^2
  is_vector: false
  components: []
  category: dinamica
  physical_role: fuerza_transmision
  used_in: [ T ]
  common_mistake: Interpretar T como fuerza externa aplicada desde fuera del sistema.
  typical_range: [ 0, 1e+5 ]
  sign_behavior: no_negativa_en_regimen_ideal
  zero_behavior: cuerda_sin_carga
  value_nature: resultado
  interpretation_role: enlace_dinamico
  graph_binding: "[[T]] refleja cuanto esfuerzo interno transmite la cuerda ideal."
  descripcion: { es: Fuerza interna que transmite la ligadura entre masas acopladas., en: Internal force transmitted by the constraint between coupled masses. }
  pedagogical_notes: { es: "Permite distinguir interaccion interna y fuerzas externas de cada cuerpo.", en: "It helps distinguish internal interaction from external forces on each body." }
