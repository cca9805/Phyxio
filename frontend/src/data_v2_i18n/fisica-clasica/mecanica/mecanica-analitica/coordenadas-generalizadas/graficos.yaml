version: "1.0"
leaf: "coordenadas-generalizadas"

coord:
  title:
    es: Gráfica Coord · Coordenadas Generalizadas
    en: Coord Graph · Generalised Coordinates
  xAxis:
    es: coordenada generalizada q_i
    en: generalised coordinate q_i
  yAxis:
    es: coordenada generalizada q_j o dq/dt
    en: generalised coordinate q_j or dq/dt
  xMagnitude: q
  yMagnitude: dq_dt
  relation:
    es: GdL = n − k. Las q_i independientes describen el espacio de configuración. L = T − V en coordenadas generalizadas.
    en: DoF = n − k. Independent q_i describe configuration space. L = T − V in generalised coordinates.
  physicalReading:
    es: La trayectoria en el espacio de configuración describe la evolución completa del sistema.
    en: The trajectory in configuration space describes the full system evolution.
  slopeMeaning:
    es: "dq_j/dq_i: razón de cambio entre coordenadas."
    en: "dq_j/dq_i: rate of change between coordinates."
  interceptMeaning:
    es: Condición inicial q_i(0).
    en: Initial condition q_i(0).
  curvatureMeaning:
    es: Acoplamiento no lineal entre GdL.
    en: Nonlinear coupling between DoF.
  signMeaning:
    es: Depende de la elección de q.
    en: Depends on coordinate choice.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Definido por las ligaduras.
    en: Defined by constraints.
  modelConnection:
    es: Espacio de configuración de la mecánica analítica.
    en: Configuration space of analytical mechanics.
  formulaConnection:
    es: L = T − V, d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0.
    en: L = T − V, d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0.
  readingFocus:
    es: leer el número de GdL independientes y las ligaduras.
    en: read the number of independent DoF and constraints.
  agentHints:
    es:
      - GdL = n − k.
      - q_i independientes.
      - Espacio config ≠ espacio de fases.
    en:
      - DoF = n − k.
      - q_i independent.
      - Config space ≠ phase space.
  commonMistakes:
    es:
      - Confundir con coords cartesianas.
      - No restar ligaduras.
      - Confundir espacio config con espacio de fases.
    en:
      - Confusing with Cartesian coords.
      - Not subtracting constraints.
      - Confusing config space with phase space.
