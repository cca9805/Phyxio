version: 2
id: interpretacion-coordenadas-generalizadas
leaf_id: coordenadas-generalizadas
nombre:
  es: Interpretación de coordenadas generalizadas
  en: Generalized coordinates interpretation
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: mecanica-analitica
  parent_id: mecanica-analitica
  ruta_relativa: fisica-clasica/mecanica/mecanica-analitica/coordenadas-generalizadas
dependencies:
  formulas: [ posicion_generalizada, velocidad_generalizada, energia_cinetica_generalizada, x_desde_polar, y_desde_polar, radio_cartesiano, grados_libertad ]
  magnitudes: [ q, qdot, r_vec, v, T, m, t, x, y, r, theta, n, C, f ]
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title: { es: Resumen físico, en: Physical summary }
  physical_reading:
    title: { es: Lectura causal, en: Causal reading }
  coherence:
    title: { es: Coherencia del resultado, en: Result coherence }
  model_validity:
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    title: { es: Lectura gráfica, en: Graph reading }
  likely_errors:
    title: { es: Errores probables, en: Likely errors }
  next_step:
    title: { es: Siguiente decisión, en: Next decision }

targets:
  x:
    summary_rules:
    - id: x_summary
      when: "true"
      status: info
      text: { es: "[[x]] expresa la proyección horizontal de una posición definida por [[r]] y [[theta]].", en: "[[x]] is the horizontal projection of a position defined by [[r]] and [[theta]]." }
    physical_reading_rules:
    - id: x_physical
      when: "true"
      status: info
      text: { es: "Si [[theta]] aumenta con [[r]] fija, entonces la proyección horizontal [[x]] cambia porque la orientación del radio rota respecto del eje x.", en: "If [[theta]] increases at fixed [[r]], then horizontal projection [[x]] changes because radius orientation rotates relative to the x axis." }
    coherence_rules:
    - id: x_coherence
      when: "true"
      status: ok
      text: { es: "Se espera |[[x]]| <= [[r]] en cualquier estado geométrico válido.", en: "Expected relation is |[[x]]| <= [[r]] for any valid geometric state." }
    model_validity_rules:
    - id: x_validity
      when: "true"
      status: ok
      text: { es: "Válido en conversión planar euclídea con convención angular consistente.", en: "Valid in planar Euclidean conversion with consistent angle convention." }
    graph_rules:
    - id: x_graph
      when: "true"
      status: info
      text: { es: "En Coord, [[x]] varía sinusoidalmente con [[theta]] para [[r]] fijo.", en: "In Coord, [[x]] varies sinusoidally with [[theta]] at fixed [[r]]." }
    likely_errors:
    - id: x_error
      when: "true"
      status: warning
      text: { es: "Error común: usar grados en [[theta]] cuando el cálculo espera radianes.", en: "Common error: using degrees for [[theta]] when computation expects radians." }
    next_step_rules:
    - id: x_next
      when: "true"
      status: tip
      text: { es: "Compara [[x]] con [[y]] para validar cuadrante y sentido angular.", en: "Compare [[x]] with [[y]] to validate quadrant and angular direction." }

  y:
    summary_rules:
    - id: y_summary
      when: "true"
      status: info
      text: { es: "[[y]] expresa la proyección vertical de la posición en el plano.", en: "[[y]] expresses the vertical projection of position on the plane." }
    physical_reading_rules:
    - id: y_physical
      when: "true"
      status: info
      text: { es: "[[y]] crece al aumentar seno de [[theta]] para [[r]] constante.", en: "[[y]] increases as sine of [[theta]] increases at constant [[r]]." }
    coherence_rules:
    - id: y_coherence
      when: "true"
      status: ok
      text: { es: "Debe cumplirse |[[y]]| <= [[r]] en geometría plana estándar.", en: "Relation |[[y]]| <= [[r]] must hold in standard planar geometry." }
    model_validity_rules:
    - id: y_validity
      when: "true"
      status: ok
      text: { es: "No aplica en cambios de base no euclídeos sin redefinir métrica.", en: "Not valid for non-Euclidean basis changes without redefining metric." }
    graph_rules:
    - id: y_graph
      when: "true"
      status: info
      text: { es: "En Coord, [[y]] y [[x]] quedan desfasadas un cuarto de periodo angular.", en: "In Coord, [[y]] and [[x]] are phase-shifted by a quarter angular period." }
    likely_errors:
    - id: y_error
      when: "true"
      status: warning
      text: { es: "Error común: invertir seno y coseno en la proyección vertical.", en: "Common error: swapping sine and cosine in vertical projection." }
    next_step_rules:
    - id: y_next
      when: "true"
      status: tip
      text: { es: "Verifica consistencia con [[radio_cartesiano|r]] para cerrar la conversión.", en: "Check consistency with [[radio_cartesiano|r]] to close conversion." }

  r:
    summary_rules:
    - id: r_summary
      when: "true"
      status: info
      text: { es: "[[r]] representa distancia al origen y fija escala espacial de la configuración.", en: "[[r]] represents distance to the origin and sets spatial scale of configuration." }
    physical_reading_rules:
    - id: r_physical
      when: "true"
      status: info
      text: { es: "Con [[r]] fija, solo cambia orientación; con [[theta]] fija, cambia tamaño radial.", en: "At fixed [[r]], only orientation changes; at fixed [[theta]], radial size changes." }
    coherence_rules:
    - id: r_coherence
      when: "true"
      status: ok
      text: { es: "[[r]] debe ser no negativa por definición geométrica.", en: "[[r]] must be non-negative by geometric definition." }
    model_validity_rules:
    - id: r_validity
      when: "true"
      status: ok
      text: { es: "Requiere plano euclídeo y componentes [[x]], [[y]] medibles en misma escala.", en: "Requires Euclidean plane and [[x]], [[y]] components measured on same scale." }
    graph_rules:
    - id: r_graph
      when: "true"
      status: info
      text: { es: "Curvas de [[r]] constante forman circunferencias en el plano cartesiano.", en: "Constant [[r]] curves are circles in Cartesian plane." }
    likely_errors:
    - id: r_error
      when: "true"
      status: warning
      text: { es: "Error común: interpretar [[r]] como desplazamiento recorrido en vez de estado instantáneo.", en: "Common error: interpreting [[r]] as traveled distance instead of instantaneous state." }
    next_step_rules:
    - id: r_next
      when: "true"
      status: tip
      text: { es: "Usa [[r]] y [[theta]] para construir coordenadas generalizadas convenientes.", en: "Use [[r]] and [[theta]] to build convenient generalized coordinates." }

  theta:
    summary_rules:
    - id: theta_summary
      when: "true"
      status: info
      text: { es: "[[theta]] define la orientación angular de la posición respecto al eje de referencia.", en: "[[theta]] defines angular orientation of position relative to reference axis." }
    physical_reading_rules:
    - id: theta_physical
      when: "true"
      status: info
      text: { es: "Un cambio pequeño en [[theta]] puede invertir signo de [[x]] o [[y]] según cuadrante.", en: "A small [[theta]] change can flip sign of [[x]] or [[y]] depending on quadrant." }
    coherence_rules:
    - id: theta_coherence
      when: "true"
      status: ok
      text: { es: "[[theta]] debe manejarse en radianes para coherencia con seno y coseno estándar.", en: "[[theta]] must be handled in radians for standard sine and cosine coherence." }
    model_validity_rules:
    - id: theta_validity
      when: "true"
      status: ok
      text: { es: "La convención angular debe declararse para comparar resultados entre problemas.", en: "Angular convention must be declared to compare results across problems." }
    graph_rules:
    - id: theta_graph
      when: "true"
      status: info
      text: { es: "En gráficas paramétricas, [[theta]] recorre curva cerrada al avanzar 2π.", en: "In parametric graphs, [[theta]] traces a closed curve over 2π." }
    likely_errors:
    - id: theta_error
      when: "true"
      status: warning
      text: { es: "Error común: mezclar grados y radianes sin conversión explícita.", en: "Common error: mixing degrees and radians without explicit conversion." }
    next_step_rules:
    - id: theta_next
      when: "true"
      status: tip
      text: { es: "Valida cuadrante con signo simultáneo de [[x]] y [[y]].", en: "Validate quadrant using simultaneous sign of [[x]] and [[y]]." }

  n:
    summary_rules:
    - id: n_summary
      when: "true"
      status: info
      text: { es: "[[n]] cuenta entidades dinámicas antes de aplicar restricciones.", en: "[[n]] counts dynamic entities before applying constraints." }
    physical_reading_rules:
    - id: n_physical
      when: "true"
      status: info
      text: { es: "Mayor [[n]] amplía espacio de configuración bruto del sistema.", en: "Larger [[n]] expands raw configuration space of the system." }
    coherence_rules:
    - id: n_coherence
      when: "true"
      status: ok
      text: { es: "[[n]] debe ser entero positivo en problemas físicos discretos.", en: "[[n]] must be a positive integer in discrete physical problems." }
    model_validity_rules:
    - id: n_validity
      when: "true"
      status: ok
      text: { es: "Solo aplica directamente a conteo discreto, no a medios continuos.", en: "Directly applies to discrete counting, not continuous media." }
    graph_rules:
    - id: n_graph
      when: "true"
      status: info
      text: { es: "Con [[C]] fijo, [[f]] crece linealmente con [[n]].", en: "At fixed [[C]], [[f]] grows linearly with [[n]]." }
    likely_errors:
    - id: n_error
      when: "true"
      status: warning
      text: { es: "Error común: confundir [[n]] con número de ecuaciones de movimiento.", en: "Common error: confusing [[n]] with number of motion equations." }
    next_step_rules:
    - id: n_next
      when: "true"
      status: tip
      text: { es: "Enumera entidades físicas explícitamente antes del conteo final.", en: "List physical entities explicitly before final counting." }

  C:
    summary_rules:
    - id: C_summary
      when: "true"
      status: info
      text: { es: "[[C]] representa ligaduras independientes que reducen coordenadas efectivas.", en: "[[C]] represents independent constraints reducing effective coordinates." }
    physical_reading_rules:
    - id: C_physical
      when: "true"
      status: info
      text: { es: "A mayor [[C]] con [[n]] fijo, menor dimensión dinámica disponible.", en: "Higher [[C]] at fixed [[n]] lowers available dynamic dimension." }
    coherence_rules:
    - id: C_coherence
      when: "true"
      status: ok
      text: { es: "Debe cumplirse [[C]] <= 3[[n]] para mantener [[f]] no negativa.", en: "Condition [[C]] <= 3[[n]] must hold to keep [[f]] non-negative." }
    model_validity_rules:
    - id: C_validity
      when: "true"
      status: ok
      text: { es: "Las ligaduras deben ser independientes; redundancias alteran conteo.", en: "Constraints must be independent; redundancies corrupt counting." }
    graph_rules:
    - id: C_graph
      when: "true"
      status: info
      text: { es: "Con [[n]] constante, [[f]] decrece linealmente al aumentar [[C]].", en: "With constant [[n]], [[f]] decreases linearly as [[C]] increases." }
    likely_errors:
    - id: C_error
      when: "true"
      status: warning
      text: { es: "Error común: contar dos restricciones equivalentes como independientes.", en: "Common error: counting two equivalent constraints as independent." }
    next_step_rules:
    - id: C_next
      when: "true"
      status: tip
      text: { es: "Comprueba independencia algebraica de ligaduras antes de cerrar [[f]].", en: "Check algebraic constraint independence before finalizing [[f]]." }

  f:
    summary_rules:
    - id: f_summary
      when: "true"
      status: info
      text: { es: "[[f]] indica cuántas coordenadas generalizadas independientes necesita el modelo.", en: "[[f]] indicates how many independent generalized coordinates the model needs." }
    physical_reading_rules:
    - id: f_physical
      when: "true"
      status: info
      text: { es: "[[f]] conecta estructura geométrica del sistema con complejidad dinámica efectiva.", en: "[[f]] links system geometric structure with effective dynamic complexity." }
    coherence_rules:
    - id: f_coherence
      when: "true"
      status: ok
      text: { es: "[[f]] debe ser entero no negativo; si no, hay error de conteo en [[C]] o [[n]].", en: "[[f]] must be a non-negative integer; otherwise [[C]] or [[n]] counting is wrong." }
    model_validity_rules:
    - id: f_validity
      when: "true"
      status: ok
      text: { es: "Fórmula válida para sistema discreto tridimensional con ligaduras holónomas independientes.", en: "Formula valid for discrete three-dimensional systems with independent holonomic constraints." }
    graph_rules:
    - id: f_graph
      when: "true"
      status: info
      text: { es: "En Coord, [[f]] define recta de pendiente -1 respecto de [[C]] con [[n]] fijo.", en: "In Coord, [[f]] defines slope -1 line versus [[C]] at fixed [[n]]." }
    likely_errors:
    - id: f_error
      when: "true"
      status: warning
      text: { es: "Error común: usar [[f]] como dimensión espacial en vez de dimensión del espacio de configuración.", en: "Common error: using [[f]] as spatial dimension instead of configuration-space dimension." }
    next_step_rules:
    - id: f_next
      when: "true"
      status: tip
      text: { es: "Con [[f]] calculada, selecciona coordenadas generalizadas mínimas y físicamente interpretables.", en: "With [[f]] computed, select minimal and physically interpretable generalized coordinates." }

  r_vec:
    summary_rules: [{ id: rvec_summary, when: "true", status: info, text: { es: "[[r_vec]] es la posici?n f?sica reconstruida desde [[q]].", en: "[[r_vec]] is the physical position reconstructed from [[q]]." } }]
    physical_reading_rules: [{ id: rvec_physical, when: "true", status: info, text: { es: "Cambiar [[q]] cambia [[r_vec]] porque la carta traduce variables internas en posici?n observable.", en: "Changing [[q]] changes [[r_vec]] because the chart translates internal variables into observable position." } }]
    coherence_rules: [{ id: rvec_coherence, when: "true", status: ok, text: { es: "[[r_vec]] debe tener dimensi?n de longitud y ser coherente con la geometr?a elegida.", en: "[[r_vec]] must have length dimension and match the chosen geometry." } }]
    model_validity_rules: [{ id: rvec_validity, when: "true", status: ok, text: { es: "La carta debe ser v?lida y no singular en la regi?n estudiada.", en: "The chart must be valid and non-singular in the studied region." } }]
    graph_rules: [{ id: rvec_graph, when: "true", status: info, text: { es: "El gr?fico debe mostrar c?mo [[q]] desplaza la posici?n f?sica.", en: "The graph should show how [[q]] moves physical position." } }]
    likely_errors: [{ id: rvec_error, when: "true", status: warning, text: { es: "Error com?n: confundir coordenadas generalizadas con posici?n cartesiana directa.", en: "Common error: confusing generalized coordinates with direct Cartesian position." } }]
    next_step_rules: [{ id: rvec_next, when: "true", status: tip, text: { es: "Deriva la carta para obtener [[v]].", en: "Differentiate the chart to obtain [[v]]." } }]
  v:
    summary_rules: [{ id: v_summary, when: "true", status: info, text: { es: "[[v]] es la velocidad f?sica inducida por [[qdot]].", en: "[[v]] is the physical velocity induced by [[qdot]]." } }]
    physical_reading_rules: [{ id: v_physical, when: "true", status: info, text: { es: "[[qdot]] causa movimiento f?sico solo a trav?s de la geometr?a de la carta.", en: "[[qdot]] causes physical motion only through the geometry of the chart." } }]
    coherence_rules: [{ id: v_coherence, when: "true", status: ok, text: { es: "[[v]] debe anularse si no cambia ninguna coordenada y la carta no depende de [[t]].", en: "[[v]] must vanish if no coordinate changes and the chart has no explicit [[t]] dependence." } }]
    model_validity_rules: [{ id: v_validity, when: "true", status: ok, text: { es: "Requiere mapa diferenciable y velocidades generalizadas finitas.", en: "Requires a differentiable map and finite generalized velocities." } }]
    graph_rules: [{ id: v_graph, when: "true", status: info, text: { es: "El gr?fico debe conectar [[qdot]] con [[v]].", en: "The graph should connect [[qdot]] with [[v]]." } }]
    likely_errors: [{ id: v_error, when: "true", status: warning, text: { es: "Error com?n: sustituir [[qdot]] como si fuera [[v]].", en: "Common error: substituting [[qdot]] as if it were [[v]]." } }]
    next_step_rules: [{ id: v_next, when: "true", status: tip, text: { es: "Usa [[v]] para calcular [[T]].", en: "Use [[v]] to compute [[T]]." } }]
  T:
    summary_rules: [{ id: T_summary, when: "true", status: info, text: { es: "[[T]] mide la energ?a cin?tica asociada a la velocidad f?sica.", en: "[[T]] measures kinetic energy associated with physical velocity." } }]
    physical_reading_rules: [{ id: T_physical, when: "true", status: info, text: { es: "[[T]] crece porque aumenta la rapidez f?sica o la masa del sistema.", en: "[[T]] grows because physical speed or system mass increases." } }]
    coherence_rules: [{ id: T_coherence, when: "true", status: ok, text: { es: "[[T]] debe ser no negativa.", en: "[[T]] must be non-negative." } }]
    model_validity_rules: [{ id: T_validity, when: "true", status: ok, text: { es: "La masa debe ser positiva y la velocidad f?sica estar definida.", en: "Mass must be positive and physical velocity must be defined." } }]
    graph_rules: [{ id: T_graph, when: "true", status: info, text: { es: "La curva de [[T]] debe crecer cuadr?ticamente con la rapidez.", en: "The [[T]] curve should grow quadratically with speed." } }]
    likely_errors: [{ id: T_error, when: "true", status: warning, text: { es: "Error com?n: calcular energ?a con coordenadas sin m?trica f?sica.", en: "Common error: computing energy from coordinates without physical metric." } }]
    next_step_rules: [{ id: T_next, when: "true", status: tip, text: { es: "Conecta [[T]] con el lagrangiano del sistema.", en: "Connect [[T]] with the system Lagrangian." } }]
