- id: evolucion_temporal_poisson
  title:
    es: Evolucion temporal hamiltoniana
    en: Hamiltonian time evolution
  equation: dA_dt = PB
  latex: \frac{dA}{dt}=\{A,H\}+\frac{\partial A}{\partial t}
  category: fundamental
  relation_type: definition
  physical_meaning:
