formulas:
- id: definicion_corchete_poisson
  title:
    es: Definicion del corchete de Poisson
    en: Poisson bracket definition
  equation: PB = PB
  latex: \{A,B\}=\sum_i\left(\frac{\partial A}{\partial q_i}\frac{\partial B}{\partial
    p_i}-\frac{\partial A}{\partial p_i}\frac{\partial B}{\partial q_i}\right)
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Define la operacion que compara como dos observables responden a las variables
      canonicas.
    en: Defines the operation comparing how two observables respond to canonical variables.
  constraints: []
  validity:
    es: Valida bajo las hipotesis declaradas del leaf.
    en: Valid under the hypotheses declared in the leaf.
  dimension_check: coherente con la magnitud objetivo
  calculable: true
  motivo_no_calculable: null
  used_in:
  - lectura_fisica_del_leaf
  interpretation_tags:
  - mecanica-analitica
  - modelo-avanzado
  result_semantics:
    target: PB
    meaning: Define la operacion que compara como dos observables responden a las
      variables canonicas.
  domain_checks:
  - expr: 'true'
    message:
      es: Comprueba que las variables pertenecen al mismo modelo.
      en: Check that variables belong to the same model.
  coherence_checks:
  - expr: 'true'
    message:
      es: La relacion debe respetar el dominio canonico o lineal declarado.
      en: The relation must respect the declared canonical or linear domain.
  graph_implications: Sin grafico declarado; la lectura se centra en estructura algebraica
    y criterio fisico.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Explica primero el significado fisico antes de operar.
      en: Explain physical meaning before operating.
  rearrangements:
