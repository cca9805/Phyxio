version: "1.0"
leaf: "ecuaciones-de-lagrange"

coord:
  title:
    es: Gráfica Coord · Ecuaciones de Lagrange
    en: Coord Graph · Lagrange Equations
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: coordenada generalizada q_i(t)
    en: generalised coordinate q_i(t)
  xMagnitude: t
  yMagnitude: q
  relation:
    es: d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0. Equivalente a F = ma en cualquier sistema de coordenadas. Elimina las fuerzas de ligadura.
    en: d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0. Equivalent to F = ma in any coordinate system. Eliminates constraint forces.
  physicalReading:
    es: q_i(t) es la trayectoria en el espacio de configuración. La pendiente es q̇_i y la curvatura es q̈_i.
    en: q_i(t) is the trajectory in configuration space. Slope is q̇_i and curvature is q̈_i.
  slopeMeaning:
    es: dq_i/dt = q̇_i.
    en: dq_i/dt = q̇_i.
  interceptMeaning:
    es: "q_i(0): condición inicial."
    en: "q_i(0): initial condition."
  curvatureMeaning:
    es: "q̈_i: aceleración generalizada."
    en: "q̈_i: generalised acceleration."
  signMeaning:
    es: Depende del sistema.
    en: Depends on system.
  areaMeaning:
    es: ∫q̇_i dt = Δq_i.
    en: ∫q̇_i dt = Δq_i.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Ecuaciones de Lagrange y principio de mínima acción.
    en: Lagrange equations and principle of least action.
  formulaConnection:
    es: d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0, S = ∫L dt.
    en: d/dt(∂L/∂q̇_i) − ∂L/∂q_i = 0, S = ∫L dt.
  readingFocus:
    es: leer q_i(t) y verificar las ecuaciones de movimiento.
    en: read q_i(t) and verify equations of motion.
  agentHints:
    es:
      - Equivalente a F = ma.
      - Elimina fuerzas de ligadura.
      - p_i = ∂L/∂q̇_i.
    en:
      - Equivalent to F = ma.
      - Eliminates constraint forces.
      - p_i = ∂L/∂q̇_i.
  commonMistakes:
    es:
      - Olvidar d/dt de ∂L/∂q̇.
      - No incluir todas las q_i.
      - Confundir con Hamilton.
    en:
      - Forgetting d/dt of ∂L/∂q̇.
      - Not including all q_i.
      - Confusing with Hamilton.
