version: 2
id: interpretacion-principio-variacional-y-accion
leaf_id: principio-variacional-y-accion
nombre:
  es: Interpretacion del principio variacional y la accion
  en: Interpretation of the variational principle and action
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: mecanica-analitica
  parent_id: lagrangiano
  ruta_relativa: fisica-clasica/mecanica/mecanica-analitica/lagrangiano/principio-variacional-y-accion
dependencies:
  formulas: [ accion_lagrangiana, condicion_accion_estacionaria, residuo_variacional_euler_lagrange, ecuacion_euler_lagrange_desde_accion ]
  magnitudes: [ S, L, t1, t2, deltaS, qi, qdi, Ri ]
output_contract:
  sections: [ summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step ]
result_blocks:
  summary: { title: { es: Resumen variacional, en: Variational summary } }
  physical_reading: { title: { es: Lectura fisica, en: Physical reading } }
  coherence: { title: { es: Coherencia, en: Coherence } }
  model_validity: { title: { es: Validez del modelo, en: Model validity } }
  graph_reading: { title: { es: Lectura grafica, en: Graph reading } }
  likely_errors: { title: { es: Errores probables, en: Likely errors } }
  next_step: { title: { es: Siguiente paso, en: Next step } }
targets:
  S:
    summary_rules:
    - { id: s_summary, when: "true", status: info, text: { es: "S resume el valor acumulado de L sobre una trayectoria completa.", en: "S summarizes the accumulated value of L over a complete path." } }
    physical_reading_rules:
    - { id: s_physical, when: "true", status: info, text: { es: "La accion permite comparar caminos cinematicamente posibles con los mismos extremos.", en: "Action allows comparison of kinematically possible paths with the same endpoints." } }
    coherence_rules:
    - { id: s_coherence, when: "true", status: ok, text: { es: "S solo es comparable si todas las trayectorias usan el mismo intervalo y el mismo lagrangiano.", en: "S is comparable only if all paths use the same interval and the same Lagrangian." } }
    model_validity_rules:
    - { id: s_validity, when: "true", status: ok, text: { es: "La lectura requiere trayectorias suaves y extremos temporales fijados.", en: "The reading requires smooth paths and fixed time endpoints." } }
    graph_rules:
    - { id: s_graph, when: "true", status: info, text: { es: "Si se representa S frente a una familia de caminos, la trayectoria fisica aparece en un punto estacionario.", en: "If S is plotted against a family of paths, the physical path appears at a stationary point." } }
    likely_errors:
    - { id: s_error, when: "true", status: warning, text: { es: "Error frecuente: tratar S como una energia instantanea.", en: "Common mistake: treating S as an instantaneous energy." } }
    next_step_rules:
    - { id: s_next, when: "true", status: info, text: { es: "Identifica primero L, el intervalo y las trayectorias admisibles.", en: "First identify L, the interval, and the admissible paths." } }
  deltaS:
    summary_rules:
    - { id: ds_summary, when: "true", status: info, text: { es: "deltaS es la prueba de estacionariedad de primer orden.", en: "deltaS is the first-order stationarity test." } }
    physical_reading_rules:
    - { id: ds_physical, when: "true", status: info, text: { es: "deltaS igual a cero significa que pequenas variaciones admisibles no cambian S a primer orden.", en: "deltaS equal to zero means small admissible variations do not change S to first order." } }
    coherence_rules:
    - { id: ds_coherence, when: "true", status: ok, text: { es: "No debe leerse como minimo absoluto salvo que se demuestre.", en: "It should not be read as an absolute minimum unless proven." } }
    model_validity_rules:
    - { id: ds_validity, when: "true", status: ok, text: { es: "Solo se admiten variaciones compatibles con los extremos y las ligaduras.", en: "Only variations compatible with endpoints and constraints are admitted." } }
    graph_rules:
    - { id: ds_graph, when: "true", status: info, text: { es: "La pendiente local nula de S representa deltaS igual a cero.", en: "The zero local slope of S represents deltaS equal to zero." } }
    likely_errors:
    - { id: ds_error, when: "true", status: warning, text: { es: "Error frecuente: decir minimo de accion cuando el criterio correcto es estacionariedad.", en: "Common mistake: saying least action when the correct criterion is stationarity." } }
    next_step_rules:
    - { id: ds_next, when: "true", status: info, text: { es: "Pasa de la condicion global a su residuo local en cada coordenada.", en: "Move from the global condition to its local residual in each coordinate." } }
  Ri:
    summary_rules:
    - { id: ri_summary, when: "true", status: info, text: { es: "Ri mide el fallo local de una trayectoria candidata frente al principio variacional.", en: "Ri measures the local failure of a candidate path against the variational principle." } }
    physical_reading_rules:
    - { id: ri_physical, when: "true", status: info, text: { es: "Ri se anula en una trayectoria fisica conservativa porque la accion queda estacionaria.", en: "Ri vanishes on a conservative physical path because the action is stationary." } }
    coherence_rules:
    - { id: ri_coherence, when: "true", status: ok, text: { es: "Ri debe construirse desde el mismo L que define S.", en: "Ri must be built from the same L that defines S." } }
    model_validity_rules:
    - { id: ri_validity, when: "true", status: ok, text: { es: "Si hay fuerzas no potenciales externas, el residuo puede igualarse a una fuerza generalizada.", en: "If external non-potential forces exist, the residual may equal a generalized force." } }
    graph_rules:
    - { id: ri_graph, when: "true", status: info, text: { es: "Una lectura grafica util busca donde Ri cambia de signo o se anula.", en: "A useful graphical reading looks for where Ri changes sign or vanishes." } }
    likely_errors:
    - { id: ri_error, when: "true", status: warning, text: { es: "Error frecuente: copiar Euler-Lagrange sin explicar que viene de deltaS.", en: "Common mistake: copying Euler-Lagrange without explaining that it comes from deltaS." } }
    next_step_rules:
    - { id: ri_next, when: "true", status: info, text: { es: "Comprueba que la ecuacion obtenida reproduce el caso newtoniano simple.", en: "Check that the obtained equation reproduces the simple Newtonian case." } }
  L:
    summary_rules:
    - { id: l_summary, when: "true", status: info, text: { es: "L es el integrando fisico de la accion.", en: "L is the physical integrand of the action." } }
    physical_reading_rules:
    - { id: l_physical, when: "true", status: info, text: { es: "Cambiar L cambia que caminos quedan estacionarios.", en: "Changing L changes which paths become stationary." } }
    coherence_rules:
    - { id: l_coherence, when: "true", status: ok, text: { es: "L debe describir todas las interacciones conservativas relevantes.", en: "L must describe all relevant conservative interactions." } }
    model_validity_rules:
    - { id: l_validity, when: "true", status: ok, text: { es: "El lagrangiano debe ser diferenciable respecto de qi y qdi.", en: "The Lagrangian must be differentiable with respect to qi and qdi." } }
    graph_rules:
    - { id: l_graph, when: "true", status: info, text: { es: "Sin grafico declarado, la lectura se centra en dependencia funcional y signos.", en: "With no declared graph, the reading focuses on functional dependence and signs." } }
    likely_errors:
    - { id: l_error, when: "true", status: warning, text: { es: "Error frecuente: formar L con energias que no pertenecen al mismo sistema.", en: "Common mistake: forming L with energies that do not belong to the same system." } }
    next_step_rules:
    - { id: l_next, when: "true", status: info, text: { es: "Despues de construir L, define que variaciones de qi son admisibles.", en: "After building L, define which variations of qi are admissible." } }
