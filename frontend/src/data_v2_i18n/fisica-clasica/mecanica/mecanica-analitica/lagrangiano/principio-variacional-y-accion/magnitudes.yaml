version: 5
magnitudes:
- id: S
  symbol: S
  nombre: { es: accion, en: action }
  unidad_si: J*s
  descripcion: { es: Integral temporal del lagrangiano a lo largo de una trayectoria candidata., en: Time integral of the Lagrangian along a candidate path. }
  dimension: ML^2T^{-1}
  is_vector: false
  components: []
  category: derived
  physical_role: variational_action
  used_in: [ accion_lagrangiana ]
  common_mistake: Interpretarla como energia instantanea en vez de funcional de trayectoria.
  typical_range: Depende de la escala energetica y temporal del sistema.
  sign_behavior: { has_sign: true, meaning: { es: Depende del cero de energia potencial y del intervalo temporal., en: It depends on the potential-energy zero and time interval. } }
  zero_behavior: { allowed: true, meaning: { es: Puede anularse por referencia o cancelacion, sin eliminar la dinamica., en: It may vanish by reference choice or cancellation without removing dynamics. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [ principio-variacional-y-accion ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: S no valora un instante aislado; compara trayectorias completas.
- id: L
  symbol: L
  nombre: { es: lagrangiano, en: Lagrangian }
  unidad_si: J
  descripcion: { es: Funcion dinamica que se integra para construir la accion., en: Dynamical function integrated to build the action. }
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: lagrangian_function
  used_in: [ accion_lagrangiana ]
  common_mistake: Confundir el valor de L con una energia conservada.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Puede ser positivo o negativo segun T menos V., en: It may be positive or negative depending on T minus V. } }
  zero_behavior: { allowed: true, meaning: { es: L igual a cero no implica ausencia de movimiento., en: L equal to zero does not imply absence of motion. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ principio-variacional-y-accion ] }
  graph_binding: { channels: [] }
  pedagogical_notes: L es el integrando local de la accion.
- id: t1
  symbol: t_1
  nombre: { es: tiempo inicial, en: initial time }
  unidad_si: s
  descripcion: { es: Instante inicial fijado para comparar trayectorias., en: Fixed initial instant used to compare paths. }
  dimension: T
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: boundary_time
  used_in: [ accion_lagrangiana ]
  common_mistake: Variarlo cuando el principio exige extremos temporales fijados.
  typical_range: Real.
  sign_behavior: { has_sign: true, meaning: { es: Depende del origen temporal elegido., en: It depends on the chosen time origin. } }
  zero_behavior: { allowed: true, meaning: { es: Puede ser el origen temporal., en: It may be the time origin. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: t2 > t1 }
  interpretation_role: { primary_for: [], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: El extremo inicial se mantiene fijo al variar la trayectoria.
- id: t2
  symbol: t_2
  nombre: { es: tiempo final, en: final time }
  unidad_si: s
  descripcion: { es: Instante final fijado para comparar trayectorias., en: Fixed final instant used to compare paths. }
  dimension: T
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: boundary_time
  used_in: [ accion_lagrangiana ]
  common_mistake: Confundir duracion fijada con trayectoria fijada.
  typical_range: Mayor que t1.
  sign_behavior: { has_sign: true, meaning: { es: Depende del origen temporal elegido., en: It depends on the chosen time origin. } }
  zero_behavior: { allowed: true, meaning: { es: Puede ser cero si el origen temporal se fija al final., en: It may be zero if the time origin is set at the end. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: t2 > t1 }
  interpretation_role: { primary_for: [], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: El tiempo final tambien se mantiene fijo.
- id: deltaS
  symbol: \delta S
  nombre: { es: primera variacion de la accion, en: first variation of the action }
  unidad_si: J*s
  descripcion: { es: Cambio lineal de la accion frente a una variacion virtual de la trayectoria., en: Linear change in action under a virtual variation of the path. }
  dimension: ML^2T^{-1}
  is_vector: false
  components: []
  category: derived
  physical_role: stationarity_test
  used_in: [ condicion_accion_estacionaria ]
  common_mistake: Leerla como pequena pero no necesariamente nula.
  typical_range: Cero para la trayectoria fisica ideal.
  sign_behavior: { has_sign: true, meaning: { es: El signo depende de la variacion ensayada., en: The sign depends on the tested variation. } }
  zero_behavior: { allowed: true, meaning: { es: Cero expresa estacionariedad de primer orden., en: Zero expresses first-order stationarity. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [ principio-variacional-y-accion ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: deltaS igual a cero no significa accion minima siempre, sino estacionaria.
- id: qi
  symbol: q_i
  nombre: { es: coordenada generalizada, en: generalized coordinate }
  unidad_si: context-dependent
  descripcion: { es: Variable que describe una configuracion posible del sistema., en: Variable describing a possible configuration of the system. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: generalized_coordinate
  used_in: [ residuo_variacional_euler_lagrange ]
  common_mistake: Variarla sin respetar las condiciones de contorno.
  typical_range: Depende del sistema.
  sign_behavior: { has_sign: true, meaning: { es: Depende de la orientacion de la coordenada., en: It depends on coordinate orientation. } }
  zero_behavior: { allowed: true, meaning: { es: Puede representar una configuracion de referencia., en: It may represent a reference configuration. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ principio-variacional-y-accion ] }
  graph_binding: { channels: [] }
  pedagogical_notes: La variacion se hace sobre funciones qi(t), no sobre un numero aislado.
- id: qdi
  symbol: \dot{q}_i
  nombre: { es: velocidad generalizada, en: generalized velocity }
  unidad_si: context-dependent/s
  descripcion: { es: Derivada temporal de la coordenada generalizada., en: Time derivative of the generalized coordinate. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: generalized_velocity
  used_in: [ residuo_variacional_euler_lagrange ]
  common_mistake: Tratarla como independiente despues de fijar qi(t).
  typical_range: Depende del sistema.
  sign_behavior: { has_sign: true, meaning: { es: Depende del sentido de cambio de qi., en: It depends on the direction of change of qi. } }
  zero_behavior: { allowed: true, meaning: { es: Indica reposo instantaneo en esa coordenada., en: It indicates instantaneous rest in that coordinate. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ principio-variacional-y-accion ] }
  graph_binding: { channels: [] }
  pedagogical_notes: qdi entra en L y cambia cuando se modifica la trayectoria completa.
- id: Ri
  symbol: R_i
  nombre: { es: residuo variacional, en: variational residual }
  unidad_si: context-dependent
  descripcion: { es: Termino local que debe anularse para que la accion sea estacionaria., en: Local term that must vanish for the action to be stationary. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: euler_lagrange_residual
  used_in: [ residuo_variacional_euler_lagrange, ecuacion_euler_lagrange_desde_accion ]
  common_mistake: Interpretarlo como fuerza cartesiana ordinaria.
  typical_range: Cero sobre la trayectoria fisica conservativa.
  sign_behavior: { has_sign: true, meaning: { es: Indica sentido del desequilibrio en la coordenada generalizada., en: It indicates the imbalance direction in the generalized coordinate. } }
  zero_behavior: { allowed: true, meaning: { es: Cero identifica compatibilidad dinamica local., en: Zero identifies local dynamical compatibility. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: context-dependent }
  interpretation_role: { primary_for: [ principio-variacional-y-accion ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: Ri es la huella local de un criterio global de accion.
