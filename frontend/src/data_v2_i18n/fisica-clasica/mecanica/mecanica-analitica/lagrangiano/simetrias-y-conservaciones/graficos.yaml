version: "1.0"
leaf: "simetrias-y-conservaciones"

coord:
  title:
    es: Gráfica Coord · Simetrías y Conservaciones (Noether)
    en: Coord Graph · Symmetries and Conservation Laws (Noether)
  xAxis:
    es: tiempo t (s) o coordenada q_i
    en: time t (s) or coordinate q_i
  yAxis:
    es: cantidad conservada C (E, p o L)
    en: conserved quantity C (E, p or L)
  xMagnitude: t
  yMagnitude: E
  relation:
    es: "Teorema de Noether: simetría continua del Lagrangiano → cantidad conservada. Tiempo: E. Traslación: p. Rotación: L."
    en: "Noether's theorem: continuous symmetry of Lagrangian → conserved quantity. Time: E. Translation: p. Rotation: L."
  physicalReading:
    es: "C = cte: línea horizontal. Variación indica disipación o fuerza externa."
    en: "C = const: horizontal line. Variation indicates dissipation or external force."
  slopeMeaning:
    es: dC/dt = 0 si C es constante de movimiento.
    en: dC/dt = 0 if C is a constant of motion.
  interceptMeaning:
    es: Valor inicial C(0).
    en: Initial value C(0).
  curvatureMeaning:
    es: Cero si C conservada.
    en: Zero if C is conserved.
  signMeaning:
    es: "E ≥ 0. p, L: cualquier signo."
    en: "E ≥ 0. p, L: any sign."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Todo t.
    en: All t.
  modelConnection:
    es: Teorema de Noether.
    en: "Noether's theorem."
  formulaConnection:
    es: dC/dt = 0 ↔ simetría de L. E = Σp_i·q̇_i − L.
    en: dC/dt = 0 ↔ L symmetry. E = Σp_i·q̇_i − L.
  readingFocus:
    es: verificar que C es constante e identificar la simetría correspondiente.
    en: verify C is constant and identify the corresponding symmetry.
  agentHints:
    es:
      - "Noether: simetría → conservación."
      - Tiempo → E. Traslación → p. Rotación → L.
      - p canónico = ∂L/∂q̇.
    en:
      - "Noether: symmetry → conservation."
      - Time → E. Translation → p. Rotation → L.
      - Canonical p = ∂L/∂q̇.
  commonMistakes:
    es:
      - E no siempre conservada (disipación).
      - No identificar la simetría.
      - p canónico ≠ p mecánico si q no cartesiana.
    en:
      - E not always conserved (dissipation).
      - Not identifying symmetry.
      - Canonical p ≠ mechanical p if q not Cartesian.
