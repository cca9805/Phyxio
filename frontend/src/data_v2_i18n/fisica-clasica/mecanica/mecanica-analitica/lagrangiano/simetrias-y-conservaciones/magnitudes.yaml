version: 5
magnitudes:
- id: Q
  symbol: Q
  nombre: { es: carga de Noether, en: Noether charge }
  unidad_si: context-dependent
  descripcion: { es: Cantidad conservada asociada a una simetria continua., en: Conserved quantity associated with a continuous symmetry. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: noether_charge
  used_in: [ carga_noether ]
  common_mistake: Creer que cualquier cantidad casi constante es una carga de Noether.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Depende de la orientacion del generador., en: It depends on generator orientation. } }
  zero_behavior: { allowed: true, meaning: { es: Puede indicar simetria trivial o estado sin carga., en: It may indicate trivial symmetry or a chargeless state. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [ y2 ] }
  pedagogical_notes: Q es el puente entre simetria y conservacion.
- id: p_i
  symbol: p_i
  nombre: { es: momento conjugado, en: conjugate momentum }
  unidad_si: context-dependent
  descripcion: { es: Pendiente del lagrangiano respecto de la velocidad generalizada., en: Slope of the Lagrangian with respect to generalized velocity. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: conjugate_momentum
  used_in: [ momento_conjugado_noether, carga_noether, energia_por_invariancia_temporal ]
  common_mistake: Confundirlo siempre con momento lineal ordinario.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Depende del sentido de la coordenada., en: It depends on coordinate direction. } }
  zero_behavior: { allowed: true, meaning: { es: Puede indicar reposo conjugado o simetria particular., en: It may indicate conjugate rest or a special symmetry. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [ y1 ] }
  pedagogical_notes: p_i es la materia prima de muchas cantidades conservadas.
- id: X_i
  symbol: X_i
  nombre: { es: generador de simetria, en: symmetry generator }
  unidad_si: context-dependent
  descripcion: { es: Direccion infinitesimal en la que se transforma la coordenada sin cambiar la fisica., en: Infinitesimal direction in which the coordinate transforms without changing the physics. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: symmetry_generator
  used_in: [ carga_noether ]
  common_mistake: Confundir el generador con la cantidad conservada.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: El signo fija orientacion de la transformacion., en: The sign fixes transformation orientation. } }
  zero_behavior: { allowed: true, meaning: { es: Cero representa transformacion nula., en: Zero represents null transformation. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [ parameter ] }
  pedagogical_notes: Identificar X_i es identificar que cambio no altera el lagrangiano.
- id: L
  symbol: L
  nombre: { es: lagrangiano, en: Lagrangian }
  unidad_si: J
  descripcion: { es: Funcion dinamica cuyas simetrias generan leyes de conservacion., en: Dynamical function whose symmetries generate conservation laws. }
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: lagrangian_function
  used_in: [ momento_conjugado_noether, energia_por_invariancia_temporal ]
  common_mistake: Mirar solo su valor y no sus invariancias.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Puede ser positivo o negativo segun T menos V., en: It may be positive or negative depending on T minus V. } }
  zero_behavior: { allowed: true, meaning: { es: Cero no elimina necesariamente la dinamica., en: Zero does not necessarily remove dynamics. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: Las simetrias relevantes son simetrias de L o de la accion.
- id: DLv
  symbol: dL_dqdot
  nombre: { es: derivada de L respecto de qdot, en: derivative of L with respect to qdot }
  unidad_si: context-dependent
  descripcion: { es: Pendiente que define el momento conjugado., en: Slope defining conjugate momentum. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: conjugate_slope
  used_in: [ momento_conjugado_noether ]
  common_mistake: Derivar respecto de la coordenada en vez de la velocidad.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Hereda el sentido del momento conjugado., en: It inherits the direction of conjugate momentum. } }
  zero_behavior: { allowed: true, meaning: { es: Pendiente nula implica momento conjugado nulo., en: Zero slope implies zero conjugate momentum. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ simetrias-y-conservaciones ] }
  graph_binding: { channels: [] }
  pedagogical_notes: DLv evita confundir definicion general y caso particular.
- id: qdi
  symbol: qdot_i
  nombre: { es: velocidad generalizada, en: generalized velocity }
  unidad_si: context-dependent/s
  descripcion: { es: Derivada temporal de la coordenada generalizada., en: Time derivative of the generalized coordinate. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: generalized_velocity
  used_in: [ energia_por_invariancia_temporal ]
  common_mistake: Usarla sin declarar la coordenada asociada.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Depende de la orientacion de la coordenada., en: It depends on coordinate orientation. } }
  zero_behavior: { allowed: true, meaning: { es: Cero indica reposo instantaneo., en: Zero indicates instantaneous rest. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ simetrias-y-conservaciones ] }
  graph_binding: { channels: [ x ] }
  pedagogical_notes: qdi entra en la energia de Noether asociada al tiempo.
- id: dpdt
  symbol: dp_dt
  nombre: { es: variacion temporal del momento conjugado, en: time variation of conjugate momentum }
  unidad_si: context-dependent/s
  descripcion: { es: Ritmo de cambio de p_i; se anula para una coordenada ciclica., en: Rate of change of p_i; it vanishes for a cyclic coordinate. }
  dimension: context-dependent
  is_vector: false
  components: []
  category: derived
  physical_role: conservation_rate
  used_in: [ coordenada_ciclica ]
  common_mistake: Creer que p_i se conserva aunque la coordenada aparezca en L.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Indica aumento o disminucion de p_i., en: It indicates increase or decrease of p_i. } }
  zero_behavior: { allowed: true, meaning: { es: Cero expresa conservacion del momento conjugado., en: Zero expresses conservation of conjugate momentum. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: dpdt es el test directo de coordenada ciclica.
- id: E
  symbol: E
  nombre: { es: energia conservada, en: conserved energy }
  unidad_si: J
  descripcion: { es: Cantidad conservada asociada a invariancia temporal., en: Conserved quantity associated with time-translation invariance. }
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: conserved_energy
  used_in: [ energia_por_invariancia_temporal ]
  common_mistake: Asociar energia conservada a cualquier sistema aunque L dependa del tiempo.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Depende de la referencia energetica., en: It depends on energy reference. } }
  zero_behavior: { allowed: true, meaning: { es: Puede ser referencia de energia., en: It may be an energy reference. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [] }
  pedagogical_notes: E se conserva si el tiempo es homogeneo para el modelo.
- id: P
  symbol: P
  nombre: { es: momento lineal conservado, en: conserved linear momentum }
  unidad_si: kg*m/s
  descripcion: { es: Cantidad conservada asociada a simetria traslacional., en: Conserved quantity associated with translational symmetry. }
  dimension: MLT^{-1}
  is_vector: false
  components: []
  category: derived
  physical_role: linear_momentum
  used_in: [ momento_lineal_por_traslacion, momento_angular_por_rotacion ]
  common_mistake: Conservar P aunque haya fuerza externa espacial.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Indica sentido de traslacion., en: It indicates translation direction. } }
  zero_behavior: { allowed: true, meaning: { es: Cero indica ausencia de momento lineal neto., en: Zero indicates no net linear momentum. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [ y1 ] }
  pedagogical_notes: P aparece cuando la posicion absoluta no cambia la fisica.
- id: m
  symbol: m
  nombre: { es: masa, en: mass }
  unidad_si: kg
  descripcion: { es: Parametro inercial usado en el ejemplo traslacional., en: Inertial parameter used in the translational example. }
  dimension: M
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: inertial_parameter
  used_in: [ momento_lineal_por_traslacion ]
  common_mistake: Usar masa nula o negativa.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: false, meaning: { es: Se toma positiva., en: It is taken as positive. } }
  zero_behavior: { allowed: false, meaning: { es: Cero queda fuera del modelo ordinario., en: Zero is outside the ordinary model. } }
  value_nature: { kind: scalar, nonnegative_only: true, expected_interval: m > 0 }
  interpretation_role: { primary_for: [], secondary_for: [ simetrias-y-conservaciones ] }
  graph_binding: { channels: [ parameter ] }
  pedagogical_notes: m fija la escala de P frente a v.
- id: v
  symbol: v
  nombre: { es: velocidad, en: velocity }
  unidad_si: m/s
  descripcion: { es: Velocidad traslacional del ejemplo de momento lineal., en: Translational velocity in the linear-momentum example. }
  dimension: LT^{-1}
  is_vector: false
  components: []
  category: derived
  physical_role: velocity
  used_in: [ momento_lineal_por_traslacion ]
  common_mistake: Confundir rapidez y velocidad orientada.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Indica sentido de movimiento., en: It indicates direction of motion. } }
  zero_behavior: { allowed: true, meaning: { es: Cero anula P en el ejemplo simple., en: Zero removes P in the simple example. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [], secondary_for: [ simetrias-y-conservaciones ] }
  graph_binding: { channels: [ x ] }
  pedagogical_notes: v permite visualizar P y J en el grafico.
- id: J
  symbol: J
  nombre: { es: momento angular conservado, en: conserved angular momentum }
  unidad_si: kg*m^2/s
  descripcion: { es: Cantidad conservada asociada a simetria rotacional., en: Conserved quantity associated with rotational symmetry. }
  dimension: ML^2T^{-1}
  is_vector: false
  components: []
  category: derived
  physical_role: angular_momentum
  used_in: [ momento_angular_por_rotacion ]
  common_mistake: Conservar J aunque exista torque externo.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: true, meaning: { es: Indica sentido de giro., en: It indicates rotation direction. } }
  zero_behavior: { allowed: true, meaning: { es: Cero indica ausencia de momento angular en el eje considerado., en: Zero indicates no angular momentum along the considered axis. } }
  value_nature: { kind: scalar, nonnegative_only: false, expected_interval: Context-dependent }
  interpretation_role: { primary_for: [ simetrias-y-conservaciones ], secondary_for: [] }
  graph_binding: { channels: [ y2 ] }
  pedagogical_notes: J aparece cuando la orientacion absoluta no cambia la fisica.
- id: r
  symbol: r
  nombre: { es: brazo radial, en: radial arm }
  unidad_si: m
  descripcion: { es: Distancia perpendicular usada para estimar momento angular plano., en: Perpendicular distance used to estimate planar angular momentum. }
  dimension: L
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: lever_arm
  used_in: [ momento_angular_por_rotacion ]
  common_mistake: Usar distancia no perpendicular.
  typical_range: Context-dependent.
  sign_behavior: { has_sign: false, meaning: { es: Se toma no negativo como brazo., en: It is taken non-negative as an arm. } }
  zero_behavior: { allowed: true, meaning: { es: Cero anula el momento angular orbital simple., en: Zero removes simple orbital angular momentum. } }
  value_nature: { kind: scalar, nonnegative_only: true, expected_interval: r >= 0 }
  interpretation_role: { primary_for: [], secondary_for: [ simetrias-y-conservaciones ] }
  graph_binding: { channels: [ parameter ] }
  pedagogical_notes: r convierte P en J para el caso plano simple.
