version: "1.0"
leaf: "ligaduras-y-grados-de-libertad"

coord:
  title:
    es: Gráfica Coord · Ligaduras y Grados de Libertad
    en: Coord Graph · Constraints and Degrees of Freedom
  xAxis:
    es: número de coordenadas n
    en: number of coordinates n
  yAxis:
    es: grados de libertad GdL = n − k
    en: degrees of freedom DoF = n − k
  xMagnitude: n
  yMagnitude: GdL
  relation:
    es: GdL = 3N − k. Cada ligadura holónoma f(q,t) = 0 elimina un GdL.
    en: DoF = 3N − k. Each holonomic constraint f(q,t) = 0 removes one DoF.
  physicalReading:
    es: Recta de pendiente 1 desplazada −k. Cada ligadura quita un GdL.
    en: Line of slope 1 shifted by −k. Each constraint removes one DoF.
  slopeMeaning:
    es: Pendiente = 1.
    en: Slope = 1.
  interceptMeaning:
    es: "−k: desplazamiento por las ligaduras."
    en: "−k: shift due to constraints."
  curvatureMeaning:
    es: Lineal.
    en: Linear.
  signMeaning:
    es: GdL ≥ 0.
    en: DoF ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: n ≥ k.
    en: n ≥ k.
  modelConnection:
    es: Ligaduras holónomas y no holónomas.
    en: Holonomic and non-holonomic constraints.
  formulaConnection:
    es: GdL = 3N − k, f(q_i, t) = 0.
    en: DoF = 3N − k, f(q_i, t) = 0.
  readingFocus:
    es: leer cuántos GdL quedan libres tras las ligaduras.
    en: read how many DoF remain free after constraints.
  agentHints:
    es:
      - GdL = 3N − k.
      - "Holónoma: f(q,t) = 0."
      - "No holónoma: involucra velocidades."
    en:
      - DoF = 3N − k.
      - "Holonomic: f(q,t) = 0."
      - "Non-holonomic: involves velocities."
  commonMistakes:
    es:
      - No contar todas las ligaduras.
      - Holónoma ≠ no holónoma.
      - Usar 2N en lugar de 3N.
    en:
      - Not counting all constraints.
      - Holonomic ≠ non-holonomic.
      - Using 2N instead of 3N.
