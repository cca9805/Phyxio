version: 5
topic:
  id: critico
  title:
    es: Critico
    en: Critical Damping

formulas:
- id: condicion_critica
  title: { es: Condicion de amortiguamiento critico, en: Critical damping condition }
  equation: gamma = omega0
  latex: \gamma=\omega_0
  category: criterio_de_regimen
  relation_type: condicion_de_transicion
  physical_meaning:
    es: Establece la igualdad entre amortiguamiento efectivo y pulsación natural que separa respuesta oscilatoria de respuesta no oscilatoria.
    en: Sets equality between effective damping and natural pulsation, separating oscillatory from non-oscillatory response.
  constraints: [ gamma > 0, omega0 > 0 ]
  validity:
    es: Válida para modelos lineales de segundo orden con amortiguamiento viscoso equivalente.
    en: Valid for linear second-order models with equivalent viscous damping.
  dimension_check: "[T^-1] = [T^-1]"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[gamma]] y [[omega0]].", en: "Requires [[gamma]] and [[omega0]]." }
  used_in: [ solucion_critica ]
  interpretation_tags: [ critico, transicion_de_regimen, amortiguamiento ]
  result_semantics:
    target: gamma
  domain_checks: [ gamma > 0, omega0 > 0 ]
  coherence_checks: [ abs(gamma-omega0) <= 0.05*omega0 ]
  graph_implications: "Cuando [[gamma]] aproxima [[omega0]], la envolvente cambia de oscilatoria a monótona."
  pedagogical_triggers: [ clasificacion_de_regimen, frontera_dinamica ]
  rearrangements:
  - target: gamma
    equation: omega0
  - target: omega0
    equation: gamma
  variables: [ gamma, omega0 ]

- id: tiempo_caracteristico
  title: { es: Tiempo caracteristico critico, en: Critical characteristic time }
  equation: tau = 1/omega0
  latex: \tau=\frac{1}{\omega_0}
  category: escala_temporal
  relation_type: inversion
  physical_meaning:
    es: Define la escala temporal dominante de decaimiento de la respuesta crítica.
    en: Defines the dominant decay timescale of the critical response.
  constraints: [ omega0 > 0, tau > 0 ]
  validity:
    es: Válida cuando la dinámica puede representarse por un modo crítico dominante.
    en: Valid when dynamics can be represented by a dominant critical mode.
  dimension_check: "[T] = [T^-1]^-1"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[omega0]].", en: "Requires [[omega0]]." }
  used_in: [ solucion_critica ]
  interpretation_tags: [ tiempo_caracteristico, escala, decaimiento ]
  result_semantics:
    target: tau
  domain_checks: [ omega0 > 0 ]
  coherence_checks: [ tau > 0 ]
  graph_implications: "A mayor [[omega0]], menor [[tau]] y más rápido el asentamiento."
  pedagogical_triggers: [ lectura_temporal, comparacion_de_rapidez ]
  rearrangements:
  - target: tau
    equation: 1/omega0
  - target: omega0
    equation: 1/tau
  variables: [ tau, omega0 ]

- id: solucion_critica
  title: { es: Respuesta temporal en regimen critico, en: Time response in critical regime }
  equation: x = A*(1 + omega0*t)*exp(-omega0*t)
  latex: x=A(1+\omega_0 t)e^{-\omega_0 t}
  category: respuesta_temporal
  relation_type: solucion_del_modelo
  physical_meaning:
    es: Describe el desplazamiento crítico como producto de un término polinómico y una envolvente exponencial decreciente.
    en: Describes critical displacement as a polynomial term times a decaying exponential envelope.
  constraints: [ A >= 0, omega0 > 0, t >= 0 ]
  validity:
    es: Válida para sistemas lineales de segundo orden en régimen crítico con condiciones iniciales compatibles.
    en: Valid for linear second-order systems in the critical regime with compatible initial conditions.
  dimension_check: "[L] = [L]*(adimensional)*adimensional"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[A]], [[omega0]] y [[t]].", en: "Requires [[A]], [[omega0]], and [[t]]." }
  used_in: []
  interpretation_tags: [ respuesta_transitoria, asentamiento, envolvente ]
  result_semantics:
    target: x
  domain_checks: [ t >= 0, omega0 > 0 ]
  coherence_checks: [ abs(x) <= 2*A ]
  graph_implications: "La señal no oscila y converge al equilibrio sin sobrepaso significativo ideal."
  pedagogical_triggers: [ lectura_de_curva, comparacion_con_suby_sobre ]
  rearrangements:
  - target: x
    equation: A*(1 + omega0*t)*exp(-omega0*t)
  - target: A
    equation: x/((1 + omega0*t)*exp(-omega0*t))
  variables: [ x, A, omega0, t ]

ui:
  default_formula: solucion_critica
  groups:
  - title:
      es: Criterios y escalas
      en: Criteria and scales
    items: [ condicion_critica, tiempo_caracteristico ]
  - title:
      es: Respuesta temporal
      en: Time response
    items: [ solucion_critica ]
