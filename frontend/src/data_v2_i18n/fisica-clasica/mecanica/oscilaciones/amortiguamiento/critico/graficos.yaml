version: "1.0"
leaf: "critico"

coord:
  title:
    es: Gráfica Coord · Amortiguamiento Crítico
    en: Coord Graph · Critical Damping
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: elongación x(t) (m)
    en: displacement x(t) (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: x(t) = (A+Bt)·e^(−γt). γ = ω₀. Retorno más rápido sin oscilar.
    en: x(t) = (A+Bt)·e^(−γt). γ = ω₀. Fastest return without oscillation.
  physicalReading:
    es: Retorno al equilibrio sin oscilaciones. Más rápido que sobre- o sub-amortiguado.
    en: Return to equilibrium without oscillation. Faster than over- or under-damped.
  slopeMeaning:
    es: "dx/dt: velocidad."
    en: "dx/dt: velocity."
  interceptMeaning:
    es: x(0) = A.
    en: x(0) = A.
  curvatureMeaning:
    es: "Curvatura negativa: decaimiento más rápido que subamortiguado."
    en: "Negative curvature: faster decay than underdamped."
  signMeaning:
    es: x ≥ 0 (sin oscilación).
    en: x ≥ 0 (no oscillation).
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Amortiguamiento crítico (γ = ω₀).
    en: Critical damping (γ = ω₀).
  formulaConnection:
    es: x = (A+Bt)e^(−γt), γ = ω₀.
    en: x = (A+Bt)e^(−γt), γ = ω₀.
  readingFocus:
    es: verificar ausencia de oscilaciones y retorno rápido.
    en: verify absence of oscillations and fast return.
  agentHints:
    es:
      - γ = ω₀.
      - Sin oscilaciones.
      - Retorno más rápido.
    en:
      - γ = ω₀.
      - No oscillations.
      - Fastest return.
  commonMistakes:
    es:
      - γ < ω₀ (sub).
      - "γ > ω₀ (sobre)."
      - Oscila.
    en:
      - γ < ω₀ (under).
      - "γ > ω₀ (over)."
      - Oscillates.
