version: "1.0"
leaf: "sobreamortiguado"

coord:
  title:
    es: Gráfica Coord · Oscilador Sobreamortiguado
    en: Coord Graph · Overdamped Oscillator
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: elongación x(t) (m)
    en: displacement x(t) (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: "x(t) = A·e^(−γ₁t) + B·e^(−γ₂t). γ > ω₀. Retorno lento sin oscilación."
    en: "x(t) = A·e^(−γ₁t) + B·e^(−γ₂t). γ > ω₀. Slow return without oscillation."
  physicalReading:
    es: Retorno al equilibrio sin oscilar. Más lento que el crítico.
    en: Returns to equilibrium without oscillation. Slower than critical.
  slopeMeaning:
    es: "dx/dt: velocidad."
    en: "dx/dt: velocity."
  interceptMeaning:
    es: x(0) = A + B.
    en: x(0) = A + B.
  curvatureMeaning:
    es: "Dos exponenciales: decaimiento más lento que crítico."
    en: "Two exponentials: slower decay than critical."
  signMeaning:
    es: "x > 0 (sin cruce por cero)."
    en: "x > 0 (no zero crossing)."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "Sobreamortiguado (γ > ω₀)."
    en: "Overdamped (γ > ω₀)."
  formulaConnection:
    es: "x = Ae^(−γ₁t) + Be^(−γ₂t), γ > ω₀."
    en: "x = Ae^(−γ₁t) + Be^(−γ₂t), γ > ω₀."
  readingFocus:
    es: verificar retorno lento sin oscilaciones.
    en: verify slow return without oscillation.
  agentHints:
    es:
      - "γ > ω₀."
      - Sin oscilaciones.
      - Retorno más lento que crítico.
    en:
      - "γ > ω₀."
      - No oscillations.
      - Slower than critical.
  commonMistakes:
    es:
      - γ = ω₀ (crítico).
      - Oscila.
      - Más rápido que crítico.
    en:
      - γ = ω₀ (critical).
      - Oscillates.
      - Faster than critical.
