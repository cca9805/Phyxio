version: 5
topic:
  id: subamortiguado
  title: { es: Subamortiguado, en: Underdamped Regime }
formulas:
  - id: condicion_subamortiguado
    title: { es: Condicion de regimen subamortiguado, en: Underdamped regime condition }
    equation: gamma < omega0
    latex: \gamma<\omega_0
    category: criterio_de_regimen
    relation_type: desigualdad_de_clasificacion
    physical_meaning: { es: Indica que la disipacion permite oscilacion mientras reduce la amplitud., en: Indicates that dissipation still allows oscillation while reducing amplitude. }
    constraints: [gamma > 0, omega0 > 0]
    validity: { es: Valida para oscilador lineal libre con amortiguamiento viscoso., en: Valid for a free linear oscillator with viscous damping. }
    dimension_check: "[T^-1] < [T^-1]"
    calculable: false
    motivo_no_calculable: { es: "Es una desigualdad de clasificacion entre [[gamma]] y [[omega0]].", en: "It is a classification inequality between [[gamma]] and [[omega0]]." }
    used_in: [pulsacion_amortiguada]
    interpretation_tags: [regimen, subamortiguado, oscilatorio]
    result_semantics: clasificacion_de_regimen
    domain_checks: [gamma < omega0, gamma > 0]
    coherence_checks: [omega0 > gamma]
    graph_implications: "[[x]] debe mostrar cruces oscilatorios con amplitud decreciente."
    pedagogical_triggers: [comparacion_regimen, oscilacion_amortiguada]
    rearrangements:
      - target: gamma
        equation: omega0
      - target: omega0
        equation: gamma
    variables: [gamma, omega0]
  - id: pulsacion_amortiguada
    title: { es: Pulsacion amortiguada, en: Damped angular frequency }
    equation: omega_d = sqrt(omega0^2 - gamma^2)
    latex: \omega_d=\sqrt{\omega_0^2-\gamma^2}
    category: frecuencia
    relation_type: raiz_de_regimen
    physical_meaning: { es: Calcula el ritmo angular visible de la oscilacion amortiguada., en: Computes the visible angular rhythm of the damped oscillation. }
    constraints: [omega0 > gamma, gamma >= 0]
    validity: { es: Valida solo si el radicando es positivo., en: Valid only if the radicand is positive. }
    dimension_check: "[T^-1] = sqrt([T^-2]-[T^-2])"
    calculable: true
    motivo_no_calculable: { es: "Requiere [[omega0]] y [[gamma]] con [[omega0]] > [[gamma]].", en: "Requires [[omega0]] and [[gamma]] with [[omega0]] > [[gamma]]." }
    used_in: [solucion_subamortiguada]
    interpretation_tags: [ritmo, oscilacion, frecuencia_amortiguada]
    result_semantics: ritmo_oscilatorio
    domain_checks: [omega0 > gamma]
    coherence_checks: [omega_d > 0, omega_d < omega0]
    graph_implications: "[[omega_d]] determina la separacion entre ciclos."
    pedagogical_triggers: [frecuencia_visible, reduccion_por_amortiguamiento]
    rearrangements:
      - target: omega_d
        equation: sqrt(omega0^2 - gamma^2)
      - target: omega0
        equation: sqrt(omega_d^2 + gamma^2)
      - target: gamma
        equation: sqrt(omega0^2 - omega_d^2)
    variables: [omega_d, omega0, gamma]
  - id: envolvente
    title: { es: Envolvente exponencial, en: Exponential envelope }
    equation: x_env = A*exp(-gamma*t)
    latex: x_{env}=A e^{-\gamma t}
    category: amplitud
    relation_type: decaimiento_exponencial
    physical_meaning: { es: Da la cota de amplitud que encierra la oscilacion., en: Gives the amplitude bound enclosing the oscillation. }
    constraints: [A >= 0, gamma >= 0, t >= 0]
    validity: { es: Valida mientras el amortiguamiento sea lineal y constante., en: Valid while damping is linear and constant. }
    dimension_check: "[L] = [L]*1"
    calculable: true
    motivo_no_calculable: { es: "Requiere [[A]], [[gamma]] y [[t]].", en: "Requires [[A]], [[gamma]], and [[t]]." }
    used_in: [solucion_subamortiguada]
    interpretation_tags: [envolvente, amplitud, energia]
    result_semantics: amplitud_restante
    domain_checks: [t >= 0]
    coherence_checks: [x_env >= 0]
    graph_implications: "[[x]] debe quedar entre +[[x_env]] y -[[x_env]]."
    pedagogical_triggers: [decaimiento, amplitud_visible]
    rearrangements:
      - target: x_env
        equation: A*exp(-gamma*t)
      - target: A
        equation: x_env/exp(-gamma*t)
    variables: [x_env, A, gamma, t]
  - id: solucion_subamortiguada
    title: { es: Solucion temporal subamortiguada, en: Underdamped time solution }
    equation: x = A*exp(-gamma*t)*cos(omega_d*t + phi)
    latex: x=A e^{-\gamma t}\cos(\omega_d t+\varphi)
    category: respuesta_temporal
    relation_type: oscilacion_con_envolvente
    physical_meaning: { es: Describe una oscilacion que cruza el equilibrio mientras su amplitud decrece., en: Describes an oscillation that crosses equilibrium while its amplitude decays. }
    constraints: [A >= 0, gamma >= 0, omega_d > 0, t >= 0]
    validity: { es: Valida para respuesta libre subamortiguada con parametros constantes., en: Valid for underdamped free response with constant parameters. }
    dimension_check: "[L] = [L]*1*1"
    calculable: true
    motivo_no_calculable: { es: "Requiere [[A]], [[gamma]], [[omega_d]], [[t]] y [[phi]].", en: "Requires [[A]], [[gamma]], [[omega_d]], [[t]], and [[phi]]." }
    used_in: []
    interpretation_tags: [respuesta, oscilacion, envolvente]
    result_semantics: desplazamiento_temporal
    domain_checks: [t >= 0, omega_d > 0]
    coherence_checks: [x]
    graph_implications: "[[x]] oscila dentro de una envolvente decreciente."
    pedagogical_triggers: [fase, cruces, amplitud_decreciente]
    rearrangements:
      - target: x
        equation: A*exp(-gamma*t)*cos(omega_d*t + phi)
      - target: phi
        equation: arccos(x/(A*exp(-gamma*t))) - omega_d*t
    variables: [x, A, gamma, omega_d, t, phi]
ui:
  default_formula: solucion_subamortiguada
  groups:
    - title: { es: Clasificacion y ritmo, en: Classification and rhythm }
      items: [condicion_subamortiguado, pulsacion_amortiguada]
    - title: { es: Envolvente y respuesta, en: Envelope and response }
      items: [envolvente, solucion_subamortiguada]
