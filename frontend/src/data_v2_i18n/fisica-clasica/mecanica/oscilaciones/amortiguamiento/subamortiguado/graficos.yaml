version: "1.0"
leaf: "subamortiguado"

coord:
  title:
    es: Gráfica Coord · Oscilador Subamortiguado
    en: Coord Graph · Underdamped Oscillator
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: elongación x(t) (m)
    en: displacement x(t) (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: x(t) = A·e^(−γt)·cos(ω_d·t+φ). γ = b/(2m). ω_d = √(ω₀²−γ²). γ < ω₀.
    en: x(t) = A·e^(−γt)·cos(ω_d·t+φ). γ = b/(2m). ω_d = √(ω₀²−γ²). γ < ω₀.
  physicalReading:
    es: Amplitud decrece exponencialmente. Oscila con ω_d < ω₀.
    en: Amplitude decreases exponentially. Oscillates with ω_d < ω₀.
  slopeMeaning:
    es: dx/dt = velocidad con amortiguamiento.
    en: dx/dt = velocity with damping.
  interceptMeaning:
    es: x(0) = A·cos(φ).
    en: x(0) = A·cos(φ).
  curvatureMeaning:
    es: "Envolvente e^(−γt): tasa de decaimiento = γ."
    en: "Envelope e^(−γt): decay rate = γ."
  signMeaning:
    es: "A > 0: decae. γ > 0."
    en: "A > 0: decaying. γ > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Oscilador subamortiguado (γ < ω₀).
    en: Underdamped oscillator (γ < ω₀).
  formulaConnection:
    es: x = Ae^(−γt)cos(ω_d t+φ), ω_d = √(ω₀²−γ²).
    en: x = Ae^(−γt)cos(ω_d t+φ), ω_d = √(ω₀²−γ²).
  readingFocus:
    es: leer envolvente e^(−γt) y ω_d desde los cruces.
    en: read envelope e^(−γt) and ω_d from zero crossings.
  agentHints:
    es:
      - γ < ω₀.
      - Envolvente = e^(−γt).
      - ω_d < ω₀.
    en:
      - γ < ω₀.
      - Envelope = e^(−γt).
      - ω_d < ω₀.
  commonMistakes:
    es:
      - γ = ω₀ (crítico).
      - ω_d = ω₀.
      - Amplitud constante.
    en:
      - γ = ω₀ (critical).
      - ω_d = ω₀.
      - Constant amplitude.
