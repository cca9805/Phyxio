version: "1.0"
leaf: "fuerza-forzada"

coord:
  title:
    es: Gráfica Coord · Oscilador Forzado
    en: Coord Graph · Forced Oscillator
  xAxis:
    es: frecuencia de excitación ω_f (rad/s)
    en: driving frequency ω_f (rad/s)
  yAxis:
    es: amplitud estacionaria A (m)
    en: steady-state amplitude A (m)
  xMagnitude: omega
  yMagnitude: A
  relation:
    es: "A(ω_f) = F₀/m / √[(ω₀²−ω_f²)²+(2γω_f)²]. Máximo en resonancia ω_f ≈ ω₀."
    en: "A(ω_f) = F₀/m / √[(ω₀²−ω_f²)²+(2γω_f)²]. Maximum at resonance ω_f ≈ ω₀."
  physicalReading:
    es: Pico en ω_f = ω_res. A → ∞ si γ → 0.
    en: Peak at ω_f = ω_res. A → ∞ if γ → 0.
  slopeMeaning:
    es: "dA/dω_f: sensibilidad a la frecuencia."
    en: "dA/dω_f: frequency sensitivity."
  interceptMeaning:
    es: "A(0) = F₀/(mω₀²) = F₀/k: estático."
    en: "A(0) = F₀/(mω₀²) = F₀/k: static."
  curvatureMeaning:
    es: "Anchura del pico ∝ γ: mayor γ, pico más ancho."
    en: "Peak width ∝ γ: larger γ, broader peak."
  signMeaning:
    es: "A > 0."
    en: "A > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω_f ≥ 0.
    en: ω_f ≥ 0.
  modelConnection:
    es: Oscilador forzado.
    en: Forced oscillator.
  formulaConnection:
    es: "A = F₀/m / √[(ω₀²−ω_f²)²+(2γω_f)²]."
    en: "A = F₀/m / √[(ω₀²−ω_f²)²+(2γω_f)²]."
  readingFocus:
    es: leer ω_res y A_max del pico.
    en: read ω_res and A_max from the peak.
  agentHints:
    es:
      - Pico en ω_f ≈ ω₀.
      - "Mayor γ: pico más bajo y ancho."
      - A(0) = F₀/k.
    en:
      - Peak at ω_f ≈ ω₀.
      - "Higher γ: lower and broader peak."
      - A(0) = F₀/k.
  commonMistakes:
    es:
      - Pico exacto en ω₀.
      - A_max independiente de γ.
      - A(0) = 0.
    en:
      - Peak exactly at ω₀.
      - A_max independent of γ.
      - A(0) = 0.
