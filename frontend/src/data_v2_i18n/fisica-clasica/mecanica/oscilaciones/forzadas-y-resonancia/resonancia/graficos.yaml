version: "1.0"
leaf: "resonancia"

coord:
  title:
    es: Gráfica Coord · Resonancia en Oscilador Forzado
    en: Coord Graph · Resonance in Forced Oscillator
  xAxis:
    es: frecuencia de excitación ω_f (rad/s)
    en: driving frequency ω_f (rad/s)
  yAxis:
    es: amplitud A (m)
    en: amplitude A (m)
  xMagnitude: omega
  yMagnitude: A
  relation:
    es: "Resonancia: ω_f = ω_res = √(ω₀²−2γ²). A_max = F₀/(2mγω_d). Factor de calidad Q = ω₀/(2γ)."
    en: "Resonance: ω_f = ω_res = √(ω₀²−2γ²). A_max = F₀/(2mγω_d). Quality factor Q = ω₀/(2γ)."
  physicalReading:
    es: "Pico en ω_res ≈ ω₀. Q alto: pico estrecho y alto."
    en: "Peak at ω_res ≈ ω₀. High Q: narrow and tall peak."
  slopeMeaning:
    es: dA/dω_f = 0 en el pico.
    en: dA/dω_f = 0 at peak.
  interceptMeaning:
    es: "A(0) = F₀/k: deformación estática."
    en: "A(0) = F₀/k: static deformation."
  curvatureMeaning:
    es: "Anchura a media potencia = 2γ: ancho de banda."
    en: "Half-power width = 2γ: bandwidth."
  signMeaning:
    es: "A > 0."
    en: "A > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω_f ≥ 0.
    en: ω_f ≥ 0.
  modelConnection:
    es: Resonancia en oscilador forzado.
    en: Resonance in forced oscillator.
  formulaConnection:
    es: Q = ω₀/(2γ). A_max = F₀/(2mγω_d).
    en: Q = ω₀/(2γ). A_max = F₀/(2mγω_d).
  readingFocus:
    es: leer ω_res, A_max y Q desde el pico.
    en: read ω_res, A_max and Q from the peak.
  agentHints:
    es:
      - Q = ω₀/(2γ).
      - "Q alto: pico estrecho."
      - ω_res ≈ ω₀.
    en:
      - Q = ω₀/(2γ).
      - "High Q: narrow peak."
      - ω_res ≈ ω₀.
  commonMistakes:
    es:
      - ω_res = ω₀ exacto.
      - Q = ω₀.
      - A_max = F₀/k.
    en:
      - ω_res = ω₀ exactly.
      - Q = ω₀.
      - A_max = F₀/k.
