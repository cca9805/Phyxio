version: 5
magnitudes:
  - id: omega_r
    symbol: \omega_r
    nombre: { es: pulsacion de resonancia, en: resonance angular frequency }
    unidad_si: rad/s
    dimension: T^-1
    is_vector: false
    components: []
    category: frecuencia
    descripcion: { es: Frecuencia angular donde la amplitud estacionaria es maxima., en: Angular frequency at which steady amplitude is maximum. }
    physical_role: { es: localiza el pico de respuesta, en: locates the response peak }
    used_in: [frecuencia_resonancia, criterio_resonancia]
    common_mistake: { es: Igualarla siempre a la pulsacion natural sin mirar amortiguamiento., en: Always equating it with natural angular frequency without checking damping. }
    typical_range: { es: "positiva y cercana a [[omega0]] si el amortiguamiento es pequeno.", en: "positive and close to [[omega0]] when damping is small." }
    sign_behavior: { es: Solo tiene sentido positiva., en: Only positive values are meaningful. }
    zero_behavior: { es: Si no es real no hay pico resonante de desplazamiento., en: If it is not real there is no displacement resonance peak. }
    value_nature: { es: resultado del sistema forzado, en: forced-system result }
    interpretation_role: { es: indica donde buscar la maxima amplitud., en: indicates where to search for maximum amplitude. }
    graph_binding: { type: Coord, axis: x, curve_role: peak_position }
    pedagogical_notes: { es: Es la magnitud que separa fuerza forzada de resonancia., en: It separates forced oscillation from resonance. }
  - id: Q
    symbol: Q
    nombre: { es: factor de calidad, en: quality factor }
    unidad_si: "1"
    dimension: "1"
    is_vector: false
    components: []
    category: adimensional
    descripcion: { es: Mide la selectividad del pico resonante y su estrechez., en: Measures the selectivity and narrowness of the resonance peak. }
    physical_role: { es: resume cuanta energia se conserva por ciclo, en: summarizes how much energy is retained per cycle }
    used_in: [factor_calidad]
    common_mistake: { es: Creer que un Q grande siempre es deseable., en: Assuming a large Q is always desirable. }
    typical_range: { es: mayor que 1 en resonancias marcadas., en: greater than 1 for marked resonances. }
    sign_behavior: { es: Es positivo., en: It is positive. }
    zero_behavior: { es: Un valor cercano a cero implica respuesta no selectiva., en: A value near zero implies non-selective response. }
    value_nature: { es: parametro diagnostico, en: diagnostic parameter }
    interpretation_role: { es: estima anchura y peligrosidad del pico., en: estimates peak width and risk. }
    graph_binding: { type: Coord, axis: none, curve_role: sharpness }
    pedagogical_notes: { es: Ayuda a distinguir pico alto de pico ancho., en: Helps distinguish a high peak from a broad peak. }
  - id: X
    symbol: X
    nombre: { es: amplitud estacionaria, en: steady amplitude }
    unidad_si: m
    dimension: L
    is_vector: false
    components: []
    category: respuesta
    descripcion: { es: Amplitud de la respuesta permanente para una frecuencia de forzado., en: Permanent response amplitude for a forcing frequency. }
    physical_role: { es: muestra el tamano observable de la resonancia, en: shows the observable size of resonance }
    used_in: [amplitud_respuesta, criterio_resonancia]
    common_mistake: { es: Interpretar un punto grande sin comparar la curva completa., en: Interpreting one large point without comparing the full curve. }
    typical_range: { es: no negativa y limitada por amortiguamiento y linealidad., en: non-negative and limited by damping and linearity. }
    sign_behavior: { es: Como amplitud no lleva signo., en: As an amplitude it has no sign. }
    zero_behavior: { es: Cero implica ausencia de respuesta medible., en: Zero means no measurable response. }
    value_nature: { es: magnitud observable, en: observable quantity }
    interpretation_role: { es: determina si el pico es tolerable., en: determines whether the peak is tolerable. }
    graph_binding: { type: Coord, axis: y, curve_role: response_height }
    pedagogical_notes: { es: "Debe leerse junto con [[omega_f]] y [[b]].", en: "Must be read with [[omega_f]] and [[b]]." }
  - id: b
    symbol: b
    nombre: { es: coeficiente de amortiguamiento, en: damping coefficient }
    unidad_si: N*s/m
    dimension: M*T^-1
    is_vector: false
    components: []
    category: parametro
    descripcion: { es: Parametro disipativo que reduce y ensancha el pico resonante., en: Dissipative parameter that lowers and broadens the resonance peak. }
    physical_role: { es: limita la acumulacion de energia, en: limits energy accumulation }
    used_in: [amplitud_respuesta, frecuencia_resonancia, factor_calidad]
    common_mistake: { es: Olvidarlo al estimar el maximo de respuesta., en: Forgetting it when estimating the response maximum. }
    typical_range: { es: no negativo en modelos pasivos., en: non-negative in passive models. }
    sign_behavior: { es: Si fuera negativo inyectaria energia., en: If negative it would inject energy. }
    zero_behavior: { es: Sin amortiguamiento ideal el pico lineal diverge., en: With ideal zero damping the linear peak diverges. }
    value_nature: { es: parametro del sistema, en: system parameter }
    interpretation_role: { es: controla altura y anchura del pico., en: controls peak height and width. }
    graph_binding: { type: Coord, axis: parameter, curve_role: damping }
    pedagogical_notes: { es: Es la clave para decidir si la resonancia es peligrosa., en: It is key to deciding whether resonance is dangerous. }
  - id: omega0
    symbol: \omega_0
    nombre: { es: pulsacion natural, en: natural angular frequency }
    unidad_si: rad/s
    dimension: T^-1
    is_vector: false
    components: []
    category: frecuencia
    descripcion: { es: Frecuencia angular propia del sistema sin forzado ni disipacion fuerte., en: System angular frequency without forcing or strong dissipation. }
    physical_role: { es: referencia interna del sistema, en: internal reference of the system }
    used_in: [factor_calidad, criterio_resonancia]
    common_mistake: { es: Confundirla con el maximo real si hay amortiguamiento., en: Confusing it with the actual maximum when damping exists. }
    typical_range: { es: positiva para sistemas estables., en: positive for stable systems. }
    sign_behavior: { es: Se usa positiva., en: It is used as positive. }
    zero_behavior: { es: Cero elimina la escala oscilatoria., en: Zero removes the oscillatory scale. }
    value_nature: { es: propiedad del sistema, en: system property }
    interpretation_role: { es: da la escala alrededor de la que se busca resonancia., en: gives the scale around which resonance is sought. }
    graph_binding: { type: Coord, axis: x, curve_role: reference_frequency }
    pedagogical_notes: { es: "No basta para localizar el pico si [[b]] no es pequeno.", en: "It is not enough to locate the peak if [[b]] is not small." }
  - id: omega_f
    symbol: \omega_f
    nombre: { es: pulsacion de forzado, en: forcing angular frequency }
    unidad_si: rad/s
    dimension: T^-1
    is_vector: false
    components: []
    category: entrada
    descripcion: { es: Frecuencia angular impuesta por la fuente externa., en: Angular frequency imposed by the external source. }
    physical_role: { es: variable barrida para encontrar el pico, en: swept variable used to find the peak }
    used_in: [amplitud_respuesta, criterio_resonancia]
    common_mistake: { es: Analizar solo un valor y declarar resonancia sin barrido., en: Analyzing one value and declaring resonance without a sweep. }
    typical_range: { es: positiva y elegida por la excitacion., en: positive and chosen by the excitation. }
    sign_behavior: { es: Se toma positiva., en: It is taken as positive. }
    zero_behavior: { es: En cero se obtiene respuesta estatica, no resonancia dinamica., en: At zero the response is static, not dynamic resonance. }
    value_nature: { es: variable de control, en: control variable }
    interpretation_role: { es: permite recorrer la curva de amplitud., en: allows scanning the amplitude curve. }
    graph_binding: { type: Coord, axis: x, curve_role: sweep }
    pedagogical_notes: { es: "La resonancia se detecta comparando varios valores de [[omega_f]].", en: "Resonance is detected by comparing several [[omega_f]] values." }
  - id: m
    symbol: m
    nombre: { es: masa, en: mass }
    unidad_si: kg
    dimension: M
    is_vector: false
    components: []
    category: parametro
    descripcion: { es: Inercia efectiva del oscilador., en: Effective inertia of the oscillator. }
    physical_role: { es: desplaza la escala de frecuencia, en: shifts the frequency scale }
    used_in: [amplitud_respuesta, frecuencia_resonancia, factor_calidad]
    common_mistake: { es: Tratarla como irrelevante cerca del pico., en: Treating it as irrelevant near the peak. }
    typical_range: { es: positiva., en: positive. }
    sign_behavior: { es: No admite valores negativos., en: Negative values are not allowed. }
    zero_behavior: { es: Masa nula invalida el modelo oscilatorio., en: Zero mass invalidates the oscillator model. }
    value_nature: { es: parametro del sistema, en: system parameter }
    interpretation_role: { es: compara inercia con rigidez y amortiguamiento., en: compares inertia with stiffness and damping. }
    graph_binding: { type: Coord, axis: parameter, curve_role: inertia }
    pedagogical_notes: { es: "Entra tanto en posicion del pico como en [[Q]].", en: "It enters both peak position and [[Q]]." }
  - id: k
    symbol: k
    nombre: { es: constante elastica, en: spring constant }
    unidad_si: N/m
    dimension: M*T^-2
    is_vector: false
    components: []
    category: parametro
    descripcion: { es: Rigidez que fija la escala natural de oscilacion., en: Stiffness setting the natural oscillation scale. }
    physical_role: { es: aporta recuperacion elastica, en: provides elastic restoring action }
    used_in: [amplitud_respuesta, frecuencia_resonancia]
    common_mistake: { es: Aumentarla sin comprobar como cambia la frecuencia critica., en: Increasing it without checking how the critical frequency changes. }
    typical_range: { es: positiva., en: positive. }
    sign_behavior: { es: Valores negativos serian inestables., en: Negative values would be unstable. }
    zero_behavior: { es: Sin rigidez no hay resonancia elastica usual., en: Without stiffness there is no usual elastic resonance. }
    value_nature: { es: parametro del sistema, en: system parameter }
    interpretation_role: { es: "fija junto a [[m]] la escala de [[omega0]].", en: "sets with [[m]] the scale of [[omega0]]." }
    graph_binding: { type: Coord, axis: parameter, curve_role: stiffness }
    pedagogical_notes: { es: "Cambiar [[k]] puede alejar o acercar el pico a la excitacion.", en: "Changing [[k]] can move the peak away from or toward the excitation." }
  - id: F0
    symbol: F_0
    nombre: { es: amplitud de fuerza externa, en: external force amplitude }
    unidad_si: N
    dimension: M*L*T^-2
    is_vector: false
    components: []
    category: entrada
    descripcion: { es: Escala de la fuerza periodica que alimenta la respuesta., en: Scale of the periodic force feeding the response. }
    physical_role: { es: escala verticalmente la amplitud, en: vertically scales the amplitude }
    used_in: [amplitud_respuesta]
    common_mistake: { es: Creer que cambia la posicion del pico en un modelo lineal., en: Believing it changes peak position in a linear model. }
    typical_range: { es: no negativa en amplitud., en: non-negative as an amplitude. }
    sign_behavior: { es: Como amplitud se toma positiva., en: As an amplitude it is taken positive. }
    zero_behavior: { es: Si vale cero no hay respuesta forzada., en: If zero there is no forced response. }
    value_nature: { es: entrada externa, en: external input }
    interpretation_role: { es: "determina la escala de [[X]], no la frecuencia del pico.", en: "determines the scale of [[X]], not the peak frequency." }
    graph_binding: { type: Coord, axis: parameter, curve_role: forcing_scale }
    pedagogical_notes: { es: "Aumentar [[F0]] no prueba que haya resonancia.", en: "Increasing [[F0]] does not prove resonance." }
