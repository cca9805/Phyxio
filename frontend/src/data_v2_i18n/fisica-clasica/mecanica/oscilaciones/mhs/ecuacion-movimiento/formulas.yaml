version: 5
topic:
  id: ecuacion-movimiento
  title:
    es: Ecuacion de movimiento en MHS
    en: Equation of motion in SHM

formulas:
- id: posicion_mhs
  title: { es: Posicion en funcion del tiempo, en: Position as a function of time }
  equation: x = A*cos(omega*t + phi)
  latex: x=A\cos(\omega t+\varphi)
  category: cinematica_armonica
  relation_type: funcion_temporal
  physical_meaning:
    es: Describe la evolucion de [[x]] en oscilacion armonica ideal.
    en: Describes evolution of [[x]] in ideal harmonic oscillation.
  constraints: [ A >= 0, omega > 0 ]
  validity:
    es: Valida para oscilador lineal ideal sin disipacion dominante.
    en: Valid for ideal linear oscillator without dominant dissipation.
  dimension_check: "[L] = [L]*adimensional"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[A]], [[omega]], [[phi]], [[t]].", en: "Requires [[A]], [[omega]], [[phi]], [[t]]." }
  used_in: [ velocidad_mhs, aceleracion_mhs ]
  interpretation_tags: [ oscilacion, estado, fase ]
  result_semantics:
    target: x
  domain_checks: [ omega > 0 ]
  coherence_checks: [ x <= A + 1e-9, -x <= A + 1e-9 ]
  graph_implications: "La grafica de [[x]] es periodica y acotada por [[A]]."
  pedagogical_triggers: [ lectura_de_fase, relacion_estado_tiempo ]
  rearrangements:
  - target: x
    equation: A*cos(omega*t + phi)
  variables: [ x, A, omega, phi, t ]

- id: velocidad_mhs
  title: { es: Velocidad en MHS, en: Velocity in SHM }
  equation: v = -A*omega*sin(omega*t + phi)
  latex: v=-A\omega\sin(\omega t+\varphi)
  category: cinematica_armonica
  relation_type: derivada_temporal
  physical_meaning:
    es: Expresa la derivada temporal de [[x]] en MHS.
    en: Expresses time derivative of [[x]] in SHM.
  constraints: [ A >= 0, omega > 0 ]
  validity:
    es: Valida bajo hipotesis de oscilador lineal ideal.
    en: Valid under ideal linear oscillator assumptions.
  dimension_check: "[L T^-1] = [L]*[T^-1]"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[A]], [[omega]], [[phi]], [[t]].", en: "Requires [[A]], [[omega]], [[phi]], [[t]]." }
  used_in: [ posicion_mhs ]
  interpretation_tags: [ tasa_de_cambio, energia_cinetica ]
  result_semantics:
    target: v
  domain_checks: [ omega > 0 ]
  coherence_checks: [ v <= A*omega + 1e-9, -v <= A*omega + 1e-9 ]
  graph_implications: "[[v]] se adelanta en fase respecto de [[x]] en un cuarto de ciclo."
  pedagogical_triggers: [ fase_relativa, derivacion_fisica ]
  rearrangements:
  - target: v
    equation: -A*omega*sin(omega*t + phi)
  variables: [ v, A, omega, phi, t ]

- id: aceleracion_mhs
  title: { es: Aceleracion restauradora, en: Restoring acceleration }
  equation: a = -omega^2*x
  latex: a=-\omega^2x
  category: dinamica_lineal
  relation_type: proporcionalidad_con_signo
  physical_meaning:
    es: Relaciona [[a]] con [[x]] y muestra caracter restaurador del MHS.
    en: Relates [[a]] to [[x]] and shows restoring behavior in SHM.
  constraints: [ omega > 0 ]
  validity:
    es: Valida para fuerza restauradora lineal alrededor del equilibrio.
    en: Valid for linear restoring force around equilibrium.
  dimension_check: "[L T^-2] = [T^-2]*[L]"
  calculable: true
  motivo_no_calculable: { es: "Requiere [[omega]] y [[x]].", en: "Requires [[omega]] and [[x]]." }
  used_in: [ ecuacion_diferencial_mhs ]
  interpretation_tags: [ restauracion, curvatura_temporal ]
  result_semantics:
    target: a
  domain_checks: [ omega > 0 ]
  coherence_checks: [ (a*x) <= 0 ]
  graph_implications: "Cuando [[x]] cambia de signo, [[a]] tambien cambia de signo de forma opuesta."
  pedagogical_triggers: [ lectura_de_signo, estabilidad ]
  rearrangements:
  - target: a
    equation: -omega^2*x
  - target: x
    equation: -a/(omega^2)
  - target: omega
    equation: sqrt((-a)/x)
  variables: [ a, x, omega ]

- id: ecuacion_diferencial_mhs
  title: { es: Ecuacion diferencial del MHS, en: Differential equation of SHM }
  equation: x_dd + omega^2*x = 0
  latex: x_dd+\omega^2x=0
  category: modelo_dinamico
  relation_type: ecuacion_diferencial_lineal
  physical_meaning:
    es: Expresa el balance dinamico de un oscilador armonico lineal no amortiguado.
    en: Expresses dynamic balance of an undamped linear harmonic oscillator.
  constraints: [ omega > 0 ]
  validity:
    es: Valida para desplazamientos en region lineal y parametros constantes.
    en: Valid for displacements in linear region with constant parameters.
  dimension_check: "[L T^-2] + [T^-2]*[L] = 0"
  calculable: false
  motivo_no_calculable: { es: "Requiere condiciones iniciales para determinar una trayectoria unica.", en: "Requires initial conditions to determine a unique trajectory." }
  used_in: [ posicion_mhs, velocidad_mhs, aceleracion_mhs ]
  interpretation_tags: [ modelo, linealidad, solucion_general ]
  result_semantics:
    target: x_dd
  domain_checks: [ omega > 0 ]
  coherence_checks: [ omega > 0 ]
  graph_implications: "La solucion proyecta oscilaciones periodicas en [[x]] y derivadas acotadas."
  pedagogical_triggers: [ conexion_modelo_solucion, ecuacion_y_observable ]
  rearrangements:
  - target: x_dd
    equation: -omega^2*x
  variables: [ x_dd, x, omega ]

ui:
  default_formula: posicion_mhs
  groups:
  - title:
      es: Cinematica
      en: Kinematics
    items: [ posicion_mhs, velocidad_mhs, aceleracion_mhs ]
  - title:
      es: Modelo base
      en: Base model
    items: [ ecuacion_diferencial_mhs ]
