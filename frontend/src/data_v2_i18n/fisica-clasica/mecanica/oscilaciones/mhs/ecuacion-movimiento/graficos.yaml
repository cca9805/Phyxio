version: "1.0"
leaf: "ecuacion-movimiento"

coord:
  title:
    es: Gráfica Coord · Ecuación de Movimiento (MHS)
    en: Coord Graph · Equation of Motion (SHM)
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: elongación x(t) (m)
    en: displacement x(t) (m)
  xMagnitude: t
  yMagnitude: x
  relation:
    es: x(t) = A·cos(ωt + φ). ω² = k/m. Solución de mèx + kx = 0.
    en: x(t) = A·cos(ωt + φ). ω² = k/m. Solution of mèx + kx = 0.
  physicalReading:
    es: "A: amplitud. ω: frecuencia angular. φ: fase inicial."
    en: "A: amplitude. ω: angular frequency. φ: initial phase."
  slopeMeaning:
    es: "dx/dt = v(t): velocidad instantánea."
    en: "dx/dt = v(t): instantaneous velocity."
  interceptMeaning:
    es: "x(0) = A·cos(φ): posición inicial."
    en: "x(0) = A·cos(φ): initial position."
  curvatureMeaning:
    es: "d²x/dt² = −ω²x: aceleración proporcional y opuesta a x."
    en: "d²x/dt² = −ω²x: acceleration proportional and opposite to x."
  signMeaning:
    es: "x > 0: elongación positiva. x < 0: negativa."
    en: "x > 0: positive displacement. x < 0: negative."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "MHS: ecuación de movimiento."
    en: "SHM: equation of motion."
  formulaConnection:
    es: x(t) = A·cos(ωt+φ), ω = √(k/m).
    en: x(t) = A·cos(ωt+φ), ω = √(k/m).
  readingFocus:
    es: leer A, T = 2π/ω y φ desde la gráfica.
    en: read A, T = 2π/ω and φ from the graph.
  agentHints:
    es:
      - A = máximo de x.
      - T = 2π/ω.
      - ω² = k/m.
    en:
      - A = maximum x.
      - T = 2π/ω.
      - ω² = k/m.
  commonMistakes:
    es:
      - ω = f.
      - A depende de ω.
      - Confundir T y ω.
    en:
      - ω = f.
      - A depends on ω.
      - Confusing T and ω.
