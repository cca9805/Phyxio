version: 2
id: interpretacion-ecuacion-movimiento
leaf_id: ecuacion-movimiento
nombre:
  es: Interpretacion de ecuacion de movimiento en MHS
  en: Interpretation of SHM equation of motion
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: oscilaciones
  parent_id: mhs
  ruta_relativa: fisica-clasica/mecanica/oscilaciones/mhs/ecuacion-movimiento
dependencies:
  formulas: [ posicion_mhs, velocidad_mhs, aceleracion_mhs, ecuacion_diferencial_mhs ]
  magnitudes: [ x, A, omega, phi, t, v, a, x_dd ]
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title: { es: Resumen fisico, en: Physical summary }
  physical_reading:
    title: { es: Lectura causal, en: Causal reading }
  coherence:
    title: { es: Coherencia del resultado, en: Result coherence }
  model_validity:
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    title: { es: Lectura grafica, en: Graph reading }
  likely_errors:
    title: { es: Errores probables, en: Likely errors }
  next_step:
    title: { es: Siguiente decision, en: Next decision }

targets:
  x:
    summary_rules:
    - id: x_summary
      when: "true"
      status: info
      text: { es: "[[x]] representa el estado oscilatorio respecto al equilibrio.", en: "[[x]] represents oscillatory state relative to equilibrium." }
    physical_reading_rules:
    - id: x_phys
      when: "true"
      status: info
      text: { es: "Su evolucion depende de [[A]], [[omega]], [[phi]] y [[t]] mediante la ley de posicion.", en: "Its evolution depends on [[A]], [[omega]], [[phi]], and [[t]] through the position law." }
    coherence_rules:
    - id: x_coh
      when: "true"
      status: ok
      text: { es: "Debe ser coherente con {{ f:posicion_mhs }} y con amplitud acotada por [[A]].", en: "It must be coherent with {{ f:posicion_mhs }} and remain bounded by [[A]]." }
    model_validity_rules:
    - id: x_valid
      when: "true"
      status: ok
      text: { es: "Valido en oscilador lineal ideal sin perdidas dominantes.", en: "Valid for ideal linear oscillator without dominant losses." }
    graph_rules:
    - id: x_graph
      when: "true"
      status: info
      text: { es: "En la grafica Coord, [[x]] debe verse periodica y centrada en equilibrio.", en: "In the Coord graph, [[x]] should appear periodic and centered around equilibrium." }
    likely_errors:
    - id: x_err
      when: "true"
      status: warning
      text: { es: "Error comun: confundir desplazamiento con distancia recorrida total.", en: "Common error: confusing displacement with total traveled distance." }
    next_step_rules:
    - id: x_next
      when: "true"
      status: tip
      text: { es: "Comparar con [[v]] y [[a]] para cerrar lectura dinamica completa.", en: "Compare with [[v]] and [[a]] to complete the dynamic reading." }

  v:
    summary_rules:
    - id: v_summary
      when: "true"
      status: info
      text: { es: "[[v]] expresa tasa de cambio instantanea de [[x]].", en: "[[v]] expresses instantaneous rate of change of [[x]]." }
    physical_reading_rules:
    - id: v_phys
      when: "true"
      status: info
      text: { es: "Su valor esta en cuadratura temporal con [[x]], segun {{ f:velocidad_mhs }}.", en: "Its value is in temporal quadrature with [[x]], according to {{ f:velocidad_mhs }}." }
    coherence_rules:
    - id: v_coh
      when: "true"
      status: ok
      text: { es: "Debe acotarse por el producto de escala entre [[A]] y [[omega]].", en: "It should remain bounded by the scale product of [[A]] and [[omega]]." }
    model_validity_rules:
    - id: v_valid
      when: "true"
      status: ok
      text: { es: "Interpretacion robusta cuando parametros son constantes en la ventana temporal.", en: "Interpretation is robust when parameters stay constant within the time window." }
    graph_rules:
    - id: v_graph
      when: "true"
      status: info
      text: { es: "[[v]] cambia de signo al pasar por extremos de [[x]].", en: "[[v]] changes sign at turning points of [[x]]." }
    likely_errors:
    - id: v_err
      when: "true"
      status: warning
      text: { es: "Error comun: ubicar maxima [[v]] en la misma fase que maxima [[x]].", en: "Common error: placing maximum [[v]] at the same phase as maximum [[x]]." }
    next_step_rules:
    - id: v_next
      when: "true"
      status: tip
      text: { es: "Combinar con [[a]] para analizar estabilidad local y retorno.", en: "Combine with [[a]] to analyze local stability and restoring behavior." }

  a:
    summary_rules:
    - id: a_summary
      when: "true"
      status: info
      text: { es: "[[a]] refleja curvatura temporal y tendencia restauradora.", en: "[[a]] reflects temporal curvature and restoring tendency." }
    physical_reading_rules:
    - id: a_phys
      when: "true"
      status: info
      text: { es: "Por {{ f:aceleracion_mhs }}, [[a]] es opuesta a [[x]] en MHS ideal.", en: "By {{ f:aceleracion_mhs }}, [[a]] is opposite to [[x]] in ideal SHM." }
    coherence_rules:
    - id: a_coh
      when: "true"
      status: ok
      text: { es: "El producto [[a]] por [[x]] debe mantener signo no positivo en lectura ideal.", en: "The product [[a]] by [[x]] should keep a non-positive sign in ideal reading." }
    model_validity_rules:
    - id: a_valid
      when: "true"
      status: ok
      text: { es: "Valido para fuerza restauradora lineal y amplitudes dentro de region elastica.", en: "Valid for linear restoring force and amplitudes within elastic range." }
    graph_rules:
    - id: a_graph
      when: "true"
      status: info
      text: { es: "[[a]] se anula cerca del equilibrio y crece en extremos de [[x]].", en: "[[a]] is near zero around equilibrium and grows near extremes of [[x]]." }
    likely_errors:
    - id: a_err
      when: "true"
      status: warning
      text: { es: "Error comun: interpretar [[a]] como independiente de [[x]].", en: "Common error: interpreting [[a]] as independent of [[x]]." }
    next_step_rules:
    - id: a_next
      when: "true"
      status: tip
      text: { es: "Usar [[a]] para validar coherencia dinamica con el modelo diferencial.", en: "Use [[a]] to validate dynamic coherence with the differential model." }

  omega:
    summary_rules:
    - id: omega_summary
      when: "true"
      status: info
      text: { es: "[[omega]] fija la escala temporal principal del ciclo.", en: "[[omega]] sets the main time scale of the cycle." }
    physical_reading_rules:
    - id: omega_phys
      when: "true"
      status: info
      text: { es: "A mayor [[omega]], mayor rapidez de variacion de estado para [[x]], [[v]] y [[a]].", en: "Larger [[omega]] means faster state variation for [[x]], [[v]], and [[a]]." }
    coherence_rules:
    - id: omega_coh
      when: "true"
      status: ok
      text: { es: "La inferencia de [[omega]] debe ser compatible con {{ f:aceleracion_mhs }} y unidades de tiempo inverso.", en: "Inference of [[omega]] must be compatible with {{ f:aceleracion_mhs }} and inverse-time units." }
    model_validity_rules:
    - id: omega_valid
      when: "true"
      status: ok
      text: { es: "Interpretacion estable cuando el sistema permanece en regime lineal y parametros constantes.", en: "Interpretation is stable when the system remains linear with constant parameters." }
    graph_rules:
    - id: omega_graph
      when: "true"
      status: info
      text: { es: "Cambios de [[omega]] comprimen o expanden el eje temporal del patron oscilatorio.", en: "Changes in [[omega]] compress or expand the oscillatory pattern along time axis." }
    likely_errors:
    - id: omega_err
      when: "true"
      status: warning
      text: { es: "Error comun: comparar [[omega]] con frecuencia en Hz sin conversion.", en: "Common error: comparing [[omega]] with frequency in Hz without conversion." }
    next_step_rules:
    - id: omega_next
      when: "true"
      status: tip
      text: { es: "Tras estimar [[omega]], revisar consistencia de fase inicial [[phi]] y amplitud [[A]].", en: "After estimating [[omega]], check consistency of initial phase [[phi]] and amplitude [[A]]." }

  x_dd:
    summary_rules:
    - id: xdd_summary
      when: "true"
      status: info
      text: { es: "[[x_dd]] conecta representacion diferencial y lectura fisica de [[a]].", en: "[[x_dd]] links differential representation with physical reading of [[a]]." }
    physical_reading_rules:
    - id: xdd_phys
      when: "true"
      status: info
      text: { es: "En este leaf, [[x_dd]] coincide semanticamente con [[a]] para interpretar restauracion.", en: "In this leaf, [[x_dd]] is semantically equivalent to [[a]] for restoring interpretation." }
    coherence_rules:
    - id: xdd_coh
      when: "true"
      status: ok
      text: { es: "Debe alinearse con {{ f:ecuacion_diferencial_mhs }} en forma y unidades.", en: "It must align with {{ f:ecuacion_diferencial_mhs }} in form and units." }
    model_validity_rules:
    - id: xdd_valid
      when: "true"
      status: ok
      text: { es: "Valido cuando derivadas temporales son interpretables en medicion o simulacion.", en: "Valid when time derivatives are interpretable in measurement or simulation." }
    graph_rules:
    - id: xdd_graph
      when: "true"
      status: info
      text: { es: "La curvatura de [[x]] observada en el grafico respalda lectura de [[x_dd]].", en: "Observed curvature of [[x]] in the graph supports reading of [[x_dd]]." }
    likely_errors:
    - id: xdd_err
      when: "true"
      status: warning
      text: { es: "Error comun: tratar [[x_dd]] como variable independiente de [[x]] y [[omega]].", en: "Common error: treating [[x_dd]] as independent from [[x]] and [[omega]]." }
    next_step_rules:
    - id: xdd_next
      when: "true"
      status: tip
      text: { es: "Usar [[x_dd]] para enlazar ecuacion diferencial con criterio experimental.", en: "Use [[x_dd]] to connect differential equation with experimental criteria." }
