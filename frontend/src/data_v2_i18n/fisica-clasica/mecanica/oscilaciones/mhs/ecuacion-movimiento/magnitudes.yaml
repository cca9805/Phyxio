version: 5
magnitudes:
- id: x
  symbol: x
  nombre: { es: Desplazamiento, en: Displacement }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: estado
  physical_role: variable_de_estado
  used_in: [ posicion_mhs, aceleracion_mhs, ecuacion_diferencial_mhs ]
  common_mistake: Confundir desplazamiento con distancia recorrida.
  typical_range: [ -2, 2 ]
  sign_behavior: depende_de_referencia
  zero_behavior: equilibrio
  value_nature: estado
  interpretation_role: salida_principal
  graph_binding: "[[x]] define la forma de la oscilacion alrededor del equilibrio."
  descripcion:
    es: "Posicion instantanea respecto de la posicion de equilibrio."
    en: "Instantaneous position measured from equilibrium."
  pedagogical_notes:
    es: "No toda posicion maxima implica cambio de energia total."
    en: "A maximum position does not by itself imply energy loss or gain."

- id: A
  symbol: A
  nombre: { es: Amplitud, en: Amplitude }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: condicion_inicial
  physical_role: escala_de_oscilacion
  used_in: [ posicion_mhs, velocidad_mhs ]
  common_mistake: Tratarla como parametro universal del sistema.
  typical_range: [ 0.01, 2 ]
  sign_behavior: no_negativa_en_magnitud
  zero_behavior: sin_oscilacion
  value_nature: parametro
  interpretation_role: fija_escala
  graph_binding: "[[A]] escala la excursion maxima de [[x]] sin cambiar periodo."
  descripcion:
    es: "Distancia maxima al equilibrio en la oscilacion ideal."
    en: "Maximum distance from equilibrium in ideal oscillation."
  pedagogical_notes:
    es: "En MHS ideal, [[A]] permanece constante si no hay disipacion."
    en: "In ideal SHM, [[A]] remains constant if dissipation is negligible."

- id: omega
  symbol: \omega
  nombre: { es: Pulsacion angular, en: Angular frequency }
  si_unit: rad/s
  unidad_si: rad/s
  dimension: T^-1
  is_vector: false
  components: []
  category: parametro_dinamico
  physical_role: escala_temporal
  used_in: [ posicion_mhs, velocidad_mhs, aceleracion_mhs, ecuacion_diferencial_mhs ]
  common_mistake: Mezclar radianes por segundo con hercios sin conversion.
  typical_range: [ 0.5, 80 ]
  sign_behavior: positiva
  zero_behavior: no_hay_osc_ilacion
  value_nature: parametro
  interpretation_role: controla_rapidez_de_fase
  graph_binding: "[[omega]] controla rapidez de variacion de [[x]] en el tiempo."
  descripcion:
    es: "Frecuencia angular asociada al movimiento armonico simple."
    en: "Angular frequency associated with simple harmonic motion."
  pedagogical_notes:
    es: "Mayor [[omega]] implica periodo menor."
    en: "Higher [[omega]] implies shorter period."

- id: phi
  symbol: \varphi
  nombre: { es: Fase inicial, en: Initial phase }
  si_unit: rad
  unidad_si: rad
  dimension: adimensional
  is_vector: false
  components: []
  category: condicion_inicial
  physical_role: desplazamiento_de_fase
  used_in: [ posicion_mhs, velocidad_mhs ]
  common_mistake: Interpretarla como angulo geometrico fijo del sistema.
  typical_range: [ -3.1416, 3.1416 ]
  sign_behavior: puede_ser_positiva_o_negativa
  zero_behavior: referencia_de_inicio
  value_nature: parametro
  interpretation_role: ubica_estado_inicial
  graph_binding: "[[phi]] desplaza la oscilacion sobre el eje temporal."
  descripcion:
    es: "Fase en el instante inicial que fija el punto de partida de la oscilacion."
    en: "Initial phase that fixes the oscillation starting point."
  pedagogical_notes:
    es: "Cambiar [[phi]] no altera amplitud ni periodo."
    en: "Changing [[phi]] does not alter amplitude or period."

- id: t
  symbol: t
  nombre: { es: Tiempo, en: Time }
  si_unit: s
  unidad_si: s
  dimension: T
  is_vector: false
  components: []
  category: variable_independiente
  physical_role: eje_temporal
  used_in: [ posicion_mhs, velocidad_mhs ]
  common_mistake: Mezclar segundos con milisegundos sin normalizar.
  typical_range: [ 0, 60 ]
  sign_behavior: no_negativo_en_simulacion
  zero_behavior: instante_inicial
  value_nature: independiente
  interpretation_role: ordena_evolucion
  graph_binding: "[[t]] organiza la lectura de ciclo, fase y derivadas."
  descripcion:
    es: "Variable independiente sobre la cual evoluciona el estado oscilatorio."
    en: "Independent variable over which oscillatory state evolves."
  pedagogical_notes:
    es: "Elegir ventana temporal adecuada evita diagnosticos sesgados."
    en: "Choosing an adequate time window prevents biased diagnostics."

- id: v
  symbol: v
  nombre: { es: Velocidad, en: Velocity }
  si_unit: m/s
  unidad_si: m/s
  dimension: L T^-1
  is_vector: false
  components: []
  category: estado_derivado
  physical_role: tasa_de_cambio
  used_in: [ velocidad_mhs ]
  common_mistake: Asumir que maxima velocidad coincide con maxima posicion.
  typical_range: [ -20, 20 ]
  sign_behavior: depende_de_sentido
  zero_behavior: cambio_de_sentido
  value_nature: estado
  interpretation_role: describe_intercambio_cinetico
  graph_binding: "[[v]] cambia de signo en los extremos de [[x]]."
  descripcion:
    es: "Derivada temporal de [[x]] en el movimiento armonico simple."
    en: "Time derivative of [[x]] in simple harmonic motion."
  pedagogical_notes:
    es: "En equilibrio, [[v]] suele alcanzar magnitud alta."
    en: "Near equilibrium, [[v]] usually reaches high magnitude."

- id: a
  symbol: a
  nombre: { es: Aceleracion, en: Acceleration }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L T^-2
  is_vector: false
  components: []
  category: estado_derivado
  physical_role: curvatura_dinamica
  used_in: [ aceleracion_mhs ]
  common_mistake: Tratar su signo como independiente de [[x]].
  typical_range: [ -200, 200 ]
  sign_behavior: opuesta_a_x_en_mhs_ideal
  zero_behavior: paso_por_equilibrio
  value_nature: estado
  interpretation_role: vincula_restauracion
  graph_binding: "[[a]] es opuesta a [[x]] en el MHS ideal."
  descripcion:
    es: "Segunda derivada temporal de [[x]] o derivada temporal de [[v]]."
    en: "Second time derivative of [[x]] or time derivative of [[v]]."
  pedagogical_notes:
    es: "Relacion signo de [[a]] con retorno al equilibrio."
    en: "Relate sign of [[a]] with restoring tendency toward equilibrium."

- id: x_dd
  symbol: x_dd
  nombre: { es: Segunda derivada de x, en: Second derivative of x }
  si_unit: m/s^2
  unidad_si: m/s^2
  dimension: L T^-2
  is_vector: false
  components: []
  category: operador_dinamico
  physical_role: representacion_diferencial
  used_in: [ ecuacion_diferencial_mhs ]
  common_mistake: Tratarla como nueva magnitud independiente sin vinculo con [[a]].
  typical_range: [ -200, 200 ]
  sign_behavior: depende_del_estado
  zero_behavior: inflexion_o_equilibrio_local
  value_nature: derivada
  interpretation_role: conecta_modelo_y_datos
  graph_binding: "[[x_dd]] resume la curvatura temporal de [[x]]."
  descripcion:
    es: "Notacion diferencial para la segunda derivada temporal de [[x]]."
    en: "Differential notation for the second time derivative of [[x]]."
  pedagogical_notes:
    es: "En este leaf, [[x_dd]] y [[a]] son equivalentes en interpretacion fisica."
    en: "In this leaf, [[x_dd]] and [[a]] are physically equivalent."
