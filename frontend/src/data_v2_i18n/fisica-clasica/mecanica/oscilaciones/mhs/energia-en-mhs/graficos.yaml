version: "1.0"
leaf: "energia-en-mhs"

coord:
  title:
    es: Gráfica Coord · Energía en MHS
    en: Coord Graph · Energy in SHM
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: t
  yMagnitude: E
  relation:
    es: E_c = ½mω²A²sin²(ωt+φ). E_p = ½kA²cos²(ωt+φ). E_total = ½kA² = cte.
    en: E_k = ½mω²A²sin²(ωt+φ). E_p = ½kA²cos²(ωt+φ). E_total = ½kA² = const.
  physicalReading:
    es: E_c y E_p oscilan en contrafase; E_total = cte.
    en: E_k and E_p oscillate in antiphase; E_total = const.
  slopeMeaning:
    es: "dE_c/dt: potencia instantánea."
    en: "dE_k/dt: instantaneous power."
  interceptMeaning:
    es: E_c(0) = 0 si x(0) = A.
    en: E_k(0) = 0 if x(0) = A.
  curvatureMeaning:
    es: "Curvatura de E_c = E_p: oscilación de frecuencia 2ω."
    en: "Curvature of E_k = E_p: oscillation at 2ω."
  signMeaning:
    es: E_c, E_p ≥ 0.
    en: E_k, E_p ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Energía en MHS.
    en: Energy in SHM.
  formulaConnection:
    es: E_total = ½kA². E_c + E_p = cte.
    en: E_total = ½kA². E_k + E_p = const.
  readingFocus:
    es: verificar E_c + E_p = E_total = cte.
    en: verify E_k + E_p = E_total = const.
  agentHints:
    es:
      - E_total = ½kA² = cte.
      - E_c = 0 en x = ±A.
      - E_p = 0 en x = 0.
    en:
      - E_total = ½kA² = const.
      - E_k = 0 at x = ±A.
      - E_p = 0 at x = 0.
  commonMistakes:
    es:
      - E_total varía.
      - E_c máxima en x = 0.
      - Confundir E_c y E_p.
    en:
      - E_total varies.
      - E_k max at x = 0.
      - Confusing E_k and E_p.
