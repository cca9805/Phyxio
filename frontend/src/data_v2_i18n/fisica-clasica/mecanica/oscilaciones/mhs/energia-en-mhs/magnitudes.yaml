version: 5
magnitudes:
- id: K
  symbol: K
  nombre: { es: Energia cinetica, en: Kinetic energy }
  si_unit: J
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: energia_de_movimiento
  used_in: [ energia_cinetica, energia_total_mhs, conservacion_energia_mhs ]
  common_mistake: Pensar que [[K]] es maxima en los extremos del movimiento.
  typical_range: [ 0, 500 ]
  sign_behavior: no_negativa
  zero_behavior: reposo_instante_o_extremo
  value_nature: estado
  interpretation_role: mide_movimiento_instante
  graph_binding: "[[K]] aumenta cerca del equilibrio y disminuye hacia los extremos."
  descripcion:
    es: "Energia asociada al movimiento instantaneo del oscilador."
    en: "Energy associated with the oscillator instantaneous motion."
  pedagogical_notes:
    es: "Su intercambio con [[U]] permite leer conservacion de [[E]]."
    en: "Its exchange with [[U]] supports conservation reading of [[E]]."

- id: U
  symbol: U
  nombre: { es: Energia potencial elastica, en: Elastic potential energy }
  si_unit: J
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: energia_de_configuracion
  used_in: [ energia_potencial_elastica, energia_total_mhs, conservacion_energia_mhs ]
  common_mistake: Creer que [[U]] depende de velocidad y no de configuracion.
  typical_range: [ 0, 500 ]
  sign_behavior: no_negativa
  zero_behavior: equilibrio_ideal
  value_nature: estado
  interpretation_role: mide_almacenamiento_elastico
  graph_binding: "[[U]] es minima en equilibrio y maxima en los extremos."
  descripcion:
    es: "Energia almacenada en el resorte por desplazamiento respecto del equilibrio."
    en: "Energy stored in the spring due to displacement from equilibrium."
  pedagogical_notes:
    es: "En MHS ideal, [[U]] compensa a [[K]] para sostener [[E]]."
    en: "In ideal SHM, [[U]] compensates [[K]] to sustain [[E]]."

- id: E
  symbol: E
  nombre: { es: Energia mecanica total, en: Total mechanical energy }
  si_unit: J
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: cantidad_conservada
  used_in: [ energia_total_mhs, energia_total_amplitud ]
  common_mistake: Tratar [[E]] como suma variable en un sistema ideal sin disipacion.
  typical_range: [ 0, 500 ]
  sign_behavior: positiva_o_nula
  zero_behavior: ausencia_de_oscilacion
  value_nature: parametro
  interpretation_role: fija_escala_energetica
  graph_binding: "[[E]] permanece constante en el modelo ideal mientras [[K]] y [[U]] intercambian valor."
  descripcion:
    es: "Suma de energia cinetica y energia potencial en el oscilador ideal."
    en: "Sum of kinetic and potential energy in the ideal oscillator."
  pedagogical_notes:
    es: "La constancia de [[E]] es el criterio central de este leaf."
    en: "Constancy of [[E]] is the central criterion of this leaf."

- id: m
  symbol: m
  nombre: { es: Masa, en: Mass }
  si_unit: kg
  unidad_si: kg
  dimension: M
  is_vector: false
  components: []
  category: parametro
  physical_role: inercia
  used_in: [ energia_cinetica ]
  common_mistake: Omitir su efecto al reconstruir [[K]] a partir de [[v]].
  typical_range: [ 0.05, 50 ]
  sign_behavior: positiva
  zero_behavior: invalida_modelo
  value_nature: parametro
  interpretation_role: fija_escala_inercial
  graph_binding: "[[m]] cambia la escala de [[K]] para un mismo valor de [[v]]."
  descripcion:
    es: "Parametro inercial del oscilador."
    en: "Inertial parameter of the oscillator."
  pedagogical_notes:
    es: "Mayor [[m]] implica mayor [[K]] para la misma rapidez."
    en: "Larger [[m]] implies larger [[K]] for the same speed."

- id: k
  symbol: k
  nombre: { es: Constante elastica, en: Spring constant }
  si_unit: N/m
  unidad_si: N/m
  dimension: M T^-2
  is_vector: false
  components: []
  category: parametro
  physical_role: rigidez
  used_in: [ energia_potencial_elastica, energia_total_amplitud ]
  common_mistake: Tratar [[k]] como una energia en vez de una rigidez.
  typical_range: [ 1, 5000 ]
  sign_behavior: positiva
  zero_behavior: sin_restauracion
  value_nature: parametro
  interpretation_role: fija_almacenamiento_elastico
  graph_binding: "[[k]] modifica la pendiente con la que crece [[U]] respecto a [[x]]."
  descripcion:
    es: "Parametro de rigidez del resorte ideal."
    en: "Stiffness parameter of the ideal spring."
  pedagogical_notes:
    es: "A mayor [[k]], mayor energia potencial para la misma deformacion."
    en: "Higher [[k]] means larger potential energy for the same deformation."

- id: x
  symbol: x
  nombre: { es: Desplazamiento, en: Displacement }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: estado
  physical_role: coordenada_de_estado
  used_in: [ energia_potencial_elastica ]
  common_mistake: Confundir [[x]] con distancia recorrida acumulada.
  typical_range: [ -2, 2 ]
  sign_behavior: depende_de_referencia
  zero_behavior: equilibrio
  value_nature: estado
  interpretation_role: controla_energia_potencial
  graph_binding: "[[x]] grande en magnitud implica mayor [[U]] en el modelo ideal."
  descripcion:
    es: "Posicion instantanea respecto del equilibrio."
    en: "Instantaneous position relative to equilibrium."
  pedagogical_notes:
    es: "La dependencia energetica va con el cuadrado de [[x]]."
    en: "Energetic dependence scales with the square of [[x]]."

- id: v
  symbol: v
  nombre: { es: Velocidad, en: Velocity }
  si_unit: m/s
  unidad_si: m/s
  dimension: L T^-1
  is_vector: false
  components: []
  category: estado
  physical_role: tasa_de_cambio
  used_in: [ energia_cinetica ]
  common_mistake: Asumir que [[v]] y [[x]] maximizan energia al mismo tiempo.
  typical_range: [ -20, 20 ]
  sign_behavior: depende_de_sentido
  zero_behavior: extremo_del_movimiento
  value_nature: estado
  interpretation_role: controla_energia_cinetica
  graph_binding: "[[v]] grande en magnitud implica mayor [[K]]."
  descripcion:
    es: "Rapidez con signo del estado oscilatorio."
    en: "Signed speed of the oscillatory state."
  pedagogical_notes:
    es: "La dependencia energetica va con el cuadrado de [[v]]."
    en: "Energetic dependence scales with the square of [[v]]."

- id: A
  symbol: A
  nombre: { es: Amplitud, en: Amplitude }
  si_unit: m
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: parametro
  physical_role: escala_de_oscilacion
  used_in: [ energia_total_amplitud ]
  common_mistake: Tratar [[A]] como si cambiara durante el MHS ideal sin disipacion.
  typical_range: [ 0.01, 2 ]
  sign_behavior: no_negativa_en_magnitud
  zero_behavior: sin_oscilacion
  value_nature: parametro
  interpretation_role: fija_escala_total_de_energia
  graph_binding: "[[A]] fija la energia total del sistema a traves de [[k]]."
  descripcion:
    es: "Maximo desplazamiento respecto del equilibrio en el modelo ideal."
    en: "Maximum displacement from equilibrium in the ideal model."
  pedagogical_notes:
    es: "Duplicar [[A]] cuadruplica la energia total ideal para [[k]] fija."
    en: "Doubling [[A]] quadruples ideal total energy for fixed [[k]]."

- id: E_total
  symbol: E_total
  nombre: { es: Energia total conservada, en: Conserved total energy }
  si_unit: J
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: energia
  physical_role: cantidad_conservada_explicita
  used_in: [ conservacion_energia_mhs ]
  common_mistake: Tratar [[E_total]] como una variable independiente de [[E]].
  typical_range: [ 0, 500 ]
  sign_behavior: positiva_o_nula
  zero_behavior: reposo_sin_oscilacion
  value_nature: parametro
  interpretation_role: enfatiza_conservacion
  graph_binding: "[[E_total]] resume la constancia energetica del sistema ideal."
  descripcion:
    es: "Etiqueta explicita para la energia mecanica total conservada del oscilador."
    en: "Explicit label for the conserved total mechanical energy of the oscillator."
  pedagogical_notes:
    es: "En este leaf, [[E_total]] y [[E]] deben leerse de forma coherente."
    en: "In this leaf, [[E_total]] and [[E]] should be read coherently."
