version: "1.0"
leaf: "fase"

coord:
  title:
    es: Gráfica Coord · Fase en MHS
    en: Coord Graph · Phase in SHM
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: fase φ(t) (rad)
    en: phase φ(t) (rad)
  xMagnitude: t
  yMagnitude: phi
  relation:
    es: φ(t) = ωt + φ₀. La fase crece linealmente con t. Desfase Δφ = ω·Δt.
    en: φ(t) = ωt + φ₀. Phase grows linearly with t. Phase difference Δφ = ω·Δt.
  physicalReading:
    es: Pendiente = ω (frecuencia angular). Ordenada = φ₀.
    en: Slope = ω (angular frequency). Intercept = φ₀.
  slopeMeaning:
    es: "dφ/dt = ω: frecuencia angular."
    en: "dφ/dt = ω: angular frequency."
  interceptMeaning:
    es: "φ(0) = φ₀: fase inicial."
    en: "φ(0) = φ₀: initial phase."
  curvatureMeaning:
    es: "Recta: d²φ/dt² = 0 (sin aceleración de fase)."
    en: "Straight line: d²φ/dt² = 0 (no phase acceleration)."
  signMeaning:
    es: "φ > 0: adelantado. φ < 0: retrasado."
    en: "φ > 0: leading. φ < 0: lagging."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Fase de una oscilación.
    en: Phase of an oscillation.
  formulaConnection:
    es: φ(t) = ωt + φ₀.
    en: φ(t) = ωt + φ₀.
  readingFocus:
    es: leer pendiente = ω y ordenada = φ₀.
    en: read slope = ω and intercept = φ₀.
  agentHints:
    es:
      - Pendiente = ω.
      - "φ₀: fase inicial."
      - Δφ = ω·Δt.
    en:
      - Slope = ω.
      - "φ₀: initial phase."
      - Δφ = ω·Δt.
  commonMistakes:
    es:
      - ω = f.
      - Fase en grados al usar rad.
      - Pendiente = f.
    en:
      - ω = f.
      - Phase in degrees when using rad.
      - Slope = f.
