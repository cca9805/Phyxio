version: "1.0"
leaf: "oscilador-masa-muelle"

coord:
  title:
    es: Gráfica Coord · Oscilador Masa-Muelle
    en: Coord Graph · Mass-Spring Oscillator
  xAxis:
    es: elongación x (m)
    en: displacement x (m)
  yAxis:
    es: fuerza elástica F (N)
    en: elastic force F (N)
  xMagnitude: x
  yMagnitude: F
  relation:
    es: F = −kx. Ley de Hooke. Pendiente = −k. Fuerza restauradora.
    en: "F = −kx. Hooke's law. Slope = −k. Restoring force."
  physicalReading:
    es: "Pendiente = −k: cuanto más empinada, mayor k. F = 0 en x = 0."
    en: "Slope = −k: steeper means larger k. F = 0 at x = 0."
  slopeMeaning:
    es: "dF/dx = −k: constante elástica (N/m)."
    en: "dF/dx = −k: spring constant (N/m)."
  interceptMeaning:
    es: "F(0) = 0: equilibrio sin fuerza."
    en: "F(0) = 0: equilibrium with no force."
  curvatureMeaning:
    es: "Recta: muelle ideal (sin saturación)."
    en: "Straight line: ideal spring (no saturation)."
  signMeaning:
    es: "F < 0 si x > 0: fuerza restauradora."
    en: "F < 0 if x > 0: restoring force."
  areaMeaning:
    es: "|Área| = energía potencial ½kx²."
    en: "|Area| = potential energy ½kx²."
  domainMeaning:
    es: "x: rango de elongación."
    en: "x: displacement range."
  modelConnection:
    es: Oscilador masa-muelle, ley de Hooke.
    en: "Mass-spring oscillator, Hooke's law."
  formulaConnection:
    es: F = −kx, ω = √(k/m).
    en: F = −kx, ω = √(k/m).
  readingFocus:
    es: leer pendiente = −k y verificar F restauradora.
    en: read slope = −k and verify restoring F.
  agentHints:
    es:
      - Pendiente = −k.
      - F = 0 en equilibrio.
      - ω = √(k/m).
    en:
      - Slope = −k.
      - F = 0 at equilibrium.
      - ω = √(k/m).
  commonMistakes:
    es:
      - F = kx (sin signo).
      - k = masa.
      - Pendiente = k sin signo.
    en:
      - F = kx (no sign).
      - k = mass.
      - Slope = k without sign.

svg:
  title:
    es: Escena SVG · Oscilador Masa-Muelle
    en: SVG Scene · Mass-Spring Oscillator
  sceneId: masa_muelle
  sceneLabel:
    es: Masa unida a muelle con elongación x
    en: Mass attached to spring with displacement x
  objects:
    es:
      - masa m
      - muelle k
      - equilibrio
      - elongación x
    en:
      - mass m
      - spring k
      - equilibrium
      - displacement x
  mainObject:
    es: oscilador masa-muelle
    en: mass-spring oscillator
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "x = 0: equilibrio. x ≠ 0: elongación."
    en: "x = 0: equilibrium. x ≠ 0: displacement."
  interactions:
    es: F = −kx restaura hacia x = 0.
    en: F = −kx restores toward x = 0.
  modelElements:
    es:
      - F = −kx
      - ω = √(k/m)
    en:
      - F = −kx
      - ω = √(k/m)
  visualCues:
    es:
      - Muelle comprimido/estirado.
      - Flecha F hacia equilibrio.
    en:
      - Compressed/stretched spring.
      - F arrow toward equilibrium.
  scaleMeaning:
    es: Longitud muelle ∝ x.
    en: Spring length ∝ x.
  relation:
    es: F = −kx.
    en: F = −kx.
  physicalReading:
    es: F restauradora hacia x = 0.
    en: Restoring F toward x = 0.
  modelConnection:
    es: Oscilador masa-muelle.
    en: Mass-spring oscillator.
  formulaConnection:
    es: F = −kx, ω = √(k/m).
    en: F = −kx, ω = √(k/m).
  readingFocus:
    es: identificar x, F y dirección restauradora.
    en: identify x, F and restoring direction.
  agentHints:
    es:
      - F hacia equilibrio.
      - "k: rigidez."
    en:
      - F toward equilibrium.
      - "k: stiffness."
  commonMistakes:
    es:
      - F = kx (sin signo).
      - F aleja del equilibrio.
    en:
      - F = kx (no sign).
      - F away from equilibrium.
