version: 2
id: interpretacion-oscilador-masa-muelle
leaf_id: oscilador-masa-muelle
nombre:
  es: Interpretacion del oscilador masa muelle
  en: Interpretation of the mass-spring oscillator
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: oscilaciones
  parent_id: oscilaciones
  ruta_relativa: fisica-clasica/mecanica/oscilaciones/oscilador-masa-muelle
dependencies:
  formulas:
  - pulsacion_natural
  - periodo_muelle
  - frecuencia_muelle
  - ecuacion_oscilacion
  - ley_hooke_conceptual
  magnitudes:
  - m
  - k
  - omega0
  - T
  - f
  - A
  - x
  - t
  - phi
  - F
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  omega0:
    summary_rules:
    - id: omega0_summary
      when: "true"
      status: info
      text:
        es: La pulsacion natural fija la escala temporal del oscilador para condiciones lineales.
        en: Natural angular frequency sets the oscillator time scale under linear conditions.
    coherence_rules:
    - id: omega0_coherence
      when: "true"
      status: ok
      text:
        es: Debe ser positiva y consistente con la pareja masa-rigidez usada.
        en: It must be positive and consistent with the mass-stiffness pair in use.
    physical_reading_rules:
    - id: omega0_physical
      when: "true"
      status: info
      text:
        es: Si aumenta k con m fija, la oscilacion se acelera porque el sistema recupera antes el equilibrio.
        en: If k increases at fixed m, oscillation speeds up because equilibrium is restored earlier.
    model_validity_rules:
    - id: omega0_validity
      when: "true"
      status: ok
      text:
        es: Es valida cuando el muelle permanece en su zona elastica y no hay no linealidades dominantes.
        en: It is valid when the spring stays in its elastic zone and dominant nonlinearities are absent.
    graph_rules:
    - id: omega0_graph
      when: "true"
      status: info
      text:
        es: Se observa por la separacion temporal entre picos de la grafica de desplazamiento.
        en: It is observed through peak spacing in the displacement graph.
    likely_errors:
    - id: omega0_error
      when: "true"
      status: warning
      text:
        es: No confundas radianes por segundo con hertz; f es omega0 dividido entre 2 pi.
        en: Do not confuse radians per second with hertz; f equals omega0 divided by 2 pi.
    next_step_rules:
    - id: omega0_next
      when: "true"
      status: info
      text:
        es: Usa omega0 para construir la evolucion temporal en la ecuacion de oscilacion.
        en: Use omega0 to build time evolution in the oscillation equation.

  k:
    summary_rules:
    - id: k_summary
      when: "true"
      status: info
      text:
        es: La rigidez cuantifica cuanto aumenta la fuerza restauradora por unidad de deformacion.
        en: Stiffness quantifies how restoring force grows per unit deformation.
    coherence_rules:
    - id: k_coherence
      when: "true"
      status: ok
      text:
        es: Valores negativos de k no representan un equilibrio estable en este leaf.
        en: Negative k values do not represent stable equilibrium in this leaf.
    physical_reading_rules:
    - id: k_physical
      when: "true"
      status: info
      text:
        es: Un muelle mas rigido reduce el periodo y aumenta la fuerza necesaria para la misma amplitud.
        en: A stiffer spring reduces period and increases required force for the same amplitude.
    model_validity_rules:
    - id: k_validity
      when: "true"
      status: ok
      text:
        es: Si la deformacion supera la zona lineal, el valor efectivo de k deja de ser constante.
        en: If deformation exceeds linear range, the effective k is no longer constant.
    graph_rules:
    - id: k_graph
      when: "true"
      status: info
      text:
        es: En la curva F-x, k es el valor absoluto de la pendiente.
        en: In the F-x curve, k is the absolute value of slope.
    likely_errors:
    - id: k_error
      when: "true"
      status: warning
      text:
        es: No introduzcas N en lugar de N/m al cargar la rigidez.
        en: Do not enter N instead of N/m when inputting stiffness.
    next_step_rules:
    - id: k_next
      when: "true"
      status: info
      text:
        es: Contrasta el k identificado con el periodo experimental para verificar consistencia.
        en: Contrast identified k with experimental period to verify consistency.

  m:
    summary_rules:
    - id: m_summary
      when: "true"
      status: info
      text:
        es: La masa controla la inercia y ralentiza la respuesta oscilatoria cuando aumenta.
        en: Mass controls inertia and slows oscillatory response as it increases.
    coherence_rules:
    - id: m_coherence
      when: "true"
      status: ok
      text:
        es: Debe expresarse en kilogramos para mantener coherencia dimensional.
        en: It must be expressed in kilograms to keep dimensional consistency.
    physical_reading_rules:
    - id: m_physical
      when: "true"
      status: info
      text:
        es: A igualdad de k, duplicar m incrementa el periodo por raiz de dos.
        en: At fixed k, doubling m increases period by square root of two.
    model_validity_rules:
    - id: m_validity
      when: "true"
      status: ok
      text:
        es: El modelo supone masa concentrada; distribuciones extensas requieren correccion modal.
        en: The model assumes lumped mass; distributed masses require modal correction.
    graph_rules:
    - id: m_graph
      when: "true"
      status: info
      text:
        es: Mayor masa desplaza los picos de x(t) hacia tiempos mas largos.
        en: Larger mass shifts x(t) peaks toward later times.
    likely_errors:
    - id: m_error
      when: "true"
      status: warning
      text:
        es: No confundas masa con peso; si partes de N, divide por g para obtener kg.
        en: Do not confuse mass with weight; if starting from N, divide by g to obtain kg.
    next_step_rules:
    - id: m_next
      when: "true"
      status: info
      text:
        es: Evalua sensibilidad variando m para estimar tolerancias de diseno.
        en: Evaluate sensitivity by varying m to estimate design tolerances.

  T:
    summary_rules:
    - id: T_summary
      when: "true"
      status: info
      text:
        es: El periodo resume cuanto tarda el sistema en repetir estado dinamico.
        en: Period summarises how long the system takes to repeat a dynamical state.
    coherence_rules:
    - id: T_coherence
      when: "true"
      status: ok
      text:
        es: Debe ser positivo y coherente con la frecuencia medida.
        en: It must be positive and coherent with measured frequency.
    physical_reading_rules:
    - id: T_physical
      when: "true"
      status: info
      text:
        es: Periodos grandes indican respuesta lenta por inercia alta o rigidez baja.
        en: Large periods indicate slow response due to high inertia or low stiffness.
    model_validity_rules:
    - id: T_validity
      when: "true"
      status: ok
      text:
        es: El periodo observado debe mantenerse casi constante para afirmar regimen armonico lineal.
        en: Observed period should remain nearly constant to claim linear harmonic regime.
    graph_rules:
    - id: T_graph
      when: "true"
      status: info
      text:
        es: Se mide entre dos maximos consecutivos o dos cruces equivalentes de fase.
        en: It is measured between consecutive maxima or equivalent phase crossings.
    likely_errors:
    - id: T_error
      when: "true"
      status: warning
      text:
        es: Medir medio ciclo y llamarlo periodo duplica el error en frecuencia.
        en: Measuring half a cycle and calling it period doubles frequency error.
    next_step_rules:
    - id: T_next
      when: "true"
      status: info
      text:
        es: Convierte T a f para comparar con especificaciones de operacion.
        en: Convert T to f to compare with operation specifications.

  f:
    summary_rules:
    - id: f_summary
      when: "true"
      status: info
      text:
        es: La frecuencia indica cuantos ciclos completos ocurren cada segundo.
        en: Frequency indicates how many full cycles occur each second.
    coherence_rules:
    - id: f_coherence
      when: "true"
      status: ok
      text:
        es: Debe satisfacer f multiplicada por T cercana a uno.
        en: It should satisfy f times T close to one.
    physical_reading_rules:
    - id: f_physical
      when: "true"
      status: info
      text:
        es: Al subir f, aumenta el numero de oscilaciones observadas en una ventana fija.
        en: As f rises, more oscillations are observed in a fixed window.
    model_validity_rules:
    - id: f_validity
      when: "true"
      status: ok
      text:
        es: Comparar frecuencia medida y teorica permite detectar amortiguamiento no modelado.
        en: Comparing measured and theoretical frequency helps detect unmodelled damping.
    graph_rules:
    - id: f_graph
      when: "true"
      status: info
      text:
        es: Se estima contando ciclos y dividiendo por el tiempo total observado.
        en: It is estimated by counting cycles and dividing by total observed time.
    likely_errors:
    - id: f_error
      when: "true"
      status: warning
      text:
        es: No mezcles Hz y rad/s sin conversion explicita por 2 pi.
        en: Do not mix Hz and rad/s without explicit conversion by 2 pi.
    next_step_rules:
    - id: f_next
      when: "true"
      status: info
      text:
        es: Usa f para verificar alejamiento o cercania a un forzamiento externo periodico.
        en: Use f to verify distance from an external periodic forcing.

  x:
    summary_rules:
    - id: x_summary
      when: "true"
      status: info
      text:
        es: El desplazamiento instantaneo ubica la masa respecto al equilibrio con signo.
        en: Instant displacement locates the mass relative to equilibrium with sign.
    coherence_rules:
    - id: x_coherence
      when: "true"
      status: ok
      text:
        es: El valor absoluto de x no debe superar la amplitud en el modelo armonico ideal.
        en: Absolute x should not exceed amplitude in ideal harmonic model.
    physical_reading_rules:
    - id: x_physical
      when: "true"
      status: info
      text:
        es: Cambios de signo en x identifican cruces de equilibrio y cambio de direccion de fuerza.
        en: Sign changes in x identify equilibrium crossings and force-direction changes.
    model_validity_rules:
    - id: x_validity
      when: "true"
      status: ok
      text:
        es: Si aparecen recortes o asimetrias fuertes en x(t), revisa no linealidades.
        en: If strong clipping or asymmetry appears in x(t), check nonlinear effects.
    graph_rules:
    - id: x_graph
      when: "true"
      status: info
      text:
        es: En x(t), picos y valles delimitan amplitud y periodo del movimiento.
        en: In x(t), peaks and troughs define motion amplitude and period.
    likely_errors:
    - id: x_error
      when: "true"
      status: warning
      text:
        es: No confundas desplazamiento con distancia recorrida acumulada.
        en: Do not confuse displacement with accumulated travelled distance.
    next_step_rules:
    - id: x_next
      when: "true"
      status: info
      text:
        es: Usa x para calcular energia potencial elastica en diferentes instantes.
        en: Use x to compute elastic potential energy at different instants.

  F:
    summary_rules:
    - id: F_summary
      when: "true"
      status: info
      text:
        es: La fuerza restauradora apunta al equilibrio y es proporcional al desplazamiento en modulo.
        en: Restoring force points to equilibrium and is proportional to displacement magnitude.
    coherence_rules:
    - id: F_coherence
      when: "true"
      status: ok
      text:
        es: El signo de F debe ser opuesto al de x para mantener estabilidad local.
        en: F sign should oppose x sign to maintain local stability.
    physical_reading_rules:
    - id: F_physical
      when: "true"
      status: info
      text:
        es: Cuando la masa se aleja mas del equilibrio, la fuerza de retorno crece.
        en: As mass moves farther from equilibrium, restoring force grows.
    model_validity_rules:
    - id: F_validity
      when: "true"
      status: ok
      text:
        es: La proporcionalidad lineal se rompe si el material entra en deformacion no elastica.
        en: Linear proportionality breaks when material enters non-elastic deformation.
    graph_rules:
    - id: F_graph
      when: "true"
      status: info
      text:
        es: En F-x, la pendiente negativa constante confirma comportamiento hookeano lineal.
        en: In F-x, constant negative slope confirms linear Hookean behaviour.
    likely_errors:
    - id: F_error
      when: "true"
      status: warning
      text:
        es: Ignorar el signo en la ley conceptual impide interpretar direccion de movimiento.
        en: Ignoring the sign in conceptual law prevents direction interpretation.
    next_step_rules:
    - id: F_next
      when: "true"
      status: info
      text:
        es: Combina F con x para estimar energia almacenada y margen de seguridad estructural.
        en: Combine F with x to estimate stored energy and structural safety margin.
