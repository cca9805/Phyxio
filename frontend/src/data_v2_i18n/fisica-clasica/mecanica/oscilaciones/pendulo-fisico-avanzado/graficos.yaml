version: "1.0"
leaf: "pendulo-fisico-avanzado"

coord:
  title:
    es: Gráfica Coord · Péndulo Físico Avanzado
    en: Coord Graph · Advanced Physical Pendulum
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ(t) (rad)
    en: angle θ(t) (rad)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: "T = 2π√(I/(mgd)). Teorema de Steiner: I = I_CM + md². Punto de oscilación conjugado."
    en: "T = 2π√(I/(mgd)). Parallel axis: I = I_CM + md². Conjugate oscillation point."
  physicalReading:
    es: "Teorema de Steiner permite calcular I. Punto conjugado: mismo T."
    en: "Parallel-axis theorem gives I. Conjugate point: same T."
  slopeMeaning:
    es: "dθ/dt: velocidad angular."
    en: "dθ/dt: angular velocity."
  interceptMeaning:
    es: θ(0) = θ₀.
    en: θ(0) = θ₀.
  curvatureMeaning:
    es: d²θ/dt² = −(mgd/I)θ.
    en: d²θ/dt² = −(mgd/I)θ.
  signMeaning:
    es: "θ > 0."
    en: "θ > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Péndulo físico avanzado (Steiner).
    en: Advanced physical pendulum (Steiner).
  formulaConnection:
    es: I = I_CM + md², T = 2π√(I/(mgd)).
    en: I = I_CM + md², T = 2π√(I/(mgd)).
  readingFocus:
    es: aplicar Steiner para I y calcular T.
    en: apply Steiner for I and calculate T.
  agentHints:
    es:
      - I = I_CM + md².
      - T = 2π√(I/(mgd)).
      - "Punto conjugado: mismo T."
    en:
      - I = I_CM + md².
      - T = 2π√(I/(mgd)).
      - "Conjugate point: same T."
  commonMistakes:
    es:
      - I = md².
      - Olvidar I_CM.
      - L_eq = d.
    en:
      - I = md².
      - Forgetting I_CM.
      - L_eq = d.

