version: "1.0"
leaf: "pendulo-fisico"

coord:
  title:
    es: Gráfica Coord · Péndulo Físico
    en: Coord Graph · Physical Pendulum
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ(t) (rad)
    en: angle θ(t) (rad)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: "T = 2π√(I/(mgd)). I: momento de inercia. d: distancia CM-pivote. Generaliza el péndulo simple."
    en: "T = 2π√(I/(mgd)). I: moment of inertia. d: CM-pivot distance. Generalises simple pendulum."
  physicalReading:
    es: "T depende de I y d. L_eq = I/(md): longitud equivalente."
    en: "T depends on I and d. L_eq = I/(md): equivalent length."
  slopeMeaning:
    es: "dθ/dt: velocidad angular."
    en: "dθ/dt: angular velocity."
  interceptMeaning:
    es: θ(0) = θ₀.
    en: θ(0) = θ₀.
  curvatureMeaning:
    es: d²θ/dt² = −(mgd/I)θ.
    en: d²θ/dt² = −(mgd/I)θ.
  signMeaning:
    es: "θ > 0: desviacín positiva."
    en: "θ > 0: positive deflection."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "t ≥ 0. |θ| ≪ 1 rad."
    en: "t ≥ 0. |θ| ≪ 1 rad."
  modelConnection:
    es: Péndulo físico.
    en: Physical pendulum.
  formulaConnection:
    es: T = 2π√(I/(mgd)), L_eq = I/(md).
    en: T = 2π√(I/(mgd)), L_eq = I/(md).
  readingFocus:
    es: leer T y calcular L_eq = I/(md).
    en: read T and calculate L_eq = I/(md).
  agentHints:
    es:
      - T = 2π√(I/(mgd)).
      - L_eq = I/(md).
      - I incluye distribución de masa.
    en:
      - T = 2π√(I/(mgd)).
      - L_eq = I/(md).
      - I includes mass distribution.
  commonMistakes:
    es:
      - L_eq = d.
      - I = md².
      - T = 2π√(d/g).
    en:
      - L_eq = d.
      - I = md².
      - T = 2π√(d/g).

