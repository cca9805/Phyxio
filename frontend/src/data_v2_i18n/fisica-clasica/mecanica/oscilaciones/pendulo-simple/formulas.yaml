version: 1
ui:
  default_formula: periodo_ps
formulas:
- id: omega0_ps
  title:
    es: Pulsación natural del péndulo simple
    en: Natural angular frequency of the simple pendulum
  equation: omega0 = sqrt(g/L)
  latex: \omega_0 = \sqrt{\frac{g}{L}}
  category: fundamental
  relation_type: characteristic_relation
  physical_meaning:
    es: Relaciona longitud y gravedad con la rapidez angular propia del movimiento.
    en: Relates length and gravity to the system's characteristic angular rate.
  constraints: L > 0 and g > 0.
  validity:
    es: Válida para ángulos pequeños y cuerda o hilo idealizados.
    en: Valid for small angles and an idealized string or rod.
  dimension_check: "[T^-1] = sqrt([L T^-2]/[L])"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - natural_rate
  - small_angle
  - baseline_dynamics
  result_semantics:
    target: omega0
    kind: characteristic_rate
    sign_meaning:
      es: Se interpreta como rapidez angular positiva.
      en: It is interpreted as a positive angular rate.
    absolute_value_meaning:
      es: Mayor valor implica oscilación más rápida.
      en: Larger value implies faster oscillation.
  domain_checks:
  - expr: L > 0
    message:
      es: La longitud debe ser positiva.
      en: Length must be positive.
  - expr: g > 0
    message:
      es: La gravedad debe ser positiva.
      en: Gravity must be positive.
  coherence_checks:
  - expr: omega0 > 0
    message:
      es: La pulsación natural debe resultar positiva.
      en: Natural angular frequency must be positive.
  graph_implications:
  - La gráfica del periodo cambia cuando L o g varían.
  pedagogical_triggers:
  - when: omega0 > 0
    message:
      es: Comprueba si el periodo y la frecuencia son coherentes con esta escala.
      en: Check whether period and frequency are coherent with this scale.
  rearrangements:
  - target: omega0
    equation: sqrt(g/L)
    latex: \sqrt{\frac{g}{L}}
  - target: L
    equation: g/(omega0^2)
    latex: \frac{g}{\omega_0^2}
  - target: g
    equation: L*omega0^2
    latex: L\omega_0^2

- id: periodo_ps
  title:
    es: Periodo del péndulo simple
    en: Period of the simple pendulum
  equation: T = 2*pi*sqrt(L/g)
  latex: T = 2\pi\sqrt{\frac{L}{g}}
  category: fundamental
  relation_type: period_relation
  physical_meaning:
    es: Traduce longitud y gravedad en tiempo de oscilación.
    en: Converts length and gravity into oscillation time.
  constraints: L > 0 and g > 0.
  validity:
    es: Válida para oscilaciones pequeñas alrededor del equilibrio.
    en: Valid for small oscillations around equilibrium.
  dimension_check: "[T] = sqrt([L]/[L T^-2])"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - period
  - laboratory_measurement
  - model_validation
  result_semantics:
    target: T
    kind: characteristic_time
    sign_meaning:
      es: El periodo es una duración positiva.
      en: Period is a positive duration.
    absolute_value_meaning:
      es: Mayor valor implica oscilación más lenta.
      en: Larger value implies slower oscillation.
  domain_checks:
  - expr: L > 0
    message:
      es: La longitud debe ser positiva.
      en: Length must be positive.
  - expr: g > 0
    message:
      es: La gravedad debe ser positiva.
      en: Gravity must be positive.
  coherence_checks:
  - expr: T > 0
    message:
      es: El periodo debe resultar positivo.
      en: Period must be positive.
  graph_implications:
  - La curva T(L) debe crecer con la raíz cuadrada de L.
  pedagogical_triggers:
  - when: T > 0
    message:
      es: Contrasta el periodo con la intuición experimental.
      en: Contrast the period with experimental intuition.
  rearrangements:
  - target: T
    equation: 2*pi*sqrt(L/g)
    latex: 2\pi\sqrt{\frac{L}{g}}
  - target: L
    equation: g*(T/(2*pi))^2
    latex: g\left(\frac{T}{2\pi}\right)^2
  - target: g
    equation: 4*pi^2*L/(T^2)
    latex: \frac{4\pi^2L}{T^2}

- id: frecuencia_ps
  title:
    es: Frecuencia del péndulo simple
    en: Frequency of the simple pendulum
  equation: f = 1/T
  latex: f = \frac{1}{T}
  category: derived
  relation_type: inverse_relation
  physical_meaning:
    es: Expresa cuántos ciclos completos ocurren por segundo.
    en: Expresses how many full cycles occur per second.
  constraints: T > 0.
  validity:
    es: Valida mientras el movimiento siga siendo periódico.
    en: Valid while the motion remains periodic.
  dimension_check: "[Hz] = [T^-1]"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - cycle_rate
  - reciprocal_quantity
  - comparison_to_period
  result_semantics:
    target: f
    kind: cycle_rate
    sign_meaning:
      es: Se interpreta como conteo positivo de ciclos.
      en: It is interpreted as a positive cycle count.
    absolute_value_meaning:
      es: Mayor valor implica más ciclos por segundo.
      en: Larger value implies more cycles per second.
  domain_checks:
  - expr: T > 0
    message:
      es: El periodo debe ser positivo.
      en: Period must be positive.
  coherence_checks:
  - expr: f > 0
    message:
      es: La frecuencia debe resultar positiva.
      en: Frequency must be positive.
  graph_implications:
  - La frecuencia es inversa del periodo.
  pedagogical_triggers:
  - when: f > 0
    message:
      es: Verifica que no estés mezclando Hz con rad/s.
      en: Verify that you are not mixing Hz and rad/s.
  rearrangements:
  - target: f
    equation: 1/T
    latex: \frac{1}{T}
  - target: T
    equation: 1/f
    latex: \frac{1}{f}

- id: ecuacion_angular_ps
  title:
    es: Ecuación angular del péndulo simple
    en: Angular equation of the simple pendulum
  equation: theta = theta0*cos(omega0*t + phi)
  latex: \theta = \theta_0\cos(\omega_0 t + \varphi)
  category: state_relation
  relation_type: time_evolution
  physical_meaning:
    es: Describe la evolución temporal de ángulo, amplitud y fase.
    en: Describes the time evolution of angle, amplitude, and phase.
  constraints: omega0 > 0.
  validity:
    es: Útil en el régimen lineal de ángulos pequeños.
    en: Useful in the linear regime of small angles.
  dimension_check: "[1] = [1]"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - time_evolution
  - phase
  - linear_solution
  result_semantics:
    target: theta
    kind: angular_state
    sign_meaning:
      es: El signo indica el lado del equilibrio.
      en: The sign indicates the side of equilibrium.
    absolute_value_meaning:
      es: El valor absoluto refleja el desplazamiento instantáneo.
      en: The absolute value reflects instantaneous displacement.
  domain_checks:
  - expr: omega0 > 0
    message:
      es: La pulsación natural debe ser positiva.
      en: Natural angular frequency must be positive.
  coherence_checks:
  - expr: theta0 >= 0
    message:
      es: La amplitud debe ser no negativa.
      en: Amplitude must be non-negative.
  graph_implications:
  - La fase desplaza máximos y mínimos en el tiempo.
  pedagogical_triggers:
  - when: theta0 > 0
    message:
      es: Comprueba si la amplitud sigue siendo pequeña.
      en: Check whether the amplitude is still small.
  rearrangements:
  - target: theta
    equation: theta0*cos(omega0*t + phi)
    latex: \theta_0\cos(\omega_0 t + \varphi)

- id: ecuacion_no_lineal_ps
  title:
    es: Ecuación angular no lineal del péndulo simple
    en: Nonlinear angular equation of the simple pendulum
  equation: theta_dd + (g/L)*sin(theta) = 0
  latex: \theta_{dd} + \frac{g}{L}\sin(\theta) = 0
  category: structural
  relation_type: differential_relation
  physical_meaning:
    es: Mantiene el seno exacto para amplitudes finitas.
    en: Keeps the exact sine for finite amplitudes.
  constraints: L > 0 and g > 0.
  validity:
    es: Necesaria cuando el ángulo deja de ser pequeño.
    en: Needed when the angle is no longer small.
  dimension_check: "[T^-2] = [T^-2]"
  calculable: false
  motivo_no_calculable:
    es: Requiere integración o métodos numéricos; no admite despeje algebraico general.
    en: Requires integration or numerical methods; no general algebraic solve exists.
  used_in:
  - teoria
  - modelos
  - errores
  - ejemplos
  interpretation_tags:
  - nonlinearity
  - finite_amplitude
  - restoring_torque
  result_semantics:
    target: theta_dd
    kind: dynamic_response
    sign_meaning:
      es: El signo refleja el torque restaurador instantáneo.
      en: The sign reflects the instantaneous restoring torque.
    absolute_value_meaning:
      es: Mayor módulo implica mayor aceleración angular.
      en: Larger magnitude implies greater angular acceleration.
  domain_checks:
  - expr: L > 0
    message:
      es: La longitud debe ser positiva.
      en: Length must be positive.
  - expr: g > 0
    message:
      es: La gravedad debe ser positiva.
      en: Gravity must be positive.
  coherence_checks:
  - expr: true
    message:
      es: Comprueba si el seno linealizado sigue siendo razonable.
      en: Check whether the linearized sine is still reasonable.
  graph_implications:
  - A amplitudes grandes, el periodo deja de ser estrictamente constante.
  pedagogical_triggers:
  - when: true
    message:
      es: Si la amplitud crece, cambia al análisis no lineal.
      en: If amplitude grows, switch to nonlinear analysis.
  rearrangements:
  - target: theta_dd
    equation: -(g/L)*sin(theta)
    latex: -\frac{g}{L}\sin(\theta)

- id: energia_ps
  title:
    es: Energía mecánica del péndulo simple
    en: Mechanical energy of the simple pendulum
  equation: E = 0.5*L^2*theta_dot^2 + g*L*(1-cos(theta))
  latex: E = \frac{1}{2}L^2(\theta_{dot})^2 + g\,L(1-\cos(\theta))
  category: energy
  relation_type: conservation_relation
  physical_meaning:
    es: Une energía cinética y potencial en el modelo ideal.
    en: Combines kinetic and potential energy in the ideal model.
  constraints: L > 0 and g > 0.
  validity:
    es: Útil sin rozamiento y para estudiar amplitudes finitas.
    en: Useful without friction and for finite amplitudes.
  dimension_check: "[J] = [L^2 T^-2]"
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - modelos
  - errores
  interpretation_tags:
  - energy
  - finite_amplitude
  - ideal_model
  result_semantics:
    target: E
    kind: energy_balance
    sign_meaning:
      es: Se interpreta como energía positiva o nula según la referencia.
      en: It is interpreted as positive or zero depending on the reference.
    absolute_value_meaning:
      es: Mayor valor implica mayor combinación de velocidad y desplazamiento.
      en: Larger value implies a greater combination of speed and displacement.
  domain_checks:
  - expr: L > 0
    message:
      es: La longitud debe ser positiva.
      en: Length must be positive.
  coherence_checks:
  - expr: E >= 0
    message:
      es: La energía debe ser no negativa bajo esta convención.
      en: Energy must be non-negative under this convention.
  graph_implications:
  - La energía ayuda a comparar amplitudes pequeñas y grandes.
  pedagogical_triggers:
  - when: theta0 > 0
    message:
      es: Usa energía para revisar el rango de validez.
      en: Use energy to check the validity range.
  rearrangements:
  - target: E
    equation: 0.5*L^2*theta_dot^2 + g*L*(1-cos(theta))
    latex: \frac{1}{2}L^2(\theta_{dot})^2 + g\,L(1-\cos(\theta))
