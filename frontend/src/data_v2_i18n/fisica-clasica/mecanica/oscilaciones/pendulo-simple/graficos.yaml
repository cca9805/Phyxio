version: "1.0"
leaf: "pendulo-simple"

coord:
  title:
    es: Gráfica Coord · Péndulo Simple
    en: Coord Graph · Simple Pendulum
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ(t) (rad)
    en: angle θ(t) (rad)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: θ(t) = θ₀·cos(ωt+φ). T = 2π√(L/g) para θ pequeño.
    en: θ(t) = θ₀·cos(ωt+φ). T = 2π√(L/g) for small θ.
  physicalReading:
    es: T independiente de θ₀ (aprox. pequenas oscilaciones). T ∝ √L.
    en: T independent of θ₀ (small-angle approx.). T ∝ √L.
  slopeMeaning:
    es: "dθ/dt = ωθ: velocidad angular."
    en: "dθ/dt = ωθ: angular velocity."
  interceptMeaning:
    es: θ(0) = θ₀·cos(φ).
    en: θ(0) = θ₀·cos(φ).
  curvatureMeaning:
    es: d²θ/dt² = −ω²θ (aproximación lineal).
    en: d²θ/dt² = −ω²θ (linear approximation).
  signMeaning:
    es: "θ > 0: desviación positiva."
    en: "θ > 0: positive deflection."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "t ≥ 0. |θ| ≪ 1 rad."
    en: "t ≥ 0. |θ| ≪ 1 rad."
  modelConnection:
    es: Péndulo simple en aproximación lineal.
    en: Simple pendulum in linear approximation.
  formulaConnection:
    es: T = 2π√(L/g), ω = √(g/L).
    en: T = 2π√(L/g), ω = √(g/L).
  readingFocus:
    es: leer T y θ₀. Verificar T independiente de θ₀.
    en: read T and θ₀. Verify T independent of θ₀.
  agentHints:
    es:
      - T = 2π√(L/g).
      - T no depende de θ₀.
      - ω = √(g/L).
    en:
      - T = 2π√(L/g).
      - T independent of θ₀.
      - ω = √(g/L).
  commonMistakes:
    es:
      - T depende de θ₀.
      - T = 2π√(g/L).
      - T ∝ L.
    en:
      - T depends on θ₀.
      - T = 2π√(g/L).
      - T ∝ L.

svg:
  title:
    es: Escena SVG · Péndulo Simple
    en: SVG Scene · Simple Pendulum
  sceneId: pendulo_simple
  sceneLabel:
    es: Péndulo de masa puntual con θ, L y g
    en: Point-mass pendulum with θ, L and g
  objects:
    es:
      - pivote
      - hilo L
      - masa m
      - ángulo θ
    en:
      - pivot
      - string L
      - mass m
      - angle θ
  mainObject:
    es: péndulo simple
    en: simple pendulum
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "T = 2π√(L/g). |θ| ≪ 1."
    en: "T = 2π√(L/g). |θ| ≪ 1."
  interactions:
    es: Gravedad restaura hacia θ = 0.
    en: Gravity restores toward θ = 0.
  modelElements:
    es:
      - T = 2π√(L/g)
      - ω = √(g/L)
    en:
      - T = 2π√(L/g)
      - ω = √(g/L)
  visualCues:
    es:
      - Hilo recto.
      - Flecha g.
      - θ desde vertical.
    en:
      - Straight string.
      - g arrow.
      - θ from vertical.
  scaleMeaning:
    es: Longitud hilo = L.
    en: String length = L.
  relation:
    es: T = 2π√(L/g).
    en: T = 2π√(L/g).
  physicalReading:
    es: T ∝ √L. T independiente de m y θ₀.
    en: T ∝ √L. T independent of m and θ₀.
  modelConnection:
    es: Péndulo simple.
    en: Simple pendulum.
  formulaConnection:
    es: T = 2π√(L/g).
    en: T = 2π√(L/g).
  readingFocus:
    es: identificar L, θ y g.
    en: identify L, θ and g.
  agentHints:
    es:
      - T ∝ √L.
      - T no depende de m.
    en:
      - T ∝ √L.
      - T independent of m.
  commonMistakes:
    es:
      - T depende de m.
      - T depende de θ₀.
    en:
      - T depends on m.
      - T depends on θ₀.
