version: "1.0"
leaf: "definicion-momento-de-inercia"

svg:
  title:
    es: Escena SVG · Definición Momento de Inercia
    en: SVG Scene · Moment of Inertia Definition
  sceneId: momento_inercia_def
  sceneLabel:
    es: "I = Σm_i r_i²: masa distribuida respecto al eje"
    en: "I = Σm_i r_i²: mass distributed about axis"
  objects:
    es:
      - masa m_i
      - distancia r_i
      - eje de rotación
    en:
      - mass m_i
      - distance r_i
      - rotation axis
  mainObject:
    es: cuerpo rígido
    en: rigid body
  referenceFrame:
    es: eje de rotación
    en: rotation axis
  geometry:
    es: I = Σm_i r_i² = ∫ r² dm.
    en: I = Σm_i r_i² = ∫ r² dm.
  interactions:
    es: I depende de la distribución de masa y del eje.
    en: I depends on mass distribution and axis.
  modelElements:
    es:
      - I = ∫ r² dm
      - "r: distancia al eje"
    en:
      - I = ∫ r² dm
      - "r: distance to axis"
  visualCues:
    es:
      - Masas puntuales a distancias r_i.
      - Eje central.
    en:
      - Point masses at distances r_i.
      - Central axis.
  scaleMeaning:
    es: "r_i: distancia perpendicular al eje."
    en: "r_i: perpendicular distance to axis."
  relation:
    es: I = Σm_i r_i².
    en: I = Σm_i r_i².
  physicalReading:
    es: "Mayor r → mayor I. Masa lejos del eje: mayor inercia."
    en: "Larger r → larger I. Mass far from axis: greater inertia."
  modelConnection:
    es: Momento de inercia.
    en: Moment of inertia.
  formulaConnection:
    es: I = ∫ r² dm, τ = Iα.
    en: I = ∫ r² dm, τ = Iα.
  readingFocus:
    es: identificar distribución de masa y eje.
    en: identify mass distribution and axis.
  agentHints:
    es:
      - I = ∫ r² dm.
      - Mayor r → mayor I.
      - I depende del eje.
    en:
      - I = ∫ r² dm.
      - Larger r → larger I.
      - I depends on axis.
  commonMistakes:
    es:
      - I = mr.
      - I independiente del eje.
      - I = mv².
    en:
      - I = mr.
      - I independent of axis.
      - I = mv².
