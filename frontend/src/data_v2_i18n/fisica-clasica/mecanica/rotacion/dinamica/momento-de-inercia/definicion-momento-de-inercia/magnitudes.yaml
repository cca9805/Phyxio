magnitudes:
- id: I
  symbol: I
  nombre:
    es: Momento de inercia
    en: Moment of inertia
  descripcion:
    es: Medida de la resistencia rotacional de un cuerpo respecto a un eje específico. Depende de la cantidad de masa y de su distribución radial respecto al eje.
    en: Measure of the rotational resistance of a body relative to a specific axis. Depends on the amount of mass and its radial distribution relative to the axis.
  unidad_si: kg·m²
  dimension: ML²
  is_vector: false
  components: null
  category: derived
  physical_role: parameter
  used_in:
  - segunda_ley_rotacional
  - energia_rotacional
  - radio_giro
  common_mistake:
    es: Tratar I como propiedad intrínseca del objeto, independiente del eje de giro. Todo cálculo sin eje explícito es incompleto.
    en: Treating I as an intrinsic property of the object, independent of the rotation axis. Any calculation without an explicit axis is incomplete.
  typical_range:
    es: 10⁻³ kg·m² (disco pequeño de laboratorio) a 10³ kg·m² (volante industrial).
    en: 10⁻³ kg·m² (small lab disk) to 10³ kg·m² (industrial flywheel).
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo o nulo. Es suma de términos m_i·r_i² no negativos. Un I negativo indica error físicamente imposible en los datos.
      en: Always positive or zero. It is a sum of non-negative m_i·r_i² terms. A negative I indicates a physically impossible data error.
  zero_behavior:
    allowed: true
    meaning:
      es: I = 0 solo si toda la masa está sobre el eje (caso límite de partícula puntual en el eje). En práctica, I > 0 para cualquier objeto macroscópico.
      en: I = 0 only if all mass lies on the axis (limit case of a point mass on the axis). In practice, I > 0 for any macroscopic object.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: '[0, ∞)'
  interpretation_role:
    primary_for:
    - alpha
    - K_rot
    secondary_for:
    - omega
    - k
  graph_binding:
    channels: []
  pedagogical_notes:
    es: I no es propied intrínseca del objeto sino del par objeto–eje. La dependencia cuadrática r² significa que doblar la distancia de la masa al eje cuadruplica su contribución a I. Esto es el núcleo físico de toda la dinámica rotacional.
    en: I is not an intrinsic property of the object but of the object–axis pair. The quadratic dependence r² means that doubling the mass distance from axis quadruples its contribution to I. This is the physical core of all rotational dynamics.
- id: m
  symbol: m
  nombre:
    es: Masa total
    en: Total mass
  descripcion:
    es: Masa total del cuerpo rígido o del sistema de partículas utilizada en la fórmula del radio de giro.
    en: Total mass of the rigid body or particle system used in the radius of gyration formula.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: fundamental
  physical_role: parameter
  used_in:
  - radio_giro
  common_mistake:
    es: Usar el peso (mg, en newtons) en lugar de la masa (kg). O confundir la masa total M con la masa de una partícula individual m_i.
    en: Using weight (mg, in newtons) instead of mass (kg). Or confusing total mass M with the mass of an individual particle m_i.
  typical_range:
    es: 10⁻³ kg a 10⁶ kg según el sistema.
    en: 10⁻³ kg to 10⁶ kg depending on the system.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo en mecánica clásica. Una masa nula implica ausencia de objeto; sin sentido físico.
      en: Always positive in classical mechanics. Zero mass implies absence of object; no physical meaning.
  zero_behavior:
    allowed: false
    meaning:
      es: Masa nula hace que I = mk² = 0, lo que solo tendría sentido para un objeto sin materia.
      en: Zero mass makes I = mk² = 0, which only makes sense for an object with no matter.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: (0, ∞)
  interpretation_role:
    primary_for:
    - k
    secondary_for:
    - I
  graph_binding:
    channels: []
  pedagogical_notes:
    es: La masa es condición necesaria pero no suficiente para determinar I. Dos cuerpos con igual masa total pueden tener inercias rotacionales radicalmente distintas si su distribución espacial es diferente.
    en: Mass is necessary but not sufficient to determine I. Two bodies with the same total mass can have radically different rotational inertias if their spatial distribution differs.
- id: r
  symbol: r
  nombre:
    es: Distancia al eje
    en: Distance to axis
  descripcion:
    es: Distancia perpendicular desde un elemento de masa hasta el eje de giro.
    en: Perpendicular distance from a mass element to the rotation axis.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: parameter
  used_in:
  - definicion_discreta
  - definicion_continua
  common_mistake:
    es: Usar la distancia oblicua o la longitud total del objeto en lugar de la distancia perpendicular al eje. También confundir radio con diámetro.
    en: Using the oblique distance or the total object length instead of the perpendicular distance to the axis. Also confusing radius with diameter.
  typical_range:
    es: 10⁻² a 10¹ m según el tamaño del sistema.
    en: 10⁻² to 10¹ m depending on system size.
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una distancia euclidiana, siempre no negativa. Entra al cuadrado en la fórmula, por lo que r y −r dan la misma contribución a I.
      en: It is a Euclidean distance, always non-negative. It enters squared in the formula, so r and −r give the same contribution to I.
  zero_behavior:
    allowed: true
    meaning:
      es: r = 0 significa que el elemento de masa está sobre el eje. Su contribución a I es nula para ese eje.
      en: r = 0 means the mass element lies on the axis. Its contribution to I is zero for that axis.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: '[0, ∞)'
  interpretation_role:
    primary_for:
    - I
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes:
    es: La dependencia cuadrática r² es la razón por la que la geometría domina la inercia. Doblar r cuadruplica la contribución de esa masa a I; triplicar r la multiplica por nueve.
    en: The quadratic dependence r² is why geometry dominates inertia. Doubling r quadruples that mass element's contribution to I; tripling r multiplies it by nine.
- id: k
  symbol: k
  nombre:
    es: Radio de giro
    en: Radius of gyration
  descripcion:
    es: Distancia equivalente donde se podría concentrar toda la masa del cuerpo para obtener el mismo momento de inercia respecto al eje dado.
    en: Equivalent distance where all the body's mass could be concentrated to obtain the same moment of inertia relative to the given axis.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: parameter
  used_in:
  - radio_giro
  common_mistake:
    es: Confundir k con el radio físico del objeto. k es una distancia equivalente geométrica, no una dimensión real del cuerpo.
    en: Confusing k with the object's physical radius. k is an equivalent geometric distance, not a real body dimension.
  typical_range:
    es: Siempre menor o igual al radio máximo del objeto. Para un disco sólido k = R/√2 ≈ 0.707 R.
    en: Always less than or equal to the object's maximum radius. For a solid disk k = R/√2 ≈ 0.707 R.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo; es una distancia efectiva. Si el cálculo da k negativo, hay un error previo en I o m.
      en: Always positive; it is an effective distance. If the calculation gives negative k, there is a prior error in I or m.
  zero_behavior:
    allowed: true
    meaning:
      es: k = 0 implica I = 0, solo posible si toda la masa está sobre el eje. En práctica es un límite teórico.
      en: k = 0 implies I = 0, only possible if all mass is on the axis. In practice it is a theoretical limit.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: '[0, r_max]'
  interpretation_role:
    primary_for: []
    secondary_for:
    - I
  graph_binding:
    channels: []
  pedagogical_notes:
    es: k condensa toda la geometría del cuerpo en un único número. En ingeniería estructural, los catálogos de perfiles metálicos listan k directamente porque es la magnitud que determina la resistencia a la pandemia rotacional.
    en: k condenses the entire body geometry into a single number. In structural engineering, metal profile catalogs list k directly because it determines resistance to rotational buckling.
- id: tau
  symbol: \tau
  nombre:
    es: Torque neto
    en: Net torque
  descripcion:
    es: Momento de fuerza resultante que actúa sobre el cuerpo y produce aceleración angular.
    en: Resultant force moment acting on the body and producing angular acceleration.
  unidad_si: N·m
  dimension: ML²T⁻²
  is_vector: true
  components:
  - \tau_x
  - \tau_y
  - \tau_z
  category: derived
  physical_role: state
  used_in:
  - segunda_ley_rotacional
  common_mistake:
    es: No considerar el ángulo entre la fuerza aplicada y el brazo de palanca. Solo la componente perpendicular al radio produce torque.
    en: Not considering the angle between the applied force and the lever arm. Only the component perpendicular to the radius produces torque.
  typical_range:
    es: 10⁻¹ a 10⁶ N·m dependiendo del sistema.
    en: 10⁻¹ to 10⁶ N·m depending on the system.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo indica rotación antihoraria (convención estándar); negativo indica rotación horaria. El signo de τ determina el signo y dirección de α.
      en: Positive indicates counterclockwise rotation (standard convention); negative indicates clockwise. The sign of τ determines the sign and direction of α.
  zero_behavior:
    allowed: true
    meaning:
      es: 'τ = 0 implica α = 0: movimiento rotacional uniforme o reposo angular. El sistema no cambia de velocidad de giro.'
      en: 'τ = 0 implies α = 0: uniform rotational motion or angular rest. The system does not change its rotation speed.'
  value_nature:
    kind: signed_scalar_or_vector
    nonnegative_only: false
    expected_interval: (-∞, ∞)
  interpretation_role:
    primary_for:
    - alpha
    secondary_for:
    - I
  graph_binding:
    channels: []
  pedagogical_notes:
    es: 'τ es la causa, α es el efecto, I es el mediador. La interpretación causal es: τ → I → α. No existe α sin τ (a menos que I cambie). No existe relación directa τ–ω sin pasar por α.'
    en: 'τ is the cause, α is the effect, I is the mediator. The causal interpretation is: τ → I → α. There is no α without τ (unless I changes). There is no direct τ–ω relation without going through α.'
- id: alpha
  symbol: \alpha
  nombre:
    es: Aceleración angular
    en: Angular acceleration
  descripcion:
    es: Razón de cambio de la velocidad angular del cuerpo en el tiempo.
    en: Rate of change of the body's angular velocity over time.
  unidad_si: rad/s²
  dimension: T⁻²
  is_vector: true
  components:
  - \alpha_x
  - \alpha_y
  - \alpha_z
  category: derived
  physical_role: state
  used_in:
  - segunda_ley_rotacional
  common_mistake:
    es: Olvidar que α es el resultado de τ/I, no un valor libre. Fijarlo arbitrariamente sin conocer τ e I produce contradicciones físicas.
    en: Forgetting that α is the result of τ/I, not a free value. Setting it arbitrarily without knowing τ and I produces physical contradictions.
  typical_range:
    es: 10⁻¹ a 10² rad/s² para sistemas macroscópicos habituales.
    en: 10⁻¹ to 10² rad/s² for typical macroscopic systems.
  sign_behavior:
    has_sign: true
    meaning:
      es: Mismo signo que τ si no hay otras fuerzas. Positivo = aceleración angular en sentido antihorario; negativo = desaceleración o giro horario acelerado.
      en: Same sign as τ if no other forces. Positive = angular acceleration counterclockwise; negative = deceleration or accelerated clockwise rotation.
  zero_behavior:
    allowed: true
    meaning:
      es: α = 0 con τ ≠ 0 e I finita es una contradicción. α = 0 solo es físicamente coherente cuando τ = 0 o cuando I → ∞.
      en: α = 0 with τ ≠ 0 and finite I is a contradiction. α = 0 is physically coherent only when τ = 0 or when I → ∞.
  value_nature:
    kind: signed_scalar_or_vector
    nonnegative_only: false
    expected_interval: (-∞, ∞)
  interpretation_role:
    primary_for: []
    secondary_for:
    - tau
    - I
  graph_binding:
    channels: []
  pedagogical_notes:
    es: 'Cuanto mayor sea I, menor será α para el mismo τ. Este es el mecanismo de filtrado inercial: una gran inercia suaviza los cambios bruscos de velocidad angular, actuando como amortiguador dinámico.'
    en: 'The larger I is, the smaller α will be for the same τ. This is the inertial filtering mechanism: large inertia smooths abrupt angular velocity changes, acting as a dynamic damper.'
- id: omega
  symbol: \omega
  nombre:
    es: Velocidad angular
    en: Angular velocity
  descripcion:
    es: Velocidad instantánea de giro del cuerpo en radianes por segundo.
    en: Instantaneous rotation speed of the body in radians per second.
  unidad_si: rad/s
  dimension: T⁻¹
  is_vector: true
  components:
  - \omega_x
  - \omega_y
  - \omega_z
  category: derived
  physical_role: state
  used_in:
  - energia_rotacional
  common_mistake:
    es: No elevar omega al cuadrado en K_rot = ½Iω². También confundir rad/s con RPM (1 RPM = 2π/60 rad/s ≈ 0.105 rad/s).
    en: Not squaring omega in K_rot = ½Iω². Also confusing rad/s with RPM (1 RPM = 2π/60 rad/s ≈ 0.105 rad/s).
  typical_range:
    es: 1 a 1000 rad/s para la mayoría de sistemas mecánicos.
    en: 1 to 1000 rad/s for most mechanical systems.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica el sentido de giro. Sin embargo, entra al cuadrado en K_rot, por lo que la energía cinética es siempre positiva independientemente del sentido.
      en: The sign indicates the direction of rotation. However, it enters squared in K_rot, so kinetic energy is always positive regardless of direction.
  zero_behavior:
    allowed: true
    meaning:
      es: 'ω = 0 implica K_rot = 0: el cuerpo está en reposo rotacional. La inercia I existe aunque el cuerpo no gire.'
      en: 'ω = 0 implies K_rot = 0: the body is in rotational rest. Inertia I exists even if the body does not rotate.'
  value_nature:
    kind: signed_scalar_or_vector
    nonnegative_only: false
    expected_interval: (-∞, ∞)
  interpretation_role:
    primary_for:
    - K_rot
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes:
    es: En K_rot = ½Iω², ω entra al cuadrado pero I no. Duplicar ω cuadruplica K_rot; duplicar I solo la dobla. Esto explica por qué la velocidad domina energéticamente sobre la inercia en sistemas de almacenamiento.
    en: In K_rot = ½Iω², ω enters squared but I does not. Doubling ω quadruples K_rot; doubling I only doubles it. This explains why velocity dominates energetically over inertia in storage systems.
- id: K_rot
  symbol: K_{\mathrm{rot}}
  nombre:
    es: Energía cinética rotacional
    en: Rotational kinetic energy
  descripcion:
    es: Energía cinética asociada al movimiento de rotación del cuerpo rígido.
    en: Kinetic energy associated with the rigid body's rotational motion.
  unidad_si: J
  dimension: ML²T⁻²
  is_vector: false
  components: null
  category: derived
  physical_role: state
  used_in:
  - energia_rotacional
  common_mistake:
    es: Mezclar K_rot con la energía cinética traslacional sin sumar ambas en un cuerpo que también se desplaza (rodadura, caída).
    en: Mixing K_rot with translational kinetic energy without summing both in a body that also translates (rolling, falling).
  typical_range:
    es: 1 a 10⁶ J dependiendo de la masa, geometría y velocidad angular.
    en: 1 to 10⁶ J depending on mass, geometry, and angular velocity.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva o nula. La energía cinética no puede ser negativa. Un resultado negativo indica error de cálculo, no una situación física real.
      en: Always positive or zero. Kinetic energy cannot be negative. A negative result indicates a calculation error, not a real physical situation.
  zero_behavior:
    allowed: true
    meaning:
      es: 'K_rot = 0 implica ω = 0: el cuerpo está en reposo rotacional instantáneo.'
      en: 'K_rot = 0 implies ω = 0: the body is in instantaneous rotational rest.'
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: '[0, ∞)'
  interpretation_role:
    primary_for: []
    secondary_for:
    - omega
    - I
  graph_binding:
    channels: []
  pedagogical_notes:
    es: K_rot cuantifica la energía 'almacenada' en el giro. En diseño de volantes de inercia (flywheels) y sistemas KERS, saber K_rot e I permite calcular ω instantáneamente, lo que es vital para el control de potencia.
    en: K_rot quantifies the energy 'stored' in rotation. In flywheel and KERS system design, knowing K_rot and I instantly gives ω, which is vital for power control.
- id: m_i
  symbol: m_i
  nombre:
    es: Masa de la partícula i
    en: Mass of particle i
  descripcion:
    es: Masa de la i-ésima partícula puntual en el sistema discreto de la definición de momento de inercia.
    en: Mass of the i-th point particle in the discrete system for the moment of inertia definition.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: auxiliary
  physical_role: parameter
  used_in:
  - definicion_discreta
  common_mistake:
    es: Sumar las masas m_i sin multiplicar por r_i². El error produce I en unidades incorrectas (kg en vez de kg·m²).
    en: Summing masses m_i without multiplying by r_i². The error produces I with incorrect units (kg instead of kg·m²).
  typical_range:
    es: Depende del sistema; desde gramos (experimentos de laboratorio) hasta toneladas (maquinaria industrial).
    en: Depends on the system; from grams (lab experiments) to tonnes (industrial machinery).
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo. Una partícula con masa nula no existe físicamente en el modelado clásico.
      en: Always positive. A massless particle does not exist physically in classical modeling.
  zero_behavior:
    allowed: false
    meaning:
      es: Masa nula no contribuye a I. La partícula deja de tener significado físico en este contexto.
      en: Zero mass does not contribute to I. The particle loses physical meaning in this context.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: (0, ∞)
  interpretation_role:
    primary_for:
    - I
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes:
    es: m_i es cada masa individual en la suma discreta I = Σm_i·r_i². Su contribución a I escala cuadráticamente con r_i; la partícula más lejana suele dominar la suma total.
    en: m_i is each individual mass in the discrete sum I = Σm_i·r_i². Its contribution to I scales quadratically with r_i; the farthest particle usually dominates the total sum.
- id: r_i
  symbol: r_i
  nombre:
    es: Distancia de la partícula i al eje
    en: Distance of particle i to the axis
  descripcion:
    es: Distancia perpendicular de la i-ésima partícula puntual al eje de rotación en el sistema discreto.
    en: Perpendicular distance of the i-th point particle to the rotation axis in the discrete system.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: auxiliary
  physical_role: parameter
  used_in:
  - definicion_discreta
  common_mistake:
    es: Usar la distancia total desde el origen en lugar de la distancia perpendicular al eje de giro.
    en: Using the total distance from the origin instead of the perpendicular distance to the rotation axis.
  typical_range:
    es: Depende del sistema; desde milímetros hasta metros.
    en: Depends on the system; from millimeters to meters.
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una distancia, siempre no negativa. Entra al cuadrado en la sumatoria, eliminando cualquier ambigüedad de signo.
      en: It is a distance, always non-negative. It enters squared in the summation, eliminating any sign ambiguity.
  zero_behavior:
    allowed: true
    meaning:
      es: Si r_i = 0 la partícula está sobre el eje y no aporta a I para ese eje.
      en: If r_i = 0 the particle is on the axis and contributes nothing to I for that axis.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: '[0, ∞)'
  interpretation_role:
    primary_for:
    - I
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes:
    es: r_i es el "brazo de palanca rotacional" de cada partícula. Aparece al cuadrado, lo que hace que su impacto en I sea no lineal y que las partículas lejanas al eje sean desproporcionadamente influyentes.
    en: r_i is the "rotational lever arm" of each particle. It appears squared, making its impact on I non-linear and distant particles disproportionately influential.
- id: dm
  symbol: dm
  nombre:
    es: Elemento diferencial de masa
    en: Differential mass element
  descripcion:
    es: Elemento infinitesimal de masa en la integración para cuerpos continuos; variable de integración en I = ∫r²dm.
    en: Infinitesimal mass element in the integration for continuous bodies; integration variable in I = ∫r²dm.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category: auxiliary
  physical_role: parameter
  used_in:
  - definicion_continua
  common_mistake:
    es: Tratar dm como la masa total del cuerpo en lugar de como variable de integración infinitesimal.
    en: Treating dm as the total body mass instead of as an infinitesimal integration variable.
  typical_range:
    es: Infinitesimal; no tiene valor numérico finito en sí mismo. Su integral da la masa total M.
    en: Infinitesimal; has no finite numerical value by itself. Its integral gives total mass M.
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo. La densidad de materia es no negativa en mecánica clásica.
      en: Always positive. Matter density is non-negative in classical mechanics.
  zero_behavior:
    allowed: false
    meaning:
      es: dm no tiene valor puntual finito. Su sentido es solo como límite del proceso de integración.
      en: dm has no finite point value. Its meaning is only as a limit of the integration process.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: (0, ∞)
  interpretation_role:
    primary_for:
    - I
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes:
    es: dm representa cada "rodaja" infinitesimal de masa del objeto continuo. Conecta la distribución geométrica (a través de ρ·dV) con la inercia total mediante la integral I = ∫r²dm.
    en: dm represents each infinitesimal "slice" of mass of the continuous object. It connects the geometric distribution (through ρ·dV) with total inertia through the integral I = ∫r²dm.
- id: rho
  symbol: \rho
  nombre:
    es: Densidad de masa
    en: Mass density
  descripcion:
    es: Relación entre la masa y el volumen (o longitud/área) del cuerpo. Determina cómo se distribuye dm en el espacio.
    en: Ratio between mass and volume (or length/area) of the body. Determines how dm is distributed in space.
  unidad_si: kg/m³
  dimension: ML⁻³
  is_vector: false
  components: null
  category: auxiliary
  physical_role: parameter
  used_in:
  - definicion_continua
  - ejemplos.md
  common_mistake:
    es: Asumir densidad uniforme en sistemas donde la masa varía con la posición (ρ dependiente de r).
    en: Assuming uniform density in systems where mass varies with position (ρ dependent on r).
  typical_range:
    es: 1.2 kg/m³ (aire) a 22,500 kg/m³ (osmio).
    en: 1.2 kg/m³ (air) to 22,500 kg/m³ (osmium).
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva. Una densidad negativa implicaría materia exótica no considerada en este leaf.
      en: Always positive. A negative density would imply exotic matter not considered in this leaf.
  zero_behavior:
    allowed: false
    meaning:
      es: Densidad nula implica ausencia de materia, invalidando el cálculo de inercia del cuerpo.
      en: Zero density implies absence of matter, invalidating the body's inertia calculation.
  value_nature:
    kind: continuous_scalar
    nonnegative_only: true
    expected_interval: (0, ∞)
  interpretation_role:
    primary_for:
    - dm
    secondary_for:
    - I
  graph_binding:
    channels: []
