version: 1
formulas:
- id: aro-fino
  title:
    es: Aro Fino o Cilindro Hueco de pared delgada
    en: Thin Ring or Thin-walled Hollow Cylinder
  equation: I = m * R^2
  latex: I = m R^2
  rearrangements:
  - target: I
    equation: I = m * R^2
    latex: I = mR^2
  - target: m
    equation: m = I / R^2
    latex: m = \frac{I}{R^2}
  - target: R
    equation: R = sqrt(I / m)
    latex: R = \sqrt{\frac{I}{m}}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Toda la masa se encuentra concentrada a la misma distancia R del eje de giro.
    en: All mass is concentrated at the same distance R from the rotation axis.
  constraints:
    es: Masa distribuida uniformemente en la periferia.
    en: Mass uniformly distributed on the periphery.
  validity:
    es: Geometrías anulares y cilindros muy delgados.
    en: Ring geometries and very thin cylinders.
  dimension_check: '[M L^2] = [M] * [L^2]'
  calculable: true
  motivo_no_calculable: No aplica. Formula calculable con datos suficientes.
  used_in:
  - teoria.md
  - ejemplos.md
  interpretation_tags:
  - aro-fino
  - rotational_dynamics
  result_semantics:
    target: m
    kind: scalar
    sign_meaning:
      es: El signo depende de la convencion de ejes adoptada.
      en: Sign depends on the adopted axis convention.
    absolute_value_meaning:
      es: El modulo expresa la intensidad del efecto rotacional.
      en: Magnitude expresses rotational effect intensity.
  domain_checks:
  - condition: input_values_within_valid_range
    message:
      es: Verificar que los datos de entrada esten dentro del dominio fisico de la
        formula.
      en: Check that input values are inside the formula physical domain.
  coherence_checks:
  - check: result_consistent_with_units_and_signs
    warning:
      es: Revisar signos y unidades si el resultado contradice la lectura fisica esperada.
      en: Review signs and units if result contradicts expected physical reading.
  graph_implications:
  - if: graph_available
    then:
      es: Representar la tendencia del resultado en el grafico asociado para lectura
        cualitativa.
      en: Represent result trend in associated graph for qualitative reading.
  pedagogical_triggers:
  - condition: common_sign_or_units_error
    hint:
      es: Comprobar unidades SI y coherencia de signo antes de interpretar el valor
        final.
      en: Check SI units and sign consistency before interpreting final value.
- id: disco-macizo
  title:
    es: Disco Macizo o Cilindro Sólido
    en: Solid Disk or Solid Cylinder
  equation: I = 0.5 * m * R^2
  latex: I = \frac{1}{2} m R^2
  rearrangements:
  - target: I
    equation: I = 0.5 * m * R^2
    latex: I = \frac{1}{2}mR^2
  - target: m
    equation: m = 2 * I / R^2
    latex: m = \frac{2I}{R^2}
  - target: R
    equation: R = sqrt(2 * I / m)
    latex: R = \sqrt{\frac{2I}{m}}
