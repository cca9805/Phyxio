- id: barra-extremo
  title:
    es: Barra Delgada (Eje por un extremo)
    en: Thin Rod (Axis through one end)
  equation: I = (1/3) * m * L^2
  latex: I = \frac{1}{3} m L^2
  rearrangements:
  - target: I
    equation: I = (1/3) * m * L^2
    latex: I = \frac{1}{3}mL^2
  - target: m
    equation: m = 3 * I / L^2
    latex: m = \frac{3I}{L^2}
  - target: L
    equation: L = sqrt(3 * I / m)
    latex: L = \sqrt{\frac{3I}{m}}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La inercia aumenta significativamente al alejar el eje del centro de masas.
    en: Inertia increases significantly by moving the axis away from the center of
      mass.
  constraints:
    es: Varilla delgada, eje perpendicular.
    en: Thin rod, perpendicular axis.
  validity:
    es: Péndulos físicos, bates de béisbol, hélices.
    en: Physical pendulums, baseball bats, propellers.
  dimension_check: '[M L^2] = [M] * [L^2]'
