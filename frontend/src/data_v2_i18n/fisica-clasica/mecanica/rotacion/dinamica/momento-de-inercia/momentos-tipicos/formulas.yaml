  latex: I = \frac{1}{12} m L^2
  rearrangements:
  - target: I
    equation: I = (1/12) * m * L^2
    latex: I = \frac{1}{12}mL^2
  - target: m
    equation: m = 12 * I / L^2
    latex: m = \frac{12I}{L^2}
  - target: L
    equation: L = sqrt(12 * I / m)
    latex: L = \sqrt{\frac{12I}{m}}
