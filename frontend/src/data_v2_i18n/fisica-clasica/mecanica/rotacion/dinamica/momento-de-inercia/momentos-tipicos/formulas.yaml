- id: placa-rectangular
  title:
    es: Placa Rectangular Delgada (Eje por el centro)
    en: Thin Rectangular Plate (Axis through center)
  equation: I = (1/12) * m * (a^2 + b^2)
  latex: I = \frac{1}{12}m(a^2 + b^2)
  rearrangements:
  - target: I
    equation: I = (1/12) * m * (a^2 + b^2)
    latex: I = \frac{1}{12}m(a^2 + b^2)
  - target: m
    equation: m = 12 * I / (a^2 + b^2)
    latex: m = \frac{12I}{a^2 + b^2}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La inercia depende de ambas dimensiones en el plano perpendicular al eje.
    en: Inertia depends on both dimensions in the plane perpendicular to the axis.
  constraints:
    es: Placa delgada girando perpendicular a su plano.
    en: Thin plate rotating perpendicular to its plane.
  validity:
