version: 1
id: interpretacion-momentos-tipicos
leaf_id: momentos-tipicos
nombre:
  es: Interpretacion de momentos tipicos
  en: Interpretation of standard moments
author: phyxio
scope:
  es: lectura numerica, comparacion entre geometrias y errores comunes de ejes y unidades
  en: numerical reading, geometry comparison, and common axis and unit mistakes
dependencies:
  magnitudes:
  - I
  - L
  - R
  - a
  - b
  - m
  formulas:
  - aro-fino
  - barra-centro
  - barra-extremo
  - disco-macizo
  - esfera-maciza
  - placa-rectangular
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia fisica
      en: Physical coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura del grafico
      en: Graph reading
  likely_errors:
    title:
      es: Errores comunes
      en: Common errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  I:
    summary_rules:
    - id: I_summary_main
      when: 'true'
      status: info
      text:
        es: I depende de la masa y de como esta distribuida respecto al eje.
        en: I depends on mass and on how it is distributed around the axis.
    coherence_rules:
    - id: I_coherence_positive
      when: I > 0
      status: ok
      text:
        es: Un momento de inercia fisico debe ser positivo.
        en: A physical moment of inertia must be positive.
    physical_reading_rules:
    - id: I_physical_main
      when: 'true'
      status: info
      text:
        es: Geometrias con masa lejos del eje producen mayor I.
        en: Geometries with mass farther from axis produce larger I.
    model_validity_rules:
    - id: I_validity_main
      when: 'true'
      status: info
      text:
        es: Valido para solidos rigidos y densidad aproximadamente uniforme.
        en: Valid for rigid solids and approximately uniform density.
    graph_rules:
    - id: I_graph_main
      when: 'true'
      status: info
      text:
        es: El grafico debe reflejar crecimiento lineal con m y cuadratico con dimension lineal.
        en: Graph behavior should show linear growth with m and quadratic growth with linear size.
    likely_errors:
    - id: I_error_axis
      when: 'true'
      status: warning
      text:
        es: 'Error comun: usar formula de un eje distinto al del problema.'
        en: 'Common error: using a formula for an axis different from the problem axis.'
    next_step_rules:
    - id: I_next_main
      when: 'true'
      status: info
      text:
        es: Usa I en tau = I alpha para conectar con dinamica rotacional.
        en: Use I in tau = I alpha to connect with rotational dynamics.
  R:
    summary_rules:
    - id: R_summary_main
      when: 'true'
      status: info
      text:
        es: R controla fuertemente I por su dependencia cuadratica.
        en: R strongly controls I due to its quadratic dependence.
    coherence_rules:
    - id: R_coherence_positive
      when: R > 0
      status: ok
      text:
        es: El radio o dimension lineal debe ser positiva.
        en: Radius or linear size must be positive.
    physical_reading_rules:
    - id: R_physical_main
      when: 'true'
      status: info
      text:
        es: Incrementar R aumenta la resistencia al giro de forma notable.
        en: Increasing R raises rotational resistance significantly.
    model_validity_rules:
    - id: R_validity_main
      when: 'true'
      status: info
      text:
        es: Verifica que R represente la distancia correcta al eje real.
        en: Verify R represents the correct distance to the actual axis.
    graph_rules:
    - id: R_graph_main
      when: 'true'
      status: info
      text:
        es: Las curvas I-R deben mostrar tendencia parabola.
        en: I-R curves should show a parabola trend.
    likely_errors:
    - id: R_error_diameter
      when: 'true'
      status: warning
      text:
        es: 'Error comun: confundir radio con diametro.'
        en: 'Common error: confusing radius with diameter.'
    next_step_rules:
    - id: R_next_main
      when: 'true'
      status: info
      text:
        es: Contrasta resultados entre disco, aro y esfera para el mismo R.
        en: Compare disk, ring, and sphere results for the same R.
  L:
    summary_rules:
    - id: L_summary
      when: always
      status: info
      text:
        es: 'L: lectura resumida disponible.'
        en: 'L: summary reading available.'
    coherence_rules:
    - id: L_coherence
      when: always
      status: info
      text:
        es: 'L: verificar coherencia con el resto de variables.'
        en: 'L: check coherence with the rest of the variables.'
    physical_reading_rules:
    - id: L_physical
      when: always
      status: info
      text:
        es: 'L: interpretar en el contexto f?sico del problema.'
        en: 'L: interpret within the physical context of the problem.'
    model_validity_rules:
    - id: L_validity
      when: always
      status: info
      text:
        es: 'L: confirmar hip?tesis y rango de validez del modelo.'
        en: 'L: confirm assumptions and model validity range.'
    graph_rules:
    - id: L_graph
      when: always
      status: info
      text:
        es: 'L: revisar correspondencia con la representaci?n gr?fica.'
        en: 'L: review consistency with the graphical representation.'
    likely_errors:
    - id: L_likely_error
      when: always
      status: warn
      text:
        es: 'Error com?n: usar L sin revisar signo, unidades o dominio.'
        en: 'Common error: using L without checking sign, units, or domain.'
    next_step_rules:
    - id: L_next_step
      when: always
      status: info
      text:
        es: 'Siguiente paso: contrastar L con una ecuaci?n independiente.'
        en: 'Next step: cross-check L with an independent equation.'
  m:
    summary_rules:
    - id: m_summary
      when: always
      status: info
      text:
        es: 'm: lectura resumida disponible.'
        en: 'm: summary reading available.'
    coherence_rules:
    - id: m_coherence
      when: always
      status: info
      text:
        es: 'm: verificar coherencia con el resto de variables.'
        en: 'm: check coherence with the rest of the variables.'
    physical_reading_rules:
    - id: m_physical
      when: always
      status: info
      text:
        es: 'm: interpretar en el contexto f?sico del problema.'
        en: 'm: interpret within the physical context of the problem.'
    model_validity_rules:
    - id: m_validity
      when: always
      status: info
      text:
        es: 'm: confirmar hip?tesis y rango de validez del modelo.'
        en: 'm: confirm assumptions and model validity range.'
    graph_rules:
    - id: m_graph
      when: always
      status: info
      text:
        es: 'm: revisar correspondencia con la representaci?n gr?fica.'
        en: 'm: review consistency with the graphical representation.'
    likely_errors:
    - id: m_likely_error
      when: always
      status: warn
      text:
        es: 'Error com?n: usar m sin revisar signo, unidades o dominio.'
        en: 'Common error: using m without checking sign, units, or domain.'
    next_step_rules:
    - id: m_next_step
      when: always
      status: info
      text:
        es: 'Siguiente paso: contrastar m con una ecuaci?n independiente.'
        en: 'Next step: cross-check m with an independent equation.'
