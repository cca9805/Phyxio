  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar m.
    en: Check units and reference axis when using m.
- id: R
  symbol: R
  nombre:
    es: Radio
    en: Radius
  descripcion:
    es: Distancia característica desde el eje a la periferia en cuerpos con simetría circular (aros, discos, esferas).
    en: Characteristic distance from the axis to the periphery in bodies with circular symmetry (rings, disks, spheres).
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: parameter
  used_in:
  - aro-fino
  - disco-macizo
  - esfera-maciza
  common_mistake:
    es: Confundir el radio exterior con el radio medio en cilindros de pared gruesa.
    en: Confusing the outer radius with the mean radius in thick-walled cylinders.
  typical_range:
    es: $10^{-2}$ a $10^1\text{ m}$.
    en: $10^{-2}$ to $10^1\text{ m}$.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
