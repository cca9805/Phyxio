version: 1
magnitudes:
- id: I
  symbol: I
  nombre:
    es: Momento de inercia
    en: Moment of inertia
  descripcion:
    es: Magnitud que cuantifica la resistencia rotacional de un cuerpo rígido para una geometría y eje específicos.
    en: Quantity that quantifies the rotational resistance of a rigid body for a specific geometry and axis.
  unidad_si: kg·m²
  dimension: ML²
  is_vector: false
  components: null
  category:
    es: derivada
    en: derived
  physical_role:
    es: parámetro
    en: parameter
  used_in:
  - aro-fino
  - disco-macizo
  - esfera-maciza
  - barra-centro
  - barra-extremo
  - placa-rectangular
  common_mistake:
    es: Usar el momento de inercia respecto al centro de masas cuando el giro ocurre en un borde.
    en: Using the moment of inertia relative to the center of mass when rotation occurs at an edge.
  typical_range:
    es: Depende de la escala del objeto (desde $10^{-6}$ hasta $10^6\text{ kg}\cdot\text{m}^2$).
    en: Depends on the object's scale (from $10^{-6}$ to $10^6\text{ kg}\cdot\text{m}^2$).
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar I.
    en: Check units and reference axis when using I.
- id: m
  symbol: m
  nombre:
    es: Masa
    en: Mass
  descripcion:
    es: Masa total del cuerpo rígido.
    en: Total mass of the rigid body.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category:
    es: fundamental
    en: fundamental
  physical_role:
    es: parámetro
    en: parameter
  used_in:
  - aro-fino
  - disco-macizo
  - esfera-maciza
  - barra-centro
  - barra-extremo
  - placa-rectangular
  common_mistake:
    es: Ignorar que la inercia depende de cómo se distribuye esta masa, no solo de su valor total.
    en: Ignoring that inertia depends on how this mass is distributed, not just its total value.
  typical_range:
    es: Variable según el sistema.
    en: Variable depending on the system.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
