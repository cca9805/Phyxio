version: 1
magnitudes:
- id: tensor_inercia
  symbol: tensor_{inercia}
  nombre:
    es: Tensor de Inercia
    en: Inertia Tensor
  descripcion:
    es: Matriz simétrica de 3x3 que describe la distribución de masa de un cuerpo
      rígido respecto a un sistema de ejes coordenados.
    en: 3x3 symmetric matrix describing the mass distribution of a rigid body relative
      to a coordinate system.
  unidad_si: kg·m²
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - tensor-de-inercia
  common_mistake: Confundir tensor_inercia con otra magnitud cercana dentro de tensor
    de inercia.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - tensor-de-inercia
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar tensor_inercia con una definicion estable antes de sustituir
    valores.
