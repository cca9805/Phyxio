version: 1
formulas:
- id: steiner-directa
  title:
    es: Teorema de los Ejes Paralelos (Steiner)
    en: Parallel Axis Theorem (Steiner)
  equation: I = Icm + m * d^2
  latex: I = Icm + m * d^2
  rearrangements:
  - target: I
    equation: I = Icm + m * d^2
    latex: I = Icm + m * d^2
  - target: Icm
    equation: Icm = I - m * d^2
    latex: Icm = I - m * d^2
  - target: d
    equation: d = sqrt((I - Icm) / m)
    latex: d = sqrt((I - Icm) / m)
  category: fundamental
  relation_type: physical_law
  physical_meaning:
    es: La inercia total se compone de la inercia propia del cuerpo (Icm) más la inercia
      de traslación de su masa como si fuera un punto material a una distancia d.
    en: Total inertia is composed of the body's own inertia (Icm) plus the translational
      inertia of its mass as if it were a point mass at a distance d.
  constraints:
    es: Los dos ejes deben ser estrictamente paralelos.
    en: The two axes must be strictly parallel.
  validity:
    es: Válido para cualquier sólido rígido homogéneo o no, siempre que se conozca
      el centro de masas.
    en: Valid for any rigid solid whether homogeneous or not, as long as the center
      of mass is known.
  dimension_check: '[M L^2] = [M L^2] + [M] * [L^2]'
  calculable: true
  motivo_no_calculable: No aplica. Formula calculable con datos suficientes.
  used_in:
  - teoria.md
  - ejemplos.md
  interpretation_tags:
  - steiner-directa
  - rotational_dynamics
  result_semantics:
    target: Icm
    kind: scalar
    sign_meaning:
      es: El signo depende de la convencion de ejes adoptada.
      en: Sign depends on the adopted axis convention.
    absolute_value_meaning:
      es: El modulo expresa la intensidad del efecto rotacional.
      en: Magnitude expresses rotational effect intensity.
  domain_checks:
  - condition: input_values_within_valid_range
    message:
      es: Verificar que los datos de entrada esten dentro del dominio fisico de la
        formula.
      en: Check that input values are inside the formula physical domain.
  coherence_checks:
  - check: result_consistent_with_units_and_signs
    warning:
      es: Revisar signos y unidades si el resultado contradice la lectura fisica esperada.
      en: Review signs and units if result contradicts expected physical reading.
  graph_implications:
  - if: graph_available
    then:
      es: Representar la tendencia del resultado en el grafico asociado para lectura
        cualitativa.
      en: Represent result trend in associated graph for qualitative reading.
  pedagogical_triggers:
  - condition: common_sign_or_units_error
    hint:
      es: Comprobar unidades SI y coherencia de signo antes de interpretar el valor
        final.
      en: Check SI units and sign consistency before interpreting final value.
- id: respuesta-rotacional
  title:
    es: Dinámica con Eje Desplazado
    en: Dynamics with Shifted Axis
  equation: alpha = tau / I
  latex: \alpha = \frac{\tau}{I}
  rearrangements:
  - target: alpha
    equation: alpha = tau / I
    latex: \alpha = \frac{\tau}{I}
  - target: tau
    equation: tau = I * alpha
    latex: \tau = I\alpha
  - target: I
    equation: I = tau / alpha
    latex: I = \frac{\tau}{\alpha}
  category: derived
  relation_type: definition
  physical_meaning:
    es: El torque aplicado sobre el eje desplazado se opone a la inercia total calculada
      mediante Steiner.
    en: The torque applied about the shifted axis is opposed by the total inertia
      calculated using Steiner's theorem.
  constraints:
    es: I debe ser el momento respecto al eje donde se aplica el torque.
    en: I must be the moment relative to the axis where the torque is applied.
  validity:
    es: Segunda ley de Newton para rotación respecto a un punto fijo.
    en: Newton's second law for rotation about a fixed point.
  dimension_check: '[T^-2] = [M L^2 T^-2] / [M L^2]'
  calculable: true
  motivo_no_calculable: No aplica. Formula calculable con datos suficientes.
