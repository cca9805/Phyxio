version: "1.0"
leaf: "teorema-de-ejes-paralelos"

coord:
  title:
    es: Gráfica Coord · Teorema de Ejes Paralelos (Steiner)
    en: Coord Graph · Parallel Axis Theorem (Steiner)
  xAxis:
    es: distancia d al CM (m)
    en: distance d to CM (m)
  yAxis:
    es: momento de inercia I (kg·m²)
    en: moment of inertia I (kg·m²)
  xMagnitude: d
  yMagnitude: I
  relation:
    es: I = I_CM + md². Parábola en d. Mínimo en d = 0 (eje por CM).
    en: I = I_CM + md². Parabola in d. Minimum at d = 0 (axis through CM).
  physicalReading:
    es: I mínimo cuando el eje pasa por el CM. Crece con d².
    en: I minimum when axis through CM. Grows as d².
  slopeMeaning:
    es: "dI/dd = 2md: crece linealmente con d."
    en: "dI/dd = 2md: grows linearly with d."
  interceptMeaning:
    es: "I(0) = I_CM: mínimo."
    en: "I(0) = I_CM: minimum."
  curvatureMeaning:
    es: "d²I/dd² = 2m: concavidad = 2m."
    en: "d²I/dd² = 2m: concavity = 2m."
  signMeaning:
    es: "I ≥ I_CM > 0."
    en: "I ≥ I_CM > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: d ≥ 0.
    en: d ≥ 0.
  modelConnection:
    es: Teorema de Steiner.
    en: "Steiner's theorem."
  formulaConnection:
    es: I = I_CM + md².
    en: I = I_CM + md².
  readingFocus:
    es: leer mínimo en d = 0 y curvatura = 2m.
    en: read minimum at d = 0 and curvature = 2m.
  agentHints:
    es:
      - I_min = I_CM en d = 0.
      - Crece como d².
      - I = I_CM + md².
    en:
      - I_min = I_CM at d = 0.
      - Grows as d².
      - I = I_CM + md².
  commonMistakes:
    es:
      - I = md².
      - I = I_CM (siempre).
      - I lineal en d.
    en:
      - I = md².
      - I = I_CM (always).
      - I linear in d.
