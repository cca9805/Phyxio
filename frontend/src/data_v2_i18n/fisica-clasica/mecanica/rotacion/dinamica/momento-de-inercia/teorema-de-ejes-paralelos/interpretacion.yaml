        en: 'Icm: check coherence with the rest of the variables.'
    physical_reading_rules:
    - id: Icm_physical
      when: 'true'
      status: info
      text:
        es: 'Icm: interpretar en el contexto fisico del problema.'
        en: 'Icm: interpret within the physical context of the problem.'
    model_validity_rules:
    - id: Icm_validity
      when: 'true'
      status: info
      text:
        es: 'Icm: confirmar hipotesis y rango de validez del modelo.'
        en: 'Icm: confirm assumptions and model validity range.'
    graph_rules:
    - id: Icm_graph
      when: 'true'
      status: info
      text:
        es: 'Icm: revisar correspondencia con la representacion grafica.'
        en: 'Icm: review consistency with the graphical representation.'
    likely_errors:
    - id: Icm_likely_error
      when: 'true'
      status: warning
      text:
        es: 'Error comun: usar Icm sin revisar signo, unidades o dominio.'
        en: 'Common error: using Icm without checking sign, units, or domain.'
    next_step_rules:
    - id: Icm_next_step
      when: 'true'
      status: info
      text:
        es: 'Siguiente paso: contrastar Icm con una ecuacion independiente.'
        en: 'Next step: cross-check Icm with an independent equation.'
