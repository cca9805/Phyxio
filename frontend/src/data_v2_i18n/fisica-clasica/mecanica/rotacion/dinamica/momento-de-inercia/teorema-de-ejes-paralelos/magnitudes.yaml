version: 1
magnitudes:
- id: I
  symbol: I
  nombre:
    es: Momento de inercia (eje paralelo)
    en: Moment of inertia (parallel axis)
  descripcion:
    es: Resistencia rotacional respecto a un eje que no pasa por el centro de masas.
    en: Rotational resistance about an axis that does not pass through the center of mass.
  unidad_si: kg·m²
  dimension: ML²
  is_vector: false
  components: null
  category:
    es: derivada
    en: derived
  physical_role:
    es: variable dependiente
    en: dependent variable
  used_in:
  - steiner-directa
  - respuesta-rotacional
  common_mistake:
    es: Confundir este valor con el momento mínimo (Icm).
    en: Confusing this value with the minimum moment (Icm).
  typical_range:
    es: Siempre mayor que el Icm para la misma orientación.
    en: Always greater than Icm for the same orientation.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar I.
    en: Check units and reference axis when using I.
- id: Icm
  symbol: Icm
  nombre:
    es: Momento de inercia centroidal
    en: Centroidal moment of inertia
  descripcion:
    es: Momento de inercia respecto a un eje paralelo al dado que pasa por el centro de masas.
    en: Moment of inertia about an axis parallel to the given one passing through the center of mass.
  unidad_si: kg·m²
  dimension: ML²
  is_vector: false
  components: null
  category:
    es: derivada
    en: derived
  physical_role:
    es: parámetro
    en: parameter
  used_in:
  - steiner-directa
  common_mistake:
    es: Usar el Icm respecto a un eje que no es paralelo al eje de giro final.
    en: Using Icm about an axis that is not parallel to the final rotation axis.
  typical_range:
    es: Es el valor mínimo de inercia para una dirección de eje dada.
    en: It is the minimum inertia value for a given axis direction.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar Icm.
    en: Check units and reference axis when using Icm.
- id: m
  symbol: m
  nombre:
    es: Masa
    en: Mass
  descripcion:
    es: Masa total del sólido rígido.
    en: Total mass of the rigid solid.
  unidad_si: kg
  dimension: M
  is_vector: false
  components: null
  category:
    es: fundamental
    en: fundamental
  physical_role:
    es: parámetro
    en: parameter
  used_in:
  - steiner-directa
  common_mistake:
    es: Olvidar que toda la masa del cuerpo contribuye al término traslacional.
    en: Forgetting that the entire body mass contributes to the translational term.
  typical_range:
    es: Variable según el sistema.
    en: Variable depending on the system.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar m.
    en: Check units and reference axis when using m.
- id: d
  symbol: d
  nombre:
    es: Distancia entre ejes
    en: Distance between axes
  descripcion:
    es: Separación perpendicular entre el eje que pasa por el centro de masas y el eje paralelo de rotación.
    en: Perpendicular separation between the axis passing through the center of mass and the parallel axis of rotation.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: fundamental
  physical_role: parameter
  used_in:
  - steiner-directa
  common_mistake:
    es: Tomar la distancia al origen de coordenadas en lugar de la distancia perpendicular entre los ejes.
    en: Taking the distance to the coordinate origin instead of the perpendicular distance between the axes.
  typical_range:
    es: $10^{-2}$ a $10^2\text{ m}$.
    en: $10^{-2}$ to $10^2\text{ m}$.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero marca el caso limite sin efecto rotacional asociado.
      en: Zero marks the limiting case with no associated rotational effect.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades y eje de referencia al usar d.
    en: Check units and reference axis when using d.
- id: alpha
  symbol: alpha
  nombre:
    es: Aceleracion angular
    en: Angular acceleration
  descripcion:
    es: Cambio temporal de la velocidad angular.
    en: Time rate of change of angular velocity.
  unidad_si: rad/s^2
  dimension: T^-2
  is_vector: false
  components: null
  category: derived
  physical_role: state
  used_in:
  - respuesta-rotacional
  common_mistake:
    es: Confundirla con velocidad angular omega.
    en: Confusing it with angular velocity omega.
  typical_range:
    es: Variable segun el problema.
    en: Problem-dependent.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de giro elegido.
      en: The sign depends on the chosen rotation convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Si es cero no cambia la velocidad angular.
      en: If zero, angular velocity does not change.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: R
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Mantener coherencia de signos con el torque.
    en: Keep sign convention consistent with torque.
- id: tau
  symbol: tau
  nombre:
    es: Torque
    en: Torque
  descripcion:
    es: Momento de fuerza neto aplicado al sistema.
    en: Net moment of force applied to the system.
  unidad_si: N·m
  dimension: ML^2T^-2
  is_vector: false
  components: null
  category: derived
  physical_role: state
  used_in:
  - respuesta-rotacional
  common_mistake:
    es: Usar fuerza en N en lugar de torque en N·m.
    en: Using force in N instead of torque in N·m.
  typical_range:
    es: Variable segun el sistema.
    en: System-dependent.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica sentido de giro.
      en: The sign indicates rotation sense.
  zero_behavior:
    allowed: true
    meaning:
      es: Si es cero no hay aceleracion angular neta.
      en: If zero, there is no net angular acceleration.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: R
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Revisar el brazo de palanca y el signo.
    en: Check lever arm and sign.
