version: "1.0"
leaf: "ejemplos-aplicados"

coord:
  title:
    es: Gráfica Coord · Ejemplos Aplicados de Rotación
    en: Coord Graph · Applied Rotation Examples
  xAxis:
    es: tiempo t (s) o ángulo θ (rad)
    en: time t (s) or angle θ (rad)
  yAxis:
    es: ω (rad/s), α (rad/s²) o I (kg·m²)
    en: ω (rad/s), α (rad/s²) or I (kg·m²)
  xMagnitude: t
  yMagnitude: omega
  relation:
    es: Ejemplos que aplican τ = Iα, L = Iω, I = I_CM + md² y v = ωR.
    en: Examples applying τ = Iα, L = Iω, I = I_CM + md² and v = ωR.
  physicalReading:
    es: Leer pendiente (α), área (Δθ) e intercepto (ω₀).
    en: Read slope (α), area (Δθ) and intercept (ω₀).
  slopeMeaning:
    es: dω/dt = α.
    en: dω/dt = α.
  interceptMeaning:
    es: ω(0) = ω₀.
    en: ω(0) = ω₀.
  curvatureMeaning:
    es: Curvatura indica α variable.
    en: Curvature indicates variable α.
  signMeaning:
    es: "ω > 0: antihorario."
    en: "ω > 0: counterclockwise."
  areaMeaning:
    es: Área de ω(t) = Δθ.
    en: Area of ω(t) = Δθ.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Aplicaciones de rotación.
    en: Rotation applications.
  formulaConnection:
    es: τ = Iα, L = Iω, v = ωR.
    en: τ = Iα, L = Iω, v = ωR.
  readingFocus:
    es: leer pendiente, área e intercepto y vincular con fórmulas.
    en: read slope, area and intercept and link to formulas.
  agentHints:
    es:
      - Pendiente = α.
      - Área = Δθ.
      - τ = Iα.
    en:
      - Slope = α.
      - Area = Δθ.
      - τ = Iα.
  commonMistakes:
    es:
      - α = ω.
      - Olvidar I en τ = Iα.
    en:
      - α = ω.
      - Forgetting I in τ = Iα.
