version: 1
formulas:
- id: segunda_ley_traslacional
  title:
    es: Segunda ley traslacional
    en: Translational second law
  equation: F_net = m*a
  latex: F_net = m*a
  rearrangements:
  - target: a
    equation: a = F_net/m
    latex: a = F_net/m
    constraints: []
  - target: F_net
    equation: F_net = m*a
    latex: F_net = m*a
    constraints: []
  category: fundamental
  relation_type: dynamical_law
  physical_meaning:
    es: Relaciona fuerza neta y aceleracion lineal para masa positiva.
    en: Relates net force and linear acceleration for positive mass.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser mayor que cero.
      en: Mass must be greater than zero.
  validity:
    es: Valida en marcos inerciales o en marcos no inerciales con correcciones explicitas.
    en: Valid in inertial frames or in non-inertial frames with explicit corrections.
  dimension_check: M*L/T^2 = M*L/T^2
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - segunda_ley
  - analogia
  result_semantics:
    target: a
    meaning: Resulta util para interpretar a en el contexto del leaf.
  domain_checks:
  - condition: m > 0
    message:
      es: Revisar el valor de masa y la coherencia de unidades.
      en: Check mass value and unit consistency.
  coherence_checks:
  - check: sign_consistency
    warning:
      es: Usar mismo convenio de signo para F_net y a.
      en: Use the same sign convention for F_net and a.
  graph_implications:
  - if: graph_available
    then:
      es: Para m constante, la grafica F_net contra a es lineal.
      en: For constant m, F_net versus a graph is linear.
  pedagogical_triggers:
  - condition: abs(a) > 50
    hint:
      es: Valor alto de a; revisar orden de magnitud del escenario.
      en: High value of a; review scenario order of magnitude.
- id: segunda_ley_rotacional
  title:
    es: Segunda ley rotacional
    en: Rotational second law
  equation: tau = I*alpha
  latex: tau = I*alpha
  rearrangements:
  - target: alpha
    equation: alpha = tau/I
    latex: alpha = tau/I
    constraints: []
  - target: tau
    equation: tau = I*alpha
    latex: tau = I*alpha
    constraints: []
  category: fundamental
  relation_type: dynamical_law
  physical_meaning:
    es: Relaciona torque neto y aceleracion angular para inercia rotacional positiva.
    en: Relates net torque and angular acceleration for positive rotational inertia.
  constraints:
  - expr: I > 0
    message:
      es: El momento de inercia debe ser mayor que cero.
      en: Moment of inertia must be greater than zero.
  validity:
    es: Valida cuando eje, signos y definicion de I se mantienen consistentes.
    en: Valid when axis, signs, and I definition remain consistent.
  dimension_check: M*L^2/T^2 = M*L^2/T^2
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  - aplicaciones
  interpretation_tags:
  - segunda_ley
  - analogia
  result_semantics:
    target: alpha
    meaning: Resulta util para interpretar alpha en el contexto del leaf.
  domain_checks:
  - condition: I > 0
    message:
      es: Revisar valor de I y eje de referencia.
      en: Check I value and reference axis.
  coherence_checks:
  - check: sign_consistency
    warning:
      es: Usar mismo convenio de signo para tau y alpha.
      en: Use the same sign convention for tau and alpha.
  graph_implications:
  - if: graph_available
    then:
      es: Para I constante, la grafica tau contra alpha es lineal.
      en: For constant I, tau versus alpha graph is linear.
  pedagogical_triggers:
  - condition: abs(alpha) > 400
    hint:
      es: Valor alto de alpha; verificar datos y conversiones.
      en: High alpha value; verify inputs and conversions.
- id: momento_lineal
  title:
    es: Definicion de momento lineal
    en: Linear momentum definition
  equation: p = m*v
  latex: p = m*v
  rearrangements:
  - target: v
    equation: v = p/m
    latex: v = p/m
    constraints: []
  - target: p
    equation: p = m*v
    latex: p = m*v
    constraints: []
  category: structural
  relation_type: definition
  physical_meaning:
    es: Define el estado dinamico lineal a partir de masa y velocidad.
    en: Defines linear dynamic state from mass and velocity.
  constraints:
  - expr: m > 0
    message:
      es: La masa debe ser mayor que cero.
      en: Mass must be greater than zero.
  validity:
    es: Valida en mecanica clasica con velocidades muy inferiores a la luz.
    en: Valid in classical mechanics for speeds far below light speed.
  dimension_check: M*L/T = M*L/T
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - momento
  - analogia
  result_semantics:
    target: v
    meaning: Resulta util para interpretar v en el contexto del leaf.
  domain_checks:
  - condition: m > 0
    message:
      es: Revisar consistencia de m y v en el mismo sistema.
      en: Check consistency of m and v in the same frame.
  coherence_checks:
  - check: units_consistency
    warning:
      es: Revisar conversion a unidades SI.
      en: Review conversion to SI units.
  graph_implications:
  - if: graph_available
    then:
      es: Los cambios de p deben seguir impulsos externos.
      en: p changes should follow external impulses.
  pedagogical_triggers:
  - condition: abs(v) > 120
    hint:
      es: Velocidad alta para ejercicio base; revisar escala.
      en: Velocity is high for a baseline exercise; review scale.
- id: momento_angular
  title:
    es: Definicion de momento angular
    en: Angular momentum definition
  equation: L = I*omega
  latex: L = I*omega
  rearrangements:
  - target: omega
    equation: omega = L/I
    latex: omega = L/I
    constraints: []
  - target: L
    equation: L = I*omega
    latex: L = I*omega
    constraints: []
  category: structural
  relation_type: definition
  physical_meaning:
    es: Define el estado dinamico rotacional a partir de inercia y velocidad angular.
    en: Defines rotational dynamic state from inertia and angular velocity.
  constraints:
  - expr: I > 0
    message:
      es: El momento de inercia debe ser mayor que cero.
      en: Moment of inertia must be greater than zero.
  validity:
    es: Valida cuando I y omega se definen respecto al mismo eje.
    en: Valid when I and omega are defined about the same axis.
  dimension_check: M*L^2/T = M*L^2/T
  calculable: true
  motivo_no_calculable: null
  used_in:
  - teoria
  - ejemplos
  interpretation_tags:
  - momento
  - analogia
  result_semantics:
    target: omega
    meaning: Resulta util para interpretar omega en el contexto del leaf.
  domain_checks:
  - condition: I > 0
    message:
      es: Revisar eje, inercia y signo de omega.
      en: Check axis, inertia, and omega sign.
  coherence_checks:
  - check: axis_consistency
    warning:
      es: No mezclar valores definidos en ejes diferentes.
      en: Do not mix values defined on different axes.
  graph_implications:
  - if: graph_available
    then:
      es: Los cambios de L deben reflejar torque neto acumulado.
      en: L changes should reflect accumulated net torque.
  pedagogical_triggers:
  - condition: abs(omega) > 800
    hint:
      es: omega muy alta; revisar conversiones y datos.
      en: omega is very high; check conversions and data.
