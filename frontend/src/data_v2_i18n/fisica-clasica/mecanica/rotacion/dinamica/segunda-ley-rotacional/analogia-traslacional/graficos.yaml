version: "1.0"
leaf: "analogia-traslacional"

coord:
  title:
    es: Gráfica Coord · Analogía Traslacional-Rotacional
    en: Coord Graph · Translational-Rotational Analogy
  xAxis:
    es: magnitud traslacional (m, F, v, p)
    en: translational magnitude (m, F, v, p)
  yAxis:
    es: magnitud rotacional (I, τ, ω, L)
    en: rotational magnitude (I, τ, ω, L)
  xMagnitude: m
  yMagnitude: I
  relation:
    es: m ↔ I. F ↔ τ. v ↔ ω. p ↔ L. F=ma ↔ τ=Iα. E_k=½mv² ↔ E_k=½Iω².
    en: m ↔ I. F ↔ τ. v ↔ ω. p ↔ L. F=ma ↔ τ=Iα. E_k=½mv² ↔ E_k=½Iω².
  physicalReading:
    es: Cada magnitud traslacional tiene su análogo rotacional.
    en: Each translational magnitude has its rotational analogue.
  slopeMeaning:
    es: "dI/dm: relación de analogía."
    en: "dI/dm: analogy ratio."
  interceptMeaning:
    es: "Origen: sin masa ni inercia."
    en: "Origin: no mass or inertia."
  curvatureMeaning:
    es: "Lineal: analogía directa."
    en: "Linear: direct analogy."
  signMeaning:
    es: Ambas positivas.
    en: Both positive.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: m, I ≥ 0.
    en: m, I ≥ 0.
  modelConnection:
    es: Analogía traslación-rotación.
    en: Translation-rotation analogy.
  formulaConnection:
    es: F=ma ↔ τ=Iα, E=½mv² ↔ E=½Iω².
    en: F=ma ↔ τ=Iα, E=½mv² ↔ E=½Iω².
  readingFocus:
    es: mapear cada magnitud traslacional a su análogo rotacional.
    en: map each translational magnitude to its rotational analogue.
  agentHints:
    es:
      - m ↔ I.
      - F ↔ τ.
      - v ↔ ω.
      - p ↔ L.
    en:
      - m ↔ I.
      - F ↔ τ.
      - v ↔ ω.
      - p ↔ L.
  commonMistakes:
    es:
      - I = m.
      - ω = v.
      - Confundir p y L.
    en:
      - I = m.
      - ω = v.
      - Confusing p and L.
