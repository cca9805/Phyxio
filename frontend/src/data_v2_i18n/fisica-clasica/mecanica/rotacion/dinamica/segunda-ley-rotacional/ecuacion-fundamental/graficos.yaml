version: "1.0"
leaf: "ecuacion-fundamental"

coord:
  title:
    es: Gráfica Coord · Ecuación Fundamental de la Dinámica Rotacional
    en: Coord Graph · Fundamental Equation of Rotational Dynamics
  xAxis:
    es: torque neto τ (N·m)
    en: net torque τ (N·m)
  yAxis:
    es: aceleración angular α (rad/s²)
    en: angular acceleration α (rad/s²)
  xMagnitude: tau
  yMagnitude: alpha
  relation:
    es: τ = Iα. Análogo rotacional de F = ma. Pendiente = 1/I.
    en: τ = Iα. Rotational analogue of F = ma. Slope = 1/I.
  physicalReading:
    es: "Recta por origen. Pendiente = 1/I. Mayor I: menor α para mismo τ."
    en: "Line through origin. Slope = 1/I. Larger I: smaller α for same τ."
  slopeMeaning:
    es: "dα/dτ = 1/I: inverso del momento de inercia."
    en: "dα/dτ = 1/I: inverse of moment of inertia."
  interceptMeaning:
    es: "α(0) = 0: sin torque, sin aceleración."
    en: "α(0) = 0: no torque, no acceleration."
  curvatureMeaning:
    es: "Recta: relación lineal exacta."
    en: "Straight line: exact linear relation."
  signMeaning:
    es: "τ > 0: α antihoraria. τ < 0: α horaria."
    en: "τ > 0: counterclockwise α. τ < 0: clockwise α."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: τ real.
    en: τ real.
  modelConnection:
    es: "τ = Iα: Newton rotacional."
    en: "τ = Iα: rotational Newton."
  formulaConnection:
    es: τ = Iα, L = Iω.
    en: τ = Iα, L = Iω.
  readingFocus:
    es: leer pendiente 1/I e intercepto en origen.
    en: read slope 1/I and origin intercept.
  agentHints:
    es:
      - Pendiente = 1/I.
      - α(0) = 0.
      - "Mayor I: menor pendiente."
    en:
      - Slope = 1/I.
      - α(0) = 0.
      - "Larger I: smaller slope."
  commonMistakes:
    es:
      - τ = I/α.
      - Pendiente = I.
      - α(0) ≠ 0.
    en:
      - τ = I/α.
      - Slope = I.
      - α(0) ≠ 0.
