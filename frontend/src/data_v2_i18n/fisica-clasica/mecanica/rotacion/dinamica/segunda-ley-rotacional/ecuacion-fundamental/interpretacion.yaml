version: 2
id: interpretacion-ecuacion-fundamental
leaf_id: ecuacion-fundamental
nombre:
  es: Interpretacion de Ecuación Fundamental
  en: Interpretation of Fundamental Equation of Rotational Dynamics
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: dinamica
  parent_id: segunda-ley-rotacional
  ruta_relativa: fisica-clasica/mecanica/dinamica/dinamica-rotacional/segunda-ley-rotacional/ecuacion-fundamental
dependencies:
  formulas:
  - segunda_ley_traslacional
  - segunda_ley_rotacional
  - momento_lineal
  - momento_angular
  magnitudes:
  - x
  - theta
  - v
  - omega
  - a
  - alpha
  - m
  - I
  - F_net
  - tau
  - p
  - L
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  a:
    summary_rules:
    - id: a_summary
      when: 'true'
      status: info
      text:
        es: a resume una lectura fisica relevante del leaf.
        en: a summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: a_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que a sea coherente con unidades y contexto.
        en: Check that a is coherent with units and context.
    physical_reading_rules:
    - id: a_physical
      when: 'true'
      status: info
      text:
        es: Si aparece una rama traslacional asociada, a debe crecer cuando F_net aumenta y debe caer cuando la masa efectiva crece.
        en: If an associated translational branch appears, a should grow when F_net increases and should fall when effective mass grows.
    model_validity_rules:
    - id: a_validity
      when: 'true'
      status: ok
      text:
        es: a solo es interpretable dentro del modelo elegido.
        en: a is interpretable only inside the chosen model.
    graph_rules:
    - id: a_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de a.
        en: The graph must reflect the role of a visually.
    likely_errors:
    - id: a_warn
      when: 'true'
      status: warning
      text:
        es: No confundas a con otra magnitud cercana del problema.
        en: Do not confuse a with another nearby quantity in the problem.
    next_step_rules:
    - id: a_next
      when: 'true'
      status: info
      text:
        es: Usa a para enlazar con el siguiente paso de interpretacion.
        en: Use a to connect with the next interpretation step.
