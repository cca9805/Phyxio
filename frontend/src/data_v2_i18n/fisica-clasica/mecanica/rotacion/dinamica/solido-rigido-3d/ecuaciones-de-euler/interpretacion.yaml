version: 2
id: interpretacion-ecuaciones-de-euler
leaf_id: ecuaciones-de-euler
nombre:
  es: Interpretacion de Ecuaciones de Euler del solido rigido
  en: Interpretation of Euler Equations for a Rigid Body
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: rotacion
  parent_id: solido-rigido-3d
  ruta_relativa: fisica-clasica/mecanica/rotacion/dinamica/solido-rigido-3d/ecuaciones-de-euler
dependencies:
  formulas:
  - momento_angular_tensorial
  - euler_eje_1
  - euler_eje_2
  - euler_eje_3
  magnitudes:
  - tau1
  - tau2
  - tau3
  - I1
  - I2
  - I3
  - omega1
  - omega2
  - omega3
  - L
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  tau1:
    summary_rules:
    - id: tau1_summary
      when: 'true'
      status: info
      text:
        es: '[[tau1]] indica que mecanismo domina, resume el balance del leaf y depende de que las hipotesis sigan siendo validas.'
        en: '[[tau1]] indicates which mechanism dominates, summarizes the leaf balance, and depends on the assumptions remaining valid.'
    physical_reading_rules:
    - id: tau1_physical
      when: 'true'
      status: info
      text:
        es: 'Si [[tau1]] cambia de escala, cambia el balance causal del modelo: puede desplazar el regimen dominante, mover un punto critico o revelar que la aproximacion ya no representa el sistema real.'
        en: 'If [[tau1]] changes scale, the causal balance of the model changes: it may shift the dominant regime, move a critical point, or reveal that the approximation no longer represents the real system.'
    coherence_rules:
    - id: tau1_coherence
      when: 'true'
      status: ok
      text:
        es: '[[tau1]] es coherente solo si procede del mismo sistema fisico que las demas magnitudes y conserva unidades compatibles.'
        en: '[[tau1]] is coherent only if it comes from the same physical system as the other quantities and keeps compatible units.'
    model_validity_rules:
    - id: tau1_validity
      when: 'true'
      status: ok
      text:
        es: El modelo sigue siendo valido mientras las ecuaciones de euler describen la rotacion de un solido rigido desde ejes principales, donde cada componente angular se acopla con las otras dos; si el termino omitido se vuelve comparable, conviene cambiar de descripcion.
        en: The model remains valid while euler equations describe rigid-body rotation in principal axes, where each angular component couples to the other two; if the omitted term becomes comparable, the description should be changed.
    graph_rules:
    - id: tau1_graph
      when: 'true'
      status: info
      text:
        es: Sin grafico declarado, [[tau1]] se lee mediante tendencia, signo, escala y casos limite.
        en: With no declared graph, [[tau1]] is read through trend, sign, scale, and limiting cases.
    likely_errors:
    - id: tau1_error
      when: 'true'
      status: warning
      text:
        es: 'Error probable: confundir [[tau1]] con un dato aislado, olvidar el dominio o suponer que el signo no tiene significado fisico.'
        en: 'Likely mistake: confuse [[tau1]] with an isolated datum, forget the domain, or assume that the sign has no physical meaning.'
    next_step_rules:
    - id: tau1_next
      when: 'true'
      status: info
      text:
        es: Despues de calcular, contrasta [[tau1]] con un caso limite y explica que cambio observable produciria.
        en: After calculating, compare [[tau1]] with a limiting case and state what observable change it would produce.
