version: "1.0"
leaf: "calculo-del-torque"

coord:
  title:
    es: Gráfica Coord · Cálculo del Torque
    en: Coord Graph · Torque Calculation
  xAxis:
    es: ángulo θ (grados)
    en: angle θ (degrees)
  yAxis:
    es: torque τ (N·m)
    en: torque τ (N·m)
  xMagnitude: theta
  yMagnitude: tau
  relation:
    es: τ = rF senθ. Senoidal en θ. Máximo en θ = 90°. Cero en θ = 0° y 180°.
    en: τ = rF sinθ. Sinusoidal in θ. Maximum at θ = 90°. Zero at θ = 0° and 180°.
  physicalReading:
    es: Pico en 90°. Ceros en 0° y 180°. Signo cambia en θ = 180°.
    en: Peak at 90°. Zeros at 0° and 180°. Sign changes at θ = 180°.
  slopeMeaning:
    es: dτ/dθ = rF cosθ.
    en: dτ/dθ = rF cosθ.
  interceptMeaning:
    es: "τ(0) = 0: F paralela a r."
    en: "τ(0) = 0: F parallel to r."
  curvatureMeaning:
    es: "Senoidal: d²τ/dθ² = −rF senθ."
    en: "Sinusoidal: d²τ/dθ² = −rF sinθ."
  signMeaning:
    es: "τ > 0: antihorario. τ < 0: horario."
    en: "τ > 0: counterclockwise. τ < 0: clockwise."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0° ≤ θ ≤ 360°.
    en: 0° ≤ θ ≤ 360°.
  modelConnection:
    es: Cálculo de torque en función del ángulo.
    en: Torque calculation as a function of angle.
  formulaConnection:
    es: τ = rF senθ, τ = Iα.
    en: τ = rF sinθ, τ = Iα.
  readingFocus:
    es: leer máximo a 90° y ceros a 0° y 180°.
    en: read maximum at 90° and zeros at 0° and 180°.
  agentHints:
    es:
      - Máx en 90°.
      - Cero en 0° y 180°.
      - τ = rF senθ.
    en:
      - Max at 90°.
      - Zero at 0° and 180°.
      - τ = rF sinθ.
  commonMistakes:
    es:
      - Máx a 45°.
      - τ = rF siempre.
      - Olvidar senθ.
    en:
      - Max at 45°.
      - τ = rF always.
      - Forgetting sinθ.
