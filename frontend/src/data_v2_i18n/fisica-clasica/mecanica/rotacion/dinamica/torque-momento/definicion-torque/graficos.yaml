version: "1.0"
leaf: "definicion-torque"

dcl:
  title:
    es: DCL · Definición de Torque
    en: FBD · Torque Definition
  xAxis:
    es: eje x (horizontal)
    en: x-axis (horizontal)
  yAxis:
    es: eje y (vertical)
    en: y-axis (vertical)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "τ = r × F = rF senθ. r: brazo de palanca. θ: ángulo F-r."
    en: "τ = r × F = rF sinθ. r: moment arm. θ: F-r angle."
  physicalReading:
    es: Máximo τ con θ = 90°. τ = 0 si F pasa por el pivote.
    en: Maximum τ at θ = 90°. τ = 0 if F passes through pivot.
  slopeMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  interceptMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  curvatureMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  signMeaning:
    es: "τ > 0: antihorario. τ < 0: horario."
    en: "τ > 0: counterclockwise. τ < 0: clockwise."
  areaMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  domainMeaning:
    es: Plano 2D.
    en: 2D plane.
  modelConnection:
    es: "Definición de torque: τ = r × F."
    en: "Torque definition: τ = r × F."
  formulaConnection:
    es: τ = rF senθ, τ = Iα.
    en: τ = rF sinθ, τ = Iα.
  readingFocus:
    es: identificar r, F y θ para calcular τ.
    en: identify r, F and θ to calculate τ.
  agentHints:
    es:
      - τ = rF senθ.
      - Máx τ a 90°.
      - τ = 0 si F en pivote.
    en:
      - τ = rF sinθ.
      - Max τ at 90°.
      - τ = 0 if F at pivot.
  commonMistakes:
    es:
      - τ = rF siempre.
      - Olvidar senθ.
      - Brazo = distancia total.
    en:
      - τ = rF always.
      - Forgetting sinθ.
      - Arm = total distance.

