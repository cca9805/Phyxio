version: "1.0"
leaf: "energia-cinetica-rotacional"

coord:
  title:
    es: Gráfica Coord · Energía Cinética Rotacional
    en: Coord Graph · Rotational Kinetic Energy
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: energía cinética E_k (J)
    en: kinetic energy E_k (J)
  xMagnitude: omega
  yMagnitude: E
  relation:
    es: E_k = ½Iω². Parábola en ω. Duplicar ω cuadruplica E_k.
    en: E_k = ½Iω². Parabola in ω. Doubling ω quadruples E_k.
  physicalReading:
    es: E_k crece como ω². E_k(0) = 0. Parábola con concavidad = I.
    en: E_k grows as ω². E_k(0) = 0. Parabola with concavity = I.
  slopeMeaning:
    es: "dE_k/dω = Iω: momento angular L."
    en: "dE_k/dω = Iω: angular momentum L."
  interceptMeaning:
    es: "E_k(0) = 0: sin rotación."
    en: "E_k(0) = 0: no rotation."
  curvatureMeaning:
    es: "d²E_k/dω² = I: momento de inercia."
    en: "d²E_k/dω² = I: moment of inertia."
  signMeaning:
    es: E_k ≥ 0.
    en: E_k ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω real.
    en: ω real.
  modelConnection:
    es: Energía cinética rotacional.
    en: Rotational kinetic energy.
  formulaConnection:
    es: E_k = ½Iω², L = Iω.
    en: E_k = ½Iω², L = Iω.
  readingFocus:
    es: leer curvatura = I y pendiente = L en cada punto.
    en: read curvature = I and slope = L at each point.
  agentHints:
    es:
      - E_k = ½Iω².
      - 2ω → 4E_k.
      - Curvatura = I.
    en:
      - E_k = ½Iω².
      - 2ω → 4E_k.
      - Curvature = I.
  commonMistakes:
    es:
      - E_k = Iω.
      - E_k lineal en ω.
      - Curvatura = ½I.
    en:
      - E_k = Iω.
      - E_k linear in ω.
      - Curvature = ½I.
