version: "1.0"
leaf: "energia-en-rodadura"

coord:
  title:
    es: Gráfica Coord · Energía en Rodadura
    en: Coord Graph · Energy in Rolling
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: energía total E (J)
    en: total energy E (J)
  xMagnitude: omega
  yMagnitude: E
  relation:
    es: "E = ½mv² + ½Iω² = ½(m + I/R²)ω²R². Fracción rot: f = I/(mR²+I)."
    en: "E = ½mv² + ½Iω² = ½(m + I/R²)ω²R². Rot fraction: f = I/(mR²+I)."
  physicalReading:
    es: "Parábola. Fracción rotacional depende del cuerpo: aro > disco > esfera."
    en: "Parabola. Rotational fraction depends on body: hoop > disk > sphere."
  slopeMeaning:
    es: "dE/dω = (m + I/R²)ωR²: relacionado con L y p."
    en: "dE/dω = (m + I/R²)ωR²: related to L and p."
  interceptMeaning:
    es: E(0) = 0.
    en: E(0) = 0.
  curvatureMeaning:
    es: d²E/dω² = (m + I/R²)R².
    en: d²E/dω² = (m + I/R²)R².
  signMeaning:
    es: E ≥ 0.
    en: E ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω ≥ 0.
    en: ω ≥ 0.
  modelConnection:
    es: Energía en rodadura sin deslizamiento.
    en: Energy in rolling without slipping.
  formulaConnection:
    es: E = ½mv² + ½Iω², v = ωR.
    en: E = ½mv² + ½Iω², v = ωR.
  readingFocus:
    es: leer fracción rotacional e identificar tipo de cuerpo.
    en: read rotational fraction and identify body type.
  agentHints:
    es:
      - E = ½mv² + ½Iω².
      - "Aro: mayor fracción rot."
      - v = ωR.
    en:
      - E = ½mv² + ½Iω².
      - "Hoop: largest rot fraction."
      - v = ωR.
  commonMistakes:
    es:
      - Solo E traslación.
      - Fracción = constante.
    en:
      - Only translation E.
      - Fraction = constant.
