version: 1
id: interpretacion-energia-en-rodadura
leaf_id: energia-en-rodadura
nombre:
  es: Interpretacion de energia en rodadura
  en: Interpretation of energy in rolling
scope:
  es: reparto energetico entre traslacion, rotacion, condicion de contacto y validez de rodadura
  en: energy split between translation, rotation, contact condition, and rolling validity
dependencies:
  magnitudes: [K_total, E_total, m, v_cm, I, omega, R, a_cm, alpha, g, phi, theta, tau]
  formulas: [energia_total_rodadura, condicion_rodadura_energia, aceleracion_cm_rodadura, energia_mecanica_total_rodadura]
output_contract:
  sections: [summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step]
result_blocks:
  summary: { title: { es: Resumen, en: Summary } }
  physical_reading: { title: { es: Lectura fisica, en: Physical reading } }
  coherence: { title: { es: Coherencia fisica, en: Physical coherence } }
  model_validity: { title: { es: Validez del modelo, en: Model validity } }
  graph_reading: { title: { es: Lectura del grafico, en: Graph reading } }
  likely_errors: { title: { es: Errores comunes, en: Common errors } }
  next_step: { title: { es: Siguiente paso, en: Next step } }
targets:
  K_total:
    summary_rules:
      - id: ktotal_summary
        when: 'true'
        status: info
        text: { es: "K_total indica la energia cinetica que se reparte entre avance del centro de masas y giro del cuerpo.", en: "K_total indicates the kinetic energy split between center-of-mass advance and body spin." }
    coherence_rules:
      - id: ktotal_coherence
        when: K_total >= 0
        status: ok
        text: { es: "K_total debe ser no negativa y debe igualar la suma de las dos contribuciones.", en: "K_total must be non-negative and equal the sum of the two contributions." }
    physical_reading_rules:
      - id: ktotal_physical
        when: 'true'
        status: info
        text: { es: "Si I aumenta a igual v_cm, mas energia queda asociada al giro y cambia el reparto fisico.", en: "If I increases at equal v_cm, more energy is associated with spin and the physical split changes." }
    model_validity_rules:
      - id: ktotal_validity
        when: 'true'
        status: info
        text: { es: "La lectura es valida si el cuerpo es rigido y el contacto no desliza.", en: "The reading is valid if the body is rigid and the contact does not slip." }
    graph_rules:
      - id: ktotal_graph
        when: 'true'
        status: info
        text: { es: "En el grafico, la barra total debe sumar traslacion y rotacion.", en: "On the graph, the total bar must add translation and rotation." }
    likely_errors:
      - id: ktotal_error
        when: 'true'
        status: info
        text: { es: "Error conceptual comun - usar solo energia traslacional y olvidar la parte rotacional.", en: "Common conceptual error - using only translational energy and forgetting the rotational part." }
    next_step_rules:
      - id: ktotal_next
        when: 'true'
        status: info
        text: { es: "Comprueba la condicion v_cm = R*omega antes de imponer rodadura pura.", en: "Check v_cm = R*omega before imposing pure rolling." }
  E_total:
    summary_rules:
      - id: etotal_summary
        when: 'true'
        status: info
        text: { es: "E_total describe el balance mecanico completo cuando se añade energia potencial o una referencia externa.", en: "E_total describes the full mechanical balance when potential energy or an external reference is added." }
    coherence_rules:
      - id: etotal_coherence
        when: 'true'
        status: ok
        text: { es: "E_total no debe confundirse con K_total si hay altura o energia potencial.", en: "E_total must not be confused with K_total when height or potential energy is present." }
    physical_reading_rules:
      - id: etotal_physical
        when: 'true'
        status: info
        text: { es: "En una rampa, E_total explica de donde sale el aumento de energia de rodadura.", en: "On an incline, E_total explains where the increase in rolling energy comes from." }
    model_validity_rules:
      - id: etotal_validity
        when: 'true'
        status: info
        text: { es: "Solo se conserva si no hay perdidas por deslizamiento, deformacion o rozamiento disipativo.", en: "It is conserved only if there are no losses by slipping, deformation, or dissipative friction." }
    graph_rules:
      - id: etotal_graph
        when: 'true'
        status: info
        text: { es: "El grafico debe mostrar si la energia disponible se reparte o se disipa.", en: "The graph should show whether available energy is split or dissipated." }
    likely_errors:
      - id: etotal_error
        when: 'true'
        status: info
        text: { es: "Error conceptual comun - llamar energia total a una suma que solo incluye cinetica.", en: "Common conceptual error - calling a kinetic-only sum total energy." }
    next_step_rules:
      - id: etotal_next
        when: 'true'
        status: info
        text: { es: "Si hay rampa, identifica g, phi y la altura efectiva antes del balance.", en: "If there is an incline, identify g, phi, and effective height before the balance." }
  R:
    summary_rules:
      - id: r_summary
        when: 'true'
        status: info
        text: { es: "R indica el radio que conecta avance y giro en la condicion de rodadura.", en: "R indicates the radius connecting advance and spin in the rolling condition." }
    coherence_rules:
      - id: r_coherence
        when: R > 0
        status: ok
        text: { es: "R debe ser positivo y pertenecer al cuerpo que realmente contacta.", en: "R must be positive and belong to the body that actually contacts." }
    physical_reading_rules:
      - id: r_physical
        when: 'true'
        status: info
        text: { es: "Cambiar R altera la relacion entre v_cm, omega y a_cm.", en: "Changing R alters the relation between v_cm, omega, and a_cm." }
    model_validity_rules:
      - id: r_validity
        when: 'true'
        status: info
        text: { es: "Si el radio efectivo cambia por deformacion, el modelo ideal falla.", en: "If effective radius changes by deformation, the ideal model fails." }
    graph_rules:
      - id: r_graph
        when: 'true'
        status: info
        text: { es: "En Coord, R cambia la pendiente de las condiciones de rodadura.", en: "In Coord, R changes the slope of rolling constraints." }
    likely_errors:
      - id: r_error
        when: 'true'
        status: info
        text: { es: "Error comun - usar diametro en lugar de radio.", en: "Common error - using diameter instead of radius." }
    next_step_rules:
      - id: r_next
        when: 'true'
        status: info
        text: { es: "Verifica si el dato dado es radio, diametro o radio efectivo.", en: "Check whether the datum is radius, diameter, or effective radius." }
  a_cm:
    summary_rules:
      - id: acm_summary
        when: 'true'
        status: info
        text: { es: "a_cm indica como cambia la velocidad del centro de masas durante la rodadura.", en: "a_cm indicates how center-of-mass velocity changes during rolling." }
    coherence_rules:
      - id: acm_coherence
        when: 'true'
        status: ok
        text: { es: "a_cm debe ser coherente con R y alpha si no hay deslizamiento.", en: "a_cm must be coherent with R and alpha if there is no slipping." }
    physical_reading_rules:
      - id: acm_physical
        when: 'true'
        status: info
        text: { es: "Menor a_cm en una rampa suele indicar que mas energia se dedica al giro.", en: "Smaller a_cm on an incline often indicates that more energy goes into spin." }
    model_validity_rules:
      - id: acm_validity
        when: 'true'
        status: info
        text: { es: "La relacion con alpha exige contacto sin deslizamiento.", en: "The relation with alpha requires contact without slipping." }
    graph_rules:
      - id: acm_graph
        when: 'true'
        status: info
        text: { es: "El grafico debe hacer visible si a_cm acompaña a alpha.", en: "The graph should make visible whether a_cm follows alpha." }
    likely_errors:
      - id: acm_error
        when: 'true'
        status: info
        text: { es: "Error comun - tratar a_cm como g*sin(phi) aunque exista rotacion.", en: "Common error - treating a_cm as g*sin(phi) even when rotation exists." }
    next_step_rules:
      - id: acm_next
        when: 'true'
        status: info
        text: { es: "Compara a_cm con el caso de deslizamiento sin rotacion.", en: "Compare a_cm with the sliding-without-rotation case." }
  omega:
    summary_rules:
      - id: omega_summary
        when: 'true'
        status: info
        text: { es: "Omega fija la rapidez de giro que alimenta la energia rotacional.", en: "Omega sets the spin rate feeding rotational energy." }
    coherence_rules:
      - id: omega_coherence
        when: 'true'
        status: ok
        text: { es: "Omega debe estar en rad/s y concordar con v_cm/R.", en: "Omega must be in rad/s and agree with v_cm/R." }
    physical_reading_rules:
      - id: omega_physical
        when: 'true'
        status: info
        text: { es: "A igual I, mayor omega aumenta la contribucion rotacional.", en: "At equal I, larger omega increases the rotational contribution." }
    model_validity_rules:
      - id: omega_validity
        when: 'true'
        status: info
        text: { es: "Una omega comun exige cuerpo rigido.", en: "A common omega requires a rigid body." }
    graph_rules:
      - id: omega_graph
        when: 'true'
        status: info
        text: { es: "La curva de energia rotacional crece con omega al cuadrado.", en: "The rotational-energy curve grows with omega squared." }
    likely_errors:
      - id: omega_error
        when: 'true'
        status: info
        text: { es: "Error comun - usar rpm directamente.", en: "Common error - using rpm directly." }
    next_step_rules:
      - id: omega_next
        when: 'true'
        status: info
        text: { es: "Convierte unidades y verifica la condicion de contacto.", en: "Convert units and verify the contact condition." }
