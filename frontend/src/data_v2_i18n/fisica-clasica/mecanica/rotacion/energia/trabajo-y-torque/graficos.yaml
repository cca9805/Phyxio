version: "1.0"
leaf: "trabajo-y-torque"

coord:
  title:
    es: Gráfica Coord · Trabajo y Torque
    en: Coord Graph · Work and Torque
  xAxis:
    es: ángulo θ (rad)
    en: angle θ (rad)
  yAxis:
    es: trabajo W (J)
    en: work W (J)
  xMagnitude: theta
  yMagnitude: W
  relation:
    es: W = τΔθ (torque constante). W = ∫τ dθ (torque variable). Área bajo τ(θ) = W.
    en: W = τΔθ (constant torque). W = ∫τ dθ (variable torque). Area under τ(θ) = W.
  physicalReading:
    es: "Pendiente = τ. Área bajo τ(θ) = W. W > 0: torque y rotación en mismo sentido."
    en: "Slope = τ. Area under τ(θ) = W. W > 0: torque and rotation in same direction."
  slopeMeaning:
    es: "dW/dθ = τ: torque."
    en: "dW/dθ = τ: torque."
  interceptMeaning:
    es: W(0) = 0.
    en: W(0) = 0.
  curvatureMeaning:
    es: "d²W/dθ² = dτ/dθ: variación del torque."
    en: "d²W/dθ² = dτ/dθ: torque variation."
  signMeaning:
    es: "W > 0: torque motor. W < 0: torque frenante."
    en: "W > 0: driving torque. W < 0: braking torque."
  areaMeaning:
    es: Área bajo τ(θ) = W.
    en: Area under τ(θ) = W.
  domainMeaning:
    es: θ ≥ 0.
    en: θ ≥ 0.
  modelConnection:
    es: "Trabajo rotacional: W = τΔθ."
    en: "Rotational work: W = τΔθ."
  formulaConnection:
    es: W = ∫τ dθ, P = τω.
    en: W = ∫τ dθ, P = τω.
  readingFocus:
    es: leer pendiente = τ y área = W.
    en: read slope = τ and area = W.
  agentHints:
    es:
      - Pendiente = τ.
      - Área = W.
      - W = τΔθ.
    en:
      - Slope = τ.
      - Area = W.
      - W = τΔθ.
  commonMistakes:
    es:
      - W = τ.
      - Olvidar Δθ.
      - Pendiente = W.
    en:
      - W = τ.
      - Forgetting Δθ.
      - Slope = W.
