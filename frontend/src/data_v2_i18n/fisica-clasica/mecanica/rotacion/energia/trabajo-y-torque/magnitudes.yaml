    descripcion: { es: "trabajo rotacional usada para interpretar trabajo y torque.", en: "rotational work used to interpret work and torque." }
    unidad_si: "J"
    dimension: "M L^2 T^-2"
    is_vector: false
    components: []
    category: "rotational_energy"
    physical_role: { es: "transferencia de energía", en: "transferencia de energía" }
    used_in: ["teoria", "ejemplos", "aplicaciones", "interpretacion"]
    common_mistake: { es: "Usar W sin comprobar signo, eje o unidades.", en: "Using W without checking sign, axis, or units." }
    typical_range: { es: "Depende del sistema y debe contrastarse con el orden de magnitud.", en: "Context dependent and must be checked against order of magnitude." }
    sign_behavior:
      has_sign: true
      meaning: { es: "El signo indica transferencia positiva o negativa según el convenio.", en: "The sign indicates positive or negative transfer according to convention." }
    zero_behavior:
      allowed: true
      meaning: { es: "Cero indica ausencia de esa contribución o caso límite.", en: "Zero indicates absence of that contribution or a limiting case." }
    value_nature:
      kind: "signed_scalar"
      nonnegative_only: false
      expected_interval: "(-inf,+inf)"
    interpretation_role:
      primary_for: ["trabajo-y-torque"]
      secondary_for: ["energia-rotacional"]
    graph_binding:
      channels: ["axis", "slope", "area"]
    pedagogical_notes: { es: "Declarar eje y convenio antes de interpretar.", en: "Declare axis and convention before interpreting." }

