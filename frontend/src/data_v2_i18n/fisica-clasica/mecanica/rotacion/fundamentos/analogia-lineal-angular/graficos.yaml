    en: m, I ≥ 0.
  modelConnection:
    es: Analogía lineal-angular.
    en: Linear-angular analogy.
  formulaConnection:
    es: F=ma↔τ=Iα, E=½mv²↔E=½Iω².
    en: F=ma↔τ=Iα, E=½mv²↔E=½Iω².
  readingFocus:
    es: mapear cada magnitud traslacional a su análogo rotacional.
    en: map each translational magnitude to its rotational analogue.
  agentHints:
    es:
      - m↔I.
      - F↔τ.
      - v↔ω.
