version: "1.0"
leaf: "analogia-lineal-angular"

svg:
  title:
    es: Escena SVG · Analogía Lineal-Angular
    en: SVG Scene · Linear-Angular Analogy
  sceneId: analogia_lineal_angular
  sceneLabel:
    es: "Tabla paralela: x↔θ, v↔ω, a↔α, m↔I, F↔τ, p↔L"
    en: "Parallel table: x↔θ, v↔ω, a↔α, m↔I, F↔τ, p↔L"
  objects:
    es:
      - x↔θ
      - v↔ω
      - a↔α
      - m↔I
      - F↔τ
      - p↔L
    en:
      - x↔θ
      - v↔ω
      - a↔α
      - m↔I
      - F↔τ
      - p↔L
  mainObject:
    es: tabla de analogías
    en: analogy table
  referenceFrame:
    es: diagrama conceptual
    en: conceptual diagram
  geometry:
    es: "Dos columnas paralelas: lineal y angular."
    en: "Two parallel columns: linear and angular."
  interactions:
    es: F=ma ↔ τ=Iα. W=Fd ↔ W=τθ. E=½mv² ↔ E=½Iω².
    en: F=ma ↔ τ=Iα. W=Fd ↔ W=τθ. E=½mv² ↔ E=½Iω².
  modelElements:
    es:
      - F=ma ↔ τ=Iα
      - p=mv ↔ L=Iω
      - E=½mv² ↔ E=½Iω²
    en:
      - F=ma ↔ τ=Iα
      - p=mv ↔ L=Iω
      - E=½mv² ↔ E=½Iω²
  visualCues:
    es:
      - Columnas paralelas.
      - Flechas de correspondencia.
    en:
      - Parallel columns.
      - Correspondence arrows.
  scaleMeaning:
    es: Sin escala física directa.
    en: No direct physical scale.
  relation:
    es: F=ma ↔ τ=Iα. p=mv ↔ L=Iω.
    en: F=ma ↔ τ=Iα. p=mv ↔ L=Iω.
  physicalReading:
    es: Cada ley traslacional tiene su equivalente rotacional.
    en: Each translational law has its rotational equivalent.
  modelConnection:
    es: Analogía lineal-angular completa.
    en: Complete linear-angular analogy.
  formulaConnection:
    es: F=ma↔τ=Iα, p=mv↔L=Iω, E=½mv²↔E=½Iω².
    en: F=ma↔τ=Iα, p=mv↔L=Iω, E=½mv²↔E=½Iω².
  readingFocus:
    es: mapear todas las magnitudes lineales a sus análogos angulares.
    en: map all linear magnitudes to their angular analogues.
  agentHints:
    es:
      - m↔I.
      - F↔τ.
      - p↔L.
      - v↔ω.
    en:
      - m↔I.
      - F↔τ.
      - p↔L.
      - v↔ω.
  commonMistakes:
    es:
      - L = mv.
      - τ = ma.
      - Confundir p y L.
    en:
      - L = mv.
      - τ = ma.
      - Confusing p and L.

