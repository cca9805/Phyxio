version: 1
id: interpretacion-analogia-lineal-angular
leaf_id: analogia-lineal-angular

nombre:
  es: Interpretación de la analogía lineal-angular
  en: Interpretation of the linear-angular analogy

scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: rotacion
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/mecanica/rotacion/fundamentos/analogia-lineal-angular

ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación
    en: Interpretation
  priority_order:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step
  inline_limits:
    max_messages: 3
    prefer_summary: true

dependencies:
  formulas:
    - segunda_ley_newton
    - segunda_ley_rotacional
    - correspondencia_lineal_angular
  magnitudes:
    - F
    - m
    - a
    - tau
    - I
    - alpha

global_context:
  physical_domain:
    es: Dinámica clásica traslacional y rotacional de cuerpos rígidos.
    en: Classical translational and rotational dynamics of rigid bodies.
  axis_convention:
    es: El signo positivo angular se define según el eje elegido y la regla de la mano derecha.
    en: Positive angular sign is defined by the chosen axis and the right-hand rule.
  standard_assumptions:
    - es: Se trabaja en régimen clásico.
      en: Classical regime is assumed.
    - es: El eje de rotación está definido antes de interpretar torque, momento de inercia o aceleración angular.
      en: The rotation axis is defined before interpreting torque, moment of inertia, or angular acceleration.
    - es: La analogía es estructural, no una identidad física entre magnitudes.
      en: The analogy is structural, not a physical identity between quantities.
  standard_warnings:
    - es: No trates masa y momento de inercia como magnitudes equivalentes.
      en: Do not treat mass and moment of inertia as equivalent quantities.
    - es: "No interpretes el torque como una fuerza: depende del eje y del brazo de palanca."
      en: "Do not interpret torque as a force: it depends on the axis and lever arm."

result_blocks:
  summary:
    title:
      es: Resumen
      en: Summary
  physical_reading:
    title:
      es: Lectura física
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura gráfica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step

output_contract:
  sections:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step

targets:
  F:
    magnitude_type: vector
    semantic_role:
      es: Causa dinámica traslacional en la analogía.
      en: Translational dynamic cause in the analogy.

    summary_rules:
      - id: f_summary_rules_1
        when: "true"
        status: info
        text:
          es: La fuerza indica la causa del cambio lineal en la parte traslacional de la analogía.
          en: Force indicates the cause of linear change in the translational side of the analogy.

    physical_reading_rules:
      - id: f_physical_reading_rules_1
        when: "result == 0"
        status: info
        text:
          es: Una fuerza neta nula no produce aceleración lineal neta.
          en: A zero net force does not produce net linear acceleration.
      - id: f_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: El papel de la fuerza es equivalente estructuralmente al papel del torque en rotación.
          en: The role of force is structurally analogous to the role of torque in rotation.

    coherence_rules:
      - id: f_coherence_rules_1
        when: "m <= 0"
        status: info
        text:
          es: La masa debe ser positiva para que la interpretación de F = m a tenga sentido físico.
          en: Mass must be positive for F = m a to have physical meaning.
      - id: f_coherence_rules_2
        when: "true"
        status: info
        text:
          es: Comprueba que fuerza, masa y aceleración pertenecen al mismo sistema físico.
          en: Check that force, mass, and acceleration refer to the same physical system.

    model_validity_rules:
      - id: f_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: La relación traslacional es válida como modelo clásico cuando la masa del sistema está bien definida.
          en: The translational relation is valid as a classical model when system mass is well defined.

    graph_rules:
      - id: f_graph_rules_1
        when: "true"
        status: info
        text:
          es: En el gráfico, F debe leerse como la causa lineal que se compara con tau.
          en: In the graph, F should be read as the linear cause compared with tau.

    likely_errors:
      - id: f_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: pensar que fuerza y torque son la misma magnitud con distinto nombre."
          en: "Typical mistake: thinking force and torque are the same quantity with different names."

    next_step_rules:
      - id: f_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Compara ahora F con tau para ver qué cambia al pasar de traslación a rotación.
          en: Now compare F with tau to see what changes from translation to rotation.

  tau:
    magnitude_type: axial_vector
    semantic_role:
      es: Causa dinámica rotacional en la analogía.
      en: Rotational dynamic cause in the analogy.

    summary_rules:
      - id: tau_summary_rules_1
        when: "true"
        status: info
        text:
          es: El torque ocupa en rotación el papel estructural que la fuerza ocupa en traslación.
          en: Torque plays in rotation the structural role that force plays in translation.

    physical_reading_rules:
      - id: tau_physical_reading_rules_1
        when: "result == 0"
        status: info
        text:
          es: Un torque neto nulo no produce aceleración angular neta.
          en: A zero net torque does not produce net angular acceleration.
      - id: tau_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: "El torque no depende solo de la fuerza: también depende del eje y del brazo de palanca."
          en: "Torque does not depend only on force: it also depends on axis and lever arm."

    coherence_rules:
      - id: tau_coherence_rules_1
        when: "I <= 0"
        status: info
        text:
          es: El momento de inercia debe ser positivo para interpretar tau = I alpha.
          en: Moment of inertia must be positive to interpret tau = I alpha.
      - id: tau_coherence_rules_2
        when: "true"
        status: info
        text:
          es: Antes de interpretar tau, verifica que el eje de giro esté definido.
          en: Before interpreting tau, verify that the rotation axis is defined.

    model_validity_rules:
      - id: tau_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: La analogía con fuerza solo es válida como estructura; tau conserva dependencia geométrica.
          en: The analogy with force is valid only structurally; tau keeps geometric dependence.

    graph_rules:
      - id: tau_graph_rules_1
        when: "true"
        status: info
        text:
          es: El gráfico debe mostrar que tau corresponde al lado rotacional de la causa dinámica.
          en: The graph should show tau as the rotational side of the dynamic cause.

    likely_errors:
      - id: tau_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: calcular tau como si fuera simplemente una fuerza sin brazo de palanca."
          en: "Typical mistake: computing tau as if it were simply a force without lever arm."

    next_step_rules:
      - id: tau_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Revisa momento de inercia para entender por qué la analogía con la masa no es perfecta.
          en: Review moment of inertia to understand why the analogy with mass is not perfect.

  m:
    magnitude_type: scalar
    semantic_role:
      es: Resistencia al cambio lineal.
      en: Resistance to linear change.

    summary_rules:
      - id: m_summary_rules_1
        when: "true"
        status: info
        text:
          es: La masa mide la resistencia del sistema a cambiar su movimiento lineal.
          en: Mass measures the system resistance to changes in linear motion.

    physical_reading_rules:
      - id: m_physical_reading_rules_1
        when: "result <= 0"
        status: info
        text:
          es: Una masa no positiva no es válida en este modelo clásico.
          en: A non-positive mass is not valid in this classical model.
      - id: m_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: En la analogía, m cumple el papel estructural que I cumple en rotación.
          en: In the analogy, m plays the structural role that I plays in rotation.

    coherence_rules:
      - id: m_coherence_rules_1
        when: "true"
        status: info
        text:
          es: La masa no depende del eje elegido; esta es una diferencia clave frente a I.
          en: Mass does not depend on the chosen axis; this is a key difference from I.

    model_validity_rules:
      - id: m_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: El uso de m es válido si el sistema se puede tratar como un cuerpo con masa constante.
          en: Using m is valid if the system can be treated as a body with constant mass.

    graph_rules:
      - id: m_graph_rules_1
        when: "true"
        status: info
        text:
          es: En la lectura gráfica, m debe aparecer como resistencia lineal, no como propiedad geométrica.
          en: In the graphical reading, m should appear as linear resistance, not as a geometric property.

    likely_errors:
      - id: m_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: trasladar propiedades de m a I sin considerar la distribución de masa."
          en: "Typical mistake: transferring properties of m to I without considering mass distribution."

    next_step_rules:
      - id: m_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Compara m con I para detectar el límite principal de la analogía.
          en: Compare m with I to detect the main limit of the analogy.

  I:
    magnitude_type: scalar
    semantic_role:
      es: Resistencia al cambio rotacional.
      en: Resistance to rotational change.

    summary_rules:
      - id: i_summary_rules_1
        when: "true"
        status: info
        text:
          es: El momento de inercia mide la resistencia a cambiar el estado de rotación.
          en: Moment of inertia measures resistance to changing rotational state.

    physical_reading_rules:
      - id: i_physical_reading_rules_1
        when: "result <= 0"
        status: info
        text:
          es: Un momento de inercia no positivo indica un modelo físico inválido.
          en: A non-positive moment of inertia indicates an invalid physical model.
      - id: i_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: I no depende solo de cuánta masa hay, sino de cómo está distribuida respecto al eje.
          en: I depends not only on how much mass exists, but on how it is distributed relative to the axis.

    coherence_rules:
      - id: i_coherence_rules_1
        when: "true"
        status: info
        text:
          es: Si cambia el eje, puede cambiar I aunque la masa total sea la misma.
          en: If the axis changes, I may change even if total mass remains the same.

    model_validity_rules:
      - id: i_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: La analogía m ↔ I solo es válida si se recuerda que I incorpora geometría.
          en: The m ↔ I analogy is valid only if I is understood to include geometry.

    graph_rules:
      - id: i_graph_rules_1
        when: "true"
        status: info
        text:
          es: El gráfico debe representar I como resistencia rotacional asociada al eje.
          en: The graph should represent I as rotational resistance associated with the axis.

    likely_errors:
      - id: i_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: creer que dos cuerpos con la misma masa tienen el mismo momento de inercia."
          en: "Typical mistake: believing that two bodies with the same mass have the same moment of inertia."

    next_step_rules:
      - id: i_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Revisa ejemplos de momento de inercia para ver cómo la geometría modifica la rotación.
          en: Review moment of inertia examples to see how geometry modifies rotation.

  a:
    magnitude_type: vector
    semantic_role:
      es: Respuesta lineal del sistema.
      en: Linear response of the system.

    summary_rules:
      - id: a_summary_rules_1
        when: "true"
        status: info
        text:
          es: La aceleración lineal es la respuesta del sistema ante una fuerza neta.
          en: Linear acceleration is the system response to a net force.

    physical_reading_rules:
      - id: a_physical_reading_rules_1
        when: "result == 0"
        status: info
        text:
          es: Aceleración nula significa que no cambia la velocidad lineal.
          en: Zero acceleration means linear velocity does not change.
      - id: a_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: En la analogía, a corresponde estructuralmente a alpha.
          en: In the analogy, a corresponds structurally to alpha.

    coherence_rules:
      - id: a_coherence_rules_1
        when: "m <= 0"
        status: info
        text:
          es: No puede interpretarse a mediante F = m a si la masa no es positiva.
          en: a cannot be interpreted through F = m a if mass is not positive.
      - id: a_coherence_rules_2
        when: "true"
        status: info
        text:
          es: El signo de a debe interpretarse según el eje lineal elegido.
          en: The sign of a must be interpreted according to the chosen linear axis.

    model_validity_rules:
      - id: a_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: La lectura de a es válida si el movimiento se describe en un sistema de referencia adecuado.
          en: Reading a is valid if motion is described in a suitable reference frame.

    graph_rules:
      - id: a_graph_rules_1
        when: "true"
        status: info
        text:
          es: En el gráfico, a debe leerse como la respuesta lineal frente a F.
          en: In the graph, a should be read as the linear response to F.

    likely_errors:
      - id: a_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: confundir aceleración con velocidad."
          en: "Typical mistake: confusing acceleration with velocity."

    next_step_rules:
      - id: a_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Compara a con alpha para ver cómo cambia la respuesta al pasar a rotación.
          en: Compare a with alpha to see how the response changes in rotation.

  alpha:
    magnitude_type: axial_vector
    semantic_role:
      es: Respuesta rotacional del sistema.
      en: Rotational response of the system.

    summary_rules:
      - id: alpha_summary_rules_1
        when: "true"
        status: info
        text:
          es: La aceleración angular es la respuesta rotacional producida por un torque neto.
          en: Angular acceleration is the rotational response produced by a net torque.

    physical_reading_rules:
      - id: alpha_physical_reading_rules_1
        when: "result == 0"
        status: info
        text:
          es: Aceleración angular nula significa que la velocidad angular no cambia.
          en: Zero angular acceleration means angular velocity does not change.
      - id: alpha_physical_reading_rules_2
        when: "true"
        status: info
        text:
          es: Alpha ocupa en rotación el papel estructural de a en traslación.
          en: Alpha plays in rotation the structural role of a in translation.

    coherence_rules:
      - id: alpha_coherence_rules_1
        when: "I <= 0"
        status: info
        text:
          es: No puede interpretarse alpha mediante tau = I alpha si I no es positivo.
          en: alpha cannot be interpreted through tau = I alpha if I is not positive.
      - id: alpha_coherence_rules_2
        when: "true"
        status: info
        text:
          es: El signo de alpha debe interpretarse según el eje angular elegido.
          en: The sign of alpha must be interpreted according to the chosen angular axis.

    model_validity_rules:
      - id: alpha_model_validity_rules_1
        when: "true"
        status: info
        text:
          es: La lectura de alpha es válida cuando el eje de rotación está bien definido.
          en: Reading alpha is valid when the rotation axis is well defined.

    graph_rules:
      - id: alpha_graph_rules_1
        when: "true"
        status: info
        text:
          es: En el gráfico, alpha debe aparecer como respuesta rotacional frente a tau.
          en: In the graph, alpha should appear as the rotational response to tau.

    likely_errors:
      - id: alpha_likely_errors_1
        when: "true"
        status: info
        text:
          es: "Error típico: confundir aceleración angular con velocidad angular."
          en: "Typical mistake: confusing angular acceleration with angular velocity."

    next_step_rules:
      - id: alpha_next_step_rules_1
        when: "true"
        status: info
        text:
          es: Usa alpha para conectar este leaf con cinemática rotacional y segunda ley rotacional.
          en: Use alpha to connect this leaf with rotational kinematics and the rotational second law.

cross_checks:
  - id: analogia_no_identidad
    description:
      es: Comprueba que la analogía se usa como estructura y no como identidad física.
      en: Checks that the analogy is used as a structure, not as physical identity.
    detect_when: "true"
    message:
      es: La correspondencia F↔tau, m↔I y a↔alpha es formal, no una igualdad de naturaleza física.
      en: The correspondence F↔tau, m↔I, and a↔alpha is formal, not equality of physical nature.

error_patterns:
  - id: masa_igual_momento_inercia
    detect_when: "true"
    message:
      es: "Error típico: tratar I como si fuera simplemente la masa en rotación."
      en: "Typical mistake: treating I as simply mass in rotation."

  - id: torque_como_fuerza
    detect_when: "true"
    message:
      es: "Error típico: interpretar tau como una fuerza sin considerar brazo de palanca ni eje."
      en: "Typical mistake: interpreting tau as a force without considering lever arm or axis."

graph_binding:
  enabled: true
  channels:
    - translational_side
    - rotational_side
    - cause_pair
    - resistance_pair
    - response_pair

mini_graph:
  enabled: true
  preferred_type: Coord

output_contract:
  sections:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
