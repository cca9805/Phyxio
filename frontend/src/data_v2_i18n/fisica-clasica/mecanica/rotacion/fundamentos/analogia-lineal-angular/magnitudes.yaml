- id: F
  symbol: F

  nombre:
    es: Fuerza
    en: Force

  descripcion:
    es: Interacción que produce cambios en el movimiento lineal.
    en: Interaction that produces changes in linear motion.

  unidad_si: N
  dimension: M L T^-2

  is_vector: true
  components: [Fx, Fy, Fz]

  category: dinamica
  physical_role: causa

  used_in:
    - segunda_ley_newton

  common_mistake: Confundir fuerza con energía o pensar que siempre produce movimiento.

  typical_range: 0–10^3 N

  sign_behavior:
    has_sign: true
    meaning:
      es: Indica dirección del vector fuerza.
      en: Indicates direction of the force vector.

  zero_behavior:
    allowed: true
    meaning:
      es: Fuerza nula implica ausencia de interacción neta.
      en: Zero force implies no net interaction.

  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)

  interpretation_role:
    primary_for: dinamica_traslacional
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [vector, magnitude]

  pedagogical_notes: Es la causa fundamental del cambio de movimiento en traslación.

- id: m
  symbol: m

  nombre:
    es: Masa
    en: Mass

  descripcion:
    es: Medida de la inercia de un sistema frente a cambios en su movimiento.
    en: Measure of inertia of a system.

  unidad_si: kg
  dimension: M

  is_vector: false
  components: []

  category: propiedad
  physical_role: resistencia

  used_in:
    - segunda_ley_newton

  common_mistake: Pensar que depende de la forma o distribución.

  typical_range: 10^-3–10^3 kg

  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva.
      en: Always positive.

  zero_behavior:
    allowed: false
    meaning:
      es: Masa nula no tiene sentido en mecánica clásica.
      en: Zero mass is not valid in classical mechanics.

  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: (0, inf)

  interpretation_role:
    primary_for: inercia
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [scalar]

  pedagogical_notes: Representa resistencia al cambio de movimiento.

- id: a
  symbol: a

  nombre:
    es: Aceleración
    en: Acceleration

  descripcion:
    es: Variación temporal de la velocidad.
    en: Rate of change of velocity.

  unidad_si: m/s^2
  dimension: L T^-2

  is_vector: true
  components: [ax, ay, az]

  category: cinematica
  physical_role: respuesta

  used_in:
    - segunda_ley_newton

  common_mistake: Confundir con velocidad.

  typical_range: 0–10^2 m/s^2

  sign_behavior:
    has_sign: true
    meaning:
      es: Indica dirección del cambio de velocidad.
      en: Indicates direction of velocity change.

  zero_behavior:
    allowed: true
    meaning:
      es: Aceleración nula implica velocidad constante.
      en: Zero acceleration implies constant velocity.

  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)

  interpretation_role:
    primary_for: dinamica
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [vector]

  pedagogical_notes: Es la respuesta dinámica del sistema.

- id: tau
  symbol: tau

  nombre:
    es: Torque
    en: Torque

  descripcion:
    es: Magnitud que produce cambios en el movimiento rotacional.
    en: Quantity that produces rotational change.

  unidad_si: N·m
  dimension: M L^2 T^-2

  is_vector: true
  components: [taux, tauy, tauz]

  category: dinamica_rotacional
  physical_role: causa

  used_in:
    - segunda_ley_rotacional

  common_mistake: Tratarlo como fuerza lineal.

  typical_range: 0–10^3 N·m

  sign_behavior:
    has_sign: true
    meaning:
      es: Indica sentido de giro.
      en: Indicates rotation direction.

  zero_behavior:
    allowed: true
    meaning:
      es: Torque nulo implica ausencia de cambio rotacional.
      en: Zero torque implies no rotational change.

  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)

  interpretation_role:
    primary_for: dinamica_rotacional
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [vector]

  pedagogical_notes: Depende del punto de aplicación y geometría.

- id: I
  symbol: I

  nombre:
    es: Momento de inercia
    en: Moment of inertia

  descripcion:
    es: Resistencia al cambio de rotación dependiente de la distribución de masa.
    en: Resistance to rotational change dependent on mass distribution.

  unidad_si: kg·m^2
  dimension: M L^2

  is_vector: false
  components: []

  category: propiedad
  physical_role: resistencia

  used_in:
    - segunda_ley_rotacional

  common_mistake: Pensar que es equivalente a la masa.

  typical_range: 10^-3–10^3 kg·m^2

  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo.
      en: Always positive.

  zero_behavior:
    allowed: false
    meaning:
      es: Solo nulo en casos degenerados.
      en: Only zero in degenerate cases.

  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: (0, inf)

  interpretation_role:
    primary_for: inercia_rotacional
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [scalar]

  pedagogical_notes: Introduce dependencia geométrica en rotación.

- id: alpha
  symbol: alpha

  nombre:
    es: Aceleración angular
    en: Angular acceleration

  descripcion:
    es: Variación temporal de la velocidad angular.
    en: Rate of change of angular velocity.

  unidad_si: rad/s^2
  dimension: T^-2

  is_vector: true
  components: [alphax, alphay, alphaz]

  category: cinematica_rotacional
  physical_role: respuesta

  used_in:
    - segunda_ley_rotacional

  common_mistake: Confundir con velocidad angular.

  typical_range: 0–10^2 rad/s^2

  sign_behavior:
    has_sign: true
    meaning:
      es: Indica sentido del cambio angular.
      en: Indicates direction of angular change.

  zero_behavior:
    allowed: true
    meaning:
      es: Aceleración angular nula implica velocidad angular constante.
      en: Zero angular acceleration implies constant angular velocity.

  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)

  interpretation_role:
    primary_for: dinamica_rotacional
    secondary_for: analogia_dinamica

  graph_binding:
    channels: [vector]

  pedagogical_notes: Respuesta del sistema a torque aplicado.
