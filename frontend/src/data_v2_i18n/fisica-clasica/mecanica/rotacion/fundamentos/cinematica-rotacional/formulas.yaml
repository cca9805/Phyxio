- id: mcua_independiente_tiempo
  title:
    es: Ecuación independiente del tiempo
    en: Time-independent equation
  equation: omega^2 = omega_0^2 + 2 * alpha * delta_theta
  latex: \omega^2 = \omega_0^2 + 2\alpha \Delta \theta
  rearrangements: []
  category: auxiliary
  relation_type: geometric_interpretation
  physical_meaning:
    es: Relaciona el cambio de rapidez directamente con el espacio angular recorrido.
    en: Relates the change in speed directly to the angular space traveled.
  constraints:
  - alpha = constante
  validity:
    es: Útil cuando no se conoce el intervalo de tiempo.
    en: Useful when the time interval is unknown.
  dimension_check: '[T^-2] = [T^-2] + [T^-2][1]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - cinematica-rotacional
  interpretation_tags:
  - cinematica-rotacional
  result_semantics:
    target: omega
    meaning: Resulta util para interpretar omega en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: mcua_desplazamiento_medio
  title:
    es: Desplazamiento angular mediante velocidad angular media
    en: Angular displacement via mean angular velocity
  equation: delta_theta = (omega_0 + omega) / 2 * t
  latex: \Delta\theta = \frac{\omega_0 + \omega}{2}\,t
  rearrangements:
  - target: delta_theta
    equation: delta_theta = (omega_0 + omega) / 2 * t
    latex: \Delta\theta = \frac{\omega_0 + \omega}{2}\,t
    constraints: []
  - target: t
    equation: t = 2 * delta_theta / (omega_0 + omega)
    latex: t = \frac{2\,\Delta\theta}{\omega_0 + \omega}
    constraints:
    - omega_0 + omega != 0
  category: auxiliary
  relation_type: integral_relation
  physical_meaning:
    es: En MCUA, la velocidad angular media es la semisuma de los extremos. Multiplicada por el tiempo da el desplazamiento angular, sin necesitar conocer la aceleracion explicita.
    en: In UACM, the mean angular velocity is the arithmetic mean of the extremes. Multiplied by time it gives the angular displacement without needing to know the acceleration explicitly.
  constraints:
  - alpha = constante
  - omega_0 + omega != 0
  validity:
    es: Valida unicamente bajo aceleracion angular constante.
    en: Valid only under constant angular acceleration.
  dimension_check: '[1] = [T^-1][T] = [1]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - cinematica-rotacional
  interpretation_tags:
  - cinematica-rotacional
  result_semantics:
    target: delta_theta
    meaning: Resulta util para calcular el desplazamiento angular cuando se conocen las velocidades angulares inicial y final pero no la aceleracion directamente.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que la aceleracion sea constante durante el intervalo analizado.
      en: Check that the acceleration is constant during the analyzed interval.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - El desplazamiento angular corresponde al area bajo la curva omega vs t, que en MCUA es un trapecio.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Esta ecuacion es util cuando el enunciado da omega0 y omega final sin dar alpha ni t directamente.
      en: This equation is useful when the problem gives omega0 and final omega without giving alpha or t directly.
