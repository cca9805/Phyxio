version: 1
formulas:
- id: mcu_posicion
  title:
    es: Ecuación de posición en MCU
    en: Position equation in UCM
  equation: theta = theta_0 + omega * t
  latex: \theta(t) = \theta_0 + \omega t
  rearrangements:
  - target: omega
    equation: omega = (theta - theta_0) / t
    latex: \omega = \frac{\Delta \theta}{t}
    constraints: []
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: En el movimiento uniforme, la posición angular crece linealmente con el tiempo.
    en: In uniform motion, the angular position increases linearly with time.
  constraints:
  - omega = constante
  - alpha = 0
  validity:
    es: Aplicable a sistemas con rotación estable y sin rozamiento apreciable.
    en: Applicable to systems with stable rotation and no appreciable friction.
  dimension_check: '[1] = [1] + [T^-1][T]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - tocadiscos
  - relojes
  interpretation_tags:
  - cinematica-rotacional
  result_semantics:
    target: omega
    meaning: Resulta util para interpretar omega en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
