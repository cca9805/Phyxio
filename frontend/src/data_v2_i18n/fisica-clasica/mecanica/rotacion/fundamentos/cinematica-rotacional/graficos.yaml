version: "1.0"
leaf: "cinematica-rotacional"

coord:
  title:
    es: Gráfica Coord · Cinemática Rotacional
    en: Coord Graph · Rotational Kinematics
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: ángulo θ (rad) o velocidad angular ω (rad/s)
    en: angle θ (rad) or angular velocity ω (rad/s)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: "ω = dθ/dt. α = dω/dt. Para α constante: θ = θ₀ + ω₀t + ½αt²."
    en: "ω = dθ/dt. α = dω/dt. Constant α: θ = θ₀ + ω₀t + ½αt²."
  physicalReading:
    es: Pendiente de θ(t) = ω. Pendiente de ω(t) = α. Curvatura en θ(t) indica α ≠ 0.
    en: Slope of θ(t) = ω. Slope of ω(t) = α. Curvature in θ(t) indicates α ≠ 0.
  slopeMeaning:
    es: "dθ/dt = ω: velocidad angular."
    en: "dθ/dt = ω: angular velocity."
  interceptMeaning:
    es: "θ(0) = θ₀: ángulo inicial."
    en: "θ(0) = θ₀: initial angle."
  curvatureMeaning:
    es: "d²θ/dt² = α: aceleración angular."
    en: "d²θ/dt² = α: angular acceleration."
  signMeaning:
    es: "ω > 0: giro antihorario. ω < 0: horario."
    en: "ω > 0: counterclockwise. ω < 0: clockwise."
  areaMeaning:
    es: Área bajo ω(t) = Δθ.
    en: Area under ω(t) = Δθ.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Cinemática rotacional con α constante.
    en: Rotational kinematics with constant α.
  formulaConnection:
    es: θ = θ₀ + ω₀t + ½αt², ω = ω₀ + αt.
    en: θ = θ₀ + ω₀t + ½αt², ω = ω₀ + αt.
  readingFocus:
    es: leer pendiente (ω), curvatura (α) y área (Δθ).
    en: read slope (ω), curvature (α) and area (Δθ).
  agentHints:
    es:
      - Pendiente de θ = ω.
      - Área de ω = Δθ.
      - Curvatura de θ = α.
    en:
      - Slope of θ = ω.
      - Area of ω = Δθ.
      - Curvature of θ = α.
  commonMistakes:
    es:
      - ω = θ/t.
      - α = ω/t.
      - Confundir ω y α.
    en:
      - ω = θ/t.
      - α = ω/t.
      - Confusing ω and α.
