  t:
    summary_rules:
    - id: t_summary
      when: 'true'
      status: info
      text:
        es: t es el tiempo transcurrido durante el proceso rotacional analizado.
        en: t is the time elapsed during the analyzed rotational process.
    physical_reading_rules:
    - id: t_physical
      when: 'true'
      status: info
      text:
        es: La lectura de t indica la duracion del movimiento rotacional en estudio.
        en: The reading of t indicates the duration of the rotational motion under study.
    coherence_rules:
    - id: t_coherence
      when: 'true'
      status: ok
      text:
        es: Verifica que t sea positivo y coherente con el intervalo analizado.
        en: Check that t is positive and consistent with the analyzed interval.
    model_validity_rules:
    - id: t_validity
      when: 'true'
      status: ok
      text:
        es: t solo es interpretable dentro del modelo de MCUA elegido.
        en: t is interpretable only inside the chosen UACM model.
    graph_rules:
    - id: t_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de t en los ejes temporales.
        en: The graph must visually reflect the role of t on the time axes.
    likely_errors:
    - id: t_warn
      when: 'true'
      status: warning
      text:
        es: No confundas t con un intervalo parcial o con el periodo de rotacion.
        en: Do not confuse t with a partial interval or with the rotation period.
    next_step_rules:
    - id: t_next
      when: 'true'
      status: info
      text:
        es: Usa t para enlazar con el siguiente paso de interpretacion.
        en: Use t to connect with the next interpretation step.
