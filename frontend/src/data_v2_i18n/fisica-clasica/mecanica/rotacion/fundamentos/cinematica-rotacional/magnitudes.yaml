version: 1
magnitudes:
- id: theta
  symbol: \theta
  nombre:
    es: posición angular
    en: angular position
  descripcion:
    es: Ángulo que describe la orientación de un sólido respecto a un eje de referencia.
    en: Angle describing the orientation of a solid relative to a reference axis.
  unidad_si: rad
  dimension: '1'
  is_vector: false
  components: null
  category: geometric
  physical_role: physical_quantity
  used_in:
  - cinematica-rotacional
  common_mistake: Confundir theta con otra magnitud cercana dentro de cinematica rotacional.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - cinematica-rotacional
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar theta con una definicion estable antes de sustituir valores.
