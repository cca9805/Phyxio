- id: delta_theta
  symbol: \Delta\theta
  nombre:
    es: desplazamiento angular
    en: angular displacement
  descripcion:
    es: Variación de la posición angular entre dos instantes; ángulo barrido durante un intervalo de tiempo.
    en: Change in angular position between two instants; angle swept during a time interval.
  unidad_si: rad
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - cinematica-rotacional
  common_mistake: Confundir el desplazamiento angular con la posición angular theta.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si el giro es en sentido antihorario, negativo si es horario (según convención).
      en: Positive for counterclockwise rotation, negative for clockwise (by convention).
  zero_behavior:
    allowed: true
    meaning:
      es: Un desplazamiento angular nulo indica que el cuerpo ha vuelto a su posición inicial.
      en: Zero angular displacement means the body has returned to its initial position.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - cinematica-rotacional
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Distinguir delta_theta (variacion) de theta (posicion) evita errores de sustitución.
