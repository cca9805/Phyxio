version: 1
formulas:
- id: definicion_radian
  title:
    es: Definición de Radian
    en: Definition of Radian
  equation: theta = s / R
  latex: \theta = \frac{s}{R}
  rearrangements: []
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: El ángulo en radianes es la proporción entre el arco recorrido y el radio
      de la circunferencia.
    en: The angle in radians is the ratio between the traveled arc and the radius
      of the circle.
  constraints:
  - s y R en las mismas unidades de longitud
  validity:
    es: Universal para cualquier circunferencia.
    en: Universal for any circle.
  dimension_check: '[1] = [L] / [L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - magnitudes-angulares
  interpretation_tags:
  - magnitudes-angulares
  result_semantics:
    target: theta
    meaning: Resulta util para interpretar theta en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: relacion_omega_periodo
  title:
    es: Relación entre velocidad angular y periodo
    en: Relationship between angular velocity and period
  equation: omega = 2 * pi / T
  latex: \omega = \frac{2\pi}{T}
  rearrangements: []
  category: derived
  relation_type: definition
  physical_meaning:
    es: En una vuelta completa (2π rad), el tiempo transcurrido es exactamente el
      periodo.
    en: In one full turn (2π rad), the elapsed time is exactly the period.
  constraints:
  - solo para movimiento circular uniforme
  validity:
    es: Válida para cualquier fenómeno cíclico.
    en: Valid for any cyclic phenomenon.
  dimension_check: '[T^-1] = [1] / [T]'
  calculable: true
  motivo_no_calculable: null
