- id: relacion_f_T
  title:
    es: Relación frecuencia-periodo
    en: Frequency-period relationship
  equation: f = 1 / T
  latex: f = \frac{1}{T}
  rearrangements: []
  category: auxiliary
  relation_type: definition
  physical_meaning:
    es: El número de vueltas por segundo es el inverso del tiempo que tarda una sola
      vuelta.
    en: The number of turns per second is the inverse of the time it takes for a single
      turn.
  constraints:
  - T != 0
  validity:
    es: Definición universal de frecuencia.
    en: Universal definition of frequency.
  dimension_check: '[T^-1] = 1 / [T]'
