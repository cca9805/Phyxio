- id: relacion_omega_frecuencia
  title:
    es: Relación entre velocidad angular y frecuencia
    en: Relationship between angular velocity and frequency
  equation: omega = 2 * pi * f
  latex: \omega = 2\pi f
  rearrangements: []
  category: derived
  relation_type: definition
  physical_meaning:
    es: La velocidad angular es la frecuencia escalada por el ángulo de una revolución
      completa.
    en: Angular velocity is the frequency scaled by the angle of a complete revolution.
  constraints:
  - f en Hz (1/s)
  validity:
    es: Herramienta de conversión fundamental en ingeniería.
    en: Fundamental conversion tool in engineering.
  dimension_check: '[T^-1] = [1] * [T^-1]'
