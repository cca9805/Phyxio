version: "1.0"
leaf: "magnitudes-angulares"

coord:
  title:
    es: Gráfica Coord · Magnitudes Angulares
    en: Coord Graph · Angular Magnitudes
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: θ (rad) / ω (rad/s) / α (rad/s²)
    en: θ (rad) / ω (rad/s) / α (rad/s²)
  xMagnitude: t
  yMagnitude: theta
  relation:
    es: ω = dθ/dt. α = dω/dt. θ, ω, α son magnitudes vectoriales en 3D.
    en: ω = dθ/dt. α = dω/dt. θ, ω, α are vector magnitudes in 3D.
  physicalReading:
    es: "θ: posición angular. ω: tasa de cambio. α: aceleración angular."
    en: "θ: angular position. ω: rate of change. α: angular acceleration."
  slopeMeaning:
    es: dθ/dt = ω.
    en: dθ/dt = ω.
  interceptMeaning:
    es: θ(0) = θ₀.
    en: θ(0) = θ₀.
  curvatureMeaning:
    es: d²θ/dt² = α.
    en: d²θ/dt² = α.
  signMeaning:
    es: "ω > 0: antihorario."
    en: "ω > 0: counterclockwise."
  areaMeaning:
    es: Área de ω(t) = Δθ.
    en: Area of ω(t) = Δθ.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Magnitudes angulares de rotación.
    en: Angular magnitudes of rotation.
  formulaConnection:
    es: ω = dθ/dt, α = dω/dt.
    en: ω = dθ/dt, α = dω/dt.
  readingFocus:
    es: identificar θ, ω, α y sus relaciones diferenciales.
    en: identify θ, ω, α and their differential relations.
  agentHints:
    es:
      - ω = dθ/dt.
      - α = dω/dt.
      - Área ω = Δθ.
    en:
      - ω = dθ/dt.
      - α = dω/dt.
      - Area ω = Δθ.
  commonMistakes:
    es:
      - ω = θ/t.
      - α = ω/t.
    en:
      - ω = θ/t.
      - α = ω/t.
