magnitudes:
- id: s
  symbol: s
  nombre:
    es: arco de circunferencia
    en: arc length
  descripcion:
    es: Longitud de la trayectoria curva recorrida por un punto.
    en: Length of the curved path traveled by a point.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - magnitudes-angulares
  common_mistake: Confundir s con otra magnitud cercana dentro de magnitudes angulares.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - magnitudes-angulares
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar s con una definicion estable antes de sustituir valores.
