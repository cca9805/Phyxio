- id: aceleracion_total_modulo
  title:
    es: Módulo de la Aceleración Total
    en: Total Acceleration Magnitude
  equation: a_total = sqrt(a_t^2 + a_n^2)
  latex: a = \sqrt{a_t^2 + a_n^2}
  rearrangements: []
  category: complex
  relation_type: vector_sum
  physical_meaning:
    es: Resultante de la aceleración intrínseca en el sistema de referencia del punto.
    en: Resultant of the intrinsic acceleration in the point's reference system.
  constraints:
  - componentes ortogonales
  validity:
    es: Aplicable a cualquier movimiento curvilíneo.
    en: Applicable to any curvilinear motion.
  dimension_check: '[LT^-2] = sqrt([LT^-2]^2 + [LT^-2]^2)'
  calculable: true
  motivo_no_calculable: null
  used_in:
