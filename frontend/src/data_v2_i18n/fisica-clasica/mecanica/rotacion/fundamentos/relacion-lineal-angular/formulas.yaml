version: 1
formulas:
- id: relacion_v_omega
  title:
    es: Relación Velocidad Lineal-Angular
    en: Linear-Angular Velocity Relationship
  equation: v_t = omega * R
  latex: v_t = \omega R
  rearrangements: []
  category: fundamental
  relation_type: connection
  physical_meaning:
    es: La velocidad de un punto es directamente proporcional a su distancia al eje
      y a la rapidez de giro.
    en: A point's velocity is directly proportional to its distance from the axis
      and the rotation rate.
  constraints:
  - R perpendicular al eje
  validity:
    es: Válida para cualquier punto de un sólido rígido.
    en: Valid for any point on a rigid solid.
  dimension_check: '[LT^-1] = [T^-1][L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - relacion-lineal-angular
  interpretation_tags:
  - relacion-lineal-angular
  result_semantics:
    target: v_t
    meaning: Resulta util para interpretar v_t en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: relacion_at_alpha
  title:
    es: Relación Aceleración Tangencial-Angular
    en: Tangential-Angular Acceleration Relationship
  equation: a_t = alpha * R
  latex: a_t = \alpha R
  rearrangements: []
  category: fundamental
  relation_type: connection
  physical_meaning:
    es: El cambio en la rapidez lineal es el reflejo lineal de la aceleración angular.
    en: The change in linear speed is the linear reflection of the angular acceleration.
  constraints:
  - alpha constante o instantanea
  validity:
    es: Solo existe si el ritmo de giro cambia.
    en: Only exists if the rotation rate changes.
  dimension_check: '[LT^-2] = [T^-2][L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - relacion-lineal-angular
  interpretation_tags:
  - relacion-lineal-angular
  result_semantics:
    target: a_t
    meaning: Resulta util para interpretar a_t en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que los datos pertenezcan al dominio del modelo.
      en: Check that the data belong to the model domain.
  coherence_checks:
  - expr: 'true'
    message:
      es: Revisa que el resultado tenga sentido fisico.
      en: Check that the result makes physical sense.
  graph_implications:
  - La grafica debe reflejar cambios coherentes con la formula.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Comprueba signos, unidades y significado del resultado.
      en: Check signs, units, and meaning of the result.
- id: aceleracion_normal
  title:
    es: Aceleración Normal (Centrípeta)
    en: Normal (Centripetal) Acceleration
  equation: a_n = omega^2 * R
  latex: a_n = \omega^2 R
  rearrangements:
  - target: a_n
    equation: a_n = v_t^2 / R
    latex: a_n = \frac{v_t^2}{R}
    constraints: []
  category: fundamental
  relation_type: geometric_constraint
  physical_meaning:
    es: Aceleración necesaria para mantener la trayectoria curva, apuntando al centro.
    en: Acceleration required to maintain the curved path, pointing to the center.
  constraints:
  - siempre presente si hay rotacion (omega != 0)
  validity:
    es: Crucial para el estudio de órbitas y curvas.
    en: Crucial for studying orbits and curves.
  dimension_check: '[LT^-2] = [T^-2][L] o [L^2 T^-2] / [L]'
  calculable: true
  motivo_no_calculable: null
  used_in:
  - relacion-lineal-angular
  interpretation_tags:
  - relacion-lineal-angular
  result_semantics:
    target: a_n
    meaning: Resulta util para interpretar a_n en el contexto del leaf.
  domain_checks:
  - expr: 'true'
    message:
