version: "1.0"
leaf: "relacion-lineal-angular"

coord:
  title:
    es: Gráfica Coord · Relación Lineal-Angular
    en: Coord Graph · Linear-Angular Relation
  xAxis:
    es: radio R (m)
    en: radius R (m)
  yAxis:
    es: velocidad lineal v (m/s)
    en: linear velocity v (m/s)
  xMagnitude: R
  yMagnitude: v
  relation:
    es: v = ωR. a_t = αR. a_c = ω²R. Pendiente = ω.
    en: v = ωR. a_t = αR. a_c = ω²R. Slope = ω.
  physicalReading:
    es: "v proporcional a R con pendiente ω. Punto en eje: v = 0."
    en: "v proportional to R with slope ω. Point on axis: v = 0."
  slopeMeaning:
    es: "dv/dR = ω: velocidad angular."
    en: "dv/dR = ω: angular velocity."
  interceptMeaning:
    es: "v(0) = 0: eje de rotación."
    en: "v(0) = 0: rotation axis."
  curvatureMeaning:
    es: "Recta: relación lineal exacta."
    en: "Straight line: exact linear relation."
  signMeaning:
    es: "v > 0: misma dirección que ω."
    en: "v > 0: same direction as ω."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: R ≥ 0.
    en: R ≥ 0.
  modelConnection:
    es: "Relación lineal-angular: v = ωR."
    en: "Linear-angular relation: v = ωR."
  formulaConnection:
    es: v = ωR, a_t = αR, a_c = ω²R.
    en: v = ωR, a_t = αR, a_c = ω²R.
  readingFocus:
    es: leer pendiente = ω y verificar v ∝ R.
    en: read slope = ω and verify v ∝ R.
  agentHints:
    es:
      - Pendiente = ω.
      - "v(0) = 0: eje."
      - a_c = ω²R.
    en:
      - Slope = ω.
      - "v(0) = 0: axis."
      - a_c = ω²R.
  commonMistakes:
    es:
      - v = ω/R.
      - v(0) ≠ 0.
      - Pendiente = v.
    en:
      - v = ω/R.
      - v(0) ≠ 0.
      - Slope = v.
