version: 1
magnitudes:
- id: v_t
  symbol: v_t
  nombre:
    es: velocidad tangencial
    en: tangential velocity
  descripcion:
    es: Velocidad lineal instantánea de un punto en la trayectoria curva, siempre
      tangente a la misma.
    en: Instantaneous linear velocity of a point on the curved path, always tangent
      to it.
  unidad_si: m/s
  dimension: '1'
  is_vector: false
  components: null
  category: derived
  physical_role: physical_quantity
  used_in:
  - relacion-lineal-angular
  common_mistake: Confundir v_t con otra magnitud cercana dentro de relacion lineal
    angular.
  typical_range: Depende del contexto fisico del problema.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo depende de la convencion elegida cuando procede.
      en: The sign depends on the chosen convention when applicable.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero debe interpretarse segun el modelo y el contexto.
      en: Zero must be interpreted according to the model and context.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - relacion-lineal-angular
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: Usar v_t con una definicion estable antes de sustituir valores.
