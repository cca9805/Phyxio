    es: Conservación del momento angular.
    en: Conservation of angular momentum.
  formulaConnection:
    es: L = Iω = cte, I_1ω_1 = I_2ω_2.
    en: L = Iω = const, I_1ω_1 = I_2ω_2.
  readingFocus:
    es: identificar cómo cambia ω cuando cambia I.
    en: identify how ω changes when I changes.
  agentHints:
    es:
      - L = cte si τ = 0.
      - I↓ → ω↑.
      - I_1ω_1 = I_2ω_2.
    en:
      - L = const if τ = 0.
      - I↓ → ω↑.
      - I_1ω_1 = I_2ω_2.
  commonMistakes:
    es:
      - ω = cte.
      - I = cte.
      - L = mv.
    en:
      - ω = const.
      - I = const.
      - L = mv.
