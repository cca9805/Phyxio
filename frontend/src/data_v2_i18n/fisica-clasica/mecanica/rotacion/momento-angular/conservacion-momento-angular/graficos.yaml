    es: sistema conservativo L
    en: L-conservative system
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: I_1ω_1 = I_2ω_2 si τ = 0.
    en: I_1ω_1 = I_2ω_2 if τ = 0.
  interactions:
    es: "Sin torque externo: L = cte."
    en: "No external torque: L = const."
  modelElements:
    es:
      - I_1ω_1 = I_2ω_2
      - L = Iω = cte
    en:
      - I_1ω_1 = I_2ω_2
      - L = Iω = const
  visualCues:
    es:
      - "Brazos extendidos: mayor I, menor ω."
      - "Brazos recogidos: menor I, mayor ω."
