        en: Check that omegaf is coherent with units and context.
    physical_reading_rules:
    - id: omegaf_physical
      when: 'true'
      status: info
      text:
        es: La lectura de omegaf debe conectarse con el fenomeno fisico descrito.
        en: The reading of omegaf must connect with the described physical phenomenon.
    model_validity_rules:
