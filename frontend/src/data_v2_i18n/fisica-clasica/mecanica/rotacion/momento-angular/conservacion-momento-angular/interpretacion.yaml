version: 2
id: interpretacion-conservacion-momento-angular
leaf_id: conservacion-momento-angular
nombre:
  es: Interpretacion de Conservacion momento angular
  en: Interpretation of Conservation of Angular Momentum
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cantidad-de-movimiento
  parent_id: momento-angular
  ruta_relativa: fisica-clasica/mecanica/cantidad-de-movimiento/momento-angular/conservacion-momento-angular
dependencies:
  formulas:
  - cons
  - Iomega
  - tau
  - cons_solve_Lf
  - Iomega_solve_omegaf
  magnitudes:
  - L
  - Ii
  - I_final
  - omegai
  - omegaf
  - tau
  - DeltaL
  - DeltaT
  - Li
  - Lf
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  Lf:
    summary_rules:
    - id: Lf_summary
      when: 'true'
      status: info
      text:
        es: Lf resume una lectura fisica relevante del leaf.
        en: Lf summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: Lf_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que Lf sea coherente con unidades y contexto.
        en: Check that Lf is coherent with units and context.
    physical_reading_rules:
    - id: Lf_physical
      when: 'true'
      status: info
      text:
        es: Lf confirma si el estado final mantiene el mismo balance angular total; si tau externo sobre DeltaT es despreciable, un cambio de omegaf solo puede venir de cambiar I y no de crear momento angular.
        en: Lf confirms whether the final state keeps the same total angular balance; if external tau over DeltaT is negligible, a change in omegaf can only come from changing I rather than creating angular momentum.
    model_validity_rules:
    - id: Lf_validity
      when: 'true'
      status: ok
      text:
        es: Lf solo es interpretable dentro del modelo elegido.
        en: Lf is interpretable only inside the chosen model.
    graph_rules:
    - id: Lf_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de Lf.
        en: The graph must reflect the role of Lf visually.
    likely_errors:
    - id: Lf_warn
      when: 'true'
      status: warning
      text:
        es: No confundas Lf con otra magnitud cercana del problema.
        en: Do not confuse Lf with another nearby quantity in the problem.
    next_step_rules:
    - id: Lf_next
      when: 'true'
      status: info
      text:
        es: Usa Lf para enlazar con el siguiente paso de interpretacion.
        en: Use Lf to connect with the next interpretation step.
  omegaf:
    summary_rules:
    - id: omegaf_summary
      when: 'true'
      status: info
      text:
        es: omegaf resume una lectura fisica relevante del leaf.
        en: omegaf summarizes a relevant physical reading of the leaf.
