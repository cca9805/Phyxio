version: "1.0"
leaf: "definicion-momento-angular"

coord:
  title:
    es: Gráfica Coord · Definición Momento Angular
    en: Coord Graph · Angular Momentum Definition
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: momento angular L (kg·m²/s)
    en: angular momentum L (kg·m²/s)
  xMagnitude: t
  yMagnitude: L
  relation:
    es: L = Iω. dL/dt = τ. L conservado si τ = 0.
    en: L = Iω. dL/dt = τ. L conserved if τ = 0.
  physicalReading:
    es: Pendiente de L(t) = τ. L = cte si τ_neto = 0.
    en: Slope of L(t) = τ. L = const if τ_net = 0.
  slopeMeaning:
    es: "dL/dt = τ: torque neto."
    en: "dL/dt = τ: net torque."
  interceptMeaning:
    es: L(0) = Iω₀.
    en: L(0) = Iω₀.
  curvatureMeaning:
    es: "d²L/dt² = dτ/dt: variación del torque."
    en: "d²L/dt² = dτ/dt: torque variation."
  signMeaning:
    es: "L > 0: antihorario. L < 0: horario."
    en: "L > 0: counterclockwise. L < 0: clockwise."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "Momento angular: L = Iω."
    en: "Angular momentum: L = Iω."
  formulaConnection:
    es: L = Iω, dL/dt = τ.
    en: L = Iω, dL/dt = τ.
  readingFocus:
    es: leer pendiente = τ y cambios en L.
    en: read slope = τ and changes in L.
  agentHints:
    es:
      - L = Iω.
      - dL/dt = τ.
      - L = cte si τ = 0.
    en:
      - L = Iω.
      - dL/dt = τ.
      - L = const if τ = 0.
  commonMistakes:
    es:
      - L = mω.
      - L = mv.
      - Confundir L y p.
    en:
      - L = mω.
      - L = mv.
      - Confusing L and p.

svg:
  title:
    es: Escena SVG · Definición Momento Angular
    en: SVG Scene · Angular Momentum Definition
  sceneId: momento_angular_def
  sceneLabel:
    es: "L = r × p = Iω: vector perpendicular al plano"
    en: "L = r × p = Iω: vector perpendicular to plane"
  objects:
    es:
      - partícula
      - r
      - p = mv
      - L = r × p
      - eje de rotación
    en:
      - particle
      - r
      - p = mv
      - L = r × p
      - rotation axis
  mainObject:
    es: cuerpo en rotación
    en: rotating body
  referenceFrame:
    es: origen del sistema
    en: system origin
  geometry:
    es: "L = r × p. |L| = rp senθ."
    en: "L = r × p. |L| = rp sinθ."
  interactions:
    es: dL/dt = τ. L = Iω para cuerpo rígido.
    en: dL/dt = τ. L = Iω for rigid body.
  modelElements:
    es:
      - L = Iω
      - dL/dt = τ
    en:
      - L = Iω
      - dL/dt = τ
  visualCues:
    es:
      - Vector L perpendicular al plano.
      - r y p en el plano.
    en:
      - L vector perpendicular to plane.
      - r and p in the plane.
  scaleMeaning:
    es: "r: distancia al eje."
    en: "r: distance to axis."
  relation:
    es: L = r × p = Iω.
    en: L = r × p = Iω.
  physicalReading:
    es: L perpendicular al plano de rotación.
    en: L perpendicular to rotation plane.
  modelConnection:
    es: Momento angular.
    en: Angular momentum.
  formulaConnection:
    es: L = Iω, dL/dt = τ.
    en: L = Iω, dL/dt = τ.
  readingFocus:
    es: identificar dirección de L y r × p.
    en: identify direction of L and r × p.
  agentHints:
    es:
      - L = r × p.
      - L perpendicular al plano.
    en:
      - L = r × p.
      - L perpendicular to plane.
  commonMistakes:
    es:
      - L en el plano.
      - L = rp siempre.
    en:
      - L in the plane.
      - L = rp always.
