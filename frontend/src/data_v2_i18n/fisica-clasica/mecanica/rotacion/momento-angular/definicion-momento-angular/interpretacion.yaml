version: 2
id: interpretacion-definicion-momento-angular
leaf_id: definicion-momento-angular
nombre:
  es: Interpretacion de Definicion momento angular
  en: Interpretation of Definition of Angular Momentum
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cantidad-de-movimiento
  parent_id: momento-angular
  ruta_relativa: fisica-clasica/mecanica/cantidad-de-movimiento/momento-angular/definicion-momento-angular
dependencies:
  formulas:
  - p
  - L
  - Lrot
  - tau
  - Lrot_solve_omega
  - tau_solve_DeltaL
  magnitudes:
  - L
  - r
  - p
  - m
  - v
  - theta
  - I
  - omega
  - tau
  - DeltaL
  - DeltaT
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  p:
    summary_rules:
    - id: p_summary
      when: 'true'
      status: info
      text:
        es: p resume una lectura fisica relevante del leaf.
        en: p summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: p_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que p sea coherente con unidades y contexto.
        en: Check that p is coherent with units and context.
    physical_reading_rules:
    - id: p_physical
      when: 'true'
      status: info
      text:
        es: p fija la parte lineal del movimiento; solo cuando se combina con el brazo perpendicular respecto al origen explica por que aparece un L grande o pequeno.
        en: p sets the linear part of the motion; only when it is combined with the perpendicular lever arm about the origin does it explain why L becomes large or small.
    model_validity_rules:
    - id: p_validity
      when: 'true'
      status: ok
      text:
        es: p solo es interpretable dentro del modelo elegido.
        en: p is interpretable only inside the chosen model.
    graph_rules:
    - id: p_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de p.
        en: The graph must reflect the role of p visually.
    likely_errors:
    - id: p_warn
      when: 'true'
      status: warning
      text:
        es: No confundas p con otra magnitud cercana del problema.
        en: Do not confuse p with another nearby quantity in the problem.
    next_step_rules:
    - id: p_next
      when: 'true'
      status: info
      text:
        es: Usa p para enlazar con el siguiente paso de interpretacion.
        en: Use p to connect with the next interpretation step.
  L:
    summary_rules:
    - id: L_summary
      when: 'true'
      status: info
      text:
        es: L resume una lectura fisica relevante del leaf.
        en: L summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: L_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que L sea coherente con unidades y contexto.
        en: Check that L is coherent with units and context.
    physical_reading_rules:
    - id: L_physical
      when: 'true'
      status: info
      text:
        es: L no repite a p; mide cuanto efecto de giro produce ese movimiento respecto al origen elegido, asi que cambia si cambia el brazo perpendicular aunque p permanezca igual.
        en: L is not a copy of p; it measures how much turning effect that motion produces about the chosen origin, so it changes when the perpendicular lever arm changes even if p stays the same.
    model_validity_rules:
    - id: L_validity
      when: 'true'
      status: ok
      text:
        es: L solo es interpretable dentro del modelo elegido.
        en: L is interpretable only inside the chosen model.
    graph_rules:
    - id: L_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de L.
        en: The graph must reflect the role of L visually.
    likely_errors:
    - id: L_warn
      when: 'true'
      status: warning
      text:
        es: No confundas L con otra magnitud cercana del problema.
        en: Do not confuse L with another nearby quantity in the problem.
    next_step_rules:
    - id: L_next
      when: 'true'
      status: info
      text:
        es: Usa L para enlazar con el siguiente paso de interpretacion.
        en: Use L to connect with the next interpretation step.
  omega:
    summary_rules:
    - id: omega_summary
      when: 'true'
      status: info
      text:
        es: omega resume una lectura fisica relevante del leaf.
        en: omega summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: omega_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que omega sea coherente con unidades y contexto.
        en: Check that omega is coherent with units and context.
    physical_reading_rules:
    - id: omega_physical
      when: 'true'
      status: info
      text:
        es: "omega solo adquiere sentido aqui cuando el estado angular se reinterpreta como rotor: una omega grande no garantiza un L grande si I es pequeno."
        en: "omega only gains meaning here when the angular state is reinterpreted as a rotor: a large omega does not guarantee a large L if I is small."
    model_validity_rules:
    - id: omega_validity
      when: 'true'
      status: ok
      text:
        es: omega solo es interpretable dentro del modelo elegido.
        en: omega is interpretable only inside the chosen model.
    graph_rules:
    - id: omega_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de omega.
        en: The graph must reflect the role of omega visually.
    likely_errors:
    - id: omega_warn
      when: 'true'
      status: warning
      text:
        es: No confundas omega con otra magnitud cercana del problema.
        en: Do not confuse omega with another nearby quantity in the problem.
    next_step_rules:
    - id: omega_next
      when: 'true'
      status: info
      text:
        es: Usa omega para enlazar con el siguiente paso de interpretacion.
        en: Use omega to connect with the next interpretation step.
  tau:
    summary_rules:
    - id: tau_summary
      when: 'true'
      status: info
      text:
        es: tau resume una lectura fisica relevante del leaf.
        en: tau summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: tau_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que tau sea coherente con unidades y contexto.
        en: Check that tau is coherent with units and context.
    physical_reading_rules:
    - id: tau_physical
      when: 'true'
      status: info
      text:
        es: tau representa la accion externa capaz de cambiar L; si tau no es despreciable, el estado angular deja de leerse como pura geometria y pasa a leerse como respuesta forzada.
        en: tau represents the external action capable of changing L; if tau is not negligible, the angular state stops being read as pure geometry and becomes a forced response.
    model_validity_rules:
    - id: tau_validity
      when: 'true'
      status: ok
      text:
        es: tau solo es interpretable dentro del modelo elegido.
        en: tau is interpretable only inside the chosen model.
    graph_rules:
    - id: tau_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de tau.
        en: The graph must reflect the role of tau visually.
    likely_errors:
    - id: tau_warn
      when: 'true'
      status: warning
      text:
        es: No confundas tau con otra magnitud cercana del problema.
        en: Do not confuse tau with another nearby quantity in the problem.
    next_step_rules:
    - id: tau_next
      when: 'true'
      status: info
      text:
        es: Usa tau para enlazar con el siguiente paso de interpretacion.
        en: Use tau to connect with the next interpretation step.
  DeltaL:
    summary_rules:
    - id: DeltaL_summary
      when: 'true'
      status: info
      text:
        es: DeltaL resume una lectura fisica relevante del leaf.
        en: DeltaL summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: DeltaL_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que DeltaL sea coherente con unidades y contexto.
        en: Check that DeltaL is coherent with units and context.
    physical_reading_rules:
    - id: DeltaL_physical
      when: 'true'
      status: info
      text:
        es: DeltaL cuantifica cuanto ha cambiado realmente el estado angular entre dos instantes; si es apreciable, no basta con describir la trayectoria, hay que explicar que interaccion produjo ese cambio.
        en: DeltaL quantifies how much the angular state has actually changed between two instants; if it is appreciable, describing the trajectory is not enough and one must explain which interaction produced that change.
    model_validity_rules:
    - id: DeltaL_validity
      when: 'true'
      status: ok
      text:
        es: DeltaL solo es interpretable dentro del modelo elegido.
        en: DeltaL is interpretable only inside the chosen model.
    graph_rules:
    - id: DeltaL_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de DeltaL.
        en: The graph must reflect the role of DeltaL visually.
    likely_errors:
    - id: DeltaL_warn
      when: 'true'
      status: warning
      text:
        es: No confundas DeltaL con otra magnitud cercana del problema.
        en: Do not confuse DeltaL with another nearby quantity in the problem.
    next_step_rules:
    - id: DeltaL_next
      when: 'true'
      status: info
      text:
        es: Usa DeltaL para enlazar con el siguiente paso de interpretacion.
        en: Use DeltaL to connect with the next interpretation step.
