version: "1.0"
leaf: "precesion"

svg:
  title:
    es: Escena SVG · Precesión
    en: SVG Scene · Precession
  sceneId: precesion
  sceneLabel:
    es: "Giroscópio: τ ⊥ L provoca precesión Ω_p"
    en: "Gyroscope: τ ⊥ L causes precession Ω_p"
  objects:
    es:
      - giroscópio
      - L
      - τ = r × mg
      - Ω_p
      - eje de precesión
    en:
      - gyroscope
      - L
      - τ = r × mg
      - Ω_p
      - precession axis
  mainObject:
    es: giroscópio
    en: gyroscope
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Ω_p = τ/L = mgr/(Iω).
    en: Ω_p = τ/L = mgr/(Iω).
  interactions:
    es: "τ perp a L: L gira sin cambiar módulo."
    en: "τ perp to L: L rotates without changing magnitude."
  modelElements:
    es:
      - Ω_p = mgr/(Iω)
      - dL/dt = τ
    en:
      - Ω_p = mgr/(Iω)
      - dL/dt = τ
  visualCues:
    es:
      - L apuntando lateralmente.
      - τ vertical.
      - Trayectoria circular de L.
    en:
      - L pointing laterally.
      - τ vertical.
      - Circular trajectory of L.
  scaleMeaning:
    es: "|Ω_p| ∝ 1/ω."
    en: "|Ω_p| ∝ 1/ω."
  relation:
    es: Ω_p = mgr/(Iω).
    en: Ω_p = mgr/(Iω).
  physicalReading:
    es: "τ perp a L → L precesa. ω alto: precesión lenta."
    en: "τ perp to L → L precesses. High ω: slow precession."
  modelConnection:
    es: Precesión giroscopóica.
    en: Gyroscopic precession.
  formulaConnection:
    es: Ω_p = τ/L = mgr/(Iω).
    en: Ω_p = τ/L = mgr/(Iω).
  readingFocus:
    es: identificar τ, L y dirección de precesión.
    en: identify τ, L and precession direction.
  agentHints:
    es:
      - Ω_p = τ/L.
      - τ perp a L.
      - "ω alto: precesión lenta."
    en:
      - Ω_p = τ/L.
      - τ perp to L.
      - "High ω: slow precession."
  commonMistakes:
    es:
      - τ hace caer el giroscópio.
      - Ω_p = ω.
      - L no cambia en precesión.
    en:
      - τ makes gyroscope fall.
      - Ω_p = ω.
      - L unchanged in precession.
