version: 2
id: interpretacion-precesion
leaf_id: precesion
nombre:
  es: Interpretacion de Precesion
  en: Interpretation of Gyroscopic Precession
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: cantidad-de-movimiento
  parent_id: momento-angular
  ruta_relativa: fisica-clasica/mecanica/cantidad-de-movimiento/momento-angular/precesion
dependencies:
  formulas:
  - Omega
  - tau_g
  - L
  - Omega_g
  - Tp
  - Omega_solve_tau
  magnitudes:
  - tau
  - L
  - Omegap
  - Tp
  - M
  - g
  - d
  - I
  - omega
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  Omegap:
    summary_rules:
    - id: Omegap_summary
      when: 'true'
      status: info
      text:
        es: Omegap resume una lectura fisica relevante del leaf.
        en: Omegap summarizes a relevant physical reading of the leaf.
    coherence_rules:
    - id: Omegap_coherence
      when: 'true'
      status: ok
      text:
        es: Comprueba que Omegap sea coherente con unidades y contexto.
        en: Check that Omegap is coherent with units and context.
    physical_reading_rules:
    - id: Omegap_physical
      when: 'true'
      status: info
      text:
        es: Omegap mide cuan deprisa el torque desvía la direccion de L; si tau crece o el giro principal pierde L, la precesion se acelera y el cono se recorre mas rapido.
        en: Omegap measures how fast torque bends the direction of L; if tau grows or the main spin loses L, precession speeds up and the cone is swept faster.
    model_validity_rules:
    - id: Omegap_validity
      when: 'true'
      status: ok
      text:
        es: Omegap solo es interpretable dentro del modelo elegido.
        en: Omegap is interpretable only inside the chosen model.
    graph_rules:
    - id: Omegap_graph
      when: 'true'
      status: info
      text:
        es: La grafica debe reflejar visualmente el papel de Omegap.
        en: The graph must reflect the role of Omegap visually.
    likely_errors:
    - id: Omegap_warn
      when: 'true'
      status: warning
      text:
        es: No confundas Omegap con otra magnitud cercana del problema.
        en: Do not confuse Omegap with another nearby quantity in the problem.
    next_step_rules:
    - id: Omegap_next
      when: 'true'
      status: info
      text:
        es: Usa Omegap para enlazar con el siguiente paso de interpretacion.
        en: Use Omegap to connect with the next interpretation step.
