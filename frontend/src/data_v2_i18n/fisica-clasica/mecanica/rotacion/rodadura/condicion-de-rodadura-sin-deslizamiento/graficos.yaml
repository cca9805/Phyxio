version: "1.0"
leaf: "condicion-de-rodadura-sin-deslizamiento"

coord:
  title:
    es: Gráfica Coord · Condición de Rodadura sin Deslizamiento
    en: Coord Graph · Rolling Without Slipping Condition
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: velocidad lineal v_CM (m/s)
    en: linear velocity v_CM (m/s)
  xMagnitude: omega
  yMagnitude: v
  relation:
    es: "v_CM = ωR. Pendiente = R. Punto de contacto: velocidad nula."
    en: "v_CM = ωR. Slope = R. Contact point: zero velocity."
  physicalReading:
    es: "Recta por origen. Pendiente = R. Deslizamiento: desviacín de la recta."
    en: "Line through origin. Slope = R. Slipping: deviation from line."
  slopeMeaning:
    es: "dv/dω = R: radio."
    en: "dv/dω = R: radius."
  interceptMeaning:
    es: "v(0) = 0: sin rotación, sin traslación."
    en: "v(0) = 0: no rotation, no translation."
  curvatureMeaning:
    es: "Recta: relación exacta sin deslizamiento."
    en: "Straight line: exact no-slip relation."
  signMeaning:
    es: "v > 0: avance en sentido de ω."
    en: "v > 0: forward in ω direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω ≥ 0.
    en: ω ≥ 0.
  modelConnection:
    es: Rodadura sin deslizamiento.
    en: Rolling without slipping.
  formulaConnection:
    es: v_CM = ωR, a_CM = αR.
    en: v_CM = ωR, a_CM = αR.
  readingFocus:
    es: verificar recta por origen y pendiente = R.
    en: verify line through origin and slope = R.
  agentHints:
    es:
      - Pendiente = R.
      - v(0) = 0.
      - "Deslizamiento: desviacín."
    en:
      - Slope = R.
      - v(0) = 0.
      - "Slipping: deviation."
  commonMistakes:
    es:
      - v = ω/R.
      - Pendiente = ω.
      - v(0) ≠ 0.
    en:
      - v = ω/R.
      - Slope = ω.
      - v(0) ≠ 0.

