- id: delta
  symbol: \delta
  nombre:
    es: indicador_deslizamiento
    en: slip_indicator
  descripcion:
    es: Desviación de la condición de rodadura pura (v - omega R).
    en: Deviation from the pure rolling condition (v - omega R).
  unidad_si: m/s
  dimension: L/T
  is_vector: false
  components: null
  category: conceptual
  physical_role:
    es: Diagnóstico de régimen
    en: Regime diagnosis
  used_in:
  - consistencia_rodadura
  common_mistake:
    es: Ignorar su signo para distinguir derrape de patinamiento.
    en: Ignoring its sign to distinguish skidding from spinning.
  typical_range: -10 a 10 m/s
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de referencia adoptado.
      en: Its sign depends on the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa un caso limite fisicamente interpretable.
      en: Zero represents a physically interpretable limiting case.
  value_nature:
