version: 1
magnitudes:
- id: v
  symbol: v
  nombre:
    es: velocidad_lineal
    en: linear_velocity
  descripcion:
    es: Velocidad del centro de masas del cuerpo rígido.
    en: Velocity of the rigid body's center of mass.
  unidad_si: m/s
  dimension: L/T
  is_vector: true
  components:
  - v_x
  - v_y
  category: state
  physical_role:
    es: Magnitud cinemática principal
    en: Primary kinematic magnitude
  used_in:
  - condicion_rodadura
  - velocidad_contacto
  - consistencia_rodadura
  common_mistake:
    es: Confundir con la velocidad del punto de contacto.
    en: Confusing it with the contact point velocity.
  typical_range: 0 - 50 m/s
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de referencia adoptado.
      en: Its sign depends on the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa un caso limite fisicamente interpretable.
      en: Zero represents a physically interpretable limiting case.
  value_nature:
    kind: vector
    nonnegative_only: false
    expected_interval: R
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades SI, signo y contexto fisico al usar v.
    en: Check SI units, sign, and physical context when using v.
- id: omega
  symbol: \omega
  nombre:
    es: velocidad_angular
    en: angular_velocity
  descripcion:
    es: Velocidad angular de rotación respecto al centro de masas.
    en: Angular velocity of rotation about the center of mass.
  unidad_si: rad/s
  dimension: 1/T
  is_vector: true
  components:
  - omega_z
  category: state
  physical_role:
    es: Magnitud rotacional
    en: Rotational magnitude
  used_in:
  - condicion_rodadura
  - velocidad_contacto
  - consistencia_rodadura
  common_mistake:
    es: Usar unidades de rpm o grados/s sin convertir a rad/s.
    en: Using rpm or degrees/s units without converting to rad/s.
  typical_range: 0 - 200 rad/s
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de referencia adoptado.
      en: Its sign depends on the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa un caso limite fisicamente interpretable.
      en: Zero represents a physically interpretable limiting case.
  value_nature:
    kind: vector
    nonnegative_only: false
    expected_interval: R
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades SI, signo y contexto fisico al usar \omega.
    en: Check SI units, sign, and physical context when using \omega.
- id: R
  symbol: R
  nombre:
    es: radio
    en: radius
  descripcion:
    es: Radio efectivo desde el centro de masas al punto de contacto.
    en: Effective radius from the center of mass to the contact point.
  unidad_si: m
  dimension: L
  is_vector: false
  components: null
  category: parameter
  physical_role:
    es: Parámetro geométrico
    en: Geometric parameter
  used_in:
  - condicion_rodadura
  - relacion_aceleracion
  - consistencia_rodadura
  common_mistake:
    es: Usar el diámetro en lugar del radio.
    en: Using diameter instead of radius.
  typical_range: 0.01 - 2.0 m
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en este leaf.
      en: Used as a non-negative magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa un caso limite fisicamente interpretable.
      en: Zero represents a physically interpretable limiting case.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '>= 0'
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades SI, signo y contexto fisico al usar R.
    en: Check SI units, sign, and physical context when using R.
- id: v_contacto
  symbol: v_c
  nombre:
    es: velocidad_punto_contacto
    en: contact_point_velocity
  descripcion:
    es: Velocidad instantánea del punto de contacto respecto a la superficie.
    en: Instantaneous velocity of the contact point relative to the surface.
  unidad_si: m/s
  dimension: L/T
  is_vector: true
  components:
  - v_px
  - v_py
  category: derived
  physical_role:
    es: Indicador de adherencia
    en: Adherence indicator
  used_in:
  - velocidad_contacto
  common_mistake:
    es: Asumir que nunca es cero.
    en: Assuming it is never zero.
  typical_range: 0 m/s (en rodadura pura)
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de referencia adoptado.
      en: Its sign depends on the chosen reference convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El valor cero representa un caso limite fisicamente interpretable.
      en: Zero represents a physically interpretable limiting case.
  value_nature:
    kind: vector
    nonnegative_only: false
    expected_interval: R
  interpretation_role:
    primary_for:
    - lectura-de-resultado
    secondary_for:
    - comprobacion-de-coherencia
  graph_binding:
    channels: []
  pedagogical_notes:
    es: Verificar unidades SI, signo y contexto fisico al usar v_c.
    en: Check SI units, sign, and physical context when using v_c.
- id: a
