    en: static_friction_force
  descripcion:
    es: Fuerza tangencial en el contacto que mantiene el vínculo de rodadura.
    en: Tangential force at contact that maintains the rolling constraint.
  unidad_si: N
  dimension: M*L/T^2
  is_vector: true
  components:
  - f_sx
  - f_sy
  category: parameter
  physical_role:
    es: Fuerza de vínculo
    en: Constraint force
  used_in:
  - ejemplos
  - teoria
  common_mistake:
    es: Usar la fórmula de fricción cinética mu_k*N.
    en: Using the kinetic friction formula mu_k*N.
  typical_range: 0 - 1000 N
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del convenio de referencia adoptado.
      en: Its sign depends on the chosen reference convention.
