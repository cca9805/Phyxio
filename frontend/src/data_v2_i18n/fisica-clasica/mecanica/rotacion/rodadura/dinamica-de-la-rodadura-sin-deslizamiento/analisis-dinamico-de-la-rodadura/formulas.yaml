- id: ley-traslacion-rodadura
  title:
    es: Segunda ley (traslación)
    en: Second Law (translation)
  equation: "M*g*sin(theta) - fs = M*a"
  latex: M g \sin\theta - f_s = M a
  rearrangements:
    - equation: a = (M*g*sin(theta) - fs) / M
      latex: a = (M g \sin\theta - f_s) / M
  category: dinámica
  relation_type: causal
  physical_meaning:
    es: Relaciona las fuerzas externas con la aceleración del centro de masas.
    en: Relates external forces to the center-of-mass acceleration.
  constraints: Cuerpo rígido, masa constante.
  validity:
    es: Válida para cualquier sólido rígido.
    en: Valid for any rigid body.
  dimension_check: "[M][L][T^-2] = [M][L][T^-2]"
  calculable: true
  motivo_no_calculable: null
  used_in: [analisis-dinamico]
  interpretation_tags: [newton, aceleracion]
  result_semantics: Aceleración lineal resultante.
  domain_checks: [a >= 0]
  coherence_checks: [M > 0]
  graph_implications: Define la velocidad del CM en el tiempo.
  pedagogical_triggers: [inercia, fuerza]

- id: ley-rotacion-rodadura
  title:
    es: Segunda ley (rotación)
    en: Second Law (rotation)
  equation: "fs * R = I * alpha"
  latex: f_s R = I \alpha
  rearrangements:
    - equation: alpha = (fs * R) / I
      latex: \alpha = \frac{f_s R}{I}
  category: dinámica
  relation_type: causal
  physical_meaning:
    es: Relaciona los torques externos con la aceleración angular.
    en: Relates external torques to angular acceleration.
  constraints: Eje de giro principal o simetría.
  validity:
    es: Válida para rotación respecto a un eje fijo o el CM.
    en: Valid for rotation about a fixed axis or the CM.
  dimension_check: "[M][L^2][T^-2] = [M][L^2][T^-2]"
  calculable: true
  motivo_no_calculable: null
  used_in: [analisis-dinamico]
  interpretation_tags: [torque, rotacion]
  result_semantics: Aceleración angular resultante.
  domain_checks: [alpha >= 0]
  coherence_checks: [I > 0]
  graph_implications: Define el giro del cuerpo en el Svg.
  pedagogical_triggers: [torque, inercia-rotacional]

- id: vinculo-rodadura-acel
  title:
    es: Vínculo de rodadura (aceleración)
    en: Rolling constraint (acceleration)
  equation: "a = alpha * R"
  latex: a = \alpha R
  rearrangements:
    - equation: alpha = a / R
      latex: \alpha = \frac{a}{R}
  category: cinemática
  relation_type: vínculo
  physical_meaning:
    es: Condición de no deslizamiento en el punto de contacto.
    en: Non-slipping condition at the contact point.
  constraints: Rodadura pura (sin deslizamiento).
  validity:
    es: Solo válida si hay suficiente fricción estática.
    en: Only valid if there is sufficient static friction.
  dimension_check: "[L][T^-2] = [T^-2][L]"
  calculable: true
  motivo_no_calculable: null
  used_in: [analisis-dinamico]
  interpretation_tags: [rodadura, acoplamiento]
  result_semantics: Consistencia cinemática.
  domain_checks: [R > 0]
  coherence_checks: []
  graph_implications: Sincroniza traslación y rotación.
  pedagogical_triggers: [vinculo, rodadura]

- id: aceleracion-rodadura-combinada
  title:
    es: Aceleración general de la rodadura
    en: General Rolling Acceleration
  equation: "a = 9.8 * sin(theta) / (1 + beta)"
  latex: a = \frac{g \sin\theta}{1 + \beta}
  rearrangements:
    - target: a
      equation: a = 9.8 * sin(theta) / (1 + beta)
      latex: a = \frac{g \sin\theta}{1 + \beta}
  category: dinámica
  relation_type: causal
  physical_meaning:
    es: Determina la aceleración final en función de la forma del cuerpo (beta).
    en: Determines final acceleration based on body shape (beta).
  constraints: Rodadura pura, masa y radio constantes.
  validity:
    es: Válida para cualquier sólido de revolución simétrico.
    en: Valid for any symmetric body of revolution.
  dimension_check: "[L][T^-2] = [L][T^-2]"
  calculable: true
  motivo_no_calculable: null
  used_in: [analisis-dinamico]
  interpretation_tags: [aceleracion, forma]
  result_semantics: Aceleración efectiva.
  domain_checks: [a >= 0]
  coherence_checks: [beta >= 0]
  graph_implications: Define la traslación en el Svg.
  pedagogical_triggers: [distribucion-masa, inercia]
