version: "1.0"
leaf: "analisis-dinamico-de-la-rodadura"

coord:
  title:
    es: Gráfica Coord · Análisis Dinámico de la Rodadura
    en: Coord Graph · Dynamic Analysis of Rolling
  xAxis:
    es: aceleración angular α (rad/s²)
    en: angular acceleration α (rad/s²)
  yAxis:
    es: aceleración lineal a_CM (m/s²)
    en: linear acceleration a_CM (m/s²)
  xMagnitude: alpha
  yMagnitude: a
  relation:
    es: "a_CM = αR. τ_neto = Iα. F_neta = ma_CM. Fricción: f = ma_CM − F_ext."
    en: "a_CM = αR. τ_net = Iα. F_net = ma_CM. Friction: f = ma_CM − F_ext."
  physicalReading:
    es: Recta a_CM = αR. Fricción estática es la que genera α.
    en: Line a_CM = αR. Static friction generates α.
  slopeMeaning:
    es: "da_CM/dα = R: radio."
    en: "da_CM/dα = R: radius."
  interceptMeaning:
    es: "a_CM(0) = 0: sin aceleración."
    en: "a_CM(0) = 0: no acceleration."
  curvatureMeaning:
    es: "Recta: relación exacta sin deslizamiento."
    en: "Straight line: exact no-slip relation."
  signMeaning:
    es: "a_CM > 0: aceleración en dirección de avance."
    en: "a_CM > 0: acceleration in forward direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: α real.
    en: α real.
  modelConnection:
    es: Dinámica de rodadura sin deslizamiento.
    en: Dynamics of rolling without slipping.
  formulaConnection:
    es: a_CM = αR, τ = Iα, F = ma_CM.
    en: a_CM = αR, τ = Iα, F = ma_CM.
  readingFocus:
    es: leer a_CM = αR y efectos de fricción.
    en: read a_CM = αR and friction effects.
  agentHints:
    es:
      - a_CM = αR.
      - Fricción estática genera α.
      - τ = Iα.
    en:
      - a_CM = αR.
      - Static friction generates α.
      - τ = Iα.
  commonMistakes:
    es:
      - Fricción = 0 en rodadura.
      - a_CM = α/R.
      - τ = ma.
    en:
      - Friction = 0 in rolling.
      - a_CM = α/R.
      - τ = ma.

