- id: a
  symbol: a
  nombre:
    es: Aceleración del centro de masas
    en: Center-of-mass acceleration
  descripcion:
    es: Aceleración lineal del centro de masas del cuerpo rígido.
    en: Linear acceleration of the center of mass of the rigid body.
  unidad_si: m/s²
  dimension: L T⁻²
  category: cinemática
  physical_role: variable de estado
  used_in: [ ley-traslacion-rodadura, vinculo-rodadura-acel ]
  is_vector: true
  components: [ ax, ay ]
  common_mistake:
    es: Confundirla con la aceleración de un punto en el borde.
    en: Confusing it with the acceleration of a point on the rim.
  typical_range: [ 0, 10 ]
  sign_behavior: positivo en el sentido del movimiento
  zero_behavior: reposo o velocidad constante
  value_nature: real
  interpretation_role: output
  graph_binding: Svg.vCm
  pedagogical_notes: Es la aceleración que mide un observador externo siguiendo el eje.

- id: fs
  symbol: f_s
  nombre:
    es: Fuerza de rozamiento estática
    en: Static friction force
  descripcion:
    es: Fuerza necesaria para mantener el vínculo de rodadura pura.
    en: Force required to maintain the pure rolling constraint.
  unidad_si: N
  dimension: M L T⁻²
  category: dinámica
  physical_role: fuerza de vínculo
  used_in: [ ley-traslacion-rodadura, ley-rotacion-rodadura ]
  is_vector: true
  components: [ fs ]
  common_mistake:
    es: Calcularla siempre como mu_s * N.
    en: Always calculating it as mu_s * N.
  typical_range: [ 0, 100 ]
  sign_behavior: opuesta a la tendencia al deslizamiento
  zero_behavior: no hay tendencia al deslizamiento
  value_nature: real
  interpretation_role: internal
  graph_binding: null
  pedagogical_notes: No realiza trabajo en rodadura pura.

- id: I
  symbol: I
  nombre:
    es: Momento de inercia
    en: Moment of inertia
  descripcion:
    es: Distribución de masa respecto al eje de giro.
    en: Mass distribution relative to the axis of rotation.
  unidad_si: kg·m²
  dimension: M L²
  category: estructural
  physical_role: parámetro del cuerpo
  used_in: [ ley-rotacion-rodadura ]
  is_vector: false
  components: []
  common_mistake:
    es: No usar el valor correcto según la geometría.
    en: Not using the correct value according to geometry.
  typical_range: [ 0.01, 10 ]
  sign_behavior: siempre positivo
  zero_behavior: masa nula o concentrada en el eje
  value_nature: real
  interpretation_role: parameter
  graph_binding: null
  pedagogical_notes: Representa la inercia a rotar.

- id: M
  symbol: M
  nombre:
    es: Masa total
    en: Total mass
  descripcion:
    es: Masa del cuerpo rígido que rueda.
    en: Mass of the rolling rigid body.
  unidad_si: kg
  dimension: M
  category: estructural
  physical_role: parámetro del cuerpo
  used_in: [ ley-traslacion-rodadura ]
  is_vector: false
  components: []
  common_mistake:
    es: Olvidar que la inercia depende de la masa.
    en: Forgetting that inertia depends on mass.
  typical_range: [ 0.1, 100 ]
  sign_behavior: siempre positivo
  zero_behavior: no existe el cuerpo
  value_nature: real
  interpretation_role: parameter
  graph_binding: null
  pedagogical_notes: Es la propiedad intrínseca del cuerpo.

- id: R
  symbol: R
  nombre:
    es: Radio
    en: Radius
  descripcion:
    es: Radio del cuerpo rígido.
    en: Radius of the rigid body.
  unidad_si: m
  dimension: L
  category: estructural
  physical_role: parámetro del cuerpo
  used_in: [ ley-rotacion-rodadura, vinculo-rodadura-acel ]
  is_vector: false
  components: []
  common_mistake:
    es: Usar el diámetro en lugar del radio.
    en: Using diameter instead of radius.
  typical_range: [ 0.01, 2 ]
  sign_behavior: siempre positivo
  zero_behavior: cuerpo puntual
  value_nature: real
  interpretation_role: parameter
  graph_binding: null
  pedagogical_notes: Define la escala del movimiento.

- id: alpha
  symbol: alpha
  nombre:
    es: Aceleración angular
    en: Angular acceleration
  descripcion:
    es: Ritmo de cambio de la velocidad angular.
    en: Rate of change of angular velocity.
  unidad_si: rad/s²
  dimension: T⁻²
  category: cinemática
  physical_role: variable de estado
  used_in: [ ley-rotacion-rodadura, vinculo-rodadura-acel ]
  is_vector: false
  components: []
  common_mistake:
    es: Confundirla con la velocidad angular.
    en: Confusing it with angular velocity.
  typical_range: [ 0, 50 ]
  sign_behavior: positivo en sentido de giro
  zero_behavior: giro uniforme o reposo
  value_nature: real
  interpretation_role: output
  graph_binding: null
  pedagogical_notes: Se vincula linealmente con la aceleración del CM.

- id: theta
  symbol: theta
  nombre:
    es: Ángulo de inclinación
    en: Inclination angle
  descripcion:
    es: Ángulo del plano inclinado respecto a la horizontal.
    en: Angle of the inclined plane relative to the horizontal.
  unidad_si: rad
  dimension: adimensional
  category: ambiental
  physical_role: parámetro del entorno
  used_in: [ ley-traslacion-rodadura ]
  is_vector: false
  components: []
  common_mistake:
    es: Usar el ángulo con la vertical.
    en: Using the angle with the vertical.
  typical_range: [ 0, 1.57 ]
  sign_behavior: siempre positivo
  zero_behavior: plano horizontal
  value_nature: real
  interpretation_role: parameter
  graph_binding: Svg.theta
  pedagogical_notes: Determina la componente motriz del peso.

- id: beta
  symbol: beta
  nombre:
    es: Factor de forma
    en: Shape factor
  descripcion:
    es: Razón entre el momento de inercia y el producto MR².
    en: Ratio between the moment of inertia and the MR² product.
  unidad_si: adimensional
  dimension: adimensional
  category: estructural
  physical_role: parámetro del cuerpo
  used_in: [ ley-traslacion-rodadura ]
  is_vector: false
  components: []
  common_mistake:
    es: Confundirlo con el momento de inercia absoluto.
    en: Confusing it with the absolute moment of inertia.
  typical_range: [ 0.1, 1 ]
  sign_behavior: siempre positivo
  zero_behavior: masa puntual en el centro
  value_nature: real
  interpretation_role: parameter
  graph_binding: Svg.beta
  pedagogical_notes: Define la eficiencia de aceleración.

- id: mu_s
  symbol: \mu_s
  nombre:
    es: Coeficiente de fricción estática
    en: Static friction coefficient
  descripcion:
    es: Parámetro adimensional que limita la fricción estática máxima disponible.
    en: Dimensionless parameter that limits the maximum available static friction.
  unidad_si: adimensional
  dimension: adimensional
  category: ambiental
  physical_role: parámetro del entorno
  used_in: [ modelos, errores ]
  is_vector: false
  components: []
  common_mistake:
    es: Tratarlo como una fuerza en lugar de un coeficiente.
    en: Treating it as a force instead of a coefficient.
  typical_range: [ 0.05, 1.2 ]
  sign_behavior: siempre positivo
  zero_behavior: ausencia total de agarre estático
  value_nature: real
  interpretation_role: parameter
  graph_binding: null
  pedagogical_notes: Se usa para verificar la condición [[fs]] <= [[mu_s]] N.
