version: "1.0"
leaf: "ejemplos-clasicos-rodadura"

coord:
  id: "ejemplos-clasicos-rodadura-Coord"
  graphId: "ejemplos-clasicos-rodadura-Coord"
  type: "Coord"
  graphType: "Coord"

  title:
    es: "Gráfica Coord · Ejemplos Clásicos de Rodadura"
    en: "Coord Graph · Classic Rolling Examples"

  xAxis:
    es: "velocidad angular ω (rad/s)"
    en: "angular velocity ω (rad/s)"
  yAxis:
    es: "velocidad lineal v_CM (m/s)"
    en: "linear velocity v_CM (m/s)"

  xMagnitude: "omega"
  yMagnitude: "v"

  relation:
    es: "v_CM = ωR para distintos cuerpos (esfera, disco, aro). Pendiente = R."
    en: "v_CM = ωR for different bodies (sphere, disk, hoop). Slope = R."

  physicalReading:
    es: "Rectas con pendiente R. Comparar E_rot de distintos cuerpos en rampa."
    en: "Lines with slope R. Compare E_rot of different bodies on ramp."

  slopeMeaning:
    es: "dv/dω = R."
    en: "dv/dω = R."

  interceptMeaning:
    es: "v(0) = 0."
    en: "v(0) = 0."

  curvatureMeaning:
    es: "Recta: v = ωR exacto."
    en: "Straight: v = ωR exact."

  signMeaning:
    es: "v > 0."
    en: "v > 0."

  areaMeaning:
    es: "Sin interpretación directa."
    en: "No direct interpretation."

  domainMeaning:
    es: "ω ≥ 0."
    en: "ω ≥ 0."

  modelConnection:
    es: "Rodadura clásica: esfera, disco, aro."
    en: "Classic rolling: sphere, disk, hoop."

  formulaConnection:
    es: "v = ωR, E = ½mv² + ½Iω²."
    en: "v = ωR, E = ½mv² + ½Iω²."

  readingFocus:
    es: "comparar pendientes y fracciones rotacionales."
    en: "compare slopes and rotational fractions."

  curveProfile:
    type: "linear"
    expectedShape:
      es: "recta creciente que pasa por el origen con pendiente R"
      en: "increasing straight line through the origin with slope R"
    keyPoints:
      - x: 0
        y: 0
        label:
          es: "sin rotación no hay traslación"
          en: "no rotation, no translation"

  agentHints:
    es:
      - "v = ωR."
      - "Aro: mayor fracción rot."
      - "Esfera: llega más rápido."
    en:
      - "v = ωR."
      - "Hoop: largest rot fraction."
      - "Sphere: arrives fastest."

  commonMistakes:
    es:
      - "Todos igual."
      - "Olvidar I en E."
    en:
      - "All the same."
      - "Forgetting I in E."

  dataRange:
    xMin: 0
    xMax: 50
    yMin: 0
    yMax: 50
    autoScale: true

  recommendedTab: "graficas"
