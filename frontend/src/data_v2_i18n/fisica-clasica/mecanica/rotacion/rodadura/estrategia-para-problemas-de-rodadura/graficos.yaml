version: "1.0"
leaf: "estrategia-para-problemas-de-rodadura"

coord:
  title:
    es: Gráfica Coord · Estrategia para Problemas de Rodadura
    en: Coord Graph · Strategy for Rolling Problems
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: velocidad lineal v_CM (m/s)
    en: linear velocity v_CM (m/s)
  xMagnitude: omega
  yMagnitude: v
  relation:
    es: "Estrategia: 1) v_CM = ωR. 2) E_total = ½mv² + ½Iω². 3) τ = Iα."
    en: "Strategy: 1) v_CM = ωR. 2) E_total = ½mv² + ½Iω². 3) τ = Iα."
  physicalReading:
    es: Aplicar sistemáticamente la condición de rodadura y las ecuaciones de Newton-Euler.
    en: Systematically apply the rolling condition and Newton-Euler equations.
  slopeMeaning:
    es: dv/dω = R.
    en: dv/dω = R.
  interceptMeaning:
    es: v(0) = 0.
    en: v(0) = 0.
  curvatureMeaning:
    es: "Recta: v = ωR."
    en: "Straight: v = ωR."
  signMeaning:
    es: "v > 0: avance."
    en: "v > 0: forward."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω ≥ 0.
    en: ω ≥ 0.
  modelConnection:
    es: Estrategia para problemas de rodadura.
    en: Strategy for rolling problems.
  formulaConnection:
    es: v_CM = ωR, E = ½mv² + ½Iω², τ = Iα.
    en: v_CM = ωR, E = ½mv² + ½Iω², τ = Iα.
  readingFocus:
    es: aplicar los 3 pasos de la estrategia.
    en: apply the 3 strategy steps.
  agentHints:
    es:
      - 1) v = ωR.
      - 2) E = ½mv²+½Iω².
      - 3) τ = Iα.
    en:
      - 1) v = ωR.
      - 2) E = ½mv²+½Iω².
      - 3) τ = Iα.
  commonMistakes:
    es:
      - Olvidar E_rot.
      - No usar v = ωR.
    en:
      - Forgetting E_rot.
      - Not using v = ωR.

dcl:
  title:
    es: DCL · Estrategia para Problemas de Rodadura
    en: FBD · Strategy for Rolling Problems
  xAxis:
    es: eje x (horizontal)
    en: x-axis (horizontal)
  yAxis:
    es: eje y (vertical)
    en: y-axis (vertical)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: ΣF_x = ma_CM. Στ = Iα. v_CM = ωR.
    en: ΣF_x = ma_CM. Στ = Iα. v_CM = ωR.
  physicalReading:
    es: "DCL: identificar N, mg, F_ext y fricción estática."
    en: "FBD: identify N, mg, F_ext and static friction."
  slopeMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  interceptMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  curvatureMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  signMeaning:
    es: Fuerzas con signo según eje.
    en: Forces signed by axis direction.
  areaMeaning:
    es: No aplica en DCL.
    en: Not applicable in FBD.
  domainMeaning:
    es: Plano 2D.
    en: 2D plane.
  modelConnection:
    es: "DCL de rodadura: Newton-Euler."
    en: "Rolling FBD: Newton-Euler."
  formulaConnection:
    es: ΣF = ma_CM, Στ = Iα.
    en: ΣF = ma_CM, Στ = Iα.
  readingFocus:
    es: identificar todas las fuerzas y sus puntos de aplicación.
    en: identify all forces and their application points.
  agentHints:
    es:
      - Fricción en punto de contacto.
      - N perpendicular.
      - τ = r × F.
    en:
      - Friction at contact point.
      - N perpendicular.
      - τ = r × F.
  commonMistakes:
    es:
      - Olvidar fricción.
      - Fricción cinética en rodadura sin deslizamiento.
    en:
      - Forgetting friction.
      - Kinetic friction in no-slip rolling.

