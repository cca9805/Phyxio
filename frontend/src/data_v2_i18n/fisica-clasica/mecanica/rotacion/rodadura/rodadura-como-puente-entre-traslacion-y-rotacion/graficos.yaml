version: "1.0"
leaf: "rodadura-como-puente-entre-traslacion-y-rotacion"

coord:
  title:
    es: Gráfica Coord · Rodadura como Puente Traslación-Rotación
    en: Coord Graph · Rolling as Bridge Between Translation and Rotation
  xAxis:
    es: velocidad angular ω (rad/s)
    en: angular velocity ω (rad/s)
  yAxis:
    es: velocidad lineal v_CM (m/s)
    en: linear velocity v_CM (m/s)
  xMagnitude: omega
  yMagnitude: v
  relation:
    es: v_CM = ωR une traslación y rotación. p = mv_CM. L = Iω. E = ½mv² + ½Iω².
    en: v_CM = ωR links translation and rotation. p = mv_CM. L = Iω. E = ½mv² + ½Iω².
  physicalReading:
    es: "Rodadura: movimiento híbrido traslación + rotación."
    en: "Rolling: hybrid translation + rotation motion."
  slopeMeaning:
    es: dv/dω = R.
    en: dv/dω = R.
  interceptMeaning:
    es: v(0) = 0.
    en: v(0) = 0.
  curvatureMeaning:
    es: "Recta: v = ωR."
    en: "Straight: v = ωR."
  signMeaning:
    es: "v > 0: avance."
    en: "v > 0: forward."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ω ≥ 0.
    en: ω ≥ 0.
  modelConnection:
    es: Rodadura como puente traslación-rotación.
    en: Rolling as translation-rotation bridge.
  formulaConnection:
    es: v_CM = ωR, E = ½mv² + ½Iω².
    en: v_CM = ωR, E = ½mv² + ½Iω².
  readingFocus:
    es: leer cómo v_CM une traslación y rotación.
    en: read how v_CM links translation and rotation.
  agentHints:
    es:
      - v_CM = ωR.
      - E total = traslación + rotación.
    en:
      - v_CM = ωR.
      - Total E = translation + rotation.
  commonMistakes:
    es:
      - Solo E traslación.
      - v_CM = ω/R.
    en:
      - Only translation E.
      - v_CM = ω/R.

