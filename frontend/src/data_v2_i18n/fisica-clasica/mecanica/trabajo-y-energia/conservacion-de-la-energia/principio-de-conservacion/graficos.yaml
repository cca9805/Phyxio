version: "1.0"
leaf: "principio-de-conservacion"

coord:
  title:
    es: Gráfica Coord · Principio de Conservación
    en: Coord Graph · Conservation Principle
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: E_mec = Ec + Ep = cte (sin rozamiento). Cuando Ep sube, Ec baja. E_mec = E_mec_0.
    en: E_mech = KE + PE = const (frictionless). When PE rises, KE falls. E_mech = E_mech_0.
  physicalReading:
    es: "Suma Ec + Ep constante. Cruce de curvas: Ec = Ep. Ec = 0: puntos de retorno. Ep = 0: máxima velocidad."
    en: "Sum KE + PE constant. Curve crossing: KE = PE. KE = 0: turning points. PE = 0: maximum velocity."
  slopeMeaning:
    es: "dE_mec/dx = 0: conservación."
    en: "dE_mech/dx = 0: conservation."
  interceptMeaning:
    es: E_mec inicial.
    en: Initial E_mech.
  curvatureMeaning:
    es: Ec parabólica (½mv²). Ep lineal (mgh) o parabólica (½kx²).
    en: KE parabolic (½mv²). PE linear (mgh) or parabolic (½kx²).
  signMeaning:
    es: Ec ≥ 0 siempre. Ep puede ser negativa.
    en: KE ≥ 0 always. PE can be negative.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el rango de movimiento.
    en: x in the range of motion.
  modelConnection:
    es: Principio de conservación de la energía mecánica.
    en: Principle of conservation of mechanical energy.
  formulaConnection:
    es: Ec + Ep = cte, ½mv² + mgh = cte.
    en: KE + PE = const, ½mv² + mgh = const.
  readingFocus:
    es: leer que Ec + Ep = cte e identificar puntos de retorno y máxima velocidad.
    en: read that KE + PE = const and identify turning points and maximum velocity.
  agentHints:
    es:
      - Ec + Ep = cte.
      - "Ec = 0: punto de retorno."
      - "Ep min: v máxima."
    en:
      - KE + PE = const.
      - "KE = 0: turning point."
      - "Min PE: max v."
  commonMistakes:
    es:
      - E_mec no se conserva con rozamiento.
      - Ep siempre = mgh.
      - Ec = 0 implica parado.
    en:
      - E_mech not conserved with friction.
      - PE always = mgh.
      - KE = 0 means stopped.
