version: 1
magnitudes:
- id: Em
  symbol: E_m
  nombre:
    es: energia_mecanica
    en: mechanical_energy
  descripcion:
    es: Suma de energia cinetica y potencial del sistema en un estado.
    en: Sum of kinetic and potential energy of the system at one state.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: state_quantity
  used_in:
  - principio-de-conservacion
  common_mistake: Confundir Em constante con K constante.
  typical_range: Dependiente del sistema y la referencia potencial.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo puede cambiar por la referencia elegida de U.
      en: Its sign may change with the chosen U reference.
  zero_behavior:
    allowed: true
    meaning:
      es: Puede anularse en una referencia particular sin perder significado físico.
      en: It can be zero under a chosen baseline and still be physically meaningful.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for:
    - principio-de-conservacion
    secondary_for: []
  graph_binding:
    channels:
    - Em
  pedagogical_notes: Interpretar Em junto con la referencia de potencial declarada.
- id: K
  symbol: K
  nombre:
    es: energia_cinetica
    en: kinetic_energy
  descripcion:
    es: Energia asociada al movimiento en un estado.
    en: Energy associated with motion at one state.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: energy_term
  used_in:
  - principio-de-conservacion
  common_mistake: Usar signo negativo en K por elegir un eje negativo.
  typical_range: No negativa en modelos clasicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: K es no negativa por definicion.
      en: K is nonnegative by definition.
  zero_behavior:
    allowed: true
    meaning:
      es: K=0 corresponde a reposo instantaneo.
      en: K=0 corresponds to instantaneous rest.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - K
  pedagogical_notes: No confundir velocidad negativa con energia cinetica negativa.
- id: U
  symbol: U
  nombre:
    es: energia_potencial
    en: potential_energy
  descripcion:
    es: Energia asociada a configuracion o posicion respecto a una referencia.
    en: Energy associated with configuration or position relative to a reference.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: energy_term
  used_in:
  - principio-de-conservacion
  common_mistake: Cambiar de referencia entre estado inicial y final.
  typical_range: Puede ser positiva o negativa segun referencia.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende del cero de potencial adoptado.
      en: Sign depends on the adopted potential zero.
  zero_behavior:
    allowed: true
    meaning:
      es: U=0 fija una referencia, no ausencia de interacción.
      en: U=0 sets a baseline, not absence of interaction.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - U
  pedagogical_notes: Declarar la referencia antes de comparar estados.
- id: Ki
  symbol: K_i
  nombre:
    es: energia_cinetica_inicial
    en: initial_kinetic_energy
  descripcion:
    es: Energia cinetica en el estado inicial.
    en: Kinetic energy at the initial state.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: boundary_condition
  used_in:
  - principio-de-conservacion
  common_mistake: Tomar Ki como velocidad inicial en lugar de energia.
  typical_range: No negativa.
  sign_behavior:
    has_sign: false
    meaning:
      es: Ki no puede ser negativa.
      en: Ki cannot be negative.
  zero_behavior:
    allowed: true
    meaning:
      es: Ki=0 indica inicio desde reposo.
      en: Ki=0 indicates a start from rest.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - Ki
  pedagogical_notes: Convertir velocidad inicial a energia antes del balance.
- id: Kf
  symbol: K_f
  nombre:
    es: energia_cinetica_final
    en: final_kinetic_energy
  descripcion:
    es: Energia cinetica en el estado final.
    en: Kinetic energy at the final state.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: output_quantity
  used_in:
  - principio-de-conservacion
  common_mistake: No verificar si el Kf calculado es físicamente alcanzable.
  typical_range: No negativa.
  sign_behavior:
    has_sign: false
    meaning:
      es: Kf no puede ser negativa.
      en: Kf cannot be negative.
  zero_behavior:
    allowed: true
    meaning:
      es: Kf=0 describe llegada a punto de retorno.
      en: Kf=0 describes reaching a turning point.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - principio-de-conservacion
    secondary_for: []
  graph_binding:
    channels:
    - Kf
  pedagogical_notes: Contrastar Kf con la situación mecánica final descrita.
- id: Ui
  symbol: U_i
  nombre:
    es: energia_potencial_inicial
    en: initial_potential_energy
  descripcion:
    es: Energia potencial en el estado inicial con referencia explícita.
    en: Potential energy at the initial state with explicit reference.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: boundary_condition
  used_in:
  - principio-de-conservacion
  common_mistake: Usar distinta cota de altura en Ui y Uf.
  typical_range: Depende de referencia.
  sign_behavior:
    has_sign: true
    meaning:
      es: Puede ser positiva o negativa según el nivel de referencia.
      en: It may be positive or negative depending on the baseline.
  zero_behavior:
    allowed: true
    meaning:
      es: Ui=0 es una elección de nivel de referencia.
      en: Ui=0 is a chosen baseline level.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - Ui
  pedagogical_notes: Explicitar referencia vertical o de deformacion al definir Ui.
- id: Uf
  symbol: U_f
  nombre:
    es: energia_potencial_final
    en: final_potential_energy
  descripcion:
    es: Energia potencial en el estado final con la misma referencia que Ui.
    en: Potential energy at the final state with the same baseline as Ui.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: boundary_condition
  used_in:
  - principio-de-conservacion
  common_mistake: Cambiar referencia final y alterar artificialmente el balance.
  typical_range: Depende de referencia.
  sign_behavior:
    has_sign: true
    meaning:
      es: Puede cambiar de signo según la referencia.
      en: It may change sign with the baseline.
  zero_behavior:
    allowed: true
    meaning:
      es: Uf=0 solo fija referencia, no implica ausencia de energía total.
      en: Uf=0 only sets a baseline, not absence of total energy.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - Uf
  pedagogical_notes: Mantener continuidad de referencia entre Ui y Uf.
- id: Wnc
  symbol: W_{nc}
  nombre:
    es: trabajo_no_conservativo
    en: non_conservative_work
  descripcion:
    es: Trabajo neto de fuerzas no conservativas entre estados.
    en: Net work by non-conservative forces between states.
  unidad_si: J
  dimension: ML^2T^{-2}
  is_vector: false
  components: null
  category: derived
  physical_role: transfer_term
  used_in:
  - principio-de-conservacion
  common_mistake: Tomar siempre Wnc negativo sin revisar convención de trabajo.
  typical_range: Context-dependent.
  sign_behavior:
    has_sign: true
    meaning:
      es: Negativo en disipación neta, positivo en aporte energético externo.
      en: Negative for net dissipation, positive for external energetic input.
  zero_behavior:
    allowed: true
    meaning:
      es: Wnc=0 recupera el caso conservativo ideal.
      en: Wnc=0 recovers the ideal conservative case.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for:
    - principio-de-conservacion
  graph_binding:
    channels:
    - Wnc
  pedagogical_notes: Interpretar signo de Wnc con el convenio de trabajo adoptado.
