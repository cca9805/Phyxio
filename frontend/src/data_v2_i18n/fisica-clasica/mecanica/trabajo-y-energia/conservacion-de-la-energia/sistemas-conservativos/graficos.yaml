version: "1.0"
leaf: "sistemas-conservativos"

coord:
  title:
    es: Gráfica Coord · Sistemas Conservativos
    en: Coord Graph · Conservative Systems
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "Sistema conservativo: trabajo independiente del camino. F = −dEp/dx. E_mec = cte."
    en: "Conservative system: work path-independent. F = −dPE/dx. E_mech = const."
  physicalReading:
    es: "F = −pendiente de Ep(x). Mínimo de Ep: equilibrio estable. Máximo: equilibrio inestable."
    en: "F = −slope of PE(x). PE minimum: stable equilibrium. Maximum: unstable equilibrium."
  slopeMeaning:
    es: "dEp/dx = −F: fuerza conservativa como gradiente negativo."
    en: "dPE/dx = −F: conservative force as negative gradient."
  interceptMeaning:
    es: Ep referencia en x_0.
    en: PE reference at x_0.
  curvatureMeaning:
    es: "d²Ep/dx² > 0: mínimo (estable). d²Ep/dx² < 0: máximo (inestable)."
    en: "d²PE/dx² > 0: minimum (stable). d²PE/dx² < 0: maximum (unstable)."
  signMeaning:
    es: Ec ≥ 0. Ep libre en signo.
    en: KE ≥ 0. PE free in sign.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en región accesible (Ec ≥ 0).
    en: x in accessible region (KE ≥ 0).
  modelConnection:
    es: "Sistemas conservativos: F = −dEp/dx."
    en: "Conservative systems: F = −dPE/dx."
  formulaConnection:
    es: F = −dEp/dx, E_mec = Ec + Ep = cte.
    en: F = −dPE/dx, E_mech = KE + PE = const.
  readingFocus:
    es: leer mínimos/máximos de Ep, F = −pendiente y región accesible.
    en: read PE minima/maxima, F = −slope and accessible region.
  agentHints:
    es:
      - F = −dEp/dx.
      - "Mín Ep: equilibrio estable."
      - E_mec = cte.
    en:
      - F = −dPE/dx.
      - "Min PE: stable equilibrium."
      - E_mech = const.
  commonMistakes:
    es:
      - F = dEp/dx (sin negativo).
      - Todo equilibrio es estable.
      - E_mec no se conserva.
    en:
      - F = dPE/dx (no negative).
      - All equilibrium is stable.
      - E_mech not conserved.

svg:
  title:
    es: Escena SVG · Sistemas Conservativos
    en: SVG Scene · Conservative Systems
  sceneId: sistemas_conservativos
  sceneLabel:
    es: "Sistema conservativo: trayectoria y energía mecánica constante"
    en: "Conservative system: trajectory and constant mechanical energy"
  objects:
    es:
      - cuerpo
      - trayectoria
      - fuerzas conservativas
      - referencia de energía
    en:
      - body
      - trajectory
      - conservative forces
      - energy reference
  mainObject:
    es: sistema conservativo
    en: conservative system
  referenceFrame:
    es: sistema de referencia inercial
    en: inertial reference frame
  geometry:
    es: "Trayectoria cerrada: W = 0. F = −∇Ep."
    en: "Closed path: W = 0. F = −∇PE."
  interactions:
    es: Fuerzas conservativas. E_mec = cte. W independiente del camino.
    en: Conservative forces. E_mech = const. W path-independent.
  modelElements:
    es:
      - E_mec = cte
      - W_cerrado = 0
      - F = −∇Ep
    en:
      - E_mech = const
      - W_closed = 0
      - F = −∇PE
  visualCues:
    es:
      - Flechas de fuerza.
      - Trayectoria cerrada.
      - Niveles de energía.
    en:
      - Force arrows.
      - Closed trajectory.
      - Energy levels.
  scaleMeaning:
    es: Escala espacial y de fuerzas consistente.
    en: Consistent spatial and force scale.
  relation:
    es: W_camino_cerrado = 0 en sistema conservativo.
    en: W_closed_path = 0 in conservative system.
  physicalReading:
    es: F = −gradiente de Ep. E_mec = cte.
    en: F = −gradient of PE. E_mech = const.
  modelConnection:
    es: Sistema conservativo.
    en: Conservative system.
  formulaConnection:
    es: F = −dEp/dx, E_mec = cte.
    en: F = −dPE/dx, E_mech = const.
  readingFocus:
    es: identificar fuerzas conservativas y verificar E_mec = cte.
    en: identify conservative forces and verify E_mech = const.
  agentHints:
    es:
      - W_cerrado = 0.
      - F = −∇Ep.
      - E_mec = cte.
    en:
      - W_closed = 0.
      - F = −∇PE.
      - E_mech = const.
  commonMistakes:
    es:
      - Rozamiento es conservativo.
      - W depende del camino.
    en:
      - Friction is conservative.
      - W depends on path.
