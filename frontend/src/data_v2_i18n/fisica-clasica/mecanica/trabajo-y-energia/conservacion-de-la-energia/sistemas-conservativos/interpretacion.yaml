version: 2
id: interpretacion-sistemas-conservativos
leaf_id: sistemas-conservativos
nombre:
  es: Interpretacion de sistemas conservativos
  en: Interpretation of conservative systems
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: trabajo-y-energia
  parent_id: conservacion-de-la-energia
  ruta_relativa: fisica-clasica/mecanica/trabajo-y-energia/conservacion-de-la-energia/sistemas-conservativos
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretacion
    en: Interpretation
  priority_order:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
  inline_limits:
    max_messages: 3
dependencies:
  formulas:
  - trabajo_conservativo
  - conservacion_energia_mecanica
  - estados_conservativos
  - extension_no_conservativa
  magnitudes:
  - Em
  - K
  - U
  - Wc
  - dU
  - Wnc
  - Ki
  - Kf
  - Ui
  - Uf
global_context:
  physical_domain:
    es: Balance energetico entre estados de sistemas mecanicos con y sin intercambio no conservativo.
    en: State-to-state energy balance in mechanical systems with and without non-conservative exchange.
  axis_convention:
    es: Mantener una sola referencia para U y un convenio de signos explicito para Wc y Wnc.
    en: Keep one baseline for U and an explicit sign convention for Wc and Wnc.
  standard_assumptions:
  - mismo sistema en estados inicial y final
  - referencias energeticas consistentes
  - modelo clasico no relativista
  standard_warnings:
  - no imponer conservacion ideal si Wnc es apreciable
  - no cambiar el cero potencial entre Ui y Uf
output_contract:
  sections:
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura grafica
      en: Graph reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  Em:
    summary_rules:
    - id: em_summary
      when: 'true'
      status: info
      text:
        es: Em resume el contenido mecanico total del estado si K y U fueron definidos con la misma referencia.
        en: Em summarizes total mechanical content of the state if K and U were defined under the same baseline.
    physical_reading_rules:
    - id: em_physical
      when: 'true'
      status: info
      text:
        es: Em constante no implica K constante; implica compensacion entre movimiento y configuracion.
        en: Constant Em does not imply constant K; it implies compensation between motion and configuration.
    coherence_rules:
    - id: em_coherence
      when: 'true'
      status: ok
      text:
        es: Interpreta Em solo si la referencia de U se mantuvo fija.
        en: Interpret Em only if the baseline for U remained fixed.
    model_validity_rules:
    - id: em_validity
      when: 'true'
      status: info
      text:
        es: Si aparece Wnc apreciable, Em deja de ser constante y pasa a ser una magnitud de balance, no un invariante.
        en: If appreciable Wnc appears, Em stops being constant and becomes a balance quantity rather than an invariant.
    graph_rules:
    - id: em_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Em debe verse horizontal en el caso ideal y desplazada si Wnc no es nula.
        en: In Coord, Em should appear horizontal in the ideal case and shifted if Wnc is non-zero.
    likely_errors:
    - id: em_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: tratar Em como si fuera siempre positiva sin revisar la referencia de U."
        en: "Common error: treating Em as always positive without checking the baseline for U."
    next_step_rules:
    - id: em_next
      when: 'true'
      status: info
      text:
        es: Después de fijar Em, decide si el problema es conservativo ideal o requiere incluir Wnc.
        en: After fixing Em, decide whether the problem is ideally conservative or requires including Wnc.
  K:
    summary_rules:
    - id: k_summary
      when: 'true'
      status: info
      text:
        es: K indica la parte del presupuesto mecanico asociada al movimiento.
        en: K indicates the part of the mechanical budget associated with motion.
    physical_reading_rules:
    - id: k_physical
      when: 'true'
      status: info
      text:
        es: Si K aumenta en un sistema conservativo, U debe disminuir o aparecer Wnc positiva.
        en: If K increases in a conservative system, U must decrease or positive Wnc must appear.
    coherence_rules:
    - id: k_coherence
      when: K >= 0
      status: ok
      text:
        es: K no negativa, consistente con energia cinetica clasica.
        en: Non-negative K, consistent with classical kinetic energy.
    model_validity_rules:
    - id: k_validity
      when: 'true'
      status: info
      text:
        es: K por si sola no decide si hay conservacion; debe compararse con U y Wnc.
        en: K alone does not decide whether there is conservation; it must be compared with U and Wnc.
    graph_rules:
    - id: k_graph
      when: 'true'
      status: info
      text:
        es: En Coord, la curva de K debe intercambiarse con la de U dentro del mismo balance.
        en: In Coord, the K curve should exchange with the U curve within the same balance.
    likely_errors:
    - id: k_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: pensar que conservar Em obliga a mantener K constante."
        en: "Common error: thinking that conserving Em forces K to remain constant."
    next_step_rules:
    - id: k_next
      when: 'true'
      status: info
      text:
        es: Contrasta K con U para leer si el sistema acelera, frena o solo cambia de configuracion.
        en: Contrast K with U to read whether the system speeds up, slows down, or only changes configuration.
  U:
    summary_rules:
    - id: u_summary
      when: 'true'
      status: info
      text:
        es: U traduce la configuracion del sistema a lenguaje energetico.
        en: U translates system configuration into energetic language.
    physical_reading_rules:
    - id: u_physical
      when: 'true'
      status: info
      text:
        es: Una caida de U puede convertirse en aumento de K o compensar Wnc negativa.
        en: A decrease in U may turn into an increase of K or compensate negative Wnc.
    coherence_rules:
    - id: u_coherence
      when: 'true'
      status: ok
      text:
        es: U solo es comparable entre estados si la referencia se mantuvo constante.
        en: U is only comparable between states if the baseline remained constant.
    model_validity_rules:
    - id: u_validity
      when: 'true'
      status: info
      text:
        es: Usa U solo cuando la fuerza relevante admite potencial bien definido.
        en: Use U only when the relevant force admits a well-defined potential.
    graph_rules:
    - id: u_graph
      when: 'true'
      status: info
      text:
        es: En Coord, la curva U debe caer o subir de manera coherente con K y Em.
        en: In Coord, the U curve should decrease or increase consistently with K and Em.
    likely_errors:
    - id: u_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: cambiar el cero potencial entre el estado inicial y el final."
        en: "Common error: changing the potential zero between the initial and final states."
    next_step_rules:
    - id: u_next
      when: 'true'
      status: info
      text:
        es: Tras fijar U, compara su variacion con Wc o con el balance entre estados.
        en: After fixing U, compare its variation with Wc or the state-to-state balance.
  Wc:
    summary_rules:
    - id: wc_summary
      when: 'true'
      status: info
      text:
        es: Wc mide el aporte o recuperacion energetica de la parte conservativa del problema.
        en: Wc measures energetic delivery or recovery by the conservative part of the problem.
    physical_reading_rules:
    - id: wc_physical
      when: 'true'
      status: info
      text:
        es: Wc positiva suele acompanar una disminucion de U.
        en: Positive Wc usually accompanies a decrease in U.
    coherence_rules:
    - id: wc_coherence
      when: 'true'
      status: ok
      text:
        es: El signo de Wc debe ser opuesto al de dU.
        en: The sign of Wc must be opposite to that of dU.
    model_validity_rules:
    - id: wc_validity
      when: 'true'
      status: info
      text:
        es: Wc no sustituye al trabajo total si tambien intervienen rozamiento o motores.
        en: Wc does not replace total work if friction or motors also intervene.
    graph_rules:
    - id: wc_graph
      when: 'true'
      status: info
      text:
        es: En una lectura grafica, Wc se interpreta por el cambio entre niveles de U.
        en: In a graphical reading, Wc is interpreted through the change between U levels.
    likely_errors:
    - id: wc_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: sumar Wc y Wnc sin distinguir su papel fisico."
        en: "Common error: adding Wc and Wnc without distinguishing their physical roles."
    next_step_rules:
    - id: wc_next
      when: 'true'
      status: info
      text:
        es: Usa Wc junto con dU para decidir si el intercambio fue puramente conservativo.
        en: Use Wc together with dU to decide whether the exchange was purely conservative.
  dU:
    summary_rules:
    - id: du_summary
      when: 'true'
      status: info
      text:
        es: dU cuantifica el salto configuracional entre estados.
        en: dU quantifies the configurational jump between states.
    physical_reading_rules:
    - id: du_physical
      when: 'true'
      status: info
      text:
        es: dU positiva indica aumento de energia potencial final respecto al estado inicial.
        en: Positive dU indicates higher final potential energy than the initial state.
    coherence_rules:
    - id: du_coherence
      when: 'true'
      status: ok
      text:
        es: dU debe compararse con Wc, no con el trabajo total si hay Wnc.
        en: dU should be compared with Wc, not with total work if Wnc is present.
    model_validity_rules:
    - id: du_validity
      when: 'true'
      status: info
      text:
        es: Solo tiene sentido si Ui y Uf se evaluaron con la misma referencia.
        en: It only makes sense if Ui and Uf were evaluated with the same baseline.
    graph_rules:
    - id: du_graph
      when: 'true'
      status: info
      text:
        es: En Coord, dU se lee como separacion vertical entre Ui y Uf.
        en: In Coord, dU is read as the vertical separation between Ui and Uf.
    likely_errors:
    - id: du_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: invertir estado inicial y final sin corregir el signo de dU."
        en: "Common error: swapping initial and final states without correcting the sign of dU."
    next_step_rules:
    - id: du_next
      when: 'true'
      status: info
      text:
        es: Relaciona dU con Wc para cerrar la lectura conservativa local.
        en: Relate dU to Wc to close the local conservative reading.
  Wnc:
    summary_rules:
    - id: wnc_summary
      when: 'true'
      status: info
      text:
        es: Wnc mide cuanto se aparta el problema del caso conservativo ideal.
        en: Wnc measures how far the problem departs from the ideal conservative case.
    physical_reading_rules:
    - id: wnc_physical
      when: 'true'
      status: info
      text:
        es: Wnc negativa suele indicar disipacion; Wnc positiva, aporte externo neto.
        en: Negative Wnc usually indicates dissipation; positive Wnc, net external input.
    coherence_rules:
    - id: wnc_coherence
      when: 'true'
      status: ok
      text:
        es: Si Wnc es cero, el balance debe reducirse al caso conservativo ideal.
        en: If Wnc is zero, the balance should reduce to the ideal conservative case.
    model_validity_rules:
    - id: wnc_validity
      when: 'true'
      status: warning
      text:
        es: Si Wnc domina, la conclusion del problema ya no es conservacion estricta sino balance con intercambio.
        en: If Wnc dominates, the problem conclusion is no longer strict conservation but balance with exchange.
    graph_rules:
    - id: wnc_graph
      when: 'true'
      status: info
      text:
        es: En Coord, un cambio de nivel de Em representa Wnc acumulado.
        en: In Coord, a level shift of Em represents accumulated Wnc.
    likely_errors:
    - id: wnc_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: declarar un sistema conservativo despues de calcular Wnc distinta de cero."
        en: "Common error: calling a system conservative after computing non-zero Wnc."
    next_step_rules:
    - id: wnc_next
      when: 'true'
      status: info
      text:
        es: Tras estimar Wnc, decide si conviene un modelo dinamico mas detallado o basta el balance energetico.
        en: After estimating Wnc, decide whether a more detailed dynamic model is needed or the energy balance is sufficient.
  Ki:
    summary_rules:
    - id: ki_summary
      when: 'true'
      status: info
      text:
        es: Ki fija la parte de movimiento con la que el sistema entra al proceso.
        en: Ki fixes the motion contribution with which the system enters the process.
    physical_reading_rules:
    - id: ki_physical
      when: 'true'
      status: info
      text:
        es: Ki grande exige que Ui, Kf, Uf o Wnc compensen ese presupuesto inicial.
        en: Large Ki requires Ui, Kf, Uf, or Wnc to compensate that initial budget.
    coherence_rules:
    - id: ki_coherence
      when: Ki >= 0
      status: ok
      text:
        es: Ki no negativa, consistente con energia cinetica clasica.
        en: Non-negative Ki, consistent with classical kinetic energy.
    model_validity_rules:
    - id: ki_validity
      when: 'true'
      status: info
      text:
        es: Ki debe pertenecer al mismo sistema que Ui, Kf y Uf.
        en: Ki must belong to the same system as Ui, Kf, and Uf.
    graph_rules:
    - id: ki_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Ki se lee como nivel inicial de la curva K.
        en: In Coord, Ki is read as the initial level of the K curve.
    likely_errors:
    - id: ki_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: usar una rapidez inicial de otro instante o de otro cuerpo."
        en: "Common error: using an initial speed from another instant or another body."
    next_step_rules:
    - id: ki_next
      when: 'true'
      status: info
      text:
        es: Compara Ki con Ui para identificar el reparto inicial de Em.
        en: Compare Ki with Ui to identify the initial partition of Em.
  Kf:
    summary_rules:
    - id: kf_summary
      when: 'true'
      status: info
      text:
        es: Kf expresa el presupuesto de movimiento con el que el sistema sale del proceso.
        en: Kf expresses the motion budget with which the system leaves the process.
    physical_reading_rules:
    - id: kf_physical
      when: 'true'
      status: info
      text:
        es: Si Kf disminuye respecto a Ki, parte del presupuesto inicial paso a U o se perdio por Wnc negativa.
        en: If Kf decreases relative to Ki, part of the initial budget moved into U or was lost through negative Wnc.
    coherence_rules:
    - id: kf_coherence
      when: Kf >= 0
      status: ok
      text:
        es: Kf no negativa, consistente con energia cinetica final clasica.
        en: Non-negative Kf, consistent with classical final kinetic energy.
    model_validity_rules:
    - id: kf_validity
      when: 'true'
      status: info
      text:
        es: Kf solo es interpretable si el estado final esta bien definido dentro del mismo sistema.
        en: Kf is only interpretable if the final state is well defined within the same system.
    graph_rules:
    - id: kf_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Kf aparece como nivel final de la curva K.
        en: In Coord, Kf appears as the final level of the K curve.
    likely_errors:
    - id: kf_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: deducir Kf imponiendo conservacion ideal cuando Wnc ya no es nula."
        en: "Common error: inferring Kf by imposing ideal conservation when Wnc is already non-zero."
    next_step_rules:
    - id: kf_next
      when: 'true'
      status: info
      text:
        es: Contrasta Kf con Uf para interpretar el estado final completo.
        en: Contrast Kf with Uf to interpret the full final state.
  Ui:
    summary_rules:
    - id: ui_summary
      when: 'true'
      status: info
      text:
        es: Ui fija la parte configuracional con la que arranca el sistema.
        en: Ui fixes the configurational contribution with which the system starts.
    physical_reading_rules:
    - id: ui_physical
      when: 'true'
      status: info
      text:
        es: Ui grande permite convertir configuracion en movimiento o compensar Wnc.
        en: Large Ui allows configuration to turn into motion or compensate Wnc.
    coherence_rules:
    - id: ui_coherence
      when: 'true'
      status: ok
      text:
        es: Ui solo puede compararse con Uf si la referencia es la misma.
        en: Ui can only be compared with Uf if the baseline is the same.
    model_validity_rules:
    - id: ui_validity
      when: 'true'
      status: info
      text:
        es: Usa Ui solo si el potencial del estado inicial esta bien definido.
        en: Use Ui only if the initial-state potential is well defined.
    graph_rules:
    - id: ui_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Ui se lee como nivel inicial de la curva U.
        en: In Coord, Ui is read as the initial level of the U curve.
    likely_errors:
    - id: ui_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: redefinir el cero potencial entre estados y conservar numeros como si nada."
        en: "Common error: redefining the potential zero between states and keeping numbers as if nothing changed."
    next_step_rules:
    - id: ui_next
      when: 'true'
      status: info
      text:
        es: Combina Ui con Ki para cerrar el presupuesto inicial Em.
        en: Combine Ui with Ki to close the initial Em budget.
  Uf:
    summary_rules:
    - id: uf_summary
      when: 'true'
      status: info
      text:
        es: Uf cierra la lectura configuracional del estado final.
        en: Uf closes the configurational reading of the final state.
    physical_reading_rules:
    - id: uf_physical
      when: 'true'
      status: info
      text:
        es: Uf mayor que Ui indica que parte del presupuesto energetico termino almacenado en configuracion.
        en: Uf greater than Ui indicates part of the energy budget ended stored in configuration.
    coherence_rules:
    - id: uf_coherence
      when: 'true'
      status: ok
      text:
        es: Uf debe usar la misma referencia que Ui y U.
        en: Uf must use the same baseline as Ui and U.
    model_validity_rules:
    - id: uf_validity
      when: 'true'
      status: info
      text:
        es: Uf requiere que el potencial final siga siendo interpretable dentro del mismo modelo.
        en: Uf requires the final potential to remain interpretable within the same model.
    graph_rules:
    - id: uf_graph
      when: 'true'
      status: info
      text:
        es: En Coord, Uf se lee como nivel final de la curva U.
        en: In Coord, Uf is read as the final level of the U curve.
    likely_errors:
    - id: uf_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: concluir sobre Uf con una referencia distinta de la usada en Ui."
        en: "Common error: drawing conclusions about Uf with a baseline different from the one used in Ui."
    next_step_rules:
    - id: uf_next
      when: 'true'
      status: info
      text:
        es: Contrasta Uf con Kf y Wnc para leer como termina el balance mecanico.
        en: Contrast Uf with Kf and Wnc to read how the mechanical balance ends.
graph_binding:
  enabled: true
  preferred_type: Coord
mini_graph:
  enabled: true
  type: Coord
