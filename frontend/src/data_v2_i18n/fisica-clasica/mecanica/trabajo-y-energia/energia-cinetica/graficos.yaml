version: "1.0"
leaf: "energia-cinetica"

coord:
  title:
    es: Gráfica Coord · Energía Cinética
    en: Coord Graph · Kinetic Energy
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: energía cinética Ec (J)
    en: kinetic energy KE (J)
  xMagnitude: v
  yMagnitude: Ec
  relation:
    es: "Ec = ½mv². Parábola. Ec ≥ 0 siempre. Teorema trabajo-energía: W_neto = ΔEc."
    en: "KE = ½mv². Parabola. KE ≥ 0 always. Work-energy theorem: W_net = ΔKE."
  physicalReading:
    es: Duplicar v → Ec × 4. Pendiente = mv (momento lineal). Ec = 0 solo en reposo.
    en: Doubling v → KE × 4. Slope = mv (linear momentum). KE = 0 only at rest.
  slopeMeaning:
    es: "dEc/dv = mv: momento lineal del objeto."
    en: "dKE/dv = mv: linear momentum of the object."
  interceptMeaning:
    es: "Ec(0) = 0: en reposo no hay Ec."
    en: "KE(0) = 0: at rest, no KE."
  curvatureMeaning:
    es: "d²Ec/dv² = m > 0: parábola convexa creciente."
    en: "d²KE/dv² = m > 0: upward-opening parabola."
  signMeaning:
    es: Ec ≥ 0 siempre.
    en: KE ≥ 0 always.
  areaMeaning:
    es: Sin interpretación directa en Ec(v).
    en: No direct interpretation in KE(v).
  domainMeaning:
    es: v ≥ 0 (módulo).
    en: v ≥ 0 (magnitude).
  modelConnection:
    es: "Energía cinética: Ec = ½mv²."
    en: "Kinetic energy: KE = ½mv²."
  formulaConnection:
    es: Ec = ½mv², W_neto = ΔEc.
    en: KE = ½mv², W_net = ΔKE.
  readingFocus:
    es: leer curvatura cuadrática, pendiente = mv y Ec(0) = 0.
    en: read quadratic curvature, slope = mv and KE(0) = 0.
  agentHints:
    es:
      - Ec = ½mv².
      - Duplicar v → 4·Ec.
      - W_neto = ΔEc.
    en:
      - KE = ½mv².
      - Double v → 4·KE.
      - W_net = ΔKE.
  commonMistakes:
    es:
      - Ec = mv².
      - Ec puede ser negativa.
      - Ec = mv.
    en:
      - KE = mv².
      - KE can be negative.
      - KE = mv.
