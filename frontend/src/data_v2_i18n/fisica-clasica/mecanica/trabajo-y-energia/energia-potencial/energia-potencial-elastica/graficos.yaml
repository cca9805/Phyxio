version: "1.0"
leaf: "energia-potencial-elastica"

coord:
  title:
    es: Gráfica Coord · Energía Potencial Elástica
    en: Coord Graph · Elastic Potential Energy
  xAxis:
    es: deformación x (m)
    en: deformation x (m)
  yAxis:
    es: energía potencial elástica Ee (J)
    en: elastic potential energy EPE (J)
  xMagnitude: x
  yMagnitude: Ee
  relation:
    es: "Ee = ½kx². Parábola simétrica. Ee ≥ 0 siempre. Fuerza restauradora: F = −kx."
    en: "EPE = ½kx². Symmetric parabola. EPE ≥ 0 always. Restoring force: F = −kx."
  physicalReading:
    es: Mínimo en x = 0 (equilibrio). Pendiente = kx. Curvatura = k. Ee crece con x².
    en: Minimum at x = 0 (equilibrium). Slope = kx. Curvature = k. EPE grows with x².
  slopeMeaning:
    es: "dEe/dx = kx: módulo de la fuerza restauradora."
    en: "dEPE/dx = kx: magnitude of restoring force."
  interceptMeaning:
    es: "Ee(0) = 0: sin deformación, sin energía."
    en: "EPE(0) = 0: no deformation, no energy."
  curvatureMeaning:
    es: "d²Ee/dx² = k > 0: parábola convexa hacia arriba."
    en: "d²EPE/dx² = k > 0: upward-opening parabola."
  signMeaning:
    es: Ee ≥ 0 siempre.
    en: EPE ≥ 0 always.
  areaMeaning:
    es: Sin interpretación directa en Ee(x).
    en: No direct interpretation in EPE(x).
  domainMeaning:
    es: x real.
    en: x real.
  modelConnection:
    es: "Energía potencial elástica: Ee = ½kx²."
    en: "Elastic potential energy: EPE = ½kx²."
  formulaConnection:
    es: Ee = ½kx², F = −kx, W_resorte = −ΔEe.
    en: EPE = ½kx², F = −kx, W_spring = −ΔEPE.
  readingFocus:
    es: leer mínimo en x = 0, curvatura = k y Ee ≥ 0.
    en: read minimum at x = 0, curvature = k and EPE ≥ 0.
  agentHints:
    es:
      - Ee = ½kx².
      - Mínimo en x = 0.
      - Ee ≥ 0 siempre.
    en:
      - EPE = ½kx².
      - Minimum at x = 0.
      - EPE ≥ 0 always.
  commonMistakes:
    es:
      - Ee = kx².
      - Ee puede ser negativa.
      - Ee = kx.
    en:
      - EPE = kx².
      - EPE can be negative.
      - EPE = kx.

dcl:
  title:
    es: DCL · Energía Potencial Elástica
    en: FBD · Elastic Potential Energy
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of force diagram
  xMagnitude: x
  yMagnitude: y
  relation:
    es: F_resorte = −kx (Hooke). F_neta = ma. DCL muestra peso, normal, tensión y fuerza elástica.
    en: F_spring = −kx (Hooke). F_net = ma. FBD shows weight, normal, tension and elastic force.
  physicalReading:
    es: Vectores proporcionales al módulo de cada fuerza. F_resorte opuesta al desplazamiento.
    en: Vectors proportional to each force magnitude. F_spring opposite to displacement.
  slopeMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  interceptMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  curvatureMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  signMeaning:
    es: Vectores con sentido según la dirección física.
    en: Vectors with direction according to physical direction.
  areaMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  domainMeaning:
    es: Espacio 2D del DCL.
    en: 2D space of FBD.
  modelConnection:
    es: "DCL resorte: F = −kx."
    en: "FBD spring: F = −kx."
  formulaConnection:
    es: F = −kx, F_neta = ma.
    en: F = −kx, F_net = ma.
  readingFocus:
    es: leer fuerzas reales, direcciones y verificar equilibrio o aceleración.
    en: read real forces, directions and verify equilibrium or acceleration.
  agentHints:
    es:
      - F_resorte = kx.
      - Suma vectorial = ma.
      - Normal ⊥ superficie.
    en:
      - F_spring = kx.
      - Vector sum = ma.
      - Normal ⊥ surface.
  commonMistakes:
    es:
      - Olvidar el peso.
      - F_resorte en dirección incorrecta.
      - Normal = peso siempre.
    en:
      - Forgetting weight.
      - F_spring in wrong direction.
      - Normal = weight always.
