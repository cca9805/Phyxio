version: 5
magnitudes:
- id: Ue
  symbol: U_e
  nombre:
    es: energia potencial elastica
    en: elastic potential energy
  descripcion:
    es: Energia almacenada por la deformacion de un resorte o elemento elastico ideal.
    en: Energy stored by the deformation of an ideal spring or elastic element.
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: derived
  physical_role: state_energy
  used_in: [ formulas, theory, examples, interpretation, graph ]
  common_mistake:
    es: Confundir energia almacenada con rigidez del resorte.
    en: Confusing stored energy with spring stiffness.
  typical_range:
    es: Desde fracciones de julio hasta cientos de julios en problemas introductorios.
    en: From fractions of a joule to hundreds of joules in introductory problems.
  sign_behavior:
    es: Puede tomarse no negativa si la referencia es la longitud natural.
    en: It may be taken as non-negative when the natural length is the reference.
  zero_behavior:
    es: Ue = 0 en la longitud natural del elemento elastico ideal.
    en: Ue = 0 at the natural length of the ideal elastic element.
  value_nature: derived
  interpretation_role: target
  graph_binding: Coord_y
  pedagogical_notes:
    es: Leerla como energia de estado, no como propiedad del material aislada.
    en: Read it as a state energy, not as an isolated material property.
- id: k
  symbol: k
  nombre:
    es: constante elastica
    en: spring constant
  descripcion:
    es: Rigidez lineal que conecta fuerza y deformacion en la ley de Hooke.
    en: Linear stiffness that links force and deformation in Hooke's law.
  unidad_si: N/m
  dimension: M T^-2
  is_vector: false
  components: []
  category: parameter
  physical_role: model_parameter
  used_in: [ formulas, theory, examples, interpretation, graph ]
  common_mistake:
    es: Tratar k como energia en lugar de parametro de rigidez.
    en: Treating k as energy instead of a stiffness parameter.
  typical_range:
    es: Depende del resorte; a menudo entre decenas y miles de N/m.
    en: Depends on the spring; often between tens and thousands of N/m.
  sign_behavior:
    es: En el modelo ideal se toma positiva.
    en: In the ideal model it is taken as positive.
  zero_behavior:
    es: k = 0 elimina la capacidad elastica del modelo.
    en: k = 0 removes the elastic capacity of the model.
  value_nature: positive_scalar
  interpretation_role: input
  graph_binding: parameter
  pedagogical_notes:
    es: A mayor k, mayor energia almacenada para la misma deformacion.
    en: Larger k means more energy stored for the same deformation.
- id: x
  symbol: x
  nombre:
    es: deformacion
    en: deformation
  descripcion:
    es: Extension o compresion medida respecto de la longitud natural.
    en: Extension or compression measured from the natural length.
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: state_variable
  used_in: [ formulas, theory, examples, interpretation, graph ]
  common_mistake:
    es: Medir x desde una posicion arbitraria en vez de desde la longitud natural.
    en: Measuring x from an arbitrary position instead of the natural length.
  typical_range:
    es: Positiva por convencion de modulo de deformacion.
    en: Positive by convention when treated as a deformation magnitude.
  sign_behavior:
    es: Si se usa con signo, la energia depende de x^2 y no cambia entre compresion y extension.
    en: If signed, energy depends on x^2 and does not change between compression and extension.
  zero_behavior:
    es: x = 0 corresponde al estado natural.
    en: x = 0 corresponds to the natural state.
  value_nature: scalar
  interpretation_role: input
  graph_binding: Coord_x
  pedagogical_notes:
    es: El cuadrado de x explica por que compresion y extension almacenan energia de forma similar.
    en: The square of x explains why compression and extension store energy in a similar way.
- id: xi
  symbol: x_i
  nombre:
    es: deformacion inicial
    en: initial deformation
  descripcion:
    es: Deformacion del resorte en el estado inicial del problema.
    en: Spring deformation in the initial state of the problem.
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: boundary_condition
  physical_role: initial_state
  used_in: [ formulas, examples, interpretation ]
  common_mistake:
    es: Confundir x_i con el desplazamiento geometrico total.
    en: Confusing x_i with the total geometric displacement.
  typical_range:
    es: Depende del estado inicial elegido.
    en: Depends on the chosen initial state.
  sign_behavior:
    es: Su signo no afecta por si solo a la energia; lo hace x_i^2.
    en: Its sign alone does not affect energy; x_i^2 does.
  zero_behavior:
    es: x_i = 0 indica inicio en longitud natural.
    en: x_i = 0 indicates the start at the natural length.
  value_nature: scalar
  interpretation_role: input
  graph_binding: boundary
  pedagogical_notes:
    es: Declarar siempre la referencia inicial antes de comparar estados.
    en: Always declare the initial reference before comparing states.
- id: xf
  symbol: x_f
  nombre:
    es: deformacion final
    en: final deformation
  descripcion:
    es: Deformacion del resorte en el estado final del problema.
    en: Spring deformation in the final state of the problem.
  unidad_si: m
  dimension: L
  is_vector: false
  components: []
  category: boundary_condition
  physical_role: final_state
  used_in: [ formulas, examples, interpretation ]
  common_mistake:
    es: Tratar x_f como si fuera una variable independiente del mismo estado.
    en: Treating x_f as if it were an independent variable of the same state.
  typical_range:
    es: Depende del estado final elegido.
    en: Depends on the chosen final state.
  sign_behavior:
    es: La energia depende de x_f^2.
    en: Energy depends on x_f^2.
  zero_behavior:
    es: x_f = 0 indica estado final en longitud natural.
    en: x_f = 0 indicates the final state at the natural length.
  value_nature: scalar
  interpretation_role: input
  graph_binding: boundary
  pedagogical_notes:
    es: Puede diferir de x_i incluso si la energia final resulta mayor o menor.
    en: It may differ from x_i even if the final energy is larger or smaller.
- id: dUe
  symbol: \Delta U_e
  nombre:
    es: variacion de energia potencial elastica
    en: change in elastic potential energy
  descripcion:
    es: Cambio de energia elastica entre dos estados del mismo sistema.
    en: Change in elastic energy between two states of the same system.
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: difference
  physical_role: energy_change
  used_in: [ formulas, theory, examples, interpretation ]
  common_mistake:
    es: Interpretar dUe como energia absoluta en vez de diferencia de estados.
    en: Interpreting dUe as an absolute energy instead of a state difference.
  typical_range:
    es: Puede ser positiva o negativa segun aumente o disminuya la deformacion.
    en: It may be positive or negative depending on whether deformation increases or decreases.
  sign_behavior:
    es: Signo firmado segun el cambio entre x_f y x_i.
    en: Signed according to the change between x_f and x_i.
  zero_behavior:
    es: dUe = 0 si no cambia la deformacion entre estados.
    en: dUe = 0 if deformation does not change between states.
  value_nature: signed_scalar
  interpretation_role: input
  graph_binding: delta
  pedagogical_notes:
    es: Sirve para comparar dos configuraciones y enlazar energia con trabajo.
    en: Useful for comparing two configurations and linking energy with work.
- id: We
  symbol: W_e
  nombre:
    es: trabajo de la fuerza elastica
    en: work done by the elastic force
  descripcion:
    es: Trabajo realizado por la fuerza del resorte durante el cambio de deformacion.
    en: Work done by the spring force during the deformation change.
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: transfer
  physical_role: work_transfer
  used_in: [ formulas, theory, examples, interpretation ]
  common_mistake:
    es: Darle signo positivo por defecto aunque el resorte recupere energia.
    en: Assigning a positive sign by default even when the spring is releasing energy.
  typical_range:
    es: Del mismo orden que Ue en el intervalo estudiado.
    en: Same order of magnitude as Ue over the studied interval.
  sign_behavior:
    es: En el modelo ideal We = -dUe.
    en: In the ideal model We = -dUe.
  zero_behavior:
    es: We = 0 si no hay cambio de deformacion.
    en: We = 0 if there is no deformation change.
  value_nature: signed_scalar
  interpretation_role: target
  graph_binding: work
  pedagogical_notes:
    es: El signo debe concordar con si el resorte entrega o recibe energia.
    en: The sign must match whether the spring delivers or receives energy.
