version: "1.0"
leaf: "energia-potencial-gravitatoria"

coord:
  title:
    es: Gráfica Coord · Energía Potencial Gravitatoria
    en: Coord Graph · Gravitational Potential Energy
  xAxis:
    es: altura h (m)
    en: height h (m)
  yAxis:
    es: energía potencial Ep (J)
    en: potential energy PE (J)
  xMagnitude: h
  yMagnitude: Ep
  relation:
    es: Ep = mgh. Recta con pendiente mg. Ep depende de la referencia (h = 0).
    en: PE = mgh. Line with slope mg. PE depends on reference (h = 0).
  physicalReading:
    es: "Pendiente = mg (peso). Intercepto = Ep(h_ref). Ep > 0 sobre referencia. Ep < 0 bajo referencia."
    en: "Slope = mg (weight). Intercept = PE(h_ref). PE > 0 above reference. PE < 0 below reference."
  slopeMeaning:
    es: "dEp/dh = mg: peso del objeto."
    en: "dPE/dh = mg: weight of the object."
  interceptMeaning:
    es: "Ep(0) = 0: referencia elegida en h = 0."
    en: "PE(0) = 0: reference chosen at h = 0."
  curvatureMeaning:
    es: "Recta: g constante."
    en: "Straight: constant g."
  signMeaning:
    es: Ep puede ser negativa si h < h_ref.
    en: PE can be negative if h < h_ref.
  areaMeaning:
    es: Sin interpretación directa en Ep(h).
    en: No direct interpretation in PE(h).
  domainMeaning:
    es: h real.
    en: h real.
  modelConnection:
    es: "Energía potencial gravitatoria: Ep = mgh."
    en: "Gravitational potential energy: PE = mgh."
  formulaConnection:
    es: Ep = mgh, W_grav = −ΔEp.
    en: PE = mgh, W_grav = −ΔPE.
  readingFocus:
    es: leer pendiente = mg, referencia h = 0 y signo de Ep.
    en: read slope = mg, reference h = 0 and sign of PE.
  agentHints:
    es:
      - Ep = mgh.
      - Pendiente = mg.
      - Referencia libre.
    en:
      - PE = mgh.
      - Slope = mg.
      - Free reference.
  commonMistakes:
    es:
      - Ep < 0 imposible.
      - g = 10 siempre.
      - h en cm.
    en:
      - PE < 0 impossible.
      - g = 10 always.
      - h in cm.
