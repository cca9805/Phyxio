version: 2
id: interpretacion-energia-potencial-gravitatoria
leaf_id: energia-potencial-gravitatoria
nombre:
  es: Interpretacion de energia potencial gravitatoria
  en: Interpretation of gravitational potential energy
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: trabajo-y-energia
  parent_id: energia-potencial
  ruta_relativa: fisica-clasica/mecanica/trabajo-y-energia/energia-potencial/energia-potencial-gravitatoria
dependencies:
  formulas: [ potencial_gravitatorio_superficie, variacion_potencial_gravitatorio, trabajo_gravitatorio ]
  magnitudes: [ Ug, m, g, h, hi, hf, dUg, Wg ]
output_contract:
  sections: [ summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step ]
result_blocks:
  summary: { title: { es: Resumen, en: Summary } }
  physical_reading: { title: { es: Lectura fisica, en: Physical reading } }
  coherence: { title: { es: Coherencia, en: Coherence } }
  model_validity: { title: { es: Validez del modelo, en: Model validity } }
  graph_reading: { title: { es: Lectura grafica, en: Graph reading } }
  likely_errors: { title: { es: Errores probables, en: Likely errors } }
  next_step: { title: { es: Siguiente paso, en: Next step } }
targets:
  Ug:
    summary_rules:
    - { id: ug_summary, when: "true", status: info, text: { es: "Ug resume la energia de estado asociada a la altura elegida.", en: "Ug summarizes state energy associated with chosen height." } }
    physical_reading_rules:
    - { id: ug_reading, when: "true", status: info, text: { es: "Una Ug mayor indica un estado a mayor cota dentro de la misma referencia.", en: "A larger Ug indicates a state at higher level within the same reference." } }
    coherence_rules:
    - { id: ug_coherence, when: "true", status: ok, text: { es: "Ug debe leerse junto con m, g y h del mismo escenario.", en: "Ug must be read with m, g and h of the same scenario." } }
    model_validity_rules:
    - { id: ug_validity, when: "true", status: info, text: { es: "Si el campo deja de ser uniforme, revisar validez del modelo local.", en: "If field stops being uniform, review local-model validity." } }
    graph_rules:
    - { id: ug_graph, when: "true", status: info, text: { es: "En Coord, Ug debe variar linealmente con h para m y g fijas.", en: "In Coord, Ug should vary linearly with h for fixed m and g." } }
    likely_errors:
    - { id: ug_error, when: "true", status: warning, text: { es: "Error frecuente: cambiar la referencia de altura a mitad de resolucion.", en: "Common mistake: changing height reference mid-solution." } }
    next_step_rules:
    - { id: ug_next, when: "true", status: info, text: { es: "Decide si el problema pide Ug absoluta o un cambio dUg.", en: "Decide whether the problem asks for absolute Ug or a change dUg." } }
  m:
    summary_rules:
    - { id: m_summary, when: "true", status: info, text: { es: "m escala linealmente Ug y dUg en el mismo modelo.", en: "m linearly scales Ug and dUg in the same model." } }
    physical_reading_rules:
    - { id: m_reading, when: "true", status: info, text: { es: "A mayor masa, mayor transferencia energetica para igual cambio de altura.", en: "Greater mass means larger energy transfer for equal height change." } }
    coherence_rules:
    - { id: m_coherence, when: "true", status: ok, text: { es: "m debe permanecer constante entre estado inicial y final del mismo cuerpo.", en: "m must remain constant between initial and final states of the same body." } }
    model_validity_rules:
    - { id: m_validity, when: "true", status: info, text: { es: "Usar SI evita sesgos de conversion al interpretar resultados.", en: "Using SI prevents conversion bias in interpretation." } }
    graph_rules:
    - { id: m_graph, when: "true", status: info, text: { es: "m cambia la pendiente de Ug frente a h en la grafica.", en: "m changes Ug versus h slope on the graph." } }
    likely_errors:
    - { id: m_error, when: "true", status: warning, text: { es: "Error frecuente: introducir masa en gramos sin convertir.", en: "Common mistake: entering mass in grams without conversion." } }
    next_step_rules:
    - { id: m_next, when: "true", status: info, text: { es: "Comprueba unidad de m antes de cualquier sustitucion.", en: "Check m unit before any substitution." } }
  g:
    summary_rules:
    - { id: g_summary, when: "true", status: info, text: { es: "g fija la intensidad gravitatoria local en el modelo.", en: "g sets local gravitational intensity in the model." } }
    physical_reading_rules:
    - { id: g_reading, when: "true", status: info, text: { es: "Con mayor g, el mismo ascenso requiere mayor cambio energetico.", en: "With larger g, the same rise requires larger energy change." } }
    coherence_rules:
    - { id: g_coherence, when: "true", status: ok, text: { es: "g debe mantenerse consistente durante toda la resolucion.", en: "g must remain consistent throughout the solution." } }
    model_validity_rules:
    - { id: g_validity, when: "true", status: info, text: { es: "Si cambia mucho la altitud, revisar aproximacion de g constante.", en: "If altitude varies strongly, review constant-g approximation." } }
    graph_rules:
    - { id: g_graph, when: "true", status: info, text: { es: "g tambien escala la pendiente de Ug respecto de h.", en: "g also scales Ug slope with respect to h." } }
    likely_errors:
    - { id: g_error, when: "true", status: warning, text: { es: "Error frecuente: alternar entre valores de g sin declararlo.", en: "Common mistake: alternating g values without declaration." } }
    next_step_rules:
    - { id: g_next, when: "true", status: info, text: { es: "Declara g al inicio y mantenla fija salvo justificacion.", en: "Declare g at the start and keep it fixed unless justified." } }
  h:
    summary_rules:
    - { id: h_summary, when: "true", status: info, text: { es: "h representa la coordenada vertical en una referencia concreta.", en: "h represents vertical coordinate in a specific reference." } }
    physical_reading_rules:
    - { id: h_reading, when: "true", status: info, text: { es: "Solo el cambio de h entre estados tiene significado dinamico directo.", en: "Only h change between states has direct dynamic meaning." } }
    coherence_rules:
    - { id: h_coherence, when: "true", status: ok, text: { es: "h debe medirse desde el mismo cero para comparar energias.", en: "h must be measured from the same zero to compare energies." } }
    model_validity_rules:
    - { id: h_validity, when: "true", status: info, text: { es: "Para cambios muy grandes de altura, revisar modelo gravitatorio usado.", en: "For very large height changes, review gravitational model in use." } }
    graph_rules:
    - { id: h_graph, when: "true", status: info, text: { es: "En Coord, h es el eje horizontal de lectura del estado.", en: "In Coord, h is the horizontal axis for state reading." } }
    likely_errors:
    - { id: h_error, when: "true", status: warning, text: { es: "Error frecuente: interpretar h como distancia recorrida y no como cota.", en: "Common mistake: interpreting h as traveled distance instead of level." } }
    next_step_rules:
    - { id: h_next, when: "true", status: info, text: { es: "Fija el cero de h antes de plantear dUg.", en: "Set h zero before setting up dUg." } }
  hi:
    summary_rules:
    - { id: hi_summary, when: "true", status: info, text: { es: "hi define el estado inicial del proceso energetico.", en: "hi defines the initial state of the energy process." } }
    physical_reading_rules:
    - { id: hi_reading, when: "true", status: info, text: { es: "hi determina el punto de partida para leer el cambio de energia.", en: "hi sets the starting point for reading energy change." } }
    coherence_rules:
    - { id: hi_coherence, when: "true", status: ok, text: { es: "hi debe compartir referencia con hf para que dUg sea interpretable.", en: "hi must share reference with hf for interpretable dUg." } }
    model_validity_rules:
    - { id: hi_validity, when: "true", status: info, text: { es: "Cambiar referencia invalida comparaciones directas entre estados.", en: "Changing reference invalidates direct state comparisons." } }
    graph_rules:
    - { id: hi_graph, when: "true", status: info, text: { es: "En la grafica, hi marca el primer punto de evaluacion.", en: "On the graph, hi marks the first evaluation point." } }
    likely_errors:
    - { id: hi_error, when: "true", status: warning, text: { es: "Error frecuente: asignar hi sin declarar origen vertical.", en: "Common mistake: assigning hi without declaring vertical origin." } }
    next_step_rules:
    - { id: hi_next, when: "true", status: info, text: { es: "Compara hi con hf antes de decidir signo de dUg.", en: "Compare hi with hf before deciding dUg sign." } }
  hf:
    summary_rules:
    - { id: hf_summary, when: "true", status: info, text: { es: "hf define el estado final del proceso.", en: "hf defines the final state of the process." } }
    physical_reading_rules:
    - { id: hf_reading, when: "true", status: info, text: { es: "hf indica si el proceso termina mas alto o mas bajo que al inicio.", en: "hf indicates whether process ends higher or lower than start." } }
    coherence_rules:
    - { id: hf_coherence, when: "true", status: ok, text: { es: "hf debe compararse con hi en la misma escala de altura.", en: "hf must be compared with hi on the same height scale." } }
    model_validity_rules:
    - { id: hf_validity, when: "true", status: info, text: { es: "Una hf extrema puede exigir abandonar aproximacion local.", en: "An extreme hf may require leaving local approximation." } }
    graph_rules:
    - { id: hf_graph, when: "true", status: info, text: { es: "En Coord, hf fija el punto final sobre la recta Ug(h).", en: "In Coord, hf sets the final point on Ug(h) line." } }
    likely_errors:
    - { id: hf_error, when: "true", status: warning, text: { es: "Error frecuente: leer hf como desplazamiento neto.", en: "Common mistake: reading hf as net displacement." } }
    next_step_rules:
    - { id: hf_next, when: "true", status: info, text: { es: "Usa hf junto con hi para construir el significado de dUg.", en: "Use hf with hi to build dUg meaning." } }
  dUg:
    summary_rules:
    - { id: dug_summary, when: "true", status: info, text: { es: "dUg cuantifica el cambio de energia entre dos estados.", en: "dUg quantifies energy change between two states." } }
    physical_reading_rules:
    - { id: dug_reading, when: "true", status: info, text: { es: "dUg positiva implica ganancia de energia potencial al final.", en: "Positive dUg implies potential-energy gain at the end." } }
    coherence_rules:
    - { id: dug_coherence, when: "true", status: ok, text: { es: "El signo de dUg debe concordar con comparacion hf frente a hi.", en: "dUg sign must agree with hf versus hi comparison." } }
    model_validity_rules:
    - { id: dug_validity, when: "true", status: info, text: { es: "dUg solo es fiable si m y g se mantienen coherentes.", en: "dUg is reliable only if m and g stay coherent." } }
    graph_rules:
    - { id: dug_graph, when: "true", status: info, text: { es: "dUg es la diferencia vertical entre dos puntos de la recta Ug(h).", en: "dUg is the vertical difference between two points on Ug(h) line." } }
    likely_errors:
    - { id: dug_error, when: "true", status: warning, text: { es: "Error frecuente: perder el orden hi y hf en la resta.", en: "Common mistake: losing hi and hf order in subtraction." } }
    next_step_rules:
    - { id: dug_next, when: "true", status: info, text: { es: "Tras calcular dUg, contrasta con Wg para validar signos.", en: "After computing dUg, contrast with Wg to validate signs." } }
  Wg:
    summary_rules:
    - { id: wg_summary, when: "true", status: info, text: { es: "Wg expresa la energia transferida por gravedad.", en: "Wg expresses energy transferred by gravity." } }
    physical_reading_rules:
    - { id: wg_reading, when: "true", status: info, text: { es: "Wg cambia de signo segun el cuerpo ascienda o descienda.", en: "Wg changes sign depending on rise or descent." } }
    coherence_rules:
    - { id: wg_coherence, when: "true", status: ok, text: { es: "En modelo conservativo, Wg debe ser opuesto a dUg.", en: "In conservative model, Wg must be opposite to dUg." } }
    model_validity_rules:
    - { id: wg_validity, when: "true", status: info, text: { es: "Si hay fuerzas no conservativas relevantes, ampliar balance.", en: "If relevant non-conservative forces exist, expand the balance." } }
    graph_rules:
    - { id: wg_graph, when: "true", status: info, text: { es: "Wg se interpreta con signo opuesto a salto vertical de Ug.", en: "Wg is interpreted with opposite sign to Ug vertical jump." } }
    likely_errors:
    - { id: wg_error, when: "true", status: warning, text: { es: "Error frecuente: fijar signo de Wg sin leer el proceso.", en: "Common mistake: fixing Wg sign without reading the process." } }
    next_step_rules:
    - { id: wg_next, when: "true", status: info, text: { es: "Integra Wg en el balance energetico global del sistema.", en: "Integrate Wg into the system global energy balance." } }
