version: 1
topic:
  id: rozamiento-y-disipacion
  title:
    es: Rozamiento y disipacion
    en: Friction and Dissipation
variables:
- id: fr
  symbol: f_r
  name:
    es: fuerza de rozamiento
    en: friction force
  si_unit: N
- id: mu
  symbol: \mu
  name:
    es: coeficiente de rozamiento
    en: coefficient of friction
  si_unit: '1'
- id: N
  symbol: N
  name:
    es: fuerza normal
    en: normal force
  si_unit: N
- id: d
  symbol: d
  name:
    es: distancia de deslizamiento
    en: sliding distance
  si_unit: m
- id: Wr
  symbol: W_r
  name:
    es: trabajo del rozamiento
    en: work done by friction
  si_unit: J
- id: Edis
  symbol: E_{dis}
  name:
    es: energia disipada
    en: dissipated energy
  si_unit: J
- id: m
  symbol: m
  name:
    es: masa
    en: mass
  si_unit: kg
- id: g
  symbol: g
  name:
    es: campo gravitatorio local
    en: local gravitational field
  si_unit: m/s^2
- id: Emi
  symbol: E_{m,i}
  name:
    es: energia mecanica inicial
    en: initial mechanical energy
  si_unit: J
- id: Emf
  symbol: E_{m,f}
  name:
    es: energia mecanica final
    en: final mechanical energy
  si_unit: J
- id: dEm
  symbol: \Delta E_m
  name:
    es: variacion de energia mecanica
    en: change in mechanical energy
  si_unit: J
- id: Pdis
  symbol: P_{dis}
  name:
    es: potencia disipada
    en: dissipated power
  si_unit: W
- id: t
  symbol: t
  name:
    es: intervalo de tiempo
    en: time interval
  si_unit: s
formulas:
- id: fuerza_rozamiento_cinetico
  title:
    es: Rozamiento cinetico de Coulomb
    en: Coulomb kinetic friction
  equation: fr = mu*N
  latex: f_r=\mu N
  rearrangements:
  - target: fr
    equation: fr = mu*N
    latex: f_r=\mu N
  - target: mu
    equation: mu = fr/N
    latex: \mu=\frac{f_r}{N}
  - target: N
    equation: N = fr/mu
    latex: N=\frac{f_r}{\mu}
  constraints:
  - expr: mu >= 0
    message:
      es: mu debe ser no negativo.
      en: mu must be non-negative.
  - expr: N > 0
    message:
      es: N debe ser mayor que cero.
      en: N must be greater than zero.
  category: fundamental
  relation_type: energy_relation
  physical_meaning:
    es: Relaciona Rozamiento cinetico de Coulomb con la lectura energetica del rozamiento y la disipacion.
    en: Relates Coulomb kinetic friction to the energy reading of friction and dissipation.
  validity:
    es: Valida para rozamiento seco con coeficiente aproximadamente constante y sistema bien definido.
    en: Valid for dry friction with approximately constant coefficient and a well-defined system.
  dimension_check: coherente dimensionalmente en unidades SI
  calculable: true
  motivo_no_calculable: null
  used_in:
  - balances energeticos con rozamiento y disipacion
  interpretation_tags:
  - rozamiento
  - disipacion
  - energia
  result_semantics:
    target: fr
    meaning: El resultado cuantifica la perdida o transferencia mecanica asociada al rozamiento.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que el contacto seco y el signo del trabajo sean coherentes.
      en: Check that dry contact and the work sign are coherent.
  coherence_checks:
  - expr: 'true'
    message:
      es: Comprueba unidades SI y que la energia disipada sea no negativa.
      en: Check SI units and that dissipated energy is non-negative.
  graph_implications:
  - La representacion debe mostrar como aumenta la disipacion al crecer fuerza o distancia.
  pedagogical_triggers:
  - when: 'true'
    message:
      es: Distingue trabajo firmado Wr de energia disipada positiva Edis.
      en: Distinguish signed work Wr from positive dissipated energy Edis.
- id: trabajo_rozamiento
  title:
    es: Trabajo del rozamiento en deslizamiento rectilineo
    en: Work done by friction in rectilinear sliding
  equation: Wr = -fr*d
  latex: W_r=-f_r d
  rearrangements:
  - target: Wr
    equation: Wr = -fr*d
    latex: W_r=-f_r d
  - target: fr
    equation: fr = -Wr/d
    latex: f_r=-\frac{W_r}{d}
  - target: d
    equation: d = -Wr/fr
    latex: d=-\frac{W_r}{f_r}
  constraints:
  - expr: d >= 0
    message:
      es: d debe ser no negativo.
      en: d must be non-negative.
  category: fundamental
  relation_type: energy_relation
  physical_meaning:
    es: Relaciona Trabajo del rozamiento en deslizamiento rectilineo con la lectura energetica del rozamiento y la disipacion.
    en: Relates Work done by friction in rectilinear sliding to the energy reading of friction and dissipation.
  validity:
    es: Valida para rozamiento seco con coeficiente aproximadamente constante y sistema bien definido.
    en: Valid for dry friction with approximately constant coefficient and a well-defined system.
  dimension_check: coherente dimensionalmente en unidades SI
  calculable: true
  motivo_no_calculable: null
  used_in:
  - balances energeticos con rozamiento y disipacion
  interpretation_tags:
  - rozamiento
  - disipacion
  - energia
  result_semantics:
    target: Wr
    meaning: El resultado cuantifica la perdida o transferencia mecanica asociada al rozamiento.
  domain_checks:
  - expr: 'true'
    message:
      es: Verifica que el contacto seco y el signo del trabajo sean coherentes.
      en: Check that dry contact and the work sign are coherent.
  coherence_checks:
  - expr: 'true'
    message:
      es: Comprueba unidades SI y que la energia disipada sea no negativa.
      en: Check SI units and that dissipated energy is non-negative.
  graph_implications:
  - La representacion debe mostrar como aumenta la disipacion al crecer fuerza o distancia.
  pedagogical_triggers:
