- id: balance_energia_mecanica_disipacion
  title:
    es: Balance mecanico con trabajo disipativo
    en: Mechanical balance with dissipative work
  equation: Emf = Emi + Wr
  latex: E_{m,f}=E_{m,i}+W_r
  rearrangements:
  - target: Emf
    equation: Emf = Emi + Wr
    latex: E_{m,f}=E_{m,i}+W_r
  - target: Emi
    equation: Emi = Emf - Wr
    latex: E_{m,i}=E_{m,f}-W_r
  - target: Wr
    equation: Wr = Emf - Emi
    latex: W_r=E_{m,f}-E_{m,i}
