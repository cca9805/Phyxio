- id: trabajo_rozamiento_horizontal
  title:
    es: Trabajo de rozamiento en superficie horizontal
    en: Friction work on a horizontal surface
  equation: Wr = -mu*m*g*d
  latex: W_r=-\mu m g d
  rearrangements:
  - target: Wr
    equation: Wr = -mu*m*g*d
    latex: W_r=-\mu m g d
  - target: mu
    equation: mu = -Wr/(m*g*d)
    latex: \mu=-\frac{W_r}{m g d}
  - target: d
    equation: d = -Wr/(mu*m*g)
    latex: d=-\frac{W_r}{\mu m g}
  constraints:
  - expr: m > 0
    message:
      es: m debe ser mayor que cero.
      en: m must be greater than zero.
