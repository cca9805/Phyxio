    message:
      es: Distingue trabajo firmado Wr de energia disipada positiva Edis.
      en: Distinguish signed work Wr from positive dissipated energy Edis.
- id: energia_disipada_rozamiento
  title:
    es: Energia mecanica disipada por rozamiento
    en: Mechanical energy dissipated by friction
  equation: Edis = -Wr
  latex: E_{dis}=-W_r
  rearrangements:
  - target: Edis
    equation: Edis = -Wr
    latex: E_{dis}=-W_r
  - target: Wr
    equation: Wr = -Edis
    latex: W_r=-E_{dis}
  constraints:
