version: "1.0"
leaf: "rozamiento-y-disipacion"

coord:
  title:
    es: Gráfica Coord · Rozamiento y Disipación
    en: Coord Graph · Friction and Dissipation
  xAxis:
    es: desplazamiento x (m)
    en: displacement x (m)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: E_mec = E_mec_0 − f_r·d. Energía mecánica decrece linealmente. ΔE_mec = −W_rozamiento < 0.
    en: E_mech = E_mech_0 − f_r·d. Mechanical energy decreases linearly. ΔE_mech = −W_friction < 0.
  physicalReading:
    es: "Pendiente = −f_r: fuerza de rozamiento. E_mec cae con cada metro recorrido. Disipación → calor."
    en: "Slope = −f_r: friction force. E_mech decreases per meter traveled. Dissipation → heat."
  slopeMeaning:
    es: "dE_mec/dx = −f_r: tasa de disipación por rozamiento."
    en: "dE_mech/dx = −f_r: dissipation rate by friction."
  interceptMeaning:
    es: E_mec inicial.
    en: Initial E_mech.
  curvatureMeaning:
    es: "Recta: f_r constante."
    en: "Straight: constant f_r."
  signMeaning:
    es: ΔE_mec < 0 siempre con rozamiento.
    en: ΔE_mech < 0 always with friction.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x ≥ 0.
    en: x ≥ 0.
  modelConnection:
    es: Rozamiento y disipación de energía mecánica.
    en: Friction and mechanical energy dissipation.
  formulaConnection:
    es: ΔE_mec = W_no_cons = −f_r·d.
    en: ΔE_mech = W_non_cons = −f_r·d.
  readingFocus:
    es: leer pendiente = −f_r y pérdida de E_mec por disipación.
    en: read slope = −f_r and E_mech loss by dissipation.
  agentHints:
    es:
      - ΔE_mec = −f_r·d.
      - Pendiente = −f_r.
      - Disipación → calor.
    en:
      - ΔE_mech = −f_r·d.
      - Slope = −f_r.
      - Dissipation → heat.
  commonMistakes:
    es:
      - E_mec se conserva con rozamiento.
      - f_r hace trabajo positivo.
      - Calor = E_mec.
    en:
      - E_mech conserved with friction.
      - Friction does positive work.
      - Heat = E_mech.

dcl:
  title:
    es: DCL · Rozamiento y Disipación
    en: FBD · Friction and Dissipation
  xAxis:
    es: eje x del diagrama de fuerzas
    en: x-axis of force diagram
  yAxis:
    es: eje y del diagrama de fuerzas
    en: y-axis of force diagram
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "f_r = μ_c·N (cinético). f_e ≤ μ_e·N (estático). F_neta = ma. DCL: peso, normal, fuerza aplicada, rozamiento."
    en: "f_r = μ_k·N (kinetic). f_s ≤ μ_s·N (static). F_net = ma. FBD: weight, normal, applied force, friction."
  physicalReading:
    es: Rozamiento opuesto al movimiento. N = mg·cos θ en plano inclinado. Suma vectorial = ma.
    en: Friction opposes motion. N = mg·cos θ on incline. Vector sum = ma.
  slopeMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  interceptMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  curvatureMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  signMeaning:
    es: f_r opuesta al movimiento.
    en: f_r opposite to motion.
  areaMeaning:
    es: No aplica directamente.
    en: Not directly applicable.
  domainMeaning:
    es: Espacio 2D del DCL.
    en: 2D space of FBD.
  modelConnection:
    es: DCL con rozamiento.
    en: FBD with friction.
  formulaConnection:
    es: f_r = μ_c·N, F_neta = ma.
    en: f_r = μ_k·N, F_net = ma.
  readingFocus:
    es: leer dirección de f_r, valor de N y equilibrio o aceleración.
    en: read f_r direction, N value and equilibrium or acceleration.
  agentHints:
    es:
      - f_r = μN.
      - f_r opuesta al movimiento.
      - N = mg en horizontal.
    en:
      - f_r = μN.
      - f_r opposite motion.
      - N = mg on horizontal.
  commonMistakes:
    es:
      - f_r en dirección del movimiento.
      - N = mg siempre.
      - μ_e = μ_c.
    en:
      - f_r in direction of motion.
      - N = mg always.
      - μ_s = μ_k.
