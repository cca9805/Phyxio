    graph_rules:
    - id: t_graph
      when: 'true'
      status: info
      text:
        es: 't: Debe leerse en la grafica como parte del vinculo entre contacto y energia.'
        en: 't: It should be read on the graph as part of the link between contact and energy.'
    likely_errors:
    - id: t_likely_errors
      when: 'true'
      status: info
      text:
        es: 't: No la confundas con otra magnitud del balance energetico.'
        en: 't: Do not confuse it with another quantity in the energy balance.'
    next_step_rules:
    - id: t_next_step
      when: 'true'
      status: info
      text:
        es: 't: Usala para decidir el siguiente calculo del balance de disipacion.'
        en: 't: Use it to decide the next calculation in the dissipation balance.'
