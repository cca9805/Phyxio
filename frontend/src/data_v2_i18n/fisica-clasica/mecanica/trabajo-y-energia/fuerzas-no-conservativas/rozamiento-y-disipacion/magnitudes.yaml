version: 1
magnitudes:
- id: fr
  symbol: f_r
  nombre:
    es: fuerza de rozamiento
    en: friction force
  unidad_si: N
  descripcion:
    es: Modulo de la fuerza tangencial que se opone al deslizamiento relativo entre superficies.
    en: Magnitude of the tangential force opposing relative sliding between surfaces.
  dimension: MLT^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in:
  - rozamiento-y-disipacion
  common_mistake: No confundir fr con otra magnitud del balance de rozamiento y disipacion.
  typical_range: Context-dependent.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como magnitud no negativa en el modelo basico.
      en: It is used as a non-negative magnitude in the basic model.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa ausencia de esa contribucion en el modelo.
      en: Zero represents absence of that contribution in the model.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Context-dependent
  interpretation_role:
    primary_for:
    - rozamiento-y-disipacion
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: fr debe interpretarse dentro del balance de energia y no como simbolo aislado.
