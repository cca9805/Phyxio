version: "1.0"
leaf: "trabajo-de-fuerzas-no-conservativas"

coord:
  title:
    es: Gráfica Coord · Trabajo de Fuerzas No Conservativas
    en: Coord Graph · Work by Non-Conservative Forces
  xAxis:
    es: desplazamiento x (m)
    en: displacement x (m)
  yAxis:
    es: energía E (J)
    en: energy E (J)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "W_nc = ΔE_mec = ΔEc + ΔEp. Fuerzas no conservativas cambian E_mec. Rozamiento: W_nc < 0."
    en: "W_nc = ΔE_mech = ΔKE + ΔPE. Non-conservative forces change E_mech. Friction: W_nc < 0."
  physicalReading:
    es: ΔE_mec = W_nc. Pendiente de E_mec(x) = −f_nc. E_mec no se conserva.
    en: ΔE_mech = W_nc. Slope of E_mech(x) = −f_nc. E_mech not conserved.
  slopeMeaning:
    es: dE_mec/dx = f_nc (fuerza no conservativa con signo).
    en: dE_mech/dx = f_nc (non-conservative force with sign).
  interceptMeaning:
    es: E_mec inicial.
    en: Initial E_mech.
  curvatureMeaning:
    es: "Recta: f_nc constante."
    en: "Straight: constant f_nc."
  signMeaning:
    es: "W_nc < 0: disipación. W_nc > 0: fuente externa de energía."
    en: "W_nc < 0: dissipation. W_nc > 0: external energy source."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x ≥ 0.
    en: x ≥ 0.
  modelConnection:
    es: Trabajo de fuerzas no conservativas y balance energético.
    en: Work by non-conservative forces and energy balance.
  formulaConnection:
    es: W_nc = ΔEc + ΔEp = ΔE_mec.
    en: W_nc = ΔKE + ΔPE = ΔE_mech.
  readingFocus:
    es: leer ΔE_mec = W_nc, pendiente y signo de las fuerzas no conservativas.
    en: read ΔE_mech = W_nc, slope and sign of non-conservative forces.
  agentHints:
    es:
      - W_nc = ΔE_mec.
      - "Rozamiento: W_nc < 0."
      - "Fuerza externa: W_nc > 0."
    en:
      - W_nc = ΔE_mech.
      - "Friction: W_nc < 0."
      - "External force: W_nc > 0."
  commonMistakes:
    es:
      - W_nc = 0 con rozamiento.
      - E_mec conservada con f_nc.
      - W_nc = ΔEc solo.
    en:
      - W_nc = 0 with friction.
      - E_mech conserved with f_nc.
      - W_nc = ΔKE only.
