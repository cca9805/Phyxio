version: "1.0"
leaf: "potencia"

coord:
  title:
    es: Gráfica Coord · Potencia
    en: Coord Graph · Power
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: trabajo W (J)
    en: work W (J)
  xMagnitude: t
  yMagnitude: W
  relation:
    es: "P = dW/dt = pendiente de W(t). P = F·v. Unidad: W (watt) = J/s."
    en: "P = dW/dt = slope of W(t). P = F·v. Unit: W (watt) = J/s."
  physicalReading:
    es: "Pendiente de W(t) = potencia instantánea. Recta: P constante. Curva: P variable."
    en: "Slope of W(t) = instantaneous power. Straight: constant P. Curve: variable P."
  slopeMeaning:
    es: "dW/dt = P: potencia instantánea."
    en: "dW/dt = P: instantaneous power."
  interceptMeaning:
    es: "W(0) = 0: sin trabajo acumulado."
    en: "W(0) = 0: no cumulative work."
  curvatureMeaning:
    es: "Recta: P constante. Cóncava: P crece. Convexa: P disminuye."
    en: "Straight: constant P. Concave: P increases. Convex: P decreases."
  signMeaning:
    es: "P > 0: trabajo motor. P < 0: trabajo resistivo."
    en: "P > 0: driving work. P < 0: resistive work."
  areaMeaning:
    es: Área bajo P(t) = W = ∫ P dt.
    en: Area under P(t) = W = ∫ P dt.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "Potencia: P = W/t = F·v."
    en: "Power: P = W/t = F·v."
  formulaConnection:
    es: P = dW/dt, P = F·v, P_media = W/t.
    en: P = dW/dt, P = F·v, P_avg = W/t.
  readingFocus:
    es: leer la pendiente como potencia y el área bajo P(t) como trabajo.
    en: read slope as power and area under P(t) as work.
  agentHints:
    es:
      - Pendiente W(t) = P.
      - P = F·v.
      - W = área bajo P(t).
    en:
      - Slope W(t) = P.
      - P = F·v.
      - W = area under P(t).
  commonMistakes:
    es:
      - P = W·t.
      - P = F·x.
      - Pendiente de F(x) = P.
    en:
      - P = W·t.
      - P = F·x.
      - Slope of F(x) = P.
