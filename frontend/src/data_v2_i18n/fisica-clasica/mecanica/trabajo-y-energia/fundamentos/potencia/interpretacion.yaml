version: 2
id: interpretacion-potencia
leaf_id: potencia
nombre:
  es: Interpretacion de potencia
  en: Interpretation of power
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: trabajo-y-energia
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/mecanica/trabajo-y-energia/fundamentos/potencia
dependencies:
  formulas: [potencia_media, potencia_instantanea_mecanica, potencia_definicion_diferencial]
  magnitudes: [P, W, t, F, v, theta]
output_contract:
  sections: [summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step]
result_blocks:
  summary: { title: { es: Resumen, en: Summary } }
  physical_reading: { title: { es: Lectura fisica, en: Physical reading } }
  coherence: { title: { es: Coherencia, en: Coherence } }
  model_validity: { title: { es: Validez del modelo, en: Model validity } }
  graph_reading: { title: { es: Lectura grafica, en: Graph reading } }
  likely_errors: { title: { es: Errores probables, en: Likely errors } }
  next_step: { title: { es: Siguiente paso, en: Next step } }
targets:
  P:
    summary_rules:
      - { id: p_summary, when: "true", status: info, text: { es: "Fisicamente, P interpreta la demanda del sistema porque mide con que rapidez una fuerza, motor o freno cambia la energia mecanica; no describe la energia total acumulada.", en: "Physically, P interprets system demand because it measures how rapidly a force, engine, or brake changes mechanical energy; it does not describe total stored energy." } }
    physical_reading_rules:
      - { id: p_reading, when: "true", status: info, text: { es: "Una potencia grande significa que el trabajo se entrega en poco tiempo o con alta tasa instantanea.", en: "Large power means work is delivered in little time or at a high instantaneous rate." } }
    coherence_rules:
      - { id: p_coherence, when: "true", status: ok, text: { es: "El signo de P debe concordar con si la fuerza entrega o extrae energia.", en: "The sign of P must match whether the force delivers or removes energy." } }
    model_validity_rules:
      - { id: p_validity, when: "true", status: ok, text: { es: "La lectura requiere que W, t, F y v correspondan al mismo proceso fisico.", en: "The reading requires W, t, F, and v to belong to the same physical process." } }
    graph_rules:
      - { id: p_graph, when: "true", status: info, text: { es: "En W(t), P es pendiente; en P(v), theta fijo da una recta.", en: "In W(t), P is slope; in P(v), fixed theta gives a straight line." } }
    likely_errors:
      - { id: p_error, when: "true", status: warning, text: { es: "Error frecuente: usar P = Fv aunque fuerza y velocidad sean perpendiculares.", en: "Common mistake: using P = Fv even when force and velocity are perpendicular." } }
    next_step_rules:
      - { id: p_next, when: "true", status: info, text: { es: "Decide si el problema pide potencia media o instantanea antes de sustituir.", en: "Decide whether the problem asks for average or instantaneous power before substituting." } }
  W:
    summary_rules:
      - { id: w_summary, when: "true", status: info, text: { es: "W es la energia mecanica transferida: al dividirla por tiempo se obtiene una tasa fisica de transferencia.", en: "W is transferred mechanical energy: dividing it by time gives a physical transfer rate." } }
    physical_reading_rules:
      - { id: w_reading, when: "true", status: info, text: { es: "El mismo W puede exigir potencias muy distintas segun el intervalo.", en: "The same W may require very different powers depending on the interval." } }
    coherence_rules:
      - { id: w_coherence, when: "true", status: ok, text: { es: "W debe pertenecer al mismo proceso que t.", en: "W must belong to the same process as t." } }
    model_validity_rules:
      - { id: w_validity, when: "true", status: ok, text: { es: "La lectura media falla si se mezcla trabajo de una fase con tiempo de otra.", en: "The average reading fails if work from one phase is mixed with time from another." } }
    graph_rules:
      - { id: w_graph, when: "true", status: info, text: { es: "En una curva W(t), su pendiente local es P.", en: "On a W(t) curve, its local slope is P." } }
    likely_errors:
      - { id: w_error, when: "true", status: warning, text: { es: "Confundir W con watt por usar la misma letra.", en: "Confusing W with watt because the same letter is used." } }
    next_step_rules:
      - { id: w_next, when: "true", status: info, text: { es: "Comprueba el intervalo temporal asociado antes de dividir.", en: "Check the associated time interval before dividing." } }
  t:
    summary_rules:
      - { id: t_summary, when: "true", status: info, text: { es: "t fija el intervalo sobre el que se reparte el trabajo para obtener potencia media.", en: "t sets the interval over which work is distributed to obtain average power." } }
    physical_reading_rules:
      - { id: t_reading, when: "true", status: info, text: { es: "Reducir t con el mismo W aumenta la exigencia de potencia.", en: "Reducing t for the same W increases power demand." } }
    coherence_rules:
      - { id: t_coherence, when: "true", status: ok, text: { es: "t debe ser positivo y corresponder al proceso calculado.", en: "t must be positive and correspond to the computed process." } }
    model_validity_rules:
      - { id: t_validity, when: "true", status: ok, text: { es: "Intervalos mal elegidos convierten la potencia media en un numero sin sistema fisico.", en: "Poorly chosen intervals turn average power into a number without a physical system." } }
    graph_rules:
      - { id: t_graph, when: "true", status: info, text: { es: "En el eje temporal, mayor pendiente de W implica mayor P.", en: "On the time axis, a larger W slope implies larger P." } }
    likely_errors:
      - { id: t_error, when: "true", status: warning, text: { es: "Usar el tiempo total de una actividad para un trabajo parcial.", en: "Using the total activity time for partial work." } }
    next_step_rules:
      - { id: t_next, when: "true", status: info, text: { es: "Define inicio y final del intervalo antes de calcular.", en: "Define the beginning and end of the interval before calculating." } }
  F:
    summary_rules:
      - { id: f_summary, when: "true", status: info, text: { es: "F solo contribuye a P mediante su componente paralela al movimiento.", en: "F contributes to P only through its component parallel to motion." } }
    physical_reading_rules:
      - { id: f_reading, when: "true", status: info, text: { es: "Una fuerza grande puede transferir poca energia si no mueve su punto de aplicacion.", en: "A large force may transfer little energy if it does not move its point of application." } }
    coherence_rules:
      - { id: f_coherence, when: "true", status: ok, text: { es: "F y v deben pertenecer al mismo punto e instante.", en: "F and v must belong to the same point and instant." } }
    model_validity_rules:
      - { id: f_validity, when: "true", status: ok, text: { es: "Si hay rotacion o contacto distribuido, hay que elegir el punto de aplicacion correcto.", en: "If rotation or distributed contact exists, the correct point of application must be chosen." } }
    graph_rules:
      - { id: f_graph, when: "true", status: info, text: { es: "Para v y theta fijos, P crece linealmente con F.", en: "For fixed v and theta, P grows linearly with F." } }
    likely_errors:
      - { id: f_error, when: "true", status: warning, text: { es: "Multiplicar por rapidez sin proyectar la fuerza.", en: "Multiplying by speed without projecting the force." } }
    next_step_rules:
      - { id: f_next, when: "true", status: info, text: { es: "Identifica direccion y punto de aplicacion antes de usar F.", en: "Identify direction and point of application before using F." } }
  v:
    summary_rules:
      - { id: v_summary, when: "true", status: info, text: { es: "v mide la rapidez del punto donde actua la fuerza que transfiere energia.", en: "v measures the speed of the point where the energy-transferring force acts." } }
    physical_reading_rules:
      - { id: v_reading, when: "true", status: info, text: { es: "Con la misma fuerza paralela, duplicar v duplica P.", en: "With the same parallel force, doubling v doubles P." } }
    coherence_rules:
      - { id: v_coherence, when: "true", status: ok, text: { es: "No debe sustituirse por la velocidad de otro punto del sistema.", en: "It must not be replaced by the velocity of another point of the system." } }
    model_validity_rules:
      - { id: v_validity, when: "true", status: ok, text: { es: "En sistemas extensos, la potencia depende de velocidades locales.", en: "In extended systems, power depends on local velocities." } }
    graph_rules:
      - { id: v_graph, when: "true", status: info, text: { es: "Con F y theta fijos, P frente a v es una recta.", en: "With fixed F and theta, P versus v is a straight line." } }
    likely_errors:
      - { id: v_error, when: "true", status: warning, text: { es: "Usar rapidez media cuando el problema pide instante.", en: "Using average speed when the problem asks for an instant." } }
    next_step_rules:
      - { id: v_next, when: "true", status: info, text: { es: "Comprueba si necesitas rapidez media o instantanea.", en: "Check whether average or instantaneous speed is needed." } }
