version: 2
id: interpretacion-teorema-trabajo-energia
leaf_id: teorema-trabajo-energia
nombre:
  es: Interpretacion del teorema trabajo-energia
  en: Interpretation of the work-energy theorem
scope:
  area: fisica-clasica
  bloque: mecanica
  subbloque: trabajo-y-energia
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/mecanica/trabajo-y-energia/fundamentos/teorema-trabajo-energia
dependencies:
  formulas:
  - variacion_energia_cinetica
  - teorema_trabajo_energia
  - trabajo_neto_desde_estados
  - velocidad_final_desde_trabajo_neto
  magnitudes:
  - Wnet
  - dK
  - Ki
  - Kf
  - m
  - vi
  - vf
output_contract:
  sections: [ summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step ]
result_blocks:
  summary:
    title:
      es: Resumen fisico
      en: Physical summary
  physical_reading:
    title:
      es: Lectura fisica
      en: Physical reading
  coherence:
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    title:
      es: Lectura estructural
      en: Structural reading
  likely_errors:
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    title:
      es: Siguiente paso
      en: Next step
targets:
  Wnet:
    summary_rules:
    - id: wnet_summary
      when: 'true'
      status: info
      text:
        es: "Wnet resume el efecto conjunto de todas las fuerzas relevantes sobre el cambio de movimiento."
        en: "Wnet summarizes the combined effect of all relevant forces on the change of motion."
    physical_reading_rules:
    - id: wnet_reading
      when: 'true'
      status: info
      text:
        es: "Wnet positiva aporta energia cinetica neta; Wnet negativa la extrae."
        en: "Positive Wnet adds net kinetic energy; negative Wnet removes it."
    coherence_rules:
    - id: wnet_coherence
      when: 'true'
      status: ok
      text:
        es: "Wnet debe coincidir en signo y valor con dK si el teorema se aplico bien."
        en: "Wnet must match dK in sign and value if the theorem was applied correctly."
    model_validity_rules:
    - id: wnet_validity
      when: 'true'
      status: ok
      text:
        es: "La validez exige incluir todas las fuerzas relevantes del proceso completo."
        en: "Validity requires including all relevant forces over the complete process."
    graph_rules:
    - id: wnet_graph
      when: 'true'
      status: info
      text:
        es: "Aunque el leaf no declare grafico, la lectura correcta sigue siendo una comparacion por estados y balance global."
        en: "Even without a declared graph, the correct reading remains a state comparison and a global balance."
    likely_errors:
    - id: wnet_error
      when: 'true'
      status: warning
      text:
        es: "Error comun: atribuir Wnet solo a la fuerza mas visible y olvidar rozamiento, peso u otras contribuciones."
        en: "Common mistake: assigning Wnet only to the most visible force and forgetting friction, weight, or other contributions."
    next_step_rules:
    - id: wnet_next
      when: 'true'
      status: info
      text:
        es: "Tras hallar Wnet, decide si conviene descomponerla por trabajos parciales o cerrar ya el balance de estados."
        en: "After finding Wnet, decide whether to decompose it into partial works or close the state balance directly."
  dK:
    summary_rules:
    - id: dk_summary
      when: 'true'
      status: info
      text:
        es: "dK indica si el sistema gana, pierde o conserva energia cinetica entre el inicio y el final."
        en: "dK states whether the system gains, loses, or preserves kinetic energy between start and finish."
    physical_reading_rules:
    - id: dk_reading
      when: 'true'
      status: info
      text:
        es: "dK positiva suele leerse como aceleracion neta; dK negativa, como frenado o extraccion energetica."
        en: "Positive dK usually reads as net speeding up; negative dK as braking or energetic extraction."
    coherence_rules:
    - id: dk_coherence
      when: 'true'
      status: ok
      text:
        es: "dK debe ser Kf menos Ki usando el mismo sistema y la misma convencion de estados."
        en: "dK must be Kf minus Ki using the same system and the same state convention."
    model_validity_rules:
    - id: dk_validity
      when: 'true'
      status: ok
      text:
        es: "La lectura es fiable si Ki y Kf pertenecen exactamente al mismo sistema fisico."
        en: "The reading is reliable if Ki and Kf belong to exactly the same physical system."
    graph_rules:
    - id: dk_graph
      when: 'true'
      status: info
      text:
        es: "Piensa dK como salto entre dos niveles energeticos de estado."
        en: "Think of dK as the jump between two energetic state levels."
    likely_errors:
    - id: dk_error
      when: 'true'
      status: warning
      text:
        es: "No conviertas dK en modulo si el signo decide el sentido fisico del cambio."
        en: "Do not turn dK into a magnitude if the sign decides the physical direction of change."
    next_step_rules:
    - id: dk_next
      when: 'true'
      status: info
      text:
        es: "Si ya tienes dK, comprueba si el problema pide explicarla por Wnet o resolver una rapidez final."
        en: "If you already have dK, check whether the problem asks you to explain it through Wnet or solve for a final speed."
  Ki:
    summary_rules:
    - id: ki_summary
      when: 'true'
      status: info
      text:
        es: "Ki fija el presupuesto energetico de partida del sistema."
        en: "Ki sets the system's starting energy budget."
    physical_reading_rules:
    - id: ki_reading
      when: 'true'
      status: info
      text:
        es: "Un Ki grande no garantiza aceleracion; solo marca el estado inicial antes del balance."
        en: "A large Ki does not guarantee speeding up; it only marks the initial state before the balance."
    coherence_rules:
    - id: ki_coherence
      when: Ki >= 0
      status: ok
      text:
        es: "Ki no negativa, consistente con energia cinetica clasica."
        en: "Non-negative Ki, consistent with classical kinetic energy."
    model_validity_rules:
    - id: ki_validity
      when: 'true'
      status: ok
      text:
        es: "Ki debe corresponder al mismo sistema que despues se usa en Kf y Wnet."
        en: "Ki must correspond to the same system later used in Kf and Wnet."
    graph_rules:
    - id: ki_graph
      when: 'true'
      status: info
      text:
        es: "Ki se interpreta como nivel inicial del presupuesto cinetico."
        en: "Ki is interpreted as the initial level of the kinetic budget."
    likely_errors:
    - id: ki_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: mezclar la rapidez inicial de un objeto con la masa de otro."
        en: "Common mistake: mixing the initial speed of one object with the mass of another."
    next_step_rules:
    - id: ki_next
      when: 'true'
      status: info
      text:
        es: "Usa Ki junto con Kf o con Wnet; sola no cuenta la historia del proceso."
        en: "Use Ki together with Kf or Wnet; by itself it does not tell the process story."
  Kf:
    summary_rules:
    - id: kf_summary
      when: 'true'
      status: info
      text:
        es: "Kf cierra el balance de energia cinetica en el estado final."
        en: "Kf closes the kinetic-energy balance in the final state."
    physical_reading_rules:
    - id: kf_reading
      when: 'true'
      status: info
      text:
        es: "Comparada con Ki, permite decidir si el proceso acelero o freno al sistema."
        en: "Compared with Ki, it lets you decide whether the process sped the system up or slowed it down."
    coherence_rules:
    - id: kf_coherence
      when: Kf >= 0
      status: ok
      text:
        es: "Kf no negativa, consistente con el modelo clasico."
        en: "Non-negative Kf, consistent with the classical model."
    model_validity_rules:
    - id: kf_validity
      when: 'true'
      status: ok
      text:
        es: "Kf debe pertenecer al mismo cierre temporal y al mismo sistema que Ki."
        en: "Kf must belong to the same time closure and the same system as Ki."
    graph_rules:
    - id: kf_graph
      when: 'true'
      status: info
      text:
        es: "Kf es el nivel final frente al cual se lee el salto dK."
        en: "Kf is the final level against which dK is read."
    likely_errors:
    - id: kf_error
      when: 'true'
      status: warning
      text:
        es: "No aceptes Kf negativa; revisa signos o radicandos antes de cerrar."
        en: "Do not accept a negative Kf; recheck signs or radicands before closing."
    next_step_rules:
    - id: kf_next
      when: 'true'
      status: info
      text:
        es: "Tras obtener Kf, compara con Ki para leer dK y validar Wnet."
        en: "After obtaining Kf, compare it with Ki to read dK and validate Wnet."
  vi:
    summary_rules:
    - id: vi_summary
      when: 'true'
      status: info
      text:
        es: "vi fija la rapidez de partida desde la que el trabajo neto modifica el estado."
        en: "vi sets the starting speed from which net work modifies the state."
    physical_reading_rules:
    - id: vi_reading
      when: 'true'
      status: info
      text:
        es: "Con el mismo Wnet y la misma masa, un vi mayor cambia el cierre final de forma distinta."
        en: "With the same Wnet and the same mass, a larger vi changes the final closure differently."
    coherence_rules:
    - id: vi_coherence
      when: vi >= 0
      status: ok
      text:
        es: "vi se interpreta como rapidez no negativa del estado inicial."
        en: "vi is interpreted as a non-negative initial-state speed."
    model_validity_rules:
    - id: vi_validity
      when: 'true'
      status: ok
      text:
        es: "vi debe corresponder al mismo sistema fisico que despues se usa en vf y Wnet."
        en: "vi must correspond to the same physical system later used in vf and Wnet."
    graph_rules:
    - id: vi_graph
      when: 'true'
      status: info
      text:
        es: "vi actua como nivel inicial de la lectura por estados."
        en: "vi acts as the initial level of the state-based reading."
    likely_errors:
    - id: vi_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: usar una velocidad algebraica con signo donde el leaf trabaja con rapidez."
        en: "Common mistake: using an algebraic signed velocity where the leaf works with speed."
    next_step_rules:
    - id: vi_next
      when: 'true'
      status: info
      text:
        es: "Tras fijar vi, comprueba si el problema pide cerrar por vf o por dK."
        en: "After fixing vi, check whether the problem asks you to close through vf or through dK."
  vf:
    summary_rules:
    - id: vf_summary
      when: 'true'
      status: info
      text:
        es: "vf resume el cierre del proceso en terminos de rapidez final compatible con el balance."
        en: "vf summarizes the process closure as the final speed compatible with the balance."
    physical_reading_rules:
    - id: vf_reading
      when: 'true'
      status: info
      text:
        es: "Si Wnet es positiva, vf tiende a superar vi; si es negativa, tiende a disminuir."
        en: "If Wnet is positive, vf tends to exceed vi; if it is negative, it tends to decrease."
    coherence_rules:
    - id: vf_coherence
      when: vf >= 0
      status: ok
      text:
        es: "vf se interpreta como rapidez no negativa."
        en: "vf is interpreted as a non-negative speed."
    model_validity_rules:
    - id: vf_validity
      when: 'true'
      status: ok
      text:
        es: "La formula cerrada exige masa aproximadamente constante y balance completo de trabajo neto."
        en: "The closed form requires approximately constant mass and a complete net-work balance."
    graph_rules:
    - id: vf_graph
      when: 'true'
      status: info
      text:
        es: "vf es una lectura final de estado, no una velocidad instantanea intermedia."
        en: "vf is a final-state reading, not an intermediate instantaneous velocity."
    likely_errors:
    - id: vf_error
      when: 'true'
      status: warning
      text:
        es: "Si el radicando sale negativo, el problema esta mal planteado o el sistema no llega a ese estado."
        en: "If the radicand becomes negative, the problem is ill-posed or the system cannot reach that state."
    next_step_rules:
    - id: vf_next
      when: 'true'
      status: info
      text:
        es: "Tras hallar vf, comprueba si tiene sentido fisico con la historia del proceso."
        en: "After finding vf, check whether it makes physical sense for the process story."
  m:
    summary_rules:
    - id: m_summary
      when: 'true'
      status: info
      text:
        es: "m regula cuanto trabajo hace falta para cambiar la rapidez entre estados."
        en: "m regulates how much work is needed to change speed between states."
    physical_reading_rules:
    - id: m_reading
      when: 'true'
      status: info
      text:
        es: "A igual cambio de rapidez, una masa mayor exige mayor trabajo neto."
        en: "For the same speed change, a larger mass requires larger net work."
    coherence_rules:
    - id: m_coherence
      when: m > 0
      status: ok
      text:
        es: "m positiva, consistente con el dominio fisico del leaf."
        en: "Positive m, consistent with the physical domain of the leaf."
    model_validity_rules:
    - id: m_validity
      when: 'true'
      status: ok
      text:
        es: "La forma cerrada por velocidades requiere masa aproximadamente constante."
        en: "The closed form in terms of speeds requires approximately constant mass."
    graph_rules:
    - id: m_graph
      when: 'true'
      status: info
      text:
        es: "m funciona como parametro del balance, no como resultado principal."
        en: "m acts as a balance parameter rather than the main result."
    likely_errors:
    - id: m_error
      when: 'true'
      status: warning
      text:
        es: "Error frecuente: usar gramos o toneladas sin convertir a SI."
        en: "Common mistake: using grams or tons without converting to SI."
    next_step_rules:
    - id: m_next
      when: 'true'
      status: info
      text:
        es: "Verifica unidades de m antes de interpretar cualquier energia o rapidez final."
        en: "Check the units of m before interpreting any energy or final speed."
