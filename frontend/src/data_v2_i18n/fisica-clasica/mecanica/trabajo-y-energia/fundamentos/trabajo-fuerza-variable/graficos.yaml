version: "1.0"
leaf: "trabajo-fuerza-variable"

coord:
  title:
    es: Gráfica Coord · Trabajo con Fuerza Variable
    en: Coord Graph · Work with Variable Force
  xAxis:
    es: desplazamiento x (m)
    en: displacement x (m)
  yAxis:
    es: fuerza F(x) (N)
    en: force F(x) (N)
  xMagnitude: x
  yMagnitude: F
  relation:
    es: "W = ∫ F(x) dx = área bajo la curva F(x). Resorte: F = kx → W = ½kx²."
    en: "W = ∫ F(x) dx = area under F(x). Spring: F = kx → W = ½kx²."
  physicalReading:
    es: "Área bajo F(x): trabajo acumulado. Pendiente de F(x): rigidez (resorte). Tramo negativo: fuerza resistiva."
    en: "Area under F(x): cumulative work. Slope of F(x): stiffness (spring). Negative segment: resistive force."
  slopeMeaning:
    es: "dF/dx = k: constante de resorte si F lineal."
    en: "dF/dx = k: spring constant if F linear."
  interceptMeaning:
    es: "F(0): fuerza inicial (0 para resorte en reposo)."
    en: "F(0): initial force (0 for spring at rest)."
  curvatureMeaning:
    es: "Recta: F = kx (resorte ideal). Curva: fuerza no lineal."
    en: "Straight: F = kx (ideal spring). Curve: non-linear force."
  signMeaning:
    es: "F > 0: fuerza motriz. F < 0: fuerza restauradora/resistiva."
    en: "F > 0: driving force. F < 0: restoring/resistive force."
  areaMeaning:
    es: Área bajo F(x) = W = ∫ F dx.
    en: Area under F(x) = W = ∫ F dx.
  domainMeaning:
    es: x real.
    en: x real.
  modelConnection:
    es: "Trabajo con fuerza variable: W = ∫ F dx."
    en: "Work with variable force: W = ∫ F dx."
  formulaConnection:
    es: W = ∫ F(x) dx, W_resorte = ½kx².
    en: W = ∫ F(x) dx, W_spring = ½kx².
  readingFocus:
    es: leer el área bajo la curva como trabajo e identificar tramos positivos y negativos.
    en: read the area under the curve as work and identify positive and negative segments.
  agentHints:
    es:
      - W = área bajo F(x).
      - "Resorte: W = ½kx²."
      - "Área neg: trabajo resistivo."
    en:
      - W = area under F(x).
      - "Spring: W = ½kx²."
      - "Neg area: resistive work."
  commonMistakes:
    es:
      - W = F·x siempre.
      - Ignorar el área.
      - k = F/x² (no kx).
    en:
      - W = F·x always.
      - Ignoring the area.
      - k = F/x² (not kx).
