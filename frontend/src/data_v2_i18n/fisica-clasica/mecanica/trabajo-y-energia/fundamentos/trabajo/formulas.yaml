version: 5
topic:
  id: trabajo
  title:
    es: Trabajo
    en: Work
variables:
- id: W
  symbol: W
  name:
    es: trabajo
    en: Work
  si_unit: J
- id: F
  symbol: F
  name:
    es: fuerza
    en: Force
  si_unit: N
- id: d
  symbol: d
  name:
    es: desplazamiento
    en: Displacement
  si_unit: m
- id: theta
  symbol: \theta
  name:
    es: angulo entre fuerza y desplazamiento
    en: Angle Between Force and Displacement
  si_unit: rad
