version: 5
magnitudes:
- id: W
  symbol: W
  nombre:
    es: trabajo
    en: Work
  unidad_si: J
  descripcion:
    es: Energia transferida por una fuerza a lo largo de un desplazamiento.
    en: Energy transferred by a force along a displacement.
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in: [ trabajo_fuerza_constante, angulo_desde_trabajo ]
  common_mistake: Suponer que W siempre es positiva por ser energia; puede ser negativa o nula.
  typical_range: Puede ser positiva, negativa o nula.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica si la fuerza aporta o extrae energia mecanica del movimiento.
      en: The sign indicates whether the force adds or removes mechanical energy from motion.
  zero_behavior:
    allowed: true
    meaning:
      es: W nula suele corresponder a fuerza perpendicular o desplazamiento nulo.
      en: Zero W usually corresponds to a perpendicular force or zero displacement.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: [ trabajo ]
    secondary_for: []
  graph_binding:
    channels: []
  pedagogical_notes: W es la magnitud dominante del leaf y debe leerse siempre con su signo.
- id: F
  symbol: F
  nombre:
    es: fuerza
    en: Force
  unidad_si: N
  descripcion:
    es: Modulo de la fuerza aplicada en el modelo de trabajo mecanico.
    en: Magnitude of the applied force in the mechanical-work model.
  dimension: MLT^{-2}
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: physical_quantity
  used_in: [ trabajo_fuerza_constante, angulo_desde_trabajo ]
  common_mistake: Usar F sin definir su direccion relativa al desplazamiento.
  typical_range: Positiva como modulo.
  sign_behavior:
    has_sign: false
    meaning:
      es: F se usa como modulo; la orientacion se codifica en theta.
      en: F is used as a magnitude; orientation is encoded in theta.
  zero_behavior:
    allowed: true
    meaning:
      es: F cero implica trabajo nulo por ausencia de accion mecanica.
      en: F equal to zero implies zero work due to no mechanical action.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for: []
    secondary_for: [ trabajo ]
  graph_binding:
    channels: []
  pedagogical_notes: No basta con conocer F; tambien hace falta d y theta.
- id: d
  symbol: d
  nombre:
    es: desplazamiento
    en: Displacement
  unidad_si: m
  descripcion:
    es: Modulo del desplazamiento del punto de aplicacion de la fuerza.
    en: Magnitude of the displacement of the force application point.
  dimension: L
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: physical_quantity
  used_in: [ trabajo_fuerza_constante, angulo_desde_trabajo ]
  common_mistake: Confundir distancia recorrida con desplazamiento neto del modelo.
  typical_range: No negativa.
  sign_behavior:
    has_sign: false
    meaning:
      es: d se interpreta como modulo en este leaf.
      en: d is interpreted as a magnitude in this leaf.
  zero_behavior:
    allowed: true
    meaning:
      es: d nula conduce a trabajo nulo aunque exista fuerza.
      en: Zero d leads to zero work even if a force exists.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for: []
    secondary_for: [ trabajo ]
  graph_binding:
    channels: []
  pedagogical_notes: El uso de desplazamiento neto evita sumar energia ficticia por trayectorias cerradas.
- id: theta
  symbol: "\\theta"
  nombre:
    es: angulo entre fuerza y desplazamiento
    en: Angle Between Force and Displacement
  unidad_si: rad
  descripcion:
    es: Angulo entre la fuerza aplicada y el desplazamiento del punto de aplicacion.
    en: Angle between applied force and displacement of the application point.
  dimension: 1
  is_vector: false
  components: []
  category: base_or_parameter
  physical_role: physical_quantity
  used_in: [ trabajo_fuerza_constante, angulo_desde_trabajo ]
  common_mistake: Tratar theta como decorativa y no como variable que controla signo y magnitud de W.
  typical_range: Entre 0 y 180 grados en el modelo introductorio.
  sign_behavior:
    has_sign: false
    meaning:
      es: Theta determina el signo de cos(theta), no tiene signo propio.
      en: Theta determines the sign of cos(theta), it has no sign by itself.
  zero_behavior:
    allowed: true
    meaning:
      es: Theta cercana a cero maximiza trabajo positivo para F y d fijadas.
      en: Theta near zero maximizes positive work for fixed F and d.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, pi]'
  interpretation_role:
    primary_for: []
    secondary_for: [ trabajo ]
  graph_binding:
    channels: []
  pedagogical_notes: Theta es la puerta conceptual del producto escalar en mecanica.
- id: Wnet
  symbol: "W_{net}"
  nombre:
    es: trabajo_neto
    en: Net Work
  unidad_si: J
  descripcion:
    es: Suma del trabajo de todas las fuerzas relevantes sobre el sistema.
    en: Sum of work done by all relevant forces on the system.
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in: [ trabajo_neto_sumatoria, teorema_trabajo_energia ]
  common_mistake: Igualar Wnet al trabajo de una sola fuerza parcial.
  typical_range: Puede ser positiva, negativa o nula.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo sintetiza ganancia o perdida neta de presupuesto cinetico.
      en: The sign summarizes net gain or loss of kinetic budget.
  zero_behavior:
    allowed: true
    meaning:
      es: Wnet nula indica que no cambia la energia cinetica total.
      en: Zero Wnet indicates no total kinetic-energy change.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for: [ trabajo ]
  graph_binding:
    channels: []
  pedagogical_notes: Wnet conecta este leaf con balances energeticos globales.
- id: dK
  symbol: "\\Delta K"
  nombre:
    es: cambio_de_energia_cinetica
    en: Change in Kinetic Energy
  unidad_si: J
  descripcion:
    es: Diferencia firmada entre energia cinetica final e inicial del sistema.
    en: Signed difference between final and initial kinetic energy of the system.
  dimension: ML^2T^{-2}
  is_vector: false
  components: []
  category: derived
  physical_role: physical_quantity
  used_in: [ trabajo_neto_sumatoria, teorema_trabajo_energia ]
  common_mistake: Perder el signo de dK y reducir su interpretacion a un modulo.
  typical_range: Puede ser positiva, negativa o nula.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo decide si el sistema acelera netamente o se frena netamente.
      en: The sign decides whether the system nets acceleration or net braking.
  zero_behavior:
    allowed: true
    meaning:
      es: dK nula implica estado cinetico inicial y final equivalentes.
      en: Zero dK implies equivalent initial and final kinetic states.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: context-dependent
  interpretation_role:
    primary_for: []
    secondary_for: [ trabajo ]
  graph_binding:
    channels: []
  pedagogical_notes: dK sirve como chequeo de coherencia del trabajo total obtenido.
