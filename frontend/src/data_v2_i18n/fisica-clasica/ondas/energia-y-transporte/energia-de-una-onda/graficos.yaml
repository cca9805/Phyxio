version: "1.0"
leaf: "energia-de-una-onda"

coord:
  title:
    es: Gráfica Coord · Energía de una Onda
    en: Coord Graph · Wave Energy
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: intensidad I (W/m²) o energía E (J)
    en: intensity I (W/m²) or energy E (J)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "I = (1/2)ρvω²A². E ∝ A². Onda esférica: I = P/(4πr²) ∝ 1/r²."
    en: "I = (1/2)ρvω²A². E ∝ A². Spherical: I = P/(4πr²) ∝ 1/r²."
  physicalReading:
    es: Duplicar A → E×4. I decrece con r².
    en: Double A → E×4. I decreases with r².
  slopeMeaning:
    es: "dE/dx: flujo de energía."
    en: "dE/dx: energy flux."
  interceptMeaning:
    es: "E(0): energía inicial."
    en: "E(0): initial energy."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: E ≥ 0.
    en: E ≥ 0.
  areaMeaning:
    es: ∫I dS = P total.
    en: ∫I dS = total P.
  domainMeaning:
    es: "A > 0."
    en: "A > 0."
  modelConnection:
    es: Energía ondulatoria.
    en: Wave energy.
  formulaConnection:
    es: I = (1/2)ρvω²A², E ∝ A².
    en: I = (1/2)ρvω²A², E ∝ A².
  readingFocus:
    es: leer I y verificar I ∝ A².
    en: read I and verify I ∝ A².
  agentHints:
    es:
      - E ∝ A².
      - I = P/S.
      - ×2 A → ×4 E.
    en:
      - E ∝ A².
      - I = P/S.
      - ×2 A → ×4 E.
  commonMistakes:
    es:
      - E ∝ A.
      - I ∝ r².
      - I ∝ f.
    en:
      - E ∝ A.
      - I ∝ r².
      - I ∝ f.

svg:
  title:
    es: Escena SVG · Energía de una Onda
    en: SVG Scene · Wave Energy
  sceneId: energia_onda
  sceneLabel:
    es: Frente de onda con I = P/S
    en: Wave front with I = P/S
  objects:
    es:
      - amplitud A
      - área S
      - potencia P
      - intensidad I
    en:
      - amplitude A
      - area S
      - power P
      - intensity I
  mainObject:
    es: frente de onda
    en: wave front
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "I = P/S. Esférica: I ∝ 1/r²."
    en: "I = P/S. Spherical: I ∝ 1/r²."
  interactions:
    es: E ∝ A².
    en: E ∝ A².
  modelElements:
    es:
      - A
      - I = P/S
      - E ∝ A²
    en:
      - A
      - I = P/S
      - E ∝ A²
  visualCues:
    es:
      - Frente mayor → I menor.
      - A = cresta.
    en:
      - Larger front → lower I.
      - A = crest.
  scaleMeaning:
    es: Radio ∝ r.
    en: Radius ∝ r.
  relation:
    es: I = P/(4πr²).
    en: I = P/(4πr²).
  physicalReading:
    es: I ∝ 1/r² para ondas esféricas.
    en: I ∝ 1/r² for spherical waves.
  modelConnection:
    es: Energía ondulatoria.
    en: Wave energy.
  formulaConnection:
    es: I = P/S, E ∝ A².
    en: I = P/S, E ∝ A².
  readingFocus:
    es: identificar A e I.
    en: identify A and I.
  agentHints:
    es:
      - E ∝ A².
      - I ∝ 1/r².
    en:
      - E ∝ A².
      - I ∝ 1/r².
  commonMistakes:
    es:
      - E ∝ A.
      - I cte en esférica.
    en:
      - E ∝ A.
      - I const for spherical.
