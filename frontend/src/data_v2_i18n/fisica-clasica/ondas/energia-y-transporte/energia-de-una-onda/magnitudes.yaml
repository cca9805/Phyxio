magnitudes:
- id: energia_de_la_onda
  symbol: E
  nombre:
    es: Energía de la onda
    en: Wave energy
  descripcion:
    es: Energía total transportada por una onda en un ciclo completo o a lo largo de una longitud de onda.
    en: Total energy transported by a wave in a complete cycle or along one wavelength.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - calculo_energia_onda
  - analisis_potencia
  common_mistake: Confundir la energía total con la densidad de energía o la energía instantánea en un punto.
  typical_range: 10⁻¹² J (ultrasonido) a 10⁶ J (olas marinas)
  sign_behavior:
    has_sign: false
    meaning:
      es: La energía es una magnitud escalar positiva.
      en: Energy is a positive scalar quantity.
  zero_behavior:
    allowed: true
    meaning:
      es: Energía nula indica ausencia de perturbación ondulatoria.
      en: Zero energy indicates absence of wave disturbance.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - energia_total_onda
    secondary_for:
    - transporte_energia
  graph_binding:
    channels:
    - energia_vs_amplitud
    - energia_vs_frecuencia
  pedagogical_notes:
    es: Esta magnitud centraliza el análisis energético de las ondas, diferenciando entre energía cinética y potencial que
      se intercambian durante la propagación.
    en: This magnitude centralizes the energy analysis of waves, differentiating between kinetic and potential energy that
      are exchanged during propagation.
- id: u_energia
  symbol: u
  nombre:
    es: Densidad de energía ondulatoria
    en: Wave energy density
  descripcion:
    es: Energía por unidad espacial efectiva almacenada por la perturbación; por unidad de longitud en cuerdas 1D y por
      unidad de volumen en medios 3D.
    en: Energy per effective spatial unit stored by the disturbance; per unit length in 1D strings and per unit volume in
      3D media.
  unidad_si: J/m en 1D; J/m³ en 3D
  dimension: '[M L T⁻²] en 1D; [M L⁻¹ T⁻²] en 3D'
  is_vector: false
  components: []
  category: derived
  physical_role: state
  used_in:
  - distribucion_energia
  - calculo_local_energia
  common_mistake: Aplicar fórmulas de densidad de energía sin considerar la geometría del medio (lineal, superficial, volumétrica).
  typical_range: depende de la geometría; desde 10⁻⁶ J/m³ en sonido débil hasta valores mucho mayores en olas o pulsos intensos
  sign_behavior:
    has_sign: false
    meaning:
      es: La densidad de energía es siempre positiva.
      en: Energy density is always positive.
  zero_behavior:
    allowed: true
    meaning:
      es: Densidad nula indica ausencia de perturbación en esa región.
      en: Zero density indicates absence of disturbance in that region.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - distribucion_espacial_energia
    secondary_for:
    - intensidad_ondulatoria
  graph_binding:
    channels:
    - densidad_vs_posicion
    - densidad_vs_tiempo
  pedagogical_notes:
    es: Antes de usar [[u_energia]], identifica si el modelo es lineal, superficial o volumétrico; la unidad efectiva cambia
      con la geometría.
    en: Before using [[u_energia]], identify whether the model is linear, surface-based, or volumetric; the effective unit
      changes with geometry.
- id: amplitud
  symbol: A
  nombre:
    es: Amplitud
    en: Amplitude
  descripcion:
    es: Máximo desplazamiento de la perturbación respecto a la posición de equilibrio.
    en: Maximum displacement of the disturbance from the equilibrium position.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: state
  physical_role: parameter
  used_in:
  - energia_vs_amplitud
  - intensidad_ondulatoria
  common_mistake: No distinguir entre amplitud de desplazamiento, presión o campo eléctrico según el tipo de onda.
  typical_range: 10⁻¹⁰ m (ondas electromagnéticas) a 10 m (tsunamis)
  sign_behavior:
    has_sign: false
    meaning:
      es: La amplitud es positiva por definición (magnitud máxima).
      en: Amplitude is positive by definition (maximum magnitude).
  zero_behavior:
    allowed: true
    meaning:
      es: Amplitud nula indica ausencia de onda.
      en: Zero amplitude indicates absence of wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - magnitud_perturbacion
    secondary_for:
    - energia_transportada
  graph_binding:
    channels:
    - amplitud_vs_tiempo
    - amplitud_vs_posicion
  pedagogical_notes:
    es: El cuadrado de la amplitud determina la energía transportada, haciéndola la magnitud dominante en transporte energético.
    en: The square of the amplitude determines the transported energy, making it the dominant magnitude in energy transport.
- id: omega
  symbol: \omega
  nombre:
    es: Frecuencia angular
    en: Angular frequency
  descripcion:
    es: Tasa de cambio angular de la fase de la onda, relacionada con la frecuencia temporal.
    en: Angular rate of change of the wave phase, related to temporal frequency.
  unidad_si: rad/s
  dimension: '[T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: parameter
  used_in:
  - relacion_dispersion
  - energia_frecuencia
  common_mistake: Confundir con frecuencia lineal f, olvidando el factor 2π en conversiones.
  typical_range: 10⁻⁴ rad/s (mareas) a 10²⁰ rad/s (rayos gamma)
  sign_behavior:
    has_sign: false
    meaning:
      es: La frecuencia angular es positiva por convención física.
      en: Angular frequency is positive by physical convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Frecuencia nula indica perturbación estática o ausencia de oscilación.
      en: Zero frequency indicates static disturbance or absence of oscillation.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - dinamica_temporal
    secondary_for:
    - energia_transportada
  graph_binding:
    channels:
    - omega_vs_k
    - espectro_frecuencias
  pedagogical_notes:
    es: La frecuencia angular aparece cuadrática en la energía de ondas mecánicas, duplicando su impacto respecto a la amplitud.
    en: Angular frequency appears squared in mechanical wave energy, doubling its impact compared to amplitude.
- id: mu
  symbol: \mu
  nombre:
    es: Densidad lineal de masa
    en: Linear mass density
  descripcion:
    es: Masa por unidad de longitud en medios unidimensionales como cuerdas.
    en: Mass per unit length in one-dimensional media such as strings.
  unidad_si: kg/m
  dimension: '[M L⁻¹]'
  is_vector: false
  components: []
  category: parameter
  physical_role: parameter
  used_in:
  - ondas_cuerda
  - energia_cuerda_vibrante
  common_mistake: Usar densidad volumétrica en lugar de lineal para cuerdas, olvidando la sección transversal.
  typical_range: 10⁻⁴ kg/m (hilo de seda) a 10 kg/m (cable de acero)
  sign_behavior:
    has_sign: false
    meaning:
      es: La densidad lineal es intrínsecamente positiva.
      en: Linear density is intrinsically positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Densidad nula implica ausencia de medio, imposibilitando la onda.
      en: Zero density implies absence of medium, making wave propagation impossible.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - inercia_medio
    secondary_for:
    - velocidad_propagacion
  graph_binding:
    channels:
    - mu_vs_tension
    - energia_vs_mu
  pedagogical_notes:
    es: En cuerdas vibrantes, la densidad lineal junto con la tensión determina la velocidad de propagación y la energía cinética
      del movimiento transversal.
    en: In vibrating strings, linear density together with tension determines propagation velocity and kinetic energy of transverse
      motion.
- id: potencia_de_la_onda
  symbol: P
  nombre:
    es: Potencia de la onda
    en: Wave power
  descripcion:
    es: Energía transportada por la onda por unidad de tiempo a través de una sección del medio.
    en: Energy transported by the wave per unit time through a section of the medium.
  unidad_si: W
  dimension: '[M L² T⁻³]'
  is_vector: false
  components: []
  category: derived
  physical_role: derived
  used_in:
  - transporte_energia
  - balance_energetico
  common_mistake: Confundir potencia instantánea con potencia media, o usar energía total en lugar de tasa de transferencia.
  typical_range: 10⁻¹⁰ W (ultrasonido médico) a 10⁹ W (olas oceánicas en tormenta)
  sign_behavior:
    has_sign: false
    meaning:
      es: La potencia es positiva, indicando flujo de energía.
      en: Power is positive, indicating energy flow.
  zero_behavior:
    allowed: true
    meaning:
      es: Potencia nula indica onda estacionaria noda o ausencia de perturbación.
      en: Zero power indicates stationary wave node or absence of disturbance.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - tasa_transporte_energia
    secondary_for:
    - eficiencia_transferencia
  graph_binding:
    channels:
    - potencia_vs_tiempo
    - flujo_energia
  pedagogical_notes:
    es: La potencia ondulatoria representa la energía que atraviesa una sección por segundo, crucial para diseño de captadores
      de energía marina.
    en: Wave power represents the energy crossing a section per second, crucial for marine energy harvester design.
- id: lambda
  symbol: \lambda
  nombre:
    es: Longitud de onda
    en: Wavelength
  descripcion:
    es: Distancia espacial después de la cual la onda repite su forma (periodo espacial).
    en: Spatial distance after which the wave repeats its shape (spatial period).
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: state
  physical_role: parameter
  used_in:
  - relacion_dispersion
  - energia_espacial
  common_mistake: Confundir longitud de onda con desplazamiento total de un punto del medio.
  typical_range: 10⁻¹⁴ m (rayos gamma) a 10⁶ m (ondas de radio larga)
  sign_behavior:
    has_sign: false
    meaning:
      es: La longitud de onda es siempre positiva.
      en: Wavelength is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Longitud de onda nula implica frecuencia infinita, físicamente imposible.
      en: Zero wavelength implies infinite frequency, physically impossible.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - estructura_espacial
    secondary_for:
    - energia_transportada
  graph_binding:
    channels:
    - forma_onda
    - espectro_espacial
  pedagogical_notes:
    es: La longitud de onda determina la escala espacial de la perturbación y aparece en la energía total cuando se integra
      sobre un ciclo completo.
    en: Wavelength determines the spatial scale of the disturbance and appears in total energy when integrated over a complete
      cycle.
- id: seccion_transversal
  symbol: S
  nombre:
    es: Sección transversal
    en: Cross-sectional area
  descripcion:
    es: Área perpendicular a la dirección de propagación por la que fluye la energía ondulatoria.
    en: Area perpendicular to the propagation direction through which wave energy flows.
  unidad_si: m²
  dimension: '[L²]'
  is_vector: false
  components: []
  category: parameter
  physical_role: parameter
  used_in:
  - potencia_onda
  - flujo_energia
  common_mistake: Usar área superficial total en lugar de sección perpendicular al flujo energético.
  typical_range: 10⁻⁶ m² (fibra óptica) a 10⁴ m² (sección oceánica)
  sign_behavior:
    has_sign: false
    meaning:
      es: El área es positiva por definición.
      en: Area is positive by definition.
  zero_behavior:
    allowed: false
    meaning:
      es: Área nula bloquea completamente el flujo de energía.
      en: Zero area completely blocks energy flow.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - geometria_transporte
    secondary_for:
    - intensidad_ondulatoria
  graph_binding:
    channels:
    - seccion_geometrica
    - flujo_vs_area
  pedagogical_notes:
    es: La sección transversal determina cuántos elementos del medio participan en el transporte energético, escalando linealmente
      la potencia total.
    en: Cross-sectional area determines how many medium elements participate in energy transport, scaling total power linearly.
- id: velocidad_de_propagacion
  symbol: v
  nombre:
    es: Velocidad de propagación
    en: Propagation velocity
  descripcion:
    es: Velocidad a la que se propaga la perturbación ondulatoria a través del medio.
    en: Velocity at which the wave disturbance propagates through the medium.
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: {}
  category: kinematic
  physical_role: parameter
  used_in:
  - potencia_onda_cuerda
  - potencia_onda_general
  common_mistake:
    es: Confundir con velocidad máxima de oscilación de las partículas del medio.
    en: Confusing with maximum oscillation velocity of medium particles.
  typical_range:
    min: 0.1
    max: 300000000
    unit: m/s
  sign_behavior: always_positive
  zero_behavior: no_wave_propagation
  value_nature: scalar
  interpretation_role: derived_calculable
  graph_binding:
    channels:
    - propagation_vs_position
  pedagogical_notes:
    es: La velocidad de propagación depende de las propiedades del medio (tensión y densidad para cuerdas) y es independiente
      de la amplitud en régimen lineal.
    en: Propagation velocity depends on medium properties (tension and density for strings) and is independent of amplitude
      in linear regime.
