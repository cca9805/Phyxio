  potencia_de_la_onda:
    enabled: true
    magnitude_type: power
    semantic_role:
      es: Potencia total transportada por la onda a través de una sección perpendicular.
      en: Total power transported by the wave through a perpendicular section.
    summary_rules:
    - id: po_summary_high
      when: P_onda > 10000
      status: ok
      text:
        es: '[[P_onda]] indica potencia de onda elevada. El sistema transporta energía a ritmo intenso, relevante para aplicaciones
          de alta intensidad.'
        en: '[[P_onda]] indicates high wave power. The system transports energy at intense rate, relevant for high-intensity
          applications.'
    - id: po_summary_low
      when: P_onda < 1
      status: ok
      text:
        es: Potencia baja sugiere onda débil o área de sección pequeña. Considera aumentar la amplitud o el área interceptada.
        en: Low power suggests weak wave or small cross-sectional area. Consider increasing amplitude or intercepted area.
    - id: po_summary_default
      when: 'true'
      status: ok
      text:
        es: La potencia [[P_onda]] describe el ritmo total de transferencia energética a través de la sección considerada.
        en: Power [[P_onda]] describes the total rate of energy transfer through the considered section.
    physical_reading_rules:
    - id: po_reading_magnitude
      when: 'true'
      status: ok
      text:
        es: El valor representa energía por segundo que atraviesa la sección. A mayor potencia, mayor capacidad de realizar
          trabajo o calentar el receptor.
        en: The value represents energy per second crossing the section. Higher power means greater capacity to do work or
          heat the receiver.
    - id: po_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[P_onda]] cuantifica la energía disponible por unidad de tiempo para interactuar con sistemas detectores o receptores.'
        en: '[[P_onda]] quantifies energy available per unit time to interact with detector or receiver systems.'
    coherence_rules:
    - id: po_coherence_area_check
      when: A_seccion <= 0
      status: error
      text:
        es: Área de sección no válida. La potencia requiere área positiva para existir.
        en: Invalid section area. Power requires positive area to exist.
    - id: po_coherence_default
      when: 'true'
      status: ok
      text:
        es: Potencia consistente con flujo y área de sección.
        en: Power consistent with flux and section area.
    model_validity_rules:
    - id: po_validity_uniformidad
      when: 'true'
      status: ok
      text:
        es: El modelo asume flujo uniforme sobre toda el área. Para flujos no uniformes, el resultado es un promedio.
        en: Model assumes uniform flux over the entire area. For non-uniform fluxes, result is an average.
    - id: po_validity_default
      when: 'true'
      status: ok
      text:
        es: Modelo válido para secciones planas y flujos perpendiculares a ellas.
        en: Model valid for flat sections and fluxes perpendicular to them.
    graph_rules:
    - id: po_graph_visualization
      when: 'true'
      status: ok
      text:
        es: El gráfico muestra la potencia como integral del flujo sobre el área. La visualización ayuda a entender la distribución
          espacial.
        en: Graph shows power as integral of flux over area. Visualization helps understand spatial distribution.
    - id: po_graph_default
      when: 'true'
      status: ok
      text:
        es: La representación visual conecta la distribución del flujo con la potencia total acumulada.
        en: Visual representation connects flux distribution with total accumulated power.
    likely_errors:
    - id: po_error_area_total
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[potencia_de_la_onda]] con una lectura aislada es un error frecuente: Error típico: usar área total
          en lugar de área perpendicular al flujo. Si la superficie está inclinada, proyecta el área perpendicularmente.'
        en: 'A common mistake is to interpret [[potencia_de_la_onda]] in isolation: Typical error: using total area instead
          of area perpendicular to flux. If surface is inclined, project area perpendicularly.'
    - id: po_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[potencia_de_la_onda]] con una lectura aislada es un error frecuente: Verifica que el área usada sea
          la interceptada perpendicularmente por la onda.'
        en: 'A common mistake is to interpret [[potencia_de_la_onda]] in isolation: Verify that used area is that intercepted
          perpendicularly by the wave.'
    next_step_rules:
    - id: po_next_rendimiento
      when: 'true'
      status: ok
      text:
        es: Calcula el rendimiento del sistema dividiendo la potencia útil entre la potencia total incidente.
        en: Calculate system efficiency by dividing useful power by total incident power.
    physical_intuition:
    - id: potencia_de_la_onda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[potencia_de_la_onda]] describe el estado dinámico.
        en: Intuitively, [[potencia_de_la_onda]] describes the dynamic state.
    limiting_cases:
    - id: potencia_de_la_onda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[potencia_de_la_onda]].
        en: Check limiting cases of [[potencia_de_la_onda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  area_perpendicular_de_seccion:
    enabled: true
    magnitude_type: perpendicular_area
    semantic_role:
      es: Area efectiva perpendicular que convierte densidad de flujo en potencia total.
      en: Effective perpendicular area that converts flux density into total power.
    summary_rules:
    - id: as_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[A_seccion]] multiplica a [[S_flujo]] para obtener la potencia total [[P_onda]] interceptada por una superficie.'
        en: '[[A_seccion]] multiplies [[S_flujo]] to obtain total power [[P_onda]] intercepted by a surface.'
    physical_reading_rules:
    - id: as_reading_default
      when: 'true'
      status: ok
      text:
        es: Mayor [[A_seccion]] significa que la superficie intercepta mas potencia para el mismo flujo local.
        en: Larger [[A_seccion]] means the surface intercepts more power for the same local flux.
    coherence_rules:
    - id: as_coherence_positive
      when: A_seccion <= 0
      status: error
      text:
        es: El area perpendicular debe ser positiva.
        en: The perpendicular area must be positive.
    model_validity_rules:
    - id: as_validity_uniform
      when: 'true'
      status: ok
      text:
        es: La relacion [[P_onda]] = [[S_flujo]] por [[A_seccion]] supone flujo uniforme sobre la seccion.
        en: The relation [[P_onda]] = [[S_flujo]] times [[A_seccion]] assumes uniform flux over the section.
    graph_rules:
    - id: as_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[A_seccion]] representa la superficie que corta perpendicularmente al flujo.
        en: In the graph, [[A_seccion]] represents the surface cutting the flux perpendicularly.
    likely_errors:
    - id: as_error_projection
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[area_perpendicular_de_seccion]] con una lectura aislada es un error frecuente: Si la superficie esta
          inclinada, usa el area proyectada perpendicular al flujo, no el area geometrica completa.'
        en: 'A common mistake is to interpret [[area_perpendicular_de_seccion]] in isolation: If the surface is tilted, use
          the area projected perpendicular to the flux, not the full geometric area.'
    next_step_rules:
    - id: as_next_power
      when: 'true'
      status: ok
      text:
        es: Multiplica [[A_seccion]] por [[S_flujo]] para obtener [[P_onda]].
        en: Multiply [[A_seccion]] by [[S_flujo]] to obtain [[P_onda]].
    physical_intuition:
    - id: area_perpendicular_de_seccion_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[area_perpendicular_de_seccion]] describe el estado dinámico.
        en: Intuitively, [[area_perpendicular_de_seccion]] describes the dynamic state.
    limiting_cases:
    - id: area_perpendicular_de_seccion_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[area_perpendicular_de_seccion]].
        en: Check limiting cases of [[area_perpendicular_de_seccion]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
