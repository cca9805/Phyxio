version: "1.0"
leaf: "difraccion"

coord:
  title:
    es: Gráfica Coord · Difracción
    en: Coord Graph · Diffraction
  xAxis:
    es: ángulo θ (rad)
    en: angle θ (rad)
  yAxis:
    es: intensidad relativa I/I₀
    en: relative intensity I/I₀
  xMagnitude: theta
  yMagnitude: I
  relation:
    es: "I(θ) = I₀·[sin(α)/α]², α = πa·sinθ/λ. Mínimo: a·sinθ = nλ."
    en: "I(θ) = I₀·[sin(α)/α]², α = πa·sinθ/λ. Minimum: a·sinθ = nλ."
  physicalReading:
    es: Máximo central. Mínimos en a·sinθ = nλ. Mayor λ/a → mayor difracción.
    en: Central maximum. Minima at a·sinθ = nλ. Larger λ/a → more diffraction.
  slopeMeaning:
    es: "dI/dθ: variación angular."
    en: "dI/dθ: angular variation."
  interceptMeaning:
    es: I(0) = I₀.
    en: I(0) = I₀.
  curvatureMeaning:
    es: Patrón sinc².
    en: sinc² pattern.
  signMeaning:
    es: I ≥ 0.
    en: I ≥ 0.
  areaMeaning:
    es: ∫I dθ ∝ P.
    en: ∫I dθ ∝ P.
  domainMeaning:
    es: "θ ∈ [−π/2, π/2]."
    en: "θ ∈ [−π/2, π/2]."
  modelConnection:
    es: Difracción de Fraunhofer.
    en: Fraunhofer diffraction.
  formulaConnection:
    es: "I = I₀·[sin(α)/α]², a·sinθ = nλ."
    en: "I = I₀·[sin(α)/α]², a·sinθ = nλ."
  readingFocus:
    es: leer mínimos y ancho del máximo central.
    en: read minima and central maximum width.
  agentHints:
    es:
      - "Mínimo: a·sinθ = nλ."
      - θ ≈ λ/a.
      - Mayor λ/a → más difracción.
    en:
      - "Minimum: a·sinθ = nλ."
      - θ ≈ λ/a.
      - Larger λ/a → more diffraction.
  commonMistakes:
    es:
      - Máximo en a·sinθ = nλ.
      - No depende de λ.
      - θ_min = a/λ.
    en:
      - Maximum at a·sinθ = nλ.
      - Does not depend on λ.
      - θ_min = a/λ.
