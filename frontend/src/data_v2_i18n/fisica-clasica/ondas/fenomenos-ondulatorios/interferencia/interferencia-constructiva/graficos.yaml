version: "1.0"
leaf: "interferencia-constructiva"

coord:
  title:
    es: Gráfica Coord · Interferencia Constructiva
    en: Coord Graph · Constructive Interference
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación resultante y_total (m)
    en: resultant displacement y_total (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: Δφ = 2nπ o Δr = nλ → A_total = A₁ + A₂.
    en: Δφ = 2nπ or Δr = nλ → A_total = A₁ + A₂.
  physicalReading:
    es: Crestas se suman. Máxima amplitud.
    en: Crests add up. Maximum amplitude.
  slopeMeaning:
    es: "dy/dx: pendiente resultante."
    en: "dy/dx: resultant slope."
  interceptMeaning:
    es: "y(0): valor inicial."
    en: "y(0): initial value."
  curvatureMeaning:
    es: d²y/dx² de la onda resultante.
    en: d²y/dx² of the resultant wave.
  signMeaning:
    es: "A_total > 0."
    en: "A_total > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Δr = nλ.
    en: Δr = nλ.
  modelConnection:
    es: Principio de superposición.
    en: Superposition principle.
  formulaConnection:
    es: Δr = nλ, Δφ = 2nπ, A = A₁ + A₂.
    en: Δr = nλ, Δφ = 2nπ, A = A₁ + A₂.
  readingFocus:
    es: leer A_total = A₁ + A₂ y verificar Δr = nλ.
    en: read A_total = A₁ + A₂ and verify Δr = nλ.
  agentHints:
    es:
      - Δr = nλ.
      - Δφ = 2nπ.
      - A = A₁ + A₂.
    en:
      - Δr = nλ.
      - Δφ = 2nπ.
      - A = A₁ + A₂.
  commonMistakes:
    es:
      - Constructiva con Δr = λ/2.
      - A = A₁·A₂.
      - Δφ = π → constructiva.
    en:
      - Constructive with Δr = λ/2.
      - A = A₁·A₂.
      - Δφ = π → constructive.
