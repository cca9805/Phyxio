version: "1.0"
leaf: "interferencia-destructiva"

coord:
  title:
    es: Gráfica Coord · Interferencia Destructiva
    en: Coord Graph · Destructive Interference
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación resultante y_total (m)
    en: resultant displacement y_total (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "Δφ = (2n+1)π o Δr = (n+1/2)λ → A_total = |A₁ − A₂|."
    en: "Δφ = (2n+1)π or Δr = (n+1/2)λ → A_total = |A₁ − A₂|."
  physicalReading:
    es: Cresta + valle = cancelación. A₁ = A₂ → A_total = 0.
    en: Crest + trough = cancellation. A₁ = A₂ → A_total = 0.
  slopeMeaning:
    es: "dy/dx: pendiente resultante."
    en: "dy/dx: resultant slope."
  interceptMeaning:
    es: "y(0): valor inicial."
    en: "y(0): initial value."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: A_total ≥ 0.
    en: A_total ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Δr = (n+1/2)λ.
    en: Δr = (n+1/2)λ.
  modelConnection:
    es: Principio de superposición.
    en: Superposition principle.
  formulaConnection:
    es: "Δr = (n+1/2)λ, Δφ = (2n+1)π, A = |A₁ − A₂|."
    en: "Δr = (n+1/2)λ, Δφ = (2n+1)π, A = |A₁ − A₂|."
  readingFocus:
    es: "leer A_total = |A₁ − A₂| y verificar Δr = (n+1/2)λ."
    en: "read A_total = |A₁ − A₂| and verify Δr = (n+1/2)λ."
  agentHints:
    es:
      - Δr = (n+1/2)λ.
      - Δφ = (2n+1)π.
      - A₁ = A₂ → cancelación total.
    en:
      - Δr = (n+1/2)λ.
      - Δφ = (2n+1)π.
      - A₁ = A₂ → full cancellation.
  commonMistakes:
    es:
      - Destructiva con Δr = nλ.
      - Energía desaparece.
      - Δφ = π → constructiva.
    en:
      - Destructive with Δr = nλ.
      - Energy disappears.
      - Δφ = π → constructive.
