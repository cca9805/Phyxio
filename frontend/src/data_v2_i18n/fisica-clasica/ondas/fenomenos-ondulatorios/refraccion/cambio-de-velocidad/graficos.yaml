version: "1.0"
leaf: "cambio-de-velocidad"

coord:
  title:
    es: Gráfica Coord · Cambio de Velocidad (Refracción)
    en: Coord Graph · Speed Change (Refraction)
  xAxis:
    es: índice de refracción n
    en: refractive index n
  yAxis:
    es: velocidad v (m/s)
    en: speed v (m/s)
  xMagnitude: n
  yMagnitude: v
  relation:
    es: v = c/n. Mayor n → menor v. f = cte, λ = v/f cambia.
    en: v = c/n. Higher n → lower v. f = const, λ = v/f changes.
  physicalReading:
    es: "Al cambiar de medio: f = cte, λ y v cambian."
    en: "Changing medium: f = const, λ and v change."
  slopeMeaning:
    es: dv/dn = −c/n² < 0.
    en: dv/dn = −c/n² < 0.
  interceptMeaning:
    es: v(n=1) = c.
    en: v(n=1) = c.
  curvatureMeaning:
    es: "v ∝ 1/n: hipérbola."
    en: "v ∝ 1/n: hyperbola."
  signMeaning:
    es: "v > 0, n ≥ 1."
    en: "v > 0, n ≥ 1."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: n ≥ 1.
    en: n ≥ 1.
  modelConnection:
    es: Refracción y velocidad.
    en: Refraction and speed.
  formulaConnection:
    es: v = c/n, n₁sinθ₁ = n₂sinθ₂.
    en: v = c/n, n₁sinθ₁ = n₂sinθ₂.
  readingFocus:
    es: leer v y λ al cambiar n.
    en: read v and λ when n changes.
  agentHints:
    es:
      - v = c/n.
      - f = cte.
      - λ = v/f cambia.
    en:
      - v = c/n.
      - f = const.
      - λ = v/f changes.
  commonMistakes:
    es:
      - f cambia.
      - v = c siempre.
      - λ = cte.
    en:
      - f changes.
      - v = c always.
      - λ = const.

svg:
  title:
    es: Escena SVG · Cambio de Velocidad (Refracción)
    en: SVG Scene · Speed Change (Refraction)
  sceneId: cambio_velocidad
  sceneLabel:
    es: Onda en interfase n₁/n₂ con Snell
    en: Wave at n₁/n₂ interface with Snell
  objects:
    es:
      - medio 1 (v₁, n₁)
      - medio 2 (v₂, n₂)
      - θ₁
      - θ₂
      - normal
    en:
      - medium 1 (v₁, n₁)
      - medium 2 (v₂, n₂)
      - θ₁
      - θ₂
      - normal
  mainObject:
    es: refracción en interfase
    en: refraction at interface
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: n₁sinθ₁ = n₂sinθ₂.
    en: n₁sinθ₁ = n₂sinθ₂.
  interactions:
    es: v cambia, f = cte, λ cambia.
    en: v changes, f = const, λ changes.
  modelElements:
    es:
      - v = c/n
      - λ = v/f
    en:
      - v = c/n
      - λ = v/f
  visualCues:
    es:
      - Frente cambia dirección.
      - λ varía entre medios.
    en:
      - Front changes direction.
      - λ varies between media.
  scaleMeaning:
    es: Separación frentes ∝ λ.
    en: Front spacing ∝ λ.
  relation:
    es: n₁sinθ₁ = n₂sinθ₂.
    en: n₁sinθ₁ = n₂sinθ₂.
  physicalReading:
    es: f = cte; λ y v cambian al cruzar la interfase.
    en: f = const; λ and v change crossing interface.
  modelConnection:
    es: Refracción.
    en: Refraction.
  formulaConnection:
    es: v = c/n, n₁sinθ₁ = n₂sinθ₂.
    en: v = c/n, n₁sinθ₁ = n₂sinθ₂.
  readingFocus:
    es: identificar cambio de v y λ.
    en: identify change of v and λ.
  agentHints:
    es:
      - f = cte.
      - λ cambia.
      - v = c/n.
    en:
      - f = const.
      - λ changes.
      - v = c/n.
  commonMistakes:
    es:
      - f cambia.
      - λ = cte.
      - v = c.
    en:
      - f changes.
      - λ = const.
      - v = c.
