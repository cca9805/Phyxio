version: "1.0"
leaf: "ley-de-snell"

coord:
  title:
    es: Gráfica Coord · Ley de Snell
    en: "Coord Graph · Snell's Law"
  xAxis:
    es: ángulo de incidencia θ₁ (°)
    en: angle of incidence θ₁ (°)
  yAxis:
    es: ángulo de refracción θ₂ (°)
    en: angle of refraction θ₂ (°)
  xMagnitude: theta1
  yMagnitude: theta2
  relation:
    es: "n₁·sinθ₁ = n₂·sinθ₂. Ángulo crítico: sinθ_c = n₂/n₁ (n₁ > n₂)."
    en: "n₁·sinθ₁ = n₂·sinθ₂. Critical angle: sinθ_c = n₂/n₁ (n₁ > n₂)."
  physicalReading:
    es: "Denser → θ₂ < θ₁. Ángulo crítico existe solo para n₁ > n₂."
    en: "Denser → θ₂ < θ₁. Critical angle exists only for n₁ > n₂."
  slopeMeaning:
    es: dθ₂/dθ₁ = (n₁cosθ₁)/(n₂cosθ₂).
    en: dθ₂/dθ₁ = (n₁cosθ₁)/(n₂cosθ₂).
  interceptMeaning:
    es: θ₁ = 0 → θ₂ = 0.
    en: θ₁ = 0 → θ₂ = 0.
  curvatureMeaning:
    es: No lineal (seno).
    en: Non-linear (sine).
  signMeaning:
    es: "θ₁, θ₂ ∈ [0°, 90°]."
    en: "θ₁, θ₂ ∈ [0°, 90°]."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "θ₁ ∈ [0°, 90°]."
    en: "θ₁ ∈ [0°, 90°]."
  modelConnection:
    es: Ley de Snell.
    en: "Snell's law."
  formulaConnection:
    es: n₁sinθ₁ = n₂sinθ₂, sinθ_c = n₂/n₁.
    en: n₁sinθ₁ = n₂sinθ₂, sinθ_c = n₂/n₁.
  readingFocus:
    es: leer θ₂ dado θ₁ e identificar θ_c.
    en: read θ₂ given θ₁ and identify θ_c.
  agentHints:
    es:
      - n₁sinθ₁ = n₂sinθ₂.
      - Denser → θ₂ < θ₁.
      - sinθ_c = n₂/n₁.
    en:
      - n₁sinθ₁ = n₂sinθ₂.
      - Denser → θ₂ < θ₁.
      - sinθ_c = n₂/n₁.
  commonMistakes:
    es:
      - n₁θ₁ = n₂θ₂.
      - θ_c para n₁ < n₂.
      - θ desde superficie.
    en:
      - n₁θ₁ = n₂θ₂.
      - θ_c for n₁ < n₂.
      - θ from surface.
