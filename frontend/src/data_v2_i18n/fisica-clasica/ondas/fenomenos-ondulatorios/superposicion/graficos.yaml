version: "1.0"
leaf: "superposicion"

coord:
  title:
    es: Gráfica Coord · Superposición
    en: Coord Graph · Superposition
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación resultante y_total (m)
    en: resultant displacement y_total (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "Principio de superposición: y_total = y₁ + y₂. Válido para ondas lineales."
    en: "Superposition principle: y_total = y₁ + y₂. Valid for linear waves."
  physicalReading:
    es: La suma algebraica de desplazamientos en cada punto.
    en: Algebraic sum of displacements at each point.
  slopeMeaning:
    es: "∂y_total/∂x: pendiente resultante."
    en: "∂y_total/∂x: resultant slope."
  interceptMeaning:
    es: y_total(0) = y₁(0) + y₂(0).
    en: y_total(0) = y₁(0) + y₂(0).
  curvatureMeaning:
    es: ∂²y_total/∂x² = ∂²y₁/∂x² + ∂²y₂/∂x².
    en: ∂²y_total/∂x² = ∂²y₁/∂x² + ∂²y₂/∂x².
  signMeaning:
    es: y_total puede ser cualquier valor.
    en: y_total can be any value.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Ondas lineales.
    en: Linear waves.
  modelConnection:
    es: Principio de superposición.
    en: Superposition principle.
  formulaConnection:
    es: y_total = y₁ + y₂.
    en: y_total = y₁ + y₂.
  readingFocus:
    es: leer y_total como suma de y₁ y y₂.
    en: read y_total as sum of y₁ and y₂.
  agentHints:
    es:
      - y_total = y₁ + y₂.
      - "Constructiva: Δφ = 2nπ."
      - "Destructiva: Δφ = (2n+1)π."
    en:
      - y_total = y₁ + y₂.
      - "Constructive: Δφ = 2nπ."
      - "Destructive: Δφ = (2n+1)π."
  commonMistakes:
    es:
      - y_total = y₁·y₂.
      - Amplitudes no se suman.
      - Válido solo para ondas no lineales.
    en:
      - y_total = y₁·y₂.
      - "Amplitudes don't add."
      - Valid only for nonlinear waves.
