version: v5
leaf_id: superposicion
magnitudes:
  - id: y_resultante
    symbol: "y"
    nombre: { es: Perturbacion resultante, en: Resultant disturbance }
    descripcion: { es: Perturbacion total obtenida al sumar las perturbaciones instantaneas de las ondas., en: Total disturbance obtained by adding the instantaneous disturbances of the waves. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, interpretacion, grafico_coord]
    common_mistake: { es: Interpretarla como suma de intensidades en vez de suma de desplazamientos con signo., en: Interpreting it as a sum of intensities rather than signed displacements. }
    typical_range: "-2A a 2A para dos ondas comparables"
    sign_behavior: { has_sign: true, meaning: { es: El signo indica el sentido de la perturbacion respecto al equilibrio., en: The sign indicates the disturbance direction relative to equilibrium. } }
    zero_behavior: { allowed: true, meaning: { es: Valor cero puede indicar equilibrio instantaneo o cancelacion exacta., en: Zero may indicate instantaneous equilibrium or exact cancellation. } }
    value_nature: { kind: scalar_signed, nonnegative_only: false, expected_interval: "any" }
    interpretation_role: { primary_for: [suma_punto_a_punto], secondary_for: [cancelacion, refuerzo] }
    graph_binding: { channels: [resultant_curve] }
    pedagogical_notes: { es: "Es la magnitud que debe calcularse antes de hablar de intensidad o patron visible.", en: "It must be computed before discussing intensity or visible pattern." }
  - id: y_1
    symbol: "y_1"
    nombre: { es: Perturbacion de la onda 1, en: Disturbance of wave 1 }
    descripcion: { es: Aporte instantaneo de la primera onda en el punto observado., en: Instantaneous contribution of the first wave at the observed point. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas]
    common_mistake: { es: Usar solo su modulo y perder informacion de signo., en: Using only its magnitude and losing sign information. }
    typical_range: "-A_1 a A_1"
    sign_behavior: { has_sign: true, meaning: { es: El signo marca si la perturbacion va hacia un lado u otro del equilibrio., en: The sign marks whether the disturbance is on one side or the other of equilibrium. } }
    zero_behavior: { allowed: true, meaning: { es: La onda 1 pasa por equilibrio en ese instante., en: Wave 1 passes through equilibrium at that instant. } }
    value_nature: { kind: scalar_signed, nonnegative_only: false, expected_interval: "any" }
    interpretation_role: { primary_for: [aporte_individual], secondary_for: [fase_relativa] }
    graph_binding: { channels: [wave_1_curve] }
    pedagogical_notes: { es: "Debe sumarse algebraicamente, no como distancia siempre positiva.", en: "It must be added algebraically, not as an always-positive distance." }
  - id: y_2
    symbol: "y_2"
    nombre: { es: Perturbacion de la onda 2, en: Disturbance of wave 2 }
    descripcion: { es: Aporte instantaneo de la segunda onda en el punto observado., en: Instantaneous contribution of the second wave at the observed point. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas]
    common_mistake: { es: Creer que siempre refuerza a la primera onda., en: Believing it always reinforces the first wave. }
    typical_range: "-A_2 a A_2"
    sign_behavior: { has_sign: true, meaning: { es: El signo indica el sentido instantaneo de la perturbacion de la segunda onda., en: The sign indicates the instantaneous direction of the second wave disturbance. } }
    zero_behavior: { allowed: true, meaning: { es: La onda 2 pasa por equilibrio en ese instante., en: Wave 2 passes through equilibrium at that instant. } }
    value_nature: { kind: scalar_signed, nonnegative_only: false, expected_interval: "any" }
    interpretation_role: { primary_for: [aporte_individual], secondary_for: [cancelacion] }
    graph_binding: { channels: [wave_2_curve] }
    pedagogical_notes: { es: "Su signo relativo a y_1 decide si hay refuerzo o cancelacion local.", en: "Its sign relative to y_1 decides local reinforcement or cancellation." }
  - id: A_resultante
    symbol: "A"
    nombre: { es: Amplitud resultante, en: Resultant amplitude }
    descripcion: { es: Amplitud maxima de la onda combinada en el caso de ondas en fase., en: Maximum amplitude of the combined wave for in-phase waves. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, interpretacion]
    common_mistake: { es: Aplicar la suma directa de amplitudes cuando las ondas no estan en fase., en: Applying direct amplitude addition when waves are not in phase. }
    typical_range: "0 a A_1 + A_2"
    sign_behavior: { has_sign: false, meaning: { es: La amplitud es un valor maximo no negativo., en: Amplitude is a non-negative maximum value. } }
    zero_behavior: { allowed: true, meaning: { es: Amplitud nula indica cancelacion ideal de ondas iguales y opuestas., en: Zero amplitude indicates ideal cancellation of equal opposite waves. } }
    value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "[0, inf)" }
    interpretation_role: { primary_for: [refuerzo_en_fase], secondary_for: [intensidad_relativa] }
    graph_binding: { channels: [amplitude_bar] }
    pedagogical_notes: { es: "Solo se suma directamente en fase; fuera de ese caso hace falta informacion de fase.", en: "It adds directly only in phase; otherwise phase information is needed." }
  - id: A_1
    symbol: "A_1"
    nombre: { es: Amplitud de la onda 1, en: Amplitude of wave 1 }
    descripcion: { es: Maximo desplazamiento de la primera onda respecto al equilibrio., en: Maximum displacement of the first wave relative to equilibrium. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in: [formulas, ejemplos, interpretacion]
    common_mistake: { es: Confundir amplitud con perturbacion instantanea., en: Confusing amplitude with instantaneous disturbance. }
    typical_range: "milimetros a metros segun el sistema"
    sign_behavior: { has_sign: false, meaning: { es: Es maxima positiva de oscilacion., en: It is the positive maximum of oscillation. } }
    zero_behavior: { allowed: true, meaning: { es: La onda 1 no aporta oscilacion., en: Wave 1 contributes no oscillation. } }
    value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "[0, inf)" }
    interpretation_role: { primary_for: [aporte_amplitud], secondary_for: [] }
    graph_binding: { channels: [amplitude_1] }
    pedagogical_notes: { es: "Fija el tamano maximo del aporte de la primera onda.", en: "It sets the maximum size of the first wave contribution." }
  - id: A_2
    symbol: "A_2"
    nombre: { es: Amplitud de la onda 2, en: Amplitude of wave 2 }
    descripcion: { es: Maximo desplazamiento de la segunda onda respecto al equilibrio., en: Maximum displacement of the second wave relative to equilibrium. }
    unidad_si: "m"
    dimension: "[L]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in: [formulas, ejemplos, interpretacion]
    common_mistake: { es: Sumarla siempre como refuerzo aunque la fase sea opuesta., en: Always adding it as reinforcement even when phase is opposite. }
    typical_range: "milimetros a metros segun el sistema"
    sign_behavior: { has_sign: false, meaning: { es: Es maxima positiva de oscilacion., en: It is the positive maximum of oscillation. } }
    zero_behavior: { allowed: true, meaning: { es: La onda 2 no aporta oscilacion., en: Wave 2 contributes no oscillation. } }
    value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "[0, inf)" }
    interpretation_role: { primary_for: [aporte_amplitud], secondary_for: [] }
    graph_binding: { channels: [amplitude_2] }
    pedagogical_notes: { es: "Permite comparar si una onda domina la suma resultante.", en: "It allows checking whether one wave dominates the resultant sum." }
  - id: I_relativa
    symbol: "I_rel"
    nombre: { es: Intensidad relativa, en: Relative intensity }
    descripcion: { es: Medida proporcional al cuadrado de la amplitud resultante., en: Measure proportional to the square of the resultant amplitude. }
    unidad_si: "adimensional"
    dimension: "[1]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, interpretacion]
    common_mistake: { es: Pensar que si las perturbaciones se cancelan la energia desaparece globalmente., en: Thinking that if disturbances cancel the energy disappears globally. }
    typical_range: "0 a varios multiplos de una intensidad individual"
    sign_behavior: { has_sign: false, meaning: { es: La intensidad relativa no tiene signo fisico., en: Relative intensity has no physical sign. } }
    zero_behavior: { allowed: true, meaning: { es: Valor cero indica cancelacion local ideal de la perturbacion., en: Zero indicates ideal local cancellation of disturbance. } }
    value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "[0, inf)" }
    interpretation_role: { primary_for: [lectura_energetica], secondary_for: [patron_visible] }
    graph_binding: { channels: [relative_intensity] }
    pedagogical_notes: { es: "Ayuda a pasar de amplitud a lectura energetica sin sumar intensidades prematuramente.", en: "It helps move from amplitude to energy reading without adding intensities prematurely." }
