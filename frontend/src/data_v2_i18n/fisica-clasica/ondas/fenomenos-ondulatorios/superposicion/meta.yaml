pregunta_fisica_central:
  es: Como se obtiene la perturbacion resultante cuando dos ondas coinciden en el mismo punto de un medio lineal?
  en: How is the resultant disturbance obtained when two waves meet at the same point in a linear medium?
nucleo_didactico:
  idea_fisica_dominante:
    es: En un medio lineal, las perturbaciones se suman punto a punto antes de interpretar amplitud, intensidad o patron.
    en: In a linear medium, disturbances add point by point before interpreting amplitude, intensity, or pattern.
  magnitudes_nucleo:
    - y_resultante
    - y_1
    - y_2
    - A_resultante
    - A_1
    - A_2
    - I_relativa
  formulas_nucleo:
    - superposicion_lineal
    - amplitud_en_fase
    - intensidad_relativa
  error_conceptual_dominante:
    es: Sumar intensidades o valores absolutos sin sumar primero las perturbaciones con signo.
    en: Adding intensities or absolute values without first adding signed disturbances.
  criterio_de_aplicabilidad:
    es: Aplica cuando el medio responde linealmente y las ondas no modifican las propiedades del medio.
    en: Applies when the medium responds linearly and waves do not modify medium properties.
  criterio_de_fallo_del_modelo:
    es: Falla en ondas de gran amplitud, medios no lineales, choque, ruptura o saturacion.
    en: Fails for large-amplitude waves, nonlinear media, shock, breakdown, or saturation.
