version: v5
leaf_id: concepto-de-onda
formulas:
  - id: velocidad_onda
    title:
      es: Velocidad de una onda periodica
      en: Speed of a periodic wave
    equation: "v = lambda * f"
    latex: "v = \\lambda f % v lambda f"
    rearrangements:
      - target: v
        equation: "v = lambda * f"
        latex: "v = \\lambda f % v lambda f"
      - target: lambda
        equation: "lambda = v / f"
        latex: "\\lambda = v / f % v lambda f"
      - target: f
        equation: "f = v / lambda"
        latex: "f = v / \\lambda % v lambda f"
    category: fundamental
    relation_type: propagation_relation
    physical_meaning:
      es: La rapidez de avance del patron ondulatorio es una longitud de onda por cada ciclo temporal.
      en: The advance speed of the wave pattern is one wavelength per temporal cycle.
    constraints:
      - "onda periodica"
      - "medio aproximadamente uniforme"
      - "frecuencia positiva"
    validity:
      es: Valida para una onda periodica en un medio donde la fase se propaga con rapidez bien definida.
      en: Valid for a periodic wave in a medium where phase propagates with a well-defined speed.
    dimension_check: "[L T^-1] = [L] [T^-1]"
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion, grafico_coord]
    interpretation_tags: [propagacion, periodicidad]
    result_semantics:
      target: v
      kind: positive_speed
      sign_meaning:
        es: Se interpreta como rapidez positiva de propagacion.
        en: It is interpreted as positive propagation speed.
      absolute_value_meaning:
        es: El valor indica cuanto avanza una fase por segundo.
        en: The value indicates how far a phase advances per second.
    domain_checks:
      - id: frecuencia_positiva
        condition: "f > 0"
        message:
          es: La frecuencia debe ser positiva.
          en: Frequency must be positive.
      - id: longitud_positiva
        condition: "lambda > 0"
        message:
          es: La longitud de onda debe ser positiva.
          en: Wavelength must be positive.
    coherence_checks:
      - id: unidades_velocidad
        condition: "dimension(v) == [L T^-1]"
        message:
          es: El resultado debe tener unidades de velocidad.
          en: The result must have speed units.
    graph_implications:
      es: A mayor frecuencia o longitud de onda, mayor rapidez si la otra magnitud se mantiene fija.
      en: Higher frequency or wavelength gives higher speed if the other quantity is fixed.
    pedagogical_triggers:
      - id: confundir_v_y_movimiento_medio
        text:
          es: Si el alumno habla de particulas viajando con v, pedir distinguir patron y medio.
          en: If the student says particles travel with v, ask them to distinguish pattern and medium.
  - id: periodo_frecuencia
    title:
      es: Relacion entre periodo y frecuencia
      en: Relation between period and frequency
    equation: "T = 1 / f"
    latex: "T = 1 / f % T f"
    rearrangements:
      - target: T
        equation: "T = 1 / f"
        latex: "T = 1 / f % T f"
      - target: f
        equation: "f = 1 / T"
        latex: "f = 1 / T % T f"
    category: fundamental
    relation_type: inverse_relation
    physical_meaning:
      es: Un periodo es la duracion de un ciclo y la frecuencia cuenta cuantos ciclos ocurren por segundo.
      en: A period is the duration of one cycle and frequency counts how many cycles occur per second.
    constraints:
      - "movimiento periodico"
      - "f y T positivos"
    validity:
      es: Valida cuando el fenomeno repite ciclos reconocibles.
      en: Valid when the phenomenon repeats recognizable cycles.
    dimension_check: "[T] = [T]"
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion]
    interpretation_tags: [periodicidad_temporal]
    result_semantics:
      target: T
      kind: positive_time_interval
      sign_meaning:
        es: El periodo es una duracion positiva.
        en: Period is a positive duration.
      absolute_value_meaning:
        es: Indica cuanto tarda un ciclo.
        en: It indicates how long one cycle takes.
    domain_checks:
      - id: frecuencia_no_nula
        condition: "f > 0"
        message:
          es: No se puede dividir por frecuencia nula.
          en: Division by zero frequency is not allowed.
    coherence_checks:
      - id: periodo_frecuencia_inversas
        condition: "T * f == 1"
        message:
          es: Periodo y frecuencia deben ser inversos.
          en: Period and frequency must be reciprocals.
    graph_implications:
      es: Al aumentar f, el intervalo temporal entre repeticiones disminuye.
      en: As f increases, the time interval between repetitions decreases.
    pedagogical_triggers:
      - id: confundir_periodo_duracion_total
        text:
          es: Si el alumno toma T como duracion total del experimento, pedir identificar un ciclo.
          en: If the student takes T as total experiment duration, ask them to identify one cycle.
  - id: onda_armonica_basica
    title:
      es: Perfil armonico elemental
      en: Elementary harmonic profile
    equation: "y = A * sin(2*pi*(x/lambda - f*t))"
    latex: "y = A\\sin(2\\pi(x/\\lambda - ft)) % y A x lambda f t"
    rearrangements:
      - target: y
        equation: "y = A * sin(2*pi*(x/lambda - f*t))"
        latex: "y = A\\sin(2\\pi(x/\\lambda - ft)) % y A x lambda f t"
    category: structural
    relation_type: wave_model
    physical_meaning:
      es: Un perfil sinusoidal representa una perturbacion que cambia con la posicion y con el tiempo.
      en: A sinusoidal profile represents a disturbance that changes with position and time.
    constraints:
      - "onda armonica"
      - "amplitud constante"
      - "medio uniforme"
    validity:
      es: Modelo ideal para introducir fase, amplitud y periodicidad; no representa pulsos arbitrarios ni ondas no lineales.
      en: Ideal model for introducing phase, amplitude, and periodicity; it does not represent arbitrary pulses or nonlinear waves.
    dimension_check: "[L] = [L]"
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion, grafico_coord]
    interpretation_tags: [perfil_ondulatorio, fase]
    result_semantics:
      target: y
      kind: signed_disturbance
      sign_meaning:
        es: El signo indica el lado del equilibrio.
        en: The sign indicates the side of equilibrium.
      absolute_value_meaning:
        es: El valor absoluto indica separacion instantanea respecto al equilibrio.
        en: The absolute value indicates instantaneous separation from equilibrium.
    domain_checks:
      - id: amplitud_no_negativa
        condition: "A >= 0"
        message:
          es: La amplitud debe ser no negativa.
          en: Amplitude must be non-negative.
      - id: lambda_positiva
        condition: "lambda > 0"
        message:
          es: La longitud de onda debe ser positiva.
          en: Wavelength must be positive.
    coherence_checks:
      - id: argumento_adimensional
        condition: "x/lambda and f*t are dimensionless"
        message:
          es: El argumento de la funcion seno debe ser adimensional.
          en: The sine argument must be dimensionless.
    graph_implications:
      es: A controla la altura, lambda el espaciado horizontal y f la rapidez de repeticion temporal.
      en: A controls height, lambda horizontal spacing, and f temporal repetition rate.
    pedagogical_triggers:
      - id: mezclar_amplitud_y_longitud
        text:
          es: Si el alumno mide lambda verticalmente, pedir localizar dos puntos equivalentes en x.
          en: If the student measures lambda vertically, ask them to locate two equivalent points along x.
