version: "1.0"
leaf: "concepto-de-onda"

coord:
  title:
    es: Gráfica Coord · Concepto de Onda
    en: Coord Graph · Wave Concept
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: elongación y(x,t) (m)
    en: displacement y(x,t) (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: Una onda es una perturbación que transporta energía sin transportar materia. y(x,t) = A·sin(kx − ωt + φ₀), con k = 2π/λ y ω = 2π/T.
    en: A wave is a disturbance that transports energy without transporting matter. y(x,t) = A·sin(kx − ωt + φ₀), with k = 2π/λ and ω = 2π/T.
  physicalReading:
    es: Amplitud A = máximo desplazamiento. λ = distancia entre crestas. T = tiempo por ciclo completo. v = λ/T = λf.
    en: Amplitude A = maximum displacement. λ = distance between crests. T = time per full cycle. v = λ/T = λf.
  slopeMeaning:
    es: "∂y/∂x: pendiente de la onda en x. ∂y/∂t: velocidad transversal de la partícula."
    en: "∂y/∂x: slope of wave at x. ∂y/∂t: transverse particle velocity."
  interceptMeaning:
    es: "y(0,0) = A·sin(φ₀): fase inicial."
    en: "y(0,0) = A·sin(φ₀): initial phase."
  curvatureMeaning:
    es: "∂²y/∂x² = −k²·y: curvatura espacial de la onda."
    en: "∂²y/∂x² = −k²·y: spatial curvature of the wave."
  signMeaning:
    es: "y > 0: cresta. y < 0: valle."
    en: "y > 0: crest. y < 0: trough."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x ∈ ℝ, t ≥ 0.
    en: x ∈ ℝ, t ≥ 0.
  modelConnection:
    es: Onda armónica plana.
    en: Plane harmonic wave.
  formulaConnection:
    es: y = A·sin(kx − ωt + φ₀), v = λf, k = 2π/λ, ω = 2πf.
    en: y = A·sin(kx − ωt + φ₀), v = λf, k = 2π/λ, ω = 2πf.
  readingFocus:
    es: leer amplitud A, longitud de onda λ, periodo T y sentido de propagación.
    en: read amplitude A, wavelength λ, period T and direction of propagation.
  agentHints:
    es:
      - v = λf.
      - k = 2π/λ.
      - ω = 2πf.
    en:
      - v = λf.
      - k = 2π/λ.
      - ω = 2πf.
  commonMistakes:
    es:
      - Confundir v de onda con velocidad de la partícula.
      - λ ≠ A.
      - Confundir k con ω.
    en:
      - Confusing wave speed with particle velocity.
      - λ ≠ A.
      - Confusing k with ω.

svg:
  title:
    es: Escena SVG · Concepto de Onda
    en: SVG Scene · Wave Concept
  sceneId: concepto_onda
  sceneLabel:
    es: Onda con A, λ, cresta y dirección de propagación
    en: Wave with A, λ, crest and propagation direction
  objects:
    es:
      - frente de onda
      - amplitud A
      - longitud de onda λ
      - cresta
      - valle
      - dirección v
    en:
      - wave front
      - amplitude A
      - wavelength λ
      - crest
      - trough
      - direction v
  mainObject:
    es: onda armónica progresiva
    en: progressive harmonic wave
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Onda sinusoidal con crestas y valles separados λ. Propagación a velocidad v.
    en: Sinusoidal wave with crests and troughs separated by λ. Propagation at speed v.
  interactions:
    es: Partículas oscilan transversalmente. La onda avanza sin desplazar materia.
    en: Particles oscillate transversally. Wave advances without displacing matter.
  modelElements:
    es:
      - "A: amplitud"
      - "λ: longitud de onda"
      - v = λf
    en:
      - "A: amplitude"
      - "λ: wavelength"
      - v = λf
  visualCues:
    es:
      - Cresta = máximo.
      - Valle = mínimo.
      - Flecha v = sentido de propagación.
    en:
      - Crest = maximum.
      - Trough = minimum.
      - Arrow v = propagation direction.
  scaleMeaning:
    es: Distancia entre crestas = λ.
    en: Distance between crests = λ.
  relation:
    es: y(x,t) = A·sin(kx − ωt + φ₀).
    en: y(x,t) = A·sin(kx − ωt + φ₀).
  physicalReading:
    es: Identificar A, λ y sentido de v antes de leer la gráfica.
    en: Identify A, λ and direction of v before reading the graph.
  modelConnection:
    es: Onda armónica plana.
    en: Plane harmonic wave.
  formulaConnection:
    es: v = λf.
    en: v = λf.
  readingFocus:
    es: identificar A, λ y la dirección de propagación.
    en: identify A, λ and propagation direction.
  agentHints:
    es:
      - v = λf.
      - Cresta ↔ A.
      - λ entre crestas.
    en:
      - v = λf.
      - Crest ↔ A.
      - λ between crests.
  commonMistakes:
    es:
      - v de onda ≠ v de partícula.
      - λ ≠ A.
      - k ≠ ω.
    en:
      - Wave speed ≠ particle speed.
      - λ ≠ A.
      - k ≠ ω.
