version: v5
id: concepto-de-onda-interpretacion
leaf_id: concepto-de-onda
nombre:
  es: Interpretación del concepto de onda
  en: Interpretation of the wave concept
scope:
  area: fisica-clasica
  bloque: ondas
  subbloque: fundamentos
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/ondas/fundamentos/concepto-de-onda
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación
    en: Interpretation
  priority_order: [summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step]
  inline_limits:
    max_sections: 2
    max_messages: 4
dependencies:
  formulas: [velocidad_onda, periodo_frecuencia, onda_armonica_basica]
  magnitudes: [y, A, lambda, f, T, v, x, t]
global_context:
  physical_domain:
    es: Ondas introductorias como perturbaciones propagantes.
    en: Introductory waves as propagating disturbances.
  axis_convention:
    es: x localiza el punto observado, t fija el instante y y mide la perturbación local.
    en: x locates the observed point, t fixes the instant, and y measures the local disturbance.
  standard_assumptions:
    - es: Perturbaciones pequeñas y medio aproximadamente uniforme.
      en: Small disturbances and approximately uniform medium.
    - es: Separación entre movimiento local y avance del patrón.
      en: Separation between local motion and pattern advance.
  standard_warnings:
    - es: No confundir velocidad del patrón con velocidad de una partícula del medio.
      en: Do not confuse pattern speed with the velocity of a medium particle.
result_blocks:
  summary:
    enabled: true
    order: 1
    title: { es: Resumen, en: Summary }
  physical_reading:
    enabled: true
    order: 2
    title: { es: Lectura física, en: Physical reading }
  coherence:
    enabled: true
    order: 3
    title: { es: Coherencia, en: Coherence }
  model_validity:
    enabled: true
    order: 4
    title: { es: Validez del modelo, en: Model validity }
  graph_reading:
    enabled: true
    order: 5
    title: { es: Lectura gráfica, en: Graph reading }
  likely_errors:
    enabled: true
    order: 6
    title: { es: Errores probables, en: Likely errors }
  next_step:
    enabled: true
    order: 7
    title: { es: Siguiente paso, en: Next step }
output_contract:
  sections: [summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step]
  inline_mode:
    max_sections: 2
    priority: [summary, likely_errors]
  extended_mode:
    show_all: true
common_rules:
  summary: &summary_rules
    - id: common_summary
      when: "true"
      status: ok
      text:
        es: "El resultado indica qué parte de la onda se está leyendo y describe si domina el estado local, la repetición o la propagación."
        en: "The result indicates which part of the wave is being read and describes whether local state, repetition, or propagation dominates."
  physical: &physical_reading_rules
    - id: common_physical
      when: "true"
      status: ok
      text:
        es: "La lectura física depende de separar la oscilación local del medio y el avance del patrón ondulatorio."
        en: "The physical reading depends on separating local oscillation of the medium from advance of the wave pattern."
  coherence: &coherence_rules
    - id: common_coherence
      when: "true"
      status: ok
      text:
        es: "El valor es coherente si respeta signo, unidad y dominio de la magnitud observada."
        en: "The value is coherent if it respects sign, unit, and domain of the observed quantity."
  validity: &model_validity_rules
    - id: common_validity
      when: "true"
      status: ok
      text:
        es: "El modelo vale para perturbaciones pequeñas y falla si el medio se deforma, atenúa o responde de forma no lineal."
        en: "The model is valid for small disturbances and fails if the medium deforms, attenuates, or responds nonlinearly."
  graph: &graph_rules
    - id: common_graph
      when: "true"
      status: ok
      text:
        es: "En el gráfico, la curva muestra y frente a x y permite distinguir altura local, separación espacial y avance del patrón."
        en: "In the graph, the curve shows y versus x and distinguishes local height, spatial separation, and pattern advance."
  errors: &likely_errors
    - id: common_error
      when: "true"
      status: warning
      text:
        es: "Error probable: confundir la onda con materia que viaja completa en lugar de una perturbación propagante."
        en: "Likely mistake: confuse the wave with matter traveling as a whole instead of a propagating disturbance."
  next: &next_step_rules
    - id: common_next
      when: "true"
      status: ok
      text:
        es: "Siguiente paso: decidir si el dato pertenece al estado local, a la repetición espacial, a la repetición temporal o a la propagación."
        en: "Next step: decide whether the datum belongs to local state, spatial repetition, temporal repetition, or propagation."
targets:
  y:
    magnitude_type: signed_disturbance
    semantic_role: { es: perturbación local, en: local disturbance }
    summary_rules:
      - id: y_summary
        when: "true"
        status: ok
        text: { es: "[[y]] describe el estado local del medio y depende del punto y del instante observados.", en: "[[y]] describes the local state of the medium and depends on the observed point and instant." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  A:
    magnitude_type: nonnegative_length
    semantic_role: { es: amplitud máxima, en: maximum amplitude }
    summary_rules:
      - id: A_summary
        when: "true"
        status: ok
        text: { es: "[[A]] indica el tamaño máximo de la perturbación y resume la escala local de oscilación.", en: "[[A]] indicates maximum disturbance size and summarizes the local oscillation scale." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  lambda:
    magnitude_type: positive_length
    semantic_role: { es: repetición espacial, en: spatial repetition }
    summary_rules:
      - id: lambda_summary
        when: "true"
        status: ok
        text: { es: "[[lambda]] indica separación entre fases equivalentes y describe la escala espacial del patrón.", en: "[[lambda]] indicates separation between equivalent phases and describes the spatial scale of the pattern." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  f:
    magnitude_type: positive_rate
    semantic_role: { es: repetición temporal, en: temporal repetition }
    summary_rules:
      - id: f_summary
        when: "true"
        status: ok
        text: { es: "[[f]] indica cuántos ciclos ocurren cada segundo y depende de la fuente o del ritmo impuesto.", en: "[[f]] indicates how many cycles occur each second and depends on the source or imposed rhythm." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  T:
    magnitude_type: positive_time
    semantic_role: { es: duración de ciclo, en: cycle duration }
    summary_rules:
      - id: T_summary
        when: "true"
        status: ok
        text: { es: "[[T]] indica la duración de un ciclo y disminuye cuando aumenta la frecuencia.", en: "[[T]] indicates cycle duration and decreases when frequency increases." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  v:
    magnitude_type: positive_speed
    semantic_role: { es: rapidez de propagación, en: propagation speed }
    summary_rules:
      - id: v_summary
        when: "true"
        status: ok
        text: { es: "[[v]] indica la rapidez de avance del patrón y depende de la repetición espacial y temporal.", en: "[[v]] indicates the advance speed of the pattern and depends on spatial and temporal repetition." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  x:
    magnitude_type: coordinate
    semantic_role: { es: posición de observación, en: observation position }
    summary_rules:
      - id: x_summary
        when: "true"
        status: ok
        text: { es: "[[x]] describe dónde se observa la onda y permite leer la estructura espacial.", en: "[[x]] describes where the wave is observed and allows the spatial structure to be read." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
  t:
    magnitude_type: coordinate
    semantic_role: { es: instante de observación, en: observation instant }
    summary_rules:
      - id: t_summary
        when: "true"
        status: ok
        text: { es: "[[t]] describe cuándo se observa la onda y permite leer la evolución temporal.", en: "[[t]] describes when the wave is observed and allows the temporal evolution to be read." }
    physical_reading_rules: *physical_reading_rules
    coherence_rules: *coherence_rules
    model_validity_rules: *model_validity_rules
    graph_rules: *graph_rules
    likely_errors: *likely_errors
    next_step_rules: *next_step_rules
cross_checks:
  - id: pattern_vs_medium
    text: { es: Separar avance del patrón y oscilación local., en: Separate pattern advance from local oscillation. }
error_patterns:
  - id: matter_transport
    text: { es: Confundir onda con transporte neto de materia., en: Confusing a wave with net transport of matter. }
graph_binding:
  preferred: Coord
  targets: [y, A, lambda, v]
mini_graph:
  enabled: true
  preferred_type: Coord
