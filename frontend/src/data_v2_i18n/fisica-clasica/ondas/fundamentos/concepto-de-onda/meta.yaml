pregunta_fisica_central:
  es: Que caracteriza a una onda como perturbacion que se propaga y como se distinguen sus magnitudes basicas?
  en: What characterizes a wave as a propagating disturbance and how are its basic quantities distinguished?
nucleo_didactico:
  idea_fisica_dominante:
    es: Una onda es una perturbacion organizada que se desplaza; el medio puede oscilar localmente sin viajar con la energia transportada.
    en: A wave is an organized disturbance that travels; the medium can oscillate locally without traveling with the transported energy.
  magnitudes_nucleo: [y, A, lambda, f, T, v, x, t]
  formulas_nucleo: [velocidad_onda, periodo_frecuencia, onda_armonica_basica]
  error_conceptual_dominante:
    es: Confundir desplazamiento local del medio con desplazamiento neto de materia.
    en: Confusing local displacement of the medium with net transport of matter.
  criterio_de_aplicabilidad:
    es: Aplica a fenomenos donde una perturbacion identificable se propaga por un medio o por un campo.
    en: Applies to phenomena where an identifiable disturbance propagates through a medium or a field.
  criterio_de_fallo_del_modelo:
    es: Falla si se interpreta la onda como un objeto material que viaja completo de un punto a otro.
    en: Fails if the wave is interpreted as a material object traveling whole from one point to another.
