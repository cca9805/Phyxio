version: "1.0"
leaf: "ecuacion-de-onda"

coord:
  title:
    es: Gráfica Coord · Ecuación de Onda
    en: Coord Graph · Wave Equation
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: elongación y(x,t) (m)
    en: displacement y(x,t) (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "∂²y/∂t² = v²·∂²y/∂x². Solución general: y = f(x − vt) + g(x + vt). Solución armónica: y = A·sin(kx − ωt + φ₀)."
    en: "∂²y/∂t² = v²·∂²y/∂x². General solution: y = f(x − vt) + g(x + vt). Harmonic solution: y = A·sin(kx − ωt + φ₀)."
  physicalReading:
    es: La ecuación de onda relaciona la curvatura espacial con la aceleración temporal. Cualquier función de (x ± vt) es solución.
    en: The wave equation relates spatial curvature to temporal acceleration. Any function of (x ± vt) is a solution.
  slopeMeaning:
    es: "∂y/∂x: pendiente espacial."
    en: "∂y/∂x: spatial slope."
  interceptMeaning:
    es: "y(0,0): condición inicial."
    en: "y(0,0): initial condition."
  curvatureMeaning:
    es: ∂²y/∂x² = (1/v²)·∂²y/∂t².
    en: ∂²y/∂x² = (1/v²)·∂²y/∂t².
  signMeaning:
    es: Depende de la solución particular.
    en: Depends on the particular solution.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x ∈ ℝ, t ≥ 0.
    en: x ∈ ℝ, t ≥ 0.
  modelConnection:
    es: Ecuación de onda.
    en: Wave equation.
  formulaConnection:
    es: ∂²y/∂t² = v²·∂²y/∂x², y = A·sin(kx − ωt).
    en: ∂²y/∂t² = v²·∂²y/∂x², y = A·sin(kx − ωt).
  readingFocus:
    es: verificar que y satisface ∂²y/∂t² = v²·∂²y/∂x².
    en: verify y satisfies ∂²y/∂t² = v²·∂²y/∂x².
  agentHints:
    es:
      - "Solución: f(x ± vt)."
      - v² = T/μ o B/ρ.
      - "Armónica: y = A·sin(kx − ωt)."
    en:
      - "Solution: f(x ± vt)."
      - v² = T/μ or B/ρ.
      - "Harmonic: y = A·sin(kx − ωt)."
  commonMistakes:
    es:
      - Confundir la ecuación de onda con y = f(x).
      - v² aparece, no v.
      - y debe depender de (x ± vt).
    en:
      - Confusing wave equation with y = f(x).
      - v² appears, not v.
      - y must depend on (x ± vt).
