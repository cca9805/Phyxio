pregunta_fisica_central:
  es: ¿Como relaciona la ecuacion de onda la curvatura espacial de una perturbacion con su cambio temporal?
  en: How does the wave equation relate the spatial curvature of a disturbance to its temporal change?
nucleo_didactico:
  idea_fisica_dominante:
    es: La ecuacion de onda expresa que una perturbacion se propaga cuando su aceleracion temporal esta ligada a su curvatura espacial.
    en: The wave equation states that a disturbance propagates when its temporal acceleration is tied to its spatial curvature.
  magnitudes_nucleo: [y, x, t, v, A, k, omega]
  formulas_nucleo: [ecuacion_onda_1d, solucion_armonica, velocidad_fase]
  error_conceptual_dominante:
    es: Tratar la ecuacion como una formula de sustitucion y no como una condicion dinamica sobre la forma de la onda.
    en: Treating the equation as a substitution formula rather than a dynamic condition on the wave shape.
  criterio_de_aplicabilidad:
    es: Aplica a perturbaciones pequeñas en medios lineales y uniformes con velocidad de propagacion definida.
    en: Applies to small disturbances in linear uniform media with a defined propagation speed.
  criterio_de_fallo_del_modelo:
    es: Falla con no linealidad fuerte, dispersion dominante, atenuacion intensa o cambios bruscos del medio.
    en: Fails with strong nonlinearity, dominant dispersion, intense attenuation, or abrupt medium changes.
