version: "1.0"
leaf: "fase"

coord:
  title:
    es: Gráfica Coord · Fase y Desfase
    en: Coord Graph · Phase and Phase Shift
  xAxis:
    es: tiempo t (s) o posición x (m)
    en: time t (s) or position x (m)
  yAxis:
    es: elongación y₁, y₂ (m)
    en: displacement y₁, y₂ (m)
  xMagnitude: t
  yMagnitude: y
  relation:
    es: "Fase: φ = kx − ωt + φ₀. Desfase entre dos ondas: Δφ = φ₂ − φ₁. Interferencia constructiva: Δφ = 2nπ. Destructiva: Δφ = (2n+1)π."
    en: "Phase: φ = kx − ωt + φ₀. Phase shift between two waves: Δφ = φ₂ − φ₁. Constructive: Δφ = 2nπ. Destructive: Δφ = (2n+1)π."
  physicalReading:
    es: El desfase Δφ determina si la interferencia es constructiva o destructiva.
    en: Phase shift Δφ determines whether interference is constructive or destructive.
  slopeMeaning:
    es: "dφ/dt = −ω: velocidad de fase."
    en: "dφ/dt = −ω: phase velocity."
  interceptMeaning:
    es: "φ₀: fase inicial."
    en: "φ₀: initial phase."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: "Δφ > 0: adelantada. Δφ < 0: retrasada."
    en: "Δφ > 0: leading. Δφ < 0: lagging."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Δφ ∈ [0, 2π)."
    en: "Δφ ∈ [0, 2π)."
  modelConnection:
    es: Fase y desfase en ondas.
    en: Phase and phase shift in waves.
  formulaConnection:
    es: φ = kx − ωt + φ₀, Δφ = kΔx = 2πΔx/λ.
    en: φ = kx − ωt + φ₀, Δφ = kΔx = 2πΔx/λ.
  readingFocus:
    es: leer Δφ entre dos ondas y determinar el tipo de interferencia.
    en: read Δφ between two waves and determine the interference type.
  agentHints:
    es:
      - "Constructiva: Δφ = 2nπ."
      - "Destructiva: Δφ = (2n+1)π."
      - Δφ = kΔx = 2πΔx/λ.
    en:
      - "Constructive: Δφ = 2nπ."
      - "Destructive: Δφ = (2n+1)π."
      - Δφ = kΔx = 2πΔx/λ.
  commonMistakes:
    es:
      - Constructiva cuando Δφ = π (error, es destructiva).
      - Confundir fase con amplitud.
      - Δφ no tiene unidades de longitud.
    en:
      - Constructive when Δφ = π (wrong, it is destructive).
      - Confusing phase with amplitude.
      - Δφ has no length units.
