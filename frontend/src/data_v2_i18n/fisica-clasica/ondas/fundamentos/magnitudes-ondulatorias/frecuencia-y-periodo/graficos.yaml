version: "1.0"
leaf: "frecuencia-y-periodo"

coord:
  title:
    es: Gráfica Coord · Frecuencia y Periodo
    en: Coord Graph · Frequency and Period
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: elongación y(t) (m)
    en: displacement y(t) (m)
  xMagnitude: t
  yMagnitude: y
  relation:
    es: "T = periodo (s): tiempo de un ciclo completo. f = 1/T (Hz): ciclos por segundo. ω = 2πf (rad/s). Relación con longitud de onda: v = λf."
    en: "T = period (s): time for one full cycle. f = 1/T (Hz): cycles per second. ω = 2πf (rad/s). Relation to wavelength: v = λf."
  physicalReading:
    es: T se lee como la distancia temporal entre dos crestas en y(t). f = 1/T.
    en: T is read as the time distance between two crests in y(t). f = 1/T.
  slopeMeaning:
    es: "∂y/∂t: velocidad transversal de la partícula."
    en: "∂y/∂t: transverse particle velocity."
  interceptMeaning:
    es: "y(0): posición inicial."
    en: "y(0): initial position."
  curvatureMeaning:
    es: ∂²y/∂t² = −ω²y.
    en: ∂²y/∂t² = −ω²y.
  signMeaning:
    es: "y > 0 cresta, y < 0 valle."
    en: "y > 0 crest, y < 0 trough."
  areaMeaning:
    es: "∫y dt: media temporal."
    en: "∫y dt: time average."
  domainMeaning:
    es: t ≥ 0, periódico de periodo T.
    en: t ≥ 0, periodic with period T.
  modelConnection:
    es: Magnitudes ondulatorias temporales.
    en: Temporal wave quantities.
  formulaConnection:
    es: T = 1/f, ω = 2πf, v = λf.
    en: T = 1/f, ω = 2πf, v = λf.
  readingFocus:
    es: medir T entre dos crestas consecutivas; calcular f = 1/T.
    en: measure T between two consecutive crests; calculate f = 1/T.
  agentHints:
    es:
      - T entre crestas.
      - f = 1/T.
      - ω = 2πf.
    en:
      - T between crests.
      - f = 1/T.
      - ω = 2πf.
  commonMistakes:
    es:
      - T = A (confusión).
      - f en rad/s (es ω).
      - T depende de λ (no, depende de la fuente).
    en:
      - T = A (confusion).
      - f in rad/s (that is ω).
      - T depends on λ (no, depends on source).
