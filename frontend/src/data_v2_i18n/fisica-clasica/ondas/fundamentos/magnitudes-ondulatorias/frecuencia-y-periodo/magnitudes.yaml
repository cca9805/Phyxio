version: v5
leaf_id: frecuencia-y-periodo
magnitudes:
  - id: f
    symbol: "f"
    nombre: { es: frecuencia, en: frequency }
    unidad: { es: Hz, en: Hz }
    unidad_si: s^-1
    dimension: "[T^-1]"
    tipo: escalar
    is_vector: false
    components: []
    category: temporal_rate
    physical_role: core_physical_quantity
    descripcion: { es: Número de ciclos que ocurren por unidad de tiempo., en: Number of cycles occurring per unit time. }
    rango_tipico: { es: Desde fracciones de Hz en ondas lentas hasta miles de Hz en sonido audible., en: From fractions of Hz in slow waves to thousands of Hz in audible sound. }
    typical_range: { es: 0,1 Hz a 20 000 Hz en fenómenos mecánicos y sonoros comunes., en: 0.1 Hz to 20 000 Hz in common mechanical and sound phenomena. }
    used_in: [teoria, ejemplos, interpretacion, formulas, grafico_coord]
    common_mistake: { es: Confundir frecuencia con rapidez de propagación., en: Confusing frequency with propagation speed. }
    sign_behavior: { es: Se interpreta como magnitud positiva para conteo de ciclos., en: Interpreted as a positive quantity for cycle count. }
    zero_behavior: { es: Frecuencia cero indica ausencia de repetición temporal en el modelo., en: Zero frequency indicates no temporal repetition in the model. }
    value_nature: positive_rate
    interpretation_role: Mide el ritmo temporal de repetición de la onda.
    graph_binding: { type: Coord, x_axis: t, visual_role: oscillation_rate }
    pedagogical_notes: { es: Leer como ciclos por segundo, no como velocidad espacial., en: Read as cycles per second, not as spatial speed. }
  - id: T
    symbol: "T"
    nombre: { es: periodo, en: period }
    unidad: { es: s, en: s }
    unidad_si: s
    dimension: "[T]"
    tipo: escalar
    is_vector: false
    components: []
    category: temporal_interval
    physical_role: core_physical_quantity
    descripcion: { es: Tiempo que tarda en completarse un ciclo., en: Time taken to complete one cycle. }
    rango_tipico: { es: Segundos en ondas lentas y milisegundos en sonido audible., en: Seconds in slow waves and milliseconds in audible sound. }
    typical_range: { es: Desde microsegundos en señales rápidas hasta segundos en oscilaciones lentas., en: From microseconds in fast signals to seconds in slow oscillations. }
    used_in: [teoria, ejemplos, interpretacion, formulas, grafico_coord]
    common_mistake: { es: Creer que mayor periodo significa mayor frecuencia., en: Believing that a larger period means higher frequency. }
    sign_behavior: { es: Debe ser positivo como duración de ciclo., en: Must be positive as a cycle duration. }
    zero_behavior: { es: Periodo cero no es físicamente válido para una onda periódica., en: Zero period is not physically valid for a periodic wave. }
    value_nature: positive_interval
    interpretation_role: Mide la duración temporal de una repetición completa.
    graph_binding: { type: Coord, x_axis: t, visual_role: cycle_spacing }
    pedagogical_notes: { es: Comparar siempre con el tiempo total observado., en: Always compare with total observation time. }
  - id: omega
    symbol: "\\omega"
    nombre: { es: frecuencia angular, en: angular frequency }
    unidad: { es: rad/s, en: rad/s }
    unidad_si: rad/s
    dimension: "[T^-1]"
    tipo: escalar
    is_vector: false
    components: []
    category: angular_temporal_rate
    physical_role: derived
    descripcion: { es: Ritmo angular de avance de fase por unidad de tiempo., en: Angular phase-advance rate per unit time. }
    rango_tipico: { es: Del orden de pocos rad/s en oscilaciones lentas y miles de rad/s en sonido., en: Of order a few rad/s in slow oscillations and thousands of rad/s in sound. }
    typical_range: { es: Aproximadamente seis veces la frecuencia en Hz cuando se expresa en rad/s., en: Approximately six times frequency in Hz when expressed in rad/s. }
    used_in: [teoria, ejemplos, interpretacion, formulas]
    common_mistake: { es: Usarla como si fuera frecuencia en Hz sin distinguir el factor angular., en: Using it as frequency in Hz without distinguishing the angular factor. }
    sign_behavior: { es: Se toma positiva para ritmo de fase en el sentido elegido., en: Taken positive for phase rate in the chosen sense. }
    zero_behavior: { es: Valor cero indica fase sin avance temporal., en: Zero indicates phase without temporal advance. }
    value_nature: angular_rate
    interpretation_role: Conecta frecuencia de ciclos con avance angular de fase.
    graph_binding: { type: Coord, visual_role: phase_rate }
    pedagogical_notes: { es: Distinguir ciclos por segundo y radianes por segundo., en: Distinguish cycles per second and radians per second. }
  - id: N
    symbol: "N"
    nombre: { es: número de ciclos, en: number of cycles }
    unidad: { es: ciclo, en: cycle }
    unidad_si: "1"
    dimension: "[1]"
    tipo: escalar
    is_vector: false
    components: []
    category: count
    physical_role: core_physical_quantity
    descripcion: { es: Conteo de repeticiones completas observadas., en: Count of complete repetitions observed. }
    rango_tipico: { es: Desde unos pocos ciclos hasta miles según la ventana de medida., en: From a few cycles to thousands depending on the measurement window. }
    typical_range: { es: 1 a 100 ciclos en mediciones manuales habituales., en: 1 to 100 cycles in common manual measurements. }
    used_in: [ejemplos, formulas, interpretacion]
    common_mistake: { es: Contar medios ciclos como ciclos completos sin indicarlo., en: Counting half cycles as complete cycles without stating it. }
    sign_behavior: { es: Es un conteo no negativo., en: It is a non-negative count. }
    zero_behavior: { es: Cero ciclos no permite estimar frecuencia por conteo., en: Zero cycles do not allow frequency estimation by counting. }
    value_nature: nonnegative_count
    interpretation_role: Permite estimar frecuencia desde observaciones discretas.
    graph_binding: { type: Coord, visual_role: counted_repetitions }
    pedagogical_notes: { es: Aclarar qué se considera un ciclo completo., en: Clarify what counts as a complete cycle. }
  - id: Delta_t
    symbol: "\\Delta t"
    nombre: { es: intervalo de observación, en: observation interval }
    unidad: { es: s, en: s }
    unidad_si: s
    dimension: "[T]"
    tipo: escalar
    is_vector: false
    components: []
    category: measurement_window
    physical_role: core_physical_quantity
    descripcion: { es: Tiempo total usado para contar ciclos., en: Total time used to count cycles. }
    rango_tipico: { es: Décimas de segundo a varios segundos en medidas escolares., en: Tenths of a second to several seconds in school measurements. }
    typical_range: { es: 0,1 s a 10 s para conteos directos de ciclos., en: 0.1 s to 10 s for direct cycle counts. }
    used_in: [ejemplos, formulas, interpretacion]
    common_mistake: { es: Confundirlo con el periodo de un único ciclo., en: Confusing it with the period of a single cycle. }
    sign_behavior: { es: Debe ser positivo como duración de observación., en: Must be positive as an observation duration. }
    zero_behavior: { es: Intervalo cero impide definir frecuencia por conteo., en: Zero interval prevents frequency by counting. }
    value_nature: positive_interval
    interpretation_role: Define la ventana temporal usada para estimar el ritmo.
    graph_binding: { type: Coord, x_axis: t, visual_role: observation_window }
    pedagogical_notes: { es: Separar ventana de medida y periodo individual., en: Separate measurement window and individual period. }
