version: "1.0"
leaf: "longitud-de-onda"

coord:
  title:
    es: Gráfica Coord · Longitud de Onda
    en: Coord Graph · Wavelength
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación y (m)
    en: displacement y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: λ = distancia entre dos puntos consecutivos en fase idéntica (crestas). v = λf = λ/T. k = 2π/λ.
    en: λ = distance between two consecutive points of identical phase (crests). v = λf = λ/T. k = 2π/λ.
  physicalReading:
    es: λ se lee directamente como la distancia entre dos crestas consecutivas en la gráfica y(x).
    en: λ is read directly as the distance between two consecutive crests in the y(x) graph.
  slopeMeaning:
    es: "∂y/∂x: pendiente de la onda."
    en: "∂y/∂x: slope of the wave."
  interceptMeaning:
    es: "y(0): valor en el origen."
    en: "y(0): value at origin."
  curvatureMeaning:
    es: ∂²y/∂x² = −k²y.
    en: ∂²y/∂x² = −k²y.
  signMeaning:
    es: "y > 0 cresta, y < 0 valle."
    en: "y > 0 crest, y < 0 trough."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x periódico de periodo λ.
    en: x periodic with period λ.
  modelConnection:
    es: Magnitudes ondulatorias.
    en: Wave quantities.
  formulaConnection:
    es: v = λf, k = 2π/λ.
    en: v = λf, k = 2π/λ.
  readingFocus:
    es: medir la distancia entre dos crestas consecutivas.
    en: measure the distance between two consecutive crests.
  agentHints:
    es:
      - λ entre crestas.
      - k = 2π/λ.
      - v = λf.
    en:
      - λ between crests.
      - k = 2π/λ.
      - v = λf.
  commonMistakes:
    es:
      - λ = A (confusión con amplitud).
      - Medir entre cresta y valle (= λ/2).
      - λ varía con f, no con A.
    en:
      - λ = A (confusion with amplitude).
      - Measuring crest to trough (= λ/2).
      - λ varies with f, not A.

svg:
  title:
    es: Escena SVG · Longitud de Onda
    en: SVG Scene · Wavelength
  sceneId: longitud_onda
  sceneLabel:
    es: Onda con λ marcada entre crestas
    en: Wave with λ marked between crests
  objects:
    es:
      - onda sinusoidal
      - flecha λ entre crestas
      - amplitud A
      - dirección v
    en:
      - sinusoidal wave
      - λ arrow between crests
      - amplitude A
      - direction v
  mainObject:
    es: onda con longitud de onda marcada
    en: wave with wavelength marked
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: λ = distancia entre crestas consecutivas.
    en: λ = distance between consecutive crests.
  interactions:
    es: "v = λf: velocidad de la onda."
    en: "v = λf: wave speed."
  modelElements:
    es:
      - "λ: longitud de onda"
      - "A: amplitud"
      - v = λf
    en:
      - "λ: wavelength"
      - "A: amplitude"
      - v = λf
  visualCues:
    es:
      - Doble flecha λ entre crestas.
      - A = altura de la cresta.
    en:
      - Double arrow λ between crests.
      - A = crest height.
  scaleMeaning:
    es: Escala horizontal = λ.
    en: Horizontal scale = λ.
  relation:
    es: v = λf.
    en: v = λf.
  physicalReading:
    es: λ es la longitud espacial de un ciclo completo.
    en: λ is the spatial length of one full cycle.
  modelConnection:
    es: Magnitudes ondulatorias.
    en: Wave quantities.
  formulaConnection:
    es: v = λf, k = 2π/λ.
    en: v = λf, k = 2π/λ.
  readingFocus:
    es: identificar λ entre dos crestas.
    en: identify λ between two crests.
  agentHints:
    es:
      - λ entre crestas.
      - k = 2π/λ.
    en:
      - λ between crests.
      - k = 2π/λ.
  commonMistakes:
    es:
      - λ ≠ A.
      - Cresta a valle = λ/2.
    en:
      - λ ≠ A.
      - Crest to trough = λ/2.
