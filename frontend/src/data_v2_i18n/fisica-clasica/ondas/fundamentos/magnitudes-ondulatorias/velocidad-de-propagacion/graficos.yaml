version: "1.0"
leaf: "velocidad-de-propagacion"

coord:
  title:
    es: Gráfica Coord · Velocidad de Propagación
    en: Coord Graph · Propagation Speed
  xAxis:
    es: tensión T (N) o módulo elástico B (Pa)
    en: tension T (N) or elastic modulus B (Pa)
  yAxis:
    es: velocidad de propagación v (m/s)
    en: propagation speed v (m/s)
  xMagnitude: T
  yMagnitude: v
  relation:
    es: "v = λf. En cuerda: v = √(T/μ). En fluido: v = √(B/ρ). En sólido: v_L = √(E/ρ). v es una propiedad del medio, no de la onda."
    en: "v = λf. In string: v = √(T/μ). In fluid: v = √(B/ρ). In solid: v_L = √(E/ρ). v is a property of the medium, not the wave."
  physicalReading:
    es: v ∝ √(propiedad elástica / densidad). Mayor rigidez → mayor v. Mayor densidad → menor v.
    en: v ∝ √(elastic property / density). Greater stiffness → higher v. Greater density → lower v.
  slopeMeaning:
    es: "dv/dT = 1/(2μ·v) ≥ 0: v aumenta con T."
    en: "dv/dT = 1/(2μ·v) ≥ 0: v increases with T."
  interceptMeaning:
    es: "v(0) = 0: sin tensión no hay propagación."
    en: "v(0) = 0: no tension, no propagation."
  curvatureMeaning:
    es: "Raíz cuadrada: curvatura decreciente."
    en: "Square root: decreasing curvature."
  signMeaning:
    es: "v > 0 siempre."
    en: "v > 0 always."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "T > 0, B > 0."
    en: "T > 0, B > 0."
  modelConnection:
    es: Velocidad de propagación en distintos medios.
    en: Propagation speed in different media.
  formulaConnection:
    es: v = √(T/μ), v = √(B/ρ), v = λf.
    en: v = √(T/μ), v = √(B/ρ), v = λf.
  readingFocus:
    es: leer v como función de las propiedades del medio.
    en: read v as a function of medium properties.
  agentHints:
    es:
      - v = √(propiedad elástica / ρ).
      - Mayor rigidez → mayor v.
      - v no depende de f ni A.
    en:
      - v = √(elastic prop / ρ).
      - Greater stiffness → higher v.
      - v does not depend on f or A.
  commonMistakes:
    es:
      - v depende de f (error).
      - v = A·ω (velocidad de partícula).
      - Mayor ρ → mayor v (error, es menor).
    en:
      - v depends on f (wrong).
      - v = A·ω (particle speed).
      - Greater ρ → higher v (wrong, it is lower).

svg:
  title:
    es: Escena SVG · Velocidad de Propagación
    en: SVG Scene · Propagation Speed
  sceneId: velocidad_propagacion
  sceneLabel:
    es: Frente de onda avanzando a velocidad v
    en: Wave front advancing at speed v
  objects:
    es:
      - frente de onda
      - medio 1 (v₁)
      - medio 2 (v₂)
      - flecha v
    en:
      - wave front
      - medium 1 (v₁)
      - medium 2 (v₂)
      - arrow v
  mainObject:
    es: frente de onda
    en: wave front
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Frente de onda avanza a v = λf en el medio.
    en: Wave front advances at v = λf in the medium.
  interactions:
    es: v cambia al cambiar de medio (refracción).
    en: v changes when medium changes (refraction).
  modelElements:
    es:
      - v = λf
      - v₁ ≠ v₂ en medios distintos
    en:
      - v = λf
      - v₁ ≠ v₂ in different media
  visualCues:
    es:
      - Frente de onda perpendicular a v.
      - v distinto en cada medio.
    en:
      - Wave front perpendicular to v.
      - Different v in each medium.
  scaleMeaning:
    es: Longitud de flecha ∝ velocidad.
    en: Arrow length ∝ speed.
  relation:
    es: v = λf.
    en: v = λf.
  physicalReading:
    es: v es una propiedad del medio.
    en: v is a property of the medium.
  modelConnection:
    es: Velocidad de propagación.
    en: Propagation speed.
  formulaConnection:
    es: v = √(T/μ) o √(B/ρ).
    en: v = √(T/μ) or √(B/ρ).
  readingFocus:
    es: identificar v en cada medio.
    en: identify v in each medium.
  agentHints:
    es:
      - v = λf.
      - v cambia con el medio.
      - v no depende de f.
    en:
      - v = λf.
      - v changes with medium.
      - v does not depend on f.
  commonMistakes:
    es:
      - v = A·ω.
      - v depende de f.
      - Mayor ρ → mayor v.
    en:
      - v = A·ω.
      - v depends on f.
      - Greater ρ → higher v.
