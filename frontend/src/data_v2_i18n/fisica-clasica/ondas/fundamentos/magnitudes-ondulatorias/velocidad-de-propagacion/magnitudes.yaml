version: v5
leaf_id: velocidad-de-propagacion
magnitudes:
  - id: v
    symbol: "v"
    nombre: { es: rapidez de propagacion, en: propagation speed }
    descripcion: { es: Rapidez con la que avanza el patron ondulatorio por el medio., en: Speed at which the wave pattern advances through the medium. }
    unidad_si: m/s
    dimension: "[L T^-1]"
    tipo: escalar
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas, interpretacion, grafico_coord, grafico_svg]
    common_mistake: { es: Confundir rapidez de propagacion con rapidez de las particulas del medio., en: Confusing propagation speed with the speed of the particles of the medium. }
    typical_range: { es: Desde cm/s en ondas lentas de superficie hasta cientos de m/s en sonido., en: From cm/s in slow surface waves to hundreds of m/s in sound. }
    sign_behavior:
      has_sign: false
      meaning: { es: Se usa como rapidez positiva; la direccion se describe aparte., en: Used as a positive speed; direction is described separately. }
    zero_behavior:
      allowed: false
      meaning: { es: Valor cero implicaria que el patron no se propaga., en: Zero would mean that the pattern does not propagate. }
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "v > 0"
    interpretation_role:
      primary_for: [ritmo_de_avance, comparacion_de_medios]
      secondary_for: [estimacion_de_lambda, estimacion_de_f]
    graph_binding:
      channels: [coord_slope, svg_shift]
    pedagogical_notes:
      es: "Subrayar que [[v]] pertenece al patron, no al movimiento instantaneo de cada punto material."
      en: "Emphasize that [[v]] belongs to the pattern, not to the instantaneous motion of each material point."
  - id: lambda
    symbol: "\\lambda"
    nombre: { es: longitud de onda, en: wavelength }
    descripcion: { es: Separacion espacial entre dos estados equivalentes consecutivos., en: Spatial separation between two consecutive equivalent states. }
    unidad_si: m
    dimension: "[L]"
    tipo: escalar
    is_vector: false
    components: []
    category: fundamental
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas, interpretacion, grafico_coord]
    common_mistake: { es: "Creer que al cambiar la frecuencia siempre cambia el medio.", en: "Believing that changing frequency always changes the medium." }
    typical_range: { es: Milimetros a metros en ondas mecanicas de aula., en: Millimetres to metres in classroom mechanical waves. }
    sign_behavior:
      has_sign: false
      meaning: { es: Es una distancia positiva entre repeticiones espaciales., en: It is a positive distance between spatial repetitions. }
    zero_behavior:
      allowed: false
      meaning: { es: Longitud nula no representa una onda periodica espacial., en: Zero wavelength does not represent a spatially periodic wave. }
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "lambda > 0"
    interpretation_role:
      primary_for: [escala_espacial]
      secondary_for: [calculo_de_v]
    graph_binding:
      channels: [coord_spacing]
    pedagogical_notes:
      es: "Relacionar [[lambda]] con la distancia horizontal antes de introducir el producto con [[f]]."
      en: "Relate [[lambda]] to horizontal spacing before introducing the product with [[f]]."
  - id: f
    symbol: "f"
    nombre: { es: frecuencia, en: frequency }
    descripcion: { es: Numero de ciclos que pasan por un punto cada segundo., en: Number of cycles passing a point each second. }
    unidad_si: s^-1
    dimension: "[T^-1]"
    tipo: escalar
    is_vector: false
    components: []
    category: fundamental
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas, interpretacion]
    common_mistake: { es: "Pensar que mayor [[f]] siempre significa mayor [[v]].", en: "Thinking that greater [[f]] always means greater [[v]]." }
    typical_range: { es: Fracciones de Hz en olas lentas hasta miles de Hz en sonido., en: Fractions of hertz in slow waves to thousands of hertz in sound. }
    sign_behavior:
      has_sign: false
      meaning: { es: Se interpreta como tasa positiva de repeticion temporal., en: Interpreted as a positive rate of temporal repetition. }
    zero_behavior:
      allowed: false
      meaning: { es: Frecuencia nula elimina la repeticion temporal usada para medir la onda., en: Zero frequency removes the temporal repetition used to measure the wave. }
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "f > 0"
    interpretation_role:
      primary_for: [ritmo_temporal]
      secondary_for: [calculo_de_v]
    graph_binding:
      channels: [coord_time_rate]
    pedagogical_notes:
      es: "Insistir en que [[f]] describe ritmo temporal y necesita [[lambda]] para fijar rapidez."
      en: "Insist that [[f]] describes temporal rhythm and needs [[lambda]] to set speed."
  - id: Delta_x
    symbol: "\\Delta x"
    nombre: { es: desplazamiento del patron, en: pattern displacement }
    descripcion: { es: Distancia recorrida por una fase reconocible de la onda., en: Distance travelled by a recognizable phase of the wave. }
    unidad_si: m
    dimension: "[L]"
    tipo: escalar
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas, interpretacion, grafico_svg]
    common_mistake: { es: Medir el desplazamiento de una particula en vez del avance del patron., en: Measuring particle displacement instead of pattern advance. }
    typical_range: { es: Centimetros a metros en medidas de laboratorio escolar., en: Centimetres to metres in school laboratory measurements. }
    sign_behavior:
      has_sign: false
      meaning: { es: Se usa como distancia recorrida positiva durante el intervalo observado., en: Used as a positive travelled distance during the observed interval. }
    zero_behavior:
      allowed: true
      meaning: { es: Cero indica que no se detecto avance del patron en el intervalo., en: Zero indicates no detected pattern advance during the interval. }
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "Delta_x >= 0"
    interpretation_role:
      primary_for: [medicion_directa_de_v]
      secondary_for: [lectura_grafica]
    graph_binding:
      channels: [svg_arrow, coord_marker]
    pedagogical_notes:
      es: "Pedir que se siga una cresta o fase equivalente, no un punto material."
      en: "Ask students to follow a crest or equivalent phase, not a material point."
  - id: Delta_t
    symbol: "\\Delta t"
    nombre: { es: intervalo temporal, en: time interval }
    descripcion: { es: Tiempo durante el cual se observa el avance del patron., en: Time during which the pattern advance is observed. }
    unidad_si: s
    dimension: "[T]"
    tipo: escalar
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in: [teoria, ejemplos, formulas, interpretacion]
    common_mistake: { es: Usar el periodo de una particula cuando se pidio un intervalo de seguimiento., en: Using the period of a particle when a tracking interval was requested. }
    typical_range: { es: Decimas de segundo a varios segundos en registros lentos., en: Tenths of a second to several seconds in slow recordings. }
    sign_behavior:
      has_sign: false
      meaning: { es: Se toma como duracion positiva de observacion., en: Taken as a positive observation duration. }
    zero_behavior:
      allowed: false
      meaning: { es: Tiempo nulo no permite calcular una rapidez media., en: Zero time does not allow an average speed to be calculated. }
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "Delta_t > 0"
    interpretation_role:
      primary_for: [medicion_directa_de_v]
      secondary_for: [control_de_error]
    graph_binding:
      channels: [time_slider]
    pedagogical_notes:
      es: "Un [[Delta_t]] mayor reduce ruido de lectura si el patron permanece uniforme."
      en: "A larger [[Delta_t]] reduces reading noise if the pattern remains uniform."
