version: v5
leaf_id: ondas-transversales-y-longitudinales
formulas:
  - id: coeficiente_transversal
    title: { es: Indice transversal, en: Transverse index }
    equation: "C_T = u_perp / A"
    latex: "C_T = \\frac{u_\\perp}{A}  % u_perp"
    rearrangements:
      - target: C_T
        equation: "C_T = u_perp / A"
        latex: "C_T = \\frac{u_\\perp}{A}  % u_perp"
      - target: u_perp
        equation: "u_perp = C_T * A"
        latex: "u_\\perp = C_T A  % u_perp"
      - target: A
        equation: "A = u_perp / C_T"
        latex: "A = \\frac{u_\\perp}{C_T}  % u_perp"
    category: conceptual
    relation_type: geometric_interpretation
    physical_meaning:
      es: "Compara la componente perpendicular con la amplitud total para estimar predominio transversal."
      en: "Compares the perpendicular component with total amplitude to estimate transverse dominance."
    constraints: ["A > 0", "u_perp >= 0", "0 <= C_T <= 1"]
    validity:
      es: "Valida si la direccion de propagacion esta bien fijada y las componentes se miden en el mismo punto del patron."
      en: "Valid if propagation direction is well fixed and components are measured at the same pattern point."
    dimension_check: "[L] dividido por [L] produce [1]"
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion, grafico_coord]
    interpretation_tags: [transverse_classification, component_ratio]
    result_semantics:
      target: C_T
      kind: ratio
      sign_meaning:
        es: "El indice no usa signo; mayor valor indica mayor componente perpendicular."
        en: "The index has no sign; larger value indicates larger perpendicular component."
      absolute_value_meaning:
        es: "El valor indica la fraccion transversal de la perturbacion."
        en: "The value indicates the transverse fraction of the disturbance."
    domain_checks:
      - id: ct_domain
        when: "A > 0 && u_perp >= 0"
        status: ok
        message: { es: "Las magnitudes permiten estimar predominio transversal.", en: "The magnitudes allow transverse dominance to be estimated." }
    coherence_checks:
      - id: ct_range
        when: "C_T >= 0 && C_T <= 1"
        status: ok
        message: { es: "El indice transversal esta en rango normalizado.", en: "The transverse index is in normalized range." }
    graph_implications:
      - id: ct_coord
        text: { es: "En Coord, [[C_T]] aumenta cuando domina la oscilacion perpendicular al avance.", en: "In Coord, [[C_T]] increases when oscillation perpendicular to advance dominates." }
    pedagogical_triggers:
      - id: ct_vertical_error
        text: { es: "Detectar si el alumno llama transversal a cualquier movimiento dibujado vertical.", en: "Detect whether the student calls any vertically drawn motion transverse." }
  - id: coeficiente_longitudinal
    title: { es: Indice longitudinal, en: Longitudinal index }
    equation: "C_L = u_parallel / A"
    latex: "C_L = \\frac{u_\\parallel}{A}  % u_parallel"
    rearrangements:
      - target: C_L
        equation: "C_L = u_parallel / A"
        latex: "C_L = \\frac{u_\\parallel}{A}  % u_parallel"
      - target: u_parallel
        equation: "u_parallel = C_L * A"
        latex: "u_\\parallel = C_L A  % u_parallel"
      - target: A
        equation: "A = u_parallel / C_L"
        latex: "A = \\frac{u_\\parallel}{C_L}  % u_parallel"
    category: conceptual
    relation_type: geometric_interpretation
    physical_meaning:
      es: "Compara la componente paralela con la amplitud total para estimar predominio longitudinal."
      en: "Compares the parallel component with total amplitude to estimate longitudinal dominance."
    constraints: ["A > 0", "u_parallel >= 0", "0 <= C_L <= 1"]
    validity:
      es: "Valida si se identifica correctamente la direccion de avance y la compresion o desplazamiento paralelo."
      en: "Valid if the advance direction and compression or parallel displacement are correctly identified."
    dimension_check: "[L] dividido por [L] produce [1]"
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion, grafico_svg]
    interpretation_tags: [longitudinal_classification, component_ratio]
    result_semantics:
      target: C_L
      kind: ratio
      sign_meaning:
        es: "El indice no usa signo; mayor valor indica mayor componente paralela."
        en: "The index has no sign; larger value indicates larger parallel component."
      absolute_value_meaning:
        es: "El valor indica la fraccion longitudinal de la perturbacion."
        en: "The value indicates the longitudinal fraction of the disturbance."
    domain_checks:
      - id: cl_domain
        when: "A > 0 && u_parallel >= 0"
        status: ok
        message: { es: "Las magnitudes permiten estimar predominio longitudinal.", en: "The magnitudes allow longitudinal dominance to be estimated." }
    coherence_checks:
      - id: cl_range
        when: "C_L >= 0 && C_L <= 1"
        status: ok
        message: { es: "El indice longitudinal esta en rango normalizado.", en: "The longitudinal index is in normalized range." }
    graph_implications:
      - id: cl_svg
        text: { es: "En Svg, [[C_L]] aumenta cuando domina la compresion paralela al avance.", en: "In Svg, [[C_L]] increases when compression parallel to advance dominates." }
    pedagogical_triggers:
      - id: cl_sound_error
        text: { es: "Detectar si el alumno cree que longitudinal significa ausencia de transporte.", en: "Detect whether the student thinks longitudinal means no transport." }
