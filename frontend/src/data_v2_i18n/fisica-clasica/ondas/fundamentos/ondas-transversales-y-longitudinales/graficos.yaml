version: "1.0"
leaf: "ondas-transversales-y-longitudinales"

coord:
  title:
    es: Gráfica Coord · Ondas Transversales y Longitudinales (sólidos)
    en: Coord Graph · Transverse and Longitudinal Waves (solids)
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento u (m)
    en: displacement u (m)
  xMagnitude: x
  yMagnitude: u
  relation:
    es: "Longitudinal (P): u ∥ x. Transversal (S): u ⊥ x."
    en: "Longitudinal (P): u ∥ x. Transverse (S): u ⊥ x."
  physicalReading:
    es: "P ∥, S ⊥. v_P > v_S."
    en: "P ∥, S ⊥. v_P > v_S."
  slopeMeaning:
    es: "∂u/∂x: deformación."
    en: "∂u/∂x: deformation."
  interceptMeaning:
    es: "u(0): condición inicial."
    en: "u(0): initial condition."
  curvatureMeaning:
    es: ∂²u/∂t² = v²∂²u/∂x².
    en: ∂²u/∂t² = v²∂²u/∂x².
  signMeaning:
    es: "P: u ∥. S: u ⊥."
    en: "P: u ∥. S: u ⊥."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el sólido.
    en: x in solid.
  modelConnection:
    es: Tipos de ondas en sólidos.
    en: Wave types in solids.
  formulaConnection:
    es: "v_P > v_S."
    en: "v_P > v_S."
  readingFocus:
    es: identificar dirección u para clasificar P o S.
    en: identify u direction to classify P or S.
  agentHints:
    es:
      - P ∥.
      - S ⊥.
      - "v_P > v_S."
    en:
      - P ∥.
      - S ⊥.
      - "v_P > v_S."
  commonMistakes:
    es:
      - P ⊥.
      - "v_S > v_P."
    en:
      - P ⊥.
      - "v_S > v_P."

