version: "1.0"
leaf: "electromagneticas"

coord:
  title:
    es: Gráfica Coord · Ondas Electromagnéticas
    en: Coord Graph · Electromagnetic Waves
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: campo eléctrico E (V/m) o magnético B (T)
    en: electric field E (V/m) or magnetic B (T)
  xMagnitude: x
  yMagnitude: E
  relation:
    es: "Las ondas EM se propagan en el vacío a c = 3×10⁸ m/s. E ⊥ B ⊥ v. E = cB. Energía transportada: S = E×B/μ₀ (vector de Poynting)."
    en: "EM waves propagate in vacuum at c = 3×10⁸ m/s. E ⊥ B ⊥ v. E = cB. Energy transported: S = E×B/μ₀ (Poynting vector)."
  physicalReading:
    es: E y B oscilan en fase y perpendicularmente entre sí y a v. c = 1/√(ε₀μ₀).
    en: E and B oscillate in phase and perpendicularly to each other and to v. c = 1/√(ε₀μ₀).
  slopeMeaning:
    es: "∂E/∂x: variación espacial del campo."
    en: "∂E/∂x: spatial variation of field."
  interceptMeaning:
    es: "E(0,0): campo inicial."
    en: "E(0,0): initial field."
  curvatureMeaning:
    es: ∂²E/∂t² = −ω²E.
    en: ∂²E/∂t² = −ω²E.
  signMeaning:
    es: "E y B: cualquier signo según la dirección."
    en: "E and B: any sign depending on direction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Cualquier medio (incluyendo vacío).
    en: Any medium (including vacuum).
  modelConnection:
    es: Ondas electromagnéticas de Maxwell.
    en: "Maxwell's electromagnetic waves."
  formulaConnection:
    es: c = λf = 1/√(ε₀μ₀), E = cB.
    en: c = λf = 1/√(ε₀μ₀), E = cB.
  readingFocus:
    es: leer E y B en fase y perpendiculares; verificar c = λf.
    en: read E and B in phase and perpendicular; verify c = λf.
  agentHints:
    es:
      - c = 3×10⁸ m/s.
      - E ⊥ B ⊥ v.
      - No necesitan medio.
    en:
      - c = 3×10⁸ m/s.
      - E ⊥ B ⊥ v.
      - No medium needed.
  commonMistakes:
    es:
      - E y B no son perpendiculares (error).
      - c depende del medio (solo si n ≠ 1).
      - Confundir con ondas mecánicas.
    en:
      - E and B not perpendicular (wrong).
      - c depends on medium (only if n ≠ 1).
      - Confusing with mechanical waves.
