version: "1.0"
leaf: "mecanicas"

coord:
  title:
    es: Gráfica Coord · Ondas Mecánicas
    en: Coord Graph · Mechanical Waves
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: elongación y (m)
    en: displacement y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "Las ondas mecánicas requieren un medio material para propagarse. La velocidad depende de las propiedades elásticas e inerciales del medio: v = √(B/ρ) (longitudinal) o v = √(T/μ) (cuerda)."
    en: "Mechanical waves require a material medium to propagate. Speed depends on elastic and inertial properties: v = √(B/ρ) (longitudinal) or v = √(T/μ) (string)."
  physicalReading:
    es: La onda transporta energía mecánica. Amplitud A = máximo desplazamiento de la partícula.
    en: Wave transports mechanical energy. Amplitude A = maximum particle displacement.
  slopeMeaning:
    es: "∂y/∂t: velocidad transversal de la partícula."
    en: "∂y/∂t: transverse particle velocity."
  interceptMeaning:
    es: Posición de equilibrio.
    en: Equilibrium position.
  curvatureMeaning:
    es: "∂²y/∂t² = −ω²y: aceleración transversal."
    en: "∂²y/∂t² = −ω²y: transverse acceleration."
  signMeaning:
    es: "y > 0: cresta. y < 0: valle."
    en: "y > 0: crest. y < 0: trough."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el medio material.
    en: x within the material medium.
  modelConnection:
    es: Ondas mecánicas.
    en: Mechanical waves.
  formulaConnection:
    es: v = √(B/ρ), v = √(T/μ), y = A·sin(kx − ωt).
    en: v = √(B/ρ), v = √(T/μ), y = A·sin(kx − ωt).
  readingFocus:
    es: leer A, λ, T y verificar que existe un medio material.
    en: read A, λ, T and verify a material medium exists.
  agentHints:
    es:
      - Requieren medio material.
      - v = √(B/ρ) o √(T/μ).
      - No se propagan en vacío.
    en:
      - Require material medium.
      - v = √(B/ρ) or √(T/μ).
      - Do not propagate in vacuum.
  commonMistakes:
    es:
      - Confundir con ondas EM (no requieren medio).
      - v de onda ≠ v de partícula.
      - A no es λ.
    en:
      - Confusing with EM waves (no medium needed).
      - Wave speed ≠ particle speed.
      - A is not λ.
