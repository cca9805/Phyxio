version: "1.0"
leaf: "condicion-de-estacionariedad"

coord:
  title:
    es: Gráfica Coord · Condición de Estacionariedad
    en: Coord Graph · Standing Wave Condition
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación y (m)
    en: displacement y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "Onda estacionaria: y = 2A·cos(ωt)·sin(kx). Condición: L = n·λ/2 (extremos fijos) o L = (2n−1)·λ/4 (un extremo libre)."
    en: "Standing wave: y = 2A·cos(ωt)·sin(kx). Condition: L = n·λ/2 (fixed ends) or L = (2n−1)·λ/4 (one free end)."
  physicalReading:
    es: La condición de estacionariedad impone que los extremos sean nodos o antinodos.
    en: The standing wave condition requires ends to be nodes or antinodes.
  slopeMeaning:
    es: "∂y/∂x: deformación en cada punto."
    en: "∂y/∂x: deformation at each point."
  interceptMeaning:
    es: y(0,t) = 0 si extremo fijo (nodo).
    en: y(0,t) = 0 if fixed end (node).
  curvatureMeaning:
    es: ∂²y/∂x² ∝ −k²y.
    en: ∂²y/∂x² ∝ −k²y.
  signMeaning:
    es: "Nodo: y = 0. Antinodo: |y| = máximo."
    en: "Node: y = 0. Antinode: |y| = maximum."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Ondas estacionarias.
    en: Standing waves.
  formulaConnection:
    es: L = nλ/2, fₙ = nv/(2L).
    en: L = nλ/2, fₙ = nv/(2L).
  readingFocus:
    es: verificar que los extremos son nodos/antinodos según las condiciones de contorno.
    en: verify that ends are nodes/antinodes according to boundary conditions.
  agentHints:
    es:
      - L = nλ/2 (fijos).
      - L = (2n−1)λ/4 (un libre).
      - fₙ = nf₁.
    en:
      - L = nλ/2 (fixed).
      - L = (2n−1)λ/4 (one free).
      - fₙ = nf₁.
  commonMistakes:
    es:
      - Extremo libre = nodo (error, es antinodo).
      - f depende de A.
      - L = nλ para un extremo libre.
    en:
      - Free end = node (wrong, it is antinode).
      - f depends on A.
      - L = nλ for one free end.
