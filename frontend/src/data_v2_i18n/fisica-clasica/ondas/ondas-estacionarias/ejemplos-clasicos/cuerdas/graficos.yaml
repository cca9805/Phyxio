version: "1.0"
leaf: "cuerdas"

coord:
  title:
    es: Gráfica Coord · Cuerdas
    en: Coord Graph · Strings
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación transversal y (m)
    en: transverse displacement y (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "v = √(T/μ). Ondas estacionarias: fₙ = nv/(2L). Extremos fijos = nodos. y(x,t) = 2A·sin(nπx/L)·cos(ωₙt)."
    en: "v = √(T/μ). Standing waves: fₙ = nv/(2L). Fixed ends = nodes. y(x,t) = 2A·sin(nπx/L)·cos(ωₙt)."
  physicalReading:
    es: La tensión T y la densidad lineal μ determinan v. L determina los modos.
    en: Tension T and linear density μ determine v. L determines the modes.
  slopeMeaning:
    es: "∂y/∂x: pendiente de la cuerda."
    en: "∂y/∂x: string slope."
  interceptMeaning:
    es: "y(0,t) = y(L,t) = 0: extremos fijos."
    en: "y(0,t) = y(L,t) = 0: fixed ends."
  curvatureMeaning:
    es: ∂²y/∂x² = −k²y.
    en: ∂²y/∂x² = −k²y.
  signMeaning:
    es: "Nodo: y = 0."
    en: "Node: y = 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Ondas en cuerdas tensadas.
    en: Waves on taut strings.
  formulaConnection:
    es: v = √(T/μ), fₙ = nv/(2L).
    en: v = √(T/μ), fₙ = nv/(2L).
  readingFocus:
    es: leer el modo n, los nodos y la frecuencia fₙ.
    en: read mode n, nodes and frequency fₙ.
  agentHints:
    es:
      - v = √(T/μ).
      - fₙ = nv/(2L).
      - Extremos = nodos.
    en:
      - v = √(T/μ).
      - fₙ = nv/(2L).
      - Ends = nodes.
  commonMistakes:
    es:
      - v depende de f.
      - Extremo libre = nodo.
      - fₙ = f₁/n.
    en:
      - v depends on f.
      - Free end = node.
      - fₙ = f₁/n.
