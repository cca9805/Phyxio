version: "1.0"
leaf: "tubos"

coord:
  title:
    es: Gráfica Coord · Tubos
    en: Coord Graph · Tubes
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento s(x) (m) o Δp(x) (Pa)
    en: displacement s(x) (m) or Δp(x) (Pa)
  xMagnitude: x
  yMagnitude: s
  relation:
    es: "Tubo cerrado-cerrado: fₙ = nv/(2L). Tubo abierto-abierto: fₙ = nv/(2L). Tubo cerrado-abierto: fₙ = (2n−1)v/(4L) (solo impares)."
    en: "Closed-closed: fₙ = nv/(2L). Open-open: fₙ = nv/(2L). Closed-open: fₙ = (2n−1)v/(4L) (odd only)."
  physicalReading:
    es: Extremo cerrado = nodo de desplazamiento (antinodo de presión). Extremo abierto = antinodo de desplazamiento (nodo de presión).
    en: Closed end = displacement node (pressure antinode). Open end = displacement antinode (pressure node).
  slopeMeaning:
    es: ∂s/∂x ∝ −Δp.
    en: ∂s/∂x ∝ −Δp.
  interceptMeaning:
    es: s(0) = 0 si extremo cerrado.
    en: s(0) = 0 if closed end.
  curvatureMeaning:
    es: ∂²s/∂x² = −k²s.
    en: ∂²s/∂x² = −k²s.
  signMeaning:
    es: "Nodo de desplazamiento: s = 0."
    en: "Displacement node: s = 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Ondas estacionarias en tubos.
    en: Standing waves in tubes.
  formulaConnection:
    es: fₙ = nv/(2L) o (2n−1)v/(4L).
    en: fₙ = nv/(2L) or (2n−1)v/(4L).
  readingFocus:
    es: identificar el tipo de tubo y leer fₙ.
    en: identify tube type and read fₙ.
  agentHints:
    es:
      - Cerrado = nodo de s.
      - Abierto = antinodo de s.
      - "Cerrado-abierto: solo impares."
    en:
      - Closed = displacement node.
      - Open = displacement antinode.
      - "Closed-open: odd only."
  commonMistakes:
    es:
      - Cerrado = antinodo de s.
      - Tubo cerrado-abierto tiene todos los armónicos.
      - Desfase s-Δp ignorado.
    en:
      - Closed = displacement antinode.
      - Closed-open has all harmonics.
      - s-Δp phase shift ignored.
