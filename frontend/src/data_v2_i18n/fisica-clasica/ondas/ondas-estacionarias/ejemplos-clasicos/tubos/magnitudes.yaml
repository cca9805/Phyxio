- id: L
  symbol: L
  nombre: { es: longitud fisica del tubo, en: physical tube length }
  descripcion: { es: "Distancia geometrica entre los extremos principales del tubo.", en: "Geometric distance between the main ends of the tube." }
  unidad_si: m
  dimension: "[L]"
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in: [teoria, ejemplos, grafico_coord]
  common_mistake: { es: "Usar [[L]] sin considerar correccion de extremo cuando el problema exige [[L_eff]].", en: "Using [[L]] without considering end correction when the problem requires [[L_eff]]." }
  typical_range: "0.05 m a 3 m en tubos acusticos habituales"
  sign_behavior: { has_sign: false, meaning: { es: "[[L]] es una distancia positiva.", en: "[[L]] is a positive distance." } }
  zero_behavior: { allowed: false, meaning: { es: "Sin [[L]] no hay columna de aire resonante.", en: "Without [[L]] there is no resonant air column." } }
  value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "L > 0" }
  interpretation_role: { primary_for: [geometria_del_tubo], secondary_for: [escala_de_frecuencia] }
  graph_binding: { channels: [tube_length, x_domain] }
  pedagogical_notes: { es: "[[L]] es la medida fisica, pero la resonancia suele leer [[L_eff]].", en: "[[L]] is the physical measure, but resonance often reads [[L_eff]]." }
- id: L_eff
  symbol: L_eff
  nombre: { es: longitud efectiva, en: effective length }
  descripcion: { es: "Longitud acustica que incluye el efecto de los extremos abiertos.", en: "Acoustic length including the effect of open ends." }
  unidad_si: m
  dimension: "[L]"
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in: [frecuencia_tubo_abierto, frecuencia_tubo_cerrado, longitud_onda_tubo_abierto, longitud_onda_tubo_cerrado]
  common_mistake: { es: "Confundir [[L_eff]] con la longitud fisica exacta en tubos anchos.", en: "Confusing [[L_eff]] with the exact physical length in wide tubes." }
  typical_range: "ligeramente mayor que L si hay extremos abiertos"
  sign_behavior: { has_sign: false, meaning: { es: "[[L_eff]] es positiva.", en: "[[L_eff]] is positive." } }
  zero_behavior: { allowed: false, meaning: { es: "[[L_eff]] nula elimina el resonador.", en: "Zero [[L_eff]] removes the resonator." } }
  value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "L_eff > 0" }
  interpretation_role: { primary_for: [condicion_de_frontera], secondary_for: [afinacion] }
  graph_binding: { channels: [effective_domain, boundary_spacing] }
  pedagogical_notes: { es: "[[L_eff]] traduce la geometria real a longitud acustica.", en: "[[L_eff]] turns real geometry into acoustic length." }
- id: v
  symbol: v
  nombre: { es: velocidad del sonido, en: sound speed }
  descripcion: { es: "Rapidez de propagacion de las ondas sonoras dentro del tubo.", en: "Propagation speed of sound waves inside the tube." }
  unidad_si: m/s
  dimension: "[L T⁻¹]"
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in: [frecuencia_tubo_abierto, frecuencia_tubo_cerrado]
  common_mistake: { es: "Usar [[v]] de una cuerda o de otro medio en lugar de sonido en aire.", en: "Using [[v]] from a string or another medium instead of sound in air." }
  typical_range: "aprox. 330 m/s a 350 m/s en aire cotidiano"
  sign_behavior: { has_sign: false, meaning: { es: "Se interpreta como rapidez positiva.", en: "It is interpreted as positive speed." } }
  zero_behavior: { allowed: false, meaning: { es: "[[v]] nula no permite propagacion sonora.", en: "Zero [[v]] does not allow sound propagation." } }
  value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "v > 0" }
  interpretation_role: { primary_for: [escala_temporal], secondary_for: [temperatura_del_aire] }
  graph_binding: { channels: [frequency_scale] }
  pedagogical_notes: { es: "[[v]] convierte el patron espacial del aire en frecuencia audible.", en: "[[v]] converts the spatial air pattern into audible frequency." }
- id: n
  symbol: n
  nombre: { es: numero de modo abierto, en: open-tube mode number }
  descripcion: { es: "Entero positivo usado para modos de un tubo abierto por ambos extremos.", en: "Positive integer used for modes of a tube open at both ends." }
  unidad_si: adimensional
  dimension: "[1]"
  is_vector: false
  components: []
  category: dimension
  physical_role: core_physical_quantity
  used_in: [frecuencia_tubo_abierto, longitud_onda_tubo_abierto]
  common_mistake: { es: "Usar [[n]] indistintamente en tubo cerrado sin revisar la serie impar.", en: "Using [[n]] in a closed tube without checking the odd series." }
  typical_range: "1 a 8 en analisis escolar"
  sign_behavior: { has_sign: false, meaning: { es: "Solo enteros positivos describen modos abiertos.", en: "Only positive integers describe open-tube modes." } }
  zero_behavior: { allowed: false, meaning: { es: "[[n]] cero no produce modo acustico.", en: "Zero [[n]] produces no acoustic mode." } }
  value_nature: { kind: ratio, nonnegative_only: true, expected_interval: "n = 1, 2, 3, ..." }
  interpretation_role: { primary_for: [serie_abierta], secondary_for: [armonicos] }
  graph_binding: { channels: [mode_selector, antinode_count] }
  pedagogical_notes: { es: "[[n]] permite todos los armonicos en un tubo abierto-abierto ideal.", en: "[[n]] allows all harmonics in an ideal open-open tube." }
- id: m
  symbol: m
  nombre: { es: indice impar de tubo cerrado, en: odd closed-tube index }
  descripcion: { es: "Entero positivo que genera los factores impares de un tubo abierto-cerrado.", en: "Positive integer generating the odd factors of an open-closed tube." }
  unidad_si: adimensional
  dimension: "[1]"
  is_vector: false
  components: []
  category: dimension
  physical_role: core_physical_quantity
  used_in: [frecuencia_tubo_cerrado, longitud_onda_tubo_cerrado]
  common_mistake: { es: "Confundir [[m]] con el armonico visible y admitir pares en un tubo cerrado.", en: "Confusing [[m]] with the visible harmonic and allowing even factors in a closed tube." }
  typical_range: "1, 2, 3 para los primeros factores impares"
  sign_behavior: { has_sign: false, meaning: { es: "[[m]] es entero positivo.", en: "[[m]] is a positive integer." } }
  zero_behavior: { allowed: false, meaning: { es: "[[m]] cero no selecciona una resonancia.", en: "Zero [[m]] selects no resonance." } }
  value_nature: { kind: ratio, nonnegative_only: true, expected_interval: "m = 1, 2, 3, ..." }
  interpretation_role: { primary_for: [serie_cerrada], secondary_for: [armonicos_impares] }
  graph_binding: { channels: [closed_mode_selector, odd_factor] }
  pedagogical_notes: { es: "[[m]] recuerda que el tubo cerrado usa solo factores impares.", en: "[[m]] reminds that the closed tube uses only odd factors." }
- id: lambda_n
  symbol: lambda_n
  nombre: { es: longitud de onda modal, en: modal wavelength }
  descripcion: { es: "Longitud de onda asociada al modo acustico seleccionado.", en: "Wavelength associated with the selected acoustic mode." }
  unidad_si: m
  dimension: "[L]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in: [longitud_onda_tubo_abierto, longitud_onda_tubo_cerrado, ejemplos]
  common_mistake: { es: "Tomar [[lambda_n]] igual a [[L_eff]] para todos los tubos.", en: "Taking [[lambda_n]] equal to [[L_eff]] for all tubes." }
  typical_range: "centimetros a metros en tubos audibles"
  sign_behavior: { has_sign: false, meaning: { es: "[[lambda_n]] es positiva.", en: "[[lambda_n]] is positive." } }
  zero_behavior: { allowed: false, meaning: { es: "[[lambda_n]] nula no describe sonido.", en: "Zero [[lambda_n]] does not describe sound." } }
  value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "lambda_n > 0" }
  interpretation_role: { primary_for: [forma_acustica], secondary_for: [frecuencia] }
  graph_binding: { channels: [wavelength_spacing, pressure_pattern] }
  pedagogical_notes: { es: "[[lambda_n]] cambia segun el tipo de extremo del tubo.", en: "[[lambda_n]] changes with the tube end type." }
- id: f_n
  symbol: f_n
  nombre: { es: frecuencia modal del tubo, en: tube modal frequency }
  descripcion: { es: "Frecuencia propia seleccionada por la columna de aire.", en: "Natural frequency selected by the air column." }
  unidad_si: Hz
  dimension: "[T⁻¹]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in: [frecuencia_tubo_abierto, frecuencia_tubo_cerrado, interpretacion, grafico_coord]
  common_mistake: { es: "Olvidar que [[f_n]] cambia de serie al cerrar un extremo.", en: "Forgetting that [[f_n]] changes series when one end is closed." }
  typical_range: "decenas de Hz a varios kHz"
  sign_behavior: { has_sign: false, meaning: { es: "[[f_n]] es frecuencia positiva.", en: "[[f_n]] is positive frequency." } }
  zero_behavior: { allowed: false, meaning: { es: "[[f_n]] nula no es resonancia sonora.", en: "Zero [[f_n]] is not a sound resonance." } }
  value_nature: { kind: scalar_unsigned, nonnegative_only: true, expected_interval: "f_n > 0" }
  interpretation_role: { primary_for: [resonancia_acustica], secondary_for: [timbre] }
  graph_binding: { channels: [modal_frequency, resonance_marker] }
  pedagogical_notes: { es: "[[f_n]] condensa longitud efectiva, velocidad del sonido y frontera abierta o cerrada.", en: "[[f_n]] condenses effective length, sound speed, and open or closed boundary." }
