version: "1.0"
leaf: "nodos-y-antinodos"

coord:
  title:
    es: Gráfica Coord · Nodos y Antinodos
    en: Coord Graph · Nodes and Antinodes
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: amplitud A(x) (m)
    en: amplitude A(x) (m)
  xMagnitude: x
  yMagnitude: A
  relation:
    es: "Onda estacionaria: y = 2A·cos(ωt)·sin(kx). Nodos: sin(kx) = 0 → x = nλ/2. Antinodos: |sin(kx)| = 1 → x = (2n+1)λ/4."
    en: "Standing wave: y = 2A·cos(ωt)·sin(kx). Nodes: sin(kx) = 0 → x = nλ/2. Antinodes: |sin(kx)| = 1 → x = (2n+1)λ/4."
  physicalReading:
    es: "Nodo: punto de amplitud cero (sin oscilación). Antinodo: punto de máxima amplitud."
    en: "Node: zero amplitude point (no oscillation). Antinode: maximum amplitude point."
  slopeMeaning:
    es: "dA/dx: variación espacial de amplitud."
    en: "dA/dx: spatial amplitude variation."
  interceptMeaning:
    es: A(0) = 0 si extremo fijo.
    en: A(0) = 0 if fixed end.
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: A ≥ 0.
    en: A ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Ondas estacionarias.
    en: Standing waves.
  formulaConnection:
    es: "Nodo: x = nλ/2. Antinodo: x = (2n+1)λ/4."
    en: "Node: x = nλ/2. Antinode: x = (2n+1)λ/4."
  readingFocus:
    es: identificar nodos (A=0) y antinodos (A=máx) en la gráfica.
    en: identify nodes (A=0) and antinodes (A=max) in the graph.
  agentHints:
    es:
      - "Nodo: x = nλ/2."
      - "Antinodo: x = (2n+1)λ/4."
      - "Entre nodos: λ/2."
    en:
      - "Node: x = nλ/2."
      - "Antinode: x = (2n+1)λ/4."
      - "Between nodes: λ/2."
  commonMistakes:
    es:
      - Nodo = máxima energía (error).
      - Antinodo en x = nλ/2.
      - Distancia nodo-antinodo = λ.
    en:
      - Node = maximum energy (wrong).
      - Antinode at x = nλ/2.
      - Node to antinode distance = λ.
