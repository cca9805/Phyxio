version: "1.0"
leaf: "resonancia"

coord:
  title:
    es: Gráfica Coord · Resonancia
    en: Coord Graph · Resonance
  xAxis:
    es: frecuencia de excitación f (Hz)
    en: excitation frequency f (Hz)
  yAxis:
    es: amplitud de oscilación A (m)
    en: oscillation amplitude A (m)
  xMagnitude: f
  yMagnitude: A
  relation:
    es: "Resonancia: A → máximo cuando f = fₙ = nv/(2L). Ancho de resonancia: Δf = fₙ/Q (Q = factor de calidad). Resonancia mecánica: A(f) = F₀/[m·√((ω₀²−ω²)² + (γω)²)]."
    en: "Resonance: A → maximum when f = fₙ = nv/(2L). Resonance width: Δf = fₙ/Q (Q = quality factor). Mechanical: A(f) = F₀/[m·√((ω₀²−ω²)² + (γω)²)]."
  physicalReading:
    es: Pico de amplitud en f = fₙ. Mayor Q → resonancia más aguda y mayor amplitud.
    en: Amplitude peak at f = fₙ. Higher Q → sharper, higher resonance.
  slopeMeaning:
    es: "dA/df: sensibilidad a la frecuencia."
    en: "dA/df: frequency sensitivity."
  interceptMeaning:
    es: "A(0): amplitud en f = 0."
    en: "A(0): amplitude at f = 0."
  curvatureMeaning:
    es: Pico lorentziano.
    en: Lorentzian peak.
  signMeaning:
    es: A ≥ 0.
    en: A ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "f > 0."
    en: "f > 0."
  modelConnection:
    es: Resonancia en ondas y oscilaciones.
    en: Resonance in waves and oscillations.
  formulaConnection:
    es: fₙ = nv/(2L), Q = f₀/Δf.
    en: fₙ = nv/(2L), Q = f₀/Δf.
  readingFocus:
    es: leer las frecuencias de resonancia fₙ y el factor Q.
    en: read resonance frequencies fₙ and quality factor Q.
  agentHints:
    es:
      - fₙ = nv/(2L).
      - Mayor Q → resonancia más aguda.
      - Δf = f₀/Q.
    en:
      - fₙ = nv/(2L).
      - Higher Q → sharper resonance.
      - Δf = f₀/Q.
  commonMistakes:
    es:
      - Una sola frecuencia de resonancia.
      - Mayor Q → resonancia más ancha.
      - Resonancia = destrucción (solo si A∞).
    en:
      - Only one resonance frequency.
      - Higher Q → broader resonance.
      - Resonance = destruction (only if A∞).
