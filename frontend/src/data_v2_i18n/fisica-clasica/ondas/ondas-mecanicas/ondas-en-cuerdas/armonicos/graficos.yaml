version: "1.0"
leaf: "armonicos"

coord:
  title:
    es: Gráfica Coord · Armónicos
    en: Coord Graph · Harmonics
  xAxis:
    es: número de armónico n
    en: harmonic number n
  yAxis:
    es: frecuencia fₙ (Hz)
    en: frequency fₙ (Hz)
  xMagnitude: n
  yMagnitude: f
  relation:
    es: "fₙ = n·f₁ = n·v/(2L) (extremos fijos). Serie armónica: f₁, 2f₁, 3f₁, … La serie es el fundamento del sonido musical."
    en: "fₙ = n·f₁ = n·v/(2L) (fixed ends). Harmonic series: f₁, 2f₁, 3f₁, … The series is the basis of musical sound."
  physicalReading:
    es: fₙ es múltiplo entero de f₁. El timbre depende de la distribución de armónicos.
    en: fₙ is an integer multiple of f₁. Timbre depends on harmonic distribution.
  slopeMeaning:
    es: "dfₙ/dn = f₁: separación entre armónicos."
    en: "dfₙ/dn = f₁: spacing between harmonics."
  interceptMeaning:
    es: "f₁ = v/(2L): fundamental."
    en: "f₁ = v/(2L): fundamental."
  curvatureMeaning:
    es: Lineal en n.
    en: Linear in n.
  signMeaning:
    es: "fₙ > 0."
    en: "fₙ > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "n ∈ {1, 2, 3, …}."
    en: "n ∈ {1, 2, 3, …}."
  modelConnection:
    es: Armónicos en cuerdas y tubos.
    en: Harmonics in strings and tubes.
  formulaConnection:
    es: fₙ = nv/(2L), n = 1,2,3,…
    en: fₙ = nv/(2L), n = 1,2,3,…
  readingFocus:
    es: leer fₙ = n·f₁ y la serie armónica.
    en: read fₙ = n·f₁ and the harmonic series.
  agentHints:
    es:
      - fₙ = n·f₁.
      - f₁ = v/(2L).
      - Timbre = distribución de Aₙ.
    en:
      - fₙ = n·f₁.
      - f₁ = v/(2L).
      - Timbre = Aₙ distribution.
  commonMistakes:
    es:
      - fₙ = f₁/n.
      - Armónico 1 = segundo armónico.
      - f no depende de L.
    en:
      - fₙ = f₁/n.
      - Harmonic 1 = second harmonic.
      - f does not depend on L.
