magnitudes:
- id: numero_de_armonico
  symbol: n
  nombre:
    es: número de armónico
    en: harmonic number
  descripcion:
    es: Índice entero positivo que identifica cada modo normal de vibración de la cuerda
    en: Positive integer index identifying each normal vibration mode of the string
  unidad_si: '-'
  dimension: '[1]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - determinación de frecuencias armónicas
  - cálculo de longitudes de onda permitidas
  - análisis espectral de cuerdas
  common_mistake: Confundir el número de armónico con el número de nodos (que es n+1) o de vientres (que es n)
  typical_range: 1 ≤ n ≤ 10 (valores superiores atenúan rápidamente)
  sign_behavior:
    has_sign: false
    meaning:
      es: No aplica, siempre positivo
      en: Not applicable, always positive
  zero_behavior:
    allowed: false
    meaning:
      es: n = 0 no representa ningún modo físico de vibración
      en: n = 0 does not represent any physical vibration mode
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[1, 20]'
  interpretation_role:
    primary_for:
    - identificación de modos normales
    secondary_for:
    - estimación de complejidad del timbre
  graph_binding:
    channels:
    - mode_selector
  pedagogical_notes:
    es: El primer armónico (n=1) es la frecuencia fundamental audible. Los armónicos superiores dan riqueza al timbre.
    en: The first harmonic (n=1) is the audible fundamental frequency. Higher harmonics give richness to the timbre.
- id: longitud_de_la_cuerda
  symbol: L
  nombre:
    es: longitud de la cuerda
    en: string length
  descripcion:
    es: Distancia entre los dos puntos de fijación de la cuerda vibrante
    en: Distance between the two fixation points of the vibrating string
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
  - cálculo de frecuencias propias
  - determinación de la escala musical
  - diseño de instrumentos de cuerda
  common_mistake: Olvidar que L es la longitud efectiva entre puntos de fijación, no la longitud total del hilo
  typical_range: 0.25 m (violín) a 2.0 m (contrabajo)
  sign_behavior:
    has_sign: false
    meaning:
      es: Magnitud escalar positiva por definición
      en: Scalar magnitude positive by definition
  zero_behavior:
    allowed: false
    meaning:
      es: L = 0 implica una cuerda puntual sin capacidad de vibración
      en: L = 0 implies a point string with no vibration capacity
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 5]
  interpretation_role:
    primary_for:
    - afinación de instrumentos
    secondary_for:
    - diseño acústico
  graph_binding:
    channels:
    - x_axis_limit
  pedagogical_notes:
    es: Los músicos cambian L al presionar la cuerda contra el diapasón, alterando la frecuencia.
    en: Musicians change L by pressing the string against the fingerboard, altering the frequency.
- id: velocidad_de_propagacion
  symbol: v
  nombre:
    es: velocidad de propagación
    en: propagation velocity
  descripcion:
    es: Velocidad a la que viaja la perturbación transversal a lo largo de la cuerda
    en: Velocity at which the transverse perturbation travels along the string
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - determinación de frecuencias armónicas
  - cálculo de tiempo de retorno
  - análisis de dispersión
  common_mistake: Confundir v con la velocidad de oscilación transversal de un punto de la cuerda
  typical_range: 100 m/s (cuerda gruesa baja tensión) a 500 m/s (cuerda fina alta tensión)
  sign_behavior:
    has_sign: false
    meaning:
      es: Velocidad siempre positiva, independiente de dirección de propagación
      en: Velocity always positive, independent of propagation direction
  zero_behavior:
    allowed: false
    meaning:
      es: v = 0 implica cuerda sin tensión o masa infinita, imposible físicamente
      en: v = 0 implies zero tension or infinite mass, physically impossible
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 1000]
  interpretation_role:
    primary_for:
    - diagnóstico de tensión
    secondary_for:
    - ajuste de afinación
  graph_binding:
    channels:
    - slope_parameter
  pedagogical_notes:
    es: v depende de la tensión y la densidad lineal mediante v = sqrt(T/μ). Ajustar la tensión modifica el pitch.
    en: v depends on tension and linear density via v = sqrt(T/μ). Adjusting tension changes the pitch.
- id: lambda_n
  symbol: \lambda_n
  nombre:
    es: longitud de onda del armónico n
    en: wavelength of harmonic n
  descripcion:
    es: Longitud de onda estacionaria correspondiente al modo de vibración n-ésimo
    en: Standing wave wavelength corresponding to the n-th vibration mode
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: derived
  physical_role: derived
  used_in:
  - visualización de modos normales
  - cálculo de nodos y vientres
  - diseño de resonadores
  common_mistake: Creer que la longitud de onda es independiente de n; cada armónico tiene su propia λ
  typical_range: 0.1 m (n alto) a 4.0 m (n=1 en cuerda larga)
  sign_behavior:
    has_sign: false
    meaning:
      es: Distancia espacial, siempre positiva
      en: Spatial distance, always positive
  zero_behavior:
    allowed: false
    meaning:
      es: λ_n = 0 implicaría frecuencia infinita, imposible físicamente
      en: λ_n = 0 would imply infinite frequency, physically impossible
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 10]
  interpretation_role:
    primary_for:
    - patrón espacial de vibración
    secondary_for:
    - ubicación de nodos
  graph_binding:
    channels:
    - spatial_period
  pedagogical_notes:
    es: La longitud de onda decrece inversamente con n; el primer armónico tiene la λ más larga.
    en: Wavelength decreases inversely with n; the first harmonic has the longest λ.
- id: f_n
  symbol: f_n
  nombre:
    es: frecuencia del armónico n
    en: frequency of harmonic n
  descripcion:
    es: Frecuencia de oscilación del modo normal n-ésimo de la cuerda
    en: Oscillation frequency of the n-th normal mode of the string
  unidad_si: Hz
  dimension: '[T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - afinación musical
  - análisis espectral
  - diseño de instrumentos
  common_mistake: Pensar que f_n crece linealmente con n cuando en realidad lo hace proporcionalmente
  typical_range: 82 Hz (mi grave contrabajo) a 4000 Hz (sol agudo violín)
  sign_behavior:
    has_sign: false
    meaning:
      es: Frecuencia siempre positiva por definición física
      en: Frequency always positive by physical definition
  zero_behavior:
    allowed: false
    meaning:
      es: f_n = 0 implicaría onda estacionaria sin oscilación, contradictorio
      en: f_n = 0 would imply a standing wave without oscillation, contradictory
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[20, 20000]'
  interpretation_role:
    primary_for:
    - determinación del tono musical
    secondary_for:
    - análisis del timbre
  graph_binding:
    channels:
    - y_axis_frequency
  pedagogical_notes:
    es: El oído humano percibe f_n como altura musical; múltiples f_n simultáneos crean el timbre característico.
    en: The human ear perceives f_n as musical pitch; multiple simultaneous f_n create the characteristic timbre.
- id: f_1
  symbol: f_1
  nombre:
    es: frecuencia fundamental
    en: fundamental frequency
  descripcion:
    es: Frecuencia del primer armónico (n=1), tono base del instrumento
    en: Frequency of the first harmonic (n=1), base tone of the instrument
  unidad_si: Hz
  dimension: '[T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - afinación de instrumentos
  - identificación de notas musicales
  - diseño de sistemas acústicos
  common_mistake: Confundir f_1 con la frecuencia más audible (puede ser un armónico superior si es más intenso)
  typical_range: 27.5 Hz (A0 piano) a 4186 Hz (C8 piano)
  sign_behavior:
    has_sign: false
    meaning:
      es: Frecuencia siempre positiva
      en: Frequency always positive
  zero_behavior:
    allowed: false
    meaning:
      es: f_1 = 0 implica cuerda sin tensión o infinitamente larga
      en: f_1 = 0 implies zero tension or infinitely long string
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[20, 5000]'
  interpretation_role:
    primary_for:
    - percepción de altura tonal
    secondary_for:
    - identificación melódica
  graph_binding:
    channels:
    - fundamental_marker
  pedagogical_notes:
    es: La f_1 determina la nota percibida; los armónicos superiores solo modifican el timbre.
    en: f_1 determines the perceived note; higher harmonics only modify the timbre.
