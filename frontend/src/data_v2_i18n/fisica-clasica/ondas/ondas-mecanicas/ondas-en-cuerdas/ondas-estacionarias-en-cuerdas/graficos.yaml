version: "1.0"
leaf: "ondas-estacionarias-en-cuerdas"

coord:
  title:
    es: Gráfica Coord · Ondas Estacionarias en Cuerdas
    en: Coord Graph · Standing Waves
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: elongación y(x,t) (m)
    en: displacement y(x,t) (m)
  xMagnitude: x
  yMagnitude: y
  relation:
    es: "y = 2A·cos(ωt)·sin(kx). Formada por superposición de dos ondas iguales en sentido contrario. Nodos: x = nλ/2. Antinodos: x = (2n+1)λ/4."
    en: "y = 2A·cos(ωt)·sin(kx). Formed by superposition of two equal counter-propagating waves. Nodes: x = nλ/2. Antinodes: x = (2n+1)λ/4."
  physicalReading:
    es: Los puntos no se propagan. Nodos fijos. Antinodos oscilan con amplitud 2A.
    en: Points do not propagate. Fixed nodes. Antinodes oscillate with amplitude 2A.
  slopeMeaning:
    es: "∂y/∂x: deformación local."
    en: "∂y/∂x: local deformation."
  interceptMeaning:
    es: y(0,t) = 0 si extremo fijo.
    en: y(0,t) = 0 if fixed end.
  curvatureMeaning:
    es: ∂²y/∂x² = −k²y.
    en: ∂²y/∂x² = −k²y.
  signMeaning:
    es: "Nodo: y = 0. Antinodo: |y| = 2A."
    en: "Node: y = 0. Antinode: |y| = 2A."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Ondas estacionarias.
    en: Standing waves.
  formulaConnection:
    es: y = 2A·cos(ωt)·sin(kx), fₙ = nv/(2L).
    en: y = 2A·cos(ωt)·sin(kx), fₙ = nv/(2L).
  readingFocus:
    es: identificar nodos, antinodos y amplitud 2A.
    en: identify nodes, antinodes and amplitude 2A.
  agentHints:
    es:
      - Nodos fijos.
      - Antinodo = 2A.
      - fₙ = nv/(2L).
    en:
      - Fixed nodes.
      - Antinode = 2A.
      - fₙ = nv/(2L).
  commonMistakes:
    es:
      - Onda estacionaria = onda progresiva.
      - Amplitud = A (es 2A).
      - Nodos se mueven.
    en:
      - Standing = progressive wave.
      - Amplitude = A (it is 2A).
      - Nodes move.

svg:
  title:
    es: Escena SVG · Ondas Estacionarias
    en: SVG Scene · Standing Waves
  sceneId: ondas_estacionarias
  sceneLabel:
    es: Cuerda con nodos y antinodos marcados
    en: String with nodes and antinodes marked
  objects:
    es:
      - cuerda
      - nodos (N)
      - antinodos (A)
      - longitud L
      - armónico n
    en:
      - string
      - nodes (N)
      - antinodes (A)
      - length L
      - harmonic n
  mainObject:
    es: onda estacionaria en cuerda
    en: standing wave on string
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: L = nλ/2. Nodos en x = nλ/2.
    en: L = nλ/2. Nodes at x = nλ/2.
  interactions:
    es: fₙ = nv/(2L).
    en: fₙ = nv/(2L).
  modelElements:
    es:
      - "N: nodo (y=0)"
      - "A: antinodo (y=2A)"
      - L = nλ/2
    en:
      - "N: node (y=0)"
      - "A: antinode (y=2A)"
      - L = nλ/2
  visualCues:
    es:
      - Nodos inmóviles.
      - Antinodos oscilan.
      - Patrón simétrico.
    en:
      - Nodes stationary.
      - Antinodes oscillate.
      - Symmetric pattern.
  scaleMeaning:
    es: L = longitud total.
    en: L = total length.
  relation:
    es: y = 2A·cos(ωt)·sin(kx).
    en: y = 2A·cos(ωt)·sin(kx).
  physicalReading:
    es: Nodos fijos. Antinodos con amplitud 2A.
    en: Fixed nodes. Antinodes with amplitude 2A.
  modelConnection:
    es: Ondas estacionarias.
    en: Standing waves.
  formulaConnection:
    es: fₙ = nv/(2L), L = nλ/2.
    en: fₙ = nv/(2L), L = nλ/2.
  readingFocus:
    es: contar nodos y antinodos para identificar el armónico n.
    en: count nodes and antinodes to identify harmonic n.
  agentHints:
    es:
      - Nodos = n+1.
      - Antinodos = n.
      - fₙ = nf₁.
    en:
      - Nodes = n+1.
      - Antinodes = n.
      - fₙ = nf₁.
  commonMistakes:
    es:
      - Nodos se mueven.
      - Amplitud = A.
      - f no depende de L.
    en:
      - Nodes move.
      - Amplitude = A.
      - f does not depend on L.
