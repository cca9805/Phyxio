targets:
  longitud_onda_estacionaria:
    enabled: true
    magnitude_type: derived
    semantic_role:
      es: Longitud de onda del modo estacionario n-esimo
      en: Wavelength of the n-th stationary mode
    summary_rules:
    - id: lambda_summary_large
      when: lambda_n > L
      text:
        es: '[[lambda_n]] excede la longitud fisica de la cuerda, indicando que el modo es de bajo orden (fundamental o segundo
          armonico).'
        en: '[[lambda_n]] exceeds the physical length of the string, indicating a low-order mode (fundamental or second harmonic).'
      status: ok
    - id: lambda_summary_default
      when: 'true'
      text:
        es: '[[lambda_n]] describe la periodicidad espacial del patron estacionario. Cada modo contiene exactamente n medias
          longitudes de onda.'
        en: '[[lambda_n]] describes the spatial periodicity of the stationary pattern. Each mode contains exactly n half-wavelengths.'
      status: ok
    physical_reading_rules:
    - id: lambda_reading_pattern
      when: 'true'
      text:
        es: Este valor indica la distancia entre dos puntos consecutivos que vibran en fase. En el modo n-esimo, hay [[n]]
          segmentos de longitud media longitud de onda.
        en: This value indicates the distance between two consecutive points vibrating in phase. In the n-th mode, there are
          [[n]] segments of half-wavelength length.
      status: ok
    coherence_rules:
    - id: lambda_coherence_positive
      when: lambda_n > 0
      text:
        es: La longitud de onda es positiva, coherente con una onda fisica real.
        en: Wavelength is positive, coherent with a real physical wave.
      status: ok
    - id: lambda_coherence_relation
      when: lambda_n == 2 * L / n
      text:
        es: La relacion entre [[lambda_n]], [[L]] y [[n]] es consistente con las condiciones de contorno de extremos fijos.
        en: The relation between [[lambda_n]], [[L]] and [[n]] is consistent with fixed-end boundary conditions.
      status: ok
    model_validity_rules:
    - id: lambda_validity_quantization
      when: n >= 1 and n == int(n)
      text:
        es: El numero de modo [[n]] es entero positivo, cumpliendo la cuantizacion requerida.
        en: The mode number [[n]] is a positive integer, fulfilling required quantization.
      status: ok
    graph_rules:
    - id: lambda_graph_pattern
      when: 'true'
      text:
        es: '[[lambda_n]] determina la escala espacial de la envolvente sinusoidal mostrada en el grafico. Cada ciclo completo
          corresponde a una longitud de onda.'
        en: '[[lambda_n]] determines the spatial scale of the sinusoidal envelope shown in the graph. Each complete cycle
          corresponds to a wavelength.'
      status: ok
    likely_errors:
    - id: lambda_error_confusion
      when: 'true'
      text:
        es: 'Error frecuente: confundir la longitud de onda de la onda estacionaria con la de las ondas viajeras componentes.
          Son identicas en magnitud pero el patron es diferente.'
        en: 'A common mistake is to interpret [[longitud_onda_estacionaria]] in isolation: Frequent error: confusing the standing
          wave wavelength with that of the component traveling waves. They are identical in magnitude but the pattern is different.'
      status: ok
    next_step_rules:
    - id: lambda_next_nodes
      when: 'true'
      text:
        es: Use [[lambda_n]] para calcular la posicion exacta de los nodos ubicados a multiplos enteros de media longitud
          de onda desde los extremos.
        en: Use [[lambda_n]] to calculate the exact position of nodes located at integer multiples of half-wavelength from
          the ends.
      status: ok
    physical_intuition:
    - id: longitud_onda_estacionaria_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[longitud_onda_estacionaria]] describe el estado dinámico.
        en: Intuitively, [[longitud_onda_estacionaria]] describes the dynamic state.
    limiting_cases:
    - id: longitud_onda_estacionaria_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[longitud_onda_estacionaria]].
        en: Check limiting cases of [[longitud_onda_estacionaria]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  longitud_cuerda:
    enabled: true
    magnitude_type: core
    semantic_role:
      es: Longitud geometrica de la cuerda vibrante
      en: Geometric length of the vibrating string
    summary_rules:
    - id: L_summary_range
      text:
        es: '[[L]] esta en el rango tipico de instrumentos musicales de cuerda (decimetros a metros).'
        en: '[[L]] is in the typical range of string musical instruments (decimeters to meters).'
      status: ok
      condition:
        variable: L
        gt: 0.1
        lt: 10
    - id: L_summary_default
      when: 'true'
      text:
        es: '[[L]] define el dominio espacial donde se establece el patron estacionario y determina junto con [[n]] las longitudes
          de onda permitidas.'
        en: '[[L]] defines the spatial domain where the stationary pattern establishes itself and determines, together with
          [[n]], the allowed wavelengths.'
      status: ok
    physical_reading_rules:
    - id: L_reading_boundary
      when: 'true'
      text:
        es: Este parametro geometrico establece las condiciones de contorno. Los extremos fijos en x=0 y x=[[L]] obligan a
          nodos en esos puntos.
        en: This geometric parameter establishes the boundary conditions. Fixed ends at x=0 and x=[[L]] force nodes at those
          points.
      status: ok
    coherence_rules:
    - id: L_coherence_positive
      when: L > 0
      text:
        es: La longitud es positiva, coherente con una cuerda real.
        en: Length is positive, coherent with a real string.
      status: ok
    model_validity_rules:
    - id: L_validity_macroscopic
      when: L > 0.01
      text:
        es: La longitud es macroscopica, valida para el modelo continuo de cuerda.
        en: Length is macroscopic, valid for the continuous string model.
      status: ok
    graph_rules:
    - id: L_graph_axis
      when: 'true'
      text:
        es: '[[L]] determina el limite del eje horizontal en el grafico de la onda estacionaria. Los nodos siempre aparecen
          en los extremos del intervalo [0, [[L]]].'
        en: '[[L]] determines the limit of the horizontal axis in the standing wave graph. Nodes always appear at the ends
          of the interval [0, [[L]]].'
      status: ok
    likely_errors:
    - id: L_error_vibrating
      when: 'true'
      text:
        es: 'Confundir [[longitud_cuerda]] con una lectura aislada es un error frecuente: Error frecuente: usar la longitud
          total de la cuerda en el instrumento en lugar de la porcion que realmente vibra entre dos puntos de contacto.'
        en: 'A common mistake is to interpret [[longitud_cuerda]] in isolation: Frequent error: using the total string length
          on the instrument instead of the portion that actually vibrates between two contact points.'
      status: ok
    next_step_rules:
    - id: L_next_nodes
      when: 'true'
      text:
        es: Calcule las posiciones de los nodos intermedios usando [[L]] y [[n]] mediante la formula x = m [[L]]/n.
        en: Calculate the positions of intermediate nodes using [[L]] and [[n]] via the formula x = m [[L]]/n.
      status: ok
    physical_intuition:
    - id: longitud_cuerda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[longitud_cuerda]] describe el estado dinámico.
        en: Intuitively, [[longitud_cuerda]] describes the dynamic state.
    limiting_cases:
    - id: longitud_cuerda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[longitud_cuerda]].
        en: Check limiting cases of [[longitud_cuerda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  numero_armonico:
    enabled: true
    magnitude_type: core
    semantic_role:
      es: Indice de modo o numero armonico
      en: Mode index or harmonic number
    summary_rules:
    - id: n_summary_fundamental
      when: n == 1
      text:
        es: El modo fundamental corresponde a [[n]] igual a 1, con una sola media longitud de onda en la cuerda.
        en: The fundamental mode corresponds to [[n]] equal to 1, with a single half-wavelength in the string.
      status: ok
    - id: n_summary_harmonics
      when: n > 1
      text:
        es: El modo [[n]]-esimo contiene [[n]] medias longitudes de onda y corresponde al armonico de orden [[n]].
        en: The [[n]]-th mode contains [[n]] half-wavelengths and corresponds to the [[n]]-th order harmonic.
      status: ok
    - id: n_summary_default
      when: 'true'
      text:
        es: '[[n]] etiqueta discretamente cada modo estacionario permitido, cuantizando el espectro de frecuencias.'
        en: '[[n]] discretely labels each allowed stationary mode, quantizing the frequency spectrum.'
      status: ok
    physical_reading_rules:
    - id: n_reading_quantization
      when: 'true'
      text:
        es: Este numero entero positivo es la fuente de la cuantizacion. Solo valores discretos de [[n]] producen soluciones
          fisicamente validas que satisfacen las condiciones de contorno.
        en: This positive integer is the source of quantization. Only discrete values of [[n]] produce physically valid solutions
          satisfying the boundary conditions.
      status: ok
    coherence_rules:
    - id: n_coherence_integer
      when: n >= 1 and n == int(n)
      text:
        es: '[[n]] es entero positivo, coherente con la cuantizacion del sistema.'
        en: '[[n]] is a positive integer, coherent with system quantization.'
      status: ok
    model_validity_rules:
    - id: n_validity_low
      when: n <= 10
      text:
        es: El modo es de bajo orden, donde el modelo ideal de cuerda sin rigidez es altamente preciso.
        en: The mode is of low order, where the ideal string model without stiffness is highly accurate.
      status: ok
    graph_rules:
    - id: n_graph_loops
      when: 'true'
      text:
        es: '[[n]] determina el numero de vientres (bucles) visibles en el grafico de la onda estacionaria. Cada vientre corresponde
          a una media longitud de onda.'
        en: '[[n]] determines the number of antinodes (loops) visible in the standing wave graph. Each antinode corresponds
          to a half-wavelength.'
      status: ok
    likely_errors:
    - id: n_error_zero
      when: n == 0
      text:
        es: 'Confundir [[numero_armonico]] con una lectura aislada es un error frecuente: Error critico: n=0 no representa
          un modo fisico valido. La cuerda en reposo no es un modo de vibracion.'
        en: 'A common mistake is to interpret [[numero_armonico]] in isolation: Critical error: n=0 does not represent a valid
          physical mode. The string at rest is not a vibration mode.'
      status: ok
    next_step_rules:
    - id: n_next_overtones
      when: 'true'
      text:
        es: Explore los sobretonos y su relacion con el timbre musical. Cada instrumento tiene una distribucion caracteristica
          de amplitudes entre modos.
        en: Explore overtones and their relation to musical timbre. Each instrument has a characteristic distribution of amplitudes
          among modes.
      status: ok
    physical_intuition:
    - id: numero_armonico_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[numero_armonico]] describe el estado dinámico.
        en: Intuitively, [[numero_armonico]] describes the dynamic state.
    limiting_cases:
    - id: numero_armonico_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[numero_armonico]].
        en: Check limiting cases of [[numero_armonico]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  frecuencia_modo:
    enabled: true
    magnitude_type: derived
    semantic_role:
      es: Frecuencia de oscilacion del modo n-esimo
      en: Oscillation frequency of the n-th mode
    summary_rules:
    - id: fn_summary_audible
      text:
        es: '[[f_n]] cae dentro del rango audible humano, correspondiendo a un tono musical percibible.'
        en: '[[f_n]] falls within the human audible range, corresponding to a perceivable musical tone.'
      status: ok
      condition:
        variable: f_n
        gt: 20
        lt: 20000
    - id: fn_summary_default
      when: 'true'
      text:
        es: '[[f_n]] es la frecuencia a la que todos los puntos de la cuerda oscilan simultaneamente en el modo n-esimo.'
        en: '[[f_n]] is the frequency at which all points of the string oscillate simultaneously in the n-th mode.'
      status: ok
    physical_reading_rules:
    - id: fn_reading_harmonic
      when: 'true'
      text:
        es: Este valor representa la frecuencia de resonancia del modo estacionario. El sistema solo responde eficientemente
          a frecuencias que son multiplos enteros de la fundamental.
        en: This value represents the resonance frequency of the stationary mode. The system only responds efficiently to
          frequencies that are integer multiples of the fundamental.
      status: ok
    coherence_rules:
    - id: fn_coherence_positive
      when: f_n > 0
      text:
        es: La frecuencia es positiva, coherente con una vibracion real.
        en: Frequency is positive, coherent with real vibration.
      status: ok
    - id: fn_coherence_scaling
      when: n > 0
      text:
        es: La frecuencia escala linealmente con [[n]], como esperado para el espectro armonico de una cuerda con extremos
          fijos.
        en: Frequency scales linearly with [[n]], as expected for the harmonic spectrum of a string with fixed ends.
      status: ok
    model_validity_rules:
    - id: fn_validity_range
      when: f_n > 10 and f_n < 20000
      text:
        es: La frecuencia esta en el rango audible humano tipico.
        en: Frequency is within typical human audible range.
      status: ok
    graph_rules:
    - id: fn_graph_temporal
      when: 'true'
      text:
        es: '[[f_n]] determina la frecuencia temporal de oscilacion observada en la animacion del grafico. Todos los puntos
          vibran a esta misma frecuencia.'
        en: '[[f_n]] determines the temporal oscillation frequency observed in the graph animation. All points vibrate at
          this same frequency.'
      status: ok
    likely_errors:
    - id: fn_error_ends
      when: 'true'
      text:
        es: 'Confundir [[frecuencia_modo]] con una lectura aislada es un error frecuente: Error frecuente: usar la formula
          para un extremo fijo y otro libre, que produce solo armonicos impares. Aqui ambos extremos estan fijos.'
        en: 'A common mistake is to interpret [[frecuencia_modo]] in isolation: Frequent error: using the formula for one
          fixed end and one free end, which produces only odd harmonics. Here both ends are fixed.'
      status: ok
    next_step_rules:
    - id: fn_next_harmonics
      when: 'true'
      text:
        es: Analice como la serie armonica [[f_n]] = n [[f_1]] genera el timbre caracteristico de instrumentos de cuerda.
        en: Analyze how the harmonic series [[f_n]] = n [[f_1]] generates the characteristic timbre of string instruments.
      status: ok
    physical_intuition:
    - id: frecuencia_modo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[frecuencia_modo]] describe el estado dinámico.
        en: Intuitively, [[frecuencia_modo]] describes the dynamic state.
    limiting_cases:
    - id: frecuencia_modo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[frecuencia_modo]].
        en: Check limiting cases of [[frecuencia_modo]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  velocidad_propagacion:
    enabled: true
    magnitude_type: core
    semantic_role:
      es: Velocidad de propagacion de ondas transversales
      en: Propagation velocity of transverse waves
    summary_rules:
    - id: v_summary_typical
      text:
        es: '[[v]] esta en el rango tipico de cuerdas de instrumentos musicales (decenas a centenares de m/s).'
        en: '[[v]] is in the typical range of musical instrument strings (tens to hundreds of m/s).'
      status: ok
      condition:
        variable: v
        gt: 50
        lt: 500
    - id: v_summary_default
      when: 'true'
      text:
        es: '[[v]] determina cuanto tarda una perturbacion en recorrer la cuerda y cuantas oscilaciones caben en el tiempo
          de viaje de ida y vuelta.'
        en: '[[v]] determines how long a disturbance takes to travel the string and how many oscillations fit in the round-trip
          travel time.'
      status: ok
    physical_reading_rules:
    - id: v_reading_medium
      when: 'true'
      text:
        es: Esta velocidad es propiedad del medio (cuerda) y depende de su tension y densidad lineal. Es identica para todos
          los modos en una cuerda dada.
        en: This velocity is a property of the medium (string) and depends on its tension and linear density. Is identical
          for all modes in a given string.
      status: ok
    coherence_rules:
    - id: v_coherence_positive
      when: v > 0
      text:
        es: La velocidad es positiva, coherente con propagacion real.
        en: Velocity is positive, coherent with real propagation.
      status: ok
    model_validity_rules:
    - id: v_validity_string
      when: v < 1000
      text:
        es: La velocidad es consistente con ondas transversales en cuerdas tensas ordinarias.
        en: Velocity is consistent with transverse waves in ordinary tense strings.
      status: ok
    graph_rules:
    - id: v_graph_speed
      when: 'true'
      text:
        es: '[[v]] no afecta directamente la forma espacial del grafico, pero determina la frecuencia temporal de oscilacion
          junto con la longitud.'
        en: '[[v]] does not directly affect the spatial shape of the graph, but determines the temporal oscillation frequency
          together with length.'
      status: ok
    likely_errors:
    - id: v_error_sound
      when: 'true'
      text:
        es: 'Error frecuente: confundir la velocidad de propagacion en la cuerda con la velocidad del sonido en el aire. Son
          fenomenos distintos con valores muy diferentes.'
        en: 'A common mistake is to interpret [[velocidad_propagacion]] in isolation: Frequent error: confusing the propagation
          velocity in the string with the speed of sound in air. These are distinct phenomena with very different values.'
      status: ok
    next_step_rules:
    - id: v_next_tension
      when: 'true'
      text:
        es: Relacione [[v]] con la tension y densidad lineal mediante v = sqrt(T/μ) para entender como afinar un instrumento.
        en: Relate [[v]] to tension and linear density via v = sqrt(T/μ) to understand how to tune an instrument.
      status: ok
    physical_intuition:
    - id: velocidad_propagacion_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_propagacion]] describe el estado dinámico.
        en: Intuitively, [[velocidad_propagacion]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_propagacion_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_propagacion]].
        en: Check limiting cases of [[velocidad_propagacion]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  desplazamiento_transversal:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Desplazamiento transversal instantaneo de un punto de la cuerda
      en: Instantaneous transverse displacement of a string point
    summary_rules:
    - id: y_summary_zero
      when: y == 0
      text:
        es: '[[y]] es cero, lo que indica que el punto se encuentra en su posicion de equilibrio o coincide con un nodo del
          patron estacionario.'
        en: '[[y]] is zero, indicating the point is at its equilibrium position or coincides with a node of the stationary
          pattern.'
      status: ok
    - id: y_summary_default
      when: 'true'
      text:
        es: '[[y]] representa el desplazamiento transversal en el punto y el instante especificados. Su valor varia entre
          -2A y 2A segun la posicion y el tiempo.'
        en: '[[y]] represents the transverse displacement at the specified point and instant. Its value varies between -2A
          and 2A according to position and time.'
      status: ok
    physical_reading_rules:
    - id: y_reading_field
      when: 'true'
      text:
        es: Este valor es la variable de campo de la onda estacionaria en un punto concreto. La separacion de variables permite
          interpretar la parte espacial y temporal por separado.
        en: This value is the standing wave field variable at a concrete point. The separation of variables allows interpreting
          the spatial and temporal parts separately.
      status: ok
    coherence_rules:
    - id: y_coherence_bound
      when: 'true'
      text:
        es: 'El desplazamiento esta acotado por la amplitud maxima: el valor absoluto de [[y]] no puede superar 2[[A]] en
          ningun punto ni instante.'
        en: 'The displacement is bounded by maximum amplitude: the absolute value of [[y]] cannot exceed 2[[A]] at any point
          or instant.'
      status: ok
    model_validity_rules:
    - id: y_validity_small
      when: 'true'
      text:
        es: El modelo lineal es valido cuando [[y]] es mucho menor que la longitud de la cuerda, garantizando que la aproximacion
          de pequenas oscilaciones es correcta.
        en: The linear model is valid when [[y]] is much smaller than string length, ensuring the small oscillations approximation
          holds.
      status: ok
    graph_rules:
    - id: y_graph_profile
      when: 'true'
      text:
        es: El grafico muestra el perfil de [[y]] frente a la posicion x en un instante dado. Los nodos aparecen como ceros
          permanentes y los vientres como puntos de maxima excursion.
        en: The graph shows the profile of [[y]] versus position x at a given instant. Nodes appear as permanent zeros and
          antinodes as points of maximum excursion.
      status: ok
    likely_errors:
    - id: y_error_node
      when: 'true'
      text:
        es: 'Confundir [[desplazamiento_transversal]] con una lectura aislada es un error frecuente: Error frecuente: asumir
          que [[y]] es cero en nodos a causa de que la velocidad es nula. Los nodos tienen amplitud cero permanentemente,
          no solo velocidad baja.'
        en: 'A common mistake is to interpret [[desplazamiento_transversal]] in isolation: Frequent error: assuming [[y]]
          is zero at nodes because velocity is zero there. Nodes have permanently zero amplitude, not just low velocity.'
      status: ok
    next_step_rules:
    - id: y_next_velocity
      when: 'true'
      text:
        es: Derive [[y]] respecto al tiempo para obtener la velocidad transversal del punto, que es maxima cuando los vientres
          pasan por el equilibrio.
        en: Differentiate [[y]] with respect to time to obtain the transverse velocity of the point, which is maximum when
          antinodes pass through equilibrium.
      status: ok
