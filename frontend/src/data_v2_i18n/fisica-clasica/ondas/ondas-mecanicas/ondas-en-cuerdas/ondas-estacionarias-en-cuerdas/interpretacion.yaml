  amplitud_maxima:
    enabled: true
    magnitude_type: core
    semantic_role:
      es: Amplitud de las ondas viajeras componentes
      en: Amplitude of component traveling waves
    summary_rules:
    - id: A_summary_small
      when: A < 0.01
      text:
        es: '[[A]] es pequena comparada con la longitud de onda, validando el modelo lineal de pequenas oscilaciones.'
        en: '[[A]] is small compared to wavelength, validating the small oscillation linear model.'
      status: ok
    - id: A_summary_default
      when: 'true'
      text:
        es: '[[A]] controla la intensidad de la vibracion sin afectar las frecuencias ni las formas de los modos en el modelo
          lineal.'
        en: '[[A]] controls the intensity of vibration without affecting frequencies or mode shapes in the linear model.'
      status: ok
    physical_reading_rules:
    - id: A_reading_energy
      when: 'true'
      text:
        es: La amplitud determina la energia almacenada en la onda estacionaria. Los vientres alcanzan amplitud maxima de
          2[[A]].
        en: Amplitude determines the energy stored in the standing wave. Antinodes reach maximum amplitude of 2[[A]].
      status: ok
    coherence_rules:
    - id: A_coherence_positive
      when: A > 0
      text:
        es: La amplitud es positiva, coherente con una oscilacion real.
        en: Amplitude is positive, coherent with real oscillation.
      status: ok
    - id: A_coherence_small
      when: A < L / 10
      text:
        es: La amplitud es pequena comparada con la longitud de la cuerda, consistente con el modelo lineal.
        en: Amplitude is small compared to string length, consistent with the linear model.
      status: ok
    model_validity_rules:
    - id: A_validity_linear
      when: A < 0.1 * lambda_n
      text:
        es: La amplitud satisface la condicion de pequenas oscilaciones para la validez del modelo lineal.
        en: Amplitude satisfies the small oscillation condition for linear model validity.
      status: ok
    graph_rules:
    - id: A_graph_envelope
      when: 'true'
      text:
        es: '[[A]] determina la escala vertical del grafico. La envolvente sinusoidal oscila entre valores de amplitud maxima
          +-2[[A]] en los vientres.'
        en: '[[A]] determines the vertical scale of the graph. The sinusoidal envelope oscillates between maximum amplitude
          values +-2[[A]] at antinodes.'
      status: ok
    likely_errors:
    - id: A_error_maximum
      when: 'true'
      text:
        es: 'Error frecuente: confundir la amplitud [[A]] de cada onda viajera con la amplitud maxima 2[[A]] que alcanzan
          los vientres en la superposicion.'
        en: 'A common mistake is to interpret [[amplitud_maxima]] in isolation: Frequent error: confusing the amplitude [[A]]
          of each traveling wave with the maximum amplitude 2[[A]] reached by antinodes in the superposition.'
      status: ok
    next_step_rules:
    - id: A_next_energy
      when: 'true'
      text:
        es: Calcule la energia total de la onda estacionaria proporcional al cuadrado de la amplitud y a la frecuencia.
        en: Calculate the total energy of the standing wave proportional to the square of amplitude and frequency.
      status: ok
    physical_intuition:
    - id: amplitud_maxima_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[amplitud_maxima]] describe el estado dinámico.
        en: Intuitively, [[amplitud_maxima]] describes the dynamic state.
    limiting_cases:
    - id: amplitud_maxima_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[amplitud_maxima]].
        en: Check limiting cases of [[amplitud_maxima]]
