      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  posicion_nodo:
    enabled: true
    magnitude_type: derived
    semantic_role:
      es: Posicion a lo largo de la cuerda donde la amplitud es siempre nula
      en: Position along the string where amplitude is always zero
    summary_rules:
    - id: xnodo_summary_ends_zero
      when: x_nodo == 0
      text:
        es: '[[x_nodo]] coincide con uno de los extremos fijos de la cuerda, que son siempre nodos por condicion de contorno
          independientemente del modo.'
        en: '[[x_nodo]] coincides with one of the fixed ends of the string, which are always nodes by boundary condition regardless
          of the mode.'
      status: ok
    - id: xnodo_summary_ends_L
      when: x_nodo == L
      text:
        es: '[[x_nodo]] coincide con uno de los extremos fijos de la cuerda, que son siempre nodos por condicion de contorno
          independientemente del modo.'
        en: '[[x_nodo]] coincides with one of the fixed ends of the string, which are always nodes by boundary condition regardless
          of the mode.'
      status: ok
    - id: xnodo_summary_default
      when: 'true'
      text:
        es: '[[x_nodo]] marca una posicion de interferencia destructiva permanente donde la amplitud de oscilacion es siempre
          cero para cualquier instante.'
        en: '[[x_nodo]] marks a position of permanent destructive interference where oscillation amplitude is always zero
          at any instant.'
      status: ok
    physical_reading_rules:
    - id: xnodo_reading_pattern
      when: 'true'
      text:
        es: Este punto es un nodo del patron estacionario. Aunque no se desplaza, experimenta maximas variaciones de tension
          en los momentos de mayor curvatura de la cuerda.
        en: This point is a node of the stationary pattern. Although it does not displace, it experiences maximum tension
          variations at moments of greatest string curvature.
      status: ok
    coherence_rules:
    - id: xnodo_coherence_range
      when: x_nodo >= 0 and x_nodo <= L
      text:
        es: La posicion del nodo esta dentro del dominio fisico de la cuerda, coherente con los limites de la longitud vibrante.
        en: The node position is within the physical domain of the string, coherent with the vibrating length limits.
      status: ok
    model_validity_rules:
    - id: xnodo_validity_integer
      when: 'true'
      text:
        es: La posicion del nodo es valida cuando [[m]] es entero en el rango de 0 a [[n]]. Valores no enteros de m indicarian
          error en el calculo.
        en: The node position is valid when [[m]] is an integer in the range 0 to [[n]]. Non-integer values of m would indicate
          a calculation error.
      status: ok
    graph_rules:
    - id: xnodo_graph_marker
      when: 'true'
      text:
        es: '[[x_nodo]] aparece como marcador sobre el eje x del grafico donde la envolvente de amplitud cruza el cero. Los
          extremos siempre estan marcados.'
        en: '[[x_nodo]] appears as a marker on the x-axis of the graph where the amplitude envelope crosses zero. The ends
          are always marked.'
      status: ok
    likely_errors:
    - id: xnodo_error_velocity
      when: 'true'
      text:
        es: 'Error frecuente: creer que en los nodos la velocidad transversal es nula. La velocidad transversal en el nodo
          es cero solo en los instantes de maxima amplitud general, no permanentemente.'
        en: 'A common mistake is to interpret [[posicion_nodo]] in isolation: Frequent error: believing transverse velocity
          is zero at nodes. Transverse velocity at a node is zero only at instants of maximum general amplitude, not permanently.'
      status: ok
    next_step_rules:
    - id: xnodo_next_spacing
      when: 'true'
      text:
        es: Compare la separacion entre nodos consecutivos con la media longitud de onda del modo. Deben ser iguales, lo que
          sirve como verificacion de consistencia.
        en: Compare the spacing between consecutive nodes with the half-wavelength of the mode. They should be equal, which
          serves as a consistency check.
      status: ok
