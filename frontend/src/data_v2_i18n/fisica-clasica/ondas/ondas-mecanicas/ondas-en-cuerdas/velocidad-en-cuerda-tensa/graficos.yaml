version: "1.0"
leaf: "velocidad-en-cuerda-tensa"

coord:
  title:
    es: Gráfica Coord · Velocidad de Propagación en Cuerdas
    en: Coord Graph · Propagation Speed in Strings
  xAxis:
    es: tensión T (N)
    en: tension T (N)
  yAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  xMagnitude: tension_de_la_cuerda
  yMagnitude: velocidad_de_propagacion
  relation:
    es: v = √(T/μ). μ = masa por unidad de longitud (kg/m). Mayor T o menor μ → mayor v.
    en: v = √(T/μ). μ = linear mass density (kg/m). Higher T or lower μ → higher v.
  physicalReading:
    es: v ∝ √T. v ∝ 1/√μ.
    en: v ∝ √T. v ∝ 1/√μ.
  slopeMeaning:
    es: dv/dT = 1/(2√(Tμ)).
    en: dv/dT = 1/(2√(Tμ)).
  interceptMeaning:
    es: v(T=0) = 0.
    en: v(T=0) = 0.
  curvatureMeaning:
    es: "v ∝ √T: curva cóncava."
    en: "v ∝ √T: concave curve."
  signMeaning:
    es: "v > 0."
    en: "v > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "T > 0."
    en: "T > 0."
  modelConnection:
    es: Velocidad en cuerdas.
    en: Speed in strings.
  formulaConnection:
    es: v = √(T/μ).
    en: v = √(T/μ).
  readingFocus:
    es: leer v en función de T y μ.
    en: read v as function of T and μ.
  agentHints:
    es:
      - v = √(T/μ).
      - Mayor T → mayor v.
      - Mayor μ → menor v.
    en:
      - v = √(T/μ).
      - Higher T → higher v.
      - Higher μ → lower v.
  commonMistakes:
    es:
      - v = T/μ.
      - v depende de f.
      - Mayor μ → mayor v.
    en:
      - v = T/μ.
      - v depends on f.
      - Higher μ → higher v.

