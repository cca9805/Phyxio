magnitudes:
- id: tension_de_la_cuerda
  symbol: T
  nombre:
    es: tension de la cuerda
    en: string tension
  descripcion:
    es: Fuerza longitudinal que mantiene estirada la cuerda y transmite la perturbacion.
    en: Longitudinal force that keeps the string stretched and transmits the disturbance.
  unidad_si: N
  dimension: '[M L T⁻²]'
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
  - velocidad_cuerda_tensa
  - frecuencia_desde_velocidad
  - interpretacion
  - grafico_coord
  common_mistake:
    es: Creer que duplicar [[T]] duplica directamente [[v]].
    en: Believing that doubling [[T]] directly doubles [[v]].
  typical_range: 1 N a 1000 N en cuerdas reales segun material y uso
  sign_behavior:
    has_sign: false
    meaning:
      es: Se usa como modulo positivo de traccion.
      en: Used as a positive tensile magnitude.
  zero_behavior:
    allowed: false
    meaning:
      es: Sin tension no hay cuerda tensa que transmita el modelo ideal.
      en: Without tension there is no taut string for the ideal model.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 10000]
  interpretation_role:
    primary_for:
    - causa_elastica
    secondary_for:
    - afinacion
    - respuesta_dinamica
  graph_binding:
    channels:
    - control_slider
    - elastic_scale
  pedagogical_notes:
    es: '[[T]] aporta la restauracion: mas tension hace que la perturbacion se propague mas rapido, pero con raiz cuadrada.'
    en: '[[T]] provides restoration: more tension makes the disturbance propagate faster, but through a square root.'
- id: mu
  symbol: mu
  nombre:
    es: densidad lineal
    en: linear density
  descripcion:
    es: Masa por unidad de longitud de la cuerda vibrante.
    en: Mass per unit length of the vibrating string.
  unidad_si: kg/m
  dimension: '[M L⁻¹]'
  is_vector: false
  components: []
  category: material_parameter
  physical_role: core_physical_quantity
  used_in:
  - velocidad_cuerda_tensa
  - frecuencia_desde_velocidad
  - interpretacion
  - grafico_coord
  common_mistake:
    es: Confundir masa total con [[mu]] sin dividir por la longitud efectiva.
    en: Confusing total mass with [[mu]] without dividing by effective length.
  typical_range: 0.0001 kg/m a 0.1 kg/m en hilos, cuerdas musicales y cables ligeros
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una cantidad de inercia positiva.
      en: It is a positive inertial quantity.
  zero_behavior:
    allowed: false
    meaning:
      es: Una cuerda sin masa lineal no representa un medio mecanico real.
      en: A string with no linear mass is not a real mechanical medium.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 1]
  interpretation_role:
    primary_for:
    - inercia_lineal
    secondary_for:
    - seleccion_de_material
  graph_binding:
    channels:
    - control_slider
    - inertia_scale
  pedagogical_notes:
    es: '[[mu]] frena la respuesta porque cada tramo de cuerda tiene mas inercia que acelerar.'
    en: '[[mu]] slows the response because each string segment has more inertia to accelerate.'
- id: velocidad_de_propagacion
  symbol: v
  nombre:
    es: velocidad de propagacion
    en: propagation speed
  descripcion:
    es: Rapidez con que la perturbacion transversal se desplaza a lo largo de la cuerda.
    en: Speed at which the transverse disturbance travels along the string.
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - velocidad_cuerda_tensa
  - frecuencia_desde_velocidad
  - longitud_onda_desde_velocidad
  - interpretacion
  - grafico_coord
  - grafico_svg
  common_mistake:
    es: Confundir [[v]] con la velocidad transversal instantanea de un punto de la cuerda.
    en: Confusing [[v]] with the instantaneous transverse velocity of a point on the string.
  typical_range: 10 m/s a 1000 m/s segun tension y masa lineal
  sign_behavior:
    has_sign: false
    meaning:
      es: Se interpreta como rapidez positiva; la direccion se trata aparte.
      en: Interpreted as positive speed; direction is treated separately.
  zero_behavior:
    allowed: false
    meaning:
      es: Si [[v]] se anula, no hay propagacion mecanica en el modelo.
      en: If [[v]] vanishes, there is no mechanical propagation in the model.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 5000]
  interpretation_role:
    primary_for:
    - lectura_resultado
    secondary_for:
    - frecuencia_y_longitud_de_onda
  graph_binding:
    channels:
    - y_axis
    - output_marker
    - wave_speed
  pedagogical_notes:
    es: '[[v]] no mide cuanto sube o baja la cuerda; mide cuanto avanza la informacion mecanica.'
    en: '[[v]] does not measure how fast the string moves up and down; it measures how fast mechanical information advances.'
- id: longitud_efectiva
  symbol: L
  nombre:
    es: longitud efectiva
    en: effective length
  descripcion:
    es: Tramo de cuerda que participa en la lectura de frecuencia o longitud de onda.
    en: String segment participating in the frequency or wavelength reading.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - frecuencia_desde_velocidad
  - interpretacion
  - grafico_svg
  common_mistake:
    es: Usar la longitud total del montaje cuando solo vibra una parte.
    en: Using the total setup length when only one part vibrates.
  typical_range: 0.1 m a 2 m en instrumentos y montajes didacticos
  sign_behavior:
    has_sign: false
    meaning:
      es: Distancia positiva.
      en: Positive distance.
  zero_behavior:
    allowed: false
    meaning:
      es: Longitud nula no permite una cuerda vibrante.
      en: Zero length does not allow a vibrating string.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 20]
  interpretation_role:
    primary_for:
    - escala_espacial
    secondary_for:
    - resonancia
  graph_binding:
    channels:
    - domain_visual
  pedagogical_notes:
    es: '[[L]] no fija [[v]] por si sola, pero convierte esa rapidez en frecuencias estacionarias.'
    en: '[[L]] does not set [[v]] by itself, but converts that speed into standing frequencies.'
- id: lambda
  symbol: lambda
  nombre:
    es: longitud de onda
    en: wavelength
  descripcion:
    es: Separacion espacial entre estados equivalentes de la perturbacion.
    en: Spatial separation between equivalent states of the disturbance.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: derived
  physical_role: derived
  used_in:
  - longitud_onda_desde_velocidad
  - interpretacion
  - grafico_svg
  common_mistake:
    es: Pensar que [[lambda]] cambia por tension sin considerar tambien [[f]].
    en: Thinking [[lambda]] changes with tension without also considering [[f]].
  typical_range: centimetros a metros segun frecuencia y rapidez
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una distancia positiva.
      en: It is a positive distance.
  zero_behavior:
    allowed: false
    meaning:
      es: Longitud de onda nula implicaria frecuencia sin sentido fisico.
      en: Zero wavelength would imply a physically meaningless frequency.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 100]
  interpretation_role:
    primary_for:
    - escala_onda
    secondary_for:
    - patron_visual
  graph_binding:
    channels:
    - spatial_period
  pedagogical_notes:
    es: Para una frecuencia impuesta, mayor [[v]] se traduce en mayor [[lambda]].
    en: For an imposed frequency, larger [[v]] becomes larger [[lambda]].
- id: frecuencia
  symbol: f
  nombre:
    es: frecuencia
    en: frequency
  descripcion:
    es: Numero de oscilaciones por segundo de la fuente o del modo considerado.
    en: Number of oscillations per second of the source or considered mode.
  unidad_si: Hz
  dimension: '[T⁻¹]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - longitud_onda_desde_velocidad
  - frecuencia_desde_velocidad
  - interpretacion
  common_mistake:
    es: Atribuir a [[f]] el cambio de rapidez cuando la fuente solo impone ritmo.
    en: Attributing the speed change to [[f]] when the source only imposes rhythm.
  typical_range: 1 Hz a 5000 Hz en cuerdas excitadas mecanicamente
  sign_behavior:
    has_sign: false
    meaning:
      es: Frecuencia positiva.
      en: Positive frequency.
  zero_behavior:
    allowed: false
    meaning:
      es: Frecuencia cero describe reposo, no onda periodica.
      en: Zero frequency describes rest, not a periodic wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 100000]
  interpretation_role:
    primary_for:
    - ritmo_temporal
    secondary_for:
    - longitud_de_onda
  graph_binding:
    channels:
    - input_frequency
  pedagogical_notes:
    es: '[[f]] suele venir de la fuente; el medio decide [[v]] y por tanto ajusta [[lambda]].'
    en: '[[f]] usually comes from the source; the medium decides [[v]] and therefore adjusts [[lambda]].'
