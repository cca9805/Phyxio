version: "1.0"
leaf: "ondas-longitudinales"

coord:
  title:
    es: Gráfica Coord · Ondas Longitudinales (Fluidos)
    en: Coord Graph · Longitudinal Waves (Fluids)
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento s(x,t) (m) o variación de presión Δp (Pa)
    en: displacement s(x,t) (m) or pressure variation Δp (Pa)
  xMagnitude: x
  yMagnitude: s
  relation:
    es: "Onda longitudinal: desplazamiento ∥ a v. En fluidos: v = √(B/ρ). Δp = −B·∂s/∂x. El desplazamiento y la presión están desfasados π/2."
    en: "Longitudinal wave: displacement ∥ to v. In fluids: v = √(B/ρ). Δp = −B·∂s/∂x. Displacement and pressure are π/2 out of phase."
  physicalReading:
    es: "Zonas de compresión (Δp > 0) coinciden con ∂s/∂x < 0. El sonido es una onda longitudinal en fluidos."
    en: "Compression zones (Δp > 0) coincide with ∂s/∂x < 0. Sound is a longitudinal wave in fluids."
  slopeMeaning:
    es: "∂s/∂x: deformación relativa (proporcional a Δp)."
    en: "∂s/∂x: relative deformation (proportional to Δp)."
  interceptMeaning:
    es: "s(0,0): desplazamiento inicial."
    en: "s(0,0): initial displacement."
  curvatureMeaning:
    es: "∂²s/∂t² = v²·∂²s/∂x²: ecuación de onda."
    en: "∂²s/∂t² = v²·∂²s/∂x²: wave equation."
  signMeaning:
    es: "Δp > 0: compresión. Δp < 0: rarefacción."
    en: "Δp > 0: compression. Δp < 0: rarefaction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el fluido.
    en: x within the fluid.
  modelConnection:
    es: Ondas longitudinales en fluidos.
    en: Longitudinal waves in fluids.
  formulaConnection:
    es: v = √(B/ρ), Δp = −B·∂s/∂x.
    en: v = √(B/ρ), Δp = −B·∂s/∂x.
  readingFocus:
    es: leer desfase π/2 entre desplazamiento y presión.
    en: read π/2 phase shift between displacement and pressure.
  agentHints:
    es:
      - Desplazamiento ∥ a v.
      - v = √(B/ρ).
      - Δp desfasado π/2 de s.
    en:
      - Displacement ∥ to v.
      - v = √(B/ρ).
      - Δp π/2 out of phase with s.
  commonMistakes:
    es:
      - Sonido = transversal (error).
      - Δp en fase con s (error).
      - Olvidar que v depende del fluido.
    en:
      - Sound = transverse (wrong).
      - Δp in phase with s (wrong).
      - Forgetting v depends on fluid.

svg:
  title:
    es: Escena SVG · Ondas Longitudinales (Fluidos)
    en: SVG Scene · Longitudinal Waves (Fluids)
  sceneId: ondas_longitudinales_fluidos
  sceneLabel:
    es: Compresiones y rarefacciones en el fluido
    en: Compressions and rarefactions in the fluid
  objects:
    es:
      - partículas del fluido
      - zona de compresión
      - zona de rarefacción
      - dirección v
    en:
      - fluid particles
      - compression zone
      - rarefaction zone
      - direction v
  mainObject:
    es: onda longitudinal en fluido
    en: longitudinal wave in fluid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Partículas oscilan ∥ a v. Zonas densas = compresión. Zonas dispersas = rarefacción.
    en: Particles oscillate ∥ to v. Dense zones = compression. Sparse zones = rarefaction.
  interactions:
    es: v = √(B/ρ). Δp = −B·∂s/∂x.
    en: v = √(B/ρ). Δp = −B·∂s/∂x.
  modelElements:
    es:
      - "Compresión: partículas juntas"
      - "Rarefacción: partículas separadas"
      - v ∥ desplazamiento
    en:
      - "Compression: particles close"
      - "Rarefaction: particles spread"
      - v ∥ displacement
  visualCues:
    es:
      - Zonas densas = compresión.
      - Zonas dispersas = rarefacción.
      - Oscilación ∥ a v.
    en:
      - Dense zones = compression.
      - Sparse zones = rarefaction.
      - Oscillation ∥ to v.
  scaleMeaning:
    es: Distancia entre compresiones = λ.
    en: Distance between compressions = λ.
  relation:
    es: v = √(B/ρ), Δp = −B·∂s/∂x.
    en: v = √(B/ρ), Δp = −B·∂s/∂x.
  physicalReading:
    es: El sonido en el aire es una onda longitudinal de presión.
    en: Sound in air is a longitudinal pressure wave.
  modelConnection:
    es: Ondas longitudinales.
    en: Longitudinal waves.
  formulaConnection:
    es: v = √(B/ρ).
    en: v = √(B/ρ).
  readingFocus:
    es: identificar compresiones y rarefacciones.
    en: identify compressions and rarefactions.
  agentHints:
    es:
      - Oscilación ∥ a v.
      - Compresión = densidad alta.
      - v = √(B/ρ).
    en:
      - Oscillation ∥ to v.
      - Compression = high density.
      - v = √(B/ρ).
  commonMistakes:
    es:
      - Onda transversal (error).
      - Rarefacción = extensión (confusión).
    en:
      - Transverse wave (wrong).
      - Rarefaction = extension (confusion).
