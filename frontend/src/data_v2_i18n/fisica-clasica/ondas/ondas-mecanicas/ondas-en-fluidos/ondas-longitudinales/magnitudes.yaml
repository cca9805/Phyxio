magnitudes:
- id: rapidez_de_propagacion
  symbol: v
  nombre:
    es: rapidez de propagacion
    en: propagation speed
  descripcion:
    es: Rapidez con la que la perturbacion de presion y densidad avanza a traves del medio fluido.
    en: Speed at which the pressure and density disturbance travels through the fluid medium.
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - velocidad_longitudinal_fluidos
  - longitud_onda_longitudinal
  - impedancia_acustica
  common_mistake:
    es: Confundir la rapidez de la onda con la velocidad instantanea de las moleculas del fluido.
    en: Confusing the speed of the wave with the instantaneous velocity of the fluid molecules.
  typical_range: 343 m/s en aire, 1480 m/s en agua dulce bajo condiciones estándar
  sign_behavior:
    has_sign: false
    meaning:
      es: Rapidez de propagacion escalar, siempre positiva.
      en: Wavelength propagation speed scalar, always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Un valor nulo impediria cualquier transmision de energia mecanica.
      en: A zero speed would prevent any mechanical energy transmission.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 10000]
  interpretation_role:
    primary_for:
    - rapidez
    secondary_for:
    - elasticidad_e_inercia
  graph_binding:
    channels:
    - wave_speed_marker
    - output_marker
  pedagogical_notes:
    es: '[[v]] no mide el movimiento de vaiven de los atomos; mide el ritmo al que la compresion se transmite.'
    en: '[[v]] does not measure the back-and-forth movement of atoms; it measures the rate at which compression is transmitted.'
- id: modulo_de_compresibilidad_volumetrica
  symbol: B
  nombre:
    es: modulo de compresibilidad volumetrica
    en: bulk modulus
  descripcion:
    es: Medida de la resistencia del fluido a un cambio relativo en su volumen ante un cambio de presion.
    en: Measure of the fluid's resistance to a relative change in volume under a change in pressure.
  unidad_si: Pa
  dimension: '[M L⁻¹ T⁻²]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - velocidad_longitudinal_fluidos
  common_mistake:
    es: Creer que los gases tienen un [[B]] mayor que los liquidos por ser faciles de comprimir.
    en: Believing gases have a larger [[B]] than liquids because they are easy to compress.
  typical_range: 142 kPa en aire (adiabatico), 2.2 GPa en agua dulce
  sign_behavior:
    has_sign: false
    meaning:
      es: Representa la elasticidad volumetrica, que es siempre positiva.
      en: Represents volumetric elasticity, which is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Un valor cero describiria un medio infinitamente compresible sin fuerzas de restauracion.
      en: A zero value would describe an infinitely compressible medium with no restoring forces.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 1e12]
  interpretation_role:
    primary_for:
    - causa_elastica
    secondary_for:
    - modulo_elasticidad
  graph_binding:
    channels:
    - control_slider
    - elastic_scale
  pedagogical_notes:
    es: '[[B]] aporta la restauracion en fluidos, similar a la tension en cuerdas, pero a nivel tridimensional.'
    en: '[[B]] provides the restoration in fluids, similar to tension in strings, but at a three-dimensional level.'
- id: rho
  symbol: rho
  nombre:
    es: densidad del fluido
    en: fluid density
  descripcion:
    es: Masa por unidad de volumen del medio en equilibrio.
    en: Mass per unit volume of the medium in equilibrium.
  unidad_si: kg/m³
  dimension: '[M L⁻³]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - velocidad_longitudinal_fluidos
  - impedancia_acustica
  common_mistake:
    es: Confundir densidad con masa total o ignorar como la temperatura altera su valor.
    en: Confusing density with total mass or ignoring how temperature alters its value.
  typical_range: 1.2 kg/m³ en aire, 1000 kg/m³ en agua dulce
  sign_behavior:
    has_sign: false
    meaning:
      es: La densidad de masa es una magnitud estrictamente positiva.
      en: Mass density is a strictly positive magnitude.
  zero_behavior:
    allowed: false
    meaning:
      es: La ausencia de masa elimina la inercia del medio y la posibilidad de onda.
      en: The absence of mass eliminates the medium's inertia and the possibility of a wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 20000]
  interpretation_role:
    primary_for:
    - inercia_lineal
    secondary_for:
    - impedancia
  graph_binding:
    channels:
    - control_slider
    - inertia_scale
  pedagogical_notes:
    es: '[[rho]] representa la inercia por unidad de volumen; fluidos mas densos se aceleran mas despacio.'
    en: '[[rho]] represents the inertia per unit volume; denser fluids accelerate more slowly.'
- id: lambda
  symbol: lambda
  nombre:
    es: longitud de onda
    en: wavelength
  descripcion:
    es: Distancia minima entre dos crestas de presion sucesivas (compresiones) de la onda.
    en: Minimum distance between two successive pressure crests (compressions) of the wave.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: derived
  physical_role: derived
  used_in:
  - longitud_onda_longitudinal
  common_mistake:
    es: Suponer que [[lambda]] se fija de forma mecanica sin depender del medio.
    en: Assuming that [[lambda]] is fixed mechanically without depending on the medium.
  typical_range: centimetros a metros segun la frecuencia y rapidez local
  sign_behavior:
    has_sign: false
    meaning:
      es: Distancia fisica espacial, siempre positiva.
      en: Physical spatial distance, always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Una longitud nula implicaria variaciones de presion infinitamente rapidas en el espacio.
      en: A zero wavelength would imply infinitely fast pressure variations in space.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 100]
  interpretation_role:
    primary_for:
    - escala_onda
    secondary_for:
    - patron_visual
  graph_binding:
    channels:
    - spatial_period
  pedagogical_notes:
    es: '[[lambda]] es la respuesta espacial: si [[v]] aumenta con [[f]] fija, [[lambda]] aumenta proporcionalmente.'
    en: '[[lambda]] is the spatial response: if [[v]] increases at fixed [[f]], [[lambda]] increases proportionally.'
- id: frecuencia
  symbol: f
  nombre:
    es: frecuencia
    en: frequency
  descripcion:
    es: Numero de oscilaciones por segundo que la fuente impone a las particulas del fluido.
    en: Number of oscillations per second that the source imposes on the fluid particles.
  unidad_si: Hz
  dimension: '[T⁻¹]'
  is_vector: false
  components: []
  category: parameter
  physical_role: core_physical_quantity
  used_in:
  - longitud_onda_longitudinal
  common_mistake:
    es: Atribuir a la frecuencia el cambio en la velocidad de propagacion de la onda longitudinal.
    en: Attributing the change in propagation speed of the longitudinal wave to the frequency.
  typical_range: 20 Hz a 20000 Hz para rango audible en humanos
  sign_behavior:
    has_sign: false
    meaning:
      es: Ritmo temporal de oscilaciones, siempre positivo.
      en: Temporal rate of oscillations, always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Frecuencia cero describe un fluido en equilibrio estatico, no una onda.
      en: Zero frequency describes a fluid in static equilibrium, not a wave.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 100000000]
  interpretation_role:
    primary_for:
    - ritmo_temporal
    secondary_for:
    - longitud_de_onda
  graph_binding:
    channels:
    - input_frequency
  pedagogical_notes:
    es: '[[f]] viene fijada por la fuente oscilante; el medio responde adaptando la escala espacial de la onda.'
    en: '[[f]] is fixed by the oscillating source; the medium responds by adapting the wave''s spatial scale.'
- id: impedancia_acustica
  symbol: Z
  nombre:
    es: impedancia acustica
    en: acoustic impedance
  descripcion:
    es: Oposicion que presenta el fluido a ser deformado cuando una onda de presion lo atraviesa.
    en: Opposition presented by the fluid to being deformed when a pressure wave passes through it.
  unidad_si: kg/(m²·s)
  dimension: '[M L⁻² T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: derived
  used_in:
  - impedancia_acustica
  common_mistake:
    es: Creer que la impedancia acustica mide amortiguamiento o perdida de energia mecanica.
    en: Believing acoustic impedance measures damping or mechanical energy loss.
  typical_range: 400 kg/(m²·s) en aire, 1.5e6 kg/(m²·s) en agua
  sign_behavior:
    has_sign: false
    meaning:
      es: Relacion inercia-resistencia acustica, estrictamente positiva.
      en: Inertia-resistance acoustic ratio, strictly positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Impedancia nula implicaria un vacio absoluto que no deforma mecanicamente nada.
      en: Zero impedance would imply absolute vacuum which mechanically deforms nothing.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, 1e8]
  interpretation_role:
    primary_for:
    - impedancia
    secondary_for:
    - reflexion_transmision
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: '[[Z]] determina la fraccion de onda que se refleja o transmite en la frontera entre dos fluidos.'
    en: '[[Z]] determines the fraction of the wave that reflects or transmits at the boundary between two fluids.'
