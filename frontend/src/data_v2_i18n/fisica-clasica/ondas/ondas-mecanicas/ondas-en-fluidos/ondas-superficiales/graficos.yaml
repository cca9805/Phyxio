version: "1.0"
leaf: "ondas-superficiales"

coord:
  title:
    es: Gráfica Coord · Ondas Superficiales en Sólidos
    en: Coord Graph · Surface Waves in Solids
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento superficial u (m)
    en: surface displacement u (m)
  xMagnitude: x
  yMagnitude: u
  relation:
    es: "Rayleigh: v_R ≈ 0.92·v_S. Love: v_L entre v_S del substrato y la capa. Superficiales: decaen con profundidad."
    en: "Rayleigh: v_R ≈ 0.92·v_S. Love: v_L between layer and substrate v_S. Surface: decay with depth."
  physicalReading:
    es: "Rayleigh: elíptica. Love: transversal horizontal. Ambas superficiales."
    en: "Rayleigh: elliptic. Love: horizontal transverse. Both surface."
  slopeMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  interceptMeaning:
    es: "u(0): máxima amplitud."
    en: "u(0): maximum amplitude."
  curvatureMeaning:
    es: Decaimiento en profundidad.
    en: Decay with depth.
  signMeaning:
    es: Superficial.
    en: Surface.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en la superficie.
    en: x at surface.
  modelConnection:
    es: Ondas superficiales.
    en: Surface waves.
  formulaConnection:
    es: v_R ≈ 0.92·v_S.
    en: v_R ≈ 0.92·v_S.
  readingFocus:
    es: identificar Rayleigh y Love.
    en: identify Rayleigh and Love.
  agentHints:
    es:
      - Rayleigh elíptica.
      - Love horizontal.
      - Decaen en profundidad.
    en:
      - Rayleigh elliptic.
      - Love horizontal.
      - Decay with depth.
  commonMistakes:
    es:
      - Superficiales en interior.
      - Rayleigh = Love.
    en:
      - Surface waves in bulk.
      - Rayleigh = Love.

