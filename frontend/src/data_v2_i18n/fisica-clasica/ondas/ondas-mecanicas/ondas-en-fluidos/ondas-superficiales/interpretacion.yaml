  rho:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Inercia volumetrica del fluido que resiste el movimiento ondulatorio.
      en: Volumetric inertia of the fluid that resists wave motion.
    summary_rules:
    - id: rho_summary_water
      status: ok
      text:
        es: '[[rho]] en rango de agua liquida estandar. Indica inercia ondulatoria normal; la onda superficial se propaga
          con la celeridad esperada para agua.'
        en: '[[rho]] in standard liquid water range. Indicates normal wave inertia; the surface wave propagates with the expected
          celerity for water.'
      condition:
        variable: rho
        gte: 990
        lte: 1030
    - id: rho_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] resume la inercia volumetrica del liquido que resiste los cambios de velocidad durante la propagacion
          ondulatoria. Aumentar [[rho]] disminuye [[v]] en el regimen capilar.'
        en: '[[rho]] summarises the volumetric inertia of the liquid resisting velocity changes during wave propagation. Increasing
          [[rho]] decreases [[v]] in the capillary regime.'
    physical_reading_rules:
    - id: rho_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] aparece en el denominador de la formula capilar: cuanto mayor la densidad, mas lenta la onda capilar
          porque el liquido resiste mas el movimiento. En el regimen gravitatorio, [[rho]] no aparece explicitamente en la
          formula de agua profunda.'
        en: '[[rho]] appears in the denominator of the capillary formula: the greater the density, the slower the capillary
          wave because the liquid resists motion more. In the gravity regime, [[rho]] does not appear explicitly in the deep-water
          formula.'
    coherence_rules:
    - id: rho_coherence_positive
      when: rho > 0
      status: ok
      text:
        es: '[[rho]] positiva: coherente con la existencia de un fluido real.'
        en: 'Positive [[rho]]: coherent with the existence of a real fluid.'
    - id: rho_coherence_low
      when: rho < 500
      status: warning
      text:
        es: '[[rho]] por debajo de 500 kg/m³: verificar si se trabaja con un liquido muy ligero o si hay un error de unidades.'
        en: '[[rho]] below 500 kg/m³: verify whether you are working with a very light liquid or there is a units error.'
    - id: rho_coherence_default
      when: 'true'
      status: ok
      text:
        es: 'Verificar que [[rho]] sea coherente con el liquido; agua dulce: 1000 kg/m³; agua de mar: 1025 kg/m³; mercurio:
          13600 kg/m³.'
        en: 'Verify that [[rho]] is coherent with the liquid; fresh water: 1000 kg/m³; seawater: 1025 kg/m³; mercury: 13600
          kg/m³.'
    model_validity_rules:
    - id: rho_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] valido para liquidos incompresibles en condiciones normales. La compresibilidad del agua (muy baja) es
          despreciable para estas ondas superficiales.'
        en: '[[rho]] valid for incompressible liquids under normal conditions. The compressibility of water (very low) is
          negligible for these surface waves.'
    graph_rules:
    - id: rho_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico de dispersion, [[rho]] escala inversamente la rama capilar; mayor [[rho]] baja la curva en el regimen
          de k grande.
        en: On the dispersion graph, [[rho]] inversely scales the capillary branch; larger [[rho]] lowers the curve in the
          large-k regime.
    likely_errors:
    - id: rho_error_air
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[rho]] con una lectura aislada es un error frecuente: Error frecuente: usar la densidad del aire (1.2
          kg/m³) en lugar de la del liquido (1000 kg/m³); produce [[v]] 29 veces mayor de lo correcto en el regimen capilar.'
        en: 'A common mistake is to interpret [[rho]] in isolation: Frequent error: using air density (1.2 kg/m³) instead
          of liquid density (1000 kg/m³); produces [[v]] 29 times larger than correct in the capillary regime.'
    next_step_rules:
    - id: rho_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[rho]] identificado, combinar con [[sigma]] y [[g]] para calcular la longitud de onda critica y determinar
          el regimen dominante.
        en: With [[rho]] identified, combine with [[sigma]] and [[g]] to compute the critical wavelength and determine the
          dominant regime.
    physical_intuition:
    - id: rho_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho]] describe el estado dinámico.
        en: Intuitively, [[rho]] describes the dynamic state.
    limiting_cases:
    - id: rho_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho]].
        en: Check limiting cases of [[rho]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
