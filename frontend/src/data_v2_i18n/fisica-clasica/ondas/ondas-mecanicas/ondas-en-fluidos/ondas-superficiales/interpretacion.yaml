targets:
  rapidez_de_propagacion_de_ondas_superficiales:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Resultado principal que indica la celeridad de propagacion de la onda superficial.
      en: Main result indicating the surface wave propagation celerity.
    summary_rules:
    - id: v_summary_normal
      status: ok
      text:
        es: '[[v]] indica la rapidez con la que la cresta de la onda superficial avanza en la interfaz. Un valor entre 0.2
          y 10 m/s es tipico para agua bajo condiciones normales.'
        en: '[[v]] indicates the speed at which the surface wave crest advances at the interface. A value between 0.2 and
          10 m/s is typical for water under normal conditions.'
      condition:
        variable: v
        gt: 0
        lte: 20
    - id: v_summary_high
      when: v > 20
      status: warning
      text:
        es: '[[v]] elevada; verificar que [[lambda]] y [[k]] esten en unidades SI correctas y que se aplique la formula adecuada
          al regimen.'
        en: '[[v]] is high; verify that [[lambda]] and [[k]] are in correct SI units and that the appropriate regime formula
          is applied.'
    - id: v_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v]] resume la celeridad de la onda superficial; depende del regimen dominante y describe como se propaga la
          perturbacion de la interfaz.'
        en: '[[v]] summarises the surface wave celerity; it depends on the dominant regime and describes how the interface
          disturbance propagates.'
    physical_reading_rules:
    - id: v_reading_gravity
      when: k < 3.7
      status: ok
      text:
        es: 'Con [[k]] pequeño, la gravedad domina: la onda superficial se comporta como una ola marina larga. [[v]] aumenta
          al disminuir [[k]], es decir, ondas mas largas viajan mas rapido.'
        en: 'With small [[k]], gravity dominates: the surface wave behaves as a long ocean wave. [[v]] increases as [[k]]
          decreases, meaning longer waves travel faster.'
    - id: v_reading_capillary
      when: k > 3.7
      status: ok
      text:
        es: 'Con [[k]] elevado, la tension superficial domina: la onda es capilar. [[v]] aumenta al aumentar [[k]], es decir,
          ondas mas cortas viajan mas rapido en este regimen.'
        en: 'With large [[k]], surface tension dominates: the wave is capillary. [[v]] increases as [[k]] increases, meaning
          shorter waves travel faster in this regime.'
    - id: v_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v]] depende de la competencia entre restauracion gravitatoria y capilar segun la escala espacial de la onda.'
        en: '[[v]] depends on the competition between gravitational and capillary restoration according to the spatial scale
          of the wave.'
    coherence_rules:
    - id: v_coherence_positive
      when: v > 0
      status: ok
      text:
        es: '[[v]] positiva: coherente. La rapidez de propagacion es siempre positiva por definicion.'
        en: 'Positive [[v]]: coherent. Propagation speed is always positive by definition.'
    - id: v_coherence_zero
      when: v <= 0
      status: error
      text:
        es: '[[v]] nula o negativa: incoherente fisicamente. Verificar los valores de entrada de [[g]], [[sigma]], [[rho]]
          y [[k]].'
        en: 'Zero or negative [[v]]: physically incoherent. Check input values of [[g]], [[sigma]], [[rho]] and [[k]].'
    - id: v_coherence_default
      when: 'true'
      status: ok
      text:
        es: Verificar que [[v]] sea consistente con el regimen esperado segun [[lambda]].
        en: Verify that [[v]] is consistent with the expected regime according to [[lambda]].
    model_validity_rules:
    - id: v_validity_deep
      when: 'true'
      status: ok
      text:
        es: La formula es valida en agua profunda (profundidad mayor que la mitad de [[lambda]]). En aguas someras, la formula
          incluye una correccion con tangente hiperbolica.
        en: The formula is valid in deep water (depth greater than half of [[lambda]]). In shallow water, the formula includes
          a correction with hyperbolic tangent.
    - id: v_validity_linear
      when: 'true'
      status: warning
      text:
        es: El modelo lineal asume amplitudes pequeñas; olas de gran amplitud exhiben efectos no lineales que esta formula
          no captura.
        en: The linear model assumes small amplitudes; large-amplitude waves exhibit nonlinear effects that this formula does
          not capture.
    graph_rules:
    - id: v_graph_curve
      when: 'true'
      status: ok
      text:
        es: 'En la curva de dispersion v vs k, el valor calculado de [[v]] debe ubicarse sobre la rama correspondiente al
          regimen: decreciente para gravedad, creciente para capilares.'
        en: 'On the dispersion curve v vs k, the computed [[v]] should lie on the corresponding regime branch: decreasing
          for gravity, increasing for capillaries.'
    likely_errors:
    - id: v_error_units
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[rapidez_de_propagacion_de_ondas_superficiales]] con una lectura aislada es un error frecuente: Error
          frecuente: usar [[lambda]] en cm en lugar de m al calcular [[k]]; produce [[v]] cien veces mayor o menor de lo esperado.'
        en: 'A common mistake is to interpret [[rapidez_de_propagacion_de_ondas_superficiales]] in isolation: Frequent error:
          using [[lambda]] in cm instead of m when computing [[k]]; produces [[v]] a hundred times larger or smaller than
          expected.'
    - id: v_error_regime
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[rapidez_de_propagacion_de_ondas_superficiales]] con una lectura aislada es un error frecuente: Error
          frecuente: aplicar la formula gravitatoria a ondas capilares (milimetros) o la formula capilar a olas marinas (metros);
          usar siempre [[rapidez_combinada]] para verificar.'
        en: 'A common mistake is to interpret [[rapidez_de_propagacion_de_ondas_superficiales]] in isolation: Frequent error:
          applying the gravity formula to capillary waves (millimetres) or the capillary formula to ocean waves (metres);
          always use [[rapidez_combinada]] to verify.'
    next_step_rules:
    - id: v_next_regime
      when: 'true'
      status: ok
      text:
        es: Verificar el regimen dominante comparando los terminos gravitatorio y capilar; si son similares en magnitud, usar
          la formula combinada completa.
        en: Verify the dominant regime by comparing gravitational and capillary terms; if they are similar in magnitude, use
          the full combined formula.
    physical_intuition:
    - id: rapidez_de_propagacion_de_ondas_superficiales_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rapidez_de_propagacion_de_ondas_superficiales]] describe el estado dinámico.
        en: Intuitively, [[rapidez_de_propagacion_de_ondas_superficiales]] describes the dynamic state.
    limiting_cases:
    - id: rapidez_de_propagacion_de_ondas_superficiales_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rapidez_de_propagacion_de_ondas_superficiales]].
        en: Check limiting cases of [[rapidez_de_propagacion_de_ondas_superficiales]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  numero_de_onda:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Variable espacial que determina el regimen de dispersion de la onda superficial.
      en: Spatial variable determining the dispersion regime of the surface wave.
    summary_rules:
    - id: k_summary_small
      when: k < 1
      status: ok
      text:
        es: '[[k]] pequeño indica onda larga (metrica o hectometrica): el regimen gravitatorio domina y [[v]] disminuye al
          aumentar [[k]].'
        en: 'Small [[k]] indicates a long wave (metric or hectometric): the gravity regime dominates and [[v]] decreases as
          [[k]] increases.'
    - id: k_summary_large
      when: k > 370
      status: ok
      text:
        es: '[[k]] grande indica onda capilar (milimetrica): la tension superficial domina y [[v]] aumenta al crecer [[k]].'
        en: 'Large [[k]] indicates capillary wave (millimetric): surface tension dominates and [[v]] increases as [[k]] grows.'
    - id: k_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[k]] resume la escala espacial de la onda y determina cual fuerza restauradora domina en la relacion de dispersion.'
        en: '[[k]] summarises the spatial scale of the wave and determines which restoring force dominates in the dispersion
          relation.'
    physical_reading_rules:
    - id: k_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[k]] es el numero de oscilaciones espaciales por metro. Un valor grande significa onda corta; un valor pequeño
          significa onda larga. El regimen fisico depende de si [[g]]/k supera o no a [[sigma]]k/[[rho]].'
        en: '[[k]] is the number of spatial oscillations per metre. A large value means short wave; a small value means long
          wave. The physical regime depends on whether [[g]]/k exceeds [[sigma]]k/[[rho]] or not.'
    coherence_rules:
    - id: k_coherence_positive
      when: k > 0
      status: ok
      text:
        es: '[[k]] positivo: coherente. El numero de onda es siempre positivo.'
        en: 'Positive [[k]]: coherent. Wavenumber is always positive.'
    - id: k_coherence_zero
      when: k <= 0
      status: error
      text:
        es: '[[k]] nulo o negativo: incoherente. Verificar la conversion desde [[lambda]].'
        en: 'Zero or negative [[k]]: incoherent. Check conversion from [[lambda]].'
    - id: k_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[k]] debe ser consistente con la longitud de onda observada en el experimento.'
        en: '[[k]] must be consistent with the wavelength observed in the experiment.'
    model_validity_rules:
    - id: k_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[k]] es valido mientras la longitud de onda sea mayor que la escala molecular del liquido (nanometros). Para
          [[lambda]] mayor de 0.1 mm, el modelo continuo aplica plenamente.'
        en: '[[k]] is valid as long as the wavelength is larger than the molecular scale of the liquid (nanometres). For [[lambda]]
          greater than 0.1 mm, the continuum model applies fully.'
    graph_rules:
    - id: k_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico de dispersion, [[k]] marca la posicion horizontal; a la izquierda del minimo de velocidad predomina
          el regimen gravitatorio, a la derecha el capilar.
        en: On the dispersion graph, [[k]] marks the horizontal position; to the left of the speed minimum the gravity regime
          predominates, to the right the capillary regime.
    likely_errors:
    - id: k_error_conversion
      when: 'true'
      status: warning
      text:
        es: 'Error clasico: olvidar el factor 2π al convertir [[lambda]] a [[k]]; la relacion correcta es k igual a dos pi
          dividido entre [[lambda]].'
        en: 'Classic error: forgetting the 2π factor when converting [[lambda]] to [[k]]; the correct relation is k equal
          to two pi divided by [[lambda]].'
    next_step_rules:
    - id: k_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[k]] calculado, comparar los terminos gravitatorio y capilar para elegir la formula mas precisa para el regimen.
        en: With [[k]] computed, compare the gravitational and capillary terms to choose the most accurate formula for the
          regime.
    physical_intuition:
    - id: numero_de_onda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[numero_de_onda]] describe el estado dinámico.
        en: Intuitively, [[numero_de_onda]] describes the dynamic state.
    limiting_cases:
    - id: numero_de_onda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[numero_de_onda]].
        en: Check limiting cases of [[numero_de_onda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  aceleracion_gravitatoria:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Parametro de fuerza restauradora gravitatoria; valor practicamente constante en la superficie terrestre.
      en: Gravitational restoring force parameter; practically constant value on Earth's surface.
    summary_rules:
    - id: g_summary_standard
      status: ok
      text:
        es: '[[g]] en rango terrestre estandar. Indica que la fuerza restauradora gravitatoria opera normalmente; domina la
          restauracion de ondas largas.'
        en: '[[g]] in standard terrestrial range. Indicates that the gravitational restoring force operates normally; it dominates
          the restoration of long waves.'
      condition:
        variable: g
        gte: 9.5
        lte: 10
    - id: g_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[g]] resume la fuerza restauradora gravitatoria que depende del campo gravitatorio local. Un valor de 9.81 m/s
          cuadrado es el estandar para la superficie terrestre.'
        en: '[[g]] summarises the gravitational restoring force that depends on the local gravitational field. A value of
          9.81 m/s squared is the standard for Earth''s surface.'
    physical_reading_rules:
    - id: g_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[g]] determina la rapidez de las ondas largas; duplicar [[g]] incrementaria [[v]] en un factor raiz de dos en
          el regimen gravitatorio. En la Tierra es esencialmente constante y se trata como parametro fijo.'
        en: '[[g]] determines the speed of long waves; doubling [[g]] would increase [[v]] by a factor of square root of two
          in the gravitational regime. On Earth it is essentially constant and treated as a fixed parameter.'
    coherence_rules:
    - id: g_coherence_standard
      when: g >= 9.5 && g <= 10.0
      status: ok
      text:
        es: '[[g]] coherente con valor terrestre estandar.'
        en: '[[g]] coherent with standard terrestrial value.'
    - id: g_coherence_unusual
      when: g < 9.5 || g > 10.0
      status: warning
      text:
        es: '[[g]] fuera del rango terrestre tipico; verificar si se trabaja en otro planeta o si hay un error de entrada.'
        en: '[[g]] outside typical terrestrial range; check whether you are working on another planet or there is an input
          error.'
    - id: g_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[g]] debe ser positivo y cercano a 9.81 m/s cuadrado para experimentos en la superficie terrestre.'
        en: '[[g]] must be positive and close to 9.81 m/s squared for experiments on the Earth''s surface.'
    model_validity_rules:
    - id: g_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[g]] es valido como constante en experimentos de laboratorio o en el océano. Varia en menos de 0.3% entre el
          ecuador y los polos, variacion despreciable para la mayoria de calculos.'
        en: '[[g]] is valid as a constant in laboratory experiments or in the ocean. It varies by less than 0.3% between the
          equator and the poles, a negligible variation for most calculations.'
    graph_rules:
    - id: g_graph_default
      when: 'true'
      status: ok
      text:
        es: En graficas de dispersion, [[g]] escala verticalmente la rama gravitatoria; mayor [[g]] eleva toda la curva de
          velocidad en el regimen de ondas largas.
        en: On dispersion graphs, [[g]] vertically scales the gravitational branch; larger [[g]] raises the entire speed curve
          in the long-wave regime.
    likely_errors:
    - id: g_error_units
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[aceleracion_gravitatoria]] con una lectura aislada es un error frecuente: Error frecuente: usar [[g]]
          en unidades distintas de m/s cuadrado, por ejemplo 980 cm/s cuadrado; esto produce [[v]] diez veces mayor de lo
          correcto.'
        en: 'A common mistake is to interpret [[aceleracion_gravitatoria]] in isolation: Frequent error: using [[g]] in units
          other than m/s squared, for example 980 cm/s squared; this produces [[v]] ten times larger than correct.'
    next_step_rules:
    - id: g_next_default
      when: 'true'
      status: ok
      text:
        es: Verificar que [[g]] este en m/s cuadrado antes de introducirlo en la formula; luego comparar con [[sigma]] y [[rho]]
          para identificar el regimen dominante.
        en: Verify that [[g]] is in m/s squared before entering it in the formula; then compare with [[sigma]] and [[rho]]
          to identify the dominant regime.
    physical_intuition:
    - id: aceleracion_gravitatoria_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[aceleracion_gravitatoria]] describe el estado dinámico.
        en: Intuitively, [[aceleracion_gravitatoria]] describes the dynamic state.
    limiting_cases:
    - id: aceleracion_gravitatoria_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[aceleracion_gravitatoria]].
        en: Check limiting cases of [[aceleracion_gravitatoria]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  sigma:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Coeficiente de elasticidad interfacial que controla las ondas capilares cortas.
      en: Interfacial elasticity coefficient controlling short capillary waves.
    summary_rules:
    - id: sigma_summary_water
      status: ok
      text:
        es: '[[sigma]] en rango tipico del agua pura. Indica que la interfaz tiene elasticidad capilar normal; domina la restauracion
          de ondas cortas de milimetros.'
        en: '[[sigma]] in typical range of pure water. Indicates that the interface has normal capillary elasticity; it dominates
          the restoration of short millimetre-scale waves.'
      condition:
        variable: sigma
        gte: 0.06
        lte: 0.08
    - id: sigma_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[sigma]] resume la elasticidad de la interfaz aire-liquido. Su valor depende del liquido y la temperatura; el
          agua pura tiene aproximadamente 0.072 N/m a 25 grados.'
        en: '[[sigma]] summarises the elasticity of the air-liquid interface. Its value depends on the liquid and temperature;
          pure water has approximately 0.072 N/m at 25 degrees.'
    physical_reading_rules:
    - id: sigma_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[sigma]] actua como rigidez de la interfaz frente a la curvatura: cuanto mayor es la curvatura (onda mas corta),
          mas fuerza restauradora ejerce [[sigma]]. A diferencia de [[g]], su efecto crece con [[k]].'
        en: '[[sigma]] acts as interfacial stiffness against curvature: the greater the curvature (shorter wave), the more
          restoring force [[sigma]] exerts. Unlike [[g]], its effect grows with [[k]].'
    coherence_rules:
    - id: sigma_coherence_positive
      when: sigma > 0
      status: ok
      text:
        es: '[[sigma]] positiva: coherente con la existencia de una interfaz elastica.'
        en: 'Positive [[sigma]]: coherent with the existence of an elastic interface.'
    - id: sigma_coherence_zero
      when: sigma <= 0
      status: error
      text:
        es: '[[sigma]] nula o negativa: fisicamente imposible para una interfaz liquido-gas real.'
        en: 'Zero or negative [[sigma]]: physically impossible for a real liquid-gas interface.'
    - id: sigma_coherence_default
      when: 'true'
      status: ok
      text:
        es: 'Verificar que [[sigma]] sea coherente con el liquido utilizado; agua pura: 0.072 N/m; agua jabonosa: 0.025-0.040
          N/m.'
        en: 'Verify that [[sigma]] is coherent with the liquid used; pure water: 0.072 N/m; soapy water: 0.025-0.040 N/m.'
    model_validity_rules:
    - id: sigma_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[sigma]] es valido para interfaces limpias sin peliculas solidas ni surfactantes concentrados. La presencia
          de detergente reduce [[sigma]] significativamente y altera el regimen capilar.'
        en: '[[sigma]] is valid for clean interfaces without solid films or concentrated surfactants. The presence of detergent
          reduces [[sigma]] significantly and alters the capillary regime.'
    graph_rules:
    - id: sigma_graph_default
      when: 'true'
      status: ok
      text:
        es: En el grafico de dispersion, [[sigma]] escala la rama capilar; mayor [[sigma]] eleva la curva en el regimen de
          ondas cortas (k grande).
        en: On the dispersion graph, [[sigma]] scales the capillary branch; larger [[sigma]] raises the curve in the short-wave
          regime (large k).
    likely_errors:
    - id: sigma_error_film
      when: 'true'
      status: warning
      text:
        es: 'Error conceptual frecuente: creer que [[sigma]] representa un film solido sobre el agua. Es una propiedad energetica
          de la interfaz, no una membrana.'
        en: 'A common mistake is to interpret [[sigma]] in isolation: Frequent conceptual error: thinking [[sigma]] represents
          a solid film on water. It is an energetic property of the interface, not a membrane.'
    next_step_rules:
    - id: sigma_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[sigma]] identificado, calcular la longitud capilar critica para determinar en que regimen opera la onda
          de interes.
        en: With [[sigma]] identified, compute the critical capillary length to determine in which regime the wave of interest
          operates.
    physical_intuition:
