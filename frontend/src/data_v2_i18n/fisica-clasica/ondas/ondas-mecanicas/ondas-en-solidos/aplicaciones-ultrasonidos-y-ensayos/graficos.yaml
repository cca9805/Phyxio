version: "1.0"
leaf: "aplicaciones-ultrasonidos-y-ensayos"

coord:
  title:
    es: Gráfica Coord · Ultrasonidos y Ensayos No Destructivos
    en: Coord Graph · Ultrasound and NDT
  xAxis:
    es: tiempo t (s) o profundidad x (m)
    en: time t (s) or depth x (m)
  yAxis:
    es: amplitud de eco A (u.a.)
    en: echo amplitude A (a.u.)
  xMagnitude: t
  yMagnitude: A
  relation:
    es: "t_eco = 2d/v. f > 20 kHz. Eco revela defectos internos."
    en: "t_echo = 2d/v. f > 20 kHz. Echo reveals internal defects."
  physicalReading:
    es: d = v·t_eco/2.
    en: d = v·t_echo/2.
  slopeMeaning:
    es: dt/dd = 2/v.
    en: dt/dd = 2/v.
  interceptMeaning:
    es: "t(0) = 0: pulso inicial."
    en: "t(0) = 0: initial pulse."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: "A > 0: eco."
    en: "A > 0: echo."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Ultrasonidos y END.
    en: Ultrasound and NDT.
  formulaConnection:
    es: "d = v·t/2, f > 20 kHz."
    en: "d = v·t/2, f > 20 kHz."
  readingFocus:
    es: leer t_eco y calcular d = v·t/2.
    en: read t_echo and calculate d = v·t/2.
  agentHints:
    es:
      - d = v·t/2.
      - "f > 20 kHz."
      - Eco = reflexión.
    en:
      - d = v·t/2.
      - "f > 20 kHz."
      - Echo = reflection.
  commonMistakes:
    es:
      - d = v·t (olvidan ×2).
      - Audible = ultrasonido.
    en:
      - d = v·t (forgot ×2).
      - Audible = ultrasound.

svg:
  title:
    es: Escena SVG · Ultrasonidos y Ensayos
    en: SVG Scene · Ultrasound and Testing
  sceneId: ultrasonidos_ensayos
  sceneLabel:
    es: Transductor, pieza y eco de defecto
    en: Transducer, workpiece and defect echo
  objects:
    es:
      - transductor
      - pieza
      - defecto
      - eco
    en:
      - transducer
      - workpiece
      - defect
      - echo
  mainObject:
    es: ensayo no destructivo
    en: non-destructive testing
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: d = v·t/2.
    en: d = v·t/2.
  interactions:
    es: Pulso → eco en t = 2d/v.
    en: Pulse → echo at t = 2d/v.
  modelElements:
    es:
      - Pulso emitido
      - Eco recibido
      - d = v·t/2
    en:
      - Emitted pulse
      - Received echo
      - d = v·t/2
  visualCues:
    es:
      - Flecha ida/vuelta.
      - Eco = reflexión.
    en:
      - Round-trip arrow.
      - Echo = reflection.
  scaleMeaning:
    es: t ∝ profundidad.
    en: t ∝ depth.
  relation:
    es: d = v·t/2.
    en: d = v·t/2.
  physicalReading:
    es: Eco revela defectos.
    en: Echo reveals defects.
  modelConnection:
    es: Ultrasonidos.
    en: Ultrasound.
  formulaConnection:
    es: d = v·t/2.
    en: d = v·t/2.
  readingFocus:
    es: calcular d = v·t/2.
    en: calculate d = v·t/2.
  agentHints:
    es:
      - d = v·t/2.
      - Eco = reflexión.
    en:
      - d = v·t/2.
      - Echo = reflection.
  commonMistakes:
    es:
      - d = v·t.
    en:
      - d = v·t.
