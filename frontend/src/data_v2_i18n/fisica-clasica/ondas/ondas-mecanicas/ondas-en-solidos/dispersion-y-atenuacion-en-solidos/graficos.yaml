version: "1.0"
leaf: "dispersion-y-atenuacion-en-solidos"

coord:
  title:
    es: Gráfica Coord · Dispersión y Atenuación en Sólidos
    en: Coord Graph · Dispersion and Attenuation in Solids
  xAxis:
    es: frecuencia f (Hz) o número de onda k
    en: frequency f (Hz) or wavenumber k
  yAxis:
    es: velocidad v (m/s) o amplitud A
    en: velocity v (m/s) or amplitude A
  xMagnitude: f
  yMagnitude: v
  relation:
    es: "Dispersión: v = v(f). Atenuación: A = A₀·e^(−αx)."
    en: "Dispersion: v = v(f). Attenuation: A = A₀·e^(−αx)."
  physicalReading:
    es: "Dispersión: forma del pulso cambia. Atenuación: amplitud decrece."
    en: "Dispersion: pulse shape changes. Attenuation: amplitude decreases."
  slopeMeaning:
    es: "dv/df: velocidad de grupo."
    en: "dv/df: group velocity."
  interceptMeaning:
    es: "v(0): velocidad a f = 0."
    en: "v(0): velocity at f = 0."
  curvatureMeaning:
    es: Curvatura dispersiva.
    en: Dispersive curvature.
  signMeaning:
    es: α ≥ 0.
    en: α ≥ 0.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "f > 0, x ≥ 0."
    en: "f > 0, x ≥ 0."
  modelConnection:
    es: Dispersión y atenuación.
    en: Dispersion and attenuation.
  formulaConnection:
    es: A = A₀e^(−αx), v = v(f).
    en: A = A₀e^(−αx), v = v(f).
  readingFocus:
    es: distinguir dispersión de atenuación.
    en: distinguish dispersion from attenuation.
  agentHints:
    es:
      - A ∝ e^(−αx).
      - v = v(f).
      - α ≥ 0.
    en:
      - A ∝ e^(−αx).
      - v = v(f).
      - α ≥ 0.
  commonMistakes:
    es:
      - v = cte.
      - Dispersión = atenuación.
    en:
      - v = const.
      - Dispersion = attenuation.

svg:
  title:
    es: Escena SVG · Dispersión y Atenuación
    en: SVG Scene · Dispersion and Attenuation
  sceneId: dispersion_atenuacion
  sceneLabel:
    es: Pulso dispersándose y atenuándose
    en: Pulse dispersing and attenuating
  objects:
    es:
      - pulso inicial
      - pulso dispersado
      - envolvente α
    en:
      - initial pulse
      - dispersed pulse
      - envelope α
  mainObject:
    es: onda con dispersión y atenuación
    en: wave with dispersion and attenuation
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: A = A₀e^(−αx).
    en: A = A₀e^(−αx).
  interactions:
    es: "Dispersión: forma cambia. Atenuación: altura decrece."
    en: "Dispersion: shape changes. Attenuation: height decreases."
  modelElements:
    es:
      - A = A₀e^(−αx)
      - v = v(f)
    en:
      - A = A₀e^(−αx)
      - v = v(f)
  visualCues:
    es:
      - Pulso ensanchado = dispersión.
      - Pulso más bajo = atenuación.
    en:
      - Broadened pulse = dispersion.
      - Lower pulse = attenuation.
  scaleMeaning:
    es: Altura ∝ A.
    en: Height ∝ A.
  relation:
    es: A = A₀e^(−αx).
    en: A = A₀e^(−αx).
  physicalReading:
    es: Dispersión ≠ atenuación.
    en: Dispersion ≠ attenuation.
  modelConnection:
    es: Dispersión y atenuación.
    en: Dispersion and attenuation.
  formulaConnection:
    es: A = A₀e^(−αx).
    en: A = A₀e^(−αx).
  readingFocus:
    es: distinguir dispersión de atenuación.
    en: distinguish dispersion from attenuation.
  agentHints:
    es:
      - Dispersión ≠ atenuación.
    en:
      - Dispersion ≠ attenuation.
  commonMistakes:
    es:
      - Dispersión = atenuación.
    en:
      - Dispersion = attenuation.
