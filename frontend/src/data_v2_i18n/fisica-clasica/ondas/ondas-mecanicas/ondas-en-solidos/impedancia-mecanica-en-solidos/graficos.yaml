version: "1.0"
leaf: "impedancia-mecanica-en-solidos"

coord:
  title:
    es: Gráfica Coord · Impedancia Mecánica en Sólidos
    en: Coord Graph · Mechanical Impedance in Solids
  xAxis:
    es: frecuencia f (Hz)
    en: frequency f (Hz)
  yAxis:
    es: impedancia Z (Pa·s/m)
    en: impedance Z (Pa·s/m)
  xMagnitude: f
  yMagnitude: Z
  relation:
    es: "Z = ρv. T = 4Z₁Z₂/(Z₁+Z₂)². R = [(Z₂−Z₁)/(Z₁+Z₂)]²."
    en: "Z = ρv. T = 4Z₁Z₂/(Z₁+Z₂)². R = [(Z₂−Z₁)/(Z₁+Z₂)]²."
  physicalReading:
    es: Z₁ ≈ Z₂ → T ≈ 1. R + T = 1.
    en: Z₁ ≈ Z₂ → T ≈ 1. R + T = 1.
  slopeMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  interceptMeaning:
    es: "Z(0): impedancia estática."
    en: "Z(0): static impedance."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: "Z > 0."
    en: "Z > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "f > 0."
    en: "f > 0."
  modelConnection:
    es: Impedancia mecánica.
    en: Mechanical impedance.
  formulaConnection:
    es: Z = ρv, T = 4Z₁Z₂/(Z₁+Z₂)².
    en: Z = ρv, T = 4Z₁Z₂/(Z₁+Z₂)².
  readingFocus:
    es: calcular T y R con Z₁, Z₂.
    en: calculate T and R with Z₁, Z₂.
  agentHints:
    es:
      - Z = ρv.
      - R + T = 1.
      - Z₁ ≈ Z₂ → T ≈ 1.
    en:
      - Z = ρv.
      - R + T = 1.
      - Z₁ ≈ Z₂ → T ≈ 1.
  commonMistakes:
    es:
      - Z = ρ/v.
      - R + T ≠ 1.
    en:
      - Z = ρ/v.
      - R + T ≠ 1.

