- id: velocidad_longitudinal_barra
  title:
    es: Velocidad de onda longitudinal en barra delgada
    en: Longitudinal wave speed in a thin bar
  equation: v_fase = sqrt(E_young / rho)
  latex: v = \sqrt{\frac{E}{\rho}}
  rearrangements:
  - target: v_fase
    equation: v_fase = sqrt(E_young / rho)
    latex: v = \sqrt{\frac{E}{\rho}}
  - target: modulo_de_young
    equation: E_young = rho * v_fase^2
    latex: E = \rho \cdot v^2
  - target: rho
    equation: rho = E_young / v_fase^2
    latex: \rho = \frac{E}{v^2}
  variables:
  - v_fase
  - E_young
  - rho
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La velocidad de fase longitudinal [[v_fase]] en una barra delgada depende del mГіdulo de Young [[modulo_de_young]] y la densidad
      [[rho]]. Un material rГ­gido y poco denso transmite ondas mГЎs rГЎpido.
    en: Longitudinal phase velocity [[v_fase]] in a thin bar depends on Young's modulus [[modulo_de_young]] and density [[rho]]. A
      stiff, low-density material transmits waves faster.
  constraints:
  - E_young > 0
  - rho > 0
  validity:
    es: VГЎlida para barras delgadas donde el diГЎmetro es mucho menor que la longitud de onda. Para sГіlidos extensos se usa
      el mГіdulo de onda plana.
    en: Valid for thin bars where diameter is much smaller than wavelength. For extended solids the plane wave modulus is
      used.
  dimension_check: '[L TвЃ»В№] = ([M LвЃ»В№ TвЃ»ВІ] / [M LвЃ»Ві])^ВЅ = [L TвЃ»В№] вњ“'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - velocidad_longitudinal
  - propagacion_en_solidos
  result_semantics:
    target: v_fase
    kind: scalar_unsigned
    sign_meaning:
      es: La velocidad de fase es siempre positiva; indica rapidez de propagaciГіn.
      en: Phase velocity is always positive; it indicates propagation speed.
    absolute_value_meaning:
      es: 'El valor en m/s indica cuГЎn rГЎpido viaja la perturbaciГіn. Valores tГ­picos: aluminio 5100 m/s, acero 5900 m/s, caucho
        50 m/s.'
      en: 'The value in m/s indicates how fast the disturbance travels. Typical values: aluminium 5100 m/s, steel 5900 m/s,
        rubber 50 m/s.'
  domain_checks:
  - v_fase > 0
  - v_fase tГ­picamente entre 50 y 12000 m/s para sГіlidos
  coherence_checks:
  - v_fase de acero debe ser mayor que v_fase de aluminio
  - v_fase aumenta si E_young aumenta con rho fijo
  graph_implications:
  - En grГЎfica v_fase vs material, los cerГЎmicos y metales rГ­gidos ocupan la zona superior
  pedagogical_triggers:
  - Si v_fase resulta superior a 12000 m/s, verificar que E_young estГЎ en Pa y no en GPa sin convertir
  - Si el alumno obtiene unidades de mВІ/sВІ, ha olvidado la raГ­z cuadrada
- id: velocidad_transversal
  title:
    es: Velocidad de onda transversal
    en: Transverse wave speed
  equation: v_fase = sqrt(G_mod / rho)
  latex: v_t = \sqrt{\frac{G}{\rho}}
  rearrangements:
  - target: v_fase
    equation: v_fase = sqrt(G_mod / rho)
    latex: v_t = \sqrt{\frac{G}{\rho}}
  - target: modulo_de_cizalladura
    equation: G_mod = rho * v_fase^2
    latex: G = \rho \cdot v_t^2
  - target: rho
    equation: rho = G_mod / v_fase^2
    latex: \rho = \frac{G}{v_t^2}
  variables:
  - v_fase
  - G_mod
  - rho
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La velocidad transversal depende del mГіdulo de cizalladura [[G_mod]] y la densidad [[rho]]. Los fluidos no transmiten
      ondas transversales porque su [[G_mod]] es cero.
    en: Transverse velocity depends on shear modulus [[G_mod]] and density [[rho]]. Fluids do not transmit transverse waves
      because their [[G_mod]] is zero.
  constraints:
  - G_mod > 0
  - rho > 0
  validity:
    es: VГЎlida para sГіlidos isГіtropos en rГ©gimen elГЎstico lineal. En fluidos no existe onda transversal.
    en: Valid for isotropic solids in the linear elastic regime. In fluids transverse waves do not exist.
  dimension_check: '[L TвЃ»В№] = ([M LвЃ»В№ TвЃ»ВІ] / [M LвЃ»Ві])^ВЅ = [L TвЃ»В№] вњ“'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - velocidad_transversal
  - propagacion_en_solidos
  result_semantics:
    target: v_fase
    kind: scalar_unsigned
    sign_meaning:
      es: Siempre positiva.
      en: Always positive.
    absolute_value_meaning:
      es: En sГіlidos isГіtropos, la velocidad transversal es aproximadamente 0.5 a 0.6 veces la longitudinal.
      en: In isotropic solids, transverse velocity is approximately 0.5 to 0.6 times the longitudinal one.
  domain_checks:
  - v_fase > 0
  coherence_checks:
  - v_transversal siempre menor que v_longitudinal en el mismo material
  graph_implications:
  - La curva transversal siempre queda por debajo de la longitudinal
  pedagogical_triggers:
  - Si v_transversal resulta mayor que v_longitudinal, el alumno ha usado E_young en lugar de G_mod
  - Si el alumno afirma que no hay ondas transversales en un sГіlido, recordar que G_mod > 0 en todo sГіlido
- id: relacion_dispersion
  title:
    es: RelaciГіn de dispersiГіn fundamental
    en: Fundamental dispersion relation
  equation: v_fase = f * lambda
  latex: v = f \cdot \lambda
  rearrangements:
  - target: v_fase
    equation: v_fase = f * lambda
    latex: v = f \cdot \lambda
  - target: frecuencia
    equation: f = v_fase / lambda
    latex: f = \frac{v}{\lambda}
  - target: lambda
    equation: lambda = v_fase / f
    latex: \lambda = \frac{v}{f}
  variables:
  - v_fase
  - f
  - lambda
  category: fundamental
  relation_type: identity
  physical_meaning:
    es: La velocidad de fase [[v_fase]] es el producto de la frecuencia [[f]] por la longitud de onda [[lambda]]. En medios
      no dispersivos esta relaciГіn es lineal.
    en: Phase velocity [[v_fase]] is the product of frequency [[f]] times wavelength [[lambda]]. In non-dispersive media this
      relation is linear.
  constraints:
  - f > 0
  - lambda > 0
  validity:
    es: Universalmente vГЎlida como definiciГіn. En medios dispersivos v_fase depende de la frecuencia.
    en: Universally valid as a definition. In dispersive media v_fase depends on frequency.
  dimension_check: '[L TвЃ»В№] = [TвЃ»В№] В· [L] = [L TвЃ»В№] вњ“'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria
  - ejemplos
  - interpretacion
  interpretation_tags:
  - relacion_dispersion
  - longitud_onda
  result_semantics:
    target: lambda
    kind: scalar_unsigned
    sign_meaning:
      es: Siempre positiva.
      en: Always positive.
    absolute_value_meaning:
      es: Indica la escala espacial de la perturbaciГіn en el sГіlido.
      en: Indicates the spatial scale of the disturbance in the solid.
  domain_checks:
  - lambda > 0
  coherence_checks:
  - Si f aumenta y v es constante, lambda disminuye
  graph_implications:
  - HipГ©rbola v = constante en el plano f vs lambda
  pedagogical_triggers:
  - Si lambda resulta mayor que la pieza completa, verificar que la frecuencia no se introdujo en kHz sin convertir a Hz
  - Si el alumno cree que la frecuencia cambia al cambiar de medio, recordar que solo lambda se adapta
