version: "1.0"
leaf: "introduccion"

coord:
  title:
    es: Gráfica Coord · Introducción a Ondas en Sólidos
    en: Coord Graph · Introduction to Waves in Solids
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento u (m)
    en: displacement u (m)
  xMagnitude: x
  yMagnitude: u
  relation:
    es: "P: v_P = √((λ+2μ)/ρ). S: v_S = √(μ/ρ). v_P > v_S."
    en: "P: v_P = √((λ+2μ)/ρ). S: v_S = √(μ/ρ). v_P > v_S."
  physicalReading:
    es: "v_P > v_S. P = longitudinal ∥. S = transversal ⊥."
    en: "v_P > v_S. P = longitudinal ∥. S = transverse ⊥."
  slopeMeaning:
    es: "∂u/∂x: deformación."
    en: "∂u/∂x: deformation."
  interceptMeaning:
    es: "u(0): condición inicial."
    en: "u(0): initial condition."
  curvatureMeaning:
    es: ∂²u/∂t² = v²·∂²u/∂x².
    en: ∂²u/∂t² = v²·∂²u/∂x².
  signMeaning:
    es: "u > 0 o < 0."
    en: "u > 0 or < 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el sólido.
    en: x in the solid.
  modelConnection:
    es: Ondas en sólidos.
    en: Waves in solids.
  formulaConnection:
    es: v_P = √((λ+2μ)/ρ), v_S = √(μ/ρ).
    en: v_P = √((λ+2μ)/ρ), v_S = √(μ/ρ).
  readingFocus:
    es: identificar tipo de onda y velocidad.
    en: identify wave type and speed.
  agentHints:
    es:
      - "v_P > v_S."
      - P ∥.
      - S ⊥.
    en:
      - "v_P > v_S."
      - P ∥.
      - S ⊥.
  commonMistakes:
    es:
      - "v_S > v_P."
      - P transversal.
    en:
      - "v_S > v_P."
      - P transverse.

svg:
  title:
    es: Escena SVG · Introducción Ondas en Sólidos
    en: SVG Scene · Intro Waves in Solids
  sceneId: intro_solidos
  sceneLabel:
    es: Tipos P, S y Rayleigh
    en: P, S and Rayleigh types
  objects:
    es:
      - onda P (∥)
      - onda S (⊥)
      - onda Rayleigh
    en:
      - P wave (∥)
      - S wave (⊥)
      - Rayleigh wave
  mainObject:
    es: ondas en sólido
    en: waves in solid
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: "v_P > v_S > v_R."
    en: "v_P > v_S > v_R."
  interactions:
    es: P llega primero.
    en: P arrives first.
  modelElements:
    es:
      - v_P = √((λ+2μ)/ρ)
      - v_S = √(μ/ρ)
    en:
      - v_P = √((λ+2μ)/ρ)
      - v_S = √(μ/ρ)
  visualCues:
    es:
      - P = flecha más larga.
      - Rayleigh en superficie.
    en:
      - P = longer arrow.
      - Rayleigh on surface.
  scaleMeaning:
    es: Flecha ∝ v.
    en: Arrow ∝ v.
  relation:
    es: "v_P > v_S."
    en: "v_P > v_S."
  physicalReading:
    es: P primera llegada, S segunda.
    en: P first arrival, S second.
  modelConnection:
    es: Ondas en sólidos.
    en: Waves in solids.
  formulaConnection:
    es: v_P = √((λ+2μ)/ρ).
    en: v_P = √((λ+2μ)/ρ).
  readingFocus:
    es: identificar P, S, Rayleigh.
    en: identify P, S, Rayleigh.
  agentHints:
    es:
      - "v_P > v_S."
      - P ∥, S ⊥.
    en:
      - "v_P > v_S."
      - P ∥, S ⊥.
  commonMistakes:
    es:
      - "v_S > v_P."
      - Rayleigh en interior.
    en:
      - "v_S > v_P."
      - Rayleigh in bulk.
