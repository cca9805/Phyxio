    likely_errors:
    - id: modulo_de_cizalladura_likely_error_base
      when: 'true'
      status: warning
      text:
        es: Confundir [[modulo_de_cizalladura]] con una lectura aislada es un error frecuente; debe interpretarse con el modelo, las unidades
          y el rango físico.
        en: A common mistake is to interpret [[modulo_de_cizalladura]] in isolation; it must be read with the model, units, and physical range.
    next_step_rules:
    - id: modulo_de_cizalladura_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[modulo_de_cizalladura]], revisa los límites físicos.
        en: After obtaining [[modulo_de_cizalladura]], review the physical limits.
    physical_intuition:
    - id: modulo_de_cizalladura_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[modulo_de_cizalladura]] describe el estado dinámico.
        en: Intuitively, [[modulo_de_cizalladura]] describes the dynamic state.
    limiting_cases:
    - id: modulo_de_cizalladura_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[modulo_de_cizalladura]].
        en: Check limiting cases of [[modulo_de_cizalladura]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Escala espacial de la perturbación ondulatoria
      en: Spatial scale of the wave disturbance
    summary_rules:
    - id: lambda_summary_default
      when: 'true'
      status: ok
      text:
        es: La longitud de onda [[lambda]] indica la escala espacial de la perturbación. Depende del medio (a través de [[v_fase]])
          y de la frecuencia [[f]].
        en: Wavelength [[lambda]] indicates the spatial scale of the disturbance. It depends on the medium (through [[v_fase]])
          and frequency [[f]].
    physical_reading_rules:
    - id: lambda_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda]] determina la resolución espacial: solo se pueden detectar detalles del orden de la longitud de onda
          o mayores. Para detectar defectos pequeños se necesitan frecuencias altas (longitudes de onda cortas).'
        en: '[[lambda]] determines spatial resolution: only details on the order of the wavelength or larger can be detected.
          To detect small defects, high frequencies (short wavelengths) are needed.'
    coherence_rules:
    - id: lambda_coherence_default
      when: 'true'
      status: ok
      text:
        es: Verificar que [[lambda]] sea mayor que 5 veces la dimensión transversal de la pieza para que el modelo de onda
          plana sea válido. Si no, hay que considerar modos guiados.
        en: Verify that [[lambda]] is greater than 5 times the transverse dimension of the part for the plane wave model to
          be valid. If not, guided modes must be considered.
    model_validity_rules:
    - id: lambda_validity_default
      when: 'true'
      status: ok
      text:
        es: Si [[lambda]] es comparable a las dimensiones transversales, el modelo de barra delgada o medio infinito ya no
          es aplicable. Hay que usar modelos de guía de ondas.
        en: If [[lambda]] is comparable to transverse dimensions, the thin bar or infinite medium model is no longer applicable.
          Waveguide models must be used.
    graph_rules:
    - id: lambda_graph_default
      when: 'true'
      status: ok
      text:
        es: En la gráfica, [[lambda]] decrece hiperbólicamente con la frecuencia si la velocidad es constante. Cada material
          tiene su propia curva según su [[v_fase]].
        en: In the graph, [[lambda]] decreases hyperbolically with frequency if velocity is constant. Each material has its
          own curve according to its [[v_fase]].
    likely_errors:
    - id: lambda_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: confundir [[lambda]] con la amplitud de la onda. La longitud de onda es una distancia horizontal
          (dirección de propagación), no vertical (amplitud).'
        en: 'A common mistake is to interpret [[lambda]] in isolation: Common error: confusing [[lambda]] with wave amplitude.
          Wavelength is a horizontal distance (propagation direction), not vertical (amplitude).'
    next_step_rules:
    - id: lambda_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[lambda]] calculada, comparar con las dimensiones de la pieza para verificar validez del modelo. Si se necesita
          resolver defectos menores que [[lambda]], aumentar la frecuencia.
        en: With [[lambda]] calculated, compare with part dimensions to verify model validity. If defects smaller than [[lambda]]
          need to be resolved, increase frequency.
    physical_intuition:
    - id: lambda_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda]] describe el estado dinámico.
        en: Intuitively, [[lambda]] describes the dynamic state.
    limiting_cases:
    - id: lambda_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda]].
        en: Check limiting cases of [[lambda]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  frecuencia:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Frecuencia de oscilación fijada por la fuente
      en: Oscillation frequency set by the source
    summary_rules:
    - id: f_summary_default
      when: 'true'
      status: ok
      text:
        es: La frecuencia [[f]] es un parámetro fijado por la fuente de excitación. Se conserva al pasar de un medio a otro
          y determina la longitud de onda [[lambda]] en cada material.
        en: Frequency [[f]] is a parameter set by the excitation source. It is conserved when passing between media and determines
          wavelength [[lambda]] in each material.
    physical_reading_rules:
    - id: f_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[f]] no depende del medio: la fuente vibra a una frecuencia fija independientemente del material. Al cambiar
          de medio, [[lambda]] se ajusta pero [[f]] permanece constante.'
        en: '[[f]] does not depend on the medium: the source vibrates at a fixed frequency regardless of material. When changing
          medium, [[lambda]] adjusts but [[f]] remains constant.'
    coherence_rules:
    - id: f_coherence_default
      when: 'true'
      status: ok
      text:
        es: Si el problema involucra una interfaz, verificar que [[f]] sea la misma a ambos lados. Solo cambia [[lambda]].
        en: If the problem involves an interface, verify that [[f]] is the same on both sides. Only [[lambda]] changes.
    model_validity_rules:
    - id: f_validity_default
      when: 'true'
      status: ok
      text:
        es: A frecuencias altas (longitud de onda comparable a dimensiones de la pieza), el modelo de onda plana falla. Verificar
          que [[lambda]] sea al menos 5 veces mayor que la dimensión transversal.
        en: At high frequencies (wavelength comparable to part dimensions), the plane wave model fails. Verify that [[lambda]]
          is at least 5 times greater than the transverse dimension.
    graph_rules:
    - id: f_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[f]] suele ser el eje horizontal en gráficas de dispersión. En medios no dispersivos, [[v_fase]] es constante
          y [[lambda]] decrece hiperbólicamente con [[f]].'
        en: '[[f]] is usually the horizontal axis in dispersion graphs. In non-dispersive media, [[v_fase]] is constant and
          [[lambda]] decreases hyperbolically with [[f]].'
    likely_errors:
    - id: f_error_default
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: creer que [[f]] cambia al pasar la onda a otro medio. La frecuencia se conserva siempre; solo
          la longitud de onda se adapta.'
        en: 'A common mistake is to interpret [[frecuencia]] in isolation: Common error: believing [[f]] changes when the
          wave passes to another medium. Frequency is always conserved; only wavelength adapts.'
    next_step_rules:
    - id: f_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[f]] y [[v_fase]] conocidas, calcular [[lambda]] dividiendo la velocidad entre la frecuencia. Verificar que
          la longitud de onda resultante sea coherente con el modelo de onda plana.
        en: With [[f]] and [[v_fase]] known, calculate [[lambda]] by dividing velocity by frequency. Verify that the resulting
          wavelength is consistent with the plane wave model.
    physical_intuition:
    - id: frecuencia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[frecuencia]] describe el estado dinámico.
        en: Intuitively, [[frecuencia]] describes the dynamic state.
    limiting_cases:
    - id: frecuencia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[frecuencia]].
        en: Check limiting cases of [[frecuencia]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
