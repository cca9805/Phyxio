targets:
  v_fase:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Rapidez de propagación del frente de onda en el sólido
      en: Speed of wavefront propagation in the solid
    summary_rules:
    - id: v_fase_summary_default
      when: 'true'
      status: ok
      text:
        es: La velocidad de fase calculada es [[v_fase]]. Indica la rapidez con que la perturbación se propaga por el sólido,
          determinada por la relación entre la rigidez elástica ([[E_young]] o [[G_mod]]) y la densidad [[rho]].
        en: The calculated phase velocity is [[v_fase]]. It indicates how fast the disturbance propagates through the solid,
          determined by the ratio between elastic stiffness ([[E_young]] or [[G_mod]]) and density [[rho]].
    - id: v_fase_summary_high
      when: v_fase > 8000
      status: ok
      text:
        es: La velocidad [[v_fase]] es muy alta, típica de cerámicas o materiales de alta rigidez y baja densidad. Verificar
          que los datos del material sean correctos.
        en: Velocity [[v_fase]] is very high, typical of ceramics or materials with high stiffness and low density. Verify
          that material data are correct.
    - id: v_fase_summary_low
      when: v_fase < 500
      status: warning
      text:
        es: La velocidad [[v_fase]] es muy baja, propia de elastómeros o polímeros blandos. Si el material es un metal, revisar
          los datos de entrada.
        en: Velocity [[v_fase]] is very low, characteristic of elastomers or soft polymers. If the material is a metal, check
          input data.
    physical_reading_rules:
    - id: v_fase_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v_fase]] expresa la competición entre rigidez e inercia del material. Mayor [[E_young]] (o [[G_mod]]) aumenta
          la velocidad; mayor [[rho]] la reduce. El resultado refleja cuán rápido se restaura la deformación local frente
          a cuánta masa hay que mover.'
        en: '[[v_fase]] expresses the competition between material stiffness and inertia. Higher [[E_young]] (or [[G_mod]])
          increases velocity; higher [[rho]] reduces it. The result reflects how fast local deformation is restored versus
          how much mass needs to move.'
    coherence_rules:
    - id: v_fase_coherence_longitudinal_mayor
      when: 'true'
      status: ok
      text:
        es: Verificar que la velocidad longitudinal sea siempre mayor que la transversal en el mismo material. Si no se cumple,
          hay un error en la selección del módulo elástico.
        en: Verify that longitudinal velocity is always greater than transverse in the same material. If not, there is an
          error in elastic modulus selection.
    - id: v_fase_coherence_rango
      when: 'true'
      status: ok
      text:
        es: Para sólidos de ingeniería, [[v_fase]] debe estar entre 50 m/s (elastómeros) y 12000 m/s (cerámicas avanzadas).
          Valores fuera de este rango indican error de datos o unidades.
        en: For engineering solids, [[v_fase]] must be between 50 m/s (elastomers) and 12000 m/s (advanced ceramics). Values
          outside this range indicate data or unit errors.
    model_validity_rules:
    - id: v_fase_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de onda plana es válido cuando [[lambda]] es mucho mayor que las dimensiones transversales de la pieza.
          A frecuencias altas aparecen modos guiados y la velocidad deja de ser constante.
        en: The plane wave model is valid when [[lambda]] is much greater than the transverse dimensions of the part. At high
          frequencies guided modes appear and velocity ceases to be constant.
    graph_rules:
    - id: v_fase_graph_default
      when: 'true'
      status: ok
      text:
        es: En la gráfica, [[v_fase]] aparece como valor constante si el medio es no dispersivo. Si varía con la frecuencia,
          el medio es dispersivo y el modelo simple no aplica.
        en: In the graph, [[v_fase]] appears as a constant value if the medium is non-dispersive. If it varies with frequency,
          the medium is dispersive and the simple model does not apply.
    likely_errors:
    - id: v_fase_error_raiz
      when: 'true'
      status: warning
      text:
        es: 'Error frecuente: olvidar la raíz cuadrada. Si [[v_fase]] resulta del orden de millones de m/s, falta la raíz
          en el cálculo. Verificar dimensionalmente.'
        en: 'Common error: forgetting the square root. If [[v_fase]] is on the order of millions of m/s, the root is missing
          from the calculation. Check dimensionally.'
    - id: v_fase_error_modulo
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[v_fase]] con una lectura aislada es un error frecuente: Error frecuente: usar [[E_young]] para ondas
          transversales o [[G_mod]] para longitudinales. Cada modo tiene su módulo correcto.'
        en: 'A common mistake is to interpret [[v_fase]] in isolation: Common error: using [[E_young]] for transverse waves
          or [[G_mod]] for longitudinal. Each mode has its correct modulus.'
    next_step_rules:
    - id: v_fase_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[v_fase]] conocida, calcular [[lambda]] dividiendo por la frecuencia [[f]], o determinar la impedancia mecánica
          multiplicando [[rho]] por [[v_fase]] por el área de la sección.
        en: With [[v_fase]] known, calculate [[lambda]] by dividing by frequency [[f]], or determine mechanical impedance
          by multiplying [[rho]] times [[v_fase]] times cross-sectional area.
    physical_intuition:
    - id: v_fase_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_fase]] describe el estado dinámico.
        en: Intuitively, [[v_fase]] describes the dynamic state.
    limiting_cases:
    - id: v_fase_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_fase]].
        en: Check limiting cases of [[v_fase]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  modulo_de_young:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de módulo de Young
      en: Result of Young's Modulus
    summary_rules:
    - id: modulo_de_young_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[modulo_de_young]] indica la magnitud física principal.
        en: The result [[modulo_de_young]] indicates the main physical quantity.
    physical_reading_rules:
    - id: modulo_de_young_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[modulo_de_young]] junto con su unidad y signo.
        en: Read [[modulo_de_young]] with its unit and sign.
    coherence_rules:
    - id: modulo_de_young_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba la coherencia dimensional de [[modulo_de_young]].
        en: Check the dimensional consistency of [[modulo_de_young]]
    model_validity_rules:
    - id: modulo_de_young_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[modulo_de_young]] solo dentro de la validez del modelo.
        en: Interpret [[modulo_de_young]] only within the validity of the model.
    graph_rules:
    - id: modulo_de_young_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[modulo_de_young]] con la lectura gráfica.
        en: Relate [[modulo_de_young]] to the graph.
    likely_errors:
    - id: modulo_de_young_likely_error_base
      when: 'true'
      status: warning
      text:
        es: Confundir [[modulo_de_young]] con una lectura aislada es un error frecuente; debe interpretarse con el modelo, las unidades
          y el rango físico.
        en: A common mistake is to interpret [[modulo_de_young]] in isolation; it must be read with the model, units, and physical
          range.
    next_step_rules:
    - id: modulo_de_young_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[modulo_de_young]], revisa los límites físicos.
        en: After obtaining [[modulo_de_young]], review the physical limits.
    physical_intuition:
    - id: modulo_de_young_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[modulo_de_young]] describe el estado dinámico.
        en: Intuitively, [[modulo_de_young]] describes the dynamic state.
    limiting_cases:
    - id: modulo_de_young_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[modulo_de_young]].
        en: Check limiting cases of [[modulo_de_young]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  rho:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Inercia del medio que se opone al movimiento vibratorio
      en: Medium inertia opposing vibratory motion
    summary_rules:
    - id: rho_summary_default
      when: 'true'
      status: ok
      text:
        es: 'La densidad [[rho]] representa la inercia del sólido. Aparece en el denominador de la fórmula de velocidad: mayor
          densidad implica menor [[v_fase]] a igualdad de rigidez.'
        en: 'Density [[rho]] represents solid inertia. It appears in the denominator of the velocity formula: higher density
          means lower [[v_fase]] at equal stiffness.'
    physical_reading_rules:
    - id: rho_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] está dentro de la raíz cuadrada en el denominador: duplicar la densidad reduce la velocidad en un factor
          √2. Materiales pesados como el plomo son lentos a pesar de no ser especialmente blandos.'
        en: '[[rho]] is inside the square root in the denominator: doubling density reduces velocity by a factor of √2. Heavy
          materials like lead are slow despite not being especially soft.'
    coherence_rules:
    - id: rho_coherence_default
      when: 'true'
      status: ok
      text:
        es: 'Verificar que [[rho]] esté en el rango correcto: metales 2700 a 22500 kg/m³, polímeros 900 a 1500 kg/m³, cerámicas
          2000 a 6000 kg/m³.'
        en: 'Verify that [[rho]] is in the correct range: metals 2700 to 22500 kg/m³, polymers 900 to 1500 kg/m³, ceramics
          2000 to 6000 kg/m³.'
    model_validity_rules:
    - id: rho_validity_default
      when: 'true'
      status: ok
      text:
        es: Se asume [[rho]] constante y uniforme. En materiales con gradientes de densidad (materiales graduados), la velocidad
          varía con la posición.
        en: Constant and uniform [[rho]] is assumed. In materials with density gradients (graded materials), velocity varies
          with position.
    graph_rules:
    - id: rho_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] afecta la posición vertical de todos los materiales en el gráfico: materiales más densos se desplazan
          hacia abajo (menor velocidad).'
        en: '[[rho]] affects the vertical position of all materials in the graph: denser materials shift downward (lower velocity).'
    likely_errors:
    - id: rho_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[rho]] con una lectura aislada es un error frecuente: Error frecuente: usar [[rho]] en g/cm³ sin convertir
          a kg/m³ (multiplicar por 1000). Un factor 1000 en la densidad produce un factor √1000 ≈ 31.6 en la velocidad.'
        en: 'A common mistake is to interpret [[rho]] in isolation: Common error: using [[rho]] in g/cm³ without converting
          to kg/m³ (multiply by 1000). A factor of 1000 in density produces a factor of √1000 ≈ 31.6 in velocity.'
    next_step_rules:
    - id: rho_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[rho]] y el módulo elástico apropiado, calcular [[v_fase]]. Para obtener la impedancia mecánica del medio,
          multiplicar [[rho]] por [[v_fase]] por el área de la sección.
        en: With [[rho]] and the appropriate elastic modulus, calculate [[v_fase]]. To obtain mechanical impedance of the
          medium, multiply [[rho]] times [[v_fase]] times cross-sectional area.
    physical_intuition:
    - id: rho_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho]] describe el estado dinámico.
        en: Intuitively, [[rho]] describes the dynamic state.
    limiting_cases:
    - id: rho_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho]].
        en: Check limiting cases of [[rho]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
