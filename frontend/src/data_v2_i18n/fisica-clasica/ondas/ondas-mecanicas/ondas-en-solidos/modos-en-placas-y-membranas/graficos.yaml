version: "1.0"
leaf: "modos-en-placas-y-membranas"

coord:
  title:
    es: Gráfica Coord · Modos en Placas y Membranas
    en: Coord Graph · Modes in Plates and Membranes
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento transversal w (m)
    en: transverse displacement w (m)
  xMagnitude: x
  yMagnitude: w
  relation:
    es: "Membrana: ∇²w = (1/v²)∂²w/∂t². Placa: EI∇⁴w = −ρh∂²w/∂t² (dispersiva). Modos bidimensionales (m, n)."
    en: "Membrane: ∇²w = (1/v²)∂²w/∂t². Plate: EI∇⁴w = −ρh∂²w/∂t² (dispersive). 2D modes (m, n)."
  physicalReading:
    es: "Membrana: no dispersiva. Placa: dispersiva."
    en: "Membrane: non-dispersive. Plate: dispersive."
  slopeMeaning:
    es: "∂w/∂x: pendiente."
    en: "∂w/∂x: slope."
  interceptMeaning:
    es: w = 0 en bordes fijos.
    en: w = 0 at fixed edges.
  curvatureMeaning:
    es: "∂²w/∂x²: curvatura."
    en: "∂²w/∂x²: curvature."
  signMeaning:
    es: "Nodo: w = 0."
    en: "Node: w = 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x, y en la placa.
    en: x, y in the plate.
  modelConnection:
    es: Modos en placas y membranas.
    en: Modes in plates and membranas.
  formulaConnection:
    es: ∇²w = (1/v²)∂²w/∂t².
    en: ∇²w = (1/v²)∂²w/∂t².
  readingFocus:
    es: identificar los modos (m, n) y nodos.
    en: identify modes (m, n) and nodes.
  agentHints:
    es:
      - Modos (m, n).
      - Membrana no dispersiva.
      - Placa dispersiva.
    en:
      - Modes (m, n).
      - Membrane non-dispersive.
      - Plate dispersive.
  commonMistakes:
    es:
      - Membrana = placa.
      - Modos 1D.
    en:
      - Membrane = plate.
      - 1D modes.

