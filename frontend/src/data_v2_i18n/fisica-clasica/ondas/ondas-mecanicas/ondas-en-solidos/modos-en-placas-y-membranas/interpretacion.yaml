  rho_s:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Densidad superficial de la placa; la inercia por unidad de área que se opone al movimiento vibratorio.
      en: Plate surface mass density; the inertia per unit area opposing vibratory motion.
    summary_rules:
    - id: rs_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_s]] resume la inercia superficial de la placa. Un valor elevado indica que la placa es pesada por unidad
          de área, lo que deprime las frecuencias modales. La relación entre rigidez y densidad superficial determina el espectro
          modal.'
        en: '[[rho_s]] summarizes the plate surface inertia. A high value indicates a heavy plate per unit area, which depresses
          modal frequencies. The ratio of stiffness to surface density determines the modal spectrum.'
    physical_reading_rules:
    - id: rs_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_s]] aparece en el denominador bajo la raíz en la fórmula modal. Un valor doble de [[rho_s]] reduce [[f_mn]]
          por un factor raíz de dos, mientras que un valor doble de [[rigidez_a_la_flexion_de_la_placa]] la aumenta en el mismo factor.'
        en: '[[rho_s]] appears in the denominator under the square root in the modal formula. A doubled [[rho_s]] reduces
          [[f_mn]] by a factor of square root of two, while a doubled [[rigidez_a_la_flexion_de_la_placa]] increases it by the same factor.'
    coherence_rules:
    - id: rs_coherence_positive
      when: rho_s <= 0
      status: error
      text:
        es: '[[rho_s]] debe ser positiva. Un valor nulo o negativo no tiene significado físico para una placa material.'
        en: '[[rho_s]] must be positive. A zero or negative value has no physical meaning for a material plate.'
    - id: rs_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_s]] es coherente con el producto de densidad volumétrica y espesor.'
        en: '[[rho_s]] is consistent with the product of volumetric density and thickness.'
    model_validity_rules:
    - id: rs_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_s]] es uniforme en el modelo de placa homogénea. Para placas con recubrimientos o estratificadas, usar
          la densidad superficial equivalente de la sección compuesta.'
        en: '[[rho_s]] is uniform in the homogeneous plate model. For coated or layered plates, use the equivalent surface
          density of the composite section.'
    graph_rules:
    - id: rs_graph_default
      when: 'true'
      status: ok
      text:
        es: Aumentar [[rho_s]] comprime el espectro modal hacia frecuencias más bajas. Esto se visualiza en el gráfico como
          un desplazamiento de todos los picos hacia la izquierda.
        en: Increasing [[rho_s]] compresses the modal spectrum towards lower frequencies. This is visualized in the graph
          as a leftward shift of all peaks.
    likely_errors:
    - id: rs_error_units
      when: rho_s > 10000
      status: warning
      text:
        es: 'Confundir [[rho_s]] con una lectura aislada es un error frecuente: [[rho_s]] superior a 10 000 kg/m² es excepcional.
          Verificar que no se está usando densidad volumétrica (kg/m³) en lugar de superficial (kg/m²).'
        en: 'A common mistake is to interpret [[rho_s]] in isolation: [[rho_s]] above 10 000 kg/m² is exceptional. Verify
          that volumetric density (kg/m³) is not being used instead of surface density (kg/m²).'
    - id: rs_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[rho_s]] con una lectura aislada es un error frecuente: Confirmar que [[rho_s]] ha sido calculada
          multiplicando [[rho_vol]] por [[h_placa]] antes de usarla en la fórmula de frecuencias modales.'
        en: 'A common mistake is to interpret [[rho_s]] in isolation: Confirm that [[rho_s]] has been calculated by multiplying
          [[rho_vol]] by [[h_placa]] before using it in the modal frequency formula.'
    next_step_rules:
    - id: rs_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[rho_s]] y [[rigidez_a_la_flexion_de_la_placa]] calculados, combinarlos en la fórmula de [[f_mn]] para obtener el espectro modal completo
          de la placa.
        en: With [[rho_s]] and [[rigidez_a_la_flexion_de_la_placa]] computed, combine them in the [[f_mn]] formula to obtain the complete modal spectrum
          of the plate.
    physical_intuition:
    - id: rho_s_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho_s]] describe el estado dinámico.
        en: Intuitively, [[rho_s]] describes the dynamic state.
    limiting_cases:
    - id: rho_s_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho_s]].
        en: Check limiting cases of [[rho_s]]
