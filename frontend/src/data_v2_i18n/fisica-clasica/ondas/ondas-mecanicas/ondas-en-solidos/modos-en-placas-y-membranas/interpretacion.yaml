  h_placa:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Espesor de la placa; el parámetro geométrico con mayor influencia sobre la rigidez a la flexión.
      en: Plate thickness; the geometric parameter with the greatest influence on bending stiffness.
    summary_rules:
    - id: hp_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[h_placa]] resume el espesor geométrico de la placa. Aumentar [[h_placa]] indica mayor rigidez cúbica y mayor
          masa superficial, resultando en frecuencias modales más altas. Es el parámetro de diseño más potente para controlar
          el espectro modal.'
        en: '[[h_placa]] summarizes the geometric thickness of the plate. Increasing [[h_placa]] indicates greater cubic stiffness
          and higher surface mass, resulting in higher modal frequencies. It is the most powerful design parameter for controlling
          the modal spectrum.'
    physical_reading_rules:
    - id: hp_reading_cubic
      when: h_placa > 0
      status: ok
      text:
        es: '[[h_placa]] entra al cubo en [[rigidez_a_la_flexion_de_la_placa]] y linealmente en [[rho_s]]. El cociente D/rho_s, que determina [[f_mn]],
          crece como el cuadrado de [[h_placa]]. Duplicar el espesor cuadriplica las frecuencias modales.'
        en: '[[h_placa]] enters [[rigidez_a_la_flexion_de_la_placa]] to the cube and [[rho_s]] linearly. The ratio D/rho_s, which governs [[f_mn]],
          grows as the square of [[h_placa]]. Doubling thickness quadruples modal frequencies.'
    - id: hp_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[h_placa]] es una dimensión geométrica pura; no depende del material. En la práctica, el espesor es la variable
          más accesible para el ingeniero que necesita ajustar las frecuencias de resonancia.'
        en: '[[h_placa]] is a pure geometric dimension; it does not depend on material. In practice, thickness is the most
          accessible variable for the engineer needing to adjust resonance frequencies.'
    coherence_rules:
    - id: hp_coherence_positive
      when: h_placa <= 0
      status: error
      text:
        es: '[[h_placa]] debe ser positivo. Un espesor nulo o negativo no tiene significado físico.'
        en: '[[h_placa]] must be positive. Zero or negative thickness has no physical meaning.'
    - id: hp_coherence_thin
      when: h_placa > a_dim / 10
      status: warning
      text:
        es: '[[h_placa]] es mayor que el 10 % de [[a_dim]], lo que cuestiona la hipótesis de placa delgada. Considerar el
          modelo de Mindlin para resultados más precisos.'
        en: '[[h_placa]] is greater than 10% of [[a_dim]], which questions the thin plate hypothesis. Consider the Mindlin
          model for more accurate results.'
    - id: hp_coherence_default
      when: 'true'
      status: ok
      text:
        es: El espesor [[h_placa]] es coherente con la hipótesis de placa delgada.
        en: Thickness [[h_placa]] is consistent with the thin plate hypothesis.
    model_validity_rules:
    - id: hp_validity_default
      when: 'true'
      status: ok
      text:
        es: La teoría de Kirchhoff requiere h << a, b. Si el espesor es comparable a las dimensiones en plano, usar la teoría
          de Mindlin que incorpora la deformación por cortante.
        en: Kirchhoff theory requires h << a, b. If thickness is comparable to in-plane dimensions, use Mindlin theory which
          incorporates shear deformation.
    graph_rules:
    - id: hp_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[h_placa]] no aparece en el espectro modal como eje independiente, pero aumentar [[h_placa]] desplaza todos
          los picos hacia frecuencias más altas de forma cuadrática.'
        en: '[[h_placa]] does not appear in the modal spectrum as an independent axis, but increasing [[h_placa]] shifts all
          peaks to higher frequencies quadratically.'
    likely_errors:
    - id: hp_error_units
      when: h_placa > 1
      status: warning
      text:
        es: 'Confundir [[h_placa]] con una lectura aislada es un error frecuente: [[h_placa]] superior a 1 m es inusual para
          una placa. Verificar que el valor está en metros y no en centímetros o milímetros.'
        en: 'A common mistake is to interpret [[h_placa]] in isolation: [[h_placa]] greater than 1 m is unusual for a plate.
          Verify the value is in metres and not centimetres or millimetres.'
    - id: hp_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[h_placa]] con una lectura aislada es un error frecuente: Confirmar que [[h_placa]] es el espesor
          perpendicular al plano, no una de las dimensiones en plano ([[a_dim]] o [[b_dim]]).'
        en: 'A common mistake is to interpret [[h_placa]] in isolation: Confirm that [[h_placa]] is the thickness perpendicular
          to the plane, not one of the in-plane dimensions ([[a_dim]] or [[b_dim]]).'
    next_step_rules:
    - id: hp_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[h_placa]] definido, calcular [[rho_s]] multiplicando por [[rho_vol]], y [[rigidez_a_la_flexion_de_la_placa]] usando la fórmula de
          rigidez. Ambos son necesarios para obtener [[f_mn]].
        en: With [[h_placa]] defined, compute [[rho_s]] by multiplying by [[rho_vol]], and [[rigidez_a_la_flexion_de_la_placa]] using the stiffness
          formula. Both are required to obtain [[f_mn]].
    physical_intuition:
    - id: h_placa_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[h_placa]] describe el estado dinámico.
        en: Intuitively, [[h_placa]] describes the dynamic state.
    limiting_cases:
    - id: h_placa_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[h_placa]].
        en: Check limiting cases of [[h_placa]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  f_mn:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Frecuencia natural del modo (m,n); determina en qué frecuencias puede resonar la estructura.
      en: Natural frequency of mode (m,n); determines at which frequencies the structure can resonate.
    summary_rules:
    - id: fmn_summary_high
      when: f_mn > 1000
      status: ok
      text:
        es: '[[f_mn]] indica una frecuencia modal elevada (por encima de 1 kHz). El modo resulta difícil de excitar acústicamente
          y sus líneas nodales son muy finas. Depende de la rigidez y la geometría.'
        en: '[[f_mn]] indicates a high modal frequency (above 1 kHz). The mode is hard to excite acoustically and its nodal
          lines are very fine. It depends on stiffness and geometry.'
    - id: fmn_summary_mid
      status: ok
      text:
        es: '[[f_mn]] indica una frecuencia modal en rango audible medio. El modo describe un patrón nodal con m semiperíodos
          en x y n en y, y resulta accesible a fuentes acústicas típicas.'
        en: '[[f_mn]] indicates a modal frequency in the mid-audible range. The mode describes a nodal pattern with m half-periods
          in x and n in y, accessible to typical acoustic sources.'
      condition:
        variable: f_mn
        gte: 100
        lte: 1000
    - id: fmn_summary_low
      when: f_mn < 100
      status: warning
      text:
        es: '[[f_mn]] indica una frecuencia modal baja. Para estructuras grandes o poco tensadas, esto resume una respuesta
          estructural lenta que puede acoplarse con vibraciones mecánicas de baja frecuencia.'
        en: '[[f_mn]] indicates a low modal frequency. For large or lightly tensioned structures this describes a slow structural
          response that may couple with low-frequency mechanical vibrations.'
    - id: fmn_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[f_mn]] resume la frecuencia de resonancia del modo seleccionado. Su valor depende de la rigidez o tensión,
          la densidad superficial y los índices de modo.'
        en: '[[f_mn]] summarizes the resonance frequency of the selected mode. Its value depends on stiffness or tension,
          surface mass density and mode indices.'
    physical_reading_rules:
    - id: fmn_reading_plate
      when: f_mn > 0 && D_placa > 0
      status: ok
      text:
        es: Para la placa, [[f_mn]] aumenta como el cuadrado de los índices de modo y como la raíz del cociente [[rigidez_a_la_flexion_de_la_placa]]
          / [[rho_s]]. Aumentar la rigidez o reducir la masa eleva todas las frecuencias modales.
        en: For the plate, [[f_mn]] increases as the square of mode indices and as the square root of the ratio [[rigidez_a_la_flexion_de_la_placa]]
          / [[rho_s]]. Increasing stiffness or reducing mass raises all modal frequencies.
    - id: fmn_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[f_mn]] es una frecuencia de resonancia: si una fuente externa oscila exactamente a [[f_mn]], la amplitud de
          vibración de la estructura crece indefinidamente en el modelo sin amortiguamiento.'
        en: '[[f_mn]] is a resonance frequency: if an external source oscillates exactly at [[f_mn]], the vibration amplitude
          of the structure grows indefinitely in the undamped model.'
    coherence_rules:
    - id: fmn_coherence_positive
      when: f_mn <= 0
      status: error
      text:
        es: '[[f_mn]] no puede ser cero ni negativa. Revisar que [[rigidez_a_la_flexion_de_la_placa]] o [[tension_superficial_de_la_membrana]] sean positivos y que los índices
          m, n sean al menos 1.'
        en: '[[f_mn]] cannot be zero or negative. Check that [[rigidez_a_la_flexion_de_la_placa]] or [[tension_superficial_de_la_membrana]] are positive and that indices m, n are
          at least 1.'
    - id: fmn_coherence_range
      when: f_mn > 20000
      status: warning
      text:
        es: '[[f_mn]] supera los 20 kHz. Revisar unidades de [[rigidez_a_la_flexion_de_la_placa]] (N·m), [[rho_s]] (kg/m²) y dimensiones (m). Un error
          de conversión de GPa a Pa es la causa más frecuente.'
        en: '[[f_mn]] exceeds 20 kHz. Check units of [[rigidez_a_la_flexion_de_la_placa]] (N·m), [[rho_s]] (kg/m²) and dimensions (m). A GPa to Pa
          conversion error is the most common cause.'
    - id: fmn_coherence_default
      when: 'true'
      status: ok
      text:
        es: El rango de [[f_mn]] calculado es físicamente plausible para la estructura descrita.
        en: The calculated [[f_mn]] range is physically plausible for the described structure.
    model_validity_rules:
    - id: fmn_validity_thick
      when: f_mn > 5000
      status: warning
      text:
        es: A frecuencias modales muy altas, la hipótesis de placa delgada puede dejar de ser válida. Si el espesor [[h_placa]]
          no es mucho menor que la longitud de onda, usar la teoría de Mindlin.
        en: At very high modal frequencies, the thin plate hypothesis may break down. If thickness [[h_placa]] is not much
          smaller than the wavelength, use Mindlin plate theory.
    - id: fmn_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de placa de Kirchhoff o membrana ideal es apropiado para frecuencias en el rango audible cuando la estructura
          es delgada. Los bordes deben estar realmente fijos para que la ecuación modal sea válida.
        en: Kirchhoff plate or ideal membrane model is appropriate for audible-range frequencies when the structure is thin.
          Edges must be truly fixed for the modal equation to be valid.
    graph_rules:
    - id: fmn_graph_spectrum
      when: f_mn > 0
      status: ok
      text:
        es: En el espectro modal (gráfico Coord), [[f_mn]] aparece como un pico vertical en el eje de frecuencias. Modos de
          mayor índice aparecen a la derecha con espaciado creciente.
        en: In the modal spectrum (Coord graph), [[f_mn]] appears as a vertical peak on the frequency axis. Higher-index modes
          appear to the right with increasing spacing.
    - id: fmn_graph_default
      when: 'true'
      status: ok
      text:
        es: El gráfico SVG de patrones nodales muestra las líneas o curvas de amplitud nula correspondientes al modo de frecuencia
          [[f_mn]] calculada.
        en: The SVG nodal pattern graph shows the zero-amplitude lines or curves corresponding to the mode at calculated frequency
          [[f_mn]].
    likely_errors:
    - id: fmn_error_units
      when: f_mn > 1e6
      status: error
      text:
        es: 'Confundir [[f_mn]] con una lectura aislada es un error frecuente: Frecuencia en MHz no es razonable para estructuras
          macroscópicas. El error más probable es haber introducido [[modulo_de_young]] en GPa sin convertir a Pa, o [[a_dim]] en
          mm en lugar de m.'
        en: 'A common mistake is to interpret [[f_mn]] in isolation: Frequency in MHz is not reasonable for macroscopic structures.
          The most likely error is entering [[modulo_de_young]] in GPa without converting to Pa, or [[a_dim]] in mm instead of m.'
    - id: fmn_error_indices
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[f_mn]] con una lectura aislada es un error frecuente: Verificar que los índices m y n son enteros
          positivos. Un índice cero produciría frecuencia nula, que corresponde a traslación rígida, no a un modo vibratorio.'
        en: 'A common mistake is to interpret [[f_mn]] in isolation: Verify that indices m and n are positive integers. An
          index of zero would produce zero frequency, corresponding to rigid translation, not a vibratory mode.'
    next_step_rules:
    - id: fmn_next_resonance
      when: f_mn > 0
      status: ok
      text:
