    magnitude_type: scalar_unsigned
    semantic_role:
      es: Densidad volumétrica del material de la placa; insumo para calcular la densidad superficial.
      en: Volumetric mass density of the plate material; input for computing surface mass density.
    summary_rules:
    - id: rv_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_vol]] resume la masa por unidad de volumen del material. Indica qué tan pesado es el material independientemente
          de la geometría de la placa. Materiales más densos deprimirán las frecuencias modales a través de [[rho_s]].'
        en: '[[rho_vol]] summarizes mass per unit volume of the material. It indicates how heavy the material is regardless
          of plate geometry. Denser materials will depress modal frequencies through [[rho_s]].'
    physical_reading_rules:
    - id: rv_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_vol]] multiplicado por [[h_placa]] da [[rho_s]], que entra en la fórmula modal. A igual espesor, un material
          más denso baja todas las frecuencias modales por el factor raíz del cociente de densidades.'
        en: '[[rho_vol]] multiplied by [[h_placa]] gives [[rho_s]], which enters the modal formula. At equal thickness, a
          denser material lowers all modal frequencies by the square root of the density ratio.'
    coherence_rules:
    - id: rv_coherence_positive
      when: rho_vol <= 0
      status: error
      text:
        es: '[[rho_vol]] debe ser positiva para cualquier material sólido real.'
        en: '[[rho_vol]] must be positive for any real solid material.'
    - id: rv_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_vol]] es coherente con el rango de materiales sólidos comunes: aluminio 2700 kg/m³, acero 7850 kg/m³, madera
          400–900 kg/m³.'
        en: '[[rho_vol]] is consistent with common solid materials: aluminium 2700 kg/m³, steel 7850 kg/m³, wood 400–900 kg/m³.'
    model_validity_rules:
    - id: rv_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_vol]] se asume constante en el modelo de placa homogénea. Para materiales compuestos, usar la densidad
          efectiva de la sección.'
        en: '[[rho_vol]] is assumed constant in the homogeneous plate model. For composite materials, use the effective density
          of the cross-section.'
    graph_rules:
    - id: rv_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_vol]] influye en el espectro modal a través de [[rho_s]]. Materiales más densos producen espectros desplazados
          hacia frecuencias más bajas.'
        en: '[[rho_vol]] influences the modal spectrum through [[rho_s]]. Denser materials produce spectra shifted to lower
          frequencies.'
    likely_errors:
    - id: rv_error_units
      when: rho_vol < 100
      status: warning
      text:
        es: 'Confundir [[rho_vol]] con una lectura aislada es un error frecuente: [[rho_vol]] inferior a 100 kg/m³ es inusual
          para sólidos estructurales. Verificar que el valor está en kg/m³ y no en g/cm³.'
        en: 'A common mistake is to interpret [[rho_vol]] in isolation: [[rho_vol]] below 100 kg/m³ is unusual for structural
          solids. Verify the value is in kg/m³ and not g/cm³.'
    - id: rv_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[rho_vol]] con una lectura aislada es un error frecuente: Confirmar que [[rho_vol]] corresponde al
          material de la placa, no a una carga aplicada sobre ella.'
        en: 'A common mistake is to interpret [[rho_vol]] in isolation: Confirm that [[rho_vol]] corresponds to the plate
          material, not to a load applied on it.'
    next_step_rules:
    - id: rv_next_default
      when: 'true'
      status: ok
      text:
        es: Multiplicar [[rho_vol]] por [[h_placa]] para obtener [[rho_s]], paso previo indispensable antes de calcular [[f_mn]]
          para la placa.
        en: Multiply [[rho_vol]] by [[h_placa]] to obtain [[rho_s]], an essential prior step before computing [[f_mn]] for
          the plate.
    physical_intuition:
    - id: rho_vol_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho_vol]] describe el estado dinámico.
        en: Intuitively, [[rho_vol]] describes the dynamic state.
    limiting_cases:
    - id: rho_vol_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho_vol]].
        en: Check limiting cases of [[rho_vol]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
