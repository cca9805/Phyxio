        en: The rectangular model requires straight parallel edges. For irregular geometries, modal frequencies must be computed
          numerically.
    graph_rules:
    - id: ad_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[a_dim]] controla la escala espacial del patrón nodal en el eje x. En el gráfico SVG, las líneas nodales perpendiculares
          al eje x están separadas por [[a_dim]]/m.'
        en: '[[a_dim]] controls the spatial scale of the nodal pattern along the x axis. In the SVG graph, nodal lines perpendicular
