    semantic_role:
      es: Longitud de la placa o membrana en la dirección x; junto con el índice m determina la escala espacial del modo en
        esa dirección.
      en: Plate or membrane length in the x direction; together with index m determines the spatial scale of the mode in that
        direction.
    summary_rules:
    - id: ad_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[a_dim]] resume la dimensión principal de la estructura. Aumentar [[a_dim]] reduce las frecuencias modales en
          la dirección x porque permite longtitudes de onda más largas. Es un parámetro puramente geométrico.'
        en: '[[a_dim]] summarizes the main structural dimension. Increasing [[a_dim]] reduces modal frequencies in the x direction
          because it allows longer wavelengths. It is a purely geometric parameter.'
    physical_reading_rules:
    - id: ad_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[a_dim]] aparece en el término (m/a)² de la fórmula modal. Al duplicar [[a_dim]], el término (m/a)² disminuye
          a la cuarta parte, reduciendo [[f_mn]] a la mitad para el modo dominante en x.'
        en: '[[a_dim]] appears in the (m/a)² term of the modal formula. Doubling [[a_dim]] reduces the (m/a)² term to one
          quarter, halving [[f_mn]] for the x-dominant mode.'
    coherence_rules:
    - id: ad_coherence_positive
      when: a_dim <= 0
      status: error
      text:
        es: '[[a_dim]] debe ser positiva. Una dimensión nula o negativa no tiene sentido físico.'
        en: '[[a_dim]] must be positive. Zero or negative dimension has no physical meaning.'
    - id: ad_coherence_default
      when: 'true'
