  rho_lin:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Masa por unidad de longitud; la inercia lineal que se opone a la aceleración transversal de la viga.
      en: Mass per unit length; the linear inertia opposing transverse acceleration of the beam.
    summary_rules:
    - id: rl_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_lin]] resume la inercia lineal de la viga. Un valor elevado indica una viga pesada por metro que vibra
          con menor velocidad de fase. La relación entre rigidez EI e inercia [[rho_lin]] determina la velocidad de propagación.'
        en: '[[rho_lin]] summarizes the beam linear inertia. A high value indicates a heavy beam per metre that vibrates at
          lower phase velocity. The ratio of stiffness EI to inertia [[rho_lin]] determines propagation speed.'
    physical_reading_rules:
    - id: rl_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_lin]] aparece en el denominador bajo la raíz cuarta. Duplicar [[rho_lin]] reduce [[v_fase_flex]] por el
          factor 2^(1/4) ≈ 1.19. Es equivalente a multiplicar la densidad o el área.'
        en: '[[rho_lin]] appears in the denominator under the fourth root. Doubling [[rho_lin]] reduces [[v_fase_flex]] by
          the factor 2^(1/4) ≈ 1.19. This is equivalent to multiplying density or area.'
    coherence_rules:
    - id: rl_coherence_positive
      when: rho_lin <= 0
      status: error
      text:
        es: '[[rho_lin]] debe ser positiva para una viga material.'
        en: '[[rho_lin]] must be positive for a material beam.'
    - id: rl_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_lin]] es coherente con el producto de densidad volumétrica y área de la sección.'
        en: '[[rho_lin]] is consistent with the product of volumetric density and cross-sectional area.'
    model_validity_rules:
    - id: rl_validity_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_lin]] se asume constante en el modelo de sección uniforme. Para vigas con sección variable o material no
          homogéneo, la masa lineal puede variar a lo largo del eje.'
        en: '[[rho_lin]] is assumed constant in the uniform section model. For beams with variable section or non-homogeneous
          material, linear mass may vary along the axis.'
    graph_rules:
    - id: rl_graph_default
      when: 'true'
      status: ok
      text:
        es: Mayor [[rho_lin]] deprime la curva de dispersión, reduciendo todas las velocidades a la misma frecuencia.
        en: Higher [[rho_lin]] depresses the dispersion curve, reducing all velocities at the same frequency.
    likely_errors:
    - id: rl_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[rho_lin]] con una lectura aislada es un error frecuente: Verificar que [[rho_lin]] se ha calculado
          como [[rho_vol]] × [[A_seccion]] y que ambos están en unidades SI (kg/m³ y m²).'
        en: 'A common mistake is to interpret [[rho_lin]] in isolation: Verify that [[rho_lin]] has been computed as [[rho_vol]]
          × [[A_seccion]] and both are in SI units (kg/m³ and m²).'
    next_step_rules:
    - id: rl_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[rho_lin]] y EI calculados, sustituir en la fórmula de [[v_fase_flex]] para obtener la velocidad de fase
          a la frecuencia [[omega]] deseada.
        en: With [[rho_lin]] and EI computed, substitute in the [[v_fase_flex]] formula to obtain phase velocity at the desired
          frequency [[omega]].
    physical_intuition:
    - id: rho_lin_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho_lin]] describe el estado dinámico.
        en: Intuitively, [[rho_lin]] describes the dynamic state.
    limiting_cases:
    - id: rho_lin_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho_lin]].
        en: Check limiting cases of [[rho_lin]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  v_grupo_flex:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Velocidad de transporte de energía de la onda de flexión; el doble de la velocidad de fase en Euler-Bernoulli.
      en: Energy transport speed of the bending wave; twice the phase velocity in Euler-Bernoulli.
    summary_rules:
    - id: vg_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_grupo_flex]] resume la velocidad a la que un pulso de flexión transporta energía. Es exactamente el doble
          de [[v_fase_flex]] en el modelo de Euler-Bernoulli, consecuencia de la dispersión cuadrática.'
        en: '[[v_grupo_flex]] summarizes the speed at which a bending pulse transports energy. It is exactly twice [[v_fase_flex]]
          in the Euler-Bernoulli model, a consequence of quadratic dispersion.'
    physical_reading_rules:
    - id: vg_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v_grupo_flex]] indica cuánto tarda un impacto en recorrer la viga. Un golpe en un extremo llega al otro a esta
          velocidad. La energía siempre viaja más rápido que la fase individual.'
        en: '[[v_grupo_flex]] indicates how long an impact takes to travel the beam. A blow at one end arrives at the other
          at this speed. Energy always travels faster than the individual phase.'
    coherence_rules:
    - id: vg_coherence_ratio
      when: v_grupo_flex < v_fase_flex
      status: error
      text:
        es: '[[v_grupo_flex]] no puede ser menor que [[v_fase_flex]] en ondas flexionales de Euler-Bernoulli. La relación
          correcta es v_g igual a 2·v_f. Revisar el cálculo.'
        en: '[[v_grupo_flex]] cannot be less than [[v_fase_flex]] in Euler-Bernoulli flexural waves. The correct relation
          is v_g equals 2·v_f. Check the calculation.'
    - id: vg_coherence_default
      when: 'true'
      status: ok
      text:
        es: La relación [[v_grupo_flex]] igual a dos veces [[v_fase_flex]] se verifica correctamente.
        en: The relation [[v_grupo_flex]] equals twice [[v_fase_flex]] is correctly verified.
    model_validity_rules:
    - id: vg_validity_default
      when: 'true'
      status: ok
      text:
        es: La relación exacta v_g igual a 2·v_f es específica del modelo de Euler-Bernoulli. En Timoshenko, v_g crece más
          lentamente con la frecuencia y se satura en la velocidad de onda de cortante.
        en: The exact relation v_g equals 2·v_f is specific to the Euler-Bernoulli model. In Timoshenko, v_g grows more slowly
          with frequency and saturates at the shear wave speed.
    graph_rules:
    - id: vg_graph_default
      when: 'true'
      status: ok
      text:
        es: En el gráfico de dispersión, [[v_grupo_flex]] es la curva superior, exactamente al doble de [[v_fase_flex]]. Ambas
          curvas crecen con la raíz de la frecuencia pero con pendientes distintas en la misma proporción 2:1.
        en: In the dispersion graph, [[v_grupo_flex]] is the upper curve, exactly at double [[v_fase_flex]]. Both curves grow
          with the square root of frequency but with slopes in the same 2:1 ratio.
    likely_errors:
    - id: vg_error_equal
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[v_grupo_flex]] con una lectura aislada es un error frecuente: Si [[v_grupo_flex]] resulta igual a
          [[v_fase_flex]], se ha confundido con un medio no dispersivo. En ondas flexionales v_g es siempre el doble de v_f.'
        en: If [[v_grupo_flex]] equals [[v_fase_flex]], a non-dispersive medium has been assumed. In flexural waves v_g is
          always twice v_f.
    next_step_rules:
    - id: vg_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[v_grupo_flex]] conocida, estimar el tiempo de llegada de un pulso dividiendo la longitud de la viga entre
          [[v_grupo_flex]]. Verificar si el modelo de Euler-Bernoulli sigue siendo válido a esa frecuencia.
        en: With [[v_grupo_flex]] known, estimate pulse arrival time by dividing beam length by [[v_grupo_flex]]. Verify whether
          the Euler-Bernoulli model remains valid at that frequency.
    physical_intuition:
    - id: v_grupo_flex_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_grupo_flex]] describe el estado dinámico.
        en: Intuitively, [[v_grupo_flex]] describes the dynamic state.
    limiting_cases:
    - id: v_grupo_flex_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_grupo_flex]].
        en: Check limiting cases of [[v_grupo_flex]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  k_flex:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Número de onda flexional; define la escala espacial del patrón de deformación de la viga.
      en: Flexural wavenumber; defines the spatial scale of the beam deformation pattern.
    summary_rules:
    - id: kf_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[k_flex]] resume la componente espacial de la onda de flexión. Un valor elevado indica longitud de onda corta
          y deformación finamente distribuida a lo largo de la viga.'
        en: '[[k_flex]] summarizes the spatial component of the bending wave. A high value indicates short wavelength and
          finely distributed deformation along the beam.'
    physical_reading_rules:
    - id: kf_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[k_flex]] crece como la raíz cuadrada de [[omega]] (no linealmente). Si se duplica la frecuencia, k solo se
          multiplica por la raíz de 2. Esto contrasta con ondas no dispersivas donde k es directamente proporcional a omega.'
        en: '[[k_flex]] grows as the square root of [[omega]] (not linearly). If frequency doubles, k only multiplies by the
          square root of 2. This contrasts with non-dispersive waves where k is directly proportional to omega.'
    coherence_rules:
    - id: kf_coherence_positive
      when: k_flex <= 0
      status: error
      text:
        es: '[[k_flex]] debe ser positivo para una onda propagante.'
        en: '[[k_flex]] must be positive for a propagating wave.'
    - id: kf_coherence_default
      when: 'true'
      status: ok
      text:
        es: El valor de [[k_flex]] es coherente con los parámetros de la viga y la frecuencia.
        en: The value of [[k_flex]] is consistent with beam parameters and frequency.
    model_validity_rules:
    - id: kf_validity_thick
      when: k_flex > 100
      status: warning
      text:
        es: '[[k_flex]] elevado implica longitud de onda corta. Si la longitud de onda resultante es menor que 6 veces el
          espesor, el modelo de Euler-Bernoulli no es adecuado.'
        en: High [[k_flex]] implies short wavelength. If the resulting wavelength is less than 6 times the thickness, the
          Euler-Bernoulli model is inadequate.
    - id: kf_validity_default
      when: 'true'
      status: ok
      text:
        es: El número de onda está en el rango de validez del modelo de viga delgada.
        en: The wavenumber is in the validity range of the slender beam model.
    graph_rules:
    - id: kf_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[k_flex]] es el eje horizontal en la curva de dispersión. La forma parabólica omega vs k muestra que a medida
          que k aumenta, omega crece como k². La tangente a la curva en un punto da la velocidad de grupo.'
        en: '[[k_flex]] is the horizontal axis in the dispersion curve. The parabolic shape omega vs k shows that as k increases,
          omega grows as k². The tangent to the curve at a point gives the group velocity.'
    likely_errors:
    - id: kf_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[k_flex]] con una lectura aislada es un error frecuente: Verificar que [[k_flex]] se ha calculado
          correctamente a partir de la relación de dispersión (raíz cuarta de omega²·rho·A/(EI)), no de una fórmula lineal
          k igual a omega/v.'
        en: 'A common mistake is to interpret [[k_flex]] in isolation: Verify that [[k_flex]] has been computed correctly
          from the dispersion relation (fourth root of omega²·rho·A/(EI)), not from a linear formula k equals omega/v.'
    next_step_rules:
    - id: kf_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[k_flex]] calculado, obtener [[lambda_flex]] como 2π/k y comparar con el espesor de la sección. Si [[lambda_flex]]
          es menor que 6 veces el espesor, cambiar al modelo de Timoshenko.
        en: With [[k_flex]] computed, obtain [[lambda_flex]] as 2π/k and compare with section thickness. If [[lambda_flex]]
          is less than 6 times the thickness, switch to the Timoshenko model.
    physical_intuition:
    - id: k_flex_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[k_flex]] describe el estado dinámico.
        en: Intuitively, [[k_flex]] describes the dynamic state.
    limiting_cases:
    - id: k_flex_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[k_flex]].
        en: Check limiting cases of [[k_flex]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  lambda_flex:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Longitud de onda flexional; la distancia entre máximos consecutivos de deformación transversal.
      en: Flexural wavelength; the distance between consecutive transverse displacement maxima.
    summary_rules:
    - id: lf_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_flex]] resume la escala espacial de la deformación. Un valor pequeño indica que la viga se deforma con
          muchos ciclos por unidad de longitud, típico de altas frecuencias.'
        en: '[[lambda_flex]] summarizes the spatial scale of deformation. A small value indicates the beam deforms with many
          cycles per unit length, typical of high frequencies.'
    physical_reading_rules:
    - id: lf_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_flex]] disminuye al aumentar la frecuencia, pero más lentamente que en ondas no dispersivas. Duplicar
          la frecuencia reduce [[lambda_flex]] por el factor raíz de 2, no a la mitad.'
        en: '[[lambda_flex]] decreases with increasing frequency, but more slowly than in non-dispersive waves. Doubling frequency
          reduces [[lambda_flex]] by the square root of 2, not by half.'
    coherence_rules:
    - id: lf_coherence_positive
      when: lambda_flex <= 0
      status: error
      text:
        es: '[[lambda_flex]] debe ser positiva.'
        en: '[[lambda_flex]] must be positive.'
    - id: lf_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_flex]] es coherente con [[k_flex]] como 2π/k.'
        en: '[[lambda_flex]] is consistent with [[k_flex]] as 2π/k.'
    model_validity_rules:
    - id: lf_validity_thin
      when: lambda_flex < 0.01
      status: warning
      text:
        es: '[[lambda_flex]] menor que 1 cm puede ser comparable al espesor de la sección. Verificar la condición de viga
          delgada para la frecuencia actual.'
        en: '[[lambda_flex]] less than 1 cm may be comparable to section thickness. Verify the slender beam condition for
          the current frequency.'
    - id: lf_validity_default
      when: 'true'
      status: ok
      text:
        es: La longitud de onda es suficientemente mayor que el espesor para que el modelo de Euler-Bernoulli sea adecuado.
        en: Wavelength is sufficiently larger than thickness for the Euler-Bernoulli model to be adequate.
    graph_rules:
    - id: lf_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[lambda_flex]] define la separación entre crestas en la representación SVG del desplazamiento de la viga. A
          mayor frecuencia, las crestas están más juntas.'
        en: '[[lambda_flex]] defines the separation between crests in the SVG representation of beam displacement. At higher
          frequency, crests are closer together.'
    likely_errors:
    - id: lf_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[lambda_flex]] con una lectura aislada es un error frecuente: Confirmar que [[lambda_flex]] es menor
          que la longitud de onda longitudinal a la misma frecuencia. Las ondas de flexión siempre tienen longitudes de onda
          más cortas que las longitudinales.'
        en: 'A common mistake is to interpret [[lambda_flex]] in isolation: Confirm that [[lambda_flex]] is shorter than the
          longitudinal wavelength at the same frequency. Bending waves always have shorter wavelengths than longitudinal ones.'
    next_step_rules:
    - id: lf_next_default
      when: 'true'
      status: ok
      text:
        es: Comparar [[lambda_flex]] con la longitud total de la viga para estimar cuántos ciclos caben, y con el espesor
          para verificar la validez del modelo. Si caben pocos ciclos, las condiciones de contorno dominan la respuesta.
        en: Compare [[lambda_flex]] with the total beam length to estimate how many cycles fit, and with thickness to verify
          model validity. If few cycles fit, boundary conditions dominate the response.
    physical_intuition:
    - id: lambda_flex_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[lambda_flex]] describe el estado dinámico.
        en: Intuitively, [[lambda_flex]] describes the dynamic state.
    limiting_cases:
    - id: lambda_flex_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[lambda_flex]].
        en: Check limiting cases of [[lambda_flex]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
