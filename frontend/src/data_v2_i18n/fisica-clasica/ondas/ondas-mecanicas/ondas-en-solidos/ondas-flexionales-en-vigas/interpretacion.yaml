targets:
  v_fase_flex:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Velocidad a la que se desplaza un frente de fase de la onda de flexión; crece con la raíz de la frecuencia.
      en: Speed at which a bending wave phase front travels; grows with the square root of frequency.
    summary_rules:
    - id: vf_summary_high
      when: v_fase_flex > 500
      status: ok
      text:
        es: '[[v_fase_flex]] indica propagación rápida de la fase. La viga es muy rígida o la frecuencia es elevada. Verificar
          si la longitud de onda resultante sigue siendo mucho mayor que el espesor.'
        en: '[[v_fase_flex]] indicates fast phase propagation. The beam is very stiff or frequency is high. Verify whether
          the resulting wavelength is still much greater than the thickness.'
    - id: vf_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_fase_flex]] resume la velocidad de un frente de fase. A diferencia de ondas longitudinales, esta velocidad
          depende de la frecuencia: ondas de alta frecuencia viajan más rápido.'
        en: '[[v_fase_flex]] summarizes the speed of a phase front. Unlike longitudinal waves, this speed depends on frequency:
          higher-frequency waves travel faster.'
    physical_reading_rules:
    - id: vf_reading_dispersive
      when: v_fase_flex > 0
      status: ok
      text:
        es: '[[v_fase_flex]] crece como la raíz cuadrada de [[omega]]. Si se duplica la frecuencia, la velocidad de fase se
          multiplica por raíz de 2 (aproximadamente 1.41). Esta dispersión positiva significa que los paquetes de ondas se
          ensanchan al propagarse.'
        en: '[[v_fase_flex]] grows as the square root of [[omega]]. If frequency doubles, phase velocity multiplies by the
          square root of 2 (approximately 1.41). This positive dispersion means wave packets broaden as they propagate.'
    - id: vf_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v_fase_flex]] depende de la rigidez EI y de la inercia rho·A del material y sección, más la frecuencia. Un
          material más rígido o una sección con mayor momento de inercia produce ondas de fase más rápida.'
        en: '[[v_fase_flex]] depends on stiffness EI and inertia rho·A of the material and section, plus frequency. A stiffer
          material or section with greater moment of inertia produces faster phase waves.'
    coherence_rules:
    - id: vf_coherence_vs_longitudinal
      when: v_fase_flex > 6000
      status: error
      text:
        es: '[[v_fase_flex]] supera la velocidad longitudinal típica. La velocidad de fase flexional siempre es menor que
          la longitudinal en el mismo material. Revisar unidades de [[momento_de_inercia_de_la_seccion_transversal]] (debe ser m⁴) y [[omega]] (debe ser rad/s).'
        en: '[[v_fase_flex]] exceeds typical longitudinal speed. Flexural phase velocity is always less than longitudinal
          in the same material. Check units of [[momento_de_inercia_de_la_seccion_transversal]] (must be m⁴) and [[omega]] (must be rad/s).'
    - id: vf_coherence_default
      when: 'true'
      status: ok
      text:
        es: El valor de [[v_fase_flex]] es físicamente plausible para la frecuencia y sección consideradas.
        en: The value of [[v_fase_flex]] is physically plausible for the considered frequency and section.
    model_validity_rules:
    - id: vf_validity_wavelength
      when: v_fase_flex > 1000
      status: warning
      text:
        es: A velocidades de fase elevadas, la longitud de onda puede reducirse hasta ser comparable al espesor de la sección.
          Calcular [[lambda_flex]] y comparar con el espesor para verificar la validez de Euler-Bernoulli.
        en: At high phase velocities, the wavelength may decrease until it is comparable to section thickness. Calculate [[lambda_flex]]
          and compare with thickness to verify Euler-Bernoulli validity.
    - id: vf_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de Euler-Bernoulli es válido mientras la longitud de onda sea al menos 6 veces el espesor de la sección.
          Para vigas metálicas delgadas a frecuencias audibles, esto se cumple con holgura.
        en: Euler-Bernoulli model is valid as long as wavelength is at least 6 times the section thickness. For thin metallic
          beams at audible frequencies, this is easily satisfied.
    graph_rules:
    - id: vf_graph_dispersion
      when: 'true'
      status: ok
      text:
        es: En el gráfico Coord de dispersión, [[v_fase_flex]] aparece como una curva creciente con la raíz de la frecuencia.
          La pendiente de la curva disminuye a frecuencias altas porque la raíz cuadrada se satura.
        en: In the Coord dispersion graph, [[v_fase_flex]] appears as a curve growing with the square root of frequency. The
          curve slope decreases at high frequencies because the square root saturates.
    likely_errors:
    - id: vf_error_units
      when: v_fase_flex > 10000
      status: error
      text:
        es: 'Confundir [[v_fase_flex]] con una lectura aislada es un error frecuente: Velocidad de fase extremadamente alta.
          El error más probable es usar [[momento_de_inercia_de_la_seccion_transversal]] en cm⁴ sin convertir a m⁴ (factor 10⁻⁸), o [[omega]] en Hz en lugar
          de rad/s.'
        en: 'A common mistake is to interpret [[v_fase_flex]] in isolation: Extremely high phase velocity. The most likely
          error is using [[momento_de_inercia_de_la_seccion_transversal]] in cm⁴ without converting to m⁴ (factor 10⁻⁸), or [[omega]] in Hz instead of rad/s.'
    - id: vf_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[v_fase_flex]] con una lectura aislada es un error frecuente: Verificar que [[omega]] está en rad/s
          (no en Hz: multiplicar por 2π) y que [[momento_de_inercia_de_la_seccion_transversal]] está en m⁴ (no en cm⁴).'
        en: 'A common mistake is to interpret [[v_fase_flex]] in isolation: Verify that [[omega]] is in rad/s (not Hz: multiply
          by 2π) and that [[momento_de_inercia_de_la_seccion_transversal]] is in m⁴ (not cm⁴).'
    next_step_rules:
    - id: vf_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[v_fase_flex]] calculado, obtener [[v_grupo_flex]] multiplicando por 2, y [[lambda_flex]] dividiendo 2π entre
          [[k_flex]]. Comparar [[lambda_flex]] con el espesor para confirmar la validez del modelo.
        en: With [[v_fase_flex]] computed, obtain [[v_grupo_flex]] by multiplying by 2, and [[lambda_flex]] by dividing 2π
          by [[k_flex]]. Compare [[lambda_flex]] with thickness to confirm model validity.
    physical_intuition:
    - id: v_fase_flex_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_fase_flex]] describe el estado dinámico.
        en: Intuitively, [[v_fase_flex]] describes the dynamic state.
    limiting_cases:
    - id: v_fase_flex_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_fase_flex]].
        en: Check limiting cases of [[v_fase_flex]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  omega:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Frecuencia angular de la excitación o del modo de la onda de flexión.
      en: Angular frequency of the excitation or mode of the bending wave.
    summary_rules:
    - id: om_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[omega]] resume la frecuencia angular del fenómeno. A mayor [[omega]], mayor velocidad de fase y menor longitud
          de onda, según la dispersión cuadrática de la viga.'
        en: '[[omega]] summarizes the angular frequency of the phenomenon. Higher [[omega]] means higher phase velocity and
          shorter wavelength, according to the beam''s quadratic dispersion.'
    physical_reading_rules:
    - id: om_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[omega]] entra en la velocidad de fase bajo una raíz cuadrada: duplicar la frecuencia multiplica v_f por la
          raíz de 2. Esta dependencia sub-lineal es la firma de la dispersión flexional.'
        en: '[[omega]] enters phase velocity under a square root: doubling frequency multiplies v_f by the square root of
          2. This sub-linear dependence is the signature of flexural dispersion.'
    coherence_rules:
    - id: om_coherence_positive
      when: omega <= 0
      status: error
      text:
        es: '[[omega]] debe ser positiva para una onda de flexión propagante.'
        en: '[[omega]] must be positive for a propagating bending wave.'
    - id: om_coherence_default
      when: 'true'
      status: ok
      text:
        es: El valor de [[omega]] es coherente con el rango esperado para la aplicación.
        en: The value of [[omega]] is consistent with the expected range for the application.
    model_validity_rules:
    - id: om_validity_high
      when: omega > 100000
      status: warning
      text:
        es: A frecuencias angulares muy elevadas, la longitud de onda puede ser comparable al espesor y el modelo de Euler-Bernoulli
          deja de ser válido. Verificar calculando [[lambda_flex]].
        en: At very high angular frequencies, the wavelength may be comparable to thickness and the Euler-Bernoulli model
          breaks down. Verify by computing [[lambda_flex]].
    - id: om_validity_default
      when: 'true'
      status: ok
      text:
        es: Para el rango de frecuencia actual, el modelo de viga delgada es apropiado.
        en: For the current frequency range, the slender beam model is appropriate.
    graph_rules:
    - id: om_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[omega]] es el eje vertical en la curva de dispersión omega vs k. La forma parabólica de esta curva es la característica
          visual de la dispersión cuadrática.'
        en: '[[omega]] is the vertical axis in the omega vs k dispersion curve. The parabolic shape of this curve is the visual
          characteristic of quadratic dispersion.'
    likely_errors:
    - id: om_error_hz
      when: omega < 10
      status: warning
      text:
        es: 'Confundir [[omega]] con una lectura aislada es un error frecuente: [[omega]] parece muy baja. Verificar si se
          ha introducido la frecuencia en Hz en lugar de rad/s. Para convertir, multiplicar Hz por 2π.'
        en: 'A common mistake is to interpret [[omega]] in isolation: [[omega]] seems very low. Verify whether frequency was
          entered in Hz instead of rad/s. To convert, multiply Hz by 2π.'
    - id: om_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[omega]] con una lectura aislada es un error frecuente: Confirmar que [[omega]] está en rad/s. Para
          1 kHz, omega vale aproximadamente 6283 rad/s.'
        en: 'A common mistake is to interpret [[omega]] in isolation: Confirm that [[omega]] is in rad/s. For 1 kHz, omega
          is approximately 6283 rad/s.'
    next_step_rules:
    - id: om_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[omega]] definida, calcular [[v_fase_flex]] y [[k_flex]] para characterizar completamente la onda de flexión
          a esa frecuencia.
        en: With [[omega]] defined, compute [[v_fase_flex]] and [[k_flex]] to fully characterize the bending wave at that
          frequency.
    physical_intuition:
    - id: omega_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[omega]] describe el estado dinámico.
        en: Intuitively, [[omega]] describes the dynamic state.
    limiting_cases:
    - id: omega_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[omega]].
        en: Check limiting cases of [[omega]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
