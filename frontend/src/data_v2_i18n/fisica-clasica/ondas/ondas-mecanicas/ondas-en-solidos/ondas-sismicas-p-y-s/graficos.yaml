version: "1.0"
leaf: "ondas-sismicas-p-y-s"

coord:
  title:
    es: Gráfica Coord · Ondas Sísmicas P y S
    en: Coord Graph · Seismic P and S Waves
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: desplazamiento u (m)
    en: displacement u (m)
  xMagnitude: t
  yMagnitude: u
  relation:
    es: "P: v_P = √((λ+2μ)/ρ). S: v_S = √(μ/ρ). Δt = d·(1/v_S−1/v_P)."
    en: "P: v_P = √((λ+2μ)/ρ). S: v_S = √(μ/ρ). Δt = d·(1/v_S−1/v_P)."
  physicalReading:
    es: P llega antes. Δt → d.
    en: P arrives first. Δt → d.
  slopeMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  interceptMeaning:
    es: "t_P: llegada P; t_S: llegada S."
    en: "t_P: P arrival; t_S: S arrival."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: P ∥, S ⊥.
    en: P ∥, S ⊥.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: Ondas sísmicas P y S.
    en: Seismic P and S waves.
  formulaConnection:
    es: Δt = d·(1/v_S−1/v_P).
    en: Δt = d·(1/v_S−1/v_P).
  readingFocus:
    es: leer Δt para calcular d.
    en: read Δt to calculate d.
  agentHints:
    es:
      - P primero.
      - Δt → d.
      - S no en fluidos.
    en:
      - P first.
      - Δt → d.
      - S not in fluids.
  commonMistakes:
    es:
      - S llega antes.
      - S en líquidos.
    en:
      - S arrives first.
      - S in liquids.

