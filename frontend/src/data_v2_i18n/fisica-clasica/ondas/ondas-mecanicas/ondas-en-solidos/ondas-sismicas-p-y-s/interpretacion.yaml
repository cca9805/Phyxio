      text:
        es: '[[d_foco]] es el eje horizontal de las dromocronas. La separacion entre las curvas P y S crece con la distancia.'
        en: '[[d_foco]] is the horizontal axis of travel-time curves. The separation between P and S curves grows with distance.'
    likely_errors:
    - id: df_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[d_foco]] con una lectura aislada es un error frecuente: Verificar unidades (metros o kilometros).
          Error frecuente: mezclar km con m en el calculo.'
        en: 'A common mistake is to interpret [[d_foco]] in isolation: Verify units (metres or kilometres). Frequent error:
          mixing km with m in the calculation.'
    next_step_rules:
    - id: df_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[d_foco]] de tres estaciones, triangular la posicion del epicentro e hipocentro.
        en: With [[d_foco]] from three stations, triangulate the epicenter and hypocenter position.
