    en: Coherent final unit.
targets:
  v_p:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Velocidad de propagacion de la onda P (compresion) en el medio.
      en: Propagation speed of the P (compression) wave in the medium.
    summary_rules:
    - id: vp_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_p]] resume la velocidad de la onda de compresion. Depende de los modulos elasticos K y G y de la densidad
          del medio. Siempre es mayor que [[v_s]].'
        en: '[[v_p]] summarizes the compression wave speed. It depends on elastic moduli K and G and the medium density. It
          is always greater than [[v_s]].'
    physical_reading_rules:
    - id: vp_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v_p]] indica la rapidez con que un frente de compresion avanza en el medio. Un material mas rigido (alto K
          y G) o menos denso propaga mas rapido.'
        en: '[[v_p]] indicates how fast a compression front advances in the medium. A stiffer (high K and G) or less dense
          material propagates faster.'
    coherence_rules:
    - id: vp_coherence_high
      when: v_p > 9000
      status: error
      text:
        es: '[[v_p]] supera 9000 m/s, valor anomalo para corteza. Revisar [[K_bulk]] y [[G_shear]] (probablemente en unidades
          incorrectas).'
        en: '[[v_p]] exceeds 9000 m/s, anomalous for crust. Check [[K_bulk]] and [[G_shear]] (probably in wrong units).'
    - id: vp_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[v_p]] esta en el rango fisicamente plausible para el medio considerado.'
        en: '[[v_p]] is in the physically plausible range for the considered medium.'
    model_validity_rules:
    - id: vp_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo isotropo homogeneo es valido para distancias menores de 200 km y longitudes de onda mucho mayores que
          las heterogeneidades del medio.
        en: The homogeneous isotropic model is valid for distances under 200 km and wavelengths much larger than medium heterogeneities.
    graph_rules:
    - id: vp_graph_default
      when: 'true'
      status: ok
      text:
        es: En las dromocronas, [[v_p]] determina la pendiente de la recta de tiempos de llegada P (pendiente 1/v_p).
        en: In travel-time curves, [[v_p]] determines the slope of the P arrival time line (slope 1/v_p).
    likely_errors:
    - id: vp_error_bar
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[v_p]] con una lectura aislada es un error frecuente: No usar la formula de barra (raiz de E entre
          rho). La formula correcta para medio infinito incluye [[K_bulk]] mas 4/3 de [[G_shear]].'
        en: 'A common mistake is to interpret [[v_p]] in isolation: Do not use the bar formula (root of E over rho). The correct
          formula for infinite medium includes [[K_bulk]] plus 4/3 times [[G_shear]].'
    next_step_rules:
    - id: vp_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[v_p]] calculada, obtener [[v_s]] para calcular el [[ratio_vp_vs]] y estimar [[nu_poisson]] del medio.
        en: With [[v_p]] calculated, obtain [[v_s]] to compute [[ratio_vp_vs]] and estimate [[nu_poisson]] of the medium.
    physical_intuition:
    - id: v_p_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_p]] describe el estado dinámico.
        en: Intuitively, [[v_p]] describes the dynamic state.
    limiting_cases:
    - id: v_p_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_p]].
        en: Check limiting cases of [[v_p]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  modulo_de_compresibilidad:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Modulo de compresibilidad del medio; resistencia a la compresion volumetrica.
      en: Bulk modulus of the medium; resistance to volumetric compression.
    summary_rules:
    - id: Kb_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[K_bulk]] resume la rigidez volumetrica. Un valor alto indica un medio dificil de comprimir, que propaga ondas
          P rapidamente incluso si [[G_shear]] es bajo.'
        en: '[[K_bulk]] summarizes volumetric stiffness. A high value indicates a medium hard to compress, propagating P waves
          quickly even if [[G_shear]] is low.'
    physical_reading_rules:
    - id: Kb_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[K_bulk]] explica por que las ondas P existen en fluidos (donde [[G_shear]] es cero pero [[K_bulk]] no). A mayor
          [[K_bulk]], mayor [[v_p]].'
        en: '[[K_bulk]] explains why P waves exist in fluids (where [[G_shear]] is zero but [[K_bulk]] is not). Higher [[K_bulk]]
          means higher [[v_p]].'
    coherence_rules:
    - id: Kb_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[K_bulk]] debe ser positivo y del orden de GPa para materiales geologicos.'
        en: '[[K_bulk]] must be positive and on the order of GPa for geological materials.'
    model_validity_rules:
    - id: Kb_validity_default
      when: 'true'
      status: ok
      text:
        es: Se asume [[K_bulk]] constante e isotropo. En medios anisotropos, el tensor de rigidez es mas complejo.
        en: '[[K_bulk]] is assumed constant and isotropic. In anisotropic media, the stiffness tensor is more complex.'
    graph_rules:
    - id: Kb_graph_default
      when: 'true'
      status: ok
      text:
        es: Mayor [[K_bulk]] aumenta [[v_p]] y reduce la pendiente de la dromocrona P.
        en: Higher [[K_bulk]] increases [[v_p]] and reduces the P travel-time curve slope.
    likely_errors:
    - id: Kb_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[modulo_de_compresibilidad]] con una lectura aislada es un error frecuente: Verificar unidades en
          Pa (no GPa sin convertir). Valores tipicos para corteza: 40–100 GPa.'
        en: 'A common mistake is to interpret [[modulo_de_compresibilidad]] in isolation: Verify units in Pa (not GPa without
          converting). Typical values for crust: 40–100 GPa.'
    next_step_rules:
    - id: Kb_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[K_bulk]] y [[G_shear]], calcular [[v_p]] como raiz de ([[K_bulk]] mas 4/3 [[G_shear]]) entre [[rho_medio]].
        en: With [[K_bulk]] and [[G_shear]], compute [[v_p]] as root of ([[K_bulk]] plus 4/3 [[G_shear]]) over [[rho_medio]].
    physical_intuition:
    - id: modulo_de_compresibilidad_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[modulo_de_compresibilidad]] describe el estado dinámico.
        en: Intuitively, [[modulo_de_compresibilidad]] describes the dynamic state.
    limiting_cases:
    - id: modulo_de_compresibilidad_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[modulo_de_compresibilidad]].
        en: Check limiting cases of [[modulo_de_compresibilidad]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  rho_medio:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Densidad volumetrica del medio de propagacion.
      en: Volumetric density of the propagation medium.
    summary_rules:
    - id: rm_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_medio]] resume la inercia por unidad de volumen del medio. Aparece en el denominador de ambas velocidades;
          mayor densidad implica menor velocidad a igual rigidez.'
        en: '[[rho_medio]] summarizes the inertia per unit volume of the medium. It appears in the denominator of both velocities;
          higher density means lower speed at equal stiffness.'
    physical_reading_rules:
    - id: rm_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_medio]] representa la masa que la onda debe acelerar. Duplicar la densidad reduce ambas velocidades por
          un factor raiz de 2.'
        en: '[[rho_medio]] represents the mass the wave must accelerate. Doubling density reduces both velocities by a factor
          of root 2.'
    coherence_rules:
    - id: rm_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[rho_medio]] debe ser positiva. Valores tipicos: 1000 (agua) a 13000 (nucleo) kg/m3.'
        en: '[[rho_medio]] must be positive. Typical values: 1000 (water) to 13000 (core) kg/m3.'
    model_validity_rules:
    - id: rm_validity_default
      when: 'true'
      status: ok
      text:
        es: Se asume [[rho_medio]] uniforme. En la Tierra real, la densidad crece con la profundidad por efecto de la presion.
        en: '[[rho_medio]] is assumed uniform. In the real Earth, density increases with depth due to pressure.'
    graph_rules:
    - id: rm_graph_default
      when: 'true'
      status: ok
      text:
        es: Mayor [[rho_medio]] reduce ambas velocidades y aumenta la pendiente de las dromocronas.
        en: Higher [[rho_medio]] reduces both velocities and increases the slope of travel-time curves.
    likely_errors:
    - id: rm_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[rho_medio]] con una lectura aislada es un error frecuente: Verificar unidades en kg/m3. Error frecuente:
          usar g/cm3 sin convertir (factor 1000).'
        en: 'A common mistake is to interpret [[rho_medio]] in isolation: Verify units in kg/m3. Frequent error: using g/cm3
          without converting (factor 1000).'
    next_step_rules:
    - id: rm_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[rho_medio]], [[K_bulk]] y [[G_shear]], calcular ambas velocidades sismicas.
        en: With [[rho_medio]], [[K_bulk]], and [[G_shear]], compute both seismic velocities.
    physical_intuition:
    - id: rho_medio_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[rho_medio]] describe el estado dinámico.
        en: Intuitively, [[rho_medio]] describes the dynamic state.
    limiting_cases:
    - id: rho_medio_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[rho_medio]].
        en: Check limiting cases of [[rho_medio]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  v_s:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Velocidad de propagacion de la onda S (cizalla) en el medio.
      en: Propagation speed of the S (shear) wave in the medium.
    summary_rules:
    - id: vs_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_s]] resume la velocidad de la onda de cizalla. Solo depende de [[G_shear]] y [[rho_medio]]. Es cero en fluidos,
          lo que demuestra la naturaleza solida del medio.'
        en: '[[v_s]] summarizes the shear wave speed. It depends only on [[G_shear]] and [[rho_medio]]. It is zero in fluids,
          proving the solid nature of the medium.'
    physical_reading_rules:
    - id: vs_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[v_s]] mide la velocidad con que una perturbacion transversal se propaga. Su existencia es prueba de rigidez
          de cizalla: si [[v_s]] es nula, el medio es fluido.'
        en: '[[v_s]] measures the speed at which a transverse perturbation propagates. Its existence proves shear rigidity:
          if [[v_s]] is zero, the medium is fluid.'
    coherence_rules:
    - id: vs_coherence_greater_vp
      when: v_s > v_p
      status: error
      text:
        es: '[[v_s]] mayor que [[v_p]] es fisicamente imposible. Revisar [[K_bulk]] y [[G_shear]].'
        en: '[[v_s]] greater than [[v_p]] is physically impossible. Check [[K_bulk]] and [[G_shear]].'
    - id: vs_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[v_s]] es coherente con el medio y es menor que [[v_p]].'
        en: '[[v_s]] is consistent with the medium and is less than [[v_p]].'
    model_validity_rules:
    - id: vs_validity_default
      when: 'true'
      status: ok
      text:
        es: Valida en solidos con [[G_shear]] distinto de cero. En fluidos [[v_s]] se anula.
        en: Valid in solids with nonzero [[G_shear]]. In fluids [[v_s]] vanishes.
    graph_rules:
    - id: vs_graph_default
      when: 'true'
      status: ok
      text:
        es: La dromocrona S tiene mayor pendiente (1/v_s) que la P, reflejando menor velocidad.
        en: The S travel-time curve has greater slope (1/v_s) than P, reflecting lower speed.
    likely_errors:
    - id: vs_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[v_s]] con una lectura aislada es un error frecuente: Confirmar que [[G_shear]] no es cero (medio
          solido). Si se obtiene [[v_s]] nula en un solido, [[G_shear]] tiene un error.'
        en: 'A common mistake is to interpret [[v_s]] in isolation: Confirm [[G_shear]] is not zero (solid medium). If [[v_s]]
          is zero in a solid, [[G_shear]] has an error.'
    next_step_rules:
    - id: vs_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[v_s]] y [[v_p]], calcular [[ratio_vp_vs]] para diagnosticar litologia y saturacion.
        en: With [[v_s]] and [[v_p]], compute [[ratio_vp_vs]] to diagnose lithology and saturation.
    physical_intuition:
    - id: v_s_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_s]] describe el estado dinámico.
        en: Intuitively, [[v_s]] describes the dynamic state.
    limiting_cases:
    - id: v_s_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_s]].
        en: Check limiting cases of [[v_s]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  modulo_de_cizalla:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Modulo de cizalla; cero en fluidos, positivo en solidos.
      en: Shear modulus; zero in fluids, positive in solids.
    summary_rules:
    - id: Gs_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[G_shear]] resume la rigidez de cizalla del medio. Es el modulo que distingue solidos de fluidos para la propagacion
          de ondas S.'
        en: '[[G_shear]] summarizes the shear rigidity of the medium. It is the modulus that distinguishes solids from fluids
          for S wave propagation.'
    physical_reading_rules:
    - id: Gs_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[G_shear]] determina directamente [[v_s]] y contribuye tambien a [[v_p]]. Si [[G_shear]] es cero, las ondas
          S desaparecen.'
        en: '[[G_shear]] directly determines [[v_s]] and also contributes to [[v_p]]. If [[G_shear]] is zero, S waves disappear.'
    coherence_rules:
    - id: Gs_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[G_shear]] debe ser positivo en solidos y cero en fluidos. Si es negativo, hay un error.'
        en: '[[G_shear]] must be positive in solids and zero in fluids. If negative, there is an error.'
    model_validity_rules:
    - id: Gs_validity_default
      when: 'true'
      status: ok
      text:
        es: Se asume [[G_shear]] constante. En medios parcialmente fundidos, G es funcion de la temperatura y la fraccion
          de fusion.
        en: '[[G_shear]] is assumed constant. In partially molten media, G is a function of temperature and melt fraction.'
    graph_rules:
    - id: Gs_graph_default
      when: 'true'
      status: ok
      text:
        es: Mayor [[G_shear]] aumenta tanto [[v_s]] como [[v_p]], reduciendo la pendiente de ambas dromocronas.
        en: Higher [[G_shear]] increases both [[v_s]] and [[v_p]], reducing the slope of both travel-time curves.
    likely_errors:
    - id: Gs_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[modulo_de_cizalla]] con una lectura aislada es un error frecuente: Confirmar que [[G_shear]] es cero
          para fluidos y del orden de 20–80 GPa para rocas de corteza y manto.'
        en: 'A common mistake is to interpret [[modulo_de_cizalla]] in isolation: Confirm [[G_shear]] is zero for fluids and
          on the order of 20–80 GPa for crustal and mantle rocks.'
    next_step_rules:
    - id: Gs_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[G_shear]] conocido, calcular [[v_s]] como raiz de [[G_shear]]/[[rho_medio]].
        en: With [[G_shear]] known, compute [[v_s]] as root of [[G_shear]]/[[rho_medio]].
    physical_intuition:
    - id: modulo_de_cizalla_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[modulo_de_cizalla]] describe el estado dinámico.
        en: Intuitively, [[modulo_de_cizalla]] describes the dynamic state.
    limiting_cases:
    - id: modulo_de_cizalla_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[modulo_de_cizalla]].
        en: Check limiting cases of [[modulo_de_cizalla]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  ratio_vp_vs:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Cociente de velocidades P/S; indicador del coeficiente de Poisson y presencia de fluidos.
      en: P/S velocity ratio; indicator of Poisson's ratio and fluid presence.
    summary_rules:
    - id: rpv_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[ratio_vp_vs]] resume la relacion entre las dos velocidades de ondas de cuerpo. Valores altos (mayor que 2)
          indican saturacion de fluidos; valores cercanos a 1.73 indican roca seca.'
        en: '[[ratio_vp_vs]] summarizes the relationship between the two body wave velocities. High values (above 2) indicate
          fluid saturation; values near 1.73 indicate dry rock.'
    physical_reading_rules:
    - id: rpv_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[ratio_vp_vs]] depende solo de [[nu_poisson]], no de la densidad. Es un diagnostico directo del tipo de material
          y su estado de saturacion.'
        en: '[[ratio_vp_vs]] depends only on [[nu_poisson]], not on density. It is a direct diagnostic of material type and
          saturation state.'
    coherence_rules:
    - id: rpv_coherence_low
      when: ratio_vp_vs < 1.4
      status: warning
      text:
        es: '[[ratio_vp_vs]] menor que 1.4 es anomalo (implicaria material auxetico). Verificar datos.'
        en: '[[ratio_vp_vs]] below 1.4 is anomalous (would imply auxetic material). Verify data.'
    - id: rpv_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[ratio_vp_vs]] esta en el rango esperado para materiales geologicos.'
        en: '[[ratio_vp_vs]] is in the expected range for geological materials.'
    model_validity_rules:
    - id: rpv_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo isotropo lineal da una relacion directa entre [[ratio_vp_vs]] y [[nu_poisson]]. En medios anisotropos
          la relacion es mas compleja.
        en: The linear isotropic model gives a direct relation between [[ratio_vp_vs]] and [[nu_poisson]]. In anisotropic
          media the relation is more complex.
    graph_rules:
    - id: rpv_graph_default
      when: 'true'
      status: ok
