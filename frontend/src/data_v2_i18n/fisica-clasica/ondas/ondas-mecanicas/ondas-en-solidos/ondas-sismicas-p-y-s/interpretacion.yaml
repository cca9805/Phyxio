  nu_poisson:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Coeficiente de Poisson obtenido del cociente de velocidades sismicas.
      en: Poisson's ratio obtained from the seismic velocity ratio.
    summary_rules:
    - id: np_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] resume la relacion entre deformacion lateral y axial del medio. Valores altos indican comportamiento
          cuasi-fluido; valores bajos indican material rigido.'
        en: '[[nu_poisson]] summarizes the ratio between lateral and axial deformation of the medium. High values indicate
          quasi-fluid behavior; low values indicate rigid material.'
    physical_reading_rules:
    - id: np_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] cercano a 0.5 indica un medio casi incompresible (fluido). Cercano a 0.25 indica roca cristalina
          seca. Valores intermedios sugieren saturacion parcial.'
        en: '[[nu_poisson]] near 0.5 indicates a nearly incompressible medium (fluid). Near 0.25 indicates dry crystalline
          rock. Intermediate values suggest partial saturation.'
    coherence_rules:
    - id: np_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] debe estar entre 0 y 0.5 para un solido termodinamicamente estable.'
        en: '[[nu_poisson]] must be between 0 and 0.5 for a thermodynamically stable solid.'
    model_validity_rules:
    - id: np_validity_default
      when: 'true'
      status: ok
      text:
        es: La relacion con el cociente de velocidades asume isotropia elastica lineal.
        en: The relationship with velocity ratio assumes linear elastic isotropy.
    graph_rules:
    - id: np_graph_default
      when: 'true'
      status: ok
      text:
        es: La curva [[ratio_vp_vs]] vs [[nu_poisson]] tiene asintota vertical en nu cercano a 0.5.
        en: The [[ratio_vp_vs]] vs [[nu_poisson]] curve has a vertical asymptote near nu of 0.5.
    likely_errors:
    - id: np_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[nu_poisson]] con una lectura aislada es un error frecuente: Verificar que [[nu_poisson]] calculado
          no excede 0.5 ni es negativo (salvo materiales auxeticos muy especificos).'
        en: 'A common mistake is to interpret [[nu_poisson]] in isolation: Verify that computed [[nu_poisson]] does not exceed
          0.5 or go negative (except for very specific auxetic materials).'
    next_step_rules:
    - id: np_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[nu_poisson]], clasificar el material (seco, saturado, parcialmente fundido) y decidir si el modelo isotropo
