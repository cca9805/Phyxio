  delta_t_ps:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Diferencia de tiempos de llegada entre ondas P y S; base de la localizacion sismica.
      en: Arrival time difference between P and S waves; basis of seismic location.
    summary_rules:
    - id: dt_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[delta_t_ps]] resume el intervalo temporal medido entre la llegada de la P y la S. Es proporcional a la distancia
          al foco y al factor de velocidades del medio.'
        en: '[[delta_t_ps]] summarizes the measured time interval between P and S arrivals. It is proportional to the focus
          distance and the velocity factor of the medium.'
    physical_reading_rules:
    - id: dt_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[delta_t_ps]] crece linealmente con [[d_foco]] en un medio homogeneo. Es la magnitud observable directamente
          en el sismograma.'
        en: '[[delta_t_ps]] grows linearly with [[d_foco]] in a homogeneous medium. It is the directly observable magnitude
          on the seismogram.'
    coherence_rules:
    - id: dt_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[delta_t_ps]] debe ser positivo (la P siempre llega antes). Valores mayores de 600 s implicarian distancias
          mayores que el diametro terrestre.'
        en: '[[delta_t_ps]] must be positive (P always arrives first). Values above 600 s would imply distances larger than
          Earth''s diameter.'
    model_validity_rules:
    - id: dt_validity_default
      when: 'true'
      status: ok
      text:
        es: La relacion lineal con [[d_foco]] solo es valida para sismos locales (d menor de 200 km). Para distancias mayores
          se requieren dromocronas corregidas.
        en: The linear relationship with [[d_foco]] is only valid for local earthquakes (d less than 200 km). For larger distances,
          corrected travel-time curves are needed.
    graph_rules:
    - id: dt_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[delta_t_ps]] es la separacion horizontal entre las dromocronas P y S a la distancia dada.'
        en: '[[delta_t_ps]] is the horizontal separation between P and S travel-time curves at the given distance.'
    likely_errors:
    - id: dt_error_default
      when: 'true'
      status: ok
      text:
        es: 'Confundir [[delta_t_ps]] con una lectura aislada es un error frecuente: Verificar el orden de la resta (1/v_s
          menos 1/v_p, no al reves). Si sale negativo, las velocidades estan invertidas.'
        en: 'A common mistake is to interpret [[delta_t_ps]] in isolation: Verify the subtraction order (1/v_s minus 1/v_p,
          not reversed). If negative, velocities are inverted.'
    next_step_rules:
    - id: dt_next_default
      when: 'true'
      status: ok
      text:
        es: Con [[delta_t_ps]] medido, calcular [[d_foco]] dividiendo por el factor (1/v_s menos 1/v_p). Con tres estaciones,
          triangular el epicentro.
        en: With measured [[delta_t_ps]], compute [[d_foco]] by dividing by the factor (1/v_s minus 1/v_p). With three stations,
          triangulate the epicenter.
    physical_intuition:
    - id: delta_t_ps_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[delta_t_ps]] describe el estado dinámico.
        en: Intuitively, [[delta_t_ps]] describes the dynamic state.
    limiting_cases:
    - id: delta_t_ps_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[delta_t_ps]].
        en: Check limiting cases of [[delta_t_ps]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  d_foco:
    enabled: true
    magnitude_type: scalar_unsigned
    semantic_role:
      es: Distancia al foco sismico obtenida de la diferencia de tiempos P-S.
      en: Distance to seismic focus obtained from the P-S time difference.
    summary_rules:
    - id: df_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[d_foco]] resume la distancia entre el hipocentro del sismo y la estacion. Se obtiene directamente de [[delta_t_ps]]
          dividido por el factor de velocidades.'
        en: '[[d_foco]] summarizes the distance between the earthquake hypocenter and the station. It is obtained directly
          from [[delta_t_ps]] divided by the velocity factor.'
    physical_reading_rules:
    - id: df_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[d_foco]] es una distancia en linea recta (3D). No confundir con distancia epicentral (proyeccion en superficie).
          Para sismos superficiales, ambas son similares.'
        en: '[[d_foco]] is a straight-line distance (3D). Do not confuse with epicentral distance (surface projection). For
          shallow earthquakes, both are similar.'
    coherence_rules:
    - id: df_coherence_default
      when: 'true'
      status: ok
      text:
        es: '[[d_foco]] debe ser positiva y menor que el diametro terrestre (13000 km).'
        en: '[[d_foco]] must be positive and less than Earth''s diameter (13000 km).'
    model_validity_rules:
    - id: df_validity_default
      when: 'true'
      status: ok
      text:
        es: Para distancias mayores de 200 km, la estimacion lineal pierde precision y se necesitan modelos de velocidad radial.
        en: For distances over 200 km, the linear estimate loses accuracy and radial velocity models are needed.
    graph_rules:
    - id: df_graph_default
      when: 'true'
