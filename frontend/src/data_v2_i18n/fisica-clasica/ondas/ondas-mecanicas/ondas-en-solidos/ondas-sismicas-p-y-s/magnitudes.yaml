magnitudes:
- id: v_p
  symbol: v_p
  nombre:
    es: Velocidad de onda P
    en: P-wave velocity
  descripcion:
    es: Velocidad de propagacion de las ondas de compresion (primarias) en un medio solido elastico.
    en: Propagation speed of compression (primary) waves in an elastic solid medium.
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - sismologia
  - geofisica de exploracion
  - ingenieria geotecnica
  common_mistake:
    es: Confundir v_p con la velocidad de ondas en barra (que usa solo E, no K + 4G/3).
    en: Confusing v_p with bar wave speed (which uses only E, not K + 4G/3).
  typical_range: 1500–8000 m/s (agua 1500, granito 5500–6500, manto superior 8000)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva, magnitud escalar de rapidez.
      en: Always positive, scalar speed magnitude.
  zero_behavior:
    allowed: false
    meaning:
      es: Velocidad cero implicaria que la onda no se propaga, imposible en medio elastico.
      en: Zero velocity would mean the wave does not propagate, impossible in elastic medium.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1500–8000
  interpretation_role:
    primary_for:
    - velocidad_onda_p
    secondary_for:
    - diferencia_tiempos_sismo
  graph_binding:
    channels:
    - dromocrona_P
  pedagogical_notes:
    es: Las ondas P son las primeras en llegar a un sismografo. Su velocidad revela la composicion y estado del material atravesado.
    en: P waves are the first to arrive at a seismograph. Their velocity reveals the composition and state of the material
      traversed.
- id: v_s
  symbol: v_s
  nombre:
    es: Velocidad de onda S
    en: S-wave velocity
  descripcion:
    es: Velocidad de propagacion de las ondas de cizalla (secundarias) en un medio solido.
    en: Propagation speed of shear (secondary) waves in a solid medium.
  unidad_si: m/s
  dimension: '[L T⁻¹]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - sismologia
  - deteccion de nucleos liquidos
  - clasificacion de suelos
  common_mistake:
    es: Creer que las ondas S se propagan en fluidos. En fluidos G es cero y v_s es cero.
    en: Believing S waves propagate in fluids. In fluids G is zero and v_s is zero.
  typical_range: 0–4500 m/s (corteza 3000–3700, manto 4500, fluido 0)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva en solidos; cero en fluidos.
      en: Always positive in solids; zero in fluids.
  zero_behavior:
    allowed: true
    meaning:
      es: Si v_s es cero, el medio es un fluido (G nulo).
      en: If v_s is zero, the medium is a fluid (G is zero).
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 0–4500
  interpretation_role:
    primary_for:
    - velocidad_onda_s
    secondary_for:
    - diferencia_tiempos_sismo
    - relacion_vp_vs_poisson
  graph_binding:
    channels:
    - dromocrona_S
  pedagogical_notes:
    es: La ausencia de ondas S tras atravesar una region demuestra que esa region es liquida. Asi se descubrio el nucleo externo
      de la Tierra.
    en: The absence of S waves after traversing a region proves that region is liquid. This is how Earth's outer core was
      discovered.
- id: modulo_de_compresibilidad
  symbol: K_{bulk}
  nombre:
    es: Modulo de compresibilidad
    en: Bulk modulus
  descripcion:
    es: Resistencia del medio a la compresion volumetrica uniforme.
    en: Resistance of the medium to uniform volumetric compression.
  unidad_si: Pa
  dimension: '[M L⁻¹ T⁻²]'
  is_vector: false
  components: []
  category: parameter
  physical_role: material_property
  used_in:
  - elasticidad
  - acustica
  - geofisica
  common_mistake:
    es: Confundir K con E (modulo de Young). K mide compresion pura, E mide traccion uniaxial.
    en: Confusing K with E (Young's modulus). K measures pure compression, E measures uniaxial tension.
  typical_range: 2–180 GPa (agua 2.2 GPa, acero 160 GPa, diamante 443 GPa)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo para materiales estables.
      en: Always positive for stable materials.
  zero_behavior:
    allowed: false
    meaning:
      es: K nulo implicaria compresibilidad infinita, fisicamente imposible.
      en: Zero K would imply infinite compressibility, physically impossible.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 2e9–200e9
  interpretation_role:
    primary_for:
    - velocidad_onda_p
    secondary_for: []
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: K aparece en la formula de v_p sumado con 4G/3. Esto explica por que las ondas P existen incluso en fluidos (donde
      G es cero pero K no).
    en: K appears in the v_p formula added to 4G/3. This explains why P waves exist even in fluids (where G is zero but K
      is not).
- id: modulo_de_cizalla
  symbol: G_{shear}
  nombre:
    es: Modulo de cizalla
    en: Shear modulus
  descripcion:
    es: Resistencia del medio a la deformacion de cizalla (cambio de forma sin cambio de volumen).
    en: Resistance of the medium to shear deformation (shape change without volume change).
  unidad_si: Pa
  dimension: '[M L⁻¹ T⁻²]'
  is_vector: false
  components: []
  category: parameter
  physical_role: material_property
  used_in:
  - elasticidad
  - ondas S
  - geotecnia
  common_mistake:
    es: Olvidar que G es cero en fluidos ideales, lo que anula v_s.
    en: Forgetting that G is zero in ideal fluids, which makes v_s zero.
  typical_range: 0–80 GPa (fluidos 0, corteza 25–35 GPa, manto 60–80 GPa)
  sign_behavior:
    has_sign: false
    meaning:
      es: Positivo en solidos, cero en fluidos.
      en: Positive in solids, zero in fluids.
  zero_behavior:
    allowed: true
    meaning:
      es: G cero indica un fluido ideal sin rigidez de cizalla.
      en: Zero G indicates an ideal fluid with no shear rigidity.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 0–80e9
  interpretation_role:
    primary_for:
    - velocidad_onda_s
    secondary_for:
    - velocidad_onda_p
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: G es el modulo que distingue solidos de fluidos para la propagacion de ondas. Sin G no hay onda S.
    en: G is the modulus that distinguishes solids from fluids for wave propagation. Without G there is no S wave.
- id: rho_medio
  symbol: \rho_{medio}
  nombre:
    es: Densidad del medio
    en: Medium density
  descripcion:
    es: Masa por unidad de volumen del material por el que se propagan las ondas sismicas.
    en: Mass per unit volume of the material through which seismic waves propagate.
  unidad_si: kg/m3
  dimension: '[M L⁻³]'
  is_vector: false
  components: []
  category: parameter
  physical_role: material_property
  used_in:
  - elasticidad
  - sismologia
  - geofisica
  common_mistake:
    es: Usar densidad en g/cm3 sin convertir a kg/m3 (factor 1000).
    en: Using density in g/cm3 without converting to kg/m3 (factor 1000).
  typical_range: 1000–5500 kg/m3 (agua 1000, corteza 2700, nucleo 13000)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Densidad cero implicaria vacio, sin propagacion posible.
      en: Zero density would imply vacuum, no propagation possible.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1000–13000
  interpretation_role:
    primary_for: []
    secondary_for:
    - velocidad_onda_p
    - velocidad_onda_s
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: La densidad aparece en el denominador de ambas velocidades. Mayor densidad implica mayor inercia y menor velocidad,
      a igual rigidez.
    en: Density appears in the denominator of both velocities. Higher density means more inertia and lower speed, at equal
      stiffness.
- id: ratio_vp_vs
  symbol: v_p/v_s
  nombre:
    es: Cociente de velocidades P/S
    en: P/S velocity ratio
  descripcion:
    es: Relacion entre la velocidad de onda P y la de onda S, indicador del coeficiente de Poisson.
    en: Ratio between P-wave and S-wave velocity, indicator of Poisson's ratio.
  unidad_si: adimensional
  dimension: '[1]'
  is_vector: false
  components: []
  category: derived
  physical_role: diagnostic_ratio
  used_in:
  - clasificacion litologica
  - deteccion de fluidos
  - caracterizacion geotecnica
  common_mistake:
    es: Creer que el cociente puede ser menor que 1. Siempre v_p mayor que v_s en solidos.
    en: Believing the ratio can be less than 1. Always v_p greater than v_s in solids.
  typical_range: 1.4–2.5 (rocas cristalinas 1.7, sedimentos saturados 2.0–2.5)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positivo y mayor que 1.
      en: Always positive and greater than 1.
  zero_behavior:
    allowed: false
    meaning:
      es: Cociente cero no tiene significado fisico.
      en: Zero ratio has no physical meaning.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1.4–5
  interpretation_role:
    primary_for:
    - relacion_vp_vs_poisson
    secondary_for: []
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Un ratio alto (mayor que 2) indica medio saturado o parcialmente fluido. Un ratio cercano a 1.73 (raiz de 3) indica
      nu de 0.25, comun en rocas secas.
    en: A high ratio (above 2) indicates a saturated or partially fluid medium. A ratio near 1.73 (square root of 3) indicates
      nu of 0.25, common in dry rocks.
- id: nu_poisson
  symbol: \nu
  nombre:
    es: Coeficiente de Poisson
    en: Poisson's ratio
  descripcion:
    es: Relacion entre la deformacion transversal y la axial bajo carga uniaxial.
    en: Ratio between transverse and axial strain under uniaxial loading.
  unidad_si: adimensional
  dimension: '[1]'
  is_vector: false
  components: []
  category: parameter
  physical_role: material_property
  used_in:
  - elasticidad
  - sismologia
  - geotecnia
  common_mistake:
    es: Asumir que nu puede valer 0.5 en un solido. El limite 0.5 corresponde a un fluido incompresible.
    en: Assuming nu can equal 0.5 in a solid. The limit 0.5 corresponds to an incompressible fluid.
  typical_range: 0.05–0.45 (corcho 0.0, caucho 0.49, rocas 0.2–0.3)
  sign_behavior:
    has_sign: false
    meaning:
      es: Normalmente positivo. Valores negativos existen (materiales auxeticos) pero son raros.
      en: Normally positive. Negative values exist (auxetic materials) but are rare.
  zero_behavior:
    allowed: true
    meaning:
      es: Nu cero indica un material que no se contrae lateralmente al estirarse (corcho).
      en: Zero nu indicates a material that does not contract laterally when stretched (cork).
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: false
    expected_interval: 0–0.5
  interpretation_role:
    primary_for: []
    secondary_for:
    - relacion_vp_vs_poisson
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: En sismologia, nu se obtiene a partir del cociente v_p/v_s. Valores altos de nu indican presencia de fluidos en los
      poros de la roca.
    en: In seismology, nu is obtained from the v_p/v_s ratio. High nu values indicate the presence of fluids in the rock pores.
- id: delta_t_ps
  symbol: \Delta t_{PS}
  nombre:
    es: Diferencia de tiempos P-S
    en: P-S time difference
  descripcion:
    es: Intervalo temporal entre la llegada de la onda P y la onda S a un sismografo.
    en: Time interval between P-wave and S-wave arrivals at a seismograph.
  unidad_si: s
  dimension: '[T]'
  is_vector: false
  components: []
  category: derived
  physical_role: observable_measurement
  used_in:
  - localizacion de sismos
  - triangulacion epicentral
  - alerta temprana
  common_mistake:
    es: Confundir delta_t_ps con el tiempo de viaje de la onda P. Delta_t es la diferencia, no el tiempo absoluto.
    en: Confusing delta_t_ps with P-wave travel time. Delta_t is the difference, not the absolute time.
  typical_range: 1–600 s (sismo local 5–30 s, telesismo 200–600 s)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva porque la P llega antes.
      en: Always positive because P arrives first.
  zero_behavior:
    allowed: false
    meaning:
      es: Delta_t cero implicaria v_p igual a v_s, imposible en un solido real.
      en: Zero delta_t would imply v_p equals v_s, impossible in a real solid.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1–600
  interpretation_role:
    primary_for:
    - diferencia_tiempos_sismo
    secondary_for: []
  graph_binding:
    channels:
    - separacion_dromocronas
  pedagogical_notes:
    es: Midiendo delta_t en tres estaciones y usando las velocidades conocidas se puede triangular la posicion del foco sismico.
    en: Measuring delta_t at three stations and using known velocities allows triangulating the seismic focus position.
- id: d_foco
  symbol: d_{foco}
  nombre:
    es: Distancia al foco sismico
    en: Distance to seismic focus
  descripcion:
    es: Distancia rectilinea entre el foco (hipocentro) del sismo y la estacion sismologica.
    en: Straight-line distance between the earthquake focus (hypocenter) and the seismological station.
  unidad_si: m
  dimension: '[L]'
  is_vector: false
  components: []
  category: parameter
  physical_role: geometric_parameter
  used_in:
  - localizacion sismica
  - triangulacion
  - atenuacion
  common_mistake:
    es: Confundir distancia al foco (hipocentro, 3D) con distancia epicentral (proyeccion en superficie).
    en: Confusing distance to focus (hypocenter, 3D) with epicentral distance (surface projection).
  typical_range: 1e3–1.3e7 m (local 1–100 km, regional 100–1000 km, telesismo 1000–13000 km)
  sign_behavior:
    has_sign: false
    meaning:
      es: Siempre positiva, es una distancia geometrica.
      en: Always positive, it is a geometric distance.
  zero_behavior:
    allowed: false
    meaning:
      es: Distancia cero significaria estar en el propio foco.
      en: Zero distance would mean being at the focus itself.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: 1e3–1.3e7
  interpretation_role:
    primary_for: []
    secondary_for:
    - diferencia_tiempos_sismo
  graph_binding:
    channels:
    - eje_x_dromocronas
  pedagogical_notes:
    es: La distancia al foco se obtiene de la diferencia de tiempos P-S multiplicada por un factor que depende de las velocidades
      medias del medio.
    en: The distance to the focus is obtained from the P-S time difference multiplied by a factor depending on the mean velocities
      of the medium.
