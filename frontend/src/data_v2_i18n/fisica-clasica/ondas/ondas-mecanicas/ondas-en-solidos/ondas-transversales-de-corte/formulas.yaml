- id: relacion_vp_vs_poisson
  title:
    es: Relacion P/S y Poisson
    en: P/S and Poisson relation
  equation: ratio_vp_vs = sqrt(2*(1-nu_poisson)/(1-2*nu_poisson))
  latex: v_p/v_s = \sqrt{2(1-\nu)/(1-2\nu)}
  rearrangements:
  - target: ratio_vp_vs
    equation: ratio_vp_vs = sqrt(2*(1-nu_poisson)/(1-2*nu_poisson))
    latex: v_p/v_s = \sqrt{2(1-\nu)/(1-2\nu)}
  category: structural
  relation_type: constitutive_relation
  physical_meaning:
    es: Conecta la separacion entre velocidades P y S con la compresibilidad elastica.
    en: Connects the separation between P and S velocities with elastic compressibility.
  constraints:
  - rho_medio > 0
  - 0 <= nu_poisson < 0.5
  validity:
