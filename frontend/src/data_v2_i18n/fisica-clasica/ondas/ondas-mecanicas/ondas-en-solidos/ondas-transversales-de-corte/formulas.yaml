- id: energia_onda_transversal
  title:
    es: Densidad de energia transversal
    en: Transverse energy density
  equation: u_s = 0.5 * rho_medio * omega_angular^2 * A_s^2
  latex: u_s = \frac12 \rho \omega^2 A_s^2
