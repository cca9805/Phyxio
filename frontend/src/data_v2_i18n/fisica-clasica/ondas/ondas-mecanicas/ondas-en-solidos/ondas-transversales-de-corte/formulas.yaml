version: v5
id: formulas_ondas_transversales_de_corte
formulas:
- id: velocidad_onda_s
  title:
    es: Velocidad de onda S
    en: S-wave velocity
  equation: v_s = sqrt(G / rho_medio)
  latex: v_s = \sqrt{G/\rho}
  rearrangements:
  - target: v_s
    equation: v_s = sqrt(G / rho_medio)
    latex: v_s = \sqrt{G/\rho}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La velocidad de corte aumenta con la rigidez transversal y disminuye con la inercia volumetrica.
    en: Shear velocity increases with transverse stiffness and decreases with volumetric inertia.
  constraints:
  - rho_medio > 0
  - G > 0
  validity:
    es: Valida para solidos elasticos isotropos, homogeneos, pequenas deformaciones y longitud de onda grande frente a la
      microestructura.
    en: Valid for isotropic homogeneous elastic solids, small deformation and wavelength large compared with the microstructure.
  dimension_check: '`[M L^-1 T^-2] / [M L^-3] -> [L^2 T^-2]` en relaciones de velocidad, y unidades coherentes en las derivadas.'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - calculo de ondas S
  - interpretacion de rigidez
  - lectura de graficos
  interpretation_tags:
  - onda_s
  - corte
  - solido_elastico
  result_semantics:
    target: v_s
    kind: scalar_positive
    sign_meaning:
      es: El resultado fisico se interpreta como magnitud positiva.
      en: The physical result is interpreted as a positive magnitude.
    absolute_value_meaning:
      es: Un valor mayor indica una respuesta transversal mas intensa, mas rapida o mas resistente segun la magnitud objetivo.
      en: A larger value indicates a stronger, faster or more resistant transverse response depending on the target magnitude.
  domain_checks:
  - Comprobar que el medio tiene rigidez de corte distinta de cero.
  - Comprobar que las entradas son positivas y estan en unidades SI.
  coherence_checks:
  - La velocidad S debe ser menor que la velocidad P del mismo medio.
  - El modelo deja de ser fiable si domina la dispersion o la anisotropia.
  graph_implications:
  - La curva principal crece con la rigidez de corte.
  - La lectura del punto operativo debe mantenerse en el dominio de solido elastico.
  pedagogical_triggers:
  - Confusion entre onda transversal y onda longitudinal.
  - Uso de formulas de fluidos donde no existe rigidez de corte.
