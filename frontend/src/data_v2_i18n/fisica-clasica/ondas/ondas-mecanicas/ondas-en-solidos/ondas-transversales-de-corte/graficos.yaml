version: "1.0"
leaf: "ondas-transversales-de-corte"

coord:
  title:
    es: Gráfica Coord · Ondas Transversales de Corte (S)
    en: Coord Graph · Shear (S) Transverse Waves
  xAxis:
    es: posición x (m)
    en: position x (m)
  yAxis:
    es: desplazamiento transversal u⊥ (m)
    en: transverse displacement u⊥ (m)
  xMagnitude: x
  yMagnitude: u
  relation:
    es: v_S = √(μ/ρ). Oscilación ⊥. Solo en sólidos.
    en: v_S = √(μ/ρ). ⊥ oscillation. Solids only.
  physicalReading:
    es: v_S < v_P. No existe en fluidos.
    en: v_S < v_P. Does not exist in fluids.
  slopeMeaning:
    es: "∂u/∂x: cizalla."
    en: "∂u/∂x: shear."
  interceptMeaning:
    es: "u(0): condición inicial."
    en: "u(0): initial condition."
  curvatureMeaning:
    es: ∂²u/∂t² = v_S²·∂²u/∂x².
    en: ∂²u/∂t² = v_S²·∂²u/∂x².
  signMeaning:
    es: u ⊥ x.
    en: u ⊥ x.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: x en el sólido.
    en: x in the solid.
  modelConnection:
    es: Ondas S.
    en: S waves.
  formulaConnection:
    es: v_S = √(μ/ρ).
    en: v_S = √(μ/ρ).
  readingFocus:
    es: verificar u ⊥ y v_S < v_P.
    en: verify u ⊥ and v_S < v_P.
  agentHints:
    es:
      - v_S = √(μ/ρ).
      - Solo sólidos.
      - u ⊥.
    en:
      - v_S = √(μ/ρ).
      - Solids only.
      - u ⊥.
  commonMistakes:
    es:
      - S en fluidos.
      - "v_S > v_P."
      - u ∥.
    en:
      - S in fluids.
      - "v_S > v_P."
      - u ∥.

