targets:
  v_s:
    enabled: true
    magnitude_type: state
    semantic_role:
      es: Magnitud usada para interpretar ondas S en solidos elasticos.
      en: Magnitude used to interpret S waves in elastic solids.
    summary_rules:
    - id: v_s_summary_rules_1
      when: 'true'
      status: ok
      text:
        es: '[[v_s]] resume una parte de la propagacion S: rigidez de corte, inercia, escala, energia o comparacion modal.'
        en: '[[v_s]] summarises one part of S-wave propagation: shear stiffness, inertia, scale, energy or modal comparison.'
    physical_reading_rules:
    - id: v_s_physical_reading_rules_1
      when: 'true'
      status: ok
      text:
        es: Porque la propagacion depende del acoplamiento entre recuperacion elastica de corte e inercia local, [[v_s]] no
          debe leerse aislada.
        en: The physical cause is coupling between shear elastic recovery and local inertia, so [[v_s]] must not be read in
          isolation.
    coherence_rules:
    - id: v_s_coherence_rules_1
      when: 'true'
      status: ok
      text:
        es: La lectura es coherente si las magnitudes son positivas, [[v_s]] queda por debajo de [[v_p]] y las unidades se
          mantienen en SI.
        en: The reading is coherent if magnitudes are positive, [[v_s]] remains below [[v_p]] and units are kept in SI.
    model_validity_rules:
    - id: v_s_model_validity_rules_1
      when: 'true'
      status: ok
      text:
        es: El modelo es valido cuando el medio es solido elastico, la deformacion es pequena y [[lambda_s]] promedia la microestructura.
        en: The model is valid when the medium is an elastic solid, deformation is small and [[lambda_s]] averages the microstructure.
    graph_rules:
    - id: v_s_graph_rules_1
      when: 'true'
      status: ok
      text:
        es: En el grafico, [[v_s]] debe apoyar la lectura visual de rigidez, densidad, escala espacial o impedancia transversal.
        en: On the graph, [[v_s]] must support the visual reading of stiffness, density, spatial scale or shear impedance.
    likely_errors:
    - id: v_s_likely_errors_1
      when: 'true'
      status: ok
      text:
        es: 'Error plausible: confundir o creer que [[v_s]] como si describiera una onda longitudinal, un fluido o un regimen
          dispersivo fuera del modelo.'
        en: 'A common mistake is to interpret [[v_s]] in isolation: Likely error: using [[v_s]] as if it described a longitudinal
          wave, a fluid or a dispersive regime outside the model.'
    next_step_rules:
    - id: v_s_next_step_rules_1
      when: 'true'
      status: ok
      text:
        es: 'Siguiente paso: comparar [[v_s]] con rangos reales y decidir si basta el modelo ideal o conviene un modelo extendido.'
        en: 'Next step: compare [[v_s]] with real ranges and decide whether the ideal model is sufficient or an extended model
          is needed.'
    physical_intuition:
    - id: v_s_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[v_s]] describe el estado dinámico.
        en: Intuitively, [[v_s]] describes the dynamic state.
    limiting_cases:
    - id: v_s_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[v_s]].
        en: Check limiting cases of [[v_s]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
