version: v5
id: magnitudes_ondas_transversales_de_corte
magnitudes:
- id: v_s
  symbol: v_s
  nombre:
    es: Velocidad de onda S
    en: S-wave velocity
  descripcion:
    es: Velocidad con la que avanza una perturbacion transversal de corte en un solido elastico.
    en: Speed at which a transverse shear disturbance travels through an elastic solid.
  unidad_si: m/s
  dimension: '[L T^-1]'
  is_vector: false
  components: []
  category: state
  physical_role: state
  used_in:
  - ondas transversales de corte
  - lectura de rigidez e inercia
  - validacion del modelo elastico
  common_mistake: Usar v_s como si perteneciera a una onda longitudinal o a un fluido sin rigidez de corte
  typical_range: 30 m/s a 4500 m/s
  sign_behavior:
    has_sign: false
    meaning:
      es: Se interpreta por su valor positivo dentro del modelo lineal.
      en: It is interpreted through its positive value in the linear model.
  zero_behavior:
    allowed: false
    meaning:
      es: El valor nulo marca ausencia de respuesta observable o salida del regimen de propagacion.
      en: The zero value marks no observable response or exit from the propagation regime.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, inf)'
  interpretation_role:
    primary_for:
    - lectura_fisica
    - coherencia
    secondary_for:
    - model_validity
  graph_binding:
    channels:
    - calculator
    - graph_reading
  pedagogical_notes:
    es: En este leaf, Velocidad de onda S debe leerse junto con rigidez, densidad y condicion de solido.
    en: In this leaf, S-wave velocity must be read together with stiffness, density and the solid-medium condition.
