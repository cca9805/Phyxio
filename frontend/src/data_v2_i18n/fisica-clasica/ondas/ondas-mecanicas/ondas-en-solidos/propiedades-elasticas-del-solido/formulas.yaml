version: '1.0'
leaf_id: propiedades-elasticas-del-solido
formulas:
- id: modulo_young
  nombre:
    es: Modulo de Young
    en: Young Modulus
  title:
    es: Modulo de Young
    en: Young modulus
  equation: E = sigma / epsilon
  latex: E = \frac{\sigma}{\varepsilon}
  expresion_latex: E = \frac{\sigma}{\varepsilon}
  expresion_verbal:
    es: El modulo de Young es el cociente entre la tension normal aplicada y la deformacion longitudinal resultante.
    en: Young modulus is the ratio of normal stress to the resulting longitudinal strain.
  unidades_SI: Pa
  dimension: '[M L⁻¹ T⁻²]'
  variables:
  - id: modulo_de_young
    nombre:
      es: Modulo de Young
      en: Young modulus
    unidad: Pa
  - id: sigma
    nombre:
      es: Tension normal
      en: Normal stress
    unidad: Pa
  - id: epsilon
    nombre:
      es: Deformacion longitudinal
      en: Longitudinal strain
    unidad: adimensional
  result_semantics:
    target: modulo_de_young
    direction: positive_always
    physical_meaning:
      es: Rigidez del material frente a traccion o compresion uniaxial.
      en: Material stiffness against uniaxial tension or compression.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  rearrangements:
  - id: despeje_sigma
    target: sigma
    expresion_latex: \sigma = E \, \varepsilon
    descripcion:
      es: Tension normal a partir de modulo de Young y deformacion.
      en: Normal stress from Young modulus and strain.
    equation: sigma
    latex: sigma
  - id: despeje_epsilon
    target: epsilon
    expresion_latex: \varepsilon = \frac{\sigma}{E}
    descripcion:
      es: Deformacion longitudinal a partir de tension y modulo de Young.
      en: Longitudinal strain from stress and Young modulus.
    equation: epsilon
    latex: epsilon
  categoria:
    principal: elasticidad
    secundaria: modulos-elasticos
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Mide la resistencia del solido a deformarse longitudinalmente bajo tension uniaxial. Un valor alto indica un material
      rigido.
    en: Measures the solid resistance to longitudinal deformation under uniaxial stress. A high value indicates a stiff material.
  validity:
    es: Valida para solidos isotropos en regimen elastico lineal y pequenas deformaciones longitudinales.
    en: Valid for isotropic solids in the linear elastic regime and small longitudinal strains.
  dimension_check: '`[M L^-1 T^-2] / [1] -> [M L^-1 T^-2]`'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - calculo de deformacion longitudinal
  - comparacion de rigidez uniaxial
  - conversion entre modulos elasticos
  interpretation_tags:
  - rigidez_longitudinal
  - elasticidad_lineal
  domain_checks:
  - Verificar que sigma y E esten en pascales.
  - Verificar que epsilon sea adimensional y pequeno.
  coherence_checks:
  - E debe ser positivo.
  - La deformacion debe crecer con la tension aplicada.
  graph_implications:
  - Pendiente de la curva tension-deformacion longitudinal.
  pedagogical_triggers:
  - Confundir deformacion con alargamiento absoluto.
  - Usar MPa y GPa sin conversion consistente.
  constraints:
  - E > 0
  - sigma >= 0 en traccion, sigma <= 0 en compresion
  - epsilon != 0 para definir E
  pedagogical_trigger:
    es: ¿Por que el acero se deforma menos que el caucho bajo la misma tension?
    en: Why does steel deform less than rubber under the same stress?
- id: modulo_cizalla
  nombre:
    es: Modulo de cizalla
    en: Shear Modulus
  title:
    es: Modulo de cizalla
    en: Shear modulus
  equation: G = tau / gamma
  latex: G = \frac{\tau}{\gamma}
  expresion_latex: G = \frac{\tau}{\gamma}
  expresion_verbal:
    es: El modulo de cizalla es el cociente entre la tension tangencial y la deformacion angular.
    en: Shear modulus is the ratio of shear stress to angular deformation.
  unidades_SI: Pa
  dimension: '[M L⁻¹ T⁻²]'
  variables:
  - id: modulo_de_cizalla
    nombre:
      es: Modulo de cizalla
      en: Shear modulus
    unidad: Pa
  - id: tau
    nombre:
      es: Tension tangencial
      en: Shear stress
    unidad: Pa
  - id: gamma
    nombre:
      es: Deformacion angular
      en: Angular strain
    unidad: rad
  result_semantics:
    target: modulo_de_cizalla
    direction: positive_always
    physical_meaning:
      es: Rigidez del material frente a deformacion de cizalla.
      en: Material stiffness against shear deformation.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  rearrangements:
  - id: despeje_tau
    target: tau
    expresion_latex: \tau = G \, \gamma
    descripcion:
      es: Tension tangencial a partir de modulo de cizalla y deformacion angular.
      en: Shear stress from shear modulus and angular strain.
    equation: tau
    latex: tau
  - id: despeje_gamma
    target: gamma
    expresion_latex: \gamma = \frac{\tau}{G}
    descripcion:
      es: Deformacion angular a partir de tension tangencial y modulo de cizalla.
      en: Angular strain from shear stress and shear modulus.
    equation: gamma
    latex: gamma
  categoria:
    principal: elasticidad
    secundaria: modulos-elasticos
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Mide la resistencia del solido a cambiar de forma sin cambiar de volumen. Fundamental para ondas transversales.
    en: Measures the solid resistance to shape change without volume change. Fundamental for transverse waves.
  validity:
    es: Valida para deformaciones de cizalla pequenas en solidos elasticos lineales.
    en: Valid for small shear strains in linear elastic solids.
  dimension_check: '`[M L^-1 T^-2] / [1] -> [M L^-1 T^-2]`'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - respuesta a cizalla
  - ondas transversales en solidos
  - conversion con modulo de Young y Poisson
  interpretation_tags:
  - rigidez_cizalla
  - ondas_transversales
  domain_checks:
  - Verificar que tau este en pascales.
  - Verificar que gamma sea pequeno y adimensional.
  coherence_checks:
  - G debe ser positivo en un solido estable.
  - Un fluido ideal no sostiene G elastico.
  graph_implications:
  - Pendiente de la curva tension tangencial-deformacion angular.
  pedagogical_triggers:
  - Confundir cizalla con compresion volumetrica.
  - Pensar que los fluidos transmiten ondas S de volumen.
  constraints:
  - G > 0
  - tau >= 0
  - gamma != 0 para definir G
  pedagogical_trigger:
    es: ¿Por que los liquidos no resisten esfuerzos de cizalla y los solidos si?
    en: Why do liquids not resist shear stress while solids do?
- id: modulo_compresibilidad
  nombre:
    es: Modulo de compresibilidad
    en: Bulk Modulus
  title:
    es: Modulo de compresibilidad
    en: Bulk modulus
  equation: K = - \Delta P / \Delta V / V
  expresion_latex: K = -V \frac{\Delta P}{\Delta V}
  latex: K = - \Delta P / \Delta V / V
  expresion_verbal:
    es: El modulo de compresibilidad es la resistencia del material al cambio de volumen bajo presion hidrostatica.
    en: Bulk modulus is the material resistance to volume change under hydrostatic pressure.
  unidades_SI: Pa
  dimension: '[M L⁻¹ T⁻²]'
  variables:
  - id: modulo_de_compresibilidad
    nombre:
      es: Modulo de compresibilidad
      en: Bulk modulus
    unidad: Pa
  - id: variacion_de_presion
    nombre:
      es: Variacion de presion
      en: Pressure change
    unidad: Pa
  - id: variacion_relativa_de_volumen
    nombre:
      es: Variacion relativa de volumen
      en: Relative volume change
    unidad: adimensional
  result_semantics:
    target: modulo_de_compresibilidad
    direction: positive_always
    physical_meaning:
      es: Resistencia volumetrica del material a compresion hidrostatica uniforme.
      en: Volumetric resistance of the material to uniform hydrostatic compression.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  rearrangements:
  - id: despeje_DeltaP
    target: variacion_de_presion
    expresion_latex: \Delta P = -K \frac{\Delta V}{V}
    descripcion:
      es: Variacion de presion a partir de modulo de compresibilidad y cambio de volumen relativo.
      en: Pressure change from bulk modulus and relative volume change.
    equation: variacion_de_presion
    latex: variacion_de_presion
  - id: despeje_DeltaV_rel
    target: variacion_relativa_de_volumen
    expresion_latex: \frac{\Delta V}{V} = -\frac{\Delta P}{K}
    descripcion:
      es: Cambio de volumen relativo a partir de presion y modulo de compresibilidad.
      en: Relative volume change from pressure and bulk modulus.
    equation: variacion_relativa_de_volumen
    latex: variacion_relativa_de_volumen
  categoria:
    principal: elasticidad
    secundaria: modulos-elasticos
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: Cuantifica cuanto resiste un material a ser comprimido uniformemente. Relevante tanto en solidos como en fluidos.
    en: Quantifies how much a material resists uniform compression. Relevant for both solids and fluids.
  validity:
    es: Valida para compresion hidrostatica uniforme y cambios relativos de volumen pequenos.
    en: Valid for uniform hydrostatic compression and small relative volume changes.
  dimension_check: '`[M L^-1 T^-2] / [1] -> [M L^-1 T^-2]`'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - compresion hidrostatica
  - respuesta volumetrica
  - ondas longitudinales en solidos
  interpretation_tags:
  - rigidez_volumetrica
  - compresibilidad
  domain_checks:
  - Verificar que \Delta P este en pascales.
  - Verificar que \Delta V / V sea adimensional y con signo coherente.
  coherence_checks:
  - K debe ser positivo.
  - Una presion positiva de compresion debe reducir el volumen.
  graph_implications:
  - Pendiente efectiva en una curva presion-cambio relativo de volumen.
  pedagogical_triggers:
  - Olvidar el signo negativo de la compresion.
  - Confundir rigidez volumetrica con rigidez de cizalla.
  constraints:
  - K > 0
  - \Delta V / V < 0 si \Delta P > 0 (compresion reduce volumen)
  pedagogical_trigger:
    es: ¿Por que el agua es casi incompresible comparada con el aire?
    en: Why is water nearly incompressible compared to air?
- id: relacion_poisson
  nombre:
    es: Coeficiente de Poisson
    en: Poisson Ratio
  title:
    es: Coeficiente de Poisson
    en: Poisson ratio
  equation: nu_poisson = - epsilon_transv / epsilon_long
  latex: nu_poisson = - epsilon_transv / epsilon_long
  expresion_latex: \nu = -\frac{\varepsilon_{\mathrm{transv}}}{\varepsilon_{\mathrm{long}}}
  expresion_verbal:
    es: El coeficiente de Poisson es el cociente negativo entre la deformacion transversal y la deformacion longitudinal.
    en: Poisson ratio is the negative ratio of transverse strain to longitudinal strain.
  unidades_SI: adimensional
  dimension: '[1]'
  variables:
  - id: nu_poisson
    nombre:
      es: Coeficiente de Poisson
      en: Poisson ratio
    unidad: adimensional
  - id: epsilon_transv
    nombre:
      es: Deformacion transversal
      en: Transverse strain
    unidad: adimensional
  - id: epsilon_long
    nombre:
      es: Deformacion longitudinal
      en: Longitudinal strain
    unidad: adimensional
  result_semantics:
    target: nu_poisson
    direction: positive_typical
    physical_meaning:
      es: Grado de acoplamiento entre deformacion longitudinal y contraccion transversal.
      en: Degree of coupling between longitudinal deformation and transverse contraction.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  rearrangements:
  - id: despeje_epsilon_transv
    target: epsilon_transv
    expresion_latex: \varepsilon_{\mathrm{transv}} = -\nu \, \varepsilon_{\mathrm{long}}
    descripcion:
      es: Deformacion transversal a partir de Poisson y deformacion longitudinal.
      en: Transverse strain from Poisson ratio and longitudinal strain.
    equation: epsilon_transv
    latex: epsilon_transv
  categoria:
    principal: elasticidad
    secundaria: constantes-elasticas
  category: derived
  relation_type: definition
  physical_meaning:
    es: Describe como un material se contrae lateralmente al ser estirado. Para materiales isotropos comunes toma valores
      entre 0 y 0.5.
    en: Describes how a material contracts laterally when stretched. For common isotropic materials it ranges from 0 to 0.5.
  validity:
    es: Valida para deformaciones pequenas en materiales donde puede definirse una direccion longitudinal y una transversal.
    en: Valid for small strains in materials where longitudinal and transverse directions can be defined.
  dimension_check: '`[1] / [1] -> [1]`'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - contraccion lateral
  - conversion entre modulos isotropos
  - diagnostico de compresibilidad
  interpretation_tags:
  - acoplamiento_lateral
  - poisson
  domain_checks:
  - Verificar que epsilon_transv y epsilon_long sean adimensionales.
  - Verificar convencion de signos para traccion y contraccion.
  coherence_checks:
  - nu_poisson debe respetar los limites de estabilidad isotropa.
  - Valores cercanos a 0.5 indican casi incompresibilidad.
  graph_implications:
  - Relaciona contraccion lateral con elongacion longitudinal.
  pedagogical_triggers:
  - Olvidar el signo negativo.
  - Creer que Poisson puede tomar cualquier valor.
  constraints:
  - -1 < nu_poisson <= 0.5 (estabilidad termodinamica)
  - nu_poisson = 0.5 indica material incompresible
  pedagogical_trigger:
    es: ¿Por que una goma se estrecha cuando la estiras?
    en: Why does a rubber band get thinner when you stretch it?
- id: relacion_E_G_nu
  nombre:
    es: Relacion entre E, G y nu
    en: Relationship between E, G and nu
  title:
    es: Relacion entre E, G y Poisson
    en: Relation between E, G and Poisson
  equation: E = 2 * G * (1 + nu_poisson)
  latex: E = 2G(1+\nu)
  expresion_latex: E = 2G(1 + \nu)
  expresion_verbal:
    es: El modulo de Young se relaciona con el modulo de cizalla y el coeficiente de Poisson mediante el factor dos por uno
      mas nu.
    en: Young modulus relates to shear modulus and Poisson ratio by the factor two times one plus nu.
  unidades_SI: Pa
  dimension: '[M L⁻¹ T⁻²]'
  variables:
  - id: modulo_de_young
    nombre:
      es: Modulo de Young
      en: Young modulus
    unidad: Pa
  - id: modulo_de_cizalla
    nombre:
      es: Modulo de cizalla
      en: Shear modulus
    unidad: Pa
  - id: nu_poisson
    nombre:
      es: Coeficiente de Poisson
      en: Poisson ratio
    unidad: adimensional
  result_semantics:
    target: modulo_de_young
    direction: positive_always
    physical_meaning:
      es: Vinculo termodinamico que reduce las constantes elasticas independientes de un isotropo a solo dos.
      en: Thermodynamic link that reduces the independent elastic constants of an isotropic solid to just two.
    kind: scalar
    absolute_value_meaning:
      es: El valor numerico indica la intensidad de la magnitud calculada.
      en: The numerical value indicates the intensity of the calculated quantity.
    sign_meaning:
      es: El signo depende de la convencion fisica adoptada.
      en: The sign depends on the adopted physical convention.
  rearrangements:
  - id: despeje_G_desde_E_nu
    target: modulo_de_cizalla
    expresion_latex: G = \frac{E}{2(1+\nu)}
    descripcion:
      es: Modulo de cizalla a partir de modulo de Young y Poisson.
      en: Shear modulus from Young modulus and Poisson ratio.
    equation: modulo_de_cizalla
    latex: modulo_de_cizalla
  - id: despeje_nu_desde_E_G
    target: nu_poisson
    expresion_latex: \nu = \frac{E}{2G} - 1
    descripcion:
      es: Coeficiente de Poisson a partir de modulo de Young y modulo de cizalla.
      en: Poisson ratio from Young modulus and shear modulus.
    equation: nu_poisson
    latex: nu_poisson
  categoria:
    principal: elasticidad
    secundaria: relaciones-entre-modulos
  category: structural
  relation_type: constitutive_relation
  physical_meaning:
    es: Demuestra que en un isotropo solo dos constantes elasticas son independientes; la tercera queda determinada por esta
      relacion.
    en: Demonstrates that in an isotropic solid only two elastic constants are independent; the third is determined by this
      relation.
  validity:
    es: Valida para solidos isotropos, homogeneos y elasticos lineales.
    en: Valid for isotropic, homogeneous, linear elastic solids.
  dimension_check: '`[M L^-1 T^-2] * [1] -> [M L^-1 T^-2]`'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - conversion entre modulos
  - verificacion de isotropia
  - calculo de constantes elasticas
  interpretation_tags:
  - relacion_isotropa
  - constantes_elasticas
  domain_checks:
  - Verificar E y G positivos.
  - Verificar nu_poisson dentro del rango fisico.
  coherence_checks:
  - Solo dos constantes son independientes en un isotropo.
  - La relacion no debe aplicarse a anisotropia marcada.
  graph_implications:
  - Une familias de curvas de modulos elasticos equivalentes.
  pedagogical_triggers:
  - Aplicar la relacion isotropa a materiales anisotropos.
  - Tratar E, G y nu_poisson como independientes.
  constraints:
  - E > 0
  - G > 0
  - -1 < nu_poisson <= 0.5
  pedagogical_trigger:
    es: ¿Por que conocer dos modulos elasticos basta para describir completamente un solido isotropo?
    en: Why is knowing two elastic moduli enough to fully describe an isotropic solid?
