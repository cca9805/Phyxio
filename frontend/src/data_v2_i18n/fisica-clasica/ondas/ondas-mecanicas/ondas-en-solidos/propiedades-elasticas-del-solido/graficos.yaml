version: "1.0"
leaf: "propiedades-elasticas-del-solido"

coord:
  title:
    es: Gráfica Coord · Propiedades Elásticas del Sólido
    en: Coord Graph · Elastic Properties of the Solid
  xAxis:
    es: deformación ε (adimensional)
    en: strain ε (dimensionless)
  yAxis:
    es: tensión σ (Pa)
    en: stress σ (Pa)
  xMagnitude: epsilon
  yMagnitude: sigma
  relation:
    es: σ = E·ε. G = E/(2(1+ν)). B = E/(3(1−2ν)).
    en: σ = E·ε. G = E/(2(1+ν)). B = E/(3(1−2ν)).
  physicalReading:
    es: Pendiente σ-ε = E. Zona lineal = elástica.
    en: Slope σ-ε = E. Linear zone = elastic.
  slopeMeaning:
    es: dσ/dε = E.
    en: dσ/dε = E.
  interceptMeaning:
    es: σ(0) = 0.
    en: σ(0) = 0.
  curvatureMeaning:
    es: No lineal en zona plástica.
    en: Non-linear in plastic zone.
  signMeaning:
    es: "σ > 0: tracción."
    en: "σ > 0: tension."
  areaMeaning:
    es: ∫σ dε = energía de deformación.
    en: ∫σ dε = deformation energy.
  domainMeaning:
    es: "ε ∈ [0, ε_rotura]."
    en: "ε ∈ [0, ε_fracture]."
  modelConnection:
    es: Propiedades elásticas.
    en: Elastic properties.
  formulaConnection:
    es: σ = Eε, G = E/(2(1+ν)).
    en: σ = Eε, G = E/(2(1+ν)).
  readingFocus:
    es: leer E como pendiente zona lineal.
    en: read E as slope of linear zone.
  agentHints:
    es:
      - E = dσ/dε.
      - G = E/(2(1+ν)).
      - ν < 0.5.
    en:
      - E = dσ/dε.
      - G = E/(2(1+ν)).
      - ν < 0.5.
  commonMistakes:
    es:
      - "ν > 0.5."
      - G = E.
      - B = G.
    en:
      - "ν > 0.5."
      - G = E.
      - B = G.

