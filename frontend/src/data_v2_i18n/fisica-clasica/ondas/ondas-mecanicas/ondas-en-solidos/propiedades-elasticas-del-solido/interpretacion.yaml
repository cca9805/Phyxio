  nu_poisson:
    enabled: true
    magnitude_type: coefficient
    semantic_role:
      es: Acoplamiento entre deformacion longitudinal y contraccion transversal.
      en: Coupling between longitudinal deformation and transverse contraction.
    summary_rules:
    - id: nu_summary_incomp
      when: nu_poisson > 0.45
      status: ok
      text:
        es: '[[nu_poisson]] cercano a 0.5 indica un material casi incompresible. La deformacion conserva el volumen.'
        en: '[[nu_poisson]] close to 0.5 indicates a nearly incompressible material. Deformation conserves volume.'
    - id: nu_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] describe el grado de acoplamiento transversal-longitudinal. Su valor determina las relaciones
          entre todos los modulos elasticos.'
        en: '[[nu_poisson]] describes the degree of transverse-longitudinal coupling. Its value determines the relationships
          between all elastic moduli.'
    physical_reading_rules:
    - id: nu_reading_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] depende de la estructura cristalina y los enlaces del material. Valores tipicos entre 0.2 y 0.45.'
        en: '[[nu_poisson]] depends on the crystal structure and bonds of the material. Typical values between 0.2 and 0.45.'
    coherence_rules:
    - id: nu_coherence_out_of_range
      when: nu_poisson > 0.5 || nu_poisson < -1
      status: error
      text:
        es: '[[nu_poisson]] fuera del rango fisico (-1, 0.5). El material seria termodinamicamente inestable.'
        en: '[[nu_poisson]] outside the physical range (-1, 0.5). The material would be thermodynamically unstable.'
    - id: nu_coherence_default
      when: 'true'
      status: ok
      text:
        es: Verificar que [[nu_poisson]] esta entre -1 y 0.5 para garantizar estabilidad.
        en: Verify that [[nu_poisson]] is between -1 and 0.5 to ensure stability.
    model_validity_rules:
    - id: nu_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo isotropo es valido si el material no presenta anisotropia direccional.
        en: The isotropic model is valid if the material does not exhibit directional anisotropy.
    graph_rules:
    - id: nu_graph_default
      when: 'true'
      status: ok
      text:
        es: '[[nu_poisson]] controla la separacion entre curvas de velocidad longitudinal y transversal.'
        en: '[[nu_poisson]] controls the separation between longitudinal and transverse velocity curves.'
    likely_errors:
    - id: nu_error_range
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[nu_poisson]] con una lectura aislada es un error frecuente: El limite superior de 0.5 corresponde
          a material incompresible. Valores superiores indican error de calculo o datos.'
        en: 'A common mistake is to interpret [[nu_poisson]] in isolation: The upper limit of 0.5 corresponds to incompressible
          material. Higher values indicate calculation or data error.'
    next_step_rules:
    - id: nu_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[nu_poisson]] con [[E_young]] para calcular [[G_shear]] y [[K_bulk]] mediante las relaciones del isotropo.
        en: Use [[nu_poisson]] with [[E_young]] to calculate [[G_shear]] and [[K_bulk]] through the isotropic relations.
    physical_intuition:
    - id: nu_poisson_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[nu_poisson]] describe el estado dinámico.
