      status: warning
      text:
        es: No confundir [[K_bulk]] (resistencia a compresion volumetrica) con [[E_young]] (resistencia a traccion uniaxial).
        en: Do not confuse [[K_bulk]] (resistance to volumetric compression) with [[E_young]] (resistance to uniaxial tension).
