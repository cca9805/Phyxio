version: "1.0"
leaf: "relacion-entre-modulos-elasticos"

coord:
  title:
    es: Gráfica Coord · Relación entre Módulos Elásticos
    en: Coord Graph · Relation Between Elastic Moduli
  xAxis:
    es: relación de Poisson ν
    en: Poisson ratio ν
  yAxis:
    es: módulo normalizado E/G o E/B
    en: normalised modulus E/G or E/B
  xMagnitude: nu
  yMagnitude: ratio
  relation:
    es: G = E/(2(1+ν)). B = E/(3(1−2ν)).
    en: G = E/(2(1+ν)). B = E/(3(1−2ν)).
  physicalReading:
    es: "ν → 0.5: B → ∞. Solo E y ν independientes."
    en: "ν → 0.5: B → ∞. Only E and ν independent."
  slopeMeaning:
    es: d(E/G)/dν = 2.
    en: d(E/G)/dν = 2.
  interceptMeaning:
    es: E/G(ν=0) = 2.
    en: E/G(ν=0) = 2.
  curvatureMeaning:
    es: E/B diverge en ν = 0.5.
    en: E/B diverges at ν = 0.5.
  signMeaning:
    es: "G, B, E > 0."
    en: "G, B, E > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "ν ∈ [0, 0.5)."
    en: "ν ∈ [0, 0.5)."
  modelConnection:
    es: Módulos elásticos.
    en: Elastic moduli.
  formulaConnection:
    es: G = E/(2(1+ν)), B = E/(3(1−2ν)).
    en: G = E/(2(1+ν)), B = E/(3(1−2ν)).
  readingFocus:
    es: leer G y B en función de ν.
    en: read G and B as function of ν.
  agentHints:
    es:
      - G = E/(2(1+ν)).
      - ν < 0.5.
    en:
      - G = E/(2(1+ν)).
      - ν < 0.5.
  commonMistakes:
    es:
      - "ν > 0.5."
      - G = E.
    en:
      - "ν > 0.5."
      - G = E.

