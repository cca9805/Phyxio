    es: Pico de amplitud en f = fₙ. v = √(E/ρ).
    en: Amplitude peak at f = fₙ. v = √(E/ρ).
  slopeMeaning:
    es: "∂u/∂x: deformación."
    en: "∂u/∂x: strain."
  interceptMeaning:
    es: "u(0): condición de contorno."
    en: "u(0): boundary condition."
  curvatureMeaning:
    es: ∂²u/∂x² = −k²u.
    en: ∂²u/∂x² = −k²u.
  signMeaning:
    es: "Nodo: u = 0."
    en: "Node: u = 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "x ∈ [0, L]."
    en: "x ∈ [0, L]."
  modelConnection:
    es: Resonancia en barras.
    en: Resonance in bars.
  formulaConnection:
    es: fₙ = nv/(2L), v = √(E/ρ).
    en: fₙ = nv/(2L), v = √(E/ρ).
  readingFocus:
    es: leer fₙ y los modos de resonancia.
    en: read fₙ and resonance modes.
  agentHints:
    es:
      - fₙ = nv/(2L).
      - v = √(E/ρ).
      - "Resonancia: f_exc = fₙ."
    en:
      - fₙ = nv/(2L).
      - v = √(E/ρ).
      - "Resonance: f_exc = fₙ."
  commonMistakes:
    es:
      - v = √(B/ρ).
      - Una sola frecuencia.
    en:
      - v = √(B/ρ).
      - Only one frequency.

