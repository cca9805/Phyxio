  enabled: true
  type: Coord
  channels:
  - Coord
  - Svg
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: true
  primary_variable: f_n
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  f_n:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: Resultado de calculo de frecuencia fundamental
      en: Result of calculo de frecuencia fundamental
    summary_rules:
    - id: f_n_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[f_n]] indica la magnitud física principal.
        en: The result [[f_n]] indicates the main physical quantity.
    physical_reading_rules:
    - id: f_n_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[f_n]] junto con su unidad y signo.
        en: Read [[f_n]] with its unit and sign.
    coherence_rules:
    - id: f_n_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba la coherencia dimensional de [[f_n]].
        en: Check the dimensional consistency of [[f_n]]
    model_validity_rules:
    - id: f_n_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[f_n]] solo dentro de la validez del modelo.
        en: Interpret [[f_n]] only within the validity of the model.
    graph_rules:
    - id: f_n_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[f_n]] con la lectura gráfica.
        en: Relate [[f_n]] to the graph.
    likely_errors:
    - id: f_n_likely_error_base
      when: 'true'
      status: warning
      text:
        es: Confundir [[f_n]] con una lectura aislada es un error frecuente; debe interpretarse
          con el modelo, las unidades y el rango físico.
        en: A common mistake is to interpret [[f_n]] in isolation; it must be read with the
          model, units, and physical range.
    next_step_rules:
    - id: f_n_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[f_n]], revisa los límites físicos.
        en: After obtaining [[f_n]], review the physical limits.
    physical_intuition:
    - id: f_n_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[f_n]] describe el estado dinámico.
        en: Intuitively, [[f_n]] describes the dynamic state.
    limiting_cases:
    - id: f_n_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[f_n]].
        en: Check limiting cases of [[f_n]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  velocidad_de_onda_longitudinal_en_barra:
    enabled: true
    magnitude_type: velocity
    semantic_role:
      es: Velocidad de onda longitudinal, parametro intermedio para calcular frecuencias.
      en: Longitudinal wave velocity, intermediate parameter for frequency calculation.
    summary_rules:
    - id: vl_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_L]] = sqrt(E/rho) es la velocidad de onda de barra, diferente de la velocidad P.'
        en: '[[v_L]] = sqrt(E/rho) is the bar wave velocity, different from P-wave velocity.'
    physical_reading_rules:
    - id: vl_reading_default
      when: 'true'
      status: ok
      text:
        es: 'v_L fija la escala de frecuencias: materiales rigidos y ligeros tienen v_L alta y resonancias altas.'
        en: 'v_L sets the frequency scale: stiff and light materials have high v_L and high resonances.'
    coherence_rules:
    - id: vl_coherence_positive
      when: v_L <= 0
      status: error
      text:
        es: '[[v_L]] debe ser positiva. Revisar E y rho.'
        en: '[[v_L]] must be positive. Check E and rho.'
    - id: vl_coherence_range
      when: v_L > 7000
      status: warning
      text:
        es: '[[v_L]] > 7000 m/s: valor inusualmente alto. Verificar que no se esta usando v_P en vez de v_barra.'
        en: '[[v_L]] > 7000 m/s: unusually high value. Check that v_P is not being used instead of v_bar.'
    - id: vl_coherence_default
      when: 'true'
      status: ok
      text:
        es: Valor dentro del rango tipico de materiales solidos.
        en: Value within typical solid materials range.
    model_validity_rules:
    - id: vl_validity_default
      when: 'true'
      status: ok
      text:
        es: Valido para barra delgada (sin confinamiento lateral). No usar para medio infinito.
        en: Valid for slender bar (no lateral confinement). Do not use for infinite medium.
    graph_rules:
    - id: vl_graph_default
      when: 'true'
      status: ok
      text:
        es: v_L determina la pendiente de la recta f vs n.
        en: v_L determines the slope of the f vs n line.
    likely_errors:
    - id: vl_error_default
      when: 'true'
      status: warning
      text:
        es: No confundir v_L (barra) con v_P (medio infinito). v_P > v_L siempre para nu > 0.
        en: Do not confuse v_L (bar) with v_P (infinite medium). v_P > v_L always for nu > 0.
    next_step_rules:
    - id: vl_next_default
      when: 'true'
      status: ok
      text:
        es: Sustituir v_L en la formula de frecuencia adecuada a la condicion de contorno.
        en: Substitute v_L in the frequency formula appropriate to the boundary condition.
    physical_intuition:
    - id: velocidad_de_onda_longitudinal_en_barra_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_onda_longitudinal_en_barra]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_onda_longitudinal_en_barra]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_onda_longitudinal_en_barra_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_onda_longitudinal_en_barra]].
        en: Check limiting cases of [[velocidad_de_onda_longitudinal_en_barra]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  longitud_de_la_barra:
    enabled: true
    magnitude_type: length
    semantic_role:
      es: Longitud de la barra, parametro geometrico principal.
      en: Bar length, main geometric parameter.
    summary_rules:
    - id: l_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[L_barra]] fija la frecuencia fundamental: f_1 es inversamente proporcional a L.'
        en: '[[L_barra]] sets the fundamental frequency: f_1 is inversely proportional to L.'
    physical_reading_rules:
    - id: l_reading_default
      when: 'true'
      status: ok
      text:
        es: Duplicar L divide la frecuencia por dos. Reducir L a la mitad duplica la frecuencia.
        en: Doubling L halves the frequency. Halving L doubles the frequency.
    coherence_rules:
    - id: l_coherence_positive
      when: L_barra <= 0
      status: error
      text:
        es: '[[L_barra]] debe ser positiva.'
        en: '[[L_barra]] must be positive.'
    - id: l_coherence_default
      when: 'true'
      status: ok
      text:
        es: Verificar que L se usa en metros en el SI.
        en: Verify that L is used in metres in SI.
    model_validity_rules:
    - id: l_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo de barra delgada requiere L >> diametro.
        en: The slender bar model requires L >> diameter.
    graph_rules:
    - id: l_graph_default
      when: 'true'
      status: ok
      text:
        es: Si L es el eje x, la frecuencia decae como 1/L (hiperbola).
        en: If L is the x-axis, frequency decays as 1/L (hyperbola).
    likely_errors:
    - id: l_error_default
      when: 'true'
      status: warning
      text:
        es: No confundir L con la longitud de onda lambda. L es la geometria; lambda es una propiedad del modo.
        en: Do not confuse L with wavelength lambda. L is geometry; lambda is a mode property.
    next_step_rules:
    - id: l_next_default
      when: 'true'
      status: ok
      text:
        es: Con L y v, calcular f_n directamente.
        en: With L and v, calculate f_n directly.
    physical_intuition:
    - id: longitud_de_la_barra_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[longitud_de_la_barra]] describe el estado dinámico.
        en: Intuitively, [[longitud_de_la_barra]] describes the dynamic state.
    limiting_cases:
    - id: longitud_de_la_barra_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[longitud_de_la_barra]].
        en: Check limiting cases of [[longitud_de_la_barra]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  n_modo:
    enabled: true
    magnitude_type: index
    semantic_role:
      es: Indice de modo que selecciona la frecuencia.
      en: Mode index selecting the frequency.
    summary_rules:
    - id: n_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[n_modo]] identifica el armonico. n = 1 es la fundamental.'
        en: '[[n_modo]] identifies the harmonic. n = 1 is the fundamental.'
    physical_reading_rules:
    - id: n_reading_default
      when: 'true'
      status: ok
      text:
        es: A mayor n, mayor frecuencia y mas nodos en el patron modal.
        en: Higher n means higher frequency and more nodes in the modal pattern.
    coherence_rules:
    - id: n_coherence_integer
      when: 'true'
      status: ok
      text:
        es: n debe ser entero positivo (n >= 1).
        en: n must be a positive integer (n >= 1).
    model_validity_rules:
    - id: n_validity_default
      when: 'true'
      status: ok
      text:
        es: El modelo simple es preciso para modos bajos (n < L/(5d)).
        en: The simple model is accurate for low modes (n < L/(5d)).
    graph_rules:
    - id: n_graph_default
      when: 'true'
      status: ok
      text:
        es: n es el eje x discreto natural del grafico de espectro.
        en: n is the natural discrete x-axis of the spectrum graph.
    likely_errors:
    - id: n_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[n_modo]] con una lectura aislada es un error frecuente: No empezar en n = 0 (modo rigido, no es vibracion
          elastica).'
        en: 'A common mistake is to interpret [[n_modo]] in isolation: Do not start at n = 0 (rigid body mode, not elastic
          vibration).'
    next_step_rules:
    - id: n_next_default
      when: 'true'
      status: ok
      text:
        es: Sustituir n en la formula de frecuencia para obtener f_n.
        en: Substitute n in the frequency formula to obtain f_n.
    physical_intuition:
    - id: n_modo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[n_modo]] describe el estado dinámico.
        en: Intuitively, [[n_modo]] describes the dynamic state.
    limiting_cases:
    - id: n_modo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[n_modo]].
        en: Check limiting cases of [[n_modo]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []

  velocidad_de_onda_de_corte:
    enabled: true
    magnitude_type: velocity
    semantic_role:
      es: Velocidad de corte, parametro para modos torsionales.
      en: Shear velocity, parameter for torsional modes.
    summary_rules:
    - id: vt_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[v_T]] = sqrt(G/rho) gobierna los modos torsionales. Siempre menor que [[v_L]].'
        en: '[[v_T]] = sqrt(G/rho) governs torsional modes. Always less than [[v_L]].'
    physical_reading_rules:
    - id: vt_reading_default
      when: 'true'
      status: ok
      text:
        es: v_T mide la rapidez de propagacion de deformaciones de cizalla. El cociente v_L/v_T depende solo de nu.
        en: v_T measures the propagation speed of shear deformations. The v_L/v_T ratio depends only on nu.
    coherence_rules:
    - id: vt_coherence_positive
      when: v_T <= 0
      status: error
      text:
        es: '[[v_T]] debe ser positiva.'
        en: '[[v_T]] must be positive.'
    - id: vt_coherence_vs_vl
      when: v_T >= v_L
      status: error
      text:
        es: '[[v_T]] >= [[v_L]]: imposible para nu > -1. Revisar G y E.'
        en: '[[v_T]] >= [[v_L]]: impossible for nu > -1. Check G and E.'
    - id: vt_coherence_default
      when: 'true'
      status: ok
      text:
        es: v_T coherente con v_L (v_T < v_L).
        en: v_T consistent with v_L (v_T < v_L).
    model_validity_rules:
    - id: vt_validity_default
      when: 'true'
      status: ok
      text:
        es: Valido para seccion circular. Secciones no circulares requieren factor corrector.
        en: Valid for circular cross-section. Non-circular sections require a correction factor.
    graph_rules:
    - id: vt_graph_default
      when: 'true'
      status: ok
      text:
        es: Modos torsionales aparecen como serie paralela a los longitudinales pero con menor pendiente.
        en: Torsional modes appear as a series parallel to longitudinal ones but with lower slope.
    likely_errors:
    - id: vt_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_de_onda_de_corte]] con una lectura aislada es un error frecuente: No usar v_T en la formula
          de frecuencia longitudinal ni v_L en la torsional.'
        en: 'A common mistake is to interpret [[velocidad_de_onda_de_corte]] in isolation: Do not use v_T in the longitudinal
          frequency formula nor v_L in the torsional one.'
    next_step_rules:
    - id: vt_next_default
      when: 'true'
      status: ok
      text:
        es: Usar v_T en la formula torsional libre-libre o fijo-libre.
        en: Use v_T in the free-free or fixed-free torsional formula.
    physical_intuition:
    - id: velocidad_de_onda_de_corte_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_de_onda_de_corte]] describe el estado dinámico.
        en: Intuitively, [[velocidad_de_onda_de_corte]] describes the dynamic state.
    limiting_cases:
    - id: velocidad_de_onda_de_corte_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[velocidad_de_onda_de_corte]].
        en: Check limiting cases of [[velocidad_de_onda_de_corte]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []

  modulo_de_young:
    enabled: true
    magnitude_type: modulus
    semantic_role:
      es: Modulo de Young que controla la rigidez longitudinal de la barra.
      en: Young modulus controlling the bar's longitudinal stiffness.
    summary_rules:
    - id: e_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[E_young]] se obtiene de la velocidad longitudinal y la densidad.'
        en: '[[E_young]] is obtained from longitudinal velocity and density.'
    physical_reading_rules:
    - id: e_reading_default
      when: 'true'
      status: ok
      text:
        es: Un [[E_young]] mayor aumenta [[v_L]] y eleva toda la serie de resonancias longitudinales.
        en: A larger [[E_young]] increases [[v_L]] and raises the whole longitudinal resonance series.
    coherence_rules:
    - id: e_coherence_positive
      when: E_young <= 0
      status: error
      text:
        es: '[[E_young]] debe ser positivo en un solido elastico estable.'
        en: '[[E_young]] must be positive in a stable elastic solid.'
    model_validity_rules:
    - id: e_validity_default
      when: 'true'
      status: ok
      text:
        es: Interpretar [[E_young]] como modulo lineal solo dentro del regimen elastico.
        en: Interpret [[E_young]] as a linear modulus only within the elastic regime.
    graph_rules:
    - id: e_graph_default
      when: 'true'
      status: ok
      text:
        es: Al aumentar [[E_young]], la pendiente frecuencia-modo crece por el aumento de [[v_L]].
        en: As [[E_young]] increases, the frequency-mode slope grows through the increase in [[v_L]].
    likely_errors:
    - id: e_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[modulo_de_young]] con una lectura aislada es un error frecuente: No sustituir [[G_shear]] por [[E_young]]
          en los modos torsionales.'
        en: 'A common mistake is to interpret [[modulo_de_young]] in isolation: Do not substitute [[G_shear]] for [[E_young]]
          in torsional modes.'
    next_step_rules:
    - id: e_next_default
      when: 'true'
      status: ok
      text:
        es: Usar [[E_young]] para calcular [[v_L]] y despues la frecuencia longitudinal.
        en: Use [[E_young]] to calculate [[v_L]] and then the longitudinal frequency.
    physical_intuition:
    - id: modulo_de_young_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[modulo_de_young]] describe el estado dinámico.
        en: Intuitively, [[modulo_de_young]] describes the dynamic state.
    limiting_cases:
    - id: modulo_de_young_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Comprueba los casos límite de [[modulo_de_young]].
        en: Check limiting cases of [[modulo_de_young]]
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  rho:
    enabled: true
    magnitude_type: density
    semantic_role:
      es: Densidad que aporta inercia y reduce las velocidades elasticas.
      en: Density providing inertia and reducing elastic wave speeds.
    summary_rules:
    - id: rho_summary_default
      when: 'true'
      status: ok
      text:
        es: '[[rho]] aparece en el denominador de las velocidades elasticas.'
        en: '[[rho]] appears in the denominator of elastic wave speeds.'
    physical_reading_rules:
    - id: rho_reading_default
      when: 'true'
      status: ok
      text:
        es: A mayor [[rho]], mas inercia moviliza la onda y menor es la frecuencia de resonancia.
        en: Higher [[rho]] means more inertia moved by the wave and lower resonance frequency.
    coherence_rules:
    - id: rho_coherence_positive
      when: rho <= 0
      status: error
      text:
        es: '[[rho]] debe ser positiva.'
        en: '[[rho]] must be positive.'
    model_validity_rules:
    - id: rho_validity_default
      when: 'true'
      status: ok
      text:
        es: Usar densidad efectiva homogenea; materiales compuestos requieren un modelo equivalente.
        en: Use homogeneous effective density; composite materials require an equivalent model.
    graph_rules:
    - id: rho_graph_default
      when: 'true'
      status: ok
      text:
        es: Al aumentar [[rho]], las series modal longitudinal y torsional bajan.
        en: As [[rho]] increases, the longitudinal and torsional modal series move down.
    likely_errors:
    - id: rho_error_default
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[rho]] con una lectura aislada es un error frecuente: Verificar unidades de [[rho]] en kg/m3 antes
          de calcular velocidades.'
        en: 'A common mistake is to interpret [[rho]] in isolation: Check [[rho]] units in kg/m3 before calculating velocities.'
    next_step_rules:
    - id: rho_next_default
      when: 'true'
      status: ok
      text:
        es: Combinar [[rho]] con [[E_young]] o [[G_shear]] para obtener la velocidad correspondiente.
