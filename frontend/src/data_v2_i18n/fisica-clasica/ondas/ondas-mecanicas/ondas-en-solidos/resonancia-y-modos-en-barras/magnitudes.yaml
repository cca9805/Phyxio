version: '1.0'
leaf_id: resonancia-y-modos-en-barras
magnitudes:
- id: f_n
  nombre:
    es: Frecuencia natural del modo n
    en: Natural frequency of mode n
  symbol: f_n
  unidad_si: Hz
  is_vector: false
  components: []
  category: frequency
  used_in:
  - freq_longitudinal_libre_libre
  - freq_longitudinal_fijo_libre
  - freq_torsional_libre_libre
  common_mistake:
    es: Confundir frecuencia angular (omega) con frecuencia (f). La relacion es omega = 2 pi f.
    en: Confusing angular frequency (omega) with frequency (f). The relation is omega = 2 pi f.
  typical_range:
    min: 20
    max: 100000
    unit: Hz
    context: Barras metalicas tipicas de laboratorio (0.1 m a 2 m)
  value_nature: siempre positiva
  dimension: '[T^-1]'
  tipo: escalar
  physical_role:
    es: Frecuencia a la que se establece un patron estacionario de vibracion en la barra.
    en: Frequency at which a standing vibration pattern is established in the bar.
  descripcion:
    es: Cada modo de vibracion tiene una frecuencia natural propia. El conjunto de frecuencias naturales constituye el espectro
      del sistema.
    en: Each vibration mode has its own natural frequency. The set of natural frequencies constitutes the system spectrum.
  sign_behavior:
    positive:
      es: Siempre positiva por definicion.
      en: Always positive by definition.
  zero_behavior:
    es: f_n = 0 corresponde al modo rigido (traslacion o rotacion de cuerpo rigido sin deformacion).
    en: f_n = 0 corresponds to the rigid body mode (translation or rotation without deformation).
  interpretation_role: target
  graph_binding:
    axis: y
    label:
      es: f_n (Hz)
      en: f_n (Hz)
    channels:
    - none
  pedagogical_notes:
    es: Los modos rigidos no son modos de vibracion elastica; aparecen solo como limite f -> 0.
    en: Rigid body modes are not elastic vibration modes; they appear only as the f -> 0 limit.
- id: n_modo
  nombre:
    es: Numero de modo
    en: Mode number
  symbol: n
  unidad_si: adimensional
  is_vector: false
  components: []
  category: index
  used_in:
  - freq_longitudinal_libre_libre
  - freq_longitudinal_fijo_libre
  - freq_torsional_libre_libre
  common_mistake:
    es: Empezar n en 0 cuando la formula asume n >= 1.
    en: Starting n at 0 when the formula assumes n >= 1.
  typical_range:
    min: 1
    max: 20
    unit: adimensional
    context: Modos observables experimentalmente en barras de laboratorio
  value_nature: entero positivo
  dimension: '[1]'
  tipo: escalar
  physical_role:
    es: Indice que identifica cada patron modal. A mayor n, mas nodos y mayor frecuencia.
    en: Index identifying each modal pattern. Higher n means more nodes and higher frequency.
  descripcion:
    es: En condiciones libre-libre y fijo-fijo, n indica cuantos semiperiodos caben en la longitud. En fijo-libre, los modos
      van como 2n-1.
    en: In free-free and fixed-fixed conditions, n indicates how many half-periods fit in the length. In fixed-free, modes
      go as 2n-1.
  sign_behavior:
    positive:
      es: Siempre positivo y entero.
      en: Always positive and integer.
  zero_behavior:
    es: n = 0 no es un modo de vibracion elastica; corresponde al estado sin deformacion.
    en: n = 0 is not an elastic vibration mode; it corresponds to the undeformed state.
  interpretation_role: input
  graph_binding:
    axis: parameter
    label:
      es: Modo n
      en: Mode n
    channels:
    - none
  pedagogical_notes:
    es: El numero de nodos internos de desplazamiento es n-1 en libre-libre y n en fijo-libre.
    en: The number of internal displacement nodes is n-1 in free-free and n in fixed-free.
- id: velocidad_de_onda_longitudinal_en_barra
  nombre:
    es: Velocidad de onda longitudinal en barra
    en: Longitudinal wave velocity in bar
  symbol: v_L
  unidad_si: m/s
  is_vector: false
  components: []
  category: wave_velocity
  used_in:
  - freq_longitudinal_libre_libre
  - freq_longitudinal_fijo_libre
  - velocidad_longitudinal_barra
  common_mistake:
    es: Confundir con la velocidad P del medio infinito, que es mayor (v_P = sqrt((lambda+2G)/rho)).
    en: Confusing with the P-wave velocity of the infinite medium, which is larger (v_P = sqrt((lambda+2G)/rho)).
  typical_range:
    min: 2000
    max: 6500
    unit: m/s
    context: Metales y ceramicas comunes
  value_nature: siempre positiva
  dimension: '[L T^-1]'
  tipo: escalar
  physical_role:
    es: Velocidad de propagacion de ondas de compresion-extension a lo largo del eje de la barra.
    en: Propagation speed of compression-extension waves along the bar axis.
  descripcion:
    es: En una barra delgada, la velocidad longitudinal es sqrt(E/rho), menor que la velocidad P porque la barra se contrae
      libremente en la direccion transversal.
    en: In a slender bar, the longitudinal velocity is sqrt(E/rho), less than P-wave velocity because the bar contracts freely
      in the transverse direction.
  sign_behavior:
    positive:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    es: v_L = 0 implicaria E = 0, que no corresponde a un solido real.
    en: v_L = 0 would imply E = 0, which does not correspond to a real solid.
  interpretation_role: parameter
  graph_binding:
    axis: none
    label:
      es: v_L (m/s)
      en: v_L (m/s)
    channels:
    - none
  pedagogical_notes:
    es: La velocidad de barra coincide con la velocidad P solo si nu = 0.
    en: The bar velocity matches P-wave velocity only if nu = 0.
- id: velocidad_de_onda_de_corte
  nombre:
    es: Velocidad de onda de corte
    en: Shear wave velocity
  symbol: v_T
  unidad_si: m/s
  is_vector: false
  components: []
  category: wave_velocity
  used_in:
  - freq_torsional_libre_libre
  - velocidad_corte_barra
  common_mistake:
    es: Usar v_T en la formula longitudinal en vez de v_L.
    en: Using v_T in the longitudinal formula instead of v_L.
  typical_range:
    min: 1000
    max: 4000
    unit: m/s
    context: Metales y ceramicas comunes
  value_nature: siempre positiva
  dimension: '[L T^-1]'
  tipo: escalar
  physical_role:
    es: Velocidad de propagacion de deformaciones de cizalla pura, relevante para modos torsionales.
    en: Propagation speed of pure shear deformations, relevant for torsional modes.
  descripcion:
    es: En una barra circular, v_T = sqrt(G/rho) es exactamente la velocidad que governs la propagacion torsional.
    en: In a circular bar, v_T = sqrt(G/rho) is exactly the velocity governing torsional propagation.
  sign_behavior:
    positive:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    es: v_T = 0 significaria G = 0 (fluido), sin modos torsionales.
    en: v_T = 0 would mean G = 0 (fluid), with no torsional modes.
  interpretation_role: parameter
  graph_binding:
    axis: none
    label:
      es: v_T (m/s)
      en: v_T (m/s)
    channels:
    - none
  pedagogical_notes:
    es: v_T siempre es menor que v_L. El cociente v_L/v_T = sqrt(E/G) = sqrt(2(1+nu)).
    en: v_T is always less than v_L. The ratio v_L/v_T = sqrt(E/G) = sqrt(2(1+nu)).
- id: longitud_de_la_barra
  nombre:
    es: Longitud de la barra
    en: Bar length
  symbol: L
  unidad_si: m
  is_vector: false
  components: []
  category: geometry
  used_in:
  - freq_longitudinal_libre_libre
  - freq_longitudinal_fijo_libre
  - freq_torsional_libre_libre
  common_mistake:
    es: Usar la longitud efectiva incorrecta cuando la barra tiene apoyos intermedios.
    en: Using the incorrect effective length when the bar has intermediate supports.
  typical_range:
    min: 0.01
    max: 5
    unit: m
    context: Barras de laboratorio a estructurales
  value_nature: siempre positiva
  dimension: '[L]'
  tipo: escalar
  physical_role:
    es: Dimension que fija la longitud de onda de los modos y por tanto las frecuencias naturales.
    en: Dimension that sets the wavelength of modes and therefore the natural frequencies.
  descripcion:
    es: La frecuencia fundamental es inversamente proporcional a L. Duplicar la longitud reduce la fundamental a la mitad.
    en: The fundamental frequency is inversely proportional to L. Doubling the length halves the fundamental.
  sign_behavior:
    positive:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    es: L = 0 no tiene sentido fisico para una barra.
    en: L = 0 has no physical meaning for a bar.
  interpretation_role: input
  graph_binding:
    axis: parameter
    label:
      es: L (m)
      en: L (m)
    channels:
    - none
  pedagogical_notes:
    es: En condiciones simetricas (libre-libre), la longitud de onda fundamental es 2L.
    en: In symmetric conditions (free-free), the fundamental wavelength is 2L.
- id: modulo_de_young
  nombre:
    es: Modulo de Young
    en: Young modulus
  symbol: E
  unidad_si: Pa
  is_vector: false
  components: []
  category: elastic_modulus
  used_in:
  - velocidad_longitudinal_barra
  common_mistake:
    es: Usar E del material sin verificar que no hay anisotropia en la direccion de la barra.
    en: Using the material E without verifying there is no anisotropy in the bar direction.
  typical_range:
    min: 1e9
    max: 500e9
    unit: Pa
    context: Desde polimeros rigidos hasta ceramicas
  value_nature: siempre positiva
  dimension: '[M L^-1 T^-2]'
  tipo: escalar
  physical_role:
    es: Rigidez uniaxial del material, controla la velocidad de onda longitudinal en la barra.
    en: Uniaxial stiffness of the material, controls longitudinal wave velocity in the bar.
  descripcion:
    es: En una barra delgada, E es el unico modulo elastico necesario para las frecuencias longitudinales.
    en: In a slender bar, E is the only elastic modulus needed for longitudinal frequencies.
  sign_behavior:
    positive:
      es: Siempre positivo en un solido real.
      en: Always positive in a real solid.
  zero_behavior:
    es: E = 0 implicaria un material sin rigidez (no propaga ondas longitudinales).
    en: E = 0 would imply a material with no stiffness (does not propagate longitudinal waves).
  interpretation_role: parameter
  graph_binding:
    axis: none
    label:
      es: E (GPa)
      en: E (GPa)
    channels:
    - none
  pedagogical_notes:
    es: En barras gruesas o a altas frecuencias, E solo no basta; aparece correccion por inercia lateral (Rayleigh-Love).
    en: In thick bars or at high frequencies, E alone is insufficient; lateral inertia correction appears (Rayleigh-Love).
- id: modulo_de_cizalla
  nombre:
    es: Modulo de cizalla
    en: Shear modulus
  symbol: G
  unidad_si: Pa
  is_vector: false
  components: []
  category: elastic_modulus
  used_in:
  - velocidad_corte_barra
  common_mistake:
    es: Confundir G con E al calcular frecuencias torsionales.
    en: Confusing G with E when calculating torsional frequencies.
  typical_range:
    min: 0.5e9
    max: 200e9
    unit: Pa
    context: Desde polimeros hasta acero
  value_nature: siempre positiva
  dimension: '[M L^-1 T^-2]'
  tipo: escalar
  physical_role:
    es: Rigidez a cizalla, controla la velocidad de onda torsional y de corte.
    en: Shear stiffness, controls torsional and shear wave velocity.
  descripcion:
    es: En modos torsionales de seccion circular, G es el unico modulo necesario.
    en: In torsional modes of circular cross-section, G is the only modulus needed.
  sign_behavior:
    positive:
      es: Siempre positivo.
      en: Always positive.
  zero_behavior:
    es: G = 0 corresponde a un fluido sin rigidez a cizalla.
    en: G = 0 corresponds to a fluid with no shear stiffness.
  interpretation_role: parameter
  graph_binding:
    axis: none
    label:
      es: G (GPa)
      en: G (GPa)
    channels:
    - none
  pedagogical_notes:
    es: G = E/(2(1+nu)); si solo se conoce E y nu, G se calcula directamente.
    en: G = E/(2(1+nu)); if only E and nu are known, G is calculated directly.
- id: rho
  nombre:
    es: Densidad del material
    en: Material density
  symbol: \rho
  unidad_si: kg/m³
  is_vector: false
  components: []
  category: material_property
  used_in:
  - velocidad_longitudinal_barra
  - velocidad_corte_barra
  common_mistake:
    es: Usar densidad en g/cm3 sin convertir a kg/m3 (factor 1000).
    en: Using density in g/cm3 without converting to kg/m3 (factor 1000).
  typical_range:
    min: 1000
    max: 20000
    unit: kg/m³
    context: Polimeros (1000) a tungsteno (19300)
  value_nature: siempre positiva
  dimension: '[M L^-3]'
  tipo: escalar
  physical_role:
    es: Inercia por unidad de volumen. Materiales mas densos tienen frecuencias mas bajas para la misma geometria y rigidez.
    en: Inertia per unit volume. Denser materials have lower frequencies for the same geometry and stiffness.
  descripcion:
    es: Aparece en el denominador de todas las velocidades de onda, por lo que reduce frecuencias al aumentar.
    en: Appears in the denominator of all wave velocities, so increasing it reduces frequencies.
  sign_behavior:
    positive:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    es: rho = 0 no tiene sentido fisico.
    en: rho = 0 has no physical meaning.
  interpretation_role: parameter
  graph_binding:
    axis: none
    label:
      es: ρ (kg/m³)
      en: ρ (kg/m³)
    channels:
    - none
  pedagogical_notes:
    es: 'La densidad opera como contrapeso a la rigidez: mas masa, mas inercia, menor frecuencia.'
    en: 'Density operates as a counterweight to stiffness: more mass, more inertia, lower frequency.'
- id: lambda_n
  nombre:
    es: Longitud de onda del modo n
    en: Wavelength of mode n
  symbol: \lambda_n
  unidad_si: m
  is_vector: false
  components: []
  category: wave_property
  used_in:
  - freq_longitudinal_libre_libre
  - freq_longitudinal_fijo_libre
  common_mistake:
    es: Confundir con el parametro de Lame (tambien llamado lambda) o con la longitud de la barra.
    en: Confusing with the Lame parameter (also called lambda) or with the bar length.
  typical_range:
    min: 0.005
    max: 10
    unit: m
    context: Depende de L y n
  value_nature: siempre positiva
  dimension: '[L]'
  tipo: escalar
  physical_role:
    es: Distancia espacial de un ciclo completo del patron modal.
    en: Spatial distance of one complete cycle of the modal pattern.
  descripcion:
    es: En libre-libre, lambda_n = 2L/n. En fijo-libre, lambda_n = 4L/(2n-1). La forma modal tiene L/lambda_n semiperiodos
      dentro de la barra.
    en: In free-free, lambda_n = 2L/n. In fixed-free, lambda_n = 4L/(2n-1). The mode shape has L/lambda_n half-periods within
      the bar.
  sign_behavior:
    positive:
      es: Siempre positiva.
      en: Always positive.
  zero_behavior:
    es: lambda_n -> 0 implicaria n -> infinito (modo de frecuencia infinita, fisicamente inalcanzable).
    en: lambda_n -> 0 would imply n -> infinity (infinite frequency mode, physically unreachable).
  interpretation_role: derived
  graph_binding:
    axis: secondary_y
    label:
      es: λ_n (m)
      en: λ_n (m)
    channels:
    - none
  pedagogical_notes:
    es: 'La longitud de onda disminuye con n: modos altos tienen oscilaciones mas finas.'
    en: 'Wavelength decreases with n: higher modes have finer oscillations.'
