version: "1.0"
leaf: "efecto-doppler"

coord:
  title:
    es: Gráfica Coord · Efecto Doppler
    en: Coord Graph · Doppler Effect
  xAxis:
    es: velocidad relativa v_r (m/s)
    en: relative velocity v_r (m/s)
  yAxis:
    es: "frecuencia observada f' (Hz)"
    en: "observed frequency f' (Hz)"
  xMagnitude: v
  yMagnitude: f
  relation:
    es: "f' = f·(v ± v_obs)/(v ∓ v_fnt). Acercamiento → f' > f. Alejamiento → f' < f."
    en: "f' = f·(v ± v_obs)/(v ∓ v_src). Approaching → f' > f. Receding → f' < f."
  physicalReading:
    es: "Acercamiento: azul (f' > f). Alejamiento: rojo (f' < f)."
    en: "Approaching: blueshift (f' > f). Receding: redshift (f' < f)."
  slopeMeaning:
    es: "df'/dv_fnt: sensibilidad de f'."
    en: "df'/dv_src: sensitivity of f'."
  interceptMeaning:
    es: "f'(0) = f."
    en: "f'(0) = f."
  curvatureMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  signMeaning:
    es: "v_fnt > 0 → hacia observador."
    en: "v_src > 0 → towards observer."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: v_fnt < v (subsónico).
    en: v_src < v (subsonic).
  modelConnection:
    es: Efecto Doppler clásico.
    en: Classical Doppler effect.
  formulaConnection:
    es: "f' = f·(v ± v_obs)/(v ∓ v_fnt)."
    en: "f' = f·(v ± v_obs)/(v ∓ v_src)."
  readingFocus:
    es: aplicar signos correctos según acercamiento/alejamiento.
    en: apply correct signs depending on approach/recession.
  agentHints:
    es:
      - "Acercamiento → f' > f."
      - "Alejamiento → f' < f."
      - v = v_sonido, no v_fuente.
    en:
      - "Approaching → f' > f."
      - "Receding → f' < f."
      - v = sound speed.
  commonMistakes:
    es:
      - Confundir v_sonido con v_fuente.
      - Signo incorrecto.
      - Aplicar a luz sin relatividad.
    en:
      - Confusing sound speed with source speed.
      - Wrong sign.
      - Applying to light without relativity.
