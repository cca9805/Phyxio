version: "1.0"
leaf: "intensidad-y-nivel-sonoro"

coord:
  title:
    es: Gráfica Coord · Intensidad y Nivel Sonoro
    en: Coord Graph · Sound Intensity and Level
  xAxis:
    es: intensidad I (W/m²)
    en: intensity I (W/m²)
  yAxis:
    es: nivel sonoro β (dB)
    en: sound level β (dB)
  xMagnitude: I
  yMagnitude: beta
  relation:
    es: β = 10·log₁₀(I/I₀), I₀ = 10⁻¹² W/m². ×10 I → +10 dB. ×2 I → +3 dB.
    en: β = 10·log₁₀(I/I₀), I₀ = 10⁻¹² W/m². ×10 I → +10 dB. ×2 I → +3 dB.
  physicalReading:
    es: Escala logarítmica. +10 dB ≈ doble volumen percibido.
    en: Logarithmic scale. +10 dB ≈ perceived double loudness.
  slopeMeaning:
    es: dβ/d(logI) = 10 dB/década.
    en: dβ/d(logI) = 10 dB/decade.
  interceptMeaning:
    es: β(I₀) = 0 dB.
    en: β(I₀) = 0 dB.
  curvatureMeaning:
    es: Pendiente constante (log).
    en: Constant slope (log).
  signMeaning:
    es: β ≥ 0 para I ≥ I₀.
    en: β ≥ 0 for I ≥ I₀.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "I > 0."
    en: "I > 0."
  modelConnection:
    es: Nivel sonoro en dB.
    en: Sound level in dB.
  formulaConnection:
    es: β = 10·log₁₀(I/I₀), I₀ = 10⁻¹² W/m².
    en: β = 10·log₁₀(I/I₀), I₀ = 10⁻¹² W/m².
  readingFocus:
    es: convertir I a β usando la escala logarítmica.
    en: convert I to β using the logarithmic scale.
  agentHints:
    es:
      - I₀ = 10⁻¹² W/m².
      - ×10 I → +10 dB.
      - ×2 I → +3 dB.
    en:
      - I₀ = 10⁻¹² W/m².
      - ×10 I → +10 dB.
      - ×2 I → +3 dB.
  commonMistakes:
    es:
      - Escala lineal para dB.
      - +6 dB al duplicar I.
      - I₀ incorrecto.
    en:
      - Linear scale for dB.
      - +6 dB doubling I.
      - Incorrect I₀.
