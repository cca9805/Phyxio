version: "1.0"
leaf: "naturaleza-del-sonido"

coord:
  title:
    es: Gráfica Coord · Naturaleza del Sonido
    en: Coord Graph · Nature of Sound
  xAxis:
    es: posición x (m) o tiempo t (s)
    en: position x (m) or time t (s)
  yAxis:
    es: desplazamiento s (m) o variación de presión Δp (Pa)
    en: displacement s (m) or pressure Δp (Pa)
  xMagnitude: x
  yMagnitude: s
  relation:
    es: "Onda longitudinal mecánica. v ≈ 343 m/s (aire, 20°C). v = √(γP/ρ). Rango audible: 20–20k Hz."
    en: "Longitudinal mechanical wave. v ≈ 343 m/s (air, 20°C). v = √(γP/ρ). Audible: 20–20k Hz."
  physicalReading:
    es: Compresiones y rarefacciones de presión.
    en: Pressure compressions and rarefactions.
  slopeMeaning:
    es: ∂s/∂x ∝ Δp.
    en: ∂s/∂x ∝ Δp.
  interceptMeaning:
    es: s(0) o Δp(0).
    en: s(0) or Δp(0).
  curvatureMeaning:
    es: ∂²s/∂t² = v²·∂²s/∂x².
    en: ∂²s/∂t² = v²·∂²s/∂x².
  signMeaning:
    es: "Δp > 0: compresión."
    en: "Δp > 0: compression."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "f ∈ [20, 20000] Hz."
    en: "f ∈ [20, 20000] Hz."
  modelConnection:
    es: Naturaleza del sonido.
    en: Nature of sound.
  formulaConnection:
    es: v = √(γP/ρ) ≈ 343 m/s.
    en: v = √(γP/ρ) ≈ 343 m/s.
  readingFocus:
    es: identificar compresiones/rarefacciones.
    en: identify compressions/rarefactions.
  agentHints:
    es:
      - Longitudinal.
      - v ≈ 343 m/s.
      - 20–20k Hz.
    en:
      - Longitudinal.
      - v ≈ 343 m/s.
      - 20–20k Hz.
  commonMistakes:
    es:
      - Transversal.
      - v = 3×10⁸ m/s.
      - No necesita medio.
    en:
      - Transverse.
      - v = 3×10⁸ m/s.
      - No medium needed.

