magnitudes:

  - id: p_ac
    symbol: "p"
    nombre:
      es: Presión acústica
      en: Acoustic pressure
    descripcion:
      es: "Variación de presión respecto al valor de equilibrio producida por el paso de la onda sonora."
      en: "Pressure variation from the equilibrium value produced by the passage of the sound wave."
    unidad_si: Pa
    dimension: "[M L⁻¹ T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - "Ecuación de onda plana armónica de presión"
      - "Definición de intensidad acústica"
      - "Umbral de audición y dolor"
    common_mistake: "Confundir la presión acústica (perturbación) con la presión absoluta del medio; la presión acústica es la oscilación, no el valor estático."
    typical_range: "20 µPa (umbral de audición) a 20 Pa (umbral de dolor)"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Signo positivo indica compresión (aumento de presión); signo negativo indica rarefacción (disminución de presión)."
        en: "Positive sign indicates compression (pressure increase); negative sign indicates rarefaction (pressure decrease)."
    zero_behavior:
      allowed: true
      meaning:
        es: "Ausencia de perturbación: el medio está en su estado de equilibrio sin onda sonora."
        en: "No perturbation: the medium is in its equilibrium state with no sound wave."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "[-20, 20] Pa en condiciones cotidianas"
    interpretation_role:
      primary_for:
        - "Determinar si hay compresión o rarefacción local en el frente de onda"
        - "Calcular la intensidad acústica instantánea"
      secondary_for:
        - "Estimar el nivel sonoro en decibelios"
    graph_binding:
      channels:
        - "eje_y: presión acústica en función de posición (Coord)"
        - "color_fill: compresión (rojo) vs rarefacción (azul) en Svg"
    pedagogical_notes:
      es: "La presión acústica es la magnitud más directamente audible: el oído responde a las fluctuaciones de presión, no al desplazamiento absoluto de partículas. Destacar que 20 µPa corresponde a un desplazamiento de partículas del orden de picómetros."
      en: "Acoustic pressure is the most directly audible quantity: the ear responds to pressure fluctuations, not to absolute particle displacement. Note that 20 µPa corresponds to particle displacements of the order of picometres."

  - id: xi
    symbol: "\\xi"
    nombre:
      es: Desplazamiento de partícula
      en: Particle displacement
    descripcion:
      es: "Desplazamiento longitudinal de las partículas del medio respecto a su posición de equilibrio al paso de la onda."
      en: "Longitudinal displacement of medium particles from their equilibrium position as the wave passes."
    unidad_si: m
    dimension: "[L]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - "Ecuación de desplazamiento de onda plana"
      - "Relación entre desplazamiento y presión acústica"
    common_mistake: "Creer que las partículas se desplazan en la dirección de propagación de manera permanente; en realidad oscilan alrededor de su posición de equilibrio."
    typical_range: "10⁻¹¹ m (umbral de audición a 1 kHz) a 10⁻⁴ m (sonidos muy intensos)"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo indica desplazamiento en la dirección de propagación; negativo, en sentido contrario."
        en: "Positive indicates displacement in the propagation direction; negative indicates the opposite direction."
    zero_behavior:
      allowed: true
      meaning:
        es: "Partícula en su posición de equilibrio; puede ocurrir instantáneamente durante la oscilación aunque la onda esté presente."
        en: "Particle at its equilibrium position; can occur instantaneously during oscillation even when the wave is present."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "[-10⁻⁴, 10⁻⁴] m en la vida cotidiana"
    interpretation_role:
      primary_for:
        - "Visualizar el patrón de compresión-rarefacción"
        - "Relacionar la amplitud de vibración con la presión acústica"
      secondary_for:
        - "Determinar la energía cinética del movimiento de partículas"
    graph_binding:
      channels:
        - "eje_y: desplazamiento de partícula en función de posición (Coord)"
    pedagogical_notes:
      es: "El desplazamiento de partícula está desfasado 90° respecto a la presión acústica. Donde el desplazamiento es máximo, la presión es cero, y viceversa. Este desfase es clave para entender la naturaleza longitudinal del sonido."
      en: "Particle displacement is 90° out of phase with acoustic pressure. Where displacement is maximum, pressure is zero, and vice versa. This phase shift is key to understanding the longitudinal nature of sound."

  - id: I_ac
    symbol: "I"
    nombre:
      es: Intensidad acústica
      en: Acoustic intensity
    descripcion:
      es: "Potencia sonora transmitida por unidad de área perpendicular a la dirección de propagación."
      en: "Sound power transmitted per unit area perpendicular to the propagation direction."
    unidad_si: "W/m²"
    dimension: "[M T⁻³]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - "Definición del nivel de intensidad sonora en decibelios"
      - "Cálculo de potencia de fuentes sonoras"
      - "Ley del inverso del cuadrado para fuentes puntuales"
    common_mistake: "Confundir intensidad acústica (W/m²) con nivel de intensidad (dB); la primera es energía por unidad de área y tiempo, la segunda es una escala logarítmica."
    typical_range: "10⁻¹² W/m² (umbral de audición) a 1 W/m² (umbral de dolor)"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La intensidad acústica es siempre no negativa; representa un flujo de energía."
        en: "Acoustic intensity is always non-negative; it represents an energy flux."
    zero_behavior:
      allowed: true
      meaning:
        es: "Ausencia total de flujo de energía sonora; no hay onda propagándose en ese punto."
        en: "Total absence of sound energy flux; no wave propagating at that point."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[10⁻¹², 1] W/m² en condiciones habituales"
    interpretation_role:
      primary_for:
        - "Cuantificar la energía transportada por la onda sonora"
        - "Determinar si la exposición sonora supera límites de seguridad"
      secondary_for:
        - "Calcular el nivel de intensidad sonora (dB)"
    graph_binding:
      channels:
        - "valor_escalar: mostrado como resultado numérico en calculadora"
    pedagogical_notes:
      es: "La intensidad varía como el cuadrado de la presión acústica, lo que explica por qué el oído usa una escala logarítmica (dB): el rango de intensidades audibles abarca doce órdenes de magnitud, pero la sensación percibida crece mucho más lentamente."
      en: "Intensity varies as the square of acoustic pressure, which is why the ear uses a logarithmic scale (dB): the range of audible intensities spans twelve orders of magnitude, but the perceived sensation grows much more slowly."

  - id: f_son
    symbol: "f"
    nombre:
      es: Frecuencia del sonido
      en: Sound frequency
    descripcion:
      es: "Número de ciclos de presión completos por segundo que realiza la onda sonora."
      en: "Number of complete pressure cycles per second performed by the sound wave."
    unidad_si: Hz
    dimension: "[T⁻¹]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - "Relación entre velocidad, frecuencia y longitud de onda"
      - "Clasificación del sonido en infrasónico, audible y ultrasónico"
    common_mistake: "Confundir frecuencia con tono percibido sin tener en cuenta que la percepción del tono también depende de la intensidad y del tipo de señal."
    typical_range: "20 Hz a 20 000 Hz (rango audible humano)"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La frecuencia siempre es positiva; el signo no tiene significado físico en este contexto."
        en: "Frequency is always positive; sign has no physical meaning in this context."
    zero_behavior:
      allowed: false
      meaning:
        es: "Frecuencia cero implica ausencia de oscilación; no hay onda sonora."
        en: "Zero frequency implies no oscillation; there is no sound wave."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +∞) Hz; audible entre 20 Hz y 20 kHz"
    interpretation_role:
      primary_for:
        - "Determinar el tono percibido de una nota musical"
        - "Clasificar el tipo de sonido (infrasónico, audible, ultrasónico)"
      secondary_for:
        - "Calcular la longitud de onda a partir de la velocidad de propagación"
    graph_binding:
      channels:
        - "eje_x alternativo: frecuencia en espectro de potencias (Coord)"
    pedagogical_notes:
      es: "La frecuencia es la única magnitud que permanece invariante cuando el sonido pasa de un medio a otro; la longitud de onda y la velocidad cambian, pero la frecuencia la fija la fuente. Este hecho es esencial para entender la refracción del sonido."
      en: "Frequency is the only quantity that remains invariant when sound passes from one medium to another; wavelength and speed change, but frequency is fixed by the source. This fact is essential for understanding sound refraction."

  - id: lambda_son
    symbol: "\\lambda"
    nombre:
      es: Longitud de onda sonora
      en: Sound wavelength
    descripcion:
      es: "Distancia espacial entre dos puntos consecutivos en la misma fase de la onda sonora."
      en: "Spatial distance between two consecutive points in the same phase of the sound wave."
    unidad_si: m
    dimension: "[L]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - "Relación entre velocidad, frecuencia y longitud de onda"
      - "Difracción y reflexión del sonido"
    common_mistake: "Creer que la longitud de onda es independiente del medio; en realidad cambia con la velocidad de propagación aunque la frecuencia sea fija."
    typical_range: "17 mm (20 kHz en aire) a 17 m (20 Hz en aire)"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La longitud de onda es siempre positiva; no tiene signo físico."
        en: "Wavelength is always positive; it has no physical sign."
    zero_behavior:
      allowed: false
      meaning:
        es: "Longitud de onda cero no tiene sentido físico en el contexto de una onda progresiva."
        en: "Zero wavelength has no physical meaning in the context of a progressive wave."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[17 mm, 17 m] en aire a 20 °C"
    interpretation_role:
      primary_for:
        - "Determinar si el sonido puede difractarse alrededor de un obstáculo"
        - "Calcular la separación entre nodos en una onda estacionaria"
      secondary_for:
        - "Estimar la frecuencia a partir de la velocidad del medio"
    graph_binding:
      channels:
        - "eje_x: un periodo espacial completo en la gráfica Coord"
    pedagogical_notes:
      es: "La longitud de onda del sonido audible en el aire es comparable con objetos cotidianos (centímetros a metros), lo que explica por qué el sonido se difracta fácilmente alrededor de esquinas, a diferencia de la luz cuya longitud de onda es submicrónica."
      en: "The wavelength of audible sound in air is comparable to everyday objects (centimetres to metres), which explains why sound diffracts easily around corners, unlike light whose wavelength is submicrometric."

  - id: v_son
    symbol: "v_s"
    nombre:
      es: Velocidad de propagación del sonido
      en: Speed of sound propagation
    descripcion:
      es: "Velocidad a la que el frente de onda sonora avanza a través del medio material."
      en: "Speed at which the sound wavefront advances through the material medium."
    unidad_si: "m/s"
    dimension: "[L T⁻¹]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - "Relación entre velocidad, frecuencia y longitud de onda"
      - "Ecuación de la onda armónica de presión"
    common_mistake: "Asumir que la velocidad del sonido es constante e independiente del medio; en realidad depende de las propiedades elásticas y de la densidad del medio."
    typical_range: "343 m/s en aire a 20 °C; 1480 m/s en agua; 5100 m/s en acero"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La velocidad de propagación es siempre positiva; la dirección se indica por separado."
        en: "Propagation speed is always positive; direction is indicated separately."
    zero_behavior:
      allowed: false
      meaning:
        es: "Velocidad cero implica que no hay propagación; el sonido no existe como onda viajera."
        en: "Zero speed implies no propagation; sound does not exist as a traveling wave."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[1, 6000] m/s según el medio"
    interpretation_role:
      primary_for:
        - "Calcular la longitud de onda a partir de la frecuencia"
        - "Estimar el retardo temporal entre fuente y receptor"
      secondary_for:
        - "Identificar el medio de propagación a partir del valor medido"
    graph_binding:
      channels:
        - "pendiente: relación longitud de onda vs periodo en gráfica Coord"
    pedagogical_notes:
      es: "La velocidad del sonido en un gas ideal depende únicamente de la temperatura, no de la presión. Este resultado contraintuitivo se debe a que la presión y la densidad se cancelan. En sólidos y líquidos, la velocidad es mucho mayor porque el módulo elástico es mucho mayor que la presión."
      en: "The speed of sound in an ideal gas depends only on temperature, not on pressure. This counterintuitive result occurs because pressure and density cancel out. In solids and liquids, the speed is much higher because the elastic modulus is much larger than the pressure."

  - id: p0_ac
    symbol: "p_0"
    nombre:
      es: Amplitud de presión acústica
      en: Acoustic pressure amplitude
    descripcion:
      es: "Valor máximo de la variación de presión en la onda sonora; equivale a la amplitud de la onda de presión."
      en: "Maximum value of pressure variation in the sound wave; equivalent to the pressure wave amplitude."
    unidad_si: Pa
    dimension: "[M L⁻¹ T⁻²]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - "Ecuación de la onda armónica de presión"
      - "Cálculo de la intensidad acústica promedio"
    common_mistake: "Usar la amplitud de presión en lugar del valor RMS al calcular la intensidad; la intensidad usa p_rms, que es p0 dividido entre la raíz de dos para señales sinusoidales."
    typical_range: "20 µPa (umbral audición) a 20 Pa (umbral de dolor)"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La amplitud es siempre positiva por definición; es el módulo del valor máximo."
        en: "Amplitude is always positive by definition; it is the magnitude of the maximum value."
    zero_behavior:
      allowed: false
      meaning:
        es: "Amplitud cero implica ausencia de onda sonora."
        en: "Zero amplitude implies absence of sound wave."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[20×10⁻⁶, 20] Pa"
    interpretation_role:
      primary_for:
        - "Calcular la intensidad acústica promedio de una onda armónica"
        - "Determinar el volumen percibido de un sonido"
      secondary_for:
        - "Comparar la amplitud con el umbral de audición de referencia"
    graph_binding:
      channels:
        - "amplitud_eje_y: valor máximo de la curva en gráfica Coord"
    pedagogical_notes:
      es: "La amplitud de presión p0 determina el 'volumen' del sonido. Duplicar p0 no duplica la sensación de volumen percibido, porque el oído tiene una respuesta logarítmica. Este hecho justifica el uso de la escala de decibelios."
      en: "The pressure amplitude p0 determines the 'loudness' of sound. Doubling p0 does not double the perceived loudness, because the ear has a logarithmic response. This fact justifies the use of the decibel scale."
