version: "1.0"
leaf: "tono-y-timbre"

coord:
  title:
    es: Gráfica Coord · Tono y Timbre
    en: Coord Graph · Pitch and Timbre
  xAxis:
    es: tiempo t (s) o frecuencia f (Hz)
    en: time t (s) or frequency f (Hz)
  yAxis:
    es: presión p(t) (Pa) o amplitud A(f)
    en: pressure p(t) (Pa) or amplitude A(f)
  xMagnitude: t
  yMagnitude: p
  relation:
    es: Tono ↔ f₀. Timbre ↔ espectro de armónicos. p(t) = Σ Aₙ·sin(2πn·f₀·t + φₙ).
    en: Pitch ↔ f₀. Timbre ↔ harmonic spectrum. p(t) = Σ Aₙ·sin(2πn·f₀·t + φₙ).
  physicalReading:
    es: Mayor f₀ → más agudo. El timbre es la firma espectral.
    en: Higher f₀ → higher pitch. Timbre is the spectral signature.
  slopeMeaning:
    es: "dp/dt: velocidad de cambio de presión."
    en: "dp/dt: pressure rate of change."
  interceptMeaning:
    es: "p(0): presión inicial."
    en: "p(0): initial pressure."
  curvatureMeaning:
    es: "d²p/dt²: aceleración de presión."
    en: "d²p/dt²: pressure acceleration."
  signMeaning:
    es: "p > 0: compresión."
    en: "p > 0: compression."
  areaMeaning:
    es: "∫|A(f)|² df: energía espectral."
    en: "∫|A(f)|² df: spectral energy."
  domainMeaning:
    es: "f ∈ [20, 20000] Hz."
    en: "f ∈ [20, 20000] Hz."
  modelConnection:
    es: Tono y timbre del sonido.
    en: Pitch and timbre of sound.
  formulaConnection:
    es: p(t) = Σ Aₙ·sin(2πn·f₀·t + φₙ).
    en: p(t) = Σ Aₙ·sin(2πn·f₀·t + φₙ).
  readingFocus:
    es: leer f₀ (tono) y distribución de armónicos (timbre).
    en: read f₀ (pitch) and harmonic distribution (timbre).
  agentHints:
    es:
      - Tono = f₀.
      - Timbre = armónicos.
      - Mayor f₀ → más agudo.
    en:
      - Pitch = f₀.
      - Timbre = harmonics.
      - Higher f₀ → higher pitch.
  commonMistakes:
    es:
      - Tono = amplitud.
      - Mismo f₀ → mismo timbre.
      - Confundir tono con volumen.
    en:
      - Pitch = amplitude.
      - Same f₀ → same timbre.
      - Confusing pitch with loudness.
