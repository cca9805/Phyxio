magnitudes:

  - id: f1
    symbol: "f_1"
    nombre:
      es: Frecuencia fundamental
      en: Fundamental frequency
    descripcion:
      es: "Frecuencia más baja presente en un sonido periódico complejo; determina el tono percibido."
      en: "Lowest frequency present in a complex periodic sound; determines the perceived pitch."
    unidad_si: Hz
    dimension: "[T⁻¹]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - "Serie de Fourier del sonido periódico"
      - "Relación entre armónicos y frecuencia fundamental"
      - "Cálculo de longitud de onda fundamental"
    common_mistake: "Confundir la frecuencia fundamental con la frecuencia de mayor amplitud; en algunos instrumentos el primer armónico puede ser más intenso que la fundamental."
    typical_range: "82 Hz (mi2 de guitarra) a 1047 Hz (do6 de flauta) para instrumentos de uso frecuente"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La frecuencia fundamental es siempre positiva; no tiene signo físico."
        en: "The fundamental frequency is always positive; it has no physical sign."
    zero_behavior:
      allowed: false
      meaning:
        es: "Frecuencia fundamental cero implicaría un sonido de periodo infinito, es decir, una señal constante sin oscilación."
        en: "Zero fundamental frequency would imply a sound of infinite period, i.e., a constant signal without oscillation."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, 20000] Hz en el rango audible"
    interpretation_role:
      primary_for:
        - "Determinar el tono percibido de una nota musical"
        - "Calcular las frecuencias de todos los armónicos de la serie"
      secondary_for:
        - "Estimar la longitud de onda dominante en el medio"
    graph_binding:
      channels:
        - "eje_x: primera línea espectral en la gráfica Coord de espectro de amplitudes"
    pedagogical_notes:
      es: "La frecuencia fundamental es la 'nota' que el músico y el oyente identifican. Incluso si la fundamental tiene amplitud pequeña (o está ausente, como en el fenómeno del tono faltante), el sistema auditivo la infiere del patrón de armónicos. Este hecho ilustra que el tono no es simplemente la frecuencia más intensa, sino la que organiza el patrón periódico."
      en: "The fundamental frequency is the 'note' that both musician and listener identify. Even if the fundamental has small amplitude (or is absent, as in the missing fundamental phenomenon), the auditory system infers it from the harmonic pattern. This fact illustrates that pitch is not simply the most intense frequency, but the one that organises the periodic pattern."

  - id: fn
    symbol: "f_n"
    nombre:
      es: Frecuencia del n-ésimo armónico
      en: Frequency of the n-th harmonic
    descripcion:
      es: "Frecuencia del componente armónico de orden n en la serie de Fourier de un sonido periódico; es n veces la frecuencia fundamental."
      en: "Frequency of the n-th harmonic component in the Fourier series of a periodic sound; it is n times the fundamental frequency."
    unidad_si: Hz
    dimension: "[T⁻¹]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - "Serie de Fourier del sonido periódico"
      - "Descripción del espectro armónico"
    common_mistake: "Llamar 'segundo armónico' al componente de frecuencia 2f1 cuando en algunas convenciones ese componente se llama 'primer sobreagudo' o 'primera sobretonalidad'. La nomenclatura varía entre disciplinas."
    typical_range: "Hasta el décimo o vigésimo armónico en instrumentos musicales; hasta los cientos de armónicos en señales de voz"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La frecuencia de cada armónico es siempre positiva."
        en: "The frequency of each harmonic is always positive."
    zero_behavior:
      allowed: false
      meaning:
        es: "Un armónico de frecuencia cero sería una componente continua (DC), no un componente oscilante."
        en: "A zero-frequency harmonic would be a DC component, not an oscillating component."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[f1, 20000] Hz para los armónicos audibles"
    interpretation_role:
      primary_for:
        - "Identificar qué frecuencias contribuyen al timbre del sonido"
        - "Construir el espectro de amplitudes del sonido"
      secondary_for:
        - "Calcular la periodicidad de la señal resultante"
    graph_binding:
      channels:
        - "eje_x: posición de la línea espectral n en la gráfica Coord"
    pedagogical_notes:
      es: "Los armónicos son los 'ingredientes de color' del sonido. Dos instrumentos que tocan la misma nota (misma f1) suenan diferente porque tienen distintas amplitudes relativas de armónicos. El violín es rico en armónicos agudos; la flauta tiene pocos. Esta diferencia es exactamente el timbre."
      en: "Harmonics are the 'colour ingredients' of sound. Two instruments playing the same note (same f1) sound different because they have different relative harmonic amplitudes. The violin is rich in high harmonics; the flute has few. This difference is exactly the timbre."

  - id: An
    symbol: "A_n"
    nombre:
      es: Amplitud del n-ésimo armónico
      en: Amplitude of the n-th harmonic
    descripcion:
      es: "Amplitud de presión del componente armónico de orden n en la descomposición de Fourier del sonido periódico."
      en: "Pressure amplitude of the n-th harmonic component in the Fourier decomposition of the periodic sound."
    unidad_si: Pa
    dimension: "[M L⁻¹ T⁻²]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - "Serie de Fourier del sonido periódico"
      - "Cálculo de la intensidad acústica total"
      - "Descripción del timbre mediante el espectro de amplitudes"
    common_mistake: "Sumar directamente las amplitudes de los armónicos para obtener la amplitud total; la amplitud total no es la suma de las amplitudes individuales sino que depende de las fases relativas."
    typical_range: "Decrece típicamente con n; el primer armónico suele tener la mayor amplitud aunque no siempre"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La amplitud de cada armónico es siempre positiva; el signo de la oscilación está incorporado en la fase del componente."
        en: "The amplitude of each harmonic is always positive; the sign of the oscillation is incorporated in the phase of the component."
    zero_behavior:
      allowed: true
      meaning:
        es: "Una amplitud nula para el armónico n indica que ese componente está ausente en el espectro del sonido. Los instrumentos con simetría par tienen armónicos pares de amplitud cero."
        en: "Zero amplitude for harmonic n indicates that component is absent from the sound spectrum. Instruments with even symmetry have zero-amplitude even harmonics."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[0, p0_max] Pa donde p0_max es la amplitud total máxima"
    interpretation_role:
      primary_for:
        - "Definir el espectro de amplitudes que caracteriza el timbre"
        - "Calcular la contribución energética de cada armónico"
      secondary_for:
        - "Comparar el timbre de distintos instrumentos mediante sus envolventes espectrales"
    graph_binding:
      channels:
        - "eje_y: altura de cada barra en el gráfico de espectro Coord"
    pedagogical_notes:
      es: "La distribución de amplitudes de armónicos (espectro) es la huella digital acústica de cada instrumento o voz. El análisis de Fourier permite descomponer cualquier sonido periódico en sus armónicos y reconstruirlo. Esta es la operación fundamental del procesado digital de audio."
      en: "The distribution of harmonic amplitudes (spectrum) is the acoustic fingerprint of each instrument or voice. Fourier analysis allows decomposing any periodic sound into its harmonics and reconstructing it. This is the fundamental operation of digital audio processing."

  - id: p_total
    symbol: "p_{\\mathrm{total}}"
    nombre:
      es: Presión acústica total
      en: Total acoustic pressure
    descripcion:
      es: "Señal de presión acústica resultante de la superposición lineal de todos los componentes armónicos de un sonido periódico complejo."
      en: "Acoustic pressure signal resulting from the linear superposition of all harmonic components of a complex periodic sound."
    unidad_si: Pa
    dimension: "[M L⁻¹ T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: resultant_quantity
    used_in:
      - "Serie de Fourier del sonido periódico"
      - "Cálculo de la intensidad acústica total"
    common_mistake: "Creer que la forma de onda total es siempre una sinusoide; solo lo es si el sonido tiene un único componente armónico. Con múltiples armónicos, la forma de onda puede ser compleja aunque el sonido sea periódico."
    typical_range: "Mismo rango que la presión acústica: 20 µPa a 20 Pa en condiciones audibles normales"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo indica compresión neta; negativo indica rarefacción neta en el instante y punto considerados."
        en: "Positive indicates net compression; negative indicates net rarefaction at the considered instant and point."
    zero_behavior:
      allowed: true
      meaning:
        es: "Presión total nula en un instante dado no implica ausencia de sonido; simplemente las contribuciones de los armónicos se cancelan momentáneamente."
        en: "Zero total pressure at a given instant does not imply absence of sound; it simply means the harmonic contributions cancel momentarily."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "[-p_pico, +p_pico] donde p_pico es la amplitud máxima de la señal total"
    interpretation_role:
      primary_for:
        - "Describir la forma de onda temporal completa del sonido"
        - "Calcular la intensidad acústica promedio mediante integración cuadrática"
      secondary_for:
        - "Mostrar la complejidad de la forma de onda como consecuencia del timbre"
    graph_binding:
      channels:
        - "eje_y: señal temporal completa en gráfica Coord de presión frente a tiempo"
    pedagogical_notes:
      es: "La presión acústica total es lo que realmente existe en el medio: la suma de todos los componentes. La descomposición en armónicos es una herramienta matemática (Fourier) que no implica que los armónicos 'viajen por separado'; todos coexisten en la misma onda. Ver la forma de onda de un instrumento y su espectro simultáneamente es la mejor manera de entender la relación entre timbre y composición armónica."
      en: "Total acoustic pressure is what actually exists in the medium: the sum of all components. Decomposition into harmonics is a mathematical tool (Fourier) that does not imply harmonics 'travel separately'; they all coexist in the same wave. Viewing an instrument's waveform and its spectrum simultaneously is the best way to understand the relationship between timbre and harmonic composition."

  - id: T_per
    symbol: "T"
    nombre:
      es: Periodo del sonido periódico
      en: Period of the periodic sound
    descripcion:
      es: "Duración del ciclo completo de la señal de presión acústica total; es el inverso de la frecuencia fundamental."
      en: "Duration of the complete cycle of the total acoustic pressure signal; it is the inverse of the fundamental frequency."
    unidad_si: s
    dimension: "[T]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - "Relación entre frecuencia fundamental y periodo"
      - "Descripción temporal de la periodicidad del sonido"
    common_mistake: "Confundir el periodo de la señal total con el periodo de alguno de sus armónicos individuales; el periodo de la señal total es el inverso de la frecuencia fundamental, que es el mínimo común múltiplo inverso de todas las frecuencias presentes."
    typical_range: "0.05 ms (20 kHz) a 50 ms (20 Hz) en el rango audible"
    sign_behavior:
      has_sign: false
      meaning:
        es: "El periodo es siempre positivo."
        en: "The period is always positive."
    zero_behavior:
      allowed: false
      meaning:
        es: "Periodo cero implicaría frecuencia infinita, fuera del rango físico."
        en: "Zero period would imply infinite frequency, outside the physical range."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[50 µs, 50 ms] en el rango audible"
    interpretation_role:
      primary_for:
        - "Determinar la periodicidad de la señal acústica total"
        - "Calcular f1 a partir de la forma de onda"
      secondary_for:
        - "Establecer la ventana de análisis mínima para una transformada de Fourier significativa"
    graph_binding:
      channels:
        - "eje_x: extensión de un ciclo completo en gráfica temporal Coord"
    pedagogical_notes:
      es: "El periodo de la señal total es siempre el inverso de la frecuencia fundamental, incluso si esta tiene amplitud pequeña o nula. Esto es porque todos los armónicos son múltiplos enteros de la fundamental, y por tanto todos repiten exactamente después de un periodo T."
      en: "The period of the total signal is always the inverse of the fundamental frequency, even if it has small or zero amplitude. This is because all harmonics are integer multiples of the fundamental, and therefore all repeat exactly after one period T."

  - id: n_arm
    symbol: "n"
    nombre:
      es: Número de armónico
      en: Harmonic number
    descripcion:
      es: "Entero positivo que identifica el orden de un componente armónico; la frecuencia del armónico n es n veces la frecuencia fundamental."
      en: "Positive integer identifying the order of a harmonic component; the frequency of harmonic n is n times the fundamental frequency."
    unidad_si: "adimensional"
    dimension: "[1]"
    is_vector: false
    components: []
    category: parameter
    physical_role: index_parameter
    used_in:
      - "Serie de Fourier del sonido periódico"
      - "Identificación de componentes espectrales"
    common_mistake: "Confundir el número de armónico con el número de sobretonos; el sobretonos 1 corresponde al armónico 2, porque los sobretonos se cuentan a partir del segundo componente."
    typical_range: "n desde 1 (fundamental) hasta 20 o más en instrumentos musicales"
    sign_behavior:
      has_sign: false
      meaning:
        es: "El número de armónico es siempre un entero positivo."
        en: "The harmonic number is always a positive integer."
    zero_behavior:
      allowed: false
      meaning:
        es: "n igual a cero corresponde a una componente de frecuencia cero (DC), que no es un armónico sonoro."
        en: "n equal to zero corresponds to a zero-frequency (DC) component, which is not a sound harmonic."
    value_nature:
      kind: integer_positive
      nonnegative_only: true
      expected_interval: "[1, +∞) entero"
    interpretation_role:
      primary_for:
        - "Indexar los componentes del espectro armónico"
        - "Calcular la frecuencia de cada componente como n veces f1"
      secondary_for:
        - "Clasificar sonidos según la presencia de armónicos pares e impares"
    graph_binding:
      channels:
        - "eje_x discreto: posición n en el espectro de armónicos"
    pedagogical_notes:
      es: "El número de armónico n es simplemente una etiqueta de orden. Pero qué armónicos están presentes (cuáles tienen An mayor de cero) y con qué amplitudes relativas es lo que distingue un clarinete de un oboe tocando la misma nota. La física de cada instrumento selecciona un subconjunto de armónicos y les asigna amplitudes características."
      en: "The harmonic number n is simply an order label. But which harmonics are present (which have An greater than zero) and with what relative amplitudes is what distinguishes a clarinet from an oboe playing the same note. The physics of each instrument selects a subset of harmonics and assigns them characteristic amplitudes."
