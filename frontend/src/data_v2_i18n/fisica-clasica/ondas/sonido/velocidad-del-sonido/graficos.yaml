version: "1.0"
leaf: "velocidad-del-sonido"

coord:
  title:
    es: Gráfica Coord · Velocidad del Sonido
    en: Coord Graph · Speed of Sound
  xAxis:
    es: temperatura T (°C)
    en: temperature T (°C)
  yAxis:
    es: velocidad v (m/s)
    en: speed v (m/s)
  xMagnitude: tension_de_la_cuerda
  yMagnitude: velocidad_de_propagacion
  relation:
    es: "v ≈ 331 + 0.6·T(°C) m/s. Gas ideal: v = √(γRT/M). Sólido: v = √(E/ρ). Sólido > Líquido > Gas."
    en: "v ≈ 331 + 0.6·T(°C) m/s. Ideal gas: v = √(γRT/M). Solid: v = √(E/ρ). Solid > Liquid > Gas."
  physicalReading:
    es: v aumenta con T en gases. Mayor en sólidos.
    en: v increases with T in gases. Higher in solids.
  slopeMeaning:
    es: dv/dT ≈ 0.6 m/s/°C.
    en: dv/dT ≈ 0.6 m/s/°C.
  interceptMeaning:
    es: v(0°C) ≈ 331 m/s.
    en: v(0°C) ≈ 331 m/s.
  curvatureMeaning:
    es: Lineal en T.
    en: Linear in T.
  signMeaning:
    es: "v > 0."
    en: "v > 0."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "T > −273°C."
    en: "T > −273°C."
  modelConnection:
    es: Velocidad del sonido.
    en: Speed of sound.
  formulaConnection:
    es: v ≈ 331 + 0.6·T, v = √(γRT/M).
    en: v ≈ 331 + 0.6·T, v = √(γRT/M).
  readingFocus:
    es: leer v a distintas T.
    en: read v at different T.
  agentHints:
    es:
      - v ≈ 343 m/s (20°C).
      - v aumenta con T.
      - "Sólidos > líquidos > gases."
    en:
      - v ≈ 343 m/s (20°C).
      - v increases with T.
      - "Solids > liquids > gases."
  commonMistakes:
    es:
      - v = 3×10⁸ m/s.
      - v disminuye con T.
      - v igual en todos los medios.
    en:
      - v = 3×10⁸ m/s.
      - v decreases with T.
      - v same in all media.

svg:
  title:
    es: Escena SVG · Velocidad del Sonido
    en: SVG Scene · Speed of Sound
  sceneId: velocidad_sonido
  sceneLabel:
    es: Comparativa v en gas, líquido y sólido
    en: v comparison in gas, liquid and solid
  objects:
    es:
      - gas (343 m/s)
      - líquido (1500 m/s)
      - sólido (5000 m/s)
    en:
      - gas (343 m/s)
      - liquid (1500 m/s)
      - solid (5000 m/s)
  mainObject:
    es: comparativa velocidades
    en: speed comparison
  referenceFrame:
    es: laboratorio
    en: laboratory
  geometry:
    es: Gas < Líquido < Sólido.
    en: Gas < Liquid < Solid.
  interactions:
    es: v = √(B/ρ).
    en: v = √(B/ρ).
  modelElements:
    es:
      - v_gas < v_liq < v_sol
    en:
      - v_gas < v_liq < v_sol
  visualCues:
    es:
      - Flecha larga = mayor v.
    en:
      - Longer arrow = higher v.
  scaleMeaning:
    es: Flecha ∝ v.
    en: Arrow ∝ v.
  relation:
    es: v = √(B/ρ).
    en: v = √(B/ρ).
  physicalReading:
    es: "Sólidos > líquidos > gases."
    en: "Solids > liquids > gases."
  modelConnection:
    es: Velocidad del sonido.
    en: Speed of sound.
  formulaConnection:
    es: v = √(B/ρ).
    en: v = √(B/ρ).
  readingFocus:
    es: comparar v en distintos medios.
    en: compare v in different media.
  agentHints:
    es:
      - "v_sol > v_liq > v_gas."
      - v ≈ 343 m/s (aire).
    en:
      - "v_sol > v_liq > v_gas."
      - v ≈ 343 m/s (air).
  commonMistakes:
    es:
      - "v_gas > v_sol."
      - v = c.
    en:
      - "v_gas > v_sol."
      - v = c.
