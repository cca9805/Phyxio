version: '1.0'
leaf: conexion-con-termodinamica-clasica
coord:
  id: conexion-con-termodinamica-clasica-Coord
  graphId: conexion-con-termodinamica-clasica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Entropía y microestados
    en: Entropy and microstates
  xAxis:
    es: Número de microestados Ω
    en: Number of microstates Ω
  yAxis:
    es: Entropía S
    en: Entropy S
  xMagnitude: numero_microestados
  yMagnitude: entropia
  relation:
    es: La gráfica responde cómo los microestados conectan la entropía con la termodinámica clásica.
    en: The graph answers how microstates connect entropy with classical thermodynamics.
  physicalReading:
    es: Más microestados compatibles implican mayor entropía y explican la conexión entre descripción microscópica y temperatura
      clásica.
    en: More compatible microstates imply higher entropy and explain the connection between microscopic description and classical
      temperature.
  slopeMeaning:
    es: Frente a ln(Ω), la pendiente representa k_B.
    en: Versus ln(Ω), the slope represents k_B.
  interceptMeaning:
    es: Un único microestado fija entropía nula en esta referencia.
    en: A single microstate sets zero entropy in this reference.
  curvatureMeaning:
    es: La curva es logarítmica frente a Ω.
    en: The curve is logarithmic versus Ω.
  signMeaning:
    es: Ω debe ser positivo; el signo no indica dirección espacial.
    en: Ω must be positive; sign does not indicate spatial direction.
  areaMeaning:
    es: El área bajo la curva no tiene lectura energética directa.
    en: Area under the curve has no direct energy reading.
  domainMeaning:
    es: 'Dominio físico: Ω > 0 y macroestado definido.'
    en: 'Physical domain: Ω > 0 and defined macrostate.'
  modelConnection:
    es: El gráfico conecta el conteo estadístico con la variable clásica entropía.
    en: The graph connects statistical counting with the classical variable entropy.
  formulaConnection:
    es: Usa {{f:entropia_boltzmann}} como puente formal.
    en: Uses {{f:entropia_boltzmann}} as the formal bridge.
  readingFocus:
    es: Leer cómo microestados, entropía y temperatura sostienen la conexión con termodinámica clásica.
    en: Read how microstates, entropy, and temperature support the connection with classical thermodynamics.
  agentHints:
    es:
    - Identifica Ω y S antes de interpretar.
    - Recuerda que la dependencia es logarítmica.
    - Relaciona la curva con la pregunta física central.
    en:
    - Identify Ω and S before interpreting.
    - Remember the dependence is logarithmic.
    - Relate the curve to the central physical question.
  commonMistakes:
    es:
    - Confundir Ω con temperatura.
    - Interpretar entropía como desorden visual solamente.
    - Olvidar que Ω debe ser positivo.
    en:
    - Confusing Ω with temperature.
    - Interpreting entropy only as visual disorder.
    - Forgetting that Ω must be positive.
  curveProfile:
    type: logarithmic
    expectedShape:
      es: Crecimiento logarítmico suave.
      en: Smooth logarithmic growth.
    keyPoints:
    - x: 1
      y: 0
      label:
        es: Un microestado
        en: One microstate
    - x: 10
      y: 2.3
      label:
        es: Más microestados
        en: More microstates
  dataRange:
    xMin: 1
    xMax: 100
    yMin: 0
    yMax: 5
    autoScale: true
    sampleCount: 80
  recommendedTab: graficas
