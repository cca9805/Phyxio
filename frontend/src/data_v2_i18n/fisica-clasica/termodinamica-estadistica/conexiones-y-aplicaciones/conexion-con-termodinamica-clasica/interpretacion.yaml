targets:
  entropia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: calculable
      en: Entropy
    summary_rules:
    - id: entropia_summary_statistical_bridge
      when: 'true'
      status: ok
      text:
        es: '[[entropia]] resume el puente entre termodinámica estadística y termodinámica clásica: indica cuántos microestados
          son compatibles con un macroestado.'
        en: '[[entropia]] summarizes the bridge between statistical and classical thermodynamics: it indicates how many microstates
          are compatible with a macrostate.'
    physical_reading_rules:
    - id: entropia_physical_reading_units_model
      when: 'true'
      status: info
      text:
        es: Lee [[entropia]] con su unidad y signo, porque su sentido depende del modelo estadístico que lo define, antes
          de traducirlo a lenguaje clásico.
        en: Read [[entropia]] with its unit and sign, because its meaning depends on the statistical model that defines it,
          before translating it into classical language.
    coherence_rules:
    - id: entropia_coherence_dependencies
      when: 'true'
      status: ok
      text:
        es: 'Comprueba que [[entropia]] sea coherente con las magnitudes conectadas: [[entropia]], [[temperatura]], [[energia_interna]]
          y [[numero_microestados]].'
        en: 'Check that [[entropia]] is coherent with connected quantities: [[entropia]], [[temperatura]], [[energia_interna]],
          and [[numero_microestados]].'
    model_validity_rules:
    - id: entropia_model_validity_statistical_assumptions
      when: 'true'
      status: info
      text:
        es: Interpreta [[entropia]] solo si el sistema admite descripción estadística, estados accesibles bien definidos y
          equilibrio o cuasiequilibrio termodinámico.
        en: Interpret [[entropia]] only if the system admits a statistical description, well-defined accessible states, and
          thermodynamic equilibrium or quasi-equilibrium.
    graph_rules:
    - id: entropia_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[entropia]] con la dependencia entre descripción microscópica y variable clásica
          representada; observa pendiente, tendencia y dominio.
        en: In the Coord graph, relate [[entropia]] to the dependency between microscopic description and the represented
          classical variable; observe slope, trend, and domain.
    likely_errors:
    - id: entropia_likely_error_number_without_physics
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[entropia]] con una lectura aislada es un error frecuente: No leas [[entropia]] como un número aislado:
          su sentido depende del ensemble, la escala energética, las unidades y la conexión con magnitudes clásicas.'
        en: 'A common mistake is to interpret [[entropia]] in isolation: Do not read [[entropia]] as an isolated number: its
          meaning depends on the ensemble, energy scale, units, and connection with classical quantities.'
    next_step_rules:
    - id: entropia_next_step_compare_classical_limit
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[entropia]], contrasta el resultado con el límite clásico esperado y revisa si el signo
          o la escala tienen sentido físico.
        en: After interpreting [[entropia]], compare the result with the expected classical limit and check whether the sign
          or scale is physically meaningful.
    physical_intuition:
    - id: entropia_intuition_micro_macro
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[entropia]] ayuda a traducir información microscópica sobre estados y energía en propiedades
          macroscópicas observables.
        en: Intuitively, [[entropia]] helps translate microscopic information about states and energy into observable macroscopic
          properties.
    limiting_cases:
    - id: entropia_limiting_case_domain
      when: 'true'
      status: info
      text:
        es: Revisa el caso límite de [[entropia]] cuando [[numero_microestados]] crece mucho, cuando [[temperatura]] tiende
          a valores extremos o cuando cambia [[energia_estado]].
        en: Check the limiting case of [[entropia]] when [[numero_microestados]] grows very large, when [[temperatura]] approaches
          extreme values, or when [[energia_estado]] changes.
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo energético debe compararse con el cero de referencia elegido para los estados.
        en: The energy sign must be compared with the chosen zero reference for states.
      common_sign_errors: []
