version: 5.0.0
magnitudes:
- id: entropia
  symbol: S
  nombre:
    es: Entropía
    en: Entropy
  descripcion:
    es: Medida macroscópica ligada al número de microestados compatibles.
    en: Macroscopic measure tied to the number of compatible microstates.
  unidad_si: J/K
  dimension: '[M L^2 T^-2 K^-1]'
  is_vector: false
  components: []
  category: estado
  physical_role: calculable
  used_in:
  - entropia_boltzmann
  - energia_libre_helmholtz
  common_mistake: Usar esta magnitud sin distinguir si pertenece al nivel microscópico
    o clásico.
  typical_range: Depende del sistema y debe expresarse con unidades SI coherentes.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo depende de la definición física y del convenio elegido.
      en: The sign depends on the physical definition and chosen convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa un límite físico o una ausencia efectiva según el caso.
      en: Zero represents a physical limit or an effective absence depending on the
        case.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Intervalo compatible con equilibrio termodinámico y descripción
      estadística.
  interpretation_role:
    primary_for:
    - conexion micro-macro
    secondary_for:
    - lectura clasica
  graph_binding:
    channels:
    - yAxis
  pedagogical_notes:
    es: '[[entropia]] ayuda a traducir entre microestados y variables clásicas.'
    en: '[[entropia]] helps translate between microstates and classical variables.'
