      when: 'true'
      status: info
      text:
        es: Analiza el límite de [[escala_energia_clasica]] cuando [[cociente_cuantico_clasico]] es muy pequeño o cuando [[separacion_energia]]
          se vuelve comparable a la escala disponible.
        en: Analyze the limit of [[escala_energia_clasica]] when [[cociente_cuantico_clasico]] is very small or when [[separacion_energia]]
