    graph_rules:
    - id: escala_energia_clasica_svg_visual_reading
      when: 'true'
      status: info
      text:
        es: 'En la escena SVG, relaciona [[escala_energia_clasica]] con los elementos visuales: paquetes de energía, onda
          asociada, niveles discretos y transición hacia el límite clásico.'
        en: 'In the SVG scene, relate [[escala_energia_clasica]] to the visual elements: energy packets, associated wave,
          discrete levels, and transition toward the classical limit.'
    likely_errors:
    - id: escala_energia_clasica_likely_error_classical_continuity
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[escala_energia_clasica]] con una lectura aislada es un error frecuente: No interpretes [[escala_energia_clasica]]
          con intuición puramente continua: revisa si el resultado exige cuantos, niveles discretos o comparación con una
          escala clásica.'
        en: 'A common mistake is to interpret [[escala_energia_clasica]] in isolation: Do not interpret [[escala_energia_clasica]]
          with purely continuous intuition: check whether the result requires quanta, discrete levels, or comparison with
          a classical scale.'
    next_step_rules:
    - id: escala_energia_clasica_next_step_compare_scale
      when: 'true'
      status: info
      text:
        es: Después de obtener [[escala_energia_clasica]], compara su orden de magnitud con [[escala_energia_clasica]] y decide
