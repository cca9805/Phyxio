    physical_intuition:
    - id: escala_energia_clasica_intuition_discrete_vs_continuous
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[escala_energia_clasica]] ayuda a decidir si el fenómeno se lee como continuo clásico o como
          proceso gobernado por unidades discretas.
        en: Intuitively, [[escala_energia_clasica]] helps decide whether the phenomenon is read as classical continuous behavior
          or as a process governed by discrete units.
    limiting_cases:
