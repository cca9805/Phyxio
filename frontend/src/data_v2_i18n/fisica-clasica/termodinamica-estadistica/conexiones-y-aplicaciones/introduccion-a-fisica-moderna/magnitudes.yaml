version: 5.0.0
magnitudes:
- id: energia_cuantizada
  symbol: E
  nombre:
    es: Energía cuantizada
    en: Quantized energy
  descripcion:
    es: Energía intercambiada en paquetes discretos.
    en: Energy exchanged in discrete packets.
  unidad_si: J
  dimension: '[M L^2 T^-2]'
  is_vector: false
  components: []
  category: energia
  physical_role: calculable
  used_in:
  - energia_foton
  - frecuencia_desde_energia
  common_mistake: Interpretar la magnitud fuera del modelo que la define.
  typical_range: Depende de la escala microscópica o macroscópica considerada.
  sign_behavior:
    has_sign: false
    meaning:
      es: Se toma positiva en el dominio habitual.
      en: It is taken as positive in the usual domain.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa un límite ideal o ausencia de esa escala.
      en: Zero represents an ideal limit or absence of that scale.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: Dominio físico compatible con el modelo.
  interpretation_role:
    primary_for:
    - cuantizacion
    - limite clasico
    secondary_for:
    - lectura SVG
    - analisis de escala
  graph_binding:
    channels:
    - yAxis
  pedagogical_notes:
    es: Ayuda a conectar la imagen SVG con la escala física del fenómeno moderno.
    en: Helps connect the SVG image with the physical scale of the modern phenomenon.
