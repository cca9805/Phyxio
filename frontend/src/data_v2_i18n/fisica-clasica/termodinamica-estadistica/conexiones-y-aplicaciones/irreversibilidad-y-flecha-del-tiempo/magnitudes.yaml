version: 5.0.0
magnitudes:
- id: variacion_entropia_universo
  symbol: ΔS_univ
  nombre:
    es: Variación de entropía del universo
    en: Entropy change of the universe
  descripcion:
    es: Cambio total de entropía del sistema más entorno.
    en: Total entropy change of system plus surroundings.
  unidad_si: J/K
  dimension: '[M L^2 T^-2 Θ^-1]'
  is_vector: false
  components: []
  category: termodinamica_estadistica
  physical_role: calculable
  used_in:
  - segunda_ley_delta_s_universo
  - criterio_flecha_temporal
  common_mistake:
    es: Leer la magnitud sin revisar sistema, entorno, signo y unidad.
    en: Reading the quantity without checking system, surroundings, sign, and unit.
  typical_range:
    es: Depende del sistema; se interpreta por signo, escala y tendencia.
    en: Depends on the system; interpreted through sign, scale, and trend.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica aumento, disminución o balance nulo de entropía.
      en: The sign indicates increase, decrease, or zero entropy balance.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa equilibrio, reversibilidad ideal o ausencia de cambio neto.
      en: Zero represents equilibrium, ideal reversibility, or no net change.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Puede ser positiva, negativa o cero según la frontera elegida.
  interpretation_role:
    primary_for:
    - flecha del tiempo
    - irreversibilidad
    secondary_for:
    - equilibrio
    - macroestados probables
  graph_binding:
    channels:
    - yAxis
  pedagogical_notes:
    es: Conecta la lectura macroscópica con la tendencia estadística del proceso.
    en: Connects the macroscopic reading with the statistical tendency of the process.
