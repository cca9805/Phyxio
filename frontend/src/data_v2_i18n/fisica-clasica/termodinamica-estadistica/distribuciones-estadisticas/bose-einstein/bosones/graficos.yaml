version: '1.0'
leaf: bosones
coord:
  id: bosones-Coord
  graphId: bosones-Coord
  type: Coord
  graphType: Coord
  title:
    es: Ocupación media de un estado bosónico
    en: Mean occupation of a bosonic state
  xAxis:
    es: Energía relativa ε − μ en unidades de k_B T
    en: Relative energy ε − μ in units of k_B T
  yAxis:
    es: Ocupación media n̄
    en: Mean occupation n̄
  xMagnitude: energia
  yMagnitude: ocupacion_media
  relation:
    es: 'La gráfica responde cómo cambia la ocupación media cuando varía la energía relativa al potencial químico: al crecer
      ε−μ respecto a k_B T, la ocupación media disminuye.'
    en: 'The graph answers how mean occupation changes when energy relative to chemical potential varies: as ε−μ grows compared
      with k_B T, mean occupation decreases.'
  physicalReading:
    es: 'Los bosones pueden compartir estado: por eso la ocupación media se vuelve muy grande cuando la energía del estado
      se acerca al potencial químico y la temperatura fija la escala k_B T.'
    en: 'Bosons can share a state: therefore mean occupation becomes very large when the state energy approaches the chemical
      potential, while temperature sets the k_B T scale.'
  slopeMeaning:
    es: La pendiente negativa indica que aumentar la energía reduce rápidamente la ocupación media del estado bosónico.
    en: The negative slope indicates that increasing energy rapidly reduces the mean occupation of the bosonic state.
  interceptMeaning:
    es: No se interpreta como corte físico en x=0 porque la fórmula diverge cuando energia se acerca a potencial_quimico.
    en: It is not read as a physical intercept at x=0 because the formula diverges when energy approaches chemical potential.
  curvatureMeaning:
    es: 'La curvatura muestra que la caída no es lineal: lejos del potencial químico la ocupación se aplana hacia cero.'
    en: 'The curvature shows the decrease is not linear: far from the chemical potential the occupation flattens toward zero.'
  signMeaning:
    es: La ocupación media siempre debe ser positiva; valores negativos indicarían dominio físico mal elegido.
    en: Mean occupation must always be positive; negative values would indicate a wrongly chosen physical domain.
  areaMeaning:
    es: El área bajo esta curva simple no representa por sí sola el número total de bosones sin incluir densidad de estados.
    en: The area under this simple curve does not by itself represent the total number of bosons without including density
      of states.
  domainMeaning:
    es: Solo se usa para energia mayor que potencial_quimico y temperatura positiva; cerca del límite aparece alta ocupación
      bosónica.
    en: It is used only for energy greater than chemical potential and positive temperature; near the limit high bosonic occupation
      appears.
  modelConnection:
    es: Representa el modelo de Bose-Einstein para bosones indistinguibles en equilibrio térmico.
    en: It represents the Bose-Einstein model for indistinguishable bosons in thermal equilibrium.
  formulaConnection:
    es: 'Se basa en bose_einstein_ocupacion: ocupacion_media=1/(exp((energia-potencial_quimico)/(constante_boltzmann*temperatura))-1).'
    en: 'It is based on bose_einstein_ocupacion: mean occupation equals 1/(exp((energy-chemical potential)/(Boltzmann constant*temperature))-1).'
  readingFocus:
    es: Lee cómo la ocupación media de los bosones cambia al variar energía, potencial químico y temperatura mediante el cociente
      (energia-potencial_quimico)/(constante_boltzmann*temperatura).
    en: Read how the mean occupation of bosons changes as energy, chemical potential, and temperature vary through the ratio
      (energy-chemical potential)/(Boltzmann constant*temperature).
  agentHints:
    es:
    - Relaciona cada punto con el cociente (energia-potencial_quimico)/(constante_boltzmann*temperatura).
    - Explica que ocupacion_media no es probabilidad y puede ser mayor que uno.
    - Señala que la divergencia cerca de energia=potencial_quimico anuncia ocupación colectiva.
    en:
    - Relate each point to the ratio (energy-chemical potential)/(Boltzmann constant*temperature).
    - Explain that mean occupation is not a probability and may be greater than one.
    - Point out that divergence near energy=chemical potential signals collective occupation.
  commonMistakes:
    es:
    - Leer la ocupación media como una probabilidad limitada a 1.
    - Ignorar el potencial químico y usar solo la energía absoluta.
    - Aplicar la curva con temperatura igual a cero o energía menor que potencial_quimico.
    en:
    - Reading mean occupation as a probability limited to 1.
    - Ignoring chemical potential and using only absolute energy.
    - Applying the curve at zero temperature or energy below chemical potential.
  curveProfile:
    type: decreasing_divergent_curve
    expectedShape:
      es: Curva decreciente con divergencia cerca de x=0 y cola que tiende a cero.
      en: Decreasing curve with divergence near x=0 and a tail tending to zero.
    keyPoints:
    - x: 0.1
      y: 9.51
      label:
        es: Alta ocupación cerca del potencial químico
        en: High occupation near chemical potential
    - x: 1.0
      y: 0.58
      label:
        es: Escala térmica k_B T
        en: Thermal scale k_B T
    - x: 4.0
      y: 0.019
      label:
        es: Estado energético poco ocupado
        en: Weakly occupied high-energy state
  dataRange:
    xMin: 0.1
    xMax: 5.0
    yMin: 0.0
    yMax: 10.0
    autoScale: true
    sampleCount: 80
  recommendedTab: graficas
