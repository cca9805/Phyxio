version: 5.0.0
ui:
  default_formula: fraccion_condensada_bose
formulas:
- id: temperatura_critica_bose
  title:
    es: Temperatura crítica de condensación Bose-Einstein
    en: Bose-Einstein condensation critical temperature
  equation: T_c=(h^2/(2*pi*m*k_B))*(n/zeta_3_2)^(2/3)
  latex: T_c=\frac{h^2}{2\pi m k_B}(\frac{n}{\zeta(3/2)})^{2/3}
  rearrangements:
  - id: densidad_desde_temperatura_critica
    equation: n=zeta_3_2*(2*pi*m*k_B*T_c/h^2)^(3/2)
    latex: n=\zeta(3/2)(\frac{2\pi m k_B T_c}{h^2})^{3/2}
    target: densidad_particulas
  category: termodinamica-estadistica
  relation_type: threshold
  physical_meaning:
    es: Fija el umbral térmico por debajo del cual aparece ocupación macroscópica del estado fundamental.
    en: Sets the thermal threshold below which macroscopic occupation of the ground state appears.
  constraints:
    es: Gas ideal de bosones no relativistas, equilibrio térmico y régimen diluido.
    en: Ideal nonrelativistic boson gas, thermal equilibrium, and dilute regime.
  validity:
    es: Válida si las interacciones, el tamaño finito y el confinamiento no dominan la transición.
    en: Valid if interactions, finite size, and confinement do not dominate the transition.
  dimension_check: coherente con la dimensión de la magnitud objetivo
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - modelos.md
  - ejemplos.md
  - aplicaciones.md
  interpretation_tags:
  - bose_einstein
  - condensate
  - threshold
  result_semantics:
    target: temperatura_critica
    kind: scalar
    sign_meaning:
      es: El valor permitido no debe contradecir su dominio físico.
      en: The allowed value must not contradict its physical domain.
    absolute_value_meaning:
      es: Su valor mide la escala física asociada al condensado.
      en: Its value measures the physical scale associated with the condensate.
  domain_checks:
  - es: Comprobar temperaturas absolutas positivas y parámetros materiales positivos.
    en: Check positive absolute temperatures and positive material parameters.
  coherence_checks:
  - es: La lectura debe ser coherente con la dependencia esperada respecto a temperatura y densidad.
    en: The reading must be coherent with the expected dependence on temperature and density.
  graph_implications:
    es: Se conecta con la curva Coord de fracción condensada frente a temperatura reducida.
    en: It connects with the Coord curve of condensed fraction versus reduced temperature.
  pedagogical_triggers:
  - es: Distinguir umbral crítico de simple enfriamiento continuo.
    en: Distinguish a critical threshold from simple continuous cooling.
- id: fraccion_condensada_bose
  title:
    es: Fracción condensada ideal
    en: Ideal condensed fraction
  equation: f_0=1-(T/T_c)^(3/2)
  latex: f_0=1-(\frac{T}{T_c})^{3/2}
  rearrangements:
  - id: temperatura_desde_fraccion_condensada
    equation: T=T_c*(1-f_0)^(2/3)
    latex: T=T_c(1-f_0)^{2/3}
    target: temperatura
  category: termodinamica-estadistica
  relation_type: state_relation
  physical_meaning:
    es: Mide qué proporción de bosones ocupa el estado fundamental por debajo de la temperatura crítica.
    en: Measures what proportion of bosons occupies the ground state below the critical temperature.
  constraints:
    es: Gas ideal de bosones no relativistas, equilibrio térmico y régimen diluido.
    en: Ideal nonrelativistic boson gas, thermal equilibrium, and dilute regime.
  validity:
    es: Válida si las interacciones, el tamaño finito y el confinamiento no dominan la transición.
    en: Valid if interactions, finite size, and confinement do not dominate the transition.
  dimension_check: coherente con la dimensión de la magnitud objetivo
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - teoria.md
  - ejemplos.md
  - graficos.yaml
  interpretation_tags:
  - bose_einstein
  - condensate
  - threshold
  result_semantics:
    target: fraccion_condensada
    kind: scalar
    sign_meaning:
      es: El valor permitido no debe contradecir su dominio físico.
      en: The allowed value must not contradict its physical domain.
    absolute_value_meaning:
      es: Su valor mide la escala física asociada al condensado.
      en: Its value measures the physical scale associated with the condensate.
  domain_checks:
  - es: Comprobar temperaturas absolutas positivas y parámetros materiales positivos.
    en: Check positive absolute temperatures and positive material parameters.
  coherence_checks:
  - es: La lectura debe ser coherente con la dependencia esperada respecto a temperatura y densidad.
    en: The reading must be coherent with the expected dependence on temperature and density.
  graph_implications:
    es: Se conecta con la curva Coord de fracción condensada frente a temperatura reducida.
    en: It connects with the Coord curve of condensed fraction versus reduced temperature.
  pedagogical_triggers:
  - es: Distinguir umbral crítico de simple enfriamiento continuo.
    en: Distinguish a critical threshold from simple continuous cooling.
- id: densidad_critica_bose
  title:
    es: Densidad crítica de Bose
    en: Bose critical density
  equation: n_c=zeta_3_2/lambda_T^3
  latex: n_c=\frac{\zeta(3/2)}{\lambda_T^3}
  rearrangements:
  - id: longitud_onda_desde_densidad_critica
    equation: lambda_T=(zeta_3_2/n_c)^(1/3)
    latex: \lambda_T=(\frac{\zeta(3/2)}{n_c})^{1/3}
    target: longitud_onda_termica
  category: termodinamica-estadistica
  relation_type: threshold
  physical_meaning:
    es: Compara la concentración de bosones con el solapamiento cuántico necesario para condensar.
    en: Compares boson concentration with the quantum overlap needed for condensation.
  constraints:
    es: Gas ideal de bosones no relativistas, equilibrio térmico y régimen diluido.
    en: Ideal nonrelativistic boson gas, thermal equilibrium, and dilute regime.
  validity:
    es: Válida si las interacciones, el tamaño finito y el confinamiento no dominan la transición.
    en: Valid if interactions, finite size, and confinement do not dominate the transition.
  dimension_check: coherente con la dimensión de la magnitud objetivo
  calculable: true
  motivo_no_calculable: ''
