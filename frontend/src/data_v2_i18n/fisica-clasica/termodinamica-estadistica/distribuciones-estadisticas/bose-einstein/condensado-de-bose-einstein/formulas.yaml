- id: longitud_onda_termica_de_broglie
  title:
    es: Longitud de onda térmica de de Broglie
    en: Thermal de Broglie wavelength
  equation: lambda_T=h/sqrt(2*pi*m*k_B*T)
  latex: \lambda_T=\frac{h}{\sqrt{2\pi m k_B T}}
  rearrangements:
  - id: temperatura_desde_longitud_onda
    equation: T=h^2/(2*pi*m*k_B*lambda_T^2)
    latex: T=\frac{h^2}{2\pi m k_B\lambda_T^2}
    target: temperatura
  category: termodinamica-estadistica
  relation_type: state_relation
  physical_meaning:
    es: Estima el tamaño cuántico térmico y cuándo las ondas de bosones empiezan a solaparse.
    en: Estimates thermal quantum size and when boson waves begin to overlap.
  constraints:
    es: Gas ideal de bosones no relativistas, equilibrio térmico y régimen diluido.
    en: Ideal nonrelativistic boson gas, thermal equilibrium, and dilute regime.
  validity:
    es: Válida si las interacciones, el tamaño finito y el confinamiento no dominan la transición.
    en: Valid if interactions, finite size, and confinement do not dominate the transition.
