version: '1.0'
leaf: condensado-de-bose-einstein
coord:
  id: condensado-de-bose-einstein-Coord
  graphId: condensado-de-bose-einstein-Coord
  type: Coord
  graphType: Coord
  title:
    es: Fracción condensada frente a temperatura reducida
    en: Condensed fraction versus reduced temperature
  xAxis:
    es: temperatura reducida T/T_c
    en: reduced temperature T/T_c
  yAxis:
    es: fracción condensada f_0
    en: condensed fraction f_0
  xMagnitude: temperatura
  yMagnitude: fraccion_condensada
  relation:
    es: La fracción condensada disminuye al aumentar la temperatura respecto a la temperatura crítica; la densidad de partículas
      fija esa escala crítica.
    en: The condensed fraction decreases as temperature rises relative to critical temperature; particle density sets that
      critical scale.
  physicalReading:
    es: 'La gráfica responde cómo depende la fracción condensada de la temperatura crítica, la temperatura y la densidad de
      partículas: aumentar densidad eleva T_c y permite más condensado al mismo T.'
    en: 'The graph answers how condensed fraction depends on critical temperature, temperature, and particle density: increasing
      density raises T_c and allows more condensate at the same T.'
  slopeMeaning:
    es: 'Pendiente negativa: calentar reduce la población macroscópica del estado fundamental.'
    en: 'Negative slope: warming reduces the macroscopic population of the ground state.'
  interceptMeaning:
    es: En T/T_c = 0 el modelo ideal da condensado completo.
    en: At T/T_c = 0 the ideal model gives a fully condensed gas.
  curvatureMeaning:
    es: La curvatura procede de la potencia 3/2 de los estados excitados.
    en: The curvature comes from the 3/2 power of excited states.
  signMeaning:
    es: f_0 no puede ser negativa; por encima de T_c se lee como cero.
    en: f_0 cannot be negative; above T_c it is read as zero.
  areaMeaning:
    es: El área bajo la curva no es una magnitud conservada directa.
    en: The area under the curve is not a direct conserved quantity.
  domainMeaning:
    es: 'Dominio principal: 0 <= T/T_c <= 1; fuera de él domina la lectura de umbral.'
    en: 'Main domain: 0 <= T/T_c <= 1; outside it the threshold reading dominates.'
  modelConnection:
    es: Conecta el gas ideal de bosones con la transición colectiva al estado fundamental.
    en: Connects the ideal boson gas with the collective transition to the ground state.
  formulaConnection:
    es: Usa {{f:fraccion_condensada_bose}} y la escala dada por {{f:temperatura_critica_bose}}.
    en: Uses {{f:fraccion_condensada_bose}} and the scale given by {{f:temperatura_critica_bose}}.
  readingFocus:
    es: Leer cuánta fracción condensada queda para una temperatura y cómo la densidad de partículas modifica la temperatura
      crítica.
    en: Read how much condensed fraction remains at a temperature and how particle density modifies the critical temperature.
  agentHints:
    es:
    - Comparar T con T_c antes de interpretar la curva.
    - Relacionar mayor densidad de partículas con mayor temperatura crítica.
    - No extrapolar fracciones negativas por encima del umbral.
    en:
    - Compare T with T_c before interpreting the curve.
    - Relate higher particle density to higher critical temperature.
    - Do not extrapolate negative fractions above the threshold.
  commonMistakes:
    es:
    - Tratar T_c como constante universal.
    - Usar la fórmula de f_0 para T > T_c.
    - Confundir condensación Bose-Einstein con licuefacción ordinaria.
    en:
    - Treating T_c as a universal constant.
    - Using the f_0 formula for T > T_c.
    - Confusing Bose-Einstein condensation with ordinary liquefaction.
  curveProfile:
    type: decreasing_power_law
    expectedShape:
      es: Curva decreciente de 1 a 0 con caída suave hacia el umbral.
      en: Decreasing curve from 1 to 0 with a smooth fall toward the threshold.
    keyPoints:
    - x: 0
      y: 1
      label:
        es: límite frío ideal
        en: ideal cold limit
    - x: 0.5
      y: 0.646
      label:
        es: condensado parcial
        en: partial condensate
    - x: 1
      y: 0
      label:
        es: temperatura crítica
        en: critical temperature
  dataRange:
    xMin: 0
    xMax: 1.2
    yMin: 0
    yMax: 1
    autoScale: false
    sampleCount: 80
  recommendedTab: graficas
