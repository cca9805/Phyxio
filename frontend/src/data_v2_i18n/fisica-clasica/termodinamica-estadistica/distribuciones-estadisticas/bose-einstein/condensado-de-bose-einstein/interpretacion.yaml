targets:
  temperatura_critica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: umbral de condensación
      en: condensation threshold
    summary_rules:
    - id: temperatura_critica_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[temperatura_critica]] marca la frontera térmica a partir de la cual puede aparecer ocupación macroscópica del
          estado fundamental. Interprétala con su unidad K y con el régimen ideal de bosones.'
        en: '[[temperatura_critica]] marks the thermal boundary below which macroscopic occupation of the ground state can
          appear. Interpret it with its K unit and within the ideal-boson regime.'
    physical_reading_rules:
    - id: temperatura_critica_physical_reading_context
      when: 'true'
      status: info
      text:
        es: 'Lee [[temperatura_critica]] como parte del equilibrio Bose-Einstein: no es un dato aislado, depende de [[temperatura]],
          [[densidad_particulas]] y del solapamiento cuántico.'
        en: 'Read [[temperatura_critica]] as part of Bose-Einstein equilibrium: it is not an isolated number, but depends
          on [[temperatura]], [[densidad_particulas]], and quantum overlap.'
    - id: temperatura_critica_physical_reading_unit
      when: 'true'
      status: ok
      text:
        es: 'Comprueba la unidad esperada de [[temperatura_critica]]: K. Una unidad incompatible suele indicar que se mezclaron
          densidad, número total o volumen.'
        en: 'Check the expected unit of [[temperatura_critica]]: K. An incompatible unit usually means density, total number,
          or volume were mixed.'
    coherence_rules:
    - id: temperatura_critica_coherence_condensation_regime
      when: 'true'
      status: ok
      text:
        es: 'Contrasta [[temperatura_critica]] con [[temperatura_critica]] y [[fraccion_condensada]]: por encima del umbral
          térmico no debe aparecer condensado ideal.'
        en: 'Compare [[temperatura_critica]] with [[temperatura_critica]] and [[fraccion_condensada]]: above the thermal threshold
          an ideal condensate should not appear.'
    - id: temperatura_critica_coherence_density_volume
      when: 'true'
      status: ok
      text:
        es: Si intervienen [[numero_particulas]] y [[volumen]], verifica que su cociente sea coherente con [[densidad_particulas]]
          antes de interpretar [[temperatura_critica]].
        en: If [[numero_particulas]] and [[volumen]] appear, verify that their ratio is consistent with [[densidad_particulas]]
          before interpreting [[temperatura_critica]].
    model_validity_rules:
    - id: temperatura_critica_model_validity_ideal_gas
      when: 'true'
      status: info
      text:
        es: Usa [[temperatura_critica]] dentro del gas de bosones ideal o débilmente interactuante; interacciones fuertes,
          trampas reales o tamaño finito pueden desplazar el umbral.
        en: Use [[temperatura_critica]] within an ideal or weakly interacting boson gas; strong interactions, real traps,
          or finite size can shift the threshold.
    - id: temperatura_critica_model_validity_temperature
      when: temperatura <= 0
      status: warning
      text:
        es: Una [[temperatura]] no positiva invalida la lectura termodinámica estándar de [[temperatura_critica]].
        en: A non-positive [[temperatura]] invalidates the standard thermodynamic reading of [[temperatura_critica]].
    graph_rules:
    - id: temperatura_critica_graph_temperature_axis
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, localiza [[temperatura]] respecto a [[temperatura_critica]] para decidir si [[temperatura_critica]]
          pertenece a la zona condensada o térmica.
        en: On the Coord graph, locate [[temperatura]] relative to [[temperatura_critica]] to decide whether [[temperatura_critica]]
          belongs to the condensed or thermal region.
    - id: temperatura_critica_graph_slope_limit
      when: 'true'
      status: info
      text:
        es: 'Observa la curvatura cerca de [[temperatura_critica]]: un cambio brusco de [[fraccion_condensada]] señala transición
          ideal, no una fuerza mecánica.'
        en: 'Observe the curvature near [[temperatura_critica]]: a sharp change in [[fraccion_condensada]] signals an ideal
          transition, not a mechanical force.'
    likely_errors:
    - id: temperatura_critica_likely_error_classical
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[temperatura_critica]] con una lectura aislada es un error frecuente: No trates [[temperatura_critica]]
          con intuición clásica de partículas distinguibles: la condensación surge porque muchos bosones pueden compartir
          el mismo estado.'
        en: 'A common mistake is to interpret [[temperatura_critica]] in isolation: Do not treat [[temperatura_critica]] with
          classical distinguishable-particle intuition: condensation arises because many bosons can share the same state.'
    - id: temperatura_critica_likely_error_threshold
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[temperatura_critica]] con una lectura aislada es un error frecuente: No confundas [[temperatura_critica]]
          con la [[temperatura]] real: el primero es un umbral y la segunda es el estado actual del sistema.'
        en: 'Do not confuse [[temperatura_critica]] with the actual [[temperatura]]: the first is a threshold and the second
          is the current state of the system.'
    next_step_rules:
    - id: temperatura_critica_next_step_compare_threshold
      when: 'true'
      status: info
      text:
        es: Después de calcular [[temperatura_critica]], compara [[temperatura]] con [[temperatura_critica]] y decide si debes
          leer [[fraccion_condensada]] o revisar la densidad.
        en: After calculating [[temperatura_critica]], compare [[temperatura]] with [[temperatura_critica]] and decide whether
          to read [[fraccion_condensada]] or recheck density.
    physical_intuition:
    - id: temperatura_critica_intuition_overlap
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[temperatura_critica]] cobra sentido cuando la [[longitud_onda_termica]] se vuelve comparable
          a la separación media entre bosones.
        en: Intuitively, [[temperatura_critica]] becomes meaningful when [[longitud_onda_termica]] becomes comparable to the
          mean spacing between bosons.
    limiting_cases:
    - id: temperatura_critica_limit_high_temperature
      when: temperatura >> temperatura_critica
      status: info
      text:
        es: Si [[temperatura]] es mucho mayor que [[temperatura_critica]], la lectura ideal espera [[fraccion_condensada]]
          prácticamente nula.
        en: If [[temperatura]] is much larger than [[temperatura_critica]], the ideal reading expects nearly zero [[fraccion_condensada]].
    - id: temperatura_critica_limit_low_temperature
      when: temperatura << temperatura_critica
      status: info
      text:
        es: Si [[temperatura]] está muy por debajo de [[temperatura_critica]], el modelo predice una población macroscópica
          en [[numero_condensado]].
        en: If [[temperatura]] is far below [[temperatura_critica]], the model predicts a macroscopic population in [[numero_condensado]].
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
