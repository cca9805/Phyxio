version: 5.0.0
magnitudes:
- id: fraccion_condensada
  symbol: f_0
  nombre:
    es: fracción condensada
    en: condensed fraction
  descripcion:
    es: Proporción de bosones en el estado fundamental condensado.
    en: Proportion of bosons in the condensed ground state.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: termodinamica-estadistica
  physical_role:
    es: resultado principal
    en: main result
  used_in:
  - fraccion_condensada_bose
  common_mistake:
    es: Interpretar fracción condensada sin comprobar dominio, unidades o límite de validez.
    en: Interpreting condensed fraction without checking domain, units, or validity limit.
  typical_range: 0 <= f_0 <= 1
  sign_behavior:
    has_sign: false
    meaning:
      es: No representa dirección; su sentido físico depende del intervalo permitido.
      en: It does not represent direction; its physical meaning depends on the allowed interval.
  zero_behavior:
    allowed: true
    meaning:
      es: El cero marca ausencia, límite inferior o referencia según la magnitud.
      en: Zero marks absence, lower limit, or reference depending on the quantity.
  value_nature:
    kind: real_scalar
    nonnegative_only: true
    expected_interval: 0 <= f_0 <= 1
  interpretation_role:
    primary_for:
    - fraccion_condensada_bose
    secondary_for: []
  graph_binding:
    channels:
    - yAxis
    preferred_axis: yAxis
    graph_type: Coord
  pedagogical_notes:
    es: Conectar fracción condensada con la aparición o desaparición del condensado.
    en: Connect condensed fraction with the appearance or disappearance of the condensate.
