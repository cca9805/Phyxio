targets:
  ocupacion_estado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado principal
      en: main result
    summary_rules:
    - id: ocupacion_estado_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[ocupacion_estado]] indica la probabilidad media de ocupación de un estado fermiónico: aumenta cuando [[energia]]
          cae bajo [[potencial_quimico]] y disminuye cuando lo supera, siempre acotada entre 0 y 1 por la exclusión de Pauli.'
        en: '[[ocupacion_estado]] indicates the mean occupation probability of a fermionic state: it increases when [[energia]]
          falls below [[potencial_quimico]] and decreases when it exceeds it, always bounded between 0 and 1 by Pauli exclusion.'
    physical_reading_rules:
    - id: ocupacion_estado_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Si [[energia]] queda por debajo de [[potencial_quimico]], [[ocupacion_estado]] tiende a 1; si queda por encima,
          tiende a 0.
        en: If [[energia]] is below [[potencial_quimico]], [[ocupacion_estado]] tends to 1; if it is above, it tends to 0.
    coherence_rules:
    - id: ocupacion_estado_coherence_formula_units
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[ocupacion_estado]] sea adimensional y esté en 0 ≤ f ≤ 1; fuera de ese intervalo hay error algebraico
          o de unidades.
        en: Check that [[ocupacion_estado]] is dimensionless and lies in 0 ≤ f ≤ 1; outside that range there is an algebra
          or unit error.
    model_validity_rules:
    - id: ocupacion_estado_model_validity_assumptions
      when: 'true'
      status: info
      text:
        es: La lectura supone fermiones indistinguibles en equilibrio térmico, con [[temperatura_absoluta]] positiva y estados
          cuánticos bien definidos.
        en: The reading assumes indistinguishable fermions in thermal equilibrium, positive [[temperatura_absoluta]], and
          well-defined quantum states.
    graph_rules:
    - id: ocupacion_estado_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, lee cómo [[ocupacion_estado]] cae con [[energia]] alrededor de [[potencial_quimico]].
        en: In the Coord graph, read how [[ocupacion_estado]] falls with [[energia]] around [[potencial_quimico]].
    likely_errors:
    - id: ocupacion_estado_likely_error_interpretation
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[ocupacion_estado]] con una lectura aislada es un error frecuente: No confundas [[ocupacion_estado]]
          con probabilidad clásica independiente: la exclusión de Pauli impide superar una ocupación media de 1.'
        en: 'Do not confuse [[ocupacion_estado]] with an independent classical probability: Pauli exclusion prevents a mean
          occupation above 1.'
    next_step_rules:
    - id: ocupacion_estado_next_step_check
      when: 'true'
      status: info
      text:
        es: Después de calcular f, compara [[energia]] con [[potencial_quimico]] y revisa si el régimen térmico suaviza o
          aproxima un escalón.
        en: After computing f, compare [[energia]] with [[potencial_quimico]] and check whether the thermal regime smooths
          or approximates a step.
    physical_intuition:
    - id: ocupacion_estado_physical_intuition
      when: 'true'
      status: info
      text:
        es: 'Fermiones llenan primero estados bajos: [[ocupacion_estado]] actúa como una puerta que se cierra al subir la
          energía.'
        en: 'Fermions fill low states first: [[ocupacion_estado]] behaves like a gate that closes as energy rises.'
    limiting_cases:
    - id: ocupacion_estado_limiting_cases
      when: 'true'
      status: info
      text:
        es: 'Cuando T → 0, la ocupación se aproxima a un escalón: 1 por debajo de μ y 0 por encima.'
        en: 'As T → 0, the occupation approaches a step: 1 below μ and 0 above it.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  energia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable independiente
      en: independent variable
    summary_rules:
    - id: energia_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[energia]] representa energía del estado dentro del modelo fermiónico del leaf.'
        en: '[[energia]] represents state energy within the fermionic model of this leaf.'
    physical_reading_rules:
    - id: energia_physical_reading_units
      when: 'true'
      status: info
      text:
        es: '[[energia]] se compara con [[potencial_quimico]]; esa diferencia decide si el estado tiende a estar ocupado o
          vacío.'
        en: '[[energia]] is compared with [[potencial_quimico]]; that difference decides whether the state tends to be occupied
          or empty.'
    coherence_rules:
    - id: energia_coherence_formula_units
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia]] sea compatible con {{f:fermi_dirac_ocupacion}} y con las unidades SI de las entradas.
        en: Check that [[energia]] is consistent with {{f:fermi_dirac_ocupacion}} and with the SI units of the inputs.
    model_validity_rules:
    - id: energia_model_validity_assumptions
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia]] solo bajo equilibrio estadístico y dentro de las hipótesis de Fermi-Dirac o gas de Fermi
          usadas.
        en: Interpret [[energia]] only under statistical equilibrium and within the Fermi-Dirac or Fermi-gas assumptions used.
    graph_rules:
    - id: energia_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: Si aparece en la gráfica, relaciona [[energia]] con la curva de ocupación frente a energía y con el cambio cerca
          de μ.
        en: If it appears in the graph, relate [[energia]] to the occupation curve versus energy and the change near μ.
    likely_errors:
    - id: energia_likely_error_interpretation
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[energia]] con una lectura aislada es un error frecuente: No uses eV y J mezclados al evaluar exponentes:
          E, μ y k_B T deben estar en la misma unidad de energía.'
        en: 'A common mistake is to interpret [[energia]] in isolation: Do not mix eV and J when evaluating exponents: E,
          μ, and k_B T must use the same energy unit.'
    next_step_rules:
    - id: energia_next_step_check
      when: 'true'
      status: info
      text:
        es: 'Usa [[energia]] para decidir la siguiente comprobación: unidades, orden de magnitud, límite físico o comparación
          con otra escala.'
        en: 'Use [[energia]] to choose the next check: units, order of magnitude, physical limit, or comparison with another
          scale.'
    physical_intuition:
    - id: energia_physical_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia]] ayuda a traducir la estadística cuántica a una lectura física observable o comparable.
        en: Intuitively, [[energia]] helps translate quantum statistics into a physical reading that can be observed or compared.
    limiting_cases:
    - id: energia_limiting_cases
      when: 'true'
      status: info
      text:
        es: Explora [[energia]] en límites de baja temperatura, alta temperatura, baja densidad o alta densidad según la fórmula
          usada.
        en: Explore [[energia]] in low-temperature, high-temperature, low-density, or high-density limits according to the
          formula used.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
