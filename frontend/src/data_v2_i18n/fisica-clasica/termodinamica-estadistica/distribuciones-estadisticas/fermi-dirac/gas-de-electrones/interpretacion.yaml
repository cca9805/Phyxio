      when: 'true'
      status: info
      text:
        es: Al aumentar [[densidad_electronica]], la exclusión de Pauli empuja el llenado hacia estados más altos y eleva
          [[energia_fermi]].
        en: As [[densidad_electronica]] increases, Pauli exclusion pushes filling toward higher states and raises [[energia_fermi]].
