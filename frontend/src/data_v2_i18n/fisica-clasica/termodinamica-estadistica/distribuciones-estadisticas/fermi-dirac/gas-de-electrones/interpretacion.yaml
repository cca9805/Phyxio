targets:
  energia_fermi:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado dominante
      en: dominant result
    summary_rules:
    - id: energia_fermi_summary_core
      when: 'true'
      status: ok
      text:
        es: '[[energia_fermi]] resume la energía hasta la que quedan ocupados los estados electrónicos a temperatura casi
          nula.'
        en: '[[energia_fermi]] summarizes the energy up to which electronic states are filled at nearly zero temperature.'
    physical_reading_rules:
    - id: energia_fermi_physical_reading_core
      when: 'true'
      status: info
      text:
        es: Una [[energia_fermi]] mayor significa que la [[densidad_electronica]] obliga a ocupar estados de mayor [[energia_estado]]
          aunque el gas esté frío.
        en: A larger [[energia_fermi]] means [[densidad_electronica]] forces occupation of higher [[energia_estado]] states
          even when the gas is cold.
    coherence_rules:
    - id: energia_fermi_coherence_units
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_fermi]] usa unidades SI y que su valor encaja con las magnitudes relacionadas del gas
          de electrones.
        en: Check that [[energia_fermi]] uses SI units and that its value fits the related quantities of the electron gas.
    - id: energia_fermi_coherence_density_power
      when: 'true'
      status: ok
      text:
        es: Si [[densidad_electronica]] aumenta, [[energia_fermi]] debe aumentar; una tendencia contraria indica error de
          despeje o unidades.
        en: If [[densidad_electronica]] increases, [[energia_fermi]] must increase; the opposite trend indicates algebra or
          unit error.
    model_validity_rules:
    - id: energia_fermi_model_validity_degenerate_gas
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_fermi]] dentro de un gas de electrones libre o casi libre, no relativista y en equilibrio
          térmico.
        en: Interpret [[energia_fermi]] within a free or nearly free, nonrelativistic electron gas in thermal equilibrium.
    graph_rules:
    - id: energia_fermi_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[energia_fermi]] con cómo la [[densidad_electronica]] modifica [[energia_fermi]]
          y la ocupación de estados.
        en: In the Coord graph, relate [[energia_fermi]] to how [[densidad_electronica]] changes [[energia_fermi]] and state
          occupation.
    likely_errors:
    - id: energia_fermi_likely_error_isolated_number
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[energia_fermi]] con una lectura aislada es un error frecuente: No leas [[energia_fermi]] como un
          número aislado: revisa escala, unidades, dependencia con densidad y régimen de validez.'
        en: 'A common mistake is to interpret [[energia_fermi]] in isolation: Do not read [[energia_fermi]] as an isolated
          number: check scale, units, density dependence, and validity regime.'
    next_step_rules:
    - id: energia_fermi_next_step_compare_scale
      when: 'true'
      status: info
      text:
        es: Después de obtener [[energia_fermi]], compáralo con [[energia_fermi]], [[temperatura_fermi]] o [[ocupacion_estado]]
          según el tipo de pregunta.
        en: After obtaining [[energia_fermi]], compare it with [[energia_fermi]], [[temperatura_fermi]], or [[ocupacion_estado]]
          according to the question type.
    physical_intuition:
    - id: energia_fermi_physical_intuition_fermi_pressure
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia_fermi]] debe ayudar a leer el llenado progresivo impuesto por Pauli en el gas de electrones.
        en: Intuitively, [[energia_fermi]] should help read the progressive filling imposed by Pauli exclusion in the electron
          gas.
    limiting_cases:
    - id: energia_fermi_limiting_case_cold_dense
      when: 'true'
      status: info
      text:
        es: 'Como caso límite, revisa el régimen frío y denso: si [[temperatura_absoluta]] es pequeña frente a [[temperatura_fermi]],
          domina la degeneración.'
        en: 'As a limiting case, check the cold dense regime: if [[temperatura_absoluta]] is small compared with [[temperatura_fermi]],
          degeneracy dominates.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  densidad_electronica:
    enabled: true
