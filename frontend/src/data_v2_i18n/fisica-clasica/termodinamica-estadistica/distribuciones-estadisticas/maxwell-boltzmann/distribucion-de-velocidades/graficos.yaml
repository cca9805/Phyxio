version: '1.0'
leaf: distribucion-de-velocidades
coord:
  id: distribucion-de-velocidades-Coord
  graphId: distribucion-de-velocidades-Coord
  type: Coord
  graphType: Coord
  title:
    es: Distribución de velocidades moleculares
    en: Molecular speed distribution
  xAxis:
    es: Velocidad molecular v (m/s)
    en: Molecular speed v (m/s)
  yAxis:
    es: Densidad de probabilidad f(v) (s/m)
    en: Probability density f(v) (s/m)
  xMagnitude: velocidad
  yMagnitude: densidad_probabilidad_velocidad
  relation:
    es: 'La temperatura desplaza la distribución de velocidades moleculares: al aumentar [[temperatura_absoluta]], el pico
      baja y se mueve hacia velocidades mayores.'
    en: 'Temperature shifts the molecular speed distribution: as [[temperatura_absoluta]] increases, the peak lowers and moves
      toward larger speeds.'
  physicalReading:
    es: La curva responde a la pregunta central porque muestra cómo la [[temperatura_absoluta]] determina qué velocidades
      moleculares son más probables y cómo se reparte la probabilidad en un gas ideal.
    en: The curve answers the central question because it shows how [[temperatura_absoluta]] determines which molecular speeds
      are most probable and how probability is spread in an ideal gas.
  slopeMeaning:
    es: La pendiente indica si la densidad de probabilidad crece o decrece al aumentar la velocidad.
    en: The slope indicates whether probability density increases or decreases as speed increases.
  interceptMeaning:
    es: En v=0 la densidad es cero porque el factor de espacio de velocidades anula la probabilidad puntual.
    en: At v=0 the density is zero because the velocity-space factor cancels the point probability.
  curvatureMeaning:
    es: La curvatura refleja el equilibrio entre el aumento de estados disponibles y la penalización exponencial por energía
      cinética.
    en: Curvature reflects the balance between increasing available states and exponential suppression by kinetic energy.
  signMeaning:
    es: La densidad de probabilidad nunca debe ser negativa.
    en: Probability density must never be negative.
  areaMeaning:
    es: El área bajo la curva en un intervalo de velocidades es la probabilidad de encontrar moléculas en ese intervalo.
    en: Area under the curve over a speed interval is the probability of finding molecules in that interval.
  domainMeaning:
    es: Solo se leen velocidades no negativas y temperaturas absolutas positivas.
    en: Only nonnegative speeds and positive absolute temperatures are read.
  modelConnection:
    es: Representa el modelo clásico de Maxwell-Boltzmann para un gas ideal diluido en equilibrio térmico.
    en: It represents the classical Maxwell-Boltzmann model for a dilute ideal gas in thermal equilibrium.
  formulaConnection:
    es: Se conecta directamente con {{f:maxwell_boltzmann_velocidad}} y con las escalas {{f:velocidad_mas_probable}}, {{f:velocidad_media}}
      y {{f:velocidad_cuadratica_media}}.
    en: It connects directly with {{f:maxwell_boltzmann_velocidad}} and the scales {{f:velocidad_mas_probable}}, {{f:velocidad_media}},
      and {{f:velocidad_cuadratica_media}}.
  readingFocus:
    es: Observa cómo la [[temperatura_absoluta]] cambia el pico, la anchura y el área por intervalos de la distribución de
      velocidades.
    en: Observe how [[temperatura_absoluta]] changes the peak, width, and interval areas of the speed distribution.
  agentHints:
    es:
    - Identifica primero que el eje x es rapidez, no velocidad vectorial.
    - Recuerda que la altura f(v) no es una probabilidad aislada.
    - Relaciona el desplazamiento del pico con el aumento de temperatura.
    en:
    - First identify that the x-axis is speed, not vector velocity.
    - Remember that the height f(v) is not an isolated probability.
    - Relate the peak shift to increasing temperature.
  commonMistakes:
    es:
    - Interpretar f(v) como probabilidad directa.
    - Permitir velocidades negativas en la distribución de rapidez.
    - Creer que todas las moléculas tienen la velocidad más probable.
    en:
    - Interpreting f(v) as direct probability.
    - Allowing negative speeds in a speed distribution.
    - Thinking all molecules have the most probable speed.
  curveProfile:
    type: unimodal_skewed
    expectedShape:
      es: Curva asimétrica con máximo único, cola hacia velocidades altas y área total normalizada.
      en: Asymmetric curve with one maximum, a tail toward high speeds, and normalized total area.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: 'Rapidez nula: densidad cero'
        en: 'Zero speed: zero density'
    - x: v_p
      y: max
      label:
        es: Velocidad más probable
        en: Most probable speed
    - x: alta v
      y: cola
      label:
        es: Cola de moléculas rápidas
        en: Fast-molecule tail
  dataRange:
    xMin: 0
    xMax: 2500
    yMin: 0
    yMax: 0.004
    autoScale: true
    sampleCount: 80
  recommendedTab: graficas
