          dominantes.
        en: Use [[velocidad_media]] only for a dilute classical gas in thermal equilibrium without dominant quantum-degenerate
          effects.
    - id: velocidad_media_model_validity_failure
      when: 'true'
      status: warning
      text:
        es: El modelo deja de ser fiable si hay gases muy densos, temperaturas extremadamente bajas o interacciones fuertes
          no incluidas.
        en: The model becomes unreliable for very dense gases, extremely low temperatures, or strong interactions not included.
    graph_rules:
    - id: velocidad_media_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: 'En la gráfica Coord, relaciona [[velocidad]] con [[densidad_probabilidad_velocidad]]: el pico no coincide necesariamente
          con [[velocidad_media]] ni con [[velocidad_rms]].'
        en: 'In the Coord graph, relate [[velocidad]] to [[densidad_probabilidad_velocidad]]: the peak does not necessarily
          match [[velocidad_media]] or [[velocidad_rms]].'
    - id: velocidad_media_graph_area_probability
      when: 'true'
      status: ok
      text:
        es: Lee el área entre [[velocidad_minima]] y [[velocidad_maxima]] como [[probabilidad_intervalo]], no como altura
          puntual de la curva.
        en: Read the area between [[velocidad_minima]] and [[velocidad_maxima]] as [[probabilidad_intervalo]], not as the
          point height of the curve.
    likely_errors:
    - id: velocidad_media_likely_error_density_vs_probability
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_media]] con una lectura aislada es un error frecuente: No confundas una densidad de probabilidad
          con una probabilidad: un valor puntual de [[densidad_probabilidad_velocidad]] necesita intervalo para producir probabilidad.'
        en: 'Do not confuse probability density with probability: a point value of [[densidad_probabilidad_velocidad]] needs
          an interval to produce probability.'
    - id: velocidad_media_likely_error_speed_hierarchy
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_media]] con una lectura aislada es un error frecuente: No trates [[velocidad_mas_probable]],
          [[velocidad_media]] y [[velocidad_rms]] como si fueran iguales; resumen aspectos distintos de la misma distribución.'
        en: 'A common mistake is to interpret [[velocidad_media]] in isolation: Do not treat [[velocidad_mas_probable]], [[velocidad_media]],
          and [[velocidad_rms]] as equal; they summarize different aspects of the same distribution.'
