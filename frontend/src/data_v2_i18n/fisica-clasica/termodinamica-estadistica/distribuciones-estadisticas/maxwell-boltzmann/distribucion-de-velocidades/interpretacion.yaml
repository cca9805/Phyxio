targets:
  densidad_probabilidad_velocidad:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado dominante
      en: speed probability density
    summary_rules:
    - id: densidad_probabilidad_velocidad_summary_context
      when: 'true'
      status: ok
      text:
        es: '[[densidad_probabilidad_velocidad]] debe leerse dentro de una distribución de Maxwell-Boltzmann: describe velocidades
          posibles, no trayectorias individuales.'
        en: '[[densidad_probabilidad_velocidad]] must be read within a Maxwell-Boltzmann distribution: it describes possible
          speeds, not individual trajectories.'
    physical_reading_rules:
    - id: densidad_probabilidad_velocidad_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Interpreta [[densidad_probabilidad_velocidad]] con su unidad y con el papel de [[temperatura_absoluta]] y [[masa_particula]]
          en el ensanchamiento de la curva. Si [[temperatura_absoluta]] aumenta, [[densidad_probabilidad_velocidad]] indica
          que la curva se desplaza hacia velocidades mayores porque la energía térmica disponible crece; si [[masa_particula]]
          disminuye, el pico también se desplaza porque la misma energía produce más rapidez en partículas más ligeras.
        en: Interpret [[densidad_probabilidad_velocidad]] with its unit and with the role of [[temperatura_absoluta]] and
          [[masa_particula]] in broadening the curve. Because [[temperatura_absoluta]] sets the thermal energy scale, a higher
          temperature means the distribution shifts toward larger speeds and the peak decreases in height; because [[masa_particula]]
          determines how energy translates into speed, lighter particles produce a broader distribution at the same temperature.
    coherence_rules:
    - id: densidad_probabilidad_velocidad_coherence_positive_domain
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[densidad_probabilidad_velocidad]] sea compatible con velocidades no negativas y con una probabilidad
          total normalizada en el dominio físico.
        en: Check that [[densidad_probabilidad_velocidad]] is compatible with nonnegative speeds and with total probability
          normalized over the physical domain.
    - id: densidad_probabilidad_velocidad_coherence_thermal_scale
      when: 'true'
      status: ok
      text:
        es: Si aumenta [[temperatura_absoluta]] o disminuye [[masa_particula]], las velocidades características deben desplazarse
          hacia valores mayores.
        en: If [[temperatura_absoluta]] increases or [[masa_particula]] decreases, characteristic speeds must shift toward
          larger values.
    model_validity_rules:
    - id: densidad_probabilidad_velocidad_model_validity_classical_gas
      when: 'true'
      status: info
      text:
        es: Usa [[densidad_probabilidad_velocidad]] solo para un gas clásico diluido, en equilibrio térmico y sin efectos
          cuánticos degenerados dominantes.
        en: Use [[densidad_probabilidad_velocidad]] only for a dilute classical gas in thermal equilibrium without dominant
          quantum-degenerate effects.
    - id: densidad_probabilidad_velocidad_model_validity_failure
      when: 'true'
      status: warning
      text:
        es: El modelo deja de ser fiable si hay gases muy densos, temperaturas extremadamente bajas o interacciones fuertes
          no incluidas.
        en: The model becomes unreliable for very dense gases, extremely low temperatures, or strong interactions not included.
    graph_rules:
    - id: densidad_probabilidad_velocidad_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: 'En la gráfica Coord, relaciona [[velocidad]] con [[densidad_probabilidad_velocidad]]: el pico no coincide necesariamente
          con [[velocidad_media]] ni con [[velocidad_rms]].'
        en: 'In the Coord graph, relate [[velocidad]] to [[densidad_probabilidad_velocidad]]: the peak does not necessarily
          match [[velocidad_media]] or [[velocidad_rms]].'
    - id: densidad_probabilidad_velocidad_graph_area_probability
      when: 'true'
      status: ok
      text:
        es: Lee el área entre [[velocidad_minima]] y [[velocidad_maxima]] como [[probabilidad_intervalo]], no como altura
          puntual de la curva.
        en: Read the area between [[velocidad_minima]] and [[velocidad_maxima]] as [[probabilidad_intervalo]], not as the
          point height of the curve.
    likely_errors:
    - id: densidad_probabilidad_velocidad_likely_error_density_vs_probability
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[densidad_probabilidad_velocidad]] con una lectura aislada es un error frecuente: No confundas una
          densidad de probabilidad con una probabilidad: un valor puntual de [[densidad_probabilidad_velocidad]] necesita
          intervalo para producir probabilidad.'
        en: 'Do not confuse probability density with probability: a point value of [[densidad_probabilidad_velocidad]] needs
          an interval to produce probability.'
    - id: densidad_probabilidad_velocidad_likely_error_speed_hierarchy
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[densidad_probabilidad_velocidad]] con una lectura aislada es un error frecuente: No trates [[velocidad_mas_probable]],
          [[velocidad_media]] y [[velocidad_rms]] como si fueran iguales; resumen aspectos distintos de la misma distribución.'
        en: 'A common mistake is to interpret [[densidad_probabilidad_velocidad]] in isolation: Do not treat [[velocidad_mas_probable]],
          [[velocidad_media]], and [[velocidad_rms]] as equal; they summarize different aspects of the same distribution.'
    next_step_rules:
    - id: densidad_probabilidad_velocidad_next_step_result
      when: 'true'
      status: info
      text:
        es: Tras obtener [[densidad_probabilidad_velocidad]], revisa unidades, dominio de velocidades y coherencia con la
          forma de la curva antes de cambiar de fórmula.
        en: After obtaining [[densidad_probabilidad_velocidad]], check units, speed domain, and consistency with the curve
          shape before changing formula.
    physical_intuition:
    - id: densidad_probabilidad_velocidad_physical_intuition_curve
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[densidad_probabilidad_velocidad]] ayuda a convertir agitación térmica microscópica en una lectura
          estadística de velocidades medibles.
        en: Intuitively, [[densidad_probabilidad_velocidad]] helps turn microscopic thermal agitation into a statistical reading
          of measurable speeds.
    limiting_cases:
    - id: densidad_probabilidad_velocidad_limiting_case_temperature
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura_absoluta]] tiende a valores bajos, la distribución se estrecha; cuando crece, se ensancha
          y desplaza hacia velocidades mayores.
        en: When [[temperatura_absoluta]] tends to low values, the distribution narrows; when it grows, it broadens and shifts
          toward higher speeds.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
