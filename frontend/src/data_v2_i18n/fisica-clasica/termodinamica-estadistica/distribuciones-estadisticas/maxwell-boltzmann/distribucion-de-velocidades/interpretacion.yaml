    - id: velocidad_media_next_step_result
      when: 'true'
      status: info
      text:
        es: Tras obtener [[velocidad_media]], revisa unidades, dominio de velocidades y coherencia con la forma de la curva
          antes de cambiar de fórmula.
        en: After obtaining [[velocidad_media]], check units, speed domain, and consistency with the curve shape before changing
          formula.
    physical_intuition:
    - id: velocidad_media_physical_intuition_curve
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_media]] ayuda a convertir agitación térmica microscópica en una lectura estadística
          de velocidades medibles.
        en: Intuitively, [[velocidad_media]] helps turn microscopic thermal agitation into a statistical reading of measurable
          speeds.
    limiting_cases:
    - id: velocidad_media_limiting_case_temperature
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura_absoluta]] tiende a valores bajos, la distribución se estrecha; cuando crece, se ensancha
          y desplaza hacia velocidades mayores.
        en: When [[temperatura_absoluta]] tends to low values, the distribution narrows; when it grows, it broadens and shifts
          toward higher speeds.
