version: 5.0.0
magnitudes:
- id: velocidad
  symbol: v
  nombre:
    es: velocidad molecular
    en: molecular speed
  descripcion:
    es: Rapidez de una partícula del gas ideal.
    en: Speed of one ideal-gas particle.
  unidad_si: m/s
  dimension: L T^-1
  is_vector: false
  components: []
  category: cinematica
  physical_role: variable independiente
  used_in:
  - maxwell_boltzmann_velocidad
  common_mistake: Confundir rapidez con componente vectorial de velocidad.
  typical_range: 0 a 3000 m/s según gas y temperatura
  sign_behavior:
    has_sign: false
    meaning:
      es: No negativa por definición en este modelo.
      en: Nonnegative by definition in this model.
  zero_behavior:
    allowed: false
    meaning:
      es: Cero solo es límite ideal o no permitido según la magnitud.
      en: Zero is only an ideal limit or not allowed according to the quantity.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - maxwell_boltzmann_velocidad
    secondary_for: []
  graph_binding:
    enabled: true
    channels:
    - xAxis
  pedagogical_notes:
    es: Usa [[velocidad]] dentro del modelo Maxwell-Boltzmann y revisa siempre su unidad SI.
    en: Use [[velocidad]] within the Maxwell-Boltzmann model and always check its SI unit.
