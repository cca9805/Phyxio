version: '1.0'
leaf: relacion-con-entropia-clasica
coord:
  id: relacion-con-entropia-clasica-Coord
  graphId: relacion-con-entropia-clasica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Conexión entre entropía clásica y microestados
    en: Connection between classical entropy and microstates
  xAxis:
    es: ln(Ω_f/Ω_i) o Q_rev/T
    en: ln(Ω_f/Ω_i) or Q_rev/T
  yAxis:
    es: Variación de entropía ΔS
    en: Entropy change ΔS
  xMagnitude: ratio_microestados
  yMagnitude: delta_entropia
  relation:
    es: 'La gráfica responde cómo se conecta la entropía estadística con la entropía clásica: ΔS crece linealmente con ln(Ω_f/Ω_i)
      y coincide con Q_rev/T en un camino reversible.'
    en: 'The graph answers how statistical entropy is connected with classical entropy: ΔS grows linearly with ln(Ω_f/Ω_i)
      and matches Q_rev/T along a reversible path.'
  physicalReading:
    es: Cada punto compara una lectura estadística de microestados con una lectura clásica de calor reversible. Si el cociente
      de microestados aumenta, también aumenta ΔS.
    en: Each point compares a statistical microstate reading with a classical reversible-heat reading. If the microstate ratio
      increases, ΔS also increases.
  slopeMeaning:
    es: La pendiente respecto a ln(Ω_f/Ω_i) es k_B; respecto a Q_rev es 1/T.
    en: The slope with respect to ln(Ω_f/Ω_i) is k_B; with respect to Q_rev it is 1/T.
  interceptMeaning:
    es: El origen representa igualdad de microestados o ausencia de cambio entrópico reversible.
    en: The origin represents equal microstates or no reversible entropy change.
  curvatureMeaning:
    es: La recta indica equivalencia lineal entre las dos lecturas cuando el modelo es válido.
    en: The straight line indicates linear equivalence between the two readings when the model is valid.
  signMeaning:
    es: ΔS positiva indica aumento de multiplicidad o entrada reversible de calor; negativa indica reducción de multiplicidad
      o salida reversible.
    en: Positive ΔS indicates increased multiplicity or reversible heat input; negative indicates reduced multiplicity or
      reversible heat output.
  areaMeaning:
    es: El área no es la lectura principal; la interpretación se centra en pendiente, signo y equivalencia.
    en: Area is not the main reading; interpretation focuses on slope, sign, and equivalence.
  domainMeaning:
    es: Solo tiene sentido con temperatura absoluta positiva, microestados positivos y comparación entre estados de equilibrio.
    en: It only makes sense with positive absolute temperature, positive microstates, and comparison between equilibrium states.
  modelConnection:
    es: El modelo une la definición clásica ΔS=Q_rev/T con la lectura estadística de Boltzmann.
    en: The model joins the classical definition ΔS=Q_rev/T with Boltzmann's statistical reading.
  formulaConnection:
    es: Conecta la tendencia del grafico con las formulas declaradas en formulas.yaml.
    en: Connects the graph trend with the formulas declared in formulas.yaml.
  readingFocus:
    es: Comprueba si la entropía clásica medida mediante calor reversible coincide con el cambio estadístico calculado desde
      microestados accesibles.
    en: Check whether classical entropy measured through reversible heat matches the statistical change computed from accessible
      microstates.
  agentHints:
    es:
    - Identifica si el eje horizontal representa cociente de microestados o calor reversible normalizado.
    - Relaciona el signo de ΔS con aumento o disminución de multiplicidad.
    - Verifica que T sea absoluta y que Q_rev sea reversible.
    en:
    - Identify whether the horizontal axis represents microstate ratio or normalized reversible heat.
    - Relate the sign of ΔS to increase or decrease in multiplicity.
    - Check that T is absolute and Q_rev is reversible.
  commonMistakes:
    es:
    - Usar calor irreversible como si fuera Q_rev.
    - Tomar Ω_f/Ω_i como una resta de microestados.
    - Olvidar que k_B aporta la unidad J/K.
    en:
    - Using irreversible heat as if it were Q_rev.
    - Treating Ω_f/Ω_i as a subtraction of microstates.
    - Forgetting that k_B supplies the J/K unit.
  curveProfile:
    type: linear
    expectedShape:
      es: Recta creciente que pasa por el origen en la comparación estadística.
      en: Increasing straight line passing through the origin in the statistical comparison.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Sin cambio de multiplicidad
        en: No multiplicity change
    - x: 1
      y: 1.380649e-23
      label:
        es: Aumento estadístico de una unidad logarítmica
        en: Statistical increase of one logarithmic unit
  dataRange:
    xMin: -3
    xMax: 3
    yMin: -4.2e-23
    yMax: 4.2e-23
    autoScale: true
    sampleCount: 80
  recommendedTab: graficas
