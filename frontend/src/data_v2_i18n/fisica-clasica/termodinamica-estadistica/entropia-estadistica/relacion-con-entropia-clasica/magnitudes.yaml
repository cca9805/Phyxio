version: 5.0.0
leaf: relacion-con-entropia-clasica
magnitudes:
- id: delta_entropia
  symbol: ΔS
  nombre:
    es: variación de entropía
    en: entropy change
  descripcion:
    es: Cambio de entropía entre dos estados de equilibrio comparables.
    en: Entropy change between two comparable equilibrium states.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: thermodynamic_state_change
  physical_role:
    es: resultado que conecta la lectura clásica y estadística
    en: result connecting classical and statistical readings
  used_in:
  - variacion_entropia_reversible
  - igualdad_delta_entropia
  common_mistake:
    es: Tomar cualquier calor irreversible como si fuera Q_rev.
    en: Treating any irreversible heat as if it were Q_rev.
  typical_range: 10^-23 J/K por partícula hasta 10^3 J/K en sistemas macroscópicos
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si aumenta la multiplicidad accesible o entra calor reversible.
      en: Positive if accessible multiplicity increases or reversible heat enters.
  zero_behavior:
    allowed: true
    meaning:
      es: Indica ausencia de cambio neto de multiplicidad o intercambio entrópico reversible.
      en: Indicates no net change in multiplicity or reversible entropy exchange.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)
  interpretation_role:
    primary_for:
    - summary
    - coherence
    - graph_reading
    secondary_for:
    - model_validity
  graph_binding:
    channels:
    - yAxis
    preferred_graph: Coord
  pedagogical_notes:
    es: 'Es la magnitud puente: puede venir de calor reversible o de un cociente de microestados.'
    en: 'It is the bridge quantity: it can come from reversible heat or from a microstate ratio.'
- id: entropia
  symbol: S
  nombre:
    es: entropía
    en: entropy
  descripcion:
    es: Magnitud de estado que mide dispersión energética macroscópica y multiplicidad microscópica.
    en: State quantity measuring macroscopic energy dispersal and microscopic multiplicity.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: state_function
  physical_role:
    es: magnitud de estado
    en: state quantity
  used_in:
  - entropia_boltzmann_clasica
  common_mistake:
    es: Interpretarla como desorden visual sin especificar macroestado ni restricciones.
    en: Interpreting it as visual disorder without specifying macrostate or constraints.
  typical_range: 10^-23 J/K por partícula; decenas a miles J/K en muestras comunes
  sign_behavior:
    has_sign: false
    meaning:
      es: La entropía absoluta depende de la referencia y de la accesibilidad microscópica.
      en: Absolute entropy depends on reference and microscopic accessibility.
  zero_behavior:
    allowed: true
    meaning:
      es: Puede aparecer como referencia ideal o límite de multiplicidad mínima.
      en: May appear as an ideal reference or minimal multiplicity limit.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: reference-dependent
  interpretation_role:
    primary_for:
    - physical_reading
    secondary_for:
    - summary
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
  pedagogical_notes:
    es: Une el lenguaje termodinámico clásico con el conteo estadístico.
    en: It links classical thermodynamic language with statistical counting.
- id: calor_reversible
  symbol: Q_{rev}
  nombre:
    es: calor reversible
    en: reversible heat
  descripcion:
    es: Energía transferida como calor en un camino reversible entre estados de equilibrio.
    en: Energy transferred as heat along a reversible path between equilibrium states.
  unidad_si: J
  dimension: M L^2 T^-2
  is_vector: false
  components: []
  category: energy_transfer
  physical_role:
    es: variable clásica de intercambio
    en: classical exchange variable
  used_in:
  - variacion_entropia_reversible
  common_mistake:
    es: Usar calor disipativo real sin construir un camino reversible equivalente.
    en: Using real dissipative heat without constructing an equivalent reversible path.
  typical_range: 10^-21 J microscópico hasta 10^6 J macroscópico
  sign_behavior:
    has_sign: true
    meaning:
      es: Positivo si entra calor al sistema según el convenio usual.
      en: Positive if heat enters the system under the usual convention.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay contribución entrópica por calor reversible en ese tramo.
      en: No entropy contribution from reversible heat in that segment.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-inf, inf)
  interpretation_role:
    primary_for:
    - coherence
    secondary_for:
    - physical_reading
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
  pedagogical_notes:
    es: Debe leerse como calor de un camino ideal reversible, no como cualquier calor medido.
    en: It must be read as heat along an ideal reversible path, not any measured heat.
- id: temperatura
  symbol: T
  nombre:
    es: temperatura absoluta
    en: absolute temperature
  descripcion:
    es: Escala térmica positiva que relaciona calor reversible y cambio de entropía.
    en: Positive thermal scale relating reversible heat and entropy change.
  unidad_si: K
  dimension: Θ
  is_vector: false
  components: []
  category: state_variable
  physical_role:
    es: parámetro intensivo
    en: intensive parameter
  used_in:
  - variacion_entropia_reversible
  common_mistake:
    es: Usar grados Celsius en cocientes termodinámicos.
    en: Using Celsius degrees in thermodynamic ratios.
  typical_range: 1 K a 10^4 K en modelos clásicos habituales
  sign_behavior:
    has_sign: false
    meaning:
      es: En esta descripción se usa temperatura absoluta positiva.
      en: This description uses positive absolute temperature.
  zero_behavior:
    allowed: false
    meaning:
      es: El cero absoluto no permite dividir calor reversible en este modelo clásico simple.
      en: Absolute zero does not allow dividing reversible heat in this simple classical model.
  value_nature:
    kind: positive_real
    nonnegative_only: true
    expected_interval: T>0
  interpretation_role:
    primary_for:
    - model_validity
    secondary_for:
    - coherence
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
  pedagogical_notes:
    es: Controla la pendiente clásica entre calor reversible y entropía.
    en: It controls the classical slope between reversible heat and entropy.
- id: numero_microestados
  symbol: \Omega
  nombre:
    es: número de microestados
    en: number of microstates
  descripcion:
    es: Cantidad de configuraciones microscópicas compatibles con un macroestado.
    en: Number of microscopic configurations compatible with a macrostate.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: statistical_multiplicity
  physical_role:
    es: variable estadística
    en: statistical variable
  used_in:
  - entropia_boltzmann_clasica
  common_mistake:
    es: Confundir microestados con partículas o con estados macroscópicos.
    en: Confusing microstates with particles or macroscopic states.
  typical_range: 1 a números exponencialmente grandes
  sign_behavior:
    has_sign: false
    meaning:
      es: Es un conteo positivo, sin signo físico.
      en: It is a positive count, with no physical sign.
  zero_behavior:
    allowed: false
    meaning:
      es: No puede haber logaritmo de cero microestados accesibles.
      en: The logarithm of zero accessible microstates is impossible.
  value_nature:
    kind: positive_count
    nonnegative_only: true
    expected_interval: Omega>0
  interpretation_role:
    primary_for:
    - physical_reading
    secondary_for:
    - graph_reading
  graph_binding:
    channels:
    - xAxis
    preferred_graph: Coord
  pedagogical_notes:
    es: Su logaritmo, no su valor bruto, se compara linealmente con la entropía.
    en: Its logarithm, not its raw value, is compared linearly with entropy.
- id: ratio_microestados
  symbol: Ω_f/Ω_i
  nombre:
    es: cociente de microestados
    en: microstate ratio
  descripcion:
    es: Comparación multiplicativa entre microestados finales e iniciales.
    en: Multiplicative comparison between final and initial microstates.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: statistical_ratio
  physical_role:
    es: variable comparativa
    en: comparative variable
  used_in:
  - igualdad_delta_entropia
  common_mistake:
    es: Restar microestados cuando el modelo pide un cociente logarítmico.
    en: Subtracting microstates when the model requires a logarithmic ratio.
  typical_range: mayor que 0; 1 indica igualdad de multiplicidad
  sign_behavior:
    has_sign: false
    meaning:
      es: Debe ser positivo; el signo de ΔS aparece al tomar el logaritmo.
      en: It must be positive; the sign of ΔS appears after taking the logarithm.
  zero_behavior:
    allowed: false
    meaning:
      es: Un cociente cero no tiene logaritmo definido.
      en: A zero ratio has no defined logarithm.
  value_nature:
    kind: positive_real
    nonnegative_only: true
    expected_interval: ratio>0
  interpretation_role:
    primary_for:
    - graph_reading
    - coherence
    secondary_for:
    - summary
  graph_binding:
    channels:
    - xAxis
    preferred_graph: Coord
  pedagogical_notes:
    es: Es la forma más directa de comparar aumento o disminución estadística entre estados.
    en: It is the most direct way to compare statistical increase or decrease between states.
- id: k_boltzmann
  symbol: k_B
  nombre:
    es: constante de Boltzmann
    en: Boltzmann constant
  descripcion:
    es: Constante que convierte información estadística adimensional en entropía termodinámica.
    en: Constant converting dimensionless statistical information into thermodynamic entropy.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: constant
  physical_role:
    es: constante de escala
    en: scale constant
  used_in:
  - entropia_boltzmann_clasica
  - igualdad_delta_entropia
  common_mistake:
    es: Olvidar que aporta la unidad J/K al resultado.
    en: Forgetting that it supplies the J/K unit to the result.
  typical_range: 1.380649e-23 J/K
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una constante positiva.
      en: It is a positive constant.
  zero_behavior:
    allowed: false
    meaning:
      es: Si fuera cero no conectaría microestados con entropía física.
      en: If it were zero, it would not connect microstates with physical entropy.
  value_nature:
    kind: positive_constant
    nonnegative_only: true
    expected_interval: 1.380649e-23 J/K
  interpretation_role:
    primary_for:
    - coherence
    secondary_for:
    - physical_reading
  graph_binding:
    channels:
    - constant
    preferred_graph: Coord
  pedagogical_notes:
    es: Hace visible que la conexión estadística tiene escala termodinámica real.
    en: It shows that the statistical connection has a real thermodynamic scale.
