targets:
  energia_libre_helmholtz:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: potencial termodinámico dominante
      en: dominant thermodynamic potential
    summary_rules:
    - id: energia_libre_helmholtz_summary_main
      when: 'true'
      status: ok
      text:
        es: '[[energia_libre_helmholtz]] representa potencial termodinámico dominante en la conexión entre la función de partición
          y las magnitudes termodinámicas.'
        en: '[[energia_libre_helmholtz]] represents the dominant thermodynamic potential in the connection between the partition
          function and thermodynamic quantities.'
    physical_reading_rules:
    - id: energia_libre_helmholtz_physical_reading_unit_sign
      when: 'true'
      status: info
      text:
        es: Lee [[energia_libre_helmholtz]] como F, con unidad J, dimensión M L2 T-2 y significado ligado al ensamble canónico.
        en: Read [[energia_libre_helmholtz]] as F, with unit J, dimension M L2 T-2, and meaning tied to the canonical ensemble.
    - id: energia_libre_helmholtz_physical_reading_sign
      when: 'true'
      status: info
      text:
        es: Un [[energia_libre_helmholtz]] más negativo suele indicar mayor peso estadístico accesible mediante ln(Z).
        en: A more negative [[energia_libre_helmholtz]] usually indicates greater accessible statistical weight through ln(Z).
    coherence_rules:
    - id: energia_libre_helmholtz_coherence_dimensions
      when: 'true'
      status: ok
      text:
        es: Comprueba que las fórmulas que producen [[energia_libre_helmholtz]] respetan su unidad J y no mezclan una cantidad
          microscópica con una macroscópica.
        en: Check that formulas producing [[energia_libre_helmholtz]] respect its unit J and do not mix a microscopic quantity
          with a macroscopic one.
    model_validity_rules:
    - id: energia_libre_helmholtz_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_libre_helmholtz]] solo si Z>0, T>0 K y el sistema puede describirse por equilibrio canónico.
        en: Interpret [[energia_libre_helmholtz]] only if Z>0, T>0 K, and the system can be described by canonical equilibrium.
    graph_rules:
    - id: energia_libre_helmholtz_graph_coord_connection
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[energia_libre_helmholtz]] con la curva F(T) y con las pendientes que generan
          entropía o presión cuando corresponda.
        en: In the Coord graph, relate [[energia_libre_helmholtz]] to the F(T) curve and to the slopes that generate entropy
          or pressure when applicable.
    - id: energia_libre_helmholtz_graph_slope_entropy
      when: 'true'
      status: info
      text:
        es: En F(T), la pendiente [[pendiente_energia_libre_temperatura]] tiene signo opuesto a [[entropia]].
        en: In F(T), the slope [[pendiente_energia_libre_temperatura]] has the opposite sign to [[entropia]].
    likely_errors:
    - id: energia_libre_helmholtz_likely_error_isolated_number
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[energia_libre_helmholtz]] con una lectura aislada es un error frecuente: No leas [[energia_libre_helmholtz]]
          como un número aislado: revisa unidad, signo, variable mantenida constante y fórmula usada.'
        en: 'A common mistake is to interpret [[energia_libre_helmholtz]] in isolation: Do not read [[energia_libre_helmholtz]]
          as an isolated number: check unit, sign, held-fixed variable, and formula used.'
    next_step_rules:
    - id: energia_libre_helmholtz_next_step_compare
      when: 'true'
      status: info
      text:
        es: Después de calcular [[energia_libre_helmholtz]], compara el resultado con k_B*T, con la escala del sistema o con
          la pendiente gráfica relevante.
        en: After calculating [[energia_libre_helmholtz]], compare the result with k_B*T, with system scale, or with the relevant
          graph slope.
    physical_intuition:
    - id: energia_libre_helmholtz_intuition_bridge
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia_libre_helmholtz]] muestra una pieza del puente entre microestados accesibles y comportamiento
          macroscópico.
        en: Intuitively, [[energia_libre_helmholtz]] shows one piece of the bridge between accessible microstates and macroscopic
          behavior.
    limiting_cases:
    - id: energia_libre_helmholtz_limiting_case_positive_temperature
      when: 'true'
      status: info
      text:
        es: En casos límite, revisa qué ocurre con [[energia_libre_helmholtz]] cuando T aumenta, Z cambia mucho o la pendiente
          de F se aproxima a cero.
        en: In limiting cases, check what happens to [[energia_libre_helmholtz]] when T increases, Z changes strongly, or
          the slope of F approaches zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
