version: 5.0.0
leaf: fluctuaciones
magnitudes:
- id: temperatura
  symbol: T
  nombre:
    es: temperatura absoluta
    en: absolute temperature
  descripcion:
    es: Variable térmica que controla la ocupación de microestados.
    en: Thermal variable controlling microstate occupation.
  unidad_si: K
  dimension: Θ
  is_vector: false
  components: []
  category: input
  physical_role:
    es: parámetro térmico
    en: thermal parameter
  used_in:
  - beta_inversa_termica
  - capacidad_calorifica_fluctuaciones
  common_mistake:
    es: Confundir [[temperatura]] con una magnitud sin contexto estadístico.
    en: Confusing [[temperatura]] with a quantity without statistical context.
  typical_range: 1 K a 10^4 K
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo indica tendencia de respuesta según la definición usada.
      en: The sign indicates response tendency according to the definition used.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero representa ausencia de contribución, respuesta o dispersión según la magnitud.
      en: Zero represents absence of contribution, response, or spread depending on the quantity.
  value_nature:
    kind: real_scalar
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - temperatura
    secondary_for:
    - coherencia
    - grafica
  graph_binding:
    channels:
    - xAxis
    - parameter
    recommended_axis: parameter
  pedagogical_notes:
    es: Usa [[temperatura]] para leer cómo la estadística microscópica se vuelve una respuesta observable.
    en: Use [[temperatura]] to read how microscopic statistics become an observable response.
