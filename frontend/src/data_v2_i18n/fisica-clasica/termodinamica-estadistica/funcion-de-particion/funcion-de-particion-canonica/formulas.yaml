- id: funcion_particion_canonica
  title:
    es: Función de partición canónica
    en: Canonical partition function
  equation: funcion_particion=sum(peso_boltzmann)
  latex: Z=\sum_i e^{-\beta E_i}
  rearrangements:
  - id: funcion_particion_canonica_base
    equation: funcion_particion=sum(peso_boltzmann)
    latex: Z=\sum_i e^{-\beta E_i}
    target: funcion_particion
  category: termodinamica-estadistica
  relation_type: definicion
  physical_meaning:
    es: Suma todos los pesos de Boltzmann y condensa la accesibilidad estadística del sistema.
    en: Sums all Boltzmann weights and condenses the system statistical accessibility.
