      en: The physical sign comes from the computed quantity; Z and probabilities are nonnegative.
    absolute_value_meaning:
      es: El valor absoluto indica tamaño relativo dentro del modelo canónico.
      en: The absolute value indicates relative size within the canonical model.
  domain_checks:
