- id: probabilidad_microestado_canonico
  title:
    es: Probabilidad canónica de microestado
    en: Canonical microstate probability
  equation: probabilidad_microestado=peso_boltzmann/funcion_particion
  latex: p_i=\frac{e^{-\beta E_i}}{Z}
  rearrangements:
  - id: probabilidad_microestado_canonico_base
    equation: probabilidad_microestado=peso_boltzmann/funcion_particion
    latex: p_i=\frac{e^{-\beta E_i}}{Z}
    target: probabilidad_microestado
  - id: peso_desde_probabilidad
    equation: peso_boltzmann=probabilidad_microestado*funcion_particion
    latex: w_i=p_i Z
    target: peso_boltzmann
  category: termodinamica-estadistica
  relation_type: derivada
  physical_meaning:
    es: Normaliza cada peso para convertirlo en probabilidad física de ocupación.
    en: Normalizes each weight into a physical occupation probability.
  constraints:
