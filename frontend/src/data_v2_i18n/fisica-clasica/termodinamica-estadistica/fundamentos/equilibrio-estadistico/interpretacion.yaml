        when: "true"
        status: ok
        text:
          es:
            "[[flujo_probabilidad]] se interpreta como el intercambio neto de probabilidad entre estados dentro del equilibrio
            estadístico: no describe una trayectoria individual, sino el reparto colectivo entre estados."
          en:
            "[[flujo_probabilidad]] is read as the net exchange of probability between states within statistical equilibrium:
            it does not describe one individual path, but the collective distribution among states."
    physical_reading_rules:
