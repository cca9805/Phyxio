          en:
            In the limit of zero net flow and constant probabilities, [[flujo_probabilidad]] is compatible with equilibrium;
            persistent drift indicates a transient or nonequilibrium steady state.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo positivo de [[flujo_probabilidad]] debe indicar un sentido de transición declarado, no una ganancia absoluta.
        en: A positive sign of [[flujo_probabilidad]] must indicate a declared transition direction, not an absolute gain.
      common_sign_errors:
        - es: Cambiar el sentido i→j sin cambiar el signo del flujo.
          en: Changing the i→j direction without changing the flow sign.
        - es: Interpretar flujo neto nulo como ausencia de saltos microscópicos.
          en: Reading zero net flow as absence of microscopic jumps.
  entropia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: dispersión estadística
      en: statistical spread
    summary_rules:
