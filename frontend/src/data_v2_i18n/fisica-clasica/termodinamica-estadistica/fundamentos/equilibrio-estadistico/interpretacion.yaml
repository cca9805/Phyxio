targets:
  probabilidad_estado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: ocupación estadística
      en: statistical occupation
    summary_rules:
      - id: probabilidad_estado_summary_equilibrio
        when: "true"
        status: ok
        text:
          es:
            "[[probabilidad_estado]] se interpreta como la ocupación estadística de un estado accesible dentro del equilibrio
            estadístico: no describe una trayectoria individual, sino el reparto colectivo entre estados."
          en:
            "[[probabilidad_estado]] is read as the statistical occupation of an accessible state within statistical equilibrium:
            it does not describe one individual path, but the collective distribution among states."
    physical_reading_rules:
      - id: probabilidad_estado_physical_reading_equilibrio
        when: "true"
        status: info
        text:
          es:
            Lee [[probabilidad_estado]] junto con el conjunto de estados, las tasas de transición y la condición de flujo
            neto; su significado cambia si el sistema aún relaja.
          en:
            Read [[probabilidad_estado]] together with the state set, transition rates, and the net-flow condition; its meaning
            changes if the system is still relaxing.
    coherence_rules:
      - id: probabilidad_estado_coherence_equilibrio
        when: "true"
        status: ok
        text:
          es:
            "Comprueba que [[probabilidad_estado]] respeta normalización, unidades y balance estadístico: una ocupación válida
            no puede contradecir la suma de probabilidades ni el sentido del flujo."
          en:
            "Check that [[probabilidad_estado]] respects normalization, units, and statistical balance: a valid occupation
            cannot contradict probability normalization or the flow direction."
    model_validity_rules:
      - id: probabilidad_estado_model_validity_equilibrio
        when: "true"
        status: info
        text:
          es:
            Usa [[probabilidad_estado]] solo si las tasas son aproximadamente estacionarias, los estados accesibles están
            definidos y el contacto térmico no cambia durante la observación.
          en:
            Use [[probabilidad_estado]] only if rates are approximately stationary, accessible states are defined, and the
            thermal contact does not change during observation.
    graph_rules:
      - id: probabilidad_estado_graph_equilibrio
        when: "true"
        status: info
        text:
          es:
            "En el DCL estadístico, relaciona [[probabilidad_estado]] con flechas de probabilidad: equilibrio significa compensación
            de flujos, no ausencia de transiciones microscópicas."
          en:
            "In the statistical free-body-style diagram, relate [[probabilidad_estado]] to probability arrows: equilibrium
            means compensated flows, not absence of microscopic transitions."
    likely_errors:
      - id: probabilidad_estado_likely_error_equilibrio
        when: "true"
        status: warning
        text:
          es:
            "Confundir [[probabilidad_estado]] con una lectura aislada es un error frecuente: No confundas [[probabilidad_estado]]
            con una fuerza, una posición mecánica o una certeza individual; es una magnitud estadística dependiente del modelo
            de estados."
          en:
            Do not confuse [[probabilidad_estado]] with a force, a mechanical position, or an individual certainty; it is
            a statistical quantity tied to the state model.
    next_step_rules:
      - id: probabilidad_estado_next_step_equilibrio
        when: "true"
        status: info
        text:
          es:
            Después de interpretar [[probabilidad_estado]], revisa si el flujo neto se anula, si las probabilidades suman
            uno y si el diagrama muestra balance detallado o solo estacionariedad global.
          en:
            After interpreting [[probabilidad_estado]], check whether net flow vanishes, probabilities sum to one, and the
            diagram shows detailed balance or only global stationarity.
    physical_intuition:
      - id: probabilidad_estado_intuition_equilibrio
        when: "true"
        status: info
        text:
          es:
            Intuitivamente, [[probabilidad_estado]] indica cómo se reparte la presencia del sistema entre estados cuando las
            entradas y salidas estadísticas se compensan.
          en:
            Intuitively, [[probabilidad_estado]] indicates how the system presence is distributed among states when statistical
            inflows and outflows compensate.
    limiting_cases:
      - id: probabilidad_estado_limiting_equilibrio
        when: "true"
        status: info
        text:
          es:
            En el límite de flujo nulo y probabilidades constantes, [[probabilidad_estado]] es compatible con equilibrio;
            si aparece deriva persistente, describe un estado transitorio o estacionario no equilibrado.
          en:
            In the limit of zero net flow and constant probabilities, [[probabilidad_estado]] is compatible with equilibrium;
            persistent drift indicates a transient or nonequilibrium steady state.
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo positivo de [[flujo_probabilidad]] debe indicar un sentido de transición declarado, no una ganancia absoluta.
        en: A positive sign of [[flujo_probabilidad]] must indicate a declared transition direction, not an absolute gain.
      common_sign_errors: []
  flujo_probabilidad:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: diagnóstico de equilibrio
      en: equilibrium diagnostic
