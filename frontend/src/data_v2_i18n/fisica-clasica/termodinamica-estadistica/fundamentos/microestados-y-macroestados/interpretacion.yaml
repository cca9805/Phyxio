targets:
  multiplicidad_macroestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado derivado
      en: derived result
    summary_rules:
    - id: multiplicidad_macroestado_summary_count
      when: 'true'
      status: ok
      text:
        es: '[[multiplicidad_macroestado]] indica cuántos microestados producen el mismo [[macroestado]] observable y resume el peso estadístico de esa descripción macroscópica.'
        en: '[[multiplicidad_macroestado]] indicates how many microstates produce the same observable [[macroestado]] and summarizes the statistical weight of that macroscopic description.'
    physical_reading_rules:
    - id: multiplicidad_macroestado_reading_more_paths
      when: 'true'
      status: info
      text:
        es: Un valor mayor de [[multiplicidad_macroestado]] indica más formas microscópicas de realizar el mismo resultado
          macroscópico.
        en: A larger [[multiplicidad_macroestado]] indicates more microscopic ways to realize the same macroscopic outcome.
    coherence_rules:
    - id: multiplicidad_macroestado_coherence_integer
      when: 'true'
      status: ok
      text:
        es: '[[multiplicidad_macroestado]] debe ser no negativa y coherente con el conteo de [[numero_microestados]] accesibles.'
        en: '[[multiplicidad_macroestado]] must be nonnegative and consistent with the count of accessible [[numero_microestados]].'
    model_validity_rules:
    - id: multiplicidad_macroestado_validity_same_constraints
      when: 'true'
      status: info
      text:
        es: Compara [[multiplicidad_macroestado]] solo entre macroestados definidos con las mismas restricciones de [[energia_total]],
          [[volumen]] y [[numero_particulas]].
        en: Compare [[multiplicidad_macroestado]] only between macrostates defined under the same [[energia_total]], [[volumen]],
          and [[numero_particulas]] constraints.
    graph_rules:
    - id: multiplicidad_macroestado_graph_peak
      when: 'true'
      status: info
      text:
        es: En la gráfica, el máximo de [[multiplicidad_macroestado]] señala el [[macroestado]] con más realizaciones microscópicas.
        en: On the graph, the maximum of [[multiplicidad_macroestado]] indicates the [[macroestado]] with the most microscopic
          realizations.
    likely_errors:
    - id: multiplicidad_macroestado_error_probability
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[multiplicidad_macroestado]] con una lectura aislada es un error frecuente: No leas [[multiplicidad_macroestado]]
          como [[probabilidad_macroestado]] directa; primero debe compararse con la multiplicidad total disponible.'
        en: 'A common mistake is to interpret [[multiplicidad_macroestado]] in isolation: Do not read [[multiplicidad_macroestado]]
          as direct [[probabilidad_macroestado]]; it must first be compared with the total available multiplicity.'
    next_step_rules:
    - id: multiplicidad_macroestado_next_entropy
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[multiplicidad_macroestado]], relaciona su tamaño con [[probabilidad_macroestado]] y con
          [[entropia]].
        en: After interpreting [[multiplicidad_macroestado]], relate its size to [[probabilidad_macroestado]] and [[entropia]].
    physical_intuition:
    - id: multiplicidad_macroestado_intuition_paths
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[multiplicidad_macroestado]] mide cuántos caminos microscópicos llevan al mismo aspecto macroscópico.
        en: Intuitively, [[multiplicidad_macroestado]] measures how many microscopic paths lead to the same macroscopic appearance.
    limiting_cases:
    - id: multiplicidad_macroestado_limit_one
      when: 'true'
      status: info
      text:
        es: Si [[multiplicidad_macroestado]] vale uno, el macroestado tiene una sola realización microscópica; si crece mucho,
          domina la estadística.
        en: If [[multiplicidad_macroestado]] is one, the macrostate has a single microscopic realization; if it grows greatly,
          it dominates the statistics.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  numero_microestados:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: concepto estadístico
      en: statistical concept
    summary_rules:
    - id: numero_microestados_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[numero_microestados]] representa el conteo microscópico de configuraciones compatibles con las restricciones
          del sistema.'
        en: '[[numero_microestados]] represents the microscopic count of configurations compatible with the system constraints.'
    physical_reading_rules:
    - id: numero_microestados_reading_accessibility
      when: 'true'
      status: info
      text:
        es: Lee [[numero_microestados]] como accesibilidad microscópica, no como tamaño visible del sistema.
        en: Read [[numero_microestados]] as microscopic accessibility, not as the visible size of the system.
    coherence_rules:
    - id: numero_microestados_coherence_count
      when: 'true'
      status: ok
      text:
        es: '[[numero_microestados]] debe ser compatible con el conjunto de [[microestado]] permitidos por [[energia_total]],
          [[volumen]] y [[numero_particulas]].'
        en: '[[numero_microestados]] must be compatible with the set of [[microestado]] allowed by [[energia_total]], [[volumen]],
          and [[numero_particulas]].'
    model_validity_rules:
    - id: numero_microestados_validity_resolution
      when: 'true'
      status: info
      text:
        es: El conteo de [[numero_microestados]] depende de la resolución con que se distinguen microestados; cambiar esa
          resolución cambia el modelo.
        en: The count of [[numero_microestados]] depends on the resolution used to distinguish microstates; changing that
          resolution changes the model.
    graph_rules:
    - id: numero_microestados_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la gráfica, [[numero_microestados]] ayuda a entender cómo se reparte el conteo entre distintos macroestados.
        en: On the graph, [[numero_microestados]] helps explain how the count is distributed among different macrostates.
    likely_errors:
    - id: numero_microestados_error_particles
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[numero_microestados]] con una lectura aislada es un error frecuente: No confundas [[numero_microestados]]
          con [[numero_particulas]]; muchas partículas pueden producir una cantidad enorme de configuraciones.'
        en: Do not confuse [[numero_microestados]] with [[numero_particulas]]; many particles can produce an enormous number
          of configurations.
    next_step_rules:
    - id: numero_microestados_next_macrostate
      when: 'true'
      status: info
      text:
        es: Después de contar [[numero_microestados]], agrúpalos por [[macroestado]] para obtener [[multiplicidad_macroestado]].
        en: After counting [[numero_microestados]], group them by [[macroestado]] to obtain [[multiplicidad_macroestado]].
    physical_intuition:
    - id: numero_microestados_intuition_hidden_detail
      when: 'true'
      status: info
      text:
        es: '[[numero_microestados]] cuantifica el detalle microscópico oculto detrás de una misma descripción macroscópica.'
        en: '[[numero_microestados]] quantifies the hidden microscopic detail behind one macroscopic description.'
    limiting_cases:
    - id: numero_microestados_limit_zero
      when: 'true'
      status: info
      text:
        es: Si [[numero_microestados]] es cero para una restricción dada, ese estado macroscópico no es accesible dentro del
          modelo.
        en: If [[numero_microestados]] is zero for a given constraint, that macroscopic state is not accessible within the
          model.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  probabilidad_macroestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado derivado
      en: derived result
    summary_rules:
    - id: probabilidad_macroestado_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_macroestado]] expresa qué fracción estadística corresponde a un [[macroestado]] tras contar sus
          microestados compatibles.'
        en: '[[probabilidad_macroestado]] expresses what statistical fraction belongs to a [[macroestado]] after counting
          its compatible microstates.'
    physical_reading_rules:
    - id: probabilidad_macroestado_reading_normalized
      when: 'true'
      status: info
      text:
        es: Lee [[probabilidad_macroestado]] como una comparación normalizada entre multiplicidades, no como una propiedad
          aislada del macroestado.
        en: Read [[probabilidad_macroestado]] as a normalized comparison between multiplicities, not as an isolated property
          of the macrostate.
    coherence_rules:
    - id: probabilidad_macroestado_coherence_bounds
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_macroestado]] debe estar entre cero y uno, y las probabilidades de macroestados mutuamente excluyentes
          deben sumar uno.'
        en: '[[probabilidad_macroestado]] must lie between zero and one, and probabilities of mutually exclusive macrostates
          must sum to one.'
    model_validity_rules:
    - id: probabilidad_macroestado_validity_grouping
      when: 'true'
      status: info
      text:
        es: La validez de [[probabilidad_macroestado]] depende de agrupar microestados sin solapamientos ni omisiones relevantes.
        en: The validity of [[probabilidad_macroestado]] depends on grouping microstates without overlap or relevant omissions.
    graph_rules:
    - id: probabilidad_macroestado_graph_relative_height
      when: 'true'
      status: info
      text:
        es: La gráfica permite inferir qué [[macroestado]] es más probable al comparar su [[multiplicidad_macroestado]] con
          el total representado.
        en: The graph allows inferring which [[macroestado]] is more probable by comparing its [[multiplicidad_macroestado]]
          with the represented total.
    likely_errors:
    - id: probabilidad_macroestado_error_equal_macro
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[probabilidad_macroestado]] con una lectura aislada es un error frecuente: No supongas que cada macroestado
          tienen igual [[probabilidad_macroestado]]; eso solo ocurriría si sus multiplicidades fueran iguales.'
        en: Do not assume that all macrostates have equal [[probabilidad_macroestado]]; that would occur only if their multiplicities
          were equal.
    next_step_rules:
    - id: probabilidad_macroestado_next_ratio
      when: 'true'
      status: info
      text:
        es: Después de obtener [[probabilidad_macroestado]], compara razones entre macroestados para interpretar dominancia
          estadística.
        en: After obtaining [[probabilidad_macroestado]], compare ratios between macrostates to interpret statistical dominance.
    physical_intuition:
    - id: probabilidad_macroestado_intuition_lottery
      when: 'true'
      status: info
      text:
        es: '[[probabilidad_macroestado]] aumenta cuando un macroestado dispone de más boletos microscópicos compatibles.'
        en: '[[probabilidad_macroestado]] increases when a macrostate has more compatible microscopic tickets.'
    limiting_cases:
    - id: probabilidad_macroestado_limit_one
      when: 'true'
      status: info
      text:
        es: Si un macroestado concentra toda la multiplicidad accesible, [[probabilidad_macroestado]] tiende a uno; si no
          tiene microestados, vale cero.
        en: If one macrostate concentrates all accessible multiplicity, [[probabilidad_macroestado]] tends to one; if it has
          no microstates, it is zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  entropia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado derivado
      en: derived result
    summary_rules:
    - id: entropia_summary_multiplicity
      when: 'true'
      status: ok
      text:
        es: '[[entropia]] traduce la multiplicidad microscópica de un [[macroestado]] a una magnitud termodinámica.'
        en: '[[entropia]] translates the microscopic multiplicity of a [[macroestado]] into a thermodynamic quantity.'
    physical_reading_rules:
    - id: entropia_reading_spread
      when: 'true'
      status: info
      text:
        es: Una [[entropia]] mayor indica más dispersión microscópica compatible con la misma descripción macroscópica.
        en: A larger [[entropia]] indicates greater microscopic spread compatible with the same macroscopic description.
    coherence_rules:
    - id: entropia_coherence_kb
      when: 'true'
      status: ok
      text:
        es: '[[entropia]] debe crecer con [[multiplicidad_macroestado]] y debe usar [[constante_boltzmann]] para tener escala
          física.'
        en: '[[entropia]] must increase with [[multiplicidad_macroestado]] and must use [[constante_boltzmann]] to have a
          physical scale.'
    model_validity_rules:
    - id: entropia_validity_counting
      when: 'true'
      status: info
      text:
        es: Interpreta [[entropia]] solo si el conteo de microestados corresponde al mismo modelo y a las mismas restricciones
          macroscópicas.
        en: Interpret [[entropia]] only if the microstate count belongs to the same model and the same macroscopic constraints.
    graph_rules:
    - id: entropia_graph_log_relation
      when: 'true'
      status: info
      text:
        es: La gráfica de multiplicidad ayuda a prever [[entropia]], pero recuerda que la conversión entrópica es logarítmica.
        en: The multiplicity graph helps anticipate [[entropia]], but remember that the entropy conversion is logarithmic.
    likely_errors:
    - id: entropia_error_linear
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[entropia]] con una lectura aislada es un error frecuente: No interpretes [[entropia]] como proporcional
          lineal a [[multiplicidad_macroestado]]; dos veces más multiplicidad no implica dos veces más entropía.'
        en: 'A common mistake is to interpret [[entropia]] in isolation: Do not interpret [[entropia]] as linearly proportional
          to [[multiplicidad_macroestado]]; twice the multiplicity does not imply twice the entropy.'
    next_step_rules:
    - id: entropia_next_compare
      when: 'true'
      status: info
      text:
        es: Después de calcular [[entropia]], compara su cambio entre macroestados para leer qué organización es estadísticamente
          dominante.
        en: After calculating [[entropia]], compare its change between macrostates to read which organization is statistically
          dominant.
    physical_intuition:
    - id: entropia_intuition_hidden_options
      when: 'true'
      status: info
      text:
        es: '[[entropia]] mide cuántas opciones microscópicas quedan escondidas detrás de una descripción macroscópica.'
        en: '[[entropia]] measures how many microscopic options remain hidden behind a macroscopic description.'
    limiting_cases:
    - id: entropia_limit_single_microstate
      when: 'true'
      status: info
      text:
        es: Si solo hay un microestado compatible, la contribución de multiplicidad a [[entropia]] es mínima; si hay muchísimos,
          aumenta.
        en: If only one microstate is compatible, the multiplicity contribution to [[entropia]] is minimal; if there are many,
          it increases.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
