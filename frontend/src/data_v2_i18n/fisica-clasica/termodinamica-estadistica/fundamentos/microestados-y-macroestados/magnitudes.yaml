version: 5.0.0
leaf: microestados-y-macroestados
magnitudes:
- id: numero_microestados
  symbol: Ω
  nombre:
    es: número de microestados
    en: number of microstates
  descripcion:
    es: Conteo de configuraciones microscópicas compatibles con una descripción física.
    en: Count of microscopic configurations compatible with a physical description.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: input
  physical_role:
    es: concepto estadístico
    en: statistical concept
  used_in:
  - probabilidad_macroestado_multiplicidad
  common_mistake:
    es: Confundir esta magnitud con una propiedad directa de un único objeto microscópico.
    en: Confusing this quantity with a direct property of a single microscopic object.
  typical_range: 0 a valores enormes, usualmente Ω ≫ 1
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo físico; debe leerse como conteo, probabilidad o parámetro no negativo.
      en: It has no physical sign; read it as a nonnegative count, probability, or parameter.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica ausencia, imposibilidad o límite degenerado según la magnitud.
      en: Zero indicates absence, impossibility, or a degenerate limit depending on the quantity.
  value_nature:
    kind: integer_or_count
    nonnegative_only: true
    expected_interval: '[0,∞)'
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - model_validity
    - graph_reading
  graph_binding:
    channels:
    - parameter
  pedagogical_notes:
    es: Úsala para separar descripción microscópica y lectura macroscópica sin mezclar niveles.
    en: Use it to separate microscopic description and macroscopic reading without mixing levels.
