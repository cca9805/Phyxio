      en: The sign only matters for deviations or averages of signed quantities; probabilities are non-negative.
    absolute_value_meaning:
      es: El valor absoluto mide tamaño estadístico, peso o promedio dentro del ensemble.
      en: The absolute value measures statistical size, weight, or average within the ensemble.
  domain_checks:
