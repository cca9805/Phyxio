- id: peso_ensemble_normalizado
  title:
    es: Peso estadístico normalizado
    en: Normalized statistical weight
  equation: p_i=w_i/sum(w_i)
  latex: p_i=\frac{w_i}{\sum_j w_j}
  rearrangements:
  - id: peso_desde_probabilidad
    equation: w_i=p_i*sum(w_i)
    latex: w_i=p_i\sum_j w_j
    target: peso_estadistico
  category: statistical
  relation_type: definition
  physical_meaning:
    es: Convierte pesos relativos en probabilidades físicas comparables dentro del ensemble.
    en: Turns relative weights into physical probabilities comparable within the ensemble.
  constraints:
    es: Los pesos deben ser no negativos y pertenecer a la misma regla estadística.
    en: Weights must be non-negative and belong to the same statistical rule.
  validity:
    es: Válida para descripciones donde solo importan pesos relativos antes de normalizar.
    en: Valid for descriptions where only relative weights matter before normalization.
  dimension_check:
    status: ok
    expression: coherent with dimensionless probabilities and ensemble averages
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - teoria.md
