  domain_checks:
  - id: varianza_ensemble_domain_probabilities
    status: ok
    text:
      es: Las probabilidades deben estar entre 0 y 1 y normalizadas.
      en: Probabilities must lie between 0 and 1 and be normalized.
  coherence_checks:
