- id: varianza_ensemble
  title:
    es: Varianza dentro del ensemble
    en: Ensemble variance
  equation: sigma_A2=sum(p_i*(A_i-A_prom)^2)
  latex: \sigma_A^2=\sum_i p_i(A_i-\overline{A})^2
  rearrangements:
  - id: fluctuacion_rms
    equation: sigma_A=sqrt(sigma_A2)
    latex: \sigma_A=\sqrt{\sigma_A^2}
    target: fluctuacion_ensemble
  category: statistical
  relation_type: definition
  physical_meaning:
    es: Mide cuánto se dispersan los valores microscópicos alrededor del promedio del ensemble.
    en: Measures how microscopic values spread around the ensemble average.
  constraints:
    es: Usa el mismo observable en todos los estados y una distribución normalizada.
    en: Use the same observable in all states and a normalized distribution.
  validity:
    es: Válida si las fluctuaciones pertenecen al ensemble descrito y no a cambios externos de preparación.
    en: Valid if fluctuations belong to the described ensemble and not to external preparation changes.
  dimension_check:
    status: ok
    expression: coherent with dimensionless probabilities and ensemble averages
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
