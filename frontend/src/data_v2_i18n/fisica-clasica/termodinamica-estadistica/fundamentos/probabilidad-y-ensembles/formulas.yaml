version: 5.0.0
leaf: probabilidad-y-ensembles
ui:
  default_formula: normalizacion_ensemble
formulas:
- id: normalizacion_ensemble
  title:
    es: Normalización del ensemble
    en: Ensemble normalization
  equation: sum(p_i)=1
  latex: \sum_i p_i = 1
  rearrangements: []
  category: statistical
  relation_type: definition
  physical_meaning:
    es: Garantiza que el ensemble reparte toda la población estadística entre estados compatibles.
    en: Ensures that the ensemble distributes the whole statistical population among compatible states.
  constraints:
    es: Cada estado contado pertenece al mismo ensemble y los sucesos son excluyentes.
    en: Each counted state belongs to the same ensemble and the events are exclusive.
  validity:
    es: Válida para ensembles discretos con estados bien definidos y probabilidades normalizables.
    en: Valid for discrete ensembles with well-defined states and normalizable probabilities.
  dimension_check:
    status: ok
    expression: coherent with dimensionless probabilities and ensemble averages
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  interpretation_tags:
  - ensemble
  - probability
  - statistical-average
  result_semantics:
    target: probabilidad_estado
    kind: scalar
    sign_meaning:
      es: El signo solo tiene sentido para desviaciones o promedios de magnitudes con signo; las probabilidades no son negativas.
      en: The sign only matters for deviations or averages of signed quantities; probabilities are non-negative.
    absolute_value_meaning:
      es: El valor absoluto mide tamaño estadístico, peso o promedio dentro del ensemble.
      en: The absolute value measures statistical size, weight, or average within the ensemble.
  domain_checks:
  - id: normalizacion_ensemble_domain_probabilities
    status: ok
    text:
      es: Las probabilidades deben estar entre 0 y 1 y normalizadas.
      en: Probabilities must lie between 0 and 1 and be normalized.
  coherence_checks:
  - id: normalizacion_ensemble_coherence_ids
    status: ok
    text:
      es: Las magnitudes usadas deben pertenecer al mismo ensemble.
      en: The quantities used must belong to the same ensemble.
  graph_implications:
    es: La gráfica muestra cómo una probabilidad o promedio cambia al recorrer estados del ensemble.
    en: The graph shows how a probability or average changes across ensemble states.
  pedagogical_triggers:
  - id: normalizacion_ensemble_trigger_normalization
    text:
      es: Pregunta si el alumno ha comprobado la suma total de probabilidades.
      en: Ask whether the student has checked the total probability sum.
- id: promedio_ensemble
  title:
    es: Promedio de una magnitud en el ensemble
    en: Ensemble average of a quantity
  equation: A_prom=sum(p_i*A_i)
  latex: \overline{A}=\sum_i p_i A_i
  rearrangements: []
  category: statistical
  relation_type: definition
  physical_meaning:
    es: Convierte muchos valores microscópicos posibles en una predicción macroscópica media.
    en: Turns many possible microscopic values into one macroscopic average prediction.
  constraints:
    es: Las probabilidades deben estar normalizadas y A_i debe referirse a la misma magnitud en cada estado.
    en: Probabilities must be normalized and A_i must refer to the same quantity in each state.
  validity:
    es: Válida cuando el ensemble representa adecuadamente la preparación física del sistema.
    en: Valid when the ensemble adequately represents the physical preparation of the system.
  dimension_check:
    status: ok
    expression: coherent with dimensionless probabilities and ensemble averages
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - teoria.md
  - ejemplos.md
  - interpretacion.yaml
  interpretation_tags:
  - ensemble
  - probability
  - statistical-average
  result_semantics:
    target: valor_medio_ensemble
    kind: scalar
    sign_meaning:
      es: El signo solo tiene sentido para desviaciones o promedios de magnitudes con signo; las probabilidades no son negativas.
      en: The sign only matters for deviations or averages of signed quantities; probabilities are non-negative.
    absolute_value_meaning:
      es: El valor absoluto mide tamaño estadístico, peso o promedio dentro del ensemble.
      en: The absolute value measures statistical size, weight, or average within the ensemble.
  domain_checks:
  - id: promedio_ensemble_domain_probabilities
    status: ok
    text:
      es: Las probabilidades deben estar entre 0 y 1 y normalizadas.
      en: Probabilities must lie between 0 and 1 and be normalized.
  coherence_checks:
  - id: promedio_ensemble_coherence_ids
    status: ok
    text:
      es: Las magnitudes usadas deben pertenecer al mismo ensemble.
      en: The quantities used must belong to the same ensemble.
  graph_implications:
    es: La gráfica muestra cómo una probabilidad o promedio cambia al recorrer estados del ensemble.
    en: The graph shows how a probability or average changes across ensemble states.
  pedagogical_triggers:
  - id: promedio_ensemble_trigger_normalization
    text:
      es: Pregunta si el alumno ha comprobado la suma total de probabilidades.
      en: Ask whether the student has checked the total probability sum.
- id: probabilidad_frecuencia_ensemble
  title:
    es: Probabilidad como frecuencia de ensemble
    en: Probability as ensemble frequency
  equation: p_i=n_i/N_ens
  latex: p_i=\frac{n_i}{N}
  rearrangements:
  - id: conteo_estado
    equation: n_i=p_i*N_ens
    latex: n_i=p_i N
    target: conteo_sistemas
  category: statistical
  relation_type: definition
  physical_meaning:
    es: Interpreta la probabilidad como fracción de copias del ensemble que ocupan un estado.
    en: Interprets probability as the fraction of ensemble copies occupying one state.
  constraints:
    es: El número de copias debe ser grande y todas deben prepararse bajo las mismas restricciones macroscópicas.
    en: The number of copies must be large and all must be prepared under the same macroscopic constraints.
  validity:
    es: Es una interpretación estadística útil para ensembles idealizados o experimentos repetidos.
    en: It is a statistical interpretation useful for idealized ensembles or repeated experiments.
  dimension_check:
    status: ok
    expression: coherent with dimensionless probabilities and ensemble averages
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
