version: 5.0.0
leaf: probabilidad-y-ensembles
magnitudes:
- id: probabilidad_estado
  symbol: p_i
  nombre:
    es: probabilidad de estado
    en: state probability
  descripcion:
    es: Fracción del ensemble asociada a un estado microscópico compatible.
    en: Fraction of the ensemble associated with one compatible microscopic state.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: probability
  physical_role:
    es: magnitud dominante
    en: dominant quantity
  used_in:
  - normalizacion_ensemble
  - probabilidad_frecuencia_ensemble
  - promedio_ensemble
  - varianza_ensemble
  - peso_ensemble_normalizado
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: No puede ser negativa; valores mayores indican mayor peso estadístico.
      en: It cannot be negative; larger values indicate greater statistical weight.
  zero_behavior:
    allowed: true
    meaning:
      es: El estado no aparece en el ensemble preparado.
      en: The state does not appear in the prepared ensemble.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels:
    - yAxis
    preferred_axis: yAxis
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
- id: numero_copias_ensemble
  symbol: N_ens
  nombre:
    es: número de copias del ensemble
    en: number of ensemble copies
  descripcion:
    es: Cantidad ideal de sistemas igualmente preparados usados para interpretar frecuencias.
    en: Ideal number of equally prepared systems used to interpret frequencies.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: count
  physical_role:
    es: soporte estadístico
    en: statistical support
  used_in:
  - probabilidad_frecuencia_ensemble
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo físico.
      en: It has no physical sign.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay ensemble estadístico sobre el que promediar.
      en: There is no statistical ensemble to average over.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels: &id001
    - none
    preferred_axis: none
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
- id: conteo_sistemas
  symbol: n_i
  nombre:
    es: conteo de sistemas en un estado
    en: count of systems in one state
  descripcion:
    es: Número de copias del ensemble encontradas en un estado concreto.
    en: Number of ensemble copies found in one concrete state.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: count
  physical_role:
    es: frecuencia absoluta
    en: absolute frequency
  used_in:
  - probabilidad_frecuencia_ensemble
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo físico.
      en: It has no physical sign.
  zero_behavior:
    allowed: true
    meaning:
      es: Ninguna copia ocupa ese estado.
      en: No copy occupies that state.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels: *id001
    preferred_axis: none
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
- id: valor_estado
  symbol: A_i
  nombre:
    es: valor de estado
    en: state value
  descripcion:
    es: Valor microscópico de una magnitud observable en el estado i.
    en: Microscopic value of an observable quantity in state i.
  unidad_si: depende de A
  dimension: '[A]'
  is_vector: false
  components: []
  category: observable
  physical_role:
    es: dato microscópico
    en: microscopic datum
  used_in:
  - promedio_ensemble
  - varianza_ensemble
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: true
    meaning:
      es: Puede ser positivo o negativo si el observable lo permite.
      en: It may be positive or negative if the observable allows it.
  zero_behavior:
    allowed: true
    meaning:
      es: El estado aporta valor nulo al observable.
      en: The state contributes zero value to the observable.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: real
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels:
    - xAxis
    preferred_axis: xAxis
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
- id: valor_medio_ensemble
  symbol: A_prom
  nombre:
    es: valor medio de ensemble
    en: ensemble mean value
  descripcion:
    es: Promedio ponderado por probabilidades de una magnitud observable.
    en: Probability-weighted average of an observable quantity.
  unidad_si: depende de A
  dimension: '[A]'
  is_vector: false
  components: []
  category: observable
  physical_role:
    es: resultado macroscópico
    en: macroscopic result
  used_in:
  - promedio_ensemble
  - varianza_ensemble
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: true
    meaning:
      es: Hereda el signo del observable promediado.
      en: It inherits the sign of the averaged observable.
  zero_behavior:
    allowed: true
    meaning:
      es: Las contribuciones ponderadas se cancelan o el observable medio es nulo.
      en: Weighted contributions cancel or the mean observable is zero.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: real
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels:
    - parameter
    preferred_axis: parameter
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
- id: fluctuacion_ensemble
  symbol: sigma_A
  nombre:
    es: fluctuación de ensemble
    en: ensemble fluctuation
  descripcion:
    es: Dispersión típica de los valores microscópicos alrededor del promedio.
    en: Typical spread of microscopic values around the average.
  unidad_si: depende de A
  dimension: '[A]'
  is_vector: false
  components: []
  category: fluctuation
  physical_role:
    es: diagnóstico de dispersión
    en: spread diagnostic
  used_in:
  - varianza_ensemble
  common_mistake:
    es: Tratar esta magnitud como un dato aislado sin comprobar normalización y ensemble.
    en: Treating this quantity as an isolated datum without checking normalization and ensemble.
  typical_range: 0 a 1 para probabilidades; conteos grandes para ensembles macroscópicos.
  sign_behavior:
    has_sign: false
    meaning:
      es: No es negativa.
      en: It is not negative.
  zero_behavior:
    allowed: true
    meaning:
      es: Todos los estados relevantes tienen el mismo valor observable.
      en: All relevant states have the same observable value.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: no negativo
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - graph_reading
  graph_binding:
    channels:
    - parameter
    preferred_axis: parameter
  pedagogical_notes:
    es: Úsala siempre conectada con la población estadística completa que representa el ensemble.
    en: Use it always connected with the full statistical population represented by the ensemble.
