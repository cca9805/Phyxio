version: 5.0.0
leaf: modelo-de-ising
magnitudes:
- id: espin
  symbol: s_i
  nombre:
    es: espin
    en: espin
  descripcion:
    es: Magnitud espin usada para describir el modelo de Ising.
    en: Quantity espin used to describe the Ising model.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: microscopica
  physical_role: variable binaria
  used_in:
  - energia_ising_hamiltoniano
  - magnetizacion_total_ising
  common_mistake:
    es: Tratarla como número aislado sin comprobar modelo, signo o unidades.
    en: Treating it as an isolated number without checking model, sign, or units.
  typical_range: depende de la red y de la temperatura
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica orientación o contribución energética según el convenio.
      en: The sign indicates orientation or energetic contribution according to convention.
  zero_behavior:
    allowed: true
    meaning:
      es: El cero indica ausencia de contribución neta o equilibrio de orientaciones
        cuando aplica.
      en: Zero indicates no net contribution or balanced orientations when applicable.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: '[-1,1]'
  interpretation_role:
    primary_for:
    - energia_ising_hamiltoniano
    - magnetizacion_total_ising
    secondary_for: []
  graph_binding:
    channels:
    - parameter
    preferred_axis: none
    graph_type: Coord
  pedagogical_notes:
    es: Úsala para conectar el cálculo con el significado físico de espin.
    en: Use it to connect the calculation with the physical meaning of espin.
