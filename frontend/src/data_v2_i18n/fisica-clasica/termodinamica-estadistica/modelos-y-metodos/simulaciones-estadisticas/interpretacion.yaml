          an isolated number: check unit, range, and formula before concluding.'
    next_step_rules:
    - id: desviacion_estandar_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[desviacion_estandar]], contrasta el resultado con la fórmula activa, las unidades SI
