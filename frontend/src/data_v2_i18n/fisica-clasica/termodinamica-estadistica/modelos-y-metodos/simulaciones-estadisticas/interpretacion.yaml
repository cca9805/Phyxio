          número aislado: revisa unidad, rango y fórmula antes de concluir.'
        en: 'A common mistake is to interpret [[suma_observable]] in isolation: Do not read [[suma_observable]] as an isolated
          number: check unit, range, and formula before concluding.'
    next_step_rules:
    - id: suma_observable_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[suma_observable]], contrasta el resultado con la fórmula activa, las unidades SI y la
          tendencia esperada.
        en: After interpreting [[suma_observable]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: suma_observable_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[suma_observable]] ayuda a decidir si la simulación describe tendencia física, ruido numérico
          o peso estadístico.
        en: Intuitively, [[suma_observable]] helps decide whether the simulation describes physical trend, numerical noise,
          or statistical weight.
    limiting_cases:
    - id: suma_observable_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Analiza qué ocurre con [[suma_observable]] en valores nulos, extremos o fuera del dominio físico permitido.
        en: Analyze what happens to [[suma_observable]] at zero, extreme, or outside allowed physical-domain values.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[suma_observable]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[suma_observable]] is meaningful only after fixing reference and convention.
      common_sign_errors:
      - es: Tomar un signo negativo como error numérico sin revisar la referencia.
        en: Treating a negative sign as a numerical error without checking the reference.
  numero_muestras:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable_independiente
      en: number of samples
    summary_rules:
    - id: numero_muestras_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[numero_muestras]] fija cuántas muestras sostienen la estimación; gobierna coste y reducción del error estadístico.'
        en: '[[numero_muestras]] sets how many samples support the estimate; it controls cost and statistical-error reduction.'
    physical_reading_rules:
    - id: numero_muestras_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: Lee [[numero_muestras]] como conteo entero positivo; aumentar muestras mejora la precisión, pero no elimina todo
          sesgo del modelo.
        en: Read [[numero_muestras]] as a positive integer count; adding samples improves precision but does not remove model
          bias.
    coherence_rules:
    - id: numero_muestras_coherence_dimension_dominio
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[numero_muestras]] respete dimensión, rango físico y relación con las fórmulas declaradas.
        en: Check that [[numero_muestras]] respects dimension, physical range, and its declared formula relations.
    model_validity_rules:
    - id: numero_muestras_model_validity_hipotesis
      when: 'true'
      status: info
      text:
        es: Interpreta [[numero_muestras]] solo dentro de las hipótesis de muestreo, equilibrio y variables declaradas en
          el leaf.
        en: Interpret [[numero_muestras]] only within the sampling, equilibrium, and variable assumptions declared in the
          leaf.
    graph_rules:
    - id: numero_muestras_graph_coord_lectura
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, [[numero_muestras]] aparece en el eje x y permite ver que la mejora del error no es lineal.
        en: In the Coord graph, [[numero_muestras]] is on the x-axis and shows that error improvement is not linear.
    likely_errors:
    - id: numero_muestras_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[numero_muestras]] con una lectura aislada es un error frecuente: No confundas aumentar [[numero_muestras]]
          con corregir un modelo mal planteado o muestras sesgadas.'
        en: Do not confuse increasing [[numero_muestras]] with fixing a poor model or biased samples.
    next_step_rules:
    - id: numero_muestras_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[numero_muestras]], contrasta el resultado con la fórmula activa, las unidades SI y la
          tendencia esperada.
        en: After interpreting [[numero_muestras]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: numero_muestras_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[numero_muestras]] compra precisión con coste computacional; cada mejora adicional sale más cara.
        en: Intuitively, [[numero_muestras]] buys precision with computational cost; each extra improvement is more expensive.
    limiting_cases:
    - id: numero_muestras_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Si [[numero_muestras]] crece mucho, el error baja lentamente; si se acerca a cero, la estimación deja de tener
          sentido.
        en: If [[numero_muestras]] grows very large, error decreases slowly; if it approaches zero, the estimate loses meaning.
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo de [[numero_muestras]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[numero_muestras]] is meaningful only after fixing reference and convention.
      common_sign_errors: []
  error_estadistico:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: magnitud_dominante
      en: statistical error
    summary_rules:
    - id: error_estadistico_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[error_estadistico]] resume la incertidumbre de la media estimada y debe disminuir al aumentar [[numero_muestras]].'
        en: '[[error_estadistico]] summarizes the uncertainty of the estimated mean and should decrease as [[numero_muestras]]
          increases.'
    physical_reading_rules:
    - id: error_estadistico_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: 'Lee [[error_estadistico]] como una incertidumbre positiva de la media: no apunta en una dirección ni corrige
          el valor por sí solo.'
        en: 'Read [[error_estadistico]] as a positive uncertainty of the mean: it has no direction and does not correct the
          value by itself.'
    coherence_rules:
    - id: error_estadistico_coherence_dimension_dominio
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[error_estadistico]] tenga la misma dimensión que [[desviacion_estandar]] y baje como 1/sqrt([[numero_muestras]]).
        en: Check that [[error_estadistico]] has the same dimension as [[desviacion_estandar]] and decreases as 1/sqrt([[numero_muestras]]).
    model_validity_rules:
    - id: error_estadistico_model_validity_hipotesis
      when: 'true'
      status: info
      text:
        es: La lectura de [[error_estadistico]] supone muestras aproximadamente independientes; si hay correlación, el N efectivo
          es menor.
        en: Reading [[error_estadistico]] assumes approximately independent samples; if correlation exists, the effective
          N is smaller.
    graph_rules:
    - id: error_estadistico_graph_coord_lectura
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, [[error_estadistico]] aparece en el eje y y debe caer lentamente como raíz inversa de [[numero_muestras]].
        en: In the Coord graph, [[error_estadistico]] is on the y-axis and should fall slowly as the inverse square root of
          [[numero_muestras]].
    likely_errors:
    - id: error_estadistico_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[error_estadistico]] con una lectura aislada es un error frecuente: No confundas [[error_estadistico]]
          con [[desviacion_estandar]]: uno mide incertidumbre de la media y la otra dispersión de datos.'
        en: 'Do not confuse [[error_estadistico]] with [[desviacion_estandar]]: one measures mean uncertainty and the other
          data spread.'
    next_step_rules:
    - id: error_estadistico_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[error_estadistico]], contrasta el resultado con la fórmula activa, las unidades SI y
          la tendencia esperada.
        en: After interpreting [[error_estadistico]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: error_estadistico_intuition_base
      when: 'true'
      status: info
      text:
        es: 'Intuitivamente, bajar [[error_estadistico]] cuesta cada vez más muestras: la curva se aplana como una colina
          numérica domesticada.'
        en: 'Intuitively, lowering [[error_estadistico]] requires more and more samples: the curve flattens like a tamed numerical
          hill.'
    limiting_cases:
    - id: error_estadistico_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Si [[numero_muestras]] se cuadruplica, [[error_estadistico]] se reduce aproximadamente a la mitad si la dispersión
          no cambia.
        en: If [[numero_muestras]] is quadrupled, [[error_estadistico]] is roughly halved if the spread is unchanged.
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo de [[error_estadistico]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[error_estadistico]] is meaningful only after fixing reference and convention.
      common_sign_errors: []
