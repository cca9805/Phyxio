targets:
  media_muestral:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado_estimado
      en: sample mean
    summary_rules:
    - id: media_muestral_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[media_muestral]] es la estimación finita del promedio físico del observable, no el valor exacto garantizado.'
        en: '[[media_muestral]] is the finite estimate of the physical average, not a guaranteed exact value.'
    physical_reading_rules:
    - id: media_muestral_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: Lee la unidad, rango permitido y papel físico de [[media_muestral]] antes de comparar resultados de simulación.
        en: Read the unit, allowed range, and physical role of [[media_muestral]] before comparing simulation results.
    coherence_rules:
    - id: media_muestral_coherence_dimension_dominio
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[media_muestral]] conserve la unidad de [[observable]] y proceda de [[suma_observable]]/[[numero_muestras]].
        en: Check that [[media_muestral]] keeps the unit of [[observable]] and comes from [[suma_observable]]/[[numero_muestras]].
    model_validity_rules:
    - id: media_muestral_model_validity_hipotesis
      when: 'true'
      status: info
      text:
        es: Interpreta [[media_muestral]] solo dentro de las hipótesis de muestreo, equilibrio y variables declaradas en el
          leaf.
        en: Interpret [[media_muestral]] only within the sampling, equilibrium, and variable assumptions declared in the leaf.
    graph_rules:
    - id: media_muestral_graph_coord_lectura
      when: 'true'
      status: info
      text:
        es: Usa la gráfica Coord como apoyo si [[media_muestral]] afecta a la convergencia, dispersión o lectura probabilística
          del resultado.
        en: Use the Coord graph as support if [[media_muestral]] affects convergence, spread, or probabilistic reading of
          the result.
    likely_errors:
    - id: media_muestral_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[media_muestral]] con una lectura aislada es un error frecuente: No leas [[media_muestral]] como número
          aislado: revisa unidad, rango y fórmula antes de concluir.'
        en: 'A common mistake is to interpret [[media_muestral]] in isolation: Do not read [[media_muestral]] as an isolated
          number: check unit, range, and formula before concluding.'
    next_step_rules:
    - id: media_muestral_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[media_muestral]], contrasta el resultado con la fórmula activa, las unidades SI y la
          tendencia esperada.
        en: After interpreting [[media_muestral]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: media_muestral_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[media_muestral]] ayuda a decidir si la simulación describe tendencia física, ruido numérico
          o peso estadístico.
        en: Intuitively, [[media_muestral]] helps decide whether the simulation describes physical trend, numerical noise,
          or statistical weight.
    limiting_cases:
    - id: media_muestral_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Analiza qué ocurre con [[media_muestral]] en valores nulos, extremos o fuera del dominio físico permitido.
        en: Analyze what happens to [[media_muestral]] at zero, extreme, or outside allowed physical-domain values.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[media_muestral]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[media_muestral]] is meaningful only after fixing reference and convention.
      common_sign_errors:
      - es: Tomar un signo negativo como error numérico sin revisar la referencia.
        en: Treating a negative sign as a numerical error without checking the reference.
  suma_observable:
