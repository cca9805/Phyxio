    sign_convention_reminder:
      enabled: false
      text:
        es: El signo de [[desviacion_estandar]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[desviacion_estandar]] is meaningful only after fixing reference and convention.
      common_sign_errors: []
  probabilidad_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: peso_estadistico
      en: Boltzmann probability
    summary_rules:
    - id: probabilidad_boltzmann_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_boltzmann]] expresa el peso relativo de un estado dentro del modelo canónico.'
        en: '[[probabilidad_boltzmann]] expresses the relative weight of a state in the canonical model.'
    physical_reading_rules:
    - id: probabilidad_boltzmann_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: Lee la unidad, rango permitido y papel físico de [[probabilidad_boltzmann]] antes de comparar resultados de simulación.
        en: Read the unit, allowed range, and physical role of [[probabilidad_boltzmann]] before comparing simulation results.
    coherence_rules:
    - id: probabilidad_boltzmann_coherence_dimension_dominio
      when: 'true'
