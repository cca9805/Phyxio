    semantic_role:
      es: acumulador
      en: sum of observables
    summary_rules:
    - id: suma_observable_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[suma_observable]] acumula los valores medidos y sirve de puente numérico hacia la media muestral.'
        en: '[[suma_observable]] accumulates measured values and acts as the numerical bridge to the sample mean.'
