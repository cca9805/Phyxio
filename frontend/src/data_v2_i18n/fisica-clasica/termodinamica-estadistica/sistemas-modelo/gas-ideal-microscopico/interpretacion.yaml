    status: ok
    text:
      es: Coherencia dimensional.
      en: Dimensional consistency.
error_patterns:
  enabled: true
  patterns: []
graph_reading_policy:
  enabled: true
  primary_variable: energia_cinetica_media
  reading_sequence: []
  key_points: []
comparative_context:
  enabled: true
  reference_values: []
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Unidad final coherente.
    en: Coherent final unit.
targets:
  energia_cinetica_media:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: magnitud dominante
      en: dominant magnitude
    summary_rules:
    - id: energia_cinetica_media_summary_thermal_energy
      when: 'true'
      status: ok
      text:
        es: '[[energia_cinetica_media]] resume la energía traslacional media asociada al movimiento microscópico de una partícula
          del gas ideal.'
        en: '[[energia_cinetica_media]] summarizes the mean translational energy associated with the microscopic motion of
          one ideal-gas particle.'
    physical_reading_rules:
    - id: energia_cinetica_media_physical_reading_temperature_link
      when: 'true'
      status: info
      text:
        es: Si aumenta [[temperatura]], debe aumentar [[energia_cinetica_media]] de forma lineal; no significa que todas las
          partículas tengan la misma energía.
        en: If [[temperatura]] increases, [[energia_cinetica_media]] must increase linearly; this does not mean every particle
          has the same energy.
    coherence_rules:
    - id: energia_cinetica_media_coherence_units
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_cinetica_media]] se exprese en J y sea compatible con [[constante_boltzmann]] por [[temperatura]].
        en: Check that [[energia_cinetica_media]] is expressed in J and is consistent with [[constante_boltzmann]] times [[temperatura]].
    model_validity_rules:
    - id: energia_cinetica_media_model_validity_classical
      when: 'true'
      status: info
      text:
        es: La lectura vale para un gas ideal clásico, diluido y no relativista; falla si hay interacciones fuertes, degeneración
          cuántica o velocidades relativistas.
        en: The reading is valid for a classical, dilute, nonrelativistic ideal gas; it fails with strong interactions, quantum
          degeneracy, or relativistic speeds.
    graph_rules:
    - id: energia_cinetica_media_graph_slope
      when: 'true'
      status: info
      text:
        es: En la gráfica [[energia_cinetica_media]] frente a [[temperatura]], la pendiente representa el factor microscópico
          fijado por [[constante_boltzmann]].
        en: In the graph of [[energia_cinetica_media]] versus [[temperatura]], the slope represents the microscopic factor
          set by [[constante_boltzmann]].
    likely_errors:
    - id: energia_cinetica_media_likely_error_total_energy
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[energia_cinetica_media]] con una lectura aislada es un error frecuente: No confundas [[energia_cinetica_media]]
          por partícula con la energía total del gas; para el total interviene [[numero_particulas]].'
        en: Do not confuse per-particle [[energia_cinetica_media]] with the total gas energy; total energy involves [[numero_particulas]].
    next_step_rules:
    - id: energia_cinetica_media_next_step_compare_speed
      when: 'true'
      status: info
      text:
        es: Relaciona el valor con [[velocidad_rms]] para comprobar si la escala de rapidez microscópica es razonable.
        en: Relate the value to [[velocidad_rms]] to check whether the microscopic speed scale is reasonable.
    physical_intuition:
    - id: energia_cinetica_media_intuition_agitation
      when: 'true'
      status: info
      text:
        es: Mayor [[energia_cinetica_media]] significa mayor agitación microscópica promedio, no una dirección preferente
          de movimiento.
        en: Larger [[energia_cinetica_media]] means greater average microscopic agitation, not a preferred direction of motion.
    limiting_cases:
    - id: energia_cinetica_media_limiting_zero_temp
      when: 'true'
      status: info
      text:
        es: Al aproximarse [[temperatura]] a cero, el modelo clásico predice energía traslacional media muy pequeña, pero
          pueden aparecer límites cuánticos.
        en: As [[temperatura]] approaches zero, the classical model predicts very small mean translational energy, but quantum
          limits may appear.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable térmica de control
      en: thermal control variable
    summary_rules:
    - id: temperatura_summary_control
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] fija la escala energética microscópica del gas ideal y controla [[energia_cinetica_media]] y
          [[velocidad_rms]].'
        en: '[[temperatura]] sets the microscopic energy scale of the ideal gas and controls [[energia_cinetica_media]] and
          [[velocidad_rms]].'
    physical_reading_rules:
    - id: temperatura_physical_reading_kelvin
      when: 'true'
      status: info
      text:
        es: Lee [[temperatura]] siempre en kelvin; usar grados Celsius directamente rompe la proporcionalidad microscópica.
        en: Always read [[temperatura]] in kelvin; using Celsius directly breaks the microscopic proportionality.
    coherence_rules:
    - id: temperatura_coherence_nonnegative
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] debe ser positiva en el modelo de gas ideal clásico usado aquí.'
        en: '[[temperatura]] must be positive in the classical ideal-gas model used here.'
    model_validity_rules:
    - id: temperatura_model_validity_equilibrium
      when: 'true'
      status: info
      text:
        es: Interpreta [[temperatura]] como temperatura de equilibrio; si el gas no está equilibrado, una sola temperatura
          puede no describir la distribución de velocidades.
        en: Interpret [[temperatura]] as an equilibrium temperature; if the gas is not equilibrated, one temperature may not
          describe the velocity distribution.
    graph_rules:
    - id: temperatura_graph_axis
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura]] está en el eje horizontal, desplazarse a la derecha debe elevar [[energia_cinetica_media]]
          y [[velocidad_rms]].
        en: When [[temperatura]] is on the horizontal axis, moving right should raise [[energia_cinetica_media]] and [[velocidad_rms]].
    likely_errors:
    - id: temperatura_likely_error_heat
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[temperatura]] con una lectura aislada es un error frecuente: No confundas [[temperatura]] con calor:
          aquí es una escala de energía microscópica, no energía transferida.'
        en: 'Do not confuse [[temperatura]] with heat: here it is a microscopic energy scale, not transferred energy.'
    next_step_rules:
    - id: temperatura_next_step_check_units
      when: 'true'
      status: info
      text:
        es: Convierte la temperatura a K antes de aplicar fórmulas y verifica si el resultado queda en J, Pa o m/s según el
          despeje.
        en: Convert temperature to K before applying formulas and verify whether the result is in J, Pa, or m/s depending
          on the rearrangement.
    physical_intuition:
    - id: temperatura_intuition_distribution
      when: 'true'
      status: info
      text:
        es: 'Una [[temperatura]] mayor ensancha la distribución de velocidades: hay más partículas rápidas, aunque también
          sigan existiendo partículas lentas.'
        en: 'A larger [[temperatura]] broadens the speed distribution: there are more fast particles, although slow particles
          still exist.'
    limiting_cases:
    - id: temperatura_limiting_high_low
      when: 'true'
      status: info
      text:
        es: A temperaturas muy bajas o muy altas pueden fallar, respectivamente, la aproximación clásica o la aproximación
          no relativista.
        en: At very low or very high temperatures, the classical approximation or the nonrelativistic approximation may fail,
          respectively.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  constante_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: constante universal
      en: universal constant
    summary_rules:
    - id: constante_boltzmann_summary_bridge
      when: 'true'
      status: ok
      text:
        es: '[[constante_boltzmann]] convierte la escala térmica [[temperatura]] en escala energética microscópica.'
        en: '[[constante_boltzmann]] converts the thermal scale [[temperatura]] into a microscopic energy scale.'
    physical_reading_rules:
    - id: constante_boltzmann_physical_reading_constant
      when: 'true'
      status: info
      text:
        es: '[[constante_boltzmann]] no describe el gas concreto: es una constante universal que fija la proporción entre
          K y J.'
        en: '[[constante_boltzmann]] does not describe a particular gas: it is a universal constant setting the proportion
          between K and J.'
    coherence_rules:
    - id: constante_boltzmann_coherence_dimensions
      when: 'true'
      status: ok
      text:
        es: Sus unidades deben permitir que [[constante_boltzmann]] por [[temperatura]] tenga dimensión de energía.
        en: Its units must make [[constante_boltzmann]] times [[temperatura]] have energy dimension.
    model_validity_rules:
    - id: constante_boltzmann_model_validity_universal
      when: 'true'
      status: info
      text:
        es: No se ajusta experimentalmente dentro del ejercicio; cualquier variación aparente suele indicar error de unidades
          o de despeje.
        en: It is not fitted inside the exercise; any apparent variation usually indicates a unit or rearrangement error.
    graph_rules:
    - id: constante_boltzmann_graph_slope_constant
      when: 'true'
      status: info
      text:
        es: En la gráfica energía-temperatura, [[constante_boltzmann]] aparece como parte de la pendiente, no como una variable
          de eje.
        en: In the energy-temperature graph, [[constante_boltzmann]] appears as part of the slope, not as an axis variable.
    likely_errors:
    - id: constante_boltzmann_likely_error_wrong_constant
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[constante_boltzmann]] con una lectura aislada es un error frecuente: No sustituyas [[constante_boltzmann]]
          por la constante de los gases si trabajas con partículas individuales.'
        en: 'A common mistake is to interpret [[constante_boltzmann]] in isolation: Do not replace [[constante_boltzmann]]
          with the gas constant when working with individual particles.'
    next_step_rules:
    - id: constante_boltzmann_next_step_particle_or_mole
      when: 'true'
      status: info
      text:
        es: Decide si el problema está planteado por partícula o por mol antes de escoger la constante adecuada.
        en: Decide whether the problem is written per particle or per mole before choosing the proper constant.
    physical_intuition:
    - id: constante_boltzmann_intuition_scale
      when: 'true'
      status: info
      text:
        es: Su valor pequeño recuerda que la energía térmica de una sola partícula a temperatura ambiente es microscópica.
        en: Its small value reminds us that the thermal energy of one particle at room temperature is microscopic.
    limiting_cases:
    - id: constante_boltzmann_limiting_not_variable
      when: 'true'
      status: info
      text:
        es: 'No existe un caso límite físico en el que [[constante_boltzmann]] se haga cero dentro del modelo: sería cambiar
          la teoría.'
        en: 'There is no physical limiting case where [[constante_boltzmann]] becomes zero inside the model: that would change
          the theory.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  presion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado macroscópico
      en: macroscopic result
    summary_rules:
    - id: presion_summary_collisions
      when: 'true'
      status: ok
      text:
        es: '[[presion]] es la lectura macroscópica de los choques microscópicos de muchas partículas contra las paredes.'
        en: '[[presion]] is the macroscopic reading of microscopic collisions of many particles against the walls.'
    physical_reading_rules:
    - id: presion_physical_reading_density_temp
      when: 'true'
      status: info
      text:
        es: A [[volumen]] fijo, [[presion]] aumenta si crecen [[numero_particulas]] o [[temperatura]].
        en: At fixed [[volumen]], [[presion]] increases if [[numero_particulas]] or [[temperatura]] grows.
    coherence_rules:
    - id: presion_coherence_units
      when: 'true'
      status: ok
      text:
        es: Verifica que [[presion]] queda en Pa y que el cociente entre escala energética y [[volumen]] tiene dimensión de
          presión.
        en: Verify that [[presion]] is in Pa and that energy scale divided by [[volumen]] has pressure dimension.
    model_validity_rules:
    - id: presion_model_validity_dilute
      when: 'true'
      status: info
      text:
        es: La interpretación microscópica supone gas diluido, choques elásticos y ausencia de fuerzas intermoleculares relevantes.
        en: The microscopic interpretation assumes a dilute gas, elastic collisions, and no relevant intermolecular forces.
    graph_rules:
    - id: presion_graph_linear
      when: 'true'
      status: info
      text:
        es: Si la gráfica muestra [[presion]] frente a [[temperatura]] con [[numero_particulas]] y [[volumen]] constantes,
          la relación debe ser lineal.
        en: If the graph shows [[presion]] versus [[temperatura]] with [[numero_particulas]] and [[volumen]] constant, the
          relation should be linear.
    likely_errors:
    - id: presion_likely_error_force_only
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[presion]] con una lectura aislada es un error frecuente: No interpretes [[presion]] como una fuerza
          total; es fuerza media por unidad de área producida por choques.'
        en: 'A common mistake is to interpret [[presion]] in isolation: Do not interpret [[presion]] as a total force; it
          is mean force per unit area produced by collisions.'
    next_step_rules:
    - id: presion_next_step_hold_variables
      when: 'true'
      status: info
      text:
        es: 'Antes de comparar presiones, identifica qué magnitudes permanecen constantes: [[volumen]], [[numero_particulas]]
          o [[temperatura]].'
        en: 'Before comparing pressures, identify which quantities remain constant: [[volumen]], [[numero_particulas]], or
          [[temperatura]].'
    physical_intuition:
    - id: presion_intuition_more_hits
      when: 'true'
      status: info
      text:
        es: Mayor [[presion]] significa más transferencia de momento por unidad de área y tiempo, causada por más partículas
          o partículas más rápidas.
        en: Greater [[presion]] means more momentum transfer per unit area and time, caused by more particles or faster particles.
    limiting_cases:
    - id: presion_limiting_volume
      when: 'true'
      status: info
      text:
        es: Si [[volumen]] se hace muy pequeño a [[numero_particulas]] fijo, el modelo ideal puede fallar por interacciones
          y tamaño molecular.
        en: If [[volumen]] becomes very small at fixed [[numero_particulas]], the ideal model may fail because of interactions
          and molecular size.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  numero_particulas:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: conteo microscópico
      en: microscopic count
    summary_rules:
    - id: numero_particulas_summary_count
      when: 'true'
      status: ok
      text:
        es: '[[numero_particulas]] indica cuántas partículas microscópicas contribuyen a la presión y a la energía total del
          gas.'
        en: '[[numero_particulas]] indicates how many microscopic particles contribute to the gas pressure and total energy.'
    physical_reading_rules:
    - id: numero_particulas_physical_reading_extensive
      when: 'true'
      status: info
      text:
        es: '[[numero_particulas]] multiplica magnitudes extensivas, pero no cambia la energía media por partícula si [[temperatura]]
          permanece fija.'
        en: '[[numero_particulas]] multiplies extensive quantities but does not change the mean energy per particle if [[temperatura]]
          stays fixed.'
    coherence_rules:
    - id: numero_particulas_coherence_integer
      when: 'true'
      status: ok
      text:
        es: Debe ser no negativo y enorme en gases macroscópicos; valores pequeños representan modelos microscópicos o simulaciones.
        en: It must be nonnegative and huge in macroscopic gases; small values represent microscopic models or simulations.
    model_validity_rules:
    - id: numero_particulas_model_validity_many_particles
      when: 'true'
      status: info
      text:
        es: La presión estable requiere muchas partículas; con pocas partículas dominan fluctuaciones y la presión instantánea
          no es suave.
        en: Stable pressure requires many particles; with few particles, fluctuations dominate and instantaneous pressure
          is not smooth.
    graph_rules:
    - id: numero_particulas_graph_slope
      when: 'true'
      status: info
      text:
        es: Al aumentar [[numero_particulas]] a [[volumen]] fijo, la pendiente de [[presion]] frente a [[temperatura]] aumenta.
        en: Increasing [[numero_particulas]] at fixed [[volumen]] increases the slope of [[presion]] versus [[temperatura]].
    likely_errors:
    - id: numero_particulas_likely_error_moles
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[numero_particulas]] con una lectura aislada es un error frecuente: No confundas [[numero_particulas]]
          con número de moles; cambiar de escala exige cambiar también la constante usada.'
        en: Do not confuse [[numero_particulas]] with number of moles; changing scale also requires changing the constant
          used.
    next_step_rules:
    - id: numero_particulas_next_step_particle_scale
      when: 'true'
      status: info
      text:
        es: Decide si la respuesta se pide por partícula, por conjunto completo o por mol antes de interpretar el resultado.
        en: Decide whether the answer is requested per particle, for the whole set, or per mole before interpreting the result.
    physical_intuition:
    - id: numero_particulas_intuition_more_colliders
      when: 'true'
      status: info
      text:
        es: Más [[numero_particulas]] significa más colisiones contra las paredes, no necesariamente partículas más rápidas.
        en: More [[numero_particulas]] means more wall collisions, not necessarily faster particles.
    limiting_cases:
    - id: numero_particulas_limiting_zero
      when: 'true'
      status: info
      text:
        es: 'Si [[numero_particulas]] es cero, no hay gas: [[presion]] y energía total pierden sentido físico macroscópico.'
        en: 'If [[numero_particulas]] is zero, there is no gas: [[presion]] and total energy lose macroscopic physical meaning.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  velocidad_rms:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: escala de rapidez
      en: speed scale
    summary_rules:
    - id: velocidad_rms_summary_speed
      when: 'true'
      status: ok
      text:
        es: '[[velocidad_rms]] da una escala positiva de rapidez microscópica ligada a [[temperatura]] y [[masa_particula]].'
        en: '[[velocidad_rms]] gives a positive microscopic speed scale linked to [[temperatura]] and [[masa_particula]].'
    physical_reading_rules:
    - id: velocidad_rms_physical_reading_not_average_velocity
      when: 'true'
      status: info
      text:
        es: '[[velocidad_rms]] no es la velocidad vectorial media; en equilibrio la velocidad media puede ser cero aunque
          la rapidez sea grande.'
        en: '[[velocidad_rms]] is not the mean vector velocity; at equilibrium the mean velocity may be zero even when speed
          is large.'
    coherence_rules:
    - id: velocidad_rms_coherence_ms
      when: 'true'
      status: ok
      text:
        es: Debe quedar en m/s y crecer con [[temperatura]] mientras disminuye con [[masa_particula]].
        en: It must be in m/s and grow with [[temperatura]] while decreasing with [[masa_particula]].
    model_validity_rules:
    - id: velocidad_rms_model_validity_nonrelativistic
      when: 'true'
      status: info
      text:
        es: La lectura clásica exige que [[velocidad_rms]] sea mucho menor que la velocidad de la luz.
        en: The classical reading requires [[velocidad_rms]] to be much smaller than the speed of light.
    graph_rules:
    - id: velocidad_rms_graph_root
      when: 'true'
      status: info
      text:
        es: 'La gráfica [[velocidad_rms]] frente a [[temperatura]] no es lineal: crece como una raíz, más despacio a temperaturas
          altas.'
        en: 'The graph of [[velocidad_rms]] versus [[temperatura]] is not linear: it grows like a root, more slowly at high
          temperatures.'
    likely_errors:
    - id: velocidad_rms_likely_error_direction
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[velocidad_rms]] con una lectura aislada es un error frecuente: No asignes signo direccional a [[velocidad_rms]];
          es una rapidez RMS y por definición no negativa.'
        en: 'A common mistake is to interpret [[velocidad_rms]] in isolation: Do not assign directional sign to [[velocidad_rms]];
          it is an RMS speed and is nonnegative by definition.'
    next_step_rules:
    - id: velocidad_rms_next_step_compare_gas
      when: 'true'
      status: info
      text:
        es: Compara la rapidez obtenida con valores típicos de moléculas a temperatura ambiente para detectar errores de escala.
        en: Compare the obtained speed with typical molecular values at room temperature to detect scale errors.
    physical_intuition:
    - id: velocidad_rms_intuition_typical_speed
      when: 'true'
      status: info
      text:
        es: '[[velocidad_rms]] representa una rapidez típica energética, no la rapidez exacta de todas las partículas.'
        en: '[[velocidad_rms]] represents an energetic typical speed, not the exact speed of every particle.'
    limiting_cases:
    - id: velocidad_rms_limiting_zero_temp
      when: 'true'
      status: info
      text:
        es: Si [[temperatura]] tiende a cero, la predicción clásica tiende a rapidez nula, aunque pueden aparecer efectos
          cuánticos.
        en: If [[temperatura]] tends to zero, the classical prediction tends toward zero speed, although quantum effects may
          appear.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  masa_particula:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro microscópico
      en: microscopic parameter
    summary_rules:
    - id: masa_particula_summary_mass
      when: 'true'
      status: ok
      text:
        es: '[[masa_particula]] conecta la misma energía térmica con una escala de rapidez diferente para cada tipo de partícula.'
        en: '[[masa_particula]] connects the same thermal energy with a different speed scale for each particle type.'
    physical_reading_rules:
    - id: masa_particula_physical_reading_speed
      when: 'true'
      status: info
      text:
        es: A igual [[temperatura]], una [[masa_particula]] mayor implica menor [[velocidad_rms]].
        en: At equal [[temperatura]], a larger [[masa_particula]] implies a smaller [[velocidad_rms]].
    coherence_rules:
    - id: masa_particula_coherence_kg
      when: 'true'
      status: ok
      text:
        es: Debe expresarse en kg por partícula, no en masa molar, cuando se usa [[constante_boltzmann]].
        en: It must be expressed in kg per particle, not molar mass, when [[constante_boltzmann]] is used.
    model_validity_rules:
    - id: masa_particula_model_validity_species
      when: 'true'
      status: info
      text:
        es: El modelo supone partículas idénticas; mezclas de gases requieren tratar cada especie con su propia [[masa_particula]].
        en: The model assumes identical particles; gas mixtures require treating each species with its own [[masa_particula]].
    graph_rules:
    - id: masa_particula_graph_parameter
      when: 'true'
      status: info
      text:
        es: En la gráfica de [[velocidad_rms]] frente a [[temperatura]], [[masa_particula]] cambia la curvatura o escala vertical.
        en: In a graph of [[velocidad_rms]] versus [[temperatura]], [[masa_particula]] changes the curvature or vertical scale.
    likely_errors:
    - id: masa_particula_likely_error_molar_mass
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[masa_particula]] con una lectura aislada es un error frecuente: Usar g/mol como [[masa_particula]]
          produce velocidades absurdas; convierte a kg por molécula.'
        en: 'A common mistake is to interpret [[masa_particula]] in isolation: Using g/mol as [[masa_particula]] gives absurd
          speeds; convert to kg per molecule.'
    next_step_rules:
    - id: masa_particula_next_step_check_species
      when: 'true'
      status: info
      text:
        es: Comprueba qué gas se está modelando antes de aceptar una [[velocidad_rms]] como razonable.
        en: Check which gas is being modeled before accepting a [[velocidad_rms]] as reasonable.
    physical_intuition:
    - id: masa_particula_intuition_heavier_slower
      when: 'true'
      status: info
      text:
        es: Las partículas más pesadas reparten la energía térmica en más inercia y por eso se mueven más despacio en promedio.
        en: Heavier particles spread thermal energy over more inertia and therefore move more slowly on average.
    limiting_cases:
    - id: masa_particula_limiting_mass
      when: 'true'
      status: info
      text:
        es: Si [[masa_particula]] se aproxima artificialmente a cero, la predicción de rapidez puede volverse no relativista
          inválida.
        en: If [[masa_particula]] is artificially driven toward zero, the predicted speed may become invalidly nonrelativistic.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
