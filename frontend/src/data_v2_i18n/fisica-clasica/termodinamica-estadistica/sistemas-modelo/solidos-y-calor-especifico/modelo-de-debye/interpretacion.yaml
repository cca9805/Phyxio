targets:
  temperatura_debye:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro de material
      en: Debye temperature
    summary_rules:
    - id: temperatura_debye_summary_debye
      when: 'true'
      status: ok
      text:
        es: 'Cuando [[temperatura]] es pequeña frente a [[temperatura_debye]], [[calor_especifico]] queda muy por debajo
          del límite clásico porque pocos modos fonónicos están activos, lo que indica que la cuantización domina la
          respuesta térmica; al aproximarse ambas escalas, [[calor_especifico]] aumenta hacia el límite de Dulong-Petit.'
        en: 'When [[temperatura]] is small compared with [[temperatura_debye]], [[calor_especifico]] stays well below
          the classical limit because few phonon modes are thermally active, which indicates that quantization dominates
          the thermal response; as both scales approach each other, [[calor_especifico]] increases toward the Dulong-Petit
          limit.'
    physical_reading_rules:
    - id: temperatura_debye_physical_reading_debye
      when: 'true'
      status: info
      text:
        es: '[[temperatura_debye]] es una huella del material: cuanto mayor es, más alta debe ser [[temperatura]] para excitar
          gran parte del espectro vibratorio.'
        en: '[[temperatura_debye]] is a material fingerprint: the larger it is, the higher [[temperatura]] must be to excite
          much of the vibrational spectrum.'
    coherence_rules:
    - id: temperatura_debye_coherence_units_scale
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[temperatura_debye]] usa unidades SI coherentes y que sus fórmulas respetan la escala marcada por
          [[temperatura_debye]].
        en: Check that [[temperatura_debye]] uses consistent SI units and that its formulas respect the scale set by [[temperatura_debye]].
    model_validity_rules:
    - id: temperatura_debye_model_validity_debye_assumptions
      when: 'true'
      status: info
      text:
        es: El uso de [[temperatura_debye]] supone sólido cristalino, modos acústicos continuos y comportamiento armónico;
          defectos, electrones o anharmonicidad pueden dominar fuera de ese marco.
        en: Using [[temperatura_debye]] assumes a crystalline solid, continuous acoustic modes, and harmonic behavior; defects,
          electrons, or anharmonicity can dominate outside that frame.
    graph_rules:
    - id: temperatura_debye_graph_heat_capacity_curve
      when: graph_binding.enabled
      status: info
      text:
        es: En la gráfica, relaciona [[temperatura_debye]] con el crecimiento de [[calor_especifico]] al aumentar [[temperatura]]
          y con la saturación hacia el límite clásico.
        en: On the graph, relate [[temperatura_debye]] to the growth of [[calor_especifico]] as [[temperatura]] increases
          and to saturation toward the classical limit.
    likely_errors:
    - id: temperatura_debye_likely_error_units_regime
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[temperatura_debye]] con una lectura aislada es un error frecuente: No confundas [[temperatura_debye]]
          con la [[temperatura]] real del sólido; es una escala de comparación, no una lectura del termómetro.'
        en: Do not confuse [[temperatura_debye]] with the actual [[temperatura]] of the solid; it is a comparison scale, not
          a thermometer reading.
    next_step_rules:
    - id: temperatura_debye_next_step_choose_regime
      when: 'true'
      status: info
      text:
        es: Tras interpretar [[temperatura_debye]], decide si el régimen es de baja temperatura, transición o límite Dulong-Petit
          antes de elegir la fórmula siguiente.
        en: After interpreting [[temperatura_debye]], decide whether the regime is low temperature, crossover, or Dulong-Petit
          limit before choosing the next formula.
    physical_intuition:
    - id: temperatura_debye_intuition_quantized_modes
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[temperatura_debye]] indica cuánto pesa la cuantización de las vibraciones frente a la agitación
          térmica disponible.
        en: Intuitively, [[temperatura_debye]] indicates how strongly vibration quantization weighs against the available
          thermal agitation.
    limiting_cases:
    - id: temperatura_debye_limiting_low_high_temperature
      when: 'true'
      status: info
      text:
        es: 'Caso límite: si [[temperatura]] es mucho menor que [[temperatura_debye]], los modos activos son pocos; si es
          mucho mayor, casi todos contribuyen.'
        en: 'Limiting case: if [[temperatura]] is far below [[temperatura_debye]], few modes are active; if it is far above
          it, almost all contribute.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  frecuencia_debye:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: corte espectral
      en: Debye frequency
    summary_rules:
    - id: frecuencia_debye_summary_debye
      when: 'true'
      status: ok
      text:
        es: '[[frecuencia_debye]] se interpreta como frecuencia máxima efectiva de los modos acústicos; debe leerse dentro
          del modelo de Debye y no como un dato aislado.'
        en: '[[frecuencia_debye]] is interpreted as effective maximum frequency of acoustic modes; it must be read within
          the Debye model and not as an isolated number.'
    physical_reading_rules:
    - id: frecuencia_debye_physical_reading_debye
      when: 'true'
      status: info
      text:
        es: Físicamente, [[frecuencia_debye]] conecta la respuesta térmica del sólido con el reparto de energía entre modos
          vibratorios cuantizados.
        en: Physically, [[frecuencia_debye]] connects the thermal response of the solid with energy sharing among quantized
          vibrational modes.
    coherence_rules:
    - id: frecuencia_debye_coherence_units_scale
      when: 'true'
      status: ok
      text:
        es: '[[frecuencia_debye]] debe ser coherente con la normalización de modos y con el número de grados vibratorios usado
          en el modelo de Debye.'
        en: '[[frecuencia_debye]] must be consistent with mode normalization and with the number of vibrational degrees of
          freedom used in the Debye model.'
