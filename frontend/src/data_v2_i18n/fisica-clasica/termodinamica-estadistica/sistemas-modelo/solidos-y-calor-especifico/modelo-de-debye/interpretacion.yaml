      text:
        es: Un error frecuente con [[frecuencia_debye]] es olvidar si se está usando una magnitud total, molar o adimensional
          antes de comparar con datos experimentales.
        en: A common error with [[frecuencia_debye]] is forgetting whether a total, molar, or dimensionless quantity is being
