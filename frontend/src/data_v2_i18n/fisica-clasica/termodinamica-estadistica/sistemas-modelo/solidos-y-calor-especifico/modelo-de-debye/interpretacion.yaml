      text:
        es: Intuitivamente, [[frecuencia_debye]] indica cuánto pesa la cuantización de las vibraciones frente a la agitación
          térmica disponible.
        en: Intuitively, [[frecuencia_debye]] indicates how strongly vibration quantization weighs against the available thermal
