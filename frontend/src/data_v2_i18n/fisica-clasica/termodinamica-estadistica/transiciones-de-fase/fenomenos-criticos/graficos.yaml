version: '1.0'
leaf: fenomenos-criticos
coord:
  id: fenomenos-criticos-Coord
  graphId: fenomenos-criticos-Coord
  type: Coord
  graphType: Coord
  title:
    es: Parámetro de orden cerca de la temperatura crítica
    en: Order parameter near the critical temperature
  xAxis:
    es: Temperatura reducida |t|
    en: Reduced temperature |t|
  yAxis:
    es: Parámetro de orden Φ
    en: Order parameter Φ
  xMagnitude: temperatura_reducida
  yMagnitude: parametro_de_orden
  relation:
    es: Muestra cómo el parámetro de orden cambia al acercarse a la temperatura crítica mediante una ley crítica de potencia.
    en: Shows how the order parameter changes when approaching the critical temperature through a critical power law.
  physicalReading:
    es: 'La curva responde directamente a la pregunta central: al reducirse la distancia a la temperatura crítica, el parámetro
      de orden disminuye hacia cero mientras la susceptibilidad y la longitud de correlación se vuelven más sensibles.'
    en: 'The curve directly answers the central question: as distance to the critical temperature decreases, the order parameter
      falls toward zero while susceptibility and correlation length become more sensitive.'
  slopeMeaning:
    es: La pendiente indica la rapidez con que desaparece el orden macroscópico cerca de la criticidad.
    en: The slope indicates how rapidly macroscopic order disappears near criticality.
  interceptMeaning:
    es: El corte ideal en el origen representa el punto crítico con parámetro de orden nulo.
    en: The ideal intercept at the origin represents the critical point with zero order parameter.
  curvatureMeaning:
    es: La curvatura codifica el exponente crítico beta y revela que la dependencia no es lineal.
    en: The curvature encodes the critical exponent beta and reveals that the dependence is not linear.
  signMeaning:
    es: El gráfico usa el módulo de la temperatura reducida; el lado físico debe indicarse aparte.
    en: The graph uses the magnitude of reduced temperature; the physical side must be stated separately.
  areaMeaning:
    es: El área bajo esta curva no es una energía; sirve solo como lectura comparativa del orden acumulado en el rango mostrado.
    en: The area under this curve is not an energy; it only provides a comparative reading of order over the displayed range.
  domainMeaning:
    es: El dominio útil es la vecindad crítica, no temperaturas muy alejadas de la transición.
    en: The useful domain is the critical neighborhood, not temperatures far from the transition.
  modelConnection:
    es: El modelo representa una transición continua ideal con exponentes críticos definidos y sin redondeo de tamaño finito.
    en: The model represents an ideal continuous transition with defined critical exponents and no finite-size rounding.
  formulaConnection:
    es: La curva se conecta con {{f:parametro_orden_ley_critica}} y usa {{f:temperatura_reducida_critica}} para medir la cercanía
      a la temperatura crítica.
    en: The curve connects with {{f:parametro_orden_ley_critica}} and uses {{f:temperatura_reducida_critica}} to measure proximity
      to the critical temperature.
  readingFocus:
    es: Lee primero la temperatura reducida, después el parámetro de orden y finalmente la curvatura que delata el exponente
      crítico.
    en: Read reduced temperature first, then the order parameter, and finally the curvature that reveals the critical exponent.
  agentHints:
    es:
    - Relaciona el acercamiento a la temperatura crítica con la caída del parámetro de orden.
    - Recuerda que susceptibilidad y longitud de correlación crecen aunque no estén en el eje vertical principal.
    - Explica que el exponente crítico controla la forma de la curva, no solo su altura.
    en:
    - Relate approaching the critical temperature to the fall of the order parameter.
    - Remember that susceptibility and correlation length grow even though they are not on the main vertical axis.
    - Explain that the critical exponent controls curve shape, not only its height.
  commonMistakes:
    es:
    - Leer la curva como una recta ordinaria.
    - Interpretar el punto crítico como un dato experimental perfectamente infinito.
    - Olvidar que el signo de la temperatura reducida distingue fases.
    en:
    - Reading the curve as an ordinary straight line.
    - Interpreting the critical point as a perfectly infinite experimental datum.
    - Forgetting that the sign of reduced temperature distinguishes phases.
  curveProfile:
    type: power_law_decay
    expectedShape:
      es: Curva creciente con |t| y que se anula suavemente al acercarse al punto crítico.
      en: Curve increasing with |t| and smoothly vanishing when approaching the critical point.
    keyPoints:
    - x: 0.0
      y: 0.0
      label:
        es: Punto crítico ideal
        en: Ideal critical point
    - x: 0.02
      y: 0.28
      label:
        es: Vecindad crítica
        en: Critical neighborhood
    - x: 0.1
      y: 0.55
      label:
        es: Régimen de escala visible
        en: Visible scaling regime
  dataRange:
    xMin: 0
    xMax: 0.12
    yMin: 0
    yMax: 1
    autoScale: true
    sampleCount: 80
  recommendedTab: graficas
