targets:
  temperatura_reducida:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable reducida que mide distancia relativa a la criticidad
      en: reduced variable measuring relative distance from criticality
    summary_rules:
    - id: temperatura_reducida_summary_criticidad
      when: 'true'
      status: ok
      text:
        es: '[[temperatura_reducida]] mide la distancia relativa a [[temperatura_critica]] y decide si la lectura pertenece
          al lado ordenado, desordenado o crítico.'
        en: '[[temperatura_reducida]] measures the relative distance from [[temperatura_critica]] and decides whether the
          reading belongs to the ordered, disordered, or critical side.'
    physical_reading_rules:
    - id: temperatura_reducida_physical_reading_regimen
      when: 'true'
      status: info
      text:
        es: Interpreta [[temperatura_reducida]] junto con el signo de [[temperatura_reducida]], porque estar por debajo o
          por encima de [[temperatura_critica]] puede cambiar la fase observada.
        en: Interpret [[temperatura_reducida]] together with the sign of [[temperatura_reducida]], because being below or
          above [[temperatura_critica]] can change the observed phase.
    coherence_rules:
    - id: temperatura_reducida_coherence_units_and_scaling
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[temperatura_reducida]] use unidades compatibles y que su tendencia sea coherente con una ley de
          escala cerca de [[temperatura_critica]].
        en: Check that [[temperatura_reducida]] uses compatible units and that its trend is consistent with a scaling law
          near [[temperatura_critica]].
    model_validity_rules:
    - id: temperatura_reducida_model_validity_asymptotic
      when: 'true'
      status: info
      text:
        es: 'Las leyes críticas de [[temperatura_reducida]] son aproximaciones asintóticas: no deben extrapolarse lejos de
          [[temperatura_critica]] ni dentro de regiones dominadas por tamaño finito, impurezas o histéresis.'
        en: 'Critical laws for [[temperatura_reducida]] are asymptotic approximations: they should not be extrapolated far
          from [[temperatura_critica]] or into regions dominated by finite size, impurities, or hysteresis.'
    graph_rules:
    - id: temperatura_reducida_graph_loglog_slope
      when: 'true'
      status: info
      text:
        es: 'En la gráfica Coord, relaciona [[temperatura_reducida]] con [[temperatura_reducida]]: la curvatura o pendiente
          efectiva indica si el comportamiento crítico sigue la ley esperada.'
        en: 'In the Coord graph, relate [[temperatura_reducida]] to [[temperatura_reducida]]: the curvature or effective slope
          indicates whether the critical behavior follows the expected law.'
    likely_errors:
    - id: temperatura_reducida_likely_error_ordinary_divergence
      when: 'true'
      status: warning
      text:
        es: 'Confundir [[temperatura_reducida]] con una lectura aislada es un error frecuente: No confundas [[temperatura_reducida]]
          con [[temperatura]]: es adimensional y su signo localiza el lado de la transición.'
        en: 'Do not confuse [[temperatura_reducida]] with [[temperatura]]: it is dimensionless and its sign locates the side
          of the transition.'
    next_step_rules:
    - id: temperatura_reducida_next_step_compare_regimes
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[temperatura_reducida]], compara el régimen por debajo y por encima de [[temperatura_critica]]
          y revisa qué exponente crítico controla la tendencia.
        en: After interpreting [[temperatura_reducida]], compare the regimes below and above [[temperatura_critica]] and check
          which critical exponent controls the trend.
    physical_intuition:
    - id: temperatura_reducida_physical_intuition_correlations
      when: 'true'
      status: info
      text:
        es: Físicamente, [[temperatura_reducida]] refleja que muchas partes del sistema dejan de comportarse de forma independiente
          cuando aumenta la correlación cerca de la criticidad.
        en: Physically, [[temperatura_reducida]] reflects that many parts of the system stop behaving independently as correlations
          grow near criticality.
    limiting_cases:
    - id: temperatura_reducida_limiting_case_near_far
      when: 'true'
      status: info
      text:
        es: Si [[temperatura_reducida]] se acerca a cero, [[temperatura_reducida]] debe evaluarse con especial cuidado; lejos
          de cero, el comportamiento crítico puede dejar de ser dominante.
        en: If [[temperatura_reducida]] approaches zero, [[temperatura_reducida]] must be evaluated carefully; far from zero,
          critical behavior may no longer dominate.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
