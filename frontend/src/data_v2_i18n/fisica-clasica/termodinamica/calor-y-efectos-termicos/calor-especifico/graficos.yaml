version: "1.0"
leaf: "calor-especifico"

coord:
  title:
    es: Gráfica Coord · Calor Específico
    en: Coord Graph · Specific Heat
  xAxis:
    es: cambio de temperatura ΔT (K)
    en: temperature change ΔT (K)
  yAxis:
    es: calor Q (J)
    en: heat Q (J)
  xMagnitude: deltaT
  yMagnitude: Q
  relation:
    es: "Q = mcΔT. Pendiente = mc. c: calor específico (J/kg·K). Característico de cada material."
    en: "Q = mcΔT. Slope = mc. c: specific heat (J/kg·K). Characteristic of each material."
  physicalReading:
    es: "Mayor c: más calor para mismo ΔT. Pendiente = mc distingue materiales."
    en: "Larger c: more heat for same ΔT. Slope = mc distinguishes materials."
  slopeMeaning:
    es: "dQ/dΔT = mc: capacidad calorífica total."
    en: "dQ/dΔT = mc: total heat capacity."
  interceptMeaning:
    es: "Q(0) = 0: sin cambio de T, sin calor."
    en: "Q(0) = 0: no T change, no heat."
  curvatureMeaning:
    es: "Recta: c constante con T."
    en: "Straight: c constant with T."
  signMeaning:
    es: "Q > 0: calentamiento. Q < 0: enfriamiento."
    en: "Q > 0: heating. Q < 0: cooling."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ΔT real.
    en: ΔT real.
  modelConnection:
    es: "Calor específico: Q = mcΔT."
    en: "Specific heat: Q = mcΔT."
  formulaConnection:
    es: Q = mcΔT, c = Q/(mΔT).
    en: Q = mcΔT, c = Q/(mΔT).
  readingFocus:
    es: leer proporcionalidad y comparar pendientes entre materiales.
    en: read proportionality and compare slopes between materials.
  agentHints:
    es:
      - Pendiente = mc.
      - c del agua = 4186 J/kg·K.
      - Q = mcΔT.
    en:
      - Slope = mc.
      - c of water = 4186 J/kg·K.
      - Q = mcΔT.
  commonMistakes:
    es:
      - c = Q/m.
      - c = Q/ΔT.
      - Confundir c y C.
    en:
      - c = Q/m.
      - c = Q/ΔT.
      - Confusing c and C.
