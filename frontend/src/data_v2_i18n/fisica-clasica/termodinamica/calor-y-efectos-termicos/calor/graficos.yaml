version: "1.0"
leaf: "calor"

coord:
  title:
    es: Gráfica Coord · Calor
    en: Coord Graph · Heat
  xAxis:
    es: temperatura T (°C o K)
    en: temperature T (°C or K)
  yAxis:
    es: calor transferido Q (J)
    en: heat transferred Q (J)
  xMagnitude: T
  yMagnitude: Q
  relation:
    es: "Q = mcΔT. Calor fluye de mayor a menor T. Q > 0: el sistema absorbe. Q < 0: el sistema cede."
    en: "Q = mcΔT. Heat flows from higher to lower T. Q > 0: system absorbs. Q < 0: system releases."
  physicalReading:
    es: "Pendiente = mc. Intercepto: T inicial. Q = 0 en equilibrio térmico."
    en: "Slope = mc. Intercept: initial T. Q = 0 at thermal equilibrium."
  slopeMeaning:
    es: "dQ/dT = mc: producto masa × calor específico."
    en: "dQ/dT = mc: product mass × specific heat."
  interceptMeaning:
    es: "Q(T_0) = 0: sin cambio térmico."
    en: "Q(T_0) = 0: no thermal change."
  curvatureMeaning:
    es: "Recta: c constante."
    en: "Straight: constant c."
  signMeaning:
    es: "Q > 0: absorción. Q < 0: cesión."
    en: "Q > 0: absorption. Q < 0: release."
  areaMeaning:
    es: Sin interpretación directa en Q(T).
    en: No direct interpretation in Q(T).
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: Calor y primer principio de la termodinámica.
    en: Heat and first law of thermodynamics.
  formulaConnection:
    es: Q = mcΔT, ΔU = Q − W.
    en: Q = mcΔT, ΔU = Q − W.
  readingFocus:
    es: leer balance, signo del intercambio y temperatura de equilibrio.
    en: read balance, sign of exchange and equilibrium temperature.
  agentHints:
    es:
      - Q = mcΔT.
      - "Q > 0: absorbe."
      - "Equilibrio: Q_cedido = Q_absorbido."
    en:
      - Q = mcΔT.
      - "Q > 0: absorbs."
      - "Equilibrium: Q_given = Q_absorbed."
  commonMistakes:
    es:
      - Q = mΔT.
      - "Q > 0 siempre."
      - T en °C en PV = nRT.
    en:
      - Q = mΔT.
      - "Q > 0 always."
      - T in °C in PV = nRT.
