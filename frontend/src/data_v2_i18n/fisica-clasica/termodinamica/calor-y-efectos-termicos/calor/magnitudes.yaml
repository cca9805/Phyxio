magnitudes:

  - id: Q
    symbol: Q
    nombre:
      es: Calor
      en: Heat
    descripcion:
      es: Energía transferida entre dos sistemas debido a una diferencia de temperatura. No es una propiedad del sistema sino un proceso de intercambio.
      en: Energy transferred between two systems due to a temperature difference. It is not a property of the system but a transfer process.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - calor sensible
      - calor latente
      - calorimetría
      - primera ley de la termodinámica
    common_mistake: "Confundir calor con temperatura: un cuerpo no 'contiene' calor, el calor es la energía que fluye durante el intercambio."
    typical_range: "Desde decenas de J (taza de café que se enfría) hasta MJ (calefacción de un edificio)."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Q > 0 indica que el sistema absorbe calor del entorno; Q < 0 indica que el sistema cede calor al entorno."
        en: "Q > 0 means the system absorbs heat from the surroundings; Q < 0 means the system releases heat to the surroundings."
    zero_behavior:
      allowed: true
      meaning:
        es: "Q nulo implica proceso adiabático: no hay intercambio neto de calor entre sistema y entorno."
        en: "Q zero implies an adiabatic process: no net heat exchange between system and surroundings."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "any"
    interpretation_role:
      primary_for:
        - lectura de energía transferida en un proceso térmico
        - diagnóstico de absorción o cesión de calor
      secondary_for:
        - cálculo de variación de temperatura asociada
    graph_binding:
      channels:
        - eje_y_calor
    pedagogical_notes:
      es: "El signo de Q es la primera clave de lectura física en cualquier proceso térmico. Distinguir Q de temperatura es el salto conceptual más importante en termodinámica básica."
      en: "The sign of Q is the first physical reading key in any thermal process. Distinguishing Q from temperature is the most important conceptual leap in basic thermodynamics."

  - id: m
    symbol: m
    nombre:
      es: Masa
      en: Mass
    descripcion:
      es: Cantidad de materia del sistema que experimenta el cambio térmico.
      en: Amount of matter in the system undergoing the thermal change.
    unidad_si: kg
    dimension: "[M]"
    is_vector: false
    components: []
    category: fundamental
    physical_role: input_parameter
    used_in:
      - calor sensible
      - calor latente
    common_mistake: "Usar la masa en gramos en lugar de kilogramos cuando el calor específico está en J/(kg·K)."
    typical_range: "0.001 kg (unos gramos de agua) hasta miles de kg en aplicaciones industriales."
    sign_behavior:
      has_sign: false
      meaning:
        es: "La masa es siempre positiva; no tiene interpretación de signo en este contexto."
        en: "Mass is always positive; it carries no sign interpretation in this context."
    zero_behavior:
      allowed: false
      meaning:
        es: "Una masa nula implica que no hay sistema material: el calor transferido sería cero trivialmente."
        en: "Zero mass implies no material system: heat transferred would be trivially zero."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +∞)"
    interpretation_role:
      primary_for:
        - escalado lineal del calor con la cantidad de materia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "La masa actúa como factor de escala lineal del calor: duplicar la masa duplica la energía necesaria para el mismo cambio de temperatura."
      en: "Mass acts as a linear scaling factor for heat: doubling the mass doubles the energy needed for the same temperature change."

  - id: c_esp
    symbol: "c"
    nombre:
      es: Calor específico
      en: Specific heat capacity
    descripcion:
      es: Energía por unidad de masa y de temperatura necesaria para calentar una sustancia sin cambio de estado.
      en: Energy per unit mass and temperature needed to heat a substance without phase change.
    unidad_si: "J/(kg·K)"
    dimension: "[L^2 T^-2 Theta^-1]"
    is_vector: false
    components: []
    category: parameter
    physical_role: material_property
    used_in:
      - calor sensible
      - calorimetría
    common_mistake: "Asumir que el calor específico es el mismo para todos los materiales o que es constante a cualquier temperatura."
    typical_range: "386 J/(kg·K) para cobre, 900 J/(kg·K) para aluminio, 4186 J/(kg·K) para agua líquida."
    sign_behavior:
      has_sign: false
      meaning:
        es: "El calor específico es siempre positivo; el signo de Q lo determina el sentido del proceso, no c."
        en: "Specific heat capacity is always positive; the sign of Q is determined by the direction of the process, not by c."
    zero_behavior:
      allowed: false
      meaning:
        es: "Un calor específico nulo implicaría que el material no absorbe energía, lo cual es físicamente imposible."
        en: "Zero specific heat capacity would imply the material absorbs no energy, which is physically impossible."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +∞)"
    interpretation_role:
      primary_for:
        - comparación de capacidad calorífica entre materiales
        - predicción de velocidad de calentamiento/enfriamiento
      secondary_for:
        - diseño de sistemas de almacenamiento térmico
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "El calor específico del agua es excepcionalmente alto; esta propiedad explica por qué los océanos regulan el clima terrestre y por qué el agua es tan útil como refrigerante."
      en: "Water's specific heat capacity is exceptionally high; this property explains why the oceans regulate Earth's climate and why water is so useful as a coolant."

  - id: DeltaT
    symbol: "\\Delta T"
    nombre:
      es: Variación de temperatura
      en: Temperature change
    descripcion:
      es: Diferencia entre la temperatura final e inicial del sistema durante el proceso de transferencia de calor.
      en: Difference between the final and initial temperature of the system during the heat transfer process.
    unidad_si: K
    dimension: "[Theta]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - calor sensible
      - calorimetría
    common_mistake: "Invertir el orden de la resta (T_inicial − T_final) y obtener el signo contrario del calor."
    typical_range: "Desde fracciones de kelvin en mediciones de precisión hasta cientos de K en procesos industriales."
    sign_behavior:
      has_sign: true
      meaning:
        es: "ΔT > 0 indica que el sistema se calienta (absorbe calor); ΔT < 0 indica que el sistema se enfría (cede calor)."
        en: "ΔT > 0 indicates the system heats up (absorbs heat); ΔT < 0 indicates the system cools down (releases heat)."
    zero_behavior:
      allowed: true
      meaning:
        es: "ΔT nulo indica proceso isotérmico o ausencia de cambio de temperatura; el calor transferido en calor sensible sería nulo, pero puede existir calor latente."
        en: "Zero ΔT indicates an isothermal process or no temperature change; sensible heat would be zero, but latent heat may still exist."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "any"
    interpretation_role:
      primary_for:
        - determinación del sentido de la transferencia de calor
        - cálculo del calor sensible
      secondary_for: []
    graph_binding:
      channels:
        - eje_x_delta_T
    pedagogical_notes:
      es: "ΔT es el indicador directo del sentido del flujo de calor. Su signo es coherente con el signo de Q: ambos son positivos cuando el sistema gana energía térmica."
      en: "ΔT is the direct indicator of the direction of heat flow. Its sign is consistent with the sign of Q: both are positive when the system gains thermal energy."

  - id: L
    symbol: L
    nombre:
      es: Calor latente
      en: Latent heat
    descripcion:
      es: Energía por unidad de masa absorbida o cedida durante un cambio de estado a temperatura constante.
      en: Energy per unit mass absorbed or released during a phase change at constant temperature.
    unidad_si: "J/kg"
    dimension: "[L^2 T^-2]"
    is_vector: false
    components: []
    category: parameter
    physical_role: material_property
    used_in:
      - calor latente
      - cambios de estado
    common_mistake: "Aplicar la fórmula del calor sensible durante un cambio de estado, ignorando que la temperatura permanece constante mientras dura la transición."
    typical_range: "334 000 J/kg para fusión del hielo, 2 260 000 J/kg para vaporización del agua a 100 °C."
    sign_behavior:
      has_sign: false
      meaning:
        es: "L es siempre positivo; el signo del calor total Q depende de si el proceso es endotérmico (fusión, vaporización) o exotérmico (solidificación, condensación)."
        en: "L is always positive; the sign of the total heat Q depends on whether the process is endothermic (melting, vaporization) or exothermic (solidification, condensation)."
    zero_behavior:
      allowed: false
      meaning:
        es: "Un calor latente nulo implicaría que el cambio de estado no requiere energía, lo cual contradice la ruptura de enlaces intermoleculares."
        en: "Zero latent heat would imply a phase change requires no energy, contradicting the breaking of intermolecular bonds."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +∞)"
    interpretation_role:
      primary_for:
        - cálculo de energía en cambios de estado
        - diseño de sistemas de almacenamiento de calor latente
      secondary_for:
        - comparación de transiciones de fase entre materiales
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "El calor latente de vaporización del agua es casi siete veces su calor latente de fusión, lo que explica por qué una quemadura de vapor es mucho más severa que una de agua hirviendo a la misma temperatura."
      en: "Water's latent heat of vaporization is almost seven times its latent heat of fusion, which explains why a steam burn is far more severe than a boiling water burn at the same temperature."
