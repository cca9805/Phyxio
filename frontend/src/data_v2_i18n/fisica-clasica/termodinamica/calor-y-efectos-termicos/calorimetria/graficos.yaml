version: "1.0"
leaf: "calorimetria"

coord:
  title:
    es: Gráfica Coord · Calorimetría
    en: Coord Graph · Calorimetry
  xAxis:
    es: temperatura T (°C)
    en: temperature T (°C)
  yAxis:
    es: calor Q (J)
    en: heat Q (J)
  xMagnitude: T
  yMagnitude: Q
  relation:
    es: "Q_cedido + Q_absorbido = 0. T_eq: temperatura de equilibrio. Q_i = m_i c_i ΔT_i."
    en: "Q_given + Q_absorbed = 0. T_eq: equilibrium temperature. Q_i = m_i c_i ΔT_i."
  physicalReading:
    es: Suma algebraica de calores = 0. Cruces de T indican T_eq.
    en: Algebraic sum of heats = 0. T crossings indicate T_eq.
  slopeMeaning:
    es: Pendiente de cada tramo = m_i c_i.
    en: Slope of each segment = m_i c_i.
  interceptMeaning:
    es: T inicial de cada sustancia.
    en: Initial T of each substance.
  curvatureMeaning:
    es: "Rectas: c constante."
    en: "Straight lines: constant c."
  signMeaning:
    es: "Q > 0: absorbe calor. Q < 0: cede calor."
    en: "Q > 0: absorbs heat. Q < 0: releases heat."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: T hasta T_eq.
    en: T up to T_eq.
  modelConnection:
    es: "Calorimetría: conservación de la energía térmica."
    en: "Calorimetry: conservation of thermal energy."
  formulaConnection:
    es: ΣQ_i = 0, Q = mcΔT.
    en: ΣQ_i = 0, Q = mcΔT.
  readingFocus:
    es: leer T_eq, balance de calores y pendientes de cada sustancia.
    en: read T_eq, heat balance and slopes of each substance.
  agentHints:
    es:
      - ΣQ = 0.
      - "T_eq: intersección."
      - Q_cedido = −Q_absorbido.
    en:
      - ΣQ = 0.
      - "T_eq: intersection."
      - Q_given = −Q_absorbed.
  commonMistakes:
    es:
      - Q_cedido = Q_absorbido (sin signo).
      - Ignorar la masa del calorímetro.
    en:
      - Q_given = Q_absorbed (no sign).
      - Ignoring calorimeter mass.
