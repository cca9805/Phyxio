version: "1.0"
leaf: "cambios-de-estado"

coord:
  title:
    es: Gráfica Coord · Cambios de Estado
    en: Coord Graph · Phase Changes
  xAxis:
    es: calor acumulado Q (J)
    en: cumulative heat Q (J)
  yAxis:
    es: temperatura T (°C)
    en: temperature T (°C)
  xMagnitude: Q
  yMagnitude: T
  relation:
    es: "T(Q): tramos inclinados (Q = mcΔT) y mesetas (Q = mL). Meseta: cambio de fase a T = cte."
    en: "T(Q): inclined segments (Q = mcΔT) and plateaus (Q = mL). Plateau: phase change at constant T."
  physicalReading:
    es: "Meseta horizontal = calor latente L. Tramo inclinado: pendiente = 1/(mc). T constante durante el cambio de fase."
    en: "Horizontal plateau = latent heat L. Inclined segment: slope = 1/(mc). T constant during phase change."
  slopeMeaning:
    es: "dT/dQ = 1/(mc): inverso de la capacidad calorífica."
    en: "dT/dQ = 1/(mc): inverse of heat capacity."
  interceptMeaning:
    es: T inicial del sólido.
    en: Initial T of solid.
  curvatureMeaning:
    es: Cambio de pendiente al cambiar de fase (c diferente).
    en: Slope change when phase changes (different c).
  signMeaning:
    es: "Q > 0: calentamiento/fusión/vaporización."
    en: "Q > 0: heating/melting/vaporization."
  areaMeaning:
    es: Longitud de meseta = Q_latente = mL.
    en: Plateau length = Q_latent = mL.
  domainMeaning:
    es: Q ≥ 0.
    en: Q ≥ 0.
  modelConnection:
    es: Calor sensible y latente. Cambios de fase.
    en: Sensible and latent heat. Phase changes.
  formulaConnection:
    es: Q = mcΔT (tramos), Q = mL (mesetas).
    en: Q = mcΔT (segments), Q = mL (plateaus).
  readingFocus:
    es: leer mesetas (L) y tramos inclinados (c) e identificar las fases.
    en: read plateaus (L) and inclined segments (c) and identify phases.
  agentHints:
    es:
      - Meseta = Q_latente.
      - Tramo = Q_sensible.
      - T = cte en cambio de fase.
    en:
      - Plateau = Q_latent.
      - Segment = Q_sensible.
      - T = const during phase change.
  commonMistakes:
    es:
      - T sube siempre.
      - L = c.
      - Confundir calor latente y sensible.
    en:
      - T always rises.
      - L = c.
      - Confusing latent and sensible heat.
