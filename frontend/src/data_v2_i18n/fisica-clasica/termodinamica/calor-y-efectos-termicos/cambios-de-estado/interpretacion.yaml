version: "5.0"
id: interp_cambios_de_estado
leaf_id: cambios-de-estado

nombre:
  es: Interpretacin de los cambios de estado
  en: Interpretation of phase changes

scope:
  area: fisica-clasica
  bloque: termodinamica
  subbloque: calor-y-efectos-termicos
  parent_id: calor-y-efectos-termicos
  ruta_relativa: fisica-clasica/termodinamica/calor-y-efectos-termicos/cambios-de-estado

ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretacin
    en: Interpretation
  priority_order:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step
  inline_limits:
    max_blocks: 3
    max_rules_per_block: 2

dependencies:
  formulas:
    - calor_latente_general
    - temperatura_transicion_constante
    - calor_latente_fusion
    - calor_latente_vaporizacion
  magnitudes:
    - Q_lat
    - L
    - m
    - T_trans

global_context:
  physical_domain:
    es: "Transiciones entre estados de la materia a temperatura constante mediante intercambio de calor latente. El calor no produce variacin de temperatura sino cambio de estructura molecular."
    en: "Transitions between states of matter at constant temperature through latent heat exchange. Heat does not produce temperature change but changes molecular structure."
  axis_convention:
    es: "Q_lat > 0 si la sustancia absorbe calor (endotrmica: fusin, vaporizacin, sublimacin). Q_lat < 0 si la sustancia cede calor (exotrmica: solidificacin, condensacin, deposicin)."
    en: "Q_lat > 0 if the substance absorbs heat (endothermic: melting, vaporization, sublimation). Q_lat < 0 if the substance releases heat (exothermic: solidification, condensation, deposition)."
  standard_assumptions:
    - "Proceso a presin constante"
    - "Temperatura constante e igual a T_trans durante toda la transicin"
    - "L constante en el rango de presin del problema"
    - "Transicin completa: toda la masa m cambia de estado (salvo mencin explcita de transicin parcial)"
  standard_warnings:
    - "No confundir calor latente de fusin L_f con calor latente de vaporizacin L_v: difieren en un factor 510"
    - "Durante un cambio de estado, la temperatura permanece constante aunque se siga suministrando calor"
    - "L_v depende de la presin; usar el valor tabulado a la presin del problema"

result_blocks:
  summary:
    enabled: true
    order: 1
    title:
      es: Resumen
      en: Summary
  physical_reading:
    enabled: true
    order: 2
    title:
      es: Lectura fsica
      en: Physical reading
  coherence:
    enabled: true
    order: 3
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    enabled: true
    order: 4
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    enabled: true
    order: 5
    title:
      es: Lectura grfica
      en: Graph reading
  likely_errors:
    enabled: true
    order: 6
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    enabled: true
    order: 7
    title:
      es: Siguiente paso
      en: Next step

targets:

  Q_lat:
    magnitude_type: scalar_signed
    semantic_role:
      es: "Energa total intercambiada durante el cambio de estado; variable de proceso sin cambio de temperatura asociado."
      en: "Total energy exchanged during the phase change; process variable with no associated temperature change."
    summary_rules:
      - id: Q_lat_summary_fusion
        when: "Q_lat > 0 ? tipo == fusion : false"
        status: ok
        text:
          es: "[[Q_lat]] positivo indica que la sustancia absorbe energa para fundirse. La temperatura se mantiene constante a [[T_trans]] mientras dura la fusin, independientemente de cunto calor adicional se suministre."
          en: "Positive [[Q_lat]] indicates the substance absorbs energy to melt. Temperature remains constant at [[T_trans]] throughout the melting process, regardless of how much additional heat is supplied."
      - id: Q_lat_summary_vaporizacion
        when: "Q_lat > 0 ? tipo == vaporizacion : false"
        status: ok
        text:
          es: "[[Q_lat]] positivo indica que la sustancia absorbe energa para vaporizarse. Este calor se destina a romper las fuerzas intermoleculares del lquido; la temperatura permanece constante a [[T_trans]] durante toda la vaporizacin."
          en: "Positive [[Q_lat]] indicates the substance absorbs energy to vaporize. This heat breaks the intermolecular forces of the liquid; temperature remains constant at [[T_trans]] throughout vaporization."
      - id: Q_lat_summary_solidificacion
        when: "Q_lat < 0"
        status: ok
        text:
          es: "[[Q_lat]] negativo indica que la sustancia cede calor al entorno durante una transicin exotrmica (solidificacin o condensacin). La temperatura se mantiene constante a [[T_trans]] mientras dura la transicin."
          en: "Negative [[Q_lat]] indicates the substance releases heat to the surroundings during an exothermic transition (solidification or condensation). Temperature remains constant at [[T_trans]] throughout the transition."
      - id: Q_lat_summary_default
        when: "true"
        status: ok
        text:
          es: "[[Q_lat]] es la energa total de transicin de fase para la masa [[m]] de sustancia. Su valor es [[m]]  [[L]] donde [[L]] es el calor latente especfico del material para esta transicin."
          en: "[[Q_lat]] is the total phase transition energy for mass [[m]] of substance. Its value is [[m]]  [[L]] where [[L]] is the specific latent heat of the material for this transition."
    physical_reading_rules:
      - id: Q_lat_reading_microscopic
        when: "true"
        status: ok
        text:
          es: "La energa [[Q_lat]] no se usa para acelerar las molculas (lo que aumentara la temperatura) sino para modificar la estructura molecular: separar los tomos del cristal en la fusin, o vencer las fuerzas de cohesin del lquido en la vaporizacin. Por eso la temperatura no vara durante el proceso."
          en: "The energy [[Q_lat]] is not used to accelerate molecules (which would raise temperature) but to modify molecular structure: separating atoms from the crystal lattice during melting, or overcoming the cohesive forces of the liquid during vaporization. This is why temperature does not change during the process."
    coherence_rules:
      - id: Q_lat_coherence_zero
        when: "Q_lat == 0"
        status: error
        text:
          es: "[[Q_lat]] nulo es incompatible con un cambio de estado real. Verificar que [[m]] > 0 y [[L]] > 0."
          en: "Zero [[Q_lat]] is incompatible with a real phase change. Verify that [[m]] > 0 and [[L]] > 0."
      - id: Q_lat_coherence_sign_direction
        when: "true"
        status: ok
        text:
          es: "El signo de [[Q_lat]] debe ser coherente con la direccin de la transicin: positivo para transiciones endotrmicas (fusin, vaporizacin, sublimacin) y negativo para exotrmicas (solidificacin, condensacin, deposicin)."
          en: "The sign of [[Q_lat]] must be consistent with the direction of the transition: positive for endothermic transitions (melting, vaporization, sublimation) and negative for exothermic ones (solidification, condensation, deposition)."
    model_validity_rules:
      - id: Q_lat_validity_complete_transition
        when: "true"
        status: ok
        text:
          es: "La frmula [[Q_lat]] = [[m]]  [[L]] es vlida para la transicin completa de toda la masa [[m]]. Si la energa disponible es inferior a [[m]]  [[L]], solo cambia de estado una fraccin de masa igual a Q_lat_disponible / [[L]] y el sistema queda a [[T_trans]] con dos fases coexistiendo."
          en: "The formula [[Q_lat]] = [[m]]  [[L]] is valid for the complete transition of the entire mass [[m]]. If the available energy is less than [[m]]  [[L]], only a fraction of mass equal to Q_lat_available / [[L]] changes state and the system remains at [[T_trans]] with two coexisting phases."
    graph_rules:
      - id: Q_lat_graph_plateau
        when: "true"
        status: ok
        text:
          es: "En la grfica de temperatura frente al calor suministrado acumulado, [[Q_lat]] corresponde al tramo horizontal (meseta) a temperatura [[T_trans]]. La anchura horizontal de la meseta es exactamente [[Q_lat]] = [[m]]  [[L]]. Cuanto mayor [[L]], ms ancha la meseta."
          en: "In the graph of temperature vs. cumulative heat supplied, [[Q_lat]] corresponds to the horizontal segment (plateau) at temperature [[T_trans]]. The horizontal width of the plateau is exactly [[Q_lat]] = [[m]]  [[L]]. The larger [[L]], the wider the plateau."
    likely_errors:
      - id: Q_lat_error_temperature_during
        when: "true"
        status: ok
        text:
          es: "Error frecuente: suponer que la temperatura sigue subiendo mientras se suministra [[Q_lat]]. Durante el cambio de estado, toda la energa se destina al cambio de estructura molecular y la temperatura permanece exactamente constante a [[T_trans]]."
          en: "Common error: assuming temperature continues to rise while [[Q_lat]] is supplied. During the phase change, all energy goes to changing molecular structure and temperature remains exactly constant at [[T_trans]]."
    next_step_rules:
      - id: Q_lat_next_complete_process
        when: "true"
        status: ok
        text:
          es: "Si el problema involucra un proceso completo de calentamiento con cambio de estado, el calor total es la suma de los calores sensibles de cada fase (usando [[m]]  c  DeltaT para cada tramo) ms [[Q_lat]] del cambio de estado. Verificar con un diagrama de tramos."
          en: "If the problem involves a complete heating process with phase change, the total heat is the sum of sensible heats for each phase (using [[m]]  c  DeltaT for each segment) plus [[Q_lat]] for the phase change. Verify with a segment diagram."

  L:
    magnitude_type: scalar_unsigned
    semantic_role:
      es: "Calor latente especfico del material para la transicin dada; propiedad intensiva que caracteriza la energa de la transicin por unidad de masa."
      en: "Specific latent heat of the material for the given transition; intensive property characterizing the transition energy per unit mass."
    summary_rules:
      - id: L_summary_water_fusion
        condition:
          variable: L
          gt: 330000
          lt: 340000
        status: ok
        text:
          es: "[[L]] est en el rango del calor latente de fusin del agua (334 000 J/kg). Si el material es hielo/agua, el valor es consistente con el dato tabulado estndar."
          en: "[[L]] is in the range of the latent heat of fusion of water (334 000 J/kg). If the material is ice/water, the value is consistent with the standard tabulated datum."
      - id: L_summary_water_vap
        condition:
          variable: L
          gt: 2200000
          lt: 2300000
        status: ok
        text:
          es: "[[L]] est en el rango del calor latente de vaporizacin del agua (2 260 000 J/kg a 100 C). Si el material es agua, el valor es consistente con el dato tabulado a presin estndar."
          en: "[[L]] is in the range of the latent heat of vaporization of water (2 260 000 J/kg at 100 C). If the material is water, the value is consistent with the tabulated datum at standard pressure."
      - id: L_summary_default
        when: "true"
        status: ok
        text:
          es: "[[L]] es la energa por kilogramo necesaria para completar la transicin de fase de este material. Multiplicado por [[m]], da el calor latente total [[Q_lat]] de la muestra."
          en: "[[L]] is the energy per kilogram needed to complete the phase transition of this material. Multiplied by [[m]], it gives the total latent heat [[Q_lat]] of the sample."
    physical_reading_rules:
      - id: L_reading_molecular
        when: "true"
        status: ok
        text:
          es: "[[L]] refleja la fortaleza de las fuerzas intermoleculares que deben romperse durante la transicin. Materiales con enlaces ms fuertes tienen [[L]] mayor. El agua tiene un [[L]] de vaporizacin excepcionalmente alto debido a sus puentes de hidrgeno, lo que la hace un refrigerante y regulador trmico extraordinariamente eficaz."
          en: "[[L]] reflects the strength of the intermolecular forces that must be broken during the transition. Materials with stronger bonds have larger [[L]]. Water has an exceptionally high vaporization [[L]] due to its hydrogen bonds, making it an extraordinarily effective coolant and thermal regulator."
    coherence_rules:
      - id: L_coherence_negative
        when: "L < 0"
        status: error
        text:
          es: "[[L]] negativo es fsicamente imposible. Es una propiedad intensiva siempre positiva del material. Revisar el planteamiento: el signo del proceso se refleja en [[Q_lat]], no en [[L]]."
          en: "Negative [[L]] is physically impossible. It is always a positive intensive property of the material. Check the setup: the sign of the process is reflected in [[Q_lat]], not in [[L]]."
      - id: L_coherence_vap_vs_fus
        when: "L < 50000"
        status: warning
        text:
          es: "[[L]] muy pequeo (inferior a 50 000 J/kg) es inusual para materiales comunes. Verificar las unidades: si L est en J/g en lugar de J/kg, el valor debe multiplicarse por 1000."
          en: "Very small [[L]] (below 50 000 J/kg) is unusual for common materials. Check units: if L is in J/g instead of J/kg, the value must be multiplied by 1000."
      - id: L_coherence_default
        when: "true"
        status: ok
        text:
          es: "[[L]] es positivo y dentro del rango fsicamente razonable para el material y tipo de transicin indicados."
          en: "[[L]] is positive and within the physically reasonable range for the indicated material and transition type."
    model_validity_rules:
      - id: L_validity_pressure
        when: "true"
        status: ok
        text:
          es: "El valor de [[L]] es vlido a la presin del problema. Para [[L]] de fusin, la variacin con la presin es pequea y normalmente despreciable. Para [[L]] de vaporizacin, la variacin con la presin es significativa: a presiones muy distintas de la estndar, usar el valor de [[L]] a la presin de operacin."
          en: "The value of [[L]] is valid at the pressure of the problem. For melting [[L]], the variation with pressure is small and usually negligible. For vaporization [[L]], the variation with pressure is significant: at pressures very different from standard, use the value of [[L]] at the operating pressure."
    graph_rules:
      - id: L_graph_plateau_width
        when: "true"
        status: ok
        text:
          es: "En la grfica T vs calor suministrado, [[L]] determina la anchura relativa de la meseta del cambio de estado (dividida por [[m]]). Un material con [[L]] grande tendr una meseta proporcionalmente ms ancha que un tramo de calentamiento sensible con el mismo calor suministrado."
          en: "In the T vs. heat supplied graph, [[L]] determines the relative width of the phase change plateau (divided by [[m]]). A material with large [[L]] will have a proportionally wider plateau than a sensible heating segment with the same supplied heat."
    likely_errors:
      - id: L_error_swap_fus_vap
        when: "true"
        status: ok
        text:
          es: "Error muy frecuente: usar [[L]] de fusin cuando el problema involucra vaporizacin, o viceversa. Para el agua, L_v / L_f  6.8. Si el resultado parece unas 7 veces demasiado pequeo o demasiado grande, es probable que se hayan intercambiado L_f y L_v."
          en: "Very common error: using [[L]] for melting when the problem involves vaporization, or vice versa. For water, L_v / L_f  6.8. If the result seems about 7 times too small or too large, L_f and L_v have likely been swapped."
    next_step_rules:
      - id: L_next_default
        when: "true"
        status: ok
        text:
          es: "Con [[L]] determinado, calcular [[Q_lat]] = [[m]]  [[L]] e incorporarlo al balance calorimtrico total como un tramo adicional a temperatura constante [[T_trans]]. Si [[L]] es incgnita, despejarlo como [[L]] = [[Q_lat]] / [[m]]."
          en: "With [[L]] determined, compute [[Q_lat]] = [[m]]  [[L]] and incorporate it into the total calorimetric balance as an additional segment at constant temperature [[T_trans]]. If [[L]] is the unknown, solve as [[L]] = [[Q_lat]] / [[m]]."

  m:
    magnitude_type: scalar_unsigned
    semantic_role:
      es: "Masa de la sustancia que completa la transicin de fase; puede ser dato o incgnita segn el tipo de problema."
      en: "Mass of the substance that completes the phase transition; can be given data or unknown depending on the problem type."
    summary_rules:
      - id: m_summary_default
        when: "true"
        status: ok
        text:
          es: "[[m]] determina el calor latente total [[Q_lat]] de forma lineal: duplicar [[m]] duplica [[Q_lat]]. En problemas donde la energa disponible es limitada, [[m]] que cambia de estado puede ser inferior a la masa total si no hay energa suficiente para completar la transicin."
          en: "[[m]] determines the total latent heat [[Q_lat]] linearly: doubling [[m]] doubles [[Q_lat]]. In problems where available energy is limited, the [[m]] that changes state may be less than the total mass if there is not enough energy to complete the transition."
    physical_reading_rules:
      - id: m_reading_partial
        when: "true"
        status: ok
        text:
          es: "Si la energa disponible Q_disponible es menor que m_total  [[L]], solo cambia de estado la fraccin m_cambia = Q_disponible / [[L]]. El sistema queda a [[T_trans]] con m_cambia en la nueva fase y el resto en la fase original. Esta situacin de equilibrio bifsico es fsica y termodinmicamente estable."
          en: "If the available energy Q_available is less than m_total  [[L]], only the fraction m_changes = Q_available / [[L]] changes state. The system remains at [[T_trans]] with m_changes in the new phase and the rest in the original phase. This two-phase equilibrium situation is physically and thermodynamically stable."
    coherence_rules:
      - id: m_coherence_positive
        when: "m <= 0"
        status: error
        text:
          es: "[[m]] debe ser estrictamente positiva. Una masa nula o negativa no tiene sentido fsico para la sustancia que cambia de estado."
          en: "[[m]] must be strictly positive. Zero or negative mass has no physical meaning for the substance undergoing the phase change."
      - id: m_coherence_default
        when: "true"
        status: ok
        text:
          es: "[[m]] es positiva y consistente con el problema planteado."
          en: "[[m]] is positive and consistent with the problem as stated."
    model_validity_rules:
      - id: m_validity_total
        when: "true"
        status: ok
        text:
          es: "El modelo asume que toda la masa [[m]] completa la transicin. Si la energa disponible es insuficiente, la masa que cambia de estado es m_parcial = Q_disponible / [[L]], y el sistema queda a [[T_trans]] con mezcla de fases."
          en: "El modelo asume que toda la masa [[m]] completa la transicin. Si la energa disponible es insuficiente, la masa que cambia de estado es m_parcial = Q_disponible / [[L]], y el sistema queda a [[T_trans]] con mezcla de fases."
    graph_rules:
      - id: m_graph_plateau_width
        when: "true"
        status: ok
        text:
          es: "En la grfica T vs calor suministrado, la anchura de la meseta del cambio de estado es proporcional a [[m]]. Duplicar [[m]] duplica la anchura de la meseta a [[T_trans]]."
          en: "In the T vs. heat supplied graph, the width of the phase change plateau is proportional to [[m]]. Doubling [[m]] doubles the width of the plateau at [[T_trans]]."
    likely_errors:
      - id: m_error_grams
        when: "m < 0.01"
        status: warning
        text:
          es: "[[m]] muy pequea. Verificar si el valor est en gramos en lugar de kilogramos. Con [[L]] en J/kg, [[m]] debe estar en kg."
          en: "Very small [[m]]. Check whether the value is in grams instead of kilograms. With [[L]] in J/kg, [[m]] must be in kg."
      - id: m_error_default
        when: "true"
        status: ok
        text:
          es: "Error frecuente en problemas de calorimetra con cambio de estado: suponer que toda la masa cambia de estado cuando la energa disponible puede ser insuficiente. Siempre verificar si Q_disponible  [[m]]  [[L]] antes de aplicar la frmula completa."
          en: "Common error in calorimetry problems with phase change: assuming all the mass changes state when the available energy may be insufficient. Always verify whether Q_available  [[m]]  [[L]] before applying the full formula."
    next_step_rules:
      - id: m_next_default
        when: "true"
        status: ok
        text:
          es: "Con [[m]] determinada, calcular [[Q_lat]] = [[m]]  [[L]] e incluirlo en el balance calorimtrico global. Si [[m]] es la incgnita de cunta masa puede cambiar de estado con una energa disponible dada, despejar [[m]] = Q_disponible / [[L]]."
          en: "With [[m]] determined, compute [[Q_lat]] = [[m]]  [[L]] and include it in the overall calorimetric balance. If [[m]] is the unknown for how much mass can change state with a given available energy, solve [[m]] = Q_available / [[L]]."

  T_trans:
    magnitude_type: scalar
    semantic_role:
      es: "Temperatura constante de coexistencia de fases durante el cambio de estado."
      en: "Constant phase-coexistence temperature during the phase change."
    summary_rules:
      - id: T_trans_summary_default
        when: "true"
        status: ok
        text:
          es: "[[T_trans]] fija la temperatura de la meseta: mientras haya dos fases, el calor cambia estado y no temperatura."
          en: "[[T_trans]] fixes the plateau temperature: while two phases remain, heat changes state rather than temperature."
    physical_reading_rules:
      - id: T_trans_reading_plateau
        when: "true"
        status: ok
        text:
          es: "Una lectura estable en [[T_trans]] indica coexistencia de fases; el ancho de esa meseta esta controlado por [[Q_lat]]."
          en: "A stable reading at [[T_trans]] indicates phase coexistence; the width of that plateau is controlled by [[Q_lat]]."
    coherence_rules:
      - id: T_trans_coherence_phase
        when: "true"
        status: ok
        text:
          es: "Si la temperatura cambia mientras se afirma que hay dos fases, revisar el modelo o la pureza de la sustancia."
          en: "If temperature changes while two phases are assumed, check the model or the purity of the substance."
    model_validity_rules:
      - id: T_trans_validity_pressure
        when: "true"
        status: ok
        text:
          es: "[[T_trans]] depende de presion y composicion; no usar valores de agua pura para soluciones o alta presion."
          en: "[[T_trans]] depends on pressure and composition; do not use pure-water values for solutions or high pressure."
    graph_rules:
      - id: T_trans_graph_height
        when: "true"
        status: ok
        text:
          es: "En la grafica temperatura-calor, [[T_trans]] es la altura de la meseta horizontal."
          en: "In the temperature-heat graph, [[T_trans]] is the height of the horizontal plateau."
    likely_errors:
      - id: T_trans_error_wrong_value
        when: "true"
        status: ok
        text:
          es: "Error frecuente: usar [[T_trans]] estandar cuando el enunciado cambia presion, pureza o material."
          en: "Common error: using a standard [[T_trans]] when the statement changes pressure, purity, or material."
    next_step_rules:
      - id: T_trans_next_balance
        when: "true"
        status: ok
        text:
          es: "Con [[T_trans]] identificada, separar el balance en tramos sensibles y tramo latente."
          en: "Once [[T_trans]] is identified, split the balance into sensible segments and the latent segment."

cross_checks:
  - id: energy_sufficient_for_full_transition
    check: "Verificar que la energa disponible es al menos igual a m  L antes de asumir transicin completa"
    action: "Si Q_disponible < m  L, calcular la masa parcial que cambia de estado como m_parcial = Q_disponible / L y el sistema queda a T_trans"
  - id: L_type_matches_transition
    check: "El tipo de L (fusin o vaporizacin) debe coincidir con la transicin descrita en el problema"
    action: "Si el problema describe ebullicin pero se us L_f en lugar de L_v, recalcular con el valor correcto"

error_patterns:
  - id: temperature_rises_during_phase_change
    description:
      es: "El alumno supone que la temperatura sigue subiendo mientras la sustancia cambia de estado."
      en: "The student assumes temperature continues to rise while the substance undergoes phase change."
  - id: swap_L_fusion_vaporization
    description:
      es: "Se usa el calor latente de fusin para un problema de vaporizacin, o viceversa."
      en: "The latent heat of fusion is used for a vaporization problem, or vice versa."
  - id: insufficient_energy_ignored
    description:
      es: "Se asume transicin completa sin verificar si la energa disponible es suficiente para Q_lat = m  L."
      en: "Complete transition is assumed without checking whether available energy is sufficient for Q_lat = m  L."

graph_binding:
  tipo: Coord
  eje_x: Q_acumulado
  eje_y: T_trans
  magnitud_estrella: Q_lat

mini_graph:
  enabled: true
  preferred_type: Coord

output_contract:
  sections:
    - summary
    - physical_reading
    - coherence
    - model_validity
    - graph_reading
    - likely_errors
    - next_step
  inline_mode:
    max_sections: 2
    priority:
      - summary
      - likely_errors
  extended_mode:
    show_all: true
