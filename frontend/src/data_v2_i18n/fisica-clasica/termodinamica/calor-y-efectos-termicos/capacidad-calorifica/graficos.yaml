version: "1.0"
leaf: "capacidad-calorifica"

coord:
  title:
    es: Gráfica Coord · Capacidad Calorífica
    en: Coord Graph · Heat Capacity
  xAxis:
    es: cambio de temperatura ΔT (K)
    en: temperature change ΔT (K)
  yAxis:
    es: calor Q (J)
    en: heat Q (J)
  xMagnitude: deltaT
  yMagnitude: Q
  relation:
    es: "Q = CΔT. C = mc: capacidad calorífica total del cuerpo. Pendiente = C."
    en: "Q = CΔT. C = mc: total heat capacity of the body. Slope = C."
  physicalReading:
    es: "Mayor C: necesita más calor para cada kelvin. Pendiente = C distingue cuerpos."
    en: "Larger C: needs more heat per kelvin. Slope = C distinguishes bodies."
  slopeMeaning:
    es: "dQ/dΔT = C: capacidad calorífica."
    en: "dQ/dΔT = C: heat capacity."
  interceptMeaning:
    es: Q(0) = 0.
    en: Q(0) = 0.
  curvatureMeaning:
    es: "Recta: C constante."
    en: "Straight: C constant."
  signMeaning:
    es: "Q > 0: calentamiento. Q < 0: enfriamiento."
    en: "Q > 0: heating. Q < 0: cooling."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: ΔT real.
    en: ΔT real.
  modelConnection:
    es: "Capacidad calorífica: C = mc."
    en: "Heat capacity: C = mc."
  formulaConnection:
    es: Q = CΔT = mcΔT, C = mc.
    en: Q = CΔT = mcΔT, C = mc.
  readingFocus:
    es: leer la pendiente C y comparar entre cuerpos.
    en: read slope C and compare between bodies.
  agentHints:
    es:
      - C = mc.
      - Pendiente = C.
      - C distinta de c.
    en:
      - C = mc.
      - Slope = C.
      - C distinct from c.
  commonMistakes:
    es:
      - C = c.
      - C no depende de m.
      - C = Q.
    en:
      - C = c.
      - C independent of m.
      - C = Q.
