version: "1.0"
leaf: "dilatacion"

coord:
  title:
    es: Gráfica Coord · Dilatación Térmica
    en: Coord Graph · Thermal Expansion
  xAxis:
    es: temperatura T (°C o K)
    en: temperature T (°C or K)
  yAxis:
    es: longitud L (m) o volumen V (m³)
    en: length L (m) or volume V (m³)
  xMagnitude: T
  yMagnitude: L
  relation:
    es: L = L₀(1 + αΔT). V = V₀(1 + βΔT). β ≈ 3α. Rectas con pendiente L₀α o V₀β.
    en: L = L₀(1 + αΔT). V = V₀(1 + βΔT). β ≈ 3α. Lines with slope L₀α or V₀β.
  physicalReading:
    es: "Pendiente = L₀α. Intercepto = L₀. Mayor α: mayor dilatación por grado."
    en: "Slope = L₀α. Intercept = L₀. Larger α: more expansion per degree."
  slopeMeaning:
    es: "dL/dT = L₀α: producto longitud inicial × coeficiente lineal."
    en: "dL/dT = L₀α: product initial length × linear coefficient."
  interceptMeaning:
    es: "L(T_0) = L₀: longitud de referencia."
    en: "L(T_0) = L₀: reference length."
  curvatureMeaning:
    es: "Recta: α constante."
    en: "Straight: constant α."
  signMeaning:
    es: "L > 0 siempre. ΔL > 0: dilatación. ΔL < 0: contracción."
    en: "L > 0 always. ΔL > 0: expansion. ΔL < 0: contraction."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: Dilatación lineal y volumétrica.
    en: Linear and volumetric expansion.
  formulaConnection:
    es: ΔL = L₀αΔT, ΔV = V₀βΔT, β ≈ 3α.
    en: ΔL = L₀αΔT, ΔV = V₀βΔT, β ≈ 3α.
  readingFocus:
    es: leer pendiente = L₀α y comparar coeficientes entre materiales.
    en: read slope = L₀α and compare coefficients between materials.
  agentHints:
    es:
      - ΔL = L₀αΔT.
      - β = 3α.
      - Pendiente = L₀α.
    en:
      - ΔL = L₀αΔT.
      - β = 3α.
      - Slope = L₀α.
  commonMistakes:
    es:
      - β = α.
      - Ignorar L₀.
      - ΔL = αΔT.
    en:
      - β = α.
      - Ignoring L₀.
      - ΔL = αΔT.
