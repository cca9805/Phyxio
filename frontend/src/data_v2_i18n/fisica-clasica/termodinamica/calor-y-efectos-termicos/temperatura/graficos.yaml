version: "1.0"
leaf: "temperatura"

coord:
  title:
    es: Gráfica Coord · Temperatura
    en: Coord Graph · Temperature
  xAxis:
    es: escala de temperatura (K, °C)
    en: temperature scale (K, °C)
  yAxis:
    es: propiedad termométrica del sistema
    en: thermometric property of the system
  xMagnitude: T
  yMagnitude: T
  relation:
    es: "T(K) = T(°C) + 273.15. Cero absoluto: 0 K. Equilibrio: T_A = T_B ⇒ sin flujo de calor."
    en: "T(K) = T(°C) + 273.15. Absolute zero: 0 K. Equilibrium: T_A = T_B ⇒ no heat flow."
  physicalReading:
    es: Recta de conversión. Cero absoluto a −273.15 °C. T mide E_k media de partículas.
    en: Conversion line. Absolute zero at −273.15 °C. T measures mean E_k of particles.
  slopeMeaning:
    es: "dK/d°C = 1: misma escala de grado."
    en: "dK/d°C = 1: same degree scale."
  interceptMeaning:
    es: "273.15: desplazamiento Celsius–Kelvin."
    en: "273.15: Celsius–Kelvin offset."
  curvatureMeaning:
    es: "Recta: conversión lineal."
    en: "Straight: linear conversion."
  signMeaning:
    es: "T ≥ 0 K. T < 0 K: imposible."
    en: "T ≥ 0 K. T < 0 K: impossible."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: T ≥ 0 K.
    en: T ≥ 0 K.
  modelConnection:
    es: Temperatura y escalas termétricas.
    en: Temperature and thermometric scales.
  formulaConnection:
    es: T(K) = T(°C) + 273.15, PV = nRT.
    en: T(K) = T(°C) + 273.15, PV = nRT.
  readingFocus:
    es: leer conversión de escalas y cero absoluto.
    en: read scale conversion and absolute zero.
  agentHints:
    es:
      - T(K) = T(°C)+273.15.
      - "Cero abs: 0 K = −273.15 °C."
      - PV=nRT usa K.
    en:
      - T(K) = T(°C)+273.15.
      - "Abs zero: 0 K = −273.15 °C."
      - PV=nRT uses K.
  commonMistakes:
    es:
      - T en °C en PV=nRT.
      - 0 K = 0 °C.
      - Escala Kelvin negativa.
    en:
      - T in °C in PV=nRT.
      - 0 K = 0 °C.
      - Negative Kelvin scale.
