magnitudes:

  - id: T_K
    symbol: "T"

    nombre:
      es: Temperatura en kelvin
      en: Temperature in kelvin

    descripcion:
      es: "Temperatura absoluta medida en la escala termodinámica internacional (SI). El cero de la escala kelvin coincide con el cero absoluto, el punto de mínima energía térmica."
      en: "Absolute temperature measured on the international thermodynamic (SI) scale. The zero of the kelvin scale coincides with absolute zero, the point of minimum thermal energy."

    unidad_si: K
    dimension: "[Θ]"

    is_vector: false
    components: []

    category: fundamental
    physical_role: "Magnitud de estado que cuantifica la agitación media de las partículas del sistema."

    used_in:
      - conversiones entre escalas de temperatura
      - leyes de gases ideales
      - radiación de cuerpo negro (ley de Stefan-Boltzmann)
      - cálculos de calor específico y dilatación térmica
      - termodinámica estadística

    common_mistake: "Usar grados Celsius directamente en fórmulas que exigen temperatura absoluta (ley de gases, radiación). El error produce resultados incorrectos porque T_C puede ser negativo o cero sin que el sistema esté en el cero absoluto."

    typical_range: "273 K (0 °C, punto de fusión del agua) a 373 K (100 °C, ebullición del agua). Rango útil en física clásica: 1 K (helio líquido) a 6000 K (superficie solar)."

    sign_behavior:
      has_sign: false
      meaning:
        es: "T_K es siempre positiva o nula. Un valor de T_K cero corresponde al cero absoluto (0 K), que es el límite inferior teórico. No existen temperaturas negativas en la escala kelvin en termodinámica clásica."
        en: "T_K is always positive or zero. A value of T_K equal to zero corresponds to absolute zero (0 K), which is the theoretical lower limit. Negative temperatures do not exist on the kelvin scale in classical thermodynamics."

    zero_behavior:
      allowed: true
      meaning:
        es: "T_K igual a cero corresponde al cero absoluto. En la práctica nunca se alcanza exactamente; el tercero principio de la termodinámica lo prohíbe. Un sistema a 0 K tendría energía cinética traslacional nula de sus partículas."
        en: "T_K equal to zero corresponds to absolute zero. In practice it is never exactly reached; the third law of thermodynamics forbids it. A system at 0 K would have zero translational kinetic energy of its particles."

    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[0, +∞) K (en práctica, > 0 K)"

    interpretation_role:
      primary_for:
        - conversión a Celsius
        - conversión a Fahrenheit
        - lectura del estado térmico absoluto del sistema
      secondary_for:
        - comparación con temperaturas de referencia (fusión, ebullición)
        - análisis de equilibrio térmico

    graph_binding:
      channels:
        - axis_y: "T_K como variable dependiente en gráficas de conversión"
        - axis_x: "T_C o T_F como variable independiente al comparar escalas"

    pedagogical_notes:
      es: "La escala kelvin es la única que refleja la temperatura termodinámica real. Cuando un alumno usa T_C en fórmulas de gases o radiación, introduce un error sistemático que puede ser enorme: a -100 °C (173 K) el error de confundir T_C con T_K es de un factor 1.73 sobre el resultado. Es imprescindible que el alumno distinga entre variación de temperatura (donde Celsius y kelvin son equivalentes) y temperatura absoluta (donde solo sirve kelvin)."
      en: "The kelvin scale is the only one that reflects the true thermodynamic temperature. When a student uses T_C in gas or radiation formulas, they introduce a systematic error that can be enormous: at -100 °C (173 K), confusing T_C with T_K produces a factor-1.73 error in the result. It is essential that students distinguish between temperature change (where Celsius and kelvin are equivalent) and absolute temperature (where only kelvin applies)."

  - id: T_C
    symbol: "T_C"

    nombre:
      es: Temperatura en grados Celsius
      en: Temperature in degrees Celsius

    descripcion:
      es: "Temperatura medida en la escala Celsius, cuyo cero corresponde al punto de fusión del agua a presión estándar y cuyo valor 100 corresponde al punto de ebullición del agua a presión estándar."
      en: "Temperature measured on the Celsius scale, whose zero corresponds to the melting point of water at standard pressure and whose value 100 corresponds to the boiling point of water at standard pressure."

    unidad_si: "°C"
    dimension: "[Θ]"

    is_vector: false
    components: []

    category: state
    physical_role: "Escala práctica de temperatura de uso cotidiano e industrial, definida por dos puntos fijos del agua."

    used_in:
      - meteorología y climatología
      - calibración de termómetros de uso general
      - cálculos de dilatación y calor específico (en variaciones DeltaT)
      - conversión a kelvin y Fahrenheit

    common_mistake: "Interpretar 0 °C como ausencia de temperatura o como cero absoluto. El cero de Celsius es arbitrario (punto de fusión del agua); el cero absoluto está en -273.15 °C."

    typical_range: "-273.15 °C (cero absoluto) a 5500 °C (temperatura de la superficie solar). Rango cotidiano: -40 °C a 100 °C."

    sign_behavior:
      has_sign: true
      meaning:
        es: "T_C positivo indica temperatura por encima del punto de fusión del agua a presión estándar. T_C negativo indica temperatura por debajo de ese punto. El signo no indica ausencia de energía térmica sino posición relativa a la referencia arbitraria del cero Celsius."
        en: "Positive T_C indicates temperature above the melting point of water at standard pressure. Negative T_C indicates temperature below that point. The sign does not indicate absence of thermal energy but rather position relative to the arbitrary Celsius zero reference."

    zero_behavior:
      allowed: true
      meaning:
        es: "T_C igual a cero corresponde al punto de fusión del agua a presión estándar (273.15 K). No implica cero absoluto ni ausencia de energía térmica. Es una referencia experimental histórica."
        en: "T_C equal to zero corresponds to the melting point of water at standard pressure (273.15 K). It does not imply absolute zero or absence of thermal energy. It is a historical experimental reference."

    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "(-273.15, +∞) °C"

    interpretation_role:
      primary_for:
        - conversión a kelvin
        - conversión a Fahrenheit
        - lectura del estado térmico en contexto cotidiano
      secondary_for:
        - comparación con puntos de referencia del agua
        - calibración de instrumentos

    graph_binding:
      channels:
        - axis_x: "T_C como variable independiente en gráficas de conversión de escala"

    pedagogical_notes:
      es: "El alumno debe entender que el grado Celsius tiene el mismo tamaño que el kelvin (1 °C = 1 K en diferencias de temperatura), pero el origen es diferente. Esto significa que para calcular variaciones de temperatura, Celsius y kelvin son intercambiables, pero para temperatura absoluta en las leyes de gases, solo kelvin es correcto. Esta distinción es la fuente más frecuente de errores en termodinámica de ESO y Bachillerato."
      en: "Students must understand that the Celsius degree has the same size as the kelvin (1 °C = 1 K for temperature differences), but the origin is different. This means that for calculating temperature changes, Celsius and kelvin are interchangeable, but for absolute temperature in gas laws, only kelvin is correct. This distinction is the most frequent source of errors in secondary and upper secondary thermodynamics."

  - id: T_F
    symbol: "T_F"

    nombre:
      es: Temperatura en grados Fahrenheit
      en: Temperature in degrees Fahrenheit

    descripcion:
      es: "Temperatura medida en la escala Fahrenheit, de uso predominante en Estados Unidos y algunos países anglosajones. El agua congela a 32 °F y hierve a 212 °F a presión estándar."
      en: "Temperature measured on the Fahrenheit scale, predominantly used in the United States and some English-speaking countries. Water freezes at 32 °F and boils at 212 °F at standard pressure."

    unidad_si: "°F"
    dimension: "[Θ]"

    is_vector: false
    components: []

    category: state
    physical_role: "Escala de temperatura de uso regional, definida con divisiones más pequeñas que Celsius para el rango de temperatura corporal humana."

    used_in:
      - meteorología en EE.UU. y países anglosajones
      - conversión a Celsius y kelvin en contextos internacionales
      - temperatura corporal y clínica en contexto anglosajón

    common_mistake: "Convertir Fahrenheit a Celsius restando 32 pero olvidando multiplicar por 5/9, o dividiendo por 1.8 en lugar de 9/5. El factor de conversión fraccionario es fuente habitual de error numérico."

    typical_range: "-459.67 °F (cero absoluto) a 212 °F (ebullición del agua). Rango cotidiano EE.UU.: 0 °F a 100 °F."

    sign_behavior:
      has_sign: true
      meaning:
        es: "T_F positivo indica temperatura por encima de -17.78 °C (0 °F, temperatura de una mezcla de hielo y sal usada como referencia histórica por Fahrenheit). T_F negativo indica temperatura por debajo de esa referencia. El signo no tiene significado físico fundamental."
        en: "Positive T_F indicates temperature above -17.78 °C (0 °F, the temperature of an ice-salt mixture used as a historical reference by Fahrenheit). Negative T_F indicates temperature below that reference. The sign has no fundamental physical meaning."

    zero_behavior:
      allowed: true
      meaning:
        es: "T_F igual a cero corresponde aproximadamente a -17.78 °C (255.37 K). Es la temperatura de una mezcla de hielo, agua y sal amónica usada como referencia por Fahrenheit. No tiene significado físico especial."
        en: "T_F equal to zero corresponds approximately to -17.78 °C (255.37 K). It is the temperature of a mixture of ice, water, and ammonium chloride used as a reference by Fahrenheit. It has no special physical significance."

    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "(-459.67, +∞) °F"

    interpretation_role:
      primary_for:
        - conversión a Celsius
        - conversión a kelvin
      secondary_for:
        - comparación de medidas en sistemas anglosajones con SI

    graph_binding:
      channels:
        - axis_x: "T_F como variable independiente en gráficas de comparación de escalas"

    pedagogical_notes:
      es: "La escala Fahrenheit es conceptualmente importante porque ilustra que el cero de una escala de temperatura es arbitrario. El grado Fahrenheit es más pequeño que el Celsius (9 grados F equivalen a 5 grados C), lo que hace que la conversión requiera tanto un desplazamiento de origen (los 32 °F del punto de fusión del agua) como un reescalado de 9/5. El alumno debe practicar las dos operaciones por separado antes de aplicarlas juntas."
      en: "The Fahrenheit scale is conceptually important because it illustrates that the zero of a temperature scale is arbitrary. The Fahrenheit degree is smaller than the Celsius degree (9 F degrees equal 5 C degrees), which means the conversion requires both an origin shift (the 32 °F of the water freezing point) and a rescaling of 9/5. Students should practise both operations separately before applying them together."

  - id: DeltaT
    symbol: "\\Delta T"

    nombre:
      es: Variación de temperatura
      en: Temperature change

    descripcion:
      es: "Diferencia entre la temperatura final y la temperatura inicial de un proceso térmico. Independiente de la escala usada (Celsius o kelvin producen el mismo valor numérico)."
      en: "Difference between the final and initial temperature of a thermal process. Independent of the scale used (Celsius or kelvin give the same numerical value)."

    unidad_si: "K (o °C, numéricamente equivalente para diferencias)"
    dimension: "[Θ]"

    is_vector: false
    components: []

    category: derived
    physical_role: "Magnitud de proceso que cuantifica el cambio de estado térmico. Positiva indica calentamiento; negativa indica enfriamiento."

    used_in:
      - ley de calor específico (Q = m·c·DeltaT)
      - ley de dilatación térmica (DeltaL = alpha·L0·DeltaT)
      - análisis de procesos de calentamiento y enfriamiento
      - calorimetría

    common_mistake: "Calcular DeltaT como temperatura inicial menos temperatura final (orden invertido), obteniendo el signo contrario al correcto. La convención universal es T_final menos T_inicial."

    typical_range: "De unos pocos kelvin (experimentos de laboratorio) a varios cientos de kelvin (procesos industriales). En experimentos de ESO: 5 K a 80 K típicamente."

    sign_behavior:
      has_sign: true
      meaning:
        es: "DeltaT positivo indica que la temperatura final es mayor que la inicial (el sistema se ha calentado). DeltaT negativo indica que la temperatura final es menor que la inicial (el sistema se ha enfriado). El signo es fundamental para determinar el sentido del flujo de calor."
        en: "Positive DeltaT indicates the final temperature is higher than the initial (the system has been heated). Negative DeltaT indicates the final temperature is lower than the initial (the system has cooled). The sign is fundamental for determining the direction of heat flow."

    zero_behavior:
      allowed: true
      meaning:
        es: "DeltaT igual a cero indica que la temperatura no ha cambiado durante el proceso. Puede corresponder a un proceso isotérmico, a una transición de fase (donde se absorbe calor latente sin cambio de temperatura) o a un equilibrio térmico ya alcanzado."
        en: "DeltaT equal to zero indicates that the temperature has not changed during the process. This can correspond to an isothermal process, a phase transition (where latent heat is absorbed without temperature change), or to thermal equilibrium already reached."

    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "(-∞, +∞) K"

    interpretation_role:
      primary_for:
        - cálculo de calor absorbido o cedido
        - cálculo de dilatación térmica
        - identificación del sentido del proceso térmico
      secondary_for:
        - análisis de eficiencia de intercambiadores de calor
        - comparación de escalas de temperatura

    graph_binding:
      channels:
        - axis_x: "DeltaT como variable independiente en gráficas de calor vs variación de temperatura"

    pedagogical_notes:
      es: "DeltaT es la magnitud clave para comprender que las escalas Celsius y kelvin son equivalentes en procesos (no en estados). Un alumno que confunde temperatura absoluta T con variación de temperatura DeltaT comete uno de los errores más frecuentes de la termodinámica de secundaria. Subrayar siempre que 1 K y 1 °C representan el mismo incremento, aunque los ceros de las escalas sean distintos."
      en: "DeltaT is the key quantity for understanding that Celsius and kelvin scales are equivalent for processes (not for states). A student who confuses absolute temperature T with temperature change DeltaT commits one of the most common errors in secondary school thermodynamics. Always emphasise that 1 K and 1 °C represent the same increment, even though the zeros of the scales are different."
