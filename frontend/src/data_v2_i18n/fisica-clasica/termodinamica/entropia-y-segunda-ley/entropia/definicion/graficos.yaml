version: "1.0"
leaf: "definicion"

coord:
  title:
    es: Gráfica Coord · Definición de Entropía
    en: Coord Graph · Entropy Definition
  xAxis:
    es: temperatura absoluta T (K)
    en: absolute temperature T (K)
  yAxis:
    es: entropía S (J/K)
    en: entropy S (J/K)
  xMagnitude: T
  yMagnitude: S
  relation:
    es: dS = dQ_rev/T. ΔS = ∫ dQ_rev/T. S función de estado. S ≥ 0 para todo proceso real.
    en: dS = dQ_rev/T. ΔS = ∫ dQ_rev/T. S is a state function. S ≥ 0 for any real process.
  physicalReading:
    es: "Pendiente: dS/dT = C/T. ΔS = 0 proceso reversible. ΔS > 0 proceso irreversible."
    en: "Slope: dS/dT = C/T. ΔS = 0 reversible process. ΔS > 0 irreversible process."
  slopeMeaning:
    es: "dS/dT = C/T: capacidad calorífica dividida por T."
    en: "dS/dT = C/T: heat capacity divided by T."
  interceptMeaning:
    es: "S(0) = 0: tercer principio (T = 0 K)."
    en: "S(0) = 0: third law (T = 0 K)."
  curvatureMeaning:
    es: "d²S/dT² = −C/T²: decreciente con T."
    en: "d²S/dT² = −C/T²: decreasing with T."
  signMeaning:
    es: "ΔS > 0: irreversible. ΔS = 0: reversible. ΔS < 0: imposible (universo)."
    en: "ΔS > 0: irreversible. ΔS = 0: reversible. ΔS < 0: impossible (universe)."
  areaMeaning:
    es: Área bajo dQ/T vs T = ΔS.
    en: Area under dQ/T vs T = ΔS.
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: Definición de entropía termodinámica.
    en: Thermodynamic entropy definition.
  formulaConnection:
    es: dS = dQ_rev/T, ΔS_universo ≥ 0.
    en: dS = dQ_rev/T, ΔS_universe ≥ 0.
  readingFocus:
    es: leer la pendiente dS/dQ, verificar T absoluta y distinguir reversible de irreversible.
    en: read slope dS/dQ, verify absolute T and distinguish reversible from irreversible.
  agentHints:
    es:
      - dS = dQ_rev/T.
      - "ΔS = 0: reversible."
      - "ΔS > 0: irreversible."
    en:
      - dS = dQ_rev/T.
      - "ΔS = 0: reversible."
      - "ΔS > 0: irreversible."
  commonMistakes:
    es:
      - S = Q/T siempre.
      - ΔS puede ser negativo en universo.
      - T en °C.
    en:
      - S = Q/T always.
      - ΔS can be negative in universe.
      - T in °C.
