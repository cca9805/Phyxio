global_context:
  physical_domain:
    es: "Definición macroscópica de la entropía según Clausius: variación de entropía como cociente entre calor reversible y temperatura absoluta. Marco de la segunda ley de la termodinámica para procesos reversibles e irreversibles."
    en: "Macroscopic definition of entropy according to Clausius: entropy change as the ratio of reversible heat to absolute temperature. Framework of the second law of thermodynamics for reversible and irreversible processes."
  axis_convention:
    es: "En el diagrama T-S (temperatura en ordenadas, entropía en abscisas): procesos isotérmicos son líneas horizontales; procesos adiabáticos reversibles son líneas verticales; el área bajo la curva T-S es el calor intercambiado."
    en: "In the T-S diagram (temperature on vertical axis, entropy on horizontal axis): isothermal processes are horizontal lines; reversible adiabatic processes are vertical lines; the area under the T-S curve is the heat exchanged."
  standard_assumptions:
    - "El proceso es reversible (cuasi-estático). Para procesos irreversibles, la fórmula da el límite inferior de DeltaS."
    - "La temperatura T_abs es la del reservorio térmico con el que interactúa el sistema, expresada en kelvin."
    - "Para procesos no isotérmicos, DeltaS se obtiene integrando dQ_rev/T a lo largo del proceso."
  standard_warnings:
    - "Temperatura siempre en kelvin, nunca en Celsius ni Fahrenheit."
    - "DeltaS calculado con la fórmula isotérmica solo es exacto si T es constante a lo largo del proceso."
    - "La segunda ley exige DeltaS_universo ≥ 0; el sistema por sí solo puede tener DeltaS < 0."

