version: "1.0"
leaf: "variacion-de-entropia"

coord:
  title:
    es: Gráfica Coord · Variación de Entropía
    en: Coord Graph · Entropy Variation
  xAxis:
    es: temperatura T (K) o estado
    en: temperature T (K) or state
  yAxis:
    es: entropía S (J/K)
    en: entropy S (J/K)
  xMagnitude: T
  yMagnitude: S
  relation:
    es: ΔS = S_f − S_i. ΔS_universo ≥ 0. ΔS = ∫ dQ_rev/T.
    en: ΔS = S_f − S_i. ΔS_universe ≥ 0. ΔS = ∫ dQ_rev/T.
  physicalReading:
    es: "ΔS > 0: proceso espontáneo. ΔS = 0: reversible. S crece con T para cualquier sustancia."
    en: "ΔS > 0: spontaneous process. ΔS = 0: reversible. S increases with T for any substance."
  slopeMeaning:
    es: "dS/dT = C/T: capacidad calorífica/T."
    en: "dS/dT = C/T: heat capacity/T."
  interceptMeaning:
    es: "S(0 K) = 0: tercer principio."
    en: "S(0 K) = 0: third law."
  curvatureMeaning:
    es: "Cóncava: dS/dT decrece con T."
    en: "Concave: dS/dT decreases with T."
  signMeaning:
    es: "ΔS > 0: espontáneo. ΔS < 0: no espontáneo (universo)."
    en: "ΔS > 0: spontaneous. ΔS < 0: non-spontaneous (universe)."
  areaMeaning:
    es: Área bajo C/T vs T = ΔS.
    en: Area under C/T vs T = ΔS.
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: Variación de entropía y segundo principio.
    en: Entropy variation and second law.
  formulaConnection:
    es: ΔS = ∫ dQ_rev/T, ΔS_universo ≥ 0.
    en: ΔS = ∫ dQ_rev/T, ΔS_universe ≥ 0.
  readingFocus:
    es: leer signo de ΔS e identificar espontaneidad.
    en: read sign of ΔS and identify spontaneity.
  agentHints:
    es:
      - ΔS_universo ≥ 0.
      - "ΔS = 0: reversible."
      - S crece con T.
    en:
      - ΔS_universe ≥ 0.
      - "ΔS = 0: reversible."
      - S increases with T.
  commonMistakes:
    es:
      - ΔS sistema < 0 imposible.
      - S constante.
      - ΔS = Q/T siempre.
    en:
      - ΔS system < 0 impossible.
      - S constant.
      - ΔS = Q/T always.
