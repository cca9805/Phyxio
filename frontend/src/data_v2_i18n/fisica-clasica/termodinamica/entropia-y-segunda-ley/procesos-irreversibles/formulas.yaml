formulas:

  - id: criterio_irreversibilidad
    title:
      es: Criterio de irreversibilidad (segunda ley)
      en: Irreversibility criterion (second law)

    equation: "DeltaS_univ = DeltaS_sis + DeltaS_ent"
    latex: "DeltaS_univ = DeltaS_sis + DeltaS_ent \\geq 0"

    rearrangements:
      - target: DeltaS_univ
        equation: "DeltaS_univ = DeltaS_sis + DeltaS_ent"
        latex: "DeltaS_univ = DeltaS_sis + DeltaS_ent"
      - target: DeltaS_sis
        equation: "DeltaS_sis = DeltaS_univ - DeltaS_ent"
        latex: "DeltaS_sis = DeltaS_univ - DeltaS_ent"
      - target: DeltaS_ent
        equation: "DeltaS_ent = DeltaS_univ - DeltaS_sis"
        latex: "DeltaS_ent = DeltaS_univ - DeltaS_sis"

    category: fundamental
    relation_type: law

    physical_meaning:
      es: "La variación de entropía del universo (sistema + entorno) es siempre no negativa. Cuando es estrictamente positiva, el proceso es irreversible y genera entropía neta. Cuando es cero, el proceso es reversible (límite ideal). Cuando es negativa, el proceso es imposible. Esta es la formulación cuantitativa de la segunda ley de la termodinámica aplicada a procesos concretos."
      en: "The entropy change of the universe (system + surroundings) is always non-negative. When strictly positive, the process is irreversible and generates net entropy. When zero, the process is reversible (ideal limit). When negative, the process is impossible. This is the quantitative formulation of the second law of thermodynamics applied to specific processes."

    constraints:
      - "DeltaS_univ ≥ 0 siempre (segunda ley). Un resultado negativo indica error de cálculo, no violación de la ley."
      - "DeltaS_sis se calcula como función de estado (por un camino reversible entre los mismos estados)."
      - "DeltaS_ent se calcula con el calor real intercambiado: DeltaS_ent = -Q_sis / T_ent para un reservorio a temperatura constante."
      - "El 'universo' termodinámico incluye todo lo que interactúa con el sistema durante el proceso."

    validity:
      es: "Universal para todos los procesos termodinámicos macroscópicos. Aplicable a sistemas cerrados y abiertos. No requiere hipótesis de gas ideal ni de capacidades constantes. La única condición es que sistema y entorno puedan describirse por estados termodinámicos de equilibrio al inicio y al final."
      en: "Universal for all macroscopic thermodynamic processes. Applicable to closed and open systems. Does not require ideal gas or constant capacity hypotheses. The only condition is that system and surroundings can be described by equilibrium thermodynamic states at the beginning and end."

    dimension_check: "[M L^2 T^-2 Θ^-1] = [M L^2 T^-2 Θ^-1] + [M L^2 T^-2 Θ^-1] → J/K"

    calculable: true
    motivo_no_calculable: ""

    used_in:
      - criterio de espontaneidad de procesos termodinámicos
      - evaluación de irreversibilidad en máquinas térmicas
      - balance entrópico en procesos industriales
      - determinación de la dirección natural de un proceso
      - cálculo de exergía destruida

    interpretation_tags:
      - second_law
      - irreversibility_criterion
      - entropy_balance
      - spontaneity
      - universe_entropy

    result_semantics:
      target: DeltaS_univ
      kind: scalar_signed
      sign_meaning:
        es: "DeltaS_univ > 0: proceso irreversible, espontáneo, genera entropía. El trabajo potencial se degrada parcialmente en calor. DeltaS_univ = 0: proceso reversible ideal, sin pérdidas. DeltaS_univ < 0: proceso imposible según la segunda ley (resultado indica error de cálculo)."
        en: "DeltaS_univ > 0: irreversible process, spontaneous, generates entropy. Potential work is partially degraded into heat. DeltaS_univ = 0: ideal reversible process, no losses. DeltaS_univ < 0: impossible process according to the second law (result indicates calculation error)."
      absolute_value_meaning:
        es: "El valor absoluto de DeltaS_univ cuantifica el grado de irreversibilidad: mayor valor implica mayor degradación de energía útil. La exergía destruida es T_0 · DeltaS_univ, donde T_0 es la temperatura del ambiente de referencia."
        en: "The absolute value of DeltaS_univ quantifies the degree of irreversibility: larger value implies greater degradation of useful energy. Destroyed exergy is T_0 · DeltaS_univ, where T_0 is the reference environment temperature."

    domain_checks:
      - "DeltaS_univ debe ser ≥ 0. Un valor negativo indica error en el cálculo de DeltaS_sis o DeltaS_ent."
      - "DeltaS_sis y DeltaS_ent pueden ser individualmente positivos, negativos o cero."
      - "Si DeltaS_univ es exactamente 0, el proceso es el límite reversible (raro en la práctica)."

    coherence_checks:
      - "Verificar que DeltaS_ent se calculó con el calor real del proceso (no con Q_rev del sistema)."
      - "Verificar que DeltaS_sis se calculó como función de estado (usando un camino reversible entre estados i y f)."
      - "Si el proceso es claramente espontáneo (calor fluye de caliente a frío), DeltaS_univ debe ser positivo."
      - "Para un proceso adiabático irreversible (expansión libre), DeltaS_ent = 0 y DeltaS_univ = DeltaS_sis > 0."

    graph_implications:
      - "En un diagrama T-S del universo, el proceso irreversible se manifiesta como un desplazamiento neto hacia la derecha (mayor entropía total). El área adicional respecto al ciclo reversible representa la energía degradada."
      - "En un diagrama de barras DeltaS_sis vs DeltaS_ent, la suma (DeltaS_univ) es siempre ≥ 0. La barra total siempre apunta hacia la derecha o es cero."

    pedagogical_triggers:
      - "El error más frecuente es calcular DeltaS_ent usando Q_rev del camino reversible del sistema en lugar del calor real Q_sis. Para el entorno (reservorio), siempre se usa Q real porque el reservorio está en equilibrio."
      - "Otro error común es asumir DeltaS_sis ≥ 0 siempre: la segunda ley se aplica al universo, no al sistema aisladamente."
      - "Si DeltaS_univ da negativo, no hay que buscar excepciones a la segunda ley sino errores en la evaluación de DeltaS_sis o DeltaS_ent."

  - id: generacion_entropia_transferencia_calor
    title:
      es: Generación de entropía por transferencia de calor a temperaturas finitas
      en: Entropy generation from heat transfer at finite temperatures

    equation: "S_gen = Q_sis * (1/T_ent - 1/T_sis)"
    latex: "S_gen = Q_sis \\left( \\frac{1}{T_ent} - \\frac{1}{T_sis} \\right)"

    rearrangements:
      - target: S_gen
        equation: "S_gen = Q_sis * (1/T_ent - 1/T_sis)"
        latex: "S_gen = Q_sis \\left( \\frac{1}{T_ent} - \\frac{1}{T_sis} \\right)"
      - target: Q_sis
        equation: "Q_sis = S_gen / (1/T_ent - 1/T_sis)"
        latex: "Q_sis = \\frac{S_gen}{\\frac{1}{T_ent} - \\frac{1}{T_sis}}"
      - target: T_ent
        equation: "T_ent = 1 / (S_gen/Q_sis + 1/T_sis)"
        latex: "T_ent = \\frac{1}{\\frac{S_gen}{Q_sis} + \\frac{1}{T_sis}}"

    category: derived
    relation_type: consequence

    physical_meaning:
      es: "Cuando el calor fluye espontáneamente de un cuerpo caliente (T_sis) a un cuerpo frío (T_ent < T_sis), se genera entropía proporcional al calor transferido y a la diferencia de inversos de temperatura. Esta fórmula cuantifica la irreversibilidad intrínseca de toda transferencia de calor a través de una diferencia finita de temperaturas: cuanto mayor es el gradiente térmico, mayor es la entropía generada por unidad de calor."
      en: "When heat flows spontaneously from a hot body (T_sys) to a cold body (T_sur < T_sys), entropy is generated proportional to the transferred heat and the difference of inverse temperatures. This formula quantifies the intrinsic irreversibility of all heat transfer across a finite temperature difference: the larger the thermal gradient, the greater the entropy generated per unit of heat."

    constraints:
      - "T_sis > T_ent para que Q_sis > 0 (calor fluye del sistema caliente al entorno frío) y S_gen > 0."
      - "Si T_sis = T_ent, S_gen = 0: no hay irreversibilidad (transferencia reversible en el límite)."
      - "Ambas temperaturas deben ser estrictamente positivas (kelvin)."
      - "Q_sis es el calor cedido por el sistema al entorno (positivo en esta convención)."

    validity:
      es: "Válida para transferencia de calor entre dos cuerpos a temperaturas constantes (reservorios). Es la expresión más simple de generación de entropía por gradiente térmico. Para cuerpos con temperatura variable, se requiere integración. No incluye otras fuentes de irreversibilidad (fricción, mezcla, reacciones químicas)."
      en: "Valid for heat transfer between two bodies at constant temperatures (reservoirs). It is the simplest expression of entropy generation from thermal gradient. For bodies with variable temperature, integration is required. Does not include other irreversibility sources (friction, mixing, chemical reactions)."

    dimension_check: "[M L^2 T^-2] · [Θ^-1] = [M L^2 T^-2 Θ^-1] → J/K"

    calculable: true
    motivo_no_calculable: ""

    used_in:
      - cuantificación de pérdidas en intercambiadores de calor
      - optimización de diferencias de temperatura en ciclos térmicos
      - análisis exergético de procesos industriales
      - evaluación de la segunda ley en contacto térmico

    interpretation_tags:
      - heat_transfer_irreversibility
      - temperature_gradient
      - entropy_generation
      - thermal_contact
      - exergy_destruction

    result_semantics:
      target: S_gen
      kind: scalar_positive
      sign_meaning:
        es: "S_gen > 0 siempre que T_sis ≠ T_ent y haya transferencia de calor: toda transferencia a través de gradiente finito es irreversible. S_gen = 0 solo en el límite reversible (T_sis = T_ent, transferencia infinitamente lenta)."
        en: "S_gen > 0 whenever T_sys ≠ T_sur and there is heat transfer: all transfer across a finite gradient is irreversible. S_gen = 0 only at the reversible limit (T_sys = T_sur, infinitely slow transfer)."
      absolute_value_meaning:
        es: "El valor de S_gen cuantifica directamente la degradación de energía útil. La exergía destruida es T_0 · S_gen. Para un intercambiador con ΔT = 10 K transfiriendo 1 kJ a 300 K: S_gen ≈ 0.11 J/K."
        en: "The value of S_gen directly quantifies useful energy degradation. Destroyed exergy is T_0 · S_gen. For a heat exchanger with ΔT = 10 K transferring 1 kJ at 300 K: S_gen ≈ 0.11 J/K."

    domain_checks:
      - "S_gen debe ser ≥ 0. Un resultado negativo indica que T_sis y T_ent están invertidos o que Q_sis tiene signo incorrecto."
      - "T_sis y T_ent deben ser estrictamente positivos."
      - "Si Q_sis = 0, entonces S_gen = 0 independientemente de las temperaturas (no hay transferencia)."

    coherence_checks:
      - "Si T_sis > T_ent y Q_sis > 0 (calor fluye de caliente a frío), S_gen debe ser positivo."
      - "Si T_sis < T_ent y Q_sis > 0, el calor fluye de frío a caliente espontáneamente, lo cual es imposible: S_gen < 0 indica error."
      - "Para ΔT pequeño (T_sis ≈ T_ent), S_gen debe ser proporcionalmente pequeño (proceso casi reversible)."

    graph_implications:
      - "En un diagrama S_gen vs ΔT (= T_sis - T_ent), la relación es aproximadamente lineal para ΔT << T: S_gen ≈ Q·ΔT/T². Esto muestra que la irreversibilidad crece con el gradiente térmico."
      - "En el diagrama T-S, la generación de entropía se manifiesta como el área adicional entre el proceso real y el proceso reversible equivalente."

    pedagogical_triggers:
      - "El error más frecuente es olvidar que la transferencia de calor a ΔT = 0 no genera entropía: es el límite reversible. Toda ΔT finita es irreversible."
      - "Confundir el signo de Q con la dirección del flujo: si el sistema cede calor (Q_sis < 0 en otra convención), hay que ser consistente con la definición."
      - "No percibir que reducir ΔT a la mitad reduce S_gen aproximadamente a la mitad: la irreversibilidad es proporcional al gradiente."
