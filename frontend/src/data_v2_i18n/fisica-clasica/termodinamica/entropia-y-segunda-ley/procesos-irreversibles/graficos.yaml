version: "1.0"
leaf: "procesos-irreversibles"

coord:
  title:
    es: Gráfica Coord · Procesos Irreversibles
    en: Coord Graph · Irreversible Processes
  xAxis:
    es: tiempo o estado
    en: time or state
  yAxis:
    es: entropía del universo ΔS_univ (J/K)
    en: universe entropy ΔS_univ (J/K)
  xMagnitude: t
  yMagnitude: S
  relation:
    es: "ΔS_universo > 0. Proceso no puede revertirse espontaneamente. Fricción, difusión, expansión libre."
    en: "ΔS_universe > 0. Process cannot spontaneously reverse. Friction, diffusion, free expansion."
  physicalReading:
    es: S_univ siempre crece. No hay proceso irreversible en equilibrio.
    en: S_univ always increases. No irreversible process at equilibrium.
  slopeMeaning:
    es: "dS_univ/dt > 0: velocidad de producción de entropía."
    en: "dS_univ/dt > 0: entropy production rate."
  interceptMeaning:
    es: S_univ inicial (referencia).
    en: Initial S_univ (reference).
  curvatureMeaning:
    es: "Positiva: producción acelerada."
    en: "Positive: accelerating production."
  signMeaning:
    es: "ΔS_univ > 0 siempre en irreversible."
    en: "ΔS_univ > 0 always in irreversible."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "Segundo principio: procesos irreversibles."
    en: "Second law: irreversible processes."
  formulaConnection:
    es: "ΔS_universo > 0, ΔS_universo = ΔS_sistema + ΔS_entorno."
    en: "ΔS_universe > 0, ΔS_universe = ΔS_system + ΔS_surroundings."
  readingFocus:
    es: "verificar ΔS_universo > 0 e identificar la fuente de irreversibilidad."
    en: "verify ΔS_universe > 0 and identify the source of irreversibility."
  agentHints:
    es:
      - "ΔS_univ > 0."
      - No reversible espontáneo.
      - "Fricción: produce entropía."
    en:
      - "ΔS_univ > 0."
      - Not spontaneously reversible.
      - "Friction: produces entropy."
  commonMistakes:
    es:
      - "ΔS_sistema > 0 siempre."
      - Irreversible = imposible.
      - ΔS = 0 en irreversible.
    en:
      - "ΔS_system > 0 always."
      - Irreversible = impossible.
      - ΔS = 0 in irreversible.
