formulas:

  - id: condicion_reversibilidad
    title:
      es: Condición de reversibilidad (entropía del universo)
      en: Reversibility condition (universe entropy)

    equation: "DeltaS_univ = DeltaS_sis + DeltaS_ent = 0"
    latex: "DeltaS_univ = DeltaS_sis + DeltaS_ent = 0"

    rearrangements:
      - target: DeltaS_sis
        equation: "DeltaS_sis = -DeltaS_ent"
        latex: "DeltaS_sis = -DeltaS_ent"
      - target: DeltaS_ent
        equation: "DeltaS_ent = -DeltaS_sis"
        latex: "DeltaS_ent = -DeltaS_sis"

    category: fundamental
    relation_type: law

    physical_meaning:
      es: "En un proceso reversible, la entropía total del universo no cambia. Lo que el sistema gana en entropía, el entorno lo pierde exactamente, y viceversa. El balance entrópico es perfectamente simétrico: la variación del sistema es igual en magnitud y opuesta en signo a la del entorno. Este es el límite termodinámico ideal al que todo proceso real puede aproximarse pero nunca alcanzar."
      en: "In a reversible process, the total entropy of the universe does not change. What the system gains in entropy, the surroundings lose exactly, and vice versa. The entropy balance is perfectly symmetric: the system change equals in magnitude and is opposite in sign to the surroundings change. This is the ideal thermodynamic limit that every real process can approach but never reach."

    constraints:
      - "DeltaS_univ = 0 exactamente. Si el cálculo da un valor no nulo, el proceso no es reversible."
      - "DeltaS_sis y DeltaS_ent deben ser iguales en magnitud y opuestos en signo."
      - "El proceso debe ser cuasi-estático (infinitamente lento) y sin fuentes de disipación (fricción, turbulencia, mezcla espontánea)."
      - "Requiere gradientes infinitesimales de temperatura, presión y potencial químico."

    validity:
      es: "Universal como criterio: todo proceso termodinámico macroscópico puede evaluarse. Es condición necesaria y suficiente para reversibilidad. En la práctica, ningún proceso real satisface DeltaS_univ = 0 exactamente, pero sirve como referencia teórica inalcanzable."
      en: "Universal as criterion: every macroscopic thermodynamic process can be evaluated. It is a necessary and sufficient condition for reversibility. In practice, no real process satisfies DeltaS_univ = 0 exactly, but it serves as an unattainable theoretical reference."

    dimension_check: "[M L^2 T^-2 Θ^-1] = [M L^2 T^-2 Θ^-1] + [M L^2 T^-2 Θ^-1] → J/K"

    calculable: true
    motivo_no_calculable: ""

    used_in:
      - definición del límite reversible en termodinámica
      - cálculo de la eficiencia máxima de Carnot
      - comparación entre procesos reales e ideales
      - evaluación del rendimiento de segunda ley
      - diseño de ciclos termodinámicos óptimos

    interpretation_tags:
      - reversibility_condition
      - second_law
      - entropy_balance
      - ideal_limit
      - zero_entropy_generation

    result_semantics:
      target: DeltaS_univ
      kind: scalar_signed
      sign_meaning:
        es: "DeltaS_univ = 0: proceso reversible. DeltaS_univ > 0: proceso irreversible (no cumple la condición). DeltaS_univ < 0: resultado imposible (error de cálculo)."
        en: "DeltaS_univ = 0: reversible process. DeltaS_univ > 0: irreversible process (condition not met). DeltaS_univ < 0: impossible result (calculation error)."
      absolute_value_meaning:
        es: "Si DeltaS_univ = 0 exacto, el proceso opera en el límite reversible ideal. Cualquier desviación positiva indica irreversibilidad cuantificable."
        en: "If DeltaS_univ = 0 exactly, the process operates at the ideal reversible limit. Any positive deviation indicates quantifiable irreversibility."

    domain_checks:
      - "DeltaS_univ debe ser exactamente 0 para un proceso reversible."
      - "Si DeltaS_univ > 0, el proceso es irreversible, no reversible."
      - "DeltaS_univ < 0 es imposible y señala error."

    coherence_checks:
      - "DeltaS_sis = -DeltaS_ent es obligatorio. Si no se cumple, el proceso no es reversible."
      - "Todo calor intercambiado debe ser reversible (Q_rev) con gradientes infinitesimales."
      - "Si hay cualquier fuente de disipación, DeltaS_univ > 0 y el proceso no es reversible."

    graph_implications:
      - "En el diagrama T-S, un proceso reversible sigue una curva definida sin separación entre el camino directo y el inverso. El área bajo la curva es Q_rev."
      - "En un ciclo reversible (Carnot), el diagrama T-S es un rectángulo entre dos isotermas y dos adiabáticas. El área del rectángulo es el trabajo neto."

    pedagogical_triggers:
      - "Error frecuente: confundir proceso cuasi-estático con proceso reversible. Un proceso cuasi-estático con fricción es lento pero irreversible."
      - "El alumno debe entender que reversible es un límite ideal: como una velocidad infinita, es útil conceptualmente pero inalcanzable."
      - "DeltaS_univ = 0 no significa que no haya entropía, sino que no se genera entropía nueva."

  - id: eficiencia_carnot
    title:
      es: Eficiencia de Carnot (máxima eficiencia reversible)
      en: Carnot efficiency (maximum reversible efficiency)

    equation: "eta_Carnot = 1 - T_frio / T_caliente"
    latex: "eta_Carnot = 1 - T_frio/T_caliente"

    rearrangements:
      - target: eta_Carnot
        equation: "eta_Carnot = 1 - T_frio / T_caliente"
        latex: "eta_Carnot = 1 - T_frio/T_caliente"
      - target: T_frio
        equation: "T_frio = T_caliente * (1 - eta_Carnot)"
        latex: "T_frio = T_caliente * (1 - eta_Carnot)"
      - target: T_caliente
        equation: "T_caliente = T_frio / (1 - eta_Carnot)"
        latex: "T_caliente = T_frio/(1 - eta_Carnot)"

    category: derived
    relation_type: consequence

    physical_meaning:
      es: "La eficiencia de Carnot establece el rendimiento máximo que puede alcanzar cualquier máquina térmica operando entre dos focos a temperaturas T_caliente y T_frio. Es una consecuencia directa de DeltaS_univ = 0 para el ciclo reversible. Ninguna máquina real puede superarla: eta_real < eta_Carnot siempre. La eficiencia depende solo de las temperaturas absolutas de los focos, no del fluido de trabajo ni del diseño mecánico."
      en: "Carnot efficiency establishes the maximum performance achievable by any heat engine operating between two reservoirs at temperatures T_hot and T_cold. It is a direct consequence of DeltaS_univ = 0 for the reversible cycle. No real engine can exceed it: eta_real < eta_Carnot always. Efficiency depends only on the absolute temperatures of the reservoirs, not on the working fluid or mechanical design."

    constraints:
      - "T_caliente > T_frio > 0 (ambas en kelvin)."
      - "0 < eta_Carnot < 1 siempre (eta = 1 requeriría T_frio = 0 K, inalcanzable)."
      - "eta_Carnot se aplica solo a máquinas térmicas cíclicas entre dos focos."
      - "No se aplica a dispositivos que no operen en ciclo (procesos puntuales)."

    validity:
      es: "Universal para máquinas térmicas cíclicas entre dos focos de temperatura constante. Es un teorema termodinámico, no una aproximación. Válida para cualquier fluido de trabajo y cualquier diseño mecánico. La única condición es que los focos sean reservorios a temperatura constante."
      en: "Universal for cyclic heat engines between two constant-temperature reservoirs. It is a thermodynamic theorem, not an approximation. Valid for any working fluid and any mechanical design. The only condition is that the reservoirs are at constant temperature."

    dimension_check: "[adimensional] = 1 - [Θ] / [Θ] → adimensional"

    calculable: true
    motivo_no_calculable: ""

    used_in:
      - cálculo de eficiencia máxima de centrales térmicas
      - diseño de ciclos termodinámicos óptimos
      - comparación de rendimiento real vs ideal
      - evaluación de eficiencia de segunda ley
      - análisis de límites termodinámicos en refrigeración

    interpretation_tags:
      - carnot_efficiency
      - maximum_efficiency
      - reversible_cycle
      - temperature_ratio
      - second_law_limit

    result_semantics:
      target: eta_Carnot
      kind: scalar_bounded
      sign_meaning:
        es: "eta_Carnot siempre es positiva y menor que 1. Valores cercanos a 1 indican gran diferencia de temperaturas. Valores cercanos a 0 indican que T_frio es próxima a T_caliente."
        en: "eta_Carnot is always positive and less than 1. Values close to 1 indicate large temperature difference. Values close to 0 indicate T_cold is close to T_hot."
      absolute_value_meaning:
        es: "El valor numérico es la fracción máxima de calor absorbido que puede convertirse en trabajo. El resto (1 - eta_Carnot) debe cederse obligatoriamente al foco frío."
        en: "The numerical value is the maximum fraction of absorbed heat that can be converted to work. The rest (1 - eta_Carnot) must necessarily be released to the cold reservoir."

    domain_checks:
      - "T_frio y T_caliente deben estar en kelvin y ser positivas."
      - "T_caliente > T_frio es requisito. Si se invierte, eta < 0 lo cual es absurdo."
      - "eta_Carnot = 0 ocurre cuando T_frio = T_caliente (no hay gradiente, no hay trabajo posible)."

    coherence_checks:
      - "Si eta_real > eta_Carnot, hay un error seguro: ninguna máquina supera a Carnot."
      - "Para centrales térmicas típicas (T_caliente ≈ 800 K, T_frio ≈ 300 K): eta_Carnot ≈ 62.5%. Eficiencias reales suelen ser 30-45%."
      - "Para refrigeradores, el COP máximo es T_frio / (T_caliente - T_frio), derivado del mismo ciclo reversible."

    graph_implications:
      - "En el diagrama T-S del ciclo de Carnot, el rectángulo formado por dos isotermas y dos adiabáticas tiene un área que es el trabajo neto. La razón entre esta área y el área bajo la isoterma superior es eta_Carnot."
      - "Un gráfico de eta_Carnot vs T_frio/T_caliente es una línea recta descendente desde eta = 1 (T_frio/T_caliente = 0) hasta eta = 0 (T_frio/T_caliente = 1)."

    pedagogical_triggers:
      - "Error frecuente: usar temperaturas en Celsius. La fórmula exige kelvin absolutos."
      - "El alumno puede pensar que eta = 100% es posible si el diseño es suficientemente bueno. La segunda ley lo prohíbe."
      - "Confundir eta_Carnot (límite máximo) con eta_real (siempre menor). La diferencia cuantifica la irreversibilidad de la máquina real."
