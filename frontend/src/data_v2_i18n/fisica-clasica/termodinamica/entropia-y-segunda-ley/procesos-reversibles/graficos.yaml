version: "1.0"
leaf: "procesos-reversibles"

coord:
  title:
    es: Gráfica Coord · Procesos Reversibles
    en: Coord Graph · Reversible Processes
  xAxis:
    es: tiempo o parámetro de proceso
    en: time or process parameter
  yAxis:
    es: entropía del universo ΔS_univ (J/K)
    en: universe entropy ΔS_univ (J/K)
  xMagnitude: t
  yMagnitude: S
  relation:
    es: "ΔS_universo = 0. Proceso puede invertirse sin dejar huella. Idealización: cuasi-estático y sin fricción."
    en: "ΔS_universe = 0. Process can reverse without trace. Idealization: quasi-static and frictionless."
  physicalReading:
    es: "S_univ = cte. Cada instante: equilibrio infinitesimal. Ciclo de Carnot: caso reversible ideal."
    en: "S_univ = const. Each instant: infinitesimal equilibrium. Carnot cycle: ideal reversible case."
  slopeMeaning:
    es: dS_univ/dt = 0.
    en: dS_univ/dt = 0.
  interceptMeaning:
    es: S_univ inicial.
    en: Initial S_univ.
  curvatureMeaning:
    es: "Plana: proceso cuasi-estático."
    en: "Flat: quasi-static process."
  signMeaning:
    es: "ΔS_univ = 0: sin producción de entropía."
    en: "ΔS_univ = 0: no entropy production."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: t ≥ 0.
    en: t ≥ 0.
  modelConnection:
    es: "Segundo principio: procesos reversibles."
    en: "Second law: reversible processes."
  formulaConnection:
    es: ΔS_universo = 0, η_Carnot = 1 − T_c/T_h.
    en: ΔS_universe = 0, η_Carnot = 1 − T_c/T_h.
  readingFocus:
    es: verificar ΔS_universo = 0 y condiciones cuasi-estáticas.
    en: verify ΔS_universe = 0 and quasi-static conditions.
  agentHints:
    es:
      - ΔS_univ = 0.
      - Sin fricción.
      - Cuasi-estático.
    en:
      - ΔS_univ = 0.
      - Frictionless.
      - Quasi-static.
  commonMistakes:
    es:
      - Reversible = lento.
      - ΔS_sistema = 0 siempre.
      - Carnot es irreversible.
    en:
      - Reversible = slow.
      - ΔS_system = 0 always.
      - Carnot is irreversible.
