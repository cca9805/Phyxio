version: "1.0"
leaf: "formulacion-de-clausius"

coord:
  title:
    es: Gráfica Coord · Formulación de Clausius
    en: Coord Graph · Clausius Statement
  xAxis:
    es: calor cedido al foco frío Q_c (J)
    en: heat given to cold reservoir Q_c (J)
  yAxis:
    es: variación de entropía total ΔS (J/K)
    en: total entropy variation ΔS (J/K)
  xMagnitude: Q
  yMagnitude: S
  relation:
    es: "ΔS_universo ≥ 0. Clausius: imposible transferir calor espontáneo de frío a caliente. Q_c > 0 siempre en refrigerador real."
    en: "ΔS_universe ≥ 0. Clausius: impossible to spontaneously transfer heat from cold to hot. Q_c > 0 always in real refrigerator."
  physicalReading:
    es: "Recta ΔS vs Q_c con pendiente 1/T_c − 1/T_h > 0. Intercepto: ΔS mínimo reversible."
    en: "Line ΔS vs Q_c with slope 1/T_c − 1/T_h > 0. Intercept: minimum reversible ΔS."
  slopeMeaning:
    es: d(ΔS)/dQ_c = 1/T_c − 1/T_h.
    en: d(ΔS)/dQ_c = 1/T_c − 1/T_h.
  interceptMeaning:
    es: "ΔS(0) = 0: sin intercambio de calor."
    en: "ΔS(0) = 0: no heat exchange."
  curvatureMeaning:
    es: "Recta: coeficientes constantes."
    en: "Straight: constant coefficients."
  signMeaning:
    es: ΔS ≥ 0 siempre. ΔS = 0 solo reversible.
    en: ΔS ≥ 0 always. ΔS = 0 only reversible.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Q_c ≥ 0.
    en: Q_c ≥ 0.
  modelConnection:
    es: "Segundo principio: enunciado de Clausius."
    en: "Second law: Clausius statement."
  formulaConnection:
    es: ΔS_universo = Q_c/T_c − Q_h/T_h ≥ 0.
    en: ΔS_universe = Q_c/T_c − Q_h/T_h ≥ 0.
  readingFocus:
    es: "leer ΔS ≥ 0 e identificar reversible (ΔS=0) e irreversible (ΔS>0)."
    en: "read ΔS ≥ 0 and identify reversible (ΔS=0) and irreversible (ΔS>0)."
  agentHints:
    es:
      - ΔS_univ ≥ 0.
      - "Clausius: no fluye espontaneo de frío a caliente."
      - "Reversible: ΔS = 0."
    en:
      - ΔS_univ ≥ 0.
      - "Clausius: no spontaneous flow cold to hot."
      - "Reversible: ΔS = 0."
  commonMistakes:
    es:
      - ΔS puede ser negativo en universo.
      - Clausius = primer principio.
    en:
      - ΔS can be negative in universe.
      - Clausius = first law.
