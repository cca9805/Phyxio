version: "1.0"
leaf: "formulacion-de-kelvin-planck"

coord:
  title:
    es: Gráfica Coord · Formulación de Kelvin-Planck
    en: Coord Graph · Kelvin-Planck Statement
  xAxis:
    es: "rendimiento η del ciclo (%)"
    en: "cycle efficiency η (%)"
  yAxis:
    es: calor absorbido del foco caliente Q_h (J)
    en: heat absorbed from hot reservoir Q_h (J)
  xMagnitude: eta
  yMagnitude: Q
  relation:
    es: "η = 1 − Q_c/Q_h < 1. η_Carnot = 1 − T_c/T_h: cota máxima. Ningún motor real alcanza η = 1."
    en: "η = 1 − Q_c/Q_h < 1. η_Carnot = 1 − T_c/T_h: maximum bound. No real engine reaches η = 1."
  physicalReading:
    es: "η < η_Carnot siempre. Para η = 1: Q_c = 0, imposible. Cota superior teórica = Carnot."
    en: "η < η_Carnot always. For η = 1: Q_c = 0, impossible. Theoretical upper bound = Carnot."
  slopeMeaning:
    es: "dQ_h/dη = Q_h/(1−η²): relación no lineal."
    en: "dQ_h/dη = Q_h/(1−η²): non-linear relation."
  interceptMeaning:
    es: "η(0) = 0: sin trabajo útil."
    en: "η(0) = 0: no useful work."
  curvatureMeaning:
    es: "Positiva: Q_h crece al acercarse a η = 1."
    en: "Positive: Q_h grows as η approaches 1."
  signMeaning:
    es: 0 ≤ η < 1.
    en: 0 ≤ η < 1.
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: 0 ≤ η < 1.
    en: 0 ≤ η < 1.
  modelConnection:
    es: "Segundo principio: Kelvin-Planck."
    en: "Second law: Kelvin-Planck."
  formulaConnection:
    es: η = W/Q_h = 1 − Q_c/Q_h ≤ η_Carnot.
    en: η = W/Q_h = 1 − Q_c/Q_h ≤ η_Carnot.
  readingFocus:
    es: leer η < 1 y comparar con cota de Carnot.
    en: read η < 1 and compare with Carnot bound.
  agentHints:
    es:
      - η < 1 siempre.
      - η_Carnot = 1 − T_c/T_h.
      - η = W/Q_h.
    en:
      - η < 1 always.
      - η_Carnot = 1 − T_c/T_h.
      - η = W/Q_h.
  commonMistakes:
    es:
      - η = 1 posible.
      - "η_Carnot = 100% siempre."
      - η = Q_c/Q_h.
    en:
      - η = 1 possible.
      - "η_Carnot = 100% always."
      - η = Q_c/Q_h.
