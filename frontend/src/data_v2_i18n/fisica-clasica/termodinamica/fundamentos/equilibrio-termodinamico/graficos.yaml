version: "1.0"
leaf: "equilibrio-termodinamico"

dcl:
  title:
    es: DCL · Equilibrio termodinámico
    en: FBD · Thermodynamic Equilibrium
  forces:
    es:
      - fuerza de presion izquierda
      - fuerza de presion derecha
      - net pressure force
    en:
      - left pressure force
      - right pressure force
      - net pressure force
  object:
    es: piston o frontera en equilibrio mecanico
    en: piston or boundary in mechanical equilibrium
  freeBodyCondition:
    es: El diagrama de cuerpo libre muestra el balance de fuerzas sobre la frontera movil del sistema.
    en: The free body diagram shows the force balance on the movable boundary of the system.
  equilibriumCondition:
    es: DeltaP = 0 o sumatoria de fuerzas sobre el piston igual a cero.
    en: DeltaP = 0 or net force on the piston equals zero.
  netForce:
    es: La fuerza neta es cero, lo que implica que el piston no acelera.
    en: The net force is zero, implying the piston does not accelerate.
  accelerationDirection:
    es: Aceleracion nula.
    en: Zero acceleration.
  referenceFrameChoice:
    es: Marco de referencia del laboratorio.
    en: Laboratory reference frame.
  forceTypes:
    es:
      - fuerza de presion izquierda
      - fuerza de presion derecha
    en:
      - left pressure force
      - right pressure force
  signConvention:
    es: Fuerza hacia la derecha positiva, hacia la izquierda negativa.
    en: Force to the right positive, to the left negative.
  commonMistakes:
    es:
      - Olvidar la fuerza de presion externa.
      - Asumir equilibrio mecanico instantaneo sin friccion.
    en:
      - Forgetting the external pressure force.
      - Assuming instantaneous mechanical equilibrium without friction.
  agentHints:
    es:
      - El piston se detiene cuando P_int = P_ext.
      - Dibuja vectores de fuerza opuestos de igual longitud en equilibrio.
    en:
      - The piston stops when P_int = P_ext.
      - Draw opposing force vectors of equal length at equilibrium.
  relation:
    es: El DCL muestra el balance de presiones efectivas traduciendolo a fuerzas sobre el piston.
    en: The FBD shows the balance of effective pressures translated to forces on the piston.
  readingFocus:
    es: identificar las fuerzas sobre la frontera y comprobar que se anulan en equilibrio.
    en: identify forces on the boundary and verify they cancel out at equilibrium.

svg:
  title:
    es: Escena SVG · Equilibrio termodinámico
    en: SVG Scene · Thermodynamic Equilibrium
  sceneId: equilibrio_termodinamico
  sceneLabel:
    es: Sistema termodinamico alcanzando el equilibrio
    en: Thermodynamic system reaching equilibrium
  objects:
    es:
      - piston
      - particulas calientes
      - particulas frias
      - pared diaterma
    en:
      - piston
      - hot particles
      - cold particles
      - diathermic wall
  mainObject:
    es: sistema cilindro-piston en equilibrio completo
    en: cylinder-piston system in complete equilibrium
  referenceFrame:
    es: espacio de variables macroscopicas
    en: space of macroscopic variables
  geometry:
    es: La escena muestra la posicion del piston y la temperatura de las camaras.
    en: The scene shows the piston position and the temperature of the chambers.
  interactions:
    es: Transferencia de calor e intercambio de volumen hasta igualar T y P.
    en: Heat transfer and volume exchange until T and P equalize.
  modelElements:
    es:
      - T1 = T2
      - P1 = P2
      - flujo neto nulo
    en:
      - T1 = T2
      - P1 = P2
      - zero net flow
  visualCues:
    es:
      - Piston centrado
      - Colores de temperatura homogeneos en equilibrio
      - Desaparicion de flechas de flujo
    en:
      - Centered piston
      - Homogeneous temperature colors at equilibrium
      - Disappearance of flow arrows
  scaleMeaning:
    es: Las dimensiones representan volumenes relativos de los compartimentos.
    en: Dimensions represent relative volumes of the compartments.
  relation:
    es: La escena visualiza la extincion de gradientes macroscopicos.
    en: The scene visualizes the vanishing of macroscopic gradients.
  physicalReading:
    es: El cese de flujos y movimientos indica equilibrio completo.
    en: The cessation of flows and movements indicates complete equilibrium.
  modelConnection:
    es: Criterios termodinamicos de equilibrio local y global.
    en: Thermodynamic criteria of local and global equilibrium.
  formulaConnection:
    es: T_1 = T_2, P_1 = P_2, A = 0.
    en: T_1 = T_2, P_1 = P_2, A = 0.
  readingFocus:
    es: observar la homogeneizacion de temperatura y la posicion final del piston.
    en: observe temperature homogenization and final piston position.
  agentHints:
    es:
      - El equilibrio termodinamico completo requiere equilibrio termico y mecanico simultaneos.
      - El estado estacionario mantiene gradientes, el equilibrio los anula.
    en:
      - Complete thermodynamic equilibrium requires simultaneous thermal and mechanical equilibrium.
      - Steady state maintains gradients, equilibrium vanishes them.
  commonMistakes:
    es:
      - Asumir que equilibrio significa reposo absoluto a escala microscopica.
      - Confundir estado estacionario con equilibrio termodinamico.
    en:
      - Assuming equilibrium means absolute rest at microscopic scale.
      - Confusing steady state with thermodynamic equilibrium.
