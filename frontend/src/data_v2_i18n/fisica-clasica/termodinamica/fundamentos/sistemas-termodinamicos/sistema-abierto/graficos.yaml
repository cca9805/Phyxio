version: "1.0"
leaf: "sistema-abierto"

coord:
  title:
    es: "Sistema abierto: pendientes de acumulacion"
    en: "Open system: accumulation slopes"
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: acumulacion de masa m_sys (kg) y energia E_sys (J)
    en: accumulation of mass m_sys (kg) and energy E_sys (J)
  xMagnitude: t
  yMagnitude: m_dot
  relation:
    es: "dE_sys/dt = Q_dot - W_dot + m_dot_in*e_in - m_dot_out*e_out. La tasa de cambio depende del flujo neto."
    en: "dE_sys/dt = Q_dot - W_dot + m_dot_in*e_in - m_dot_out*e_out. Accumulation rate depends on net flow."
  physicalReading:
    es: Las pendientes representan las tasas instantaneas de acumulacion de masa y energia en el sistema.
    en: The slopes represent the instantaneous rates of mass and energy accumulation in the system.
  slopeMeaning:
    es: "dm/dt = m_in - m_out y dE/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
    en: "dm/dt = m_in - m_out and dE/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
  interceptMeaning:
    es: Valores iniciales de masa y energia acumulados en t = 0.
    en: Initial values of mass and energy accumulated at t = 0.
  curvatureMeaning:
    es: "Rectas: flujos y coeficientes de intercambio constantes."
    en: "Straight lines: constant flows and exchange coefficients."
  signMeaning:
    es: Tasa positiva indica acumulacion; tasa negativa indica vaciado o perdida.
    en: Positive rate indicates accumulation; negative rate indicates emptying or loss.
  areaMeaning:
    es: Sin interpretacion directa.
    en: No direct interpretation.
  domainMeaning:
    es: "t >= 0."
    en: "t >= 0."
  modelConnection:
    es: Primer principio para sistemas abiertos (volumen de control).
    en: First law of thermodynamics for open systems (control volume).
  formulaConnection:
    es: "dE_sys/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
    en: "dE_sys/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
  readingFocus:
    es: leer la acumulacion temporal y comparar las pendientes de masa y energia.
    en: read temporal accumulation and compare mass and energy slopes.
  agentHints:
    es:
      - "La masa se conserva: dm/dt = m_in - m_out."
      - "La energia se conserva: dE/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
    en:
      - "Mass is conserved: dm/dt = m_in - m_out."
      - "Energy is conserved: dE/dt = Q_dot - W_dot + m_in*e_in - m_out*e_out."
  commonMistakes:
    es:
      - Olvidar que las corrientes de masa transportan energia (entalpia).
      - Asumir dm/dt = 0 siempre (estado estacionario).
    en:
      - Forgetting that mass streams transport energy (enthalpy).
      - Assuming dm/dt = 0 always (steady state).
