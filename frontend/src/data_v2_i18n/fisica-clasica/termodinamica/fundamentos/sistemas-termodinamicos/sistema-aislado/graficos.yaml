version: "1.0"
leaf: "sistema-aislado"

coord:
  title:
    es: "Sistema aislado: energia interna y entropia"
    en: "Isolated system: internal energy and entropy"
  xAxis:
    es: paso del proceso
    en: process step
  yAxis:
    es: energia interna U (J) y entropia S (J/K)
    en: internal energy U (J) and entropy S (J/K)
  xMagnitude: DeltaU
  yMagnitude: DeltaU
  relation:
    es: "DeltaU = 0 y DeltaS_ais >= 0. La energia se conserva y la entropia aumenta en procesos espontaneos."
    en: "DeltaU = 0 and DeltaS_ais >= 0. Energy is conserved and entropy increases in spontaneous processes."
  physicalReading:
    es: U se mantiene constante (recta horizontal). S aumenta o permanece constante si es reversible.
    en: U remains constant (horizontal line). S increases or remains constant if reversible.
  slopeMeaning:
    es: "dU/dt = 0 (tasa nula) y dS/dt >= 0 (produccion de entropia)."
    en: "dU/dt = 0 (zero rate) and dS/dt >= 0 (entropy production)."
  interceptMeaning:
    es: Valores iniciales de energia interna y entropia en el estado inicial.
    en: Initial values of internal energy and entropy in the initial state.
  curvatureMeaning:
    es: "Rectas: evolucion por pasos con incrementos constantes."
    en: "Straight lines: step evolution with constant increments."
  signMeaning:
    es: Cambio de U es cero. Cambio de S es no-negativo.
    en: Change of U is zero. Change of S is non-negative.
  areaMeaning:
    es: Sin interpretacion directa.
    en: No direct interpretation.
  domainMeaning:
    es: "Numero de pasos >= 0."
    en: "Number of steps >= 0."
  modelConnection:
    es: Conservacion de la energia y aumento de entropia (sistemas aislados).
    en: Energy conservation and entropy increase (isolated systems).
  formulaConnection:
    es: "DeltaU = 0, DeltaS >= 0."
    en: "DeltaU = 0, DeltaS >= 0."
  readingFocus:
    es: comprobar que la energia no cambia y la entropia crece en el tiempo.
    en: verify that energy does not change and entropy increases over time.
  agentHints:
    es:
      - En un sistema aislado, DeltaU = Q - W = 0.
      - La entropía del universo (o de un sistema aislado) nunca disminuye.
    en:
      - In an isolated system, DeltaU = Q - W = 0.
      - The entropy of the universe (or an isolated system) never decreases.
  commonMistakes:
    es:
      - Creer que la entropia tambien debe conservarse.
      - Pensar que no puede haber procesos internos si el sistema esta aislado.
    en:
      - Believing that entropy must also be conserved.
      - Thinking that no internal processes can occur if the system is isolated.
