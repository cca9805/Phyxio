magnitudes:

  - id: U
    symbol: U
    nombre:
      es: Energía interna
      en: Internal energy
    descripcion:
      es: Energía total almacenada en el sistema, incluyendo energía cinética y potencial microscópica.
      en: Total energy stored in the system, including microscopic kinetic and potential energy.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - primer principio de la termodinámica
      - balance energético de sistema aislado
      - variación de temperatura en procesos internos
    common_mistake: "Confundir la energía interna con el calor o el trabajo; ambos son transferencias, no estados del sistema."
    typical_range: "10² J a 10⁶ J para sistemas macroscópicos de laboratorio"
    sign_behavior:
      has_sign: false
      meaning:
        es: La energía interna es una función de estado positiva; su variación puede ser positiva o negativa.
        en: Internal energy is a positive state function; its variation can be positive or negative.
    zero_behavior:
      allowed: false
      meaning:
        es: No es físicamente posible un sistema con energía interna nula a temperatura mayor que el cero absoluto.
        en: A system with zero internal energy at temperature above absolute zero is physically impossible.
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "> 0"
    interpretation_role:
      primary_for:
        - "determinar si el estado termodinámico del sistema aislado ha cambiado"
        - "cuantificar la capacidad calorífica almacenada"
      secondary_for:
        - "calcular temperatura de equilibrio tras redistribución interna"
    graph_binding:
      channels:
        - "eje_y: U vs t (variación temporal de energía interna)"
    pedagogical_notes:
      es: "En un sistema aislado, [[U]] no puede cambiar por definición. Esta constancia no implica que no ocurran procesos internos; la energía se redistribuye entre partes del sistema sin fluir al exterior."
      en: "In an isolated system, [[U]] cannot change by definition. This constancy does not mean no internal processes occur; energy redistributes among subsystems without flowing outward."

  - id: DeltaU
    symbol: "\u0394U"
    nombre:
      es: Variación de energía interna
      en: Change in internal energy
    descripcion:
      es: Diferencia entre la energía interna final e inicial del sistema durante un proceso.
      en: Difference between final and initial internal energy of the system during a process.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - primer principio de la termodinámica
      - condición de aislamiento
      - análisis de procesos internos
    common_mistake: "Asumir que [[DeltaU]] es siempre nula porque el sistema está en equilibrio; confundir equilibrio final con proceso nulo."
    typical_range: "0 J en sistema aislado ideal; en sistemas reales, desviaciones del orden de 10⁻³ J por fugas."
    sign_behavior:
      has_sign: true
      meaning:
        es: "DeltaU positivo significa que la energía interna ha aumentado; negativo, que ha disminuido. En sistema aislado ideal, siempre cero."
        en: "Positive DeltaU means internal energy increased; negative means it decreased. In an ideal isolated system, always zero."
    zero_behavior:
      allowed: true
      meaning:
        es: "DeltaU nulo es la condición definitoria del sistema aislado: no hay intercambio de calor ni trabajo con el entorno."
        en: "Zero DeltaU is the defining condition of the isolated system: no heat or work exchanged with surroundings."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "= 0 para sistema aislado ideal"
    interpretation_role:
      primary_for:
        - "verificar que el sistema cumple la condición de aislamiento"
        - "identificar si hubo transferencia energética no detectada"
      secondary_for:
        - "calcular trabajo o calor no deseado en sistemas casi aislados"
    graph_binding:
      channels:
        - "eje_y: DeltaU vs proceso (debería ser línea en cero)"
    pedagogical_notes:
      es: "[[DeltaU]] es el indicador operativo del aislamiento: si es cero, el aislamiento fue efectivo. Un alumno que obtiene [[DeltaU]] distinto de cero en un sistema declarado aislado debe revisar sus suposiciones de frontera."
      en: "[[DeltaU]] is the operational indicator of isolation: if zero, isolation was effective. A student obtaining non-zero [[DeltaU]] in a declared isolated system must review their boundary assumptions."

  - id: Q_ais
    symbol: Q
    nombre:
      es: Calor intercambiado (sistema aislado)
      en: Heat exchanged (isolated system)
    descripcion:
      es: Transferencia de energía térmica entre el sistema y el entorno. En sistema aislado ideal es siempre nula.
      en: Thermal energy transfer between system and surroundings. In an ideal isolated system, always zero.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - primer principio aplicado al sistema aislado
      - verificación de condiciones de frontera
    common_mistake: "Confundir que [[Q_ais]] es cero porque el sistema está frío, cuando en realidad es cero porque la frontera es adiabática."
    typical_range: "0 J por definición en aislamiento ideal"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo si el sistema absorbe calor del entorno; negativo si lo cede. En sistema aislado ideal, siempre cero."
        en: "Positive if the system absorbs heat from surroundings; negative if it releases heat. In an ideal isolated system, always zero."
    zero_behavior:
      allowed: true
      meaning:
        es: "Q nulo es condición necesaria (junto con W nulo) para que el sistema sea aislado."
        en: "Zero Q is a necessary condition (together with zero W) for the system to be isolated."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "= 0 para sistema aislado ideal"
    interpretation_role:
      primary_for:
        - "confirmar que la frontera del sistema es adiabática"
      secondary_for:
        - "cuantificar fugas térmicas en sistemas casi aislados"
    graph_binding:
      channels:
        - "referencia_horizontal: Q vs t debería ser constante en cero"
    pedagogical_notes:
      es: "La anulación de [[Q_ais]] define la naturaleza adiabática de la frontera. Enseñar explícitamente que esto es una propiedad de la frontera, no del contenido del sistema."
      en: "The annulment of [[Q_ais]] defines the adiabatic nature of the boundary. It is important to teach explicitly that this is a property of the boundary, not of the system contents."

  - id: W_ais
    symbol: W
    nombre:
      es: Trabajo intercambiado (sistema aislado)
      en: Work exchanged (isolated system)
    descripcion:
      es: Transferencia mecánica de energía entre el sistema y el entorno. En sistema aislado ideal es siempre nula.
      en: Mechanical energy transfer between system and surroundings. In an ideal isolated system, always zero.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: parameter
    physical_role: core_physical_quantity
    used_in:
      - primer principio aplicado al sistema aislado
      - clasificación de sistemas termodinámicos
    common_mistake: "Creer que si el volumen interno cambia también cambia el trabajo con el exterior; en sistema aislado la frontera es rígida."
    typical_range: "0 J por definición en aislamiento ideal (frontera rígida e impereable)"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo si el sistema realiza trabajo sobre el entorno; negativo si el entorno lo realiza sobre el sistema. En sistema aislado ideal, siempre cero."
        en: "Positive if the system does work on surroundings; negative if surroundings do work on the system. In an ideal isolated system, always zero."
    zero_behavior:
      allowed: true
      meaning:
        es: "W nulo confirma que la frontera es rígida e impermeable; ninguna fuerza externa actúa sobre el sistema."
        en: "Zero W confirms that the boundary is rigid and impermeable; no external force acts on the system."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: "= 0 para sistema aislado ideal"
    interpretation_role:
      primary_for:
        - "confirmar que la frontera del sistema es rígida"
      secondary_for:
        - "evaluar fugas mecánicas en sistemas casi aislados"
    graph_binding:
      channels:
        - "referencia_horizontal: W vs t debería ser constante en cero"
    pedagogical_notes:
      es: "La condición [[W_ais]] nulo implica frontera rígida. Un alumno que imagina un émbolo dentro del sistema aislado confunde trabajo interno con trabajo de frontera: solo el segundo rompe el aislamiento."
      en: "The condition of zero [[W_ais]] implies a rigid boundary. A student imagining a piston inside the isolated system confuses internal work with boundary work: only the latter breaks isolation."

  - id: S_ais
    symbol: S
    nombre:
      es: Entropía del sistema aislado
      en: Entropy of the isolated system
    descripcion:
      es: Magnitud de estado que mide el desorden microscópico del sistema; en sistema aislado solo puede aumentar o mantenerse constante.
      en: State quantity measuring the microscopic disorder of the system; in an isolated system it can only increase or remain constant.
    unidad_si: "J/K"
    dimension: "[M L^2 T^-2 Theta^-1]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - segundo principio de la termodinámica
      - criterio de irreversibilidad en sistema aislado
      - dirección espontánea de los procesos
    common_mistake: "Pensar que la entropía del sistema aislado puede disminuir si el proceso es rápido; el segundo principio no tiene excepción de velocidad."
    typical_range: "Incremento positivo o nulo para cualquier proceso real en sistema aislado"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La variación de [[S_ais]] es siempre mayor o igual a cero en un sistema aislado; nunca negativa."
        en: "The change in [[S_ais]] is always greater than or equal to zero in an isolated system; never negative."
    zero_behavior:
      allowed: true
      meaning:
        es: "Variación nula de [[S_ais]] corresponde a un proceso reversible ideal, no observable en la realidad macroscópica."
        en: "Zero change in [[S_ais]] corresponds to an ideal reversible process, not observable in macroscopic reality."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: ">= 0 (variación)"
    interpretation_role:
      primary_for:
        - "determinar la dirección espontánea de un proceso en sistema aislado"
        - "clasificar un proceso como reversible o irreversible"
      secondary_for:
        - "estimar el grado de irreversibilidad de un proceso térmico"
    graph_binding:
      channels:
        - "eje_y: S vs t (creciente o constante en sistema aislado)"
    pedagogical_notes:
      es: "En sistema aislado, [[S_ais]] nunca disminuye. Esta asimetría temporal es la base de la flecha del tiempo termodinámica. Es el resultado más profundo del segundo principio aplicado a este tipo de sistema."
      en: "In an isolated system, [[S_ais]] never decreases. This temporal asymmetry is the basis of the thermodynamic arrow of time and is the deepest result of the second law applied to this type of system."
