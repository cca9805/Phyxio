version: "1.0"
leaf: "sistema-cerrado"

coord:
  title:
    es: "Sistema cerrado: balance de energia interna"
    en: "Closed system: internal-energy balance"
  xAxis:
    es: calor intercambiado Q (J)
    en: exchanged heat Q (J)
  yAxis:
    es: variacion de energia interna DeltaU (J)
    en: change in internal energy DeltaU (J)
  xMagnitude: Q
  yMagnitude: DeltaU
  relation:
    es: DeltaU = Q + W. En un sistema cerrado no cruza materia, pero si calor y trabajo.
    en: DeltaU = Q + W. In a closed system matter does not cross, but heat and work do.
  physicalReading:
    es: La recta muestra como calor y trabajo intercambiados con el entorno cambian la energia interna.
    en: The line shows how heat and work exchanged with the surroundings change internal energy.
  slopeMeaning:
    es: "Pendiente 1: cada joule adicional de Q aumenta DeltaU en un joule si W es fijo."
    en: "Slope 1: each extra joule of Q raises DeltaU by one joule if W is fixed."
  interceptMeaning:
    es: Corte en DeltaU = W cuando Q = 0.
    en: Intercept at DeltaU = W when Q = 0.
  curvatureMeaning:
    es: "Recta: balance lineal de energia."
    en: "Straight line: linear energy balance."
  signMeaning:
    es: "DeltaU > 0: ganancia neta; DeltaU < 0: perdida neta."
    en: "DeltaU > 0: net gain; DeltaU < 0: net loss."
  areaMeaning:
    es: Sin interpretacion directa de area.
    en: No direct area interpretation.
  domainMeaning:
    es: Q y W pueden ser positivos o negativos segun el sentido del intercambio.
    en: Q and W may be positive or negative depending on exchange direction.
  modelConnection:
    es: Primer principio para sistemas cerrados con frontera impermeable a la materia.
    en: First law for closed systems with a boundary impermeable to matter.
  formulaConnection:
    es: DeltaU = Q + W con W positivo si el sistema recibe trabajo.
    en: DeltaU = Q + W with W positive if the system receives work.
  readingFocus:
    es: leer si el sistema gana o pierde energia interna al combinar calor y trabajo.
    en: read whether the system gains or loses internal energy by combining heat and work.
  agentHints:
    es:
      - "Sistema cerrado: no cruza materia."
      - DeltaU depende de Q + W.
      - Q = -W implica DeltaU = 0.
    en:
      - "Closed system: matter does not cross."
      - DeltaU depends on Q + W.
      - Q = -W implies DeltaU = 0.
  commonMistakes:
    es:
      - Confundir cerrado con aislado.
      - Olvidar el signo de W.
    en:
      - Confusing closed with isolated.
      - Forgetting the sign of W.
