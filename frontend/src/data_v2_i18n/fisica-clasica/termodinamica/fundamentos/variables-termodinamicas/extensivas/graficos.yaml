version: "1.0"
leaf: "extensivas"

coord:
  title:
    es: "Variables extensivas: escalado con el sistema"
    en: "Extensive variables: scaling with system size"
  xAxis:
    es: factor de escala lambda_escala
    en: scaling factor lambda_escala
  yAxis:
    es: magnitud extensiva X_ext
    en: extensive magnitude X_ext
  xMagnitude: lambda_escala
  yMagnitude: X_ext
  relation:
    es: X_ext(lambda_escala sistema) = lambda_escala X_ext(sistema).
    en: X_ext(lambda_escala system) = lambda_escala X_ext(system).
  physicalReading:
    es: Al juntar copias equivalentes del sistema, la cantidad total aumenta proporcionalmente.
    en: When equivalent system copies are joined, the total amount increases proportionally.
  slopeMeaning:
    es: Pendiente = valor extensivo de una copia base.
    en: Slope = extensive value of one base copy.
  interceptMeaning:
    es: "Origen: sistema nulo idealizado."
    en: "Origin: idealized null system."
  curvatureMeaning:
    es: "Recta: extensividad ideal."
    en: "Straight line: ideal extensivity."
  signMeaning:
    es: Masa, volumen y N son no negativos; otras extensivas dependen de referencia.
    en: Mass, volume and N are non-negative; other extensive quantities depend on reference.
  areaMeaning:
    es: Sin interpretacion directa de area.
    en: No direct area interpretation.
  domainMeaning:
    es: "lambda_escala > 0 con composicion y estado intensivo constantes."
    en: "lambda_escala > 0 with constant composition and intensive state."
  modelConnection:
    es: Criterio de extensividad y aditividad termodinamica.
    en: Extensivity criterion and thermodynamic additivity.
  formulaConnection:
    es: X_ext(lambda sistema)=lambda X_ext(sistema); X_total=X_1+X_2.
    en: X_ext(lambda system)=lambda X_ext(system); X_total=X_1+X_2.
  readingFocus:
    es: comprobar si la magnitud aumenta al juntar copias del sistema.
    en: check whether the magnitude increases when system copies are joined.
  agentHints:
    es:
      - Duplicar sistema duplica X_ext.
      - La densidad no se duplica.
      - Normalizar por masa elimina tamano.
    en:
      - Doubling the system doubles X_ext.
      - Density does not double.
      - Normalizing by mass removes size.
  commonMistakes:
    es:
      - Sumar temperaturas.
      - Confundir total con especifico.
    en:
      - Adding temperatures.
      - Confusing total with specific.
