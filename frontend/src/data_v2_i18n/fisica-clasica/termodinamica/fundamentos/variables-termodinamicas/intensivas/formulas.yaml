leaf_id: intensivas
formulas:
- id: criterio_intensividad
  title:
    es: Criterio de intensividad por escalado
    en: Scaling criterion for intensivity
  title_es_en:
    es: Criterio de intensividad por escalado
    en: Scaling criterion for intensivity
  equation: X_int(lambda sistema) = X_int(sistema)
  latex: X_{\mathrm{int}}(\lambda\,\mathrm{sistema})=X_{\mathrm{int}}(\mathrm{sistema})
  category: definicion
  relation_type: proportionality
  validity:
    es: Valida al escalar una muestra manteniendo el mismo estado local y la misma composicion.
    en: Valid when scaling a sample while keeping the same local state and composition.
  validity_es_en:
    es: Misma sustancia
    misma fase y equilibrio interno razonable.: null
    en: Same substance
    same phase: null
    and reasonable internal equilibrium.: null
  dimension_check:
    es: Ambos lados tienen la misma dimension que X_int.
    en: Both sides have the same dimension as X_int.
  calculable: true
  motivo_no_calculable: ''
  variables:
  - X_int
  - lambda_escala
  targets:
  - X_int
  - lambda_escala
  used_in:
  - teoria.md
  - teoria.en.md
  - ejemplos.md
  - ejemplos.en.md
  interpretation_tags:
  - escala
  - estado
  - intensiva
  domain_checks:
  - lambda_escala > 0
  - estado_local_constante
  coherence_checks:
  - X_int_no_se_suma
  - misma_referencia
  graph_implications:
  - curva_horizontal_frente_a_escala
  pedagogical_triggers:
  - error: Duplicar temperatura al duplicar muestra
    detection: T_final = 2 T_inicial
    message:
      es: La temperatura no se duplica por tener dos copias iguales.
      en: Temperature does not double because there are two equal copies.
  physical_meaning:
    es: Una variable intensiva caracteriza el estado
    no la cantidad total de sistema.: null
    en: An intensive variable characterizes state
    not total amount of system.: null
  rearrangements:
  - target: X_int
    equation: X_int(lambda sistema) = X_int(sistema)
    latex: X_{\mathrm{int}}(\lambda\,\mathrm{sistema})=X_{\mathrm{int}}(\mathrm{sistema})
  constraints:
  - mismo sistema de referencia
  - variables compatibles
  result_semantics:
    target: X_int
    kind: proportionality
    sign_meaning:
      es: Depende de la magnitud intensiva evaluada.
      en: Depends on the intensive magnitude being evaluated.
    absolute_value_meaning:
      es: Lectura de estado o propiedad normalizada.
      en: State reading or normalized property.
- id: igualdad_equilibrio_intensivo
  title:
    es: Igualdad intensiva en equilibrio
    en: Intensive equality at equilibrium
  title_es_en:
    es: Igualdad intensiva en equilibrio
    en: Intensive equality at equilibrium
  equation: X_int,A = X_int,B
  latex: X_{\mathrm{int},A}=X_{\mathrm{int},B}
  category: equilibrio
  relation_type: equality
  validity:
    es: Aplica cuando dos partes pueden intercambiar la cantidad conjugada y han alcanzado equilibrio.
    en: Applies when two parts can exchange the conjugate amount and have reached equilibrium.
  validity_es_en:
    es: Contacto fisico adecuado y sin barrera que mantenga diferencias internas.
    en: Adequate physical contact and no barrier maintaining internal differences.
  dimension_check:
    es: Las dos variables comparadas deben ser de la misma magnitud y unidad.
    en: The compared variables must have the same magnitude and unit.
  calculable: true
  motivo_no_calculable: ''
  variables:
  - X_int
  - T
  - P
  targets:
  - X_int
  - T
  - P
  used_in:
  - teoria.md
  - teoria.en.md
  - errores.md
  - errores.en.md
  interpretation_tags:
  - equilibrio
  - igualdad
  - frontera
  domain_checks:
  - subsistemas_comparables
  - intercambio_permitido
  coherence_checks:
  - misma_variable
  - misma_unidad
  graph_implications:
  - niveles_se_igualan
  pedagogical_triggers:
  - error: Confundir equilibrio con cantidades iguales
    detection: m_A = m_B como criterio de equilibrio
    message:
      es: El equilibrio se reconoce por igualdad de intensivas, no por masas iguales.
      en: Equilibrium is recognized by equality of intensives, not equal masses.
  physical_meaning:
    es: Una diferencia intensiva indica tendencia a intercambio; la igualdad borra esa tendencia macroscópica.
    en: An intensive difference indicates exchange tendency; equality removes that macroscopic tendency.
  rearrangements:
  - target: X_int
    equation: X_int,A = X_int,B
    latex: X_{\mathrm{int},A}=X_{\mathrm{int},B}
  constraints:
  - mismo sistema de referencia
  - variables compatibles
  result_semantics:
    target: X_int
    kind: equality
    sign_meaning:
      es: Depende de la magnitud intensiva evaluada.
      en: Depends on the intensive magnitude being evaluated.
    absolute_value_meaning:
      es: Lectura de estado o propiedad normalizada.
      en: State reading or normalized property.
- id: densidad_intensiva
  title:
    es: Densidad como variable intensiva
    en: Density as an intensive variable
  title_es_en:
    es: Densidad como variable intensiva
    en: Density as an intensive variable
  equation: rho = m / V
  latex: \rho=\frac{m}{V}
  category: definicion
  relation_type: quotient
  validity:
    es: Valida para una region donde masa y volumen se refieren al mismo sistema o elemento material.
    en: Valid for a region where mass and volume refer to the same system or material element.
  validity_es_en:
    es: Requiere volumen positivo y muestra representativa.
    en: Requires positive volume and representative sample.
  dimension_check:
    es: kg dividido por m3 da kg/m3.
    en: kg divided by m3 gives kg/m3.
  calculable: true
  motivo_no_calculable: ''
  variables:
  - rho
  - m
  - V
  targets:
  - rho
  - m
  - V
  used_in:
  - teoria.md
  - teoria.en.md
  - ejemplos.md
  - ejemplos.en.md
  interpretation_tags:
  - cociente
  - normalizacion
  - material
  domain_checks:
  - V > 0
  - misma_muestra
  coherence_checks:
  - m_y_V_escalan_juntos
  graph_implications:
  - rho_constante_al_escalar
  pedagogical_triggers:
  - error: Identificar densidad con masa
    detection: rho aumenta solo porque m aumenta
    message:
      es: Si el volumen aumenta en la misma proporcion, la densidad no cambia.
      en: If volume increases by the same proportion, density does not change.
  physical_meaning:
    es: La densidad mide concentracion de masa
    no masa total.: null
    en: Density measures mass concentration
    not total mass.: null
  rearrangements:
  - target: rho
    equation: rho = m / V
    latex: \rho=\frac{m}{V}
  constraints:
  - mismo sistema de referencia
  - variables compatibles
  result_semantics:
    target: rho
    kind: quotient
    sign_meaning:
      es: Depende de la magnitud intensiva evaluada.
      en: Depends on the intensive magnitude being evaluated.
    absolute_value_meaning:
      es: Lectura de estado o propiedad normalizada.
      en: State reading or normalized property.
- id: promedio_ponderado_intensivo
  title:
    es: Promedio ponderado de una intensiva
    en: Weighted average of an intensive variable
  title_es_en:
    es: Promedio ponderado de una intensiva
    en: Weighted average of an intensive variable
  equation: X_int_final = (m_A X_A + m_B X_B) / (m_A + m_B)
  latex: X_{int,final}=\frac{m_A X_A+m_B X_B}{m_A+m_B}
  category: promedio
  relation_type: weighted_average
  validity:
    es: Aproximacion util cuando la propiedad se promedia con una cantidad extensiva compatible y no hay efectos no lineales dominantes.
    en: Useful approximation when the property is averaged with a compatible extensive amount and no dominant nonlinear effects exist.
  validity_es_en:
    es: Adecuada para estimaciones de mezcla simple con cantidades positivas.
    en: Suitable for simple mixture estimates with positive amounts.
  dimension_check:
    es: El numerador tiene unidad masa por X y el denominador masa; queda la unidad de X.
    en: The numerator has mass times X and the denominator mass; the unit of X remains.
  calculable: true
  motivo_no_calculable: ''
  variables:
  - X_int
  - X_A
  - X_B
  - m
  targets:
  - X_int
  - X_A
  - X_B
  - m
  used_in:
  - ejemplos.md
  - ejemplos.en.md
  - aplicaciones.md
  - aplicaciones.en.md
  interpretation_tags:
  - ponderacion
  - promedio
  domain_checks:
  - m_A > 0
  - m_B > 0
  - misma_propiedad
  coherence_checks:
  - no_media_aritmetica_sin_pesos
  graph_implications:
  - valor_final_entre_extremos
  pedagogical_triggers:
  - error: Usar media simple con masas distintas
    detection: X_final = (X_A + X_B)/2
    message:
      es: Con cantidades distintas, la intensiva final debe ponderarse.
      en: With different amounts, the final intensive value must be weighted.
  physical_meaning:
    es: Una intensiva de mezcla suele quedar entre los valores iniciales
    desplazada hacia la parte con mas cantidad.: null
    en: A mixture intensive usually lies between initial values
    shifted toward the larger amount.: null
  rearrangements:
  - target: X_int
    equation: X_int_final = (m_A X_A + m_B X_B) / (m_A + m_B)
    latex: X_{int,final}=\frac{m_A X_A+m_B X_B}{m_A+m_B}
  constraints:
  - mismo sistema de referencia
  - variables compatibles
  result_semantics:
    target: X_int
    kind: weighted_average
    sign_meaning:
      es: Depende de la magnitud intensiva evaluada.
      en: Depends on the intensive magnitude being evaluated.
    absolute_value_meaning:
      es: Lectura de estado o propiedad normalizada.
      en: State reading or normalized property.
