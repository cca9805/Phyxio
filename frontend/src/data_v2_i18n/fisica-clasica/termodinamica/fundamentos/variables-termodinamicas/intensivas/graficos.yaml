version: "1.0"
leaf: "intensivas"

coord:
  title:
    es: "Variables intensivas: invariancia al escalar"
    en: "Intensive variables: invariance under scaling"
  xAxis:
    es: factor de escala lambda_escala
    en: scaling factor lambda_escala
  yAxis:
    es: variable intensiva X_int
    en: intensive variable X_int
  xMagnitude: lambda_escala
  yMagnitude: X_int
  relation:
    es: X_int(lambda_escala sistema) = X_int(sistema).
    en: X_int(lambda_escala system) = X_int(system).
  physicalReading:
    es: La linea horizontal muestra que la variable caracteriza el estado local, no el tamano total.
    en: The horizontal line shows that the variable characterizes local state, not total size.
  slopeMeaning:
    es: "Pendiente cero: escalar la muestra no cambia X_int."
    en: "Zero slope: scaling the sample does not change X_int."
  interceptMeaning:
    es: Valor de estado comun a todas las copias equivalentes.
    en: State value common to all equivalent copies.
  curvatureMeaning:
    es: "Recta horizontal: estado intensivo constante."
    en: "Horizontal line: constant intensive state."
  signMeaning:
    es: Depende de la variable; T absoluta y P ordinaria son no negativas.
    en: Depends on the variable; absolute T and ordinary P are non-negative.
  areaMeaning:
    es: Sin interpretacion directa de area.
    en: No direct area interpretation.
  domainMeaning:
    es: "lambda_escala > 0 con composicion y estado local constantes."
    en: "lambda_escala > 0 with constant composition and local state."
  modelConnection:
    es: Criterio de intensividad para temperatura, presion y densidad.
    en: Intensivity criterion for temperature, pressure and density.
  formulaConnection:
    es: X_int(lambda sistema)=X_int(sistema).
    en: X_int(lambda system)=X_int(system).
  readingFocus:
    es: comprobar que la variable permanece igual al escalar el sistema.
    en: check that the variable remains unchanged when scaling the system.
  agentHints:
    es:
      - Duplicar muestra no duplica T.
      - La presion no es cantidad total.
      - La densidad normaliza masa por volumen.
    en:
      - Doubling a sample does not double T.
      - Pressure is not a total amount.
      - Density normalizes mass by volume.
  commonMistakes:
    es:
      - Sumar temperaturas.
      - Confundir densidad con masa total.
    en:
      - Adding temperatures.
      - Confusing density with total mass.
