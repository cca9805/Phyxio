leaf_id: intensivas
magnitudes:
- id: X_int
  symbol: X_int
  nombre:
    es: Variable intensiva generica
    en: Generic intensive variable
  descripcion:
    es: Magnitud que no cambia al duplicar una muestra en el mismo estado.
    en: Magnitude that does not change when a sample in the same state is duplicated.
  unidad_si: variable
  si_base: variable
  dimension: variable
  is_vector: false
  components: []
  category: estado
  role: principal
  used_in:
  - criterio_intensividad
  - promedio_ponderado_intensivo
  common_mistake:
    es: Confundirla con una cantidad total acumulable.
    en: Confusing it with an accumulable total quantity.
  typical_range:
    es: Depende de la propiedad observada.
    en: Depends on the observed property.
  value_nature: state
  finite: true
  calculable: true
  pedagogical_notes:
    es: Es el marcador abstracto para temperatura
    presion o densidad.: null
    en: It is the abstract marker for temperature
    pressure: null
    or density.: null
  physical_role:
    es: variable estado
    en: estado variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: principal
  graph_binding:
    type: Coord
    role: output
- id: lambda_escala
  symbol: lambda
  nombre:
    es: Factor de escala del sistema
    en: System scale factor
  descripcion:
    es: Numero por el que se multiplica la cantidad de sistema sin cambiar su estado local.
    en: Number by which the amount of system is multiplied without changing its local state.
  unidad_si: '1'
  si_base: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: parametro
  role: control
  used_in:
  - criterio_intensividad
  common_mistake:
    es: Pensar que al crecer lambda tambien debe crecer cualquier propiedad.
    en: Thinking that when lambda grows every property must also grow.
  typical_range:
    es: Mayor que cero; en ejemplos se usa 1 a 5.
    en: Greater than zero; examples use 1 to 5.
  value_nature: parameter
  finite: true
  calculable: true
  pedagogical_notes:
    es: Permite separar tamano total de estado termodinamico.
    en: It separates total size from thermodynamic state.
  physical_role:
    es: variable parametro
    en: parametro variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: control
  graph_binding:
    type: Coord
    role: control
- id: T
  symbol: T
  nombre:
    es: Temperatura
    en: Temperature
  descripcion:
    es: Variable intensiva que mide equilibrio termico y direccion de transferencia de calor.
    en: Intensive variable measuring thermal equilibrium and heat-transfer direction.
  unidad_si: K
  si_base: K
  dimension: Theta
  is_vector: false
  components: []
  category: estado
  role: core
  used_in:
  - igualdad_equilibrio_intensivo
  - promedio_ponderado_intensivo
  common_mistake:
    es: Sumar temperaturas de cuerpos al juntarlos.
    en: Adding temperatures of bodies when they are joined.
  typical_range:
    es: 250 K a 1000 K en muchos sistemas de laboratorio.
    en: 250 K to 1000 K in many laboratory systems.
  value_nature: state
  finite: true
  calculable: true
  pedagogical_notes:
    es: Dos copias identicas tienen la misma temperatura que una copia.
    en: Two identical copies have the same temperature as one copy.
  physical_role:
    es: variable estado
    en: estado variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: core
  graph_binding:
    type: Coord
    role: output
- id: P
  symbol: P
  nombre:
    es: Presion
    en: Pressure
  descripcion:
    es: Fuerza normal por unidad de area
    intensiva cuando el estado mecanico local es uniforme.: null
    en: Normal force per unit area
    intensive when the local mechanical state is uniform.: null
  unidad_si: Pa
  si_base: kg m^-1 s^-2
  dimension: M L^-1 T^-2
  is_vector: false
  components: []
  category: estado
  role: core
  used_in:
  - igualdad_equilibrio_intensivo
  common_mistake:
    es: Duplicar presion al duplicar el volumen de gas en el mismo estado.
    en: Doubling pressure when doubling gas volume in the same state.
  typical_range:
    es: 10^5 Pa cerca de condiciones ambientales.
    en: 10^5 Pa near ambient conditions.
  value_nature: state
  finite: true
  calculable: true
  pedagogical_notes:
    es: Caracteriza el empuje local sobre fronteras
    no cantidad total de gas.: null
    en: It characterizes local push on boundaries
    not total amount of gas.: null
  physical_role:
    es: variable estado
    en: estado variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: core
  graph_binding:
    type: Coord
    role: output
- id: rho
  symbol: rho
  nombre:
    es: Densidad
    en: Density
  descripcion:
    es: Masa por unidad de volumen
    cociente intensivo de dos extensivas compatibles.: null
    en: Mass per unit volume
    an intensive ratio of two compatible extensives.: null
  unidad_si: kg/m3
  si_base: kg m^-3
  dimension: M L^-3
  is_vector: false
  components: []
  category: material
  role: core
  used_in:
  - densidad_intensiva
  - promedio_ponderado_intensivo
  common_mistake:
    es: Tratarla como masa total del sistema.
    en: Treating it as total mass of the system.
  typical_range:
    es: 1 kg/m3 en gases ligeros
    1000 kg/m3 en agua.: null
    en: 1 kg/m3 in light gases
    1000 kg/m3 in water.: null
  value_nature: property
  finite: true
  calculable: true
  pedagogical_notes:
    es: Si masa y volumen se duplican juntos
    rho no cambia.: null
    en: If mass and volume double together
    rho does not change.: null
  physical_role:
    es: variable material
    en: material variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: core
  graph_binding:
    type: Coord
    role: output
- id: m
  symbol: m
  nombre:
    es: Masa
    en: Mass
  descripcion:
    es: Cantidad extensiva usada como peso estadistico al promediar intensivas.
    en: Extensive amount used as statistical weight when averaging intensives.
  unidad_si: kg
  si_base: kg
  dimension: M
  is_vector: false
  components: []
  category: cantidad
  role: support
  used_in:
  - densidad_intensiva
  - promedio_ponderado_intensivo
  common_mistake:
    es: Olvidar que la masa pondera mezclas con temperaturas distintas.
    en: Forgetting that mass weights mixtures with different temperatures.
  typical_range:
    es: Positiva en sistemas macroscopicos.
    en: Positive in macroscopic systems.
  value_nature: amount
  finite: true
  calculable: true
  pedagogical_notes:
    es: No es intensiva
    pero ayuda a calcular propiedades intensivas de mezclas.: null
    en: It is not intensive
    but helps compute intensive properties of mixtures.: null
  physical_role:
    es: variable cantidad
    en: cantidad variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: support
  graph_binding:
    type: Coord
    role: support
- id: V
  symbol: V
  nombre:
    es: Volumen
    en: Volume
  descripcion:
    es: Extension espacial total usada para normalizar masa o energia.
    en: Total spatial extension used to normalize mass or energy.
  unidad_si: m3
  si_base: m^3
  dimension: L^3
  is_vector: false
  components: []
  category: cantidad
  role: support
  used_in:
  - densidad_intensiva
  common_mistake:
    es: Confundir volumen grande con densidad grande.
    en: Confusing large volume with high density.
  typical_range:
    es: Positivo; depende del sistema.
    en: Positive; depends on the system.
  value_nature: amount
  finite: true
  calculable: true
  pedagogical_notes:
    es: Al dividir masa por volumen aparece una propiedad intensiva.
    en: Dividing mass by volume gives an intensive property.
  physical_role:
    es: variable cantidad
    en: cantidad variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: support
  graph_binding:
    type: Coord
    role: support
- id: X_A
  symbol: X_A
  nombre:
    es: Valor intensivo de la parte A
    en: Intensive value of part A
  descripcion:
    es: Propiedad local o media de un subsistema antes de mezclarlo.
    en: Local or mean property of a subsystem before mixing.
  unidad_si: variable
  si_base: variable
  dimension: variable
  is_vector: false
  components: []
  category: estado
  role: support
  used_in:
  - promedio_ponderado_intensivo
  common_mistake:
    es: Promediarlo sin ponderar por cantidad.
    en: Averaging it without weighting by amount.
  typical_range:
    es: Finito y compatible con X_B.
    en: Finite and compatible with X_B.
  value_nature: state
  finite: true
  calculable: true
  pedagogical_notes:
    es: En mezclas no basta con hacer media aritmetica si las cantidades son distintas.
    en: In mixtures an arithmetic mean is not enough if amounts differ.
  physical_role:
    es: variable estado
    en: estado variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: support
  graph_binding:
    type: Coord
    role: support
- id: X_B
  symbol: X_B
  nombre:
    es: Valor intensivo de la parte B
    en: Intensive value of part B
  descripcion:
    es: Propiedad local o media de un segundo subsistema antes de mezclarlo.
    en: Local or mean property of a second subsystem before mixing.
  unidad_si: variable
  si_base: variable
  dimension: variable
  is_vector: false
  components: []
  category: estado
  role: support
  used_in:
  - promedio_ponderado_intensivo
  common_mistake:
    es: Suponer que domina tanto como X_A aunque haya menos cantidad.
    en: Assuming it dominates as much as X_A even when there is less amount.
  typical_range:
    es: Finito y compatible con X_A.
    en: Finite and compatible with X_A.
  value_nature: state
  finite: true
  calculable: true
  pedagogical_notes:
    es: Su efecto sobre el valor final depende de la cantidad asociada.
    en: Its effect on the final value depends on the associated amount.
  physical_role:
    es: variable estado
    en: estado variable
  sign_behavior:
    es: Debe interpretarse segun la propiedad y su referencia.
    en: Must be interpreted according to the property and its reference.
  zero_behavior:
    es: El cero puede ser fisico, convencional o no alcanzable segun la magnitud.
    en: Zero may be physical, conventional, or unreachable depending on the magnitude.
  interpretation_role: support
  graph_binding:
    type: Coord
    role: support
