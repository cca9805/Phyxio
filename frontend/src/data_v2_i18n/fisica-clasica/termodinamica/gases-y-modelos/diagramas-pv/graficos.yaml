version: "1.0"
leaf: "diagramas-pv"

coord:
  title:
    es: Gráfica Coord · Diagramas p-V
    en: Coord Graph · p-V Diagrams
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: V
  yMagnitude: p
  relation:
    es: "W = ∫ p dV = área bajo la curva p(V). Ciclo horario: motor (W > 0). Ciclo antihorario: refrigerador (W < 0)."
    en: "W = ∫ p dV = area under p(V). Clockwise cycle: engine (W > 0). Counterclockwise: refrigerator (W < 0)."
  physicalReading:
    es: "Área del ciclo = W_neto. Dirección del recorrido determina signo. Proceso: cada curva es iso-algo."
    en: Cycle area = W_net. Direction of traversal determines sign. Each curve is an iso-something process.
  slopeMeaning:
    es: "dp/dV: pendiente de la curva de proceso (isobara: 0; isocora: ∞; isoterma: −p/V)."
    en: "dp/dV: slope of process curve (isobar: 0; isochore: ∞; isotherm: −p/V)."
  interceptMeaning:
    es: Estado inicial del ciclo.
    en: Initial state of the cycle.
  curvatureMeaning:
    es: "Isoterma: hipérbola. Adiabática: más empinada que isoterma."
    en: "Isotherm: hyperbola. Adiabat: steeper than isotherm."
  signMeaning:
    es: "W > 0: expansión (sistema trabaja). W < 0: compresión."
    en: "W > 0: expansion (system works). W < 0: compression."
  areaMeaning:
    es: Área bajo p(V) = W = ∫ p dV.
    en: Area under p(V) = W = ∫ p dV.
  domainMeaning:
    es: "V > 0."
    en: "V > 0."
  modelConnection:
    es: "Diagramas p-V: primer principio y ciclos termodinámicos."
    en: "p-V diagrams: first law and thermodynamic cycles."
  formulaConnection:
    es: W = ∫ p dV, ΔU = Q − W.
    en: W = ∫ p dV, ΔU = Q − W.
  readingFocus:
    es: leer el área del ciclo como W, la dirección y el tipo de cada proceso.
    en: read cycle area as W, direction and type of each process.
  agentHints:
    es:
      - W = área ciclo.
      - "Horario: motor."
      - "Antihorario: refrigerador."
    en:
      - W = cycle area.
      - "Clockwise: engine."
      - "Counterclockwise: refrigerator."
  commonMistakes:
    es:
      - W = pΔV siempre.
      - "Ciclo: W = 0."
      - Dirección no importa.
    en:
      - W = pΔV always.
      - "Cycle: W = 0."
      - "Direction doesn't matter."

svg:
  title:
    es: Escena SVG · Diagramas p-V
    en: SVG Scene · p-V Diagrams
  sceneId: diagramas_pv
  sceneLabel:
    es: "Ciclo en diagrama p-V: procesos y área = W"
    en: "Cycle in p-V diagram: processes and area = W"
  objects:
    es:
      - estado 1
      - estado 2
      - estado 3
      - estado 4
      - curvas de proceso
      - área del ciclo
    en:
      - state 1
      - state 2
      - state 3
      - state 4
      - process curves
      - cycle area
  mainObject:
    es: ciclo termodinámico
    en: thermodynamic cycle
  referenceFrame:
    es: espacio p-V
    en: p-V space
  geometry:
    es: "Área encerrada = W_neto. Cada curva: proceso específico."
    en: "Enclosed area = W_net. Each curve: specific process."
  interactions:
    es: "W = ∫ p dV. ΔU = Q − W. Ciclo: ΔU = 0."
    en: "W = ∫ p dV. ΔU = Q − W. Cycle: ΔU = 0."
  modelElements:
    es:
      - W = área
      - ΔU = 0 en ciclo
      - Q_neto = W_neto
    en:
      - W = area
      - ΔU = 0 in cycle
      - Q_net = W_net
  visualCues:
    es:
      - Flecha de recorrido.
      - Área sombreada = W.
      - Estados numerados.
    en:
      - Traversal arrow.
      - Shaded area = W.
      - Numbered states.
  scaleMeaning:
    es: Ejes p y V con unidades SI.
    en: Axes p and V in SI units.
  relation:
    es: W = área ciclo p-V.
    en: W = p-V cycle area.
  physicalReading:
    es: "Dirección horaria: motor. Área: W_neto."
    en: "Clockwise: engine. Area: W_net."
  modelConnection:
    es: Diagramas p-V y ciclos.
    en: p-V diagrams and cycles.
  formulaConnection:
    es: W = ∫ p dV, ΔU = Q − W.
    en: W = ∫ p dV, ΔU = Q − W.
  readingFocus:
    es: identificar procesos, área y dirección del ciclo.
    en: identify processes, area and cycle direction.
  agentHints:
    es:
      - W = área.
      - Horario = motor.
      - ΔU = 0 en ciclo.
    en:
      - W = area.
      - Clockwise = engine.
      - ΔU = 0 in cycle.
  commonMistakes:
    es:
      - W = 0 en ciclo.
      - Dirección indiferente.
    en:
      - W = 0 in cycle.
      - Direction indifferent.
