version: 1.0.0
id: diagramas-pv-interpretacion
leaf_id: diagramas-pv
nombre: { es: Interpretacion de diagramas p-V, en: P-V diagrams interpretation }
scope:
  area: fisica-clasica
  bloque: termodinamica
  subbloque: gases-y-modelos
  parent_id: gases-y-modelos
  ruta_relativa: fisica-clasica/termodinamica/gases-y-modelos/diagramas-pv
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: { summary: Resumen fisico, reading: Lectura del resultado, coherence: Coherencia, validity: Validez del modelo, graph: Lectura grafica, errors: Errores probables, next_step: Siguiente paso }
    en: { summary: Physical summary, reading: Result reading, coherence: Coherence, validity: Model validity, graph: Graph reading, errors: Likely errors, next_step: Next step }
  priority_order: [ summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step ]
  inline_limits:
    max_summary_chars: 200
    max_warnings: 2
dependencies:
  formulas: [ gas_ideal, trabajo_isobarico ]
  magnitudes: [ P, V, T, n, R, W, DeltaV ]
global_context:
  physical_domain: { es: Diagramas p-V y trabajo en termodinamica de gases, en: P-V diagrams and work in gas thermodynamics }
  axis_convention: { es: "El eje horizontal muestra [[V]] y el vertical muestra [[P]].", en: "The horizontal axis shows [[V]] and the vertical axis shows [[P]]." }
  standard_assumptions: [ gas ideal, proceso conocido, variables macroscopicas ]
  standard_warnings: [ "No todas las trayectorias son isobaricas ni isotermicas." ]
output_contract:
  format: structured_text
  include_emojis: true
  max_lines_per_section: 5
  truncate_long_values: true
  sections: [ summary, physical_reading, coherence, model_validity, graph_reading, likely_errors, next_step ]
result_blocks:
  summary: { enabled: true, priority: 1, title: { es: Resumen fisico, en: Physical summary } }
  physical_reading: { enabled: true, priority: 2, title: { es: Lectura fisica, en: Physical reading } }
  coherence: { enabled: true, priority: 3, title: { es: Coherencia, en: Coherence } }
  model_validity: { enabled: true, priority: 4, title: { es: Validez del modelo, en: Model validity } }
  graph_reading: { enabled: true, priority: 5, title: { es: Lectura grafica, en: Graph reading } }
  likely_errors: { enabled: true, priority: 6, title: { es: Errores probables, en: Likely errors } }
  next_step: { enabled: true, priority: 7, title: { es: Siguiente paso, en: Next step } }
targets:
  P:
    magnitude_type: P
    semantic_role: { es: Presion dentro del proceso, en: Process pressure }
    summary_rules:
    - id: p_summary_default
      when: "true"
      status: ok
      text:
        es: "La presion calculada define la altura de la curva en el diagrama p-V y condiciona el trabajo del proceso."
        en: "The calculated pressure defines the curve height in the P-V diagram and conditions the work of the process."
    physical_reading_rules:
    - id: p_physical_reading
      when: "true"
      status: ok
      text:
        es: "[[P]] describe la fuerza por unidad de area que el gas ejerce sobre las paredes del recipiente."
        en: "[[P]] describes the force per unit area that the gas exerts on the container walls."
    coherence_rules:
    - id: p_coherence_positive
      when: "P > 0"
      status: ok
      text:
        es: "Una presion positiva es coherente con el modelo de gas ideal."
        en: "Positive pressure is coherent with the ideal gas model."
    model_validity_rules:
    - id: p_model_validity
      when: "true"
      status: info
      text:
        es: "Este valor de presion es valido siempre que el proceso mantenga un gas ideal y no se alcancen densidades liquidas."
        en: "This pressure value is valid as long as the process keeps an ideal gas and does not reach liquid-like densities."
    graph_rules:
    - id: p_graph_reading
      when: "true"
      status: info
      text:
        es: "En el grafico, [[P]] corresponde a la altura de cada punto sobre el eje vertical."
        en: "On the graph, [[P]] corresponds to the height of each point above the vertical axis."
    likely_errors:
    - id: p_likely_error
      when: "true"
      status: warning
      text:
        es: "No confundas una presion alta con mayor trabajo si el cambio de volumen es muy pequeño."
        en: "Do not confuse high pressure with more work if the volume change is very small."
    next_step_rules:
    - id: p_next_step
      when: "true"
      status: info
      text:
        es: "Comprueba tambien [[DeltaV]] para saber si el proceso produce expansion o compresion neta."
        en: "Also check [[DeltaV]] to determine whether the process produces net expansion or compression."

  V:
    magnitude_type: V
    semantic_role: { es: Volumen del estado, en: State volume }
    summary_rules:
    - id: v_summary_default
      when: "true"
      status: ok
      text:
        es: "El volumen marca la posicion horizontal de la trayectoria y el tamaño del trabajo si la presion es constante."
        en: "Volume marks the horizontal position of the trajectory and the work magnitude if pressure is constant."
    physical_reading_rules:
    - id: v_physical_reading
      when: "true"
      status: ok
      text:
        es: "[[V]] indica cuanto espacio ocupa el gas y cuanto puede cambiar durante el proceso."
        en: "[[V]] indicates how much space the gas occupies and how much it can change during the process."
    coherence_rules:
    - id: v_coherence_positive
      when: "V > 0"
      status: ok
      text:
        es: "Un volumen positivo es coherente con la interpretacion fisica de un gas."
        en: "A positive volume is coherent with the physical interpretation of a gas."
    model_validity_rules:
    - id: v_model_validity
      when: "true"
      status: info
      text:
        es: "El modelo de gas ideal exige que el volumen este bien definido y no colapse."
        en: "The ideal gas model requires that volume be well defined and not collapse."
    graph_rules:
    - id: v_graph_reading
      when: "true"
      status: info
      text:
        es: "El eje horizontal refleja el desplazamiento volumetrico del proceso."
        en: "The horizontal axis reflects the volumetric displacement of the process."
    likely_errors:
    - id: v_likely_error
      when: "true"
      status: warning
      text:
        es: "No interpretes el volumen absoluto como trabajo; el trabajo depende del cambio de volumen."
        en: "Do not interpret absolute volume as work; work depends on volume change."
    next_step_rules:
    - id: v_next_step
      when: "true"
      status: info
      text:
        es: "Relaciona [[V]] con [[P]] para ver si el proceso sigue una curva isotermica o una linea recta."
        en: "Relate [[V]] to [[P]] to see whether the process follows an isothermal curve or a straight line."

  T:
    magnitude_type: T
    semantic_role: { es: Temperatura del gas, en: Gas temperature }
    summary_rules:
    - id: t_summary_default
      when: "true"
      status: ok
      text:
        es: "La temperatura determina la familia de curvas del gas ideal en el diagrama p-V."
        en: "Temperature determines the family of ideal gas curves in the P-V diagram."
    physical_reading_rules:
    - id: t_physical_reading
      when: "true"
      status: ok
      text:
        es: "[[T]] se interpreta como la energia termica media de las moleculas del gas."
        en: "[[T]] is interpreted as the average thermal energy of the gas molecules."
    coherence_rules:
    - id: t_coherence_positive
      when: "T > 0"
      status: ok
      text:
        es: "La temperatura absoluta positiva es necesaria para el modelo de gas ideal."
        en: "Positive absolute temperature is necessary for the ideal gas model."
    model_validity_rules:
    - id: t_model_validity
      when: "true"
      status: info
      text:
        es: "La representacion termica es valida siempre que el gas permanezca ideal y no condense."
        en: "The thermal representation is valid as long as the gas remains ideal and does not condense."
    graph_rules:
    - id: t_graph_reading
      when: "true"
      status: info
      text:
        es: "Las isotermas de mayor temperatura ocupan posiciones mas altas en el diagrama p-V."
        en: "Higher temperature isotherms occupy higher positions in the P-V diagram."
    likely_errors:
    - id: t_likely_error
      when: "true"
      status: warning
      text:
        es: "No reemplaces [[T]] con calor o energia interna sin justificar la relacion termodinamica."
        en: "Do not replace [[T]] with heat or internal energy without thermodynamic justification."
    next_step_rules:
    - id: t_next_step
      when: "true"
      status: info
      text:
        es: "Analiza mas alla de la curva: compara la forma con otras isotermas a diferentes [[T]]."
        en: "Analyze beyond the curve: compare the shape with other isotherms at different [[T]]."

  W:
    magnitude_type: W
    semantic_role: { es: Trabajo mecanico, en: Mechanical work }
    summary_rules:
    - id: w_summary_default
      when: "true"
      status: ok
      text:
        es: "El trabajo mecanico se lee como el area bajo la trayectoria en el diagrama p-V."
        en: "Mechanical work is read as the area under the trajectory in the P-V diagram."
    physical_reading_rules:
    - id: w_physical_reading
      when: "true"
      status: ok
      text:
        es: "[[W]] mide la energia transferida durante la expansion o compresion del gas."
        en: "[[W]] measures the energy transferred during the gas expansion or compression."
    coherence_rules:
    - id: w_coherence_sign
      when: "true"
      status: ok
      text:
        es: "El signo de [[W]] depende de si el gas realiza trabajo o si el entorno lo comprime."
        en: "The sign of [[W]] depends on whether the gas does work or the environment compresses it."
    model_validity_rules:
    - id: w_model_validity
      when: "true"
      status: info
      text:
        es: "Este calculo de trabajo es valido para un proceso donde la presion es conocida y el cambio de volumen es apreciable."
        en: "This work calculation is valid for a process where pressure is known and volume change is appreciable."
    graph_rules:
    - id: w_graph_reading
      when: "true"
      status: info
      text:
        es: "El area debajo de la curva p-V con el eje de volumen representa [[W]] para un proceso isobarico."
        en: "The area under the P-V curve with the volume axis represents [[W]] for an isobaric process."
    likely_errors:
    - id: w_likely_error
      when: "true"
      status: warning
      text:
        es: "No asumas que un area mayor siempre significa mas trabajo si el signo es invertido."
        en: "Do not assume that a larger area always means more work if the sign is inverted."
    next_step_rules:
    - id: w_next_step
      when: "true"
      status: info
      text:
        es: "Verifica si el trabajo calculado es de expansion o de compresion usando [[DeltaV]]."
        en: "Verify whether the calculated work is expansion or compression using [[DeltaV]]."

  DeltaV:
    magnitude_type: DeltaV
    semantic_role: { es: Cambio de volumen, en: Volume change }
    summary_rules:
    - id: dv_summary_default
      when: "true"
      status: ok
      text:
        es: "[[DeltaV]] indica la direccion del proceso: expansion positiva o compresion negativa."
        en: "[[DeltaV]] indicates the process direction: positive expansion or negative compression."
    physical_reading_rules:
    - id: dv_physical_reading
      when: "true"
      status: ok
      text:
        es: "El signo de [[DeltaV]] muestra si el gas se expande o se comprime."
        en: "The sign of [[DeltaV]] shows whether the gas expands or compresses."
    coherence_rules:
    - id: dv_coherence
      when: "true"
      status: ok
      text:
        es: "Un cambio de volumen nulo significa que el proceso es isocorico y el trabajo mecanico es cero."
        en: "A zero volume change means the process is isochoric and the mechanical work is zero."
    model_validity_rules:
    - id: dv_model_validity
      when: "true"
      status: info
      text:
        es: "DeltaV solo es util para calcular trabajo si la presion utilizada en la expresion es representativa del proceso."
        en: "DeltaV is only useful to calculate work if the pressure used in the expression is representative of the process."
    graph_rules:
    - id: dv_graph_reading
      when: "true"
      status: info
      text:
        es: "El deslizamiento horizontal de la trayectoria en el diagrama p-V corresponde a [[DeltaV]]."
        en: "The horizontal displacement of the trajectory in the P-V diagram corresponds to [[DeltaV]]."
    likely_errors:
    - id: dv_likely_error
      when: "true"
      status: warning
      text:
        es: "No confundas el cambio de volumen con el volumen absoluto inicial o final."
        en: "Do not confuse volume change with absolute initial or final volume."
    next_step_rules:
    - id: dv_next_step
      when: "true"
      status: info
      text:
        es: "Combina [[DeltaV]] con [[P]] para comprobar si el trabajo puede calcularse como area en el diagrama."
        en: "Combine [[DeltaV]] with [[P]] to check whether work can be calculated as area in the diagram."
