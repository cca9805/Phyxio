version: "1.0"
leaf: "ecuaciones-de-estado"

coord:
  title:
    es: Gráfica Coord · Ecuaciones de Estado
    en: Coord Graph · Equations of State
  xAxis:
    es: volumen molar V_m (m³/mol)
    en: molar volume V_m (m³/mol)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: V
  yMagnitude: p
  relation:
    es: "Gas ideal: pV_m = RT. Van der Waals: (p + a/V_m²)(V_m − b) = RT. Isotermas: hipérbolas (ideal) o curvas con lazo (VdW)."
    en: "Ideal gas: pV_m = RT. Van der Waals: (p + a/V_m²)(V_m − b) = RT. Isotherms: hyperbolas (ideal) or loop curves (VdW)."
  physicalReading:
    es: "Zona de lazo VdW: coexistencia líquido-gas. Punto crítico: máximo del lazo. A T alta: VdW → ideal."
    en: "VdW loop zone: liquid-gas coexistence. Critical point: loop maximum. At high T: VdW → ideal."
  slopeMeaning:
    es: "dp/dV_m < 0 estable. dp/dV_m > 0 inestable (zona espinodal)."
    en: "dp/dV_m < 0 stable. dp/dV_m > 0 unstable (spinodal zone)."
  interceptMeaning:
    es: "Intercepción con eje p: límite de compresión máxima."
    en: "Intercept with p axis: maximum compression limit."
  curvatureMeaning:
    es: "Lazo VdW: transición de fase. Hipérbola: gas ideal."
    en: "VdW loop: phase transition. Hyperbola: ideal gas."
  signMeaning:
    es: "p > 0 siempre."
    en: "p > 0 always."
  areaMeaning:
    es: "Regla de Maxwell: área igual en el lazo."
    en: "Maxwell rule: equal areas in the loop."
  domainMeaning:
    es: "V_m > b (VdW). V_m > 0 (ideal)."
    en: "V_m > b (VdW). V_m > 0 (ideal)."
  modelConnection:
    es: "Ecuaciones de estado: gas ideal y Van der Waals."
    en: "Equations of state: ideal gas and Van der Waals."
  formulaConnection:
    es: pV = nRT, (p+a/V_m²)(V_m−b) = RT.
    en: pV = nRT, (p+a/V_m²)(V_m−b) = RT.
  readingFocus:
    es: leer isotermas, zona de coexistencia y punto crítico.
    en: read isotherms, coexistence zone and critical point.
  agentHints:
    es:
      - "Lazo VdW: transición gas-líquido."
      - "Punto crítico: única fase."
      - "A T alta: ideal."
    en:
      - "VdW loop: gas-liquid transition."
      - "Critical point: single phase."
      - "At high T: ideal."
  commonMistakes:
    es:
      - VdW = gas ideal.
      - Lazo completo = estable.
      - Ignorar b y a.
    en:
      - VdW = ideal gas.
      - Full loop = stable.
      - Ignoring b and a.
