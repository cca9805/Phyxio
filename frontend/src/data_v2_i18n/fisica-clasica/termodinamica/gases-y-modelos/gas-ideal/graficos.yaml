version: "1.0"
leaf: "gas-ideal"

coord:
  title:
    es: Gráfica Coord · Gas Ideal
    en: Coord Graph · Ideal Gas
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: V
  yMagnitude: p
  relation:
    es: "pV = nRT. Isotermas: hipérbolas p = nRT/V. Mayor T: isoterma más alta. pV = cte por isoterma."
    en: "pV = nRT. Isotherms: hyperbolas p = nRT/V. Higher T: higher isotherm. pV = const per isotherm."
  physicalReading:
    es: "Hipérbola: p ∝ 1/V a T = cte. Isotermas paralelas crecen con T. pV = nRT verifica el estado."
    en: "Hyperbola: p ∝ 1/V at T = const. Parallel isotherms grow with T. pV = nRT verifies state."
  slopeMeaning:
    es: "dp/dV = −nRT/V²: derivada de la hipérbola."
    en: "dp/dV = −nRT/V²: hyperbola derivative."
  interceptMeaning:
    es: "No hay intercepto finito: hipérbola."
    en: "No finite intercept: hyperbola."
  curvatureMeaning:
    es: "Hipérbola: curvatura positiva. Mayor T: menos curvada."
    en: "Hyperbola: positive curvature. Higher T: less curved."
  signMeaning:
    es: "p > 0, V > 0."
    en: "p > 0, V > 0."
  areaMeaning:
    es: Área bajo isoterma = W = nRT ln(V_2/V_1).
    en: Area under isotherm = W = nRT ln(V_2/V_1).
  domainMeaning:
    es: "V > 0, T > 0."
    en: "V > 0, T > 0."
  modelConnection:
    es: "Ley del gas ideal: pV = nRT."
    en: "Ideal gas law: pV = nRT."
  formulaConnection:
    es: pV = nRT, W = nRT ln(V_2/V_1).
    en: pV = nRT, W = nRT ln(V_2/V_1).
  readingFocus:
    es: leer la hipérbola, verificar pV = cte e identificar la isoterma según T.
    en: read the hyperbola, verify pV = const and identify isotherm by T.
  agentHints:
    es:
      - pV = nRT.
      - "Isoterma: p ∝ 1/V."
      - "Mayor T: isoterma más alta."
    en:
      - pV = nRT.
      - "Isotherm: p ∝ 1/V."
      - "Higher T: higher isotherm."
  commonMistakes:
    es:
      - p ∝ V.
      - pV = cte para distintas T.
      - T en °C.
    en:
      - p ∝ V.
      - pV = const for different T.
      - T in °C.
