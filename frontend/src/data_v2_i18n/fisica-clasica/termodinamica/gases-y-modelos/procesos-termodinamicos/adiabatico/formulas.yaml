version: 1.0.0
leaf_id: adiabatico
ui:
  default_formula: primer_principio_adiabatico
formulas:
  - id: primer_principio_adiabatico
    title:
      es: Primer principio en proceso adiabatico
      en: First law in adiabatic process
    equation: DeltaU = -W
    latex: "\\Delta U = -W"
    rearrangements:
      - target: DeltaU
        equation: DeltaU = -W
        latex: "\\Delta U = -W"
      - target: W
        equation: W = -DeltaU
        latex: "W = - \\Delta U"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: En un proceso adiabatico no hay intercambio de calor, por lo que todo el trabajo realizado proviene de la energia interna del gas o va hacia ella.
      en: In an adiabatic process there is no heat exchange, so all work done comes from or goes into the internal energy of the gas.
    constraints: [Q = 0, gas en recipiente aislado termicamente, proceso suficientemente rapido o paredes adiabatas]
    validity:
      es: Valida cuando el intercambio de calor con el entorno es despreciable respecto al trabajo intercambiado.
      en: Valid when heat exchange with the surroundings is negligible compared to the exchanged work.
    dimension_check:
      es: "Ambos lados tienen dimension de energia `[M L² T⁻²]`."
      en: "Both sides have energy dimension `[M L² T⁻²]`."
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion]
    interpretation_tags: [energia_interna, trabajo, adiabatico, primer_principio]
    result_semantics:
      target: DeltaU
      kind: energy_balance
      sign_meaning:
        es: Negativo si el gas realiza trabajo (se expande); positivo si el entorno realiza trabajo sobre el gas (se comprime).
        en: Negative if the gas does work (expands); positive if the surroundings do work on the gas (compresses).
      absolute_value_meaning:
        es: Magnitud del cambio de energia interna producido exclusivamente por el trabajo mecanico.
        en: Magnitude of internal energy change produced exclusively by mechanical work.
    domain_checks:
      - condition: "W != 0"
        message:
          es: "Si el trabajo es nulo, la energia interna no cambia y el proceso podria ser adiabático e isocórico."
          en: "If work is zero, internal energy does not change and the process may be both adiabatic and isochoric."
    coherence_checks:
      - check: "DeltaU = -W implica que expansion adiabatica enfria el gas"
        es: "Para un gas ideal, expansion adiabatica produce descenso de temperatura."
        en: "For an ideal gas, adiabatic expansion produces a temperature decrease."
    graph_implications:
      - channel: pV_adiabat
        mapping: "La curva adiabatica en el diagrama pV es mas inclinada que la isoterma correspondiente."
    pedagogical_triggers:
      - error: "Aplicar el primer principio sin anular Q"
        detection: "DeltaU != -W"
        message:
          es: "En proceso adiabatico Q = 0, por lo que DeltaU = -W exclusivamente."
          en: "In an adiabatic process Q = 0, so DeltaU = -W exclusively."

  - id: trabajo_adiabatico_ideal
    title:
      es: Trabajo en expansion adiabatica reversible de gas ideal
      en: Work in reversible adiabatic expansion of ideal gas
    equation: W = (p1*V1 - p2*V2) / (gamma - 1)
    latex: "W = \\frac{p_1 V_1 - p_2 V_2}{\\gamma - 1}"
    rearrangements:
      - target: W
        equation: W = (p1*V1 - p2*V2) / (gamma - 1)
        latex: "W = \\frac{p_1 V_1 - p_2 V_2}{\\gamma - 1}"
      - target: p2
        equation: p2 = (p1*V1 - W*(gamma-1)) / V2
        latex: "p_2 = \\frac{p_1 V_1 - W(\\gamma-1)}{V_2}"
    category: derived
    relation_type: integral_relation
    physical_meaning:
      es: El trabajo realizado por el gas en una expansion adiabatica reversible se calcula integrando la presión a lo largo de la curva adiabatica.
      en: The work done by the gas in a reversible adiabatic expansion is calculated by integrating pressure along the adiabatic curve.
    constraints: [gas ideal, proceso reversible, gamma conocido, presiones y volumenes de estado final e inicial conocidos]
    validity:
      es: Valida para gas ideal con calor especifico constante y proceso cuasiestatico adiabatico.
      en: Valid for ideal gas with constant specific heat and quasi-static adiabatic process.
    dimension_check:
      es: "p [M L⁻¹ T⁻²] por V [L³] da energia `[M L² T⁻²]`."
      en: "p [M L⁻¹ T⁻²] times V [L³] gives energy `[M L² T⁻²]`."
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion]
    interpretation_tags: [trabajo, expansion, gas_ideal, adiabatico]
    result_semantics:
      target: W
      kind: work_output
      sign_meaning:
        es: Positivo si el gas realiza trabajo neto sobre el entorno (expansion); negativo en compresion.
        en: Positive if the gas does net work on the surroundings (expansion); negative in compression.
      absolute_value_meaning:
        es: Energia mecanica transferida al entorno por expansion sin calor.
        en: Mechanical energy transferred to surroundings by expansion without heat.
    domain_checks:
      - condition: "gamma > 1"
        message:
          es: "El coeficiente adiabatico debe ser mayor que 1 para gases reales."
          en: "The adiabatic coefficient must be greater than 1 for real gases."
    coherence_checks:
      - check: "W positivo implica descenso de p y aumento de V en expansion"
        es: "Coherente con expansion adiabatica: el gas hace trabajo y se enfria."
        en: "Consistent with adiabatic expansion: the gas does work and cools."
    graph_implications:
      - channel: pV_adiabat
        mapping: "El area bajo la curva adiabatica entre V1 y V2 representa W."
    pedagogical_triggers:
      - error: "Confundir con trabajo isotermico"
        detection: "gamma == 1"
        message:
          es: "Gamma igual a 1 corresponde a proceso isotermico, no adiabatico. Revisa el tipo de proceso."
          en: "Gamma equal to 1 corresponds to an isothermal process, not adiabatic. Check the process type."

  - id: ley_adiabata_presion_volumen
    title:
      es: Ecuacion de la adiabata en presion y volumen
      en: Adiabat equation in pressure and volume
    equation: p1 * V1^gamma = p2 * V2^gamma
    latex: "p_1 V_1^{\\gamma} = p_2 V_2^{\\gamma}"
    rearrangements:
      - target: p2
        equation: p2 = p1 * (V1/V2)^gamma
        latex: "p_2 = p_1 \\left(\\frac{V_1}{V_2}\\right)^{\\gamma}"
      - target: V2
        equation: V2 = V1 * (p1/p2)^(1/gamma)
        latex: "V_2 = V_1 \\left(\\frac{p_1}{p_2}\\right)^{1/\\gamma}"
      - target: gamma
        equation: gamma = log(p1/p2) / log(V2/V1)
        latex: "\\gamma = \\frac{\\ln(p_1/p_2)}{\\ln(V_2/V_1)}"
    category: fundamental
    relation_type: constitutive_relation
    physical_meaning:
      es: En una expansion o compresion adiabatica reversible de gas ideal, el producto de la presión por el volumen elevado al coeficiente adiabatico permanece constante.
      en: In a reversible adiabatic expansion or compression of an ideal gas, the product of pressure and volume raised to the adiabatic coefficient remains constant.
    constraints: [gas ideal, proceso reversible, gamma constante]
    validity:
      es: Valida para gas ideal monatomico, diatomico o poliatom con gamma conocido y proceso cuasiestatico.
      en: Valid for monatomic, diatomic or polyatomic ideal gas with known gamma and quasi-static process.
    dimension_check:
      es: "p [M L⁻¹ T⁻²] por V^gamma [L^(3 gamma)] da una constante con dimension que se preserva entre estados."
      en: "p [M L⁻¹ T⁻²] times V^gamma [L^(3 gamma)] gives a dimensionally preserved constant between states."
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion]
    interpretation_tags: [adiabata, presion, volumen, gas_ideal, curva_pV]
    result_semantics:
      target: p2
      kind: state_variable
      sign_meaning:
        es: La presión final es siempre positiva; el signo no es diagnostico en este contexto.
        en: Final pressure is always positive; sign is not diagnostic in this context.
      absolute_value_meaning:
        es: Valor de presion del gas al final del proceso adiabatico reversible.
        en: Gas pressure value at the end of the reversible adiabatic process.
    domain_checks:
      - condition: "V2 > 0 and p2 > 0"
        message:
          es: "Presion y volumen deben ser positivos en todo estado del proceso."
          en: "Pressure and volume must be positive at every state of the process."
    coherence_checks:
      - check: "Si V2 > V1 entonces p2 < p1 en expansion adiabatica"
        es: "Coherente: expansion adiabatica reduce presion mas que la isoterma."
        en: "Consistent: adiabatic expansion lowers pressure more than the isotherm."
    graph_implications:
      - channel: pV_adiabat
        mapping: "La curva adiabatica es mas pronunciada que la isoterma en el diagrama pV porque gamma > 1."
    pedagogical_triggers:
      - error: "Confundir la adiabata con la isoterma en el diagrama pV"
        detection: "gamma == 1"
        message:
          es: "La adiabata tiene gamma > 1 y cae mas rapido que la isoterma. Comprueba el valor de gamma."
          en: "The adiabat has gamma > 1 and drops faster than the isotherm. Check the value of gamma."

  - id: cambio_temperatura_adiabatico
    title:
      es: Cambio de temperatura en proceso adiabatico de gas ideal
      en: Temperature change in adiabatic process of ideal gas
    equation: T2 = T1 * (V1/V2)^(gamma - 1)
    latex: "T_2 = T_1 \\left(\\frac{V_1}{V_2}\\right)^{\\gamma - 1}"
    rearrangements:
      - target: T2
        equation: T2 = T1 * (V1/V2)^(gamma - 1)
        latex: "T_2 = T_1 \\left(\\frac{V_1}{V_2}\\right)^{\\gamma - 1}"
      - target: T1
        equation: T1 = T2 * (V2/V1)^(gamma - 1)
        latex: "T_1 = T_2 \\left(\\frac{V_2}{V_1}\\right)^{\\gamma - 1}"
      - target: DeltaT_ad
        equation: DeltaT_ad = T2 - T1
        latex: "\\Delta T = T_2 - T_1"
    category: derived
    relation_type: constitutive_relation
    physical_meaning:
      es: En una expansion adiabatica reversible, el gas se enfria porque el trabajo realizado proviene exclusivamente de su energia interna. En compresion, el gas se calienta.
      en: In a reversible adiabatic expansion, the gas cools because the work done comes exclusively from its internal energy. In compression, the gas heats up.
    constraints: [gas ideal, proceso reversible, gamma constante, estado inicial conocido]
    validity:
      es: Valida para gas ideal con calor especifico constante en proceso cuasiestatico adiabatico.
      en: Valid for ideal gas with constant specific heat in a quasi-static adiabatic process.
    dimension_check:
      es: "Ambos lados tienen dimension de temperatura `[Theta]`."
      en: "Both sides have temperature dimension `[Theta]`."
    calculable: true
    motivo_no_calculable: ""
    used_in: [teoria, ejemplos, interpretacion]
    interpretation_tags: [temperatura, cambio_termico, expansion, compresion, gas_ideal]
    result_semantics:
      target: T2
      kind: state_variable
      sign_meaning:
        es: T2 es temperatura absoluta, siempre positiva. Comparar con T1 indica si el proceso es expansion o compresion.
        en: T2 is absolute temperature, always positive. Comparing with T1 indicates whether the process is expansion or compression.
      absolute_value_meaning:
        es: Temperatura final del gas tras la expansion o compresion adiabatica.
        en: Final gas temperature after adiabatic expansion or compression.
    domain_checks:
      - condition: "T2 > 0"
        message:
          es: "La temperatura absoluta final debe ser positiva."
          en: "Final absolute temperature must be positive."
      - condition: "V2 != V1"
        message:
          es: "Si el volumen no cambia, no hay proceso adiabatico relevante; seria isocórico adiabatico con trabajo nulo."
          en: "If volume does not change, there is no relevant adiabatic process; it would be adiabatic isochoric with zero work."
    coherence_checks:
      - check: "Si V2 > V1 entonces T2 < T1 para gamma > 1"
        es: "Expansion adiabatica produce enfriamiento. Si T2 >= T1 con V2 > V1, revisar gamma o condicion adiabatica."
        en: "Adiabatic expansion produces cooling. If T2 >= T1 with V2 > V1, check gamma or adiabatic condition."
    graph_implications:
      - channel: TV_adiabat
        mapping: "En la curva T-V adiabatica, la temperatura decrece mas abruptamente que en una isoterma."
    pedagogical_triggers:
      - error: "Creer que la temperatura no cambia en proceso adiabatico"
        detection: "abs(T2 - T1) < 0.01 and V2 != V1"
        message:
          es: "En un proceso adiabatico con cambio de volumen, la temperatura cambia. Temperatura constante es proceso isotermico."
          en: "In an adiabatic process with volume change, temperature changes. Constant temperature is isothermal, not adiabatic."
