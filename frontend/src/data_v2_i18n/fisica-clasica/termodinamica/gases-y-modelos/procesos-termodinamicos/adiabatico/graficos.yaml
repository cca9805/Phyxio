version: "1.0"
leaf: "adiabatico"

coord:
  title:
    es: Gráfica Coord · Proceso Adiabático
    en: Coord Graph · Adiabatic Process
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: V
  yMagnitude: p
  relation:
    es: Q = 0. pV^γ = cte. γ = C_p/C_V. Curva más empinada que isoterma. W = −ΔU = −nC_VΔT.
    en: Q = 0. pV^γ = const. γ = C_p/C_V. Curve steeper than isotherm. W = −ΔU = −nC_VΔT.
  physicalReading:
    es: Pendiente adiabática = γ × pendiente isoterma. Expansión enfría. Compresión calienta.
    en: Adiabatic slope = γ × isotherm slope. Expansion cools. Compression heats.
  slopeMeaning:
    es: "dp/dV = −γp/V: más empinada que isoterma (−p/V)."
    en: "dp/dV = −γp/V: steeper than isotherm (−p/V)."
  interceptMeaning:
    es: Estado inicial (p_1, V_1).
    en: Initial state (p_1, V_1).
  curvatureMeaning:
    es: "Más cóncava que isoterma: γ > 1."
    en: "More concave than isotherm: γ > 1."
  signMeaning:
    es: "W > 0: expansión (ΔT < 0). W < 0: compresión (ΔT > 0)."
    en: "W > 0: expansion (ΔT < 0). W < 0: compression (ΔT > 0)."
  areaMeaning:
    es: Área bajo la curva = W.
    en: Area under curve = W.
  domainMeaning:
    es: "V > 0."
    en: "V > 0."
  modelConnection:
    es: "Proceso adiabático: Q = 0."
    en: "Adiabatic process: Q = 0."
  formulaConnection:
    es: pV^γ = cte, W = −nC_VΔT, Q = 0.
    en: pV^γ = const, W = −nC_VΔT, Q = 0.
  readingFocus:
    es: comparar pendiente con isoterma y leer área como W.
    en: compare slope with isotherm and read area as W.
  agentHints:
    es:
      - Q = 0.
      - pV^γ = cte.
      - Más empinada que isoterma.
    en:
      - Q = 0.
      - pV^γ = const.
      - Steeper than isotherm.
  commonMistakes:
    es:
      - Q = 0 ⇒ W = 0.
      - Pendiente = isoterma.
      - γ = 1.
    en:
      - Q = 0 ⇒ W = 0.
      - Slope = isotherm.
      - γ = 1.
