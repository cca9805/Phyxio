version: "1.0"
leaf: "isobarico"

coord:
  title:
    es: Gráfica Coord · Proceso Isobárico
    en: Coord Graph · Isobaric Process
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: volumen V (m³)
    en: volume V (m³)
  xMagnitude: T
  yMagnitude: V
  relation:
    es: V/T = nR/p = cte (Charles). Recta por origen en V-T. W = pΔV. ΔU = nC_VΔT. Q = nC_pΔT.
    en: V/T = nR/p = const (Charles). Line through origin in V-T. W = pΔV. ΔU = nC_VΔT. Q = nC_pΔT.
  physicalReading:
    es: Pendiente = nR/p. Intercepto = 0 (0 K). W = pΔV = rectángulo en p-V.
    en: Slope = nR/p. Intercept = 0 (0 K). W = pΔV = rectangle in p-V.
  slopeMeaning:
    es: "dV/dT = nR/p: proporcionalidad V-T."
    en: "dV/dT = nR/p: V-T proportionality."
  interceptMeaning:
    es: "V(0 K) = 0: colapso en cero absoluto."
    en: "V(0 K) = 0: collapse at absolute zero."
  curvatureMeaning:
    es: "Recta: C_p constante."
    en: "Straight: constant C_p."
  signMeaning:
    es: "W > 0: expansión. W < 0: compresión."
    en: "W > 0: expansion. W < 0: compression."
  areaMeaning:
    es: "En p-V: área del rectángulo = W = pΔV."
    en: "In p-V: rectangle area = W = pΔV."
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: "Proceso isobárico: ley de Charles."
    en: "Isobaric process: Charles' law."
  formulaConnection:
    es: V/T = cte, W = pΔV, Q = nC_pΔT.
    en: V/T = const, W = pΔV, Q = nC_pΔT.
  readingFocus:
    es: leer pendiente nR/p, intercepto en 0 K y W = pΔV.
    en: read slope nR/p, intercept at 0 K and W = pΔV.
  agentHints:
    es:
      - V/T = cte.
      - W = pΔV.
      - Q = nC_pΔT.
    en:
      - V/T = const.
      - W = pΔV.
      - Q = nC_pΔT.
  commonMistakes:
    es:
      - V/T = cte en °C.
      - W = 0 en isobara.
      - Q = ΔU.
    en:
      - V/T = const in °C.
      - W = 0 in isobar.
      - Q = ΔU.
