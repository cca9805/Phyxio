version: "1.0"
leaf: "isocorico"

coord:
  title:
    es: Gráfica Coord · Proceso Isocórico
    en: Coord Graph · Isochoric Process
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: T
  yMagnitude: p
  relation:
    es: p/T = nR/V = cte (Gay-Lussac). Recta por origen en p-T. W = 0. ΔU = Q = nC_VΔT.
    en: p/T = nR/V = const (Gay-Lussac). Line through origin in p-T. W = 0. ΔU = Q = nC_VΔT.
  physicalReading:
    es: "Pendiente = nR/V. W = 0: línea vertical en p-V. Todo Q va a ΔU."
    en: "Slope = nR/V. W = 0: vertical line in p-V. All Q goes to ΔU."
  slopeMeaning:
    es: "dp/dT = nR/V: proporcionalidad p-T."
    en: "dp/dT = nR/V: p-T proportionality."
  interceptMeaning:
    es: "p(0 K) = 0: presión nula a cero absoluto."
    en: "p(0 K) = 0: zero pressure at absolute zero."
  curvatureMeaning:
    es: "Recta: C_V constante."
    en: "Straight: constant C_V."
  signMeaning:
    es: W = 0 siempre en isocórico.
    en: W = 0 always in isochoric.
  areaMeaning:
    es: "En p-V: área = 0 (línea vertical)."
    en: "In p-V: area = 0 (vertical line)."
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: "Proceso isocórico: ley de Gay-Lussac."
    en: "Isochoric process: Gay-Lussac's law."
  formulaConnection:
    es: p/T = cte, W = 0, Q = nC_VΔT.
    en: p/T = const, W = 0, Q = nC_VΔT.
  readingFocus:
    es: leer pendiente nR/V, W = 0 y Q = ΔU.
    en: read slope nR/V, W = 0 and Q = ΔU.
  agentHints:
    es:
      - p/T = cte.
      - W = 0.
      - Q = ΔU = nC_VΔT.
    en:
      - p/T = const.
      - W = 0.
      - Q = ΔU = nC_VΔT.
  commonMistakes:
    es:
      - p/T en °C.
      - W ≠ 0 en isocórico.
      - Q = 0.
    en:
      - p/T in °C.
      - W ≠ 0 in isochoric.
      - Q = 0.
