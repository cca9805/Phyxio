version: "1.0"
leaf: "isotermico"

coord:
  title:
    es: Gráfica Coord · Proceso Isotérmico
    en: Coord Graph · Isothermal Process
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: V
  yMagnitude: p
  relation:
    es: "T = cte. pV = nRT = cte. Hipérbola: p = nRT/V. ΔU = 0. W = Q = nRT ln(V_2/V_1)."
    en: "T = const. pV = nRT = const. Hyperbola: p = nRT/V. ΔU = 0. W = Q = nRT ln(V_2/V_1)."
  physicalReading:
    es: "Hipérbola: p ∝ 1/V. ΔU = 0: todo el calor se convierte en trabajo. p₁V₁ = p₂V₂."
    en: "Hyperbola: p ∝ 1/V. ΔU = 0: all heat converts to work. p₁V₁ = p₂V₂."
  slopeMeaning:
    es: "dp/dV = −nRT/V² = −p/V: curvatura de la hipérbola."
    en: "dp/dV = −nRT/V² = −p/V: hyperbola curvature."
  interceptMeaning:
    es: No hay intercepto finito.
    en: No finite intercept.
  curvatureMeaning:
    es: "Hipérbola: d²p/dV² = 2nRT/V³ > 0."
    en: "Hyperbola: d²p/dV² = 2nRT/V³ > 0."
  signMeaning:
    es: "W = Q > 0: expansión. W = Q < 0: compresión."
    en: "W = Q > 0: expansion. W = Q < 0: compression."
  areaMeaning:
    es: Área bajo hipérbola = W = nRT ln(V_2/V_1).
    en: Area under hyperbola = W = nRT ln(V_2/V_1).
  domainMeaning:
    es: "V > 0."
    en: "V > 0."
  modelConnection:
    es: "Proceso isotérmico: T = cte."
    en: "Isothermal process: T = const."
  formulaConnection:
    es: pV = cte, W = nRT ln(V_2/V_1), ΔU = 0.
    en: pV = const, W = nRT ln(V_2/V_1), ΔU = 0.
  readingFocus:
    es: leer la hipérbola, verificar pV = cte y calcular área como W.
    en: read the hyperbola, verify pV = const and calculate area as W.
  agentHints:
    es:
      - pV = cte.
      - ΔU = 0.
      - W = nRT ln(V_2/V_1).
    en:
      - pV = const.
      - ΔU = 0.
      - W = nRT ln(V_2/V_1).
  commonMistakes:
    es:
      - ΔU ≠ 0 en isotérmico.
      - W = pΔV.
      - Q = 0.
    en:
      - ΔU ≠ 0 in isothermal.
      - W = pΔV.
      - Q = 0.
