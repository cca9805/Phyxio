formulas:

  - id: velocidad_cuadratica_media
    title:
      es: Velocidad cuadrática media
      en: Root mean square speed
    equation: "v_rms = sqrt(3 * k_B * T / m_mol)"
    latex: "v_{rms} = \\sqrt{\\dfrac{3\\,k_B\\,T}{m}}"
    rearrangements:
      - target: v_rms
        equation: "v_rms = sqrt(3 * k_B * T / m_mol)"
        latex: "v_{rms} = \\sqrt{\\dfrac{3\\,k_B\\,T}{m}}"
      - target: T
        equation: "T = m_mol * v_rms^2 / (3 * k_B)"
        latex: "T = \\dfrac{m\\,v_{rms}^2}{3\\,k_B}"
      - target: m_mol
        equation: "m_mol = 3 * k_B * T / v_rms^2"
        latex: "m = \\dfrac{3\\,k_B\\,T}{v_{rms}^2}"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: "La velocidad cuadrática media cuantifica la agitación molecular a través de la raíz cuadrada de la media de los cuadrados de velocidades; es la magnitud cinética directamente ligada a la temperatura."
      en: "Root mean square speed quantifies molecular agitation via the square root of the mean squared velocities; it is the kinetic magnitude directly linked to temperature."
    constraints:
      - "Gas ideal monoatómico o diatómico en régimen translacional"
      - "Temperatura en kelvin estrictamente positiva"
      - "Masa molecular en kilogramos"
    validity:
      es: "Válida para gases ideales con moléculas sin interacciones intermoleculares y con energía cinética translacional predominante."
      en: "Valid for ideal gases with no intermolecular interactions and predominantly translational kinetic energy."
    dimension_check: "[L T^-1] = sqrt([M L^2 T^-2 Theta^-1] * [Theta] / [M]) = [L T^-1] ✓"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - teoria cinética del gas ideal
      - distribución de Maxwell-Boltzmann
    interpretation_tags:
      - velocidad_molecular
      - estado_termico
      - comparacion_gases
    result_semantics:
      target: v_rms
      kind: scalar_unsigned
      sign_meaning:
        es: "Valor siempre positivo; representa la escala de velocidad típica de las moléculas."
        en: "Always positive value; represents the typical molecular speed scale."
      absolute_value_meaning:
        es: "Cuanto mayor sea [[v_rms]], mayor es la agitación térmica y más energética la distribución de velocidades."
        en: "The larger [[v_rms]], the greater the thermal agitation and the more energetic the velocity distribution."
    domain_checks:
      - "v_rms > 0"
      - "T > 0"
      - "m_mol > 0"
    coherence_checks:
      - "v_rms debe ser mayor para gases ligeros a la misma temperatura"
      - "v_rms debe aumentar con T"
    graph_implications:
      - "A mayor T, la curva de distribución de velocidades se desplaza hacia valores más altos de v_rms"
    pedagogical_triggers:
      - "Si v_rms resulta cero o negativo, verificar que T está en kelvin y m_mol en kg"

  - id: energia_cinetica_media
    title:
      es: Energía cinética media molecular
      en: Mean molecular kinetic energy
    equation: "E_k_mol = 1.5 * k_B * T"
    latex: "E_k = \\dfrac{3}{2}\\,k_B\\,T"
    rearrangements:
      - target: E_k_mol
        equation: "E_k_mol = 1.5 * k_B * T"
        latex: "E_k = \\dfrac{3}{2}\\,k_B\\,T"
      - target: T
        equation: "T = E_k_mol / (1.5 * k_B)"
        latex: "T = \\dfrac{2\\,E_k}{3\\,k_B}"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: "La energía cinética translacional media de una molécula es directamente proporcional a la temperatura absoluta; este resultado funda la interpretación cinética de la temperatura."
      en: "The mean translational kinetic energy of a molecule is directly proportional to absolute temperature; this result establishes the kinetic interpretation of temperature."
    constraints:
      - "Solo grados de libertad translacionales (3 dimensiones)"
      - "Temperatura en kelvin"
      - "Aplicable al promedio estadístico, no a moléculas individuales"
    validity:
      es: "Válida para gases ideales en equilibrio térmico, considerando únicamente los tres grados de libertad translacionales."
      en: "Valid for ideal gases in thermal equilibrium, considering only the three translational degrees of freedom."
    dimension_check: "[M L^2 T^-2] = [M L^2 T^-2 Theta^-1] * [Theta] ✓"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - interpretación cinética de la temperatura
      - teorema de equipartición de la energía
    interpretation_tags:
      - energia_molecular
      - interpretacion_temperatura
      - escala_microscopica
    result_semantics:
      target: E_k_mol
      kind: scalar_unsigned
      sign_meaning:
        es: "Valor siempre positivo; la energía cinética no puede ser negativa."
        en: "Always positive value; kinetic energy cannot be negative."
      absolute_value_meaning:
        es: "[[E_k_mol]] muestra directamente cuántos julios de energía cinética posee en promedio cada molécula del gas a la temperatura [[T]]."
        en: "[[E_k_mol]] shows directly how many joules of kinetic energy each gas molecule possesses on average at temperature [[T]]."
    domain_checks:
      - "E_k_mol > 0"
      - "T > 0"
    coherence_checks:
      - "E_k_mol debe duplicarse si T se duplica"
    graph_implications:
      - "Relación lineal entre E_k_mol y T; pendiente igual a 3/2 k_B"
    pedagogical_triggers:
      - "Si E_k_mol resulta negativo o cero, verificar que T está en kelvin"

  - id: presion_cinetica
    title:
      es: Presión cinética del gas ideal
      en: Kinetic pressure of ideal gas
    equation: "P = N * m_mol * v_rms^2 / (3 * V)"
    latex: "P = \\dfrac{N\\,m\\,v_{rms}^2}{3\\,V}"
    rearrangements:
      - target: P
        equation: "P = N * m_mol * v_rms^2 / (3 * V)"
        latex: "P = \\dfrac{N\\,m\\,v_{rms}^2}{3\\,V}"
      - target: V
        equation: "V = N * m_mol * v_rms^2 / (3 * P)"
        latex: "V = \\dfrac{N\\,m\\,v_{rms}^2}{3\\,P}"
      - target: N
        equation: "N = 3 * P * V / (m_mol * v_rms^2)"
        latex: "N = \\dfrac{3\\,P\\,V}{m\\,v_{rms}^2}"
    category: derived
    relation_type: definition
    physical_meaning:
      es: "La presión de un gas ideal resulta del intercambio de momento lineal entre las moléculas y las paredes del recipiente; integra el efecto colectivo de N moléculas moviéndose en un volumen V."
      en: "The pressure of an ideal gas results from the exchange of linear momentum between molecules and container walls; it integrates the collective effect of N molecules moving in a volume V."
    constraints:
      - "Recipiente con paredes rígidas"
      - "Gas ideal sin interacciones intermoleculares"
      - "Distribución de velocidades isotrópica"
    validity:
      es: "Válida para gases diluidos a temperaturas y presiones moderadas donde las interacciones moleculares son despreciables."
      en: "Valid for dilute gases at moderate temperatures and pressures where molecular interactions are negligible."
    dimension_check: "[M L^-1 T^-2] = [1] * [M] * [L^2 T^-2] / [L^3] = [M L^-1 T^-2] ✓"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - deducción de la ecuación de estado del gas ideal
      - relación entre presión y energía cinética
    interpretation_tags:
      - presion_gas
      - efecto_colectivo
      - emergencia_macroscopica
    result_semantics:
      target: P
      kind: scalar_unsigned
      sign_meaning:
        es: "Valor siempre positivo; la presión cinética es una magnitud definida positiva."
        en: "Always positive value; kinetic pressure is a positive-definite quantity."
      absolute_value_meaning:
        es: "[[P]] resume en una sola magnitud macroscópica el efecto estadístico de [[N]] colisiones moleculares por unidad de tiempo y área; aumenta al comprimir el gas o elevar [[T]]."
        en: "[[P]] summarizes in one macroscopic quantity the statistical effect of [[N]] molecular collisions per unit time and area; it increases when compressing the gas or raising [[T]]."
    domain_checks:
      - "P > 0"
      - "V > 0"
      - "N > 0"
    coherence_checks:
      - "P debe aumentar si V disminuye con N y v_rms constantes"
      - "P debe aumentar si T aumenta con V y N constantes"
    graph_implications:
      - "En un diagrama P-V, la presión cinética decrece con V siguiendo una hipérbola a T constante"
    pedagogical_triggers:
      - "Si P resulta muy diferente a la presión atmosférica para condiciones normales, verificar unidades de V en m³ y N como número de moléculas"
