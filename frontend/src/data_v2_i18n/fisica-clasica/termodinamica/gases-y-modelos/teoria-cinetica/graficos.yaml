version: "1.0"
leaf: "teoria-cinetica"

coord:
  title:
    es: Gráfica Coord · Teoría Cinética
    en: Coord Graph · Kinetic Theory
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: velocidad cuadrática media v_rms (m/s)
    en: root mean square speed v_rms (m/s)
  xMagnitude: T
  yMagnitude: v_rms
  relation:
    es: "v_rms = √(3k_B T/m). Crece como raíz de T. Gases ligeros: mayor v_rms a igual T."
    en: "v_rms = √(3k_B T/m). Grows as square root of T. Lighter gases: higher v_rms at same T."
  physicalReading:
    es: "Curva cóncava: v_rms ∝ √T. Punto naranja: v_rms a T media. Pendiente decrece al aumentar T."
    en: "Concave curve: v_rms ∝ √T. Orange dot: v_rms at midpoint T. Slope decreases as T rises."
  slopeMeaning:
    es: "dv_rms/dT = √(3k_B/m) / (2√T): decrece con T."
    en: "dv_rms/dT = √(3k_B/m) / (2√T): decreases with T."
  interceptMeaning:
    es: "v_rms(0 K) = 0: reposo absoluto en cero absoluto."
    en: "v_rms(0 K) = 0: complete rest at absolute zero."
  curvatureMeaning:
    es: "Cóncava: d²v_rms/dT² < 0. v_rms crece cada vez más lento."
    en: "Concave: d²v_rms/dT² < 0. v_rms grows ever more slowly."
  signMeaning:
    es: "v_rms > 0 siempre."
    en: "v_rms > 0 always."
  areaMeaning:
    es: Sin interpretación directa de área en v_rms(T).
    en: No direct area interpretation in v_rms(T).
  domainMeaning:
    es: "T > 0 K."
    en: "T > 0 K."
  modelConnection:
    es: "Teoría cinética del gas ideal: relación microscópica entre T y v_rms."
    en: "Ideal kinetic gas theory: microscopic relation between T and v_rms."
  formulaConnection:
    es: v_rms = √(3k_BT/m), E_k = 3/2 k_B T, P = Nmv_rms²/(3V).
    en: v_rms = √(3k_BT/m), E_k = 3/2 k_B T, P = Nmv_rms²/(3V).
  readingFocus:
    es: leer v_rms en el punto naranja, comparar gases por masa molar y verificar la raíz cuadrada.
    en: read v_rms at the orange dot, compare gases by molar mass and verify square root behavior.
  agentHints:
    es:
      - v_rms ∝ √T.
      - "Gas ligero: mayor v_rms."
      - T en kelvin obligatorio.
    en:
      - v_rms ∝ √T.
      - "Lighter gas: higher v_rms."
      - T in kelvin required.
  commonMistakes:
    es:
      - v_rms ∝ T (lineal).
      - Usar masa molar en kg/mol.
      - T en °C.
    en:
      - v_rms ∝ T (linear).
      - Using molar mass in kg/mol.
      - T in °C.
