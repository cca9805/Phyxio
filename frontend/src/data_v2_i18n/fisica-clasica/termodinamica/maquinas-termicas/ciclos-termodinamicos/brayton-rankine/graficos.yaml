version: "1.0"
leaf: "brayton-rankine"

coord:
  title:
    es: Gráfica Coord · Brayton-Rankine
    en: Coord Graph · Brayton-Rankine
  xAxis:
    es: relación de presiones r_p
    en: pressure ratio r_p
  yAxis:
    es: rendimiento térmico η_th
    en: thermal efficiency η_th
  xMagnitude: r_p
  yMagnitude: eta_th
  relation:
    es: "η_th = 1 − r_p^{(1−γ)/γ}. Crece sublinealmente con r_p. Mayor γ: curva más alta."
    en: "η_th = 1 − r_p^{(1−γ)/γ}. Grows sub-linearly with r_p. Higher γ: higher curve."
  physicalReading:
    es: "Curva cóncava: cada unidad adicional de r_p aporta menos mejora de η_th. Punto naranja: η_th a r_p medio."
    en: "Concave curve: each additional unit of r_p yields less improvement in η_th. Orange dot: η_th at midpoint r_p."
  slopeMeaning:
    es: "dη_th/dr_p > 0 pero decreciente: rendimiento creciente con r_p a tasa decreciente."
    en: "dη_th/dr_p > 0 but decreasing: efficiency rising with r_p at a decreasing rate."
  interceptMeaning:
    es: "η_th(r_p=1) = 0: sin compresión no hay ciclo útil."
    en: "η_th(r_p=1) = 0: without compression there is no useful cycle."
  curvatureMeaning:
    es: "Cóncava: d²η_th/dr_p² < 0. Rendimientos decrecientes a relaciones de presión muy altas."
    en: "Concave: d²η_th/dr_p² < 0. Diminishing returns at very high pressure ratios."
  signMeaning:
    es: "η_th > 0 siempre para r_p > 1."
    en: "η_th > 0 always for r_p > 1."
  areaMeaning:
    es: Sin interpretación directa de área en η_th(r_p).
    en: No direct area interpretation in η_th(r_p).
  domainMeaning:
    es: "r_p > 1; η_th < 1 para todo r_p finito."
    en: "r_p > 1; η_th < 1 for all finite r_p."
  modelConnection:
    es: Ciclo Brayton ideal con gas de propiedades constantes.
    en: Ideal Brayton cycle with constant-property gas.
  formulaConnection:
    es: "η_th = 1 − r_p^{(1−γ)/γ}, W_net = Q_H − Q_C, η_th = W_net/Q_H."
    en: "η_th = 1 − r_p^{(1−γ)/γ}, W_net = Q_H − Q_C, η_th = W_net/Q_H."
  readingFocus:
    es: leer η_th en el punto naranja, comparar curvas con distintos γ y verificar límite de Carnot.
    en: read η_th at the orange dot, compare curves with different γ and verify Carnot limit.
  agentHints:
    es:
      - η_th crece con r_p pero con rendimientos decrecientes.
      - "No maximizar r_p: W_net puede caer."
      - γ = 1.4 para aire.
    en:
      - η_th grows with r_p but with diminishing returns.
      - "Do not maximize r_p: W_net may fall."
      - γ = 1.4 for air.
  commonMistakes:
    es:
      - Usar fórmula de Carnot.
      - T en Celsius.
      - Olvidar trabajo del compresor.
    en:
      - Using Carnot formula.
      - T in Celsius.
      - Forgetting compressor work.
