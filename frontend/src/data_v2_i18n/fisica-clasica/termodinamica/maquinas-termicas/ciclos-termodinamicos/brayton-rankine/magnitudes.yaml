magnitudes:
- id: eta_th
  symbol: "η_th"
  nombre:
    es: rendimiento térmico
    en: thermal efficiency
  descripcion:
    es: "Fracción del calor absorbido que el ciclo convierte en trabajo neto útil."
    en: "Fraction of the absorbed heat that the cycle converts into useful net work."
  unidad_si: "adimensional"
  dimension: "adimensional"
  is_vector: false
  components: []
  category: energética
  physical_role:
    es: magnitud derivada que cuantifica la calidad energética del ciclo
    en: derived quantity that quantifies the energetic quality of the cycle
  used_in:
  - rendimiento_brayton
  - rendimiento_rankine
  common_mistake:
    es: "Confundir η_th con el rendimiento de Carnot; el Brayton real siempre tiene η_th < η_Carnot."
    en: "Confusing η_th with Carnot efficiency; real Brayton always has η_th < η_Carnot."
  typical_range:
    es: "0.25 – 0.60 para ciclos reales"
    en: "0.25 – 0.60 for real cycles"
  sign_behavior:
    es: "Siempre positivo entre 0 y 1."
    en: "Always positive between 0 and 1."
  zero_behavior:
    es: "η_th igual a 0 implica que todo el calor absorbido se rechaza; el ciclo no produce trabajo útil."
    en: "η_th equal to 0 implies all absorbed heat is rejected; the cycle produces no useful work."
  value_nature: continua
  interpretation_role:
    es: "Determina cuánta energía calorífica se convierte en trabajo; valor central de la comparación Brayton vs Rankine."
    en: "Determines how much thermal energy is converted to work; central value in Brayton vs Rankine comparison."
  graph_binding:
    es: "Eje y en diagramas η_th vs r_p o η_th vs T_H."
    en: "y-axis in η_th vs r_p or η_th vs T_H diagrams."
  pedagogical_notes:
    es: "El rendimiento no es porcentaje de energía perdida; es la fracción útil. Subrayar que η_th igual a 1 viola la segunda ley."
    en: "Efficiency is not the percentage of lost energy; it is the useful fraction. Stress that η_th equal to 1 violates the second law."
- id: W_neto
  symbol: "W_net"
  nombre:
    es: trabajo neto del ciclo
    en: net cycle work
  descripcion:
    es: "Diferencia entre el trabajo producido por la turbina y el trabajo consumido por el compresor o bomba."
    en: "Difference between work produced by the turbine and work consumed by the compressor or pump."
  unidad_si: "J"
  dimension: "M L² T⁻²"
  is_vector: false
  components: []
  category: energética
  physical_role:
    es: magnitud extensiva que representa la salida útil del ciclo por unidad de masa
    en: extensive quantity representing the useful output of the cycle per unit mass
  used_in:
  - rendimiento_rankine
  - balance_energetico
  common_mistake:
    es: "Olvidar restar el trabajo del compresor o bomba al trabajo de la turbina."
    en: "Forgetting to subtract the compressor or pump work from the turbine work."
  typical_range:
    es: "100 – 600 kJ/kg para ciclos de vapor y gas industriales"
    en: "100 – 600 kJ/kg for industrial steam and gas cycles"
  sign_behavior:
    es: "Positivo cuando la turbina domina sobre el compresor; negativo indicaría ciclo invertido."
    en: "Positive when the turbine dominates over the compressor; negative would indicate a reversed cycle."
  zero_behavior:
    es: "W_neto igual a 0 implicaría que todo el trabajo producido se consume internamente; ciclo inútil."
    en: "W_net equal to 0 would imply all produced work is consumed internally; useless cycle."
  value_nature: continua
  interpretation_role:
    es: "Numerador de la eficiencia; determina la potencia extraíble del ciclo."
    en: "Numerator of efficiency; determines the extractable power of the cycle."
  graph_binding:
    es: "Área encerrada en el diagrama T-s o p-v del ciclo."
    en: "Enclosed area in the T-s or p-v diagram of the cycle."
  pedagogical_notes:
    es: "Insistir en que W_neto es neto: la diferencia, no solo el trabajo de la turbina. El compresor consume trabajo."
    en: "Stress that W_net is net: the difference, not just turbine work. The compressor consumes work."
- id: Q_H
  symbol: "Q_H"
  nombre:
    es: calor absorbido de la fuente caliente
    en: heat absorbed from the hot source
  descripcion:
    es: "Energía térmica que el fluido de trabajo recibe de la fuente de alta temperatura en cada ciclo."
    en: "Thermal energy the working fluid receives from the high-temperature source in each cycle."
  unidad_si: "J"
  dimension: "M L² T⁻²"
  is_vector: false
  components: []
  category: energética
  physical_role:
    es: "entrada energética del ciclo; denominador del rendimiento térmico"
    en: "energy input of the cycle; denominator of thermal efficiency"
  used_in:
  - rendimiento_rankine
  - balance_energetico
  common_mistake:
    es: "Tomar Q_H como la energía del combustible sin restar pérdidas en cámara de combustión."
    en: "Taking Q_H as the fuel energy without subtracting combustion chamber losses."
  typical_range:
    es: "200 – 2000 kJ/kg según el ciclo y las condiciones"
    en: "200 – 2000 kJ/kg depending on cycle and conditions"
  sign_behavior:
    es: "Positivo por convenio: energía que entra al fluido."
    en: "Positive by convention: energy entering the fluid."
  zero_behavior:
    es: "Q_H igual a 0 no tiene sentido físico en un ciclo de potencia; implicaría ausencia de fuente caliente."
    en: "Q_H equal to 0 has no physical meaning in a power cycle; it would imply no hot source."
  value_nature: continua
  interpretation_role:
    es: "Define cuánta energía primaria requiere el ciclo para funcionar."
    en: "Defines how much primary energy the cycle requires to operate."
  graph_binding:
    es: "Área bajo la curva de absorción de calor en el diagrama T-s."
    en: "Area under the heat absorption curve in the T-s diagram."
  pedagogical_notes:
    es: "Distinguir Q_H del poder calorífico del combustible: Q_H es el calor realmente transferido al fluido de trabajo."
    en: "Distinguish Q_H from the fuel heating value: Q_H is the heat actually transferred to the working fluid."
- id: Q_C
  symbol: "Q_C"
  nombre:
    es: calor rechazado al foco frío
    en: heat rejected to the cold sink
  descripcion:
    es: "Energía térmica que el fluido de trabajo cede al foco frío (condensador o escape) en cada ciclo."
    en: "Thermal energy the working fluid rejects to the cold sink (condenser or exhaust) in each cycle."
  unidad_si: "J"
  dimension: "M L² T⁻²"
  is_vector: false
  components: []
  category: energética
  physical_role:
    es: pérdida energética inevitable impuesta por la segunda ley de la termodinámica
    en: unavoidable energy loss imposed by the second law of thermodynamics
  used_in:
  - balance_energetico
  common_mistake:
    es: "Creer que Q_C igual a 0 es posible; violaría la segunda ley de la termodinámica."
    en: "Believing Q_C equal to 0 is possible; it would violate the second law of thermodynamics."
  typical_range:
    es: "100 – 1500 kJ/kg; siempre Q_C mayor que 0 en un ciclo real"
    en: "100 – 1500 kJ/kg; always Q_C greater than 0 in a real cycle"
  sign_behavior:
    es: "Positivo por convenio de módulo; representa energía que sale del fluido."
    en: "Positive by modulus convention; represents energy leaving the fluid."
  zero_behavior:
    es: "Q_C igual a 0 implicaría un motor perfecto, prohibido por el enunciado de Kelvin-Planck."
    en: "Q_C equal to 0 would imply a perfect engine, forbidden by the Kelvin-Planck statement."
  value_nature: continua
  interpretation_role:
    es: "Cuantifica la energía desperdiciada; junto con Q_H determina η_th."
    en: "Quantifies wasted energy; together with Q_H it determines η_th."
  graph_binding:
    es: "Área bajo la curva de rechazo de calor en el diagrama T-s."
    en: "Area under the heat rejection curve in the T-s diagram."
  pedagogical_notes:
    es: "Q_C no es un fracaso de diseño: es la consecuencia inevitable de operar entre dos focos de temperatura finita."
    en: "Q_C is not a design failure: it is the inevitable consequence of operating between two finite-temperature reservoirs."
- id: r_p
  symbol: "r_p"
  nombre:
    es: relación de presiones
    en: pressure ratio
  descripcion:
    es: "Cociente entre la presión máxima y la presión mínima del ciclo Brayton; controla el rendimiento del ciclo."
    en: "Ratio of maximum to minimum pressure in the Brayton cycle; controls cycle efficiency."
  unidad_si: "adimensional"
  dimension: "adimensional"
  is_vector: false
  components: []
  category: geométrica-operacional
  physical_role:
    es: parámetro de diseño que determina el rendimiento del ciclo Brayton
    en: design parameter that determines Brayton cycle efficiency
  used_in:
  - rendimiento_brayton
  common_mistake:
    es: "Usar r_p menor que 1 o confundirlo con la relación de compresión volumétrica del ciclo Otto."
    en: "Using r_p less than 1 or confusing it with the volumetric compression ratio of the Otto cycle."
  typical_range:
    es: "5 – 40 para turbinas de gas industriales y aeronáuticas"
    en: "5 – 40 for industrial and aeronautical gas turbines"
  sign_behavior:
    es: "Siempre mayor que 1 en un ciclo Brayton de potencia."
    en: "Always greater than 1 in a Brayton power cycle."
  zero_behavior:
    es: "r_p igual a 1 implica proceso isobárico nulo; no hay ciclo."
    en: "r_p equal to 1 implies no isobaric process; no cycle exists."
  value_nature: continua
  interpretation_role:
    es: "A mayor r_p, mayor η_th hasta un óptimo; pasado ese punto el trabajo neto disminuye aunque el rendimiento siga creciendo."
    en: "Higher r_p yields higher η_th up to an optimum; beyond it net work decreases even if efficiency keeps rising."
  graph_binding:
    es: "Eje x canónico en diagramas η_th vs r_p del ciclo Brayton."
    en: "Canonical x-axis in η_th vs r_p diagrams for the Brayton cycle."
  pedagogical_notes:
    es: "Mostrar que maximizar r_p no maximiza W_neto; existe un r_p óptimo para máximo trabajo que difiere del que maximiza η_th."
    en: "Show that maximizing r_p does not maximize W_net; there is an optimal r_p for maximum work that differs from the one maximizing η_th."
- id: gamma
  symbol: "γ"
  nombre:
    es: índice adiabático
    en: adiabatic index
  descripcion:
    es: "Cociente entre la capacidad calorífica a presión constante y a volumen constante del gas de trabajo."
    en: "Ratio of specific heat at constant pressure to specific heat at constant volume of the working gas."
  unidad_si: "adimensional"
  dimension: "adimensional"
  is_vector: false
  components: []
  category: propiedad del fluido
  physical_role:
    es: propiedad del fluido de trabajo que fija la pendiente de los procesos adiabáticos
    en: working fluid property that sets the slope of adiabatic processes
  used_in:
  - rendimiento_brayton
  common_mistake:
    es: "Usar γ igual a 1 (gas isotérmico) o γ tendente a infinito (sólido rígido) en cálculos de ciclo Brayton."
    en: "Using γ equal to 1 (isothermal gas) or γ tending to infinity (rigid solid) in Brayton cycle calculations."
  typical_range:
    es: "γ aproximadamente 1.40 para aire (gas diatómico) a temperatura ambiente; disminuye ligeramente a alta temperatura"
    en: "γ approximately 1.40 for air (diatomic gas) at room temperature; decreases slightly at high temperature"
  sign_behavior:
    es: "Siempre mayor que 1 para cualquier gas real."
    en: "Always greater than 1 for any real gas."
  zero_behavior:
    es: "γ igual a 1 implicaría proceso isotérmico en la compresión; no corresponde a gases ideales diatómicos."
    en: "γ equal to 1 would imply isothermal compression process; does not correspond to diatomic ideal gases."
  value_nature: continua
  interpretation_role:
    es: "Determina cuánto aumenta T en la compresión adiabática; a mayor γ, mayor calentamiento por compresión."
    en: "Determines how much T rises in adiabatic compression; higher γ means more compression heating."
  graph_binding:
    es: "Parámetro implícito en la pendiente de los procesos adiabáticos del diagrama T-s."
    en: "Implicit parameter in the slope of adiabatic processes in the T-s diagram."
  pedagogical_notes:
    es: "γ no es libre: está fijado por la composición molecular del gas. Para aire usar siempre γ igual a 1.4 salvo indicación explícita."
    en: "γ is not free: it is fixed by the molecular composition of the gas. Always use γ equal to 1.4 for air unless stated otherwise."
- id: T_H
  symbol: "T_H"
  nombre:
    es: temperatura de la fuente caliente
    en: hot source temperature
  descripcion:
    es: "Temperatura máxima del ciclo; temperatura a la que el fluido absorbe calor de la fuente de alta temperatura."
    en: "Maximum cycle temperature; temperature at which the fluid absorbs heat from the high-temperature source."
  unidad_si: "K"
  dimension: "Theta"
  is_vector: false
  components: []
  category: térmica
  physical_role:
    es: límite superior de temperatura del ciclo; determina el potencial termodinámico disponible
    en: upper temperature limit of the cycle; determines the available thermodynamic potential
  used_in:
  - rendimiento_rankine
  common_mistake:
    es: "Usar T_H en grados Celsius en lugar de kelvin al calcular rendimientos."
    en: "Using T_H in Celsius instead of kelvin when calculating efficiencies."
  typical_range:
    es: "500 – 900 K para turbinas de vapor; hasta 1700 K en turbinas de gas"
    en: "500 – 900 K for steam turbines; up to 1700 K in gas turbines"
  sign_behavior:
    es: "Siempre positiva en escala kelvin."
    en: "Always positive on the kelvin scale."
  zero_behavior:
    es: "T_H tendente a 0 K es inalcanzable; el ciclo requiere T_H mayor que T_C para producir trabajo."
    en: "T_H approaching 0 K is unreachable; the cycle requires T_H greater than T_C to produce work."
  value_nature: continua
  interpretation_role:
    es: "A mayor T_H, mayor potencial de eficiencia del ciclo; límite material fijado por la resistencia de los materiales."
    en: "Higher T_H increases the cycle efficiency potential; material limit set by material resistance."
  graph_binding:
    es: "Temperatura máxima en el diagrama T-s; define la altura del área útil del ciclo."
    en: "Maximum temperature in the T-s diagram; defines the height of the useful cycle area."
  pedagogical_notes:
    es: "Subrayar que el avance tecnológico en turbinas se mide por cuánto se puede elevar T_H con materiales cerámicos y refrigeración de paletas."
    en: "Emphasize that technological advance in turbines is measured by how high T_H can be raised with ceramics and blade cooling."
- id: T_C
  symbol: "T_C"
  nombre:
    es: temperatura del foco frío
    en: cold sink temperature
  descripcion:
    es: "Temperatura mínima del ciclo; temperatura a la que el fluido rechaza calor al condensador o al escape."
    en: "Minimum cycle temperature; temperature at which the fluid rejects heat to the condenser or exhaust."
  unidad_si: "K"
  dimension: "Theta"
  is_vector: false
  components: []
  category: térmica
  physical_role:
    es: límite inferior de temperatura del ciclo; fijado por el entorno o el condensador
    en: lower temperature limit of the cycle; fixed by the environment or condenser
  used_in:
  - rendimiento_rankine
  common_mistake:
    es: "Ignorar que T_C está fijada externamente (temperatura ambiental o del agua de refrigeración) y no puede reducirse libremente."
    en: "Ignoring that T_C is externally fixed (ambient or cooling water temperature) and cannot be freely reduced."
  typical_range:
    es: "280 – 340 K para condensadores refrigerados por agua o aire en condiciones industriales"
    en: "280 – 340 K for water- or air-cooled condensers under industrial conditions"
  sign_behavior:
    es: "Siempre positiva en escala kelvin; siempre menor que T_H."
    en: "Always positive on the kelvin scale; always less than T_H."
  zero_behavior:
    es: "T_C tendente a 0 K aumentaría η_th indefinidamente; imposible en la práctica."
    en: "T_C approaching 0 K would increase η_th indefinitely; impossible in practice."
  value_nature: continua
  interpretation_role:
    es: "Cuanto más baja sea T_C respecto a T_H, mayor es el rendimiento máximo posible del ciclo."
    en: "The lower T_C is relative to T_H, the higher the maximum achievable cycle efficiency."
  graph_binding:
    es: "Temperatura mínima en el diagrama T-s; define la base del área útil del ciclo."
    en: "Minimum temperature in the T-s diagram; defines the base of the useful cycle area."
  pedagogical_notes:
    es: "Recordar que T_C no es un parámetro de diseño libre: está impuesta por el entorno. Solo T_H y r_p son ajustables en el diseño."
    en: "Recall that T_C is not a free design parameter: it is imposed by the environment. Only T_H and r_p are adjustable in design."
