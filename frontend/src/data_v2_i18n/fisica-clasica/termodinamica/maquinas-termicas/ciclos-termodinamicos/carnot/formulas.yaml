- id: rendimiento_carnot
  title:
    es: Rendimiento del ciclo de Carnot
    en: Carnot cycle efficiency
  equation: "eta_C = 1 - T_C / T_H"
  latex: "\\eta_C = 1 - \\frac{T_C}{T_H}"
  rearrangements:
    - target: eta_C
      equation: "eta_C = 1 - T_C / T_H"
      latex: "\\eta_C = 1 - \\frac{T_C}{T_H}"
    - target: T_C
      equation: "T_C = T_H * (1 - eta_C)"
      latex: "T_C = T_H \\left(1 - \\eta_C\\right)"
    - target: T_H
      equation: "T_H = T_C / (1 - eta_C)"
      latex: "T_H = \\frac{T_C}{1 - \\eta_C}"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Establece el rendimiento máximo teórico de cualquier máquina térmica que opera entre dos focos a temperaturas absolutas T_H y T_C"
    en: "Establishes the maximum theoretical efficiency of any heat engine operating between two reservoirs at absolute temperatures T_H and T_C"
  constraints:
    - "T_H > T_C > 0"
    - "Ciclo completamente reversible"
  validity:
    es: "Válida para cualquier ciclo reversible entre dos focos térmicos, independientemente del fluido de trabajo"
    en: "Valid for any reversible cycle between two thermal reservoirs, regardless of the working fluid"
  dimension_check: "adimensional: [K]/[K] resulta [1]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - evaluación de rendimiento límite
    - comparación con ciclos reales
    - diseño termodinámico conceptual
  interpretation_tags:
    - rendimiento máximo
    - segunda ley
    - límite termodinámico
  result_semantics:
    target: eta_C
    kind: ratio
    sign_meaning:
      es: "Siempre positivo, fracción de calor convertida en trabajo"
      en: "Always positive, fraction of heat converted to work"
    absolute_value_meaning:
      es: "Cercano a 1 indica gran diferencia entre focos; cercano a 0 indica focos a temperaturas similares"
      en: "Close to 1 indicates large reservoir temperature difference; close to 0 indicates similar reservoir temperatures"
  domain_checks:
    - "T_H debe ser estrictamente mayor que T_C"
    - "Ambas temperaturas deben estar en kelvin"
    - "eta_C debe quedar en el intervalo abierto (0, 1)"
  coherence_checks:
    - "Si eta_C supera 0.75 con temperaturas ambientales, verificar que T_H sea superior a 1200 K"
    - "Si eta_C resulta negativo, T_C supera T_H lo cual es incoherente"
  graph_implications:
    - "En el diagrama T-s, el área del rectángulo formado por T_H, T_C y las isotermas representa Q_H; el área interna al ciclo es W_neto"
  pedagogical_triggers:
    - "Alumno usa Celsius en lugar de kelvin"
    - "Alumno confunde rendimiento de Carnot con rendimiento real"

- id: balance_energetico_carnot
  title:
    es: Balance energetico del ciclo de Carnot
    en: Energy balance of Carnot cycle
  equation: "W_neto = Q_H - Q_C"
  latex: "W_{neto} = Q_H - Q_C"
  rearrangements:
    - target: W_neto
      equation: "W_neto = Q_H - Q_C"
      latex: "W_{neto} = Q_H - Q_C"
    - target: Q_H
      equation: "Q_H = W_neto + Q_C"
      latex: "Q_H = W_{neto} + Q_C"
    - target: Q_C
      equation: "Q_C = Q_H - W_neto"
      latex: "Q_C = Q_H - W_{neto}"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Expresa la conservación de energía en el ciclo: el trabajo neto producido es la diferencia entre el calor absorbido del foco caliente y el calor cedido al foco frío"
    en: "Expresses energy conservation in the cycle: the net work produced is the difference between heat absorbed from the hot reservoir and heat rejected to the cold reservoir"
  constraints:
    - "Q_H > Q_C > 0"
    - "W_neto > 0 para motor térmico"
  validity:
    es: "Válida para cualquier ciclo termodinámico cerrado que cumpla la primera ley"
    en: "Valid for any closed thermodynamic cycle satisfying the first law"
  dimension_check: "[M L² T⁻²] en ambos lados"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - cálculo de trabajo neto
    - verificación de coherencia energética
    - determinación de calores intercambiados
  interpretation_tags:
    - primera ley
    - conservación de energía
    - balance térmico
  result_semantics:
    target: W_neto
    kind: extensive
    sign_meaning:
      es: "Positivo indica que el ciclo produce trabajo útil"
      en: "Positive indicates the cycle produces useful work"
    absolute_value_meaning:
      es: "Magnitud del trabajo mecánico aprovechable por ciclo"
      en: "Magnitude of usable mechanical work per cycle"
  domain_checks:
    - "Q_H debe ser mayor que Q_C"
    - "W_neto no puede superar Q_H"
  coherence_checks:
    - "Si W_neto resulta mayor que Q_H, el balance viola la primera ley"
    - "Si W_neto es negativo, los calores están invertidos"
  graph_implications:
    - "W_neto corresponde al área encerrada por el ciclo en el diagrama P-V"
  pedagogical_triggers:
    - "Alumno olvida restar Q_C y presenta Q_H como trabajo"
    - "Alumno asigna signo negativo a Q_C pero no lo resta correctamente"

- id: relacion_calores_carnot
  title:
    es: Relacion de calores en el ciclo de Carnot
    en: Heat ratio in the Carnot cycle
  equation: "Q_C / Q_H = T_C / T_H"
  latex: "\\frac{Q_C}{Q_H} = \\frac{T_C}{T_H}"
  rearrangements:
    - target: Q_C
      equation: "Q_C = Q_H * T_C / T_H"
      latex: "Q_C = Q_H \\cdot \\frac{T_C}{T_H}"
    - target: Q_H
      equation: "Q_H = Q_C * T_H / T_C"
      latex: "Q_H = Q_C \\cdot \\frac{T_H}{T_C}"
  category: derived
  relation_type: constitutive_relation
  physical_meaning:
    es: "En un ciclo de Carnot, la razón entre los calores intercambiados es igual a la razón entre las temperaturas absolutas de los focos"
    en: "In a Carnot cycle, the ratio of exchanged heats equals the ratio of absolute temperatures of the reservoirs"
  constraints:
    - "Ciclo reversible"
    - "Procesos de intercambio de calor isotérmicos"
  validity:
    es: "Exclusiva del ciclo de Carnot y de todo ciclo completamente reversible entre dos focos"
    en: "Exclusive to the Carnot cycle and every fully reversible cycle between two reservoirs"
  dimension_check: "adimensional: [J]/[J] y [K]/[K] en ambos lados"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - demostración del teorema de Carnot
    - definición termodinámica de temperatura
    - escala Kelvin absoluta
  interpretation_tags:
    - proporcionalidad de calores
    - escala absoluta
    - reversibilidad
  result_semantics:
    target: Q_C
    kind: extensive
    sign_meaning:
      es: "Positivo, representa calor inevitablemente cedido al foco frío"
      en: "Positive, represents heat inevitably rejected to cold reservoir"
    absolute_value_meaning:
      es: "Calor mínimo que debe cederse al foco frío para mantener el ciclo"
      en: "Minimum heat that must be rejected to the cold reservoir to maintain the cycle"
  domain_checks:
    - "T_H debe ser estrictamente mayor que T_C"
    - "Q_H debe ser positivo"
  coherence_checks:
    - "Q_C debe ser menor que Q_H"
    - "El cociente Q_C/Q_H debe coincidir con T_C/T_H"
  graph_implications:
    - "En el diagrama T-s, Q_C es el área bajo la isoterma inferior entre los mismos valores de entropía"
  pedagogical_triggers:
    - "Alumno invierte la razón de temperaturas"
    - "Alumno aplica la relación a ciclos irreversibles sin corrección"
