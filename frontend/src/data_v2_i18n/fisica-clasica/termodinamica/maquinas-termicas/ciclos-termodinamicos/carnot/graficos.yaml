version: "1.0"
leaf: "carnot"

coord:
  title:
    es: Gráfica Coord · Carnot
    en: Coord Graph · Carnot
  xAxis:
    es: temperatura foco caliente T_H (K)
    en: hot reservoir temperature T_H (K)
  yAxis:
    es: rendimiento de Carnot η_C
    en: Carnot efficiency η_C
  xMagnitude: T_H
  yMagnitude: eta_C
  relation:
    es: "η_C = 1 − T_C/T_H. Crece hiperbólicamente con T_H. Menor T_C: curva más alta."
    en: "η_C = 1 − T_C/T_H. Grows hyperbolically with T_H. Lower T_C: higher curve."
  physicalReading:
    es: "Curva hiperbólica: cada incremento de T_H aporta menos ganancia de η_C. Punto naranja: η_C al valor medio de T_H."
    en: "Hyperbolic curve: each increment of T_H yields less η_C gain. Orange dot: η_C at midpoint T_H."
  slopeMeaning:
    es: "dη_C/dT_H > 0 pero decreciente: rendimiento máximo crece con T_H a tasa decreciente."
    en: "dη_C/dT_H > 0 but decreasing: maximum efficiency grows with T_H at a decreasing rate."
  interceptMeaning:
    es: "η_C(T_H=T_C) = 0: sin diferencia de temperatura no hay trabajo posible."
    en: "η_C(T_H=T_C) = 0: without temperature difference no work is possible."
  curvatureMeaning:
    es: "Cóncava: d²η_C/dT_H² < 0. Rendimientos decrecientes a temperaturas muy altas."
    en: "Concave: d²η_C/dT_H² < 0. Diminishing returns at very high temperatures."
  signMeaning:
    es: "η_C > 0 siempre para T_H > T_C."
    en: "η_C > 0 always for T_H > T_C."
  areaMeaning:
    es: Sin interpretación directa de área en η_C(T_H).
    en: No direct area interpretation in η_C(T_H).
  domainMeaning:
    es: "T_H > T_C; η_C < 1 para todo T_H finito."
    en: "T_H > T_C; η_C < 1 for all finite T_H."
  modelConnection:
    es: Ciclo de Carnot ideal entre dos focos térmicos.
    en: Ideal Carnot cycle between two thermal reservoirs.
  formulaConnection:
    es: η_C = 1 − T_C/T_H, W_neto = Q_H − Q_C, Q_C/Q_H = T_C/T_H.
    en: η_C = 1 − T_C/T_H, W_neto = Q_H − Q_C, Q_C/Q_H = T_C/T_H.
  readingFocus:
    es: leer η_C en el punto naranja, comparar para distintos T_C y verificar que ningún ciclo real supera esta curva.
    en: read η_C at the orange dot, compare for different T_C and verify no real cycle exceeds this curve.
  agentHints:
    es:
      - η_C crece con T_H pero con rendimientos decrecientes.
      - T_C fija el suelo termodinámico.
      - T en kelvin siempre.
    en:
      - η_C grows with T_H but with diminishing returns.
      - T_C sets the thermodynamic floor.
      - T always in kelvin.
  commonMistakes:
    es:
      - Usar Celsius en lugar de kelvin.
      - Interpretar η_C como rendimiento real.
      - Olvidar que η_C < 1 siempre.
    en:
      - Using Celsius instead of kelvin.
      - Interpreting η_C as real efficiency.
      - Forgetting η_C < 1 always.
