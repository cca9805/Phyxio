- id: eta_C
  symbol: "\\eta_C"
  nombre:
    es: Rendimiento de Carnot
    en: Carnot efficiency
  descripcion:
    es: "Rendimiento máximo teórico de una máquina térmica que opera entre dos focos a temperaturas T_H y T_C"
    en: "Maximum theoretical efficiency of a heat engine operating between two reservoirs at temperatures T_H and T_C"
  unidad_si: adimensional
  dimension: "[1]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - ciclos termodinámicos ideales
    - límite de rendimiento de máquinas térmicas
    - evaluación termodinámica de centrales
  common_mistake: "Confundir el rendimiento de Carnot con el rendimiento real del ciclo; asumir que es alcanzable en la práctica"
  typical_range: "0.30 – 0.75 para máquinas térmicas industriales"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Siempre positivo, representa una fracción de energía convertida en trabajo"
      en: "Always positive, represents a fraction of energy converted to work"
  zero_behavior:
    allowed: true
    meaning:
      es: "Rendimiento nulo implica T_H igual a T_C, ningún trabajo posible"
      en: "Zero efficiency implies T_H equals T_C, no work is possible"
  value_nature:
    kind: ratio
    nonnegative_only: true
    expected_interval: "[0, 1)"
  interpretation_role:
    primary_for:
      - summary
      - coherence
    secondary_for:
      - model_validity
  graph_binding:
    channels:
      - y_axis
  pedagogical_notes:
    es: "El rendimiento de Carnot establece el techo absoluto: ningún ciclo real puede superarlo entre los mismos focos. La clave es que solo depende de las temperaturas absolutas."
    en: "Carnot efficiency sets the absolute ceiling: no real cycle can exceed it between the same reservoirs. The key insight is that it depends only on absolute temperatures."

- id: T_H
  symbol: T_H
  nombre:
    es: Temperatura del foco caliente
    en: Hot reservoir temperature
  descripcion:
    es: "Temperatura absoluta del foco caliente que suministra calor al ciclo"
    en: "Absolute temperature of the hot reservoir supplying heat to the cycle"
  unidad_si: K
  dimension: "[Θ]"
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
    - cálculo de rendimiento de Carnot
    - diseño de ciclos de potencia
    - ingeniería de combustión
  common_mistake: "Usar la temperatura en Celsius en lugar de kelvin"
  typical_range: "500 – 2000 K en turbinas de gas y centrales"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Siempre positiva al medirse en kelvin"
      en: "Always positive when measured in kelvin"
  zero_behavior:
    allowed: false
    meaning:
      es: "Una temperatura de 0 K es inalcanzable físicamente"
      en: "A temperature of 0 K is physically unattainable"
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - physical_reading
    secondary_for:
      - coherence
  graph_binding:
    channels:
      - x_axis
  pedagogical_notes:
    es: "T_H fija el límite superior del ciclo de Carnot; cuanto mayor es T_H a igualdad de T_C, mayor rendimiento máximo teórico."
    en: "T_H sets the upper bound of the Carnot cycle; the higher T_H at constant T_C, the greater the maximum theoretical efficiency."

- id: T_C
  symbol: T_C
  nombre:
    es: Temperatura del foco frio
    en: Cold reservoir temperature
  descripcion:
    es: "Temperatura absoluta del foco frío al que el ciclo rechaza calor"
    en: "Absolute temperature of the cold reservoir to which the cycle rejects heat"
  unidad_si: K
  dimension: "[Θ]"
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
    - cálculo de rendimiento de Carnot
    - análisis de ciclos de refrigeración
    - diseño de sistemas de disipación
  common_mistake: "Olvidar que T_C no puede reducirse a cero en la práctica"
  typical_range: "280 – 350 K en aplicaciones ambientales"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Siempre positiva al medirse en kelvin"
      en: "Always positive when measured in kelvin"
  zero_behavior:
    allowed: false
    meaning:
      es: "Un foco frío a 0 K produciría rendimiento de Carnot igual a 1, lo cual es inalcanzable"
      en: "A cold reservoir at 0 K would yield Carnot efficiency of 1, which is unattainable"
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - physical_reading
    secondary_for:
      - likely_errors
  graph_binding:
    channels:
      - parameter
  pedagogical_notes:
    es: "T_C marca el suelo termodinámico; reducir T_C mejora el rendimiento de Carnot pero está limitado por el entorno ambiental."
    en: "T_C sets the thermodynamic floor; lowering T_C improves Carnot efficiency but is limited by the environmental surroundings."

- id: Q_H
  symbol: Q_H
  nombre:
    es: Calor absorbido del foco caliente
    en: Heat absorbed from hot reservoir
  descripcion:
    es: "Cantidad de calor transferida isotérmicamente desde el foco caliente al fluido de trabajo durante la expansión"
    en: "Amount of heat transferred isothermally from the hot reservoir to the working fluid during expansion"
  unidad_si: J
  dimension: "[M L² T⁻²]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - balance energético del ciclo
    - cálculo de trabajo neto
    - primera ley aplicada al ciclo
  common_mistake: "Confundir Q_H con el trabajo neto del ciclo"
  typical_range: "10³ – 10⁹ J según escala del sistema"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo por convención, calor que entra al sistema"
      en: "Positive by convention, heat entering the system"
  zero_behavior:
    allowed: false
    meaning:
      es: "Sin aporte de calor no hay ciclo térmico"
      en: "Without heat input there is no thermal cycle"
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - physical_reading
    secondary_for:
      - coherence
  graph_binding:
    channels:
      - area
  pedagogical_notes:
    es: "Q_H representa la entrada energética total al ciclo; el rendimiento mide qué fracción de Q_H se convierte en trabajo."
    en: "Q_H represents the total energy input to the cycle; efficiency measures what fraction of Q_H is converted to work."

- id: Q_C
  symbol: Q_C
  nombre:
    es: Calor cedido al foco frio
    en: Heat rejected to cold reservoir
  descripcion:
    es: "Cantidad de calor transferida isotérmicamente desde el fluido de trabajo al foco frío durante la compresión"
    en: "Amount of heat transferred isothermally from the working fluid to the cold reservoir during compression"
  unidad_si: J
  dimension: "[M L² T⁻²]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - balance energético del ciclo
    - enunciado de Kelvin-Planck
    - diseño de sistemas de refrigeración
  common_mistake: "Asumir que Q_C puede hacerse nulo para maximizar el rendimiento"
  typical_range: "proporcional a T_C/T_H multiplicado por Q_H"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo por convención, calor que sale del sistema hacia el foco frío"
      en: "Positive by convention, heat leaving the system to the cold reservoir"
  zero_behavior:
    allowed: false
    meaning:
      es: "La segunda ley prohíbe Q_C nulo en un ciclo entre dos focos"
      en: "The second law forbids zero Q_C in a cycle between two reservoirs"
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - coherence
    secondary_for:
      - likely_errors
  graph_binding:
    channels:
      - area
  pedagogical_notes:
    es: "Q_C es el calor inevitablemente rechazado; su existencia es la manifestación directa de la segunda ley para ciclos."
    en: "Q_C is the inevitably rejected heat; its existence is the direct manifestation of the second law for cycles."

- id: W_neto
  symbol: W_{neto}
  nombre:
    es: Trabajo neto del ciclo
    en: Net cycle work
  descripcion:
    es: "Diferencia entre el calor absorbido y el calor cedido, igual al trabajo útil producido por el ciclo"
    en: "Difference between absorbed heat and rejected heat, equal to the useful work produced by the cycle"
  unidad_si: J
  dimension: "[M L² T⁻²]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - balance energético del ciclo
    - definición de rendimiento térmico
    - evaluación de potencia de centrales
  common_mistake: "Confundir trabajo neto con trabajo de expansión sin restar el trabajo de compresión"
  typical_range: "30 – 65 % de Q_H en máquinas térmicas reales"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo cuando el ciclo produce trabajo (motor térmico)"
      en: "Positive when the cycle produces work (heat engine)"
  zero_behavior:
    allowed: true
    meaning:
      es: "Trabajo neto nulo implica que todo el calor absorbido se rechaza, rendimiento cero"
      en: "Zero net work implies all absorbed heat is rejected, zero efficiency"
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: "[0, +inf)"
  interpretation_role:
    primary_for:
      - summary
    secondary_for:
      - physical_reading
  graph_binding:
    channels:
      - area
  pedagogical_notes:
    es: "W_neto es el área encerrada en el diagrama P-V del ciclo; cuanto mayor sea respecto a Q_H, mayor rendimiento."
    en: "W_neto is the area enclosed in the P-V diagram of the cycle; the larger it is relative to Q_H, the higher the efficiency."
