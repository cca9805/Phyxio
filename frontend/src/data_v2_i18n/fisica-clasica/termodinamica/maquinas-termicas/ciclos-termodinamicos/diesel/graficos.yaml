version: "1.0"
leaf: "diesel"

coord:
  title:
    es: Gráfica Coord · Diesel
    en: Coord Graph · Diesel
  xAxis:
    es: relación de compresión r
    en: compression ratio r
  yAxis:
    es: rendimiento térmico η_D
    en: thermal efficiency η_D
  xMagnitude: r
  yMagnitude: eta_D
  relation:
    es: "η_D = 1 − (1/r^(γ−1))·(r_c^γ−1)/(γ(r_c−1)). Crece sublinealmente con r. Menor r_c: curva más alta."
    en: "η_D = 1 − (1/r^(γ−1))·(r_c^γ−1)/(γ(r_c−1)). Grows sub-linearly with r. Lower r_c: higher curve."
  physicalReading:
    es: "Curva cóncava: cada unidad adicional de r aporta menos mejora de η_D. Punto naranja: η_D a r medio."
    en: "Concave curve: each additional unit of r yields less improvement in η_D. Orange dot: η_D at midpoint r."
  slopeMeaning:
    es: "dη_D/dr > 0 pero decreciente: rendimiento creciente con r a tasa decreciente."
    en: "dη_D/dr > 0 but decreasing: efficiency rising with r at a decreasing rate."
  interceptMeaning:
    es: "η_D(r→1) → 0: sin compresión no hay ciclo útil."
    en: "η_D(r→1) → 0: without compression there is no useful cycle."
  curvatureMeaning:
    es: "Cóncava: d²η_D/dr² < 0. Rendimientos decrecientes a relaciones de compresión muy altas."
    en: "Concave: d²η_D/dr² < 0. Diminishing returns at very high compression ratios."
  signMeaning:
    es: "η_D > 0 siempre para r > 1 y r_c > 1."
    en: "η_D > 0 always for r > 1 and r_c > 1."
  areaMeaning:
    es: Sin interpretación directa de área en η_D(r).
    en: No direct area interpretation in η_D(r).
  domainMeaning:
    es: "r > 1; η_D < 1 para todo r finito."
    en: "r > 1; η_D < 1 for all finite r."
  modelConnection:
    es: Ciclo Diesel ideal con gas de propiedades constantes.
    en: Ideal Diesel cycle with constant-property gas.
  formulaConnection:
    es: η_D = 1 − (1/r^(γ−1))·(r_c^γ−1)/(γ(r_c−1)), W_neto = Q_H − Q_C, η_D = W_neto/Q_H.
    en: η_D = 1 − (1/r^(γ−1))·(r_c^γ−1)/(γ(r_c−1)), W_neto = Q_H − Q_C, η_D = W_neto/Q_H.
  readingFocus:
    es: leer η_D en el punto naranja, comparar curvas con distintos r_c y verificar que η_D < η_Otto a igual r.
    en: read η_D at the orange dot, compare curves with different r_c and verify η_D < η_Otto at same r.
  agentHints:
    es:
      - η_D crece con r pero con rendimientos decrecientes.
      - "Mayor r_c: menor η_D."
      - γ = 1.4 para aire frío.
    en:
      - η_D grows with r but with diminishing returns.
      - "Higher r_c: lower η_D."
      - γ = 1.4 for cold air.
  commonMistakes:
    es:
      - Confundir r con r_c.
      - T en Celsius.
      - Olvidar factor de corte.
    en:
      - Confusing r with r_c.
      - T in Celsius.
      - Forgetting cutoff factor.
