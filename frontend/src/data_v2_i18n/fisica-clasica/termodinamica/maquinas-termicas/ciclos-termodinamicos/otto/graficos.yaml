version: "1.0"
leaf: "otto"

coord:
  title:
    es: Gráfica Coord · Otto
    en: Coord Graph · Otto
  xAxis:
    es: relación de compresión r
    en: compression ratio r
  yAxis:
    es: rendimiento térmico η_O
    en: thermal efficiency η_O
  xMagnitude: r
  yMagnitude: eta_O
  relation:
    es: "η_O = 1 − 1/r^(γ−1). Crece sublinealmente con r. Mayor γ: curva más alta."
    en: "η_O = 1 − 1/r^(γ−1). Grows sub-linearly with r. Higher γ: higher curve."
  physicalReading:
    es: "Curva cóncava: cada unidad adicional de r aporta menos mejora de η_O. Punto naranja: η_O a r medio."
    en: "Concave curve: each additional unit of r yields less improvement in η_O. Orange dot: η_O at midpoint r."
  slopeMeaning:
    es: "dη_O/dr > 0 pero decreciente: rendimiento creciente con r a tasa decreciente."
    en: "dη_O/dr > 0 but decreasing: efficiency rising with r at a decreasing rate."
  interceptMeaning:
    es: "η_O(r→1) → 0: sin compresión no hay ciclo útil."
    en: "η_O(r→1) → 0: without compression there is no useful cycle."
  curvatureMeaning:
    es: "Cóncava: d²η_O/dr² < 0. Rendimientos decrecientes a relaciones de compresión muy altas."
    en: "Concave: d²η_O/dr² < 0. Diminishing returns at very high compression ratios."
  signMeaning:
    es: "η_O > 0 siempre para r > 1."
    en: "η_O > 0 always for r > 1."
  areaMeaning:
    es: Sin interpretación directa de área en η_O(r).
    en: No direct area interpretation in η_O(r).
  domainMeaning:
    es: "r > 1; η_O < 1 para todo r finito."
    en: "r > 1; η_O < 1 for all finite r."
  modelConnection:
    es: Ciclo Otto ideal con gas de propiedades constantes.
    en: Ideal Otto cycle with constant-property gas.
  formulaConnection:
    es: η_O = 1 − 1/r^(γ−1), W_neto = Q_H − Q_C, η_O = W_neto/Q_H.
    en: η_O = 1 − 1/r^(γ−1), W_neto = Q_H − Q_C, η_O = W_neto/Q_H.
  readingFocus:
    es: leer η_O en el punto naranja, comparar para distintos γ y verificar que η_O < η_Carnot.
    en: read η_O at the orange dot, compare for different γ and verify η_O < η_Carnot.
  agentHints:
    es:
      - η_O crece con r pero con rendimientos decrecientes.
      - η_O no depende de Q_H.
      - γ = 1.4 para aire frío.
    en:
      - η_O grows with r but with diminishing returns.
      - η_O does not depend on Q_H.
      - γ = 1.4 for cold air.
  commonMistakes:
    es:
      - Creer que η_O depende de Q_H.
      - T en Celsius.
      - Usar r de Diesel.
    en:
      - Believing η_O depends on Q_H.
      - T in Celsius.
      - Using Diesel r values.
