version: "1.0"
leaf: "coeficiente-de-rendimiento"

coord:
  title:
    es: Gráfica Coord · Coeficiente de rendimiento
    en: Coord Graph · Coefficient of Performance
  xAxis:
    es: temperatura foco frío T_C (K)
    en: cold reservoir temperature T_C (K)
  yAxis:
    es: COP (adimensional)
    en: COP (dimensionless)
  xMagnitude: T_C
  yMagnitude: COP_ref
  relation:
    es: COP_ref = T_C/(T_H−T_C). Crece hiperbólicamente cuando T_C se acerca a T_H. COP_bc = COP_ref + 1.
    en: COP_ref = T_C/(T_H−T_C). Grows hyperbolically as T_C approaches T_H. COP_bc = COP_ref + 1.
  physicalReading:
    es: "Dos curvas separadas por 1 unidad: COP_ref (azul) y COP_bc (rojo). Ambas divergen cuando T_C → T_H."
    en: "Two curves separated by 1 unit: COP_ref (blue) and COP_bc (red). Both diverge as T_C → T_H."
  slopeMeaning:
    es: "dCOP_ref/dT_C = T_H/(T_H−T_C)²: crece rápidamente al reducir la diferencia de temperaturas."
    en: "dCOP_ref/dT_C = T_H/(T_H−T_C)²: grows rapidly as temperature difference shrinks."
  interceptMeaning:
    es: "COP_ref(T_C→0) → 0: extraer calor del cero absoluto requiere trabajo infinito."
    en: "COP_ref(T_C→0) → 0: extracting heat from absolute zero requires infinite work."
  curvatureMeaning:
    es: "Convexa: curvatura positiva, COP crece cada vez más rápido al acercarse T_C a T_H."
    en: "Convex: positive curvature, COP grows faster and faster as T_C approaches T_H."
  signMeaning:
    es: "COP > 0 siempre para T_H > T_C > 0."
    en: "COP > 0 always for T_H > T_C > 0."
  areaMeaning:
    es: Sin interpretación directa de área en COP(T_C).
    en: No direct area interpretation in COP(T_C).
  domainMeaning:
    es: 0 < T_C < T_H; COP diverge en T_C = T_H.
    en: 0 < T_C < T_H; COP diverges at T_C = T_H.
  modelConnection:
    es: Ciclo de Carnot invertido entre dos focos térmicos.
    en: Reversed Carnot cycle between two thermal reservoirs.
  formulaConnection:
    es: COP_ref = T_C/(T_H−T_C), COP_bc = T_H/(T_H−T_C), COP_bc = COP_ref + 1, Q_H = Q_C + W.
    en: COP_ref = T_C/(T_H−T_C), COP_bc = T_H/(T_H−T_C), COP_bc = COP_ref + 1, Q_H = Q_C + W.
  readingFocus:
    es: leer COP_ref en el punto naranja, comparar con COP_bc y verificar separación de 1.
    en: read COP_ref at the orange dot, compare with COP_bc and verify separation of 1.
  agentHints:
    es:
      - COP crece al acercar T_C a T_H.
      - COP_bc = COP_ref + 1 siempre.
      - T en kelvin obligatorio.
    en:
      - COP grows as T_C approaches T_H.
      - COP_bc = COP_ref + 1 always.
      - T in kelvin required.
  commonMistakes:
    es:
      - Usar Celsius.
      - Confundir COP_ref con COP_bc.
      - "Creer que COP > 1 viola la segunda ley."
    en:
      - Using Celsius.
      - Confusing COP_ref with COP_bc.
      - "Believing COP > 1 violates the second law."
