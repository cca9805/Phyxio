version: "1.0"
leaf: "ejemplos-practicos"

coord:
  title:
    es: Gráfica Coord · Ejemplos prácticos
    en: Coord Graph · Practical Examples
  xAxis:
    es: temperatura foco frío T_C (K)
    en: cold reservoir temperature T_C (K)
  yAxis:
    es: COP (adimensional)
    en: COP (dimensionless)
  xMagnitude: T_C
  yMagnitude: COP_real
  relation:
    es: COP_real = η·COP_Carnot = η·T_C/(T_H−T_C). Curva real siempre debajo de la de Carnot.
    en: COP_real = η·COP_Carnot = η·T_C/(T_H−T_C). Real curve always below the Carnot curve.
  physicalReading:
    es: "Dos curvas: Carnot (gris discontinuo, cota superior) y real (azul). La zona sombreada muestra la brecha de eficiencia."
    en: "Two curves: Carnot (dashed gray, upper bound) and real (blue). The shaded area shows the efficiency gap."
  slopeMeaning:
    es: "dCOP_real/dT_C = η·T_H/(T_H−T_C)²: crece al reducir la diferencia de temperaturas."
    en: "dCOP_real/dT_C = η·T_H/(T_H−T_C)²: grows as temperature difference shrinks."
  interceptMeaning:
    es: "COP_real(T_C→0) → 0: extraer calor del cero absoluto requiere trabajo infinito."
    en: "COP_real(T_C→0) → 0: extracting heat from absolute zero requires infinite work."
  curvatureMeaning:
    es: "Convexa: curvatura positiva, ambas curvas crecen más rápido al acercarse T_C a T_H."
    en: "Convex: positive curvature, both curves grow faster as T_C approaches T_H."
  signMeaning:
    es: "COP_real > 0 siempre para T_H > T_C > 0."
    en: "COP_real > 0 always for T_H > T_C > 0."
  areaMeaning:
    es: Área entre curvas proporcional a la pérdida de eficiencia por irreversibilidades.
    en: Area between curves proportional to efficiency loss from irreversibilities.
  domainMeaning:
    es: 0 < T_C < T_H; COP diverge en T_C = T_H (solo en teoría).
    en: 0 < T_C < T_H; COP diverges at T_C = T_H (only in theory).
  modelConnection:
    es: Ciclo de compresión de vapor real vs. ciclo de Carnot invertido.
    en: Real vapor-compression cycle vs. reversed Carnot cycle.
  formulaConnection:
    es: "COP_real = Q_C/W_comp, COP_Carnot = T_C/(T_H−T_C), η_Carnot = COP_real/COP_Carnot·100%, Q_H = Q_C + W_comp."
    en: "COP_real = Q_C/W_comp, COP_Carnot = T_C/(T_H−T_C), η_Carnot = COP_real/COP_Carnot·100%, Q_H = Q_C + W_comp."
  readingFocus:
    es: leer COP_real en el punto naranja, comparar con COP_Carnot y estimar la fracción de Carnot.
    en: read COP_real at the orange dot, compare with COP_Carnot and estimate the Carnot fraction.
  agentHints:
    es:
      - COP_real siempre < COP_Carnot.
      - "η típica: 30–60 %."
      - T en kelvin obligatorio.
    en:
      - COP_real always < COP_Carnot.
      - "Typical η: 30–60 %."
      - T in kelvin required.
  commonMistakes:
    es:
      - Usar COP_Carnot como valor real.
      - T en Celsius.
      - Olvidar balance energético.
    en:
      - Using COP_Carnot as real value.
      - T in Celsius.
      - Forgetting energy balance.
