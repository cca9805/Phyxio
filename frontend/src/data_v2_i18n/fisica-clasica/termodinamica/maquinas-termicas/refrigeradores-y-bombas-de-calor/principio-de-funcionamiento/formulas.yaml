- id: balance_energetico_ciclo_invertido
  title:
    es: Balance energetico del ciclo invertido
    en: Reversed cycle energy balance
  equation: "Q_H = Q_C + W"
  latex: "Q_H = Q_C + W"
  rearrangements:
    - target: Q_H
      equation: "Q_H = Q_C + W"
      latex: "Q_H = Q_C + W"
    - target: W
      equation: "W = Q_H - Q_C"
      latex: "W = Q_H - Q_C"
    - target: Q_C
      equation: "Q_C = Q_H - W"
      latex: "Q_C = Q_H - W"
  category: fundamental
  relation_type: conservation
  physical_meaning:
    es: "La primera ley aplicada al ciclo completo: toda la energia que entra (Q_C mas W) sale como Q_H al foco caliente."
    en: "First law applied to the complete cycle: all energy entering (Q_C plus W) exits as Q_H to the hot reservoir."
  constraints:
    - "Q_H > Q_C"
    - "W > 0"
  validity:
    es: "Valida para cualquier ciclo invertido en estado estacionario."
    en: "Valid for any reversed cycle in steady state."
  dimension_check: "energia: [J] = [J] + [J]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - verificacion de primera ley en ciclos invertidos
    - calculo de Q_H a partir de Q_C y W
  interpretation_tags:
    - conservacion de energia
    - ciclo invertido
    - balance termico
  result_semantics:
    target: Q_H
    kind: extensive
    sign_meaning:
      es: "Siempre positivo, calor total rechazado al foco caliente"
      en: "Always positive, total heat rejected to hot reservoir"
    absolute_value_meaning:
      es: "Q_H mayor que Q_C indica funcionamiento correcto del ciclo"
      en: "Q_H greater than Q_C indicates correct cycle operation"
  domain_checks:
    - "W debe ser estrictamente positivo"
    - "Q_C debe ser positivo"
    - "Q_H debe ser mayor que Q_C"
  coherence_checks:
    - "Si Q_H es menor o igual a Q_C, el balance viola la segunda ley"
    - "Q_H menos Q_C debe dar exactamente W"
  graph_implications:
    - "Q_H aparece como energia total saliente en el diagrama de balance"
  pedagogical_triggers:
    - "Alumno olvida sumar W a Q_C para obtener Q_H"
    - "Alumno confunde signos de calor y trabajo"
  interpretation_anchor:
    what_does_it_tell:
      es: "Que toda la energia se conserva en el ciclo."
      en: "That all energy is conserved in the cycle."
    when_to_apply:
      es: "Siempre que se analice un ciclo invertido completo."
      en: "Whenever a complete reversed cycle is analyzed."
    what_changes:
      es: "Si W aumenta con Q_C constante, Q_H aumenta igual."
      en: "If W increases with Q_C constant, Q_H increases equally."
    limit_cases:
      es: "Si W tiende a cero, Q_H tiende a Q_C."
      en: "If W tends to zero, Q_H tends to Q_C."

- id: segunda_ley_ciclo_invertido
  title:
    es: Segunda ley para el ciclo invertido
    en: Second law for the reversed cycle
  equation: "Delta_S_total = Q_H / T_H - Q_C / T_C >= 0"
  latex: "\\Delta S_{total} = \\frac{Q_H}{T_H} - \\frac{Q_C}{T_C} \\geq 0"
  rearrangements:
    - target: Delta_S_total
      equation: "Delta_S_total = Q_H / T_H - Q_C / T_C"
      latex: "\\Delta S_{total} = \\frac{Q_H}{T_H} - \\frac{Q_C}{T_C}"
  category: fundamental
  relation_type: inequality
  physical_meaning:
    es: "La entropia total del universo no puede disminuir. El ciclo invertido genera entropia en el foco caliente para compensar la que extrae del frio."
    en: "Total entropy of the universe cannot decrease. The reversed cycle generates entropy in the hot reservoir to compensate what it extracts from the cold."
  constraints:
    - "T_H > T_C"
    - "Temperaturas en kelvin"
  validity:
    es: "Universal para cualquier ciclo invertido entre dos focos."
    en: "Universal for any reversed cycle between two reservoirs."
  dimension_check: "entropia: [J/K] = [J]/[K] - [J]/[K]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - verificacion de viabilidad termodinamica
    - demostracion de necesidad de trabajo externo
  interpretation_tags:
    - segunda ley
    - entropia
    - irreversibilidad
  result_semantics:
    target: Delta_S_total
    kind: extensive
    sign_meaning:
      es: "Cero para reversible, positivo para irreversible, negativo imposible"
      en: "Zero for reversible, positive for irreversible, negative impossible"
    absolute_value_meaning:
      es: "Mayor Delta_S_total indica mayor irreversibilidad del ciclo"
      en: "Greater Delta_S_total indicates greater cycle irreversibility"
  domain_checks:
    - "T_H y T_C deben estar en kelvin"
    - "Delta_S_total no puede ser negativa"
  coherence_checks:
    - "Si Delta_S_total resulta negativa, hay error en datos o formula"
    - "Para ciclo de Carnot Delta_S_total debe ser cero"
  graph_implications:
    - "Delta_S_total no se grafica directamente sino que verifica el ciclo"
  pedagogical_triggers:
    - "Alumno obtiene Delta_S_total negativa por usar Celsius"
    - "Alumno confunde Q_H con Q_C en la formula de entropia"
  interpretation_anchor:
    what_does_it_tell:
      es: "Que el calor no fluye espontaneamente del frio al caliente."
      en: "That heat does not flow spontaneously from cold to hot."
    when_to_apply:
      es: "Al verificar si un ciclo es termodinamicamente viable."
      en: "When verifying whether a cycle is thermodynamically viable."
    what_changes:
      es: "Cuanto mayor T_H respecto a T_C, mas entropia se genera."
      en: "The greater T_H relative to T_C, the more entropy generated."
    limit_cases:
      es: "Si T_H tiende a T_C, Delta_S_total tiende a cero."
      en: "If T_H tends to T_C, Delta_S_total tends to zero."

- id: trabajo_minimo_carnot
  title:
    es: Trabajo minimo de Carnot
    en: Minimum Carnot work
  equation: "W_min = Q_C * (T_H - T_C) / T_C"
  latex: "W_{min} = Q_C \\cdot \\frac{T_H - T_C}{T_C}"
  rearrangements:
    - target: W
      equation: "W_min = Q_C * (T_H - T_C) / T_C"
      latex: "W_{min} = Q_C \\cdot \\frac{T_H - T_C}{T_C}"
    - target: Q_C
      equation: "Q_C = W_min * T_C / (T_H - T_C)"
      latex: "Q_C = W_{min} \\cdot \\frac{T_C}{T_H - T_C}"
  category: derived
  relation_type: equality
  physical_meaning:
    es: "El trabajo minimo necesario para extraer Q_C del foco frio en un ciclo completamente reversible."
    en: "The minimum work needed to extract Q_C from the cold reservoir in a fully reversible cycle."
  constraints:
    - "Ciclo completamente reversible"
    - "T_H > T_C en kelvin"
  validity:
    es: "Solo para el ciclo de Carnot invertido. Los ciclos reales requieren W mayor."
    en: "Only for the reversed Carnot cycle. Real cycles require greater W."
  dimension_check: "energia: [J] = [J] * [K] / [K]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - calculo del COP maximo teorico
    - evaluacion de eficiencia de ciclos reales
  interpretation_tags:
    - trabajo minimo
    - Carnot
    - eficiencia maxima
  result_semantics:
    target: W
    kind: extensive
    sign_meaning:
      es: "Siempre positivo, trabajo necesario para invertir flujo"
      en: "Always positive, work needed to reverse flow"
    absolute_value_meaning:
      es: "Menor W_min indica refrigeracion termodinamicamente mas facil"
      en: "Lower W_min indicates thermodynamically easier refrigeration"
  domain_checks:
    - "T_C debe ser positiva y menor que T_H"
    - "Q_C debe ser positivo"
  coherence_checks:
    - "W real debe ser mayor o igual a W_min"
    - "Si W real es menor que W_min, viola la segunda ley"
  graph_implications:
    - "W_min crece hiperbolicamente al disminuir T_C en el diagrama W vs T_C"
  pedagogical_triggers:
    - "Alumno confunde W_min con W real"
    - "Alumno usa Celsius en lugar de kelvin"
  interpretation_anchor:
    what_does_it_tell:
      es: "Cuanto menor es la diferencia T_H menos T_C, menos trabajo se necesita."
      en: "The smaller the difference T_H minus T_C, the less work needed."
    when_to_apply:
      es: "Para calcular el limite termodinamico del trabajo en refrigeracion."
      en: "To calculate the thermodynamic limit of work in refrigeration."
    what_changes:
      es: "Si T_C se aleja de T_H, W_min crece rapidamente."
      en: "If T_C moves away from T_H, W_min grows rapidly."
    limit_cases:
      es: "Si T_C tiende a T_H, W_min tiende a cero."
      en: "If T_C tends to T_H, W_min tends to zero."

- id: flujo_calor_espontaneo
  title:
    es: Sentido espontaneo del flujo de calor
    en: Spontaneous direction of heat flow
  equation: "Q: T_H -> T_C"
  latex: "Q: T_H \\to T_C"
  rearrangements: []
  category: conceptual
  relation_type: principle
  physical_meaning:
    es: "Formulacion de Clausius: el calor fluye espontaneamente solo del caliente al frio. Invertir requiere trabajo."
    en: "Clausius statement: heat flows spontaneously only from hot to cold. Reversal requires work."
  constraints:
    - "Sistema aislado sin aporte de trabajo"
  validity:
    es: "Principio universal para todos los sistemas termodinamicos."
    en: "Universal principle for all thermodynamic systems."
  dimension_check: "principio cualitativo"
  calculable: false
  motivo_no_calculable: "Es un principio cualitativo, no una ecuacion numerica."
  used_in:
    - fundamento del ciclo invertido
    - justificacion de la necesidad de compresor
  interpretation_tags:
    - segunda ley
    - Clausius
    - flujo espontaneo
  result_semantics:
    target: Q_C
    kind: conceptual
    sign_meaning:
      es: "No aplica, es un principio direccional"
      en: "Not applicable, it is a directional principle"
    absolute_value_meaning:
      es: "No aplica"
      en: "Not applicable"
  domain_checks:
    - "Requiere T_H mayor que T_C para que exista flujo espontaneo"
  coherence_checks:
    - "Si se afirma flujo del frio al caliente sin trabajo, viola este principio"
  graph_implications:
    - "Establece que la curva W_min nunca toca cero para T_C menor que T_H"
  pedagogical_triggers:
    - "Alumno cree que se puede enfriar sin gastar energia"
    - "Alumno confunde posibilidad termodinamica con espontaneidad"
  interpretation_anchor:
    what_does_it_tell:
      es: "Que el refrigerador realiza algo no espontaneo y necesita trabajo."
      en: "That the refrigerator does something non-spontaneous and needs work."
    when_to_apply:
      es: "Como punto de partida conceptual."
      en: "As a conceptual starting point."
    what_changes:
      es: "Nada cambia la direccion espontanea."
      en: "Nothing changes the spontaneous direction."
    limit_cases:
      es: "Si T_H es igual a T_C, no hay flujo espontaneo."
      en: "If T_H equals T_C, there is no spontaneous flow."
