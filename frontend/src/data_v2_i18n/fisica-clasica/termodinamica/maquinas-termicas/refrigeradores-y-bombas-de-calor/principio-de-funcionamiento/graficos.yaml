version: "1.0"
leaf: "principio-de-funcionamiento"

coord:
  title:
    es: Gráfica Coord · Principio de funcionamiento
    en: Coord Graph · Operating Principle
  xAxis:
    es: temperatura foco frío T_C (K)
    en: cold reservoir temperature T_C (K)
  yAxis:
    es: trabajo mínimo W_min (J)
    en: minimum work W_min (J)
  xMagnitude: T_C
  yMagnitude: W
  relation:
    es: W_min = Q_C·(T_H−T_C)/T_C. Crece hiperbólicamente al disminuir T_C.
    en: W_min = Q_C·(T_H−T_C)/T_C. Grows hyperbolically as T_C decreases.
  physicalReading:
    es: "Curva roja: W_min de Carnot. Línea discontinua azul: Q_H = Q_C + W_min. Zona sombreada: trabajo necesario."
    en: "Red curve: Carnot W_min. Dashed blue line: Q_H = Q_C + W_min. Shaded area: required work."
  slopeMeaning:
    es: "dW_min/dT_C = −Q_C·T_H/T_C²: siempre negativo, W_min decrece al aumentar T_C."
    en: "dW_min/dT_C = −Q_C·T_H/T_C²: always negative, W_min decreases as T_C increases."
  interceptMeaning:
    es: "W_min(T_C→T_H) → 0: sin diferencia de temperatura no se necesita trabajo."
    en: "W_min(T_C→T_H) → 0: with no temperature difference no work is needed."
  curvatureMeaning:
    es: "Convexa: d²W_min/dT_C² > 0, W_min crece cada vez más rápido a bajas T_C."
    en: "Convex: d²W_min/dT_C² > 0, W_min grows faster at low T_C."
  signMeaning:
    es: "W_min > 0 siempre para T_H > T_C > 0."
    en: "W_min > 0 always for T_H > T_C > 0."
  areaMeaning:
    es: Área bajo la curva proporcional al trabajo acumulado al barrer T_C.
    en: Area under curve proportional to accumulated work when sweeping T_C.
  domainMeaning:
    es: 0 < T_C < T_H; W_min diverge en T_C → 0.
    en: 0 < T_C < T_H; W_min diverges at T_C → 0.
  modelConnection:
    es: Ciclo de Carnot invertido como referencia de eficiencia máxima.
    en: Reversed Carnot cycle as maximum efficiency reference.
  formulaConnection:
    es: W_min = Q_C·(T_H−T_C)/T_C, Q_H = Q_C + W, ΔS_total = Q_H/T_H − Q_C/T_C ≥ 0.
    en: W_min = Q_C·(T_H−T_C)/T_C, Q_H = Q_C + W, ΔS_total = Q_H/T_H − Q_C/T_C ≥ 0.
  readingFocus:
    es: leer W_min para un T_C dado, comparar con el trabajo real.
    en: read W_min for a given T_C, compare with real work.
  agentHints:
    es:
      - W_min crece hiperbólicamente.
      - T en kelvin obligatorio.
      - W_min es cota inferior.
    en:
      - W_min grows hyperbolically.
      - T in kelvin required.
      - W_min is lower bound.
  commonMistakes:
    es:
      - Usar T en Celsius.
      - Olvidar que W_min es solo para Carnot.
      - Confundir Q_C con Q_H.
    en:
      - Using T in Celsius.
      - Forgetting W_min is Carnot only.
      - Confusing Q_C with Q_H.
