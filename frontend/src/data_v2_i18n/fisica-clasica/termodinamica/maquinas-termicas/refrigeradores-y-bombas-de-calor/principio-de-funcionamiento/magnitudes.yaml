- id: Q_C
  symbol: "Q_C"
  nombre:
    es: Calor extraido del foco frio
    en: Heat extracted from cold reservoir
  descripcion:
    es: "Energia termica que el refrigerador extrae del espacio a enfriar en cada ciclo"
    en: "Thermal energy that the refrigerator extracts from the space to be cooled in each cycle"
  unidad_si: J
  dimension: "[M L^2 T^{-2}]"
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
    - balance energetico del ciclo invertido
    - calculo de COP de refrigeracion
    - dimensionado de capacidad frigorifica
  common_mistake: "Confundir Q_C con Q_H; asignar signo negativo al calor extraido"
  typical_range: "100 - 50000 J por ciclo"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo por convenio, calor extraido del foco frio"
      en: "Positive by convention, heat extracted from cold reservoir"
  zero_behavior:
    allowed: false
    meaning:
      es: "Q_C nulo indicaria que no se extrae calor, eliminando la funcion del refrigerador"
      en: "Zero Q_C would indicate no heat extraction, eliminating the refrigerator function"
  value_nature:
    kind: extensive
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - summary
      - physical_reading
    secondary_for:
      - coherence
  graph_binding:
    channels:
      - y_axis
  pedagogical_notes:
    es: "Q_C es el efecto util del refrigerador. Cuanto mayor sea Q_C con el mismo trabajo W, mayor es la eficiencia del ciclo."
    en: "Q_C is the useful effect of the refrigerator. The larger Q_C for the same work W, the higher the cycle efficiency."

- id: Q_H
  symbol: "Q_H"
  nombre:
    es: Calor cedido al foco caliente
    en: Heat delivered to hot reservoir
  descripcion:
    es: "Energia termica que el ciclo invertido entrega al foco caliente, suma del calor extraido y del trabajo aportado"
    en: "Thermal energy delivered to the hot reservoir by the reversed cycle, sum of extracted heat and input work"
  unidad_si: J
  dimension: "[M L^2 T^{-2}]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - balance energetico del ciclo invertido
    - calculo de COP de bomba de calor
    - verificacion de primera ley
  common_mistake: "Olvidar que Q_H incluye tanto Q_C como W; igualar Q_H con Q_C"
  typical_range: "200 - 60000 J por ciclo"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo por convenio, calor entregado al foco caliente"
      en: "Positive by convention, heat delivered to hot reservoir"
  zero_behavior:
    allowed: false
    meaning:
      es: "Q_H nulo es imposible si el compresor funciona, ya que al menos recibe W"
      en: "Zero Q_H is impossible if the compressor operates, since it at least receives W"
  value_nature:
    kind: extensive
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - physical_reading
      - coherence
    secondary_for:
      - summary
  graph_binding:
    channels:
      - y_axis
  pedagogical_notes:
    es: "Q_H siempre es mayor que Q_C porque incluye el trabajo del compresor. Esto no viola ninguna ley: la energia total se conserva."
    en: "Q_H is always greater than Q_C because it includes compressor work. This does not violate any law: total energy is conserved."

- id: W
  symbol: "W"
  nombre:
    es: Trabajo externo aportado
    en: External work input
  descripcion:
    es: "Trabajo mecanico o electrico que el compresor aporta al ciclo para mover calor del foco frio al caliente"
    en: "Mechanical or electrical work that the compressor provides to the cycle to move heat from cold to hot reservoir"
  unidad_si: J
  dimension: "[M L^2 T^{-2}]"
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
    - balance energetico del ciclo invertido
    - calculo de COP
    - determinacion de eficiencia
  common_mistake: "Confundir W con Q_H; olvidar que W es la entrada de energia que permite mover calor contra el gradiente termico"
  typical_range: "50 - 20000 J por ciclo"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Positivo, trabajo aportado al sistema"
      en: "Positive, work input to the system"
  zero_behavior:
    allowed: false
    meaning:
      es: "W nulo violaria la segunda ley: no se puede transferir calor del frio al caliente sin trabajo"
      en: "Zero W would violate the second law: heat cannot be transferred from cold to hot without work"
  value_nature:
    kind: extensive
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - summary
      - coherence
    secondary_for:
      - model_validity
  graph_binding:
    channels:
      - parameter
  pedagogical_notes:
    es: "W es la causa del funcionamiento del ciclo invertido. Sin trabajo externo, el calor solo fluye espontaneamente del caliente al frio."
    en: "W is the cause of the reversed cycle operation. Without external work, heat only flows spontaneously from hot to cold."

- id: T_C
  symbol: "T_C"
  nombre:
    es: Temperatura del foco frio
    en: Cold reservoir temperature
  descripcion:
    es: "Temperatura absoluta del espacio a refrigerar o del entorno frio en modo bomba de calor"
    en: "Absolute temperature of the space to be cooled or the cold environment in heat pump mode"
  unidad_si: K
  dimension: "[Theta]"
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
    - calculo de COP de Carnot
    - determinacion de condiciones de operacion
    - variable independiente del diagrama
  common_mistake: "Usar grados Celsius en lugar de kelvin en las formulas termodinamicas"
  typical_range: "233 - 293 K"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Siempre positivo en kelvin"
      en: "Always positive in kelvin"
  zero_behavior:
    allowed: false
    meaning:
      es: "T_C en cero absoluto es inalcanzable por la tercera ley"
      en: "T_C at absolute zero is unattainable by the third law"
  value_nature:
    kind: intensive
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - graph_reading
    secondary_for:
      - coherence
  graph_binding:
    channels:
      - x_axis
  pedagogical_notes:
    es: "T_C debe estar siempre en kelvin. Para convertir de Celsius, sumar 273.15."
    en: "T_C must always be in kelvin. To convert from Celsius, add 273.15."

- id: T_H
  symbol: "T_H"
  nombre:
    es: Temperatura del foco caliente
    en: Hot reservoir temperature
  descripcion:
    es: "Temperatura absoluta del ambiente exterior en refrigeracion o del espacio calentado en modo bomba de calor"
    en: "Absolute temperature of the outdoor environment in refrigeration or the heated space in heat pump mode"
  unidad_si: K
  dimension: "[Theta]"
  is_vector: false
  components: []
  category: fundamental
  physical_role: core_physical_quantity
  used_in:
    - calculo de COP de Carnot
    - determinacion de condiciones de operacion
    - parametro del diagrama
  common_mistake: "Usar grados Celsius; intercambiar T_H con T_C"
  typical_range: "293 - 338 K"
  sign_behavior:
    has_sign: false
    meaning:
      es: "Siempre positivo en kelvin"
      en: "Always positive in kelvin"
  zero_behavior:
    allowed: false
    meaning:
      es: "T_H en cero absoluto es imposible en aplicaciones de climatizacion"
      en: "T_H at absolute zero is impossible in HVAC applications"
  value_nature:
    kind: intensive
    nonnegative_only: true
    expected_interval: "(0, +inf)"
  interpretation_role:
    primary_for:
      - graph_reading
    secondary_for:
      - model_validity
  graph_binding:
    channels:
      - parameter
  pedagogical_notes:
    es: "T_H debe estar en kelvin. Es la temperatura donde se rechaza el calor en modo refrigeracion."
    en: "T_H must be in kelvin. It is the temperature where heat is rejected in refrigeration mode."

- id: Delta_S_total
  symbol: "\\Delta S_{total}"
  nombre:
    es: Variacion de entropia total
    en: Total entropy change
  descripcion:
    es: "Suma de las variaciones de entropia del foco frio y del foco caliente en un ciclo completo, debe ser no negativa por la segunda ley"
    en: "Sum of entropy changes of the cold and hot reservoirs over a complete cycle, must be non-negative by the second law"
  unidad_si: J/K
  dimension: "[M L^2 T^{-2} Theta^{-1}]"
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
    - verificacion de segunda ley
    - evaluacion de irreversibilidad
    - comparacion con ciclo de Carnot
  common_mistake: "Olvidar que el fluido de trabajo vuelve al estado inicial y su entropia no cambia en el ciclo completo"
  typical_range: "0 - 100 J/K por ciclo"
  sign_behavior:
    has_sign: true
    meaning:
      es: "Cero para ciclo reversible, positivo para ciclo real irreversible"
      en: "Zero for reversible cycle, positive for real irreversible cycle"
  zero_behavior:
    allowed: true
    meaning:
      es: "Delta_S_total nulo indica un ciclo completamente reversible (limite de Carnot)"
      en: "Zero Delta_S_total indicates a fully reversible cycle (Carnot limit)"
  value_nature:
    kind: extensive
    nonnegative_only: true
    expected_interval: "[0, +inf)"
  interpretation_role:
    primary_for:
      - model_validity
    secondary_for:
      - coherence
  graph_binding:
    channels: []
  pedagogical_notes:
    es: "La segunda ley exige Delta_S_total mayor o igual a cero. Si el calculo da negativo, hay un error en los datos o el ciclo es imposible."
    en: "The second law requires Delta_S_total greater than or equal to zero. If the calculation gives negative, there is an error in the data or the cycle is impossible."
