- id: rendimiento_termico
  title:
    es: Rendimiento térmico de una máquina
    en: Thermal efficiency of a heat engine
  equation: "eta = W_util / Q_H"
  latex: "\\eta = \\frac{W_{util}}{Q_H}"
  rearrangements:
    - target: eta
      equation: "eta = W_util / Q_H"
      latex: "\\eta = \\frac{W_{util}}{Q_H}"
    - target: W_util
      equation: "W_util = eta * Q_H"
      latex: "W_{util} = \\eta \\cdot Q_H"
    - target: Q_H
      equation: "Q_H = W_util / eta"
      latex: "Q_H = \\frac{W_{util}}{\\eta}"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Define el rendimiento como la fracción del calor absorbido del foco caliente que se transforma en trabajo mecánico útil; es la expresión operativa de la segunda ley para motores"
    en: "Defines efficiency as the fraction of heat absorbed from the hot reservoir that is converted into useful mechanical work; it is the operational expression of the second law for engines"
  constraints:
    - "Q_H > 0"
    - "0 < eta < 1"
    - "W_util > 0 para motor térmico"
  validity:
    es: "Válida para cualquier ciclo motor que absorba calor de un foco caliente y ceda calor a un foco frío"
    en: "Valid for any heat engine cycle that absorbs heat from a hot reservoir and rejects heat to a cold reservoir"
  dimension_check: "adimensional: [M L² T⁻²] / [M L² T⁻²] resulta [1]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - evaluación de motores de combustión interna
    - comparación de ciclos termodinámicos
    - diseño de centrales termoeléctricas
  interpretation_tags:
    - rendimiento real
    - definición operativa
    - segunda ley
  result_semantics:
    target: eta
    kind: ratio
    sign_meaning:
      es: "Siempre positivo; ninguna máquina real produce trabajo sin consumir calor"
      en: "Always positive; no real engine produces work without consuming heat"
    absolute_value_meaning:
      es: "Cercano a 1 indica máquina muy eficiente; cercano a 0 indica que casi todo el calor se desperdicia como calor residual"
      en: "Close to 1 indicates a highly efficient engine; close to 0 indicates that almost all heat is wasted as rejected heat"
  domain_checks:
    - "eta debe estar en el intervalo abierto (0, 1)"
    - "Q_H debe ser estrictamente positivo"
    - "W_util no puede superar Q_H"
  coherence_checks:
    - "Si eta supera 0.65 para un motor de combustión, verificar que las temperaturas de los focos sean coherentes con el límite de Carnot"
    - "Si W_util resulta mayor que Q_H, el balance energético está mal planteado"
  graph_implications:
    - "En el diagrama W_util vs Q_H, la pendiente de la recta desde el origen representa eta; una recta más inclinada indica mayor rendimiento"
  pedagogical_triggers:
    - "Alumno sustituye Q_C en lugar de W_util en el numerador"
    - "Alumno usa temperaturas en Celsius para calcular el límite de Carnot"

- id: balance_termico
  title:
    es: Balance energético del ciclo motor
    en: Energy balance of the engine cycle
  equation: "W_util = Q_H - Q_C"
  latex: "W_{util} = Q_H - Q_C"
  rearrangements:
    - target: W_util
      equation: "W_util = Q_H - Q_C"
      latex: "W_{util} = Q_H - Q_C"
    - target: Q_C
      equation: "Q_C = Q_H - W_util"
      latex: "Q_C = Q_H - W_{util}"
    - target: Q_H
      equation: "Q_H = W_util + Q_C"
      latex: "Q_H = W_{util} + Q_C"
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: "Aplica la primera ley de la termodinámica al ciclo completo: el trabajo neto es la diferencia entre el calor recibido del foco caliente y el calor cedido inevitablemente al foco frío"
    en: "Applies the first law of thermodynamics to the complete cycle: net work is the difference between heat received from the hot reservoir and heat inevitably rejected to the cold reservoir"
  constraints:
    - "Q_H > Q_C > 0"
    - "W_util > 0"
  validity:
    es: "Válida para cualquier ciclo cerrado que cumpla la primera ley; no depende de la reversibilidad del ciclo"
    en: "Valid for any closed cycle satisfying the first law; does not depend on cycle reversibility"
  dimension_check: "[M L² T⁻²] en ambos lados"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - cálculo del calor residual
    - verificación del balance energético
    - estimación de pérdidas térmicas
  interpretation_tags:
    - primera ley
    - conservación de energía
    - calor residual
  result_semantics:
    target: Q_C
    kind: extensive
    sign_meaning:
      es: "Positivo; representa calor que sale del sistema de trabajo hacia el ambiente o el foco frío"
      en: "Positive; represents heat leaving the working system toward the environment or cold reservoir"
    absolute_value_meaning:
      es: "Indica el calor que se desecha inevitablemente; su reducción requiere aumentar el rendimiento del ciclo"
      en: "Indicates the heat inevitably wasted; reducing it requires increasing the cycle efficiency"
  domain_checks:
    - "Q_C debe ser menor que Q_H"
    - "Q_C no puede ser negativo"
  coherence_checks:
    - "Si Q_C resulta mayor que Q_H, el balance está planteado con signos erróneos"
    - "Si W_util resulta negativo, el ciclo consume trabajo en lugar de producirlo"
  graph_implications:
    - "En el diagrama Q_H vs Q_C, la distancia vertical entre la recta de 45° y el punto real representa W_util"
  pedagogical_triggers:
    - "Alumno suma Q_H y Q_C en lugar de restarlos"
    - "Alumno confunde el calor cedido con una pérdida evitable de ingeniería"

- id: rendimiento_calores
  title:
    es: Rendimiento expresado con los calores
    en: Efficiency expressed with heat quantities
  equation: "eta = 1 - Q_C / Q_H"
  latex: "\\eta = 1 - \\frac{Q_C}{Q_H}"
  rearrangements:
    - target: eta
      equation: "eta = 1 - Q_C / Q_H"
      latex: "\\eta = 1 - \\frac{Q_C}{Q_H}"
    - target: Q_C
      equation: "Q_C = Q_H * (1 - eta)"
      latex: "Q_C = Q_H \\left(1 - \\eta\\right)"
    - target: eta_Carnot
      equation: "eta_Carnot = 1 - Q_C / Q_H"
      latex: "\\eta_{Carnot} = 1 - \\frac{Q_C}{Q_H}"
  category: derived
  relation_type: definition
  physical_meaning:
    es: "Reformulación del rendimiento en función de los dos intercambios térmicos; muestra de forma directa que aumentar eta equivale a reducir el cociente Q_C/Q_H, es decir, la fracción de calor que se desecha"
    en: "Reformulation of efficiency in terms of both heat exchanges; directly shows that increasing eta is equivalent to reducing the ratio Q_C/Q_H, that is, the fraction of heat that is wasted"
  constraints:
    - "Q_H > Q_C > 0"
    - "0 < eta < 1"
  validity:
    es: "Equivalente a la definición primaria siempre que se cumpla el balance de primera ley"
    en: "Equivalent to the primary definition whenever the first law balance holds"
  dimension_check: "adimensional: [J]/[J] resulta [1]"
  calculable: true
  motivo_no_calculable: null
  used_in:
    - comparación directa de ciclos por sus calores
    - derivación del rendimiento de Carnot
    - análisis de ciclos con datos de calorímetro
  interpretation_tags:
    - cociente calores
    - fracción residual
    - segundo forma del rendimiento
  result_semantics:
    target: eta_Carnot
    kind: ratio
    sign_meaning:
      es: "Positivo; mide la fracción del calor absorbido que se convierte efectivamente en trabajo"
      en: "Positive; measures the fraction of absorbed heat effectively converted to work"
    absolute_value_meaning:
      es: "Cuanto más cerca de 1, mayor es la fracción de calor aprovechado y menor la cedida al foco frío"
      en: "The closer to 1, the greater the fraction of heat exploited and the lower the fraction rejected to the cold reservoir"
  domain_checks:
    - "El cociente Q_C/Q_H debe estar entre 0 y 1"
    - "eta debe quedar entre 0 y 1"
  coherence_checks:
    - "Si Q_C/Q_H supera 1, los datos de calor están intercambiados o con signos erróneos"
    - "El resultado de esta fórmula debe coincidir con el de rendimiento_termico para los mismos datos"
  graph_implications:
    - "En el diagrama eta vs Q_C/Q_H, la curva es una recta decreciente de pendiente unidad; el punto de Carnot fija el mínimo cociente Q_C/Q_H alcanzable"
  pedagogical_triggers:
    - "Alumno escribe 1 - Q_H/Q_C en lugar de 1 - Q_C/Q_H invirtiendo el cociente"
    - "Alumno no reconoce que esta fórmula y la primaria son equivalentes"
