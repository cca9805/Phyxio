version: "1.0"
leaf: "rendimiento-y-eficiencia"

coord:
  title:
    es: Gráfica Coord · Rendimiento y eficiencia
    en: Coord Graph · Efficiency and Performance
  xAxis:
    es: calor absorbido Q_H (J)
    en: absorbed heat Q_H (J)
  yAxis:
    es: trabajo útil W (J)
    en: useful work W (J)
  xMagnitude: Q_H
  yMagnitude: W_util
  relation:
    es: W_util = η · Q_H. La recta real (pendiente η) siempre queda por debajo de la recta de Carnot (pendiente η_Carnot). Q_C = Q_H − W_util.
    en: W_util = η · Q_H. The real line (slope η) always lies below the Carnot line (slope η_Carnot). Q_C = Q_H − W_util.
  physicalReading:
    es: Pendiente = η. La distancia vertical entre la recta real y la de Carnot representa el trabajo destruido por irreversibilidades.
    en: Slope = η. The vertical gap between the real and Carnot lines represents work destroyed by irreversibilities.
  slopeMeaning:
    es: "dW/dQ_H = η: rendimiento térmico del ciclo."
    en: "dW/dQ_H = η: thermal efficiency of the cycle."
  interceptMeaning:
    es: "W(Q_H=0) = 0: sin calor absorbido no hay trabajo posible."
    en: "W(Q_H=0) = 0: without absorbed heat no work is possible."
  curvatureMeaning:
    es: "Recta: η constante por ciclo completo."
    en: "Straight: η constant throughout the complete cycle."
  signMeaning:
    es: "W_util > 0 siempre para η > 0."
    en: "W_util > 0 always for η > 0."
  areaMeaning:
    es: Sin interpretación directa de área en W(Q_H).
    en: No direct area interpretation in W(Q_H).
  domainMeaning:
    es: "Q_H > 0; 0 < η < η_Carnot < 1."
    en: "Q_H > 0; 0 < η < η_Carnot < 1."
  modelConnection:
    es: "Modelo de ciclo motor de dos focos: η = W_util/Q_H = 1 − Q_C/Q_H."
    en: "Two-reservoir engine cycle model: η = W_util/Q_H = 1 − Q_C/Q_H."
  formulaConnection:
    es: η = W_util/Q_H, Q_H = W_util + Q_C, η = 1 − Q_C/Q_H.
    en: η = W_util/Q_H, Q_H = W_util + Q_C, η = 1 − Q_C/Q_H.
  readingFocus:
    es: leer la pendiente como η, comparar con la recta de Carnot y verificar que η < η_Carnot para los focos dados.
    en: read the slope as η, compare with the Carnot line and verify η < η_Carnot for the given reservoirs.
  agentHints:
    es:
      - Pendiente = η.
      - η < η_Carnot siempre.
      - Q_C = Q_H − W_util.
    en:
      - Slope = η.
      - η < η_Carnot always.
      - Q_C = Q_H − W_util.
  commonMistakes:
    es:
      - Creer que η puede ser 1.
      - Usar T en Celsius para η_Carnot.
      - Confundir Q_H con W_util.
    en:
      - Believing η can equal 1.
      - Using T in Celsius for η_Carnot.
      - Confusing Q_H with W_util.
