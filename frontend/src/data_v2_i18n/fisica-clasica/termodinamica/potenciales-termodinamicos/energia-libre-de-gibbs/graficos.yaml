version: "1.0"
leaf: "energia-libre-de-gibbs"

coord:
  title:
    es: Gráfica Coord · Energía libre de Gibbs
    en: Coord Graph · Gibbs Free Energy
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: variación de energía libre ΔG (kJ/mol)
    en: free energy change ΔG (kJ/mol)
  xMagnitude: T
  yMagnitude: DeltaG
  relation:
    es: "ΔG = ΔH − T·ΔS. Recta lineal en T. Pendiente = −ΔS. Intercepto = ΔH. ΔG < 0: espontáneo. ΔG > 0: no espontáneo."
    en: "ΔG = ΔH − T·ΔS. Linear in T. Slope = −ΔS. Intercept = ΔH. ΔG < 0: spontaneous. ΔG > 0: non-spontaneous."
  physicalReading:
    es: "Cruce con eje T a T_inv = ΔH/ΔS. Verde: ΔG < 0 (espontáneo). Rojo: ΔG > 0 (no espontáneo)."
    en: "Crossing T-axis at T_inv = ΔH/ΔS. Green: ΔG < 0 (spontaneous). Red: ΔG > 0 (non-spontaneous)."
  slopeMeaning:
    es: "dΔG/dT = −ΔS: negativo si ΔS > 0 (espontaneidad crece con T)."
    en: "dΔG/dT = −ΔS: negative if ΔS > 0 (spontaneity grows with T)."
  interceptMeaning:
    es: "ΔG(T→0) = ΔH: domina el término entálpico a baja temperatura."
    en: "ΔG(T→0) = ΔH: enthalpic term dominates at low temperature."
  curvatureMeaning:
    es: "Recta: ΔH y ΔS constantes (modelo estándar)."
    en: "Straight line: constant ΔH and ΔS (standard model)."
  signMeaning:
    es: "ΔG < 0: espontáneo. ΔG = 0: equilibrio. ΔG > 0: no espontáneo."
    en: "ΔG < 0: spontaneous. ΔG = 0: equilibrium. ΔG > 0: non-spontaneous."
  areaMeaning:
    es: Sin interpretación directa de área.
    en: No direct area interpretation.
  domainMeaning:
    es: "T > 0 K. Válido si ΔH y ΔS constantes."
    en: "T > 0 K. Valid if ΔH and ΔS are constant."
  modelConnection:
    es: "Potencial de Gibbs: criterio de espontaneidad a P y T constantes."
    en: "Gibbs potential: spontaneity criterion at constant P and T."
  formulaConnection:
    es: ΔG = ΔH − T·ΔS, T_inv = ΔH/ΔS.
    en: ΔG = ΔH − T·ΔS, T_inv = ΔH/ΔS.
  readingFocus:
    es: leer el signo de ΔG a la temperatura del proceso y localizar T_inv donde la recta cruza el eje horizontal.
    en: read the sign of ΔG at the process temperature and locate T_inv where the line crosses the horizontal axis.
  agentHints:
    es:
      - "ΔG < 0: espontáneo."
      - T_inv = ΔH/ΔS.
      - Pendiente = −ΔS.
    en:
      - "ΔG < 0: spontaneous."
      - T_inv = ΔH/ΔS.
      - Slope = −ΔS.
  commonMistakes:
    es:
      - Confundir ΔH < 0 con ΔG < 0.
      - T en Celsius.
      - Mezclar J y kJ.
    en:
      - Confusing ΔH < 0 with ΔG < 0.
      - T in Celsius.
      - Mixing J and kJ.
