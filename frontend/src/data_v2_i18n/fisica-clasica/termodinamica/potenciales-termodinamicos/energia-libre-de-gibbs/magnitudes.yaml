magnitudes:

  - id: G
    symbol: "G"
    nombre:
      es: Energía libre de Gibbs
      en: Gibbs free energy
    descripcion:
      es: Potencial termodinámico definido como la entalpía menos el producto temperatura-entropía del sistema.
      en: Thermodynamic potential defined as enthalpy minus the temperature-entropy product of the system.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de G
      - criterio de espontaneidad
      - equilibrio quimico
    common_mistake: Confundir G con la energía total del sistema o con el calor intercambiado.
    typical_range: "−10⁶ J a +10⁶ J en procesos típicos de química y física de materiales"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El valor absoluto de G no tiene significado físico directo; solo sus diferencias importan."
        en: "The absolute value of G has no direct physical meaning; only differences matter."
    zero_behavior:
      allowed: true
      meaning:
        es: "El sistema está en equilibrio termodinámico cuando la variación de G es nula."
        en: "The system is at thermodynamic equilibrium when the variation of G is zero."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - espontaneidad del proceso
        - equilibrio termodinámico
      secondary_for:
        - trabajo útil máximo
    graph_binding:
      channels:
        - gibbs_vs_temperature
    pedagogical_notes:
      es: "G es función de estado; su variación a P y T constantes es el criterio universal de espontaneidad: procesos espontáneos tienen variación negativa de G."
      en: "G is a state function; its variation at constant P and T is the universal spontaneity criterion: spontaneous processes have negative variation of G."

  - id: DeltaG
    symbol: "\\Delta G"
    nombre:
      es: Variación de energía libre de Gibbs
      en: Change in Gibbs free energy
    descripcion:
      es: Diferencia de energía de Gibbs entre el estado final e inicial de un proceso a P y T constantes.
      en: Difference in Gibbs energy between the final and initial state of a process at constant P and T.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - criterio de espontaneidad
      - calculo de trabajo maximo util
      - equilibrio quimico
    common_mistake: Creer que un proceso exotérmico (variación de entalpía negativa) es siempre espontáneo sin considerar el término entrópico.
    typical_range: "−500 kJ/mol a +500 kJ/mol en reacciones químicas estándar"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Negativo indica proceso espontáneo; positivo indica proceso no espontáneo; cero indica equilibrio."
        en: "Negative indicates a spontaneous process; positive indicates a non-spontaneous process; zero indicates equilibrium."
    zero_behavior:
      allowed: true
      meaning:
        es: "El sistema alcanza el equilibrio cuando la variación de G se anula: ni avanza ni retrocede espontáneamente."
        en: "The system reaches equilibrium when the change in G is zero: it neither advances nor retreats spontaneously."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - espontaneidad del proceso
        - trabajo util maximo
        - equilibrio termodinámico
      secondary_for:
        - constante de equilibrio
    graph_binding:
      channels:
        - DeltaG_vs_temperature
    pedagogical_notes:
      es: "La variación de G combina en un solo número el efecto entálpico y el entrópico; a T alta puede dominar el término entrópico, invirtiendo la espontaneidad."
      en: "The change in G combines the enthalpic and entropic effects into one number; at high T the entropic term may dominate and reverse spontaneity."

  - id: DeltaH
    symbol: "\\Delta H"
    nombre:
      es: Variación de entalpía
      en: Enthalpy change
    descripcion:
      es: Calor intercambiado a presión constante; contribución energética al criterio de Gibbs.
      en: Heat exchanged at constant pressure; energetic contribution to the Gibbs criterion.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaG
      - calculo de trabajo quimico
    common_mistake: Identificar variación de entalpía negativa con espontaneidad total, ignorando la contribución entrópica.
    typical_range: "−800 kJ/mol a +800 kJ/mol en reacciones de combustión o síntesis"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Negativo indica proceso exotérmico; positivo indica proceso endotérmico."
        en: "Negative indicates an exothermic process; positive indicates an endothermic process."
    zero_behavior:
      allowed: true
      meaning:
        es: "Proceso sin intercambio de calor a presión constante; posible en expansiones isotérmicas de gas ideal."
        en: "Process with no heat exchange at constant pressure; possible in isothermal expansions of ideal gas."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calculo de DeltaG
        - balance energético
      secondary_for:
        - temperatura de inversión
    graph_binding:
      channels:
        - DeltaH_axis
    pedagogical_notes:
      es: "La entalpía en la expresión de Gibbs cuantifica el impulso energético del proceso; un proceso con variación de entalpía muy negativa tiende a la espontaneidad a temperatura baja."
      en: "Enthalpy in the Gibbs expression quantifies the energetic drive; a strongly negative enthalpy change promotes spontaneity at low temperatures."

  - id: T
    symbol: "T"
    nombre:
      es: Temperatura absoluta
      en: Absolute temperature
    descripcion:
      es: Temperatura termodinámica del sistema en kelvin; escala el término entrópico en la energía de Gibbs.
      en: Thermodynamic temperature of the system in kelvin; scales the entropy term in Gibbs energy.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaG
      - temperatura de inversion
      - temperatura de equilibrio
    common_mistake: Usar temperatura en grados Celsius en vez de kelvin al calcular la variación de Gibbs.
    typical_range: "200 K a 3000 K en procesos termodinámicos comunes"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La temperatura absoluta es siempre positiva; valores negativos en kelvin son físicamente imposibles."
        en: "Absolute temperature is always positive; negative values in kelvin are physically impossible."
    zero_behavior:
      allowed: false
      meaning:
        es: "El cero absoluto es un límite inalcanzable; en T nula el término entrópico desaparece pero la energía de Gibbs no está definida operativamente."
        en: "Absolute zero is an unreachable limit; at zero T the entropy term vanishes but Gibbs energy is not operationally defined."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, ∞)"
    interpretation_role:
      primary_for:
        - peso del termino entropico
        - temperatura de inversion
      secondary_for:
        - calculo de constante de equilibrio
    graph_binding:
      channels:
        - temperature_axis
    pedagogical_notes:
      es: "T actúa como amplificador del término entrópico; a temperaturas altas, los procesos que aumentan la entropía se vuelven espontáneos aunque sean endotérmicos."
      en: "T acts as an amplifier of the entropy term; at high temperatures, entropy-increasing processes become spontaneous even if endothermic."

  - id: DeltaS
    symbol: "\\Delta S"
    nombre:
      es: Variación de entropía
      en: Entropy change
    descripcion:
      es: Cambio en el grado de desorden o dispersión de la energía del sistema; contribución entrópica al criterio de Gibbs.
      en: Change in the degree of disorder or energy dispersal of the system; entropic contribution to the Gibbs criterion.
    unidad_si: "J/K"
    dimension: "[M L² T⁻² Θ⁻¹]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaG
      - temperatura de inversion
    common_mistake: Creer que la entropía siempre aumenta en el sistema cuando el proceso es espontáneo, sin considerar el entorno.
    typical_range: "−500 J/(mol·K) a +500 J/(mol·K)"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo indica aumento de desorden o dispersión; negativo indica mayor ordenación del sistema."
        en: "Positive indicates increased disorder or dispersal; negative indicates greater ordering of the system."
    zero_behavior:
      allowed: true
      meaning:
        es: "Sin variación de entropía el criterio de espontaneidad recae exclusivamente en la variación de entalpía."
        en: "With no entropy change, the spontaneity criterion relies exclusively on the enthalpy change."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calculo de DeltaG
        - temperatura de inversion
      secondary_for:
        - espontaneidad a alta temperatura
    graph_binding:
      channels:
        - DeltaS_axis
    pedagogical_notes:
      es: "El término TΔS en la ecuación de Gibbs actúa como obstáculo o catalizador de la espontaneidad dependiendo del signo de ΔS y de la temperatura; a T alta domina el término entrópico."
      en: "The TΔS term in the Gibbs equation acts as an obstacle or catalyst for spontaneity depending on the sign of ΔS and temperature; at high T the entropy term dominates."

  - id: T_inv
    symbol: "T_{inv}"
    nombre:
      es: Temperatura de inversión
      en: Inversion temperature
    descripcion:
      es: Temperatura a la que la variación de Gibbs cambia de signo; marca el umbral entre espontaneidad y no espontaneidad.
      en: Temperature at which the Gibbs change switches sign; marks the threshold between spontaneity and non-spontaneity.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - analisis de espontaneidad dependiente de temperatura
    common_mistake: Ignorar que la espontaneidad de ciertos procesos depende críticamente de superar o no la temperatura de inversión.
    typical_range: "100 K a 2000 K según el sistema"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La temperatura de inversión es siempre positiva; su valor separa dos regímenes de espontaneidad."
        en: "The inversion temperature is always positive; its value separates two spontaneity regimes."
    zero_behavior:
      allowed: false
      meaning:
        es: "Una temperatura de inversión nula no tiene significado físico en este contexto."
        en: "A zero inversion temperature has no physical meaning in this context."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, ∞)"
    interpretation_role:
      primary_for:
        - analisis de espontaneidad con temperatura variable
      secondary_for:
        - diseño de procesos industriales
    graph_binding:
      channels:
        - T_inv_marker
    pedagogical_notes:
      es: "La temperatura de inversión separa el dominio donde el impulso entálpico controla la espontaneidad del dominio donde lo hace el impulso entrópico."
      en: "The inversion temperature separates the domain where the enthalpic drive controls spontaneity from the domain where the entropic drive does."
