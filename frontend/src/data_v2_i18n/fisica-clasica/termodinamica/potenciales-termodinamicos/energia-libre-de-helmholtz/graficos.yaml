version: "1.0"
leaf: "energia-libre-de-helmholtz"

coord:
  title:
    es: Gráfica Coord · Energía libre de Helmholtz
    en: Coord Graph · Helmholtz Free Energy
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: variación de energía libre ΔA (kJ/mol)
    en: free energy change ΔA (kJ/mol)
  xMagnitude: T
  yMagnitude: DeltaA
  relation:
    es: "ΔA = ΔU − T·ΔS. Recta lineal en T. Pendiente = −ΔS. Intercepto = ΔU. ΔA < 0: espontáneo a V y T constantes."
    en: "ΔA = ΔU − T·ΔS. Linear in T. Slope = −ΔS. Intercept = ΔU. ΔA < 0: spontaneous at constant V and T."
  physicalReading:
    es: "Cruce con eje T a T_inv = ΔU/ΔS. Azul: ΔA < 0 (espontáneo). Rojo: ΔA > 0 (no espontáneo)."
    en: "Crossing T-axis at T_inv = ΔU/ΔS. Blue: ΔA < 0 (spontaneous). Red: ΔA > 0 (non-spontaneous)."
  slopeMeaning:
    es: "dΔA/dT = −ΔS: negativo si ΔS > 0 (espontaneidad crece con T)."
    en: "dΔA/dT = −ΔS: negative if ΔS > 0 (spontaneity grows with T)."
  interceptMeaning:
    es: "ΔA(T→0) = ΔU: domina el término de energía interna a baja temperatura."
    en: "ΔA(T→0) = ΔU: internal energy term dominates at low temperature."
  curvatureMeaning:
    es: "Recta: ΔU y ΔS constantes (modelo estándar a V constante)."
    en: "Straight line: constant ΔU and ΔS (standard model at constant V)."
  signMeaning:
    es: "ΔA < 0: espontáneo. ΔA = 0: equilibrio. ΔA > 0: no espontáneo."
    en: "ΔA < 0: spontaneous. ΔA = 0: equilibrium. ΔA > 0: non-spontaneous."
  areaMeaning:
    es: Sin interpretación directa de área.
    en: No direct area interpretation.
  domainMeaning:
    es: "T > 0 K. Válido si ΔU y ΔS constantes."
    en: "T > 0 K. Valid if ΔU and ΔS are constant."
  modelConnection:
    es: "Potencial de Helmholtz: criterio de espontaneidad a V y T constantes."
    en: "Helmholtz potential: spontaneity criterion at constant V and T."
  formulaConnection:
    es: ΔA = ΔU − T·ΔS, T_inv = ΔU/ΔS.
    en: ΔA = ΔU − T·ΔS, T_inv = ΔU/ΔS.
  readingFocus:
    es: leer el signo de ΔA a la temperatura del proceso y localizar T_inv donde la recta cruza el eje horizontal.
    en: read the sign of ΔA at the process temperature and locate T_inv where the line crosses the horizontal axis.
  agentHints:
    es:
      - "ΔA < 0: espontáneo a V cte."
      - T_inv = ΔU/ΔS.
      - Pendiente = −ΔS.
    en:
      - "ΔA < 0: spontaneous at const V."
      - T_inv = ΔU/ΔS.
      - Slope = −ΔS.
  commonMistakes:
    es:
      - Aplicar criterio de Gibbs (ΔG) en vez de Helmholtz (ΔA).
      - T en Celsius.
      - Mezclar J y kJ.
    en:
      - Applying Gibbs criterion (ΔG) instead of Helmholtz (ΔA).
      - T in Celsius.
      - Mixing J and kJ.
