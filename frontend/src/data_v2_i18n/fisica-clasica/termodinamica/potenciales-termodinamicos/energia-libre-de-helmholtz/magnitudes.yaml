magnitudes:

  - id: A
    symbol: "A"
    nombre:
      es: Energía libre de Helmholtz
      en: Helmholtz free energy
    descripcion:
      es: Potencial termodinámico definido como la energía interna menos el producto temperatura-entropía del sistema a volumen constante.
      en: Thermodynamic potential defined as internal energy minus the temperature-entropy product of the system at constant volume.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de A
      - criterio de espontaneidad
      - trabajo maximo no expansivo
    common_mistake: Confundir A con la energía total del sistema o con el calor intercambiado.
    typical_range: "−10⁶ J a +10⁶ J en procesos típicos de física y química"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El valor absoluto de A no tiene significado físico directo; solo sus diferencias importan."
        en: "The absolute value of A has no direct physical meaning; only differences matter."
    zero_behavior:
      allowed: true
      meaning:
        es: "El sistema está en equilibrio termodinámico cuando la variación de A es nula."
        en: "The system is at thermodynamic equilibrium when the variation of A is zero."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - espontaneidad del proceso
        - equilibrio termodinámico
      secondary_for:
        - trabajo util maximo no expansivo
    graph_binding:
      channels:
        - helmholtz_vs_temperature
    pedagogical_notes:
      es: "A es función de estado; su variación a V y T constantes es el criterio de espontaneidad en recipientes rígidos: procesos espontáneos tienen variación negativa de A."
      en: "A is a state function; its variation at constant V and T is the spontaneity criterion in rigid containers: spontaneous processes have negative variation of A."

  - id: DeltaA
    symbol: "\\Delta A"
    nombre:
      es: Variación de energía libre de Helmholtz
      en: Change in Helmholtz free energy
    descripcion:
      es: Diferencia de energía de Helmholtz entre el estado final e inicial de un proceso a V y T constantes.
      en: Difference in Helmholtz energy between the final and initial state of a process at constant V and T.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - criterio de espontaneidad
      - calculo de trabajo maximo util
      - equilibrio en sistemas cerrados rigidos
    common_mistake: Creer que un proceso con variación de energía interna negativa es siempre espontáneo sin considerar el término entrópico.
    typical_range: "−500 kJ/mol a +500 kJ/mol en reacciones y transformaciones de fase"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Negativo indica proceso espontáneo; positivo indica proceso no espontáneo; cero indica equilibrio."
        en: "Negative indicates a spontaneous process; positive indicates a non-spontaneous process; zero indicates equilibrium."
    zero_behavior:
      allowed: true
      meaning:
        es: "El sistema alcanza el equilibrio cuando la variación de A se anula: ni avanza ni retrocede espontáneamente."
        en: "The system reaches equilibrium when the change in A is zero: it neither advances nor retreats spontaneously."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - espontaneidad del proceso
        - trabajo util maximo no expansivo
        - equilibrio termodinámico
      secondary_for:
        - estabilidad de fases en recipientes rigidos
    graph_binding:
      channels:
        - DeltaA_vs_temperature
    pedagogical_notes:
      es: "La variación de A combina en un solo número el efecto energético y el entrópico; a T alta puede dominar el término entrópico, invirtiendo la espontaneidad."
      en: "The change in A combines the energetic and entropic effects into one number; at high T the entropic term may dominate and reverse spontaneity."

  - id: DeltaU
    symbol: "\\Delta U"
    nombre:
      es: Variación de energía interna
      en: Internal energy change
    descripcion:
      es: Cambio en la energía interna del sistema; contribución energética al criterio de Helmholtz a volumen constante.
      en: Change in the system's internal energy; energetic contribution to the Helmholtz criterion at constant volume.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaA
      - primer principio a volumen constante
    common_mistake: Identificar variación de energía interna negativa con espontaneidad total, ignorando la contribución entrópica.
    typical_range: "−800 kJ/mol a +800 kJ/mol en reacciones y cambios de fase"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Negativo indica que el sistema libera energía interna; positivo indica que la absorbe."
        en: "Negative indicates the system releases internal energy; positive that it absorbs it."
    zero_behavior:
      allowed: true
      meaning:
        es: "Proceso sin cambio neto de energía interna; posible en procesos isotérmicos de gas ideal sin trabajo."
        en: "Process with no net change in internal energy; possible in isothermal ideal gas processes without work."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calculo de DeltaA
        - balance energetico
      secondary_for:
        - temperatura de inversion
    graph_binding:
      channels:
        - DeltaU_axis
    pedagogical_notes:
      es: "La energía interna en la expresión de Helmholtz cuantifica el impulso energético del proceso; un proceso con variación de energía interna muy negativa tiende a la espontaneidad a temperatura baja."
      en: "Internal energy in the Helmholtz expression quantifies the energetic drive; a strongly negative internal energy change promotes spontaneity at low temperatures."

  - id: T
    symbol: "T"
    nombre:
      es: Temperatura absoluta
      en: Absolute temperature
    descripcion:
      es: Temperatura termodinámica del sistema en kelvin; escala el término entrópico en la energía de Helmholtz.
      en: Thermodynamic temperature of the system in kelvin; scales the entropy term in Helmholtz energy.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaA
      - temperatura de inversion
      - temperatura de equilibrio
    common_mistake: Usar temperatura en grados Celsius en vez de kelvin al calcular la variación de Helmholtz.
    typical_range: "200 K a 3000 K en procesos termodinámicos comunes"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La temperatura absoluta es siempre positiva; valores negativos en kelvin son físicamente imposibles."
        en: "Absolute temperature is always positive; negative values in kelvin are physically impossible."
    zero_behavior:
      allowed: false
      meaning:
        es: "El cero absoluto es un límite inalcanzable; en T nula el término entrópico desaparece pero la energía de Helmholtz no está definida operativamente."
        en: "Absolute zero is an unreachable limit; at zero T the entropy term vanishes but Helmholtz energy is not operationally defined."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, ∞)"
    interpretation_role:
      primary_for:
        - peso del termino entropico
        - temperatura de inversion
      secondary_for:
        - estabilidad de fases en recipientes rigidos
    graph_binding:
      channels:
        - temperature_axis
    pedagogical_notes:
      es: "T actúa como amplificador del término entrópico; a temperaturas altas, los procesos que aumentan la entropía se vuelven espontáneos aunque requieran energía interna."
      en: "T acts as an amplifier of the entropy term; at high temperatures, entropy-increasing processes become spontaneous even if they require internal energy."

  - id: DeltaS
    symbol: "\\Delta S"
    nombre:
      es: Variación de entropía
      en: Entropy change
    descripcion:
      es: Cambio en el grado de desorden o dispersión de la energía del sistema; contribución entrópica al criterio de Helmholtz.
      en: Change in the degree of disorder or energy dispersal of the system; entropic contribution to the Helmholtz criterion.
    unidad_si: "J/K"
    dimension: "[M L² T⁻² Θ⁻¹]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de DeltaA
      - temperatura de inversion
    common_mistake: Creer que la entropía siempre aumenta en el sistema cuando el proceso es espontáneo, sin considerar el entorno.
    typical_range: "−500 J/(mol·K) a +500 J/(mol·K)"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo indica aumento de desorden o dispersión; negativo indica mayor ordenación del sistema."
        en: "Positive indicates increased disorder or dispersal; negative indicates greater ordering of the system."
    zero_behavior:
      allowed: true
      meaning:
        es: "Sin variación de entropía el criterio de espontaneidad recae exclusivamente en la variación de energía interna."
        en: "With no entropy change, the spontaneity criterion relies exclusively on the internal energy change."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calculo de DeltaA
        - temperatura de inversion
      secondary_for:
        - espontaneidad a alta temperatura
    graph_binding:
      channels:
        - DeltaS_axis
    pedagogical_notes:
      es: "El término TΔS en la ecuación de Helmholtz actúa como obstáculo o catalizador de la espontaneidad dependiendo del signo de ΔS y de la temperatura; a T alta domina el término entrópico."
      en: "The TΔS term in the Helmholtz equation acts as an obstacle or catalyst for spontaneity depending on the sign of ΔS and temperature; at high T the entropy term dominates."

  - id: T_inv
    symbol: "T_{inv}"
    nombre:
      es: Temperatura de inversión
      en: Inversion temperature
    descripcion:
      es: Temperatura a la que la variación de Helmholtz cambia de signo; marca el umbral entre espontaneidad y no espontaneidad.
      en: Temperature at which the Helmholtz change switches sign; marks the threshold between spontaneity and non-spontaneity.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - analisis de espontaneidad dependiente de temperatura
    common_mistake: Ignorar que la espontaneidad de ciertos procesos depende críticamente de superar o no la temperatura de inversión.
    typical_range: "100 K a 2000 K según el sistema"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La temperatura de inversión es siempre positiva; su valor separa dos regímenes de espontaneidad."
        en: "The inversion temperature is always positive; its value separates two spontaneity regimes."
    zero_behavior:
      allowed: false
      meaning:
        es: "Una temperatura de inversión nula no tiene significado físico en este contexto."
        en: "A zero inversion temperature has no physical meaning in this context."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, ∞)"
    interpretation_role:
      primary_for:
        - analisis de espontaneidad con temperatura variable
      secondary_for:
        - diseño de procesos en recipientes rigidos
    graph_binding:
      channels:
        - T_inv_marker
    pedagogical_notes:
      es: "La temperatura de inversión separa el dominio donde el impulso energético controla la espontaneidad del dominio donde lo hace el impulso entrópico."
      en: "The inversion temperature separates the domain where the energetic drive controls spontaneity from the domain where the entropic drive does."
