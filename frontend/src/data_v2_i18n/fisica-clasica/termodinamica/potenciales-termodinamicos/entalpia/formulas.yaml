formulas:

  - id: definicion_entalpia
    title:
      es: Definición de entalpía
      en: Definition of enthalpy
    equation: "H = U + p * V"
    latex: "H = U + p V"
    rearrangements:
      - target: H
        equation: "H = U + p * V"
        latex: "H = U + p V"
      - target: U
        equation: "U = H - p * V"
        latex: "U = H - p V"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: "La entalpía encapsula la energía interna más el trabajo de empuje que el sistema ejerce sobre el entorno para ocupar su volumen a la presión dada."
      en: "Enthalpy encapsulates the internal energy plus the push-work the system exerts on the surroundings to occupy its volume at the given pressure."
    constraints:
      - sistema cerrado con presión y temperatura bien definidas
    validity:
      es: "Válida para cualquier sistema termodinámico en equilibrio. La interpretación como calor se restringe a procesos isobáricos."
      en: "Valid for any thermodynamic system in equilibrium. The interpretation as heat is restricted to isobaric processes."
    dimension_check: "[M L² T⁻²] = [M L² T⁻²] + [M L⁻¹ T⁻²][L³]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - calorimetria isobarica
      - ciclos termodinamicos
      - tablas de entalpias de formacion
    interpretation_tags:
      - definicion de funcion de estado
      - calor a presion constante
    result_semantics:
      target: H
      kind: state_function
      sign_meaning:
        es: "H es función de estado; su signo absoluto depende del estado de referencia elegido."
        en: "H is a state function; its absolute sign depends on the chosen reference state."
      absolute_value_meaning:
        es: "Solo las diferencias ΔH tienen sentido; H absoluta no es operativa sin referencia."
        en: "Only differences ΔH are meaningful; absolute H is not operational without a reference."
    domain_checks:
      - "V > 0"
      - "p > 0"
    coherence_checks:
      - "abs(H) < 1e10"
    graph_implications:
      es: "H aparece como intercepto en el eje vertical del gráfico ΔH vs T cuando se aplica la ley de Kirchhoff."
      en: "H appears as the vertical intercept in the ΔH vs T graph when Kirchhoff's law is applied."
    pedagogical_triggers:
      - "Alumno confunde H con el calor en cualquier proceso, no solo en el isobárico."

  - id: calor_isobarico
    title:
      es: Calor a presión constante igual a ΔH
      en: Heat at constant pressure equals ΔH
    equation: "Qp = DeltaH"
    latex: "Q_p = \\Delta H"
    rearrangements:
      - target: Qp
        equation: "Qp = DeltaH"
        latex: "Q_p = \\Delta H"
      - target: DeltaH
        equation: "DeltaH = Qp"
        latex: "\\Delta H = Q_p"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: "A presión constante, el calor intercambiado por el sistema es exactamente igual a la variación de entalpía, independientemente de la trayectoria."
      en: "At constant pressure, the heat exchanged by the system is exactly equal to the enthalpy change, regardless of the path."
    constraints:
      - proceso isobárico (p constante)
      - sistema cerrado
      - sin trabajo distinto al de expansión
    validity:
      es: "Válida solo cuando la presión es constante durante todo el proceso. En procesos a volumen constante, el calor equivale a ΔU, no a ΔH."
      en: "Valid only when pressure is constant throughout the process. In constant-volume processes, heat equals ΔU, not ΔH."
    dimension_check: "[M L² T⁻²] = [M L² T⁻²]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - calorimetria con recipiente abierto
      - reacciones quimicas en laboratorio
    interpretation_tags:
      - calor de reaccion
      - proceso isobarico
    result_semantics:
      target: DeltaH
      kind: heat_at_constant_pressure
      sign_meaning:
        es: "ΔH negativa indica proceso exotérmico; ΔH positiva indica proceso endotérmico."
        en: "Negative ΔH indicates exothermic process; positive ΔH indicates endothermic process."
      absolute_value_meaning:
        es: "El módulo de ΔH cuantifica la energía térmica intercambiada en el proceso isobárico."
        en: "The magnitude of ΔH quantifies the thermal energy exchanged in the isobaric process."
    domain_checks:
      - "true"
    coherence_checks:
      - "abs(DeltaH) < 1e8"
    graph_implications:
      es: "ΔH es el valor del eje vertical en el punto de referencia del gráfico ΔH vs T; su signo determina si la curva comienza sobre o bajo el eje horizontal."
      en: "ΔH is the vertical axis value at the reference point of the ΔH vs T graph; its sign determines whether the curve starts above or below the horizontal axis."
    pedagogical_triggers:
      - "Alumno aplica Qp = ΔH en un proceso a volumen constante (bomba calorimétrica)."

  - id: ley_hess
    title:
      es: Ley de Hess
      en: Hess's law
    equation: "DeltaH = DeltaH1 + DeltaH2"
    latex: "\\Delta H = \\Delta H_1 + \\Delta H_2"
    rearrangements:
      - target: DeltaH
        equation: "DeltaH = DeltaH1 + DeltaH2"
        latex: "\\Delta H = \\Delta H_1 + \\Delta H_2"
    category: derived
    relation_type: definition
    physical_meaning:
      es: "La entalpía es función de estado: la variación total es la suma algebraica de las variaciones de entalpía de las etapas intermedias, independientemente de la trayectoria real."
      en: "Enthalpy is a state function: the total change is the algebraic sum of the enthalpy changes of intermediate steps, regardless of the actual path."
    constraints:
      - todas las etapas deben estar a presión constante
      - los estados inicial y final son los mismos en cualquier ruta
    validity:
      es: "Válida para cualquier transformación que pueda describirse como secuencia de etapas isobáricas. Es consecuencia directa de que H es función de estado."
      en: "Valid for any transformation describable as a sequence of isobaric steps. It is a direct consequence of H being a state function."
    dimension_check: "[M L² T⁻²] = [M L² T⁻²] + [M L² T⁻²]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - ciclos de Hess
      - calculo de entalpias de formacion
      - reacciones con datos indirectos
    interpretation_tags:
      - aditividad de entalpia
      - funcion de estado
    result_semantics:
      target: DeltaH
      kind: additive_state_function
      sign_meaning:
        es: "El signo de ΔH resultante determina si el proceso global es exotérmico o endotérmico."
        en: "The sign of the resulting ΔH determines whether the overall process is exothermic or endothermic."
      absolute_value_meaning:
        es: "El módulo de ΔH es el calor total intercambiado en el proceso global a presión constante."
        en: "The magnitude of ΔH is the total heat exchanged in the overall process at constant pressure."
    domain_checks:
      - "true"
    coherence_checks:
      - "abs(DeltaH) < 1e9"
    graph_implications:
      es: "La aditividad de Hess aparece como suma de segmentos verticales en un diagrama de entalpía de formación."
      en: "Hess additivity appears as a sum of vertical segments in an enthalpy of formation diagram."
    pedagogical_triggers:
      - "Alumno invierte el signo al invertir una reacción en el ciclo de Hess."
      - "Alumno multiplica ΔH sin multiplicar los coeficientes estequiométricos."
