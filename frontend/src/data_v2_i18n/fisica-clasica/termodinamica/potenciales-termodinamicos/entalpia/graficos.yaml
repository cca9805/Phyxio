version: "1.0"
leaf: "entalpia"

coord:
  title:
    es: Gráfica Coord · Entalpía
    en: Coord Graph · Enthalpy
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: variación de entalpía ΔH (kJ/mol)
    en: enthalpy change ΔH (kJ/mol)
  xMagnitude: T
  yMagnitude: DeltaH
  relation:
    es: "ΔH ≈ cte a T de referencia. Ley de Kirchhoff: ΔH varía con T según la diferencia de capacidades caloríficas. ΔH < 0: exotérmico. ΔH > 0: endotérmico."
    en: "ΔH ≈ constant at reference T. Kirchhoff's law: ΔH varies with T according to heat capacity difference. ΔH < 0: exothermic. ΔH > 0: endothermic."
  physicalReading:
    es: "ΔH < 0: proceso exotérmico, libera calor. ΔH > 0: proceso endotérmico, absorbe calor. Verde: exotérmico. Rojo: endotérmico."
    en: "ΔH < 0: exothermic process, releases heat. ΔH > 0: endothermic process, absorbs heat. Green: exothermic. Red: endothermic."
  slopeMeaning:
    es: "dΔH/dT = ΔCp: diferencia de capacidades caloríficas entre productos y reactivos."
    en: "dΔH/dT = ΔCp: difference in heat capacities between products and reactants."
  interceptMeaning:
    es: "ΔH en T de referencia: valor estándar tabulado."
    en: "ΔH at reference T: tabulated standard value."
  curvatureMeaning:
    es: Recta si ΔCp constante (modelo estándar). Curva si ΔCp depende de T.
    en: Straight line if constant ΔCp (standard model). Curved if ΔCp depends on T.
  signMeaning:
    es: "ΔH < 0: exotérmico. ΔH > 0: endotérmico. ΔH nula: proceso entálpicamente neutro."
    en: "ΔH < 0: exothermic. ΔH > 0: endothermic. Zero ΔH: enthalpically neutral process."
  areaMeaning:
    es: Sin interpretación directa de área.
    en: No direct area interpretation.
  domainMeaning:
    es: "T > 0 K. Modelo estándar válido hasta 100 K de variación respecto a la referencia."
    en: "T > 0 K. Standard model valid up to 100 K variation from reference."
  modelConnection:
    es: "Ley de Hess y ley de Kirchhoff: aditividad de ΔH y dependencia con T."
    en: "Hess's law and Kirchhoff's law: additivity of ΔH and temperature dependence."
  formulaConnection:
    es: ΔH = ΔH_ref + ΔCp·(T - T_ref).
    en: ΔH = ΔH_ref + ΔCp·(T - T_ref).
  readingFocus:
    es: leer el signo de ΔH a la temperatura del proceso y verificar si la pendiente (ΔCp) modifica significativamente el resultado respecto al valor de referencia.
    en: read the sign of ΔH at the process temperature and verify whether the slope (ΔCp) significantly modifies the result from the reference value.
  agentHints:
    es:
      - "ΔH < 0: exotérmico."
      - Pendiente = ΔCp.
      - "Ley de Hess: suma algébraica."
    en:
      - "ΔH < 0: exothermic."
      - Slope = ΔCp.
      - "Hess's law: algebraic sum."
  commonMistakes:
    es:
      - Aplicar ΔH = Qp en volumen constante.
      - Mezclar J y kJ.
      - Olvidar invertir signo en Hess.
    en:
      - Applying ΔH = Qp at constant volume.
      - Mixing J and kJ.
      - Forgetting to invert sign in Hess.
