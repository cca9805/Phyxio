magnitudes:

  - id: H
    symbol: "H"
    nombre:
      es: Entalpía
      en: Enthalpy
    descripcion:
      es: Potencial termodinámico definido como la suma de la energía interna y el producto presión-volumen del sistema.
      en: Thermodynamic potential defined as the sum of internal energy and the pressure-volume product of the system.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - definicion de H
      - calor a presion constante
      - ciclos termodinamicos
    common_mistake: Confundir H con la energía total del sistema o con el calor en cualquier proceso, no solo en los isobáricos.
    typical_range: "-10⁷ J a +10⁷ J en reacciones químicas y procesos industriales típicos"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El valor absoluto de H no tiene significado físico directo; solo sus diferencias ΔH importan."
        en: "The absolute value of H has no direct physical meaning; only differences ΔH matter."
    zero_behavior:
      allowed: true
      meaning:
        es: "H nula es solo un estado de referencia convencional; no implica ausencia de energía interna."
        en: "Zero H is only a conventional reference state; it does not imply absence of internal energy."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calor intercambiado en procesos isobáricos
        - espontaneidad en reacciones a presión constante
      secondary_for:
        - comparación de potenciales termodinámicos
    graph_binding:
      channels:
        - y_axis
    pedagogical_notes:
      es: "H es la función de estado clave para procesos a presión constante; la intuición es que auna el cambio de energía interna y el trabajo de expansión en una sola magnitud."
      en: "H is the key state function for constant-pressure processes; the intuition is that it merges the change in internal energy and expansion work into a single quantity."

  - id: DeltaH
    symbol: "\\Delta H"
    nombre:
      es: Variación de entalpía
      en: Enthalpy change
    descripcion:
      es: Cambio de entalpía entre estado final e inicial; igual al calor intercambiado a presión constante.
      en: Change in enthalpy between final and initial states; equal to the heat exchanged at constant pressure.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - criterio de espontaneidad
      - calor de reaccion
      - calorimetria isobarica
    common_mistake: "Calcular ΔH usando ΔU sin añadir el término Δ(pV); en gases ideales a temperatura constante esto da el mismo resultado pero en general son diferentes."
    typical_range: "-500 kJ/mol a +500 kJ/mol en reacciones químicas; ±MJ en combustiones industriales"
    sign_behavior:
      has_sign: true
      meaning:
        es: "ΔH negativa indica proceso exotérmico (cede calor al entorno). ΔH positiva indica proceso endotérmico (absorbe calor del entorno)."
        en: "Negative ΔH indicates an exothermic process (releases heat to surroundings). Positive ΔH indicates an endothermic process (absorbs heat from surroundings)."
    zero_behavior:
      allowed: true
      meaning:
        es: "ΔH nula implica que el calor intercambiado a presión constante es cero; el proceso es neutro desde el punto de vista entálpico."
        en: "Zero ΔH means no heat is exchanged at constant pressure; the process is enthalpically neutral."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - lectura del calor de reaccion
        - clasificacion exotermico/endotermico
      secondary_for:
        - calculo de energia libre de Gibbs
    graph_binding:
      channels:
        - y_intercept
        - slope_reference
    pedagogical_notes:
      es: "ΔH es la magnitud central de la calorimetría isobárica. Un alumno que domine su signo y unidades puede interpretar directamente cualquier tabla de datos termodinámicos estándar."
      en: "ΔH is the central quantity of isobaric calorimetry. A student who masters its sign and units can directly interpret any standard thermodynamic data table."

  - id: U
    symbol: "U"
    nombre:
      es: Energía interna
      en: Internal energy
    descripcion:
      es: Energía total almacenada en el sistema por movimiento y configuración de sus partículas.
      en: Total energy stored in the system through the motion and configuration of its particles.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion de H
      - primer principio de la termodinamica
    common_mistake: Confundir la energía interna con el calor; el calor es transferencia de energía, no una propiedad almacenada.
    typical_range: "-10⁶ J a +10⁶ J según el sistema de referencia elegido"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Solo ΔU tiene sentido físico directo; U absoluta depende del estado de referencia."
        en: "Only ΔU has direct physical meaning; absolute U depends on the reference state."
    zero_behavior:
      allowed: true
      meaning:
        es: "U nula es el estado de referencia convencional; no implica ausencia de movimiento molecular."
        en: "Zero U is the conventional reference state; it does not imply absence of molecular motion."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - definicion de entalpia
        - primer principio
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "U aparece en la definición de H como componente energética pura; su variación ΔU difiere de ΔH en el término de trabajo de expansión pΔV."
      en: "U appears in the definition of H as the pure energetic component; its change ΔU differs from ΔH by the expansion work term pΔV."

  - id: p
    symbol: "p"
    nombre:
      es: Presión
      en: Pressure
    descripcion:
      es: Fuerza por unidad de área ejercida por el fluido sobre las paredes del sistema.
      en: Force per unit area exerted by the fluid on the system boundaries.
    unidad_si: Pa
    dimension: "[M L⁻¹ T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion de H
      - trabajo de expansion
      - procesos isobaricos
    common_mistake: Olvidar que p debe estar en Pa al calcular pV en julios cuando V está en m³.
    typical_range: "10⁴ Pa a 10⁷ Pa en aplicaciones industriales; 101 325 Pa a presión estándar"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La presión absoluta es siempre positiva; presiones negativas no tienen sentido físico en este contexto."
        en: "Absolute pressure is always positive; negative pressures are physically meaningless in this context."
    zero_behavior:
      allowed: false
      meaning:
        es: "p nula corresponde al vacío perfecto; en ese límite la entalpía coincide con la energía interna."
        en: "Zero p corresponds to perfect vacuum; in that limit enthalpy coincides with internal energy."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "[0, +inf)"
    interpretation_role:
      primary_for:
        - condicion de proceso isobarico
        - calculo de trabajo de expansion
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "p aparece en la definición de H para contabilizar el trabajo de expansión; a p constante el término pΔV representa el trabajo mecánico intercambiado con el entorno."
      en: "p appears in the definition of H to account for expansion work; at constant p the term pΔV represents the mechanical work exchanged with the surroundings."

  - id: V
    symbol: "V"
    nombre:
      es: Volumen
      en: Volume
    descripcion:
      es: Espacio tridimensional ocupado por el sistema termodinámico.
      en: Three-dimensional space occupied by the thermodynamic system.
    unidad_si: "m³"
    dimension: "[L³]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion de H
      - trabajo de expansion
      - ecuacion de estado
    common_mistake: Usar litros en lugar de metros cúbicos al calcular pV en julios, produciendo un factor 1000 de error.
    typical_range: "10⁻³ m³ (1 litro) a 10³ m³ en reactores industriales"
    sign_behavior:
      has_sign: false
      meaning:
        es: "El volumen es siempre positivo; ΔV puede ser negativo si el sistema se comprime."
        en: "Volume is always positive; ΔV can be negative if the system is compressed."
    zero_behavior:
      allowed: false
      meaning:
        es: "V nulo es imposible físicamente para sistemas macroscópicos."
        en: "Zero V is physically impossible for macroscopic systems."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +inf)"
    interpretation_role:
      primary_for:
        - calculo de trabajo de expansion
        - definicion de entalpia
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "V es el parámetro extensivo que, junto con p, define el trabajo de expansión pΔV; su variación positiva implica que el sistema cedió trabajo al entorno."
      en: "V is the extensive parameter that, together with p, defines expansion work pΔV; a positive change means the system did work on the surroundings."

  - id: Qp
    symbol: "Q_p"
    nombre:
      es: Calor a presión constante
      en: Heat at constant pressure
    descripcion:
      es: Calor intercambiado en un proceso isobárico; numéricamente igual a la variación de entalpía.
      en: Heat exchanged in an isobaric process; numerically equal to the enthalpy change.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: core_physical_quantity
    used_in:
      - calorimetria isobarica
      - reacciones quimicas en recipiente abierto
    common_mistake: "Usar Qp como si fuera el calor en cualquier proceso; solo es igual a ΔH cuando la presión es constante."
    typical_range: "-800 kJ/mol a +500 kJ/mol en reacciones de combustión y disolución"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Qp negativo: el sistema cede calor (proceso exotérmico). Qp positivo: el sistema absorbe calor (proceso endotérmico)."
        en: "Negative Qp: system releases heat (exothermic). Positive Qp: system absorbs heat (endothermic)."
    zero_behavior:
      allowed: true
      meaning:
        es: "Qp nulo indica que no hay intercambio de calor; el proceso isobárico es adiabático."
        en: "Zero Qp indicates no heat exchange; the isobaric process is adiabatic."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - medicion calorimetrica isobarica
        - interpretacion termica de reacciones
      secondary_for: []
    graph_binding:
      channels:
        - y_axis
    pedagogical_notes:
      es: "Qp es la magnitud operacional de la calorimetría con bomba abierta; su identificación con ΔH es el resultado central de la termodinámica de procesos isobáricos."
      en: "Qp is the operational quantity in open-vessel calorimetry; its identification with ΔH is the central result of isobaric thermodynamics."

  - id: T
    symbol: "T"
    nombre:
      es: Temperatura absoluta
      en: Absolute temperature
    descripcion:
      es: Temperatura expresada en la escala Kelvin; parámetro intensivo del estado termodinámico.
      en: Temperature expressed in the Kelvin scale; intensive parameter of the thermodynamic state.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - ley de Kirchhoff
      - dependencia de DeltaH con T
    common_mistake: Usar grados Celsius en lugar de kelvin al aplicar la ley de Kirchhoff o al calcular capacidades caloríficas.
    typical_range: "200 K a 3000 K en procesos termodinámicos de laboratorio e industria"
    sign_behavior:
      has_sign: false
      meaning:
        es: "T en kelvin es siempre positiva; temperaturas negativas son imposibles en la escala absoluta."
        en: "T in kelvin is always positive; negative temperatures are impossible on the absolute scale."
    zero_behavior:
      allowed: false
      meaning:
        es: "T nula corresponde al cero absoluto, inalcanzable según el tercer principio de la termodinámica."
        en: "Zero T corresponds to absolute zero, unattainable according to the third law of thermodynamics."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +inf)"
    interpretation_role:
      primary_for:
        - ley de Kirchhoff
        - dependencia de entalpia con temperatura
      secondary_for: []
    graph_binding:
      channels:
        - x_axis
    pedagogical_notes:
      es: "T aparece en la ley de Kirchhoff como variable de integración; olvidar convertir de Celsius a Kelvin produce errores sistemáticos en el cálculo de ΔH a distintas temperaturas."
      en: "T appears in Kirchhoff's law as the integration variable; forgetting to convert from Celsius to Kelvin produces systematic errors when computing ΔH at different temperatures."
