version: "1.0"
leaf: "potencial-quimico"

coord:
  title:
    es: Gráfica Coord · Potencial químico
    en: Coord Graph · Chemical Potential
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: potencial químico µ (kJ/mol)
    en: chemical potential µ (kJ/mol)
  xMagnitude: T
  yMagnitude: mu
  relation:
    es: "µ = µ° + RT·ln(a). Recta lineal en T. Pendiente = R·ln(a). Intercepto = µ°. Si a < 1 la pendiente es negativa; si a > 1 es positiva."
    en: "µ = µ° + RT·ln(a). Linear in T. Slope = R·ln(a). Intercept = µ°. Negative slope if a < 1; positive if a > 1."
  physicalReading:
    es: La fase estable a cada T es la de menor µ. Los cruces de curvas de distintas fases marcan las temperaturas de transición de fase.
    en: The stable phase at each T is the one with lower µ. Crossings of curves for different phases mark the phase transition temperatures.
  slopeMeaning:
    es: "dµ/dT = R·ln(a): negativo para a < 1 (solución diluida); positivo para a > 1 (actividad supraunitaria)."
    en: "dµ/dT = R·ln(a): negative for a < 1 (dilute solution); positive for a > 1 (above-unity activity)."
  interceptMeaning:
    es: "µ(T→0) = µ°: el potencial estándar domina a baja temperatura."
    en: "µ(T→0) = µ°: standard potential dominates at low temperature."
  curvatureMeaning:
    es: Recta si a constante. Curva si a depende de T (coeficiente de actividad variable).
    en: Straight line if a is constant. Curved if a depends on T (variable activity coefficient).
  signMeaning:
    es: Solo la diferencia de µ entre fases tiene significado físico directo. La materia fluye de mayor a menor µ.
    en: Only the µ difference between phases has direct physical meaning. Matter flows from higher to lower µ.
  areaMeaning:
    es: Sin interpretación directa de área.
    en: No direct area interpretation.
  domainMeaning:
    es: "T > 0 K y a > 0. Válido para mezclas ideales; corregir con coeficiente de actividad en sistemas no ideales."
    en: "T > 0 K and a > 0. Valid for ideal mixtures; correct with activity coefficient for non-ideal systems."
  modelConnection:
    es: Definición de µ como derivada parcial de G. Ley de Raoult, ley de Henry y regla de fases de Gibbs.
    en: "Definition of µ as partial derivative of G. Raoult's law, Henry's law and Gibbs phase rule."
  formulaConnection:
    es: "µ = µ° + RT·ln(a). Equilibrio: µ_α = µ_β."
    en: "µ = µ° + RT·ln(a). Equilibrium: µ_α = µ_β."
  readingFocus:
    es: comparar µ del componente en distintas fases a la misma T y verificar si son iguales (equilibrio) o si hay diferencia que impulsa la transferencia de materia.
    en: compare µ of the component in different phases at the same T and verify whether they are equal (equilibrium) or whether a difference drives matter transfer.
  agentHints:
    es:
      - "µ mayor: el componente tiende a abandonar esa fase."
      - Pendiente = R·ln(a).
      - "Equilibrio: igualdad de µ en todas las fases."
    en:
      - "Higher µ: component tends to leave that phase."
      - Slope = R·ln(a).
      - "Equilibrium: equal µ in all phases."
  commonMistakes:
    es:
      - Usar T en Celsius en el término RT.
      - Confundir equilibrio con igual concentración.
      - Omitir el término logarítmico.
    en:
      - Using T in Celsius in the RT term.
      - Confusing equilibrium with equal concentration.
      - Omitting the logarithmic term.
