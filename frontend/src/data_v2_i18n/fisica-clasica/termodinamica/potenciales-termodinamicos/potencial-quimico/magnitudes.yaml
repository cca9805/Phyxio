magnitudes:

  - id: mu
    symbol: "\\mu"
    nombre:
      es: Potencial químico
      en: Chemical potential
    descripcion:
      es: Derivada parcial de la energía de Gibbs respecto al número de moles del componente a T y p constantes. Mide la energía libre por mol añadido al sistema.
      en: Partial derivative of Gibbs free energy with respect to the number of moles of the component at constant T and p. Measures the free energy per mole added to the system.
    unidad_si: "J/mol"
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: core_physical_quantity
    used_in:
      - criterio de equilibrio de fases
      - criterio de equilibrio quimico
      - variacion de G con composicion
    common_mistake: "Confundir µ con la entalpía molar o con la energía interna molar; µ es específicamente la variación de energía de Gibbs con la composición, no con la temperatura."
    typical_range: "-100 kJ/mol a +100 kJ/mol en soluciones y mezclas de gases ideales a condiciones estándar"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo absoluto de µ depende del estado de referencia. Lo físicamente relevante es la diferencia Δµ entre fases o componentes: si Δµ > 0 el componente fluye espontáneamente hacia la fase de menor µ."
        en: "The absolute sign of µ depends on the reference state. Physically relevant is the difference Δµ between phases or components: if Δµ > 0 the component flows spontaneously toward the phase of lower µ."
    zero_behavior:
      allowed: true
      meaning:
        es: "µ nulo es solo un estado de referencia convencional (gas ideal a presión estándar). No implica ausencia de energía libre."
        en: "Zero µ is only a conventional reference state (ideal gas at standard pressure). It does not imply absence of free energy."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - criterio de equilibrio entre fases
        - criterio de equilibrio quimico (igualdad de µ en reactivos y productos ponderados)
      secondary_for:
        - calculo de energia libre de Gibbs de mezclas
    graph_binding:
      channels:
        - y_axis
    pedagogical_notes:
      es: "µ es el análogo termodinámico del potencial eléctrico: así como las cargas fluyen de mayor a menor potencial eléctrico, los componentes fluyen de mayor a menor µ. Esta analogía es la clave intuitiva más potente para entender el equilibrio de fases."
      en: "µ is the thermodynamic analogue of electric potential: just as charges flow from higher to lower electric potential, components flow from higher to lower µ. This analogy is the most powerful intuitive key for understanding phase equilibrium."

  - id: mu_std
    symbol: "\\mu^\\circ"
    nombre:
      es: Potencial químico estándar
      en: Standard chemical potential
    descripcion:
      es: Valor del potencial químico del componente puro en su estado estándar de referencia (gas ideal a 1 bar, o sólido/líquido puro a 1 bar y temperatura dada).
      en: Value of the chemical potential of the pure component in its standard reference state (ideal gas at 1 bar, or pure solid/liquid at 1 bar and given temperature).
    unidad_si: "J/mol"
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - expresion de mu en funcion de actividad
      - calculo de la constante de equilibrio
    common_mistake: "Confundir µ° con la entalpía de formación estándar; µ° incluye tanto la contribución entálpica como la entrópica."
    typical_range: "-500 kJ/mol a +100 kJ/mol para compuestos orgánicos e inorgánicos comunes"
    sign_behavior:
      has_sign: true
      meaning:
        es: "µ° negativo indica que el estado puro estándar es más estable que el estado de referencia arbitrario de los elementos (que por convención tiene µ° = 0)."
        en: "Negative µ° indicates the pure standard state is more stable than the arbitrary elements reference state (which by convention has µ° = 0)."
    zero_behavior:
      allowed: true
      meaning:
        es: "µ° nulo por definición para los elementos en su estado estándar de referencia."
        en: "µ° is zero by definition for elements in their standard reference state."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - calculo de mu a partir de actividad
        - determinacion de la constante de equilibrio
      secondary_for: []
    graph_binding:
      channels:
        - y_intercept
    pedagogical_notes:
      es: "µ° es el punto de partida para calcular µ en condiciones no estándar. La diferencia µ - µ° mide cuánto se aparta el sistema del estado de referencia y está directamente relacionada con la actividad del componente."
      en: "µ° is the starting point for computing µ under non-standard conditions. The difference µ - µ° measures how far the system departs from the reference state and is directly related to the component activity."

  - id: a
    symbol: "a"
    nombre:
      es: Actividad
      en: Activity
    descripcion:
      es: Magnitud adimensional que mide la concentración efectiva de un componente en relación con su estado estándar; para gases ideales equivale a la presión parcial en bares, para solutos ideales a la fracción molar o concentración en mol/L.
      en: Dimensionless quantity measuring the effective concentration of a component relative to its standard state; for ideal gases equals the partial pressure in bars, for ideal solutes equals the mole fraction or concentration in mol/L.
    unidad_si: "adimensional"
    dimension: "1"
    is_vector: false
    components: []
    category: derived
    physical_role: supporting_quantity
    used_in:
      - expresion de mu como funcion de actividad
      - calculo de la constante de equilibrio
    common_mistake: "Confundir la actividad con la concentración molar; en soluciones ideales son iguales solo si la concentración estándar es 1 mol/L."
    typical_range: "0 a 1 para soluciones diluidas; puede superar 1 en sistemas no ideales"
    sign_behavior:
      has_sign: false
      meaning:
        es: "La actividad es siempre positiva; una actividad nula significaría que el componente no está presente en la fase."
        en: "Activity is always positive; zero activity would mean the component is absent from the phase."
    zero_behavior:
      allowed: false
      meaning:
        es: "Actividad nula implica ausencia del componente; µ diverge logarítmicamente hacia menos infinito en ese límite."
        en: "Zero activity implies absence of the component; µ diverges logarithmically to minus infinity in that limit."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +inf)"
    interpretation_role:
      primary_for:
        - calculo de mu en condiciones no estandar
        - constante de equilibrio termodinamica
      secondary_for: []
    graph_binding:
      channels:
        - x_axis
    pedagogical_notes:
      es: "La actividad es el puente entre la termodinámica formal (µ y µ°) y los datos experimentales (concentraciones, presiones parciales). Entender cómo µ depende logarítmicamente de la actividad es la clave para conectar la termodinámica con la cinética y la espectroscopía."
      en: "Activity is the bridge between formal thermodynamics (µ and µ°) and experimental data (concentrations, partial pressures). Understanding how µ depends logarithmically on activity is the key to connecting thermodynamics with kinetics and spectroscopy."

  - id: T
    symbol: "T"
    nombre:
      es: Temperatura absoluta
      en: Absolute temperature
    descripcion:
      es: Temperatura en la escala Kelvin; parámetro intensivo del estado termodinámico que controla la contribución entrópica a µ.
      en: Temperature on the Kelvin scale; intensive thermodynamic state parameter that controls the entropic contribution to µ.
    unidad_si: K
    dimension: "[Θ]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - expresion de mu como funcion de actividad
      - dependencia de mu con T
    common_mistake: "Usar grados Celsius en lugar de kelvin en las expresiones que contienen T explícitamente como factor, produciendo errores sistemáticos."
    typical_range: "200 K a 1500 K en sistemas termodinámicos de laboratorio e industria"
    sign_behavior:
      has_sign: false
      meaning:
        es: "T en kelvin es siempre positiva."
        en: "T in kelvin is always positive."
    zero_behavior:
      allowed: false
      meaning:
        es: "T nula corresponde al cero absoluto, inalcanzable. En ese límite µ tiende a µ° independientemente de la actividad."
        en: "Zero T corresponds to absolute zero, unattainable. In that limit µ approaches µ° regardless of activity."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +inf)"
    interpretation_role:
      primary_for:
        - termino RT ln(a) en la expresion de mu
        - equilibrio de fases con variacion de temperatura
      secondary_for: []
    graph_binding:
      channels:
        - x_axis
    pedagogical_notes:
      es: "T aparece multiplicando la constante de los gases R en el término logarítmico de la expresión de µ; a T alta la actividad importa más, a T baja domina µ°."
      en: "T appears multiplying the gas constant R in the logarithmic term of the µ expression; at high T activity matters more, at low T µ° dominates."

  - id: R
    symbol: "R"
    nombre:
      es: Constante universal de los gases
      en: Universal gas constant
    descripcion:
      es: Constante física con valor 8.314 J/(mol·K) que relaciona energía, temperatura y cantidad de materia.
      en: Physical constant with value 8.314 J/(mol·K) relating energy, temperature and amount of matter.
    unidad_si: "J/(mol·K)"
    dimension: "[M L² T⁻² Θ⁻¹]"
    is_vector: false
    components: []
    category: constant
    physical_role: supporting_quantity
    used_in:
      - expresion de mu como funcion de actividad
      - termino RT en energia libre
    common_mistake: "Usar R en cal/(mol·K) o en L·atm/(mol·K) cuando el resto de magnitudes están en unidades SI, produciendo errores de conversión."
    typical_range: "8.314 J/(mol·K) — constante exacta"
    sign_behavior:
      has_sign: false
      meaning:
        es: "R es siempre positiva; es una constante fundamental."
        en: "R is always positive; it is a fundamental constant."
    zero_behavior:
      allowed: false
      meaning:
        es: "R no puede ser nula; es una constante física universal."
        en: "R cannot be zero; it is a universal physical constant."
    value_nature:
      kind: scalar_unsigned
      nonnegative_only: true
      expected_interval: "(0, +inf)"
    interpretation_role:
      primary_for:
        - escala del termino logaritmico en mu
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "R fija la escala energética del término entrópico en µ. A temperatura ambiente, RT es aproximadamente 2.48 kJ/mol, que es la escala de energía de las fluctuaciones térmicas."
      en: "R sets the energy scale of the entropic term in µ. At room temperature, RT is approximately 2.48 kJ/mol, which is the energy scale of thermal fluctuations."

  - id: G
    symbol: "G"
    nombre:
      es: Energía libre de Gibbs
      en: Gibbs free energy
    descripcion:
      es: Potencial termodinámico a T y p constantes del que se deriva µ como derivada parcial respecto al número de moles.
      en: Thermodynamic potential at constant T and p from which µ is derived as the partial derivative with respect to the number of moles.
    unidad_si: J
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion de mu como derivada parcial de G
      - criterio de espontaneidad
    common_mistake: "Confundir G con µ; µ es la energía libre por mol de un componente específico, mientras que G es la energía libre total del sistema."
    typical_range: "−10⁶ J a +10⁶ J según el sistema de referencia y la composición"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Solo las variaciones ΔG tienen significado físico directo. ΔG < 0 implica proceso espontáneo a T y p constantes."
        en: "Only changes ΔG have direct physical meaning. ΔG < 0 implies spontaneous process at constant T and p."
    zero_behavior:
      allowed: true
      meaning:
        es: "G nula es el estado de referencia convencional; no implica equilibrio."
        en: "Zero G is the conventional reference state; it does not imply equilibrium."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - definicion formal de mu
        - relacion entre mu y la espontaneidad del sistema
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "G es el potencial del que µ se deriva; entender µ como derivada parcial de G respecto a los moles del componente i es la definición más fundamental y conecta directamente con el formalismo termodinámico avanzado."
      en: "G is the potential from which µ is derived; understanding µ as the partial derivative of G with respect to moles of component i is the most fundamental definition and directly connects with advanced thermodynamic formalism."

  - id: mu_alfa
    symbol: "\\mu_\\alpha"
    nombre:
      es: Potencial químico en la fase alfa
      en: Chemical potential in phase alpha
    descripcion:
      es: Potencial químico del mismo componente evaluado en una fase alfa concreta; se compara con el de otra fase para decidir equilibrio o transferencia de materia.
      en: Chemical potential of the same component evaluated in a specific alpha phase; compared with another phase to decide equilibrium or matter transfer.
    unidad_si: "J/mol"
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - condicion de equilibrio entre fases
    common_mistake: "Comparar mu_alfa y mu_beta calculados a distinta temperatura o con estados de referencia distintos."
    typical_range: "-500 kJ/mol a +100 kJ/mol según fase y referencia"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo absoluto depende del estado de referencia; lo relevante es la diferencia con [[mu_beta]]."
        en: "The absolute sign depends on the reference state; what matters is the difference with [[mu_beta]]."
    zero_behavior:
      allowed: true
      meaning:
        es: "Cero es una referencia convencional, no una ausencia de tendencia material."
        en: "Zero is a conventional reference, not an absence of material tendency."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - criterio de equilibrio entre fases
      secondary_for: []
    graph_binding:
      channels:
        - y_axis
    pedagogical_notes:
      es: "[[mu_alfa]] permite expresar el criterio de equilibrio como comparación directa entre fases, sin confundirlo con una concentración."
      en: "[[mu_alfa]] expresses the equilibrium criterion as a direct comparison between phases, without confusing it with concentration."

  - id: mu_beta
    symbol: "\\mu_\\beta"
    nombre:
      es: Potencial químico en la fase beta
      en: Chemical potential in phase beta
    descripcion:
      es: Potencial químico del mismo componente evaluado en la fase beta; en equilibrio debe igualar al potencial de la fase alfa.
      en: Chemical potential of the same component evaluated in the beta phase; at equilibrium it must equal the potential in the alpha phase.
    unidad_si: "J/mol"
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - condicion de equilibrio entre fases
    common_mistake: "Creer que la igualdad entre fases exige igual concentración, cuando exige igualdad de potencial químico."
    typical_range: "-500 kJ/mol a +100 kJ/mol según fase y referencia"
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo absoluto depende del estado de referencia; lo relevante es la diferencia con [[mu_alfa]]."
        en: "The absolute sign depends on the reference state; what matters is the difference with [[mu_alfa]]."
    zero_behavior:
      allowed: true
      meaning:
        es: "Cero es una referencia convencional, no una condición de equilibrio por sí sola."
        en: "Zero is a conventional reference, not an equilibrium condition by itself."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - criterio de equilibrio entre fases
      secondary_for: []
    graph_binding:
      channels:
        - y_axis
    pedagogical_notes:
      es: "[[mu_beta]] se interpreta siempre junto con [[mu_alfa]]; la fase con menor potencial recibe materia hasta que ambos valores se igualan."
      en: "[[mu_beta]] is always interpreted together with [[mu_alfa]]; the phase with lower potential receives matter until both values become equal."

  - id: dG_dni
    symbol: "\\partial G/\\partial n_i"
    nombre:
      es: Derivada parcial de G respecto a moles
      en: Partial derivative of G with respect to moles
    descripcion:
      es: Derivada formal que define cuánto cambia [[G]] al añadir una cantidad diferencial del componente i a T y p constantes.
      en: Formal derivative defining how [[G]] changes when a differential amount of component i is added at constant T and p.
    unidad_si: "J/mol"
    dimension: "[M L² T⁻²]"
    is_vector: false
    components: []
    category: derived
    physical_role: supporting_quantity
    used_in:
      - definicion formal de potencial quimico
    common_mistake: "Leer la derivada como una división ordinaria entre G y moles totales."
    typical_range: "mismo orden que [[mu]]"
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su signo coincide con el de [[mu]] para el estado de referencia elegido."
        en: "Its sign matches [[mu]] for the chosen reference state."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser nula por elección de referencia."
        en: "It can be zero by reference choice."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - definicion formal de mu
      secondary_for: []
    graph_binding:
      channels: []
    pedagogical_notes:
      es: "[[dG_dni]] es una notación operativa para la definición formal de [[mu]], no una magnitud que se mida directamente en laboratorio."
      en: "[[dG_dni]] is an operational notation for the formal definition of [[mu]], not a quantity directly measured in the laboratory."
