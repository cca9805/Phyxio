formulas:
- id: energia_interna_gas_ideal
  title:
    es: Energía interna de un gas ideal
    en: Internal energy of an ideal gas
  equation: U = (f/2) * n * R * T
  latex: U = \frac{f}{2} n R T
  rearrangements:
  - target: energia_interna
    equation: U = (f/2) * n * R * T
    latex: U = \frac{f}{2} n R T
  - target: temperatura
    equation: T = 2*U / (f * n * R)
    latex: T = \frac{2U}{f n R}
  - target: numero_de_moles
    equation: n = 2*U / (f * R * T)
    latex: n = \frac{2U}{f R T}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: 'La energía interna de un gas ideal es proporcional a la temperatura absoluta. El factor f es el número de grados
      de libertad moleculares activos: f = 3 para gas monoatómico, f = 5 para gas diatómico a temperatura moderada. Para gas
      monoatómico: U = (3/2)nRT.'
    en: 'The internal energy of an ideal gas is proportional to the absolute temperature. The factor f is the number of active
      molecular degrees of freedom: f = 3 for monatomic gas, f = 5 for diatomic gas at moderate temperature. For monatomic
      gas: U = (3/2)nRT.'
  constraints:
  - gas ideal (sin interacciones intermoleculares)
  - temperatura en kelvin
  - equilibrio termodinámico
  validity:
    es: Válida para gases ideales. Para gases reales, U depende también del volumen (interacciones intermoleculares) y se
      necesita una ecuación de estado más compleja.
    en: Valid for ideal gases. For real gases, U also depends on volume (intermolecular interactions) and a more complex equation
      of state is needed.
  dimension_check: '[mol][J/(mol·K)][K] = [J]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - primera ley de la termodinámica para gas ideal
  - cálculo de ΔU en cualquier proceso de gas ideal
  interpretation_tags:
  - gas ideal
  - energía interna
  - temperatura
  result_semantics:
    target: energia_interna
    kind: state_function
    sign_meaning:
      es: U siempre positiva para T > 0 K. ΔU positivo indica aumento de temperatura; negativo indica descenso.
      en: U always positive for T > 0 K. Positive ΔU indicates temperature rise; negative indicates drop.
    absolute_value_meaning:
      es: El valor absoluto de U es la energía total almacenada en los movimientos moleculares del gas.
      en: The absolute value of U is the total energy stored in the molecular motions of the gas.
  domain_checks:
  - T > 0
  - n > 0
  coherence_checks:
  - U > 0
  graph_implications:
    es: En el gráfico U vs T para un gas ideal, la curva es una recta que pasa por el origen con pendiente n·C_V = (f/2)nR.
    en: In the U vs T graph for an ideal gas, the curve is a straight line through the origin with slope n·C_V = (f/2)nR.
  pedagogical_triggers:
  - Alumno usa T en Celsius en lugar de Kelvin al calcular U.
  - Alumno confunde f = 3 (monoatómico) con f = 5 (diatómico).
- id: variacion_energia_interna
  title:
    es: Variación de energía interna en gas ideal
    en: Internal energy change in ideal gas
  equation: \Delta U = n * C_V * DeltaT
  latex: \Delta U = n C_V \Delta T
  rearrangements:
  - target: variacion_de_energia_interna
    equation: \Delta U = n * C_V * DeltaT
    latex: \Delta U = n C_V \Delta T
  - target: variacion_de_temperatura
    equation: DeltaT = \Delta U / (n * C_V)
    latex: \Delta T = \frac{\Delta U}{n C_V}
  - target: capacidad_calorifica_a_volumen_constante
    equation: C_V = \Delta U / (n * DeltaT)
    latex: C_V = \frac{\Delta U}{n \Delta T}
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: La variación de energía interna de un gas ideal entre dos estados es proporcional a la variación de temperatura, con
      independencia del proceso seguido. C_V es la capacidad calorífica molar a volumen constante. Esta fórmula es válida
      para cualquier proceso de gas ideal, no solo para procesos isocóricos.
    en: The internal energy change of an ideal gas between two states is proportional to the temperature change, regardless
      of the process. C_V is the molar heat capacity at constant volume. This formula is valid for any ideal gas process,
      not only isochoric ones.
  constraints:
  - gas ideal
  - C_V constante (aproximación válida para rango moderado de temperaturas)
  validity:
    es: Válida para gases ideales con C_V constante. Para gases reales o rangos amplios de temperatura, C_V varía con T y
      se debe integrar ΔU = n·∫C_V dT.
    en: Valid for ideal gases with constant C_V. For real gases or wide temperature ranges, C_V varies with T and ΔU = n·∫C_V
      dT must be integrated.
  dimension_check: '[mol][J/(mol·K)][K] = [J]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - primera ley de la termodinámica
  - cálculo de ΔU en cualquier proceso de gas ideal dado ΔT
  interpretation_tags:
  - variación de energía interna
  - gas ideal
  - capacidad calorífica
  result_semantics:
    target: variacion_de_energia_interna
    kind: state_difference
    sign_meaning:
      es: 'ΔU > 0: el sistema se calienta (T_f > T_i). ΔU < 0: el sistema se enfría (T_f < T_i). ΔU = 0: proceso isotérmico.'
      en: 'ΔU > 0: system heats up (T_f > T_i). ΔU < 0: system cools down (T_f < T_i). ΔU = 0: isothermal process.'
    absolute_value_meaning:
      es: El módulo de ΔU es la energía térmica total ganada o perdida por el gas en el proceso.
      en: The magnitude of ΔU is the total thermal energy gained or lost by the gas in the process.
  domain_checks:
  - n > 0
  - C_V > 0
  coherence_checks:
  - abs(\Delta U) < 1e9
  graph_implications:
    es: En el diagrama U vs T, ΔU es la diferencia de ordenadas entre los estados inicial y final. La recta tiene pendiente
      n·C_V.
    en: In the U vs T diagram, ΔU is the difference in ordinates between initial and final states. The line has slope n·C_V.
  pedagogical_triggers:
  - Alumno usa Cp en lugar de C_V para calcular ΔU.
  - Alumno aplica ΔU = n·C_V·ΔT solo a procesos isocóricos, ignorando que es válida para cualquier proceso de gas ideal.
