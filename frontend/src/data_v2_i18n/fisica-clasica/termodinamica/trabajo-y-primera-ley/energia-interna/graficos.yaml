version: "1.0"
leaf: "energia-interna"

coord:
  title:
    es: Gráfica Coord · Energía Interna vs T
    en: Coord Graph · Internal Energy vs T
  xAxis:
    es: temperatura T (K)
    en: temperature T (K)
  yAxis:
    es: energía interna U (J)
    en: internal energy U (J)
  xMagnitude: temperatura
  yMagnitude: energia_interna
  relation:
    es: "U = (f/2)·n·R·T. Recta por el origen con pendiente n·Cv. Gas ideal: U depende solo de T."
    en: "U = (f/2)·n·R·T. Line through origin with slope n·Cv. Ideal gas: U depends only on T."
  physicalReading:
    es: Pendiente = n·Cv. ΔU entre dos estados = diferencia vertical en la recta. La recta pasa por el origen.
    en: Slope = n·Cv. ΔU between two states = vertical difference on the line. Line passes through the origin.
  slopeMeaning:
    es: "Pendiente = n·Cv = (f/2)·n·R: capacidad calorífica total a volumen constante."
    en: "Slope = n·Cv = (f/2)·n·R: total heat capacity at constant volume."
  interceptMeaning:
    es: "Intercepto = 0: U nula a T = 0 K por convenio del cero de energía."
    en: "Intercept = 0: U is zero at T = 0 K by energy-zero convention."
  curvatureMeaning:
    es: "Recta: Cv constante en el rango. Curvatura aparece en gases reales."
    en: "Straight line: Cv constant in range. Curvature appears in real gases."
  signMeaning:
    es: "U > 0 para T > 0 K. ΔU > 0 cuando el gas se calienta."
    en: "U > 0 for T > 0 K. ΔU > 0 when the gas heats up."
  areaMeaning:
    es: Sin interpretación directa de área en U(T) para gas ideal.
    en: No direct area interpretation in U(T) for ideal gas.
  domainMeaning:
    es: "T > 0 K y por encima de la temperatura de condensación del gas."
    en: "T > 0 K and above the condensation temperature of the gas."
  modelConnection:
    es: Gas ideal con Cv constante. U depende solo de T, no del volumen.
    en: Ideal gas with constant Cv. U depends only on T, not on volume.
  formulaConnection:
    es: U = (f/2)nRT, ΔU = n·Cv·ΔT. Pendiente = n·Cv.
    en: U = (f/2)nRT, ΔU = n·Cv·ΔT. Slope = n·Cv.
  readingFocus:
    es: leer pendiente como n·Cv e identificar ΔU como diferencia vertical entre estados.
    en: read slope as n·Cv and identify ΔU as vertical difference between states.
  agentHints:
    es:
      - Pendiente = n·Cv = (f/2)nR.
      - ΔU = diferencia vertical en la recta.
      - T siempre en Kelvin.
    en:
      - Slope = n·Cv = (f/2)nR.
      - ΔU = vertical difference on the line.
      - T always in Kelvin.
  commonMistakes:
    es:
      - Usar T en Celsius.
      - Confundir f = 3 (monoatómico) con f = 5 (diatómico).
      - Pensar que U depende del volumen en gas ideal.
    en:
      - Using T in Celsius.
      - Confusing f = 3 (monatomic) with f = 5 (diatomic).
      - Thinking U depends on volume in ideal gas.
