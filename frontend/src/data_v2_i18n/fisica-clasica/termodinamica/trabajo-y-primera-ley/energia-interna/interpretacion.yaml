      status: info
      text:
        es: Intuitivamente, [[variacion_de_temperatura]] representa cuánto se agita más (o menos) cada molécula al final del proceso. Para un gas ideal monoatómico, un incremento de 1 K por mol requiere exactamente (3/2)R ≈ 12.5 J.
        en: Intuitively, [[variacion_de_temperatura]] represents how much more (or less) each molecule agitates at the end of the process. For a monatomic ideal gas, a 1 K increase per mole requires exactly (3/2)R ≈ 12.5 J.
    limiting_cases:
    - id: variacion_de_temperatura_limiting_case_base
      when: 'true'
      status: info
      text:
        es: '[[variacion_de_temperatura]] = 0 implica proceso isotérmico: [[variacion_de_energia_interna]] = 0 para gas ideal. Un ΔT muy grande puede indicar que el modelo de gas ideal ha dejado de ser válido.'
        en: '[[variacion_de_temperatura]] = 0 implies an isothermal process: [[variacion_de_energia_interna]] = 0 for ideal gas. A very large ΔT may indicate that the ideal gas model is no longer valid.'
