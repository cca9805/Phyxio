      when: 'true'
      status: info
      text:
        es: Con [[variacion_de_temperatura]] calculado, usar la primera ley ΔU = Q − W para determinar el calor o el trabajo cuando uno de ellos es conocido.
        en: With [[variacion_de_temperatura]] computed, use the first law ΔU = Q − W to determine heat or work when one of them is known.
    physical_intuition:
