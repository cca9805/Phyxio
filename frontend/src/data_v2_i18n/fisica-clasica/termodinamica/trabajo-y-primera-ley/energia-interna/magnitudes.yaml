magnitudes:
- id: energia_interna
  symbol: U
  nombre:
    es: Energía interna
    en: Internal energy
  descripcion:
    es: Suma de todas las energías cinéticas y potenciales de las moléculas del sistema. Para un gas ideal monoatómico, U
      = (3/2)nRT. Es una función de estado, por lo que solo depende del estado termodinámico, no de cómo se llegó a él.
    en: Sum of all kinetic and potential energies of the system's molecules. For a monatomic ideal gas, U = (3/2)nRT. It is
      a state function, so it depends only on the thermodynamic state, not on how it was reached.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: state
  physical_role: core_physical_quantity
  used_in:
  - primera ley de la termodinámica
  - cálculo de ΔU en procesos termodinámicos
  - teoría cinética de gases
  common_mistake: Confundir U con el calor Q o con el trabajo W. U es una propiedad del estado del sistema; Q y W son energías
    en tránsito durante un proceso.
  typical_range: 10³ J a 10⁶ J para muestras de laboratorio de gas ideal
  sign_behavior:
    has_sign: true
    meaning:
      es: U absoluta siempre positiva (convención termodinámica habitual). ΔU puede ser positivo (el sistema gana energía
        interna) o negativo (el sistema pierde energía interna).
      en: Absolute U is always positive (common thermodynamic convention). ΔU can be positive (system gains internal energy)
        or negative (system loses internal energy).
  zero_behavior:
    allowed: false
    meaning:
      es: U = 0 solo al cero absoluto de temperatura (T = 0 K), que es inalcanzable en la práctica.
      en: U = 0 only at the absolute zero of temperature (T = 0 K), which is unattainable in practice.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - balance energético en la primera ley
    - caracterización del estado termodinámico del sistema
    secondary_for:
    - conexión con la temperatura a través de la capacidad calorífica
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: 'U es la única variable que permite distinguir entre procesos que van de A a B por distintas rutas: aunque Q y W son
      diferentes para cada ruta, ΔU = Q − W es siempre el mismo, porque U es función de estado.'
    en: 'U is the only variable that allows distinguishing between processes going from A to B by different routes: although
      Q and W differ for each route, ΔU = Q − W is always the same, because U is a state function.'
- id: variacion_de_energia_interna
  symbol: \Delta U
  nombre:
    es: Variación de energía interna
    en: Internal energy change
  descripcion:
    es: Diferencia entre la energía interna en el estado final y el estado inicial del proceso. Magnitud central de la primera
      ley de la termodinámica.
    en: Difference between the internal energy at the final and initial states of the process. Central quantity of the first
      law of thermodynamics.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - primera ley: ΔU = Q − W
  - cálculo de calor o trabajo desconocido en un proceso
  common_mistake: Confundir ΔU con Q (calor) cuando solo se da el intercambio de calor sin mencionar el trabajo. ΔU = Q solo
    si W = 0 (proceso isocórico).
  typical_range: −10⁶ J a +10⁶ J en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔU > 0: el sistema gana energía interna (temperatura sube para gas ideal). ΔU < 0: el sistema pierde energía interna
        (temperatura baja).'
      en: 'ΔU > 0: system gains internal energy (temperature rises for ideal gas). ΔU < 0: system loses internal energy (temperature
        drops).'
  zero_behavior:
    allowed: true
    meaning:
      es: ΔU = 0 en procesos isotérmicos de gas ideal (T = cte implica U = cte) y en ciclos completos (el sistema vuelve al
        estado inicial).
      en: ΔU = 0 in isothermal processes of ideal gas (T = const implies U = const) and in complete cycles (system returns
        to initial state).
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - determinación de Q dado W, o viceversa, mediante la primera ley
    - verificación de la coherencia de un balance energético
    secondary_for: []
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: ΔU = 0 en un ciclo completo es una consecuencia directa de que U es función de estado. Esta propiedad es la base para
      analizar la eficiencia de ciclos termodinámicos.
    en: ΔU = 0 in a complete cycle is a direct consequence of U being a state function. This property is the basis for analysing
      the efficiency of thermodynamic cycles.
- id: temperatura
  symbol: T
  nombre:
    es: Temperatura
    en: Temperature
  descripcion:
    es: Medida macroscópica de la energía cinética media de las moléculas del sistema. Para un gas ideal, U es directamente
      proporcional a T a través de la capacidad calorífica a volumen constante.
    en: Macroscopic measure of the mean kinetic energy of the system's molecules. For an ideal gas, U is directly proportional
      to T through the heat capacity at constant volume.
  unidad_si: K
  dimension: '[Θ]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - cálculo de U para gas ideal: U = (f/2)nRT
  - relación ΔU = n·Cv·ΔT para gas ideal
  common_mistake: Usar T en Celsius en lugar de Kelvin para calcular U o ΔU; siempre T en Kelvin en fórmulas termodinámicas.
  typical_range: 100 K a 3000 K en procesos termodinámicos
  sign_behavior:
    has_sign: false
    meaning:
      es: La temperatura absoluta siempre es positiva (T > 0 K).
      en: Absolute temperature is always positive (T > 0 K).
  zero_behavior:
    allowed: false
    meaning:
      es: T = 0 K es el cero absoluto, inalcanzable en la práctica (tercer principio de la termodinámica).
      en: T = 0 K is absolute zero, unattainable in practice (third law of thermodynamics).
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - cálculo de U en gas ideal
    - determinación de ΔT a partir de ΔU
    secondary_for: []
  graph_binding:
    channels:
    - x_axis
  pedagogical_notes:
    es: T es el eje horizontal del gráfico U vs T para un gas ideal. La pendiente de esa recta es n·Cv, la capacidad calorífica
      total del gas a volumen constante.
    en: T is the horizontal axis of the U vs T graph for an ideal gas. The slope of that line is n·Cv, the total heat capacity
      of the gas at constant volume.
- id: variacion_de_temperatura
  symbol: \Delta T
  nombre:
    es: Variación de temperatura
    en: Temperature change
  descripcion:
    es: Diferencia entre la temperatura final e inicial del proceso. En la relación ΔU = n·Cv·ΔT, determina la variación de energía interna del gas ideal.
    en: Difference between the final and initial temperature of the process. In the relation ΔU = n·Cv·ΔT, it determines the internal energy change of the ideal gas.
  unidad_si: K
  dimension: '[Θ]'
  is_vector: false
  components: []
  category: derived
  physical_role: supporting_quantity
  used_in:
  - cálculo de ΔU = n·Cv·ΔT para gas ideal
  - determinación del proceso (ΔT = 0 implica proceso isotérmico)
  common_mistake: Calcular ΔT en Celsius en lugar de Kelvin. La diferencia numérica es la misma (1 °C = 1 K de diferencia), pero expresar temperaturas absolutas en Celsius lleva a errores en U = (f/2)nRT.
  typical_range: -500 K a +500 K en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔT > 0: el sistema se calienta. ΔT < 0: el sistema se enfría. ΔT = 0: proceso isotérmico.'
      en: 'ΔT > 0: system heats up. ΔT < 0: system cools down. ΔT = 0: isothermal process.'
  zero_behavior:
    allowed: true
    meaning:
      es: ΔT = 0 corresponde a un proceso isotérmico. En un gas ideal implica ΔU = 0.
      en: ΔT = 0 corresponds to an isothermal process. For an ideal gas it implies ΔU = 0.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - cálculo de ΔU dado n y Cv
    - clasificación del proceso termodinámico
    secondary_for: []
  graph_binding:
    channels:
    - x_axis
  pedagogical_notes:
    es: ΔT es el factor de proporcionalidad entre la variación de energía interna y la capacidad calorífica total n·Cv. Para comparar procesos, ΔT permite identificar cuál aporta más energía interna sin conocer el calor intercambiado.
    en: ΔT is the proportionality factor between internal energy change and the total heat capacity n·Cv. When comparing processes, ΔT identifies which process adds more internal energy without knowing the exchanged heat.
- id: numero_de_moles
  symbol: n
  nombre:
    es: Cantidad de sustancia (moles)
    en: Amount of substance (moles)
  descripcion:
    es: Número de moles del gas en el sistema. Determina la cantidad total de partículas y escala tanto la energía interna absoluta como la variación de energía interna.
    en: Number of moles of gas in the system. Determines the total particle count and scales both the absolute internal energy and the internal energy change.
  unidad_si: mol
  dimension: '[N]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - cálculo de U = (f/2)nRT para gas ideal
  - cálculo de ΔU = n·Cv·ΔT
  common_mistake: Confundir la masa en gramos con el número de moles. Convertir usando n = m/M, donde M es la masa molar en g/mol.
  typical_range: 0.001 mol a 10 mol en muestras de laboratorio
  sign_behavior:
    has_sign: false
    meaning:
      es: n siempre positivo; representa una cantidad de materia.
      en: n is always positive; it represents an amount of matter.
  zero_behavior:
    allowed: false
    meaning:
      es: n = 0 implicaría sistema sin materia, sin sentido físico en termodinámica clásica.
      en: n = 0 would imply a system without matter, meaningless in classical thermodynamics.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - escalado de la energía interna total del sistema
    secondary_for:
    - comparación entre sistemas de distinto tamaño
  graph_binding:
    channels:
    - slope
  pedagogical_notes:
    es: n actúa como factor de escala en U = (f/2)nRT y ΔU = n·Cv·ΔT. Duplicar n con T constante duplica exactamente la energía interna, lo que confirma la propiedad extensiva de U.
    en: n acts as a scaling factor in U = (f/2)nRT and ΔU = n·Cv·ΔT. Doubling n at constant T exactly doubles the internal energy, confirming the extensive property of U.
- id: capacidad_calorifica_a_volumen_constante
  symbol: C_V
  nombre:
    es: Capacidad calorífica a volumen constante
    en: Heat capacity at constant volume
  descripcion:
    es: Energía necesaria por unidad de variación de temperatura para aumentar la temperatura del sistema a volumen constante.
      Para un gas ideal monoatómico Cv = (3/2)R; para uno diatómico Cv = (5/2)R.
    en: Energy required per unit temperature change to raise the temperature of the system at constant volume. For a monatomic
      ideal gas Cv = (3/2)R; for a diatomic one Cv = (5/2)R.
  unidad_si: J/K
  dimension: '[M L² T⁻² Θ⁻¹]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - cálculo de ΔU = n·Cv·ΔT para gas ideal
  - primer principio en procesos isocóricos (ΔU = Q = n·Cv·ΔT)
  common_mistake: Confundir Cv (a volumen constante) con Cp (a presión constante). Para gases ideales Cp = Cv + R; usar Cp
    en lugar de Cv sobreestima ΔU.
  typical_range: 12.5 J/(mol·K) para gas ideal monoatómico; 20.8 J/(mol·K) para gas ideal diatómico
  sign_behavior:
    has_sign: false
    meaning:
      es: 'Cv siempre positiva: se necesita añadir energía para aumentar la temperatura.'
      en: 'Cv always positive: energy must be added to increase temperature.'
  zero_behavior:
    allowed: false
    meaning:
      es: Cv nula solo al cero absoluto (tercer principio), no aplicable en condiciones normales.
      en: Zero Cv only at absolute zero (third law), not applicable under normal conditions.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - cálculo de ΔU en función de ΔT para gas ideal
    secondary_for:
    - determinación del número de grados de libertad moleculares activos
  graph_binding:
    channels:
    - slope
  pedagogical_notes:
    es: Cv determina la pendiente de la recta U vs T para el gas ideal. Un gas con mayor número de grados de libertad tiene
      mayor Cv y necesita más energía para alcanzar la misma temperatura.
    en: Cv determines the slope of the U vs T line for the ideal gas. A gas with more degrees of freedom has higher Cv and
      needs more energy to reach the same temperature.
