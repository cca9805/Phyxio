version: "1.0"
leaf: "primera-ley-de-la-termodinamica"

dcl:
  title:
    es: DCL · Primera ley de la termodinámica
    en: FBD · First Law of Thermodynamics
  forces:
    es:
      - calor que cruza la frontera
      - trabajo sobre el sistema
      - variacion de energia interna
    en:
      - heat crossing the boundary
      - work on the system
      - internal energy change
  object:
    es: sistema cerrado con frontera energetica
    en: closed system with energy boundary
  freeBodyCondition:
    es: El diagrama energetico muestra los flujos de calor y trabajo que cruzan la frontera del sistema cerrado.
    en: The energy diagram shows heat and work flows crossing the closed system boundary.
  equilibriumCondition:
    es: "Balance energetico: DeltaU = Q + W con convencion signo positivo hacia el sistema."
    en: "Energy balance: DeltaU = Q + W with positive sign convention into the system."
  netForce:
    es: La variacion neta de energia interna es la suma algebraica del calor absorbido y el trabajo recibido.
    en: The net change in internal energy is the algebraic sum of heat absorbed and work received.
  accelerationDirection:
    es: "DeltaU positivo: el sistema gana energia interna. DeltaU negativo: el sistema cede energia."
    en: "DeltaU positive: system gains internal energy. DeltaU negative: system releases energy."
  referenceFrameChoice:
    es: "Convencion IUPAC: Q y W positivos cuando entran al sistema."
    en: "IUPAC convention: Q and W positive when entering the system."
  forceTypes:
    es:
      - calor Q (transferencia termica)
      - trabajo W (interaccion mecanica)
    en:
      - heat Q (thermal transfer)
      - work W (mechanical interaction)
  signConvention:
    es: "Q > 0: calor absorbido. W > 0: trabajo recibido sobre el sistema. DeltaU = Q + W."
    en: "Q > 0: heat absorbed. W > 0: work received by system. DeltaU = Q + W."
  commonMistakes:
    es:
      - Invertir el signo de W segun la convencion usada.
      - Aplicar la primera ley solo a procesos isocoros.
      - Olvidar que DeltaU = 0 en un ciclo completo.
    en:
      - Reversing the sign of W depending on the convention.
      - Applying the first law only to isochoric processes.
      - Forgetting DeltaU = 0 in a complete cycle.
  agentHints:
    es:
      - DeltaU = Q + W con trabajo positivo al entrar.
      - En un ciclo completo, DeltaU = 0.
      - "La energia interna es funcion de estado: no depende del camino."
    en:
      - DeltaU = Q + W with work positive when entering.
      - In a complete cycle, DeltaU = 0.
      - "Internal energy is a state function: does not depend on path."
  relation:
    es: El DCL energetico muestra como el calor y el trabajo que cruzan la frontera se suman para producir la variacion de energia interna del sistema.
    en: The energy FBD shows how heat and work crossing the boundary add up to produce the change in internal energy of the system.
  readingFocus:
    es: identificar la direccion y magnitud de las flechas de calor y trabajo, y calcular DeltaU como su suma algebraica.
    en: identify the direction and magnitude of heat and work arrows, and calculate DeltaU as their algebraic sum.
