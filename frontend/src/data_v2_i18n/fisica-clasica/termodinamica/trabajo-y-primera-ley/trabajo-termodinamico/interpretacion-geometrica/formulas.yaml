formulas:
- id: trabajo_area_pV
  title:
    es: Trabajo como área bajo la curva p-V
    en: Work as area under the p-V curve
  equation: W = area_bajo_curva_pV
  latex: W = \int_{V_i}^{V_f} p(V)\,\mathrm{d}V
  rearrangements:
  - target: trabajo_termodinamico
    equation: W = area_bajo_curva_pV
    latex: W = \int_{V_i}^{V_f} p(V)\,\mathrm{d}V
  category: fundamental
  relation_type: definition
  physical_meaning:
    es: El trabajo realizado por el gas en cualquier proceso cuasi-estático es igual al área comprendida entre la curva p(V)
      y el eje de volúmenes en el diagrama p-V, entre los valores V_i y V_f. Para un proceso isobárico es un rectángulo; para
      un proceso isotérmico es el área bajo una hipérbola; para un proceso adiabático es el área bajo una curva más empinada.
    en: The work done by the gas in any quasi-static process equals the area between the p(V) curve and the volume axis in
      the p-V diagram, between values V_i and V_f. For an isobaric process it is a rectangle; for an isothermal process it
      is the area under a hyperbola; for an adiabatic process it is the area under a steeper curve.
  constraints:
  - proceso cuasi-estático
  - sistema cerrado
  validity:
    es: Válida para cualquier proceso cuasi-estático donde p sea función continua de V.
    en: Valid for any quasi-static process where p is a continuous function of V.
  dimension_check: '[M L⁻¹ T⁻²][L³] = [M L² T⁻²]'
  calculable: false
  motivo_no_calculable: Requiere conocer la forma analítica de la curva p(V), que depende del tipo de proceso.
  used_in:
  - lectura directa del trabajo en diagramas p-V
  - comparación de procesos entre los mismos estados
  - análisis de ciclos termodinámicos
  interpretation_tags:
  - área bajo curva
  - diagrama pV
  - dependencia de trayectoria
  result_semantics:
    target: trabajo_termodinamico
    kind: process_quantity
    sign_meaning:
      es: Si la trayectoria va de izquierda a derecha (expansión, V_f > V_i), el área es positiva y W > 0. De derecha a izquierda
        (compresión), el área es negativa y W < 0.
      en: If the path goes left to right (expansion, V_f > V_i), the area is positive and W > 0. Right to left (compression),
        the area is negative and W < 0.
    absolute_value_meaning:
      es: El área total bajo la curva, independientemente del signo, da el módulo de la energía mecánica intercambiada.
      en: The total area under the curve, regardless of sign, gives the magnitude of mechanical energy exchanged.
  domain_checks:
  - V > 0
  - p > 0
  coherence_checks:
  - 'true'
  graph_implications:
    es: Esta fórmula es la base de toda la lectura del diagrama p-V. El área del ciclo es el trabajo neto.
    en: This formula is the basis of all p-V diagram reading. The cycle area is the net work.
  pedagogical_triggers:
  - Alumno no identifica el área bajo la curva como trabajo al leer el diagrama p-V.
- id: trabajo_ciclo
  title:
    es: Trabajo neto de un ciclo termodinámico
    en: Net work of a thermodynamic cycle
  equation: W_{ciclo} = area_encerrada_ciclo
  latex: W_c = \oint p\,\mathrm{d}V
  rearrangements:
  - target: trabajo_neto_del_ciclo
    equation: W_{ciclo} = area_encerrada_ciclo
    latex: W_c = \oint p\,\mathrm{d}V
  category: derived
  relation_type: definition
  physical_meaning:
    es: 'El trabajo neto realizado en un ciclo termodinámico completo es igual al área encerrada por la curva del ciclo en
      el diagrama p-V. El signo depende del sentido de recorrido: horario para motor (trabajo neto positivo) y antihorario
      para refrigerador (trabajo neto negativo).'
    en: 'The net work done in a complete thermodynamic cycle equals the area enclosed by the cycle curve in the p-V diagram.
      The sign depends on the direction: clockwise for engine (positive net work) and counter-clockwise for refrigerator (negative
      net work).'
  constraints:
  - ciclo cerrado (el estado final coincide con el estado inicial)
  - todos los procesos del ciclo son cuasi-estáticos
  validity:
    es: Válida para cualquier ciclo cerrado cuasi-estático. El área encerrada es independiente del punto de partida en el
      ciclo.
    en: Valid for any closed quasi-static cycle. The enclosed area is independent of the starting point in the cycle.
  dimension_check: '[M L⁻¹ T⁻²][L³] = [M L² T⁻²]'
  calculable: false
  motivo_no_calculable: Requiere conocer la forma analítica de cada proceso del ciclo para calcular el área encerrada.
  used_in:
  - análisis de ciclos de Carnot, Otto, Diesel y Rankine
  - determinación de la eficiencia de motores
  interpretation_tags:
  - ciclo termodinámico
  - área del ciclo
  - trabajo neto
  result_semantics:
    target: trabajo_neto_del_ciclo
    kind: process_quantity
    sign_meaning:
      es: '[[W_{ciclo}]] > 0: ciclo motor (sentido horario en diagrama p-V). [[W_{ciclo}]] < 0: ciclo refrigerador o bomba
        de calor (sentido antihorario).'
      en: '[[W_{ciclo}]] > 0: engine cycle (clockwise in p-V diagram). [[W_{ciclo}]] < 0: refrigerator or heat pump cycle
        (counter-clockwise).'
    absolute_value_meaning:
      es: El módulo de [[W_{ciclo}]] es la energía mecánica neta generada o consumida por ciclo.
      en: The magnitude of [[W_{ciclo}]] is the net mechanical energy generated or consumed per cycle.
  domain_checks:
  - 'true'
  coherence_checks:
  - 'true'
  graph_implications:
    es: En el diagrama p-V, el ciclo es un lazo cerrado. El área interior del lazo es [[W_{ciclo}]]. Cuanto más grande el
      lazo, más trabajo neto por ciclo.
    en: In the p-V diagram, the cycle is a closed loop. The interior area of the loop is [[W_{ciclo}]]. The larger the loop,
      the more net work per cycle.
  pedagogical_triggers:
  - Alumno no reconoce que el sentido horario del ciclo en el diagrama p-V implica trabajo neto positivo.
