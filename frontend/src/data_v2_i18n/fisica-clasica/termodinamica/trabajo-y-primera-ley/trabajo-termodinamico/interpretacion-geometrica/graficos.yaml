version: "1.0"
leaf: "interpretacion-geometrica"

coord:
  title:
    es: Diagrama p-V · Trabajo como área
    en: p-V Diagram · Work as area
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: volumen
  yMagnitude: presion
  relation:
    es: "W = área bajo la curva p(V). Para ciclos: W_neto = área encerrada. Horario → motor. Antihorario → refrigerador."
    en: "W = area under p(V) curve. For cycles: W_net = enclosed area. Clockwise → engine. Counter-clockwise → refrigerator."
  physicalReading:
    es: El área es exactamente el trabajo, no una aproximación. Comparar áreas de distintas trayectorias permite leer la dependencia del trabajo con la trayectoria.
    en: The area is exactly the work, not an approximation. Comparing areas of different paths shows work path-dependence.
  slopeMeaning:
    es: "dp/dV: pendiente de la curva de proceso. Cero para isobárico, infinita para isocórico, negativa para isotérmico y adiabático."
    en: "dp/dV: slope of the process curve. Zero for isobaric, infinite for isochoric, negative for isothermal and adiabatic."
  interceptMeaning:
    es: "Estado inicial del proceso: punto (V_i, p_i) en el diagrama."
    en: "Initial state of the process: point (V_i, p_i) in the diagram."
  curvatureMeaning:
    es: "La curvatura distingue los tipos de proceso: hipérbola isotérmica, curva más empinada adiabática."
    en: "Curvature distinguishes process types: isothermal hyperbola, steeper adiabatic curve."
  signMeaning:
    es: "W > 0: expansión (trayectoria a la derecha). W < 0: compresión. Ciclo horario: W_neto > 0."
    en: "W > 0: expansion (rightward). W < 0: compression. Clockwise cycle: W_net > 0."
  areaMeaning:
    es: Área bajo la curva = trabajo exacto del proceso. Área del ciclo = trabajo neto.
    en: Area under curve = exact process work. Cycle area = net work.
  domainMeaning:
    es: "V > 0, p > 0. Válido para procesos cuasi-estáticos."
    en: "V > 0, p > 0. Valid for quasi-static processes."
  modelConnection:
    es: Gas ideal cuasi-estático. El área es el trabajo sin correcciones en el dominio de validez.
    en: Quasi-static ideal gas. Area equals work with no corrections in the validity domain.
  formulaConnection:
    es: W = ∫p dV, W_ciclo = ∮p dV.
    en: W = ∫p dV, W_cycle = ∮p dV.
  readingFocus:
    es: leer el área bajo la curva como trabajo exacto e identificar el sentido del ciclo para determinar el signo.
    en: read the area under the curve as exact work and identify cycle direction to determine the sign.
  agentHints:
    es:
      - Área = trabajo exacto (no aproximación).
      - "Horario = motor (W > 0)."
      - "Distintas curvas A→B: distintas áreas = trabajo depende de trayectoria."
    en:
      - Area = exact work (not approximation).
      - "Clockwise = engine (W > 0)."
      - "Different curves A→B: different areas = work is path-dependent."
  commonMistakes:
    es:
      - Creer que el área es aproximación.
      - Base = Δp en lugar de ΔV.
      - Aplicar a procesos irreversibles.
    en:
      - Believing area is an approximation.
      - Base = Δp instead of ΔV.
      - Applying to irreversible processes.
