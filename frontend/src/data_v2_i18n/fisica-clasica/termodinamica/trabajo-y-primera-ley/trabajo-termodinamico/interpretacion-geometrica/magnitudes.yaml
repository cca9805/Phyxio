magnitudes:
- id: trabajo_termodinamico
  symbol: W
  nombre:
    es: Trabajo termodinámico
    en: Thermodynamic work
  descripcion:
    es: Energía intercambiada mecánicamente a través de la frontera móvil; geométricamente equivale al área bajo la curva
      p(V) en el diagrama p-V entre el estado inicial y el final.
    en: Energy mechanically exchanged through the moving boundary; geometrically equal to the area under the p(V) curve in
      the p-V diagram between the initial and final state.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: process
  physical_role: core_physical_quantity
  used_in:
  - lectura del diagrama p-V
  - comparación de trayectorias entre los mismos estados
  - ciclos termodinámicos (área del ciclo)
  common_mistake: Calcular el área como base × altura con la base en el eje p y la altura en el eje V, cuando debería ser
    la proyección sobre el eje V (base = ΔV) y la altura en el eje p.
  typical_range: 1 J a 10⁶ J según el proceso
  sign_behavior:
    has_sign: true
    meaning:
      es: Área a la derecha de la trayectoria (expansión) corresponde a W > 0. Área a la izquierda (compresión) corresponde
        a W < 0.
      en: Area to the right of the path (expansion) corresponds to W > 0. Area to the left (compression) corresponds to W
        < 0.
  zero_behavior:
    allowed: true
    meaning:
      es: 'W nulo: trayectoria vertical (isocórico) o trayectoria cerrada con área neta cero.'
      en: 'Zero W: vertical path (isochoric) or closed path with zero net area.'
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - equivalencia geométrica trabajo = área bajo curva p-V
    - comparación de procesos distintos entre los mismos estados
    secondary_for:
    - cálculo del trabajo neto en ciclos
  graph_binding:
    channels:
    - area_under_curve
  pedagogical_notes:
    es: La equivalencia W = área bajo p(V) convierte el diagrama p-V en una herramienta de lectura directa del trabajo sin
      integrar analíticamente. Esto permite comparar visualmente distintos procesos entre los mismos estados.
    en: The equivalence W = area under p(V) turns the p-V diagram into a direct work-reading tool without analytical integration.
      This allows visual comparison of different processes between the same states.
- id: presion
  symbol: p
  nombre:
    es: Presión
    en: Pressure
  descripcion:
    es: Eje vertical del diagrama p-V. La forma de la curva p(V) determina el área y por tanto el trabajo del proceso.
    en: Vertical axis of the p-V diagram. The shape of the p(V) curve determines the area and hence the work of the process.
  unidad_si: Pa
  dimension: '[M L⁻¹ T⁻²]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - definición del eje vertical del diagrama p-V
  - cálculo del área bajo la curva
  common_mistake: Confundir la presión en el estado inicial o final con la presión a lo largo de toda la trayectoria.
  typical_range: 10³ Pa a 10⁷ Pa
  sign_behavior:
    has_sign: false
    meaning:
      es: La presión termodinámica siempre es positiva.
      en: Thermodynamic pressure is always positive.
  zero_behavior:
    allowed: true
    meaning:
      es: Presión cero corresponde al vacío; en el diagrama p-V la trayectoria toca el eje horizontal.
      en: Zero pressure corresponds to vacuum; in the p-V diagram the path touches the horizontal axis.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - eje vertical del diagrama p-V
    secondary_for:
    - interpretación de la pendiente de la curva p(V)
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: En el diagrama p-V, la posición vertical de la curva representa la presión del gas. Una curva alta implica alta presión;
      una curva baja, baja presión.
    en: In the p-V diagram, the vertical position of the curve represents the gas pressure. A high curve implies high pressure;
      a low curve implies low pressure.
- id: volumen
  symbol: V
  nombre:
    es: Volumen
    en: Volume
  descripcion:
    es: Eje horizontal del diagrama p-V. El recorrido horizontal de la trayectoria determina ΔV.
    en: Horizontal axis of the p-V diagram. The horizontal extent of the path determines ΔV.
  unidad_si: m³
  dimension: '[L³]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - eje horizontal del diagrama p-V
  - límites de integración para el cálculo del trabajo
  common_mistake: Confundir V absoluto con ΔV; el trabajo depende del recorrido horizontal, no del volumen absoluto.
  typical_range: 10⁻⁶ m³ a 1 m³
  sign_behavior:
    has_sign: false
    meaning:
      es: El volumen absoluto siempre es positivo.
      en: Absolute volume is always positive.
  zero_behavior:
    allowed: false
    meaning:
      es: Volumen nulo es físicamente imposible para un sistema macroscópico.
      en: Zero volume is physically impossible for a macroscopic system.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - eje horizontal del diagrama p-V
    secondary_for: []
  graph_binding:
    channels:
    - x_axis
  pedagogical_notes:
    es: En el diagrama p-V, la posición horizontal representa el volumen del gas. El desplazamiento horizontal entre estado
      inicial y final es ΔV.
    en: In the p-V diagram, the horizontal position represents the gas volume. The horizontal displacement between initial
      and final states is ΔV.
- id: trabajo_neto_del_ciclo
  symbol: W_{ciclo}
  nombre:
    es: Trabajo neto del ciclo
    en: Net cycle work
  descripcion:
    es: Trabajo total realizado en un ciclo cerrado de estados termodinámicos; geométricamente equivale al área encerrada
      por la curva del ciclo en el diagrama p-V.
    en: Total work done in a closed cycle of thermodynamic states; geometrically equal to the area enclosed by the cycle curve
      in the p-V diagram.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: derived
  physical_role: supporting_quantity
  used_in:
  - análisis de ciclos de motor y refrigeración
  - eficiencia de ciclos termodinámicos
  common_mistake: Calcular el trabajo del ciclo como la suma de los trabajos en cada proceso sin respetar los signos.
  typical_range: 100 J a 10⁶ J en motores
  sign_behavior:
    has_sign: true
    meaning:
      es: 'Ciclo recorrido en sentido horario: [[W_ciclo]] > 0 (motor). Ciclo antihorario: [[W_ciclo]] < 0 (refrigerador o
        bomba de calor).'
      en: 'Clockwise cycle: [[W_ciclo]] > 0 (engine). Counter-clockwise cycle: [[W_ciclo]] < 0 (refrigerator or heat pump).'
  zero_behavior:
    allowed: false
    meaning:
      es: Trabajo neto nulo solo en ciclos degenerados (área cero) o cuando los trabajos de ida y vuelta se cancelan exactamente.
      en: Zero net work only in degenerate cycles (zero area) or when forward and reverse works cancel exactly.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - lectura del área del ciclo en el diagrama p-V
    - determinación de si el ciclo es motor o refrigerador
    secondary_for: []
  graph_binding:
    channels:
    - enclosed_area
  pedagogical_notes:
    es: '[[W_ciclo]] como área del ciclo es la herramienta visual más poderosa del diagrama p-V: sin calcular ninguna integral,
      el área encierra el trabajo neto del ciclo.'
    en: '[[W_ciclo]] as cycle area is the most powerful visual tool of the p-V diagram: without computing any integral, the
      enclosed area gives the net cycle work.'
