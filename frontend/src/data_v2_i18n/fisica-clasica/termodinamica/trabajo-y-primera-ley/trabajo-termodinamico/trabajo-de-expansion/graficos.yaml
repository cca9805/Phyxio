version: "1.0"
leaf: "trabajo-de-expansion"

coord:
  title:
    es: Diagrama p-V · Trabajo de expansión
    en: p-V Diagram · Expansion work
  xAxis:
    es: volumen V (m³)
    en: volume V (m³)
  yAxis:
    es: presión p (Pa)
    en: pressure p (Pa)
  xMagnitude: volumen
  yMagnitude: presion
  relation:
    es: W = p·ΔV (isobárico) o W = ∫p dV (general). El área bajo la curva p(V) entre V_i y V_f es exactamente el trabajo de expansión.
    en: W = p·ΔV (isobaric) or W = ∫p dV (general). The area under the p(V) curve between V_i and V_f is exactly the expansion work.
  physicalReading:
    es: "Proceso isobárico: línea horizontal, área = rectángulo p × ΔV. Expansión (ΔV > 0): W > 0. Compresión (ΔV < 0): W < 0."
    en: "Isobaric process: horizontal line, area = rectangle p × ΔV. Expansion (ΔV > 0): W > 0. Compression (ΔV < 0): W < 0."
  slopeMeaning:
    es: "dp/dV: cero para isobárico, infinita para isocórico, negativa para isotérmico y adiabático."
    en: "dp/dV: zero for isobaric, infinite for isochoric, negative for isothermal and adiabatic."
  interceptMeaning:
    es: Estado inicial (V_i, p_i) del proceso en el diagrama.
    en: Initial state (V_i, p_i) of the process in the diagram.
  curvatureMeaning:
    es: Cero para isobárico, positiva para isotérmico (hipérbola), mayor para adiabático.
    en: Zero for isobaric, positive for isothermal (hyperbola), greater for adiabatic.
  signMeaning:
    es: "W > 0 si el recorrido va hacia la derecha (expansión). W < 0 si va hacia la izquierda (compresión)."
    en: "W > 0 if path goes rightward (expansion). W < 0 if leftward (compression)."
  areaMeaning:
    es: Área bajo la curva = trabajo de expansión exacto (no aproximación).
    en: Area under curve = exact expansion work (not an approximation).
  domainMeaning:
    es: "V > 0, p > 0. Válido para procesos cuasi-estáticos."
    en: "V > 0, p > 0. Valid for quasi-static processes."
  modelConnection:
    es: Gas ideal cuasi-estático. Para proceso isobárico, W = p·ΔV exactamente.
    en: Quasi-static ideal gas. For isobaric process, W = p·ΔV exactly.
  formulaConnection:
    es: W = p·ΔV (isobárico), W = ∫p dV (general).
    en: W = p·ΔV (isobaric), W = ∫p dV (general).
  readingFocus:
    es: identificar el proceso por la forma de la curva, leer el área como trabajo exacto y verificar el signo por la dirección del recorrido.
    en: identify the process from the curve shape, read the area as exact work, and verify the sign from the path direction.
  agentHints:
    es:
      - Isobárico = recta horizontal; área es rectángulo p × ΔV.
      - "Derecha = expansión = W > 0."
      - W depende de la trayectoria, no solo de los estados inicial y final.
    en:
      - Isobaric = horizontal line; area is rectangle p × ΔV.
      - "Rightward = expansion = W > 0."
      - W depends on the path, not only on the initial and final states.
  commonMistakes:
    es:
      - Aplicar W = p·ΔV cuando la presión varía.
      - Calcular ΔV como V_i − V_f (signo invertido).
      - Creer que el área es una aproximación.
    en:
      - Applying W = p·ΔV when pressure varies.
      - Computing ΔV as V_i − V_f (inverted sign).
      - Believing the area is an approximation.
