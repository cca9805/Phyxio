magnitudes:
- id: trabajo_termodinamico
  symbol: W
  nombre:
    es: Trabajo termodinámico
    en: Thermodynamic work
  descripcion:
    es: Energía transferida por el sistema al entorno (o viceversa) mediante la variación de volumen a través de la fuerza
      de presión sobre un émbolo o frontera móvil.
    en: Energy transferred from the system to the surroundings (or vice versa) via volume change through the pressure force
      on a piston or moving boundary.
  unidad_si: J
  dimension: '[M L² T⁻²]'
  is_vector: false
  components: []
  category: process
  physical_role: core_physical_quantity
  used_in:
  - primera ley de la termodinámica
  - cálculo de trabajo en procesos isobáricos, adiabáticos e isotérmicos
  common_mistake: Confundir el trabajo realizado por el gas con el trabajo realizado sobre el gas; ambos tienen el mismo módulo
    pero signos opuestos según la convención elegida.
  typical_range: −10⁶ J a +10⁶ J en procesos industriales; ±1 kJ en experimentos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'W > 0: el sistema realiza trabajo sobre el entorno (expansión). W < 0: el entorno realiza trabajo sobre el sistema
        (compresión). La convención estándar en termodinámica química es W = −p·ΔV (trabajo realizado sobre el sistema).'
      en: 'W > 0: the system does work on the surroundings (expansion). W < 0: the surroundings do work on the system (compression).
        The standard chemistry convention is W = −p·ΔV (work done on the system).'
  zero_behavior:
    allowed: true
    meaning:
      es: W nulo implica que no hay desplazamiento de la frontera (proceso isocórico o volumen fijo). También cuando la presión
        externa es cero (expansión libre).
      en: Zero W means no boundary displacement (isochoric process or fixed volume). Also when external pressure is zero (free
        expansion).
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - cálculo de energía transferida mecánicamente en procesos termodinámicos
    - balance energético con la primera ley
    secondary_for:
    - interpretación del área bajo la curva en diagramas p-V
  graph_binding:
    channels:
    - area_under_curve
  pedagogical_notes:
    es: 'W es el resultado de una interacción entre el sistema y el entorno a través de la frontera móvil. No es una propiedad
      de estado sino una magnitud de proceso: depende de la trayectoria, no solo de los estados inicial y final.'
    en: 'W is the result of an interaction between the system and surroundings through the moving boundary. It is not a state
      property but a process quantity: it depends on the path, not only on the initial and final states.'
- id: presion
  symbol: p
  nombre:
    es: Presión
    en: Pressure
  descripcion:
    es: Fuerza por unidad de área ejercida por el fluido sobre la frontera del sistema. En procesos isobáricos es constante;
      en procesos generales es una función del volumen.
    en: Force per unit area exerted by the fluid on the system boundary. Constant in isobaric processes; a function of volume
      in general processes.
  unidad_si: Pa
  dimension: '[M L⁻¹ T⁻²]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - trabajo de expansión isobárico
  - trabajo en proceso general (integral p dV)
  common_mistake: Confundir presión interna del gas con presión externa del émbolo en procesos irreversibles; solo la presión
    externa determina el trabajo mecánico real.
  typical_range: 10³ Pa a 10⁷ Pa en procesos de laboratorio e industriales
  sign_behavior:
    has_sign: false
    meaning:
      es: La presión termodinámica es siempre positiva; es una magnitud escalar intensiva.
      en: Thermodynamic pressure is always positive; it is a positive scalar intensive quantity.
  zero_behavior:
    allowed: true
    meaning:
      es: Presión nula corresponde al vacío perfecto; en expansión libre p = 0 y W = 0 aunque el volumen cambie.
      en: Zero pressure corresponds to perfect vacuum; in free expansion p = 0 and W = 0 even though volume changes.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: '[0, +inf)'
  interpretation_role:
    primary_for:
    - cálculo de W = p·ΔV en proceso isobárico
    - integración p dV en proceso general
    secondary_for: []
  graph_binding:
    channels:
    - y_axis
  pedagogical_notes:
    es: En el diagrama p-V, p es el eje vertical. La forma de la curva p(V) determina la trayectoria del proceso y, por tanto,
      el área bajo la curva que equivale al trabajo.
    en: In the p-V diagram, p is the vertical axis. The shape of the p(V) curve determines the process path and hence the
      area under the curve equal to work.
- id: volumen
  symbol: V
  nombre:
    es: Volumen
    en: Volume
  descripcion:
    es: Espacio ocupado por el sistema termodinámico; su variación ΔV determina si el proceso es expansión (ΔV > 0) o compresión
      (ΔV < 0).
    en: Space occupied by the thermodynamic system; its change ΔV determines whether the process is expansion (ΔV > 0) or
      compression (ΔV < 0).
  unidad_si: m³
  dimension: '[L³]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - cálculo de trabajo de expansión
  - ecuaciones de estado (gas ideal)
  common_mistake: Confundir ΔV con V; el trabajo de expansión depende de la variación de volumen, no del volumen absoluto.
  typical_range: 10⁻³ m³ a 1 m³ en experimentos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔV > 0: expansión. ΔV < 0: compresión. V absoluto siempre positivo.'
      en: 'ΔV > 0: expansion. ΔV < 0: compression. Absolute V always positive.'
  zero_behavior:
    allowed: false
    meaning:
      es: Volumen nulo es físicamente imposible para un sistema macroscópico.
      en: Zero volume is physically impossible for a macroscopic system.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - cálculo de ΔV para trabajo isobárico
    - eje horizontal del diagrama p-V
    secondary_for: []
  graph_binding:
    channels:
    - x_axis
  pedagogical_notes:
    es: En el diagrama p-V, V es el eje horizontal. La distancia horizontal entre estado inicial y final es ΔV; el área entre
      la curva y el eje x es el trabajo.
    en: In the p-V diagram, V is the horizontal axis. The horizontal distance between initial and final state is ΔV; the area
      between the curve and the x-axis is the work.
- id: variacion_de_volumen
  symbol: \Delta V
  nombre:
    es: Variación de volumen
    en: Volume change
  descripcion:
    es: Diferencia entre el volumen final y el volumen inicial del sistema; directamente proporcional al trabajo en procesos
      isobáricos.
    en: Difference between the final and initial volume of the system; directly proportional to work in isobaric processes.
  unidad_si: m³
  dimension: '[L³]'
  is_vector: false
  components: []
  category: derived
  physical_role: supporting_quantity
  used_in:
  - cálculo directo de W = p·ΔV en proceso isobárico
  common_mistake: Calcular ΔV como V_inicial menos V_final en lugar de V_final menos V_inicial, invirtiendo el signo del trabajo.
  typical_range: −1 m³ a +1 m³ en experimentos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔV > 0: expansión (W > 0 con convención física). ΔV < 0: compresión (W < 0).'
      en: 'ΔV > 0: expansion (W > 0 with physics convention). ΔV < 0: compression (W < 0).'
  zero_behavior:
    allowed: true
    meaning:
      es: 'ΔV nulo: proceso isocórico, sin trabajo de expansión.'
      en: 'Zero ΔV: isochoric process, no expansion work.'
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - cálculo de W = p·ΔV
    secondary_for: []
  graph_binding:
    channels:
    - horizontal_span
  pedagogical_notes:
    es: ΔV es la magnitud más directamente operativa para calcular el trabajo en un proceso isobárico. Verificar siempre que
      ΔV = V_f − V_i.
    en: ΔV is the most directly operational quantity for computing work in an isobaric process. Always verify that ΔV = V_f
      − V_i.
