version: "1.0"
leaf: "conduccion"

coord:
  title:
    es: Conducción térmica · Flujo de calor frente a diferencia de temperatura
    en: Thermal conduction · Heat flow versus temperature difference
  xAxis:
    es: Diferencia de temperatura ΔT (K)
    en: Temperature difference ΔT (K)
  yAxis:
    es: Flujo de calor por conducción Q/t (W)
    en: Conductive heat flow Q/t (W)
  xMagnitude: diferencia_temperatura
  yMagnitude: potencia_termica
  relation:
    es: P = k·A·ΔT/L. Potencia térmica proporcional a la diferencia de temperatura.
    en: P = k·A·ΔT/L. Thermal power proportional to temperature difference.
  physicalReading:
    es: Pendiente = k·A/L. Intercepto en origen.
    en: Slope = k·A/L. Intercept at origin.
  slopeMeaning:
    es: "dP/dΔT = k·A/L: conductancia térmica."
    en: "dP/dΔT = k·A/L: thermal conductance."
  interceptMeaning:
    es: "P(0) = 0: sin diferencia de temperatura no hay flujo."
    en: "P(0) = 0: no temperature difference means no flow."
  curvatureMeaning:
    es: "Recta: relación lineal de Fourier."
    en: "Straight: Fourier linear relation."
  signMeaning:
    es: "P > 0: calor fluye de caliente a frío."
    en: "P > 0: heat flows from hot to cold."
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: "ΔT > 0 K, k > 0, A > 0, L > 0."
    en: "ΔT > 0 K, k > 0, A > 0, L > 0."
  modelConnection:
    es: Ley de Fourier de conducción térmica.
    en: "Fourier's law of heat conduction."
  formulaConnection:
    es: P = k·A·ΔT/L, Φ = P/A, R = L/(k·A).
    en: P = k·A·ΔT/L, Φ = P/A, R = L/(k·A).
  readingFocus:
    es: leer pendiente como conductancia y verificar linealidad.
    en: read slope as conductance and verify linearity.
  agentHints:
    es:
      - La gráfica representa una relación lineal entre la diferencia de temperatura y el flujo de calor conducido cuando el material, el área y el espesor permanecen constantes.
      - Una pendiente mayor indica mayor conductividad térmica, mayor área de contacto o menor espesor del material.
      - Si ΔT es cero, no hay flujo neto de calor por conducción entre los extremos del cuerpo.
    en:
      - The graph represents a linear relationship between temperature difference and conductive heat flow when material, area, and thickness remain constant.
      - A steeper slope indicates higher thermal conductivity, larger contact area, or smaller material thickness.
      - If ΔT is zero, there is no net conductive heat flow between the ends of the body.
  commonMistakes:
    es:
      - Confundir P con Φ (flujo por área).
      - Usar cm² sin convertir a m².
    en:
      - Confusing P with Φ (flux per area).
      - Using cm² without converting to m².
