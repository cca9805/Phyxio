version: '1.0'
leaf: aplicaciones-del-principio-de-conservacion
coord:
  id: aplicaciones-del-principio-de-conservacion-Coord
  graphId: aplicaciones-del-principio-de-conservacion-Coord
  title:
    es: Gráfica Coord · Aplicaciones del Principio de Conservación
    en: Coord Graph · Applications of the Conservation Principle
  xAxis:
    es: tiempo t (s) o parámetro del proceso
    en: time t (s) or process parameter
  yAxis:
    es: momento lineal total p_total (kg·m/s)
    en: total linear momentum p_total (kg·m/s)
  xMagnitude: t
  yMagnitude: p_total
  relation:
    es: En cada aplicación del principio, el momento total permanece constante durante
      el proceso (colisión, explosión, separación) si no hay fuerza externa neta.
    en: In each application of the principle, total momentum remains constant during
      the process (collision, explosion, separation) if there is no net external force.
  physicalReading:
    es: 'La gráfica es horizontal durante el proceso de interés: los momentos individuales
      cambian pero su suma vectorial no.'
    en: 'The graph is horizontal during the process of interest: individual momenta
      change but their vector sum does not.'
  slopeMeaning:
    es: La pendiente debe ser nula en los intervalos donde se aplica la conservación.
      Una pendiente no nula indica una fuerza externa que no se ha considerado.
    en: The slope must be zero in the intervals where conservation applies. A nonzero
      slope indicates an external force that has not been accounted for.
  interceptMeaning:
    es: El nivel horizontal de la curva es el momento total del sistema, que es la
      condición inicial del problema.
    en: The horizontal level of the curve is the total system momentum, which is the
      initial condition of the problem.
  curvatureMeaning:
    es: La gráfica debe ser plana (cero pendiente). Desviaciones pequeñas pueden indicar
      rozamiento, gravedad o impulsos externos menores.
    en: The graph must be flat (zero slope). Small deviations may indicate friction,
      gravity, or minor external impulses.
  signMeaning:
    es: El signo del momento total refleja el sentido del movimiento del centro de
      masas, que permanece constante si no hay fuerzas externas.
    en: The sign of total momentum reflects the direction of center-of-mass motion,
      which remains constant in the absence of external forces.
  areaMeaning:
    es: Sin interpretación directa en una gráfica de momento-tiempo constante.
    en: No direct interpretation for a constant momentum-time graph.
  domainMeaning:
    es: La conservación es exacta solo durante el proceso y solo si las condiciones
      de aislamiento se cumplen en ese intervalo.
    en: Conservation is exact only during the process and only if isolation conditions
      are met in that interval.
  modelConnection:
    es: 'Se interpreta bajo el principio de conservación del momento en procesos mecánicos:
      colisiones, explosiones, separaciones y dispersiones.'
    en: 'Interpreted within the conservation of momentum principle in mechanical processes:
      collisions, explosions, separations, and scatterings.'
  formulaConnection:
    es: Conecta con Σp_antes = Σp_después y con los sistemas de ecuaciones por componentes
      en colisiones 2D.
    en: Connects to Σp_before = Σp_after and the component-wise equation systems for
      2D collisions.
  readingFocus:
    es: verificar que la curva es horizontal durante el proceso y usar el valor constante
      como condición para resolver el problema.
    en: verify that the curve is horizontal during the process and use the constant
      value as the condition to solve the problem.
  agentHints:
    es:
    - En colisiones y explosiones, la conservación del momento es la ecuación fundamental
      que conecta el estado inicial con el final.
    - En 2D se conservan independientemente la componente x y la componente y del
      momento.
    - La gráfica horizontal confirma que se puede plantear p_inicial = p_final para
      resolver el problema.
    en:
    - In collisions and explosions, momentum conservation is the fundamental equation
      linking initial and final states.
    - In 2D, the x and y components of momentum are conserved independently.
    - A horizontal graph confirms that p_initial = p_final can be set up to solve
      the problem.
  commonMistakes:
    es:
    - Aplicar la conservación sin verificar que el proceso sea lo suficientemente
      breve para ignorar fuerzas externas.
    - Sumar magnitudes escalares en lugar de componentes vectoriales.
    - Olvidar el signo de los momentos individuales cuando los cuerpos se mueven en
      sentidos opuestos.
    en:
    - Applying conservation without verifying that the process is brief enough to
      neglect external forces.
    - Adding scalar magnitudes instead of vector components.
    - Forgetting the sign of individual momenta when bodies move in opposite directions.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
