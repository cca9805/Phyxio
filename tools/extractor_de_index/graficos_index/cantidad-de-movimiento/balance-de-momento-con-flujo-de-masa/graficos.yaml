version: '1.0'
leaf: balance-de-momento-con-flujo-de-masa
coord:
  id: balance-de-momento-con-flujo-de-masa-Coord
  graphId: balance-de-momento-con-flujo-de-masa-Coord
  title:
    es: Gráfica Coord · Balance de Momento con Flujo de Masa
    en: Coord Graph · Momentum Balance with Mass Flow
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: momento del sistema variable p(t) (kg·m/s)
    en: variable-mass system momentum p(t) (kg·m/s)
  xMagnitude: t
  yMagnitude: p
  relation:
    es: En un sistema con masa variable, el momento cambia tanto por la fuerza aplicada
      como por el flujo de masa que entra o sale. La ecuación fundamental es F + v_rel·(dm/dt)
      = m·(dv/dt).
    en: In a variable-mass system, momentum changes due to both the applied force
      and the mass flow entering or leaving. The fundamental equation is F + v_rel·(dm/dt)
      = m·(dv/dt).
  physicalReading:
    es: La pendiente de la curva p(t) no es constante porque la masa del sistema cambia.
      El momento puede aumentar aunque la velocidad disminuya si la masa sigue siendo
      grande.
    en: The slope of p(t) is not constant because the system mass changes. Momentum
      can increase even if velocity decreases when the remaining mass is still large.
  slopeMeaning:
    es: 'La pendiente dp/dt es la fuerza neta aplicada al sistema más la contribución
      del flujo de masa: dp/dt = F_ext + ṁ·v_expulsado.'
    en: 'The slope dp/dt is the net force on the system plus the mass-flow contribution:
      dp/dt = F_ext + ṁ·v_exhaust.'
  interceptMeaning:
    es: El valor inicial p(0) es el momento del sistema antes de comenzar el flujo
      de masa.
    en: The initial value p(0) is the system momentum before mass flow begins.
  curvatureMeaning:
    es: La curvatura indica cambio en la tasa de expulsión de masa o en la fuerza
      aplicada. Para cohete con empuje constante, la curva tiene forma específica
      por la variación logarítmica de la velocidad.
    en: Curvature indicates a change in mass expulsion rate or applied force. For
      a rocket with constant thrust, the curve has a specific shape due to the logarithmic
      velocity variation.
  signMeaning:
    es: El signo del momento indica el sentido del movimiento del sistema. La expulsión
      de masa en sentido contrario aumenta el momento en la dirección de movimiento.
    en: The sign of momentum indicates the direction of system motion. Expelling mass
      in the opposite direction increases momentum in the direction of motion.
  areaMeaning:
    es: El área bajo la curva F-t contribuye al cambio de momento, junto con el término
      de flujo de masa.
    en: The area under the F-t curve contributes to the momentum change, together
      with the mass-flow term.
  domainMeaning:
    es: Válido mientras la masa sea positiva y la velocidad relativa de expulsión
      sea constante. Se invalida cuando m → 0.
    en: Valid as long as mass is positive and exhaust velocity is constant. It breaks
      down when m → 0.
  modelConnection:
    es: Se interpreta bajo la ecuación de movimiento de Meshchersky para sistemas
      de masa variable.
    en: Interpreted within the Meshchersky equation of motion for variable-mass systems.
  formulaConnection:
    es: Conecta con F + v_rel·ṁ = m·a (ecuación de Meshchersky) y con la ecuación
      del cohete de Tsiolkovsky.
    en: Connects to F + v_rel·ṁ = m·a (Meshchersky equation) and the Tsiolkovsky rocket
      equation.
  readingFocus:
    es: leer la variación del momento identificando qué fracción se debe a la fuerza
      externa y cuál al flujo de masa expulsado.
    en: read the momentum variation identifying which fraction is due to external
      force and which to expelled mass flow.
  agentHints:
    es:
    - El término de flujo de masa v_rel·ṁ actúa como una fuerza adicional (empuje)
      sobre el sistema.
    - 'La masa variable complica el análisis: no se puede aplicar F = m·a directamente.'
    - En un cohete, la disminución de masa por expulsión de combustible es lo que
      genera el empuje.
    en:
    - The mass-flow term v_rel·ṁ acts as an additional thrust force on the system.
    - 'Variable mass complicates the analysis: F = m·a cannot be applied directly.'
    - In a rocket, the mass decrease due to fuel expulsion is what generates thrust.
  commonMistakes:
    es:
    - Aplicar F = ma directamente a un sistema de masa variable.
    - Confundir la velocidad de expulsión del gas con la velocidad del cohete.
    - Ignorar el signo de la velocidad relativa de expulsión al calcular el empuje.
    en:
    - Applying F = ma directly to a variable-mass system.
    - Confusing the exhaust velocity with the rocket's velocity.
    - Ignoring the sign of the relative exhaust velocity when computing thrust.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: balance-de-momento-con-flujo-de-masa-Svg
  graphId: balance-de-momento-con-flujo-de-masa-Svg
  title:
    es: Escena SVG · Balance de Momento con Flujo de Masa
    en: SVG Scene · Momentum Balance with Mass Flow
  sceneId: balance_momento_flujo_masa
  sceneLabel:
    es: Sistema con masa que varía por flujo de masa entrante o saliente
    en: System with mass varying due to incoming or outgoing mass flow
  objects:
    es:
    - sistema principal
    - flujo de masa entrante o saliente
    - vectores de momento
    - indicador de masa
    en:
    - main system
    - incoming or outgoing mass flow
    - momentum vectors
    - mass indicator
  mainObject:
    es: sistema con masa variable
    en: variable-mass system
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra un sistema que gana o pierde masa continuamente, con los
      vectores de momento del sistema y del flujo de masa.
    en: The scene shows a system continuously gaining or losing mass, with momentum
      vectors of the system and the mass flow.
  interactions:
    es: El flujo de masa transfiere momento al sistema o lo retira. La variación del
      momento del sistema depende de la velocidad relativa del flujo de masa.
    en: The mass flow transfers momentum to the system or removes it. The system's
      momentum change depends on the relative velocity of the mass flow.
  modelElements:
    es:
    - masa del sistema m(t)
    - tasa de flujo ṁ
    - velocidad relativa v_rel
    - vector de empuje
    en:
    - system mass m(t)
    - flow rate ṁ
    - relative velocity v_rel
    - thrust vector
  visualCues:
    es:
    - La masa del sistema disminuye o aumenta visualmente con el tiempo.
    - El vector de empuje es opuesto a la dirección de expulsión de masa.
    - El momento del sistema cambia aunque no haya fuerzas externas si hay flujo de
      masa.
    en:
    - The system mass visually decreases or increases over time.
    - The thrust vector is opposite to the direction of mass expulsion.
    - The system momentum changes even without external forces if there is mass flow.
  scaleMeaning:
    es: 'La escena es cualitativa: ilustra la dirección del flujo de masa y el sentido
      del empuje resultante.'
    en: 'The scene is qualitative: it illustrates the direction of mass flow and the
      resulting thrust direction.'
  relation:
    es: 'La escena ilustra el principio de acción-reacción aplicado a sistemas de
      masa variable: la expulsión de masa en un sentido produce empuje en el sentido
      contrario.'
    en: 'The scene illustrates the action-reaction principle applied to variable-mass
      systems: expelling mass in one direction produces thrust in the opposite direction.'
  physicalReading:
    es: Identificar la dirección del flujo de masa y deducir la dirección del empuje
      que recibe el sistema.
    en: Identify the direction of mass flow and deduce the direction of the resulting
      thrust on the system.
  modelConnection:
    es: Se interpreta bajo la ecuación de Meshchersky para sistemas de masa variable.
    en: Interpreted within the Meshchersky equation for variable-mass systems.
  formulaConnection:
    es: Conecta con el empuje T = −v_rel·(dm/dt) y con la ecuación de movimiento de
      sistemas de masa variable.
    en: Connects to the thrust T = −v_rel·(dm/dt) and the variable-mass equation of
      motion.
  readingFocus:
    es: identificar el flujo de masa y su velocidad relativa para deducir el empuje
      y el cambio de momento del sistema.
    en: identify the mass flow and its relative velocity to deduce the thrust and
      the system's momentum change.
  agentHints:
    es:
    - 'El empuje es la reacción al flujo de masa: si expulsas masa hacia atrás, el
      sistema acelera hacia adelante.'
    - El principio de conservación del momento se aplica al sistema completo (cohete
      + gas expulsado).
    - La tasa de cambio de masa dm/dt debe incluirse en el balance de momento.
    en:
    - 'Thrust is the reaction to mass flow: expelling mass backward accelerates the
      system forward.'
    - Momentum conservation applies to the complete system (rocket + expelled gas).
    - The mass change rate dm/dt must be included in the momentum balance.
  commonMistakes:
    es:
    - Ignorar el flujo de masa y aplicar F = ma directamente al sistema.
    - No considerar la velocidad relativa del flujo de masa en el cálculo del empuje.
    - Confundir el sistema de masa variable con un sistema aislado.
    en:
    - Ignoring the mass flow and applying F = ma directly to the system.
    - Not considering the relative velocity of the mass flow when computing thrust.
    - Confusing a variable-mass system with an isolated system.
  recommendedTab: graficas
