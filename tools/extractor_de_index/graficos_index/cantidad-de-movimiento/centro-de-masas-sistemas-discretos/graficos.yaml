version: '1.0'
leaf: centro-de-masas-sistemas-discretos
coord:
  id: centro-de-masas-sistemas-discretos-Coord
  graphId: centro-de-masas-sistemas-discretos-Coord
  title:
    es: Gráfica Coord · Centro de Masas en Sistemas Discretos
    en: Coord Graph · Center of Mass in Discrete Systems
  xAxis:
    es: posición de la partícula x_i (m)
    en: particle position x_i (m)
  yAxis:
    es: posición del centro de masas x_cm (m)
    en: center-of-mass position x_cm (m)
  xMagnitude: x_i
  yMagnitude: x_cm
  relation:
    es: 'En sistemas con varias partículas discretas, el centro de masas es el promedio
      ponderado de todas las posiciones: x_cm = Σ(m_i·x_i)/M.'
    en: 'For systems with multiple discrete particles, the center of mass is the mass-weighted
      average of all positions: x_cm = Σ(m_i·x_i)/M.'
  physicalReading:
    es: Al variar la posición de una partícula, el centro de masas se desplaza linealmente.
      La pendiente es m_i/M, que mide la influencia de esa partícula sobre el conjunto.
    en: When one particle's position changes, the center of mass shifts linearly.
      The slope m_i/M measures that particle's influence on the system.
  slopeMeaning:
    es: La pendiente m_i/M cuantifica cuánto se mueve el centro de masas cuando se
      desplaza la partícula i una unidad.
    en: The slope m_i/M quantifies how much the center of mass moves when particle
      i is displaced by one unit.
  interceptMeaning:
    es: El intercepto refleja la contribución ponderada del resto de partículas cuando
      x_i = 0.
    en: The intercept reflects the weighted contribution of the remaining particles
      when x_i = 0.
  curvatureMeaning:
    es: La relación es estrictamente lineal para sistemas discretos con masas constantes.
    en: The relationship is strictly linear for discrete systems with constant masses.
  signMeaning:
    es: El signo indica la dirección del desplazamiento del centro de masas al mover
      la partícula.
    en: The sign indicates the direction of center-of-mass displacement when the particle
      is moved.
  areaMeaning:
    es: Sin interpretación directa en esta gráfica de posición.
    en: No direct interpretation for this position graph.
  domainMeaning:
    es: Válido para sistemas con un número finito de partículas puntuales y masas
      constantes.
    en: Valid for systems with a finite number of point particles and constant masses.
  modelConnection:
    es: Se interpreta bajo la mecánica clásica de sistemas de partículas con el modelo
      de partícula puntual.
    en: Interpreted within classical mechanics of particle systems using the point-particle
      model.
  formulaConnection:
    es: Conecta con x_cm = Σ(m_i·x_i)/M y con el tensor de inercia en problemas de
      rotación.
    en: Connects to x_cm = Σ(m_i·x_i)/M and the inertia tensor in rotational problems.
  readingFocus:
    es: leer la pendiente como peso relativo de la partícula sobre el conjunto y comparar
      sistemas con distinta distribución de masas.
    en: read the slope as the particle's relative weight in the system and compare
      systems with different mass distributions.
  agentHints:
    es:
    - En un sistema de n partículas, hay n rectas posibles dependiendo de qué partícula
      se mueve.
    - La pendiente más alta corresponde a la partícula más pesada.
    - Para un sistema de dos partículas, las pendientes suman 1 (m_1/M + m_2/M = 1).
    en:
    - For an n-particle system, there are n possible lines depending on which particle
      is moved.
    - The steepest slope corresponds to the heaviest particle.
    - For a two-particle system, the slopes sum to 1 (m_1/M + m_2/M = 1).
  commonMistakes:
    es:
    - Sumar posiciones sin ponderar por masas.
    - Confundir el número de partículas con el peso de cada una en el promedio.
    - Olvidar actualizar el centro de masas si se añade o elimina una partícula del
      sistema.
    en:
    - Summing positions without weighting by mass.
    - Confusing the number of particles with each one's weight in the average.
    - Forgetting to update the center of mass when a particle is added or removed.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: centro-de-masas-sistemas-discretos-Svg
  graphId: centro-de-masas-sistemas-discretos-Svg
  title:
    es: Escena SVG · Centro de Masas en Sistemas Discretos
    en: SVG Scene · Center of Mass in Discrete Systems
  sceneId: cm_sistemas_discretos
  sceneLabel:
    es: Distribución de partículas puntuales con centro de masas marcado
    en: Distribution of point particles with center of mass marked
  objects:
    es:
    - partículas m_1, m_2, ...
    - punto del centro de masas
    - ejes de posición x e y
    en:
    - particles m_1, m_2, ...
    - center-of-mass point
    - position axes x and y
  mainObject:
    es: conjunto de partículas con su centro de masas
    en: particle assembly with its center of mass
  referenceFrame:
    es: sistema de coordenadas cartesianas fijas al laboratorio
    en: Cartesian coordinate system fixed to the laboratory
  geometry:
    es: Las partículas están distribuidas en el plano y el centro de masas aparece
      marcado como el punto de equilibrio ponderado del sistema.
    en: The particles are distributed in the plane and the center of mass is marked
      as the mass-weighted equilibrium point of the system.
  interactions:
    es: No se representan fuerzas; la escena es geométrica y muestra la posición de
      equilibrio de inercia del sistema.
    en: No forces are depicted; the scene is geometric and shows the system's inertial
      equilibrium position.
  modelElements:
    es:
    - posiciones 2D de cada partícula
    - masas m_i como tamaño relativo de los puntos
    - punto x_cm, y_cm
    en:
    - 2D positions of each particle
    - masses m_i as relative point sizes
    - center-of-mass point x_cm, y_cm
  visualCues:
    es:
    - El centro de masas está dentro del polígono convexo que forman las partículas.
    - Las partículas más masivas atraen el centro de masas hacia ellas.
    - Si las partículas están simétricamente distribuidas con igual masa, el centro
      de masas coincide con el centroide geométrico.
    en:
    - The center of mass lies within the convex polygon formed by the particles.
    - More massive particles attract the center of mass toward them.
    - For symmetrically distributed equal-mass particles, the center of mass coincides
      with the geometric centroid.
  scaleMeaning:
    es: La escena es proporcional en posición; el tamaño de los puntos representa
      cualitativamente la masa relativa.
    en: The scene is proportional in position; point sizes qualitatively represent
      relative mass.
  relation:
    es: La escena ilustra el centro de masas de un sistema discreto como el punto
      de equilibrio de masas en 2D.
    en: The scene illustrates the center of mass of a discrete system as the mass
      equilibrium point in 2D.
  physicalReading:
    es: Identificar cuál partícula domina la posición del centro de masas por su mayor
      masa y cuantificar su influencia relativa.
    en: Identify which particle dominates the center-of-mass position by its greater
      mass and quantify its relative influence.
  modelConnection:
    es: 'Se interpreta bajo la fórmula del centro de masas en 2D: r_cm = Σ(m_i·r_i)/M.'
    en: 'Interpreted within the 2D center-of-mass formula: r_cm = Σ(m_i·r_i)/M.'
  formulaConnection:
    es: Conecta con r_cm = Σ(m_i·r_i)/M y con la dinámica del centro de masas F_ext
      = M·a_cm.
    en: Connects to r_cm = Σ(m_i·r_i)/M and the center-of-mass dynamics F_ext = M·a_cm.
  readingFocus:
    es: localizar el punto del centro de masas y verificar que está más cerca de las
      partículas más pesadas.
    en: locate the center-of-mass point and verify that it is closer to the heavier
      particles.
  agentHints:
    es:
    - El centro de masas puede estar fuera del cuerpo si el sistema tiene forma cóncava.
    - La aceleración del centro de masas solo depende de la fuerza externa neta.
    - Añadir o quitar una partícula desplaza el centro de masas hacia la nueva partícula
      o lejos de la eliminada.
    en:
    - The center of mass can lie outside the body if the system has a concave shape.
    - The center-of-mass acceleration depends only on the net external force.
    - Adding or removing a particle shifts the center of mass toward the new particle
      or away from the removed one.
  commonMistakes:
    es:
    - Situar el centro de masas en el centroide geométrico sin considerar las masas.
    - Pensar que el centro de masas debe estar sobre alguna de las partículas.
    - No actualizar el centro de masas cuando el número de partículas cambia.
    en:
    - Placing the center of mass at the geometric centroid without considering masses.
    - Assuming the center of mass must lie on one of the particles.
    - Failing to update the center of mass when the number of particles changes.
  recommendedTab: graficas
