version: '1.0'
leaf: coeficiente-de-restitucion
coord:
  id: coeficiente-de-restitucion-Coord
  graphId: coeficiente-de-restitucion-Coord
  title:
    es: Gráfica Coord · Coeficiente de Restitución
    en: Coord Graph · Coefficient of Restitution
  xAxis:
    es: velocidad relativa de impacto |v_rel_antes| (m/s)
    en: relative impact velocity |v_rel_before| (m/s)
  yAxis:
    es: velocidad relativa de separación |v_rel_después| (m/s)
    en: relative separation velocity |v_rel_after| (m/s)
  xMagnitude: v_rel_i
  yMagnitude: v_rel_f
  relation:
    es: 'El coeficiente de restitución e se define como la razón entre la velocidad
      relativa de separación y la velocidad relativa de impacto: e = |v_rel_después|/|v_rel_antes|.'
    en: 'The coefficient of restitution e is defined as the ratio of relative separation
      velocity to relative impact velocity: e = |v_rel_after|/|v_rel_before|.'
  physicalReading:
    es: La pendiente de la recta que pasa por el origen es el coeficiente de restitución
      e. e = 1 (elástica), 0 < e < 1 (inelástica), e = 0 (totalmente inelástica).
    en: The slope of the line through the origin is the coefficient of restitution
      e. e = 1 (elastic), 0 < e < 1 (inelastic), e = 0 (perfectly inelastic).
  slopeMeaning:
    es: La pendiente es el coeficiente de restitución e. Una pendiente de 1 indica
      rebote perfecto; 0 indica que los cuerpos se quedan unidos.
    en: The slope is the coefficient of restitution e. A slope of 1 indicates perfect
      rebound; 0 indicates bodies that stick together.
  interceptMeaning:
    es: 'La recta pasa por el origen: si la velocidad relativa de impacto es cero,
      la de separación también es cero.'
    en: 'The line passes through the origin: if relative impact velocity is zero,
      separation velocity is also zero.'
  curvatureMeaning:
    es: La relación es lineal para e constante. En la práctica, e puede variar con
      la velocidad de impacto.
    en: The relationship is linear for constant e. In practice, e may vary with impact
      velocity.
  signMeaning:
    es: 'Se usan magnitudes absolutas: la inversión del sentido ya está implícita
      en la definición de e.'
    en: 'Absolute magnitudes are used: the direction reversal is already implicit
      in the definition of e.'
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para colisiones en una dimensión con e constante. Para velocidades
      muy altas, los materiales deformables pueden tener e dependiente de la velocidad.
    en: Valid for one-dimensional collisions with constant e. At very high velocities,
      deformable materials may have velocity-dependent e.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión con coeficiente de restitución constante,
      que generaliza los casos elástico e inelástico.
    en: Interpreted within the constant-coefficient-of-restitution collision model,
      which generalizes the elastic and inelastic cases.
  formulaConnection:
    es: Conecta con e = (v₂' − v₁')/(v₁ − v₂) y con las fórmulas de velocidades finales
      en función de e.
    en: Connects to e = (v₂' − v₁')/(v₁ − v₂) and the final velocity formulas as a
      function of e.
  readingFocus:
    es: leer la pendiente como coeficiente de restitución y clasificar la colisión
      como elástica, inelástica o totalmente inelástica según su valor.
    en: read the slope as the coefficient of restitution and classify the collision
      as elastic, inelastic, or perfectly inelastic according to its value.
  agentHints:
    es:
    - 'El coeficiente e caracteriza la elasticidad del choque: es una propiedad del
      par de materiales en contacto.'
    - Para una pelota de tenis sobre hormigón, e ≈ 0.75; para arcilla, e ≈ 0.
    - Si se conoce e y las masas, se pueden calcular completamente las velocidades
      finales.
    en:
    - 'The coefficient e characterizes the elasticity of the collision: it is a property
      of the pair of materials in contact.'
    - For a tennis ball on concrete, e ≈ 0.75; for clay, e ≈ 0.
    - If e and the masses are known, the final velocities can be fully determined.
  commonMistakes:
    es:
    - Confundir e con la fracción de energía cinética conservada (que es e²).
    - Aplicar e usando velocidades absolutas en lugar de velocidades relativas.
    - Olvidar que e se define como la razón de velocidades relativas, no de velocidades
      individuales.
    en:
    - Confusing e with the fraction of kinetic energy conserved (which is e²).
    - Applying e using absolute velocities instead of relative velocities.
    - Forgetting that e is defined as the ratio of relative velocities, not of individual
      velocities.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
