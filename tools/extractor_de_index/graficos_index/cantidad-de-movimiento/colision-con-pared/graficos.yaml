version: '1.0'
leaf: colision-con-pared
coord:
  id: colision-con-pared-Coord
  graphId: colision-con-pared-Coord
  title:
    es: Gráfica Coord · Colisión con Pared
    en: Coord Graph · Collision with a Wall
  xAxis:
    es: velocidad de impacto v_i (m/s)
    en: impact velocity v_i (m/s)
  yAxis:
    es: velocidad de rebote v_f (m/s)
    en: rebound velocity v_f (m/s)
  xMagnitude: v_i
  yMagnitude: v_f
  relation:
    es: Al chocar con una pared rígida de masa infinita, la velocidad de rebote es
      v_f = −e·v_i. La recta tiene pendiente −e y pasa por el origen.
    en: When colliding with a rigid wall of infinite mass, the rebound velocity is
      v_f = −e·v_i. The line has slope −e and passes through the origin.
  physicalReading:
    es: 'La pendiente negativa indica inversión del sentido de movimiento. La magnitud
      de la pendiente es el coeficiente de restitución: e = 1 para rebote perfecto,
      e < 1 con pérdida de energía.'
    en: 'The negative slope indicates reversal of motion direction. The slope magnitude
      is the coefficient of restitution: e = 1 for perfect rebound, e < 1 with energy
      loss.'
  slopeMeaning:
    es: 'La pendiente es −e: cuanto más cercana a −1, más elástico es el rebote. Una
      pendiente de −0.5 significa que el cuerpo sale con la mitad de la velocidad.'
    en: 'The slope is −e: the closer to −1, the more elastic the rebound. A slope
      of −0.5 means the body leaves with half the speed.'
  interceptMeaning:
    es: 'La recta pasa por el origen: sin velocidad de impacto no hay rebote.'
    en: 'The line passes through the origin: no impact velocity means no rebound.'
  curvatureMeaning:
    es: La relación es estrictamente lineal para pared rígida y e constante.
    en: The relationship is strictly linear for a rigid wall and constant e.
  signMeaning:
    es: 'El cambio de signo es la característica definitoria del rebote: la velocidad
      invierte su dirección al rebotar en la pared.'
    en: 'The sign change is the defining feature of the rebound: velocity reverses
      direction upon bouncing off the wall.'
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para paredes de masa muy superior a la del cuerpo. Si la pared es móvil,
      el problema cambia cualitativamente.
    en: Valid for walls with mass much greater than the body's. If the wall is movable,
      the problem changes qualitatively.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión con pared rígida de masa infinita
      y coeficiente de restitución e.
    en: Interpreted within the rigid-wall collision model with infinite mass and coefficient
      of restitution e.
  formulaConnection:
    es: Conecta con v_f = −e·v_i y con el impulso de la pared J = m(v_f − v_i) = −m·v_i(1+e).
    en: Connects to v_f = −e·v_i and the wall impulse J = m(v_f − v_i) = −m·v_i(1+e).
  readingFocus:
    es: leer la pendiente como coeficiente de restitución y verificar el cambio de
      signo de la velocidad en el rebote.
    en: read the slope as the coefficient of restitution and verify the sign change
      of velocity in the rebound.
  agentHints:
    es:
    - 'La pared no cambia su velocidad (masa infinita): todo el cambio de momento
      lo absorbe la pared.'
    - 'Para e = 1, el rebote es perfecto: misma velocidad, sentido invertido.'
    - 'El impulso sobre el cuerpo vale J = m·v_i·(1 + e): mayor con e más alto.'
    en:
    - 'The wall does not change its velocity (infinite mass): the wall absorbs all
      the momentum change.'
    - 'For e = 1, the rebound is perfect: same speed, reversed direction.'
    - 'The impulse on the body is J = m·v_i·(1 + e): larger for higher e.'
  commonMistakes:
    es:
    - Olvidar el signo negativo de la velocidad de rebote.
    - Aplicar conservación del momento al sistema cuerpo + pared sin considerar la
      masa infinita de la pared.
    - Confundir el coeficiente de restitución e con la fracción de energía conservada.
    en:
    - Forgetting the negative sign of the rebound velocity.
    - Applying momentum conservation to the body-plus-wall system without accounting
      for the wall's infinite mass.
    - Confusing the coefficient of restitution e with the fraction of energy conserved.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: colision-con-pared-Svg
  graphId: colision-con-pared-Svg
  title:
    es: Escena SVG · Colisión con Pared
    en: SVG Scene · Collision with a Wall
  sceneId: colision_pared_scene
  sceneLabel:
    es: Cuerpo que impacta y rebota en una pared rígida
    en: Body that impacts and rebounds from a rigid wall
  objects:
    es:
    - cuerpo antes del impacto
    - pared rígida
    - cuerpo después del rebote
    - vectores de velocidad
    en:
    - body before impact
    - rigid wall
    - body after rebound
    - velocity vectors
  mainObject:
    es: cuerpo en colisión con pared
    en: body in collision with wall
  referenceFrame:
    es: laboratorio inercial con la pared fija
    en: inertial laboratory frame with fixed wall
  geometry:
    es: La escena muestra el cuerpo acercándose a la pared con velocidad v_i y alejándose
      con velocidad v_f = −e·v_i en sentido opuesto.
    en: The scene shows the body approaching the wall with velocity v_i and moving
      away with velocity v_f = −e·v_i in the opposite direction.
  interactions:
    es: La pared ejerce una fuerza impulsiva sobre el cuerpo durante el contacto.
      La pared no se mueve apreciablemente por su masa muy superior.
    en: The wall exerts an impulsive force on the body during contact. The wall does
      not move appreciably due to its much greater mass.
  modelElements:
    es:
    - vector velocidad entrante v_i
    - vector velocidad saliente v_f = −e·v_i
    - pared rígida fija
    en:
    - incoming velocity vector v_i
    - outgoing velocity vector v_f = −e·v_i
    - fixed rigid wall
  visualCues:
    es:
    - El vector de velocidad saliente apunta en sentido contrario al entrante.
    - Si e = 1, la longitud del vector de salida es igual al de entrada.
    - 'Si e < 1, el vector de salida es más corto: hay pérdida de energía cinética.'
    en:
    - The outgoing velocity vector points in the opposite direction to the incoming
      one.
    - If e = 1, the outgoing vector length equals the incoming one.
    - 'If e < 1, the outgoing vector is shorter: kinetic energy has been lost.'
  scaleMeaning:
    es: Los vectores son proporcionales a la velocidad. La diferencia de longitudes
      ilustra la energía cinética perdida.
    en: Vectors are proportional to velocity. The length difference illustrates the
      kinetic energy lost.
  relation:
    es: 'La escena ilustra el efecto del coeficiente de restitución sobre el rebote:
      mayor e implica rebote más energético.'
    en: 'The scene illustrates the effect of the coefficient of restitution on the
      rebound: higher e implies a more energetic rebound.'
  physicalReading:
    es: Comparar la longitud de los vectores de velocidad antes y después para estimar
      el coeficiente de restitución y la energía cinética perdida.
    en: Compare velocity vector lengths before and after to estimate the coefficient
      of restitution and the kinetic energy lost.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión con pared de masa infinita y coeficiente
      de restitución e.
    en: Interpreted within the infinite-mass wall collision model with coefficient
      of restitution e.
  formulaConnection:
    es: Conecta con v_f = −e·v_i y con el impulso J = m·(1+e)·v_i.
    en: Connects to v_f = −e·v_i and the impulse J = m·(1+e)·v_i.
  readingFocus:
    es: identificar el cambio de sentido del vector velocidad y estimar el coeficiente
      de restitución comparando longitudes.
    en: identify the reversal of the velocity vector direction and estimate the coefficient
      of restitution by comparing lengths.
  agentHints:
    es:
    - El cambio de momento del cuerpo es siempre en dirección opuesta a su movimiento
      inicial.
    - Para e = 1 la escena muestra vectores idénticos en longitud pero sentidos opuestos.
    - 'La pared recibe el impulso pero no se mueve: toda la variación de momento recae
      sobre la pared.'
    en:
    - The body's momentum change is always opposite to its initial direction of motion.
    - For e = 1, the scene shows vectors identical in length but opposite in direction.
    - 'The wall receives the impulse but does not move: all the momentum change is
      borne by the wall.'
  commonMistakes:
    es:
    - Dibujar el vector de rebote en la misma dirección que el de impacto.
    - Olvidar que la pared ejerce una fuerza real aunque no cambie de posición.
    - No incluir el coeficiente de restitución en el análisis del rebote.
    en:
    - Drawing the rebound vector in the same direction as the impact vector.
    - Forgetting that the wall exerts a real force even though it does not change
      position.
    - Not including the coefficient of restitution in the rebound analysis.
  recommendedTab: graficas
