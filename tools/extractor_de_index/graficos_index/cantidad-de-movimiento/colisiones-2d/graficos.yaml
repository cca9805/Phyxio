version: '1.0'
leaf: colisiones-2d
coord:
  id: colisiones-2d-Coord
  graphId: colisiones-2d-Coord
  title:
    es: Gráfica Coord · Colisiones 2D
    en: Coord Graph · 2D Collisions
  xAxis:
    es: componente x del momento total p_x (kg·m/s)
    en: x-component of total momentum p_x (kg·m/s)
  yAxis:
    es: componente y del momento total p_y (kg·m/s)
    en: y-component of total momentum p_y (kg·m/s)
  xMagnitude: p_x
  yMagnitude: p_y
  relation:
    es: En colisiones en 2D se conservan independientemente las componentes x e y
      del momento total. El punto representativo del sistema (p_x, p_y) no cambia
      durante la colisión.
    en: In 2D collisions, the x and y components of total momentum are independently
      conserved. The system's representative point (p_x, p_y) does not change during
      the collision.
  physicalReading:
    es: 'La gráfica muestra el espacio de momentos del sistema. La posición del punto
      no cambia en la colisión: la conservación del momento es visible como invariancia
      del punto.'
    en: 'The graph shows the system''s momentum space. The point''s position does
      not change in the collision: momentum conservation is visible as the invariance
      of that point.'
  slopeMeaning:
    es: 'En este espacio de fases, la colisión no desplaza el punto: la pendiente
      no tiene interpretación directa.'
    en: 'In this phase space, the collision does not shift the point: the slope has
      no direct interpretation.'
  interceptMeaning:
    es: El punto (p_x, p_y) es el momento total del sistema, que permanece fijo durante
      toda la colisión.
    en: The point (p_x, p_y) is the total system momentum, which remains fixed throughout
      the collision.
  curvatureMeaning:
    es: 'El punto no se mueve: la conservación es exacta en ausencia de fuerzas externas.'
    en: 'The point does not move: conservation is exact in the absence of external
      forces.'
  signMeaning:
    es: El cuadrante donde se sitúa el punto indica la dirección dominante del movimiento
      del sistema.
    en: The quadrant where the point lies indicates the dominant direction of system
      motion.
  areaMeaning:
    es: Sin interpretación directa en el espacio de momentos.
    en: No direct interpretation in momentum space.
  domainMeaning:
    es: Válido para colisiones en el plano sin fuerzas externas durante el choque.
      Para colisiones en 3D se añade la componente z.
    en: Valid for planar collisions without external forces during the impact. For
      3D collisions, a z-component is added.
  modelConnection:
    es: Se interpreta bajo la conservación vectorial del momento en dos dimensiones.
    en: Interpreted within vector momentum conservation in two dimensions.
  formulaConnection:
    es: Conecta con p_x_total = constante, p_y_total = constante, y con el sistema
      de cuatro ecuaciones para colisiones 2D elásticas.
    en: Connects to p_x_total = constant, p_y_total = constant, and the four-equation
      system for elastic 2D collisions.
  readingFocus:
    es: verificar que el punto (p_x, p_y) del sistema no se desplaza durante la colisión,
      confirmando la conservación vectorial.
    en: verify that the system's (p_x, p_y) point does not shift during the collision,
      confirming vector conservation.
  agentHints:
    es:
    - En colisiones 2D hay cuatro incógnitas (v₁'_x, v₁'_y, v₂'_x, v₂'_y) pero solo
      dos ecuaciones de momento, por lo que se necesita información adicional (tipo
      de colisión, ángulo de dispersión).
    - Para colisiones elásticas en 2D se añade la conservación de energía, pero aun
      así hay infinitas soluciones sin conocer el ángulo.
    - El triángulo de momentos es una herramienta visual útil para resolver colisiones
      2D.
    en:
    - In 2D collisions there are four unknowns (v₁'_x, v₁'_y, v₂'_x, v₂'_y) but only
      two momentum equations, so additional information (collision type, scattering
      angle) is needed.
    - For elastic 2D collisions, energy conservation is added, but infinitely many
      solutions still exist without knowing the angle.
    - The momentum triangle is a useful visual tool for solving 2D collisions.
  commonMistakes:
    es:
    - Aplicar la conservación del momento como ecuación escalar en 2D en lugar de
      por componentes.
    - Ignorar que en 2D hay más incógnitas que ecuaciones de momento.
    - Confundir el ángulo de la velocidad relativa con el ángulo de dispersión.
    en:
    - Applying momentum conservation as a scalar equation in 2D instead of by components.
    - Ignoring that in 2D there are more unknowns than momentum equations.
    - Confusing the relative velocity angle with the scattering angle.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: colisiones-2d-Svg
  graphId: colisiones-2d-Svg
  title:
    es: Escena SVG · Colisiones 2D
    en: SVG Scene · 2D Collisions
  sceneId: colisiones_2d_scene
  sceneLabel:
    es: Dos cuerpos con trayectorias en el plano antes y después del choque
    en: Two bodies with planar trajectories before and after the collision
  objects:
    es:
    - cuerpo 1 antes
    - cuerpo 2 antes
    - cuerpo 1 después
    - cuerpo 2 después
    - ángulos de dispersión
    en:
    - body 1 before
    - body 2 before
    - body 1 after
    - body 2 after
    - scattering angles
  mainObject:
    es: par de cuerpos con colisión en el plano
    en: pair of bodies in planar collision
  referenceFrame:
    es: plano del laboratorio con ejes x e y
    en: laboratory plane with x and y axes
  geometry:
    es: La escena muestra las trayectorias de los cuerpos antes y después del choque
      en el plano, con los ángulos de dispersión θ₁ y θ₂ respecto a la dirección inicial.
    en: The scene shows body trajectories before and after the collision in the plane,
      with scattering angles θ₁ and θ₂ relative to the initial direction.
  interactions:
    es: El choque ocurre en el punto de contacto. Las velocidades finales tienen componentes
      en x e y que satisfacen la conservación por componentes.
    en: The collision occurs at the contact point. Final velocities have x and y components
      satisfying component-wise conservation.
  modelElements:
    es:
    - vectores v₁, v₂ antes del choque
    - vectores v₁', v₂' después del choque
    - ángulos θ₁, θ₂ de dispersión
    - diagrama vectorial de momentos
    en:
    - velocity vectors v₁, v₂ before collision
    - velocity vectors v₁', v₂' after collision
    - scattering angles θ₁, θ₂
    - momentum vector diagram
  visualCues:
    es:
    - Los vectores de velocidad salientes se abren en ángulos θ₁ y θ₂ respecto a la
      dirección inicial.
    - La suma vectorial de momentos antes y después es idéntica.
    - El diagrama de momentos forma un triángulo cerrado.
    en:
    - Outgoing velocity vectors spread at angles θ₁ and θ₂ relative to the initial
      direction.
    - The vector sum of momenta before and after is identical.
    - The momentum diagram forms a closed triangle.
  scaleMeaning:
    es: Los vectores son proporcionales al momento de cada cuerpo. El diagrama vectorial
      debe cerrar perfectamente.
    en: Vectors are proportional to each body's momentum. The vector diagram must
      close perfectly.
  relation:
    es: 'La escena ilustra la conservación vectorial del momento en el plano: la suma
      de los vectores de momento es invariante.'
    en: 'The scene illustrates vector momentum conservation in the plane: the sum
      of momentum vectors is invariant.'
  physicalReading:
    es: Leer los ángulos de dispersión y las magnitudes de velocidad final, verificando
      que la suma vectorial de momentos se conserva.
    en: Read the scattering angles and final velocity magnitudes, verifying that the
      vector sum of momenta is conserved.
  modelConnection:
    es: Se interpreta bajo la conservación del momento en 2D y el tipo de colisión
      (elástica o inelástica).
    en: Interpreted within 2D momentum conservation and the collision type (elastic
      or inelastic).
  formulaConnection:
    es: Conecta con el sistema p_x_antes = p_x_después y p_y_antes = p_y_después.
    en: Connects to the system p_x_before = p_x_after and p_y_before = p_y_after.
  readingFocus:
    es: verificar que el diagrama vectorial de momentos cierra correctamente antes
      y después del choque.
    en: verify that the momentum vector diagram closes correctly before and after
      the collision.
  agentHints:
    es:
    - El diagrama de vectores de momento debe formar un polígono cerrado.
    - Para colisiones elásticas en 2D con masas iguales, el ángulo entre las velocidades
      finales es siempre 90°.
    - La dirección del momento total del sistema no cambia aunque las velocidades
      individuales sí.
    en:
    - The momentum vector diagram must form a closed polygon.
    - For elastic 2D collisions with equal masses, the angle between final velocities
      is always 90°.
    - The direction of the system's total momentum does not change even though individual
      velocities do.
  commonMistakes:
    es:
    - Sumar magnitudes de velocidades en lugar de sumar vectorialmente los momentos.
    - Ignorar la componente perpendicular del momento en el análisis.
    - No verificar el cierre del diagrama vectorial.
    en:
    - Summing velocity magnitudes instead of vectorially adding momenta.
    - Ignoring the perpendicular momentum component in the analysis.
    - Not verifying the closure of the vector diagram.
  recommendedTab: graficas
