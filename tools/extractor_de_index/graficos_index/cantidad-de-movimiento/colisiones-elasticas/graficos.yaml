version: '1.0'
leaf: colisiones-elasticas
coord:
  id: colisiones-elasticas-Coord
  graphId: colisiones-elasticas-Coord
  title:
    es: Gráfica Coord · Colisiones Elásticas
    en: Coord Graph · Elastic Collisions
  xAxis:
    es: velocidad antes de la colisión v_i (m/s)
    en: velocity before collision v_i (m/s)
  yAxis:
    es: velocidad después de la colisión v_f (m/s)
    en: velocity after collision v_f (m/s)
  xMagnitude: v_i
  yMagnitude: v_f
  relation:
    es: En una colisión elástica se conservan simultáneamente el momento lineal y
      la energía cinética. Las velocidades finales se calculan a partir de ambas condiciones.
    en: In an elastic collision, linear momentum and kinetic energy are simultaneously
      conserved. Final velocities are calculated from both conditions.
  physicalReading:
    es: La gráfica compara los estados de velocidad antes y después de la colisión.
      La diferencia relativa de velocidades de separación e impacto define el coeficiente
      de restitución e = 1.
    en: The graph compares velocity states before and after the collision. The relative
      separation-to-approach speed ratio defines the coefficient of restitution e
      = 1.
  slopeMeaning:
    es: La pendiente de la curva v_f vs v_i para cada partícula revela cuánto de la
      velocidad se transfiere en el choque, que depende de la relación de masas.
    en: The slope of v_f vs v_i for each particle reveals how much velocity is transferred
      in the collision, which depends on the mass ratio.
  interceptMeaning:
    es: 'El intercepto indica la velocidad final de la partícula cuando la inicial
      es cero: este caso representa la partícula que empieza en reposo.'
    en: 'The intercept indicates the final velocity of the particle when the initial
      velocity is zero: this case represents the particle starting at rest.'
  curvatureMeaning:
    es: 'La relación es lineal para masa constante: la velocidad final es una combinación
      lineal de las velocidades iniciales de ambas partículas.'
    en: 'The relationship is linear for constant mass: the final velocity is a linear
      combination of the initial velocities of both particles.'
  signMeaning:
    es: 'El cambio de signo en v_f indica inversión del sentido de movimiento: ocurre
      cuando la partícula choca con un objeto más masivo.'
    en: 'A sign change in v_f indicates reversal of motion direction: it occurs when
      a particle collides with a more massive object.'
  areaMeaning:
    es: Sin interpretación directa en esta gráfica de velocidades.
    en: No direct interpretation for this velocity graph.
  domainMeaning:
    es: Válido para colisiones en una dimensión. En 2D se conservan por separado las
      componentes x e y del momento.
    en: Valid for one-dimensional collisions. In 2D, the x and y momentum components
      are conserved separately.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión elástica con conservación simultánea
      de momento y energía cinética.
    en: Interpreted within the elastic collision model with simultaneous conservation
      of momentum and kinetic energy.
  formulaConnection:
    es: Conecta con m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂' y con ½m₁v₁² + ½m₂v₂² = ½m₁v₁'² +
      ½m₂v₂'².
    en: Connects to m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂' and ½m₁v₁² + ½m₂v₂² = ½m₁v₁'² + ½m₂v₂'².
  readingFocus:
    es: leer que la suma de momentos se conserva y que la energía cinética total es
      la misma antes y después.
    en: read that the total momentum is conserved and that total kinetic energy is
      the same before and after.
  agentHints:
    es:
    - En una colisión elástica entre masas iguales, las velocidades se intercambian
      completamente.
    - El coeficiente de restitución es e = 1 en colisiones perfectamente elásticas.
    - 'La pérdida de energía cinética es cero: toda la energía se conserva en forma
      cinética.'
    en:
    - In an elastic collision between equal masses, velocities are completely exchanged.
    - The coefficient of restitution is e = 1 for perfectly elastic collisions.
    - 'Kinetic energy loss is zero: all energy remains in kinetic form.'
  commonMistakes:
    es:
    - Aplicar solo conservación de momento sin usar también la conservación de energía
      cinética.
    - Confundir colisión elástica con colisión en que los cuerpos rebotan visualmente.
    - Olvidar que e = 1 solo para colisiones perfectamente elásticas.
    en:
    - Applying only momentum conservation without also using kinetic energy conservation.
    - Confusing elastic collision with any collision where bodies visually bounce.
    - Forgetting that e = 1 only for perfectly elastic collisions.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: colisiones-elasticas-Svg
  graphId: colisiones-elasticas-Svg
  title:
    es: Escena SVG · Colisiones Elásticas
    en: SVG Scene · Elastic Collisions
  sceneId: colisiones_elasticas_scene
  sceneLabel:
    es: Dos cuerpos antes y después de una colisión elástica
    en: Two bodies before and after an elastic collision
  objects:
    es:
    - cuerpo 1 (antes)
    - cuerpo 2 (antes)
    - cuerpo 1 (después)
    - cuerpo 2 (después)
    - vectores de velocidad
    en:
    - body 1 (before)
    - body 2 (before)
    - body 1 (after)
    - body 2 (after)
    - velocity vectors
  mainObject:
    es: par de cuerpos en colisión elástica
    en: pair of bodies in elastic collision
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra los cuerpos antes y después del choque con sus vectores
      de velocidad. En la colisión elástica, las magnitudes y sentidos cambian pero
      la energía total no.
    en: The scene shows the bodies before and after the collision with their velocity
      vectors. In an elastic collision, magnitudes and directions change but total
      energy does not.
  interactions:
    es: El choque es de duración muy breve. Durante el contacto se produce una fuerza
      impulsiva que redistribuye momento y energía sin pérdidas.
    en: The collision is very brief. During contact, an impulsive force redistributes
      momentum and energy without losses.
  modelElements:
    es:
    - vectores v₁, v₂ antes del choque
    - vectores v₁', v₂' después del choque
    - indicador de conservación de Ec
    en:
    - velocity vectors v₁, v₂ before collision
    - velocity vectors v₁', v₂' after collision
    - kinetic energy conservation indicator
  visualCues:
    es:
    - 'Las longitudes de los vectores de velocidad representan magnitudes: en la colisión
      elástica la suma de sus cuadrados ponderados se conserva.'
    - Para masas iguales, los vectores de velocidad se intercambian exactamente.
    - No hay deformación permanente ni calor en la colisión elástica ideal.
    en:
    - 'Velocity vector lengths represent magnitudes: in an elastic collision the sum
      of their mass-weighted squares is conserved.'
    - For equal masses, velocity vectors are exactly exchanged.
    - There is no permanent deformation or heat in an ideal elastic collision.
  scaleMeaning:
    es: 'Los vectores son proporcionales a la velocidad: ayudan a leer cualitativamente
      la redistribución del momento.'
    en: 'Vectors are proportional to velocity: they help read the momentum redistribution
      qualitatively.'
  relation:
    es: 'La escena ilustra la redistribución de velocidades en un choque sin pérdida
      de energía: es la colisión más conservativa posible.'
    en: 'The scene illustrates velocity redistribution in a collision without energy
      loss: the most conservative collision possible.'
  physicalReading:
    es: Comparar las velocidades antes y después para verificar que el momento total
      se conserva y la energía cinética también.
    en: Compare velocities before and after to verify that total momentum and kinetic
      energy are both conserved.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión perfectamente elástica en una dimensión.
    en: Interpreted within the perfectly elastic collision model in one dimension.
  formulaConnection:
    es: Conecta con las fórmulas de velocidades finales derivadas de la doble condición
      de conservación.
    en: Connects to the final velocity formulas derived from the dual conservation
      condition.
  readingFocus:
    es: verificar visualmente que el vector suma de momentos antes y después es idéntico,
      y que las magnitudes de velocidad cuadradas se conservan.
    en: visually verify that the momentum sum vector is identical before and after,
      and that the squared velocity magnitudes are conserved.
  agentHints:
    es:
    - 'En colisiones elásticas entre masas iguales, los vectores de velocidad se intercambian:
      la partícula que estaba en reposo sale con la velocidad de la que se movía.'
    - Una colisión elástica a nivel microscópico es la norma (entre átomos y moléculas).
    - El rebote de una pelota de goma se aproxima a una colisión elástica, pero no
      es perfecta.
    en:
    - 'In elastic collisions between equal masses, velocity vectors are exchanged:
      the particle at rest leaves with the speed of the one that was moving.'
    - Elastic collisions at the microscopic level are the norm (between atoms and
      molecules).
    - A rubber ball bounce approximates an elastic collision, but is not perfect.
  commonMistakes:
    es:
    - Asumir que cualquier rebote es elástico.
    - No verificar la conservación de energía cinética además del momento.
    - Confundir e = 1 con rebote perfecto en problemas donde e < 1.
    en:
    - Assuming any bounce is elastic.
    - Not verifying kinetic energy conservation in addition to momentum.
    - Confusing e = 1 with perfect rebound in problems where e < 1.
  recommendedTab: graficas
