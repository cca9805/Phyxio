version: '1.0'
leaf: colisiones-inelasticas
coord:
  id: colisiones-inelasticas-Coord
  graphId: colisiones-inelasticas-Coord
  title:
    es: Gráfica Coord · Colisiones Inelásticas
    en: Coord Graph · Inelastic Collisions
  xAxis:
    es: velocidad antes de la colisión v_i (m/s)
    en: velocity before collision v_i (m/s)
  yAxis:
    es: energía cinética E_k (J)
    en: kinetic energy E_k (J)
  xMagnitude: v_i
  yMagnitude: E_k
  relation:
    es: En una colisión inelástica se conserva el momento lineal pero se pierde parte
      de la energía cinética, que se disipa como calor, sonido o deformación.
    en: In an inelastic collision, linear momentum is conserved but part of the kinetic
      energy is lost, dissipated as heat, sound, or deformation.
  physicalReading:
    es: 'La energía cinética final es menor que la inicial. La diferencia ΔE_k es
      la energía disipada en el choque: mayor deformación implica mayor pérdida.'
    en: 'Final kinetic energy is less than initial. The difference ΔE_k is the energy
      dissipated in the collision: greater deformation implies greater loss.'
  slopeMeaning:
    es: La pendiente de la curva E_k_final vs v_inicial permite estimar la fracción
      de energía que se disipa en el impacto.
    en: The slope of E_k_final vs v_initial allows estimating the fraction of energy
      dissipated in the impact.
  interceptMeaning:
    es: Si la velocidad inicial es cero, la energía cinética es cero; pero tras el
      choque la energía final depende de la velocidad del bloque combinado.
    en: If the initial velocity is zero, kinetic energy is zero; but after the collision
      the final energy depends on the combined block's velocity.
  curvatureMeaning:
    es: La relación entre E_k y v es cuadrática (E_k = ½mv²), por lo que la curva
      es una parábola.
    en: The relationship between E_k and v is quadratic (E_k = ½mv²), so the curve
      is a parabola.
  signMeaning:
    es: 'La diferencia E_k_final − E_k_inicial es siempre negativa en colisiones inelásticas:
      hay pérdida neta de energía cinética.'
    en: 'The difference E_k_final − E_k_initial is always negative in inelastic collisions:
      there is a net kinetic energy loss.'
  areaMeaning:
    es: Sin interpretación directa en esta representación.
    en: No direct interpretation for this representation.
  domainMeaning:
    es: Válido para colisiones donde 0 < e < 1. El caso e = 0 corresponde a la colisión
      totalmente inelástica.
    en: Valid for collisions where 0 < e < 1. The case e = 0 corresponds to the perfectly
      inelastic collision.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión inelástica con conservación del momento
      pero pérdida de energía cinética.
    en: Interpreted within the inelastic collision model with momentum conservation
      but kinetic energy loss.
  formulaConnection:
    es: Conecta con m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂' y con ΔE_k = E_k_final − E_k_inicial
      < 0.
    en: Connects to m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂' and ΔE_k = E_k_final − E_k_initial
      < 0.
  readingFocus:
    es: leer la pérdida de energía cinética como magnitud disipada y verificar que
      el momento total sí se conserva.
    en: read the kinetic energy loss as the dissipated magnitude and verify that total
      momentum is indeed conserved.
  agentHints:
    es:
    - El momento se conserva en toda colisión aislada, elástica o no.
    - 'La energía cinética perdida no desaparece: se transforma en calor, sonido o
      deformación.'
    - Un coeficiente de restitución 0 < e < 1 indica colisión inelástica.
    en:
    - Momentum is conserved in every isolated collision, elastic or not.
    - 'Lost kinetic energy does not vanish: it transforms into heat, sound, or deformation.'
    - A coefficient of restitution 0 < e < 1 indicates an inelastic collision.
  commonMistakes:
    es:
    - Afirmar que el momento no se conserva porque hay pérdida de energía cinética.
    - Calcular la pérdida de energía usando el momento en lugar de las velocidades
      cuadradas.
    - Ignorar que la pérdida de energía cinética aumenta con la deformación del material.
    en:
    - Claiming momentum is not conserved because kinetic energy is lost.
    - Computing energy loss using momentum instead of squared velocities.
    - Ignoring that kinetic energy loss increases with material deformation.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: colisiones-inelasticas-Svg
  graphId: colisiones-inelasticas-Svg
  title:
    es: Escena SVG · Colisiones Inelásticas
    en: SVG Scene · Inelastic Collisions
  sceneId: colisiones_inelasticas_scene
  sceneLabel:
    es: Dos cuerpos antes y después de una colisión inelástica con pérdida de energía
    en: Two bodies before and after an inelastic collision with energy loss
  objects:
    es:
    - cuerpo 1 (antes)
    - cuerpo 2 (antes)
    - cuerpo 1 (después)
    - cuerpo 2 (después)
    - indicador de calor/deformación
    en:
    - body 1 (before)
    - body 2 (before)
    - body 1 (after)
    - body 2 (after)
    - heat/deformation indicator
  mainObject:
    es: par de cuerpos con disipación de energía
    en: pair of bodies with energy dissipation
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra los dos cuerpos antes y después del choque. Los vectores
      de velocidad final son más cortos que los iniciales por la pérdida de energía
      cinética.
    en: The scene shows both bodies before and after the collision. Final velocity
      vectors are shorter than initial ones due to kinetic energy loss.
  interactions:
    es: Durante el contacto se produce deformación, calor o sonido que disipa parte
      de la energía cinética del sistema.
    en: During contact, deformation, heat, or sound dissipate part of the system's
      kinetic energy.
  modelElements:
    es:
    - vectores v_antes
    - vectores v_después
    - indicador visual de energía disipada
    - coeficiente de restitución e < 1
    en:
    - velocity vectors v_before
    - velocity vectors v_after
    - visual indicator of dissipated energy
    - coefficient of restitution e < 1
  visualCues:
    es:
    - Los vectores de velocidad son más cortos después del choque que antes.
    - La suma de momentos se conserva aunque la energía cinética no.
    - Hay una marca visual de deformación o calor para indicar la disipación.
    en:
    - Velocity vectors are shorter after the collision than before.
    - The momentum sum is conserved even though kinetic energy is not.
    - A visual mark of deformation or heat indicates the dissipation.
  scaleMeaning:
    es: 'Los vectores son cualitativos: ilustran la redistribución del momento y la
      reducción de velocidades.'
    en: 'Vectors are qualitative: they illustrate momentum redistribution and velocity
      reduction.'
  relation:
    es: La escena ilustra que en colisiones inelásticas el momento se conserva pero
      la energía cinética se convierte parcialmente en otras formas.
    en: The scene illustrates that in inelastic collisions momentum is conserved but
      kinetic energy is partially converted into other forms.
  physicalReading:
    es: Comparar la suma de momentos antes y después (igual) con la suma de energías
      cinéticas (menor después).
    en: Compare the momentum sum before and after (equal) with the kinetic energy
      sum (less after).
  modelConnection:
    es: Se interpreta bajo el modelo de colisión inelástica con coeficiente de restitución
      0 < e < 1.
    en: Interpreted within the inelastic collision model with coefficient of restitution
      0 < e < 1.
  formulaConnection:
    es: Conecta con la conservación del momento y con ΔE_k = ½μ(v_rel)²(e²−1), donde
      μ es la masa reducida.
    en: Connects to momentum conservation and ΔE_k = ½μ(v_rel)²(e²−1), where μ is
      the reduced mass.
  readingFocus:
    es: identificar la pérdida visible de velocidad y asociarla con energía disipada,
      no con violación de la conservación del momento.
    en: identify the visible velocity reduction and associate it with dissipated energy,
      not with a violation of momentum conservation.
  agentHints:
    es:
    - 'El momento total antes y después es idéntico: verificar que los vectores sumen
      igual.'
    - 'La energía cinética perdida se transforma: no viola el principio de conservación
      de la energía total.'
    - Cuanto mayor es la deformación, más energía se disipa y más inelástica es la
      colisión.
    en:
    - 'Total momentum before and after is identical: verify that vectors sum to the
      same value.'
    - 'Lost kinetic energy transforms: it does not violate total energy conservation.'
    - Greater deformation means more energy dissipated and a more inelastic collision.
  commonMistakes:
    es:
    - Afirmar que el momento no se conserva porque los cuerpos se frenan.
    - No incluir ambas partículas en el cálculo del momento total.
    - Confundir colisión inelástica con colisión totalmente inelástica.
    en:
    - Claiming momentum is not conserved because bodies slow down.
    - Not including both particles in the total momentum calculation.
    - Confusing an inelastic collision with a perfectly inelastic collision.
  recommendedTab: graficas
