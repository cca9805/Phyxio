version: '1.0'
leaf: colisiones-totalmente-inelasticas
coord:
  id: colisiones-totalmente-inelasticas-Coord
  graphId: colisiones-totalmente-inelasticas-Coord
  title:
    es: Gráfica Coord · Colisiones Totalmente Inelásticas
    en: Coord Graph · Perfectly Inelastic Collisions
  xAxis:
    es: velocidad del proyectil antes del choque v₁ (m/s)
    en: projectile velocity before collision v₁ (m/s)
  yAxis:
    es: velocidad del sistema unido después del choque v_f (m/s)
    en: velocity of the combined system after collision v_f (m/s)
  xMagnitude: v₁
  yMagnitude: v_f
  relation:
    es: 'En una colisión totalmente inelástica los cuerpos se unen y salen juntos.
      La velocidad final se obtiene solo de la conservación del momento: v_f = m₁v₁/(m₁+m₂).'
    en: 'In a perfectly inelastic collision the bodies stick together and move as
      one. The final velocity follows only from momentum conservation: v_f = m₁v₁/(m₁+m₂).'
  physicalReading:
    es: 'La curva es lineal con pendiente m₁/(m₁+m₂): el cuerpo más masivo tiene mayor
      pendiente porque transfiere más momento al sistema unido.'
    en: 'The curve is linear with slope m₁/(m₁+m₂): a more massive body has a steeper
      slope because it transfers more momentum to the combined system.'
  slopeMeaning:
    es: La pendiente m₁/(m₁+m₂) es la fracción de la masa inicial que contribuye al
      sistema combinado. Siempre es menor que 1.
    en: The slope m₁/(m₁+m₂) is the fraction of initial mass contributing to the combined
      system. It is always less than 1.
  interceptMeaning:
    es: 'El corte pasa por el origen: si el proyectil entra con velocidad cero, el
      sistema combinado queda en reposo.'
    en: 'The curve passes through the origin: if the projectile enters with zero velocity,
      the combined system remains at rest.'
  curvatureMeaning:
    es: 'La relación es estrictamente lineal: v_f es proporcional a v₁ para masas
      fijas.'
    en: 'The relationship is strictly linear: v_f is proportional to v₁ for fixed
      masses.'
  signMeaning:
    es: 'El signo de v_f coincide con el de v₁: el sistema unido se mueve en el mismo
      sentido que el proyectil entrante.'
    en: 'The sign of v_f matches that of v₁: the combined system moves in the same
      direction as the incoming projectile.'
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para colisiones frontales con e = 0. La pérdida de energía cinética
      es máxima para este tipo de colisión.
    en: Valid for head-on collisions with e = 0. Kinetic energy loss is maximum for
      this collision type.
  modelConnection:
    es: 'Se interpreta bajo el modelo de colisión perfectamente inelástica (e = 0):
      máxima pérdida de energía cinética compatible con la conservación del momento.'
    en: 'Interpreted within the perfectly inelastic collision model (e = 0): maximum
      kinetic energy loss consistent with momentum conservation.'
  formulaConnection:
    es: Conecta con m₁v₁ + m₂v₂ = (m₁+m₂)v_f y con ΔE_k = −½μ(v₁−v₂)², donde μ = m₁m₂/(m₁+m₂).
    en: Connects to m₁v₁ + m₂v₂ = (m₁+m₂)v_f and ΔE_k = −½μ(v₁−v₂)², where μ = m₁m₂/(m₁+m₂).
  readingFocus:
    es: leer la pendiente como fracción de masa y calcular la velocidad final como
      una fracción de la inicial.
    en: read the slope as the mass fraction and compute the final velocity as a fraction
      of the initial one.
  agentHints:
    es:
    - 'La pendiente m₁/(m₁+m₂) es siempre menor que 1: la velocidad final es siempre
      menor que la inicial.'
    - La máxima pérdida de energía cinética se produce cuando los cuerpos tienen masas
      iguales.
    - Si m₂ >> m₁, el sistema combinado apenas se mueve aunque el proyectil tenga
      mucha velocidad.
    en:
    - 'The slope m₁/(m₁+m₂) is always less than 1: the final velocity is always less
      than the initial one.'
    - Maximum kinetic energy loss occurs when the two bodies have equal masses.
    - If m₂ >> m₁, the combined system barely moves even if the projectile has high
      speed.
  commonMistakes:
    es:
    - Usar conservación de energía cinética en una colisión totalmente inelástica.
    - Olvidar que la masa del sistema unido es m₁ + m₂.
    - Confundir que 'los cuerpos se unen' no implica que el momento no se conserve.
    en:
    - Using kinetic energy conservation for a perfectly inelastic collision.
    - Forgetting that the combined system mass is m₁ + m₂.
    - Confusing 'bodies stick together' with 'momentum is not conserved'.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: colisiones-totalmente-inelasticas-Svg
  graphId: colisiones-totalmente-inelasticas-Svg
  title:
    es: Escena SVG · Colisiones Totalmente Inelásticas
    en: SVG Scene · Perfectly Inelastic Collisions
  sceneId: colisiones_totalmente_inelasticas_scene
  sceneLabel:
    es: Dos cuerpos que se unen tras el choque y salen juntos
    en: Two bodies that stick together after the collision and move as one
  objects:
    es:
    - proyectil antes del choque
    - blanco en reposo
    - sistema unido después del choque
    en:
    - projectile before collision
    - target at rest
    - combined system after collision
  mainObject:
    es: sistema unido tras la colisión
    en: combined system after the collision
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra el proyectil acercándose, el choque y el sistema unido moviéndose
      juntos con velocidad menor que la inicial del proyectil.
    en: The scene shows the projectile approaching, the collision, and the combined
      system moving together with velocity less than the projectile's initial velocity.
  interactions:
    es: 'El choque produce una fusión de los dos cuerpos: la fuerza impulsiva hace
      que salgan como un único cuerpo. La pérdida de energía cinética es máxima.'
    en: 'The collision produces a fusion of both bodies: the impulsive force makes
      them move as a single body. Kinetic energy loss is maximum.'
  modelElements:
    es:
    - proyectil m₁ con v₁
    - blanco m₂ en reposo
    - sistema (m₁+m₂) con v_f
    - indicador de deformación total
    en:
    - projectile m₁ with v₁
    - target m₂ at rest
    - combined system (m₁+m₂) with v_f
    - total deformation indicator
  visualCues:
    es:
    - El vector de velocidad final es más corto que el inicial del proyectil.
    - Los dos cuerpos aparecen unidos después del choque.
    - La pérdida de velocidad es proporcional a la fracción m₂/(m₁+m₂).
    en:
    - The final velocity vector is shorter than the projectile's initial vector.
    - The two bodies appear joined after the collision.
    - The velocity reduction is proportional to the fraction m₂/(m₁+m₂).
  scaleMeaning:
    es: Los vectores son proporcionales a la velocidad. El vector final ilustra cuánto
      del momento inicial se mantiene.
    en: Vectors are proportional to velocity. The final vector illustrates how much
      of the initial momentum is retained.
  relation:
    es: 'La escena ilustra la colisión más inelástica posible: la máxima fusión de
      los dos cuerpos con la mayor pérdida de energía cinética.'
    en: 'The scene illustrates the most inelastic collision possible: maximum fusion
      of both bodies with the greatest kinetic energy loss.'
  physicalReading:
    es: Leer que el sistema unido sale más lento porque absorbe toda la energía de
      deformación del choque.
    en: Read that the combined system moves slower because it absorbs all the deformation
      energy of the collision.
  modelConnection:
    es: Se interpreta bajo el modelo de colisión totalmente inelástica (e = 0).
    en: Interpreted within the perfectly inelastic collision model (e = 0).
  formulaConnection:
    es: Conecta con m₁v₁ = (m₁+m₂)v_f y con la fórmula de pérdida de energía cinética.
    en: Connects to m₁v₁ = (m₁+m₂)v_f and the kinetic energy loss formula.
  readingFocus:
    es: identificar que los dos cuerpos salen juntos y calcular la velocidad final
      como fracción de la velocidad inicial del proyectil.
    en: identify that both bodies move together and compute the final velocity as
      a fraction of the projectile's initial velocity.
  agentHints:
    es:
    - El proyectil y el blanco salen como un único cuerpo con masa m₁ + m₂.
    - 'La velocidad del sistema unido es siempre menor que la del proyectil: v_f <
      v₁.'
    - La energía cinética perdida se convierte en deformación, calor y sonido.
    en:
    - The projectile and target leave as a single body with mass m₁ + m₂.
    - 'The combined system velocity is always less than the projectile''s: v_f < v₁.'
    - The lost kinetic energy converts into deformation, heat, and sound.
  commonMistakes:
    es:
    - Usar ½m₁v₁² = ½(m₁+m₂)v_f² (esto sería colisión elástica, no totalmente inelástica).
    - Olvidar que m₂ puede estar inicialmente en reposo o en movimiento.
    - No incluir la masa del blanco en la masa total del sistema unido.
    en:
    - Using ½m₁v₁² = ½(m₁+m₂)v_f² (that would be an elastic collision, not perfectly
      inelastic).
    - Forgetting that m₂ may initially be at rest or in motion.
    - Not including the target mass in the total combined system mass.
  recommendedTab: graficas
