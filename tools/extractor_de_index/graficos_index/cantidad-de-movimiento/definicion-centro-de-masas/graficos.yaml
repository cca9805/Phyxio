version: '1.0'
leaf: definicion-centro-de-masas
coord:
  id: definicion-centro-de-masas-Coord
  graphId: definicion-centro-de-masas-Coord
  title:
    es: Gráfica Coord · Definición Centro de Masas
    en: Coord Graph · Definition of Center of Mass
  xAxis:
    es: posición de las partículas x_i (m)
    en: particle position x_i (m)
  yAxis:
    es: posición del centro de masas x_cm (m)
    en: center-of-mass position x_cm (m)
  xMagnitude: x_i
  yMagnitude: x_cm
  relation:
    es: 'El centro de masas es el promedio ponderado de las posiciones por sus masas:
      x_cm = Σ(m_i·x_i)/M. Desplazar una partícula más masiva tiene mayor efecto sobre
      x_cm.'
    en: 'The center of mass is the mass-weighted average of positions: x_cm = Σ(m_i·x_i)/M.
      Displacing a more massive particle has a greater effect on x_cm.'
  physicalReading:
    es: La gráfica muestra cómo varía la posición del centro de masas cuando se cambia
      la posición de una de las partículas. La relación es lineal con pendiente m_i/M.
    en: The graph shows how the center-of-mass position changes when one particle
      is displaced. The relationship is linear with slope m_i/M.
  slopeMeaning:
    es: 'La pendiente es m_i/M: la fracción de la masa total que aporta la partícula
      desplazada. Una partícula más pesada desplaza más el centro de masas.'
    en: 'The slope equals m_i/M: the fraction of total mass contributed by the displaced
      particle. A heavier particle shifts the center of mass more.'
  interceptMeaning:
    es: El corte con el eje y corresponde a la posición del centro de masas cuando
      la partícula i está en el origen.
    en: The y-axis intercept corresponds to the center-of-mass position when particle
      i is at the origin.
  curvatureMeaning:
    es: 'La relación es lineal: el centro de masas se desplaza proporcionalmente a
      la posición de la partícula.'
    en: 'The relationship is linear: the center of mass shifts proportionally to the
      particle''s position.'
  signMeaning:
    es: 'El signo indica el lado hacia el que se desplaza el centro de masas: positivo
      a la derecha del origen.'
    en: 'The sign indicates the direction of center-of-mass displacement: positive
      to the right of the origin.'
  areaMeaning:
    es: Sin interpretación física directa en esta gráfica.
    en: No direct physical interpretation for this graph.
  domainMeaning:
    es: Válido para el modelo de partícula puntual en una dimensión. Para distribuciones
      continuas se usa integración.
    en: Valid for the point-particle model in one dimension. Integration is used for
      continuous distributions.
  modelConnection:
    es: Se interpreta bajo la definición formal del centro de masas para sistemas
      de partículas discretas.
    en: Interpreted within the formal definition of center of mass for discrete particle
      systems.
  formulaConnection:
    es: Conecta con x_cm = Σ(m_i·x_i)/M y con el movimiento del centro de masas a_cm
      = F_ext/M.
    en: Connects to x_cm = Σ(m_i·x_i)/M and the center-of-mass equation of motion
      a_cm = F_ext/M.
  readingFocus:
    es: leer la pendiente como fracción de masa y el intercept como posición inicial
      del centro de masas.
    en: read the slope as the mass fraction and the intercept as the initial center-of-mass
      position.
  agentHints:
    es:
    - La pendiente m_i/M indica qué fracción de la masa total controla el desplazamiento
      del centro de masas.
    - En un sistema de dos masas iguales, el centro de masas está siempre en el punto
      medio.
    - El centro de masas se mueve hacia la partícula más masiva.
    en:
    - The slope m_i/M indicates what fraction of total mass controls the center-of-mass
      displacement.
    - For two equal masses, the center of mass is always at the midpoint.
    - The center of mass shifts toward the more massive particle.
  commonMistakes:
    es:
    - Calcular el promedio aritmético de posiciones sin ponderar por masas.
    - Confundir el centro de masas con el centroide geométrico.
    - Ignorar el signo de las posiciones al calcular x_cm.
    en:
    - Computing the arithmetic mean of positions without weighting by mass.
    - Confusing center of mass with geometric centroid.
    - Ignoring the sign of positions when computing x_cm.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: definicion-centro-de-masas-Svg
  graphId: definicion-centro-de-masas-Svg
  title:
    es: Escena SVG · Definición Centro de Masas
    en: SVG Scene · Definition of Center of Mass
  sceneId: definicion_cm
  sceneLabel:
    es: Sistema de partículas con posición del centro de masas marcada
    en: Particle system with center-of-mass position marked
  objects:
    es:
    - partícula 1
    - partícula 2
    - punto del centro de masas
    - eje de posición
    en:
    - particle 1
    - particle 2
    - center-of-mass point
    - position axis
  mainObject:
    es: punto del centro de masas
    en: center-of-mass point
  referenceFrame:
    es: eje horizontal desde el origen
    en: horizontal axis from the origin
  geometry:
    es: La escena muestra dos o más partículas sobre un eje, con el punto del centro
      de masas marcado entre ellas, más cerca de la más masiva.
    en: The scene shows two or more particles on an axis, with the center-of-mass
      point marked between them, closer to the more massive one.
  interactions:
    es: 'No hay fuerzas representadas: la escena es geométrica y muestra la posición
      resultante del centro de masas.'
    en: 'No forces are depicted: the scene is geometric and shows the resulting center-of-mass
      position.'
  modelElements:
    es:
    - posiciones x_i de cada partícula
    - masas m_i
    - punto x_cm ponderado por masas
    en:
    - positions x_i of each particle
    - masses m_i
    - mass-weighted point x_cm
  visualCues:
    es:
    - El centro de masas está más cerca de la partícula más pesada.
    - Si las masas son iguales, el centro de masas está exactamente en el punto medio.
    - Desplazar una partícula desplaza el centro de masas en la misma dirección.
    en:
    - The center of mass is closer to the heavier particle.
    - For equal masses, the center of mass is exactly at the midpoint.
    - Displacing a particle displaces the center of mass in the same direction.
  scaleMeaning:
    es: 'La escena es geométrica pero proporcional: las posiciones y masas relativas
      se respetan en la representación.'
    en: 'The scene is geometric but proportional: relative positions and masses are
      preserved in the representation.'
  relation:
    es: 'La escena ilustra el concepto de promedio ponderado por masas: el centro
      de masas está en la ''posición media'' según el peso relativo de cada partícula.'
    en: 'The scene illustrates the mass-weighted average concept: the center of mass
      is at the ''average position'' according to each particle''s relative weight.'
  physicalReading:
    es: Leer la posición relativa del centro de masas respecto a cada partícula y
      deducir cuál tiene mayor masa.
    en: Read the relative position of the center of mass with respect to each particle
      and deduce which has the greater mass.
  modelConnection:
    es: 'Se interpreta bajo la definición del centro de masas para sistemas discretos:
      x_cm = Σ(m_i·x_i)/M.'
    en: 'Interpreted within the center-of-mass definition for discrete systems: x_cm
      = Σ(m_i·x_i)/M.'
  formulaConnection:
    es: Conecta con la fórmula x_cm = Σ(m_i·x_i)/M y con la segunda ley de Newton
      para el centro de masas.
    en: Connects to x_cm = Σ(m_i·x_i)/M and Newton's second law for the center of
      mass.
  readingFocus:
    es: identificar la posición del centro de masas respecto a cada partícula y deducir
      las masas relativas a partir de su posición.
    en: identify the center-of-mass position relative to each particle and deduce
      relative masses from its location.
  agentHints:
    es:
    - El centro de masas siempre está entre las partículas del sistema.
    - Si una partícula es mucho más masiva, el centro de masas prácticamente coincide
      con ella.
    - La posición del centro de masas no depende del origen elegido para las distancias
      relativas.
    en:
    - The center of mass always lies between the system's particles.
    - If one particle is much more massive, the center of mass nearly coincides with
      it.
    - The center-of-mass position does not depend on the origin chosen for relative
      distances.
  commonMistakes:
    es:
    - Situar el centro de masas siempre en el punto medio sin considerar las masas.
    - Pensar que el centro de masas debe estar sobre alguna de las partículas.
    - Olvidar que para cuerpos extendidos hay que integrar sobre toda la distribución
      de masa.
    en:
    - Always placing the center of mass at the midpoint without considering the masses.
    - Assuming the center of mass must lie on one of the particles.
    - Forgetting that extended bodies require integration over the entire mass distribution.
  recommendedTab: graficas
