version: '1.0'
leaf: dispersion-angular-en-colisiones-2d
coord:
  id: dispersion-angular-en-colisiones-2d-Coord
  graphId: dispersion-angular-en-colisiones-2d-Coord
  title:
    es: Gráfica Coord · Dispersión Angular en Colisiones 2D
    en: Coord Graph · Angular Scattering in 2D Collisions
  xAxis:
    es: parámetro de impacto b (m)
    en: impact parameter b (m)
  yAxis:
    es: ángulo de dispersión θ (rad o °)
    en: scattering angle θ (rad or °)
  xMagnitude: b
  yMagnitude: θ
  relation:
    es: 'El ángulo de dispersión θ depende del parámetro de impacto b: a mayor b (colisión
      más tangencial), menor θ; a menor b (colisión más frontal), mayor θ.'
    en: 'The scattering angle θ depends on the impact parameter b: larger b (more
      tangential collision) gives smaller θ; smaller b (more head-on collision) gives
      larger θ.'
  physicalReading:
    es: 'La curva θ(b) es decreciente: un impacto directo (b = 0) produce la máxima
      desviación; un impacto tangencial (b → ∞) produce desviación casi nula.'
    en: 'The curve θ(b) is decreasing: a direct hit (b = 0) produces maximum deflection;
      a grazing impact (b → ∞) produces almost no deflection.'
  slopeMeaning:
    es: 'La pendiente dθ/db es negativa: a mayor parámetro de impacto, menor ángulo
      de dispersión.'
    en: 'The slope dθ/db is negative: a larger impact parameter gives a smaller scattering
      angle.'
  interceptMeaning:
    es: Para b = 0 (colisión frontal), θ alcanza su valor máximo (180° para esferas
      duras elásticas).
    en: For b = 0 (head-on collision), θ reaches its maximum value (180° for elastic
      hard spheres).
  curvatureMeaning:
    es: La forma de la curva θ(b) depende del potencial de interacción. Para esferas
      duras es una función simple; para potencial coulombiano es la fórmula de Rutherford.
    en: The shape of θ(b) depends on the interaction potential. For hard spheres it
      is a simple function; for the Coulomb potential it follows the Rutherford formula.
  signMeaning:
    es: 'θ es siempre positivo: indica la magnitud de la desviación sin distinguir
      el sentido de la dispersión.'
    en: 'θ is always positive: it indicates the magnitude of deflection without distinguishing
      the scattering direction.'
  areaMeaning:
    es: El área diferencial dσ = 2π·b·|db/dθ|·dθ es la sección eficaz diferencial
      de dispersión.
    en: The differential element dσ = 2π·b·|db/dθ|·dθ is the differential scattering
      cross section.
  domainMeaning:
    es: Válido para 0 ≤ b ≤ b_max, donde b_max es el radio efectivo del potencial
      de interacción.
    en: Valid for 0 ≤ b ≤ b_max, where b_max is the effective range of the interaction
      potential.
  modelConnection:
    es: Se interpreta bajo el formalismo de dispersión clásica, con conexión al modelo
      de Rutherford para núcleos atómicos.
    en: Interpreted within the classical scattering formalism, with a connection to
      the Rutherford model for atomic nuclei.
  formulaConnection:
    es: Conecta con la fórmula de Rutherford θ = 2·arctan(k·q₁q₂/(m·v²·b)) para dispersión
      coulombiana.
    en: Connects to the Rutherford formula θ = 2·arctan(k·q₁q₂/(m·v²·b)) for Coulomb
      scattering.
  readingFocus:
    es: leer cuánto varía el ángulo al cambiar el parámetro de impacto y calcular
      la sección eficaz diferencial.
    en: read how much the angle varies with the impact parameter and compute the differential
      scattering cross section.
  agentHints:
    es:
    - El parámetro de impacto b es la distancia perpendicular entre la trayectoria
      del proyectil y el eje del blanco.
    - 'Para b → ∞, el proyectil no interactúa y sigue recto: θ → 0.'
    - La sección eficaz diferencial conecta la física de la dispersión con los experimentos
      de haz de partículas.
    en:
    - The impact parameter b is the perpendicular distance between the projectile's
      trajectory and the target axis.
    - 'For b → ∞, the projectile does not interact and continues straight: θ → 0.'
    - The differential cross section links scattering physics with particle beam experiments.
  commonMistakes:
    es:
    - Confundir el parámetro de impacto b con la distancia de aproximación mínima.
    - Asumir que θ y b son directamente proporcionales.
    - Ignorar que la forma de la curva θ(b) depende del tipo de potencial de interacción.
    en:
    - Confusing the impact parameter b with the distance of closest approach.
    - Assuming θ and b are directly proportional.
    - Ignoring that the shape of θ(b) depends on the type of interaction potential.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: dispersion-angular-en-colisiones-2d-Svg
  graphId: dispersion-angular-en-colisiones-2d-Svg
  title:
    es: Escena SVG · Dispersión Angular en Colisiones 2D
    en: SVG Scene · Angular Scattering in 2D Collisions
  sceneId: dispersion_angular_2d
  sceneLabel:
    es: Proyectil dispersado por un blanco con ángulo θ dependiente de b
    en: Projectile scattered by a target with angle θ dependent on b
  objects:
    es:
    - proyectil
    - blanco
    - parámetro de impacto b
    - ángulo de dispersión θ
    - trayectoria del proyectil
    en:
    - projectile
    - target
    - impact parameter b
    - scattering angle θ
    - projectile trajectory
  mainObject:
    es: proyectil con trayectoria deflectada
    en: projectile with deflected trajectory
  referenceFrame:
    es: marco del blanco en reposo
    en: rest frame of the target
  geometry:
    es: La escena muestra el proyectil acercándose con parámetro de impacto b y alejándose
      con ángulo de dispersión θ. Se muestran varias trayectorias para distintos valores
      de b.
    en: The scene shows the projectile approaching with impact parameter b and moving
      away with scattering angle θ. Several trajectories for different values of b
      are shown.
  interactions:
    es: El blanco ejerce una fuerza (coulombiana, de contacto o de otro tipo) que
      desvía al proyectil de su trayectoria original.
    en: The target exerts a force (Coulomb, contact, or other) that deflects the projectile
      from its original trajectory.
  modelElements:
    es:
    - parámetro b
    - ángulo θ
    - trayectoria incidente
    - trayectoria dispersada
    - zona de interacción
    en:
    - impact parameter b
    - scattering angle θ
    - incident trajectory
    - scattered trajectory
    - interaction zone
  visualCues:
    es:
    - Trayectorias con b pequeño se desvían más.
    - Trayectorias con b grande pasan casi sin desvío.
    - El patrón de dispersión refleja la naturaleza del potencial de interacción.
    en:
    - Trajectories with small b are deflected more.
    - Trajectories with large b pass with almost no deflection.
    - The scattering pattern reflects the nature of the interaction potential.
  scaleMeaning:
    es: 'La escena es cualitativa: ilustra la dependencia entre el parámetro de impacto
      y el ángulo de dispersión.'
    en: 'The scene is qualitative: it illustrates the dependence between impact parameter
      and scattering angle.'
  relation:
    es: 'La escena ilustra la relación entre geometría del impacto (b) y resultado
      dinámico (θ): la base del experimento de Rutherford y la física de dispersión.'
    en: 'The scene illustrates the relationship between impact geometry (b) and dynamic
      outcome (θ): the foundation of the Rutherford experiment and scattering physics.'
  physicalReading:
    es: Leer cómo varía el ángulo de dispersión con el parámetro de impacto y deducir
      el tipo de potencial de interacción.
    en: Read how the scattering angle varies with the impact parameter and deduce
      the type of interaction potential.
  modelConnection:
    es: Se interpreta bajo el formalismo de dispersión clásica de partículas.
    en: Interpreted within the classical particle scattering formalism.
  formulaConnection:
    es: Conecta con la fórmula de dispersión θ(b) y con la sección eficaz diferencial
      dσ/dΩ.
    en: Connects to the scattering formula θ(b) and the differential cross section
      dσ/dΩ.
  readingFocus:
    es: identificar el parámetro de impacto para cada trayectoria y verificar cualitativamente
      que mayor b implica menor ángulo de dispersión.
    en: identify the impact parameter for each trajectory and verify qualitatively
      that larger b implies smaller scattering angle.
  agentHints:
    es:
    - El experimento de Rutherford dedujo la existencia del núcleo atómico a partir
      del patrón de dispersión de partículas alfa.
    - El ángulo de dispersión de 180° solo ocurre para colisión frontal perfecta (b
      = 0) con potencial repulsivo.
    - La sección eficaz diferencial dσ/dΩ es la magnitud que se mide experimentalmente.
    en:
    - The Rutherford experiment deduced the existence of the atomic nucleus from the
      scattering pattern of alpha particles.
    - A scattering angle of 180° occurs only for a perfect head-on collision (b =
      0) with a repulsive potential.
    - The differential cross section dσ/dΩ is the quantity measured experimentally.
  commonMistakes:
    es:
    - Confundir el parámetro de impacto con el ángulo de incidencia.
    - Pensar que todas las trayectorias con el mismo b tienen el mismo θ independientemente
      del potencial.
    - Ignorar que el experimento de Rutherford requiere contabilizar estadísticamente
      muchas partículas dispersadas.
    en:
    - Confusing the impact parameter with the angle of incidence.
    - Assuming all trajectories with the same b have the same θ regardless of the
      potential.
    - Ignoring that the Rutherford experiment requires statistically counting many
      scattered particles.
  recommendedTab: graficas
