version: '1.0'
leaf: ecuacion-del-cohete
coord:
  id: ecuacion-del-cohete-Coord
  graphId: ecuacion-del-cohete-Coord
  title:
    es: Gráfica Coord · Ecuación del Cohete
    en: Coord Graph · Rocket Equation
  xAxis:
    es: masa del cohete m (kg)
    en: rocket mass m (kg)
  yAxis:
    es: velocidad del cohete v (m/s)
    en: rocket velocity v (m/s)
  xMagnitude: m
  yMagnitude: v
  relation:
    es: 'La ecuación de Tsiolkovsky describe cómo aumenta la velocidad del cohete
      a medida que expulsa combustible: Δv = v_e·ln(m_0/m_f). La gráfica v vs m es
      logarítmica.'
    en: 'The Tsiolkovsky equation describes how rocket velocity increases as it expels
      fuel: Δv = v_e·ln(m_0/m_f). The v vs m graph is logarithmic.'
  physicalReading:
    es: A medida que el cohete expulsa combustible y pierde masa, su velocidad aumenta
      logarítmicamente. El mayor incremento de velocidad se produce cuando la masa
      es pequeña.
    en: As the rocket expels fuel and loses mass, its velocity increases logarithmically.
      The greatest velocity gain occurs when the remaining mass is small.
  slopeMeaning:
    es: 'La pendiente dv/dm = −v_e/m es negativa y aumenta en magnitud al disminuir
      la masa: la velocidad crece más rápido cuando el cohete está casi vacío.'
    en: 'The slope dv/dm = −v_e/m is negative and grows in magnitude as mass decreases:
      velocity increases faster when the rocket is nearly empty.'
  interceptMeaning:
    es: En m = m_0 (masa inicial), la velocidad es la inicial del cohete (v_0 o cero
      si parte del reposo).
    en: At m = m_0 (initial mass), velocity equals the rocket's initial velocity (v_0
      or zero if starting from rest).
  curvatureMeaning:
    es: 'La curva es logarítmica: la relación v vs m es v = v_0 + v_e·ln(m_0/m), que
      es cóncava hacia arriba en función de m.'
    en: 'The curve is logarithmic: the v vs m relation is v = v_0 + v_e·ln(m_0/m),
      which is concave up as a function of m.'
  signMeaning:
    es: La velocidad aumenta mientras disminuye la masa. El signo de la variación
      de velocidad es opuesto al de la dirección de expulsión del gas.
    en: Velocity increases as mass decreases. The sign of the velocity change is opposite
      to the direction of gas expulsion.
  areaMeaning:
    es: El área bajo la curva empuje-tiempo da el impulso total y es proporcional
      a la variación de masa y la velocidad de expulsión.
    en: The area under the thrust-time curve gives the total impulse and is proportional
      to the mass change and exhaust velocity.
  domainMeaning:
    es: Válido para m_f ≤ m ≤ m_0. La velocidad de expulsión v_e se considera constante
      (propulsión química estable).
    en: Valid for m_f ≤ m ≤ m_0. The exhaust velocity v_e is assumed constant (stable
      chemical propulsion).
  modelConnection:
    es: Se interpreta bajo la ecuación de Tsiolkovsky (ecuación del cohete), derivada
      de la conservación del momento para sistemas de masa variable.
    en: Interpreted within the Tsiolkovsky rocket equation, derived from momentum
      conservation for variable-mass systems.
  formulaConnection:
    es: Conecta con Δv = v_e·ln(m_0/m_f) y con la ecuación de Meshchersky m·(dv/dt)
      = T − F_ext.
    en: Connects to Δv = v_e·ln(m_0/m_f) and the Meshchersky equation m·(dv/dt) =
      T − F_ext.
  readingFocus:
    es: leer la variación logarítmica de velocidad con la masa y calcular la velocidad
      final conociendo m_0, m_f y v_e.
    en: read the logarithmic velocity variation with mass and compute the final velocity
      given m_0, m_f, and v_e.
  agentHints:
    es:
    - La relación logarítmica significa que duplicar el combustible no duplica la
      velocidad final.
    - 'La razón de masas m_0/m_f es el parámetro clave: cuanto mayor, mayor el incremento
      de velocidad.'
    - Para órbitas, se necesita Δv = v_e·ln(m_0/m_f) ≥ v_orbital, lo que impone límites
      severos sobre la masa del combustible.
    en:
    - The logarithmic relationship means that doubling the fuel does not double the
      final velocity.
    - 'The mass ratio m_0/m_f is the key parameter: the larger it is, the greater
      the velocity increment.'
    - For orbital insertion, Δv = v_e·ln(m_0/m_f) ≥ v_orbital imposes severe constraints
      on fuel mass.
  commonMistakes:
    es:
    - Aplicar F = ma directamente al cohete sin considerar la variación de masa.
    - Confundir la velocidad de expulsión del gas con la velocidad del cohete.
    - Olvidar que la ecuación de Tsiolkovsky asume v_e constante.
    en:
    - Applying F = ma directly to the rocket without considering mass variation.
    - Confusing exhaust velocity with the rocket's velocity.
    - Forgetting that the Tsiolkovsky equation assumes constant v_e.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: ecuacion-del-cohete-Svg
  graphId: ecuacion-del-cohete-Svg
  title:
    es: Escena SVG · Ecuación del Cohete
    en: SVG Scene · Rocket Equation
  sceneId: ecuacion_cohete_scene
  sceneLabel:
    es: Cohete en propulsión con expulsión de gas y variación de masa
    en: Rocket in propulsion with gas expulsion and mass variation
  objects:
    es:
    - cohete
    - gas expulsado
    - vector velocidad del cohete
    - vector velocidad relativa del gas
    - indicador de masa restante
    en:
    - rocket
    - expelled gas
    - rocket velocity vector
    - relative gas velocity vector
    - remaining mass indicator
  mainObject:
    es: cohete con masa variable por propulsión
    en: rocket with variable mass due to propulsion
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: 'La escena muestra el cohete en el instante de propulsión: la masa disminuye
      por expulsión de gas en la parte posterior, y el vector de velocidad del cohete
      apunta hacia adelante.'
    en: 'The scene shows the rocket at the moment of propulsion: mass decreases due
      to gas expulsion at the rear, and the rocket velocity vector points forward.'
  interactions:
    es: El gas se expulsa hacia atrás con velocidad relativa v_e respecto al cohete.
      La reacción de esta expulsión acelera el cohete hacia adelante.
    en: Gas is expelled backward with relative velocity v_e with respect to the rocket.
      The reaction of this expulsion accelerates the rocket forward.
  modelElements:
    es:
    - masa del cohete m(t)
    - tasa de expulsión ṁ
    - velocidad relativa de expulsión v_e
    - vector empuje T = v_e·|ṁ|
    en:
    - rocket mass m(t)
    - expulsion rate ṁ
    - relative exhaust velocity v_e
    - thrust vector T = v_e·|ṁ|
  visualCues:
    es:
    - 'El gas sale hacia atrás y el cohete acelera hacia adelante: acción-reacción.'
    - 'La masa del cohete disminuye progresivamente: se indica visualmente.'
    - El vector de empuje T tiene la misma dirección que la velocidad del cohete.
    en:
    - 'Gas exits backward and the rocket accelerates forward: action-reaction.'
    - 'The rocket mass decreases progressively: shown visually.'
    - The thrust vector T has the same direction as the rocket velocity.
  scaleMeaning:
    es: 'La escena es cualitativa: ilustra la dirección del empuje y la relación entre
      masa expulsada y velocidad ganada.'
    en: 'The scene is qualitative: it illustrates the thrust direction and the relationship
      between expelled mass and velocity gained.'
  relation:
    es: 'La escena ilustra el principio de propulsión por reacción: la expulsión de
      masa en un sentido genera empuje en el sentido contrario.'
    en: 'The scene illustrates the reaction propulsion principle: expelling mass in
      one direction generates thrust in the opposite direction.'
  physicalReading:
    es: Leer la dirección del gas expulsado y deducir la dirección del empuje. La
      velocidad del cohete aumenta a medida que pierde masa.
    en: Read the direction of expelled gas and deduce the thrust direction. Rocket
      velocity increases as mass is lost.
  modelConnection:
    es: Se interpreta bajo la ecuación de Tsiolkovsky y la segunda ley de Newton para
      sistemas de masa variable.
    en: Interpreted within the Tsiolkovsky equation and Newton's second law for variable-mass
      systems.
  formulaConnection:
    es: Conecta con Δv = v_e·ln(m_0/m_f) y con el empuje T = v_e·|dm/dt|.
    en: Connects to Δv = v_e·ln(m_0/m_f) and the thrust T = v_e·|dm/dt|.
  readingFocus:
    es: identificar la dirección de expulsión del gas, la dirección del empuje y la
      disminución progresiva de masa del cohete.
    en: identify the direction of gas expulsion, the thrust direction, and the progressive
      decrease of rocket mass.
  agentHints:
    es:
    - 'El cohete es el ejemplo paradigmático de sistema de masa variable: no hay suelo
      para empujar, solo reacción al flujo de masa.'
    - Un cohete puede acelerar en el vacío porque no necesita empujar contra ningún
      medio externo.
    - 'La velocidad de expulsión del gas v_e es la clave: gases de combustión más
      rápidos dan mayor empuje específico.'
    en:
    - 'The rocket is the paradigmatic example of a variable-mass system: there is
      no ground to push against, only reaction to mass flow.'
    - A rocket can accelerate in vacuum because it does not need to push against any
      external medium.
    - 'The exhaust velocity v_e is the key: faster combustion gases give greater specific
      impulse.'
  commonMistakes:
    es:
    - Pensar que el cohete necesita aire para poder propulsarse.
    - Confundir la velocidad del gas en el laboratorio con la velocidad relativa de
      expulsión.
    - No considerar la variación de masa al calcular la aceleración del cohete.
    en:
    - Assuming the rocket needs air to propel itself.
    - Confusing the gas velocity in the laboratory with the relative exhaust velocity.
    - Not accounting for mass variation when computing rocket acceleration.
  recommendedTab: graficas
