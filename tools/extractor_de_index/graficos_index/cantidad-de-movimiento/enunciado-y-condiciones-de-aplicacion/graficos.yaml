version: '1.0'
leaf: enunciado-y-condiciones-de-aplicacion
svg:
  id: enunciado-y-condiciones-de-aplicacion-Svg
  graphId: enunciado-y-condiciones-de-aplicacion-Svg
  title:
    es: Escena SVG · Enunciado y Condiciones de Aplicación del Principio
    en: SVG Scene · Statement and Conditions for Applying the Principle
  sceneId: condiciones_conservacion_momento
  sceneLabel:
    es: Condiciones necesarias para aplicar la conservación del momento
    en: Necessary conditions for applying momentum conservation
  objects:
    es:
    - sistema físico
    - fuerzas internas
    - fuerzas externas
    - frontera del sistema
    en:
    - physical system
    - internal forces
    - external forces
    - system boundary
  mainObject:
    es: frontera que define el sistema
    en: boundary defining the system
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena delimita el sistema con una frontera y distingue visualmente las
      fuerzas internas (dentro) de las fuerzas externas (cruzando la frontera).
    en: The scene delimits the system with a boundary and visually distinguishes internal
      forces (inside) from external forces (crossing the boundary).
  interactions:
    es: Las fuerzas externas que cruzan la frontera del sistema son las que pueden
      alterar el momento total.
    en: External forces crossing the system boundary are those that can alter the
      total momentum.
  modelElements:
    es:
    - frontera del sistema
    - fuerzas internas par acción-reacción
    - fuerza externa neta
    - indicador de aislamiento
    en:
    - system boundary
    - action-reaction internal force pairs
    - net external force
    - isolation indicator
  visualCues:
    es:
    - Si ninguna flecha de fuerza cruza la frontera, el sistema está aislado y el
      momento se conserva.
    - Las fuerzas internas siempre van en pares opuestos y no afectan el momento total.
    - Una fuerza externa que cruza la frontera rompe la conservación.
    en:
    - If no force arrow crosses the boundary, the system is isolated and momentum
      is conserved.
    - Internal forces always come in opposite pairs and do not affect total momentum.
    - An external force crossing the boundary breaks conservation.
  scaleMeaning:
    es: 'La escena es conceptual: el tamaño de las flechas indica presencia o ausencia
      de fuerzas, no magnitudes exactas.'
    en: 'The scene is conceptual: arrow sizes indicate presence or absence of forces,
      not exact magnitudes.'
  relation:
    es: La escena enseña a identificar si el sistema cumple las condiciones para aplicar
      la conservación del momento lineal.
    en: The scene teaches how to identify whether the system meets the conditions
      for applying linear momentum conservation.
  physicalReading:
    es: 'Identificar si hay fuerzas externas netas antes de aplicar la conservación:
      si las hay, el momento total cambia.'
    en: 'Identify whether net external forces are present before applying conservation:
      if so, total momentum changes.'
  modelConnection:
    es: Se interpreta bajo el principio de conservación del momento, cuya condición
      de validez es la ausencia de fuerza externa neta.
    en: Interpreted within the conservation of momentum principle, whose validity
      condition is the absence of net external force.
  formulaConnection:
    es: Conecta con la condición F_ext = 0 para Σp = constante.
    en: Connects to the condition F_ext = 0 for Σp = constant.
  readingFocus:
    es: verificar si hay fuerzas externas cruzando la frontera del sistema antes de
      declarar la conservación.
    en: verify whether any external forces cross the system boundary before declaring
      momentum conservation.
  agentHints:
    es:
    - El primer paso siempre es definir bien la frontera del sistema.
    - 'Las fuerzas de rozamiento del suelo son fuerzas externas: rompen la conservación.'
    - En colisiones muy breves, el impulso externo puede ser despreciable aunque no
      sea exactamente cero.
    en:
    - The first step is always to define the system boundary carefully.
    - 'Ground friction forces are external: they break conservation.'
    - In very brief collisions, the external impulse may be negligible even if not
      exactly zero.
  commonMistakes:
    es:
    - Aplicar conservación del momento sin verificar si el sistema está aislado.
    - Olvidar que la gravedad puede ser una fuerza externa relevante.
    - Definir mal la frontera del sistema e incluir o excluir cuerpos incorrectamente.
    en:
    - Applying momentum conservation without verifying isolation.
    - Forgetting that gravity can be a relevant external force.
    - Poorly defining the system boundary, incorrectly including or excluding bodies.
  recommendedTab: graficas
