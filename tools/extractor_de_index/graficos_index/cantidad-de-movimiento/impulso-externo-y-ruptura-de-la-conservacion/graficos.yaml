version: '1.0'
leaf: impulso-externo-y-ruptura-de-la-conservacion
coord:
  id: impulso-externo-y-ruptura-de-la-conservacion-Coord
  graphId: impulso-externo-y-ruptura-de-la-conservacion-Coord
  title:
    es: Gráfica Coord · Impulso Externo y Ruptura de la Conservación
    en: Coord Graph · External Impulse and Breakdown of Conservation
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: momento total del sistema p_total (kg·m/s)
    en: total system momentum p_total (kg·m/s)
  xMagnitude: t
  yMagnitude: p_total
  relation:
    es: Cuando actúa un impulso externo, el momento total del sistema deja de ser
      constante y varía en la dirección de la fuerza aplicada.
    en: When an external impulse acts, the system's total momentum ceases to be constant
      and changes in the direction of the applied force.
  physicalReading:
    es: 'La gráfica muestra un cambio brusco o gradual en el momento total del sistema:
      la pendiente no es nula porque actúa una fuerza externa.'
    en: 'The graph shows an abrupt or gradual change in total system momentum: the
      slope is nonzero because an external force is acting.'
  slopeMeaning:
    es: 'La pendiente dp/dt es igual a la fuerza externa neta: una pendiente pronunciada
      indica una fuerza externa intensa.'
    en: 'The slope dp/dt equals the net external force: a steep slope indicates a
      strong external force.'
  interceptMeaning:
    es: El valor inicial del momento total es la condición antes de que actúe el impulso
      externo.
    en: The initial value of total momentum is the condition before the external impulse
      acts.
  curvatureMeaning:
    es: Si la fuerza externa es constante, la curva es lineal. Si varía con el tiempo,
      la pendiente cambia y la curva se curva.
    en: If the external force is constant, the curve is linear. If it varies with
      time, the slope changes and the curve bends.
  signMeaning:
    es: El signo de la variación indica si la fuerza externa acelera o desacelera
      el centro de masas del sistema.
    en: The sign of the variation indicates whether the external force accelerates
      or decelerates the system's center of mass.
  areaMeaning:
    es: El área bajo la curva F_ext-t es el impulso externo total que modifica el
      momento del sistema.
    en: The area under the F_ext-t curve is the total external impulse that modifies
      the system's momentum.
  domainMeaning:
    es: La ruptura de la conservación dura el tiempo que actúa la fuerza externa.
      Antes y después, si el sistema está aislado, el momento puede conservarse en
      esos intervalos.
    en: The breakdown of conservation lasts as long as the external force acts. Before
      and after, if the system is isolated, momentum is conserved in those intervals.
  modelConnection:
    es: 'Se interpreta bajo la segunda ley de Newton para sistemas: dp_total/dt =
      F_ext.'
    en: 'Interpreted within Newton''s second law for systems: dp_total/dt = F_ext.'
  formulaConnection:
    es: Conecta con Δp = J_ext = ∫F_ext dt y con la segunda ley de Newton para el
      centro de masas.
    en: Connects to Δp = J_ext = ∫F_ext dt and Newton's second law for the center
      of mass.
  readingFocus:
    es: localizar el intervalo en que la curva deja de ser horizontal e identificar
      la causa de la variación.
    en: locate the interval where the curve is no longer horizontal and identify the
      cause of the change.
  agentHints:
    es:
    - 'La pendiente de la gráfica p-t es la fuerza externa: una línea horizontal significa
      ausencia de fuerza externa.'
    - Un escalón brusco en la curva representa un impulso de corta duración.
    - El área bajo la pendiente es la variación de momento causada por el agente externo.
    en:
    - 'The slope of the p-t graph equals the external force: a horizontal line means
      no external force.'
    - An abrupt step in the curve represents a short-duration impulse.
    - The area under the slope segment equals the momentum change caused by the external
      agent.
  commonMistakes:
    es:
    - Confundir la ruptura de la conservación con la no conservación total de la energía.
    - Interpretar una pendiente constante como ausencia de fuerza.
    - No identificar cuál es el agente externo que provoca la variación.
    en:
    - Confusing the breakdown of momentum conservation with total energy non-conservation.
    - Interpreting a constant nonzero slope as absence of force.
    - Failing to identify the external agent causing the change.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: impulso-externo-y-ruptura-de-la-conservacion-Svg
  graphId: impulso-externo-y-ruptura-de-la-conservacion-Svg
  title:
    es: Escena SVG · Impulso Externo y Ruptura de la Conservación
    en: SVG Scene · External Impulse and Breakdown of Conservation
  sceneId: ruptura_conservacion_momento
  sceneLabel:
    es: Sistema con fuerza externa que rompe la conservación del momento
    en: System with external force breaking momentum conservation
  objects:
    es:
    - sistema de partículas
    - agente externo
    - vector impulso externo
    - momento antes y después
    en:
    - particle system
    - external agent
    - external impulse vector
    - momentum before and after
  mainObject:
    es: agente externo que actúa sobre el sistema
    en: external agent acting on the system
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra un sistema inicialmente aislado que recibe un impulso externo
      identificado, con vectores de momento antes y después de la interacción.
    en: The scene shows an initially isolated system receiving an identified external
      impulse, with momentum vectors before and after the interaction.
  interactions:
    es: Un agente externo (pared, campo, suelo) aplica una fuerza sobre algún cuerpo
      del sistema durante un intervalo de tiempo finito.
    en: An external agent (wall, field, ground) exerts a force on a body in the system
      over a finite time interval.
  modelElements:
    es:
    - impulso externo J_ext
    - cambio de momento Δp
    - vector p_antes
    - vector p_después
    en:
    - external impulse J_ext
    - momentum change Δp
    - momentum vector p_before
    - momentum vector p_after
  visualCues:
    es:
    - El vector momento final es diferente al inicial en magnitud o dirección.
    - La diferencia entre ambos vectores es igual al impulso externo.
    - 'El agente externo es el origen del cambio: identificarlo es el primer paso.'
    en:
    - The final momentum vector differs from the initial one in magnitude or direction.
    - The difference between both vectors equals the external impulse.
    - 'The external agent is the source of the change: identifying it is the first
      step.'
  scaleMeaning:
    es: 'Los vectores son cualitativos: muestran el sentido del cambio, no valores
      exactos.'
    en: 'Vectors are qualitative: they show the direction of change, not exact values.'
  relation:
    es: La escena ilustra que cualquier cambio en el momento total de un sistema requiere
      una causa externa identificable.
    en: The scene illustrates that any change in a system's total momentum requires
      an identifiable external cause.
  physicalReading:
    es: Leer qué agente externo actúa, en qué dirección aplica la fuerza y cómo cambia
      el estado de movimiento del sistema.
    en: Read which external agent acts, in what direction it applies force, and how
      the system's state of motion changes.
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton para sistemas y el teorema impulso-momento.
    en: Interpreted within Newton's second law for systems and the impulse-momentum
      theorem.
  formulaConnection:
    es: Conecta con p_f = p_i + J_ext y con dp/dt = F_ext.
    en: Connects to p_f = p_i + J_ext and dp/dt = F_ext.
  readingFocus:
    es: identificar el agente externo, la dirección del impulso y el cambio resultante
      en el momento total.
    en: identify the external agent, the direction of the impulse, and the resulting
      change in total momentum.
  agentHints:
    es:
    - Siempre hay un agente externo identificable cuando el momento total cambia.
    - El cambio de momento es paralelo al impulso externo recibido.
    - Si el sistema vuelve al aislamiento después del impulso, el nuevo momento es
      constante.
    en:
    - There is always an identifiable external agent when total momentum changes.
    - The momentum change is parallel to the external impulse received.
    - If the system returns to isolation after the impulse, the new momentum is constant.
  commonMistakes:
    es:
    - No identificar el agente externo y aplicar conservación incorrectamente.
    - Confundir el impulso externo con las fuerzas internas del sistema.
    - Ignorar que el momento puede cambiar de dirección, no solo de magnitud.
    en:
    - Failing to identify the external agent and incorrectly applying conservation.
    - Confusing external impulse with internal forces of the system.
    - Overlooking that momentum can change direction, not just magnitude.
  recommendedTab: graficas
