version: '1.0'
leaf: impulso
coord:
  id: impulso-Coord
  graphId: impulso-Coord
  title:
    es: Gráfica Coord · Impulso
    en: Coord Graph · Impulse
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: fuerza F (N)
    en: force F (N)
  xMagnitude: t
  yMagnitude: F
  relation:
    es: El impulso es el área encerrada bajo la curva F-t. Una fuerza breve e intensa
      puede producir el mismo cambio de momento que una fuerza suave prolongada.
    en: Impulse is the area under the F-t curve. A brief intense force can produce
      the same change in momentum as a gentler prolonged force.
  physicalReading:
    es: La forma de la curva muestra cómo varía la fuerza durante el contacto. Un
      pico alto e instantáneo indica una fuerza impulsiva; una curva ancha y baja
      indica una fuerza sostenida.
    en: The shape of the curve shows how the force varies during contact. A tall narrow
      peak indicates an impulsive force; a wide low curve indicates a sustained force.
  slopeMeaning:
    es: La pendiente dF/dt indica la rapidez con que crece o disminuye la fuerza durante
      el choque; es relevante para analizar la severidad del impacto.
    en: The slope dF/dt indicates how quickly the force rises or falls during the
      collision; relevant for analyzing impact severity.
  interceptMeaning:
    es: La fuerza es cero fuera del intervalo de contacto. Los cortes con el eje temporal
      marcan el inicio y fin de la interacción.
    en: Force is zero outside the contact interval. The time-axis crossings mark the
      start and end of the interaction.
  curvatureMeaning:
    es: Una curva con un único pico representa un impulso simple. Varias oscilaciones
      indican rebotes o efectos estructurales durante el contacto.
    en: A single-peak curve represents a simple impulse. Multiple oscillations indicate
      bouncing or structural effects during contact.
  signMeaning:
    es: 'El signo de la fuerza indica el sentido del impulso: si la fuerza cambia
      de signo durante el contacto, parte del impulso se cancela.'
    en: 'The sign of the force indicates the direction of the impulse: if the force
      changes sign during contact, part of the impulse cancels out.'
  areaMeaning:
    es: El área bajo la curva F-t es el impulso J, igual al cambio de momento Δp =
      p_f − p_i.
    en: The area under the F-t curve is the impulse J, equal to the change in momentum
      Δp = p_f − p_i.
  domainMeaning:
    es: La gráfica solo tiene sentido durante el intervalo de contacto. Fuera de él
      la fuerza de contacto es nula.
    en: The graph is only meaningful during the contact interval. Outside it, the
      contact force is zero.
  modelConnection:
    es: Se interpreta bajo el teorema impulso-momento en el marco de la mecánica newtoniana
      clásica.
    en: Interpreted within the impulse-momentum theorem in the framework of classical
      Newtonian mechanics.
  formulaConnection:
    es: Conecta con J = ∯F dt = Δp = m·Δv y con la segunda ley de Newton en su forma
      integral.
    en: Connects to J = ∯F dt = Δp = m·Δv and to Newton's second law in its integral
      form.
  readingFocus:
    es: leer primero el área total como cambio de momento, luego el pico de fuerza
      y la duración del contacto.
    en: first read the total area as the change in momentum, then the force peak and
      the contact duration.
  agentHints:
    es:
    - 'El área bajo la curva es lo que importa físicamente: equivale al cambio de
      momento.'
    - Un pico muy alto con duración muy corta puede dar el mismo impulso que una fuerza
      moderada prolongada.
    - El signo del área indica si el cuerpo acelera o desacelera.
    en:
    - 'The area under the curve is what matters physically: it equals the change in
      momentum.'
    - A very tall but very brief peak can deliver the same impulse as a moderate sustained
      force.
    - The sign of the area indicates whether the body accelerates or decelerates.
  commonMistakes:
    es:
    - Confundir el pico de fuerza con el impulso total.
    - Ignorar que el impulso depende del área, no del valor máximo de la fuerza.
    - Olvidar que el impulso es un vector con dirección.
    en:
    - Confusing the force peak with the total impulse.
    - Overlooking that impulse depends on the area, not the maximum force value.
    - Forgetting that impulse is a vector with direction.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: impulso-Svg
  graphId: impulso-Svg
  title:
    es: Escena SVG · Teorema Impulso-Momento
    en: SVG Scene · Impulse-Momentum Theorem
  sceneId: teorema_impulso_momento
  sceneLabel:
    es: Choque con cambio de momento lineal
    en: Collision with change in linear momentum
  objects:
    es:
    - cuerpo antes del choque
    - cuerpo después del choque
    - vector impulso
    - pared o agente externo
    en:
    - body before collision
    - body after collision
    - impulse vector
    - wall or external agent
  mainObject:
    es: cuerpo que recibe el impulso
    en: body receiving the impulse
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra el cuerpo antes y después del contacto, con el vector impulso
      que conecta ambos estados de momento.
    en: The scene shows the body before and after contact, with the impulse vector
      connecting both momentum states.
  interactions:
    es: Una fuerza externa actúa durante un intervalo de tiempo breve y cambia el
      estado de movimiento del cuerpo.
    en: An external force acts over a brief time interval and changes the body's state
      of motion.
  modelElements:
    es:
    - vector p_antes
    - vector p_después
    - vector impulso J = Δp
    - intervalo de contacto Δt
    en:
    - momentum vector p_before
    - momentum vector p_after
    - impulse vector J = Δp
    - contact interval Δt
  visualCues:
    es:
    - El vector impulso apunta en la dirección del cambio de momento.
    - La magnitud del cambio de momento es igual al área bajo la curva F-t.
    - Un rebote implica cambio de signo del momento.
    en:
    - The impulse vector points in the direction of the change in momentum.
    - The magnitude of the momentum change equals the area under the F-t curve.
    - A rebound implies a sign change in momentum.
  scaleMeaning:
    es: 'Los vectores son cualitativos: ilustran dirección y sentido del cambio, no
      magnitudes exactas.'
    en: 'Vectors are qualitative: they illustrate the direction and sense of the change,
      not exact magnitudes.'
  relation:
    es: La escena conecta el estado dinámico antes y después del contacto mediante
      el teorema impulso-momento.
    en: The scene connects the dynamic state before and after contact through the
      impulse-momentum theorem.
  physicalReading:
    es: Identificar los vectores de momento antes y después, y leer el impulso como
      la diferencia vectorial entre ellos.
    en: Identify the momentum vectors before and after, and read the impulse as the
      vector difference between them.
  modelConnection:
    es: Se interpreta bajo el teorema impulso-momento J = Δp en mecánica clásica.
    en: Interpreted within the impulse-momentum theorem J = Δp in classical mechanics.
  formulaConnection:
    es: Conecta con J = p_f − p_i y con la integral de la fuerza en el tiempo.
    en: Connects to J = p_f − p_i and the time integral of the force.
  readingFocus:
    es: identificar los vectores de momento antes y después del contacto y deducir
      la dirección del impulso.
    en: identify the momentum vectors before and after contact and deduce the direction
      of the impulse.
  agentHints:
    es:
    - 'El impulso es un vector: su sentido importa tanto como su magnitud.'
    - Un rebote completo duplica el cambio de momento respecto a un choque donde el
      cuerpo se detiene.
    - Comparar los vectores antes y después permite estimar el impulso sin calcular
      el área.
    en:
    - 'Impulse is a vector: its direction matters as much as its magnitude.'
    - A complete rebound doubles the momentum change compared to a collision where
      the body stops.
    - Comparing the before and after vectors allows estimating the impulse without
      computing the area.
  commonMistakes:
    es:
    - Confundir la fuerza con el impulso.
    - Ignorar el sentido vectorial del impulso en colisiones oblicuas.
    - Pensar que más tiempo de contacto implica siempre mayor impulso.
    en:
    - Confusing force with impulse.
    - Ignoring the vector direction of impulse in oblique collisions.
    - Assuming longer contact time always means greater impulse.
  recommendedTab: graficas
