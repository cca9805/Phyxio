version: '1.0'
leaf: marco-del-centro-de-masas-en-colisiones
coord:
  id: marco-del-centro-de-masas-en-colisiones-Coord
  graphId: marco-del-centro-de-masas-en-colisiones-Coord
  title:
    es: Gráfica Coord · Marco del Centro de Masas en Colisiones
    en: Coord Graph · Center-of-Mass Frame in Collisions
  xAxis:
    es: velocidad en el laboratorio v (m/s)
    en: velocity in the laboratory frame v (m/s)
  yAxis:
    es: velocidad en el marco CM v* (m/s)
    en: velocity in the CM frame v* (m/s)
  xMagnitude: v
  yMagnitude: v*
  relation:
    es: En el marco del CM, el análisis de colisiones se simplifica porque el momento
      total es siempre cero. Las velocidades en el marco del CM son v*_i = v_i − v_cm.
    en: In the CM frame, collision analysis is simplified because total momentum is
      always zero. CM-frame velocities are v*_i = v_i − v_cm.
  physicalReading:
    es: La gráfica muestra la transformación de velocidades del laboratorio al marco
      del CM. Es una recta de pendiente 1 desplazada en −v_cm.
    en: The graph shows the velocity transformation from the laboratory to the CM
      frame. It is a line with slope 1 shifted by −v_cm.
  slopeMeaning:
    es: 'La pendiente es siempre 1: la transformación al marco del CM es una traslación
      de velocidades, no un cambio de escala.'
    en: 'The slope is always 1: the transformation to the CM frame is a velocity translation,
      not a rescaling.'
  interceptMeaning:
    es: 'El intercepto es −v_cm: la velocidad en el CM cuando la del laboratorio es
      cero.'
    en: 'The intercept is −v_cm: the CM-frame velocity when the laboratory velocity
      is zero.'
  curvatureMeaning:
    es: 'La relación es estrictamente lineal: la transformación galileana es exacta
      para velocidades no relativistas.'
    en: 'The relationship is strictly linear: the Galilean transformation is exact
      for non-relativistic velocities.'
  signMeaning:
    es: 'Una partícula con v < v_cm tiene velocidad negativa en el marco del CM: se
      mueve hacia la izquierda desde ese referencial.'
    en: 'A particle with v < v_cm has negative velocity in the CM frame: it moves
      to the left from that reference frame.'
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para velocidades no relativistas. La transformación es exacta en la
      mecánica clásica.
    en: Valid for non-relativistic velocities. The transformation is exact in classical
      mechanics.
  modelConnection:
    es: Se interpreta bajo la transformación de Galileo al marco del centro de masas,
      especialmente útil para colisiones 1D y 2D.
    en: Interpreted within the Galilean transformation to the center-of-mass frame,
      especially useful for 1D and 2D collisions.
  formulaConnection:
    es: 'Conecta con v*_i = v_i − v_cm y con el resultado de colisiones elásticas
      en el CM: inversión de velocidades.'
    en: 'Connects to v*_i = v_i − v_cm and the result of elastic collisions in the
      CM: velocity reversal.'
  readingFocus:
    es: leer cuánto se desplaza cada velocidad al ir al marco del CM y verificar que
      las velocidades en el CM sumen cero con ponderación de masas.
    en: read how much each velocity shifts when going to the CM frame and verify that
      mass-weighted CM velocities sum to zero.
  agentHints:
    es:
    - 'En el marco del CM, las colisiones elásticas 1D son simétricas: cada partícula
      invierte su velocidad.'
    - Transformar al marco del CM antes de analizar la colisión y luego volver al
      laboratorio simplifica enormemente los cálculos.
    - El marco del CM es inercial solo si no hay fuerzas externas.
    en:
    - 'In the CM frame, elastic 1D collisions are symmetric: each particle reverses
      its velocity.'
    - Transforming to the CM frame before analyzing the collision and then returning
      to the laboratory greatly simplifies the calculations.
    - The CM frame is inertial only if there are no external forces.
  commonMistakes:
    es:
    - Olvidar restar v_cm de cada partícula al transformar.
    - No transformar de vuelta al laboratorio después de resolver en el CM.
    - Confundir el marco del CM con el marco donde el cuerpo más masivo está en reposo.
    en:
    - Forgetting to subtract v_cm from each particle when transforming.
    - Not transforming back to the laboratory after solving in the CM frame.
    - Confusing the CM frame with the rest frame of the most massive body.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: marco-del-centro-de-masas-en-colisiones-Svg
  graphId: marco-del-centro-de-masas-en-colisiones-Svg
  title:
    es: Escena SVG · Marco del Centro de Masas en Colisiones
    en: SVG Scene · Center-of-Mass Frame in Collisions
  sceneId: marco_cm_colisiones
  sceneLabel:
    es: Colisión vista desde el marco del centro de masas
    en: Collision viewed from the center-of-mass frame
  objects:
    es:
    - partícula 1 (laboratorio)
    - partícula 2 (laboratorio)
    - partícula 1 (marco CM)
    - partícula 2 (marco CM)
    - CM fijo en el origen
    en:
    - particle 1 (laboratory)
    - particle 2 (laboratory)
    - particle 1 (CM frame)
    - particle 2 (CM frame)
    - CM fixed at origin
  mainObject:
    es: sistema de dos partículas en colisión visto desde el CM
    en: two-particle collision system viewed from the CM frame
  referenceFrame:
    es: referencial del centro de masas
    en: center-of-mass reference frame
  geometry:
    es: La escena muestra la misma colisión vista desde el laboratorio (izquierda)
      y desde el marco del CM (derecha). En el CM, los vectores de momento se anulan
      antes y después.
    en: The scene shows the same collision viewed from the laboratory (left) and from
      the CM frame (right). In the CM frame, momentum vectors cancel before and after.
  interactions:
    es: En el marco del CM, la colisión elástica produce inversión exacta de las velocidades
      de cada partícula.
    en: In the CM frame, an elastic collision produces exact reversal of each particle's
      velocity.
  modelElements:
    es:
    - vectores de velocidad en laboratorio
    - vectores de velocidad en marco CM
    - centro de masas estático en el CM
    en:
    - velocity vectors in the laboratory frame
    - velocity vectors in the CM frame
    - center of mass static in the CM frame
  visualCues:
    es:
    - En el marco del CM, los vectores de momento de las dos partículas son iguales
      y opuestos.
    - Después de la colisión elástica, los vectores de velocidad se invierten en el
      marco del CM.
    - El centro de masas permanece fijo en el origen del marco CM durante toda la
      colisión.
    en:
    - In the CM frame, the momentum vectors of both particles are equal and opposite.
    - After an elastic collision, velocity vectors are reversed in the CM frame.
    - The center of mass remains fixed at the origin of the CM frame throughout the
      collision.
  scaleMeaning:
    es: Los vectores son proporcionales a m_i·v*_i. La simetría del diagrama confirma
      que el momento total es cero.
    en: Vectors are proportional to m_i·v*_i. The diagram's symmetry confirms that
      total momentum is zero.
  relation:
    es: La escena ilustra que en el marco del CM la colisión elástica es siempre simétrica,
      simplificando enormemente el análisis.
    en: The scene illustrates that in the CM frame an elastic collision is always
      symmetric, greatly simplifying the analysis.
  physicalReading:
    es: 'Leer la simetría de los vectores de velocidad en el marco CM: las magnitudes
      son iguales y los sentidos opuestos antes y después de la colisión elástica.'
    en: 'Read the symmetry of velocity vectors in the CM frame: magnitudes are equal
      and directions opposite before and after the elastic collision.'
  modelConnection:
    es: Se interpreta bajo la transformación de Galileo al marco del CM para colisiones
      con conservación del momento.
    en: Interpreted within the Galilean transformation to the CM frame for collisions
      with momentum conservation.
  formulaConnection:
    es: Conecta con v*_i = v_i − v_cm y con el resultado de colisiones elásticas 1D
      en el CM.
    en: Connects to v*_i = v_i − v_cm and the result of elastic 1D collisions in the
      CM frame.
  readingFocus:
    es: verificar que los vectores de momento se anulan en el marco del CM antes y
      después de la colisión.
    en: verify that the momentum vectors cancel in the CM frame both before and after
      the collision.
  agentHints:
    es:
    - 'La colisión elástica en el CM siempre invierte las velocidades: es la señal
      más clara del marco del CM.'
    - 'Los vectores de momento antes y después en el CM son iguales en magnitud y
      opuestos: es la firma del marco del CM.'
    - Usar el CM simplifica especialmente las colisiones 2D elásticas.
    en:
    - 'An elastic collision in the CM frame always reverses velocities: this is the
      clearest signature of the CM frame.'
    - 'Momentum vectors before and after in the CM are equal in magnitude and opposite:
      this is the hallmark of the CM frame.'
    - Using the CM frame especially simplifies elastic 2D collisions.
  commonMistakes:
    es:
    - Confundir el marco del CM con el marco del laboratorio.
    - Olvidar transformar las velocidades antes de dibujar los vectores en el CM.
    - Pensar que las partículas están en reposo en el marco del CM.
    en:
    - Confusing the CM frame with the laboratory frame.
    - Forgetting to transform velocities before drawing vectors in the CM frame.
    - Assuming that particles are at rest in the CM frame.
  recommendedTab: graficas
