version: '1.0'
leaf: marco-del-centro-de-masas
coord:
  id: marco-del-centro-de-masas-Coord
  graphId: marco-del-centro-de-masas-Coord
  title:
    es: Gráfica Coord · Marco del Centro de Masas
    en: Coord Graph · Center-of-Mass Frame
  xAxis:
    es: velocidad en el marco del laboratorio v (m/s)
    en: velocity in the laboratory frame v (m/s)
  yAxis:
    es: velocidad en el marco del centro de masas v* (m/s)
    en: velocity in the center-of-mass frame v* (m/s)
  xMagnitude: v
  yMagnitude: v*
  relation:
    es: La velocidad en el marco del centro de masas es v* = v − v_cm. En este marco,
      el momento total del sistema es siempre cero por definición.
    en: The velocity in the center-of-mass frame is v* = v − v_cm. In this frame,
      the total momentum of the system is always zero by definition.
  physicalReading:
    es: La gráfica muestra que cada velocidad del laboratorio se transforma en una
      velocidad relativa al centro de masas restando la velocidad del centro de masas.
      La relación es lineal con pendiente 1.
    en: The graph shows that each laboratory velocity transforms into a velocity relative
      to the center of mass by subtracting v_cm. The relationship is linear with slope
      1.
  slopeMeaning:
    es: 'La pendiente es 1: cada partícula reduce su velocidad en exactamente v_cm
      al pasar al marco del centro de masas.'
    en: 'The slope is 1: each particle''s velocity decreases by exactly v_cm when
      transforming to the center-of-mass frame.'
  interceptMeaning:
    es: 'El intercepto es −v_cm: cuando la partícula tiene velocidad v = 0 en el laboratorio,
      en el marco del CM tiene velocidad −v_cm.'
    en: 'The intercept is −v_cm: when a particle has v = 0 in the lab frame, it has
      velocity −v_cm in the CM frame.'
  curvatureMeaning:
    es: 'La relación es estrictamente lineal: la transformación entre marcos es una
      traslación de velocidades.'
    en: 'The relationship is strictly linear: the frame transformation is a velocity
      translation.'
  signMeaning:
    es: 'En el marco del CM, las velocidades de las partículas son opuestas y compensadas:
      una tiene v* positivo y la otra negativo.'
    en: 'In the CM frame, particle velocities are opposite and balanced: one has positive
      v* and the other negative.'
  areaMeaning:
    es: Sin interpretación directa.
    en: No direct interpretation.
  domainMeaning:
    es: Válido para velocidades mucho menores que la velocidad de la luz. El marco
      del CM es un referencial inercial si F_ext = 0.
    en: Valid for velocities much less than the speed of light. The CM frame is inertial
      if F_ext = 0.
  modelConnection:
    es: Se interpreta bajo la transformación de Galileo entre el referencial del laboratorio
      y el referencial del centro de masas.
    en: Interpreted within the Galilean transformation between the laboratory frame
      and the center-of-mass frame.
  formulaConnection:
    es: Conecta con v*_i = v_i − v_cm y con la relación Σm_i·v*_i = 0 en el marco
      del CM.
    en: Connects to v*_i = v_i − v_cm and the relation Σm_i·v*_i = 0 in the CM frame.
  readingFocus:
    es: leer cuánto cambia cada velocidad al transformar al marco del CM y verificar
      que la suma ponderada de velocidades en el CM es cero.
    en: read how much each velocity changes when transforming to the CM frame and
      verify that the mass-weighted sum of CM velocities is zero.
  agentHints:
    es:
    - En el marco del CM, la suma de momentos es siempre cero, lo que simplifica el
      análisis de colisiones.
    - Una colisión elástica en el marco del CM invierte las velocidades de las partículas.
    - El marco del CM es especialmente útil para analizar colisiones en 2D.
    en:
    - In the CM frame, total momentum is always zero, which simplifies collision analysis.
    - An elastic collision in the CM frame reverses each particle's velocity.
    - The CM frame is especially useful for analyzing 2D collisions.
  commonMistakes:
    es:
    - Olvidar restar v_cm a cada partícula al transformar al marco del CM.
    - Aplicar conservación de energía en el marco del laboratorio cuando se pide en
      el marco del CM.
    - Confundir el marco del CM con el marco en reposo del laboratorio.
    en:
    - Forgetting to subtract v_cm from each particle when transforming to the CM frame.
    - Applying energy conservation in the laboratory frame when the CM frame is requested.
    - Confusing the CM frame with the rest frame of the laboratory.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: marco-del-centro-de-masas-Svg
  graphId: marco-del-centro-de-masas-Svg
  title:
    es: Escena SVG · Marco del Centro de Masas
    en: SVG Scene · Center-of-Mass Frame
  sceneId: marco_cm
  sceneLabel:
    es: Sistema visto desde el referencial del centro de masas
    en: System viewed from the center-of-mass frame
  objects:
    es:
    - partícula 1 con velocidad v*_1
    - partícula 2 con velocidad v*_2
    - centro de masas en reposo
    - vectores de momento
    en:
    - particle 1 with velocity v*_1
    - particle 2 with velocity v*_2
    - center of mass at rest
    - momentum vectors
  mainObject:
    es: centro de masas estático en su propio marco
    en: center of mass at rest in its own frame
  referenceFrame:
    es: referencial del centro de masas (CM)
    en: center-of-mass reference frame (CM)
  geometry:
    es: 'La escena muestra el sistema desde el marco del CM: el centro de masas está
      fijo en el origen y las partículas se mueven con velocidades relativas v*_i
      = v_i − v_cm.'
    en: 'The scene shows the system from the CM frame: the center of mass is fixed
      at the origin and particles move with relative velocities v*_i = v_i − v_cm.'
  interactions:
    es: 'En este marco, las partículas tienen momentos iguales y opuestos: Σm_i·v*_i
      = 0 por definición del referencial.'
    en: 'In this frame, particles have equal and opposite momenta: Σm_i·v*_i = 0 by
      definition of the reference frame.'
  modelElements:
    es:
    - velocidades v*_i en el marco CM
    - momento total = 0
    - centro de masas fijo en el origen
    en:
    - CM-frame velocities v*_i
    - total momentum = 0
    - center of mass fixed at the origin
  visualCues:
    es:
    - El centro de masas no se mueve en su propio marco de referencia.
    - Los vectores de momento de las partículas son iguales en magnitud y opuestos
      en dirección.
    - La suma de todos los vectores de momento es el vector nulo.
    en:
    - The center of mass does not move in its own reference frame.
    - Particle momentum vectors are equal in magnitude and opposite in direction.
    - The sum of all momentum vectors is the zero vector.
  scaleMeaning:
    es: 'Los vectores son proporcionales a m_i·v*_i: muestran la distribución del
      momento relativo.'
    en: 'Vectors are proportional to m_i·v*_i: they show the distribution of relative
      momentum.'
  relation:
    es: La escena ilustra el referencial del CM como el marco donde el momento total
      es cero, simplificando el análisis de colisiones.
    en: The scene illustrates the CM frame as the reference frame where total momentum
      is zero, simplifying collision analysis.
  physicalReading:
    es: 'Leer que en el marco del CM el sistema tiene momento total nulo: las partículas
      siempre tienen momentos opuestos.'
    en: 'Read that in the CM frame the system has zero total momentum: particles always
      have opposite momenta.'
  modelConnection:
    es: Se interpreta bajo la transformación de Galileo al referencial del centro
      de masas.
    en: Interpreted within the Galilean transformation to the center-of-mass frame.
  formulaConnection:
    es: Conecta con v*_i = v_i − v_cm y con Σm_i·v*_i = 0.
    en: Connects to v*_i = v_i − v_cm and Σm_i·v*_i = 0.
  readingFocus:
    es: verificar que los vectores de momento de las partículas se anulan mutuamente
      en este marco antes de analizar la colisión.
    en: verify that the particle momentum vectors cancel each other in this frame
      before analyzing the collision.
  agentHints:
    es:
    - En el marco del CM, una colisión elástica invierte los vectores de velocidad
      de cada partícula.
    - El marco del CM es inercial si el sistema no tiene fuerzas externas.
    - 'La energía cinética en el marco del CM es menor que en el laboratorio: la diferencia
      es la energía asociada al movimiento del centro de masas.'
    en:
    - In the CM frame, an elastic collision reverses each particle's velocity vector.
    - The CM frame is inertial if the system has no external forces.
    - 'Kinetic energy in the CM frame is less than in the laboratory: the difference
      is the energy associated with center-of-mass motion.'
  commonMistakes:
    es:
    - Pensar que en el marco del CM las partículas están en reposo.
    - No restar v_cm correctamente al transformar velocidades al marco del CM.
    - Confundir 'momento total cero' con 'energía cinética total cero'.
    en:
    - Assuming that particles are at rest in the CM frame.
    - Failing to subtract v_cm correctly when transforming velocities to the CM frame.
    - Confusing 'zero total momentum' with 'zero total kinetic energy'.
  recommendedTab: graficas
