version: '1.0'
leaf: momento-lineal
coord:
  id: momento-lineal-Coord
  graphId: momento-lineal-Coord
  title:
    es: Gráfica Coord · Momento Lineal
    en: Coord Graph · Linear Momentum
  xAxis:
    es: velocidad v (m/s)
    en: velocity v (m/s)
  yAxis:
    es: momento lineal p (kg·m/s)
    en: linear momentum p (kg·m/s)
  xMagnitude: v
  yMagnitude: p
  relation:
    es: 'El momento lineal es proporcional a la masa y la velocidad: p = mv. Para
      masa fija, la gráfica es una recta cuya pendiente es la masa del cuerpo.'
    en: 'Linear momentum is proportional to mass and velocity: p = mv. For constant
      mass, the graph is a straight line whose slope equals the body''s mass.'
  physicalReading:
    es: 'A mayor velocidad, mayor momento lineal. El signo indica el sentido del movimiento:
      positivo hacia la derecha, negativo hacia la izquierda.'
    en: 'Greater velocity yields greater linear momentum. The sign indicates the direction
      of motion: positive to the right, negative to the left.'
  slopeMeaning:
    es: La pendiente es la masa del cuerpo. Una recta más empinada corresponde a un
      cuerpo más masivo.
    en: The slope equals the body's mass. A steeper line corresponds to a more massive
      object.
  interceptMeaning:
    es: Si la recta pasa por el origen, el cuerpo tiene momento cero cuando está en
      reposo, lo cual es físicamente correcto.
    en: A line through the origin means zero momentum at rest, which is physically
      correct.
  curvatureMeaning:
    es: La relación es lineal si la masa es constante. Si la masa varía (sistema cohete),
      la curva deja de ser recta.
    en: The relationship is linear for constant mass. If mass varies (e.g., rocket
      system), the curve becomes nonlinear.
  signMeaning:
    es: 'El signo del momento indica el sentido del movimiento: cambiar el signo implica
      inversión de la dirección.'
    en: 'The sign of momentum indicates the direction of motion: a sign change implies
      reversal of direction.'
  areaMeaning:
    es: El área bajo la curva p-t representaría un promedio temporal del momento,
      sin interpretación dinámica directa.
    en: The area under a p-t curve would represent a time-averaged momentum, with
      no direct dynamical interpretation.
  domainMeaning:
    es: Válido para velocidades mucho menores que la velocidad de la luz. La masa
      se trata como constante salvo indicación explícita.
    en: Valid for velocities well below the speed of light. Mass is treated as constant
      unless otherwise stated.
  modelConnection:
    es: Se interpreta bajo el modelo de mecánica clásica newtoniana con masa constante.
    en: Interpreted within the Newtonian classical mechanics model with constant mass.
  formulaConnection:
    es: Conecta con p = mv, con el teorema impulso-momento J = Δp, y con la conservación
      del momento en sistemas aislados.
    en: Connects to p = mv, the impulse-momentum theorem J = Δp, and momentum conservation
      in isolated systems.
  readingFocus:
    es: leer la pendiente como masa, el signo como sentido y los cambios bruscos como
      señales de impulso externo.
    en: read the slope as mass, the sign as direction, and abrupt changes as signals
      of external impulse.
  agentHints:
    es:
    - 'La pendiente de la recta es la masa: rectas más empinadas indican cuerpos más
      masivos.'
    - 'El signo del momento es vectorial: un cambio de signo implica inversión del
      movimiento.'
    - Un cambio brusco en p indica que ha actuado un impulso externo.
    en:
    - 'The slope of the line equals the mass: steeper lines indicate more massive
      bodies.'
    - 'Momentum is a vector: a sign change implies reversal of motion direction.'
    - An abrupt change in p indicates that an external impulse has acted on the body.
  commonMistakes:
    es:
    - 'Confundir la velocidad con el momento: son proporcionales pero no iguales.'
    - Ignorar el signo del momento en problemas de colisiones.
    - Aplicar la fórmula p = mv cuando la masa del sistema cambia con el tiempo.
    en:
    - 'Confusing velocity with momentum: they are proportional but not equal.'
    - Ignoring the sign of momentum in collision problems.
    - Applying p = mv when the system's mass changes over time.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: momento-lineal-Svg
  graphId: momento-lineal-Svg
  title:
    es: Escena SVG · Momento Lineal
    en: SVG Scene · Linear Momentum
  sceneId: momento_lineal_scene
  sceneLabel:
    es: Cuerpo en movimiento con vector momento lineal
    en: Moving body with linear momentum vector
  objects:
    es:
    - cuerpo
    - vector velocidad
    - vector momento lineal
    - referencia de reposo
    en:
    - body
    - velocity vector
    - linear momentum vector
    - rest reference
  mainObject:
    es: cuerpo en traslación
    en: translating body
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra un cuerpo con su vector velocidad y el vector momento lineal
      asociado, paralelos entre sí y con el mismo sentido.
    en: The scene shows a body with its velocity vector and associated linear momentum
      vector, parallel and in the same direction.
  interactions:
    es: 'No hay fuerzas externas netas en la escena base: el momento se conserva si
      el sistema está aislado.'
    en: 'No net external forces are present in the base scene: momentum is conserved
      if the system is isolated.'
  modelElements:
    es:
    - masa del cuerpo
    - velocidad instantánea
    - vector p = mv
    en:
    - body mass
    - instantaneous velocity
    - momentum vector p = mv
  visualCues:
    es:
    - La longitud del vector momento es proporcional al producto m·v.
    - El sentido del vector momento coincide con el de la velocidad.
    - Cambiar la masa o la velocidad cambia la magnitud del vector.
    en:
    - The length of the momentum vector is proportional to the product m·v.
    - The direction of the momentum vector matches that of the velocity.
    - Changing mass or velocity changes the vector's magnitude.
  scaleMeaning:
    es: 'La escena es cualitativa: los vectores ilustran proporciones relativas, no
      valores absolutos.'
    en: 'The scene is qualitative: vectors illustrate relative proportions, not absolute
      values.'
  relation:
    es: La escena ilustra que el momento lineal es un vector que combina la inercia
      del cuerpo con su estado de movimiento.
    en: The scene illustrates that linear momentum is a vector combining the body's
      inertia with its state of motion.
  physicalReading:
    es: 'Leer el vector momento como la cantidad de movimiento del cuerpo: cuanto
      más largo y más masivo, más difícil de detener.'
    en: 'Read the momentum vector as the body''s quantity of motion: the longer and
      more massive, the harder to stop.'
  modelConnection:
    es: Se interpreta bajo el modelo de partícula puntual con masa constante en referencial
      inercial.
    en: Interpreted within the point-particle model with constant mass in an inertial
      frame.
  formulaConnection:
    es: Conecta con p = mv y con el teorema impulso-momento.
    en: Connects to p = mv and the impulse-momentum theorem.
  readingFocus:
    es: identificar la dirección y magnitud del vector momento antes de analizar cambios
      por fuerzas externas.
    en: identify the direction and magnitude of the momentum vector before analyzing
      changes due to external forces.
  agentHints:
    es:
    - El vector momento es paralelo al de velocidad.
    - Un cuerpo más masivo tiene un vector momento más largo a igual velocidad.
    - Si el sistema es aislado, la suma vectorial de momentos no cambia.
    en:
    - The momentum vector is parallel to the velocity vector.
    - A more massive body has a longer momentum vector at the same velocity.
    - In an isolated system, the vector sum of momenta does not change.
  commonMistakes:
    es:
    - Confundir el vector momento con el vector fuerza.
    - Pensar que un cuerpo en reposo no tiene momento cuando sí puede tenerlo si se
      observa desde otro marco.
    - Omitir el sentido vectorial al plantear conservación en colisiones.
    en:
    - Confusing the momentum vector with the force vector.
    - Assuming a body at rest has no momentum, when it may from another reference
      frame.
    - Omitting the vector nature of momentum when applying conservation in collisions.
  recommendedTab: graficas
