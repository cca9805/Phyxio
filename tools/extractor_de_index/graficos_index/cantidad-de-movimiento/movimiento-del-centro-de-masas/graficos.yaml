version: '1.0'
leaf: movimiento-del-centro-de-masas
coord:
  id: movimiento-del-centro-de-masas-Coord
  graphId: movimiento-del-centro-de-masas-Coord
  title:
    es: Gráfica Coord · Movimiento del Centro de Masas
    en: Coord Graph · Center-of-Mass Motion
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: posición del centro de masas x_cm (m)
    en: center-of-mass position x_cm (m)
  xMagnitude: t
  yMagnitude: x_cm
  relation:
    es: El centro de masas se mueve como una partícula puntual de masa M sometida
      a la fuerza externa neta. Si F_ext = 0, el centro de masas se desplaza a velocidad
      constante.
    en: The center of mass moves like a point particle of mass M subject to the net
      external force. If F_ext = 0, the center of mass moves at constant velocity.
  physicalReading:
    es: La pendiente de la curva x_cm(t) es la velocidad del centro de masas. Si la
      curva es lineal, el centro de masas se mueve a velocidad constante. Si es parabólica,
      hay aceleración causada por una fuerza externa.
    en: The slope of the x_cm(t) curve is the center-of-mass velocity. A linear curve
      means constant velocity; a parabolic one indicates acceleration from an external
      force.
  slopeMeaning:
    es: La pendiente dx_cm/dt es la velocidad del centro de masas v_cm. Una pendiente
      constante indica velocidad uniforme y ausencia de fuerza externa neta.
    en: The slope dx_cm/dt is the center-of-mass velocity v_cm. A constant slope indicates
      uniform velocity and the absence of net external force.
  interceptMeaning:
    es: La posición inicial del centro de masas x_cm(0) es la condición inicial del
      problema.
    en: The initial center-of-mass position x_cm(0) is the initial condition of the
      problem.
  curvatureMeaning:
    es: Una curvatura parabólica indica aceleración constante del centro de masas
      causada por una fuerza externa constante.
    en: A parabolic curvature indicates constant center-of-mass acceleration caused
      by a constant external force.
  signMeaning:
    es: 'El signo de la pendiente indica el sentido de movimiento del centro de masas:
      positivo hacia la derecha, negativo hacia la izquierda.'
    en: 'The sign of the slope indicates the direction of center-of-mass motion: positive
      to the right, negative to the left.'
  areaMeaning:
    es: En una gráfica posición-tiempo x_cm(t), el área bajo la curva no es la lectura
      física principal. La información útil está en la pendiente y la curvatura.
    en: In a position-time graph x_cm(t), the area under the curve is not the main
      physical reading. The useful information is in the slope and curvature.
  domainMeaning:
    es: Válido mientras se mantenga constante la definición del sistema (sin pérdida
      ni ganancia de masa).
    en: Valid as long as the system definition remains constant (no mass gain or loss).
  modelConnection:
    es: 'Se interpreta bajo la segunda ley de Newton para el centro de masas: F_ext
      = M·a_cm.'
    en: 'Interpreted within Newton''s second law for the center of mass: F_ext = M·a_cm.'
  formulaConnection:
    es: Conecta con x_cm(t) = x_cm(0) + v_cm·t + ½·a_cm·t² y con F_ext = M·a_cm.
    en: Connects to x_cm(t) = x_cm(0) + v_cm·t + ½·a_cm·t² and F_ext = M·a_cm.
  readingFocus:
    es: leer la pendiente como velocidad del centro de masas y detectar cambios de
      curvatura que indican fuerzas externas.
    en: read the slope as the center-of-mass velocity and detect curvature changes
      that indicate external forces.
  agentHints:
    es:
    - Si F_ext = 0, la curva es una línea recta aunque los cuerpos internos colisionen
      entre sí.
    - La posición del centro de masas no depende de las fuerzas internas del sistema.
    - Una colisión interna puede cambiar las posiciones de las partículas pero no
      altera la trayectoria del centro de masas si F_ext = 0.
    en:
    - If F_ext = 0, the curve is a straight line even if the internal bodies collide.
    - The center-of-mass position does not depend on internal forces.
    - An internal collision can change particle positions but does not alter the center-of-mass
      trajectory if F_ext = 0.
  commonMistakes:
    es:
    - Pensar que una colisión interna altera el movimiento del centro de masas.
    - No distinguir entre la posición de las partículas individuales y la del centro
      de masas.
    - Confundir la ecuación del centro de masas con las ecuaciones individuales de
      cada partícula.
    en:
    - Assuming that an internal collision alters the center-of-mass motion.
    - Failing to distinguish between individual particle positions and the center-of-mass
      position.
    - Confusing the center-of-mass equation with the individual equations of each
      particle.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: movimiento-del-centro-de-masas-Svg
  graphId: movimiento-del-centro-de-masas-Svg
  title:
    es: Escena SVG · Movimiento del Centro de Masas
    en: SVG Scene · Center-of-Mass Motion
  sceneId: movimiento_cm
  sceneLabel:
    es: Sistema de partículas con trayectoria del centro de masas
    en: Particle system with center-of-mass trajectory
  objects:
    es:
    - partícula 1
    - partícula 2
    - trayectoria del centro de masas
    - trayectorias individuales
    en:
    - particle 1
    - particle 2
    - center-of-mass trajectory
    - individual trajectories
  mainObject:
    es: trayectoria del centro de masas
    en: center-of-mass trajectory
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra las trayectorias individuales de cada partícula y la trayectoria
      del centro de masas superpuesta, demostrando que esta sigue un movimiento simple
      aunque las partículas hagan trayectorias complejas.
    en: The scene shows individual particle trajectories and the superimposed center-of-mass
      trajectory, demonstrating that it follows simple motion even when individual
      trajectories are complex.
  interactions:
    es: Si solo actúan fuerzas internas, la trayectoria del centro de masas es rectilínea
      uniforme. Una fuerza externa la curva.
    en: If only internal forces act, the center-of-mass trajectory is uniform rectilinear.
      An external force curves it.
  modelElements:
    es:
    - trayectorias x_i(t) de las partículas
    - trayectoria x_cm(t) del centro de masas
    - fuerza externa neta si existe
    en:
    - particle trajectories x_i(t)
    - center-of-mass trajectory x_cm(t)
    - net external force if present
  visualCues:
    es:
    - 'La trayectoria del centro de masas es la más simple del sistema: rectilínea
      si F_ext = 0.'
    - Las partículas pueden moverse de forma compleja mientras el centro de masas
      se mueve uniformemente.
    - Una explosión o colisión interna no desvía la trayectoria del centro de masas.
    en:
    - 'The center-of-mass trajectory is the simplest in the system: rectilinear if
      F_ext = 0.'
    - Particles can move in complex ways while the center of mass moves uniformly.
    - An internal explosion or collision does not deflect the center-of-mass trajectory.
  scaleMeaning:
    es: La escena muestra las trayectorias cualitativamente. La del centro de masas
      siempre es la más suave del sistema.
    en: The scene shows trajectories qualitatively. The center-of-mass trajectory
      is always the smoothest in the system.
  relation:
    es: La escena ilustra que el centro de masas actúa como un punto representativo
      del sistema que responde solo a fuerzas externas.
    en: The scene illustrates that the center of mass acts as a representative point
      of the system that responds only to external forces.
  physicalReading:
    es: 'Comparar la trayectoria del centro de masas con las de las partículas individuales:
      la del centro de masas es simple incluso cuando las internas son complejas.'
    en: 'Compare the center-of-mass trajectory with those of individual particles:
      the former is simple even when the latter are complex.'
  modelConnection:
    es: Se interpreta bajo la segunda ley de Newton para el centro de masas.
    en: Interpreted within Newton's second law for the center of mass.
  formulaConnection:
    es: Conecta con F_ext = M·a_cm y con la conservación del momento si F_ext = 0.
    en: Connects to F_ext = M·a_cm and momentum conservation when F_ext = 0.
  readingFocus:
    es: identificar que la trayectoria del centro de masas no se altera por interacciones
      internas y solo cambia ante fuerzas externas.
    en: identify that the center-of-mass trajectory is unaffected by internal interactions
      and only changes under external forces.
  agentHints:
    es:
    - Aunque una explosión separa las partes del cuerpo, el centro de masas sigue
      la trayectoria que tenía antes de la explosión.
    - El centro de masas de un proyectil sigue una parábola aunque el proyectil explote
      en el aire.
    - Identificar la trayectoria del centro de masas simplifica enormemente el análisis
      del sistema.
    en:
    - Even when an explosion breaks the body apart, the center of mass continues the
      trajectory it had before the explosion.
    - The center of mass of a projectile follows a parabola even if the projectile
      explodes in mid-air.
    - Identifying the center-of-mass trajectory greatly simplifies the system's analysis.
  commonMistakes:
    es:
    - Pensar que una explosión interna puede cambiar la trayectoria del centro de
      masas.
    - Confundir la trayectoria del centro de masas con la de la parte más masiva.
    - No distinguir entre la aceleración del centro de masas y la de las partículas
      individuales.
    en:
    - Assuming an internal explosion can change the center-of-mass trajectory.
    - Confusing the center-of-mass trajectory with that of the most massive part.
    - Failing to distinguish between center-of-mass acceleration and individual particle
      acceleration.
  recommendedTab: graficas
