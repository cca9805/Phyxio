version: '1.0'
leaf: sistemas-aislados-y-fuerzas-externas
dcl:
  id: sistemas-aislados-y-fuerzas-externas-Dcl
  graphId: sistemas-aislados-y-fuerzas-externas-Dcl
  title:
    es: DCL · Sistemas Aislados y Fuerzas Externas
    en: FBD · Isolated Systems and External Forces
  sceneId: sistema_con_fuerza_externa
  sceneLabel:
    es: Sistema de partículas con fuerza externa identificada
    en: Particle system with identified external force
  selectedObject:
    es: sistema de partículas como un todo
    en: particle system as a whole
  selectedObjectId: particle_system
  forces:
    es:
    - fuerza externa F_ext
    - pares de fuerzas internas (se anulan)
    en:
    - external force F_ext
    - internal force pairs (cancel out)
  visibleForces:
    es:
    - fuerza externa F_ext
    en:
    - external force F_ext
  hiddenForces:
    es:
    - fuerzas internas (se cancelan en la suma total)
    en:
    - internal forces (cancel in the total sum)
  components:
    es:
    - componente horizontal de F_ext
    - componente vertical de F_ext
    en:
    - horizontal component of F_ext
    - vertical component of F_ext
  resultant:
    es: F_ext neta del sistema
    en: net F_ext of the system
  axisConvention:
    es: 'Ejes cartesianos estándar: x horizontal positivo hacia la derecha, y vertical
      positivo hacia arriba.'
    en: 'Standard Cartesian axes: x horizontal positive to the right, y vertical positive
      upward.'
  positiveDirection:
    es: El sentido positivo se elige en la dirección del movimiento o de la fuerza
      externa dominante.
    en: The positive direction is chosen along the direction of motion or the dominant
      external force.
  forceBalanceReading:
    es: 'La suma de fuerzas externas sobre el sistema determina cómo cambia el momento
      total: dp/dt = F_ext.'
    en: 'The sum of external forces on the system determines how total momentum changes:
      dp/dt = F_ext.'
  equilibriumHints:
    es:
    - Si F_ext = 0, el sistema está en equilibrio dinámico y el momento se conserva.
    - Si F_ext ≠ 0, el centro de masas acelera en la dirección de la fuerza neta.
    en:
    - If F_ext = 0, the system is in dynamic equilibrium and momentum is conserved.
    - If F_ext ≠ 0, the center of mass accelerates in the direction of the net force.
  relation:
    es: El DCL muestra qué fuerzas externas actúan sobre el sistema global, permitiendo
      aplicar la segunda ley de Newton al conjunto.
    en: The FBD shows which external forces act on the overall system, enabling Newton's
      second law to be applied to the whole.
  physicalReading:
    es: El diagrama trata al sistema completo como un único cuerpo y solo incluye
      las fuerzas que vienen del exterior.
    en: The diagram treats the entire system as a single body and only includes forces
      from outside.
  modelConnection:
    es: 'Se interpreta bajo la segunda ley de Newton aplicada a sistemas: F_ext =
      dp_total/dt.'
    en: 'Interpreted within Newton''s second law applied to systems: F_ext = dp_total/dt.'
  formulaConnection:
    es: Conecta con F_ext = M·a_cm y con la condición de conservación del momento.
    en: Connects to F_ext = M·a_cm and the momentum conservation condition.
  readingFocus:
    es: identificar todas las fuerzas externas sobre el sistema y verificar si se
      cancelan antes de plantear conservación.
    en: identify all external forces on the system and verify whether they cancel
      before applying conservation.
  agentHints:
    es:
    - Las fuerzas internas no aparecen en el DCL del sistema global.
    - Si la resultante de fuerzas externas es cero, el momento se conserva.
    - En una colisión breve, la fuerza externa actúa muy poco tiempo y su impulso
      puede despreciarse.
    en:
    - Internal forces do not appear in the FBD of the overall system.
    - If the net external force is zero, momentum is conserved.
    - In a brief collision, the external force acts for a very short time and its
      impulse may be neglected.
  commonMistakes:
    es:
    - Incluir fuerzas internas en el DCL del sistema global.
    - Olvidar el peso del sistema como posible fuerza externa.
    - No descomponer la fuerza externa en componentes al plantear ecuaciones por ejes.
    en:
    - Including internal forces in the FBD of the overall system.
    - Forgetting the system's weight as a possible external force.
    - Not decomposing the external force into components when setting up axis equations.
  recommendedTab: graficas
svg:
  id: sistemas-aislados-y-fuerzas-externas-Svg
  graphId: sistemas-aislados-y-fuerzas-externas-Svg
  title:
    es: Escena SVG · Sistemas Aislados y Fuerzas Externas
    en: SVG Scene · Isolated Systems and External Forces
  sceneId: aislado_vs_no_aislado
  sceneLabel:
    es: Comparación entre sistema aislado y sistema con fuerza externa
    en: Comparison between isolated system and system with external force
  objects:
    es:
    - sistema A (aislado)
    - sistema B (con fuerza externa)
    - vectores de momento
    - flecha de fuerza externa
    en:
    - system A (isolated)
    - system B (with external force)
    - momentum vectors
    - external force arrow
  mainObject:
    es: comparación entre los dos sistemas
    en: comparison between the two systems
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: 'La escena muestra dos situaciones en paralelo: un sistema sin fuerzas externas
      (momento conservado) y un sistema con fuerza externa (momento cambia).'
    en: 'The scene shows two parallel situations: a system without external forces
      (momentum conserved) and one with an external force (momentum changes).'
  interactions:
    es: En el sistema A solo actúan fuerzas internas. En el sistema B una fuerza externa
      altera el momento total.
    en: In system A only internal forces act. In system B an external force alters
      the total momentum.
  modelElements:
    es:
    - momento total antes
    - momento total después
    - fuerza externa y su efecto
    - par acción-reacción interno
    en:
    - total momentum before
    - total momentum after
    - external force and its effect
    - internal action-reaction pair
  visualCues:
    es:
    - En el sistema aislado, la suma vectorial de momentos es idéntica antes y después.
    - En el sistema con fuerza externa, la suma de momentos cambia en la dirección
      de esa fuerza.
    - La fuerza externa se representa cruzando la frontera del sistema.
    en:
    - In the isolated system, the vector sum of momenta is identical before and after.
    - In the system with external force, the total momentum changes in the direction
      of that force.
    - The external force is depicted crossing the system boundary.
  scaleMeaning:
    es: 'La escena es cualitativa: la longitud de los vectores ilustra cambios relativos,
      no valores numéricos.'
    en: 'The scene is qualitative: vector lengths illustrate relative changes, not
      numerical values.'
  relation:
    es: La escena contrasta el comportamiento del momento total en presencia y ausencia
      de fuerzas externas.
    en: The scene contrasts total momentum behavior in the presence and absence of
      external forces.
  physicalReading:
    es: Leer qué sistema conserva el momento y cuál no, identificando la causa física
      de la diferencia.
    en: Read which system conserves momentum and which does not, identifying the physical
      cause of the difference.
  modelConnection:
    es: Se interpreta bajo el principio de conservación del momento y la segunda ley
      de Newton para sistemas.
    en: Interpreted within the conservation of momentum principle and Newton's second
      law for systems.
  formulaConnection:
    es: Conecta con dp_total/dt = F_ext y con la condición F_ext = 0 para conservación.
    en: Connects to dp_total/dt = F_ext and the condition F_ext = 0 for conservation.
  readingFocus:
    es: identificar cuál sistema está aislado y por qué, antes de plantear ecuaciones
      de conservación.
    en: identify which system is isolated and why, before setting up conservation
      equations.
  agentHints:
    es:
    - Comparar los dos sistemas ayuda a entender cuándo aplica la conservación y cuándo
      no.
    - El momento del sistema B cambia en la dirección de la fuerza externa.
    - En problemas reales, la condición de aislamiento es siempre una aproximación.
    en:
    - Comparing the two systems helps understand when conservation applies and when
      it does not.
    - System B's momentum changes in the direction of the external force.
    - In real problems, the isolation condition is always an approximation.
  commonMistakes:
    es:
    - Asumir que todo sistema es aislado si los cuerpos no están conectados visualmente.
    - Ignorar que el rozamiento externo rompe el aislamiento.
    - Confundir fuerzas internas con externas al cambiar la definición del sistema.
    en:
    - Assuming any system is isolated if the bodies are not visually connected.
    - Overlooking that external friction breaks isolation.
    - Confusing internal and external forces when the system definition changes.
  recommendedTab: graficas
