version: '1.0'
leaf: sistemas-aislados
coord:
  id: sistemas-aislados-Coord
  graphId: sistemas-aislados-Coord
  title:
    es: Gráfica Coord · Sistemas Aislados
    en: Coord Graph · Isolated Systems
  xAxis:
    es: tiempo t (s)
    en: time t (s)
  yAxis:
    es: momento lineal del sistema p_total (kg·m/s)
    en: total system momentum p_total (kg·m/s)
  xMagnitude: t
  yMagnitude: p_total
  relation:
    es: 'En un sistema aislado el momento total permanece constante: la gráfica muestra
      una línea horizontal independientemente de las interacciones internas.'
    en: 'In an isolated system, total momentum remains constant: the graph shows a
      horizontal line regardless of internal interactions.'
  physicalReading:
    es: 'La horizontalidad de la curva confirma la conservación: ninguna fuerza externa
      altera el momento total del sistema.'
    en: 'A horizontal curve confirms conservation: no external force alters the system''s
      total momentum.'
  slopeMeaning:
    es: 'La pendiente debe ser cero: cualquier pendiente distinta de cero indica una
      fuerza externa neta actuando sobre el sistema.'
    en: 'The slope must be zero: any nonzero slope indicates a net external force
      acting on the system.'
  interceptMeaning:
    es: El valor del momento total en el eje vertical es el momento inicial del sistema,
      que se conserva todo el tiempo.
    en: The value of total momentum on the vertical axis is the system's initial momentum,
      conserved at all times.
  curvatureMeaning:
    es: La gráfica debe ser plana (lineal con pendiente nula). Cualquier curvatura
      es señal de que el sistema no está perfectamente aislado.
    en: The graph must be flat (zero slope). Any curvature signals that the system
      is not perfectly isolated.
  signMeaning:
    es: El signo del momento total indica el sentido del movimiento del centro de
      masas del sistema.
    en: The sign of total momentum indicates the direction of motion of the system's
      center of mass.
  areaMeaning:
    es: El área bajo la curva de momento-tiempo no tiene interpretación física directa
      en este contexto.
    en: The area under the momentum-time curve has no direct physical interpretation
      in this context.
  domainMeaning:
    es: La conservación es exacta solo si el sistema está perfectamente aislado. En
      la práctica se aplica como aproximación cuando las fuerzas externas son despreciables
      frente a las internas.
    en: Conservation is exact only for a perfectly isolated system. In practice it
      is applied as an approximation when external forces are negligible compared
      to internal ones.
  modelConnection:
    es: Se interpreta bajo el principio de conservación del momento en sistemas aislados
      de la mecánica clásica.
    en: Interpreted within the conservation of momentum principle for isolated systems
      in classical mechanics.
  formulaConnection:
    es: Conecta con Σp_i = constante y con la condición F_ext = 0.
    en: Connects to Σp_i = constant and the condition F_ext = 0.
  readingFocus:
    es: 'verificar que la curva es horizontal: cualquier pendiente distinta de cero
      señala una fuerza externa no considerada.'
    en: 'verify that the curve is horizontal: any nonzero slope points to an unconsidered
      external force.'
  agentHints:
    es:
    - Una curva horizontal es la firma visual de la conservación del momento.
    - Si la curva tiene pendiente, buscar qué fuerza externa se ha ignorado.
    - El valor constante del momento total es la condición inicial del sistema.
    en:
    - A horizontal curve is the visual signature of momentum conservation.
    - If the curve has a slope, look for the external force that was overlooked.
    - The constant value of total momentum is the system's initial condition.
  commonMistakes:
    es:
    - Creer que la conservación implica que cada partícula tiene momento constante.
    - No verificar la condición de aislamiento antes de aplicar la conservación.
    - Confundir conservación del momento con conservación de la energía cinética.
    en:
    - Believing conservation implies each particle has constant momentum.
    - Failing to verify the isolation condition before applying conservation.
    - Confusing conservation of momentum with conservation of kinetic energy.
  recommendedTab: graficas
  type: Coord
  graphType: Coord
svg:
  id: sistemas-aislados-Svg
  graphId: sistemas-aislados-Svg
  title:
    es: Escena SVG · Sistemas Aislados
    en: SVG Scene · Isolated Systems
  sceneId: sistemas_aislados_scene
  sceneLabel:
    es: Sistema de partículas sin fuerzas externas netas
    en: Particle system with no net external forces
  objects:
    es:
    - partícula 1
    - partícula 2
    - vectores de momento individuales
    - vector momento total del sistema
    en:
    - particle 1
    - particle 2
    - individual momentum vectors
    - total system momentum vector
  mainObject:
    es: sistema de dos o más partículas
    en: system of two or more particles
  referenceFrame:
    es: laboratorio inercial
    en: inertial laboratory frame
  geometry:
    es: La escena muestra varias partículas con sus vectores de momento, cuya suma
      vectorial permanece constante al no haber fuerza externa neta.
    en: The scene shows several particles with their momentum vectors, whose vector
      sum remains constant in the absence of net external force.
  interactions:
    es: Las fuerzas internas entre partículas son iguales y opuestas por la tercera
      ley; no alteran el momento total del sistema.
    en: Internal forces between particles are equal and opposite by Newton's third
      law; they do not alter the system's total momentum.
  modelElements:
    es:
    - momento de cada partícula
    - suma vectorial total p_total
    - ausencia de fuerzas externas
    en:
    - individual particle momenta
    - total vector sum p_total
    - absence of external forces
  visualCues:
    es:
    - Los vectores de momento de cada partícula pueden cambiar, pero su suma vectorial
      se mantiene constante.
    - Las fuerzas internas se cancelan en la suma total.
    - Si el sistema está inicialmente en reposo, la suma de momentos siempre valdrá
      cero.
    en:
    - Individual momentum vectors may change, but their vector sum remains constant.
    - Internal forces cancel in the total sum.
    - If the system starts at rest, the total momentum always equals zero.
  scaleMeaning:
    es: 'La escena es cualitativa: muestra relaciones vectoriales, no magnitudes exactas.'
    en: 'The scene is qualitative: it shows vector relationships, not exact magnitudes.'
  relation:
    es: 'La escena ilustra el principio de conservación del momento: p_total = constante
      cuando la fuerza externa neta es nula.'
    en: 'The scene illustrates the conservation of momentum principle: p_total = constant
      when the net external force is zero.'
  physicalReading:
    es: Leer la constancia del vector momento total a pesar de los cambios en los
      momentos individuales de cada partícula.
    en: Read the constancy of the total momentum vector despite changes in the individual
      momenta of each particle.
  modelConnection:
    es: Se interpreta bajo el principio de conservación del momento lineal para sistemas
      aislados.
    en: Interpreted within the conservation of linear momentum principle for isolated
      systems.
  formulaConnection:
    es: Conecta con Σp_i = constante y con la tercera ley de Newton aplicada a fuerzas
      internas.
    en: Connects to Σp_i = constant and to Newton's third law applied to internal
      forces.
  readingFocus:
    es: verificar que la suma vectorial de todos los momentos se conserva antes y
      después de cualquier interacción interna.
    en: verify that the vector sum of all momenta is conserved before and after any
      internal interaction.
  agentHints:
    es:
    - La conservación del momento total se aplica incluso cuando los momentos individuales
      cambian.
    - Las fuerzas internas no alteran el momento total del sistema.
    - Un sistema no está realmente aislado si hay rozamiento externo, campo gravitatorio
      no compensado u otras fuerzas externas.
    en:
    - Total momentum conservation applies even when individual momenta change.
    - Internal forces do not alter the total momentum of the system.
    - A system is not truly isolated if external friction, uncompensated gravity,
      or other external forces are present.
  commonMistakes:
    es:
    - Aplicar conservación del momento cuando hay fuerzas externas significativas.
    - Sumar escalares en lugar de vectores al calcular el momento total.
    - Confundir sistema aislado con sistema en reposo.
    en:
    - Applying momentum conservation when significant external forces are present.
    - Adding scalars instead of vectors when computing total momentum.
    - Confusing an isolated system with a system at rest.
  recommendedTab: graficas
