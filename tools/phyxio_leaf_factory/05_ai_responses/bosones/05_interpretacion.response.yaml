  fugacidad:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro estadístico
      en: statistical parameter
    summary_rules:
    - id: fugacidad_summary
      when: 'true'
      status: ok
      text:
        es: '[[fugacidad]] resume el efecto de [[potencial_quimico]] y [[temperatura]] en un factor adimensional
          que mide cercanía a degeneración.'
        en: '[[fugacidad]] summarizes the effect of [[potencial_quimico]] and [[temperatura]] in a dimensionless
          factor measuring closeness to degeneracy.'
    physical_reading_rules:
    - id: fugacidad_physical_reading
      when: 'true'
      status: info
      text:
        es: Para el gas bosónico ideal, [[fugacidad]] debe mantenerse entre 0 y 1; valores cercanos a 1 anuncian
          ocupaciones grandes.
        en: For the ideal boson gas, [[fugacidad]] must remain between 0 and 1; values near 1 signal large occupations.
    coherence_rules:
    - id: fugacidad_coherence
      when: 'true'
      status: ok
      text:
        es: Si [[fugacidad]] supera 1 en el modelo ideal, revisa el signo de [[potencial_quimico]] o la referencia
          de energía.
        en: If [[fugacidad]] exceeds 1 in the ideal model, check the sign of [[potencial_quimico]] or the energy
          reference.
    model_validity_rules:
    - id: fugacidad_model_validity
      when: 'true'
      status: info
      text:
        es: La fugacidad es útil en equilibrio y en gases ideales o débilmente interactuantes; interacciones fuertes
          cambian su lectura.
        en: Fugacity is useful in equilibrium and in ideal or weakly interacting gases; strong interactions change
          its reading.
    graph_rules:
    - id: fugacidad_graph_reading
      when: 'true'
      status: info
      text:
        es: Una [[fugacidad]] mayor desplaza hacia arriba la curva de [[ocupacion_media]], especialmente en estados
          de baja [[energia]].
        en: Higher [[fugacidad]] shifts the [[ocupacion_media]] curve upward, especially at low [[energia]] states.
    likely_errors:
    - id: fugacidad_likely_error
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[fugacidad]] con una probabilidad: es un factor termodinámico adimensional, no una fracción
          de partículas.'
        en: 'Do not confuse [[fugacidad]] with a probability: it is a dimensionless thermodynamic factor, not a
          particle fraction.'
    next_step_rules:
    - id: fugacidad_next_step
      when: 'true'
      status: info
      text:
        es: Usa [[fugacidad]] junto con [[longitud_onda_termica]] para estimar si la densidad entra en régimen degenerado.
        en: Use [[fugacidad]] together with [[longitud_onda_termica]] to estimate whether density enters the degenerate
          regime.
    physical_intuition:
    - id: fugacidad_physical_intuition
      when: 'true'
      status: info
      text:
        es: '[[fugacidad]] es un indicador de apetito estadístico: cuanto más cerca de 1, más fácil es acumular
          bosones.'
        en: '[[fugacidad]] is a statistical appetite indicator: the closer to 1, the easier boson accumulation becomes.'
    limiting_cases:
    - id: fugacidad_limiting_case
      when: 'true'
      status: info
      text:
        es: Con [[fugacidad]] muy pequeña aparece el gas clásico diluido; al acercarse a 1 aparece el borde bosónico
          de alta ocupación.
        en: With very small [[fugacidad]] the dilute classical gas appears; approaching 1 reveals the bosonic edge
          of high occupation.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  longitud_onda_termica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: escala de degeneración
      en: degeneracy scale
    summary_rules:
    - id: longitud_onda_termica_summary
      when: 'true'
      status: ok
      text:
        es: '[[longitud_onda_termica]] mide el tamaño cuántico térmico efectivo de una partícula y compara onda
          con separación media.'
        en: '[[longitud_onda_termica]] measures the effective thermal quantum size of a particle and compares wave
          extent with mean spacing.'
    physical_reading_rules:
    - id: longitud_onda_termica_physical_reading
      when: 'true'
      status: info
      text:
        es: Una [[longitud_onda_termica]] grande indica que las ondas de materia se solapan y la estadística bosónica
          se vuelve visible.
        en: A large [[longitud_onda_termica]] indicates matter waves overlap and bosonic statistics becomes visible.
    coherence_rules:
    - id: longitud_onda_termica_coherence
      when: 'true'
      status: ok
      text:
        es: Debe salir en metros y aumentar al bajar [[temperatura]] o [[masa_particula]]; si no, revisa la raíz
          y las unidades de [[constante_planck]].
        en: It must come out in meters and increase when [[temperatura]] or [[masa_particula]] decreases; otherwise
          check the square root and [[constante_planck]] units.
    model_validity_rules:
    - id: longitud_onda_termica_model_validity
      when: 'true'
      status: info
      text:
        es: La expresión térmica de de Broglie presupone partículas no relativistas en equilibrio térmico.
        en: The thermal de Broglie expression assumes nonrelativistic particles in thermal equilibrium.
    graph_rules:
    - id: longitud_onda_termica_graph_reading
      when: 'true'
      status: info
      text:
        es: Aunque no sea eje principal, [[longitud_onda_termica]] explica cuándo la curva de ocupación deja de
          parecer clásica.
        en: Even when it is not the main axis, [[longitud_onda_termica]] explains when the occupation curve stops
          looking classical.
    likely_errors:
    - id: longitud_onda_termica_likely_error
      when: 'true'
      status: warning
      text:
        es: No la interpretes como longitud de onda de una partícula concreta con momento fijo; es una escala térmica
          promedio.
        en: Do not interpret it as the wavelength of one particle with fixed momentum; it is an average thermal
          scale.
    next_step_rules:
    - id: longitud_onda_termica_next_step
      when: 'true'
      status: info
      text:
        es: Calcula [[densidad_particulas]]*[[longitud_onda_termica]]^3 para detectar solapamiento cuántico.
        en: Compute [[densidad_particulas]]*[[longitud_onda_termica]]^3 to detect quantum overlap.
    physical_intuition:
    - id: longitud_onda_termica_physical_intuition
      when: 'true'
      status: info
      text:
        es: Cuando las ondas térmicas se pisan unas a otras, el gas deja de comportarse como canicas clásicas.
        en: When thermal waves step over one another, the gas stops behaving like classical marbles.
    limiting_cases:
    - id: longitud_onda_termica_limiting_case
      when: 'true'
      status: info
      text:
        es: A [[temperatura]] alta, [[longitud_onda_termica]] se hace pequeña; a baja temperatura crece y favorece
          degeneración.
        en: At high [[temperatura]], [[longitud_onda_termica]] becomes small; at low temperature it grows and favors
          degeneracy.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
