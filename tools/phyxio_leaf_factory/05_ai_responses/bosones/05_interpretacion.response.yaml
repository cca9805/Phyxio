    limiting_cases:
    - id: densidad_particulas_limiting_case
      when: 'true'
      status: info
      text:
        es: Con densidad muy baja aparece el límite clásico; con densidad alta frente al umbral aparece degeneración
          bosónica.
        en: At very low density the classical limit appears; at high density relative to the threshold, bosonic
          degeneracy appears.
