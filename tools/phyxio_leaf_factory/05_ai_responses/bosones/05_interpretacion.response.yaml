    - id: densidad_particulas_coherence
      when: 'true'
      status: ok
      text:
        es: La unidad debe ser m^-3; no mezcles densidad de masa con densidad de partículas.
        en: The unit must be m^-3; do not mix mass density with particle density.
    model_validity_rules:
    - id: densidad_particulas_model_validity
      when: 'true'
      status: info
      text:
        es: La lectura presupone un volumen definido y un gas suficientemente descrito por partículas bosónicas
