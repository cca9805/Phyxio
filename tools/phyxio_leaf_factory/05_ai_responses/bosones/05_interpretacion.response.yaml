        en: The standard expression assumes a nonrelativistic regime; for ultralight or relativistic particles the
          model changes.
    graph_rules:
    - id: masa_particula_graph_reading
      when: 'true'
      status: info
      text:
        es: '[[masa_particula]] actúa como parámetro: no cambia el eje de [[energia]], pero sí la escala de degeneración
          del sistema.'
        en: '[[masa_particula]] acts as a parameter: it does not change the [[energia]] axis, but it changes the
          system''s degeneracy scale.'
    likely_errors:
    - id: masa_particula_likely_error
      when: 'true'
      status: warning
      text:
        es: No confundas masa de una partícula con masa total de la muestra.
        en: Do not confuse one-particle mass with the total mass of the sample.
    next_step_rules:
    - id: masa_particula_next_step
      when: 'true'
      status: info
      text:
        es: Recalcula [[longitud_onda_termica]] al cambiar de especie bosónica.
        en: Recalculate [[longitud_onda_termica]] when changing bosonic species.
    physical_intuition:
    - id: masa_particula_physical_intuition
      when: 'true'
      status: info
      text:
        es: Las partículas ligeras tienen ondas térmicas más extendidas; por eso se delatan antes como cuánticas.
        en: Light particles have more extended thermal waves, so they reveal their quantum nature sooner.
    limiting_cases:
    - id: masa_particula_limiting_case
      when: 'true'
      status: info
      text:
        es: Al crecer mucho [[masa_particula]], la escala térmica se encoge y el comportamiento se aproxima al clásico.
        en: As [[masa_particula]] grows large, the thermal scale shrinks and behavior approaches the classical limit.
