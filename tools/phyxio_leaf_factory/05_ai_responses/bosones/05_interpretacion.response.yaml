    - id: densidad_critica_physical_reading
      when: 'true'
      status: info
      text:
        es: Si [[densidad_particulas]] supera [[densidad_critica]], el exceso se interpreta como población del estado
          fundamental en el modelo ideal.
        en: If [[densidad_particulas]] exceeds [[densidad_critica]], the excess is interpreted as ground-state population
          in the ideal model.
