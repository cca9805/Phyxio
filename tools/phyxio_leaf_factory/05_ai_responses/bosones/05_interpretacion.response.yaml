    magnitude_type: scalar
    semantic_role:
      es: variable de densidad
      en: density variable
    summary_rules:
    - id: densidad_particulas_summary
      when: 'true'
      status: ok
      text:
        es: '[[densidad_particulas]] mide cuántos bosones hay por volumen y decide, junto a [[densidad_critica]],
