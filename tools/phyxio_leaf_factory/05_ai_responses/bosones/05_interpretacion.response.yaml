    graph_rules:
    - id: densidad_critica_graph_reading
      when: 'true'
      status: info
      text:
        es: La comparación con [[densidad_critica]] permite leer si la curva de ocupación sugiere régimen clásico,
          degenerado o condensado.
        en: Comparison with [[densidad_critica]] helps read whether the occupation curve suggests classical, degenerate,
