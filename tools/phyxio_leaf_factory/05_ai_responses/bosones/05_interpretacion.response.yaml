        en: 'Do not confuse [[densidad_critica]] with an absolute maximum density: it is a regime-change threshold
          within the model.'
    next_step_rules:
    - id: densidad_critica_next_step
      when: 'true'
      status: info
      text:
        es: Compara [[densidad_particulas]]/[[densidad_critica]] y revisa si el leaf requiere tratar condensado
