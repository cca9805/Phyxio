        en: The reading assumes a defined volume and a gas sufficiently described by bosonic particles of the same
          type.
    graph_rules:
    - id: densidad_particulas_graph_reading
      when: 'true'
      status: info
      text:
        es: Aunque la gráfica principal sea de ocupación frente a [[energia]], [[densidad_particulas]] contextualiza
