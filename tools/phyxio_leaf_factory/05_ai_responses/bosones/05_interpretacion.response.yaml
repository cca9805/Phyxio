      when: 'true'
      status: ok
      text:
        es: '[[constante_boltzmann]] convierte [[temperatura]] en escala energética y aparece en el exponente estadístico.'
        en: '[[constante_boltzmann]] converts [[temperatura]] into an energy scale and appears in the statistical
          exponent.'
    physical_reading_rules:
    - id: constante_boltzmann_physical_reading
      when: 'true'
