    - id: densidad_critica_summary
      when: 'true'
      status: ok
      text:
        es: '[[densidad_critica]] marca el umbral de densidad por encima del cual el gas ideal bosónico no cabe
          en estados excitados.'
        en: '[[densidad_critica]] marks the density threshold above which the ideal boson gas cannot fit into excited
          states.'
