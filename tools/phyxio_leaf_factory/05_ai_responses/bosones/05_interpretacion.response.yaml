    - id: masa_particula_physical_reading
      when: 'true'
      status: info
      text:
        es: A mayor [[masa_particula]], menor longitud térmica de de Broglie y menor tendencia al solapamiento cuántico.
        en: Larger [[masa_particula]] gives a smaller thermal de Broglie wavelength and weaker tendency toward quantum
