    - id: densidad_critica_coherence
      when: 'true'
      status: ok
      text:
        es: '[[densidad_critica]] debe tener unidad m^-3 y decrecer cuando [[longitud_onda_termica]] aumenta.'
        en: '[[densidad_critica]] must have unit m^-3 and decrease when [[longitud_onda_termica]] increases.'
    model_validity_rules:
    - id: densidad_critica_model_validity
      when: 'true'
      status: info
      text:
        es: El umbral es el del gas ideal homogéneo; confinamiento, interacciones o dimensionalidad distinta modifican
          el valor.
        en: The threshold is for the homogeneous ideal gas; confinement, interactions, or different dimensionality
