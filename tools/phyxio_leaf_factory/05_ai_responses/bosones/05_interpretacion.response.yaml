    - id: densidad_particulas_physical_reading
      when: 'true'
      status: info
      text:
        es: Una [[densidad_particulas]] alta favorece solapamiento cuántico cuando la separación media compite con
          [[longitud_onda_termica]].
        en: A high [[densidad_particulas]] favors quantum overlap when mean spacing competes with [[longitud_onda_termica]].
