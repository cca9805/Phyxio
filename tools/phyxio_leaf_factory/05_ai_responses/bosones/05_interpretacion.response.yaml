  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - bose_einstein_ocupacion
  - fugacidad_bosonica
  - longitud_onda_termica_de_broglie
  - densidad_critica_bose
  magnitudes:
  - ocupacion_media
  - energia
  - potencial_quimico
  - temperatura
  - constante_boltzmann
  - fugacidad
  - longitud_onda_termica
  - masa_particula
  - constante_planck
  - densidad_critica
  - densidad_particulas
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística de bosones
    en: statistical thermodynamics of bosons
  axis_convention:
    es: Las magnitudes de este leaf son escalares; el signo relevante aparece en energía efectiva y potencial químico.
    en: The quantities in this leaf are scalar; the relevant sign appears in effective energy and chemical potential.
  standard_assumptions:
  - es: Bosones indistinguibles en equilibrio térmico.
    en: Indistinguishable bosons in thermal equilibrium.
  - es: El gas ideal bosónico usa niveles de energía definidos y potencial químico físicamente admisible.
    en: The ideal boson gas uses defined energy levels and a physically admissible chemical potential.
  - es: Las constantes se usan en unidades SI salvo indicación explícita.
    en: Constants are used in SI units unless explicitly stated.
  standard_warnings:
  - es: No interpretes ocupaciones bosónicas como probabilidades limitadas por 1.
    en: Do not interpret bosonic occupations as probabilities bounded by 1.
  - es: Revisa siempre que el exponente sea adimensional y que la temperatura esté en kelvin.
    en: Always check that the exponent is dimensionless and that temperature is in kelvin.
  - es: Cerca del umbral de condensación, el modelo ideal puede requerir separar el estado fundamental.
    en: Near the condensation threshold, the ideal model may require separating the ground state.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: La ocupación media y la fugacidad son adimensionales; energía, potencial químico y kBT deben compartir
        unidad energética.
      en: Mean occupation and fugacity are dimensionless; energy, chemical potential, and kBT must share energy
        units.
  - id: boson_admissibility_check
    status: warning
    text:
      es: Para bosones ideales, evita valores que hagan negativo el denominador de Bose-Einstein.
      en: For ideal bosons, avoid values that make the Bose-Einstein denominator negative.
  - id: critical_density_check
    status: info
    text:
      es: Compara densidad de partículas con densidad crítica antes de hablar de condensación.
      en: Compare particle density with critical density before discussing condensation.
error_patterns:
  enabled: true
  patterns:
  - id: occupation_as_probability
    status: warning
    text:
      es: Tratar [[ocupacion_media]] como probabilidad impide entender por qué puede ser mayor que 1.
      en: Treating [[ocupacion_media]] as a probability prevents understanding why it can exceed 1.
  - id: temperature_in_celsius
    status: error
    text:
      es: Usar grados Celsius en fórmulas con [[constante_boltzmann]] produce exponentes erróneos.
      en: Using Celsius degrees in formulas with [[constante_boltzmann]] produces wrong exponents.
  - id: chemical_potential_too_high
    status: error
    text:
      es: Un [[potencial_quimico]] por encima del nivel mínimo rompe la interpretación del gas ideal bosónico.
      en: A [[potencial_quimico]] above the lowest level breaks the ideal boson gas interpretation.
  - id: hbar_h_confusion
    status: warning
    text:
      es: Mezclar h y ℏ sin el factor 2π altera [[longitud_onda_termica]] y [[densidad_critica]].
      en: Mixing h and ℏ without the 2π factor changes [[longitud_onda_termica]] and [[densidad_critica]].
graph_reading_policy:
  enabled: true
  primary_variable: ocupacion_media
  reading_sequence:
  - es: Identifica [[energia]] en el eje horizontal y [[ocupacion_media]] en el vertical.
    en: Identify [[energia]] on the horizontal axis and [[ocupacion_media]] on the vertical axis.
  - es: Observa cómo la curva cae al aumentar la energía y cómo se eleva al acercarse al umbral marcado por [[potencial_quimico]].
    en: Observe how the curve falls as energy increases and how it rises near the threshold set by [[potencial_quimico]].
  - es: Relaciona la curvatura con [[temperatura]] y con la diferencia entre [[energia]] y [[potencial_quimico]].
    en: Relate the curvature to [[temperatura]] and to the difference between [[energia]] and [[potencial_quimico]].
  key_points:
  - es: 'La pendiente no representa una velocidad: expresa sensibilidad estadística de la ocupación.'
    en: 'The slope is not a velocity: it expresses statistical sensitivity of occupation.'
  - es: La zona de bajas energías concentra la lectura bosónica más característica.
    en: The low-energy region contains the most characteristic bosonic reading.
  - es: La ocupación pequeña permite aproximación clásica; la ocupación grande exige estadística de Bose-Einstein.
    en: Small occupation allows a classical approximation; large occupation requires Bose-Einstein statistics.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[densidad_particulas]] con [[densidad_critica]] para distinguir gas clásico, degenerado o condensado.
    en: Compare [[densidad_particulas]] with [[densidad_critica]] to distinguish classical, degenerate, or condensed
      gas.
  - es: Compara [[energia]]-[[potencial_quimico]] con [[constante_boltzmann]]*[[temperatura]] para estimar ocupación.
    en: Compare [[energia]]-[[potencial_quimico]] with [[constante_boltzmann]]*[[temperatura]] to estimate occupation.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: El exponente de Bose-Einstein debe ser adimensional; [[longitud_onda_termica]] debe salir en metros y las
      densidades en m^-3.
    en: The Bose-Einstein exponent must be dimensionless; [[longitud_onda_termica]] must come out in meters and
      densities in m^-3.
  common_unit_mistakes:
  - es: Usar Celsius en vez de kelvin para [[temperatura]].
    en: Using Celsius instead of kelvin for [[temperatura]].
  - es: Mezclar julios y electronvoltios en [[energia]] y [[potencial_quimico]].
    en: Mixing joules and electronvolts in [[energia]] and [[potencial_quimico]].
  - es: Confundir densidad de masa con [[densidad_particulas]].
    en: Confusing mass density with [[densidad_particulas]].
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: true
  processes:
  - id: classical_limit
    label:
      es: límite clásico diluido
      en: dilute classical limit
    trigger:
      es: '[[ocupacion_media]] pequeña o [[fugacidad]] muy inferior a 1.'
      en: Small [[ocupacion_media]] or [[fugacidad]] far below 1.
  - id: degenerate_bose_gas
    label:
      es: gas bosónico degenerado
      en: degenerate Bose gas
    trigger:
      es: '[[densidad_particulas]]*[[longitud_onda_termica]]^3 no es despreciable.'
      en: '[[densidad_particulas]]*[[longitud_onda_termica]]^3 is not negligible.'
  - id: condensation_threshold
    label:
      es: umbral de condensación
      en: condensation threshold
    trigger:
      es: '[[densidad_particulas]] se aproxima o supera [[densidad_critica]].'
      en: '[[densidad_particulas]] approaches or exceeds [[densidad_critica]].'
wave_behavior_context:
  enabled: true
  phenomena:
  - id: matter_wave_overlap
    text:
      es: El solapamiento de ondas de materia se vuelve importante cuando [[longitud_onda_termica]] compite con
        la separación media.
      en: Matter-wave overlap becomes important when [[longitud_onda_termica]] competes with mean spacing.
  - id: bosonic_accumulation
    text:
      es: Los bosones pueden acumularse en un mismo estado porque no obedecen exclusión de Pauli.
      en: Bosons can accumulate in the same state because they do not obey Pauli exclusion.
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  ocupacion_media:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado principal
      en: main result
    summary_rules:
    - id: ocupacion_media_summary
      when: 'true'
      status: ok
      text:
        es: '[[ocupacion_media]] cuenta cuántos bosones ocupan de media un estado: crece mucho cuando [[energia]]
          se acerca a [[potencial_quimico]] a temperatura finita.'
        en: '[[ocupacion_media]] gives the average number of bosons in one state: it grows strongly when [[energia]]
          approaches [[potencial_quimico]] at finite temperature.'
    physical_reading_rules:
    - id: ocupacion_media_physical_reading
      when: 'true'
      status: info
      text:
        es: 'Lee [[ocupacion_media]] como número adimensional no negativo, no como probabilidad: puede superar 1
          porque varios bosones comparten el mismo estado.'
        en: 'Read [[ocupacion_media]] as a non-negative dimensionless number, not as a probability: it may exceed
          1 because several bosons can share one state.'
    coherence_rules:
    - id: ocupacion_media_coherence
      when: 'true'
      status: ok
      text:
        es: Si [[ocupacion_media]] es negativa o aparece con unidades, revisa el exponente de Bose-Einstein y la
          condición [[potencial_quimico]] menor que [[energia]].
        en: If [[ocupacion_media]] is negative or has units, check the Bose-Einstein exponent and the condition
          that [[potencial_quimico]] is below [[energia]].
    model_validity_rules:
    - id: ocupacion_media_model_validity
      when: 'true'
      status: info
      text:
        es: La lectura vale para bosones indistinguibles en equilibrio térmico; cerca de la condensación, el estado
          fundamental puede requerir tratamiento separado.
        en: The reading is valid for indistinguishable bosons in thermal equilibrium; near condensation, the ground
          state may need separate treatment.
    graph_rules:
    - id: ocupacion_media_graph_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, [[ocupacion_media]] baja al aumentar [[energia]] y se vuelve muy grande cerca del
          umbral controlado por [[potencial_quimico]].
        en: In the Coord graph, [[ocupacion_media]] decreases as [[energia]] increases and becomes very large near
          the threshold set by [[potencial_quimico]].
    likely_errors:
    - id: ocupacion_media_likely_error
      when: 'true'
      status: warning
      text:
        es: No sustituyas la distribución bosónica por Maxwell-Boltzmann cuando [[ocupacion_media]] no es pequeña
          o cuando la degeneración cuántica es importante.
        en: Do not replace the bosonic distribution with Maxwell-Boltzmann when [[ocupacion_media]] is not small
          or when quantum degeneracy matters.
    next_step_rules:
    - id: ocupacion_media_next_step
      when: 'true'
      status: info
      text:
        es: Contrasta el valor con [[temperatura]], [[fugacidad]] y [[densidad_particulas]] para decidir si el gas
          está en régimen clásico o degenerado.
        en: Compare the value with [[temperatura]], [[fugacidad]], and [[densidad_particulas]] to decide whether
          the gas is classical or degenerate.
    physical_intuition:
    - id: ocupacion_media_physical_intuition
      when: 'true'
      status: info
      text:
        es: 'La ausencia de exclusión permite acumulación: muchos bosones pueden caer en el mismo nivel si la energía
          efectiva es suficientemente baja.'
        en: 'The absence of exclusion allows accumulation: many bosons can fall into the same level if the effective
          energy is low enough.'
    limiting_cases:
    - id: ocupacion_media_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando el exponente es grande, [[ocupacion_media]] tiende a cero; cuando se acerca a cero por arriba,
          [[ocupacion_media]] crece sin límite ideal.
        en: When the exponent is large, [[ocupacion_media]] tends to zero; when it approaches zero from above, [[ocupacion_media]]
          grows without bound in the ideal model.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  energia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable independiente
      en: independent variable
    summary_rules:
    - id: energia_summary
      when: 'true'
      status: ok
      text:
        es: '[[energia]] fija el nivel del estado; frente a [[potencial_quimico]] determina cuán accesible resulta
          para los bosones.'
        en: '[[energia]] sets the state level; compared with [[potencial_quimico]], it determines how accessible
          the state is to bosons.'
    physical_reading_rules:
    - id: energia_physical_reading
      when: 'true'
      status: info
      text:
        es: Una [[energia]] mayor reduce la ocupación media a la misma [[temperatura]] porque aumenta el coste térmico
          del estado.
        en: A higher [[energia]] lowers the mean occupation at the same [[temperatura]] because it raises the thermal
          cost of the state.
    coherence_rules:
    - id: energia_coherence
      when: 'true'
      status: ok
      text:
        es: Usa julios o una unidad energética coherente con [[constante_boltzmann]]*[[temperatura]]; mezclar eV
          y J deforma el exponente.
        en: Use joules or an energy unit consistent with [[constante_boltzmann]]*[[temperatura]]; mixing eV and
          J distorts the exponent.
    model_validity_rules:
    - id: energia_model_validity
      when: 'true'
      status: info
      text:
        es: La energía debe describir niveles compatibles con el modelo de gas ideal bosónico o con el espectro
          declarado.
        en: The energy must describe levels compatible with the ideal boson gas model or with the stated spectrum.
    graph_rules:
    - id: energia_graph_reading
      when: 'true'
      status: info
      text:
        es: 'En el eje x, [[energia]] se lee como variable independiente: la curva de ocupación cae de forma no
          lineal al desplazarse hacia niveles altos.'
        en: 'On the x-axis, [[energia]] is read as the independent variable: the occupation curve drops nonlinearly
          toward high levels.'
    likely_errors:
    - id: energia_likely_error
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[energia]] con temperatura: ambas aparecen juntas, pero una mide nivel del estado y la
          otra agitación térmica.'
        en: 'Do not confuse [[energia]] with temperature: both appear together, but one measures the state level
          and the other thermal agitation.'
    next_step_rules:
    - id: energia_next_step
      when: 'true'
      status: info
      text:
        es: Comprueba si el intervalo de [[energia]] usado incluye la zona cercana a [[potencial_quimico]], donde
          la lectura cambia más rápido.
        en: Check whether the [[energia]] range includes the region near [[potencial_quimico]], where the reading
          changes fastest.
    physical_intuition:
    - id: energia_physical_intuition
      when: 'true'
      status: info
      text:
        es: Los niveles bajos son asientos baratos para bosones; los niveles altos exigen más energía térmica para
          poblarse.
        en: Low levels are cheap seats for bosons; high levels require more thermal energy to become populated.
    limiting_cases:
    - id: energia_limiting_case
      when: 'true'
      status: info
      text:
        es: Para [[energia]] muy grande frente a [[constante_boltzmann]]*[[temperatura]], la ocupación se aproxima
          al límite clásico diluido.
        en: For [[energia]] much larger than [[constante_boltzmann]]*[[temperatura]], occupation approaches the
          dilute classical limit.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  potencial_quimico:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro termodinámico
      en: thermodynamic parameter
    summary_rules:
    - id: potencial_quimico_summary
      when: 'true'
      status: ok
      text:
        es: '[[potencial_quimico]] regula la entrada estadística de partículas y, para bosones ideales, no debe
          superar el nivel de menor [[energia]].'
        en: '[[potencial_quimico]] controls the statistical entry of particles and, for ideal bosons, must not exceed
          the lowest [[energia]] level.'
    physical_reading_rules:
    - id: potencial_quimico_physical_reading
      when: 'true'
      status: info
      text:
        es: Más [[potencial_quimico]] acerca el sistema a alta ocupación; si alcanza el mínimo energético aparece
          el umbral de condensación ideal.
        en: Higher [[potencial_quimico]] moves the system toward high occupation; reaching the energy minimum marks
          the ideal condensation threshold.
    coherence_rules:
    - id: potencial_quimico_coherence
      when: 'true'
      status: ok
      text:
        es: Si el denominador de Bose-Einstein se anula o cambia de signo, revisa [[potencial_quimico]] frente a
          [[energia]].
        en: If the Bose-Einstein denominator vanishes or changes sign, check [[potencial_quimico]] against [[energia]].
    model_validity_rules:
    - id: potencial_quimico_model_validity
      when: 'true'
      status: info
      text:
        es: La regla de signo depende de la referencia de energía; lo importante es que el exponente permanezca
          físicamente admisible.
        en: The sign rule depends on the energy reference; what matters is that the exponent remains physically
          admissible.
    graph_rules:
    - id: potencial_quimico_graph_reading
      when: 'true'
      status: info
      text:
        es: Al aumentar [[potencial_quimico]], la curva [[ocupacion_media]] frente a [[energia]] se eleva y se concentra
          cerca de bajas energías.
        en: As [[potencial_quimico]] increases, the [[ocupacion_media]] versus [[energia]] curve rises and concentrates
          near low energies.
    likely_errors:
    - id: potencial_quimico_likely_error
      when: 'true'
      status: warning
      text:
        es: 'No trates [[potencial_quimico]] como una energía externa cualquiera: en bosones ideales está limitado
          por el estado fundamental.'
        en: 'Do not treat [[potencial_quimico]] as just any external energy: in ideal bosons it is bounded by the
          ground state.'
    next_step_rules:
    - id: potencial_quimico_next_step
      when: 'true'
      status: info
      text:
        es: Evalúa [[fugacidad]] para traducir [[potencial_quimico]] a un parámetro adimensional más cómodo.
        en: Evaluate [[fugacidad]] to translate [[potencial_quimico]] into a more convenient dimensionless parameter.
    physical_intuition:
    - id: potencial_quimico_physical_intuition
      when: 'true'
      status: info
      text:
        es: '[[potencial_quimico]] actúa como una perilla de población: al subirla, los estados se llenan con más
          facilidad.'
        en: '[[potencial_quimico]] acts as a population knob: raising it makes states easier to fill.'
    limiting_cases:
    - id: potencial_quimico_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando [[potencial_quimico]] está muy por debajo de [[energia]], la ocupación cae al régimen clásico;
          al acercarse al mínimo, surge degeneración.
        en: When [[potencial_quimico]] is far below [[energia]], occupation falls to the classical regime; approaching
          the minimum brings degeneracy.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro de control
      en: control parameter
    summary_rules:
    - id: temperatura_summary
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] controla la escala térmica [[constante_boltzmann]]*[[temperatura]] que suaviza la ocupación
          de los niveles bosónicos.'
        en: '[[temperatura]] controls the thermal scale [[constante_boltzmann]]*[[temperatura]] that smooths occupation
          of bosonic levels.'
    physical_reading_rules:
    - id: temperatura_physical_reading
      when: 'true'
      status: info
      text:
        es: A mayor [[temperatura]], las diferencias de [[energia]] pesan menos y se pueblan más niveles excitados.
        en: At higher [[temperatura]], [[energia]] differences matter less and more excited levels become populated.
    coherence_rules:
    - id: temperatura_coherence
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] debe expresarse en kelvin y ser positiva; usar grados Celsius en el exponente produce
          resultados sin sentido.'
        en: '[[temperatura]] must be in kelvin and positive; using degrees Celsius in the exponent produces meaningless
          results.'
    model_validity_rules:
    - id: temperatura_model_validity
      when: 'true'
      status: info
      text:
        es: 'El equilibrio térmico es imprescindible: sin temperatura bien definida, la distribución de Bose-Einstein
          no describe el sistema.'
        en: 'Thermal equilibrium is essential: without a well-defined temperature, the Bose-Einstein distribution
          does not describe the system.'
    graph_rules:
    - id: temperatura_graph_reading
      when: 'true'
      status: info
      text:
        es: 'Cambiar [[temperatura]] modifica la curvatura de [[ocupacion_media]] frente a [[energia]]: temperaturas
          altas aplanan la caída.'
        en: 'Changing [[temperatura]] modifies the curvature of [[ocupacion_media]] versus [[energia]]: high temperatures
          flatten the drop.'
    likely_errors:
    - id: temperatura_likely_error
      when: 'true'
      status: warning
      text:
        es: No interpretes subir [[temperatura]] como aumentar siempre la condensación; normalmente dispersa población
          hacia estados excitados.
        en: Do not interpret raising [[temperatura]] as always increasing condensation; it usually spreads population
          into excited states.
    next_step_rules:
    - id: temperatura_next_step
      when: 'true'
      status: info
      text:
        es: Compara [[densidad_particulas]] con [[densidad_critica]] a esa [[temperatura]] para valorar degeneración
          o condensación.
        en: Compare [[densidad_particulas]] with [[densidad_critica]] at that [[temperatura]] to assess degeneracy
          or condensation.
    physical_intuition:
    - id: temperatura_physical_intuition
      when: 'true'
      status: info
      text:
        es: 'La temperatura agita el tablero: con más agitación, los bosones se reparten en más niveles.'
        en: 'Temperature shakes the board: with more agitation, bosons spread over more levels.'
    limiting_cases:
    - id: temperatura_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura]] tiende a cero, el modelo ideal empuja la población hacia los estados más bajos;
          a temperatura alta aparece el límite clásico.
        en: As [[temperatura]] tends to zero, the ideal model pushes population toward the lowest states; at high
          temperature the classical limit appears.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  constante_boltzmann:
    enabled: true
