    physical_intuition:
    - id: densidad_critica_physical_intuition
      when: 'true'
      status: info
      text:
        es: '[[densidad_critica]] es el aforo de los estados excitados: superarlo obliga a llenar el estado más
          bajo.'
        en: '[[densidad_critica]] is the capacity of excited states: exceeding it forces filling the lowest state.'
    limiting_cases:
    - id: densidad_critica_limiting_case
      when: 'true'
      status: info
      text:
        es: A temperaturas bajas, [[densidad_critica]] disminuye; a temperaturas altas aumenta y la condensación
          se aleja.
        en: At low temperatures, [[densidad_critica]] decreases; at high temperatures it increases and condensation
          recedes.
