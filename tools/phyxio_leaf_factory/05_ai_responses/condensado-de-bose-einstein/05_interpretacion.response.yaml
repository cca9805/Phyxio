  numero_condensado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: población condensada
      en: condensed population
    summary_rules:
    - id: numero_condensado_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[numero_condensado]] cuenta cuántos bosones pertenecen al modo condensado. Interprétala con su unidad
          1 y con el régimen ideal de bosones.'
        en: '[[numero_condensado]] counts how many bosons belong to the condensed mode. Interpret it with its 1
          unit and within the ideal-boson regime.'
    physical_reading_rules:
    - id: numero_condensado_physical_reading_context
      when: 'true'
      status: info
      text:
        es: 'Lee [[numero_condensado]] como parte del equilibrio Bose-Einstein: no es un dato aislado, depende de
          [[temperatura]], [[densidad_particulas]] y del solapamiento cuántico.'
        en: 'Read [[numero_condensado]] as part of Bose-Einstein equilibrium: it is not an isolated number, but
          depends on [[temperatura]], [[densidad_particulas]], and quantum overlap.'
    - id: numero_condensado_physical_reading_unit
      when: 'true'
      status: ok
      text:
        es: 'Comprueba la unidad esperada de [[numero_condensado]]: 1. Una unidad incompatible suele indicar que
          se mezclaron densidad, número total o volumen.'
        en: 'Check the expected unit of [[numero_condensado]]: 1. An incompatible unit usually means density, total
          number, or volume were mixed.'
    coherence_rules:
    - id: numero_condensado_coherence_condensation_regime
      when: 'true'
      status: ok
      text:
        es: 'Contrasta [[numero_condensado]] con [[temperatura_critica]] y [[fraccion_condensada]]: por encima del
          umbral térmico no debe aparecer condensado ideal.'
        en: 'Compare [[numero_condensado]] with [[temperatura_critica]] and [[fraccion_condensada]]: above the thermal
          threshold an ideal condensate should not appear.'
    - id: numero_condensado_coherence_density_volume
      when: 'true'
      status: ok
      text:
        es: Si intervienen [[numero_particulas]] y [[volumen]], verifica que su cociente sea coherente con [[densidad_particulas]]
          antes de interpretar [[numero_condensado]].
        en: If [[numero_particulas]] and [[volumen]] appear, verify that their ratio is consistent with [[densidad_particulas]]
          before interpreting [[numero_condensado]].
    model_validity_rules:
    - id: numero_condensado_model_validity_ideal_gas
      when: 'true'
      status: info
      text:
        es: Usa [[numero_condensado]] dentro del gas de bosones ideal o débilmente interactuante; interacciones
          fuertes, trampas reales o tamaño finito pueden desplazar el umbral.
        en: Use [[numero_condensado]] within an ideal or weakly interacting boson gas; strong interactions, real
          traps, or finite size can shift the threshold.
    - id: numero_condensado_model_validity_temperature
      when: temperatura <= 0
      status: warning
      text:
        es: Una [[temperatura]] no positiva invalida la lectura termodinámica estándar de [[numero_condensado]].
        en: A non-positive [[temperatura]] invalidates the standard thermodynamic reading of [[numero_condensado]].
    graph_rules:
    - id: numero_condensado_graph_temperature_axis
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, localiza [[temperatura]] respecto a [[temperatura_critica]] para decidir si [[numero_condensado]]
          pertenece a la zona condensada o térmica.
        en: On the Coord graph, locate [[temperatura]] relative to [[temperatura_critica]] to decide whether [[numero_condensado]]
          belongs to the condensed or thermal region.
    - id: numero_condensado_graph_slope_limit
      when: 'true'
      status: info
      text:
        es: 'Observa la curvatura cerca de [[temperatura_critica]]: un cambio brusco de [[fraccion_condensada]]
          señala transición ideal, no una fuerza mecánica.'
        en: 'Observe the curvature near [[temperatura_critica]]: a sharp change in [[fraccion_condensada]] signals
          an ideal transition, not a mechanical force.'
    likely_errors:
    - id: numero_condensado_likely_error_classical
      when: 'true'
      status: warning
      text:
        es: 'No trates [[numero_condensado]] con intuición clásica de partículas distinguibles: la condensación
          surge porque muchos bosones pueden compartir el mismo estado.'
        en: 'Do not treat [[numero_condensado]] with classical distinguishable-particle intuition: condensation
          arises because many bosons can share the same state.'
    - id: numero_condensado_likely_error_threshold
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[temperatura_critica]] con la [[temperatura]] real: el primero es un umbral y la segunda
          es el estado actual del sistema.'
        en: 'Do not confuse [[temperatura_critica]] with the actual [[temperatura]]: the first is a threshold and
          the second is the current state of the system.'
    next_step_rules:
    - id: numero_condensado_next_step_compare_threshold
      when: 'true'
      status: info
      text:
        es: Después de calcular [[numero_condensado]], compara [[temperatura]] con [[temperatura_critica]] y decide
