global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística de bosones
    en: statistical thermodynamics of bosons
  axis_convention:
    es: En este leaf las magnitudes principales son escalares; el signo no representa dirección espacial.
    en: In this leaf the main quantities are scalar; sign does not represent spatial direction.
  standard_assumptions:
  - es: Gas ideal o débilmente interactuante de bosones indistinguibles en equilibrio térmico.
    en: Ideal or weakly interacting gas of indistinguishable bosons in thermal equilibrium.
  - es: El volumen macroscópico permite usar densidades y umbrales termodinámicos.
    en: The macroscopic volume allows densities and thermodynamic thresholds to be used.
  standard_warnings:
  - es: 'No declares condensación solo por tener baja temperatura: compara siempre [[temperatura]] con [[temperatura_critica]].'
    en: 'Do not declare condensation only from low temperature: always compare [[temperatura]] with [[temperatura_critica]].'
  - es: No confundas fracción condensada con probabilidad individual ni con densidad de partículas.
    en: Do not confuse condensed fraction with individual probability or particle density.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Las unidades deben distinguir K, m^-3, m, kg, J/K y magnitudes adimensionales.
      en: Units must distinguish K, m^-3, m, kg, J/K, and dimensionless quantities.
  - id: condensation_threshold_check
    status: ok
    text:
      es: La interpretación debe ser compatible con el cambio de régimen al cruzar [[temperatura_critica]].
      en: The interpretation must be compatible with the regime change when crossing [[temperatura_critica]].
error_patterns:
  enabled: true
  patterns:
  - id: threshold_confusion
    status: warning
    text:
      es: Confundir [[temperatura]] con [[temperatura_critica]] cambia el diagnóstico físico del condensado.
      en: Confusing [[temperatura]] with [[temperatura_critica]] changes the physical diagnosis of the condensate.
  - id: density_number_confusion
    status: warning
    text:
      es: Usar [[numero_particulas]] como si fuera [[densidad_particulas]] elimina el papel de [[volumen]].
      en: Using [[numero_particulas]] as if it were [[densidad_particulas]] removes the role of [[volumen]].
  - id: classical_gas_overread
    status: warning
    text:
      es: Aplicar intuición de gas clásico oculta el solapamiento de ondas descrito por [[longitud_onda_termica]].
      en: Applying classical-gas intuition hides the wave overlap described by [[longitud_onda_termica]].
graph_reading_policy:
  enabled: true
  primary_variable: temperatura_critica
  reading_sequence:
  - es: Identifica si el eje horizontal representa [[temperatura]] o un cociente con [[temperatura_critica]].
    en: Identify whether the horizontal axis represents [[temperatura]] or a ratio involving [[temperatura_critica]].
  - es: Localiza el umbral y lee cómo cambia [[fraccion_condensada]] al acercarse a él.
    en: Locate the threshold and read how [[fraccion_condensada]] changes as it is approached.
  - es: Relaciona la forma de la curva con la densidad, la masa y la longitud de onda térmica.
    en: Relate the curve shape to density, mass, and thermal wavelength.
  key_points:
  - es: La zona por debajo de [[temperatura_critica]] permite [[numero_condensado]] macroscópico.
    en: The region below [[temperatura_critica]] allows macroscopic [[numero_condensado]].
  - es: La zona por encima de [[temperatura_critica]] corresponde a gas térmico sin condensado ideal.
    en: The region above [[temperatura_critica]] corresponds to a thermal gas without an ideal condensate.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[temperatura_critica]] con temperaturas de laboratorio ultrafrías, típicamente nanoKelvin o microKelvin
      en gases atómicos diluidos.
    en: Compare [[temperatura_critica]] with ultracold laboratory temperatures, typically nanokelvin or microkelvin
      in dilute atomic gases.
  - es: Compara [[densidad_particulas]] con la densidad crítica antes de afirmar que el sistema ha degenerado cuánticamente.
    en: Compare [[densidad_particulas]] with the critical density before claiming that the system has become quantum-degenerate.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[temperatura_critica]] debe salir en K, [[densidad_critica]] en m^-3, [[longitud_onda_termica]] en m y
      [[fraccion_condensada]] sin unidad.'
    en: '[[temperatura_critica]] must come out in K, [[densidad_critica]] in m^-3, [[longitud_onda_termica]] in
      m, and [[fraccion_condensada]] unitless.'
  common_unit_mistakes:
  - es: Usar cm^-3 como si fuera m^-3 en [[densidad_particulas]].
    en: Using cm^-3 as if it were m^-3 for [[densidad_particulas]].
  - es: Introducir [[masa_particula]] en unidades atómicas sin convertir a kg.
    en: Entering [[masa_particula]] in atomic units without converting to kg.
