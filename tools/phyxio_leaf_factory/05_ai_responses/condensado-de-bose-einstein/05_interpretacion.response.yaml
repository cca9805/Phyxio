    - id: temperatura_critica_likely_error_classical
      when: 'true'
      status: warning
      text:
        es: 'No trates [[temperatura_critica]] con intuición clásica de partículas distinguibles: la condensación
          surge porque muchos bosones pueden compartir el mismo estado.'
        en: 'Do not treat [[temperatura_critica]] with classical distinguishable-particle intuition: condensation
