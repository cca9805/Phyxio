      when: 'true'
      status: info
      text:
        es: 'Observa la curvatura cerca de [[temperatura_critica]]: un cambio brusco de [[fraccion_condensada]]
          señala transición ideal, no una fuerza mecánica.'
        en: 'Observe the curvature near [[temperatura_critica]]: a sharp change in [[fraccion_condensada]] signals
          an ideal transition, not a mechanical force.'
