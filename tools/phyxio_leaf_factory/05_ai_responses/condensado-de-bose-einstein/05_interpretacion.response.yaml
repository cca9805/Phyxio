targets:
  fraccion_condensada:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado principal
      en: main result
    summary_rules:
    - id: fraccion_condensada_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[fraccion_condensada]] indica qué parte del sistema ocupa colectivamente el estado fundamental. Interprétala
          con su unidad adimensional y con el régimen ideal de bosones.'
        en: '[[fraccion_condensada]] indicates what fraction of the system collectively occupies the ground state.
          Interpret it with its adimensional unit and within the ideal-boson regime.'
    physical_reading_rules:
    - id: fraccion_condensada_physical_reading_context
      when: 'true'
      status: info
      text:
        es: 'Lee [[fraccion_condensada]] como parte del equilibrio Bose-Einstein: no es un dato aislado, depende
          de [[temperatura]], [[densidad_particulas]] y del solapamiento cuántico.'
        en: 'Read [[fraccion_condensada]] as part of Bose-Einstein equilibrium: it is not an isolated number, but
          depends on [[temperatura]], [[densidad_particulas]], and quantum overlap.'
    - id: fraccion_condensada_physical_reading_unit
      when: 'true'
      status: ok
      text:
        es: 'Comprueba la unidad esperada de [[fraccion_condensada]]: adimensional. Una unidad incompatible suele
          indicar que se mezclaron densidad, número total o volumen.'
        en: 'Check the expected unit of [[fraccion_condensada]]: adimensional. An incompatible unit usually means
          density, total number, or volume were mixed.'
    coherence_rules:
    - id: fraccion_condensada_coherence_condensation_regime
      when: 'true'
      status: ok
      text:
        es: 'Contrasta [[fraccion_condensada]] con [[temperatura_critica]] y [[fraccion_condensada]]: por encima
          del umbral térmico no debe aparecer condensado ideal.'
        en: 'Compare [[fraccion_condensada]] with [[temperatura_critica]] and [[fraccion_condensada]]: above the
          thermal threshold an ideal condensate should not appear.'
    - id: fraccion_condensada_coherence_density_volume
      when: 'true'
      status: ok
      text:
        es: Si intervienen [[numero_particulas]] y [[volumen]], verifica que su cociente sea coherente con [[densidad_particulas]]
          antes de interpretar [[fraccion_condensada]].
        en: If [[numero_particulas]] and [[volumen]] appear, verify that their ratio is consistent with [[densidad_particulas]]
          before interpreting [[fraccion_condensada]].
    model_validity_rules:
    - id: fraccion_condensada_model_validity_ideal_gas
      when: 'true'
      status: info
      text:
        es: Usa [[fraccion_condensada]] dentro del gas de bosones ideal o débilmente interactuante; interacciones
          fuertes, trampas reales o tamaño finito pueden desplazar el umbral.
        en: Use [[fraccion_condensada]] within an ideal or weakly interacting boson gas; strong interactions, real
          traps, or finite size can shift the threshold.
    - id: fraccion_condensada_model_validity_temperature
      when: temperatura <= 0
      status: warning
      text:
        es: Una [[temperatura]] no positiva invalida la lectura termodinámica estándar de [[fraccion_condensada]].
        en: A non-positive [[temperatura]] invalidates the standard thermodynamic reading of [[fraccion_condensada]].
    graph_rules:
    - id: fraccion_condensada_graph_temperature_axis
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, localiza [[temperatura]] respecto a [[temperatura_critica]] para decidir si [[fraccion_condensada]]
          pertenece a la zona condensada o térmica.
        en: On the Coord graph, locate [[temperatura]] relative to [[temperatura_critica]] to decide whether [[fraccion_condensada]]
          belongs to the condensed or thermal region.
    - id: fraccion_condensada_graph_slope_limit
      when: 'true'
      status: info
      text:
        es: 'Observa la curvatura cerca de [[temperatura_critica]]: un cambio brusco de [[fraccion_condensada]]
          señala transición ideal, no una fuerza mecánica.'
        en: 'Observe the curvature near [[temperatura_critica]]: a sharp change in [[fraccion_condensada]] signals
          an ideal transition, not a mechanical force.'
    likely_errors:
    - id: fraccion_condensada_likely_error_classical
      when: 'true'
      status: warning
      text:
        es: 'No trates [[fraccion_condensada]] con intuición clásica de partículas distinguibles: la condensación
          surge porque muchos bosones pueden compartir el mismo estado.'
        en: 'Do not treat [[fraccion_condensada]] with classical distinguishable-particle intuition: condensation
          arises because many bosons can share the same state.'
    - id: fraccion_condensada_likely_error_threshold
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[temperatura_critica]] con la [[temperatura]] real: el primero es un umbral y la segunda
          es el estado actual del sistema.'
        en: 'Do not confuse [[temperatura_critica]] with the actual [[temperatura]]: the first is a threshold and
          the second is the current state of the system.'
    next_step_rules:
    - id: fraccion_condensada_next_step_compare_threshold
      when: 'true'
      status: info
      text:
        es: Después de calcular [[fraccion_condensada]], compara [[temperatura]] con [[temperatura_critica]] y decide
          si debes leer [[fraccion_condensada]] o revisar la densidad.
        en: After calculating [[fraccion_condensada]], compare [[temperatura]] with [[temperatura_critica]] and
          decide whether to read [[fraccion_condensada]] or recheck density.
    physical_intuition:
    - id: fraccion_condensada_intuition_overlap
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[fraccion_condensada]] cobra sentido cuando la [[longitud_onda_termica]] se vuelve
          comparable a la separación media entre bosones.
        en: Intuitively, [[fraccion_condensada]] becomes meaningful when [[longitud_onda_termica]] becomes comparable
          to the mean spacing between bosons.
    limiting_cases:
    - id: fraccion_condensada_limit_high_temperature
      when: temperatura >> temperatura_critica
      status: info
      text:
        es: Si [[temperatura]] es mucho mayor que [[temperatura_critica]], la lectura ideal espera [[fraccion_condensada]]
          prácticamente nula.
        en: If [[temperatura]] is much larger than [[temperatura_critica]], the ideal reading expects nearly zero
          [[fraccion_condensada]].
    - id: fraccion_condensada_limit_low_temperature
      when: temperatura << temperatura_critica
      status: info
      text:
        es: Si [[temperatura]] está muy por debajo de [[temperatura_critica]], el modelo predice una población macroscópica
          en [[numero_condensado]].
        en: If [[temperatura]] is far below [[temperatura_critica]], the model predicts a macroscopic population
          in [[numero_condensado]].
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
