global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística en ensamble canónico
    en: statistical thermodynamics in the canonical ensemble
  axis_convention:
    es: En este leaf las magnitudes son escalares; el signo procede de definiciones termodinámicas como F=-k_B*T*ln(Z), S=-dF/dT
      y p=-dF/dV.
    en: In this leaf quantities are scalar; signs come from thermodynamic definitions such as F=-k_B*T*ln(Z), S=-dF/dT, and
      p=-dF/dV.
  standard_assumptions:
  - es: Sistema en equilibrio térmico descrito por una función de partición canónica positiva.
    en: System in thermal equilibrium described by a positive canonical partition function.
  - es: La temperatura absoluta es positiva y las derivadas se leen manteniendo fijas las variables indicadas por el modelo.
    en: Absolute temperature is positive and derivatives are read while holding fixed the variables stated by the model.
  standard_warnings:
  - es: No confundas una derivada de ln(Z) con una magnitud macroscópica antes de aplicar los factores k_B y T.
    en: Do not confuse a derivative of ln(Z) with a macroscopic quantity before applying the k_B and T factors.
  - es: Una pendiente gráfica solo tiene significado físico si se conocen las variables mantenidas constantes.
    en: A graph slope has physical meaning only if the held-fixed variables are known.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: F y U deben quedar en J, S en J/K, p en Pa y Z sin unidades.
      en: F and U must be in J, S in J/K, p in Pa, and Z dimensionless.
  - id: thermodynamic_sign_check
    status: warning
    text:
      es: Revisa los signos negativos de F=-k_B*T*ln(Z), S=-dF/dT y p=-dF/dV antes de interpretar el resultado.
      en: Check the negative signs in F=-k_B*T*ln(Z), S=-dF/dT, and p=-dF/dV before interpreting the result.
error_patterns:
  enabled: true
  patterns:
  - id: partition_function_as_energy
    status: warning
    text:
      es: Tratar [[funcion_particion]] como si tuviera unidades de energía rompe la lectura física del leaf.
      en: Treating [[funcion_particion]] as if it had energy units breaks the physical reading of the leaf.
  - id: slope_without_constant_variable
    status: warning
    text:
      es: Leer una pendiente sin indicar si T, V o N permanecen constantes suele producir una magnitud equivocada.
      en: Reading a slope without stating whether T, V, or N is held constant often produces the wrong quantity.
graph_reading_policy:
  enabled: true
  primary_variable: energia_libre_helmholtz
  reading_sequence:
  - es: Identifica que el eje horizontal representa [[temperatura]] y el vertical [[energia_libre_helmholtz]].
    en: Identify that the horizontal axis represents [[temperatura]] and the vertical axis [[energia_libre_helmholtz]].
  - es: Lee la pendiente local de F frente a T como [[pendiente_energia_libre_temperatura]] y conecta su signo con [[entropia]].
    en: Read the local slope of F versus T as [[pendiente_energia_libre_temperatura]] and connect its sign to [[entropia]].
  key_points:
  - es: La curva F(T) resume cómo la función de partición genera magnitudes termodinámicas al variar la temperatura.
    en: The F(T) curve summarizes how the partition function generates thermodynamic quantities as temperature varies.
  - es: Una curva descendente de F con T suele indicar entropía positiva porque S=-dF/dT.
    en: A decreasing F curve with T usually indicates positive entropy because S=-dF/dT.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara energías térmicas con k_B*T antes de decidir si el valor obtenido es grande o pequeño.
    en: Compare thermal energies with k_B*T before deciding whether the obtained value is large or small.
  - es: Para sistemas macroscópicos, F, U y S suelen escalar con el tamaño del sistema.
    en: For macroscopic systems, F, U, and S usually scale with system size.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Comprueba que ln(Z) sea adimensional y que cada derivada añada la unidad inversa de la variable derivada.
    en: Check that ln(Z) is dimensionless and that each derivative adds the inverse unit of the differentiation variable.
  common_unit_mistakes:
  - es: Usar temperatura en grados Celsius dentro de expresiones con k_B*T.
    en: Using temperature in degrees Celsius inside expressions with k_B*T.
  - es: Asignar julios a Z o a ln(Z).
    en: Assigning joules to Z or ln(Z).
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: true
  processes:
  - id: fixed_temperature_volume
    label:
      es: T y V fijados
      en: fixed T and V
    meaning:
      es: El potencial adecuado es la energía libre de Helmholtz.
      en: The appropriate potential is Helmholtz free energy.
  - id: thermal_variation
    label:
      es: variación con temperatura
      en: temperature variation
    meaning:
      es: La pendiente de F respecto de T permite leer la entropía.
      en: The slope of F with respect to T allows entropy to be read.
  - id: volume_variation
    label:
      es: variación con volumen
      en: volume variation
    meaning:
      es: La pendiente de F respecto de V permite leer la presión con signo opuesto.
      en: The slope of F with respect to V allows pressure to be read with opposite sign.
