targets:
  funcion_particion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: fuente estadística
      en: statistical source
    summary_rules:
    - id: funcion_particion_summary_main
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] representa fuente estadística en la conexión entre la función de partición y las magnitudes
          termodinámicas.'
        en: '[[funcion_particion]] represents the statistical source in the connection between the partition function and
          thermodynamic quantities.'
    physical_reading_rules:
    - id: funcion_particion_physical_reading_unit_sign
      when: 'true'
      status: info
      text:
        es: Lee [[funcion_particion]] como Z, con unidad 1, dimensión 1 y significado ligado al ensamble canónico.
        en: Read [[funcion_particion]] as Z, with unit 1, dimension 1, and meaning tied to the canonical ensemble.
    coherence_rules:
    - id: funcion_particion_coherence_dimensions
      when: 'true'
      status: ok
      text:
        es: Comprueba que las fórmulas que producen [[funcion_particion]] respetan su unidad 1 y no mezclan una cantidad microscópica
          con una macroscópica.
        en: Check that formulas producing [[funcion_particion]] respect its unit 1 and do not mix a microscopic quantity with
          a macroscopic one.
    - id: funcion_particion_coherence_positive
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] debe ser positiva; si Z≤0, ln(Z) no es válido y falla el modelo canónico.'
        en: '[[funcion_particion]] must be positive; if Z≤0, ln(Z) is invalid and the canonical model fails.'
    model_validity_rules:
    - id: funcion_particion_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: Interpreta [[funcion_particion]] solo si Z>0, T>0 K y el sistema puede describirse por equilibrio canónico.
        en: Interpret [[funcion_particion]] only if Z>0, T>0 K, and the system can be described by canonical equilibrium.
    graph_rules:
    - id: funcion_particion_graph_coord_connection
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[funcion_particion]] con la curva F(T) y con las pendientes que generan entropía
          o presión cuando corresponda.
        en: In the Coord graph, relate [[funcion_particion]] to the F(T) curve and to the slopes that generate entropy or
          pressure when applicable.
    likely_errors:
    - id: funcion_particion_likely_error_isolated_number
      when: 'true'
      status: warning
      text:
        es: 'No leas [[funcion_particion]] como un número aislado: revisa unidad, signo, variable mantenida constante y fórmula
          usada.'
        en: 'Do not read [[funcion_particion]] as an isolated number: check unit, sign, held-fixed variable, and formula used.'
    next_step_rules:
    - id: funcion_particion_next_step_compare
      when: 'true'
      status: info
      text:
        es: Después de calcular [[funcion_particion]], compara el resultado con k_B*T, con la escala del sistema o con la
          pendiente gráfica relevante.
        en: After calculating [[funcion_particion]], compare the result with k_B*T, with system scale, or with the relevant
          graph slope.
    physical_intuition:
    - id: funcion_particion_intuition_bridge
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[funcion_particion]] muestra una pieza del puente entre microestados accesibles y comportamiento
          macroscópico.
        en: Intuitively, [[funcion_particion]] shows one piece of the bridge between accessible microstates and macroscopic
          behavior.
    limiting_cases:
    - id: funcion_particion_limiting_case_positive_temperature
      when: 'true'
      status: info
      text:
        es: En casos límite, revisa qué ocurre con [[funcion_particion]] cuando T aumenta, Z cambia mucho o la pendiente de
          F se aproxima a cero.
        en: In limiting cases, check what happens to [[funcion_particion]] when T increases, Z changes strongly, or the slope
          of F approaches zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
