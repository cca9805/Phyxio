  - energia_microestado
  - temperatura
  - constante_boltzmann
  - peso_boltzmann
  - funcion_particion
  - probabilidad_microestado
  - razon_energia_termica
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística canónica
    en: canonical statistical thermodynamics
  axis_convention:
    es: 'No hay ejes vectoriales: los signos se interpretan por referencia energética y por variación térmica.'
    en: 'There are no vector axes: signs are interpreted through energy reference and thermal variation.'
  standard_assumptions:
  - es: El sistema está en equilibrio térmico con un baño a temperatura fija.
    en: The system is in thermal equilibrium with a bath at fixed temperature.
  - es: Los microestados y sus energías están definidos antes de sumar pesos.
    en: The microstates and their energies are defined before summing weights.
  - es: La función de partición se interpreta como suma adimensional de pesos de Boltzmann.
    en: The partition function is interpreted as a dimensionless sum of Boltzmann weights.
  standard_warnings:
  - es: No confundas peso de Boltzmann, función de partición y probabilidad normalizada.
    en: Do not confuse Boltzmann weight, partition function, and normalized probability.
  - es: No uses temperatura en grados Celsius dentro de las expresiones canónicas.
    en: Do not use temperature in Celsius inside canonical expressions.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
  - Svg
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Los exponentes y probabilidades deben ser adimensionales.
      en: Exponents and probabilities must be dimensionless.
  - id: normalization_check
    status: ok
    text:
      es: Las probabilidades del conjunto de microestados deben sumar 1.
      en: Probabilities over all microstates must add to 1.
  - id: temperature_scale_check
    status: warning
    text:
      es: La temperatura debe introducirse en kelvin y con valor positivo.
      en: Temperature must be entered in kelvin and with a positive value.
error_patterns:
  enabled: true
  patterns:
  - id: weight_probability_confusion
    status: warning
    text:
      es: Un peso de Boltzmann no es una probabilidad hasta dividir por la función de partición.
      en: A Boltzmann weight is not a probability until it is divided by the partition function.
  - id: celsius_temperature_error
    status: warning
    text:
      es: Usar grados Celsius en lugar de kelvin cambia artificialmente la escala térmica.
      en: Using Celsius instead of kelvin artificially changes the thermal scale.
  - id: missing_energy_units
    status: warning
    text:
      es: Energías en eV, J o kJ deben convertirse antes de calcular razones térmicas.
      en: Energies in eV, J, or kJ must be converted before computing thermal ratios.
graph_reading_policy:
  enabled: true
  primary_variable: peso_boltzmann
  reading_sequence:
  - es: Identifica la energía del microestado en el eje de entrada y el peso de Boltzmann en la salida.
    en: Identify microstate energy on the input axis and Boltzmann weight on the output axis.
  - es: Observa cómo la temperatura modifica la pendiente efectiva de la curva.
    en: Observe how temperature changes the effective slope of the curve.
  - es: 'Conecta la curva Coord con la escena Svg: pesos grandes contribuyen más a la suma de la función de partición.'
    en: 'Connect the Coord curve with the Svg scene: larger weights contribute more to the partition-function sum.'
  key_points:
  - es: Una caída rápida indica que la energía del microestado supera la escala térmica.
    en: A fast drop indicates that microstate energy exceeds the thermal scale.
  - es: A alta temperatura, varios microestados pueden tener pesos comparables.
    en: At high temperature, several microstates may have comparable weights.
  - es: La función de partición aparece como acumulación, no como una única probabilidad.
    en: The partition function appears as an accumulation, not as a single probability.
comparative_context:
  enabled: true
  reference_values:
  - es: Si [[razon_energia_termica]] es del orden de 1, el microestado compite de forma apreciable.
    en: If [[razon_energia_termica]] is of order 1, the microstate competes appreciably.
  - es: Si [[razon_energia_termica]] es mucho mayor que 1, el peso de Boltzmann queda muy reducido.
    en: If [[razon_energia_termica]] is much greater than 1, the Boltzmann weight is strongly reduced.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: 'El argumento exponencial debe ser adimensional: energía dividida por k_B T.'
    en: 'The exponential argument must be dimensionless: energy divided by k_B T.'
  common_unit_mistakes:
  - es: Introducir temperatura en Celsius en lugar de kelvin.
    en: Entering temperature in Celsius instead of kelvin.
  - es: Mezclar eV y J sin convertir la constante de Boltzmann.
    en: Mixing eV and J without converting Boltzmann constant.
  - es: Asignar unidades al peso de Boltzmann o a la probabilidad.
    en: Assigning units to Boltzmann weight or probability.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: 'No aplica: este leaf no usa diagramas de cuerpo libre.'
    en: 'Not applicable: this leaf does not use free-body diagrams.'
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: No aplica.
      en: Not applicable.
    density_meaning:
      es: No aplica.
      en: Not applicable.
  superposition_note:
    es: No aplica.
    en: Not applicable.
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  energia_microestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: input
      en: microstate energy
    summary_rules:
    - id: energia_microestado_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[energia_microestado]] fija la penalización térmica de cada microestado y controla su contribución a [[peso_boltzmann]].'
        en: '[[energia_microestado]] sets the thermal penalty of each microstate and controls its contribution to [[peso_boltzmann]].'
    physical_reading_rules:
    - id: energia_microestado_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: Lee [[energia_microestado]] como energía microscópica del estado, no como energía media del sistema completo;
          su relevancia depende de [[temperatura]].
        en: Read [[energia_microestado]] as the microscopic energy of the state, not as the mean energy of the whole system;
          its relevance depends on [[temperatura]].
    coherence_rules:
    - id: energia_microestado_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: Debe expresarse en julios o en una unidad energética convertida antes de combinarla con [[constante_boltzmann]]*[[temperatura]].
        en: It must be expressed in joules or in a converted energy unit before combining it with [[constante_boltzmann]]*[[temperatura]].
    model_validity_rules:
    - id: energia_microestado_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: 'El valor de [[energia_microestado]] depende del modelo de niveles: si el espectro cambia con volumen, campo externo
          o interacción, cambian los pesos.'
        en: 'The value of [[energia_microestado]] depends on the level model: if the spectrum changes with volume, external
          field, or interaction, the weights change.'
    graph_rules:
    - id: energia_microestado_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: En la gráfica, aumentar [[energia_microestado]] desplaza el punto hacia zonas de menor [[peso_boltzmann]], salvo
          en límites de alta [[temperatura]].
        en: In the graph, increasing [[energia_microestado]] moves the point toward smaller [[peso_boltzmann]], except in
          high-[[temperatura]] limits.
    likely_errors:
    - id: energia_microestado_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: 'No compares [[energia_microestado]] solo por su número: compara su tamaño con la escala térmica definida por
          [[constante_boltzmann]] y [[temperatura]].'
        en: 'Do not compare [[energia_microestado]] by its number alone: compare it with the thermal scale set by [[constante_boltzmann]]
          and [[temperatura]].'
    next_step_rules:
    - id: energia_microestado_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Calcula [[razon_energia_termica]] para decidir si el microestado está térmicamente accesible o fuertemente suprimido.
        en: Compute [[razon_energia_termica]] to decide whether the microstate is thermally accessible or strongly suppressed.
    physical_intuition:
    - id: energia_microestado_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[energia_microestado]] es el coste microscópico que el sistema debe pagar para ocupar ese microestado.'
        en: '[[energia_microestado]] is the microscopic cost the system must pay to occupy that microstate.'
    limiting_cases:
    - id: energia_microestado_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: Cuando [[energia_microestado]] es mucho menor que [[constante_boltzmann]]*[[temperatura]], el estado no queda
          muy penalizado; si es mucho mayor, casi desaparece.
        en: When [[energia_microestado]] is much smaller than [[constante_boltzmann]]*[[temperatura]], the state is not strongly
          penalized; if it is much larger, it almost disappears.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: input_parameter
      en: absolute temperature
    summary_rules:
    - id: temperatura_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] controla la escala térmica que decide si las diferencias de energía importan mucho o poco.'
        en: '[[temperatura]] controls the thermal scale that decides whether energy differences matter strongly or weakly.'
    physical_reading_rules:
    - id: temperatura_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: 'Interpreta [[temperatura]] en kelvin como parámetro del baño térmico: al crecer, reduce la discriminación entre
          microestados de distinta [[energia_microestado]].'
        en: 'Interpret [[temperatura]] in kelvin as the heat-bath parameter: as it increases, it reduces discrimination between
          microstates of different [[energia_microestado]].'
    coherence_rules:
    - id: temperatura_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] debe ser positiva en el modelo canónico ordinario; usar grados Celsius directamente en los pesos
          rompe la escala energética.'
        en: '[[temperatura]] must be positive in the ordinary canonical model; using Celsius directly in the weights breaks
          the energy scale.'
    model_validity_rules:
    - id: temperatura_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: El sistema debe estar en equilibrio con un baño a [[temperatura]] fija; si hay gradientes térmicos internos, una
          única función canónica puede no bastar.
        en: The system must be in equilibrium with a bath at fixed [[temperatura]]; if internal thermal gradients exist, one
          canonical function may not be enough.
    graph_rules:
    - id: temperatura_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: Al modificar [[temperatura]], la curva de [[peso_boltzmann]] frente a [[energia_microestado]] se aplana o se vuelve
          más abrupta.
        en: When [[temperatura]] changes, the curve of [[peso_boltzmann]] versus [[energia_microestado]] flattens or becomes
          steeper.
    likely_errors:
    - id: temperatura_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: 'No pienses que subir [[temperatura]] aumenta el conjunto de pesos sin matiz: acerca pesos relativos entre niveles
          finitos y cambia la normalización.'
        en: Do not think that raising [[temperatura]] simply increases all weights; it brings relative weights for finite
          levels closer and changes normalization.
    next_step_rules:
    - id: temperatura_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Contrasta [[temperatura]] con [[energia_microestado]] mediante [[razon_energia_termica]] antes de interpretar
          accesibilidad.
        en: Compare [[temperatura]] with [[energia_microestado]] through [[razon_energia_termica]] before interpreting accessibility.
    physical_intuition:
    - id: temperatura_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[temperatura]] mide la agitación térmica disponible para explorar microestados.'
        en: '[[temperatura]] measures the thermal agitation available for exploring microstates.'
    limiting_cases:
    - id: temperatura_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: En el límite de alta [[temperatura]], los pesos tienden a igualarse; en el límite de baja [[temperatura]], domina
          la mínima [[energia_microestado]].
        en: In the high-[[temperatura]] limit, weights tend to equalize; in the low-[[temperatura]] limit, the minimum [[energia_microestado]]
          dominates.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  constante_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: constant
      en: Boltzmann constant
    summary_rules:
    - id: constante_boltzmann_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[constante_boltzmann]] convierte la [[temperatura]] en escala energética microscópica y permite comparar calor
          y energía de microestado.'
        en: '[[constante_boltzmann]] converts [[temperatura]] into a microscopic energy scale and allows heat and microstate
          energy to be compared.'
    physical_reading_rules:
    - id: constante_boltzmann_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: Lee [[constante_boltzmann]] como factor de conversión, no como variable ajustable del sistema; su presencia hace
          dimensionalmente válido el exponente.
        en: Read [[constante_boltzmann]] as a conversion factor, not as an adjustable system variable; its presence makes
          the exponent dimensionally valid.
    coherence_rules:
    - id: constante_boltzmann_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: Si falta [[constante_boltzmann]], [[energia_microestado]]/[[temperatura]] conserva unidades incorrectas; si se
          usa en eV/K, convierte coherentemente la energía.
        en: If [[constante_boltzmann]] is missing, [[energia_microestado]]/[[temperatura]] keeps incorrect units; if it is
          used in eV/K, convert the energy consistently.
    model_validity_rules:
    - id: constante_boltzmann_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: Su valor es universal; el modelo puede fallar por hipótesis físicas, no porque [[constante_boltzmann]] cambie
          entre materiales.
        en: Its value is universal; the model may fail because of physical assumptions, not because [[constante_boltzmann]]
          changes between materials.
    graph_rules:
    - id: constante_boltzmann_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: En la lectura gráfica, [[constante_boltzmann]] fija la escala horizontal efectiva al comparar [[energia_microestado]]
          con [[temperatura]].
        en: In the graph reading, [[constante_boltzmann]] fixes the effective horizontal scale when comparing [[energia_microestado]]
          with [[temperatura]].
    likely_errors:
    - id: constante_boltzmann_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: No confundas [[constante_boltzmann]] con una constante de proporcionalidad arbitraria; eliminarla destruye la
          relación entre unidades macroscópicas y microscópicas.
        en: Do not confuse [[constante_boltzmann]] with an arbitrary proportionality constant; removing it destroys the link
          between macroscopic and microscopic units.
    next_step_rules:
    - id: constante_boltzmann_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Verifica unidades de [[constante_boltzmann]] antes de calcular [[peso_boltzmann]], especialmente si [[energia_microestado]]
          está en electronvoltios.
        en: Check units of [[constante_boltzmann]] before computing [[peso_boltzmann]], especially if [[energia_microestado]]
          is in electronvolts.
    physical_intuition:
    - id: constante_boltzmann_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[constante_boltzmann]] es la bisagra entre kelvin y energía microscópica.'
        en: '[[constante_boltzmann]] is the hinge between kelvin and microscopic energy.'
    limiting_cases:
    - id: constante_boltzmann_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: En cualquier límite físico, [[constante_boltzmann]] permanece constante; lo que cambia es la razón entre [[energia_microestado]]
          y [[constante_boltzmann]]*[[temperatura]].
        en: In any physical limit, [[constante_boltzmann]] remains constant; what changes is the ratio between [[energia_microestado]]
          and [[constante_boltzmann]]*[[temperatura]].
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  peso_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: dominant_output
      en: Boltzmann weight
    summary_rules:
    - id: peso_boltzmann_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[peso_boltzmann]] resume cuánto favorece el baño térmico un microestado concreto; al aumentar [[energia_microestado]]
          baja, y al aumentar [[temperatura]] se suaviza la penalización.'
        en: '[[peso_boltzmann]] summarizes how strongly the thermal bath favors a specific microstate; it decreases as [[energia_microestado]]
          increases and softens as [[temperatura]] rises.'
    physical_reading_rules:
    - id: peso_boltzmann_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: 'Lee [[peso_boltzmann]] como un peso relativo adimensional, no como una energía: compara accesibilidad estadística
          antes de normalizar con [[funcion_particion]].'
        en: 'Read [[peso_boltzmann]] as a dimensionless relative weight, not as an energy: it compares statistical accessibility
          before normalization by [[funcion_particion]].'
    coherence_rules:
    - id: peso_boltzmann_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_microestado]] y [[constante_boltzmann]]*[[temperatura]] estén en las mismas unidades de
          energía; así el exponente que define [[peso_boltzmann]] es adimensional.
        en: Check that [[energia_microestado]] and [[constante_boltzmann]]*[[temperatura]] use the same energy units; then
          the exponent defining [[peso_boltzmann]] is dimensionless.
    model_validity_rules:
    - id: peso_boltzmann_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: 'Usa [[peso_boltzmann]] dentro del ensamble canónico: sistema en equilibrio térmico con [[temperatura]] fija,
          microestados discretos o contables y energías comparables.'
        en: 'Use [[peso_boltzmann]] within the canonical ensemble: thermal equilibrium at fixed [[temperatura]], discrete
          or countable microstates, and comparable energies.'
    graph_rules:
    - id: peso_boltzmann_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: En la gráfica de [[peso_boltzmann]] frente a [[energia_microestado]], la caída muestra que los microestados más
          energéticos contribuyen menos a [[funcion_particion]].
        en: In the graph of [[peso_boltzmann]] versus [[energia_microestado]], the drop shows that higher-energy microstates
          contribute less to [[funcion_particion]].
    likely_errors:
    - id: peso_boltzmann_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[peso_boltzmann]] con [[probabilidad_microestado]]: falta dividir por [[funcion_particion]], que
          normaliza el conjunto de pesos.'
        en: 'Do not confuse [[peso_boltzmann]] with [[probabilidad_microestado]]: division by [[funcion_particion]] is still
          needed to normalize all weights.'
    next_step_rules:
    - id: peso_boltzmann_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Después de calcular [[peso_boltzmann]], súmalo con los pesos de los demás microestados para obtener [[funcion_particion]]
          o normalízalo para hallar [[probabilidad_microestado]].
        en: After computing [[peso_boltzmann]], add it to the weights of the other microstates to obtain [[funcion_particion]]
          or normalize it to find [[probabilidad_microestado]].
    physical_intuition:
    - id: peso_boltzmann_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: 'Intuitivamente, [[peso_boltzmann]] es un filtro térmico: cuando [[razon_energia_termica]] es grande, el filtro
          deja pasar muy poco de ese microestado.'
        en: 'Intuitively, [[peso_boltzmann]] is a thermal filter: when [[razon_energia_termica]] is large, the filter lets
          very little of that microstate through.'
    limiting_cases:
    - id: peso_boltzmann_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: Si [[temperatura]] tiende a valores muy altos, [[peso_boltzmann]] se acerca a 1 para energías finitas; si [[temperatura]]
          baja, los estados de menor [[energia_microestado]] dominan.
        en: If [[temperatura]] becomes very high, [[peso_boltzmann]] approaches 1 for finite energies; if [[temperatura]]
          is low, states with smaller [[energia_microestado]] dominate.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  funcion_particion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: central_concept
      en: partition function
    summary_rules:
    - id: funcion_particion_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] es la suma de los pesos estadísticos y actúa como puente entre microestados y predicciones
          macroscópicas.'
        en: '[[funcion_particion]] is the sum of statistical weights and acts as the bridge between microstates and macroscopic
          predictions.'
    physical_reading_rules:
    - id: funcion_particion_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: 'Lee [[funcion_particion]] como un contador ponderado: no cuenta microestados por igual, sino según su [[peso_boltzmann]]
          a la [[temperatura]] dada.'
        en: 'Read [[funcion_particion]] as a weighted counter: it does not count all microstates equally, but according to
          their [[peso_boltzmann]] at the given [[temperatura]].'
    coherence_rules:
    - id: funcion_particion_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] debe ser positivo y adimensional; si aparece negativo, con unidades, o menor que un único
          [[peso_boltzmann]] positivo, hay incoherencia.'
        en: '[[funcion_particion]] must be positive and dimensionless; if it is negative, has units, or is smaller than one
          positive [[peso_boltzmann]], the result is inconsistent.'
    model_validity_rules:
    - id: funcion_particion_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: Su interpretación exige un conjunto de microestados definido y pesos canónicos; si cambian partículas, volumen
          o degeneraciones, la suma debe actualizarse.
        en: Its interpretation requires a defined set of microstates and canonical weights; if particles, volume, or degeneracies
          change, the sum must be updated.
    graph_rules:
    - id: funcion_particion_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: 'En la lectura gráfica o visual, [[funcion_particion]] representa la acumulación global de contribuciones: cada
          barra o nivel aporta mediante [[peso_boltzmann]].'
        en: 'In the graph or visual reading, [[funcion_particion]] represents the global accumulation of contributions: each
          bar or level contributes through [[peso_boltzmann]].'
    likely_errors:
    - id: funcion_particion_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: No trates [[funcion_particion]] como una probabilidad; puede ser mayor que 1 porque normaliza las [[probabilidad_microestado]].
        en: Do not treat [[funcion_particion]] as a probability; it may be greater than 1 because it normalizes the [[probabilidad_microestado]]
          values.
    next_step_rules:
    - id: funcion_particion_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Usa [[funcion_particion]] para normalizar pesos, comparar temperaturas o conectar con magnitudes termodinámicas
          en hojas posteriores.
        en: Use [[funcion_particion]] to normalize weights, compare temperatures, or connect with thermodynamic quantities
          in later leaves.
    physical_intuition:
    - id: funcion_particion_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[funcion_particion]] mide cuántas opciones microscópicas efectivas tiene el sistema, una vez aplicado el sesgo
          térmico.'
        en: '[[funcion_particion]] measures how many effective microscopic options the system has after the thermal bias is
          applied.'
    limiting_cases:
    - id: funcion_particion_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: A alta [[temperatura]], más microestados contribuyen de forma parecida; a baja [[temperatura]], [[funcion_particion]]
          queda dominada por los niveles de menor energía.
        en: At high [[temperatura]], more microstates contribute similarly; at low [[temperatura]], [[funcion_particion]]
          is dominated by the lowest-energy levels.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  probabilidad_microestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: derived_output
      en: microstate probability
    summary_rules:
    - id: probabilidad_microestado_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_microestado]] indica la fracción normalizada de presencia estadística de un microestado dentro
          del conjunto canónico.'
        en: '[[probabilidad_microestado]] indicates the normalized statistical presence of one microstate within the canonical
          set.'
    physical_reading_rules:
    - id: probabilidad_microestado_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: 'Interpreta [[probabilidad_microestado]] como probabilidad entre 0 y 1: compara el [[peso_boltzmann]] de ese estado
          con la suma total [[funcion_particion]].'
        en: 'Interpret [[probabilidad_microestado]] as a probability between 0 and 1: it compares that state''s [[peso_boltzmann]]
          with the total sum [[funcion_particion]].'
    coherence_rules:
    - id: probabilidad_microestado_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: La suma de todas las [[probabilidad_microestado]] debe ser 1; si no ocurre, revisa [[funcion_particion]] y los
          pesos incluidos.
        en: The sum of all [[probabilidad_microestado]] values must be 1; if not, check [[funcion_particion]] and the included
          weights.
    model_validity_rules:
    - id: probabilidad_microestado_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: Solo tiene sentido para microestados definidos bajo la misma [[temperatura]] y el mismo modelo energético; mezclar
          sistemas rompe la normalización.
        en: It only makes sense for microstates defined at the same [[temperatura]] and within the same energy model; mixing
          systems breaks normalization.
    graph_rules:
    - id: probabilidad_microestado_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: 'En un diagrama de microestados, [[probabilidad_microestado]] aparece como reparto relativo: las áreas o alturas
          deben sumar una unidad.'
        en: 'In a microstate diagram, [[probabilidad_microestado]] appears as a relative distribution: areas or heights should
          add to one.'
    likely_errors:
    - id: probabilidad_microestado_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: No asignes la mayor [[probabilidad_microestado]] al microestado de mayor [[energia_microestado]] salvo que exista
          una degeneración que compense el peso.
        en: Do not assign the largest [[probabilidad_microestado]] to the highest [[energia_microestado]] unless degeneracy
          compensates for the weight.
    next_step_rules:
    - id: probabilidad_microestado_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Después de obtener [[probabilidad_microestado]], compárala con otras probabilidades y pregunta qué microestados
          dominan el comportamiento observable.
        en: After obtaining [[probabilidad_microestado]], compare it with other probabilities and ask which microstates dominate
          the observable behavior.
    physical_intuition:
    - id: probabilidad_microestado_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[probabilidad_microestado]] transforma el peso relativo en una lectura de frecuencia esperada en equilibrio
          térmico.'
        en: '[[probabilidad_microestado]] turns relative weight into an expected frequency reading in thermal equilibrium.'
    limiting_cases:
    - id: probabilidad_microestado_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: Si el conjunto de [[peso_boltzmann]] es parecido, las probabilidades se igualan; si uno domina, su [[probabilidad_microestado]]
          se aproxima a 1.
        en: If all [[peso_boltzmann]] values are similar, probabilities become comparable; if one dominates, its [[probabilidad_microestado]]
          approaches 1.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
  razon_energia_termica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: validity_indicator
      en: thermal energy ratio
    summary_rules:
    - id: razon_energia_termica_summary_thermal_meaning
      when: 'true'
      status: ok
      text:
        es: '[[razon_energia_termica]] compara el coste energético de un microestado con la energía térmica disponible.'
        en: '[[razon_energia_termica]] compares the energetic cost of a microstate with the available thermal energy.'
    physical_reading_rules:
    - id: razon_energia_termica_physical_reading_units_and_role
      when: 'true'
      status: info
      text:
        es: 'Lee [[razon_energia_termica]] como indicador adimensional de accesibilidad: valores pequeños significan estado
          térmicamente fácil; valores grandes implican supresión.'
        en: 'Read [[razon_energia_termica]] as a dimensionless accessibility indicator: small values mean a thermally easy
          state; large values imply suppression.'
    coherence_rules:
    - id: razon_energia_termica_coherence_dimension_normalization
      when: 'true'
      status: ok
      text:
        es: Debe ser adimensional y positiva si [[energia_microestado]] se mide respecto a una referencia no negativa; revisa
          signos y origen de energía.
        en: It must be dimensionless and positive if [[energia_microestado]] is measured from a nonnegative reference; check
          signs and the energy zero.
    model_validity_rules:
    - id: razon_energia_termica_model_validity_canonical_scope
      when: 'true'
      status: info
      text:
        es: Su lectura depende de la referencia energética elegida; desplazar todas las energías cambia pesos absolutos, pero
          no probabilidades si la normalización es coherente.
        en: Its reading depends on the chosen energy reference; shifting all energies changes absolute weights, but not probabilities
          if normalization is consistent.
    graph_rules:
    - id: razon_energia_termica_graph_reading_weight_accessibility
      when: 'true'
      status: info
      text:
        es: 'En la gráfica, [[razon_energia_termica]] controla la rapidez de caída de [[peso_boltzmann]]: mayor razón, menor
          contribución.'
        en: 'In the graph, [[razon_energia_termica]] controls how fast [[peso_boltzmann]] falls: larger ratio, smaller contribution.'
    likely_errors:
    - id: razon_energia_termica_likely_error_specific_confusion
      when: 'true'
      status: warning
      text:
        es: 'No lo trates como energía ni como temperatura: [[razon_energia_termica]] es una comparación pura entre dos escalas.'
        en: 'Do not treat it as energy or temperature: [[razon_energia_termica]] is a pure comparison between two scales.'
    next_step_rules:
    - id: razon_energia_termica_next_step_interpretation_path
      when: 'true'
      status: info
      text:
        es: Usa [[razon_energia_termica]] para anticipar si [[peso_boltzmann]] será cercano a 1, moderado o prácticamente
          nulo.
        en: Use [[razon_energia_termica]] to anticipate whether [[peso_boltzmann]] will be close to 1, moderate, or practically
          zero.
    physical_intuition:
    - id: razon_energia_termica_physical_intuition_accessibility
      when: 'true'
      status: info
      text:
        es: '[[razon_energia_termica]] dice cuántas unidades térmicas cuesta entrar en un microestado.'
        en: '[[razon_energia_termica]] says how many thermal units it costs to enter a microstate.'
    limiting_cases:
    - id: razon_energia_termica_limiting_case_temperature_energy
      when: 'true'
      status: info
      text:
        es: Si [[razon_energia_termica]] es mucho menor que 1, los niveles son casi igualmente accesibles; si es mucho mayor
          que 1, el estado queda congelado fuera de la estadística efectiva.
        en: If [[razon_energia_termica]] is much less than 1, levels are almost equally accessible; if it is much greater
          than 1, the state is frozen out of the effective statistics.
    sign_convention_reminder:
      enabled: false
      text:
        es: Las magnitudes de este leaf son escalares; el signo relevante procede de referencias energéticas, no de ejes vectoriales.
        en: The quantities in this leaf are scalar; the relevant sign comes from energy references, not vector axes.
      common_sign_errors: []
