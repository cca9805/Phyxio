    - id: masa_particula_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Interpreta [[masa_particula]] con su unidad y con el papel de [[temperatura_absoluta]] y [[masa_particula]] en
          el ensanchamiento de la curva.
        en: Interpret [[masa_particula]] with its unit and with the role of [[temperatura_absoluta]] and [[masa_particula]]
          in broadening the curve.
