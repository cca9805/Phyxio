          necesita intervalo para producir probabilidad.'
        en: 'Do not confuse probability density with probability: a point value of [[densidad_probabilidad_velocidad]] needs
          an interval to produce probability.'
    - id: velocidad_maxima_likely_error_speed_hierarchy
      when: 'true'
      status: warning
      text:
        es: No trates [[velocidad_mas_probable]], [[velocidad_media]] y [[velocidad_rms]] como si fueran iguales; resumen
          aspectos distintos de la misma distribución.
        en: Do not treat [[velocidad_mas_probable]], [[velocidad_media]], and [[velocidad_rms]] as equal; they summarize different
          aspects of the same distribution.
    next_step_rules:
    - id: velocidad_maxima_next_step_result
      when: 'true'
      status: info
      text:
        es: Tras obtener [[velocidad_maxima]], revisa unidades, dominio de velocidades y coherencia con la forma de la curva
          antes de cambiar de fórmula.
        en: After obtaining [[velocidad_maxima]], check units, speed domain, and consistency with the curve shape before changing
          formula.
    physical_intuition:
    - id: velocidad_maxima_physical_intuition_curve
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[velocidad_maxima]] ayuda a convertir agitación térmica microscópica en una lectura estadística
          de velocidades medibles.
        en: Intuitively, [[velocidad_maxima]] helps turn microscopic thermal agitation into a statistical reading of measurable
          speeds.
    limiting_cases:
    - id: velocidad_maxima_limiting_case_temperature
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura_absoluta]] tiende a valores bajos, la distribución se estrecha; cuando crece, se ensancha
          y desplaza hacia velocidades mayores.
        en: When [[temperatura_absoluta]] tends to low values, the distribution narrows; when it grows, it broadens and shifts
          toward higher speeds.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
