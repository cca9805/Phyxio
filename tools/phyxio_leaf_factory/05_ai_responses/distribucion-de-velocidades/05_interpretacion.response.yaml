    - id: masa_particula_coherence_positive_domain
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[masa_particula]] sea compatible con velocidades no negativas y con una probabilidad total normalizada
          en el dominio físico.
        en: Check that [[masa_particula]] is compatible with nonnegative speeds and with total probability normalized over
          the physical domain.
    - id: masa_particula_coherence_thermal_scale
      when: 'true'
      status: ok
      text:
        es: Si aumenta [[temperatura_absoluta]] o disminuye [[masa_particula]], las velocidades características deben desplazarse
          hacia valores mayores.
        en: If [[temperatura_absoluta]] increases or [[masa_particula]] decreases, characteristic speeds must shift toward
          larger values.
