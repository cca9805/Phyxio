  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinamica-estadistica
    en: statistical thermodynamics
  axis_convention:
    es: En este leaf la velocidad se usa como rapidez escalar no negativa; no representa una componente vectorial con signo.
    en: In this leaf speed is used as a nonnegative scalar speed; it does not represent a signed vector component.
  standard_assumptions:
  - es: Gas clásico diluido en equilibrio térmico descrito por Maxwell-Boltzmann.
    en: Dilute classical gas in thermal equilibrium described by Maxwell-Boltzmann statistics.
  - es: Las partículas tienen masa fija y la temperatura absoluta controla la escala energética térmica.
    en: Particles have fixed mass and absolute temperature controls the thermal energy scale.
  standard_warnings:
  - es: No interpretes una altura de la curva como una probabilidad sin integrar en un intervalo de velocidades.
    en: Do not interpret a curve height as a probability without integrating over a speed interval.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check_speed_density
    when: 'true'
    status: ok
    text:
      es: La densidad de probabilidad de velocidades tiene dimensión inversa de velocidad, mientras que las velocidades características
        tienen unidad m/s.
      en: Speed probability density has inverse-speed dimension, while characteristic speeds have unit m/s.
  - id: normalization_check
    when: 'true'
    status: ok
    text:
      es: 'La distribución completa debe normalizarse: el área total bajo la curva representa probabilidad total uno.'
      en: 'The full distribution must be normalized: the total area under the curve represents total probability one.'
error_patterns:
  enabled: true
  patterns:
  - id: density_as_probability
    when: 'true'
    status: warning
    text:
      es: 'Error frecuente: tomar la altura de la distribución como probabilidad directa.'
      en: 'Common error: treating the height of the distribution as a direct probability.'
  - id: negative_speed_domain
    when: 'true'
    status: warning
    text:
      es: 'Error frecuente: permitir rapidez negativa en una distribución de módulos de velocidad.'
      en: 'Common error: allowing negative speed in a distribution of speed magnitudes.'
  - id: characteristic_speed_confusion
    when: 'true'
    status: warning
    text:
      es: 'Error frecuente: confundir velocidad más probable, velocidad media y velocidad cuadrática media.'
      en: 'Common error: confusing most probable speed, mean speed, and root-mean-square speed.'
graph_reading_policy:
  enabled: true
  primary_variable: densidad_probabilidad_velocidad
  reading_sequence:
  - es: Identifica [[velocidad]] en el eje horizontal y [[densidad_probabilidad_velocidad]] en el eje vertical.
    en: Identify [[velocidad]] on the horizontal axis and [[densidad_probabilidad_velocidad]] on the vertical axis.
  - es: Localiza el pico, compara [[velocidad_mas_probable]], [[velocidad_media]] y [[velocidad_rms]], y lee las áreas como
      probabilidades.
    en: Locate the peak, compare [[velocidad_mas_probable]], [[velocidad_media]], and [[velocidad_rms]], and read areas as
      probabilities.
  key_points:
  - es: Al aumentar [[temperatura_absoluta]], la curva se ensancha y su máximo se desplaza hacia velocidades mayores.
    en: As [[temperatura_absoluta]] increases, the curve broadens and its maximum shifts toward higher speeds.
  - es: El intervalo entre [[velocidad_minima]] y [[velocidad_maxima]] se interpreta por área bajo la curva.
    en: The interval between [[velocidad_minima]] and [[velocidad_maxima]] is interpreted by area under the curve.
comparative_context:
  enabled: true
  reference_values:
  - es: En gases ligeros a temperatura ambiente, las velocidades típicas pueden ser de centenares a miles de m/s.
    en: For light gases at room temperature, typical speeds can be hundreds to thousands of m/s.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Comprueba m/s para velocidades, J para energía media y s/m para densidad de probabilidad de rapidez.
    en: Check m/s for speeds, J for mean energy, and s/m for speed probability density.
  common_unit_mistakes:
  - es: Usar grados Celsius en lugar de kelvin para [[temperatura_absoluta]].
    en: Using degrees Celsius instead of kelvin for [[temperatura_absoluta]].
  - es: Mezclar masa molar con [[masa_particula]] sin dividir por el número de Avogadro.
    en: Mixing molar mass with [[masa_particula]] without dividing by Avogadro’s number.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
