    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - beta_inversa_termica
  - funcion_particion_canonica
  - energia_media_desde_derivada_beta
  - energia_media_desde_derivada_temperatura
  - capacidad_calorifica_desde_energia_media
  magnitudes:
  - energia_media
  - temperatura
  - constante_boltzmann
  - beta
  - funcion_particion
  - energia_microestado
  - derivada_log_particion_beta
  - derivada_log_particion_temperatura
  - capacidad_calorifica
  - peso_boltzmann
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística canónica
    en: canonical statistical thermodynamics
  axis_convention:
    es: En este leaf no hay convenio vectorial; el signo relevante procede de la derivada térmica o de beta.
    en: This leaf has no vector-axis convention; the relevant sign comes from the thermal or beta derivative.
  standard_assumptions:
  - es: El sistema está en equilibrio canónico con temperatura absoluta positiva y microestados energéticos definidos.
    en: The system is in canonical equilibrium with positive absolute temperature and defined energy microstates.
  - es: La función de partición incluye todos los estados relevantes para la temperatura considerada.
    en: The partition function includes all states relevant at the temperature considered.
  standard_warnings:
  - es: No interpretes una derivada de ln Z sin comprobar variable de derivación, signo y unidades.
    en: Do not interpret a derivative of ln Z without checking the differentiation variable, sign, and units.
  - es: No confundas la energía media canónica con la energía de un microestado particular.
    en: Do not confuse canonical mean energy with the energy of one particular microstate.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check_energy
    status: ok
    text:
      es: Las expresiones de [[energia_media]] deben terminar en julios, tanto si se deriva respecto a [[beta]]
        como respecto a [[temperatura]].
      en: Expressions for [[energia_media]] must end in joules, whether differentiating with respect to [[beta]]
        or [[temperatura]].
  - id: beta_temperature_consistency
    status: ok
    text:
      es: '[[beta]] debe disminuir cuando aumenta [[temperatura]], porque representa una escala térmica inversa.'
      en: '[[beta]] must decrease when [[temperatura]] increases because it represents an inverse thermal scale.'
  - id: derivative_sign_check
    status: warning
    text:
      es: Si usas la derivada respecto a [[beta]], recuerda que [[energia_media]] aparece con signo opuesto a la
        pendiente de ln Z.
      en: If using the derivative with respect to [[beta]], remember that [[energia_media]] appears with the opposite
        sign to the slope of ln Z.
error_patterns:
  enabled: true
  patterns:
  - id: temperature_not_kelvin
    status: warning
    text:
      es: Usar grados Celsius en lugar de kelvin altera [[beta]] y todos los pesos estadísticos.
      en: Using Celsius instead of kelvin alters [[beta]] and all statistical weights.
  - id: wrong_derivative_variable
    status: warning
    text:
      es: Derivar respecto a [[temperatura]] y aplicar la fórmula de [[beta]] produce signos y factores térmicos
        incorrectos.
      en: Differentiating with respect to [[temperatura]] and applying the [[beta]] formula gives wrong signs and
        thermal factors.
  - id: mean_energy_as_single_state
    status: warning
    text:
      es: Tomar [[energia_media]] como una [[energia_microestado]] concreta borra la ponderación estadística.
      en: Taking [[energia_media]] as one concrete [[energia_microestado]] erases the statistical weighting.
graph_reading_policy:
  enabled: true
  primary_variable: beta
  reading_sequence:
  - es: Identifica si el eje horizontal es [[beta]] o [[temperatura]] antes de leer la pendiente.
    en: Identify whether the horizontal axis is [[beta]] or [[temperatura]] before reading the slope.
  - es: Lee la pendiente local de ln Z y conviértela en [[energia_media]] con la relación y el signo adecuados.
    en: Read the local slope of ln Z and convert it into [[energia_media]] using the appropriate relation and sign.
  - es: Relaciona la curvatura con la sensibilidad térmica y con [[capacidad_calorifica]].
    en: Relate the curvature to thermal sensitivity and to [[capacidad_calorifica]].
  key_points:
  - es: Una pendiente más pronunciada de ln Z frente a [[beta]] indica mayor módulo de la energía media asociada.
    en: A steeper ln Z slope versus [[beta]] indicates a larger magnitude of the associated mean energy.
  - es: La lectura gráfica debe distinguir pendiente local, valor absoluto de la curva y curvatura.
    en: The graphical reading must distinguish local slope, absolute curve value, and curvature.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[energia_media]] con k_B T para detectar si el valor está en la escala térmica esperada.
    en: Compare [[energia_media]] with k_B T to detect whether the value lies on the expected thermal scale.
  - es: Para sistemas moleculares a temperatura ambiente, k_B T está en el orden de 10^-21 J.
    en: For molecular systems at room temperature, k_B T is on the order of 10^-21 J.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: La derivada respecto a [[beta]] tiene dimensión de energía; la derivada respecto a [[temperatura]] necesita
      factores de k_B T^2.
    en: The derivative with respect to [[beta]] has energy dimension; the derivative with respect to [[temperatura]]
      needs k_B T^2 factors.
  common_unit_mistakes:
  - es: Tratar [[beta]] como 1/K en lugar de 1/J.
    en: Treating [[beta]] as 1/K instead of 1/J.
  - es: Olvidar [[constante_boltzmann]] al pasar de pendiente térmica a energía.
    en: Forgetting [[constante_boltzmann]] when moving from thermal slope to energy.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  energia_media:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: salida dominante
      en: dominant output
    summary_rules:
    - id: energia_media_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[energia_media]] resume la energía promedio que el sistema ocupa al ponderar todos los microestados
          con la función de partición.'
        en: '[[energia_media]] summarizes the average energy occupied by the system after weighting all microstates
          through the partition function.'
    physical_reading_rules:
    - id: energia_media_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[energia_media]] como promedio estadístico, no como energía de un único microestado.
        en: Read [[energia_media]] as a statistical average, not as the energy of one single microstate.
    coherence_rules:
    - id: energia_media_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_media]] tenga dimensión de energía y que cambie de forma coherente con [[temperatura]]
          y [[funcion_particion]].
        en: Check that [[energia_media]] has energy dimension and changes consistently with [[temperatura]] and
          [[funcion_particion]].
    model_validity_rules:
    - id: energia_media_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: El valor es válido para equilibrio canónico, microestados bien definidos y una [[temperatura]] positiva
          fijada por un baño térmico.
        en: The value is valid for canonical equilibrium, well-defined microstates, and positive [[temperatura]]
          fixed by a thermal reservoir.
    graph_rules:
    - id: energia_media_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En la gráfica, interpreta cómo la pendiente de ln Z frente a [[beta]] o frente a [[temperatura]] determina
          [[energia_media]].
        en: On the graph, interpret how the slope of ln Z versus [[beta]] or versus [[temperatura]] determines [[energia_media]].
    likely_errors:
    - id: energia_media_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No confundas [[energia_media]] con el microestado más probable ni con la suma simple de energías sin
          pesos.
        en: Do not confuse [[energia_media]] with the most probable microstate or with an unweighted sum of energies.
    next_step_rules:
    - id: energia_media_next_step_specific
      when: 'true'
      status: info
      text:
        es: Después de calcular [[energia_media]], revisa el signo de la derivada, las unidades y si procede estimar
          [[capacidad_calorifica]].
        en: After calculating [[energia_media]], check the derivative sign, the units, and whether estimating [[capacidad_calorifica]]
          is appropriate.
    physical_intuition:
    - id: energia_media_physical_intuition
      when: 'true'
      status: info
      text:
        es: Si sube [[temperatura]], estados de mayor [[energia_microestado]] pueden contribuir más y elevar el
          promedio.
        en: If [[temperatura]] rises, states with higher [[energia_microestado]] can contribute more and raise the
          average.
    limiting_cases:
    - id: energia_media_limiting_case
      when: 'true'
      status: info
      text:
        es: A baja [[temperatura]], [[energia_media]] se aproxima a los estados de menor energía; a alta [[temperatura]],
          muchos estados pesan de forma comparable.
        en: At low [[temperatura]], [[energia_media]] approaches the lowest-energy states; at high [[temperatura]],
          many states carry comparable weight.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable térmica de entrada
      en: thermal input variable
    summary_rules:
    - id: temperatura_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] controla la escala térmica que decide cuánto importan las diferencias entre microestados.'
        en: '[[temperatura]] controls the thermal scale that decides how much differences between microstates matter.'
    physical_reading_rules:
    - id: temperatura_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[temperatura]] en kelvin y como magnitud positiva dentro del conjunto canónico.
        en: Read [[temperatura]] in kelvin and as a positive quantity within the canonical ensemble.
    coherence_rules:
    - id: temperatura_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Verifica que [[temperatura]] sea compatible con [[beta]] y con la escala energética fijada por [[constante_boltzmann]].
        en: Verify that [[temperatura]] is compatible with [[beta]] and with the energy scale set by [[constante_boltzmann]].
    model_validity_rules:
    - id: temperatura_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: El modelo supone equilibrio térmico; si la [[temperatura]] no está bien definida, la energía media canónica
          pierde sentido.
        en: The model assumes thermal equilibrium; if [[temperatura]] is not well defined, the canonical mean energy
          loses meaning.
    graph_rules:
    - id: temperatura_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En la gráfica, un cambio de [[temperatura]] modifica la curvatura y la pendiente que conducen a [[energia_media]].
        en: On the graph, a change in [[temperatura]] modifies the curvature and slope that lead to [[energia_media]].
    likely_errors:
    - id: temperatura_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: 'No uses grados Celsius en las fórmulas estadísticas: la escala absoluta es obligatoria.'
        en: 'Do not use Celsius degrees in statistical formulas: the absolute scale is required.'
    next_step_rules:
    - id: temperatura_next_step_specific
      when: 'true'
      status: info
      text:
        es: Convierte siempre a kelvin y calcula [[beta]] antes de interpretar pesos o derivadas.
        en: Always convert to kelvin and calculate [[beta]] before interpreting weights or derivatives.
    physical_intuition:
    - id: temperatura_physical_intuition
      when: 'true'
      status: info
      text:
        es: Una [[temperatura]] alta aplana la selección energética; una baja concentra el peso cerca del mínimo.
        en: High [[temperatura]] flattens energy selection; low temperature concentrates the weight near the minimum.
    limiting_cases:
    - id: temperatura_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando [[temperatura]] tiende a cero, el conjunto canónico puede quedar dominado por el estado fundamental.
        en: When [[temperatura]] tends toward zero, the canonical ensemble may become dominated by the ground state.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  constante_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: constante de escala
      en: scale constant
    summary_rules:
    - id: constante_boltzmann_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[constante_boltzmann]] convierte la escala de [[temperatura]] en escala de energía microscópica.'
        en: '[[constante_boltzmann]] converts the [[temperatura]] scale into a microscopic energy scale.'
    physical_reading_rules:
    - id: constante_boltzmann_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[constante_boltzmann]] como puente dimensional entre kelvin y julios.
        en: Read [[constante_boltzmann]] as the dimensional bridge between kelvin and joules.
    coherence_rules:
    - id: constante_boltzmann_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que aparece en combinaciones adimensionales como [[beta]] por energía o energía dividida por
          k_B T.
        en: Check that it appears in dimensionless combinations such as [[beta]] times energy or energy divided
          by k_B T.
    model_validity_rules:
    - id: constante_boltzmann_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: 'No es un parámetro ajustable del sistema: si cambias su valor, rompes la escala física de la estadística.'
        en: 'It is not an adjustable system parameter: changing its value breaks the physical scale of the statistics.'
    graph_rules:
    - id: constante_boltzmann_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: La escala de los ejes ligados a [[beta]] y [[temperatura]] depende de usar correctamente [[constante_boltzmann]].
        en: The scale of axes linked to [[beta]] and [[temperatura]] depends on using [[constante_boltzmann]] correctly.
    likely_errors:
    - id: constante_boltzmann_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No la omitas por comodidad salvo que el problema declare unidades reducidas con k_B igual a uno.
        en: Do not omit it for convenience unless the problem declares reduced units with k_B equal to one.
    next_step_rules:
    - id: constante_boltzmann_next_step_specific
      when: 'true'
      status: info
      text:
        es: Antes de derivar, decide si trabajas en SI o en unidades reducidas y mantén esa elección hasta el final.
        en: Before differentiating, decide whether you use SI or reduced units and keep that choice to the end.
    physical_intuition:
    - id: constante_boltzmann_physical_intuition
      when: 'true'
      status: info
      text:
        es: Marca cuánta energía microscópica corresponde a un kelvin de agitación térmica.
        en: It marks how much microscopic energy corresponds to one kelvin of thermal agitation.
    limiting_cases:
    - id: constante_boltzmann_limiting_case
      when: 'true'
      status: info
      text:
        es: En cálculos simbólicos puede absorberse en [[beta]], pero en valores numéricos debe recuperarse para
          obtener julios.
        en: In symbolic calculations it can be absorbed into [[beta]], but in numerical values it must be restored
          to obtain joules.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  beta:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro térmico inverso
      en: inverse thermal parameter
    summary_rules:
    - id: beta_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[beta]] mide la intensidad con la que el conjunto canónico penaliza microestados de energía alta.'
        en: '[[beta]] measures how strongly the canonical ensemble penalizes high-energy microstates.'
    physical_reading_rules:
    - id: beta_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: 'Lee [[beta]] como escala inversa de energía: valores grandes corresponden a baja [[temperatura]].'
        en: 'Read [[beta]] as an inverse energy scale: large values correspond to low [[temperatura]].'
    coherence_rules:
    - id: beta_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[beta]] disminuya cuando aumenta [[temperatura]] y que su unidad sea J^-1.
        en: Check that [[beta]] decreases when [[temperatura]] increases and that its unit is J^-1.
    model_validity_rules:
    - id: beta_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: El uso de [[beta]] requiere [[temperatura]] absoluta positiva y un baño térmico que fija el conjunto
          canónico.
        en: Using [[beta]] requires positive absolute [[temperatura]] and a thermal bath fixing the canonical ensemble.
    graph_rules:
    - id: beta_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En la gráfica, la pendiente de ln Z respecto a [[beta]] se lee con signo opuesto para obtener [[energia_media]].
        en: On the graph, the slope of ln Z with respect to [[beta]] is read with opposite sign to obtain [[energia_media]].
    likely_errors:
    - id: beta_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: Un error común es olvidar el signo menos al pasar de la derivada respecto a [[beta]] a [[energia_media]].
        en: A common error is forgetting the minus sign when moving from the derivative with respect to [[beta]]
          to [[energia_media]].
    next_step_rules:
    - id: beta_next_step_specific
      when: 'true'
      status: info
      text:
        es: Si la gráfica usa [[beta]] como eje horizontal, revisa si el resultado debe cambiar de signo por la
          fórmula usada.
        en: If the graph uses [[beta]] as the horizontal axis, check whether the result must change sign because
          of the formula used.
    physical_intuition:
    - id: beta_physical_intuition
      when: 'true'
      status: info
      text:
        es: '[[beta]] grande actúa como un filtro severo que deja pasar principalmente energías bajas.'
        en: Large [[beta]] acts as a severe filter that mainly lets low energies contribute.
    limiting_cases:
    - id: beta_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando [[beta]] tiende a cero, aparece el límite de alta [[temperatura]]; cuando crece mucho, domina
          el mínimo energético.
        en: When [[beta]] tends to zero, the high-[[temperatura]] limit appears; when it grows strongly, the energy
          minimum dominates.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  funcion_particion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: fuente estadística
      en: statistical source
    summary_rules:
    - id: funcion_particion_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] contiene la suma de pesos que permite obtener [[energia_media]] mediante derivadas.'
        en: '[[funcion_particion]] contains the sum of weights that allows [[energia_media]] to be obtained through
          derivatives.'
    physical_reading_rules:
    - id: funcion_particion_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[funcion_particion]] como una cantidad adimensional positiva que organiza los microestados accesibles.
        en: Read [[funcion_particion]] as a positive dimensionless quantity organizing accessible microstates.
    coherence_rules:
    - id: funcion_particion_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[funcion_particion]] sea positiva y que sus derivadas generen magnitudes con unidades
          correctas.
        en: Check that [[funcion_particion]] is positive and that its derivatives generate quantities with correct
          units.
    model_validity_rules:
    - id: funcion_particion_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: La suma presupone microestados conocidos, equilibrio canónico y ausencia de interacción no incluida
          en el espectro usado.
        en: The sum assumes known microstates, canonical equilibrium, and no interaction missing from the spectrum
          used.
    graph_rules:
    - id: funcion_particion_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: La forma de ln Z frente a [[beta]] o [[temperatura]] contiene la información visual que determina [[energia_media]].
        en: The shape of ln Z versus [[beta]] or [[temperatura]] contains the visual information determining [[energia_media]].
    likely_errors:
    - id: funcion_particion_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: 'No interpretes [[funcion_particion]] como probabilidad: normaliza probabilidades, pero no es una probabilidad.'
        en: 'Do not interpret [[funcion_particion]] as a probability: it normalizes probabilities, but is not itself
          a probability.'
    next_step_rules:
    - id: funcion_particion_next_step_specific
      when: 'true'
      status: info
      text:
        es: Tras calcularla, deriva ln Z con respecto a la variable térmica correcta y revisa el signo.
        en: After calculating it, differentiate ln Z with respect to the correct thermal variable and check the
          sign.
    physical_intuition:
    - id: funcion_particion_physical_intuition
      when: 'true'
      status: info
      text:
        es: Cuanto más crece [[funcion_particion]], más peso estadístico total aportan los estados accesibles.
        en: The more [[funcion_particion]] grows, the more total statistical weight the accessible states contribute.
    limiting_cases:
    - id: funcion_particion_limiting_case
      when: 'true'
      status: info
      text:
        es: Si faltan estados relevantes en la suma, [[energia_media]] y [[capacidad_calorifica]] quedarán sesgadas.
        en: If relevant states are missing from the sum, [[energia_media]] and [[capacidad_calorifica]] will be
          biased.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  energia_microestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: entrada microscópica
      en: microscopic input
    summary_rules:
    - id: energia_microestado_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[energia_microestado]] asigna a cada microestado el nivel energético que determina su peso estadístico.'
        en: '[[energia_microestado]] assigns each microstate the energy level that determines its statistical weight.'
    physical_reading_rules:
    - id: energia_microestado_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[energia_microestado]] como valor de un estado concreto, no como promedio del sistema.
        en: Read [[energia_microestado]] as the value of a specific state, not as the system average.
    coherence_rules:
    - id: energia_microestado_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que todas las [[energia_microestado]] usadas compartan el mismo cero de energía.
        en: Check that all [[energia_microestado]] values used share the same energy zero.
    model_validity_rules:
    - id: energia_microestado_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: El espectro de energías debe corresponder al sistema real dentro de las hipótesis del modelo canónico.
        en: The energy spectrum must correspond to the real system within the assumptions of the canonical model.
    graph_rules:
    - id: energia_microestado_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: Cambios en los niveles de [[energia_microestado]] modifican la pendiente de ln Z y la [[energia_media]].
        en: Changes in [[energia_microestado]] levels modify the slope of ln Z and [[energia_media]].
    likely_errors:
    - id: energia_microestado_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No sumes [[energia_microestado]] directamente sin pesos de Boltzmann ni normalización por [[funcion_particion]].
        en: Do not add [[energia_microestado]] directly without Boltzmann weights and normalization by [[funcion_particion]].
    next_step_rules:
    - id: energia_microestado_next_step_specific
      when: 'true'
      status: info
      text:
        es: Ordena los niveles, identifica degeneraciones y decide qué estados son relevantes a la [[temperatura]]
          dada.
        en: Order the levels, identify degeneracies, and decide which states are relevant at the given [[temperatura]].
    physical_intuition:
    - id: energia_microestado_physical_intuition
      when: 'true'
      status: info
      text:
        es: Los niveles bajos pesan más cuando la agitación térmica no basta para poblar niveles altos.
        en: Low levels weigh more when thermal agitation is not enough to populate high levels.
    limiting_cases:
    - id: energia_microestado_limiting_case
      when: 'true'
      status: info
      text:
        es: Si el espectro es continuo o muy denso, conviene sustituir la suma por una integral de densidad de estados.
        en: If the spectrum is continuous or very dense, the sum should be replaced by an integral over density
          of states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  derivada_log_particion_beta:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: pendiente estadística
      en: statistical slope
    summary_rules:
    - id: derivada_log_particion_beta_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[derivada_log_particion_beta]] mide cómo cambia ln Z al variar [[beta]] y conecta directamente con
          [[energia_media]].'
        en: '[[derivada_log_particion_beta]] measures how ln Z changes as [[beta]] varies and connects directly
          with [[energia_media]].'
    physical_reading_rules:
    - id: derivada_log_particion_beta_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: 'Lee [[derivada_log_particion_beta]] con atención al signo: normalmente la energía media aparece con
          signo opuesto.'
        en: 'Read [[derivada_log_particion_beta]] with attention to sign: mean energy usually appears with the opposite
          sign.'
    coherence_rules:
    - id: derivada_log_particion_beta_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que su dimensión sea energía y que el signo sea compatible con la disminución de Z al aumentar
          [[beta]].
        en: Check that its dimension is energy and that the sign is compatible with Z decreasing as [[beta]] increases.
    model_validity_rules:
    - id: derivada_log_particion_beta_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: La derivada requiere que [[funcion_particion]] sea diferenciable respecto a [[beta]] en el intervalo
          estudiado.
        en: The derivative requires [[funcion_particion]] to be differentiable with respect to [[beta]] over the
          interval studied.
    graph_rules:
    - id: derivada_log_particion_beta_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En una gráfica ln Z frente a [[beta]], esta magnitud es la pendiente local que se convierte en [[energia_media]].
        en: On a ln Z versus [[beta]] graph, this quantity is the local slope that becomes [[energia_media]].
    likely_errors:
    - id: derivada_log_particion_beta_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No confundas pendiente negativa con energía negativa sin aplicar antes el signo de la relación formal.
        en: Do not confuse a negative slope with negative energy before applying the sign of the formal relation.
    next_step_rules:
    - id: derivada_log_particion_beta_next_step_specific
      when: 'true'
      status: info
      text:
        es: Usa la pendiente local, no una pendiente promedio amplia si la curva tiene curvatura apreciable.
        en: Use the local slope, not a broad average slope if the curve has appreciable curvature.
    physical_intuition:
    - id: derivada_log_particion_beta_physical_intuition
      when: 'true'
      status: info
      text:
        es: La pendiente expresa cuánto se contrae el peso estadístico total al endurecer el filtro térmico.
        en: The slope expresses how much the total statistical weight contracts as the thermal filter tightens.
    limiting_cases:
    - id: derivada_log_particion_beta_limiting_case
      when: 'true'
      status: info
      text:
        es: Cerca de cambios bruscos del espectro efectivo, una derivada numérica puede ser inestable.
        en: Near abrupt changes of the effective spectrum, a numerical derivative can be unstable.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  derivada_log_particion_temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: pendiente térmica
      en: thermal slope
    summary_rules:
    - id: derivada_log_particion_temperatura_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[derivada_log_particion_temperatura]] mide la sensibilidad de ln Z ante la [[temperatura]] y ofrece
          otra vía para obtener [[energia_media]].'
        en: '[[derivada_log_particion_temperatura]] measures the sensitivity of ln Z to [[temperatura]] and gives
          another route to [[energia_media]].'
    physical_reading_rules:
    - id: derivada_log_particion_temperatura_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[derivada_log_particion_temperatura]] como pendiente térmica que debe combinarse con k_B T^2.
        en: Read [[derivada_log_particion_temperatura]] as a thermal slope that must be combined with k_B T^2.
    coherence_rules:
    - id: derivada_log_particion_temperatura_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que al multiplicarla por los factores térmicos adecuados resulte una energía.
        en: Check that multiplying it by the proper thermal factors gives an energy.
    model_validity_rules:
    - id: derivada_log_particion_temperatura_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: La lectura es válida si la función de partición cambia suavemente con [[temperatura]].
        en: The reading is valid if the partition function changes smoothly with [[temperatura]].
    graph_rules:
    - id: derivada_log_particion_temperatura_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En una gráfica ln Z frente a [[temperatura]], la pendiente positiva suele indicar aumento de [[energia_media]].
        en: On a ln Z versus [[temperatura]] graph, a positive slope usually indicates increasing [[energia_media]].
    likely_errors:
    - id: derivada_log_particion_temperatura_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: 'No uses esta derivada como energía directamente: falta la escala térmica multiplicativa.'
        en: 'Do not use this derivative directly as energy: the multiplicative thermal scale is missing.'
    next_step_rules:
    - id: derivada_log_particion_temperatura_next_step_specific
      when: 'true'
      status: info
      text:
        es: Tras medir la pendiente, aplica los factores de [[constante_boltzmann]] y [[temperatura]] antes de interpretar.
        en: After measuring the slope, apply the [[constante_boltzmann]] and [[temperatura]] factors before interpreting.
    physical_intuition:
    - id: derivada_log_particion_temperatura_physical_intuition
      when: 'true'
      status: info
      text:
        es: Si ln Z responde mucho a la [[temperatura]], el sistema está incorporando estados energéticos nuevos.
        en: If ln Z responds strongly to [[temperatura]], the system is bringing in new energetic states.
    limiting_cases:
    - id: derivada_log_particion_temperatura_limiting_case
      when: 'true'
      status: info
      text:
        es: A temperaturas extremas, la pendiente puede saturarse si ya dominan muy pocos o casi todos los estados
          disponibles.
        en: At extreme temperatures, the slope may saturate if very few or nearly all available states already dominate.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  capacidad_calorifica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: respuesta térmica derivada
      en: derived thermal response
    summary_rules:
    - id: capacidad_calorifica_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[capacidad_calorifica]] indica cuánto cambia [[energia_media]] cuando cambia [[temperatura]].'
        en: '[[capacidad_calorifica]] indicates how much [[energia_media]] changes when [[temperatura]] changes.'
    physical_reading_rules:
    - id: capacidad_calorifica_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[capacidad_calorifica]] como sensibilidad térmica, no como cantidad de calor almacenada.
        en: Read [[capacidad_calorifica]] as thermal sensitivity, not as stored heat.
    coherence_rules:
    - id: capacidad_calorifica_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que su unidad sea J/K y que sea compatible con la pendiente de [[energia_media]] frente a
          [[temperatura]].
        en: Check that its unit is J/K and that it matches the slope of [[energia_media]] versus [[temperatura]].
    model_validity_rules:
    - id: capacidad_calorifica_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: La interpretación requiere equilibrio y una variación de [[temperatura]] suficientemente pequeña para
          usar pendiente local.
        en: The interpretation requires equilibrium and a sufficiently small [[temperatura]] change to use a local
          slope.
    graph_rules:
    - id: capacidad_calorifica_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: En la gráfica, una zona de fuerte crecimiento de [[energia_media]] se traduce en mayor [[capacidad_calorifica]].
        en: On the graph, a strong growth region of [[energia_media]] translates into larger [[capacidad_calorifica]].
    likely_errors:
    - id: capacidad_calorifica_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No confundas una energía alta con alta [[capacidad_calorifica]]; importa la pendiente, no el valor absoluto.
        en: Do not confuse high energy with high [[capacidad_calorifica]]; the slope matters, not the absolute value.
    next_step_rules:
    - id: capacidad_calorifica_next_step_specific
      when: 'true'
      status: info
      text:
        es: Compara la pendiente térmica entre intervalos y verifica que no estés promediando una transición brusca.
        en: Compare the thermal slope across intervals and verify that you are not averaging over an abrupt transition.
    physical_intuition:
    - id: capacidad_calorifica_physical_intuition
      when: 'true'
      status: info
      text:
        es: Es grande cuando pequeños cambios térmicos abren muchos estados energéticos accesibles.
        en: It is large when small thermal changes open many accessible energetic states.
    limiting_cases:
    - id: capacidad_calorifica_limiting_case
      when: 'true'
      status: info
      text:
        es: Si el sistema no está en equilibrio o intercambia partículas, la capacidad canónica simple puede no
          ser la adecuada.
        en: If the system is not in equilibrium or exchanges particles, the simple canonical capacity may not be
          appropriate.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  peso_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: peso microscópico
      en: microscopic weight
    summary_rules:
    - id: peso_boltzmann_summary_mean_energy
      when: 'true'
      status: ok
      text:
        es: '[[peso_boltzmann]] pondera cada [[energia_microestado]] antes de construir [[funcion_particion]] y
          [[energia_media]].'
        en: '[[peso_boltzmann]] weights each [[energia_microestado]] before building [[funcion_particion]] and [[energia_media]].'
    physical_reading_rules:
    - id: peso_boltzmann_physical_reading_mean_energy
      when: 'true'
      status: info
      text:
        es: Lee [[peso_boltzmann]] como contribución relativa no normalizada de un microestado.
        en: Read [[peso_boltzmann]] as the unnormalized relative contribution of a microstate.
    coherence_rules:
    - id: peso_boltzmann_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Comprueba que sea positivo, adimensional y menor o igual que uno si la energía de referencia es no negativa.
        en: Check that it is positive, dimensionless, and at most one if the reference energy is nonnegative.
    model_validity_rules:
    - id: peso_boltzmann_model_validity_canonical
      when: 'true'
      status: info
      text:
        es: El peso presupone contacto térmico con un baño y microestados con energía definida.
        en: The weight assumes thermal contact with a reservoir and microstates with defined energy.
    graph_rules:
    - id: peso_boltzmann_graph_reading_coord
      when: graph_binding.enabled == true
      status: info
      text:
        es: Su caída con [[beta]] explica por qué la gráfica de ln Z cambia de pendiente y determina [[energia_media]].
        en: Its fall with [[beta]] explains why the ln Z graph changes slope and determines [[energia_media]].
    likely_errors:
    - id: peso_boltzmann_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No confundas [[peso_boltzmann]] con probabilidad; falta dividir por [[funcion_particion]].
        en: Do not confuse [[peso_boltzmann]] with probability; division by [[funcion_particion]] is still missing.
    next_step_rules:
    - id: peso_boltzmann_next_step_specific
      when: 'true'
      status: info
      text:
        es: Normaliza los pesos con [[funcion_particion]] antes de calcular probabilidades o promedios.
        en: Normalize the weights with [[funcion_particion]] before calculating probabilities or averages.
    physical_intuition:
    - id: peso_boltzmann_physical_intuition
      when: 'true'
      status: info
      text:
        es: Es la moneda estadística con la que cada microestado compra presencia en el promedio.
        en: It is the statistical currency with which each microstate buys presence in the average.
    limiting_cases:
    - id: peso_boltzmann_limiting_case
      when: 'true'
      status: info
      text:
        es: Para energías muy altas frente a k_B T, el peso puede ser despreciable numéricamente.
        en: For energies much higher than k_B T, the weight can be numerically negligible.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
