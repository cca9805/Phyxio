        en: '[[flujo_probabilidad]] is read as the net exchange of probability between states within statistical equilibrium:
          it does not describe one individual path, but the collective distribution among states.'
    physical_reading_rules:
    - id: flujo_probabilidad_physical_reading_equilibrio
      when: 'true'
