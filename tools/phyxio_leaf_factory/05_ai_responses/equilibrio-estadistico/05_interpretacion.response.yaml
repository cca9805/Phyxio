    model_validity_rules:
    - id: flujo_probabilidad_model_validity_equilibrio
      when: 'true'
      status: info
      text:
        es: Usa [[flujo_probabilidad]] solo si las tasas son aproximadamente estacionarias, los estados accesibles están definidos
