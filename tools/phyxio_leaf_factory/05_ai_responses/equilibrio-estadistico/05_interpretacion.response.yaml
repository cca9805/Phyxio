        en: Read [[flujo_probabilidad]] together with the state set, transition rates, and the net-flow condition; its meaning
          changes if the system is still relaxing.
    coherence_rules:
    - id: flujo_probabilidad_coherence_equilibrio
      when: 'true'
      status: ok
      text:
        es: 'Comprueba que [[flujo_probabilidad]] respeta normalización, unidades y balance estadístico: una ocupación válida
