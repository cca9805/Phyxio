    graph_rules:
    - id: flujo_probabilidad_graph_equilibrio
      when: 'true'
      status: info
      text:
        es: 'En el DCL estadístico, relaciona [[flujo_probabilidad]] con flechas de probabilidad: equilibrio significa compensación
          de flujos, no ausencia de transiciones microscópicas.'
        en: 'In the statistical free-body-style diagram, relate [[flujo_probabilidad]] to probability arrows: equilibrium
          means compensated flows, not absence of microscopic transitions.'
    likely_errors:
    - id: flujo_probabilidad_likely_error_equilibrio
      when: 'true'
      status: warning
      text:
        es: No confundas [[flujo_probabilidad]] con una fuerza, una posición mecánica o una certeza individual; es una magnitud
          estadística dependiente del modelo de estados.
        en: Do not confuse [[flujo_probabilidad]] with a force, a mechanical position, or an individual certainty; it is a
          statistical quantity tied to the state model.
    next_step_rules:
    - id: flujo_probabilidad_next_step_equilibrio
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[flujo_probabilidad]], revisa si el flujo neto se anula, si las probabilidades suman uno
          y si el diagrama muestra balance detallado o solo estacionariedad global.
        en: After interpreting [[flujo_probabilidad]], check whether net flow vanishes, probabilities sum to one, and the
          diagram shows detailed balance or only global stationarity.
    physical_intuition:
    - id: flujo_probabilidad_intuition_equilibrio
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[flujo_probabilidad]] indica cómo se reparte la presencia del sistema entre estados cuando las
          entradas y salidas estadísticas se compensan.
        en: Intuitively, [[flujo_probabilidad]] indicates how the system presence is distributed among states when statistical
          inflows and outflows compensate.
    limiting_cases:
    - id: flujo_probabilidad_limiting_equilibrio
      when: 'true'
      status: info
      text:
        es: En el límite de flujo nulo y probabilidades constantes, [[flujo_probabilidad]] es compatible con equilibrio; si
          aparece deriva persistente, describe un estado transitorio o estacionario no equilibrado.
        en: In the limit of zero net flow and constant probabilities, [[flujo_probabilidad]] is compatible with equilibrium;
          persistent drift indicates a transient or nonequilibrium steady state.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo positivo de [[flujo_probabilidad]] debe indicar un sentido de transición declarado, no una ganancia absoluta.
        en: A positive sign of [[flujo_probabilidad]] must indicate a declared transition direction, not an absolute gain.
      common_sign_errors:
      - es: Cambiar el sentido i→j sin cambiar el signo del flujo.
        en: Changing the i→j direction without changing the flow sign.
      - es: Interpretar flujo neto nulo como ausencia de saltos microscópicos.
        en: Reading zero net flow as absence of microscopic jumps.
  entropia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: dispersión estadística
      en: statistical spread
    summary_rules:
    - id: entropia_summary_equilibrio
      when: 'true'
      status: ok
      text:
        es: '[[entropia]] se interpreta como la dispersión informacional del reparto de probabilidades dentro del equilibrio
