global_context:
  enabled: true
  physical_domain:
    es: termodinamica-estadistica
    en: statistical thermodynamics
  axis_convention:
    es: 'En fenómenos críticos el signo clave suele estar en la temperatura reducida: distingue los lados de la
      transición.'
    en: 'In critical phenomena the key sign is often in reduced temperature: it distinguishes the sides of the transition.'
  standard_assumptions:
  - es: El sistema se considera cerca de una transición continua con comportamiento de escala dominante.
    en: The system is considered near a continuous transition with dominant scaling behavior.
  - es: Los exponentes críticos se interpretan dentro de una clase de universalidad y no como constantes arbitrarias.
    en: Critical exponents are interpreted within a universality class and not as arbitrary constants.
  standard_warnings:
  - es: No extrapoles leyes de potencia lejos de la temperatura crítica.
    en: Do not extrapolate power laws far from the critical temperature.
  - es: Distingue divergencia ideal, redondeo experimental y límites de tamaño finito.
    en: Distinguish ideal divergence, experimental rounding, and finite-size limits.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    when: 'true'
    status: ok
    text:
      es: 'La interpretación debe respetar dimensiones: la temperatura reducida y los exponentes son adimensionales;
        las amplitudes conservan la dimensión de su magnitud.'
      en: 'The interpretation must respect dimensions: reduced temperature and exponents are dimensionless; amplitudes
        carry the dimension of their quantity.'
  - id: critical_side_check
    when: 'true'
    status: ok
    text:
      es: Comprueba si la ley se aplica por debajo, por encima o a ambos lados de la temperatura crítica.
      en: Check whether the law applies below, above, or on both sides of the critical temperature.
error_patterns:
  enabled: true
  patterns:
  - id: unit_sign_model_confusion
    when: 'true'
    status: warning
    text:
      es: Un error frecuente es leer un exponente o una temperatura reducida sin distinguir unidad, signo y lado
        crítico.
      en: A common error is reading an exponent or reduced temperature without distinguishing unit, sign, and critical
        side.
  - id: finite_size_confusion
    when: 'true'
    status: warning
    text:
      es: Otro error frecuente es tomar un máximo experimental redondeado como divergencia matemática exacta.
      en: Another common error is treating a rounded experimental maximum as an exact mathematical divergence.
graph_reading_policy:
  enabled: true
  primary_variable: temperatura_reducida
  reading_sequence:
  - es: Localiza primero [[temperatura_critica]] y calcula el signo de [[temperatura_reducida]].
    en: First locate [[temperatura_critica]] and determine the sign of [[temperatura_reducida]].
  - es: 'Identifica qué magnitud se representa: [[parametro_de_orden]], [[susceptibilidad]], [[longitud_correlacion]]
      o [[calor_especifico]].'
    en: 'Identify which quantity is plotted: [[parametro_de_orden]], [[susceptibilidad]], [[longitud_correlacion]],
      or [[calor_especifico]].'
  - es: Lee la pendiente efectiva o la curvatura como evidencia de ley crítica, no como una recta ordinaria cualquiera.
    en: Read the effective slope or curvature as evidence of a critical law, not as just any ordinary line.
  key_points:
  - es: Cerca de [[temperatura_reducida]] igual a cero aparecen anulación, divergencia o singularidad según la magnitud.
    en: Near [[temperatura_reducida]] equal to zero, vanishing, divergence, or singularity appears depending on
      the quantity.
  - es: La lectura gráfica debe conectar exponente, amplitud y rango de validez.
    en: The graph reading must connect exponent, amplitude, and validity range.
comparative_context:
  enabled: true
  reference_values:
  - es: En una transición crítica ideal, [[longitud_correlacion]] puede crecer hasta superar muchas distancias microscópicas.
    en: In an ideal critical transition, [[longitud_correlacion]] can grow beyond many microscopic distances.
  - es: Los exponentes críticos típicos son números adimensionales de orden unidad, no unidades térmicas ni energéticas.
    en: Typical critical exponents are dimensionless numbers of order unity, not thermal or energy units.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[temperatura_reducida]], [[exponente_critico_beta]], [[exponente_critico_gamma]], [[exponente_critico_nu]]
      y [[exponente_critico_alpha]] son adimensionales.'
    en: '[[temperatura_reducida]], [[exponente_critico_beta]], [[exponente_critico_gamma]], [[exponente_critico_nu]],
      and [[exponente_critico_alpha]] are dimensionless.'
  common_unit_mistakes:
  - es: Asignar kelvin a [[temperatura_reducida]] en lugar de tratarla como cociente adimensional.
    en: Assigning kelvin to [[temperatura_reducida]] instead of treating it as a dimensionless ratio.
  - es: Confundir la dimensión de una amplitud con la dimensión del exponente crítico.
    en: Confusing the dimension of an amplitude with the dimension of the critical exponent.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: true
  processes:
  - id: continuous_critical_transition
    label:
      es: transición continua crítica
      en: continuous critical transition
    evidence:
      es: El parámetro de orden se anula sin salto finito y aparecen leyes de potencia.
      en: The order parameter vanishes without a finite jump and power laws appear.
  - id: rounded_experimental_transition
    label:
      es: transición redondeada por tamaño finito
      en: finite-size rounded transition
    evidence:
      es: Las divergencias ideales aparecen como máximos finitos o curvas suavizadas.
      en: Ideal divergences appear as finite peaks or smoothed curves.
