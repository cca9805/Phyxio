targets:
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable de control térmico
      en: thermal control variable
    summary_rules:
    - id: temperatura_summary_criticidad
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] debe leerse como una pieza del patrón crítico: describe cómo cambia el sistema al acercarse
          a [[temperatura_critica]].'
        en: '[[temperatura]] must be read as part of the critical pattern: it describes how the system changes as
          it approaches [[temperatura_critica]].'
    physical_reading_rules:
    - id: temperatura_physical_reading_regimen
      when: 'true'
      status: info
      text:
        es: Interpreta [[temperatura]] junto con el signo de [[temperatura_reducida]], porque estar por debajo o
          por encima de [[temperatura_critica]] puede cambiar la fase observada.
        en: Interpret [[temperatura]] together with the sign of [[temperatura_reducida]], because being below or
          above [[temperatura_critica]] can change the observed phase.
    coherence_rules:
    - id: temperatura_coherence_units_and_scaling
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[temperatura]] use unidades compatibles y que su tendencia sea coherente con una ley
          de escala cerca de [[temperatura_critica]].
        en: Check that [[temperatura]] uses compatible units and that its trend is consistent with a scaling law
          near [[temperatura_critica]].
    model_validity_rules:
    - id: temperatura_model_validity_asymptotic
      when: 'true'
      status: info
      text:
        es: 'Las leyes críticas de [[temperatura]] son aproximaciones asintóticas: no deben extrapolarse lejos de
          [[temperatura_critica]] ni dentro de regiones dominadas por tamaño finito, impurezas o histéresis.'
        en: 'Critical laws for [[temperatura]] are asymptotic approximations: they should not be extrapolated far
          from [[temperatura_critica]] or into regions dominated by finite size, impurities, or hysteresis.'
    graph_rules:
    - id: temperatura_graph_loglog_slope
      when: 'true'
      status: info
      text:
        es: 'En la gráfica Coord, relaciona [[temperatura]] con [[temperatura_reducida]]: la curvatura o pendiente
          efectiva indica si el comportamiento crítico sigue la ley esperada.'
        en: 'In the Coord graph, relate [[temperatura]] to [[temperatura_reducida]]: the curvature or effective
          slope indicates whether the critical behavior follows the expected law.'
    likely_errors:
    - id: temperatura_likely_error_ordinary_divergence
      when: 'true'
      status: warning
      text:
        es: No trates [[temperatura]] como una variación ordinaria suave si el modelo predice divergencia, anulación
          o singularidad cerca de [[temperatura_critica]].
        en: Do not treat [[temperatura]] as an ordinary smooth variation if the model predicts divergence, vanishing,
          or singular behavior near [[temperatura_critica]].
    next_step_rules:
    - id: temperatura_next_step_compare_regimes
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[temperatura]], compara el régimen por debajo y por encima de [[temperatura_critica]]
          y revisa qué exponente crítico controla la tendencia.
        en: After interpreting [[temperatura]], compare the regimes below and above [[temperatura_critica]] and
          check which critical exponent controls the trend.
    physical_intuition:
    - id: temperatura_physical_intuition_correlations
      when: 'true'
      status: info
      text:
        es: Físicamente, [[temperatura]] refleja que muchas partes del sistema dejan de comportarse de forma independiente
          cuando aumenta la correlación cerca de la criticidad.
        en: Physically, [[temperatura]] reflects that many parts of the system stop behaving independently as correlations
          grow near criticality.
    limiting_cases:
    - id: temperatura_limiting_case_near_far
      when: 'true'
      status: info
      text:
        es: Si [[temperatura_reducida]] se acerca a cero, [[temperatura]] debe evaluarse con especial cuidado; lejos
          de cero, el comportamiento crítico puede dejar de ser dominante.
        en: If [[temperatura_reducida]] approaches zero, [[temperatura]] must be evaluated carefully; far from zero,
          critical behavior may no longer dominate.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
