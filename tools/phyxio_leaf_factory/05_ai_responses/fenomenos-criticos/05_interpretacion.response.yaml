        es: 'En la gráfica Coord, relaciona [[exponente_critico_alpha]] con [[temperatura_reducida]]: la curvatura
          o pendiente efectiva indica si el comportamiento crítico sigue la ley esperada.'
        en: 'In the Coord graph, relate [[exponente_critico_alpha]] to [[temperatura_reducida]]: the curvature or
          effective slope indicates whether the critical behavior follows the expected law.'
    likely_errors:
    - id: exponente_critico_alpha_likely_error_ordinary_divergence
      when: 'true'
      status: warning
      text:
        es: No trates [[exponente_critico_alpha]] como una variación ordinaria suave si el modelo predice divergencia,
          anulación o singularidad cerca de [[temperatura_critica]].
        en: Do not treat [[exponente_critico_alpha]] as an ordinary smooth variation if the model predicts divergence,
          vanishing, or singular behavior near [[temperatura_critica]].
    next_step_rules:
    - id: exponente_critico_alpha_next_step_compare_regimes
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[exponente_critico_alpha]], compara el régimen por debajo y por encima de [[temperatura_critica]]
          y revisa qué exponente crítico controla la tendencia.
        en: After interpreting [[exponente_critico_alpha]], compare the regimes below and above [[temperatura_critica]]
          and check which critical exponent controls the trend.
    physical_intuition:
    - id: exponente_critico_alpha_physical_intuition_correlations
      when: 'true'
      status: info
      text:
        es: Físicamente, [[exponente_critico_alpha]] refleja que muchas partes del sistema dejan de comportarse
          de forma independiente cuando aumenta la correlación cerca de la criticidad.
        en: Physically, [[exponente_critico_alpha]] reflects that many parts of the system stop behaving independently
          as correlations grow near criticality.
    limiting_cases:
    - id: exponente_critico_alpha_limiting_case_near_far
      when: 'true'
      status: info
      text:
        es: Si [[temperatura_reducida]] se acerca a cero, [[exponente_critico_alpha]] debe evaluarse con especial
          cuidado; lejos de cero, el comportamiento crítico puede dejar de ser dominante.
        en: If [[temperatura_reducida]] approaches zero, [[exponente_critico_alpha]] must be evaluated carefully;
          far from zero, critical behavior may no longer dominate.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
