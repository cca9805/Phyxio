      en: Next step
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - beta_inversa_termica
  - peso_boltzmann_canonico
  - funcion_particion_canonica
  - probabilidad_microestado_canonico
  - energia_media_canonica
  magnitudes:
  - temperatura
  - constante_boltzmann
  - beta
  - energia_microestado
  - peso_boltzmann
  - funcion_particion
  - probabilidad_microestado
  - energia_media
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística canónica
    en: canonical statistical thermodynamics
  axis_convention:
    es: Las magnitudes de este leaf son escalares; el signo relevante aparece en exponentes y derivadas respecto a beta.
    en: The quantities in this leaf are scalar; the relevant sign appears in exponents and derivatives with respect to beta.
  standard_assumptions:
  - es: El sistema está en equilibrio térmico con un baño a temperatura definida.
    en: The system is in thermal equilibrium with a bath at a defined temperature.
  - es: Los microestados accesibles y sus energías están definidos para el modelo elegido.
    en: The accessible microstates and their energies are defined for the chosen model.
  standard_warnings:
  - es: No confundas peso canónico, función de partición y probabilidad normalizada.
    en: Do not confuse canonical weight, partition function, and normalized probability.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: '[[beta]] tiene dimensión inversa de energía; [[funcion_particion]], [[peso_boltzmann]] y [[probabilidad_microestado]]
        son adimensionales.'
      en: '[[beta]] has inverse-energy dimension; [[funcion_particion]], [[peso_boltzmann]], and [[probabilidad_microestado]]
        are dimensionless.'
  - id: normalization_check
    status: ok
    text:
      es: La suma de [[probabilidad_microestado]] sobre todos los microestados accesibles debe dar 1.
      en: The sum of [[probabilidad_microestado]] over all accessible microstates must equal 1.
error_patterns:
  enabled: true
  patterns:
  - id: weight_probability_confusion
    status: warning
    text:
      es: Confundir [[peso_boltzmann]] con [[probabilidad_microestado]] oculta el papel normalizador de [[funcion_particion]].
      en: Confusing [[peso_boltzmann]] with [[probabilidad_microestado]] hides the normalizing role of [[funcion_particion]].
  - id: temperature_unit_error
    status: warning
    text:
      es: Usar grados Celsius en lugar de kelvin altera [[beta]] y todos los pesos canónicos.
      en: Using Celsius instead of kelvin changes [[beta]] and all canonical weights.
graph_reading_policy:
  enabled: true
  primary_variable: beta
  reading_sequence:
  - es: Lee primero el eje de [[beta]], después la caída de [[peso_boltzmann]] o la respuesta de [[funcion_particion]].
    en: Read the [[beta]] axis first, then the decay of [[peso_boltzmann]] or the response of [[funcion_particion]].
  - es: Conecta pendiente y curvatura con cómo se redistribuyen probabilidades y promedios energéticos.
    en: Connect slope and curvature with how probabilities and energy averages redistribute.
  key_points:
  - es: '[[beta]] grande representa selección térmica estricta hacia energías bajas.'
    en: Large [[beta]] represents strict thermal selection toward low energies.
  - es: '[[funcion_particion]] normaliza y resume todos los microestados accesibles.'
    en: '[[funcion_particion]] normalizes and summarizes all accessible microstates.'
comparative_context:
  enabled: true
  reference_values:
  - es: Compara k_B T con separaciones típicas entre niveles de [[energia_microestado]].
    en: Compare k_B T with typical gaps between [[energia_microestado]] levels.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: El exponente beta por energía debe ser adimensional.
    en: The exponent beta times energy must be dimensionless.
  common_unit_mistakes:
  - es: Introducir [[temperatura]] en Celsius o [[energia_microestado]] en unidades no convertidas a julios.
    en: Entering [[temperatura]] in Celsius or [[energia_microestado]] in units not converted to joules.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  beta:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable térmica inversa
      en: inverse thermal variable
    summary_rules:
    - id: beta_summary
      when: 'true'
      status: ok
      text:
        es: '[[beta]] mide cuán estricta es la selección térmica: valores altos favorecen con fuerza los microestados de baja
          [[energia_microestado]].'
        en: '[[beta]] measures how strict thermal selection is: high values strongly favor microstates with low [[energia_microestado]].'
    physical_reading_rules:
    - id: beta_physical_reading
      when: 'true'
      status: info
      text:
        es: Lee [[beta]] como la inversa de la escala térmica k_B T, no como una temperatura nueva; aumenta cuando [[temperatura]]
          disminuye.
        en: Read [[beta]] as the inverse of the thermal scale k_B T, not as a new temperature; it increases when [[temperatura]]
          decreases.
    coherence_rules:
    - id: beta_coherence
      when: 'true'
      status: ok
      text:
        es: '[[beta]] debe ser positiva si [[temperatura]] es positiva y [[constante_boltzmann]] conserva su valor físico.'
        en: '[[beta]] must be positive if [[temperatura]] is positive and [[constante_boltzmann]] keeps its physical value.'
    model_validity_rules:
    - id: beta_model_validity
      when: 'true'
      status: info
      text:
        es: El uso de [[beta]] supone equilibrio canónico con un baño térmico bien definido y [[temperatura]] uniforme.
        en: Using [[beta]] assumes canonical equilibrium with a well-defined heat bath and uniform [[temperatura]].
    graph_rules:
    - id: beta_graph_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica frente a [[beta]], un avance hacia la derecha representa enfriamiento efectivo y mayor penalización
          de energías altas.
        en: On a graph versus [[beta]], moving right represents effective cooling and stronger penalization of high energies.
    likely_errors:
    - id: beta_likely_errors
      when: 'true'
      status: warning
      text:
        es: No confundas [[beta]] grande con sistema más caliente; físicamente indica menor escala térmica disponible.
        en: Do not confuse large [[beta]] with a hotter system; physically it indicates a smaller available thermal scale.
    next_step_rules:
    - id: beta_next_step
      when: 'true'
      status: info
      text:
        es: Después de calcular [[beta]], úsala para evaluar [[peso_boltzmann]], [[funcion_particion]] y probabilidades canónicas.
        en: After computing [[beta]], use it to evaluate [[peso_boltzmann]], [[funcion_particion]], and canonical probabilities.
    physical_intuition:
    - id: beta_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[beta]] solo adquiere sentido al conectarse con la distribución canónica completa.
        en: Intuitively, [[beta]] gains meaning only when connected with the full canonical distribution.
    limiting_cases:
    - id: beta_limiting_cases
      when: 'true'
      status: info
      text:
        es: Revisa [[beta]] en los límites de [[temperatura]] alta, [[temperatura]] baja y energías dominantes.
        en: Check [[beta]] in the limits of high [[temperatura]], low [[temperatura]], and dominant energy states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  temperatura:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable térmica de control
      en: thermal control variable
    summary_rules:
    - id: temperatura_summary
      when: 'true'
      status: ok
      text:
        es: '[[temperatura]] controla cuánto pesan las diferencias de [[energia_microestado]] dentro del conjunto canónico.'
        en: '[[temperatura]] controls how much differences in [[energia_microestado]] matter inside the canonical ensemble.'
    physical_reading_rules:
    - id: temperatura_physical_reading
      when: 'true'
      status: info
      text:
        es: 'Una [[temperatura]] mayor suaviza la selección: más microestados contribuyen de forma apreciable a [[funcion_particion]].'
        en: 'A higher [[temperatura]] softens selection: more microstates contribute appreciably to [[funcion_particion]].'
    coherence_rules:
    - id: temperatura_coherence
      when: 'true'
      status: ok
      text:
        es: La [[temperatura]] debe introducirse en kelvin; usar grados Celsius rompe la escala energética k_B T.
        en: '[[temperatura]] must be entered in kelvin; using Celsius breaks the k_B T energy scale.'
    model_validity_rules:
    - id: temperatura_model_validity
      when: 'true'
      status: info
      text:
        es: La interpretación requiere equilibrio térmico; si la [[temperatura]] cambia durante la medida, el modelo canónico
          simple falla.
        en: The interpretation requires thermal equilibrium; if [[temperatura]] changes during measurement, the simple canonical
          model fails.
    graph_rules:
    - id: temperatura_graph_reading
      when: 'true'
      status: info
      text:
        es: Al leer curvas con [[temperatura]], observa si [[funcion_particion]] crece por incorporación de estados de mayor
          energía.
        en: When reading curves with [[temperatura]], check whether [[funcion_particion]] grows because higher-energy states
          enter.
    likely_errors:
    - id: temperatura_likely_errors
      when: 'true'
      status: warning
      text:
        es: No trates [[temperatura]] como energía directa; la escala energética aparece al combinarla con [[constante_boltzmann]].
        en: Do not treat [[temperatura]] as direct energy; the energy scale appears only when it is combined with [[constante_boltzmann]].
    next_step_rules:
    - id: temperatura_next_step
      when: 'true'
      status: info
      text:
        es: Revisa si la [[temperatura]] hace razonables los pesos canónicos antes de interpretar probabilidades o promedios.
        en: Check whether [[temperatura]] makes the canonical weights reasonable before interpreting probabilities or averages.
    physical_intuition:
    - id: temperatura_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[temperatura]] solo adquiere sentido al conectarse con la distribución canónica completa.
        en: Intuitively, [[temperatura]] gains meaning only when connected with the full canonical distribution.
    limiting_cases:
    - id: temperatura_limiting_cases
      when: 'true'
      status: info
      text:
        es: Revisa [[temperatura]] en los límites de [[temperatura]] alta, [[temperatura]] baja y energías dominantes.
        en: Check [[temperatura]] in the limits of high [[temperatura]], low [[temperatura]], and dominant energy states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  peso_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: peso estadístico no normalizado
      en: unnormalized statistical weight
    summary_rules:
    - id: peso_boltzmann_summary
      when: 'true'
      status: ok
      text:
        es: '[[peso_boltzmann]] es la contribución relativa de un microestado antes de normalizar con [[funcion_particion]].'
        en: '[[peso_boltzmann]] is the relative contribution of a microstate before normalization by [[funcion_particion]].'
    physical_reading_rules:
    - id: peso_boltzmann_physical_reading
      when: 'true'
      status: info
      text:
        es: Un [[peso_boltzmann]] pequeño indica que ese microestado existe en el modelo, pero aparece rara vez en equilibrio.
        en: A small [[peso_boltzmann]] indicates that the microstate exists in the model but appears rarely at equilibrium.
    coherence_rules:
    - id: peso_boltzmann_coherence
      when: 'true'
      status: ok
      text:
        es: Los [[peso_boltzmann]] deben ser positivos y adimensionales; valores negativos señalan error algebraico o de signo
          en el exponente.
        en: '[[peso_boltzmann]] values must be positive and dimensionless; negative values signal an algebraic or exponent-sign
          error.'
    model_validity_rules:
    - id: peso_boltzmann_model_validity
      when: 'true'
      status: info
      text:
        es: El peso canónico presupone microestados discretos o integrables y acoplamiento débil a un baño térmico.
        en: The canonical weight assumes discrete or integrable microstates and weak coupling to a heat bath.
    graph_rules:
    - id: peso_boltzmann_graph_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica, [[peso_boltzmann]] cae con [[beta]] para una [[energia_microestado]] positiva fija.
        en: On the graph, [[peso_boltzmann]] decreases with [[beta]] for a fixed positive [[energia_microestado]].
    likely_errors:
    - id: peso_boltzmann_likely_errors
      when: 'true'
      status: warning
      text:
        es: 'No interpretes [[peso_boltzmann]] como probabilidad: falta dividir por [[funcion_particion]].'
        en: 'Do not interpret [[peso_boltzmann]] as probability: it still must be divided by [[funcion_particion]].'
    next_step_rules:
    - id: peso_boltzmann_next_step
      when: 'true'
      status: info
      text:
        es: Suma los [[peso_boltzmann]] accesibles para obtener [[funcion_particion]] y normalizar cada microestado.
        en: Sum the accessible [[peso_boltzmann]] values to obtain [[funcion_particion]] and normalize each microstate.
    physical_intuition:
    - id: peso_boltzmann_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[peso_boltzmann]] solo adquiere sentido al conectarse con la distribución canónica completa.
        en: Intuitively, [[peso_boltzmann]] gains meaning only when connected with the full canonical distribution.
    limiting_cases:
    - id: peso_boltzmann_limiting_cases
      when: 'true'
      status: info
      text:
        es: Revisa [[peso_boltzmann]] en los límites de [[temperatura]] alta, [[temperatura]] baja y energías dominantes.
        en: Check [[peso_boltzmann]] in the limits of high [[temperatura]], low [[temperatura]], and dominant energy states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  funcion_particion:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: normalizador canónico y generador estadístico
      en: canonical normalizer and statistical generator
    summary_rules:
    - id: funcion_particion_summary
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] condensa todos los pesos canónicos accesibles y actúa como normalizador del conjunto.'
        en: '[[funcion_particion]] condenses all accessible canonical weights and acts as the ensemble normalizer.'
    physical_reading_rules:
    - id: funcion_particion_physical_reading
      when: 'true'
      status: info
      text:
        es: Una [[funcion_particion]] mayor indica más contribución estadística total, no necesariamente más energía por microestado.
        en: A larger [[funcion_particion]] indicates greater total statistical contribution, not necessarily more energy per
          microstate.
    coherence_rules:
    - id: funcion_particion_coherence
      when: 'true'
      status: ok
      text:
        es: '[[funcion_particion]] debe ser positiva y adimensional; si vale cero o negativa, la suma de pesos está mal construida.'
        en: '[[funcion_particion]] must be positive and dimensionless; if it is zero or negative, the sum of weights is built
          incorrectly.'
    model_validity_rules:
    - id: funcion_particion_model_validity
      when: 'true'
      status: info
      text:
        es: 'La lectura de [[funcion_particion]] es canónica: número de partículas, volumen y baño térmico deben quedar controlados.'
        en: 'The reading of [[funcion_particion]] is canonical: particle number, volume, and heat bath must remain controlled.'
    graph_rules:
    - id: funcion_particion_graph_reading
      when: 'true'
      status: info
      text:
        es: La pendiente y curvatura de ln([[funcion_particion]]) frente a [[beta]] contienen información sobre [[energia_media]]
          y respuesta térmica.
        en: The slope and curvature of ln([[funcion_particion]]) versus [[beta]] contain information about [[energia_media]]
          and thermal response.
    likely_errors:
    - id: funcion_particion_likely_errors
      when: 'true'
      status: warning
      text:
        es: No leas [[funcion_particion]] como número de microestados salvo en límites donde todos los pesos son casi iguales.
        en: Do not read [[funcion_particion]] as the number of microstates except in limits where all weights are nearly equal.
    next_step_rules:
    - id: funcion_particion_next_step
      when: 'true'
      status: info
      text:
        es: Usa [[funcion_particion]] para normalizar [[probabilidad_microestado]] o derivar [[energia_media]] según el objetivo
          del cálculo.
        en: Use [[funcion_particion]] to normalize [[probabilidad_microestado]] or derive [[energia_media]] according to the
          calculation goal.
    physical_intuition:
    - id: funcion_particion_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[funcion_particion]] solo adquiere sentido al conectarse con la distribución canónica completa.
        en: Intuitively, [[funcion_particion]] gains meaning only when connected with the full canonical distribution.
    limiting_cases:
    - id: funcion_particion_limiting_cases
      when: 'true'
      status: info
      text:
        es: Revisa [[funcion_particion]] en los límites de [[temperatura]] alta, [[temperatura]] baja y energías dominantes.
        en: Check [[funcion_particion]] in the limits of high [[temperatura]], low [[temperatura]], and dominant energy states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  probabilidad_microestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: probabilidad normalizada de ocupación
      en: normalized occupation probability
    summary_rules:
    - id: probabilidad_microestado_summary
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_microestado]] expresa la ocupación física de un microestado tras normalizar su peso por [[funcion_particion]].'
        en: '[[probabilidad_microestado]] expresses the physical occupation of a microstate after normalizing its weight by
          [[funcion_particion]].'
    physical_reading_rules:
    - id: probabilidad_microestado_physical_reading
      when: 'true'
      status: info
      text:
        es: Una [[probabilidad_microestado]] alta significa ocupación frecuente, no trayectoria obligatoria ni permanencia
          continua.
        en: A high [[probabilidad_microestado]] means frequent occupation, not mandatory trajectory or continuous residence.
    coherence_rules:
    - id: probabilidad_microestado_coherence
      when: 'true'
      status: ok
      text:
        es: Las probabilidades deben estar entre 0 y 1 y su suma sobre microestados accesibles debe ser 1.
        en: Probabilities must lie between 0 and 1 and their sum over accessible microstates must be 1.
    model_validity_rules:
    - id: probabilidad_microestado_model_validity
      when: 'true'
      status: info
      text:
        es: La probabilidad canónica describe equilibrio; no predice tiempos de transición sin un modelo dinámico adicional.
        en: Canonical probability describes equilibrium; it does not predict transition times without an additional dynamical
          model.
    graph_rules:
    - id: probabilidad_microestado_graph_reading
      when: 'true'
      status: info
      text:
        es: Al variar [[beta]], observa cómo se redistribuye [[probabilidad_microestado]] hacia energías bajas o hacia ocupaciones
          más uniformes.
        en: As [[beta]] varies, observe how [[probabilidad_microestado]] redistributes toward low energies or more uniform
          occupations.
    likely_errors:
    - id: probabilidad_microestado_likely_errors
      when: 'true'
      status: warning
      text:
        es: No normalizar por [[funcion_particion]] produce pesos relativos, no probabilidades físicas comparables.
        en: Failing to normalize by [[funcion_particion]] gives relative weights, not comparable physical probabilities.
    next_step_rules:
    - id: probabilidad_microestado_next_step
      when: 'true'
      status: info
      text:
        es: Comprueba la suma de probabilidades antes de calcular [[energia_media]] como promedio ponderado.
        en: Check the probability sum before computing [[energia_media]] as a weighted average.
    physical_intuition:
    - id: probabilidad_microestado_intuition
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[probabilidad_microestado]] solo adquiere sentido al conectarse con la distribución canónica
          completa.
        en: Intuitively, [[probabilidad_microestado]] gains meaning only when connected with the full canonical distribution.
    limiting_cases:
    - id: probabilidad_microestado_limiting_cases
      when: 'true'
      status: info
      text:
        es: Revisa [[probabilidad_microestado]] en los límites de [[temperatura]] alta, [[temperatura]] baja y energías dominantes.
        en: Check [[probabilidad_microestado]] in the limits of high [[temperatura]], low [[temperatura]], and dominant energy
          states.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  energia_media:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: promedio energético canónico
      en: canonical mean energy
    summary_rules:
    - id: energia_media_summary
      when: 'true'
      status: ok
      text:
        es: '[[energia_media]] resume el promedio energético que resulta de ponderar microestados con probabilidades canónicas.'
        en: '[[energia_media]] summarizes the energy average obtained by weighting microstates with canonical probabilities.'
    physical_reading_rules:
    - id: energia_media_physical_reading
      when: 'true'
      status: info
      text:
        es: '[[energia_media]] no es la energía de un microestado único; es el centro estadístico de muchas ocupaciones posibles.'
        en: '[[energia_media]] is not the energy of one single microstate; it is the statistical center of many possible occupations.'
    coherence_rules:
    - id: energia_media_coherence
      when: 'true'
      status: ok
      text:
