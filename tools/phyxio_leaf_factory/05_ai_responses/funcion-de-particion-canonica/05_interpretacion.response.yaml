  bloque: termodinamica-estadistica
  subbloque: funcion-de-particion
  parent_id: funcion-de-particion
  ruta_relativa: fisica-clasica/termodinamica-estadistica/funcion-de-particion/funcion-de-particion-canonica
  orden: 274200
