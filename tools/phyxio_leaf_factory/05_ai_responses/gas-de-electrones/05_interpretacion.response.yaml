global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística de electrones degenerados
    en: statistical thermodynamics of degenerate electrons
  axis_convention:
    es: Las magnitudes principales son escalares; el signo relevante aparece al comparar energías respecto al potencial químico.
    en: The main quantities are scalar; the relevant sign appears when energies are compared with the chemical potential.
  standard_assumptions:
  - es: Gas de electrones libre o casi libre, no relativista, en equilibrio térmico y con estados cuánticos fermiónicos.
    en: Free or nearly free, nonrelativistic electron gas in thermal equilibrium with fermionic quantum states.
  - es: La densidad se interpreta como número de electrones por volumen macroscópico homogéneo.
    en: Density is interpreted as electron number per homogeneous macroscopic volume.
  standard_warnings:
  - es: No confundas energía de Fermi con energía térmica ordinaria ni ocupación media con número total de electrones.
    en: Do not confuse Fermi energy with ordinary thermal energy or mean occupation with total electron number.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: La energía final debe tener unidades de joule o una unidad energética convertida de forma explícita.
      en: The final energy must have joule units or an explicitly converted energy unit.
  - id: density_positive_check
    status: ok
    text:
      es: '[[densidad_electronica]], [[numero_electrones]] y [[volumen]] deben ser positivos en el modelo físico.'
      en: '[[densidad_electronica]], [[numero_electrones]], and [[volumen]] must be positive in the physical model.'
error_patterns:
  enabled: true
  patterns:
  - id: unit_sign_model_confusion
    status: warning
    text:
      es: Un error frecuente es leer el número sin unidad, régimen de degeneración o modelo físico.
      en: A common error is reading the number without unit, degeneracy regime, or physical model.
  - id: fermi_temperature_confusion
    status: warning
    text:
      es: Otro error es creer que [[temperatura_fermi]] es la temperatura real del gas, cuando es una escala equivalente.
      en: Another error is believing that [[temperatura_fermi]] is the real gas temperature, when it is an equivalent scale.
graph_reading_policy:
  enabled: true
  primary_variable: energia_fermi
  reading_sequence:
  - es: Identifica [[densidad_electronica]] en el eje horizontal y [[energia_fermi]] en el eje vertical.
    en: Identify [[densidad_electronica]] on the horizontal axis and [[energia_fermi]] on the vertical axis.
  - es: 'Lee si el crecimiento es sublineal: duplicar la densidad no duplica automáticamente la energía de Fermi.'
    en: 'Read whether the growth is sublinear: doubling density does not automatically double Fermi energy.'
  key_points:
  - es: La curva conecta el llenado de estados con la exclusión de Pauli y la escala energética del gas.
    en: The curve connects state filling with Pauli exclusion and the energy scale of the gas.
comparative_context:
  enabled: true
  reference_values:
  - es: En metales, [[temperatura_fermi]] suele superar ampliamente la temperatura ambiente.
    en: In metals, [[temperatura_fermi]] is usually far above room temperature.
  - es: Una [[energia_fermi]] de varios eV es razonable para muchos electrones de conducción.
    en: A [[energia_fermi]] of several eV is reasonable for many conduction electrons.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Comprueba que [[energia_fermi]] sea energía, [[temperatura_fermi]] temperatura, [[velocidad_fermi]] velocidad y [[densidad_electronica]] inverso de volumen.
    en: Check that [[energia_fermi]] is energy, [[temperatura_fermi]] is temperature, [[velocidad_fermi]] is speed, and [[densidad_electronica]] is inverse volume.
  common_unit_mistakes:
  - es: Usar cm⁻³ como si fuera m⁻³ sin convertir la densidad electrónica.
    en: Using cm⁻³ as if it were m⁻³ without converting electron density.
  - es: Mezclar eV y J dentro de una misma fórmula sin conversión explícita.
    en: Mixing eV and J in the same formula without explicit conversion.
