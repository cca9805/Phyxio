targets:
  densidad_electronica:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro de entrada
      en: input parameter
    summary_rules:
    - id: densidad_electronica_summary_core
      when: 'true'
      status: ok
      text:
        es: '[[densidad_electronica]] mide cuántos electrones disponibles hay por volumen y controla la presión de llenado cuántico.'
        en: '[[densidad_electronica]] measures how many available electrons exist per volume and controls quantum filling pressure.'
    physical_reading_rules:
    - id: densidad_electronica_physical_reading_core
      when: 'true'
      status: info
      text:
        es: Al aumentar [[densidad_electronica]], la exclusión de Pauli empuja el llenado hacia estados más altos y eleva [[energia_fermi]].
        en: As [[densidad_electronica]] increases, Pauli exclusion pushes filling toward higher states and raises [[energia_fermi]].
    coherence_rules:
    - id: densidad_electronica_coherence_units
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[densidad_electronica]] usa unidades SI y que su valor encaja con las magnitudes relacionadas del gas de electrones.
        en: Check that [[densidad_electronica]] uses SI units and that its value fits the related quantities of the electron gas.
    model_validity_rules:
    - id: densidad_electronica_model_validity_degenerate_gas
      when: 'true'
      status: info
      text:
        es: Interpreta [[densidad_electronica]] dentro de un gas de electrones libre o casi libre, no relativista y en equilibrio térmico.
        en: Interpret [[densidad_electronica]] within a free or nearly free, nonrelativistic electron gas in thermal equilibrium.
    graph_rules:
    - id: densidad_electronica_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[densidad_electronica]] con cómo la [[densidad_electronica]] modifica [[energia_fermi]] y la ocupación de estados.
        en: In the Coord graph, relate [[densidad_electronica]] to how [[densidad_electronica]] changes [[energia_fermi]] and state occupation.
    likely_errors:
    - id: densidad_electronica_likely_error_isolated_number
      when: 'true'
      status: warning
      text:
        es: 'No leas [[densidad_electronica]] como un número aislado: revisa escala, unidades, dependencia con densidad y régimen de validez.'
        en: 'Do not read [[densidad_electronica]] as an isolated number: check scale, units, density dependence, and validity regime.'
    next_step_rules:
    - id: densidad_electronica_next_step_compare_scale
      when: 'true'
      status: info
      text:
        es: Después de obtener [[densidad_electronica]], compáralo con [[energia_fermi]], [[temperatura_fermi]] o [[ocupacion_estado]] según el tipo de pregunta.
        en: After obtaining [[densidad_electronica]], compare it with [[energia_fermi]], [[temperatura_fermi]], or [[ocupacion_estado]] according to the question type.
    - id: densidad_electronica_next_step_from_count
      when: 'true'
      status: info
      text:
        es: Si solo conoces [[numero_electrones]] y [[volumen]], calcula primero la densidad antes de usar la escala de Fermi.
        en: If only [[numero_electrones]] and [[volumen]] are known, first compute density before using the Fermi scale.
    physical_intuition:
    - id: densidad_electronica_physical_intuition_fermi_pressure
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[densidad_electronica]] debe ayudar a leer el llenado progresivo impuesto por Pauli en el gas de electrones.
        en: Intuitively, [[densidad_electronica]] should help read the progressive filling imposed by Pauli exclusion in the electron gas.
    limiting_cases:
    - id: densidad_electronica_limiting_case_cold_dense
      when: 'true'
      status: info
      text:
        es: 'Como caso límite, revisa el régimen frío y denso: si [[temperatura_absoluta]] es pequeña frente a [[temperatura_fermi]], domina la degeneración.'
        en: 'As a limiting case, check the cold dense regime: if [[temperatura_absoluta]] is small compared with [[temperatura_fermi]], degeneracy dominates.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
