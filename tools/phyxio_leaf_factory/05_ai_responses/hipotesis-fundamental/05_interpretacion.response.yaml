version: 5.0.0
id: hipotesis-fundamental
leaf_id: hipotesis-fundamental
nombre:
  es: Hipotesis fundamental
  en: Fundamental Hypothesis
scope:
  area: fisica-clasica
  bloque: termodinamica-estadistica
  subbloque: fundamentos
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/termodinamica-estadistica/fundamentos/hipotesis-fundamental
  orden: 271200
output_contract:
  sections: &id001
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
  inline_mode:
    max_sections: 2
    priority:
    - summary
    - likely_errors
  extended_mode:
    show_all: true
result_blocks:
  summary:
    enabled: true
    order: 1
    title:
      es: Resumen
      en: Summary
  physical_reading:
    enabled: true
    order: 2
    title:
      es: Lectura física
      en: Physical reading
  coherence:
    enabled: true
    order: 3
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    enabled: true
    order: 4
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    enabled: true
    order: 5
    title:
      es: Lectura gráfica
      en: Graph reading
  likely_errors:
    enabled: true
    order: 6
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    enabled: true
    order: 7
    title:
      es: Siguiente paso
      en: Next step
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - postulado_equiprobabilidad_microcanonica
  - normalizacion_microestados_accesibles
  - entropia_boltzmann_microcanonica
  - probabilidad_macroestado_desde_multiplicidad
  - desbalance_frente_equiprobabilidad
  magnitudes:
  - numero_microestados_accesibles
  - probabilidad_microestado
  - multiplicidad_macroestado
  - entropia
  - constante_boltzmann
  - energia_total
  - volumen
  - numero_particulas
  - desbalance_probabilidad
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística microcanónica
    en: microcanonical statistical thermodynamics
  axis_convention:
    es: Las magnitudes del leaf son escalares; el signo solo indica desviación o diagnóstico cuando procede.
    en: The leaf quantities are scalar; sign only indicates deviation or diagnostic direction when relevant.
  standard_assumptions:
  - es: El sistema se considera aislado y descrito por restricciones macroscópicas fijas.
    en: The system is considered isolated and described by fixed macroscopic constraints.
  - es: Solo se comparan microestados accesibles compatibles con [[energia_total]], [[volumen]] y [[numero_particulas]].
    en: Only accessible microstates compatible with [[energia_total]], [[volumen]], and [[numero_particulas]] are compared.
  standard_warnings:
  - es: No uses la hipótesis fundamental si existen intercambios de energía con un baño térmico no modelado.
    en: Do not use the fundamental hypothesis if energy exchanges with an unmodeled heat bath exist.
  - es: No confundas equiprobabilidad microscópica con igual probabilidad de macroestados.
    en: Do not confuse microscopic equiprobability with equal probability of macrostates.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: normalization_check
    status: ok
    text:
      es: La suma de probabilidades de microestados accesibles debe ser uno.
      en: The sum of probabilities of accessible microstates must be one.
  - id: dimension_check
    status: ok
    text:
      es: Los conteos y probabilidades son adimensionales; [[entropia]] conserva unidad J/K.
      en: Counts and probabilities are dimensionless; [[entropia]] keeps unit J/K.
  - id: ensemble_check
    status: warning
    text:
      es: Revisa que el problema sea microcanónico antes de aplicar equiprobabilidad.
      en: Check that the problem is microcanonical before applying equiprobability.
error_patterns:
  enabled: true
  patterns:
  - id: micro_macro_probability_confusion
    status: warning
    text:
      es: Confundir microestados equiprobables con macroestados equiprobables suele dar interpretaciones falsas.
      en: Confusing equiprobable microstates with equiprobable macrostates often gives false interpretations.
  - id: normalization_missing
    status: warning
    text:
      es: Una probabilidad sin normalización frente al conjunto accesible no tiene lectura física completa.
      en: A probability without normalization over the accessible set has no complete physical reading.
  - id: ensemble_mismatch
    status: warning
    text:
      es: Usar pesos canónicos en un contexto microcanónico mezcla modelos incompatibles.
      en: Using canonical weights in a microcanonical context mixes incompatible models.
graph_reading_policy:
  enabled: true
  primary_variable: probabilidad_microestado
  reading_sequence:
  - es: Identifica si el eje horizontal representa microestados, multiplicidad o número de estados accesibles.
    en: Identify whether the horizontal axis represents microstates, multiplicity, or number of accessible states.
  - es: Comprueba si la distribución de [[probabilidad_microestado]] es uniforme o muestra [[desbalance_probabilidad]].
    en: Check whether the [[probabilidad_microestado]] distribution is uniform or shows [[desbalance_probabilidad]].
  - es: Relaciona la forma visual con [[numero_microestados_accesibles]], [[multiplicidad_macroestado]] y [[entropia]].
    en: Relate the visual shape to [[numero_microestados_accesibles]], [[multiplicidad_macroestado]], and [[entropia]].
  key_points:
  - es: Una línea uniforme apoya equiprobabilidad entre microestados accesibles.
    en: A uniform line supports equiprobability among accessible microstates.
  - es: Una concentración en algunos estados exige revisar accesibilidad, restricciones o ensemble.
    en: Concentration in some states requires reviewing accessibility, constraints, or ensemble.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[desbalance_probabilidad]] con cero para diagnosticar cercanía a la equiprobabilidad.
    en: Compare [[desbalance_probabilidad]] with zero to diagnose closeness to equiprobability.
  - es: Compara el crecimiento de [[entropia]] con el aumento de [[numero_microestados_accesibles]].
    en: Compare the growth of [[entropia]] with the increase of [[numero_microestados_accesibles]].
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[probabilidad_microestado]], [[numero_microestados_accesibles]], [[multiplicidad_macroestado]] y [[desbalance_probabilidad]]
      son adimensionales; [[entropia]] se expresa en J/K.'
    en: '[[probabilidad_microestado]], [[numero_microestados_accesibles]], [[multiplicidad_macroestado]], and [[desbalance_probabilidad]]
      are dimensionless; [[entropia]] is expressed in J/K.'
  common_unit_mistakes:
  - es: Asignar unidades de energía a un conteo de microestados.
    en: Assigning energy units to a microstate count.
  - es: Olvidar [[constante_boltzmann]] al pasar de logaritmo de conteo a [[entropia]].
    en: Forgetting [[constante_boltzmann]] when converting from logarithmic count to [[entropia]].
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  probabilidad_microestado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: probabilidad equiprobable de microestado accesible
      en: equiprobable accessible microstate probability
    summary_rules:
    - id: probabilidad_microestado_summary_interpretation
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_microestado]] representa la fracción asignada a cada microestado accesible bajo la hipótesis fundamental.'
        en: '[[probabilidad_microestado]] represents the fraction assigned to each accessible microstate under the fundamental
          hypothesis.'
    physical_reading_rules:
    - id: probabilidad_microestado_physical_reading_microcanonical
      when: 'true'
      status: info
      text:
        es: Si los microestados accesibles son equivalentes, [[probabilidad_microestado]] debe ser igual para cada uno y disminuir
          cuando crece [[numero_microestados_accesibles]].
        en: If accessible microstates are equivalent, [[probabilidad_microestado]] must be equal for each one and decrease
          as [[numero_microestados_accesibles]] grows.
    coherence_rules:
    - id: probabilidad_microestado_coherence_units_normalization
      when: 'true'
      status: ok
      text:
        es: Comprueba que la suma de las probabilidades sea uno y que ningún microestado accesible quede privilegiado sin
          causa física.
        en: Check that the probabilities sum to one and that no accessible microstate is privileged without a physical reason.
    model_validity_rules:
    - id: probabilidad_microestado_model_validity_microcanonical
      when: 'true'
      status: info
      text:
        es: La lectura solo es válida en un sistema aislado con [[energia_total]], [[volumen]] y [[numero_particulas]] fijados
          macroscópicamente.
        en: The reading is valid only for an isolated system with macroscopic [[energia_total]], [[volumen]], and [[numero_particulas]]
          fixed.
    graph_rules:
    - id: probabilidad_microestado_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: En el gráfico, una curva uniforme de [[probabilidad_microestado]] frente al índice de estados indica equiprobabilidad
          microcanónica.
        en: In the graph, a uniform [[probabilidad_microestado]] curve versus state index indicates microcanonical equiprobability.
    likely_errors:
    - id: probabilidad_microestado_likely_error_conceptual
      when: 'true'
      status: warning
      text:
        es: No confundas equiprobabilidad de microestados accesibles con igualdad de macroestados; la [[multiplicidad_macroestado]]
          puede ser muy diferente.
        en: Do not confuse equal probability of accessible microstates with equal probability of macrostates; [[multiplicidad_macroestado]]
          may differ greatly.
    next_step_rules:
    - id: probabilidad_microestado_next_step_use_result
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[probabilidad_microestado]], calcula o revisa [[numero_microestados_accesibles]] para
          verificar la normalización.
        en: After interpreting [[probabilidad_microestado]], compute or review [[numero_microestados_accesibles]] to verify
          normalization.
    physical_intuition:
    - id: probabilidad_microestado_physical_intuition_counting
      when: 'true'
      status: info
      text:
        es: Cada microestado accesible recibe la misma papeleta estadística; más papeletas totales significan una papeleta
          individual más pequeña.
        en: Each accessible microstate receives the same statistical ticket; more total tickets mean a smaller individual
          ticket.
    limiting_cases:
    - id: probabilidad_microestado_limiting_case_interpretation
      when: 'true'
      status: info
      text:
        es: Si [[numero_microestados_accesibles]] vale uno, [[probabilidad_microestado]] concentra la ocupación; si crece
          mucho, cada microestado pesa poco.
        en: If [[numero_microestados_accesibles]] is one, [[probabilidad_microestado]] concentrates occupation; if it grows
          greatly, each microstate has little weight.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  numero_microestados_accesibles:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: conteo de microestados compatibles
      en: count of compatible microstates
    summary_rules:
    - id: numero_microestados_accesibles_summary_interpretation
      when: 'true'
      status: ok
      text:
        es: '[[numero_microestados_accesibles]] cuenta cuántos microestados cumplen las restricciones macroscópicas del sistema
          aislado.'
        en: '[[numero_microestados_accesibles]] counts how many microstates satisfy the macroscopic constraints of the isolated
          system.'
    physical_reading_rules:
    - id: numero_microestados_accesibles_physical_reading_microcanonical
      when: 'true'
      status: info
      text:
        es: Un [[numero_microestados_accesibles]] mayor significa más formas microscópicas de realizar el mismo macroestado
          y menor probabilidad por microestado.
        en: A larger [[numero_microestados_accesibles]] means more microscopic ways to realize the same macrostate and a smaller
          probability per microstate.
    coherence_rules:
    - id: numero_microestados_accesibles_coherence_units_normalization
      when: 'true'
      status: ok
      text:
        es: Verifica que [[numero_microestados_accesibles]] sea positivo, adimensional y compatible con [[energia_total]],
          [[volumen]] y [[numero_particulas]].
        en: Verify that [[numero_microestados_accesibles]] is positive, dimensionless, and compatible with [[energia_total]],
          [[volumen]], and [[numero_particulas]].
    model_validity_rules:
    - id: numero_microestados_accesibles_model_validity_microcanonical
      when: 'true'
      status: info
      text:
        es: El conteo presupone que los microestados considerados son accesibles dentro de la resolución energética elegida
          y que no se mezclan ensembles.
        en: The count assumes the considered microstates are accessible within the chosen energy resolution and that ensembles
          are not mixed.
    graph_rules:
    - id: numero_microestados_accesibles_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: La lectura gráfica debe mostrar que al aumentar [[numero_microestados_accesibles]] disminuye la ocupación individual
          y crece la dispersión estadística disponible.
        en: The graph reading should show that as [[numero_microestados_accesibles]] increases, individual occupation decreases
          and available statistical spread grows.
    likely_errors:
    - id: numero_microestados_accesibles_likely_error_conceptual
      when: 'true'
      status: warning
      text:
        es: No trates [[numero_microestados_accesibles]] como energía ni como número de partículas; es un conteo de configuraciones
          compatibles.
        en: Do not treat [[numero_microestados_accesibles]] as energy or particle number; it is a count of compatible configurations.
    next_step_rules:
    - id: numero_microestados_accesibles_next_step_use_result
      when: 'true'
      status: info
      text:
        es: Usa [[numero_microestados_accesibles]] para obtener [[probabilidad_microestado]] o para estimar la [[entropia]]
          asociada.
        en: Use [[numero_microestados_accesibles]] to obtain [[probabilidad_microestado]] or estimate the associated [[entropia]].
    physical_intuition:
    - id: numero_microestados_accesibles_physical_intuition_counting
      when: 'true'
      status: info
      text:
        es: 'Un macroestado con muchas microformas es estadísticamente más ancho: hay más caminos microscópicos hacia la misma
          descripción visible.'
        en: 'A macrostate with many micro-forms is statistically wider: there are more microscopic paths to the same visible
          description.'
    limiting_cases:
    - id: numero_microestados_accesibles_limiting_case_interpretation
      when: 'true'
      status: info
      text:
        es: Si el conteo se hace con restricciones mal definidas, [[numero_microestados_accesibles]] pierde significado y
          arrastra errores a [[entropia]].
        en: If the count is made with poorly defined constraints, [[numero_microestados_accesibles]] loses meaning and carries
          errors into [[entropia]].
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  entropia:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: medida logarítmica de multiplicidad
      en: logarithmic measure of multiplicity
    summary_rules:
    - id: entropia_summary_interpretation
      when: 'true'
      status: ok
      text:
        es: '[[entropia]] mide en escala macroscópica cuántos microestados accesibles sostienen el macroestado.'
        en: '[[entropia]] measures on a macroscopic scale how many accessible microstates support the macrostate.'
    physical_reading_rules:
    - id: entropia_physical_reading_microcanonical
      when: 'true'
      status: info
      text:
        es: Cuando aumenta [[numero_microestados_accesibles]] o [[multiplicidad_macroestado]], [[entropia]] crece porque hay
          más realizaciones microscópicas compatibles.
        en: When [[numero_microestados_accesibles]] or [[multiplicidad_macroestado]] increases, [[entropia]] grows because
          more compatible microscopic realizations exist.
    coherence_rules:
    - id: entropia_coherence_units_normalization
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[entropia]] tenga unidades J/K y que use [[constante_boltzmann]] como puente entre conteo adimensional
          y magnitud térmica.
        en: Check that [[entropia]] has units J/K and uses [[constante_boltzmann]] as the bridge between dimensionless count
          and thermal quantity.
    model_validity_rules:
    - id: entropia_model_validity_microcanonical
      when: 'true'
      status: info
      text:
        es: La interpretación de [[entropia]] como conteo exige microestados accesibles igualmente probables y restricciones
          macroscópicas fijas.
        en: Interpreting [[entropia]] as a count requires equally probable accessible microstates and fixed macroscopic constraints.
    graph_rules:
    - id: entropia_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: 'En la gráfica, [[entropia]] no debe leerse como probabilidad: aumenta lentamente con el conteo por su carácter
          logarítmico.'
        en: 'In the graph, [[entropia]] should not be read as probability: it grows slowly with count because of its logarithmic
          character.'
    likely_errors:
    - id: entropia_likely_error_conceptual
      when: 'true'
      status: warning
      text:
        es: No digas que mayor [[entropia]] significa desorden genérico sin vincularla a [[numero_microestados_accesibles]]
          o [[multiplicidad_macroestado]].
        en: Do not say larger [[entropia]] means generic disorder without linking it to [[numero_microestados_accesibles]]
          or [[multiplicidad_macroestado]].
    next_step_rules:
    - id: entropia_next_step_use_result
      when: 'true'
      status: info
      text:
        es: Tras obtener [[entropia]], revisa si el macroestado más probable coincide con la mayor [[multiplicidad_macroestado]].
        en: After obtaining [[entropia]], check whether the most probable macrostate corresponds to the largest [[multiplicidad_macroestado]].
    physical_intuition:
    - id: entropia_physical_intuition_counting
      when: 'true'
      status: info
      text:
        es: La [[entropia]] comprime un número enorme de posibilidades microscópicas en una escala térmica manejable.
        en: '[[entropia]] compresses a huge number of microscopic possibilities into a manageable thermal scale.'
    limiting_cases:
    - id: entropia_limiting_case_interpretation
      when: 'true'
      status: info
      text:
        es: Si solo hay un microestado accesible, [[entropia]] toma su mínimo de conteo; si la multiplicidad crece, aumenta
          sin cambiar de signo.
        en: If only one microstate is accessible, [[entropia]] reaches its counting minimum; if multiplicity grows, it increases
          without changing sign.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  desbalance_probabilidad:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: diagnóstico de ruptura de equiprobabilidad
      en: diagnostic of equiprobability breakdown
    summary_rules:
    - id: desbalance_probabilidad_summary_interpretation
      when: 'true'
      status: ok
      text:
        es: '[[desbalance_probabilidad]] indica cuánto se separa una distribución real de la equiprobabilidad microcanónica
          esperada.'
        en: '[[desbalance_probabilidad]] indicates how far a real distribution departs from expected microcanonical equiprobability.'
    physical_reading_rules:
    - id: desbalance_probabilidad_physical_reading_microcanonical
      when: 'true'
      status: info
      text:
        es: Un [[desbalance_probabilidad]] cercano a cero apoya la hipótesis fundamental; un valor grande señala sesgos, restricciones
          ocultas o mala selección del ensemble.
        en: A [[desbalance_probabilidad]] near zero supports the fundamental hypothesis; a large value signals biases, hidden
          constraints, or poor ensemble selection.
    coherence_rules:
    - id: desbalance_probabilidad_coherence_units_normalization
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[desbalance_probabilidad]] compare probabilidades normalizadas y no mezcle microestados accesibles
          con inaccesibles.
        en: Check that [[desbalance_probabilidad]] compares normalized probabilities and does not mix accessible with inaccessible
          microstates.
    model_validity_rules:
    - id: desbalance_probabilidad_model_validity_microcanonical
      when: 'true'
      status: info
      text:
        es: Este diagnóstico es útil cuando existe una distribución medida o simulada comparable con la distribución equiprobable
          ideal.
        en: This diagnostic is useful when a measured or simulated distribution exists and can be compared with the ideal
          equiprobable distribution.
    graph_rules:
    - id: desbalance_probabilidad_graph_reading_coord
      when: 'true'
      status: info
      text:
        es: En la gráfica, barras o puntos separados de la línea uniforme revelan [[desbalance_probabilidad]] y muestran qué
          microestados rompen la hipótesis.
        en: In the graph, bars or points away from the uniform line reveal [[desbalance_probabilidad]] and show which microstates
          break the hypothesis.
    likely_errors:
    - id: desbalance_probabilidad_likely_error_conceptual
      when: 'true'
      status: warning
      text:
        es: No interpretes un [[desbalance_probabilidad]] grande como error matemático automático; puede indicar que el sistema
          no es microcanónico.
        en: Do not interpret a large [[desbalance_probabilidad]] as an automatic mathematical error; it may indicate that
          the system is not microcanonical.
    next_step_rules:
    - id: desbalance_probabilidad_next_step_use_result
      when: 'true'
      status: info
      text:
        es: Si [[desbalance_probabilidad]] es alto, revisa aislamiento, restricciones, conteo de estados y posible uso de
          un ensemble canónico.
        en: If [[desbalance_probabilidad]] is high, review isolation, constraints, state counting, and possible use of a canonical
          ensemble.
    physical_intuition:
    - id: desbalance_probabilidad_physical_intuition_counting
      when: 'true'
      status: info
      text:
        es: 'El desbalance funciona como una alarma: muestra cuándo unas papeletas estadísticas pesan más que otras sin justificación
          microcanónica.'
        en: 'The imbalance acts as an alarm: it shows when some statistical tickets weigh more than others without microcanonical
          justification.'
    limiting_cases:
    - id: desbalance_probabilidad_limiting_case_interpretation
      when: 'true'
      status: info
      text:
        es: El caso límite ideal es [[desbalance_probabilidad]] nulo; valores persistentes mayores que cero exigen revisar
          la hipótesis física.
        en: The ideal limiting case is zero [[desbalance_probabilidad]]; persistent values above zero require reviewing the
          physical hypothesis.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
