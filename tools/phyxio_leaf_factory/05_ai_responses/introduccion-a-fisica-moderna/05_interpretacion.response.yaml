global_context:
  enabled: true
  physical_domain:
    es: física moderna introductoria
    en: introductory modern physics
  axis_convention:
    es: En este leaf la interpretación visual SVG prioriza niveles, paquetes y escalas,
      no ejes vectoriales.
    en: In this leaf the SVG visual interpretation prioritizes levels, packets, and
      scales rather than vector axes.
  standard_assumptions:
  - es: La energía intercambiada puede describirse mediante cuantos cuando la escala
      de Planck no es despreciable.
    en: Exchanged energy can be described through quanta when the Planck-scale contribution
      is not negligible.
  - es: El límite clásico aparece cuando la separación entre niveles es pequeña frente
      a la escala macroscópica.
    en: The classical limit appears when level spacing is small compared with the
      macroscopic scale.
  standard_warnings:
  - es: No mezcles una lectura ondulatoria clásica con una lectura de fotones sin
      revisar [[frecuencia]] y [[energia_cuantizada]].
    en: Do not mix a classical wave reading with a photon reading without checking
      [[frecuencia]] and [[energia_cuantizada]].
  - es: Revisa si el fenómeno requiere niveles discretos antes de usar una intuición
      continua.
    en: Check whether the phenomenon requires discrete levels before using continuous
      intuition.
graph_binding:
  enabled: true
  type: Svg
  channels:
  - Svg
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: La interpretación debe respetar dimensiones de energía, frecuencia, longitud
        de onda y cociente adimensional.
      en: The interpretation must respect the dimensions of energy, frequency, wavelength,
        and dimensionless ratio.
  - id: quantum_classical_scale_check
    status: ok
    text:
      es: La lectura debe contrastar [[energia_cuantizada]] con [[escala_energia_clasica]]
        antes de decidir si el efecto moderno es visible.
      en: The reading must contrast [[energia_cuantizada]] with [[escala_energia_clasica]]
        before deciding whether the modern effect is visible.
error_patterns:
  enabled: true
  patterns:
  - id: continuous_energy_assumption
    status: warning
    text:
      es: Un error frecuente es asumir energía continua cuando [[numero_cuantico]]
        o [[energia_nivel]] exigen niveles discretos.
      en: A common error is assuming continuous energy when [[numero_cuantico]] or
        [[energia_nivel]] requires discrete levels.
  - id: wavelength_frequency_inverse_confusion
    status: warning
    text:
      es: Confundir la relación entre [[frecuencia]] y [[longitud_onda]] invierte
        la lectura energética del fotón.
      en: Confusing the relation between [[frecuencia]] and [[longitud_onda]] reverses
        the energy reading of the photon.
graph_reading_policy:
  enabled: true
  primary_variable: energia_cuantizada
  reading_sequence:
  - es: Identifica en la escena SVG si se muestra onda, fotón, niveles discretos o
      transición hacia el límite clásico.
    en: Identify in the SVG scene whether it shows wave, photon, discrete levels,
      or transition toward the classical limit.
  - es: Conecta cada elemento visual con [[energia_cuantizada]], [[frecuencia]], [[longitud_onda]]
      y [[cociente_cuantico_clasico]].
    en: Connect each visual element with [[energia_cuantizada]], [[frecuencia]], [[longitud_onda]],
      and [[cociente_cuantico_clasico]].
  key_points:
  - es: Una mayor [[frecuencia]] implica mayor [[energia_cuantizada]] en la lectura
      de fotones.
    en: A higher [[frecuencia]] implies higher [[energia_cuantizada]] in the photon
      reading.
  - es: Si [[cociente_cuantico_clasico]] es pequeño, la escena debe leerse como aproximación
      clásica efectiva.
    en: If [[cociente_cuantico_clasico]] is small, the scene should be read as an
      effective classical approximation.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[energia_cuantizada]] con escalas electrón-voltio o julios macroscópicos
      según el contexto.
    en: Compare [[energia_cuantizada]] with electron-volt scales or macroscopic joules
      depending on context.
  - es: Compara [[longitud_onda]] con tamaños atómicos, moleculares o visibles para
      decidir qué modelo resulta natural.
    en: Compare [[longitud_onda]] with atomic, molecular, or visible sizes to decide
      which model is natural.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Comprueba que [[energia_cuantizada]], [[energia_nivel]], [[separacion_energia]]
      y [[escala_energia_clasica]] estén en J, [[frecuencia]] en Hz y [[longitud_onda]]
      en m.
    en: Check that [[energia_cuantizada]], [[energia_nivel]], [[separacion_energia]],
      and [[escala_energia_clasica]] are in J, [[frecuencia]] in Hz, and [[longitud_onda]]
      in m.
  common_unit_mistakes:
  - es: Usar eV y J en la misma operación sin conversión.
    en: Using eV and J in the same operation without conversion.
  - es: Tratar Hz como una unidad de energía en lugar de frecuencia.
    en: Treating Hz as an energy unit instead of a frequency unit.
