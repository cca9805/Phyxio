targets:
  energia_cuantizada:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: calculable
      en: Quantized energy
    summary_rules:
    - id: energia_cuantizada_summary_modern_physics_bridge
      when: 'true'
      status: ok
      text:
        es: '[[energia_cuantizada]] se interpreta como parte del puente entre física
          clásica y física moderna: la energía intercambiada en paquetes discretos.'
        en: '[[energia_cuantizada]] is interpreted as part of the bridge between classical
          and modern physics: energy exchanged in discrete packets.'
    physical_reading_rules:
    - id: energia_cuantizada_physical_reading_quantum_scale
      when: 'true'
      status: info
      text:
        es: 'Lee [[energia_cuantizada]] con su unidad y escala: en física moderna
          importa si el valor revela discontinuidad, fotones o niveles discretos.'
        en: 'Read [[energia_cuantizada]] with its unit and scale: in modern physics
          it matters whether the value reveals discontinuity, photons, or discrete
          levels.'
    coherence_rules:
    - id: energia_cuantizada_coherence_formula_family
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_cuantizada]] sea coherente con [[energia_cuantizada]],
          [[frecuencia]], [[longitud_onda]] y [[cociente_cuantico_clasico]].
        en: Check that [[energia_cuantizada]] is coherent with [[energia_cuantizada]],
          [[frecuencia]], [[longitud_onda]], and [[cociente_cuantico_clasico]].
    model_validity_rules:
    - id: energia_cuantizada_model_validity_domain
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_cuantizada]] dentro del régimen donde la cuantización,
          la radiación o los niveles de energía son relevantes frente a la aproximación
          clásica.
        en: Interpret [[energia_cuantizada]] within the regime where quantization,
          radiation, or energy levels are relevant compared with the classical approximation.
    graph_rules:
    - id: energia_cuantizada_svg_visual_reading
      when: 'true'
      status: info
      text:
        es: 'En la escena SVG, relaciona [[energia_cuantizada]] con los elementos
          visuales: paquetes de energía, onda asociada, niveles discretos y transición
          hacia el límite clásico.'
        en: 'In the SVG scene, relate [[energia_cuantizada]] to the visual elements:
          energy packets, associated wave, discrete levels, and transition toward
          the classical limit.'
    likely_errors:
    - id: energia_cuantizada_likely_error_classical_continuity
      when: 'true'
      status: warning
      text:
        es: 'No interpretes [[energia_cuantizada]] con intuición puramente continua:
          revisa si el resultado exige cuantos, niveles discretos o comparación con
          una escala clásica.'
        en: 'Do not interpret [[energia_cuantizada]] with purely continuous intuition:
          check whether the result requires quanta, discrete levels, or comparison
          with a classical scale.'
    next_step_rules:
    - id: energia_cuantizada_next_step_compare_scale
      when: 'true'
      status: info
      text:
        es: Después de obtener [[energia_cuantizada]], compara su orden de magnitud
          con [[escala_energia_clasica]] y decide si el modelo clásico sigue siendo
          una buena aproximación.
        en: After obtaining [[energia_cuantizada]], compare its order of magnitude
          with [[escala_energia_clasica]] and decide whether the classical model remains
          a good approximation.
    physical_intuition:
    - id: energia_cuantizada_intuition_discrete_vs_continuous
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia_cuantizada]] ayuda a decidir si el fenómeno
          se lee como continuo clásico o como proceso gobernado por unidades discretas.
        en: Intuitively, [[energia_cuantizada]] helps decide whether the phenomenon
          is read as classical continuous behavior or as a process governed by discrete
          units.
    limiting_cases:
    - id: energia_cuantizada_limiting_case_classical_limit
      when: 'true'
      status: info
      text:
        es: Analiza el límite de [[energia_cuantizada]] cuando [[cociente_cuantico_clasico]]
          es muy pequeño o cuando [[separacion_energia]] se vuelve comparable a la
          escala disponible.
        en: Analyze the limit of [[energia_cuantizada]] when [[cociente_cuantico_clasico]]
          is very small or when [[separacion_energia]] becomes comparable to the available
          scale.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de una energía depende del cero de referencia; las separaciones
          de energía se interpretan como diferencias físicas.
        en: The sign of an energy depends on the reference zero; energy separations
          are interpreted as physical differences.
      common_sign_errors:
      - es: Confundir una energía negativa relativa con energía físicamente imposible.
        en: Confusing a negative relative energy with physically impossible energy.
      - es: Olvidar que una transición depende de la separación energética, no solo
          del valor absoluto de cada nivel.
        en: Forgetting that a transition depends on the energy gap, not only on the
          absolute value of each level.
