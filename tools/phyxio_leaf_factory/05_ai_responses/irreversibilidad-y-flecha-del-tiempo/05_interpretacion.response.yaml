  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinamica-estadistica
    en: statistical thermodynamics
  axis_convention:
    es: En este leaf la lectura Coord prioriza tiempo, tendencia entrópica y dirección
      macroscópica.
    en: In this leaf the Coord reading prioritizes time, entropy trend, and macroscopic
      direction.
  standard_assumptions:
  - es: El sistema y el entorno están definidos antes de aplicar la segunda ley.
    en: The system and surroundings are defined before applying the second law.
  - es: La flecha del tiempo se interpreta mediante entropía total, no por cambios
      locales aislados.
    en: The arrow of time is interpreted through total entropy, not isolated local
      changes.
  standard_warnings:
  - es: No confundas irreversibilidad con desorden visual ni con pérdida de información
      cotidiana.
    en: Do not confuse irreversibility with visual disorder or everyday information
      loss.
  - es: Una disminución de entropía del sistema puede ser compatible si el entorno
      compensa el balance.
    en: A system entropy decrease can be compatible if the surroundings compensate
      the balance.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: La interpretación debe respetar unidades de J/K para cambios de entropía
        y adimensionalidad para probabilidades.
      en: The interpretation must respect J/K units for entropy changes and dimensionlessness
        for probabilities.
  - id: entropy_total_check
    status: ok
    text:
      es: El criterio de flecha temporal se decide con [[variacion_entropia_universo]],
        no solo con el sistema.
      en: The time-arrow criterion is decided with [[variacion_entropia_universo]],
        not only with the system.
error_patterns:
  enabled: true
  patterns:
  - id: local_entropy_global_error
    status: warning
    text:
      es: Un error frecuente es tomar [[variacion_entropia_sistema]] como criterio
        global sin sumar [[variacion_entropia_entorno]].
      en: A common error is taking [[variacion_entropia_sistema]] as a global criterion
        without adding [[variacion_entropia_entorno]].
  - id: disorder_visual_confusion
    status: warning
    text:
      es: Entropía no significa simplemente desorden visual; depende de microestados
        y probabilidad.
      en: Entropy does not simply mean visual disorder; it depends on microstates
        and probability.
graph_reading_policy:
  enabled: true
  primary_variable: variacion_entropia_universo
  reading_sequence:
  - es: Identifica [[tiempo]] en el eje horizontal y [[variacion_entropia_universo]]
      en el eje vertical.
    en: Identify [[tiempo]] on the horizontal axis and [[variacion_entropia_universo]]
      on the vertical axis.
  - es: Lee si la curva es creciente, plana o físicamente incoherente con la flecha
      del tiempo.
    en: Read whether the curve is increasing, flat, or physically inconsistent with
      the arrow of time.
  key_points:
  - es: Pendiente positiva indica [[entropia_producida]] y proceso irreversible.
    en: Positive slope indicates [[entropia_producida]] and an irreversible process.
  - es: Pendiente nula indica equilibrio o límite reversible ideal.
    en: Zero slope indicates equilibrium or an ideal reversible limit.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara valores de entropía con escalas J/K macroscópicas y con múltiplos
      de [[constante_boltzmann]] en sistemas microscópicos.
    en: Compare entropy values with macroscopic J/K scales and multiples of [[constante_boltzmann]]
      in microscopic systems.
  - es: Usa [[numero_microestados]] para conectar macroestados más probables con mayor
      [[entropia]].
    en: Use [[numero_microestados]] to connect more probable macrostates with larger
      [[entropia]].
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[variacion_entropia_universo]], [[entropia_producida]] y [[entropia]] deben
      expresarse en J/K; [[grado_irreversibilidad]] y [[probabilidad_macroestado]]
      son adimensionales.'
    en: '[[variacion_entropia_universo]], [[entropia_producida]], and [[entropia]]
      must be expressed in J/K; [[grado_irreversibilidad]] and [[probabilidad_macroestado]]
      are dimensionless.'
  common_unit_mistakes:
  - es: Sumar cambios de entropía en unidades incompatibles.
    en: Adding entropy changes in incompatible units.
  - es: Asignar unidades de energía a una probabilidad o a un grado adimensional.
    en: Assigning energy units to a probability or dimensionless degree.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: true
  processes:
  - id: reversible_limit
    label:
      es: Límite reversible
      en: Reversible limit
    condition: entropia_producida == 0
    reading:
      es: No hay producción neta de entropía; la flecha temporal no queda marcada
        por disipación.
      en: There is no net entropy production; the time arrow is not marked by dissipation.
  - id: irreversible_process
    label:
      es: Proceso irreversible
      en: Irreversible process
    condition: entropia_producida > 0
    reading:
      es: La producción de entropía marca una dirección física preferente.
      en: Entropy production marks a preferred physical direction.
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
