targets:
  variacion_entropia_universo:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: calculable
      en: Entropy change of the universe
    summary_rules:
    - id: variacion_entropia_universo_summary_entropy_arrow
      when: 'true'
      status: ok
      text:
        es: '[[variacion_entropia_universo]] se interpreta en la conexión entre irreversibilidad
          y flecha del tiempo: la suma de sistema y entorno que fija la dirección
          espontánea.'
        en: '[[variacion_entropia_universo]] is interpreted in the connection between
          irreversibility and the arrow of time: the system-plus-surroundings sum
          that fixes the spontaneous direction.'
    physical_reading_rules:
    - id: variacion_entropia_universo_physical_reading_sign_unit_boundary
      when: 'true'
      status: info
      text:
        es: Lee [[variacion_entropia_universo]] con unidad, signo y frontera del sistema;
          una disminución local no decide la flecha del tiempo sin el entorno.
        en: Read [[variacion_entropia_universo]] with unit, sign, and system boundary;
          a local decrease does not decide the arrow of time without the surroundings.
    coherence_rules:
    - id: variacion_entropia_universo_coherence_second_law
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[variacion_entropia_universo]] sea coherente con [[variacion_entropia_universo]],
          [[variacion_entropia_sistema]], [[variacion_entropia_entorno]] y [[entropia_producida]].
        en: Check that [[variacion_entropia_universo]] is coherent with [[variacion_entropia_universo]],
          [[variacion_entropia_sistema]], [[variacion_entropia_entorno]], and [[entropia_producida]].
    model_validity_rules:
    - id: variacion_entropia_universo_model_validity_thermodynamic_states
      when: 'true'
      status: info
      text:
        es: Interpreta [[variacion_entropia_universo]] solo si los estados macroscópicos,
          el sistema, el entorno y la escala temporal están bien definidos.
        en: Interpret [[variacion_entropia_universo]] only if macroscopic states,
          system, surroundings, and time scale are well defined.
    graph_rules:
    - id: variacion_entropia_universo_graph_coord_entropy_time
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[variacion_entropia_universo]] con la
          tendencia de [[variacion_entropia_universo]] frente a [[tiempo]] para leer
          la flecha temporal.
        en: In the Coord graph, relate [[variacion_entropia_universo]] to the trend
          of [[variacion_entropia_universo]] versus [[tiempo]] to read the time arrow.
    likely_errors:
    - id: variacion_entropia_universo_likely_error_visual_disorder
      when: 'true'
      status: warning
      text:
        es: No confundas [[variacion_entropia_universo]] con desorden visual simple
          ni ignores el entorno al aplicar la segunda ley.
        en: Do not confuse [[variacion_entropia_universo]] with simple visual disorder
          or ignore the surroundings when applying the second law.
    next_step_rules:
    - id: variacion_entropia_universo_next_step_check_reversibility
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[variacion_entropia_universo]], decide si el proceso
          es reversible ideal, irreversible real o incoherente con la segunda ley.
        en: After interpreting [[variacion_entropia_universo]], decide whether the
          process is ideally reversible, realistically irreversible, or inconsistent
          with the second law.
    physical_intuition:
    - id: variacion_entropia_universo_intuition_probability_arrow
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[variacion_entropia_universo]] conecta la evolución observada
          con la tendencia hacia macroestados estadísticamente más probables.
        en: Intuitively, [[variacion_entropia_universo]] connects observed evolution
          with the tendency toward statistically more probable macrostates.
    limiting_cases:
    - id: variacion_entropia_universo_limiting_case_reversible_equilibrium
      when: 'true'
      status: info
      text:
        es: Revisa [[variacion_entropia_universo]] en el límite reversible, en equilibrio
          y en procesos con gran [[entropia_producida]].
        en: Check [[variacion_entropia_universo]] in the reversible limit, at equilibrium,
          and in processes with large [[entropia_producida]].
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo entrópico depende de la frontera elegida; la segunda ley se aplica
          al total sistema más entorno.
        en: The entropy sign depends on the chosen boundary; the second law applies
          to the system-plus-surroundings total.
      common_sign_errors:
      - es: Leer una disminución de entropía del sistema como violación de la segunda
          ley sin sumar el entorno.
        en: Reading a system entropy decrease as a violation of the second law without
          adding the surroundings.
      - es: Tratar la entropía producida como negativa en un proceso irreversible
          real.
        en: Treating generated entropy as negative in a real irreversible process.
