      text:
        es: '[[grado_irreversibilidad]] se interpreta en la conexión entre irreversibilidad
          y flecha del tiempo: el indicador de alejamiento del límite reversible.'
        en: '[[grado_irreversibilidad]] is interpreted in the connection between irreversibility
          and the arrow of time: the indicator of departure from the reversible limit.'
    physical_reading_rules:
    - id: grado_irreversibilidad_physical_reading_sign_unit_boundary
      when: 'true'
      status: info
      text:
        es: Lee [[grado_irreversibilidad]] con unidad, signo y frontera del sistema;
          una disminución local no decide la flecha del tiempo sin el entorno.
        en: Read [[grado_irreversibilidad]] with unit, sign, and system boundary;
          a local decrease does not decide the arrow of time without the surroundings.
    coherence_rules:
    - id: grado_irreversibilidad_coherence_second_law
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[grado_irreversibilidad]] sea coherente con [[variacion_entropia_universo]],
          [[variacion_entropia_sistema]], [[variacion_entropia_entorno]] y [[entropia_producida]].
        en: Check that [[grado_irreversibilidad]] is coherent with [[variacion_entropia_universo]],
          [[variacion_entropia_sistema]], [[variacion_entropia_entorno]], and [[entropia_producida]].
    model_validity_rules:
    - id: grado_irreversibilidad_model_validity_thermodynamic_states
      when: 'true'
      status: info
      text:
        es: Interpreta [[grado_irreversibilidad]] solo si los estados macroscópicos,
          el sistema, el entorno y la escala temporal están bien definidos.
        en: Interpret [[grado_irreversibilidad]] only if macroscopic states, system,
          surroundings, and time scale are well defined.
    graph_rules:
    - id: grado_irreversibilidad_graph_coord_entropy_time
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, relaciona [[grado_irreversibilidad]] con la tendencia
          de [[variacion_entropia_universo]] frente a [[tiempo]] para leer la flecha
          temporal.
        en: In the Coord graph, relate [[grado_irreversibilidad]] to the trend of
          [[variacion_entropia_universo]] versus [[tiempo]] to read the time arrow.
    likely_errors:
    - id: grado_irreversibilidad_likely_error_visual_disorder
      when: 'true'
      status: warning
      text:
        es: No confundas [[grado_irreversibilidad]] con desorden visual simple ni
          ignores el entorno al aplicar la segunda ley.
        en: Do not confuse [[grado_irreversibilidad]] with simple visual disorder
          or ignore the surroundings when applying the second law.
    next_step_rules:
    - id: grado_irreversibilidad_next_step_check_reversibility
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[grado_irreversibilidad]], decide si el proceso
          es reversible ideal, irreversible real o incoherente con la segunda ley.
        en: After interpreting [[grado_irreversibilidad]], decide whether the process
          is ideally reversible, realistically irreversible, or inconsistent with
          the second law.
    physical_intuition:
    - id: grado_irreversibilidad_intuition_probability_arrow
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[grado_irreversibilidad]] conecta la evolución observada
          con la tendencia hacia macroestados estadísticamente más probables.
        en: Intuitively, [[grado_irreversibilidad]] connects observed evolution with
          the tendency toward statistically more probable macrostates.
    limiting_cases:
    - id: grado_irreversibilidad_limiting_case_reversible_equilibrium
      when: 'true'
      status: info
      text:
        es: Revisa [[grado_irreversibilidad]] en el límite reversible, en equilibrio
          y en procesos con gran [[entropia_producida]].
        en: Check [[grado_irreversibilidad]] in the reversible limit, at equilibrium,
          and in processes with large [[entropia_producida]].
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo entrópico depende de la frontera elegida; la segunda ley se aplica
          al total sistema más entorno.
        en: The entropy sign depends on the chosen boundary; the second law applies
          to the system-plus-surroundings total.
      common_sign_errors: []
