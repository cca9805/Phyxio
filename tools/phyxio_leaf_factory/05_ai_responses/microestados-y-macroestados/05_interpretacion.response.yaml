  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
    - "conteo_microestados_macroestado"
    - "probabilidad_macroestado_multiplicidad"
    - "entropia_boltzmann_macroestado"
    - "normalizacion_macroestados"
    - "razon_probabilidades_macroestados"
