global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística de sólidos
    en: statistical thermodynamics of solids
  axis_convention:
    es: Las magnitudes principales son escalares positivas; el signo no representa dirección mecánica.
    en: The main quantities are positive scalars; the sign does not represent a mechanical direction.
  standard_assumptions:
  - es: El sólido se aproxima como una red cristalina armónica con modos acústicos cuantizados.
    en: The solid is approximated as a harmonic crystalline lattice with quantized acoustic modes.
  - es: El continuo de Debye sustituye el espectro real por una densidad de estados idealizada hasta una frecuencia
      de corte.
    en: The Debye continuum replaces the real spectrum with an idealized density of states up to a cutoff frequency.
  standard_warnings:
  - es: Antes de interpretar, decide si T es mucho menor, comparable o mucho mayor que la temperatura de Debye.
    en: Before interpreting, decide whether T is far below, comparable to, or far above the Debye temperature.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: El calor específico debe acabar en J/K, J/(mol·K) o una forma normalizada adimensional declarada.
      en: Heat capacity must end in J/K, J/(mol·K), or a declared dimensionless normalized form.
  - id: regime_check
    status: warning
    text:
      es: Usar la ley T³ fuera de baja temperatura o el límite Dulong-Petit fuera de alta temperatura produce interpretaciones
        falsas.
      en: Using the T³ law outside low temperature or the Dulong-Petit limit outside high temperature gives false
        interpretations.
error_patterns:
  enabled: true
  patterns:
  - id: debye_temperature_vs_temperature
    status: warning
    text:
      es: Confundir [[temperatura_debye]] con [[temperatura]] borra la lectura de régimen del modelo.
      en: Confusing [[temperatura_debye]] with [[temperatura]] erases the regime reading of the model.
  - id: molar_total_normalized_mix
    status: warning
    text:
      es: Mezclar [[calor_especifico]], [[calor_especifico_molar]] y curvas normalizadas cambia el significado numérico.
      en: Mixing [[calor_especifico]], [[calor_especifico_molar]], and normalized curves changes the numerical meaning.
graph_reading_policy:
  enabled: true
  primary_variable: calor_especifico
  reading_sequence:
  - es: Lee primero [[temperatura]] frente a [[temperatura_debye]] para identificar el régimen térmico.
    en: First read [[temperatura]] relative to [[temperatura_debye]] to identify the thermal regime.
  - es: Observa si la curva de [[calor_especifico]] crece como T³, transiciona o se aproxima al límite Dulong-Petit.
    en: Observe whether the [[calor_especifico]] curve grows as T³, crosses over, or approaches the Dulong-Petit
      limit.
  key_points:
  - es: La curvatura positiva a baja temperatura revela que solo una parte pequeña del espectro de fonones está
      activa.
    en: The positive curvature at low temperature reveals that only a small part of the phonon spectrum is active.
  - es: La meseta de alta temperatura indica recuperación del comportamiento clásico por equipartición.
    en: The high-temperature plateau indicates recovery of classical equipartition behavior.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara [[calor_especifico_molar]] con 3R en alta temperatura.
    en: Compare [[calor_especifico_molar]] with 3R at high temperature.
  - es: Compara [[temperatura]]/[[temperatura_debye]] para distinguir régimen cuántico, transición y régimen clásico.
    en: Compare [[temperatura]]/[[temperatura_debye]] to distinguish quantum, crossover, and classical regimes.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[temperatura_debye]] debe tener kelvin; [[frecuencia_debye]] debe tener s^-1; el calor específico molar
      debe escalar con [[constante_gases]].'
    en: '[[temperatura_debye]] must have kelvin; [[frecuencia_debye]] must have s^-1; molar heat capacity must scale
      with [[constante_gases]].'
  common_unit_mistakes:
  - es: Usar h en lugar de [[hbar]] sin convertir la frecuencia angular.
    en: Using h instead of [[hbar]] without converting angular frequency.
  - es: Comparar calor específico total con 3R, que es una magnitud molar.
    en: Comparing total heat capacity with 3R, which is a molar quantity.
