targets:
  calor_especifico:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado térmico
      en: heat capacity
    summary_rules:
    - id: calor_especifico_summary_debye
      when: 'true'
      status: ok
      text:
        es: '[[calor_especifico]] se interpreta como capacidad térmica total del sólido; debe leerse dentro del
          modelo de Debye y no como un dato aislado.'
        en: '[[calor_especifico]] is interpreted as total heat capacity of the solid; it must be read within the
          Debye model and not as an isolated number.'
    physical_reading_rules:
    - id: calor_especifico_physical_reading_debye
      when: 'true'
      status: info
      text:
        es: '[[calor_especifico]] mide cuánta energía térmica adicional admite el sólido por aumento de [[temperatura]];
          en Debye crece como T³ a baja temperatura y se aplana cerca del límite clásico.'
        en: '[[calor_especifico]] measures how much extra thermal energy the solid accepts per rise in [[temperatura]];
          in Debye it grows as T³ at low temperature and flattens near the classical limit.'
    coherence_rules:
    - id: calor_especifico_coherence_units_scale
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[calor_especifico]] usa unidades SI coherentes y que sus fórmulas respetan la escala
          marcada por [[temperatura_debye]].
        en: Check that [[calor_especifico]] uses consistent SI units and that its formulas respect the scale set
          by [[temperatura_debye]].
    model_validity_rules:
    - id: calor_especifico_model_validity_debye_assumptions
      when: 'true'
      status: info
      text:
        es: El uso de [[calor_especifico]] supone sólido cristalino, modos acústicos continuos y comportamiento
          armónico; defectos, electrones o anharmonicidad pueden dominar fuera de ese marco.
        en: Using [[calor_especifico]] assumes a crystalline solid, continuous acoustic modes, and harmonic behavior;
          defects, electrons, or anharmonicity can dominate outside that frame.
    graph_rules:
    - id: calor_especifico_graph_heat_capacity_curve
      when: graph_binding.enabled
      status: info
      text:
        es: En la gráfica, relaciona [[calor_especifico]] con el crecimiento de [[calor_especifico]] al aumentar
          [[temperatura]] y con la saturación hacia el límite clásico.
        en: On the graph, relate [[calor_especifico]] to the growth of [[calor_especifico]] as [[temperatura]] increases
          and to saturation toward the classical limit.
    likely_errors:
    - id: calor_especifico_likely_error_units_regime
      when: 'true'
      status: warning
      text:
        es: 'No extrapoles [[calor_especifico]] linealmente hasta [[temperatura]] cero: el modelo predice una caída
          rápida, no un valor constante residual.'
        en: 'Do not extrapolate [[calor_especifico]] linearly down to zero [[temperatura]]: the model predicts a
          rapid fall, not a residual constant value.'
    next_step_rules:
    - id: calor_especifico_next_step_choose_regime
      when: 'true'
      status: info
      text:
        es: Tras interpretar [[calor_especifico]], decide si el régimen es de baja temperatura, transición o límite
          Dulong-Petit antes de elegir la fórmula siguiente.
        en: After interpreting [[calor_especifico]], decide whether the regime is low temperature, crossover, or
          Dulong-Petit limit before choosing the next formula.
    physical_intuition:
    - id: calor_especifico_intuition_quantized_modes
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[calor_especifico]] indica cuánto pesa la cuantización de las vibraciones frente a
          la agitación térmica disponible.
        en: Intuitively, [[calor_especifico]] indicates how strongly vibration quantization weighs against the available
          thermal agitation.
    limiting_cases:
    - id: calor_especifico_limiting_low_high_temperature
      when: 'true'
      status: info
      text:
        es: 'Caso límite: si [[temperatura]] es mucho menor que [[temperatura_debye]], los modos activos son pocos;
          si es mucho mayor, casi todos contribuyen.'
        en: 'Limiting case: if [[temperatura]] is far below [[temperatura_debye]], few modes are active; if it is
          far above it, almost all contribute.'
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
