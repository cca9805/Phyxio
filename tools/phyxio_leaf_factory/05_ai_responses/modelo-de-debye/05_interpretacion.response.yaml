      es: modos vibratorios cuantizados
      en: quantized vibrational modes
    reading:
      es: El modelo trata las vibraciones colectivas como modos acústicos con corte de Debye.
      en: The model treats collective vibrations as acoustic modes with a Debye cutoff.
