global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística de sólidos
    en: statistical thermodynamics of solids
  axis_convention:
    es: Las magnitudes principales son escalares positivas; los ejes de la gráfica representan temperatura y capacidad calorífica
      normalizada.
    en: The main quantities are positive scalars; graph axes represent temperature and normalized heat capacity.
  standard_assumptions:
  - es: El sólido se aproxima por osciladores armónicos cuánticos independientes con una única frecuencia de Einstein.
    en: The solid is approximated by independent quantum harmonic oscillators with a single Einstein frequency.
  - es: La temperatura se expresa en kelvin y las capacidades caloríficas se interpretan a volumen constante.
    en: Temperature is expressed in kelvin and heat capacities are interpreted at constant volume.
  standard_warnings:
  - es: No uses grados Celsius en cocientes exponenciales ni confundas el límite clásico con una validez universal.
    en: Do not use Celsius in exponential ratios or confuse the classical limit with universal validity.
  - es: El modelo de Einstein no reproduce correctamente la ley T^3 de Debye a muy baja temperatura.
    en: The Einstein model does not correctly reproduce Debye's T^3 law at very low temperature.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Los cocientes θ_E/T y T/θ_E son adimensionales; C_Vm debe quedar en J mol^-1 K^-1 y U en J.
      en: The ratios θ_E/T and T/θ_E are dimensionless; C_Vm must end in J mol^-1 K^-1 and U in J.
  - id: positive_temperature_check
    status: warning
    text:
      es: Las expresiones exponenciales solo se evalúan con T>0 y θ_E>0.
      en: The exponential expressions are evaluated only with T>0 and θ_E>0.
  - id: high_temperature_limit_check
    status: ok
    text:
      es: Para T≫θ_E, C_Vm debe tender a 3R, no crecer sin límite.
      en: For T≫θ_E, C_Vm must approach 3R, not grow without bound.
  - id: low_temperature_limit_check
    status: info
    text:
      es: Para T≪θ_E, C_Vm cae casi exponencialmente hacia cero en el modelo de Einstein.
      en: For T≪θ_E, C_Vm falls almost exponentially toward zero in the Einstein model.
error_patterns:
  enabled: true
  patterns:
  - id: celsius_in_exponent
    status: warning
    text:
      es: Usar °C en θ_E/T cambia completamente el argumento exponencial.
      en: Using °C in θ_E/T completely changes the exponential argument.
  - id: confuse_theta_with_temperature
    status: warning
    text:
      es: θ_E no es la temperatura actual del sólido, sino una escala material asociada a la frecuencia vibracional.
      en: θ_E is not the current temperature of the solid, but a material scale associated with vibrational frequency.
  - id: classical_limit_everywhere
    status: warning
    text:
      es: Tomar C_Vm≈3R a cualquier temperatura borra la congelación cuántica del modelo.
      en: Taking C_Vm≈3R at every temperature erases the model's quantum freezing.
  - id: einstein_vs_debye_confusion
    status: info
    text:
      es: El modelo de Einstein captura la caída a baja temperatura, pero no la dependencia T^3 del modelo de Debye.
      en: The Einstein model captures the low-temperature drop, but not the T^3 dependence of the Debye model.
graph_reading_policy:
  enabled: true
  primary_variable: parametro_reducido
  reading_sequence:
  - es: Localiza T/θ_E en el eje horizontal y C_Vm/R en el eje vertical antes de interpretar el régimen térmico.
    en: Locate T/θ_E on the horizontal axis and C_Vm/R on the vertical axis before interpreting the thermal regime.
  - es: 'Distingue tres zonas: congelación cuántica, transición y meseta clásica de Dulong-Petit.'
    en: 'Distinguish three zones: quantum freezing, transition, and the classical Dulong-Petit plateau.'
  - es: Conecta la curvatura con la activación térmica de los osciladores vibracionales.
    en: Connect the curvature with thermal activation of vibrational oscillators.
  key_points:
  - es: Si T/θ_E es pequeño, un aumento de T puede seguir dando un C_Vm muy bajo.
    en: If T/θ_E is small, increasing T may still give a very low C_Vm.
  - es: Si T/θ_E es grande, la curva se aproxima a 3R y apenas cambia.
    en: If T/θ_E is large, the curve approaches 3R and changes only slightly.
comparative_context:
  enabled: true
  reference_values:
  - es: 3R≈24,9 J mol^-1 K^-1 es la referencia clásica de Dulong-Petit para sólidos monoatómicos.
    en: 3R≈24.9 J mol^-1 K^-1 is the classical Dulong-Petit reference for monatomic solids.
  - es: T≈θ_E marca una zona de transición, no una frontera brusca.
    en: T≈θ_E marks a transition region, not a sharp boundary.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: Comprueba que θ_E/T sea adimensional antes de calcular exponenciales y que las capacidades caloríficas conserven unidad
      por kelvin.
    en: Check that θ_E/T is dimensionless before computing exponentials and that heat capacities keep per-kelvin units.
  common_unit_mistakes:
  - es: Introducir T en °C en vez de K.
    en: Entering T in °C instead of K.
  - es: Confundir C_V total con C_Vm molar.
    en: Confusing total C_V with molar C_Vm.
  - es: Olvidar el factor R en la capacidad calorífica molar.
    en: Forgetting the factor R in molar heat capacity.
