  image_type_detection: []
targets:
  parametro_reducido:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable auxiliar adimensional
      en: dimensionless auxiliary variable
    summary_rules:
    - id: parametro_reducido_summary_regime
      when: 'true'
      status: ok
      text:
        es: '[[parametro_reducido]] mide cuántas temperaturas de Einstein caben en la temperatura térmica disponible.'
        en: '[[parametro_reducido]] measures how many Einstein-temperature scales fit into the available thermal temperature.'
    physical_reading_rules:
    - id: parametro_reducido_physical_reading_specific
      when: 'true'
      status: info
      text:
        es: Si [[parametro_reducido]] es grande, los modos vibracionales están congelados; si es pequeño, se recupera el régimen
          clásico.
        en: If [[parametro_reducido]] is large, vibrational modes are frozen; if it is small, the classical regime is recovered.
    coherence_rules:
    - id: parametro_reducido_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Debe ser positivo y adimensional porque procede del cociente [[temperatura_einstein]]/[[temperatura]].
        en: It must be positive and dimensionless because it comes from the ratio [[temperatura_einstein]]/[[temperatura]].
    model_validity_rules:
    - id: parametro_reducido_model_validity_einstein
      when: 'true'
      status: info
      text:
        es: Solo tiene sentido con temperaturas absolutas positivas y con una frecuencia de Einstein representativa del sólido.
        en: It is meaningful only for positive absolute temperatures and a representative Einstein frequency for the solid.
    graph_rules:
    - id: parametro_reducido_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: 'En la gráfica suele leerse de forma inversa a T/θ_E: valores grandes corresponden al extremo frío.'
        en: 'On the graph it is usually read inversely to T/θ_E: large values correspond to the cold end.'
    likely_errors:
    - id: parametro_reducido_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No lo trates como temperatura ni le asignes kelvin; es una razón adimensional.
        en: Do not treat it as a temperature or assign kelvin to it; it is a dimensionless ratio.
    next_step_rules:
    - id: parametro_reducido_next_step_interpret
      when: 'true'
      status: info
      text:
        es: Usa su tamaño para decidir si debes esperar C_Vm cercano a cero, en transición o cercano a 3R.
        en: Use its size to decide whether C_Vm should be near zero, transitional, or close to 3R.
    physical_intuition:
    - id: parametro_reducido_physical_intuition
      when: 'true'
      status: info
      text:
        es: 'Es el semáforo cuántico del modelo: grande bloquea excitaciones, pequeño las deja circular.'
        en: 'It is the model''s quantum traffic light: large blocks excitations, small lets them pass.'
    limiting_cases:
    - id: parametro_reducido_limiting_case
      when: 'true'
      status: info
      text:
        es: Cuando tiende a infinito, C_Vm tiende a cero; cuando tiende a cero, C_Vm tiende a 3R.
        en: As it tends to infinity, C_Vm tends to zero; as it tends to zero, C_Vm tends to 3R.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  theta_E:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: parámetro material
      en: material parameter
    summary_rules:
    - id: theta_E_summary_regime
      when: 'true'
      status: ok
      text:
        es: '[[theta_E]] representa la escala térmica asociada a la frecuencia vibracional característica.'
        en: '[[theta_E]] represents the thermal scale associated with the characteristic vibrational frequency.'
    physical_reading_rules:
    - id: theta_E_physical_reading_specific
      when: 'true'
      status: info
      text:
        es: Una [[theta_E]] alta retrasa la activación térmica y desplaza la curva hacia temperaturas mayores.
        en: A high [[theta_E]] delays thermal activation and shifts the curve toward higher temperatures.
    coherence_rules:
    - id: theta_E_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Debe ser positiva y compatible con ħω_E/k_B.
        en: It must be positive and consistent with ħω_E/k_B.
    model_validity_rules:
    - id: theta_E_model_validity_einstein
      when: 'true'
      status: info
      text:
        es: Supone una sola frecuencia efectiva; en sólidos reales hay un espectro de frecuencias.
        en: It assumes one effective frequency; real solids have a frequency spectrum.
    graph_rules:
    - id: theta_E_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: 'Controla la escala horizontal: T/θ_E compara temperatura del sólido y parámetro material.'
        en: 'It controls the horizontal scale: T/θ_E compares the solid temperature and the material parameter.'
    likely_errors:
    - id: theta_E_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No la confundas con la temperatura del experimento; es una propiedad del modelo para el material.
        en: Do not confuse it with the experimental temperature; it is a model property for the material.
    next_step_rules:
    - id: theta_E_next_step_interpret
      when: 'true'
      status: info
      text:
        es: Si conoces ω_E, verifica θ_E=ħω_E/k_B antes de usarla en C_Vm.
        en: If ω_E is known, verify θ_E=ħω_E/k_B before using it in C_Vm.
    physical_intuition:
    - id: theta_E_physical_intuition
      when: 'true'
      status: info
      text:
        es: Es la altura térmica que la energía disponible debe superar para excitar vibraciones.
        en: It is the thermal height that available energy must overcome to excite vibrations.
    limiting_cases:
    - id: theta_E_limiting_case
      when: 'true'
      status: info
      text:
        es: Si θ_E aumenta a T fija, el sólido queda más congelado y C_Vm disminuye.
        en: If θ_E increases at fixed T, the solid becomes more frozen and C_Vm decreases.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  T:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable independiente
      en: independent variable
    summary_rules:
    - id: T_summary_regime
      when: 'true'
      status: ok
      text:
        es: '[[T]] fija la energía térmica disponible para excitar los osciladores del sólido.'
        en: '[[T]] sets the thermal energy available to excite the solid''s oscillators.'
    physical_reading_rules:
    - id: T_physical_reading_specific
      when: 'true'
      status: info
      text:
        es: Temperaturas mayores activan más modos vibracionales y aumentan C_Vm hasta la meseta clásica.
        en: Higher temperatures activate more vibrational modes and increase C_Vm up to the classical plateau.
    coherence_rules:
    - id: T_coherence_units_sign
      when: 'true'
      status: ok
      text:
        es: Debe introducirse en kelvin y ser estrictamente positiva para que θ_E/T sea válido.
        en: It must be entered in kelvin and be strictly positive for θ_E/T to be valid.
    model_validity_rules:
    - id: T_model_validity_einstein
      when: 'true'
      status: info
      text:
        es: El modelo describe equilibrio térmico; no interpreta cambios bruscos fuera de equilibrio.
        en: The model describes thermal equilibrium; it does not interpret abrupt nonequilibrium changes.
    graph_rules:
    - id: T_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: Es el eje horizontal natural, normalmente normalizado como T/θ_E.
        en: It is the natural horizontal axis, usually normalized as T/θ_E.
    likely_errors:
    - id: T_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: 'No uses grados Celsius: el cero Celsius no es cero térmico y deforma el exponencial.'
        en: 'Do not use Celsius: Celsius zero is not thermal zero and distorts the exponential.'
    next_step_rules:
    - id: T_next_step_interpret
      when: 'true'
      status: info
      text:
        es: Compárala con θ_E para clasificar el régimen de baja, media o alta temperatura.
        en: Compare it with θ_E to classify the low-, intermediate-, or high-temperature regime.
    physical_intuition:
    - id: T_physical_intuition
      when: 'true'
      status: info
      text:
        es: T es la reserva térmica que intenta poner a vibrar los osciladores.
        en: T is the thermal reservoir trying to set the oscillators vibrating.
    limiting_cases:
    - id: T_limiting_case
      when: 'true'
      status: info
      text:
        es: Al acercarse a cero, la capacidad calorífica tiende a anularse; a temperaturas muy altas aparece Dulong-Petit.
        en: As it approaches zero, heat capacity tends to vanish; at very high temperatures Dulong-Petit appears.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
