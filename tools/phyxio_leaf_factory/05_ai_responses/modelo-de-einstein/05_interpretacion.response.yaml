      when: 'true'
      status: info
      text:
        es: Introduce la cuantización de los osciladores armónicos del modelo.
        en: It introduces quantization of the model's harmonic oscillators.
    graph_rules:
    - id: constante_planck_reducida_graph_coord_reading
      when: 'true'
      status: info
      text:
        es: No se lee directamente en la curva, pero cambia la escala θ_E.
        en: It is not read directly on the curve, but changes the θ_E scale.
    likely_errors:
    - id: constante_planck_reducida_likely_error_specific
      when: 'true'
      status: warning
      text:
        es: No la reemplaces por h sin corregir el factor 2π.
        en: Do not replace it with h without correcting the factor 2π.
    next_step_rules:
    - id: constante_planck_reducida_next_step_interpret
      when: 'true'
      status: info
      text:
        es: Comprueba si la frecuencia dada es angular antes de calcular ħω_E.
        en: Check whether the given frequency is angular before computing ħω_E.
    physical_intuition:
    - id: constante_planck_reducida_physical_intuition
      when: 'true'
      status: info
      text:
        es: Es la firma de que las vibraciones se excitan en paquetes discretos.
        en: It is the signature that vibrations are excited in discrete packets.
    limiting_cases:
    - id: constante_planck_reducida_limiting_case
      when: 'true'
      status: info
      text:
        es: Como constante fija, no se varía; el límite clásico aparece cuando k_BT domina frente a ħω_E.
        en: As a fixed constant, it is not varied; the classical limit appears when k_BT dominates over ħω_E.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
