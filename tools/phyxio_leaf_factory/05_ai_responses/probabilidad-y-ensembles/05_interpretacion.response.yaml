version: 5.0.0
id: probabilidad-y-ensembles
leaf_id: probabilidad-y-ensembles
nombre:
  es: Probabilidad y ensembles
  en: Probability and Ensembles
scope:
  area: fisica-clasica
  bloque: termodinamica-estadistica
  subbloque: fundamentos
  parent_id: fundamentos
  ruta_relativa: fisica-clasica/termodinamica-estadistica/fundamentos/probabilidad-y-ensembles
  orden: 271300
output_contract:
  sections: &id001
  - summary
  - physical_reading
  - coherence
  - model_validity
  - graph_reading
  - likely_errors
  - next_step
  inline_mode:
    max_sections: 2
    priority:
    - summary
    - likely_errors
  extended_mode:
    show_all: true
result_blocks:
  summary:
    enabled: true
    order: 1
    title:
      es: Resumen
      en: Summary
  physical_reading:
    enabled: true
    order: 2
    title:
      es: Lectura física
      en: Physical reading
  coherence:
    enabled: true
    order: 3
    title:
      es: Coherencia
      en: Coherence
  model_validity:
    enabled: true
    order: 4
    title:
      es: Validez del modelo
      en: Model validity
  graph_reading:
    enabled: true
    order: 5
    title:
      es: Lectura gráfica
      en: Graph reading
  likely_errors:
    enabled: true
    order: 6
    title:
      es: Errores probables
      en: Likely errors
  next_step:
    enabled: true
    order: 7
    title:
      es: Siguiente paso
      en: Next step
ui:
  enabled: true
  display_modes:
    calculator_inline: true
    graph_inline: true
    dedicated_tab: true
    modal: false
  labels:
    es: Interpretación física
    en: Physical interpretation
  priority_order: *id001
  inline_limits:
    max_sections: 3
    priority:
    - summary
    - likely_errors
    - next_step
mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - normalizacion_ensemble
  - promedio_ensemble
  - probabilidad_frecuencia_ensemble
  - varianza_ensemble
  - peso_ensemble_normalizado
  magnitudes:
  - probabilidad_estado
  - numero_copias_ensemble
  - conteo_sistemas
  - valor_estado
  - valor_medio_ensemble
  - fluctuacion_ensemble
  - peso_estadistico
  - ensemble
  - restriccion_macroscopica
  - estado_microscopico
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinamica-estadistica
    en: statistical thermodynamics
  axis_convention:
    es: En este leaf los signos no describen dirección espacial, sino desviaciones respecto a un promedio o referencia estadística.
    en: In this leaf signs do not describe spatial direction, but deviations from an average or statistical reference.
  standard_assumptions:
  - es: El ensemble representa muchas copias conceptuales preparadas con la misma restricción macroscópica.
    en: The ensemble represents many conceptual copies prepared with the same macroscopic constraint.
  - es: Las probabilidades se interpretan como pesos estadísticos normalizados, no como certezas sobre una copia individual.
    en: Probabilities are interpreted as normalized statistical weights, not as certainties about a single copy.
  standard_warnings:
  - es: No mezcles conteos absolutos, probabilidades y pesos sin revisar la normalización.
    en: Do not mix absolute counts, probabilities, and weights without checking normalization.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: probability_normalization_check
    when: 'true'
    status: ok
    text:
      es: La suma de las probabilidades de estados excluyentes del ensemble debe ser 1.
      en: The sum of probabilities over exclusive ensemble states must be 1.
  - id: average_range_check
    when: 'true'
    status: ok
    text:
      es: El valor medio de ensemble debe quedar dentro del intervalo físico cubierto por los valores de estado.
      en: The ensemble mean must lie within the physical interval covered by the state values.
  - id: count_probability_consistency
    when: 'true'
    status: ok
    text:
      es: Los conteos deben ser compatibles con el número total de copias del ensemble.
      en: Counts must be consistent with the total number of ensemble copies.
error_patterns:
  enabled: true
  patterns:
  - id: probability_count_confusion
    when: 'true'
    status: warning
    text:
      es: Confundir probabilidad con conteo absoluto cambia la lectura física cuando cambia el tamaño del ensemble.
      en: Confusing probability with absolute count changes the physical reading when ensemble size changes.
  - id: mean_without_weights
    when: 'true'
    status: warning
    text:
      es: Promediar estados sin ponderarlos ignora la preparación estadística del ensemble.
      en: Averaging states without weights ignores the statistical preparation of the ensemble.
  - id: single_system_certainty
    when: 'true'
    status: warning
    text:
      es: Una probabilidad de ensemble no predice con certeza qué hará una única copia.
      en: An ensemble probability does not predict with certainty what one single copy will do.
graph_reading_policy:
  enabled: true
  primary_variable: probabilidad_estado
  reading_sequence:
  - es: Identifica si el eje vertical representa [[probabilidad_estado]], [[conteo_sistemas]] o [[peso_estadistico]] antes
      de interpretar alturas.
    en: Identify whether the vertical axis represents [[probabilidad_estado]], [[conteo_sistemas]], or [[peso_estadistico]]
      before interpreting heights.
  - es: Comprueba si las barras o puntos están normalizados y si cubren todos los estados excluyentes del ensemble.
    en: Check whether bars or points are normalized and whether they cover all exclusive states of the ensemble.
  - es: Lee la anchura o dispersión de la distribución antes de resumirla con [[valor_medio_ensemble]].
    en: Read the width or spread of the distribution before summarizing it with [[valor_medio_ensemble]].
  key_points:
  - es: La forma de la distribución indica qué estados microscópicos dominan el ensemble.
    en: The shape of the distribution indicates which microscopic states dominate the ensemble.
  - es: Una media sin fluctuación asociada puede ocultar estados muy diferentes con probabilidades comparables.
    en: A mean without an associated fluctuation can hide very different states with comparable probabilities.
comparative_context:
  enabled: true
  reference_values:
  - es: Una probabilidad cercana a 1 indica ocupación dominante del estado dentro del ensemble, no certeza individual universal.
    en: A probability close to 1 indicates dominant occupation within the ensemble, not universal individual certainty.
  - es: Si [[fluctuacion_ensemble]] es comparable a [[valor_medio_ensemble]], la media debe acompañarse de dispersión.
    en: If [[fluctuacion_ensemble]] is comparable to [[valor_medio_ensemble]], the mean must be accompanied by spread.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: '[[probabilidad_estado]] y [[peso_estadistico]] normalizado son adimensionales; [[valor_medio_ensemble]] conserva
      la unidad de [[valor_estado]].'
    en: '[[probabilidad_estado]] and normalized [[peso_estadistico]] are dimensionless; [[valor_medio_ensemble]] keeps the
      unit of [[valor_estado]].'
  common_unit_mistakes:
  - es: Asignar unidad física a una probabilidad normalizada.
    en: Assigning a physical unit to a normalized probability.
  - es: Sumar valores de estado sin multiplicarlos por probabilidades cuando se calcula el promedio.
    en: Adding state values without multiplying by probabilities when computing the average.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  probabilidad_estado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: magnitud dominante
      en: dominant quantity
    summary_rules:
    - id: probabilidad_estado_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[probabilidad_estado]] resume la fracción del ensemble que ocupa un estado microscópico compatible con las restricciones
          macroscópicas.'
        en: '[[probabilidad_estado]] summarizes the fraction of the ensemble occupying a microscopic state compatible with
          the macroscopic constraints.'
    physical_reading_rules:
    - id: probabilidad_estado_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Debe leerse como una proporción adimensional entre 0 y 1, no como una frecuencia absoluta ni como una certeza
          individual.
        en: It must be read as a dimensionless proportion between 0 and 1, not as an absolute count or as individual certainty.
    coherence_rules:
    - id: probabilidad_estado_coherence_ensemble
      when: 'true'
      status: ok
      text:
        es: La suma de todas las [[probabilidad_estado]] debe ser 1 y cada valor debe ser compatible con el [[peso_estadistico]]
          o con el [[conteo_sistemas]].
        en: The sum of all [[probabilidad_estado]] values must be 1 and each value must be compatible with [[peso_estadistico]]
          or [[conteo_sistemas]].
    model_validity_rules:
    - id: probabilidad_estado_model_validity_scope
      when: 'true'
      status: info
      text:
        es: La interpretación exige un [[ensemble]] bien definido, muchas copias conceptuales y una [[restriccion_macroscopica]]
          común.
        en: The interpretation requires a well-defined [[ensemble]], many conceptual copies, and a common [[restriccion_macroscopica]].
    graph_rules:
    - id: probabilidad_estado_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la gráfica, compara barras o puntos de [[probabilidad_estado]] para ver qué estados dominan el ensemble.
        en: In the graph, compare [[probabilidad_estado]] bars or points to see which states dominate the ensemble.
    likely_errors:
    - id: probabilidad_estado_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[probabilidad_estado]] con el número de sistemas observados: el conteo depende del tamaño del ensemble.'
        en: 'Do not confuse [[probabilidad_estado]] with the observed number of systems: the count depends on ensemble size.'
    next_step_rules:
    - id: probabilidad_estado_next_step_check
      when: 'true'
      status: info
      text:
        es: Después de obtener [[probabilidad_estado]], verifica normalización y úsala para calcular el [[valor_medio_ensemble]]
          si procede.
        en: After obtaining [[probabilidad_estado]], check normalization and use it to compute [[valor_medio_ensemble]] when
          appropriate.
    physical_intuition:
    - id: probabilidad_estado_physical_intuition
      when: 'true'
      status: info
      text:
        es: Si [[probabilidad_estado]] aumenta, ese [[estado_microscopico]] pesa más en el comportamiento promedio del ensemble.
        en: If [[probabilidad_estado]] increases, that [[estado_microscopico]] weighs more in the ensemble average behavior.
    limiting_cases:
    - id: probabilidad_estado_limiting_case
      when: 'true'
      status: info
      text:
        es: En el límite 0 el estado no aparece; en el límite 1 todo el ensemble queda concentrado en ese estado.
        en: At the 0 limit the state does not appear; at the 1 limit the whole ensemble is concentrated in that state.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  valor_medio_ensemble:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: resultado macroscópico
      en: macroscopic result
    summary_rules:
    - id: valor_medio_ensemble_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[valor_medio_ensemble]] representa el valor promedio que predice el ensemble al ponderar cada [[valor_estado]]
          por su [[probabilidad_estado]].'
        en: '[[valor_medio_ensemble]] represents the ensemble prediction obtained by weighting each [[valor_estado]] by its
          [[probabilidad_estado]].'
    physical_reading_rules:
    - id: valor_medio_ensemble_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Se interpreta como una media estadística reproducible, no como el valor que debe tener cada copia individual.
        en: It is interpreted as a reproducible statistical mean, not as the value that every individual copy must have.
    coherence_rules:
    - id: valor_medio_ensemble_coherence_ensemble
      when: 'true'
      status: ok
      text:
        es: Debe quedar dentro del rango de los [[valor_estado]] accesibles cuando las probabilidades son no negativas y normalizadas.
        en: It must lie within the range of accessible [[valor_estado]] values when probabilities are nonnegative and normalized.
    model_validity_rules:
    - id: valor_medio_ensemble_model_validity_scope
      when: 'true'
      status: info
      text:
        es: Solo es representativo si el ensemble está preparado bajo las mismas restricciones y las muestras son comparables.
        en: It is representative only if the ensemble is prepared under the same constraints and samples are comparable.
    graph_rules:
    - id: valor_medio_ensemble_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la lectura gráfica, [[valor_medio_ensemble]] aparece como centro ponderado de la distribución de estados.
        en: In the graph reading, [[valor_medio_ensemble]] appears as the weighted center of the state distribution.
    likely_errors:
    - id: valor_medio_ensemble_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: No calcules [[valor_medio_ensemble]] como media aritmética simple si los estados tienen probabilidades distintas.
        en: Do not compute [[valor_medio_ensemble]] as a simple arithmetic mean when states have different probabilities.
    next_step_rules:
    - id: valor_medio_ensemble_next_step_check
      when: 'true'
      status: info
      text:
        es: Después de calcular [[valor_medio_ensemble]], compara la [[fluctuacion_ensemble]] para saber si la media describe
          bien al conjunto.
        en: After computing [[valor_medio_ensemble]], compare [[fluctuacion_ensemble]] to decide whether the mean describes
          the ensemble well.
    physical_intuition:
    - id: valor_medio_ensemble_physical_intuition
      when: 'true'
      status: info
      text:
        es: La media se desplaza hacia los estados con mayor [[probabilidad_estado]] o mayor [[peso_estadistico]].
        en: The mean shifts toward states with larger [[probabilidad_estado]] or larger [[peso_estadistico]].
    limiting_cases:
    - id: valor_medio_ensemble_limiting_case
      when: 'true'
      status: info
      text:
        es: Si un único estado domina, [[valor_medio_ensemble]] se aproxima al [[valor_estado]] de ese estado.
        en: If one state dominates, [[valor_medio_ensemble]] approaches the [[valor_estado]] of that state.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  conteo_sistemas:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: frecuencia absoluta
      en: absolute frequency
    summary_rules:
    - id: conteo_sistemas_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[conteo_sistemas]] cuenta cuántas copias del ensemble se encuentran en un estado o clase de estados.'
        en: '[[conteo_sistemas]] counts how many ensemble copies are found in a state or class of states.'
    physical_reading_rules:
    - id: conteo_sistemas_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Es una cantidad discreta y no negativa; su significado depende de [[numero_copias_ensemble]].
        en: It is a discrete nonnegative quantity; its meaning depends on [[numero_copias_ensemble]].
    coherence_rules:
    - id: conteo_sistemas_coherence_ensemble
      when: 'true'
      status: ok
      text:
        es: La suma de los [[conteo_sistemas]] por estados excluyentes debe igualar [[numero_copias_ensemble]].
        en: The sum of [[conteo_sistemas]] over exclusive states must equal [[numero_copias_ensemble]].
    model_validity_rules:
    - id: conteo_sistemas_model_validity_scope
      when: 'true'
      status: info
      text:
        es: El conteo aproxima probabilidades de ensemble solo cuando hay suficientes copias y preparación homogénea.
        en: The count approximates ensemble probabilities only with enough copies and homogeneous preparation.
    graph_rules:
    - id: conteo_sistemas_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la gráfica, [[conteo_sistemas]] permite reconocer frecuencias observadas antes de normalizarlas como probabilidad.
        en: In the graph, [[conteo_sistemas]] identifies observed frequencies before normalizing them as probability.
    likely_errors:
    - id: conteo_sistemas_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: No compares [[conteo_sistemas]] de ensembles con tamaños distintos sin convertirlos antes en [[probabilidad_estado]].
        en: Do not compare [[conteo_sistemas]] from ensembles of different sizes without first converting them to [[probabilidad_estado]].
    next_step_rules:
    - id: conteo_sistemas_next_step_check
      when: 'true'
      status: info
      text:
        es: Convierte [[conteo_sistemas]] en [[probabilidad_estado]] dividiendo por [[numero_copias_ensemble]] y comprueba
          la normalización.
        en: Convert [[conteo_sistemas]] into [[probabilidad_estado]] by dividing by [[numero_copias_ensemble]] and check normalization.
    physical_intuition:
    - id: conteo_sistemas_physical_intuition
      when: 'true'
      status: info
      text:
        es: A mayor [[conteo_sistemas]], mayor presencia estadística del estado dentro del ensemble preparado.
        en: A larger [[conteo_sistemas]] means stronger statistical presence of the state within the prepared ensemble.
    limiting_cases:
    - id: conteo_sistemas_limiting_case
      when: 'true'
      status: info
      text:
        es: Con pocas copias puede fluctuar mucho; con muchas copias se aproxima mejor a la probabilidad esperada.
        en: With few copies it can fluctuate strongly; with many copies it better approaches the expected probability.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  fluctuacion_ensemble:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: diagnóstico de dispersión
      en: spread diagnostic
    summary_rules:
    - id: fluctuacion_ensemble_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[fluctuacion_ensemble]] mide cuánto se separan los valores individuales del [[valor_medio_ensemble]] dentro
          del ensemble.'
        en: '[[fluctuacion_ensemble]] measures how far individual values spread away from [[valor_medio_ensemble]] within
          the ensemble.'
    physical_reading_rules:
    - id: fluctuacion_ensemble_physical_reading_units
      when: 'true'
      status: info
      text:
        es: Una fluctuación pequeña indica predicción concentrada; una grande indica que la media oculta dispersión relevante.
        en: A small fluctuation indicates a concentrated prediction; a large one indicates that the mean hides relevant spread.
    coherence_rules:
    - id: fluctuacion_ensemble_coherence_ensemble
      when: 'true'
      status: ok
      text:
        es: Debe ser no negativa y compatible con la varianza calculada a partir de [[valor_estado]] y [[probabilidad_estado]].
        en: It must be nonnegative and consistent with the variance computed from [[valor_estado]] and [[probabilidad_estado]].
    model_validity_rules:
    - id: fluctuacion_ensemble_model_validity_scope
      when: 'true'
      status: info
      text:
        es: Su lectura exige distinguir dispersión real del ensemble de ruido numérico o muestreo insuficiente.
        en: Its reading requires distinguishing real ensemble spread from numerical noise or insufficient sampling.
    graph_rules:
    - id: fluctuacion_ensemble_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la gráfica, [[fluctuacion_ensemble]] se lee como anchura de la distribución alrededor de la media.
        en: In the graph, [[fluctuacion_ensemble]] is read as the distribution width around the mean.
    likely_errors:
    - id: fluctuacion_ensemble_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'No trates [[fluctuacion_ensemble]] como error de cálculo: puede ser una propiedad física del ensemble.'
        en: 'Do not treat [[fluctuacion_ensemble]] as a calculation error: it can be a physical property of the ensemble.'
    next_step_rules:
    - id: fluctuacion_ensemble_next_step_check
      when: 'true'
      status: info
      text:
        es: Compara [[fluctuacion_ensemble]] con la escala de [[valor_medio_ensemble]] para decidir si la media es informativa.
        en: Compare [[fluctuacion_ensemble]] with the scale of [[valor_medio_ensemble]] to decide whether the mean is informative.
    physical_intuition:
    - id: fluctuacion_ensemble_physical_intuition
      when: 'true'
      status: info
      text:
        es: Si estados muy distintos tienen probabilidades apreciables, la fluctuación crece aunque la media esté bien calculada.
        en: If very different states have appreciable probabilities, the fluctuation grows even when the mean is correctly
          computed.
    limiting_cases:
    - id: fluctuacion_ensemble_limiting_case
      when: 'true'
      status: info
      text:
        es: Si todas las copias tienen el mismo valor, [[fluctuacion_ensemble]] tiende a cero.
        en: If all copies have the same value, [[fluctuacion_ensemble]] tends to zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  peso_estadistico:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: peso relativo
      en: relative weight
    summary_rules:
    - id: peso_estadistico_summary_meaning
      when: 'true'
      status: ok
      text:
        es: '[[peso_estadistico]] expresa la importancia relativa de un estado antes de convertirla en [[probabilidad_estado]]
          normalizada.'
        en: '[[peso_estadistico]] expresses the relative importance of a state before converting it into normalized [[probabilidad_estado]].'
    physical_reading_rules:
    - id: peso_estadistico_physical_reading_units
      when: 'true'
      status: info
      text:
        es: 'Debe interpretarse comparativamente: por sí solo no es probabilidad hasta normalizar todos los pesos.'
        en: 'It must be interpreted comparatively: by itself it is not a probability until all weights are normalized.'
    coherence_rules:
    - id: peso_estadistico_coherence_ensemble
      when: 'true'
      status: ok
      text:
        es: Todos los pesos usados en una normalización deben corresponder al mismo ensemble y a la misma restricción.
        en: All weights used in one normalization must correspond to the same ensemble and the same constraint.
    model_validity_rules:
    - id: peso_estadistico_model_validity_scope
      when: 'true'
      status: info
      text:
        es: La regla de pesos solo vale si el modelo elegido representa correctamente la preparación estadística del sistema.
        en: The weighting rule is valid only if the chosen model correctly represents the statistical preparation of the system.
    graph_rules:
    - id: peso_estadistico_graph_distribution
      when: 'true'
      status: info
      text:
        es: En la gráfica, [[peso_estadistico]] permite ver qué estados ganan presencia antes de imponer la suma total uno.
        en: In the graph, [[peso_estadistico]] shows which states gain presence before imposing total sum one.
    likely_errors:
    - id: peso_estadistico_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: No compares pesos de modelos distintos como si pertenecieran a la misma normalización.
        en: Do not compare weights from different models as if they belonged to the same normalization.
    next_step_rules:
    - id: peso_estadistico_next_step_check
      when: 'true'
      status: info
      text:
        es: Normaliza [[peso_estadistico]] para obtener [[probabilidad_estado]] y después calcula el promedio de ensemble.
        en: Normalize [[peso_estadistico]] to obtain [[probabilidad_estado]] and then compute the ensemble average.
    physical_intuition:
    - id: peso_estadistico_physical_intuition
