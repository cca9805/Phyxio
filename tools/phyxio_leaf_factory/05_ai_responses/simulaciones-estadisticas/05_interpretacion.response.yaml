        es: Interpreta [[observable]] solo dentro de las hipótesis de muestreo, equilibrio y variables declaradas en el leaf.
        en: Interpret [[observable]] only within the sampling, equilibrium, and variable assumptions declared in the leaf.
    graph_rules:
    - id: observable_graph_coord_lectura
      when: 'true'
      status: info
      text:
        es: Usa la gráfica Coord como apoyo si [[observable]] afecta a la convergencia, dispersión o lectura probabilística
          del resultado.
        en: Use the Coord graph as support if [[observable]] affects convergence, spread, or probabilistic reading of the
          result.
    likely_errors:
    - id: observable_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: 'No leas [[observable]] como número aislado: revisa unidad, rango y fórmula antes de concluir.'
        en: 'Do not read [[observable]] as an isolated number: check unit, range, and formula before concluding.'
    next_step_rules:
    - id: observable_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[observable]], contrasta el resultado con la fórmula activa, las unidades SI y la tendencia
          esperada.
        en: After interpreting [[observable]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: observable_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[observable]] ayuda a decidir si la simulación describe tendencia física, ruido numérico o peso
          estadístico.
        en: Intuitively, [[observable]] helps decide whether the simulation describes physical trend, numerical noise, or
          statistical weight.
    limiting_cases:
    - id: observable_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Analiza qué ocurre con [[observable]] en valores nulos, extremos o fuera del dominio físico permitido.
        en: Analyze what happens to [[observable]] at zero, extreme, or outside allowed physical-domain values.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[observable]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[observable]] is meaningful only after fixing reference and convention.
      common_sign_errors:
      - es: Tomar un signo negativo como error numérico sin revisar la referencia.
        en: Treating a negative sign as a numerical error without checking the reference.
  suma_observable:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: acumulador
      en: sum of observables
    summary_rules:
    - id: suma_observable_summary_contexto
