  image_type_detection: []
targets:
  numero_muestras:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: variable_independiente
      en: number of samples
    summary_rules:
    - id: numero_muestras_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[numero_muestras]] fija cuántas muestras sostienen la estimación; gobierna coste y reducción del error estadístico.'
        en: '[[numero_muestras]] sets how many samples support the estimate; it controls cost and statistical-error reduction.'
    physical_reading_rules:
    - id: numero_muestras_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: Lee [[numero_muestras]] como conteo entero positivo; aumentar muestras mejora la precisión, pero no elimina todo
          sesgo del modelo.
        en: Read [[numero_muestras]] as a positive integer count; adding samples improves precision but does not remove model
          bias.
    coherence_rules:
    - id: numero_muestras_coherence_dimension_dominio
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[numero_muestras]] respete dimensión, rango físico y relación con las fórmulas declaradas.
        en: Check that [[numero_muestras]] respects dimension, physical range, and its declared formula relations.
    model_validity_rules:
    - id: numero_muestras_model_validity_hipotesis
      when: 'true'
      status: info
      text:
        es: Interpreta [[numero_muestras]] solo dentro de las hipótesis de muestreo, equilibrio y variables declaradas en
          el leaf.
        en: Interpret [[numero_muestras]] only within the sampling, equilibrium, and variable assumptions declared in the
          leaf.
    graph_rules:
    - id: numero_muestras_graph_coord_lectura
      when: 'true'
      status: info
      text:
        es: En la gráfica Coord, [[numero_muestras]] aparece en el eje x y permite ver que la mejora del error no es lineal.
        en: In the Coord graph, [[numero_muestras]] is on the x-axis and shows that error improvement is not linear.
    likely_errors:
    - id: numero_muestras_likely_error_confusion
      when: 'true'
      status: warning
      text:
        es: No confundas aumentar [[numero_muestras]] con corregir un modelo mal planteado o muestras sesgadas.
        en: Do not confuse increasing [[numero_muestras]] with fixing a poor model or biased samples.
    next_step_rules:
    - id: numero_muestras_next_step_verificacion
      when: 'true'
      status: info
      text:
        es: Después de interpretar [[numero_muestras]], contrasta el resultado con la fórmula activa, las unidades SI y la
          tendencia esperada.
        en: After interpreting [[numero_muestras]], compare the result with the active formula, SI units, and expected trend.
    physical_intuition:
    - id: numero_muestras_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[numero_muestras]] compra precisión con coste computacional; cada mejora adicional sale más cara.
        en: Intuitively, [[numero_muestras]] buys precision with computational cost; each extra improvement is more expensive.
    limiting_cases:
    - id: numero_muestras_limiting_cases_base
      when: 'true'
      status: info
      text:
        es: Si [[numero_muestras]] crece mucho, el error baja lentamente; si se acerca a cero, la estimación deja de tener
          sentido.
        en: If [[numero_muestras]] grows very large, error decreases slowly; if it approaches zero, the estimate loses meaning.
    sign_convention_reminder:
      enabled: false
      text:
        es: El signo de [[numero_muestras]] solo tiene sentido después de fijar referencia y convenio.
        en: The sign of [[numero_muestras]] is meaningful only after fixing reference and convention.
      common_sign_errors: []
  observable:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: cantidad_medida
      en: observable
    summary_rules:
    - id: observable_summary_contexto
      when: 'true'
      status: ok
      text:
        es: '[[observable]] es la magnitud física medida en cada muestra; la simulación solo promedia lo que este observable
          representa.'
        en: '[[observable]] is the physical quantity measured in each sample; the simulation only averages what this observable
          represents.'
    physical_reading_rules:
    - id: observable_physical_reading_unidad_sentido
      when: 'true'
      status: info
      text:
        es: Lee la unidad, rango permitido y papel físico de [[observable]] antes de comparar resultados de simulación.
        en: Read the unit, allowed range, and physical role of [[observable]] before comparing simulation results.
    coherence_rules:
    - id: observable_coherence_dimension_dominio
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[observable]] respete dimensión, rango físico y relación con las fórmulas declaradas.
