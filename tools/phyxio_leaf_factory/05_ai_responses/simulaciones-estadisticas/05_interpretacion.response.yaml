mini_graph:
  enabled: true
  preferred_type: Coord
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
  - media_muestral_observable
  - error_estadistico_media
  - factor_boltzmann
  - aceptacion_monte_carlo
  magnitudes:
  - numero_muestras
  - observable
  - suma_observable
  - media_muestral
  - desviacion_estandar
  - error_estadistico
  - temperatura
  - energia
  - diferencia_energia
  - constante_boltzmann
  - probabilidad_boltzmann
  - constante_normalizacion
  - probabilidad_aceptacion
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: termodinámica estadística y simulaciones Monte Carlo
    en: statistical thermodynamics and Monte Carlo simulations
  axis_convention:
    es: Las magnitudes escalares no requieren eje de signo, pero energía y observables dependen de la referencia elegida.
    en: Scalar quantities do not require a sign axis, but energy and observables depend on the chosen reference.
  standard_assumptions:
  - es: Las muestras representan el mismo sistema físico y el mismo observable.
    en: Samples represent the same physical system and the same observable.
  - es: Las estimaciones estadísticas mejoran con muestras independientes o con un número efectivo de muestras bien definido.
    en: Statistical estimates improve with independent samples or with a well-defined effective sample number.
  standard_warnings:
  - es: No confundas dispersión de las muestras con error estadístico de la media.
    en: Do not confuse sample spread with statistical error of the mean.
  - es: No uses probabilidades térmicas fuera de su dominio de equilibrio o sin normalización.
    en: Do not use thermal probabilities outside their equilibrium domain or without normalization.
graph_binding:
  enabled: true
  type: Coord
  channels:
  - Coord
cross_checks:
  enabled: true
  checks:
  - id: dimension_check
    status: ok
    text:
      es: Cada resultado debe conservar la dimensión indicada por su fórmula y magnitud asociada.
      en: Each result must keep the dimension indicated by its associated formula and magnitude.
  - id: domain_check
    status: warning
    text:
      es: N, T, k_B y las probabilidades deben mantenerse dentro de sus dominios físicos.
      en: N, T, k_B, and probabilities must remain within their physical domains.
error_patterns:
  enabled: true
  patterns:
  - id: raiz_N_confusion
    status: warning
    text:
      es: Un error frecuente es esperar que duplicar N divida el error estadístico por dos.
      en: A common error is expecting doubled N to halve the statistical error.
  - id: probabilidad_sin_normalizacion
    status: warning
    text:
      es: Otro error es interpretar un peso de Boltzmann como probabilidad absoluta sin normalización.
      en: Another error is interpreting a Boltzmann weight as an absolute probability without normalization.
graph_reading_policy:
  enabled: true
  primary_variable: error_estadistico
  reading_sequence:
  - es: Identifica [[numero_muestras]] en el eje x y [[error_estadistico]] en el eje y.
    en: Identify [[numero_muestras]] on the x-axis and [[error_estadistico]] on the y-axis.
  - es: Comprueba que la curva sea decreciente y que se aplane al crecer N.
    en: Check that the curve decreases and flattens as N grows.
  key_points:
  - es: La mejora estadística sigue una ley de raíz inversa, no una reducción lineal.
    en: Statistical improvement follows an inverse-square-root law, not a linear reduction.
  - es: Cuadruplicar N reduce el error aproximadamente a la mitad si la dispersión permanece constante.
    en: Quadrupling N roughly halves the error if the spread remains constant.
comparative_context:
  enabled: true
  reference_values:
  - es: Compara el error con la escala del observable para decidir si la simulación es útil.
    en: Compare the error with the observable scale to decide whether the simulation is useful.
  - es: Compara el coste de aumentar N con la mejora real obtenida.
    en: Compare the cost of increasing N with the actual improvement obtained.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: El error y la desviación estándar tienen la unidad del observable; las probabilidades son adimensionales.
    en: Error and standard deviation have the observable unit; probabilities are dimensionless.
  common_unit_mistakes:
  - es: Usar temperatura no absoluta en factores de Boltzmann.
    en: Using non-absolute temperature in Boltzmann factors.
  - es: Tratar N como una magnitud con unidad física en vez de conteo adimensional.
    en: Treating N as a physical-unit quantity instead of a dimensionless count.
free_body_diagram_hint:
  enabled: false
  key_forces: []
  equilibrium_condition:
    es: ''
    en: ''
process_type_detection:
  enabled: false
  processes: []
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ''
      en: ''
    density_meaning:
      es: ''
      en: ''
  superposition_note:
    es: ''
    en: ''
ray_tracing_hint:
