version: '1.0'
leaf: conexion-con-magnitudes-termodinamicas
coord:
  id: conexion-con-magnitudes-termodinamicas-Coord
  graphId: conexion-con-magnitudes-termodinamicas-Coord
  type: Coord
  graphType: Coord
  title:
    es: Energía libre generada por la función de partición al variar la temperatura
    en: Free energy generated by the partition function as temperature varies
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Energía libre de Helmholtz F (J)
    en: Helmholtz free energy F (J)
  xMagnitude: temperatura
  yMagnitude: energia_libre_helmholtz
  relation:
    es: 'La gráfica responde cómo la función de partición permite obtener magnitudes termodinámicas: al variar la temperatura
      T, Z fija F=-k_B*T*ln(Z), y desde la pendiente de F se lee la entropía.'
    en: 'The graph answers how the partition function allows thermodynamic quantities to be obtained: as temperature T varies,
      Z sets F=-k_B*T*ln(Z), and entropy is read from the slope of F.'
  physicalReading:
    es: Cada punto muestra la energía libre de Helmholtz asociada a una temperatura. La dependencia física clave es que la
      función de partición resume los microestados y transforma esa información en magnitudes termodinámicas macroscópicas.
    en: Each point shows the Helmholtz free energy associated with one temperature. The key physical dependency is that the
      partition function summarizes microstates and transforms that information into macroscopic thermodynamic quantities.
  slopeMeaning:
    es: 'La pendiente dF/dT tiene significado directo: su opuesto es la entropía S. Una curva que baja con más inclinación
      indica mayor entropía.'
    en: 'The slope dF/dT has direct meaning: its opposite is the entropy S. A curve that drops more steeply indicates larger
      entropy.'
  interceptMeaning:
    es: La intersección extrapolada con T=0 solo tiene sentido como límite del modelo; no debe leerse automáticamente como
      energía interna.
    en: The extrapolated intercept at T=0 only has meaning as a model limit; it should not automatically be read as internal
      energy.
  curvatureMeaning:
    es: La curvatura indica cómo cambia la entropía con la temperatura y anticipa variaciones de capacidad calorífica.
    en: Curvature indicates how entropy changes with temperature and anticipates heat-capacity variations.
  signMeaning:
    es: F puede ser positiva o negativa según el cero de energía; lo importante para equilibrio es su variación y sus derivadas.
    en: F may be positive or negative depending on the energy zero; what matters for equilibrium is its variation and derivatives.
  areaMeaning:
    es: El área bajo F(T) no representa una magnitud termodinámica estándar en este modelo; la lectura relevante es la pendiente.
    en: The area under F(T) does not represent a standard thermodynamic quantity in this model; the relevant reading is the
      slope.
  domainMeaning:
    es: El dominio exige T>0, Z>0 y volumen y número de partículas constantes para interpretar la pendiente como entropía.
    en: The domain requires T>0, Z>0, and constant volume and particle number to interpret the slope as entropy.
  modelConnection:
    es: 'El gráfico pertenece al ensamble canónico: la función de partición conecta microestados con energía libre, energía
      interna, entropía y presión mediante derivadas.'
    en: 'The graph belongs to the canonical ensemble: the partition function connects microstates with free energy, internal
      energy, entropy, and pressure through derivatives.'
  formulaConnection:
    es: Usa F=-k_B*T*ln(Z) como relación principal y S=-dF/dT para leer la pendiente térmica.
    en: It uses F=-k_B*T*ln(Z) as the main relation and S=-dF/dT to read the thermal slope.
  readingFocus:
    es: 'Fíjate en cómo cambia la energía libre de Helmholtz cuando varía la temperatura: esa dependencia revela cómo la función
      de partición produce magnitudes termodinámicas.'
    en: 'Focus on how Helmholtz free energy changes as temperature varies: that dependency reveals how the partition function
      produces thermodynamic quantities.'
  agentHints:
    es:
    - Comprueba primero que la variable horizontal sea temperatura absoluta, no Celsius.
    - Relaciona la pendiente local con S=-dF/dT antes de hablar de entropía.
    - Recuerda que la función de partición Z no se dibuja necesariamente, pero determina toda la curva F(T).
    en:
    - First check that the horizontal variable is absolute temperature, not Celsius.
    - Relate the local slope with S=-dF/dT before discussing entropy.
    - Remember that the partition function Z is not necessarily plotted, but it determines the whole F(T) curve.
  commonMistakes:
    es:
    - Interpretar el área bajo F(T) como calor o trabajo.
    - Confundir energía libre de Helmholtz con energía interna.
    - Olvidar que la entropía es el opuesto de la pendiente, no la pendiente sin signo.
    en:
    - Interpreting the area under F(T) as heat or work.
    - Confusing Helmholtz free energy with internal energy.
    - Forgetting that entropy is the opposite of the slope, not the unsigned slope.
  curveProfile:
    type: decreasing_concave
    expectedShape:
      es: 'Curva decreciente suave: F baja al aumentar T si hay entropía positiva, con curvatura dependiente del modelo.'
      en: 'Smooth decreasing curve: F falls as T increases when entropy is positive, with model-dependent curvature.'
    keyPoints:
    - x: 1
      y: -1
      label:
        es: 'Baja T: pocos microestados dominan Z'
        en: 'Low T: few microstates dominate Z'
    - x: 300
      y: -5
      label:
        es: 'T intermedia: F desciende y la pendiente revela S'
        en: 'Intermediate T: F decreases and the slope reveals S'
    - x: 900
      y: -12
      label:
        es: 'Alta T: más estados accesibles modifican F'
        en: 'High T: more accessible states modify F'
  dataRange:
    xMin: 1
    xMax: 1000
    yMin: -15
    yMax: 2
    autoScale: true
  recommendedTab: graficas
