        es: El resultado [[entropia]] indica la magnitud física principal que se está interpretando.
        en: The result [[entropia]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: entropia_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[entropia]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[entropia]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: entropia_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[entropia]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[entropia]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: entropia_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[entropia]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[entropia]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: entropia_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[entropia]] con la lectura gráfica disponible en el leaf.
        en: Relate [[entropia]] to the graph reading available in the leaf.
    likely_errors:
    - id: entropia_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[entropia]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[entropia]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: entropia_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[entropia]], revisa la coherencia física y vuelve a la calculadora si necesitas otro despeje.
        en: After obtaining [[entropia]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: entropia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[entropia]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[entropia]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: entropia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[entropia]] comprobando qué ocurre si una magnitud dominante crece, disminuye o se
          anula.
        en: Analyze the limiting cases of [[entropia]] by checking what happens if a dominant quantity grows, decreases, or
          becomes zero.
