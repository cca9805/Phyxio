version: "1.0"
leaf: "conveccion"

coord:
  title:
    es: "Convección · Potencia térmica frente a diferencia de temperatura"
    en: "Convection · Thermal power versus temperature difference"
  xAxis:
    es: "Diferencia de temperatura ΔT (K)"
    en: "Temperature difference ΔT (K)"
  yAxis:
    es: "Potencia térmica por convección P (W)"
    en: "Convective thermal power P (W)"
  agentHints:
    es:
      - "La gráfica representa la relación lineal entre la diferencia de temperatura superficie-fluido y la potencia térmica convectiva cuando h y A permanecen constantes."
      - "La pendiente del gráfico depende del coeficiente de convección y del área de intercambio."
      - "Si ΔT es cero, no hay intercambio térmico convectivo neto en el modelo ideal."
    en:
      - "The graph represents the linear relationship between the surface-fluid temperature difference and convective thermal power when h and A remain constant."
      - "The graph slope depends on the convective heat transfer coefficient and the exchange area."
      - "If ΔT is zero, there is no net convective heat exchange in the ideal model."
  curveProfile:
    type: "linear"
    expectedShape: "recta creciente que pasa por el origen si h y A son constantes y se usa el valor positivo de ΔT"
    keyPoints:
      - x: 0
        y: 0
        label:
          es: "Sin diferencia de temperatura no hay convección neta"
          en: "With no temperature difference there is no net convection"
      - x: 50
        y: 500
        label:
          es: "Mayor ΔT produce mayor potencia convectiva"
          en: "Larger ΔT produces higher convective power"
  dataRange:
    xMin: 0
    xMax: 100
    yMin: 0
    yMax: 1000
    autoScale: true