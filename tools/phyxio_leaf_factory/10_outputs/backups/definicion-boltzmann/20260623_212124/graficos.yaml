version: '1.0'
leaf: definicion-boltzmann
coord:
  id: definicion-boltzmann-Coord
  graphId: definicion-boltzmann-Coord
  type: Coord
  graphType: Coord
  title:
    es: Entropía de Boltzmann frente a microestados accesibles
    en: Boltzmann entropy versus accessible microstates
  xAxis:
    es: Número de microestados accesibles Omega
    en: Number of accessible microstates Omega
  yAxis:
    es: Entropía S
    en: Entropy S
  xMagnitude: numero_microestados
  yMagnitude: entropia
  relation:
    es: La definición de Boltzmann relaciona la entropía [[entropia]] con el número de microestados accesibles [[numero_microestados]] mediante un crecimiento logarítmico.
    en: Boltzmann definition relates entropy [[entropia]] to the number of accessible microstates [[numero_microestados]] through logarithmic growth.
  physicalReading:
    es: Al aumentar el número de microestados accesibles, la entropía aumenta, pero cada nuevo factor multiplicativo añade la misma cantidad de entropía.
    en: As the number of accessible microstates increases, entropy increases, but each new multiplicative factor adds the same entropy amount.
  slopeMeaning:
    es: 'La pendiente disminuye: añadir microestados a un sistema ya muy multiplicado cambia menos S por unidad de Omega.'
    en: 'The slope decreases: adding microstates to an already highly multiplied system changes S less per unit Omega.'
  interceptMeaning:
    es: En Omega = 1, la curva pasa por S = 0 dentro del modelo ideal.
    en: At Omega = 1, the curve passes through S = 0 within the ideal model.
  curvatureMeaning:
    es: La concavidad hacia abajo expresa dependencia logarítmica, no proporcionalidad directa.
    en: Downward concavity expresses logarithmic dependence, not direct proportionality.
  signMeaning:
    es: S es no negativa para Omega >= 1; una variación puede ser positiva o negativa al comparar macroestados.
    en: S is nonnegative for Omega >= 1; a change can be positive or negative when comparing macrostates.
  areaMeaning:
    es: El área bajo esta curva no representa una magnitud física básica en este leaf.
    en: The area under this curve does not represent a basic physical quantity in this leaf.
  domainMeaning:
    es: El dominio físico exige Omega positivo y adimensional; Omega = 0 o negativo no tiene lectura estadística.
    en: The physical domain requires positive, dimensionless Omega; zero or negative Omega has no statistical reading.
  modelConnection:
    es: La curva presupone microestados contables y equiprobables para un macroestado bien definido.
    en: The curve assumes countable, equally probable microstates for a well-defined macrostate.
  formulaConnection:
    es: Representa {{f:entropia_boltzmann}} y permite leer visualmente cómo la entropía depende de los microestados.
    en: It represents {{f:entropia_boltzmann}} and visually shows how entropy depends on microstates.
  readingFocus:
    es: 'Responder cómo la definición de Boltzmann relaciona entropía y microestados: la dependencia es creciente, logarítmica y sensible a cocientes.'
    en: 'Answer how Boltzmann definition relates entropy and microstates: the dependence is increasing, logarithmic, and sensitive to ratios.'
  agentHints:
    es:
    - Comprueba que el alumno use Omega como conteo adimensional positivo.
    - Insiste en que duplicar Omega suma una cantidad fija k_B ln 2 a S.
    - Distingue crecimiento logarítmico de crecimiento lineal.
    en:
    - Check that the student uses Omega as a positive dimensionless count.
    - Emphasize that doubling Omega adds a fixed amount k_B ln 2 to S.
    - Distinguish logarithmic growth from linear growth.
  commonMistakes:
    es:
    - Creer que S aumenta proporcionalmente a Omega.
    - Usar Omega con unidades físicas.
    - Intentar evaluar ln(0) o ln de un número negativo.
    en:
    - Believing S grows proportionally to Omega.
    - Using Omega with physical units.
    - Trying to evaluate ln(0) or the logarithm of a negative number.
  curveProfile:
    type: logarithmic_increasing
    expectedShape:
      es: Curva creciente cóncava hacia abajo que arranca en Omega = 1 con S = 0.
      en: Increasing downward-concave curve starting at Omega = 1 with S = 0.
    keyPoints:
    - x: 1
      y: 0
      label:
        es: 'Un solo microestado: entropía nula ideal'
        en: 'One microstate: ideal zero entropy'
    - x: 2
      y: k_B*ln(2)
      label:
        es: Duplicar microestados añade k_B ln 2
        en: Doubling microstates adds k_B ln 2
    - x: 10
      y: k_B*ln(10)
      label:
        es: 'Diez microestados: aumento logarítmico'
        en: 'Ten microstates: logarithmic increase'
  dataRange:
    xMin: 1
    xMax: 100
    yMin: 0
    yMax: 5
    autoScale: true
  recommendedTab: graficas
svg:
  id: definicion-boltzmann-Svg
  graphId: definicion-boltzmann-Svg
  type: Svg
  graphType: Svg
  title:
    es: Macroestado y microestados compatibles
    en: Macrostate and compatible microstates
  sceneId: boltzmann_microstates_boxes
  sceneLabel:
    es: Distribuciones microscópicas compatibles con el mismo macroestado
    en: Microscopic distributions compatible with the same macrostate
  objects:
    es:
    - Recipiente aislado
    - Partículas indistinguibles
    - Celdas de energía
    - Panel de microestados compatibles
    - Etiqueta de entropía S
    en:
    - Isolated container
    - Indistinguishable particles
    - Energy cells
    - Compatible microstates panel
    - Entropy label S
  mainObject: macroestado_gas
  referenceFrame:
    es: Sistema aislado descrito por variables macroscópicas fijas.
    en: Isolated system described by fixed macroscopic variables.
  geometry:
    es: El esquema muestra un mismo macroestado conectado a varias configuraciones microscópicas posibles.
    en: The diagram shows one macrostate connected to several possible microscopic configurations.
  interactions:
    es:
    - Las partículas se redistribuyen entre celdas sin cambiar el macroestado observable.
    - Cada configuración compatible cuenta como un microestado.
    en:
    - Particles redistribute among cells without changing the observable macrostate.
    - Each compatible configuration counts as a microstate.
  modelElements:
    es:
    - Conteo Omega de microestados
    - Macroestado fijado
    - Escala logarítmica de entropía
    en:
    - Microstate count Omega
    - Fixed macrostate
    - Logarithmic entropy scale
  visualCues:
    es:
    - Más configuraciones compatibles se representan con más tarjetas de microestado.
    - La etiqueta S aumenta de forma comprimida, no una tarjeta por unidad de entropía.
    en:
    - More compatible configurations are represented by more microstate cards.
    - The S label grows in a compressed way, not one card per entropy unit.
  scaleMeaning:
    es: La escala visual compara multiplicidad; no conserva tamaños reales ni distancias microscópicas.
    en: The visual scale compares multiplicity; it does not preserve real microscopic sizes or distances.
  relation:
    es: 'La escena responde cómo Boltzmann relaciona entropía y microestados: más microestados accesibles significan mayor S.'
    en: 'The scene answers how Boltzmann relates entropy and microstates: more accessible microstates mean larger S.'
  physicalReading:
    es: Un macroestado muy probable es el que puede realizarse mediante muchas configuraciones microscópicas, por eso su entropía es mayor.
    en: A very probable macrostate can be realized by many microscopic configurations, so its entropy is larger.
  modelConnection:
    es: El dibujo supone microestados equiprobables dentro de un macroestado en equilibrio.
    en: The drawing assumes equally probable microstates within an equilibrium macrostate.
  formulaConnection:
    es: La escena es una lectura cualitativa de {{f:entropia_boltzmann}} y de la comparación {{f:diferencia_entropia_boltzmann}}.
    en: The scene is a qualitative reading of {{f:entropia_boltzmann}} and the comparison {{f:diferencia_entropia_boltzmann}}.
  readingFocus:
    es: Identificar que la entropía no mide desorden de forma vaga, sino número de microestados accesibles compatibles con el macroestado.
    en: Identify that entropy does not vaguely measure disorder, but the number of accessible microstates compatible with the macrostate.
  agentHints:
    es:
    - Pide al alumno que señale macroestado y microestado por separado.
    - Relaciona más tarjetas de microestado con mayor multiplicidad Omega.
    - Evita presentar desorden como definición técnica única.
    en:
    - Ask the student to point out macrostate and microstate separately.
    - Relate more microstate cards to larger multiplicity Omega.
    - Avoid presenting disorder as the only technical definition.
  commonMistakes:
    es:
    - Llamar microestado al recipiente completo sin distinguir configuración.
    - Pensar que todas las escenas con muchas partículas tienen más entropía aunque Omega no cambie.
    - Confundir probabilidad macroscópica con trayectoria individual.
    en:
    - Calling the whole container a microstate without distinguishing configuration.
    - Thinking every scene with many particles has more entropy even if Omega does not change.
    - Confusing macroscopic probability with an individual trajectory.
  animationTriggers:
  - id: increase_microstates
    label:
      es: Aumentar microestados accesibles
      en: Increase accessible microstates
    effect:
      es: Añade tarjetas compatibles y eleva la etiqueta S de forma logarítmica.
      en: Adds compatible cards and raises the S label logarithmically.
  - id: compare_macrostates
    label:
      es: Comparar dos macroestados
      en: Compare two macrostates
    effect:
      es: Muestra cuál tiene mayor Omega y mayor entropía.
      en: Shows which has larger Omega and larger entropy.
  interactiveElements:
  - id: omega_slider
    label:
      es: Selector de multiplicidad Omega
      en: Multiplicity Omega slider
    linkedMagnitude: numero_microestados
  - id: macrostate_toggle
    label:
      es: Cambiar macroestado observado
      en: Switch observed macrostate
    linkedMagnitude: delta_entropia
  recommendedTab: graficas
