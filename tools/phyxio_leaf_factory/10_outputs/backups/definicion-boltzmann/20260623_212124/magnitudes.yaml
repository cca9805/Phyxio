version: 5.0.0
magnitudes:
- id: entropia
  symbol: S
  nombre:
    es: entropía
    en: entropy
  descripcion:
    es: Medida logarítmica de la multiplicidad microscópica compatible con un macroestado.
    en: Logarithmic measure of microscopic multiplicity compatible with a macrostate.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: termodinamica-estadistica
  physical_role: resultado estadístico
  used_in:
  - entropia_boltzmann
  common_mistake: Tratarla como un conteo directo de microestados en lugar de una medida logarítmica con unidades.
  typical_range: Desde valores microscópicos del orden de k_B hasta valores macroscópicos muy grandes en J/K.
  sign_behavior:
    has_sign: true
    meaning:
      es: En esta definición suele ser no negativa para Omega >= 1; cambios de entropía pueden tener signo.
      en: In this definition it is usually nonnegative for Omega >= 1; entropy changes can have a sign.
  zero_behavior:
    allowed: true
    meaning:
      es: S = 0 corresponde al caso ideal Omega = 1 dentro del modelo.
      en: S = 0 corresponds to the ideal case Omega = 1 within the model.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: S >= 0 si Omega >= 1
  interpretation_role:
    primary_for:
    - entropia_boltzmann
    secondary_for:
    - diferencia_entropia_boltzmann
  graph_binding:
    channels:
    - yAxis
    preferred_graph: Coord
    reading_hint:
      es: Eje vertical de la curva logarítmica frente a Omega.
      en: Vertical axis of the logarithmic curve versus Omega.
  pedagogical_notes:
    es: Su valor no cuenta microestados uno a uno; comprime multiplicidades enormes en una escala manejable.
    en: Its value does not count microstates one by one; it compresses huge multiplicities into a manageable scale.
- id: numero_microestados
  symbol: Omega
  nombre:
    es: número de microestados
    en: number of microstates
  descripcion:
    es: Cantidad de configuraciones microscópicas compatibles con las variables macroscópicas fijadas.
    en: Number of microscopic configurations compatible with the fixed macroscopic variables.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: estadistica
  physical_role: variable independiente
  used_in:
  - entropia_boltzmann
  common_mistake: Asignarle unidades físicas o permitir valores nulos o negativos.
  typical_range: Omega >= 1; en sistemas macroscópicos puede ser enormemente grande.
  sign_behavior:
    has_sign: false
    meaning:
      es: Es un conteo positivo; no tiene signo físico.
      en: It is a positive count; it has no physical sign.
  zero_behavior:
    allowed: false
    meaning:
      es: Omega = 0 no describe un macroestado accesible y rompe el logaritmo.
      en: Omega = 0 does not describe an accessible macrostate and breaks the logarithm.
  value_nature:
    kind: positive_count
    nonnegative_only: true
    expected_interval: Omega > 0
  interpretation_role:
    primary_for:
    - entropia_boltzmann
    secondary_for:
    - diferencia_entropia_boltzmann
  graph_binding:
    channels:
    - xAxis
    preferred_graph: Coord
    reading_hint:
      es: Eje horizontal que controla el crecimiento logarítmico de S.
      en: Horizontal axis controlling the logarithmic growth of S.
  pedagogical_notes:
    es: Representa posibilidades microscópicas compatibles, no partículas ni estados observados directamente.
    en: It represents compatible microscopic possibilities, not particles or directly observed states.
- id: k_boltzmann
  symbol: k_B
  nombre:
    es: constante de Boltzmann
    en: Boltzmann constant
  descripcion:
    es: Constante que fija la escala entre información estadística microscópica y entropía termodinámica.
    en: Constant setting the scale between microscopic statistical information and thermodynamic entropy.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: constante
  physical_role: constante de proporcionalidad
  used_in:
  - entropia_boltzmann
  - diferencia_entropia_boltzmann
  common_mistake: Olvidarla y dejar la entropía como un logaritmo adimensional.
  typical_range: k_B = 1.380649e-23 J/K.
  sign_behavior:
    has_sign: false
    meaning:
      es: Es una constante positiva.
      en: It is a positive constant.
  zero_behavior:
    allowed: false
    meaning:
      es: Si fuera cero, la conexión entre multiplicidad y entropía física desaparecería.
      en: If it were zero, the connection between multiplicity and physical entropy would disappear.
  value_nature:
    kind: constant
    nonnegative_only: true
    expected_interval: k_B > 0
  interpretation_role:
    primary_for:
    - entropia_boltzmann
    - diferencia_entropia_boltzmann
    secondary_for: []
  graph_binding:
    channels:
    - constant
    preferred_graph: Coord
    reading_hint:
      es: Controla la escala vertical de la curva.
      en: Controls the vertical scale of the curve.
  pedagogical_notes:
    es: Convierte el conteo estadístico en una magnitud térmica con unidades macroscópicas.
    en: It turns statistical counting into a thermal quantity with macroscopic units.
- id: delta_entropia
  symbol: Delta S
  nombre:
    es: variación de entropía
    en: entropy change
  descripcion:
    es: Diferencia de entropía entre dos macroestados comparables del mismo sistema.
    en: Entropy difference between two comparable macrostates of the same system.
  unidad_si: J/K
  dimension: M L^2 T^-2 Θ^-1
  is_vector: false
  components: []
  category: termodinamica-estadistica
  physical_role: resultado comparativo
  used_in:
  - diferencia_entropia_boltzmann
  common_mistake: Calcularla con una resta de microestados en vez de un logaritmo de cociente.
  typical_range: Puede ser positiva, negativa o cero según cambie la multiplicidad.
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva si aumenta la multiplicidad; negativa si disminuye.
      en: Positive if multiplicity increases; negative if it decreases.
  zero_behavior:
    allowed: true
    meaning:
      es: Delta S = 0 significa que ambos macroestados tienen la misma multiplicidad.
      en: Delta S = 0 means both macrostates have the same multiplicity.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: any real compatible with positive microstate ratio
  interpretation_role:
    primary_for:
    - diferencia_entropia_boltzmann
    secondary_for: []
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
    reading_hint:
      es: Se lee como diferencia vertical entre dos puntos de S(Omega).
      en: Read as a vertical difference between two points of S(Omega).
  pedagogical_notes:
    es: El signo resume si el macroestado final tiene más o menos posibilidades microscópicas.
    en: The sign summarizes whether the final macrostate has more or fewer microscopic possibilities.
- id: numero_microestados_inicial
  symbol: Omega_i
  nombre:
    es: microestados iniciales
    en: initial microstates
  descripcion:
    es: Multiplicidad del macroestado inicial en una comparación estadística.
    en: Multiplicity of the initial macrostate in a statistical comparison.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: estadistica
  physical_role: estado inicial
  used_in:
  - diferencia_entropia_boltzmann
  common_mistake: Usarlo como denominador nulo o intercambiarlo con el estado final.
  typical_range: Omega_i > 0.
  sign_behavior:
    has_sign: false
    meaning:
      es: Conteo positivo sin signo.
      en: Positive count without sign.
  zero_behavior:
    allowed: false
    meaning:
      es: No puede ser cero en el cociente logarítmico.
      en: It cannot be zero in the logarithmic ratio.
  value_nature:
    kind: positive_count
    nonnegative_only: true
    expected_interval: Omega_i > 0
  interpretation_role:
    primary_for:
    - diferencia_entropia_boltzmann
    secondary_for: []
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
    reading_hint:
      es: Marca el punto inicial de comparación en la curva.
      en: Marks the initial comparison point on the curve.
  pedagogical_notes:
    es: Debe referirse al mismo sistema y al mismo criterio de conteo que el estado final.
    en: It must refer to the same system and counting criterion as the final state.
- id: numero_microestados_final
  symbol: Omega_f
  nombre:
    es: microestados finales
    en: final microstates
  descripcion:
    es: Multiplicidad del macroestado final en una comparación estadística.
    en: Multiplicity of the final macrostate in a statistical comparison.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: estadistica
  physical_role: estado final
  used_in:
  - diferencia_entropia_boltzmann
  common_mistake: Confundir incremento de microestados con incremento lineal de entropía.
  typical_range: Omega_f > 0.
  sign_behavior:
    has_sign: false
    meaning:
      es: Conteo positivo sin signo.
      en: Positive count without sign.
  zero_behavior:
    allowed: false
    meaning:
      es: No puede ser cero porque el logaritmo del cociente no estaría definido.
      en: It cannot be zero because the logarithm of the ratio would be undefined.
  value_nature:
    kind: positive_count
    nonnegative_only: true
    expected_interval: Omega_f > 0
  interpretation_role:
    primary_for:
    - diferencia_entropia_boltzmann
    secondary_for: []
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
    reading_hint:
      es: Marca el punto final de comparación en la curva.
      en: Marks the final comparison point on the curve.
  pedagogical_notes:
    es: Al compararlo con el inicial, el cociente determina el signo de Delta S.
    en: Compared with the initial value, the ratio determines the sign of Delta S.
- id: ratio_microestados
  symbol: Omega_f/Omega_i
  nombre:
    es: cociente de microestados
    en: microstate ratio
  descripcion:
    es: Factor multiplicativo que compara la multiplicidad final con la inicial.
    en: Multiplicative factor comparing final multiplicity with initial multiplicity.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: estadistica
  physical_role: parámetro comparativo
  used_in:
  - diferencia_entropia_boltzmann
  common_mistake: Interpretarlo como diferencia absoluta de microestados.
  typical_range: ratio > 0; ratio > 1 implica aumento de entropía.
  sign_behavior:
    has_sign: false
    meaning:
      es: Debe ser positivo; su comparación con 1 da el sentido del cambio.
      en: It must be positive; comparison with 1 gives the direction of change.
  zero_behavior:
    allowed: false
    meaning:
      es: Un cociente cero no es compatible con el logaritmo.
      en: A zero ratio is not compatible with the logarithm.
  value_nature:
    kind: positive_ratio
    nonnegative_only: true
    expected_interval: ratio > 0
  interpretation_role:
    primary_for:
    - diferencia_entropia_boltzmann
    secondary_for: []
  graph_binding:
    channels:
    - parameter
    preferred_graph: Coord
    reading_hint:
      es: Resume el salto de multiplicidad entre dos macroestados.
      en: Summarizes the multiplicity jump between two macrostates.
  pedagogical_notes:
    es: La escala relevante es multiplicativa; por eso aparece dentro de un logaritmo.
    en: The relevant scale is multiplicative; that is why it appears inside a logarithm.
