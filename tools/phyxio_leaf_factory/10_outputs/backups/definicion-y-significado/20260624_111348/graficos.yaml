version: '1.0'
leaf: definicion-y-significado
coord:
  id: definicion-y-significado-Coord
  graphId: definicion-y-significado-Coord
  type: Coord
  graphType: Coord
  title:
    es: Peso de Boltzmann frente a energía del microestado
    en: Boltzmann weight versus microstate energy
  xAxis:
    es: Energía del microestado E_i
    en: Microstate energy E_i
  yAxis:
    es: Peso de Boltzmann w_i
    en: Boltzmann weight w_i
  xMagnitude: energia_microestado
  yMagnitude: peso_boltzmann
  relation:
    es: 'La gráfica responde qué significa la función de partición: cada microestado aporta a Z mediante un peso de Boltzmann
      que disminuye al aumentar la energía.'
    en: 'The graph answers what the partition function means: each microstate contributes to Z through a Boltzmann weight
      that decreases as energy increases.'
  physicalReading:
    es: Al variar la energía del microestado, el peso de Boltzmann muestra qué estados cuentan más en la suma de pesos de
      microestados que define Z.
    en: As microstate energy varies, the Boltzmann weight shows which states count most in the sum of microstate weights defining
      Z.
  slopeMeaning:
    es: La pendiente negativa indica penalización energética; es más abrupta cuando la temperatura es menor.
    en: The negative slope indicates energetic penalty; it is steeper when temperature is lower.
  interceptMeaning:
    es: Si E_i se toma cero en la referencia, el peso vale 1 y el microestado no está penalizado.
    en: If E_i is taken as zero at the reference, the weight is 1 and the microstate is not penalized.
  curvatureMeaning:
    es: La curvatura exponencial indica que la contribución no cae linealmente con la energía.
    en: The exponential curvature indicates that the contribution does not fall linearly with energy.
  signMeaning:
    es: El peso es positivo; un valor negativo no puede representar contribución estadística.
    en: The weight is positive; a negative value cannot represent statistical contribution.
  areaMeaning:
    es: 'El área solo tiene lectura cualitativa en este gráfico discreto: representa acumulación de contribuciones si se pasa
      a un continuo.'
    en: 'Area has only a qualitative reading in this discrete graph: it represents accumulated contributions when moving to
      a continuum.'
  domainMeaning:
    es: El dominio requiere T>0 y energías comparables dentro del mismo modelo de microestados.
    en: The domain requires T>0 and energies comparable within the same microstate model.
  modelConnection:
    es: 'El gráfico visualiza el modelo canónico: Z no es una energía, sino una suma de pesos positivos.'
    en: 'The graph visualizes the canonical model: Z is not an energy, but a sum of positive weights.'
  formulaConnection:
    es: 'Se conecta con {{f:peso_boltzmann}} y {{f:funcion_particion_suma_pesos}}: primero se calcula cada peso y después
      se suma en Z.'
    en: 'It connects with {{f:peso_boltzmann}} and {{f:funcion_particion_suma_pesos}}: first each weight is computed, then
      weights are summed into Z.'
  readingFocus:
    es: Fíjate en cómo la energía modifica el peso de Boltzmann y, por tanto, el significado físico de la función de partición
      como suma de microestados.
    en: Focus on how energy changes the Boltzmann weight and therefore the physical meaning of the partition function as a
      sum of microstates.
  agentHints:
    es:
    - Identifica primero que el eje vertical no es energía, sino peso estadístico.
    - Relaciona la caída de la curva con la menor contribución de estados energéticos altos.
    - Recuerda que Z aparece al sumar todos los pesos, no al leer un único punto.
    en:
    - First identify that the vertical axis is not energy, but statistical weight.
    - Relate the curve decay to the lower contribution of high-energy states.
    - Remember that Z appears by summing all weights, not by reading one point.
  commonMistakes:
    es:
    - Confundir peso de Boltzmann con probabilidad normalizada.
    - Pensar que una energía mayor siempre aumenta la contribución a Z.
    - Olvidar que cambiar T cambia la forma de la curva.
    en:
    - Confusing Boltzmann weight with normalized probability.
    - Thinking that higher energy always increases the contribution to Z.
    - Forgetting that changing T changes the curve shape.
  curveProfile:
    type: exponential_decay
    expectedShape:
      es: Curva decreciente convexa que parte de peso alto y se aproxima a cero.
      en: Decreasing convex curve starting from high weight and approaching zero.
    keyPoints:
    - x: 0
      y: 1
      label:
        es: Estado de referencia sin penalización energética
        en: Reference state without energetic penalty
    - x: 3
      y: 0.05
      label:
        es: Estado de alta energía con contribución pequeña
        en: High-energy state with small contribution
  dataRange:
    xMin: 0
    xMax: 5
    yMin: 0
    yMax: 1.05
    autoScale: true
  recommendedTab: graficas
svg:
  id: definicion-y-significado-Svg
  graphId: definicion-y-significado-Svg
  type: Svg
  graphType: Svg
  title:
    es: Microestados que alimentan la función de partición
    en: Microstates feeding the partition function
  sceneId: partition_microstates_weights
  sceneLabel:
    es: Conjunto de microestados con pesos distintos que se suman en Z.
    en: Set of microstates with different weights summed into Z.
  objects:
    es:
    - microestado de baja energía
    - microestado intermedio
    - microestado de alta energía
    - suma Z
    - baño térmico
    en:
    - low-energy microstate
    - intermediate microstate
    - high-energy microstate
    - sum Z
    - thermal bath
  mainObject: funcion_particion
  referenceFrame:
    es: Representación conceptual del ensamble canónico, no espacio físico real.
    en: Conceptual representation of the canonical ensemble, not real physical space.
  geometry:
    es: Cajas o niveles energéticos conectados por flechas de contribución hacia Z.
    en: Boxes or energy levels connected by contribution arrows toward Z.
  interactions:
    es: Cada microestado intercambia energía con el baño térmico y aporta un peso positivo a la suma.
    en: Each microstate exchanges energy with the heat bath and contributes a positive weight to the sum.
  modelElements:
    es:
    - pesos positivos
    - temperatura fija
    - microestados accesibles
    - normalización posterior
    en:
    - positive weights
    - fixed temperature
    - accessible microstates
    - later normalization
  visualCues:
    es:
    - flechas gruesas para pesos grandes
    - flechas finas para pesos pequeños
    - color o altura para indicar energía
    en:
    - thick arrows for large weights
    - thin arrows for small weights
    - color or height to indicate energy
  scaleMeaning:
    es: El grosor de la flecha representa contribución relativa, no tamaño geométrico.
    en: Arrow thickness represents relative contribution, not geometric size.
  relation:
    es: La escena muestra que el significado de Z nace al sumar pesos de microestados con distinta energía.
    en: The scene shows that the meaning of Z comes from summing microstate weights with different energy.
  physicalReading:
    es: Los estados de baja energía suelen aportar más, pero la temperatura decide cuánto sobreviven las contribuciones de
      alta energía.
    en: Low-energy states usually contribute more, but temperature decides how much high-energy contributions survive.
  modelConnection:
    es: 'Representa el ensamble canónico: sistema en equilibrio con un baño a temperatura fija.'
    en: 'It represents the canonical ensemble: a system in equilibrium with a bath at fixed temperature.'
  formulaConnection:
    es: Cada flecha corresponde a {{f:peso_boltzmann}} y la caja final resume {{f:funcion_particion_suma_pesos}}.
    en: Each arrow corresponds to {{f:peso_boltzmann}} and the final box summarizes {{f:funcion_particion_suma_pesos}}.
  readingFocus:
    es: Lee qué microestados contribuyen mucho o poco y cómo esa suma da significado físico a la función de partición.
    en: Read which microstates contribute a lot or little and how that sum gives physical meaning to the partition function.
  agentHints:
    es:
    - Pregunta qué representa el grosor antes de hablar de probabilidad.
    - Distingue peso individual, suma Z y probabilidad normalizada.
    - Usa la temperatura como control conceptual de la accesibilidad.
    en:
    - Ask what thickness represents before discussing probability.
    - Distinguish individual weight, sum Z, and normalized probability.
    - Use temperature as the conceptual control of accessibility.
  commonMistakes:
    es:
    - Leer la escena como una trayectoria temporal entre microestados.
    - Creer que Z selecciona solo el estado de menor energía.
    - Confundir flecha gruesa con fuerza física.
    en:
    - Reading the scene as a time trajectory among microstates.
    - Believing that Z selects only the lowest-energy state.
    - Confusing a thick arrow with a physical force.
  animationTriggers:
  - id: increase_temperature
    label:
      es: Aumentar temperatura
      en: Increase temperature
    effect:
      es: Las flechas de estados altos se engrosan.
      en: High-state arrows become thicker.
  interactiveElements:
  - id: select_microstate
    label:
      es: Seleccionar microestado
      en: Select microstate
    feedback:
      es: Muestra E_i, w_i y su contribución a Z.
      en: Shows E_i, w_i, and its contribution to Z.
  recommendedTab: graficas
