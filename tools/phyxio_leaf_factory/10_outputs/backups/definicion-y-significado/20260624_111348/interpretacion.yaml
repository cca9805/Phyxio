  peso_boltzmann:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: dominant_output
      en: Boltzmann weight
    summary_rules:
    - id: peso_boltzmann_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[peso_boltzmann]] indica la magnitud física principal que se está interpretando.
        en: The result [[peso_boltzmann]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: peso_boltzmann_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[peso_boltzmann]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[peso_boltzmann]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: peso_boltzmann_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[peso_boltzmann]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[peso_boltzmann]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: peso_boltzmann_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[peso_boltzmann]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[peso_boltzmann]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: peso_boltzmann_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[peso_boltzmann]] con la lectura gráfica disponible en el leaf.
        en: Relate [[peso_boltzmann]] to the graph reading available in the leaf.
    likely_errors:
    - id: peso_boltzmann_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[peso_boltzmann]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[peso_boltzmann]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: peso_boltzmann_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[peso_boltzmann]], revisa la coherencia física y vuelve a la calculadora si necesitas otro
          despeje.
        en: After obtaining [[peso_boltzmann]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: peso_boltzmann_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[peso_boltzmann]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[peso_boltzmann]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: peso_boltzmann_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[peso_boltzmann]] comprobando qué ocurre si una magnitud dominante crece, disminuye
          o se anula.
        en: Analyze the limiting cases of [[peso_boltzmann]] by checking what happens if a dominant quantity grows, decreases,
          or becomes zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
