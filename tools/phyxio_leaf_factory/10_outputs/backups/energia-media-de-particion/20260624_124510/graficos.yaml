version: '1.0'
leaf: energia-media-de-particion
coord:
  id: energia-media-de-particion-Coord
  graphId: energia-media-de-particion-Coord
  type: Coord
  graphType: Coord
  title:
    es: Energía media obtenida desde la función de partición al variar la temperatura
    en: Mean energy obtained from the partition function as temperature varies
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Energía media U (J)
    en: Mean energy U (J)
  xMagnitude: temperatura
  yMagnitude: energia_media
  relation:
    es: La curva responde cómo la energía media [[energia_media]] se obtiene de la función de partición [[funcion_particion]] al variar la temperatura [[temperatura]].
    en: The curve answers how mean energy [[energia_media]] is obtained from the partition function [[funcion_particion]] as temperature [[temperatura]] varies.
  physicalReading:
    es: Al aumentar la temperatura cambian los pesos de Boltzmann; la derivada de ln Z transforma esa redistribución microscópica en energía media observable.
    en: As temperature increases, Boltzmann weights change; the derivative of ln Z turns that microscopic redistribution into observable mean energy.
  slopeMeaning:
    es: 'La pendiente local representa la capacidad calorífica: cuánto cambia U por kelvin.'
    en: 'The local slope represents heat capacity: how much U changes per kelvin.'
  interceptMeaning:
    es: La extrapolación a baja T aproxima el nivel energético bajo respecto al cero elegido.
    en: The low-T extrapolation approximates the low energy level relative to the chosen zero.
  curvatureMeaning:
    es: La curvatura indica activación progresiva de microestados o cambios en la respuesta térmica.
    en: Curvature indicates progressive microstate activation or changes in thermal response.
  signMeaning:
    es: El signo absoluto de U depende del cero energético; su variación con T es la lectura física principal.
    en: The absolute sign of U depends on the energy zero; its variation with T is the main physical reading.
  areaMeaning:
    es: El área bajo U(T) no es la magnitud principal; valor y pendiente son las lecturas útiles.
    en: The area under U(T) is not the main quantity; value and slope are the useful readings.
  domainMeaning:
    es: Solo se interpreta para T > 0 K, Z > 0 y derivadas finitas del ensamble canónico.
    en: It is interpreted only for T > 0 K, Z > 0, and finite canonical derivatives.
  modelConnection:
    es: Supone equilibrio canónico, volumen fijo y espectro de energías estable mientras varía T.
    en: Assumes canonical equilibrium, fixed volume, and stable energy spectrum while T varies.
  formulaConnection:
    es: 'Conecta con energia_media_desde_derivada_temperatura y energia_media_desde_derivada_beta: U procede de la pendiente de ln Z.'
    en: 'Connects with energia_media_desde_derivada_temperatura and energia_media_desde_derivada_beta: U comes from the slope of ln Z.'
  readingFocus:
    es: Usa la gráfica para responder cómo la función de partición genera la energía media al variar la temperatura.
    en: Use the graph to answer how the partition function generates mean energy as temperature varies.
  agentHints:
    es:
    - Identifica T como variable independiente y U como magnitud dominante.
    - Relaciona la subida de U con activación de microestados de mayor energía.
    - Comprueba que el alumno no confunda pendiente con energía media.
    en:
    - Identify T as independent variable and U as dominant quantity.
    - Relate the rise of U to activation of higher-energy microstates.
    - Check that the student does not confuse slope with mean energy.
  commonMistakes:
    es:
    - Usar grados Celsius en vez de kelvin.
    - Derivar Z directamente en vez de ln Z.
    - Olvidar que el signo absoluto de U depende del cero energético.
    en:
    - Using Celsius instead of kelvin.
    - Differentiating Z directly instead of ln Z.
    - Forgetting that the absolute sign of U depends on the energy zero.
  curveProfile:
    type: increasing_curved
    expectedShape:
      es: Curva creciente con pendiente dependiente del espectro de microestados.
      en: Increasing curve with slope depending on the microstate spectrum.
    keyPoints:
    - x: 1
      y: 0.1
      label:
        es: 'Baja T: dominan estados bajos'
        en: 'Low T: low states dominate'
    - x: 300
      y: 0.8
      label:
        es: 'T intermedia: más estados se activan'
        en: 'Intermediate T: more states activate'
    - x: 600
      y: 1.3
      label:
        es: 'Alta T: aumenta el promedio energético'
        en: 'High T: mean energy rises'
  dataRange:
    xMin: 0
    xMax: 600
    yMin: 0
    yMax: 1.5e-20
    autoScale: true
  recommendedTab: graficas
