version: "1.0"
leaf: "energia-media"
coord:
  id: "energia-media-Coord"
  graphId: "energia-media-Coord"
  type: "Coord"
  graphType: "Coord"
  title:
    es: "Energía media frente a temperatura"
    en: "Average energy versus temperature"
  xAxis:
    es: "Temperatura absoluta T (K)"
    en: "Absolute temperature T (K)"
  yAxis:
    es: "Energía media <E> (J)"
    en: "Average energy <E> (J)"
  xMagnitude: temperatura
  yMagnitude: energia_media
  relation:
    es: "La energía media de una partícula clásica depende linealmente de la temperatura del gas: <E> = (3/2) k_B T."
    en: "The average energy of a classical particle depends linearly on the gas temperature: <E> = (3/2) k_B T."
  physicalReading:
    es: "Al aumentar la temperatura absoluta del gas, la energía media por partícula aumenta en la misma proporción."
    en: "As the absolute gas temperature increases, the average energy per particle increases in the same proportion."
  slopeMeaning:
    es: "La pendiente es (3/2) k_B, la energía media ganada por partícula por cada kelvin adicional."
    en: "The slope is (3/2) k_B, the average energy gained per particle for each additional kelvin."
  interceptMeaning:
    es: "La recta pasa por el origen porque a T = 0 K el modelo ideal predice energía media traslacional nula."
    en: "The line passes through the origin because at T = 0 K the ideal model predicts zero translational average energy."
  curvatureMeaning:
    es: "No hay curvatura: la dependencia física entre energía media y temperatura es proporcional en el modelo clásico."
    en: "There is no curvature: the physical dependence between average energy and temperature is proportional in the classical model."
  signMeaning:
    es: "Solo se representa T >= 0 y <E> >= 0; valores negativos indicarían uso fuera del modelo."
    en: "Only T >= 0 and <E> >= 0 are represented; negative values would indicate use outside the model."
  areaMeaning:
    es: "El área bajo la curva no es la magnitud principal aquí; la lectura clave es la pendiente lineal."
    en: "The area under the curve is not the main quantity here; the key reading is the linear slope."
  domainMeaning:
    es: "La gráfica describe un gas ideal clásico en equilibrio térmico y temperaturas absolutas donde Maxwell-Boltzmann es válido."
    en: "The graph describes a classical ideal gas at thermal equilibrium and absolute temperatures where Maxwell-Boltzmann is valid."
  modelConnection:
    es: "Procede del teorema de equipartición aplicado a tres grados de libertad traslacionales."
    en: "It comes from the equipartition theorem applied to three translational degrees of freedom."
  formulaConnection:
    es: "Usa la fórmula energia_media_particula: energia_media = (3/2)*k_boltzmann*temperatura."
    en: "It uses the formula energia_media_particula: energia_media = (3/2)*k_boltzmann*temperatura."
  readingFocus:
    es: "Responder cómo depende la energía media de la temperatura del gas: comprobar que duplicar T duplica <E>."
    en: "Answer how average energy depends on gas temperature: check that doubling T doubles <E>."
  agentHints:
    es:
      - "Insiste en que la temperatura del eje x está en kelvin, no en grados Celsius."
      - "Relaciona la pendiente con la constante de Boltzmann y el factor tres medios."
      - "Distingue energía media por partícula de energía total del gas."
    en:
      - "Emphasize that the x-axis temperature is in kelvin, not degrees Celsius."
      - "Connect the slope with Boltzmann's constant and the three-halves factor."
      - "Distinguish average energy per particle from total gas energy."
  commonMistakes:
    es:
      - "Leer una relación cuadrática porque aparece T en un contexto térmico."
      - "Pensar que la recta depende de la masa molecular para la energía media traslacional clásica."
      - "Usar Celsius y obtener un corte falso en el eje vertical."
    en:
      - "Reading a quadratic relation because T appears in a thermal context."
      - "Thinking the line depends on molecular mass for classical translational average energy."
      - "Using Celsius and obtaining a false vertical-axis intercept."
  curveProfile:
    type: "linear"
    expectedShape:
      es: "Recta creciente que pasa por el origen."
      en: "Increasing straight line passing through the origin."
    keyPoints:
      - x: 0
        y: 0
        label:
          es: "Cero kelvin ideal"
          en: "Ideal zero kelvin"
      - x: 300
        y: 6.2129205e-21
        label:
          es: "Temperatura ambiente aproximada"
          en: "Approximate room temperature"
      - x: 600
        y: 1.2425841e-20
        label:
          es: "Doble temperatura, doble energía media"
          en: "Double temperature, double average energy"
  dataRange:
    xMin: 0
    xMax: 1000
    yMin: 0
    yMax: 2.0709735e-20
    autoScale: true
  recommendedTab: "graficas"
