    - model_validity
    - graph_reading
  graph_binding:
    channels:
    - dcl
    - svg
    preferred_graph: Dcl
  pedagogical_notes:
    es: desbalance estadístico debe leerse junto con normalización, tasas y estado de equilibrio.
    en: statistical imbalance should be read together with normalization, rates, and equilibrium state.
