    es: Singularidad del calor específico
    en: Specific heat singularity
  equation: calor_especifico=amplitud_calor_especifico*abs(temperatura_reducida)^(-exponente_critico_alpha)
  latex: C=A_C\,|t|^{-\alpha}
  rearrangements:
  - id: amplitud_calor_desde_C
    equation: amplitud_calor_especifico=calor_especifico*(abs(temperatura_reducida)^exponente_critico_alpha)
    latex: A_C=C |t|^\alpha
    target: amplitud_calor_especifico
  category: critical_scaling
  relation_type: power_law
  physical_meaning:
    es: Describe la anomalía del calor específico cerca de una transición continua.
    en: Describes the specific-heat anomaly near a continuous transition.
  constraints:
    es: Usar magnitudes en SI y evaluar suficientemente cerca de la región crítica sin cruzar un régimen no aplicable.
    en: Use SI quantities and evaluate sufficiently near the critical region without crossing into an inapplicable regime.
  validity:
    es: Interpretar como singularidad ideal; en sistemas reales puede aparecer un máximo redondeado.
    en: Interpret as an ideal singularity; real systems may show a rounded maximum.
  dimension_check: J*mol^-1*K^-1
  calculable: true
  motivo_no_calculable:
