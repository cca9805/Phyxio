version: '1.0'
leaf: fermiones
coord:
  id: fermiones-Coord
  graphId: fermiones-Coord
  type: Coord
  graphType: Coord
  title:
    es: Ocupación fermiónica frente a energía
    en: Fermionic occupation versus energy
  xAxis:
    es: Energía del estado E
    en: State energy E
  yAxis:
    es: Ocupación media f(E)
    en: Mean occupation f(E)
  xMagnitude: energia
  yMagnitude: ocupacion_estado
  relation:
    es: 'La gráfica responde cómo el carácter fermiónico limita la ocupación de estados: al aumentar la energía por encima de μ, la ocupación cae desde casi 1 hasta casi 0.'
    en: 'The graph answers how fermionic character limits state occupation: as energy rises above μ, occupation falls from nearly 1 to nearly 0.'
  physicalReading:
    es: Por debajo de μ los estados de menor energía están casi ocupados; por encima de μ, la exclusión de Pauli y la estadística de Fermi-Dirac reducen la ocupación.
    en: Below μ, lower-energy states are nearly occupied; above μ, Pauli exclusion and Fermi-Dirac statistics reduce occupation.
  slopeMeaning:
    es: La pendiente negativa mide lo brusca que es la pérdida de ocupación al cambiar la energía.
    en: The negative slope measures how sharply occupation is lost as energy changes.
  interceptMeaning:
    es: El corte cercano a f=1 en energías bajas recuerda que la ocupación fermiónica está saturada, no ilimitada.
    en: The near f=1 intercept at low energies recalls that fermionic occupation is saturated, not unlimited.
  curvatureMeaning:
    es: La curvatura alrededor de μ muestra el redondeo térmico de la frontera de ocupación.
    en: The curvature around μ shows thermal rounding of the occupation boundary.
  signMeaning:
    es: f(E) nunca es negativa ni supera 1; esos límites expresan la restricción fermiónica.
    en: f(E) is never negative and never exceeds 1; these limits express the fermionic restriction.
  areaMeaning:
    es: El área bajo la curva solo tiene sentido físico si se combina con la densidad de estados.
    en: The area under the curve has physical meaning only when combined with the density of states.
  domainMeaning:
    es: El dominio útil compara E con μ y con la escala térmica k_B*T.
    en: The useful domain compares E with μ and the thermal scale k_B*T.
  modelConnection:
    es: Representa fermiones indistinguibles en equilibrio térmico, con ocupación limitada por la exclusión de Pauli.
    en: It represents indistinguishable fermions in thermal equilibrium, with occupation limited by Pauli exclusion.
  formulaConnection:
    es: La curva sigue f=1/(exp((E-mu)/(k_B*T))+1), por eso E=mu da f=0.5.
    en: The curve follows f=1/(exp((E-mu)/(k_B*T))+1), so E=mu gives f=0.5.
  readingFocus:
    es: Fíjate en cómo la ocupación de estados cambia con la energía y queda limitada por el carácter fermiónico entre 0 y 1.
    en: Focus on how state occupation changes with energy and is limited by fermionic character between 0 and 1.
  agentHints:
    es:
    - Pregunta si el alumno identifica el punto E=μ como f=0.5.
    - Resalta que el eje vertical no puede superar f=1 por exclusión fermiónica.
    - Relaciona el ensanchamiento de la curva con la temperatura absoluta.
    en:
    - Ask whether the student identifies E=μ as f=0.5.
    - Emphasize that the vertical axis cannot exceed f=1 because of fermionic exclusion.
    - Connect the broadening of the curve with absolute temperature.
  commonMistakes:
    es:
    - Pensar que una ocupación f=0.5 significa medio fermión real.
    - Creer que la curva puede subir por encima de 1 si hay muchas partículas.
    - Confundir energía del estado con temperatura del sistema.
    en:
    - Thinking that f=0.5 means half a real fermion.
    - Believing the curve can rise above 1 if there are many particles.
    - Confusing state energy with system temperature.
  curveProfile:
    type: monotonic_decreasing_sigmoid
    expectedShape:
      es: 'Curva decreciente en forma de escalón suavizado: alta ocupación a baja energía y baja ocupación a alta energía.'
      en: 'Decreasing smoothed-step curve: high occupation at low energy and low occupation at high energy.'
    keyPoints:
    - x: -4
      y: 0.982
      label:
        es: 'E muy menor que μ: ocupación casi completa'
        en: 'E far below μ: nearly full occupation'
    - x: 0
      y: 0.5
      label:
        es: 'E = μ: ocupación media 0.5'
        en: 'E = μ: mean occupation 0.5'
    - x: 4
      y: 0.018
      label:
        es: 'E muy mayor que μ: ocupación casi nula'
        en: 'E far above μ: nearly empty occupation'
  dataRange:
    xMin: -5
    xMax: 5
    yMin: 0
    yMax: 1
    autoScale: false
  recommendedTab: graficas
