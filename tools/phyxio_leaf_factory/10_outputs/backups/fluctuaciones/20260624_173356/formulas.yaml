version: 5.0.0
leaf: fluctuaciones
ui:
  default_formula: varianza_energia_desde_particion
formulas:
- id: beta_inversa_termica
  title:
    es: Beta como inversa de la escala térmica
    en: Beta as inverse thermal scale
  equation: beta=1/(constante_boltzmann*temperatura)
  latex: \beta=\frac{1}{k_B T}
  rearrangements:
  - id: beta_inversa_termica_despeje_principal
    equation: beta=1/(constante_boltzmann*temperatura)
    latex: \beta=\frac{1}{k_B T}
    target: beta
  category: termodinamica-estadistica
  relation_type: derived_statistical_relation
  physical_meaning:
    es: Define la variable que endurece la selección de microestados energéticos.
    en: Defines the variable that tightens selection among energy microstates.
  constraints:
    es: Sistema en equilibrio canónico, temperatura absoluta positiva y función de partición definida.
    en: Canonical equilibrium, positive absolute temperature, and a defined partition function.
  validity:
    es: Válida para ensembles canónicos con microestados bien definidos y derivadas suaves de ln(Z).
    en: Valid for canonical ensembles with well-defined microstates and smooth derivatives of ln(Z).
  dimension_check:
    es: El resultado tiene dimensión J^-1.
    en: The result has dimension J^-1.
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - teoria
  - modelos
  - ejemplos
  interpretation_tags:
  - fluctuacion
  - ensemble_canonico
  - derivada
  result_semantics:
    target: beta
    kind: scalar
    sign_meaning:
      es: El signo viene fijado por la respuesta térmica; la varianza no puede ser negativa.
      en: The sign is fixed by thermal response; variance cannot be negative.
    absolute_value_meaning:
      es: Su tamaño mide la intensidad de la dispersión energética alrededor del promedio.
      en: Its size measures the intensity of energy spread around the mean.
  domain_checks:
  - id: beta_inversa_termica_T_positive
    condition: temperatura > 0
    status: ok
    message:
      es: La temperatura absoluta debe ser positiva.
      en: Absolute temperature must be positive.
  coherence_checks:
  - id: beta_inversa_termica_ids_coherent
    condition: all_used_magnitudes_exist
    status: ok
    message:
      es: Las magnitudes usadas deben existir en magnitudes.yaml.
      en: Used quantities must exist in magnitudes.yaml.
  graph_implications:
    es: La pendiente o curvatura frente a temperatura muestra cómo crecen o se atenúan las fluctuaciones.
    en: The slope or curvature versus temperature shows how fluctuations grow or fade.
  pedagogical_triggers:
  - es: Si la varianza sale negativa, revisa signos y derivadas.
    en: If the variance is negative, check signs and derivatives.
  - es: No confundas energía media con fluctuación de energía.
    en: Do not confuse mean energy with energy fluctuation.
- id: energia_media_desde_particion
  title:
    es: Energía media desde la función de partición
    en: Mean energy from the partition function
  equation: energia_media=-derivada_log_particion_beta
  latex: U=-\frac{\partial \ln Z}{\partial \beta}
  rearrangements:
  - id: energia_media_desde_particion_despeje_principal
    equation: energia_media=-derivada_log_particion_beta
    latex: U=-\frac{\partial \ln Z}{\partial \beta}
    target: energia_media
  category: termodinamica-estadistica
  relation_type: derived_statistical_relation
  physical_meaning:
    es: La energía media es la respuesta de ln(Z) al cambiar beta.
    en: Mean energy is the response of ln(Z) to changing beta.
