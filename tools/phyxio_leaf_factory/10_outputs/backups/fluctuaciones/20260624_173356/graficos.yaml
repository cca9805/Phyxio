version: '1.0'
leaf: fluctuaciones
coord:
  id: fluctuaciones-Coord
  graphId: fluctuaciones-Coord
  type: Coord
  graphType: Coord
  title:
    es: Fluctuaciones de energía frente a temperatura
    en: Energy fluctuations versus temperature
  xAxis:
    es: Temperatura absoluta [[temperatura]]
    en: Absolute temperature [[temperatura]]
  yAxis:
    es: Varianza de energía [[varianza_energia]]
    en: Energy variance [[varianza_energia]]
  xMagnitude: temperatura
  yMagnitude: varianza_energia
  relation:
    es: La gráfica responde cómo la función de partición mide las fluctuaciones de energía al variar la temperatura mediante la curvatura estadística y la capacidad calorífica.
    en: The graph answers how the partition function measures energy fluctuations as temperature changes through statistical curvature and heat capacity.
  physicalReading:
    es: Cuando [[temperatura]] aumenta, [[varianza_energia]] suele crecer si aparecen más microestados accesibles; un tramo plano indica fluctuaciones energéticas débiles.
    en: When [[temperatura]] increases, [[varianza_energia]] often grows if more microstates become accessible; a flat segment indicates weak energy fluctuations.
  slopeMeaning:
    es: La pendiente muestra qué tan rápido cambian las fluctuaciones de energía con la temperatura.
    en: The slope shows how fast energy fluctuations change with temperature.
  interceptMeaning:
    es: El corte ideal cerca de cero sugiere fluctuación nula en el límite de temperatura muy baja sin degeneración activa.
    en: The ideal intercept near zero suggests no fluctuation in the very-low-temperature limit without active degeneracy.
  curvatureMeaning:
    es: La curvatura señala cambios en la capacidad calorífica o activación de nuevos niveles energéticos.
    en: Curvature marks changes in heat capacity or activation of new energy levels.
  signMeaning:
    es: '[[varianza_energia]] no debe ser negativa; valores negativos indican error de signo o derivada.'
    en: '[[varianza_energia]] must not be negative; negative values indicate a sign or derivative error.'
  areaMeaning:
    es: El área no es la lectura principal; se priorizan pendiente, curvatura y escala de fluctuación.
    en: Area is not the main reading; slope, curvature, and fluctuation scale are prioritized.
  domainMeaning:
    es: El dominio exige [[temperatura]] positiva, equilibrio canónico y derivadas suaves de ln Z.
    en: The domain requires positive [[temperatura]], canonical equilibrium, and smooth derivatives of ln Z.
  modelConnection:
    es: El modelo conecta dispersión microscópica con respuesta térmica macroscópica en el ensemble canónico.
    en: The model connects microscopic spread with macroscopic thermal response in the canonical ensemble.
  formulaConnection:
    es: Usa {{f:varianza_energia_desde_particion}} y {{f:capacidad_calorifica_fluctuaciones}} para pasar de curvatura estadística a fluctuación observable.
    en: Use {{f:varianza_energia_desde_particion}} and {{f:capacidad_calorifica_fluctuaciones}} to move from statistical curvature to observable fluctuation.
  readingFocus:
    es: Decide si las fluctuaciones de energía crecen, se saturan o revelan una respuesta térmica intensa al variar la temperatura.
    en: Decide whether energy fluctuations grow, saturate, or reveal a strong thermal response as temperature changes.
  agentHints:
    es:
    - Comprueba que la varianza no sea negativa.
    - Relaciona la pendiente con la respuesta térmica.
    - Busca cambios de curvatura como señales de nuevos niveles accesibles.
    en:
    - Check that variance is not negative.
    - Relate the slope to thermal response.
    - Look for curvature changes as signs of newly accessible levels.
  commonMistakes:
    es:
    - Confundir [[energia_media]] con [[varianza_energia]].
    - Leer un valor negativo de varianza como físico.
    - Olvidar que [[temperatura]] debe estar en kelvin.
    en:
    - Confusing [[energia_media]] with [[varianza_energia]].
    - Reading negative variance as physical.
    - Forgetting that [[temperatura]] must be in kelvin.
  curveProfile:
    type: increasing_convex_then_saturating
    expectedShape:
      es: Creciente, con posible curvatura positiva y tendencia a saturar si los niveles accesibles se agotan.
      en: Increasing, with possible positive curvature and saturation if accessible levels are exhausted.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: 'Límite frío: fluctuación mínima'
        en: 'Cold limit: minimal fluctuation'
    - x: 300
      y: 1
      label:
        es: Régimen térmico activo
        en: Active thermal regime
    - x: 1000
      y: 2
      label:
        es: Más niveles accesibles
        en: More accessible levels
  dataRange:
    xMin: 0
    xMax: 1000
    yMin: 0
    yMax: 2
    autoScale: true
  recommendedTab: graficas
