version: '1.0'
leaf: funcion-de-particion-canonica
coord:
  id: funcion-de-particion-canonica-Coord
  graphId: funcion-de-particion-canonica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Suma canónica de pesos frente a energía
    en: Canonical sum of weights versus energy
  xAxis:
    es: Energía del microestado E_i
    en: Microstate energy E_i
  yAxis:
    es: Peso de Boltzmann y contribución a Z
    en: Boltzmann weight and contribution to Z
  xMagnitude: energia_microestado
  yMagnitude: peso_boltzmann
  relation:
    es: La función de partición canónica suma los pesos de Boltzmann de microestados; al aumentar la energía a temperatura
      dada, cada peso aporta menos a Z.
    en: The canonical partition function sums Boltzmann weights of microstates; as energy increases at a given temperature,
      each weight contributes less to Z.
  physicalReading:
    es: 'La gráfica responde cómo Z reúne contribuciones microscópicas: microestados de menor energía pesan más y los de energía
      alta quedan amortiguados por beta.'
    en: 'The graph answers how Z gathers microscopic contributions: lower-energy microstates weigh more and high-energy states
      are damped by beta.'
  slopeMeaning:
    es: La pendiente negativa indica la penalización térmica de los microestados al crecer la energía.
    en: The negative slope indicates thermal penalization of microstates as energy grows.
  interceptMeaning:
    es: En energía de referencia cero, el peso inicial es máximo y fija la escala relativa.
    en: At zero reference energy, the initial weight is maximal and sets the relative scale.
  curvatureMeaning:
    es: La curvatura exponencial muestra que beta controla la rapidez del descenso.
    en: The exponential curvature shows that beta controls the speed of the decrease.
  signMeaning:
    es: Los pesos y Z son no negativos; un valor negativo señalaría error matemático o de escala.
    en: Weights and Z are nonnegative; a negative value would signal a mathematical or scaling error.
  areaMeaning:
    es: El área no representa una magnitud termodinámica directa en el modelo discreto; la suma de puntos sí construye Z.
    en: The area is not a direct thermodynamic quantity in the discrete model; the sum of points builds Z.
  domainMeaning:
    es: La lectura requiere T mayor que cero y un conjunto de microestados accesibles bien definido.
    en: The reading requires T greater than zero and a well-defined set of accessible microstates.
  modelConnection:
    es: 'El gráfico pertenece al ensamble canónico: sistema en contacto térmico con baño a temperatura fija.'
    en: 'The graph belongs to the canonical ensemble: a system in thermal contact with a fixed-temperature bath.'
  formulaConnection:
    es: Se conecta con {{f:peso_boltzmann_canonico}} y {{f:funcion_particion_canonica}}, porque los pesos individuales son
      los términos que se suman en Z.
    en: It connects with {{f:peso_boltzmann_canonico}} and {{f:funcion_particion_canonica}}, because individual weights are
      the terms summed into Z.
  readingFocus:
    es: Lee cómo una temperatura dada convierte diferencias de energía en pesos de Boltzmann que la función de partición canónica
      suma.
    en: Read how a given temperature converts energy differences into Boltzmann weights that the canonical partition function
      sums.
  agentHints:
    es:
    - Comienza identificando energía de microestado, beta y temperatura.
    - Recuerda que Z es suma adimensional, no energía.
    - Relaciona el descenso de la curva con la selección térmica.
    en:
    - Start by identifying microstate energy, beta, and temperature.
    - Remember that Z is a dimensionless sum, not an energy.
    - Relate the curve decrease to thermal selection.
  commonMistakes:
    es:
    - Interpretar un peso individual como probabilidad ya normalizada.
    - Olvidar que T debe estar en kelvin.
    - Sumar energías en vez de pesos de Boltzmann para obtener Z.
    en:
    - Reading an individual weight as an already normalized probability.
    - Forgetting that T must be in kelvin.
    - Summing energies instead of Boltzmann weights to obtain Z.
  curveProfile:
    type: exponential_decay
    expectedShape:
      es: Descenso exponencial de los pesos al aumentar la energía para beta positiva.
      en: Exponential decay of weights as energy increases for positive beta.
    keyPoints:
    - x: 0
      y: 1
      label:
        es: Peso máximo de referencia
        en: Maximum reference weight
    - x: 5
      y: 0.007
      label:
        es: Contribución alta energía casi apagada
        en: High-energy contribution nearly suppressed
  dataRange:
    xMin: 0
    xMax: 5
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
