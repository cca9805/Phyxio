version: 5.0.0
magnitudes:
- id: temperatura
  symbol: T
  nombre:
    es: temperatura absoluta
    en: absolute temperature
  descripcion:
    es: Variable térmica que fija la intensidad de la agitación microscópica.
    en: Thermal variable setting the strength of microscopic agitation.
  unidad_si: K
  dimension: Theta
  is_vector: false
  components: []
  category: input_parameter
  physical_role: concepto físico
  used_in:
  - beta_inversa_termica
  common_mistake: T debe ser mayor que cero en kelvin.
  typical_range: Depende de la escala energética microscópica del sistema.
  sign_behavior:
    has_sign: false
    meaning:
      es: Los pesos, Z y probabilidades son no negativos; la energía depende del cero elegido.
      en: Weights, Z, and probabilities are nonnegative; energy depends on the chosen zero.
  zero_behavior:
    allowed: false
    meaning:
      es: Cero puede indicar ausencia de contribución o referencia energética, salvo T, k_B, beta y Z en el dominio canónico.
      en: Zero may indicate no contribution or an energy reference, except T, k_B, beta, and Z in the canonical domain.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: positivo
  interpretation_role:
    primary_for:
    - beta_inversa_termica
    secondary_for: []
  graph_binding:
    preferred_graph: Coord
    channels:
    - xAxis
    - parameter
    reading:
      es: Úsala para leer cómo cambia la suma canónica al modificar energía o temperatura.
      en: Use it to read how the canonical sum changes when energy or temperature changes.
  pedagogical_notes:
    es: Conviene leer esta magnitud junto con su papel en la normalización canónica.
    en: This quantity should be read together with its role in canonical normalization.
