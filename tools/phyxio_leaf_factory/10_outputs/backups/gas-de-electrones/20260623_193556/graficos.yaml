version: '1.0'
leaf: gas-de-electrones
coord:
  id: gas-de-electrones-Coord
  graphId: gas-de-electrones-Coord
  type: Coord
  graphType: Coord
  title:
    es: Energía de Fermi frente a densidad electrónica
    en: Fermi energy versus electron density
  xAxis:
    es: Densidad electrónica [[densidad_electronica]]
    en: Electron density [[densidad_electronica]]
  yAxis:
    es: Energía de Fermi [[energia_fermi]]
    en: Fermi energy [[energia_fermi]]
  xMagnitude: densidad_electronica
  yMagnitude: energia_fermi
  relation:
    es: 'La gráfica responde cómo la [[densidad_electronica]] determina la [[energia_fermi]]: al aumentar la densidad, la
      exclusión de Pauli obliga a ocupar estados de mayor energía.'
    en: 'The graph answers how [[densidad_electronica]] determines [[energia_fermi]]: as density increases, Pauli exclusion
      forces higher-energy states to be occupied.'
  physicalReading:
    es: En un gas de electrones, una mayor [[densidad_electronica]] comprime los estados disponibles en el espacio de momentos
      y eleva la [[energia_fermi]], aunque con crecimiento sublineal.
    en: In an electron gas, larger [[densidad_electronica]] packs available momentum states more tightly and raises [[energia_fermi]],
      though with sublinear growth.
  slopeMeaning:
    es: La pendiente positiva indica cuánto cambia la [[energia_fermi]] al aumentar la [[densidad_electronica]] localmente;
      disminuye suavemente porque la ley es de potencia 2/3.
    en: The positive slope indicates how [[energia_fermi]] changes when [[densidad_electronica]] increases locally; it slowly
      decreases because the power law is 2/3.
  interceptMeaning:
    es: El origen ideal representa densidad nula y energía de Fermi nula; no describe un material real conductor.
    en: The ideal origin represents zero density and zero Fermi energy; it does not describe a real conducting material.
  curvatureMeaning:
    es: La curvatura cóncava hacia abajo muestra que duplicar la densidad electrónica no duplica la energía de Fermi.
    en: The concave-down curvature shows that doubling electron density does not double Fermi energy.
  signMeaning:
    es: La [[energia_fermi]] aparece positiva para [[densidad_electronica]] positiva dentro del modelo de gas libre.
    en: '[[energia_fermi]] is positive for positive [[densidad_electronica]] within the free-gas model.'
  areaMeaning:
    es: El área bajo la curva no es la magnitud principal; la lectura relevante es la dependencia de escala entre densidad
      y energía.
    en: The area under the curve is not the main quantity; the relevant reading is the scale dependence between density and
      energy.
  domainMeaning:
    es: El dominio útil exige [[densidad_electronica]] positiva, electrones no relativistas y temperatura mucho menor que
      [[temperatura_fermi]].
    en: The useful domain requires positive [[densidad_electronica]], nonrelativistic electrons, and temperature much lower
      than [[temperatura_fermi]].
  modelConnection:
    es: La curva procede del llenado de estados fermiónicos en un gas ideal tridimensional de electrones libres.
    en: The curve comes from filling fermionic states in a three-dimensional ideal gas of free electrons.
  formulaConnection:
    es: Usa la relación {{f:energia_fermi_gas_electrones_3d}} y se compara térmicamente mediante {{f:temperatura_fermi_gas_electrones}}.
    en: It uses {{f:energia_fermi_gas_electrones_3d}} and is thermally compared through {{f:temperatura_fermi_gas_electrones}}.
  readingFocus:
    es: Lee si una variación de [[densidad_electronica]] en el gas de electrones cambia mucho o poco la [[energia_fermi]]
      y, por tanto, la ocupación de estados.
    en: Read whether a change in [[densidad_electronica]] in the electron gas changes [[energia_fermi]] strongly or weakly
      and therefore state occupation.
  agentHints:
    es:
    - Identifica primero [[densidad_electronica]] como variable independiente.
    - Relaciona la subida de [[energia_fermi]] con la exclusión de Pauli.
    - Comprueba que el crecimiento no sea lineal sino proporcional a una potencia 2/3.
    en:
    - First identify [[densidad_electronica]] as the independent variable.
    - Relate the rise of [[energia_fermi]] to Pauli exclusion.
    - Check that the growth is not linear but proportional to a 2/3 power.
  commonMistakes:
    es:
    - Leer la curva como proporcionalidad lineal entre densidad y energía.
    - Confundir [[energia_fermi]] con temperatura real del material.
    - Usar densidad total de masa en lugar de [[densidad_electronica]].
    en:
    - Reading the curve as a linear proportionality between density and energy.
    - Confusing [[energia_fermi]] with the material's actual temperature.
    - Using total mass density instead of [[densidad_electronica]].
  curveProfile:
    type: power_law_concave_down
    expectedShape:
      es: Creciente cóncava hacia abajo, proporcional a [[densidad_electronica]] elevada a 2/3.
      en: Increasing and concave downward, proportional to [[densidad_electronica]] to the 2/3 power.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Límite ideal sin electrones libres
        en: Ideal limit with no free electrons
    - x: 1
      y: 1
      label:
        es: Referencia normalizada de densidad y energía
        en: Normalized density and energy reference
    - x: 8
      y: 4
      label:
        es: Ocho veces la densidad da cuatro veces la energía
        en: Eight times the density gives four times the energy
  dataRange:
    xMin: 0
    xMax: 10
    yMin: 0
    yMax: 5
    autoScale: true
  recommendedTab: graficas
