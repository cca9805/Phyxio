  typical_range: 10^-18 a 10^-3 m^3 según muestra
  sign_behavior:
    has_sign: false
    meaning:
      es: none
      en: none
  zero_behavior:
    allowed: false
    meaning:
      es: zero volume is not valid
      en: zero volume is not valid
  value_nature:
    kind: positive_scalar
    nonnegative_only: true
    expected_interval: V>0
  interpretation_role:
    primary_for:
    - coherence
    secondary_for:
    - densidad_electronica
  graph_binding:
    channels:
    - none
    preferred_graph: none
  pedagogical_notes:
    es: En el gas de electrones, volumen debe leerse dentro del llenado fermiónico y no como una variable clásica aislada.
    en: In the electron gas, volume must be read within fermionic filling, not as an isolated classical variable.
