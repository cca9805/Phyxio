version: 5.0.0
leaf: hipotesis-fundamental
formulas:
- id: postulado_equiprobabilidad_microcanonica
  title:
    es: Postulado de equiprobabilidad microcanónica
    en: Microcanonical equiprobability postulate
  equation: probabilidad_microestado=1/numero_microestados_accesibles
  latex: p_i=\frac{1}{\Omega}
  rearrangements:
  - id: postulado_equiprobabilidad_microcanonica_main
    target: probabilidad_microestado
    equation: probabilidad_microestado=1/numero_microestados_accesibles
    latex: p_i=\frac{1}{\Omega}
  category: statistical_thermodynamics
  relation_type: definition
  physical_meaning:
    es: Cada microestado accesible recibe la misma probabilidad en equilibrio aislado.
    en: Each accessible microstate receives the same probability at isolated equilibrium.
  constraints:
    es: Sistema aislado en equilibrio con energía, volumen y número de partículas fijados.
    en: Isolated equilibrium system with fixed energy, volume, and particle number.
  validity:
    es: Válida para microestados accesibles sin sesgo persistente y con muestreo ergódico efectivo.
    en: Valid for accessible microstates without persistent bias and with effective ergodic sampling.
  dimension_check:
    es: Las probabilidades y conteos son adimensionales; la entropía queda en J/K.
    en: Probabilities and counts are dimensionless; entropy is in J/K.
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - probabilidad_microestado
  - numero_microestados_accesibles
  interpretation_tags:
  - microcanonico
  - equiprobabilidad
  - equilibrio
  result_semantics:
    target: probabilidad_microestado
    kind: scalar
    sign_meaning:
      es: No representa dirección; debe respetar el dominio físico de la magnitud.
      en: It does not represent direction; it must respect the physical domain of the quantity.
    absolute_value_meaning:
      es: Mide la escala estadística o termodinámica del resultado.
      en: It measures the statistical or thermodynamic scale of the result.
  domain_checks:
  - id: postulado_equiprobabilidad_microcanonica_domain
    condition:
      es: Incluir solo microestados compatibles con las restricciones macroscópicas.
      en: Include only microstates compatible with macroscopic constraints.
    status: warning
  coherence_checks:
  - id: postulado_equiprobabilidad_microcanonica_coherence
    condition:
      es: Las probabilidades no pueden ser negativas y deben normalizarse.
      en: Probabilities cannot be negative and must be normalized.
    status: ok
  graph_implications:
    es: La equiprobabilidad se visualiza como probabilidad uniforme frente al índice de microestado.
    en: Equiprobability is visualized as uniform probability versus microstate index.
  pedagogical_triggers:
  - es: Revisa si el alumno confunde microestados equiprobables con macroestados equiprobables.
    en: Check whether the student confuses equiprobable microstates with equiprobable macrostates.
