- id: probabilidad_macroestado_desde_multiplicidad
  title:
    es: Probabilidad de macroestado desde multiplicidad
    en: Macrostate probability from multiplicity
  equation: probabilidad_microestado=multiplicidad_macroestado/numero_microestados_accesibles
  latex: P(M)=\frac{\Omega_M}{\Omega}
  rearrangements:
  - id: probabilidad_macroestado_desde_multiplicidad_main
    target: probabilidad_microestado
    equation: probabilidad_microestado=multiplicidad_macroestado/numero_microestados_accesibles
    latex: P(M)=\frac{\Omega_M}{\Omega}
  category: statistical_thermodynamics
  relation_type: definition
  physical_meaning:
