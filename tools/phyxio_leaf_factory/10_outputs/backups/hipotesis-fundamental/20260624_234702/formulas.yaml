    es: Desbalance frente a equiprobabilidad
    en: Imbalance relative to equiprobability
  equation: desbalance_probabilidad=probabilidad_microestado-(1/numero_microestados_accesibles)
  latex: D=p_i-\frac{1}{\Omega}
  rearrangements:
