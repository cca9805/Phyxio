version: '1.0'
leaf: hipotesis-fundamental
coord:
  id: hipotesis-fundamental-Coord
  graphId: hipotesis-fundamental-Coord
  type: Coord
  graphType: Coord
  title:
    es: Equiprobabilidad de microestados accesibles
    en: Equiprobability of accessible microstates
  xAxis:
    es: Microestado accesible o [[desbalance_probabilidad]]
    en: Accessible microstate or [[desbalance_probabilidad]]
  yAxis:
    es: '[[probabilidad_microestado]]'
    en: '[[probabilidad_microestado]]'
  xMagnitude: desbalance_probabilidad
  yMagnitude: probabilidad_microestado
  relation:
    es: La hipótesis fundamental asigna la misma [[probabilidad_microestado]] a cada microestado accesibles
      de un sistema aislado en equilibrio.
    en: The fundamental hypothesis assigns the same [[probabilidad_microestado]] to all accessible microstates of
      an isolated system at equilibrium.
  physicalReading:
    es: La línea horizontal indica equiprobabilidad; una pendiente revelaría desbalance, microestados no equivalentes
      o una restricción oculta.
    en: The horizontal line indicates equiprobability; a slope would reveal imbalance, nonequivalent microstates,
      or a hidden constraint.
  slopeMeaning:
    es: Pendiente nula significa ausencia de sesgo entre microestados accesibles.
    en: Zero slope means absence of bias among accessible microstates.
  interceptMeaning:
    es: El valor vertical es la probabilidad común determinada por Ω.
    en: The vertical value is the common probability determined by Ω.
  curvatureMeaning:
    es: Curvatura nula corresponde al postulado ideal; curvatura marca familias de accesibilidad distinta.
    en: Zero curvature corresponds to the ideal postulate; curvature marks families with different accessibility.
  signMeaning:
    es: La probabilidad no es negativa; el desbalance puede tener signo según la referencia elegida.
    en: Probability is nonnegative; imbalance can have sign based on on the chosen reference.
  areaMeaning:
    es: La suma discreta de probabilidades representa la normalización total.
    en: The discrete sum of probabilities represents total normalization.
  domainMeaning:
    es: Incluye solo microestados compatibles con [[energia_total]], [[volumen]] y [[numero_particulas]].
    en: Include only microstates compatible with [[energia_total]], [[volumen]], and [[numero_particulas]].
  modelConnection:
    es: El gráfico conecta la hipótesis fundamental con equilibrio aislado y conteo microcanónico.
    en: The graph connects the fundamental hypothesis with isolated equilibrium and microcanonical counting.
  formulaConnection:
    es: Lectura asociada a {{f:postulado_equiprobabilidad_microcanonica}} y {{f:normalizacion_microestados_accesibles}}.
    en: Reading associated with {{f:postulado_equiprobabilidad_microcanonica}} and {{f:normalizacion_microestados_accesibles}}.
  readingFocus:
    es: 'Comprueba si la [[probabilidad_microestado]] permanece constante al recorrer microestados accesibles: eso
      responde por qué se asigna la misma probabilidad.'
    en: 'Check whether [[probabilidad_microestado]] stays constant across accessible microstates: this answers why
      the same probability is assigned.'
  agentHints:
    es:
    - Identifica las restricciones macroscópicas antes de contar.
    - Comprueba que cada estado sean accesibles.
    - Lee la horizontalidad como equiprobabilidad.
    en:
    - Identify macroscopic constraints before counting.
    - Check that all states are accessible.
    - Read horizontality as equiprobability.
  commonMistakes:
    es:
    - Incluir microestados inaccesibles.
    - Confundir microestados con macroestados.
    - Olvidar la normalización de probabilidades.
    en:
    - Including inaccessible microstates.
    - Confusing microstates with macrostates.
    - Forgetting probability normalization.
  curveProfile:
    type: horizontal
    expectedShape:
      es: Línea horizontal de probabilidad común.
      en: Horizontal line of common probability.
    keyPoints:
    - x: 0
      y: 0.2
      label:
        es: primer microestado accesible
        en: first accessible microstate
    - x: 5
      y: 0.2
      label:
        es: misma probabilidad
        en: same probability
  dataRange:
    xMin: 0
    xMax: 5
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
