version: 5.0.0
leaf: hipotesis-fundamental
magnitudes:
- id: numero_microestados_accesibles
  symbol: Ω
  nombre:
    es: número de microestados accesibles
    en: number of accessible microstates
  descripcion:
    es: Cantidad de microestados compatibles con restricciones macroscópicas fijas.
    en: Number of microstates compatible with fixed macroscopic constraints.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: count
  physical_role:
    es: conteo estadístico
    en: conteo estadístico
  used_in:
  - postulado_equiprobabilidad_microcanonica
  - normalizacion_microestados_accesibles
  - entropia_boltzmann_microcanonica
  - probabilidad_macroestado_desde_multiplicidad
  - desbalance_frente_equiprobabilidad
  common_mistake:
    es: Usarla sin comprobar qué microestados son realmente accesibles.
    en: Using it without checking which microstates are truly accessible.
  typical_range: Ω ≥ 1
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo solo tiene sentido para desviaciones respecto a la equiprobabilidad.
      en: The sign only has meaning for deviations from equiprobability.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica ausencia, referencia o equilibrio exacto según la magnitud.
      en: Zero indicates absence, reference, or exact balance based on on the quantity.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: Ω ≥ 1
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - model_validity
  graph_binding:
    enabled: true
    channels:
    - parameter
  pedagogical_notes:
    es: Relaciona esta magnitud con restricciones macroscópicas y conteo de microestados.
    en: Relate this quantity to macroscopic constraints and microstate counting.
