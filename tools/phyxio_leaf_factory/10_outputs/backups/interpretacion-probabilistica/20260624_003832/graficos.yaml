version: '1.0'
leaf: interpretacion-probabilistica
coord:
  id: interpretacion-probabilistica-Coord
  graphId: interpretacion-probabilistica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Probabilidad de macroestado frente a microestados accesibles
    en: Macrostate probability versus accessible microstates
  xAxis:
    es: Microestados del macroestado Omega_macro
    en: Macrostate microstates Omega_macro
  yAxis:
    es: Probabilidad P_macro
    en: Probability P_macro
  xMagnitude: numero_microestados_macro
  yMagnitude: probabilidad_macroestado
  relation:
    es: 'La interpretación probabilística conecta la probabilidad de un macroestado con sus microestados accesibles: si Omega_total
      es fijo, P_macro aumenta linealmente con Omega_macro.'
    en: 'The probabilistic interpretation connects a macrostate probability with its accessible microstates: if Omega_total
      is fixed, P_macro increases linearly with Omega_macro.'
  physicalReading:
    es: Cada punto responde cuánta parte del espacio microscópico accesible pertenece al macroestado; más microestados accesibles
      implican mayor probabilidad.
    en: Each point answers what fraction of the accessible microscopic space belongs to the macrostate; more accessible microstates
      imply higher probability.
  slopeMeaning:
    es: La pendiente representa 1/Omega_total y mide cuánto crece la probabilidad por cada microestado añadido al macroestado.
    en: The slope represents 1/Omega_total and measures how much probability grows per microstate added to the macrostate.
  interceptMeaning:
    es: El origen indica que un macroestado sin microestados accesibles tiene probabilidad nula.
    en: The origin indicates that a macrostate with no accessible microstates has zero probability.
  curvatureMeaning:
    es: La recta no tiene curvatura mientras Omega_total permanezca constante.
    en: The line has no curvature while Omega_total remains constant.
  signMeaning:
    es: La probabilidad y los conteos de microestados no pueden ser negativos.
    en: Probability and microstate counts cannot be negative.
  areaMeaning:
    es: El área bajo la recta no representa una magnitud termodinámica directa en este leaf.
    en: The area under the line does not represent a direct thermodynamic quantity in this leaf.
  domainMeaning:
    es: Solo tiene sentido para 0 <= Omega_macro <= Omega_total y 0 <= P_macro <= 1.
    en: It only makes sense for 0 <= Omega_macro <= Omega_total and 0 <= P_macro <= 1.
  modelConnection:
    es: La gráfica supone microestados equiprobables y un espacio accesible total fijo.
    en: The graph assumes equiprobable microstates and a fixed total accessible space.
  formulaConnection:
    es: Representa {{f:probabilidad_macroestado}} y prepara la lectura logarítmica de {{f:probabilidad_entropia}}.
    en: It represents {{f:probabilidad_macroestado}} and prepares the logarithmic reading of {{f:probabilidad_entropia}}.
  readingFocus:
    es: Lee cómo la probabilidad del macroestado depende de los microestados accesibles, no como una propiedad aislada del
      dibujo.
    en: Read how macrostate probability depends on accessible microstates, not as an isolated property of the drawing.
  agentHints:
    es:
    - Comprueba que Omega_total se mantiene fijo.
    - Relaciona mayor multiplicidad con mayor probabilidad.
    - Verifica que la probabilidad no supere 1.
    en:
    - Check that Omega_total remains fixed.
    - Relate larger multiplicity to larger probability.
    - Verify that probability does not exceed 1.
  commonMistakes:
    es:
    - Confundir microestados con macrostados.
    - Leer la pendiente sin considerar Omega_total.
    - Aceptar probabilidades mayores que 1.
    en:
    - Confusing microstates with macrostates.
    - Reading the slope without considering Omega_total.
    - Accepting probabilities greater than 1.
  curveProfile:
    type: linear
    expectedShape:
      es: Recta creciente desde el origen hasta P_macro=1 cuando Omega_macro=Omega_total.
      en: Increasing straight line from the origin to P_macro=1 when Omega_macro=Omega_total.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Macroestado imposible
        en: Impossible macrostate
    - x: 100
      y: 1
      label:
        es: Todo el espacio accesible
        en: Entire accessible space
  dataRange:
    xMin: 0
    xMax: 100
    yMin: 0
    yMax: 1
    autoScale: false
  recommendedTab: graficas
svg:
  id: interpretacion-probabilistica-Svg
  graphId: interpretacion-probabilistica-Svg
  type: Svg
  graphType: Svg
  title:
    es: Mapa de microestados y peso probabilístico
    en: Microstate map and probabilistic weight
  sceneId: microstate_macrostate_partition
  sceneLabel:
    es: Partición de microestados en macrostados
    en: Partition of microstates into macrostates
  objects:
    es:
    - Espacio total de microestados
    - Regiones de macroestado
    - Microestados compatibles resaltados
    en:
    - Total microstate space
    - Macrostate regions
    - Highlighted compatible microstates
  mainObject: macrostate_region
  referenceFrame:
    es: Espacio discreto de configuraciones microscópicas accesibles.
    en: Discrete space of accessible microscopic configurations.
  geometry:
    es: Un rectángulo representa Omega_total y una región interior representa Omega_macro.
    en: A rectangle represents Omega_total and an inner region represents Omega_macro.
  interactions:
    es:
    - Aumentar la región del macroestado aumenta P_macro.
    - Comparar dos regiones muestra el cociente de probabilidades.
    en:
    - Increasing the macrostate region increases P_macro.
    - Comparing two regions shows the probability ratio.
  modelElements:
    es:
    - Microestados equiprobables
    - Macroestado como conjunto de microestados
    - Normalización por el total accesible
    en:
    - Equiprobable microstates
    - Macrostate as a set of microstates
    - Normalization by the accessible total
  visualCues:
    es:
    - Área sombreada proporcional a Omega_macro
    - Borde exterior como Omega_total
    - Etiquetas de probabilidad normalizada
    en:
    - Shaded area proportional to Omega_macro
    - Outer boundary as Omega_total
    - Normalized probability labels
  scaleMeaning:
    es: El tamaño visual representa conteo relativo de microestados, no distancia espacial real.
    en: Visual size represents relative microstate count, not real spatial distance.
  relation:
    es: La escena muestra cómo la interpretación probabilística asigna más probabilidad al macroestado con más microestados
      accesibles.
    en: The scene shows how probabilistic interpretation assigns higher probability to the macrostate with more accessible
      microstates.
  physicalReading:
    es: Un macroestado amplio en el mapa no es más probable por su nombre, sino porque contiene más configuraciones microscópicas
      compatibles.
    en: A larger macrostate in the map is not more probable because of its name, but because it contains more compatible microscopic
      configurations.
  modelConnection:
    es: La lectura visual depende de la hipótesis de microestados equiprobables.
    en: The visual reading depends on the assumption of equiprobable microstates.
  formulaConnection:
    es: La fracción sombreada corresponde a {{f:probabilidad_macroestado}} y la comparación entre regiones a {{f:peso_relativo_macroestados}}.
    en: The shaded fraction corresponds to {{f:probabilidad_macroestado}} and the comparison between regions to {{f:peso_relativo_macroestados}}.
  readingFocus:
    es: Distingue probabilidad de macroestado, microestados accesibles y normalización total.
    en: Distinguish macrostate probability, accessible microstates, and total normalization.
  agentHints:
    es:
    - Señala qué región representa el macroestado.
    - Pregunta si todos los microestados pesan igual.
    - Conecta tamaño relativo con probabilidad normalizada.
    en:
    - Point out which region represents the macrostate.
    - Ask whether all microstates have equal weight.
    - Connect relative size with normalized probability.
  commonMistakes:
    es:
    - Pensar que un dibujo más grande significa volumen real.
    - Olvidar que el total accesible normaliza la probabilidad.
    - Comparar regiones de sistemas distintos.
    en:
    - Thinking a larger drawing means real volume.
    - Forgetting that the accessible total normalizes probability.
    - Comparing regions from different systems.
  animationTriggers:
  - id: increase_macro_region
    label:
      es: Aumentar Omega_macro
      en: Increase Omega_macro
    effect:
      es: La región sombreada crece y también P_macro.
      en: The shaded region grows and P_macro also grows.
  interactiveElements:
  - id: toggle_relative_comparison
    label:
      es: Comparar dos macrostados
      en: Compare two macrostates
    effect:
      es: Muestra el cociente de microestados y de probabilidades.
      en: Shows the microstate and probability ratio.
  recommendedTab: graficas
