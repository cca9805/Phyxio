version: 5.0.0
leaf: interpretacion-probabilistica
magnitudes:
- id: probabilidad_macroestado
  symbol: P_macro
  nombre:
    es: probabilidad del macroestado
    en: macrostate probability
  descripcion:
    es: Fracción de microestados accesibles que corresponden al macroestado observado.
    en: Fraction of accessible microstates corresponding to the observed macrostate.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: termodinamica-estadistica
  physical_role: resultado
  used_in:
  - probabilidad_macroestado
  common_mistake:
    es: Tratar esta magnitud como un número sin revisar normalización, dominio y modelo de microestados.
    en: Treating this quantity as a bare number without checking normalization, domain, and microstate model.
  typical_range: 0 a 1
  sign_behavior:
    has_sign: false
    meaning:
      es: Solo delta_entropia puede tener signo; las probabilidades y multiplicidades no son negativas.
      en: Only delta_entropia may carry sign; probabilities and multiplicities are non-negative.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica macroestado imposible o cambio entrópico nulo según la magnitud.
      en: Zero means an impossible macrostate or zero entropy change depending on the quantity.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: 0 a 1
  interpretation_role:
    primary_for:
    - probabilidad_macroestado
    secondary_for:
    - interpretation
    - graph_reading
  graph_binding:
    enabled: true
    channels:
    - yAxis
  pedagogical_notes:
    es: Úsala siempre dentro de un espacio de microestados definido; la comparación sin sistema común puede engañar.
    en: Use it only inside a defined microstate space; comparison without a common system can mislead.
