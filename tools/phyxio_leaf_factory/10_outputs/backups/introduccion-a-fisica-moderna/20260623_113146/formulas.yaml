version: 5.0.0
ui:
  default_formula: energia_foton
formulas:
- id: energia_foton
  title:
    es: Energía de un fotón
    en: Photon energy
  equation: energia_cuantizada = constante_planck * frecuencia
  latex: E = h \cdot f
  magnitudes:
  - energia_cuantizada
  - constante_planck
  - frecuencia
  category: ley_fundamental
  relation_type: definition
  physical_meaning:
    es: La energía de un fotón crece con su frecuencia.
    en: Photon energy grows with frequency.
  constraints:
    es:
    - Usar unidades SI.
    - Aplicar dentro del régimen físico indicado.
    en:
    - Use SI units.
    - Apply within the indicated physical regime.
  validity:
    es: Válida para fenómenos donde la física moderna revela cuantización energética.
    en: Valid for phenomena where modern physics reveals energy quantization.
  dimension_check: '[M L^2 T^-1] * [T^-1] = [M L^2 T^-2]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - analisis_cuantizacion
  - limite_clasico
  interpretation_tags:
  - fisica_moderna
  - cuantizacion
  - escala_energia
  result_semantics:
    target: energia_cuantizada
    kind: energy
    sign_meaning:
      es: El signo sigue la referencia energética elegida.
      en: The sign follows the chosen energy reference.
    absolute_value_meaning:
      es: El valor absoluto mide la escala física relevante.
      en: The absolute value measures the relevant physical scale.
  domain_checks:
  - id: energia_foton_dominio
    condition: magnitudes_en_dominio_fisico
    message:
      es: Las magnitudes deben pertenecer al dominio físico del modelo.
      en: Quantities must belong to the model physical domain.
  coherence_checks:
  - id: energia_foton_dimensional
    condition: dimension_check_ok
    message:
      es: La dimensión final debe coincidir con la magnitud objetivo.
      en: The final dimension must match the target quantity.
  graph_implications:
  - es: La escena Svg debe mostrar el paso de continuo clásico a niveles discretos.
    en: The Svg scene must show the transition from classical continuum to discrete
      levels.
  pedagogical_triggers:
  - es: No confundir cuantización con imprecisión experimental.
    en: Do not confuse quantization with experimental imprecision.
  rearrangements:
  - target: energia_cuantizada
    equation: energia_cuantizada = constante_planck * frecuencia
    latex: E = h \cdot f
  - target: constante_planck
    equation: constante_planck = energia_cuantizada / frecuencia
    latex: h = \frac{E}{f}
  - target: frecuencia
    equation: frecuencia = energia_cuantizada / constante_planck
    latex: f = \frac{E}{h}
