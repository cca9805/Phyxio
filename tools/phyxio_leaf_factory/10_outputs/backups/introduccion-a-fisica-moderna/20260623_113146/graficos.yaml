version: '1.0'
leaf: introduccion-a-fisica-moderna
svg:
  id: introduccion-a-fisica-moderna-Svg
  graphId: introduccion-a-fisica-moderna-Svg
  type: Svg
  graphType: Svg
  title:
    es: Escena SVG · Del continuo clásico a la energía cuantizada
    en: SVG scene · From classical continuum to quantized energy
  sceneId: modern_physics_quantization_bridge
  sceneLabel:
    es: Puente entre onda clásica, fotón y niveles discretos
    en: Bridge between classical wave, photon, and discrete levels
  objects:
    es:
    - onda clásica continua
    - fotón asociado a frecuencia
    - escalera de niveles de energía
    - flecha de transición cuántica
    en:
    - continuous classical wave
    - photon associated with frequency
    - energy-level ladder
    - quantum transition arrow
  mainObject: energia_cuantizada
  referenceFrame:
    es: Comparación conceptual entre física clásica continua y física moderna discreta.
    en: Conceptual comparison between continuous classical physics and discrete modern
      physics.
  geometry:
    es: Zona izquierda continua y zona derecha con niveles energéticos discretos.
    en: Left continuous zone and right zone with discrete energy levels.
  interactions:
    es:
    - La frecuencia de la onda se conecta con la energía del fotón.
    - La transición entre niveles muestra absorción o emisión cuantizada.
    - El cociente cuántico-clásico indica cuándo el continuo clásico es buena aproximación.
    en:
    - Wave frequency connects with photon energy.
    - The transition between levels shows quantized absorption or emission.
    - The quantum-classical ratio indicates when the classical continuum is a good
      approximation.
  modelElements:
    es:
    - '{{f:energia_foton}}'
    - '{{f:longitud_onda_foton}}'
    - '{{f:energia_cuantizada_nivel}}'
    - '{{f:limite_clasico_cuanto_relativo}}'
    en:
    - '{{f:energia_foton}}'
    - '{{f:longitud_onda_foton}}'
    - '{{f:energia_cuantizada_nivel}}'
    - '{{f:limite_clasico_cuanto_relativo}}'
  visualCues:
    es:
    - Mayor frecuencia implica mayor [[energia_cuantizada]].
    - Niveles más separados hacen visible la cuantización.
    - Si [[cociente_cuantico_clasico]] es pequeño, aparece el límite clásico.
    en:
    - Higher frequency implies higher [[energia_cuantizada]].
    - Larger level spacing makes quantization visible.
    - If [[cociente_cuantico_clasico]] is small, the classical limit appears.
  scaleMeaning:
    es: La escala compara cuantos microscópicos con energías clásicas macroscópicas.
    en: The scale compares microscopic quanta with macroscopic classical energies.
  relation:
    es: 'La escena muestra por qué la cuantización de la energía obliga a ampliar
      la física clásica: la energía aparece en paquetes y niveles discretos.'
    en: 'The scene shows why energy quantization forces an extension of classical
      physics: energy appears in packets and discrete levels.'
  physicalReading:
    es: Lee la onda como descripción clásica y los escalones como estados modernos
      permitidos; algunas energías intermedias no son accesibles.
    en: Read the wave as a classical description and the steps as allowed modern states;
      some intermediate energies are not accessible.
  modelConnection:
    es: Conecta el continuo clásico con la física moderna mediante [[energia_cuantizada]],
      [[frecuencia]] y [[constante_planck]].
    en: Connects the classical continuum with modern physics through [[energia_cuantizada]],
      [[frecuencia]], and [[constante_planck]].
  formulaConnection:
    es: La escena se apoya en {{f:energia_foton}} y {{f:energia_cuantizada_nivel}}.
    en: The scene relies on {{f:energia_foton}} and {{f:energia_cuantizada_nivel}}.
  readingFocus:
    es: Fíjate en cómo [[frecuencia]] controla [[energia_cuantizada]] y cuándo [[cociente_cuantico_clasico]]
      separa régimen moderno y límite clásico.
    en: Focus on how [[frecuencia]] controls [[energia_cuantizada]] and when [[cociente_cuantico_clasico]]
      separates modern regime and classical limit.
  agentHints:
    es:
    - Relaciona frecuencia, fotón y energía cuantizada.
    - Explica que la cuantización no es falta de precisión.
    - Usa la separación entre niveles para justificar la física moderna.
    en:
    - Relate frequency, photon, and quantized energy.
    - Explain that quantization is not lack of precision.
    - Use level spacing to justify modern physics.
  commonMistakes:
    es:
    - Pensar que un cuanto es una porción arbitraria.
    - Creer que la física clásica es inútil en todos los casos.
    - Confundir longitud de onda con energía sin frecuencia.
    en:
    - Thinking a quantum is an arbitrary portion.
    - Believing classical physics is useless in every case.
    - Confusing wavelength with energy without frequency.
  animationTriggers:
  - increase_frequency
  - show_level_transition
  - compare_classical_limit
  interactiveElements:
  - frequency_slider
  - energy_level_toggle
  - classical_limit_indicator
  recommendedTab: graficas
