    - id: energia_cuantizada_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[energia_cuantizada]] con la lectura gráfica disponible en el leaf.
        en: Relate [[energia_cuantizada]] to the graph reading available in the leaf.
