    - id: energia_cuantizada_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_cuantizada]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[energia_cuantizada]] only within the physical assumptions of the model used in this leaf.
