    - id: energia_cuantizada_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_cuantizada]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[energia_cuantizada]] is consistent with the input quantities and the expected dimension.
