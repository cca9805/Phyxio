    - id: energia_cuantizada_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[energia_cuantizada]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[energia_cuantizada]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: energia_cuantizada_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[energia_cuantizada]], revisa la coherencia física y vuelve a la calculadora si necesitas
