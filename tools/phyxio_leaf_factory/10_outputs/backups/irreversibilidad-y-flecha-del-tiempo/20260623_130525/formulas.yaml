      de entropía.
    en: Valid for processes with well-defined macroscopic states and a statistical
      reading of entropy.
  dimension_check: '[J/K]/[J/K]=[1]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - interpretacion
  - graficas
  - lectura_fisica
  interpretation_tags:
  - entropia
  - irreversibilidad
  - flecha_del_tiempo
  result_semantics:
