version: 5.0.0
ui:
  default_formula: segunda_ley_delta_s_universo
formulas:
- id: segunda_ley_delta_s_universo
  title:
    es: Segunda ley como variación total de entropía
    en: Second law as total entropy change
  equation: variacion_entropia_universo = variacion_entropia_sistema + variacion_entropia_entorno
  latex: \Delta S_{univ}=\Delta S_{sys}+\Delta S_{env}
  magnitudes:
  - variacion_entropia_universo
  - variacion_entropia_sistema
  - variacion_entropia_entorno
  category: termodinamica_estadistica
  relation_type: criterion
  physical_meaning:
    es: Relaciona entropía, irreversibilidad y dirección física del tiempo.
    en: Relates entropy, irreversibility, and the physical direction of time.
  constraints:
    es:
    - Sistema y entorno definidos.
    - Unidades coherentes.
    - Estados termodinámicos comparables.
    en:
    - Defined system and surroundings.
    - Consistent units.
    - Comparable thermodynamic states.
  validity:
    es: Válida para procesos con estados macroscópicos bien definidos y lectura estadística
      de entropía.
    en: Valid for processes with well-defined macroscopic states and a statistical
      reading of entropy.
  dimension_check: '[J/K]+[J/K]=[J/K]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - interpretacion
  - graficas
  - lectura_fisica
  interpretation_tags:
  - entropia
  - irreversibilidad
  - flecha_del_tiempo
  result_semantics:
    target: variacion_entropia_universo
    kind: scalar
    sign_meaning:
      es: El signo decide compatibilidad con la dirección espontánea.
      en: The sign decides compatibility with the spontaneous direction.
    absolute_value_meaning:
      es: El valor absoluto mide la escala del cambio entrópico.
      en: The absolute value measures the scale of the entropy change.
  domain_checks:
  - id: dominio_valido
    condition: physical_domain_valid
    message:
      es: El proceso debe tener estados definidos.
      en: The process must have defined states.
  coherence_checks:
  - id: segunda_ley
    condition: variacion_entropia_universo >= 0
    message:
      es: En un proceso espontáneo aislado, la entropía total no disminuye.
      en: In an isolated spontaneous process, total entropy does not decrease.
  graph_implications:
  - es: Una curva no decreciente marca la flecha temporal macroscópica.
    en: A non-decreasing curve marks the macroscopic time arrow.
  pedagogical_triggers:
  - es: Confundir entropía con desorden visual.
    en: Confusing entropy with visual disorder.
  rearrangements:
  - target: variacion_entropia_universo
    equation: variacion_entropia_universo = variacion_entropia_sistema + variacion_entropia_entorno
    latex: \Delta S_{univ}=\Delta S_{sys}+\Delta S_{env}
  - target: variacion_entropia_sistema
    equation: variacion_entropia_sistema = variacion_entropia_universo - variacion_entropia_entorno
    latex: \Delta S_{sys}=\Delta S_{univ}-\Delta S_{env}
  - target: variacion_entropia_entorno
    equation: variacion_entropia_entorno = variacion_entropia_universo - variacion_entropia_sistema
    latex: \Delta S_{env}=\Delta S_{univ}-\Delta S_{sys}
- id: entropia_producida_irreversible
  title:
    es: Entropía producida por irreversibilidad
    en: Entropy generated by irreversibility
  equation: entropia_producida = grado_irreversibilidad * constante_boltzmann
  latex: S_{gen}=I\cdot k_B
  magnitudes:
  - grado_irreversibilidad
  - entropia_producida
  - constante_boltzmann
  category: termodinamica_estadistica
  relation_type: criterion
