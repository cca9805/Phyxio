version: '1.0'
leaf: irreversibilidad-y-flecha-del-tiempo
coord:
  id: irreversibilidad-y-flecha-del-tiempo-Coord
  graphId: irreversibilidad-y-flecha-del-tiempo-Coord
  type: Coord
  graphType: Coord
  title:
    es: Flecha del tiempo por aumento de entropía
    en: Arrow of time through entropy increase
  xAxis:
    es: Tiempo
    en: Time
  yAxis:
    es: Variación de entropía del universo
    en: Entropy change of the universe
  xMagnitude: tiempo
  yMagnitude: variacion_entropia_universo
  relation:
    es: 'La gráfica responde por qué la entropía da dirección física a la flecha del
      tiempo: al avanzar el tiempo, la variación de entropía del universo no disminuye.'
    en: 'The graph answers why entropy gives a physical direction to the arrow of
      time: as time advances, the universe entropy change does not decrease.'
  physicalReading:
    es: Una tendencia creciente de [[variacion_entropia_universo]] indica irreversibilidad;
      una pendiente nula marca equilibrio o límite reversible.
    en: An increasing trend in [[variacion_entropia_universo]] indicates irreversibility;
      a zero slope marks equilibrium or a reversible limit.
  slopeMeaning:
    es: La pendiente representa ritmo de producción entrópica.
    en: The slope represents the rate of entropy production.
  interceptMeaning:
    es: El origen puede fijarse como estado inicial de referencia.
    en: The origin can be set as the initial reference state.
  curvatureMeaning:
    es: La curvatura muestra si la irreversibilidad se acelera o se amortigua.
    en: Curvature shows whether irreversibility accelerates or weakens.
  signMeaning:
    es: Valores negativos serían incompatibles con un proceso espontáneo aislado.
    en: Negative values would be incompatible with an isolated spontaneous process.
  areaMeaning:
    es: El área no es principal; importa la tendencia no decreciente.
    en: Area is not primary; the non-decreasing trend matters.
  domainMeaning:
    es: El dominio útil empieza en el estado inicial y avanza hacia estados posteriores.
    en: The useful domain starts at the initial state and moves toward later states.
  modelConnection:
    es: Conecta segunda ley, macroestados probables e irreversibilidad.
    en: Connects the second law, probable macrostates, and irreversibility.
  formulaConnection:
    es: Usa {{f:segunda_ley_delta_s_universo}} y {{f:criterio_flecha_temporal}}.
    en: Uses {{f:segunda_ley_delta_s_universo}} and {{f:criterio_flecha_temporal}}.
  readingFocus:
    es: Leer cómo entropía y tiempo fijan la flecha del tiempo mediante una variación
      total no decreciente.
    en: Read how entropy and time set the arrow of time through a non-decreasing total
      change.
  agentHints:
    es:
    - Relaciona pendiente positiva con entropía producida.
    - Distingue sistema, entorno y universo.
    - Explica que entropía no es simple desorden visual.
    en:
    - Relate positive slope to generated entropy.
    - Distinguish system, surroundings, and universe.
    - Explain that entropy is not simple visual disorder.
  commonMistakes:
    es:
    - Confundir entropía con caos visual.
    - Olvidar el entorno en la segunda ley.
    - Leer una disminución local como violación global.
    en:
    - Confusing entropy with visual chaos.
    - Forgetting the surroundings in the second law.
    - Reading a local decrease as a global violation.
  curveProfile:
    type: monotonic_non_decreasing
    expectedShape:
      es: Curva no decreciente con posible meseta de equilibrio.
      en: Non-decreasing curve with possible equilibrium plateau.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Estado inicial
        en: Initial state
    - x: 1
      y: 1
      label:
        es: Proceso irreversible
        en: Irreversible process
    - x: 2
      y: 1.4
      label:
        es: Acercamiento al equilibrio
        en: Approach to equilibrium
  dataRange:
    xMin: 0
    xMax: 10
    yMin: 0
    yMax: 5
    autoScale: true
  recommendedTab: graficas
