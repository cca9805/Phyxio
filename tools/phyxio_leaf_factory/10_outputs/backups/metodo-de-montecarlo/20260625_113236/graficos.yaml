version: '1.0'
leaf: metodo-de-montecarlo
coord:
  id: metodo-de-montecarlo-Coord
  graphId: metodo-de-montecarlo-Coord
  type: Coord
  graphType: Coord
  title:
    es: Convergencia del error Monte Carlo
    en: Monte Carlo error convergence
  xAxis:
    es: número de muestras [[numero_muestras]]
    en: number of samples [[numero_muestras]]
  yAxis:
    es: error estándar [[error_estandar]]
    en: standard error [[error_estandar]]
  xMagnitude: numero_muestras
  yMagnitude: error_estandar
  relation:
    es: 'La gráfica responde cómo el método de Monte Carlo usa muchas muestras aleatorias:
      al crecer [[numero_muestras]], [[error_estandar]] disminuye de forma sublineal.'
    en: 'The graph answers how the Monte Carlo method uses many random samples: as
      [[numero_muestras]] grows, [[error_estandar]] decreases sublinearly.'
  physicalReading:
    es: Cada punto compara el esfuerzo de muestreo con la incertidumbre estadística
      que queda en el valor medio físico.
    en: Each point compares sampling effort with the statistical uncertainty remaining
      in the physical mean value.
  slopeMeaning:
    es: 'Pendiente negativa: añadir muestras reduce el error, pero cada bloque nuevo
      aporta menos mejora.'
    en: 'Negative slope: adding samples reduces error, but each new block gives less
      improvement.'
  interceptMeaning:
    es: El corte ideal no se interpreta físicamente porque no hay estimación Monte
      Carlo con cero muestras.
    en: The ideal intercept is not physical because no Monte Carlo estimate exists
      with zero samples.
  curvatureMeaning:
    es: La curvatura muestra convergencia lenta tipo raíz inversa.
    en: The curvature shows slow inverse-square-root convergence.
  signMeaning:
    es: El error estándar es no negativo.
    en: Standard error is nonnegative.
  areaMeaning:
    es: El área no representa una magnitud física central en este leaf.
    en: The area is not a central physical quantity in this leaf.
  domainMeaning:
    es: Solo tiene sentido para [[numero_muestras]] positivo y varianza finita.
    en: It only makes sense for positive [[numero_muestras]] and finite variance.
  modelConnection:
    es: Conecta el modelo de muestreo aleatorio con la precisión del estimador.
    en: It connects the random sampling model with estimator precision.
  formulaConnection:
    es: La lectura principal usa {{f:error_estandar_montecarlo}} y se apoya en {{f:estimador_montecarlo_media}}.
    en: The main reading uses {{f:error_estandar_montecarlo}} and relies on {{f:estimador_montecarlo_media}}.
  readingFocus:
    es: Observa que controlar el error estadístico exige aumentar [[numero_muestras]],
      no solo repetir una muestra cualquiera.
    en: Notice that controlling statistical error requires increasing [[numero_muestras]],
      not merely repeating any sample.
  agentHints:
    es:
    - Pregunta por independencia de muestras.
    - Relaciona precisión con raíz de N.
    - Distingue varianza física y error del promedio.
    en:
    - Ask about sample independence.
    - Relate precision to square root of N.
    - Distinguish physical variance from mean error.
  commonMistakes:
    es:
    - Suponer caída lineal del error.
    - Confundir muestra aleatoria con muestra representativa.
    - Ignorar correlaciones entre muestras.
    en:
    - Assuming linear error decrease.
    - Confusing random sample with representative sample.
    - Ignoring correlations between samples.
  curveProfile:
    type: inverse_sqrt_decay
    expectedShape:
      es: Curva decreciente que se aplana al aumentar las muestras.
      en: Decreasing curve that flattens as samples increase.
    keyPoints:
    - x: 100
      y: 0.1
      label:
        es: pocas muestras, error alto
        en: few samples, high error
    - x: 10000
      y: 0.01
      label:
        es: muchas muestras, error menor
        en: many samples, lower error
  dataRange:
    xMin: 1
    xMax: 10000
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
