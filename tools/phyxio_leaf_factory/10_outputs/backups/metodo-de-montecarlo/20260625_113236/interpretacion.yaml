    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: output
      en: Monte Carlo estimator
    summary_rules:
    - id: estimador_montecarlo_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[estimador_montecarlo]] indica la magnitud física principal que se está interpretando.
        en: The result [[estimador_montecarlo]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: estimador_montecarlo_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[estimador_montecarlo]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[estimador_montecarlo]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: estimador_montecarlo_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[estimador_montecarlo]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[estimador_montecarlo]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: estimador_montecarlo_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[estimador_montecarlo]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[estimador_montecarlo]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: estimador_montecarlo_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[estimador_montecarlo]] con la lectura gráfica disponible en el leaf.
        en: Relate [[estimador_montecarlo]] to the graph reading available in the leaf.
    likely_errors:
    - id: estimador_montecarlo_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[estimador_montecarlo]] como un número aislado. Su sentido depende del modelo, la unidad y el
          signo.
        en: Do not interpret [[estimador_montecarlo]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: estimador_montecarlo_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[estimador_montecarlo]], revisa la coherencia física y vuelve a la calculadora si necesitas
          otro despeje.
        en: After obtaining [[estimador_montecarlo]], check the physical consistency and return to the calculator if another
          rearrangement is needed.
    physical_intuition:
    - id: estimador_montecarlo_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[estimador_montecarlo]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[estimador_montecarlo]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: estimador_montecarlo_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[estimador_montecarlo]] comprobando qué ocurre si una magnitud dominante crece, disminuye
          o se anula.
        en: Analyze the limiting cases of [[estimador_montecarlo]] by checking what happens if a dominant quantity grows,
          decreases, or becomes zero.
