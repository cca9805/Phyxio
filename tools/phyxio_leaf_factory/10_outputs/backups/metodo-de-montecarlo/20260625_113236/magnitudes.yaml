version: 5.0.0
leaf: metodo-de-montecarlo
magnitudes:
- id: numero_muestras
  symbol: N
  nombre:
    es: número de muestras
    en: number of samples
  descripcion:
    es: Cantidad de evaluaciones aleatorias usadas por el estimador.
    en: Number of random evaluations used by the estimator.
  unidad_si: '1'
  dimension: '1'
  is_vector: false
  components: []
  category: sampling
  physical_role: independent_variable
  used_in:
  - estimador_montecarlo_media
  - error_estandar_montecarlo
  - varianza_muestral_montecarlo
  - probabilidad_aceptacion_metropolis
  - promedio_ponderado_muestras
  common_mistake:
    es: Interpretar la magnitud fuera del modelo de muestreo declarado.
    en: Interpreting the quantity outside the stated sampling model.
  typical_range: Depende del observable; en simulaciones educativas se usan 10^2 a
    10^6 muestras.
  sign_behavior:
    has_sign: false
    meaning:
      es: El signo solo tiene sentido si el observable puede tomar valores negativos.
      en: The sign matters only if the observable can take negative values.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero puede significar ausencia de contribución, error nulo ideal o conteo
        nulo según la magnitud.
      en: Zero may mean no contribution, ideal zero error, or zero count depending
        on the quantity.
  value_nature:
    kind: real
    nonnegative_only: true
    expected_interval: probabilidades entre 0 y 1; conteos positivos; errores no negativos
  interpretation_role:
    primary_for:
    - summary
    - physical_reading
    secondary_for:
    - coherence
    - model_validity
    - graph_reading
  graph_binding:
    channels:
    - xAxis
    role:
      es: Magnitud usada para leer la convergencia Monte Carlo.
      en: Quantity used to read Monte Carlo convergence.
  pedagogical_notes:
    es: Ayuda a separar azar numérico, promedio físico y error estadístico.
    en: Helps separate numerical randomness, physical average, and statistical error.
