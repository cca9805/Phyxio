- id: razon_probabilidades_macroestados
  title:
    es: Razón de probabilidades entre macroestados
    en: Probability ratio between macrostates
  equation: P_A/P_B = Omega_A/Omega_B
  latex: \frac{P_A}{P_B}=\frac{\Omega_A}{\Omega_B}
  rearrangements:
  - target: multiplicidad_macroestado
    equation: Omega_A = (P_A/P_B)*Omega_B
    latex: \Omega_A=(P_A/P_B)\Omega_B
  category: probability
  relation_type: ratio
  physical_meaning:
    es: Compara dos macroestados por el número relativo de microestados que agrupan.
    en: Compares two macrostates by the relative number of microstates they group.
  constraints:
    es: Solo compara microestados accesibles bajo las mismas restricciones macroscópicas.
    en: Only compares accessible microstates under the same macroscopic constraints.
