- id: normalizacion_macroestados
  title:
    es: Normalización de macroestados excluyentes
    en: Normalization of exclusive macrostates
  equation: sum(P_M) = 1
  latex: \sum_M P_M = 1
  rearrangements:
  - target: probabilidad_macroestado
    equation: P_M = 1 - sum(P_other)
    latex: P_M=1-\sum P_{other}
  category: probability
  relation_type: normalization
  physical_meaning:
    es: Garantiza que todos los macroestados excluyentes reparten la población estadística completa.
    en: Ensures all exclusive macrostates distribute the whole statistical population.
  constraints:
    es: Solo compara microestados accesibles bajo las mismas restricciones macroscópicas.
    en: Only compares accessible microstates under the same macroscopic constraints.
  validity:
