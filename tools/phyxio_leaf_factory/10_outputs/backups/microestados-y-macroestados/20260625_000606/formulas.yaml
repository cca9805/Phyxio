- id: entropia_boltzmann_macroestado
  title:
    es: Entropía de Boltzmann del macroestado
    en: Boltzmann entropy of the macrostate
  equation: S = k_B*ln(Omega_M)
  latex: S = k_B\ln(\Omega_M)
  rearrangements:
  - target: multiplicidad_macroestado
    equation: Omega_M = exp(S/k_B)
    latex: \Omega_M=e^{S/k_B}
  category: entropy
  relation_type: logarithmic
  physical_meaning:
    es: Convierte la multiplicidad del macroestado en una magnitud termodinámica aditiva.
    en: Converts macrostate multiplicity into an additive thermodynamic quantity.
  constraints:
    es: Solo compara microestados accesibles bajo las mismas restricciones macroscópicas.
    en: Only compares accessible microstates under the same macroscopic constraints.
  validity:
