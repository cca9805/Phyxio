version: '1.0'
leaf: microestados-y-macroestados
coord:
  id: microestados-y-macroestados-Coord
  graphId: microestados-y-macroestados-Coord
  type: Coord
  graphType: Coord
  title:
    es: Probabilidad de macroestado frente a multiplicidad
    en: Macrostate probability versus multiplicity
  xAxis:
    es: Multiplicidad del macroestado Ω_M
    en: Macrostate multiplicity Ω_M
  yAxis:
    es: Probabilidad del macroestado P_M
    en: Macrostate probability P_M
  xMagnitude: multiplicidad_macroestado
  yMagnitude: probabilidad_macroestado
  relation:
    es: La gráfica muestra cómo los microestados microscópicos agrupados en un mismo macroestado observable aumentan su probabilidad mediante la multiplicidad.
    en: The graph shows how microscopic microstates grouped into the same observable macrostate increase its probability through multiplicity.
  physicalReading:
    es: Un macroestado con mayor multiplicidad contiene más microestados compatibles y por eso ocupa una fracción estadística mayor.
    en: A macrostate with larger multiplicity contains more compatible microstates and therefore occupies a larger statistical fraction.
  slopeMeaning:
    es: La pendiente positiva indica proporcionalidad entre multiplicidad y probabilidad si el número total de microestados se mantiene fijo.
    en: The positive slope indicates proportionality between multiplicity and probability if the total number of microstates is fixed.
  interceptMeaning:
    es: El origen representa un macroestado sin microestados compatibles y, por tanto, sin probabilidad.
    en: The origin represents a macrostate with no compatible microstates and therefore no probability.
  curvatureMeaning:
    es: La curva esperada es lineal mientras no cambie el número total de microestados accesibles.
    en: The expected curve is linear while the total number of accessible microstates does not change.
  signMeaning:
    es: Las magnitudes son no negativas; valores negativos revelarían un error de modelo o normalización.
    en: The quantities are nonnegative; negative values would reveal a model or normalization error.
  areaMeaning:
    es: El área no tiene lectura primaria; la información relevante está en la altura relativa de cada macroestado.
    en: The area has no primary reading; the relevant information is in the relative height of each macrostate.
  domainMeaning:
    es: Solo se leen multiplicidades compatibles con las mismas restricciones de energía, volumen y partículas.
    en: Only multiplicities compatible with the same energy, volume, and particle constraints are read.
  modelConnection:
    es: Conecta la distinción microestado-macroestado con el conteo de configuraciones compatibles.
    en: Connects the microstate-macrostate distinction with counting compatible configurations.
  formulaConnection:
    es: Se apoya en la probabilidad de macroestado desde multiplicidad y en la normalización de macroestados.
    en: It relies on macrostate probability from multiplicity and macrostate normalization.
  readingFocus:
    es: Responder cuántos microestados microscópicos sostienen un macroestado observable y cómo eso cambia su probabilidad.
    en: Answer how many microscopic microstates support an observable macrostate and how that changes its probability.
  agentHints:
    es:
    - Pregunta siempre qué macroestado se está contando.
    - Comprueba que las multiplicidades pertenecen al mismo conjunto accesible.
    - Recuerda que microestado y macroestado no son sinónimos.
    en:
    - Always ask which macrostate is being counted.
    - Check that multiplicities belong to the same accessible set.
    - Remember that microstate and macrostate are not synonyms.
  commonMistakes:
    es:
    - Sumar macroestados como si fueran microestados individuales.
    - Confundir multiplicidad con probabilidad ya normalizada.
    - Comparar multiplicidades bajo restricciones macroscópicas distintas.
    en:
    - Adding macrostates as if they were individual microstates.
    - Confusing multiplicity with already normalized probability.
    - Comparing multiplicities under different macroscopic constraints.
  curveProfile:
    type: linear
    expectedShape:
      es: Recta creciente si Ω total es constante.
      en: Increasing straight line if total Ω is constant.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Sin microestados compatibles
        en: No compatible microstates
    - x: 50
      y: 0.5
      label:
        es: Mitad de la multiplicidad total
        en: Half the total multiplicity
    - x: 100
      y: 1
      label:
        es: Toda la multiplicidad accesible
        en: All accessible multiplicity
  dataRange:
    xMin: 0
    xMax: 100
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
