      text:
        es: El resultado [[multiplicidad_macroestado]] indica la magnitud física principal que se está interpretando.
        en: The result [[multiplicidad_macroestado]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: multiplicidad_macroestado_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[multiplicidad_macroestado]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[multiplicidad_macroestado]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: multiplicidad_macroestado_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[multiplicidad_macroestado]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[multiplicidad_macroestado]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: multiplicidad_macroestado_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[multiplicidad_macroestado]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[multiplicidad_macroestado]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: multiplicidad_macroestado_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[multiplicidad_macroestado]] con la lectura gráfica disponible en el leaf.
        en: Relate [[multiplicidad_macroestado]] to the graph reading available in the leaf.
    likely_errors:
    - id: multiplicidad_macroestado_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[multiplicidad_macroestado]] como un número aislado. Su sentido depende del modelo, la unidad
          y el signo.
        en: Do not interpret [[multiplicidad_macroestado]] as an isolated number. Its meaning depends on the model, unit,
          and sign.
    next_step_rules:
    - id: multiplicidad_macroestado_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[multiplicidad_macroestado]], revisa la coherencia física y vuelve a la calculadora si necesitas
          otro despeje.
        en: After obtaining [[multiplicidad_macroestado]], check the physical consistency and return to the calculator if
          another rearrangement is needed.
    physical_intuition:
    - id: multiplicidad_macroestado_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[multiplicidad_macroestado]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[multiplicidad_macroestado]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: multiplicidad_macroestado_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[multiplicidad_macroestado]] comprobando qué ocurre si una magnitud dominante crece,
          disminuye o se anula.
        en: Analyze the limiting cases of [[multiplicidad_macroestado]] by checking what happens if a dominant quantity grows,
          decreases, or becomes zero.
