version: 5.0.0
leaf: modelo-de-ising
ui:
  default_formula: magnetizacion_media_ising
formulas:
- id: energia_ising_hamiltoniano
  title:
    es: Energía del modelo de Ising
    en: Ising model energy
  equation: E = -J*sum_sisj - h*sum_si
  latex: E=-J\sum_{<ij>}s_i s_j-h\sum_i s_i
  rearrangements:
  - id: energia_ising_hamiltoniano_base
    target: energia_ising
    equation: E = -J*sum_sisj - h*sum_si
    latex: E=-J\sum_{<ij>}s_i s_j-h\sum_i s_i
  category: modelo
  relation_type: definicion
  physical_meaning:
    es: Energía del modelo de Ising conecta variables microscópicas con la respuesta
      colectiva del sistema.
    en: Ising model energy connects microscopic variables with the collective response
      of the system.
  constraints:
    es: Usar espines binarios s_i = ±1 y parámetros constantes durante el cálculo.
    en: Use binary spins s_i = ±1 and constant parameters during the calculation.
  validity:
    es: Válido para redes discretas de espines con interacción local idealizada.
    en: Valid for discrete spin lattices with idealized local interaction.
  dimension_check:
    es: Las unidades del resultado coinciden con la magnitud objetivo declarada.
    en: The units of the result match the declared target quantity.
  calculable: true
  motivo_no_calculable:
    es: ''
    en: ''
  used_in:
  - calculadora
  - interpretacion
  - graficos
  interpretation_tags:
  - ising
  - thermal
  - magnetization
  result_semantics:
    target: energia_ising
    kind: scalar
    sign_meaning:
      es: El signo distingue orientación colectiva respecto al convenio elegido.
      en: The sign distinguishes collective orientation relative to the chosen convention.
    absolute_value_meaning:
      es: El valor absoluto mide intensidad de orden o peso estadístico.
      en: The absolute value measures order strength or statistical weight.
  domain_checks:
  - es: La temperatura debe ser positiva.
    en: Temperature must be positive.
  - es: El número de espines debe ser mayor que cero.
    en: The number of spins must be greater than zero.
  coherence_checks:
  - es: La magnetización media debe permanecer entre -1 y 1.
    en: Mean magnetization must stay between -1 and 1.
  - es: Las probabilidades deben ser no negativas y normalizables.
    en: Probabilities must be nonnegative and normalizable.
  graph_implications:
    es: La curva esperada muestra pérdida de magnetización al aumentar la temperatura.
    en: The expected curve shows loss of magnetization as temperature increases.
  pedagogical_triggers:
  - es: Confundir espín individual con magnetización colectiva.
    en: Confusing an individual spin with collective magnetization.
  - es: Leer la transición como salto universal en cualquier red finita.
    en: Reading the transition as a universal jump in any finite lattice.
