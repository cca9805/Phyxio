version: '1.0'
leaf: modelo-de-ising
coord:
  id: modelo-de-ising-Coord
  graphId: modelo-de-ising-Coord
  type: Coord
  graphType: Coord
  title:
    es: Magnetización media frente a temperatura
    en: Mean magnetization versus temperature
  xAxis:
    es: Temperatura [[temperatura]]
    en: Temperature [[temperatura]]
  yAxis:
    es: Magnetización media [[magnetizacion_media]]
    en: Mean magnetization [[magnetizacion_media]]
  xMagnitude: temperatura
  yMagnitude: magnetizacion_media
  relation:
    es: Al aumentar la [[temperatura]], la interacción entre [[espin]] pierde capacidad
      de sostener [[magnetizacion_media]] colectiva.
    en: As [[temperatura]] increases, spin interaction loses its ability to sustain
      collective [[magnetizacion_media]].
  physicalReading:
    es: El gráfico responde cómo el modelo de Ising relaciona interacción, temperatura
      y magnetización colectiva.
    en: The graph answers how the Ising model relates interaction, temperature, and
      collective magnetization.
  slopeMeaning:
    es: Pendiente negativa indica desorden térmico creciente.
    en: Negative slope indicates increasing thermal disorder.
  interceptMeaning:
    es: A baja temperatura la magnetización puede acercarse al orden completo.
    en: At low temperature magnetization may approach full order.
  curvatureMeaning:
    es: La curvatura marca la región de cambio cooperativo alrededor de la transición.
    en: Curvature marks the cooperative-change region around the transition.
  signMeaning:
    es: El signo de la magnetización indica orientación dominante de espines.
    en: The sign of magnetization indicates dominant spin orientation.
  areaMeaning:
    es: El área no representa una magnitud termodinámica directa en esta lectura.
    en: Area does not represent a direct thermodynamic quantity in this reading.
  domainMeaning:
    es: Usar temperaturas positivas y redes discretas de espines binarios.
    en: Use positive temperatures and discrete binary-spin lattices.
  modelConnection:
    es: Conecta el Hamiltoniano de Ising con el orden macroscópico observado.
    en: Connects the Ising Hamiltonian with observed macroscopic order.
  formulaConnection:
  - energia_ising_hamiltoniano
  - magnetizacion_media_ising
  - peso_boltzmann_ising
  readingFocus:
    es: Observa cuándo la temperatura vence la interacción y reduce la magnetización
      colectiva.
    en: Watch when temperature overcomes interaction and reduces collective magnetization.
  agentHints:
    es:
    - Identifica primero el eje de temperatura.
    - Relaciona la caída de magnetización con desorden térmico.
    - No confundas espín individual con promedio colectivo.
    en:
    - Identify the temperature axis first.
    - Relate magnetization loss to thermal disorder.
    - Do not confuse individual spin with collective average.
  commonMistakes:
    es:
    - Suponer que toda curva finita tiene salto perfecto.
    - Olvidar que la magnetización media es adimensional.
    - Ignorar el signo del campo externo.
    en:
    - Assuming every finite curve has a perfect jump.
    - Forgetting mean magnetization is dimensionless.
    - Ignoring the sign of the external field.
  curveProfile:
    type: decreasing_transition
    expectedShape:
      es: Meseta ordenada a baja temperatura y descenso hacia desorden al calentar.
      en: Ordered plateau at low temperature and decrease toward disorder when heated.
    keyPoints:
    - x: 0.5
      y: 0.95
      label:
        es: Régimen ordenado
        en: Ordered regime
    - x: 2.3
      y: 0.5
      label:
        es: Cambio cooperativo
        en: Cooperative change
    - x: 5.0
      y: 0.05
      label:
        es: Régimen desordenado
        en: Disordered regime
  dataRange:
    xMin: 0.1
    xMax: 5.0
    yMin: -1.0
    yMax: 1.0
    autoScale: true
  recommendedTab: graficas
