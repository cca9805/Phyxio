targets:
  energia_ising:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: energía configuracional
      en: energia ising
    summary_rules:
    - id: energia_ising_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[energia_ising]] indica la magnitud física principal que se está interpretando.
        en: The result [[energia_ising]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: energia_ising_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[energia_ising]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[energia_ising]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: energia_ising_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_ising]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[energia_ising]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: energia_ising_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_ising]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[energia_ising]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: energia_ising_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[energia_ising]] con la lectura gráfica disponible en el leaf.
        en: Relate [[energia_ising]] to the graph reading available in the leaf.
    likely_errors:
    - id: energia_ising_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[energia_ising]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[energia_ising]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: energia_ising_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[energia_ising]], revisa la coherencia física y vuelve a la calculadora si necesitas otro
          despeje.
        en: After obtaining [[energia_ising]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: energia_ising_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia_ising]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[energia_ising]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: energia_ising_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[energia_ising]] comprobando qué ocurre si una magnitud dominante crece, disminuye
          o se anula.
        en: Analyze the limiting cases of [[energia_ising]] by checking what happens if a dominant quantity grows, decreases,
          or becomes zero.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
