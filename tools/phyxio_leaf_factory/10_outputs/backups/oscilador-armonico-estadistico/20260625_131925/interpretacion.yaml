    - id: energia_media_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[energia_media]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[energia_media]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: energia_media_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[energia_media]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[energia_media]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: energia_media_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[energia_media]] con la lectura gráfica disponible en el leaf.
        en: Relate [[energia_media]] to the graph reading available in the leaf.
    likely_errors:
    - id: energia_media_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[energia_media]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[energia_media]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: energia_media_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[energia_media]], revisa la coherencia física y vuelve a la calculadora si necesitas otro
          despeje.
        en: After obtaining [[energia_media]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: energia_media_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[energia_media]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[energia_media]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: energia_media_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[energia_media]] comprobando qué ocurre si una magnitud dominante crece, disminuye
