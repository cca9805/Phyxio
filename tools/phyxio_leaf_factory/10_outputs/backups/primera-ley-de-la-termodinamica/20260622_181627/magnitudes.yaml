version: 5.0.0
magnitudes:
- id: variacion_energia_interna
  symbol: Delta U
  nombre:
    es: Variación de energía interna
    en: Internal energy change
  descripcion:
    es: Cambio de energía almacenada microscópicamente en el sistema.
    en: Change in microscopic energy stored in the system.
  unidad_si: J
  dimension: '[M L^2 T^-2]'
  is_vector: false
  components: []
  category: energia
  physical_role: calculable
  used_in:
  - primera_ley_delta_u
  - energia_interna_final
  - primer_principio_sobre_sistema
  common_mistake: Interpretar el signo sin declarar la convención usada.
  typical_range: Desde decenas de julios en laboratorio hasta kilojulios o megajulios en máquinas térmicas.
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo indica entrada, salida o cambio según la convención termodinámica.
      en: The sign indicates input, output, or change according to the thermodynamic convention.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica ausencia de esa transferencia o cambio en el proceso idealizado.
      en: Zero indicates absence of that transfer or change in the idealized process.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: Puede ser positiva, negativa o cero según el proceso.
  interpretation_role:
    primary_for:
    - primera ley
    - balance energético
    secondary_for:
    - interpretación de signos
    - modelo de sistema cerrado
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: Debe conectarse con un proceso y una convención de signos, no leerse como una etiqueta aislada.
    en: It must be connected to a process and sign convention, not read as an isolated label.
