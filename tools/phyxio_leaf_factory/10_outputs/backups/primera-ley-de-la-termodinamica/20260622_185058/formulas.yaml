formulas:
- id: primera_ley_delta_u
  title:
    es: Primera ley de la termodinamica (convencion trabajo realizado por el sistema)
    en: First law of thermodynamics (work done by the system convention)
  equation: "\\Delta U = Q - W"
  latex: "\\Delta U = Q - W"
  rearrangements:
  - target: variacion_energia_interna
    equation: "\\Delta U = Q - W"
    latex: "\\Delta U = Q - W"
  - target: calor
    equation: "Q = \\Delta U + W"
    latex: "Q = \\Delta U + W"
  - target: trabajo
    equation: "W = Q - \\Delta U"
    latex: "W = Q - \\Delta U"
  category: fundamental
  relation_type: physical_law
  physical_meaning:
    es: La variacion de energia interna de un sistema cerrado es el calor intercambiado menos el trabajo realizado por el sistema. Q positivo indica calor absorbido; W positivo indica trabajo realizado por el sistema.
    en: The internal energy change of a closed system equals the heat exchanged minus the work done by the system. Positive Q means heat absorbed; positive W means work done by the system.
  constraints:
    es:
    - Sistema cerrado (sin intercambio de materia)
    - Convencion de trabajo realizado por el sistema
    - Estados de equilibrio inicial y final definidos
    en:
    - Closed system (no matter exchange)
    - Work done by the system convention
    - Defined initial and final equilibrium states
  validity:
    es: Valida para cualquier proceso entre dos estados de equilibrio de un sistema cerrado, siempre que se use una sola convencion de signos para el trabajo.
    en: Valid for any process between two equilibrium states of a closed system, provided a single sign convention for work is used.
  dimension_check: '[M L2 T-2] - [M L2 T-2] = [M L2 T-2]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - balance energetico de sistemas cerrados
  - calculo de variacion de energia interna
  interpretation_tags:
  - primera ley
  - energia interna
  - calor
  - trabajo
  result_semantics:
    target: variacion_energia_interna
    kind: state_difference
    sign_meaning:
      es: 'ΔU > 0: el sistema gana energia interna. ΔU < 0: la pierde. ΔU = 0: el sistema vuelve al mismo estado de energia interna.'
      en: 'ΔU > 0: the system gains internal energy. ΔU < 0: it loses it. ΔU = 0: the system returns to the same internal energy state.'
    absolute_value_meaning:
      es: El valor absoluto de ΔU es la energia neta intercambiada y almacenada como cambio del estado energetico interno.
      en: The absolute value of ΔU is the net energy exchanged and stored as a change in the internal energy state.
  domain_checks:
  - Q definido en el proceso
  - W definido en el proceso
  coherence_checks:
  - abs(\Delta U) <= abs(Q) + abs(W)
  graph_implications:
    es: En el diagrama energetico, la flecha de calor hacia el sistema y la flecha de trabajo saliente determinan el signo y la magnitud de ΔU.
    en: In the energy diagram, the heat arrow toward the system and the outgoing work arrow determine the sign and magnitude of ΔU.
  pedagogical_triggers:
  - Alumno confunde el signo de W segun la convencion elegida.
  - Alumno olvida que Q y W son transferencias, no propiedades almacenadas.
  - Alumno suma el trabajo como entrante usando la convencion de saliente.
- id: primer_principio_sobre_sistema
  title:
    es: Primera ley de la termodinamica (convencion trabajo realizado sobre el sistema)
    en: First law of thermodynamics (work done on the system convention)
  equation: "\\Delta U = Q + W_on"
  latex: "\\Delta U = Q + W_{on}"
  rearrangements:
  - target: variacion_energia_interna
    equation: "\\Delta U = Q + W_on"
    latex: "\\Delta U = Q + W_{on}"
  - target: calor
    equation: "Q = \\Delta U - W_on"
    latex: "Q = \\Delta U - W_{on}"
  - target: trabajo_sobre_sistema
    equation: "W_on = \\Delta U - Q"
    latex: "W_{on} = \\Delta U - Q"
  category: fundamental
  relation_type: physical_law
  physical_meaning:
    es: Equivalente de la primera ley cuando el trabajo se mide como trabajo realizado sobre el sistema. En este caso, el trabajo anadido incrementa la energia interna.
    en: Equivalent form of the first law when work is measured as work done on the system. Here, the added work increases the internal energy.
  constraints:
    es:
    - Sistema cerrado
    - Convencion de trabajo realizado sobre el sistema
    - Estados inicial y final de equilibrio definidos
    en:
    - Closed system
    - Work done on the system convention
    - Defined initial and final equilibrium states
  validity:
    es: Equivalente a la convencion anterior con W_on = -W. Debe usarse de forma consistente en todo el problema.
    en: Equivalent to the previous convention with W_on = -W. It must be used consistently throughout the problem.
  dimension_check: '[M L2 T-2] + [M L2 T-2] = [M L2 T-2]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - balance energetico con trabajo sobre el sistema
  - conversion entre convenciones de signos del trabajo
  interpretation_tags:
  - primera ley
  - trabajo sobre el sistema
  - energia interna
  - calor
  result_semantics:
    target: variacion_energia_interna
    kind: state_difference
    sign_meaning:
      es: 'ΔU > 0 si Q + W_on > 0. ΔU < 0 si la suma es negativa. ΔU = 0 cuando Q = -W_on.'
      en: 'ΔU > 0 if Q + W_on > 0. ΔU < 0 if the sum is negative. ΔU = 0 when Q = -W_on.'
    absolute_value_meaning:
      es: El valor absoluto de ΔU es la suma neta de transferencias de energia al sistema.
      en: The absolute value of ΔU is the net sum of energy transfers into the system.
  domain_checks:
  - Q definido en el proceso
  - W_on definido en el proceso
  coherence_checks:
  - W_on = -W cuando ambas convenciones describen el mismo proceso
  graph_implications:
    es: En el diagrama energetico, ambas flechas (calor y trabajo sobre el sistema) entrantes suman su aporte a ΔU.
    en: In the energy diagram, both incoming arrows (heat and work on the system) add to ΔU.
  pedagogical_triggers:
  - Alumno mezcla W (por el sistema) con W_on (sobre el sistema).
  - Alumno no aplica correctamente la relacion W_on = -W.
  - Alumno confunde el signo del trabajo mecanico.
- id: trabajo_pv_constante
  title:
    es: Trabajo de expansion/compresion a presion constante
    en: Expansion/compression work at constant pressure
  equation: W = P * DeltaV
  latex: W = P \\Delta V
  rearrangements:
  - target: trabajo
    equation: W = P * DeltaV
    latex: W = P \\Delta V
  - target: presion
    equation: P = W / DeltaV
    latex: P = \\frac{W}{\\Delta V}
  - target: variacion_de_volumen
    equation: DeltaV = W / P
    latex: \\Delta V = \\frac{W}{P}
  category: derived
  relation_type: definition
  physical_meaning:
    es: Trabajo mecanico realizado por un sistema cuando cambia su volumen a presion constante. ΔV > 0 implica expansion y trabajo positivo por el sistema.
    en: Mechanical work done by a system when its volume changes at constant pressure. ΔV > 0 means expansion and positive work done by the system.
  constraints:
    es:
    - Proceso cuasiestatico
    - Presion constante durante el proceso
    - Sistema cerrado
    en:
    - Quasistatic process
    - Constant pressure during the process
    - Closed system
  validity:
    es: Valida para procesos isobaricos cuasiestaticos. En procesos reales con presion variable debe usarse W = ∫P dV.
    en: Valid for quasistatic isobaric processes. For real processes with variable pressure, W = ∫P dV must be used.
  dimension_check: '[M L-1 T-2][L3] = [M L2 T-2]'
  calculable: true
  motivo_no_calculable: ''
  used_in:
  - calculo del trabajo en procesos isobaricos
  - primera ley con procesos de expansion
  interpretation_tags:
  - trabajo
  - presion
  - volumen
  - proceso isobarico
  result_semantics:
    target: trabajo
    kind: process_quantity
    sign_meaning:
      es: 'W > 0: el sistema expande y realiza trabajo. W < 0: el sistema se comprime y recibe trabajo. W = 0: volumen constante.'
      en: 'W > 0: the system expands and does work. W < 0: the system is compressed and receives work. W = 0: constant volume.'
    absolute_value_meaning:
      es: El valor absoluto de W es el area bajo la curva isobarica en el diagrama P-V.
      en: The absolute value of W is the area under the isobaric curve in the P-V diagram.
  domain_checks:
  - P > 0
  - DeltaV finito
  coherence_checks:
  - abs(W) <= P * abs(DeltaV)
  graph_implications:
    es: En el diagrama P-V, el trabajo es el area del rectangulo bajo la isobara entre los volumenes inicial y final.
    en: In the P-V diagram, the work is the area of the rectangle under the isobar between the initial and final volumes.
  pedagogical_triggers:
  - Alumno olvida que W = PΔV solo es valida a presion constante.
  - Alumno confunde el signo de ΔV en compresion.
  - Alumno usa el trabajo como propiedad del estado en lugar de transferencia.
