version: "1.0"
leaf: primera-ley-de-la-termodinamica

dcl:
  id: primera-ley-de-la-termodinamica-Dcl
  graphId: primera-ley-de-la-termodinamica-Dcl
  type: Dcl
  graphType: Dcl
  title:
    es: Diagrama energetico de la primera ley
    en: Energy diagram of the first law
  sceneId: primera_ley_sistema_cerrado
  sceneLabel:
    es: Sistema cerrado con calor, trabajo y energia interna
    en: Closed system with heat, work, and internal energy
  objects:
    es:
    - Sistema termodinamico cerrado
    - Frontera del sistema
    - Entorno termico y mecanico
    en:
    - Closed thermodynamic system
    - System boundary
    - Thermal and mechanical surroundings
  mainObject:
    es: sistema_termodinamico
    en: sistema_termodinamico
  referenceFrame:
    es: La frontera separa sistema y entorno; las flechas indican intercambios energeticos.
    en: The boundary separates system and surroundings; arrows show energy exchanges.
  geometry:
    es: Caja cerrada con frontera visible y flechas de energia entrando o saliendo.
    en: Closed box with visible boundary and energy arrows entering or leaving.
  interactions:
    es:
    - Calor que entra o sale por diferencia de temperatura
    - Trabajo mecanico asociado a expansion o compresion
    - Cambio interno representado dentro del sistema
    en:
    - Heat entering or leaving due to temperature difference
    - Mechanical work associated with expansion or compression
    - Internal change represented inside the system
  modelElements:
    es:
    - Convencion de trabajo realizado por el sistema
    - Balance entre calor, trabajo y variacion de energia interna
    - Sistema cerrado sin transferencia de materia
    en:
    - Work done by the system convention
    - Balance among heat, work, and internal energy change
    - Closed system without matter transfer
  visualCues:
    es:
    - Flecha de calor hacia el sistema si Q es positivo
    - Flecha de trabajo saliendo si W es positivo
    - Delta U dentro del sistema como resultado del balance
    en:
    - Heat arrow toward the system when Q is positive
    - Work arrow leaving when W is positive
    - Delta U inside the system as the balance result
  scaleMeaning:
    es: La longitud de cada flecha representa cualitativamente la importancia relativa de cada intercambio.
    en: Each arrow length qualitatively represents the relative importance of each exchange.
  relation:
    es: El diagrama responde como calor y trabajo cambian la energia interna del sistema termodinamico.
    en: The diagram answers how heat and work change the internal energy of the thermodynamic system.
  physicalReading:
    es: Si entra calor y el sistema realiza poco trabajo, la variacion de energia interna tiende a ser positiva.
    en: If heat enters and the system does little work, internal energy change tends to be positive.
  modelConnection:
    es: Representa la primera ley como balance de energia para un sistema cerrado.
    en: Represents the first law as an energy balance for a closed system.
  formulaConnection:
    es: La escena se conecta con primera_ley_delta_u, primer_principio_sobre_sistema y trabajo_pv_constante segun la convencion y el proceso elegidos.
    en: The scene connects to primera_ley_delta_u, primer_principio_sobre_sistema and trabajo_pv_constante depending on the chosen convention and process.
  readingFocus:
    es: Identificar que flechas entran, cuales salen y que signo tendra la variacion de energia interna.
    en: Identify which arrows enter, which leave, and what sign the internal energy change will have.
  agentHints:
    es:
    - Pregunta primero por la convencion de signos del trabajo.
    - Lee calor y trabajo como transferencias, no como propiedades almacenadas.
    - Relaciona la flecha dominante con el signo de ΔU.
    en:
    - Ask first for the work sign convention.
    - Read heat and work as transfers, not stored properties.
    - Relate the dominant arrow to the sign of ΔU.
  commonMistakes:
    es:
    - Tratar el calor como energia interna almacenada.
    - Usar simultaneamente trabajo hecho por y sobre el sistema.
    - Olvidar que un sistema cerrado no intercambia materia.
    en:
    - Treating heat as stored internal energy.
    - Using work done by and work done on the system at the same time.
    - Forgetting that a closed system exchanges no matter.
  forceVectors:
  - id: vector_calor
    label:
      es: Calor hacia el sistema
      en: Heat into the system
    targetObject: sistema_termodinamico
    direction: inward
    magnitudeRef: calor
    signConvention:
      es: Q positivo si entra al sistema.
      en: Q is positive when it enters the system.
    formulaRefs:
    - primera_ley_delta_u
    - primer_principio_sobre_sistema
  - id: vector_trabajo
    label:
      es: Trabajo realizado por el sistema
      en: Work done by the system
    targetObject: frontera_del_sistema
    direction: outward
    magnitudeRef: trabajo
    signConvention:
      es: W positivo si sale como trabajo realizado por el sistema.
      en: W is positive when it leaves as work done by the system.
    formulaRefs:
    - primera_ley_delta_u
    - trabajo_pv_constante
  equilibriumState:
    conditionDescription:
      es: No exige equilibrio mecanico global; describe un balance energetico entre estados definidos.
      en: It does not require global mechanical equilibrium; it describes an energy balance between defined states.
  recommendedTab: graficas
