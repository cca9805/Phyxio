magnitudes:
- id: variacion_energia_interna
  symbol: "\\Delta U"
  nombre:
    es: Variacion de energia interna
    en: Internal energy change
  descripcion:
    es: Diferencia entre la energia interna final e inicial de un sistema en un proceso termodinamico. Es la magnitud central de la primera ley de la termodinamica.
    en: Difference between the final and initial internal energy of a system in a thermodynamic process. It is the central quantity of the first law of thermodynamics.
  unidad_si: J
  dimension: '[M L2 T-2]'
  is_vector: false
  components: []
  category: derived
  physical_role: core_physical_quantity
  used_in:
  - primera_ley_delta_u
  - primer_principio_sobre_sistema
  common_mistake: Confundir ΔU con el calor Q o con el trabajo W. ΔU es un cambio de una funcion de estado; Q y W son transferencias energeticas durante el proceso.
  typical_range: -10^6 J a +10^6 J en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔU > 0: el sistema gana energia interna. ΔU < 0: el sistema pierde energia interna. ΔU = 0: no hay cambio neto de energia interna.'
      en: 'ΔU > 0: the system gains internal energy. ΔU < 0: the system loses internal energy. ΔU = 0: no net change in internal energy.'
  zero_behavior:
    allowed: true
    meaning:
      es: ΔU = 0 en ciclos completos (el sistema vuelve al estado inicial) o en procesos isotermicos de gas ideal.
      en: ΔU = 0 in complete cycles (the system returns to the initial state) or in isothermal processes of an ideal gas.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - balance energetico de la primera ley
    - determinacion de Q o W desconocidos
    secondary_for:
    - clasificacion de procesos termodinamicos
  graph_binding:
    channels:
    - none
  pedagogical_notes:
    es: ΔU es la respuesta del balance energetico del sistema. Aunque Q y W dependen del camino seguido, ΔU solo depende de los estados inicial y final.
    en: ΔU is the answer of the system's energy balance. Although Q and W depend on the path followed, ΔU depends only on the initial and final states.
- id: calor
  symbol: Q
  nombre:
    es: Calor
    en: Heat
  descripcion:
    es: Transferencia de energia termica entre el sistema y su entorno debida a una diferencia de temperatura. No es una propiedad del estado, sino una transferencia asociada a un proceso.
    en: Thermal energy transfer between the system and its surroundings due to a temperature difference. It is not a property of the state but a transfer associated with a process.
  unidad_si: J
  dimension: '[M L2 T-2]'
  is_vector: false
  components: []
  category: process
  physical_role: core_physical_quantity
  used_in:
  - primera_ley_delta_u
  - primer_principio_sobre_sistema
  common_mistake: Tratar el calor como una energia almacenada en el sistema. El calor solo existe como transferencia durante un proceso; no se puede asignar a un estado.
  typical_range: -10^6 J a +10^6 J en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'Q > 0: el sistema absorbe calor. Q < 0: el sistema cede calor. Q = 0: proceso adiabatico.'
      en: 'Q > 0: the system absorbs heat. Q < 0: the system releases heat. Q = 0: adiabatic process.'
  zero_behavior:
    allowed: true
    meaning:
      es: Q = 0 describe un proceso adiabatico; en ese caso ΔU = -W (convencion por el sistema).
      en: Q = 0 describes an adiabatic process; then ΔU = -W (work done by the system convention).
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - balance energetico de la primera ley
    - transferencia termica neta al sistema
    secondary_for:
    - identificacion de procesos adiabaticos
  graph_binding:
    channels:
    - parameter
  pedagogical_notes:
    es: El calor y el trabajo son las dos formas de transferir energia a traves de la frontera del sistema. Ninguno de los dos es una propiedad del estado, aunque ambos modifican ΔU.
    en: Heat and work are the two ways to transfer energy across the system boundary. Neither is a state property, although both change ΔU.
- id: trabajo
  symbol: W
  nombre:
    es: Trabajo (realizado por el sistema)
    en: Work (done by the system)
  descripcion:
    es: Energia transferida mecanicamente a traves de la frontera cuando el sistema realiza trabajo sobre el entorno. En la convencion por el sistema, W es positivo en una expansion.
    en: Energy transferred mechanically across the boundary when the system does work on the surroundings. In the by-the-system convention, W is positive during an expansion.
  unidad_si: J
  dimension: '[M L2 T-2]'
  is_vector: false
  components: []
  category: process
  physical_role: core_physical_quantity
  used_in:
  - primera_ley_delta_u
  - trabajo_pv_constante
  common_mistake: Usar la convencion de trabajo por el sistema junto con la de trabajo sobre el sistema en el mismo problema, lo que duplica o invierte el signo.
  typical_range: -10^6 J a +10^6 J en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'W > 0: el sistema realiza trabajo sobre el entorno. W < 0: el entorno realiza trabajo sobre el sistema. W = 0: volumen constante (proceso isocoro).'
      en: 'W > 0: the system does work on the surroundings. W < 0: the surroundings do work on the system. W = 0: constant volume (isochoric process).'
  zero_behavior:
    allowed: true
    meaning:
      es: W = 0 en procesos isocoricos; en ese caso ΔU = Q.
      en: W = 0 in isochoric processes; then ΔU = Q.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - balance energetico de la primera ley
    - trabajo de expansion en procesos isobaricos
    secondary_for:
    - conversion con la convencion W_on = -W
  graph_binding:
    channels:
    - parameter
  pedagogical_notes:
    es: En el diagrama energetico, W se representa como una flecha saliente del sistema cuando es positivo. En procesos de expansion isobarica, W = PΔV.
    en: In the energy diagram, W is represented as an arrow leaving the system when positive. In isobaric expansion processes, W = PΔV.
- id: trabajo_sobre_sistema
  symbol: "W_{on}"
  nombre:
    es: Trabajo realizado sobre el sistema
    en: Work done on the system
  descripcion:
    es: Energia transferida mecanicamente a traves de la frontera cuando el entorno realiza trabajo sobre el sistema. Es el negativo del trabajo por el sistema para el mismo proceso.
    en: Energy transferred mechanically across the boundary when the surroundings do work on the system. It is the negative of the work done by the system for the same process.
  unidad_si: J
  dimension: '[M L2 T-2]'
  is_vector: false
  components: []
  category: process
  physical_role: supporting_quantity
  used_in:
  - primer_principio_sobre_sistema
  common_mistake: No cambiar de convencion al calcular W_on. Si se calcula W por el sistema, W_on = -W.
  typical_range: -10^6 J a +10^6 J en procesos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'W_on > 0: el entorno realiza trabajo sobre el sistema. W_on < 0: el sistema realiza trabajo sobre el entorno. W_on = 0: no hay intercambio mecanico de trabajo.'
      en: 'W_on > 0: the surroundings do work on the system. W_on < 0: the system does work on the surroundings. W_on = 0: no mechanical work exchange.'
  zero_behavior:
    allowed: true
    meaning:
      es: W_on = 0 en procesos isocoricos; en ese caso ΔU = Q.
      en: W_on = 0 in isochoric processes; then ΔU = Q.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - balance energetico con convencion sobre el sistema
    secondary_for:
    - conversion entre convenciones de signos
  graph_binding:
    channels:
    - parameter
  pedagogical_notes:
    es: W_on es util en textos de quimica y termodinamica aplicada. La clave es no mezclar W y W_on en la misma ecuacion.
    en: W_on is useful in chemistry and applied thermodynamics texts. The key is not to mix W and W_on in the same equation.
- id: presion
  symbol: P
  nombre:
    es: Presion
    en: Pressure
  descripcion:
    es: Fuerza normal por unidad de superficie ejercida por el sistema sobre sus paredes. En procesos isobaricos, junto con la variacion de volumen, determina el trabajo mecanico.
    en: Normal force per unit area exerted by the system on its walls. In isobaric processes, together with the volume change, it determines the mechanical work.
  unidad_si: Pa
  dimension: '[M L-1 T-2]'
  is_vector: false
  components: []
  category: state
  physical_role: supporting_quantity
  used_in:
  - trabajo_pv_constante
  common_mistake: Confundir la presion absoluta con la presion manometrica. En termodinamica se usa presion absoluta, que incluye la atmosferica.
  typical_range: 10^4 Pa a 10^7 Pa en procesos de laboratorio
  sign_behavior:
    has_sign: false
    meaning:
      es: La presion absoluta siempre es positiva. Una presion nula corresponde al vacio perfecto.
      en: Absolute pressure is always positive. Zero pressure corresponds to a perfect vacuum.
  zero_behavior:
    allowed: false
    meaning:
      es: P = 0 es un limite ideal (vacio perfecto), no un estado termodinamico ordinario con materia.
      en: P = 0 is an ideal limit (perfect vacuum), not an ordinary thermodynamic state with matter.
  value_nature:
    kind: scalar_unsigned
    nonnegative_only: true
    expected_interval: (0, +inf)
  interpretation_role:
    primary_for:
    - calculo del trabajo isobarico
    secondary_for:
    - determinacion de la direccion de la expansion
  graph_binding:
    channels:
    - constant
  pedagogical_notes:
    es: En la primera ley, la presion aparece implicitamente en el trabajo. Para procesos isobaricos, W = PΔV conecta el balance energetico con variables mecanicas.
    en: In the first law, pressure appears implicitly in the work. For isobaric processes, W = PΔV connects the energy balance with mechanical variables.
- id: variacion_de_volumen
  symbol: "\\Delta V"
  nombre:
    es: Variacion de volumen
    en: Volume change
  descripcion:
    es: Diferencia entre el volumen final e inicial del sistema. Su signo determina si el sistema se expande o se comprime y, junto con la presion, el trabajo de expansion.
    en: Difference between the final and initial volume of the system. Its sign determines whether the system expands or is compressed and, together with pressure, the expansion work.
  unidad_si: m^3
  dimension: '[L3]'
  is_vector: false
  components: []
  category: derived
  physical_role: supporting_quantity
  used_in:
  - trabajo_pv_constante
  common_mistake: Olvidar que ΔV negativo implica compresion y trabajo recibido por el sistema (W < 0 con la convencion por el sistema).
  typical_range: -10^-2 m^3 a +10^-2 m^3 en dispositivos de laboratorio
  sign_behavior:
    has_sign: true
    meaning:
      es: 'ΔV > 0: expansion. ΔV < 0: compresion. ΔV = 0: proceso isocorico.'
      en: 'ΔV > 0: expansion. ΔV < 0: compression. ΔV = 0: isochoric process.'
  zero_behavior:
    allowed: true
    meaning:
      es: ΔV = 0 en procesos isocoricos; en ese caso el trabajo mecanico es nulo.
      en: ΔV = 0 in isochoric processes; then the mechanical work is zero.
  value_nature:
    kind: scalar_signed
    nonnegative_only: false
    expected_interval: any
  interpretation_role:
    primary_for:
    - calculo del trabajo de expansion
    secondary_for:
    - clasificacion del proceso (isocoro, expansion, compresion)
  graph_binding:
    channels:
    - parameter
  pedagogical_notes:
    es: ΔV es la variable geometrica que acompana al trabajo mecanico. En el diagrama P-V, el area bajo la isobara es el valor absoluto de W.
    en: ΔV is the geometric variable accompanying mechanical work. In the P-V diagram, the area under the isobar is the absolute value of W.
