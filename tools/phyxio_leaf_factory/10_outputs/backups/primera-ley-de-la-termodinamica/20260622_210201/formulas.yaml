formulas:
  - id: primera_ley_balance
    title:
      es: Primera ley con trabajo sobre el sistema
      en: First law with work done on the system
    equation: "Delta_U = Q + W"
    latex: "\\Delta U = Q + W"
    rearrangements:
      - target: variacion_energia_interna
        equation: "Delta_U = Q + W"
        latex: "\\Delta U = Q + W"
      - target: calor_intercambiado
        equation: "Q = Delta_U - W"
        latex: "Q = \\Delta U - W"
      - target: trabajo_sobre_sistema
        equation: "W = Delta_U - Q"
        latex: "W = \\Delta U - Q"
    category: fundamental
    relation_type: conservation_law
    physical_meaning:
      es: "La variacion de energia interna de un sistema cerrado es la suma del calor que entra y del trabajo realizado sobre el sistema."
      en: "The internal energy change of a closed system equals the heat entering it plus the work done on it."
    constraints:
      es:
        - "Sistema cerrado sin intercambio de materia."
        - "Trabajo positivo cuando se realiza sobre el sistema."
        - "Calor positivo cuando entra al sistema."
      en:
        - "Closed system with no matter exchange."
        - "Work is positive when done on the system."
        - "Heat is positive when entering the system."
    validity:
      es: "Valida para sistemas cerrados macroscopicos cuando todos los modos de transferencia energetica se contabilizan con signos coherentes."
      en: "Valid for macroscopic closed systems when all energy-transfer modes are counted with consistent signs."
    dimension_check: "[M L^2 T^-2] = [M L^2 T^-2] + [M L^2 T^-2]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - balance energetico de sistemas cerrados
      - procesos isocoricos
      - procesos adiabaticos
      - ciclos termodinamicos
    interpretation_tags:
      - primera ley
      - conservacion de energia
      - calor
      - trabajo
    result_semantics:
      target: variacion_energia_interna
      kind: signed_energy_change
      sign_meaning:
        es: "Si [[variacion_energia_interna]] es positiva, el sistema gana energia interna; si es negativa, la pierde."
        en: "If [[variacion_energia_interna]] is positive, the system gains internal energy; if negative, it loses it."
      absolute_value_meaning:
        es: "El valor absoluto indica cuanta energia interna cambia, independientemente de si entra como calor o trabajo."
        en: "The absolute value tells how much internal energy changes, regardless of whether it enters as heat or work."
    domain_checks:
      - "isfinite(Q)"
      - "isfinite(W)"
      - "isfinite(Delta_U)"
    coherence_checks:
      - "abs(Delta_U - (Q + W)) < tolerance"
    graph_implications:
      es: "En un DCL energetico, flechas de calor y trabajo entrantes aumentan [[variacion_energia_interna]]; flechas salientes la reducen."
      en: "In an energy free-body diagram, incoming heat and work arrows increase [[variacion_energia_interna]]; outgoing arrows reduce it."
    pedagogical_triggers:
      - "Confundir trabajo hecho por el sistema con trabajo hecho sobre el sistema."
      - "Tratar calor y trabajo como propiedades almacenadas."
      - "Olvidar que la energia interna es funcion de estado."

  - id: definicion_variacion_energia_interna
    title:
      es: Variacion de energia interna entre estados
      en: Internal energy change between states
    equation: "Delta_U = U_f - U_i"
    latex: "\\Delta U = U_f - U_i"
    rearrangements:
      - target: variacion_energia_interna
        equation: "Delta_U = U_f - U_i"
        latex: "\\Delta U = U_f - U_i"
      - target: energia_interna_final
        equation: "U_f = U_i + Delta_U"
        latex: "U_f = U_i + \\Delta U"
      - target: energia_interna_inicial
        equation: "U_i = U_f - Delta_U"
        latex: "U_i = U_f - \\Delta U"
    category: fundamental
    relation_type: definition
    physical_meaning:
      es: "La variacion de energia interna depende solo del estado final e inicial, no del camino seguido."
      en: "Internal energy change depends only on final and initial states, not on the path followed."
    constraints:
      es:
        - "Estados inicial y final bien definidos."
        - "Sistema en equilibrio termodinamico al comparar estados."
      en:
        - "Initial and final states are well defined."
        - "The system is in thermodynamic equilibrium when states are compared."
    validity:
      es: "Definicion exacta para energia interna como funcion de estado."
      en: "Exact definition for internal energy as a state function."
    dimension_check: "[M L^2 T^-2] = [M L^2 T^-2] - [M L^2 T^-2]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - comparacion de estados termodinamicos
      - calculo de energia interna
    interpretation_tags:
      - funcion de estado
      - estado inicial
      - estado final
    result_semantics:
      target: variacion_energia_interna
      kind: state_function_change
      sign_meaning:
        es: "El signo indica si el estado final tiene mayor o menor energia interna que el inicial."
        en: "The sign indicates whether the final state has more or less internal energy than the initial state."
      absolute_value_meaning:
        es: "Mide la separacion energetica entre los dos estados."
        en: "It measures the energetic separation between the two states."
    domain_checks:
      - "isfinite(U_i)"
      - "isfinite(U_f)"
    coherence_checks:
      - "abs(Delta_U - (U_f - U_i)) < tolerance"
    graph_implications:
      es: "En el DCL, [[variacion_energia_interna]] es el resultado neto dentro del sistema, no una flecha de frontera."
      en: "In the free-body diagram, [[variacion_energia_interna]] is the net result inside the system, not a boundary arrow."
    pedagogical_triggers:
      - "Creer que [[variacion_energia_interna]] depende de la trayectoria."
      - "Sumar energias inicial y final en lugar de restarlas."

  - id: proceso_adiabatico
    title:
      es: Primera ley en proceso adiabatico
      en: First law in an adiabatic process
    equation: "Delta_U = W"
    latex: "\\Delta U = W \\quad (Q = 0)"
    rearrangements:
      - target: variacion_energia_interna
        equation: "Delta_U = W"
        latex: "\\Delta U = W"
      - target: trabajo_sobre_sistema
        equation: "W = Delta_U"
        latex: "W = \\Delta U"
    category: derived
    relation_type: special_case
    physical_meaning:
      es: "Si no hay intercambio de calor, toda variacion de energia interna procede del trabajo sobre el sistema."
      en: "If no heat is exchanged, every internal energy change comes from work done on the system."
    constraints:
      es:
        - "Proceso adiabatico."
        - "Calor intercambiado nulo."
      en:
        - "Adiabatic process."
        - "Zero heat exchange."
    validity:
      es: "Aplicable cuando la frontera es termicamente aislante o el proceso es suficientemente rapido para despreciar el calor."
      en: "Applies when the boundary is thermally insulating or the process is fast enough for heat transfer to be negligible."
    dimension_check: "[M L^2 T^-2] = [M L^2 T^-2]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - compresion adiabaticas
      - expansion adiabaticas
      - motores termicos idealizados
    interpretation_tags:
      - adiabatico
      - trabajo
      - energia interna
    result_semantics:
      target: variacion_energia_interna
      kind: special_case_energy_change
      sign_meaning:
        es: "Con esta convencion, trabajo positivo sobre el sistema aumenta [[variacion_energia_interna]]."
        en: "With this convention, positive work done on the system increases [[variacion_energia_interna]]."
      absolute_value_meaning:
        es: "El modulo coincide con la energia transferida mecanicamente."
        en: "The magnitude equals the mechanically transferred energy."
    domain_checks:
      - "abs(Q) < tolerance"
    coherence_checks:
      - "abs(Delta_U - W) < tolerance"
    graph_implications:
      es: "El DCL debe mostrar solo flecha de trabajo atravesando la frontera; no debe aparecer flecha de calor."
      en: "The free-body diagram should show only a work arrow crossing the boundary; no heat arrow should appear."
    pedagogical_triggers:
      - "Llamar adiabatico a un proceso con calor no nulo."
      - "Cambiar el signo del trabajo por usar otra convencion sin declararla."
