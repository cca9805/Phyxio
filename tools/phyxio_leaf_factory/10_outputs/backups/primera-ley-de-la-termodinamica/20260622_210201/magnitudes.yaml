magnitudes:
  - id: variacion_energia_interna
    symbol: "\\Delta U"
    nombre:
      es: Variacion de energia interna
      en: Internal energy change
    descripcion:
      es: Cambio de energia interna entre el estado final y el estado inicial del sistema.
      en: Change in internal energy between the final and initial state of the system.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: state_change
    physical_role: core_physical_quantity
    used_in:
      - primera_ley_balance
      - definicion_variacion_energia_interna
      - proceso_adiabatico
    common_mistake: "Confundir la variacion de energia interna con calor o trabajo, que son transferencias de energia."
    typical_range: "-10^6 J a 10^6 J en sistemas de laboratorio; mucho mayor en maquinas termicas."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positiva si el sistema aumenta su energia interna; negativa si la disminuye."
        en: "Positive if the system increases its internal energy; negative if it decreases it."
    zero_behavior:
      allowed: true
      meaning:
        es: "Valor cero significa que el sistema termina con la misma energia interna, aunque haya intercambiado calor y trabajo."
        en: "Zero means the system ends with the same internal energy, even if heat and work were exchanged."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - balance energetico
        - cambio de estado termodinamico
      secondary_for:
        - ciclos termodinamicos
    graph_binding:
      channels:
        - yAxis
    pedagogical_notes:
      es: "Es la magnitud que resume el balance neto dentro del sistema: no atraviesa la frontera como calor o trabajo."
      en: "It summarizes the net balance inside the system: it does not cross the boundary like heat or work."

  - id: calor_intercambiado
    symbol: "Q"
    nombre:
      es: Calor intercambiado
      en: Heat exchanged
    descripcion:
      es: Energia transferida por diferencia de temperatura entre el sistema y el entorno.
      en: Energy transferred because of a temperature difference between system and surroundings.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: transfer
    physical_role: core_physical_quantity
    used_in:
      - primera_ley_balance
    common_mistake: "Tratar el calor como una energia almacenada dentro del sistema."
    typical_range: "-10^6 J a 10^6 J en procesos de laboratorio."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo si entra calor al sistema; negativo si el sistema cede calor."
        en: "Positive if heat enters the system; negative if the system releases heat."
    zero_behavior:
      allowed: true
      meaning:
        es: "Calor nulo indica proceso adiabatico o transferencia termica despreciable."
        en: "Zero heat indicates an adiabatic process or negligible thermal transfer."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - transferencia termica
        - procesos no adiabaticos
      secondary_for:
        - maquinas termicas
    graph_binding:
      channels:
        - parameter
    pedagogical_notes:
      es: "Debe dibujarse como una flecha que cruza la frontera del sistema, no como contenido interno."
      en: "It should be drawn as an arrow crossing the system boundary, not as internal content."

  - id: trabajo_sobre_sistema
    symbol: "W"
    nombre:
      es: Trabajo sobre el sistema
      en: Work done on the system
    descripcion:
      es: Energia transferida mecanicamente al sistema por fuerzas externas o compresion.
      en: Energy mechanically transferred to the system by external forces or compression.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: transfer
    physical_role: core_physical_quantity
    used_in:
      - primera_ley_balance
      - proceso_adiabatico
    common_mistake: "Usar la convencion de trabajo hecho por el sistema sin cambiar el signo de la primera ley."
    typical_range: "-10^6 J a 10^6 J en procesos de laboratorio."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positivo si el entorno realiza trabajo sobre el sistema; negativo si el sistema realiza trabajo sobre el entorno."
        en: "Positive if surroundings do work on the system; negative if the system does work on the surroundings."
    zero_behavior:
      allowed: true
      meaning:
        es: "Trabajo nulo indica que no hay transferencia mecanica neta."
        en: "Zero work indicates no net mechanical transfer."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - trabajo mecanico
        - compresion y expansion
      secondary_for:
        - procesos adiabaticos
    graph_binding:
      channels:
        - parameter
    pedagogical_notes:
      es: "La flecha de trabajo debe incluir la convencion de signo; sin ella, el balance energetico es ambiguo."
      en: "The work arrow must include the sign convention; otherwise the energy balance is ambiguous."

  - id: energia_interna_inicial
    symbol: "U_i"
    nombre:
      es: Energia interna inicial
      en: Initial internal energy
    descripcion:
      es: Energia interna del sistema en el estado inicial.
      en: Internal energy of the system in the initial state.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion_variacion_energia_interna
    common_mistake: "Usar energia interna inicial absoluta sin definir estado de referencia."
    typical_range: "Depende del sistema y del cero convencional de energia."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su signo absoluto depende del estado de referencia elegido."
        en: "Its absolute sign depends on the chosen reference state."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede fijarse como cero de referencia sin implicar ausencia de energia microscopica."
        en: "It can be set as a reference zero without implying absence of microscopic energy."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - estado inicial
      secondary_for:
        - calculo de variacion de energia interna
    graph_binding:
      channels:
        - none
    pedagogical_notes:
      es: "Suele importar por diferencia con el estado final, no como valor absoluto aislado."
      en: "It usually matters through its difference with the final state, not as an isolated absolute value."

  - id: energia_interna_final
    symbol: "U_f"
    nombre:
      es: Energia interna final
      en: Final internal energy
    descripcion:
      es: Energia interna del sistema en el estado final.
      en: Internal energy of the system in the final state.
    unidad_si: J
    dimension: "[M L^2 T^-2]"
    is_vector: false
    components: []
    category: state
    physical_role: supporting_quantity
    used_in:
      - definicion_variacion_energia_interna
    common_mistake: "Confundir energia interna final con energia transferida durante el proceso."
    typical_range: "Depende del sistema y del cero convencional de energia."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su signo absoluto depende del estado de referencia elegido."
        en: "Its absolute sign depends on the chosen reference state."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero por eleccion de referencia."
        en: "It can be zero by reference choice."
    value_nature:
      kind: scalar_signed
      nonnegative_only: false
      expected_interval: any
    interpretation_role:
      primary_for:
        - estado final
      secondary_for:
        - calculo de variacion de energia interna
    graph_binding:
      channels:
        - none
    pedagogical_notes:
      es: "Debe compararse con [[energia_interna_inicial]] para obtener [[variacion_energia_interna]]."
      en: "It must be compared with [[energia_interna_inicial]] to obtain [[variacion_energia_interna]]."
