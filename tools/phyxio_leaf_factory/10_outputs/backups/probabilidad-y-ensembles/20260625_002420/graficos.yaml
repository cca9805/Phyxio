version: '1.0'
leaf: probabilidad-y-ensembles
coord:
  id: probabilidad-y-ensembles-Coord
  graphId: probabilidad-y-ensembles-Coord
  type: Coord
  graphType: Coord
  title:
    es: Probabilidad de estado dentro de un ensemble
    en: State probability within an ensemble
  xAxis:
    es: Estado microscópico del ensemble
    en: Microscopic state in the ensemble
  yAxis:
    es: Probabilidad asignada
    en: Assigned probability
  xMagnitude: estado_microscopico
  yMagnitude: probabilidad_estado
  relation:
    es: La gráfica muestra cómo el ensemble reparte probabilidades entre estados microscópicos compatibles con las mismas restricciones macroscópicas.
    en: The graph shows how the ensemble distributes probabilities among microscopic states compatible with the same macroscopic constraints.
  physicalReading:
    es: Cada barra o punto representa qué fracción de sistemas del ensemble ocupa un estado; la suma de probabilidades debe representar toda la población estadística.
    en: Each bar or point represents what fraction of ensemble systems occupies a state; the probability sum must complete the full statistical population.
  slopeMeaning:
    es: La pendiente entre estados discretos no es una velocidad física; solo sugiere cambios relativos de peso estadístico.
    en: The slope between discrete states is not a physical velocity; it only suggests relative changes in statistical weight.
  interceptMeaning:
    es: El valor inicial indica la probabilidad del primer estado incluido en el ensemble.
    en: The initial value indicates the probability of the first state included in the ensemble.
  curvatureMeaning:
    es: Una curvatura visual indica concentración o dispersión de probabilidad entre estados.
    en: A visual curvature indicates concentration or spreading of probability among states.
  signMeaning:
    es: Las probabilidades no son negativas; un valor negativo señalaría error de modelo o cálculo.
    en: Probabilities are non-negative; a negative value would indicate a model or calculation error.
  areaMeaning:
    es: La suma o área discreta bajo la distribución representa la normalización total del ensemble.
    en: The discrete sum or area under the distribution represents total ensemble normalization.
  domainMeaning:
    es: El dominio contiene solo estados compatibles con las restricciones macroscópicas elegidas.
    en: The domain contains only states compatible with the chosen macroscopic constraints.
  modelConnection:
    es: 'El modelo conecta ensemble, probabilidad y promedio: muchos sistemas compatibles permiten leer predicciones macroscópicas.'
    en: 'The model connects ensemble, probability, and average: many compatible systems allow macroscopic predictions to be read.'
  formulaConnection:
    es: La lectura se apoya en normalización del ensemble, frecuencias relativas y promedios ponderados.
    en: The reading relies on ensemble normalization, relative frequencies, and weighted averages.
  readingFocus:
    es: Comprueba que la distribución use el mismo ensemble, que ninguna probabilidad sea negativa y que todas sumen la población completa.
    en: Check that the distribution uses the same ensemble, that no probability is negative, and that all probabilities sum to the full population.
  agentHints:
    es:
    - Pregunta qué restricciones macroscópicas definen el ensemble.
    - Comprueba si las probabilidades están normalizadas.
    - Distingue probabilidad de un estado y promedio de una magnitud.
    en:
    - Ask which macroscopic constraints define the ensemble.
    - Check whether probabilities are normalized.
    - Distinguish state probability from the average of a quantity.
  commonMistakes:
    es:
    - Confundir ensemble con una única partícula real.
    - Sumar probabilidades de estados incompatibles de distintos ensembles.
    - Leer una probabilidad alta como valor alto del observable.
    en:
    - Confusing an ensemble with one real particle.
    - Adding probabilities from incompatible states of different ensembles.
    - Reading high probability as high observable value.
  curveProfile:
    type: discrete_distribution
    expectedShape:
      es: Distribución discreta no negativa cuya suma total es uno.
      en: Non-negative discrete distribution whose total sum is one.
    keyPoints:
    - x: 0
      y: 0.1
      label:
        es: Estado poco probable
        en: Low-probability state
    - x: 1
      y: 0.3
      label:
        es: Estado intermedio
        en: Intermediate state
    - x: 2
      y: 0.6
      label:
        es: Mayor peso del ensemble
        en: Largest ensemble weight
  dataRange:
    xMin: 0
    xMax: 4
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
