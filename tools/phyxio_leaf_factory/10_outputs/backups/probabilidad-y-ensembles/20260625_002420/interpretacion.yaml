    summary_rules:
    - id: probabilidad_estado_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[probabilidad_estado]] indica la magnitud física principal que se está interpretando.
        en: The result [[probabilidad_estado]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: probabilidad_estado_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[probabilidad_estado]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[probabilidad_estado]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: probabilidad_estado_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[probabilidad_estado]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[probabilidad_estado]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: probabilidad_estado_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[probabilidad_estado]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[probabilidad_estado]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: probabilidad_estado_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[probabilidad_estado]] con la lectura gráfica disponible en el leaf.
        en: Relate [[probabilidad_estado]] to the graph reading available in the leaf.
    likely_errors:
    - id: probabilidad_estado_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[probabilidad_estado]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[probabilidad_estado]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: probabilidad_estado_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[probabilidad_estado]], revisa la coherencia física y vuelve a la calculadora si necesitas
          otro despeje.
        en: After obtaining [[probabilidad_estado]], check the physical consistency and return to the calculator if another
          rearrangement is needed.
    physical_intuition:
    - id: probabilidad_estado_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[probabilidad_estado]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[probabilidad_estado]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: probabilidad_estado_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[probabilidad_estado]] comprobando qué ocurre si una magnitud dominante crece, disminuye
          o se anula.
        en: Analyze the limiting cases of [[probabilidad_estado]] by checking what happens if a dominant quantity grows, decreases,
