version: '1.0'
leaf: radiacion-termica
coord:
  title:
    es: Potencia radiada frente a temperatura absoluta
    en: Radiated power versus absolute temperature
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Potencia radiada P (W)
    en: Radiated power P (W)
  agentHints:
    es:
    - 'La curva no es lineal: crece con la cuarta potencia de la temperatura absoluta.'
    - Usa siempre Kelvin en el eje horizontal.
    - La emisividad y el área cambian la escala vertical, no el exponente de la curva.
    en:
    - 'The curve is not linear: it grows with the fourth power of absolute temperature.'
    - Always use kelvin on the horizontal axis.
    - Emissivity and area change the vertical scale, not the curve exponent.
