version: 5.0.0
magnitudes:
- id: flujo_calor_radiativo_vector
  symbol: \vec{q}_{rad}
  nombre:
    es: Flujo radiativo vectorial
    en: Vector radiative heat flux
  descripcion:
    es: Flujo de energía radiativa orientado según la dirección de propagación neta.
    en: Radiative energy flux oriented along the net propagation direction.
  unidad_si: W/m^2
  dimension: '[M T^-3]'
  is_vector: true
  components:
  - flujo_calor_radiativo_vector_x
  - flujo_calor_radiativo_vector_y
  - flujo_calor_radiativo_vector_z
  category: vectorial
  physical_role: parameter
  used_in: []
  common_mistake: Confundir flujo vectorial con potencia total emitida por una superficie.
  typical_range: Depende de la fuente, orientación y distancia
  sign_behavior:
    has_sign: true
    meaning:
      es: El signo de cada componente indica sentido respecto al eje elegido.
      en: The sign of each component indicates direction relative to the chosen axis.
  zero_behavior:
    allowed: true
    meaning:
      es: Flujo nulo significa equilibrio direccional o ausencia de transferencia neta.
      en: Zero flux means directional balance or no net transfer.
  value_nature:
    kind: vector
    nonnegative_only: false
    expected_interval: real vector components
  interpretation_role:
    primary_for:
    - graph_reading
    secondary_for:
    - potencia_neta
  graph_binding:
    preferred_axis: y
    graphable: false
    role: directional_context
  pedagogical_notes:
    es: Útil para recordar que la radiación transporta energía con dirección aunque muchas fórmulas sean escalares.
    en: Useful to remember that radiation carries energy with direction although many formulas are scalar.
- id: flujo_calor_radiativo_vector_x
  symbol: q_{rad,x}
  nombre:
    es: Componente x del flujo radiativo
    en: x component of radiative flux
  descripcion:
    es: Componente horizontal del flujo radiativo neto.
    en: Horizontal component of net radiative flux.
  unidad_si: W/m^2
  dimension: '[M T^-3]'
  is_vector: false
  components: []
  category: vector_component
  physical_role: parameter
  used_in: []
  common_mistake: Usar componentes sin definir el sistema de ejes.
  typical_range: Valor positivo o negativo según ejes
  sign_behavior:
    has_sign: true
    meaning:
      es: Indica sentido sobre el eje x.
      en: Indicates direction along the x-axis.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay componente neta en x.
      en: There is no net x component.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-∞, +∞)
  interpretation_role:
    primary_for: []
    secondary_for:
    - flujo_calor_radiativo_vector
  graph_binding:
    preferred_axis: none
    graphable: false
    role: component
  pedagogical_notes:
    es: Solo tiene sentido tras fijar orientación y geometría.
    en: It only makes sense after orientation and geometry are fixed.
- id: flujo_calor_radiativo_vector_y
  symbol: q_{rad,y}
  nombre:
    es: Componente y del flujo radiativo
    en: y component of radiative flux
  descripcion:
    es: Componente vertical del flujo radiativo neto.
    en: Vertical component of net radiative flux.
  unidad_si: W/m^2
  dimension: '[M T^-3]'
  is_vector: false
  components: []
  category: vector_component
  physical_role: parameter
  used_in: []
  common_mistake: Interpretar el signo sin mirar el convenio de ejes.
  typical_range: Valor positivo o negativo según ejes
  sign_behavior:
    has_sign: true
    meaning:
      es: Indica sentido sobre el eje y.
      en: Indicates direction along the y-axis.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay componente neta en y.
      en: There is no net y component.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-∞, +∞)
  interpretation_role:
    primary_for: []
    secondary_for:
    - flujo_calor_radiativo_vector
  graph_binding:
    preferred_axis: none
    graphable: false
    role: component
  pedagogical_notes:
    es: Ayuda a conectar radiación con dirección espacial en escenas térmicas.
    en: Helps connect radiation with spatial direction in thermal scenes.
- id: flujo_calor_radiativo_vector_z
  symbol: q_{rad,z}
  nombre:
    es: Componente z del flujo radiativo
    en: z component of radiative flux
  descripcion:
    es: Componente perpendicular del flujo radiativo neto.
    en: Perpendicular component of net radiative flux.
  unidad_si: W/m^2
  dimension: '[M T^-3]'
  is_vector: false
  components: []
  category: vector_component
  physical_role: parameter
  used_in: []
  common_mistake: Olvidar que en 3D puede existir flujo fuera del plano representado.
  typical_range: Valor positivo o negativo según ejes
  sign_behavior:
    has_sign: true
    meaning:
      es: Indica sentido sobre el eje z.
      en: Indicates direction along the z-axis.
  zero_behavior:
    allowed: true
    meaning:
      es: No hay componente neta en z.
      en: There is no net z component.
  value_nature:
    kind: real
    nonnegative_only: false
    expected_interval: (-∞, +∞)
  interpretation_role:
    primary_for: []
    secondary_for:
    - flujo_calor_radiativo_vector
  graph_binding:
    preferred_axis: none
    graphable: false
    role: component
  pedagogical_notes:
    es: Suele omitirse en problemas planos, pero completa el tratamiento vectorial.
    en: Often omitted in planar problems, but it completes the vector treatment.
- id: temperatura_absoluta
  symbol: T
  nombre:
    es: Temperatura absoluta
    en: Absolute temperature
  descripcion:
    es: Temperatura termodinámica del cuerpo emisor medida desde el cero absoluto.
    en: Thermodynamic temperature of the emitting body measured from absolute zero.
  unidad_si: K
  dimension: '[Θ]'
  is_vector: false
  components: []
  category: fundamental_scalar
  physical_role: input
  used_in:
  - ley_stefan_boltzmann_potencia
  - potencia_neta_radiacion
  - emitancia_radiativa
  common_mistake: Usar grados Celsius directamente en leyes con cuarta potencia.
  typical_range: Mayor que 0 K
  sign_behavior:
    has_sign: false
    meaning:
      es: No se usa signo; la escala Kelvin es no negativa.
      en: No sign is used; the Kelvin scale is nonnegative.
  zero_behavior:
    allowed: false
    meaning:
      es: El cero absoluto es límite ideal, no temperatura práctica del emisor.
      en: Absolute zero is an ideal limit, not a practical emitter temperature.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - ley_stefan_boltzmann_potencia
    - potencia_neta_radiacion
    - emitancia_radiativa
    secondary_for: []
  graph_binding:
    preferred_axis: x
    graphable: true
    role: independent_variable
  pedagogical_notes:
    es: Es la magnitud que más cambia la radiación porque aparece elevada a la cuarta potencia.
    en: It is the quantity that changes radiation most strongly because it appears to the fourth power.
- id: temperatura_entorno
  symbol: T_{ent}
  nombre:
    es: Temperatura del entorno
    en: Surroundings temperature
  descripcion:
    es: Temperatura efectiva del entorno con el que el cuerpo intercambia radiación.
    en: Effective surroundings temperature with which the body exchanges radiation.
  unidad_si: K
  dimension: '[Θ]'
  is_vector: false
  components: []
  category: fundamental_scalar
  physical_role: input
  used_in:
  - potencia_neta_radiacion
  common_mistake: Olvidar que el entorno también emite radiación hacia el cuerpo.
  typical_range: Mayor que 0 K
  sign_behavior:
    has_sign: false
    meaning:
      es: No se usa signo; se mide en Kelvin.
      en: No sign is used; it is measured in kelvin.
  zero_behavior:
    allowed: false
    meaning:
      es: Cero absoluto del entorno es un límite ideal.
      en: Absolute zero surroundings is an ideal limit.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - potencia_neta_radiacion
    secondary_for:
    - ley_stefan_boltzmann_potencia
  graph_binding:
    preferred_axis: parameter
    graphable: true
    role: environment_parameter
  pedagogical_notes:
    es: Permite distinguir potencia emitida de potencia neta intercambiada.
    en: It separates emitted power from net exchanged power.
- id: area_superficie
  symbol: A
  nombre:
    es: Área de superficie
    en: Surface area
  descripcion:
    es: Superficie efectiva que emite o intercambia radiación térmica.
    en: Effective surface that emits or exchanges thermal radiation.
  unidad_si: m^2
  dimension: '[L^2]'
  is_vector: false
  components: []
  category: fundamental_scalar
  physical_role: input
  used_in:
  - ley_stefan_boltzmann_potencia
  - potencia_neta_radiacion
  common_mistake: Usar el área geométrica equivocada para la superficie emisora real.
  typical_range: Depende del objeto
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo.
      en: It has no sign.
  zero_behavior:
    allowed: false
    meaning:
      es: Área cero elimina la emisión idealizada.
      en: Zero area removes idealized emission.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: (0, +∞)
  interpretation_role:
    primary_for:
    - ley_stefan_boltzmann_potencia
    - potencia_neta_radiacion
    secondary_for:
    - emitancia_radiativa
  graph_binding:
    preferred_axis: parameter
    graphable: true
    role: scale_factor
  pedagogical_notes:
    es: 'Escala linealmente la potencia: duplicar área duplica emisión.'
    en: 'It scales power linearly: doubling area doubles emission.'
- id: emisividad
  symbol: \varepsilon
  nombre:
    es: Emisividad
    en: Emissivity
  descripcion:
    es: Factor adimensional que mide qué tan eficazmente emite una superficie frente a un cuerpo negro.
    en: Dimensionless factor measuring how effectively a surface emits compared with a blackbody.
  unidad_si: '1'
  dimension: '[1]'
  is_vector: false
  components: []
  category: configuration_parameter
  physical_role: input
  used_in:
  - ley_stefan_boltzmann_potencia
  - potencia_neta_radiacion
  - emitancia_radiativa
  common_mistake: Tomarla siempre como uno sin revisar el material.
  typical_range: 0 a 1
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo.
      en: It has no sign.
  zero_behavior:
    allowed: true
    meaning:
      es: Emisividad cero representa superficie ideal que no emite térmicamente.
      en: Zero emissivity represents an ideal surface that does not thermally emit.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, 1]'
  interpretation_role:
    primary_for:
    - ley_stefan_boltzmann_potencia
    - potencia_neta_radiacion
    - emitancia_radiativa
    secondary_for: []
  graph_binding:
    preferred_axis: parameter
    graphable: true
    role: material_parameter
  pedagogical_notes:
    es: Es un parámetro de superficie, no una propiedad universal del objeto aislado de su acabado.
    en: It is a surface parameter, not a universal property of the object apart from its finish.
- id: constante_stefan_boltzmann
  symbol: \sigma
  nombre:
    es: Constante de Stefan-Boltzmann
    en: Stefan-Boltzmann constant
  descripcion:
    es: Constante física que relaciona temperatura absoluta y emisión de un cuerpo negro.
    en: Physical constant relating absolute temperature and blackbody emission.
  unidad_si: W/(m^2 K^4)
  dimension: '[M T^-3 Θ^-4]'
  is_vector: false
  components: []
  category: physical_constant
  physical_role: constant
  used_in:
  - ley_stefan_boltzmann_potencia
  - potencia_neta_radiacion
  - emitancia_radiativa
  common_mistake: Redondearla en exceso en cálculos sensibles a temperatura.
  typical_range: 5.670374419e-8 W/(m^2 K^4)
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo.
      en: It has no sign.
  zero_behavior:
    allowed: false
    meaning:
      es: No puede ser cero en la teoría física.
      en: It cannot be zero in the physical theory.
  value_nature:
    kind: constant
    nonnegative_only: true
    expected_interval: '5.670374419e-8'
  interpretation_role:
    primary_for:
    - ley_stefan_boltzmann_potencia
    - potencia_neta_radiacion
    - emitancia_radiativa
    secondary_for: []
  graph_binding:
    preferred_axis: constant
    graphable: false
    role: universal_constant
  pedagogical_notes:
    es: Su unidad compensa el exponente cuarto de la temperatura.
    en: Its unit compensates for the fourth power of temperature.
- id: potencia_radiada
  symbol: P
  nombre:
    es: Potencia radiada
    en: Radiated power
  descripcion:
    es: Energía emitida por radiación térmica por unidad de tiempo.
    en: Energy emitted by thermal radiation per unit time.
  unidad_si: W
  dimension: '[M L^2 T^-3]'
  is_vector: false
  components: []
  category: calculable
  physical_role: calculable
  used_in:
  - ley_stefan_boltzmann_potencia
  - calor_radiado
  common_mistake: Confundir potencia radiada total con potencia neta intercambiada.
  typical_range: Desde valores pequeños hasta muy grandes según T y A
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo en la emisión total.
      en: It has no sign in total emission.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero significa ausencia ideal de emisión en el modelo.
      en: Zero means ideal absence of emission in the model.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - ley_stefan_boltzmann_potencia
    - calor_radiado
    secondary_for:
    - potencia_neta_radiacion
    - emitancia_radiativa
  graph_binding:
    preferred_axis: y
    graphable: true
    role: dependent_variable
  pedagogical_notes:
    es: Es la magnitud dominante del leaf y la salida principal de la ley de Stefan-Boltzmann.
    en: It is the dominant quantity of the leaf and the main output of the Stefan-Boltzmann law.
- id: potencia_neta
  symbol: P_{net}
  nombre:
    es: Potencia neta
    en: Net power
  descripcion:
    es: Balance de potencia radiativa entre un cuerpo y su entorno.
    en: Radiative power balance between a body and its surroundings.
  unidad_si: W
  dimension: '[M L^2 T^-3]'
  is_vector: false
  components: []
  category: calculable
  physical_role: calculable
  used_in:
  - potencia_neta_radiacion
  common_mistake: Olvidar el término de absorción del entorno.
  typical_range: Puede ser positiva, cero o negativa
  sign_behavior:
    has_sign: true
    meaning:
      es: Positiva indica pérdida neta; negativa indica ganancia neta.
      en: Positive indicates net loss; negative indicates net gain.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero indica equilibrio radiativo entre cuerpo y entorno.
      en: Zero indicates radiative equilibrium between body and surroundings.
  value_nature:
    kind: scalar
    nonnegative_only: false
    expected_interval: (-∞, +∞)
  interpretation_role:
    primary_for:
    - potencia_neta_radiacion
    secondary_for:
    - ley_stefan_boltzmann_potencia
  graph_binding:
    preferred_axis: y
    graphable: true
    role: dependent_variable
  pedagogical_notes:
    es: Su signo es esencial para leer si el cuerpo se enfría o se calienta radiativamente.
    en: Its sign is essential to read whether the body cools or warms radiatively.
- id: emitancia_radiativa
  symbol: M
  nombre:
    es: Emitancia radiativa
    en: Radiant exitance
  descripcion:
    es: Potencia emitida por unidad de área superficial.
    en: Power emitted per unit surface area.
  unidad_si: W/m^2
  dimension: '[M T^-3]'
  is_vector: false
  components: []
  category: calculable
  physical_role: calculable
  used_in:
  - emitancia_radiativa
  common_mistake: Tratarla como energía total en vez de densidad superficial de potencia.
  typical_range: Depende fuertemente de la temperatura
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo.
      en: It has no sign.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero significa emisión superficial nula en el modelo.
      en: Zero means no surface emission in the model.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - emitancia_radiativa
    secondary_for:
    - ley_stefan_boltzmann_potencia
  graph_binding:
    preferred_axis: y
    graphable: true
    role: surface_density
  pedagogical_notes:
    es: Ayuda a comparar superficies sin que el área total esconda el efecto térmico.
    en: It helps compare surfaces without total area hiding the thermal effect.
- id: energia_radiada
  symbol: Q
  nombre:
    es: Energía radiada
    en: Radiated energy
  descripcion:
    es: Energía total transferida mediante radiación durante un intervalo.
    en: Total energy transferred by radiation during an interval.
  unidad_si: J
  dimension: '[M L^2 T^-2]'
  is_vector: false
  components: []
  category: calculable
  physical_role: calculable
  used_in:
  - calor_radiado
  common_mistake: Confundir julios con vatios al mezclar energía y potencia.
  typical_range: Depende de potencia y tiempo
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo en la energía emitida total.
      en: It has no sign for total emitted energy.
  zero_behavior:
    allowed: true
    meaning:
      es: Cero significa que no se ha emitido energía en el intervalo ideal.
      en: Zero means no energy was emitted in the ideal interval.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - calor_radiado
    secondary_for:
    - ley_stefan_boltzmann_potencia
  graph_binding:
    preferred_axis: y
    graphable: true
    role: accumulated_result
  pedagogical_notes:
    es: Aparece cuando se pasa de rapidez de emisión a cantidad total emitida.
    en: It appears when moving from emission rate to total emitted amount.
- id: intervalo_tiempo
  symbol: \Delta t
  nombre:
    es: Intervalo de tiempo
    en: Time interval
  descripcion:
    es: Duración durante la cual se mantiene o promedia la emisión radiativa.
    en: Duration over which radiative emission is maintained or averaged.
  unidad_si: s
  dimension: '[T]'
  is_vector: false
  components: []
  category: configuration_parameter
  physical_role: input
  used_in:
  - calor_radiado
  common_mistake: Usar minutos u horas sin convertir a segundos en SI.
  typical_range: Mayor o igual que 0 s
  sign_behavior:
    has_sign: false
    meaning:
      es: No tiene signo en este contexto.
      en: It has no sign in this context.
  zero_behavior:
    allowed: true
    meaning:
      es: Intervalo cero implica energía radiada nula.
      en: Zero interval implies zero radiated energy.
  value_nature:
    kind: scalar
    nonnegative_only: true
    expected_interval: '[0, +∞)'
  interpretation_role:
    primary_for:
    - calor_radiado
    secondary_for: []
  graph_binding:
    preferred_axis: x
    graphable: true
    role: time_parameter
  pedagogical_notes:
    es: Convierte potencia en energía acumulada cuando la potencia puede considerarse constante.
    en: It converts power into accumulated energy when power can be treated as constant.
