version: '1.0'
leaf: radiacion-termica
coord:
  id: radiacion-termica-Coord
  graphId: radiacion-termica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Potencia radiada frente a temperatura absoluta
    en: Radiated power versus absolute temperature
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Potencia radiada P (W)
    en: Radiated power P (W)
  xMagnitude: temperatura_absoluta
  yMagnitude: potencia_radiada
  relation:
    es: Para ε y A constantes, P=εσAT⁴.
    en: For constant ε and A, P=εσAT⁴.
  physicalReading:
    es: La potencia radiada crece muy rápido al aumentar la temperatura absoluta.
    en: Radiated power grows very rapidly as absolute temperature increases.
  slopeMeaning:
    es: La pendiente representa dP/dT=4εσAT³; aumenta con T.
    en: The slope represents dP/dT=4εσAT³; it increases with T.
  interceptMeaning:
    es: En el modelo ideal, P=0 cuando T=0 K.
    en: In the ideal model, P=0 when T=0 K.
  curvatureMeaning:
    es: La curvatura convexa indica dependencia de cuarta potencia, no lineal.
    en: The convex curvature indicates a fourth-power, non-linear dependence.
  signMeaning:
    es: La emisión bruta es siempre no negativa para valores físicos de T, A y ε.
    en: Gross emission is always non-negative for physical values of T, A, and ε.
  areaMeaning:
    es: El área bajo P(T) no representa directamente una energía térmica sin integrar respecto a una variable temporal o proceso
      definido.
    en: The area under P(T) does not directly represent thermal energy unless integrated with respect to a defined time variable
      or process.
  domainMeaning:
    es: El dominio físico usa T≥0 K, A≥0 y 0≤ε≤1; la gráfica evita temperaturas Celsius negativas interpretadas como kelvin.
    en: The physical domain uses T≥0 K, A≥0, and 0≤ε≤1; the graph avoids Celsius temperatures misread as kelvin.
  modelConnection:
    es: La curva representa el modelo de superficie gris de Stefan-Boltzmann con área y emisividad constantes.
    en: The curve represents the Stefan-Boltzmann gray-surface model with constant area and emissivity.
  formulaConnection:
    es: Conecta directamente con {{f:ley_stefan_boltzmann}} y, por unidad de área, con {{f:flujo_radiativo_emitido}}.
    en: It connects directly with {{f:ley_stefan_boltzmann}} and, per unit area, with {{f:flujo_radiativo_emitido}}.
  readingFocus:
    es: Reconocer que duplicar T multiplica P por 16 si ε y A no cambian.
    en: Recognize that doubling T multiplies P by 16 if ε and A do not change.
  agentHints:
    es:
    - Insiste en que la temperatura debe estar en kelvin.
    - Compara la curva con una recta para detectar la no linealidad.
    - Relaciona la pendiente creciente con el aumento de sensibilidad térmica.
    en:
    - Emphasize that temperature must be in kelvin.
    - Compare the curve with a straight line to detect nonlinearity.
    - Relate the increasing slope to rising thermal sensitivity.
  commonMistakes:
    es:
    - Leer la gráfica como si P fuera proporcional a T.
    - Sustituir T en grados Celsius.
    - Pensar que el área bajo la curva es automáticamente calor transferido.
    en:
    - Reading the graph as if P were proportional to T.
    - Substituting T in degrees Celsius.
    - Thinking the area under the curve is automatically transferred heat.
  curveProfile:
    type: power
    expectedShape:
      es: Curva creciente, convexa y cada vez más empinada.
      en: Increasing, convex curve that becomes progressively steeper.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Cero absoluto ideal
        en: Ideal absolute zero
    - x: 300
      y: 45.9
      label:
        es: Temperatura ambiente aproximada
        en: Approximate room temperature
    - x: 600
      y: 734.9
      label:
        es: Duplicar T multiplica P por 16
        en: Doubling T multiplies P by 16
  dataRange:
    xMin: 0
    xMax: 1000
    yMin: 0
    yMax: 6000
    autoScale: true
  recommendedTab: graficas
