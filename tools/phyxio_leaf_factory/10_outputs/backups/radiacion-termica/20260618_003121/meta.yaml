interpretacion:
  summary:
    es: La radiación térmica aumenta de forma no lineal con la temperatura absoluta y depende de la emisividad de la superficie.
    en: Thermal radiation increases nonlinearly with absolute temperature and depends on surface emissivity.
  physical_reading:
    es: Una pequeña subida de temperatura puede producir un aumento grande de potencia radiada porque la dependencia principal
      es con T⁴.
    en: A small temperature increase can produce a large increase in radiated power because the main dependence is on T⁴.
  model_validity:
    es: El modelo de Stefan-Boltzmann es adecuado para superficies radiantes idealizadas o grises con emisividad conocida.
    en: The Stefan-Boltzmann model is suitable for idealized or gray radiating surfaces with known emissivity.
  graph_reading:
    es: La gráfica P frente a T es creciente y convexa; no representa una proporcionalidad lineal entre potencia y temperatura.
    en: The P versus T graph is increasing and convex; it does not represent a linear proportionality between power and temperature.
  likely_errors:
    es: Confundir grados Celsius con kelvin, olvidar la cuarta potencia o tratar la emisividad como una unidad.
    en: Confusing Celsius with kelvin, forgetting the fourth power, or treating emissivity as a unit.
  next_step:
    es: Comparar emisión neta con conducción y convección en situaciones reales de intercambio térmico.
    en: Compare net emission with conduction and convection in real heat-exchange situations.
