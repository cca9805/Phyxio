version: '1.0'
leaf: radiacion-termica
coord:
  id: radiacion-termica-Coord
  graphId: radiacion-termica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Potencia radiada frente a temperatura absoluta
    en: Radiated power versus absolute temperature
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Potencia radiada P (W)
    en: Radiated power P (W)
  xMagnitude: temperatura_absoluta
  yMagnitude: potencia_radiada
  relation:
    es: Para ε y A constantes, la potencia radiada sigue P=εσAT⁴.
    en: For constant ε and A, radiated power follows P=εσAT⁴.
  physicalReading:
    es: La potencia radiada crece muy rápido al aumentar la temperatura absoluta.
    en: Radiated power grows very rapidly as absolute temperature increases.
  slopeMeaning:
    es: La pendiente aumenta con T y representa sensibilidad térmica creciente.
    en: The slope increases with T and represents rising thermal sensitivity.
  interceptMeaning:
    es: En el modelo ideal, P=0 cuando T=0 K.
    en: In the ideal model, P=0 when T=0 K.
  curvatureMeaning:
    es: La curvatura convexa indica dependencia de cuarta potencia, no linealidad.
    en: The convex curvature indicates fourth-power dependence, not linearity.
  signMeaning:
    es: La emisión bruta es no negativa para valores físicos de T, A y ε.
    en: Gross emission is non-negative for physical values of T, A, and ε.
  areaMeaning:
    es: El área bajo P(T) no representa directamente energía transferida sin definir un proceso.
    en: The area under P(T) does not directly represent transferred energy without defining a process.
  domainMeaning:
    es: El dominio físico exige T≥0 K, A≥0 y 0≤ε≤1.
    en: The physical domain requires T≥0 K, A≥0, and 0≤ε≤1.
  modelConnection:
    es: La curva representa el modelo de superficie gris de Stefan-Boltzmann.
    en: The curve represents the Stefan-Boltzmann gray-surface model.
  formulaConnection:
    es: Conecta con {{f:ley_stefan_boltzmann}} y {{f:flujo_radiativo_emitido}}.
    en: It connects with {{f:ley_stefan_boltzmann}} and {{f:flujo_radiativo_emitido}}.
  readingFocus:
    es: Reconocer que duplicar T multiplica P por 16 si ε y A permanecen constantes.
    en: Recognize that doubling T multiplies P by 16 if ε and A remain constant.
  agentHints:
    es:
    - Insiste en que la temperatura debe estar en kelvin.
    - Compara la curva con una recta para detectar la no linealidad.
    - Relaciona la pendiente creciente con la sensibilidad térmica.
    en:
    - Emphasize that temperature must be in kelvin.
    - Compare the curve with a straight line to detect nonlinearity.
    - Relate the increasing slope to thermal sensitivity.
  commonMistakes:
    es:
    - Leer la gráfica como si P fuera proporcional a T.
    - Sustituir T en grados Celsius.
    - Pensar que el área bajo la curva es automáticamente calor transferido.
    en:
    - Reading the graph as if P were proportional to T.
    - Substituting T in degrees Celsius.
    - Thinking the area under the curve is automatically transferred heat.
  curveProfile:
    type: power
    expectedShape:
      es: Curva creciente, convexa y cada vez más empinada.
      en: Increasing, convex curve that becomes progressively steeper.
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Cero absoluto ideal
        en: Ideal absolute zero
    - x: 300
      y: 45.9
      label:
        es: Temperatura ambiente aproximada
        en: Approximate room temperature
    - x: 600
      y: 734.9
      label:
        es: Duplicar T multiplica P por 16
        en: Doubling T multiplies P by 16
  dataRange:
    xMin: 0
    xMax: 1000
    yMin: 0
    yMax: 6000
    autoScale: true
  recommendedTab: graficas
