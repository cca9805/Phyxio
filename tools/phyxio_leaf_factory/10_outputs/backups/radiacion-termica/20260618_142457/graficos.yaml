version: '1.0'
leaf: radiacion-termica
coord:
  id: radiacion-termica-Coord
  graphId: radiacion-termica-Coord
  type: Coord
  graphType: Coord
  title:
    es: Potencia radiada frente a temperatura absoluta
    en: Radiated power versus absolute temperature
  xAxis:
    es: Temperatura absoluta T (K)
    en: Absolute temperature T (K)
  yAxis:
    es: Potencia radiada P (W)
    en: Radiated power P (W)
  xMagnitude: temperatura_absoluta
  yMagnitude: potencia_radiada
  relation:
    es: La gráfica responde cómo la potencia radiada depende de la temperatura absoluta; área y emisividad escalan la curva.
    en: The graph answers how radiated power depends on absolute temperature; area and emissivity scale the curve.
  physicalReading:
    es: Al aumentar la temperatura absoluta, la potencia radiada crece muy rápido; el intercambio neto se lee comparando con
      la temperatura ambiente.
    en: As absolute temperature increases, radiated power grows very rapidly; net exchange is read by comparing with ambient
      temperature.
  slopeMeaning:
    es: La pendiente aumenta con T y muestra que la dependencia no es lineal.
    en: The slope increases with T and shows the dependence is not linear.
  interceptMeaning:
    es: En el modelo ideal, la potencia radiada se anula en T=0 K.
    en: In the ideal model, radiated power vanishes at T=0 K.
  curvatureMeaning:
    es: La curvatura convexa expresa la dependencia T⁴.
    en: The convex curvature expresses the T⁴ dependence.
  signMeaning:
    es: La potencia radiada bruta es no negativa; el signo aparece en el intercambio neto.
    en: Gross radiated power is non-negative; sign appears in net exchange.
  areaMeaning:
    es: El área bajo P(T) no representa calor transferido sin definir un proceso.
    en: The area under P(T) does not represent transferred heat without defining a process.
  domainMeaning:
    es: 'Dominio físico: T≥0 K, A≥0 y 0≤ε≤1.'
    en: 'Physical domain: T≥0 K, A≥0, and 0≤ε≤1.'
  modelConnection:
    es: La curva usa el modelo de Stefan-Boltzmann para superficie gris con área y emisividad constantes.
    en: The curve uses the Stefan-Boltzmann model for a gray surface with constant area and emissivity.
  formulaConnection:
    es: Conecta con {{f:ley_stefan_boltzmann}} para potencia radiada y con {{f:radiacion_neta}} para intercambio neto.
    en: It connects with {{f:ley_stefan_boltzmann}} for radiated power and {{f:radiacion_neta}} for net exchange.
  readingFocus:
    es: Leer cómo temperatura absoluta, área y emisividad controlan la potencia radiada, y cuándo la temperatura ambiente
      convierte esa emisión en intercambio neto.
    en: Read how absolute temperature, area, and emissivity control radiated power, and when ambient temperature turns that
      emission into net exchange.
  agentHints:
    es:
    - Relaciona la gráfica con potencia radiada e intercambio neto.
    - Insiste en temperatura absoluta en kelvin.
    - Explica que área y emisividad escalan la curva T⁴.
    en:
    - Relate the graph to radiated power and net exchange.
    - Emphasize absolute temperature in kelvin.
    - Explain that area and emissivity scale the T⁴ curve.
  commonMistakes:
    es:
    - Leer la curva como lineal.
    - Usar Celsius en vez de kelvin.
    - Confundir potencia radiada bruta con intercambio neto.
    en:
    - Reading the curve as linear.
    - Using Celsius instead of kelvin.
    - Confusing gross radiated power with net exchange.
  curveProfile:
    type: power
    expectedShape:
      es: 'Curva creciente y convexa: P aumenta como T⁴.'
      en: 'Increasing and convex curve: P increases as T⁴.'
    keyPoints:
    - x: 0
      y: 0
      label:
        es: Cero absoluto ideal
        en: Ideal absolute zero
    - x: 300
      y: 45.9
      label:
        es: Escala ambiente para εA=0,01 m²
        en: Ambient scale for εA=0.01 m²
    - x: 600
      y: 734.9
      label:
        es: Duplicar T multiplica P por 16
        en: Doubling T multiplies P by 16
  dataRange:
    xMin: 0
    xMax: 1000
    yMin: 0
    yMax: 6000
    autoScale: true
  recommendedTab: graficas
