      es: resultado que conecta la lectura clásica y estadística
      en: result connecting classical and statistical readings
    summary_rules:
    - id: delta_entropia_summary_base
      when: 'true'
      status: ok
      text:
        es: El resultado [[delta_entropia]] indica la magnitud física principal que se está interpretando.
        en: The result [[delta_entropia]] indicates the main physical quantity being interpreted.
    physical_reading_rules:
    - id: delta_entropia_physical_reading_base
      when: 'true'
      status: info
      text:
        es: Lee [[delta_entropia]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[delta_entropia]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: delta_entropia_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[delta_entropia]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[delta_entropia]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: delta_entropia_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[delta_entropia]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[delta_entropia]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: delta_entropia_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[delta_entropia]] con la lectura gráfica disponible en el leaf.
        en: Relate [[delta_entropia]] to the graph reading available in the leaf.
    likely_errors:
    - id: delta_entropia_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[delta_entropia]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[delta_entropia]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: delta_entropia_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[delta_entropia]], revisa la coherencia física y vuelve a la calculadora si necesitas otro
          despeje.
        en: After obtaining [[delta_entropia]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: delta_entropia_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[delta_entropia]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[delta_entropia]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: delta_entropia_limiting_case_base
      when: 'true'
      status: info
      text:
        es: Analiza los casos límite de [[delta_entropia]] comprobando qué ocurre si una magnitud dominante crece, disminuye
          o se anula.
        en: Analyze the limiting cases of [[delta_entropia]] by checking what happens if a dominant quantity grows, decreases,
          or becomes zero.
