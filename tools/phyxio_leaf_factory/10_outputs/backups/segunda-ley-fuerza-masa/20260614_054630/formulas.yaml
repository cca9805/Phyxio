version: "5.0.0"
ui:
  default_formula: "segunda_ley_newton_vectorial"
formulas:
  - id: "segunda_ley_newton_vectorial"
    title:
      es: "Segunda ley de Newton vectorial"
      en: "Newton's second law in vector form"
    equation: "fuerza_neta = masa * aceleracion"
    latex: "\\vec{F}_{\\mathrm{net}} = m \\cdot \\vec{a}"
    magnitudes:
      - "fuerza_neta"
      - "masa"
      - "aceleracion"
    category: "ley_fundamental"
    relation_type: "vectorial"
    physical_meaning:
      es: "La fuerza neta externa determina la aceleración del cuerpo para una masa dada."
      en: "The external net force determines the body's acceleration for a given mass."
    constraints:
      - "Sistema de referencia inercial."
      - "Masa constante."
      - "Cuerpo modelado como partícula o sólido con traslación del centro de masas."
    validity:
      es: "Válida para dinámica newtoniana clásica con velocidades mucho menores que la velocidad de la luz."
      en: "Valid for classical Newtonian dynamics with speeds much lower than the speed of light."
    dimension_check: "M L T^-2 = M * L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "teoria"
      - "ejemplos"
      - "interpretacion"
      - "dcl"
    interpretation_tags:
      - "fuerza_neta"
      - "masa"
      - "aceleracion"
      - "direccion_vectorial"
    result_semantics:
      target: "fuerza_neta"
      kind: "vector"
      sign_meaning: "La dirección de la fuerza neta coincide con la dirección de la aceleración."
      absolute_value_meaning: "El módulo indica la intensidad total de la interacción externa no compensada."
    domain_checks:
      - "masa > 0"
      - "aceleracion finita"
      - "sistema_inercial = true"
    coherence_checks:
      - "fuerza_neta y aceleracion deben ser paralelas si masa es positiva."
      - "Si fuerza_neta es cero, aceleracion debe ser cero."
    graph_implications:
      - "En Coord, la pendiente de F frente a a es la masa."
      - "En Dcl, la suma vectorial de fuerzas debe apuntar como la aceleración."
    pedagogical_triggers:
      - "Distinguir fuerza individual y fuerza neta."
      - "Leer primero el DCL antes de sustituir números."
    rearrangements:
      - target: "fuerza_neta"
        equation: "fuerza_neta = masa * aceleracion"
        latex: "\\vec{F}_{\\mathrm{net}} = m \\cdot \\vec{a}"
      - target: "masa"
        equation: "masa = fuerza_neta / aceleracion"
        latex: "m = \\frac{\\left|\\vec{F}_{\\mathrm{net}}\\right|}{\\left|\\vec{a}\\right|}"
      - target: "aceleracion"
        equation: "aceleracion = fuerza_neta / masa"
        latex: "\\vec{a} = \\frac{\\vec{F}_{\\mathrm{net}}}{m}"

  - id: "aceleracion_desde_fuerza_neta"
    title:
      es: "Aceleración producida por una fuerza neta"
      en: "Acceleration produced by a net force"
    equation: "aceleracion = fuerza_neta / masa"
    latex: "\\vec{a} = \\frac{\\vec{F}_{\\mathrm{net}}}{m}"
    magnitudes:
      - "aceleracion"
      - "fuerza_neta"
      - "masa"
    category: "despeje_fundamental"
    relation_type: "vectorial"
    physical_meaning:
      es: "Para una masa fija, la aceleración aumenta con la fuerza neta y disminuye con la masa."
      en: "For fixed mass, acceleration increases with net force and decreases with mass."
    constraints:
      - "masa > 0"
      - "Fuerza neta externa conocida."
      - "Sistema de referencia inercial."
    validity:
      es: "Aplicable cuando la masa no cambia durante el intervalo analizado."
      en: "Applicable when mass does not change during the analyzed interval."
    dimension_check: "L T^-2 = M L T^-2 / M"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "calculadora"
      - "ejemplos"
      - "interpretacion"
    interpretation_tags:
      - "aceleracion"
      - "inercia"
      - "proporcionalidad"
    result_semantics:
      target: "aceleracion"
      kind: "vector"
      sign_meaning: "El signo o dirección indica hacia dónde cambia la velocidad."
      absolute_value_meaning: "El módulo mide la rapidez con la que cambia la velocidad."
    domain_checks:
      - "masa > 0"
      - "fuerza_neta finita"
    coherence_checks:
      - "La aceleración debe tener la misma dirección que la fuerza neta."
      - "A masa mayor, el mismo módulo de fuerza neta produce menor aceleración."
    graph_implications:
      - "En una gráfica a frente a F, la pendiente es 1/m."
      - "Si F se duplica y m permanece constante, a se duplica."
    pedagogical_triggers:
      - "No confundir aceleración con velocidad."
      - "Revisar unidades antes de interpretar el resultado."
    rearrangements:
      - target: "aceleracion"
        equation: "aceleracion = fuerza_neta / masa"
        latex: "\\vec{a} = \\frac{\\vec{F}_{\\mathrm{net}}}{m}"
      - target: "fuerza_neta"
        equation: "fuerza_neta = masa * aceleracion"
        latex: "\\vec{F}_{\\mathrm{net}} = m \\cdot \\vec{a}"
      - target: "masa"
        equation: "masa = fuerza_neta / aceleracion"
        latex: "m = \\frac{\\left|\\vec{F}_{\\mathrm{net}}\\right|}{\\left|\\vec{a}\\right|}"

  - id: "segunda_ley_newton_eje_x"
    title:
      es: "Segunda ley de Newton en el eje x"
      en: "Newton's second law along the x-axis"
    equation: "fuerza_neta_x = masa * aceleracion_x"
    latex: "F_{\\mathrm{net},x} = m \\cdot a_x"
    magnitudes:
      - "fuerza_neta_x"
      - "masa"
      - "aceleracion_x"
    category: "ley_por_componentes"
    relation_type: "escalar_con_signo"
    physical_meaning:
      es: "La suma de fuerzas en x determina la aceleración en x."
      en: "The sum of forces along x determines the acceleration along x."
    constraints:
      - "Eje x definido."
      - "Componentes proyectadas con signo."
      - "Masa constante y positiva."
    validity:
      es: "Válida cuando el movimiento se analiza en un sistema inercial con ejes consistentes."
      en: "Valid when motion is analyzed in an inertial frame with consistent axes."
    dimension_check: "M L T^-2 = M * L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "ejemplos"
      - "calculadora"
      - "dcl"
    interpretation_tags:
      - "componente_x"
      - "signo"
      - "suma_fuerzas"
    result_semantics:
      target: "fuerza_neta_x"
      kind: "scalar_component"
      sign_meaning: "El signo indica el sentido de la resultante sobre el eje x."
      absolute_value_meaning: "El valor absoluto indica el módulo de la resultante en x."
    domain_checks:
      - "masa > 0"
      - "eje_x definido"
    coherence_checks:
      - "Si fuerza_neta_x es cero, aceleracion_x debe ser cero."
      - "fuerza_neta_x y aceleracion_x deben tener el mismo signo."
    graph_implications:
      - "En Coord, F_x frente a a_x es una recta de pendiente m."
    pedagogical_triggers:
      - "Elegir eje antes de escribir signos."
      - "Separar componentes de módulos."
    rearrangements:
      - target: "fuerza_neta_x"
        equation: "fuerza_neta_x = masa * aceleracion_x"
        latex: "F_{\\mathrm{net},x} = m \\cdot a_x"
      - target: "masa"
        equation: "masa = fuerza_neta_x / aceleracion_x"
        latex: "m = \\frac{F_{\\mathrm{net},x}}{a_x}"
      - target: "aceleracion_x"
        equation: "aceleracion_x = fuerza_neta_x / masa"
        latex: "a_x = \\frac{F_{\\mathrm{net},x}}{m}"

  - id: "segunda_ley_newton_eje_y"
    title:
      es: "Segunda ley de Newton en el eje y"
      en: "Newton's second law along the y-axis"
    equation: "fuerza_neta_y = masa * aceleracion_y"
    latex: "F_{\\mathrm{net},y} = m \\cdot a_y"
    magnitudes:
      - "fuerza_neta_y"
      - "masa"
      - "aceleracion_y"
    category: "ley_por_componentes"
    relation_type: "escalar_con_signo"
    physical_meaning:
      es: "La suma de fuerzas en y determina la aceleración en y."
      en: "The sum of forces along y determines the acceleration along y."
    constraints:
      - "Eje y definido."
      - "Componentes proyectadas con signo."
      - "Masa constante y positiva."
    validity:
      es: "Válida para análisis por componentes en dinámica newtoniana clásica."
      en: "Valid for component analysis in classical Newtonian dynamics."
    dimension_check: "M L T^-2 = M * L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "ejemplos"
      - "calculadora"
      - "dcl"
    interpretation_tags:
      - "componente_y"
      - "signo"
      - "equilibrio_vertical"
    result_semantics:
      target: "fuerza_neta_y"
      kind: "scalar_component"
      sign_meaning: "El signo indica el sentido de la resultante sobre el eje y."
      absolute_value_meaning: "El valor absoluto indica el módulo de la resultante en y."
    domain_checks:
      - "masa > 0"
      - "eje_y definido"
    coherence_checks:
      - "Si fuerza_neta_y es cero, aceleracion_y debe ser cero."
      - "fuerza_neta_y y aceleracion_y deben tener el mismo signo."
    graph_implications:
      - "En Coord, F_y frente a a_y es una recta de pendiente m."
    pedagogical_triggers:
      - "No declarar equilibrio vertical sin comprobar suma de fuerzas."
      - "Mantener signos coherentes con el eje elegido."
    rearrangements:
      - target: "fuerza_neta_y"
        equation: "fuerza_neta_y = masa * aceleracion_y"
        latex: "F_{\\mathrm{net},y} = m \\cdot a_y"
      - target: "masa"
        equation: "masa = fuerza_neta_y / aceleracion_y"
        latex: "m = \\frac{F_{\\mathrm{net},y}}{a_y}"
      - target: "aceleracion_y"
        equation: "aceleracion_y = fuerza_neta_y / masa"
        latex: "a_y = \\frac{F_{\\mathrm{net},y}}{m}"

  - id: "suma_fuerzas_eje_x"
    title:
      es: "Suma de fuerzas en el eje x"
      en: "Sum of forces along the x-axis"
    equation: "fuerza_neta_x = fuerza_1_x + fuerza_2_x"
    latex: "F_{\\mathrm{net},x} = F_{1x} + F_{2x}"
    magnitudes:
      - "fuerza_neta_x"
      - "fuerza_1_x"
      - "fuerza_2_x"
    category: "composicion_vectorial"
    relation_type: "suma_algebraica"
    physical_meaning:
      es: "La resultante en x se obtiene sumando algebraicamente las componentes horizontales."
      en: "The x-resultant is obtained by algebraically adding horizontal components."
    constraints:
      - "Todas las fuerzas deben estar proyectadas sobre el mismo eje x."
      - "Los signos deben seguir la misma convención."
    validity:
      es: "Válida para fuerzas concurrentes analizadas en un eje común."
      en: "Valid for concurrent forces analyzed along a common axis."
    dimension_check: "M L T^-2 = M L T^-2 + M L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "dcl"
      - "ejemplos"
      - "interpretacion"
    interpretation_tags:
      - "suma_fuerzas"
      - "componentes"
      - "dcl"
    result_semantics:
      target: "fuerza_neta_x"
      kind: "scalar_component"
      sign_meaning: "El signo marca el sentido de la resultante horizontal."
      absolute_value_meaning: "El valor absoluto mide la intensidad de la resultante horizontal."
    domain_checks:
      - "componentes definidas en el mismo eje"
      - "unidades en N"
    coherence_checks:
      - "No sumar módulos si las fuerzas tienen sentidos opuestos."
      - "La resultante debe conservar la unidad newton."
    graph_implications:
      - "En Dcl, fuerzas opuestas se restan algebraicamente."
    pedagogical_triggers:
      - "Dibujar antes de sumar."
      - "Escribir signos antes de sustituir valores."
    rearrangements:
      - target: "fuerza_neta_x"
        equation: "fuerza_neta_x = fuerza_1_x + fuerza_2_x"
        latex: "F_{\\mathrm{net},x} = F_{1x} + F_{2x}"
      - target: "fuerza_1_x"
        equation: "fuerza_1_x = fuerza_neta_x - fuerza_2_x"
        latex: "F_{1x} = F_{\\mathrm{net},x} - F_{2x}"
      - target: "fuerza_2_x"
        equation: "fuerza_2_x = fuerza_neta_x - fuerza_1_x"
        latex: "F_{2x} = F_{\\mathrm{net},x} - F_{1x}"

  - id: "suma_fuerzas_eje_y"
    title:
      es: "Suma de fuerzas en el eje y"
      en: "Sum of forces along the y-axis"
    equation: "fuerza_neta_y = fuerza_1_y + fuerza_2_y"
    latex: "F_{\\mathrm{net},y} = F_{1y} + F_{2y}"
    magnitudes:
      - "fuerza_neta_y"
      - "fuerza_1_y"
      - "fuerza_2_y"
    category: "composicion_vectorial"
    relation_type: "suma_algebraica"
    physical_meaning:
      es: "La resultante en y se obtiene sumando algebraicamente las componentes verticales."
      en: "The y-resultant is obtained by algebraically adding vertical components."
    constraints:
      - "Todas las fuerzas deben estar proyectadas sobre el mismo eje y."
      - "Los signos deben seguir la misma convención."
    validity:
      es: "Válida para fuerzas concurrentes analizadas en un eje común."
      en: "Valid for concurrent forces analyzed along a common axis."
    dimension_check: "M L T^-2 = M L T^-2 + M L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "dcl"
      - "ejemplos"
      - "interpretacion"
    interpretation_tags:
      - "suma_fuerzas"
      - "componentes"
      - "equilibrio"
    result_semantics:
      target: "fuerza_neta_y"
      kind: "scalar_component"
      sign_meaning: "El signo marca el sentido de la resultante vertical."
      absolute_value_meaning: "El valor absoluto mide la intensidad de la resultante vertical."
    domain_checks:
      - "componentes definidas en el mismo eje"
      - "unidades en N"
    coherence_checks:
      - "Si hay equilibrio vertical, fuerza_neta_y debe ser cero."
      - "La resultante debe conservar la unidad newton."
    graph_implications:
      - "En Dcl, fuerzas verticales opuestas se compensan si tienen igual módulo."
    pedagogical_triggers:
      - "No imponer normal igual al peso sin revisar otras fuerzas."
      - "Mantener la convención de signos hasta el final."
    rearrangements:
      - target: "fuerza_neta_y"
        equation: "fuerza_neta_y = fuerza_1_y + fuerza_2_y"
        latex: "F_{\\mathrm{net},y} = F_{1y} + F_{2y}"
      - target: "fuerza_1_y"
        equation: "fuerza_1_y = fuerza_neta_y - fuerza_2_y"
        latex: "F_{1y} = F_{\\mathrm{net},y} - F_{2y}"
      - target: "fuerza_2_y"
        equation: "fuerza_2_y = fuerza_neta_y - fuerza_1_y"
        latex: "F_{2y} = F_{\\mathrm{net},y} - F_{1y}"

  - id: "peso_gravitatorio"
    title:
      es: "Peso gravitatorio"
      en: "Gravitational weight"
    equation: "peso = masa * gravedad"
    latex: "\\vec{P} = m \\cdot \\vec{g}"
    magnitudes:
      - "peso"
      - "masa"
      - "gravedad"
    category: "fuerza_gravitatoria"
    relation_type: "vectorial"
    physical_meaning:
      es: "El peso es la fuerza gravitatoria ejercida sobre una masa."
      en: "Weight is the gravitational force exerted on a mass."
    constraints:
      - "Campo gravitatorio local uniforme."
      - "Masa positiva."
      - "Gravedad conocida."
    validity:
      es: "Aproximación local válida cerca de la superficie de un astro si g puede considerarse constante."
      en: "Local approximation valid near a body's surface if g can be considered constant."
    dimension_check: "M L T^-2 = M * L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "dcl"
      - "ejemplos"
      - "aplicaciones"
    interpretation_tags:
      - "peso"
      - "gravedad"
      - "fuerza_real"
    result_semantics:
      target: "peso"
      kind: "vector"
      sign_meaning: "El signo depende del eje; físicamente apunta hacia el centro gravitatorio."
      absolute_value_meaning: "El módulo mide la intensidad de la atracción gravitatoria."
    domain_checks:
      - "masa > 0"
      - "gravedad > 0"
    coherence_checks:
      - "El peso debe tener unidades de newton, no de kilogramo."
      - "El peso cambia si cambia g, aunque la masa no cambie."
    graph_implications:
      - "En Dcl, el peso se dibuja vertical hacia abajo cerca de la Tierra."
    pedagogical_triggers:
      - "Separar masa y peso."
      - "No tratar g como fuerza."
    rearrangements:
      - target: "peso"
        equation: "peso = masa * gravedad"
        latex: "P = m \\cdot g"
      - target: "masa"
        equation: "masa = peso / gravedad"
        latex: "m = \\frac{P}{g}"
      - target: "gravedad"
        equation: "gravedad = peso / masa"
        latex: "g = \\frac{P}{m}"

  - id: "rozamiento_cinetico"
    title:
      es: "Rozamiento cinético"
      en: "Kinetic friction"
    equation: "fuerza_rozamiento = coeficiente_rozamiento * fuerza_normal"
    latex: "F_{\\mathrm{roz}} = \\mu \\cdot N"
    magnitudes:
      - "fuerza_rozamiento"
      - "coeficiente_rozamiento"
      - "fuerza_normal"
    category: "fuerza_contacto"
    relation_type: "modelo_empirico"
    physical_meaning:
      es: "El módulo del rozamiento cinético es proporcional a la normal."
      en: "The magnitude of kinetic friction is proportional to the normal force."
    constraints:
      - "Contacto con deslizamiento relativo."
      - "Coeficiente de rozamiento cinético conocido."
      - "Normal no negativa."
    validity:
      es: "Modelo aproximado para superficies secas donde el rozamiento cinético puede considerarse proporcional a la normal."
      en: "Approximate model for dry surfaces where kinetic friction can be considered proportional to normal force."
    dimension_check: "M L T^-2 = 1 * M L T^-2"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "dcl"
      - "ejemplos"
      - "aplicaciones"
    interpretation_tags:
      - "rozamiento"
      - "normal"
      - "contacto"
    result_semantics:
      target: "fuerza_rozamiento"
      kind: "vector_magnitude"
      sign_meaning: "El signo debe asignarse después según el sentido opuesto al movimiento relativo."
      absolute_value_meaning: "El valor absoluto es el módulo del rozamiento cinético."
    domain_checks:
      - "coeficiente_rozamiento >= 0"
      - "fuerza_normal >= 0"
    coherence_checks:
      - "El rozamiento debe anularse si la normal es cero."
      - "El coeficiente de rozamiento no debe tener unidades."
    graph_implications:
      - "En Dcl, el rozamiento se dibuja paralelo a la superficie y opuesto al deslizamiento."
    pedagogical_triggers:
      - "Decidir primero el sentido del movimiento relativo."
      - "No confundir rozamiento cinético con rozamiento estático máximo."
    rearrangements:
      - target: "fuerza_rozamiento"
        equation: "fuerza_rozamiento = coeficiente_rozamiento * fuerza_normal"
        latex: "F_{\\mathrm{roz}} = \\mu \\cdot N"
      - target: "coeficiente_rozamiento"
        equation: "coeficiente_rozamiento = fuerza_rozamiento / fuerza_normal"
        latex: "\\mu = \\frac{F_{\\mathrm{roz}}}{N}"
      - target: "fuerza_normal"
        equation: "fuerza_normal = fuerza_rozamiento / coeficiente_rozamiento"
        latex: "N = \\frac{F_{\\mathrm{roz}}}{\\mu}"

  - id: "componente_peso_paralela_plano"
    title:
      es: "Componente del peso paralela al plano"
      en: "Weight component parallel to the plane"
    equation: "componente_peso_paralela = masa * gravedad * sin(angulo_plano)"
    latex: "P_{\\parallel} = m \\cdot g \\cdot \\sin\\theta"
    magnitudes:
      - "componente_peso_paralela"
      - "masa"
      - "gravedad"
      - "angulo_plano"
    category: "plano_inclinado"
    relation_type: "proyeccion"
    physical_meaning:
      es: "La componente paralela del peso tiende a deslizar el cuerpo por el plano."
      en: "The parallel component of weight tends to slide the body down the plane."
    constraints:
      - "Plano inclinado rígido."
      - "Ángulo medido respecto a la horizontal."
      - "Gravedad uniforme."
    validity:
      es: "Válida para la descomposición usual del peso en un plano inclinado."
      en: "Valid for the usual decomposition of weight on an inclined plane."
    dimension_check: "M L T^-2 = M * L T^-2 * 1"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "dcl"
      - "ejemplos"
      - "aplicaciones"
    interpretation_tags:
      - "plano_inclinado"
      - "proyeccion"
      - "peso"
    result_semantics:
      target: "componente_peso_paralela"
      kind: "scalar_component"
      sign_meaning: "El signo depende de si el eje paralelo apunta hacia arriba o hacia abajo del plano."
      absolute_value_meaning: "El valor absoluto mide la parte del peso que impulsa el deslizamiento."
    domain_checks:
      - "masa > 0"
      - "gravedad > 0"
      - "0 <= angulo_plano < pi/2"
    coherence_checks:
      - "Si angulo_plano es cero, la componente paralela debe ser cero."
      - "No intercambiar seno y coseno."
    graph_implications:
      - "En Dcl, se dibuja paralela al plano."
      - "A mayor ángulo, mayor componente paralela."
    pedagogical_triggers:
      - "Comprobar si el ángulo está respecto a la horizontal."
      - "Dibujar triángulo de componentes antes de aplicar seno."
    rearrangements:
      - target: "componente_peso_paralela"
        equation: "componente_peso_paralela = masa * gravedad * sin(angulo_plano)"
        latex: "P_{\\parallel} = m \\cdot g \\cdot \\sin\\theta"
      - target: "masa"
        equation: "masa = componente_peso_paralela / (gravedad * sin(angulo_plano))"
        latex: "m = \\frac{P_{\\parallel}}{g \\cdot \\sin\\theta}"
      - target: "gravedad"
        equation: "gravedad = componente_peso_paralela / (masa * sin(angulo_plano))"
        latex: "g = \\frac{P_{\\parallel}}{m \\cdot \\sin\\theta}"
      - target: "angulo_plano"
        equation: "angulo_plano = asin(componente_peso_paralela / (masa * gravedad))"
