version: "1.0"
leaf: "segunda-ley-fuerza-masa"

coord:
  title:
    es: "Fuerza neta frente a aceleración"
    en: "Net force versus acceleration"
  xAxis:
    es: "Aceleración"
    en: "Acceleration"
  yAxis:
    es: "Fuerza neta"
    en: "Net force"
  agentHints:
    es:
      - "La gráfica Coord representa la relación entre fuerza neta y aceleración."
      - "La pendiente representa la masa del cuerpo si la relación es lineal."
      - "Si la fuerza neta es cero, la aceleración debe ser cero en un sistema inercial."
    en:
      - "The Coord graph represents the relationship between net force and acceleration."
      - "The slope represents the body's mass if the relationship is linear."
      - "If net force is zero, acceleration must be zero in an inertial frame."

dcl:
  title:
    es: "DCL · Segunda ley de Newton"
    en: "FBD · Newton's Second Law"
  sceneId: "block_on_table"
  objects:
    es:
      - "Bloque sobre una superficie horizontal."
      - "Peso del bloque."
      - "Fuerza normal de la superficie."
      - "Fuerza neta horizontal."
      - "Aceleración en la dirección de la fuerza neta."
    en:
      - "Block on a horizontal surface."
      - "Weight of the block."
      - "Normal force from the surface."
      - "Horizontal net force."
      - "Acceleration in the direction of the net force."
  agentHints:
    es:
      - "Distingue fuerzas reales, componentes y fuerza neta."
      - "La aceleración debe apuntar en la misma dirección que la fuerza neta."
      - "La fuerza neta no es una fuerza nueva, sino la suma vectorial de las fuerzas."
    en:
      - "Distinguish real forces, components, and net force."
      - "Acceleration must point in the same direction as the net force."
      - "Net force is not a new force, but the vector sum of the forces."