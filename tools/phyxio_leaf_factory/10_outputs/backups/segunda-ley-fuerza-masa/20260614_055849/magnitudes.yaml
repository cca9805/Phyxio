version: "5.0.0"
magnitudes:
  - id: fuerza_neta
    symbol: "\\vec{F}_{\\mathrm{net}}"
    nombre:
      es: "Fuerza neta"
      en: "Net force"
    descripcion:
      es: "Resultado vectorial de todas las fuerzas externas que actúan sobre el cuerpo."
      en: "Vector result of all external forces acting on the body."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: true
    components:
      - "fuerza_neta_x"
      - "fuerza_neta_y"
    category: "dinamica"
    physical_role: "calculable"
    used_in:
      - "segunda_ley_newton_vectorial"
      - "aceleracion_desde_fuerza_neta"
    common_mistake: "Confundir la fuerza neta con una fuerza individual aplicada al cuerpo."
    typical_range: "Desde 0 N en equilibrio hasta miles de newtons en problemas escolares."
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo depende del eje elegido y marca el sentido de la aceleración."
        en: "The sign depends on the chosen axis and marks the direction of acceleration."
    zero_behavior:
      allowed: true
      meaning:
        es: "Si es cero, la aceleración neta es cero en un sistema inercial."
        en: "If it is zero, net acceleration is zero in an inertial frame."
    value_nature:
      kind: "vector"
      nonnegative_only: false
      expected_interval: "Cualquier vector finito compatible con el sistema físico."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_vectorial"
        - "aceleracion_desde_fuerza_neta"
      secondary_for:
        - "suma_fuerzas_eje_x"
        - "suma_fuerzas_eje_y"
    graph_binding:
      channels:
        - "Coord"
        - "Dcl"
    pedagogical_notes: "Debe leerse como suma vectorial, no como una fuerza nueva."

  - id: fuerza_neta_x
    symbol: "F_{\\mathrm{net},x}"
    nombre:
      es: "Componente x de la fuerza neta"
      en: "x-component of net force"
    descripcion:
      es: "Proyección de la fuerza neta sobre el eje x."
      en: "Projection of the net force along the x-axis."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "component"
    used_in:
      - "segunda_ley_newton_eje_x"
      - "suma_fuerzas_eje_x"
    common_mistake: "Usar el módulo de la fuerza neta en lugar de su componente con signo."
    typical_range: "Valores positivos, negativos o cero según el eje elegido."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positiva si apunta en el sentido positivo del eje x, negativa en sentido contrario."
        en: "Positive along the positive x-axis, negative in the opposite direction."
    zero_behavior:
      allowed: true
      meaning:
        es: "Indica ausencia de aceleración en x si la masa es constante y no nula."
        en: "It means no x-acceleration if mass is constant and nonzero."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_eje_x"
        - "suma_fuerzas_eje_x"
      secondary_for:
        - "segunda_ley_newton_vectorial"
    graph_binding:
      channels:
        - "Coord"
        - "Dcl"
    pedagogical_notes: "Es útil para separar el análisis horizontal o paralelo al plano."

  - id: fuerza_neta_y
    symbol: "F_{\\mathrm{net},y}"
    nombre:
      es: "Componente y de la fuerza neta"
      en: "y-component of net force"
    descripcion:
      es: "Proyección de la fuerza neta sobre el eje y."
      en: "Projection of the net force along the y-axis."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "component"
    used_in:
      - "segunda_ley_newton_eje_y"
      - "suma_fuerzas_eje_y"
    common_mistake: "Cambiar el signo de la componente vertical sin respetar el eje elegido."
    typical_range: "Valores positivos, negativos o cero según el eje elegido."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positiva si apunta en el sentido positivo del eje y, negativa en sentido contrario."
        en: "Positive along the positive y-axis, negative in the opposite direction."
    zero_behavior:
      allowed: true
      meaning:
        es: "Indica ausencia de aceleración en y si la masa es constante y no nula."
        en: "It means no y-acceleration if mass is constant and nonzero."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_eje_y"
        - "suma_fuerzas_eje_y"
      secondary_for:
        - "segunda_ley_newton_vectorial"
    graph_binding:
      channels:
        - "Coord"
        - "Dcl"
    pedagogical_notes: "Es clave para distinguir equilibrio vertical de movimiento horizontal."

  - id: masa
    symbol: "m"
    nombre:
      es: "Masa"
      en: "Mass"
    descripcion:
      es: "Medida escalar de la inercia del cuerpo."
      en: "Scalar measure of the body's inertia."
    unidad_si: "kg"
    dimension: "M"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "input"
    used_in:
      - "segunda_ley_newton_vectorial"
      - "segunda_ley_newton_eje_x"
      - "segunda_ley_newton_eje_y"
      - "aceleracion_desde_fuerza_neta"
      - "peso_gravitatorio"
      - "componente_peso_paralela_plano"
      - "componente_peso_perpendicular_plano"
    common_mistake: "Confundir masa con peso o tratarla como una magnitud vectorial."
    typical_range: "De gramos a toneladas según el sistema estudiado."
    sign_behavior:
      has_sign: false
      meaning:
        es: "La masa física ordinaria no tiene signo."
        en: "Ordinary physical mass has no sign."
    zero_behavior:
      allowed: false
      meaning:
        es: "Una masa nula no permite aplicar esta forma de la segunda ley a un cuerpo material."
        en: "Zero mass does not allow this form of the second law for a material body."
    value_nature:
      kind: "scalar"
      nonnegative_only: true
      expected_interval: "m > 0"
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_vectorial"
        - "aceleracion_desde_fuerza_neta"
      secondary_for:
        - "peso_gravitatorio"
    graph_binding:
      channels:
        - "Coord"
    pedagogical_notes: "A mayor masa, menor aceleración para la misma fuerza neta."

  - id: aceleracion
    symbol: "\\vec{a}"
    nombre:
      es: "Aceleración"
      en: "Acceleration"
    descripcion:
      es: "Cambio vectorial de la velocidad por unidad de tiempo."
      en: "Vector change of velocity per unit time."
    unidad_si: "m/s^2"
    dimension: "L T^-2"
    is_vector: true
    components:
      - "aceleracion_x"
      - "aceleracion_y"
    category: "dinamica"
    physical_role: "calculable"
    used_in:
      - "segunda_ley_newton_vectorial"
      - "aceleracion_desde_fuerza_neta"
    common_mistake: "Pensar que siempre apunta en el sentido de la velocidad."
    typical_range: "Desde 0 m/s^2 hasta decenas de m/s^2 en problemas introductorios."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su signo o dirección depende del sistema de ejes elegido."
        en: "Its sign or direction depends on the chosen coordinate system."
    zero_behavior:
      allowed: true
      meaning:
        es: "Indica velocidad constante o reposo en un sistema inercial."
        en: "It indicates constant velocity or rest in an inertial frame."
    value_nature:
      kind: "vector"
      nonnegative_only: false
      expected_interval: "Cualquier vector finito compatible con el modelo."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_vectorial"
        - "aceleracion_desde_fuerza_neta"
      secondary_for:
        - "segunda_ley_newton_eje_x"
        - "segunda_ley_newton_eje_y"
    graph_binding:
      channels:
        - "Coord"
        - "Dcl"
    pedagogical_notes: "La aceleración sigue la dirección de la fuerza neta, no necesariamente la del movimiento."

  - id: aceleracion_x
    symbol: "a_x"
    nombre:
      es: "Componente x de la aceleración"
      en: "x-component of acceleration"
    descripcion:
      es: "Proyección de la aceleración sobre el eje x."
      en: "Projection of acceleration along the x-axis."
    unidad_si: "m/s^2"
    dimension: "L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "component"
    used_in:
      - "segunda_ley_newton_eje_x"
    common_mistake: "Asignar signo positivo por defecto sin revisar el eje."
    typical_range: "Valores positivos, negativos o cero."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positiva o negativa según el sentido del eje x."
        en: "Positive or negative depending on the x-axis direction."
    zero_behavior:
      allowed: true
      meaning:
        es: "Indica que no hay cambio de velocidad en x."
        en: "It indicates no change in x-velocity."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_eje_x"
      secondary_for:
        - "aceleracion_desde_fuerza_neta"
    graph_binding:
      channels:
        - "Coord"
    pedagogical_notes: "Permite conectar la suma de fuerzas en x con el movimiento horizontal."

  - id: aceleracion_y
    symbol: "a_y"
    nombre:
      es: "Componente y de la aceleración"
      en: "y-component of acceleration"
    descripcion:
      es: "Proyección de la aceleración sobre el eje y."
      en: "Projection of acceleration along the y-axis."
    unidad_si: "m/s^2"
    dimension: "L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "component"
    used_in:
      - "segunda_ley_newton_eje_y"
    common_mistake: "Suponer que vale cero sin justificar equilibrio o restricción geométrica."
    typical_range: "Valores positivos, negativos o cero."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Positiva o negativa según el sentido del eje y."
        en: "Positive or negative depending on the y-axis direction."
    zero_behavior:
      allowed: true
      meaning:
        es: "Indica que no hay cambio de velocidad en y."
        en: "It indicates no change in y-velocity."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "segunda_ley_newton_eje_y"
      secondary_for:
        - "aceleracion_desde_fuerza_neta"
    graph_binding:
      channels:
        - "Coord"
    pedagogical_notes: "Es esencial para separar equilibrio vertical de aceleración en otro eje."

  - id: fuerza_1_x
    symbol: "F_{1x}"
    nombre:
      es: "Componente x de una fuerza aplicada"
      en: "x-component of an applied force"
    descripcion:
      es: "Componente horizontal de una fuerza externa concreta."
      en: "Horizontal component of a specific external force."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "input"
    used_in:
      - "suma_fuerzas_eje_x"
    common_mistake: "Sumarla con signo incorrecto o confundirla con la fuerza neta."
    typical_range: "Valores reales finitos según el problema."
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo indica si apunta a favor o en contra del eje x positivo."
        en: "The sign indicates whether it points along or against positive x."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero si la fuerza no tiene componente horizontal."
        en: "It can be zero if the force has no horizontal component."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "suma_fuerzas_eje_x"
      secondary_for:
        - "segunda_ley_newton_eje_x"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Cada fuerza real debe proyectarse antes de sumarse."

  - id: fuerza_2_x
    symbol: "F_{2x}"
    nombre:
      es: "Componente x de otra fuerza aplicada"
      en: "x-component of another applied force"
    descripcion:
      es: "Componente horizontal de una segunda fuerza externa."
      en: "Horizontal component of a second external force."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "input"
    used_in:
      - "suma_fuerzas_eje_x"
    common_mistake: "Olvidar que puede ser negativa aunque el módulo de la fuerza sea positivo."
    typical_range: "Valores reales finitos según el problema."
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo indica el sentido sobre el eje x."
        en: "The sign indicates direction along the x-axis."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero si no hay segunda fuerza horizontal."
        en: "It can be zero if there is no second horizontal force."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "suma_fuerzas_eje_x"
      secondary_for:
        - "segunda_ley_newton_eje_x"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Sirve para practicar la suma algebraica de fuerzas colineales."

  - id: fuerza_1_y
    symbol: "F_{1y}"
    nombre:
      es: "Componente y de una fuerza aplicada"
      en: "y-component of an applied force"
    descripcion:
      es: "Componente vertical de una fuerza externa concreta."
      en: "Vertical component of a specific external force."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "input"
    used_in:
      - "suma_fuerzas_eje_y"
    common_mistake: "Confundir el signo vertical con el módulo de la fuerza."
    typical_range: "Valores reales finitos según el problema."
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo indica si apunta a favor o en contra del eje y positivo."
        en: "The sign indicates whether it points along or against positive y."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero si la fuerza no tiene componente vertical."
        en: "It can be zero if the force has no vertical component."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "suma_fuerzas_eje_y"
      secondary_for:
        - "segunda_ley_newton_eje_y"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Permite analizar equilibrio o aceleración vertical."

  - id: fuerza_2_y
    symbol: "F_{2y}"
    nombre:
      es: "Componente y de otra fuerza aplicada"
      en: "y-component of another applied force"
    descripcion:
      es: "Componente vertical de una segunda fuerza externa."
      en: "Vertical component of a second external force."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: false
    components: []
    category: "dinamica"
    physical_role: "input"
    used_in:
      - "suma_fuerzas_eje_y"
    common_mistake: "Sumarla como positiva sin revisar el sistema de referencia."
    typical_range: "Valores reales finitos según el problema."
    sign_behavior:
      has_sign: true
      meaning:
        es: "El signo indica el sentido sobre el eje y."
        en: "The sign indicates direction along the y-axis."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero si no hay segunda fuerza vertical."
        en: "It can be zero if there is no second vertical force."
    value_nature:
      kind: "scalar_component"
      nonnegative_only: false
      expected_interval: "Cualquier valor real finito."
    interpretation_role:
      primary_for:
        - "suma_fuerzas_eje_y"
      secondary_for:
        - "segunda_ley_newton_eje_y"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Ayuda a construir la fuerza neta como suma algebraica por ejes."

  - id: peso
    symbol: "\\vec{P}"
    nombre:
      es: "Peso"
      en: "Weight"
    descripcion:
      es: "Fuerza gravitatoria que actúa sobre un cuerpo cerca de un astro."
      en: "Gravitational force acting on a body near an astronomical body."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: true
    components: []
    category: "gravitacion"
    physical_role: "calculable"
    used_in:
      - "peso_gravitatorio"
    common_mistake: "Confundirlo con la masa o expresarlo en kilogramos."
    typical_range: "Aproximadamente 9.8 N por cada kilogramo en la Tierra."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su dirección apunta hacia el centro gravitatorio; el signo depende del eje."
        en: "Its direction points toward the gravitational center; sign depends on the axis."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero idealmente si el campo gravitatorio efectivo es nulo."
        en: "It can be zero ideally if the effective gravitational field is zero."
    value_nature:
      kind: "vector"
      nonnegative_only: false
      expected_interval: "Módulo igual o mayor que 0."
    interpretation_role:
      primary_for:
        - "peso_gravitatorio"
      secondary_for:
        - "componente_peso_paralela_plano"
        - "componente_peso_perpendicular_plano"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "En un DCL, el peso siempre es una fuerza real y no una componente."

  - id: gravedad
    symbol: "g"
    nombre:
      es: "Aceleración de la gravedad"
      en: "Gravitational acceleration"
    descripcion:
      es: "Intensidad local del campo gravitatorio expresada como aceleración."
      en: "Local gravitational field strength expressed as acceleration."
    unidad_si: "m/s^2"
    dimension: "L T^-2"
    is_vector: false
    components: []
    category: "constante"
    physical_role: "constant"
    used_in:
      - "peso_gravitatorio"
      - "componente_peso_paralela_plano"
      - "componente_peso_perpendicular_plano"
    common_mistake: "Usar siempre 9.8 sin comprobar el contexto del problema."
    typical_range: "9.8 m/s^2 cerca de la superficie terrestre."
    sign_behavior:
      has_sign: false
      meaning:
        es: "Se usa como módulo positivo; la dirección se asigna al peso."
        en: "It is used as a positive magnitude; direction is assigned to weight."
    zero_behavior:
      allowed: false
      meaning:
        es: "En este leaf se asume gravedad local no nula si aparece el peso."
        en: "This leaf assumes nonzero local gravity when weight appears."
    value_nature:
      kind: "scalar_constant"
      nonnegative_only: true
      expected_interval: "g > 0"
    interpretation_role:
      primary_for:
        - "peso_gravitatorio"
      secondary_for:
        - "componente_peso_paralela_plano"
        - "componente_peso_perpendicular_plano"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Debe tratarse como módulo positivo salvo que el problema indique otra convención."

  - id: fuerza_normal
    symbol: "N"
    nombre:
      es: "Fuerza normal"
      en: "Normal force"
    descripcion:
      es: "Fuerza de contacto perpendicular a la superficie."
      en: "Contact force perpendicular to the surface."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: true
    components: []
    category: "contacto"
    physical_role: "calculable"
    used_in:
      - "rozamiento_cinetico"
      - "normal_plano_inclinado"
    common_mistake: "Suponer que siempre vale igual al peso."
    typical_range: "Depende de la geometría y de otras fuerzas aplicadas."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Como vector depende del eje, pero su módulo de contacto es no negativo."
        en: "As a vector it depends on the axis, but its contact magnitude is nonnegative."
    zero_behavior:
      allowed: true
      meaning:
        es: "Si es cero, el cuerpo pierde contacto con la superficie."
        en: "If it is zero, the body loses contact with the surface."
    value_nature:
      kind: "vector"
      nonnegative_only: false
      expected_interval: "Módulo N >= 0"
    interpretation_role:
      primary_for:
        - "normal_plano_inclinado"
      secondary_for:
        - "rozamiento_cinetico"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "La normal sale de la restricción geométrica, no de una fórmula universal."

  - id: fuerza_rozamiento
    symbol: "F_{\\mathrm{roz}}"
    nombre:
      es: "Fuerza de rozamiento"
      en: "Friction force"
    descripcion:
      es: "Fuerza de contacto que se opone al deslizamiento relativo."
      en: "Contact force opposing relative sliding."
    unidad_si: "N"
    dimension: "M L T^-2"
    is_vector: true
    components: []
    category: "contacto"
    physical_role: "calculable"
    used_in:
      - "rozamiento_cinetico"
      - "fuerza_neta_plano_con_rozamiento"
    common_mistake: "Asignarla siempre como positiva o confundir rozamiento estático y cinético."
    typical_range: "Entre 0 y valores proporcionales a la normal según el modelo."
    sign_behavior:
      has_sign: true
      meaning:
        es: "Su sentido se opone al movimiento relativo o a la tendencia de deslizamiento."
        en: "Its direction opposes relative motion or tendency to slide."
    zero_behavior:
      allowed: true
      meaning:
        es: "Puede ser cero si no hay contacto rugoso o no hay interacción de rozamiento."
        en: "It can be zero if there is no rough contact or friction interaction."
    value_nature:
      kind: "vector"
      nonnegative_only: false
      expected_interval: "Módulo F_roz >= 0"
    interpretation_role:
      primary_for:
        - "rozamiento_cinetico"
        - "fuerza_neta_plano_con_rozamiento"
      secondary_for:
        - "segunda_ley_newton_eje_x"
    graph_binding:
      channels:
        - "Dcl"
    pedagogical_notes: "Debe dibujarse después de decidir el sentido del movimiento relativo."

  - id: coeficiente_rozamiento
    symbol: "\\mu"
    nombre:
      es: "Coeficiente de rozamiento"
      en: "Friction coefficient"
    descripcion:
      es: "Parámetro adimensional que relaciona rozamiento y normal en un modelo simple."
      en: "Dimensionless parameter relating friction and normal force in a simple model."
    unidad_si: "1"
    dimension: "1"
