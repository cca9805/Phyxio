version: "1.0"
leaf: "segunda-ley-fuerza-masa"

coord:
  title:
    es: "Relación entre fuerza neta y aceleración"
    en: "Relationship between net force and acceleration"
  xAxis:
    es: "Aceleración"
    en: "Acceleration"
  yAxis:
    es: "Fuerza neta"
    en: "Net force"
  agentHints:
    es:
      - "Lee la pendiente como la masa del cuerpo: mayor masa implica más fuerza para la misma aceleración."
      - "Comprueba que la relación es lineal cuando la masa permanece constante."
      - "Si la fuerza neta es cero, la aceleración debe ser cero en un sistema inercial."
    en:
      - "Read the slope as the body's mass: greater mass means more force for the same acceleration."
      - "Check that the relationship is linear when mass remains constant."
      - "If net force is zero, acceleration must be zero in an inertial frame."

dcl:
  title:
    es: "Diagrama de cuerpo libre de la segunda ley de Newton"
    en: "Free-body diagram for Newton's second law"
  sceneId: "segunda_ley_fuerza_masa_dcl"
  objects:
    es:
      - "Cuerpo material representado como bloque o partícula."
      - "Fuerza neta resultante aplicada sobre el cuerpo."
      - "Aceleración con el mismo sentido que la fuerza neta."
      - "Ejes de referencia para descomponer fuerzas por componentes."
    en:
      - "Material body represented as a block or particle."
      - "Resultant net force applied to the body."
      - "Acceleration in the same direction as the net force."
      - "Reference axes for decomposing forces into components."
  agentHints:
    es:
      - "Distingue fuerzas individuales y fuerza neta: la resultante no es una fuerza nueva."
      - "La aceleración debe apuntar en el sentido de la fuerza neta, no necesariamente en el de la velocidad."
      - "Antes de aplicar la ley, suma las fuerzas por componentes usando los signos del sistema de ejes."
    en:
      - "Distinguish individual forces from net force: the resultant is not a new force."
      - "Acceleration must point in the direction of net force, not necessarily velocity."
      - "Before applying the law, sum forces by components using the signs of the coordinate system."