  - id: componente_peso_paralela_plano
    title:
      es: "Componente paralela del peso en un plano inclinado"
      en: "Parallel component of weight on an inclined plane"
    equation: "componente_peso_paralela = masa * gravedad * sin(angulo)"
    latex: "P_{\\parallel} = m \\cdot g \\cdot \\sin(\\theta)"
    magnitudes:
      - componente_peso_paralela
      - masa
      - gravedad
      - angulo
    category: "plano_inclinado"
    relation_type: "descomposicion"
    physical_meaning:
      es: "Es la parte del peso que tiende a arrastrar el cuerpo a lo largo del plano."
      en: "It is the part of weight that tends to pull the body along the incline."
    constraints:
      - "Ángulo medido respecto a la horizontal."
      - "Eje paralelo definido sobre el plano."
    validity:
      es: "Válida para un plano inclinado recto con gravedad uniforme."
      en: "Valid for a straight inclined plane with uniform gravity."
    dimension_check: "[M L T^-2] = [M] [L T^-2] [1]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
      - "planos_inclinados"
      - "descomposicion_del_peso"
    interpretation_tags:
      - "plano_inclinado"
      - "componente_paralela"
      - "seno"
    result_semantics:
      target: componente_peso_paralela
      kind: "scalar_component"
      sign_meaning: "El signo depende de si el eje paralelo positivo apunta cuesta arriba o cuesta abajo."
      absolute_value_meaning: "El módulo mide la tendencia gravitatoria a deslizar por el plano."
    domain_checks:
      - id: angulo_valido
        rule: "0 <= angulo <= pi/2"
        message:
          es: "El ángulo debe estar en el intervalo habitual de plano inclinado."
          en: "The angle must lie in the usual inclined-plane interval."
    coherence_checks:
      - id: trigonometria_correcta
        rule: "paralela_usa_seno"
        message:
          es: "La componente paralela usa seno si el ángulo se mide desde la horizontal."
          en: "The parallel component uses sine if the angle is measured from the horizontal."
    graph_implications:
      - "En DCL, esta componente aparece paralela a la superficie."
    pedagogical_triggers:
      - "Intercambiar seno y coseno."
      - "Usar el peso completo en la ecuación paralela."
    rearrangements:
      - target: componente_peso_paralela
        equation: "componente_peso_paralela = masa * gravedad * sin(angulo)"
        latex: "P_{\\parallel} = m \\cdot g \\cdot \\sin(\\theta)"
      - target: masa
        equation: "masa = componente_peso_paralela / (gravedad * sin(angulo))"
        latex: "m = \\frac{P_{\\parallel}}{g \\cdot \\sin(\\theta)}"
      - target: gravedad
        equation: "gravedad = componente_peso_paralela / (masa * sin(angulo))"
        latex: "g = \\frac{P_{\\parallel}}{m \\cdot \\sin(\\theta)}"
      - target: angulo
        equation: "angulo = arcsin(componente_peso_paralela / (masa * gravedad))"
        latex: "\\theta = \\arcsin\\left(\\frac{P_{\\parallel}}{m \\cdot g}\\right)"

  - id: componente_peso_perpendicular_plano
    title:
      es: "Componente perpendicular del peso en un plano inclinado"
      en: "Perpendicular component of weight on an inclined plane"
    equation: "componente_peso_perpendicular = masa * gravedad * cos(angulo)"
    latex: "P_{\\perp} = m \\cdot g \\cdot \\cos(\\theta)"
    magnitudes:
      - componente_peso_perpendicular
      - masa
      - gravedad
      - angulo
      - normal
    category: "plano_inclinado"
    relation_type: "descomposicion"
    physical_meaning:
      es: "Es la parte del peso que presiona el cuerpo contra el plano."
      en: "It is the part of weight pressing the body against the incline."
    constraints:
      - "Ángulo medido respecto a la horizontal."
      - "Sin aceleración perpendicular, la normal iguala el módulo de esta componente."
    validity:
      es: "Válida para un plano inclinado recto con gravedad uniforme."
      en: "Valid for a straight inclined plane with uniform gravity."
    dimension_check: "[M L T^-2] = [M] [L T^-2] [1]"
    calculable: true
    motivo_no_calculable: ""
    used_in:
