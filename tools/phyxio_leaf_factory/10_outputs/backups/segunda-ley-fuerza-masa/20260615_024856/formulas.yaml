      - "componente_perpendicular"
      - "coseno"
      - "normal"
    result_semantics:
      target: componente_peso_perpendicular
      kind: "scalar_component"
      sign_meaning: "El signo depende de la orientación del eje perpendicular."
      absolute_value_meaning: "El módulo mide la compresión contra la superficie."
    domain_checks:
      - id: angulo_valido
        rule: "0 <= angulo <= pi/2"
        message:
          es: "El ángulo debe estar en el intervalo habitual de plano inclinado."
          en: "The angle must lie in the usual inclined-plane interval."
    coherence_checks:
      - id: trigonometria_correcta
        rule: "perpendicular_usa_coseno"
        message:
          es: "La componente perpendicular usa coseno si el ángulo se mide desde la horizontal."
          en: "The perpendicular component uses cosine if the angle is measured from the horizontal."
    graph_implications:
      - "En DCL, esta componente apunta hacia la superficie y se relaciona con la normal."
    pedagogical_triggers:
      - "Intercambiar seno y coseno."
      - "Suponer normal igual al peso completo."
    rearrangements:
      - target: componente_peso_perpendicular
        equation: "componente_peso_perpendicular = masa * gravedad * cos(angulo)"
        latex: "P_{\\perp} = m \\cdot g \\cdot \\cos(\\theta)"
      - target: masa
        equation: "masa = componente_peso_perpendicular / (gravedad * cos(angulo))"
        latex: "m = \\frac{P_{\\perp}}{g \\cdot \\cos(\\theta)}"
      - target: gravedad
        equation: "gravedad = componente_peso_perpendicular / (masa * cos(angulo))"
        latex: "g = \\frac{P_{\\perp}}{m \\cdot \\cos(\\theta)}"
      - target: angulo
        equation: "angulo = arccos(componente_peso_perpendicular / (masa * gravedad))"
        latex: "\\theta = \\arccos\\left(\\frac{P_{\\perp}}{m \\cdot g}\\right)"
      - target: normal
        equation: "normal = componente_peso_perpendicular"
        latex: "N = P_{\\perp}"
