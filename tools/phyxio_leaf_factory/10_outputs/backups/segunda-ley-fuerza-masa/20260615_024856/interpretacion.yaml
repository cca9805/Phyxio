      status: ok
      text:
        es: '[[componente_peso_perpendicular]] es la parte del peso que presiona el cuerpo contra el plano.'
        en: '[[componente_peso_perpendicular]] is the part of weight pressing the body into the incline.'
    physical_reading_rules:
    - id: componente_peso_perpendicular_reading_normal
      when: 'true'
      status: info
      text:
        es: '[[componente_peso_perpendicular]] se relaciona con la normal cuando no hay aceleración perpendicular.'
        en: '[[componente_peso_perpendicular]] relates to the normal force when there is no perpendicular acceleration.'
    coherence_rules:
    - id: componente_peso_perpendicular_coherence_cosine
      when: 'true'
      status: ok
      text:
        es: Si el ángulo se mide desde la horizontal, [[componente_peso_perpendicular]] usa coseno.
        en: If the angle is measured from the horizontal, [[componente_peso_perpendicular]] uses cosine.
    model_validity_rules:
    - id: componente_peso_perpendicular_model_incline
      when: 'true'
      status: info
      text:
        es: La interpretación de [[componente_peso_perpendicular]] presupone un plano inclinado recto y gravedad uniforme.
        en: The interpretation of [[componente_peso_perpendicular]] assumes a straight incline and uniform gravity.
    graph_rules:
    - id: componente_peso_perpendicular_graph_dcl
      when: 'true'
      status: info
      text:
        es: En DCL, [[componente_peso_perpendicular]] se representa perpendicular a la superficie inclinada.
        en: In DCL, [[componente_peso_perpendicular]] is represented perpendicular to the inclined surface.
    likely_errors:
    - id: componente_peso_perpendicular_error_trig
      when: 'true'
      status: warning
      text:
        es: No intercambies seno y coseno al calcular [[componente_peso_perpendicular]].
        en: Do not swap sine and cosine when calculating [[componente_peso_perpendicular]].
    - id: componente_peso_perpendicular_error_weight
      when: 'true'
      status: warning
      text:
        es: No sustituyas [[componente_peso_perpendicular]] por el peso completo salvo en plano horizontal.
        en: Do not replace [[componente_peso_perpendicular]] with full weight except on a horizontal plane.
    next_step_rules:
    - id: componente_peso_perpendicular_next_normal
      when: 'true'
      status: info
      text:
        es: Usa [[componente_peso_perpendicular]] para analizar la normal si no hay aceleración perpendicular.
        en: Use [[componente_peso_perpendicular]] to analyze the normal force if there is no perpendicular acceleration.
    physical_intuition:
    - id: componente_peso_perpendicular_intuition
      when: 'true'
      status: info
      text:
        es: '[[componente_peso_perpendicular]] disminuye al aumentar la inclinación del plano.'
        en: '[[componente_peso_perpendicular]] decreases as the incline angle increases.'
    limiting_cases:
    - id: componente_peso_perpendicular_limit_zero_angle
      when: 'true'
      status: info
      text:
        es: Si el plano es horizontal, [[componente_peso_perpendicular]] coincide con el peso.
        en: If the plane is horizontal, [[componente_peso_perpendicular]] equals weight.
    - id: componente_peso_perpendicular_limit_vertical
      when: 'true'
      status: info
      text:
        es: Si el plano se acerca a vertical, [[componente_peso_perpendicular]] tiende a cero.
        en: If the plane approaches vertical, [[componente_peso_perpendicular]] tends to zero.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[componente_peso_perpendicular]] depende del eje perpendicular elegido.
        en: The sign of [[componente_peso_perpendicular]] depends on the chosen perpendicular axis.
      common_sign_errors:
      - es: Asignar signo positivo a la componente perpendicular sin declarar si el eje sale o entra del plano.
        en: Assigning a positive sign to the perpendicular component without declaring whether the axis points out of or into
          the plane.
