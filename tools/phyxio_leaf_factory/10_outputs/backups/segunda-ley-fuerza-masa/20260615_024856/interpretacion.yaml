    en: Coherent final unit.
targets:
  fuerza_neta:
    enabled: true
    magnitude_type: vector
    semantic_role:
      es: resultante dinámica
      en: dynamic resultant
    summary_rules:
    - id: fuerza_neta_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta]] resume el efecto conjunto de todas las fuerzas que actúan sobre el cuerpo.'
        en: '[[fuerza_neta]] summarizes the combined effect of all forces acting on the body.'
    physical_reading_rules:
    - id: fuerza_neta_physical_reading_direction
      when: 'true'
      status: info
      text:
        es: El sentido de [[fuerza_neta]] indica hacia dónde apunta la aceleración del cuerpo.
        en: The direction of [[fuerza_neta]] indicates where the body's acceleration points.
    coherence_rules:
    - id: fuerza_neta_coherence_units
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta]] debe obtenerse en newtons y ser coherente con masa por aceleración.'
        en: '[[fuerza_neta]] must be obtained in newtons and be consistent with mass times acceleration.'
    - id: fuerza_neta_coherence_sum
      when: 'true'
      status: warning
      text:
        es: Comprueba que todas las fuerzas sumadas actúan sobre el mismo cuerpo.
        en: Check that all summed forces act on the same body.
    model_validity_rules:
    - id: fuerza_neta_model_inertial
      when: 'true'
      status: info
      text:
        es: Interpreta [[fuerza_neta]] dentro de un sistema inercial o añade fuerzas ficticias si no lo es.
        en: Interpret [[fuerza_neta]] within an inertial frame or add fictitious forces if it is not.
    graph_rules:
    - id: fuerza_neta_graph_dcl
      when: 'true'
      status: info
      text:
        es: En el DCL, [[fuerza_neta]] se obtiene sumando las flechas de fuerza por componentes.
        en: In the DCL, [[fuerza_neta]] is obtained by summing force arrows by components.
    - id: fuerza_neta_graph_coord
      when: 'true'
      status: info
      text:
        es: En Coord, una relación lineal entre fuerza neta y aceleración indica masa constante.
        en: In Coord, a linear relationship between net force and acceleration indicates constant mass.
    likely_errors:
    - id: fuerza_neta_error_applied_force
      when: 'true'
      status: warning
      text:
        es: No confundas [[fuerza_neta]] con una única fuerza aplicada.
        en: Do not confuse [[fuerza_neta]] with a single applied force.
    - id: fuerza_neta_error_action_reaction
      when: 'true'
      status: warning
      text:
        es: No sumes fuerzas de acción-reacción si actúan sobre cuerpos distintos.
        en: Do not sum action-reaction forces if they act on different bodies.
    next_step_rules:
    - id: fuerza_neta_next_acceleration
      when: 'true'
      status: info
      text:
        es: Después de hallar [[fuerza_neta]], calcula o interpreta la aceleración dividiendo por la masa.
        en: After finding [[fuerza_neta]], calculate or interpret acceleration by dividing by mass.
    physical_intuition:
    - id: fuerza_neta_intuition_imbalance
      when: 'true'
      status: info
      text:
        es: '[[fuerza_neta]] mide el desequilibrio dinámico: cuanto mayor sea, mayor será el cambio de movimiento.'
        en: '[[fuerza_neta]] measures dynamic imbalance: the larger it is, the larger the change in motion.'
    limiting_cases:
    - id: fuerza_neta_limit_zero
      when: 'true'
      status: info
      text:
        es: Si [[fuerza_neta]] es cero, la aceleración es cero aunque el cuerpo pueda seguir moviéndose.
        en: If [[fuerza_neta]] is zero, acceleration is zero although the body may keep moving.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[fuerza_neta]] depende del eje positivo elegido.
        en: The sign of [[fuerza_neta]] depends on the chosen positive axis.
      common_sign_errors:
      - es: Asignar signo positivo a una fuerza solo porque aparece dibujada hacia la derecha sin declarar el eje.
        en: Assigning a positive sign to a force only because it is drawn to the right without declaring the axis.
  masa:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: inercia del cuerpo
      en: body inertia
    summary_rules:
    - id: masa_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[masa]] indica cuánta inercia tiene el cuerpo frente a una fuerza neta.'
        en: '[[masa]] indicates how much inertia the body has against a net force.'
    physical_reading_rules:
    - id: masa_physical_reading_positive
      when: 'true'
      status: info
      text:
        es: '[[masa]] debe leerse como una cantidad positiva medida en kilogramos.'
        en: '[[masa]] must be read as a positive quantity measured in kilograms.'
    coherence_rules:
    - id: masa_coherence_positive
      when: 'true'
      status: ok
      text:
        es: Una [[masa]] negativa o nula indica un error de signos, unidades o modelo.
        en: A negative or zero [[masa]] indicates a sign, unit, or model error.
    model_validity_rules:
    - id: masa_model_constant
      when: 'true'
      status: info
      text:
        es: La segunda ley de este leaf presupone [[masa]] constante.
        en: Newton's second law in this leaf assumes constant [[masa]].
    graph_rules:
    - id: masa_graph_slope
      when: 'true'
      status: info
      text:
        es: En la gráfica fuerza-aceleración, [[masa]] se interpreta como la pendiente.
        en: In the force-acceleration graph, [[masa]] is interpreted as the slope.
    likely_errors:
    - id: masa_error_weight
      when: 'true'
      status: warning
      text:
        es: 'No confundas [[masa]] con peso: la masa se mide en kg y el peso en N.'
        en: 'Do not confuse [[masa]] with weight: mass is measured in kg and weight in N.'
    next_step_rules:
    - id: masa_next_check
      when: 'true'
      status: info
      text:
        es: Después de obtener [[masa]], revisa que el resultado sea positivo y de orden razonable.
        en: After obtaining [[masa]], check that the result is positive and of reasonable order.
    physical_intuition:
    - id: masa_intuition_inertia
      when: 'true'
      status: info
      text:
        es: A mayor [[masa]], menor aceleración produce la misma fuerza neta.
        en: The greater the [[masa]], the smaller the acceleration produced by the same net force.
    limiting_cases:
    - id: masa_limit_large
      when: 'true'
      status: info
      text:
        es: Si [[masa]] crece mucho con fuerza neta fija, la aceleración tiende a hacerse pequeña.
        en: If [[masa]] grows greatly with fixed net force, acceleration tends to become small.
    sign_convention_reminder:
      enabled: false
      text:
        es: ''
        en: ''
      common_sign_errors: []
  aceleracion:
    enabled: true
    magnitude_type: vector
    semantic_role:
      es: respuesta dinámica
      en: dynamic response
    summary_rules:
    - id: aceleracion_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[aceleracion]] indica cómo cambia la velocidad debido a la fuerza neta.'
        en: '[[aceleracion]] indicates how velocity changes due to net force.'
    physical_reading_rules:
    - id: aceleracion_physical_reading_direction
      when: 'true'
      status: info
      text:
        es: '[[aceleracion]] apunta en el sentido de la fuerza neta, no necesariamente en el sentido de la velocidad.'
        en: '[[aceleracion]] points in the direction of net force, not necessarily in the direction of velocity.'
    coherence_rules:
    - id: aceleracion_coherence_units
      when: 'true'
      status: ok
      text:
        es: '[[aceleracion]] debe expresarse en m/s² y ser coherente con fuerza neta dividida por masa.'
        en: '[[aceleracion]] must be expressed in m/s² and be consistent with net force divided by mass.'
    model_validity_rules:
    - id: aceleracion_model_inertial
      when: 'true'
      status: info
      text:
        es: Interpreta [[aceleracion]] dentro de un sistema inercial con masa constante.
        en: Interpret [[aceleracion]] within an inertial frame with constant mass.
    graph_rules:
    - id: aceleracion_graph_coord
      when: 'true'
      status: info
      text:
        es: En Coord, [[aceleracion]] aumenta linealmente con la fuerza neta si la masa permanece constante.
        en: In Coord, [[aceleracion]] increases linearly with net force if mass remains constant.
    - id: aceleracion_graph_dcl
      when: 'true'
      status: info
      text:
        es: En DCL, [[aceleracion]] debe dibujarse en el sentido de la resultante.
        en: In DCL, [[aceleracion]] must be drawn in the direction of the resultant.
    likely_errors:
    - id: aceleracion_error_velocity
      when: 'true'
      status: warning
      text:
        es: No deduzcas el sentido de [[aceleracion]] a partir de la velocidad, sino de la fuerza neta.
        en: Do not infer the direction of [[aceleracion]] from velocity, but from net force.
    next_step_rules:
    - id: aceleracion_next_motion
      when: 'true'
      status: info
      text:
        es: Después de obtener [[aceleracion]], úsala para describir cómo cambiará la velocidad.
        en: After obtaining [[aceleracion]], use it to describe how velocity will change.
    physical_intuition:
    - id: aceleracion_intuition_change
      when: 'true'
      status: info
      text:
        es: '[[aceleracion]] no dice dónde está el cuerpo, sino cómo cambia su movimiento.'
        en: '[[aceleracion]] does not say where the body is, but how its motion changes.'
    limiting_cases:
    - id: aceleracion_limit_zero_force
      when: 'true'
      status: info
      text:
        es: Si la fuerza neta es cero, [[aceleracion]] también debe ser cero.
        en: If net force is zero, [[aceleracion]] must also be zero.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[aceleracion]] depende del eje positivo elegido.
        en: The sign of [[aceleracion]] depends on the chosen positive axis.
      common_sign_errors:
      - es: Llamar negativa a una aceleración sin haber definido el sentido positivo.
        en: Calling an acceleration negative without defining the positive direction.
  fuerza_neta_x:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: componente horizontal de la resultante
      en: horizontal component of the resultant
    summary_rules:
    - id: fuerza_neta_x_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta_x]] resume la resultante de fuerzas sobre el eje x.'
        en: '[[fuerza_neta_x]] summarizes the resultant force along the x-axis.'
    physical_reading_rules:
    - id: fuerza_neta_x_reading_sign
      when: 'true'
      status: info
      text:
        es: El signo de [[fuerza_neta_x]] indica si la resultante va a favor o contra el eje x positivo.
        en: The sign of [[fuerza_neta_x]] indicates whether the resultant goes with or against the positive x-axis.
    coherence_rules:
    - id: fuerza_neta_x_coherence_component
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta_x]] debe relacionarse solo con componentes x de las fuerzas.'
        en: '[[fuerza_neta_x]] must relate only to x-components of forces.'
    model_validity_rules:
    - id: fuerza_neta_x_model_axis
      when: 'true'
      status: info
      text:
        es: La interpretación de [[fuerza_neta_x]] exige un eje x definido y constante.
        en: The interpretation of [[fuerza_neta_x]] requires a defined and constant x-axis.
    graph_rules:
    - id: fuerza_neta_x_graph_components
      when: 'true'
      status: info
      text:
        es: En DCL, proyecta cada fuerza sobre x antes de obtener [[fuerza_neta_x]].
        en: In DCL, project each force onto x before obtaining [[fuerza_neta_x]].
    likely_errors:
    - id: fuerza_neta_x_error_mix_axes
      when: 'true'
      status: warning
      text:
        es: No mezcles componentes y dentro del cálculo de [[fuerza_neta_x]].
        en: Do not mix y-components into the calculation of [[fuerza_neta_x]].
    next_step_rules:
    - id: fuerza_neta_x_next_ax
      when: 'true'
      status: info
      text:
        es: Después de hallar [[fuerza_neta_x]], calcula [[aceleracion_x]] si conoces la masa.
        en: After finding [[fuerza_neta_x]], calculate [[aceleracion_x]] if mass is known.
    physical_intuition:
    - id: fuerza_neta_x_intuition
      when: 'true'
      status: info
      text:
        es: '[[fuerza_neta_x]] mide el desequilibrio dinámico solo sobre el eje x.'
        en: '[[fuerza_neta_x]] measures dynamic imbalance only along the x-axis.'
    limiting_cases:
    - id: fuerza_neta_x_limit_zero
      when: 'true'
      status: info
      text:
        es: Si [[fuerza_neta_x]] es cero, no hay aceleración en x.
        en: If [[fuerza_neta_x]] is zero, there is no acceleration along x.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[fuerza_neta_x]] depende del sentido positivo del eje x.
        en: The sign of [[fuerza_neta_x]] depends on the positive direction of the x-axis.
      common_sign_errors:
      - es: Cambiar el signo de una fuerza sin cambiar explícitamente el eje.
        en: Changing a force sign without explicitly changing the axis.
  aceleracion_x:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: componente horizontal de la aceleración
      en: horizontal component of acceleration
    summary_rules:
    - id: aceleracion_x_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[aceleracion_x]] indica el cambio de velocidad sobre el eje x.'
        en: '[[aceleracion_x]] indicates velocity change along the x-axis.'
    physical_reading_rules:
    - id: aceleracion_x_reading_force
      when: 'true'
      status: info
      text:
        es: '[[aceleracion_x]] tiene el mismo signo que [[fuerza_neta_x]] si la masa es positiva.'
        en: '[[aceleracion_x]] has the same sign as [[fuerza_neta_x]] if mass is positive.'
    coherence_rules:
    - id: aceleracion_x_coherence_units
      when: 'true'
      status: ok
      text:
        es: '[[aceleracion_x]] debe expresarse en m/s².'
        en: '[[aceleracion_x]] must be expressed in m/s².'
    model_validity_rules:
    - id: aceleracion_x_model_axis
      when: 'true'
      status: info
      text:
        es: '[[aceleracion_x]] solo tiene sentido respecto al eje x elegido.'
        en: '[[aceleracion_x]] only makes sense relative to the chosen x-axis.'
    graph_rules:
    - id: aceleracion_x_graph
      when: 'true'
      status: info
      text:
        es: En Coord, [[aceleracion_x]] puede compararse con [[fuerza_neta_x]] para leer proporcionalidad.
        en: In Coord, [[aceleracion_x]] can be compared with [[fuerza_neta_x]] to read proportionality.
    likely_errors:
    - id: aceleracion_x_error_velocity
      when: 'true'
      status: warning
      text:
        es: No confundas [[aceleracion_x]] con la velocidad horizontal.
        en: Do not confuse [[aceleracion_x]] with horizontal velocity.
    next_step_rules:
    - id: aceleracion_x_next
      when: 'true'
      status: info
      text:
        es: Usa [[aceleracion_x]] para decidir cómo cambia el movimiento horizontal.
        en: Use [[aceleracion_x]] to decide how horizontal motion changes.
    physical_intuition:
    - id: aceleracion_x_intuition
      when: 'true'
      status: info
      text:
        es: '[[aceleracion_x]] mide el cambio de movimiento solo en la dirección x.'
        en: '[[aceleracion_x]] measures motion change only in the x direction.'
    limiting_cases:
    - id: aceleracion_x_limit_zero
      when: 'true'
      status: info
      text:
        es: Si [[aceleracion_x]] es cero, la velocidad horizontal permanece constante.
        en: If [[aceleracion_x]] is zero, horizontal velocity remains constant.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[aceleracion_x]] depende del sentido positivo del eje x.
        en: The sign of [[aceleracion_x]] depends on the positive direction of the x-axis.
      common_sign_errors:
      - es: Interpretar una aceleración negativa como frenado sin mirar la velocidad.
        en: Interpreting negative acceleration as braking without checking velocity.
  fuerza_neta_y:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: componente vertical de la resultante
      en: vertical component of the resultant
    summary_rules:
    - id: fuerza_neta_y_summary_base
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta_y]] resume la resultante de fuerzas sobre el eje y.'
        en: '[[fuerza_neta_y]] summarizes the resultant force along the y-axis.'
    physical_reading_rules:
    - id: fuerza_neta_y_reading_sign
      when: 'true'
      status: info
      text:
        es: El signo de [[fuerza_neta_y]] indica si la resultante va a favor o contra el eje y positivo.
        en: The sign of [[fuerza_neta_y]] indicates whether the resultant goes with or against the positive y-axis.
    coherence_rules:
    - id: fuerza_neta_y_coherence_component
      when: 'true'
      status: ok
      text:
        es: '[[fuerza_neta_y]] debe relacionarse solo con componentes y de las fuerzas.'
        en: '[[fuerza_neta_y]] must relate only to y-components of forces.'
    model_validity_rules:
    - id: fuerza_neta_y_model_axis
      when: 'true'
      status: info
      text:
        es: La interpretación de [[fuerza_neta_y]] exige un eje y definido y constante.
        en: The interpretation of [[fuerza_neta_y]] requires a defined and constant y-axis.
    graph_rules:
    - id: fuerza_neta_y_graph_components
      when: 'true'
      status: info
      text:
        es: En DCL, proyecta cada fuerza sobre y antes de obtener [[fuerza_neta_y]].
        en: In DCL, project each force onto y before obtaining [[fuerza_neta_y]].
    likely_errors:
    - id: fuerza_neta_y_error_normal_weight
      when: 'true'
      status: warning
      text:
        es: No supongas que la normal siempre iguala al peso; comprueba [[fuerza_neta_y]].
        en: Do not assume normal force always equals weight; check [[fuerza_neta_y]].
    next_step_rules:
    - id: fuerza_neta_y_next_ay
      when: 'true'
      status: info
      text:
        es: Después de hallar [[fuerza_neta_y]], calcula [[aceleracion_y]] si conoces la masa.
        en: After finding [[fuerza_neta_y]], calculate [[aceleracion_y]] if mass is known.
    physical_intuition:
    - id: fuerza_neta_y_intuition
      when: 'true'
      status: info
      text:
        es: '[[fuerza_neta_y]] mide el desequilibrio dinámico solo sobre el eje y.'
        en: '[[fuerza_neta_y]] measures dynamic imbalance only along the y-axis.'
    limiting_cases:
    - id: fuerza_neta_y_limit_zero
      when: 'true'
      status: info
      text:
        es: Si [[fuerza_neta_y]] es cero, no hay aceleración en y.
        en: If [[fuerza_neta_y]] is zero, there is no acceleration along y.
    sign_convention_reminder:
      enabled: true
      text:
        es: El signo de [[fuerza_neta_y]] depende del sentido positivo del eje y.
        en: The sign of [[fuerza_neta_y]] depends on the positive direction of the y-axis.
      common_sign_errors:
      - es: Tomar el peso como positivo o negativo sin declarar el eje vertical.
        en: Taking weight as positive or negative without declaring the vertical axis.
  aceleracion_y:
    enabled: true
    magnitude_type: scalar
    semantic_role:
