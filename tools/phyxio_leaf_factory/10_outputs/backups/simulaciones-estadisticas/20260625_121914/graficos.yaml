version: '1.0'
leaf: simulaciones-estadisticas
coord:
  id: simulaciones-estadisticas-Coord
  graphId: simulaciones-estadisticas-Coord
  type: Coord
  graphType: Coord
  title:
    es: Error estadístico frente al número de muestras
    en: Statistical error versus number of samples
  xAxis:
    es: Número de muestras N
    en: Number of samples N
  yAxis:
    es: Error estadístico delta_X
    en: Statistical error delta_X
  xMagnitude: numero_muestras
  yMagnitude: error_estadistico
  relation:
    es: 'El gráfico responde cómo el error estadístico disminuye al aumentar el número de muestras: sigue delta_X=s_X/sqrt(N),
      no una caída lineal.'
    en: 'The graph answers how statistical error decreases as the number of samples increases: it follows delta_X=s_X/sqrt(N),
      not a linear drop.'
  physicalReading:
    es: Cada punto muestra la incertidumbre esperada de una simulación estadística con N muestras; más muestras reducen el
      error estadístico lentamente.
    en: Each point shows the expected uncertainty of a statistical simulation with N samples; more samples reduce statistical
      error slowly.
  slopeMeaning:
    es: La pendiente negativa indica que añadir muestras reduce el error, pero su valor absoluto se hace menor al crecer N.
    en: The negative slope indicates that adding samples reduces error, but its absolute value becomes smaller as N grows.
  interceptMeaning:
    es: El corte en N=0 no tiene significado físico porque una simulación sin muestras no estima nada.
    en: The intercept at N=0 has no physical meaning because a simulation with no samples estimates nothing.
  curvatureMeaning:
    es: 'La curvatura refleja la ley de raíz inversa: al principio el error baja rápido y después se aplana.'
    en: 'The curvature reflects the inverse-square-root law: initially the error drops quickly and then flattens.'
  signMeaning:
    es: El error estadístico se representa como magnitud positiva; no indica dirección, sino incertidumbre.
    en: Statistical error is plotted as a positive quantity; it indicates uncertainty, not direction.
  areaMeaning:
    es: El área bajo la curva no es la magnitud principal; la lectura importante es la caída con N.
    en: The area under the curve is not the main quantity; the important reading is the decrease with N.
  domainMeaning:
    es: El dominio físico exige N positivo y muestras aproximadamente independientes para aplicar delta_X=s_X/sqrt(N).
    en: The physical domain requires positive N and approximately independent samples to apply delta_X=s_X/sqrt(N).
  modelConnection:
    es: La representación conecta el coste computacional de una simulación estadística con la fiabilidad de sus promedios.
    en: The representation connects the computational cost of a statistical simulation with the reliability of its averages.
  formulaConnection:
    es: Se basa en la fórmula error_estadistico_media y mantiene s_X como parámetro de dispersión.
    en: It is based on the error_estadistico_media formula and keeps s_X as a dispersion parameter.
  readingFocus:
    es: Leer cuánto baja el error estadístico cuando aumenta el número de muestras y detectar que la mejora es de raíz cuadrada.
    en: Read how much statistical error decreases when the number of samples increases and detect the square-root improvement.
  agentHints:
    es:
    - Comprueba que el alumno no espere una reducción lineal del error con N.
    - Insiste en que el error estadístico es positivo y representa incertidumbre de la media.
    - Relaciona una reducción a la mitad del error con cuadruplicar el número de muestras.
    en:
    - Check that the student does not expect a linear error reduction with N.
    - Emphasize that statistical error is positive and represents uncertainty of the mean.
    - Relate halving the error to quadrupling the number of samples.
  commonMistakes:
    es:
    - Creer que duplicar N divide el error por dos.
    - Leer el error estadístico como desviación estándar de los datos brutos.
    - Usar N=0 o valores negativos como si tuvieran sentido físico.
    en:
    - Thinking that doubling N halves the error.
    - Reading statistical error as the standard deviation of raw data.
    - Using N=0 or negative values as physically meaningful.
  curveProfile:
    type: inverse_square_root_decay
    expectedShape:
      es: Curva decreciente, positiva y cada vez más plana.
      en: Decreasing, positive curve that becomes progressively flatter.
    keyPoints:
    - x: 100
      y: 0.1
      label:
        es: 'Pocas muestras: error grande'
        en: 'Few samples: large error'
    - x: 10000
      y: 0.01
      label:
        es: 'Muchas muestras: error menor'
        en: 'Many samples: smaller error'
    - x: 1000000
      y: 0.001
      label:
        es: Mejora lenta a gran N
        en: Slow improvement at large N
  dataRange:
    xMin: 1
    xMax: 1000000
    yMin: 0
    yMax: 1
    autoScale: true
  recommendedTab: graficas
