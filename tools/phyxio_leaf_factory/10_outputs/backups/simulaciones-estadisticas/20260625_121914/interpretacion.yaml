      when: 'true'
      status: info
      text:
        es: Lee [[media_muestral]] junto con su unidad, su signo y el contexto físico del leaf.
        en: Read [[media_muestral]] together with its unit, sign, and the physical context of the leaf.
    coherence_rules:
    - id: media_muestral_coherence_base
      when: 'true'
      status: ok
      text:
        es: Comprueba que [[media_muestral]] sea coherente con las magnitudes de entrada y con la dimensión esperada.
        en: Check that [[media_muestral]] is consistent with the input quantities and the expected dimension.
    model_validity_rules:
    - id: media_muestral_model_validity_base
      when: 'true'
      status: info
      text:
        es: Interpreta [[media_muestral]] solo dentro de las hipótesis físicas del modelo usado en este leaf.
        en: Interpret [[media_muestral]] only within the physical assumptions of the model used in this leaf.
    graph_rules:
    - id: media_muestral_graph_base
      when: 'true'
      status: info
      text:
        es: Relaciona [[media_muestral]] con la lectura gráfica disponible en el leaf.
        en: Relate [[media_muestral]] to the graph reading available in the leaf.
    likely_errors:
    - id: media_muestral_likely_error_base
      when: 'true'
      status: warning
      text:
        es: No interpretes [[media_muestral]] como un número aislado. Su sentido depende del modelo, la unidad y el signo.
        en: Do not interpret [[media_muestral]] as an isolated number. Its meaning depends on the model, unit, and sign.
    next_step_rules:
    - id: media_muestral_next_step_base
      when: 'true'
      status: info
      text:
        es: Después de obtener [[media_muestral]], revisa la coherencia física y vuelve a la calculadora si necesitas otro
          despeje.
        en: After obtaining [[media_muestral]], check the physical consistency and return to the calculator if another rearrangement
          is needed.
    physical_intuition:
    - id: media_muestral_physical_intuition_base
      when: 'true'
      status: info
      text:
        es: Intuitivamente, [[media_muestral]] resume cómo responde el sistema cuando cambian las magnitudes relevantes.
        en: Intuitively, [[media_muestral]] summarizes how the system responds when the relevant quantities change.
    limiting_cases:
    - id: media_muestral_limiting_case_base
