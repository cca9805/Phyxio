mini_graph:
  enabled: true
  preferred_type: Dcl
output_policy:
  show_summary_first: true
  max_inline_messages: 3
  show_warnings: true
  show_likely_errors: true
dependencies:
  formulas:
    - primera_ley_balance
    - definicion_variacion_energia_interna
    - proceso_adiabatico
  magnitudes:
    - variacion_energia_interna
    - calor_intercambiado
    - trabajo_sobre_sistema
    - energia_interna_inicial
    - energia_interna_final
  requires_formulas: true
  requires_magnitudes: true
  supports_graph_binding: true
global_context:
  enabled: true
  physical_domain:
    es: Termodinamica de sistemas cerrados y balance energetico.
    en: Thermodynamics of closed systems and energy balance.
  axis_convention:
    es: Calor y trabajo son positivos cuando entran al sistema; el trabajo se interpreta como trabajo sobre el sistema.
    en: Heat and work are positive when entering the system; work is interpreted as work done on the system.
  standard_assumptions:
    - es: El sistema es cerrado y no intercambia materia con el entorno.
      en: The system is closed and does not exchange matter with the surroundings.
    - es: Todas las transferencias de energia relevantes se contabilizan como calor o trabajo.
      en: All relevant energy transfers are counted as heat or work.
  standard_warnings:
    - es: No mezcles convenciones de signo para el trabajo en el mismo calculo.
      en: Do not mix work sign conventions in the same calculation.
    - es: Calor y trabajo no son propiedades almacenadas; solo describen transferencia durante el proceso.
      en: Heat and work are not stored properties; they describe transfer during the process only.
graph_binding:
  enabled: true
  type: Dcl
  channels:
    - Dcl
cross_checks:
  enabled: true
  checks:
    - id: dimension_check
      status: ok
      text:
        es: Todas las magnitudes del balance deben expresarse en energia, normalmente julios.
        en: All quantities in the balance must be expressed as energy, usually joules.
    - id: sign_convention_check
      status: warning
      text:
        es: Si usas trabajo hecho por el sistema, la formula cambia de signo respecto a este leaf.
        en: If using work done by the system, the formula changes sign relative to this leaf.
error_patterns:
  enabled: true
  patterns:
    - id: heat_as_state_variable
      status: warning
      text:
        es: "Error frecuente: tratar el calor como energia contenida en el sistema. El calor solo existe como transferencia."
        en: "Common error: treating heat as energy contained in the system. Heat exists only as transfer."
    - id: work_sign_confusion
      status: warning
      text:
        es: "Error frecuente: usar trabajo hecho por el sistema con la formula de trabajo sobre el sistema."
        en: "Common error: using work done by the system with the formula for work done on the system."
graph_reading_policy:
  enabled: true
  primary_variable: variacion_energia_interna
  reading_sequence:
    - es: Identifica el sistema, su frontera y las flechas de calor y trabajo antes de interpretar signos.
      en: Identify the system, its boundary, and the heat and work arrows before interpreting signs.
    - es: Decide si cada flecha entra o sale del sistema y despues relaciona el balance con [[variacion_energia_interna]].
      en: Decide whether each arrow enters or leaves the system, then relate the balance to [[variacion_energia_interna]].
  key_points:
    - es: La flecha de calor representa [[calor_intercambiado]], no energia almacenada.
      en: The heat arrow represents [[calor_intercambiado]], not stored energy.
    - es: La flecha de trabajo representa [[trabajo_sobre_sistema]] con una convencion de signo declarada.
      en: The work arrow represents [[trabajo_sobre_sistema]] with a declared sign convention.
comparative_context:
  enabled: true
  reference_values:
    - es: Compara resultados pequenos con la energia necesaria para calentar agua o comprimir un gas de laboratorio.
      en: Compare small results with the energy needed to heat water or compress a laboratory gas.
    - es: En ciclos completos, [[variacion_energia_interna]] debe volver a cero aunque haya calor y trabajo.
      en: In complete cycles, [[variacion_energia_interna]] must return to zero even if heat and work occur.
  order_of_magnitude_check: true
dimensional_hint:
  enabled: true
  formula_dimensions:
    es: "[[variacion_energia_interna]], [[calor_intercambiado]] y [[trabajo_sobre_sistema]] tienen dimension de energia."
    en: "[[variacion_energia_interna]], [[calor_intercambiado]], and [[trabajo_sobre_sistema]] have energy dimension."
  common_unit_mistakes:
    - es: Mezclar J y kJ sin convertir antes de aplicar el balance.
      en: Mixing J and kJ without converting before applying the balance.
    - es: Usar calorias para el calor y julios para el trabajo sin conversion.
      en: Using calories for heat and joules for work without conversion.
free_body_diagram_hint:
  enabled: true
  key_forces:
    - es: En este DCL no se leen fuerzas, sino flujos de energia que cruzan la frontera del sistema.
      en: In this DCL, read energy flows crossing the system boundary, not forces.
    - es: Distingue flechas entrantes, flechas salientes y acumulacion interna.
      en: Distinguish incoming arrows, outgoing arrows, and internal accumulation.
  equilibrium_condition:
    es: No es una condicion de equilibrio mecanico; si el balance neto es cero, [[variacion_energia_interna]] no cambia.
    en: This is not a mechanical equilibrium condition; if the net balance is zero, [[variacion_energia_interna]] does not change.
process_type_detection:
  enabled: true
  processes:
    - id: adiabatico
      condition:
        es: "[[calor_intercambiado]] es cero o despreciable."
        en: "[[calor_intercambiado]] is zero or negligible."
      implication:
        es: La variacion de energia interna se debe solo al trabajo.
        en: Internal energy change is due only to work.
    - id: ciclo
      condition:
        es: El estado final coincide con el estado inicial.
        en: The final state is the same as the initial state.
      implication:
        es: "[[variacion_energia_interna]] debe ser cero."
        en: "[[variacion_energia_interna]] must be zero."
wave_behavior_context:
  enabled: false
  phenomena: []
field_visualization_hint:
  enabled: false
  field_lines:
    direction_rule:
      es: ""
      en: ""
    density_meaning:
      es: ""
      en: ""
  superposition_note:
    es: ""
    en: ""
ray_tracing_hint:
  enabled: false
  construction_rays: []
  image_type_detection: []
targets:
  variacion_energia_interna:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: core_physical_quantity
      en: Internal energy change
    summary_rules:
      - id: variacion_energia_interna_summary_balance
        when: "true"
        status: ok
        text:
          es: "[[variacion_energia_interna]] resume el balance neto entre el calor que entra y el trabajo realizado sobre el sistema."
          en: "[[variacion_energia_interna]] summarizes the net balance between incoming heat and work done on the system."
    physical_reading_rules:
      - id: variacion_energia_interna_reading_sign
        when: "true"
        status: info
        text:
          es: "Si [[variacion_energia_interna]] es positiva, el sistema termina con mas energia interna; si es negativa, termina con menos."
          en: "If [[variacion_energia_interna]] is positive, the system ends with more internal energy; if negative, it ends with less."
    coherence_rules:
      - id: variacion_energia_interna_coherence_balance
        when: "true"
        status: ok
        text:
          es: "Comprueba que [[variacion_energia_interna]] coincida con la suma algebraica de [[calor_intercambiado]] y [[trabajo_sobre_sistema]]."
          en: "Check that [[variacion_energia_interna]] matches the algebraic sum of [[calor_intercambiado]] and [[trabajo_sobre_sistema]]."
    model_validity_rules:
      - id: variacion_energia_interna_model_closed_system
        when: "true"
        status: info
        text:
          es: "Esta lectura es valida para un sistema cerrado; si hay flujo de masa, debe anadirse energia transportada por la materia."
          en: "This reading is valid for a closed system; if mass flows, energy carried by matter must be added."
    graph_rules:
      - id: variacion_energia_interna_graph_dcl
        when: "true"
        status: info
        text:
          es: "En el DCL, [[variacion_energia_interna]] no es una flecha de frontera: es la acumulacion neta dentro del sistema."
          en: "In the DCL, [[variacion_energia_interna]] is not a boundary arrow: it is the net accumulation inside the system."
    likely_errors:
      - id: variacion_energia_interna_error_path
        when: "true"
        status: warning
        text:
          es: "Error frecuente: creer que [[variacion_energia_interna]] depende del camino. Depende solo de los estados inicial y final."
          en: "Common error: believing [[variacion_energia_interna]] depends on the path. It depends only on initial and final states."
    next_step_rules:
      - id: variacion_energia_interna_next_state
        when: "true"
        status: info
        text:
          es: "Despues de interpretar [[variacion_energia_interna]], revisa si el proceso es adiabatico, ciclico o con intercambio de calor."
          en: "After interpreting [[variacion_energia_interna]], check whether the process is adiabatic, cyclic, or includes heat exchange."
    physical_intuition:
      - id: variacion_energia_interna_intuition_accumulation
        when: "true"
        status: info
        text:
          es: "Intuitivamente, [[variacion_energia_interna]] es la acumulacion energetica interna que queda despues de sumar entradas y salidas."
          en: "Intuitively, [[variacion_energia_interna]] is the internal energy accumulation left after adding inputs and outputs."
    limiting_cases:
      - id: variacion_energia_interna_limit_cycle
        when: "true"
        status: info
        text:
          es: "En un ciclo completo, [[variacion_energia_interna]] debe ser cero porque el sistema vuelve al estado inicial."
          en: "In a complete cycle, [[variacion_energia_interna]] must be zero because the system returns to the initial state."
    sign_convention_reminder:
      enabled: true
      text:
        es: "Convencion usada: calor y trabajo positivos cuando entran al sistema."
        en: "Convention used: heat and work are positive when entering the system."
      common_sign_errors:
        - es: "Restar el trabajo aunque el problema use trabajo sobre el sistema."
          en: "Subtracting work even though the problem uses work done on the system."
  calor_intercambiado:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: core_physical_quantity
      en: Heat exchanged
    summary_rules:
      - id: calor_intercambiado_summary_transfer
        when: "true"
        status: ok
        text:
          es: "[[calor_intercambiado]] mide energia que cruza la frontera por diferencia de temperatura."
          en: "[[calor_intercambiado]] measures energy crossing the boundary because of a temperature difference."
    physical_reading_rules:
      - id: calor_intercambiado_reading_sign
        when: "true"
        status: info
        text:
          es: "Con esta convencion, [[calor_intercambiado]] positivo calienta energeticamente al sistema y negativo indica calor cedido al entorno."
          en: "With this convention, positive [[calor_intercambiado]] energizes the system and negative means heat released to the surroundings."
    coherence_rules:
      - id: calor_intercambiado_coherence_units
        when: "true"
        status: ok
        text:
          es: "[[calor_intercambiado]] debe estar en unidades de energia y ser coherente con [[trabajo_sobre_sistema]] antes de sumarlos."
          en: "[[calor_intercambiado]] must be in energy units and coherent with [[trabajo_sobre_sistema]] before adding them."
    model_validity_rules:
      - id: calor_intercambiado_model_transfer
        when: "true"
        status: info
        text:
          es: "Interpreta [[calor_intercambiado]] como transferencia, no como propiedad del estado del sistema."
          en: "Interpret [[calor_intercambiado]] as transfer, not as a property of the system state."
    graph_rules:
      - id: calor_intercambiado_graph_arrow
        when: "true"
        status: info
        text:
          es: "En el DCL, [[calor_intercambiado]] debe verse como una flecha que cruza la frontera del sistema."
          en: "In the DCL, [[calor_intercambiado]] should appear as an arrow crossing the system boundary."
    likely_errors:
      - id: calor_intercambiado_error_stored_heat
        when: "true"
        status: warning
        text:
          es: "Error frecuente: decir que el sistema contiene calor. El sistema contiene energia interna; el calor es transferencia."
          en: "Common error: saying the system contains heat. The system contains internal energy; heat is transfer."
    next_step_rules:
      - id: calor_intercambiado_next_adiabatic
        when: "true"
        status: info
        text:
          es: "Si [[calor_intercambiado]] es cero, analiza el caso adiabatico y atribuye el cambio de energia interna al trabajo."
          en: "If [[calor_intercambiado]] is zero, analyze the adiabatic case and attribute internal energy change to work."
    physical_intuition:
      - id: calor_intercambiado_intuition_boundary
        when: "true"
        status: info
        text:
          es: "Intuitivamente, [[calor_intercambiado]] es energia que atraviesa la frontera porque existe desequilibrio termico."
          en: "Intuitively, [[calor_intercambiado]] is energy crossing the boundary because thermal imbalance exists."
    limiting_cases:
      - id: calor_intercambiado_limit_zero
        when: "true"
        status: info
        text:
          es: "Si [[calor_intercambiado]] se anula, el proceso puede ser adiabatico, pero aun puede cambiar la energia interna por trabajo."
          en: "If [[calor_intercambiado]] vanishes, the process may be adiabatic, but internal energy can still change through work."
    sign_convention_reminder:
      enabled: true
      text:
        es: "Calor positivo entra al sistema; calor negativo sale del sistema."
        en: "Positive heat enters the system; negative heat leaves the system."
      common_sign_errors:
        - es: "Asignar calor positivo a una perdida de calor del sistema."
          en: "Assigning positive heat to heat lost by the system."
  trabajo_sobre_sistema:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: core_physical_quantity
      en: Work done on the system
    summary_rules:
      - id: trabajo_sobre_sistema_summary_transfer
        when: "true"
        status: ok
        text:
          es: "[[trabajo_sobre_sistema]] mide energia transferida mecanicamente desde el entorno hacia el sistema."
          en: "[[trabajo_sobre_sistema]] measures energy mechanically transferred from the surroundings to the system."
    physical_reading_rules:
      - id: trabajo_sobre_sistema_reading_sign
        when: "true"
        status: info
        text:
          es: "Si [[trabajo_sobre_sistema]] es positivo, el entorno comprime o empuja al sistema; si es negativo, el sistema realiza trabajo sobre el entorno."
          en: "If [[trabajo_sobre_sistema]] is positive, the surroundings compress or push the system; if negative, the system does work on the surroundings."
    coherence_rules:
      - id: trabajo_sobre_sistema_coherence_convention
        when: "true"
        status: ok
        text:
          es: "Comprueba que el signo de [[trabajo_sobre_sistema]] coincide con la convencion usada en la formula [[variacion_energia_interna]] = Q + W."
          en: "Check that the sign of [[trabajo_sobre_sistema]] matches the convention used in [[variacion_energia_interna]] = Q + W."
    model_validity_rules:
      - id: trabajo_sobre_sistema_model_boundary
        when: "true"
        status: info
        text:
          es: "La lectura supone que el trabajo mecanico relevante cruza la frontera del sistema y ha sido contabilizado."
          en: "This reading assumes the relevant mechanical work crosses the system boundary and has been counted."
    graph_rules:
      - id: trabajo_sobre_sistema_graph_arrow
        when: "true"
        status: info
        text:
          es: "En el DCL, [[trabajo_sobre_sistema]] es una flecha mecanica que cruza la frontera, con sentido definido por el signo."
          en: "In the DCL, [[trabajo_sobre_sistema]] is a mechanical arrow crossing the boundary, with direction set by the sign."
    likely_errors:
      - id: trabajo_sobre_sistema_error_by_system
        when: "true"
        status: warning
        text:
          es: "Error frecuente: usar el trabajo hecho por el sistema sin cambiar el signo del balance."
          en: "Common error: using work done by the system without changing the sign in the balance."
    next_step_rules:
      - id: trabajo_sobre_sistema_next_convention
        when: "true"
        status: info
        text:
          es: "Antes de despejar otra magnitud, declara si el trabajo del enunciado es sobre el sistema o hecho por el sistema."
          en: "Before rearranging another quantity, state whether the problem's work is done on the system or by the system."
    physical_intuition:
      - id: trabajo_sobre_sistema_intuition_mechanical
        when: "true"
        status: info
        text:
          es: "Intuitivamente, [[trabajo_sobre_sistema]] representa energia que entra por empuje, compresion o accion mecanica."
          en: "Intuitively, [[trabajo_sobre_sistema]] represents energy entering through pushing, compression, or mechanical action."
    limiting_cases:
      - id: trabajo_sobre_sistema_limit_zero
        when: "true"
        status: info
        text:
          es: "Si [[trabajo_sobre_sistema]] es cero, la variacion de energia interna se debe solo al calor intercambiado."
          en: "If [[trabajo_sobre_sistema]] is zero, internal energy change is due only to exchanged heat."
    sign_convention_reminder:
      enabled: true
      text:
        es: "Trabajo positivo significa trabajo realizado sobre el sistema."
        en: "Positive work means work done on the system."
      common_sign_errors:
        - es: "Usar positivo para expansion del sistema con esta convencion."
          en: "Using positive for expansion of the system with this convention."
  energia_interna_final:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: supporting_quantity
      en: Final internal energy
    summary_rules:
      - id: energia_interna_final_summary_state
        when: "true"
        status: ok
        text:
          es: "[[energia_interna_final]] es el valor de energia interna asociado al estado final del sistema."
          en: "[[energia_interna_final]] is the internal energy value associated with the system's final state."
    physical_reading_rules:
      - id: energia_interna_final_reading_relative
        when: "true"
        status: info
        text:
          es: "Lee [[energia_interna_final]] comparandola con [[energia_interna_inicial]], no como un valor absoluto aislado."
          en: "Read [[energia_interna_final]] by comparing it with [[energia_interna_inicial]], not as an isolated absolute value."
    coherence_rules:
      - id: energia_interna_final_coherence_difference
        when: "true"
        status: ok
        text:
          es: "[[energia_interna_final]] debe cumplir la relacion de estados con [[energia_interna_inicial]] y [[variacion_energia_interna]]."
          en: "[[energia_interna_final]] must satisfy the state relation with [[energia_interna_inicial]] and [[variacion_energia_interna]]."
    model_validity_rules:
      - id: energia_interna_final_model_state
        when: "true"
        status: info
        text:
          es: "Solo interpreta [[energia_interna_final]] si el estado final esta definido termodinamicamente."
          en: "Interpret [[energia_interna_final]] only if the final state is thermodynamically defined."
    graph_rules:
      - id: energia_interna_final_graph_state
        when: "true"
        status: info
        text:
          es: "En el DCL, [[energia_interna_final]] no se dibuja como flecha; se usa para obtener el cambio interno."
          en: "In the DCL, [[energia_interna_final]] is not drawn as an arrow; it is used to obtain the internal change."
    likely_errors:
      - id: energia_interna_final_error_transfer
        when: "true"
        status: warning
        text:
          es: "Error frecuente: confundir [[energia_interna_final]] con calor o trabajo transferido durante el proceso."
          en: "Common error: confusing [[energia_interna_final]] with heat or work transferred during the process."
    next_step_rules:
      - id: energia_interna_final_next_delta
        when: "true"
        status: info
        text:
          es: "Usa [[energia_interna_final]] junto con [[energia_interna_inicial]] para comprobar [[variacion_energia_interna]]."
          en: "Use [[energia_interna_final]] together with [[energia_interna_inicial]] to check [[variacion_energia_interna]]."
    physical_intuition:
      - id: energia_interna_final_intuition_state
        when: "true"
        status: info
        text:
          es: "Intuitivamente, [[energia_interna_final]] describe donde queda el sistema despues de intercambiar energia."
          en: "Intuitively, [[energia_interna_final]] describes where the system ends after exchanging energy."
    limiting_cases:
      - id: energia_interna_final_limit_same
        when: "true"
        status: info
        text:
          es: "Si [[energia_interna_final]] coincide con [[energia_interna_inicial]], entonces [[variacion_energia_interna]] es cero."
          en: "If [[energia_interna_final]] equals [[energia_interna_inicial]], then [[variacion_energia_interna]] is zero."
    sign_convention_reminder:
      enabled: false
      text:
        es: ""
        en: ""
      common_sign_errors: []
  energia_interna_inicial:
    enabled: true
    magnitude_type: scalar
    semantic_role:
      es: supporting_quantity
      en: Initial internal energy
    summary_rules:
      - id: energia_interna_inicial_summary_state
        when: "true"
        status: ok
        text:
          es: "[[energia_interna_inicial]] es el valor de energia interna asociado al estado de partida."
          en: "[[energia_interna_inicial]] is the internal energy value associated with the starting state."
    physical_reading_rules:
      - id: energia_interna_inicial_reading_reference
        when: "true"
        status: info
        text:
          es: "[[energia_interna_inicial]] actua como referencia para medir el cambio hasta el estado final."
          en: "[[energia_interna_inicial]] acts as the reference for measuring the change to the final state."
    coherence_rules:
      - id: energia_interna_inicial_coherence_difference
        when: "true"
        status: ok
        text:
          es: "[[energia_interna_inicial]] debe combinarse con [[energia_interna_final]] para obtener [[variacion_energia_interna]]."
