version: "1.0"
leaf: primera-ley-de-la-termodinamica
dcl:
  id: primera-ley-de-la-termodinamica-Dcl
  graphId: primera-ley-de-la-termodinamica-Dcl
  type: Dcl
  graphType: Dcl
  title:
    es: Diagrama energetico de la primera ley
    en: Energy diagram of the first law
  sceneId: sistema-cerrado-balance-energetico
  sceneLabel:
    es: Sistema cerrado con frontera energetica
    en: Closed system with energy boundary
  objects:
    - id: sistema
      label:
        es: Sistema termodinamico
        en: Thermodynamic system
      role:
        es: Region donde cambia la energia interna
        en: Region where internal energy changes
    - id: entorno
      label:
        es: Entorno
        en: Surroundings
      role:
        es: Fuente o receptor de calor y trabajo
        en: Source or receiver of heat and work
    - id: frontera
      label:
        es: Frontera del sistema
        en: System boundary
      role:
        es: Superficie atravesada por calor y trabajo
        en: Surface crossed by heat and work
  mainObject: sistema
  referenceFrame:
    es: Frontera fija del sistema cerrado; energia positiva cuando entra al sistema.
    en: Fixed boundary of the closed system; energy is positive when entering the system.
  geometry:
    es: Rectangulo central para el sistema, entorno exterior y flechas de calor y trabajo cruzando la frontera.
    en: Central rectangle for the system, exterior surroundings, and heat/work arrows crossing the boundary.
  interactions:
    es:
      - "El calor [[calor_intercambiado]] entra o sale por diferencia de temperatura."
      - "El trabajo [[trabajo_sobre_sistema]] entra o sale por interaccion mecanica."
      - "El resultado neto dentro del sistema es [[variacion_energia_interna]]."
    en:
      - "Heat [[calor_intercambiado]] enters or leaves because of a temperature difference."
      - "Work [[trabajo_sobre_sistema]] enters or leaves through mechanical interaction."
      - "The net result inside the system is [[variacion_energia_interna]]."
  modelElements:
    es:
      - "Sistema cerrado sin intercambio de materia."
      - "Convencion: calor y trabajo positivos cuando entran al sistema."
      - "Balance central: [[variacion_energia_interna]] = [[calor_intercambiado]] + [[trabajo_sobre_sistema]]."
    en:
      - "Closed system with no matter exchange."
      - "Convention: heat and work are positive when entering the system."
      - "Central balance: [[variacion_energia_interna]] = [[calor_intercambiado]] + [[trabajo_sobre_sistema]]."
  visualCues:
    es:
      - "Flecha roja para calor."
      - "Flecha azul para trabajo."
      - "Etiqueta interna para la variacion de energia interna."
    en:
      - "Red arrow for heat."
      - "Blue arrow for work."
      - "Internal label for internal energy change."
  scaleMeaning:
    es: "La longitud de cada flecha representa la magnitud de la transferencia energetica."
    en: "The length of each arrow represents the magnitude of the energy transfer."
  relation:
    es: "El DCL responde como se relacionan el calor, el trabajo y la variacion de energia interna: las flechas que cruzan la frontera se suman para producir [[variacion_energia_interna]]."
    en: "The free-body diagram answers how heat, work, and internal energy change are related: arrows crossing the boundary add to produce [[variacion_energia_interna]]."
  physicalReading:
    es: "Si [[calor_intercambiado]] y [[trabajo_sobre_sistema]] entran al sistema, [[variacion_energia_interna]] aumenta; si salen, disminuye."
    en: "If [[calor_intercambiado]] and [[trabajo_sobre_sistema]] enter the system, [[variacion_energia_interna]] increases; if they leave, it decreases."
  modelConnection:
    es: "El diagrama representa un sistema cerrado, la condicion natural de la primera ley en forma de balance energetico."
    en: "The diagram represents a closed system, the natural condition for the first law as an energy balance."
  formulaConnection:
    es: "Conecta directamente con {{f:primera_ley_balance}} y con la definicion {{f:definicion_variacion_energia_interna}}."
    en: "It connects directly with {{f:primera_ley_balance}} and the definition {{f:definicion_variacion_energia_interna}}."
  readingFocus:
    es: "Leer el signo de cada flecha antes de calcular: calor, trabajo y variacion de energia interna solo son coherentes con una convencion fija."
    en: "Read the sign of each arrow before calculating: heat, work, and internal energy change are coherent only with a fixed convention."
  agentHints:
    es:
      - "Pregunta siempre si el trabajo es sobre el sistema o hecho por el sistema."
      - "Identifica si el calor entra o sale antes de asignar signo."
      - "Recuerda que [[variacion_energia_interna]] queda dentro del sistema como resultado neto."
    en:
      - "Always ask whether work is done on the system or by the system."
      - "Identify whether heat enters or leaves before assigning a sign."
      - "Remember that [[variacion_energia_interna]] remains inside the system as the net result."
  commonMistakes:
    es:
      - "Dibujar calor como si fuera una energia almacenada."
      - "Usar signos opuestos para trabajo sin cambiar la formula."
      - "Olvidar que en un ciclo [[variacion_energia_interna]] es cero."
    en:
      - "Drawing heat as if it were stored energy."
      - "Using the opposite work sign without changing the formula."
      - "Forgetting that [[variacion_energia_interna]] is zero in a cycle."
  forceVectors:
    - id: vector_calor
      label:
        es: Calor que cruza la frontera
        en: Heat crossing the boundary
      targetObject: sistema
      direction: inward_or_outward
      magnitudeRef: calor_intercambiado
      signConvention:
        es: "Positivo hacia dentro del sistema."
        en: "Positive into the system."
      formulaRefs:
        - primera_ley_balance
    - id: vector_trabajo
      label:
        es: Trabajo mecanico sobre el sistema
        en: Mechanical work on the system
      targetObject: sistema
      direction: inward_or_outward
      magnitudeRef: trabajo_sobre_sistema
      signConvention:
        es: "Positivo si el entorno realiza trabajo sobre el sistema."
        en: "Positive if the surroundings do work on the system."
      formulaRefs:
        - primera_ley_balance
  equilibriumState:
    conditionDescription:
      es: "No es un diagrama de equilibrio mecanico; es un balance energetico. En estado estacionario o ciclo completo, [[variacion_energia_interna]] puede ser cero aunque haya calor y trabajo."
      en: "This is not a mechanical-equilibrium diagram; it is an energy balance. In a steady state or complete cycle, [[variacion_energia_interna]] may be zero even when heat and work occur."
  recommendedTab: graficas
